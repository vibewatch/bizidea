scenarios:
  downside:
    description: 假设 1 个试点晚了 2 个季度、实际 ACV 更接近 $72K，而且第 3 年第 4 个项目没签下来。
    y3RevenueK: 228.0
    y3EbitdaK: -650.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - ARPU 从 $96K 降到 $72K。
    - 到 Q4Y3，客户期末只达到 3 个活跃项目，而不是 4 个。
    - 由于部署更长时间维持定制化，第二名工程师的招聘被推迟。
  base:
    description: 创始人主导销售拿下 4 个活跃项目，ACV 约为 $96K，并在 Y3 增聘 1 名工程师来验证相邻扩张，但不额外搭销售团队。
    y3RevenueK: 344.0
    y3EbitdaK: -596.2
    cashLowPointK: 463.6
    keyAssumptionChanges:
    - 到 M7 拿下 1 个付费项目，并在 Q4Y2 前跑出 3 个活跃生产项目。
    - 实际 ACV 保持在声明的生产价位区间低端，即 $96K。
    - 随着部署复用提升，毛利率维持在 70% 目标水平。
  upside:
    description: 如果生产定价更接近 $110K，相邻工作流又提前 1 个季度成交，那么在不扩团队的情况下，到 Q4Y3 就能跑到 5 个活跃项目。
    y3RevenueK: 472.0
    y3EbitdaK: -507.0
    cashLowPointK: 555.0
    keyAssumptionChanges:
    - ARPU 从 $96K 升到 $110K。
    - 通过更快的相邻市场转化，在 Q4Y3 前增加第 5 个活跃项目。
    - 连接器复用提升到足以让团队在第二名工程师之外无需再增员。
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃项目年收入 $72K
  baseCase: 每个活跃项目年收入 $96K
  upsideCase: 每个活跃项目年收入 $110K
  y3RevenueImpactK: -86.0
  cashImpactK: -60.2
- variable: CAC
  downsideCase: 由于建立信任更慢、创始人差旅更多，CAC 达到 $80K
  baseCase: $60K CAC
  upsideCase: 通过合作伙伴转介绍和更聚焦的 ICP，CAC 降至 $45K
  y3RevenueImpactK: 0.0
  cashImpactK: -80.0
- variable: 流失率
  downsideCase: 如果产品被视为试点叠加层而非系统记录，月流失率为 2.0%
  baseCase: 1.0% 月流失率
  upsideCase: 嵌入生产流程后，月流失率降至 0.5%
  y3RevenueImpactK: -20.0
  cashImpactK: -14.0
- variable: 销售周期
  downsideCase: 从初步接触到生产合同需 6–7 个月
  baseCase: 4–5 个月
  upsideCase: 采用触发式销售时为 3–4 个月
  y3RevenueImpactK: -64.0
  cashImpactK: -44.8
- variable: 毛利率
  downsideCase: 若定制部署工作更多，毛利率为 65%
  baseCase: 70% 毛利率
  upsideCase: 一旦连接器模式开始复用，毛利率可达 75%
  y3RevenueImpactK: 0.0
  cashImpactK: -17.2
- variable: 招聘节奏
  downsideCase: 在相邻扩张验证前，于 Q1Y3 提前招聘第二名工程师
  baseCase: 第二名工程师于 Q2Y3 招聘
  upsideCase: 如果复用强于预期，第二名工程师可推迟到 Q4Y3 再招
  y3RevenueImpactK: 0.0
  cashImpactK: -30.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Triggers[资格成功 / 产能爬坡] --> Pilots[付费试点]
      Pilots --> Programs[活跃项目]
      Programs --> Revenue[项目收入]
      Revenue --> GrossProfit[70% 毛利润]
      GrossProfit --> Cash[支撑相邻验证的现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，第 3 年收入来自 4 个活跃项目、每个项目 ACV 约 $96K，这和研究里的 SOM 以及商业计划里的里程碑节奏是一致的。
- checkName: 必须跑通的条件
  finding: 首个付费项目必须在 M7 前拿下，还得足够快沉淀出可复用连接器模式，才能在不加完整销售团队的前提下，于 Q4Y2 前跑到 3 个生产项目。
- checkName: 模型失效条件
  finding: 如果 ACV 滑向 $72K，或者第 4 个项目拖到第 3 年以后，现金就会收缩到接近下行情景，印度优先切口也撑不起原定建设计划。
- checkName: 下一轮融资证明点
  finding: 只有当 4 个活跃生产项目、低于 6 周的部署时长，以及 1 个相邻航天器或推进工作流一起证明这套切口能扩到印度发射运营之外时，下一轮融资才站得住脚。
sanityChecks:
  ruleOf40: Y3 growth 115% + EBITDA margin -173% = -58%
  burnMultiple: Y3 燃烧倍数 6.2x = $596.2K 净烧钱 / $96.0K 净新增 ARR；之所以这么高，是因为支出还跑在这个小滩头市场前面。
  revenuePerFte: Y3 人均收入为 $60K，按平均 5.75 个 FTE 计算（明显低于 $200–400K 的 SaaS 基准）
  flags:
  - 印度优先滩头市场的 SAM 只有约 $1.5M，因此模型必须依赖相邻的航天器与推进工作流，才能讲出风险投资级的后续故事。
  - 到第 3 年为止，收入效率依然偏弱，因为团队是刻意按跑在“小型纯发射市场”前面的规模来配的。
  - 第 3 年的 Rule of 40 依然为负；这是一份验证市场的 pre-seed 计划，不是一份追求效率的模型。
  - 即便融资 $2.2M，现金低点仍出现在 Q4Y3；所以如果首个试点更慢，或者部署更定制化，下一轮融资大概率会被提前。
