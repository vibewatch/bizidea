slug: launch-cadence-release-os
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date] 采用 2026-05-08 计划日期之后的第一个完整运营月份。'
- id: A2
  name: pre-seed 完成后的期初现金
  value: '2.2'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2–3M] 基准情景采用偏低到中位的融资规模，好把第 3 年相邻扩张验证跑完并留出缓冲。'
- id: A3
  name: 期初活跃客户项目数（M1）
  value: '0'
  unit: 个
  source: '[BP milestones] 该计划从首个付费试点和生产部署之前开始。'
- id: A4
  name: 每个活跃项目实现的混合年收入
  value: '96.0'
  unit: 千美元/年
  source: '[BP gtm.pricing $90k-$150k annual software; Research market.som $0.4M on 4 programs] 基准情景取区间低端，好和研究里的第 3 年 SOM 对齐。'
- id: A5
  name: 收入确认时点
  value: 新项目在签约所在月份或季度按半期收入确认
  unit: 口径
  source: '[Startup-finance heuristic] 假设付费试点和转生产大多在周期中段启动。'
- id: A6
  name: 客户项目爬坡
  value: M7 获得首个付费项目；Y1 期末为 1；Y2 各季度期末分别为 1、2、2、3；Y3 各季度期末分别为 3、4、4、4
  unit: 活跃项目数
  source: '[BP milestones + BP market.som + Research market.som] 在第 12–24 个月达到 3 个生产项目，并在第 3 年达到 4 个活跃项目。'
- id: A7
  name: 毛利率
  value: '70'
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A8
  name: 月度流失率
  value: '1.0'
  unit: 百分比
  source: '[Startup-finance heuristic: early mission-critical enterprise workflow software] 假设一旦嵌入放行治理流程，部署黏性会很强。'
- id: A9
  name: 创始人/CEO 全包现金薪酬
  value: '96.0'
  unit: 千美元/年
  source: '[BP team Founder CEO] 基于创业公司财务经验法则，采用低于市场水平的创始人薪资并计入用工负担。'
- id: A10
  name: 创始工程师全包现金薪酬
  value: '120.0'
  unit: 千美元/年
  source: '[BP team Founding eng] 基于创业公司财务经验法则，按资深企业/集成人才水平估算。'
- id: A11
  name: 产品或任务保障负责人全包现金薪酬
  value: '108.0'
  unit: 千美元/年
  source: '[BP team Founding product or mission-assurance lead] 基于创业公司财务经验法则，按强领域属性产品负责人并计入用工负担估算。'
- id: A12
  name: 解决方案工程师全包现金薪酬
  value: '96.0'
  unit: 千美元/年
  source: '[BP team Solutions engineer] 基于创业公司财务经验法则，按实施导向较强的航空航天软件部署人才估算。'
- id: A13
  name: 客户成功或实施负责人全包现金薪酬
  value: '84.0'
  unit: 千美元/年
  source: '[BP team Customer success or implementation lead] 基于创业公司财务经验法则，按高触达实施与扩张岗位估算。'
- id: A14
  name: 第二名工程师全包现金薪酬
  value: '120.0'
  unit: 千美元/年
  source: '[BP milestones 24–36 months] 基于创业公司财务经验法则，按支撑相邻扩张和增值模块所需的额外产品产能估算。'
- id: A15
  name: 招聘时点
  value: M1 创始人+工程师+任务负责人；M6 解决方案工程师；M10 客户成功；M28 第二名工程师
  unit: 排期
  source: '[BP team + BP milestones] 前 24 个月把创始团队压在 4–5 人，随后为第 3 年相邻扩张验证补 1 名工程师。'
- id: A16
  name: 按职能划分的薪资分摊
  value: 创始人 100% 计入 S&M；工程 100% 计入 R&D；任务负责人 75% 计入 R&D / 25% 计入 G&A；解决方案 60% 计入 R&D / 40% 计入 G&A；客户成功 100% 计入 G&A
  unit: 分摊
  source: '[BP team rationales] 对应创始人主导销售、产品搭建，以及以实施为导向的部署支持。'
- id: A17
  name: 非薪资销售与市场费用
  value: Y1 每月 $5K，第 13–27 个月每月 $6K，第 28–36 个月每月 $7K
  unit: 美元/月
  source: '[BP gtm channels + Research distributionChannels] 基于创业公司财务经验法则，覆盖面向集中买方群体的差旅、活动和合作伙伴带来的创始人销售开销。'
- id: A18
  name: 非薪资研发、云和安全费用
  value: 第 1–6 个月每月 $5K，第 7–27 个月每月 $6K，第 28–36 个月每月 $8K
  unit: 美元/月
  source: '[BP product + BP operations + BP fundingAsk useOfFundsSummary] 基于创业公司财务经验法则，覆盖云资源、连接器开发，以及能进采购流程的安全/合规打包。'
- id: A19
  name: 非薪资 G&A 费用
  value: Y1 每月 $4K，Y2 每月 $5K，Y3 每月 $6K
  unit: 美元/月
  source: '[Startup-finance heuristic] 对应 pre-seed 企业软件公司的精简法务、财务、保险和行政开销。'
- id: A20
  name: 混合 CAC
  value: '60.0'
  unit: 每个活跃项目的千美元
  source: '[BP gtm.funnelTargets + Research buyingTriggers] 假设在一个很小且高度集中的市场里，靠高触达的创始人主导企业销售和付费试点转化。'
- id: A21
  name: 现金流动简化口径
  value: 现金变动近似等于 EBITDA
  unit: 口径
  source: '[Startup-finance heuristic] 现阶段模型不考虑债务、税费、资本开支或重大的营运资金波动。'
- id: A22
  name: 下一轮融资证明里程碑
  value: 到 Q4Y3 实现 4 个活跃生产项目、部署时长中位数低于 6 周，并签下 1 个相邻航天器或推进工作流
  unit: 里程碑
  source: '[BP milestones 12–24 months and 24–36 months] 在 seed 轮之前，把故事从发射切口扩到相邻硬件工作流。'
- id: A23
  name: 融资需求内含缓冲
  value: '320.0'
  unit: USDK
  source: '[Modeling instruction + base-case Q4Y3 burn] 按每月约 $50K-$55K 的期末净烧钱水平，提前垫出 6 个月缓冲。'
