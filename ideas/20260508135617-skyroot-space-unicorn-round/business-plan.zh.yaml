slug: launch-cadence-release-os
date: '2026-05-08'
executiveSummary: Skyroot 的融资、6 月轨道发射目标和 72 小时装配到发射目标，把一个很具体的软件切口推到了台前：把分散的资质、供应商和装配数据收成一份可审计的发射放行包。首个客户最该瞄准印度私营发射公司里、正从资格飞行迈向首批 3–10 次商业发射的任务保障或制造负责人，因为在企业级大改造预算出现之前，最先被节奏压到喘不过气的就是这支团队。产品起步应该是一层贴在 PLM、ERP、测试系统和共享盘旁边的轻量放行控制层，而不是去替换 MES 或发射当天的靶场软件。GTM 也该由创始人亲自带，围绕资格成功、第一份商业发射合同或产能扩张这些触发点推进；先在一个活跃飞行器项目上做付费试点，再转成年化按项目收费。这个切口有吸引力，是因为现有厂商已经把追溯和质量控制需求教育得很充分，但它们的套件更宽、更慢，也不适合处理创业公司那种凌乱又高压的发射准备工作流。不过，印度优先的滩头市场还是太小：研究给出的 SAM 约为 $1.5M，第 3 年 SOM 约为 $0.4M，所以要把故事讲成风投故事，必须尽快往卫星、推进、国防和盟友市场的硬件放行工作流扩。眼下最大的未知数，是准备度评审到底吃掉多少人工、预算权到底握在谁手里，以及买方会不会在更大规模的 PLM 或 MES 项目之前，先为一层聚焦的放行控制层买单。所以，第一个年度真正要做的，不是宣告自己开辟了一个大品类，而是先跑出 1 个生产部署、证明时间真的省下来了，并沉淀出可复用的连接器和合规打法。
problem:
- 准备首批商业任务的发射团队，仍在从表格、PLM 导出文件、测试日志、供应商文件和聊天记录里拼装放行/否决材料，因此每次放行评审都慢且容易出错。
- 当节奏目标压缩到以天计算时，只要有一项偏差未闭环、缺一条供应商批次记录，或飞行器构型信息过期，就足以拖延发射，让管理层同时暴露在审计、客户和任务风险下。
- 现有替代方案要么是内部手工流程，要么是宽而重的 PLM 与质量套件，都不足以为创业公司发射项目快速打包那些临门一脚的任务准备决策。
solution:
- 交付一套发射放行控制塔，从现有系统接入资格证据、供应商记录、不合格项和装配状态，为单个飞行器项目组装出面向具体任务的数字化放行线程。
- 先从基于 CSV、文档库和导出文件的导入能力开始，让客户能贴着现有工具部署；之后再加上偏差影响分析、受控签核工作流，以及供内部和面向客户的准备评审使用的可审计放行包。
whyWeWin:
  - 这个切口卡在工程系统和发射当天执行之间那段最痛的运营空档里：现有厂商证明了追溯需求存在，却没人卖一套真正快的任务放行工作流。
  - 相比替换 MES 或 PLM，轻量叠加式部署的采用摩擦更低，也更贴近早期私营航天团队今天真实的干活方式。
  - 面向发射的专用放行模板、供应商追溯映射，以及哪些因素拖慢或放行任务的结果数据，都会慢慢沉淀成能守住的工作流 IP。
strategicChoices:
  beachhead: 面向印度私营发射服务商、覆盖其从资格飞行迈向首批 3–10 次商业轨道发射的任务放行与偏差控制工作流，尤其适用于新产线或新制造设施正在上线的阶段。
  wedgeRationale: 这个切入口的好处是触发点够急、买方够清楚、反馈回路也够短，因为一个活跃发射项目就能看出产品到底有没有缩短评审时间、有没有抓住构型漂移。反过来，如果一上来就卖宽泛的航空航天数字线程套件，采购会更慢、集成会更重，价值证明还会被稀释。
  sequencingRationale: 先把“导入优先”的放行层跑起来，再去谈深度集成，这样设计伙伴才能尽快在一个任务上上线；在招聘销售前，由创始人直接卖给任务保障和制造负责人；等首个部署证明哪些源系统和证据结构会反复出现后，再把集成与合规伙伴拉进来。
  notYet:
  - 完整替换 PLM、QMS 或 MES。
  - 发射当天的靶场运营或飞行软件工具。
  - 在发射切口还没有跑出一个生产级证明点之前，就横向卖向所有航空航天和国防项目。
  - 用自主 AI 决策取代任务放行中的人工签核。
market:
  tam: 基于约 60 家位于印度、硬件属性较重的私营航天公司，并按年 ACV 约 $120k 自下而上估算，TAM 为 $7.2M。
  sam: 基于约 15 家已接近商业运营的印度发射、推进、航天器或任务服务运营商，并按年 ACV 约 $100k 估算，滩头市场 SAM 为 $1.5M。
  som: 按创始人主导销售、4 个活跃客户项目、单个项目 ACV 约 $100k 估算，第 3 年 SOM 为 $0.4M。
  segments:
  - 正进入商业轨道运营阶段的印度私营发射服务商。
  - 与之相邻、共享类似放行与偏差工作流的印度推进、卫星和关键航天硬件运营商。
  buyingProcess: 业务发起人大概率会是任务保障负责人、发射运营总监或制造副总裁，预算审批则多半在 COO 或制造副总裁手里。最快的成交路径，是把试点收窄到一个任务或一次产能爬坡，因为在产品证明自己确实能加快准备评审、带来更干净的审计记录之前，买方会本能回避那种大拆大建式项目。
product:
  mvp: MVP 应该能从导出文件、文档和测试记录里，为一个活跃发射项目组装出任务就绪放行包，同时具备偏差影响映射、受控签核和不可篡改的审计历史。它不该一上来就宣称要深度替换系统，而应该先证明：借助现有源数据，一支团队确实能更快打出完整的放行/否决材料。
  sixMonth: 启动一个付费试点，交付文档与 CSV 导入适配器、基于角色的签核工作流、偏差到任务影响视图，以及准备包耗时的基线指标。
  twelveMonth: 把首个试点转成生产部署，为设计伙伴最常见的 PLM、QMS 或文档系统补上可复用连接器，并交付供应商追溯模板和面向客户的准备度摘要。
  twentyFourMonth: 把平台标准化成可同时支持发射以及相邻航天器或推进项目的多项目放行平台，然后再增加审计证据和供应商资质模块，在不做成完整 MES 套件的前提下扩大所占工作流份额。
  keyBets:
  - 在深度集成之前，“导入优先”部署就足以证明 ROI。
  - 发射团队看重的，是可审计的放行打包能力和偏差影响分析，而不是泛化的质量看板。
  - 单项目切口可以在不大改产品的情况下扩展到相邻的航天硬件放行工作流。
  - 在首单里，工作流深度和模板能力会在价值兑现速度上胜过内部看板和现有套件。
gtm:
  wedge: 当资格成功、首份商业发射合同或产能扩张把人工准备评审的成本暴露出来后，向印度发射创业公司出售一项付费任务放行试点。
  channels:
  - 由创始人直接面向高度集中的印度私营航天买方群体中的任务保障、制造和发射运营负责人销售。
  - 来自已服务航空航天与国防工作流的 PLM、QMS 及系统集成伙伴的转介绍。
  - 围绕融资轮次、制造扩张和首飞里程碑，面向发射及相邻航天硬件公司开展“事件触发式”外呼。
  funnelTargets: 目标账户→合格发现 30–40%，合格发现→付费试点 15–25%，试点→生产部署 50%+，生产部署→第二个项目或相邻工作流扩张在 12 个月内达到 50%+。
  pricing: 先围绕单个活跃任务做约 $40k-$75k 的付费试点，之后转成每个活跃项目约 $90k-$150k 的年度软件费，另加导入与集成费用。这和研究里看到的高五位数到低六位数付费意愿区间一致，也把定价牢牢锚在放行责任和节奏价值上，而不是席位数。
businessModel:
  revenueStreams:
  - 按每个活跃发射或航天硬件项目计费的年度软件订阅。
  - 用于数据模型搭建、证据映射和连接器配置的导入与集成服务。
  - 首次生产部署后追加的供应商追溯或审计证据模块。
  unitOfValue: 每年处于放行控制之下的活跃客户项目。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一客户内部扩展到第二和第三个活跃项目。
  - 从发射放行扩展到供应商资质与审计证据工作流。
  - 把同样的控制塔模式卖到卫星、推进和国防硬件项目。
  - 基于累计的偏差与放行结果数据，做基准分析和风险评分产品。
strategyMap:
  northStarMetric: 在关键签核零缺失前提下，完成完整数字证据包并成功放行的任务或硬件项目数量。
  inputMetrics:
  - 存在活跃发射或产能爬坡触发点的合格目标账户。
  - 相较客户基线，组装放行包所需时间的中位数。
  - 评估活跃任务偏差影响所需时间。
  - 试点转生产部署的转化率。
  - 每个活跃项目接入的源系统数量。
  moatsToBuild:
  - 把测试、供应商批次、不合格项和飞行器构型连接起来的发射专属放行本体。
  - 面向印度私营航天工作流的可复用集成与证据模板库。
  - 记录哪些偏差和证据缺口会拖延或放行任务的跨项目数据集。
  killCriteria:
  - 前 12 个月里，若与印度发射及航天硬件运营商完成 12 次合格沟通后，仍拿不到 2 个以上付费试点。
  - 前 2 个部署若无法把准备包耗时至少降 30%，或每个仍需要超过 8 周的定制集成。
  - 任一试点在结束后 6 个月内都无法转成至少 $90k 年化的生产定价。
  mermaid: |
    flowchart LR
      Wedge[发射放行试点] --> MVP[导入优先的放行控制塔]
      MVP --> Proof[更快且可审计的放行/否决决策]
      Proof --> Expansion[相邻航天硬件放行工作流]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口和时机都说得通，但因为初始买方群体太小、客户是否愿意为聚焦型叠加层买单也还没跑出来，所以信心上限依然有限。
    whyBelieve: 融资、制造扩张和近期发射里程碑，已经把一个真实存在的运营瓶颈顶到了台前；现有套件和电子表格都没法干净地把它接住。
    whyDoubt: 单看印度优先滩头市场，它自己太小；而现有输入也还不能证明买方会在更大的企业系统项目之前，先给一层独立的放行控制层拨预算。
    nextDiligence: 下一个关键证明点，是拿到 2 个付费设计伙伴试点，再做 1 次准备周期时间研究，证明在正在执行或刚结束的任务里，产品确实带来了显著节时和审计收益。
  firstCustomer:
    title: 一家正进入商业服务阶段的印度私营发射创业公司的任务保障负责人
    profile: 一家获得风投资金支持的发射公司，已有一型轨道运载器接近生产化使用，正在扩充制造能力，同时仍在多个混杂系统之间对齐测试、供应商和装配记录。
    trigger: 一次成功的资格飞行、一份已签商业发射合同，或一次新的设施爬坡，迫使管理层提高发射节奏并把放行责任正式化。
    buyer: COO 或制造副总裁
    initialContract: 围绕单个活跃飞行器项目做 3–4 个月、约 $40k-$75k 的付费试点；一旦这条放行工作流进入生产使用，再转为约 $90k-$150k 的年度软件费，另加导入费用。
  mustBeTrue:
  - 至少有 2 家首批发射或航天硬件运营商，会在承诺更大规模的 PLM 或 MES 改造之前，先为付费试点买单。
  - MVP 能在真实项目里把放行包准备时间至少压缩 30%，同时保持完整的签核与证据追溯。
  - 真正的经济买方能稳定落在 COO、制造副总裁或任务保障负责人，而不是没有预算的创新团队。
  - 生产合同的价格能落在研究所示的约 ~$100k ACV 区间，而不是沦为服务占比过高的定制项目。
  - 至少有 3 个相邻的航天器、推进或国防硬件潜在客户证明，这套工作流在产品改动有限的前提下可以迁移到发射之外。
  diligenceQuestions:
  - 当前一套发射准备包，究竟吃掉了任务保障、制造和质量团队多少人时？
  - 前 5 个目标账户里，究竟哪些源系统主导了这条工作流？它们的导出格式有多标准化？
  - 在更大规模的数字线程项目获得预算前，买方会批准一个付费叠加式试点吗？
  - 为什么 Siemens、PTC、Dassault、Tulip 或内部看板，满足不了首个客户眼前的工作流需求？
  - 未来 24 个月里，印度优先买方群体中到底有多少个近期活跃项目？
  riskHeatmap:
  - risk: 初始客户基数太小
    likelihood: High
    impact: High
    leadingIndicator: 若在前 90 天完成市场梳理后，活跃销售管道里仍然找不到 10 家可信的印度发射或接近商业化的航天硬件潜在客户。
    mitigation: 从第一轮设计伙伴周期开始，就把产品和对外叙事按相邻的航天器、推进和国防硬件放行工作流来设计。
  - risk: 集成与实施拖累
    likelihood: High
    impact: High
    leadingIndicator: 前 2 个试点如果每个都要先做超过 8 周的定制数据工作，才能生成可用的放行包。
    mitigation: 先从导出文件和文档起步，标准化导入模板，并在首批连接器模式出现复用后再招解决方案工程师。
  - risk: 现有套件或内部自建封死切口
    likelihood: Medium
    impact: High
    leadingIndicator: 买方如果一再把这条工作流塞进现有 PLM 或 QMS 项目里，并拒绝为独立试点拨预算。
    mitigation: 要卖的是更快跑出证明、面向任务的打包能力，以及通用套件无法快速交付的后期偏差影响分析。
  - risk: 付费意愿弱于假设
    likelihood: Medium
    impact: High
    leadingIndicator: 如果经济买方只批准低于 $40k 的部门级试点，或要求合同价值大部分落在服务上。
    mitigation: 把定价绑到单个活跃项目上，量化评审时间节省和避免延期的价值，并把 ICP 收窄到那些已经拿到节奏爬坡预算的客户。
  - risk: 合规与证据要求拖慢采用
    likelihood: Medium
    impact: Medium
    leadingIndicator: 如果试点客户要求的证据结构或安全控制，超出了 MVP 不改路线图就能支持的范围。
    mitigation: 尽早在产品模型里映射 IN-SPACe 风格的证据要求，并在正式销售生产版前准备好可进入采购流程的安全与审计包。
operatingAssumptions:
- assumption: 买方会在批准更大规模的 PLM 或 MES 改造之前，先购买一层聚焦的放行控制层。
  basis: research.yaml
  validationTest: 访谈 8–10 位预算负责人，并拿下至少 2 个明确界定为“贴着现有系统部署”的付费试点。
  decisionImpact: 如果这一点不成立，公司就必须重定位为现有系统项目中的服务驱动模块，并筹集更多实施资金。
- assumption: 生产部署可以实现每个项目每年约 $90k-$150k 的定价。
  basis: research.yaml
  validationTest: 在试点谈判中测试定价，并在 12 个月内拿到至少 1 份落在该区间的已签生产版方案或合同。
  decisionImpact: 如果不成立，印度优先切口就会更小，公司只能缩减范围或加快相邻市场扩张。
- assumption: 两到三种连接器与导入模式，就能覆盖大多数早期客户环境。
  basis: 运营判断
  validationTest: 收集前 5 个潜在客户的系统图谱，确认 PLM、QMS、测试和文档源是否能归并为一小组可复用模式。
  decisionImpact: 如果不成立，实施成本会上升，服务负担会变重，可复制的产品毛利也会推迟出现。
- assumption: 发射放行工作流只需适度调整模板，就能迁移到卫星、推进和国防硬件项目。
  basis: idea.yaml
  validationTest: 至少界定 3 个相邻设计伙伴机会，并把所需字段、签核逻辑和证据模型与发射 MVP 做对比。
  decisionImpact: 如果不成立，这门生意就应按一家狭义的发射运营软件公司来融资和估值，而不是更广泛的工业工作流平台。
- assumption: 一轮正在进行或历史上的任务周期，就会暴露出足以支撑软件采购的、可量化的准备评审节时空间。
  basis: 运营判断
  validationTest: 在首个试点里，对部署前后的准备包组装工作做时间基线对比，并验证至少 30% 的改善，以及缺失签核更少。
  decisionImpact: 如果不成立，ROI 叙事就会变弱，GTM 也必须从节奏加速转向合规留痕。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 10 位目标任务保障和制造负责人，梳理当前放行工作流、触发事件和预算归属。
  hypothesis: 发射节奏爬坡和产能扩张，会为聚焦型放行控制试点释放出近期预算。
  successMetric: 10 次访谈里至少有 6 次确认存在活跃触发点，且有 2 家同意在经济买方在场的情况下推进试点界定。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 从 3 个潜在客户处收集样本导出文件、测试记录和准备评审材料，并建立第一版任务放行数据模型。
  hypothesis: 当前证据虽然分散，但结构性已经足够支撑“导入优先”的 MVP，而无需深度替换源系统。
  successMetric: 团队能用不超过 3 个可复用导入模板，从 3 份客户数据样本里生成数字化放行包草稿。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 以影子模式重建 1 份历史或进行中的任务准备包，带上偏差影响映射和签核工作流。
  hypothesis: 产品能比客户现有流程更早暴露缺失签核，并减少证据组装的人力。
  successMetric: 相较基线，放行包准备速度至少提升 30%，且影子包中零关键证据遗漏。
  owner: 创始产品或领域负责人
- horizon: 90–180 天
  experiment: 在一个活跃发射项目上启动 1 个付费试点，并与客户每周复盘准备度指标。
  hypothesis: 如果在不严重扰动 IT 的前提下改善节奏和可审计性，单项目部署就能转成生产版。
  successMetric: 签下 1 个付费试点，任务保障相关方每周持续活跃使用，并形成书面的生产版转化计划。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 把前 2 种连接器模式产品化，并与一家 PLM 或系统集成公司合作完成 1 次部署。
  hypothesis: 在首个试点之后，可复用集成和合作伙伴支持会显著缩短部署时间。
  successMetric: 第二次部署的实施时长中位数降到 6 周以内，且有 1 家合作伙伴参与到真实项目中。
  owner: 解决方案工程师
- horizon: 12–18 个月
  experiment: 与卫星、推进或国防硬件团队开展 3 场相邻客户需求界定会议。
  hypothesis: 同一套放行控制架构在不重写整套产品的情况下，也能在发射之外拿单。
  successMetric: 至少拿到 1 个相邻场景的付费试点，或 1 份基于同一核心产品模型签署的设计伙伴 LOI。
  owner: 创始人/CEO
operations:
- 每周与设计伙伴开展准备度评审，并让任务保障、制造和质量团队共享行动日志。
- 为每个活跃项目维护带版本的证据模式、签核规则和放行模板。
- 在第一次生产部署前，准备好可进入采购流程的安全与审计资料包。
- 连接器开发的优先级要按潜在客户覆盖度和部署速度来排，而不是按单个客户的一次性需求。
- 一旦验证出第一种可重复部署模式，就在现有 PLM 与 QMS 环境里引入集成和实施伙伴。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 在一个小而集中的市场里，这个角色必须负责创始人主导的企业销售、设计伙伴招募和合作伙伴拓展。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责搭建放行数据模型、导入层、审计历史以及首批客户集成。
- role: 创始产品或任务保障负责人
  startTiming: 第 0 个月
  rationale: 把发射准备工作流转成客户愿意信任的模板、签核逻辑和验证指标。
- role: 解决方案工程师
  startTiming: 第 4–6 个月
  rationale: 首个试点之后需要这个角色来降低集成阻力，并把定制导入沉淀成可复用的部署模式。
- role: 客户成功或实施负责人
  startTiming: 第 9–12 个月
  rationale: 负责试点转生产、培训，以及向第二个项目扩张，同时避免创始团队过载。
milestones:
- horizon: 0–12 个月
  items:
  - 在印度私营航天生态里拿下 2 个设计伙伴，并在一个活跃发射项目上签下 1 个付费试点。
  - 交付一版“导入优先”的 MVP，具备偏差影响分析、签核工作流和可审计的放行包生成功能。
  - 在一次影子或真实任务周期里，证明准备包速度至少提升 30%。
  - 把首个试点转成一份年化定价不低于 $90k 的生产合同。
- horizon: 12–24 个月
  items:
  - 在发射或相邻航天硬件工作流中，于 2–3 个客户处跑出 3 个生产项目。
  - 把最常见的连接器和证据模板模式标准化，让部署时长中位数降到 6 周以内。
  - 用同一套核心放行控制产品，拿下第一个相邻的航天器或推进工作流。
  - 建立 1–2 个能加快可信部署的集成或实施合作关系。
- horizon: 24–36 个月
  items:
  - 跑到 4 个活跃生产项目，与研究中的第 3 年 SOM 情景一致。
  - 把产品范围扩展到现有客户的供应商资质或审计证据模块。
  - 验证 1 个盟友市场试点或渠道关系，以降低对仅限印度发射市场的依赖。
risks:
- risk: 初始客户基数太小
  likelihood: High
  impact: High
  mitigation: 把发射只当作验证切口，并在前 12 个月内就开始做相邻客户探索。
- risk: 集成与实施拖累
  likelihood: High
  impact: High
  mitigation: 先从导出文件和文档导入起步，尽快把连接器模式产品化，并避免“大拆大建”的定位。
- risk: 现有套件或内部自建默认胜出
  likelihood: Medium
  impact: High
  mitigation: 不要在宽泛的数字线程完整性上硬拼，而要证明自己部署更快、任务专属的放行逻辑更强。
- risk: 付费意愿低于模型假设
  likelihood: Medium
  impact: High
  mitigation: 把试点绑定到单个活跃项目，尽早与经济买方验证定价，并在生产版 ACV 证实前保持团队精简。
- risk: 合规与安全要求超出 MVP 能力
  likelihood: Medium
  impact: Medium
  mitigation: 尽早把证据和审计需求编码进产品，让人继续留在放行闭环里，并在生产上线前准备好安全审查资料包。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱应支撑 18 个月，覆盖一个 4–5 人的创始团队、2 个付费设计伙伴试点、1 次转生产、可复用的导入和连接器模式，以及一套为相邻扩张准备的可进入采购流程的安全与合规资料包。
