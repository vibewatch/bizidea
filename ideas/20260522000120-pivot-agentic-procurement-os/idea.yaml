problem: >-
  Controllers and procurement leaders at multinational mid-market companies still discover committed spend only after
  invoices hit the ERP, so accruals, cash plans, and board reporting stay wrong until late in the close. Purchasing
  lives across email, spreadsheets, cards, and local workflows, which creates off-contract spend, missing approval
  evidence, and cross-country compliance risk.
targetUser:
  primary: Controller or VP Finance at a 300-3,000 employee multinational software, marketplace, or services company with 8-30 legal entities and decentralized indirect spend
  secondary: VP Procurement or procurement operations leader responsible for policy compliance across entities
  buyer: CFO
startupThesis:
  nonObviousInsight: >-
    The breakout procurement-AI layer is not a chat buyer or sourcing bot; it is the committed-spend system of record
    that unifies requests, approvals, invoices, and payments before the ERP close. Once finance trusts that ledger,
    agents can automate follow-up and policy enforcement without becoming another brittle overlay.
  beachhead: >-
    Month-close committed-spend forecasting for European and U.S. software or marketplace companies with 8-30 entities,
    $50M-$500M of annual indirect spend, and mostly email-and-spreadsheet purchasing outside legacy suites
  wedge: >-
    A closebook-grade committed-spend ledger that captures every request, approval, PO, invoice, and card charge, then
    flags off-contract purchases and accrual gaps before month-end
  whyNowCatalyst: >-
    Pivot's funding, named enterprise scale, and compliance tailwinds show buyers are now ready to replace fragmented
    procurement workflows with system-of-record platforms that can support trustworthy agents and real-time reporting.
  ventureScalePath: >-
    After winning committed-spend visibility, the company can expand into autonomous approvals, vendor onboarding,
    payment orchestration, policy benchmarking, and CFO-grade cash forecasting across the full indirect-spend stack.
solution: >-
  The product starts as an AI-native spend ledger that ingests intake forms, POs, contracts, invoice inboxes, card
  feeds, and ERP or AP data to estimate committed spend by entity and month in real time. It turns messy approval
  trails into auditable accrual suggestions, contract-utilization views, and exception queues for finance and
  procurement. Embedded agents chase missing approvals, classify spend, and draft requester or vendor follow-ups, but
  every action is grounded in the underlying ledger rather than email scraping alone. Over time, the platform becomes
  the operating layer for indirect procurement, with policy controls, vendor memory, and payment readiness on top.
goToMarketSeed:
  firstCustomer: >-
    CFO and controller team at a 700-employee European SaaS company with 12 legal entities, $80M of annual indirect
    spend, and monthly close slippage caused by decentralized software, marketing, and contractor purchasing
  buyingTrigger: >-
    A board mandate to shorten close, an ERP or AP automation rollout, or a recent audit finding around approval
    evidence, accrual accuracy, or ESG and governance reporting
  currentAlternative: >-
    ERP reports plus Excel accrual models, shared inboxes, and fragmented Coupa, Ariba, or card-tool exports stitched
    together manually
  switchingReason: >-
    The wedge gives finance a live committed-spend view before invoices land, while existing tools report only slices
    of the process after the fact.
  pricingHypothesis: >-
    Annual platform fee priced by legal entities and committed-spend volume, starting around close-automation ROI
    rather than seat count
