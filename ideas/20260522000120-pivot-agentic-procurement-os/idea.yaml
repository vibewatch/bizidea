    sourceRefs: [2]
  - point: Finance teams now have a concrete pain point—visibility into committed spend before month-close—not just a vague desire for automation.
    signalRefs: ["Committed-spend urgency"]
    sourceRefs: [3]
  - point: The winning architecture has shifted from surface automation to full-context ledgers, enabling reliable agentic workflows instead of brittle bots.
    signalRefs: ["System-of-record advantage"]
    sourceRefs: [1]
differentiator: >-
  Most procurement software either starts with intake and approvals or with AP after invoices arrive; this company
  starts with the committed-spend ledger that finance actually trusts at close. That creates a deeper moat than a
  generic copilot because every automation is tied to ground-truth approval, PO, invoice, payment, and entity context.
  Legacy suites can add AI features, but they are still fighting fragmented data models and slow implementations.
