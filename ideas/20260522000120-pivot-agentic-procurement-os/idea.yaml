jobsToBeDone:
  - job: >-
      When indirect purchasing is spread across entities and channels, help controllers produce a reliable
      committed-spend forecast before close, so they can accrue accurately and explain variance to the board.
    currentAlternative: Excel accrual workbooks plus ERP or AP exports and inbox chasing
    successMetric: Days to close, accrual variance versus actuals, and share of spend with documented approval
  - job: >-
      When procurement teams are asked to enforce policy without slowing the business, help them surface off-contract
      purchases and missing approvals early, so they can stop leakage before payment.
    currentAlternative: Manual PO checks, email approvals, and after-the-fact spend reports
    successMetric: Off-contract spend rate, approval SLA, and exception resolution time
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Named customers, a large funding round, and cross-source agreement create a very strong demand signal.
  painIntensity:
    score: 4
    rationale: Committed-spend blind spots directly affect close accuracy, cash planning, and compliance, though urgency is strongest in distributed enterprises.
  wedgeClarity:
    score: 5
    rationale: "The first product is narrow and concrete: a committed-spend ledger and exception workflow for month-close."
  defensibility:
    score: 4
    rationale: A trusted cross-workflow ledger and embedded approvals data can compound into a durable system-of-record moat, though incumbents will respond.
  ventureScale:
    score: 5
