topRisks:
  - name: Trust gap in forecasts
    description: Finance teams will not switch if committed-spend predictions are noisy or cannot be reconciled back to approvals and invoices.
    mitigation: Start with narrow entity cohorts, expose every forecast's evidence trail, and benchmark variance against actuals before expanding automation.
  - name: Incumbent suite bundling
    description: Coupa, SAP Ariba, or ERP vendors may copy reporting features or bundle adjacent modules during renewals.
    mitigation: Win on faster deployment, cross-system visibility, and close-specific workflows that incumbents do not solve well across fragmented stacks.
  - name: Integration drag
    description: Multi-entity customers often have messy ERP, AP, card, and inbox setups that can slow time to value.
    mitigation: Land first with lightweight inbox, card, and PO ingestion, then add deeper ERP connectors only after the customer sees close-cycle ROI.
