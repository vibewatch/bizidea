  adoptionFrictionMatrix:
  - friction: ERP and AP integration mapping
    severity: high
    affectedBuyer: Controller
    mitigation: Land with inbox, approval, card, and PO evidence first, then deepen ERP sync once forecast value is proven.
    sourceRefs:
    - 1
    - 5
    - 11
  - friction: Trust in forecast and accrual recommendations
    severity: high
    affectedBuyer: CFO
    mitigation: Expose every prediction with source evidence, approval trail, and reconciliation back to actual invoice outcomes.
