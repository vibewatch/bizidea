openQuestions:
- What forecast-accuracy threshold will make controllers trust committed-spend accrual suggestions enough to change process before close?
- How often can the product displace an existing stack versus layering on top of Coupa, SAP, Ramp, or Tipalti in the first sale?
- 'Which integrations are truly mandatory for day-30 value in multi-entity accounts: ERP, AP inbox, cards, contracts, or HRIS?'
- Can the company win a finance budget without also offering payments, cards, or broader sourcing workflows?
