  validationPlan:
  - priority: high
    question: What forecast accuracy and evidence trail does a controller require before trusting committed-spend accrual suggestions?
    evidenceToGather: Pilot data comparing predicted commitments with actual invoice arrival and month-end accrual outcomes.
  - priority: high
    question: Which minimum integration bundle creates first value inside 30 days?
    evidenceToGather: Discovery interviews and implementation retros with controllers using ERP, AP inbox, card, and contract tools.
  - priority: medium
    question: Can finance sponsor the initial purchase without also owning payments or cards?
    evidenceToGather: Budget-authority mapping across controller, CFO, procurement-ops, and AP leaders in 10 target accounts.
