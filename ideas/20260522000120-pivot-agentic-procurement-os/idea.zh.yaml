jobsToBeDone:
- job: 当间接采购分散在多个实体和渠道里时，帮 controller 在月结前做出一份可信的 committed-spend 预测，这样他们才能把应计做准，也能向董事会讲清楚差异从哪来。
  currentAlternative: Excel 应计工作簿，加上 ERP 或 AP 导出和邮箱催办。
  successMetric: 月结天数、应计与实际的偏差，以及有审批证据支撑的支出占比。
- job: 当采购团队既要守政策、又不能把业务节奏拖慢时，帮他们更早揪出合同外采购和缺审批的单子，在付款前把漏损拦下来。
  currentAlternative: 手工查 PO、邮件审批，以及事后支出报表。
  successMetric: 合同外支出率、审批 SLA，以及异常处理时长。
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 点名客户、大额融资和多来源一致性，把需求信号拉得很强。
  painIntensity:
    score: 4
    rationale: committed-spend 盲区会直接打到账务结算、现金计划和合规，只是这类痛点在分布式企业里最尖锐。
  wedgeClarity:
    score: 5
    rationale: 第一款产品足够窄、也足够具体：就是月结前的 committed-spend 总账和异常工作流。
  defensibility:
    score: 4
    rationale: 只要跨工作流账本和审批数据先被财务信任，就有机会滚出一条耐打的 system-of-record 护城河；当然，现有厂商不会坐视不管。
  ventureScale:
    score: 5
    rationale: 只要先拿下 closebook 这一层，就能继续往更广的采购、支付和财务运营栈扩。
topRisks:
- name: 预测结果不被信任
  description: 只要 committed-spend 预测噪音太大，或者没法回溯到审批和发票，财务团队就不会切换。
  mitigation: 先从少量实体和品类起步，把每一次预测的证据链摊开给客户看，再拿实际结果对偏差做 benchmark，确认跑稳了再扩。
- name: 老牌套件打包反击
  description: Coupa、SAP Ariba 或 ERP 厂商，可能会在续约时补上相邻报表能力，或者直接把模块打包卖。
  mitigation: 靠更快部署、跨系统可见性和更贴月结场景的工作流赢，而不是去比套件广度。
- name: 集成拖慢起量
  description: 多实体客户的 ERP、AP、公司卡和邮箱配置通常很乱，价值交付时间很容易被拖长。
  mitigation: 先用轻量的邮箱、卡和 PO 接入落地，等客户先看到月结 ROI，再补更深的 ERP 连接器。
