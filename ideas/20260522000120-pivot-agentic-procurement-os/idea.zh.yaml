problem: 跨国中型公司的 controller 和采购负责人，往往要等发票打进 ERP，才第一次看清 committed spend。结果就是：应计、现金计划和董事会报表，总要拖到月结后段才被反复修正。采购又散在邮件、表格、公司卡和各地本地流程里，合同外支出、审批证据缺失、跨国合规风险就一起冒出来。
targetUser:
  primary: 300-3,000 人规模、拥有 8-30 个法人实体、间接支出分散的跨国软件、平台或服务公司里的 controller 或财务副总裁
  secondary: 负责跨实体政策合规的采购副总裁或采购运营负责人
  buyer: CFO
startupThesis:
  nonObviousInsight: 最有机会跑出来的 procurement AI，不是聊天式采购助手，也不是比价机器人；而是一套月结前的 committed-spend system of record，把申请、审批、发票和付款先在 ERP 结账前串起来。只要财务先信这本账，后面的催办、政策执行和流程自动化，才不会沦为又一层脆弱 overlay。
  beachhead: 先打 European 和 U.S. 的软件或平台公司：8-30 个实体、每年 $50M-$500M 间接支出，而且大量采购还在老套件之外靠邮件和表格跑。切口就是月结前的 committed-spend 预测。
  wedge: 一套能拿去月结的 committed-spend 总账：把每一笔申请、审批、PO、发票和卡支出都抓进来，再在月末前把合同外采购和应计缺口揪出来。
  whyNowCatalyst: Pivot 的融资、点名企业客户和合规顺风都在说明：买方现在已经准备好，把割裂的采购流程换成一套 system-of-record 平台，好承接可信的智能体和实时报表。
  ventureScalePath: 先拿下 committed-spend 可见性，后面就能往自动审批、供应商 onboarding、付款编排、政策 benchmark，以及面向 CFO 的现金预测一路扩。
solution: 产品先是一套 AI-native 的支出总账：吃进 intake form、PO、合同、发票邮箱、公司卡流水，以及 ERP 或 AP 数据，按实体和月份实时估算 committed spend。它把乱成一团的审批痕迹，收束成经得起审计的应计建议、合同使用视图，以及给财务和采购处理的异常队列。内嵌智能体会去追缺失审批、做支出分类、起草给申请人或供应商的跟进内容，但每一步都落在底层总账之上，而不是只靠爬邮件。时间一长，这个平台会长成间接采购的操作层，上面再叠政策控制、供应商记忆和付款 readiness。
goToMarketSeed:
  firstCustomer: 一家 700 人规模的欧洲 SaaS 公司：12 个法人实体，每年约 $80M 间接支出，因为软件、营销和外包采购分散，月结经常往后滑。
  buyingTrigger: 董事会要求缩短月结，ERP 或 AP 自动化项目正在上线，或者最近一次审计点出了审批证据、应计准确度、ESG 或治理报表的问题。
  currentAlternative: ERP 报表加 Excel 应计模型，再拼上共享邮箱，以及从 Coupa、Ariba 或卡工具里手工导出的碎片数据。
  switchingReason: 这个切口能让财务在发票落地前就看到一份活的 committed-spend 视图；现有工具大多只能在事后各报各的一小段。
  pricingHypothesis: 按法人实体数和 committed-spend 规模收年度平台费，定价锚点放在缩短月结带来的 ROI，而不是席位数。
whyNow:
- point: 头部企业已经把 AI-native 采购系统跑在数十亿美元级发票规模上，说明买方愿意接受一套新的 system of record。
  signalRefs:
  - 头部企业背书
  sourceRefs:
  - 1
- point: AI 治理和 ESG 披露带来的合规压力，让缺文档、缺流程的邮件表格式采购越来越站不住。
  signalRefs:
  - 合规顺风
  sourceRefs:
  - 2
- point: 财务团队终于有了一个具体到可以掏预算的痛点——月结前看清 committed spend——而不只是抽象地想做自动化。
  signalRefs:
  - committed-spend 痛点很急
  sourceRefs:
  - 3
- point: 赢家的架构已经从表层自动化转向全上下文账本，这让智能体流程更可靠，不会停留在脆弱 bot。
  signalRefs:
  - system-of-record 优势
  sourceRefs:
  - 1
differentiator: 大多数采购软件，要么从申请和审批切入，要么从发票落地后的 AP 切入；这家公司则先做财务在月结时真正会信的 committed-spend 总账。这比一个泛化 copilot 更有防守力，因为每一步自动化都绑在真实的审批、PO、发票、付款和实体上下文上。老牌套件当然也能加 AI 功能，但它们先要跟割裂的数据模型和慢部署硬碰。
