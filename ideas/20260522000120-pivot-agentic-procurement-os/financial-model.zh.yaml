scenarios:
  downside:
    description: 实施迟迟摆脱不了服务化，销售周期被拉长，公司到 Y3 末的 logo 增长更慢，ACV 也更低。
    y3RevenueK: 2250.0
    y3EbitdaK: -430.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
    - ACV 从 $120K 掉到 $100K。
    - 毛利率从 70% 掉到 64%。
    - 销售周期从 6 个月拉长到 9 个月。
    - Q4Y3 客户数从 52 个降到 24 个。
  base:
    description: 第 1 年的 3 个付费账户，逐步长成一套由伙伴协助的 land-and-expand 动作，到 Q4Y2 做到 10 个正式客户，Q4Y3 做到 52 个。
    y3RevenueK: 3350.0
    y3EbitdaK: 223.75
    cashLowPointK: 892.08
    keyAssumptionChanges:
    - ACV 稳在每个客户每年 $120K。
    - 毛利率守住 BP 里 70% 的目标。
    - 在 Y2H2 有伙伴帮助的前提下，销售周期大体维持在 6 个月。
    - Q4Y3 客户数做到 52 个，但仍低于 BP 里那个理想化的 100 客户 SOM。
  upside:
    description: controller 接受度更高，伙伴带来的 pipeline 更早起量，扩张模块也把 ACV 和第 3 年客户数一起抬上去。
    y3RevenueK: 4875.0
    y3EbitdaK: 1085.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - ACV 从 $120K 提升到 $135K。
    - 毛利率从 70% 提升到 73%。
    - 销售周期从 6 个月压缩到 4.5 个月。
    - Q4Y3 客户数从 52 个提升到 70 个。
