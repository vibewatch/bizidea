slug: committed-spend-closebook
date: '2026-05-22'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: 模型从 2026-05-22 这版 business-plan 之后的第一个完整月份开始。
- id: A2
  name: 正式客户 ACV
  value: 每个客户每年 $120.0K ARR
  unit: usdK_per_year
  source: '[BP gtm.funnelTargets; research.market.som] BP 首单区间是 $90K-$150K，research 把 SOM 锚在约 $120K ACV，所以模型就拿这个数做基准。'
- id: A3
  name: 付费试点收入处理
  value: 连续 3 个月、每月 $10.0K
  unit: usdK_per_customer_month
  source: '[BP investorMemo.firstCustomer.initialContract; BP gtm.pricing] BP 里写的是一轮约 10-14 周、总价 $30K-$50K 的付费试点；模型按每月 $10K 去算，更保守，也让收入直接跟客户月数挂钩。'
- id: A4
  name: 客户爬坡
  value: M12 做到 3 个付费账户，Q4Y2 做到 10 个，Q4Y3 做到 52 个
  unit: customers
  source: '[BP milestones] 基准情景先对齐 BP 的第 1 年和第 2 年里程碑；第 3 年只做到目标 SOM 里约一半的 52 个客户，因为 research 明确提醒：集成和信任摩擦不会消失。'
- id: A5
  name: 稳态毛利率
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] business plan 把目标毛利定在 70%。'
- id: A6
  name: 基准销售周期
  value: 6 months
  unit: months
  source: '[BP market.buyingProcess; research.reportMemo.validationPlan] controller 主导的企业采购，要过试点、集成评审和价值证明，所以基准情景按 6 个月销售周期建模。'
- id: A7
  name: 综合 CAC
  value: 每个正式客户 $85.0K
  unit: usdK_per_customer
  source: '[BP gtm.funnelTargets] 这是按 20-30% 线索→合格试点、50%+ 合格试点→付费试点、60% 付费试点→正式客户，再叠上重销售和重实施打法推出来的。'
- id: A8
  name: 全成本薪酬带
  value: Founder/CEO $150K；工程 $145K；产品与实施 $130K；销售 $150K；客户成功/合作伙伴 $120K；G&A $100K
  unit: usdK_per_fte_year
  source: 这是面向欧洲优先的企业软件团队的一套创业财务启发式，锚在 BP 的团队计划和偏实施型 GTM 上。
- id: A9
  name: 人员爬坡快照
  value: Founder 1/1/1/1/1/1；工程 1/2/2/2/4/5；产品与实施 1/1/1/1/2/2；销售 0/0/1/1/2/3；客户成功与合作伙伴 0/0/0/0/1/2；G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] 计划先把集成和实施配齐，再去放大销售；等部署开始可复制后，才补伙伴和客户覆盖。'
- id: A10
  name: seed 后起始现金
  value: $3.0M
  unit: usdM
  source: '[BP fundingAsk] 模型按种子轮目标区间 $3M-$5M 的低端来算。'
- id: A11
  name: 非人力运营支出
  value: Y1 每月非人力 opex 为 $22K-$32K；Y2 每季度 $120K-$165K；Y3 每季度 $95K-$125K
  unit: usdK
  source: 这是围绕这类工作流产品，对云资源、差旅、安全/合规、法务、软件工具和伙伴赋能成本的创业财务估算。
- id: A12
  name: 月流失率
  value: 1.0%
  unit: percent
  source: 创业财务启发式：这类企业工作流软件黏性会比较强，但在还没有多年续约数据前，先按偏保守的早期水平处理。
- id: A13
  name: 季度薪酬平滑
  value: Y2 和 Y3 的薪酬费用，不是只在 Q4 一次性跳变，而是沿着 Q4Y1 到后续年末快照平滑爬坡
  unit: method
  source: '[financial-modeler instructions] 季度薪酬线按年末 headcount 快照做平滑处理。'
- id: A14
  name: 扩张阶段的伙伴杠杆
  value: 到 Y2H2，约 25% 的合格 pipeline 来自伙伴
  unit: percent_of_pipeline
  source: '[BP experimentRoadmap; BP milestones] BP 明确写了要拿下 2 家实施伙伴，并让至少 25% 的合格 pipeline 来自伙伴，这也是 Y3 客户爬坡更陡的支撑。'
- id: A15
  name: 下行情景调整
  value: $100K ACV、64% 毛利率、9 个月销售周期，以及 Q4Y3 只做到 24 个客户
  unit: scenario_inputs
  source: 下行情景对应 BP 里最核心的两类风险：集成越滚越大、买方信任建立太慢，正式转化因此被拖延。
- id: A16
  name: 上行情景调整
  value: $135K ACV、73% 毛利率、4.5 个月销售周期，以及 Q4Y3 做到 70 个客户
  unit: scenario_inputs
  source: 上行情景假设 controller 切口起得比预期更快，实施伙伴也更早带动多实体账户里的扩张。
