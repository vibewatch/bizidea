  cashImpactK: -260.0
modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      Leads[Controller 主导 outbound 与伙伴] --> PaidPilots[付费试点]
      PaidPilots --> ProductionCustomers[正式客户]
      ProductionCustomers --> Revenue[年度合同收入]
      Revenue --> GrossProfit[70% 毛利下的毛利润]
      GrossProfit --> Cash[扣完 opex 后的期末现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，收入来自客户数从 Y1 的 3 个付费账户一路爬到 Q4Y3 的 52 个，同时每个客户 ACV 稳在 $120K，伙伴则帮忙把第 3 年的爬坡托起来。
- checkName: 必须跑通的前提
  finding: 实施必须尽量贴住 BP 里“30 天以内”的目标，不然伙伴带来的项目很容易被服务化交付卡住。
- checkName: 模型失效条件
  finding: 模型最容易失效的地方，是销售周期往 9 个月靠、毛利又掉到 60% 中段；一旦两者一起发生，现金会迅速往下行情景的低点滑。
- checkName: 下一轮证明点
  finding: 只要公司在 Y2 结束前做到 10 个正式客户、2 家活跃实施伙伴，并能证明试点确实改善了应计准确率和月结速度，下一轮融资就有比较扎实的依据。
sanityChecks:
  ruleOf40: Y3 增长率 358.9% + EBITDA 利润率 6.7% = 365.6%。
  burnMultiple: Y1 的 burn multiple 约 2.1x，对应退出 ARR 约 $0.36M；Y2 改善到约 1.3x，对应净新增 ARR 约 $0.84M，随后在 Y3 转正。
  revenuePerFte: 按全年收入和 14 名年末 FTE 算，Y3 的 revenue per FTE 约 $239K（SaaS benchmark 常见区间是 $200–400K）。
  flags:
  - 基准情景下，Y3 期末只有 52 个客户，明显低于 BP 里理想化的 100 客户 SOM；这意味着要追更完整的市场上限，大概率还得再融一轮。
  - 模型默认连接器 playbook 能把大多数部署压在 BP 里的 30 天以内；只要集成差异开始失控，毛利率和销售周期都会迅速恶化。
  - Y3 的 EBITDA 只是小幅转正，所以如果在伙伴带来的合格需求起量前就超前招人，很可能逼出更大或更早的一轮融资。
