  adoptionFrictionMatrix:
  - friction: ERP 和 AP 集成映射
    severity: high
    affectedBuyer: Controller
    mitigation: 先用邮箱、审批、公司卡和 PO 证据把价值跑出来，等预测被验证后，再把 ERP 同步做深。
    sourceRefs:
    - 1
    - 5
    - 11
  - friction: 没人敢完全信预测和应计建议
    severity: high
    affectedBuyer: CFO
    mitigation: 把每次预测的源证据、审批链和最终发票对账结果全部摊开。
    sourceRefs:
    - 1
    - 15
    - 33
  - friction: 采购和财务分属两条线
    severity: medium
    affectedBuyer: 采购负责人
    mitigation: 先拿财务主导的月结痛点切进去，再往采购节流和政策执行场景扩。
    sourceRefs:
    - 8
    - 17
    - 18
  - friction: 申请人得改行为
    severity: medium
    affectedBuyer: 业务申请人
    mitigation: 用引导式 intake、移动审批和优先供应商路由，把合规路径做得比发邮件更快。
    sourceRefs:
    - 4
    - 7
    - 11
  - friction: AI 治理和数据处理审查
    severity: medium
    affectedBuyer: IT 和安全团队
    mitigation: 支持 opt-in AI、可追踪日志、清晰的人在环机制，以及受限的数据暴露范围。
    sourceRefs:
    - 9
    - 25
    - 26
