modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Controller-led outbound and partners] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionCustomers[Production customers]
      ProductionCustomers --> Revenue[Annual contract revenue]
      Revenue --> GrossProfit[Gross profit at 70%]
      GrossProfit --> Cash[Ending cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from 3 paying accounts in Y1 to 52 by Q4Y3 at a $120K ACV, with partners helping the year-3 ramp.
- checkName: Must go right
  finding: Implementation has to stay close to the BP’s sub-30-day target so partner-sourced deals do not become services-heavy bottlenecks.
- checkName: Model breaks if
  finding: The model breaks fastest if sales cycle stretches toward 9 months while margin slips into the mid-60s, because cash then trends toward the downside low point.
- checkName: Next-round proof
  finding: The next financing is justified if the company exits Y2 with 10 production customers, 2 active implementation partners, and evidence that pilots improve accrual accuracy and close speed.
sanityChecks:
  ruleOf40: Y3 growth 358.9% + EBITDA margin 6.7% = 365.6%.
  burnMultiple: Y1 burn multiple is about 2.1x on $0.36M exit ARR; Y2 improves to about 1.3x on roughly $0.84M of net new ARR before turning positive in Y3.
  revenuePerFte: $239K Y3 using annual revenue and 14 year-end FTE (benchmark $200–400K SaaS).
  flags:
  - Base-case Y3 ends at 52 customers, which is materially below the BP’s aspirational 100-customer SOM and implies another financing step is likely needed to chase full-market upside.
  - The model assumes connector playbooks keep most deployments near the BP’s under-30-day target; if integration variance rises, both gross margin and sales cycle deteriorate quickly.
  - Y3 EBITDA is only modestly positive, so hiring ahead of partner-qualified demand would likely force a larger or earlier round.
