slug: committed-spend-closebook
date: '2026-05-22'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: Starts the first full month after the 2026-05-22 business-plan date.
- id: A2
  name: Production ACV
  value: $120.0K ARR per customer
  unit: usdK_per_year
  source: '[BP gtm.funnelTargets; research.market.som] BP land range is $90K-$150K and research sizes SOM at roughly $120K ACV, so the model uses that anchor.'
- id: A3
  name: Paid pilot revenue treatment
  value: $10.0K per month for 3 months
  unit: usdK_per_customer_month
  source: '[BP investorMemo.firstCustomer.initialContract; BP gtm.pricing] The BP describes a $30K-$50K paid pilot over about 10-14 weeks; modeling pilots at $10K/month is conservative and keeps revenue tied to customer-months.'
- id: A4
  name: Customer ramp
  value: 3 paying accounts by M12, 10 by Q4Y2, and 52 by Q4Y3
  unit: customers
  source: '[BP milestones] Base case hits the BP year-1 and year-2 milestones and reaches roughly half of the aspirational 100-customer SOM by year 3 because research highlights integration and trust friction.'
- id: A5
  name: Steady-state gross margin
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] The business plan targets 70% gross margin.'
- id: A6
  name: Base sales cycle
  value: 6 months
  unit: months
  source: '[BP market.buyingProcess; research.reportMemo.validationPlan] Controller-led enterprise purchases require pilot, integration review, and proof before production, so the base case uses a 6-month cycle.'
- id: A7
  name: Fully loaded CAC
  value: $85.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.funnelTargets] Derived from a 20-30% lead-to-qualified-pilot rate, 50%+ qualified-to-paid-pilot conversion, 60% paid-pilot-to-production conversion, and a sales-plus-implementation-heavy motion.'
- id: A8
  name: Loaded salary bands
  value: Founder/CEO $150K; engineering $145K; product and implementation $130K; sales $150K; customer success/partnerships $120K; G&A $100K
  unit: usdK_per_fte_year
  source: Startup-finance heuristic for Europe-first enterprise software hiring, anchored to the BP team plan and implementation-heavy go-to-market.
- id: A9
  name: Headcount ramp snapshots
  value: Founder 1/1/1/1/1/1; engineering 1/2/2/2/4/5; product and implementation 1/1/1/1/2/2; sales 0/0/1/1/2/3; customer success and partnerships 0/0/0/0/1/2; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] The plan staffs integrations and implementation before scaling sales, then adds partner/customer coverage once deployments repeat.'
- id: A10
  name: Starting cash after seed close
  value: $3.0M
  unit: usdM
  source: '[BP fundingAsk] Modeled at the low end of the stated $3M-$5M seed target.'
- id: A11
  name: Non-payroll operating spend
  value: Y1 monthly non-payroll opex of $22K-$32K; Y2 quarterly $120K-$165K; Y3 quarterly $95K-$125K
  unit: usdK
  source: Startup-finance heuristic for cloud hosting, travel, security/compliance, legal, software tools, and partner-enablement costs around this workflow product.
- id: A12
  name: Monthly churn
  value: 1.0%
  unit: percent
  source: Startup-finance heuristic for sticky but still early enterprise workflow software before multi-year renewal data exists.
- id: A13
  name: Quarterly payroll smoothing
  value: Y2 and Y3 salary expense ramps from the Q4Y1 snapshot to later year-end snapshots instead of stepping only at Q4
  unit: method
  source: '[financial-modeler instructions] Quarterly salary lines use a smooth ramp consistent with the year-end headcount snapshots.'
- id: A14
  name: Partner leverage in scale phase
  value: ~25% of qualified pipeline is partner-sourced by Y2H2
  unit: percent_of_pipeline
  source: '[BP experimentRoadmap; BP milestones] The BP explicitly targets 2 implementation partners and at least 25% partner-sourced qualified pipeline, which supports the sharper Y3 customer ramp.'
- id: A15
  name: Downside scenario deltas
  value: $100K ACV, 64% gross margin, 9-month sales cycle, and 24 customers by Q4Y3
  unit: scenario_inputs
  source: Downside case reflects the BP risks that integration sprawl and buyer trust delay production conversion.
- id: A16
  name: Upside scenario deltas
  value: $135K ACV, 73% gross margin, 4.5-month sales cycle, and 70 customers by Q4Y3
  unit: scenario_inputs
  source: Upside case assumes the controller wedge works quickly and implementation partners accelerate expansions inside multi-entity accounts.
