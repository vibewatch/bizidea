scenarios:
  downside:
    description: Implementation stays services-heavy, sales cycles stretch, and the company exits Y3 with slower logo growth and lower ACV.
    y3RevenueK: 2250.0
    y3EbitdaK: -430.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
    - ACV falls from $120K to $100K.
    - Gross margin falls from 70% to 64%.
    - Sales cycle stretches from 6 months to 9 months.
    - Q4Y3 customer count falls from 52 to 24.
  base:
    description: Three paid accounts in Y1 convert into a partner-assisted land-and-expand motion that reaches 10 production customers by Q4Y2 and 52 by Q4Y3.
    y3RevenueK: 3350.0
    y3EbitdaK: 223.75
    cashLowPointK: 892.08
    keyAssumptionChanges:
    - ACV stays at $120K per customer per year.
    - Gross margin stays at the 70% BP target.
    - Sales cycle holds near 6 months with partner help in Y2H2.
    - Q4Y3 customer count reaches 52, still below the BP’s aspirational 100-customer SOM.
  upside:
    description: Controllers adopt faster, partner-sourced pipeline scales earlier, and expansion modules lift both ACV and year-3 customer count.
    y3RevenueK: 4875.0
    y3EbitdaK: 1085.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - ACV rises from $120K to $135K.
    - Gross margin improves from 70% to 73%.
    - Sales cycle compresses from 6 months to 4.5 months.
    - Q4Y3 customer count rises from 52 to 70.
