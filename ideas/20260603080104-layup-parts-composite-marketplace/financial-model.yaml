assumptions:
  - id: A1
    name: Starting cash at model start
    value: "2700"
    unit: usdK
    source: "[BP fundingAsk] Pre-seed target range is $2–4M with 18 months runway; model uses a $2.7M close at M1."
  - id: A2
    name: Starting customers (M1)
    value: "0"
    unit: count
    source: "[BP executiveSummary] Product starts pre-revenue and must first sign paid pilots."
  - id: A3
    name: Steady-state ACV per active account
    value: "120"
    unit: usdK_per_year
    source: "[BP market.som; research.market.bottomUpSizingDrivers] $12.0M SOM = 100 accounts x roughly $120K ACV."
  - id: A4
    name: Monthly revenue per active account
    value: "10"
    unit: usdK_per_month
    source: "[A3] Revenue is recognized as ACV / 12; model excludes implementation-fee upside for conservatism despite BP businessModel listing it."
  - id: A5
    name: Gross margin
    value: "70"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct] Target gross margin is 70%."
  - id: A6
    name: Y1 pilot timing
    value: "M5, M8, M11"
    unit: month
    source: "[BP milestones 0–12 months] Model reaches 3 paid pilots inside Year 1."
  - id: A7
    name: Y2 quarter-end customers
    value: "4, 6, 9, 14"
    unit: count
    source: "[BP milestones 12–24 months] Assumes 2 pilot conversions plus measured new-logo growth from founder-led sales and one AE."
  - id: A8
    name: Y3 quarter-end customers
    value: "20, 30, 44, 62"
    unit: count
    source: "[BP milestones 24–36 months; research market.som] Conservative versus the 100-account SOM case; assumes repeatable but not full-SOM penetration by Year 3."
  - id: A9
    name: Average sales cycle
    value: "6"
    unit: months
    source: "[BP gtm.wedge; research buyingTriggers] Aerospace/defense workflow sale is modeled as a multi-stakeholder six-month cycle."
  - id: A10
    name: Fully loaded CAC
    value: "55"
    unit: usdK_per_customer
    source: "[Startup-finance heuristic: early enterprise founder-led SaaS] Blends founder/AE time, travel, demos, and pilot closing cost for a narrow industrial workflow."
  - id: A11
    name: Monthly churn
    value: "1.5"
    unit: pct
    source: "[BP mustBeTrue; startup-finance heuristic] Workflow should be sticky once embedded, but early-stage industrial SaaS still carries measurable churn risk."
  - id: A12
    name: Engineering loaded salary
    value: "190"
    unit: usdK_per_fte_year
    source: "[Startup-finance heuristic: U.S. aerospace software hiring] Used for product and integration engineers including payroll tax/benefit load."
  - id: A13
    name: Workflow implementation loaded salary
    value: "150"
    unit: usdK_per_fte_year
    source: "[BP team] Composite workflow/implementation role is modeled below engineering cash comp but above generic CS."
  - id: A14
    name: Quality/compliance loaded salary
    value: "160"
    unit: usdK_per_fte_year
    source: "[BP team] Supplier quality and compliance lead reflects aerospace-domain premium hiring."
  - id: A15
    name: Sales loaded salary
    value: "170"
    unit: usdK_per_fte_year
    source: "[BP team] Founder/AE compensation modeled for technical enterprise sales in aerospace and defense."
  - id: A16
    name: G&A loaded salary
    value: "120"
    unit: usdK_per_fte_year
    source: "[Startup-finance heuristic] Lean ops/finance support added only after initial pilots."
  - id: A17
    name: Hiring snapshots
    value: "3, 4, 5, 7, 11, 14"
    unit: fte
    source: "[BP team; BP strategicChoices.sequencingRationale] Hiring follows packet-authoring first, then compliance, GTM, integrations, and lean ops."
  - id: A18
    name: Non-payroll operating spend ramp
    value: "Y1 opex ramps from 75K/month to 130K/month; Y2 quarters 360K/390K/420K/450K; Y3 quarters 540K/600K/660K/720K"
    unit: usdK
    source: "[BP operations; BP risks; startup-finance heuristic] Includes cloud, travel, compliance/legal, software tools, and customer onboarding support while keeping the team lean."
  - id: A19
    name: Cash bridge treatment
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] Model assumes negligible capex, debt service, and taxes before scale so ending cash rolls from starting cash plus EBITDA."
  - id: A20
    name: Opex bucket mapping
    value: "Engineering to R&D; sales to S&M; implementation, quality, and ops mostly to G&A"
    unit: policy
    source: "[BP team; BP operations] Keeps payroll roll-up consistent with the P&L bucket structure while reflecting implementation-heavy early operations."
