scenarios:
  downside:
    description: >-
      Sales cycles stretch, supplier onboarding stays more manual, and the
      company exits Year 3 below repeatable PMF with materially fewer active
      accounts.
    y3RevenueK: 2560.0
    y3EbitdaK: -420.0
    cashLowPointK: -310.0
    keyAssumptionChanges:
      - Sales cycle extends to 9 months.
      - Monthly churn rises to 2.5%.
      - Year 3 exits at 38 active accounts instead of 62.
  base:
    description: >-
      Lean hiring plus founder-led industrial sales convert pilots into a
      repeatable but still niche account-acquisition motion.
    y3RevenueK: 4160.0
    y3EbitdaK: 392.0
    cashLowPointK: 371.0
    keyAssumptionChanges:
      - ACV holds at $120K with 70% gross margin.
      - Year 2 exits at 14 accounts and Year 3 exits at 62.
      - Hiring stays at 14 FTE by Q4Y3.
  upside:
    description: >-
      Customers expand faster across part families, references shorten the sales
      cycle, and the company approaches the researched SOM path.
    y3RevenueK: 5840.0
    y3EbitdaK: 1370.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - Sales cycle improves to 4.5 months.
      - Blended ACV rises to $140K through module and part-family expansion.
      - Year 3 exits at 80 active accounts.
