modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified leads] --> Pilots[Paid pilots]
      Pilots --> Accounts[Active accounts]
      Accounts --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Opex[Operating expense]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven almost entirely by growing active accounts from 3 at Y1 exit to 62 at Y3 exit on a flat $120K ACV.
  - checkName: Must go right
    finding: The company must convert founder-led pilots into a repeatable 6-month sales motion by early Y2 or the Q2Y3 cash trough becomes too thin.
  - checkName: Model breaks if
    finding: A 9-month sales cycle plus higher churn pushes the downside case below zero cash, implying a bridge round before breakeven.
  - checkName: Next-round proof
    finding: The next financing is justified if the pre-seed gets the company to 3 paid pilots, 2 production conversions, and one repeatable export integration with measured ROI.
sanityChecks:
  ruleOf40: "Y3 growth 389% + EBITDA margin 9% = 398%."
  burnMultiple: "Y2 burn multiple is about 0.8x using $1.0M EBITDA burn over $1.32M net new ARR from 3 to 14 active accounts at $120K ACV."
  revenuePerFte: "$297K Y3 ($4.16M revenue / 14 Q4 FTE; benchmark $200–400K SaaS)."
  flags:
    - Base case still requires a steep jump from 14 to 62 active accounts in Year 3, so GTM repeatability matters more than product breadth.
    - Model intentionally excludes implementation-fee upside; that is conservative on revenue but may understate delivery effort if onboarding stays bespoke.
    - Cash bottoms at $371K in Q2Y3, so any slip in sales cycle, churn, or gross margin likely forces a bridge before self-funding.
