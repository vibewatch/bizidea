modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[Qualified leads] --> Pilots[Paid pilots]
      Pilots --> Accounts[Active accounts]
      Accounts --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Opex[Operating expense]
      Opex --> Cash[Ending cash]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景里的收入，几乎完全靠活跃账户数增长驱动：从第 1 年末的 3 个账户，涨到第 3 年末的 62 个，而 ACV 基本固定在 $120K。
- checkName: 必须做对的事
  finding: 公司必须在 Y2 早期之前，把创始人主导试点转成一条可复制的 6 个月销售动作；否则 Q2Y3 的现金低点会太薄。
- checkName: 模型失效条件
  finding: 如果销售周期拉长到 9 个月、同时流失升高，下行情景会跌破 0 现金，这意味着在盈亏平衡前还得补一轮 bridge。
- checkName: 下一轮融资凭证
  finding: 如果这轮 pre-seed 能把公司带到 3 个付费试点、2 个生产转化，以及 1 条有量化 ROI 的可复用导出集成，就足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长 389% + EBITDA 利润率 9% = 398%。
  burnMultiple: 按活跃账户从 3 个涨到 14 个、ACV 为 $120K 计算，Y2 用约 $1.0M EBITDA burn 换来 $1.32M 净新增 ARR，burn multiple 约 0.8x。
  revenuePerFte: Y3 人均收入约 $297K（$4.16M 收入 / Q4 14 名 FTE；SaaS 基准约 $200–400K）。
  flags:
  - 基准情景仍要求第 3 年把活跃账户从 14 个猛增到 62 个，所以 GTM 的可复制性比产品广度更关键。
  - 模型刻意没把实施费上行算进收入；这对收入是保守的，但如果 onboarding 迟迟摆脱不了定制化，也可能低估了交付压力。
  - 现金在 Q2Y3 低到 $371K，所以只要销售周期、流失率或毛利率任何一项打滑，基本都得在自我造血前补 bridge。
