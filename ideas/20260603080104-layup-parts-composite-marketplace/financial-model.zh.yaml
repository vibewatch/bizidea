scenarios:
  downside:
    description: 销售周期拉长、供应商 onboarding 依旧偏手工，公司到第 3 年末仍没跨过可复制的 PMF，活跃账户数也明显更少。
    y3RevenueK: 2560.0
    y3EbitdaK: -420.0
    cashLowPointK: -310.0
    keyAssumptionChanges:
    - 销售周期拉长到 9 个月。
    - 月流失率升到 2.5%。
    - 第 3 年末只做到 38 个活跃账户，而不是 62 个。
  base:
    description: 在精简招聘和创始人主导工业销售的前提下，试点能转成可复制、但仍偏小众的获客动作。
    y3RevenueK: 4160.0
    y3EbitdaK: 392.0
    cashLowPointK: 371.0
    keyAssumptionChanges:
    - ACV 稳在 $120K，毛利率维持 70%。
    - 第 2 年末做到 14 个账户，第 3 年末做到 62 个。
    - 到 Q4Y3 团队规模维持在 14 FTE。
  upside:
    description: 客户沿着更多零件家族扩得更快，口碑缩短销售周期，公司也更接近研究里的 SOM 路径。
    y3RevenueK: 5840.0
    y3EbitdaK: 1370.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 销售周期缩短到 4.5 个月。
    - 随着模块扩展和零件家族扩展，混合 ACV 提升到 $140K。
    - 第 3 年末做到 80 个活跃账户。
