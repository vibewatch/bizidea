slug: composite-release-packet-os
date: '2026-06-03'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始现金
  value: '2700'
  unit: usdK
  source: '[BP fundingAsk] pre-seed 目标区间是 $2–4M、跑道 18 个月；模型假设在 M1 关账 $2.7M。'
- id: A2
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP executiveSummary] 产品起步时还没收入，先得把付费试点签下来。'
- id: A3
  name: 单个活跃账户稳态 ACV
  value: '120'
  unit: usdK_per_year
  source: '[BP market.som; research.market.bottomUpSizingDrivers] $12.0M SOM = 100 个账户 × 约 $120K ACV。'
- id: A4
  name: 单个活跃账户月收入
  value: '10'
  unit: usdK_per_month
  source: '[A3] 收入按 ACV / 12 确认；出于保守起见，模型没把 BP businessModel 里的实施费上行算进去。'
- id: A5
  name: 毛利率
  value: '70'
  unit: pct
  source: '[BP businessModel.targetGrossMarginPct] 目标毛利率是 70%。'
- id: A6
  name: Y1 试点签约节奏
  value: M5, M8, M11
  unit: month
  source: '[BP milestones 0–12 months] 模型假设第 1 年内签下 3 个付费试点。'
- id: A7
  name: Y2 季末客户数
  value: 4, 6, 9, 14
  unit: count
  source: '[BP milestones 12–24 months] 假设 2 个试点转正，再叠加创始人主导销售和 1 名 AE 带来的谨慎新客增长。'
- id: A8
  name: Y3 季末客户数
  value: 20, 30, 44, 62
  unit: count
  source: '[BP milestones 24–36 months; research market.som] 相比 100 个账户的 SOM 情景更保守；假设到第 3 年产品打法已可复制，但还没吃满 SOM。'
- id: A9
  name: 平均销售周期
  value: '6'
  unit: months
  source: '[BP gtm.wedge; research buyingTriggers] 航空航天/国防工作流销售按多方参与、6 个月周期建模。'
- id: A10
  name: 全成本 CAC
  value: '55'
  unit: usdK_per_customer
  source: '[Startup-finance heuristic: early enterprise founder-led SaaS] 把创始人/AE 时间、差旅、演示和试点成交成本混在一起，适配一个窄而工业化的工作流产品。'
- id: A11
  name: 月流失率
  value: '1.5'
  unit: pct
  source: '[BP mustBeTrue; startup-finance heuristic] 这类工作流一旦嵌进去应当较黏，但早期工业 SaaS 仍有可观流失风险。'
- id: A12
  name: 工程团队全成本年薪
  value: '190'
  unit: usdK_per_fte_year
  source: '[Startup-finance heuristic: U.S. aerospace software hiring] 用于产品和集成工程师，并计入 payroll tax/benefit。'
- id: A13
  name: 工作流实施岗位全成本年薪
  value: '150'
  unit: usdK_per_fte_year
  source: '[BP team] 复材工作流/实施岗位的现金成本低于工程岗位，但高于泛客户成功。'
- id: A14
  name: 质量/合规岗位全成本年薪
  value: '160'
  unit: usdK_per_fte_year
  source: '[BP team] 供应商质量与合规负责人带有航空航天行业溢价。'
- id: A15
  name: 销售岗位全成本年薪
  value: '170'
  unit: usdK_per_fte_year
  source: '[BP team] 按航空航天/国防技术型企业销售，建模创始人/AE 的全成本薪酬。'
- id: A16
  name: G&A 岗位全成本年薪
  value: '120'
  unit: usdK_per_fte_year
  source: '[Startup-finance heuristic] 只有在初步试点之后，才引入精简的运营/财务支持。'
- id: A17
  name: 招聘节奏快照
  value: 3, 4, 5, 7, 11, 14
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] 招聘顺序是先做发布包 authoring，再补合规、GTM、集成和精简运营。'
- id: A18
  name: 非薪酬运营开支爬坡
  value: Y1 opex ramps from 75K/month to 130K/month; Y2 quarters 360K/390K/420K/450K; Y3 quarters 540K/600K/660K/720K
  unit: usdK
  source: '[BP operations; BP risks; startup-finance heuristic] 包括云、差旅、合规/法务、软件工具和客户 onboarding 支出，同时尽量保持团队精简。'
- id: A19
  name: 现金桥接处理口径
  value: EBITDA approximates cash movement
  unit: policy
  source: '[Startup-finance heuristic] 模型假设规模化前 capex、债务服务和税负都可以忽略，所以期末现金按期初现金加 EBITDA 滚动。'
- id: A20
  name: Opex 科目映射
  value: Engineering to R&D; sales to S&M; implementation, quality, and ops mostly to G&A
  unit: policy
  source: '[BP team; BP operations] 工程记入 R&D；销售记入 S&M；实施、质量和运营大多记入 G&A。这样既和 P&L 科目一致，也反映了早期实施占比高的现实。'
