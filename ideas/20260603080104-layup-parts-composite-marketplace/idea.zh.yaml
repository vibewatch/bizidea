topRisks:
- name: 供应商流程采纳停滞
  description: 如果复材供应商已经习惯了靠非正式对话和不完整图纸报价，他们可能不愿意填写结构化发布包。
  mitigation: 先从买方侧切入：把现有文档里的信息抽出来并预填好，等买方强制要求统一格式后，再推供应商上平台。
- name: 流程滑向重服务
  description: 早期客户可能需要太多人工协助，才能把混乱的复材要求编码进系统，这会压住软件毛利。
  mitigation: 先挑可重复的零件家族，用 human-in-the-loop 的发布团队兜底，再把最高频的模板和审批模式逐步产品化。
- name: 市场平台把功能打包带走
  description: 一旦这个品类被证明有价值，采购市场平台或现有采购套件可能会补上一套基础的复材 RFQ 模板。
  mitigation: 把自己做成跨多条采购渠道的中立系统记录层，在报价归一化、首件历史和深度复材 schema 上赢。
