differentiator: 通用采购套件只能在品类层面管供应商，复材市场平台也只是帮买方找产能；但二者都抓不住那些真正决定两份复材报价能不能比较的隐含制造上下文。这家公司要占住的，是“设计意图”到“可制造发布”之间的翻译层：材料堆叠假设、工装逻辑、QA 方案和变更历史。它的护城河，是不断变厚的复材发布模板库、供应商能力地图，以及与真实零件家族和项目绑定的首件结果数据。每跑完一轮 RFQ 和审批，这套数据就更强一层，也让这个流程比单纯的市场列表更难替代。
