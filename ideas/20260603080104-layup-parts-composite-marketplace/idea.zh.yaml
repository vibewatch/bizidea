problem: 航空航天和国防硬件团队把机加工金属件外发时，通常已经有一套相对完整的图纸包；但定制复材件不一样，工程师还得靠电话、PDF 和表格，把铺层意图、工装假设、检验步骤和合规要求一点点翻给供应商，后者才能放心报价。只要设计一改，设计、制造、采购三端就得把这套翻译重来一遍，于是即便是紧急样机或小批量项目，交期也会从几周拖到几个月。结果就是测试窗口错过、资深复材工程师被反复拉去救火、供应商报价除了价格之外几乎没法横向比较。
targetUser:
  primary: 美国航空航天和国防 OEM 里的制造工程与供应链负责人；他们会把无人机、卫星和机体项目里反复出现的小批量碳纤维或玻纤结构件外包出去。
  secondary: 负责给代工厂准备 RFQ 包和首件要求的复材设计工程师，以及供应商质量经理。
  buyer: 成长期航空航天或国防 OEM 里的制造工程总监、供应链负责人，或硬件 VP。
startupThesis:
  nonObviousInsight: 真正值钱的层，不是一本复材供应商名录，而是一套发布控制系统：它能把模糊的复材设计意图，变成当天就能让每家供应商按同一口径报价、又经得起审计的制造包。变化在于，软件驱动下单已经证明复材周期是能压下来的，但买方仍缺一套结构化办法，把铺层规格、工装假设和 QA 证据，在一堆分散供应商之间统一起来。
  beachhead: 首个滩头市场，是那些有 20-300 名工程师的美国航空航天和国防 OEM。它们会把样机和小批量项目里反复出现的复材支架、整流罩、雷达罩、面板和内饰结构外包出去。
  wedge: 一个复材发布 OS，把 CAD、载荷工况、材料约束和检验要求，直接转成供应商可执行的 RFQ、首件计划，以及可横向对比的报价视图。
  whyNowCatalyst: Layup Parts 的融资，以及“几周压到几小时”的周期压缩主张，都说明复材采购终于开始被软件重写；而这恰好撞上航空航天和国防团队越来越需要更快的外包迭代。
  ventureScalePath: 先从外包复材零件的发布包切入，再往供应商资质、工装复用、首件批准、生产质量追踪扩展，最后长成航空航天、国防、工业设备和出行领域先进材料外包的系统记录层。
solution: Composite Release Packet OS 先吃进 CAD 文件、零件备注、载荷要求、材料偏好和检验约束，再把图纸里通常写不清、但复材供应商真正关心的隐含变量逐个问出来。系统会生成一份结构化 RFQ 包，里面包括铺层假设、固化与工装问题、QA 检查点，以及可复用的首件计划；随后再把这份包按统一格式发给已批准的供应商。买方看到的是并排报价视图，重点标出各家供应商在哪些制造假设上不一样，而不是把差异埋进邮件线程里。设计一旦变更，平台会给发布包做版本管理，指出哪些批准需要重刷，并保留一条从工程意图到供应商承诺的审计链。时间一长，系统还能沉淀出一张能力图谱：哪家供应商会稳定报价、稳定交付、稳定通过首件，分别对应哪些复材零件家族。
goToMarketSeed:
  firstCustomer: 第一批客户应是 50-250 人规模的美国无人机、卫星或国防机体公司；它们每个季度会把 25-200 个定制复材料号分给 3-10 家本土供应商。
  buyingTrigger: 样机开造、测试失败后的设计改动，或新的小批量生产项目启动，会在进度压力下逼着团队重新拉报价、重做首件计划。
  currentAlternative: 当前替代方案就是邮件式 RFQ、PLM 导出、共享盘图纸、表格，以及资深复材工程师逐家给供应商补规格。
  switchingReason: 这个切口的价值在于：把缺失的制造上下文一次性补齐，砍掉来回澄清，让买方拿到的是可比的发布包和审批轨迹，而不是一堆各说各话的供应商对话。
  pricingHypothesis: 按活跃零件家族或项目收年费订阅，再叠加按报价事件、供应商入驻和首件流程席位计费。
