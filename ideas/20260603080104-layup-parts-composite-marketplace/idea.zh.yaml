jobsToBeDone:
- job: 当样机复材零件在测试后发生变更时，帮制造团队尽快重新生成一份供应商可执行的 RFQ 和首件计划，这样我们才能继续推进 build 节奏，而不用把同一个零件再向每家供应商解释一遍。
  currentAlternative: 邮件线程、带红线的 PDF、表格跟踪器，以及资深复材工程师的临时电话沟通。
  successMetric: 从工程变更到报价就绪发布包的小时数，以及每份 RFQ 需要经历的供应商澄清轮次。
- job: 当我们要为新的小批量生产复材件比较多家供应商时，帮采购团队把假设差异看清楚，这样我们选供应商时看的就是可制造性和风险，而不只是表面价格。
  currentAlternative: 在表格里手工比价，但对工艺和质量假设几乎没有可见性。
  successMetric: 完成供应商定标所需时间，以及新引入零件的首件通过率。
