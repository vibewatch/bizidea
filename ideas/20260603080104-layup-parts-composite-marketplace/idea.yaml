jobsToBeDone:
  - job: >-
      When a prototype composite part changes after testing, help our manufacturing team regenerate a supplier-ready RFQ
      and first-article plan fast, so we can keep the build schedule moving without re-explaining the part to every vendor.
    currentAlternative: Email threads, redlined PDFs, spreadsheet trackers, and ad hoc calls with senior composites engineers
    successMetric: Hours from engineering change to quote-ready packet and number of supplier clarification cycles per RFQ
  - job: >-
      When we need to compare multiple composite suppliers for a new low-rate production part, help our procurement team see
      assumption differences clearly, so we can choose a vendor based on manufacturability and risk, not just headline price.
    currentAlternative: Manual bid comparison in spreadsheets with limited visibility into process and quality assumptions
    successMetric: Time to award supplier and first-article pass rate for newly sourced parts
