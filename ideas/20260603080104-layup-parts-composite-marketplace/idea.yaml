problem: >-
  Aerospace and defense hardware teams can send a machined-metal part out from a fairly complete drawing package, but
  custom composite parts still require engineers to translate layup intent, tooling assumptions, inspection steps, and
  compliance expectations through calls, PDFs, and spreadsheet notes before a supplier can quote confidently. Every design
  change restarts that translation loop across design, manufacturing, and procurement, so lead times stretch from weeks to
  months even on urgent prototype or low-rate production programs. The result is missed test windows, overloaded senior
  composites staff, and supplier quotes that are hard to compare on anything beyond price.
targetUser:
  primary: >-
    Manufacturing engineering and supply-chain leads at U.S. aerospace and defense OEMs outsourcing recurring low-volume
    carbon-fiber or fiberglass structures for drone, satellite, and airframe programs
  secondary: >-
    Composites design engineers and supplier-quality managers who prepare RFQ packets and first-article requirements for
    contract manufacturers
  buyer: >-
    Director of manufacturing engineering, head of supply chain, or VP hardware at a growth-stage aerospace or defense OEM
startupThesis:
  nonObviousInsight: >-
    The valuable layer is not a directory of composite suppliers; it is the release-control system that converts ambiguous
    composite intent into a manufacturable, auditable packet every supplier can quote from the same day. What changed is
    that software-led ordering has proven composite cycle compression is possible, but buyers still lack a structured way
    to standardize layup specs, tooling assumptions, and QA evidence across a fragmented supplier base.
  beachhead: >-
    U.S. aerospace and defense OEMs with 20-300 engineers that outsource recurring low-volume composite brackets,
    fairings, radomes, panels, and interior structures for prototype and low-rate production builds
  wedge: >-
    A composite release OS that turns CAD, load cases, material constraints, and inspection requirements into
    supplier-ready RFQs, first-article plans, and apples-to-apples quote comparisons
  whyNowCatalyst: >-
    Layup Parts' funding and weeks-to-hours compression claims show composite sourcing is finally being software-defined
    just as aerospace and defense teams need faster outsourced part iteration.
  ventureScalePath: >-
    Start with release packets for outsourced composite parts, then expand into supplier qualification, tooling reuse,
    first-article approval, production quality tracking, and eventually the system of record for advanced-materials
    outsourcing across aerospace, defense, industrial equipment, and mobility.
solution: >-
  Composite Release Packet OS ingests CAD files, part notes, load requirements, material preferences, and inspection
  constraints, then prompts engineers for the hidden variables composite suppliers actually need but drawings rarely encode
  cleanly. It generates a structured RFQ packet with layup assumptions, cure and tooling questions, QA checkpoints, and a
  reusable first-article plan, then routes that packet to approved suppliers in a normalized format. Buyers get a side-by-
  side quote view that highlights where suppliers made different manufacturing assumptions instead of burying those deltas in
  email threads. When a design changes, the platform versions the packet, shows which approvals must be refreshed, and
  preserves an auditable trail from engineering intent to supplier commitment. Over time, the system builds a capability
  graph of which suppliers reliably quote, build, and pass first article for each composite part family.
goToMarketSeed:
  firstCustomer: >-
    A 50-250 person U.S. drone, satellite, or defense-airframe company outsourcing 25-200 custom composite part numbers
    per quarter across 3-10 domestic suppliers
  buyingTrigger: >-
    A prototype build, design change after test failure, or new low-rate production program forces the team to request
    fresh quotes and first-article plans under schedule pressure
  currentAlternative: >-
    Email-based RFQs, PLM exports, shared-drive drawings, spreadsheets, and senior composites engineers manually clarifying
    specs with each supplier
  switchingReason: >-
    The wedge standardizes missing manufacturing context once, cuts quote back-and-forth, and gives buyers a comparable
    release packet and approval trail instead of bespoke vendor conversations.
  pricingHypothesis: >-
    Annual subscription priced by active part family or program, plus usage-based fees for quote events, supplier
    onboarding, and first-article workflow seats
