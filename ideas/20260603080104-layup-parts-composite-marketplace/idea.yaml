topRisks:
  - name: Supplier workflow adoption stalls
    description: Composite suppliers may resist filling structured packets if they are used to quoting from informal conversations and partial drawings.
    mitigation: Start buyer-side by extracting and pre-filling packets from existing documents, then onboard suppliers only after the buyer mandates one clean format.
  - name: Workflow becomes services-heavy
    description: Early customers may need too much human help to encode messy composite requirements, which could cap software margins.
    mitigation: Begin with repeatable part families and a human-in-the-loop release team, then productize the highest-frequency templates and approval patterns.
  - name: Marketplaces bundle the feature
    description: A sourcing marketplace or incumbent procurement suite could add basic composite RFQ templates once the category proves valuable.
    mitigation: Become the neutral system of record across multiple sourcing channels and win on quote normalization, first-article history, and deep composite-specific schema.
