        - 8
        - 10
    competitiveRivalry:
      score: 4
      rationale: >-
        Multiple adjacent vendors already sell fast quoting, certified manufacturing, or
        supplier-network access, so the startup must articulate a narrower release-control category
        rather than compete as another marketplace.
      sourceRefs:
        - 1
