        - 8
        - 10
  pestle:
    - factor: political
      impact: positive
      point: >-
        Defense procurement and reshoring priorities support domestic supplier workflows and
        increase interest in compliant U.S.-based sourcing infrastructure.
      sourceRefs:
        - 19
        - 25
        - 26
    - factor: economic
      impact: positive
      point: >-
        Large A&D revenue pools and long delivery backlogs raise the cost of schedule slips, making
        workflow compression economically meaningful.
      sourceRefs:
        - 18
        - 19
    - factor: social
      impact: neutral
      point: >-
        The product depends on changing engineer and supplier habits that are often
        relationship-driven and document-heavy, so trust and explainability matter as much as UI
        speed.
      sourceRefs:
        - 1
        - 12
    - factor: technological
      impact: positive
      point: >-
        Digital quoting, automated lay-up, and materials/process standardization make structured
        composite packeting more feasible than it was a few years ago.
      sourceRefs:
        - 1
        - 5
        - 23
        - 27
    - factor: legal
      impact: negative
      point: >-
        AS9100, AS9102, FAA process guidance, and contract-specific QMS appendices create nontrivial
        audit and traceability obligations for any system handling release data.
      sourceRefs:
        - 12
        - 14
        - 16
        - 17
    - factor: environmental
      impact: neutral
      point: >-
        Composite adoption benefits lightweighting and fuel efficiency, but recycling and materials
        handling remain ongoing challenges in the underlying category.
      sourceRefs:
        - 21
        - 22
  adoptionFrictionMatrix:
    - friction: >-
        Suppliers may resist filling new structured fields for layup, tooling, and inspection
        assumptions
      severity: high
      affectedBuyer: Manufacturing engineering lead
      mitigation: >-
        Autofill packets from existing buyer documents and ask suppliers only to confirm deltas
        rather than start from blank forms.
      sourceRefs:
        - 1
        - 12
    - friction: >-
        Customers will require audit-grade outputs aligned with AS9102 and internal QMS rules before
        trusting the system
      severity: high
      affectedBuyer: Supplier-quality manager
      mitigation: >-
        Launch with exportable packet templates, version history, and approval logs mapped directly
        to FAI and QMS checkpoints.
      sourceRefs:
        - 12
        - 16
        - 17
    - friction: Security and export-control concerns may slow SaaS adoption on defense-linked programs
      severity: medium
      affectedBuyer: VP hardware or head of supply chain
      mitigation: >-
        Offer domestic hosting options, granular access controls, and explicit ITAR/DDTC handling
        policies.
      sourceRefs:
        - 1
        - 25
        - 26
    - friction: Generalist sourcing platforms already offer instant quotes for adjacent categories
      severity: medium
      affectedBuyer: Procurement lead
      mitigation: >-
        Focus sales on parts that repeatedly fail generic quoting because assumptions are hidden,
        not on simple commodity jobs.
      sourceRefs:
        - 5
        - 7
        - 8
        - 10
