        - 14
        - 27
    threatOfSubstitutes:
      score: 4
      rationale: >-
        The default substitute remains email, drawings, spreadsheets, PLM exports, and generalist
        instant-manufacturing platforms, all of which are good enough for some parts and slow
        adoption unless the startup proves step-change cycle savings.
