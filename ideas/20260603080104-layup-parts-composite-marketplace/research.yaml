competitors:
  - name: Layup Parts
    stage: scale-up
    wedge: >-
      Composite-specific ordering and quoting via FiberPortal, combined with domestic manufacturing
      capacity.
    pricing: Custom quote with lead-time-based tooling and parts pricing.
    strength: >-
      Closest verified proof that buyers will enter ply, material, and special-requirement data for
      composite parts in a software workflow.
    weaknessVsUs: >-
      Vertically integrated manufacturing model is less neutral for buyers that want one
      release-control layer across multiple approved suppliers.
    sourceRefs:
      - 1
      - 2
  - name: Xometry
    stage: incumbent
    wedge: >-
      General-purpose digital manufacturing marketplace with instant quoting and a 10,000+
      manufacturer network.
    pricing: Instant custom quote; price varies by geometry, process, and lead time.
    strength: >-
      Massive supply coverage, AS9100D/ITAR credentials, and strong buyer familiarity with digital
      sourcing.
    weaknessVsUs: >-
      Generalist manufacturing flow does not visibly center on composite layup assumptions, FAI
      packeting, or quote normalization for ambiguous parts.
    sourceRefs:
      - 5
      - 7
  - name: Protolabs Network
    stage: incumbent
    wedge: >-
      Instant-quote supplier network for aerospace parts with AS9100 suppliers and quality
      documentation.
    pricing: >-
      Instant quote for network jobs; separate quick-turn manufacturing upsell through Protolabs
      factories.
    strength: Verified quality documentation, FAI support, and strong rapid-manufacturing brand credibility.
    weaknessVsUs: >-
      Starts at sourcing execution rather than authoring the buyer-side composite release packet and
      change-control workflow.
    sourceRefs:
      - 8
  - name: Stratasys Direct
    stage: incumbent
    wedge: >-
      Aerospace additive manufacturing supplier with qualified material and process specs plus
      traceability.
    pricing: Quote-based engagement with instant-quote entry point.
    strength: Deep certification and process pedigree for flight-worthy aerospace parts.
    weaknessVsUs: >-
      Specialized manufacturing service, not a neutral system of record for outsourced composite
      RFQs across multiple vendors.
    sourceRefs:
      - 10
