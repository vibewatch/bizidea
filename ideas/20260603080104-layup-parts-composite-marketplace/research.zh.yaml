  tam:
    value: $1.3B
    rationale: 估算：全球约 8,000 家存在持续先进复材外包工作流的机构 × 每年约 $160k 的发布控制软件与供应商协作 ACV；这个口径锚定在庞大的 A&D 收入/就业基盘和持续增长的复材需求上，但并非任何来源直接给出的数字。
    isEstimate: true
    sourceRefs:
    - 18
    - 19
    - 20
    - 21
    - 23
  sam:
    value: $180.0M
    rationale: 估算：美国及盟友约 1,500 家航空航天/国防 OEM、成长型企业和 tier supplier，频繁外包小批量复材项目 × $120k ACV；范围只取最看重本土、合规和进度敏感采购的滩头市场。
    isEstimate: true
    sourceRefs:
    - 1
    - 18
    - 19
    - 20
    - 25
    - 26
  som:
    value: $12.0M
    rationale: 估算：到第 3 年做到 100 个账户 × 约 $120k ACV；前提是产品在每个账户里至少拿下一个零件家族，成为默认发布包和 FAI 工作流。
    isEstimate: true
    sourceRefs:
    - 1
    - 18
    - 19
bottomUpSizingDrivers:
- driver: 存在持续先进复材外包需求的全球可触达机构数
  value: ~8,000 家机构
  source: 估算；锚定 [18]、[19]、[20]、[21] 和 [23]。
- driver: 美国及盟友航空航天/国防滩头市场机构数
  value: ~1,500 家机构
  source: 估算；锚定 [18]、[19]、[20]、[25] 和 [26]。
- driver: 单账户隐含年合同价值
  value: $120k-$160k
  source: 测算；依据在于进度关键型工作流、认证负担，以及多人协作的供应商流程需求 [12][14][17][19]。
categoryDynamics:
  growthRate: 12.0% CAGR
  growthRateSourceRefs:
  - 23
  tailwinds:
  - point: 随着主机厂和国防项目持续追求更轻、更高性能的结构件，航空航天复材需求仍在增长。
    sourceRefs:
    - 21
    - 23
  - point: A&D 需求依旧超过供应商产能，因此买方更愿意上能够压缩采购周期的工具。
    sourceRefs:
    - 19
    - 20
  - point: 数字报价和认证供应商网络已经足够普及，买方对“由软件介入的采购步骤”并不陌生。
    sourceRefs:
    - 1
    - 5
    - 8
  headwinds:
  - point: 合规、可追溯性和买方特定附录，会让 onboarding 明显慢于通用制造软件。
    sourceRefs:
    - 12
    - 14
    - 16
    - 17
  - point: 复材需求增长不等于软件预算自然出现；很多团队会先硬撑表格和现有供应商关系。
    sourceRefs:
    - 1
    - 18
  - point: 合格供应商依旧稀缺，所以发布包提速并不能彻底解决下游产能约束。
    sourceRefs:
    - 12
    - 18
    - 19
competitors:
- name: Layup Parts
  stage: 扩张期
  wedge: 通过 FiberPortal 提供复材特定的下单与报价，再叠加本土制造产能。
  pricing: 按报价定制；工装和零件价格会随交期变化。
  strength: 它是目前最接近的公开验证：买方确实愿意在软件流程里输入 ply、材料和特殊要求。
  weaknessVsUs: 它是垂直整合的制造模式；对想在多家已批准供应商之间统一一层发布控制的买方来说，中立性更弱。
  sourceRefs:
  - 1
  - 2
- name: Xometry
  stage: 现有厂商
  wedge: 通用数字制造市场平台，提供即时报价和 10,000+ 制造商网络。
  pricing: 即时定制报价；价格随几何、工艺和交期变化。
  strength: 覆盖面极广，具备 AS9100D/ITAR 资质，而且买方对其数字采购路径已经很熟。
  weaknessVsUs: 它的通用制造流程并没有把复材铺层假设、FAI 打包或高歧义零件的报价归一化放到前台。
  sourceRefs:
  - 5
  - 7
- name: Protolabs Network
  stage: 现有厂商
  wedge: 面向航空航天零件的即时报价供应商网络，配有 AS9100 供应商和质量文档。
  pricing: 网络订单提供即时报价；Protolabs 自有工厂还会叠加 quick-turn 制造 upsell。
  strength: 质量文档、FAI 支持和快速制造品牌都已被验证。
  weaknessVsUs: 它从采购执行开始，而不是从买方侧复材发布包 authoring 和变更控制工作流开始。
  sourceRefs:
  - 8
- name: Stratasys Direct
  stage: 现有厂商
  wedge: 航空航天增材制造供应商，提供合格的材料/工艺规范和可追溯性。
  pricing: 按项目报价，但入口有即时询价。
  strength: 在适航级航空航天零件上，它的认证和工艺 pedigree 很深。
  weaknessVsUs: 它是专长制造服务商，不是横跨多家供应商的中立复材 RFQ 系统记录层。
  sourceRefs:
  - 10
regulatoryTechnicalConstraints:
- point: 复材发布包必须覆盖 FAA 对聚合物基系统提出的材料采购与工艺规范控制要求。
  sourceRefs:
  - 14
  - 15
- point: 任何面向生产的工作流，都得支持 AS9100 的质量系统可追溯性，以及 AS9102 的首件输出。
  sourceRefs:
  - 16
  - 17
- point: 像 Boeing D6-82479 这样的主机厂规则，还会在行业标准之外，再叠加合同依赖的附录、审核和批准要求。
  sourceRefs:
  - 12
- point: 带有国防属性的客户，可能要求本土托管、访问控制和供应商分层，以满足 DFARS 与出口管制预期。
  sourceRefs:
  - 25
  - 26
validationSignals:
- point: Layup Parts 已公开展示一种工作流：客户上传模型、选择材料、定义 ply 方向，然后快速拿到报价。
  sourceRefs:
  - 1
- point: Xometry 证明航空航天买方已经接受了即时数字报价、认证筛选和有文档支撑的供应商网络采购。
  sourceRefs:
  - 5
  - 7
- point: Protolabs Network 把首件检验、材料证书和 AS9100 供应商当卖点来卖，说明“文档很重的数字采购”已经是商业现实。
  sourceRefs:
  - 8
- point: Boeing、SAE 和 FAA 的要求共同说明：市场确实需要结构化版本控制和审计轨迹，而不只是一个供应商搜索页。
  sourceRefs:
  - 12
  - 14
  - 16
  - 17
- point: PwC 和 Deloitte 都表明需求强、供应紧，所以买方确实有动力把采购流程里那些非制造性延误压掉。
  sourceRefs:
  - 19
  - 20
openQuestions:
- 今天一家 50-250 人规模的无人机或卫星 OEM，每个季度通常会生成多少份复材 RFQ 和首件包？
- 创业公司只做买方侧软件就能赢吗，还是说客户在第一年就会期待托管式的发布包准备服务？
- 最先必须打通的系统记录层究竟是哪一个：PLM、ERP、QMS，还是安全文件库？
- 对于带有 ITAR 敏感性的复材图纸，国防客户会接受多租户 SaaS 吗，还是首批灯塔客户就必须私有化部署？
