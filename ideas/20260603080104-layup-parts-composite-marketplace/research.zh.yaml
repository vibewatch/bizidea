  adoptionFrictionMatrix:
  - friction: 供应商可能不愿意为铺层、工装和检验假设填写新的结构化字段
    severity: high
    affectedBuyer: 制造工程负责人
    mitigation: 先从买方已有文档里自动预填发布包，再让供应商只确认差异，而不是从空白表单开始。
