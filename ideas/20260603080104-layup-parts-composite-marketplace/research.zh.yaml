    - 12
  - friction: 客户在信任系统之前，会要求输出与 AS9102 和内部 QMS 规则直接对齐、能过审计的结果
    severity: high
    affectedBuyer: 供应商质量经理
    mitigation: 首发时就提供可导出的发布包模板、版本历史和审批日志，并直接映射到 FAI 与 QMS 检查点。
    sourceRefs:
