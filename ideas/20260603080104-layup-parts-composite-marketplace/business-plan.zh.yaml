slug: composite-release-packet-os
date: '2026-06-03'
executiveSummary: 这家公司应该先从一套复材发布控制系统做起，服务美国无人机、卫星和国防机体团队。这些团队会反复把小批量碳纤维和玻纤零件外包出去，但每次设计一变，还是得靠邮件、图纸和供应商电话把 RFQ 包重做一遍。第一批客户会是 50-250 人规模的航空航天或国防 OEM：它们每季度有 25-200 个复材料号、3-10 家已批准的本土供应商；一旦测试失败、样机开造或小批量生产启动，就会被迫紧急重拉报价、重做首件规划。切口要比市场平台更窄：不去争产能，也不去吃下广义采购，而是在买方现有供应商之间，生成一份统一口径的发布包、首件计划和报价对比视图。这个范围更容易验证，因为买方能在一条反复发生的流程里，直接量出 RFQ 周转时间、供应商澄清轮次、首轮发布包完整率，以及试点转生产的转化率。研究支持这个方向，也给出了第 3 年 $12.0M SOM 的模型，但这个软件品类还没有公开定价基准，所以 ACV 和付费意愿目前仍只是运营假设，要等试点签下来才能坐实。节奏上应先做买方侧的发布包 authoring，再做供应商协作，最后再接 PLM 或 QMS 分发，避免在模板库还没跑顺之前，就滑成一层定制化服务。最强的防守来自持续变厚的复材发布模板、报价归一化逻辑，以及和真实零件家族绑定的首件结果数据。最大的反证风险在于：买方承认流程很痛，但如果产品不能在真实项目里把周期明显砍下来，他们还是会继续忍着用表格和现有采购平台。
problem:
- 小批量航空航天复材件的 RFQ，今天依然要靠资深工程师通过邮件、PDF 和电话，把隐含的铺层、工装和 QA 假设翻给供应商，后者才敢放心报价。
- 每次设计修订，报价比较和首件规划都得重来，这会把本就受限于合格本土供应商和合规要求的样机、小批量生产节奏继续拉长。
solution:
- 提供一个买方侧工作台，吃进 CAD、材料约束、载荷工况和检验要求，然后生成一份标准化、供应商可执行的 RFQ 包，里面把铺层假设、待确认问题和审批历史讲清楚。
- 再把这份发布包和首件规划、报价归一化绑在一起，让制造工程和供应链团队比较供应商时，看的是可制造性、文档范围和排期风险，而不只是表面价格。
whyWeWin:
- 公司要占住的，是工程意图和可制造发布之间的翻译层；通用采购套件、市场平台和 job shop，都没有把复材假设或首件范围在多家供应商之间真正标准化。
- 每跑完一轮 RFQ 和审批，都会沉淀出可复用的零件家族模板、供应商能力数据和首件结果。这些资产会持续增值，也不是给市场平台补一个功能就能轻易复制的。
strategicChoices:
  beachhead: 美国无人机、卫星和国防机体 OEM，团队规模 20-300 名工程师，会把反复出现的小批量复材支架、整流罩、雷达罩、面板和内饰结构外包给本土供应商。
  wedgeRationale: 这批客户在同一条流程里，同时承受进度压力、供应商分散和合规负担，所以用“发布包 authoring”切进去，会比做大而全的制造市场平台、通用采购套件或完整供应商质量系统，更快跑出可量化的周期改善。
  sequencingRationale: 先在一个零件家族上做买方侧发布包创建和版本控制，因为隐含假设和人工返工都卡在这里。等团队证明“发布包本身”确实能减少澄清轮次、在单一项目里形成重复使用，再加供应商协作、首件批准和导出到 PLM/QMS。
  notYet:
  - 自己持有制造产能，或再做一个全栈复材市场平台
  - 在航空航天和国防滩头市场之外，过早铺开到泛工业和出行复材
  - 在发布包模板还没跑顺之前，就去替换完整 PLM 或深度覆盖 ERP 流程
  - 那些通用即时报价工具已经足够好用的标准化零件
market:
  tam: $1.3B 的全球 TAM 估算，基于约 8,000 家存在持续先进复材外包流程的机构，以及约 $160k 的年均 ACV。
  sam: $180.0M 的滩头市场 SAM 估算，基于约 1,500 家美国及盟友航空航天/国防 OEM、成长型企业和 tier supplier；它们频繁外包复材项目，单账户 ACV 约 $120k。
  som: $12.0M 的第 3 年 SOM 估算，假设做到 100 个账户、每个账户约 $120k ACV，且产品在每个账户里至少成为一个重复零件家族的默认发布包与 FAI 工作流。
  segments:
  - 外包重复性小批量复材结构件的美国航空航天和国防 OEM
  - 在滩头市场被验证后，可进一步扩容使用的盟友 tier supplier 和先进材料制造商
  buyingProcess: 实际推动项目的人，通常是制造工程负责人、供应商质量负责人，或采购经理；一旦样机失败、设计修订或小批量生产 kickoff 让邮件式 RFQ 流程显得太慢，他们就会跳出来。真正批预算的，通常是制造工程总监、供应链负责人或硬件 VP；只要某个项目先证明报价更快、首件准备更干净、又不用换供应商，他们就能拍板试点。
product:
  mvp: MVP 是一个面向单一重复零件家族的买方侧复材发布工作台：它吃进现有图纸和备注，提示缺失的制造变量，给设计变更做版本管理，并输出一份统一口径的 RFQ 包和首件检查清单，供已批准供应商使用。
  sixMonth: 6 个月内，落地 2-3 个 design-partner 试点，提供发布包 authoring、报价假设对比、审批历史，以及 RFQ 周转时间、供应商澄清轮次和首轮发布包完整率看板。
  twelveMonth: 12 个月内，补上可复用的供应商协作、首件批准工作流、相邻零件家族的模板复用，以及一条导出路径，接进客户现有的文控系统。
  twentyFourMonth: 24 个月内，扩到供应商能力评分、工装复用历史、生产质量追踪，以及在无人机、卫星和国防机体账户里的多项目 rollout，同时继续守住中立发布控制层的位置。
  keyBets:
  - 只要产品能在不逼客户换供应商的前提下，减少工程返工和排期滑点，买方就愿意为这层工作流付钱。
  - 先从买方侧起步，并从现有文档里预填发布包，能在最初几轮试点里绕开供应商采纳阻力。
  - 围绕重复复材零件家族做一套窄模板库，会比围着每种稀奇几何形状做定制咨询，更容易扩起来。
gtm:
  wedge: 拿一个存在反复设计修订的航空航天或国防项目卖出付费试点，把下一轮紧急 RFQ 周期当成强触发点；价值证明则看澄清轮次有没有下降、报价比较有没有变快、首件是不是更快 ready。
  channels:
  - 创始人主导，直接卖给制造工程总监、供应链负责人和硬件 VP
  - 通过已批准的复材供应商和供应商质量顾问做 design-partner 转介绍
  - 等发布包格式跑通后，再通过 PLM、QMS 和 approved-supplier 工作流做集成式分发
  funnelTargets: 线索到合格试点 15-25%，合格试点到付费试点 30-40%，付费试点到生产 60%+，首个项目到第二个零件家族扩展在 9 个月内达到 50%+。
  pricing: 按活跃项目或零件家族工作流收年费；首个项目上线收一次实施与模板配置费；供应商工作区或 RFQ 事件再叠加可选的按量收费。这样定价更贴合买方触发点，因为他们的痛是每一轮重复发布，而不是每一个 seat。
businessModel:
  revenueStreams:
  - 复材发布包和首件工作流管理的软件年费
  - 首个项目上线时的实施与模板配置费用
  - 供应商能力分析、质量历史和更深审批流程的扩展模块
  unitOfValue: 通过发布系统管理的活跃复材项目或零件家族工作流
  targetGrossMarginPct: 70
  expansionLevers:
  - Expand from one recurring part family to all composite part families inside the same program
  - Add more approved suppliers and first-article workflows under the same customer account
  - Layer supplier capability, tooling reuse, and production-quality modules onto the core release workflow
strategyMap:
  northStarMetric: 每月有多少复材 RFQ 在无需人工返工的情况下，被转成已批准、可直接报价的发布包
  inputMetrics:
  - 从设计变更到供应商可执行发布包的小时数
  - 每份 RFQ 的供应商澄清轮次
  - 首轮发布包完整率
  - 试点到生产转化率
  - 从第一个零件家族扩到第二个零件家族的比例
  moatsToBuild:
  - 面向重复复材零件家族和审批模式的可复用模板库
  - 关于隐含制造假设差异的跨供应商报价归一化数据集
  - 与发布包版本和零件家族绑定的首件与供应商质量历史
  killCriteria:
  - 聚焦销售 12 个月后，在滩头市场签下的付费试点少于 3 个
  - 没有任何试点把供应商澄清轮次至少砍掉 30%，或把“设计修订到报价就绪发布包”的时间至少缩短 25%
  - 不到 50% 的试点能扩到第二个零件家族，说明流程没有变成重复使用
  mermaid: |
    flowchart LR
      Wedge[Composite release wedge] --> MVP[Buyer-side packet and FAI MVP]
      MVP --> Proof[Faster RFQ and approval proof]
      Proof --> Expansion[Supplier intelligence and multi-program expansion]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口很清楚，流程痛点也很急，但在真实试点证明买方会把“发布控制”按软件预算来买，而不是继续忍受表格和市场平台之前，判断仍只能维持在中等强度。
    whyBelieve: 公司瞄准的是一条窄而且合规负担重的采购流程。现有替代方案能标准化供应商或报价，却标准化不了那些真正拖慢定标和首件的复材假设。
    whyDoubt: 公司还要证明：供应商阻力、公开定价基准缺失，以及相邻市场平台现有厂商的压力，不会把 ACV 压低，也不会把业务推成重服务 onboarding。
    nextDiligence: 先拿下 3 个付费试点，并在一个重复复材项目里证明：RFQ 周转明显变快、澄清轮次更少，而且有可信的年费订阅转化路径。
  firstCustomer:
    title: 美国无人机或卫星 OEM 的复材制造工程负责人
    profile: 一家 50-250 人规模的航空航天或国防公司，每季度要把 25-200 个定制复材料号分给数家本土供应商，而且设计改动频繁。
    trigger: 测试失败、样机开造或小批量生产启动，会逼着团队在同一批供应商之间快速重拉报价、重做首件规划。
    buyer: 制造工程总监、供应链负责人，或硬件 VP
    initialContract: 先签一个 4-6 个月、$50k-$100k 的付费试点，覆盖单一项目；随后随着更多零件家族、供应商和审批流程进入生产，转成约 $120k-$180k ARR。
  mustBeTrue:
  - 至少有 100 个滩头市场账户，愿意为复材发布控制支付软件级预算，而不是继续用邮件、表格和现有采购工具。
  - 买方侧发布包工作流能把澄清轮次和报价周转压到足够低，从而在单一真实项目里撑起续费理由。
  - 只要买方预填好大部分字段、并要求统一格式，供应商就会配合结构化发布包。
  - 模板库能覆盖重复零件家族，而不会把实施工作拖成定制工程服务。
  - 在滩头市场见顶前，公司能从发布包 authoring 继续扩到质量和供应商 intelligence。
  diligenceQuestions:
  - 目标客户当前一份复材 RFQ，究竟要吃掉多少工程小时和多少轮供应商澄清？
  - 试点之后真正签预算、决定续费的人是谁：制造工程、供应链，还是硬件 VP？
  - 已批准供应商里，有多大比例愿意在不做大量人工 onboarding 的前提下接受结构化发布包？
  - 在真实并行试点里，产品相对 Layup Parts、Xometry 和内部表格流程，具体赢在哪？
  - 要让客户相信它能上生产，v1 必须先交付哪些合规输出：AS9102 包、可追溯控制，还是 prime-specific 附录？
operatingAssumptions:
- assumption: 只要产品能在一个重复复材项目里降低排期风险、又不逼客户换供应商，买方就愿意为付费试点买单。
  basis: research.yaml
  validationTest: 在定义好的滩头市场里至少拿下 3 个付费试点，并把买方认可的 ROI 标准和周转时间、澄清轮次或首件就绪度绑定起来。
  decisionImpact: 如果这条不成立，公司就得下调 ACV 预期、转向 partner-led 部署，或进一步收窄到更紧迫的子市场。
- assumption: 相较于让供应商从空白表单开始填写，先由买方侧预填发布包，更能顶住供应商阻力。
  basis: idea.yaml
  validationTest: 在试点中，至少 70% 的受邀供应商能基于结构化发布包提交报价，且创业团队只需有限人工跟进。
  decisionImpact: 如果这条不成立，路线图就必须把抽取自动化和纯买方工作流排到供应商协作之前。
- assumption: 早期客户会接受按活跃项目或零件家族收费，而不是按 seat 的 SaaS 定价。
  basis: operator judgment
  validationTest: 在前 10 个合格商机里测试 3 套报价方案，确认多数客户更偏好按项目范围定价，且看得到清晰的扩展路径。
  decisionImpact: 如果这条不成立，包装方式和预测 ACV 都得重做，融资计划和销售效率要求也会跟着变。
- assumption: 一个小而精的初始模板库，已经能覆盖最常见的无人机、卫星和国防机体零件家族，让毛利率维持在目标线之上。
  basis: research.yaml
  validationTest: 跟踪前 5 个试点的实施投入，确认第二次部署之后上线时间明显下降，而不是一直横着走。
  decisionImpact: 如果这条不成立，公司要么进一步收窄滩头市场，要么在放大 GTM 前补足行业实施人才。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈无人机、卫星和国防机体项目里的 12-15 位制造工程、供应商质量和采购负责人。
  hypothesis: 滩头市场里反复出现的触发点就 3 个：设计修订、紧急样机 build 和小批量生产 kickoff。
  successMetric: 至少 10 位受访者确认其中一个触发事件，且有 5 位愿意分享匿名化的现状 RFQ 资料。
  owner: CEO
- horizon: 0–90 天
  experiment: 审计 3 家 design-partner 账户最近的复材 RFQ 包和变更单。
  hypothesis: 缺失的制造假设和审批材料，会在供应商报价前制造出可量化的发布包不完整和返工。
  successMetric: 3 家账户都能提供基线发布包样例，且至少 2 家能看到足以支撑付费试点的延误或返工。
  owner: 产品负责人
- horizon: 0–90 天
  experiment: 做一个“先读后写”的原型，把现有图纸和备注转成某个重复零件家族的结构化发布包。
  hypothesis: 如果 v1 能先从当前文档里预填字段，而不是第一天就逼客户改 authoring 流程，客户采纳会更快。
  successMetric: 1 家 design partner 在真实或影子 RFQ 上使用该原型，并且只需有限的创业团队协助就能补完整份发布包。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 跑 2-3 个付费试点，按周复盘发布包完整率、供应商澄清轮次和报价周转时间。
  hypothesis: 只做聚焦的发布包控制工作流，也能在公司补齐更广的供应商 intelligence 或深集成前，先跑出可量化 ROI。
  successMetric: 至少签下 2 个付费试点，且其中 1 个把澄清轮次压低 30%，或把“报价就绪”周转提速 25%。
  owner: CEO
- horizon: 90–180 天
  experiment: 在 5-8 家已批准供应商之间测试由买方强制统一的发布包格式。
  hypothesis: 只要买方发出去的是统一口径的发布包，而且平台尽量减少手工录入，供应商就会配合。
  successMetric: 供应商完成率至少 70%，且供应商中位响应时间不比现有手工流程更差。
  owner: 供应商成功负责人
- horizon: 180–360 天
  experiment: 上线 1 条 PLM 或 QMS 导出集成，并和 1 家供应商质量顾问跑通合作渠道。
  hypothesis: 轻量集成再叠加可信的实施伙伴，能加快试点转生产，而不会把公司拖成系统集成商。
  successMetric: 1 条集成在生产环境上线，且 1 个由伙伴带来的商机在 6 个月内转成付费试点。
  owner: GTM 负责人
operations:
- 让每条工作流从第一天起就经得起审计：保留版本历史、明确审批，并受控地处理图纸、材料和供应商记录。
- 先围绕重复零件家族把发布包模板做标准化，再决定要不要接那些高度定制的边角需求。
- 每周复盘客户记分卡：周转时间、澄清轮次、发布包完整率和试点扩展情况。
- 建立一张经过筛选的本土复材供应商和质量顾问网络，但不去当制造责任主体。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责搭出发布包 authoring、版本管理和工作流内核——这是产品相对市场平台和通用采购工具真正拉开差距的部分。
- role: 复材工作流与实施负责人
  startTiming: Month 0
  rationale: 把混乱的发布流程压成可复用模板，推动客户 onboarding，并避免产品漏掉关键制造上下文。
- role: 供应商质量与合规负责人
  startTiming: Month 4
  rationale: 把 AS9100、AS9102 和 prime-specific 文档要求编码进发布包检查和审批流程。
- role: 创始销售
  startTiming: Month 6
  rationale: 在首批 design partner 和 ROI 指标跑出来后，把创始人主导需求转成可重复的试点销售动作。
- role: 集成方向产品工程师
  startTiming: Month 9
  rationale: 把文档导入、PLM/QMS 导出和供应商协作产品化，避免扩张过程滑成一个个定制项目。
milestones:
- horizon: 0–12 个月
  items:
  - 在定义好的滩头市场里，签下 3 个来自无人机、卫星或国防机体客户的付费试点
  - 交付生产可用的发布包 authoring、版本控制、报价归一化视图和首件检查清单工作流
  - 至少在 1 个真实项目里证明：澄清轮次或“报价就绪”周转时间出现可量化改善
- horizon: 12–24 个月
  items:
  - 至少把 2 个试点转成年费生产合同，并在这些账户里扩到第二个零件家族
  - 上线可复用的供应商协作，以及 1 条导出到客户现有系统记录层的集成
  - 围绕滩头市场里最常见的零件家族，建起可复用模板库和供应商质量数据集
- horizon: 24–36 个月
  items:
  - 做到与研究中第 3 年 SOM 情景一致的约 100 个账户
  - 把供应商能力评分、工装复用和生产质量模块作为付费扩展上线
  - 把公司立成外包航空航天复材工作流里的中立发布控制层
risks:
- risk: 买方可能承认痛点存在，但因为表格和现有采购工具对很多项目“也还能用”，所以仍不愿意开新软件预算。
  likelihood: High
  impact: High
  mitigation: 把销售聚焦在那些有明确进度触发、而且零件家族会重复出现的场景上；每个付费试点都必须量化前后 ROI。
- risk: 如果结构化发布包被供应商视为额外工作，供应商参与度可能会卡住。
  likelihood: Medium
  impact: High
  mitigation: 先预填买方侧字段，从客户原本就合作的已批准供应商开始，并把结构化提交和“更快比价”绑定起来。
- risk: 早期部署可能滑向重服务，因为各家客户的复材要求差异太大。
  likelihood: Medium
  impact: High
  mitigation: 把 v1 限制在可重复零件家族上，严密跟踪实施工时，并拒绝那些不会反哺模板库的定制工作流。
- risk: 一旦品类跑出 traction，相邻现有厂商可能会补上一层轻量复材模板。
  likelihood: Medium
  impact: Medium
  mitigation: 更快把发布包版本管理、首件历史和跨供应商归一化数据做深——这些东西比给通用市场平台外挂一个模板更难补。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金，用来搭出创始产品与复材工作流团队，在滩头市场拿下 3 个付费试点，跑出第一版可复用发布包模板库、供应商 onboarding playbook，以及足够证明“试点能转生产”的集成和合规能力。
