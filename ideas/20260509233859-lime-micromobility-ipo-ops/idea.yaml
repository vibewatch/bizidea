jobsToBeDone:
  - job: >-
      When parking complaints threaten a permit renewal, help the regional fleet
      operations lead prioritize and dispatch the right interventions, so they
      can protect fleet caps without over-pulling vehicles.
    currentAlternative: Manual dispatch decisions based on spreadsheets, local manager judgment, and generic ops dashboards
    successMetric: Complaint response SLA attainment and fleet-cap retention at renewal
  - job: >-
      When a city partnership manager needs to defend or expand a deployment,
      help them package utilization and corrective-action evidence fast, so they
      can win permit renewals and negotiate higher allowed fleet sizes.
    currentAlternative: Ad hoc reporting assembled from BI exports, emails, and local ops notes
    successMetric: Time to produce city-ready renewal evidence and net change in permitted vehicles
