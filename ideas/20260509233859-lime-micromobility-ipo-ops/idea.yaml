problem: >-
  Shared micromobility operators still manage curb complaints, permit
  conditions, underperforming zones, and rebalancing crews across spreadsheets,
  dispatch tools, and city-specific reporting workflows. When parking
  complaints spike or a city tightens restrictions, operators often pull
  vehicles too broadly, which hurts utilization and pushes already-thin margins
  further underwater. As the category returns to public-market scrutiny, that
  fragmentation becomes existential because every complaint and every idle
  vehicle now affects both permit durability and the path to profitability.
targetUser:
  primary: Regional operations directors at shared e-bike and scooter operators managing 3-15 dense cities with active permit renewals
  secondary: City partnership managers responsible for municipal reporting and fleet-cap negotiations
  buyer: VP Operations or regional GM at a scaled micromobility operator
startupThesis:
  nonObviousInsight: >-
    In shared micromobility, the scarce asset is not vehicles or rider demand;
    it is city permission to keep enough vehicles deployed to reach density
    economics. The winning software layer will therefore optimize complaint
    response, curb compliance, and utilization together instead of treating them
    as separate ops dashboards.
  beachhead: >-
    North American scooter and e-bike operators renewing permits in
    complaint-sensitive downtown zones where parking response performance can
    determine fleet caps
  wedge: >-
    A curb compliance and fleet-yield control plane that predicts complaint
    hotspots, dispatches rebalance or retrieval tasks, and auto-generates
    city-ready performance evidence
  whyNowCatalyst: >-
    Lime's IPO filing makes clear that scaled micromobility operators must prove
    both profitability and city compliance at once, turning curb-ops software
    from a nice-to-have into a board-level operating lever.
  ventureScalePath: >-
    Start with shared scooters and e-bikes, then expand the same permit-plus-
    utilization workflow into delivery robots, carshare, robotaxi curb
    operations, and municipal curb-data infrastructure.
solution: >-
  The product ingests vehicle telemetry, ride demand, parking complaints, permit
  rules, and field-team activity into a block-level operating map for each city.
  It scores where vehicles are likely to become both low-yield and
  complaint-prone, then recommends or dispatches the right action: rebalance,
  retrieve, slow deployment, or tighten geofencing. Every intervention is tied
  to both recovered rides and complaint resolution so operators can see margin
  impact rather than just task completion. The system also auto-builds weekly
  city reports and permit-renewal evidence showing response times, hotspot
  trends, and corrective actions. Over time, it becomes the system of record
  between local ops teams and city partners for how fleet behavior is managed.
goToMarketSeed:
  firstCustomer: >-
    The regional ops leader at a top-3 U.S. micromobility operator running
    20,000+ vehicles across five to ten cities where at least two permits renew
    within the next 12 months
  buyingTrigger: >-
    A permit renewal, threat of fleet-cap reduction, or visible surge in
    parking complaints in a flagship city
  currentAlternative: Manual workflow across spreadsheets, generic dispatch software, BI dashboards, and ad hoc city reporting
  switchingReason: >-
    The platform ties each field action to both complaint reduction and ride
    recovery, helping the operator defend permit capacity while cutting wasteful
    truck rolls and broad fleet pullbacks.
  pricingHypothesis: Annual SaaS fee per active city plus usage-based pricing per managed vehicle or completed compliance task
