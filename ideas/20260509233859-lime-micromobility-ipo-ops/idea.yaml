topRisks:
  - name: Concentrated buyer base
    description: The first market is dominated by a small number of scaled micromobility operators, which could slow early logo count.
    mitigation: Start with one or two flagship operators, then expand into regional fleets, campuses, delivery robots, and other curb-constrained mobility categories.
  - name: Fragmented city data
    description: Complaint feeds, permit terms, and enforcement workflows vary widely by city and may be hard to integrate cleanly.
    mitigation: Begin with operator-side telemetry and manual or CSV complaint imports, then productize the highest-value city templates before broad integration work.
  - name: Internal-tool competition
    description: Large operators may try to extend existing dispatch and analytics stacks instead of adopting a new vendor.
    mitigation: Own the permit-renewal evidence layer and cross-city benchmark dataset so the product delivers something internal ops tooling does not already provide.
