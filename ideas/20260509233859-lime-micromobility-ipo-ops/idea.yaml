differentiator: >-
  This is not another route optimizer or BI dashboard for fleet teams. The
  product makes city rules and complaint exposure first-class inputs to daily
  dispatch, then measures success by both rides recovered and compliance risk
  reduced. Its moat is the cross-city dataset of curb hotspots, response times,
  permit terms, and interventions that actually preserve fleet caps without
  killing utilization.
