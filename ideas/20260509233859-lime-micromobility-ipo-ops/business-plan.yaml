slug: curb-compliance-yield-os
date: '2026-05-10'
executiveSummary: >-
  Curb Compliance Yield OS should start as an operator-native control layer for
  North American shared scooter and e-bike fleets facing permit renewals or
  complaint spikes in dense downtown zones. The research supports the urgency:
  San Francisco complaint volume has risen with ridership, cities such as
  Chicago and El Paso impose explicit response obligations, and fleet caps make
  curb behavior a revenue constraint rather than a back-office nuisance. The
  best first customer is a regional operations leader at a top operator running
  multiple renewal-sensitive cities and accountable for both permit durability
  and local margins. The v1 product should ingest vehicle telemetry, complaint
  exports, permit rules, and crew actions to recommend or dispatch rebalance,
  retrieval, and deployment-suppression tasks while auto-building city-ready
  evidence packs. Go-to-market should begin with a paid flagship-city pilot sold
  against a live trigger such as a renewal, audit, or complaint surge, then
  expand city-by-city across the same operator once the product proves faster
  resolution and recovered rides. The deliberate tradeoff is to sit on top of
  existing fleet stacks instead of replacing them, because proof speed matters
  more than workflow breadth in this buyer-concentrated market. The strongest
  moat is a cross-city dataset linking complaint hotspots, interventions,
  response times, fleet-cap outcomes, and ride recovery. The biggest caveats are
  concentrated buyers, uneven city data quality, and the risk that large
  operators extend internal tooling instead of buying. Exact renewal calendars,
  budget ownership, and machine-readable complaint-feed coverage remain open
  diligence gaps and should be validated before the company scales headcount.
problem:
  - Shared micromobility operators still manage complaints, permit conditions, underperforming zones, and rebalance crews across spreadsheets, generic dispatch tools, and ad hoc city reporting, so response quality varies by city and shift.
  - When complaint pressure rises, operators often pull vehicles too broadly to protect permits, which reduces utilization and worsens already-thin margins even though some blocks only need targeted intervention.
solution:
  - Build a block-level control plane that combines telemetry, permit rules, complaint feeds, and crew activity to rank which vehicles or zones need rebalance, retrieval, geofence tightening, or slower deployment.
  - Auto-generate city-ready evidence on response times, hotspot trends, and corrective actions so operations and city-partnership teams can defend renewals and fleet caps with the same system used for daily dispatch.
whyWeWin:
  - The wedge matches a real trigger event because buyers already mobilize budget when a renewal, audit, or complaint spike threatens fleet caps in a flagship city.
  - The product can overlay existing fleet stacks and MDS or GBFS data instead of forcing system replacement, which shortens time to pilot in a market with high buyer power.
  - Defensibility compounds from cross-city benchmarks on which interventions reduce complaints without sacrificing rides, not from generic routing or dashboard features.
strategicChoices:
  beachhead: North American scooter and e-bike operator-city deployments in dense downtown zones where complaint response and parking compliance influence permit renewal or fleet-cap decisions.
  wedgeRationale: The permit-defense workflow creates faster proof than broader fleet software because one city can show measurable complaint-SLA performance, fleet-cap retention, and ride recovery within a quarter, while a full stack replacement would trigger longer IT, procurement, and adoption cycles.
  sequencingRationale: >-
    Start with a flagship-city overlay product that uses existing operator data,
    manual or CSV complaint imports, and human-reviewed recommendations because
    the first risks are trust and data heterogeneity, not algorithmic ambition.
    Sell founder-led into live renewal or complaint events, prove one city, then
    expand across the same operator before adding channel partners or adjacent
    mobility categories. Hire first for integrations and pilot execution, then
    for repeatable implementation only after pilot-to-production conversion is
    real.
  notYet:
    - Full operator platform replacement across rider app, payments, IoT, and maintenance.
    - City-government system of record sales motion before the operator wedge is repeatable.
    - Low-density cities or campus fleets where complaint intensity and permit leverage are weaker.
    - Delivery robots, carshare, and robotaxi curb workflows before the scooter and e-bike benchmark layer is trusted.
market:
  tam: Estimated $25.0M TAM across roughly 125 dense, complaint-sensitive North American operator-city deployments at about $200k annual software spend each.
  sam: Estimated $10.8M SAM for about 60 renewal-heavy North American operator-city deployments inside the top multi-city operators at roughly $180k annual spend each.
  som: Estimated $1.2M year-3 SOM assuming 8 live city deployments across 1-2 scaled operators at about $150k ARR per deployment after pilot conversion.
  segments:
    - Multi-city shared scooter and e-bike operators with active downtown permit programs.
    - City-partnership and regulatory teams inside those operators that assemble renewal and compliance evidence.
  buyingProcess: >-
    The operational champion is usually a regional operations leader or city
    partnerships lead, but the economic decision typically sits with the VP
    Operations or regional GM because the spend must be justified against permit
    risk and per-city margin. The fastest path is a paid pilot in one
    renewal-sensitive city, followed by expansion across the same operator once
    the company proves complaint reduction and ride recovery.
product:
  mvp: >-
    The MVP should cover one flagship city, ingest telemetry, complaint exports,
    permit rules, and crew-task data, and produce ranked intervention
    recommendations with auditable action logs and a city-ready reporting pack.
    It should avoid autonomous fleet control, bespoke city integrations, and
    broad maintenance workflows until one operator shows repeatable permit and
    margin outcomes.
  sixMonth: Launch one paid pilot in a renewal-sensitive city with complaint hot-spot scoring, dispatcher tasking, response-time tracking, and weekly permit-defense reporting.
  twelveMonth: Standardize city-rule templates, add ROI measurement linking interventions to recovered rides and reduced complaints, and support 3-5 production city deployments across 1-2 operators.
  twentyFourMonth: Expand into multi-city planning, benchmark-guided geofence and deployment policy recommendations, and the first adjacent curb-managed fleet workflow only after the micromobility wedge converts reliably.
  keyBets:
    - Operators will fund a narrow flagship-city pilot before demanding broader fleet-stack replacement.
    - Complaint and permit data can be normalized enough with operator-side feeds and lightweight imports to prove value without heavy municipal integration work.
    - Buyers will pay for permit defense and ride recovery together rather than for compliance reporting alone.
    - Cross-city intervention benchmarks will create a stronger moat than city-specific services work.
gtm:
  wedge: Sell a paid flagship-city pilot to a top operator when a permit renewal, fleet-cap review, audit, or complaint surge creates immediate downside risk, then convert to annual per-city software once the buyer sees faster complaint resolution, fewer unnecessary pullbacks, and a defendable renewal evidence pack.
  channels:
    - Founder-led direct sales to VP Operations, regional GM, and city-partnership leaders at scaled micromobility operators.
    - Expansion from one flagship-city pilot to additional cities inside the same operator account.
    - Select referrals from permit advisors, mobility policy consultants, and upstream fleet-stack or IoT vendors once the overlay motion is proven.
  funnelTargets: 8-10 target operator conversations per quarter -> 20-30% paid pilot rate -> 50%+ pilot-to-production conversion -> 70%+ first-operator expansion to a second city within 9 months of go-live.
  pricing: 8-12 week paid pilot priced at roughly $25k-$75k for one flagship city, then $100k-$200k annual SaaS per active city plus a per-managed-vehicle or per-compliance-task fee; this fits the researched mid-five-figure to low-six-figure city spend range and the idea pricing hypothesis while aligning price to permit-defense value and field activity.
businessModel:
  revenueStreams:
    - Annual SaaS subscription per active operator-city deployment.
    - Usage-based fees tied to managed vehicles or completed compliance interventions.
    - Implementation and premium reporting fees for new city rollouts or renewal evidence packs.
  unitOfValue: Live operator-city deployment with vehicles and complaint workflows managed by the platform.
  targetGrossMarginPct: 70
  expansionLevers:
    - Roll from one flagship city to more cities under the same operator.
    - Add premium renewal, audit, and benchmarking modules once the daily workflow is embedded.
    - Extend the same permit-plus-utilization workflow into adjacent curb-managed fleets after the micromobility dataset is differentiated.
strategyMap:
  northStarMetric: Annualized rides recovered per live city while meeting city complaint-response obligations.
  inputMetrics:
    - Median complaint-to-action resolution time by city.
    - Percentage of flagged vehicles or zones receiving the recommended intervention.
    - Complaint recurrence rate in treated hotspots.
    - Pilot-to-production conversion by operator-city.
    - Expansion rate from first city to second city within the same operator.
  moatsToBuild:
    - Cross-city dataset linking complaint type, curb context, intervention, response time, and ride recovery.
    - Reusable templates for city permit logic, designated parking rules, and audit-ready evidence generation.
    - Trust layer of auditable operator actions and outcomes that internal dashboards and generic fleet tools do not preserve by default.
  killCriteria:
    - If the first 3 paid pilots fail to show either a measurable complaint-resolution improvement or avoided broad fleet pullbacks within 12 weeks, the wedge is too weak.
    - If fewer than 2 of the first 8 qualified operator opportunities will fund a paid pilot tied to a live renewal or complaint trigger, the buying motion is wrong.
  mermaid: |
    flowchart LR
      Wedge[Permit-defense flagship-city pilot] --> MVP[Complaint-aware tasking and evidence pack]
      MVP --> Proof[Faster SLA response and recovered rides]
      Proof --> Expansion[Multi-city rollout then adjacent curb-managed fleets]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Medium conviction because the pain, trigger, and buyer are coherent, but venture scale depends on expansion inside a concentrated operator base and later adjacency into other curb-managed fleets.
    whyBelieve: Cities already enforce complaint response and parking rules operationally, so a narrow operator-native permit-defense workflow can create board-visible ROI faster than a broad fleet-software sale.
    whyDoubt: The initial software market is small and concentrated, and sophisticated operators may prefer internal tooling unless the startup proves uniquely faster pilot ROI and cross-city benchmark value.
    nextDiligence: Confirm that at least two top-operator prospects have renewal or complaint triggers in the next 12 months and will fund a paid flagship-city pilot with explicit success metrics.
  firstCustomer:
    title: Regional operations director at a top-3 U.S. micromobility operator
    profile: An operator managing 20,000+ vehicles across 5-10 North American cities with at least one dense downtown market facing permit renewal, complaint scrutiny, or fleet-cap review.
    trigger: A permit renewal, fleet-cap threat, audit, or visible spike in 311-style parking complaints in a flagship city.
    buyer: VP Operations or regional GM
    initialContract: $25k-$75k paid flagship-city pilot converting to roughly $100k-$200k annual per-city software plus usage fees if complaint response and ride recovery targets are met.
  mustBeTrue:
    - At least one scaled operator will fund a paid pilot before requiring a full fleet-stack replacement or custom city integration project.
    - The product can reduce complaint-response time or complaint recurrence in one city within a quarter without broad vehicle pullbacks.
    - Economic buyers will attribute pilot ROI to both permit defense and recovered rides, not treat the product as a reporting-only tool.
    - A repeatable expansion motion exists from one city to multiple cities inside the same operator account.
    - Cross-city intervention benchmarks remain differentiated versus internal dashboards, white-label fleet stacks, and city-side analytics vendors.
  diligenceQuestions:
    - Which top operators have the most renewal-sensitive or complaint-heavy cities in the next 12 months?
    - How much truck-roll and manager time is currently spent on complaint response versus true maintenance or routine rebalancing?
    - Who actually controls software budget when a fleet-cap threat emerges: regional operations, city partnerships, or central finance?
    - Why will Joyride, ATOM Mobility, goUrban, or internal BI not satisfy the first customer's need well enough?
    - How much of the complaint stream is truly actionable through operator intervention rather than rider behavior after trip end?
  riskHeatmap:
    - risk: Concentrated buyer base limits early logo count and pricing leverage.
      likelihood: High
      impact: High
      leadingIndicator: Fewer than 6 qualified operator conversations materialize in the first 2 quarters or all interest concentrates in a single operator account.
      mitigation: Focus on one flagship operator-city wedge, maximize multi-city expansion per logo, and validate adjacent curb-managed fleets before broad scaling.
    - risk: City complaint and permit data is too fragmented for repeatable deployment.
      likelihood: High
      impact: High
      leadingIndicator: More than half of pilot prospects require manual data wrangling beyond 2 weeks before a usable baseline can be built.
      mitigation: Start with operator telemetry plus CSV or 311 exports, build templates for the highest-value cities first, and avoid bespoke integrations in v1.
    - risk: Large operators extend internal tools or incumbent fleet stacks instead of buying.
      likelihood: Medium
      impact: High
      leadingIndicator: Qualified buyers repeatedly ask for roadmap promises or services-style custom builds instead of a paid pilot with standard product scope.
      mitigation: Position as a permit-defense overlay, prove ROI in one city fast, and build benchmark data and evidence-pack workflows that internal tools lack.
    - risk: Privacy and governance concerns slow deployment.
      likelihood: Medium
      impact: Medium
      leadingIndicator: City partnerships or legal teams block pilots because data-sharing, retention, or audit controls are insufficiently documented.
      mitigation: Use vehicle-level rather than rider-level data, ship clear audit logs and retention policies, and make governance review part of onboarding.
operatingAssumptions:
  - assumption: A meaningful subset of top North American operators has permit renewals or complaint-triggered reviews in the next 12 months that create urgency for a new workflow.
    basis: research.yaml
    validationTest: Build a renewal calendar for the top target operators and confirm at least 2 live city opportunities with dated permit or audit milestones.
    decisionImpact: If false, the GTM motion must shift from renewal-led selling to pure margin-recovery selling, which weakens urgency and may require lower pricing.
  - assumption: Operator-side telemetry plus lightweight complaint imports are enough to show value before deep city-system integrations.
    basis: research.yaml
    validationTest: Complete 2 pilot data-readiness audits and prove that one city can be operational within 30 days using existing operator feeds and manual complaint imports.
    decisionImpact: If false, the roadmap must fund heavier integration work earlier and the company may need more capital or a narrower city set.
  - assumption: Economic buyers will accept an overlay workflow that recommends or dispatches actions without replacing the incumbent fleet stack.
    basis: idea.yaml
    validationTest: Close 2 pilot scopes that explicitly preserve the current fleet stack while adding the startup's tasking and evidence layer.
    decisionImpact: If false, the company must either partner more deeply with incumbent vendors or expand into a broader platform sooner than planned.
  - assumption: Paid pilot pricing can convert into six-figure annual per-city software without relying on heavy services revenue.
    basis: research.yaml
    validationTest: Test pricing with 5 buyers and secure 1 written conversion path from pilot to production at or above $100k annualized per city.
    decisionImpact: If false, the company must raise pricing through more workflow value, target fewer but larger cities, or reassess venture-scale economics.
  - assumption: Cross-city intervention benchmarks will remain more valuable than a single-operator internal analytics layer.
    basis: operator judgment
    validationTest: During pilots, compare buyer interest in benchmark reporting versus raw dashboard access and confirm that at least 1 production customer cites benchmarks as a renewal or rollout driver.
    decisionImpact: If false, defensibility weakens and the company may need to pivot toward services, partnerships, or city-side distribution.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 8-10 regional operations and city-partnership leaders at scaled operators and map buying triggers, budget ownership, and renewal calendars.
    hypothesis: Permit renewals and complaint spikes create immediate pilot urgency with identifiable economic buyers.
    successMetric: At least 6 interviews confirm a live trigger and 2 prospects agree to pilot-scoping sessions.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run data-readiness audits on 2 prospective flagship cities using telemetry, complaint exports, and current crew-task data.
    hypothesis: One city can go live without bespoke municipal integrations or rider-level data.
    successMetric: One pilot city passes the audit with less than 30 days of integration and baseline setup work.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Launch one paid flagship-city pilot with complaint hot-spot scoring, dispatcher tasking, and weekly renewal-evidence reviews.
    hypothesis: The product can reduce response time and avoid unnecessary fleet pullbacks quickly enough to justify annual software.
    successMetric: Pilot shows a measurable complaint-resolution improvement or reduced complaint recurrence within 12 weeks and reaches an agreed production review.
    owner: Founding product/ops
  - horizon: 6–9 months
    experiment: Add one standardized city-rule template and one benchmark report comparing intervention outcomes across 2 cities.
    hypothesis: Reusable templates and benchmark insight improve deployment speed and strengthen differentiation versus internal BI.
    successMetric: Second city deployment time falls below 3 weeks and buyers cite benchmark reporting in expansion decisions.
    owner: Founding eng
  - horizon: 9–15 months
    experiment: Convert the first pilot into a multi-city rollout inside the same operator and test a light referral motion with one permit advisor or fleet-stack partner.
    hypothesis: Same-account expansion is cheaper than new-logo acquisition and partner referrals become credible only after one proof point.
    successMetric: First operator adds a second city and at least 1 partner-sourced qualified opportunity enters pipeline.
    owner: Founder CEO
  - horizon: 12–18 months
    experiment: Test the first adjacent curb-managed fleet use case using the same complaint-plus-utilization workflow in a design-partner setting.
    hypothesis: The micromobility benchmark layer can extend into another curb-managed fleet without rebuilding the core product.
    successMetric: One adjacent design partner validates overlapping data model and agrees to a scoped pilot or paid proof of concept.
    owner: Founding product/ops
operations:
  - Standardize a pre-pilot audit for telemetry coverage, complaint-feed quality, permit rules, and governance requirements before any contract is signed.
  - Run weekly pilot business reviews that tie complaint SLAs, hotspot recurrence, truck-roll volume, and recovered rides to the buyer's success criteria.
  - Keep city-rule templates, exception logs, and evidence-pack generation inside the product rather than delivering custom analyst reports.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Required for founder-led sales into a concentrated operator market and for navigating permit-driven buying triggers with executive buyers.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds ingestion, rule normalization, tasking logic, and the audit-ready data model that anchors the wedge.
  - role: Founding product/ops
    startTiming: Month 0
    rationale: Maps city-specific workflows, runs pilots, and turns field feedback into repeatable playbooks rather than custom services.
  - role: Data and integration engineer
    startTiming: Month 3-6
    rationale: Needed once the first pilot is live to standardize city templates, telemetry pipelines, and benchmark reporting without slowing core product work.
  - role: Customer success and implementation lead
    startTiming: Month 9-12
    rationale: Supports multi-city rollout, governance reviews, and weekly business reviews after pilot-to-production conversion is proven.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 2 design partners and convert at least 1 into a paid flagship-city pilot.
      - Prove measurable complaint-resolution improvement or reduced hotspot recurrence in one city within 12 weeks.
      - Ship complaint-aware tasking, city-rule templates for at least 2 cities, and the first audit-ready evidence pack.
      - Convert the first pilot into an annual production contract with a defined second-city rollout.
  - horizon: 12–24 months
    items:
      - Reach 3-5 live city deployments across 1-2 operators and standardize a deployment playbook that does not rely on bespoke analyst work.
      - Establish benchmark reporting across multiple cities and use it to drive at least 1 same-account expansion.
      - Validate one partner referral channel and one adjacent curb-managed fleet experiment without distracting the core micromobility wedge.
  - horizon: 24–36 months
    items:
      - Reach the researched year-3 SOM of about $1.2M ARR through roughly 8 live city deployments.
      - Show repeatable multi-city expansion economics inside landed operator accounts.
      - Decide whether to deepen into adjacent curb-managed fleets or remain focused on the highest-value micromobility workflows based on retention and benchmark pull.
risks:
  - risk: Concentrated buyer base slows logo acquisition and weakens negotiating power.
    likelihood: High
    impact: High
    mitigation: Focus on same-account multi-city expansion, keep the product narrow enough for fast pilots, and validate adjacency before scaling spend.
  - risk: Fragmented city complaint and permit data make deployments too manual.
    likelihood: High
    impact: High
    mitigation: Start with operator-side data, standardize templates for the highest-value cities, and refuse bespoke integrations that do not improve repeatability.
  - risk: Internal tools or incumbent fleet platforms absorb the wedge.
    likelihood: Medium
    impact: High
    mitigation: Win on speed to permit-defense proof, preserve benchmark data across cities, and stay positioned as an overlay rather than a replacement.
  - risk: Governance or privacy reviews delay launches and expansions.
    likelihood: Medium
    impact: Medium
    mitigation: Minimize rider-level data, document controls early, and make auditability part of the default product experience.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund the founding product and GTM team, 2-3 flagship-city pilots, the first repeatable city templates and benchmark reports, and the implementation capacity needed to turn one operator proof point into multi-city production references.
