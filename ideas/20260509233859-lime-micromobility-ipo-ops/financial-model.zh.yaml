slug: curb-compliance-yield-os
date: '2026-05-10'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起点现金
  value: '0'
  unit: USDK
  source: "[建模惯例] 资金需求单独在 fundingAsk 中披露，不把融资到账前的现金余额混进期初假设。"
- id: A2
  name: 第 1 年客户增长节奏
  value: 第 5 个月上线首个付费城市，第 10 个月上线第二个城市；第 1 年末有 2 个付费城市
  unit: deployment timeline
  source: "[BP 里程碑] 12 个月内完成 1 个付费试点、首份年度合同及第二城市部署路径。"
- id: A3
  name: 第 2 年客户增长节奏
  value: 第 2 年第 1 至第 4 季度末分别为 3、4、5、6 个城市
  unit: deployments EOP
  source: "[BP 里程碑 12–24 个月] 在 1–2 家运营商中覆盖 3–5 个城市；模型在第 24 个月后同账户扩展一次，取整至 6 个城市。"
- id: A4
  name: 第 3 年客户增长节奏
  value: 第 3 年第 1 季度 7 个城市，第 3 年第 2 季度起 8 个城市
  unit: deployments EOP
  source: "[BP 里程碑 24–36 个月] 第 3 年约 8 个城市。"
- id: A5
  name: 每实时城市混合 ARR
  value: '155'
  unit: USDK per year
  source: "[BP gtm.pricing] [BP market.som] [RS market.som] 年度 SaaS 10 万–20 万美元加上适度用量/实施收入的中点值。"
- id: A6
  name: 稳态毛利率
  value: '70'
  unit: percent
  source: "[BP businessModel.targetGrossMarginPct] 第 3 年主要 P&L 毛利率接近 70%。"
- id: A7
  name: COGS 结构
  value: 16% 可变平台成本，加上第 4 季度（第 1 年）起的一名实施负责人，以及每城市每季度约 1,500 美元的数据/托管支持
  unit: mixed
  source: "[BP operations] [RS regulatoryTechnicalConstraints] 参考城市逐城上线时偏重客户支持和治理审查的企业软件交付经验法则。"
- id: A8
  name: 创始人 / GTM 全成本现金薪酬
  value: '120'
  unit: USDK per year
  source: "[BP team] Pre-seed 阶段低于市场水平的创始人薪资经验法则，含工资税和福利。"
- id: A9
  name: 工程师全成本薪酬
  value: '180'
  unit: USDK per FTE per year
  source: "[BP team] 资深全栈/数据工程师（含工资税和福利）的创业财务经验法则。"
- id: A10
  name: 产品/运营全成本薪酬
  value: '144'
  unit: USDK per FTE per year
  source: "[BP team] 创始产品运营负责人（含工资税和福利）的创业财务经验法则。"
- id: A11
  name: 客户成功/实施全成本薪酬
  value: '120'
  unit: USDK per FTE per year
  source: "[BP team] 实施负责人（含工资税和福利）的创业财务经验法则。"
- id: A12
  name: 销售/GTM 全成本薪酬
  value: '156'
  unit: USDK per FTE per year
  source: "[BP gtm] 一名企业 AE/BD（含工资税和福利）的创业财务经验法则。"
- id: A13
  name: 非薪资运营支出
  value: 第 1 年薪资和 COGS 之外总计 1.6 万–2 万美元/月；第 2 年 6.1 万–6.7 万美元/季度；第 3 年 7.2 万–7.5 万美元/季度
  unit: USDK
  source: "[BP fundingAsk.useOfFundsSummary] [RS reportMemo.distributionChannels] 参考企业试点里差旅、法律、保险、数据工具和合规审查支出的经验法则。"
- id: A14
  name: 混合客户获取成本
  value: '85'
  unit: USDK per live city
  source: "[BP gtm.funnelTargets] 创始人主导企业销售经验法则，付费试点转化率 20%–30%，试点到生产转化率 50%+。"
- id: A15
  name: 月度客户流失率
  value: '2.0'
  unit: percent
  source: "[RS reportMemo.sensitivityCases] 反映账户集中、许可证续期风险和城市逐城市合同波动性的经验法则。"
- id: A16
  name: 资金应急储备
  value: '15'
  unit: percent
  source: "[BP risks] [RS openQuestions] 针对集成延期、合规审查和许可数据差异的经验法则储备。"
