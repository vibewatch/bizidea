scenarios:
  downside:
    description: 首个试点转化拖慢，账户扩城也没有按计划发生，到第 3 年底只跑到 6 个城市，混合 ARR 还落在研究确认区间的低位。
    y3RevenueK: 833.8
    y3EbitdaK: -661.5
    cashLowPointK: -1799.0
    keyAssumptionChanges:
    - 每城市混合 ARR 降至 14.5 万美元。
    - 第 3 年客户增长节奏：5、6、6、6 个城市。
    - 稳态毛利率因实施工作仍偏劳动密集而降至 66%。
  base:
    description: 基础情形下，第 12 个月跑通首次试点转化，随后完成一次同账户扩城，到第 3 年第 2 季度站上 8 个城市，单城市混合 ARR 约 15.5 万美元。
    y3RevenueK: 1201.3
    y3EbitdaK: -369.4
    cashLowPointK: -1559.0
    keyAssumptionChanges:
    - 第 12 个月完成试点转化，第 2 年进行第二城市扩张。
    - 含适度用量费的每城市混合 ARR 维持在 15.5 万美元。
    - 第 3 年团队保持精简至 7 人，含一名实施负责人。
  upside:
    description: 同账户扩城提前发生，第二家运营商也按时进来，用量费把单城市混合 ARR 再往上抬一截。
    y3RevenueK: 1526.3
    y3EbitdaK: -82.4
    cashLowPointK: -1439.0
    keyAssumptionChanges:
    - 高级报告和用量费将每城市混合 ARR 提升至 16.5 万美元。
    - 第 3 年客户增长节奏：8、9、10、10 个城市。
    - 随着上线模板成熟，稳态毛利率提升至 74%。
sensitivity:
- variable: ARPU
  downsideCase: 每城市年化混合 ARR 14.5 万美元
  baseCase: 每城市年化混合 ARR 15.5 万美元
  upsideCase: 每城市年化混合 ARR 16.5 万美元
  y3RevenueImpactK: -77.5
  cashImpactK: -93.0
- variable: CAC
  downsideCase: 因试点需要更多差旅和证明工作，每实时城市 CAC 升至 11 万美元
  baseCase: 每实时城市 8.5 万美元
  upsideCase: 同账户转介降至每实时城市 7 万美元
  y3RevenueImpactK: -38.8
  cashImpactK: -150.0
- variable: 流失率
  downsideCase: 许可证重置或运营商整合导致月流失率 3.0%
  baseCase: 月流失率 2.0%
  upsideCase: 工作流嵌入和基准吸引力带动月流失率降至 1.0%
  y3RevenueImpactK: -116.2
  cashImpactK: -180.0
- variable: 销售周期
  downsideCase: 从首次会面到生产上线 9 个月
  baseCase: 从首次会面到生产上线 6 个月
  upsideCase: 续期触发的紧迫性缩短至 4.5 个月
  y3RevenueImpactK: -155.0
  cashImpactK: -220.0
- variable: 毛利率
  downsideCase: 稳态毛利率 66%
  baseCase: 稳态毛利率 70%
  upsideCase: 稳态毛利率 74%
  y3RevenueImpactK: 0.0
  cashImpactK: -72.0
- variable: 招聘节奏
  downsideCase: 销售人员和第三名工程师提前两个季度入职
  baseCase: 第 3 年第 1 季度前维持 6 人，此后 7 人
  upsideCase: 在 8 个城市经验证后再新增第三名工程师
  y3RevenueImpactK: 0.0
  cashImpactK: -165.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> LiveCities
      LiveCities --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 营收引擎
  finding: 基础情形的营收引擎很直接：第 1 年末先站住 2 个付费城市，到第 24 个月扩到 6 个，再在第 3 年把 8 个城市稳定在约 15.5 万美元的单城市混合 ARR 上。
- checkName: 必须落地的假设
  finding: 旗舰城市首个试点必须在第 12 个月前转正，并顺手证明第二城市怎么扩出去，否则精简的 7 人团队撑不起第 2 年的产能爬坡。
- checkName: 模型崩溃条件
  finding: 只要销售周期拖到 9 个月，或单城市混合 ARR 掉到 14.5 万美元，第 3 年营收就会滑到约 100 万美元以下，额外资金缺口也会多出 20 万美元以上。
- checkName: 下一轮融资依据
  finding: 如果能在 pre-seed 储备耗尽前跑出 5–6 个城市、可被引用的基准报告和一个看得见的同账户扩城案例，就足够支撑下一轮融资叙事。
sanityChecks:
  ruleOf40: Y3 growth 72.2% + EBITDA margin -30.8% = 41.5%
  burnMultiple: Y3 net burn $369.4K / net new revenue $503.7K = 0.7x
  revenuePerFte: 第 3 年 7 人时人均营收 17.2 万美元（低于 SaaS 普遍基准；仅当部署保持模板化时可接受）
  flags:
  - 营收集中度仍偏高，模型在第 3 年 ARR 上仍依赖 1–2 家规模化运营商。
  - 人均营收低于 SaaS 普遍基准，部署工作必须保持模板化，不能滑向服务项目。
  - 模型假设城市数据可通过轻量级导入完成接入；若需大量定制集成，燃烧率和毛利率将低于计划。
  - 融资规模相对 BP 范围偏保守，在证明点到达之前招聘的余地更少。
