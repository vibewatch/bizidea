reportMemo:
  executiveTakeaways:
    - >-
      The real bottleneck in shared micromobility is not rider demand but city permission to keep
      dense fleets on the street.
    - >-
      The wedge is credible because complaint response, curb compliance, and utilization are already
      being managed together by city programs, but mostly through manual or generic tooling.
    - >-
      The initial software market is concentrated rather than massive, which makes a land-and-expand
      strategy into adjacent curb-managed fleets necessary for venture scale.
    - >-
      Competition is fragmented between operator-stack vendors and city-side analytics vendors,
      leaving room for an operator-native compliance-yield control plane.
  marketDefinition: >-
    Operator software for multi-city shared scooter and e-bike fleets that turns permit rules,
    complaint signals, and curb constraints into daily dispatch and fleet-allocation decisions.
  customerAndBuyer: >-
    Primary users are regional operations leaders and city-partnership managers at scaled
    micromobility operators; the economic buyer is typically the VP of Operations or regional GM who
    owns both permit durability and per-city margins.
  buyingTriggers:
    - point: >-
        A permit renewal, fleet-cap review, or city audit that forces the operator to prove parking
        discipline and response performance.
      sourceRefs:
        - 5
        - 7
        - 9
        - 10
    - point: >-
        A visible spike in 311 or neighborhood complaints that raises ADA, public-relations, or
        enforcement risk.
      sourceRefs:
        - 5
        - 6
        - 8
        - 11
        - 12
    - point: >-
        Board or investor pressure to show that utilization gains are not coming at the cost of city
        compliance.
      sourceRefs:
        - 1
        - 3
        - 4
  willingnessToPay:
    summary: >-
      Operators already absorb permit fees, citation risk, manual response SLAs, and rebalancing
      labor. A product that protects fleet caps and cuts broad fleet pullbacks can justify
      mid-five-figure to low-six-figure annual spend per city, especially when enterprise fleet
      software already prices above a self-serve floor and cities impose explicit response
      obligations.
    sourceRefs:
      - 5
      - 7
      - 8
      - 10
      - 20
      - 26
  competitiveLandscape: >-
    Most alternatives either run the generic fleet stack for operators or help cities regulate
    mobility from the other side of the table. That leaves a gap for software that is explicitly
    operator-native, city-aware, and measured by both rides recovered and complaints resolved.
  incumbentThesis:
    - incumbentClass: White-label fleet stacks
      point: >-
        They cover apps, IoT, and zone management, but they are broad operator systems of record
        rather than a purpose-built permit-defense workflow.
      sourceRefs:
        - 19
        - 20
        - 21
    - incumbentClass: City-side mobility platforms
      point: >-
        They are strong at enforcement, curb rules, and fee reporting for regulators, but not
        optimized for operator margin tradeoffs or crew dispatch inside the fleet org.
      sourceRefs:
        - 16
        - 17
        - 18
    - incumbentClass: IoT and telematics vendors
      point: >-
        They supply telemetry and hardware control, but they do not decide which complaint-prone
        vehicles to move, retrieve, or suppress by block.
      sourceRefs:
        - 19
        - 22
    - incumbentClass: Open standards and in-house tooling
      point: >-
        MDS and GBFS lower integration friction, which makes workflow design, intervention
        benchmarking, and permit-specific playbooks more defensible than raw API access.
      sourceRefs:
        - 14
        - 23
        - 24
  regulatoryLandscape: >-
    Shared micromobility regulation in North America is city-by-city and operational, not merely
    annual paperwork. Parking rules, fleet caps, geofences, complaint SLAs, data-sharing, and
    designated parking requirements all directly shape daily fleet decisions.
  technologyLandscape: >-
    The enabling data plumbing is mature: operators can ingest MDS, GBFS, telemetry, and open-data
    feeds today. The hard part is normalizing city rules, stitching complaints into field actions,
    and proving which interventions preserve permits without crushing utilization.
  distributionChannels:
    - point: >-
        Direct enterprise sales into operations leadership during permit renewal windows or after a
        complaint spike.
      sourceRefs:
        - 5
        - 6
        - 7
    - point: >-
        Flagship-city pilots that expand across the same operator footprint once integrations and
        reporting templates are proven.
      sourceRefs:
        - 9
        - 14
        - 23
    - point: >-
        Co-selling or integrating with city-side or hardware vendors that already sit in the data
        path.
      sourceRefs:
        - 16
        - 18
        - 22
        - 24
  partnershipEcosystem:
    - point: MDS and GBFS ecosystem partners reduce integration time with city programs and public feeds.
      sourceRefs:
        - 14
        - 23
        - 24
    - point: >-
        Fleet-stack and IoT vendors are likely upstream data sources rather than must-displace
        incumbents.
      sourceRefs:
        - 19
        - 20
        - 21
        - 22
    - point: >-
        Curb and parking analytics partners can enrich smart-zone, corral, and loading-zone context
        in dense downtowns.
      sourceRefs:
        - 17
        - 18
        - 25
  dataMoats:
    - point: >-
        A cross-city dataset of complaint hotspots, interventions, and post-action ride recovery can
        become a unique benchmark layer.
      sourceRefs:
        - 6
        - 25
    - point: >-
        Normalizing permit terms, SLAs, and designated-parking logic across cities creates reusable
        operational playbooks.
      sourceRefs:
        - 5
        - 7
        - 8
        - 9
        - 10
        - 11
        - 12
        - 14
    - point: >-
        Linking compliance actions to utilization outcomes creates a higher-value benchmark than raw
        trip or fleet telemetry alone.
      sourceRefs:
        - 1
        - 3
        - 21
  geographicConsiderations:
    - point: >-
        The sharpest initial demand is in U.S. downtown programs with explicit complaint enforcement
        and fleet-cap leverage.
      sourceRefs:
        - 5
        - 7
        - 8
        - 9
        - 10
        - 11
        - 12
    - point: >-
        Tourism-heavy and ADA-sensitive cores magnify the cost of misparking and make designated
        parking programs more valuable.
      sourceRefs:
        - 6
        - 10
        - 11
        - 12
        - 25
    - point: >-
        Expansion beyond the U.S. is plausible where city permitting is formalized, but rule
        heterogeneity raises onboarding cost.
      sourceRefs:
        - 3
        - 13
        - 14
  sensitivityCases:
    - case: Cities move toward more designated corrals, lock-to rules, and digital smart zones
      impact: >-
        Product value rises because block-level placement and auditable compliance actions become
        more measurable.
      sourceRefs:
        - 7
        - 10
        - 17
        - 25
    - case: Operator consolidation continues and logo count shrinks
      impact: >-
        Customer concentration rises, but account expansion value per operator also increases
        because surviving players run more cities.
      sourceRefs:
        - 1
        - 3
        - 4
    - case: Federal funding or domestic-content rules change hardware economics
      impact: >-
        Software budgets may tighten in the short term, but funded public programs can also make
        auditable compliance tooling easier to justify.
      sourceRefs:
        - 26
  validationPlan:
    - priority: high
      question: >-
        Which top-3 operators have North American permit renewals in the next 12 months and where
        are their highest-complaint zones?
      evidenceToGather: Operator-city renewal calendars, board packets, and city meeting agendas.
    - priority: high
      question: >-
        How much crew time and truck-roll cost is currently consumed by complaint response versus
        true maintenance?
      evidenceToGather: Pilot data from one operator city before and after workflow automation.
    - priority: medium
      question: >-
        What share of 311-style complaints are actually addressable by operator action rather than
        rider behavior noise?
      evidenceToGather: Historical complaint logs matched to vehicle telemetry and closure outcomes.
