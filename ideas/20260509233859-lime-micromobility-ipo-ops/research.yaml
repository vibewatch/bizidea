    supplierPower:
      score: 2
      rationale: >-
        Standards and multiple data suppliers reduce lock-in: operators can source fleet software,
        IoT, and public data from many vendors, and MDS/GBFS lower switching friction.
      sourceRefs:
        - 14
        - 19
        - 20
        - 21
        - 22
        - 23
        - 24
    buyerPower:
      score: 5
      rationale: >-
        The buyer pool is small and concentrated among scaled operators, while each account has high
        operational leverage and can demand pilots, integrations, and proof tied to permit outcomes.
      sourceRefs:
        - 1
        - 3
        - 5
        - 7
        - 9
    threatOfEntrants:
      score: 3
      rationale: >-
        The raw APIs are accessible and the market is visible, but city-specific playbooks,
        complaint-resolution data, and operator trust slow credible new entrants.
      sourceRefs:
        - 14
        - 15
        - 23
        - 24
    threatOfSubstitutes:
      score: 4
      rationale: >-
        Spreadsheets, dispatch tools, generic fleet platforms, and homegrown analytics already
        exist, so the startup must prove a sharper compliance-yield loop.
      sourceRefs:
        - 19
        - 20
        - 21
    competitiveRivalry:
      score: 4
      rationale: >-
        Adjacent vendors serve both sides of the market—operators and cities—creating overlap in
        data, reporting, and geofence workflows even if none owns the exact wedge yet.
      sourceRefs:
        - 16
        - 17
        - 18
        - 19
        - 20
        - 21
  pestle:
    - factor: political
      impact: negative
      point: Neighborhood complaints and ADA pressure can quickly harden permit terms or cap growth.
      sourceRefs:
        - 5
        - 6
        - 7
    - factor: economic
      impact: positive
      point: >-
        Record ridership and Lime’s return to public markets keep pressure on operators to buy tools
        that improve operating leverage.
      sourceRefs:
        - 1
        - 3
        - 4
    - factor: social
      impact: positive
      point: >-
        Transit connection and first/last-mile utility keep shared micromobility relevant in
        multimodal networks.
      sourceRefs:
        - 2
        - 3
        - 27
    - factor: technological
      impact: positive
      point: >-
        MDS, GBFS, and open-data norms make multi-city data ingestion feasible without bespoke
        one-off integrations in every market.
      sourceRefs:
        - 14
        - 23
        - 24
    - factor: legal
      impact: negative
      point: >-
        Explicit response-time SLAs, parking rules, and enforcement rights create measurable
        liability if operations slip.
      sourceRefs:
        - 5
        - 7
        - 8
        - 10
        - 11
        - 12
  adoptionFrictionMatrix:
    - friction: Fragmented complaint and permit data by city
      severity: high
      affectedBuyer: Regional operations director
      mitigation: Start with CSV, 311 exports, and operator telemetry before deeper city-system integrations.
      sourceRefs:
        - 5
        - 7
        - 8
        - 14
    - friction: Incumbent bias toward existing fleet stack or internal BI
      severity: high
      affectedBuyer: VP Operations
      mitigation: >-
        Position as a permit-defense layer that sits on top of existing tools and proves ROI in one
        renewal-heavy city.
      sourceRefs:
        - 19
        - 20
        - 21
    - friction: Concentrated buyer base
      severity: high
      affectedBuyer: CEO / GM
      mitigation: >-
        Land with one operator-city and expand across the same account and adjacent curb-managed
        fleets.
      sourceRefs:
        - 1
        - 3
        - 4
    - friction: Data-governance and privacy review
      severity: medium
      affectedBuyer: City partnerships lead
      mitigation: Use vehicle-level MDS data and documented privacy controls rather than rider-level data.
      sourceRefs:
        - 14
        - 24
market:
  tam:
    value: $25.0M
    rationale: >-
      Bottom-up estimate: 415 North American cities hosted bikeshare or scootershare systems in 2024
      [3]. Assume only 30% (about 125) are dense, complaint-sensitive deployments where a dedicated
      compliance-yield layer is justified, and estimate $200k annual software budget per deployment,
      anchored to custom enterprise mobility-software tiers above Atom’s €490/month floor and the
      added workflow burden of permit SLAs. 125 × $0.2M = $25.0M.
    isEstimate: true
    sourceRefs:
      - 3
      - 7
      - 20
  sam:
    value: $10.8M
    rationale: >-
      Beachhead constraint: model 60 North American operator-city deployments concentrated in top
      multi-city operators and renewal-heavy downtown programs, at roughly $180k annual spend each.
      60 × $0.18M = $10.8M.
    isEstimate: true
    sourceRefs:
      - 1
      - 3
      - 5
      - 6
      - 7
      - 9
      - 10
  som:
    value: $1.2M
    rationale: >-
      Reachable year-3 share assumes 8 live city deployments across 1-2 scaled operators at roughly
      $150k ARR per deployment after a pilot-to-rollout motion. 8 × $0.15M = $1.2M.
    isEstimate: true
    sourceRefs:
      - 1
      - 5
      - 7
      - 20
bottomUpSizingDrivers:
  - driver: Total addressable units
    value: 415 North American cities with bikeshare or scootershare systems in 2024
    source: '[3]'
  - driver: Beachhead fraction
    value: 30% of those cities (~125) modeled as dense, complaint-sensitive deployments
    source: calc from [3], [5]-[12]
  - driver: Estimated annual software budget per deployment
    value: $150k-$200k est. per operator-city
    source: '[20] + calc'
