problem: >-
  共享微出行运营商至今仍在电子表格、派单工具和各城市专属报告流程间手动处理路侧投诉、许可条件、低效区域和调度任务，导致各城市、各班次的响应质量参差不齐。当停车投诉激增或城市收紧管制时，运营商往往大范围撤车，反而拉低利用率，令本已微薄的利润率雪上加霜。随着该品类重回公开市场审视，这种碎片化运营已成生死攸关的问题——每一条投诉和每一辆闲置车辆，都同时影响许可证的稳固性和盈利路径。
targetUser:
  primary: 负责 3–15 个高密度城市的区域运营总监，这些城市均有进行中的许可证续期
  secondary: 负责政府报告和车队上限谈判的城市合作经理
  buyer: 规模化微出行运营商的运营副总裁或区域总经理
startupThesis:
  nonObviousInsight: >-
    在共享微出行领域，稀缺资源不是车辆或骑行需求，而是城市的许可配额——只有车队密度达到经济拐点，业务才能成立。制胜的软件层应将投诉响应、路侧合规与利用率统一优化，而不是分设孤立的运营看板。
  beachhead: 北美滑板车和电动单车运营商，重点是高投诉敏感型市中心区域的许可证续期——停车响应表现直接决定车队上限
  wedge: 一套路侧合规与车队收益管控平台：预测投诉热点，派发调度或撤车任务，并自动生成城市可用的合规证据报告
  whyNowCatalyst: >-
    Lime 的 IPO 招股书清楚表明，规模化微出行运营商必须同时证明盈利能力和城市合规，路侧运营软件已从可选项升格为董事会级别的战略杠杆。
  ventureScalePath: >-
    从共享滑板车和电动单车起步，再将同一套许可+利用率工作流延伸至配送机器人、共享汽车、无人出租车路侧运营及城市路侧数据基础设施。
solution: >-
  产品将车辆遥测、骑行需求、停车投诉、许可规则和外勤团队活动数据汇入各城市的街区级运营地图。系统评估哪些区域的车辆最可能同时出现低收益和高投诉风险，然后推荐或派发相应动作：调度、撤车、放缓投放或收紧地理围栏。每次干预都同时关联骑行恢复量和投诉解决情况，让运营商看到利润影响而非仅仅任务完成状态。系统还自动生成每周城市报告和许可证续期证据包，涵盖响应时间、热点趋势和纠正措施。长期来看，它将成为本地运营团队与城市合作方之间记录车队行为管理的权威系统。
goToMarketSeed:
  firstCustomer: >-
    排名前三的美国微出行运营商的区域运营负责人，旗下在 5–10 座城市运营超过 2 万辆车辆，且至少有两张许可证将在未来 12 个月内续期
  buyingTrigger: 许可证续期、车队上限削减威胁，或旗舰城市停车投诉数量的明显激增
  currentAlternative: 依赖电子表格、通用派单软件、BI 看板和临时城市报告的手工工作流
  switchingReason: >-
    平台将每次外勤行动与投诉减少和骑行恢复双向关联，帮助运营商在守住许可容量的同时，减少无效调车和大范围撤车。
  pricingHypothesis: 按活跃城市收取年度 SaaS 订阅费，叠加按管理车辆数或已完成合规任务数的用量计费
