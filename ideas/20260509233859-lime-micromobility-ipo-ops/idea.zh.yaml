problem: >-
  共享微出行运营商到今天还在电子表格、派单工具和各城市各自一套的报告流程之间，来回处理路侧投诉、许可条件、低效区域和调度团队。停车投诉一旦冒头，或某座城市开始收紧规则，运营商常见的做法是大面积撤车，结果是利用率先掉下去，本来就薄的利润率被继续吃掉。如今行业重新回到公开市场视线里，这种碎片化已经不是效率问题，而是生存问题——每一条投诉、每一辆闲置车辆，都会同时影响许可证能不能续、盈利能不能跑通。
targetUser:
  primary: 在 3-15 个高密度城市管理共享电动单车和滑板车业务、且正面对许可证续期的区域运营总监
  secondary: 负责市政报告和车队上限谈判的城市合作经理
  buyer: 规模化微出行运营商的 VP Operations 或区域总经理
startupThesis:
  nonObviousInsight: >-
    在共享微出行里，真正稀缺的不是车，也不是骑行需求，而是城市愿不愿意让足够多的车继续留在街面上。只有保住这个许可密度，单位经济模型才站得住。因此，赢的那层软件不会把投诉响应、路侧合规和利用率拆开看，而是把它们放进同一个决策闭环里。
  beachhead: 北美共享滑板车和电动单车运营商，重点切进那些市中心高投诉敏感区域里、停车响应表现会直接影响车队上限的许可证续期场景
  wedge: 一套路侧合规与车队收益控制台，既能预测投诉热点，也能派发调度或撤车任务，并自动生成给城市看的绩效证据
  whyNowCatalyst: >-
    Lime 的 IPO 申报已经把问题说透：规模化微出行运营商现在必须同时证明盈利和城市合规。路侧运营软件不再是可有可无的补充件，而是董事会会盯的经营杠杆。
  ventureScalePath: >-
    先从共享滑板车和电动单车切入，再把同一套“许可 + 利用率”工作流延伸到配送机器人、共享汽车、Robotaxi 路侧运营，以及城市路侧数据基础设施。
solution: >-
  产品把车辆遥测、骑行需求、停车投诉、许可规则和外勤团队活动汇进每座城市的街区级运营地图。系统会先判断哪些车辆或街区最可能同时出现低收益和高投诉风险，再给出或直接派发动作：调度、撤车、放缓投放，或收紧地理围栏。每次干预都同时挂上两条结果线——恢复了多少骑行量、解决了多少投诉——运营团队看到的不是“任务是否完成”，而是利润有没有被救回来。系统还会自动生成周报和续期证据包，把响应时间、热点变化和纠偏动作整理成城市能直接看的材料。时间拉长后，它会变成地方运营团队和城市合作团队之间关于车队行为管理的事实底账。
goToMarketSeed:
  firstCustomer: >-
    美国前三名微出行运营商中的区域运营负责人，管理 20,000+ 辆车、覆盖 5-10 座城市，并且未来 12 个月里至少有两张许可证要续
  buyingTrigger: 许可证续期、车队上限被削减的威胁，或旗舰城市停车投诉突然上升
  currentAlternative: 依赖电子表格、通用派单软件、BI 看板和临时城市报告拼起来的手工流程
  switchingReason: >-
    这套平台能把每一次外勤动作同时和投诉下降、骑行恢复连起来看，既帮运营商保住许可容量，也减少无效调车和大面积撤车。
  pricingHypothesis: 按活跃城市收年度 SaaS 费，再叠加按管理车辆数或完成合规任务数计费
