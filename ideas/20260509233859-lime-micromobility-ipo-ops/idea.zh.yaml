jobsToBeDone:
  - job: >-
      当停车投诉开始威胁许可证续期时，帮区域车队运营负责人判断先处理哪里、怎么派单，既保住车队上限，又别把车撤得过头。
    currentAlternative: 靠电子表格、本地经理经验和通用运营看板手动做派单判断
    successMetric: 投诉响应 SLA 达标率，以及续期时车队上限能否保住
  - job: >-
      当城市合作经理需要为一座城市争取续期或扩量时，帮他们快速拿出利用率和纠偏动作证据，好去谈更高的许可规模。
    currentAlternative: 从 BI 导出、邮件和地方运营备注里临时拼材料
    successMetric: 产出城市可用续期证据所需时间，以及许可车辆净变化量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: IPO 申报、公开财务数据和对停车投诉的直接点名，让信号足够可信；但证据集仍只建立在一篇经核验文章上。
  painIntensity:
    score: 5
    rationale: 运营商同时承受许可证风险和利润压力，这套工作流不是“最好有”，而是“没它不行”。
  wedgeClarity:
    score: 5
    rationale: 以投诉驱动的路侧任务调度加上可直接用于续期的报告，是一个买家明确、结果可量化的窄切口首产品。
  defensibility:
    score: 4
    rationale: 护城河可以来自跨城市绩效基准、城市规则模板和干预结果数据，这些不会自然长在通用派单工具里。
  ventureScale:
    score: 4
    rationale: 初始买家池不大，但这套控制层能延伸到相邻共享出行和自动驾驶路侧管理场景。
topRisks:
  - name: 买家池过于集中
    description: 第一市场基本被少数几家规模化微出行运营商把持，早期客户数量可能起得不快。
    mitigation: 先吃下一两家旗舰运营商，再沿着区域车队、校园、配送机器人和其他受路侧约束的出行品类往外扩。
  - name: 城市数据太碎
    description: 各城市的投诉数据流、许可条款和执法流程差别很大，干净接起来并不轻松。
    mitigation: 先从运营商侧遥测和手动/CSV 投诉导入起步，优先把最高价值城市模板做成产品，再决定哪些集成值得规模化。
  - name: 内部工具会来抢活
    description: 大型运营商可能选择扩展现有派单和分析系统，而不是再买一个新供应商。
    mitigation: 把许可证续期证据层和跨城市基准数据牢牢抓在自己手里，交付内部运营工具现在给不出来的价值。
