differentiator: >-
  这不是又一个为车队团队打造的路径优化器或 BI 看板。产品将城市规则和投诉敞口作为日常派单的一等输入，并以骑行恢复量和合规风险降低量双重衡量成效。护城河在于跨城市的路侧热点、响应时间、许可条款与干预措施数据集——正是这些数据让车队上限得以守住而不以牺牲利用率为代价。
