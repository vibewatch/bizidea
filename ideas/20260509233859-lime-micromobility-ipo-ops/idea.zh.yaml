    - 客户成功与城市专属上线引导
    - 与车队和派单系统的集成支持
    - 面向出行运营商的企业销售
jobsToBeDone:
  - job: >-
      当停车投诉威胁到许可证续期时，帮助区域车队运营负责人确定优先级并派发正确的干预措施，在不过度撤车的前提下守住车队上限。
    currentAlternative: 依赖电子表格、本地经理判断和通用运营看板的手动派单决策
    successMetric: 投诉响应 SLA 达标率和续期时的车队上限保留情况
  - job: >-
      当城市合作经理需要为部署申请续期或争取扩张时，帮助他们快速整理利用率和纠正措施证据，以赢得许可证续期并谈判更高的车队上限。
    currentAlternative: 从 BI 导出、邮件和本地运营记录临时拼凑的报告
    successMetric: 生成城市级续期证据的时间，以及许可车辆净变化量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: IPO 申请、披露的财务数据以及对停车投诉的明确提及构成了可信信号，但信源集合仅限于一篇经验证的文章。
  painIntensity:
    score: 5
    rationale: 运营商同时面临许可证风险和利润压力，底层工作流生死攸关，而非可有可无。
  wedgeClarity:
    score: 5
    rationale: 投诉驱动的路侧任务调度加上许可证就绪报告，是一个切口窄、买家清晰、结果可量化的首版产品。
  defensibility:
    score: 4
    rationale: 护城河来自跨城市绩效基准、城市规则工作流和干预数据——这些是通用派单工具不会自然积累的。
  ventureScale:
    score: 4
    rationale: 初始买家群体集中，但控制平台可延伸至邻近的共享出行和自动驾驶路侧管理市场。
topRisks:
  - name: 买家基数集中
    description: 初始市场主要由少数规模化微出行运营商主导，可能拖慢早期客户数量的增长。
    mitigation: 先与一两家旗舰运营商建立合作，再扩展至区域车队、校园、配送机器人及其他受路侧约束的出行品类。
  - name: 城市数据碎片化
    description: 各城市的投诉信息流、许可条款和执法流程差异显著，干净集成难度较高。
    mitigation: 先使用运营商侧遥测和手动/CSV 形式的投诉导入，再将最高价值城市的模板产品化，推迟大范围集成工作。
  - name: 内部工具竞争
    description: 大型运营商可能尝试扩展现有派单和分析系统，而非引入新供应商。
    mitigation: 拥有许可证续期证据层和跨城市基准数据集，让产品提供内部运营工具尚不具备的能力。
