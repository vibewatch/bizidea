differentiator: >-
  这不是给车队团队再多塞一个路线优化器或 BI 看板。产品把城市规则和投诉暴露面直接塞进每天的派单决策里，再用“恢复了多少骑行量、降了多少合规风险”来衡量成效。它的护城河，是那套跨城市沉淀出来的数据：路侧热点、响应时效、许可条款，以及哪些干预动作能在不砍利用率的前提下保住车队上限。
