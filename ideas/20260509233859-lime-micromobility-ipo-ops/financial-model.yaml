modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> LiveCities
      LiveCities --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by 2 paid cities exiting Y1, expansion to 6 live cities by month 24, and 8 live cities at roughly $155K ARR by Q2Y3.
- checkName: Must go right
  finding: The first flagship-city pilot must convert by month 12 and prove a second-city expansion path so the lean 7-FTE team can fill Y2 capacity.
- checkName: Model breaks if
  finding: If sales cycles stretch to 9 months or blended ARR slips to $145K, Y3 revenue falls below about $1.0M and cash need rises by more than $200K.
- checkName: Next-round proof
  finding: The next round is justified once 5-6 live cities, benchmark reporting, and one referenceable same-account expansion are in market before the pre-seed buffer is exhausted.
sanityChecks:
  ruleOf40: Y3 growth 72.2% + EBITDA margin -30.8% = 41.5%
  burnMultiple: Y3 net burn $369.4K / net new revenue $503.7K = 0.7x
  revenuePerFte: $172K Y3 with 7 FTE (below broad SaaS benchmark; acceptable only if deployments stay templated)
  flags:
  - Revenue concentration remains high because the model still relies on 1-2 scaled operators for most Y3 ARR.
  - Revenue per FTE is below broad SaaS benchmarks, so deployment work must stay templated rather than drifting into services.
  - The model assumes city data can be onboarded with light imports; heavier custom integrations would push both burn and gross margin below plan.
  - Funding ask is lean versus the BP range and therefore leaves less room for hiring ahead of proof points.
