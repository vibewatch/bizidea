scenarios:
  downside:
    description: One pilot slips, Y3 exits with only 6 live cities, and blended ARR settles near the low end of researched willingness to pay.
    y3RevenueK: 833.8
    y3EbitdaK: -661.5
    cashLowPointK: -1799.0
    keyAssumptionChanges:
    - Blended ARR per city drops to $145K.
    - Customer ramp lands at 5, 6, 6, and 6 live cities across Y3.
    - Steady-state gross margin falls to 66% because implementation remains labor-heavy.
  base:
    description: Base case converts the first pilot by month 12, lands one same-account expansion, and reaches 8 live cities by Q2Y3 at a blended $155K ARR per city.
    y3RevenueK: 1201.3
    y3EbitdaK: -369.4
    cashLowPointK: -1559.0
    keyAssumptionChanges:
    - Pilot conversion by month 12 and a second-city expansion during Y2.
    - Blended ARR per live city holds at $155K including modest usage fees.
    - Team stays lean at 7 FTE through Y3 with one implementation lead.
  upside:
    description: Same-account expansion lands faster, the second operator arrives on time, and usage fees lift blended ARR modestly above the base case.
    y3RevenueK: 1526.3
    y3EbitdaK: -82.4
    cashLowPointK: -1439.0
    keyAssumptionChanges:
    - Blended ARR per city rises to $165K on premium reporting and usage fees.
    - Customer ramp reaches 8, 9, 10, and 10 live cities across Y3.
    - Steady-state gross margin improves to 74% as onboarding templates mature.
