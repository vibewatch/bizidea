assumptions:
- id: A1
  name: Starting cash at model start
  value: '0'
  unit: USDK
  source: '[Modeling convention] Funding need is shown separately in fundingAsk rather than assumed as opening cash.'
- id: A2
  name: Year 1 customer ramp
  value: First paid city in M5 and second live city in M10; 2 paid cities exiting Y1
  unit: deployment timeline
  source: '[BP milestones] 1 paid pilot, first annual contract, and defined second-city rollout inside 12 months.'
- id: A3
  name: Year 2 customer ramp
  value: 3, 4, 5, and 6 live cities by Q1Y2 to Q4Y2
  unit: deployments EOP
  source: '[BP milestones 12–24 months] Reach 3–5 live cities across 1–2 operators; model rounds to 6 by month 24 after one same-account expansion.'
- id: A4
  name: Year 3 customer ramp
  value: 7 live cities in Q1Y3 and 8 live cities from Q2Y3 onward
  unit: deployments EOP
  source: '[BP milestones 24–36 months] About 8 live city deployments by year 3.'
- id: A5
  name: Blended ARR per live city
  value: '155'
  unit: USDK per year
  source: '[BP gtm.pricing] [BP market.som] [RS market.som] Midpoint of $100k-$200k annual SaaS plus modest usage/implementation revenue.'
- id: A6
  name: Steady-state gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] Main P&L lands near 70% gross margin in Y3.'
- id: A7
  name: COGS structure
  value: 16% variable platform cost plus one implementation lead from Q4Y1 and ~$1.5K per city per quarter for data/hosting support
  unit: mixed
  source: '[BP operations] [RS regulatoryTechnicalConstraints] Heuristic for support-heavy enterprise onboarding in city-by-city deployments.'
- id: A8
  name: Founder / GTM loaded cash compensation
  value: '120'
  unit: USDK per year
  source: '[BP team] Startup-finance heuristic for sub-market founder salary at pre-seed stage including payroll tax and benefits.'
- id: A9
  name: Engineering loaded compensation
  value: '180'
  unit: USDK per FTE per year
  source: '[BP team] Startup-finance heuristic for senior full-stack/data engineers including payroll tax and benefits.'
- id: A10
  name: Product / ops loaded compensation
  value: '144'
  unit: USDK per FTE per year
  source: '[BP team] Startup-finance heuristic for founding product-ops lead including payroll tax and benefits.'
- id: A11
  name: Customer success / implementation loaded compensation
  value: '120'
  unit: USDK per FTE per year
  source: '[BP team] Startup-finance heuristic for implementation lead including payroll tax and benefits.'
- id: A12
  name: Sales / GTM loaded compensation
  value: '156'
  unit: USDK per FTE per year
  source: '[BP gtm] Startup-finance heuristic for one enterprise AE/BD hire including payroll tax and benefits.'
- id: A13
  name: Non-payroll operating spend
  value: Y1 $16K-$20K/mo total outside payroll and COGS; Y2 $61K-$67K/qtr; Y3 $72K-$75K/qtr
  unit: USDK
  source: '[BP fundingAsk.useOfFundsSummary] [RS reportMemo.distributionChannels] Heuristic for travel, legal, insurance, data tooling, and governance reviews in enterprise pilots.'
- id: A14
  name: Blended customer acquisition cost
  value: '85'
  unit: USDK per live city
  source: '[BP gtm.funnelTargets] Heuristic from founder-led enterprise sales with 20%–30% paid pilot rate and 50%+ pilot-to-production conversion.'
- id: A15
  name: Monthly logo churn
  value: '2.0'
  unit: percent
  source: '[RS reportMemo.sensitivityCases] Heuristic reflecting concentrated accounts, permit renewal risk, and city-by-city contract volatility.'
- id: A16
  name: Funding contingency
  value: '15'
  unit: percent
  source: '[BP risks] [RS openQuestions] Heuristic reserve for integration slippage, governance review, and permit-data variability.'
