  validationPlan:
  - priority: high
    question: Will premium buyers trust processor-generated freshness certificates without third-party endorsement?
    evidenceToGather: Run three-way interviews with processors, sushi distributors, and premium grocers; test whether NOAA-style documentation, distributor endorsement, or third-party audit is required for trust.
