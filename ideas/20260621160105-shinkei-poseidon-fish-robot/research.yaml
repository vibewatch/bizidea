competitors:
- name: Wholechain
  stage: scale-up
  wedge: Standards-based supply-chain traceability and compliance across fragmented food and seafood networks.
  pricing: Public Lite, Essentials, Premium, and Enterprise tiers; numeric pricing not posted.
  strength: Strong GS1/GDST language, lot-level visibility, and compliance/buyer tooling across supplier networks.
  weaknessVsUs: Optimizes chain-of-custody and compliance, not remaining-shelf-life certification from the kill event onward.
  sourceRefs:
  - 23
  - 24
  - 25
- name: Trace Register
  stage: incumbent
  wedge: Global seafood full-chain traceability with ERP integration, multilingual support, and regulatory positioning.
  pricing: Custom enterprise contract.
  strength: Deep seafood specialization and credibility around SIMP, FSMA 204, and data exchange.
  weaknessVsUs: Focuses on traceability exchange and compliance rather than freshness modeling or certificate-grade shelf-life prediction.
  sourceRefs:
  - 26
  - 27
- name: ThisFish
  stage: scale-up
  wedge: Seafood factory-floor production, QC, traceability, and AI tooling.
  pricing: Custom modular pricing.
  strength: Strong on real-time plant data, lot splits/mixes, yield visibility, and seafood-specific workflows.
  weaknessVsUs: Closer to internal process control than buyer-facing, cross-processor freshness certification.
  sourceRefs:
  - 28
- name: iFoodDS
  stage: scale-up
  wedge: Enterprise traceability exchange and FSMA 204 compliance across supplier networks.
  pricing: Custom enterprise contract.
  strength: Interoperability posture and enterprise-scale supplier-network orchestration.
  weaknessVsUs: Built around traceability exchange, not kill-quality data, species freshness models, or premium-lot routing.
  sourceRefs:
  - 30
- name: Tive
  stage: scale-up
  wedge: Real-time location and condition monitoring for shipments.
  pricing: Quote-based hardware-plus-software sale.
  strength: Strong temperature and location visibility across the cold chain.
  weaknessVsUs: Sees in-transit condition, but not harvest or kill context and not buyer-facing freshness certification logic.
  sourceRefs:
  - 32
regulatoryTechnicalConstraints:
- point: Any freshness certificate must remain subordinate to HACCP and food-safety controls; it cannot overrule time-temperature safety limits.
  sourceRefs:
  - 3
  - 4
- point: FSMA 204 requires precise critical-tracking-event records, including traceability lot codes and first-land-based receiver logic for foods from fishing vessels.
  sourceRefs:
  - 5
  - 11
- point: Premium export claims often still rely on recognized authorities and certificate formats, so the startup is more likely to complement than replace NOAA documentation paths.
  sourceRefs:
  - 12
  - 13
- point: Model quality depends on reliable species identification, temperature telemetry, and tamper-resistant event capture.
  sourceRefs:
  - 16
  - 18
  - 32
  - 39
