- point: Tokai Denpun USA openly markets itself as a frozen-seafood wholesaler and sushi supplier, reinforcing the existence of specialized premium distribution channels.
  sourceRefs:
  - 22
- point: Beaver Street Fisheries is already testing FSMA-204-grade interoperability with iFoodDS, Wholechain, and ThisFish, showing that large seafood operators are actively digitizing traceability exchange.
  sourceRefs:
  - 30
openQuestions:
- How many additional sellable days can automated or standardized humane-slaughter workflows prove by species in live U.S. commercial conditions?
- Will premium buyers trust processor-generated freshness certificates on their own, or will they insist on a third-party auditor, distributor endorsement, or NOAA-adjacent paperwork layer?
- Can the startup standardize kill-event capture across manual, semi-automated, and non-Shinkei workflows without becoming services-heavy?
- What share of the West Coast premium seafood base already has digital lot and temperature infrastructure that would materially shorten onboarding?
