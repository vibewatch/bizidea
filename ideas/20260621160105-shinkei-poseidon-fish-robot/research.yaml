  adoptionFrictionMatrix:
  - friction: Buyers may not trust processor-generated freshness scores without tamper-resistant evidence and recognizable documentation.
    severity: high
    affectedBuyer: VP Operations or Chief Quality Officer
    mitigation: Anchor early products in immutable machine data, preserve NOAA/FDA-friendly audit trails, and offer distributor or third-party verification paths.
