slug: dockside-freshness-certificates
date: '2026-06-21'
executiveSummary: 这家公司应该先做成一层码头端剩余货架期认证层，服务美国西海岸和阿拉斯加那些把整鱼项目卖给寿司分销商、出口商和高端商超的高端海鲜加工商。第一个用户是 QA 或运营负责人：他们得在混合来源的批次之间快速放行，还要拿得出比纸质 HACCP 记录和分级员经验更硬的证据来证明剩余货架期。最直接的触发点，要么是人道宰杀设备刚装上，要么是买家、出口商或追溯升级把“首次陆上接收”和“处理证明”逼成了可审计流程。切口必须故意收窄：一个码头、一到两种高端鱼，再配一张面向买家的证书，把宰杀节点数据、温度遥测和分鱼种置信区间合成分流建议。这个切入点比再做一个通用追溯平台更好，因为 Wholechain、Trace Register、iFoodDS、ThisFish 和 Tive 已经覆盖了合规、工厂数据或传感器可视化，但没有谁真正占住“买家信得过的剩余寿命认证”这个位置。研究给出的滩头市场，到第 3 年的 SOM 也只有约 $1.5M，所以风险投资逻辑必须建立在扩更多站点、更多鱼种，最终切进更广的蛋白品质工作流上。最强的反证风险是：下游买家可能只把加工商出具的证书当成可有可无的 QA 文档，而不会拿它来做采购决策，那产品就会滑进一个更慢的合规软件赛道。现有输入也没有直接证明试点定价、分鱼种精度阈值，或第三方背书是否是硬门槛，所以前 12 个月必须先把买家信任、可量化的毛利回收和快速部署跑通，之后再扩团队。
problem:
- 高端海鲜加工商现在放行和分流批次，靠的仍是分级员经验、纸质 HACCP 记录、静态货架期表，以及无法按批量化剩余鲜度的通用追溯系统。
- 来源混杂的鱼货一旦拿不出买家信得过的鲜度证据，运营团队就会保守降级，丢掉高端客户，还得吞下本可避免的浪费、纠纷和出口摩擦。
solution:
- 做一套码头端认证 OS：给每个批次分配数字 ID，吃进宰杀节点或收货数据和温度遥测，再按鱼种估算剩余可售天数，同时给出置信区间和 QA 护栏。
- 给寿司、出口或高端商超渠道生成面向买家的证书和分流建议，让加工商能说清这个批次为什么配得上高溢价路径，而不是靠口头经验。
whyWeWin:
- 产品卡在品质被创造出来的那一刻，以及批次放行决策上；而现有追溯、工厂现场和传感器厂商，默认都不提供一套让买家信得过的剩余寿命工作流。
- 只要能跨加工商把宰杀方式、处理模式、温度历史、买家接受度和成交价格连起来，这套数据就会沉淀成鲜度基准护城河——单个工厂和横向软件厂商都很难自己拼出来。
strategicChoices:
  beachhead: 美国西海岸和阿拉斯加高端海鲜加工商的首次陆上接收与批次放行工作流——处理的是来源混杂的整鱼，销售对象是寿司分销商、出口商和高端商超项目。
  wedgeRationale: 这个切片的毛利流失很直观，追溯压力已经存在，而且鱼种集合够小，模型校准能更快做出来；比起直接卖给通用海鲜工厂、零售商或宽泛冷链软件买家，更容易先把证据跑通。
  sequencingRationale: 先叠在现有 HACCP 和追溯流程之上，做好一个码头的决策支持和证书生成。只有当公司证明下游买家信这套输出、试点能顺利转正后，再往买家验收流程、基准分析和伙伴分发上加码；产品、GTM 和招聘都应该优先守住信任和部署速度，而不是先堆功能宽度。
  notYet:
  - 人道宰杀硬件制造或融资
  - 替换所有海鲜工作流的完整 ERP 或流转链条系统
  - 高溢价经济性很弱的大宗冷冻海鲜产线
  - 在 2–3 个鱼种和一条买家工作流还没跑顺之前，就扩去贝类、养殖鱼类或非海鲜蛋白
market:
  tam: $18.0M 估算 TAM：北美约 300 个具备高端能力的加工商或分销站点，每站点年支出约 $60k。
  sam: $4.5M 估算 SAM：美国西海岸和阿拉斯加约 75 个站点，处理寿司、出口或高端商超所需的高端鲜货项目。
  som: $1.5M 第 3 年模型化 SOM：约 25 个在线站点，每站点年支出约 $60k。
  segments:
  - 美国西海岸和阿拉斯加高端海鲜加工商的 QA 与运营负责人
  - 负责首次陆上接收和再包装高端鲜鱼、再卖给寿司、出口或高端商超账户的海鲜进口商或分销商
  buyingProcess: 内部推动人往往是 QA 总监或运营负责人，因为他们管着批次放行、买家审计和降级决策；真正拍预算的通常是 VP Operations 或 Chief Quality Officer，因为毛利流失和合规风险就卡在同一条工作流里。最可信的第一笔单子，是先在一个码头、一到两条鱼种线上做付费试点；等客户看到证书被接受、降级或纠纷实打实下降后，再转成年部署。
product:
  mvp: MVP 是一条单码头工作流，先服务一家加工商和一到两种鱼：吃进宰杀节点或收货数据、温度遥测和人工 QA 观察，给出带置信区间的剩余可售天数预测，并生成面向买家的证书和分流建议。在真实模型效果被证明之前，所有建议都必须服从 HACCP 限制，并且仍要 QA 最终批准。
  sixMonth: 拿下 2–3 个共创客户，完成一个人道宰杀或人工收货集成、一个温度传感器数据源接入，并为至少一类高端买家产出被接受的证书模板。
  twelveMonth: 跑 3–5 个付费试点，在 2–3 个首发鱼种上证明降级或纠纷确实下降，加上 GS1 或 GDST 友好的导出，并建立一条 OEM 或传感器转介绍路径和一条分销商/质量伙伴转介绍路径。
  twentyFourMonth: 在美国西海岸和阿拉斯加做到 8–12 个生产站点，扩到更多鱼种和出口工作流，并在进入相邻蛋白之前，先把基准分析和第二站点复制方案卖起来。
  keyBets:
  - 下游买家会把剩余寿命证明当成采购输入，而不只是内部 QA 存档。
  - 带置信区间的分鱼种模型，能改善渠道分配，而不会把食品安全确定性说过头。
  - 部署能搭在现有码头、遥测和追溯流程上跑起来，而不会变成定制 IT 项目。
  - 在现有厂商做出“差不多能用”的复制品之前，跨客户结果数据会先沉淀成差异化基准资产。
gtm:
  wedge: 卖一个付费码头试点：选一条高端产线，客户必须向寿司分销商、出口商或高端商超证明鲜度，而且能在同一条工作流上量化降级减少。
  channels:
  - 创始人主导直销，目标是美国西海岸和阿拉斯加高端加工商里的 QA 总监、运营负责人和 VP Operations
  - 与人道宰杀、ikejime 培训和冷链遥测伙伴建立 OEM 与传感器联合销售关系
  - 靠分销商追溯项目、出口文件顾问和高端海鲜买家网络做转介绍
  funnelTargets: 线索→合格试点 15-25%，合格试点→付费试点 30-40%，付费试点→年度生产部署 50%+，生产部署→12 个月内扩到第二鱼种或第二站点 40%+
  pricing: 按活跃码头或工厂收年度订阅费，设平台最低收费，再按认证批次或接入的遥测标签按量收费，并加一次性导入费用。这样定价更贴近买方 ROI，因为价值驱动来自保住高溢价渠道收入和避免降级，而不是多几个席位。
businessModel:
  revenueStreams:
  - 面向鲜度认证覆盖收取年度码头或工厂订阅费
  - 按批次认证或遥测使用量收取费用
  - 一次性导入、集成和证书模板配置费用
  - 高级基准分析与买家接受度报告模块
  unitOfValue: 处于鲜度认证部署下、完成认证的一批高端海鲜
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一加工商集团内增加更多鱼种产线、码头和工厂
  - 把证书工作流延伸到进口商、出口商和分销商的验收场景
  - 卖由跨加工商结果数据驱动的基准分析与价格/分流建议
strategyMap:
  northStarMetric: 在被覆盖的高端批次中，带着被接受的鲜度证书发货、并按预定高端渠道成交且之后没有再被降级或发生鲜度纠纷的占比
  inputMetrics:
  - 从签试点到首个认证批次上线的天数
  - 首次采集就拿到完整数据的被覆盖批次占比
  - 付费试点转年度生产部署的转化率
  - 被覆盖产线相对基线的降级或损耗下降幅度
  - 从首条产线扩到第二鱼种、第二站点或第二买家工作流的净扩张
  moatsToBuild:
  - 连接宰杀节点、处理方式、温度历史、买家接受度和成交价的跨加工商鱼种数据集
  - 适配 HACCP、FSMA 204、SIMP 和出口文件流程、让买家信得过的证书模板与审计轨迹
  - 横跨 OEM、温度传感器和现有追溯/工厂系统的互操作层
  killCriteria:
  - 前 12 个月付费试点少于 3 个
  - 前 5 个试点之后，付费试点转年度生产部署低于 40%
  - 上线 6 个月内，少于 2 个试点实现了 5%+ 的降级或损耗下降，或有文件化的额外高溢价可售天数
  - 前 3 次实施之后，首站点部署中位数仍超过 30 天
  - 前 5 个试点里，没有任何一类下游买家会在不强制全面复检的情况下接受这张证书
  mermaid: |
    flowchart LR
      Wedge[Dockside certification wedge] --> MVP[One-dock MVP]
      MVP --> Proof[Accepted certificates and lower downgrades]
      Proof --> Expansion[Multi-site and multi-species expansion]
investorMemo:
  verdict:
    call: 观察
    conviction: 运营切口清楚、时点逻辑也站得住，但在下游买家真正信这张证书、客户又能从一条高端产线往外扩之前，置信度只能维持中等。
    whyBelieve: HACCP 与追溯压力、高端渠道的陈列诉求，以及 Shinkei 式机器可读的宰杀节点，共同催生了一条相邻厂商还没真正占住的新工作流。
    whyDoubt: 初始市场太窄，而且现有证据还没证明加工商或买家会为加工商自己出具的鲜度证书付钱，而不是只把它当作可有可无的 QA 记录。
    nextDiligence: 拉加工商和下游买家一起做三方试点，量化证书接受度、分鱼种精度，以及 2–3 个首发鱼种的毛利回收。
  firstCustomer:
    title: 美国西海岸高端海鲜加工商的 QA 负责人
    profile: 这类加工商通常有 1–2 个码头，处理来自多条渔船或养殖场的高价值整鱼，并卖进寿司、出口或高端商超项目；在这里，剩余货架期会直接改写成交价格。
    trigger: 工厂刚装上人道宰杀设备，或遇到买家/追溯审查，暴露出自己无法按批次证明剩余货架期。
    buyer: VP Operations 或 Chief Quality Officer
    initialContract: $20k-$40k 的付费码头试点，覆盖一条产线和 1–2 个鱼种；之后转成每站点大约 $50k-$80k 的年度 ARR，再随着更多买家和批次跑进系统叠加按量收费。
  mustBeTrue:
  - 至少一半合格目标加工商必须确认：鲜度证明或追溯升级的痛点，足以让他们在 6 个月内为付费试点掏钱。
  - 首发鱼种模型必须在真实商业环境里把剩余可售窗口预测得足够准，才能减少降级或守住被买家接受的高溢价天数。
  - 至少有一类下游买家会把这张证书当作有用的放行证据，而不是要求每个批次都做完整的第三方检验。
  - 一套单码头部署必须能靠现有收货、机器或传感器数据，在 2–4 周内上线，而不是变成定制 IT 项目。
  - 至少 40% 的付费试点必须转成年部署，并扩到更多鱼种或站点，公司才有机会跑赢最初 $1.5M 的 SOM。
  diligenceQuestions:
  - 哪些下游买家真的会因为加工商出具的鲜度证据，改变分流、定价或验收决策？
  - 首批目标加工商按鱼种和产线看，多少降级或浪费下降才真的有经济意义？
  - 滩头工厂里有多少已经具备数字化批次 ID 和温度数据？又有多少需要新增硬件或人工服务？
  - 这个产品到底多依赖 Shinkei 式自动化？手工或非 OEM 采集路径能不能撑起来？
  - 一旦切口被证明成立，ThisFish、Wholechain、iFoodDS 或 Trace Register 多快能补出一个“够用”的鲜度模块？
operatingAssumptions:
- assumption: 如果机器数据、温度日志和审计历史防篡改，即便还没有正式的第三方认证层，高端买家也会接受加工商出具的证书。
  basis: research.yaml
  validationTest: 前 3 个试点里，至少从 2 家下游买家拿到书面接受标准，并确认至少 1 家在真实放行或采购流程里使用这张证书。
  decisionImpact: 若不成立，路线图优先级要转向第三方验证合作，GTM 也会从高溢价分流 ROI 转成更慢的合规驱动销售。
- assumption: 公司能足够快地支持手工或非 Shinkei 的收货流程，不至于被单一 OEM 卡住需求上限。
  basis: research.yaml
  validationTest: 在第 3 个付费试点前，接入一台人道宰杀设备、一套人工收货流程和一套温度传感器栈的数据。
  decisionImpact: 若不成立，公司会变成 OEM 旁边的附属产品，SAM 更小，销售也更依赖伙伴。
- assumption: 按站点加按批次的定价，比按席位或平价咨询收费更贴合买方获得的价值。
  basis: idea.yaml
  validationTest: 至少在 5 份试点报价里，把按站点加按批次的定价，与按席位和固定费用方案对比，比较成交率和年化合同价值。
  decisionImpact: 若不成立，合同规模和 TAM 逻辑都会下滑，公司可能需要转成低毛利的软件加服务模式。
- assumption: 首站点部署能在 30 天内上线，而且服务工作量有限。
  basis: 运营判断
  validationTest: 跟踪前 3 个试点从签约到上线的时间，至少 2 个要在 30 天内产出认证批次。
  decisionImpact: 若不成立，导入负担会上升，团队招聘要更偏服务，公司也应该在扩大销售前先收窄鱼种和工作流范围。
- assumption: 高端鳍鱼这条切口，能足够快地往相邻鱼种、站点或买家工作流扩，支撑起风险投资需要的上行空间。
  basis: idea.yaml
  validationTest: 要求至少一半年度客户在上线 12 个月内提出第二鱼种、第二站点、出口工作流或基准模块需求。
  decisionImpact: 若不成立，公司就仍是一款小众 QA 工具，应该少募资，或转向战略型而非风险投资型路径。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 20 位美国西海岸和阿拉斯加走廊里的 QA 负责人、运营高管、寿司分销商，以及高端商超或出口商。
  hypothesis: 最紧迫的触发点是保住高端客户或追溯升级压力，而不是泛泛的可持续叙事。
  successMetric: 至少 10 个目标对象描述出正在发生或即将发生的触发事件，5 个同意进入试点工作流梳理。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 拿一版鲜度证书和审计轨迹草案，和一家加工商加至少两家下游买家一起评审。
  hypothesis: 只靠机器数据、温度历史和清晰的 QA 护栏，就足以建立买家信任，不必每个批次都做强制第三方检验。
  successMetric: 两家下游买家确认真实试点所需的最小字段集和接受标准。
  owner: 海鲜 QA 与监管负责人
- horizon: 0–90 天
  experiment: 做一个原型，把一套机器或人工收货数据源和一套温度传感器栈拼起来，生成历史批次证书。
  hypothesis: MVP 能叠在现有流程上，而不需要重做 ERP 或新装重硬件。
  successMetric: 两组样本数据在交接后的 15 个工作日内生成可用证书。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在一个码头、1–2 条鱼种线上跑 3 个付费试点。
  hypothesis: 证书加分流建议，足以把降级或纠纷压到能支撑年度软件支出的水平。
  successMetric: 3 个付费试点上线，至少 2 个出现可量化的降级或纠纷改善，至少 1 个转成年部署。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 测试按站点加按批次定价，并比较直销与 OEM/分销商辅助导入试点的效果。
  hypothesis: 直接掌握客户账户更利于守住价值，但在利基市场里，伙伴介绍应该能缩短拿到试点的时间。
  successMetric: 对比 5 份提案，至少有 1 个伙伴来源的付费试点在不明显折价的情况下签单。
  owner: 创始人/CEO
- horizon: 180–365 天
  experiment: 为已转正客户补上 GS1 或 GDST 友好导出、基准报告和第二站点复制模板。
  hypothesis: 互操作能力和可量化的跨批次基准，比补更多无关的合规模块更能带动扩张。
  successMetric: 生产客户里至少 50% 在 12 个月内新增第二鱼种、第二站点或第二买家工作流。
  owner: 创始工程师
operations:
- 把宰杀节点、批次 ID、温度遥测、QA 覆写和证书签发串起来的不可篡改事件日志
- HACCP 和 FSMA 护栏，确保任何鲜度建议都不会压过食品安全控制
- 买家接受度跟踪工作流，记录每个下游账户要求哪些证书字段或阈值
- 面向 GS1 或 GDST 的导出层，可接入现有追溯、审计和工厂系统
- 每周一次试点运营复盘，盯缺失数据、部署摩擦、降级和鲜度纠纷
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 赛道足够新，公司在形成可重复预算项之前，必须由创始人亲自面向加工商、OEM 和下游买家把单打下来。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 第一个产品风险不是功能够不够多，而是能不能把收货、传感器和证书工作流稳定编排起来。
- role: 海鲜 QA 与监管负责人
  startTiming: 第 3 个月
  rationale: HACCP、FSMA 204、出口文件和买家信任要求，必须尽早翻成产品护栏，否则证书站不住。
- role: 应用 ML / 数据工程师
  startTiming: 第 3 个月
  rationale: 分鱼种剩余寿命建模和置信区间校准，是核心差异点；原型一跑出来，就需要专人盯这件事。
- role: 解决方案工程师
  startTiming: 第 6 个月
  rationale: 早期部署需要做数据映射、流程配置和培训，才能把上线时间压进 30 天内。
- role: 客户主管
  startTiming: 第 12 个月
  rationale: 只有当试点包装、定价和买家接受度证明在滩头市场可复制后，才该加一位真正背 quota 的销售。
milestones:
- horizon: 0–12 个月
  items:
  - 在美国西海岸和阿拉斯加的高端加工商滩头市场签下 3–5 个付费码头试点
  - 在 2–3 个首发鱼种上线，并让至少一类高端买家接受证书
  - 至少在 2 个试点里，把首站点部署时间压到 30 天以内
  - 至少把 2 个试点转成年合同，并建立一条 OEM 或传感器转介绍渠道
- horizon: 12–24 个月
  items:
  - 在美国西海岸和阿拉斯加做到 8–12 个生产站点
  - 把 GS1 或 GDST 友好导出、出口工作流和基准分析做成付费加购项上线
  - 证明至少 50% 的客户会扩到第二鱼种、第二站点或第二买家工作流
  - 拿下一家第三方验证或审计伙伴，在不抢客户关系的前提下增强买家信任
- horizon: 24–36 个月
  items:
  - 做到研究模型里支撑第 3 年 $1.5M SOM 的 25 个在线站点
  - 只有当鳍鱼滩头市场已经可复制后，才把平台扩去相邻的贝类、养殖或进口商工作流
  - 成为至少一个区域性高端分销商或出口商网络首选的鲜度决策层
  - 证明基准分析和多站点扩张，能在最初的按站点部署收入之外显著抬高营收
risks:
- risk: 下游买家可能把加工商出具的鲜度证书当作参考信息，但不会据此改变采购。
  likelihood: High
  impact: High
  mitigation: 在试点阶段就和买家共创接受标准，保留不可篡改的证据轨迹，并在放大销售主张前补上第三方验证路径。
- risk: 码头收货团队可能抵触额外的数据采集步骤，因为这会拖慢装箱和发货。
  likelihood: High
  impact: High
  mitigation: 默认优先走机器或传感器的被动采集，把人工字段限制在高端产线里，并把工作流适配度列为上线门槛。
- risk: 不同供应商、季节和处理方式之间的差异，可能让鱼种级模型精度波动大于预期。
  likelihood: Medium
  impact: High
  mitigation: 先从少数鱼种上线，明确展示置信区间，并把产品主张绑定在观察到的降级结果上，而不是绝对的生物学确定性。
- risk: 现有追溯或工厂现场厂商可能把简单鲜度看板捆进现有合同。
  likelihood: High
  impact: Medium
  mitigation: 竞争重点放在买家信得过的证书、跨加工商结果基准和批次分流工作流上，而不是泛泛的可视化或合规报表。
- risk: 人道宰杀自动化的普及速度可能低于预期，而人工采集又不足以补上足够大的市场。
  likelihood: Medium
  impact: High
  mitigation: 试点筛选时优先看买家驱动或追溯驱动的痛点，同时支持常规收货流程，并避免只站在某个 OEM 一边。
- risk: 高端鳍鱼这块滩头市场，可能扩不出足够多的相邻站点、鱼种或工作流，支撑不了风险投资。
  likelihood: Medium
  impact: High
  mitigation: 把第二站点、第二鱼种和出口模块有没有自然拉力，当成第 1 年和第 2 年的明确验证门槛；在此之前不要重加销售人头。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月跑道做出单码头 MVP，在 2–3 个鱼种上验证 3–5 个付费试点，拿到买家接受的证书工作流和核心集成，并证明滩头市场能从一条高端鱼产线向外扩，再去放大商业团队。
