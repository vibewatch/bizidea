openQuestions:
- 在美国真实商用环境里，自动化或标准化的人道宰杀流程到底能按鱼种多证明出多少额外可售天数？
- 高端买家会不会只信加工商自己出具的鲜度证书？还是一定要第三方审计、分销商背书或 NOAA 邻近的文件层？
- 公司能不能在手工、半自动和非 Shinkei 工作流之间把宰杀节点采集标准化，而不把自己做成重服务公司？
- 美国西海岸高端海鲜基础盘里，有多大比例已经具备数字化批次和温度基础设施，足以明显缩短导入周期？
