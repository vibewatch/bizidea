competitors:
- name: Wholechain
  stage: scale-up
  wedge: 面向分散食品与海鲜网络的、基于标准的供应链追溯与合规。
  pricing: 公开有 Lite、Essentials、Premium 和 Enterprise 档位；未披露具体数值定价。
  strength: GS1/GDST 叙事强，批次级可视化能力强，也有面向供应商网络的合规与买家工具。
  weaknessVsUs: 它优化的是流转链条与合规，不是从宰杀节点开始做剩余货架期认证。
  sourceRefs:
  - 23
  - 24
  - 25
- name: Trace Register
  stage: incumbent
  wedge: 面向全球海鲜的全链路追溯，带 ERP 集成、多语言支持和监管定位。
  pricing: 定制化企业合同。
  strength: 在海鲜垂直领域积累深，对 SIMP、FSMA 204 和数据交换有可信度。
  weaknessVsUs: 重心在追溯交换和合规，不在鲜度建模或证书级的货架期预测。
  sourceRefs:
  - 26
  - 27
- name: ThisFish
  stage: scale-up
  wedge: 海鲜工厂现场的生产、QC、追溯与 AI 工具。
  pricing: 模块化定制定价。
  strength: 在实时工厂数据、批次拆分/合并、出成率可视化和海鲜专用工作流上很强。
  weaknessVsUs: 更接近内部过程控制，而不是面向买家的跨加工商鲜度认证。
  sourceRefs:
  - 28
- name: iFoodDS
  stage: scale-up
  wedge: 横跨供应商网络的企业级追溯交换与 FSMA 204 合规。
  pricing: 定制化企业合同。
  strength: 互操作姿态明确，擅长企业级供应商网络编排。
  weaknessVsUs: 围绕的是追溯交换，不是宰杀品质数据、分鱼种鲜度模型或高端批次分流。
  sourceRefs:
  - 30
- name: Tive
  stage: scale-up
  wedge: 面向在途货物的实时位置与状态监控。
  pricing: 硬件加软件，按报价销售。
  strength: 冷链全程的温度与位置可视化能力强。
  weaknessVsUs: 能看到运输中的状态，但看不到捕捞或宰杀上下文，更没有面向买家的鲜度认证逻辑。
  sourceRefs:
  - 32
regulatoryTechnicalConstraints:
- point: 任何鲜度证书都必须服从 HACCP 和食品安全控制，不能推翻时间-温度安全边界。
