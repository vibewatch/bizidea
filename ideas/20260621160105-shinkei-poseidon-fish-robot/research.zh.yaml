    - 19
    - 20
  - point: 围绕人道宰杀、ikejime 和质量提升计划，和 OEM 及培训伙伴合作分发。
    sourceRefs:
    - 1
    - 39
    - 41
  - point: 拿特色商超和日料批发商当高端渠道背书；这些渠道本来就在卖可追溯、重品质的海鲜故事。
    sourceRefs:
