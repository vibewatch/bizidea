  validationPlan:
  - priority: high
    question: 高端买家在没有第三方背书的情况下，会信加工商自己出具的鲜度证书吗？
    evidenceToGather: 拉加工商、寿司分销商和高端商超做三方访谈，测试信任这张证书到底需要 NOAA 式文件、分销商背书，还是第三方审计。
  - priority: high
    question: 产品在真实商用环境里，能按鱼种把货架期提升预测到什么程度？
    evidenceToGather: 围绕两到三种鱼，收集包含宰杀节点、放血、加冰和温度遥测的试点数据，再对比预测货架期与真实货架期、降级率。
  - priority: medium
    question: 公司能不能足够快地接入非 Shinkei 工作流数据，避免被单一 OEM 绑死？
    evidenceToGather: 在承诺任何单一硬件伙伴之前，先做人工收货、ThisFish 式工厂系统和一套温度传感器栈的原型接入。
