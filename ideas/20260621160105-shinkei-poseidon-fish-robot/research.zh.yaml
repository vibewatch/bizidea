market:
  tam:
    value: $18.0M
    rationale: 估算 TAM 为 $18.0M：北美约 300 个具备高端能力的海鲜加工商或分销站点 × 估算每站点每年 $60k 的码头端鲜度认证支出。这个单元数先从 NOAA 覆盖所有企业的加工商调查和 Alaska Sea Grant 提到的 300 多家加工企业出发，再收窄到高价值鲜货线，而不是把每一家海鲜工厂都算进去。
    isEstimate: true
    sourceRefs:
