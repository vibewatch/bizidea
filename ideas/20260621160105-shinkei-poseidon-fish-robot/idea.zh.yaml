topRisks:
- name: 数据信任缺口
  description: 如果输入数据无法防篡改、也缺独立审计，买家未必会信加工商自己出具的剩余货架期证书。
  mitigation: 直接接入码头设备和传感器硬件，保留不可篡改的事件日志，并在早期验证里拉上第三方审计方或分销伙伴。
- name: 收货流程摩擦
  description: 收货码头节奏很快，只要多一步扫描或打标，装箱和出货就可能被拖慢，团队自然会抵触。
  mitigation: 嵌进现有收货和 HACCP 流程，先从一条高端产线切入，能从设备自动抓取的数据尽量不让人手填。
- name: 现有追溯厂商捆绑
  description: 现有海鲜 ERP、追溯或传感器厂商，可能补一层基础鲜度看板，把差异压薄。
  mitigation: 守住更难的那一层——分鱼种鲜度建模、批次分流建议和成交价基准，而不是泛泛的流转链条报表。
