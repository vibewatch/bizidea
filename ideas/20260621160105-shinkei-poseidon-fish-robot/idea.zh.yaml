problem: 高端海鲜加工商和分销商至今还靠分级员经验、纸质 HACCP 记录和一刀切的货架期表，来决定批次该卖给寿司渠道、零售渠道还是大宗渠道。只要宰杀质量和冷链处理没法落实到批次级数据，买家就会压价，运营团队也只能保守分流，结果是大量鱼货被降级甚至丢弃——哪怕其中一些批次本来能卖上溢价。随着人道宰杀技术开始普及，真正更卡脖子的环节不再是“鱼够不够新鲜”，而是能不能拿出可审计的数据，把鲜度讲清楚。
targetUser:
  primary: 美国西海岸高端海鲜加工商的质保或运营负责人——公司从多条渔船或多个水产养殖收获点汇总整鱼，再把鲜货卖给寿司分销商和高端杂货渠道
  secondary: 收货码头经理或品类经理，负责给到港鱼货做分级，并把每个批次分到价值最高的销售渠道
  buyer: 运营副总裁或首席质量官
startupThesis:
  nonObviousInsight: 多数创业者看到机器人，会先以为这门生意赚的是硬件毛利。但更深的切口是：标准化的人道宰杀，能把“新鲜”从一句主观说法，变成机器直接产出的数据资产。只要宰杀节点带上鱼种标签和时间戳，软件就能预测可售窗口、自动分配销售渠道，也能让买家按可量化的剩余品质付钱，而不是按笼统的“新鲜”标签付钱。
  beachhead: 面向美国西海岸高端海鲜加工商的批次级鲜度认证——这类公司从多条渔船或养殖场收整鱼，再卖进寿司分销和高端商超项目
  wedge: 一套码头端认证 OS，把宰杀节点采集、分鱼种鲜度模型和冷链遥测拼在一起，让加工商在批次离厂前就能给买家出具剩余货架期证书
  whyNowCatalyst: 自动化、计算机视觉引导的 ike jime 设备已经出现，人道宰杀因此开始标准化、机器可读化，按批次给出鲜度保证这件事才第一次真正可落地。
  ventureScalePath: 先从高端鲜鱼切入，再扩到贝类、养殖鱼类，最终把系统铺到更广的蛋白冷链里，成为“剩余货架期、品质溯源、动态定价和库存金融”的系统记录层。
solution: Dockside Freshness Certification OS 会接入人道宰杀设备或标准化收货流程产生的机器数据，为每个鱼货批次分配数字 ID，再把鱼种、宰杀时间、温度和处理数据合成一段可预测的可售窗口。QA 团队在装箱前就能看到面向餐饮、商超或批发买家的推荐分级、分流建议，以及承诺的剩余货架期天数。买家拿到的是一张可审计的证书，能看清这个批次怎么处理、为什么配得上高溢价渠道，从而减少扯皮和一刀切压价。时间一长，平台还会学会哪些处理模式真的能换来更高成交价和更低损耗，最终沉淀成跨加工商、跨鱼种的专有基准数据。
goToMarketSeed:
  firstCustomer: 美国西海岸海鲜加工商，通常只有一到两个收货码头，处理来自多家供应商的高端整鱼，并且已经有一部分销量卖给寿司分销商或高端商超
  buyingTrigger: 加工商刚装上人道宰杀自动化设备，或因为高端买家要求证明鲜度与剩余货架期一致性而开始丢毛利
  currentAlternative: 人工 HACCP 记录、分级员经验、静态保鲜期表，以及只能记录流转链条、却看不到批次级剩余鲜度的通用追溯软件
  switchingReason: 这个切口能把更好的处理动作，直接变成可审计的额外可售天数和按渠道定价的决策依据，帮助加工商拿下高端客户，也减少没必要的批次降级。
  pricingHypothesis: 按码头或加工厂收年费订阅，再按认证批次或接入的遥测标签按量收费
