jobsToBeDone:
- job: 当加工商收到来源混杂的高端整鱼时，帮 QA 团队预测每个批次剩余还能卖多久，并把它分去最合适的渠道，这样既能把成交价做高，也不用冒变质投诉的风险。
  currentAlternative: 人工分级，再加 Excel 和 HACCP 记录里的一刀切货架期规则
  successMetric: 高端批次的每磅毛利，以及收货后被降级的批次占比
- job: 当寿司分销商或高端商超要求提供处理质量证明时，帮运营负责人快速生成一张可审计的证书，这样订单就能放行，不必再因为额外抽检拖延。
  currentAlternative: 纸质合规材料包、电话沟通，以及通用的流转链条报告
  successMetric: 认证批次放行时间，以及围绕鲜度或货架期主张产生的纠纷率
