slug: dockside-freshness-certificates
date: '2026-06-21'
executiveSummary: >-
  This company should start as a dockside freshness-certification layer for West
  Coast and Alaska premium seafood processors selling whole-fish programs into
  sushi distributors, exporters, and upscale grocery accounts. The first user
  is the QA or operations leader who must release mixed-origin lots quickly
  while defending remaining shelf life with more than paper HACCP logs and
  grader judgment. The immediate trigger is either a humane-slaughter
  installation or a buyer, exporter, or traceability upgrade that forces
  first-land-based receiving and proof-of-handling to become audit-ready. The
  wedge is narrow on purpose: one dock, one or two premium species, and a
  buyer-facing certificate that combines kill-event data, temperature
  telemetry, and species-specific confidence bands into a routing
  recommendation. This is a better entry point than another generic
  traceability platform because Wholechain, Trace Register, iFoodDS, ThisFish,
  and Tive already cover compliance, plant data, or sensor visibility, but
  none clearly owns buyer-trusted remaining-life certification. The researched
  beachhead is only about a $1.5M year-three SOM, so the venture case depends
  on expanding from premium finfish into more sites, more species, and
  eventually broader protein quality workflows. The biggest disconfirming risk
  is that downstream buyers treat processor-generated certificates as
  nice-to-have QA documents rather than procurement inputs, which would push
  the product into a slower compliance-software lane. The inputs also do not
  provide direct evidence of pilot pricing, species-by-species accuracy
  thresholds, or whether third-party endorsement is mandatory, so the first 12
  months must prove buyer trust, measurable margin recovery, and fast
  deployment before scale hiring.
problem:
  - Premium seafood processors still release and route lots with grader judgment, paper HACCP logs, static shelf-life tables, and generic traceability systems that do not quantify remaining freshness lot by lot.
  - When mixed-origin fish cannot be defended with buyer-trusted freshness evidence, operators downgrade conservatively, lose premium accounts, and absorb avoidable waste, disputes, or export friction.
solution:
  - Create a dockside certification OS that assigns each lot a digital ID, ingests kill-event or intake data plus temperature telemetry, and estimates remaining sellable days by species with confidence bands and QA guardrails.
  - Generate a buyer-facing certificate and routing recommendation for sushi, export, or upscale grocery channels so processors can prove why a lot qualifies for a premium path instead of relying on anecdote.
whyWeWin:
  - The product starts at the quality-creation moment and the lot-release decision, where current traceability, plant-floor, and sensor vendors do not provide a buyer-trusted remaining-life workflow by default.
  - Cross-processor data linking kill method, handling pattern, temperature history, buyer acceptance, and realized price can compound into a freshness benchmark moat that single plants and horizontal software vendors cannot easily recreate.
strategicChoices:
  beachhead: First-land-based receiving and lot-release workflows at West Coast and Alaska premium seafood processors handling mixed-origin whole fish for sushi distributors, exporters, and upscale grocery programs.
  wedgeRationale: This slice has visible margin leakage, existing traceability pressure, and a small enough species set to calibrate quickly, which creates faster proof than selling to generic seafood plants, retailers directly, or broad cold-chain software buyers.
  sequencingRationale: Start with one-dock decision support and certificate generation on top of existing HACCP and traceability processes, then add buyer acceptance workflows, benchmark analytics, and partner distribution only after the company proves that downstream buyers trust the output and pilots convert; product, GTM, and hiring should all prioritize trust and deployment speed over feature breadth.
  notYet:
    - Humane-slaughter hardware manufacturing or financing
    - Full ERP or chain-of-custody replacement for every seafood workflow
    - Commodity frozen seafood lines with weak premium-channel economics
    - Shellfish, aquaculture, or non-seafood proteins before 2-3 finfish species and one buyer workflow are repeatable
market:
  tam: "$18.0M estimated TAM based on about 300 premium-capable North American processor or distributor sites at roughly $60k annual spend per site."
  sam: "$4.5M estimated SAM for about 75 West Coast and Alaska sites handling premium fresh programs for sushi, export, or upscale grocery channels."
  som: "$1.5M modeled year-three SOM based on roughly 25 live sites at about $60k annual spend per site."
  segments:
    - QA and operations leaders at West Coast and Alaska premium seafood processors
    - Seafood importers or distributors that perform first-land-based receiving and re-pack premium fresh fish for sushi, export, or upscale grocery accounts
  buyingProcess: >-
    The operational champion is usually the QA director or operations lead who
    owns lot release, buyer audits, and downgrade decisions, while the economic
    buyer is typically the VP Operations or Chief Quality Officer because margin
    leakage and compliance risk live in the same workflow. The most credible
    first sale is a paid pilot on one dock and one or two species lines that
    converts to an annual deployment after the customer sees accepted
    certificates and measurable downgrade or dispute reduction.
product:
  mvp: >-
    MVP is a one-dock workflow for one processor and one or two species that
    ingests kill-event or intake data, temperature telemetry, and manual QA
    observations to predict remaining sellable days with confidence bands and
    generate a buyer-facing certificate plus routing recommendation. Every
    recommendation must remain subordinate to HACCP limits and require QA
    approval until live model performance is proven.
  sixMonth: Close 2-3 design partners, ship one humane-slaughter or manual intake integration plus one temperature-sensor feed, and produce accepted certificate templates for at least one premium buyer class.
  twelveMonth: Run 3-5 paid pilots, prove measurable downgrade or dispute reduction on 2-3 launch species, add GS1 or GDST-friendly exports, and establish one OEM or sensor referral path plus one distributor-quality referral path.
  twentyFourMonth: Reach 8-12 production sites across West Coast and Alaska, expand to additional species and exporter workflows, and start selling benchmark analytics and second-site rollouts before entering adjacent proteins.
  keyBets:
    - Downstream buyers will treat remaining-life proof as a procurement input, not just an internal QA archive.
    - Confidence-banded species models can improve channel routing without over-claiming food-safety certainty.
    - Deployments can piggyback on existing dock, telemetry, and traceability workflows without turning into custom IT projects.
    - Cross-customer outcome data will become a differentiated benchmark asset before incumbents ship a good-enough copy.
gtm:
  wedge: Sell a paid dock pilot for one premium line where a processor must prove freshness to a sushi distributor, exporter, or upscale grocer and can measure reduced downgrades on the same workflow.
  channels:
    - Founder-led direct sales into QA directors, operations leaders, and VP Operations roles at West Coast and Alaska premium processors
    - OEM and sensor co-sell relationships with humane-slaughter, ikejime-training, and cold-chain telemetry partners
    - Referrals through distributor traceability programs, exporter documentation advisers, and premium seafood buyer networks
  funnelTargets: "lead→qualified pilot 15-25%, qualified pilot→paid pilot 30-40%, paid pilot→annual production 50%+, production→second species or second site expansion 40%+ within 12 months"
  pricing: >-
    Charge an annual subscription per active dock or plant with a minimum
    platform fee, plus per certified lot or connected telemetry tag and a
    one-time onboarding fee. This matches buyer ROI because the value driver is
    preserved premium-channel revenue and avoided downgrades, not seat count.
businessModel:
  revenueStreams:
    - Annual dock or plant subscriptions for freshness-certification coverage
    - Per-lot certification or telemetry usage fees
    - One-time onboarding, integration, and certificate-template setup fees
    - Premium benchmark analytics and buyer-acceptance reporting modules
  unitOfValue: Certified premium seafood lot under an active freshness-certification deployment
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more species lines, docks, and plants within the same processor group
    - Extend the certificate workflow into importer, exporter, and distributor acceptance use cases
    - Sell benchmark analytics and price-routing recommendations powered by cross-processor outcome data
strategyMap:
  northStarMetric: Percent of covered premium lots shipped with an accepted freshness certificate and sold into the intended premium channel without later downgrade or freshness dispute
  inputMetrics:
    - Days from signed pilot to first certified lot
    - Percent of covered lots with complete data capture on first pass
    - Paid pilot to annual production conversion rate
    - Downgrade or shrink reduction on covered lines versus baseline
    - Net expansion from first line into second species, second site, or second buyer workflow
  moatsToBuild:
    - Cross-processor species dataset linking kill event, handling, temperature history, buyer acceptance, and realized price
    - Buyer-trusted certificate templates and audit trails that fit HACCP, FSMA 204, SIMP, and exporter documentation workflows
    - Interoperability layer across OEMs, temperature sensors, and existing traceability or plant systems
  killCriteria:
    - Fewer than 3 paid pilots within the first 12 months
    - Paid pilot to annual production conversion below 40% after the first 5 pilots
    - Fewer than 2 pilots show either a 5%+ downgrade or shrink reduction or documented extra premium sellable days within 6 months of go-live
    - Median first-site deployment exceeds 30 days after the first 3 implementations
    - No downstream buyer class accepts the certificate without mandatory full reinspection in the first 5 pilots
  mermaid: |
    flowchart LR
      Wedge[Dockside certification wedge] --> MVP[One-dock MVP]
      MVP --> Proof[Accepted certificates and lower downgrades]
      Proof --> Expansion[Multi-site and multi-species expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear operational wedge and credible why-now, but conviction stays moderate until downstream buyers trust the certificate and customers expand beyond one premium line.
    whyBelieve: HACCP and traceability pressure, premium-channel merchandising, and Shinkei-style machine-readable kill events create a new workflow that adjacent vendors do not fully own.
    whyDoubt: The initial market is narrow and the evidence does not yet prove that processors or buyers will pay for processor-generated freshness certificates instead of treating them as nice-to-have QA records.
    nextDiligence: Run 3-way pilots with a processor and downstream buyer to measure certificate acceptance, species-level accuracy, and margin recovery on 2-3 launch species.
  firstCustomer:
    title: QA leader at a West Coast premium seafood processor
    profile: A processor with 1-2 docks handling mixed-origin high-value finfish from multiple boats or farms and selling into sushi, export, or upscale grocery programs where remaining shelf life changes price realization.
    trigger: The plant installs humane-slaughter equipment or faces a buyer or traceability review that exposes its inability to prove remaining shelf life lot by lot.
    buyer: VP Operations or Chief Quality Officer
    initialContract: "$20k-$40k paid dock pilot covering one line and 1-2 species, converting to roughly $50k-$80k annual ARR per site plus usage as more buyers and lots run through the system."
  mustBeTrue:
    - At least half of qualified target processors must confirm that freshness proof or traceability upgrades are painful enough to fund a paid pilot within 6 months.
    - Launch-species models must predict remaining sellable window well enough to reduce downgrades or preserve accepted premium days in live commercial conditions.
    - At least one downstream buyer class must accept the certificate as useful release evidence without requiring a full third-party inspection on every lot.
    - One-dock deployment must go live in 2-4 weeks using existing intake, machine, or sensor data rather than a custom IT project.
    - At least 40% of paid pilots must convert to annual production and expand to additional species or sites so the company can outrun its $1.5M initial SOM.
  diligenceQuestions:
    - Which downstream buyers will actually change routing, pricing, or acceptance decisions based on processor-generated freshness evidence?
    - What level of downgrade or waste reduction is economically meaningful for the first target processors by species and line?
    - How many beachhead plants already have digital lot IDs and temperature data versus requiring net-new hardware or manual services?
    - How dependent is the product on Shinkei-style automation versus manual or non-OEM capture paths?
    - How quickly can ThisFish, Wholechain, iFoodDS, or Trace Register ship a good-enough freshness module once the wedge is proven?
operatingAssumptions:
  - assumption: Premium buyers will accept a processor-generated certificate if machine data, temperature logs, and audit history are tamper-resistant, even before a formal third-party certification layer exists.
    basis: research.yaml
    validationTest: Secure written acceptance criteria from at least 2 downstream buyers during the first 3 pilots and confirm at least 1 uses the certificate in a live release or purchasing workflow.
    decisionImpact: If false, roadmap priority shifts toward third-party verification partnerships and GTM shifts from premium-routing ROI toward slower compliance-led sales.
  - assumption: The startup can support manual or non-Shinkei receiving workflows quickly enough that one OEM does not cap demand.
    basis: research.yaml
    validationTest: Ingest data from one humane-slaughter machine, one manual intake workflow, and one temperature-sensor stack before the third paid pilot.
    decisionImpact: If false, the company becomes an OEM-adjacent product with a smaller SAM and partner-dependent sales motion.
  - assumption: Per-site plus per-lot pricing fits buyer value better than seat-based or flat consulting pricing.
    basis: idea.yaml
    validationTest: Test site-plus-lot pricing against seat-based and flat-fee alternatives in at least 5 pilot proposals and compare close rate plus annualized contract value.
    decisionImpact: If false, contract sizing and TAM logic fall and the company may need a lower-margin software-plus-services model.
  - assumption: First-site deployments can go live inside 30 days with limited services work.
    basis: operator judgment
    validationTest: Measure signed-to-go-live time across the first 3 pilots and require at least 2 to produce certified lots inside 30 days.
    decisionImpact: If false, onboarding burden rises, hiring must skew toward services, and the company should narrow the species and workflow scope before scaling sales.
  - assumption: The premium finfish wedge can expand into adjacent species, sites, or buyer workflows fast enough to support venture-scale upside.
    basis: idea.yaml
    validationTest: Require at least half of annual customers to request a second species, second site, exporter workflow, or benchmark module within 12 months of go-live.
    decisionImpact: If false, the company remains a niche QA tool and should raise less capital or pursue a strategic rather than venture-scale path.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 QA leaders, operations executives, sushi distributors, and premium grocers or exporters in the West Coast and Alaska corridor.
    hypothesis: The highest-urgency trigger is premium account protection or traceability upgrade pressure, not generic sustainability interest.
    successMetric: At least 10 targets describe a live or imminent trigger and 5 agree to pilot workflow mapping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Review a draft freshness certificate and audit trail with one processor plus at least two downstream buyers.
    hypothesis: Buyer trust can be earned with machine data, temperature history, and clear QA guardrails without mandatory third-party inspection on every lot.
    successMetric: Two downstream buyers approve minimum data fields and acceptance criteria for a live pilot.
    owner: Seafood QA and regulatory lead
  - horizon: 0–90 days
    experiment: Build a prototype that combines one machine or manual intake feed with one temperature-sensor stack and produces a historical lot certificate.
    hypothesis: MVP can sit on top of existing workflows without heavy ERP replacement or custom hardware.
    successMetric: Two sample datasets generate usable certificates inside 15 business days of data handoff.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch 3 paid pilots on one dock and 1-2 species lines.
    hypothesis: The certificate plus routing recommendation reduces downgrades or disputes enough to justify annual software spend.
    successMetric: 3 paid pilots launched, at least 2 show measurable downgrade or dispute improvement, and at least 1 converts to annual production.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Test site-plus-lot pricing and compare direct sales versus OEM or distributor-assisted sourcing of the pilot.
    hypothesis: Direct account ownership should preserve value capture, but partner introductions should shorten time to pilot in a niche market.
    successMetric: Five proposals compared and one partner-sourced paid pilot closes without a material discount to direct deals.
    owner: Founder CEO
  - horizon: 180–365 days
    experiment: Add GS1 or GDST-friendly exports, benchmark reporting, and second-site rollout templates for converted customers.
    hypothesis: Interoperability and measurable cross-lot benchmarks drive expansion better than adding unrelated compliance modules.
    successMetric: At least 50% of production customers add a second species, second site, or second buyer workflow within 12 months.
    owner: Founding eng
operations:
  - Immutable event log linking kill event, lot ID, temperature telemetry, QA overrides, and certificate issuance
  - HACCP and FSMA guardrails so no freshness recommendation overrules food-safety controls
  - Buyer-acceptance tracking workflow that records which certificate fields or thresholds are required by each downstream account
  - GS1 or GDST-friendly export layer into existing traceability, audit, and plant systems
  - Weekly pilot operating review on missing data, deployment friction, downgrades, and freshness disputes
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: The category is new enough that the company needs founder-led selling across processors, OEMs, and downstream buyers before a repeatable budget line exists.
  - role: Founding eng
    startTiming: Month 0
    rationale: The first product risk is reliable intake, sensor, and certificate workflow orchestration rather than feature breadth.
  - role: Seafood QA and regulatory lead
    startTiming: Month 3
    rationale: HACCP, FSMA 204, exporter documentation, and buyer trust requirements have to be translated into product guardrails early or the certificate will not be credible.
  - role: Applied ML or data engineer
    startTiming: Month 3
    rationale: Species-specific remaining-life modeling and confidence-band calibration are core differentiators that need dedicated technical ownership after the first prototype.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Early deployments will require data mapping, workflow setup, and training to keep go-live time under 30 days.
  - role: Account executive
    startTiming: Month 12
    rationale: Add a quota-carrying seller only after pilot packaging, pricing, and buyer-acceptance proof are repeatable in the beachhead.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3-5 paid dock pilots in the West Coast and Alaska premium-processor beachhead
      - Go live on 2-3 launch species with a certificate accepted by at least one premium buyer class
      - Prove first-site deployment time under 30 days for at least 2 pilots
      - Convert at least 2 pilots into annual contracts and establish one OEM or sensor referral channel
  - horizon: 12–24 months
    items:
      - Reach 8-12 production sites across West Coast and Alaska
      - Launch GS1 or GDST-friendly exports, exporter workflows, and benchmark analytics as paid add-ons
      - Prove at least 50% of customers expand to a second species, second site, or second buyer workflow
      - Secure a third-party validation or audit partner that strengthens buyer trust without owning the customer relationship
  - horizon: 24–36 months
    items:
      - Reach the modeled 25 live sites that underpin the researched $1.5M year-three SOM
      - Extend the platform into adjacent shellfish, aquaculture, or importer workflows only after the finfish beachhead remains repeatable
      - Become the preferred freshness decision layer for at least one regional premium distributor or exporter network
      - Demonstrate that benchmark analytics and multi-site expansion meaningfully lift revenue beyond the initial per-site deployment
risks:
  - risk: Downstream buyers may treat processor-generated freshness certificates as informative but not procurement-changing.
    likelihood: High
    impact: High
    mitigation: Co-design acceptance criteria with buyers during pilots, preserve immutable evidence trails, and add third-party validation paths before scaling sales claims.
  - risk: Dockside intake teams may resist extra capture steps that slow boxing and shipment.
    likelihood: High
    impact: High
    mitigation: Default to passive machine or sensor capture, limit manual fields to the premium line, and make go-live qualification depend on workflow fit.
  - risk: Species-level model accuracy may vary more than expected across suppliers, seasons, and handling patterns.
    likelihood: Medium
    impact: High
    mitigation: Launch with a small species set, show confidence bands, and tie product claims to observed downgrade outcomes rather than absolute biological certainty.
  - risk: Incumbent traceability or plant-floor vendors bundle simple freshness dashboards into existing contracts.
    likelihood: High
    impact: Medium
    mitigation: Compete on buyer-trusted certificates, cross-processor outcome benchmarks, and the lot-routing workflow rather than generic visibility or compliance reports.
  - risk: Humane-slaughter automation adoption stays slower than expected and manual capture does not bridge enough of the market.
    likelihood: Medium
    impact: High
    mitigation: Qualify pilots on buyer-driven or traceability-driven pain, support conventional receiving workflows, and avoid OEM-exclusive positioning.
  - risk: The premium finfish beachhead does not expand into enough adjacent sites, species, or workflows to justify venture-scale funding.
    likelihood: Medium
    impact: High
    mitigation: Treat second-site, second-species, and exporter-module pull as explicit year-one and year-two validation gates before adding heavy sales headcount.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Use 18 months of runway to build the one-dock MVP, validate 3-5 paid pilots
    across 2-3 species, secure buyer-accepted certificate workflows and core
    integrations, and prove that the beachhead expands beyond one premium fish
    line before scaling the commercial team.
