slug: dockside-freshness-certificates
date: '2026-06-21'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: 从 2026-06-21 的 business-plan 日期后第一个完整月份开始。
- id: A2
  name: 起始付费站点数（M1）
  value: '0'
  unit: count
  source: '[BP product.sixMonth; BP milestones] 计划启动时还没有任何付费试点上线，所以 M1 从 0 个付费站点开始。'
- id: A3
  name: 综合年度站点价值
  value: 每个在线站点每年 $66.0K
  unit: usdK_per_site_year
  source: '[BP investorMemo.firstCustomer.initialContract; BP market.som; research.market.som] 正式部署定价是每站点 $50K-$80K ARR 再加按量收费，而 SOM 又按每站点每年 $60K 建模，所以模型取相对克制的 $66K 综合值。'
- id: A4
  name: 收入确认方法
  value: 只确认已上线付费站点的当月收入；不计一次性试点或导入费用
  unit: method
  source: '[BP pricing; BP investorMemo.firstCustomer.initialContract] 只按已上线站点月份确认收入，让营收与在线站点数直接挂钩；相对计划里 $20K-$40K 的一次性试点费，这个基础情景更保守。'
- id: A5
  name: 客户爬坡节奏
  value: M12 达到 5 个在线付费站点，Y2 Q4 达到 12 个，Y3 Q4 达到 25 个
  unit: live_sites
  source: '[BP milestones; BP market.som; research.market.som] 这个爬坡节奏对齐商业计划：第一年 3–5 个付费试点，12–24 个月做到 8–12 个生产站点，第 3 年 25 个在线站点支撑 SOM。'
- id: A6
  name: 毛利率爬坡
  value: Y1 为 35%-60%，Y2 为 60%-67%，Y3 为 68%-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP operatingAssumptions] 早期部署要吃更多集成和 QA 人工，随着模板和导出标准化，再逐步收敛到 BP 里的 70% 目标。'
- id: A7
  name: 月度流失率
  value: 1.1%
  unit: percent
  source: 初创财务经验法则：这类 QA/合规工作流一旦嵌进年度合同，黏性会比较高；但它毕竟是新类目，还要平衡早期产品和买家信任风险。
- id: A8
  name: 综合 CAC
  value: 每个在线站点的综合 CAC 为 $35.0K
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP market.buyingProcess] 创始人主导的企业销售、差旅、POC 和买家教育，会让 CAC 明显高于轻量 SaaS；但伙伴转介绍又把它压在重线下销售之下。'
- id: A9
  name: 综合薪酬带宽
  value: 创始人/CEO $150K；工程 $175K；QA/监管 $150K；解决方案/客户 $140K；销售 $165K；合作伙伴/运营 $125K
  unit: usdK_per_fte_year
  source: 初创财务经验法则：适用于一家美国种子前轮（pre-seed）垂直软件公司，含创始人薪资折扣和领域型招聘溢价。
- id: A10
  name: 人员爬坡快照
  value: 按 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3 依次为：创始人/CEO 1/1/1/1/1/1；工程 1/2/2/2/3/3；QA/监管 0/1/1/1/1/1；解决方案/客户 0/0/1/1/1/1；销售 0/0/0/1/1/1；合作伙伴/运营 0/0/0/0/1/1
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale; BP operatingAssumptions] 模型按 BP 的顺序走：先把数据接入和 QA 可信度做起来，再加一位解决方案角色守住快速部署，等买家信任和伙伴渠道跑通后再保持精益 GTM。'
- id: A11
  name: 季度薪酬平滑
  value: Y2 和 Y3 的薪酬费用在各快照列之间平滑爬坡，而不是只在年末跳变
  unit: method
  source: '[Financial Modeler instructions] 季度薪酬费用按平滑曲线展开，这样既反映 BP 的招聘节奏，也不会把所有变动都藏成年末台阶。'
- id: A12
  name: 职能型非薪酬 opex 预算
  value: Y1 非薪酬 opex 每月 $12.0K-$20.0K；Y2 每季度 $42.0K-$50.0K；Y3 每季度 $55.0K-$62.0K
  unit: usdK
  source: 初创财务经验法则：覆盖云工具、遥测/数据成本、差旅、保险、法务和伙伴赋能，叠加在 BP 的精益团队之上。
- id: A13
  name: 种子前轮（pre-seed）融资后期初现金
  value: $2.8M
  unit: usdM
  source: '[BP fundingAsk] 商业计划书目标是 $2M-$4M 的种子前轮（pre-seed）；模型取中位偏上的 $2.8M，用来覆盖到 12 个在线站点的 24 个月验证计划，再留 6 个月缓冲到下一轮。'
- id: A14
  name: 基础销售周期
  value: 从第一次会面到付费试点，再到年化上线部署，大约 9 个月
  unit: months
  source: '[BP market.buyingProcess; BP gtm.funnelTargets; BP milestones] 计划默认先做付费试点，等看到降级或纠纷下降的实绩后，再转为年度合同。'
- id: A15
  name: Y3 由伙伴带来的成交占比
  value: Y2-Y3 新增站点里约 25%
  unit: percent_of_new_sites
  source: '[BP gtm.channels; BP milestones] 假设 OEM、传感器、分销商和买家网络转介绍会带来后期约四分之一的新单，这也是商业团队在 Q4Y2 之后不再扩编的原因。'
- id: A16
  name: 现金转换简化假设
  value: 期末现金直接按 EBITDA 滚动，不单列债务、税或资本开支
  unit: method
  source: 初创财务经验法则：轻资产软件公司的营运资本波动通常小于经营现金消耗，所以期末现金直接按 EBITDA 近似滚动。
- id: A17
  name: 下行情景参数
  value: $60K 站点价值、65% 毛利率、12 个月销售周期，以及 Y3 Q4 18 个在线站点
  unit: scenario_inputs
  source: '[BP risks; research.reportMemo.sensitivityCases; research.adoptionFrictionMatrix] 下行情景反映的是：买家信任建立更慢、部署更偏服务化，以及试点转正更慢。'
- id: A18
  name: 上行情景参数
  value: $72K 站点价值、72% 毛利率、8 个月销售周期，以及 Y3 Q4 30 个在线站点
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones; research.reportMemo.partnershipEcosystem] 上行情景假设买家接受更快、伙伴分发更强，第二鱼种/第二站点扩张也能更早变现。'
