scenarios:
  downside:
    description: 买家信任建立更慢，试点转正率只勉强贴着 BP 的止损阈值，更多客户也只买最低站点套餐。
    y3RevenueK: 920.0
    y3EbitdaK: -882.0
    cashLowPointK: -140.0
    keyAssumptionChanges:
    - 综合站点价值从 $66K 降到 $60K，因为按量收入和扩张都落后。
    - 毛利率卡在 65%，因为部署一直偏服务化。
    - 销售周期从大约 9 个月拉长到 12 个月。
    - Y3 Q4 在线付费站点只有 18 个，而不是 25 个。
  base:
    description: 基础情景假设 Y1 的 5 个付费站点，到 Y2 Q4 增至 12 个、Y3 Q4 增至 25 个，同时在信任被证明后团队保持平稳。
    y3RevenueK: 1232.0
    y3EbitdaK: -625.1
    cashLowPointK: 571.9
    keyAssumptionChanges:
    - 综合站点价值稳定在约 $66K，只叠加温和的按量收入与扩张提升。
    - 到 Y3 毛利率达到 BP 里的 70% 目标。
    - 销售周期维持在约 9 个月，后期约四分之一的新单来自伙伴转介绍。
    - Y3 Q4 在线付费站点达到 25 个，与 BP 第 3 年滩头市场情景一致。
  upside:
    description: 买家接受来得更早，伙伴贡献更多商机池，第二鱼种扩张也把综合站点收入抬高。
    y3RevenueK: 1548.0
    y3EbitdaK: -365.4
    cashLowPointK: 845.0
    keyAssumptionChanges:
    - 随着第二鱼种和第二站点扩张开始变现，综合站点价值从 $66K 提升到 $72K。
    - 集成模板重复利用更顺后，毛利率从 70% 改善到 72%。
    - 靠更强的转介绍把销售周期从大约 9 个月压到 8 个月。
    - Y3 Q4 在线付费站点达到 30 个，而不是 25 个。
sensitivity:
- variable: ARPU
  downsideCase: $60K 的综合年度站点价值
  baseCase: $66K 的综合年度站点价值
  upsideCase: $72K，且扩张与按量收入更强
  y3RevenueImpactK: -112.0
  cashImpactK: -78.0
- variable: CAC
  downsideCase: 每个在线站点综合 CAC 为 $45K
  baseCase: 每个在线站点综合 CAC 为 $35K
  upsideCase: 靠更强的伙伴来源商机池压到 $28K
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: 若证书始终容易被替代，月流失率 1.8%
  baseCase: 月流失率 1.1%
  upsideCase: 工作流锁定更深时，月流失率 0.8%
  y3RevenueImpactK: -70.0
  cashImpactK: -90.0
- variable: 销售周期
  downsideCase: 12 个月，因为买家需要更多验证
  baseCase: 9 个月
  upsideCase: 靠可复制的伙伴带路压到 8 个月
  y3RevenueImpactK: -312.0
  cashImpactK: -500.0
- variable: 毛利率
  downsideCase: 65%，因为部署仍偏服务化
  baseCase: 70% 目标毛利率
  upsideCase: 模板和导出更可复制时达到 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -62.0
- variable: 招聘节奏
  downsideCase: Y3 多招 1 名解决方案人员和 1 名 GTM 人员
  baseCase: Q4Y2 之后团队固定在 8 名 FTE
  upsideCase: 在扩张需求被证明前延后新增招聘
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: 试点转化率
  downsideCase: 40% 的试点转年度部署率
  baseCase: 50%+ 的试点转年度部署率
  upsideCase: 拿到买家信任证明后达到 60%+
  y3RevenueImpactK: -180.0
  cashImpactK: -140.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[Buyer and partner leads] --> Pilots[Paid dock pilots]
      Pilots --> Sites[Live sites]
      Sites --> Revenue[Recurring site revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash after team burn]
modelSanity:
- checkName: 营收引擎
  finding: 基础情景的营收引擎，本质上就是 Y3 Q4 做到 25 个在线付费站点、每站点年综合价值约 $66K；增长主要来自更多码头、更多鱼种和复购买家，而不是大规模销售团队。
- checkName: 必须跑对的事
  finding: 买家接受度和 30 天内上线必须守住，因为模型默认只靠 1 名 AE 加伙伴转介绍，就能在 Y2 Q4 把切口扩到 12 个在线站点。
- checkName: 模型最怕
  finding: 一旦销售周期被拉向 12 个月，模型恶化得最快，因为在所有敏感因子里，它对 Y3 营收和现金的合并打击最大。
- checkName: 下一轮证明点
  finding: 能支撑种子轮的证明点，是做到 12 个在线站点、50%+ 的多鱼种或多站点扩张，以及拿下一家让证书变成采购决策输入的验证伙伴。
sanityChecks:
  ruleOf40: Y3 增长 113.3% + EBITDA 利润率 -50.7% = 62.6%。
  burnMultiple: Y2 现金消耗倍数约 1.8x，对应约 $462K 的净新增 ARR；Y3 改善到约 0.7x，对应约 $858K 的净新增 ARR。
  revenuePerFte: Y3 每 FTE 营收为 $154K，以 $1.23M 营收和年末 8 名 FTE 计算，低于典型 SaaS 的 $200–400K 基准。
  flags:
  - 到 Y3 公司仍未实现 EBITDA 转正，因为研究得到的滩头市场只有 25 个在线站点，而产品仍需要 QA 与集成劳动去换取买家信任。
  - 营收集中度依然很高，因为一个区域走廊里 25 个在线站点，意味着第 3 年的大部分收入仍由少数锚点加工商驱动。
  - 基础情景依赖 Q4Y2 到 Q4Y3 期间团队人数固定在 8 名 FTE；如果部署支持或渠道管理需要更多人，模型就会往下行情景漂。
  - 综合 $66K 的 ARPU 只是假设在 $60K 的 SOM 基线之上再叠一点扩张；如果买家只买最低站点套餐，营收会明显下滑，而固定成本几乎不动。
