topRisks:
  - name: Data-trust gap
    description: Buyers may not trust a processor-generated shelf-life certificate unless the inputs are tamper-resistant and independently auditable.
    mitigation: Integrate directly with dockside equipment and sensor hardware, keep immutable event logs, and involve third-party auditors or distributor partners in early validation.
  - name: Workflow friction at intake
    description: Receiving docks are fast-paced and may resist any extra scanning or tagging step that slows boxing and shipment.
    mitigation: Embed into existing receiving and HACCP workflows, start with one premium line, and automate capture from equipment wherever possible.
  - name: Incumbent traceability bundling
    description: Existing seafood ERP, traceability, or sensor vendors could add basic freshness dashboards and compress differentiation.
    mitigation: Own the hard layer of species-specific freshness modeling, lot-routing recommendations, and realized-price benchmarks rather than generic chain-of-custody reporting.
