    baseCase: 1.1% monthly churn
    upsideCase: 0.8% monthly churn with deeper workflow lock-in
    y3RevenueImpactK: -70.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: 12 months because buyers wait for more validation
    baseCase: 9 months
    upsideCase: 8 months with repeatable partner-led entry
    y3RevenueImpactK: -312.0
    cashImpactK: -500.0
  - variable: gross margin
    downsideCase: 65% as deployments remain services-heavy
    baseCase: 70% target gross margin
    upsideCase: 72% with repeatable templates and exports
    y3RevenueImpactK: 0.0
    cashImpactK: -62.0
  - variable: hiring pace
    downsideCase: Add one extra solutions hire and one extra GTM hire in Y3
    baseCase: Hold the team at 8 FTE after Q4Y2
    upsideCase: Delay incremental hiring until expansion pull is proven
    y3RevenueImpactK: 0.0
    cashImpactK: -170.0
  - variable: pilot conversion
