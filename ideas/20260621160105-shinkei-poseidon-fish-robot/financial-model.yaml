slug: dockside-freshness-certificates
date: '2026-06-21'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: month
    source: "Starts the first full month after the 2026-06-21 business-plan date."
  - id: A2
    name: Starting paying sites (M1)
    value: '0'
    unit: count
    source: "[BP product.sixMonth; BP milestones] The plan starts before any paid pilot is live, so M1 begins with zero paying sites."
  - id: A3
    name: Blended annual site value
    value: "$66.0K per live site-year"
    unit: usdK_per_site_year
    source: "[BP investorMemo.firstCustomer.initialContract; BP market.som; research.market.som] Production pricing is $50K-$80K ARR per site plus usage and the SOM is modeled at $60K per site-year, so the model uses a modest $66K blended value."
  - id: A4
    name: Revenue recognition method
    value: "Recognize only live paid-site months; exclude one-time pilot or onboarding fees"
    unit: method
    source: "[BP pricing; BP investorMemo.firstCustomer.initialContract] This keeps revenue tied directly to live-site count and makes the base case conservative versus the plan's $20K-$40K paid pilot fees."
  - id: A5
    name: Customer ramp
    value: "5 live paid sites by M12, 12 by Q4Y2, and 25 by Q4Y3"
    unit: live_sites
    source: "[BP milestones; BP market.som; research.market.som] The ramp matches the plan's 3-5 paid pilots in year 1, 8-12 production sites by months 12-24, and 25 live sites underpinning the year-three SOM."
  - id: A6
    name: Gross margin ramp
    value: "35%-60% in Y1, 60%-67% in Y2, and 68%-70% in Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct; BP operatingAssumptions] Early deployments carry heavier integration and QA labor, then converge toward the BP's 70% target as templates and exports standardize."
  - id: A7
    name: Monthly churn
    value: "1.1%"
    unit: percent
    source: "Startup-finance heuristic for a sticky QA and compliance workflow with annual contracts, balanced against early-product and buyer-trust risk in a new category."
  - id: A8
    name: Fully loaded CAC
    value: "$35.0K per live site"
    unit: usdK_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; BP market.buyingProcess] Founder-led enterprise selling, travel, proof-of-value work, and buyer education make CAC meaningfully higher than light-touch SaaS, but partner referrals keep it below heavy field-sales norms."
  - id: A9
    name: Loaded salary bands
    value: "Founder/CEO $150K; engineering $175K; QA/regulatory $150K; solutions/customer $140K; sales $165K; partnerships/ops $125K"
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for a U.S. pre-seed vertical software company with one founder salary discount and domain-heavy hiring."
  - id: A10
    name: Headcount ramp snapshots
    value: "Founder/CEO 1/1/1/1/1/1; engineering 1/2/2/2/3/3; QA/regulatory 0/1/1/1/1/1; solutions/customer 0/0/1/1/1/1; sales 0/0/0/1/1/1; partnerships/ops 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP strategicChoices.sequencingRationale; BP operatingAssumptions] The model follows the BP's order: build ingestion and QA credibility first, add one solutions role for fast deployments, then keep GTM lean until buyer trust and partner channels are proven."
  - id: A11
    name: Quarterly payroll smoothing
    value: "Y2 and Y3 salary expense ramps between snapshot columns instead of stepping only at year-end"
    unit: method
    source: "[Financial Modeler instructions] Quarterly salary expense is smoothed so the P&L reflects the BP hiring sequence without hiding step-changes."
  - id: A12
    name: Functional non-salary opex budgets
    value: "Y1 non-salary opex of $12.0K-$20.0K per month; Y2 $42.0K-$50.0K per quarter; Y3 $55.0K-$62.0K per quarter"
    unit: usdK
    source: "Startup-finance heuristic for cloud tooling, telemetry/data costs, travel, insurance, legal, and partner enablement on top of the BP's lean headcount plan."
  - id: A13
    name: Starting cash after pre-seed close
    value: "$2.8M"
    unit: usdM
    source: "[BP fundingAsk] The BP targets a $2M-$4M pre-seed; the model uses $2.8M to fund a 24-month proof plan to 12 live sites plus a six-month buffer before the seed round."
  - id: A14
    name: Base sales cycle
    value: "Roughly 9 months from first meeting to paid pilot and annualized live deployment"
    unit: months
    source: "[BP market.buyingProcess; BP gtm.funnelTargets; BP milestones] The plan assumes a paid pilot first, then annual conversion after measurable downgrade or dispute reduction."
  - id: A15
    name: Partner-sourced wins by Y3
    value: "About 25% of new Y2-Y3 sites"
    unit: percent_of_new_sites
    source: "[BP gtm.channels; BP milestones] OEM, sensor, distributor, and buyer-network referrals are assumed to carry about one quarter of later wins, which is why the commercial team stays flat after Q4Y2."
  - id: A16
    name: Cash conversion simplification
    value: "Ending cash rolls from EBITDA with no debt, tax, or capex line items"
    unit: method
    source: "Startup-finance heuristic for an asset-light software company where working-capital swings are small relative to operating burn."
  - id: A17
    name: Downside scenario deltas
    value: "$60K site value, 65% gross margin, 12-month sales cycle, and 18 live sites by Q4Y3"
    unit: scenario_inputs
    source: "[BP risks; research.reportMemo.sensitivityCases; research.adoptionFrictionMatrix] The downside reflects buyer-trust delays, services-heavy onboarding, and slower conversion from pilot to production."
  - id: A18
    name: Upside scenario deltas
    value: "$72K site value, 72% gross margin, 8-month sales cycle, and 30 live sites by Q4Y3"
    unit: scenario_inputs
    source: "[BP businessModel.expansionLevers; BP milestones; research.reportMemo.partnershipEcosystem] The upside assumes faster buyer acceptance, stronger partner distribution, and monetized second-species or second-site expansion."
