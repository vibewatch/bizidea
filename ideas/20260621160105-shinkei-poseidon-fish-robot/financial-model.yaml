modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Buyer and partner leads] --> Pilots[Paid dock pilots]
      Pilots --> Sites[Live sites]
      Sites --> Revenue[Recurring site revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash after team burn]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by 25 live paying sites by Q4Y3 at about $66K blended annual value, with growth coming mainly from more docks, species, and repeat buyers rather than a large sales force.
  - checkName: Must go right
    finding: Buyer acceptance and sub-30-day deployments must hold because the model assumes one AE plus partner referrals can scale the wedge to 12 live sites by Q4Y2.
  - checkName: Model breaks if
    finding: The model deteriorates fastest if the sales cycle stretches toward 12 months because that sensitivity has the largest combined impact on Y3 revenue and cash.
  - checkName: Next-round proof
    finding: A seed-worthy proof point is 12 live sites, 50%+ multi-species or multi-site expansion, and one validation partner that makes the certificate procurement-relevant.
sanityChecks:
  ruleOf40: Y3 growth 113.3% + EBITDA margin -50.7% = 62.6%.
  burnMultiple: Y2 burn multiple is about 1.8x on roughly $462K of net new ARR; Y3 improves to about 0.7x on roughly $858K of net new ARR.
  revenuePerFte: $154K Y3 using $1.23M revenue and 8 year-end FTE (below typical $200–400K SaaS benchmark).
  flags:
    - The company is still not EBITDA-positive by Y3 because the researched beachhead is only 25 live sites and the product still needs QA and integration labor to win trust.
    - Revenue concentration remains high because 25 live sites in one regional corridor still leave a small number of anchor processors driving most of year-three revenue.
    - The base case depends on holding headcount flat at 8 FTE from Q4Y2 through Q4Y3; if deployment support or channel management needs more people, the model drifts toward the downside case.
    - The blended $66K ARPU assumes modest expansion above the $60K SOM baseline; if buyers only purchase the minimum site package, revenue slips materially while fixed costs stay largely unchanged.
