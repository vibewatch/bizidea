scenarios:
  downside:
    description: Procurement slips and realized ACV lands near $280K, leaving the company at 8 active programs by Q4Y3.
    y3RevenueK: 1887.3
    y3EbitdaK: -699.3
    cashLowPointK: -42.3
    keyAssumptionChanges:
      - Active-program ramp slows to 5 at Y2 exit and 8 at Y3 exit because federal buying cycles stretch.
      - Realized annual program value falls from $300K to roughly $280K as pilots stay narrow and discounting rises.
      - Gross margin compresses from 75% to 72% because secure deployment and support remain more bespoke.
  base:
    description: Two Y1 paid programs convert into a repeatable land-and-expand motion that reaches 10 active programs by Q4Y3.
    y3RevenueK: 2325.0
    y3EbitdaK: -334.8
    cashLowPointK: 535.7
    keyAssumptionChanges:
      - Active paid programs ramp from 2 at Y1 exit to 6 at Y2 exit and 10 at Y3 exit.
      - Revenue holds at the modeled $300K annualized value per active paid program with no setup-fee upside.
      - Hiring stays lean until after integration proof, channel proof, and multi-program expansion are visible.
  upside:
    description: Faster partner-assisted procurement and cleaner deployments push the company to 14 active programs and positive EBITDA in Y3.
    y3RevenueK: 3432.0
    y3EbitdaK: 532.0
    cashLowPointK: 1359.7
    keyAssumptionChanges:
      - Active-program ramp reaches 8 at Y2 exit and 14 at Y3 exit on faster pilot conversion and partner sourcing.
      - Realized annual program value increases to about $312K as more accounts adopt broader program scope.
      - Gross margin improves to 78% because exports and secure deployment patterns standardize earlier.
