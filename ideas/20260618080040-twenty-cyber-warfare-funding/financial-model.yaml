    upsideCase: "Both late Y3 hires move one quarter later"
    y3RevenueImpactK: 0.0
    cashImpactK: -73.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ActivePrograms
      ActivePrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by active paid programs rising from 2 at Y1 exit to 10 at Y3 exit at roughly $300K annualized value per program.
  - checkName: Must go right
    finding: The first two paid rehearsals must convert and the first partner route must help the company reach 6 active programs before it adds a second seller.
  - checkName: Model breaks if
    finding: If procurement slips a quarter and realized ACV falls toward $280K, downside cash turns slightly negative before Y3 ends.
  - checkName: Next-round proof
    finding: The next round is best justified once 6 active programs, 2-3 contractor accounts, and one repeatable channel path prove the workflow is becoming a system of record.
sanityChecks:
  ruleOf40: Y3 growth 102.2% + EBITDA margin -14.4% = 87.8%.
  burnMultiple: Y2 burn multiple 0.6x on $1.2M of net new ARR, improving to 0.3x in Y3.
  revenuePerFte: $279.0K Y3 revenue per average FTE (benchmark $200-400K SaaS).
  flags:
    - The model treats pilots and recurring programs at the same $25K monthly rate; if pilots price lower or require unpaid setup work, Y1-Y2 revenue will be overstated.
    - Cash collections are modeled in-period even though federal contractors can pay 60-120 days after invoice and procurement paperwork could extend that further.
    - Base case still ends Y3 slightly EBITDA negative, so the next round depends on channel proof and multi-program expansion more than on profitability.
    - The beachhead SAM is only $15M, so venture-scale upside still requires expansion into adjacent public-sector or critical-infrastructure readiness programs after Y3.
