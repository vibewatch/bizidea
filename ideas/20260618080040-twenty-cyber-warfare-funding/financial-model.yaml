    upsideCase: "$150K CAC with partner-assisted lead flow"
    y3RevenueImpactK: 0.0
    cashImpactK: -253.3
  - variable: churn
    downsideCase: "1.5% monthly churn as single-program pilots fail to expand"
    baseCase: "1.0% monthly churn"
    upsideCase: "0.5% monthly churn with sticky evidence workflows"
    y3RevenueImpactK: -75.0
    cashImpactK: -51.2
  - variable: sales cycle
    downsideCase: "Every post-pilot cohort slips by one quarter"
    baseCase: "New programs land every 2-3 months after Y1 proof"
    upsideCase: "First partner path pulls each later cohort forward by one month"
    y3RevenueImpactK: -275.0
    cashImpactK: -307.0
  - variable: gross margin
