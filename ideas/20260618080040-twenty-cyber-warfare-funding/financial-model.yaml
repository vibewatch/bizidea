slug: cyber-rehearsal-control-plane
date: "2026-06-18"
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: YYYY-MM
    source: >-
      [business-plan.yaml date] first full month after the 2026-06-18 plan
      date.
  - id: A2
    name: Opening cash from current pre-seed round
    value: "2400"
    unit: USDK
    source: >-
      [business-plan.yaml fundingAsk.targetFundingRangeUsd] base case uses a
      $2.4M round inside the stated $2-4M range so the company can reach the
      12-24 month milestone set with a 6-month buffer.
  - id: A3
    name: Blended annual revenue per active paid program
    value: "300"
    unit: USDK/year
    source: >-
      [business-plan.yaml gtm.pricing; market.som; research.yaml
      bottomUpSizingDrivers] midpoint of the stated $250k-$350k annual
      per-program subscription and consistent with the plan's $300k ARR market
      model.
  - id: A4
    name: Paid pilot revenue recognition
    value: "25"
    unit: USDK/program/month
    source: >-
      [business-plan.yaml gtm.pricing] a $100k pilot spread over roughly four
      months equals the same $25k monthly revenue as the $300k annual
      subscription midpoint, which keeps the early pilot-to-production ramp
      conservative and internally consistent.
  - id: A5
    name: Setup and premium-module revenue in base case
    value: "0"
    unit: USDK
    source: >-
      [business-plan.yaml businessModel.revenueStreams] one-time setup fees and
      premium analytics are intentionally excluded from the base case until the
      company proves repeatable production deployments.
  - id: A6
    name: Customer ramp
    value: "2 at Y1 exit, 6 at Y2 exit, 10 at Y3 exit"
    unit: active programs
    source: >-
      [business-plan.yaml milestones; market.som] matches 1 converted
      subscription plus a second paid program by Y1 exit, 4-6 active programs by
      24 months, and 10 active programs near the plan's $3M ARR year-3 SOM.
  - id: A7
    name: New-program timing
    value: "M6, M10, M15, M18, M21, M24, M28, M30, M33, M36"
    unit: month index
    source: >-
      [business-plan.yaml experimentRoadmap; sequencingRationale] one pilot
      lands in the first 6 months, one more by year-end, then new programs are
      added every 2-3 months as integrations, customer success, and federal
      selling capacity come online.
  - id: A8
    name: Gross margin target
    value: "75"
    unit: percent
    source: >-
      [business-plan.yaml businessModel.targetGrossMarginPct] modeled as 25%
      COGS on revenue.
  - id: A9
    name: Founder/CEO loaded annual cash cost
    value: "150"
    unit: USDK/year
    source: >-
      [business-plan.yaml gtm.channels] startup-finance heuristic for a
      founder-led federal seller with $125k cash compensation plus 20% payroll
      tax and benefits.
  - id: A10
    name: Founding eng loaded annual cash cost
    value: "204"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] startup-finance heuristic for a senior founding
      product engineer building secure ingestion, approvals, and exports.
  - id: A11
    name: Product and doctrine lead loaded annual cash cost
    value: "180"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] startup-finance heuristic for a senior cyber
      product operator translating doctrine and rehearsal content into reusable
      workflows.
  - id: A12
    name: Cleared deployment and customer success lead loaded annual cash cost
    value: "156"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] startup-finance heuristic for a secure
      onboarding and pilot-delivery lead hired once the first design partner is
      signed.
  - id: A13
    name: Federal seller loaded annual cash cost
    value: "168"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] startup-finance heuristic for an early federal
      account executive hired after the first proof points exist.
  - id: A14
    name: Security / integration engineer hire
    value: "M15 at 192"
    unit: month and USDK/year
    source: >-
      [business-plan.yaml sequencingRationale; operations] startup-finance
      heuristic for the first post-pilot engineering hire needed to standardize
      exports, secure deployment, and implementation bottlenecks.
  - id: A15
    name: Program ops / partnerships lead hire
    value: "M20 at 144"
    unit: month and USDK/year
    source: >-
      [business-plan.yaml milestones 12-24 months] startup-finance heuristic
      for the first operator who can manage partner sourcing and repeatable
      delivery once 4+ active programs exist.
  - id: A16
    name: Late Y3 scale hires
    value: "Second federal seller in M28 at 162 and customer success manager in M30 at 132"
    unit: month and USDK/year
    source: >-
      [business-plan.yaml milestones 24-36 months] startup-finance heuristic
      for modest scaling only after channel proof and multi-program expansion
      are visible.
  - id: A17
    name: Non-payroll operating spend
    value: "S&M base 6 then 8 then 12 then 16; R&D base 12 then 14 then 16; G&A base 8 then 10 then 12; plus 0.8, 0.6, and 0.3 per active program monthly"
    unit: USDK/month
    source: >-
      startup-finance heuristic for travel, proposal support, cloud, legal,
      secure hosting, and audit/compliance tooling in a lean federal software
      company.
  - id: A18
    name: Monthly logo churn for unit economics
    value: "1.0"
    unit: percent
    source: >-
      startup-finance heuristic for sticky mission software sold into a small
      number of embedded federal-contractor programs after pilot conversion.
  - id: A19
    name: Blended CAC per new active program
    value: "176.1"
    unit: USDK/customer
    source: >-
      calc from modeled Y2-Y3 sales and marketing spend of $1.4087M divided by
      8 net new active programs after the first two Y1 wins.
  - id: A20
    name: Cash conversion timing
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: >-
      startup-finance heuristic: the model excludes debt, capex, and working
      capital timing so cash rolls forward from EBITDA only.
  - id: A21
    name: Next-round milestone
    value: "6 active programs, 2-3 contractor accounts, one repeatable channel route, and evidence workflow adopted beyond one-off pilots"
    unit: milestone
    source: >-
      [business-plan.yaml milestones 12-24 months; investorMemo.nextDiligence]
      used to size the current round and the next financing proof point.
  - id: A22
    name: Revenue formula
    value: "Revenue equals active paid programs multiplied by $25K per month"
    unit: policy
    source: >-
      calc from A3 and A4; active paid programs include paid pilots and
      recurring subscriptions so the P&L reconciles directly to customers and
      ARPU.
