competitors:
  - name: SimSpace
    stage: scale-up
    wedge: Realistic cyber range for federal, military, and critical-infrastructure readiness.
    pricing: Custom federal or enterprise contracts; no public list pricing on cited pages.
    strength: Strong federal lineage, realistic environments, and public-sector proof points.
    weaknessVsUs: Owns the range substrate more than the approval workflow, doctrine ingestion, and cited after-action control layer.
    sourceRefs:
      - 17
      - 18
      - 19
      - 20
  - name: Immersive
    stage: scale-up
    wedge: Cyber drills, crisis simulation, and team exercises that span technical and business stakeholders.
    pricing: Custom enterprise quote; no public list pricing on cited pages.
    strength: Strong crisis-decision exercising motion and cross-functional engagement.
    weaknessVsUs: Less tailored to cleared-program doctrine graphs and one-mission approval flows.
    sourceRefs:
      - 21
      - 22
      - 23
  - name: RangeForce
    stage: scale-up
    wedge: Cloud cyber range and team-readiness training for defenders.
    pricing: Free exercise entry point plus enterprise platform sales; no public list pricing.
    strength: Hands-on team exercises and readiness measurement in a cloud range.
    weaknessVsUs: Training-first orientation may leave scenario authoring and after-action evidence less program-specific.
    sourceRefs:
      - 24
      - 25
  - name: AttackIQ
    stage: scale-up
    wedge: CTEM and BAS with ATT&CK-mapped control validation and federal route-to-market.
    pricing: Custom enterprise or federal pricing; sold through direct and GSA-channel motions.
    strength: Strong ATT&CK and continuous-validation credibility, plus a visible federal sales path.
    weaknessVsUs: Optimized for control validation in production-like environments, not human-approved mission rehearsal.
    sourceRefs:
      - 26
      - 27
      - 28
  - name: SCYTHE
    stage: scale-up
    wedge: Adversarial exposure validation and purple-team exercises across IT, cloud, and OT.
    pricing: Public custom-plan framework with no seat taxes or agent limits.
    strength: Deep adversary-emulation credibility and clear operating-model pricing.
    weaknessVsUs: Closer to validation and purple teaming than a cleared-program rehearsal system of record.
    sourceRefs:
      - 29
      - 30
      - 31
