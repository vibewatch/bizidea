openQuestions:
  - How much of a target contractor’s scenario-planning data is unclassified enough to use before a higher-assurance deployment boundary is approved?
  - Will the first budget come from training and readiness, cyber operations, or compliance owners?
  - Can the product prove scenario realism strongly enough to avoid being dismissed as synthetic noise by senior operators?
  - Which integration partner—range vendor, prime contractor, or threat-intelligence provider—most accelerates land-and-expand?
