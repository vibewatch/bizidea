slug: cyber-rehearsal-control-plane
date: "2026-06-18"
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: YYYY-MM
    source: >-
      [business-plan.yaml date] 计划日期 2026-06-18 后的首个完整月。
  - id: A2
    name: "当前 pre-seed 轮开局现金"
    value: "2400"
    unit: USDK
    source: >-
      [business-plan.yaml fundingAsk.targetFundingRangeUsd] 基准情形采用 $2.4M，处于
      $2—4M 区间内，可支撑公司达成 12—24 个月里程碑并保留 6 个月缓冲。
  - id: A3
    name: "每个活跃付费项目的混合年收入"
    value: "300"
    unit: USDK/year
    source: >-
      [business-plan.yaml gtm.pricing; market.som; research.yaml
      bottomUpSizingDrivers] 取 $250k—$350k 年度按项目订阅的中位值，与计划的
      $300k ARR 市场模型一致。
  - id: A4
    name: "付费试点收入确认"
    value: "25"
    unit: USDK/program/month
    source: >-
      [business-plan.yaml gtm.pricing] 将 $100k 试点摊分约四个月，月收入 $25k 与
      $300k 年度订阅中位值相当，使早期试点转生产爬坡保持保守且内部一致。
  - id: A5
    name: "基准情形中的安装费和高级模块收入"
    value: "0"
    unit: USDK
    source: >-
      [business-plan.yaml businessModel.revenueStreams] 在公司证明可重复生产部署之前，
      基准情形刻意排除一次性安装费和高级分析收入。
  - id: A6
    name: "客户爬坡"
    value: "2 at Y1 exit, 6 at Y2 exit, 10 at Y3 exit"
    unit: active programs
    source: >-
      [business-plan.yaml milestones; market.som] 对应 Y1 末 1 个转化订阅加第二个付费项目，
      24 个月内 4—6 个活跃项目，以及计划 $3M ARR 第 3 年 SOM 对应的 10 个活跃项目。
  - id: A7
    name: "新项目落地时间"
    value: "M6, M10, M15, M18, M21, M24, M28, M30, M33, M36"
    unit: month index
    source: >-
      [business-plan.yaml experimentRoadmap; sequencingRationale] 首批试点在前 6 个月
      落地，年末再增一个，之后随集成、客户成功和联邦销售能力到位，每 2—3 个月新增一个项目。
  - id: A8
    name: "毛利率目标"
    value: "75"
    unit: percent
    source: >-
      [business-plan.yaml businessModel.targetGrossMarginPct] 建模为收入的 25% COGS。
  - id: A9
    name: "创始人/CEO 全成本年度现金支出"
    value: "150"
    unit: USDK/year
    source: >-
      [business-plan.yaml gtm.channels] 初创企业财务经验值：创始人主导联邦销售，$125k
      现金薪酬加 20% 薪酬税和福利。
  - id: A10
    name: "联合创始工程师全成本年度现金支出"
    value: "204"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] 初创企业财务经验值：负责安全摄取、审批和导出的资深联合创始产品工程师。
  - id: A11
    name: "产品与作战条令负责人全成本年度现金支出"
    value: "180"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] 初创企业财务经验值：将条令和演练内容转化为可复用工作流的资深网络产品运营专家。
  - id: A12
    name: "涉密部署与客户成功负责人全成本年度现金支出"
    value: "156"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] 初创企业财务经验值：首位共创客户签约后入职的安全入职与试点交付负责人。
  - id: A13
    name: "联邦销售全成本年度现金支出"
    value: "168"
    unit: USDK/year
    source: >-
      [business-plan.yaml team] 初创企业财务经验值：首批证明节点出现后入职的早期联邦客户主管。
  - id: A14
    name: "安全/集成工程师招募"
    value: "M15 at 192"
    unit: month and USDK/year
    source: >-
      [business-plan.yaml sequencingRationale; operations] 初创企业财务经验值：首批试点后
      用于规范化导出、安全部署和实施瓶颈的首位工程岗扩招人员。
  - id: A15
    name: "项目运营与合作负责人招募"
    value: "M20 at 144"
    unit: month and USDK/year
    source: >-
      [business-plan.yaml milestones 12-24 months] 初创企业财务经验值：4 个以上活跃项目
      后，负责合作伙伴资源开发和可复制交付的首位运营人员。
  - id: A16
    name: "第 3 年末规模化招募"
    value: "Second federal seller in M28 at 162 and customer success manager in M30 at 132"
    unit: month and USDK/year
    source: >-
      [business-plan.yaml milestones 24-36 months] 初创企业财务经验值：渠道验证和多项目
      扩展可见后才进行适度规模化招募。
  - id: A17
    name: "非薪酬运营支出"
    value: "S&M base 6 then 8 then 12 then 16; R&D base 12 then 14 then 16; G&A base 8 then 10 then 12; plus 0.8, 0.6, and 0.3 per active program monthly"
    unit: USDK/month
    source: >-
      初创企业财务经验值：精简联邦软件公司在差旅、提案支持、云服务、法务、安全托管和审计/合规工具方面的支出。
  - id: A18
    name: "单位经济模型月度 Logo 流失率"
    value: "1.0"
    unit: percent
    source: >-
      初创企业财务经验值：试点转化后嵌入少量联邦承包商项目的粘性任务软件经验值。
  - id: A19
    name: "每个新活跃项目的混合 CAC"
    value: "176.1"
    unit: USDK/customer
    source: >-
      基于 Y2—Y3 建模销售与市场支出 $1.4087M 除以首批 Y1 两个胜出后净新增 8 个活跃项目计算得出。
  - id: A20
    name: "现金转化时序"
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: >-
      初创企业财务惯例：模型不含债务、资本支出和营运资金时差，现金余额仅从 EBITDA 滚动。
  - id: A21
    name: "下轮融资里程碑"
    value: "6 active programs, 2-3 contractor accounts, one repeatable channel route, and evidence workflow adopted beyond one-off pilots"
    unit: milestone
    source: >-
      [business-plan.yaml milestones 12-24 months; investorMemo.nextDiligence]
      用于确定本轮规模和下次融资证明节点。
  - id: A22
    name: "收入计算公式"
    value: "Revenue equals active paid programs multiplied by $25K per month"
    unit: policy
    source: >-
      由 A3 和 A4 计算得出；活跃付费项目包含付费试点和周期性订阅，使损益表可直接与客户数量和 ARPU 对账。
