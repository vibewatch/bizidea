fundingAsk:
  round: pre-seed
  amountM: 2.4
  runwayMonths: 30
  milestone: "在 2—3 个承包商账户中达到 6 个活跃项目，证明一条可重复渠道路径，并证明证据工作流在单次试点之外持续落地，同时保留 6 个月现金缓冲。"
  useOfFunds:
    - bucket: "工程研发"
      amountUsd: 1008000
      percentage: 42
    - bucket: "GTM"
      amountUsd: 720000
      percentage: 30
    - bucket: "G&A"
      amountUsd: 312000
      percentage: 13
    - bucket: "缓冲（6 个月）"
      amountUsd: 360000
      percentage: 15
scenarios:
  downside:
    description: "采购延误且实际 ACV 跌至 $280K 附近，导致公司在 Q4Y3 仅达到 8 个活跃项目。"
    y3RevenueK: 1887.3
    y3EbitdaK: -699.3
    cashLowPointK: -42.3
    keyAssumptionChanges:
      - "活跃项目爬坡放缓：Y2 末 5 个、Y3 末 8 个——因联邦采购周期拉长。"
      - "实际年度项目价值从 $300K 降至约 $280K，因试点范围收窄、折扣率上升。"
      - "毛利率从 75% 压缩至 72%，因安全部署和支持持续偏向定制化。"
  base:
    description: "Y1 两个付费项目转化为可复制的落地扩展模式，Q4Y3 达到 10 个活跃项目。"
    y3RevenueK: 2325.0
    y3EbitdaK: -334.8
    cashLowPointK: 535.7
    keyAssumptionChanges:
      - "活跃付费项目从 Y1 末 2 个增至 Y2 末 6 个、Y3 末 10 个。"
      - "收入稳定在建模的每个活跃付费项目 $300K 年化价值，无安装费上行。"
      - "招聘保持精简，直至集成验证、渠道验证和多项目扩展清晰可见后才加速。"
  upside:
    description: "合作伙伴助力下采购提速、部署更流畅，公司在 Y3 达到 14 个活跃项目并实现 EBITDA 转正。"
    y3RevenueK: 3432.0
    y3EbitdaK: 532.0
    cashLowPointK: 1359.7
    keyAssumptionChanges:
      - "活跃项目爬坡提速：Y2 末 8 个、Y3 末 14 个——得益于更快的试点转化和合作伙伴资源开发。"
      - "随着更多账户采纳更大范围，实际年度项目价值升至约 $312K。"
      - "因导出和安全部署模式更早标准化，毛利率提升至 78%。"
sensitivity:
  - variable: ARPU
    downsideCase: "每个活跃项目实际年化价值 $280K"
    baseCase: "每个活跃项目实际年化价值 $300K"
    upsideCase: "每个活跃项目实际年化价值 $320K"
    y3RevenueImpactK: -158.1
    cashImpactK: -189.6
  - variable: CAC
    downsideCase: "若管道持续依赖创始人主导且合作伙伴资源开发不及预期，CAC 达 $210K"
    baseCase: "CAC $176.1K"
    upsideCase: "合作伙伴助力线索导流，CAC 降至 $150K"
    y3RevenueImpactK: 0.0
    cashImpactK: -253.3
  - variable: churn
    downsideCase: "单项目试点未能扩展，月度流失率 1.5%"
    baseCase: "月度流失率 1.0%"
    upsideCase: "证据工作流产生粘性，月度流失率 0.5%"
    y3RevenueImpactK: -75.0
    cashImpactK: -51.2
  - variable: sales cycle
    downsideCase: "每个试点后群体均延后一个季度"
    baseCase: "Y1 验证后每 2—3 个月落地一个新项目"
    upsideCase: "首条合作伙伴路径使每个后续群体提前一个月"
    y3RevenueImpactK: -275.0
    cashImpactK: -307.0
  - variable: gross margin
    downsideCase: "安全部署和支持持续定制化，毛利率 70%"
    baseCase: "毛利率 75%"
    upsideCase: "集成标准化提前实现，毛利率 78%"
    y3RevenueImpactK: 0.0
    cashImpactK: -186.5
  - variable: hiring pace
    downsideCase: "第二位销售和 CSM 提前一个季度入职"
    baseCase: "规模化招募等到渠道验证可见后"
    upsideCase: "两位 Y3 末招募各推迟一个季度"
    y3RevenueImpactK: 0.0
    cashImpactK: -73.5
modelDiagram:
  title: "单位经济模型流向"
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ActivePrograms
      ActivePrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情形收入由活跃付费项目驱动，从 Y1 末 2 个增至 Y3 末 10 个，每项目约 $300K 年化价值。"
  - checkName: "必须做对的事"
    finding: "前两次付费演练必须转化，且首条合作伙伴路径必须在新增第二位销售之前帮助公司达到 6 个活跃项目。"
  - checkName: "模型失效情景"
