slug: cyber-rehearsal-control-plane
date: "2026-06-18"
executiveSummary: >-
  网络演练管控平台的目标客户，是已在运营周期性网络演习却仍手工编写方案、注入场景和事后报告的通过审查联邦承包商。滩头市场是支持战区司令部或情报界项目的前 25 大联邦主承包商的季度对手模拟或事件响应演练，买家是网络项目执行官，用户是演习导演。切口是一款软件：摄取威胁报告、历史行动手册和任务约束，生成草稿方案图谱和响应树，同时要求对每个注入场景进行人工审批，以符合 NIST 式演练规范和 AI 监督预期。这一切入点比网络靶场或 BAS 平台更窄，但触达预算更快——它依附于即将到来的演习、新任务合同或事后重训周期，而非宽泛的平台替换。建模市场规模较为保守：SAM $15M、第 3 年 SOM $3M，因此只有从演练设计扩展为战备证据、事后复盘与跨项目任务知识系统性记录平台，公司才具备风险投资价值。主要缺失的事实是已命名的客户部署、可观测的采购周期长度，以及该工作流的真实定价基准，因此定价和转化假设目前仍是有待验证的运营假设，而非基于证据的事实。由于切口清晰但尚无实证，且在位厂商近在咫尺，投资立场为观察——等待首个承包商试点证明方案构建时间的压缩、操作员信任，以及试点转订阅的转化。
problem:
  - "通过审查的网络项目仍依赖定制脚本、电子表格和资深操作员将威胁报告转化为演练方案，演练准备从数天延伸到数周，形成稀缺的人力瓶颈。"
  - "买家需要更频繁、文档更完善的战备演练，但无法采用绕过人工审核、审批和可审计性的黑盒进攻系统。"
solution:
  - "产品摄取威胁报告、历史行动手册和任务约束，为单次命名演练生成草稿对手行动、响应树和演练注入场景。"
  - "管控员在使用前逐一审批、编辑或拒绝注入场景，形成符合防务监督和证据预期的人工治理工作流。"
  - "平台记录操作员决策，并输出带引用的事后复盘包，让每次演练都沉淀为可复用的方案图谱和可量化的学习成果。"
whyWeWin:
  - "我们销售的是位于人力密集型演习设计与基础设施密集型网络靶场之间的审批和证据工作流，而非又一款靶场或 BAS 产品。"
  - "经人工审批的方案图谱、条令关联的来源追溯，以及跨演练事后数据，形成手工服务和通用验证工具天然无法积累的粘性。"
  - "首个证明节点简单且与预算挂钩：在不降低逼真度的前提下，把单次演练周期从数周压缩至数小时。"
strategicChoices:
  beachhead: "为支持单一战区司令部或情报界项目、拥有 50—200 名操作员的通过审查美国联邦网络承包商提供季度对手模拟和事件响应演练。"
  wedgeRationale: >-
    这一切入点依附于已有资金支持的战备活动，有具名的操作员组、紧迫的准备截止日期和可量化的手工基准。它规避了替换网络靶场、推出宽泛企业培训套件或在买家信任建立前寻求实时进攻自动化授权这三类较慢的销售路径。
  sequencingRationale: >-
    公司必须先在承包商侧或非密演练数据上证明方案编写速度和管控员信任，再深化到事后证据和订阅续费，之后才加入更敏感的部署模式、相邻项目和生态合作。人员招聘和合作关系遵循同样的顺序：先构建审批工作流和集成，通过直接联邦关系逐单推进，等初创公司掌握了靶场缺少的内容和证据层后，再与靶场服务商合作。
  notYet:
    - "自主或实时进攻性网络作战。"
    - "完整的网络靶场基础设施所有权。"
    - "联邦和国家安全买家范围外的宽泛企业 SOC 培训。"
    - "在承包商侧和非密工作流得到验证之前率先进行涉密部署。"
market:
  tam: "建模 TAM $120M，约 200 个美国机构或项目所有者，每个机构运营两个可覆盖的网络战备项目，每项目约 $300k 的周期性价值。"
  sam: "建模 SAM $15M，25 个目标联邦主承包商或集成商，每家运营两个合格项目，约 $300k ARR。"
  som: "建模第 3 年 SOM $3M，基于 10 个活跃项目、约 $300k ARR——通过单次演习落地后在少数主承包商内扩展。"
  segments:
    - "为战区司令部或情报界项目运营周期性战备演练的通过审查联邦网络承包商及防务集成商。"
    - "已采购网络靶场演练、后续可通过非密项目引入工作流的公共部门和关键基础设施机构。"
  buyingProcess: >-
    销售从演习导演或红队负责人有即将到来的演练、新任务合同或事后重训需求时发起，随后拉入负责战备结果和人力利用率的网络项目执行官。初始采购最可能通过现有承包商预算、分包合同、经销商或已审批联邦渠道完成，而非净新增平台采购 (RFP)。
product:
  mvp: >-
    MVP 覆盖威胁笔记、历史行动手册和任务约束的摄取；草稿方案图谱生成；对每个注入场景的人工审批；ATT&CK 或条令标注；以及针对单次演练周期的带引用事后报告。刻意排除全套网络靶场托管、自主执行，以及演练规划和事后复盘之外的宽泛分析。
  sixMonth: "为单一命名承包商演习交付试点就绪工作流，包括方案草稿、审批队列、导出至现有靶场工具，以及事后证据包。"
  twelveMonth: "添加可复用方案库、跨演练学习、基于角色的权限、采购就绪部署管控，以及年度按项目订阅的转化工具。"
  twentyFourMonth: "扩展至多项目战备仪表盘、操作员认证历史、事后知识管理，以及与靶场和 BAS 工具更深层的集成，使产品成为位于靶场和 BAS 之上的系统性记录平台。"
  keyBets:
    - "如果每个注入场景的来源追溯和审批都明确可见，管控员将信任 AI 生成的草稿。"
    - "将方案导出至现有靶场和 BAS 环境比替换它们更快。"
    - "一次成功演习可以转化为按项目的周期性订阅。"
    - "事后证据和方案复用随时间推移将比初始生成速度更有价值。"
gtm:
  wedge: "为前 25 大联邦承包商的单次即将到来的演练销售付费试点，在准备时间节省和事后质量可量化后，将试点转化为按项目周期性订阅。"
  channels:
    - "创始人主导销售，直接进入顶级联邦主承包商的网络项目执行官和演习导演。"
    - "以单次命名季度演练、事件响应演习或新任务过渡为锚点的共创客户试点。"
    - "产品能嵌入现有联邦采购路径后，通过经销商、GSA 相邻或靶场合作伙伴渠道扩展。"
  funnelTargets: "25—35% 的合格共创客户对话转化为付费试点，50% 以上的试点转化为年度项目订阅，每个生产账户在 12 个月内扩展至 2 个以上项目。"
  pricing: "单次演练周期的付费试点定价 $75k—$150k，转化为年度按项目订阅 $250k—$350k，另加行动手册摄取和安全部署的安装费；这比按座位定价更适配项目预算采购，因为操作员组规模波动，但项目才是预算单元。"
businessModel:
  revenueStreams:
    - "年度按项目软件订阅费。"
    - "一次性安装和行动手册摄取费。"
    - "事后分析、多项目仪表盘和安全部署要求的高级模块费用。"
  unitOfValue: "一个运营周期性演练的活跃网络战备项目。"
  targetGrossMarginPct: 75
  expansionLevers:
    - "从单次演习扩展至同一项目的所有季度演练。"
    - "条令和工作流配置完成后，在同一联邦主承包商内添加相邻项目。"
    - "核心工作流嵌入后，叠加分析模块、认证历史和战备证据模块。"
strategyMap:
  northStarMetric: "每季度运行周期性人工审批演练的活跃项目数量。"
  inputMetrics:
    - "每次演习节省的方案编写工时。"
    - "试点转订阅转化率。"
    - "完成全注入场景审批与来源日志的演习数量。"
    - "每个生产账户的项目扩展次数。"
  moatsToBuild:
    - "关联条令和 ATT&CK 行为的已审批方案图谱语料库。"
    - "跨演练的操作员决策与事后数据集。"
    - "让现有靶场和 BAS 工具依赖我们工作流层的集成。"
    - "帮助承包商证明合规网络流程的审计轨迹。"
  killCriteria:
    - "首批 8 次合格承包商共创客户对话中，不足 2 次转化为付费试点。"
    - "前 3 次试点中，方案准备时间缩短幅度低于 50%。"
    - "人工审核后，试点管控员的方案逼真度评分低于满分 5 分中的 4 分。"
    - "没有试点在完成后 6 个月内转化为年度项目订阅。"
  mermaid: |
    flowchart LR
      Wedge[One named contractor rehearsal] --> MVP[Scenario draft and approval workflow]
      MVP --> Proof[Prep-time savings and trusted after-action evidence]
      Proof --> Expansion[Multi-program subscriptions and partner-led distribution]
investorMemo:
  verdict:
    call: Watch
    conviction: "工作流切口清晰，买家痛点真实，但采购速度和品类扩展尚未得到验证。"
    whyBelieve: "该方案将人工审批的战备工作流卖入承包商现有预算，而非要求防务买家一开始就授权自主网络作战。"
    whyDoubt: "初始利基可能成为靶场或 BAS 平台内的一个功能，除非公司能证明对证据、事后复盘和跨项目知识的持久掌控。"
    nextDiligence: "确认有一家前 25 大承包商愿意为实战演练周期付费，并在衡量准备时间和事后改进后转化为按项目订阅。"
  firstCustomer:
    title: "前 25 大联邦网络承包商的网络演习导演。"
    profile: "为单一战区司令部或情报界项目运营周期性对手模拟或事件响应演练，管理 50—200 名通过审查的操作员。"
    trigger: "即将到来的季度演习、新任务合同授予或事后重训周期要求快速生成新方案，加快管控员准备。"
    buyer: "网络作战副总裁或项目执行官。"
    initialContract: "单次演练周期的付费试点 $75k—$150k，若准备时间和事后质量有所改善，目标转化为年度按项目订阅 $250k—$350k。"
  mustBeTrue:
    - "演习导演必须接受 AI 生成的方案草稿——前提是每个注入场景都保留人工审批。"
    - "单次演练周期必须在不降低逼真度评分的前提下，将方案编写时间缩短至少 50%。"
    - "承包商必须通过现有预算或渠道路径采购，而非启动多年期平台采购流程。"
    - "靶场和 BAS 在位厂商必须保持为合作方或部分替代者，而非快速打包全套工作流到足以消除切口。"
    - "公司必须从单次试点扩展至多个项目，否则业务将被锁死在低单项目 ARR 水平。"
  diligenceQuestions:
    - "联邦主承包商内部，第一张演练管控产品支票由哪个预算负责人签？"
    - "在需要更高保障的部署前，有多少演练数据可以用于承包商侧或非密系统？"
    - "资深管控员要求看到什么样的逼真度和来源证据，才愿意信任 AI 生成的注入草稿？"
    - "通过经销商、分包合同或已审批采购车辆，最短可信的试点转生产路径需要多长时间？"
    - "哪家在位厂商合作伙伴最有可能开放分发渠道，同时不抢占审批和证据工作流？"
operatingAssumptions:
  - assumption: "首批试点可以在承包商侧或非密演练数据上运行，无需等待完整的政府连接部署边界。"
    basis: research.yaml
    validationTest: "完成 3 次共创客户通话，记录首次试点的数据类别、托管约束和审批路径。"
    decisionImpact: "若为假，路线图将更早转向更高保障的部署工作，融资需求在营收证明前上升。"
  - assumption: "买家将通过绑定单一具名项目的战备或网络作战预算支持该产品，而非来自通用培训支出。"
    basis: idea.yaml
    validationTest: "从至少 2 家目标主承包商处获得书面试点预算或采购步骤，并与即将到来的演练或任务过渡挂钩。"
    decisionImpact: "若为假，定价、渠道策略和初始客户细分必须转向培训合作伙伴或公共部门演练组织方。"
  - assumption: "若产品能替代足够多的手工方案设计并提升证据质量，接近 $300k ARR 的按项目订阅定价是可被接受的。"
    basis: research.yaml
    validationTest: "在 8 次发现通话中测试试点和年度定价，对照当前手工替代方案记录付费意愿区间。"
    decisionImpact: "若为假，公司须降低 ACV 预期、自动化入职流程，并压缩招聘计划以保持资本效率。"
  - assumption: "如果初创公司将方案和证据导出至其工具，现有靶场和 BAS 厂商将选择集成而非封堵工作流。"
    basis: operator judgment
    validationTest: "在首批试点期间完成 2 次合作伙伴发现对话，并完成向一个目标靶场或 BAS 环境的工作导出。"
    decisionImpact: "若为假，初创公司须自建更多执行环境，或接受更慢的以服务为主的交付模式。"
  - assumption: "人工审批加来源追溯，足以克服对生成方案的信任顾虑。"
    basis: research.yaml
    validationTest: "进行 10 次管控员走查，要求逼真度和信任平均评分不低于 5 分中的 4 分，才进行大范围试点推广。"
    decisionImpact: "若为假，产品须收窄至辅助编写工具，并降低关于自主方案生成的宣称。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "以当前一次演练为讨论锚点，访谈目标主承包商内部的 12 位演习导演和红队负责人。"
    hypothesis: "最紧迫的痛点是方案编写和审批工作量，而非靶场基础设施或通用培训内容。"
    successMetric: "12 位受访者中至少 8 位将方案准备和事后证据列为战备前三大瓶颈之一。"
    owner: "创始人/CEO"
  - horizon: 0–90 天
    experiment: "构建一份威胁报告和一份历史行动手册的摄取原型，生成带人工审批步骤的草稿方案图谱。"
    hypothesis: "只要每个注入场景都可编辑、可溯源、可导出，管控员就会接受草稿生成。"
    successMetric: "7 位管控员审阅者中有 5 位认为输出结果足够有用，可以节省真实演习的准备时间。"
    owner: "联合创始工程师"
  - horizon: 3–6 个月
    experiment: "为单次命名演练运行付费试点，对手工准备工时和演练后复盘质量进行基准测量。"
    hypothesis: "产品能在保持逼真度和管控的前提下，将准备时间缩短至少 50%。"
    successMetric: "试点实现准备时间缩短 50% 以上，管控员逼真度评分达到 5 分中的 4 分或以上。"
    owner: "创始人/CEO"
  - horizon: 3–6 个月
    experiment: "构建一个试点客户使用的现有靶场或 BAS 工具的导出集成。"
    hypothesis: "集成消除了足够多的切换摩擦，提升了对比独立工作流的转化概率。"
    successMetric: "试点客户无需在超过一个额外工具中重复录入方案即可完成演练。"
    owner: "联合创始工程师"
  - horizon: 6–12 个月
    experiment: "将首批试点转化为年度按项目订阅，并扩展至第二次演练周期。"
    hypothesis: "方案图谱和事后证据的复用，创造出超越一次性服务的订阅价值。"
    successMetric: "首个生产账户签署一年期订阅，并安排至少 2 次后续演习。"
    owner: "联邦销售"
  - horizon: 12–18 个月
    experiment: "正式化一条可将产品引入 5 个额外目标账户的经销商或靶场合作伙伴渠道。"
    hypothesis: "现有联邦渠道比纯直销更能缩短采购时间。"
    successMetric: "合作伙伴在 2 个季度内产生 5 次合格引荐和 2 次试点机会。"
    owner: "联邦销售"
operations:
  - "在追求更敏感环境之前，为承包商侧和非密演练数据建立安全部署架构。"
  - "构建内容流水线，将威胁报告、条令参考和历史行动手册摄取为可复用方案模板。"
  - "为每个注入场景和管控员决策建立审批日志、来源捕获和不可篡改的事后记录。"
  - "为将方案导出至各账户使用的现有靶场和 BAS 工具制定集成手册。"
  - "建立高触达试点交付流程，对基准准备工作量、演练结果和转化经济模型进行测量。"
team:
  - role: "联合创始工程师"
    startTiming: Month 0
    rationale: "构建定义切口并支撑首次试点的摄取、审批、导出和证据工作流。"
  - role: "产品与作战条令负责人"
    startTiming: Month 0
    rationale: "将威胁内容和演练实践转化为可用方案模板，使产品始终贴近管控员工作流。"
  - role: "涉密部署与客户成功负责人"
    startTiming: Month 6
    rationale: "在首位共创客户签约后，负责安全入职、试点执行和事后效果测量。"
  - role: "联邦销售"
    startTiming: Month 9
    rationale: "在早期证明节点存在后，将创始人主导的发现转化为可复制的管道、渠道管理和多项目扩展。"
milestones:
  - horizon: 0–12 个月
    items:
      - "在前 25 大联邦主承包商内签署 2 个共创客户。"
      - "交付首次付费演练试点，并测量准备时间节省和管控员信任评分。"
      - "将方案导出至至少一个现有靶场或 BAS 环境。"
      - "将 1 次试点转化为年度按项目订阅。"
  - horizon: 12–24 个月
    items:
      - "在 2—3 个承包商账户中达到 4—6 个活跃项目。"
      - "添加可复用方案库、角色权限和多演习证据追踪。"
      - "建立 1 个可靠产生试点的渠道或集成合作伙伴关系。"
      - "在同一账户内从一个项目扩展至相邻演练，并形成案例。"
  - horizon: 24–36 个月
    items:
      - "达到 10 个活跃项目，ARR 约 $3M。"
      - "推出多项目战备仪表盘和操作员认证历史。"
      - "在部署约束较轻的相邻公共部门或关键基础设施演练领域扩展，超越首批承包商群体。"
      - "证明产品是演练证据的系统性记录平台，而非一次性规划工具。"
risks:
  - risk: "采购和部署约束在营收证明前迫使公司进行更高保障架构工作。"
    likelihood: High
    impact: High
    mitigation: "从承包商侧或非密数据起步，使用现有渠道路径，前 12 个月内避免涉密优先承诺。"
  - risk: "管控员因方案不够逼真或充斥合成噪声而拒绝接受。"
    likelihood: Medium
    impact: High
    mitigation: "对每个注入场景保留人工审批，从受约束的行动手册输入起步，并在每次试点中要求逼真度评分。"
  - risk: "现有靶场或 BAS 厂商捆绑足够的 AI 方案生成功能，压缩切口空间。"
    likelihood: Medium
    impact: High
    mitigation: "在审批工作流、来源追溯和跨演练证据上深化差异——这些是在位厂商天然不擅长的。"
  - risk: "业务停滞为以服务为主的演练规划工具，扩展受限。"
    likelihood: Medium
    impact: High
    mitigation: "按项目定价，快速将复用和分析产品化，并将试点转订阅转化率作为董事会级关口指标。"
  - risk: "滩头市场规模过小，无法支撑风险投资规模的退出。"
    likelihood: Medium
    impact: Medium
    mitigation: "只有当扩展至多项目战备、事后知识管理和相邻公共部门买家在第 2 年变得清晰可见时，才维持融资节奏。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: "18 个月资金覆盖首个可试点产品、安全部署基础、2—3 个概念验证客户、一条在位厂商集成路径，以及决定切口能否扩展为更大战备系统性记录平台所需的数据。"
