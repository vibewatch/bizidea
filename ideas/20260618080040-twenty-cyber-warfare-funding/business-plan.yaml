slug: cyber-rehearsal-control-plane
date: "2026-06-18"
executiveSummary: >-
  Cyber Rehearsal Control Plane sells into cleared federal contractors that
  already run recurring cyber drills but still author scenarios, injects, and
  after-action reports by hand. The beachhead is one quarterly
  adversary-emulation or incident-response rehearsal for a top-25 federal prime
  supporting a Combatant Command or Intelligence Community program, where the
  buyer is a cyber program executive and the user is the exercise director. The
  wedge is software that ingests threat reports, prior playbooks, and mission
  constraints to generate draft scenario graphs and response trees, while
  requiring human approval on every inject to fit NIST-style exercise practice
  and AI oversight expectations. This entry point is narrower than a cyber
  range or BAS platform, but it reaches budget faster because it attaches to an
  imminent exercise, new mission award, or post-incident retraining cycle
  rather than to a broad platform replacement. The modeled market is modest at
  the beachhead, with a $15M SAM and $3M year-3 SOM, so the company is only
  venture-interesting if it expands from rehearsal design into the system of
  record for readiness evidence, debriefs, and cross-program mission knowledge.
  The main missing facts are named customer deployments, observed procurement
  cycle length, and real pricing benchmarks for this exact workflow, so pricing
  and conversion assumptions remain testable operating assumptions rather than
  evidence-backed facts. Because the wedge is clear but proof is absent and
  incumbents are adjacent, the investor stance is Watch until one contractor
  pilot shows scenario build-time compression, operator trust, and pilot-to-
  program conversion.
problem:
  - Cleared cyber programs still rely on bespoke scripting, spreadsheets, and senior operators to turn threat reports into exercise scenarios, which stretches rehearsal preparation from days or weeks into a scarce labor bottleneck.
  - Buyers need more frequent and better-documented readiness drills, but they cannot adopt a black-box offensive system that bypasses human review, approval, and auditability.
solution:
  - The product ingests threat reports, prior playbooks, and mission constraints to generate draft adversary campaigns, response trees, and exercise injects for one named rehearsal.
  - Controllers approve, edit, or reject every inject before use, creating a human-governed workflow that matches defense expectations for oversight and evidence.
  - The platform records operator decisions and outputs a cited after-action package, so each rehearsal compounds into reusable scenario graphs and measurable learning.
whyWeWin:
  - We sell the approval and evidence workflow that sits between labor-heavy exercise design and infrastructure-heavy cyber ranges, instead of competing head-on as another range or BAS product.
  - Human-approved scenario graphs, doctrine-linked provenance, and cross-exercise after-action data create stickiness that manual services and generic validation tools do not naturally capture.
  - The first proof point is operationally simple and budget-linked: compress one exercise cycle from weeks to hours without lowering realism.
strategicChoices:
  beachhead: Quarterly adversary-emulation and incident-response rehearsals for cleared U.S. federal cyber contractors with 50-200 operators supporting one Combatant Command or Intelligence Community program.
  wedgeRationale: >-
    This entry point attaches to an already funded readiness event with a named
    operator cohort, an urgent preparation deadline, and a measurable baseline
    of manual work. It avoids the slower sale of replacing a cyber range,
    launching a broad enterprise training suite, or seeking approval for live
    offensive automation before buyer trust exists.
  sequencingRationale: >-
    The company must first prove scenario-authoring speed and controller trust
    on contractor-side or unclassified rehearsal data, then deepen into
    after-action evidence and recurring subscriptions, and only then add more
    sensitive deployment modes, adjacent programs, and ecosystem partnerships.
    Hiring and partnerships follow that order: build the approval workflow and
    integrations first, sell one exercise at a time through direct federal
    relationships, then partner with range providers once the startup controls
    the content and evidence layer they lack.
  notYet:
    - Autonomous or live offensive cyber operations.
    - Full cyber-range infrastructure ownership.
    - Broad enterprise SOC training outside federal and national-security buyers.
    - Classified-first deployment before contractor-side and unclassified workflows are proven.
market:
  tam: $120M modeled TAM for roughly 200 U.S. organizations or program owners running two addressable cyber-readiness programs at about $300k recurring value per program.
  sam: $15M modeled SAM for 25 target federal primes or integrators running two qualifying programs each at about $300k ARR.
  som: $3M modeled year-3 SOM based on 10 live programs at about $300k ARR after landing through one exercise and expanding within a small set of primes.
  segments:
    - Cleared federal cyber contractors and defense integrators running recurring readiness drills for Combatant Command or Intelligence Community programs.
    - Public-sector and critical-infrastructure organizations that already procure cyber-range exercises and could adopt the workflow later through unclassified programs.
  buyingProcess: >-
    The sale starts when an exercise director or red-team leader has an upcoming
    drill, new mission award, or post-incident retraining need and pulls in a
    cyber program executive who owns readiness outcomes and labor utilization.
    Initial procurement is most likely through an existing contractor budget,
    subcontract, reseller, or approved federal channel rather than a net-new
    platform RFP.
product:
  mvp: >-
    MVP covers ingestion of threat notes, prior playbooks, and mission
    constraints; draft scenario-graph generation; human approval on every
    inject; ATT&CK or doctrine tagging; and a cited after-action report for one
    exercise cycle. It deliberately excludes full cyber-range hosting,
    autonomous execution, and broad analytics beyond rehearsal planning and
    debrief.
  sixMonth: Ship pilot-ready workflow for one named contractor exercise, including scenario drafts, approval queues, export into incumbent range tools, and after-action evidence.
  twelveMonth: Add reusable scenario libraries, cross-exercise learning, role-based permissions, procurement-ready deployment controls, and conversion tooling for annual per-program subscriptions.
  twentyFourMonth: Expand into multi-program readiness dashboards, operator certification history, debrief knowledge management, and deeper partner integrations that make the product the system of record above range and BAS tools.
  keyBets:
    - Controllers will trust AI-generated drafts if provenance and approval are explicit on every inject.
    - Exporting into incumbent range and BAS environments is faster than replacing them.
    - One successful exercise can convert into a recurring per-program subscription.
    - After-action evidence and scenario reuse will become more valuable over time than initial generation speed alone.
gtm:
  wedge: Sell a paid pilot tied to one imminent rehearsal for a top-25 federal contractor, then convert that pilot into a recurring per-program subscription once prep-time savings and after-action quality are measured.
  channels:
    - Direct founder-led sales into cyber program executives and exercise directors at top federal primes.
    - Design-partner pilots anchored to one named quarterly drill, incident-response rehearsal, or new mission transition.
    - Reseller, GSA-adjacent, or range-partner routes once the product can slot into existing federal procurement paths.
  funnelTargets: 25-35% of qualified design-partner conversations convert to paid pilots, 50%+ of pilots convert to annual program subscriptions, and each production account expands to 2+ programs within 12 months.
  pricing: Paid pilot of $75k-$150k for one exercise cycle, converting to a $250k-$350k annual per-program subscription plus setup fees for playbook ingestion and secure deployment; this fits program-budget buying better than per-seat pricing because operator cohorts fluctuate while the program remains the budget unit.
businessModel:
  revenueStreams:
    - Annual per-program software subscriptions.
    - One-time setup and playbook-ingestion fees.
    - Premium modules for after-action analytics, multi-program dashboards, and secure deployment requirements.
  unitOfValue: One active cyber-readiness program running recurring rehearsals.
  targetGrossMarginPct: 75
  expansionLevers:
    - Expand from one exercise into all quarterly drills for the same program.
    - Add adjacent programs within the same federal prime once doctrine and workflow are configured.
    - Layer on analytics, certification history, and readiness-evidence modules after the core workflow is embedded.
strategyMap:
  northStarMetric: Number of active programs running recurring human-approved rehearsals each quarter.
  inputMetrics:
    - Scenario-authoring hours saved per exercise.
    - Pilot-to-subscription conversion rate.
    - Exercises completed with full inject approval and provenance logs.
    - Program expansions per production account.
  moatsToBuild:
    - Approved scenario-graph corpus linked to doctrine and ATT&CK behaviors.
    - Cross-exercise operator-decision and after-action dataset.
    - Integrations that make incumbent ranges and BAS tools depend on our workflow layer.
    - Audit trail that helps contractors evidence disciplined cyber processes.
  killCriteria:
    - Fewer than 2 of the first 8 qualified contractor design-partner conversations convert to paid pilots.
    - Median scenario-prep time falls by less than 50% in the first 3 pilots.
    - Pilot controllers rate scenario realism below 4 out of 5 after human review.
    - No pilot converts to an annual program subscription within 6 months of completion.
  mermaid: |
    flowchart LR
      Wedge[One named contractor rehearsal] --> MVP[Scenario draft and approval workflow]
      MVP --> Proof[Prep-time savings and trusted after-action evidence]
      Proof --> Expansion[Multi-program subscriptions and partner-led distribution]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear workflow wedge and credible buyer pain, but procurement speed and category expansion are still unproven.
    whyBelieve: The plan sells a human-approved readiness workflow into existing contractor budgets instead of asking defense buyers to approve autonomous cyber operations on day one.
    whyDoubt: The initial niche could remain a feature inside range or BAS platforms unless the company proves durable ownership of evidence, debrief, and cross-program knowledge.
    nextDiligence: Confirm that one top-25 contractor will pay for a live rehearsal cycle and convert to a per-program subscription after measuring prep-time and after-action improvements.
  firstCustomer:
    title: Cyber exercise director at a top-25 federal cyber contractor.
    profile: Runs recurring adversary-emulation or incident-response drills for a single Combatant Command or Intelligence Community program with 50-200 cleared operators.
    trigger: An upcoming quarterly exercise, new mission award, or post-incident retraining cycle requires fresh scenarios and faster controller prep.
    buyer: Vice president or program executive for cyber operations.
    initialContract: $75k-$150k paid pilot for one exercise cycle with a conversion target to a $250k-$350k annual per-program subscription if prep time and after-action quality improve.
  mustBeTrue:
    - Exercise directors must accept AI-generated scenario drafts when every inject remains human-approved.
    - One rehearsal cycle must reduce scenario-authoring time by at least 50% without lowering realism scores.
    - Contractors must buy through an existing budget or channel path instead of forcing a multi-year platform procurement.
    - Range and BAS incumbents must remain partners or partial substitutes rather than bundling the full workflow fast enough to collapse the wedge.
    - The company must expand from one pilot into multiple programs so the business is not capped at low single-program ARR.
  diligenceQuestions:
    - Which budget owner signs the first check for a rehearsal-control product inside a federal prime?
    - How much rehearsal data can be used on contractor-side or unclassified systems before a higher-assurance deployment is required?
    - What realism and provenance evidence would senior controllers require before trusting AI-generated inject drafts?
    - How long is the shortest credible pilot-to-production path through a reseller, subcontract, or approved vehicle?
    - Which incumbent partner is most likely to open distribution without owning the approval and evidence workflow?
operatingAssumptions:
  - assumption: First pilots can run on contractor-side or unclassified rehearsal data without waiting for a full government-connected deployment boundary.
    basis: research.yaml
    validationTest: Secure 3 design-partner calls and document the data classes, hosting constraints, and approval path for a first pilot.
    decisionImpact: If false, the roadmap shifts toward higher-assurance deployment work earlier and the funding need rises before revenue proof.
  - assumption: Buyers will fund the product from readiness or cyber operations budgets tied to one named program instead of from generic training spend.
    basis: idea.yaml
    validationTest: Obtain written pilot budgets or procurement steps from at least 2 target primes tied to an upcoming drill or mission transition.
    decisionImpact: If false, pricing, channel strategy, and the initial customer segment must move toward training partners or public-sector drill organizers.
  - assumption: A per-program subscription near $300k ARR is acceptable if the product replaces enough manual scenario design and improves evidence quality.
    basis: research.yaml
    validationTest: Test pilot and annual pricing in 8 discovery calls and record willingness-to-pay ranges against the current manual alternative.
    decisionImpact: If false, the business must lower ACV expectations, automate onboarding, and narrow hiring plans to preserve capital efficiency.
  - assumption: Incumbent range and BAS vendors will integrate rather than block the workflow if the startup exports scenarios and evidence into their tools.
    basis: operator judgment
    validationTest: Complete 2 partner discovery sessions and one working export into a target range or BAS environment during the first pilot.
    decisionImpact: If false, the startup must build more of the execution environment itself or accept a slower services-heavy delivery model.
  - assumption: Human approval plus provenance is sufficient to overcome trust concerns about generated scenarios.
    basis: research.yaml
    validationTest: Run 10 controller walkthroughs and require an average realism and trust score of 4 out of 5 before broad pilot rollout.
    decisionImpact: If false, the product must narrow to assisted authoring tools and reduce claims about autonomous scenario generation.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12 exercise directors and red-team leads inside target primes using one current drill as the discussion anchor.
    hypothesis: The most urgent pain is scenario-authoring and approval workload, not range infrastructure or generic training content.
    successMetric: At least 8 of 12 contacts rank scenario prep and after-action evidence among their top 3 readiness bottlenecks.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Prototype ingest of one threat report and one legacy playbook into a draft scenario graph with human approval steps.
    hypothesis: Controllers will accept draft generation if every inject is editable, attributable, and exportable.
    successMetric: 5 of 7 controller reviewers say the output is useful enough to save time on a real exercise.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Run one paid pilot for a named rehearsal with baseline measurement of manual prep hours and post-exercise debrief quality.
    hypothesis: The product can cut prep time by at least 50% while maintaining realism and control.
    successMetric: Pilot delivers 50%+ prep-time reduction and controller realism score of 4 out of 5 or better.
    owner: Founder CEO
  - horizon: 3–6 months
    experiment: Build exports into one incumbent range or BAS tool used by the pilot customer.
    hypothesis: Integration removes enough switching friction to improve conversion odds versus a standalone workflow.
    successMetric: Pilot customer runs the rehearsal without duplicating scenario entry in more than one additional tool.
    owner: Founding eng
  - horizon: 6–12 months
    experiment: Convert the first pilot into an annual per-program subscription and expand to a second rehearsal cycle.
    hypothesis: Reuse of scenario graphs and after-action evidence creates subscription value beyond one-off services.
    successMetric: First production account signs a one-year subscription and schedules at least 2 additional exercises.
    owner: Federal seller
  - horizon: 12–18 months
    experiment: Formalize one reseller or range-partner route that can introduce the product into 5 additional target accounts.
    hypothesis: Existing federal channels shorten time-to-procurement more than pure direct sales.
    successMetric: Partner generates 5 qualified introductions and 2 pilot opportunities within 2 quarters.
    owner: Federal seller
operations:
  - Secure deployment architecture for contractor-side and unclassified rehearsal data before pursuing more sensitive environments.
  - Content pipeline for ingesting threat reports, doctrine references, and legacy playbooks into reusable scenario templates.
  - Approval logging, provenance capture, and immutable after-action records for every inject and controller decision.
  - Integration playbook for exporting scenarios into incumbent cyber-range and BAS tools used by each account.
  - White-glove pilot delivery process that measures baseline prep effort, exercise outcomes, and conversion economics.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the ingestion, approval, export, and evidence workflow that defines the wedge and supports the first pilot.
  - role: Product and doctrine lead
    startTiming: Month 0
    rationale: Translates threat content and exercise practice into usable scenario templates and keeps the product grounded in controller workflows.
  - role: Cleared deployment and customer success lead
    startTiming: Month 6
    rationale: Owns secure onboarding, pilot execution, and after-action measurement once the first design partner is signed.
  - role: Federal seller
    startTiming: Month 9
    rationale: Converts founder-led discovery into repeatable pipeline, channel management, and multi-program expansion after early proof exists.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 design partners inside top federal primes.
      - Deliver the first paid rehearsal pilot with measured prep-time savings and controller trust scores.
      - Launch exports into at least one incumbent range or BAS environment.
      - Convert 1 pilot into an annual per-program subscription.
  - horizon: 12–24 months
    items:
      - Reach 4-6 active programs across 2-3 contractor accounts.
      - Add reusable scenario libraries, role permissions, and multi-exercise evidence tracking.
      - Establish 1 channel or integration partnership that reliably sources pilots.
      - Prove expansion from one program into adjacent drills within the same account.
  - horizon: 24–36 months
    items:
      - Reach 10 active programs and approximately $3M ARR.
      - Launch multi-program readiness dashboards and operator certification history.
      - Expand beyond the first contractor set into adjacent public-sector or critical-infrastructure drills where deployment constraints are lighter.
      - Demonstrate that the product is the system of record for rehearsal evidence rather than a one-off planning tool.
risks:
  - risk: Procurement and deployment constraints force higher-assurance architecture work before revenue proof.
    likelihood: High
    impact: High
    mitigation: Start with contractor-side or unclassified data, use existing channel paths, and avoid classified-first commitments in the first 12 months.
  - risk: Controllers reject generated scenarios as unrealistic or synthetic noise.
    likelihood: Medium
    impact: High
    mitigation: Keep human approval on every inject, start with constrained playbook inputs, and require realism scoring in every pilot.
  - risk: Incumbent range or BAS vendors bundle enough AI scenario generation to narrow the wedge.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on approval workflow, provenance, and cross-exercise evidence that incumbents do not naturally own.
  - risk: The business stalls as a services-heavy rehearsal-planning tool with limited expansion.
    likelihood: Medium
    impact: High
    mitigation: Price by program, productize reuse and analytics quickly, and treat pilot-to-subscription conversion as a board-level gating metric.
  - risk: Market size at the beachhead is too small to support venture-scale outcomes.
    likelihood: Medium
    impact: Medium
    mitigation: Only keep funding pace if expansion into multi-program readiness, debrief knowledge management, and adjacent public-sector buyers becomes visible by year 2.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the first pilotable product, secure deployment foundation, 2-3 proof-of-concept customers, one incumbent integration path, and the data needed to decide whether the wedge expands into a larger readiness system of record.
