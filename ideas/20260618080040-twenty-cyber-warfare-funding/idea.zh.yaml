differentiator: >-
  现有网络靶场通常内容匮乏，只是基础设施；红队服务则人力密集、难以复现。这家公司将占据中间那一层：通过审查任务演练所需的已审批方案图谱、响应树和操作员决策数据集。其防御性来自专有演练数据、条令关联审批，以及嵌入到决定战备结论的工作流中的集成——而非单纯的网络遥测数据。
