problem: >-
  通过审查的防务网络团队在准备重大演习、前出猎威胁任务和事件响应演练时，仍依赖定制脚本、电子表格注入场景，以及稀缺的资深操作员手工将威胁情报转化为方案。这一准备过程往往需要数天乃至数周，导致逼真演练次数不足、事后学习迟缓，一旦新的行动或客户任务出现，行动手册便会陷入僵化。买家需要 AI 杠杆，但又无法接受绕过人工判断的黑盒进攻系统。
targetUser:
  primary: "通过审查的美国防务集成商及联邦网络承包商中，支持战区司令部或情报界项目的网络演习导演。"
  secondary: "负责方案设计、操作员战备和事后复盘证据的红队与事件响应负责人。"
  buyer: "承包商或集成商中主管网络作战的项目执行官或副总裁。"
startupThesis:
  nonObviousInsight: >-
    AI 网络战平台最早释放的可规模化业务，不是自主进攻，而是将昂贵的人类技战术转化为可重复执行、有明确审批步骤的模拟演练的管控层。一旦 AI 能在保留人工评估的前提下把数周的方案构建压缩到数小时，训练与战备预算就会成为比实时作战授权更快的采购路径。
  beachhead: >-
    为支持单一战区司令部或情报界项目、拥有 50—200 名操作员的通过审查的美国联邦网络承包商提供季度对手模拟与事件响应演练
  wedge: >-
    一个网络演练管控平台：将威胁报告和历史行动手册转化为 AI 生成的演练方案、推荐响应树，以及针对单次任务演练的人工审批注入场景
  whyNowCatalyst: >-
    Twenty 的融资、其人机协同定位，以及"数周网络任务现可自动化"的主张，共同让演练和操作员战备成为防务买家当下最紧迫的软件管控节点。
  ventureScalePath: >-
    从为通过审查的承包商做演练设计起步，逐步扩展至实弹靶场编排、操作员认证、任务复盘、对手知识管理，最终成为防务及国家安全机构网络任务战备的系统性记录平台。
solution: >-
  产品摄取威胁情报笔记、历史演练资料、客户任务约束和已审批行动手册，为每次演练生成对手行动草稿与响应树。人工管控员逐步审查、编辑注入场景，并批准系统可模拟的内容，保留防务买家要求的人工评估姿态。演练期间，平台自动调整注入时机、跟踪操作员决策，并记录各分支的处置质量。演练结束后，平台生成带引用的事后复盘包，将每条建议追溯至底层方案、操作员行动和已审批条令。首单销售的不是泛泛的网络 AI，而是针对一个通过审查项目的更快、可重复任务演练——该项目的战备周期已有预算和紧迫需求。
goToMarketSeed:
  firstCustomer: >-
    美国前 25 大联邦网络承包商，正在为单一战区司令部或情报界客户运营周期性红队演练、猎威胁任务或重大战备演习，协调 50—200 名通过审查的操作员
  buyingTrigger: >-
    即将到来的战备演习、新任务合同授予，或迫使团队快速搭建新对手场景、重训操作员的事后复盘需求
  currentAlternative: >-
    定制化靶场脚本、在文档和电子表格中手工设计方案、人员扩充服务，以及基于幻灯片的事后复盘
  switchingReason: >-
    平台将方案创建时间从数周压缩至数小时，同时将每个对手动作和响应分支都置于人工审批之下，让买家获得更多演练次数和更清晰的证据，而无需押注自主进攻行动
  pricingHypothesis: >-
    按活跃项目和操作员组规模收取年度平台订阅费，另加行动手册摄取的安装费和事后分析高级模块费用
