topRisks:
  - name: "采购周期拖延"
    description: "通过审查的防务买家可能需要很长时间才能批准新软件，即便工作流痛点真实存在。"
    mitigation: "优先通过已掌握演练交付预算的承包商落地，首先聚焦单一顾问式演练工作流，而非宽泛的平台替换。"
  - name: "现有网络靶场厂商打包切口功能"
    description: "靶场服务商或服务商可能增加基础 AI 方案生成功能，拖慢独立产品的采购速度。"
    mitigation: "深耕更难复制的层：带引用的方案图谱、人工审批日志，以及跨演练学习——这些是基础设施厂商很少能做好的。"
  - name: "生成场景失真将导致用户信任崩塌"
    description: "一次质量差的演练就可能让操作员把系统视为合成噪声，而非有用的技战术支持工具。"
    mitigation: "对每个注入场景都要求人工审批，从受约束的行动手册库起步，并展示从源条令到生成方案的引用链。"
