differentiator: >-
  Existing cyber ranges are usually content-poor infrastructure, while red-team
  services are labor-heavy and hard to repeat. This company would own the layer
  in between: the approved scenario graph, response tree, and operator-decision
  dataset for cleared mission rehearsals. That creates defensibility through
  proprietary rehearsal data, doctrine-linked approvals, and integrations into
  the workflows that decide readiness, not just raw cyber telemetry.
