topRisks:
  - name: "Procurement cycles drag"
    description: "Cleared defense buyers may take too long to approve new software even if the workflow pain is real."
    mitigation: "Land first through contractors that already own exercise delivery budgets and start with one advisory rehearsal workflow rather than a broad platform replacement."
  - name: "Incumbent cyber-range vendors bundle the wedge"
    description: "Range providers or services firms could add basic AI scenario generation and slow adoption of an independent product."
    mitigation: "Own the harder layer of cited scenario graphs, human-approval logging, and cross-exercise learning that infrastructure vendors rarely capture well."
  - name: "Trust breaks if generated scenarios are unrealistic"
    description: "One poorly grounded exercise could make operators view the system as synthetic noise instead of usable tradecraft support."
    mitigation: "Require human approval on every inject, start with constrained playbook libraries, and show citation trails from source doctrine to generated scenarios."
