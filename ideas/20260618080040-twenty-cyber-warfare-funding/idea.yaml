problem: >-
  Cleared defense cyber teams still prepare major exercises, hunt-forward
  missions, and incident-response rehearsals with bespoke scripts, spreadsheet
  injects, and scarce senior operators who manually turn threat intelligence
  into scenarios. That prep can take days or weeks, which means fewer realistic
  repetitions, slower after-action learning, and brittle playbooks when a new
  campaign or customer mission appears. Buyers need AI leverage, but they
  cannot accept a black-box offensive system that bypasses human judgment.
targetUser:
  primary: "Cyber exercise directors at cleared U.S. defense integrators and federal cyber contractors supporting Combatant Command or Intelligence Community programs."
  secondary: "Red-team and incident-response leaders responsible for scenario design, operator readiness, and after-action evidence."
  buyer: "Program executive or vice president of cyber operations at the contractor or integrator."
startupThesis:
  nonObviousInsight: >-
    The first scalable business unlocked by AI cyber-warfare platforms is not
    autonomous offense; it is the rehearsal and control layer that turns
    expensive human tradecraft into repeatable, cited simulations with explicit
    approval steps. Once AI can compress weeks of scenario building into hours
    while preserving manual evaluations, training and readiness budgets become a
    faster procurement path than live operational authorities.
  beachhead: >-
    Quarterly adversary-emulation and incident-response rehearsals for cleared
    U.S. federal cyber contractors with 50-200 operators supporting one
    Combatant Command or Intelligence Community program
  wedge: >-
    A cyber rehearsal control plane that converts threat reports and prior
    playbooks into AI-generated exercise scenarios, recommended response trees,
    and human-approved injects for one mission rehearsal at a time
  whyNowCatalyst: >-
    Twenty's funding, its human-in-the-loop positioning, and its claim that
    weeks-long cyber tasks can now be automated make rehearsal and operator
    readiness the newly urgent software control point for defense buyers.
  ventureScalePath: >-
    Start with rehearsal design for cleared contractors, then expand into live
    range orchestration, operator certification, mission debriefs, adversary
    knowledge management, and eventually the system of record for cyber mission
    readiness across defense and national-security organizations.
solution: >-
  The product ingests threat-intelligence notes, previous exercise artifacts,
  customer mission constraints, and approved playbooks to generate a draft
  adversary campaign and response tree for each rehearsal. A human controller
  reviews every step, edits injects, and approves what the system can simulate,
  preserving the manual evaluation posture that defense buyers require. During
  the exercise, the platform adapts inject timing, tracks operator decisions,
  and records which branches teams handled well or poorly. Afterward it creates
  a cited after-action package that links each recommendation back to the
  underlying scenario, operator actions, and approved doctrine. The first sell
  is not generic cyber AI; it is faster, repeatable mission rehearsal for one
  cleared program where readiness cycles already have budget and urgency.
goToMarketSeed:
  firstCustomer: >-
    A top-25 U.S. federal cyber contractor running recurring red-team,
    hunt-forward, or major readiness exercises for one Combatant Command or
    Intelligence Community customer and coordinating 50-200 cleared operators
  buyingTrigger: >-
    An upcoming readiness exercise, new mission award, or post-incident review
    that forces the team to stand up fresh adversary scenarios and retrain
    operators quickly
  currentAlternative: >-
    Bespoke cyber-range scripting, manual scenario design in documents and
    spreadsheets, staff-augmentation services, and slide-based after-action
    reviews
  switchingReason: >-
    The platform compresses scenario creation from weeks to hours while keeping
    every adversary move and response branch under human approval, which gives
    buyers more repetitions and cleaner evidence without betting on autonomous
    offensive action
  pricingHypothesis: >-
    Annual platform subscription priced by active program and operator cohort,
    plus setup fees for playbook ingestion and premium modules for after-action
    analytics
