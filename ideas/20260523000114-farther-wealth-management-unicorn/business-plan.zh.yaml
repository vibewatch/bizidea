slug: breakaway-book-transition-os
date: '2026-05-23'
executiveSummary: >-
  Breakaway Transition OS 最适合先以中立的迁移控制层切入美国招募型 RIA 和 supported-independence 平台，而不是再做一个顾问 CRM、客户门户或通用入驻工具。第一个客户应该是一家拥有 100-300 名顾问的 SEC 注册 RIA 整合方：未来两个季度，它要把多支原大型券商团队迁到 Schwab 或 Fidelity。痛点非常尖锐，因为每签下一支团队，就会立刻出现一个死线——必须在计费开始前、在留存保底失效前、在顾问士气下滑前，把家庭账户 repaper、模型重建、合规检查和资金入账全部跑通。研究支持的市场规模为 TAM $300.0M、滩头 SAM $60.0M、3 年 SOM $7.2M；这足够支撑一个聚焦的种子轮切口，但前提是公司后续还要扩进基准分析和相邻运营工作流。MVP 应该先吃进家庭账户、持仓和模型数据，再把 repapering、ACAT 跟踪、异常分流，以及顾问和客户状态更新串起来，并且保留明确的人审闸门。GTM 要卖的不是泛泛的 AI，而是更少卡住的家庭账户、更快到首个入金账户、更低的 NIGO；拿单方式则是付费的真实迁移试点，由创始人主导销售，再叠加托管方和顾问转介绍。真正的护城河，是一张中立的迁移图谱，把表单、转移状态、托管方和家庭异常串到一起——而今天的现有厂商都看不到这条链路的全貌。最大的证据缺口仍是：不同托管方下的 NIGO 基线和资产流失率到底是多少，以及早期集成深度够不够支撑可重复部署。所以在这些证明点跑出来前，投资判断仍应维持 Watch。
problem:
  - 招募型 RIA 现在仍靠电子表格、邮件、CRM 工单和托管方门户，来跑 repapering、ACAT 跟踪、投资组合重映射、合规确认和客户沟通。
  - 只要出现拖延或转移错误，计费就会后移，招募来的 AUM 也可能流失；更糟的是，顾问会在这段关系里最关键的时刻，得到一次糟糕的第一体验。
solution:
  - 提供一套迁移 flight deck，导入家庭、账户、持仓和旧模型数据，然后给运营、合规和顾问团队拉出一条共享执行队列。
  - 再加上家庭级状态视图、异常分流、审计轨迹和下一步最佳动作建议，让机构不用第一天就替换现有 CRM 或托管栈，也能更快把账户入金。
whyWeWin:
  - 公司切进的是业务簿正式上线前的迁移事件：预算最急、托管方项目、顾问服务和顾问套件都只覆盖部分流程，而没人把整条链路管住。
  - 一旦沉淀出跨托管方的表单、家庭异常、ACAT 时序和迁移结果数据，公司就能形成一层难复制的基准分析和自动化能力，单系统的现有厂商很难追上。
strategicChoices:
  beachhead: 美国 SEC 注册 RIA 整合方和 supported-independence 平台，拥有 100-300 名顾问，每季度招募 2-10 支 breakaway 团队，并反复把每支团队的 200-1,500 个家庭账户迁到 Schwab 或 Fidelity。
  wedgeRationale: 这一层切口买家明确、预算触发点由事件驱动，而且迁移量足够大，能在一两次真实迁移里产出可量化证明。相比一上来卖给整个 RIA 市场，这条路径更容易更快跑出结果，因为多数机构体量太小、招募频率太低，不值得专门上一套迁移系统。
  sequencingRationale: 先做带人工审批的控制层，只覆盖两条主流托管路径，再配文件导入兜底。这样能先拆掉最急的瓶颈，又不用让买家替换现有顾问技术栈，也不用一开始就信任全自动工作流。只有等付费试点证明首个入金账户更快、异常率更低，公司才该扩更广的托管覆盖、基准分析和相邻的迁移后运营。
  notYet:
    - 持续性的顾问 CRM 或投资组合管理替代方案
    - 在迁移价值跑通之前，先做私募市场运营和另类资产服务
    - 在 Schwab 和 Fidelity 还没形成可重复部署前，就大规模铺向所有托管方的 broker-dealer
    - 面向终端客户的财富管理 App 体验
market:
  tam: 基于约 1,200 家存在持续迁移需求的机构估算，美国 TAM 约为 $300.0M；假设每家每年在迁移运营软件或等价服务上的预算约为 $250k。
  sam: 基于约 250 家招募型 RIA 和 supported-independence 平台估算，滩头 SAM 约为 $60.0M；假设每家每年在重复迁移工作流上的支出约为 $240k。
  som: 基于 30 家活跃客户、每家年合同价值约 $240k 估算，3 年可触达 SOM 约为 $7.2M；获客方式是直销加托管方和顾问转介绍。
  segments:
    - 主要：反复招募 breakaway 团队的美国 RIA 整合方和 supported-independence 平台
    - 次要：设有持续托管转换台的独立 broker-dealer 和大型 RIA
  buyingProcess: >-
    日常使用者是迁移运营经理、合规负责人和新加入的顾问团队，但真正拍板通常在 COO 或顾问迁移负责人手里。流程往往从签下一支团队或完成 tuck-in 收购开始，因为那会立刻形成硬迁移死线；随后就会进入 vendor-risk 和集成审查，因为产品会碰客户数据、转移文件和工作流控制权。
product:
  mvp: >-
    MVP 是一套面向单次真实招募业务簿迁移的控制平面。它要导入家庭账户、持仓和模型数据；给 repapering、ACAT 状态和合规任务建立按角色分配的队列；同时提供家庭级状态视图，并对异常处理和面向客户的更新保留明确的人审。
  sixMonth: 为 Schwab 和 Fidelity 迁移工作流交付付费试点，覆盖数据导入、家庭账户队列、ACAT 状态跟踪、异常管理、审计日志，以及顾问或客户状态视图。
  twelveMonth: 把首批试点转成正式生产客户；用可重复的托管方连接器和文件映射模板压缩部署时间；再上线 NIGO 率、家庭账户入金天数和异常原因的基准仪表盘。
  twentyFourMonth: 扩到第三家托管方、更深的投资组合模型映射，以及迁移后的相邻工作流，例如持续性家庭服务和面向高频迁移客户的税务感知型变更控制。
  keyBets:
    - 聚焦的迁移控制层，可以在买家替换整个顾问运营栈之前，先把预算拿下来。
    - 两条主流托管路径加文件导入兜底，已经足够覆盖早期体量，不至于把产品拖成重服务模式。
    - 在真实客户转移事件里，先保留人工审批闸门，比直接上全自动工作流更容易赢得信任。
    - 在大型现有厂商反应过来之前，基准数据和伙伴转介绍可以先把 CAC 压下来、留存拉上去。
gtm:
  wedge: 卖一个付费的真实迁移试点，证明它能缩短首个家庭账户入金时间、降低 NIGO 或卡住的转移比例，而不是泛泛地讲财富管理里的 AI 故事。
  channels:
    - 创始人主导直销，面向招募型 RIA 的 COO、顾问迁移负责人和迁移运营主管
    - 托管方和 supported-independence 生态内的转介绍；在 breakaway 流程早期，供应商往往就在这里被选定
    - 已经参与真实迁移动作、也已被纳入预算的迁移顾问和 breakaway 顾问实施伙伴
  funnelTargets: Lead→qualified pilot 20-30%，qualified pilot→paid pilot 30-40%，pilot→production 60%+，production→12 个月内升级到年度最低消费 50%+。
  pricing: >-
    对每次真实迁移收一笔付费实施费，再按家庭账户迁移量计费；对于高频招募客户，再转成年度平台最低消费，超出的家庭账户或迁移动作另行加价。这种定价更贴合买家的事件触发型预算——他们本来就在为上线支持花钱，也更愿意为已入金家庭账户这样的结果买单，而不是为席位数买单。
businessModel:
  revenueStreams:
    - 面向真实顾问团队迁移的付费实施费
    - 平台内每个家庭账户迁移的按量费用
    - 反复迁移机构的年度平台最低消费
    - 正式上线后再卖高级基准分析和异常分析模块
  unitOfValue: 通过平台管理的家庭账户和顾问团队迁移动作
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一客户内扩更多迁移、更多家庭账户和更多托管路径
    - 卖 NIGO、ACAT 时序和异常模式的基准报告
    - 从上线前迁移扩到相邻的家庭服务和变更控制工作流
strategyMap:
  northStarMetric: 每季度通过平台、并在目标 SLA 内完成入金的家庭账户数
  inputMetrics:
    - 从团队签约到首个家庭账户入金的中位天数
    - 平台处理账户的 NIGO 率
    - 需要跳出标准工作流、转人工升级的家庭账户占比
    - 试点转正式生产的转化率
    - 每季度来自伙伴转介绍的合格试点机会数
  moatsToBuild:
    - 把家庭账户、表单、资产、转移状态和异常串起来的跨托管迁移图谱
    - 告诉客户哪些托管方、资产类别和工作流步骤最容易拖慢进度或漏资产的基准数据集
    - 在预算形成那一刻嵌入托管方和迁移顾问渠道的分发能力
  killCriteria:
    - 如果前 20 次 ICP 访谈里，不到 8 家把迁移吞吐量列为前两大运营痛点，就缩窄切口或直接停掉。
    - 如果前 3 个付费试点没能把首个家庭账户入金天数至少缩短 20%，或没能把 NIGO 至少压低 15%，那就在放大 GTM 前重做产品。
    - 如果前 5 次实施仍有超过 50% 的工作要靠定制服务或手工清洗数据完成，就继续收窄 ICP，或者接受这会是一门服务驱动的生意。
  mermaid: |
    flowchart LR
      Wedge[Breakaway team transition wedge] --> MVP[Human-approved transition flight deck]
      MVP --> Proof[Faster funded households and lower NIGO]
      Proof --> Expansion[Benchmark analytics and adjacent ops]
investorMemo:
  verdict:
    call: Watch
    conviction: 买家痛点真实，事件驱动切口也讲得通，但在公司证明集成能否重复部署、以及预算能否从重服务试点顺利转成软件收入之前，判断仍应维持中等把握。
    whyBelieve: 研究表明，买家已经在 breakaway 支持上投入了不小预算，而且至今没有哪家现有厂商能在跨系统场景里，把家庭级迁移编排中立地管到底。
    whyDoubt: 公司还得证明，招募型 RIA 会为一层独立控制层掏钱，而不是继续扩托管方项目、咨询顾问服务，或相邻的入驻供应商。
    nextDiligence: 拿下 3 个付费的真实迁移试点，按托管方量出家庭账户入金时长和异常率改善，再验证这些试点能否转成 $200k+ 的年度合同。
  firstCustomer:
    title: 招募型 RIA 整合方的顾问迁移负责人
    profile: 一家美国 SEC 注册 RIA 平台，拥有 150 名顾问，持续从大型券商体系招人，以 Schwab 或 Fidelity 为主要目标托管方；在下一次已签约团队迁移中，运营团队要协调 300-800 个家庭账户。
    trigger: 一支已签约的 breakaway 团队或 tuck-in 收购，带来了固定死线——必须在保底补偿和留存目标滑坡前，把数百个家庭账户完成 repaper 和入金。
    buyer: COO 或顾问迁移负责人
    initialContract: 一次真实 200-500 个家庭账户迁移的 $50k-$100k 付费试点；一旦机构决定把重复迁移动作标准化到这套系统上，再抵扣进 $200k-$300k 的年度平台最低消费。
  mustBeTrue:
    - 至少有 100 家滩头客户具备足够高频的迁移量，值得每年为软件花约 $200k 或更多。
    - 买家足够在意家庭账户入金速度、NIGO 和 AUM 留存，才会买软件，而不只是再加顾问服务或内部项目经理。
    - 两条首发托管路径加文件导入兜底，足以让多数早期客户在 60 天内完成部署。
    - 当产品拿出可量化的迁移 ROI 时，付费试点转成年框协议的比例能高于 60%。
    - 在托管方或顾问套件补齐工作流缺口之前，跨迁移基准数据能先累成一条耐久护城河。
  diligenceQuestions:
    - 目标细分市场里，不同托管方当前的首个家庭账户入金天数、NIGO 率和 90 天 AUM 留存到底是多少？
    - 对第一个客户来说，哪些迁移任务发生在 ACATS 之外，并且最吃人工？
    - Schwab、Fidelity 和 Pershing 在不依赖脆弱定制开发的前提下，究竟暴露出多少实时状态数据或工作流访问能力？
    - 现实里，这笔采购到底走哪条预算线：COO 运营预算、迁移支持预算，还是招募 P&L？
    - 买家为什么会选这套平台，而不是用托管方支持、Dynasty 或 Sanctuary 服务、Advisor360、Docupace，或者自建控制塔？
operatingAssumptions:
  - assumption: 具备持续 breakaway 量的招募型 RIA 和 supported-independence 平台，是痛感最强的早期买家。
    basis: idea.yaml
    validationTest: 访谈 20 家目标机构，确认至少 8 家过去 12 个月迁过多支团队，并把迁移吞吐量列为前两大运营痛点。
    decisionImpact: 如果不成立，公司应更早转向更大的 broker-dealer 迁移台，或换一个财富管理运营切口。
  - assumption: 产品在付费试点后，能承接 $200k-$300k 的年度正式合同。
    basis: research.yaml
    validationTest: 至少签下 3 个付费试点，并把其中至少 2 个转成目标区间内的年度协议。
    decisionImpact: 如果不成立，公司就得下调 ACV 预期、扩产品范围，或接受更重的服务收入结构。
  - assumption: Schwab 和 Fidelity 工作流加文件导入兜底，足以覆盖第一年的大部分早期迁移量并实现产品化。
    basis: research.yaml
    validationTest: 映射前 10 个合格机会，确认至少 60% 的预期家庭账户可通过首发路径服务，而无需定制集成。
    decisionImpact: 如果不成立，实施成本会上升，公司就得继续收窄 ICP，或提高定价。
  - assumption: 人工审批闸门和审计轨迹，足以打消买家在首轮部署中的信任与安全顾虑。
    basis: research.yaml
    validationTest: 完成 vendor-risk 审查，并上线 2 个试点；在保留人工最终审批的前提下，让买家接受产品处理客户数据和工作流分发。
    decisionImpact: 如果不成立，产品就得先退回只读分析层，或在更大规模铺开前加重合规投入。
  - assumption: 托管方和迁移顾问转介绍，能带来比纯 outbound 更低 CAC、意图更强的线索。
    basis: research.yaml
    validationTest: 签下 3 个转介绍伙伴，生成至少 6 个合格机会，并从伙伴来源里至少关掉 1 个付费试点。
    decisionImpact: 如果不成立，招聘和支出就得更早向直销和创始人主导 outbound 倾斜。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 在滩头市场里，对 20 位 COO、迁移负责人和运营主管做结构化访谈。
    hypothesis: 一旦签下团队、形成真实迁移死线，迁移吞吐量就急到足以支撑软件预算。
    successMetric: 至少 12 次访谈确认这一触发点，而且至少 8 家愿意分享近期迁移的评分卡、流程图或复盘。
    owner: Founder/CEO
  - horizon: 0-90 天
    experiment: 从 3-5 家共创客户收集样本家庭名册、模型文件、repapering 材料包和异常日志。
    hypothesis: 即便不替换整套顾问技术栈，也存在一套可重复的数据模型，足以支撑家庭映射、任务编排和异常分流。
    successMetric: 至少 3 家伙伴在结构上足够相似，能定义出一套 MVP schema 和上线 playbook。
    owner: Founding eng
  - horizon: 90-180 天
    experiment: 在一次真实团队迁移里，用带人工审批的 repapering、ACAT 跟踪和状态工作流跑 2-3 个付费试点。
    hypothesis: 产品能在真实迁移中显著缩短家庭账户入金周期，并压低 NIGO。
    successMetric: 至少 2 个试点把首个家庭账户入金天数缩短 20% 以上，并把 NIGO 压低 15% 以上。
    owner: Founder/CEO
  - horizon: 90-180 天
    experiment: 测试从迁移费、按家庭账户计费到年度最低消费的试点转正定价结构。
    hypothesis: 当重复迁移被证明跑得通后，买家会更偏好从事件型定价自然滚入年度平台承诺。
    successMetric: 至少 2 个付费试点接受这一结构，且至少 1 家进入年度合同谈判。
    owner: Founder/CEO
  - horizon: 180-360 天
    experiment: 以清晰的 ROI 口径和实施边界，启动托管方与迁移顾问的转介绍机制。
    hypothesis: 这些伙伴本来就在 breakaway 流程中影响供应商选择，因此会比冷启动 outbound 更早把买家带进来。
    successMetric: 至少拿到 5 个来自伙伴的合格机会，并从转介绍渠道拿下 1 个正式生产客户。
    owner: GTM lead
  - horizon: 180-360 天
    experiment: 为首批正式生产客户上线基准仪表盘和部署模板。
    hypothesis: 当切口被证明成立后，最快拉低流失、拉高 ACV 的路径，就是把基准报告和可重复实施资产补齐。
    successMetric: 至少 2 个正式生产客户采用基准报告，且部署时间压到 45 天以内。
    owner: Product/integration lead
operations:
  - 在任何会改动客户转移工作流的自动化上线前，先把按角色权限、审批日志、文档保留和 incident-response playbook 建起来。
  - 每周复盘 NIGO 原因、卡住的转移、不可转移资产和家庭异常，让 roadmap 跟着真实故障模式走。
  - 维护一套标准化入驻 playbook，覆盖数据导入、家庭映射、沟通模板和托管方升级路径。
  - 按托管方和迁移类型，持续跟踪来自伙伴的 pipeline、试点 ROI、部署时长和家庭账户留存结果。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 由创始人亲自负责客户发现、创始人主导销售和伙伴拓展，因为首要风险是买家真实需求和信任，而不是把现有销售手册规模化。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 先把迁移图谱、工作流引擎和首批托管方数据导入路径搭出来，支撑真实试点。
  - role: 产品/集成工程师
    startTiming: Month 3-6
    rationale: 把重复出现的 Schwab 和 Fidelity 工作流产品化，压缩部署时间，减少定制数据映射。
  - role: 实施与合规负责人
    startTiming: Month 6-9
    rationale: 把真实迁移支持、审计控制和客户安全要求，收束成一套可重复的入驻机制。
  - role: GTM 负责人
    startTiming: Month 9-12
    rationale: 只有在付费试点转正和可引用 ROI 被证明后，才开始放大直销和伙伴来源 pipeline。
milestones:
  - horizon: 0-12 个月
    items:
      - 完成 20 次 ICP 访谈，并拿下 5-8 家愿意提供真实迁移材料的共创客户。
      - 为 Schwab 和 Fidelity 的真实迁移工作流交付 MVP，覆盖家庭账户队列、异常管理和审计日志。
      - 拿下至少 2 个付费试点，并把至少 1 个客户转成年度正式合同。
      - 建立至少 3 个托管方或顾问转介绍关系。
  - horizon: 12-24 个月
    items:
      - 达到 10-12 家正式生产客户，并把部署时间压到 45 天以下。
      - 上线基准仪表盘、第三家托管方支持，并在现有客户里做出可量化的扩张收入。
      - 证明来自伙伴的 pipeline 已贡献出有意义比例的合格机会和正式生产赢单。
  - horizon: 24-36 个月
    items:
      - 从迁移工作流扩到相邻的家庭服务和变更控制流程，服务高频复购客户。
      - 把基准数据集做强到足以提升赢单率、缩短实施时间，并支撑高级分析溢价。
      - 把产品推到一个位置：对于招募型 RIA，它不再是一次性试点工具，而是默认的迁移 system of record。
risks:
  - risk: 托管方集成深度低于预期，导致大量人工处理或脆弱的定制化实施。
    likelihood: High
    impact: High
    mitigation: 先盯最常见的托管路径，用文件导入做兜底；在部署时长和数据质量还没稳定前，拒绝过早横向扩张。
  - risk: 买家不信任初创公司参与真实客户转移工作流，或者直接卡在安全审查。
    likelihood: Medium
    impact: High
    mitigation: 保留人工审批闭环，先上线可审计能力，并把早期试点定位成控制层叠加，而不是自主替换整个工作流。
  - risk: 托管方项目、顾问服务或相邻入驻供应商看起来已经“够用”，从而压缩独立产品预算。
    likelihood: High
    impact: High
    mitigation: 卖可量化的家庭级结果，坚持跨系统中立，并把服务机构和单系统厂商都无法复制的基准数据做出来。
  - risk: 高价值买家群体比模型假设更小、决策更慢，限制高效率的风险投资级增长。
    likelihood: Medium
    impact: Medium
    mitigation: 第一年的重点就是验证滩头市场里的量和 ACV，在此之前不要急着扩到 broker-dealer、大型 RIA 或相邻运营细分。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月跑道把首发托管集成做出来，完成 2-4 个付费真实迁移试点，补齐安全与合规控制，并在滩头市场里证明一条可重复的试点转正式生产路径。
