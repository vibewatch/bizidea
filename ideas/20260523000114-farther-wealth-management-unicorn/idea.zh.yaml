jobsToBeDone:
  - job: >-
      当一支 breakaway 顾问团队签约后，帮助迁移运营负责人把每个家庭账户迁到新的托管方和顾问技术栈上，这样他们才能守住资产并尽快开始计费。
    currentAlternative: 内部项目经理靠电子表格、邮件和托管方门户做协调
    successMetric: 从顾问签约到首个家庭账户入金的天数，以及 90 天后招募 AUM 的留存比例
  - job: >-
      当新迁入的业务簿里有定制模型、不同注册要求和客户沟通需求时，帮助运营分析师把账户映射对、把异常尽快清掉，这样就能避免 NIGO 返工和客户困惑。
    currentAlternative: 迁移咨询公司加 CRM 工单里的手工异常跟踪
    successMetric: NIGO 率、ACAT 完成时长，以及无需人工升级就完成激活的家庭账户比例
