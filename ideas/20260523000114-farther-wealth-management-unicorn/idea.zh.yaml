problem: >-
  独立 RIA 平台招顾问可以很快，但把新团队手里的真实业务簿迁过来，依然是一场横跨多套系统的脆弱消防演练。运营团队得在托管方门户、CRM 任务和电子表格之间来回切换，处理 repapering、ACAT 状态、投资组合重映射、合规确认和客户沟通。只要一个环节拖慢，就可能漏资产、让顾问不满，也会在新平台承诺 AI 原生、更顺滑运营模式的第一刻，把首体验做砸。
targetUser:
  primary: 在美国独立 RIA 平台和整合方中，负责招募 breakaway 顾问团队的迁移与入驻负责人
  secondary: 为新加入顾问处理托管转换和家庭账户迁移的运营经理
  buyer: 50-500 名顾问规模的 RIA 平台 COO 或顾问迁移负责人
startupThesis:
  nonObviousInsight: >-
    Farther 的爆发说明，稀缺资源已经不再是顾问愿不愿意切去现代平台，而是平台有没有能力把整本业务簿安全迁过去。随着一体化 AI 原生技术栈逐渐成了可信目的地，真正藏着的瓶颈转到了 repapering、家庭迁移和跨系统模型重建上——而这条链路至今没有哪家现有厂商能从头管到尾。
  beachhead: >-
    美国 SEC 注册的 RIA 整合方——每季度招募 2-10 支从大型券商体系出走的顾问团队，并把每支团队的 200-1,500 个家庭账户迁到新的托管方和顾问技术栈上
  wedge: >-
    一套迁移 flight deck，吃进代表代码、账户名册、持仓、旧模型数据和合规清单，然后把 repapering、ACAT 跟踪、投资组合映射和家庭级状态更新串成一条执行链
  whyNowCatalyst: >-
    Farther 在 AI 原生整合逻辑上已经把招募资产做到 $23B，意味着对那些想拿下顾问业务簿的平台来说，迁移吞吐量会成为下一道最急的硬约束。
  ventureScalePath: >-
    先拿下招募业务簿迁移，再向持续性的家庭服务、另类投资运营、税务感知型组合调整控制，以及卖给 RIA、托管方和 broker-dealer 的基准分析产品扩张。
solution: >-
  这款产品做的是顾问业务簿迁移工作流系统，不是日常顾问 CRM。它从离开的团队导入家庭、账户和持仓数据，把每个家庭映射到目标托管方和目标模型，再给运营、合规和顾问团队生成一条共享执行队列。客户和顾问看到的是透明的状态更新，不再是碎成一地的邮件线程；总部管理层则能按团队、托管方和异常类型看清哪里卡住。时间一长，系统还会学会哪些表单、资产类别和家庭配置最容易引发 NIGO、ACAT 卡壳或留存风险，并在资产流失前给出下一步最佳动作。
goToMarketSeed:
  firstCustomer: >-
    一家美国 SEC 注册的 RIA 整合方，拥有 100-300 名顾问，并将在未来两个季度把多支原大型券商团队迁入 Schwab 或 Fidelity
  buyingTrigger: >-
    新签下一支团队，或完成一笔 tuck-in 收购后，必须在顾问保底补偿、留存目标和团队士气滑坡前，把数百个家庭账户迁过去
  currentAlternative: 迁移咨询公司，加上电子表格、托管方门户、CRM 任务和内部运营项目经理
  switchingReason: >-
    它能缩短首个到账户入金的天数，降低 NIGO 和 ACAT 错误，并让顾问和总部负责人都在一个家庭级控制塔里看进度，而不是困在邮件混战里。
  pricingHypothesis: 按每次迁移收实施费，叠加按每个家庭账户收迁移费；对高频招募机构再设年度平台最低消费。
