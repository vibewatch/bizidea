differentiator: >-
  大多数 wealthtech 厂商都是在业务簿已经上线之后，才开始向顾问卖软件。这家公司卖的是更前面的时点：团队已经签下、却还没开始产生收入；每拖一天，留存 AUM 都可能被吃掉；而且跨系统工作流没有哪家现有厂商能真正兜底。由此积累出的表单、转移时点、家庭异常和迁移结果数据，会沉淀成一张有防御力的迁移图谱，未来既能给托管方做基准比较、预测流失风险，也能把更多迁移动作自动化。
