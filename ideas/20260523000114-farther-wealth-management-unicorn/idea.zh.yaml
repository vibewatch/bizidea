topRisks:
  - name: 托管方集成卡脖子
    description: 深度工作流价值取决于跨托管方和旧系统的数据与转移状态集成是否稳定可靠。
    mitigation: 先拿下两条最主流的托管路径，并用文件导入做兜底；只有在线上真实迁移里证明 ROI 之后，才继续扩更多集成。
  - name: 在位套件快速跟进
    description: 大型 RIA 平台或托管方一旦看清需求，可能会自己补上一层相邻的迁移工具。
    mitigation: 靠跨系统中立、更快部署，以及任何单一平台都看不到的更丰富迁移基准数据取胜。
  - name: 企业信任门槛高
    description: 在高风险的顾问迁移动作里，机构可能不愿让一家初创公司碰敏感的客户转移工作流。
    mitigation: 第一单先卖成运营控制层，明确保留人工审批闸门、审计轨迹和可量化成功指标，并把范围收在一场真实迁移里。
