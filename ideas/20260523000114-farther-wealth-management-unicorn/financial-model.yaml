slug: "breakaway-book-transition-os"
date: "2026-05-23"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-06"
    unit: month
    source: "The model starts in the first full month after the 2026-05-23 business-plan date."
  - id: A2
    name: "Starting cash after pre-seed close"
    value: "$2.4M"
    unit: usdM
    source: "[BP fundingAsk] The BP targets a $2M-$4M pre-seed; the base model uses $2.4M because it is enough to reach the Q4Y2 proof milestone with a six-month buffer."
  - id: A3
    name: "Steady-state annual revenue per active customer"
    value: "$240K"
    unit: usdK_per_customer_year
    source: "[BP market.som; BP investorMemo.firstCustomer.initialContract; research.market.sam] BP and research both anchor repeat customer spend around $240K annually, inside the BP $200K-$300K production contract range."
  - id: A4
    name: "Monthly revenue proxy per active paying customer"
    value: "$20K per month"
    unit: usdK_per_customer_month
    source: "[A3; BP investorMemo.firstCustomer.initialContract] A $60K pilot over three months and a $240K annual minimum both normalize to roughly $20K per month, so the base model treats each paying pilot or production logo as one active paying customer."
  - id: A5
    name: "Customer ramp"
    value: "4 active paying customers by M12, 12 by Q4Y2, and 30 by Q4Y3"
    unit: customers
    source: "[BP milestones; BP experimentRoadmap; BP operatingAssumptions; research.market.som] This pace requires 2 paid pilots in year 1, a repeatable pilot-to-production motion in year 2, and lands exactly on the research year-3 SOM ceiling of 30 customers rather than exceeding it."
  - id: A6
    name: "Steady-state gross margin"
    value: "70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] The business plan explicitly targets 70% gross margin, so modeled COGS are 30% of revenue."
  - id: A7
    name: "Monthly logo churn"
    value: "1.5%"
    unit: percent
    source: "Startup-finance heuristic for sticky enterprise workflow software with high switching friction but still-early product maturity and some risk from incumbent overlap."
  - id: A8
    name: "Fully loaded CAC"
    value: "$95K per new customer"
    unit: usdK_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; research.distributionChannels] Founder-led enterprise sales with live-transition proof, security review, and partner referrals should be cheaper than pure outbound but still expensive relative to mid-six-figure ACV."
  - id: A9
    name: "Average sales cycle"
    value: "7 months"
    unit: months
    source: "[research.sensitivityCases; research.adoptionFrictionMatrix] Vendor-risk review, custodian diligence, and live-event timing make this an enterprise sale even with urgent triggers."
  - id: A10
    name: "Loaded salary bands"
    value: "Founder/CEO $180K; engineering $170K; product/integration $150K; implementation/compliance $130K; GTM $160K; customer success/partnerships $120K; G&A $110K"
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for a U.S. pre-seed vertical SaaS company, anchored to [BP team] and the BP sequence of product, implementation, then GTM hiring."
  - id: A11
    name: "Headcount ramp snapshots"
    value: "Founder 1/1/1/1/1/1; engineering 1/1/2/2/3/4; product/integration 0/1/1/1/1/1; implementation/compliance 0/0/1/1/2/2; GTM 0/0/0/1/2/2; customer success/partnerships 0/0/0/0/1/1; G&A 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP strategicChoices.sequencingRationale] The ramp follows the BP: build the control layer first, add repeatable implementation capacity next, then scale GTM and support after pilot proof."
  - id: A12
    name: "Quarterly payroll smoothing"
    value: "Y2 and Y3 salary expense ramps gradually between year-end headcount snapshots"
    unit: method
    source: "[financial-modeler instructions] Quarterly salary lines are smoothed instead of stepping only at Q4 year-end so payroll matches the BP hiring sequence."
  - id: A13
    name: "Non-payroll operating budgets"
    value: "Y1 monthly S&M $6K-$20K, R&D $12K-$20K, G&A $10K-$15K; Y2 quarterly S&M $50K-$72K, R&D $58K-$65K, G&A $42K-$48K; Y3 quarterly S&M $78K-$108K, R&D $68K-$80K, G&A $50K-$56K"
    unit: usdK
    source: "Startup-finance heuristic for a workflow product that must fund cloud, security, travel, legal, auditability, and partner enablement before it scales."
  - id: A14
    name: "Partner-sourced win share"
    value: "About 30% of new wins by Y3"
    unit: percent_of_new_customers
    source: "[BP experimentRoadmap; BP milestones; research.distributionChannels] The BP explicitly targets custodian and consultant referrals, so the base model assumes partner sourcing lowers CAC and supports the year-3 ramp."
  - id: A15
    name: "Cash conversion simplification"
    value: "Ending cash rolls forward from EBITDA with no debt, capex, tax, or working-capital lines"
    unit: method
    source: "Startup-finance heuristic for an asset-light pre-seed software company where operating burn is the dominant cash driver."
  - id: A16
    name: "Downside scenario inputs"
    value: "20 customers by Q4Y3, $220K ACV, 65% gross margin, 9-month sales cycle, and 15% partner-sourced wins"
    unit: scenario_inputs
    source: "[BP risks; research.sensitivityCases] This reflects the documented risks that custodian support looks good enough, integrations stay messy, and security review stretches cycle time."
  - id: A17
    name: "Upside scenario inputs"
    value: "35 customers by Q4Y3, $260K ACV, 73% gross margin, 5-month sales cycle, and 40% partner-sourced wins"
    unit: scenario_inputs
    source: "[BP product.twentyFourMonth; BP milestones; research.sensitivityCases] The upside assumes repeatable deployment and benchmark analytics unlock expansion and faster partner-led distribution."
  - id: A18
    name: "Funding sizing method"
    value: "Raise enough to reach the Q4Y2 proof milestone plus roughly six months of buffer"
    unit: method
    source: "[BP fundingAsk; financial-modeler instructions] The round is sized to fund paid pilots, production conversions, launch-channel partnerships, and a modest post-milestone buffer."
