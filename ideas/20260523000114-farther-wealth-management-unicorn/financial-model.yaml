    y3RevenueImpactK: -480.0
    cashImpactK: -180.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      PartnerLeads[Founder + partner leads] --> Pilots[Paid live-transition pilots]
      Pilots --> Conversions[Annual minimum customers]
      Conversions --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash after payroll and operating spend]
modelSanity:
  - checkName: "Revenue engine"
    finding: "The base case is driven by a narrow enterprise wedge that scales from 4 active paying logos in Y1 to 30 by Q4Y3 at roughly $240K annual revenue per customer."
  - checkName: "Must go right"
    finding: "Paid pilots must convert into annual minimum contracts while Schwab and Fidelity deployments become repeatable enough that implementation does not stay services-heavy."
  - checkName: "Model breaks if"
    finding: "If sales cycles move toward 9 months and gross margin stays near 65%, the company burns through most of its buffer before Y3 profitability."
  - checkName: "Next-round proof"
    finding: "A seed-worthy next step is 10-12 production customers by Q4Y2 with sub-45-day deployments and a meaningful share of wins coming from custodian or consultant referrals."
sanityChecks:
  ruleOf40: "Y3 growth 181.8% + EBITDA margin 23.7% = 205.5% (directionally strong but inflated by a small Y2 revenue base)."
  burnMultiple: "Y2 burn multiple is about 0.4x: $592K EBITDA burn against $1.62M of net new revenue versus Y1."
  revenuePerFte: "$465K Y3 revenue per FTE (benchmark roughly $200K-$400K SaaS; above benchmark because ACV is high and the model stays lean at 12 FTE)."
  flags:
    - "Base case reaches the research year-3 SOM ceiling of 30 customers, so upside beyond this model requires either faster segment expansion or higher ACV."
    - "The model uses a flat $20K monthly revenue proxy for both paid pilots and production logos; real implementations may produce lumpier quarterly revenue recognition."
    - "Key proof points like baseline NIGO reduction, days-to-funded-household improvement, and deployment repeatability are still evidence gaps in the BP and research."
