scenarios:
  downside:
    description: "Custodian and security friction stretch sales cycles, gross margin slips, and the company exits Y3 with only 20 active customers."
    y3RevenueK: 3720.0
    y3EbitdaK: -140.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - "Q4Y3 customers fall from 30 to 20."
      - "ACV drops from $240K to $220K as buyers resist annual minimums."
      - "Gross margin falls from 70% to 65% because implementations stay services-heavy."
      - "Sales cycle extends from 7 months to 9 months and partner-sourced wins fall to 15%."
  base:
    description: "The company converts live pilots into annual minimum contracts and reaches the research-backed SOM ceiling of 30 active customers by Q4Y3."
    y3RevenueK: 5580.0
    y3EbitdaK: 1321.0
    cashLowPointK: 922.2
    keyAssumptionChanges:
      - "Q4Y3 customers reach 30."
      - "Steady-state ACV holds at $240K."
      - "Gross margin reaches the BP target of 70%."
      - "Partner-sourced wins rise to roughly 30% by Y3."
  upside:
    description: "Repeatable custodial connectors and benchmark analytics shorten the sales cycle, improve pricing power, and push the company to 35 active customers by Q4Y3."
    y3RevenueK: 6960.0
    y3EbitdaK: 2260.0
    cashLowPointK: 1050.0
    keyAssumptionChanges:
      - "Q4Y3 customers rise from 30 to 35."
      - "ACV expands from $240K to $260K with analytics upsell."
      - "Gross margin improves from 70% to 73% as integrations standardize."
      - "Sales cycle drops from 7 months to 5 months and partner-sourced wins rise to 40%."
