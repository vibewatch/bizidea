jobsToBeDone:
  - job: >-
      When a breakaway advisor team signs, help the transition operations lead migrate every household onto the new
      custodian and advisory stack, so they can retain assets and start billing quickly.
    currentAlternative: Internal project managers coordinating spreadsheets, email, and custodian portals
    successMetric: Days from signed advisor to first funded household and percentage of recruited AUM retained after 90 days
  - job: >-
      When an incoming book has bespoke models, registrations, and client communication needs, help operations analysts
      map accounts correctly and resolve exceptions fast, so they can avoid NIGO rework and client confusion.
    currentAlternative: Transition consulting firms and manual exception tracking in CRM tickets
    successMetric: NIGO rate, ACAT completion time, and households activated without manual escalation
