topRisks:
  - name: Custodian integration bottleneck
    description: Deep workflow value depends on reliable data and transfer-status integration across custodians and legacy systems.
    mitigation: Start with two dominant custodian pathways and file-ingestion fallbacks, then expand integrations only after proving ROI in live transitions.
  - name: Incumbent suite response
    description: Large RIA platforms or custodians may build adjacent transition tooling once the need becomes obvious.
    mitigation: Win with cross-system neutrality, faster deployment, and a richer migration benchmark dataset than any single platform can see.
  - name: Enterprise trust hurdle
    description: Firms may hesitate to let a startup touch sensitive client-transfer workflows during a high-stakes advisor move.
    mitigation: Sell the first deal as an operations control layer with human approval gates, audit trails, and measurable success metrics tied to one live transition.
