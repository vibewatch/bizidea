differentiator: >-
  Most wealthtech vendors sell to advisors after the book is already live on-platform. This company sells into the
  pre-revenue moment when the firm has already signed the team, every day of delay threatens retained AUM, and no
  incumbent cleanly owns the cross-system workflow. The resulting dataset of forms, transfer timing, household
  exceptions, and migration outcomes becomes a defensible transition graph that can benchmark custodians, predict
  fallout risk, and automate more of the move over time.
