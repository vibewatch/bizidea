categoryDynamics:
  growthRate: 12.6% 2024 AUM growth among SEC-registered advisers
  growthRateSourceRefs: [3]
  tailwinds:
    - point: 顾问向独立化迁移的趋势仍然稳固，因此招募型 RIA 会持续有业务簿要迁。
      sourceRefs: [5, 6, 24]
    - point: 多托管采用率上升，工作流复杂度随之增加，也让中立控制层的价值更高。
      sourceRefs: [11, 15]
    - point: 现代顾问平台和入驻工具正在重塑买家对自动化和一体化工作流的预期。
      sourceRefs: [1, 19, 25]
  headwinds:
    - point: 托管方正在扩自己的上线和增长支持项目，这会挤压泛化支持工具的空间。
      sourceRefs: [8, 14, 15]
    - point: 大多数 RIA 规模仍然偏小，因此公司必须盯住那批高尾部、高频招募机构，而不是想吃下整个市场。
      sourceRefs: [3, 4]
    - point: 对处理转移材料和 PII 的供应商来说，安全和数据治理要求会持续抬高实施摩擦。
      sourceRefs: [10, 23]
competitors:
  - name: Schwab Advisor ProDirect
    stage: incumbent
    wedge: 由托管方主导的 breakaway RIA 上线与增长会员计划，在托管之外叠加辅导、供应商折扣和研究服务。
    pricing: 每年会员费 $21,000，另加核心托管服务
    strength: 分发能力、信任基础和对开户及托管工作流的直接影响力都极强。
    weaknessVsUs: 它并不中立，也不是为跨多个托管方和旧系统编排家庭迁移而设计。
    sourceRefs: [14]
  - name: Dynasty Financial Partners
    stage: scale-up
    wedge: 面向 breakaway 团队的 supported-independence 平台，把迁移服务、合规、营销和资本策略打包在一起。
    pricing: 定制定价，以服务驱动；未公开
    strength: 高信任、高触达模式，对大型 breakaway 团队有很强说服力。
    weaknessVsUs: 这是重服务网络，不够产品化，也更难形成可复用的跨客户工作流数据。
    sourceRefs: [7, 22]
  - name: Advisor360°
    stage: incumbent
    wedge: 面向大型顾问迁移场景的企业级数字入驻和批量 repapering 能力。
    pricing: 定制企业定价；未公开
    strength: 在批量 repapering 和账户迁移速度上，有明确的企业级产品深度。
    weaknessVsUs: 更像入驻和平台迁移工具，而不是一层跨运营、合规和顾问沟通的中立控制塔。
    sourceRefs: [25]
  - name: Docupace
    stage: scale-up
    wedge: 面向降低 NIGO 和手工处理的开户与文档工作流自动化。
    pricing: 定制报价；未公开
    strength: 在表单自动化、校验和合规敏感型入驻流程上很强。
    weaknessVsUs: 更偏向纸面流程，而不是端到端的家庭迁移图谱、ACATS 异常和整本业务簿协调。
    sourceRefs: [18]
  - name: Advyzon plus Nitrogen
    stage: scale-up
    wedge: 面向精品 RIA 的一体化顾问技术栈，覆盖投资组合、CRM 以及集成式风险/提案工作流。
    pricing: 定制平台订阅；未公开
    strength: 对想把业务簿整合到统一平台上的 RIA 来说，上线后的运营栈吸引力很强。
    weaknessVsUs: 它关注的是顾问上线后的持续运营，不是最高风险、而且家庭账户还在迁移中的上线前时刻。
    sourceRefs: [19, 20]
regulatoryTechnicalConstraints:
  - point: ACATS 并不能消除年金、不可转移资产或标准流程之外资产类别带来的手工工作。
    sourceRefs: [9, 10]
  - point: ACATS 转移并非绝对保证成功，参与方违约时也可能回退，因此状态跟踪和对账依然重要。
    sourceRefs: [9]
  - point: 一旦产品处理转移材料和家庭账户数据，就会触发 Regulation S-P 下的 vendor-risk、incident response 和客户通知义务。
    sourceRefs: [23]
validationSignals:
  - point: Farther 已招募 $23B 资产，加上其 AI 原生平台叙事，证明现代目的地平台已经足够可信，值得顾问忍受一场高摩擦的业务簿迁移。
    sourceRefs: [1, 2, 36]
  - point: Fidelity、Schwab、Pershing、Dynasty 和 Sanctuary 都在加码 breakaway 支持，这本身就证明买家愿意为迁移帮助付费。
    sourceRefs: [6, 8, 14, 21, 22]
  - point: Advisor360 和 Docupace 都明确在卖批量入驻和 NIGO 降低，这验证了运营痛点确实存在，只是它们还没拿下整条工作流。
    sourceRefs: [18, 25]
openQuestions:
  - 100-300 名顾问规模的招募型 RIA，今天在不同托管方下的 NIGO 基线和家庭账户激活时长到底是多少？
  - 对目标细分市场来说，一次 breakaway 迁移前 90 天里，通常会漏掉多少招募 AUM？
  - 哪些资产类别和注册场景最常落在标准 ACATS 流程之外，必须人工处理异常？
  - 哪些托管方愿意开放足够的状态数据或集成钩子，让异常分流自动化不必依赖脆弱定制？
