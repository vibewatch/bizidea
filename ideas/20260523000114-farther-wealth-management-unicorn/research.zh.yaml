    value: $7.2M
    rationale: 3 年内可触达份额按 30 家活跃客户、每家约 $240k 年合同价值估算；通过托管方和顾问渠道打进滩头市场，具备实现路径。
    isEstimate: true
    sourceRefs: [7, 8, 14, 22]
