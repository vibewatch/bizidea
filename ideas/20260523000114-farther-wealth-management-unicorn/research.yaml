reportMemo:
  executiveTakeaways:
    - The bottleneck in advisor recruiting is shifting from winning the team to safely moving the book across custodians, compliance, and household models.
    - Buyers already spend meaningful dollars on breakaway support, but current options fragment across custodian programs, consultants, onboarding tools, and advisor suites.
    - A neutral transition control layer is most differentiated where firms recruit repeatedly across multiple custodians and need household-level visibility, not just digital forms.
    - The beachhead is real but trust, security, and integration depth will matter more than feature breadth in the first years.
  marketDefinition: The market is software and workflow infrastructure used by U.S. RIA platforms, supported-independence networks, and transition teams to move recruited advisor books from legacy firms onto new custodians and operating stacks.
  customerAndBuyer: The primary buyer is the COO, head of advisor transition, or transition/onboarding leader at a recruiting RIA platform with repeated breakaway or tuck-in activity; daily users are transition operations, compliance, and incoming advisor teams.
  buyingTriggers:
    - point: A signed breakaway team or tuck-in creates a hard deadline to move households before billing, retention guarantees, and advisor morale slip.
      sourceRefs: [1, 6, 7]
    - point: Multi-custodian operating models are becoming more common, which increases the coordination burden during migrations and makes spreadsheet-led processes less viable.
      sourceRefs: [11, 15]
    - point: Advisors want independence, but operational responsibility remains a major objection, so platforms that ease the move can justify spend at the moment of transition.
      sourceRefs: [5, 14, 22]
  willingnessToPay:
    summary: "Visible spend already exists around the workflow: Muriel quotes $50k-$200k for launch support, Schwab prices ProDirect at $21k annually on top of custody, and onboarding vendors sell NIGO-reduction/automation into the same budget envelope, indicating buyers will pay to reduce live-transition risk."
    sourceRefs: [7, 14, 18]
  competitiveLandscape: The market is fragmented across custodian support programs, supported-independence networks, enterprise onboarding vendors, all-in-one advisor platforms, and services-heavy consultants; no player clearly owns cross-custodian, household-level transition orchestration from signed team through funded account.
  incumbentThesis:
    - incumbentClass: Custodians
      point: Custodians win distribution and account-opening pipes, but their tooling is biased toward their own platform rather than neutral orchestration across multiple custodians and legacy systems.
      sourceRefs: [8, 14, 15]
    - incumbentClass: Supported-independence networks
      point: Networks like Dynasty and Sanctuary solve trust with services and community, but the model is people-heavy and does not naturally create a reusable workflow graph across every migration.
      sourceRefs: [21, 22]
    - incumbentClass: All-in-one advisor suites
      point: Advisor suites optimize ongoing CRM, portfolio, and reporting operations once the book is live, yet they are less focused on pre-live repapering, ACATS exception handling, and cross-firm task choreography.
      sourceRefs: [19, 20, 25]
    - incumbentClass: Document and onboarding vendors
      point: Form automation vendors reduce NIGO and onboarding friction but stop short of owning household migration sequencing, nontransferables, and advisor/client status communications end to end.
      sourceRefs: [17, 18]
  regulatoryLandscape: U.S. deployment is shaped by ACATS process rules, FINRA transfer obligations, books-and-records expectations, and privacy/cyber controls when the product touches client PII and transfer documents.
  technologyLandscape: The enabling stack already exists in pieces—custodian connectors, digital onboarding, document intelligence, CRM sync, and advisor-suite integrations—but buyers still stitch them together manually during live transitions.
  distributionChannels:
    - point: Custodian and supported-independence ecosystems are the cleanest wedge because Schwab, Fidelity, and Pershing already package transition help and influence vendor selection early.
      sourceRefs: [6, 8, 14]
    - point: Breakaway consultants and network partners can originate implementation-led deals where workflow pain is already budgeted and urgent.
      sourceRefs: [7, 21, 22]
    - point: Platform refresh cycles create openings, especially where firms are replacing fragmented legacy stacks or orphaned tools.
      sourceRefs: [19, 20, 26]
  partnershipEcosystem:
    - point: Direct integrations with Schwab, Fidelity, Pershing, LPL, and Raymond James workflows are table stakes because buyers expect custodial account-opening and servicing connectivity.
      sourceRefs: [11, 16]
    - point: Transition consultants can be channel partners for first deployments while the startup earns trust on human-approved workflows.
      sourceRefs: [7, 22]
    - point: Advisor-platform vendors serving stack refreshes are natural product partners because transition pain often surfaces when firms modernize the rest of the operating stack.
      sourceRefs: [19, 20]
  dataMoats:
    - point: Household-level exception histories across forms, signatures, ACATS steps, holdings, and nontransferables can predict where assets leak or stall better than any single point system.
      sourceRefs: [9, 10, 18]
    - point: Benchmarking which custodians, forms, and asset classes generate delays creates defensible operational intelligence for future migrations.
      sourceRefs: [9, 11, 18]
  geographicConsiderations:
    - point: The beachhead should stay U.S.-first because ACATS, FINRA transfer rules, and SEC privacy obligations are U.S.-specific.
      sourceRefs: [9, 10, 23]
    - point: Early product depth should follow the dominant U.S. custody pathways rather than geographic breadth, since those pathways drive the majority of repeated recruiting transitions.
      sourceRefs: [8, 11, 15]
  sensitivityCases:
    - case: Breakaway momentum accelerates
      impact: More advisor movement and stronger independence sentiment would raise transition-event volume faster than the base model and pull demand forward.
      sourceRefs: [5, 24, 28]
    - case: Custodians bundle harder
      impact: If custodians add more launch support, the startup must position as the neutral orchestration and benchmark layer instead of a generic support add-on.
      sourceRefs: [14, 15]
    - case: Security scrutiny intensifies
      impact: Regulation S-P and vendor-risk diligence could lengthen sales cycles unless the product ships strong auditability, incident response, and service-provider controls.
      sourceRefs: [10, 23]
  validationPlan:
    - priority: high
      question: What is the actual baseline NIGO rate and days-to-funded-account for live breakaway transitions by custodian?
      evidenceToGather: Design-partner transition scorecards and post-mortems from 3-5 recruiting RIAs.
    - priority: high
      question: How much of household migration effort sits outside ACATS in annuities, alts, held-away assets, and model recreation?
      evidenceToGather: Asset-class mix from transition consultants and operations leaders on recent moves.
    - priority: medium
      question: Which custodians expose enough status data or workflow hooks to automate exception routing without brittle screen-scraping?
      evidenceToGather: Technical diligence with custody integration partners and pilot API docs.
    - priority: medium
      question: "Which buyer persona signs fastest: custodians, supported-independence networks, or recruiting RIAs directly?"
      evidenceToGather: Ten discovery calls split across each channel and two paid pilots.
analysisModels:
  marketMapDiagram:
    title: Advisor book transition map
    mermaid: |
      quadrantChart
        title Advisor transition workflow market
        x-axis Generic workflow --> Transition-specific workflow
        y-axis Lower urgency --> Mission-critical urgency
        Custodian support: [0.28, 0.70]
        Advisor360: [0.58, 0.66]
        Docupace: [0.55, 0.61]
        Dynasty services: [0.72, 0.78]
        Proposed startup: [0.90, 0.94]
  fiveForces:
    supplierPower:
      score: 4
      rationale: Custodians and recordkeeping workflows control the system-of-record interfaces, and qualified-custodian rules make those pipes hard to bypass.
      sourceRefs: [9, 10, 15]
    buyerPower:
      score: 4
      rationale: The most attractive buyers are a concentrated set of larger recruiting RIAs and supported-independence platforms that can compare consultant, custodian, and software alternatives.
      sourceRefs: [7, 14, 21]
    threatOfEntrants:
      score: 3
      rationale: Workflow software can be built, but integration depth, live-move trust, and benchmark data compound over time and slow copycats.
      sourceRefs: [16, 18, 23]
    threatOfSubstitutes:
      score: 4
      rationale: Buyers can patch together consultants, spreadsheets, custodian programs, and advisor-suite modules even if none solves the whole workflow cleanly.
      sourceRefs: [7, 14, 22]
    competitiveRivalry:
      score: 4
      rationale: Many adjacent vendors attack onboarding, advisor support, or platform replacement, so the startup must position tightly around transition control and neutrality.
      sourceRefs: [18, 19, 20, 25]
  pestle:
    - factor: political
      impact: negative
      point: Increased SEC and CFTC disciplinary activity raises compliance sensitivity for vendors handling transfer workflows and adviser communications.
      sourceRefs: [3, 23]
    - factor: economic
      impact: positive
      point: Rising advisor AUM, consolidation, and recruiting activity give large platforms budget and urgency to remove operational bottlenecks.
      sourceRefs: [3, 13]
    - factor: social
      impact: positive
      point: Advisors continue valuing autonomy and enterprise ownership, sustaining the breakaway funnel that creates migration work.
      sourceRefs: [5, 28]
    - factor: technological
      impact: positive
      point: Firms are actively adopting digital onboarding, AI document workflows, and integrated advisor platforms, making a transition OS easier to slot into modern stacks.
      sourceRefs: [16, 17, 19]
    - factor: legal
      impact: negative
      point: Regulation S-P increases expectations around incident response, customer notice, and service-provider oversight for any vendor touching customer data.
      sourceRefs: [23]
  adoptionFrictionMatrix:
    - friction: Buyers may resist entrusting a startup with live client transfer workflows.
      severity: high
      affectedBuyer: COO or head of advisor transition
      mitigation: Start with human approval gates, full audit trails, and narrow pilots tied to one live team move.
      sourceRefs: [7, 10, 23]
    - friction: Legacy holdings, household structures, and model data are messy to ingest and map across systems.
      severity: high
      affectedBuyer: Transition operations manager
      mitigation: Focus first on the biggest custody paths and pair file-ingestion fallbacks with exception queues.
      sourceRefs: [16, 19, 25]
    - friction: Ops, compliance, and advisors work in different tools and may resist a new control layer.
      severity: medium
      affectedBuyer: Operations manager
      mitigation: Use role-based queues and client/advisor status views instead of requiring a whole-stack replacement.
      sourceRefs: [17, 18, 20]
    - friction: Custodian-native support can look “good enough” to buyers.
      severity: medium
      affectedBuyer: COO
      mitigation: Sell cross-custodian neutrality, benchmark data, and household-level visibility that incumbent support programs do not own.
      sourceRefs: [14, 15, 21]
market:
  tam:
    value: $300.0M
    rationale: Bottom-up estimate of ~1,200 U.S. organizations with recurring transition demand (small upper tier of SEC RIAs plus supported-independence, IBD, and custodian-affiliated transition programs) x roughly $250k annual transition-ops software/services budget equivalent, benchmarked against visible consulting and launch-support spend.
    isEstimate: true
    sourceRefs: [3, 4, 7, 14, 18]
  sam:
    value: $60.0M
    rationale: Beachhead estimate of ~250 recruiting RIAs/support platforms x ~$240k annual spend, assuming ~4 major transition programs per year at a $60k workflow budget per program.
    isEstimate: true
    sourceRefs: [3, 4, 7, 14, 24]
  som:
    value: $7.2M
    rationale: Year-3 reachable share of 30 active customers x ~$240k annual contract value, achievable through custodian and consultant-led distribution into the beachhead.
    isEstimate: true
    sourceRefs: [7, 8, 14, 22]
