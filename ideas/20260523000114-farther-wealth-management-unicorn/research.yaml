categoryDynamics:
  growthRate: 12.6% 2024 AUM growth among SEC-registered advisers
  growthRateSourceRefs: [3]
  tailwinds:
    - point: Advisor movement toward independence remains durable, giving recruiting RIAs a steady pipeline of books to move.
      sourceRefs: [5, 6, 24]
    - point: Multi-custodian adoption is rising, which increases workflow complexity and the value of a neutral control layer.
      sourceRefs: [11, 15]
    - point: Modern advisor platforms and onboarding tooling are resetting buyer expectations around automation and integrated workflows.
      sourceRefs: [1, 19, 25]
  headwinds:
    - point: Custodians are expanding their own launch and growth-support programs, which can crowd out generic support tools.
      sourceRefs: [8, 14, 15]
    - point: Most RIAs remain small, so the startup must focus on the upper tail with repeated recruiting activity rather than the full market.
      sourceRefs: [3, 4]
    - point: Security and data-governance requirements will raise implementation friction for a vendor handling transfer paperwork and PII.
      sourceRefs: [10, 23]
competitors:
  - name: Schwab Advisor ProDirect
    stage: incumbent
    wedge: Custodian-led launch and growth membership for breakaway RIAs with coaching, vendor discounts, and research layered on top of custody.
    pricing: $21,000 annually membership, plus core custody services
    strength: Massive distribution, trust, and direct influence over account-opening and custody workflows.
    weaknessVsUs: Not custodian-neutral and not built to orchestrate household migration across multiple custodians and legacy systems.
    sourceRefs: [14]
  - name: Dynasty Financial Partners
    stage: scale-up
    wedge: Supported-independence platform that combines transition services, compliance, marketing, and capital strategies for breakaway teams.
    pricing: Custom, services-led economics; not publicly disclosed
    strength: High-trust white-glove model and strong credibility with large breakaway teams.
    weaknessVsUs: Services-heavy network model is less productized and less likely to create reusable cross-client workflow data.
    sourceRefs: [7, 22]
  - name: Advisor360°
    stage: incumbent
    wedge: Enterprise digital onboarding and bulk repapering capability for large advisor transitions.
    pricing: Custom enterprise pricing; not publicly disclosed
    strength: Clear enterprise feature depth for mass repapering and account transition speed.
    weaknessVsUs: Oriented to onboarding and platform transitions rather than a neutral, cross-system control tower spanning ops, compliance, and advisor communication.
    sourceRefs: [25]
  - name: Docupace
    stage: scale-up
    wedge: New-account-opening and document workflow automation aimed at reducing NIGO and manual processing.
    pricing: Custom quote; not publicly disclosed
    strength: Strong fit for form automation, validation, and compliance-sensitive onboarding workflows.
    weaknessVsUs: Solves the paperwork layer more than the end-to-end household migration graph, ACATS exceptions, and book-level coordination.
    sourceRefs: [18]
  - name: Advyzon plus Nitrogen
    stage: scale-up
    wedge: Boutique-RIA all-in-one advisor stack with portfolio, CRM, and integrated risk/proposal workflows.
    pricing: Custom platform subscription; not publicly disclosed
    strength: Strong post-live operating stack appeal for RIAs consolidating onto a unified platform.
    weaknessVsUs: Focuses on ongoing advisor operations, not the high-stakes pre-live transition event where recruited households are still moving.
    sourceRefs: [19, 20]
regulatoryTechnicalConstraints:
  - point: ACATS does not eliminate manual work for nontransferable assets or asset types that fall outside standard transfer flows.
    sourceRefs: [9, 10]
  - point: ACATS transfers are not guaranteed and can reverse on participant default, so status tracking and reconciliation still matter.
    sourceRefs: [9]
  - point: Handling transfer packets and household data triggers vendor-risk, incident-response, and customer-notice obligations under Regulation S-P.
    sourceRefs: [23]
validationSignals:
  - point: Farther’s $23B in recruited assets and AI-native platform pitch validate that modern destinations are credible enough to justify difficult book migrations.
    sourceRefs: [1, 2, 36]
  - point: Fidelity, Schwab, Pershing, Dynasty, and Sanctuary are all investing in breakaway support, proving that buyers will pay for transition help.
    sourceRefs: [6, 8, 14, 21, 22]
  - point: Advisor360 and Docupace explicitly market bulk onboarding and NIGO reduction, which validates the operational pain even if neither owns the full workflow.
    sourceRefs: [18, 25]
openQuestions:
  - What baseline NIGO rate and household activation timeline do 100-300 advisor recruiting RIAs actually see today by custodian?
  - What percentage of recruited AUM typically leaks during the first 90 days of a breakaway transition for the target segment?
  - Which asset classes and registration scenarios most often sit outside standard ACATS flows and require manual exception handling?
  - Which custodians expose enough status data or integration hooks to automate exception routing without brittle custom work?
