scenarios:
  downside:
    description: 托管与安全摩擦拉长销售周期，毛利率下滑，公司到 Y3 结束时只有 20 家活跃客户。
    y3RevenueK: 3720.0
    y3EbitdaK: -140.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - Q4Y3 客户数从 30 降到 20。
      - 因买家抵触年度最低消费，ACV 从 $240K 降到 $220K。
      - 由于实施持续偏服务化，毛利率从 70% 掉到 65%。
      - 销售周期从 7 个月拉长到 9 个月，伙伴来源赢单占比降到 15%。
  base:
    description: 公司把真实试点转成年度最低消费合同，并在 Q4Y3 达到 research 支撑的 30 家活跃客户 SOM 上限。
    y3RevenueK: 5580.0
    y3EbitdaK: 1321.0
    cashLowPointK: 922.2
    keyAssumptionChanges:
      - Q4Y3 客户数达到 30。
      - 稳态 ACV 维持在 $240K。
      - 毛利率达到 BP 设定的 70% 目标。
      - 到 Y3，伙伴来源赢单占比升至约 30%。
  upside:
    description: 可重复的托管连接器和基准分析缩短销售周期、增强定价能力，并把公司在 Q4Y3 推到 35 家活跃客户。
    y3RevenueK: 6960.0
    y3EbitdaK: 2260.0
    cashLowPointK: 1050.0
    keyAssumptionChanges:
      - Q4Y3 客户数从 30 升到 35。
      - 通过分析增购，ACV 从 $240K 提到 $260K。
      - 随着集成标准化，毛利率从 70% 提高到 73%。
      - 销售周期从 7 个月降到 5 个月，伙伴来源赢单占比升到 40%。
