slug: breakaway-book-transition-os
date: '2026-05-23'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: month
    source: 模型从 2026-05-23 这份 business-plan 日期之后的第一个完整月份开始。
  - id: A2
    name: pre-seed 交割后的起始现金
    value: $2.4M
    unit: usdM
    source: '[BP fundingAsk] BP 计划融资 $2M-$4M 的 pre-seed；基准模型取 $2.4M，因为这笔钱足以跑到 Q4Y2 的证明节点，并额外留出约 6 个月缓冲。'
  - id: A3
    name: 每个活跃客户的稳态年度收入
    value: $240K
    unit: usdK_per_customer_year
    source: '[BP market.som; BP investorMemo.firstCustomer.initialContract; research.market.sam] BP 和 research 都把复购客户的年度支出锚定在约 $240K，落在 BP 所列 $200K-$300K 正式生产合同区间内。'
  - id: A4
    name: 每个活跃付费客户的月度收入代理值
    value: $20K per month
    unit: usdK_per_customer_month
    source: '[A3; BP investorMemo.firstCustomer.initialContract] 一个 3 个月、$60K 的试点和一个 $240K 的年度最低消费，折算下来都约等于每月 $20K；因此基准模型把每个付费试点或正式生产 logo 都视作 1 个活跃付费客户。'
  - id: A5
    name: 客户爬坡
    value: 12 个月末 4 个活跃付费客户，Q4Y2 达到 12 个，Q4Y3 达到 30 个
    unit: customers
    source: '[BP milestones; BP experimentRoadmap; BP operatingAssumptions; research.market.som] 这个节奏要求第 1 年做出 2 个付费试点，第 2 年跑通可重复的试点转正式生产动作，并且在第 3 年正好打到 research 给出的 30 家客户 SOM 上限，而不是超出。'
  - id: A6
    name: 稳态毛利率
    value: 70%
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] business plan 明确把目标毛利率定在 70%，因此模型里 COGS 按收入的 30% 计。'
  - id: A7
    name: 月度 logo 流失率
    value: 1.5%
    unit: percent
    source: 针对高切换摩擦、但产品仍偏早期且与现有厂商有一定重叠风险的企业工作流软件，采用创业财务启发式假设。
  - id: A8
    name: 完全摊销 CAC
    value: $95K per new customer
    unit: usdK_per_customer
    source: '[BP gtm.channels; BP gtm.funnelTargets; research.distributionChannels] 创始人主导的企业销售，叠加真实迁移证明、安全审查和伙伴转介绍，应该比纯 outbound 更便宜，但相对中高六位数 ACV 仍然不算低。'
  - id: A9
    name: 平均销售周期
    value: 7 months
    unit: months
    source: '[research.sensitivityCases; research.adoptionFrictionMatrix] vendor-risk 审查、托管尽调和真实事件时点，共同决定了这依然是一笔企业级销售，即便触发点很急。'
  - id: A10
    name: 含全额负担的薪资带
    value: 创始人/CEO $180K；工程 $170K；产品/集成 $150K；实施/合规 $130K；GTM $160K；客户成功/伙伴关系 $120K；G&A $110K
    unit: usdK_per_fte_year
    source: 这是针对美国 pre-seed 垂直 SaaS 公司的创业财务启发式假设，并结合 [BP team] 与 BP 先补产品、实施，再补 GTM 的招聘顺序校准。
  - id: A11
    name: 人员爬坡快照
    value: 创始人 1/1/1/1/1/1；工程 1/1/2/2/3/4；产品/集成 0/1/1/1/1/1；实施/合规 0/0/1/1/2/2；GTM 0/0/0/1/2/2；客户成功/伙伴关系 0/0/0/0/1/1；G&A 0/0/0/0/0/1，对应 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
    unit: fte
    source: '[BP team; BP strategicChoices.sequencingRationale] 人员曲线遵循 BP：先把控制层做出来，再补可重复实施能力，等试点证明成立后再放大 GTM 与支持。'
  - id: A12
    name: 季度薪资平滑
    value: Y2 和 Y3 的薪资费用在年末人数快照之间逐步爬升
    unit: method
    source: '[financial-modeler instructions] 季度薪资线不是只在 Q4 年末人数节点台阶式跳变，而是做平滑处理，使薪资更贴近 BP 里的真实招聘节奏。'
  - id: A13
    name: 非薪酬运营预算
    value: Y1 月度 S&M $6K-$20K、R&D $12K-$20K、G&A $10K-$15K；Y2 季度 S&M $50K-$72K、R&D $58K-$65K、G&A $42K-$48K；Y3 季度 S&M $78K-$108K、R&D $68K-$80K、G&A $50K-$56K
    unit: usdK
    source: 这是面向工作流产品的创业财务启发式假设：公司在放大前，就必须先覆盖云成本、安全、差旅、法务、审计能力和伙伴赋能。
  - id: A14
    name: 伙伴来源赢单占比
    value: 到 Y3 约占新增赢单的 30%
    unit: percent_of_new_customers
    source: '[BP experimentRoadmap; BP milestones; research.distributionChannels] BP 明确把托管方和顾问转介绍列为重点，因此基准模型假设伙伴来源会压低 CAC，并支撑第 3 年的客户爬坡。'
  - id: A15
    name: 现金转换简化
    value: 期末现金由 EBITDA 顺推，不单列债务、capex、税项或营运资金
    unit: method
    source: 这是针对轻资产 pre-seed 软件公司的创业财务启发式假设；此类公司最主要的现金驱动仍是经营性亏损。
  - id: A16
    name: 下行情景输入
    value: Q4Y3 20 个客户、$220K ACV、65% 毛利率、9 个月销售周期，以及 15% 的伙伴来源赢单
    unit: scenario_inputs
    source: '[BP risks; research.sensitivityCases] 这一组假设对应文档中已经点明的风险：托管方支持看起来已经够用、集成依旧混乱，以及安全审查拉长周期。'
  - id: A17
    name: 上行情景输入
    value: Q4Y3 35 个客户、$260K ACV、73% 毛利率、5 个月销售周期，以及 40% 的伙伴来源赢单
    unit: scenario_inputs
    source: '[BP product.twentyFourMonth; BP milestones; research.sensitivityCases] 上行情景假设：可重复部署和基准分析带来扩张收入，并让伙伴驱动分发更快起飞。'
  - id: A18
    name: 融资规模方法
    value: 融到足以跑到 Q4Y2 证明节点，并额外留出约 6 个月缓冲的资金
    unit: method
    source: '[BP fundingAsk; financial-modeler instructions] 本轮规模按付费试点、正式生产转化、首发渠道伙伴和里程碑后的适度缓冲共同测算。'
