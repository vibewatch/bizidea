modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      PartnerLeads[Founder + partner leads] --> Pilots[Paid live-transition pilots]
      Pilots --> Conversions[Annual minimum customers]
      Conversions --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash after payroll and operating spend]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景由一条窄而深的企业切口驱动：Y1 从 4 个活跃付费 logo 起步，Q4Y3 增长到 30 个，每客户年度收入约 $240K。
  - checkName: 必须做对的事
    finding: 付费试点必须能顺利转成年度最低消费合同，同时 Schwab 和 Fidelity 的部署要尽快标准化，否则实施就会一直偏重服务。
  - checkName: 模型会失效的情况
    finding: 如果销售周期逼近 9 个月、毛利率又停在 65% 左右，公司会在 Y3 盈亏平衡前烧掉大部分缓冲。
  - checkName: 下一轮融资证明点
    finding: 值得种子轮继续跟进的下一步，是到 Q4Y2 拿到 10-12 家正式生产客户、把部署周期压到 45 天以内，并让一部分赢单明确来自托管方或顾问转介绍。
sanityChecks:
  ruleOf40: Y3 增长率 181.8% + EBITDA 利润率 23.7% = 205.5%（方向很强，但也被较小的 Y2 收入基数放大了）。
  burnMultiple: Y2 burn multiple 约为 0.4x：相对 Y1 新增净收入 $1.62M，对应 EBITDA 烧钱 $592K。
  revenuePerFte: 每名 FTE 在 Y3 贡献约 $465K 收入（SaaS 基准大致为 $200K-$400K；高于基准，是因为 ACV 高且模型在 12 名 FTE 时仍保持精干）。
  flags:
    - 基准情景已经打到 research 给出的第 3 年 30 家客户 SOM 上限，因此若要超出这版模型，要么更快扩细分，要么提高 ACV。
    - 模型把付费试点和正式生产 logo 都按每月 $20K 的统一收入代理值处理，现实里的实施可能会让季度收入确认更波动。
    - NIGO 基线改善、家庭账户入金天数改善和部署可重复性等关键证明点，在 BP 和 research 里仍然属于证据缺口。
