slug: "breakaway-book-transition-os"
date: "2026-05-23"
executiveSummary: >-
  Breakaway Transition OS should launch as a neutral transition control layer
  for U.S. recruiting RIAs and supported-independence platforms, not as another
  advisor CRM, client portal, or generic onboarding tool. The first customer is
  a 100-300 advisor SEC-registered RIA consolidator that is moving multiple
  ex-wirehouse teams onto Schwab or Fidelity in the next two quarters. The pain
  is acute because each signed team creates a deadline to repaper households,
  recreate models, clear compliance checks, and fund accounts before billing,
  retention guarantees, and advisor morale deteriorate. Research supports an
  estimated $300.0M TAM, $60.0M beachhead SAM, and $7.2M year-3 SOM, which is
  enough for a focused seed wedge only if the company later expands into
  benchmark reporting and adjacent operating workflows. The MVP should ingest
  household, holdings, and model data, then orchestrate repapering, ACAT
  tracking, exception routing, and advisor/client status updates with explicit
  human approval gates. Go-to-market should sell fewer stalled households,
  faster time to first funded account, and lower NIGO rates through paid live
  transition pilots sourced by founder-led sales plus custodian and consultant
  referrals. The moat is a neutral transition graph spanning forms, transfer
  states, custodians, and household exceptions that incumbents do not see end to
  end today. The biggest evidence gaps are baseline NIGO and asset-leakage rates
  by custodian and whether early integration depth is sufficient for repeatable
  deployment, so the investor stance remains Watch until those proof points are
  measured.
problem:
  - "Recruiting RIAs still run repapering, ACAT tracking, portfolio remapping, compliance attestations, and client communications across spreadsheets, email, CRM tickets, and custodian portals."
  - "Every delay or transfer error pushes out billing, risks recruited AUM leakage, and gives incoming advisors a poor first experience during the highest-stakes moment of the relationship."
solution:
  - "Provide a transition flight deck that ingests household, account, holdings, and legacy model data, then assigns one shared execution queue across operations, compliance, and advisor teams."
  - "Add household-level status views, exception routing, audit trails, and next-best-action guidance so firms can fund accounts faster without replacing their existing CRM or custodian stack on day one."
whyWeWin:
  - "The company wedges into the pre-live transition event where budget urgency is highest and where custodian programs, consultants, and advisor suites each solve only part of the workflow."
  - "A cross-custodian dataset of forms, household exceptions, ACAT timing, and migration outcomes can become a defensible benchmark and automation layer that single-system incumbents cannot easily replicate."
strategicChoices:
  beachhead: "U.S. SEC-registered RIA consolidators and supported-independence platforms with 100-300 advisors that recruit 2-10 breakaway teams per quarter and repeatedly migrate 200-1,500 households per team onto Schwab or Fidelity."
  wedgeRationale: "This slice has a named buyer, an event-driven budget trigger, and enough transition volume to produce measurable proof inside one or two live moves. It creates faster proof than selling to the full RIA market, where most firms are too small or too infrequent in recruiting to justify a dedicated transition system."
  sequencingRationale: "Start with a human-approved control layer for the two dominant custody paths plus file-ingestion fallbacks, because that solves the urgent bottleneck without asking buyers to replace their advisor stack or trust autonomous workflow execution. Only after paid pilots show faster funded accounts and lower exception rates should the company add broader custodian coverage, benchmark analytics, and adjacent post-transition operations."
  notYet:
    - "Ongoing advisor CRM or portfolio-management replacement"
    - "Private-markets operations and alternative-asset servicing before transition proof"
    - "Broad broker-dealer rollouts across every custodian before Schwab and Fidelity deployments repeat"
    - "Direct-to-client wealth app experiences"
market:
  tam: "Estimated U.S. TAM of about $300.0M based on roughly 1,200 organizations with recurring transition demand and about $250k of annual transition-ops software or services budget equivalent."
  sam: "Estimated beachhead SAM of about $60.0M based on roughly 250 recruiting RIAs and supported-independence platforms spending about $240k per year on repeated transition workflows."
  som: "Estimated year-3 SOM of about $7.2M based on 30 active customers at about $240k annual contract value through direct sales plus custodian and consultant referrals."
  segments:
    - "Primary: U.S. RIA consolidators and supported-independence platforms recruiting repeated breakaway teams"
    - "Secondary: Independent broker-dealers and large RIAs running recurring custodian-conversion desks"
  buyingProcess: >-
    The daily users are transition operations managers, compliance leads, and
    incoming advisor teams, while economic approval usually sits with the COO or
    head of advisor transition. The process starts when a signed team or tuck-in
    creates a hard migration deadline, then moves through vendor-risk and
    integration review because the product touches client data, transfer
    documents, and workflow controls.
product:
  mvp: >-
    MVP is a transition control plane for one live recruited-book move. It
    should ingest household, holdings, and model data; create role-based queues
    for repapering, ACAT status, and compliance tasks; and expose household-level
    status with explicit human approval for exceptions and client-facing updates.
  sixMonth: "Ship paid pilots for Schwab and Fidelity transition workflows with data ingestion, household queues, ACAT status tracking, exception management, audit logs, and advisor or client status views."
  twelveMonth: "Convert the first pilots to production, reduce deployment time with repeatable custodial connectors and file-mapping templates, and launch benchmark dashboards for NIGO rate, days to funded household, and exception causes."
  twentyFourMonth: "Expand into third-custodian coverage, deeper portfolio-model mapping, and adjacent post-transition workflows such as ongoing household servicing and tax-aware change controls for customers already running repeated migrations."
  keyBets:
    - "A narrow transition control layer can win budget before a buyer changes its whole advisor operating stack."
    - "Two dominant custody paths plus file-ingestion fallbacks cover enough early volume to avoid a services-heavy product."
    - "Human approval gates earn trust faster than full workflow automation in a live client-transfer event."
    - "Benchmark data and partner referrals can lower CAC and strengthen retention before large incumbents react."
gtm:
  wedge: "Sell a paid live-transition pilot that reduces days to first funded household and lowers NIGO or stalled-transfer rates, rather than pitching generic AI for wealth management."
  channels:
    - "Founder-led direct sales to COOs, heads of advisor transition, and transition operations leaders at recruiting RIAs"
    - "Custodian and supported-independence ecosystem referrals where vendor selection happens early in the breakaway process"
    - "Transition consultants and breakaway advisors' implementation partners already budgeted into live moves"
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 30-40%, pilot→production 60%+, production→annual minimum expansion 50%+ within 12 months."
  pricing: "Charge a paid implementation fee per live transition plus per-household migration pricing, then convert repeat recruiters to annual platform minimums with overage for additional households or transitions. This matches an event-triggered buyer who already spends on launch support and wants pricing tied to funded-household outcomes rather than seats."
businessModel:
  revenueStreams:
    - "Paid implementation fees for live advisor-team transitions"
    - "Per-household migration fees for households processed through the workflow"
    - "Annual platform minimums for firms running repeated transitions"
    - "Premium benchmark and exception-analytics modules after production adoption"
  unitOfValue: "Households and advisor-team transitions managed through the platform"
  targetGrossMarginPct: 70
  expansionLevers:
    - "More transitions, households, and custodian pathways inside the same customer"
    - "Benchmark reporting on NIGO, ACAT timing, and exception patterns"
    - "Expansion from pre-live transitions into adjacent household-servicing and change-control workflows"
strategyMap:
  northStarMetric: "Households funded through the platform within target SLA per quarter"
  inputMetrics:
    - "Median days from signed team to first funded household"
    - "NIGO rate on accounts processed through the platform"
    - "Percent of households requiring manual escalation outside standard workflow"
    - "Pilot-to-production conversion rate"
    - "Partner-sourced qualified pilot opportunities per quarter"
  moatsToBuild:
    - "Cross-custodian transition graph linking households, forms, assets, transfer states, and exceptions"
    - "Benchmark dataset showing which custodians, asset classes, and workflow steps drive delays or leakage"
    - "Embedded distribution with custodians and transition consultants at the moment of budget formation"
  killCriteria:
    - "If fewer than 8 of the first 20 ICP interviews rank transition throughput as a top-two operating pain, narrow or stop the wedge."
    - "If the first 3 paid pilots fail to reduce days to first funded household by at least 20% or fail to reduce NIGO by at least 15%, rework the product before scaling GTM."
    - "If the first 5 implementations still require more than 50% of work through bespoke services or manual data cleanup, tighten the ICP or accept a services-led business."
  mermaid: |
    flowchart LR
      Wedge[Breakaway team transition wedge] --> MVP[Human-approved transition flight deck]
      MVP --> Proof[Faster funded households and lower NIGO]
      Proof --> Expansion[Benchmark analytics and adjacent ops]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Real buyer pain and a coherent event-driven wedge, but conviction stays moderate until the company proves repeatable integrations and budget conversion beyond services-heavy pilots."
    whyBelieve: "Research shows buyers already spend meaningful dollars on breakaway support and that no incumbent clearly owns neutral, household-level transition orchestration across systems."
    whyDoubt: "The company still has to prove that recruiting RIAs will buy a standalone control layer instead of expanding custodian programs, consultants, or adjacent onboarding vendors."
    nextDiligence: "Secure 3 paid live-transition pilots, measure time-to-funded-household and exception-rate improvement by custodian, and verify conversion into $200k-plus annual contracts."
  firstCustomer:
    title: "Head of advisor transition at a recruiting RIA consolidator"
    profile: "A U.S. SEC-registered RIA platform with 150 advisors, repeated ex-wirehouse recruiting, Schwab or Fidelity as primary destination custodian, and an operations team coordinating 300-800 households in the next signed team move."
    trigger: "A signed breakaway team or tuck-in acquisition creates a fixed deadline to repaper and fund hundreds of households before compensation guarantees and retention targets slip."
    buyer: "COO or head of advisor transition"
    initialContract: "$50k-$100k paid pilot for one live 200-500 household transition, creditable toward a $200k-$300k annual platform minimum once the firm standardizes repeated transitions on the system."
  mustBeTrue:
    - "At least 100 beachhead firms have enough repeated transition volume to justify roughly $200k or more in annual software spend."
    - "Buyers care enough about funded-household speed, NIGO, and retained AUM to buy software instead of only adding consultants or internal project managers."
    - "Two launch custody paths plus file-ingestion fallbacks can support deployments in under 60 days for most early customers."
    - "Paid pilots convert to annual platform agreements above 60% when the product shows measurable transition ROI."
    - "Cross-transition benchmark data compounds into a durable moat before custodians or advisor suites can close the workflow gap."
  diligenceQuestions:
    - "What are current days to first funded household, NIGO rates, and 90-day retained AUM by custodian in the target segment?"
    - "Which transition tasks sit outside ACATS and consume most manual work for the first customer?"
    - "How much real-time status data or workflow access do Schwab, Fidelity, and Pershing expose without brittle custom work?"
    - "Which budget line funds this purchase in practice: COO operations budget, transition support budget, or recruiting P&L?"
    - "Why would a buyer choose this platform over custodian support, Dynasty or Sanctuary services, Advisor360, Docupace, or an internal control tower?"
operatingAssumptions:
  - assumption: "Recruiting RIAs and supported-independence platforms with repeated breakaway volume are the highest-intensity early buyers."
    basis: "idea.yaml"
    validationTest: "Interview 20 target firms and confirm at least 8 have moved multiple teams in the last 12 months and rank transition throughput as a top-two operating pain."
    decisionImpact: "If false, the company should shift sooner toward larger broker-dealer transition desks or a different wealth-operations wedge."
  - assumption: "The product can support $200k-$300k annual production contracts after a paid pilot."
    basis: "research.yaml"
    validationTest: "Close at least 3 paid pilots and convert at least 2 into annual agreements inside the target range."
    decisionImpact: "If false, the company must lower ACV expectations, broaden scope, or accept a more services-led revenue mix."
  - assumption: "Schwab and Fidelity workflows plus file-ingestion fallbacks cover enough early transition volume to productize the first year."
    basis: "research.yaml"
    validationTest: "Map the first 10 qualified opportunities and confirm at least 60% of projected households can be served through the launch pathways without bespoke integrations."
    decisionImpact: "If false, implementation cost rises and the company must narrow the ICP further or raise pricing."
  - assumption: "Human approval gates and audit trails will clear buyer trust and security objections for an initial deployment."
    basis: "research.yaml"
    validationTest: "Complete vendor-risk review and launch 2 pilots where buyers allow the product to handle client data and workflow routing while keeping final approvals human-controlled."
    decisionImpact: "If false, the product must shift toward read-only analytics or heavier compliance investment before broader rollout."
  - assumption: "Custodian and transition-consultant referrals can produce lower-CAC, higher-intent pipeline than outbound alone."
    basis: "research.yaml"
    validationTest: "Sign 3 referral partners and generate at least 6 qualified opportunities with at least 1 closed paid pilot from partner sourcing."
    decisionImpact: "If false, hiring and spend must tilt earlier toward direct sales and founder-led outbound."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Run structured discovery with 20 COOs, heads of transition, and operations leaders in the beachhead."
    hypothesis: "Transition throughput is urgent enough to fund software when a signed team creates a live migration deadline."
    successMetric: "At least 12 interviews confirm the trigger and at least 8 share scorecards, process maps, or post-mortems from recent transitions."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Collect sample household rosters, model files, repapering packets, and exception logs from 3-5 design partners."
    hypothesis: "A repeatable data model exists for household mapping, task orchestration, and exception routing without replacing the full advisor stack."
    successMetric: "At least 3 partners show enough common structure to define one MVP schema and launch playbook."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Run 2-3 paid pilots on one live team move using human-approved repapering, ACAT tracking, and status workflows."
    hypothesis: "The product can materially reduce funded-household cycle time and NIGO during a live transition."
    successMetric: "At least 2 pilots reduce days to first funded household by 20% or more and lower NIGO by 15% or more versus prior process."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Test pilot-to-production pricing with a transition fee, per-household usage, and annual minimum proposal."
    hypothesis: "Buyers prefer event-based pricing that rolls into an annual platform commitment once repeated transitions are proven."
    successMetric: "At least 2 paid pilots accept the proposed structure and at least 1 enters annual contract negotiation."
    owner: "Founder/CEO"
  - horizon: "180-360 days"
    experiment: "Launch custodian and transition-consultant referral motions with clear ROI and implementation boundaries."
    hypothesis: "Partners will introduce buyers earlier than cold outbound because they already influence vendor selection during breakaway moves."
    successMetric: "At least 5 qualified partner-sourced opportunities and 1 production customer from referral channels."
    owner: "GTM lead"
  - horizon: "180-360 days"
    experiment: "Ship benchmark dashboards and deployment templates for the first production customers."
    hypothesis: "Benchmark reporting and repeatable implementation assets are the fastest path to lower churn and higher ACV after the wedge is proven."
    successMetric: "At least 2 production customers adopt benchmark reporting and deployment time falls below 45 days."
    owner: "Product/integration lead"
operations:
  - "Ship role-based permissions, approval logs, document retention, and incident-response playbooks before any automation that changes client-transfer workflow."
  - "Run weekly reviews of NIGO causes, stalled transfers, nontransferable assets, and household exceptions so the roadmap follows observed failure modes."
  - "Maintain a standard onboarding playbook for data ingestion, household mapping, communication templates, and custodian escalation paths."
  - "Track partner-sourced pipeline, pilot ROI, deployment time, and retained-household outcomes by custodian and transition type."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own customer discovery, founder-led sales, and partner development because the primary risk is buyer truth and trust, not scaling an existing sales playbook."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the transition graph, workflow engine, and first custodial ingestion paths needed for live pilots."
  - role: "Product/integration engineer"
    startTiming: "Month 3-6"
    rationale: "Productize repeated Schwab and Fidelity workflows, shorten deployment time, and reduce bespoke data mapping."
  - role: "Implementation and compliance lead"
    startTiming: "Month 6-9"
    rationale: "Turn live-transition support, audit controls, and customer security requirements into a repeatable onboarding motion."
  - role: "GTM lead"
    startTiming: "Month 9-12"
    rationale: "Scale direct and partner-sourced pipeline only after paid-pilot conversion and referenceable ROI are proven."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 20 ICP interviews and secure 5-8 design partners with real transition artifacts."
      - "Ship an MVP for Schwab and Fidelity live-transition workflows with household queues, exception management, and audit logs."
      - "Close at least 2 paid pilots and convert at least 1 customer to an annual production contract."
      - "Establish at least 3 custodian or consultant referral relationships."
  - horizon: "12-24 months"
    items:
      - "Reach 10-15 production customers in the beachhead with deployment under 45 days."
      - "Launch benchmark dashboards, third-custodian support, and measurable expansion revenue inside existing accounts."
      - "Prove that partner-sourced pipeline contributes a meaningful share of qualified opportunities and production wins."
  - horizon: "24-36 months"
    items:
      - "Expand from transition workflow into adjacent household-servicing and change-control workflows for repeat customers."
      - "Build a benchmark dataset strong enough to improve win rate, reduce implementation time, and support premium analytics pricing."
      - "Reach a product position where the company is the default transition system of record for recruiting RIAs rather than a one-off pilot tool."
risks:
  - risk: "Custodian integration depth is weaker than expected, forcing manual work or brittle custom implementations."
    likelihood: "High"
    impact: "High"
    mitigation: "Start with the most common custody paths, use file-ingestion fallbacks, and refuse broad expansion until deployment time and data quality are repeatable."
  - risk: "Buyers do not trust a startup in live client-transfer workflows or fail security review."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Keep humans in the approval loop, ship auditability first, and scope early pilots as control-layer overlays rather than autonomous workflow replacement."
  - risk: "Custodian programs, consultants, or adjacent onboarding vendors look good enough and compress the budget for a standalone product."
    likelihood: "High"
    impact: "High"
    mitigation: "Sell quantified household-level outcomes, maintain neutrality across systems, and build benchmark data that service firms and single-system vendors cannot match."
  - risk: "The upper-tail buyer set is smaller or slower-moving than modeled, limiting efficient venture-scale growth."
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Use the first year to validate volume and ACV in the beachhead before adding broker-dealer, large-RIA, or adjacent operations segments."
fundingAsk:
  round: "pre-seed"
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to build the launch custody integrations, complete 2-4 paid live-transition pilots, establish security and compliance controls, and prove a repeatable pilot-to-production motion in the beachhead."
