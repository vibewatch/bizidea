slug: auto-loan-cure-orchestration
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-03] the model starts with the first full operating month after the business plan date.'
- id: A2
  name: Opening cash / seed raise
  value: $4.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $4-6M + BP fundingAsk runwayMonths 18 + model cash trough] base case uses the low end of the requested seed range and still carries more than six months of reserve through the production-proof window.'
- id: A3
  name: Starting paying lenders
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid diagnostics.'
- id: A4
  name: Paying customer definition
  value: One lender paying for a diagnostic, pilot, or production bucket under orchestration.
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts active paying logos even before every logo has reached recurring production spend.'
- id: A5
  name: Diagnostic and pilot economics
  value: $75K-$150K package recognized at roughly $35K-$45K per month over 2-3 months
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing] Y1 revenue starts with paid diagnostics and 90-day pilots rather than full software ACV.'
- id: A6
  name: Production ACV expansion
  value: First production bucket starts near $600K ARR and expands toward $1.0M ACV as second buckets and channels go live
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract $600k-$1.0M annual production contract + Research market.som 5 customers at roughly $1.0M ACV] the base case reaches the researched SOM level only after expansion inside each lighthouse customer.'
- id: A7
  name: Customer ramp
  value: 3 paying logos by M12, 4 by Q4Y2, 5 lighthouse customers by Q4Y3
  unit: customersEop
  source: '[BP milestones across 0-12, 12-24, and 24-36 months + Research market.som] the base case follows the plan of a narrow beachhead and lands the researched five-logo SOM by late Y3.'
- id: A8
  name: Revenue recognition convention
  value: Period-end paying logos multiplied by blended realized revenue per logo of roughly $35K-$60K per month in Y1, $107K-$175K per quarter in Y2, and $210K-$250K per quarter in Y3
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] this keeps revenue tied to paying-logo count while reflecting the mix shift from diagnostics to production expansion.'
- id: A9
  name: Gross margin ramp
  value: 38%-52% in Y1, 55%-64% in Y2, and 66%-70% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + startup-finance heuristic] implementation, data-mapping, and compliance work are services-heavy early, then standardize into software-like margins by Y3 exit.'
- id: A10
  name: Hiring timeline
  value: M1 founder and founding engineer; M2 product and analytics lead; M4 solutions and integration engineer; M7 compliance product lead; M10 partnerships and enterprise AE; M15 data engineer; M18 workflow/platform engineer; M20 second AE; M23 finance and ops lead; M27 implementation manager; M30 fourth engineer.
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] the model stays integration- and compliance-first, adds GTM only after early proof, and keeps the post-Y1 ramp lean.'
- id: A11
  name: Founder loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] modest founder salary plus payroll taxes and benefits.'
- id: A12
  name: Engineering loaded compensation
  value: $210K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] reflects senior workflow, data, and integration engineering talent in regulated fintech.'
- id: A13
  name: Product and analytics loaded compensation
  value: $190K
  unit: USD/year
  source: '[BP team Product and analytics lead + startup-finance heuristic] combines control-group design, reporting, and product management skill sets.'
- id: A14
  name: Solutions and integration loaded compensation
  value: $180K
  unit: USD/year
  source: '[BP team Solutions and integration engineer + startup-finance heuristic] covers hands-on deployment and lender workflow mapping.'
- id: A15
  name: Compliance product loaded compensation
  value: $195K
  unit: USD/year
  source: '[BP team Compliance product lead + startup-finance heuristic] reflects Reg F, TCPA, CTIA, and bank-vendor control work.'
- id: A16
  name: Sales and partnerships loaded compensation
  value: $220K
  unit: USD/year
  source: '[BP team Partnerships and enterprise AE + BP gtm.channels + startup-finance heuristic] enterprise lender selling requires high-touch partner and field work rather than scaled SDR coverage.'
- id: A17
  name: G&A and ops loaded compensation
  value: $130K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] lean finance, security paperwork, and back-office support after the first production deployments.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 55% S&M / 20% R&D / 25% G&A; engineering 100% R&D; product 20% S&M / 80% R&D; solutions 45% S&M / 55% R&D; compliance 35% R&D / 65% G&A; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] functional allocation reflects founder-led sales, engineering-heavy delivery, and compliance work split between product and governance.'
- id: A19
  name: Non-payroll opex ramp
  value: Non-payroll spend starts near $26K per month in early Y1, peaks around $100K-$110K per month in H1 Y2 during lender audits and custom integrations, then tapers to roughly $35K-$55K per month in Y3 as onboarding playbooks standardize.
  unit: USD/month
  source: '[BP operations + BP fundingAsk useOfFundsSummary + startup-finance heuristic] the model intentionally front-loads security, travel, legal, and contractor cost into the first scaled deployment year.'
- id: A20
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, debt, taxes, and working-capital timing are assumed immaterial at seed scale.'
- id: A21
  name: Steady-state monthly logo churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for sticky enterprise workflow SaaS + BP businessModel.expansionLevers] once embedded inside collections policy, churn should be low but not perfect.'
- id: A22
  name: Base diagnostic-to-production cycle
  value: Roughly 150 days from paid diagnostic kickoff to production conversion
  unit: days
  source: '[BP gtm.wedge paid diagnostic and 90-day pilot + BP investorMemo.verdict.nextDiligence] the model assumes the company needs one diagnostic plus one pilot quarter to earn production spend.'
- id: A23
  name: CAC convention
  value: Total 36-month sales and marketing spend divided by 5 lighthouse production-scale customers
  unit: formula
  source: '[model calc + BP milestones + BP investorMemo.mustBeTrue five lighthouse lenders] this captures founder-led selling, partner development, and solutions-heavy acquisition work across the full buildout.'
- id: A24
  name: Next-round milestone for funding sizing
  value: By late Y2 or early Y3 the company should have 3 production logos, 2 partner-sourced pilots or referrals, and at least 1 second-bucket or channel expansion.
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP investorMemo.verdict.nextDiligence] the seed is sized to reach repeatable proof before the next financing conversation.'
- id: A25
  name: Quarterly salary-roll convention
  value: Y2-Y3 salary rows use actual month-of-hire payroll inside each quarter rather than only the year-end snapshots.
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] this keeps salary expense internally consistent with the monthly hiring plan.'
