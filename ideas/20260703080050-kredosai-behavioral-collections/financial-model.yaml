scenarios:
  downside:
    description: Pilots take longer to convert, only four lighthouse lenders are live by Q4Y3, and implementation work stays more bespoke than planned.
    y3RevenueK: 3380.0
    y3EbitdaK: -390.0
    cashLowPointK: 780.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 4 instead of 5.
    - Expanded production ACV exits closer to about $850K per lender instead of $1.0M.
    - Gross margin exits around 68% because compliance and integration work do not standardize fast enough.
  base:
    description: Three paid diagnostics in Y1 convert into a narrow production beachhead, two logos expand buckets or channels, and the fifth lighthouse lender lands in Y3.
    y3RevenueK: 4250.0
    y3EbitdaK: 176.9
    cashLowPointK: 1278.4
    keyAssumptionChanges:
    - 3 paying logos by M12, 4 by Q4Y2, and 5 by Q4Y3.
    - Production ACV expands from about $600K to about $1.0M as second buckets and channels attach.
    - Gross margin reaches the BP target 70% by Q4Y3 after the audit and integration playbook becomes reusable.
  upside:
    description: One partner channel starts working by mid-Y2, second-bucket expansion happens earlier, and a sixth paying logo enters late in Y3.
    y3RevenueK: 5100.0
    y3EbitdaK: 910.0
    cashLowPointK: 1480.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 6 instead of 5.
    - Expanded ACV exits around $1.1M because two lenders add more than one bucket or channel.
    - Gross margin exits near 72% as the team reuses compliance artifacts and data mappings faster than planned.
sensitivity:
- variable: ARPU
  downsideCase: Exit ACV lands near $850K instead of $1.0M because second-bucket expansion stalls.
  baseCase: Five lighthouse lenders exit near the researched $1.0M ACV level.
  upsideCase: Two lenders expand faster and push exit ACV toward about $1.1M.
  y3RevenueImpactK: -870.0
  cashImpactK: -520.0
- variable: CAC
  downsideCase: More partner enablement, travel, and lender-specific proof work push CAC above $600K.
  baseCase: CAC stays near $478K with concentrated founder-led selling and targeted channel work.
  upsideCase: Referenceability improves and partner intros keep CAC closer to $400K.
  y3RevenueImpactK: -120.0
  cashImpactK: -300.0
- variable: churn
  downsideCase: Monthly churn rises to about 3.0% if the product stays bucket-specific and fails to become a broader workflow control layer.
  baseCase: Monthly churn holds near 2.0% once one production bucket is live.
  upsideCase: Monthly churn stays near 1.0% if multichannel controls and auditability become deeply embedded.
  y3RevenueImpactK: -210.0
  cashImpactK: -180.0
- variable: sales cycle
  downsideCase: Diagnostic-to-production conversion stretches from about 150 to about 210 days because procurement and data audits drag.
  baseCase: Paid kickoff to production conversion takes about 150 days.
  upsideCase: Reference deployments compress the cycle toward about 120 days.
  y3RevenueImpactK: -520.0
  cashImpactK: -360.0
- variable: gross margin
  downsideCase: Gross margin exits near 68% because integrations remain semi-custom.
  baseCase: Gross margin reaches the BP target 70% by Q4Y3.
  upsideCase: Gross margin reaches about 72% as compliance and lender onboarding fully standardize.
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: hiring pace
  downsideCase: Implementation and GTM hires pull forward before the first production case study is referenceable.
  baseCase: The team stays under 12 FTE through Q4Y2 and adds only two scale hires in Y3.
  upsideCase: The implementation manager moves later because onboarding becomes more templated.
  y3RevenueImpactK: 80.0
  cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Diagnostics[Paid diagnostics] --> Pilots[90-day pilots]
      Pilots --> Production[Production buckets]
      Production --> Expansion[More buckets and channels]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue comes from converting three paid diagnostics into a four-logo production beachhead by Q4Y2 and then expanding five lighthouse lenders toward roughly $1.0M ACV by Q4Y3.
- checkName: Must go right
  finding: The company needs paid diagnostics to convert into production in about 150 days and at least two lenders to add second buckets or channels, or the Y3 exit ACV assumption breaks.
- checkName: Model breaks if
  finding: If deployments stay bespoke and the company exits Y3 with four logos instead of five, the downside case keeps EBITDA negative and pulls the cash floor toward roughly $0.8M.
- checkName: Next-round proof
  finding: The next financing case is three production logos, two partner-sourced pilots or referrals, and at least one expansion inside a live lender by late Y2 or early Y3, which is exactly what the $4.0M seed is sized to reach.
sanityChecks:
  ruleOf40: Y3 growth 116.8% + EBITDA margin 4.2% = 121.0%
  burnMultiple: Y2 burn multiple is about 1.2x using roughly $1.60M of EBITDA burn against about $1.36M of net new ARR; Q2Y3 turns EBITDA positive.
  revenuePerFte: $354.2K Y3 on 12 ending FTE (benchmark $200-400K SaaS)
  flags:
  - The Y3 base case lands the full researched five-logo SOM, so most upside must come from expansion inside each lighthouse lender rather than from a broad logo count.
  - customersEop includes paid diagnostics and pilots in Y1, so recurring production logos trail the headline count until late Y2.
  - The model assumes the heavy audit, legal, and integration spend of Y2 tapers meaningfully in Y3; if onboarding stays bespoke, gross margin and EBITDA will miss together.
  - Revenue concentration is high because five lenders represent essentially all Y3 revenue, so one delayed deployment can move the year materially.
  - Cash is modeled as EBITDA, so enterprise prepayment timing, procurement delays, or security-review retainers could shift the real cash curve even if the P&L lands on plan.
