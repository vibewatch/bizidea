differentiator: 外呼系统和催收代理机构追的是触达量，大多数催收套件卖出来的其实只是规则和队列。这个创业公司拿的是它们中间那层行为处置层：决定哪个借款人该收什么消息、走什么渠道、在什么时点触发，何时再升到人工。因为它被设计成叠在 FICO 驱动工作流上的增量层，所以不逼贷款机构换核心栈也能赢。它的护城河会沿三条线一起复利：贷款机构自己的处置-响应数据、不同还款路径的结果数据，以及“哪种干预能把哪类逾期分群催回”的工作流图谱。
