problem: 手里逾期组合很大的车贷机构，到今天还在用静态规则、人工脚本和外包外呼来管早期回正窗口。数百万笔逾期账户一旦能卡住 10-15% 的收入，等贷款快到核销边缘再处理，既晚又贵。一刀切触达还会逼贷款机构在短期回收和长期客户价值之间二选一，而不是在账户层面同时优化两者。
targetUser:
  primary: 美国非优质客群车贷机构的催收策略副总裁或贷后服务负责人
  secondary: 对回正率负责的催收分析总监或数字化贷后负责人
  buyer: 首席催收官、COO 或贷后服务负责人
startupThesis:
  nonObviousInsight: 真正大的机会，不是等账户基本无可挽回后再去替代催收代理机构，而是拿下“漏付一期到核销”之间那段很短的决策窗口：这时贷款机构还来得及同时保住现金回收和客户终身价值。因为产品可以靠 FICO 集成和语音驱动处置工作流叠在现有贷后栈之上，它能楔入贷款机构运营，而不必先逼客户做核心系统大迁移。
  beachhead: 美国非优质客群车贷机构，以及主机厂系汽车金融服务商；它们有 100,000-750,000 笔在管分期贷款，已经在跑 FICO 催收工作流，而且 15-59 天逾期分桶在恶化，需要在收车或核销前把回正率拉上来
  wedge: 一层核销前回正编排层：给每笔逾期车贷账户打分，决定下一步最优消息、渠道、时机和还款路径，再把真正高风险的个案才分流进人工催收队列
  whyNowCatalyst: KredosAi 的融资、可量化的核销率和客户终身价值提升，以及它借助 FICO 集成切进汽车金融，说明行为式前催收工具已经从抽象的 AI 许诺，走到了可以买的贷后系统阶段。
  ventureScalePath: 先从车贷回正编排切入，再把同一套决策与处置引擎扩到个人贷款、信用卡、BNPL、公用事业欠费和第三方贷后平台，做成逾期消费者债务的行为控制层。
solution: 产品接入贷后数据和 FICO 式催收队列，在账户走到核销前先给每笔逾期贷款打分。它会在 SMS、邮件、语音和催收员工作清单之间，推荐或直接执行下一步最优回正动作，把消息、渠道、时机和还款路径按借款人分群来调。管理者能看清哪些分群更吃轻触达提醒、纾困方案还是转人工升级，也能按逾期分桶和资产簿册类型跑受控实验。因为产品是叠加层，贷款机构不用换掉核心贷后系统、外呼系统或代理网络，就能把回正率拉高、把本可避免的核销压下去。时间一长，公司会沉淀一张专有响应图谱，把借款人行为、车辆经济性和处置结果连起来，让催收策略从一套规则变成会学习的系统。
goToMarketSeed:
  firstCustomer: 美国一家非优质客群车贷机构的首席催收官：在管合同超过 150,000 笔，已有 FICO 催收工作流，而且经销商渠道发放贷款的 15-59 天逾期回正率正在恶化
  buyingTrigger: 某个季度回正率下滑，或 60 天以上逾期的滚入率上升，逼得贷款机构必须在增员、加大代理支出或接受更高核销之间做选择
  currentAlternative: 静态 FICO 队列规则、人工催收脚本、外呼系统，以及外包催收代理机构
  switchingReason: 叠加一层行为式控制层，不用替换核心贷后系统就能同时改进回收和留存，比再加一轮人手、脚本或一刀切外呼，更快把核销压下来。
  pricingHypothesis: 按纳入编排的活跃逾期账户数收年费 SaaS 订阅，再叠加实施费；如果客户已经建立基线，还可以加一个跟核销下降或回正率提升挂钩的收益分成模块。
