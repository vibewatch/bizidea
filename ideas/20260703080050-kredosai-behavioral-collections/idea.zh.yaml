topRisks:
- name: 模型提升可能因账簿差异而波动
  description: 在一家车贷机构有效的处置策略，换到另一家的借款人结构、渠道和政策环境里，未必还能拿到同样的回正提升。
  mitigation: 先从按分群设计的试点和随机留出组做起，只有在每家贷款机构自己的基线之上证明有效，再往外扩。
- name: 现有厂商能把相邻功能打包进来
  description: FICO、贷后平台或大型催收代理机构，一旦看清切口，就可能补上基础个性化功能。
  mitigation: 靠车贷专用的处置数据集取胜，并比现有厂商更快接进它们自己的工作流，先做出垂直场景的结果模型。
- name: 运营与政策摩擦
  description: 在一个高度敏感的贷后工作流里，贷款机构可能不愿让自动系统直接碰借款人触达、还款选项或升级规则。
  mitigation: 先以上推荐模式上线，保留完整审计日志和人工审批，再把自动化逐步放到定义清楚的小分群里。
