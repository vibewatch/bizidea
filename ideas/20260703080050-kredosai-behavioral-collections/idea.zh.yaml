jobsToBeDone:
- job: 当早期车贷逾期抬头时，帮催收负责人选出下一步最优借款人处置，这样账户在逼近核销前就能把回正率拉起来。
  currentAlternative: 静态队列规则、催收脚本和一刀切外呼活动
  successMetric: 30 天回正率，以及滚入 60 天以上逾期或核销的比例
- job: 当贷后团队被逼着继续加催收员或加代理机构时，帮运营负责人把人工精力集中到最难的账户上，这样不用线性扩招也能把回收拉起来。
  currentAlternative: 外包代理机构、人工排序和扩招
  successMetric: 每个回正账户对应的催收触达次数，以及避免掉的核销金额
