scenarios:
  downside:
    description: 试点转生产更慢，Q4Y3 只有 4 家灯塔贷款机构上线，实施工作也比计划更定制。
    y3RevenueK: 3380.0
    y3EbitdaK: -390.0
    cashLowPointK: 780.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 只能到 4，而不是 5。
    - 扩容后的生产 ACV 更接近每家贷款机构约 $850K，而不是 $1.0M。
    - 由于合规和集成工作迟迟标准化不了，毛利率收在约 68%。
  base:
    description: Y1 的 3 个付费诊断转成一个窄生产滩头，2 个客户扩出更多分桶或渠道，第 5 家灯塔贷款机构在 Y3 落地。
    y3RevenueK: 4250.0
    y3EbitdaK: 176.9
    cashLowPointK: 1278.4
    keyAssumptionChanges:
    - M12 有 3 个付费机构，Q4Y2 有 4 个，Q4Y3 有 5 个。
    - 随着第 2 个分桶和更多渠道挂上去，生产 ACV 从约 $600K 扩到约 $1.0M。
    - 等审计和集成上线手册可复用后，毛利率在 Q4Y3 达到 BP 目标的 70%。
  upside:
    description: 到 Y2 中期就有 1 条伙伴渠道开始起量，第 2 分桶扩容更早发生，Y3 末还会多进来第 6 个付费客户。
    y3RevenueK: 5100.0
    y3EbitdaK: 910.0
    cashLowPointK: 1480.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 能到 6，而不是 5。
    - 由于 2 家贷款机构加挂了不止 1 个分桶或渠道，扩容后的 ACV 收在约 $1.1M。
    - 团队复用合规材料和数据映射的速度快于计划，毛利率收在约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 如果第 2 分桶扩容卡住，退出时 ACV 只能落在约 $850K，而不是 $1.0M。
  baseCase: 5 个灯塔贷款机构在退出时接近研究给出的 $1.0M ACV 水位。
  upsideCase: 若有 2 家贷款机构扩容更快，退出时 ACV 可推到约 $1.1M。
  y3RevenueImpactK: -870.0
  cashImpactK: -520.0
- variable: CAC
  downsideCase: 更多伙伴赋能、差旅和贷款机构专属验证工作，会把 CAC 推高到 $600K 以上。
  baseCase: 靠创始人主导销售和集中的渠道工作，CAC 稳在约 $478K。
  upsideCase: 如果参考案例更好用、伙伴引荐更顺，CAC 可压到接近 $400K。
  y3RevenueImpactK: -120.0
  cashImpactK: -300.0
- variable: 流失率
  downsideCase: 若产品始终停留在单一分桶，没能长成更广的工作流控制层，月流失率会上到约 3.0%。
  baseCase: 只要有 1 个生产分桶上线，月流失率就能稳在约 2.0%。
  upsideCase: 如果多渠道控制和审计能力深度嵌入，月流失率可压到约 1.0%。
  y3RevenueImpactK: -210.0
  cashImpactK: -180.0
- variable: 销售周期
  downsideCase: 若采购和数据审计拖得太久，诊断到生产的周期会从约 150 天拉长到约 210 天。
  baseCase: 从付费项目启动到转生产约需 150 天。
  upsideCase: 如果参考部署更有说服力，周期可压到约 120 天。
  y3RevenueImpactK: -520.0
  cashImpactK: -360.0
- variable: 毛利率
  downsideCase: 若集成一直停留在半定制状态，退出时毛利率只能到约 68%。
  baseCase: Q4Y3 毛利率达到 BP 目标的 70%。
  upsideCase: 如果合规和贷款机构上线流程全面标准化，毛利率可到约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: 招聘节奏
  downsideCase: 如果第一个生产案例还没形成可引用案例，实施和 GTM 招聘就被迫提前。
  baseCase: 团队在 Q4Y2 前保持低于 12 个 FTE，Y3 只再加 2 个扩容岗位。
  upsideCase: 如果上线流程更模板化，实施经理的入职时间还可以继续往后推。
  y3RevenueImpactK: 80.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Diagnostics[Paid diagnostics] --> Pilots[90-day pilots]
      Pilots --> Production[Production buckets]
      Production --> Expansion[More buckets and channels]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入来自把 3 个付费诊断转成一个到 Q4Y2 时有 4 家机构在跑的生产滩头，然后再把 5 个灯塔贷款机构在 Q4Y3 前逐步扩到约 $1.0M ACV。
- checkName: 必须成立的前提
  finding: 公司得把付费诊断在约 150 天内转成生产，并且至少有 2 家贷款机构继续加第 2 个分桶或渠道，否则 Y3 末的 ACV 假设就会塌。
- checkName: 模型会失效的情况
  finding: 如果部署始终保持重定制，且公司到 Y3 末只有 4 家机构而不是 5 家，下行情景下 EBITDA 仍为负，现金低点也会被拉向约 $0.8M。
- checkName: 下一轮融资证明点
  finding: 下一轮融资要看的，是到 Y2 末或 Y3 初做到 3 个生产客户、2 个伙伴带来的试点或转介绍，以及至少 1 次活跃贷款机构内部扩容；这正是这笔 $4.0M 种子轮融资瞄准的证明点。
sanityChecks:
  ruleOf40: Y3 增长 116.8% + EBITDA 利润率 4.2% = 121.0%
  burnMultiple: Y2 burn multiple 约 1.2x：约 $1.60M 的 EBITDA burn，对应约 $1.36M 的净新增 ARR；到 Q2Y3，EBITDA 转正。
  revenuePerFte: Q4Y3 末 12 个 FTE 对应 Y3 人均收入 $354.2K（SaaS 基准为 $200-400K）
  flags:
  - Y3 的基准情景已经打满研究里的 5 客户 SOM，所以真正的上行空间主要来自单个灯塔客户内部扩容，而不是更广的客户数。
  - customersEop 在 Y1 把付费诊断和试点也算进去了，因此真正的经常性生产客户数要到 Y2 后段才会跟上表面客户数。
  - 模型假设 Y2 那些重审计、法务和集成支出会在 Y3 明显回落；如果上线流程继续高度定制，毛利率和 EBITDA 会一起失手。
  - 收入集中度很高，因为 Y3 的绝大部分收入都压在 5 家贷款机构身上；只要 1 个部署延期，当年结果就会被明显改写。
  - 模型里把现金直接等同于 EBITDA，因此企业预付款时点、采购延迟或安全评审押金，都可能让真实现金曲线偏离 P&L。
