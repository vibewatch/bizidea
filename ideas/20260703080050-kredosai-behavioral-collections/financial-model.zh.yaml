slug: auto-loan-cure-orchestration
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-03] 模型从商业计划日期后的第一个完整运营月起算。'
- id: A2
  name: 期初现金 / 种子轮融资
  value: $4.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $4-6M + BP fundingAsk runwayMonths 18 + model cash trough] 基准情景取目标种子轮区间下限；即便如此，在产品跑出生产验证前，现金仍保有 6 个月以上的安全垫。'
- id: A3
  name: 期初付费贷款机构数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，得先把付费诊断卖出来。'
- id: A4
  name: 付费客户定义
  value: 1 家贷款机构为诊断、试点或已纳入编排的生产分桶付费。
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计的是期末仍在付费的机构数，即便这些机构还没全部走到经常性生产支出。'
- id: A5
  name: 诊断与试点经济模型
  value: $75K-$150K 套餐，在 2-3 个月内按每月约 $35K-$45K 确认收入
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing] Y1 收入先来自付费诊断和 90 天试点，而不是完整软件 ACV。'
- id: A6
  name: 生产 ACV 扩容
  value: 首个生产分桶从约 $600K ARR 起步，随着第 2 个分桶和更多渠道上线，逐步扩到约 $1.0M ACV
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract $600k-$1.0M annual production contract + Research market.som 5 customers at roughly $1.0M ACV] 基准情景要等到灯塔客户在内部扩容之后，才会真正碰到研究给出的 SOM 水位。'
- id: A7
  name: 客户爬坡
  value: M12 有 3 个付费机构，Q4Y2 有 4 个，Q4Y3 有 5 个灯塔客户
  unit: customersEop
  source: '[BP milestones across 0-12, 12-24, and 24-36 months + Research market.som] 基准情景沿着“窄滩头、慢扩容”的路线走，到 Y3 末才打到研究里的 5 客户 SOM。'
- id: A8
  name: 收入确认口径
  value: 期末付费机构数 × 每个机构的混合实现收入：Y1 约 $35K-$60K/月，Y2 约 $107K-$175K/季度，Y3 约 $210K-$250K/季度
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] 这样既能让收入锚在付费机构数上，也能体现从诊断到生产扩容的收入结构变化。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 38%-52%，Y2 为 55%-64%，Y3 为 66%-70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + startup-finance heuristic] 早期实施、数据映射和合规工作服务占比高；等到 Y3 末，才更像软件毛利。'
- id: A10
  name: 招聘时间线
  value: M1 创始人和创始工程师；M2 产品与分析负责人；M4 方案与集成工程师；M7 合规产品负责人；M10 合作伙伴与企业 AE；M15 数据工程师；M18 工作流/平台工程师；M20 第 2 位 AE；M23 财务与运营负责人；M27 实施经理；M30 第 4 位工程师。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] 模型坚持先集成和合规、后 GTM；只有早期验证跑出来后才加销售，Y1 之后的扩招也尽量收紧。'
- id: A11
  name: 创始人总薪酬
  value: $170K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] 这是偏克制的创始人工资，已含薪资税和福利。'
- id: A12
  name: 工程岗位总薪酬
  value: $210K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 对应受监管金融软件里偏资深的工作流、数据和集成工程人才。'
- id: A13
  name: 产品与分析岗位总薪酬
  value: $190K
  unit: USD/year
  source: '[BP team Product and analytics lead + startup-finance heuristic] 这一岗位同时覆盖对照组设计、结果报告和产品管理能力。'
- id: A14
  name: 方案与集成岗位总薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Solutions and integration engineer + startup-finance heuristic] 覆盖一线部署和贷款机构工作流映射。'
- id: A15
  name: 合规产品岗位总薪酬
  value: $195K
  unit: USD/year
  source: '[BP team Compliance product lead + startup-finance heuristic] 反映 Reg F、TCPA、CTIA 和银行供应商控制的工作强度。'
- id: A16
  name: 销售与合作伙伴岗位总薪酬
  value: $220K
  unit: USD/year
  source: '[BP team Partnerships and enterprise AE + BP gtm.channels + startup-finance heuristic] 面向贷款机构的企业销售，需要高触达的伙伴经营和一线成交，而不是大规模 SDR 覆盖。'
- id: A17
  name: G&A 与运营岗位总薪酬
  value: $130K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 在第一批生产部署之后，维持精简的财务、安全文档和后台支持。'
- id: A18
  name: 薪酬分摊到 P&L 的口径
  value: 创始人 55% 计入 S&M / 20% 计入 R&D / 25% 计入 G&A；工程 100% 计入 R&D；产品 20% 计入 S&M / 80% 计入 R&D；方案 45% 计入 S&M / 55% 计入 R&D；合规 35% 计入 R&D / 65% 计入 G&A；销售 100% 计入 S&M；运营 100% 计入 G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 这个功能分摊反映了创始人主导销售、工程主导交付，以及合规工作横跨产品与治理两端。'
- id: A19
  name: 非薪资 Opex 爬坡
  value: 非薪资支出在 Y1 前段约 $26K/月；Y2 上半年因贷款机构审计和定制集成爬到约 $100K-$110K/月；等上线手册标准化后，Y3 再回落到约 $35K-$55K/月。
  unit: USD/month
  source: '[BP operations + BP fundingAsk useOfFundsSummary + startup-finance heuristic] 模型有意把安全、差旅、法务和外包成本前置到第一年规模化部署期。'
- id: A20
  name: 现金转换口径
  value: 现金变动 = EBITDA
  unit: formula
  source: '[startup-finance heuristic] 在种子轮阶段，资本开支、债务、税和营运资金时点被视为不重要。'
- id: A21
  name: 稳态月度客户流失率
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for sticky enterprise workflow SaaS + BP businessModel.expansionLevers] 一旦嵌进催收策略，流失应当很低，但不会是零。'
- id: A22
  name: 基准诊断到生产周期
  value: 从付费诊断项目启动到转成生产，约 150 天
  unit: days
  source: '[BP gtm.wedge paid diagnostic and 90-day pilot + BP investorMemo.verdict.nextDiligence] 模型假设公司需要先跑 1 轮诊断和 1 个试点季度，才拿得到生产预算。'
- id: A23
  name: CAC 口径
  value: 36 个月总销售与市场费用 ÷ 5 个达到生产规模的灯塔客户
  unit: formula
  source: '[model calc + BP milestones + BP investorMemo.mustBeTrue five lighthouse lenders] 这样能把创始人主导销售、伙伴拓展和重方案获客的真实成本都算进去。'
- id: A24
  name: 用于融资规模判断的下一轮里程碑
  value: 到 Y2 末或 Y3 初，公司应做到 3 个生产客户、2 个由伙伴带来的试点或转介绍，以及至少 1 个第 2 分桶或新渠道扩容
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP investorMemo.verdict.nextDiligence] 这轮种子轮融资的规模，就是为了在下一轮融资前把可复制验证跑出来。'
- id: A25
  name: 季度薪资滚动口径
  value: Y2-Y3 的薪资行按每个季度内的实际入职月份计算，而不是只看年末快照。
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] 这样薪资费用才能和月度招聘计划内部一致。'
