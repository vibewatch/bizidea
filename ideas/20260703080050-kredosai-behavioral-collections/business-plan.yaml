slug: auto-loan-cure-orchestration
date: '2026-07-03'
executiveSummary: >-
  Auto-loan Cure Orchestration should be built as a U.S.-first behavioral control
  layer for non-prime auto lenders that need to improve 15-59 day cures before
  accounts roll into repossession or write-off. Research supports a real and
  specific pain signal: U.S. auto balances exceed $1.6T, non-captive lenders
  carry the highest delinquency stress, and incumbent stacks already route
  collections through systems such as FICO rather than homegrown greenfields.
  The most credible first customer is a chief collections officer or head of
  servicing at a lender with 150,000-plus active contracts, worsening roll
  rates, and an existing FICO-style queueing workflow. The first product should
  not try to replace the servicing core, the dialer, or the agency network; it
  should start in recommendation mode on one delinquency bucket, prove lift with
  holdouts, and only then automate approved digital and voice treatments.
  Pricing, sales motion, and product scope must stay aligned to one enterprise
  wedge: a paid baseline diagnostic and 90-day pilot that converts into annual
  software when the lender sees lower write-offs, fewer manual touches, and
  better cure performance. The researched market is meaningful but not broad
  enough to justify a diffuse launch, with an estimated $58.0M TAM, $35.0M SAM,
  and a realistic year-three SOM of about $5.0M if the company lands five
  lighthouse customers. The reason to believe is that broad suites, agencies,
  and messaging vendors each solve only part of the workflow, leaving room for
  an auto-specific next-best-treatment layer. The main reason to doubt is that
  the core ROI evidence still comes from vendor claims and adjacent case studies
  rather than published non-prime auto holdout data, while consent-data
  completeness and procurement friction could slow deployment materially.
problem:
  - "Non-prime auto lenders still treat early-stage delinquencies with static rules, generic scripts, and outsourced dialing even as rising 30+ and 60+ roll rates put write-offs, repossession volume, and staffing budgets under pressure."
  - "Collections leaders lack a control layer that decides the next best message, channel, timing, and repayment path at the cohort level while preserving auditability and customer lifetime value."
solution:
  - "Overlay FICO-style collections queues with account-level treatment scoring, experimentation, and human-approval workflows that recommend the next best digital, voice, or collector action for each delinquent loan."
  - "Start with one 15-29 or 30-59 DPD cohort in recommendation mode, prove lift against a randomized control, then expand into automated execution, repayment-path selection, and escalation management across more buckets."
whyWeWin:
  - "The wedge is narrower and more measurable than a full collections-suite replacement: it plugs into existing servicing and decisioning stacks, uses the lender's own delinquency book as the baseline, and can prove value in one cohort within one quarter."
  - "As deployments expand, the company builds a proprietary treatment-response graph across borrower tier, vehicle context, consent status, delinquency bucket, and repayment outcomes that incumbents and agencies do not automatically own inside the lender."
strategicChoices:
  beachhead: "U.S. non-prime auto lenders and captive auto-finance servicers with 150,000-500,000 active contracts, FICO-style collections queues, and visible deterioration in 15-59 day delinquency cohorts."
  wedgeRationale: >-
    This slice creates faster proof than prime auto, credit cards, or late-stage
    agency replacement because delinquency pressure is concentrated, the buyer
    already watches cure and roll metrics weekly, and an overlay can be inserted
    into an existing queueing workflow without waiting for a core-servicing
    replacement.
  sequencingRationale: >-
    The company should sell a diagnostic before broad automation, launch in
    recommendation mode before autonomous outreach, and hire integration and
    compliance talent before scaling sales because data mapping, consent
    governance, and holdout-proofed ROI are the gating risks. Partnerships with
    FICO implementers and digital collectors matter only after the first
    reference deployments show that the product can improve one delinquency
    bucket inside a lender's real workflow.
  notYet:
    - "Credit cards, personal loans, BNPL, or utility arrears before 3-5 auto-lender production logos prove the operating model"
    - "Full replacement of the servicing core, dialer, or agency-management stack"
    - "Autonomous voice agents across all delinquency buckets before recommendation-mode audits and consent controls are trusted"
    - "Post-charge-off purchasing, repo management, or broader debt-sale products"
market:
  tam: "$58.0M estimated TAM based on about 48 sizable U.S. lender books that could support roughly $1.2M blended annual spend for cure orchestration."
  sam: "$35.0M estimated initial SAM based on about 35 U.S. non-prime auto lenders or captives with 100k-750k books, FICO-style queues, and enough delinquency stress to justify roughly $1.0M ACV."
  som: "$5.0M estimated year-three SOM based on 5 lighthouse customers at roughly $1.0M ACV each after diagnostic-to-pilot-to-production expansion."
  segments:
    - "Primary: U.S. non-prime auto lenders and captives with large indirect-originated portfolios and rising 15-59 day delinquencies"
    - "Secondary: third-party auto servicers and collections BPOs running large lender portfolios on FICO-like workflows"
  buyingProcess: >-
    The operational champion is usually the head of collections strategy,
    servicing analytics, or digital servicing, but the economic approval sits
    with the chief collections officer, head of servicing, or COO because the
    purchase trades off against collector headcount, agency spend, and write-off
    exposure. The first deal should start as a paid diagnostic or pilot on one
    delinquency cohort and convert only after holdout-tested lift is visible
    inside the lender's own baseline.
product:
  mvp: >-
    The MVP should ingest servicing, payment, contact-history, and consent data
    for one delinquency bucket, score next-best treatments, and route
    recommendations into existing collector queues with full audit logs and
    control-group measurement. It should stay read-only on policy execution at
    first, with humans approving messages, channels, and repayment-path offers
    before the system graduates to limited automation.
  sixMonth: "Ship 2-3 paid diagnostics and 1-2 pilots with cohort scoring, queue recommendations, digital-message templates, consent checks, audit trails, and holdout reporting."
  twelveMonth: "Add repeatable connectors for the most common servicing, FICO, dialer, and messaging environments in the beachhead; support approved automated execution for narrow cohorts; and launch manager dashboards for cure, roll-rate, and collector-productivity outcomes."
  twentyFourMonth: "Expand into multichannel treatment automation, voice-assisted workflows, hardship-plan decision support, and additional asset classes only after the auto-lender playbook, vendor-risk package, and deployment motion are repeatable."
  keyBets:
    - "The first painful workflow is treatment selection inside early-stage auto delinquency, not a full collections system of record."
    - "Recommendation mode with randomized holdouts will win trust faster than promising autonomous borrower outreach on day one."
    - "One delinquency bucket can produce a referenceable ROI story quickly enough to convert paid diagnostics into annual software."
    - "A small set of reusable integrations and policy templates can keep deployment from turning into services-heavy custom work."
gtm:
  wedge: "Sell a paid cure-baseline diagnostic and 90-day pilot for one 15-29 or 30-59 DPD auto-loan cohort, positioned as faster proof of lower write-offs and fewer manual touches than adding more collectors or blanket dialer campaigns."
  channels:
    - "Founder-led direct sales to chief collections officers, heads of servicing, and collections-strategy leaders at non-prime auto lenders"
    - "Co-sell and referral partnerships with FICO implementation firms, servicing consultants, and portfolio-analytics advisers already trusted by lender buyers"
    - "Selective channel deals with digital collections BPOs or agencies that want a better early-stage cure layer inside lender workflows"
  funnelTargets: "Target account→qualified discovery 20-30%, qualified discovery→paid diagnostic 20-35%, paid diagnostic→pilot 60%+, pilot→production 50%+, production→second bucket or channel expansion 60%+ within 12 months."
  pricing: >-
    Start with a paid 6-10 week baseline diagnostic and pilot, then move to
    annual SaaS priced by delinquent accounts under orchestration, active
    channels, and implementation scope, with an optional gainshare module only
    after a lender-specific baseline exists. This matches how buyers budget
    today: they fund avoided loss, lower collector-touch cost, and reduced
    agency spend, not seat licenses.
businessModel:
  revenueStreams:
    - "Annual subscription for cure orchestration, experimentation, audit logs, and manager reporting"
    - "Implementation and data-mapping fees for the first servicing, FICO, and messaging integrations"
    - "Expansion fees for additional delinquency buckets, brands, channels, and voice or hardship modules"
  unitOfValue: "Delinquent accounts under orchestration by bucket and channel"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more delinquency buckets, channels, and repayment-path workflows within the same lender"
    - "Expand from one auto portfolio into additional brands, securitization programs, or servicing teams at the same customer"
    - "Sell benchmark reporting, voice-assisted workflows, and deeper experimentation modules once baseline cure data is live"
    - "Extend the same treatment engine into adjacent consumer-credit categories after auto proof"
strategyMap:
  northStarMetric: "Dollar value of delinquent auto balances cured before 60+ DPD from orchestrated accounts without increased compliance exceptions"
  inputMetrics:
    - "Days from kickoff to first mapped delinquency cohort"
    - "Share of targeted accounts with usable contact, consent, and payment-history data"
    - "Relative 30-day cure lift versus control group"
    - "Roll-rate reduction into 60+ DPD or repo versus baseline"
    - "Paid diagnostic to pilot to production conversion rate"
    - "Average buckets or channels expanded per production lender"
  moatsToBuild:
    - "Lender-specific treatment-response graph linking borrower attributes, vehicle context, channel choice, and cure outcomes"
    - "Consent, contactability, and audit-history ledger that makes compliant multichannel experimentation repeatable"
    - "Integration templates and policy libraries for FICO-like workflows, dialers, and servicing data models"
  killCriteria:
    - "Fewer than 2 of the first 4 pilots show at least 5% relative lift in 30-day cures or 3% reduction in 60+ roll rates versus control."
    - "Fewer than 6 of the first 15 qualified ICP interviews confirm a live FICO-style queueing workflow that can accept overlay recommendations without core rewrite."
    - "Median time from kickoff to first mapped cohort exceeds 60 days across the first 3 deployments because data and consent records are too fragmented."
    - "Less than 50% of paid diagnostics convert to pilots or less than 50% of pilots convert to production within 6 months."
  mermaid: |
    flowchart LR
      Wedge[15-59 DPD auto cure pilot] --> MVP[Recommendation-mode orchestration]
      MVP --> Proof[Holdout-tested cure and roll-rate lift]
      Proof --> Expansion[More buckets channels and adjacent credit products]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Clear enterprise pain and a coherent workflow wedge, but conviction stays moderate until the company proves auto-specific lift, fast integrations, and a market beyond a narrow first logo set."
    whyBelieve: "The startup sits at a measurable loss-mitigation decision point where incumbents are horizontal, agencies are outsourced, and buyers already track recovery ROI."
    whyDoubt: "The best proof points today come from vendor claims and adjacent case studies rather than published non-prime auto pilots, while compliance and procurement could slow learning."
    nextDiligence: "Win two paid diagnostics, run one randomized holdout pilot in a live non-prime auto portfolio, and show that a FICO-overlay deployment can reach production inside 90 days."
  firstCustomer:
    title: "Chief collections officer at a U.S. non-prime auto lender"
    profile: "A lender with roughly 150,000-500,000 active contracts, a heavy indirect-originated book, existing FICO-style collections queues, and worsening 15-59 day cure performance."
    trigger: "A quarter of rising roll rates into 60+ DPD or repossession forces leadership to choose between more collector headcount, more agency spend, or a new cure strategy."
    buyer: "Chief collections officer, head of servicing, or COO"
    initialContract: "$75k-$150k paid diagnostic and pilot, credited toward a $600k-$1.0M annual production contract once one delinquency bucket is live and holdout lift is proven."
  mustBeTrue:
    - "At least 40% of qualified beachhead lenders must already manage early-stage cure decisions through static rules, spreadsheets, or generic dialer playbooks."
    - "A single delinquency-bucket pilot must show at least 5% relative cure lift or 3% roll-rate reduction versus control within one quarter."
    - "Target lenders must have enough consent and contact-history data to activate digital treatments on a meaningful share of accounts without a full data-rebuild project."
    - "At least half of paid diagnostics must convert to production-track pilots because the workflow is already budgeted as loss mitigation, not AI experimentation."
    - "Five lighthouse lenders must be able to support about $5.0M ARR by year three before the company expands beyond auto."
  diligenceQuestions:
    - "How often do non-prime auto lenders already use FICO or adjacent systems for early-stage queueing, and what API or file hooks are actually available?"
    - "What level of cure lift versus control is sufficient for a chief collections officer to reallocate budget from agencies or headcount into software?"
    - "How complete are consent, opt-out, and language-preference records across SMS, email, and voice in the first 10 target accounts?"
    - "Will buyers accept recommendation mode first, or do they require automated execution before approving annual software spend?"
    - "Which channel produces the fastest credible sale: direct founder outreach, FICO implementers, or digital collections BPO referrals?"
operatingAssumptions:
  - assumption: "FICO-like workflows are common enough in the beachhead that the product can land as an overlay rather than a core-servicing replacement."
    basis: research.yaml
    validationTest: "Run 10 architecture reviews with target lenders and confirm that at least 6 can accept cohort recommendations or file/API outputs without rewriting the servicing core."
    decisionImpact: "If false, the ICP must narrow to the most integration-ready lenders or the roadmap must absorb much heavier implementation work."
  - assumption: "Non-prime auto portfolios will show lender-specific lift large enough to justify enterprise pricing after one bucket pilot."
    basis: research.yaml
    validationTest: "Execute 2 randomized holdout pilots and confirm that at least 1 produces 5%+ relative cure lift or 3%+ 60-day roll-rate reduction with no material complaint spike."
    decisionImpact: "If false, pricing falls, the wedge weakens against incumbents and agencies, and the company should reconsider whether auto is only a services niche."
  - assumption: "Consent, contact, and language-preference data are complete enough to support digital-first treatments on a useful share of delinquent accounts."
    basis: research.yaml
    validationTest: "Audit SMS, email, voice, opt-out, and hardship-plan fields across the first 3 design partners and confirm that at least 70% of target accounts are reachable through at least one compliant channel."
    decisionImpact: "If false, the product must stay in recommendation mode longer or reposition toward collector prioritization instead of omnichannel orchestration."
  - assumption: "The economic buyer will fund a paid diagnostic and pilot from servicing or loss-mitigation budget without requiring a multi-year transformation program."
    basis: idea.yaml
    validationTest: "Run 6 discovery-to-proposal cycles and confirm that at least 3 buyers approve a paid diagnostic with a named executive sponsor and a pilot conversion path."
    decisionImpact: "If false, the company must lower entry pricing, sell through partners, or broaden scope to earn a separate transformation budget."
  - assumption: "A first production deployment can expand toward $600k-$1.0M annual spend as more buckets and channels go live."
    basis: operator judgment
    validationTest: "Convert at least 2 pilots to production and show that one customer expands ACV by 25%+ after adding a second bucket or channel."
    decisionImpact: "If false, the company needs a leaner cost structure and may not justify a venture-scale go-to-market."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 15 chief collections officers, servicing leaders, and analytics directors at non-prime auto lenders."
    hypothesis: "The early-stage cure window is already managed through static rules and manual prioritization that buyers consider underperforming."
    successMetric: "At least 10 interviews confirm active manual or blanket-treatment workflows, and at least 5 accounts describe a live 15-59 DPD cure initiative."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Map one lender's 15-29 DPD workflow end to end, including FICO queues, servicing fields, consent records, and current outreach logic."
    hypothesis: "A recommendation-mode overlay can be inserted without replacing the servicing core or dialer."
    successMetric: "One architecture design partner agrees on a data map, control group design, and 90-day pilot plan."
    owner: "Founding eng"
  - horizon: "0-90 days"
    experiment: "Run a historical replay diagnostic on one delinquency cohort using lender data and current-treatment baselines."
    hypothesis: "The product can identify measurable treatment-segmentation opportunities before live automation is enabled."
    successMetric: "The diagnostic surfaces at least 3 actionable cohort changes and converts into a paid pilot."
    owner: "Product and analytics lead"
  - horizon: "90-180 days"
    experiment: "Launch 2 paid pilots in recommendation mode with randomized holdouts on one delinquency bucket."
    hypothesis: "One bucket is enough to prove lender-specific cure lift and earn expansion budget."
    successMetric: "At least 1 pilot shows 5%+ relative cure lift or 3%+ roll-rate reduction versus control and converts to production."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Test pricing anchored to delinquent accounts under orchestration with and without an optional gainshare rider."
    hypothesis: "Buyers will accept account-based annual pricing faster than pure performance pricing once baseline ROI is visible."
    successMetric: "At least 4 of 6 qualified prospects accept account-based pricing as credible and at least 2 accept a paid diagnostic."
    owner: "Founder/CEO"
  - horizon: "180-360 days"
    experiment: "Sign one FICO ecosystem partner and one digital collections BPO as pilot-referral or co-sell partners."
    hypothesis: "Trusted workflow partners can source qualified opportunities after the first reference deployment exists."
    successMetric: "Partners source at least 3 qualified opportunities and 1 signed pilot."
    owner: "Partnerships lead"
  - horizon: "180-360 days"
    experiment: "Add automated execution for pre-approved low-risk cohorts and measure collector-load impact."
    hypothesis: "Limited automation can reduce manual touches without increasing complaints or compliance exceptions."
    successMetric: "One production customer cuts collector touches per cured account by at least 15% while complaint and exception rates stay flat."
    owner: "Compliance product lead"
operations:
  - "Maintain channel-specific consent rules, audit logs, and policy overrides so every recommendation and message can be reconstructed for compliance review."
  - "Standardize onboarding around one delinquency bucket, one servicing extract, and one control-group design before expanding channels or automation scope."
  - "Run weekly treatment-review meetings that turn lender feedback, complaints, and outcome data into updated templates, escalation rules, and segmentation logic."
  - "Package vendor-risk, model-governance, and implementation artifacts early because regulated buyers will evaluate the company as an operational control vendor, not just a model vendor."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own lender discovery, pricing, and pilot conversion because the main risk is whether the cure workflow earns standalone enterprise budget."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build data ingestion, recommendation logic, audit trails, and the first FICO-style workflow integrations."
  - role: "Product and analytics lead"
    startTiming: "Month 1-3"
    rationale: "Design control groups, outcome reporting, and the cohort logic that turns pilot data into a credible ROI case."
  - role: "Solutions and integration engineer"
    startTiming: "Month 3-6"
    rationale: "Shorten time to first mapped cohort and keep early deployments from becoming custom services projects."
  - role: "Compliance product lead"
    startTiming: "Month 6-9"
    rationale: "Own Reg F, TCPA, CTIA, auditability, and approval workflows before automated execution expands."
  - role: "Partnerships and enterprise AE"
    startTiming: "Month 9-12"
    rationale: "Scale direct and partner pipeline only after the first reference deployment and pricing model are proven."
milestones:
  - horizon: "0-12 months"
    items:
      - "Secure 3 paid diagnostics with non-prime auto lenders and complete 2 live pilots on one delinquency bucket."
      - "Ship recommendation-mode orchestration with audit logs, consent checks, control-group reporting, and one repeatable FICO-style integration path."
      - "Convert at least 1 pilot to production and establish 1 referenceable lender case study."
      - "Package vendor-risk and compliance materials sufficient for regulated-lender procurement."
  - horizon: "12-24 months"
    items:
      - "Reach 3-5 production logos in the beachhead and expand at least 2 of them into second buckets or channels."
      - "Launch limited automated execution for pre-approved cohorts and prove lower collector touches per cured account."
      - "Establish 2 partner channels that generate qualified pilot opportunities."
      - "Decide, based on customer results, whether to stay auto-only or open one adjacent asset class."
  - horizon: "24-36 months"
    items:
      - "Reach 5 lighthouse customers and approximately $5.0M ARR if ACV and conversion assumptions hold."
      - "Support multichannel treatment orchestration across the major early-stage delinquency buckets in auto."
      - "Use benchmark treatment-response data to reduce deployment time and improve win rate."
      - "Expand into one adjacent consumer-credit category only if auto deployments remain repeatable and referenceable."
risks:
  - risk: "Auto-lender cure lift varies too much by portfolio mix, channel policy, or borrower segment to support a repeatable product claim."
    likelihood: High
    impact: High
    mitigation: "Use randomized holdouts, sell only one cohort at a time, and refuse broad rollout until each lender's own baseline shows lift."
  - risk: "Consent, contactability, or language-preference data is too incomplete to support compliant multichannel automation."
    likelihood: High
    impact: High
    mitigation: "Start in recommendation mode, center product design on audit logs and channel controls, and fall back to collector prioritization if digital reach is too limited."
  - risk: "FICO, C&R, Qualco, or digital-first agencies bundle enough adaptive treatment functionality to narrow the standalone wedge."
    likelihood: Medium
    impact: High
    mitigation: "Differentiate on auto-loan-specific treatment data, faster overlay deployment, and lender-owned experimentation inside incumbent workflows."
  - risk: "Bank vendor-risk review and integration work stretch pilots past the window needed for a startup to learn quickly."
    likelihood: Medium
    impact: High
    mitigation: "Target integration-ready non-prime lenders first, keep the initial product read-only, and prepackage security, compliance, and architecture artifacts."
  - risk: "Auto credit performance improves or used-car values rebound enough to reduce loss-mitigation urgency."
    likelihood: Medium
    impact: Medium
    mitigation: "Anchor the value story on both avoided loss and lower manual-touch cost, and expand only after proving the product works in stressed and normalizing cohorts."
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$4-6M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of product build, compliance and integration hiring, 3-5 design-partner deployments, lender-ready vendor-risk controls, and founder-led enterprise GTM to reach 3 production logos and decide whether the wedge supports adjacent-credit expansion."
