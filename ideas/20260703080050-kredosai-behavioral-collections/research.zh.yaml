market:
  tam:
    value: $58.0M
    rationale: Equifax 显示，美国有 87.4M 个未结清车贷账户，其中 22.1% 暴露在次级/深次级客群上；据此可推得约 19.3M 个高摩擦账户。若以 40 万账户为一条目标组合中位数，就对应约 48 个有规模的贷款账簿；按每家一层回正编排叠加层年费约 $1.2M 估算，TAM 约为 $58M。
    isEstimate: true
    sourceRefs:
    - 5
    - 6
  sam:
    value: $35.0M
    rationale: 把市场收窄到美国非优质客群车贷机构和主机厂系服务商：它们有 100k-750k 规模的账簿、FICO 式队列，而且逾期压力足以支撑约 $1.0M ACV。按约 35 家合格买家估算，SAM 大约是 $35M。
    isEstimate: true
    sourceRefs:
