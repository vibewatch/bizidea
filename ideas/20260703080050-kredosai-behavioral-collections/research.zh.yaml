competitors:
- name: FICO
  stage: 现有厂商
  wedge: 面向企业贷款机构的催收决策、工作流编排和全渠道客户沟通。
  pricing: 企业定制定价
  strength: 在贷款机构风控和催收栈里卡位很深。
  weaknessVsUs: 平台范围太宽，对“漏付一期到核销”这段窄窗口的车贷专用打法不够聚焦。
