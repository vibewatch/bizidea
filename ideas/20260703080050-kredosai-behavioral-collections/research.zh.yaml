  wedge: 覆盖多地域、多渠道、自助式、AI 驱动的催收底座。
  pricing: 企业定制定价
  strength: 响应快、支持多语言，而且围绕数字互动行为已经积累出不错的证据库。
  weaknessVsUs: 更像跨行业、偏代理化的平台，而不是专门掌管贷款机构内部核销前策略层的车贷产品。
