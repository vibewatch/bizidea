slug: auto-loan-cure-orchestration
date: '2026-07-03'
executiveSummary: 这家公司应该先做成一个面向美国市场的行为控制层，服务那些需要在账户滚进收车或核销前，把 15-59 天逾期回正率拉起来的非优质客群车贷机构。研究给出的痛点很实：美国车贷余额已超 $1.6T，逾期压力最重的正是非主机厂系贷款机构，而现有催收栈也早就不是从零自建，而是通过 FICO 一类系统来跑队列和流程。最像首个客户的，是一家在管合同超过 150,000 笔、滚入率走坏、已有 FICO 式队列工作流的贷款机构里的首席催收官或贷后服务负责人。第一版产品不该去替换核心贷后系统、外呼系统或代理网络；它应该先在一个逾期分桶里以推荐模式落地，靠留出组证明提升，再逐步自动化已获批准的数字和语音处置。定价、销售动作和产品边界都得咬住一个企业切口：先卖付费基线诊断和 90 天试点，等贷款机构看到核销更低、人工触达更少、回正更好，再转成年费软件。研究里的市场不小，但也没大到足以支撑一开始就撒网：估算 TAM 为 $58.0M，SAM 为 $35.0M；只有在公司拿下 5 个灯塔客户时，第 3 年的 SOM 才有望做到约 $5.0M。之所以值得信，是因为大而全套件、代理机构和消息供应商都只解决了工作流的一段，车贷专用的“下一步最优处置”层还有空位。之所以要怀疑，是因为今天最关键的 ROI 证据仍主要来自厂商自述和相邻案例，而不是公开发表的非优质车贷留出组数据；再加上授权数据完整度和采购摩擦，都可能明显拖慢部署。
problem:
- 非优质客群车贷机构在处理早期逾期时，依旧靠静态规则、通用脚本和外包外呼；与此同时，30+ 天和 60+ 天滚入率走高，正把核销、收车量和人力预算一起往上顶。
- 催收负责人缺的，是一层控制层：能在分群层面决定下一步最优消息、渠道、时机和还款路径，同时把审计性和客户终身价值都守住。
solution:
- 在 FICO 式催收队列上加一层账户级处置评分、实验和人工审批工作流，为每笔逾期贷款推荐下一步最优的数字、语音或催收员动作。
- 先从一个 15-29 天或 30-59 天 DPD 分群，以推荐模式切入；对照随机控制组跑出提升后，再扩到自动执行、还款路径选择和跨更多分桶的升级管理。
whyWeWin:
- 这个切口比替换整套催收套件更窄，也更容易量化：它能接进现有贷后和决策栈，以贷款机构自己的逾期账簿当基线，并在一个季度内用单一分群证明价值。
- 部署一旦扩开，公司就会沉淀一张专有的处置-响应图谱，把借款人层级、车辆背景、授权状态、逾期分桶和还款结果连起来；这部分数据，现有厂商和代理机构不会自动在贷款机构内部拥有。
strategicChoices:
  beachhead: 美国非优质客群车贷机构，以及主机厂系汽车金融服务商；它们有 150,000-500,000 笔在管合同，跑着 FICO 式催收队列，而且 15-59 天逾期分桶正在明显恶化。
  wedgeRationale: 比起优质车贷、信用卡，或事后替代代理机构，这一层更容易先跑出证明：逾期压力高度集中，买家本来就每周盯着回正率和滚入率，而且叠加层能直接插进现有队列工作流，不必等核心贷后系统大替换。
  sequencingRationale: 公司应该先卖诊断，再谈大规模自动化；先以推荐模式上线，再谈自主触达；先补集成和合规能力，再放大销售。因为真正卡进度的，不是模型，而是数据映射、授权治理，以及用留出组证实的 ROI。只有第一批参考部署证明产品能在真实工作流里把某一个逾期分桶拉起来，FICO 实施方和数字催收伙伴才会变得重要。
  notYet:
  - 在 3-5 个车贷机构生产客户还没证明这套运营模型前，不碰信用卡、个人贷款、BNPL 或公用事业欠费
  - 不做核心贷后系统、外呼系统或代理管理栈的整套替换
  - 在推荐模式的审计和授权控制还没建立信任前，不把自主语音代理铺到所有逾期分桶
  - 不碰核销后债权收购、收车管理或更宽的债务出售产品
market:
  tam: $58.0M 的估算 TAM：大约 48 个有规模的美国贷款账簿，每家可支撑约 $1.2M 的年化综合支出，用在回正编排上。
  sam: $35.0M 的初始 SAM：大约 35 家美国非优质车贷机构或主机厂系金融公司，账簿规模在 100k-750k，跑 FICO 式队列，且逾期压力足以支撑约 $1.0M ACV。
  som: $5.0M 的第 3 年 SOM：5 个灯塔客户，各自做到约 $1.0M ACV；前提是诊断→试点→生产→扩容这条路径跑通。
  segments:
  - 主要：美国非优质客群车贷机构，以及拥有大规模经销商渠道资产组合、15-59 天逾期走高的主机厂系金融公司
  - 次要：服务大型贷款机构组合、运行 FICO 类工作流的第三方汽车贷后服务商和催收 BPO
  buyingProcess: 业务推动人往往是催收策略、贷后分析或数字化贷后负责人，但真正拍预算的通常是首席催收官、贷后服务负责人或 COO，因为这笔采购要和催收员编制、代理支出以及核销敞口一起权衡。第一单最好先从单一逾期分群的付费诊断或试点起步，只有当提升在贷款机构自己的基线里清清楚楚跑出来，才转正式合同。
product:
  mvp: MVP 应该先接一个逾期分桶所需的贷后、还款、触达历史和授权数据，给下一步最优处置打分，并把建议路由回现有催收队列，同时保留完整审计日志和对照组测量。初期在策略执行上保持只读：消息、渠道和还款方案先由人工审批，系统再逐步升级到有限自动化。
  sixMonth: 拿下 2-3 个付费诊断和 1-2 个试点，交付分群打分、队列推荐、数字消息模板、授权校验、审计轨迹和留出组报告。
  twelveMonth: 在滩头市场里，把最常见的贷后系统、FICO、外呼和消息环境做成可复用连接器；为窄分群提供获批后的自动执行；并上线管理者看板，跟踪回正、滚入率和催收员产效。
  twentyFourMonth: 只有在车贷机构打法、供应商风险材料包和部署动作都可复用后，才扩到多渠道处置自动化、语音辅助工作流、困难还款方案决策支持，以及更多资产类别。
  keyBets:
  - 第一条最痛的工作流，是早期车贷逾期里的处置选择，而不是再做一套全量催收系统记录源。
  - 带随机留出组的推荐模式，会比第一天就承诺自主借款人触达，更快赢得信任。
  - 只做一个逾期分桶，也足够快跑出可引用的 ROI 叙事，把付费诊断推成年度软件。
  - 只要集成点和策略模板能控制在很小一套，部署就不至于滑成重服务的定制项目。
gtm:
  wedge: 卖一个付费的回正基线诊断 + 90 天试点，聚焦单个 15-29 天或 30-59 天 DPD 的车贷分群；把它包装成一条比增员或群呼更快证明“核销更低、人工触达更少”的路。
  channels:
  - 由创始人直接卖给非优质车贷机构的首席催收官、贷后负责人和催收策略负责人
  - 和 FICO 实施商、贷后顾问、资产组合分析顾问做联合销售与转介绍；这些人已经被银行买方信任
  - 选择性和数字催收 BPO 或代理机构做渠道合作；它们本身也想在贷款机构工作流里补一层更好的早期回正工具
  funnelTargets: 目标漏斗：目标账户→有效发现 20-30%，有效发现→付费诊断 20-35%，付费诊断→试点 60%+，试点→生产 50%+，生产→第 2 个分桶或渠道扩容在 12 个月内达到 60%+。
  pricing: 先卖 6-10 周的付费基线诊断和试点，再切到按纳入编排的逾期账户数、活跃渠道数和实施范围计费的年费 SaaS；只有在贷款机构自己的基线已经跑出来后，才加可选收益分成模块。这样更贴合买家今天的预算口径：他们买的是少损失、低单次人工触达成本和更少代理支出，不是按席位付费。
businessModel:
  revenueStreams:
  - 回正编排、实验、审计日志和管理者报告的年费订阅
  - 首次接入贷后系统、FICO 和消息环境的实施与数据映射费
  - 新增逾期分桶、品牌、渠道，以及语音或困难还款模块的扩容费
  unitOfValue: 按分桶与渠道纳入编排的逾期账户数
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家贷款机构里，加更多逾期分桶、渠道和还款路径工作流
  - 从一个车贷组合扩到同一客户旗下更多品牌、证券化项目或贷后团队
  - 当基线回正数据跑起来后，再卖基准报告、语音辅助工作流和更深的实验模块
  - 等车贷场景跑通后，把同一套处置引擎扩到相邻消费信贷品类
strategyMap:
  northStarMetric: 在不增加合规例外的前提下，来自纳入编排账户、在 60+ DPD 前被催回的逾期车贷余额金额
  inputMetrics:
  - 从项目启动到第一个逾期分群完成映射的天数
  - 目标账户里，具备用得上的联系、授权和还款历史数据的占比
  - 相对对照组的 30 天回正提升
  - 相对基线，滚入 60+ DPD 或收车的比例下降
  - 付费诊断→试点→生产的转化率
  - 每个生产贷款机构平均扩出的分桶或渠道数
  moatsToBuild:
  - 把借款人属性、车辆背景、渠道选择和回正结果连起来的贷款机构专属处置-响应图谱
  - 能让合规多渠道实验重复运行的授权、可联系性和审计历史台账
  - 面向 FICO 式工作流、外呼系统和贷后数据模型的集成模板与策略库
  killCriteria:
  - 前 4 个试点里，若少于 2 个能把 30 天回正率相对提升至少 5%，或把 60+ 滚入率相对压低至少 3%，就该停。
  - 前 15 次合格 ICP 访谈里，若少于 6 家确认自己有可接收叠加式建议、且不需重写核心系统的 FICO 式队列工作流，就该停。
  - 前 3 次部署里，从项目启动到第一个分群完成映射的中位数若超过 60 天，说明数据和授权记录太碎，也该停。
  - 若付费诊断转试点低于 50%，或试点在 6 个月内转生产低于 50%，也该停。
  mermaid: |
    flowchart LR
      Wedge[15-59 DPD auto cure pilot] --> MVP[Recommendation-mode orchestration]
      MVP --> Proof[Holdout-tested cure and roll-rate lift]
      Proof --> Expansion[More buckets channels and adjacent credit products]
investorMemo:
  verdict:
    call: 观察
    conviction: 企业痛点清楚、工作流切口也成型，但在公司证明车贷场景下的专属提升、快速集成能力，以及首批少数客户之外的市场空间之前，判断仍应保持中等把握。
    whyBelieve: 这家创业公司卡在一个可量化的减损决策点上：现有厂商做得太横向，代理机构是外包模式，而买家本来就在追回收 ROI。
    whyDoubt: 现阶段最好的证明材料主要仍来自厂商自述和相邻案例，而不是公开的非优质车贷试点；同时合规和采购流程也可能拖慢学习速度。
    nextDiligence: 拿下 2 个付费诊断，在真实的非优质车贷组合里跑 1 个随机留出组试点，并证明 FICO 叠加式部署能在 90 天内进生产。
  firstCustomer:
    title: 美国一家非优质客群车贷机构的首席催收官
    profile: 这家贷款机构大约有 150,000-500,000 笔在管合同，经销商渠道贷款占比高，已经在跑 FICO 式催收队列，而且 15-59 天回正表现正在变差。
    trigger: 某个季度 60+ DPD 或收车的滚入率上升，逼管理层在继续加催收员、加代理机构支出，还是换一套回正策略之间做选择。
    buyer: 首席催收官、贷后服务负责人或 COO
    initialContract: $75k-$150k 的付费诊断加试点；等一个逾期分桶跑通、留出组提升被证明后，再折抵到一份 $600k-$1.0M 的年度生产合同。
  mustBeTrue:
  - 至少 40% 的合格滩头贷款机构，已经在用静态规则、表格或通用外呼手册管早期回正决策。
  - 单个逾期分桶试点，必须能在一个季度内把回正率相对拉升至少 5%，或把滚入率相对压低至少 3%。
  - 目标贷款机构必须有足够完整的授权和触达历史数据，才能在不重建整套数据底层的前提下，让一大块账户跑起数字化处置。
  - 至少一半的付费诊断必须转成沿生产路径走的试点，因为这条工作流应该被当作减损预算，而不是 AI 创新预算。
  - 在公司扩出车贷之外前，5 个灯塔贷款机构必须能支撑第 3 年约 $5.0M ARR。
  diligenceQuestions:
  - 非优质车贷机构今天到底有多普遍地在用 FICO 或相邻系统跑早期队列？真正可用的 API 或文件挂点有哪些？
  - 要让首席催收官把预算从代理机构或人力转到软件上，至少需要多大的相对提升？
  - 在前 10 个目标账户里，SMS、邮件和语音渠道的授权、退订和语言偏好记录到底有多完整？
  - 买家会不会接受先上推荐模式，还是一定要看到自动执行，才愿意批年费软件预算？
  - 哪条渠道最容易先卖动：创始人直销、FICO 实施伙伴，还是数字催收 BPO 转介绍？
operatingAssumptions:
- assumption: FICO 式工作流在滩头市场里足够普遍，产品可以作为叠加层落地，而不必替换核心贷后系统。
  basis: research.yaml
  validationTest: 和目标贷款机构做 10 次架构评审，确认至少 6 家能在不重写核心贷后系统的情况下，接收分群建议或文件 / API 输出。
  decisionImpact: 如果不成立，ICP 就得收窄到最容易集成的贷款机构，或路线图必须吞下更重的实施工作。
- assumption: 非优质车贷组合能跑出足够大的、贷款机构专属的提升，支撑一个分桶试点之后的企业级定价。
  basis: research.yaml
  validationTest: 执行 2 个随机留出组试点，确认至少 1 个能在没有明显投诉上升的情况下，跑出 5%+ 的相对回正提升，或 3%+ 的 60 天滚入率下降。
  decisionImpact: 如果不成立，定价会塌，切口也会在现有厂商和代理机构面前变弱，公司要重新判断车贷是否只是一门重服务的小生意。
- assumption: 授权、联系方式和语言偏好数据的完整度足以支持数字优先处置，至少能覆盖一大块逾期账户。
  basis: research.yaml
  validationTest: 审计前 3 个共创客户的 SMS、邮件、语音、退订和困难还款字段，确认至少 70% 的目标账户能通过至少 1 个合规渠道触达。
  decisionImpact: 如果不成立，产品就得更长时间停留在推荐模式，或把定位退回到催收员排序，而不是全渠道编排。
- assumption: 经济买方愿意直接从贷后或减损预算里，拿钱买付费诊断和试点，而不要求一个多年期转型项目。
  basis: idea.yaml
  validationTest: 跑 6 条从发现到方案的销售流程，确认至少 3 位买家会批准一个付费诊断，且都有明确的高层赞助人和试点转正路径。
  decisionImpact: 如果不成立，公司就得把入场价再打低、改走伙伴销售，或把范围做大，去争取另一笔转型预算。
- assumption: 首个生产部署一旦扩出更多分桶和渠道，年度支出可以往 $600k-$1.0M 走。
  basis: 运营判断
  validationTest: 至少把 2 个试点转成生产，并证明有 1 个客户在新增第 2 个分桶或渠道后，ACV 又提升 25%+。
  decisionImpact: 如果不成立，公司就需要更轻的成本结构，也未必撑得起 venture 级 GTM。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 访谈 15 位非优质车贷机构的首席催收官、贷后负责人和分析总监。
  hypothesis: 早期回正窗口现在主要还是靠静态规则和人工排序来管，而买家也认为这套方式效果不够。
  successMetric: 至少 10 次访谈确认存在活跃的人工或一刀切处置工作流，且至少 5 家账户提到一项正在进行的 15-59 天 DPD 回正项目。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 把一家贷款机构的 15-29 天 DPD 工作流从头到尾走一遍，包含 FICO 队列、贷后字段、授权记录和现行触达逻辑。
  hypothesis: 一层推荐模式的叠加层可以插进去，不必替换核心贷后系统或外呼系统。
  successMetric: 1 家架构共创客户就数据映射、对照组设计和 90 天试点方案达成一致。
  owner: 创始工程师
- horizon: 0-90 天
  experiment: 用贷款机构历史数据和现有处置基线，对一个逾期分群跑一次历史回放诊断。
  hypothesis: 在真正开启自动化前，产品就能先挖出可量化的分群处置机会。
  successMetric: 诊断至少给出 3 个可执行的分群调整，并转成一个付费试点。
  owner: 产品与分析负责人
- horizon: 90-180 天
  experiment: 在一个逾期分桶上，以推荐模式 + 随机留出组，跑 2 个付费试点。
  hypothesis: 只做一个分桶，就足以证明贷款机构专属的回正提升，并拿到扩容预算。
  successMetric: 至少 1 个试点把相对回正率拉升 5%+，或把滚入率压低 3%+，并转成生产。
  owner: 创始人/CEO
- horizon: 90-180 天
  experiment: 测试按纳入编排的逾期账户数定价，并比较“带/不带可选收益分成”两种方案。
  hypothesis: 只要基线 ROI 看得见，买家会比纯绩效定价更快接受按账户计费的年度合同。
  successMetric: 6 个合格潜在客户里，至少 4 个认可按账户定价，且至少 2 个接受付费诊断。
  owner: 创始人/CEO
- horizon: 180-360 天
  experiment: 签下 1 个 FICO 生态伙伴和 1 个数字催收 BPO，作为试点转介绍或联合销售伙伴。
  hypothesis: 只要有第一批可引用部署，受信任的工作流伙伴就能带来合格机会。
  successMetric: 伙伴至少带来 3 个合格机会和 1 个已签试点。
  owner: 合作伙伴负责人
- horizon: 180-360 天
  experiment: 为预先批准的低风险分群打开自动执行，并测量对催收员负载的影响。
  hypothesis: 有限自动化能在不增加投诉或合规例外的前提下，减少人工触达。
  successMetric: 1 个生产客户把每个回正账户的催收触达次数压低至少 15%，同时投诉率和异常率保持不变。
  owner: 合规产品负责人
operations:
- 把分渠道授权规则、审计日志和策略覆盖控制维护好，这样每一条建议和每一条消息都能在合规复核时还原出来。
- 先把上线流程标准化到“一个逾期分桶 + 一份贷后数据抽取 + 一套对照组设计”，之后再去扩渠道和自动化范围。
- 每周开处置复盘会，把贷款机构反馈、投诉和结果数据回灌成新的模板、升级规则和分群逻辑。
- 尽早把供应商风险、模型治理和实施材料打包好，因为受监管买家评估这家公司时，不会只把它当模型厂商，而会把它当运营控制供应商。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 亲自抓贷款机构发现、定价和试点转化，因为最大的风险是：这条回正工作流到底能不能拿到独立的企业预算。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责数据接入、推荐逻辑、审计轨迹，以及第一批 FICO 式工作流集成。
- role: 产品与分析负责人
  startTiming: 第 1-3 个月
  rationale: 设计对照组、结果报告和分群逻辑，把试点数据真正变成可信的 ROI 叙事。
- role: 方案与集成工程师
  startTiming: 第 3-6 个月
  rationale: 把首个分群映射时间压下来，避免早期部署滑成重定制服务项目。
- role: 合规产品负责人
  startTiming: 第 6-9 个月
  rationale: 在自动执行放大前，先把 Reg F、TCPA、CTIA、审计性和审批工作流接住。
- role: 合作伙伴与企业 AE
  startTiming: 第 9-12 个月
  rationale: 只有在第一批参考部署和定价模型被证明后，才放大直销和伙伴管道。
milestones:
- horizon: 0-12 个月
  items:
  - 拿下 3 个非优质车贷机构的付费诊断，并在单一逾期分桶上完成 2 个真实试点。
  - 交付推荐模式的编排层，包含审计日志、授权校验、对照组报告，以及 1 条可复用的 FICO 式集成路径。
  - 至少把 1 个试点转成生产，并建立 1 个可引用的贷款机构案例。
  - 把足以通过受监管贷款机构采购的供应商风险与合规材料包准备好。
- horizon: 12-24 个月
  items:
  - 在滩头市场做到 3-5 个生产客户，并让其中至少 2 个扩到第 2 个分桶或新渠道。
  - 为预先批准的分群上线有限自动执行，并证明每个回正账户所需的催收触达更少。
  - 建立 2 条能稳定带来合格试点机会的伙伴渠道。
  - 根据客户结果，决定是继续只做车贷，还是打开 1 个相邻资产类别。
- horizon: 24-36 个月
  items:
  - 若 ACV 和转化假设成立，到第 3 年拿下 5 个灯塔客户，并做到约 $5.0M ARR。
  - 在车贷里，覆盖主要早期逾期分桶的多渠道处置编排。
  - 用基准处置-响应数据把部署时间继续压短，并提高赢单率。
  - 只有当车贷部署仍可复用、可引用时，才扩到 1 个相邻消费信贷品类。
risks:
- risk: 车贷机构之间的回正提升，可能因资产组合结构、渠道政策或借款人分群差异而过度波动。
  likelihood: High
  impact: High
  mitigation: 用随机留出组，只卖单一分群；只有在每家贷款机构自己的基线里看见提升，才允许更大范围上线。
- risk: 授权、可联系性或语言偏好数据不完整，无法支撑合规的多渠道自动化。
  likelihood: High
  impact: High
  mitigation: 先从推荐模式切入，把产品设计重心放在审计日志和渠道控制上；如果数字触达覆盖面太小，就退回到催收员排序。
- risk: FICO、C&R、Qualco 或数字优先代理机构把足够多的自适应处置能力打包进去，压窄独立切口。
  likelihood: Medium
  impact: High
  mitigation: 靠车贷专用处置数据、更快的叠加式部署，以及嵌在现有工作流里的贷款机构自有实验体系来拉开差距。
- risk: 银行的供应商风险评审和集成工作把试点拖过了创业公司需要快速学习的窗口。
  likelihood: Medium
  impact: High
  mitigation: 先打最容易集成的非优质贷款机构，首版产品保持只读，并把安全、合规和架构材料预先打包。
- risk: 车贷信用表现改善、二手车价格回升，减损预算的紧迫度因此下降。
  likelihood: Medium
  impact: Medium
  mitigation: 把价值叙事同时锚在少损失和更低人工触达成本上；只有在压力期和正常化期都证明有效，才继续扩张。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $4-6M
  runwayMonths: 18
  useOfFundsSummary: 支撑 18 个月的产品研发、合规与集成招聘、3-5 个共创客户部署、面向贷款机构采购的供应商风险控制，以及创始人主导的企业 GTM；目标是做到 3 个生产客户，并判断这条切口是否值得向相邻信贷品类扩张。
