market:
  tam:
    value: $58.0M
    rationale: Equifax shows 87.4M outstanding U.S. auto accounts and 22.1% subprime/deep-subprime exposure; that implies
      ~19.3M high-friction accounts. Using a 400k-account midpoint target portfolio suggests ~48 sizeable lender books, and
      at an estimated $1.2M ACV for a cure-orchestration overlay the TAM is about $58M.
    isEstimate: true
    sourceRefs:
    - 5
    - 6
  sam:
    value: $35.0M
    rationale: Constrain the market to U.S. non-prime auto lenders and captive servicers with 100k-750k books, FICO-style
      queues, and meaningful delinquency stress; a working assumption of ~35 qualified buyers at roughly $1.0M ACV yields
      a SAM of about $35M.
    isEstimate: true
    sourceRefs:
    - 3
    - 5
    - 6
    - 24
  som:
    value: $5.0M
    rationale: A realistic year-three outcome is 5 lighthouse customers at roughly $1.0M ACV each after diagnostic-to-pilot-to-expansion
      landings.
    isEstimate: true
    sourceRefs:
    - 1
    - 12
    - 24
