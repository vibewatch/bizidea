  validationPlan:
  - priority: high
    question: Do target lenders already route early-stage auto collections through FICO-like workflows that an overlay can
      control without a core rewrite?
    evidenceToGather: Architecture interviews with servicing ops, screenshots of queue logic, and a step-by-step treatment
      decision map for one delinquency bucket.
  - priority: high
    question: What lift is achievable in non-prime auto specifically versus broader consumer-credit case studies?
