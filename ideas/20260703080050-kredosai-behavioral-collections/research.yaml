reportMemo:
  executiveTakeaways:
  - 'Auto lenders are already managing a very large and stressed book: the New York Fed put U.S. auto balances at $1.685T
    in Q1 2026, Equifax saw 87.4M outstanding auto accounts and a 1.37% 60+ DPD rate in May 2026, and the CFPB still counted
    more than 100M active auto-finance accounts in late 2024 ([2], [4], [6]).'
  - 'The pain is concentrated where the thesis points: New York Fed analysis says delinquencies are primarily concentrated
    in non-captive auto finance companies, while Equifax estimates subprime and deep-subprime borrowers represent 22.1% of
    outstanding auto-loan debt and dealer finance/monoline portfolios remain majority-subprime ([3], [5]).'
  - 'A wedge exists because incumbent stacks optimize broad collections workflows, not auto-loan-specific next-best-treatment
    loops: FICO, C&R, and Qualco all market end-to-end recovery control, while TrueAccord and InDebted prove digital-first
    collections can lift outcomes without making the lender''s internal cure engine the center of gravity ([8], [9], [10],
    [13], [17], [19]).'
  - 'Budget justification is feasible when sold as avoided loss and better liquidation: KredosAI claims 11.5% lower write-offs
    and 13.6% higher CLV, TrueAccord says Snap Finance improved liquidation 25-35%, InDebted says 3 in 4 Snap customers resolve
    digitally and that partner scorecards correlate with 20.4% higher liquidation, and Qualco advertises +35% cash-flow lift
    ([1], [12], [16], [17], [34]).'
  marketDefinition: Software and workflow orchestration that sits between a missed auto payment and charge-off, using lender
    data, policy rules, and omnichannel communications to choose the next best cure action before repossession or outsourced
    recovery ([8], [9], [13], [17], [19]).
  customerAndBuyer: Primary users are collections strategy, servicing analytics, and digital servicing leaders at large auto
    lenders; the economic buyer is usually the head of servicing, chief collections officer, or COO because cure performance
    affects write-offs, staffing, and agency spend ([2], [3], [30], [31]).
  buyingTriggers:
  - point: A rise in 30+/60+/90+ delinquency or roll rates creates immediate pressure to improve cures before accounts tip
      into repossession or charge-off.
    sourceRefs:
    - 2
    - 3
    - 6
    - 36
  - point: Operations leaders get pushed to add collectors, agency spend, or repo volume when manual treatment selection no
      longer keeps up with early-stage delinquency.
    sourceRefs:
    - 4
    - 30
    - 31
  - point: Lenders want to shift from phone-heavy, manually governed outreach into compliant digital channels without losing
      auditability.
    sourceRefs:
    - 11
    - 15
    - 21
    - 25
    - 28
    - 29
  willingnessToPay:
    summary: Budget exists when the system is sold as avoided loss, lower manual-touch cost, and faster liquidation rather
      than as generic AI. Category vendors repeatedly anchor value in revenue lift, liquidation improvement, or cash-flow
      gains instead of seat-count efficiency alone.
    sourceRefs:
    - 1
    - 12
    - 16
    - 17
    - 34
    - 35
  competitiveLandscape: 'The field splits into five classes: incumbent decisioning/workflow suites (FICO, C&R, Qualco), digital-first
    collections agencies (TrueAccord, InDebted), lender analytics/data tools (Equifax, TransUnion), messaging rails (Twilio/CTIA
    ecosystem), and lender-specific in-house rule stacks. The gap is an auto-loan-specific pre-writeoff control layer that
    improves message, channel, timing, and repayment-path decisions without forcing a full core-stack replacement ([5], [8],
    [9], [10], [13], [17], [18], [19], [32]).'
  incumbentThesis:
  - incumbentClass: Decisioning and workflow suites
    point: FICO, C&R, and Qualco already own broad recovery workflows, but their products are horizontal systems of record;
      a startup can still win with an auto-loan-specific overlay focused on treatment experimentation in the pre-writeoff
      window.
    sourceRefs:
    - 8
    - 9
    - 17
    - 18
    - 19
    - 20
  - incumbentClass: Digital-first agency models
    point: TrueAccord and InDebted prove that AI-driven, omnichannel collections can outperform static outreach, but they
      often sit as outsourced recovery motions rather than as an internal cure engine embedded inside lender operations.
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
    - 14
    - 16
  - incumbentClass: Credit analytics and portfolio tooling
    point: Equifax and TransUnion provide risk, delinquency, and portfolio-health data, but they do not make lender-specific
      next-best-treatment decisions or own escalation policy execution.
    sourceRefs:
    - 5
    - 6
    - 7
    - 32
    - 33
  - incumbentClass: Messaging infrastructure
    point: Twilio- and CTIA-class infrastructure provides the rails for compliant outreach, but not the policy engine that
      decides who should receive what treatment next.
    sourceRefs:
    - 28
    - 29
  regulatoryLandscape: The product sits inside a regulated communication workflow. CFPB Regulation F governs debt-collection
    communications and validation requirements, FCC TCPA rules are tightening revocation and one-to-one consent mechanics
    for robocalls and robotexts, CTIA/Twilio best practices require explicit opt-in and opt-out handling, and bank buyers
    must apply third-party-risk lifecycle controls before rollout ([21], [22], [23], [24], [25], [26], [27], [28], [29]).
  technologyLandscape: 'The enabling stack already exists: FICO markets collections decisioning and omnichannel communications,
    Twilio and CTIA define messaging-compliance rails, TransUnion packages portfolio-health and loss-forecasting analytics,
    and vendors like C&R, Qualco, TrueAccord, and InDebted show that digital-first recovery and AI-assisted workflows are
    technically deployable today ([8], [9], [10], [13], [17], [18], [19], [28], [29], [32]).'
