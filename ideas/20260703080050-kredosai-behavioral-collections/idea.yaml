differentiator: >-
  Dialers and collection agencies maximize contact volume, while most collections suites expose rules and queues. This
  startup owns the behavioral treatment layer between them: it decides which borrower should receive which message,
  through which channel, at which moment, and when to escalate to a human. Because it is designed as an additive layer
  over FICO-driven workflows, it can win without forcing lenders to replace their core stack. Its moat compounds from
  lender-specific treatment-response data, repayment-path outcomes, and the workflow graph of which interventions cure
  which delinquency cohorts.
