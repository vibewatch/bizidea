problem: >-
  Auto lenders with large delinquent portfolios still manage the early-stage cure window with static rules, manual
  scripts, and outsourced dialing. When millions of overdue accounts can trap 10-15% of revenue, waiting until a loan
  is close to write-off is too late and too expensive. Generic outreach also forces lenders to choose between near-term
  recovery and long-term customer value instead of optimizing both at the account level.
targetUser:
  primary: "VP of collections strategy or head of servicing at a U.S. non-prime auto lender"
  secondary: "Collections analytics director or digital servicing leader responsible for cure-rate performance"
  buyer: "Chief Collections Officer, COO, or head of servicing"
startupThesis:
  nonObviousInsight: >-
    The biggest opportunity is not replacing collections agencies after an account is already lost; it is owning the
    short decision window between missed payment and write-off, when a lender can still preserve both cash recovery and
    customer lifetime value. Because FICO integration and voice-driven treatment workflows can sit on top of existing
    servicing stacks, this layer can wedge into lender operations without requiring a core-system rip-and-replace.
  beachhead: >-
    U.S. non-prime auto lenders and captive auto-finance servicers with 100,000-750,000 active installment loans, FICO
    collections workflows, and rising 15-59 day delinquency cohorts that need better cure rates before repossession or
    write-off
  wedge: >-
    A pre-writeoff cure orchestration layer that scores each delinquent auto-loan account, chooses the next best
    message, channel, timing, and repayment path, and routes only the highest-risk cases into human collector queues
  whyNowCatalyst: >-
    KredosAi's financing, measured write-off and customer-lifetime-value lift, and expansion into auto lending with
    FICO integration show that behavioral pre-collections tooling has moved from an abstract AI promise into a buyable
    servicing system.
  ventureScalePath: >-
    Start with auto-loan cure orchestration, then expand the same decisioning and treatment engine into personal loans,
    credit cards, BNPL, utility arrears, and third-party servicing platforms, becoming the behavioral control layer for
    delinquent consumer obligations.
solution: >-
  The startup plugs into loan-servicing data and FICO-style collections queues to score each late account before it
  reaches write-off. It recommends or executes the next best cure action across SMS, email, voice, and collector
  worklists, tailoring message, channel, timing, and repayment path to each borrower cohort. Managers can see which
  segments respond to light-touch nudges, hardship-plan offers, or live-agent escalation and can run controlled tests
  by delinquency bucket and book type. Because the product is an overlay, lenders can keep their servicing core,
  dialers, and agency relationships while improving cure rates and reducing avoidable write-offs. Over time, the
  company builds a proprietary response graph across borrower behavior, vehicle economics, and treatment outcomes that
  turns collections policy into a learning system.
goToMarketSeed:
  firstCustomer: >-
    Chief collections officer at a U.S. non-prime auto lender with 150,000-plus active contracts, an existing FICO
    collections workflow, and worsening 15-59 day delinquency cure rates across indirect-originated loans
  buyingTrigger: >-
    A quarter with deteriorating cure rates or rising roll rates into 60-plus day delinquency that forces the lender to
    choose between adding headcount, increasing agency spend, or accepting higher write-offs
  currentAlternative: "Static FICO queue rules, manual collector scripts, outbound dialers, and outsourced collection agencies"
  switchingReason: >-
    A behavioral overlay can improve recovery and retention without replacing the servicing core, giving leaders a
    faster path to measurable write-off reduction than another round of staffing, scripts, or blanket outreach waves.
  pricingHypothesis: >-
    Annual SaaS subscription priced by active delinquent accounts under orchestration, plus implementation fees and an
    optional performance-based module tied to write-off reduction or cure-rate lift.
