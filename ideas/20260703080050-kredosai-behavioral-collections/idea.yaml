  painIntensity:
    score: 5
    rationale: "If 10-15% of revenue is tied up in delinquent balances and loans are rolling toward write-off, the buyer's pain is immediate, measurable, and balance-sheet material."
  wedgeClarity:
    score: 5
    rationale: "Pre-writeoff cure orchestration for auto lenders inside existing FICO-style workflows is a narrow, specific workflow with named buyers and a concrete first use case."
  defensibility:
    score: 4
