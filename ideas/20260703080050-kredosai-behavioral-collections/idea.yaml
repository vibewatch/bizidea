topRisks:
  - name: Model lift may vary by lender book
    description: "A treatment strategy that works for one auto lender's borrower mix, channels, and policies may not produce the same cure lift elsewhere."
    mitigation: "Start with cohort-specific pilots and randomized holdouts, then expand only after proving lift against each lender's own baseline."
  - name: Incumbents can bundle adjacent features
    description: "FICO, servicing platforms, or large collection agencies could add basic personalization features once the wedge is visible."
    mitigation: "Win by owning the auto-loan-specific treatment dataset and by integrating into incumbent workflows faster than they can ship vertical outcome models."
  - name: Operational and policy friction
    description: "Lenders may hesitate to let automated systems touch borrower outreach, repayment options, or escalation rules in a sensitive servicing workflow."
    mitigation: "Launch first in recommendation mode with full audit logs and human approval, then graduate customers into automation on narrowly defined cohorts."
