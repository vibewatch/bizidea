jobsToBeDone:
  - job: >-
      When early-stage auto-loan delinquency rises, help collections leaders choose the next best borrower treatment,
      so they can improve cure rates before accounts approach write-off.
    currentAlternative: "Static queue rules, collector scripts, and blanket dialer campaigns"
    successMetric: "30-day cure rate and roll rate into 60-plus day delinquency or write-off"
  - job: >-
      When servicing teams are pressured to add more collectors or agencies, help operations leaders focus human effort
      on the hardest accounts, so they can lift recoveries without scaling headcount linearly.
    currentAlternative: "Outsourced agencies, manual prioritization, and staffing expansion"
    successMetric: "Collector touches per cured account and write-off dollars avoided"
ideaScorecard:
  signalStrength:
    score: 5
