openQuestions:
- 一家创业公司能否在没有先拿下保险公司层面背书的情况下，及时、且有合同保障地拿到保险公司委任
  数据源的接入权限？
- 有多大比例的区域性 E&S MGA，已经在用 Sircon 或 AgentSync 模块，却仍在跑基于电子表格的异常
  处理流程？
- 保险公司和 MGA，愿意让第三方合规网在要求人工干预之前，掌握多大程度的签单工作流控制权？
- 哪一个首发州群，能在专业市场体量、委任复杂度和数据接入难易度之间取得最好的平衡？
