    severity: medium
    affectedBuyer: 合规经理
    mitigation: 按州群分批上线，并把规则锚定在官方的继续教育和执业许可信息源上。
    sourceRefs:
    - 9
    - 34
    - 35
    - 37
    - 38
market:
  tam:
    value: $95.0M
    rationale: '约 790 家更广义的专业分销买家（278 家 WSIA 美国批发会员 + 176 家 WSIA 美国
      保险市场会员 + 407 家 TMPAA 项目管理机构，扣除一定的重叠折让）x 约 $120k 的跨保险
      公司代理人合规年度预算估算 = 约 $95.0M；交叉校验：NIPR 追踪 920 万条代理人记录，
      SuranceBay 称其入职系统已服务超过 700,000 名代理人。'
    isEstimate: true
    sourceRefs:
    - 4
    - 18
    - 20
    - 30
  sam:
    value: $21.6M
    rationale: 约 270 家符合滩头画像的区域性批发或专注 E&S 业务的 MGA 及项目管理机构 x 约 $80k
      估算 ACV = 约 $21.6M；这个筛选口径是从 278 家 WSIA 批发会员基数和 407 家
      TMPAA 项目管理机构池建模得出的。
    isEstimate: true
    sourceRefs:
    - 18
    - 20
  som:
    value: $2.8M
    rationale: 35 个账户 x 约 $80k ACV = 约 $2.8M，到第 3 年实现，前提是走行业协会
      主导的获客管道和检查触发式成交，而不是替代整个保险公司平台。
    isEstimate: true
    sourceRefs:
    - 18
    - 20
