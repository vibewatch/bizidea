competitors:
- name: AgentSync
  stage: scale-up
  wedge: API 优先的代理人合规与管理平台，面向保险公司、代理机构和 MGA，使用实时监管数据和
    工作流自动化。
  pricing: 定制企业报价；抓取页面无公开定价。
  strength: 强劲的合规数据模型（200 多个数据字段），加上超过 200 家保险公司客户和可观的融资。
  weaknessVsUs: 更广泛的保险公司和代理机构平台可能显得比一张专注签单前异常处理的、窄而深的
    批发 MGA 就绪网更重。
  sourceRefs:
  - 24
  - 25
  - 26
  - 32
- name: Vertafore / Sircon
  stage: incumbent
  wedge: 云端分销管理，涵盖入职、执业许可、委任、继续教育和保险公司关系。
  pricing: 无公开报价单；代理机构页面强调无实施成本，走 SaaS 或服务交付模式。
  strength: 在保险公司、代理机构、教育提供商、专业人士和监管机构之间有深厚的网络。
  weaknessVsUs: 为广泛的资质认证和分销管理做了优化，而不是专门为区域性批发 MGA 打造的、不依赖
    特定保险公司的就绪图谱。
  sourceRefs:
  - 27
  - 28
  - 29
- name: SuranceBay / SureLC
  stage: incumbent
  wedge: 多保险公司入职与合规平台，在代理人和签约规模上实力雄厚，尤其是在寿险和年金分销领域。
  pricing: 定制报价；抓取页面无公开报价单。
  strength: 服务超过 700,000 名代理人，每月提交超过 70,000 份合同，支持 750 多种保险公司表单。
  weaknessVsUs: 在入职和签约方面比在 E&S MGA 持续性的多州财产险/意外险委任就绪方面更强。
  sourceRefs:
  - 30
  - 31
- name: Producerflow
  stage: scale-up
  wedge: 保险公司分销管理软件，新上线了 Partner Portal 用于代理人就绪可见性。
  pricing: 定制或演示驱动；抓取页面无公开报价单。
  strength: 直接切中批发商和代理网络对执业许可、委任和合规状态可见性的需求。
  weaknessVsUs: 门户绑定在单一厂商的保险公司协作界面上，因此跨多个保险公司运作的 MGA 仍可能
    面临碎片化的可见性。
  sourceRefs:
  - 1
  - 2
  - 3
