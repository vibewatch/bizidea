    sourceRefs:
    - 10
    - 11
  - factor: economic
    impact: positive
    point: 2024 年美国 MGA 保费增长 16%，扩大了需要管理的代理人关系规模。
    sourceRefs:
    - 23
  - factor: social
    impact: positive
    point: 独立代理机构仍承保 61.5% 的全部财产险/意外险和 87.2% 的商业险，维持着一个碎片化的
      人力分销渠道。
