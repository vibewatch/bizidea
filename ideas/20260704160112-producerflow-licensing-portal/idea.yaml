topRisks:
  - name: Data access gatekeeping
    description: >-
      NIPR, state DOI systems, and individual carriers may restrict, rate
      limit, or charge prohibitively for the license and appointment data
      feeds the product depends on.
    mitigation: >-
      Launch with MGA-owned data plus producer self-attestation and manual
      carrier CSV upload, then negotiate direct API access once paying
      customers demonstrate demand.
  - name: Incumbent bundling
    description: >-
      Established insurance compliance vendors such as Vertafore/Sircon or
      agency management system providers could bundle equivalent cross-network
      visibility and undercut a standalone startup on distribution.
    mitigation: >-
      Focus on the underserved wholesale MGA segment as a carrier-agnostic
      layer and ship direct carrier/NIPR integrations faster than incumbents
      whose roadmaps are tied to their own platform's release cycle.
  - name: Compliance liability exposure
    description: >-
      A false negative that lets an unlicensed producer bind coverage, or a
      false positive that blocks a compliant producer, creates real legal and
      financial liability for the software vendor.
    mitigation: >-
      Position the product as advisory infrastructure with full source
      timestamps and require a human compliance reviewer sign-off before any
      automated binding-authority hold takes effect.
