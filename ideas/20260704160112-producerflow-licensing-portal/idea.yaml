jobsToBeDone:
  - job: >-
      When a producer's license or carrier appointment status changes, help
      the MGA compliance lead know before that producer binds business, so
      they can prevent an E&O claim or DOI finding.
    currentAlternative: >-
      manual workflow of spreadsheets and periodic NIPR/Sircon batch lookups
    successMetric: >-
      Zero instances of an out-of-compliance producer binding coverage after
      the alert should have fired
  - job: >-
      When a DOI market-conduct exam requests producer compliance history,
      help the compliance lead produce a timestamped audit trail, so they can
      close the exam without a finding.
    currentAlternative: incumbent software or manual document reconstruction
    successMetric: Audit trail request fulfilled in under one business day
