slug: producer-compliance-mesh
date: '2026-07-04'
executiveSummary: >-
  区域性批发财产险/意外险 MGA 在 10 个以上的州经营超额与盈余线业务，目前靠电子表格和定期
  NIPR/Sircon 批量查询来核对代理人执业许可、保险公司委任和继续教育状态，结果就是代理人许可证
  过期或委任终止后仍能签单而无人察觉，给 MGA 带来 E&O 和 DOI 市场行为检查风险。Producerflow
  在 2026 年 7 月推出的 Partner Portal 证明了批发商和保险公司愿意为实时代理人就绪可见性付费，
  但这套方案绑定在单一厂商平台上，给一层不依赖特定保险公司、能跑遍 MGA 所代表每个保险公司项目
  的合规网留出了空间。计划是拿下签约代理机构 50-500 家的区域性批发 E&S MGA，按代理人每月订阅、
  按追踪的委任数量分档计价，在一次 E&O 理赔或 DOI 检查问题催生预算之后，卖给集中在 WSIA（278
  家批发会员）和 TMPAA（407 家项目管理机构）的买家群体。产品第一年只提供建议性功能（看板、
  预警、审计导出），等误判率被证明够低之后，再加上一道可选的人工审核签单权限冻结。研究估算的
  SOM 是第 3 年 $2.8M（35 个账户），规模不算大，风险投资回报要靠拓展到寿险与健康险分销、
  并成为其他 AMS 平台对接的系统记录才能实现——这是一条尚未验证的扩张路径，不是板上钉钉的事。
  核心执行风险在于：拿不到保险公司委任数据接入（缺乏保险公司层面的背书），以及 AgentSync、
  Sircon 或 SuranceBay 的捆绑竞争。
problem:
  - >-
    批发型 MGA 和代理网络在互不相通的系统里管理执业许可和委任状态（NIPR/各州 DOI 记录、按保险
    公司拆分的委任数据源、内部电子表格），合规人员只能靠邮件和表单手工核对，结果就是代理人许可证
    过期或保险公司终止委任之后，仍能在无人察觉的情况下继续签单。
  - >-
    每一次未被发现的疏漏，都会把 E&O 风险和 DOI 市场行为检查风险压到 MGA 头上而不是代理人个人
    身上，而且目前没有一个跨保险公司的统一就绪视图能在问题发生前拦下它。
solution:
  - >-
    一张合规网，汇总 NIPR/各州 DOI 许可数据、保险公司委任数据（API 或 CSV）以及继续教育/E&O
    保单记录，为每位代理人、每个州、每个保险公司项目生成一张实时就绪图谱。
  - >-
    一块建议性看板，配自动的临期预警和面向 DOI 市场行为检查的带时间戳审计轨迹；等预警准确率建立
    起信任后，再加上一道可选的人工审核签单权限冻结——v1 版本是建议性基础设施，不是说一不二的关卡。
whyWeWin:
  - "从设计上就不依赖特定保险公司：一家 MGA 能看到自己所代表每个保险公司项目的就绪度，这一点 Producerflow 单一厂商的 Partner Portal 做不到。"
  - >-
    建议优先的工作流（拦截签单前先经人工签字）降低了采用门槛，比那些号称能直接拦截签单权限的
    工具更容易落地，也正对应研究发现的头号采用阻力（误判拖慢签单）。
  - >-
    滩头买家群体集中且可通过行业协会渠道触达（278 家 WSIA 批发会员、407 家 TMPAA 项目管理
    机构），公司能比对 AgentSync 或 Sircon 更大的保险公司/代理机构版图做企业级销售更快拿下
    可作参考案例的共创客户。
strategicChoices:
  beachhead: >-
    区域性批发财产险/意外险 MGA——签约独立代理机构 50-500 家、在 10 个以上的州经营超额与盈余线
    业务，目前靠 NIPR/Sircon 批量查询对照按保险公司拆分的电子表格来核对状态。
  wedgeRationale: >-
    这个细分市场买家集中（278 家 WSIA 批发会员、407 家 TMPAA 项目管理机构）且能通过行业协会
    渠道触达，已经切身感受到多保险公司碎片化最尖锐的一面（10 个以上的州、每家 MGA 对应多个保险
    公司委任），而且有一个真实的、会催生预算的痛点事件（E&O 理赔或 DOI 检查问题）而非假设性的
    痛点——比起先攻大型全国性 MGA、单一保险公司代理机构或寿险/健康险分销，这条路能更快拿出共创
    客户的验证结果。
  sequencingRationale: >-
    先建（NIPR 加头部保险公司的 CSV/API 接入、建议性看板），再卖（向有真实检查或理赔触发事件
    的合规负责人做行业协会渠道外联），再招（先招一名合规领域专家，再建大规模销售团队），再谈
    合作伙伴（保险公司委任数据协议，等付费客户带来议价筹码后再谈）。如果在建立信任之前就尝试
    自动化的、说一不二的签单权限拦截，或做大范围的保险公司集成，会直接触发研究点出的合规责任
    和数据接入风险。
  notYet:
    - 无人工签字确认的自动化/权威式签单权限拦截
    - 拓展到寿险与健康险分销
    - 全面替代代理管理系统
    - 全国性/企业级 MGA 及保险公司直签的企业级交易
market:
  tam: >-
    $95.0M（研究估算：约 790 家专业分销买家 x 每家约 $120k 的跨保险公司代理人合规
    年度预算估算）
  sam: >-
    $21.6M（约 270 家符合滩头画像的区域性批发/E&S MGA 及项目管理机构 x 约 $80k 估算
    ACV）
  som: >-
    第 3 年 $2.8M（35 个账户 x 约 $80k ACV，假设走行业协会主导的获客管道和检查触发式
    成交，而非替代整个保险公司平台）
  segments:
    - 签约代理机构 50-500 家、经营 E&S 业务的区域性批发财产险/意外险 MGA
    - 为独立代理人办理入职或资质复核的多保险公司代理网络和项目管理机构
  buyingProcess: >-
    一次 E&O 理赔或 DOI 市场行为检查问题点出许可或委任缺口之后，由合规/运营副总裁发起评估；
    考虑到组织规模集中（50-500 家代理机构），采购通常是单一经济决策人拍板，而不是多方参与的
    企业级销售。
product:
  mvp: >-
    接入 NIPR/各州 DOI 许可数据，加上 3-5 家共创保险公司的 CSV/API 委任数据，做成一块统一的
    代理人就绪看板，配临期邮件/Slack 预警和带时间戳的审计导出；v1 不含自动化的签单权限拦截。
  sixMonth: >-
    加入自助式保险公司 CSV 模板，以及共创客户点名的前 10 家保险公司的 API 连接器，加继续教育/
    E&O 保单追踪，以及供合规人员分诊标记代理人的异常队列。
  twelveMonth: >-
    上线可选的人工审核签单权限冻结，按研究建议从 TX、NY、WA、NC、OR、CA 州群开始的规则包，
    并对接至少一个代理管理系统。
  twentyFourMonth: >-
    从财产险/意外险扩展到寿险与健康险分销合规，朝着成为其他 AMS 和签单平台都要对接的系统记录
    迈进，对应 idea.yaml 中的风险投资级扩张路径。
  keyBets:
    - >-
      不需要先拿下保险公司层面的背书，就能通过 CSV 或 API 拿到保险公司委任数据——这是研究中
      排名最高的待验证问题。
    - >-
      建议优先（不自动拦截）的定位，足以拿下前 10-15 个付费账户，不会有客户在此之前就要求
      拦截功能。
    - >-
      行业协会渠道（WSIA、TMPAA）产生获客管道的速度和成本，会优于直接的企业级外联。
gtm:
  wedge: >-
    在一次 E&O 理赔或 DOI 市场行为检查问题发生后的窗口期，拿下区域性批发 E&S MGA 的合规运营
    负责人，卖的是审计就绪和临期预警，而不是整套 AMS 替代方案。
  channels:
    - 对 WSIA 和 TMPAA 会员合规负责人的直接外联
    - WSIA 和 TMPAA 的行业协会合作与会议露出
    - 与代理管理系统厂商的推荐或联合销售
  funnelTargets: >-
    线索到合格试点转化率 20-30%（买家群体集中、痛点强烈）；试点到正式付费转化率 90 天内
    50%以上，得益于建议优先、低风险的首期部署
  pricing: >-
    按代理人每月订阅，按追踪的在用保险公司委任数量分档计价，另加一笔一次性的 NIPR/保险公司
    数据接入费——对标研究测得的约 $80k ACV 基准，把价格直接挂钩到驱动客户合规风险的那个
    计价单位上。
businessModel:
  revenueStreams:
    - 按代理人每月订阅，按委任数量分档计价
    - NIPR 和保险公司数据接入的一次性实施/集成费
    - 来自新增保险公司项目和州覆盖范围的扩张收入
  unitOfValue: 每月每个被追踪的代理人-州-保险公司委任状态
  targetGrossMarginPct: 75
  expansionLevers:
    - 在现有 MGA 账户内新增保险公司项目和州
    - 追加销售继续教育/E&O 保单追踪和审计导出自动化
    - 信任建立后追加销售人工审核签单权限冻结
    - 从财产险/意外险扩展到寿险与健康险分销合规
strategyMap:
  northStarMetric: >-
    在代理人签下不合规业务之前，被发现并解决的代理人-州-保险公司合规缺口数量
  inputMetrics:
    - 签约的共创客户 MGA 数量
    - 已集成的保险公司数据源（API 或 CSV）
    - 被追踪的代理人记录数
    - 预警的误判率
    - 满足一次 DOI 审计轨迹请求所需的时间
  moatsToBuild:
    - 跨 PDB、保险公司文件和继续教育节点、标准化的历史代理人-州-保险公司状态数据集
    - 复制成本高的直接保险公司委任数据关系
    - 来自市场行为检查和审计工作流的人工纠偏调优数据
    - 行业协会渠道分销关系（WSIA、TMPAA）
  killCriteria:
    - "10 家目标 WSIA/TMPAA MGA 中，90 天内愿意开放现有跨保险公司核对流程访问权限的不足 3 家"
    - >-
      目标前 10 家保险公司在 6 个月内无法在没有保险公司层面背书的情况下，通过 API 或 CSV
      交付委任数据
    - >-
      共创客户在合规预警上的误判率，两个季度调优后仍超过 15%，堵死任何走向付费签单权限冻结
      功能的路径
  mermaid: |
    flowchart LR
      切口[区域性 E&S MGA 滩头市场] --> MVP[建议性就绪网 MVP]
      MVP --> 验证[共创客户审计与预警验证点]
      验证 --> 冻结[人工审核签单权限冻结]
      冻结 --> 扩张[寿险/健康险扩张 + AMS 系统记录]
investorMemo:
  verdict:
    call: 值得约谈、继续调研
    conviction: >-
      痛点真实且会催生预算，有一个可信的、拿到融资的验证点（Producerflow），买家群体也集中，
      但证据仅来自 Producerflow 自述的业务进展这一单一来源，且建模出的 SOM（第 3 年 $2.8M）
      如果寿险/健康险扩张不成功，对风险投资规模来说偏小。
    whyBelieve: >-
      一家拿到融资的竞争对手刚上线了这套工作流的单厂商版本，研究也独立印证了这个痛点（市场
      行为检查、各州委任规则）以及一个可触达、集中的 278 家 WSIA 与 407 家 TMPAA 买家群体。
    whyDoubt: >-
      滩头 SOM 偏小（35 个账户对应第 3 年 $2.8M），竞争已经很激烈（AgentSync、Sircon、
      SuranceBay、Producerflow），而且产品的核心数据依赖——保险公司委任数据接入——在没有
      保险公司层面背书的情况下尚未得到验证。
    nextDiligence: >-
      与三家 WSIA/TMPAA 会员 MGA 做访谈，确认它们目前仍靠人工核对跨保险公司状态，并愿意
      开展合规运营方向的共创客户合作。
  firstCustomer:
    title: 区域性批发 E&S MGA 的合规/执业许可运营负责人
    profile: >-
      一家签约独立代理机构 50-500 家、在 10 个以上的州经营超额与盈余线业务的批发 MGA，已经
      在用代理管理系统，但跨保险公司的执业许可和委任状态仍靠电子表格和定期 NIPR/Sircon 批量
      查询来核对。
    trigger: >-
      近期发生一起 E&O 理赔或 DOI 市场行为检查问题，牵涉某代理人在无证、未获委任或许可证已
      过期的情况下仍签下了保单。
    buyer: 合规/运营副总裁
    initialContract: >-
      建议性试点，ACV 大致在 $40-80K（按代理人每月订阅加集成费），如果临期预警和审计
      导出确实减少了人工核对时间且误判率保持在低位，90 天内转为正式付费。
  mustBeTrue:
    - >-
      10 家目标 WSIA/TMPAA MGA 中至少 3 家在访谈中确认，它们在核心 AMS/Sircon 部署之外，
      仍靠人工核对跨保险公司委任状态。
    - >-
      共创客户点名的头部保险公司，能在 6 个月内通过 API 或 CSV 交付委任、终止和续约数据，
      不需要保险公司层面的背书。
    - 一家共创客户 MGA 在 90 天内把试点转为正式付费合同，ACV 达到或超过约 $60k。
    - >-
      预警误判率保持在足够低的水平（目标低于 10%），让合规负责人愿意持续使用产品，而不是
      退回电子表格。
    - >-
      至少一家 MGA 在 12 个月内续约或扩容（新增州或保险公司），证明这不是一次性的审计应急
      采购。
  diligenceQuestions:
    - >-
      278 家 WSIA 批发会员和 407 家 TMPAA 项目管理机构里，过去 12 个月内有多少家有活跃的
      E&O 理赔或 DOI 检查问题，会让它们现在就想买而不是往后拖？
    - >-
      在没有保险公司层面背书的情况下，拿到这个细分市场最常用的前 10-15 家保险公司的委任数据
      接入，现实的时间线和成本是多少？
    - >-
      AgentSync、Sircon 或 SuranceBay 会不会在公司达到有意义的规模之前，就把类似的跨保险
      公司就绪视图捆绑进它们与批发 MGA 现有的关系里？
    - >-
      合规负责人在信任任何自动化的签单权限冻结之前，能接受的误判率或漏判率是多少，建立这种
      信任需要多久？
    - >-
      $21.6M 的 SAM 本身能否支撑一个风险投资级的结果，还是必须靠寿险/健康险和系统记录的
      扩张路径才能撑起这一轮融资？
operatingAssumptions:
  - assumption: >-
      签约代理机构 50-500 家的区域性批发 E&S MGA，愿意为一张不依赖特定保险公司的合规网支付
      约 $80k ACV，而不是扩购现有的 Sircon/AgentSync 模块。
    basis: research.yaml
    validationTest: >-
      在向 WSIA/TMPAA 会员合规负责人外联的前 9 个月内，签下 3 个 ACV $60k+ 的付费试点。
    decisionImpact: >-
      如果 ACV 跌破 $30k，要么改变按委任量分档的定价模型，要么在扩充销售人力前先调整
      目标细分市场。
  - assumption: >-
      头部保险公司会通过 CSV 或 API 提供委任、终止和续约数据，不需要创业公司先拿下保险公司
      层面的背书。
    basis: research.yaml
    validationTest: >-
      在前 3 个共创客户点名的前 10 家保险公司里，6 个月内至少从 5 家拿到数据共享协议或样例
      CSV/API 数据源。
    decisionImpact: >-
      如果保险公司数据被卡住，路线图要转向 MGA 自有数据加代理人自我申报，配合人工 CSV 上传，
      持续 12 个月以上，实时就绪图谱及其定价溢价都会被推迟。
  - assumption: >-
      合规运营负责人会足够信任一套建议性预警系统，在第一年愿意让它持续上线运行，而不会要求
      签单权限拦截功能。
    basis: idea.yaml
    validationTest: >-
      在试点结束后的 90 天里，追踪共创客户对看板和预警的日活/周活使用情况，不要求拦截功能
      即可续约。
    decisionImpact: >-
      如果客户在续约前就要求拦截功能，12 个月路线图上的那一项（签单权限冻结）就必须提前
      纳入 MVP，在第一笔交易正式落定之前就增加责任和 QA 范围。
  - assumption: >-
      在合计约 685 家 WSIA 和 TMPAA 目标企业里，E&O 理赔/DOI 检查触发事件足够频繁，能支撑
      一套可重复的外联动作，而不是依赖罕见的一次性事件。
    basis: operator judgment
    validationTest: >-
      在前 50 次外联对话里，统计有多少比例被外联到的合规负责人，把近期的理赔或检查问题作为
      愿意见面的理由。
    decisionImpact: >-
      如果引用真实触发事件的比例低于约 20%，GTM 就必须转向主动的审计就绪推销（更重触达、
      周期更长），而不是被动的触发式销售，这会改变销售周期长度和招聘计划。
  - assumption: >-
      行业协会渠道分销（WSIA、TMPAA）转化为合格获客管道的速度和成本，会优于直接的企业级
      外联或 AMS 厂商联合销售。
    basis: idea.yaml
    validationTest: >-
      在前两个季度里，比较行业协会赞助渠道群体（网络研讨会/会议）与冷外联群体的单个合格
      试点成本和周期时长。
    decisionImpact: >-
      如果行业协会渠道表现不佳，就把 GTM 预算重新分配给 AMS 厂商合作或直接外联，并重新审视
      0-90 天的实验路线图。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: >-
      与滩头画像匹配的 MGA 中的 WSIA/TMPAA 会员合规负责人，做 10 场访谈。
    hypothesis: >-
      至少 3 家会确认自己靠人工核对跨保险公司委任状态，且近期感受过 E&O/检查触发事件。
    successMetric: >-
      30%以上的访谈同时确认人工核对的痛点和近期的触发事件。
    owner: 创始人/CEO
  - horizon: 0-90 天
    experiment: >-
      向访谈参与者点名最多的 10 家保险公司，索取样例委任数据（API 规范或 CSV 导出）。
    hypothesis: >-
      被点名的保险公司里至少一半，能在不要求保险公司层面背书的情况下交付可用的委任、终止
      或续约数据。
    successMetric: >-
      请求发出 60 天内，10 家保险公司中有 5 家以上返回可用的样例数据源或承诺的 API 规范。
    owner: 创始工程师
  - horizon: 3-6 个月
    experiment: >-
      用 NIPR 加可获得的保险公司 CSV/API 数据源，向 3 家共创客户 MGA 部署建议性 MVP 看板。
    hypothesis: >-
      合规负责人会每周使用看板，并在上线 60 天内表示人工核对时间有所减少。
    successMetric: >-
      3 家共创客户里 3 家都表现出周活使用，且在第 60 天报告人工核对时间减少 30%以上。
    owner: 创始人/CEO 与创始工程师
  - horizon: 3-6 个月
    experiment: >-
      与 3 家共创客户测试按代理人每月订阅加实施费的定价模型，对标研究测得的约 $80k ACV
      基准。
    hypothesis: >-
      共创客户会从免费试点转为 ACV $60k+ 的付费合同。
    successMetric: >-
      3 家共创客户中至少 2 家在试点开始 90 天内签下 ACV $60k+ 的付费合同。
    owner: 创始人/CEO
  - horizon: 6-12 个月
    experiment: >-
      针对一次真实或模拟的 DOI 市场行为检查请求，试点异常队列和审计导出工作流。
    hypothesis: >-
      审计导出功能能在一个工作日内满足合规负责人的检查数据请求。
    successMetric: >-
      审计轨迹导出在 1 个工作日内完成并被合规负责人接受，对应 jobsToBeDone 里的成功指标。
    owner: 创始工程师
  - horizon: 6-12 个月
    experiment: >-
      针对获客管道生成，测试 WSIA/TMPAA 行业协会渠道（联合赞助的网络研讨会或会议展位）对比
      冷外联的效果。
    hypothesis: >-
      行业协会渠道的线索转化为合格试点的成本更低、周期更快，胜过冷外联。
    successMetric: >-
      行业协会渠道的单个合格试点成本，比冷外联低至少 30%。
    owner: 创始人/CEO 和第一位 AE
  - horizon: 12-18 个月
    experiment: >-
      与一家信任度最高的共创客户，引入可选的人工审核签单权限冻结。
    hypothesis: >-
      预警误判率经过两个季度以上验证保持低位后，合规负责人会愿意启用这道半权威性的冻结机制。
    successMetric: >-
      至少一家共创客户在生产环境启用签单权限冻结功能，误判率低于 10%。
    owner: 创始工程师和合规领域专家
operations:
  - NIPR/各州 DOI 数据接入协议和 PDB 集成，作为基础性的数据供应关系。
  - 与每家共创客户的头部保险公司直接谈判的保险公司委任数据集成（API/CSV）。
  - 聘用或引入合规领域专家，负责州群规则维护，从 TX、NY、WA、NC、OR、CA 开始。
  - WSIA 和 TMPAA 的行业协会会员资格与赞助，作为主要的外联和信任背书渠道。
team:
  - role: 创始工程师（数据集成）
    startTiming: 第 0 个月
    rationale: >-
      NIPR/PDB 和保险公司 CSV/API 接入是最难、也最有价值的技术依赖项，必须在任何销售动作
      规模化之前得到验证。
  - role: 合规领域负责人（保险执业许可/委任）
    startTiming: 第 0-3 个月
    rationale: >-
      逐州的继续教育/委任规则（研究点出 TX、NY、WA、NC、OR、CA 是第一个复杂州群）需要专门
      的领域专业知识，才能保持法律上的可信度并降低合规责任风险。
  - role: 创始 AE / 客户成功复合角色
    startTiming: 第 4-6 个月
    rationale: >-
      一旦 MVP 有 1-2 家共创客户上线，就需要一名专职销售来推动 WSIA/TMPAA 外联动作、把试点
      转为付费合同，同时不用把创始人从产品工作中抽离出来。
  - role: 第二名数据/集成工程师
    startTiming: 第 9-12 个月
    rationale: >-
      从 3 家共创客户扩展到 10-15 个付费账户，需要在更多保险公司项目和州上并行推进数据源
      集成工作。
milestones:
  - horizon: 0-12 个月
    items:
      - "在区域性批发 E&S MGA 拿下 3 个付费共创客户试点（ACV $60k+）"
      - >-
        对接 NIPR/各州 DOI 数据源，加上共创客户点名的前 10 家保险公司中至少 5 家的
        CSV/API 数据
      - 上线建议性 MVP 看板、临期预警和审计轨迹导出
      - 在外联对话中验证 E&O/DOI 检查这一购买触发事件占比达到 30%以上
  - horizon: 12-24 个月
    items:
      - 达到 10-15 个付费 MGA 账户，年化营收约 $0.8-1.2M，向 $2.8M 的 SOM 迈进
      - 与一家共创客户在生产环境上线可选的人工审核签单权限冻结
      - 签下第一份代理管理系统集成合作协议
      - 把 WSIA/TMPAA 行业协会渠道打造成可重复、成本更低的获客管道来源
  - horizon: 24-36 个月
    items:
      - 在批发 E&S MGA 滩头市场内，达到研究测算的 $2.8M SOM（约 35 个账户）
      - 启动寿险与健康险分销合规试点，作为第一个相邻市场扩张
      - 把自己定位成其他 AMS 和签单平台都要对接的系统记录
risks:
  - risk: >-
      NIPR、各州 DOI 系统或个别保险公司限制、限速，或对产品所依赖的许可/委任数据源设置
      价格门槛。
    likelihood: Medium
    impact: High
    mitigation: >-
      先用 MGA 自有数据、代理人自我申报和人工上传保险公司 CSV 起步；等付费客户证明了需求，
      再谈直接的 API 接入。
  - risk: >-
      Vertafore/Sircon、SuranceBay 或 AgentSync 把同等的跨保险公司就绪视图，捆绑进它们与
      批发 MGA 现有的关系里。
    likelihood: Medium
    impact: High
    mitigation: >-
      专注服务被忽视的区域性批发 E&S 细分市场，把保险公司集成做得比服务更广平台的现有厂商
      更快，并借助现有厂商尚未重视的行业协会渠道关系。
  - risk: >-
      一次漏判会放行无证代理人签单，一次误判会拦住本该合规的代理人，两者都会给厂商带来
      法律或财务责任。
    likelihood: Medium
    impact: High
    mitigation: >-
      把产品定位成带完整来源时间戳的建议性基础设施；在误判率被证明足够低之前，任何签单
      权限冻结生效前都要求合规审核员人工签字确认。
  - risk: >-
      如果相邻市场扩张（寿险/健康险、系统记录）停滞不前，建模出的 SOM（第 3 年 $2.8M，
      约 35 个账户）本身太小，撑不起一个风险投资级的结果。
    likelihood: Medium
    impact: Medium
    mitigation: >-
      把批发 E&S MGA 滩头市场当作概念验证，明确把寿险/健康险和 AMS 集成扩张排进 24-36
      个月的里程碑，而不是假设它会自然发生。
  - risk: >-
      关于 Producerflow 实际业务进展和客户数量的证据只有单一来源（一篇 FinTech Global
      文章），意味着 why-now 的说服力可能比看上去更弱。
    likelihood: Low
    impact: Medium
    mitigation: >-
      通过 0-90 天实验路线图里的 10 场访谈做独立验证，而不是仅靠 Producerflow 的上线
      作为付费意愿的证明。
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2-3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    用 18 个月的资金跑道，养一名创始工程师、一名合规领域负责人和一名创始 AE；把 3 个
    共创客户试点转化为付费正式账户；对接 NIPR 和前 10 家保险公司的数据源；达到约 10-15
    个付费 MGA 账户，作为迈向 $21.6M SAM 的证明。
