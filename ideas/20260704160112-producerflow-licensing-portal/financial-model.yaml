scenarios:
  downside:
    description: Carrier-feed access takes longer, association channels produce fewer ready buyers, and accounts stay closer to the low end of the BP pricing range.
    y3RevenueK: 1580.0
    y3EbitdaK: -430.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 24 instead of 35.
    - Steady-state annual value stays near $75K instead of the base-case $82K-$88K range.
    - Gross margin exits around 70% because data normalization stays more services-heavy.
  base:
    description: Three design-partner pilots convert into a repeatable MGA motion, modest account expansion offsets churn, and implementation work standardizes enough to reach the BP gross-margin target by Q4Y3.
    y3RevenueK: 2225.0
    y3EbitdaK: 14.6
    cashLowPointK: 719.6
    keyAssumptionChanges:
    - 3 paying accounts by M12, 12 by Q4Y2, and 35 by Q4Y3.
    - Blended realized annual value per account rises from pilot-level pricing to roughly $82K-$88K as carrier/state coverage expands.
    - Gross margin reaches 75% by Q4Y3 as onboarding templates and carrier-feed reuse improve.
  upside:
    description: Carrier data arrives earlier than planned, WSIA/TMPAA channels produce more warm starts, and the company sells more full-production accounts before needing to add much extra overhead.
    y3RevenueK: 2810.0
    y3EbitdaK: 420.0
    cashLowPointK: 860.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 41 instead of 35.
    - Recurring annual value pushes toward roughly $90K as more carrier programs and CE/E&O tracking attach earlier.
    - Gross margin exits near 77% because integrations and compliance workflows reuse faster than planned.
sensitivity:
- variable: ARPU
  downsideCase: Accounts stay near the $75K lower end of the BP range.
  baseCase: Recurring value settles around $82K with modest expansion.
  upsideCase: Expansion into more carrier programs pushes recurring value toward $90K.
  y3RevenueImpactK: -223.0
  cashImpactK: -167.0
- variable: CAC
  downsideCase: Association-channel efficiency weakens and CAC drifts above $50K.
  baseCase: CAC stays near $38K because the buyer set is concentrated and founder-led selling persists.
  upsideCase: Reference customers and conferences keep CAC near $30K.
  y3RevenueImpactK: -110.0
  cashImpactK: -210.0
- variable: churn
  downsideCase: Monthly churn rises to 2.5% as some pilots fail to convert into sticky production use.
  baseCase: Monthly churn holds near 1.8% once compliance workflows embed.
  upsideCase: Monthly churn falls near 1.2% after audit-readiness workflows become operationally critical.
  y3RevenueImpactK: -160.0
  cashImpactK: -125.0
- variable: sales cycle
  downsideCase: Pilot-to-production conversion stretches from about 90 days to about 150 days.
  baseCase: Production conversion happens in roughly one quarter.
  upsideCase: Warm association intros and a live exam trigger compress conversion closer to 60 days.
  y3RevenueImpactK: -360.0
  cashImpactK: -250.0
- variable: gross margin
  downsideCase: Gross margin stalls near 70% because feed normalization remains bespoke.
  baseCase: Gross margin exits at 75% after carrier-feed and rules-pack reuse.
  upsideCase: Gross margin reaches 77% as implementations standardize faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: hiring pace
  downsideCase: The company pulls forward delivery hires before the paid-account curve is proven.
  baseCase: Hires stay gated to the account milestones in the BP sequencing.
  upsideCase: The customer-success hire can wait until late Y3 without hurting renewals.
  y3RevenueImpactK: 70.0
  cashImpactK: -190.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Trigger[E&O claim or DOI exam trigger] --> Pilot[Paid pilot]
      Pilot --> Accounts[Paying MGA accounts]
      Accounts --> Expansion[More carrier programs and states]
      Expansion --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue is driven by scaling from 3 paying design-partner accounts at Y1 exit to 35 MGAs by Q4Y3 while per-account value rises only modestly above the researched ~$80K ACV benchmark.
- checkName: Must go right
  finding: The plan needs carrier-feed access and 90-day pilot-to-production conversion to hold, because the Y2 funding milestone assumes 12 paying accounts without adding a large sales team.
- checkName: Model breaks if
  finding: If sales cycles push toward 150 days or gross margin stalls near 70%, the downside case drives Y3 EBITDA deeply negative and compresses the cash floor toward roughly $0.4M.
- checkName: Next-round proof
  finding: The next financing is justified by showing about 12 paying MGAs, 5+ usable carrier feeds, and one live AMS integration before the seed cash buffer starts to matter.
sanityChecks:
  ruleOf40: Y3 growth 259.2% + EBITDA margin 0.7% = 259.8%
  burnMultiple: Y2 burn multiple is about 1.0x using roughly $793.6K of EBITDA burn against about $768K of net new ARR.
  revenuePerFte: $247K Y3 on 9 ending FTE (benchmark $200-400K SaaS)
  flags:
  - The base case captures 35 of roughly 270 modeled SAM accounts by year 3, so it assumes unusually strong execution in a concentrated buyer pool.
  - The model keeps revenue strictly tied to customers and therefore excludes separate implementation-fee upside that the BP pricing model mentions.
  - CustomersEop includes paid pilots and production accounts in Y1, so recurring-only production logo count lags the headline customer count early on.
  - Carrier appointment-feed access remains the single biggest operating dependency; if it is gated, both margin and conversion timing deteriorate quickly.
  - Cash is modeled as EBITDA, so working-capital timing, prepaid implementations, or compliance-related capex could move real cash somewhat above or below the forecast.
