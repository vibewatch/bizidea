slug: producer-compliance-mesh
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-04] the model starts with the first full operating month after the business plan date.'
- id: A2
  name: Opening cash / seed raise
  value: $2.4M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-3.5M + BP runwayMonths 18] the base case picks a mid-range seed sized to cover the 18-month milestone plus a 6-month buffer.'
- id: A3
  name: Starting paying accounts
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] the company begins pre-revenue and must first win paid design-partner pilots.'
- id: A4
  name: Initial contract benchmark
  value: $60K-$80K annualized value per MGA account
  unit: USD/account/year
  source: '[BP investorMemo.firstCustomer.initialContract + BP operatingAssumptions + Research market.sam/som] the first paid contracts are anchored to the plan''s $60K+ validation threshold and the researched ~$80K ACV benchmark.'
- id: A5
  name: Customer ramp
  value: 3 paying accounts by M12, 12 by Q4Y2, 35 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] the model matches the plan''s three paid pilots, 10-15 paid accounts by year 2, and the researched 35-account beachhead SOM by year 3.'
- id: A6
  name: Revenue recognition convention
  value: Revenue equals period-end paying accounts times blended realized revenue per account for that period; the base case excludes separate one-time implementation-fee upside to keep revenue directly reconcilable to customers.
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + startup-finance heuristic] implementation fees exist in the plan, but the base case treats them as conservative upside rather than core revenue so the model stays customer-times-ARPU clean.'
- id: A7
  name: Realized revenue per account ramp
  value: Y1 pilot months run at roughly $5K-$6K per month per paid account; Y2 quarters at roughly $16K-$20.5K per account; Y3 quarters at roughly $20.5K-$22K per account.
  unit: USD/account/period
  source: '[BP pricing tiered per producer + BP expansionLevers + Research som ~$80K ACV] mature accounts move modestly above the $80K benchmark as more carrier programs and state coverage attach.'
- id: A8
  name: Gross margin ramp
  value: 50%-57% in Y1, 61%-69% in Y2, and 71%-75% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 75 + BP operations + Research supplier-power and adoption-friction notes] early margins are depressed by carrier-feed normalization and compliance onboarding before stabilizing at the BP target.'
- id: A9
  name: Hiring timeline
  value: M1 founder and founding engineer; M2 compliance lead; M5 founding AE; M10 second engineer; M18 second AE; M20 ops; M27 third engineer; M31 customer-success hire
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until paid-pilot proof exists, then adds GTM and delivery capacity in step with account count.'
- id: A10
  name: Founder loaded compensation
  value: $140K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] lean founder cash pay with payroll taxes and benefits.'
- id: A11
  name: Engineering loaded compensation
  value: $175K
  unit: USD/year
  source: '[BP team founding engineer + second data/integration engineer + startup-finance heuristic] data integration talent is critical, but the model assumes pre-seed pay below later-stage enterprise-software levels.'
- id: A12
  name: Compliance-domain loaded compensation
  value: $130K
  unit: USD/year
  source: '[BP team compliance domain lead + BP operations + startup-finance heuristic] reflects a specialist who maintains state-cluster rules and supports customer trust.'
- id: A13
  name: Sales / AE loaded compensation
  value: $150K
  unit: USD/year
  source: '[BP team founding AE / customer success hybrid + BP gtm.channels + startup-finance heuristic] includes travel and variable compensation for association-led enterprise selling.'
- id: A14
  name: Customer-success loaded compensation
  value: $125K
  unit: USD/year
  source: '[BP team AE/customer-success hybrid + startup-finance heuristic] a dedicated CS hire arrives only after the account base exceeds 20 logos.'
- id: A15
  name: G&A / ops loaded compensation
  value: $100K
  unit: USD/year
  source: '[BP fundingAsk use of funds summary + startup-finance heuristic] basic finance, vendor management, and internal ops stay intentionally light through seed stage.'
- id: A16
  name: Payroll allocation to P&L lines
  value: Founder 55% S&M / 20% R&D / 25% G&A; compliance 15% S&M / 60% R&D / 25% G&A; engineering 100% R&D; sales 100% S&M; customer success 70% S&M / 30% R&D; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] maps payroll into functional opex while reflecting founder-led selling and compliance-heavy product work.'
- id: A17
  name: Non-payroll opex ramp
  value: Monthly non-payroll spend grows from roughly $12.5K in early Y1 to roughly $36K by Q4Y3 across association travel, cloud/data costs, E&O insurance, legal, and audit-support tooling.
  unit: USD/month
  source: '[BP operations + BP gtm.channels + startup-finance heuristic] the model assumes a niche, high-touch enterprise motion without a large paid-demand engine.'
- id: A18
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial relative to the early-stage burn profile.'
- id: A19
  name: Steady-state monthly logo churn
  value: 1.8%
  unit: percent per month
  source: '[startup-finance heuristic for regulated workflow SaaS + BP expansionLevers] compliance workflows should be sticky once embedded, but the model still assumes early-stage churn above mature best-in-class SaaS.'
- id: A20
  name: Base sales cycle
  value: Roughly 90 days from paid pilot start to production conversion
  unit: days
  source: '[BP experimentRoadmap 3-6 months + BP investorMemo.mustBeTrue pilot converts within 90 days] the model assumes one quarter is enough to prove value for early MGA design partners.'
- id: A21
  name: Steady-state recurring ARPU for unit economics
  value: $82K
  unit: USD/account/year
  source: '[Research market.som ~$80K ACV + BP businessModel.expansionLevers] unit economics use a recurring ARPU only slightly above the benchmark because some accounts expand into more carrier programs and states.'
- id: A22
  name: CAC convention
  value: Total 36-month sales and marketing spend divided by 35 net new paid accounts
  unit: formula
  source: '[model calc using base-case S&M spend + BP funnelTargets + Research concentrated buyer set] CAC stays relatively contained because WSIA/TMPAA narrow the target universe and founder-led selling remains important.'
- id: A23
  name: Next-round milestone for funding sizing
  value: By roughly Q4Y2 the company should reach about 12 paying MGAs, prove 5+ usable carrier feeds, and land the first AMS integration; the raise includes six extra months of cash beyond that point.
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP product.twelveMonth] this is the proof package needed before a larger growth round.'
- id: A24
  name: Quarterly salary-roll convention
  value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than just quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team startTiming] this keeps the salary line fully consistent with the monthly hiring ramp.'
