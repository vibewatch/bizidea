      美国每一张财产险、寿险、健康险分销网络都需要代理人合规追踪，这让公司能从一个 MGA 细分市场，
      扩张成跨行业的合规系统记录，扩张空间很大。
topRisks:
  - name: 数据接入被卡
    description: >-
      产品依赖的许可和委任数据源，NIPR、各州 DOI 系统和各家保险公司都可能限制访问、限速，或收取
      高得离谱的费用。
    mitigation: >-
      先用 MGA 自有数据加代理人自我申报，配合人工上传保险公司 CSV，等付费客户证明了需求，再去谈
      直接的 API 接入。
  - name: 现有厂商捆绑竞争
    description: >-
      Vertafore/Sircon 这类成熟保险合规厂商，或代理管理系统厂商，都可能捆绑出同等的跨网络可见性，
      在分销上碾压一家独立创业公司。
    mitigation: >-
      专注服务被忽视的批发 MGA 细分市场，做一层不依赖特定保险公司的中立层，把保险公司/NIPR 直连
      做得比现有厂商更快——他们的路线图还得迁就自家平台的发版周期。
  - name: 合规责任风险
    description: >-
      一次漏判会放行无证代理人签单，一次误判会拦住本该合规的代理人——两种情况都会给软件厂商带来
      实实在在的法律和财务责任。
    mitigation: >-
      把产品定位成带完整时间戳溯源的建议性基础设施，任何自动签单权限冻结生效前，都要求合规审核员
      人工签字确认。
