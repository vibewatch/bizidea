    - 销售与客户成功团队人力
jobsToBeDone:
  - job: >-
      代理人的许可证或保险公司委任状态一旦发生变化，要让 MGA 合规负责人在这名代理人签单之前就知道，
      从而防住一次 E&O 理赔或 DOI 检查问题。
    currentAlternative: >-
      靠电子表格和定期 NIPR/Sircon 批量查询的人工流程
    successMetric: >-
      预警本该触发之后，不合规代理人签单的情况零发生
  - job: >-
      DOI 市场行为检查要求提供代理人合规历史时，要让合规负责人能拿出带时间戳的审计轨迹，从而无
      问题结案。
    currentAlternative: 现有软件或人工翻找文档重建记录
    successMetric: 审计轨迹申请一个工作日内交付
