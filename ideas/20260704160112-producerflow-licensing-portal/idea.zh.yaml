duplicateOf: null
problem: >-
  批发型 MGA 和代理网络靠遍布各州、成百上千的签约代理人分销保险，但代理人的执业许可和保险公司委任
  状态分散在互不相通的系统里：各州 DOI/NIPR 记录、每家保险公司自己的委任数据、再加上内部电子表格。
  合规人员只能靠邮件和表单手工核对这些信息，结果就是代理人许可证已过期、继续教育没跟上、或者委任
  已被保险公司终止，却仍在无人察觉的情况下继续签单。每一次疏漏，都会把 E&O 风险和 DOI 市场行为
  检查风险，压到 MGA 头上，而不是那名代理人身上。
targetUser:
  primary: >-
    批发型财产险/意外险 MGA 的合规与执业许可运营负责人，管理着跨多家保险公司委任、跨多个州的
    签约代理人
  secondary: >-
    代理网络的运营经理，代表保险公司为独立代理人办理入职和资质复核
  buyer: 批发型 MGA 或代理网络的合规/运营副总裁
startupThesis:
  nonObviousInsight: >-
    保险分销涉及多方——保险公司、MGA/批发商、代理机构、代理人——没有哪一方能看到合规全貌，但一旦
    无证或未获委任的代理人签下保单，责任最终会压向那个要为理赔买单的人。这种错位，恰恰催生了对中立、
    跨网络合规层的需求，而不是挂在某家公司自有平台上的一个功能。Producerflow 这次单一厂商的
    Partner Portal 上线，正好暴露了这个缺口，却没能替那些同时跨多个保险公司平台运作的 MGA 解决问题。
  beachhead: >-
    区域性批发财产险/意外险 MGA——签约独立代理机构 50 到 500 家、在 10 个以上的州经营超额与盈余线
    业务，目前靠电子表格和邮件往来追踪代理人执业许可与委任状态，数据来自定期从 NIPR/Sircon 批量
    查询导出的结果
  wedge: >-
    一张代理人合规网——汇总 NIPR 许可数据、保险公司委任数据和继续教育记录，为每位代理人生成实时
    就绪图谱，一旦代理人不合规，系统会自动升级预警，抢在他签单之前先冻结签单权限
  whyNowCatalyst: >-
    Producerflow 在 2026 年 7 月推出 Partner Portal，早早证明了保险公司和批发商愿意为逐州、实时的
    代理人就绪可见性付费；但这套可见性绑定在单一厂商平台上，给不依赖特定保险公司、能跑遍 MGA 所
    代表的每个保险公司项目的中立层留出了空间。
  ventureScalePath: >-
    先从一家批发 MGA 的代理人网络合规网切入，再成长为其他代理管理系统和签单平台都要对接的系统记录；
    从财产险/意外险扩展到寿险和健康险分销，从"执业许可与委任"扩展到代理人全生命周期合规——继续
    教育续期、E&O 保单追踪、合同委任自动化——覆盖整条美国分销链。
solution: >-
  这是一项云服务：接入 NIPR 和各州 DOI 的许可数据源，通过 API 或 CSV 上传接入保险公司委任数据，
  再叠加继续教育和 E&O 保单追踪，为每位代理人、每个州、每个保险公司项目生成一个实时合规状态。合规
  运营人员拿到的是一块统一看板，而不是一堆按保险公司拆分的电子表格；许可证到期或委任终止之前，
  系统会自动预警；每一次状态变化都会打上时间戳，形成经得起 DOI 市场行为检查的审计轨迹。产品还可以
  选配一道拦截工作流：先冻结代理人的签单权限，直到合规审核员人工核实并解除标记的问题——在客户建立
  信任之前，系统始终只提供建议，不擅自做主。
goToMarketSeed:
  firstCustomer: >-
    区域性超额与盈余线批发 MGA 的合规运营负责人，签约代理机构 50 到 500 家，已经在用代理管理系统，
    但跨保险公司的执业许可状态仍靠人工追踪
  buyingTrigger: >-
    近期发生一起 E&O 理赔或 DOI 市场行为检查问题，牵涉某代理人在某州无证、未获委任或许可证已过期
    的情况下仍签下了保单
  currentAlternative: >-
    靠电子表格、邮件提醒和定期对 NIPR 或 Sircon 做批量查询的人工流程
  switchingReason: >-
    这张合规网把被动的、按保险公司拆分的人工流程，换成覆盖 MGA 所代表每个保险公司项目的实时审计
    视图，直接压低促成这笔采购的 E&O 和 DOI 风险。
  pricingHypothesis: >-
    按代理人每月订阅收费，按追踪的在用保险公司委任数量分档计价，另收一笔 NIPR/保险公司数据接入的
    实施费
whyNow:
  - point: >-
      一家拿到融资的竞争对手刚上线了实时代理人就绪门户，证明批发商和保险公司现在就愿意为这种可见性
      付费。
    signalRefs: [跨网络可见性功能上线]
    sourceRefs: [1]
  - point: >-
      上线报道明确点名，靠邮件手工协调执业许可正是推高监管风险的病根，这不是一个假设性痛点。
    signalRefs: [手工协调难辞其咎]
    sourceRefs: [1]
  - point: >-
      代理人就绪度在全美 50 个州被拆成五种离散状态追踪，说明这个合规问题足够细碎，需要专门软件来管，
      而不是查一次就完事。
    signalRefs: [五态离散合规状态]
    sourceRefs: [1]
differentiator: >-
  Producerflow 的 Partner Portal 只是单一厂商平台上的一个功能，而这张合规网从设计上就不依赖特定
  保险公司或 MGA：批发 MGA 能在一个界面里看到自己所代表的每个保险公司项目的代理人就绪度，而不只是
  搭建门户的那一家。把产品定位成带完整审计轨迹的建议性基础设施，而不是一道说一不二的关卡，也比那些
  号称能直接自动拦截签单权限的工具更容易让客户接受。
conceptDiagram:
  title: 代理人合规网流程
  mermaid: |
    flowchart LR
      数据源[NIPR / 各州 DOI 数据] --> 合规网[合规网]
      委任数据[保险公司委任数据] --> 合规网
      继续教育[继续教育 / E&O 保单记录] --> 合规网
      合规网 --> 看板[合规运营看板]
      看板 --> 预警[实时预警]
      预警 --> 冻结[签单权限冻结]
      冻结 --> 审核[合规审核员核准]
      审核 --> 签单[代理人获准签单]
