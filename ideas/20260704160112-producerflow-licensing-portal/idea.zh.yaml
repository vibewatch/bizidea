    score: 4
    rationale: >-
      唯一来源虽单一但具体，显示一家拿到融资的竞争对手已经上线了同款可见性功能，证实了需求，只是
      证据可信度局限于一家媒体。
  painIntensity:
    score: 5
    rationale: >-
      该来源认定手工执业许可协调直接推高监管风险和 E&O 风险，是这个主题集群里赌注最高的痛点。
  wedgeClarity:
    score: 4
    rationale: >-
      滩头市场（区域性批发 MGA、50-500 家代理机构、E&S 业务）和首个工作流（跨保险公司项目的实时
