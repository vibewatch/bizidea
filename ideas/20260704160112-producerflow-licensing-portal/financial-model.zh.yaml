slug: producer-compliance-mesh
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[商业计划日期 2026-07-04] 模型从商业计划日期之后第一个完整运营月开始。'
- id: A2
  name: 期初现金/种子轮融资额
  value: $2.4M
  unit: USD
  source: '[商业计划 fundingAsk.targetFundingRangeUsd $2-3.5M + 跑道 18 个月] 基准情形选取种子轮
    区间中段的规模，用于覆盖 18 个月里程碑并留出 6 个月缓冲。'
- id: A3
  name: 起始付费账户数
  value: '0'
  unit: count
  source: '[商业计划 executiveSummary + 0-12 个月里程碑] 公司从零营收起步，必须先拿下付费的共创
    客户试点。'
- id: A4
  name: 首份合同基准值
  value: 每个 MGA 账户年化 $60K-$80K
  unit: USD/account/year
  source: '[商业计划 investorMemo.firstCustomer.initialContract + operatingAssumptions + 研究
    market.sam/som] 首批付费合同锚定商业计划中 $60K+ 的验证门槛，以及研究测得的约 $80K
    ACV 基准。'
- id: A5
  name: 客户增长节奏
  value: 第 12 个月达到 3 个付费账户，第 2 年第 4 季度达到 12 个，第 3 年第 4 季度达到 35 个
  unit: customersEop
  source: '[商业计划 0-12、12-24、24-36 个月里程碑 + 研究 market.som] 模型对应商业计划中的 3 个
    付费试点、第 2 年 10-15 个付费账户，以及研究测得的第 3 年 35 个账户的滩头 SOM。'
- id: A6
  name: 收入确认口径
  value: 收入等于期末付费账户数乘以该期每账户的加权已实现收入；基准情形不单独计入一次性实施费的
    上行空间，让收入始终能直接对应到客户数。
  unit: formula
  source: '[商业计划 gtm.pricing + businessModel.revenueStreams + 初创企业财务经验法则] 计划中确实
    存在实施费，但基准情形把它当作保守的上行空间而非核心收入，让模型保持"客户数 x ARPU"的清晰
    结构。'
- id: A7
  name: 单账户已实现收入爬升曲线
  value: 第 1 年试点月份大约每账户每月 $5K-$6K；第 2 年各季度大约每账户 $16K-$20.5K；
    第 3 年各季度大约每账户 $20.5K-$22K。
  unit: USD/account/period
  source: '[商业计划按代理人分档定价 + expansionLevers + 研究 som ~$80K ACV] 随着更多保险
    公司项目和州覆盖接入，成熟账户的价值会略高于 $80K 基准。'
- id: A8
  name: 毛利率爬升曲线
  value: 第 1 年 50%-57%，第 2 年 61%-69%，第 3 年 71%-75%
  unit: gross margin percent
  source: '[商业计划 businessModel.targetGrossMarginPct 75 + operations + 研究关于供应方议价能力
    与采用阻力的说明] 早期毛利率被保险公司数据规范化和合规入职工作压低，之后逐步稳定到商业计划的
    目标值。'
- id: A9
  name: 招聘时间线
  value: 第 1 个月创始人和创始工程师；第 2 个月合规负责人；第 5 个月创始 AE；第 10 个月第二名
    工程师；第 18 个月第二名 AE；第 20 个月运营；第 27 个月第三名工程师；第 31 个月客户成功岗
  unit: timeline
  source: '[商业计划 team + strategicChoices.sequencingRationale + 初创企业财务经验法则] 招聘在
    付费试点得到验证前保持精简，此后随账户数增长同步补充 GTM 和交付人力。'
- id: A10
  name: 创始人满载薪酬
  value: $140K
  unit: USD/year
  source: '[商业计划 team 创始人/CEO + 初创企业财务经验法则] 精简的创始人现金薪酬，含工资税和
    福利。'
- id: A11
  name: 工程满载薪酬
  value: $175K
  unit: USD/year
  source: '[商业计划 team 创始工程师 + 第二名数据/集成工程师 + 初创企业财务经验法则] 数据集成
    人才至关重要，但模型假设薪酬水平低于后期企业软件公司的标准。'
- id: A12
  name: 合规领域满载薪酬
  value: $130K
  unit: USD/year
  source: '[商业计划 team 合规领域负责人 + operations + 初创企业财务经验法则] 反映一名负责州群
    规则维护、支撑客户信任的专业人才薪酬水平。'
- id: A13
  name: 销售/AE 满载薪酬
  value: $150K
  unit: USD/year
  source: '[商业计划 team 创始 AE / 客户成功复合角色 + gtm.channels + 初创企业财务经验法则]
    包含差旅和面向行业协会渠道企业级销售的浮动薪酬。'
- id: A14
  name: 客户成功满载薪酬
  value: $125K
  unit: USD/year
  source: '[商业计划 team AE/客户成功复合角色 + 初创企业财务经验法则] 专职客户成功岗位要到
    账户数超过 20 家之后才会引入。'
- id: A15
  name: 行政/运营满载薪酬
  value: $100K
  unit: USD/year
  source: '[商业计划 fundingAsk 资金用途摘要 + 初创企业财务经验法则] 基础财务、供应商管理和内部
    运营，在种子阶段有意保持精简。'
- id: A16
  name: 薪酬分摊到损益表科目
  value: 创始人 55% 销售营销 / 20% 研发 / 25% 行政；合规岗 15% 销售营销 / 60% 研发 / 25% 行政；
    工程 100% 研发；销售 100% 销售营销；客户成功 70% 销售营销 / 30% 研发；运营 100% 行政
  unit: allocation
  source: '[商业计划 team 各岗位理由 + operations] 把薪酬映射进各项运营费用科目，同时反映创始人
    主导销售和合规重投入的产品工作特点。'
- id: A17
  name: 非薪酬运营费用爬升曲线
  value: 每月非薪酬支出从第 1 年早期约 $12.5K，增长到第 3 年第 4 季度约 $36K，涵盖
    行业协会差旅、云/数据成本、E&O 保险、法务和审计支持工具。
  unit: USD/month
  source: '[商业计划 operations + gtm.channels + 初创企业财务经验法则] 模型假设这是一种细分、
    高触达的企业级打法，而非依赖大规模付费获客引擎。'
- id: A18
  name: 现金变动口径
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[初创企业财务经验法则] 假设资本性支出、税费、融资费用和营运资金时点差异，相对早期
    烧钱水平而言可忽略不计。'
- id: A19
  name: 稳态月度客户流失率
  value: 1.8%
  unit: percent per month
  source: '[针对受监管工作流类 SaaS 的初创企业财务经验法则 + 商业计划 expansionLevers] 合规
    工作流一旦嵌入应当具备较强黏性，但模型仍假设早期流失率高于成熟一流 SaaS 水平。'
- id: A20
  name: 基准销售周期
  value: 从付费试点开始到转为正式付费大约 90 天
  unit: days
  source: '[商业计划 experimentRoadmap 3-6 个月 + investorMemo.mustBeTrue 试点 90 天内转化]
    模型假设一个季度足够让早期 MGA 共创客户看到价值。'
- id: A21
  name: 用于单位经济模型的稳态经常性 ARPU
  value: $82K
  unit: USD/account/year
  source: '[研究 market.som ~$80K ACV + businessModel.expansionLevers] 单位经济模型使用的
    经常性 ARPU 只略高于基准值，因为部分账户会扩展到更多保险公司项目和州。'
- id: A22
  name: CAC 口径
  value: 36 个月销售与营销支出总额除以 35 个净新增付费账户
  unit: formula
  source: '[基于基准情形销售营销支出 + funnelTargets + 研究中集中的买家群体的模型计算] 由于
    WSIA/TMPAA 缩小了目标范围，且创始人主导销售仍然重要，CAC 保持相对可控。'
- id: A23
  name: 用于融资规模测算的下一轮里程碑
  value: 大约到第 2 年第 4 季度，公司应达到约 12 家付费 MGA，验证 5 个以上可用的保险公司数据源，
    并落地第一个 AMS 集成；这轮融资在此基础上再多留 6 个月的现金缓冲。
  unit: milestone
  source: '[商业计划 fundingAsk.runwayMonths 18 + 12-24 个月里程碑 + product.twelveMonth]
    这是争取更大规模成长轮融资前需要拿出的证明包。'
- id: A24
  name: 季度薪酬滚算口径
  value: 第 2-3 年的薪酬行使用该季度内实际按月发生的招聘情况，而不只是季末快照
  unit: convention
  source: '[人员编制列口径 + 商业计划 team.startTiming] 让薪酬科目与逐月招聘节奏保持完全一致。'
