scenarios:
  downside:
    description: 保险公司数据接入耗时更久，行业协会渠道产出的合格买家更少，账户价值贴近商业计划
      定价区间的低端。
    y3RevenueK: 1580.0
    y3EbitdaK: -430.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
    - 第 3 年第 4 季度末付费账户数约为 24 个，而非 35 个。
    - 稳态年度价值维持在约 $75K，而非基准情形的 $82K-$88K 区间。
    - 由于数据规范化工作仍偏服务重型，毛利率收官在约 70%。
  base:
    description: 三个共创客户试点转化为可重复的 MGA 打法，适度的账户扩容抵消流失，实施工作
      标准化程度足以在第 3 年第 4 季度达到商业计划的毛利率目标。
    y3RevenueK: 2225.0
    y3EbitdaK: 14.6
    cashLowPointK: 719.6
    keyAssumptionChanges:
    - 第 12 个月 3 个付费账户，第 2 年第 4 季度 12 个，第 3 年第 4 季度 35 个。
    - 随着保险公司/州覆盖扩展，每账户加权已实现年度价值从试点级定价升至约 $82K-$88K。
    - 随着入职模板和保险公司数据源复用效率提升，毛利率在第 3 年第 4 季度达到 75%。
  upside:
    description: 保险公司数据到位时间早于计划，WSIA/TMPAA 渠道带来更多热启动线索，公司在不
      需要新增太多额外管理开销的情况下，卖出更多全面上线的正式付费账户。
    y3RevenueK: 2810.0
    y3EbitdaK: 420.0
    cashLowPointK: 860.0
    keyAssumptionChanges:
    - 第 3 年第 4 季度末付费账户数约为 41 个，而非 35 个。
    - 随着更多保险公司项目及继续教育/E&O 保单追踪更早接入，经常性年度价值向约 $90K 靠拢。
    - 由于集成和合规工作流复用速度快于计划，毛利率收官接近 77%。
sensitivity:
- variable: ARPU
  downsideCase: 账户价值贴近商业计划区间的低端 $75K。
  baseCase: 经常性价值稳定在约 $82K，伴随适度扩容。
  upsideCase: 扩展到更多保险公司项目，把经常性价值推向约 $90K。
  y3RevenueImpactK: -223.0
  cashImpactK: -167.0
- variable: CAC
  downsideCase: 行业协会渠道效率减弱，CAC 上漂至 $50K 以上。
  baseCase: 由于买家群体集中且创始人主导销售持续发力，CAC 维持在约 $38K。
  upsideCase: 参考客户和行业会议让 CAC 保持在约 $30K。
  y3RevenueImpactK: -110.0
  cashImpactK: -210.0
- variable: churn
  downsideCase: 部分试点未能转化为稳定的正式使用，月度流失率升至 2.5%。
  baseCase: 合规工作流一旦嵌入，月度流失率维持在约 1.8%。
  upsideCase: 审计就绪工作流成为运营关键环节后，月度流失率降至约 1.2%。
  y3RevenueImpactK: -160.0
  cashImpactK: -125.0
- variable: sales cycle
  downsideCase: 试点转正式付费的周期从约 90 天拉长到约 150 天。
  baseCase: 转化为正式付费大致发生在一个季度内。
  upsideCase: 行业协会的热情引荐加上真实的检查触发事件，把转化周期压缩到接近 60 天。
  y3RevenueImpactK: -360.0
  cashImpactK: -250.0
- variable: gross margin
  downsideCase: 由于数据源规范化工作仍需定制处理，毛利率停滞在约 70%。
  baseCase: 随着保险公司数据源和规则包复用，毛利率收官在 75%。
  upsideCase: 随着实施工作标准化速度加快，毛利率达到 77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: hiring pace
  downsideCase: 公司在付费账户曲线得到验证之前，提前招聘交付端人员。
  baseCase: 招聘节奏严格按照商业计划顺序，与账户里程碑挂钩。
  upsideCase: 客户成功岗位可以推迟到第 3 年末引入，不影响续约。
  y3RevenueImpactK: 70.0
  cashImpactK: -190.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      触发[E&O 理赔或 DOI 检查触发] --> 试点[付费试点]
      试点 --> 账户[付费 MGA 账户]
      账户 --> 扩张[更多保险公司项目和州]
      扩张 --> 营收[经常性收入]
      营收 --> 毛利[毛利润]
      毛利 --> 现金[现金与资金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入增长，靠的是从第 1 年末的 3 个付费共创客户账户，扩张到第 3 年第 4 季度
    的 35 家 MGA，而单账户价值只是略高于研究测得的约 $80K ACV 基准。
- checkName: 必须成立的前提
  finding: 计划需要保险公司数据接入到位、试点到正式付费 90 天转化周期成立，因为第 2 年的融资
    里程碑假设能在不新增大规模销售团队的情况下达到 12 个付费账户。
- checkName: 模型会在何种情况下崩溃
  finding: 如果销售周期拉长到 150 天左右，或毛利率停滞在约 70%，下行情形会让第 3 年 EBITDA
    深度转负，并把现金底线压缩到约 $0.4M 左右。
- checkName: 下一轮融资的证明
  finding: 下一轮融资的合理性，建立在能拿出约 12 家付费 MGA、5 个以上可用的保险公司数据源，
    以及一个已上线的 AMS 集成——要在种子轮现金缓冲开始吃紧之前做到这些。
sanityChecks:
  ruleOf40: 第 3 年增长率 259.2% + EBITDA 利润率 0.7% = 259.8%
  burnMultiple: 第 2 年烧钱倍数约为 1.0 倍，用约 $793.6K 的 EBITDA 烧钱额，对比约 $768K
    的净新增 ARR。
  revenuePerFte: 第 3 年人均营收 $247K，对应期末 9 名全职员工（对标 SaaS 行业 $200-400K
    的基准）
  flags:
  - 基准情形在第 3 年拿下约 270 个建模 SAM 账户中的 35 个，意味着在一个集中的买家群体里，
    假设了不寻常的强执行力。
  - 模型把收入严格与客户数挂钩，因此排除了商业计划定价模型中提到的独立实施费上行空间。
  - customersEop 在第 1 年同时包含付费试点和正式付费账户，因此早期纯经常性正式付费的客户数
    实际上落后于表面的客户总数。
  - 保险公司委任数据接入仍是单一最大的运营依赖项；一旦被卡住，毛利率和转化时点都会迅速恶化。
  - 现金按 EBITDA 建模，因此营运资金时点差异、预付实施款或合规相关的资本性支出，都可能让
    实际现金高于或低于预测值。
