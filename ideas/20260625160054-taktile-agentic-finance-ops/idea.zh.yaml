      了可触达机会，Taktile 向拉丁美洲和欧非中东的扩张也验证了全球需求。
topRisks:
  - name: 州监管审批风险
    description: >-
      部分州保险部门可能在 AI 裁定系统授权付款前要求预先审批或备案。
    mitigation: >-
      优先在 AI 裁定指引最宽松的 5–8 个州启动，将产品定位为「有人工最终授权的决策支持工具」，
      直至逐州审批路径全面梳理完毕。
  - name: 计算机视觉准确性风险
    description: >-
      AI 对损伤严重度的误分类可能导致系统性超付或少付，带来法律敞口并侵蚀承保公司信任。
    mitigation: >-
      对边界案例强制执行严格的置信度评分门控，要求强制人工升级；从最窄的结构化理赔类型（标准
      化照片模板下的风挡裂缝）起步，在进入更复杂损伤类别前最大化早期准确率。
  - name: 滩头市场过窄风险
    description: >-
      美国 P&C 保险科技市场在 5,000 万至 2 亿美元直写保费区间内有意义的目标客户不足 50 家，
      早期客户流失会带来客户集中度风险。
    mitigation: >-
      从第一天起就按照向区域传统承保公司（直写保费 2 亿至 20 亿美元）升级的清晰路径构建产品
      架构，并将保险科技部署作为公开参考案例，在 18 个月节点加速区域承保公司拓展。
