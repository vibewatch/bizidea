  - driver: 相关美国险种年度理赔量
    value: 39.4M claims/year
    source: "[11]"
  - driver: 符合条件的低赔付额/有照片证据占比
    value: 30% assumed
    source: "est."
  - driver: 每件合格理赔的建模软件支出
