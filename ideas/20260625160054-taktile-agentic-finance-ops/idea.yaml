problem: >-
  P&C insurtechs automate quote-to-bind in hours but route every incoming claim
  to a manual adjuster, leaving claims expense ratios 5–10 points higher than
  they need to be. Routine low-severity losses—cracked windshields, minor hail,
  FNOL submissions with clear photos—consume the same adjuster time as complex
  disputed claims. As insurtechs scale to tens of thousands of policies, the
  bottleneck compounds: each new policyholder adds claims volume that the same
  lean adjusting team must absorb without headcount budget.
targetUser:
  primary: VP of Claims or Head of Claims Operations at a US P&C insurtech carrier with $50M–$200M in direct written premium
  secondary: Chief Operating Officer at an insurtech carrier monitoring claims expense ratio as a key P&L metric
  buyer: VP of Claims or COO who owns the claims expense ratio budget line
startupThesis:
  nonObviousInsight: >-
    Insurtechs spent a decade automating underwriting while leaving claims manual,
    but Taktile's $90M efficiency number at a top insurer reveals that claims is
    now the bigger operations prize. The bottleneck has flipped—insurtechs are
    no longer constrained by policy acquisition but by claims-handling capacity,
    and the entire product category for insurtech-native agentic claims is still
    unbuilt.
  beachhead: >-
    US P&C insurtechs with $50M–$200M in gross written premium in personal
    property or small commercial lines, where routine losses under $5K represent
    60–70% of claim count but consume the same adjuster time as complex claims
  wedge: >-
    Auto-adjudication of structured, photo-evidenced property claims under $5K—
    FNOL intake, coverage eligibility check, computer-vision damage assessment,
    and payment authorization—with a full explainable audit trail for state
    insurance regulators
  whyNowCatalyst: >-
    Taktile's $110M Series C and its $90M claims-efficiency proof point at a top
    insurer make AI claims automation a credible, investable line item rather than
    an experimental IT project, shifting insurtechs from debating whether to
    automate claims to competing on how fast they can deploy.
  ventureScalePath: >-
    From insurtech personal-lines auto-adjudication wedge, expand to
    small-commercial and specialty lines, then move upstream to mid-market
    regional carriers ($200M–$2B GWP), and ultimately build a cross-carrier claims
    intelligence layer that prices risk using actual adjudication outcome data.
solution: >-
  An agentic claims adjudication platform that ingests FNOL submissions including
  photos, repair estimates, and policy data, runs automated coverage eligibility
  checks, applies computer-vision damage scoring, and issues payment authorizations
  for qualifying routine claims without adjuster involvement. Every decision is
  logged with the data inputs, model version, and plain-language rationale required
  by state insurance departments. Claims above the confidence threshold or dollar
  limit are escalated automatically to an adjuster with a pre-filled decision
  packet. The platform integrates with policy admin systems via a lightweight API
  middleware layer, avoiding rip-and-replace of Guidewire, Duck Creek, or
  insurtech-native core systems.
goToMarketSeed:
  firstCustomer: >-
    A US homeowners or renters insurtech with $50M–$150M in direct written
    premium, 3–8 in-house adjusters, and 400–1,500 monthly claims, where the COO
    tracks claims expense ratio weekly and is already losing to better-capitalized
    peers on speed-to-pay
  buyingTrigger: >-
    Claims expense ratio exceeds 25% of earned premium, or a reinsurance treaty
    renewal adds a claims-handling performance covenant that forces operational
    improvement within 12 months
  currentAlternative: >-
    Manual adjuster workflow in spreadsheets and email, or a Guidewire ClaimCenter
    configuration that costs $500K+ to implement and was designed for carriers ten
    times their size—effectively meaning no systematic automation exists
  switchingReason: >-
    Auto-adjudicates 60–70% of routine property claims without adjuster touch,
    cutting per-claim handling cost from $150–$250 to under $30, and delivers a
    state-regulator-ready explainable audit trail that manual workflows cannot
    produce
  pricingHypothesis: >-
    Per-claim fee of $8–$15 for each auto-adjudicated claim, plus a monthly
    platform fee of $3K–$8K for integration, dashboard, and adjuster escalation
    tooling
