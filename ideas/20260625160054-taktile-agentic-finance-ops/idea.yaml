topRisks:
  - name: State regulatory approval risk
    description: >-
      Some state insurance departments may require pre-approval or filing of AI
      adjudication systems before they can authorize payments.
    mitigation: >-
      Launch first in the 5–8 states with the most permissive AI adjudication
      guidance and position the product as a decision-support tool with human
      final authorization until full state-by-state approval pathways are mapped.
  - name: Computer vision accuracy risk
    description: >-
      AI misclassification of damage severity could cause systematic overpayment
      or underpayment, creating legal exposure and eroding carrier trust.
    mitigation: >-
      Enforce strict confidence-score gates with mandatory human escalation for
      borderline cases; start with the narrowest structured claim type (windshield
      cracks with standardized photo templates) to maximize early accuracy before
      expanding to more complex damage categories.
  - name: Thin beachhead market risk
    description: >-
      The US P&C insurtech market has fewer than 50 meaningful targets in the
      $50M–$200M GWP range, creating customer-concentration risk if early adopters
      churn.
    mitigation: >-
      Build the product architecture for a clear upgrade path to regional
      traditional carriers ($200M–$2B GWP) from day one, and use insurtech
      deployments as public reference cases to accelerate regional carrier
      outreach at the 18-month mark.
