scenarios:
  downside:
    description: >-
      仅推荐型工作流通过合规审查的时间更长，试点转化更慢，ARPU 停留在接近试点定价的水平，
      交付依然需要较多服务投入。
    y3RevenueK: 1680.0
    y3EbitdaK: -676.0
    cashLowPointK: 80.0
    keyAssumptionChanges:
      - Y1 末 1 个付费账户，Y2 末 4 个，Y3 末 9 个，而非 12 个。
      - 混合年 ARPU 从 23.5 万美元降至 22 万美元，原因是生产转换和使用量扩展滞后。
      - 毛利率从 70% 降至 67%，因为合规和实施工作仍更依赖人工。
  base:
    description: >-
      创始人主导的试点转化为可复制的窄理赔工作流，Y2 末 6 家在线承保公司，Y3 末 12 家，
      达到研究测算的混合 ARR 水平。
    y3RevenueK: 2330.4
    y3EbitdaK: -217.9
    cashLowPointK: 434.3
    keyAssumptionChanges:
      - 客户数遵循 A6、A7 和 A8，Y2 末 6 家，Y3 末 12 家。
      - 混合年 ARPU 维持在 23.5 万美元，毛利率维持在商业计划目标的 70%。
      - 团队维持 Y3 末 8 名全职员工，受监管的交付招募先于规模化 GTM 招募。
  upside:
    description: >-
      一个参考客户和合作伙伴转介绍加速向区域承保公司式部署的转化，既提升账户数又扩大已
      货币化使用量，且不触发大规模成本重置。
    y3RevenueK: 3050.0
    y3EbitdaK: 356.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - Y1 末 3 个付费账户，Y2 末 7 个，Y3 末 14 个——参考案例销售缩短了转化周期。
      - 混合年 ARPU 从 23.5 万美元升至 24.5 万美元，原因是生产使用量和高级报告模块更快附加。
      - 毛利率从 70% 提升至 72%，因为实施模式和州级管控模板的复用性更强。
sensitivity:
  - variable: ARPU
    downsideCase: 混合年 ARPU 停留在 22 万美元，因为客户在类似试点的范围内停留时间更长。
    baseCase: 混合年 ARPU 按建模值维持在 23.5 万美元。
    upsideCase: 使用量和报告模块更快附加，混合年 ARPU 达到 24.5 万美元。
    y3RevenueImpactK: -148.8
    cashImpactK: -104.2
  - variable: CAC
    downsideCase: 每家承保公司需要更多创始人时间、差旅和定制安全审查，有效 CAC 升至 11 万美元以上。
    baseCase: 建模 CAC 维持在每个新付费承保公司账户约 8.29 万美元。
    upsideCase: 参考案例引入和合作伙伴引入将 CAC 压至 7 万美元以下。
    y3RevenueImpactK: -117.0
    cashImpactK: -180.0
  - variable: 流失率
    downsideCase: 早期工作流未能扩展至第二个州或理赔类别，月流失率升至 2.0%。
    baseCase: 月流失率维持在 1.5%。
    upsideCase: 产品嵌入生产理赔运营后，月流失率降至 1.0%。
    y3RevenueImpactK: -95.0
    cashImpactK: -70.0
  - variable: 销售周期
    downsideCase: 合规审查拖延，试点转生产时间线从约 6–7 个月延长至 9–12 个月。
    baseCase: 试点按建模节奏转化。
    upsideCase: 一个实际案例研究将转化缩短约一个季度。
    y3RevenueImpactK: -280.0
    cashImpactK: -210.0
  - variable: 毛利率
    downsideCase: 人工异常处理和云推理成本居高，毛利率滑至 67%。
    baseCase: 毛利率维持在 70%。
    upsideCase: 模板和裁定策略跨承保公司复用，毛利率提升至 72%。
    y3RevenueImpactK: 0.0
    cashImpactK: -70.0
  - variable: 招聘节奏
    downsideCase: 公司提前两个季度招入解决方案和机器学习产能以解除交付瓶颈，导致收入跟上之前烧钱加速。
    baseCase: 招聘遵循 A19。
    upsideCase: 实施复用性强于预期，某个后期招募延迟至种子轮后，节省一笔支出。
    y3RevenueImpactK: 60.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionCarriers
      ProductionCarriers --> PlatformFees
      ProductionCarriers --> UsageFees
      PlatformFees --> Revenue
      UsageFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: >-
      基准情景收入来自 Y1 末 2 个付费账户扩展至 Y3 末 12 家在线承保公司，每家混合年 ARPU
      23.5 万美元。
  - checkName: 必须做对的事
    finding: >-
      前两个付费试点必须足够快地转化为生产参考案例，才能在不被迫走服务密集型交付模式的情况下
      支撑 Y2 末 6 家在线承保公司的目标。
  - checkName: 模型崩溃条件
    finding: >-
      若销售周期拉长、ARPU 滑向悲观情景，现金可能在下一轮融资前压缩至约 8 万美元。
  - checkName: 下轮融资证明
    finding: >-
      种子轮就绪性与 Y2 末 6 家在线承保公司、至少一次第二州或第二理赔类别扩展，以及合作伙伴
      协助的来源能力可补充创始人主导销售的证据挂钩。
sanityChecks:
  ruleOf40: "Y3 增长率 95% + EBITDA 利润率 -9% = 86%"
  burnMultiple: "Y2 烧钱倍数约 0.6x：58.37 万美元烧钱对应约 94 万美元净新增退出 ARR（Y2 末 6 家减 Y1 末 2 家，每家 23.5 万美元）。"
  revenuePerFte: "Y3 每名全职员工营收 29.1 万美元（垂直 SaaS 基准 20–40 万美元）"
  flags:
    - 研究测算的 SOM 仅约 280 万美元，因此下轮融资的故事仍依赖区域承保公司或相邻险种扩展，
      而非仅凭保险科技切口。
    - Y3 在基准情景中仍略为 EBITDA 负数，管理层必须在参考案例引入转化改善之前保持招聘纪律。
    - 模型假设受监管部署的额外开销下 70% 毛利率目标可实现；若人工审核或合规人力持续嵌入交付，
      回收期会迅速恶化。
