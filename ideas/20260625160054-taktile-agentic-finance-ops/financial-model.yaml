scenarios:
  downside:
    description: Recommendation-only workflows take longer to clear compliance review, so pilots convert slower, ARPU stays closer to pilot pricing, and delivery remains more service-heavy.
    y3RevenueK: 1680.0
    y3EbitdaK: -676.0
    cashLowPointK: 80.0
    keyAssumptionChanges:
      - Y1 exits with 1 paid account, Y2 with 4, and Y3 with 9 instead of 12.
      - Blended annual ARPU falls from $235K to $220K as production conversions and usage expansion lag.
      - Gross margin slips from 70% to 67% because compliance and implementation work remain more manual.
  base:
    description: Founder-led pilots convert into a repeatable narrow claims workflow, reaching 6 live carriers by Y2 exit and 12 by Y3 exit at the researched blended ARR level.
    y3RevenueK: 2330.4
    y3EbitdaK: -217.9
    cashLowPointK: 434.3
    keyAssumptionChanges:
      - Customer counts follow A6, A7, and A8, ending Y2 at 6 live carriers and Y3 at 12.
      - Blended annual ARPU stays at $235K while gross margin stays at the 70% business-plan target.
      - The team stays at 8 end-of-Y3 FTE, with regulated-delivery hires added before scale GTM hires.
  upside:
    description: One reference account and partner referrals accelerate conversion into regional-carrier style deployments, lifting both account count and monetized usage without a large cost reset.
    y3RevenueK: 3050.0
    y3EbitdaK: 356.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - Y1 exits with 3 paid accounts, Y2 with 7, and Y3 with 14 as reference selling shortens conversion cycles.
      - Blended annual ARPU rises from $235K to $245K as production usage and premium reporting attach faster.
      - Gross margin improves from 70% to 72% because implementation patterns and state-control templates become more reusable.
sensitivity:
  - variable: ARPU
    downsideCase: Blended annual ARPU settles at $220K because customers linger on pilot-like scopes longer.
    baseCase: Blended annual ARPU stays at $235K as modeled.
    upsideCase: Blended annual ARPU reaches $245K once usage and reporting modules attach faster.
    y3RevenueImpactK: -148.8
    cashImpactK: -104.2
  - variable: CAC
    downsideCase: Effective CAC rises above $110K as each carrier requires more founder time, travel, and custom security review.
    baseCase: Modeled CAC stays near $82.9K per new paid carrier account.
    upsideCase: Reference-led and partner-led sourcing pull CAC below $70K.
    y3RevenueImpactK: -117.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: Monthly churn rises to 2.0% if early workflows fail to expand into second states or claim classes.
    baseCase: Monthly churn stays at 1.5%.
    upsideCase: Monthly churn falls to 1.0% once the product is embedded in production claims operations.
    y3RevenueImpactK: -95.0
    cashImpactK: -70.0
  - variable: sales cycle
    downsideCase: Pilot-to-production timelines stretch from roughly 6-7 months to 9-12 months because compliance review drags.
    baseCase: Pilots convert on the modeled cadence.
    upsideCase: A live case study shortens conversion by about one quarter.
    y3RevenueImpactK: -280.0
    cashImpactK: -210.0
  - variable: gross margin
    downsideCase: Gross margin slips to 67% because manual exception handling and cloud inference stay elevated.
    baseCase: Gross margin stays at 70%.
    upsideCase: Gross margin improves to 72% as templates and adjudication policies are reused across carriers.
    y3RevenueImpactK: 0.0
    cashImpactK: -70.0
  - variable: hiring pace
    downsideCase: The company hires solutions and ML capacity two quarters early to unblock delivery, increasing burn before revenue catches up.
    baseCase: Hiring follows A19.
    upsideCase: One later-stage hire is deferred until post-seed because implementation reuse proves stronger than expected.
    y3RevenueImpactK: 60.0
    cashImpactK: -180.0
modelDiagram:
  title: Unit economics flow
  mermaid: |
    flowchart LR
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionCarriers
      ProductionCarriers --> PlatformFees
      ProductionCarriers --> UsageFees
      PlatformFees --> Revenue
      UsageFees --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from scaling from 2 paid accounts at Y1 exit to 12 live carriers at $235K blended annual ARPU by Y3 exit.
  - checkName: Must go right
    finding: The first two paid pilots must convert into production references quickly enough to support 6 live carriers by Y2 exit without forcing a services-heavy delivery model.
  - checkName: Model breaks if
    finding: If sales cycles lengthen and ARPU falls toward the downside case, cash can compress toward roughly $80K before the next round.
  - checkName: Next-round proof
    finding: Seed readiness is tied to exiting Y2 with 6 live carriers, one second-state or second-claim-class expansion, and evidence that partner-assisted sourcing can supplement founder-led sales.
sanityChecks:
  ruleOf40: "Y3 growth 95% + EBITDA margin -9% = 86%"
  burnMultiple: "Y2 burn multiple about 0.6x: $583.7K burn on roughly $940K of net-new exit ARR (6 live carriers less 2 at Y1 exit, each at $235K)."
  revenuePerFte: "$291K Y3 ($200–400K vertical SaaS benchmark)"
  flags:
    - The researched SOM is only about $2.8M, so the next-round story still depends on regional-carrier or adjacent-line expansion rather than the insurtech wedge alone.
    - Y3 remains slightly EBITDA-negative in the base case, so management must hold hiring discipline until reference-led conversion improves.
    - The model assumes the 70% gross-margin target is achievable despite regulated deployment overhead; if human review or compliance labor stays embedded in delivery, payback worsens quickly.
