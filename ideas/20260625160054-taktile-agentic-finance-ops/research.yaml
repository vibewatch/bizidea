        - 35
  adoptionFrictionMatrix:
    - friction: Automated payment authority versus recommendation-only workflows
      severity: high
      affectedBuyer: Head of Claims / Compliance
      mitigation: Launch with human approval on final payment decisions, full audit logs, and documented rule-plus-model
        rationale for every recommendation.
      sourceRefs:
        - 5
        - 6
        - 7
    - friction: Integration into existing claim, policy, payment, and vendor systems
      severity: high
      affectedBuyer: CIO / Claims Operations
      mitigation: Use API-first connectors and standards-driven payloads, then start with one line and one document set 
        before broad rollout.
      sourceRefs:
        - 15
        - 16
        - 27
        - 29
    - friction: Low STP baseline because claims data is unstructured and heterogeneous
      severity: high
      affectedBuyer: Claims transformation lead
      mitigation: Start with photo-evidenced, low-dollar claims where document types are narrow and confidence gating 
        can escalate exceptions early.
      sourceRefs:
        - 21
        - 26
        - 33
    - friction: Adjuster trust and change management
      severity: medium
      affectedBuyer: Claims managers and frontline adjusters
      mitigation: Surface reasoned recommendations, dashboards, and override loops so AI acts as controlled decision 
        support rather than a black box.
      sourceRefs:
        - 18
        - 24
        - 27
        - 36
market:
  tam:
    value: "$141.8M"
    rationale: >-
      39.4M annual U.S. claims across homeowners, personal auto, commercial property, and commercial auto × 30% estimated
      low-severity/photo-evidenced eligibility × $12 estimated software spend per eligible claim = about $141.8M.
    isEstimate: true
    sourceRefs:
      - 9
      - 11
  sam:
    value: "$28.4M"
    rationale: >-
      Apply a 20% reachable-share constraint for API-friendly digital carriers and adjacent smaller regional adopters that
      can buy an overlay before a full core replacement: about $141.8M × 20% = $28.4M.
    isEstimate: true
    sourceRefs:
      - 11
      - 15
      - 16
      - 29
  som:
    value: "$2.8M"
    rationale: >-
      A realistic year-3 target is roughly 12 live carriers at about $235K blended ARR each from usage plus a modest platform
      fee, enabled by fast-pilot, API-first deployments.
    isEstimate: true
    sourceRefs:
      - 2
      - 27
      - 29
