slug: workflow-rl-sandbox
date: '2026-04-28'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: 种子轮交割后的期初现金
    value: '2400'
    unit: usdK
    source: '[BP fundingAsk targetFundingRangeUsd $2–4M]；基础情景使用 $2.4M，以达到证明里程碑并保留 6-month 缓冲。'
  - id: A2
    name: 模型中的客户单位
    value: 在管的付费工作流环境
    unit: definition
    source: '[BP businessModel.unitOfValue] 在管的工作流环境'
  - id: A3
    name: 每个工作流环境的基础年化 ARPU
    value: '150.0'
    unit: usdK/year
    source: '[BP firstCustomer initialContract + production spend, Research market.sam] 生产工作流按约 $150K ARR 建模。'
  - id: A4
    name: 收入爬坡
    value: M5 出现第一个付费工作流，M8 出现第二个，到 Q4Y2 达到 14 个工作流，Q4Y3 达到 40 个
    unit: count
    source: '[BP milestones, BP gtm funnelTargets, Startup heuristic] 在创始人主导的保守企业销售爬坡下，只有在信任被证明后才出现扩张。'
  - id: A5
    name: 毛利率
    value: '72.0'
    unit: pct
    source: '[BP businessModel.targetGrossMarginPct 70] 模型使用 72%，以反映软件收入占比以及连接器复用后的有限使用量上行。'
  - id: A6
    name: 月度流失率
    value: '1.8'
    unit: pct
    source: '[Startup heuristic] 以工作流为单位销售的早期企业基础设施 logo 流失低，但工作流替换/流失风险中等。'
  - id: A7
    name: 平均客户生命周期
    value: '55.6'
    unit: months
    source: '[Calc from A6] 1 / monthly churn'
  - id: A8
    name: 每个工作流环境的 CAC
    value: '60.0'
    unit: usdK
    source: '[Startup heuristic] 表示到 Y3 每个保留 logo 平均约 1.7 个工作流，对应约 ~$100K CAC per logo。'
  - id: A9
    name: 企业销售周期
    value: '6'
    unit: months
    source: '[BP product.sixMonth, BP riskHeatmap security review, Startup heuristic] 综合了试点范围界定、安全审查和生产转化。'
  - id: A10
    name: 来自商业计划的初始招聘
    value: M0 配置 Founding Eng、Applied RL 和 CEO；M3 增加 Product/Solutions；M6 增加 Security/Platform
    unit: timing
    source: '[BP team]'
  - id: A11
    name: 证明之后的招聘节奏
    value: Q1Y2 招首个 GTM，Q4Y2 招首个 G&A；只有在完成生产转化后才继续增加工程与 GTM 招聘
    unit: timing
    source: '[BP milestones + Startup heuristic] 在收入证明出现之前，招聘受到严格约束，以保持 seed-stage 的 burn discipline。'
  - id: A12
    name: 各岗位 fully loaded 年度薪酬
    value: CEO 144K；Founding Eng 204K；Applied RL 216K；Platform Eng 198K；Product/Solutions 180K；Security/Platform 210K；Sales/GTM 168K；G&A/Admin 132K
    unit: usdK/year
    source: '[Startup heuristic] 包含约 20% 的 payroll tax 和 benefits，适用于 seed-stage 美国现金薪酬。'
  - id: A13
    name: 非薪酬运营支出爬坡
    value: 从 Q1Y1 的约 20K/month 增长到 Q4Y3 的约 123K/month，覆盖云工具、差旅、安全、法务和 GTM 系统
    unit: usdK/month
    source: '[Startup heuristic] 以支撑企业试点为目标建模，但不假设在 PMF 之前进行重营销投入。'
  - id: A14
    name: 现金转换方法
    value: EBITDA 近似代表现金消耗
    unit: policy
    source: '[Startup heuristic] 模型假设不存在债务、capex，也不显式建模递延收入或营运资本变化。'
  - id: A15
    name: 下一轮融资的证明里程碑
    value: 到 Q2Y3 达到 24 个付费工作流环境，离线到线上误差低于 15 points，并出现明确的第二工作流扩张
    unit: milestone
    source: '[BP milestones, BP strategyMap.killCriteria]'
  - id: A16
    name: 资金用途结构
    value: 工程 45%；GTM 25%；G&A 15%；缓冲 15%
    unit: pct
    source: '[Startup heuristic] 与一家在大规模销售前以集成为主的 AI 基础设施公司相符。'
