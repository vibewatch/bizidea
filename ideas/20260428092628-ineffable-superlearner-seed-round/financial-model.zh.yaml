scenarios:
  downside:
    description: 安全审查和买方教育把销售周期拉长到 9 个月，导致转化和第二流程扩张都被推迟。
    y3RevenueK: 2850
    y3EbitdaK: -620
    cashLowPointK: -190
    keyAssumptionChanges:
      - 新流程的新增节奏相比基准情景大约后移 2 个季度
      - 毛利率因支持和云成本更重而从 72% 压缩到 68%
      - 到 Q2Y3 前招聘节奏不变，因此 burn 无法够快地下调
  base:
    description: 2 个付费共创客户转成被信任的发布闸门动作，而扩张贡献了 Y3 的大部分增长。
    y3RevenueK: 4200
    y3EbitdaK: 249
    cashLowPointK: 340.5
    keyAssumptionChanges:
      - 基准情景采用每个流程环境 $150K 的年 ARPU
      - 模型里的“客户”按付费流程环境计，而不是按 logo 计
      - 一旦离线闸门真正影响发布决策，扩张速度就会加快
  upside:
    description: 模拟器保真度更早得到证实，因此转化更快，留存账户里的第二流程扩张也更多。
    y3RevenueK: 5000
    y3EbitdaK: 520
    cashLowPointK: 520
    keyAssumptionChanges:
      - 付费试点到生产的转化速度快于基准情景
      - 留存账户到 Y3 拿下更多多流程采用
      - 连接器复用和用量结构改进，把毛利率抬升到 74%
sensitivity:
  - variable: ARPU
    downsideCase: 每个流程年收入 $135K
    baseCase: 每个流程年收入 $150K
    upsideCase: 每个流程年收入 $165K
    y3RevenueImpactK: -420
    cashImpactK: -302
  - variable: CAC
    downsideCase: 每个流程环境 CAC 为 $80K
    baseCase: 每个流程环境 CAC 为 $60K
    upsideCase: 每个流程环境 CAC 为 $45K
    y3RevenueImpactK: 0
    cashImpactK: -240
  - variable: churn
    downsideCase: 流程月流失率 2.5%
    baseCase: 1.8% monthly workflow churn
    upsideCase: 流程月流失率 1.2%
    y3RevenueImpactK: -300
    cashImpactK: -225
  - variable: sales cycle
    downsideCase: 从试点开始到转生产需要 9 个月
    baseCase: 6 months
    upsideCase: 4 months
    y3RevenueImpactK: -900
    cashImpactK: -430
  - variable: gross margin
    downsideCase: 因支持和云负担更高而降至 68%
    baseCase: 72%
    upsideCase: 75%
    y3RevenueImpactK: 0
    cashImpactK: -168
  - variable: hiring pace
    downsideCase: GTM 和平台招聘比证实阶段提前 2 个季度落地
    baseCase: 招聘跟随转生产证实里程碑推进
    upsideCase: 非核心招聘延后 1 个季度，且不影响交付
    y3RevenueImpactK: 0
    cashImpactK: -220
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Logs[工作流日志加 API] --> Sandbox[Workflow RL Sandbox]
      Sandbox --> Episodes[模拟 episodes]
      Sandbox --> Gate[离线发布闸门]
      Gate --> Customers[付费工作流环境]
      Customers --> Revenue[订阅加用量收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入，来自 Y1 的 2 个付费流程环境增长到 Q4Y3 的 40 个，年 ARPU 约为 $150K，而大部分增长由建立信任后的多流程扩张驱动。
  - checkName: 必须做对的事
    finding: 离线闸门必须真的改变生产发布决策，由于这正是基准和乐观情景里，驱动转生产与第二流程扩张的关键证实。
  - checkName: 模型会失效的条件
    finding: 如果销售周期拖向 9 个月，或者毛利率跌破 68%，下行情景会在公司达到 Y3 自我造血前就把现金打成负值。
  - checkName: 下一轮证实
    finding: 到 Q2Y3 拿下 24 个付费流程环境，并把离线对线上误差压到 15 个百分点以内，就能为 Series A 准备出一套围绕“可信训练基础设施”的证据包。
sanityChecks:
  ruleOf40: Y3 growth 220% + EBITDA margin 6% = 226%
  burnMultiple: >-
    Y2 burn multiple 0.50x = $0.90M net burn / $1.80M net new ARR; Y3 turns EBITDA positive on the same
    headcount base.
  revenuePerFte: $329K Y3 using 12.75 average quarter-end FTE (benchmark $200–400K SaaS)
  flags:
    - 模型把“客户”定义成付费流程环境而不是 logo，因此收入才能在多流程扩张下与 ARPU 干净对齐。
    - 现金是依据 EBITDA 和期初融资近似推导，年预付、递延收入和营运资本波动都没有显式建模。
    - 模型默认现有厂商不会在公司取得“可信发布闸门”地位前，就打包出一套可比的中立训练闭环。
