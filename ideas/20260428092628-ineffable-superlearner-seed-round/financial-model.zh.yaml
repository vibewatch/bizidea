    baseCase: 招聘跟随生产证明里程碑
    upsideCase: 非核心岗位在不影响交付的前提下延后 1 个 quarter
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Logs[工作流日志与 API] --> Sandbox[Workflow RL Sandbox]
      Sandbox --> Episodes[模拟回合]
      Sandbox --> Gate[离线发布闸门]
      Gate --> Customers[付费工作流环境]
      Customers --> Revenue[订阅与用量收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金 runway]
modelSanity:
  - checkName: Revenue engine
    finding: 基础情景收入由 Y1 的 2 个付费工作流环境增长到 Q4Y3 的 40 个驱动，单个环境 ARPU 约为 $150K，而大部分增长来自在建立信任之后的多工作流扩张。
  - checkName: Must go right
    finding: 离线闸门必须真正改变真实发布决策，因为这项证明是基础和上行情景中解锁生产转化和第二工作流扩张的关键。
  - checkName: Model breaks if
    finding: 如果销售周期向 9 months 漂移，或毛利率跌破 68%，则 downside 情景会在模型到达 Y3 自我供血之前转为现金为负。
  - checkName: Next-round proof
    finding: 到 Q2Y3 达到 24 个付费工作流环境，并把离线到线上误差控制在 15 points 以内，将构成围绕可信训练基础设施发起 Series A 的证据包。
sanityChecks:
  ruleOf40: Y3 growth 220% + EBITDA margin 6% = 226%
  burnMultiple: Y2 burn multiple 为 0.50x = $0.90M 净消耗 / $1.80M 净新增 ARR；在同一 headcount 基础上，Y3 转为 EBITDA 为正。
  revenuePerFte: 使用 12.75 的平均 quarter-end FTE 计算，Y3 为 $329K（SaaS benchmark 为 $200–400K）
  flags:
    - 客户按付费工作流环境而不是按 logo 建模，因此在多工作流扩张下，收入仍能与 ARPU 清晰对齐。
    - 现金由 EBITDA 和期初融资近似推导；annual prepayments、deferred revenue 和 working-capital 波动未被显式建模。
    - 模型假设既有巨头不会在公司建立可信发布闸门地位之前，捆绑提供可比的中立训练闭环。