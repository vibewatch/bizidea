scenarios:
  downside:
    description: 安全审查和买方教育将销售周期拉长到 9 months，从而推迟转化和第二工作流扩张。
    y3RevenueK: 2850.0
    y3EbitdaK: -620.0
    cashLowPointK: -190.0
    keyAssumptionChanges:
      - 新工作流加入时间相较基础情景整体后移约 2 个 quarters
      - 由于支持和云成本更重，毛利率从 72% 压缩到 68%
      - 到 Q2Y3 之前的招聘保持不变，因此 burn 无法足够快地下调
  base:
    description: 2 个付费设计伙伴转化为可信的发布闸门动作，而扩张驱动了 Y3 的大部分增长。
    y3RevenueK: 4200.0
    y3EbitdaK: 249.0
    cashLowPointK: 340.5
    keyAssumptionChanges:
      - 基础情景按每个工作流环境 $150K annual ARPU 建模
      - 客户按付费工作流环境而非按 logo 建模
      - 一旦离线闸门影响到真实发布决策，扩张就会加速
  upside:
    description: 模拟器保真度更早得到验证，从而带来更快的转化，以及保留账户内更多第二工作流扩张。
    y3RevenueK: 5000.0
    y3EbitdaK: 520.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - paid pilot 到 production 的转化速度快于基础情景
      - 保留账户到 Y3 实现更高的多工作流采用度
      - 由于连接器复用更好、使用量结构更优，毛利率提升到 74%
