slug: workflow-rl-sandbox
date: 2026-04-28
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 种子轮交割后之期初现金
    value: "2400"
    unit: usdK
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M]; 基准情景采用 $2.4M，以覆盖达到证实里程碑所需资金并保留 6 个月缓冲"
  - id: A2
    name: 模型中的客户单位
    value: paid workflow environment under management
    unit: definition
    source: "[BP businessModel.unitOfValue] Workflow environment under management"
  - id: A3
    name: 每个流程环境的基础年 ARPU
    value: "150.0"
    unit: usdK/year
    source: "[BP firstCustomer initialContract + production spend, Research market.sam] 生产流程按约 $150K ARR 建模"
  - id: A4
    name: 收入爬坡
    value: M5 出现首个付费流程，M8 出现第二个，Q4Y2 达到 14 个流程，Q4Y3 达到 40 个
    unit: count
    source: "[BP milestones, BP gtm funnelTargets, Startup heuristic] 在信任被证实后再扩张的保守型创始人主导企业销售爬坡"
  - id: A5
    name: 毛利率
    value: "72.0"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct 70] 模型采用 72%，反映软件收入占比更高，以及连接器复用后用量收入的边际改进"
  - id: A6
    name: 月度流失率
    value: "1.8"
    unit: pct
    source: "[Startup heuristic] 前期按流程售卖的企业基础设施通常 logo 流失较低，不过流程被替换或停用的风险中等"
  - id: A7
    name: 平均客户生命周期
    value: "55.6"
    unit: months
    source: "[Calc from A6] 1 / monthly churn"
  - id: A8
    name: 每个流程环境的 CAC
    value: "60.0"
    unit: usdK
    source: "[Startup heuristic] 隐含到 Y3 每个留存 logo 约 1.7 个流程时，单 logo CAC 约为 ~$100K"
  - id: A9
    name: 企业销售周期
    value: "6"
    unit: months
    source: "[BP product.sixMonth, BP riskHeatmap security review, Startup heuristic] 包含试点范围界定、安全审查和转生产所需时间"
  - id: A10
    name: 业务计划中的初始招聘
    value: Month 0 配置 Founding Eng、Applied RL 和 CEO；Month 3 加入 Product/Solutions；Month 6 加入 Security/Platform
    unit: timing
    source: "[BP team]"
  - id: A11
    name: 证实阶段后的招聘节奏
    value: 首个 GTM 招聘在 Q1Y2，首个 G&A 招聘在 Q4Y2，额外工程和 GTM 招聘只在转生产后发生
    unit: timing
    source: "[BP milestones + Startup heuristic] 招聘以收入证实为门槛，保持种子阶段烧钱纪律"
  - id: A12
    name: 各角色的 fully loaded 年化薪酬
    value: >-
      CEO 144K；Founding Eng 204K；Applied RL 216K；Platform Eng 198K；Product/Solutions 180K；Security/Platform
      210K；Sales/GTM 168K；G&A/Admin 132K
    unit: usdK/year
    source: "[Startup heuristic] 含约 20% 的工资税和福利，按美国种子阶段现金薪酬估算"
  - id: A13
    name: 非薪资运营开支爬坡
    value: 从 Y1 Q1 约 20K/月，增至 Y3 Q4 约 123K/月，覆盖云工具、差旅、安全、法务和 GTM 系统
    unit: usdK/month
    source: "[Startup heuristic] 以撑起企业试点为目标，不过在 PMF 前不假设重营销投入"
  - id: A14
    name: 现金转换方法
    value: EBITDA approximates cash burn
    unit: policy
    source: "[Startup heuristic] 模型假设无债务、无 capex，且不显式建模递延收入或营运资本积累"
  - id: A15
    name: 下一轮融资的证实里程碑
    value: 到 Q2Y3 拿下 24 个付费流程环境，离线对线上误差低于 15 个百分点，并出现明确的第二流程扩张
    unit: milestone
    source: "[BP milestones, BP strategyMap.killCriteria]"
  - id: A16
    name: 资金用途结构
    value: Engineering 45%; GTM 25%; G&A 15%; Buffer 15%
    unit: pct
    source: "[Startup heuristic] 与集成负担较重的 AI 基础设施公司在广泛放大销售前的资金结构一致"
