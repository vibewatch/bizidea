  wedgeClarity:
    score: 5
    rationale: 将狭窄的支持工作流转化为 RL 模拟器和奖励闭环，是一个具体且首个客户清晰的产品切入口。
  defensibility:
    score: 4
    rationale: 防御力可以通过嵌入客户运营中的专有工作流环境、奖励数据和性能基准逐步积累。
