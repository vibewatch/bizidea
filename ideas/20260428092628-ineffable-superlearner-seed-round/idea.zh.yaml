topRisks:
  - name: 环境保真度风险
    description: 模拟工作流可能遗漏重要边缘案例，导致训练出的策略在线上表现不佳。
    mitigation: 从边界清晰的工作流开始，使用历史日志进行离线 replay，并要求在启用真实自治之前先完成 shadow-mode 验证。
  - name: 买方教育风险
    description: 许多产品团队理解提示词微调，但尚未为 RL 风格基础设施编制预算。
    mitigation: 先将产品销售为降低 QA 成本和提高 rollout 安全性的基础设施，把强化学习作为底层机制而非宣传主轴。
  - name: 平台依赖风险
    description: 主要模型或帮助台厂商可能会加入原生训练闭环功能，从而挤压独立工具空间。
    mitigation: 保持跨模型与跨平台能力，专注于工作流环境生成，并构建既有巨头不太可能跨竞争栈支持的连接器和基准。