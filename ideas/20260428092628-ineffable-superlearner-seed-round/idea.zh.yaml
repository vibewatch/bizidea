  buyingTrigger: 自主工单处理功能上线或扩容后，QA 成本飙升，或者由于结果不稳定导致管理层暂停 rollout
  currentAlternative: prompt engineering、基于人工复核工单的监督微调、内部回放脚本和人工 QA
  switchingReason: 这套平台能让团队直接利用自己的交互数据去拉升动作型智能体，减少标注开支，并在把失败暴露给终端客户前先把策略变更测清楚
  pricingHypothesis: 按流程环境收取年度平台费，再对模拟 episode 和线上监控动作按量计费
