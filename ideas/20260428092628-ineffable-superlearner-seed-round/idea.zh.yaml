differentiator: >-
  绝大多数智能体工具只做到编排、prompt 管理或线上监控。Workflow RL Sandbox
  往下多走了一层，去把企业系统本身变成带显式奖励、可安全离线评估的可训练环境——而这恰恰才是基于经验学习真正需要的东西。它的防御力来自专有的环境连接器、按流程沉淀的基准，以及关于每类任务里什么策略能跑通的结果数据。
