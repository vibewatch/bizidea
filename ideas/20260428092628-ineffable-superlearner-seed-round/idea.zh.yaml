problem: >-
  客服软件厂商真正想要的不是只会起草回复的智能体，而是能把真实工单结掉、把动作执行下去的智能体；但靠人工审核过的轨迹来做监督微调，既贵、涉及隐私，又往往几周就过时。它们的产品每天都在退款、改地址和订单处理里产生大量结果数据，可团队缺的，是一套安全机制，能把这些日志转成可训练的环境、奖励函数和离线发布闸门。结果就是，大多数团队仍困在
  prompt 微调、人工 QA 和脆弱规则堆栈里，离真正的持续改进还差得很远。
targetUser:
  primary: 面向电商与订阅品牌交付自主处理能力的 Series B+ 客服 SaaS 厂商中，负责 AI 或 AI 平台的负责人
  secondary: 在 BPO 平台内搭建内部客服智能体的应用机器学习负责人
  buyer: 客服软件厂商里负责 AI 自动化的 VP Product 或业务总经理
startupThesis:
  nonObviousInsight: 人工数据依赖较低的强化学习，第一批真正可商业化的市场并不在前沿实验室，而在那些流程封闭、成功信号清晰、又拥有数百万真实交互的数据型软件公司里；这些交互本身就能变成可再生训练燃料。
  beachhead: 已通过稳定 API 自动化高频、低歧义动作的客服平台，例如退款审批、订单状态变更和地址更新
  wedge: 一套“经验转环境”的平台，把生产日志和 API schema 自动转换成适合 RL 的模拟器、奖励模型和离线评估闸门
  whyNowCatalyst: Ineffable 的融资以及“无需人类数据也能学习”的明确论点，让经验原生训练突然有了可信度；与此同时，产品团队也迫切需要更便宜、更安全的方式来改进智能体。
  ventureScalePath: 先从客服流程切入，再把同一套环境生成与奖励推断栈扩展到金融运营、IT 服务台、采购情境，最终成为企业动作型智能体的泛用训练底座。
solution: >-
  Workflow RL Sandbox 接入帮台日志、策略文档和动作 API，然后自动为某个狭窄流程——比如退款或取消订阅——搭出一个模拟环境。产品会从解决率、升级率、SLA 违约、欺诈冲正和 CSAT
  代理指标等业务结果中推断奖励信号，让团队不必手工标注每一条轨迹，也能有条理地训练和对比智能体。它还交付离线评估闸门，在任何新策略上线前，先用历史数据和模拟出的边界情况做压力测试。进入生产后，系统会持续监控结果漂移，并在策略和
  UI 流程变化时刷新模拟器。它最初交付的不是一个模型，而是企业约束下缺失已久的训练闭环，让现有模型终于能从经验中变得更好。
