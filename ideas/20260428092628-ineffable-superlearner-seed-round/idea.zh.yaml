jobsToBeDone:
  - job: 当我们发布一个自治支持工作流时，帮助我们的 AI 团队基于真实结果而不是反复的人类重标注来改进它，这样我们就能在不增加风险的情况下提升解决率。
    currentAlternative: 对抽样工单进行监督微调和人工 QA
    successMetric: 在降低升级率和每次策略发布所需 QA 工时的同时，提高自治解决率
  - job: 当政策或产品流程发生变化时，帮助我们的团队在 rollout 之前离线测试代理行为，这样我们就能在不破坏客户信任的情况下发布更新。
    currentAlternative: 预发布环境测试和有限线上试点
    successMetric: 代理更新的回滚事件更少，发布周期更快
