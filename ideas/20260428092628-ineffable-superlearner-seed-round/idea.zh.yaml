jobsToBeDone:
  - job: 当我们上线一个自主客服流程时，帮 AI 团队根据真实结果而不是反复人工重标注来持续改进它，这样我们就能在不增加风险的前提下提高解决率。
    currentAlternative: 基于抽样工单的监督微调和人工 QA
    successMetric: 在每次策略发布后，提高自主解决率，同时压低升级率和 QA 工时
  - job: 当策略或产品流程变化时，帮团队在 rollout 前离线测试智能体行为，这样我们就能更快发布更新，又不至于伤害客户信任。
    currentAlternative: 预发布环境测试和小流量生产试点
    successMetric: 智能体更新的回滚事件更少，发布节奏更快
