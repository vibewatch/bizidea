topRisks:
  - name: 环境保真度风险
    description: 模拟流程可能漏掉关键边界情况，导致训练出的策略在线上表现不佳。
    mitigation: 先从边界清晰的狭窄流程开始，用历史日志做离线回放，并要求在真正自主执行前先跑 shadow mode 证实。
  - name: 买方教育风险
    description: 很多产品团队懂 prompt 调优，不过还没准备好为 RL 式基础设施单独立预算。
    mitigation: 先把产品卖成“压低 QA 成本、让 rollout 更安全”的基础设施，再把强化学习当作底层机制，而不是 headline。
  - name: 平台依赖风险
    description: 大型模型厂商或帮台厂商可能会把原生训练闭环能力加进产品里，挤压独立工具空间。
    mitigation: 保持跨模型、跨平台中立，专注流程环境生成，并构建现有厂商很难在对手栈上都支持到位的连接器和基准。
