problem: Customer-support software vendors want agents that can resolve real tickets, not just draft replies, but labeled human trajectories are expensive, privacy-sensitive, and stale within weeks. Their agents already generate abundant outcome data across refunds, address changes, and order issues, yet teams lack a safe way to convert those logs into trainable environments, reward functions, and offline deployment gates. As a result, most teams stay stuck in prompt tweaking, manual QA, and brittle rule stacks instead of true continual improvement.
targetUser:
  primary: Head of AI or AI platform lead at a Series B+ customer-support SaaS vendor shipping autonomous resolution features for ecommerce and subscription brands
  secondary: Applied ML lead at BPO platforms building internal support agents
  buyer: VP Product or GM for AI automation at customer-support software vendors
startupThesis:
  nonObviousInsight: The first commercial market for human-data-light reinforcement learning is not frontier labs; it is software companies with closed workflows, clear success signals, and millions of real interactions that can become renewable training fuel.
  beachhead: Customer-support platforms that already automate high-volume, low-ambiguity actions like refund approvals, order-status changes, and address updates through stable APIs
  wedge: An experience-to-environment platform that converts production logs and API schemas into RL-ready simulators, reward models, and offline eval gates for support agents
  whyNowCatalyst: Ineffable's financing and explicit thesis around learning without human data make experience-native training newly credible, while product teams urgently need cheaper ways to improve agents safely.
  ventureScalePath: Start with support workflows, then expand the same environment-generation and reward-inference stack into fintech ops, IT service desks, procurement, and eventually a general training substrate for enterprise action agents.
solution: Workflow RL Sandbox connects to helpdesk logs, policy docs, and action APIs, then auto-builds a simulated environment for a narrow workflow such as refunds or subscription cancellations. The product infers reward signals from business outcomes like resolution rate, escalation rate, SLA breaches, fraud reversals, and CSAT proxies, giving teams a structured way to train and benchmark agents without hand-labeling every trajectory. It ships an offline eval gate that stress-tests new policies against historical and simulated edge cases before any rollout. In production, it monitors outcome drift and continuously refreshes the simulator as policies and UI flows change. The initial deliverable is not a model; it is the missing training loop that lets existing models improve from experience inside enterprise constraints.
goToMarketSeed:
  firstCustomer: Series B+ helpdesk or support-automation vendors serving Shopify Plus and subscription brands, with at least one live autonomous workflow and more than 1 million resolved tickets per month
  buyingTrigger: A launch or expansion of autonomous ticket-resolution features that drives QA costs up or causes leadership to pause rollout after inconsistent outcomes
  currentAlternative: Prompt engineering plus supervised fine-tuning on human-reviewed tickets, internal replay scripts, and manual QA
  switchingReason: The platform lets teams improve action-taking agents from their own interaction data, cut labeling spend, and test policy changes safely before exposing customers to failure
  pricingHypothesis: Annual platform fee by workflow environment plus usage-based pricing on simulated episodes and live monitored actions
