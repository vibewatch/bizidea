topRisks:
  - name: Environment fidelity risk
    description: Simulated workflows may miss important edge cases, causing trained policies to underperform in production.
    mitigation: Start with tightly bounded workflows, use offline replay against historical logs, and require shadow-mode validation before live autonomy.
  - name: Buyer education risk
    description: Many product teams understand prompt tuning but do not yet budget for RL-style infrastructure.
    mitigation: Sell the product as QA-cost reduction and safer rollout infrastructure first, with reinforcement learning as the enabling mechanism rather than the headline.
  - name: Platform dependence risk
    description: Major model or helpdesk vendors could add native training-loop features and squeeze independent tooling.
    mitigation: Stay cross-model and cross-platform, specialize in workflow environment generation, and build connectors and benchmarks that incumbents are unlikely to support across rival stacks.
