jobsToBeDone:
  - job: When we launch an autonomous support workflow, help our AI team improve it from real outcomes instead of repeated human relabeling, so we can raise resolution rates without increasing risk.
    currentAlternative: Supervised fine-tuning and manual QA on sampled tickets
    successMetric: Increase autonomous resolution rate while reducing escalations and QA hours per released policy
