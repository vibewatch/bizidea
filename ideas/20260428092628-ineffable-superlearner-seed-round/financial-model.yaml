scenarios:
  downside:
    description: Security review and buyer education stretch the sales cycle to 9 months, delaying conversions and second-workflow expansion.
    y3RevenueK: 2850.0
    y3EbitdaK: -620.0
    cashLowPointK: -190.0
    keyAssumptionChanges:
      - New workflow adds shift back by roughly 2 quarters versus base
      - Gross margin compresses to 68% from heavier support and cloud costs
      - Hiring through Q2Y3 is unchanged, so burn does not flex down quickly enough
  base:
    description: Two paid design partners convert into a trusted release-gate motion and expansion drives most of the Y3 growth.
    y3RevenueK: 4200.0
    y3EbitdaK: 249.0
    cashLowPointK: 340.5
    keyAssumptionChanges:
      - Base case uses $150K annual ARPU per workflow environment
      - Customers are modeled as paid workflow environments, not logos
      - Expansion accelerates once the offline gate affects real release decisions
  upside:
    description: Simulator fidelity is validated earlier, enabling faster conversions and more second-workflow expansion inside retained accounts.
    y3RevenueK: 5000.0
    y3EbitdaK: 520.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - Paid pilot to production conversion improves faster than base
      - Retained accounts reach higher multi-workflow adoption by Y3
      - Gross margin improves to 74% from better connector reuse and usage mix
