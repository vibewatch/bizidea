modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Logs[Workflow logs + APIs] --> Sandbox[Workflow RL Sandbox]
      Sandbox --> Episodes[Simulated episodes]
      Sandbox --> Gate[Offline release gate]
      Gate --> Customers[Paid workflow environments]
      Customers --> Revenue[Subscription + usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growing from 2 paid workflow environments in Y1 to 40 by Q4Y3 at roughly $150K ARPU with most growth coming from multi-workflow expansion after trust is earned.
  - checkName: Must go right
    finding: The offline gate has to change real release decisions, because that proof is what unlocks production conversion and second-workflow expansion in the base and upside cases.
  - checkName: Model breaks if
    finding: If the sales cycle drifts toward 9 months or gross margin drops below 68%, the downside case turns cash negative before the model reaches Y3 self-funding.
  - checkName: Next-round proof
    finding: Reaching 24 paid workflow environments by Q2Y3 with sub-15-point offline-to-live error creates the evidence package for a Series A around trusted training infrastructure.
sanityChecks:
  ruleOf40: Y3 growth 220% + EBITDA margin 6% = 226%
  burnMultiple: Y2 burn multiple 0.50x = $0.90M net burn / $1.80M net new ARR; Y3 turns EBITDA positive on the same headcount base.
  revenuePerFte: $329K Y3 using 12.75 average quarter-end FTE (benchmark $200–400K SaaS)
  flags:
    - Customers are modeled as paid workflow environments rather than logos so revenue can reconcile cleanly to ARPU despite multi-workflow expansion.
    - Cash is approximated from EBITDA and opening financing; annual prepayments, deferred revenue, and working-capital swings are not explicitly modeled.
    - The model assumes incumbents do not bundle a comparable neutral training loop before the company earns trusted release-gate status.
