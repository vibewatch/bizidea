assumptions:
  - id: A1
    name: Opening cash after seed close
    value: '2400'
    unit: usdK
    source: '[BP fundingAsk targetFundingRangeUsd $2–4M]; base case uses $2.4M to reach proof milestone plus 6-month buffer'
  - id: A2
    name: Modeled customer unit
    value: paid workflow environment under management
    unit: definition
    source: '[BP businessModel.unitOfValue] Workflow environment under management'
  - id: A3
    name: Base annual ARPU per workflow environment
    value: '150.0'
    unit: usdK/year
    source: '[BP firstCustomer initialContract + production spend, Research market.sam] production workflow modeled at ~$150K ARR'
  - id: A4
    name: Revenue ramp
    value: 'First paid workflow in M5, second in M8, 14 workflows by Q4Y2, 40 by Q4Y3'
    unit: count
    source: '[BP milestones, BP gtm funnelTargets, Startup heuristic] conservative founder-led enterprise ramp with expansion after trust is proven'
  - id: A5
    name: Gross margin
    value: '72.0'
    unit: pct
    source: '[BP businessModel.targetGrossMarginPct 70] modeled at 72% to reflect software mix and limited usage upside once connectors are reused'
  - id: A6
    name: Monthly churn
    value: '1.8'
    unit: pct
    source: '[Startup heuristic] early enterprise infrastructure sold by workflow has low logo churn but moderate workflow churn/replacement risk'
  - id: A7
    name: Average customer life
    value: '55.6'
    unit: months
    source: '[Calc from A6] 1 / monthly churn'
  - id: A8
    name: CAC per workflow environment
    value: '60.0'
    unit: usdK
    source: '[Startup heuristic] implies roughly ~$100K CAC per logo at ~1.7 workflows per retained logo by Y3'
  - id: A9
    name: Enterprise sales cycle
    value: '6'
    unit: months
    source: '[BP product.sixMonth, BP riskHeatmap security review, Startup heuristic] combines pilot scoping, security review, and production conversion'
  - id: A10
    name: Initial hiring from business plan
    value: 'Founding Eng, Applied RL, and CEO at M0; Product/Solutions at M3; Security/Platform at M6'
    unit: timing
    source: '[BP team]'
  - id: A11
    name: Post-proof hiring ramp
    value: 'First GTM hire in Q1Y2, first G&A hire in Q4Y2, additional engineering and GTM hires only after production conversions'
    unit: timing
    source: '[BP milestones + Startup heuristic] hiring held behind revenue proof to preserve seed-stage burn discipline'
  - id: A12
    name: Fully loaded annual compensation by role
    value: 'CEO 144K; Founding Eng 204K; Applied RL 216K; Platform Eng 198K; Product/Solutions 180K; Security/Platform 210K; Sales/GTM 168K; G&A/Admin 132K'
    unit: usdK/year
    source: '[Startup heuristic] includes ~20% payroll tax and benefits on seed-stage US cash comp'
  - id: A13
    name: Non-payroll operating spend ramp
    value: 'From ~20K/month in Q1Y1 to ~123K/month in Q4Y3 across cloud tools, travel, security, legal, and GTM systems'
    unit: usdK/month
    source: '[Startup heuristic] sized to support enterprise pilots without assuming heavy marketing spend before PMF'
  - id: A14
    name: Cash conversion method
    value: EBITDA approximates cash burn
    unit: policy
    source: '[Startup heuristic] model assumes no debt, no capex, and no explicit deferred-revenue or working-capital build'
  - id: A15
    name: Next financing proof milestone
    value: '24 paid workflow environments by Q2Y3 with offline-to-live error under 15 points and visible second-workflow expansion'
    unit: milestone
    source: '[BP milestones, BP strategyMap.killCriteria]'
  - id: A16
    name: Use of funds mix
    value: Engineering 45%; GTM 25%; G&A 15%; Buffer 15%
    unit: pct
    source: '[Startup heuristic] consistent with integration-heavy AI infrastructure company before broad sales scale'
