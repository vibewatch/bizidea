  value: ~$240k
  source: calc from [10], [14], [19], [20], [23]
- driver: 滩头单位数
  value: 北美/欧洲约 300 个客服 SaaS、BPO 和大型客服平台账户
  source: est.; constrained by [34], [35], [36], [37]
- driver: 每个账户初始工作流数
  value: '2'
  source: calc from common action surfaces in [22], [34], [35]
