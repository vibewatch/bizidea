market:
  tam:
    value: $1.2B
    rationale: 估算方式 = 全球约 5,000 个企业动作型智能体团队 × 每个账户约 $240k 的混合年度支出；这一支出基准建模为 2 个工作流环境 × 每个约 $120k，并参考 Zendesk、Salesforce、Intercom 和 Gorgias 现有的服务 AI 座席费与按会话定价。[10][14][19][20][23]
    isEstimate: true
    sourceRefs:
    - 10
    - 14
    - 19
    - 20
    - 23
  sam:
    value: $90.0M
    rationale: 估算方式 = 北美/欧洲约 300 个初始滩头客户（客服 SaaS 厂商、BPO 平台和大型 AI 导向型客服团队）× 2 个工作流 × 每个工作流约 $150k；真正的约束不在座席数，而在团队是否已经运行稳定动作 API 和高频闭环任务。[34][35][36][37]
    isEstimate: true
    sourceRefs:
    - 34
    - 35
    - 36
    - 37
  som:
    value: $6.0M
    rationale: 估算方式 = 到第 3 年可触达的约 20 个灯塔/生产客户 × 大约 2 个工作流 × 每个工作流约 $150k；这一假设符合一个高度信任、强集成的企业销售动作。[25][29][38]
    isEstimate: true
    sourceRefs:
    - 25
    - 29
    - 38
