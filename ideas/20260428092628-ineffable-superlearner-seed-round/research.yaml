competitors:
- name: Decagon
  stage: scale-up
  wedge: Full-stack AI concierge and support-agent platform aimed at enterprise customer experience teams.
  pricing: Custom pricing; no public list price found.
  strength: Strong funding momentum, enterprise logos, and a clear application-layer story around concierge customer experience.
  weaknessVsUs: Optimizes the end agent experience, not a neutral workflow-simulation and reward-learning layer for rival support vendors.
  sourceRefs:
  - 3
  - 4
  - 25
- name: Sierra
  stage: scale-up
  wedge: High-touch multichannel customer-experience agents with pricing tied to delivered value.
  pricing: Value-based / custom.
  strength: Premium enterprise positioning and strong focus on CSAT and resolution outcomes.
  weaknessVsUs: Appears services- and application-heavy, with less evidence of reusable offline simulator infrastructure.
  sourceRefs:
  - 3
  - 5
- name: Intercom Fin
  stage: scale-up
  wedge: Helpdesk-agnostic AI agent with a continuous-improvement flywheel and strong support workflow distribution.
  pricing: Seat plans plus usage-based Fin outcomes.
  strength: Strong published resolution claims and a large installed base in service software.
  weaknessVsUs: Still an application-layer product optimized around Intercom's agent surface rather than a neutral environment builder.
  sourceRefs:
  - 9
  - 10
  - 11
- name: Zendesk + Forethought
  stage: incumbent
  wedge: Installed-base service platform moving toward self-improving AI agents and cross-stack resolution.
  pricing: Seat-based Suite + Copilot; Forethought sold via enterprise sales.
  strength: Massive distribution, explicit self-learning roadmap, and fast go-to-market leverage.
  weaknessVsUs: Rival support vendors may resist giving Zendesk the training and control layer.
  sourceRefs:
  - 6
  - 7
  - 15
  - 38
- name: Gorgias
  stage: scale-up
  wedge: Ecommerce-native AI agent that handles returns, refunds, and order edits with explicit per-resolution economics.
  pricing: $1 per resolved conversation plus helpdesk tiers.
  strength: Deep workflow specificity in ecommerce and direct monetization around handled outcomes.
  weaknessVsUs: Vertical and front-end focused; not a general training substrate across support vendors and BPO workflows.
  sourceRefs:
