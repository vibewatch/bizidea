    - 36
    - 37
  - point: Benchmark data on offline-vs-live policy performance can become valuable as incumbents compete on published resolution rates and self-improvement claims.
    sourceRefs:
    - 11
    - 18
    - 21
  geographicConsiderations:
  - point: North America is the clearest initial launch region because most visible autonomous-service rollouts and public budget proxies are US-led; Europe is attractive but adds earlier governance diligence under the AI Act.
    sourceRefs:
    - 18
    - 30
    - 31
  - point: Ecommerce and subscription-heavy regions are especially attractive because refund and cancellation APIs are explicit and repeatable.
    sourceRefs:
    - 34
    - 35
  sensitivityCases:
  - case: Faster agent adoption
    impact: If AI-resolved service-case share reaches Salesforce's 50% by 2027 projection, demand for offline training and release-gating infrastructure likely pulls forward materially.
    sourceRefs:
    - 18
  - case: Incumbent bundling
    impact: If Zendesk, Salesforce, or Intercom bundle self-improving loops into core plans, an independent vendor will face pricing pressure and harder positioning.
    sourceRefs:
    - 15
    - 20
    - 21
  - case: Reward proxy mismatch
    impact: If proxies such as deflection, CSAT, or average handle time do not align with true business outcomes, simulator-driven optimization can overfit and hurt renewals.
    sourceRefs:
    - 18
    - 24
  validationPlan:
  - priority: high
    question: Will a support vendor trust simulator-generated offline gates enough to block or approve a production rollout?
    evidenceToGather: Interview 8-10 heads of AI/product at support platforms; collect their last rollback incident, current QA workflow, and minimum evidence required to trust an offline gate.
  - priority: high
    question: 'Which first workflow yields the cleanest reward signal and fastest integration: refunds, cancellations, order changes, or billing updates?'
    evidenceToGather: Review event schemas from Zendesk, Intercom, Shopify, Stripe, and Recharge integrations; quantify resolution, escalation, reversal, fraud, and retry fields.
  - priority: medium
    question: Does the budget sit with service AI, platform engineering, or quality/risk owners?
    evidenceToGather: Run pricing and messaging tests against current spend on AI agents, service suites, and manual QA / annotation workflows.
  - priority: medium
    question: How much integration lift is acceptable before procurement stalls?
    evidenceToGather: Time-box a pilot scope for one Zendesk + Shopify + Stripe workflow and collect security questionnaire feedback from design partners.
