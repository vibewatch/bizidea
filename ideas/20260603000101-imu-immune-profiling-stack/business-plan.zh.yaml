slug: transplant-immune-baseline-os
date: '2026-06-03'
executiveSummary: 大型学术型肾移植和肝移植中心早就为分子监测买单，但到今天，仍缺一层每周都能跑的“操作系统”：把连续免疫数据翻成活检、减药、加药或继续观察的站得住脚决策。首个客户应是一家美国学术型移植研究院：每年肾和肝受者超过 150 例、术后第一年有标准化随访、而且不同护理团队之间的差异已经足以让质控项目冒头。切口是一套移植免疫基线 OS：按计划采血，经合作 CLIA 实验室处理后，把每位患者与匹配参考队列及自身历史轨迹做对照，再为每周移植例会整理出可审计的病例摘要。这里的刻意选择是：先叠在现有 dd-cfDNA、DSA、活检和外送检测流程之上，做决策支持；而不是一上来就自建湿实验室体系，或者直接给出自主治疗建议。研究支持的美国 TAM、SAM 和第 3 年 SOM 分别约为 $200M、$80M 和 $9M；这个市场足够支撑一家聚焦公司，但前提是滩头市场能复制到研究院级铺开，再顺势切到邻近适应症。最难的证明点仍是临床可执行性：公司必须说明，免疫状态轨迹能在现有检测和医生经验之外，真正改变每周移植例会的决策，同时还要处理感染和 BK 相关干扰。商业计划只有在这种情况下才成立：第一单必须是和质控或监测标准化挂钩的付费试点，打包进现有血检流程，并最终转成按年度收费的受监测受者项目。现有厂商的公开定价仍不透明，首个预算归口也还没跑通，所以前 12 个月要优先换来证据、预算路径和生产转化，而不是急着大面积铺市场。
problem:
- 大型肾移植和肝移植中心今天仍把肌酐或肝功能化验、DSA 监测、协议性活检、dd-cfDNA 或基因表达检测，以及医生经验判断拼在一起用，却没有一套统一的纵向免疫基线，所以不同主治和每周例会之间的监测决策常常不一致。
- 活检仍是最终裁决手段，而感染、缺血和 BK 相关损伤又会干扰血液信号，因此在排斥或免疫抑制过度真正显性化之前，临床医生很难为更早的减药或加药决定提供充分依据。
- 美国移植量持续上升，术后第一年的监测负荷也随之变重，这让晚期升级处理、不必要活检和流程不一致，对运行标准化监测门诊的学术中心来说越来越贵。
solution:
- 把术后定期采集的血样送入合作 CLIA 实验室，返回患者级免疫基线报告：既对照匹配参考队列，也对照患者自己的既往免疫轨迹。
- 把每次结果整理进移植例会工作流，附上风险标记、干扰因素背景，以及团队为什么该复核活检时点、免疫抑制减量、加量或加密随访的可审计说明。
- 产品上线时只做边界清晰的临床决策支持：补充 dd-cfDNA、DSA 和活检流程，而不是替换标准治疗检测，也不直接给出自主用药建议。
whyWeWin:
- 产品顺着现有 CLIA 外送和 MolDX 已认可的分子监测行为往前走，比让中心相信一整套全新的检测体系更容易起量。
- 现有厂商在器官特异性检测结果和样本物流上很强，但真正空白的是一套跨器官、可审计、能把免疫状态变化翻成移植例会可执行语言的工作流。
- 一旦多中心数据把免疫轨迹、干扰因素、治疗变化、活检结果和每周例会决策连起来，这套数据壁垒会比任何单一生物标志物或仪表盘都更难复制。
strategicChoices:
  beachhead: 美国大型学术型肾移植和肝移植项目：每年受者超过 150 例、术后第一年有标准化随访，而且病例量足够支撑每周多学科复盘。
  wedgeRationale: 先打肾和肝的学术型滩头市场，比直接卖给更宽泛的移植或免疫学市场更快拿到证明。因为这类中心已经在买非侵入式监测，本身就承受活检压力和护理差异，也能在同一条反复发生的工作流里，直接对比“有基线”和“无基线”的干预决策。
  sequencingRationale: 第一步先做合作实验室之上的决策支持层、回顾性验证和创始人主导销售，拿下 2–3 家旗舰中心，把临床可执行性、周转可靠性和预算归口先跑通，再去做更深的 EMR 集成、更广的器官覆盖或邻近适应症。只有付费试点转正后，公司才该投入可复制的实施流程和研究院级扩张；如果太早冲向更广义的移植软件或免疫肿瘤学，只会拉长证据周期、稀释切口。
  notYet:
  - 在工作流需求和实验室经济性还没跑通前，就自建专有湿实验室检测体系
  - 在旗舰学术中心尚未形成可复制口碑前，就去做社区型或低量级移植中心
  - 在移植打法还没稳定转化前，就上免疫肿瘤学、自身免疫监测或细胞治疗模块
  - 直接给出自主治疗建议或药物滴定主张
market:
  tam: 按美国市场建模，TAM 约为 $200.0M：基于 2025 年 39,917 例肾加肝移植，以及术后第一年每位受监测患者约 $5,000 的连续画像 + 工作流软件价值。
  sam: 按滩头市场建模，SAM 约为 $80.0M：假设约 40% 的肾和肝移植量集中在符合目标画像的大型学术项目里。
  som: 按第 3 年建模，SOM 约为 $9.0M：对应 8 家旗舰中心、每家约 225 个受监测受者年、每个受监测患者年约 $5,000 的净收入。
  segments:
  - 运行标准化术后第一年随访和每周多学科复盘的大型学术型肾移植与肝移植中心
  - 在滩头市场跑通后，需要结局挂钩免疫监测基础设施的多院区移植研究院，以及部分聚焦移植的生物医药合作方
  buyingProcess: 第一单最好从付费试点起步：当移植研究院面临质控推进、边缘性排斥或感染复杂度上升，或者需要减少不必要活检与晚期住院升级处理时切入。临床冠军通常是医疗主任和监测负责人；真正拍板预算的，多半是移植科负责人、服务线 VP 或移植项目管理者——前提是试点被包装成叠在现有实验室流程之上的标准化基础设施。
product:
  mvp: MVP 是一个肾和肝术后监测驾驶舱：接入一家合作 CLIA 实验室输出的连续免疫画像结果，把患者与匹配队列和历史样本对照，再为每周移植例会生成可审计的病例摘要。1.0 版先把复核流程、干扰因素标注和可导出报告跑通，不要求深度替换 EMR，也不碰自主临床主张。
  sixMonth: 6 个月内要做完一条实验室网络集成，交付纵向患者基线、每周例会可用的标记病例摘要、面向医生的感染与 BK 干扰解释字段，并在 2 家共创客户中心跑起回顾性研究流程。
  twelveMonth: 12 个月内补上前瞻性试点运营、中心级对标、周转与样本质量 SLA 仪表盘、轻量级 EMR 或结果交付集成，以及能看出“哪些标记病例改变了监测或治疗决定”的复核分析。
  twentyFourMonth: 24 个月内，从单一器官工作流扩到同一研究院内的肾 + 肝铺开，推出与结局和流程差异挂钩的跨中心对标；只有核心监测产品已经形成转化，才进入一个相邻移植器官或高度相关的生物医药监测项目。
  keyBets:
  - 免疫基线轨迹在每周移植例会里，能在 dd-cfDNA、DSA、肌酐和医生经验之外，再多给一层足以改变决策的信号。
  - 合作实验室模式能在周转、重复性和成本上达标，顺利嵌入术后第一年的计划性监测。
  - 移植项目会更快为“按年度监测受者工作流”买单，而不是为一套新检测平台或通用移植仪表盘买单。
  - 在一家旗舰研究院里把肾和肝跑通后，可以扩到更多器官、更多受监测患者和跨中心对标，而不需要整套产品重写。
gtm:
  wedge: 当移植管理层想更早、更有依据地复核排斥、感染风险和免疫抑制过度，又不想更换现有实验室基础设施时，向旗舰肾或肝项目卖一个“监测标准化付费试点”。
  channels:
  - 对高量学术中心的移植医疗主任、移植科负责人和服务线管理者做创始人主导销售
  - 借助移植医生 KOL 转介绍和联盟关系
  - 与已经承接移植外送检测和合同执行的专科实验室网络合作
  - 与 EMR 和结果交付集成伙伴合作，降低试点上线期间的门户疲劳
  funnelTargets: 目标客户→临床冠军 25-35%；临床冠军→付费试点 20-30%；付费试点→生产合同 50%+；生产中的肾/肝项目→第二器官或研究院级扩张，12 个月内 40%+。
  pricing: 按年度项目订阅 + 按次画像检测收费，定价锚点放在术后第一年受监测受者年和每周多学科复核工作流，而不是单纯的检测新奇性。原因很直接：买家本来就在为血液监测和专科外送检测买单，而公开市场定价又不透明，创业公司得先证明自己能减少升级处理、提升活检效率并带来标准化 ROI。
businessModel:
  revenueStreams:
  - 年度移植项目软件订阅
  - 通过合作实验室流程收取的按次检测与解读费
  - 结局对标与中心比较模块
  - 为试点启动提供的实施、协议配置和证据生成服务
  unitOfValue: 与已记录多学科复核流程绑定的“术后第一年受监测移植受者年”
  targetGrossMarginPct: 70
  expansionLevers:
  - 从同一研究院里的单个肾或肝试点，扩到两个器官项目
  - 随着中心把术后第一年监测标准化到平台上，提升受监测受者年数量
  - 为成熟客户叠加对标、流程差异分析和结局复盘模块
  - 在移植场景拿到证明后，把同一层免疫状态工作流扩到相邻器官或部分生物医药监测用例
strategyMap:
  northStarMetric: 通过平台完成复核、并在急性升级前留下“行动/不行动”记录的受监测受者年
  inputMetrics:
  - 每季度合格旗舰移植中心会议数
  - 已签署的回顾性数据共享研究数
  - 从采血到可复核报告的实验室中位周转时间
  - 7 天内在每周例会中被讨论的标记病例占比
  - 标记病例与活检、感染和 BK 裁决结果的一致性
  - 付费试点转生产合同的转化率
  - 从单器官工作流扩到更广项目采用的研究院扩张率
  moatsToBuild:
  - 把活检结果、感染事件、BK 干扰和治疗变化连在一起的多中心纵向免疫轨迹数据集
  - 来自每周移植例会的工作流沉淀：哪些被标记、被复核、被升级、被延后，或被临床推翻
  - 贴合真实移植运营的中心级护理路径配置和复核模板
  - 能缩短试点上线和合规评审时间的实验室、结果交付与证据生成 操作手册
  killCriteria:
  - 首批 2 家旗舰中心的回顾性研究无法证明：在至少 20% 已裁决病例里，产品相对现有 dd-cfDNA、DSA、活检和常规化验复核，带来了足以影响决策的增量价值。
  - 模型无法把排斥与感染或 BK 相关损伤分得足够开，以至于移植医生不愿在每周例会里引用结果。
  - 前 4 个付费试点里，转成生产合同的不到 2 个，或年化价值低于 $300k。
  - 合作实验室的周转时间和重复性，无法稳定支撑首批中心的计划性监测窗口。
  mermaid: |
    flowchart LR
      Wedge[Kidney and liver surveillance wedge] --> MVP[Immune baseline OS]
      MVP --> Proof[Actionable weekly-round decisions]
      Proof --> Expansion[Institute rollout and adjacent programs]
investorMemo:
  verdict:
    call: 见面 / 继续深挖
    conviction: 切口强、赛道时点也可信，但判断仍取决于两件事能不能跑通：临床可执行性，以及可复制的预算路径。
    whyBelieve: 移植中心已经在为血液监测买单，却仍缺一层被信任的工作流，能把高维免疫数据翻成标准化病例复核决策。
    whyDoubt: 如果免疫画像无法稳定拆开干扰因素，或者解读层抢预算的速度赶不上现有厂商补足工作流，公司就会失速。
    nextDiligence: 先在 2–3 家旗舰中心做盲法回顾性复核，再确认一条能把付费试点顺利转成年度受监测受者项目的签约路径。
  firstCustomer:
    title: 肾移植与肝移植监测的医疗主任
    profile: 一家美国学术型移植研究院：每年肾和肝受者超过 150 例、术后第一年有标准化随访门诊、内部有移植数据团队，而且已在使用专科外送检测。
    trigger: 触发点可能是质控任务、边缘性排斥或复杂感染病例突然增多，或者管理层要求在多位主治之间减少不必要活检与晚期升级处理。
    buyer: 移植科负责人或移植研究院管理者
    initialContract: 首单应是一条器官工作流上的“回顾性 + 前瞻性”付费试点，价格落在 $100k-$200k；当 75-150 个受监测受者年和每周复核模块上线后，再转成约 $300k-$750k 的年化 ACV。
  mustBeTrue:
  - 前 10 家合格旗舰中心里，至少有 3 家愿意为监测决策支持买单做付费试点，而不是继续停留在现有检测结果 + 院内复核。
  - 在至少 2 家中心的盲法回顾性复核里，免疫基线输出能在一批已裁决病例中，稳定提供超过现有 dd-cfDNA、DSA 和常规化验的增量决策信号。
  - 产品足以把排斥与感染或 BK 相关损伤区分开，让移植医生愿意在每周例会里真正使用，而不是把它当成另一个噪音仪表盘。
  - 移植服务线、研究院、实验室或质控预算负责人，愿意在标准学术采购周期内批准生产合同。
  - 至少一半早期生产客户会从单点试点扩到更广泛的肾 + 肝项目使用，支撑模型里的第 3 年 SOM 路径。
  diligenceQuestions:
  - 当产品被卖成“监测标准化”而不是实验室检测时，第一笔付费预算到底归谁管？
  - 在 dd-cfDNA、DSA 和活检流程都已经存在的情况下，医生能感知到多少新增决策价值？
  - 合作实验室得把周转时间和重复性做到什么水平，中心才会接受计划性监测使用？
  - 在移植后高风险窗口里，感染、炎症或 BK 干扰会多频繁地制造误报？
  - 在深度 EMR 集成尚未完成前，旗舰中心是否愿意先接受一层复核产品？
operatingAssumptions:
- assumption: 最快的上线路径，是搭在一家或多家合作 CLIA 实验室之上的决策支持层，而不是自建专有检测业务。
  basis: research.yaml
  validationTest: 至少签下 1 份实验室网络协议，明确周转与样本质量 SLA，并在不自建湿实验室的前提下跑起 2 个试点。
  decisionImpact: 如果这条假设不成立，所需资本、监管范围和拿到首个证明的时间都会明显上升，公司节奏和融资计划都得重写。
- assumption: 第一笔预算会来自移植项目、研究院或质控负责人，而不是独立的中央 IT 软件预算。
  basis: research.yaml
  validationTest: 在 10 次买家访谈里把预算归口和签约路径摸清，并用相同或相近的预算来源拿下 2 个付费试点。
  decisionImpact: 如果不成立，销售动作就会更像传统企业软件，周期更长，当前滩头市场也会失去效率。
- assumption: 在移植后前 6 个月，免疫基线输出足以把排斥与感染、BK 相关损伤分得够开，从而影响复核决策。
  basis: research.yaml
  validationTest: 完成带活检、感染排查和 BK 标签的回顾性与前瞻性研究，同时量化医生评分的有用性、以及已裁决条件下的敏感性和特异性。
  decisionImpact: 如果不成立，产品应收缩到科研或对标工作流，而不是继续冲临床运营。
- assumption: 只要病例摘要足够有用、也经得起审计，即使没有完整 EMR 集成，中心也愿意先接受轻量结果交付流程。
  basis: 运营判断
  validationTest: 在 2 家共创客户里用可导出报告或轻量集成跑试点，并确认至少 70% 的标记病例在产品关联工作流里被复核。
  decisionImpact: 如果不成立，实施成本和部署时间都会上升，销售会变慢，规模化前也要多烧更多钱。
- assumption: 先赢下一条肾或肝工作流，再扩到同一研究院更广覆盖，这条路径应该早于进入免疫肿瘤学或其他相邻适应症。
  basis: idea.yaml
  validationTest: 至少把 1 个试点在生产上线 12 个月内扩到第二器官项目，或扩成研究院级监测覆盖。
  decisionImpact: 如果不成立，公司就该更聚焦，推迟邻近市场招聘，并重新判断这个市场是否足以支撑风险投资回报。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 在学术型肾和肝项目里做 15 场结构化买家与临床访谈，摸清当前监测流程、触发事件和预算归口。
  hypothesis: 围绕质控和监测标准化的痛点足够强，至少有 5 家合格中心会在探索后推进试点设计。
  successMetric: 拿到 10 场合格旗舰中心会议、5 个有明确采购触发点的账户，以及 3 家同意做回顾性数据复核或试点界定的中心。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 敲定 1 条合作实验室工作流，并在计划性监测样本上验证从采血到出报告的周转节奏。
  hypothesis: 实验室网络模式无需自建湿实验室，也能满足术后第一年移植监测的运营节奏。
  successMetric: 签下实验室伙伴、明确周转 SLA，并在目标监测窗口内交付首批测试报告。
  owner: 临床运营负责人
- horizon: 90–180 天
  experiment: 在 2 家旗舰中心做盲法回顾性病例复核，使用历史免疫画像、活检结果、感染排查和治疗变化数据。
  hypothesis: 在一部分已裁决病例里，产品能给出超出现有监测方法的增量决策信号。
  successMetric: 医生复核显示：至少 20% 的已裁决病例里，产品带来了改变动作或确认动作的价值，同时误报负担不能失控。
  owner: 数据科学负责人
- horizon: 90–180 天
  experiment: 把带干扰因素标注和可审计导出的 MVP 每周例会摘要，真正部署到 2 家共创客户工作流中。
  hypothesis: 即使还没完成深度 EMR 集成，只要能提高复核纪律，移植团队就会使用这层工作流。
  successMetric: 试点里超过 70% 的标记病例，会在每周例会上借助生成的病例摘要被讨论。
  owner: 创始工程师
- horizon: 180–360 天
  experiment: 各拿下 1 条肾或肝监测工作流，共签下 3 个付费试点。
  hypothesis: 把产品卖成叠在现有实验室基础设施之上的监测标准化试点，会比卖成新检测平台更快转化。
  successMetric: 签下 3 个试点，明确执行 负责人、记录基线指标，并沉淀 1 套共享签约模式。
  owner: 创始人/CEO
- horizon: 180–540 天
  experiment: 把早期试点转成生产合同，并在 1 个账户里测试从单器官工作流扩到研究院级肾 + 肝覆盖。
  hypothesis: 从研究院内扩张，是把窄切口推到模型 SOM 的主路径。
  successMetric: 生产上线 12 个月内，至少 2 个试点转正，且至少 1 个账户扩出初始试点工作流。
  owner: 创始人/CEO
operations:
- 管理合作 CLIA 实验室，盯住周转、样本质量和备份供应商 SLA
- 搭建站点上线流程，覆盖 IRB 或数据使用审批、回顾性队列准备和移植例会工作流映射
- 运营每周病例复核，沉淀裁决结果、医生反馈和实际决策结局
- 管好监管与声明边界，让产品始终停留在“有边界的临床决策支持”定位上
- 整理结果交付和 EMR 集成 操作手册，减少旗舰中心的门户疲劳
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 亲自抓销售、试点设计和旗舰移植中心关系，因为早期成交高度依赖临床信任和高层背书。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭出 MVP 试点所需的核心工作流层、报告生成、实验室结果接入和轻量集成。
- role: 移植临床负责人
  startTiming: 第 0 个月
  rationale: 把移植例会工作流翻成产品需求，拉来 KOL，并确保证据终点对医生来说足够可信。
- role: 数据科学负责人
  startTiming: 第 3 个月
  rationale: 负责干扰因素处理、回顾性验证、模型评估，以及支撑护城河的数据集设计。
- role: 临床运营负责人
  startTiming: 第 6 个月
  rationale: 统筹实验室伙伴、试点上线、站点培训和证据采集节奏，让公司能稳定跑多个中心。
- role: 实施工程师
  startTiming: 第 9 个月
  rationale: 压缩部署时间，处理结果交付集成，并把试点定制工作沉淀成可复制的上线 操作手册。
milestones:
- horizon: 0–12 个月
  items:
  - 拿下 2 家回顾性共创中心和 1 条有明确周转 SLA 的合作实验室工作流
  - 在已裁决移植病例里证明盲法回顾性可执行性，并整理出一套能支持试点销售的证据包
  - 围绕单一肾或肝监测工作流启动 3 个付费试点，且都明确高层 负责人 和基线流程指标
  - 交付每周移植例会正在使用的 MVP 病例摘要、干扰因素标注和可审计复核导出
- horizon: 12–24 个月
  items:
  - 至少把 2 个试点转成生产合同，且年化价值达到目标区间
  - 至少把 1 个账户从单点试点扩成更广的肾 + 肝研究院覆盖
  - 补上中心级对标和轻量 EMR/结果交付集成，缩短部署周期
  - 为新增旗舰中心沉淀一套可复制的证据、实施和实验室伙伴 操作手册
- horizon: 24–36 个月
  items:
  - 在模型的第 3 年 SOM 路径上，跑到 8 家旗舰中心
  - 证明“工作流沉淀 + 结局挂钩免疫轨迹”相比只卖检测的对手，能带来更好的扩张经济性
  - 根据生产留存和扩张数据，决定是否进入一个相邻移植器官或高度相关的生物医药监测场景
  - 只有当滩头市场已经跑通可复制预算归口、生产转化和研究院扩张后，才启动下一轮融资
risks:
- risk: 免疫基线输出相对现有监测方法，拿不出足够强的增量临床价值，无法改变每周移植例会的决策。
  likelihood: High
  impact: High
  mitigation: 先做盲法回顾性研究，只挑愿意共同裁决结局的中心合作，并在证据不足前把产品声明严格限制在决策支持。
- risk: 感染、炎症、缺血或 BK 相关损伤会干扰模型，削弱医生信任。
  likelihood: High
  impact: High
  mitigation: 围绕有标签的干扰因素队列训练和评估模型，提供解释字段；如果医生看不到足够特异性，就推迟更大范围铺开。
- risk: 报销和预算责任仍绑在实验室检测上，而偏软件化的解读层没有清晰归口。
  likelihood: High
  impact: High
  mitigation: 先和现有血检工作流打包出售，用质控和标准化 ROI 讲清价值，在放大 GTM 之前先验证一条可复制预算路径。
- risk: 现有检测厂商或专科实验室，如果快速补上工作流和可解释性功能，差异化会被压缩。
  likelihood: Medium
  impact: High
  mitigation: 更快把多中心纵向数据、每周例会工作流沉淀和跨器官复核逻辑做厚，这些都是以检测为中心的玩家更难补齐的。
- risk: 合作实验室的经济性、重复性或周转时间如果撑不起计划性监测窗口，首批中心就很难跑顺。
  likelihood: Medium
  impact: High
  mitigation: 先从计划性监测而不是急性决策切入，设严格 SLA，并在中心数量放大前建立供应商冗余。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 用这笔钱支撑 18 个月：完成回顾性验证、跑通合作实验室运营、启动 3 个旗舰中心付费试点、转出首批生产合同，并证明肾 + 肝研究院扩张成立，再考虑加码更广 GTM 或邻近适应症。
