problem: 实体器官移植团队今天仍靠实验室指标趋势、临床医生经验判断和侵入式随访拼凑排斥风险与免疫抑制强度管理，但真正要回答的问题是：在排斥、感染风险或过度治疗变得明显之前，患者的免疫状态是不是已经开始偏移。这样一来，团队很难更早出手，也很难为减量或加量决定提供充分依据，更难把不同医生的护理标准拉齐。随着血液免疫画像分辨率更高、规模也更容易拉起来，瓶颈不再是怎么产出数据，而是怎么把这些数据变成移植项目敢信、敢用的工作流。
targetUser:
  primary: 运行长期术后随访门诊的学术型实体器官移植中心里，负责免疫监测的医疗主任或项目负责人
  secondary: 负责排斥监测流程的移植药师、护士协调员或移植数据经理
  buyer: 移植科负责人、移植项目服务线副总裁，或移植研究院管理者
startupThesis:
  nonObviousInsight: 真正的突破不只是免疫画像更准了，而是人口规模的血液免疫数据终于能为每位移植受者建立纵向基线。一旦这件事成立，赢家就不会是又一家检测厂商，而是那层工作流：把高维免疫变化翻成移植门诊里站得住脚的活检、减药和加药决策。
  beachhead: 每年管理超过 150 例实体器官受者、并在术后第一年运行标准化排斥随访流程的学术型肾移植和肝移植项目
  wedge: 一套移植免疫基线 OS：把连续血液免疫画像转成患者级风险轨迹，提示护理团队何时该重新评估活检时点或免疫抑制调整，并为每周移植例会生成可审计的病例摘要。
  whyNowCatalyst: IMU 的融资、25,000 人数据集、血液样本的数据密度，以及其明确押注移植决策支持，都说明免疫画像正从科研新奇点跨进可部署的临床基础设施。
  ventureScalePath: 先从术后移植随访切入，再把同一层免疫状态基准能力扩到免疫肿瘤学治疗匹配、自身免疫治疗监测、细胞治疗反应预测，最终沉淀成生物医药公司和医疗系统都能调用的纵向免疫档案。
solution: 这家公司会给移植项目提供一套“软件 + 实验室网络”平台，替代那种盯着常规化验慢慢漂、然后被动反应的低信号管理方式。中心按计划采血，把样本送到合作实验室做画像，再收到标准化免疫状态报告：既对照匹配参考队列，也对照患者自己的历史轨迹。产品不会自动下治疗指令；它做的是把风险变化、可能干扰因素和建议复核路径，整理进医生、药师和协调员每周都能用的工作流。短期 ROI 是减少意外升级处理、让免疫抑制管理更有依据；长期护城河则是把不同移植人群的免疫轨迹、干预动作和结局连成一套专有纵向数据。
goToMarketSeed:
  firstCustomer: 首个客户应是一家大型学术型移植研究院：同时有肾和肝项目、内部有移植数据团队，并且已经在推动把术后第一年监测流程在多位主治医生之间标准化。
  buyingTrigger: 触发采购的往往是边缘性排斥病例突然增多、围绕术后第一年移植物监测的新质控项目，或减少不必要活检与晚期住院升级处理的压力。
  currentAlternative: 现有替代方案是常规化验随访、供者特异性抗体检测、协议性活检、临床医生经验判断，以及零散外送的免疫学检测，人靠手工把它们拼起来。
  switchingReason: 这个切口能让移植团队更早、更标准化地看到免疫漂移，又不必替换 EMR 或现有实验室体系；同时，它比今天碎片化监测流程更能留下清晰决策链。
  pricingHypothesis: 按移植项目收年费软件订阅，再叠加按次画像检测收费；高级定价锚点放在监测患者数、多学科复核工作流，以及结局对标模块。
