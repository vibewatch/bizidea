differentiator: 大多数免疫画像公司做到检测结果就停了，大多数移植软件也只管排班、注册或泛化验复核。这家公司要拿下的是一层更窄、但价值更高的翻译层：把高维免疫数据真正接进移植团队的干预流程。它的防守力会随着三件事一起变厚——纵向免疫基线数据、中心级护理路径配置，以及“哪些免疫变化最后对应了活检证实的排斥、感染或成功减药”的结果反馈。
