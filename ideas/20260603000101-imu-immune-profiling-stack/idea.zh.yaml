jobsToBeDone:
- job: 当移植门诊复盘患者术后第一年随访时，帮助护理团队尽早看见免疫漂移，及时调整监测或治疗，从而减少本可避免的排斥惊险和免疫抑制过度。
  currentAlternative: 常规化验、协议性活检，以及医生各自为战的经验判断
  successMetric: 从免疫变化出现到护理团队复核的时间、活检命中率，以及晚期非计划升级处理的下降幅度
