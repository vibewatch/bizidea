topRisks:
- name: 临床采用惯性
  description: 如果产品不能证明自己在不增加噪音的前提下提升决策质量，移植医生未必愿意改监测流程。
  mitigation: 先从每周病例复盘的决策支持切入，发布中心级工作流结果，并在上线初期避免替换现行标准检测。
- name: 证据与报销缺口
  description: 高分辨率免疫画像在科学上或许很有说服力，但如果没有清晰的报销路径或质量指标，经济上仍难自圆其说。
  mitigation: 第一阶段先卖“减少升级处理、提高活检效率、拉齐项目标准化”的 ROI，同时优先拿愿意动用创新预算的旗舰中心。
- name: 检测依赖风险
  description: 如果检测周转时间、稳定性或供应商经济性不够强，这层工作流还没嵌入诊疗就可能先掉链子。
  mitigation: 采用实验室网络模式并设严格 SLA，先聚焦计划性监测窗口而非急性决策，并尽早建立供应商冗余。
