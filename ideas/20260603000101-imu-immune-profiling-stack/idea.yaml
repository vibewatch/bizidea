topRisks:
  - name: Clinical adoption inertia
    description: Transplant physicians may resist changing surveillance workflows unless the product proves it improves decisions without adding noise.
    mitigation: Start as decision support for weekly case review, publish center-level workflow outcomes, and avoid replacing existing standard-of-care tests at launch.
  - name: Evidence and reimbursement gap
    description: High-resolution immune profiling may be compelling scientifically but still hard to justify economically without clear reimbursement or quality metrics.
    mitigation: Sell first on avoided escalations, biopsy efficiency, and program-standardization ROI while targeting flagship centers willing to fund innovation budgets.
  - name: Assay dependency risk
    description: If assay turnaround time, consistency, or vendor economics are weak, the workflow layer could fail before it becomes embedded in care.
    mitigation: Use a lab-network model with strict turnaround SLAs, begin with scheduled surveillance windows rather than acute decisions, and build vendor redundancy early.
