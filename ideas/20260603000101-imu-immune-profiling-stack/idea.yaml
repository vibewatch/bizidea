differentiator: >-
  Most immune-profiling companies stop at assay output, and most transplant software stops at scheduling, registry, or generic lab
  review. This startup would own the narrow but high-value translation layer between high-dimensional immune data and a transplant
  team's actual intervention workflow. Defensibility compounds through longitudinal immune-baseline data, center-level care-pathway
  configuration, and outcome feedback on which immune shifts preceded biopsy-proven rejection, infection, or successful tapering.
