problem: >-
  Solid-organ transplant teams still manage rejection risk and immunosuppression intensity with a fragmented mix of lab trends,
  clinician judgment, and invasive follow-up, even though the real question is whether a patient's immune state is drifting toward
  rejection, infection risk, or over-treatment before those signals become obvious. That makes it hard to intervene early, justify
  tapering or escalation decisions, and standardize care across physicians. As blood-based immune profiling becomes higher-resolution
  and more scalable, the bottleneck shifts from generating data to turning it into a workflow a transplant program can trust.
targetUser:
  primary: Medical director or immune-monitoring lead at an academic solid-organ transplant center running longitudinal post-transplant surveillance clinics
  secondary: Transplant pharmacist, nurse coordinator, or transplant data manager responsible for rejection-surveillance workflows
  buyer: Chief of transplant, service-line VP for transplant programs, or transplant institute administrator
startupThesis:
  nonObviousInsight: >-
    The breakthrough is not merely that immune profiling is getting better; it is that population-scale, blood-based immune data can
    now anchor a longitudinal baseline for each transplant recipient. Once that becomes possible, the winning company is not another
    assay vendor but the workflow layer that converts high-dimensional immune shifts into defensible biopsy, tapering, and escalation
    decisions inside real transplant clinics.
  beachhead: >-
    Academic kidney and liver transplant programs that manage more than 150 annual solid-organ recipients and run protocolized
    rejection-surveillance visits during the first post-transplant year
  wedge: >-
    A transplant immune baseline OS that turns serial blood immune profiles into a patient-specific risk trajectory, flags when the
    care team should review biopsy timing or immunosuppression changes, and generates an auditable case summary for weekly transplant
    rounds
  whyNowCatalyst: >-
    IMU's financing, 25,000-person dataset, blood-based data density, and explicit push into transplant decision support indicate
    immune profiling is crossing from research novelty into deployable clinical infrastructure.
  ventureScalePath: >-
    Start in post-transplant surveillance, then expand the same immune-state benchmarking layer into immuno-oncology treatment
    matching, autoimmune therapy monitoring, cell-therapy response prediction, and eventually the longitudinal immune system record
    used by biopharma and health systems.
solution: >-
  The startup would provide a software-plus-lab-network platform for transplant programs that want a higher-signal alternative to
  watching conventional labs drift and then reacting late. Centers would collect scheduled blood samples, route profiling to a
  partner lab, and receive a standardized immune-state report that benchmarks each patient against matched reference cohorts and
  their own prior trajectory. The product would not make autonomous treatment decisions; it would package risk shifts, likely
  confounders, and recommended review pathways into a weekly workflow for physicians, pharmacists, and coordinators. The first ROI is
  fewer surprise escalations and more defensible immunosuppression management, while the long-term moat is a proprietary longitudinal
  dataset linking immune trajectories to interventions and outcomes across transplant populations.
goToMarketSeed:
  firstCustomer: >-
    A large academic transplant institute with kidney and liver programs, an internal transplant data team, and a mandate to
    standardize first-year post-transplant monitoring across multiple attending physicians
  buyingTrigger: >-
    A spike in borderline rejection cases, a new quality-improvement initiative around first-year graft monitoring, or a push to
    reduce unnecessary biopsies and late-stage inpatient escalations
  currentAlternative: >-
    Conventional lab surveillance, donor-specific antibody testing, protocol biopsies, clinician judgment, and episodic send-out
    immunology assays stitched together manually
  switchingReason: >-
    The wedge gives transplant teams an earlier and more standardized read on immune drift without forcing them to replace the EMR
    or existing lab stack, and it produces a clearer decision trail than today's fragmented monitoring workflow
  pricingHypothesis: >-
    Annual software subscription per transplant program plus per-profile testing fees, with premium pricing tied to monitored
    patients, multidisciplinary review workflows, and outcome benchmarking modules
