slug: transplant-immune-baseline-os
date: '2026-06-03'
executiveSummary: >-
  Large academic kidney and liver transplant centers already buy molecular
  surveillance, but they still lack a weekly operating layer that turns serial
  immune data into defensible biopsy, tapering, escalation, or watchful-waiting
  decisions. The first customer should be a U.S. academic transplant institute
  with more than 150 annual kidney and liver recipients, protocolized first-year
  surveillance visits, and enough care variation that quality-improvement work
  is already visible. The wedge is a transplant immune baseline OS that routes
  scheduled blood samples through a partner CLIA lab, benchmarks each patient
  against matched reference cohorts and prior trajectory, and packages
  auditable case summaries for weekly transplant rounds. The deliberate choice
  is to start as decision support layered onto existing dd-cfDNA, DSA, biopsy,
  and send-out testing workflows rather than launch a new wet-lab stack or make
  autonomous treatment recommendations. Research supports a modeled U.S. TAM,
  SAM, and year-3 SOM of about $200M, $80M, and $9M respectively, which is
  large enough for a focused company only if the beachhead converts into
  repeatable institute rollouts and later adjacent indications. The hardest
  proof point is clinical actionability: the company must show that immune-state
  trajectories change weekly transplant-round decisions beyond what current
  assays and clinician judgment already provide, while handling infection and
  BK-related confounders. The commercial plan is coherent only if the first sale
  is a paid pilot tied to a quality-improvement or surveillance-standardization
  trigger, bundled with existing blood-testing workflows and converted into an
  annual monitored-recipient program. Public pricing for incumbent assays is
  still opaque, and the exact first budget owner remains unproven, so the first
  12 months should optimize for evidence, budget-path clarity, and production
  conversion rather than broad market expansion.
problem:
  - Large kidney and liver transplant centers still combine creatinine or liver labs, DSA monitoring, protocol biopsies, dd-cfDNA or gene-expression tests, and physician judgment without a single longitudinal immune baseline, so surveillance decisions vary across attendings and weekly rounds.
  - Because biopsy remains definitive and infection, ischemia, and BK-related injury can confound blood signals, clinicians struggle to justify earlier tapering or escalation decisions before rejection or over-immunosuppression becomes clinically obvious.
  - Rising U.S. transplant volumes increase first-year monitoring load, which makes late escalations, unnecessary biopsies, and workflow inconsistency more expensive for academic programs running protocolized surveillance clinics.
solution:
  - Route scheduled post-transplant blood samples through a partner CLIA lab and return a patient-specific immune baseline report that benchmarks each recipient against matched reference cohorts and their own prior immune trajectory.
  - Package each result into a transplant-round workflow with risk flags, confounder context, and an auditable summary of why the team should review biopsy timing, immunosuppression tapering, escalation, or closer follow-up.
  - Launch as bounded clinical decision support that complements dd-cfDNA, DSA, and biopsy workflows instead of replacing standard-of-care tests or issuing autonomous medication recommendations.
whyWeWin:
  - The product rides existing CLIA send-out and MolDX-recognized molecular surveillance behavior, which is a faster adoption path than asking centers to trust a brand-new assay stack.
  - Incumbents are strong at organ-specific assay output and specimen logistics, but the whitespace is a cross-organ, auditable workflow that explains immune-state change in language transplant rounds can act on.
  - A multi-center dataset linking immune trajectories, confounders, treatment changes, biopsy outcomes, and weekly-round decisions can become harder to copy than any single biomarker or dashboard.
strategicChoices:
  beachhead: Large U.S. academic kidney and liver transplant programs with more than 150 annual recipients, protocolized first-year surveillance visits, and enough case volume to run weekly multidisciplinary review.
  wedgeRationale: The kidney-and-liver academic beachhead creates faster proof than a broader transplant or immunology sale because these centers already buy noninvasive surveillance, feel biopsy and care-variation pressure, and can compare baseline versus intervention decisions inside one recurring workflow.
  sequencingRationale: Start with a partner-lab decision-support layer, retrospective validation, and founder-led sales to 2-3 flagship centers so the company can prove actionability, turnaround reliability, and budget ownership before adding deeper EMR integrations, broader organ coverage, or adjacent indications. Only after paid pilots convert should the company invest in repeatable implementation and institute-wide expansion, because a premature push into broader transplant software or immuno-oncology would lengthen evidence cycles and dilute the wedge.
  notYet:
    - Owning a proprietary wet-lab assay stack before workflow demand and lab economics are proven
    - Community and lower-volume transplant centers before flagship academic references are repeatable
    - Immuno-oncology, autoimmune monitoring, and cell-therapy modules before the transplant playbook converts reliably
    - Autonomous treatment recommendations or medication titration claims
market:
  tam: $200.0M modeled U.S. TAM based on 39,917 kidney plus liver transplants in 2025 and an estimated $5,000 first-year monitored patient value for serial profiling plus workflow software.
  sam: $80.0M modeled beachhead SAM assuming roughly 40% of kidney and liver volume sits in large academic programs that match the target surveillance profile.
  som: $9.0M modeled year-3 SOM based on 8 flagship centers with about 225 monitored recipient-years each and about $5,000 net revenue per monitored patient-year.
  segments:
    - Large academic kidney and liver transplant centers running protocolized first-year surveillance and weekly multidisciplinary review
    - Multi-hospital transplant institutes and selected transplant-focused biopharma collaborators that need outcome-linked immune-monitoring infrastructure after the beachhead is proven
  buyingProcess: >-
    The first sale should start as a paid pilot when a transplant institute faces
    a quality-improvement push, a spike in borderline rejection or infection
    complexity, or pressure to reduce unnecessary biopsies and late inpatient
    escalations. Clinical champions are the medical director and surveillance
    leads, while the chief of transplant, service-line VP, or transplant
    administrator likely controls the budget and signs once the pilot is framed
    as standardization infrastructure layered onto existing lab workflows.
product:
  mvp: >-
    MVP is a kidney-and-liver post-transplant surveillance cockpit that ingests
    serial immune-profiling results from one partner CLIA lab, benchmarks each
    patient against matched cohorts and prior samples, and produces an auditable
    case summary for weekly transplant rounds. Version 1 should support review
    workflows, confounder annotation, and exportable reports without requiring
    deep EMR replacement or autonomous clinical claims.
  sixMonth: >-
    Complete one lab-network integration, ship longitudinal patient baselines,
    flagged case summaries for weekly rounds, physician-facing explanation fields
    for infection and BK confounders, and a retrospective study workflow at 2
    design-partner centers.
  twelveMonth: >-
    Add prospective pilot operations, center-level benchmarking, turnaround and
    sample-quality SLA dashboards, light EMR or result-delivery integration, and
    review analytics showing which flagged cases changed monitoring or treatment
    decisions.
  twentyFourMonth: >-
    Expand from one organ workflow to kidney-and-liver institute rollouts,
    launch cross-center benchmarking tied to outcomes and protocol variation, and
    add the evidence layer needed to enter one adjacent transplant organ or a
    tightly related biopharma monitoring program only if the core surveillance
    product is converting.
  keyBets:
    - Immune-baseline trajectories can add decision-grade signal beyond dd-cfDNA, DSA, creatinine, and clinician judgment in weekly transplant rounds.
    - A partner-lab model can meet turnaround, reproducibility, and cost constraints well enough to embed into scheduled first-year surveillance.
    - Transplant programs will buy an annual monitored-recipient workflow faster than they will buy a novel assay stack or a generic transplant dashboard.
    - Kidney and liver success inside one flagship institute can expand into more organs, more monitored patients, and cross-center benchmarking without a full product rewrite.
gtm:
  wedge: Sell a paid surveillance-standardization pilot to a flagship kidney or liver program when transplant leadership wants earlier, more defensible review of rejection, infection risk, and over-immunosuppression without replacing existing lab infrastructure.
  channels:
    - Founder-led sales to transplant medical directors, chiefs of transplant, and service-line administrators at high-volume academic centers
    - KOL referrals from transplant physicians and consortium relationships
    - Specialty lab-network partnerships that already handle transplant send-out testing and contracting
    - EMR and result-delivery integration partners that reduce portal fatigue during pilot rollout
  funnelTargets: "Target account→clinical champion 25-35%, champion→paid pilot 20-30%, paid pilot→production 50%+, production kidney/liver program→second organ or institute-wide expansion 40%+ within 12 months"
  pricing: Annual program subscription plus per-profile testing fees, priced around monitored first-year recipient-years and the weekly multidisciplinary review workflow rather than assay novelty alone. The rationale is that buyers already fund blood-based surveillance and specialty send-out testing, while public incumbent pricing is opaque and the startup must first prove avoided escalations, biopsy efficiency, and standardization ROI.
businessModel:
  revenueStreams:
    - Annual transplant-program software subscription
    - Per-profile testing and interpretation fees through partner lab workflows
    - Outcome benchmarking and center-comparison modules
    - Implementation, protocol-setup, and evidence-generation services for pilot launch
  unitOfValue: Monitored first-year transplant recipient-year tied to a documented multidisciplinary review workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one kidney or liver pilot into both organ programs within the same institute
    - Increase monitored recipient-years as centers standardize first-year surveillance on the platform
    - Add benchmarking, protocol-variation analysis, and outcome-review modules for mature accounts
    - Extend the same immune-state workflow layer into adjacent transplant organs or selected biopharma monitoring use cases after transplant proof
strategyMap:
  northStarMetric: Monitored recipient-years reviewed through the platform with a documented action or no-action decision before acute escalation
  inputMetrics:
    - Qualified flagship transplant center meetings per quarter
    - Signed retrospective data-sharing studies
    - Median lab turnaround time from draw to review-ready report
    - Share of flagged cases discussed in weekly rounds within 7 days
    - Concordance of flagged cases with biopsy, infection, and BK adjudication
    - Paid pilot to production conversion rate
    - Institute expansion rate from one organ workflow to broader program adoption
  moatsToBuild:
    - Multi-center longitudinal immune trajectory dataset linked to biopsy outcomes, infection episodes, BK confounders, and treatment changes
    - Workflow exhaust from weekly transplant rounds showing what was flagged, reviewed, escalated, deferred, or contradicted
    - Center-specific care-pathway configuration and review templates that fit real transplant operations
    - Lab, result-delivery, and evidence-generation playbooks that shorten pilot launch and compliance review
  killCriteria:
    - Retrospective studies at the first 2 flagship centers fail to show decision-relevant lift beyond existing dd-cfDNA, DSA, biopsy, and standard lab review in at least 20% of adjudicated cases
    - The model cannot separate rejection from infection or BK-related injury well enough for transplant physicians to use the output in weekly rounds
    - Fewer than 2 of the first 4 paid pilots convert to production contracts at or above a $300k annualized value
    - Partner-lab turnaround and reproducibility cannot reliably support scheduled surveillance windows at launch centers
  mermaid: |
    flowchart LR
      Wedge[Kidney and liver surveillance wedge] --> MVP[Immune baseline OS]
      MVP --> Proof[Actionable weekly-round decisions]
      Proof --> Expansion[Institute rollout and adjacent programs]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong wedge and credible category timing, but conviction remains conditional on proving clinical actionability and a repeatable budget path.
    whyBelieve: Transplant centers already buy blood-based surveillance and still lack a trusted workflow layer that translates high-dimensional immune data into standardized case-review decisions.
    whyDoubt: The company can fail if immune profiling does not reliably resolve confounders or if the interpretation layer cannot capture budget faster than incumbents extend existing assay workflows.
    nextDiligence: Run blinded retrospective reviews at 2-3 flagship centers and confirm one contracting path that converts a paid pilot into an annual monitored-recipient program.
  firstCustomer:
    title: Medical director of kidney and liver transplant surveillance
    profile: A U.S. academic transplant institute with more than 150 annual kidney and liver recipients, protocolized first-year follow-up clinics, an internal transplant data team, and existing specialty send-out testing.
    trigger: A quality-improvement mandate, a spike in borderline rejection or infection-complex cases, or leadership pressure to reduce unnecessary biopsies and late escalations across multiple attendings.
    buyer: Chief of transplant or transplant institute administrator
    initialContract: Paid retrospective-plus-prospective pilot in the $100k-$200k range for one organ workflow, converting to roughly $300k-$750k annual ACV as 75-150 monitored recipient-years and weekly review modules go live.
  mustBeTrue:
    - At least 3 of the first 10 qualified flagship centers will fund a paid pilot for surveillance decision support instead of staying with current assay output and internal review.
    - Blinded retrospective review at 2 or more centers will show that immune-baseline outputs add decision-relevant signal beyond current dd-cfDNA, DSA, and standard labs in a meaningful share of adjudicated cases.
    - The product will distinguish rejection from infection or BK-related injury well enough that transplant physicians trust it in weekly rounds rather than treating it as another noisy dashboard.
    - A transplant service-line, institute, lab, or quality-improvement budget owner will approve production contracts inside a standard academic procurement cycle.
    - At least half of early production accounts will expand from one pilot workflow into broader kidney-and-liver program usage, supporting the modeled year-3 SOM path.
  diligenceQuestions:
    - Which title actually owns the first paid budget when the product is sold as surveillance standardization rather than as a lab test?
    - How much incremental decision value do physicians perceive once dd-cfDNA, DSA, and biopsy workflows are already in place?
    - What turnaround-time and reproducibility thresholds must the partner lab hit before a center trusts scheduled surveillance use?
    - How often do infection, inflammation, or BK confounders create false alarms in the highest-risk post-transplant windows?
    - Will flagship centers accept a review-layer product before deep EMR integration is complete?
operatingAssumptions:
  - assumption: The fastest launch path is a decision-support layer running on top of one or more partner CLIA labs rather than a proprietary assay business.
    basis: research.yaml
    validationTest: Sign at least 1 lab-network agreement with documented turnaround and sample-quality SLAs and launch 2 pilots without building internal wet-lab operations.
    decisionImpact: If false, capital needs, regulatory scope, and time to first proof expand materially, which would likely delay the company or change the funding plan.
  - assumption: The first budget will come from transplant program, institute, or quality-improvement leadership rather than from a standalone central IT software budget.
    basis: research.yaml
    validationTest: Map budget owner and contracting path across 10 buyer interviews and close 2 paid pilots with the same or closely similar budget source.
    decisionImpact: If false, the sales motion shifts toward longer enterprise software cycles and the current beachhead becomes less efficient.
  - assumption: Immune-baseline outputs can separate rejection from infection and BK-related injury well enough to influence review decisions in the first six months post transplant.
    basis: research.yaml
    validationTest: Complete retrospective and prospective studies with biopsy, infection workup, and BK labels and measure physician-rated usefulness plus adjudicated sensitivity and specificity.
    decisionImpact: If false, the product should narrow to research or benchmarking workflows rather than clinical operations.
  - assumption: Centers will tolerate a light result-delivery workflow before full EMR integration if the case summary is useful and auditable.
    basis: operator judgment
    validationTest: Run 2 design-partner pilots using exportable reports or lightweight integration and confirm at least 70% of flagged cases are reviewed in the product-linked workflow.
    decisionImpact: If false, implementation cost and deployment time rise, which would slow sales and require more capital before scale.
  - assumption: Winning one kidney or liver workflow can expand to broader institute coverage before the company enters immuno-oncology or other adjacent indications.
    basis: idea.yaml
    validationTest: Convert at least 1 pilot into a second organ program or institute-wide monitoring footprint within 12 months of production go-live.
    decisionImpact: If false, the company should stay narrower, delay adjacent-market hiring, and revisit whether the market can support venture outcomes.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run 15 structured buyer and clinician interviews across academic kidney and liver programs to map current surveillance workflow, trigger events, and budget ownership.
    hypothesis: Quality-improvement and surveillance-standardization pain is strong enough that at least 5 qualified centers will move to pilot design after discovery.
    successMetric: 10 qualified flagship meetings, 5 accounts with a documented buying trigger, and 3 centers agreeing to retrospective data review or pilot scoping.
    owner: Founder/CEO
  - horizon: 0–90 days
    experiment: Finalize one partner-lab workflow and benchmark draw-to-report turnaround on scheduled surveillance samples.
    hypothesis: A lab-network model can meet the operational cadence required for first-year transplant surveillance without internal wet-lab ownership.
    successMetric: Signed lab partner, documented turnaround SLA, and first test reports delivered inside the target surveillance window.
    owner: Clinical operations lead
  - horizon: 90–180 days
    experiment: Run blinded retrospective case review at 2 flagship centers using historical immune profiles, biopsy outcomes, infection workups, and treatment changes.
    hypothesis: The product surfaces decision-relevant signal beyond current surveillance methods in a meaningful subset of adjudicated cases.
    successMetric: Physician review shows action-changing or action-confirming value in at least 20% of adjudicated cases without unacceptable false-positive burden.
    owner: Data science lead
  - horizon: 90–180 days
    experiment: Ship MVP weekly-round summaries with confounder annotation and auditable report export into 2 design-partner workflows.
    hypothesis: Transplant teams will use a workflow layer that improves review discipline even before deep EMR integration is complete.
    successMetric: More than 70% of flagged pilot cases are discussed in weekly rounds using the generated case summary.
    owner: Founding eng
  - horizon: 180–360 days
    experiment: Close 3 paid pilots tied to one kidney or liver surveillance workflow each.
    hypothesis: Paid pilots convert faster when sold as surveillance standardization on top of existing lab infrastructure than when sold as a novel assay platform.
    successMetric: 3 signed pilots with named executive sponsors, baseline metrics captured, and one shared contracting pattern.
    owner: Founder/CEO
  - horizon: 180–540 days
    experiment: Convert early pilots to production and test expansion from one organ workflow to institute-wide kidney-and-liver coverage at one account.
    hypothesis: The institute-expansion motion is the primary path from the narrow wedge to the modeled SOM.
    successMetric: At least 2 pilot-to-production conversions and 1 expansion beyond the initial pilot workflow within 12 months of go-live.
    owner: Founder/CEO
operations:
  - CLIA lab-partner management with turnaround, sample-quality, and backup-vendor SLAs
  - Site onboarding process covering IRB or data-use approvals, retrospective cohort setup, and transplant-round workflow mapping
  - Weekly case-review operations that capture adjudication, physician feedback, and decision outcomes
  - Regulatory and claims governance to keep the product positioned as bounded clinical decision support
  - Result-delivery and EMR-integration playbooks that minimize portal fatigue at flagship centers
team:
  - role: Founder/CEO
    startTiming: Month 0
    rationale: Own founder-led sales, pilot design, and flagship transplant-center relationships because early deals depend on clinical trust and executive sponsorship.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the core workflow layer, report generation, lab-result ingestion, and lightweight integrations required for MVP pilots.
  - role: Transplant clinical lead
    startTiming: Month 0
    rationale: Translate transplant-round workflow into product requirements, recruit KOLs, and keep evidence endpoints credible with physicians.
  - role: Data science lead
    startTiming: Month 3
    rationale: Own confounder handling, retrospective validation, model evaluation, and the dataset design that underpins defensibility.
  - role: Clinical operations lead
    startTiming: Month 6
    rationale: Manage lab partners, pilot onboarding, site training, and evidence-collection cadence so the company can run multiple centers consistently.
  - role: Implementation engineer
    startTiming: Month 9
    rationale: Reduce deployment time, handle result-delivery integrations, and turn pilot-specific work into a repeatable launch playbook.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 2 retrospective design-partner centers and 1 partner-lab workflow with documented turnaround SLAs
      - Prove blinded retrospective actionability on adjudicated transplant cases and publish a usable evidence pack for pilots
      - Launch 3 paid kidney or liver surveillance pilots with named executive sponsors and baseline workflow metrics
      - Ship MVP case summaries, confounder annotation, and auditable review exports used in weekly transplant rounds
  - horizon: 12–24 months
    items:
      - Convert at least 2 pilots to production contracts at or above the target annualized value band
      - Expand at least 1 account from a single pilot workflow to broader kidney-and-liver institute coverage
      - Add center-level benchmarking and light EMR or result-delivery integrations that shorten deployment
      - Build a repeatable evidence, implementation, and lab-partner playbook for additional flagship centers
  - horizon: 24–36 months
    items:
      - Reach 8 flagship centers in the modeled year-3 SOM path
      - Demonstrate that workflow exhaust and outcome-linked immune trajectories improve expansion economics versus assay-only competitors
      - Decide whether to enter one adjacent transplant organ or tightly related biopharma monitoring use case based on production retention and expansion data
      - Raise the next round only after the beachhead shows repeatable budget ownership, production conversion, and institute expansion
risks:
  - risk: Immune-baseline outputs do not show enough incremental clinical value beyond current surveillance methods to change weekly transplant-round decisions.
    likelihood: High
    impact: High
    mitigation: Start with blinded retrospective studies, target only centers willing to adjudicate outcomes, and keep claims bounded to decision support until evidence is strong.
  - risk: Infection, inflammation, ischemia, or BK-related injury confound the model and reduce physician trust.
    likelihood: High
    impact: High
    mitigation: Train and evaluate against labeled confounder cohorts, surface explanation fields, and delay broader rollout unless physicians see acceptable specificity.
  - risk: Reimbursement and budget responsibility remain tied to the lab test while the software-heavy interpretation layer lacks a clear owner.
    likelihood: High
    impact: High
    mitigation: Bundle with existing blood-testing workflows, sell first on quality-improvement and standardization ROI, and validate a repeatable budget path before scaling GTM.
  - risk: Incumbent assay vendors or specialty labs add enough workflow and explainability features to compress differentiation.
    likelihood: Medium
    impact: High
    mitigation: Move faster on multi-center longitudinal datasets, weekly-round workflow exhaust, and cross-organ review logic that are harder for assay-centric players to match.
  - risk: Partner-lab economics, reproducibility, or turnaround fail to support scheduled surveillance windows at launch sites.
    likelihood: Medium
    impact: High
    mitigation: Start with scheduled surveillance rather than acute decisions, set strict SLAs, and build vendor redundancy before scaling center count.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to complete retrospective validation, secure partner-lab operations, launch 3 paid flagship-center pilots, convert the first production contracts, and prove that kidney-and-liver institute expansion works before adding broader GTM or adjacent indications.
