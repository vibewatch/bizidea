modelDiagram:
  title: 单位经济流转图
  mermaid: |-
    flowchart LR
      Leads[Qualified transplant centers] --> Pilots[Paid pilot centers]
      Pilots --> Production[Production centers]
      Production --> Expansion[Kidney plus liver expansion]
      Production --> Revenue[Subscription and testing revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit after partner-lab and delivery costs]
      GrossProfit --> Cash[Cash runway and next-round proof]
modelSanity:
- checkName: 收入引擎
  finding: 基线情景收入来自 3 个付费试点：它们在 Y2 末转成 5 家生产中心，并在 Y3 退出时扩到 8 家旗舰中心，每家年化价值约 $1.0M。
- checkName: 必须跑顺的环节
  finding: 合作实验室工作流和每周例会病例摘要，必须尽快证明自己能改变动作；否则公司还没来得及加重 GTM 投入，试点就转不正。
- checkName: 模型会失效，如果
  finding: 如果试点转生产整体晚 2 个季度，或者成熟中心 ARPU 更接近 $850K，下行情景下现金只剩约 1 个季度跑道。
- checkName: 下一轮融资证明点
  finding: 只有当公司拿到至少 2 次试点转正、1 次从肾扩到肝的研究院内扩张，以及 5 家在线中心的稳定预算归口，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 增长 253.3% + EBITDA 利润率 21.8% = 275.1%
  burnMultiple: Y2 净烧钱 $1.1M，除以年末约 $2.0M 的净新增 ARR，约为 0.5x。
  revenuePerFte: Y3 每个 FTE 对应收入 $552.1K（SaaS 基准约 $200-400K；这里偏高，因为每家移植中心都承载了较高的检测和工作流价值）。
  flags:
  - 基线情景假设 3 个付费试点能转成 5 家生产中心，而研究部分已经指出：买方议价能力强、预算归口也不清晰。
  - 只有当合作实验室运营和实施流程在 Y3 下半年前停止高度定制化，第 3 年毛利率目标才有机会达成。
  - 收入高度集中在 8 家旗舰学术中心，丢掉任何 1 家大客户，现金前景都会被明显改写。
