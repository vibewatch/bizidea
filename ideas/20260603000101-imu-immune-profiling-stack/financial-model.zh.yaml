scenarios:
  downside:
    description: 临床可执行性需要更久才能证明，第 3 年退出时只跑到 6 家中心，成熟中心 ARPU 也低于计划。
    y3RevenueK: 4550.0
    y3EbitdaK: -180.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Y2 末只有 4 家中心而不是 5 家，Y3 末只有 6 家而不是 8 家，因为试点转生产整体晚了 2 个季度。
    - 第 3 年 ARPU 封顶在 $850K，因为肾 + 肝研究院级扩张落地更晚。
    - 毛利率最高只能到约 67%，因为实验室和实施工作一直比预期更定制化。
  base:
    description: 第 1 年签下 3 个付费试点，其中 2 个按计划转正，公司在第 3 年退出时累计到 8 家旗舰中心。
    y3RevenueK: 6625.0
    y3EbitdaK: 1442.6
    cashLowPointK: 964.9
    keyAssumptionChanges:
    - 第 1 年拿下 3 个付费试点，第 2 年末跑到 5 家中心，第 3 年末跑到 8 家中心。
    - ARPU 从 $150K 的试点等价值，提升到 Y2 的 $500K 生产值，再随着账户从单一工作流扩到更广研究院覆盖，在 Y3 达到 $1.0M。
    - 毛利率要到 Y3 后段，实验室运营和上线流程开始复用后，才跨过 70% 目标线。
  upside:
    description: 参考中心更快发文，采购阻力下降，再多拿 1 家旗舰中心并带动更高附着率，第 3 年结果更强。
    y3RevenueK: 8050.0
    y3EbitdaK: 2210.0
    cashLowPointK: 1050.0
    keyAssumptionChanges:
    - Y2 末跑到 6 家中心、Y3 末跑到 9 家，因为证据驱动的转介绍缩短了销售周期。
    - 随着更多中心更早同时采用肾和肝工作流，第 3 年 ARPU 提升到 $1.05M。
    - 当合作实验室吞吐和实施模板标准化后，毛利率升至 72%。
