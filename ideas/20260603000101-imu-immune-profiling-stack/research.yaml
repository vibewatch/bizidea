openQuestions:
- What minimum evidence package will make transplant medical directors change first-year surveillance workflows rather than add another dashboard?
- Can a blood-based immune baseline consistently distinguish rejection from infection and BK nephropathy across both kidney and liver programs?
- Which budget line reliably pays for the interpretation layer if assay reimbursement remains tied to the lab test rather than the software output?
- How many U.S. kidney and liver centers truly match the beachhead profile of high volume, protocolized follow-up, and willingness to run outcome-linked pilots?
