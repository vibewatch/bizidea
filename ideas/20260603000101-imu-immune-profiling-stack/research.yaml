competitors:
- name: CareDx
  stage: incumbent
  wedge: Broad transplant molecular surveillance built around AlloSure, AlloMap, and HeartCare, with increasing AI and workflow integration.
  pricing: Medicare-covered molecular surveillance; public list price not disclosed.
  strength: Deep transplant focus, strong center penetration, paired assay portfolio, and workflow support resources.
  weaknessVsUs: Still centered on organ-specific injury and rejection markers rather than a cross-organ immune baseline and auditable multidisciplinary operating layer.
  sourceRefs:
  - 18
  - 19
  - 20
- name: Natera
  stage: incumbent
  wedge: Prospera dd-cfDNA surveillance across kidney, heart, and lung, with DQS differentiation in heart and strong registry-led evidence generation.
  pricing: Medicare-covered transplant surveillance; public list price not disclosed.
  strength: Scaled cfDNA platform, large prospective datasets, and strong lab-plus-EMR workflow packaging.
  weaknessVsUs: Value proposition is still anchored to dd-cfDNA surveillance rather than richer immune-state context and cross-functional case review.
  sourceRefs:
  - 18
  - 21
  - 22
  - 24
- name: Verici Dx
  stage: scale-up
  wedge: Kidney-focused RNA-seq risk assessment for acute rejection with emphasis on early post-transplant use and BK differentiation.
  pricing: Covered in MolDX category; public list price not disclosed.
  strength: Transcriptomic angle may help where injury markers are confounded, especially in kidney-specific workflows.
  weaknessVsUs: Narrow organ focus and lighter workflow footprint than a broader transplant immune-baseline platform.
  sourceRefs:
  - 18
  - 25
  - 26
- name: Eurofins Viracor
  stage: incumbent
  wedge: Specialty transplant reference lab combining broad infectious-disease and immunology testing with TRAC and other rejection-monitoring assays.
  pricing: Reference-lab service model; public list price not disclosed.
  strength: National logistics, broad menu, and strong trust from transplant programs.
  weaknessVsUs: Service breadth is compelling, but the core offer is still lab testing rather than a longitudinal, auditable decision-support operating system.
  sourceRefs:
  - 18
  - 27
  - 29
