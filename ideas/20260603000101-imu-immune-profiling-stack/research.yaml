  validationPlan:
  - priority: high
    question: Can serial immune-baseline outputs change weekly transplant-round decisions beyond what dd-cfDNA, DSA, and creatinine already trigger?
    evidenceToGather: Retrospective decision-concordance study at 2-3 flagship centers using blinded case review against biopsy and outcome labels.
  - priority: high
    question: How often does the model correctly separate rejection from infection or BK-related injury in the first six months post transplant?
    evidenceToGather: Prospective pilot with matched infection workups, BK status, biopsy outcomes, and adjudication by transplant physicians.
  - priority: medium
    question: 'Which budget owner actually funds the wedge in practice: lab, transplant service line, digital innovation, or quality improvement?'
    evidenceToGather: Ten buyer interviews across academic kidney and liver programs plus one contracting pathway mapped per pilot site.
