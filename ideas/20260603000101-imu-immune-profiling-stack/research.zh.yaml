  pricing: 已进入 MolDX 覆盖类别；公开目录价未披露。
  strength: 转录组学路线在损伤标志物受干扰时可能更有优势，尤其适合肾移植工作流。
  weaknessVsUs: 器官覆盖更窄，工作流层也比跨器官免疫基线平台更轻。
