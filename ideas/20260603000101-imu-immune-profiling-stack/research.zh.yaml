  - 20
- name: Natera
  stage: 现有厂商
  wedge: 以 Prospera dd-cfDNA 为核心，覆盖肾、心、肺移植监测，并借 DQS 和注册研究不断强化差异化。
  pricing: Medicare 已覆盖的移植监测；公开目录价未披露。
  strength: cfDNA 平台已规模化、前瞻性数据集大，实验室与 EMR 的工作流打包也很强。
  weaknessVsUs: 它的价值主张仍锚在 dd-cfDNA 监测，而不是更丰富的免疫状态上下文和跨职能病例复核。
