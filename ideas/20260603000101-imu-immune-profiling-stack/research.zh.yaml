  strength: 深耕移植、中心渗透深、检测组合完整，还有工作流支持资源。
  weaknessVsUs: 它仍主要围绕器官损伤和排斥标记展开，而不是跨器官免疫基线和可审计的多学科运行层。
  sourceRefs:
