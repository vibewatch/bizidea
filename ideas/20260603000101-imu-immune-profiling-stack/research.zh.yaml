openQuestions:
- 多大的一套证据包，才足以让移植医疗主任真正改写术后第一年监测流程，而不是再加一个仪表盘？
- 血液免疫基线能否在肾和肝两个项目里，都稳定区分排斥与感染或 BK 肾病？
- 如果检测报销仍绑在实验室项目上，而不是软件输出，那这层解读工作流到底该从哪条预算线出钱？
- 美国到底有多少肾和肝中心真正符合滩头市场画像：量大、随访标准化，而且愿意做与结局挂钩的试点？
