modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Qualified transplant centers] --> Pilots[Paid pilot centers]
      Pilots --> Production[Production centers]
      Production --> Expansion[Kidney plus liver expansion]
      Production --> Revenue[Subscription and testing revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit after partner-lab and delivery costs]
      GrossProfit --> Cash[Cash runway and next-round proof]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from 3 paid pilots converting into 5 production centers by the end of Y2 and then expanding to 8 flagship centers at about $1.0M annualized value by Y3 exit.
- checkName: Must go right
  finding: The partner-lab workflow and weekly-round case summary must prove actionability quickly enough that pilot centers convert before the company adds heavier GTM spend.
- checkName: Model breaks if
  finding: If pilot-to-production timing slips two quarters or mature-center ARPU stays closer to $850K, the downside case compresses cash to roughly one quarter of runway.
- checkName: Next-round proof
  finding: The next financing is justified once the company shows at least 2 pilot-to-production conversions, 1 kidney-to-liver institute expansion, and a repeatable budget owner for 5 live centers.
sanityChecks:
  ruleOf40: Y3 growth 253.3% + EBITDA margin 21.8% = 275.1%
  burnMultiple: Y2 net burn $1.1M divided by about $2.0M of net new ARR at year-end = about 0.5x.
  revenuePerFte: $552.1K Y3 revenue per FTE (benchmark $200-400K SaaS; elevated because each transplant center carries high testing and workflow value).
  flags:
  - The base case assumes 3 paid pilots convert into 5 production centers despite the high buyer power and budget ambiguity called out in research.
  - Year-3 gross margin only reaches target if partner-lab operations and implementation stop being bespoke by the second half of Y3.
  - Revenue is concentrated in 8 flagship academic centers, so losing even one large account would materially change the cash outlook.
