  name: Model start month
  value: 2026-06
  unit: month
  source: '[BP date 2026-06-03; model starts in the same month as the plan]'
- id: A2
  name: Customer unit in the model
  value: flagship transplant center under pilot or production contract
  unit: definition
  source: '[BP strategicChoices.beachhead and BP milestones 24-36 months: reach 8 flagship centers]'
- id: A3
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP product.sixMonth and experimentRoadmap imply pre-revenue setup at model start]'
