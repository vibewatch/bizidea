- id: A5
  name: Year 2 customer endpoints
  value: '[3, 4, 4, 5]'
  unit: customers EOP by quarter
  source: '[BP milestones 12-24 months: convert at least 2 pilots, expand 1 account, and build repeatable playbooks; model exits Y2 at 5 production centers]'
- id: A6
  name: Year 3 customer endpoints
  value: '[6, 7, 7, 8]'
  unit: customers EOP by quarter
  source: '[BP market.som and RS market.som: 8 flagship centers are the year-3 reach target]'
- id: A7
  name: Year 1 annualized pilot ARPU per center
  value: '150.0'
  unit: USDK annual
  source: '[BP investorMemo.firstCustomer initialContract: paid retrospective-plus-prospective pilot in the $100k-$200k range; base case uses the midpoint annualized]'
- id: A8
  name: Year 2 annual production ARPU per center
  value: '500.0'
  unit: USDK annual
  source: '[BP investorMemo.firstCustomer conversion to roughly $300k-$750k annual ACV; base case uses a mid-range $500k as single-organ production plus early expansion]'
- id: A9
  name: Year 3 annual mature-center ARPU per center
  value: '1000.0'
  unit: USDK annual
  source: '[RS market.bottomUpSizingDrivers monetizable patient-year value ~$5,000 and RS/BP SOM logic of ~225 recipients per center imply ~$1.125M mature value; model uses a conservative $1.0M]'
- id: A10
  name: Revenue recognition method
  value: average active centers in period x period ARPU
  unit: formula
  source: '[Startup-finance heuristic named source: Financial Modeler mid-period go-live rule for pilots and contract starts]'
- id: A11
  name: Gross margin ramp
  value: Y1 live months 40%,40%,42%,42%,44%,44%,46%; Y2 55%,58%,62%,66%; Y3 68%,69%,70%,71%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] plus [BP operatingAssumptions partner-lab model] and [RS willingnessToPay] that early periods stay services- and lab-heavy before process scale'
- id: A12
  name: Loaded annual salaries by role
  value: Founder 180; founding engineer 210; transplant clinical lead 220; data science lead 200; clinical operations lead 160; implementation engineer 170; GTM lead 180; product integration engineer 190; customer success 140; G&A 130
  unit: USDK annual per FTE
  source: '[BP team roles] plus startup-finance heuristic for lean U.S. clinical software compensation with payroll burden'
- id: A13
  name: Hiring sequence
  value: Founder, founding engineer, and transplant clinical lead at start; data science M4; clinical operations M7; implementation M10; GTM M15; customer success M18; product integration M20; G&A M25; second GTM M28; second product engineer M31
  unit: timing
  source: '[BP team] and [BP strategicChoices.sequencingRationale] with post-Y1 hires delayed until pilot proof and implementation reuse appear'
- id: A14
  name: Monthly churn
  value: '2.0'
  unit: percent
  source: '[Startup-finance heuristic: transplant-center software is sticky once embedded, but pilot non-renewal and budget ambiguity keep early logo churn above mature hospital-system software]'
- id: A15
  name: Blended CAC per center
  value: '300.0'
  unit: USDK per customer
  source: '[Model-derived from founder-led enterprise selling plus GTM spend across the first 8 centers; conservative versus pure non-payroll S&M because procurement cycles are long]'
- id: A16
  name: Non-payroll operating spend ramp
  value: Y1 monthly S&M 8-22, R&D 25-30, G&A 16-24; Y2 quarterly opex 180,190,205,220; Y3 quarterly opex 260,280,300,320
  unit: USDK
  source: '[BP operations, experimentRoadmap, and risks] plus startup-finance heuristic for travel, cloud compute, evidence generation, legal/compliance, and site onboarding'
- id: A17
  name: Opening cash after pre-seed close
  value: '3600.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M; base model uses a $3.6M close near the lower-middle of the range]'
- id: A18
  name: Funding sizing rule
  value: Capital sized to reach repeatable production conversion plus 6 months of buffer
  unit: policy
  source: '[Developer instruction] anchored to [BP fundingAsk.runwayMonths 18] and extended to roughly 24 months including buffer'
- id: A19
  name: Cash flow simplification
  value: cash approximates EBITDA with no debt, capex, taxes, or working-capital timing modeled
  unit: heuristic
  source: '[Startup-finance heuristic named source: early-stage planning model simplification]'
