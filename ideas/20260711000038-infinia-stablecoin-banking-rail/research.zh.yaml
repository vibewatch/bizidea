  - 25
- point: Bitso 和 Trace 已在拉丁美洲推广本地轨道+稳定币工作流，表明技术轨道已商业化运行。
  sourceRefs:
  - 22
  - 26
  - 29
- point: Fireblocks 报告 90% 的受访者已就稳定币采取行动，称银行正优先跨境支付用例。
  sourceRefs:
  - 20
- point: Chainalysis 和 Bitso 的数据均显示拉丁美洲稳定币活跃度已具规模且商业意义明确。
  sourceRefs:
  - 18
  - 21
openQuestions:
- 拉丁美洲中型银行在首次上线前究竟要求哪些审批步骤和文件包，其中多少是标准化的、多少是银行专属的？
- 银行是否愿意给予足够的只读访问——覆盖合作方、结算和异常数据——让中立工作流层在不替换核心系统的前提下证明价值？
- 创业公司能否持续通过轨道服务商和本地律所分销，还是银行只有在出了活项目问题之后才愿意买？
- 巴西式管控移植到墨西哥、阿根廷和后续非洲或亚洲走廊时，能保持多大的可移植性，而不变成咨询驱动的规则引擎？
