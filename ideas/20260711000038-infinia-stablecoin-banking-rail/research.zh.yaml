competitors:
- name: Infinia
  stage: 规模化阶段
  wedge: 全球资金流动和账户基础设施，连接新兴市场本地支付轨道与数字资产轨道。
  pricing: 企业定制定价；无公开价目表。
  strength: 在巴西、墨西哥等市场拥有深度本地轨道和合规集成，以及清晰的牌照扩展论点。
  weaknessVsUs: 优化方向是在自有网络上执行交易，而非给银行提供跨合作方的中立审批记录和治理历史。
  sourceRefs:
  - 1
  - 2
  - 3
- name: Trace Finance
  stage: 规模化阶段
  wedge: 聚焦巴西和拉丁美洲的 BRL 转换、稳定币结算和本地账户 API。
  pricing: 企业定制定价。
  strength: 明确的 Pix 关联资金管理和出款定位，为客户承诺无需本地实体。
  weaknessVsUs: 核心是合规地移动资金，对银行委员会工作流和多服务商治理凭证着墨较少。
  sourceRefs:
  - 24
  - 26
- name: Bitso Business
  stage: 规模化阶段
  wedge: 拉丁美洲稳定币编排、入金出款和 BRL/MXN 链上流动性。
  pricing: 企业定制定价。
  strength: 区域覆盖强，实时本地轨道，为 BRL 和跨境流量提供专用产品。
  weaknessVsUs: 本质是企业支付产品，而非跨多个外部服务商的银行自有审批 OS。
  sourceRefs:
  - 21
  - 22
  - 29
- name: BVNK
  stage: 规模化阶段
  wedge: 托管和自管稳定币支付——收、发、兑换和存储。
  pricing: 企业定制定价。
  strength: 成熟的全球企业级稳定币栈，牌照、托管和合规嵌入运营模型。
  weaknessVsUs: 起点是运营商执行，而非银行签批、规则版本化和每日管控凭证。
  sourceRefs:
  - 27
- name: Bridge/Stripe
  stage: 在位平台
  wedge: 通过单一 API 和大规模分发网络实现稳定币编排和法币出金或发卡。
  pricing: 企业定制定价。
  strength: 通过 Stripe 和 Visa 获得巨大分发、多链支持和清晰的本地货币出金叙事。
  weaknessVsUs: 聚焦资金的移动和转换，而非银行自有的项目审批材料和上线后异常记录。
  sourceRefs:
  - 28
  - 35
regulatoryTechnicalConstraints:
- point: 巴西第 561 号决议将加密关联 eFX 结算限制在 BCB 持牌机构，并增加资金隔离和报告义务。
  sourceRefs:
  - 5
- point: 墨西哥 Circular 4/2019 为银行和金融科技机构运营虚拟资产制定了具体规则。
  sourceRefs:
  - 6
- point: 阿根廷 PSAV 制度为虚拟资产服务商增设正式注册和文档工作流。
  sourceRefs:
  - 7
- point: 银行第三方安排带来运营、合规、流动性和终端用户混淆风险，银行必须主动治理。
  sourceRefs:
  - 8
  - 9
- point: 推动稳定币支付的银行需要围绕完整支付生命周期的 AML、制裁、钱包筛查和 Travel Rule 流程。
  sourceRefs:
  - 31
validationSignals:
- point: Infinia 明确以连接银行与数字资产轨道为目标融资，并在拉丁美洲、非洲和亚洲扩展牌照。
  sourceRefs:
  - 1
- point: Circle 现同时提供网络型和托管型稳定币结算产品，服务 PSP、金融科技、银行和全球平台。
  sourceRefs:
  - 23
