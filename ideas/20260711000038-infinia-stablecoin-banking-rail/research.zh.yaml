      - 9
      - 10
      - 27
      - 32
      - 33
    competitiveRivalry:
      score: 4
      rationale: 相邻品类的竞争已经激烈——轨道、编排平台和合规厂商都在向同一个跨境稳定币工作流表面靠拢，尽管很少有人定位为中立的银行审批系统记录。
      sourceRefs:
      - 20
      - 23
      - 24
      - 26
      - 27
      - 28
      - 35
  pestle:
  - factor: 政治
    impact: negative
    point: 货币主权和监管顾虑意味着央行和决策者可能限制或严格约束稳定币关联的支付活动。
    sourceRefs:
    - 5
    - 11
    - 14
  - factor: 经济
    impact: positive
    point: 高汇款成本、汇率波动和代理行摩擦使得拉丁美洲对更快、可编程的结算有强经济吸引力。
    sourceRefs:
    - 16
    - 17
    - 18
    - 21
    - 33
    - 34
  - factor: 社会
    impact: positive
    point: 大规模欠银行服务人群和数字原生企业提升了对移动优先和稳定币赋能资金流动的接受度。
    sourceRefs:
    - 18
    - 21
  - factor: 技术
    impact: positive
    point: Pix、稳定币 API、编排层和虚拟账户使 24/7 跨境结算在技术上已可行。
    sourceRefs:
    - 3
    - 4
    - 22
    - 23
    - 28
  - factor: 法律
    impact: negative
    point: 银行仍面临第三方风险、AML/CFT、制裁、记录保存和 Travel Rule 义务，缺乏专用管控层就会拖慢采纳。
    sourceRefs:
    - 8
    - 9
    - 10
    - 31
  adoptionFrictionMatrix:
  - friction: 银行委员会不信任合作方提供的凭证
    severity: 高
    affectedBuyer: 交易银行负责人和风控委员会
    mitigation: 以只读方式切入，生成银行自有的审批材料和持续凭证链。
    sourceRefs:
    - 1
    - 8
    - 9
    - 10
  - friction: 走廊规则因国家和持牌实体类型而异
    severity: 高
    affectedBuyer: 合规和法务负责人
    mitigation: 先在巴西和墨西哥上线，用版本化规则模板配合本地律所合作。
    sourceRefs:
    - 5
    - 6
    - 7
    - 14
  - friction: 数据分散在轨道服务商、银行核心系统和合规工具之间
    severity: 高
    affectedBuyer: 运营和集成团队
    mitigation: 先接入文件和状态事件，管控模型被接受后再扩展到更深层 API。
    sourceRefs:
    - 3
    - 22
    - 23
    - 26
    - 27
    - 32
  - friction: 上线后 AML 和 Travel Rule 监控范围持续扩大
    severity: 中
    affectedBuyer: AML 和合规运营
    mitigation: 集成专业风控信号，而非从零重建完整的交易监控栈。
    sourceRefs:
    - 20
    - 31
market:
  tam:
    value: $315.0M
    rationale: 模型假设拉丁美洲、非洲和亚洲约 300 家目标银行 × 每银行约 3.0 个上线合作项目/走廊部署 × 每部署约 $350k 年度 ACV ≈ $315M。假设锚定 Infinia 的多区域扩张、Bitso 和 Trace 可见的本地轨道覆盖，以及稳定币 B2B 支付快速增长的预测。
    isEstimate: true
    sourceRefs:
    - 1
    - 20
    - 21
    - 23
    - 26
    - 34
  sam:
    value: $44.1M
    rationale: "仅限拉丁美洲滩头：巴西、墨西哥、阿根廷、哥伦比亚、智利和秘鲁约 70 家中型银行买方 × 每银行约 1.8 个近期项目 × $350k ACV ≈ $44.1M。"
    isEstimate: true
    sourceRefs:
    - 1
    - 18
    - 21
    - 22
    - 26
  som:
    value: $3.6M
    rationale: 第 3 年可触达份额假设约 10 家银行客户 × 每家约 1.2 个上线项目 × 约 $300k 落地 ACV ≈ $3.6M，与创始人主导销售和围绕即将上线项目的共销动作一致。
    isEstimate: true
    sourceRefs:
    - 1
    - 20
    - 23
    - 26
    - 27
