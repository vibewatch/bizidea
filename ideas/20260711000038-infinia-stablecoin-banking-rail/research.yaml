    - 31
  geographicConsiderations:
  - point: Brazil is the sharpest wedge because Pix makes instant payout expectations universal while Resolution 561 raises the bar on authorized institutions, segregation, and reporting for crypto-linked eFX.
    sourceRefs:
    - 4
    - 5
    - 16
  - point: Mexico, Argentina, Colombia, Chile, and Peru are natural next corridors because providers like Bitso, Bridge, and Trace already market local-rail coverage there, but each market still carries its own licensing and documentation logic.
    sourceRefs:
    - 6
