competitors:
- name: Infinia
  stage: scale-up
  wedge: Global money movement and account infrastructure connecting local payment rails with digital-asset rails in emerging markets.
  pricing: Custom enterprise pricing; no public price list.
  strength: Deep local-rail and compliance integration across markets like Brazil and Mexico, plus a clear licensing expansion thesis.
  weaknessVsUs: Optimized to execute on its own network, not to give banks a neutral cross-partner approval record and governance history.
  sourceRefs:
  - 1
  - 2
  - 3
- name: Trace Finance
  stage: scale-up
  wedge: Brazil- and LatAm-focused API for BRL conversion, stablecoin settlement, and local accounts.
  pricing: Custom enterprise pricing.
  strength: Explicit Pix-linked treasury and payout positioning with no-local-entity promise for customers.
  weaknessVsUs: Centered on moving funds compliantly, with less emphasis on bank committee workflow and multi-provider governance evidence.
  sourceRefs:
  - 24
  - 26
- name: Bitso Business
  stage: scale-up
  wedge: LatAm stablecoin orchestration, pay-ins and payouts, and BRL/MXN on-chain liquidity.
  pricing: Custom enterprise pricing.
  strength: Strong regional coverage, real-time local rails, and purpose-built products for BRL and cross-border flows.
  weaknessVsUs: An enterprise payments product rather than a bank-owned approval OS spanning multiple external providers.
  sourceRefs:
  - 21
  - 22
  - 29
- name: BVNK
  stage: scale-up
  wedge: Managed and self-managed stablecoin payments with send, receive, convert, and store capabilities.
  pricing: Custom enterprise pricing.
  strength: Mature global enterprise stablecoin stack with licensing, custody, and compliance embedded in the operating model.
  weaknessVsUs: Starts from operator execution rather than bank sign-off, rule versioning, and daily control evidence.
  sourceRefs:
  - 27
- name: Bridge/Stripe
  stage: incumbent platform
  wedge: Stablecoin orchestration and fiat off-ramp or card issuance via a single API and large distribution network.
  pricing: Custom enterprise pricing.
  strength: Massive distribution through Stripe and Visa, multi-chain support, and clear local-currency off-ramp story.
  weaknessVsUs: Focuses on moving and converting funds, not on a bank-owned program approval packet and post-launch exception record.
  sourceRefs:
  - 28
  - 35
