    - 14
  - case: Rail providers bundle shallow approval dashboards
    impact: Standalone pricing compresses unless the startup stays multi-provider and owns the bank’s cross-partner governance record, not just a vendor-specific checklist.
    sourceRefs:
    - 1
    - 23
