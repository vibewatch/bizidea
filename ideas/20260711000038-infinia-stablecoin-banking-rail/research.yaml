    - 27
    - 28
    - 35
  - case: Stablecoin adoption stays concentrated in treasury and remittance use cases
    impact: SAM remains real but narrower, so the product should start with SME trade and business-wallet corridors where approval pain is already acute.
    sourceRefs:
    - 18
    - 20
    - 21
    - 33
    - 34
  validationPlan:
  - priority: high
    question: What exact documents, approvals, and exception thresholds do 5-10 beachhead banks require before a first live stablecoin-funded settlement program?
    evidenceToGather: Bank committee checklists, outside-counsel memos, and rejected program packets from Brazil, Mexico, and Argentina.
  - priority: high
    question: Can the product reduce approval time or post-launch evidence prep enough to beat spreadsheet-plus-counsel workflows?
    evidenceToGather: Before/after metrics on days-to-approval, number of committee cycles, and hours to produce regulator or audit packs.
  - priority: medium
    question: Will rail providers co-sell a neutral bank control layer or build basic approval tooling themselves?
    evidenceToGather: Joint pilot discussions with Infinia, Trace, Bitso, BVNK, Bridge, and Circle-linked providers plus bank-side win/loss feedback.
