    - 35
  - point: Africa and Asia are credible expansion regions because Infinia is funding licensing there and Juniper plus Fireblocks both see emerging-market corridors as early stablecoin winners, but jurisdictional divergence will keep implementations localized.
    sourceRefs:
    - 1
    - 20
    - 34
  sensitivityCases:
  - case: Regulators tighten authorized-institution or recordkeeping rules faster than expected
    impact: Implementation becomes more services-heavy initially, but the need for versioned approval workflows and daily evidence grows stronger, not weaker.
    sourceRefs:
