slug: stablecoin-bank-approval-os
date: "2026-07-11"
executiveSummary: >-
  Stablecoin Bank Approval OS should start as a Brazil-first control layer for
  mid-sized Latin American commercial banks reviewing one stablecoin-funded
  settlement program into local business accounts. The urgent pain is not rail
  connectivity alone; it is converting partner licensing, KYB, corridor rules,
  reserve design, and release conditions into a bank-owned approval packet that
  can survive committee, audit, and regulator scrutiny. The MVP should handle
  one bank, one partner fintech, and one corridor by combining diligence
  intake, policy templates, sign-off workflow, and post-launch daily evidence
  reconciliation. This wedge is narrower and faster to prove than another
  cross-border payments API because Pix- and SPEI-linked off-ramp capability
  already exists while bank approval and monitoring remain bespoke. Go-to-
  market should target a $5B-$30B bank at the moment a stablecoin-linked SME
  trade program reaches risk committee or regulator pre-filing, sell a paid
  pilot tied to one launch, and price per live program or corridor rather than
  by seats. Research supports an estimated "$315.0M" TAM, "$44.1M" LatAm SAM,
  and "$3.6M" year-3 SOM, but those figures assume stablecoin settlement
  remains concentrated in institutional treasury and trade corridors where
  approval pain is acute. The biggest disconfirming risks are that bank policy
  variation makes deployments too services-heavy, or that rail providers bundle
  enough shallow governance tooling to block standalone budget. Public inputs
  still do not identify named live bank design partners, baseline rejection or
  exception rates, or real procurement cycle times, so the first 90 days must
  collect committee artifacts and close at least one paid pilot before stronger
  investor conviction is warranted.
problem:
  - "Commercial banks evaluating stablecoin-funded settlement still stitch together outside-counsel memos, spreadsheets, email threads, and vendor dashboards to decide whether one partner program is safe enough to launch."
  - "After launch, the bank often lacks its own daily evidence tying local-account credits, reserve mechanics, and exception handling together, which slows audits and keeps expansion to new corridors or providers risky."
solution:
  - "Provide a bank-owned workspace that collects partner licences, KYB, account structure, corridor rules, reserve logic, and committee approvals into one versioned launch packet for a single program."
  - "Add read-only ingestion of provider events and bank settlement files so operations can reconcile daily activity, flag breaches, and export regulator-ready evidence without depending on rail-vendor screenshots."
whyWeWin:
  - "The startup sells into the approval and evidence gap between rail execution, generic GRC, and crypto monitoring tools: the bank needs a neutral system of record, not another payment network."
  - "A Brazil-first wedge aligns the product with the sharpest regulatory pain, where authorized-institution, segregation, and reporting requirements make reusable control templates valuable immediately."
  - "Each deployment compounds approval outcomes, corridor templates, and cross-provider exception data that are hard for any single rail vendor or in-house workflow to replicate quickly."
strategicChoices:
  beachhead: "BCB-authorized mid-sized Brazilian commercial banks reviewing one Pix-linked stablecoin-funded settlement program for an SME import or export fintech partner."
  wedgeRationale: >-
    Brazil creates faster proof than a broad LatAm launch because Pix-driven
    payout expectations are already mainstream while Resolution 561 and related
    reporting constraints force banks to own the approval logic. Winning one
    regulated bank program in this environment proves the product can solve the
    hardest visible committee problem before expanding to easier corridors.
  sequencingRationale: >-
    Start with pre-launch approval packets and read-only daily evidence for one
    bank, one partner, and one corridor because that is where budget is
    triggered and where data access is most tractable. Only after the company
    proves shorter approval cycles, reusable templates, and stable monitoring
    inputs should it add more countries, deeper integrations, broader treasury
    analytics, or post-launch automation; otherwise product scope and hiring
    drift into consulting.
  notYet:
    - "Direct money movement, custody, or FX execution"
    - "Retail stablecoin or consumer remittance workflows"
    - "All-country rule coverage across LatAm, Africa, and Asia at launch"
    - "Full transaction-monitoring replacement or autonomous risk decisions"
market:
  tam: "$315.0M estimated TAM based on roughly 300 target banks across LatAm, Africa, and Asia with about 3 live programs per bank at approximately $350k annual ACV per deployment."
  sam: "$44.1M estimated LatAm SAM based on roughly 70 mid-sized bank buyers across Brazil, Mexico, Argentina, Colombia, Chile, and Peru with about 1.8 near-term programs per bank."
  som: "$3.6M modeled year-3 SOM based on about 10 bank logos, roughly 1.2 live programs each, and around $300k landing ACV per program."
  segments:
    - "Primary: mid-sized Brazilian and Mexican commercial banks approving stablecoin-funded settlement into local business accounts for SME trade or wallet partners"
    - "Secondary: regional banks in Argentina, Colombia, Chile, and Peru plus bank-partnered business-wallet fintechs that need the same control model"
  buyingProcess: >-
    The operational champion is usually the fintech-partnership or
    transaction-banking lead, but budget release sits with the head of
    transaction banking, COO, or fintech-partnership GM because the bank is
    underwriting policy, audit, and third-party risk. Deals should start around
    an imminent committee review or regulator pre-filing, then expand only
    after risk, legal, operations, and compliance approve one live program.
product:
  mvp: >-
    The MVP should support one bank, one partner fintech, and one corridor:
    collect licensing and KYB evidence, map it to bank-specific policy
    templates, route committee sign-off, and ingest daily settlement or
    exception files after launch. Human approval remains mandatory because the
    first win is faster bank-controlled evidence, not autonomous program
    approval.
  sixMonth: "Ship one design-partner release for a Brazilian bank with committee workflow, partner evidence intake, Brazil rule templates, one provider data connector, and daily reconciliation for a single live program."
  twelveMonth: "Convert 2-3 pilots into production contracts, add packaged connectors for the first provider and bank file formats seen in pilots, and launch Mexico-ready template versioning plus audit-pack exports."
  twentyFourMonth: "Expand into multi-provider monitoring, regulator reporting packs, and second-corridor rollouts inside existing banks before entering a new region beyond LatAm."
  keyBets:
    - "Banks will fund a neutral approval and evidence layer before they fund another execution network."
    - "One-country templates can cover enough of the bank approval workflow to preserve software margins rather than turning every deployment into legal services."
    - "Read-only provider events and bank settlement files are enough to prove monitoring value before deeper core-banking integrations."
    - "Provider-neutral governance history will matter more to banks than vendor-bundled dashboards once they add second providers, second corridors, or audit scrutiny."
gtm:
  wedge: "Sell a paid Brazil-first pilot to a $5B-$30B commercial bank that already has one SME-payments fintech partner and an imminent stablecoin-program committee review, covering one partner and one corridor before broader rollout."
  channels:
    - "Founder-led direct sales to heads of transaction banking, fintech partnerships, and COOs at mid-sized Latin American banks during live program reviews"
    - "Co-sell motions with stablecoin rail and orchestration providers that create the launch project but do not own the bank's cross-provider governance record"
    - "Referral channels through local compliance counsel, audit firms, and treasury or payment integrators already shaping bank policy templates"
  funnelTargets: "Target bank intro→qualified committee-stage opportunity 20-25%, qualified opportunity→paid pilot 25-35%, pilot→production 50%+, production bank→second corridor or second partner expansion 60%+ within 12 months."
  pricing: >-
    Charge a scoped 8-12 week paid pilot around $75k-$150k for one partner
    program and one corridor, then convert to roughly $250k-$350k annual
    platform value per live program or corridor plus implementation for rule
    templates, reporting, and data integrations; buyers are paying for faster
    approvals, bank-owned audit evidence, and lower exception-handling labor
    rather than seats.
businessModel:
  revenueStreams:
    - "Annual SaaS subscription per live partner program or corridor under approval and monitoring coverage"
    - "Implementation and integration fees for policy setup, bank file ingestion, and evidence exports"
    - "Expansion fees for additional partners, corridors, or provider connectors inside an existing bank"
    - "Premium regulator-reporting and exception-analytics modules once post-launch data is live"
  unitOfValue: "Live partner programs and corridors under bank-owned approval and evidence coverage"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one approved partner program to multiple corridors within the same bank"
    - "Add second and third rail providers while preserving one bank-owned governance record"
    - "Upsell regulator reporting, audit packs, and exception analytics after monitoring data accumulates"
    - "Reuse LatAm templates to enter Africa and Asia only after the first control library is repeatable"
strategyMap:
  northStarMetric: "Live stablecoin settlement programs launched through the platform that remain daily reconciled and audit-ready"
  inputMetrics:
    - "Qualified bank opportunities tied to an active committee review or regulator pre-filing"
    - "Median days from partner proposal to conditional bank approval"
    - "Average committee cycles per program before launch"
    - "Share of required settlement and exception events reconciled automatically each day"
    - "High-severity exceptions unresolved for more than 24 hours"
    - "Production banks expanding from one program to a second corridor or second partner"
  moatsToBuild:
    - "Jurisdiction-specific committee templates and control libraries that become reusable across banks and corridors"
    - "Approval-outcome dataset showing which partner profiles, reserve structures, and evidence packages clear committees fastest"
    - "Cross-provider exception history linking local-bank credits, stablecoin funding, and operational release conditions"
    - "Regulator-ready evidence packs that embed the bank's own audit trail instead of vendor screenshots"
  killCriteria:
    - "Fewer than 3 of the first 15 ICP banks share real committee artifacts or agree to a scoped workflow assessment, indicating the pain is not urgent enough."
    - "The first 2 paid pilots fail to reduce approval-cycle time by at least 30% or audit-pack preparation hours by at least 50% versus the spreadsheet-plus-counsel baseline."
    - "More than 40% of required controls in the first 3 corridors still require bespoke legal or services work after templating, indicating the product is not software-like."
  mermaid: |
    flowchart LR
      Wedge[Brazil first bank approval wedge] --> MVP[One bank one corridor approval and evidence MVP]
      MVP --> Proof[Faster committee sign off and daily reconciled evidence]
      Proof --> Expansion[Multi corridor multi provider bank governance platform]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Sharp buyer pain and clear market timing, but conviction stays moderate until the company proves one paid bank pilot and template reuse beyond a single corridor."
    whyBelieve: "Banks are becoming active operating nodes in stablecoin settlement, yet rail providers and compliance tools still do not own the neutral approval memo and bank-owned evidence trail."
    whyDoubt: "Public evidence still lacks named bank customers, measured approval-cycle savings, and proof that Brazil-first regulatory complexity can be productized without drifting into consulting."
    nextDiligence: "Secure 2-3 design-partner banks, one paid committee-stage pilot, and baseline-versus-pilot metrics on approval days, committee cycles, and audit-pack labor."
  firstCustomer:
    title: "Head of Transaction Banking at a BCB-authorized mid-sized Brazilian commercial bank"
    profile: "A $5B-$30B-asset bank with one live SME-payments fintech relationship and a pending request to let stablecoin-funded settlement credit local importer or exporter business accounts through a local-rail off-ramp."
    trigger: "A new partner proposal reaches risk committee or regulator pre-filing and the bank must defend licensing, account structure, reserve, reconciliation, and ongoing monitoring design before launch."
    buyer: "Head of Transaction Banking or COO"
    initialContract: "Paid 8-12 week pilot around $75k-$150k for one partner program and one corridor, converting to roughly $250k-$350k annual platform value plus implementation once the first program is approved and monitoring goes live."
  mustBeTrue:
    - "At least 8 of the first 15 beachhead banks must describe stablecoin-program approvals as a current multi-team project rather than a theoretical future workflow."
    - "At least 2 of the first 5 qualified bank opportunities must sign paid pilots before demanding a bundled rail-vendor solution."
    - "The first 2 pilots must cut either approval-cycle time by at least 30% or audit or evidence-prep hours by at least 50%."
    - "One common control schema must cover at least 80% of approval fields across the first Brazil and Mexico deployments without custom code per bank."
    - "Provider and bank data feeds must support automatic reconciliation of at least 80% of monitored settlement and exception events in pilot scope."
  diligenceQuestions:
    - "Which exact documents, thresholds, and sign-offs do 3 named Brazil or Mexico banks require before first live stablecoin-funded settlement approval?"
    - "Who owns budget and procurement for this project: transaction banking, COO, risk, or digital partnerships?"
    - "How much of the approval packet can be templated across banks versus rewritten with local counsel each time?"
    - "Will rail providers such as Infinia, Trace, Bitso, or Circle-class partners co-sell and share data, or build their own shallow governance tooling?"
    - "What are the current baseline metrics for days to approval, committee cycles, and hours spent assembling audit or regulator evidence?"
operatingAssumptions:
  - assumption: "Banks will fund launch-readiness and audit-evidence software before large transaction volume exists."
    basis: research.yaml
    validationTest: "Run 6 discovery-to-proposal cycles tied to active launch reviews and secure at least 2 paid pilots with named executive sponsors."
    decisionImpact: "If false, the GTM must shift upstream to rail providers or compliance partners that can embed the workflow into a broader implementation budget."
  - assumption: "Brazil-first control templates can be adapted to Mexico and Argentina with mostly configurable rules rather than bespoke services."
    basis: research.yaml
    validationTest: "Collect committee checklists from at least 3 banks across 2 countries and show one core schema covers at least 80% of required fields and review logic."
    decisionImpact: "If false, the company must narrow geography, raise price to reflect services load, or delay multi-country expansion."
  - assumption: "Read-only provider events and bank settlement files are enough to prove post-launch monitoring value."
    basis: idea.yaml
    validationTest: "Instrument the first pilot with one provider feed and one bank file export and automatically reconcile at least 80% of required settlement and exception events."
    decisionImpact: "If false, the product should narrow to pre-launch approval software until deeper integrations are commercially viable."
  - assumption: "Banks value a provider-neutral governance record enough not to default to rail-vendor dashboards."
    basis: idea.yaml
    validationTest: "In 5 bank and provider joint discussions, confirm at least 3 banks prefer a bank-owned cross-provider record and will pay for it separately or inside the pilot budget."
    decisionImpact: "If false, the company should pursue OEM or white-label distribution instead of standalone sales."
  - assumption: "Founder-led sales can close committee-stage bank pilots inside a 6-9 month cycle."
    basis: operator judgment
    validationTest: "Track the first 10 ICP opportunities and confirm at least 3 reach proposal stage within 120 days and at least 1 closes within 270 days."
    decisionImpact: "If false, the funding ask and hiring plan must assume longer enterprise cycles and heavier channel dependence."
experimentRoadmap:
  - horizon: 0–90 days
    experiment: "Collect real committee checklists, outside-counsel memos, and rejected program packets from 5-8 beachhead banks."
    hypothesis: "The approval workflow is similar enough across early banks to support a reusable evidence schema and control template library."
    successMetric: "At least 3 banks share real artifacts and one core schema maps at least 80% of required fields across the sample."
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: "Concierge-build one committee-ready launch packet for a design-partner bank using manually gathered partner and corridor data."
    hypothesis: "A neutral approval packet is valuable before full automation and can win executive sponsorship for a paid pilot."
    successMetric: "One bank sponsor agrees the packet is materially better than its current spreadsheet-plus-counsel process and signs a paid pilot SOW."
    owner: Product and compliance lead
  - horizon: 0–90 days
    experiment: "Integrate one rail-provider status feed and one bank settlement file into a prototype reconciliation view."
    hypothesis: "Read-only data access is sufficient to produce useful post-launch evidence without replacing core payment systems."
    successMetric: "The prototype reconciles at least 80% of scoped settlement and exception events for one sample program."
    owner: Founding eng
  - horizon: 90–180 days
    experiment: "Run the first paid Brazil pilot for one bank, one partner, and one corridor."
    hypothesis: "The MVP can shorten approval cycles enough to justify production rollout."
    successMetric: "Pilot cuts days-to-approval by at least 30% or removes at least one full committee cycle versus baseline."
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: "Test one co-sell motion with 2 rail providers and 1 local counsel or audit partner."
    hypothesis: "Channel partners will source qualified opportunities because they create the launch project but do not own the governance record."
    successMetric: "Generate at least 3 qualified bank introductions and 1 joint pilot proposal from partner channels."
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: "Turn on daily monitoring and evidence export in the first production bank."
    hypothesis: "Bank-owned reconciliation and exception history reduces audit-pack labor after launch."
    successMetric: "Audit or regulator evidence-prep time falls by at least 50% and no high-severity exception stays unresolved beyond 48 hours in pilot scope."
    owner: Solutions engineer
  - horizon: 12–18 months
    experiment: "Replicate the first-country playbook in Mexico with a second provider or corridor."
    hypothesis: "The rule library and operating model travel across LatAm without custom rebuilds."
    successMetric: "Second-country deployment goes live with less than 25% bespoke build effort relative to the first bank."
    owner: Product and compliance lead
operations:
  - "Maintain jurisdiction and corridor rule libraries with version control, local counsel review, and change logs tied to each bank program."
  - "Run partner-program onboarding workflows covering licences, KYB, account structure, reserve mechanics, and committee approvals before launch."
  - "Ingest provider events, bank settlement files, and reserve or exception reports into a daily reconciliation and evidence pipeline."
  - "Preserve bank-owned audit trails, access controls, and exportable evidence packs for committee, regulator, and internal review."
  - "Package implementation playbooks for one-provider or one-corridor launches before taking on deeper core-banking integrations."
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: "Owns founder-led bank sales, design-partner recruitment, and ROI narrative because the first deals depend on live committee triggers and executive trust."
  - role: Founding eng
    startTiming: Month 0
    rationale: "Builds the approval data model, evidence workflow, and the first provider plus bank-file integrations."
  - role: Product and compliance lead
    startTiming: Month 1
    rationale: "Translates bank policy, corridor rules, and regulator evidence requirements into templates that can scale beyond one counsel memo per deal."
  - role: Solutions engineer
    startTiming: Month 4
    rationale: "Packages customer onboarding, reconciliation setup, and deployment repeatability before bespoke implementation work overwhelms engineering."
  - role: Partnerships lead
    startTiming: Month 8
    rationale: "Builds co-sell relationships with rail providers, local counsel, and audit partners only after the first direct pilot proves value."
milestones:
  - horizon: 0–12 months
    items:
      - "Sign 3 paid bank pilots tied to active stablecoin-program committee reviews."
      - "Launch 1 production Brazil program with daily reconciliation and bank-owned evidence coverage."
      - "Prove at least 30% faster approval cycles or at least 50% lower audit-pack preparation time in the first live account."
      - "Ship reusable Brazil templates plus one provider connector and two bank file-ingestion patterns."
  - horizon: 12–24 months
    items:
      - "Convert at least 2 pilots into annual production contracts."
      - "Expand the first 2 production banks into a second corridor or second partner program."
      - "Launch Mexico-ready templates and regulator-report exports without rebuilding the core data model."
      - "Establish 1 repeatable co-sell or referral channel that consistently produces qualified bank opportunities."
  - horizon: 24–36 months
    items:
      - "Reach about 10 bank logos and roughly 12 live programs, consistent with the modeled year-3 SOM."
      - "Demonstrate that expansion revenue from added corridors, providers, and reporting modules exceeds implementation-fee revenue."
      - "Enter the first Africa or Asia corridor only after LatAm template reuse and services margins are clearly proven."
risks:
  - risk: "Bank sales and procurement cycles stretch well beyond the launch trigger."
    likelihood: High
    impact: High
    mitigation: "Prioritize accounts with an active committee review, sell paid pilots instead of multi-year transformations, and use rail-provider or counsel channels to enter funded projects."
  - risk: "Rail providers bundle enough basic approval workflow to compress pricing before the startup earns reference customers."
    likelihood: Medium
    impact: High
    mitigation: "Stay multi-provider, emphasize the bank-owned cross-provider record and audit trail, and keep OEM or white-label options open if bundling wins early deals."
  - risk: "Jurisdiction-specific controls make the product feel like consulting rather than software."
    likelihood: High
    impact: High
    mitigation: "Start with Brazil, version rules in templates, measure reuse explicitly in the second-country launch, and avoid entering new regions until template coverage is repeatable."
  - risk: "Banks or providers refuse enough data access to support daily monitoring."
    likelihood: Medium
    impact: High
    mitigation: "Design the first monitoring layer around files and read-only exports, make pre-launch approval value standalone, and contract for data rights during pilot scoping."
  - risk: "Regulators tighten stablecoin operating rules faster than banks can launch new programs."
    likelihood: Medium
    impact: High
    mitigation: "Position the product as the evidence and control layer for tighter oversight, keep human approval in the loop, and ship rule-change versioning before automation depth."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months of runway should fund 2-3 paid bank pilots, a Brazil-first approval and evidence engine, the first provider and bank-file integrations, bank-grade security and audit tooling, and a lean team spanning engineering, product or compliance, solutions, and founder-led sales."
