scenarios:
  downside:
    description: Bank committee reviews slip by one to two quarters, fewer pilots convert, and most banks stay on single-program scope longer than planned.
    y3RevenueK: 2200.0
    y3EbitdaK: -720.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Q4Y2 ends at 4 paying logos and Q4Y3 at 8 rather than 10.
    - Mature annualized revenue per logo exits near $330K instead of about $368K because fewer banks add second-corridor or reporting scope.
    - Gross margin tops out near 66% because template reuse and local-counsel work remain more manual than planned.
  base:
    description: Three paid Y1 pilots convert into 5 paying bank logos by Q4Y2 and 10 by Q4Y3 while average annualized revenue per mature logo rises through second-program and reporting attach.
    y3RevenueK: 2895.0
    y3EbitdaK: -261.2
    cashLowPointK: 825.7
    keyAssumptionChanges:
    - 3 paying logos by M12, 5 by Q4Y2, and 10 by Q4Y3.
    - Average annualized revenue per mature bank logo exits near $368K as roughly 1.2 covered programs plus modest reporting or implementation attach accumulate.
    - Headcount reaches only 10 FTE by Q4Y3, so growth depends on template reuse and partner-led distribution rather than a large direct-sales team.
  upside:
    description: A rail or counsel referral motion becomes repeatable by H2Y2, early banks expand to second corridors faster, and implementation work standardizes sooner.
    y3RevenueK: 3450.0
    y3EbitdaK: 150.0
    cashLowPointK: 930.0
    keyAssumptionChanges:
    - Q4Y2 reaches 6 paying logos and Q4Y3 reaches 11 instead of 10.
    - Mature annualized revenue per logo reaches about $390K because more banks add a second corridor and buy reporting modules sooner.
    - Gross margin reaches about 72% as file-ingestion templates and rule libraries standardize faster than in the base case.
sensitivity:
- variable: ARPU
  downsideCase: Average annualized revenue per mature logo settles near $330K because fewer banks expand beyond one program.
  baseCase: Average annualized revenue per mature logo exits near $368K.
  upsideCase: Expansion and reporting attach push mature logo value toward about $390K.
  y3RevenueImpactK: -300.0
  cashImpactK: -220.0
- variable: CAC
  downsideCase: CAC drifts toward $170K if partner referrals underperform and founder-led outbound has to do more of the work.
  baseCase: CAC is about $134.9K using total Y1–Y3 S&M spend per landed bank logo.
  upsideCase: CAC falls toward $115K once one rail or counsel channel consistently sources committee-stage opportunities.
  y3RevenueImpactK: -70.0
  cashImpactK: -190.0
- variable: churn
  downsideCase: Monthly churn rises toward 3.0% if buyers treat the wedge as a project tool instead of a system of record.
  baseCase: Monthly churn stays at 2.0% once approval templates and audit evidence are embedded.
  upsideCase: Monthly churn improves toward 1.2% after banks reuse templates across more than one corridor.
  y3RevenueImpactK: -120.0
  cashImpactK: -100.0
- variable: sales cycle
  downsideCase: Pilot-to-production conversion slips by one to two quarters because risk, legal, and operations sign-off takes longer than planned.
  baseCase: Committee-stage pilots convert inside the milestone windows and one partnerships hire plus the founder can carry the first channel motion.
  upsideCase: Strong design-partner references compress later committee reviews and speed second-bank wins.
  y3RevenueImpactK: -450.0
  cashImpactK: -360.0
- variable: gross margin
  downsideCase: Y3 gross margin stalls near 66% because corridor templates, local counsel, and file normalization stay too manual.
  baseCase: Gross margin reaches the 70% target only late in Y3 as connectors and evidence packs standardize.
  upsideCase: Y3 gross margin reaches about 72% as second-country reuse arrives with less bespoke work.
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: hiring pace
  downsideCase: A second GTM hire and extra implementation capacity are pulled forward before 5-logo proof is established.
  baseCase: The company holds GTM headcount at one partnerships lead through Y3 and only adds engineering, product, and solutions support after specific proof points.
  upsideCase: Some late-Y3 scale hires wait until the seed round because template reuse and partner sourcing do more of the work.
  y3RevenueImpactK: 40.0
  cashImpactK: -230.0
modelDiagram:
  title: stablecoin bank approval revenue loop
  mermaid: |
    flowchart LR
      CommitteeStageBanks[Committee-stage banks] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionLogos[Production bank logos]
      ProductionLogos --> ExpansionScope[Second corridors and reporting scope]
      ExpansionScope --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from scaling from 3 paying bank logos in Y1 to 10 by Q4Y3 while average logo value rises as second-program and reporting scope attach inside existing banks.
- checkName: Must go right
  finding: The company must prove one production Brazil program and one repeatable rail or counsel referral motion by Q4Y2 or the sales-cycle sensitivity dominates the model.
- checkName: Model breaks if
  finding: If committee reviews slip by one to two quarters and gross margin stays in the mid-60s because template reuse fails, the downside case turns cash negative before seed-ready proof.
- checkName: Next-round proof
  finding: The seed story is strongest once 5 paying bank logos, 2-plus production conversions, Mexico-ready templates, and clear expansion revenue inside existing banks are visible.
sanityChecks:
  ruleOf40: Y3 growth 138% + EBITDA margin -9% = 129%.
  burnMultiple: Net burn multiple improves from about 1.2x in Y2 to about 0.2x in Y3 on incremental revenue.
  revenuePerFte: $289.5K Y3 on 10 ending FTE (benchmark roughly $200–400K vertical SaaS).
  flags:
  - The base case still assumes five new bank logos land in Y3, so at least one referral or co-sell channel must become predictable rather than opportunistic.
  - Per-logo revenue assumes some banks add a second corridor or partner plus reporting scope; if banks remain single-program, Y3 revenue falls toward the downside case.
  - Gross margin only approaches the 70% target late in Y3, so persistent local-counsel or template-rewrite work would keep the model services-heavy.
  - The company holds GTM headcount flat after the first partnerships hire; if founder-led selling does not scale with partner introductions, pipeline capacity becomes the bottleneck.
  - Cash is modeled as EBITDA, so implementation prepayments, security or compliance capex, and billing timing could shift actual runway.
