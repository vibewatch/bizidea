slug: stablecoin-bank-approval-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-11] the model starts in the first full operating month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $3–5M + BP fundingAsk.runwayMonths 18 + model cash curve] the base case uses the low end of the stated range because hiring stays lean and revenue lifts before a seed round.'
- id: A3
  name: Starting paying bank logos (M1)
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0–12 months] the company starts pre-revenue and must first win committee-stage paid pilots.'
- id: A4
  name: Paying customer definition
  value: One paying bank logo under paid pilot or annual production contract; revenue per logo can include more than one covered program or corridor by Y3.
  unit: definition
  source: '[BP businessModel.unitOfValue + BP market.som 10 logos and roughly 1.2 live programs each] customersEop counts logos while revenue reflects both landing and expansion scope.'
- id: A5
  name: Paid pilot economics
  value: $100K over about 3 months (~$33K/month)
  unit: USD/logo
  source: '[BP gtm.pricing pilot $75k-$150k + BP investorMemo.firstCustomer.initialContract] the base case uses a midpoint pilot price for one partner and one corridor.'
- id: A6
  name: Mature bank-logo annualized revenue
  value: ~$368K by Q4Y3
  unit: USD/logo/year
  source: '[Research market.som 10 logos × 1.2 programs × ~$300k landing ACV = ~$3.6M + BP businessModel.expansionLevers] the base case exits slightly above the research landing ACV because some banks add reporting or second-corridor scope.'
- id: A7
  name: Customer ramp
  value: 3 paying logos by M12, 5 by Q4Y2, 10 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0–12, 12–24, and 24–36 months + Research market.som] the base case matches the stated logo milestone path rather than assuming faster broad-market expansion.'
- id: A8
  name: Revenue recognition convention
  value: Displayed revenue equals customersEop multiplied by realized period revenue per logo, rising from roughly $30K-$35K monthly in pilot-heavy Y1 to roughly $90K-$92K quarterly by late Y3 as expansion scope attaches.
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research willingnessToPay] this keeps revenue directly traceable to paying logos while allowing second-program and reporting attach inside mature banks.'
- id: A9
  name: Gross margin ramp
  value: 45%-55% in Y1, 58%-65% in Y2, 67%-70% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP risks on services-heavy deployments + Research sensitivityCases] margin starts well below target because early pilots still rely on manual rule setup, local counsel, and file reconciliation.'
- id: A10
  name: Monthly logo churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP risks + Research competitiveLandscape] the workflow should be sticky once embedded, but bundled rail-vendor tooling and long procurement cycles justify non-zero churn.'
- id: A11
  name: Hiring timeline
  value: M1 founder CEO, founding engineer, and product/compliance lead; M4 solutions engineer; M8 partnerships lead; M13 second engineer; M18 ops/compliance manager; M28 third engineer; M31 second product/compliance hire; M34 second solutions hire.
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays template-, integration-, and deployment-led until repeatable bank conversions are proven.'
- id: A12
  name: Founder loaded compensation
  value: $180K
  unit: USD/FTE/year
  source: '[BP team Founder CEO + startup-finance heuristic] lean founder cash compensation plus payroll taxes and benefits for a founder still carrying direct sales and product work.'
- id: A13
  name: Engineering loaded compensation
  value: $210K
  unit: USD/FTE/year
  source: '[BP team Founding eng + startup-finance heuristic] experienced integration and workflow engineering talent is required for bank-grade connectors, evidence pipelines, and rule versioning.'
- id: A14
  name: Product / compliance loaded compensation
  value: $180K
  unit: USD/FTE/year
  source: '[BP team Product and compliance lead + Research regulatoryLandscape + startup-finance heuristic] the role owns bank policy templates, corridor rule libraries, and regulator-ready evidence requirements.'
- id: A15
  name: Solutions / implementation loaded compensation
  value: $170K
  unit: USD/FTE/year
  source: '[BP team Solutions engineer + BP operations + startup-finance heuristic] deployments depend on packaging bank file ingestion, reconciliation setup, and repeatable onboarding playbooks.'
- id: A16
  name: GTM / partnerships loaded compensation
  value: $190K
  unit: USD/FTE/year
  source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] concentrated enterprise selling, travel, and channel management require a senior partnerships profile.'
- id: A17
  name: G&A / ops loaded compensation
  value: $130K
  unit: USD/FTE/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers finance, vendor management, security coordination, and compliance operations without building a large overhead layer.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 50% S&M / 20% R&D / 30% G&A; engineering 100% R&D; product/compliance 60% R&D / 40% G&A; solutions 35% S&M / 35% R&D / 30% G&A; GTM 100% S&M; ops 100% G&A.
  unit: allocation
  source: '[BP team role rationales + BP operations] the split reflects founder-led sales, high-touch deployments, and compliance productization work.'
- id: A19
  name: Non-payroll operating budget ramp
  value: About $26K/month in early Y1 rising to about $65K/month by Q4Y3
  unit: USD/month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers cloud, bank-grade security, legal, local counsel, insurance, audit tooling, and travel without assuming a large paid-demand engine.'
- id: A20
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A21
  name: CAC convention
  value: $134.9K using total Y1–Y3 sales and marketing spend divided by 10 paying bank logos
  unit: USD/customer
  source: '[model calc + BP gtm.funnelTargets + BP gtm.channels] this includes founder-led selling, partner development, and live committee-stage deal work across the full three-year buildout.'
- id: A22
  name: Next-round milestone for funding sizing
  value: By roughly Q4Y2 the company should have 5 paying bank logos, at least 2 production conversions, Mexico-ready templates, and one repeatable rail or counsel referral motion.
  unit: milestone
  source: '[BP fundingAsk.runwayMonths 18 + BP milestones 12–24 months + BP experimentRoadmap 12–18 months] the pre-seed is sized to reach seed-ready proof on conversions, template reuse, and channel repeatability.'
- id: A23
  name: Quarterly salary-roll convention
  value: Y2–Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] this keeps salary lines internally consistent with the staged hiring ramp.'
