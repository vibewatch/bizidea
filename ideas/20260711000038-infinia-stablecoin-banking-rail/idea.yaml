jobsToBeDone:
  - job: >-
      When a fintech partner requests stablecoin-funded settlement into our local business accounts, help our bank team
      collect and approve the right evidence, so we can launch the program without months of committee churn.
    currentAlternative: Email diligence threads, law-firm memos, spreadsheet checklists, and partner-supplied slide decks
    successMetric: Days from partner proposal to conditional approval and number of approval cycles per program
  - job: >-
      When the program is live and audit or risk review arrives, help operations prove how every stablecoin-funded
      bank-credit flow was controlled, so we can keep the program active without manual report assembly.
    currentAlternative: CSV exports from the provider, manual reconciliations, and ad hoc issue logs
    successMetric: Hours to produce review-ready evidence and number of unresolved settlement exceptions
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Two same-day sources give a clear funding and product signal, but evidence is still secondary and thin on live customer detail.
  painIntensity:
    score: 4
    rationale: Bank approval and post-launch monitoring can block revenue-bearing fintech programs, even if the pain is concentrated in a specialized partnership workflow.
  wedgeClarity:
    score: 5
    rationale: A bank-program approval workspace is a narrow first product with a concrete buyer, trigger, manual alternative, and measurable launch-time ROI.
  defensibility:
    score: 4
    rationale: Committee outcomes, corridor controls, exception patterns, and jurisdiction-specific operating evidence create sticky workflow data that rail providers and generic GRC tools do not naturally own.
  ventureScale:
    score: 5
    rationale: The first use case is one bank-program workflow, but the same system can expand across regions, partner types, monitoring, and regulator reporting for a large bank-fintech infrastructure category.
topRisks:
  - name: Bank sales drag
    description: Regional banks may agree with the thesis but still take quarters to approve new software and new stablecoin programs.
    mitigation: Start with banks that already have a live fintech-partnership team and an imminent committee review, and co-sell through infrastructure providers that create the project in the first place.
  - name: Rail-vendor bundling
    description: Infrastructure vendors like Infinia could extend their own dashboards into basic bank approval and monitoring features.
    mitigation: Stay vendor-neutral and own the bank's cross-partner governance record, committee workflow, and multi-provider operating evidence rather than raw rail execution.
  - name: Jurisdiction sprawl
    description: Rules across Latin America, Africa, and Asia may diverge enough to make the product feel like a consulting business.
    mitigation: Begin with one region and one program archetype, codify reusable control templates, and make local rule logic configurable instead of hard-coded.
