problem: >-
  Commercial banks in emerging markets are now being asked to let stablecoin-funded flows land in regulated local
  business accounts, but every new program triggers a bespoke review of partner licences, corridor rules, reserve
  mechanics, and monitoring obligations. Those approvals usually live across outside counsel memos, spreadsheet
  checklists, email threads, and one-off reports from the rail provider. Banks either slow-roll the launch or cap the
  program so tightly that fintech partners cannot scale cross-border treasury products.
targetUser:
  primary: >-
    Heads of fintech partnerships, transaction-banking risk, and program operations at mid-sized Latin American
    commercial banks evaluating stablecoin-linked settlement programs
  secondary: >-
    Compliance and operations leads at partner business-wallet fintechs serving SME importers and exporters
  buyer: Head of Transaction Banking, COO, or fintech-partnership GM at the bank
startupThesis:
  nonObviousInsight: >-
    Once stablecoins can reach local bank rails, on-chain settlement is no longer the scarce capability. The scarce
    asset is a bank-owned workflow that lets risk, operations, and finance teams approve a partner program, document why
    it is safe, and keep monitoring it after launch. The winner is not the rail provider alone; it is the control layer
    that helps a bank repeatedly say yes.
  beachhead: >-
    Mid-sized Latin American commercial banks with fintech-partnership teams evaluating stablecoin-funded settlement
    into local business accounts for business-wallet fintechs serving SME importers and exporters
  wedge: >-
    A bank-program approval workspace that collects partner licensing and KYB evidence, encodes corridor and reserve
    rules, drives committee sign-off, and then monitors daily settlement and exception evidence once the program goes
    live
  whyNowCatalyst: >-
    Infinia's new funding is explicitly earmarked for regulatory licences and multi-region expansion, showing that
    local-bank approval and ongoing operating control—not raw rail access—has become the gating workflow.
  ventureScalePath: >-
    Start with Latin American banks approving one stablecoin-linked business-settlement program, then expand into
    Africa and Asia, add ongoing monitoring and regulator reporting, and become the system of record for bank-fintech
    digital-asset settlement programs.
solution: >-
  Build a bank-program desk that sits between the bank, the fintech applicant, and the settlement infrastructure
  provider. Before launch, it collects partner licences, KYB, corridor rules, purpose-code logic, reserve mechanics,
  and approval workflows into one committee-ready packet. After go-live, it ingests daily settlement files and
  exception events to reconcile local-bank credits against stablecoin funding, flag limit breaches, and produce
  regulator-ready evidence. Banks start with one corridor and one partner, then expand the same control model across
  additional countries and program types.
goToMarketSeed:
  firstCustomer: >-
    A $5B-$30B-asset Latin American commercial bank with one live SME-payments fintech partnership and a pending
    proposal from a business-wallet partner to credit importer and exporter customers through stablecoin-funded
    settlement
  buyingTrigger: >-
    A risk-committee review, regulator pre-filing, or bank-partner launch meeting for a new stablecoin-linked
    settlement program
  currentAlternative: >-
    Outside counsel memos, spreadsheet launch checklists, email diligence packets, ad hoc dashboards, and manual
    reserve and reconciliation reports from the partner fintech or rail provider
  switchingReason: >-
    The product shortens approval cycles, gives the bank its own auditable operating evidence instead of vendor
    screenshots, and keeps monitoring portable if the bank adds or changes rail partners
  pricingHypothesis: >-
    Annual platform fee per live partner program and corridor, plus implementation fees for policy templates, reporting,
    and core-system integrations
