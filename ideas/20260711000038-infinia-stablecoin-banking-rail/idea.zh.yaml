problem: >-
  新兴市场的商业银行正面临一个新需求：让稳定币资金入账到受监管的本地企业账户。然而每个新项目都要触发一轮定制化审查——合作方牌照、走廊规则、准备金机制、持续监控义务全得过一遍。这些审批散落在外部律所备忘录、电子表格清单、邮件往来和轨道服务商的临时报告中。银行要么拖慢上线节奏，要么把项目框得极紧，导致金融科技合作伙伴无法规模化跨境资金产品。
targetUser:
  primary: >-
    拉丁美洲中型商业银行中负责金融科技合作、交易银行风控和项目运营的部门负责人，正在评估稳定币关联结算方案
  secondary: >-
    服务中小企业进出口商的合作方商务钱包金融科技公司中的合规和运营负责人
  buyer: 银行交易银行部负责人、COO 或金融科技合作 GM
startupThesis:
  nonObviousInsight: >-
    稳定币一旦能落到本地银行轨道，链上结算本身就不再稀缺。真正稀缺的是一套银行自有的工作流：让风控、运营和财务团队批准一个合作项目、记录它为何安全、上线后持续监控。赢家不只是轨道服务商——而是帮银行反复说"可以"的那个控制层。
  beachhead: >-
    拉丁美洲中型商业银行，拥有金融科技合作团队，正在评估稳定币资金结算入本地企业账户——服务对象为面向中小进出口商的商务钱包金融科技公司
  wedge: >-
    一个银行项目审批工作台：收集合作方牌照和 KYB 证据，编码走廊与准备金规则，推动委员会签批，上线后持续监控每日结算和异常凭证
  whyNowCatalyst: >-
    Infinia 的新一轮融资明确标注用于监管牌照和多区域扩张，证明本地银行审批和持续运营管控——而非原始轨道接入——已成为卡住项目的核心工作流。
  ventureScalePath: >-
    从拉丁美洲银行审批第一个稳定币关联企业结算项目起步，扩展至非洲和亚洲，叠加持续监控和监管报告模块，最终成为银行-金融科技数字资产结算项目的系统记录。
solution: >-
  搭建一个银行项目工作台，嵌入银行、金融科技申请方和结算基础设施服务商之间。上线前，它收集合作方牌照、KYB、走廊规则、用途代码逻辑、准备金机制和审批工作流，打包成一份委员会可审议的完整材料。上线后，它接入每日结算文件和异常事件，对本地银行入账与稳定币资金做对账、标记限额违规、生成监管可查的凭证。银行先从一条走廊、一个合作方开始，再把同一套管控模型复制到更多国家和项目类型。
goToMarketSeed:
  firstCustomer: >-
    一家资产规模 $5B–$30B 的拉丁美洲商业银行，已有一个中小企业支付金融科技合作伙伴在运营，同时有一个商务钱包合作方提交了方案——希望通过稳定币资金结算为进出口客户入账
  buyingTrigger: >-
    风控委员会审查、监管预备案或银行-合作方就新稳定币关联结算项目召开的启动会
  currentAlternative: >-
    外部律所备忘录、电子表格上线清单、邮件尽调包、临时拼凑的仪表板，以及合作方金融科技或轨道服务商提供的手工准备金和对账报告
  switchingReason: >-
    产品缩短审批周期，让银行拥有自己的可审计运营凭证（而非依赖厂商截图），并在银行更换或新增轨道合作伙伴时保持监控的可移植性
  pricingHypothesis: >-
    按每个上线合作项目和走廊收取年度平台费，另加策略模板、报告和核心系统集成的实施费
