scenarios:
  downside:
    description: 银行委员会审查推迟一到两个季度，更少试点转化，多数银行在单项目范围内停留更久。
    y3RevenueK: 2200.0
    y3EbitdaK: -720.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Q4Y2 以 4 家付费客户收尾、Q4Y3 为 8 家而非 10 家。
    - 成熟客户年化收入约 $330K 退出——更少银行加第二走廊或报告范围。
    - 毛利率最高约 66%——模板复用和本地律所工作仍比计划更手工化。
  base:
    description: Y1 的 3 个付费试点转为 Q4Y2 的 5 家付费客户和 Q4Y3 的 10 家，成熟客户年化收入通过第二项目和报告附加逐步提升。
    y3RevenueK: 2895.0
    y3EbitdaK: -261.2
    cashLowPointK: 825.7
    keyAssumptionChanges:
    - M12 达 3 家付费客户、Q4Y2 达 5 家、Q4Y3 达 10 家。
    - 成熟银行客户年化收入约 $368K 退出——约 1.2 个覆盖项目加少量报告或实施附加。
    - Q4Y3 团队仅 10 FTE——增长依赖模板复用和合作伙伴分发而非大规模直销团队。
  upside:
    description: 轨道或律所引荐动作在 H2Y2 变得可重复，早期银行更快扩展到第二走廊，实施标准化提前。
    y3RevenueK: 3450.0
    y3EbitdaK: 150.0
    cashLowPointK: 930.0
    keyAssumptionChanges:
    - Q4Y2 达 6 家付费客户、Q4Y3 达 11 家而非 10 家。
    - 成熟客户年化收入约 $390K——更多银行追加第二走廊并更早买报告模块。
    - 毛利率约 72%——文件接入模板和规则库比基准更快标准化。
sensitivity:
- variable: ARPU
  downsideCase: 成熟客户年化收入约 $330K——更少银行扩展到多项目。
  baseCase: 成熟客户年化收入约 $368K 退出。
  upsideCase: 扩展和报告附加把成熟客户价值推向约 $390K。
  y3RevenueImpactK: -300.0
  cashImpactK: -220.0
- variable: CAC
  downsideCase: 合作伙伴引荐不及预期且创始人主导外呼须承担更多工作时，CAC 漂向 $170K。
  baseCase: CAC 约 $134.9K——用 Y1–Y3 总 S&M 支出/落地银行客户数。
  upsideCase: 一条轨道或律所渠道持续供给委员会阶段机会后，CAC 降向 $115K。
  y3RevenueImpactK: -70.0
  cashImpactK: -190.0
- variable: 流失率
  downsideCase: 买方把产品当项目工具而非系统记录时，月流失升向 3.0%。
  baseCase: 审批模板和审计凭证嵌入后月流失保持 2.0%。
  upsideCase: 银行在多走廊复用模板后月流失改善至 1.2%。
  y3RevenueImpactK: -120.0
  cashImpactK: -100.0
- variable: 销售周期
  downsideCase: 试点到生产转化推迟一到两个季度——风控、法务和运营签批耗时超计划。
  baseCase: 委员会阶段试点在里程碑窗口内转化，一名合作伙伴负责人加创始人可撑起首条渠道动作。
  upsideCase: 强共创客户参考压缩后续委员会审查、加速第二家银行赢单。
  y3RevenueImpactK: -450.0
  cashImpactK: -360.0
- variable: 毛利率
  downsideCase: 走廊模板、本地律所和文件标准化仍太手工时，Y3 毛利率停在约 66%。
  baseCase: 毛利率仅在 Y3 后期随连接器和凭证包标准化才接近 70% 目标。
  upsideCase: 第二国复用带来更少定制工作，Y3 毛利率约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: 招聘节奏
  downsideCase: 在 5 客户证明之前就提前招第二名 GTM 和额外实施产能。
  baseCase: 公司在 Y3 内保持 GTM 仅一名合作伙伴负责人，只在特定证据点后新增工程、产品和解决方案支持。
  upsideCase: 部分 Y3 后期规模化岗位推迟到 seed 轮——模板复用和合作伙伴供给承担更多增长。
  y3RevenueImpactK: 40.0
  cashImpactK: -230.0
modelDiagram:
  title: 稳定币银行审批收入循环
  mermaid: |
    flowchart LR
      CommitteeStageBanks[Committee-stage banks] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionLogos[Production bank logos]
      ProductionLogos --> ExpansionScope[Second corridors and reporting scope]
      ExpansionScope --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入从 Y1 的 3 家付费银行客户增长到 Q4Y3 的 10 家，同时成熟客户价值随第二项目和报告范围附加而上升。
- checkName: 必须顺利的事
  finding: 公司须在 Q4Y2 前证明一个巴西生产项目和一条可重复的轨道或律所引荐动作，否则销售周期敏感性将主导模型。
- checkName: 模型崩溃条件
  finding: 委员会审查推迟一到两个季度且毛利率因模板复用失败停在 60% 中段时，悲观情景在 seed-ready 证明之前现金转负。
- checkName: 下轮证明
  finding: seed 故事在 5 家付费银行客户、2+ 个生产转化、墨西哥规则模板和现有银行内可见扩展收入时最强。
sanityChecks:
  ruleOf40: Y3 增长 138% + EBITDA 利润率 -9% = 129%。
  burnMultiple: 净烧钱倍数从 Y2 约 1.2x 改善到 Y3 约 0.2x（基于增量收入）。
  revenuePerFte: Y3 $289.5K / 10 FTE（垂直 SaaS 基准约 $200–400K）。
  flags:
  - 基准仍假设 Y3 落地 5 家新银行客户——至少一条引荐或共销渠道须从机会主义变为可预测。
  - 客户年化收入假设部分银行追加第二走廊/合作方和报告范围；若银行停留单项目，Y3 收入滑向悲观值。
  - 毛利率仅在 Y3 后期接近 70% 目标——持续的本地律所或模板重写工作将使模型偏服务化。
  - 公司在首名合作伙伴负责人之后保持 GTM 人数不变；若创始人主导销售无法通过合作伙伴引荐规模化，管线产能将成瓶颈。
  - 现金按 EBITDA 建模——实施预付款、安全/合规资本支出和账单时差可能移动实际跑道。
