slug: stablecoin-bank-approval-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-11] 模型从商业计划日期后的第一个完整运营月开始。'
- id: A2
  name: 开业现金 / pre-seed 融资
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $3–5M + BP fundingAsk.runwayMonths 18 + 模型现金曲线] 基准用区间低端——招聘精简且收入在 seed 轮前就有拉升。'
- id: A3
  name: 起步付费银行客户数 (M1)
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0–12 months] 公司从零收入起步，须先赢得委员会阶段的付费试点。'
- id: A4
  name: 付费客户定义
  value: 一家处于付费试点或年度生产合同下的银行客户；到 Y3 每个客户可覆盖多于一个项目或走廊。
  unit: definition
  source: '[BP businessModel.unitOfValue + BP market.som 10 logos and roughly 1.2 live programs each] customersEop 按客户数计，收入反映落地和扩展范围。'
- id: A5
  name: 付费试点经济模型
  value: 约 3 个月 $100K（约 $33K/月）
  unit: USD/logo
  source: '[BP gtm.pricing pilot $75k-$150k + BP investorMemo.firstCustomer.initialContract] 基准取一个合作方+一条走廊试点的中位价。'
- id: A6
  name: 成熟银行客户年化收入
  value: Q4Y3 约 $368K
  unit: USD/logo/year
  source: '[Research market.som 10 logos × 1.2 programs × ~$300k landing ACV = ~$3.6M + BP businessModel.expansionLevers] 基准略高于研究中的落地 ACV——部分银行追加报告或第二走廊范围。'
- id: A7
  name: 客户增长节奏
  value: M12 达 3 家、Q4Y2 达 5 家、Q4Y3 达 10 家
  unit: customersEop
  source: '[BP milestones 0–12, 12–24, and 24–36 months + Research market.som] 基准匹配里程碑路径，不假设更快的广泛市场扩张。'
- id: A8
  name: 收入确认惯例
  value: 显示收入 = 期末付费客户数 × 实际周期内每客户收入，从 Y1 试点密集期约 $30K–$35K/月升至 Y3 后期约 $90K–$92K/季——随扩展范围附加。
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research willingnessToPay] 收入直接可追溯到付费客户数，同时允许成熟银行内的第二项目和报告附加。'
- id: A9
  name: 毛利率爬坡
  value: Y1 45%–55%，Y2 58%–65%，Y3 67%–70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP risks on services-heavy deployments + Research sensitivityCases] 利润率起步远低于目标——早期试点仍依赖手工规则搭建、本地律所和文件对账。'
- id: A10
  name: 月度客户流失率
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP risks + Research competitiveLandscape] 工作流一旦嵌入应有粘性，但轨道厂商捆绑工具和长采购周期证明非零流失合理。'
- id: A11
  name: 招聘时间线
  value: M1 创始人/CEO、创始工程师和产品/合规负责人；M4 解决方案工程师；M8 合作伙伴负责人；M13 第二名工程师；M18 运营/合规经理；M28 第三名工程师；M31 第二名产品/合规；M34 第二名解决方案。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘保持以模板、集成和部署为导向——直到可重复的银行转化被验证。'
- id: A12
  name: 创始人含社保薪酬
  value: $180K
  unit: USD/FTE/year
  source: '[BP team Founder CEO + startup-finance heuristic] 精简创始人现金薪酬加工资税和福利——创始人仍兼直销和产品工作。'
- id: A13
  name: 工程含社保薪酬
  value: $210K
  unit: USD/FTE/year
  source: '[BP team Founding eng + startup-finance heuristic] 银行级连接器、凭证管道和规则版本化需要有经验的集成和工作流工程人才。'
- id: A14
  name: 产品/合规含社保薪酬
  value: $180K
  unit: USD/FTE/year
  source: '[BP team Product and compliance lead + Research regulatoryLandscape + startup-finance heuristic] 该岗位负责银行策略模板、走廊规则库和监管凭证要求。'
- id: A15
  name: 解决方案/实施含社保薪酬
  value: $170K
  unit: USD/FTE/year
  source: '[BP team Solutions engineer + BP operations + startup-finance heuristic] 部署依赖打包银行文件接入、对账搭建和可重复入驻手册。'
- id: A16
  name: GTM/合作伙伴含社保薪酬
  value: $190K
  unit: USD/FTE/year
  source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] 集中式企业销售、差旅和渠道管理需要资深合作伙伴画像。'
- id: A17
  name: G&A/运营含社保薪酬
  value: $130K
  unit: USD/FTE/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 覆盖财务、厂商管理、安全协调和合规运营——不建大规模管理层。'
- id: A18
  name: 人力成本分配到 P&L 行
  value: 创始人 50% S&M / 20% R&D / 30% G&A；工程 100% R&D；产品/合规 60% R&D / 40% G&A；解决方案 35% S&M / 35% R&D / 30% G&A；GTM 100% S&M；运营 100% G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 分配反映创始人主导销售、高触达部署和合规产品化工作。'
- id: A19
  name: 非人力运营预算爬坡
  value: Y1 早期约 $26K/月升至 Q4Y3 约 $65K/月
  unit: USD/month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 覆盖云、银行级安全、法律、本地律所、保险、审计工具和差旅——不假设大规模付费获客引擎。'
- id: A20
  name: 现金转换惯例
  value: 现金变动 = EBITDA
  unit: formula
  source: '[startup-finance heuristic] pre-seed 阶段假设资本支出、税费、融资成本和营运资金时差均不重大。'
- id: A21
  name: CAC 惯例
  value: Y1–Y3 总销售和营销支出 ÷ 10 家付费银行客户 = $134.9K
  unit: USD/customer
  source: '[model calc + BP gtm.funnelTargets + BP gtm.channels] 包含创始人主导销售、合作伙伴开发和三年完整建设期内的活跃委员会阶段交易工作。'
- id: A22
  name: 下轮融资里程碑（用于融资规模设定）
  value: 约 Q4Y2 公司应有 5 家付费银行客户、至少 2 个生产转化、墨西哥规则模板和一条可重复的轨道或律所引荐动作。
  unit: milestone
  source: '[BP fundingAsk.runwayMonths 18 + BP milestones 12–24 months + BP experimentRoadmap 12–18 months] pre-seed 规模旨在达到 seed-ready 的转化、模板复用和渠道可重复性证明。'
- id: A23
  name: 季度薪资滚动惯例
  value: Y2–Y3 薪资行使用各季度内的实际月度入职数，而非仅取季度末快照
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] 使薪资行与分阶段招聘计划内部一致。'
