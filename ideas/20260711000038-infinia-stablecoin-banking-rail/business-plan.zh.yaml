slug: stablecoin-bank-approval-os
date: "2026-07-11"
executiveSummary: >-
  Stablecoin Bank Approval OS 应以巴西为首站，作为拉丁美洲中型商业银行审核一个稳定币资金结算入本地企业账户项目的管控层。紧迫痛点不在于轨道连通本身，而在于把合作方牌照、KYB、走廊规则、准备金设计和释放条件转化为一份银行自有审批材料——能经得住委员会、审计和监管审查。MVP 应覆盖一家银行、一个合作方金融科技、一条走廊，整合尽调收集、策略模板、签批工作流和上线后每日凭证对账。这个切口比再做一个跨境支付 API 更窄也更快出结果——Pix 和 SPEI 关联的出金能力已经存在，银行审批和监控仍是定制化的。GTM 应瞄准一家 $5B–$30B 银行——在稳定币关联中小企业贸易项目进入风控委员会或监管预备案的时刻切入，先卖绑定一次上线的付费试点，按上线项目或走廊定价而非按席位。研究支持估算 TAM $315.0M、拉丁美洲 SAM $44.1M、第 3 年 SOM $3.6M，但这些数字假设稳定币结算集中在审批痛点尖锐的机构资金和贸易走廊中。最大的反面风险是：银行政策差异让部署过于服务化，或轨道服务商捆绑足够多的浅层治理工具堵死独立预算。公开信息仍未指明具名的活跃银行共创客户、基准拒绝/异常率或真实采购周期，因此前 90 天必须收集委员会审批材料并关闭至少一个付费试点，才足以支撑更强的投资人信心。
problem:
  - "评估稳定币资金结算的商业银行仍在拼凑外部律所备忘录、电子表格、邮件往来和厂商仪表板，来判断一个合作项目是否安全到可以上线。"
  - "上线后，银行往往缺少自己的每日凭证——把本地账户入账、准备金机制和异常处理串在一起——审计因此变慢，扩展到新走廊或新服务商风险很高。"
solution:
  - "提供银行自有工作台：收集合作方牌照、KYB、账户结构、走廊规则、准备金逻辑和委员会审批，整合为一个版本化的单项目上线包。"
  - "叠加对服务商事件和银行结算文件的只读接入，运营团队可每日对账、标记违规、导出监管可查凭证——不再依赖轨道厂商截图。"
whyWeWin:
  - "创业公司卖的是轨道执行、通用 GRC 和加密监控工具之间的审批与凭证空白地带：银行要的是中立系统记录，不是又一个支付网络。"
  - "巴西优先切口让产品对齐最尖锐的监管痛点——持牌机构、资金隔离和报告要求使可复用管控模板立刻有价值。"
  - "每次部署都积累审批结果、走廊模板和跨服务商异常数据，任何单一轨道厂商或内部工作流都难以快速复制。"
strategicChoices:
  beachhead: "BCB 持牌的巴西中型商业银行，正审核一个 Pix 关联稳定币资金结算项目——服务对象为面向中小进出口企业的金融科技合作方。"
  wedgeRationale: >-
    巴西比宽泛的拉丁美洲上线更快出结果：Pix 驱动的出款预期已成主流，而第 561 号决议和配套报告要求迫使银行自己拥有审批逻辑。在这个环境下拿下一个受监管银行项目，就能证明产品能解决最难的可见委员会问题，再向更容易的走廊扩展。
  sequencingRationale: >-
    先做上线前审批材料和一家银行、一个合作方、一条走廊的只读每日凭证——预算触发点和数据可得性都在这里。只有在证明了更短审批周期、可复用模板和稳定的监控输入之后，才应加更多国家、更深集成、更广资金分析或上线后自动化；否则产品范围和招聘会漂向咨询化。
  notYet:
    - "直接资金移动、托管或外汇执行"
    - "零售稳定币或消费者汇款工作流"
    - "上线即覆盖拉丁美洲、非洲和亚洲全部国家规则"
    - "完整交易监控替代或自主风险决策"
market:
  tam: "估算 TAM $315.0M——拉丁美洲、非洲和亚洲约 300 家目标银行，每银行约 3 个上线项目，每部署约 $350k 年度 ACV。"
  sam: "估算拉丁美洲 SAM $44.1M——巴西、墨西哥、阿根廷、哥伦比亚、智利和秘鲁约 70 家中型银行买方，每银行约 1.8 个近期项目。"
  som: "模型化第 3 年 SOM $3.6M——约 10 家银行客户，每家约 1.2 个上线项目，每项目约 $300k 落地 ACV。"
  segments:
    - "主要：巴西和墨西哥中型商业银行——为中小企业贸易或钱包合作方审批稳定币资金结算入本地企业账户"
    - "次要：阿根廷、哥伦比亚、智利、秘鲁的区域银行，以及需要同一管控模型的银行合作方商务钱包金融科技公司"
  buyingProcess: >-
    运营发起人通常是金融科技合作或交易银行负责人，但预算释放归属交易银行负责人、COO 或金融科技合作 GM——因为银行在审批政策、审计和第三方风险。交易应围绕即将到来的委员会审查或监管预备案启动，仅在风控、法务、运营和合规批准一个活跃项目后才扩展。
product:
  mvp: >-
    MVP 覆盖一家银行、一个合作方金融科技、一条走廊：收集牌照和 KYB 证据，映射到银行专属策略模板，路由委员会签批，上线后接入每日结算或异常文件。人工审批保持强制——首个胜利是更快的银行管控凭证，而非自主项目审批。
  sixMonth: "为一家巴西银行交付共创客户版本——委员会工作流、合作方证据收集、巴西规则模板、一个服务商数据连接器和一个活跃项目的每日对账。"
  twelveMonth: "把 2–3 个试点转为生产合同，为试点中遇到的首个服务商和银行文件格式打包连接器，上线墨西哥规则模板版本化和审计包导出。"
  twentyFourMonth: "扩展到多服务商监控、监管报告包和现有银行内的第二走廊上线，之后才进入拉丁美洲以外的新区域。"
  keyBets:
    - "银行会先为中立审批与凭证层付费，再为另一个执行网络付费。"
    - "单国模板能覆盖银行审批工作流的足够部分以保持软件利润率，而非让每次部署变成法律服务。"
    - "只读服务商事件和银行结算文件足以证明监控价值，无需更深的核心银行集成。"
    - "服务商中立的治理历史对银行的重要性高于厂商捆绑的仪表板——一旦他们加第二服务商、第二走廊或审计审查。"
gtm:
  wedge: "向一家 $5B–$30B 的商业银行卖一个巴西优先的付费试点——该银行已有一个中小企业支付金融科技合作伙伴且稳定币项目委员会审查迫在眉睫——覆盖一个合作方和一条走廊，再铺更广。"
  channels:
    - "创始人主导的直销——面向中型拉丁美洲银行中交易银行负责人、金融科技合作负责人和 COO，时机卡在活跃项目审查阶段"
    - "与稳定币轨道和编排服务商共同销售——他们创造上线项目但不拥有银行的跨服务商治理记录"
    - "通过本地合规律所、审计事务所和资金/支付集成商引荐——他们已在塑造银行策略模板"
  funnelTargets: "银行引荐→委员会阶段合格机会 20–25%，合格机会→付费试点 25–35%，试点→生产 50%+，生产银行→12 个月内第二走廊或第二合作方扩展 60%+。"
  pricing: >-
    收取一个 8–12 周付费试点约 $75k–$150k——覆盖一个合作项目和一条走廊，然后转为约 $250k–$350k 年度平台价值/上线项目或走廊，另加规则模板、报告和数据集成的实施费；买方为更快审批、银行自有审计凭证和更低的异常处理人力付费，而非按席位。
businessModel:
  revenueStreams:
    - "按上线合作项目或走廊收取的年度 SaaS 订阅（审批+监控覆盖）"
    - "策略搭建、银行文件接入和凭证导出的实施与集成费"
    - "现有银行内新增合作方、走廊或服务商连接器的扩展费"
    - "上线后数据就绪后的高级监管报告和异常分析模块"
  unitOfValue: "银行自有审批与凭证覆盖下的上线合作项目和走廊"
  targetGrossMarginPct: 70
  expansionLevers:
    - "从一个已审批合作项目扩展到同一银行内多条走廊"
    - "保持一份银行自有治理记录的同时新增第二、第三轨道服务商"
    - "监控数据积累后追加监管报告、审计包和异常分析"
    - "拉丁美洲模板可复用后再进入非洲和亚洲——仅在第一套管控库验证可重复之后"
strategyMap:
  northStarMetric: "通过平台上线且保持每日对账和审计就绪的活跃稳定币结算项目数"
  inputMetrics:
    - "绑定活跃委员会审查或监管预备案的合格银行机会"
    - "从合作方提案到有条件银行审批的中位天数"
    - "每个项目上线前的平均委员会轮次"
    - "每日自动对账的结算和异常事件占比"
    - "超过 24 小时未解决的高严重度异常"
    - "从一个项目扩展到第二走廊或第二合作方的生产银行数"
  moatsToBuild:
    - "辖区级委员会模板和管控库——跨银行和走廊可复用"
    - "审批结果数据集——展示哪些合作方画像、准备金结构和凭证包最快通过委员会"
    - "跨服务商异常历史——串联本地银行入账、稳定币资金和运营释放条件"
    - "监管可查凭证包——嵌入银行自己的审计轨迹而非厂商截图"
  killCriteria:
    - "前 15 家 ICP 银行中少于 3 家分享真实委员会材料或同意做范围内工作流评估——说明痛点不够紧迫。"
    - "前 2 个付费试点未能把审批周期缩短至少 30% 或审计材料准备工时降低至少 50%（相对于电子表格+律所基线）。"
    - "前 3 条走廊中超过 40% 的必要管控在模板化后仍需定制法律或服务工作——说明产品不像软件。"
  mermaid: |
    flowchart LR
      Wedge[Brazil first bank approval wedge] --> MVP[One bank one corridor approval and evidence MVP]
      MVP --> Proof[Faster committee sign off and daily reconciled evidence]
      Proof --> Expansion[Multi corridor multi provider bank governance platform]
investorMemo:
  verdict:
    call: "观察"
    conviction: "买方痛点尖锐、市场时机清晰，但信心仍处中等——需要公司证明一个付费银行试点和跨走廊模板复用后才能升级。"
    whyBelieve: "银行正成为稳定币结算的主动运营节点，但轨道服务商和合规工具仍不拥有中立审批备忘录和银行自有凭证链。"
    whyDoubt: "公开证据仍缺少具名银行客户、已量化的审批周期节省，以及巴西优先的监管复杂度能否产品化而不漂向咨询的证明。"
    nextDiligence: "确保 2–3 家共创银行、一个付费委员会阶段试点，以及审批天数、委员会轮次和审计材料工时的前后对比数据。"
  firstCustomer:
    title: "BCB 持牌巴西中型商业银行交易银行负责人"
    profile: "一家 $5B–$30B 资产银行，已有一个中小企业支付金融科技合作关系，且正处理一个待决请求——让稳定币资金通过本地轨道出金入账到进出口企业账户。"
    trigger: "新合作方提案进入风控委员会或监管预备案——银行须在上线前论证牌照、账户结构、准备金、对账和持续监控设计。"
    buyer: "交易银行负责人或 COO"
    initialContract: "8–12 周付费试点约 $75k–$150k——覆盖一个合作项目和一条走廊；首个项目审批通过且监控上线后转为约 $250k–$350k 年度平台价值加实施费。"
  mustBeTrue:
    - "前 15 家滩头银行中至少 8 家描述稳定币项目审批为当前的多团队项目，而非理论上的未来工作流。"
    - "前 5 个合格银行机会中至少 2 家在要求捆绑轨道厂商方案之前签署付费试点。"
    - "前 2 个试点须把审批周期缩短至少 30% 或审计/凭证准备工时降低至少 50%。"
    - "一套通用管控 schema 须在首批巴西和墨西哥部署中覆盖至少 80% 的审批字段——无需银行逐一定制代码。"
    - "服务商和银行数据接口须支持试点范围内至少 80% 的结算和异常事件自动对账。"
  diligenceQuestions:
    - "3 家具名巴西或墨西哥银行在首个稳定币资金结算审批前究竟要求哪些文件、阈值和签批节点？"
    - "该项目的预算和采购归谁：交易银行、COO、风控还是数字合作部门？"
    - "审批材料中多大比例可跨银行模板化，多少必须每次与本地律所重写？"
    - "Infinia、Trace、Bitso 或 Circle 级合作方会共同销售并共享数据，还是搭自己的浅层治理工具？"
    - "审批天数、委员会轮次和组装审计/监管凭证所需工时的当前基线是多少？"
operatingAssumptions:
  - assumption: "银行会在大交易量形成之前就为上线就绪和审计凭证软件付费。"
    basis: research.yaml
    validationTest: "围绕活跃上线审查跑 6 轮发现-提案流程，拿下至少 2 个有具名高管赞助的付费试点。"
    decisionImpact: "若不成立，GTM 须上移到轨道服务商或合规合作方，把工作流嵌入更大的实施预算中。"
  - assumption: "巴西优先管控模板可以用大部分可配置规则适配墨西哥和阿根廷，而非定制服务。"
    basis: research.yaml
    validationTest: "从跨 2 国至少 3 家银行收集委员会清单，证明一套核心 schema 覆盖至少 80% 的必要字段和审查逻辑。"
    decisionImpact: "若不成立，须收窄地理范围、提价以反映服务负荷，或推迟多国扩张。"
  - assumption: "只读服务商事件和银行结算文件足以证明上线后监控价值。"
    basis: idea.yaml
    validationTest: "在首个试点中接入一个服务商 feed 和一份银行文件导出，自动对账至少 80% 的结算和异常事件。"
    decisionImpact: "若不成立，产品应收窄到上线前审批软件——等更深集成商业可行后再扩监控。"
  - assumption: "银行看重服务商中立治理记录，不会默认退回轨道厂商仪表板。"
    basis: idea.yaml
    validationTest: "在 5 次银行+服务商联合讨论中确认至少 3 家银行倾向银行自有的跨服务商记录，并愿单独或在试点预算内付费。"
    decisionImpact: "若不成立，应转向 OEM 或白牌分发，而非独立销售。"
  - assumption: "创始人主导销售能在 6–9 个月周期内关闭委员会阶段的银行试点。"
    basis: 经验判断
    validationTest: "追踪前 10 个 ICP 机会，确认至少 3 个在 120 天内进入提案阶段、至少 1 个在 270 天内关闭。"
    decisionImpact: "若不成立，融资规模和招聘计划须假设更长企业周期和更重的渠道依赖。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "从 5–8 家滩头银行收集真实委员会清单、外部律所备忘录和被拒项目材料。"
    hypothesis: "各银行的审批工作流足够相似，可以支撑可复用证据 schema 和管控模板库。"
    successMetric: "至少 3 家银行分享真实材料，一套核心 schema 映射样本中至少 80% 的必要字段。"
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: "为一家共创银行用手工收集的合作方和走廊数据陪跑一份委员会可审议的上线材料。"
    hypothesis: "中立审批材料在全自动化之前就有价值，能赢得高管赞助签署付费试点。"
    successMetric: "一位银行赞助人认可该材料明显优于现有电子表格+律所流程，并签署付费试点 SOW。"
    owner: 产品与合规负责人
  - horizon: 0–90 天
    experiment: "接入一个轨道服务商状态 feed 和一份银行结算文件到原型对账视图。"
    hypothesis: "只读数据接入足以产出有用的上线后凭证，无需替换核心支付系统。"
    successMetric: "原型对账一个样本项目中至少 80% 的结算和异常事件。"
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: "为一家银行、一个合作方、一条走廊跑首个巴西付费试点。"
    hypothesis: "MVP 能把审批周期缩短到足以支撑生产合同。"
    successMetric: "试点把审批天数缩短至少 30%，或相比基线减少至少一整个委员会轮次。"
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: "与 2 家轨道服务商和 1 家本地律所/审计合作方测试一条共销路径。"
    hypothesis: "渠道合作方会主动推荐合格机会——因为他们创造项目但不拥有治理记录。"
    successMetric: "通过合作方渠道获得至少 3 个合格银行引荐和 1 个联合试点提案。"
    owner: 创始人/CEO
  - horizon: 6–12 个月
    experiment: "在首个生产银行开通每日监控和凭证导出。"
    hypothesis: "银行自有对账和异常历史能降低上线后审计材料准备的人力。"
    successMetric: "审计或监管凭证准备时间降低至少 50%，且试点范围内无高严重度异常超过 48 小时未解决。"
    owner: 解决方案工程师
  - horizon: 12–18 个月
    experiment: "在墨西哥用第二服务商或走廊复制首国方案。"
    hypothesis: "规则库和运营模型可跨拉丁美洲迁移，无需定制重建。"
    successMetric: "第二国部署上线所需定制开发量不超过首家银行的 25%。"
    owner: 产品与合规负责人
operations:
  - "维护辖区和走廊规则库——版本控制，绑定本地律所审查和变更日志到每个银行项目。"
  - "运行合作项目入驻工作流——上线前覆盖牌照、KYB、账户结构、准备金机制和委员会审批。"
  - "接入服务商事件、银行结算文件和准备金/异常报告到每日对账与凭证管道。"
  - "保持银行自有审计轨迹、访问控制和可导出凭证包——供委员会、监管和内部审查使用。"
  - "为单服务商或单走廊上线打包实施手册——深入核心银行集成之前先做标准化。"
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: "负责创始人主导的银行销售、共创客户招募和 ROI 叙事——首批交易取决于活跃委员会触发点和高管信任。"
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: "搭建审批数据模型、凭证工作流和首批服务商+银行文件集成。"
  - role: 产品与合规负责人
    startTiming: 第 1 个月
    rationale: "把银行政策、走廊规则和监管凭证要求转化为可规模化的模板——摆脱每笔交易一份律所备忘录。"
  - role: 解决方案工程师
    startTiming: 第 4 个月
    rationale: "把客户入驻、对账搭建和部署可重复性打包——在定制实施工作压垮工程团队之前。"
  - role: 合作伙伴负责人
    startTiming: 第 8 个月
    rationale: "在首个直销试点证明价值之后，才搭建与轨道服务商、本地律所和审计合作方的共销关系。"
milestones:
  - horizon: 0–12 个月
    items:
      - "签下 3 个绑定活跃稳定币项目委员会审查的付费银行试点。"
      - "上线 1 个巴西生产项目——每日对账和银行自有凭证覆盖。"
      - "在首个活跃账户中证明审批周期快至少 30% 或审计材料准备工时降至少 50%。"
      - "交付可复用巴西模板、一个服务商连接器和两种银行文件接入模式。"
  - horizon: 12–24 个月
    items:
      - "至少 2 个试点转为年度生产合同。"
      - "前 2 家生产银行扩展到第二走廊或第二合作项目。"
      - "上线墨西哥规则模板和监管报告导出——无需重建核心数据模型。"
      - "建立 1 条可重复的共销或引荐渠道，持续产出合格银行机会。"
  - horizon: 24–36 个月
    items:
      - "达到约 10 家银行客户和约 12 个活跃项目——与模型化第 3 年 SOM 一致。"
      - "证明来自新增走廊、服务商和报告模块的扩展收入超过实施费收入。"
      - "仅在拉丁美洲模板复用和服务利润率被明确验证后，才进入首条非洲或亚洲走廊。"
risks:
  - risk: "银行销售和采购周期远超上线触发点。"
    likelihood: High
    impact: High
    mitigation: "优先瞄准有活跃委员会审查的客户，卖付费试点而非多年转型合同，并通过轨道服务商或律所渠道进入已有预算的项目。"
  - risk: "轨道服务商在创业公司拿到参考客户之前就捆绑足够多的基础审批工作流来压缩定价。"
    likelihood: Medium
    impact: High
    mitigation: "保持多服务商定位，强调银行自有的跨合作方记录和审计轨迹，在捆绑赢早期交易时保留 OEM 或白牌选项。"
  - risk: "辖区级管控使产品更像咨询而非软件。"
    likelihood: High
    impact: High
    mitigation: "从巴西起步，把规则版本化到模板中，在第二国上线时显式度量复用率，模板覆盖可重复之前不进新区域。"
  - risk: "银行或服务商不给足够数据接入来支撑每日监控。"
    likelihood: Medium
    impact: High
    mitigation: "首个监控层围绕文件和只读导出设计，上线前审批价值独立，试点范围内合同约定数据权利。"
  - risk: "监管方收紧稳定币运营规则的速度超过银行能上线新项目的速度。"
    likelihood: Medium
    impact: High
    mitigation: "把产品定位为更严格监管下的凭证和管控层，保留人工审批环节，先交付规则变更版本化再做自动化深度。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月跑道应覆盖 2–3 个付费银行试点、巴西优先审批与凭证引擎、首批服务商和银行文件集成、银行级安全与审计工具，以及涵盖工程、产品/合规、解决方案和创始人主导销售的精简团队。"
