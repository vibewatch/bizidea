  adoptionFrictionMatrix:
  - friction: Incomplete timesheet, milestone, or proof-of-service data
    severity: high
    affectedBuyer: CFO / risk operations
    mitigation: Start with staffing and freelancer workflows where approvals are explicit, then sell read-only eligibility scoring before full automation.
    sourceRefs:
    - 18
    - 19
    - 23
  - friction: Single-funder lock-in and lender-specific reporting
    severity: medium
    affectedBuyer: CFO / treasury
    mitigation: Lead with portable lender-ready packets and multi-funder reporting rather than a new balance-sheet product.
    sourceRefs:
    - 18
    - 21
    - 27
  - friction: Cross-border e-invoicing and syntax differences
    severity: medium
    affectedBuyer: Finance operations
    mitigation: Normalize around EN 16931 and Peppol semantics, then map buyer-specific fields and validation rules on top.
    sourceRefs:
    - 5
    - 6
  - friction: Procurement reluctance to add another finance workflow vendor
    severity: medium
    affectedBuyer: CFO / IT
    mitigation: Piggyback on existing ERP, accounting, and timesheet integrations to minimize system-change anxiety.
    sourceRefs:
    - 23
    - 26
    - 33
  - friction: Credit-cycle contraction reduces financed volume
    severity: high
    affectedBuyer: CFO / treasury
    mitigation: Keep value in reserve discipline, collections intelligence, and faster lender onboarding even when fresh capital is scarce.
    sourceRefs:
    - 1
    - 14
    - 32
