    - 18
  - point: Multi-country support matters early because labour platforms and funding providers already market cross-office, cross-country deployment as a core requirement.
    sourceRefs:
    - 18
    - 26
  sensitivityCases:
  - case: Funders bundle enough reporting into their own rails
    impact: Differentiation shifts from baseline reporting to multi-funder routing, portability, and cross-platform buyer intelligence.
    sourceRefs:
    - 18
    - 23
    - 27
  - case: Credit markets tighten or defaults rise
    impact: Financed volume shrinks, so the product must still earn budget through reserve discipline, collections intelligence, and faster lender onboarding.
    sourceRefs:
    - 1
    - 14
    - 32
  - case: Payment-term regulation bites harder than expected
    impact: Cash-gap urgency falls for some segments, but evidence/compliance tooling still matters where buyer processes and disputes keep cash slow.
    sourceRefs:
    - 2
    - 4
    - 38
  validationPlan:
  - priority: high
    question: What share of invoices at target platforms fail because of missing approval, dispute, or contract evidence rather than pure credit risk?
    evidenceToGather: Collect lender rejection reasons and platform invoice cohorts from 3-5 design partners, then compare pass rates before and after data normalization.
  - priority: high
    question: Will CFOs buy a neutral layer if they already have one funding partner?
    evidenceToGather: Run 10-15 interviews focused on switching pain, reserve drag, onboarding time, and whether multi-funder optionality is budget-worthy before a second lender is live.
  - priority: medium
    question: Which source systems are mandatory for a viable first deployment?
    evidenceToGather: Map minimum fields across timesheet, milestone, invoice, ERP, payout, buyer-portal, and remittance systems; pilot read-only ingestion before any write-back workflow.
