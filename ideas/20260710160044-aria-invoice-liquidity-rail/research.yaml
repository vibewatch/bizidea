competitors:
- name: Aria
  stage: scale-up
  wedge: Embedded invoice-financing API for B2B platforms and marketplaces.
  pricing: Custom; public materials emphasize supplier payout in 24-48 hours but do not publish a fee card.
  strength: Strong platform traction, direct capital access, and proof that multi-country embedded receivables can scale.
  weaknessVsUs: Acts as a direct funder/originator rather than a neutral multi-funder passport and reporting layer.
  sourceRefs:
  - 1
  - 16
  - 17
  - 18
  - 21
- name: Sonovate
  stage: scale-up
  wedge: Staffing and freelancer-platform funding plus back-office and reconciliation workflows.
  pricing: Rolling monthly contract; no sign-up fees; 100% of invoice profit paid weekly.
  strength: Deep staffing specialization, API workflows, multi-country reporting, and bad-debt protection.
  weaknessVsUs: Customers adopt Sonovate's own funding stack instead of a portable lender-neutral standard that can route across providers.
  sourceRefs:
  - 23
  - 24
  - 25
  - 26
- name: TreviPay
  stage: incumbent
  wedge: Enterprise B2B payment terms, underwriting, and receivables operations for sellers and marketplaces.
  pricing: Custom; public materials say net-terms transactions can be about 30% cheaper than cards, with seller payment in as little as 48 hours.
  strength: Enterprise scale, underwriting depth, and securitization-backed payment infrastructure.
  weaknessVsUs: More checkout and buyer-program centric than approved-work and labour-payout centric.
  sourceRefs:
  - 29
  - 30
  - 31
  - 32
- name: Resolve
  stage: scale-up
  wedge: Seller-side AR automation plus net terms and factoring alternatives.
  pricing: Custom; public guide frames AR-finance discount rates around 0.02%-0.10%, with advances up to 90% on approved invoices.
  strength: Strong automation, integrations, and outsourced collections story.
  weaknessVsUs: US-centric and merchant-oriented; less tailored to European labour-platform proof-of-service workflows.
  sourceRefs:
  - 33
  - 34
  - 35
  - 36
- name: Taulia
  stage: incumbent
  wedge: Buyer- and treasury-led AR financing and supply-chain-finance workflows inside enterprise finance stacks.
  pricing: Custom enterprise pricing; no public fee card in fetched materials.
  strength: Large enterprise finance distribution and mature working-capital tooling.
  weaknessVsUs: Buyer/AP centered rather than marketplace-native and neutral across multiple labour-platform funders.
  sourceRefs:
  - 37
  - 38
  - 39
regulatoryTechnicalConstraints:
- point: A receivables passport must map invoice data to EN 16931 and Peppol-compatible structures so lenders and buyer systems can automate ingestion without manual translation.
  sourceRefs:
  - 5
  - 6
- point: Default 30-day payment rules and anti-late-payment enforcement do not eliminate buyer acceptance, dispute, or contract-validation delays; those still have to be evidenced in the workflow.
  sourceRefs:
  - 2
  - 4
  - 22
- point: Buyer portal submission, remittance matching, and collections data are part of the operating problem, not a back-office afterthought.
  sourceRefs:
  - 18
  - 30
  - 33
validationSignals:
- point: Aria says it has financed more than €1.5B of invoices, advanced 1.7M invoices in 2025, and now supports 70+ platforms while keeping defaults under 0.1%.
  sourceRefs:
  - 1
- point: Job&Talent cut financing time from 14 days to 24 hours and reduced a three-FTE funding workflow to monitoring work.
  sourceRefs:
  - 18
- point: StaffMe links faster supplier payouts to NPS gains and the ability to win more large accounts.
  sourceRefs:
  - 19
- point: Hiway says freelancers funded more than €1.5M of invoices and value the solvency signal as much as early payment itself.
  sourceRefs:
  - 20
openQuestions:
- What proportion of approved invoice volume at target platforms is actually financeable once concentration limits, disputes, and missing-approval fields are applied?
- How many warehouse lenders or insurers will trust third-party passport data without also insisting on owning origination and servicing logic themselves?
- Is payout urgency strongest in light-industrial staffing, freelancer tech, or field-service subcontracting once buyer concentration and dispute rates are normalized?
- How much implementation burden will platforms tolerate if the first deployment starts read-only and improves reporting before automating routing or holds?
