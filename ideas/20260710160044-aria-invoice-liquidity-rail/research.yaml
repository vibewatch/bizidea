  fiveForces:
    supplierPower:
      score: 4
      rationale: 'Capital providers, insurers, and compliance rails still matter: Aria and TreviPay both highlight securitization and funding infrastructure, while SCF programs remain lender-shaped. A software layer without strong capital-partner trust has limited product value.'
      sourceRefs:
      - 1
      - 32
      - 39
      - 40
    buyerPower:
      score: 4
      rationale: Platforms can still live with spreadsheets, a single funder, or an outsourced funding suite. Job&Talent only changed once 20 factoring partners and 14-day lead times became intolerable, so buyers negotiate hard until the operational pain is undeniable.
      sourceRefs:
      - 18
      - 24
      - 25
    threatOfEntrants:
      score: 3
      rationale: Basic API and rule-engine components are reproducible, but EN 16931 and Peppol mappings, multi-country lender reporting, and outcome data on disputes and defaults create meaningful barriers after the first few customers.
      sourceRefs:
      - 5
      - 6
      - 23
      - 26
    threatOfSubstitutes:
      score: 5
      rationale: Factoring, reverse factoring, SCF, AR automation, and in-house ops each solve part of the job today, so the startup must prove it raises financeable coverage or lowers reserve drag, not just adds another dashboard.
      sourceRefs:
      - 21
      - 31
      - 33
      - 37
      - 39
    competitiveRivalry:
      score: 4
      rationale: Adjacent vendors already cover direct funding, buyer terms, or AR workflows. Rivalry is real but fragmented, which creates room for a neutral coordination layer if it avoids becoming just another financier.
      sourceRefs:
      - 18
      - 24
      - 29
      - 33
      - 37
      - 40
