slug: labor-receivables-passport
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] the model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2.5-3.5M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a middle-of-range pre-seed so the company reaches the 12-24 month milestone with roughly six months of buffer.'
- id: A3
  name: Customer definition
  value: One active paying staffing or freelancer platform in either a paid pilot or a production contract
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.unitOfValue] customersEop counts paying platform programs, not lenders or end workers.'
- id: A4
  name: Paid pilot pricing
  value: $36K over about 90 days (~$12K per month)
  unit: USD/platform
  source: '[BP gtm.pricing €25k-€40k paid implementation or pilot + BP investorMemo.firstCustomer.initialContract] the base case uses a midpoint after simple USD translation.'
- id: A5
  name: First production-year platform value
  value: ~$180K ARR (~$15K per month)
  unit: USD/platform/year
  source: '[BP investorMemo.firstCustomer.initialContract €120k-€180k ARR + BP gtm.pricing €60k fixed plus 5-10 bps usage] the first live contract is modeled at the top end of the BP range because the ICP is a €50-300M GMV platform rather than a small agency.'
- id: A6
  name: Expanded platform value after second lender, country, or premium reporting
  value: ~$192K ARR (~$16K per month)
  unit: USD/platform/year
  source: '[BP gtm.pricing premium pricing for multi-funder routing and investor-grade reporting + BP milestones 24-36 months] mature accounts get only a modest uplift above the initial production contract.'
- id: A7
  name: Customer ramp
  value: 2 paying platforms by M12, 8 by Q4Y2, and 22 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months] the model hits the lower half of the year-3 20-25 platform milestone rather than assuming full saturation.'
- id: A8
  name: Exit ARR anchor
  value: ~$3.84M ARR at Q4Y3
  unit: USD/year
  source: '[BP market.som $3.8M + research.market.som $3.8M] month-36 run-rate is kept essentially on the researched labour-platform SOM so the model does not assume unresearched adjacent-market revenue.'
- id: A9
  name: Gross margin ramp
  value: ~35%-40% in early pilots, ~58% by Q4Y2, and 70% by Q4Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP product MVP/services scope + research.adoptionFrictionMatrix] early deployments stay services-heavy until templates and lender packs are reused.'
- id: A10
  name: Hiring timeline
  value: Founder and first engineer at launch; risk lead in M2; integration in M4; implementation in M7; second engineer in M10; first sales/partnerships in M12; G&A in M21; third engineer in M24; second implementation in M30; second sales/partnerships in M32
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] the ramp stays deliberately lean because the BP explicitly warns against hiring ahead of proof.'
- id: A11
  name: Founder loaded compensation
  value: $120K
  unit: USD/FTE/year
  source: '[BP team Founder CEO + startup-finance heuristic for Europe-based pre-seed infrastructure startups] assumes below-market founder cash comp.'
- id: A12
  name: Engineering loaded compensation
  value: $150K per FTE
  unit: USD/FTE/year
  source: '[BP team Founding eng + startup-finance heuristic] enough to hire strong data and workflow engineers in Europe without using Bay Area cash levels.'
- id: A13
  name: Risk / treasury product loaded compensation
  value: $144K
  unit: USD/FTE/year
  source: '[BP team Risk / treasury product lead + startup-finance heuristic] reflects domain-heavy but still pre-seed cash compensation.'
- id: A14
  name: Integration / solutions loaded compensation
  value: $138K
  unit: USD/FTE/year
  source: '[BP team Integration / solutions architect + startup-finance heuristic] assumes a technical architect focused on repeatable ERP, payout, and remittance mappings.'
- id: A15
  name: Implementation / customer success loaded compensation
  value: $120K per FTE
  unit: USD/FTE/year
  source: '[BP team Implementation lead + startup-finance heuristic] assumes hands-on delivery talent without building a large services layer.'
- id: A16
  name: Sales / partnerships loaded compensation
  value: $168K per FTE
  unit: USD/FTE/year
  source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] includes variable compensation and travel for lender and platform selling.'
- id: A17
  name: G&A / ops loaded compensation
  value: $96K
  unit: USD/FTE/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers finance, legal, and vendor operations without a large back office.'
- id: A18
  name: Non-payroll operating budget ramp
  value: ~$21K-$29K per month in Y1, ~$31K-$41K per month in Y2, and ~$44K-$56K per month in Y3
  unit: USD/month
  source: '[BP operations + BP gtm.channels + research.regulatoryTechnicalConstraints + startup-finance heuristic] covers cloud, travel, compliance, insurance, and customer-enablement costs while staying lean.'
- id: A19
  name: Monthly churn
  value: 1.7%
  unit: percent/month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP expansionLevers] the workflow should be sticky once embedded, but the model does not assume zero churn.'
- id: A20
  name: Fully loaded CAC
  value: ~$145K per production platform
  unit: USD/platform
  source: '[BP gtm.funnelTargets + BP gtm.channels + model GTM spend] concentrated founder-led selling and technical audits keep CAC high but still tolerable at six-figure ACV.'
- id: A21
  name: Quarterly salary convention
  value: Y2-Y3 salary lines use actual monthly hires within each quarter, not only the required snapshot columns
  unit: convention
  source: '[Financial Modeler headcount column convention] this keeps salary expense consistent with the month-by-month hiring ramp.'
- id: A22
  name: Cash conversion simplification
  value: EBITDA approximates cash movement after the financing close
  unit: convention
  source: '[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial relative to payroll and services burn at pre-seed scale.'
- id: A23
  name: Next-round milestone
  value: 8 production platforms across 2-3 European markets, 2 referenceable logos, and 1 second-lender activation with cash still above a 6-month buffer
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] this is the seed-ready proof package the pre-seed must finance.'
- id: A24
  name: Partner-sourced share of Y3 new logos
  value: ~30% of Y3 adds
  unit: percent of new customers
  source: '[BP gtm.channels referral/co-sell motions + BP strategicChoices.sequencingRationale] the model relies on referrals after the first reference deployments rather than building a large field-sales team.'
- id: A25
  name: Deployment-template reuse
  value: One integration architect can support the full base-case ramp because EN 16931 / Peppol mappings and lender reporting packs are reused across logos
  unit: operating leverage
  source: '[BP operations + research.regulatoryTechnicalConstraints] if integrations stay bespoke, both margin and headcount would worsen materially versus base case.'
