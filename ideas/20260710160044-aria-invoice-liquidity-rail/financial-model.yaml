scenarios:
  downside:
    description: Data audits take longer, production contracts stay near the low end of the BP range, and the company reaches only 20 live platforms by Q4Y3.
    y3RevenueK: 2042.0
    y3EbitdaK: -646.4
    cashLowPointK: 397.4
    keyAssumptionChanges:
    - Q4Y2 customersEop reaches 7 instead of 8 and Q4Y3 reaches 20 instead of 22 because pilot-to-production cycles stay slower and referrals arrive later.
    - First-year production value stays near about $168K ARR instead of roughly $180K, with expansion attaching later inside the logo.
    - Gross margin exits around 68% instead of 70% because data normalization and lender reporting remain more bespoke.
  base:
    description: Base case follows the BP path of 2 paid pilots in year 1, 8 production platforms by the end of year 2, and 22 live platforms by Q4Y3 with exit ARR aligned to the researched SOM.
    y3RevenueK: 2437.0
    y3EbitdaK: -341.3
    cashLowPointK: 736.6
    keyAssumptionChanges:
    - Paying platforms rise from 2 at M12 to 8 at Q4Y2 and 22 at Q4Y3 while the company keeps headcount to 11 FTE at year-end.
    - Pilot revenue lands near $36K over 90 days, then converts into about $180K first-year ARR and about $192K expanded ARR for mature multi-funder or multi-country accounts.
    - Gross margin climbs from pilot-heavy mid-30s in early Y1 to the BP target of 70% by Q4Y3 as templates and lender packs are reused.
  upside:
    description: Reference deployments and lender referrals pull new logos forward, and expanded reporting modules attach earlier inside successful customers.
    y3RevenueK: 2860.0
    y3EbitdaK: 26.8
    cashLowPointK: 1151.6
    keyAssumptionChanges:
    - Q4Y2 customersEop reaches 9 and Q4Y3 reaches 24 because referral and partner channels source a larger share of qualified opportunities.
    - First-year production value reaches about $192K ARR and mature expanded accounts reach about $216K ARR as multi-funder and premium-reporting modules attach earlier.
    - Gross margin exits near 73% as deployment playbooks and standardized mappings reduce bespoke implementation work faster than base case.
sensitivity:
- variable: ARPU
  downsideCase: Average live-platform ARR settles near $155K because usage volume and premium reporting attach slowly.
  baseCase: Exit ARR averages about $175K per live platform, consistent with the main model.
  upsideCase: Expanded accounts push average live-platform ARR toward about $190K.
  y3RevenueImpactK: -280.0
  cashImpactK: -210.0
- variable: CAC
  downsideCase: Fully loaded CAC rises toward about $175K because technical audits and founder time stay heavy.
  baseCase: Fully loaded CAC stays near about $145K per production platform.
  upsideCase: Warm lender and integration referrals hold CAC closer to about $125K.
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: Monthly churn rises to 2.5% if the product remains a nice-to-have reporting layer rather than a core payout workflow.
  baseCase: Monthly churn holds near 1.7% once the workflow is embedded.
  upsideCase: Monthly churn falls toward 1.0% when second-lender and buyer-benchmark data deepen lock-in.
  y3RevenueImpactK: -120.0
  cashImpactK: -140.0
- variable: sales cycle
  downsideCase: Pilot-to-production stretches to 12-15 months, limiting the company to about 20 live platforms by Q4Y3.
  baseCase: The company reaches 8 production platforms by Q4Y2 and 22 live platforms by Q4Y3.
  upsideCase: Referenceability compresses the cycle enough to reach 24 live platforms by Q4Y3.
  y3RevenueImpactK: -395.0
  cashImpactK: -339.0
- variable: gross margin
  downsideCase: Gross margin exits near 68% because lender reporting and data QA remain more service-heavy.
  baseCase: Gross margin reaches the BP target of 70% by Q4Y3.
  upsideCase: Gross margin reaches roughly 73% as reusable mappings and reporting packs standardize faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
- variable: hiring pace
  downsideCase: A second implementation hire and extra GTM support arrive two quarters earlier before deployment economics are proven.
  baseCase: The company hires only to the BP sequence and reaches 11 FTE at Q4Y3.
  upsideCase: One non-core scale hire can wait until after the first second-lender activation without slowing growth.
  y3RevenueImpactK: 0.0
  cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      QualifiedAccounts[Qualified ICP accounts] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionPlatforms[Production platforms]
      ProductionPlatforms --> Expansion[Second lender / country / reporting expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from moving from 2 paying platforms at M12 to 22 live platforms at Q4Y3 while exit ARR stays aligned to the researched $3.8M SOM.
- checkName: Must go right
  finding: Deployments have to become template-driven enough that one integration lead, two implementation hires, and partner referrals can support 22 live platforms without adding a services-heavy cost base.
- checkName: Model breaks if
  finding: If live-platform ARR falls toward the low end of the BP range or funder acceptance slows, the company remains deeply EBITDA-negative even before exhausting the narrow labour-platform beachhead.
- checkName: Next-round proof
  finding: The next financing is justified once 8 production platforms, 2 referenceable logos, and one second-lender activation prove that the wedge scales beyond founder-led pilots.
sanityChecks:
  ruleOf40: Y3 growth 191.5% + EBITDA margin -14.0% = 177.5% (inflated by the small Y2 base and still not a substitute for true margin proof).
  burnMultiple: Y2 burn multiple is about 1.0x using roughly $1.01M of EBITDA burn against about $1.03M of net new exit ARR (from about $0.36M at M12 to about $1.39M at M24); Y3 burn multiple falls to about 0.1x as the model approaches breakeven.
  revenuePerFte: $222K Y3 on 11 ending FTE (within the $200–400K enterprise SaaS benchmark, but only near the low end because delivery remains integration-heavy).
  flags:
  - The base case is still EBITDA-negative in Y3 even while month-36 ARR matches the researched labour-platform SOM, so a strong seed story still depends on premium modules or adjacent-market expansion beyond the current research.
  - The model assumes 11 FTE can support 22 live platforms because EN 16931 / Peppol mappings and lender reporting packs are reusable; if integrations stay bespoke, both headcount and COGS would rise materially.
  - Revenue concentration remains high because the full Y3 plan is carried by only 22 platforms inside a narrow labour-platform beachhead.
  - Cash is modeled as EBITDA, so milestone billing terms, pilot prepayments, or delayed enterprise procurement could move the actual cash trough by several months.
