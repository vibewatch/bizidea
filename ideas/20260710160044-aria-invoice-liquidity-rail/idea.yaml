topRisks:
  - name: "Funder bundling risk"
    description: "An incumbent lender or embedded-finance provider could bundle basic reporting and squeeze a standalone software layer."
    mitigation: "Start as the neutral multi-funder and insurer interoperability layer, integrate with existing lenders, and win on switching flexibility plus portfolio insight."
  - name: "Data completeness risk"
    description: "If platforms cannot reliably capture approvals, disputes, or proof of service, too many invoices may fail eligibility and ROI will collapse."
    mitigation: "Start with staffing and freelancer workflows where timesheet or milestone acceptance is explicit, enforce minimal data contracts, and sell data-quality dashboards before full automation."
  - name: "Credit-cycle exposure"
    description: "A downturn or wave of buyer defaults could make funders pull back, shrinking financed volume and pressuring software budgets."
    mitigation: "Keep the model balance-sheet-light, add collections and reserve-optimization value independent of new capital supply, and diversify across multiple funders and buyer sectors."
