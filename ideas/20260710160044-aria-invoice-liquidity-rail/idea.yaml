differentiator: >-
  Aria-style lenders originate and fund invoices, while ERPs and marketplaces merely record the workflow that produced
  them. Neither side wants to own the neutral evidence, eligibility, reserve, and reporting layer that lets a platform
  switch funders or run several simultaneously. This company becomes the receivables passport system of record, and its
  defensibility compounds through cross-platform data on buyer payment behavior, dispute patterns, and advance
  performance that improves pricing and eligibility over time.
