problem: >-
  European staffing and freelancer platforms sell into enterprise buyers that demand net-45 or net-60 invoice terms,
  but their workers and subcontractors expect fast payout. Financing partners will only advance on clean receivables,
  yet most platforms cannot package timesheet approval, buyer acceptance, dispute flags, and concentration exposure into
  a consistent lender-ready record. Finance teams end up managing reserve rules, payout holds, and lender reporting in
  spreadsheets and email. The result is slower contractor payouts, tighter platform balance-sheet strain, and lost GMV
  when supply defects to platforms that can pay faster.
targetUser:
  primary: >-
    CFOs and VP Payments at European staffing, freelancer, and field-service labor platforms that invoice enterprise
    buyers on 30-60 day terms but pay workers or subcontractors weekly.
  secondary: >-
    Risk and treasury operators who reconcile approved work, manage funding lines, and decide which invoices can be
    advanced without spiking reserves.
  buyer: "CFO or VP Payments at the platform"
startupThesis:
  nonObviousInsight: >-
    Aria's scale suggests the scarce asset is no longer raw capital but receivable standardization. Once debt investors
    are willing to fund and securitize platform-originated invoices, the missing control point is the software layer
    that turns messy workflow events—timesheets, milestones, approvals, disputes, and buyer behavior—into lender-ready
    receivables that multiple funders can trust.
  beachhead: >-
    Enterprise-facing European staffing and freelancer platforms processing 20,000+ approved weekly timesheet or
    milestone invoices, giving Fortune 2000 buyers 45-60 day terms, and needing to pay workers or subcontractors
    within 7 days.
  wedge: >-
    A receivables passport API that converts approved-work events into a continuously monitored invoice packet with
    proof of service, buyer acceptance, eligibility checks, reserve recommendations, and servicer-grade lender
    reporting.
  whyNowCatalyst: >-
    Aria's 70-plus platform footprint, 1.7 million invoices advanced in 2025, and securitized debt facility show that
    the financing rails now exist; the bottleneck has shifted to data quality and servicing software that makes more
    invoices fundable.
  ventureScalePath: >-
    Start with labor platforms where payout urgency and approval telemetry are strongest, then expand into B2B
    marketplaces, trade-service vertical SaaS, and ERP-originated receivables, adding multi-funder routing, credit
    insurance, collections intelligence, and a cross-platform buyer payment graph.
solution: >-
  Labor Receivables Passport plugs into timesheet, milestone, invoice, and payout systems to build a live evidence
  dossier for every invoice before it is offered for financing. It scores eligibility using approval completeness,
  buyer payment history, concentration limits, dispute risk, and contract terms, then routes clean invoices to the
  right funding line or holds them until missing evidence is resolved. The product auto-produces servicer and investor
  reporting so a platform can manage one or several warehouse providers without an internal capital-markets operations
  team. The immediate ROI is more same-day payouts to workers and lower reserve drag without taking new balance-sheet
  risk. Over time, the company can become the neutral operating layer between software platforms, insurers, and debt
  investors for all embedded B2B receivables products.
goToMarketSeed:
  firstCustomer: >-
    A €50-300 million GMV European light-industrial staffing or freelancer marketplace with 10,000+ active workers,
    45-60 day enterprise buyer terms, and an existing or planned instant-payout program backed by one warehouse lender.
  buyingTrigger: >-
    Signing several large enterprise buyers with long payment terms or launching a same-week worker payout product
    forces the platform to stand up lender reporting, reserve policy, and dispute controls quickly.
  currentAlternative: >-
    Internal risk-ops spreadsheets plus ad hoc exports from the marketplace, ERP, and payout stack, combined with a
    single embedded-finance or factoring partner's proprietary reporting workflow.
  switchingReason: >-
    The passport makes more invoices financeable, shortens lender onboarding, and lets the platform add or replace
    funding partners without rebuilding its payouts and reporting operations from scratch.
  pricingHypothesis: >-
    Charge a €3,000-€10,000 monthly platform fee plus 5-15 basis points on financed invoice volume, with premium
    pricing for multi-funder routing and investor-grade reporting.
