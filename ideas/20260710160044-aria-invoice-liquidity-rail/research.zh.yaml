competitors:
- name: Aria
  stage: scale-up
  wedge: 面向 B2B 平台和市场的嵌入式发票融资 API。
  pricing: 定制化；公开材料强调供应商可在 24-48 小时内收款，但未公开费率表。
  strength: 平台侧渗透深、直接资金可得性强，也证明多国嵌入式应收账款可以放大规模。
  weaknessVsUs: 它本质上是直接出资/发起方，不是中立的多资金方应收账款护照和报告层。
  sourceRefs:
  - 1
  - 16
  - 17
  - 18
  - 21
- name: Sonovate
  stage: scale-up
  wedge: 劳务派遣和自由职业平台融资，加上后台与对账工作流。
  pricing: 滚动月度合同；无注册费；发票利润的 100% 按周支付。
  strength: 深耕劳务派遣、API 工作流、多国报告和坏账保护。
  weaknessVsUs: 客户接入的是 Sonovate 自家的融资栈，而不是可在多家提供方之间路由的中立标准。
  sourceRefs:
  - 23
  - 24
  - 25
  - 26
- name: TreviPay
  stage: incumbent
  wedge: 面向卖家和平台的企业级 B2B 付款账期、授信和应收运营。
  pricing: 定制化；公开材料称 账期交易可比信用卡便宜约 30%，卖家最快 48 小时收款。
  strength: 企业级规模、深度授信能力，以及有证券化支撑的支付基础设施。
  weaknessVsUs: 它的重心更在结账和买方项目，不在已批准工作和劳务打款。
  sourceRefs:
  - 29
  - 30
  - 31
  - 32
- name: Resolve
  stage: scale-up
  wedge: 卖方侧 AR 自动化，加上账期付款与保理替代方案。
  pricing: 定制化；公开指南给出的 AR 融资折扣率约 0.02%-0.10%，已批准发票最高可预付 90%。
  strength: 自动化强、集成深、外包催收叙事清晰。
  weaknessVsUs: 更偏美国商家；对欧洲劳务平台的服务履约证明工作流没那么贴合。
  sourceRefs:
  - 33
  - 34
  - 35
  - 36
- name: Taulia
  stage: incumbent
  wedge: 企业财务栈里的买方/资金团队主导 AR 融资与供应链金融工作流。
  pricing: 定制化企业定价；抓到的材料里没有公开费率表。
  strength: 大型企业财务分发能力强，营运资金工具成熟。
  weaknessVsUs: 更偏买方/AP 中心，而不是平台原生，也不是多家劳务平台资金方之间的中立层。
  sourceRefs:
  - 37
  - 38
  - 39
regulatoryTechnicalConstraints:
- point: 应收账款护照必须把发票数据映射到兼容 EN 16931 和 Peppol 的结构里，这样贷款方和买方系统才能自动接入，而不是再做人工翻译。
  sourceRefs:
  - 5
  - 6
- point: 默认 30 天付款规则和反拖款执法，并不会抹掉买方验收、争议或合同校验造成的延迟；这些仍然必须在工作流里被清楚留痕。
  sourceRefs:
  - 2
  - 4
  - 22
- point: 买方门户提交流程、回款匹配和催收数据，本来就是运营问题的一部分，不是后台边角料。
  sourceRefs:
  - 18
  - 30
  - 33
validationSignals:
- point: Aria 称自己已融资超过 €1.5B 的发票，2025 年垫付 170 万张发票，目前支持 70+ 平台，违约率仍低于 0.1%。
  sourceRefs:
  - 1
- point: Job&Talent 把融资准备时间从 14 天压到 24 小时，并把一条原本需要 3 名全职员工跑的流程缩成日常监控。
  sourceRefs:
  - 18
- point: StaffMe 把更快的供应商打款直接和 NPS 提升、以及赢下更多大客户联系在一起。
  sourceRefs:
  - 19
- point: Hiway 表示，自由职业者已融资超过 €1.5M 的发票，而且他们看重的不只是提前收款，还有这套方案传递出的偿付能力信号。
  sourceRefs:
  - 20
openQuestions:
- 目标平台的已批准发票里，扣掉集中度上限、争议和审批字段缺失等限制后，到底还有多大比例真正可融资？
- 有多少仓储贷款方或保险方会愿意信任第三方护照数据，而不是坚持自己也要掌握发起和服务逻辑？
- 如果把买方集中度和争议率都标准化后看，打款紧迫性最强的场景到底是在轻工业劳务派遣、自由职业科技平台，还是现场服务分包？
- 如果第一版部署先从只读开始，先把报告做准，再去自动化路由或冻结，平台到底能接受多大的实施负担？
