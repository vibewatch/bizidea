slug: labor-receivables-passport
date: "2026-07-10"
executiveSummary: >-
  Labor Receivables Passport should start as the neutral evidence and reporting
  layer for European staffing and freelancer platforms that pay workers weekly
  while collecting cash from enterprise buyers on 45-60 day terms. The product
  turns timesheet, milestone, invoice, payout, and remittance events into a
  lender-ready receivables passport with proof of service, buyer acceptance,
  eligibility checks, reserve logic, and servicer-grade reporting. The wedge is
  timely because Aria's scale—1.7 million invoices advanced in 2025, 70+
  platform customers, and a new €240 million debt facility—shows the capital
  rail already exists; the bottleneck has shifted to receivable
  standardization. The first sale should be to a €50-300 million GMV European
  staffing or freelancer platform with 10,000+ active workers, long enterprise
  payment terms, and an existing or imminent instant-payout program backed by
  one lender. Go-to-market must stay narrow: land as a paid implementation plus
  annual software contract for one payout workflow, prove higher financeable
  coverage and lower manual funding-ops work, then expand to additional
  countries, funders, and buyer programs inside the same logo. The researched
  beachhead is real but narrow on its own, with an estimated $0.23B TAM, $84.0M
  SAM, and $3.8M modeled year-3 SOM for the labour-platform category alone. The
  broader expansion path into B2B marketplaces, vertical SaaS, and
  ERP-originated receivables is strategically important but not yet quantified
  in the research. The biggest disconfirming risk is whether independent lenders
  and insurers will trust third-party passport data enough to underwrite or
  monitor against it; if not, the company collapses into single-funder tooling
  instead of neutral infrastructure.
problem:
  - >-
    European staffing and freelancer platforms must pay workers or
    subcontractors weekly even when enterprise buyers insist on 45-60 day
    invoice terms.
  - >-
    Funding partners will only advance against clean receivables, but most
    platforms still stitch together timesheet approvals, buyer acceptance,
    disputes, concentration checks, and reserve logic in spreadsheets and ad hoc
    exports.
  - >-
    Manual lender reporting and single-funder workflows slow contractor payouts,
    increase balance-sheet strain, and make it costly to add or replace capital
    partners when buyer terms or country coverage change.
solution:
  - >-
    Normalize approved-work, invoice, payout, remittance, and dispute data into
    one receivables passport per invoice with explicit proof of service and
    buyer acceptance.
  - >-
    Start with read-only eligibility scoring, reserve recommendations, and
    exception queues for one lender workflow before introducing controlled
    routing or hold recommendations.
  - >-
    Auto-produce servicer-grade lender and insurer reporting so the platform can
    onboard, monitor, add, or replace funding partners without rebuilding its
    payouts and treasury operations.
whyWeWin:
  - >-
    Labour platforms provide explicit timesheet or milestone approvals and acute
    weekly payout urgency, so financeable-coverage gains can be proven faster
    than in generic B2B invoice-finance workflows.
  - >-
    The company stays neutral across funders, unlike Aria, Sonovate, TreviPay,
    and Taulia, whose products center on their own funding rails, buyer
    programs, or treasury workflows.
  - >-
    Reusable EN 16931 and Peppol-aware mappings plus lender reporting templates
    shorten onboarding time with every new customer and capital partner.
  - >-
    A cross-platform buyer-payment and dispute graph can improve reserve
    recommendations, routing, and collections intelligence in ways a
    single-platform or single-funder product cannot.
strategicChoices:
  beachhead: >-
    European staffing and freelancer platforms with 10,000+ active workers,
    45-60 day enterprise buyer terms, explicit timesheet or milestone approvals,
    and an existing or planned instant-payout program backed by one lender.
  wedgeRationale: >-
    This slice combines the clearest proof-of-service telemetry with the most
    urgent cash-timing pain. It creates faster proof than broader B2B
    marketplaces, generic AR automation, or direct lending because the startup
    can improve one existing payout workflow before asking the customer to
    change capital providers or core finance systems.
  sequencingRationale: >-
    Build read-only passport generation, eligibility scoring, and one-lender
    reporting first because data completeness and lender trust are the gating
    risks. Keep sales founder-led through the first 2-3 paid pilots, add
    multi-funder routing only after two capital partners accept the passport,
    and delay partner-channel scale until deployment time and production pricing
    are repeatable.
  notYet:
    - Direct lending, warehouse-balance-sheet risk, or any spread-dependent business model.
    - Generic merchant AR automation or buyer-led supply-chain-finance programs.
    - US expansion before the first two European market templates are repeatable.
    - Fully automated routing, reserve changes, or collections actions before read-only reporting proves trusted.
market:
  tam: >-
    $0.23B researched TAM for labour-platform receivables-passport software,
    based on about 1,500 European and adjacent platforms or agencies at roughly
    $151k blended ARR each; broader expansion into B2B marketplaces and
    ERP-originated receivables is not yet quantified in the research.
  sam: >-
    $84.0M researched beachhead SAM, based on about 550 staffing, labour, and
    freelancer platforms or agencies that fit the initial profile at roughly
    $151k blended ARR each.
  som: >-
    $3.8M modeled year-3 SOM, based on 25 reachable design-partner-like
    accounts at roughly $151k blended ARR each.
  segments:
    - European staffing and freelancer platforms with weekly payout urgency and long enterprise buyer terms.
    - Field-service subcontracting platforms and labour-heavy B2B marketplaces with explicit proof-of-service workflows.
  buyingProcess: >-
    Treasury or payments-ops usually champions when a new enterprise buyer,
    country launch, or faster-payout program turns funding into a reporting and
    reserve-management problem. The CFO or VP Payments approves a paid
    implementation when the startup can show more financeable coverage, lower
    manual funding-ops work, and the option to add or replace funders without
    rebuilding operations.
product:
  mvp: >-
    The MVP covers one platform, one country, and one existing lender. It
    ingests timesheet or milestone approvals, invoice creation, payout events,
    disputes, and remittance status to produce a read-only lender-ready
    passport, eligibility queue, reserve suggestions, and servicer-grade
    reporting before any automated routing is introduced.
  sixMonth: >-
    Go live with 2 design partners on standard connectors for one approval
    source, one invoice or ERP source, and one payout ledger, plus dashboards
    for passport completeness, financeable coverage, reserve exceptions, and
    lender onboarding time.
  twelveMonth: >-
    Add multi-lender reporting packs, dispute-resolution workflows, buyer-level
    concentration and payment-history views, and controlled routing or hold
    recommendations for invoices that fail eligibility.
  twentyFourMonth: >-
    Launch lender and insurer routing, cross-platform buyer-payment benchmarks,
    and collections intelligence, then expand into adjacent B2B marketplaces
    and vertical SaaS accounts only after the labour-platform playbook converts
    repeatedly.
  keyBets:
    - Platforms can expose enough approval, dispute, and remittance data to make a useful passport within 45 days.
    - A neutral reporting layer can raise financeable coverage or lower reserve drag enough to justify €120k-€180k ARR.
    - At least 2 lenders or insurers will accept third-party passport outputs for monitoring or onboarding.
    - Cross-platform buyer payment and dispute data will improve reserve recommendations faster than single-platform tools.
gtm:
  wedge: >-
    Land as the lender-ready reporting and eligibility layer for one platform's
    instant-payout or weekly contractor-payout program, using the customer's
    existing funding partner rather than asking it to switch capital providers
    on day one.
  channels:
    - Founder-led direct sales to CFOs, VP Payments, and treasury or risk-ops leaders at European staffing and freelancer platforms.
    - Referral and co-sell motions with warehouse lenders, factors, credit insurers, and SCF operators that want cleaner onboarding and monitoring.
    - Integration-led partnerships with timesheet, workforce-management, ERP, and payout vendors once the first two deployments are referenceable.
  funnelTargets: "target-account intro→qualified discovery 35%+; discovery→data audit 50%+; data audit→paid pilot 20-30%; paid pilot→annual production 50%+; first production account→second funder, country, or buyer-program expansion 60%+ within 12 months"
  pricing: >-
    Start with a €25k-€40k paid implementation or pilot for one country and one
    lender reporting pack, then convert to about €60k annual platform fee plus
    5-10 bps of financed invoice volume, with premium pricing for multi-funder
    routing and investor-grade reporting. This matches the researched
    substitute economics and ties price to higher financeable coverage and
    lower manual ops rather than to seats.
businessModel:
  revenueStreams:
    - Annual platform subscription for passport generation, eligibility monitoring, and servicer-grade reporting.
    - Usage fee on financed invoice volume routed or monitored through the passport.
    - Implementation, lender-onboarding, and country-template fees.
    - Premium modules for multi-funder routing, insurer reporting, and collections intelligence.
  unitOfValue: One platform's financeable invoice program, priced as fixed annual software plus basis points on financed volume
  targetGrossMarginPct: 70
  expansionLevers:
    - Add new countries, buyer programs, and worker cohorts within the first platform once data contracts are stable.
    - Add second and third lenders or insurers, making portability and routing more valuable.
    - Sell collections intelligence and buyer-payment benchmarks off the same receivables dataset.
    - Expand from labour platforms into adjacent B2B marketplaces and vertical SaaS only after the first segment is repeatable.
strategyMap:
  northStarMetric: Share of approved invoice volume that becomes lender-eligible and payout-ready within 24 hours of buyer acceptance
  inputMetrics:
    - Qualified beachhead accounts with weekly payout urgency and 45-60 day buyer terms.
    - Percentage of approved invoices with complete proof-of-service, acceptance, dispute, and remittance fields.
    - Days to onboard a new lender or insurer using passport outputs.
    - Incremental financeable coverage and reserve reduction versus the customer's baseline.
    - Paid pilot-to-production conversion and second-funder or country expansion rate.
  moatsToBuild:
    - Cross-platform buyer-payment and dispute graph linking approval quality, payment timing, reimbursement, and default outcomes.
    - Lender-feedback corpus on rejection reasons, reserve policies, and routing performance across multiple providers.
    - EN 16931 and Peppol-aware integrations plus audit-ready reporting templates that shorten multi-country onboarding.
  killCriteria:
    - Fewer than 2 of the first 20 qualified beachhead accounts sign a paid pilot within 9 months.
    - After normalization, fewer than 60% of approved invoice dollars at the first 3 design partners are passport-complete enough for lender review.
    - By month 12, fewer than 2 lender or insurer partners agree to underwrite, monitor, or onboard against third-party passport data.
    - Paid pilot-to-production conversion stays below 50% or realized production ACV stays below €120k.
  mermaid: |
    flowchart LR
      Wedge[Labour-platform payout wedge] --> MVP[Read-only passport and lender reporting]
      MVP --> Proof[Higher financeable coverage and less manual ops]
      Proof --> Expansion[Multi-funder routing and adjacent receivables workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Strong customer pain and a credible workflow wedge, but the currently
      researched market is narrow and the neutral-funder thesis is still
      unproven.
    whyBelieve: >-
      Weekly worker payout versus net-60 buyer cash is a real, recurring pain,
      and Aria's scale shows the capital rail exists if software can make more
      invoices fundable.
    whyDoubt: >-
      The researched labour-platform category is only about $230M TAM today, and
      if lenders refuse third-party passport data the startup becomes a thin
      single-funder tool.
    nextDiligence: >-
      Test 10-15 ICP accounts and at least 3 capital partners, then watch one
      paid pilot from data audit through first annual contract conversion.
  firstCustomer:
    title: European staffing or freelancer-platform CFO launching faster contractor payouts
    profile: >-
      A €50-300 million GMV platform with 10,000+ active workers, 45-60 day
      enterprise buyer terms, one existing or planned warehouse lender, and
      explicit timesheet or milestone approvals.
    trigger: >-
      A new enterprise buyer program or same-week payout launch makes current
      spreadsheet-based lender reporting, reserve setting, and dispute controls
      too slow.
    buyer: CFO or VP Payments
    initialContract: >-
      €25k-€40k paid implementation or pilot for one lender and one country,
      converting to about €120k-€180k ARR (about €5k per month plus 5-10 bps of
      financed volume) if the platform achieves higher financeable coverage and
      materially lower manual reporting work.
  mustBeTrue:
    - At least 10 of the first 15 qualified platforms say multi-funder portability or faster lender onboarding is worth paying for before a second lender is live.
    - At least 70% of approved invoice dollars at 3 design partners can meet passport completeness thresholds after normalization.
    - At least 2 lenders or insurers accept third-party passport data for underwriting, monitoring, or onboarding by month 12.
    - The first 2 paid pilots lift financeable coverage by 10 percentage points or cut manual funding-ops work by 50%+.
    - At least 50% of paid pilots convert to €120k+ annual contracts with gross margin at or above 70%.
  diligenceQuestions:
    - How often do target platforms actually add or switch funding partners, and what budget exists before that event?
    - Which source systems and fields are mandatory for a lender-trusted passport in the first deployment?
    - What baseline pass rates, reserve levels, and manual FTE effort can design partners document before a pilot starts?
    - Will lenders and insurers accept third-party passport outputs, or insist on owning origination and servicing logic themselves?
    - How large is the expansion market beyond labour platforms, and what evidence says the same product wins there?
operatingAssumptions:
  - assumption: >-
      Enough beachhead platforms exist and are concentrated enough to support a
      focused European outbound motion.
    basis: research.yaml
    validationTest: >-
      Map the top 50 target accounts and complete 15 interviews confirming
      weekly payout urgency, 45-60 day buyer terms, and a named economic buyer.
    decisionImpact: >-
      If false, narrow to one denser subsegment or country before scaling
      headcount.
  - assumption: >-
      Target platforms can expose the mandatory approval, dispute, payout, and
      remittance fields within 45 days without replacing core systems.
    basis: research.yaml
    validationTest: >-
      Complete technical audits with 5 prospects and obtain usable exports or
      API access for the required fields from at least 3.
    decisionImpact: >-
      If false, reduce scope to data-quality and reporting enrichment or target
      only a smaller set of supported system stacks.
  - assumption: >-
      Neutral passport outputs will be trusted by at least 2 lenders or
      insurers, even when the startup is not the capital provider.
    basis: operator judgment
    validationTest: >-
      Secure 2 signed pilot scopes or partner LOIs that accept the passport
      schema, reporting pack, and operating SLA.
    decisionImpact: >-
      If false, the company must partner deeply with one funder and abandon the
      core multi-funder portability thesis.
  - assumption: >-
      The value pool from higher financeable coverage, lower reserve drag, and
      reduced manual ops supports about €120k-€180k annual pricing.
    basis: research.yaml
    validationTest: >-
      Complete 2 paid pilots with signed ROI reviews and production procurement
      approval at the target contract range.
    decisionImpact: >-
      If false, the current labour-platform segment is too small to support
      venture-style software economics.
  - assumption: >-
      Cross-platform buyer-payment and dispute data will create a real reserve,
      routing, and collections moat over time.
    basis: idea.yaml
    validationTest: >-
      After 12 months, compare reserve recommendations or rejection prediction
      accuracy against single-platform baselines across 3 customer logos.
    decisionImpact: >-
      If false, defensibility rests mostly on services and integrations rather
      than on compounding data advantages.
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: Top-50 ICP map and operator interviews
    hypothesis: Enough staffing and freelancer platforms feel this pain now and have budget authority tied to payouts or treasury operations.
    successMetric: 15 interviews completed and 10 accounts confirmed with weekly payout urgency, long buyer terms, and a named buyer.
    owner: Founder CEO
  - horizon: "0-90 days"
    experiment: Data-completeness audit with 5 prospects
    hypothesis: One-country MVP deployments can source the mandatory approval, dispute, payout, and remittance fields without major system replacement.
    successMetric: 3 prospects provide the required fields and historical cohorts needed to build sample passports.
    owner: Founding eng
  - horizon: "90-180 days"
    experiment: Lender and insurer acceptance workshop
    hypothesis: At least 2 capital partners will accept a third-party passport schema and reporting SLA for pilot use.
    successMetric: 2 signed pilot scopes or LOIs from lenders or insurers using the passport output.
    owner: Founder CEO
  - horizon: "90-180 days"
    experiment: Historical cohort replay with 2 design partners
    hypothesis: Normalized passports will increase lender-review-ready invoice volume and expose reserve or dispute gaps versus current spreadsheets.
    successMetric: 10+ percentage-point lift in lender-review-ready invoice dollars or 50% less manual exception handling in backtests.
    owner: Risk / treasury product lead
  - horizon: "6-12 months"
    experiment: Live paid pilot on one payout program
    hypothesis: One production-like workflow can cut onboarding and funding-ops friction enough to justify annual pricing.
    successMetric: Lender onboarding pack produced in under 48 hours, 50% less manual ops time, and 1 production contract signed above €120k ARR.
    owner: Implementation lead
  - horizon: "12-18 months"
    experiment: Multi-funder portability test
    hypothesis: Customers and capital partners will use the passport to add or swap a second lender or insurer without rebuilding core workflows.
    successMetric: 1 production customer activates a second lender or insurer using the same passport schema within 90 days.
    owner: Partnerships lead
operations:
  - Canonical receivables-passport schema spanning approved work, invoice metadata, buyer acceptance, dispute state, payout events, remittance, and collections status.
  - Eligibility and reserve rule engine with manual overrides, versioned policies, and immutable lender and audit logs.
  - EN 16931 and Peppol-aware field mapping plus buyer-portal and remittance-reconciliation adapters for the first target markets.
  - Weekly portfolio review with the customer and capital partner on financeable coverage, reserve exceptions, disputes, payout latency, and collections.
  - Capital-partner onboarding process with standard reporting packs, SLA definitions, and a shared rejection-reason taxonomy.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Owns ICP discovery, sells the first pilots, and keeps the company focused on one treasury workflow before broader receivables expansion.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the passport data model, lender-reporting pipeline, and secure integrations before product scope broadens.
  - role: Risk / treasury product lead
    startTiming: Month 0-3
    rationale: Encodes eligibility, reserve, dispute, and reporting logic that both platform operators and lenders will trust.
  - role: Integration / solutions architect
    startTiming: Month 3
    rationale: Productizes timesheet, ERP, payout, and remittance connectors so the first deployments can land inside the 45-day target.
  - role: Implementation lead
    startTiming: Month 6
    rationale: Converts pilots into production programs, runs KPI reviews with customers and funders, and creates the repeatable deployment playbook.
  - role: Partnerships lead
    startTiming: Month 12
    rationale: Scales lender, insurer, and workflow-partner channels only after the startup has referenceable deployment and ROI proof.
milestones:
  - horizon: "0-12 months"
    items:
      - Close 2 paid design-partner pilots in European staffing or freelancer platforms.
      - Go live on 2 one-country passport deployments with at least 1 lender-ready reporting template in production.
      - Secure 2 lender or insurer partners willing to underwrite, monitor, or onboard against passport data.
      - Convert the first pilot into a €120k+ annual production contract and document either a 10 percentage-point financeable-coverage lift or 50% less manual funding-ops work.
  - horizon: "12-24 months"
    items:
      - Reach 5-8 production platforms across 2-3 European markets and at least 2 referenceable logos.
      - Launch multi-lender reporting, controlled routing, and buyer-level payment benchmarks.
      - Prove at least 1 second-lender or insurer activation using the same passport schema.
      - Add collections intelligence or insurer reporting only inside existing customer accounts.
  - horizon: "24-36 months"
    items:
      - Reach 20-25 live production platforms, consistent with the current $3.8M year-3 SOM model.
      - Win 5 or more multi-country or multi-funder accounts.
      - Expand into adjacent B2B marketplaces or vertical SaaS only after the labour-platform playbook holds similar deployment times and ACV.
      - Decide whether broader receivables-infrastructure expansion is strong enough to justify a larger growth round.
risks:
  - risk: Lenders bundle sufficient reporting into their own rails or refuse to trust a neutral passport.
    likelihood: High
    impact: High
    mitigation: Start with existing-lender workflows, prove onboarding speed and monitoring value first, and earn second-lender expansion only after partner trust is explicit.
  - risk: Platform data is too incomplete or inconsistent to produce lender-ready passports at acceptable deployment cost.
    likelihood: High
    impact: High
    mitigation: Start with explicit timesheet or milestone workflows, require sample data during discovery, and sell read-only completeness dashboards before automation.
  - risk: The labour-platform beachhead is too small or too concentrated to support venture returns without adjacent-market expansion.
    likelihood: Medium
    impact: High
    mitigation: Do not hire ahead of proof, test adjacent segments that share the same data model, and treat expansion as a gated milestone rather than a default assumption.
  - risk: A credit downturn or rising defaults reduces financed volume and weakens customer willingness to pay.
    likelihood: Medium
    impact: High
    mitigation: Keep value tied to reserve discipline, collections intelligence, and faster lender onboarding even when fresh capital is scarce.
  - risk: Procurement and IT teams treat the product as another finance workflow vendor and delay deployment.
    likelihood: Medium
    impact: Medium
    mitigation: Anchor on one acute buying trigger, piggyback on existing systems, and keep the first deployment read-only until trust is earned.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Build the one-country receivables-passport MVP, complete 2-3 design-partner
    pilots, hire engineering, risk, integration, and implementation talent,
    secure 2 lender or insurer partners, and prove that paid pilots convert to
    €120k+ annual contracts with multi-funder expansion potential.
