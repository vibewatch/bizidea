jobsToBeDone:
  - job: >-
      当新的大型企业买家坚持 60 天账期时，帮我们的支付团队在不动用自有资产负债表的情况下，仍能在一周内向工人付款，这样我们才能稳住供给并赢得更多 GMV。
    currentAlternative: "由表格和人工导出数据拼出来的单一资金方报表包"
    successMetric: "已批准发票实现当日融资的占比，以及工人打款延迟时长"
  - job: >-
      当放贷方要求持续提供应收账款表现证据时，帮助我们的资金运营团队自动生成服务商级报表，以便压低仓储资金定价并更快接入新资金方。
    currentAlternative: "围绕 ERP、工时单与打款工具展开的邮件驱动对账"
    successMetric: "接入新资金方所需天数，以及已融资发票的准备金比例"
