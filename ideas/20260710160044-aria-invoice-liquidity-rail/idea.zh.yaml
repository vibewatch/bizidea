problem: >-
  欧洲劳务派遣与自由职业平台面向企业买家销售时，往往被要求接受 net-45 或 net-60 的发票账期，但其工人和分包方却希望尽快拿到报酬。资金方只愿意基于干净、可核验的应收账款做垫付，但大多数平台无法把工时单审批、买方确认、争议标记和集中度暴露，打包成一份稳定且可被放贷方承接的记录。财务团队最终只能靠表格和邮件来管理准备金规则、放款冻结与资金方报表。结果就是承包商回款更慢、平台资产负债表承压更重，且当供给侧转向能更快打款的平台时，GMV 也会流失。
targetUser:
  primary: >-
    欧洲劳务派遣、自由职业与现场服务劳动力平台的 CFO 和支付副总裁；这些平台向企业买家开具 30-60 天账期发票，但每周就要向工人或分包方付款。
  secondary: >-
    负责核对已批准工作、管理资金额度，并决定哪些发票可以在不推高准备金的情况下被垫付的风险与资金运营人员。
  buyer: "平台 CFO 或支付副总裁"
startupThesis:
  nonObviousInsight: >-
    Aria 的规模暗示，稀缺资产已不再是原始资本，而是应收账款标准化能力。一旦债务投资人愿意为平台产生的发票提供资金并将其证券化，真正缺失的控制点，就是那层能把杂乱工作流事件——工时单、里程碑、审批、争议和买方行为——转成多家资金方都信得过的放贷级应收账款的软件层。
  beachhead: >-
    面向企业买家的欧洲劳务派遣与自由职业平台：每周处理 20,000+ 张已批准的工时单或里程碑发票、给予《财富》2000 强买家 45-60 天账期、并需要在 7 天内向工人或分包方付款。
  wedge: >-
    一套应收账款护照 API，把已批准工作事件转换成一份持续监控的发票资料包，内含服务证明、买方确认、资格检查、准备金建议，以及服务商级放贷报告。
  whyNowCatalyst: >-
    Aria 覆盖 70+ 个平台、2025 年垫付 1.7 million 张发票，并拿到证券化债务额度，说明融资轨道已经具备；瓶颈已转向数据质量，以及那些能让更多发票变得可融资的服务软件。
  ventureScalePath: >-
    先从付款紧迫性最高、审批遥测最强的劳务平台切入，再扩展到 B2B 市场、贸易服务类垂直 SaaS 与 ERP 发起的应收账款场景，叠加多资金方路由、信用保险、催收情报，以及跨平台的买方付款图谱。
solution: >-
  Labor Receivables Passport 接入工时单、里程碑、发票和打款系统，在每张发票被拿去融资之前，先为其建立一份实时更新的证据档案。它会根据审批完整度、买方付款历史、集中度上限、争议风险和合同条款来判断融资资格，然后把干净的发票路由到合适的资金额度，或在缺失证据补齐前先行冻结。产品还能自动生成服务商和投资人报表，让平台无需自建资本市场运营团队，也能同时管理一家或多家仓储资金提供方。短期 ROI 是让更多工人实现当日打款、降低准备金拖累，却不新增表内风险；长期来看，公司可以成为软件平台、保险方与债务投资人之间所有嵌入式 B2B 应收账款产品的中立运营层。
goToMarketSeed:
  firstCustomer: >-
    一家 GMV 规模在 €50-300 million 的欧洲轻工业劳务派遣或自由职业交易平台，拥有 10,000+ 名活跃工人、45-60 天企业买家账期，并且已有或计划推出由单一仓储资金方支持的即时打款项目。
  buyingTrigger: >-
    当平台签下数个账期较长的大型企业买家，或准备推出同周打款的工人即时付款产品时，就会被迫快速搭建资金方报表、准备金政策和争议控制体系。
  currentAlternative: >-
    内部风险运营表格，加上来自交易平台、ERP 与打款系统的临时导出数据，再叠加单一嵌入式金融或保理合作方自有的报表工作流。
  switchingReason: >-
    这套护照系统能让更多发票具备融资资格、缩短资金方接入周期，并让平台在不重建打款与报表运营体系的前提下，增加或替换资金合作方。
  pricingHypothesis: >-
    每月收取 €3,000-€10,000 平台费，另加按已融资发票规模收取 5-15 个基点；多资金方路由和投资人级报表可按高阶版本溢价。
whyNow:
  - point: >-
      这一品类已经拿得到仓储级资金，因此下一个约束不再是市场上有没有钱，而是平台能否把应收账款整理成可融资的格式。
    signalRefs: ["仓储资金已准备好承接嵌入式应收账款"]
    sourceRefs: [1, 2]
  - point: >-
      证券化机制意味着资金额度会随着发票回款而循环，因此持续监控发票质量的软件，比只在起始环节做一次审核的工具更有价值。
    signalRefs: ["证券化正在变成产品基础设施"]
    sourceRefs: [2]
  - point: >-
      既然已经支持了 70+ 家 B2B 市场与自由职业平台，并处理了数百万张发票，说明今天的设计合作伙伴基数已经足够大，可以孵化一款聚焦平台侧的产品。
    signalRefs: ["平台分发已不再只是纸上谈兵"]
    sourceRefs: [1]
  - point: >-
      买方并没有缩短账期；供应商需要即时现金，而买方仍保留标准 60 天账期，所以流动性产品必须直接嵌入既有工作流系统。
    signalRefs: ["Net-60 买方行为不会消失"]
    sourceRefs: [1]
  - point: >-
      欧盟 Payment Observatory 估算每年可释放超过 €100 billion 的现金流，说明延迟付款工具足以支撑有意义的软件和融资预算。
    signalRefs: ["延迟付款痛点是宏观级问题"]
    sourceRefs: [2]
differentiator: >-
  Aria 式放贷方负责发起并出资购买发票，而 ERP 与交易平台只是记录发票背后的工作流。双方都不想拥有那层中立的证据、资格、准备金与报表系统——但正是这层系统，才能让平台在多家资金方之间切换或并行运作。这家公司要成为应收账款护照的系统记录层，其护城河会随着跨平台的买方付款行为、争议模式和垫付表现数据不断积累，从而持续改善定价和资格判断。
