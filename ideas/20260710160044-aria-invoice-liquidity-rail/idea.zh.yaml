topRisks:
  - name: "资金方捆绑风险"
    description: "现有放贷方或嵌入式金融服务商可能会把基础报表能力打包进现有服务，从而挤压独立软件层。"
    mitigation: "先把自己定位成中立的多资金方与保险方互操作层，接入现有放贷方，并用切换灵活性和组合洞察能力取胜。"
  - name: "数据完整性风险"
    description: "如果平台无法稳定采集审批、争议或服务证明，太多发票都会因资格不达标而无法融资，ROI 也会随之塌陷。"
    mitigation: "先从工时单或里程碑验收最明确的劳务派遣与自由职业工作流切入，强制执行最小数据契约，并在全面自动化前先卖数据质量看板。"
  - name: "信用周期暴露"
    description: "一旦经济下行或买方违约潮出现，资金方可能会收缩额度，导致已融资规模下降并压缩软件预算。"
    mitigation: "保持轻资产负债表模式，补充独立于新增资金供给之外的催收与准备金优化价值，并在多家资金方与多个买方行业之间分散风险。"
