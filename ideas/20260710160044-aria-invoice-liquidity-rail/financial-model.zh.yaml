scenarios:
  downside:
    description: 数据审计耗时更久，正式生产合同价值停留在 BP 区间低端附近，到 Y3 Q4 公司仅达到 20 个在线平台。
    y3RevenueK: 2042.0
    y3EbitdaK: -646.4
    cashLowPointK: 397.4
    keyAssumptionChanges:
    - Q4Y2 的 customersEop 只能到 7 而不是 8，Q4Y3 到 20 而不是 22，因为试点转正式生产周期仍更慢，转介绍来得更晚。
    - 首年正式生产价值维持在约 $168K ARR，而不是约 $180K；平台内扩张也更晚挂上。
    - 期末毛利率约 68% 而不是 70%，因为数据标准化和放贷方报表仍更偏定制。
  base:
    description: 基准情景遵循 BP 路径：第 1 年 2 个付费试点，第 2 年底 8 个正式生产平台，到 Y3 Q4 有 22 个在线平台，退出 ARR 与研究 SOM 对齐。
    y3RevenueK: 2437.0
    y3EbitdaK: -341.3
    cashLowPointK: 736.6
    keyAssumptionChanges:
    - 付费平台从 M12 的 2 个增长到 Y2 Q4 的 8 个，再到 Y3 Q4 的 22 个，同时公司把期末员工数控制在 11 名 FTE。
    - 试点收入约为 90 天 $36K，之后转成约 $180K 的首年 ARR；对成熟的多放贷方或多国家客户，扩张后 ARR 约 $192K。
    - 随着模板和放贷方资料包被复用，毛利率从 Y1 前段以试点为主的 30% 中段，爬升到 Y3 Q4 的 BP 目标 70%。
  upside:
    description: 可引用部署和放贷方转介绍把新 logo 提前拉进来，成功客户内部的扩展报表模块也更早挂上。
    y3RevenueK: 2860.0
    y3EbitdaK: 26.8
    cashLowPointK: 1151.6
    keyAssumptionChanges:
    - Q4Y2 的 customersEop 达到 9，Q4Y3 达到 24，因为转介绍和伙伴渠道带来更多合格机会。
    - 首年正式生产价值达到约 $192K ARR，成熟扩张客户达到约 $216K ARR，因为多放贷方和高级报表模块更早挂上。
    - 随着部署剧本和标准映射更快压低定制实施工作，期末毛利率接近 73%。
sensitivity:
- variable: ARPU
  downsideCase: 平均每个在线平台的 ARR 稳在约 $155K，因为使用量和高级报表附加销售挂得较慢。
  baseCase: 退出 ARR 平均每个在线平台约 $175K，与主模型一致。
  upsideCase: 扩张客户把平均每个在线平台的 ARR 推向约 $190K。
  y3RevenueImpactK: -280.0
  cashImpactK: -210.0
- variable: CAC
  downsideCase: 由于技术审计和创始人投入时间仍然很重，全成本 CAC 升向约 $175K。
  baseCase: 全成本 CAC 保持在每个正式生产平台约 $145K。
  upsideCase: 放贷方和集成伙伴的热转介绍把 CAC 压到更接近约 $125K。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 流失率
  downsideCase: 如果产品始终只是可有可无的报表层，而不是核心打款工作流，月度流失率会升到 2.5%。
  baseCase: 一旦工作流嵌入，月度流失率会稳定在约 1.7%。
  upsideCase: 当第二放贷方和买方基准数据加深锁定效应后，月度流失率会降向 1.0%。
  y3RevenueImpactK: -120.0
  cashImpactK: -140.0
- variable: 销售周期
  downsideCase: 试点转正式生产拉长到 12-15 个月，使公司到 Y3 Q4 只能做到约 20 个在线平台。
  baseCase: 公司在 Y2 Q4 达到 8 个正式生产平台，在 Y3 Q4 达到 22 个在线平台。
  upsideCase: 可引用案例把销售周期压缩到足以在 Y3 Q4 达到 24 个在线平台。
  y3RevenueImpactK: -395.0
  cashImpactK: -339.0
- variable: 毛利率
  downsideCase: 由于放贷方报表和数据 QA 仍更偏服务化，期末毛利率只能接近 68%。
  baseCase: 毛利率在 Y3 Q4 达到 BP 目标的 70%。
  upsideCase: 随着可复用映射和报表资料包更快标准化，毛利率达到约 73%。
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
- variable: 招聘节奏
  downsideCase: 在部署经济性被证明之前，第二位实施招聘和额外 GTM 支持会提前两个季度到位。
  baseCase: 公司只按 BP 设定的顺序招聘，并在 Y3 Q4 达到 11 名 FTE。
  upsideCase: 有一个非核心扩张岗位可以等到第一次第二放贷方激活之后再入场，也不会拖慢增长。
  y3RevenueImpactK: 0.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      QualifiedAccounts[合格 ICP 账户] --> PaidPilots[付费试点]
      PaidPilots --> ProductionPlatforms[正式生产平台]
      ProductionPlatforms --> Expansion[第二放贷方 / 国家 / 报表扩张]
      Expansion --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[期末现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自 M12 时 2 个付费平台增长到 Y3 Q4 时 22 个在线平台，同时退出 ARR 仍与研究得出的 $3.8M SOM 对齐。
- checkName: 必须跑对的事
  finding: 部署必须足够模板化，才能让 1 名集成负责人、2 名实施招聘以及伙伴转介绍在不叠加重服务成本底盘的前提下支撑 22 个在线平台。
- checkName: 模型会失效如果
  finding: 如果每个在线平台 ARR 掉向 BP 区间低端，或放贷方接受速度变慢，那么公司甚至还没走完狭窄的劳动力平台滩头，就会保持深度 EBITDA 为负。
- checkName: 下一轮证明包
  finding: 一旦 8 个正式生产平台、2 个可引用 logo，以及 1 次第二放贷方激活证明这个切入点能超越创始人主导的试点，下一轮融资故事才成立。
sanityChecks:
  ruleOf40: Y3 增长 191.5% + EBITDA 利润率 -14.0% = 177.5%（受 Y2 基数很小影响而被放大，方向上可看，但不能替代真正的利润率证明）。
  burnMultiple: Y2 burn multiple 约 1.0x：大约 $1.01M 的 EBITDA burn 对应约 $1.03M 的新增 exit ARR（从 M12 的约 $0.36M 到 M24 的约 $1.39M）；到 Y3 随着模型接近盈亏平衡，burn multiple 降到约 0.1x。
  revenuePerFte: Y3 收入 $222K / 11 名期末 FTE（落在企业 SaaS 常见的 $200–400K 区间内，但由于交付仍然高度集成化，只接近区间下沿）。
  flags:
  - 基准情景到 Y3 仍是 EBITDA 为负，尽管第 36 个月 ARR 已匹配研究中的劳动力平台 SOM，因此有说服力的种子轮故事仍依赖高级模块或当前研究之外的相邻市场扩张。
  - 模型假设 11 名 FTE 能支撑 22 个在线平台，因为 EN 16931 / Peppol 映射和放贷方报表资料包可复用；如果集成继续保持定制化，员工数和 COGS 都会显著上升。
  - 收入集中度仍然很高，因为完整的 Y3 计划只由狭窄劳动力平台滩头内的 22 个平台承载。
  - 现金按 EBITDA 建模，因此里程碑回款条款、试点预付款或延迟的企业采购，都可能让真实现金低点前后偏移几个月。
