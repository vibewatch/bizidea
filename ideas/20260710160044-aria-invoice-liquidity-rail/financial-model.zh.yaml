slug: labor-receivables-passport
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] 模型从带日期的商业计划之后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2.5-3.5M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景采用区间中位的 pre-seed 融资，这样公司达到 12-24 个月里程碑时仍大致保留 6 个月缓冲。'
- id: A3
  name: 客户定义
  value: 一个处于付费状态的活跃劳务派遣或自由职业者平台，处于付费试点或正式生产合同阶段
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.unitOfValue] customersEop 统计的是付费平台项目，不是放贷方或终端工人。'
- id: A4
  name: 付费试点定价
  value: 约 90 天 $36K（约 $12K/月）
  unit: USD/platform
  source: '[BP gtm.pricing €25k-€40k paid implementation or pilot + BP investorMemo.firstCustomer.initialContract] 基准情景在简单换算成 USD 后取中位值。'
- id: A5
  name: 首个正式生产年度平台价值
  value: 约 $180K ARR（约 $15K/月）
  unit: USD/platform/year
  source: '[BP investorMemo.firstCustomer.initialContract €120k-€180k ARR + BP gtm.pricing €60k fixed plus 5-10 bps usage] 由于 ICP 是 GMV €50-300M 的平台而不是小型中介，首个正式生产合同按 BP 区间上沿建模。'
- id: A6
  name: 接入第二放贷方、国家扩张或高级报表后的平台扩张价值
  value: 约 $192K ARR（约 $16K/月）
  unit: USD/platform/year
  source: '[BP gtm.pricing premium pricing for multi-funder routing and investor-grade reporting + BP milestones 24-36 months] 成熟客户相对初始正式生产合同只获得温和提升。'
- id: A7
  name: 客户爬坡
  value: M12 时 2 个付费平台，Y2 Q4 时 8 个，Y3 Q4 时 22 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months] 模型命中第 3 年 20-25 个平台里程碑的下半区，而不是假设完全打满。'
- id: A8
  name: 退出 ARR 锚点
  value: Q4Y3 时约 $3.84M ARR
  unit: USD/year
  source: '[BP market.som $3.8M + research.market.som $3.8M] 第 36 个月的 run-rate 基本贴着研究中的劳动力平台 SOM，避免假设未经研究的相邻市场收入。'
- id: A9
  name: 毛利率爬坡
  value: 早期试点约 35%-40%，Y2 Q4 时约 58%，Y3 Q4 时 70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP product MVP/services scope + research.adoptionFrictionMatrix] 在模板和放贷方资料包可复用之前，早期部署会保持服务占比更高。'
- id: A10
  name: 招聘时间表
  value: 启动时为创始人和第一位工程师；M2 风险负责人；M4 集成；M7 实施；M10 第二位工程师；M12 首位销售 / 伙伴；M21 G&A / 运营；M24 第三位工程师；M30 第二位实施；M32 第二位销售 / 伙伴
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 由于 BP 明确警告不要在验证之前超前招聘，所以招聘节奏刻意保持精简。'
- id: A11
  name: 创始人全成本薪酬
  value: $120K
  unit: USD/FTE/year
  source: '[BP team Founder CEO + startup-finance heuristic for Europe-based pre-seed infrastructure startups] 假设创始人的现金薪酬低于市场水平。'
- id: A12
  name: 工程全成本薪酬
  value: $150K per FTE
  unit: USD/FTE/year
  source: '[BP team Founding eng + startup-finance heuristic] 足以在不采用湾区薪酬水平的前提下，在欧洲招到强的数据和工作流工程师。'
- id: A13
  name: 风险 / 资金产品全成本薪酬
  value: $144K
  unit: USD/FTE/year
  source: '[BP team Risk / treasury product lead + startup-finance heuristic] 反映出领域要求很重、但仍处于 pre-seed 阶段的现金薪酬水平。'
- id: A14
  name: 集成 / 解决方案全成本薪酬
  value: $138K
  unit: USD/FTE/year
  source: '[BP team Integration / solutions architect + startup-finance heuristic] 假设这是一个专注于可复用 ERP、打款与汇款映射的技术架构师岗位。'
- id: A15
  name: 实施 / 客户成功全成本薪酬
  value: $120K per FTE
  unit: USD/FTE/year
  source: '[BP team Implementation lead + startup-finance heuristic] 假设是能亲自下场交付的人才，但不建立庞大的服务团队。'
- id: A16
  name: 销售 / 伙伴全成本薪酬
  value: $168K per FTE
  unit: USD/FTE/year
  source: '[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] 包含面向放贷方和平台销售所需的浮动薪酬与差旅。'
- id: A17
  name: G&A / 运营全成本薪酬
  value: $96K
  unit: USD/FTE/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 覆盖财务、法务和供应商运营，但不提前搭大后台。'
- id: A18
  name: 非薪酬运营预算爬坡
  value: Y1 每月约 $21K-$29K，Y2 每月约 $31K-$41K，Y3 每月约 $44K-$56K
  unit: USD/month
  source: '[BP operations + BP gtm.channels + research.regulatoryTechnicalConstraints + startup-finance heuristic] 在保持精简的同时，覆盖云开销、差旅、合规、保险和客户赋能成本。'
- id: A19
  name: 月度流失率
  value: 1.7%
  unit: percent/month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP expansionLevers] 一旦工作流嵌入，这类产品应当较有黏性，但模型并未假设零流失。'
- id: A20
  name: 全成本 CAC
  value: 每个正式生产平台约 $145K
  unit: USD/platform
  source: '[BP gtm.funnelTargets + BP gtm.channels + model GTM spend] 由于销售和技术审计高度由创始人主导，CAC 保持在较高水平，但在六位数 ACV 下仍可承受。'
- id: A21
  name: 季度薪酬约定
  value: Y2-Y3 的薪酬行按各季度内实际月度入职节奏计算，而不只看要求的快照列
  unit: convention
  source: '[Financial Modeler headcount column convention] 这样能让薪酬费用与逐月招聘爬坡保持一致。'
- id: A22
  name: 现金转换简化
  value: 融资到账后，EBITDA 近似代表现金变动
  unit: convention
  source: '[startup-finance heuristic] 相对于 pre-seed 阶段的人力与服务消耗，CapEx、税费、债务服务和营运资金时差都被视为影响不大。'
- id: A23
  name: 下一轮里程碑
  value: 覆盖 2-3 个欧洲市场的 8 个正式生产平台、2 个可引用 logo，以及 1 次第二放贷方激活，同时现金仍高于 6 个月缓冲
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] 这就是这笔 pre-seed 必须资助到位的、可进入种子轮的证明包。'
- id: A24
  name: Y3 新增 logo 的伙伴来源占比
  value: 约占 Y3 新增的 30%
  unit: percent of new customers
  source: '[BP gtm.channels referral/co-sell motions + BP strategicChoices.sequencingRationale] 模型依赖首批可引用部署后的转介绍，而不是搭建庞大的外勤销售团队。'
- id: A25
  name: 部署模板复用
  value: 由于 EN 16931 / Peppol 映射和放贷方报表资料包可以跨 logo 复用，1 名集成架构师就能支撑整个基准情景爬坡
  unit: operating leverage
  source: '[BP operations + research.regulatoryTechnicalConstraints] 如果集成持续保持定制化，那么相对基准情景，毛利率和员工数都会明显变差。'
