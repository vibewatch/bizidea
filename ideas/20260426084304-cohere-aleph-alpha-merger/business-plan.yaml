slug: sovereign-ai-control-plane
date: 2026-04-26
executiveSummary: >-
  Sovereign AI is becoming a real procurement requirement for European regulated
  enterprises, but the operational bottleneck is no longer vendor selection
  alone. Banks and insurers still need a neutral control layer that decides
  which model, cloud, and geography are allowed for each workflow and can prove
  that decision later. The proposed company sells that layer as a residency-aware
  AI control plane for internal employee copilots that touch sensitive customer,
  claims, or portfolio data. The beachhead is narrow by design because internal
  copilots offer urgent governance pain, identifiable buyers, and less model-risk
  complexity than external customer-facing AI. The initial product should route
  requests across approved sovereign and hyperscaler endpoints, enforce vendor
  allowlists and policy rules, and generate audit-ready evidence for every
  invocation. Go-to-market, pricing, and implementation must stay aligned around
  one buying motion: a regulated platform team facing a production review
  deadline who will pay to replace bespoke gateway rules and manual audit prep
  with a deployable control layer. The opportunity is credible but still early,
  with meaningful substitution risk from hyperscaler controls, API gateways, and
  in-house stacks. Market sizing in the research is estimated rather than
  category-reported, and there is no defensible fetched CAGR for this exact
  niche, so the company must earn conviction through design-partner conversions
  and measurable approval-cycle compression.
problem:
  - Regulated enterprises cannot reliably enforce which AI workloads may run in which jurisdiction, on which approved model and cloud combination, once multiple vendors enter the estate.
  - Compliance, risk, and platform teams still assemble approval logic and audit evidence from legal memos, cloud settings, tickets, and ad hoc logs, which slows production rollout.
solution:
  - A sovereignty-native control plane sits between enterprise applications and model endpoints to classify requests by data class, geography, and risk tier before routing them to approved destinations.
  - The product records a tamper-evident execution ledger showing policy applied, model and cloud selected, jurisdiction, and why a request was approved, blocked, or downgraded.
whyWeWin:
  - We are neutral across sovereign and hyperscaler endpoints, while cloud vendors default to single-estate controls and generic gateways default to cost and traffic management.
  - We focus on one acute workflow of regulated internal copilots where faster approval and audit readiness matter more than broad model-orchestration feature depth.
  - Policy templates, approval workflows, and execution data can compound into a defensible approval-acceleration moat if they materially shorten customer production reviews.
strategicChoices:
  beachhead: European banks and insurers launching internal employee copilots for relationship managers, claims handlers, or call-center staff that must keep sensitive data inside approved EU infrastructure.
  wedgeRationale: This wedge has a clear economic buyer, immediate governance deadlines, and lower deployment risk than external-facing AI, so the startup can prove value through approval-cycle reduction before expanding into broader AI governance.
  sequencingRationale: Build runtime routing and evidence retrieval first because they solve the triggering production-review problem, sell through design-partner pilots into central AI platform teams, then hire compliance and partnerships talent once early deployments define reusable policy packs and sovereign-cloud channels.
  notYet:
    - Public-sector and defense procurement as a first market because cycles are longer and trust barriers are higher than bank design-partner sales.
    - Customer-facing or high-risk decisioning AI workflows until the product has stronger policy coverage, deployment references, and regulator-facing credibility.
    - Full governance system-of-record scope such as enterprise-wide model inventory and board reporting because incumbents already cover documentation workflows.
market:
  tam: Estimated $0.8B TAM based on roughly 1300 regulated enterprises and public bodies in Europe and Canada at about $600k blended annual contract value.
  sam: Estimated $120.0M SAM based on about 200 EU bank and insurer groups with active internal-copilot programs at about $600k annual contract value.
  som: Estimated $4.8M 3-year SOM based on 12 production customers at roughly $400k annual contract value.
  segments:
    - EU bank and insurer central AI platform teams
    - Sovereignty-sensitive public sector, telecom, healthcare, and defense-adjacent enterprises
  buyingProcess: >-
    The buying motion starts with the central GenAI platform or security team
    when an internal copilot reaches production review, then expands to CIO,
    CISO, CRO, procurement, and architecture stakeholders who must approve
    deployment and logging controls. Deals are likely design-partner led, with
    implementation validation and private-deployment security review before a
    production subscription.
product:
  mvp: >-
    Private-deployment or VPC-ready gateway that enforces jurisdiction-aware
    routing, provider allowlists, prompt and workflow tagging, RBAC, and
    immutable audit logs across a small set of approved model endpoints. MVP
    must integrate with identity, SIEM, and at least one DLP or API-gateway
    workflow so it removes existing control work rather than adding another
    console.
  sixMonth: Ship pilot-ready routing policies for internal copilots, evidence retrieval by workflow, and integrations for SSO, logging, and two to three approved model providers.
  twelveMonth: Launch production policy packs for EU banking and insurance, approval workflows for new vendor-model combinations, and deployment templates with one sovereign cloud partner and one hyperscaler environment.
  twentyFourMonth: Expand from internal copilots to cross-business-unit AI traffic governance with reusable sector templates, policy simulation, and expansion into adjacent regulated sectors.
  keyBets:
    - Customers will pay first for approval acceleration and evidence retrieval, not just for lower-level routing controls.
    - A narrow product can stay mostly software-led if integrations are standardized around identity, logging, and model-endpoint connectors.
    - Sovereign-cloud and audit partners will treat a neutral runtime control layer as complementary rather than competitive.
gtm:
  wedge: Sell a design-partner deployment to a German or broader EU tier-1 bank platform team launching an internal copilot that must pass jurisdiction and audit review within a fixed quarter.
  channels:
    - Direct founder-led enterprise sales into AI platform, risk, and security leaders
    - Sovereign cloud and infrastructure partnerships such as STACKIT-style channels
    - Audit, compliance, and systems-integration referrals for regulated deployments
  funnelTargets: "Lead to qualified pilot 20-30%, qualified pilot to paid pilot 50%+, paid pilot to production 60%+, production logo expansion within 12 months 50%+."
  pricing: Annual platform subscription priced by governed workflows or business units, plus usage-based governance fees on routed requests and paid implementation for policy setup; this matches centralized budget ownership and lets the first deal start as a bounded pilot before converting to production ACV.
businessModel:
  revenueStreams:
    - Annual platform subscription for governed AI workflows
    - Usage-based governance fees on routed inference requests
    - Implementation and policy-pack services
  unitOfValue: Governed AI workflow or business unit under active sovereignty policy
  targetGrossMarginPct: 75
  expansionLevers:
    - Add more workflows and business units inside the same regulated customer
    - Expand from one approved vendor set to a broader cross-cloud control plane
    - Sell sector-specific policy packs and evidence workflows to adjacent regulated industries
strategyMap:
  northStarMetric: Number of production governed AI workflows passing audit review without manual evidence assembly
  inputMetrics:
    - Time from pilot kickoff to production approval
    - Percentage of AI requests evaluated by policy engine
    - Audit evidence retrieval time per governed workflow
    - Paid pilot to production conversion rate
    - Expansion rate from first workflow to second workflow
  moatsToBuild:
    - Cross-vendor execution ledger tied to jurisdiction, policy, and approval outcome
    - Production-tested policy library by sector, jurisdiction, and model-cloud combination
    - Deployment patterns and reference architectures that reduce security-review friction
  killCriteria:
    - Fewer than 2 paid pilots or no production conversion within 12 months after 20 qualified bank and insurer conversations
    - No measurable 50%+ reduction in approval-cycle time versus incumbent internal process in first 3 pilots
    - More than half of prospects choosing single-cloud native controls after technical evaluation
  mermaid: |
    flowchart LR
      Wedge[Bank internal copilot governance wedge] --> MVP[Routing and audit-ledger MVP]
      MVP --> Proof[Faster approval and production conversions]
      Proof --> Expansion[Cross-business-unit and cross-sector control plane]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong wedge and timely regulatory pull, with the caveat that substitution risk is high until customers prove they need a neutral layer beyond hyperscaler controls.
    whyBelieve: The plan matches a newly visible procurement shift in sovereign AI with a narrow, urgent workflow owned by buyers who already carry the cost of governance delay.
    whyDoubt: Adjacent incumbents and DIY stacks already cover much of the stack, so the company may struggle unless it proves materially faster approval and audit readiness.
    nextDiligence: Validate with active EU bank and insurer platform teams that cross-vendor routing and evidence retrieval are budgeted now rather than deferred until later-stage AI adoption.
  firstCustomer:
    title: Central GenAI platform lead at a European bank or insurer
    profile: Tier-1 or large regional financial institution deploying an internal employee copilot that touches customer, claims, underwriting, or portfolio data across approved EU infrastructure.
    trigger: An internal copilot pilot reaches production review and governance teams must prove where data flows, which vendors are allowed, and how decisions are logged.
    buyer: Group CIO, Chief Risk Officer, or Chief Information Security Officer
    initialContract: 12-week paid pilot in the $150k-$250k range converting to a $400k-$700k annual production subscription if the first workflow passes review and expands to two or more teams.
  mustBeTrue:
    - EU bank and insurer platform teams must rank runtime sovereignty enforcement and audit evidence as a current budget problem, not a future architecture concern.
    - At least half of qualified prospects must need to govern more than one approved model or cloud environment within the first year.
    - The product must cut production approval or audit-prep time by at least 50% in early pilots versus incumbent manual processes.
    - Security reviewers must accept private-deployment or VPC deployment from a startup without requiring a services-heavy custom architecture each time.
    - Sovereign cloud or audit partners must open at least one repeatable co-sell or referral path rather than treating the company as a one-off integration vendor.
  diligenceQuestions:
    - What exact approval step fails today when a bank moves an internal copilot from pilot to production?
    - How often do target buyers expect to run multiple approved model providers or clouds in the same governed workflow over the next 12 months?
    - Which team owns the budget when AI governance delay becomes costly enough to buy software?
    - Can the company deploy in a way that satisfies bank security teams without becoming a bespoke professional-services project?
    - What evidence artifact do compliance teams actually need to retrieve during internal review or regulator inquiry?
  riskHeatmap:
    - risk: Buyers decide native hyperscaler sovereignty controls are sufficient
      likelihood: High
      impact: High
      leadingIndicator: More than half of late-stage prospects narrow evaluation to a single cloud estate and reject cross-vendor control requirements.
      mitigation: Position around neutral multi-provider policy enforcement and prove one evidence ledger across sovereign and hyperscaler endpoints.
    - risk: Paid pilots do not convert because the product saves control effort but not enough business pain
      likelihood: Medium
      impact: High
      leadingIndicator: Pilots finish with positive technical feedback but no quantified reduction in approval time or audit effort.
      mitigation: Scope pilots around a live production-review deadline and instrument baseline versus post-deployment approval metrics.
    - risk: Security and trust objections block startup adoption in regulated traffic paths
      likelihood: Medium
      impact: High
      leadingIndicator: Prospects require on-prem or custom isolation patterns the product cannot support by month 9.
      mitigation: Build VPC and private deployment first, integrate with existing identity and logging tools, and hire a senior security leader early.
    - risk: Services load overwhelms software economics
      likelihood: Medium
      impact: Medium
      leadingIndicator: More than 30% of early revenue comes from one-off integration work with no reusable policy or connector asset created.
      mitigation: Standardize connectors, productize policy packs, and refuse custom scopes that do not strengthen the repeatable banking template.
operatingAssumptions:
  - assumption: Design partners will buy a bounded pilot before they require a fully mature governance suite.
    basis: research.yaml
    validationTest: Close 2 paid pilots from 10-15 interviews and architecture reviews with EU bank and insurer platform teams.
    decisionImpact: If false, the company needs more upfront product maturity, more capital, and a slower sales plan before launch.
  - assumption: Jurisdiction-aware routing plus audit evidence is the minimum lovable product, not just one feature among many gateway controls.
    basis: idea.yaml
    validationTest: Run mock workflow reviews with security, risk, and platform stakeholders and confirm these two capabilities consistently rank as the top purchase drivers.
    decisionImpact: If false, roadmap must shift toward approval workflow, vendor evidence management, or another sharper initial SKU.
  - assumption: Early deployments can stay within a repeatable integration surface of identity, logging, SIEM, API gateway, and model-provider connectors.
    basis: operator judgment
    validationTest: Complete first 3 pilots with no more than 2 net-new custom integrations each and under 8 weeks implementation time.
    decisionImpact: If false, hiring and funding must tilt toward solutions engineering and the business becomes less software-scalable.
  - assumption: Bank and insurer buyers will accept a startup-hosted isolated deployment or customer-VPC deployment if controls are strong enough.
    basis: research.yaml
    validationTest: Security diligence in first 5 enterprise opportunities yields at least 3 deployable paths without requiring full on-prem support.
    decisionImpact: If false, product and funding must support on-prem deployment much earlier, increasing complexity and slowing sales.
  - assumption: Sovereign cloud and audit partners will provide meaningful distribution leverage by the second year.
    basis: idea.yaml
    validationTest: Sign 2 referral or co-sell partnerships that generate at least 20% of qualified pipeline by month 18.
    decisionImpact: If false, the company must rely on a more expensive direct-sales model and narrow geographic expansion.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview EU bank and insurer AI platform, risk, and security leaders around one live internal-copilot approval workflow.
    hypothesis: Production review pain is driven by cross-vendor policy ambiguity and evidence retrieval rather than generic model experimentation.
    successMetric: 10 interviews completed and at least 6 buyers rank routing plus audit evidence as top-two purchase drivers.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Build a clickable architecture demo and sample audit ledger for one internal-copilot workflow.
    hypothesis: Buyers will react more strongly to evidence retrieval and policy explainability than to generic gateway dashboards.
    successMetric: 5 design-partner reviews completed and at least 3 request a pilot scoping session.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Deploy MVP with one design partner across two approved model endpoints and one identity stack.
    hypothesis: A narrow deployment can reach production review in under 8 weeks with repeatable integration work.
    successMetric: First paid pilot live, under 8 weeks to deploy, and baseline approval-cycle metrics captured.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Test pilot pricing with platform subscription plus implementation versus usage-only pricing.
    hypothesis: Buyers prefer a bounded pilot fee and annual production subscription over pure consumption pricing.
    successMetric: Two paid pilots signed with similar pricing structure and no demand for fully bespoke commercial terms.
    owner: Founder CEO
  - horizon: 180-360 days
    experiment: Productize EU banking policy pack and one sovereign-cloud reference architecture.
    hypothesis: Reusable banking templates materially reduce deployment friction and improve paid pilot conversion.
    successMetric: Pilot to production conversion above 60% and implementation scope narrows in the third deployment.
    owner: Product lead
  - horizon: 180-360 days
    experiment: Launch partner motions with one sovereign cloud provider and one audit or compliance firm.
    hypothesis: Partners can create qualified pipeline because sovereignty and evidence are already part of their enterprise sales motion.
    successMetric: At least 5 qualified introductions and 1 sourced paid pilot from partner channels.
    owner: Founder CEO
operations:
  - Private-deployment reference architectures for customer VPC and isolated hosted environments
  - Policy change-management process with versioned approvals and rollback controls
  - Connector roadmap for identity, SIEM, DLP, model providers, and API gateways
  - Security and compliance program covering SOC 2 or ISO pathway, RBAC, retention controls, and incident response
  - Design-partner governance cadence with architecture review, pilot metric review, and quarterly expansion planning
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own policy engine, integrations, and secure deployment architecture from day one.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Lead regulated-enterprise discovery, design-partner sales, and early sovereign-cloud relationships.
  - role: Security and compliance lead
    startTiming: Month 3-6
    rationale: De-risk enterprise trust reviews, translate AI Act and bank-control requirements into productized policy packs, and support audits.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Shorten pilot deployment time and capture reusable integration patterns before services work sprawls.
  - role: Product lead
    startTiming: Month 9-12
    rationale: Turn bespoke requests into sector templates, partner-ready packaging, and a disciplined roadmap.
milestones:
  - horizon: 0-12 months
    items:
      - Secure 2-3 paid design partners in EU banking or insurance.
      - Ship MVP with jurisdiction-aware routing, provider allowlists, RBAC, and evidence retrieval.
      - Complete first production conversion with a measured 50%+ reduction in approval or audit-prep time.
      - Publish one repeatable banking policy pack and one private-deployment reference architecture.
  - horizon: 12-24 months
    items:
      - Reach 6-8 production customers and prove multi-workflow expansion in at least half of them.
      - Add one sovereign-cloud partner channel and one audit or compliance referral channel.
      - Launch banking and insurance policy packs plus approval workflows for new vendor-model combinations.
      - Achieve repeatable deployment timelines under 6 weeks for standard customer environments.
  - horizon: 24-36 months
    items:
      - Reach 12 production customers and expand beyond banking and insurance into one adjacent regulated sector.
      - Introduce policy simulation and broader enterprise AI traffic governance beyond the first copilot workflow.
      - Build a defensible execution dataset across jurisdictions, providers, and approval outcomes.
      - Prepare for larger round based on expansion efficiency and partner-sourced pipeline.
risks:
  - risk: Hyperscalers and generic gateways absorb enough sovereignty controls to collapse the neutral-layer wedge.
    likelihood: High
    impact: High
    mitigation: Stay focused on cross-vendor policy logic, regulator-facing evidence retrieval, and sectors where buyers already expect more than one approved environment.
  - risk: Enterprise sales cycles outrun a small team's runway.
    likelihood: Medium
    impact: High
    mitigation: Sell against live production-review deadlines, require paid pilots, and narrow the ICP to buyers with active internal-copilot launches.
  - risk: The company becomes a services-heavy integration shop instead of a software platform.
    likelihood: Medium
    impact: Medium
    mitigation: Productize policy packs and connectors early, measure implementation time as a core metric, and reject non-repeatable scopes.
  - risk: Startup trust gap blocks deployment in regulated AI traffic paths.
    likelihood: Medium
    impact: High
    mitigation: Offer private deployment, hire security credibility early, and use design partners plus auditors or cloud partners as trust anchors.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the core product team, security and solutions hiring, first private-deployment reference architectures, 2-3 bank design partners, and the evidence needed to convert pilots into a repeatable seed-stage enterprise motion.
