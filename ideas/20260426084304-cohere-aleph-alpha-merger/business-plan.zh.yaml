slug: sovereign-ai-control-plane
date: 2026-04-26
executiveSummary: >-
  主权 AI 正在成为欧洲受监管企业的真实采购要求，但运营瓶颈已经不只是选哪家供应商。银行和保险公司仍需要一层中立控制层，来决定每个工作流允许使用哪种模型、哪朵云、哪个地理区域，并且事后能把这项决策证明清楚。拟议中的公司把这层能力做成一套驻留感知型 AI 控制平面，先服务会接触敏感客户、理赔或投资组合数据的内部员工 copilot。之所以把滩头市场压得很窄，是因为内部 copilot 的治理痛点更急、买方更明确、模型风险复杂度也低于对外客户场景。第一版产品应在获批的主权端点与超大云端点之间路由请求，执行供应商白名单与策略规则，并为每次调用生成可审计证据。GTM、定价与实施都必须围绕同一个购买动作展开：一个正面临生产评审截止日期的受监管平台团队，愿意付费把定制网关规则和手工审计准备替换成一层可部署控制平面。机会真实存在，但仍处于早期，超大云原生控制、API 网关和内部自建栈都构成明显替代风险。研究中的市场规模是估算值而非成熟类别口径，也没有针对这个细分的可靠 CAGR 数据，因此公司必须靠设计合作伙伴转化率和可量化的审批周期压缩来建立说服力。
problem:
  - 一旦企业环境里出现多个供应商，受监管企业就很难稳定执行“哪些 AI 工作负载可以在哪个司法辖区、跑在哪组获批模型与云上”的要求。
  - 合规、风险和平台团队至今仍要从法务备忘录、云配置、工单和零散日志里手工拼审批逻辑与审计证据，这会拖慢生产上线。
solution:
  - 一套主权原生控制平面位于企业应用和模型端点之间，先按数据类别、地理位置和风险等级分类请求，再路由到获批目标。
  - 产品会保留一份防篡改执行台账，记录应用了哪条策略、选择了哪个模型与云、所属司法辖区，以及请求为何被批准、拦截或降级。
whyWeWin:
  - 我们同时兼容主权端点和超大云端点，而云厂商天然偏向单一自家环境，通用网关又更偏成本和流量管理。
  - 我们只盯住受监管内部 copilot 这一条尖锐工作流，在这里，更快过审和更好审计准备比“功能更全的模型编排”更重要。
  - 如果策略模板、审批工作流和执行数据确实能显著缩短客户的生产评审周期，它们就能累积成一个以审批提速为核心的护城河。
strategicChoices:
  beachhead: 欧洲银行和保险公司中，正在为客户经理、理赔处理人员或呼叫中心员工上线内部 copilot，且必须把敏感数据留在获批欧盟基础设施内的团队。
  wedgeRationale: 这个切口的经济买方清晰、治理截止时间迫近，而且部署风险低于面向外部用户的 AI，因此创业公司可以先靠缩短审批周期证明价值，再向更广的 AI 治理扩张。
  sequencingRationale: 先把运行时路由和证据检索做好，因为它们直击触发生产评审的问题；通过设计合作伙伴试点切入中央 AI 平台团队；等早期部署定义出可复用策略包和主权云渠道后，再补合规与合作伙伴人才。
  notYet:
    - 暂不把公共部门和国防采购作为第一市场，因为周期更长、信任门槛也高于银行设计合作伙伴销售。
    - 在产品拥有更强策略覆盖、部署案例和面向监管的可信度之前，不碰面向客户或高风险决策的 AI 工作流。
    - 暂不扩成完整的治理系统记录层，例如企业级模型台账或董事会报表，因为 incumbents 已经覆盖了不少文档工作流。
market:
  tam: 基于欧洲和加拿大约 1300 家受监管企业与公共机构、以及约 $600k 的年均合同价值估算，TAM 约为 $0.8B。
  sam: 基于约 200 家已启动内部 copilot 项目的欧盟银行和保险集团、以及约 $600k 的年均合同价值估算，SAM 约为 $120.0M。
  som: 按第 3 年拿下 12 个生产客户、每家约 $400k 年合同价值估算，3 年可触达 SOM 约为 $4.8M。
  segments:
    - 欧盟银行和保险公司的中央 AI 平台团队
    - 对主权敏感的公共部门、电信、医疗和贴近国防的企业
  buyingProcess: >-
    购买动作通常始于中央 GenAI 平台或安全团队，因为某个内部 copilot 即将进入生产评审；随后会扩展到 CIO、CISO、CRO、采购与架构等利益相关方，他们都必须批准部署和日志控制。交易大概率以设计合作伙伴试点为起点，在转成生产订阅之前，还要完成实施验证和私有部署安全审查。
product:
  mvp: >-
    支持私有部署或客户 VPC 的网关，能够在少量获批模型端点之间执行按司法辖区路由、供应商白名单、提示词和工作流标签、RBAC 以及不可变审计日志。MVP 必须接入身份系统、SIEM，以及至少一个 DLP 或 API 网关工作流，真正拿掉现有控制工作，而不是再加一个控制台。
  sixMonth: 推出适用于内部 copilot 的试点级路由策略、按工作流检索证据，以及 SSO、日志和 2-3 家获批模型供应商的集成。
  twelveMonth: 上线适用于欧盟银行和保险的生产级策略包、新增供应商-模型组合的审批工作流，以及与一家主权云伙伴和一家超大云环境配套的部署模板。
  twentyFourMonth: 从内部 copilot 扩展到跨业务单元的 AI 流量治理，提供可复用行业模板、策略仿真，并进入相邻受监管行业。
  keyBets:
    - 客户一开始愿意为审批提速和证据检索付费，而不是只为底层路由控制买单。
    - 只要围绕身份、日志和模型端点连接器把集成标准化，产品就能保持以软件为主，而不是陷入重服务。
    - 主权云伙伴和审计伙伴会把中立运行时控制层视作互补能力，而不是竞争对手。
gtm:
  wedge: 向德国或更广泛欧盟的一家一级银行平台团队卖出设计合作伙伴部署；该团队正上线一个必须在固定季度内通过司法辖区和审计审查的内部 copilot。
  channels:
    - 由创始人主导，直接向 AI 平台、风险与安全负责人做企业销售
    - 类似 STACKIT 的主权云和基础设施合作渠道
    - 面向受监管部署的审计、合规与系统集成转介绍
  funnelTargets: 从线索到合格试点 20-30%，合格试点到付费试点 50%+，付费试点到生产 60%+，生产客户在 12 个月内 logo 扩张 50%+。
  pricing: 按受治理工作流或业务单元收取年度平台订阅费，另加路由请求的治理用量费和策略配置实施费；这种方式贴合集中预算归属，也让首单可以先从范围有限的试点起步，再转成生产 ACV。
businessModel:
  revenueStreams:
    - 受治理 AI 工作流的平台年度订阅
    - 路由推理请求的治理用量费
    - 实施与策略包服务
  unitOfValue: 处于有效主权策略管理下的 AI 工作流或业务单元
  targetGrossMarginPct: 75
  expansionLevers:
    - 在同一受监管客户内部增加更多工作流和业务单元
    - 从一组已获批供应商扩展为更广的跨云控制平面
    - 向相邻受监管行业销售行业策略包和证据工作流
strategyMap:
  northStarMetric: 无需人工拼证据、即可通过审计评审的生产级受治理 AI 工作流数量
  inputMetrics:
    - 从试点启动到生产获批所需时间
    - 经过策略引擎评估的 AI 请求占比
    - 每个受治理工作流的审计证据检索时间
    - 付费试点到生产的转化率
    - 从首个工作流扩展到第二个工作流的比例
  moatsToBuild:
    - 绑定司法辖区、策略与审批结果的跨供应商执行台账
    - 按行业、司法辖区和模型-云组合整理的生产验证策略库
    - 能降低安全评审摩擦的部署模式和参考架构
  killCriteria:
    - 在与 20 家合格银行和保险机构对话后 12 个月内，付费试点少于 2 个，或没有任何生产转化
    - 前 3 个试点里，相比客户原有流程，审批周期没有 measurable 50%+ 的缩短
    - 超过一半潜在客户在技术评估后选择单云原生控制
  mermaid: |
    flowchart LR
      Wedge[银行内部 copilot 治理切口] --> MVP[路由与审计台账 MVP]
      MVP --> Proof[更快审批与生产转化]
      Proof --> Expansion[跨业务单元与跨行业控制平面]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: 切口强、监管拉力及时，但在客户证明他们确实需要超出超大云原生控制的中立层之前，替代风险依然很高。
    whyBelieve: 这套方案把刚刚变得可见的主权 AI 采购转向，与一个范围窄但紧迫、且买方已在为治理延误付成本的工作流对上了。
    whyDoubt: 相邻 incumbents 和 DIY 栈已经覆盖了栈里的大部分能力，所以除非公司能证明审批更快、审计更省事，否则会很难突围。
    nextDiligence: 与正在推进内部 copilot 的欧盟银行和保险平台团队确认，跨供应商路由和证据检索现在就有预算，而不是要等 AI 使用更成熟之后再做。
  firstCustomer:
    title: 欧洲银行或保险公司的中央 GenAI 平台负责人
    profile: 一级或大型区域性金融机构，正在获批的欧盟基础设施上部署会接触客户、理赔、核保或投资组合数据的内部员工 copilot。
    trigger: 内部 copilot 试点进入生产评审，而治理团队必须证明数据流向、允许的供应商，以及决策是如何被记录的。
    buyer: Group CIO, Chief Risk Officer, or Chief Information Security Officer
    initialContract: 为期 12 周、金额在 $150k-$250k 之间的付费试点；如果首个工作流通过评审并扩展到两个及以上团队，再转成 $400k-$700k 的年度生产订阅。
  mustBeTrue:
    - 欧盟银行和保险平台团队必须把运行时主权执行与审计证据视为当前预算问题，而不是未来架构问题。
    - 至少一半合格潜在客户需要在第一年内治理不止一套已获批模型或云环境。
    - 产品在早期试点中必须把生产审批或审计准备时间压缩至少 50%。
    - 安全评审方必须能接受由创业公司提供的私有部署或 VPC 部署，而不是每次都要求重服务定制架构。
    - 主权云或审计伙伴必须至少打开一条可重复的联合销售或转介绍路径，而不是把公司当成一次性集成商。
  diligenceQuestions:
    - 当一家银行把内部 copilot 从试点推到生产时，今天具体是哪一步审批最容易失败？
    - 目标买家预计未来 12 个月里，会有多大概率在同一受治理工作流里同时使用多家已获批模型供应商或云？
    - 当 AI 治理延误开始变得昂贵时，究竟由哪个团队拥有预算？
    - 公司能否在不变成定制化专业服务项目的前提下，以让银行安全团队接受的方式部署？
    - 在内部审查或监管问询时，合规团队到底需要调取哪种证据工件？
  riskHeatmap:
    - risk: 买家认为超大云原生主权控制已经足够
      likelihood: High
      impact: High
      leadingIndicator: 超过一半后期潜在客户把评估范围收缩到单一云环境，并拒绝跨供应商控制需求。
      mitigation: 围绕中立的多供应商策略执行定位，并证明一套证据台账就能同时覆盖主权端点和超大云端点。
    - risk: 付费试点无法转成生产，因为产品虽然节省了控制工作，但没有解决足够大的业务痛点
      likelihood: Medium
      impact: High
      leadingIndicator: 试点结束后技术反馈积极，但没有量化的审批时间或审计工作量下降。
      mitigation: 把试点范围卡在一个真实的生产评审截止日期上，并记录部署前后审批指标的基线与改善值。
    - risk: 安全和信任顾虑阻碍创业公司进入受监管 AI 流量路径
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户在第 9 个月前就要求产品支持 on-prem 或定制隔离模式，而当前能力无法满足。
      mitigation: 优先做 VPC 和私有部署，接入现有身份与日志工具，并尽早招聘资深安全负责人。
    - risk: 服务负担压垮软件经济模型
      likelihood: Medium
      impact: Medium
      leadingIndicator: 超过 30% 的早期收入来自一次性集成工作，且没有形成可复用的策略或连接器资产。
      mitigation: 标准化连接器、产品化策略包，并拒绝那些不能强化可复制银行模板的定制范围。
operatingAssumptions:
  - assumption: 设计合作伙伴会先为一个范围可控的试点买单，而不是等完整成熟的治理套件出现。
    basis: research.yaml
    validationTest: 与欧盟银行和保险平台团队完成 10-15 次访谈与架构评审，并从中拿下 2 个付费试点。
    decisionImpact: 如果不成立，公司需要更成熟的前置产品、更高资本投入，以及更慢的销售计划。
  - assumption: 按司法辖区路由加审计证据，就是最小可爱产品，而不只是众多网关功能中的一个。
    basis: idea.yaml
    validationTest: 让安全、风险和平台团队一起评审模拟工作流，确认这两项能力持续排在最重要的购买驱动前二。
    decisionImpact: 如果不成立，路线图就必须转向审批工作流、供应商证据管理，或其他更尖锐的初始 SKU。
  - assumption: 早期部署可以收敛在一套可重复的集成面：身份、日志、SIEM、API 网关和模型供应商连接器。
    basis: operator judgment
    validationTest: 前 3 个试点每个都不新增超过 2 个定制集成，且实施时间控制在 8 周以内。
    decisionImpact: 如果不成立，招聘和融资就得向解决方案工程倾斜，商业模式也会更难按软件扩张。
  - assumption: 只要控制足够强，银行和保险买家会接受创业公司托管的隔离部署或客户 VPC 部署。
    basis: research.yaml
    validationTest: 前 5 个企业机会中的安全尽调，至少拿到 3 条无需完整 on-prem 支持也能部署的路径。
    decisionImpact: 如果不成立，产品和资金必须更早支持 on-prem，复杂度会更高，销售也会更慢。
  - assumption: 到第 2 年，主权云和审计伙伴会带来有意义的分发杠杆。
    basis: idea.yaml
    validationTest: 在第 18 个月前签下 2 个转介绍或联合销售伙伴，并让它们贡献至少 20% 的合格管道。
    decisionImpact: 如果不成立，公司就必须依赖成本更高的直销模式，并放慢地域扩张。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 围绕一个真实的内部 copilot 审批工作流，访谈欧盟银行和保险公司的 AI 平台、风险与安全负责人。
    hypothesis: 生产评审的痛点主要来自跨供应商策略模糊和证据检索，而不是泛化的模型试验需求。
    successMetric: 完成 10 次访谈，且至少有 6 位买家把“路由 + 审计证据”列为前两大购买驱动。
    owner: 创始人/CEO
  - horizon: 0-90 天
    experiment: 做一个可点击架构演示和一套针对单个内部 copilot 工作流的样例审计台账。
    hypothesis: 买家会对证据检索和策略可解释性反应更强，而不是对通用网关仪表盘更感兴趣。
    successMetric: 完成 5 次设计合作伙伴评审，且至少有 3 家要求进入试点范围界定。
    owner: 创始工程负责人
  - horizon: 90-180 天
    experiment: 在一个设计合作伙伴处部署 MVP，接入两家获批模型端点和一套身份系统。
    hypothesis: 一个范围狭窄的部署可以在 8 周内进入生产评审，且集成工作可重复。
    successMetric: 首个付费试点上线，部署时间少于 8 周，并记录审批周期基线指标。
    owner: 创始工程负责人
  - horizon: 90-180 天
    experiment: 测试“平台订阅 + 实施费”与“纯用量计费”两种试点定价。
    hypothesis: 买家更偏好范围可控的试点费用和年度生产订阅，而不是纯消费式定价。
    successMetric: 签下 2 个定价结构相近的付费试点，且买家不要求完全定制化商务条款。
    owner: 创始人/CEO
  - horizon: 180-360 天
    experiment: 把欧盟银行策略包和一个主权云参考架构产品化。
    hypothesis: 可复用的银行模板能显著降低部署摩擦，并提升付费试点转生产的转化率。
    successMetric: 试点到生产转化率高于 60%，且第 3 次部署的实施范围明显收窄。
    owner: 产品负责人
  - horizon: 180-360 天
    experiment: 与一家主权云供应商和一家审计或合规机构启动合作动作。
    hypothesis: 因为主权和证据本来就是它们企业销售的一部分，伙伴可以带来合格管道。
    successMetric: 通过伙伴渠道拿到至少 5 个合格引荐和 1 个来源明确的付费试点。
    owner: 创始人/CEO
operations:
  - 面向客户 VPC 和隔离托管环境的私有部署参考架构
  - 带版本审批和回滚控制的策略变更管理流程
  - 覆盖身份、SIEM、DLP、模型供应商和 API 网关的连接器路线图
  - 包含 SOC 2 或 ISO 路线、RBAC、保留控制和事件响应的安全与合规体系
  - 设计合作伙伴治理节奏，包括架构评审、试点指标复盘和季度扩张规划
team:
  - role: 创始工程负责人
    startTiming: Month 0
    rationale: 从第一天起负责策略引擎、集成与安全部署架构。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 负责受监管企业调研、设计合作伙伴销售和早期主权云关系。
  - role: 安全与合规负责人
    startTiming: Month 3-6
    rationale: 降低企业信任评审风险，把 AI Act 和银行控制要求翻译成产品化策略包，并支持审计。
  - role: 解决方案工程师
    startTiming: Month 6
    rationale: 在服务工作失控前缩短试点部署时间，并沉淀可复用集成模式。
  - role: 产品负责人
    startTiming: Month 9-12
    rationale: 把定制需求抽象成行业模板、可供伙伴销售的包装和纪律化路线图。
milestones:
  - horizon: 0-12 个月
    items:
      - 在欧盟银行或保险行业拿下 2-3 个付费设计合作伙伴。
      - 上线具备按司法辖区路由、供应商白名单、RBAC 和证据检索能力的 MVP。
      - 完成首个生产转化，并把审批或审计准备时间 measurable 缩短 50%+。
      - 发布一套可复用的银行策略包和一个私有部署参考架构。
  - horizon: 12-24 个月
    items:
      - 达到 6-8 个生产客户，并在至少一半客户中证明多工作流扩张。
      - 增加一条主权云合作渠道和一条审计或合规转介绍渠道。
      - 上线银行与保险策略包，以及针对新供应商-模型组合的审批工作流。
      - 在标准客户环境下把可重复部署时间压到 6 周以内。
  - horizon: 24-36 个月
    items:
      - 达到 12 个生产客户，并从银行和保险扩展到一个相邻受监管行业。
      - 推出策略仿真，以及超出首个 copilot 工作流的更广企业 AI 流量治理。
      - 在司法辖区、供应商和审批结果维度上建立可防御的执行数据集。
      - 基于扩张效率和伙伴来源管道，为更大一轮融资做准备。
risks:
  - risk: 超大云和通用网关吸收了足够多的主权控制能力，导致中立控制层切口坍塌。
    likelihood: High
    impact: High
    mitigation: 聚焦跨供应商策略逻辑、面向监管的证据检索，以及那些买家本来就预期会使用多套获批环境的行业。
  - risk: 企业销售周期超过小团队的现金跑道。
    likelihood: Medium
    impact: High
    mitigation: 对准真实的生产评审截止日期来卖，要求付费试点，并把 ICP 收窄到正在启动内部 copilot 的买家。
  - risk: 公司最终变成重服务集成商，而不是软件平台。
    likelihood: Medium
    impact: Medium
    mitigation: 尽早把策略包和连接器产品化，把实施时长当作核心指标，并拒绝不可复用的定制范围。
  - risk: 创业公司的信任缺口阻碍其进入受监管 AI 流量路径。
    likelihood: Medium
    impact: High
    mitigation: 提供私有部署，尽早补足安全可信度，并借助设计合作伙伴、审计方或云伙伴建立信任锚点。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月资金将覆盖核心产品团队、安全与解决方案招聘、首批私有部署参考架构、2-3 家银行设计合作伙伴，以及把试点转成可重复 seed 阶段企业销售动作所需的证据沉淀。
