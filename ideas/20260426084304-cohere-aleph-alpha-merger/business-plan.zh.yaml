slug: sovereign-ai-control-plane
date: 2026-04-26
executiveSummary: >-
  主权 AI 正在成为欧洲受监管企业的真实采购要求，但运营瓶颈已不再只是供应商选择。银行和保险公
  司仍需要一层中立控制层，来决定每个工作流允许使用哪个模型、哪朵云和哪个地理区域，并在事后证
  明该决策。拟议中的公司将这一层作为面向内部员工 copilot 的驻留感知型 AI 控制平面出售，这些
  copilot 会接触敏感的客户、理赔或投资组合数据。之所以刻意把滩头市场收窄，是因为内部 copilot
  同时具备紧迫的治理痛点、明确的买方，以及比面向外部客户的 AI 更低的模型风险复杂度。初始产品
  应在获批的主权端点和超大云端点之间路由请求，执行供应商白名单与策略规则，并为每次调用生成审
  计就绪证据。市场进入、定价和实施都必须围绕同一购买动作保持一致：一个面对生产审查截止期的受
  监管平台团队，愿意付费用可部署控制层替代定制网关规则和人工审计准备。这个机会可信但仍处早期，
  同时面临来自超大云控制、API 网关和内部自建栈的显著替代风险。研究中的市场规模属于估算而非品
  类官方口径，且该细分领域没有可坚实获取的 CAGR，因此公司必须靠设计合作伙伴转化和可量化的审批
  周期压缩来建立信心。
problem:
  - 一旦企业内部同时存在多个供应商，受监管企业就无法可靠地强制规定哪些 AI 工作负载可以在哪个司法辖区、通过哪种获批模型和云组合运行。
  - 合规、风险和平台团队仍需从法务备忘录、云设置、工单和临时日志中拼装审批逻辑和审计证据，从而拖慢生产上线。
solution:
  - 一套主权原生控制平面位于企业应用和模型端点之间，先按数据类别、地理位置和风险等级对请求分类，再将其路由到获批目的地。
  - 该产品记录一份防篡改执行账本，展示应用了何种策略、选用了哪个模型和云、涉及哪个司法辖区，以及请求为何被批准、拦截或降级。
whyWeWin:
  - 我们在主权端点和超大云端点之间保持中立，而云厂商默认只提供单一体系控制，通用网关则默认聚焦成本和流量管理。
  - 我们聚焦受监管内部 copilot 这一尖锐工作流，在这里更快获批和审计就绪比更深更广的模型编排能力更重要。
  - 如果策略模板、审批工作流和执行数据能显著缩短客户生产审查时间，它们就会复利积累成具防御性的审批加速护城河。
strategicChoices:
  beachhead: 面向正在为客户经理、理赔处理员或呼叫中心员工推出内部员工 copilot 的欧洲银行和保险公司，这些系统必须将敏感数据保留在获批的欧盟基础设施内。
  wedgeRationale: 这一楔子拥有清晰的经济买方、迫在眉睫的治理截止期，以及比外部面向客户的 AI 更低的部署风险，因此初创公司可以先通过缩短审批周期来证明价值，再扩展到更广泛的 AI 治理。
  sequencingRationale: 先构建运行时路由和证据检索，因为它们直接解决触发采购的生产审查问题；通过设计合作伙伴试点向中央 AI 平台团队销售；等到早期部署沉淀出可复用策略包和主权云渠道后，再扩充合规与合作伙伴团队。
  notYet:
    - 不把公共部门和国防采购作为首个市场，因为其周期更长，信任门槛也高于银行设计合作伙伴销售。
    - 在产品尚未具备更强策略覆盖、部署案例和面向监管方可信度之前，不进入面向客户或高风险决策型 AI 工作流。
    - 暂不做企业级模型清单、董事会报告等完整记录系统范围，因为既有厂商已覆盖文档工作流。
market:
  tam: 估算 TAM 为 $0.8B，基于欧洲和加拿大约 1300 家受监管企业与公共机构，以及约 $600k 的混合年度合同价值。
  sam: 估算 SAM 为 $120.0M，基于约 200 个拥有活跃内部 copilot 项目的欧盟银行和保险集团，以及约 $600k 的年度合同价值。
  som: 估算 3 年 SOM 为 $4.8M，基于 12 个生产客户和每个客户约 $400k 的年度合同价值。
  segments:
    - 欧盟银行和保险公司中央 AI 平台团队
    - 对主权敏感的公共部门、电信、医疗和邻近国防企业
  buyingProcess: >-
    购买流程始于中央 GenAI 平台或安全团队，当内部 copilot 进入生产审查后，再扩展到必须批准部署
    和日志控制的 CIO、CISO、CRO、采购及架构相关方。交易很可能以设计合作伙伴模式推动，在转为生产
    订阅之前先完成实施验证和私有部署安全审查。
product:
  mvp: >-
    支持私有部署或 VPC 的网关，在少量获批模型端点之间执行司法辖区感知路由、供应商白名单、提示
    与工作流打标、RBAC 以及不可变审计日志。MVP 必须接入身份、SIEM，以及至少一个 DLP 或 API 网
    关工作流，这样它取代的是现有控制工作，而不是再增加一个控制台。
  sixMonth: 交付面向内部 copilot 的试点级路由策略、按工作流检索证据的能力，以及 SSO、日志和两到三个获批模型供应商的集成。
  twelveMonth: 推出面向欧盟银行和保险业的生产级策略包、针对新供应商-模型组合的审批工作流，以及覆盖一家主权云合作伙伴和一个超大云环境的部署模板。
  twentyFourMonth: 从内部 copilot 扩展到跨业务单元的 AI 流量治理，提供可复用行业模板、策略仿真，并进入相邻的受监管行业。
  keyBets:
    - 客户首先愿意为审批加速和证据检索付费，而不只是底层路由控制。
    - 如果围绕身份、日志和模型端点连接器实现标准化集成，窄产品仍可基本保持软件驱动。
    - 主权云与审计合作伙伴会把中立运行时控制层视为互补，而不是竞争关系。
gtm:
  wedge: 向德国或更广泛欧盟地区的一级银行平台团队销售设计合作伙伴部署；该团队正在推出一项必须在固定季度内通过司法辖区和审计审查的内部 copilot。
  channels:
    - 由创始人主导，直接面向 AI 平台、风险和安全负责人做企业销售
    - 类似 STACKIT 的主权云与基础设施合作渠道
    - 面向受监管部署的审计、合规和系统集成转介
  funnelTargets: "线索到合格试点 20-30%，合格试点到付费试点 50%+，付费试点到生产 60%+，生产客户在 12 个月内从首个 logo 扩展 50%+。"
  pricing: 按受治理工作流或业务单元收取年度平台订阅费，另加按路由请求计费的治理费用及策略设置实施费；这与集中预算归属相匹配，也让首单可先以范围明确的试点形式启动，再转为生产 ACV。
businessModel:
  revenueStreams:
    - 面向受治理 AI 工作流的年度平台订阅
    - 按路由推理请求计费的治理费用
    - 实施与策略包服务
  unitOfValue: 受主动主权策略约束的 AI 工作流或业务单元
  targetGrossMarginPct: 75
  expansionLevers:
    - 在同一受监管客户内部增加更多工作流和业务单元
    - 从单一获批供应商集合扩展为更广泛的跨云控制平面
    - 向相邻受监管行业销售行业特定策略包和证据工作流
strategyMap:
  northStarMetric: 无需人工拼装证据即可通过审计审查的生产级受治理 AI 工作流数量
  inputMetrics:
    - 从试点启动到生产获批的时间
    - 由策略引擎评估的 AI 请求占比
    - 每个受治理工作流的审计证据检索时间
    - 付费试点到生产的转化率
    - 从首个工作流扩展到第二个工作流的扩展率
  moatsToBuild:
    - 与司法辖区、策略和审批结果绑定的跨供应商执行账本
    - 按行业、司法辖区和模型-云组合组织的生产验证策略库
    - 能降低安全审查摩擦的部署模式与参考架构
  killCriteria:
    - 在与 20 家银行和保险公司完成合格对话后，12 个月内仍不足 2 个付费试点，或没有生产转化
    - 前 3 个试点中，相较既有内部流程，审批周期时间没有可量化的 50%+ 降幅
    - 超过一半潜在客户在技术评估后选择单云原生控制
  mermaid: |
    flowchart LR
      Wedge[银行内部 copilot 治理楔子] --> MVP[路由与审计账本 MVP]
      MVP --> Proof[更快获批并实现生产转化]
      Proof --> Expansion[扩展为跨业务单元、跨行业控制平面]
investorMemo:
  verdict:
    call: "值得会面 / 继续深入调研"
    conviction: 楔子清晰、监管拉动及时，但前提是客户必须证明自己需要一层超越超大云原生控制的中立层，否则替代风险仍然很高。
    whyBelieve: 该方案贴合主权 AI 采购中一个刚刚变得可见的转向，并围绕由明确买方拥有的狭窄而紧迫的工作流展开，这些买方已经在承担治理延迟的成本。
    whyDoubt: 相邻既有厂商和 DIY 栈已覆盖栈中的大部分环节，因此除非公司能证明审批显著更快、审计准备显著更充分，否则可能难以突围。
    nextDiligence: 与活跃的欧盟银行和保险公司平台团队验证：跨供应商路由和证据检索是否已进入当前预算，而不是被推迟到 AI 采用的后期。
  firstCustomer:
    title: 欧洲银行或保险公司的中央 GenAI 平台负责人
    profile: 在获批欧盟基础设施上部署会接触客户、理赔、核保或投资组合数据的内部员工 copilot 的一级或大型区域性金融机构。
    trigger: 某个内部 copilot 试点进入生产审查，治理团队必须证明数据流向何处、允许哪些供应商，以及决策如何被记录。
    buyer: 集团 CIO、首席风险官或首席信息安全官
    initialContract: 如果首个工作流通过审查并扩展到两个或更多团队，则可由 $150k-$250k 的 12 周付费试点转化为 $400k-$700k 的年度生产订阅。
  mustBeTrue:
    - 欧盟银行和保险公司平台团队必须把运行时主权执行和审计证据视为当前预算问题，而不是未来架构问题。
    - 至少一半的合格潜在客户必须在第一年内就需要治理不止一个获批模型或云环境。
    - 与既有人工流程相比，产品必须在早期试点中将生产审批或审计准备时间至少缩短 50%。
    - 安全审查方必须接受初创公司的私有部署或 VPC 部署，而无需每次都定制成重服务架构。
    - 主权云或审计合作伙伴必须至少打开一条可重复的联合销售或转介路径，而不是把公司当作一次性集成供应商。
  diligenceQuestions:
    - 当银行把内部 copilot 从试点推进到生产时，今天到底是哪一个审批环节出了问题？
    - 目标买家预计在未来 12 个月里，有多频繁会在同一个受治理工作流中运行多个获批模型供应商或多朵云？
    - 当 AI 治理延迟昂贵到值得购买软件时，预算究竟归哪个团队所有？
    - 公司能否以满足银行安全团队要求的方式部署，而不会演变成定制化专业服务项目？
    - 合规团队在内部审查或监管问询中，实际需要调取哪种证据产物？
  riskHeatmap:
    - risk: 买家认为原生超大云主权控制已足够
      likelihood: High
      impact: High
      leadingIndicator: 超过一半的后期潜在客户把评估范围收窄到单一云体系，并拒绝跨供应商控制要求。
      mitigation: 围绕中立的多供应商策略执行来定位，并证明在主权端点和超大云端点之间存在统一证据账本。
    - risk: 付费试点无法转化，因为产品虽节省控制工作量，但并未缓解足够强的业务痛点
      likelihood: Medium
      impact: High
      leadingIndicator: 试点结束后技术反馈积极，但审批时间或审计工作量没有量化下降。
      mitigation: 将试点范围锚定在真实的生产审查截止期上，并记录部署前后审批指标基线。
    - risk: 安全与信任异议阻断初创公司进入受监管 AI 流量路径
      likelihood: Medium
      impact: High
      leadingIndicator: 到第 9 个月时，潜在客户要求 on-prem 或定制隔离模式，而产品仍无法支持。
      mitigation: 优先构建 VPC 和私有部署，集成现有身份与日志工具，并尽早招聘资深安全负责人。
    - risk: 服务工作量压垮软件经济性
      likelihood: Medium
      impact: Medium
      leadingIndicator: 超过 30% 的早期收入来自一次性集成工作，且没有形成可复用的策略或连接器资产。
      mitigation: 标准化连接器、产品化策略包，并拒绝那些无法强化可复用银行模板的定制范围。
operatingAssumptions:
  - assumption: 设计合作伙伴会先购买范围明确的试点，而不是一开始就要求成熟完整的治理套件。
    basis: research.yaml
    validationTest: 通过与欧盟银行和保险公司平台团队的 10-15 次访谈和架构评审，拿下 2 个付费试点。
    decisionImpact: 如果不成立，公司需要在上线前具备更成熟的产品、更多资本和更慢的销售计划。
  - assumption: 司法辖区感知路由加审计证据，就是最小可爱产品，而不只是众多网关控制中的一个功能。
    basis: idea.yaml
    validationTest: 与安全、风险和平台相关方进行模拟工作流评审，确认这两项能力持续排在前两位购买驱动因素中。
    decisionImpact: 如果不成立，路线图必须转向审批工作流、供应商证据管理或其他更尖锐的初始 SKU。
  - assumption: 早期部署可以维持在身份、日志、SIEM、API 网关和模型供应商连接器这一可复用集成面内。
    basis: operator judgment
    validationTest: 在首 3 个试点中，每个项目新增的定制集成不超过 2 个，且实施时间低于 8 周。
    decisionImpact: 如果不成立，招聘和资金就必须更偏向解决方案工程，业务的软件可扩展性也会下降。
  - assumption: 只要控制足够强，银行和保险买家会接受由初创公司托管的隔离部署或客户 VPC 部署。
    basis: research.yaml
    validationTest: 在前 5 个企业机会中完成安全尽调，至少形成 3 条无需完整 on-prem 支持即可部署的路径。
    decisionImpact: 如果不成立，产品和融资就必须更早支持 on-prem 部署，从而增加复杂度并拖慢销售。
  - assumption: 到第二年，主权云和审计合作伙伴将带来有意义的分销杠杆。
    basis: idea.yaml
    validationTest: 在第 18 个月前签下 2 个转介或联合销售合作，为合格管道贡献至少 20%。
    decisionImpact: 如果不成立，公司必须依赖成本更高的直销模式，并收窄地理扩张。
experimentRoadmap:
  - horizon: 0-90 days
    experiment: 围绕一条真实的内部 copilot 审批工作流，访谈欧盟银行和保险公司的 AI 平台、风险和安全负责人。
    hypothesis: 生产审查痛点主要由跨供应商策略歧义和证据检索驱动，而不是通用模型试验。
    successMetric: 完成 10 次访谈，且至少 6 位买家将路由加审计证据列为前二购买驱动因素。
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: 为一个内部 copilot 工作流构建可点击的架构演示和示例审计账本。
    hypothesis: 买家对证据检索和策略可解释性的反应，会强于对通用网关仪表板的反应。
    successMetric: 完成 5 次设计合作伙伴评审，且至少 3 家要求进入试点范围讨论。
    owner: Founding eng
  - horizon: 90-180 days
    experiment: 在一个设计合作伙伴处，将 MVP 部署到两个获批模型端点和一个身份栈上。
    hypothesis: 一个窄部署可以在 8 周内进入生产审查，且集成工作可复用。
    successMetric: 首个付费试点上线、部署时间低于 8 周，并捕获审批周期基线指标。
    owner: Founding eng
  - horizon: 90-180 days
    experiment: 测试“平台订阅 + 实施费”与“纯按使用量计费”两种试点定价。
    hypothesis: 相比纯消耗计费，买家更偏好范围明确的试点费用加年度生产订阅。
    successMetric: 签下 2 个采用相似定价结构的付费试点，且没有客户要求完全定制化商务条款。
    owner: Founder CEO
  - horizon: 180-360 days
    experiment: 将欧盟银行业策略包和一个主权云参考架构产品化。
    hypothesis: 可复用的银行模板能显著降低部署摩擦并提升付费试点转化率。
    successMetric: 试点到生产转化率高于 60%，且第三次部署的实施范围进一步收窄。
    owner: Product lead
  - horizon: 180-360 days
    experiment: 与一家主权云供应商及一家审计或合规公司启动合作伙伴动作。
    hypothesis: 由于主权和证据已是其企业销售动作的一部分，合作伙伴能够带来合格销售管道。
    successMetric: 至少获得 5 个合格引荐，以及 1 个来自合作伙伴渠道的付费试点。
    owner: Founder CEO
operations:
  - 面向客户 VPC 和隔离托管环境的私有部署参考架构
  - 带版本化审批和回滚控制的策略变更管理流程
  - 面向身份、SIEM、DLP、模型供应商和 API 网关的连接器路线图
  - 覆盖 SOC 2 或 ISO 路径、RBAC、保留控制和事件响应的安全与合规计划
  - 设计合作伙伴治理节奏，包括架构评审、试点指标复盘和季度扩展规划
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: 从第一天起负责策略引擎、集成和安全部署架构。
  - role: Founder CEO
    startTiming: Month 0
    rationale: 负责受监管企业探索、设计合作伙伴销售以及早期主权云关系。
  - role: Security and compliance lead
    startTiming: Month 3-6
    rationale: 降低企业信任审查风险，把 AI Act 和银行控制要求转化为产品化策略包，并支持审计。
  - role: Solutions engineer
    startTiming: Month 6
    rationale: 在服务工作失控前缩短试点部署时间，并沉淀可复用集成模式。
  - role: Product lead
    startTiming: Month 9-12
    rationale: 将定制需求沉淀为行业模板、合作伙伴友好的包装和纪律化路线图。
milestones:
  - horizon: 0-12 months
    items:
      - 在欧盟银行或保险业获得 2-3 个付费设计合作伙伴。
      - 交付具备司法辖区感知路由、供应商白名单、RBAC 和证据检索能力的 MVP。
      - 完成首次生产转化，并将审批或审计准备时间量化缩短 50%+。
      - 发布一个可复用的银行业策略包和一个私有部署参考架构。
  - horizon: 12-24 months
    items:
      - 达到 6-8 个生产客户，并在至少一半客户中证明多工作流扩展。
      - 增加一个主权云合作渠道和一个审计或合规转介渠道。
      - 推出银行和保险业策略包，以及针对新供应商-模型组合的审批工作流。
      - 在标准客户环境中实现低于 6 周的可重复部署时间。
  - horizon: 24-36 months
    items:
      - 达到 12 个生产客户，并从银行和保险扩展到一个相邻受监管行业。
      - 在首个 copilot 工作流之外，引入策略仿真和更广泛的企业 AI 流量治理。
      - 构建跨司法辖区、供应商和审批结果的可防御执行数据集。
      - 基于扩展效率和合作伙伴来源管道，为更大一轮融资做准备。
risks:
  - risk: 超大云和通用网关吸收了足够多的主权控制，从而压缩中立层楔子空间。
    likelihood: High
    impact: High
    mitigation: 持续聚焦跨供应商策略逻辑、面向监管方的证据检索，以及那些买家已预期不止一个获批环境的行业。
  - risk: 企业销售周期耗尽小团队的现金跑道。
    likelihood: Medium
    impact: High
    mitigation: 围绕真实生产审查截止期销售，要求付费试点，并把 ICP 收窄到正在启动内部 copilot 的买家。
  - risk: 公司变成重服务集成商，而不是软件平台。
    likelihood: Medium
    impact: Medium
    mitigation: 尽早产品化策略包和连接器，把实施时间作为核心指标衡量，并拒绝不可复用的范围。
  - risk: 初创公司信任缺口阻碍其进入受监管 AI 流量路径。
    likelihood: Medium
    impact: High
    mitigation: 提供私有部署，尽早建立安全可信度，并借助设计合作伙伴和审计方或云伙伴作为信任锚点。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月资金将支持核心产品团队、安全与解决方案招聘、首批私有部署参考架构、2-3 家银行设计合作伙伴，以及把试点转化为可复制 seed 阶段企业销售动作所需的证据。
