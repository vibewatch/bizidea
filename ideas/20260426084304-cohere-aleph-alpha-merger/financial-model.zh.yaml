    y3RevenueImpactK: 0.0
    cashImpactK: -450.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads[合格的银行与保险线索] --> Pilots[付费设计合作伙伴]
      Pilots --> Production[生产客户]
      Production --> Revenue[平台费 + 用量收入]
      Revenue --> GrossProfit[75% 毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景在 Q4Y3 达到 12 个生产客户、每家约 $400K 混合 ACV，这与 SOM 的变现框架一致。
  - checkName: 必须顺利发生的事
    finding: 付费试点需要接近 60%+ 目标去转生产，同时伙伴渠道必须在第 18 个月贡献约 20% 的合格管道，客户爬坡才跑得动。
  - checkName: 模型何时会失效
    finding: 下行情景显示，只要销售周期拉长到 12 个月，或混合 ACV 更接近 $350K，现金就会转负。
  - checkName: 下一轮证明点
    finding: 下一轮融资要靠第 24 个月前拿到 6-8 个生产客户、部署时间压到 6 周内，以及可量化的 50%+ 审批周期压缩。
sanityChecks:
  ruleOf40: Y3 增长 81.8% + EBITDA 利润率 -20.6% = 61.2%。
  burnMultiple: Y2 burn multiple 为 0.6x，Y3 为 0.4x，按 EBITDA burn 除以净新增 ARR 计算。
  revenuePerFte: Y3 每名 FTE 对应收入为 $286K（企业 SaaS/基础设施的参考区间约为 $200-400K）。
  flags:
    - 收入集中度很高，因为 Y3 全部收入都来自 12 家企业客户。
    - CAC 仍属经验估算，因为当前计划给出了漏斗目标，但还没有观察到的 closed-won 成本数据。
    - 现金按 EBITDA 推算，未计入营运资金时点差、capex、VAT 和融资费用。
    - 基准情景假设没有任何重大 logo 流失事件，和大客户集中的现实存在张力。
