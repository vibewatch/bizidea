scenarios:
  downside:
    description: 试点转生产变慢，且伙伴来源管道在第 2 年没有兑现。
    y3RevenueK: 2700.0
    y3EbitdaK: -1500.0
    cashLowPointK: -420.0
    keyAssumptionChanges:
      - 混合 ACV 落在 $350K，而不是 $400K。
      - 到 Q4Y3 客户数只达到 9 个。
      - 销售周期从 9 个月拉长到 12 个月，且伙伴来源管道始终低于 10%。
  base:
    description: 创始人主导的设计合作伙伴销售顺利转成稳定的企业客户爬坡，符合商业计划里程碑。
    y3RevenueK: 4000.0
    y3EbitdaK: -825.0
    cashLowPointK: 294.0
    keyAssumptionChanges:
      - 混合 ACV 为 $400K。
      - 到 Q4Y3 客户数达到 12 个。
      - 毛利率保持在 75% 目标，招聘也按计划推进。
  upside:
    description: 伙伴渠道从第 2 年开始贡献线索，首批生产胜利也抬高了扩张后的合同价值。
    y3RevenueK: 5400.0
    y3EbitdaK: -150.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - 随着工作流扩张，混合 ACV 提升到 $450K。
      - 到 Q4Y3 客户数达到 14 个。
      - 到第 18 个月，伙伴来源管道贡献 25% 的合格机会。
