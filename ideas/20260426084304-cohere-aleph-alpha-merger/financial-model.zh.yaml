scenarios:
  downside:
    description: "试点转生产转化率下滑，合作伙伴来源管线在第 2 年未能落地。"
    y3RevenueK: 2700.0
    y3EbitdaK: -1500.0
    cashLowPointK: -420.0
    keyAssumptionChanges:
      - "混合年度合同价值降至 $35 万而非 $40 万。"
      - "Y3Q4 客户数仅达 9 个。"
      - "销售周期从 9 个月延长至 12 个月，合作伙伴管线低于 10%。"
  base:
    description: "创始人主导的共创客户销售转化为稳定的企业增速，符合商业计划里程碑。"
    y3RevenueK: 4000.0
    y3EbitdaK: -825.0
    cashLowPointK: 294.0
    keyAssumptionChanges:
      - "混合年度合同价值 $40 万。"
      - "Y3Q4 客户数达 12 个。"
      - "毛利率维持 75% 目标，招聘按计划推进。"
  upside:
    description: "合作伙伴渠道在第 2 年开始贡献，首批生产胜利后扩张抬高合同价值。"
    y3RevenueK: 5400.0
    y3EbitdaK: -150.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - "工作流扩张推动混合年度合同价值升至 $45 万。"
      - "Y3Q4 客户数达 14 个。"
      - "第 18 个月合作伙伴来源管线贡献 25% 的合格机会。"
sensitivity:
  - variable: ARPU
    downsideCase: "混合年度合同价值 $35 万"
    baseCase: "混合年度合同价值 $40 万"
    upsideCase: "混合年度合同价值 $45 万"
    y3RevenueImpactK: -500.0
    cashImpactK: -375.0
  - variable: CAC
    downsideCase: "单客户获客成本 $32.5 万"
    baseCase: "单客户获客成本 $25 万"
    upsideCase: "单客户获客成本 $20 万"
    y3RevenueImpactK: 0.0
    cashImpactK: -300.0
  - variable: churn
    downsideCase: "月度客户流失率 2.0%"
    baseCase: "月度客户流失率 1.0%"
    upsideCase: "月度客户流失率 0.5%"
    y3RevenueImpactK: -300.0
    cashImpactK: -225.0
  - variable: sales cycle
    downsideCase: "平均企业销售周期 12 个月"
    baseCase: "平均企业销售周期 9 个月"
    upsideCase: "平均企业销售周期 6 个月"
    y3RevenueImpactK: -600.0
    cashImpactK: -500.0
  - variable: gross margin
    downsideCase: "毛利率 70%"
    baseCase: "毛利率 75%"
    upsideCase: "毛利率 80%"
    y3RevenueImpactK: 0.0
    cashImpactK: -200.0
  - variable: hiring pace
    downsideCase: "可复制生产转化完成前，两个非客户对接岗提前入职"
    baseCase: "按季度计划招聘"
    upsideCase: "收入验证后推迟两个后台岗位"
    y3RevenueImpactK: 0.0
    cashImpactK: -450.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      线索[合格的银行与保险客户线索] --> 试点[付费设计合作伙伴]
      试点 --> 量产[生产客户]
      量产 --> 收入[平台费 + 用量费收入]
      收入 --> 毛利[75% 毛利率]
      毛利 --> 现金[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景在 Y3Q4 达到 12 个生产客户，混合年度合同价值约 $40 万，与 SOM 使用的货币化框架一致。"
  - checkName: 必须跑通的假设
    finding: "付费试点需接近 60%+ 的转化目标，合作伙伴渠道须在第 18 个月前贡献约 20% 的合格管线，才能保持客户数量按计划增长。"
  - checkName: 模型失效条件
    finding: "下行情景显示：若销售周期延长至 12 个月或混合年度合同价值降至约 $35 万，现金将转负。"
  - checkName: 下一轮融资证明
    finding: "下一轮由第 24 个月的证据支撑：6-8 个生产客户、6 周以内部署周期和可量化的 50%+ 审批周期缩减。"
sanityChecks:
  ruleOf40: "Y3 增速 81.8% + EBITDA 利润率 -20.6% = 61.2%。"
  burnMultiple: "Y2 消耗倍数 0.6x，Y3 消耗倍数 0.4x（EBITDA 消耗除以净新增 ARR）。"
  revenuePerFte: "Y3 人均收入 $28.6 万（企业 SaaS/基础设施基准约 $20-40 万）。"
  flags:
    - "收入集中度高——12 个企业客户占 Y3 全部收入。"
    - "获客成本为启发式估算，计划提供了漏斗目标，但尚无实际成交成本数据。"
    - "现金模型基于 EBITDA，未考虑营运资金时序、资本支出、增值税和融资费用。"
    - "基准情景假设无重大客户流失事件，尽管对大型受监管账户存在集中敞口。"
