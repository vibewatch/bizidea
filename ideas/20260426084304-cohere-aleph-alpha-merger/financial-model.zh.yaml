    y3RevenueImpactK: 0.0
    cashImpactK: -450.0
modelDiagram:
  title: 单位经济性流转
  mermaid: |
    flowchart LR
      Leads[合格的银行与保险客户线索] --> Pilots[付费设计合作伙伴]
      Pilots --> Production[生产客户]
      Production --> Revenue[平台 + 使用量收入]
      Revenue --> GrossProfit[75% 毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: Revenue engine
    finding: "基础情景在 Q4Y3 达到 12 个生产客户，混合 ACV 约为 $400K，这与 SOM 中使用的变现框架一致。"
  - checkName: Must go right
    finding: "付费试点需要接近 60%+ 的目标完成转化，且到第 18 个月合作伙伴渠道必须贡献约 20% 的合格销售管道，才能维持既定客户爬坡。"
  - checkName: Model breaks if
    finding: "下行情景显示，如果销售周期拉长到 12 个月，或混合 ACV 更接近 $350K，现金将转为负值。"
  - checkName: Next-round proof
    finding: "下一轮融资依赖第 24 个月时的证明：6-8 个生产客户、低于 6 周的部署，以及可量化的 50%+ 审批周期缩短。"
sanityChecks:
  ruleOf40: "Y3 增长率 81.8% + EBITDA 利润率 -20.6% = 61.2%。"
  burnMultiple: "Y2 burn multiple 为 0.6x，Y3 burn multiple 为 0.4x，按 EBITDA burn 除以净新增 ARR 计算。"
  revenuePerFte: "Y3 每个 FTE 的收入为 $286K（企业 SaaS/基础设施的参考区间约为 $200-400K）。"
  flags:
    - "收入集中度较高，因为 Y3 的全部收入都来自 12 个企业客户。"
    - "CAC 为启发式估算，因为计划给出了漏斗目标，但尚无已成交成本数据。"
    - "现金按 EBITDA 推算，未纳入营运资本时点、capex、VAT 和融资费用。"
    - "基础情景假设不会发生实质性客户流失事件，尽管公司对大型受监管客户的暴露较为集中。"
