scenarios:
  downside:
    description: "试点到生产的转化延迟，且来自合作伙伴的销售管道在第 2 年未能兑现。"
    y3RevenueK: 2700.0
    y3EbitdaK: -1500.0
    cashLowPointK: -420.0
    keyAssumptionChanges:
      - "混合 ACV 稳定在 $350K，而不是 $400K。"
      - "到 Q4Y3 客户数仅达到 9。"
      - "销售周期从 9 个月延长至 12 个月，且合作伙伴管道始终低于 10%。"
  base:
    description: "由创始人主导的设计合作伙伴销售转化为稳定的企业客户爬坡，并与 business-plan 里程碑一致。"
    y3RevenueK: 4000.0
    y3EbitdaK: -825.0
    cashLowPointK: 294.0
    keyAssumptionChanges:
      - "混合 ACV 为 $400K。"
      - "到 Q4Y3 客户数达到 12。"
      - "毛利率维持在 75% 目标，且招聘按计划推进。"
  upside:
    description: "合作伙伴渠道从第 2 年开始贡献，且在首次生产胜利后，扩展销售抬升合同价值。"
    y3RevenueK: 5400.0
    y3EbitdaK: -150.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - "随着工作流扩展，混合 ACV 提升至 $450K。"
      - "到 Q4Y3 客户数达到 14。"
      - "到第 18 个月，合作伙伴来源管道贡献 25% 的合格机会。"
