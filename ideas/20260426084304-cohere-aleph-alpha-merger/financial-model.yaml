    baseCase: "Hiring follows the quarter-by-quarter plan"
    upsideCase: "Two back-office hires delayed until revenue proves out"
    y3RevenueImpactK: 0.0
    cashImpactK: -450.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified bank and insurer leads] --> Pilots[Paid design partners]
      Pilots --> Production[Production customers]
      Production --> Revenue[Platform + usage revenue]
      Revenue --> GrossProfit[75% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: "The base case reaches 12 production customers by Q4Y3 at roughly $400K blended ACV, which is the same monetization frame used in the SOM."
  - checkName: Must go right
    finding: "Paid pilots need to convert close to the 60%+ target and partner channels must supply about 20% of qualified pipeline by month 18 to keep the logo ramp on plan."
  - checkName: Model breaks if
    finding: "The downside case shows cash going negative if sales cycles stretch to 12 months or blended ACV lands closer to $350K."
  - checkName: Next-round proof
    finding: "The next round is supported by month-24 proof of 6-8 production customers, sub-6-week deployments, and a measurable 50%+ approval-cycle reduction."
sanityChecks:
  ruleOf40: "Y3 growth 81.8% + EBITDA margin -20.6% = 61.2%."
  burnMultiple: "Y2 burn multiple 0.6x and Y3 burn multiple 0.4x, using EBITDA burn divided by net new ARR."
  revenuePerFte: "Y3 revenue per FTE is $286K (benchmark roughly $200-400K for enterprise SaaS/infrastructure)."
  flags:
    - "Revenue concentration is high because 12 enterprise customers account for all of Y3 revenue."
    - "CAC is heuristic because the plan provides funnel targets but no observed closed-won cost data yet."
    - "Cash is modeled from EBITDA and excludes working-capital timing, capex, VAT, and financing fees."
    - "The base case assumes no material logo churn events despite concentrated exposure to large regulated accounts."
