scenarios:
  downside:
    description: "Pilot-to-production conversion slips and partner-sourced pipeline does not materialize in year 2."
    y3RevenueK: 2700.0
    y3EbitdaK: -1500.0
    cashLowPointK: -420.0
    keyAssumptionChanges:
      - "Blended ACV settles at $350K instead of $400K."
      - "Customer count reaches only 9 by Q4Y3."
      - "Sales cycle extends from 9 months to 12 months and partner pipeline stays below 10%."
  base:
    description: "Founder-led design partner sales convert into a steady enterprise ramp that matches the business-plan milestones."
    y3RevenueK: 4000.0
    y3EbitdaK: -825.0
    cashLowPointK: 294.0
    keyAssumptionChanges:
      - "Blended ACV is $400K."
      - "Customer count reaches 12 by Q4Y3."
      - "Gross margin holds at the 75% target and hiring follows plan."
  upside:
    description: "Partner channels begin contributing in year 2 and expansion lifts contract value after the first production wins."
    y3RevenueK: 5400.0
    y3EbitdaK: -150.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - "Blended ACV rises to $450K with workflow expansion."
      - "Customer count reaches 14 by Q4Y3."
      - "Partner-sourced pipeline contributes 25% of qualified opportunities by month 18."
