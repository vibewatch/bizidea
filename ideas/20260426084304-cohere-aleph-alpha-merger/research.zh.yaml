"reportMemo":
  "executiveTakeaways":
  - "这次合并表明，“主权 AI”正从品牌叙事走向采购设计，尤其是在欧洲受监管行业。"
  - "尖锐问题不在于选择某一个非美国模型，而在于为每个工作流执行允许的模型、云和地理范围，并能在事后证明该决策。"
  - "超大云厂商已经提供区域托管和部分主权控制，但默认并不能解决跨供应商的策略路由和审计账本问题。"
  - "治理套件和 AI 网关各自只覆盖栈中的一部分；二者都没有清晰占据“司法辖区感知运行时路由 + 合规证据”的组合工作流。"
  - "欧洲银行和保险公司是可信的滩头买家，因为监管压力已把 AI、运营韧性、日志和治理连接成一个统一控制问题。"
  - "这个细分市场真实存在，但仍处于萌芽期；初创公司只有在主权原生运行时策略上保持高度聚焦，并能证明能让早期受监管 copilot 更快获批，才有机会取胜。"
  "marketDefinition": "该市场是位于企业应用和模型端点之间的软件控制层，用于对 AI 工作负载执行司法辖区、供应商、数据处理和审计策略。核心买家是欧洲受监管企业中的 AI 平台团队，初期集中在银行和保险公司，并向公共部门、医疗、电信和邻近国防组织扩展。它不包括模型供应商本身、通用 AI 治理咨询，以及仅优化流量而不具备主权特定策略逻辑的纯 API 网关。"
  "customerAndBuyer": "最初用户是中央 GenAI 平台、数据或安全团队，这些团队正在推出会接触敏感客户或运营数据的内部 copilot。经济买方很可能是 CIO、CISO、CRO，或集中化 AI 转型负责人，他们已经在承担合规延误、云控制碎片化和审计准备的成本。最强的首个用例是内部员工 copilot，因为其生产上线受阻更多源于策略不明确，而非模型质量。"
  "buyingTriggers":
  - "point": "新的内部 copilot 进入生产审查，银行必须证明提示、输出和支撑数据是在何处被处理的。"
    "sourceRefs":
