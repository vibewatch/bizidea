  "willingnessToPay":
    "summary": "预算更可能来自中央 AI 平台、安全和合规项目，而不是某个业务线的 SaaS 预算。公开证据显示，买家已经在为专属推理环境、AI 网关附加模块和治理工具付费：Cohere 销售专用的 Model Vault 实例，Kong 将 AI Gateway 作为付费附加项定价，而 Portkey 和 Credo 则将企业治理能力定位为定制或销售驱动型采购。"
    "sourceRefs":
