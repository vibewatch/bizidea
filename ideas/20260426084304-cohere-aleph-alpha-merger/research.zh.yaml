competitors:
  - name: Microsoft Azure AI Foundry / Azure OpenAI
    stage: incumbent
    wedge: 拥有强隐私承诺、区域可用性和现成 Azure 关系的企业 AI 平台。
    pricing: 按消费计费；无服务器部署按用量收费，并嵌在 Azure 合同里。
    strength: 对已标准化在 Microsoft 上的 CIO/CISO 买家而言，分发能力强、心智也强。
    weaknessVsUs: 这是单一供应商控制平面，不能原生解决跨供应商的主权路由和统一证据生成。
    sourceRefs:
      - 20
      - 21
  - name: AWS Bedrock + European Sovereign Cloud
    stage: incumbent
    wedge: AWS 原生模型接入，加上欧洲主权基础设施、本地可用区和 Bedrock 数据控制。
    pricing: AWS 按消费计费，另叠加主权云企业级安排。
    strength: 运营成熟、区域基础设施深、整体安全姿态强。
    weaknessVsUs: 这是 AWS 优先答案；买家若想治理非 AWS 的已获批供应商，仍得自己去拼路由和治理。
    sourceRefs:
      - 18
      - 19
  - name: Google Cloud Sovereign Controls + Vertex AI
    stage: incumbent
    wedge: 由合作伙伴运营的主权控制、驻留控制，以及面向受监管工作负载的 Vertex AI 安全控制。
    pricing: 主权控制多为伙伴主导 / 联系销售定价；底层 Vertex AI 仍按用量计费。
    strength: 在驻留、访问透明度和 VPC 式隔离方面有很强的技术控制。
    weaknessVsUs: 它更偏伙伴和平台视角，而不是横跨多套获批模型环境的中立工作流控制平面。
    sourceRefs:
      - 22
      - 23
  - name: Credo AI
    stage: scale-up
    wedge: AI 治理系统记录层，提供策略包、供应商证据收集和治理工件。
    pricing: 定制企业定价（未公开）。
    strength: 在策略文档、供应商尽调和内部治理工作流上匹配度很高。
    weaknessVsUs: 它并没有被市场化为一层针对按司法辖区做推理决策的运行时路由与执行层。
    sourceRefs:
      - 24
      - 25
      - 26
  - name: Kong AI Gateway
    stage: incumbent
    wedge: 把 API 网关的既有分发延伸到 LLM、MCP 和智能体流量治理。
    pricing: AI Gateway 附加包从每模型每月 $100 起，外加网关控制平面与请求费用。
    strength: 具备企业级网关落地基础和成熟的运维工具。
    weaknessVsUs: 它做的是通用 AI 流量治理；主权特定的策略语义和面向监管的证据并不是默认切口。
    sourceRefs:
      - 29
      - 30
regulatoryTechnicalConstraints:
  - point: AI Act 下的高风险 AI 系统，需要满足风险管理、日志、文档、人工监督、准确性和网络安全等义务。
    sourceRefs:
      - 11
  - point: GPAI 义务和行为准则说明，上游模型供应商规则正在变化，因此控制平面必须追踪供应商层面的合规变化。
    sourceRefs:
      - 12
      - 13
      - 14
  - point: 银行买家还同时承受运营韧性和 ICT 控制压力，这会抬高对日志、访问控制和第三方治理的要求。
    sourceRefs:
      - 10
      - 19
      - 33
  - point: 敏感行业的云采购仍要求不低的安全和数据保护措施，因此集成与部署设计本身就是实打实的门槛。
    sourceRefs:
      - 18
      - 20
      - 22
      - 23
      - 32
  - point: 一家被插进 AI 流量路径的创业公司，本身也必须满足企业对 SOC 2 / ISO、保留控制、RBAC 和部署隔离的信任预期。
    sourceRefs:
      - 27
      - 28
validationSignals:
  - point: Cohere 与 Aleph Alpha 宣布围绕主权 AI 组合，并获得 Schwarz Group 的 $600M 支持，说明这条叙事背后已有真实战略资本。
    sourceRefs:
      - 1
      - 2
      - 4
  - point: STACKIT 在荷兰政府云采购中占到位置，并强调自己被欧盟委员会选中，说明主权语言已经真正进入欧洲采购。
    sourceRefs:
      - 16
      - 17
  - point: ECB 的监管优先事项明确把 AI 相关战略与治理、风险管理、运营韧性和 DORA 合规连在一起。
    sourceRefs:
      - 10
  - point: Credo、Portkey 和 Kong 都在卖治理、日志、策略工件或 AI 网关控制，说明相邻预算线已经存在。
    sourceRefs:
      - 24
      - 25
      - 27
      - 28
      - 29
      - 30
  - point: LiteLLM 与 Langfuse 等开源替代已经足够成熟，说明问题真实存在，即便类别边界还没定型，成熟买家也已在主动搭内部栈。
    sourceRefs:
      - 34
      - 35
openQuestions:
  - 银行和保险平台团队现在会把“跨供应商主权路由”视为刚需，还是会把它推迟到他们运行多套获批模型环境之后再解决？
  - 第一款付费 SKU 最该围绕什么定义：运行时执行、审计证据检索，还是供应商审批工作流加速？
  - 买家最先会信任创业公司的哪种部署形态：VPC、on-prem，还是隔离托管的控制层？
  - 有多少预算可以直接从现有云、安全或 AI 治理项目里挪出来，而不是非要新增一条控制平面预算？
  - 这款产品能否避免在前 10 个客户里就滑成一个重服务的合规集成生意？
