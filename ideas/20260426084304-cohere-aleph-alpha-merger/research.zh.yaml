"competitors":
- "name": "Microsoft Azure AI Foundry / Azure OpenAI"
  "stage": "incumbent"
  "wedge": "具备强隐私承诺、区域可用性以及既有 Azure 关系的企业 AI 平台。"
  "pricing": "消耗式定价；无服务器部署在 Azure 合同内按用量付费。"
  "strength": "对已经标准化在 Microsoft 体系内的 CIO/CISO 买家，拥有很深的企业分发能力和高舒适度。"
  "weaknessVsUs": "这是单一供应商控制平面；并不能原生解决跨获批供应商的主权路由和证据生成。"
  "sourceRefs":
  - 20
  - 21
- "name": "AWS Bedrock + European Sovereign Cloud"
  "stage": "incumbent"
  "wedge": "AWS 原生模型访问，加上欧洲主权基础设施、本地区域和 Bedrock 数据控制。"
  "pricing": "AWS 消耗式定价，加上主权云企业安排。"
  "strength": "运营成熟、区域基础设施深厚、安全姿态强。"
  "weaknessVsUs": "这是 AWS 优先的答案；买家仍需自己把非 AWS 获批供应商之间的治理和路由拼起来。"
  "sourceRefs":
  - 18
  - 19
- "name": "Google Cloud Sovereign Controls + Vertex AI"
  "stage": "incumbent"
  "wedge": "由合作伙伴运营的主权控制、驻留控制，以及面向受监管工作负载的 Vertex AI 安全控制。"
  "pricing": "主权控制采用合作伙伴主导 / 联系销售定价；底层 Vertex AI 仍按用量计费。"
  "strength": "在驻留、访问透明度和 VPC 式隔离上具备强技术控制。"
  "weaknessVsUs": "更偏合作伙伴和平台中心，而不是横跨多个获批模型资产的中立工作流控制平面。"
  "sourceRefs":
  - 22
  - 23
- "name": "Credo AI"
  "stage": "scale-up"
  "wedge": "AI 治理 system of record，提供策略包、供应商证据收集和治理工件。"
  "pricing": "定制企业定价（未公开）。"
  "strength": "非常适合策略文档、供应商尽调和内部治理工作流。"
  "weaknessVsUs": "并未被营销为司法辖区感知推理决策的运行时路由和执行层。"
  "sourceRefs":
  - 24
  - 25
  - 26
- "name": "Kong AI Gateway"
  "stage": "incumbent"
  "wedge": "把 API 网关分发能力扩展到 LLM、MCP 和 agent 流量治理。"
  "pricing": "AI Gateway 附加模块起价为每模型每月 $100，另加网关控制平面和请求费用。"
  "strength": "具备企业级网关足迹和明确的运维工具。"
  "weaknessVsUs": "它做的是通用 AI 流量治理；主权特定策略语义和面向监管方的证据并不是默认楔子。"
  "sourceRefs":
  - 29
  - 30
