"openQuestions":
- "银行和保险公司平台团队，会把跨供应商主权路由视为当下必需，还是等到他们运行不止一个获批模型体系后才会把它当作未来问题？"
- "首个付费 SKU 最适合被界定为运行时执行、审计证据检索，还是供应商审批工作流加速？"
- "买家最先会信任来自初创公司的哪种部署：VPC、on-prem，还是托管但隔离的推理治理？"
- "有多少预算可以从现有云、安全或 AI 治理项目中释放出来，而无需新设一条控制平面预算线？"
- "产品能否避免在前 10 个客户阶段演变成一个重服务的合规集成业务？"
