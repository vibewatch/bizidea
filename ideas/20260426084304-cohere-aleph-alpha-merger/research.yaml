  - "incumbentClass": "Workflow and API gateway tools"
    "point": "Kong and Portkey already sell AI traffic governance, quotas, and logs, yet their wedge is generic LLM operations; the startup only wins if sovereignty-specific approval logic and regulator-facing evidence are first-class product objects."
