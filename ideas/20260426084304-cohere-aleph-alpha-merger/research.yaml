"reportMemo":
  "executiveTakeaways":
  - "The merger is evidence that “sovereign AI” is moving from branding to procurement design, especially in Europe’s regulated sectors."
  - "The acute problem is not choosing one non-U.S. model; it is enforcing which model, cloud, and geography are allowed for each workflow, and proving that decision later."
  - "Hyperscalers already offer regional hosting and some sovereignty controls, but they do not solve the cross-vendor policy-routing and audit-ledger problem by default."
  - "Governance suites and AI gateways each cover part of the stack; neither clearly owns jurisdiction-aware runtime routing plus compliance evidence as a combined workflow."
  - "European banks and insurers are credible beachhead buyers because supervisory pressure already links AI, operational resilience, logging, and governance into one control problem."
  - "The segment is real but still nascent; a startup only wins if it stays narrowly focused on sovereignty-native runtime policy and proves faster approval for early regulated copilots."
  "marketDefinition": "This market is the software control layer that sits between enterprise applications and model endpoints to enforce jurisdiction, provider, data-handling, and audit policies for AI workloads. The core buyer is a regulated enterprise AI platform team in Europe, initially in banks and insurers, with adjacency into public sector, healthcare, telecom, and defense-adjacent organizations. It excludes model vendors themselves, general-purpose AI governance consulting, and pure API gateways that optimize traffic without sovereignty-specific policy logic."
  "customerAndBuyer": "The initial user is a central GenAI platform, data, or security team launching internal copilots that touch sensitive customer or operational data. The economic buyer is likely the CIO, CISO, CRO, or a centralized AI transformation owner who already carries the cost of compliance delay, cloud controls sprawl, and audit preparation. The strongest first use case is an internal employee copilot where production rollout is blocked more by policy ambiguity than by model quality."
  "buyingTriggers":
  - "point": "A new internal copilot reaches production review and the bank must prove where prompts, outputs, and supporting data were processed."
    "sourceRefs":
