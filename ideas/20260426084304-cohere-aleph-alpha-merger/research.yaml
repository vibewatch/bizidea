  "competitiveLandscape": "The closest substitute stack today is a combination of hyperscaler-native controls, AI gateways, and governance suites. Microsoft, AWS, and Google can satisfy some residency and privacy requirements within their own estates. Credo AI addresses policy documentation, vendor evidence, and governance workflows. Kong and Portkey handle runtime traffic governance, quotas, and logs. Open-source paths such as LiteLLM plus Langfuse lower entry barriers for internal builds. The gap is a neutrality-first control plane purpose-built for jurisdiction-aware routing, vendor allowlisting, and audit-ready evidence across approved sovereign and hyperscaler endpoints."
  "incumbentThesis":
  - "incumbentClass": "Cloud platforms"
    "point": "Azure, AWS, and Google can provide regional hosting, privacy commitments, and sovereignty controls, but buyers with multiple approved providers still need a neutral policy layer that routes across clouds and produces one auditable record of why each invocation was allowed."
    "sourceRefs":
