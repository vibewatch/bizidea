slug: "approval-graph-finance-os"
date: "2026-05-22"
executiveSummary: >-
  Approval Graph is a Mercury-first finance control layer for U.S. Series A-B software startups that still approve vendor payments, budget exceptions, and cash moves in Slack and spreadsheets. The MVP does not replace the bank, AP tool, or ERP; it turns each request into a bank-ready action packet with approver identity, policy checks, supporting evidence, and projected runway impact before a human releases payment. The initial buyer is the CFO or head of finance at a 50-250 employee startup using Mercury as its primary bank and feeling new pressure from board reporting, audit prep, or a sudden rise in non-payroll payment volume. This beachhead is narrow on purpose because the pain is acute there, Mercury's accountant ecosystem gives a credible distribution path, and broader spend-management categories are already crowded by Mercury, Ramp, Brex, BILL, and Zip. Researched bottom-up sizing supports an initial U.S. TAM of about $96.0M, a beachhead SAM of about $28.8M, and a year-3 SOM of about $2.9M if the company stays tightly focused before expanding. The go-to-market should sell approval evidence and faster decisioning, not generic AI automation, with paid pilots that prove shorter turnaround time and cleaner audit trails before broader rollout. The main strategic risk is that buyers may decide Mercury native tools or broader suites are good enough unless the product shows clear value as a cross-system approval-memory layer. The biggest evidence gaps are direct proof that Mercury-based startups will buy a focused control layer before incumbent-suite expansion and proof that early customer data is clean enough to avoid a services-heavy onboarding model.
problem:
  - "Series A-B startups often approve vendor payments and cash exceptions across Slack threads, spreadsheets, and bank portals, leaving no reliable system of record for who approved what and why."
  - "When board, audit, or runway scrutiny increases, lean finance teams cannot quickly connect a payment decision to budget status, supporting evidence, and cash impact without manual chasing."
solution:
  - "Capture requests from Slack, invoice inboxes, and lightweight AP tools, then assemble a single approval packet with requestor, vendor, approver chain, policy status, and runway context."
  - "Keep execution human-approved on day one while creating an auditable approval graph that can later expand into broader finance controls and treasury workflows."
whyWeWin:
  - "The product wedges into the gap banks and AP suites do not fully own: cross-system approval context spanning chat, budgets, contracts, invoices, and Mercury-based cash execution."
  - "A Mercury-centered accountant and fractional-CFO channel can surface buyers at the exact moment manual approvals break, while each deployment compounds proprietary approval, exception, and outcome data."
strategicChoices:
  beachhead: "U.S. venture-backed B2B software startups with 50-250 employees, $5M-$40M ARR, Mercury as primary bank, and one lean finance lead still coordinating non-payroll approvals in Slack and Google Sheets."
  wedgeRationale: "This slice has clear pain, a named buyer, and a visible trigger, yet is still too small or early for a full ERP or procurement overhaul. Winning one approval workflow here creates proof faster than trying to replace the whole finance stack."
  sequencingRationale: "Start with evidence capture, routing, policy checks, and human-approved Mercury action packets because that solves the urgent approval bottleneck without asking customers to change banks or trust autonomous payment release. Only after repeatable pilot ROI should the company add deeper ERP sync, multi-entity controls, and eventually multi-bank treasury orchestration."
  notYet:
    - "Multi-bank treasury orchestration before Mercury-first proof"
    - "Corporate card, employee expense, or procurement-suite replacement"
    - "Autonomous payment release without explicit human approval"
    - "Full ERP replacement or large-enterprise finance workflows"
market:
  tam: "$96.0M estimated U.S. TAM based on roughly 12,000 post-seed, pre-ERP venture-backed startups, one-third Mercury penetration, and a modeled $24,000 annual platform spend."
  sam: "$28.8M estimated initial SAM based on roughly 1,200 U.S. B2B software companies in the 50-250 employee Mercury-centered beachhead at a modeled $24,000 ACV."
  som: "$2.9M estimated year-3 SOM based on about 120 reachable customers through accountant, fractional-CFO, and trigger-based direct sales channels."
  segments:
    - "Primary: Mercury-banked U.S. Series A-B software startups with lean finance teams"
    - "Secondary: Startup accounting firms and fractional-CFO operators managing multiple Mercury-based clients"
  buyingProcess: >-
    The daily user is usually the head of finance, controller, or finance manager, while economic approval sits with the CFO or founder. The process starts when audit prep, board reporting, or payment-volume growth exposes weak controls, then moves through a short security and integration review because the product touches approval logic around money movement.
product:
  mvp: >-
    The MVP should connect Slack, invoice intake, budget files, and Mercury account data into one approval queue that produces a bank-ready action packet with approvers, evidence, policy checks, and a simple runway-impact view. It should optimize for one non-payroll payment workflow and explicit human release, not broad AP automation.
  sixMonth: "Ship paid pilots with Slack and invoice ingestion, role-based approval routing, audit logs, Mercury action-packet generation, and export into the customer's current accounting stack."
  twelveMonth: "Add repeatable integrations for the most common AP and ERP environments in design partners, introduce multi-entity approval policies, and launch dashboards for approval turnaround time, exception rate, and evidence completeness."
  twentyFourMonth: "Expand from Mercury-first approval memory into broader startup finance controls such as multi-bank treasury workflows, deeper policy benchmarking, and board-ready cash-governance reporting."
  keyBets:
    - "A focused approval layer can win budget before the customer upgrades to a broader spend or ERP suite."
    - "A small set of integrations can capture enough evidence to create repeatable ROI without implementation-heavy services."
    - "Human-in-the-loop approval workflows will earn trust faster than fully autonomous finance agents."
    - "Accountant and fractional-CFO partners will generate qualified introductions at lower CAC than pure outbound alone."
gtm:
  wedge: "Sell a Mercury-native approval-memory layer that reduces approval chasing and produces bank-ready evidence, rather than pitching generic AI finance automation."
  channels:
    - "Founder-led outbound to CFOs, heads of finance, and controllers at triggered Mercury-based startups"
    - "Referrals from Mercury accountants, startup accounting firms, and fractional-CFO networks"
    - "Finance-operator communities where board prep, audit readiness, and cash-control pain is discussed"
  funnelTargets: "Target account→discovery 15-20%, discovery→qualified pilot 25-35%, pilot→production 60%+, production→expansion 40%+ within 12 months."
  pricing: "Annual SaaS subscription priced by monthly finance actions or approval volume, starting around a $24k base ACV for a single-entity deployment after a paid pilot, because the buyer value is tied to control, turnaround time, and avoided finance headcount rather than seats alone."
businessModel:
  revenueStreams:
    - "Annual SaaS subscription for approval-graph workflows"
    - "Paid onboarding and policy-mapping services"
    - "Premium modules for multi-entity controls, deeper ERP sync, and later multi-bank support"
  unitOfValue: "Finance actions and approval workflows under management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Additional entities, departments, or approval policies inside the same customer"
    - "Deeper integrations with AP tools, ERP systems, and document sources"
    - "Expansion from payment approvals into treasury controls and board-reporting workflows"
strategyMap:
  northStarMetric: "Approved finance actions processed with complete policy evidence per customer per month"
  inputMetrics:
    - "Percent of requests arriving with complete evidence packets"
    - "Median approval turnaround time"
    - "Percent of policy exceptions caught before payment release"
    - "Pilot-to-production conversion rate"
    - "Partner-sourced qualified opportunities per quarter"
  moatsToBuild:
    - "Cross-system approval graph linking approvers, vendors, budgets, evidence, and outcomes"
    - "Policy and exception playbooks tuned to startup finance workflows before ERP adoption"
    - "Embedded distribution through accountants and fractional-CFO operators already inside the ICP"
  killCriteria:
    - "If more than half of qualified ICP interviews say existing Mercury, Ramp, Brex, or BILL workflows already solve the problem well enough, narrow or stop the wedge."
    - "If the first 5 paid pilots cannot reduce approval turnaround time by at least 25% while achieving over 90% evidence completeness, pause expansion and rework the product."
    - "If design partners require bespoke integrations that prevent deployment inside 45 days, tighten the ICP or accept a services-led model."
  mermaid: |
    flowchart LR
      Wedge[Mercury-first approval wedge] --> MVP[Approval packet MVP]
      MVP --> Proof[Faster approvals and audit proof]
      Proof --> Expansion[Multi-entity and treasury expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Credible workflow wedge with real buyer pain, but conviction stays limited until the company proves budget urgency and repeatable onboarding in live Mercury-based accounts."
    whyBelieve: "The market evidence supports a real pain point at the intersection of Mercury banking, startup finance controls, and spreadsheet-heavy approval work that incumbents only partially solve."
    whyDoubt: "The company still has to prove that a narrow approval layer wins before broader spend suites or Mercury-native features absorb the same budget."
    nextDiligence: "Get 5-10 design partners, run paid pilots, and verify that the product shortens approval cycles and improves audit evidence enough to support $24k-plus annual contracts."
  firstCustomer:
    title: "Head of finance at a Mercury-based Series A dev-tools startup"
    profile: "A 90-person U.S. software company with about $12M ARR, Mercury as its main bank, 150-300 monthly non-payroll payments, and one finance lead still coordinating approvals in Slack and spreadsheets."
    trigger: "A board meeting, audit-prep cycle, or payment-volume jump makes founder-led approvals too slow and too weakly documented."
    buyer: "CFO or head of finance"
    initialContract: "Paid 8-12 week pilot around $10k-$15k, creditable toward a $24k-$36k annual production contract if approval turnaround time drops at least 25% and evidence completeness exceeds 90%."
  mustBeTrue:
    - "At least 40% of Mercury-based Series A-B prospects still run non-payroll approvals primarily through Slack, spreadsheets, or lightweight AP tooling."
    - "CFOs will fund a focused approval-control layer before replacing their bank or buying a broader spend suite."
    - "The first 3-4 integrations cover a majority of approval evidence needs in the beachhead."
    - "Paid pilots convert to production above 60% when the product shows faster approvals and cleaner audit evidence."
    - "The approval graph becomes a defensible data asset before Mercury or suite incumbents close the gap."
  diligenceQuestions:
    - "How often is the urgent pain approval routing versus evidence retention versus budget visibility?"
    - "What budget line funds this product before ERP adoption: finance systems, audit readiness, or headcount avoidance?"
    - "How many target accounts already use Ramp, Brex, or BILL workflows well enough that the wedge is only incremental?"
    - "Which data sources are consistently missing when a finance lead tries to approve a payment confidently?"
    - "Can accountant and fractional-CFO partners drive repeatable introductions, or is the motion still mostly founder-led outbound?"
operatingAssumptions:
  - assumption: "Mercury-based U.S. Series A-B software startups are the highest-intensity early buyers."
    basis: "idea.yaml"
    validationTest: "Interview at least 20 target accounts and confirm that approval chaos around non-payroll spend is a top-two finance pain in at least 8 of them."
    decisionImpact: "If false, the ICP must shift sooner toward other startup verticals or toward multi-bank finance teams."
  - assumption: "A focused approval layer can support roughly $24k-$36k production ACV after a paid pilot."
    basis: "research.yaml"
    validationTest: "Close at least 3 paid pilots and convert at least 2 to production within the target ACV band."
    decisionImpact: "If false, the company needs broader scope, heavier services, or a lower-cost self-serve product shape."
  - assumption: "The first implementation can be repeatable with a narrow connector set instead of custom services."
    basis: "operator judgment"
    validationTest: "Map the first 10 prospects and verify that one Slack flow, one invoice intake path, Mercury data, and 2-3 accounting integrations cover at least 60% of approval cases."
    decisionImpact: "If false, the company must narrow the ICP further or hire implementation capacity earlier than planned."
  - assumption: "Human-approved action packets clear trust and security objections better than autonomous payment execution."
    basis: "research.yaml"
    validationTest: "Track security-review outcomes and pilot adoption, and confirm that buyers grant scoped access when write actions remain approval-gated."
    decisionImpact: "If false, product scope must move toward read-only analytics or add stronger control architecture before deployment."
  - assumption: "Accountant and fractional-CFO partners can become a durable distribution channel."
    basis: "research.yaml"
    validationTest: "Sign 3 partner relationships and generate at least 5 qualified introductions with at least 1 closed paid pilot from partner sourcing."
    decisionImpact: "If false, CAC will stay higher and hiring must prioritize direct sales earlier."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 20 Mercury-based heads of finance, controllers, and CFOs in the target employee and ARR band."
    hypothesis: "Slack-and-spreadsheet approvals are a budget-worthy pain triggered by board scrutiny, audit prep, or payment-volume growth."
    successMetric: "At least 12 interviews confirm the pain and at least 8 share real approval artifacts or workflow maps."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Collect sample approval packets from 5 design partners across invoices, budget files, Slack threads, and Mercury activity."
    hypothesis: "A repeatable evidence model exists for the first workflow without needing deep ERP replacement."
    successMetric: "At least 3 partners show enough common structure to define one MVP data model and policy engine."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Run 2-3 paid pilots on one non-payroll approval workflow with explicit human release controls."
    hypothesis: "The product can cut approval turnaround time by at least 25% while materially improving evidence completeness."
    successMetric: "At least 2 pilots hit the turnaround target and achieve over 90% complete approval packets."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Test pilot pricing and production packaging against finance-action volume."
    hypothesis: "Buyers prefer a paid pilot credited into annual SaaS over pure implementation billing or seat-based pricing."
    successMetric: "At least 2 paid pilots close in the target range and convert into production pricing discussions."
    owner: "Founder/CEO"
  - horizon: "180-360 days"
    experiment: "Launch referral motions with Mercury accountants, Kruze-like startup accounting firms, and fractional-CFO operators."
    hypothesis: "Partners can source higher-intent buyers at the moment manual controls break."
    successMetric: "At least 5 qualified partner-sourced opportunities and 1 production customer from partner referrals."
    owner: "GTM lead"
  - horizon: "180-360 days"
    experiment: "Add multi-entity and deeper accounting-sync features for the first production customers."
    hypothesis: "Control expansion inside existing logos is the fastest path to higher ACV after the wedge is proven."
    successMetric: "At least 2 customers adopt an expansion module and increase ACV by 25% or more."
    owner: "Product/eng lead"
operations:
  - "Review approval exceptions, missing data fields, and policy overrides weekly so product priorities follow real workflow failure modes."
  - "Ship audit logs, role-based permissions, scoped write controls, and approval history before any automation that influences payment release."
  - "Use design-partner workflow maps and sample approval packets as the canonical onboarding, QA, and product-spec artifact."
  - "Maintain a partner playbook for accountants and fractional CFOs with clear referral triggers, implementation boundaries, and ROI proof."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own customer discovery, founder-led sales, and partner development because the core risk is market learning, not sales scale."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the approval graph, policy engine, and first Mercury-plus-collaboration integrations needed for pilots."
  - role: "Product/integration engineer"
    startTiming: "Month 3-6"
    rationale: "Shorten deployment time by productizing repeated connectors across Slack, invoice intake, and accounting systems."
  - role: "Implementation and finance-ops lead"
    startTiming: "Month 6-9"
    rationale: "Turn bespoke policy mapping into repeatable onboarding and ensure customers reach value without founder-only support."
  - role: "GTM lead"
    startTiming: "Month 9-12"
    rationale: "Expand pipeline only after the company has a repeatable paid-pilot motion and referenceable proof points."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 20 ICP interviews and secure 5-10 design partners with real approval artifacts."
      - "Ship an MVP for one non-payroll approval workflow with Mercury action packets, audit logs, and approval routing."
      - "Close at least 2 paid pilots and convert at least 1 customer to production."
      - "Establish 3 referral partners across accountants and fractional-CFO operators."
  - horizon: "12-24 months"
    items:
      - "Reach 10-15 production logos in the Mercury-centered beachhead with deployment under 45 days."
      - "Launch multi-entity controls, deeper accounting sync, and measurable expansion revenue in existing accounts."
      - "Prove that partner-sourced pipeline contributes a meaningful share of qualified opportunities."
  - horizon: "24-36 months"
    items:
      - "Expand from Mercury-first approvals into multi-bank treasury and broader startup finance-control workflows."
      - "Build benchmark data and exception playbooks that increase win rate and reduce implementation time."
      - "Reach a product position strong enough to compete as the control layer before ERP adoption rather than a narrow workflow add-on."
risks:
  - risk: "Mercury, Ramp, Brex, or BILL extends native approval controls quickly enough to neutralize the wedge."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Differentiate on cross-system approval memory, partner distribution, and startup-specific runway context rather than bank-only workflow features."
  - risk: "Prospects decide manual processes or incumbent suites are good enough and will not fund a focused control layer."
    likelihood: "High"
    impact: "High"
    mitigation: "Sell around concrete triggers, require paid pilots, and quantify ROI in approval speed, audit readiness, and avoided finance headcount."
  - risk: "Customer data is too messy for repeatable deployment, pushing the company into a services-heavy implementation model."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Keep the initial workflow narrow, standardize the first connector set, and hire implementation support only after patterns repeat."
  - risk: "Security, permissions, and control reviews slow adoption because the product touches money movement."
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Start with approval-gated execution, scoped permissions, durable audit logs, and explicit segregation-of-duties controls."
fundingAsk:
  round: "pre-seed"
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months should fund the founding team, initial product and integration builds, security-control baseline, 5-10 design partners, early implementation capacity, and a partner-led go-to-market motion to reach repeatable paid pilots and first production logos."
