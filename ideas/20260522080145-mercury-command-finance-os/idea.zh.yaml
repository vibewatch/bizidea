differentiator: >-
  Mercury 和其他金融科技产品能拥有银行目的地，但它们不会自动拥有散落在聊天、预算、合同和非正式财务政策中的混乱审批上下文。轻量级 AP 工具能捕获账单，但仍缺少初创公司特有的决策层——围绕跑道、创始人签字和例外路由。这家公司靠成为「让银行 AI 可信」的审批图谱制胜，再通过积累支出规范、政策例外和财务操作结果的数据集构建护城河——横向 copilot 或银行很难复制这一资产。
