jobsToBeDone:
  - job: >-
      当供应商发票或转账申请出现在 Slack 时，帮助财务负责人收集所需审批和资金背景，让他们无需在聊天和表格中追着创始人就能完成付款。
    currentAlternative: 手工 Slack 审批和表格跟踪，再到银行执行
    successMetric: 审批周转时间，以及携带完整证据的付款占比
  - job: >-
      当董事会要求加强现金管控时，帮助初创公司财务团队将付款决策与预算和跑道影响挂钩，让公司保持快速推进而不产生隐性财务风险。
    currentAlternative: 临时预算审查加银行导出数据和手工跑道模型
    successMetric: 付款后发现的政策例外数量减少，现金规划精准度提升
