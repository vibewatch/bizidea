problem: >-
  A 轮和 B 轮公司的财务团队往往在 Slack 群、Google Sheets 和银行门户之间处理供应商审批、资金分配和付款时机——规模太小、上不了完整 ERP，却又太复杂、靠一位创始人或账务员记不住所有细节。银行能划转资金，但它通常不知道谁批准了这笔支出、是否符合当前预算，以及对资金跑道有何影响。随着付款量攀升，每一笔紧急转账或供应商账单都变成一次手工政策决策——审计证据薄弱，对财务负责人的干扰成本极高。
targetUser:
  primary: 美国风险投资支持的软件初创公司财务负责人或主计长，以 Mercury 为主要运营银行
  secondary: 仍需参与审批非薪资支出和例外情况的创始人、总助理或财务经理
  buyer: CFO 或财务负责人
startupThesis:
  nonObviousInsight: >-
    一旦银行变得可对话，稀缺资源就不再是付款按钮，而是能告诉 AI「哪类财务操作由谁批准、对应哪个预算、对跑道有何影响」的审批图谱。Mercury 正在证明用户想要命令式财务执行，但初创公司仍缺少一个控制层——把混乱的请求转化为有据可查的安全操作。
  beachhead: >-
    美国 A 轮至 B 轮 B2B 软件公司，员工 50–250 人，ARR $5M–$40M，以 Mercury 为主银行，精简财务团队仍在 Slack 和 Google Sheets 里处理供应商付款审批、预算例外和资金分配决策
  wedge: >-
    一套审批图谱，摄入支出申请、发票、合同、银行余额和预算规则，将每笔财务请求转化为含责任人审批、政策校验和预计跑道影响的银行级操作包
  whyNowCatalyst: >-
    Mercury Command 及周边 AI 工具让财务团队开始愿意从自然语言银行界面执行工作，这使工作流控制层的需求更加迫切——它能替代临时拼凑的表格审批流程。
  ventureScalePath: >-
    从初创公司银行审批起步，形成支出权限、例外处理和现金政策记忆的系统记录；之后可扩展至账单支付编排、多银行资金管理、董事会报告，最终成为中小型财务团队在 ERP 采用前后的操作系统。
solution: >-
  产品位于 Slack、发票收件箱、轻量级应付账款工具等请求渠道与 Mercury 之间。它将每笔付款或转账整合成一个结构化操作包，包含申请人、供应商或交易对手、预算负责人、当前现金头寸、历史审批记录和预计跑道影响。财务负责人可从统一队列审批，内嵌 agent 则自动起草缺失信息的跟进消息、执行政策阈值检查，并将例外情况路由给正确的负责人，而非在聊天中反复弹跳。随着时间积累，平台成为「谁能在何条件下花多少钱、为什么某笔付款获批或被拦截」的记忆层。
goToMarketSeed:
  firstCustomer: >-
    一家 90 人规模的美国开发工具初创公司，ARR $12M，Mercury 为主要银行，每月 150–300 笔非薪资付款，由一名财务负责人和创始人共同在 Slack 与表格中协调审批
  buyingTrigger: "近期审计准备、董事会要求加强现金管控，或供应商付款量激增导致创始人主导审批成为瓶颈"
  currentAlternative: 银行门户工作流加 Slack 消息、Google Sheets 和轻量级 AP 软件手工拼接
  switchingReason: >-
    切口保留现有银行和 AP 工具，同时增加一个统一的审批与证据层——在资金划出前显示政策状态和跑道影响，这是当前拼凑方案做不到的。
  pricingHypothesis: 按月度财务操作量和审批量计费的年度 SaaS 订阅，高级层包含多主体管控和 ERP 同步
