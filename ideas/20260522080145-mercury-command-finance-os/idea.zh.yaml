topRisks:
  - name: 银行平台侵蚀
    description: Mercury 或其他金融科技公司可能将原生工作流从命令执行延伸至审批管控，压缩独立切口的空间。
    mitigation: 在银行之外构建跨系统审批上下文，集成多种财务输入，专注于单一银行界面难以复制的政策记忆。
  - name: 早期数据积累不足
    description: 早期客户的预算、合同或发票数据可能不够整洁，限制自动化质量和信任度。
    mitigation: 先做审批捕获和证据记录，支持轻量级文件和 Slack 摄入，待清晰模式出现后再添加深度政策自动化。
  - name: 预算怀疑
    description: 初创公司财务负责人可能将审批工具视为锦上添花，直到一次痛苦的审计、董事会要求或付款失败迫使改变。
    mitigation: 围绕具体触发器销售，量化第一个工作流节省的时间和降低的风险，定价让产品比雇用一名财务通才更容易获批。
