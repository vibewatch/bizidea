fundingAsk:
  round: pre-seed
  amountM: 3.2
  runwayMonths: 18
  milestone: "Reach 10-15 production logos, deploy in under 45 days, and prove partner-sourced pipeline can contribute about 25% of qualified opportunities before the next round."
  useOfFunds:
  - bucket: "Engineering"
    amountUsd: 1280000
    percentage: 40
  - bucket: "GTM"
    amountUsd: 960000
    percentage: 30
  - bucket: "G&A"
