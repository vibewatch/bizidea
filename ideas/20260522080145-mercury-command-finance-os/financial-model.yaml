    amountUsd: 640000
    percentage: 20
scenarios:
  downside:
    description: "Incumbent overlap, heavier integrations, and slower pilot conversions keep the company materially below the base customer ramp."
    y3RevenueK: 620.0
    y3EbitdaK: -880.0
    cashLowPointK: 310.0
    keyAssumptionChanges:
    - "ACV falls from $33K to $27K."
    - "Gross margin falls from 70% to 65%."
    - "Sales cycle stretches from 6 months to 9 months."
    - "Q4Y3 customer count falls from 50 to 32."
  base:
    description: "The base case converts early paid pilots into a narrow, Mercury-first land-and-expand motion that reaches 16 customers by Q4Y2 and 50 by Q4Y3."
    y3RevenueK: 1048.5
    y3EbitdaK: -646.06
    cashLowPointK: 760.29
    keyAssumptionChanges:
    - "Production ACV stays at a blended $33K."
    - "Gross margin stays at the 70% BP target."
    - "Sales cycle holds near 6 months as partner referrals improve qualification."
    - "Q4Y3 customer count reaches 50, still well below the 120-customer reachable SOM in research."
  upside:
    description: "Repeatable onboarding, partner leverage, and early multi-entity expansion lift both customer count and pricing by year 3."
    y3RevenueK: 1510.0
    y3EbitdaK: -220.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - "ACV rises from $33K to $36K."
    - "Gross margin improves from 70% to 73%."
    - "Sales cycle compresses from 6 months to 5 months."
    - "Q4Y3 customer count rises from 50 to 65."
sensitivity:
- variable: "ARPU"
  downsideCase: "$27K ACV from discounting and smaller scopes"
  baseCase: "$33K blended ACV"
  upsideCase: "$36K ACV with expansion modules"
  y3RevenueImpactK: -191.0
  cashImpactK: -133.0
- variable: "CAC"
  downsideCase: "$40K as founder-led outbound remains dominant"
  baseCase: "$30K fully loaded CAC"
  upsideCase: "$24K with stronger partner leverage"
  y3RevenueImpactK: 0.0
  cashImpactK: -200.0
- variable: "churn"
  downsideCase: "2.0% monthly churn if overlap with incumbents stays high"
  baseCase: "1.4% monthly churn"
  upsideCase: "1.0% monthly churn with stronger product stickiness"
  y3RevenueImpactK: -95.0
  cashImpactK: -75.0
- variable: "sales cycle"
  downsideCase: "9 months because security review and integrations drag"
  baseCase: "6 months"
  upsideCase: "5 months with repeatable proof and partner intros"
  y3RevenueImpactK: -260.0
  cashImpactK: -220.0
- variable: "gross margin"
  downsideCase: "65% as onboarding stays more services-heavy"
  baseCase: "70% target gross margin"
  upsideCase: "73% with more repeatable connectors"
  y3RevenueImpactK: 0.0
  cashImpactK: -78.0
- variable: "hiring pace"
  downsideCase: "Pull one engineering and one GTM hire forward by two quarters"
  baseCase: "Hire to the BP sequence"
  upsideCase: "Delay one non-core hire until partner pipeline is proven"
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Leads[Triggered outbound + accountant partners] --> PaidPilots[Paid pilots]
      PaidPilots --> Production[Production customers]
      Production --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit at 70%]
      GrossProfit --> Cash[Ending cash after opex]
modelSanity:
- checkName: "Revenue engine"
  finding: "Base-case revenue comes from turning a narrow paid-pilot motion into 50 paying accounts by Q4Y3 at a blended $33K ACV."
- checkName: "Must go right"
  finding: "Deployment has to stay close to the BP's under-45-day milestone so partner referrals do not turn into a services bottleneck."
- checkName: "Model breaks if"
  finding: "The model degrades fastest if the sales cycle stretches toward 9 months while gross margin slips into the mid-60s because cash then trends toward the downside low point."
- checkName: "Next-round proof"
  finding: "The next financing is justified if the company exits Y2 with 10-15 production logos, credible partner-sourced pipeline, and referenceable proof that approval turnaround and evidence quality improved."
sanityChecks:
  ruleOf40: "Y3 growth 231.3% + EBITDA margin -61.6% = 169.7%."
  burnMultiple: "Y2 burn multiple is about 2.8x on roughly $0.40M of net new ARR; Y3 improves to about 0.6x on roughly $1.12M of net new ARR."
  revenuePerFte: "$117K Y3 using annual revenue and 9 year-end FTE (benchmark $200\u2013400K SaaS)."
  flags:
  - "Revenue per FTE stays below mature SaaS benchmarks through Y3 because the model deliberately front-loads integrations and onboarding before broad expansion."
  - "The base case still assumes buyers fund a focused approval-control layer before Mercury, Ramp, Brex, or BILL absorb the same budget line."
  - "If partner-sourced opportunities do not reach about 25% of qualified pipeline by Y2H2, CAC and sales-cycle assumptions likely drift toward the downside case."
