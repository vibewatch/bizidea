slug: "approval-graph-finance-os"
date: "2026-05-22"
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: "Model start month"
  value: "2026-06"
  unit: month
  source: "Starts the first full month after the 2026-05-22 business-plan date."
- id: A2
  name: "Starting paying accounts (M1)"
  value: "0"
  unit: count
  source: "[BP milestones] The plan starts pre-revenue and does not assume any paying customer before pilot work begins."
- id: A3
  name: "Production ACV"
  value: "$33.0K ARR per production customer"
  unit: usdK_per_year
  source: "[BP gtm.pricing; BP operatingAssumptions] The BP says production contracts should land around $24K-$36K ACV after a paid pilot; the base model uses $33K because year-2 and year-3 cohorts include some expansion into multi-entity and deeper-sync modules."
- id: A4
  name: "Paid pilot revenue treatment"
  value: "$4.0K per month for 3 months"
  unit: usdK_per_customer_month
  source: "[BP investorMemo.firstCustomer.initialContract] The BP describes an 8-12 week paid pilot around $10K-$15K, so the model uses a $12K pilot split evenly over three months."
- id: A5
  name: "Customer ramp"
  value: "4 paying accounts by M12, 16 by Q4Y2, and 50 by Q4Y3"
  unit: customers
  source: "[BP milestones; research.market.som] This pace clears the BP year-2 logo target, stays below the 120-customer reachable SOM in research, and avoids assuming the whole beachhead converts by year 3."
- id: A6
  name: "Steady-state gross margin"
  value: "70%"
  unit: percent
  source: "[BP businessModel.targetGrossMarginPct] The business plan targets a 70% gross margin, so modeled COGS are 30% of revenue."
- id: A7
  name: "Monthly churn"
  value: "1.4%"
  unit: percent
  source: "Startup-finance heuristic for sticky but still early finance workflow software where logos can expand, but vendor overlap and services friction still create some churn risk."
- id: A8
  name: "Fully loaded CAC"
  value: "$30.0K per production customer"
  unit: usdK_per_customer
  source: "[BP gtm.funnelTargets; BP experimentRoadmap] A founder-led pilot motion with accountant and fractional-CFO referrals is cheaper than pure outbound, but still expensive relative to ACV because each close requires proof, security review, and onboarding."
- id: A9
  name: "Loaded salary bands"
  value: "Founder $150K; engineering $150K; product/integration $135K; implementation/finance ops $120K; GTM $145K; customer success/partnerships $110K; G&A $100K"
  unit: usdK_per_fte_year
  source: "Startup-finance heuristic for U.S. pre-seed SaaS hiring, anchored to [BP team] and the BP sequence that prioritizes product, integrations, and implementation before sales scale."
- id: A10
  name: "Headcount ramp snapshots"
  value: "Founder 1/1/1/1/1/1; engineering 1/2/2/2/3/4; product/integration 0/1/1/1/1/1; implementation/finance ops 0/0/1/1/1/1; GTM 0/0/0/1/1/1; customer success/partnerships 0/0/0/0/1/1; G&A 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
  unit: fte
  source: "[BP team; BP strategicChoices.sequencingRationale] The model follows the BP hiring order: build the wedge first, add repeatable onboarding next, then layer on GTM and support only after pilots convert."
- id: A11
  name: "Starting cash after pre-seed close"
  value: "$3.2M"
  unit: usdM
  source: "[BP fundingAsk] The BP targets a $2M-$4M pre-seed; the model uses $3.2M to fund the stated hiring plan and retain a six-month buffer."
- id: A12
  name: "Functional opex budgets"
  value: "Y1 monthly opex of $39K-$84K; Y2 quarterly opex of $310K-$350K; Y3 quarterly opex of $330K-$360K"
  unit: usdK
  source: "Startup-finance heuristic for a control-heavy SaaS product with cloud, security, travel, software, legal, and partner-enablement spend layered on top of the BP headcount plan."
- id: A13
  name: "Quarterly payroll smoothing"
  value: "Y2 and Y3 salary expense ramps smoothly between snapshot headcount points instead of stepping only at year-end"
  unit: method
  source: "[financial-modeler instructions] Quarterly salary lines are smoothed between Q4 snapshots so payroll tracks the BP hiring sequence without hiding step changes."
- id: A14
  name: "Partner-sourced pipeline share"
  value: "About 25% of qualified pipeline by Y2H2"
  unit: percent_of_pipeline
  source: "[BP experimentRoadmap; BP milestones] The BP explicitly targets three referral partners and a meaningful partner-sourced opportunity share, which supports the faster Y3 customer ramp."
- id: A15
  name: "Cash conversion simplification"
  value: "Ending cash rolls from EBITDA with no debt, taxes, or capex line items"
  unit: method
  source: "Startup-finance heuristic for an asset-light pre-seed SaaS company where working-capital swings are small relative to operating burn."
- id: A16
  name: "Downside scenario deltas"
  value: "$27K ACV, 65% gross margin, 9-month sales cycle, and 32 customers by Q4Y3"
  unit: scenario_inputs
  source: "[BP risks; research.sensitivityCases] The downside reflects the specific risks that incumbents are good enough, integrations stay messy, and the Mercury-specific wedge converts more slowly."
- id: A17
  name: "Upside scenario deltas"
  value: "$36K ACV, 73% gross margin, 5-month sales cycle, and 65 customers by Q4Y3"
  unit: scenario_inputs
  source: "[BP product.twentyFourMonth; BP milestones] The upside assumes the company wins early multi-entity expansion and partner referrals compound faster than the base case."
