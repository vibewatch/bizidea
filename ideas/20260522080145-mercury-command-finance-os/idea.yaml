jobsToBeDone:
  - job: >-
      When a vendor invoice or transfer request lands in Slack, help our finance lead collect the right approvals and
      cash context, so they can move money without chasing founders across chat and spreadsheets.
    currentAlternative: Manual Slack approvals and spreadsheet tracking before bank execution
    successMetric: Approval turnaround time and share of payments executed with complete evidence
  - job: >-
      When the board asks for tighter cash control, help our startup finance team connect payment decisions to budget and
      runway impact, so we can keep moving fast without creating hidden finance risk.
    currentAlternative: Ad hoc budget reviews plus bank exports and manual runway models
    successMetric: Reduction in policy exceptions discovered after payment and improved cash-planning accuracy
