problem: >-
  Series A and B finance teams often run vendor approvals, cash allocation, and payment timing across Slack threads, Google
  Sheets, and a bank portal because they are too small for a full ERP but too complex for one founder or bookkeeper to keep
  in their head. The bank can move money, but it usually does not know who approved a spend request, whether it fits the
  current budget, or what it does to runway. As payment volume rises, every urgent transfer or vendor bill becomes a manual
  policy decision with weak audit evidence and high interruption cost for the head of finance.
targetUser:
  primary: Head of Finance or controller at a U.S. venture-backed software startup using Mercury as its primary operating bank
  secondary: Founder, chief of staff, or finance manager who still helps approve non-payroll spend and exceptions
  buyer: CFO or head of finance
startupThesis:
  nonObviousInsight: >-
    If banking becomes conversational, the scarce product is no longer the payment button; it is the approval graph that
    tells an AI which finance action is allowed, by whom, against which budget, and with what runway impact. Mercury is
    proving users want command-based finance execution, but startups still lack a control layer that turns messy requests
    into safe, evidence-backed actions.
  beachhead: >-
    U.S. Series A-B B2B software companies with 50-250 employees, $5M-$40M ARR, Mercury as the primary bank, and a lean
    finance team still running vendor payment approvals, budget exceptions, and cash-allocation decisions from Slack and
    Google Sheets
  wedge: >-
    An approval graph that ingests spend requests, invoices, contracts, bank balances, and budget rules, then turns each
    finance request into a bank-ready action packet with owner approval, policy checks, and projected runway impact
  whyNowCatalyst: >-
    Mercury Command and adjacent AI tooling make finance teams newly willing to execute work from a natural-language banking
    interface, which raises the urgency for a workflow-control layer that can replace ad hoc spreadsheet approvals.
  ventureScalePath: >-
    Starting with startup banking approvals creates a system of record for spend authority, exception handling, and
    cash-policy memory; that can expand into bill pay orchestration, multi-bank treasury controls, board reporting, and the
    broader operating system for sub-enterprise finance teams before and after ERP adoption.
solution: >-
  The product sits between request channels such as Slack, invoice inboxes, and lightweight AP tools on one side and
  Mercury on the other. It assembles each payment or transfer into a structured action packet containing the requestor,
  vendor or counterparty, budget owner, current cash position, prior approvals, and expected runway effect. Finance leaders
  can approve from one queue, while embedded agents draft follow-ups for missing context, enforce policy thresholds, and
  route exceptions to the right owner instead of bouncing them through chat. Over time, the platform becomes the memory
  layer for who can spend what, under which conditions, and why a payment was approved or blocked.
goToMarketSeed:
  firstCustomer: >-
    A 90-person U.S. dev-tools startup with $12M ARR, Mercury as its main bank, 150-300 non-payroll payments per month,
    and one finance lead plus founder approvals still coordinated in Slack and spreadsheets
  buyingTrigger: A recent audit prep, board request for tighter cash controls, or a jump in vendor-payment volume that makes founder-driven approvals a bottleneck
  currentAlternative: Bank portal workflows plus Slack threads, Google Sheets, and lightweight AP software stitched together manually
  switchingReason: >-
    The wedge preserves the existing bank and AP stack, but adds a single approval and evidence layer that shows policy
    status and runway impact before money moves, which the current patchwork cannot do reliably.
  pricingHypothesis: Annual SaaS fee priced by monthly finance actions and approval volume, with premium tiers for multi-entity controls and ERP sync
