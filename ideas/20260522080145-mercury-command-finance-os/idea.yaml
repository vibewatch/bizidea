topRisks:
  - name: Bank platform encroachment
    description: Mercury or another fintech could extend native workflows from command execution into approval controls and shrink the independent wedge.
    mitigation: Own cross-system approval context outside the bank, integrate with multiple finance inputs, and focus on policy memory that is hard for a single bank surface to recreate.
  - name: Thin data exhaust early on
    description: Early-stage customers may not have clean budget, contract, or invoice data, which can limit automation quality and trust.
    mitigation: Start with approval capture and evidence logging first, support lightweight file and Slack ingestion, and add deeper policy automation only after clean patterns emerge.
  - name: Budget skepticism
    description: Startup finance leaders may see approval tooling as a nice-to-have until a painful audit, board request, or payment failure forces change.
    mitigation: Sell around a concrete trigger, quantify hours saved and risk reduced in the first workflow, and price the product so it is easier to justify than hiring another finance generalist.
