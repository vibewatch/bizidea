scenarios:
  downside:
    description: "在位厂商重叠、集成更繁琐、试点转化更慢，使公司明显低于基础情景的客户增长。"
    y3RevenueK: 620.0
    y3EbitdaK: -880.0
    cashLowPointK: 310.0
    keyAssumptionChanges:
    - "ACV 从 $33K 降至 $27K。"
    - "毛利率从 70% 降至 65%。"
    - "销售周期从 6 个月延长至 9 个月。"
    - "Q4Y3 客户数从 50 降至 32。"
  base:
    description: "基础情景将早期付费试点转化为精简的 Mercury 优先拿下扩展动作，第 Q4Y2 达到 16 个客户，Q4Y3 达到 50 个客户。"
    y3RevenueK: 1048.5
    y3EbitdaK: -646.06
    cashLowPointK: 760.29
    keyAssumptionChanges:
    - "正式生产 ACV 保持混合 $33K。"
    - "毛利率保持 BP 目标 70%。"
    - "随着合作伙伴转介绍改善资质，销售周期维持约 6 个月。"
    - "Q4Y3 客户数达到 50，仍远低于研究中 120 个可覆盖 SOM。"
  upside:
    description: "可重复上线、合作伙伴杠杆和早期多主体扩展在第 3 年同时提升客户数量和定价。"
    y3RevenueK: 1510.0
    y3EbitdaK: -220.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - "ACV 从 $33K 升至 $36K。"
    - "毛利率从 70% 改善至 73%。"
    - "销售周期从 6 个月压缩至 5 个月。"
    - "Q4Y3 客户数从 50 升至 65。"
sensitivity:
- variable: "ARPU"
  downsideCase: "因折扣和更小合同范围，ACV 降至 $27K"
  baseCase: "混合 ACV $33K"
  upsideCase: "含扩展模块，ACV 升至 $36K"
  y3RevenueImpactK: -191.0
  cashImpactK: -133.0
- variable: "CAC"
  downsideCase: "创始人主导外呼仍占主导，CAC 升至 $40K"
  baseCase: "全含 CAC $30K"
  upsideCase: "合作伙伴杠杆更强，CAC 降至 $24K"
  y3RevenueImpactK: 0.0
  cashImpactK: -200.0
- variable: "churn"
  downsideCase: "与在位厂商重叠持续，月度流失率升至 2.0%"
  baseCase: "月度流失率 1.4%"
  upsideCase: "产品粘性更强，月度流失率降至 1.0%"
  y3RevenueImpactK: -95.0
  cashImpactK: -75.0
- variable: "sales cycle"
  downsideCase: "安全审查和集成拖慢，销售周期延长至 9 个月"
  baseCase: "6 个月"
  upsideCase: "可重复验证和合作伙伴转介绍，压缩至 5 个月"
  y3RevenueImpactK: -260.0
  cashImpactK: -220.0
- variable: "gross margin"
  downsideCase: "上线仍偏服务密集，毛利率降至 65%"
  baseCase: "目标毛利率 70%"
  upsideCase: "连接器更可重复，毛利率升至 73%"
  y3RevenueImpactK: 0.0
  cashImpactK: -78.0
- variable: "hiring pace"
  downsideCase: "一名工程和一名 GTM 招聘提前两个季度"
  baseCase: "按 BP 序列招聘"
  upsideCase: "合作伙伴管道验证后再延迟一名非核心招聘"
  y3RevenueImpactK: 0.0
  cashImpactK: -160.0
modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      Leads[Triggered outbound + accountant partners] --> PaidPilots[Paid pilots]
      PaidPilots --> Production[Production customers]
      Production --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit at 70%]
      GrossProfit --> Cash[Ending cash after opex]
modelSanity:
- checkName: "收入引擎"
  finding: "基础情景收入来自将精简的付费试点动作转化为 Q4Y3 50 个付费账户，混合 ACV $33K。"
- checkName: "必须做对的事"
  finding: "部署必须接近 BP 45 天以内的里程碑，否则合作伙伴转介绍会变成服务瓶颈。"
- checkName: "模型崩溃条件"
  finding: "当销售周期向 9 个月延伸、毛利率跌入 60% 中段时，现金趋向下行情景低点，模型退化最快。"
- checkName: "下一轮融资条件"
  finding: "若公司以 10–15 个正式生产客户退出第 2 年，附可信的合作伙伴来源管道和审批周转及证据质量改善的可引用标杆，下一轮融资即可合理。"
sanityChecks:
  ruleOf40: "第 3 年增长率 231.3% + EBITDA 利润率 -61.6% = 169.7%。"
