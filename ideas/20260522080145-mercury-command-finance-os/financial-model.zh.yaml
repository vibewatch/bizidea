slug: "approval-graph-finance-os"
date: "2026-05-22"
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: "模型起始月份"
  value: "2026-06"
  unit: month
  source: "从 2026-05-22 商业计划日期后的第一个完整月开始。"
- id: A2
  name: "起始付费账户数（第 1 个月）"
  value: "0"
  unit: count
  source: "[BP milestones] 计划从零收入起步，不假设在试点工作开始前已有任何付费客户。"
- id: A3
  name: "正式生产 ACV"
  value: "$33.0K ARR per production customer"
  unit: usdK_per_year
  source: "[BP gtm.pricing; BP operatingAssumptions] BP 称正式生产合同应在付费试点后落在 $24K–$36K ACV 区间；基础模型使用 $33K，因为第 2 年和第 3 年的客户队列包含了部分多主体和深度同步模块的扩展。"
- id: A4
  name: "付费试点收入处理"
  value: "$4.0K per month for 3 months"
  unit: usdK_per_customer_month
  source: "[BP investorMemo.firstCustomer.initialContract] BP 描述约 $10K–$15K 的 8–12 周付费试点；模型使用 $12K 均摊为三个月。"
- id: A5
  name: "客户增长节奏"
  value: "4 paying accounts by M12, 16 by Q4Y2, and 50 by Q4Y3"
  unit: customers
  source: "[BP milestones; research.market.som] 这一速度达到 BP 第 2 年客户目标，低于研究中 120 个可覆盖 SOM，并避免假设到第 3 年整个滩头市场都已转化。"
- id: A6
  name: "稳态毛利率"
  value: "70%"
  unit: percent
  source: "[BP businessModel.targetGrossMarginPct] 商业计划目标毛利率为 70%，因此建模 COGS 为收入的 30%。"
- id: A7
  name: "月度流失率"
  value: "1.4%"
  unit: percent
  source: "初创公司财务工作流软件的行业启发式参数：客户粘性较强但仍处早期阶段，供应商重叠和服务摩擦仍会造成部分流失风险。"
- id: A8
  name: "全含 CAC"
  value: "$30.0K per production customer"
  unit: usdK_per_customer
  source: "[BP gtm.funnelTargets; BP experimentRoadmap] 创始人主导的试点动作加上会计师和兼职 CFO 转介绍比纯外呼成本更低，但相对 ACV 而言仍然偏高，因为每次签约都需要验证、安全审查和上线流程。"
- id: A9
  name: "全含薪资区间"
  value: "Founder $150K; engineering $150K; product/integration $135K; implementation/finance ops $120K; GTM $145K; customer success/partnerships $110K; G&A $100K"
  unit: usdK_per_fte_year
  source: "美国 pre-seed SaaS 招聘的行业启发式参数，以 [BP team] 和 BP 优先产品、集成和实施、再扩展销售的序列为基础。"
- id: A10
  name: "人员增长快照"
  value: "Founder 1/1/1/1/1/1; engineering 1/2/2/2/3/4; product/integration 0/1/1/1/1/1; implementation/finance ops 0/0/1/1/1/1; GTM 0/0/0/1/1/1; customer success/partnerships 0/0/0/0/1/1; G&A 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
  unit: fte
  source: "[BP team; BP strategicChoices.sequencingRationale] 模型遵循 BP 招聘顺序：先构建切口，再添加可重复上线，然后才在试点转化后叠加 GTM 和客服。"
- id: A11
  name: "pre-seed 完成后起始现金"
  value: "$3.2M"
  unit: usdM
  source: "[BP fundingAsk] BP 目标融资 $2M–$4M pre-seed；模型使用 $3.2M 以支撑所述招聘计划并保留六个月缓冲。"
- id: A12
  name: "职能运营预算"
  value: "Y1 monthly opex of $39K-$84K; Y2 quarterly opex of $310K-$350K; Y3 quarterly opex of $330K-$360K"
  unit: usdK
  source: "管控导向 SaaS 产品的行业启发式参数，包含叠加在 BP 人员计划之上的云计算、安全、差旅、软件、法务和合作伙伴赋能支出。"
- id: A13
  name: "季度薪资平滑处理"
  value: "Y2 and Y3 salary expense ramps smoothly between snapshot headcount points instead of stepping only at year-end"
  unit: method
  source: "[financial-modeler instructions] 季度薪资线在 Q4 快照之间平滑过渡，使薪酬跟随 BP 招聘序列，而不隐藏阶梯式变化。"
- id: A14
  name: "合作伙伴来源管道占比"
  value: "About 25% of qualified pipeline by Y2H2"
  unit: percent_of_pipeline
  source: "[BP experimentRoadmap; BP milestones] BP 明确目标签订 3 个转介绍合作伙伴关系，并贡献有意义的合作伙伴来源机会占比，支撑第 3 年更快的客户增长。"
- id: A15
  name: "现金转化简化处理"
  value: "Ending cash rolls from EBITDA with no debt, taxes, or capex line items"
  unit: method
  source: "资产轻型 pre-seed SaaS 公司的行业启发式参数，营运资金波动相对运营烧损较小。"
- id: A16
  name: "下行情景差异值"
  value: "$27K ACV, 65% gross margin, 9-month sales cycle, and 32 customers by Q4Y3"
  unit: scenario_inputs
  source: "[BP risks; research.sensitivityCases] 下行情景反映了在位厂商足够好用、集成持续混乱以及 Mercury 专属切口转化更慢等特定风险。"
- id: A17
  name: "上行情景差异值"
  value: "$36K ACV, 73% gross margin, 5-month sales cycle, and 65 customers by Q4Y3"
  unit: scenario_inputs
  source: "[BP product.twentyFourMonth; BP milestones] 上行情景假设公司早期赢得多主体扩展，合作伙伴转介绍比基础情景复合更快。"
