        Proposed startup: [0.91, 0.89]
  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品依赖 Mercury API、Slack 和财务系统集成，但生态足够模块化——只要工作流保持银行相邻而非银行内嵌，单一基础设施供应商就不应捕获全部价值 [3][4][5][23][30]。
      sourceRefs: [3, 4, 5, 23, 30]
    buyerPower:
      score: 4
      rationale: 财务负责人在 Mercury 原生工具、Ramp、Brex、BILL 和手工流程中有可信的替代选项，可要求快速部署和显著 ROI，才会接受再加一个工作流层 [8][23][28][29][30][31]。
      sourceRefs: [8, 23, 28, 29, 30, 31]
    threatOfEntrants:
      score: 3
      rationale: AI 降低了 copilot 和路由逻辑的构建成本，但信任、银行权限、可审计性和多系统数据质量仍拖慢了可信入局的速度。
      sourceRefs: [3, 5, 15, 37, 40]
    threatOfSubstitutes:
      score: 5
      rationale: >-
        默认替代方案仍是「够用就好」：Mercury 加 Slack、表格和 AP 套件的组合在痛点变得迫切之前足以满足大多数买方。
      sourceRefs: [8, 20, 21, 23, 30]
    competitiveRivalry:
      score: 4
      rationale: 公司将进入一个拥挤的相邻领域，银行、支出套件、AP 自动化供应商和采购平台都在从不同方向向同一个审批问题扩张 [8][23][24][28][29][30][31][32][33]。
      sourceRefs: [8, 23, 24, 28, 29, 30, 31, 32, 33]
  pestle:
    - factor: economic
      impact: positive
      point: 创业投资交易价值在 2024 年回升，早期阶段活动仍占市场很大份额，支持 Mercury 服务的目标公司持续成立。
      sourceRefs: [38, 39]
    - factor: social
      impact: positive
      point: 董事会和投资人正在推动更早的财务纪律，清晰的审批证据和可信报告在 A 轮至 B 轮更为重要。
      sourceRefs: [20, 21, 22]
    - factor: technological
      impact: positive
      point: Mercury、Ramp、Brex、BILL 和 Zip 都表明 AI 原生财务工作流、OCR 和自动路由现在是预期功能而非创新亮点。
      sourceRefs: [3, 7, 17, 24, 29, 31, 32, 33]
    - factor: legal
      impact: negative
      point: OFAC 筛查、ACH 时间窗口约束和内控预期提高了实施门槛，并惩罚薄弱的审计轨迹。
      sourceRefs: [34, 35, 36, 37]
    - factor: political
      impact: neutral
      point: 2026 年 5 月金融科技整合行政令讨论方向上支持金融科技现代化，但近期执行仍取决于独立监管机构和现有监管流程。
      sourceRefs: [40]
  adoptionFrictionMatrix:
    - friction: 审批时缺少预算、合同和编码数据
      severity: high
      affectedBuyer: 财务负责人
      mitigation: 先做证据捕获和路由，待数据源标准化后再添加深度政策自动化。
      sourceRefs: [7, 20, 21]
    - friction: 对能影响付款的工具进行安全和管控审查
      severity: high
      affectedBuyer: CFO 和 IT/安全审查人员
      mitigation: 强调读写分离、权限范围限制、审计日志和人工放款审批。
      sourceRefs: [3, 5, 15, 37]
    - friction: 与 Ramp、Brex 或 BILL 的现有重叠
      severity: medium
      affectedBuyer: CFO
      mitigation: 定位为保留现有工具栈的管控与证据层，而非替代。
      sourceRefs: [23, 28, 29, 30, 31]
    - friction: 习惯在 Slack 口头审批的预算负责人行为改变
      severity: medium
      affectedBuyer: 部门审批人
      mitigation: 在熟悉的渠道保留审批动作，同时在底层明确建立系统记录。
      sourceRefs: [8, 24, 29]
market:
  tam:
    value: $96.0M
    rationale: 建模依据：约 12,000 家美国风险投资支持的早期初创公司（2023 年 13,608 笔美国 VC 交易，2024 年早期阶段仍为最大交易量队列，多年存量可见）× 三分之一使用 Mercury × $24,000 年度平台费用估算。
    isEstimate: true
    sourceRefs: [14, 37, 38, 39]
  sam:
    value: $28.8M
    rationale: 应用滩头过滤器：约 1,200 家员工 50–250 人、以 Mercury 为主银行、且审批痛点足以推动工作流改变的美国 B2B 软件公司 × $24,000 年度费用估算。
    isEstimate: true
    sourceRefs: [14, 19, 20, 21, 22, 37]
  som:
    value: $2.9M
    rationale: 假设第 3 年通过 Mercury 会计师、兼职 CFO 合作伙伴和直接触达触发账户可覆盖约 120 个客户 × $24,000 年合同价值。
    isEstimate: true
    sourceRefs: [10, 11, 18, 20, 21]
