slug: "approval-graph-finance-os"
date: "2026-05-22"
executiveSummary: >-
  Approval Graph 是面向美国 A 轮至 B 轮软件初创公司的 Mercury 优先财务控制层——这些公司仍在 Slack 和表格中审批供应商付款、预算例外和资金划转。MVP 不替换银行、AP 工具或 ERP，而是在人工放款之前，将每笔申请转化为含审批人身份、政策校验、支撑证据和预计跑道影响的银行级操作包。初始买方是使用 Mercury 为主银行、员工 50–250 人的初创公司 CFO 或财务负责人，正面临来自董事会汇报、审计准备或非薪资付款量骤增的新压力。滩头市场之所以有意聚焦，是因为痛点在此最为尖锐，Mercury 的会计师生态提供了可信的分发路径，而更宽泛的支出管理类别已被 Mercury、Ramp、Brex、BILL 和 Zip 大量占据。研究型自下而上测算支持约 $96.0M 的初始美国 TAM、约 $28.8M 的滩头 SAM，以及在保持聚焦前提下约 $2.9M 的第 3 年 SOM。GTM 应围绕「审批证据和更快决策」而非「通用 AI 财务自动化」销售，以能证明更短周转时间和更清晰审计轨迹的付费试点开路。主要战略风险在于：除非产品清楚展示自己作为跨系统审批记忆层的独特价值，否则买方可能认为 Mercury 原生工具或综合套件已经够用。最大的证据缺口是：Mercury 系初创公司愿意在在位套件扩张之前购买专项控制层的直接证明，以及早期客户数据足够整洁、能避免服务密集型上线模式的直接证明。
problem:
  - "A 轮至 B 轮初创公司往往在 Slack 消息、表格和银行门户中审批供应商付款和现金例外，没有可靠的系统记录说明谁批了什么、原因为何。"
  - "当董事会、审计或跑道审查力度加大时，精简的财务团队无法快速将付款决策与预算状态、支撑证据和现金影响关联起来，只能手工追人。"
solution:
  - "从 Slack、发票收件箱和轻量级 AP 工具捕获申请，再组装成含申请人、供应商、审批链、政策状态和跑道背景的单一审批包。"
  - "第一天保持人工审批放款，同时建立可审计的审批图谱，之后可逐步扩展至更广泛的财务管控和资金工作流。"
whyWeWin:
  - "产品楔入银行和 AP 套件都未完全占据的缺口：跨聊天、预算、合同、发票和 Mercury 系现金执行的跨系统审批上下文。"
  - "Mercury 系会计师和兼职 CFO 渠道能在手工审批刚出问题时精准找到买方，而每次部署都在积累专有审批、例外和结果数据。"
strategicChoices:
  beachhead: "员工 50–250 人、ARR $5M–$40M、以 Mercury 为主银行、一名精简财务负责人仍在 Slack 和 Google Sheets 协调非薪资审批的美国风险投资支持 B2B 软件初创公司。"
  wedgeRationale: "这个切片痛点清晰、买方具名、触发器可见，但规模尚小或阶段尚早，不需要完整 ERP 或采购大改造。在此拿下一个审批工作流，比试图替换整个财务工具栈更快产生验证。"
  sequencingRationale: "先做证据捕获、路由、政策校验和人工审批的 Mercury 操作包，因为这解决了紧迫的审批瓶颈，无需客户换银行或信任自主付款放款。只有在有可重复的试点 ROI 之后，才应添加更深的 ERP 同步、多主体管控，并最终扩展至多银行资金编排。"
  notYet:
    - "在 Mercury 优先验证之前的多银行资金编排"
    - "企业卡、员工报销或采购套件替代"
    - "无明确人工审批的自主付款放款"
    - "完整 ERP 替代或大型企业财务工作流"
market:
  tam: "基于约 12,000 家早期风险投资支持初创公司（ERP 采用前）× 三分之一 Mercury 渗透率 × $24,000 年度平台费用估算，美国 TAM 约 $96.0M。"
  sam: "基于约 1,200 家员工 50–250 人、Mercury 系滩头市场 U.S. B2B 软件公司 × $24,000 ACV 估算，初始 SAM 约 $28.8M。"
  som: "基于通过会计师、兼职 CFO 和直接触达触发账户在第 3 年可覆盖约 120 个客户，第 3 年 SOM 约 $2.9M。"
  segments:
    - "主要：Mercury 系美国 A 轮至 B 轮软件初创公司，精简财务团队"
    - "次要：管理多家 Mercury 系客户的初创公司会计事务所和兼职 CFO"
  buyingProcess: >-
    日常用户通常是财务负责人、主计长或财务经理，经济审批权在 CFO 或创始人手中。流程始于审计准备、董事会报告或付款量增长暴露出管控薄弱，随后进入简短的安全和集成审查——因为产品触及围绕资金划转的审批逻辑。
product:
  mvp: >-
    MVP 应将 Slack、发票入口、预算文件和 Mercury 账户数据整合进一个审批队列，生成含审批人、证据、政策校验和简单跑道影响视图的银行级操作包。应专注于一个非薪资付款工作流和明确的人工放款，而非宽泛的 AP 自动化。
  sixMonth: "推出含 Slack 和发票摄入、基于角色的审批路由、审计日志、Mercury 操作包生成以及导出至客户现有会计系统的付费试点。"
  twelveMonth: "为共创客户中最常见的 AP 和 ERP 环境添加可重复集成，引入多主体审批政策，并上线审批周转时间、例外率和证据完整度仪表盘。"
  twentyFourMonth: "从 Mercury 优先审批记忆扩展至更广泛的初创公司财务管控，如多银行资金工作流、深度政策基准对比和面向董事会的现金治理报告。"
  keyBets:
    - "专项审批层能在客户升级至更广泛支出或 ERP 套件之前赢得预算。"
    - "少量集成足以捕获足够证据，无需服务密集型实施即可创造可重复 ROI。"
    - "人在回路的审批工作流比完全自主的财务 agent 赢得信任更快。"
    - "会计师和兼职 CFO 合作伙伴产生的高意向转介绍，比纯粹的外呼有更低的 CAC。"
gtm:
  wedge: "销售 Mercury 原生审批记忆层——减少审批追人、产出银行级证据，而非推销通用 AI 财务自动化。"
  channels:
    - "创始人主导外呼，目标是触发了的 Mercury 系初创公司的 CFO、财务负责人和主计长"
    - "来自 Mercury 会计师、初创公司会计事务所和兼职 CFO 网络的转介绍"
    - "讨论董事会准备、审计准备和现金管控痛点的财务运营社群"
  funnelTargets: "目标账户→发现 15–20%，发现→合格试点 25–35%，试点→正式生产 60%+，正式生产→扩展 40%+（12 个月内）。"
  pricing: "按月度财务操作量或审批量计费的年度 SaaS 订阅，付费试点后单主体部署起始 ACV 约 $24K，因为买方价值绑定于管控、周转时间和节省财务人员成本，而非纯粹按席位计费。"
businessModel:
  revenueStreams:
    - "审批图谱工作流的年度 SaaS 订阅"
    - "付费上线和政策映射服务"
    - "多主体管控、深度 ERP 同步及后续多银行支持的高级模块"
  unitOfValue: "在管的财务操作和审批工作流数量"
  targetGrossMarginPct: 70
  expansionLevers:
    - "同一客户内增加主体、部门或审批政策"
    - "与 AP 工具、ERP 系统和文档来源的深度集成"
    - "从付款审批扩展至资金管控和董事会报告工作流"
strategyMap:
  northStarMetric: "每客户每月经过完整政策证据处理的审批财务操作数量"
  inputMetrics:
    - "携带完整证据包的申请占比"
    - "审批周转时间中位数"
    - "付款放款前被捕获的政策例外占比"
    - "试点转正式生产转化率"
    - "每季度合作伙伴来源的合格机会数"
  moatsToBuild:
    - "连接审批人、供应商、预算、证据和结果的跨系统审批图谱"
    - "针对 ERP 采用前初创公司财务工作流调校的政策和例外手册"
    - "通过已深入 ICP 的会计师和兼职 CFO 建立的嵌入式分发渠道"
  killCriteria:
    - "如果超过半数合格 ICP 访谈表示现有 Mercury、Ramp、Brex 或 BILL 工作流已足够好用，缩窄或停止该切口。"
    - "如果前 5 个付费试点无法将审批周转时间缩短至少 25% 同时证据完整度超过 90%，暂停扩展并重做产品。"
    - "如果共创客户需要定制集成导致 45 天内无法完成部署，收紧 ICP 或接受服务主导模式。"
  mermaid: |
    flowchart LR
      Wedge[Mercury-first approval wedge] --> MVP[Approval packet MVP]
      MVP --> Proof[Faster approvals and audit proof]
      Proof --> Expansion[Multi-entity and treasury expansion]
investorMemo:
  verdict:
    call: "观察"
    conviction: "工作流切口可信、买方痛点真实，但在公司于真实 Mercury 系账户中验证预算紧迫性和可重复上线之前，信念保持有限。"
    whyBelieve: "市场证据支持 Mercury 银行、初创公司财务管控与繁重表格审批工作的交叉点存在真实痛点，在位厂商只部分解决了这一问题。"
    whyDoubt: "公司仍需证明，在更宽泛的支出套件或 Mercury 原生功能吸收同一预算之前，专项审批层能率先胜出。"
    nextDiligence: "争取 5–10 个共创客户，运行付费试点，验证产品能否充分缩短审批周期、改善审计证据，以支撑 $24K 以上的年合同。"
  firstCustomer:
    title: "Mercury 系 A 轮开发工具初创公司的财务负责人"
    profile: "一家 90 人规模的美国软件公司，ARR 约 $12M，Mercury 为主要银行，每月 150–300 笔非薪资付款，一名财务负责人仍在 Slack 和表格中协调审批。"
    trigger: "一次董事会会议、审计准备周期或付款量骤增，使创始人主导的审批太慢且证据不足。"
    buyer: "CFO 或财务负责人"
    initialContract: "约 $10K–$15K 的 8–12 周付费试点，若审批周转时间至少缩短 25% 且证据完整度超过 90%，可抵扣进入 $24K–$36K 的年度正式合同。"
  mustBeTrue:
    - "至少 40% 的 Mercury 系 A 轮至 B 轮潜在客户仍主要通过 Slack、表格或轻量级 AP 工具处理非薪资审批。"
    - "CFO 会在替换银行或购买更广泛支出套件之前，为专项审批管控层买单。"
    - "前 3–4 个集成覆盖了滩头市场大多数审批证据需求。"
    - "当产品展示更快审批和更清晰审计证据时，付费试点转正式生产率超过 60%。"
    - "审批图谱在 Mercury 或套件在位厂商缩小差距之前，成为可防御的数据资产。"
  diligenceQuestions:
    - "最紧迫的痛点是审批路由、证据留存，还是预算可视化？"
    - "ERP 采用前，这个产品的预算从哪条线来：财务系统、审计准备，还是避免招人？"
    - "有多少目标账户已经足够好地使用 Ramp、Brex 或 BILL 工作流，让切口只是增量价值？"
    - "财务负责人想要放心批款时，哪些数据来源一致缺失？"
    - "会计师和兼职 CFO 合作伙伴能否产生可重复的转介绍，还是动作仍主要依赖创始人主导外呼？"
operatingAssumptions:
  - assumption: "Mercury 系美国 A 轮至 B 轮软件初创公司是强度最高的早期买方。"
    basis: "idea.yaml"
    validationTest: "访谈至少 20 个目标账户，确认围绕非薪资支出的审批混乱在至少 8 个访谈中是排名前二的财务痛点。"
    decisionImpact: "若为假，ICP 需要更早转向其他初创公司垂直领域或多银行财务团队。"
  - assumption: "专项审批层在付费试点后能支撑约 $24K–$36K 的正式生产 ACV。"
    basis: "research.yaml"
    validationTest: "完成至少 3 个付费试点，并将其中至少 2 个在目标 ACV 区间内转化为正式生产。"
    decisionImpact: "若为假，公司需要更宽的产品范围、更重的服务，或更低成本的自助产品形态。"
  - assumption: "第一次实施可以用一套精简连接器而非定制服务完成可重复部署。"
    basis: "operator judgment"
    validationTest: "梳理前 10 个潜在客户，验证一套 Slack 流程、一条发票入口、Mercury 数据和 2–3 个会计集成能覆盖至少 60% 的审批场景。"
    decisionImpact: "若为假，公司必须进一步收紧 ICP 或比计划更早招聘实施团队。"
  - assumption: "人工审批操作包比自主付款执行更能消除信任和安全顾虑。"
    basis: "research.yaml"
    validationTest: "跟踪安全审查结果和试点采用情况，确认在写操作保持审批门控时买方会授予范围权限。"
    decisionImpact: "若为假，产品范围必须转向只读分析，或在部署前增加更强的管控架构。"
  - assumption: "会计师和兼职 CFO 合作伙伴能成为持久的分发渠道。"
    basis: "research.yaml"
    validationTest: "签订 3 个合作伙伴关系，产生至少 5 个合格转介绍，并从合作伙伴来源完成至少 1 个付费试点。"
    decisionImpact: "若为假，CAC 将持续偏高，招聘需更早优先考虑直接销售。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "访谈 20 位目标员工和 ARR 区间内的 Mercury 系财务负责人、主计长和 CFO。"
    hypothesis: "Slack 加表格审批是一个因董事会审查、审计准备或付款量增长触发、值得付费解决的痛点。"
    successMetric: "至少 12 个访谈确认痛点，至少 8 个分享真实审批制品或工作流地图。"
    owner: "创始人/CEO"
  - horizon: "0–90 天"
    experiment: "从 5 个共创客户收集跨发票、预算文件、Slack 消息和 Mercury 活动的样本审批包。"
    hypothesis: "无需深度 ERP 替代，第一个工作流就存在可重复的证据模型。"
    successMetric: "至少 3 个合作伙伴展示足够的共同结构，可定义一个 MVP 数据模型和政策引擎。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "在一个非薪资审批工作流上运行 2–3 个含明确人工放款管控的付费试点。"
    hypothesis: "产品能将审批周转时间至少缩短 25%，同时显著提升证据完整度。"
    successMetric: "至少 2 个试点达到周转时间目标，且审批包完整度超过 90%。"
    owner: "创始人/CEO"
  - horizon: "90–180 天"
    experiment: "针对财务操作量测试试点定价和正式生产套餐。"
    hypothesis: "买方更倾向于可抵扣进年度 SaaS 的付费试点，而非纯实施计费或按席位定价。"
    successMetric: "至少 2 个付费试点在目标区间内签约，并进入正式生产定价讨论。"
    owner: "创始人/CEO"
  - horizon: "180–360 天"
    experiment: "与 Mercury 会计师、Kruze 类初创公司会计事务所和兼职 CFO 启动转介绍动作。"
    hypothesis: "合作伙伴能在手工管控刚出问题时找到高意向买方。"
    successMetric: "至少 5 个合格的合作伙伴来源机会和 1 个来自合作伙伴转介绍的正式生产客户。"
    owner: "GTM 负责人"
  - horizon: "180–360 天"
    experiment: "为首批正式生产客户添加多主体和深度会计同步功能。"
    hypothesis: "在现有客户内扩展管控，是切口验证后提升 ACV 最快的路径。"
    successMetric: "至少 2 个客户采用扩展模块，ACV 提升 25% 以上。"
    owner: "产品/工程负责人"
operations:
  - "每周回顾审批例外、缺失数据字段和政策覆盖，让产品优先级跟随真实工作流失败模式。"
  - "在任何影响付款放款的自动化之前，先交付审计日志、基于角色的权限、受限写操作管控和审批历史。"
  - "以共创客户工作流地图和样本审批包作为上线、QA 和产品规格的规范制品。"
  - "为会计师和兼职 CFO 维护合作伙伴手册，明确转介绍触发器、实施边界和 ROI 证明。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "主导客户探索、创始人销售和合作伙伴开发，因为核心风险在于市场学习而非销售规模。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "构建审批图谱、政策引擎及试点所需的首批 Mercury 加协作工具集成。"
  - role: "产品/集成工程师"
    startTiming: "第 3–6 个月"
    rationale: "将 Slack、发票入口和会计系统的重复连接器产品化，缩短部署时间。"
  - role: "实施及财务运营负责人"
    startTiming: "第 6–9 个月"
    rationale: "将定制政策映射转化为可重复上线流程，确保客户无需仅靠创始人支持即可达到价值。"
  - role: "GTM 负责人"
    startTiming: "第 9–12 个月"
    rationale: "只有在公司拥有可重复的付费试点动作和可引用的标杆案例后，才扩展销售漏斗。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "完成 20 个 ICP 访谈，争取 5–10 个持有真实审批制品的共创客户。"
      - "为一个非薪资审批工作流交付 MVP，含 Mercury 操作包、审计日志和审批路由。"
      - "完成至少 2 个付费试点，将至少 1 个客户转化为正式生产。"
      - "在会计师和兼职 CFO 中建立 3 个转介绍合作伙伴关系。"
  - horizon: "12–24 个月"
    items:
      - "在 Mercury 系滩头市场达到 10–15 个正式生产客户，部署周期在 45 天以内。"
      - "上线多主体管控、深度会计同步，以及在现有账户内可衡量的扩展收入。"
      - "验证合作伙伴来源管道在合格机会中贡献显著份额。"
  - horizon: "24–36 个月"
    items:
      - "从 Mercury 优先审批扩展至多银行资金管理和更广泛的初创公司财务管控工作流。"
      - "构建基准数据和例外手册，提升赢单率并缩短实施时间。"
      - "建立足够强的产品定位，以在 ERP 采用之前作为控制层参与竞争，而非仅作为狭窄的工作流附加功能。"
risks:
  - risk: "Mercury、Ramp、Brex 或 BILL 快速扩展原生审批管控，中和切口。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "在跨系统审批记忆、合作伙伴分发和初创公司专属跑道背景上差异化，而非依赖单一银行工作流功能。"
  - risk: "潜在客户认为手工流程或在位套件已经够好，不会为专项控制层买单。"
    likelihood: "High"
    impact: "High"
    mitigation: "围绕具体触发器销售，要求付费试点，并在审批速度、审计准备和节省财务人员成本上量化 ROI。"
  - risk: "客户数据太混乱，无法可重复部署，把公司推向服务密集型实施模式。"
    likelihood: "Medium"
    impact: "High"
    mitigation: "保持初始工作流精简，标准化首批连接器，只有在模式重复出现后才招聘实施支持。"
  - risk: "安全、权限和管控审查拖慢采用，因为产品触及资金划转。"
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "从审批门控执行、受限权限、持久审计日志和明确的职责分离管控起步。"
