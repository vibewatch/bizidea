openQuestions:
- How often does the target beachhead experience incidents severe enough to justify an always-on subscription instead of a retainer?
- Which evidence artifacts actually improve first-pass reversal rates with Microsoft, Palo Alto, Talos, and Zscaler?
- How much customer-impact telemetry can be collected without creating privacy or legal-discovery problems?
- What onboarding controls are strong enough to exclude malicious operators without slowing legitimate emergency cases?
