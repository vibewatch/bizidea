competitors:
- name: VirusTotal Monitor
  stage: incumbent
  wedge: Detection monitoring and investigation pivots across multi-engine security verdicts.
  pricing: Enterprise / account-based
  strength: Fast visibility into which engines or vendors flagged an asset and how detections evolve over time.
  weaknessVsUs: Does not assemble evidence packs, route appeals, or track unblock propagation across customer environments.
  sourceRefs:
  - 2
  - 132
  - 133
- name: Netcraft
  stage: incumbent
  wedge: Digital risk feeds, phishing disruption, and rapid takedowns with downstream blocklist distribution.
  pricing: Quote-based / demo-led
  strength: Strong feed relationships, fast takedowns, and explicit block/unblock cadence across downstream protections.
  weaknessVsUs: Optimized for disrupting malicious content rather than proving that a legitimate software publisher is safe and restored everywhere.
  sourceRefs:
  - 119
  - 120
- name: ZeroFox
  stage: incumbent
  wedge: Broad external discovery, validation, and disruption for brands, executives, and domains.
  pricing: Quote-based
  strength: Wide external surface coverage and a mature disruption narrative.
  weaknessVsUs: Breadth dilutes focus on software-specific exoneration, signed-artifact workflows, and per-vendor unblock routing.
  sourceRefs:
  - 121
- name: Group-IB Digital Risk Protection
  stage: scale-up
  wedge: Automated digital-risk monitoring and takedown for brand abuse, scams, and impersonation.
  pricing: Contact sales
  strength: Strong brand-protection positioning with integrated monitoring and enforcement motions.
  weaknessVsUs: Broader brand-abuse orientation leaves a gap around legitimate-software false positives across binaries, extensions, and enterprise allowlists.
  sourceRefs:
  - 123
- name: Axur
  stage: scale-up
  wedge: Automated takedown of phishing, fraud, and impersonation content.
  pricing: Demo / quote-based
  strength: Automation-first takedown posture is attractive for high-volume external abuse.
  weaknessVsUs: Takedown-first orientation does not solve cross-vendor exoneration of legitimate software or customer-environment restore tracking.
  sourceRefs:
  - 125
