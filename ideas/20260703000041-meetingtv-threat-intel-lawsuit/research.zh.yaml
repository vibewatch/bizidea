    sourceRefs:
    - 96
    - 98
    - 99
    - 101
  - point: 信誉系统越来越依赖下载信誉、URL 订阅源和下游威胁情报，这提高了一次错误判定的代价。
    sourceRefs:
    - 117
    - 118
    - 120
    - 132
  - point: 制品签名、公证和安全软件溯源标准，让机器可读的自证清白在技术上比几年前更可行。
