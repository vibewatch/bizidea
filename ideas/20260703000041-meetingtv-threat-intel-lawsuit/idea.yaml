topRisks:
  - name: "Reactive budget problem"
    description: "Some vendors will not budget until after a painful false positive, which can slow proactive sales."
    mitigation: "Target segments with recurring scrutiny such as meeting intelligence, remote support, and desktop-agent vendors, and bundle monitoring plus pre-clearance reviews so value is visible before an outage."
  - name: "Appeal bottleneck"
    description: "Security vendors and carriers may have opaque, manual, or slow reversal processes that limit how much software alone can accelerate recovery."
    mitigation: "Start with the highest-impact providers, pair automation with human analyst operations, and standardize evidence packets that work across manual and API-driven appeal flows."
  - name: "Bad-actor misuse"
    description: "A remediation platform could attract malicious operators trying to manufacture legitimacy and get unblocked."
    mitigation: "Require cryptographic ownership proof, signed artifacts, analyst review, and a strict refusal policy for ambiguous or harmful cases."
