scenarios:
  downside:
    description: 事件带来的痛点是真实的，但买家依然被动，公司到第三年末停留在 24 家客户、6 万美元客户年价值的水平。
    y3RevenueK: 1155.0
    y3EbitdaK: -758.6
    cashLowPointK: -99.3
    keyAssumptionChanges:
      - 第三年第四季度客户数从 30 降到 24，因为事件频率和合作伙伴转介的表现不及 A5 假设。
      - 综合客户年价值封顶在 6 万美元，而不是 A8 假设的 7.2 万美元，因为留存服务和连接器扩展包的附加率偏低。
      - 第三年毛利率落在 68%，而不是 A11 假设的 72%，因为分析师工作仍然过于依赖人工。
  base:
    description: 第一年 3 起转化、合作伙伴协助落地，加上温和的扩展附加率，推动公司在第三年末达到 30 家客户、7.2 万美元的客户年价值。
    y3RevenueK: 1620.0
    y3EbitdaK: -377.6
    cashLowPointK: 142.0
    keyAssumptionChanges:
      - 客户数按 A3-A5 假设推进，维持在研究部分测算的第三年 30 家客户 SOM 以内。
      - 综合客户年价值从 A6 逐步升到 A8，对应试点转化为年度订阅，并带有一定的留存服务和连接器扩展包附加。
      - 招聘按 A17 推进，此后按 A24 保持不变，这正是让融资需求维持在商业计划书 200 万-400 万美元区间内的原因。
  upside:
    description: 服务商模板和合作伙伴转介提前跑通，把公司推到 36 家客户、7.8 万美元客户年价值的水平，且第二年之后不再新增编制。
    y3RevenueK: 2145.0
    y3EbitdaK: 43.2
    cashLowPointK: 686.4
    keyAssumptionChanges:
      - 第三年第四季度客户数从 30 升到 36，因为转介合作伙伴从这个狭窄的 SAM 中带来的客户比 A5 假设的更多。
      - 综合客户年价值达到 7.8 万美元，因为高级留存服务和扩展包的附加率比 A8 假设的更高。
      - 第三年毛利率达到 74%，因为连接器复用和溯源自动化让人工介入时间的下降速度超出计划。
