slug: false-positive-blocklist-ops
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 建模起始现金
    value: $2,300K
    unit: USDK
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情形假设在第 1 个月完成 230 万美元的 pre-seed 交割，以达成 30 个客户的里程碑，并保留超过 6 个月的期末燃烧缓冲。'
  - id: A2
    name: 起始付费客户数（第 1 个月）
    value: '0'
    unit: customers
    source: '[BP milestones] 共创客户先于付费年度转化。'
  - id: A3
    name: 第一年付费客户排期
    value: 'M1-M12: 0,0,0,0,1,1,2,2,2,3,3,3'
    unit: customersEop schedule
    source: '[BP 0-12 月里程碑] 到第一年末，3 个试点转化为 5 万美元以上的年度订阅。'
  - id: A4
    name: 第二年付费客户排期
    value: Q1Y2 4/5/5, Q2Y2 6/7/8, Q3Y2 9/10/11, Q4Y2 12/13/15
    unit: monthly customers within quarter
    source: '[BP 12-24 月里程碑：15 个生产环境客户] 按创始人主导和合作伙伴主导的创业融资爬坡经验法则分摊。'
  - id: A5
    name: 第三年付费客户排期
    value: Q1Y3 16/17/18, Q2Y3 19/20/22, Q3Y3 23/24/26, Q4Y3 27/28/30
    unit: monthly customers within quarter
    source: '[BP 24-36 月里程碑；研究部分 SOM 30 家客户] 假设扩张始终保持在 300 个账户的滩头市场范围内。'
  - id: A6
    name: 第一年综合客户年价值
    value: $42K
    unit: USD/customer-year
    source: '[BP investorMemo.initialContract 2.5 万-4 万美元试点] 建模为月度 3,500 美元，对应以试点为主的账户逐步转化的阶段。'
  - id: A7
    name: 第二年综合客户年价值
    value: $57K
    unit: USD/customer-year
    source: '[BP 5 万-7.5 万美元年度订阅] 建模为月度 4,750 美元，对应试点占比减少、年度合同占主导的阶段。'
  - id: A8
    name: 第三年综合客户年价值
    value: $72K
    unit: USD/customer-year
    source: '[BP 年度订阅 + 高级速响留存服务 + 连接器扩展包] 建模为月度 6,000 美元，对应账户扩张后的阶段。'
  - id: A9
    name: 第一年毛利率
    value: 68%
    unit: pct
    source: '[BP targetGrossMarginPct 70] 按创业融资经验法则打了折扣，因为第一年仍以分析师辅助和试点为主。'
  - id: A10
    name: 第二年毛利率
    value: 70%
    unit: pct
    source: '[BP businessModel.targetGrossMarginPct]'
  - id: A11
    name: 第三年毛利率
    value: 72%
    unit: pct
    source: '[BP 12-24 月里程碑：迈向 70% 以上的订阅毛利率] 加上溯源材料库和演练工作流带来的更多自动化。'
  - id: A12
    name: 创始人/CEO 年薪
    value: $120K
    unit: USD/year
    source: '创业融资经验法则：pre-seed 阶段创始人的现金薪酬。'
  - id: A13
    name: 工程师年薪
    value: $180K
    unit: USD/year
    source: '创业融资经验法则：高级产品/集成工程师的现金薪酬。'
  - id: A14
    name: 安全分析师年薪
    value: $140K
    unit: USD/year
    source: '创业融资经验法则：安全分析师运营岗位的现金薪酬。'
  - id: A15
    name: 事件成功岗年薪
    value: $120K
    unit: USD/year
    source: '创业融资经验法则：早期事件成功/客户成功负责人的现金薪酬。'
  - id: A16
    name: GTM/合作伙伴岗年薪
    value: $150K
    unit: USD/year
    source: '创业融资经验法则：早期客户经理/合作伙伴岗位的现金薪酬。'
  - id: A17
    name: 基准情形招聘节奏
    value: 分析师第 3 个月；第二名工程师第 5 个月；事件成功岗第 8 个月；GTM 第 13 个月；第三名工程师第 16 个月
    unit: schedule
    source: '[BP team startTiming] 加上 sequencingRationale。'
  - id: A18
    name: 销售与市场非薪资支出爬坡
    value: 第一年 $6-9K/月；第二年 $36-48K/季度；第三年 $51-60K/季度
    unit: USDK/period
    source: '[BP GTM channels and funnelTargets] 结合创业融资经验法则，针对创始人主导获客和合作伙伴营销支出。'
  - id: A19
    name: 研发非薪资支出爬坡
    value: 第一年 $4-6K/月；第二年 $21-30K/季度；第三年 $33-42K/季度
    unit: USDK/period
    source: '[BP product roadmap, connectors, evidence vault, auditability] 结合创业融资经验法则，针对云服务、工具和外包人力支出。'
  - id: A20
    name: G&A 非薪资支出爬坡
    value: 第一年 $4-5K/月；第二年 $18-21K/季度；第三年 $24-27K/季度
    unit: USDK/period
    source: '[BP operations and compliance needs] 结合创业融资经验法则，针对法务、保险和财务支出。'
  - id: A21
    name: 基准情形 CAC
    value: $25K
    unit: USD/customer
    source: '[BP funnelTargets + 300-account SAM] 综合经验法则，与创始人主导销售、合作伙伴转介和计划中的市场支出保持一致。'
  - id: A22
    name: 月度客户流失率
    value: 1.8%
    unit: pct
    source: 创业融资经验法则：适用于痛点真实但预算被动的窄分市场企业级 SaaS。
  - id: A23
    name: 现金转换规则
    value: 期末现金 = 期初现金 + EBITDA；未建模债务、资本支出或营运资金时点
    unit: modeling rule
    source: 创业融资经验法则：适用于 pre-seed 阶段的规划模型。
  - id: A24
    name: 基准情形第 16 个月后不再新增招聘
    value: 7 名全职员工维持到第三年第四季度
    unit: headcount policy
    source: '[BP sequencingRationale] 加上资金纪律经验法则，因为滩头市场 SAM 仅约 1800 万美元。'
