modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Trigger[误报事件或演练] --> Qualified[合格事件账户]
      Qualified --> Pilot[付费试点/速响留存服务]
      Pilot --> Annual[年度监控订阅]
      Annual --> Expansion[连接器扩展包与留存服务扩展]
      Expansion --> Revenue[综合客户年营收]
      Revenue --> GrossProfit[毛利]
      GrossProfit --> Cash[扣除薪资和运营支出后的现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形靠的是一条狭窄但可信的客户增长曲线——从第一年末的 3 家付费客户，爬升到第三年末的 30 家；同时综合客户年价值随着试点转化和扩展，从 4.2 万美元升到 7.2 万美元。
  - checkName: 必须走对的一步
    finding: 公司必须证明，五大服务商工作流和合作伙伴转介能把痛点事件足够快地转化为常驻合同，在不新增编制的前提下于第二年末拿下 15 家客户。
  - checkName: 模型会在哪里崩掉
    finding: 如果产品停滞在约 6 万美元 ACV、24 家客户的水平，下行情形会在第三年结束前跌到现金零点以下约 10 万美元。
  - checkName: 下一轮融资的证明点
    finding: 一个可信的下一轮融资故事是：30 家生产环境客户、5 家多面扩展账户，毛利率持续保持在 70% 以上，同时燃烧率逐步逼近盈亏平衡。
sanityChecks:
  ruleOf40: 第三年营收增速 225% + EBITDA 利润率 -23% = 202%（因第二年基数偏小而被拉高）。
  burnMultiple: 第三年燃烧倍数为 0.3 倍（37.76 万美元燃烧 / 130.5 万美元净新增 ARR，对应客户数从 15 家增至 30 家、综合价值从 5.7 万美元升至 7.2 万美元）。
  revenuePerFte: 第三年人均全职员工营收 23.1 万美元（7 名全职员工），处于垂直 SaaS 20 万-40 万美元基准区间的低端，因为交付仍需分析师辅助。
  flags:
    - 基准情形在第 16 个月后维持 7 名全职员工不变；任何提前招聘都会显著压缩现金跑道。
    - 下行情形的现金会略微转负，因此事件频率和试点转年度订阅的转化率必须在第一年就得到验证。
    - Rule-of-40 看起来很亮眼，只是因为第二年营收基数太小；更难回答的问题是，30 家客户能否支撑起更广泛的产品扩张。
