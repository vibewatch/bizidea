problem: >-
  录制会议、植入浏览器扩展或运行桌面代理的企业软件厂商，天生就容易被外部分析师盯上——它们的产品要截屏、录音、监控浏览器行为，这些动作和间谍软件太像了。一份低可信度的威胁报告只要给它们贴上恶意标签，损失就不止是一条难看的头条：网络服务商和安全工具会直接封锁域名、下载或登录，正常用户瞬间被拒之门外。安全、支持、法务和工程团队只能各自为战，靠临时申诉、截图和客户邮件连轴转，却没有一套共同系统证明清白、追踪指控扩散到了哪里。现有的事件响应、攻击面管理和公关工具都是为应对入侵或宕机设计的，不是为了在威胁情报供应链里逆转被机器放大的误判。
targetUser:
  primary: "100-1,000 人规模的会议智能、远程支持或桌面代理类 SaaS 厂商中，负责安全、信任工程或基础设施的负责人——其产品可能被 DNS、SWG、EDR 或浏览器信誉系统封锁。"
  secondary: "总法律顾问或事件响应负责人，在误报事件中统筹服务商申诉、企业客户升级处理和状态沟通。"
  buyer: "CISO 或工程副总裁。"
startupThesis:
  nonObviousInsight: >-
    AI 生成的威胁情报让指控扩散得更快，瓶颈也随之从"如何揪出坏人"转移到"如何证明好人清白"。最终胜出的公司不会是又一家检测厂商，而是握住那层机器可读的自证清白层和扩散地图——告诉每一个下游封锁方：证据是什么、发生了什么变化、该由谁来撤销这个判定。
  beachhead: >-
    100-1,000 人规模的会议智能、通话录制、远程支持和桌面代理类 SaaS 厂商——它们把可安装软件或浏览器抓取工具送进企业环境，一次错误的恶意判定就能让业务瘫痪。
  wedge: >-
    一个误报黑名单控制平面：侦测新出现的恶意判定、拼出经签名的证据包、把申诉分发给对应厂商，并跟踪域名、二进制文件、扩展和 IP 在解封链条上的扩散状态。
  whyNowCatalyst: >-
    MeetingTV 的诉状证明，一份 AI 生成的网络安全报告能从低可信度分析迅速升级为各大服务商的域名封锁，快到足以切断客户访问——误报应对因此从可选项变成了要有预算的刚性运营需求。
  ventureScalePath: >-
    先从受严格审查的企业生产力和远程访问软件切入，再扩展到所有可安装的 B2B 软件、邮件与域名信誉、应用商店信任、云滥用申诉，最终成为互联网信任状态纠纷的记录系统。
solution: >-
  平台持续监控客户域名、二进制文件、扩展和 IP 在威胁情报报告、DNS 过滤、浏览器信誉、EDR 判定和下载信誉等各个面上的状态。一旦出现新的恶意分类，系统就开出一个事件工作区，标出可能受影响的下游封锁方，并把代码签名证书、托管溯源、遥测基线、SBOM、归属记录等经签名的材料拼进同一张证据图谱。安全、支持和法务团队共用一条时间线，系统自动生成针对各厂商的申诉包和客户可读的状态更新，取代临时拼凑的邮件往来。产品接着跟踪哪些厂商已经撤销判定、哪些客户环境仍被封锁、指控还在哪里扩散。随着案例积累，这家创业公司会攒下这个赛道里最难复制的资产：一份跨厂商数据集，记录着到底什么证据真正能扭转误判、每家服务商的响应速度有多快。
goToMarketSeed:
  firstCustomer: >-
    一家 300 人规模的会议智能 SaaS 厂商，其浏览器录制工具和配套桌面代理被财富 1000 强客户使用——一次错误的恶意标签就能让登录、下载或录制流程全部卡死。
  buyingTrigger: >-
    威胁情报厂商、网络服务商或大型企业安全团队给出新的恶意判定，开始封锁用户访问，或威胁到重点客户的续约。
  currentAlternative: >-
    人工收集证据、向每个封锁方分别提工单、请外部律师、做公关沟通，再用表格手动追踪谁还被封着。
  switchingReason: >-
    首位客户愿意换用，是因为这个产品把跨部门的救火行动收拢成一条工作流：证明归属权、打包经得起推敲的证据、把申诉精准分发给每家厂商，并实时显示访问权限何时真正恢复。
  pricingHypothesis: >-
    按监控的信誉面（域名、二进制文件、扩展、IP 段）定价的年度订阅，外加针对进行中事件的高级速响留存服务费。
whyNow:
  - point: "一起围绕 AI 生成威胁报告的诉讼表明，站不住脚的网络安全指控如今会带来董事会级别的法律和营收风险，而不只是分析师犯的噪音性错误。"
    signalRefs:
      - "AI 生成的威胁报告如今真能引发现实中断"
    sourceRefs: [1, 2]
  - point: "真正的伤害发生在报告扩散成服务商封锁、切断用户访问的那一刻，这清楚地指向了一种需求：能感知扩散路径的解封工作流。"
    signalRefs:
      - "一份问题报告能在服务商黑名单间层层扩散"
    sourceRefs: [1, 2]
  - point: "由于市场至今没有明确的人工审核标准来约束 AI 撰写的网络安全结论，厂商还会继续发出有争议的标签，受害企业现在就需要一套系统化的应对层。"
    signalRefs:
      - "网络安全结论发布前该有多少人工把关，仍是悬而未决的问题"
    sourceRefs: [2]
  - point: "被指控的软件厂商，其安全团队需要把黑名单纠错当成一项常设运营职能——光靠公关或法务等待，并不能让客户环境恢复访问。"
    signalRefs:
      - "受害企业需要的是黑名单纠错，而不只是公关应对"
    sourceRefs: [1, 2]
differentiator: >-
  攻击面监控、品牌保护和事件响应工具能告诉厂商"问题出现了"，却不会去建模一个恶意标签如何在安全产品间扩散、什么证据真正能扭转它。公关公司和外部律师能在叙事和责任层面帮上忙，但他们碰不到代码签名、托管、遥测和厂商申诉机制这些实际操作环节。这家公司要做的是成为负面安全指控的记录系统，积累一套关于翻案打法、响应时间和解封扩散路径的专有数据集，覆盖整条威胁情报供应链。
