jobsToBeDone:
  - job: "当某家安全厂商突然封锁我们的产品，帮我们的安全和营收团队证明这个判定是错的，赶在客户流失蔓延前恢复访问。"
    currentAlternative: "邮件往来、厂商门户、律师函和一次性支持升级。"
    successMetric: "从首次恶意判定到首个客户环境恢复访问的中位时间。"
  - job: "当我们发布新的录制、扩展或桌面代理功能时，帮我们提前备好溯源材料、盯住信誉漂移，赶在误判扩散到各个企业账户之前抓住它。"
    currentAlternative: "定期人工检查加被动式客户支持。"
    successMetric: "在客户报告首次中断之前就被发现的信誉事件占比。"
ideaScorecard:
