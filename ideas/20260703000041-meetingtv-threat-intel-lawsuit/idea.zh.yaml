  defensibility:
    score: 4
    rationale: "针对各厂商的申诉打法手册、响应时间数据和不断扩大的证据图谱，会累积成难以复制的运营诀窍。"
  ventureScale:
    score: 5
    rationale: "同一套控制平面能从重度采集类 SaaS 扩展到所有可安装的企业软件，以及其他依赖信誉的信任场景。"
topRisks:
  - name: "预算被动问题"
    description: "部分厂商要等到吃过误报的苦头才肯批预算，这会拖慢主动型销售。"
    mitigation: "锁定会议智能、远程支持、桌面代理这类反复受审查的细分市场，把监控和预先合规审查打包销售，让价值在出事之前就看得见。"
  - name: "申诉瓶颈"
    description: "安全厂商和运营商的翻案流程可能不透明、靠人工、又慢，这限制了纯软件手段能加速恢复的空间。"
    mitigation: "先啃下影响最大的几家服务商，把自动化和人工分析师结合起来，并把证据包标准化，让它在人工和 API 两种申诉流程里都能用。"
  - name: "恶意滥用"
    description: "一个纠错平台可能会吸引恶意操作者，试图伪造合法性来骗取解封。"
    mitigation: "要求密码学层面的所有权证明、经签名的材料、分析师审核，并对存疑或有害的案例执行严格拒绝政策。"
