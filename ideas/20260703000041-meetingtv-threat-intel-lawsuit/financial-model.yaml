modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[False-positive incident or drill] --> Qualified[Qualified incident account]
      Qualified --> Pilot[Paid pilot / rapid-response retainer]
      Pilot --> Annual[Annual monitoring subscription]
      Annual --> Expansion[Connector pack and retainer expansion]
      Expansion --> Revenue[Blended customer-year revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after payroll and opex]
modelSanity:
  - checkName: Revenue engine
    finding: The base case is driven by a narrow but believable logo ramp from 3 paying customers at Y1 exit to 30 at Y3 exit, while blended customer-year value rises from $42K to $72K as pilots convert and expand.
  - checkName: Must go right
    finding: The company must prove that top-five provider workflows and partner referrals convert painful incidents into always-on contracts fast enough to reach 15 customers by Y2 end without adding more headcount.
  - checkName: Model breaks if
    finding: If the product stalls near $60K ACV and 24 logos, the downside case runs about $0.1M below zero cash before Y3 ends.
  - checkName: Next-round proof
    finding: A credible next financing story is 30 production customers, five multi-surface expansion accounts, and sustained gross margin above 70% while burn approaches breakeven.
sanityChecks:
  ruleOf40: Y3 revenue growth 225% + EBITDA margin -23% = 202% (inflated by the small Y2 base).
  burnMultiple: Y3 burn multiple 0.3x ($377.6K burn / $1.305M net new ARR from 15 to 30 logos and a $57K->$72K blend shift).
  revenuePerFte: $231K Y3 on 7 FTE (low end of the $200-400K vertical SaaS benchmark because delivery stays analyst-assisted).
  flags:
    - Base case holds headcount flat at 7 FTE after M16; any pull-forward hire meaningfully compresses runway.
    - The downside case goes slightly negative on cash, so incident frequency and pilot-to-annual conversion have to be validated in the first year.
    - Rule-of-40 looks strong only because Y2 revenue starts from a tiny base; the harder question is whether 30 logos can fund broader product expansion.
