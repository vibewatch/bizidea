scenarios:
  downside:
    description: Incident pain is real but buyers stay reactive, leaving the company at 24 logos and a $60K customer-year by Y3 exit.
    y3RevenueK: 1155.0
    y3EbitdaK: -758.6
    cashLowPointK: -99.3
    keyAssumptionChanges:
      - Q4Y3 customers fall from 30 to 24 as incident frequency and partner referrals underperform A5.
      - Blended customer-year value tops out at $60K instead of A8 $72K because retainer and connector-pack attach stays light.
      - Y3 gross margin lands at 68% instead of A11 72% because analyst work remains too manual.
  base:
    description: Three Y1 conversions, partner-assisted landings, and modest expansion attach move the company to 30 logos at a $72K customer-year by Y3 exit.
    y3RevenueK: 1620.0
    y3EbitdaK: -377.6
    cashLowPointK: 142.0
    keyAssumptionChanges:
      - Customer counts follow A3-A5 and stay within the researched 30-customer Y3 SOM.
      - Blended customer-year value steps from A6 to A8 as pilots convert into annual subscriptions with some retainer and connector-pack attach.
      - Hiring follows A17 and then stays flat per A24, which is what keeps the ask inside the BP $2-4M range.
  upside:
    description: Provider templates and partner referrals click early, pushing the company to 36 logos at a $78K customer-year without adding headcount after Y2.
    y3RevenueK: 2145.0
    y3EbitdaK: 43.2
    cashLowPointK: 686.4
    keyAssumptionChanges:
      - Q4Y3 customers rise from 30 to 36 as referral partners source more of the narrow SAM than A5 assumes.
      - Blended customer-year value reaches $78K as premium retainers and expansion packs attach more often than A8 assumes.
      - Y3 gross margin reaches 74% because connector reuse and provenance automation reduce manual touch time faster than planned.
