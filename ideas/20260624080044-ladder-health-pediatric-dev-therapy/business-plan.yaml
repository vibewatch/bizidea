slug: pediatric-rtm-home-therapy
date: '2026-06-24'
executiveSummary: >-
  Pediatric RTM Home Therapy is a billing and caregiver-activation operating
  system for independent pediatric speech-language pathology and occupational
  therapy practices that face 60-plus day waitlists and cannot hire therapists
  fast enough. The first customer is a 4-8 therapist practice in North
  Carolina, Massachusetts, or Maryland whose owner has seen RTM reimbursement
  guidance but has not operationalized a single claim. The urgent pain is
  two-sided: families lose developmental time during long waits, while
  practices deliver unpaid between-session coaching and leave $40-80 per
  patient per month uncollected. The MVP turns therapist-authored home programs
  into short caregiver routines, logs completion in a mobile app, and exports
  billing-ready RTM events without requiring the practice to replace its EMR or
  clearinghouse. This is a narrow beachhead, but it creates faster proof than
  selling a general teletherapy or family-engagement tool because the buying
  trigger, ROI math, and first proof point all live inside one workflow.
  Research supports acute demand, existing digital home-program budgets, and a
  real gap between broad rehab software and pediatric caregiver-activation
  billing, but it also shows that payer implementation varies by state and that
  caregiver adherence can decay quickly. The company should therefore win first
  in three target states with manual claim export, then add deeper integrations
  and only later expand into health-system accounts, adjacent pediatric
  disciplines, and adult outpatient rehab. The biggest disconfirming risk is
  that pediatric SLP and OT RTM reimbursement proves too narrow or denial-prone
  in the target states, in which case the company should reposition around
  caregiver engagement and waitlist reduction rather than billing yield.
problem:
  - Practices with 3-10 pediatric therapists face 60-day to six-month waitlists and clinician shortages, so each new family increases access pressure faster than capacity or revenue.
  - Most home programs are PDFs or verbal coaching with no claims-grade tracking, so practices miss RTM reimbursement and caregivers receive inconsistent between-session guidance.
solution:
  - Give therapists a pediatric program builder and caregiver app that turns waitlisted or active patients into structured 2-5 minute home routines with clear progression criteria.
  - Turn caregiver activity into state-aware RTM documentation, claim export, and admin dashboards so practices can capture reimbursement and monitor adherence without replacing existing billing systems.
whyWeWin:
  - Unlike Ladder, the company sells software that empowers incumbent practices instead of competing with them for patients; unlike MedBridge, WebPT, Prompt, or HEP2go, it is built around pediatric caregiver activation and Medicaid-first RTM operations.
  - If the first pilots show accepted claims and durable caregiver use, the combination of payer rules, claim-linked engagement data, and pediatric content depth creates higher switching costs than a generic home-program feature.
strategicChoices:
  beachhead: Independent pediatric SLP and OT practices with 3-10 therapists in North Carolina, Massachusetts, and Maryland that carry 60-plus day waitlists, serve Medicaid-heavy families, and have no RTM billing workflow.
  wedgeRationale: Small independent practices create faster proof than health systems because one owner can buy, the workflow is still manual enough to displace, and the first two accepted claims make ROI visible without enterprise integration or credentialing.
  sequencingRationale: Start with manual claim export and pediatric SLP and OT content in three states because reimbursement proof, caregiver adherence, and clinician time savings are the real unknowns; only after those metrics hold should the company invest in deeper EMR integrations, health-system sales, and adjacent rehab segments.
  notYet:
    - Direct-to-consumer therapy delivery or a competing clinician network
    - Full EMR or practice-management replacement
    - National multi-payer rollout before North Carolina, Massachusetts, and Maryland reimbursement is proven
    - Adult outpatient rehab before pediatric claim yield and caregiver retention are repeatable
market:
  tam: Estimated $82.7M beachhead TAM based on office-based SLP and OT therapist seats, a pediatric caseload filter, and roughly $3k annual software ARPU per therapist seat.
  sam: Estimated $12.9M SAM for 3-10 therapist pediatric practices in target expansion states that have not yet automated RTM.
  som: Estimated $1.7M year-three SOM equal to roughly 100 practices at 5.5 therapist seats each.
  segments:
    - Independent pediatric speech-language pathology and occupational therapy practices with 3-10 therapists
    - Regional children's hospitals and health-system outpatient pediatric rehab departments with long new-patient waitlists
  buyingProcess: The likely champion is the practice owner or billing lead who reacts to an RTM coverage update and needs a 90-day pilot that shows new revenue without adding therapist headcount. Production purchase requires owner approval, clinician buy-in, and confidence that claim export works inside the current clearinghouse or rehab EMR workflow.
product:
  mvp: >-
    MVP is a therapist home-program builder, caregiver mobile app, short
    video and activity library, engagement nudges, and a payer checklist plus
    manual claim-export workflow for North Carolina, Massachusetts, and
    Maryland. It must show eligible patients enrolled, caregiver completion,
    and accepted RTM claims in one dashboard before deeper EMR integration is
    attempted.
  sixMonth: Prove 3-5 paid pilots, add pre-bill QA and denial tracking, and support first accepted claims in at least two target states with one-click export into existing billing workflows.
  twelveMonth: Integrate with the two most common early-customer billing or practice systems, launch waitlist-to-first-visit onboarding workflows, and win the first regional health-system outpatient rehab lighthouse account.
  twentyFourMonth: Extend the rules engine and content library into adjacent pediatric PT and feeding workflows, then test adult outpatient PT, OT, and SLP only after pediatric pilots show repeatable annual conversion and acceptable denial rates.
  keyBets:
    - At least two initial states support repeatable pediatric SLP or OT RTM reimbursement once documentation is configured.
    - Caregivers will maintain 2-5 minute routines long enough to create both clinical value and monthly claim yield.
    - Practices will buy a standalone overlay with manual export before demanding deep EMR integration.
    - Horizontal rehab vendors will not match pediatric Medicaid-first billing depth before the startup establishes a rules and content moat.
gtm:
  wedge: Sell a 90-day RTM activation pilot to 4-8 therapist pediatric practices that already have waitlists and some home-program activity, then convert to annual deployment once the practice has 20-50 enrolled patients and its first accepted claims.
  channels:
    - Founder-led outbound to practice owners and billing leads in North Carolina, Massachusetts, and Maryland immediately after CMS or payer RTM updates
    - CE and association education through ASHA, AOTA, APTA, and pediatric therapy billing webinars
    - Referral relationships with clearinghouses, rehab EMR consultants, and children's-hospital outpatient rehab leaders
  funnelTargets: "lead→qualified pilot 20-30%, qualified pilot→paid pilot 35-45%, paid pilot→annual production 50%+, production→multi-site or health-system expansion 25%+ within 12 months"
  pricing: Start with $250 per therapist seat per month plus 3% of verified RTM collections, sold through a 90-day paid pilot and annual conversion; this keeps the fixed fee inside existing software budgets while tying upside to captured reimbursement rather than asking buyers to fund a generic family-engagement app.
businessModel:
  revenueStreams:
    - Therapist-seat subscription for the RTM-enabled home-program workflow
    - Success fee on verified RTM collections processed through the platform
    - Onboarding and integration fees for production deployments
  unitOfValue: RTM-enabled therapist seat
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more therapist seats, sites, and disciplines inside existing customers
    - Expand from independent practices into regional health-system outpatient rehab programs
    - Extend the payer-rules and caregiver-activation layer into adult outpatient PT, OT, and SLP once pediatric proof exists
strategyMap:
  northStarMetric: Percent of enrolled patient-months that both meet caregiver engagement targets and produce an accepted RTM claim
  inputMetrics:
    - Days from signed pilot to first submitted claim
    - RTM-eligible caseload enrollment rate per therapist
    - Week-8 caregiver activity completion rate
    - First-pass claim acceptance rate
    - Paid pilot to annual production conversion rate
    - Additional therapist seats or sites added per customer
  moatsToBuild:
    - Live state-payer RTM rules and denial-resolution library
    - Claim-linked caregiver engagement dataset by age, condition, and routine type
    - Pediatric developmental content graph with progression criteria and caregiver friction tags
    - Integration templates for common rehab billing and EMR workflows
  killCriteria:
    - After 6 paid pilots, fewer than 2 of North Carolina, Massachusetts, and Maryland show pediatric SLP or OT RTM first-pass claim acceptance above 75%
    - Fewer than 40% of enrolled families sustain 3 or more logged activities per week by week 8
    - Paid pilot to annual production conversion remains below 40% after the first 6 pilots
    - First live deployment still takes more than 8 weeks or requires significant custom services in most accounts
  mermaid: |
    flowchart LR
      Wedge[RTM billing wedge] --> MVP[Pediatric home-program MVP]
      MVP --> Proof[Accepted claims and caregiver adherence]
      Proof --> Expansion[Health-system and adjacent rehab expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Low-to-moderate conviction because the waitlist and reimbursement wedge justify a partner meeting, but payer coverage and standalone deployment must prove repeatable quickly.
    whyBelieve: Acute pediatric access pain, buyer willingness to pay for revenue capture, and a visible gap between broad rehab tools and pediatric RTM workflow make this a credible pre-seed wedge.
    whyDoubt: The beachhead market is modest and adjacent rehab platforms can bundle the feature unless the startup proves better claim yield, faster deployment, and a defensible data moat.
    nextDiligence: Confirm with 3-5 pilots that two target states deliver accepted claims, caregivers stay active through week 8, and small practices still convert to $12k-$30k annual contracts.
  firstCustomer:
    title: Owner of a 4-8 therapist pediatric SLP or OT practice
    profile: An independent practice in North Carolina, Massachusetts, or Maryland with 75-plus day new-patient waitlists, Medicaid exposure, manual home programs, and no RTM workflow.
    trigger: A payer bulletin or billing conversation confirms RTM coverage just as the practice struggles with waitlist pressure and unpaid between-session coaching.
    buyer: Practice owner
    initialContract: $3k-$6k 90-day paid pilot plus claim-share, converting to $12k-$30k annual software when 20-50 patients are active and the first accepted claims land.
  mustBeTrue:
    - Two or more target-state payers reliably reimburse pediatric SLP or OT RTM with first-pass acceptance above 75%.
    - A 4-8 therapist practice can enroll 20 or more active patients into the workflow within 90 days without adding material clinician burden.
    - Forty percent or more of enrolled families sustain three or more logged activities per week through week 8.
    - Small practices will buy a standalone claim-export workflow before requiring a full WebPT, Prompt, or clearinghouse integration.
    - Hybrid pricing can sustain $12k-$30k annual contract value before horizontal rehab vendors close the product gap.
  diligenceQuestions:
    - Which North Carolina, Massachusetts, and Maryland Medicaid MCOs and commercial plans actually reimburse pediatric SLP and OT RTM today, and what denial reasons recur?
    - What share of a typical 4-8 therapist practice's active caseload is clinically and operationally eligible for RTM each month?
    - How long does first deployment take when the practice uses manual claim export versus an incumbent rehab EMR workflow?
    - What caregiver completion and message-response rates are required to clear monthly RTM thresholds reliably?
    - Why does MedBridge, WebPT, or a clearinghouse partner not close this gap faster than a startup can build distribution?
operatingAssumptions:
  - assumption: North Carolina, Massachusetts, and Maryland contain enough reimbursing payers to support initial beachhead economics.
    basis: research.yaml
    validationTest: Map coverage for at least 6 named payers and show pediatric SLP or OT first-pass claim acceptance above 75% in 2 of the first 3 pilots.
    decisionImpact: If false, narrow the launch to the one reimbursing state that works or reposition the product around engagement and waitlist reduction rather than billing ROI.
  - assumption: Small practices will adopt a standalone claim-export workflow before demanding deep EMR integration.
    basis: research.yaml
    validationTest: Run 10 discovery calls across manual, WebPT, and Prompt workflows and launch at least 2 paid pilots without a custom integration.
    decisionImpact: If false, integration scope and capital needs move forward, and the company should sell through platform partners instead of direct standalone deployment.
  - assumption: Caregivers will sustain short home routines long enough to generate both therapeutic value and billable monitoring months.
    basis: operator judgment
    validationTest: In the first 50 enrolled families, at least 40% complete 3 or more logged activities per week through week 8.
    decisionImpact: If false, the product needs higher-touch coaching, narrower patient selection, or a different value proposition than reimbursement yield.
  - assumption: The $250 per therapist seat plus 3% claim-share model produces clear ROI for 4-8 therapist practices.
    basis: idea.yaml
    validationTest: In 5 proposals or pilots, net new collected RTM revenue reaches at least 2 times the fixed software fee by month 3.
    decisionImpact: If false, pricing must shift toward lower fixed fees, enterprise contracts, or non-RTM budget lines, which changes ACV and funding needs.
  - assumption: Pediatric billing depth and content specificity can stay ahead of horizontal rehab vendors long enough to build a moat.
    basis: operator judgment
    validationTest: Win 3 of the first 5 competitive evaluations or replacement motions against MedBridge, WebPT, Prompt, or manual workflows.
    decisionImpact: If false, the company should pursue embedding, reseller channels, or a narrower compliance-service layer instead of a broad direct SaaS motion.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 practice owners and billing leads in North Carolina, Massachusetts, and Maryland with documented waitlists.
    hypothesis: RTM reimbursement plus waitlist pressure is a stronger buying trigger than generic caregiver-engagement software.
    successMetric: At least 8 of 15 rank reimbursement capture as a top-two reason to buy and 5 agree to pilot scoping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a target-state RTM coverage matrix with pediatric billing specialists and one clearinghouse partner.
    hypothesis: At least two initial states have workable pediatric SLP and OT reimbursement paths without custom appeals as the default workflow.
    successMetric: Coverage and documentation requirements are mapped for 6 named payers and at least 2 states are judged pilot-ready by billing specialists.
    owner: Billing ops lead
  - horizon: 0–90 days
    experiment: Prototype a manual claim-export workflow using historical home-program data from 2 design partners.
    hypothesis: Billing-ready summaries can be created without adding more than 10 clinician minutes per patient per week.
    successMetric: 20 test patient-months are processed and therapists stay below the time threshold.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch 3 paid pilots with 20-50 patients each using the caregiver app, dashboards, and manual claim export.
    hypothesis: A standalone overlay can go live fast enough to justify a paid 90-day pilot before deep EMR integration exists.
    successMetric: First submitted claim within 45 days in 2 pilots and at least 1 pilot live in each of 2 states.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Compare seat-only pricing versus seat plus success fee across pilot proposals.
    hypothesis: Hybrid pricing aligns ROI better and produces higher accepted ACV.
    successMetric: At least 2 of 3 pilot customers choose the hybrid plan at equal or higher annualized contract value.
    owner: Founder CEO
  - horizon: 180–365 days
    experiment: Optimize caregiver adherence with 2-5 minute routines, therapist nudges, and progress summaries across 50 families.
    hypothesis: Structured short routines can keep at least 40% of families active through week 8.
    successMetric: Week-8 adherence clears the threshold and claimable patient-month yield improves month over month.
    owner: Pediatric clinical lead
  - horizon: 180–365 days
    experiment: Add the first deep integration or channel partnership with a common rehab billing workflow or clearinghouse.
    hypothesis: One strong ecosystem partner cuts deployment time enough to expand beyond founder-led implementations.
    successMetric: Partner-assisted deployments finish in under 4 weeks and 2 qualified pilots originate from the channel.
    owner: Founder CEO
operations:
  - State-payer RTM rules library with pre-bill QA and denial-reason tracking for North Carolina, Massachusetts, and Maryland
  - HIPAA-compliant caregiver messaging, consent, audit logs, and claim-support record retention
  - Clinical review process for pediatric activity content, progression criteria, and caregiver instructions
  - Weekly pilot operating cadence across therapist adoption, caregiver completion, claim status, and waitlist metrics
  - Clearinghouse claim-export and reconciliation workflow before deeper EMR integrations
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Founder-led sales is required because the first sale depends on category education, payer credibility, and fast iteration on the exact buying trigger.
  - role: Founding eng
    startTiming: Month 0
    rationale: The billing engine, caregiver event model, and first export workflow are the core product risks and need direct founding ownership.
  - role: Pediatric clinical lead
    startTiming: Month 2
    rationale: Therapist trust and caregiver adherence depend on a credible content library, progression rules, and safe waitlist-to-home protocols.
  - role: Billing ops lead
    startTiming: Month 3
    rationale: The moat begins with payer configuration, denial analysis, and documentation QA rather than pure software features.
  - role: Full-stack and mobile engineer
    startTiming: Month 4
    rationale: Caregiver experience, therapist workflow speed, and reporting all need product polish once the core reimbursement workflow is validated manually.
  - role: Implementation and customer success lead
    startTiming: Month 6
    rationale: Pilot conversion depends on onboarding discipline, therapist training, and weekly ROI reporting more than on scaled outbound volume.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 3-5 paid pilots with 4-8 therapist pediatric SLP and OT practices in North Carolina, Massachusetts, or Maryland
      - Submit first RTM claims and achieve greater than 75% first-pass acceptance in at least 2 target states
      - Reach 20 or more enrolled patients per live practice and 40% week-8 caregiver adherence
      - Convert at least 2 pilots into annual contracts in the $12k-$30k range
  - horizon: 12–24 months
    items:
      - Integrate with 2 common rehab billing, EMR, or clearinghouse workflows used by early customers
      - Win the first regional health-system or children's-hospital outpatient rehab lighthouse account
      - Expand the rules engine and content library into adjacent pediatric PT or feeding workflows and 5 or more additional states
      - Build reporting that benchmarks denial rates, adherence, and waitlist relief across the installed base
  - horizon: 24–36 months
    items:
      - Expand from single-site practices into multi-site groups and health-system rollouts
      - Test adult outpatient PT, OT, or SLP RTM workflows only after pediatric conversion and denial metrics remain healthy
      - Position the platform as the remote-therapy compliance and caregiver-activation layer across outpatient rehab
      - Demonstrate that payer rules, claim-linked data, and pediatric content remain differentiated against horizontal vendor bundling
risks:
  - risk: Pediatric RTM reimbursement in the target states is narrower or more denial-prone than early diligence suggests.
    likelihood: High
    impact: High
    mitigation: Launch state by state, keep a fixed seat-fee floor, and use pre-bill QA plus denial tracking before broadening the GTM motion.
  - risk: Caregiver engagement drops after 4-6 weeks and collapses both clinical value and claim yield.
    likelihood: High
    impact: High
    mitigation: Start with 2-5 minute routines, therapist-triggered nudges, and progress summaries, then narrow enrollment criteria if adherence remains weak.
  - risk: Integration and workflow complexity extend deployment beyond a practical 90-day pilot.
    likelihood: Medium
    impact: High
    mitigation: Keep the first product limited to manual export, documented onboarding playbooks, and only the highest-frequency billing workflows before building deep integrations.
  - risk: Horizontal rehab platforms bundle enough pediatric RTM capability that a standalone budget disappears.
    likelihood: Medium
    impact: High
    mitigation: Own the pediatric Medicaid-first rules layer, prove faster accepted-claim yield, and build channel relationships before incumbents prioritize the niche.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway funds the billing and caregiver product, pediatric content and reimbursement operations, 3-5 paid pilots in North Carolina, Massachusetts, and Maryland, and proof that accepted RTM claims plus caregiver adherence convert into repeatable annual contracts before broader rehab expansion.
