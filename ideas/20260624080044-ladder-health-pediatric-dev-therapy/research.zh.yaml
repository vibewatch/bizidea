      - 39
      - 41
      - 43
      - 44
  pestle:
  - factor: 政策
    impact: negative
    point: Medicaid 资金和儿科劳动力政策直接决定候诊时间和买家紧迫性。
    sourceRefs:
    - 20
    - 25
  - factor: 经济
    impact: positive
    point: 门诊治疗支付压力使增量可报销工作更具吸引力——只要软件能在不新增全职员工的情况下完成获取。
    sourceRefs:
    - 9
    - 11
    - 12
  - factor: 社会
    impact: positive
    point: 家庭希望在等待发育服务的漫长时间里获得更早的干预和灵活的居家支持。
    sourceRefs:
    - 20
    - 22
    - 23
    - 24
    - 35
  - factor: 技术
    impact: positive
    point: RTM、HEP、消息通讯和分析基础设施已足够成熟，挑战在于工作流设计，而非技术可行性本身。
    sourceRefs:
    - 39
    - 40
    - 41
    - 43
    - 44
  - factor: 法律
    impact: negative
    point: RTM 计费仍依赖修饰符、护理计划背景和州远程医疗合规细节，申请被拒风险依然存在。
    sourceRefs:
    - 1
    - 3
    - 5
    - 15
    - 16
    - 47
    - 48
  - factor: 环境
    impact: neutral
    point: 居家交付可减轻农村或繁忙家庭的出行负担，但数字接入条件和照护者带宽仍限制着普及率。
    sourceRefs:
    - 18
    - 26
    - 35
  adoptionFrictionMatrix:
  - friction: 付款方覆盖的确定性和申请被拒风险
    severity: high
    affectedBuyer: 诊所负责人或计费负责人
    mitigation: 从第一天起就构建州付款方规则引擎，内置预计费 QA 和拒付 / 申诉工作流。
    sourceRefs:
    - 15
    - 16
    - 47
    - 48
  - friction: 入组后照护者参与度衰减
    severity: high
    affectedBuyer: 临床主任
    mitigation: 将训练计划设计为 2–5 分钟时长，配有提醒和辅导式入组，融入家庭日常作息。
    sourceRefs:
    - 25
    - 26
    - 40
    - 43
  - friction: 与现有 EMR 或清算中心工作流集成
    severity: medium
    affectedBuyer: 诊所管理员
    mitigation: 先以申请导出和轻量级数据同步上线，待深度 API 集成就绪前不强求。
    sourceRefs:
    - 41
    - 43
  - friction: 临床医生对额外记录的抵触
    severity: medium
    affectedBuyer: 治疗师兼负责人
    mitigation: 在 HEP 工作流内自动生成日志和计费就绪摘要，而非要求使用第二套系统。
    sourceRefs:
    - 5
    - 7
    - 39
market:
  tam:
