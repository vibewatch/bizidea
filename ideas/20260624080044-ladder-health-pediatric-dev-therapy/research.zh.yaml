      ((187,400 SLP 岗位 × 26% 诊室执业) + (160,000 OT 岗位 × 27% 诊室执业)) × 30% 儿科相关案例过滤 × $3,000 年度席位 ARPU ≈ $82.7M；自上而下的言语治疗服务报告 ($49 亿–$57 亿规模) 表明所建模的软件渗透率仍属保守。
    isEstimate: true
