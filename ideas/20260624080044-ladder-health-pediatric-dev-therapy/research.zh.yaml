  - point: 州和付款方执行仍不统一，在显式 Medicaid RPM 和远程医疗规则制定之外尤为如此。
    sourceRefs:
    - 15
    - 16
    - 47
    - 48
  - point: 自上而下的言语治疗市场报告中成人仍是最大细分，限制了纯儿科切口的规模天花板。
    sourceRefs:
    - 34
  - point: 照护者依从性很脆弱——若训练计划和支持设计不佳，参与度会迅速崩塌。
    sourceRefs:
    - 25
    - 26
    - 42
    - 43
competitors:
- name: Ladder Health
  stage: 成长期
  pricing: 保险覆盖；接受 Medicaid。
  wedge: 以护理网络形式交付照护者激活的虚拟儿科发育治疗。
  strength: 强有力的需求验证、快速可及的定位，以及在马萨诸塞州、北卡罗来纳州和马里兰州已有的提供商和医疗系统分发渠道。
  weaknessVsUs: 其交付模式与在位机构竞争，而非向其出售可复用的 RTM 计费工作流。
  sourceRefs:
  - 35
  - 36
  - 37
  - 38
- name: Medbridge
  stage: 在位厂商
  pricing:
  wedge: 将 RTM 集成进面向康复提供商的广域数字 HEP 和引导路径平台。
  strength: 已在受信任的康复平台内将居家训练计划、参与追踪和计费支持合而为一。
  weaknessVsUs: 广域康复定位为更专注儿科、照护者和 Medicaid 优先工作流留有空间。
  sourceRefs:
  - 39
  - 40
- name: WebPT
  stage: 在位厂商
  pricing:
  wedge: 横向康复 EMR、患者门户、计费和 HEP 平台。
  strength: 掌控核心康复工作流，可将 HEP 和收入工具捆绑进现有记录系统。
  weaknessVsUs: 没有明显围绕儿科发育治疗或照护者驱动的 RTM 报销进行定位。
  sourceRefs:
  - 41
  - 42
- name: Prompt
  stage: 成长期
  pricing:
  wedge: 涵盖计费、排班和分析的一体化康复机构操作系统。
  strength: 运营故事有力，一方数据显示收入提升和护理计划依从性改善。
  weaknessVsUs: 横向康复聚焦意味着目前没有可见的儿科发育内容或 RTM 专项信息。
  sourceRefs:
  - 43
- name: HEP2go
  stage: 细分赛道在位厂商
  pricing: 提供免费会员。
  wedge: 面向康复临床医生的免费轻量级居家练习计划创建工具。
  strength: 操作简便，治疗师熟悉，只需创建和打印 HEP 即可。
  weaknessVsUs: 缺乏申请级 RTM 监控、照护者工作流和报销逻辑。
  sourceRefs:
  - 44
regulatoryTechnicalConstraints:
- point: >-
    治疗 RTM 需要专科编码、护理计划背景和阈值 / 修饰符管理；CMS 为 2026 年新增了有时属于治疗的 RTM 代码，而非将技术栈简化。
  sourceRefs:
  - 1
  - 2
  - 3
  - 5
  - 11
- point: >-
    州 Medicaid 和远程医疗政策尚未统一；马里兰州发布了明确的远程医疗和 RPM 规则， 而北卡罗来纳州和 MassHealth 仍需手工查询费率表和手册。
  sourceRefs:
  - 15
  - 16
  - 47
  - 48
- point: >-
    平台必须在临床可接受的工作流内采集可审计的家庭活动和照护者数据，否则报销和治疗师信任都会崩塌。
  sourceRefs:
  - 2
  - 5
  - 39
  - 41
  - 43
