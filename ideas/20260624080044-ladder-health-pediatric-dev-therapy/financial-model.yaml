scenarios:
  downside:
    description: Payer proof comes slower, pilots stay closer to seat-only pricing, and manual denial work keeps the business more services-heavy.
    y3RevenueK: 643.1
    y3EbitdaK: -985.8
    cashLowPointK: -89.6
    keyAssumptionChanges:
    - Y3 exits with 48 live practices instead of 68 because accepted-claim proof and pilot conversion both slip.
    - Blended annual ARPU falls from $23K to $21K as customers buy fewer seats and less expansion scope.
    - Gross margin stays at 68% because claim QA and support remain more manual than planned.
  base:
    description: Two-state reimbursement proof, one early health-system lighthouse, and channel referrals turn the first pediatric wedge into repeatable but still lean growth.
    y3RevenueK: 983.3
    y3EbitdaK: -734.7
    cashLowPointK: 237.0
    keyAssumptionChanges:
    - Customer counts follow A8 to A10, reaching 20 live practices by Y2 exit and 68 by Y3 exit.
    - Blended annual ARPU stays at $23K while gross margin stays at the 70% business-plan target.
    - The team stays lean at 8 exit FTE, with the first seller arriving in Y2 and the first integration specialist arriving late in Y3.
  upside:
    description: Accepted claims land quickly in two states, lighthouse references travel well, and channel partners pull new accounts forward without a big field team.
    y3RevenueK: 1400.1
    y3EbitdaK: -414.9
    cashLowPointK: 648.5
    keyAssumptionChanges:
    - Y3 exits with 90 live practices instead of 68 as association and clearinghouse channels compound after early proof.
    - Blended annual ARPU rises from $23K to $25K as multi-site and higher-seat accounts enter the mix earlier.
    - Gross margin improves to 72% because integrations, denial playbooks, and onboarding templates reduce manual work.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual ARPU falls to $21K because accounts stay near seat-only pricing and expansion is limited.
  baseCase: Blended annual ARPU stays at $23K as modeled.
  upsideCase: Blended annual ARPU reaches $25K with more multi-site and higher-seat deployments.
  y3RevenueImpactK: -85.5
  cashImpactK: -80.1
- variable: CAC
  downsideCase: Fully loaded CAC rises to $15K when pilots require more travel, education, and hand-holding.
  baseCase: Fully loaded CAC stays near $11.9K through founder-led outbound plus partner referrals.
  upsideCase: CAC falls to $9.5K once association and clearinghouse referrals become repeatable.
  y3RevenueImpactK: 0.0
  cashImpactK: -195.0
- variable: churn
  downsideCase: Monthly churn behaves closer to 3.0% as weaker caregiver adherence and denial frustration slow renewals.
  baseCase: Monthly churn is 2.5% in the unit-economics base case.
  upsideCase: Monthly churn trends toward 2.0% once claim yield and therapist workflow both feel embedded.
  y3RevenueImpactK: -115.0
  cashImpactK: -92.4
- variable: sales cycle
  downsideCase: Pilot-to-production conversion slips by roughly one quarter because owners wait for accepted claims before annualizing.
  baseCase: The model assumes a 90-day paid pilot and then reasonably prompt annual conversion once proof is visible.
  upsideCase: Reference accounts compress conversion by about one quarter.
  y3RevenueImpactK: -155.3
  cashImpactK: -159.7
- variable: gross margin
  downsideCase: Gross margin stays at 68% because denial-resolution and onboarding stay labor-intensive.
  baseCase: Gross margin holds at 70% as modeled.
  upsideCase: Gross margin reaches 72% as claim QA and integrations standardize.
  y3RevenueImpactK: 0.0
  cashImpactK: -26.3
- variable: hiring pace
  downsideCase: The integration hire is pulled forward and an extra ops layer is added before revenue scale is proven.
  baseCase: The team stays lean and only reaches 8 exit FTE by Q4Y3.
  upsideCase: The integration hire is delayed until after the seed round because manual workflows still carry the load.
  y3RevenueImpactK: 0.0
  cashImpactK: -113.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder outbound and CE demand] --> Pilots[Paid pilots]
      Pilots --> LivePractices[Live paid practices]
      LivePractices --> Revenue[Subscription and onboarding revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Opex[Payroll and operating spend]
      Opex --> Cash[Ending cash]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing live paid practices from 5 at Y1 exit to 68 at Y3 exit at roughly $23K blended annual ARPU.
- checkName: Must go right
  finding: Two states must show repeatable accepted claims quickly enough that 90-day pilots convert and channel referrals can add double-digit net customers in Y3.
- checkName: Model breaks if
  finding: If ARPU falls toward seat-only pricing or the sales cycle slips by a quarter, cash turns negative before the company finishes Y3.
- checkName: Next-round proof
  finding: The seed case is strongest once the company reaches about 30 live practices, one repeatable billing integration, a lighthouse account, and durable claim plus adherence proof.
sanityChecks:
  ruleOf40: Y3 growth 253% + EBITDA margin -75% = 178% (inflated by the small Y2 base).
  burnMultiple: Y3 burn multiple 1.0x = $734.7K burn divided by $704.4K net new revenue.
  revenuePerFte: $123K Y3 on 8 exit FTE (below the roughly $200–400K vertical SaaS benchmark).
  flags:
  - Base-case Y3 ending cash is only about $237K, so seed fundraising needs to start no later than Q2Y3 even if operating metrics stay on plan.
  - Revenue per exit FTE remains well below mature SaaS benchmarks because the model still carries clinical, billing, and manual workflow overhead ahead of full automation.
  - The Y3 ramp to 68 live practices depends on association, clearinghouse, and lighthouse-account referrals working; founder-only outbound would likely undershoot this path.
  - The $23K ARPU assumption requires some onboarding and multi-site uplift above the pure seat fee, so weak expansion behavior would tighten cash quickly.
