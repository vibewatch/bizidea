problem: >-
  Over 27 million US children aged 0-6 are in the critical developmental window, with one in
  four at risk for a delay or disability, yet the average wait for pediatric specialty therapy
  is six months. Existing therapy practices cannot scale clinical capacity fast enough because
  they hire and schedule per clinician-hour, and family demand far outpaces supply.
  Caregivers are undertrained and underutilized as therapeutic partners, leaving daily
  developmental activity hours on the table between weekly clinical sessions.
  The result is compounding developmental loss during the exact months when early
  intervention has the highest measurable impact.
targetUser:
  primary: Clinical director or practice administrator at an independent pediatric speech-language pathology or occupational therapy practice with 3-10 therapists
  secondary: Pediatric therapy department head at a regional health system outpatient clinic with a documented 60-90 day new patient waitlist
  buyer: Practice owner or VP of Ambulatory Services at a health system with pediatric outpatient therapy programs
startupThesis:
  nonObviousInsight: >-
    CMS Remote Therapeutic Monitoring codes (CPT 98975-98977), finalized in 2023, let
    licensed therapy practices bill for clinician-supervised caregiver-delivered home
    activity programs—but fewer than 3% of pediatric practices have operationalized RTM
    because no purpose-built workflow exists to build, deliver, and automatically log the
    billable events. Practices are sitting on a new recurring revenue stream ($40-80 per
    patient per month) they already qualify for but cannot capture without software,
    while simultaneously increasing therapeutic dose for families who would otherwise wait
    six months for their first session.
  beachhead: >-
    Independent pediatric speech-language pathology and occupational therapy practices
    with 3-10 therapists in Medicaid-expansion states that have 60-plus day new patient
    waitlists and no existing RTM billing workflow
  wedge: >-
    A therapist-facing home program builder that generates structured caregiver activity
    cards with video guides and progression criteria, delivers them to families via mobile
    app, and automatically creates billable RTM events from caregiver logins and completion
    logs—turning unpaid between-session coaching into a recurring monthly revenue line
  whyNowCatalyst: >-
    Ladder Health's oversubscribed $7M seed backed by 10 investors and 80-plus health
    system partnerships proves that institutional buyers are now actively procuring
    caregiver-activation infrastructure, creating the market awareness and willingness
    to pay that makes the RTM billing wedge actionable for independent practices today.
  ventureScalePath: >-
    Start with pediatric SLP and OT practices on the RTM billing wedge, then expand to
    adult outpatient physical and occupational therapy, integrate with payer value-based
    care contracts to become the remote monitoring compliance layer, and ultimately build
    the operating system for all outpatient therapy that touches caregiver or patient
    home-based care delivery across a $35B addressable market.
solution: >-
  The platform gives pediatric therapists a library of evidence-based home activity
  templates for developmental milestones in speech, motor, and feeding which they
  customize per child and prescription. Caregivers receive a mobile app with short video
  guides, weekly activity schedules, and one-tap completion logging. The platform backend
  automatically generates RTM billing events whenever caregivers meet the threshold
  activity logs required for CPT 98977 reimbursement, submits claims through the
  practice's existing clearinghouse integration, and dashboards therapist caseloads by
  engagement rate. Practices gain $40-80 per active patient per month in new incremental
  revenue while families receive 5-10x more therapeutic dose per week—reducing waitlist
  pressure without adding a single therapist seat.
goToMarketSeed:
  firstCustomer: >-
    Independent pediatric SLP or OT practice in North Carolina, Massachusetts, or Maryland
    with 4-8 therapists, a documented 75-plus day new patient waitlist, and a practice
    owner who has received a payer bulletin about RTM coverage but has not yet billed
    a single RTM claim
  buyingTrigger: >-
    State Medicaid managed care organization issues a provider update confirming RTM code
    reimbursement, creating a concrete revenue opportunity the practice cannot operationalize
    without purpose-built software
  currentAlternative: >-
    Manually designed PDF home programs emailed to families after sessions, with generic
    care management platforms such as TheraNest or OptimisPT that have no RTM billing
    workflow, or simply no structured between-session home program at all
  switchingReason: >-
    The platform converts a currently un-billed activity—between-session caregiver
    coaching—into $40-80 per patient per month in new net revenue, effectively paying
    for itself within the first two active patients, while reducing the administrative
    burden on therapists who currently create home programs manually
  pricingHypothesis: >-
    $250 per month per therapist seat covering unlimited home programs and caregiver app
    access, plus a 3% success fee on RTM claims verified through the platform; a four-
    therapist practice billing RTM for 30 active patients at $60 per month each nets
    $1,800 per month in new revenue against $1,000 per month in software cost
