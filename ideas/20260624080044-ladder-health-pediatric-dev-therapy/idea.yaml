differentiator: >-
  Unlike Ladder Health (a competing therapy network that employs clinicians) or generic
  telehealth platforms, this product sells B2B software to existing therapy practices
  and monetizes through a billing unlock they already qualify for but cannot operationalize.
  The RTM billing engine creates a revenue-sharing alignment with practices that incumbents
  like TheraNest or WebPT do not offer—the software pays for itself through incremental
  reimbursement rather than displacing existing clinical workflows. No incumbent practice
  management vendor has built a purpose-built RTM workflow for pediatric therapy; the wedge
  is a narrow, defensible billing infrastructure layer that locks in the practice's revenue
  capture process and creates compounding switching costs as caregiver content libraries grow.
