jobsToBeDone:
  - job: >-
      When a practice has a 75-day new patient waitlist and cannot hire additional therapists
      fast enough, help the practice administrator extend therapeutic capacity across the
      existing caseload, so they can serve more families and reduce average wait time without
      adding a therapist FTE.
    currentAlternative: Hiring additional therapists at $80K or more per year, or simply maintaining the waitlist and losing families to competitors
    successMetric: New patient wait time reduced below 30 days without adding a therapist FTE within 6 months of go-live
  - job: >-
      When a pediatric therapist provides verbal home program guidance but has no way to
      deliver structured activities, track caregiver completion, or bill for the intervention,
      help the practice owner operationalize RTM billing workflows, so they can capture
      incremental reimbursement and improve between-session therapeutic dose simultaneously.
    currentAlternative: Manually created PDF home programs emailed to families with no tracking or billing capability
    successMetric: At least 30% of active patients enrolled in RTM-billable home programs within 90 days of go-live
  - job: >-
      When a child is on a six-month waitlist and their critical developmental window is
      narrowing, help the therapist deliver structured caregiver activity programs before
      the first scheduled session, so the family can begin developmental work immediately
      and reduce skill-gap progression during the wait.
    currentAlternative: Sending a one-page tip sheet at intake or directing families to generic online videos with no clinical guidance
    successMetric: Families on the waitlist complete 3 or more structured caregiver activities per week before their first in-session appointment
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      Ladder Health's oversubscribed seed with 10 institutional investors and 80-plus health
      system partnerships provides high-confidence validation that the pediatric therapy
      capacity crisis is a real, funded problem and that caregiver-activation is the
      recognized solution vector driving institutional procurement decisions.
  painIntensity:
    score: 5
    rationale: >-
      Six-month average wait time for a critical developmental window where delays compound
      without early intervention is an extremely high-pain scenario for families, health
      system administrators, and payers facing regulatory and public pressure to improve
      pediatric developmental outcomes.
  wedgeClarity:
    score: 4
    rationale: >-
      The RTM billing unlock is a concrete, narrow, and time-sensitive wedge—practices have
      a new revenue source they cannot access without this software, creating strong ROI
      justification without requiring a clinical workflow overhaul. The limitation is that
      RTM billing complexity varies by payer and state, requiring ongoing compliance work.
  defensibility:
    score: 3
    rationale: >-
      First-mover advantage in pediatric RTM billing infrastructure creates switching costs
      through payer integrations and clinical content library investment; however, large
      practice management vendors could add RTM features once the market is proven, so the
      moat must be extended through network effects across health systems and content depth.
  ventureScale:
    score: 4
    rationale: >-
      US outpatient therapy (pediatric plus adult) exceeds $35B annually; RTM adoption in
      adult PT, OT, and SLP represents a multi-billion expansion path, and a successful
      pediatric beachhead creates a defensible platform for the broader outpatient
      caregiver-activation and remote monitoring market.
topRisks:
  - name: RTM Reimbursement Policy Risk
    description: >-
      CMS or state Medicaid programs could restrict RTM eligibility, reduce reimbursement
      rates, or exclude pediatric therapy in future fee schedule updates, eliminating the
      primary billing wedge and the ROI case for adoption.
    mitigation: >-
      Build a diversified revenue model from day one—SaaS seat fees independent of RTM
      billing success—so the platform's value proposition rests on therapeutic dose
      improvement and waitlist reduction even if RTM reimbursement shrinks or is restructured.
  - name: EHR Integration Barrier
    description: >-
      Pediatric therapy practices use fragmented, low-API-access practice management systems
      such as TheraNest, OptimisPT, and TherapyBrands that lack standardized integration
      points, making automated RTM claim submission technically complex and expensive to scale.
    mitigation: >-
      Launch with a manual claim-export workflow (CSV upload to existing clearinghouse) to
      prove revenue impact before investing in deep EHR integrations; use initial revenue
      traction to fund API partnerships with the two or three dominant practice management vendors.
  - name: Caregiver Engagement Attrition
    description: >-
      Without sustained engagement features, caregivers stop completing home activity logs
      within 4-6 weeks of onboarding, collapsing both the therapeutic value proposition and
      the RTM billing stream that justifies the software cost to the practice.
    mitigation: >-
      Embed therapist-triggered engagement nudges, milestone celebration notifications, and
      bi-weekly progress reports for caregivers; design the activity library with 2-5 minute
      sessions that fit into a parent's daily routine rather than dedicated therapy homework blocks.
