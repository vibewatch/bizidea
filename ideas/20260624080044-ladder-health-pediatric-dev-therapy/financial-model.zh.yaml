scenarios:
  downside:
    description: 付款方验证进展偏慢，试点定价更接近纯席位费，手工拒付处理让业务更偏向服务型。
    y3RevenueK: 643.1
    y3EbitdaK: -985.8
    cashLowPointK: -89.6
    keyAssumptionChanges:
    - 第三年末上线 48 家机构而非 68 家，因为已获批申请验证和试点转化均有所推迟。
    - 混合年化 ARPU 从 $23K 降至 $21K，因为客户购买的席位较少、扩展范围有限。
    - 毛利率维持在 68%，因为申请 QA 和支持仍比计划更依赖手工。
  base:
    description: 两州报销验证、一个早期医疗系统标杆，加上渠道转介，将首个儿科切口转化为可重复但仍较精简的增长。
    y3RevenueK: 983.3
    y3EbitdaK: -734.7
    cashLowPointK: 237.0
    keyAssumptionChanges:
    - 客户数量按 A8 至 A10 推进，第二年末达到 20 家上线机构，第三年末达到 68 家。
    - 混合年化 ARPU 维持 $23K，毛利率维持在商业计划目标的 70%。
    - 团队保持精简，第三年末 8 名全职，首位销售人员在第二年加入，首位集成专家在第三年末加入。
  upside:
    description: 已获批申请在两个州快速落地，标杆推荐传播顺畅，渠道合作伙伴在不需要大规模现场团队的情况下推动新账户提前到来。
    y3RevenueK: 1400.1
    y3EbitdaK: -414.9
    cashLowPointK: 648.5
    keyAssumptionChanges:
    - 第三年末上线 90 家机构而非 68 家，因为早期验证后协会和清算中心渠道复合增长。
    - 混合年化 ARPU 从 $23K 升至 $25K，多站点和高席位账户更早进入组合。
    - 毛利率提升至 72%，因为集成、拒付手册和入驻模板减少了手工工作。
sensitivity:
- variable: ARPU
  downsideCase: 混合年化 ARPU 降至 $21K，因账户停留在纯席位定价、扩展受限。
  baseCase: 混合年化 ARPU 如建模维持 $23K。
  upsideCase: 混合年化 ARPU 随更多多站点和高席位部署达到 $25K。
  y3RevenueImpactK: -85.5
  cashImpactK: -80.1
- variable: CAC
  downsideCase: 当试点需要更多差旅、教育和扶持时，全载 CAC 升至 $15K。
  baseCase: 通过创始人主导外呼加合作伙伴转介，全载 CAC 维持在约 $11.9K。
  upsideCase: 协会和清算中心转介变得可重复后，CAC 降至 $9.5K。
  y3RevenueImpactK: 0.0
  cashImpactK: -195.0
- variable: churn
  downsideCase: 照护者依从性较弱和拒付挫败感拖慢续约时，月度流失率接近 3.0%。
  baseCase: 单位经济模型基础情景下月度流失率为 2.5%。
  upsideCase: 申请产出和治疗师工作流均感觉嵌入后，月度流失率趋向 2.0%。
  y3RevenueImpactK: -115.0
  cashImpactK: -92.4
- variable: sales cycle
  downsideCase: 试点到正式合同转化约推迟一个季度，因负责人等待已获批申请再做决定。
  baseCase: 模型假设 90 天付费试点，验证到位后相对及时完成年度转化。
  upsideCase: 参考账户将转化缩短约一个季度。
  y3RevenueImpactK: -155.3
  cashImpactK: -159.7
- variable: gross margin
  downsideCase: 拒付解决和入驻仍劳动密集，毛利率维持在 68%。
  baseCase: 毛利率如建模维持在 70%。
  upsideCase: 申请 QA 和集成标准化后，毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -26.3
- variable: hiring pace
  downsideCase: 集成工程师提前入职，收入规模验证前增加额外运营层。
  baseCase: 团队保持精简，Q4Y3 末仅达到 8 名全职。
  upsideCase: 手工工作流仍能承载负荷，集成工程师延迟到种子轮之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -113.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Founder outbound and CE demand] --> Pilots[Paid pilots]
      Pilots --> LivePractices[Live paid practices]
      LivePractices --> Revenue[Subscription and onboarding revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Opex[Payroll and operating spend]
      Opex --> Cash[Ending cash]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自上线付费机构从第一年末 5 家增长至第三年末 68 家，混合年化 ARPU 约 $23K。
- checkName: 必须成立的假设
  finding: 两个州必须足够快地展示出可重复的已获批申请，使 90 天试点完成转化，渠道转介在第三年能带来两位数净新增客户。
- checkName: 模型失效条件
  finding: 若 ARPU 下滑至纯席位定价，或销售周期推迟一个季度，现金在公司完成第三年之前就会转负。
- checkName: 下一轮融资证明
  finding: 种子轮最强的支撑点是约 30 家上线机构、一个可重复计费集成、一个标杆账户，以及持久的申请和依从性证明。
sanityChecks:
  ruleOf40: 第三年增长率 253% + EBITDA 利润率 -75% = 178%（受第二年小基数放大）。
  burnMultiple: 第三年消耗倍数 1.0x = $73.47 万消耗 / $70.44 万净新增收入。
  revenuePerFte: 第三年 8 名全职员工，人均收入 $123K（低于约 $20–40 万的垂直 SaaS 基准）。
  flags:
  - 基础情景第三年末现金仅约 $237K，即便运营指标保持在计划内，种子轮融资也必须在第三年第二季度前启动。
  - 人均收入远低于成熟 SaaS 基准，因模型仍在全面自动化之前承担临床、计费和手工工作流开销。
  - 第三年扩展至 68 家上线机构，依赖协会、清算中心和标杆账户转介发挥作用；仅靠创始人外呼很可能低于这一路径。
  - $23K ARPU 假设包含一定的入驻和多站点溢价，若扩展行为偏弱，现金将迅速收紧。
