slug: pediatric-rtm-home-therapy
date: '2026-06-24'
executiveSummary: >-
  儿科 RTM 居家治疗是面向独立儿科言语语言病理（SLP）和职业治疗（OT）机构的计费与照护者激活操作系统——这些机构面临 60 天以上的候诊积压，招不到足够的治疗师。首批目标客户是北卡罗来纳州、 马萨诸塞州或马里兰州拥有 4–8 名治疗师的机构，其负责人见过 RTM 报销指引，却一份申请都没提交过。 痛点是双向的：家庭在漫长等待中损失发育时机，而机构承担着无偿的疗程间照护指导，每位患者每月有 40–80 美元的报销收入未被获取。MVP 将治疗师编写的居家训练计划转化为短时照护者例程，通过移动应用记录完成情况，并在不要求机构替换 EMR 或清算中心的前提下导出计费就绪的 RTM 事件。 这是一个窄口滩头，但其切入速度比销售通用远程治疗或家庭互动工具快——因为购买触发点、ROI 数学和首个证明节点都集中在同一个工作流里。研究支持急迫需求、现有数字居家训练预算的存在，以及广域康复软件与儿科照护者激活计费之间真实的市场空白；同时也表明付款方执行因州而异，照护者依从性可能快速衰减。因此公司应先在三个目标州以手工申请导出方式赢得第一批客户，再追加深度集成， 之后才拓展医疗系统账户、相邻儿科专科和成人门诊康复。最大的否证风险是目标州的儿科 SLP 和 OT RTM 报销证明过窄或拒付率过高——届时公司应将价值主张重心从计费产出转向照护者参与和候诊缩短。
problem:
- 拥有 3–10 名儿科治疗师的机构面临 60 天至半年的候诊积压和人力短缺，每新增一个家庭，可及性压力的增速都超过了容量或收入的增速。
- 大多数居家训练计划以 PDF 或口头辅导的形式存在，没有任何申请级追踪，机构因此错失 RTM 报销，照护者获得的疗程间指导也参差不齐。
solution:
- 给治疗师一套儿科训练计划构建器和照护者应用，将候诊或活跃患者转化为结构化的 2–5 分钟居家例程，附带清晰的进阶标准。
- 将照护者活动转化为感知州差异的 RTM 文档、申请导出和管理看板，让机构在不替换现有计费系统的前提下获取报销收入、监控依从性。
whyWeWin:
- 与 Ladder 不同，公司出售赋能在位机构的软件，而非与其争夺患者；与 MedBridge、WebPT、Prompt 或 HEP2go 不同，产品围绕儿科照护者激活和 Medicaid 优先 RTM 操作而建。
- 若首批试点展示出已获批的申请和持久的照护者使用，付款方规则、申请挂钩的参与数据与儿科内容深度的组合将形成比通用居家训练功能更高的转换成本。
strategicChoices:
  beachhead: 北卡罗来纳州、马萨诸塞州和马里兰州拥有 3–10 名治疗师、候诊积压超 60 天、服务 Medicaid 家庭为主、没有 RTM 计费流程的独立儿科 SLP 和 OT 机构。
  wedgeRationale: 小型独立机构比医疗系统更快产生证明——一位负责人可以拍板，工作流手工程度足以替换，而且前两份获批申请就能让 ROI 看得见，无需企业级集成或资质认证。
  sequencingRationale: 先在三个州以手工申请导出和儿科 SLP/OT 内容起步，因为报销验证、照护者依从性和临床节省时间是真正的未知变量；只有当这些指标站稳脚跟，才投入更深的 EMR 集成、医疗系统销售和相邻康复细分。
  notYet:
  - 直接面向消费者的治疗交付，或建立竞争性临床医生网络
  - 全面的 EMR 或诊所管理替换
  - 在北卡罗来纳州、马萨诸塞州和马里兰州报销尚未验证前的全国多付款方铺开
  - 在儿科申请产出和照护者留存可重复之前拓展成人门诊康复
market:
  tam: 基于诊室执业 SLP 和 OT 治疗师席位、儿科案例过滤和每治疗师席位约 $3k 年度软件 ARPU，估算滩头 TAM 为 $82.7M。
  sam: 估算 SAM 为 $12.9M，对应目标扩张州内拥有 3–10 名治疗师、尚未自动化 RTM 的儿科机构。
  som: 估算第三年 SOM 为 $1.7M，相当于约 100 家机构每家平均 5.5 个治疗师席位。
  segments:
  - 拥有 3–10 名治疗师的独立儿科言语语言病理和职业治疗机构
  - 拥有较长新患者候诊积压的区域儿童医院和医疗系统门诊儿科康复科室
  buyingProcess: 可能的推动者是诊所负责人或计费负责人——他们在收到 RTM 覆盖更新后做出反应，需要一个 90 天试点来展示在不增加治疗师人手的情况下带来的新收入。正式采购需要负责人批准、临床医生认可，以及申请导出在现有清算中心或康复 EMR 工作流中可正常运转的信心。
product:
  mvp: >-
    MVP 是面向北卡罗来纳州、马萨诸塞州和马里兰州的治疗师居家训练计划构建器、照护者移动应用、短视频和活动库、参与提醒，以及付款方核查清单和手工申请导出工作流。在尝试更深 EMR 集成之前，必须在一个看板里展示符合条件的已入组患者、照护者完成情况和已获批 RTM 申请。
  sixMonth: 完成 3–5 个付费试点，增加预计费 QA 和拒付追踪，并在至少两个目标州支持首批已获批申请，通过一键导出接入现有计费工作流。
  twelveMonth: 与前两批早期客户最常用的计费或诊所系统集成，上线候诊到首诊入组工作流，并赢得第一个区域医疗系统门诊康复标杆账户。
  twentyFourMonth: 将规则引擎和内容库扩展到相邻儿科 PT 和喂养工作流，然后仅在儿科试点展示出可重复年度转化和可接受拒付率后，才测试成人门诊 PT、OT 和 SLP。
  keyBets:
  - 至少两个初始州在文档配置到位后，支持可重复的儿科 SLP 或 OT RTM 报销。
  - 照护者能维持 2–5 分钟的例程足够长，同时创造临床价值和月度申请产出。
  - 机构会在要求深度 EMR 集成之前购买带手工导出的独立覆盖层。
  - 横向康复厂商不会在初创公司建立起规则和内容护城河前，率先匹配儿科 Medicaid 优先计费深度。
gtm:
  wedge: 向已有候诊积压和部分居家训练活动的 4–8 名治疗师儿科机构销售 90 天 RTM 激活试点，当机构有 20–50 名已入组患者和首批已获批申请时，转化为年度部署。
  channels:
  - CMS 或付款方 RTM 更新发布后，创始人主导向北卡罗来纳州、马萨诸塞州和马里兰州诊所负责人和计费负责人发起外呼
  - 通过 ASHA、AOTA、APTA 和儿科治疗计费网络研讨会开展继续教育和协会教育
  - 与清算中心、康复 EMR 顾问和儿童医院门诊康复负责人建立转介关系
  funnelTargets: "潜在客户→合格试点 20–30%，合格试点→付费试点 35–45%，付费试点→年度合同 50% 以上，年度合同→多站点或医疗系统扩展 25% 以上（12 个月内）"
  pricing: 起步定价为每位治疗师席位每月 $250，另收平台验证 RTM 收款的 3% 成效费，通过 90 天付费试点转化为年度合同；固定费用契合现有软件预算，成效费将收益与实际报销挂钩，而非要求买方为通用家庭互动应用埋单。
businessModel:
  revenueStreams:
  - RTM 赋能居家训练工作流的治疗师席位订阅费
  - 平台处理的验证 RTM 收款成效费
  - 正式部署的入驻和集成费用
  unitOfValue: RTM 赋能治疗师席位
  targetGrossMarginPct: 70
  expansionLevers:
  - 在现有客户内增加治疗师席位、站点和专科
  - 从独立机构向区域医疗系统门诊康复项目扩展
  - 在儿科验证完成后，将付款方规则和照护者激活层延伸至成人门诊 PT、OT 和 SLP
strategyMap:
  northStarMetric: 已入组患者月中，同时达到照护者参与目标并产生已获批 RTM 申请的比例
  inputMetrics:
  - 从签署试点到首份提交申请的天数
  - 每位治疗师的 RTM 合格案例入组率
  - 第 8 周照护者活动完成率
  - 首次通过申请接受率
  - 付费试点转化为年度合同的转化率
  - 每位客户新增的治疗师席位或站点
  moatsToBuild:
  - 含预计费 QA 和拒付解决方案库的实时州付款方 RTM 规则
  - 按年龄、病种和例程类型分类的申请挂钩照护者参与数据集
  - 带进阶标准和照护者阻力标签的儿科发育内容图谱
  - 常见康复计费和 EMR 工作流的集成模板
  killCriteria:
  - 6 个付费试点后，北卡罗来纳州、马萨诸塞州和马里兰州中不足 2 个州显示儿科 SLP 或 OT RTM 首次通过申请接受率超过 75%
  - 不足 40% 的已入组家庭在第 8 周仍保持每周 3 次以上记录活动
  - 前 6 个试点后，付费试点转年度合同转化率仍低于 40%
  - 大多数账户的首个实时部署仍超过 8 周或需要大量定制服务
  mermaid: |
    flowchart LR
      Wedge[RTM billing wedge] --> MVP[Pediatric home-program MVP]
      MVP --> Proof[Accepted claims and caregiver adherence]
      Proof --> Expansion[Health-system and adjacent rehab expansion]
investorMemo:
  verdict:
    call: "值得会面 / 深入尽调"
    conviction: 低至中等置信度——候诊和报销切口值得一次合伙人会面，但付款方覆盖和独立部署必须迅速证明可重复。
    whyBelieve: 急迫的儿科可及性痛点、买方为收入获取付费的意愿，以及广域康复工具与儿科 RTM 工作流之间清晰的市场空白，共同构成了可信的 pre-seed 切口。
    whyDoubt: 滩头市场规模有限，相邻康复平台可以功能捆绑，除非初创公司能证明更高的申请通过率、更快的部署速度和可防御的数据护城河。
    nextDiligence: 通过 3–5 个试点确认两个目标州能产生已获批申请，照护者在第 8 周仍活跃，小型机构仍能转化为 $12k–$30k 年度合同。
  firstCustomer:
    title: 4–8 名治疗师规模儿科 SLP 或 OT 机构负责人
    profile: 北卡罗来纳州、马萨诸塞州或马里兰州的独立机构，新患者候诊超 75 天，Medicaid 敞口较大，居家训练计划手工管理，没有 RTM 工作流。
    trigger: 付款方公告或计费对话确认 RTM 覆盖，恰好是机构承受候诊压力、疗程间无偿照护指导之苦的时候。
    buyer: 诊所负责人
    initialContract: "$3k–$6k 90 天付费试点加申请分成，当 20–50 名患者活跃且首批已获批申请落地后，转为 $12k–$30k 年度软件合同。"
  mustBeTrue:
  - 两个以上目标州付款方能以 75% 以上首次通过率可靠报销儿科 SLP 或 OT RTM。
  - 一家 4–8 名治疗师的机构能在 90 天内在不增加实质临床负担的情况下入组 20 名以上活跃患者。
  - 40% 以上的已入组家庭在第 8 周仍保持每周 3 次以上记录活动。
  - 小型机构会在要求完整 WebPT、Prompt 或清算中心集成之前购买独立申请导出工作流。
  - 混合定价能在横向康复厂商弥合产品差距之前维持 $12k–$30k 年度合同价值。
  diligenceQuestions:
  - 北卡罗来纳州、马萨诸塞州和马里兰州哪些 Medicaid MCO 和商业险当前实际报销儿科 SLP 和 OT RTM，高频出现的拒付原因是什么？
  - 典型 4–8 名治疗师机构的活跃案例组中，每月有多少比例在临床和操作上符合 RTM 资格？
  - 当机构使用手工申请导出与现有康复 EMR 工作流时，首个部署分别需要多长时间？
  - 需要达到什么样的照护者完成率和消息回复率，才能稳定清过月度 RTM 阈值？
  - 为何 MedBridge、WebPT 或清算中心合作伙伴无法比初创公司更快弥合这一空白？
operatingAssumptions:
- assumption: 北卡罗来纳州、马萨诸塞州和马里兰州的报销付款方数量足以支撑初始滩头经济。
  basis: research.yaml
  validationTest: 绘制至少 6 个已命名付款方的覆盖情况，并在前 3 个试点中的 2 个中展示儿科 SLP 或 OT 首次通过申请接受率超过 75%。
  decisionImpact: 若不成立，将上线范围缩窄至可行的单个报销州，或将产品重新定位于参与和候诊缩短，而非计费 ROI。
- assumption: 小型机构会在要求深度 EMR 集成之前采用独立申请导出工作流。
  basis: research.yaml
  validationTest: 跨手工、WebPT 和 Prompt 工作流进行 10 次发现访谈，并在无定制集成的情况下上线至少 2 个付费试点。
  decisionImpact: 若不成立，集成范围和资金需求前移，公司应转向平台合作伙伴渠道而非直接独立部署。
- assumption: 照护者能维持短时居家例程足够长，同时产生治疗价值和可计费监控月。
  basis: 运营判断
  validationTest: 在前 50 个已入组家庭中，至少 40% 在第 8 周完成每周 3 次以上记录活动。
  decisionImpact: 若不成立，产品需要更高触达的辅导、更严格的患者筛选标准，或与报销产出不同的价值主张。
- assumption: 每治疗师席位 $250 加 3% 申请分成的模式，对 4–8 名治疗师机构产生清晰 ROI。
  basis: idea.yaml
  validationTest: 在 5 个提案或试点中，净新增 RTM 收款在第 3 个月达到固定软件费的至少 2 倍。
  decisionImpact: 若不成立，定价必须转向更低的固定费、企业合同或非 RTM 预算线，改变 ACV 和资金需求。
- assumption: 儿科计费深度和内容专业性能在横向康复厂商缩小产品差距之前保持领先，足以建立护城河。
  basis: 运营判断
  validationTest: 在前 5 次竞争评估或替换动作中，赢得其中 3 次（对手为 MedBridge、WebPT、Prompt 或手工工作流）。
  decisionImpact: 若不成立，公司应追求嵌入式、转销商渠道或更窄的合规服务层，而非广域直销 SaaS 模式。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 对北卡罗来纳州、马萨诸塞州和马里兰州有记录候诊积压的 15 位诊所负责人和计费负责人进行访谈。
  hypothesis: RTM 报销加上候诊压力，是比通用照护者互动软件更强的购买触发点。
  successMetric: 至少 8 / 15 人将报销获取列为购买最重要的两大原因，且 5 人同意进入试点范围界定。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 与儿科计费专家和一家清算中心合作伙伴共同构建目标州 RTM 覆盖矩阵。
  hypothesis: 至少两个初始州有可行的儿科 SLP 和 OT 报销路径，无需将定制申诉作为默认工作流。
  successMetric: 6 个已命名付款方的覆盖和文档要求已完成映射，且至少 2 个州被计费专家判定为试点就绪。
  owner: 计费运营负责人
- horizon: 0–90 天
  experiment: 利用 2 位共创客户的历史居家训练数据，原型化手工申请导出工作流。
  hypothesis: 每位患者每周无需增加超过 10 分钟临床时间，即可生成计费就绪摘要。
  successMetric: 完成 20 个测试患者月的处理，且治疗师保持在时间阈值以下。
  owner: 联合创始工程师
- horizon: 90–180 天
  experiment: 使用照护者应用、看板和手工申请导出，为每家 20–50 名患者上线 3 个付费试点。
  hypothesis: 独立覆盖层上线足够快，在深度 EMR 集成存在前就能证明 90 天付费试点的价值。
  successMetric: 2 个试点在 45 天内提交首份申请，且至少 1 个试点在 2 个州中各上线一个。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 在试点提案中对比纯席位定价与席位加成效费两种模式。
  hypothesis: 混合定价更好地对齐 ROI，产生更高的接受 ACV。
  successMetric: 3 个试点客户中至少 2 个以相同或更高年化合同价值选择混合方案。
  owner: 创始人/CEO
- horizon: 180–365 天
  experiment: 在 50 个家庭中以 2–5 分钟例程、治疗师提醒和进度摘要优化照护者依从性。
  hypothesis: 结构化短例程能让至少 40% 的家庭在第 8 周仍保持活跃。
  successMetric: 第 8 周依从性达标，且可计费患者月产出环比改善。
  owner: 儿科临床负责人
- horizon: 180–365 天
  experiment: 与常见康复计费工作流或清算中心建立首个深度集成或渠道合作。
  hypothesis: 一个强力生态伙伴能将部署时间缩短到足以突破创始人主导实施的瓶颈。
  successMetric: 合作伙伴辅助部署在 4 周内完成，且 2 个合格试点来自渠道。
  owner: 创始人/CEO
operations:
- 北卡罗来纳州、马萨诸塞州和马里兰州的州付款方 RTM 规则库，含预计费 QA 和拒付原因追踪
- 符合 HIPAA 的照护者消息通讯、知情同意、审计日志和申请支持记录留存
- 儿科活动内容、进阶标准和照护者指导的临床审核流程
- 跨治疗师采纳、照护者完成、申请状态和候诊指标的每周试点运营节奏
- 深度 EMR 集成前的清算中心申请导出和对账工作流
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 首单依赖品类教育、付款方可信度和对购买触发点的快速迭代，必须由创始人主导销售。
- role: 联合创始工程师
  startTiming: 第 0 个月
  rationale: 计费引擎、照护者事件模型和首个导出工作流是核心产品风险，需要创始团队直接掌控。
- role: 儿科临床负责人
  startTiming: 第 2 个月
  rationale: 治疗师信任和照护者依从性依赖于可信的内容库、进阶规则和安全的候诊到居家协议。
- role: 计费运营负责人
  startTiming: 第 3 个月
  rationale: 护城河始于付款方配置、拒付分析和文档 QA，而非纯软件功能。
- role: 全栈与移动端工程师
  startTiming: 第 4 个月
  rationale: 核心报销工作流手工验证后，照护者体验、治疗师工作流速度和报告都需要产品打磨。
- role: 实施与客户成功负责人
  startTiming: 第 6 个月
  rationale: 试点转化依赖入驻纪律、治疗师培训和每周 ROI 汇报，而非规模化外呼。
milestones:
- horizon: 0–12 个月
  items:
  - 在北卡罗来纳州、马萨诸塞州或马里兰州拿下 3–5 个付费试点，机构规模为 4–8 名治疗师
  - 提交首批 RTM 申请，且至少 2 个目标州首次通过申请接受率超过 75%
  - 每家上线机构已入组患者达到 20 名以上，且第 8 周照护者依从性达到 40%
  - 将至少 2 个试点转化为 $12k–$30k 区间的年度合同
- horizon: 12–24 个月
  items:
  - 与早期客户最常用的 2 个康复计费、EMR 或清算中心工作流集成
  - 赢得首个区域医疗系统或儿童医院门诊康复标杆账户
  - 将规则引擎和内容库扩展至相邻儿科 PT 或喂养工作流以及 5 个以上额外州
  - 构建跨装机基数的拒付率、依从性和候诊缓解基准报告
- horizon: 24–36 个月
  items:
  - 从单站点机构扩展至多站点团体和医疗系统部署
  - 仅在儿科转化和拒付指标保持健康后，测试成人门诊 PT、OT 或 SLP RTM 工作流
  - 将平台定位为门诊康复全线的远程治疗合规和照护者激活层
  - 证明付款方规则、申请挂钩数据和儿科内容相对于横向厂商捆绑仍保持差异化
risks:
- risk: 目标州儿科 RTM 报销比早期尽调显示的更窄或拒付率更高。
  likelihood: High
  impact: High
  mitigation: 逐州上线，保留固定席位费下限，在扩大 GTM 力度前使用预计费 QA 加拒付追踪。
- risk: 照护者参与度在 4–6 周后下滑，同时拖垮临床价值和申请产出。
  likelihood: High
  impact: High
  mitigation: 从 2–5 分钟例程、治疗师触发提醒和进度摘要起步；若依从性持续低迷，收紧入组标准。
- risk: 集成和工作流复杂性将部署时间延伸超出 90 天试点的实际边界。
  likelihood: Medium
  impact: High
  mitigation: 将首个产品限于手工导出、有文档的入驻手册和最高频计费工作流，再投入深度集成。
- risk: 横向康复平台捆绑了足够的儿科 RTM 能力，导致独立预算消失。
  likelihood: Medium
  impact: High
  mitigation: 率先占据儿科 Medicaid 优先规则层，证明更高的已获批申请产出，并在在位厂商将这一细分列为优先项之前建立渠道关系。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月现金跑道支撑计费和照护者产品开发、儿科内容与报销运营、北卡罗来纳州 / 马萨诸塞州 / 马里兰州 3–5 个付费试点，以及在向更广泛康复扩展之前，证明已获批 RTM 申请加照护者依从性可转化为可重复年度合同。
