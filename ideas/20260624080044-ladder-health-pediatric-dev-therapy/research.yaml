reportMemo:
  executiveTakeaways:
  - Federal reimbursement tailwinds are real, but pediatric RTM commercialization is still a payer-operations problem, not a code-existence problem [1,2,3,15,16,47,48].
  - 'The buyer pain is acute: pediatric specialty waits stretch from 13+ weeks into one year in developmental and autism pathways, while SLP and OT supply remains tight [20,22,23,28,29,31,32].'
  - 'The market gap is specific: incumbents cover HEPs, rehab EMRs, or virtual care delivery, but no visible leader owns pediatric caregiver activation plus RTM claims workflow for existing practices [35,36,38,39,41,43,44].'
  - This looks more like a strong vertical wedge than a giant standalone market; venture-scale upside likely requires expansion beyond pediatric developmental therapy into broader outpatient rehab or payer workflows [33,34].
  marketDefinition: This category is software for outpatient pediatric therapy practices that turns therapist-authored caregiver home programs into tracked home activity, engagement data, and RTM-ready documentation for PT/OT/SLP billing [1,3,5,36,39]. It sits between lightweight HEP creation, broad rehab operating systems, and care-delivery networks rather than pure teletherapy [35,41,42,43,44].
  customerAndBuyer: The day-to-day users are therapists, clinical directors, and billing leads managing waitlisted or under-dosed children; the economic buyer is the practice owner or ambulatory rehab leader who feels staffing scarcity, revenue pressure, and caregiver drop-off most directly [20,22,28,31,43].
  buyingTriggers:
  - point: CMS rule changes and annual therapy updates create a concrete reason to revisit RTM workflows and payer configuration.
    sourceRefs:
    - 1
    - 2
    - 3
    - 11
  - point: Long developmental and autism waitlists force practices and health systems to extend care without hiring proportionate headcount.
    sourceRefs:
    - 20
    - 22
    - 23
    - 28
    - 29
  - point: Payment pressure plus existing software budgets make incremental reimbursement and retention gains easier to sponsor than a net-new clinical service line.
    sourceRefs:
    - 9
    - 11
    - 12
    - 39
    - 41
    - 43
  willingnessToPay:
    summary: Budget is most credible when the product is sold as labor leverage plus revenue capture rather than as another family-engagement app. Practices already pay for HEP, EMR, and billing infrastructure, and adjacent vendors market time savings, patient retention, adherence, and revenue uplift as purchase justifications.
    sourceRefs:
    - 11
    - 12
    - 39
    - 40
    - 41
    - 42
    - 43
    - 44
  competitiveLandscape: The market is crowded in slices. Ladder sells caregiver-activated virtual care delivery, MedBridge sells RTM-enabled HEP and guided pathways, WebPT and Prompt sell broad rehab operations suites, and HEP2go covers the low-end HEP job [35,36,37,38,39,41,42,43,44]. The opening is a pediatric-specific reimbursement and caregiver workflow layer, not a generic teletherapy product.
  incumbentThesis:
  - incumbentClass: Virtual care networks
    point: Ladder proves caregiver-activation demand, but its model delivers care itself and can feel competitive to incumbent practices instead of empowering their existing therapists.
    sourceRefs:
    - 35
    - 36
    - 37
    - 38
  - incumbentClass: RTM and HEP suites
    point: MedBridge already bundles RTM into digital HEP, yet it is broad rehab infrastructure rather than a pediatric Medicaid-first billing OS.
    sourceRefs:
    - 39
    - 40
  - incumbentClass: Rehab EMRs
    point: WebPT and Prompt own broad workflow, billing, and patient engagement motions, but their positioning remains horizontal rehab rather than developmental-therapy caregiver orchestration.
    sourceRefs:
    - 41
    - 42
    - 43
  - incumbentClass: Lightweight HEP tools
    point: HEP2go is familiar and low-cost, but it does not create claims-grade monitoring, payer logic, or structured caregiver coaching loops.
    sourceRefs:
    - 44
  regulatoryLandscape: 'Federal coverage is directionally favorable: CMS designates multiple RTM codes as therapy, extended therapist telehealth authority through 2027, and added three more sometimes-therapy RTM codes for 2026 [1,2,3]. The catch is local execution—thresholds, modifiers, clinic telehealth rules, and state Medicaid implementation still vary, as Maryland''s published RPM rules and the manual-heavy NC/MassHealth policy surfaces illustrate [15,16,47,48].'
  technologyLandscape: 'The enabling stack already exists: digital HEP delivery, patient portals, messaging, billing, and analytics are all commercialized by MedBridge, WebPT, Prompt, and HEP2go [39,40,41,42,43,44]. The missing layer is pediatric milestone content plus caregiver activation plus state-aware RTM operations.'
