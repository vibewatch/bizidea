  validationPlan:
  - priority: high
    question: Which NC, MA, and MD Medicaid MCOs actually reimburse pediatric SLP and OT RTM today, and under what documentation standards?
    evidenceToGather: Plan bulletins, clearinghouse denial data, and interviews with three pediatric billing specialists.
  - priority: high
    question: What caregiver completion rate is required to reliably clear RTM thresholds in speech and OT programs for ages 0-6?
    evidenceToGather: Pilot logs pairing activity completion, message response, and successful claim submission across 50-100 families.
  - priority: medium
    question: Will owners buy a standalone workflow or insist on embedded EMR and clearinghouse integration before launch?
    evidenceToGather: Ten discovery calls split across WebPT, Prompt, and manual-billing practices.
  - priority: medium
    question: Can waitlisted families be onboarded before first visit without increasing clinician liability or burnout?
    evidenceToGather: Clinical protocol review with pediatric therapists and chart audits from pre-visit home-program pilots.
