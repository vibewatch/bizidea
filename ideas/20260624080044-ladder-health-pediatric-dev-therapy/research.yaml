openQuestions:
- Which Medicaid managed care plans in NC, MA, and MD reimburse pediatric SLP and OT RTM today, and at what denial rates?
- What caregiver completion rate is needed to produce reliable 30-day RTM claim yield in ages 0-6?
- Will small pediatric practices adopt a standalone RTM workflow, or must the product be embedded into WebPT, Prompt, or clearinghouse workflows?
- How much of the beachhead market is already partially served by MedBridge or manual HEP workflows that could be upgraded instead of displaced?
