competitors:
- name: Ladder Health
  stage: scale-up
  pricing: Insurance-covered care; Medicaid accepted.
  wedge: Caregiver-activated virtual pediatric developmental therapy delivered as a care network.
  strength: Strong demand proof, fast-access positioning, and existing provider and health-system distribution in MA, NC, and MD.
  weaknessVsUs: Its delivery model can compete with incumbent practices and does not sell them a reusable RTM billing workflow.
  sourceRefs:
  - 35
  - 36
  - 37
  - 38
- name: Medbridge
  stage: incumbent
  pricing: null
  wedge: RTM built into a broad digital HEP and guided-pathways platform for rehab providers.
  strength: Already combines home programs, engagement tracking, and billing support inside a trusted rehab platform.
  weaknessVsUs: Broad rehab positioning leaves room for a more pediatric, caregiver, and Medicaid-specific workflow.
  sourceRefs:
  - 39
  - 40
- name: WebPT
  stage: incumbent
  pricing: null
  wedge: Horizontal rehab EMR, patient portal, billing, and HEP platform.
  strength: Owns core rehab workflow and can bundle HEP and revenue tooling into the existing system of record.
  weaknessVsUs: Not visibly positioned around pediatric developmental therapy or caregiver-driven RTM reimbursement.
  sourceRefs:
  - 41
  - 42
- name: Prompt
  stage: scale-up
  pricing: null
  wedge: All-in-one rehab practice operating system with billing, scheduling, and analytics.
  strength: Strong operations story, with first-party claims of revenue lift and better plan-of-care adherence.
  weaknessVsUs: Horizontal rehab focus means no visible pediatric developmental content or RTM-specialist messaging today.
  sourceRefs:
  - 43
- name: HEP2go
  stage: incumbent niche
  pricing: Free membership available.
  wedge: Free, lightweight home exercise program creation for rehab clinicians.
  strength: Low-friction and familiar for therapists who only need to create and print HEPs.
  weaknessVsUs: Lacks claims-grade RTM monitoring, caregiver workflow, and reimbursement logic.
  sourceRefs:
  - 44
