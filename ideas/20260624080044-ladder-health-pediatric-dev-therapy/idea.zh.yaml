problem: >-
  超过 2,700 万美国儿童处于 0–6 岁发育关键窗口期，四分之一面临发育迟缓或残疾风险， 但儿科专科治疗的平均候诊时间长达半年。现有治疗机构按临床小时招聘、排班，根本跟不上家庭需求的增速。照护者既缺乏培训，也未被充分纳入治疗协作，导致每周临床面诊之间大量居家发育训练时间白白流失。结果就是：在早期干预效果最显著的那几个月里，发育差距持续扩大。
targetUser:
  primary: 独立儿科言语语言病理（SLP）或职业治疗（OT）机构的临床主任或诊所管理员，旗下拥有 3–10 名治疗师
  secondary: 区域医疗系统门诊部儿科治疗科室负责人，新患者候诊记录在 60–90 天以上
  buyer: 独立诊所负责人或医疗系统儿科门诊治疗项目的门诊服务副总裁
startupThesis:
  nonObviousInsight: >-
    2023 年确定的 CMS 远程治疗监测（RTM）代码（CPT 98975–98977）允许持牌治疗机构对临床医生监督下、由照护者在家开展的活动训练计划收费——但不足 3% 的儿科机构已将 RTM 纳入操作流程，原因是目前没有专门的工作流系统来构建、交付并自动记录可计费事件。 各机构每位活跃患者每月本可获得 40–80 美元的新增收入，却因缺乏软件而颗粒无收； 与此同时，若不是等待半年才能首次就诊，这些家庭本可获得更高的治疗剂量。
  beachhead: >-
    北卡罗来纳州、马萨诸塞州、马里兰州等 Medicaid 扩展州中，拥有 3–10 名治疗师、 新患者候诊超 60 天、尚未建立 RTM 计费流程的独立儿科 SLP 和 OT 机构
  wedge: >-
    面向治疗师的居家训练计划构建工具——生成带视频指导和进阶标准的照护者活动卡片， 通过移动应用推送给家庭，并自动从照护者登录和完成记录中生成可计费 RTM 事件， 将原本无偿的疗程间照护指导转化为每月持续收入
  whyNowCatalyst: >-
    Ladder Health 超额完成的 $7M 种子轮、10 位投资方加持、80 余家医疗系统合作—— 这一切证明机构买家正在主动采购照护者激活基础设施，市场认知和付费意愿均已形成， RTM 计费切入点对独立机构而言已切实可行。
  ventureScalePath: >-
    从儿科 SLP 和 OT 机构的 RTM 计费切口出发，向成人门诊物理治疗和职业治疗扩展， 接入付款方的价值医疗合约成为远程监控合规层，最终打造覆盖所有门诊治疗的操作系统—— 凡涉及照护者或患者居家护理的场景均可覆盖，总目标市场规模超 350 亿美元。
solution: >-
  该平台为儿科治疗师提供一套循证居家活动模板库，涵盖言语、运动和喂养发育里程碑， 治疗师可按患儿个体情况和处方定制。照护者通过移动应用收到带短视频指导的周度活动计划， 并可一键记录完成情况。平台后端在照护者达到 CPT 98977 报销所需的活动记录阈值后， 自动生成 RTM 计费事件，通过机构现有清算中心集成提交申请，并按参与率对治疗师案例组进行看板展示。机构每位活跃患者每月可新增 40–80 美元收入，家庭每周获得的治疗剂量提升 5–10 倍——既不需要多招一位治疗师，候诊压力也随之下降。
goToMarketSeed:
  firstCustomer: >-
    北卡罗来纳州、马萨诸塞州或马里兰州的独立儿科 SLP 或 OT 机构，拥有 4–8 名治疗师， 新患者候诊记录超过 75 天，Medicaid 患者占比较高，居家训练计划目前以手工方式管理， 从未提交过任何 RTM 申请
  buyingTrigger: >-
    州 Medicaid 管理式医疗组织发布提供商通知，确认 RTM 代码可报销，为机构打开了一个具体的收入窗口，但机构没有专门软件，无法独自落地
  currentAlternative: >-
    手工设计、邮件发送的 PDF 居家训练计划；TheraNest、OptimisPT 等通用护理管理平台 （无 RTM 计费流程）；或干脆没有任何结构化疗程间居家训练
  switchingReason: >-
    该平台把原本不产生收费的疗程间照护指导，转化为每位患者每月 40–80 美元的净增收入， 两位活跃患者的收入就能覆盖软件成本，同时减轻治疗师手工制作居家训练计划的行政负担
  pricingHypothesis: >-
    每位治疗师席位每月 $250，含无限量居家训练计划和照护者应用使用权，另收平台验证 RTM 申请的 3% 成效费；一家拥有 4 名治疗师的机构，若为 30 名活跃患者每月申报约 $60，可获得 $1,800 月度新增收入，软件成本仅 $1,000
whyNow:
- point: >-
    2,700 万美国 0–6 岁儿童面临发育风险——四分之一存在迟缓隐患——平均候诊半年， 医疗系统和付款方都承受着压力，必须找到不需按比例扩充临床人手的解决方案。
  signalRefs: ["儿科治疗六个月候诊危机"]
  sourceRefs: [2]
- point: >-
    Ladder Health 的 $7M 种子轮超额完成、10 位机构投资方入局，证明照护者激活模式已获投资者认可并进入医疗主流，从业者意识到疗程间照护者训练计划是公认的临床标准， 而非实验性尝试。
  signalRefs: ["机构资本验证照护者激活模式"]
  sourceRefs: [1]
- point: >-
    超过 80 家医疗系统合作伙伴表明，照护者激活平台的机构采购周期已经启动， 独立机构的 B2B 采购阻力因此降低——该工具帮助现有机构采纳这一模式， 而非成为竞争性治疗网络。
  signalRefs: ["医疗系统渠道分发已规模验证"]
  sourceRefs: [2, 3]
- point: >-
    Ladder Health 向拥有强力 Medicaid 管理式医疗项目的北卡罗来纳州、马萨诸塞州和马里兰州扩张，表明照护者激活治疗的付款方覆盖和报销正在走向标准化，此前犹豫投入这一模式的独立机构，采纳风险也随之降低。
  signalRefs: ["Medicaid 与农村家庭：增速最快的细分市场"]
  sourceRefs: [3]
differentiator: >-
  与 Ladder Health（雇用临床医生的竞争性治疗网络）或通用远程医疗平台不同，本产品向现有治疗机构销售 B2B 软件，通过解锁它们本已具备资格却无法落地的计费能力来变现。 RTM 计费引擎与机构形成收入分成对齐，这是 TheraNest 或 WebPT 等在位厂商不具备的—— 软件通过新增报销自我造血，而非取代现有临床流程。没有任何现有诊所管理软件厂商针对儿科治疗构建过专用 RTM 工作流；这一切入点是一层窄而有防御性的计费基础设施， 随着照护者内容库不断积累，锁定机构的收入获取流程，复合式转换成本也将随之形成。
