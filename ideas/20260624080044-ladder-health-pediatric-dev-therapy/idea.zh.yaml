jobsToBeDone:
- job: >-
    当机构有 75 天新患者候诊积压、招不到足够治疗师时，帮助诊所管理员在现有案例组基础上扩大治疗覆盖，从而服务更多家庭、缩短平均候诊时间，无需增加治疗师编制。
  currentAlternative: 以每年 $80,000 以上的成本招聘更多治疗师，或干脆维持候诊积压，眼看家庭流向竞争对手
  successMetric: 上线 6 个月内，新患者候诊时间降至 30 天以下，且未增加治疗师全职当量
- job: >-
    当儿科治疗师口头提供居家训练指导、却没有任何结构化工具来推送活动、追踪完成情况或提交计费申请时，帮助诊所负责人将 RTM 计费流程落地，同时提升疗程间治疗剂量， 实现增收与提质并举。
  currentAlternative: 手工制作 PDF 居家训练计划并发送给家庭，无追踪、无计费能力
  successMetric: 上线 90 天内，至少 30% 的活跃患者完成 RTM 可计费居家训练计划入组
- job: >-
    当孩子在候诊半年、关键发育窗口持续收窄时，帮助治疗师在首次预约前向家庭推送结构化照护者活动计划，让家庭立即启动发育训练，减少等待期间的技能差距扩大。
  currentAlternative: 入组时发送一页纸的提示单，或引导家庭自行观看无临床指导的通用在线视频
  successMetric: 候诊家庭在首次面诊预约前，每周完成 3 项以上结构化照护者活动
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      Ladder Health 的超额种子轮、10 位机构投资方、80 余家医疗系统合作——高置信度证明儿科治疗能力危机是真实存在的、已获资金支持的问题，照护者激活是推动机构采购决策的公认解决路径。
  painIntensity:
    score: 5
    rationale: >-
      在早期干预效果最显著的关键发育窗口期，平均候诊半年——对家庭、医疗系统管理者和面临监管及舆论压力的付款方而言，这是极高强度的痛点。
  wedgeClarity:
    score: 4
    rationale: >-
      RTM 计费解锁是一个具体、窄口且时效敏感的切口——机构已具备一个新收入来源，却无法独自落地，这一软件提供了强烈的 ROI 理由，且无需改造现有临床流程。局限在于 RTM 计费复杂性因付款方和州而异，需要持续的合规投入。
  defensibility:
    score: 3
    rationale: >-
      在儿科 RTM 计费基础设施领域的先发优势，通过付款方集成和临床内容库投入形成转换成本；然而，大型诊所管理软件厂商一旦市场被验证，可能追加 RTM 功能，因此护城河必须通过医疗系统网络效应和内容深度持续拓宽。
  ventureScale:
    score: 4
    rationale: >-
      美国门诊治疗市场（儿科加成人）年规模超 350 亿美元；成人物理治疗、职业治疗和 SLP 中 RTM 的渗透代表数十亿美元的扩张路径；成功的儿科滩头市场为更大的门诊照护者激活和远程监控平台奠定防御性基础。
topRisks:
- name: RTM 报销政策风险
  description: >-
    CMS 或州 Medicaid 项目可能在未来费用表更新中限制 RTM 资格、下调报销费率或将儿科治疗排除在外，直接摧毁主要计费切口和采购 ROI 依据。
  mitigation: >-
    从第一天起就建立多元收入模型——SaaS 席位费独立于 RTM 计费成效——让平台价值主张建立在提升治疗剂量和缓解候诊两条腿上，即便 RTM 报销收缩或重组也不动摇。
- name: EHR 集成壁垒
  description: >-
    儿科治疗机构使用的是 TheraNest、OptimisPT、TherapyBrands 等碎片化、API 开放性差的诊所管理系统，缺乏标准化集成接口，使自动化 RTM 申请提交技术上复杂、扩展成本高昂。
  mitigation: >-
    先以手工导出工作流（CSV 上传至现有清算中心）验证收入影响，再投入深度 EHR 集成； 利用早期收入牵引力，与两三家主流诊所管理软件厂商建立 API 合作。
- name: 照护者参与度衰减
  description: >-
    若缺乏持续参与机制，照护者在入组后 4–6 周内停止完成居家活动记录，既让治疗价值主张崩塌，也让支撑软件成本的 RTM 计费流断掉。
  mitigation: >-
    嵌入治疗师触发的参与提醒、里程碑庆祝通知和双周进度报告；将活动库设计为 2–5 分钟时长，融入家长日常作息，而非要求专门的治疗作业时间段。
