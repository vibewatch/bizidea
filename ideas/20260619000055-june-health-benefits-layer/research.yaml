competitors:
- name: June Health
  stage: seed
  wedge: AI-guided women’s-health navigation sold through employers and partners.
  pricing: Custom employer contract; public list pricing not shown.
  strength: Closest direct narrative to broad women’s-health coordination with employer distribution and clinician-backed
    navigation.
  weaknessVsUs: Still early and public positioning is broad navigation rather than explicit HRIS-triggered orchestration across
    existing leave and benefit vendors.
  sourceRefs:
  - 29
  - 30
- name: Maven Clinic
  stage: scale-up
  wedge: Comprehensive family-health platform spanning fertility, maternity, parenting, and menopause.
  pricing: Custom enterprise pricing and ROI-led sales motion.
  strength: Strong breadth, employer credibility, and outcomes evidence across multiple family-health journeys.
  weaknessVsUs: Optimizes within Maven’s own platform; a neutral overlay that works across third-party vendors can still differentiate
    on activation and handoff analytics.
  sourceRefs:
  - 12
  - 26
  - 27
- name: Carrot
  stage: scale-up
  wedge: Global fertility and family-forming benefit with pregnancy and parenting extensions.
  pricing: Custom enterprise contract.
  strength: Strong global coverage framing and concrete outcomes narrative around less-invasive care and IVF decisions.
  weaknessVsUs: Still anchored in Carrot’s own benefit program rather than a trigger layer across a mixed employer stack.
  sourceRefs:
  - 20
  - 21
  - 38
- name: Progyny
  stage: public
  wedge: Integrated fertility, pregnancy/postpartum, and menopause support with dedicated care advocates and reporting.
  pricing: Custom enterprise contract.
  strength: Strongest integrated-care and outcomes story among scaled incumbents, with explicit language on fragmentation
    and ROI.
  weaknessVsUs: More likely to be evaluated as a replacement or bundled benefit than as a neutral operating system sitting
    above multiple current vendors.
  sourceRefs:
  - 22
  - 23
  - 39
- name: Cleo
  stage: scale-up
  wedge: Caregiving, parenting, and return-to-work support with strong employer case studies.
  pricing: Flexible enterprise pricing structure.
  strength: Credible proof around employee experience, benefits engagement, and leave-duration reduction.
  weaknessVsUs: Broader caregiving scope means less explicit ownership of fertility-triggered activation before pregnancy
    or during treatment handoffs.
  sourceRefs:
  - 24
  - 25
