openQuestions:
- What minimum consented data package is enough to trigger useful outreach without forcing deep medical-claims integrations
  in the first sale?
- Do benefits buyers prefer enterprise-wide PEPM pricing, cohort-based pricing, or episode-based fees for a continuity layer
  like this?
- Which incumbents will willingly partner on cross-vendor analytics, and which will resist because the product exposes weak
  handoffs?
- How much improvement in activation, leave duration, or 90-day return-to-work retention is required for a new vendor to survive
  a cost-cutting year?
