    name: "非薪资运营支出爬坡"
    value: "S&M 非薪资：试点前约 $5K/月，有上线试点时约 $7K，有合作关系时约 $8.5K，首名 AE 后约 $12K，第二名 AE 后约 $16K；R&D 工具/云：早期约 $8K，连接器上线后约 $10K，基准阶段约 $12.5K，第三连接器构建启动后约 $15K；G&A：早期约 $6K，有上线雇主数据后约 $7.5K，Y2 安全合规工作期间约 $9K，更广泛生产阶段之后约 $12K"
    unit: "USDK"
    source: "精简企业健康科技软件公司的创业财务惯例，涵盖云、差旅、法务、保险和安全审查成本，不假设服务性人员储备。"
