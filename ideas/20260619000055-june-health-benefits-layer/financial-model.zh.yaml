modelSanity:
  - checkName: "收入引擎"
    finding: "基准情形收入由从 Y1 末 3 家活跃付费雇主增长至 Y3 末 26 家驱动，同时通过 PEPM 加适度 ROI 模块附加将混合雇主年价值维持在 $185K 附近。"
  - checkName: "必须奏效的假设"
    finding: "模型需要 45 天双连接器上线和续签时机驱动的销售动作持续成立——销售周期晚一个季度，现金谷底就会大幅接近下行情形。"
  - checkName: "模型崩溃条件"
    finding: "若部署速度和附加率同时下滑，Y3 EBITDA 将降至约 -$402K，现金压缩至约 $36K，几乎没有再延迟一个季度的余地。"
  - checkName: "下轮融资依据"
    finding: "一旦公司达到约 9 家正式雇主、发布首份基准报告，并证明至少一次伙伴协助部署在不增加重度服务型利润率损耗的情况下完成扩展，下轮融资即具备合理性。"
sanityChecks:
  ruleOf40: "Y3 增长率 215.9% + EBITDA 利润率 3.6% = 219.5%（方向性强劲，但受 Y2 收入基数仍小而放大）。"
  burnMultiple: "Y2 净新增 ARR 的燃烧倍数约 0.8 倍；Y3 EBITDA 转为微正，因此融资风险更多由销售周期滑移驱动，而非原始消耗。"
  revenuePerFte: "Y3 年末每 FTE 收入 $268K（SaaS 基准约 $200K–$400K）。"
  flags:
    - "基准情形仍需从 Q4Y2 到 Q4Y3 净增 17 家雇主，伙伴协助管道必须真实而非纯创始人驱动。"
    - "ARPU 假设买方在约 $150K 核心 PMPY 锚点之上附加了一些 ROI/报告或相邻工作流；若账户维持核心配置，下行情形概率上升。"
    - "毛利率改善依赖护理协调保持标准化；若雇主特定交接仍为定制模式，70% 目标将右移。"
    - "即使在基准情形下，现金在 Q3Y3 前后触底约 $474K，因此额外一个季度的部署延迟或提前过度招聘都可能使融资需求超过 $2.4M。"
