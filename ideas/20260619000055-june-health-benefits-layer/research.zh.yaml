  sensitivityCases:
  - case: 一体化供应商捆绑编排功能
    impact: 若 Progyny、Maven 或 Kindbody 进一步深入跨旅程工作流，创业公司必须凭借中立性、触发深度和跨供应商分析取胜，而非护理交付广度。
    sourceRefs:
