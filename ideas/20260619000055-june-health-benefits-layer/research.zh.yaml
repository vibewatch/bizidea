competitors:
- name: June Health
  stage: 种子期
  wedge: 通过雇主和合作伙伴销售的 AI 引导女性健康导航。
  pricing: 定制雇主合同；未公示定价。
  strength: 在广泛女性健康协调和雇主分发及临床支持导航方面，叙事上最接近我们。
  weaknessVsUs: 仍处于早期，公开定位是宽泛导航，而非明确针对现有休假和福利供应商的 HRIS 触发编排。
  sourceRefs:
  - 29
  - 30
- name: Maven Clinic
  stage: 扩张期
  wedge: 覆盖生育、产假、育儿和更年期的综合家庭健康平台。
  pricing: 定制企业定价和 ROI 驱动的销售动作。
  strength: 在多个家庭健康旅程上具备强大广度、雇主公信力和结果证据。
  weaknessVsUs: 在 Maven 自身平台内优化；一个跨第三方供应商的中立覆盖层仍可在激活和交接分析上做到差异化。
  sourceRefs:
  - 12
  - 26
  - 27
- name: Carrot
  stage: 扩张期
  wedge: 涵盖孕期和育儿延伸的全球生育和家庭组建福利。
  pricing: 定制企业合同。
  strength: 强劲的全球覆盖框架，以及围绕低侵入性护理和试管决策的具体结果叙事。
  weaknessVsUs: 仍以 Carrot 自身福利计划为核心，而非跨混合雇主堆栈的触发层。
  sourceRefs:
  - 20
  - 21
  - 38
- name: Progyny
  stage: 上市公司
  wedge: 集成生育、孕期/产后和更年期支持，配备专属护理倡导者和报告。
  pricing: 定制企业合同。
  strength: 在规模化现有厂商中拥有最强的一体化护理和结果故事，并明确讨论碎片化和 ROI。
  weaknessVsUs: 更可能被评估为替换或捆绑福利，而非坐在多个现有供应商之上的中立运营系统。
  sourceRefs:
  - 22
  - 23
  - 39
- name: Cleo
  stage: 扩张期
  wedge: 具备强劲雇主案例研究的育儿、护理和复职支持。
  pricing: 灵活企业定价结构。
  strength: 在员工体验、福利参与和缩短假期时长方面具有可信验证。
  weaknessVsUs: 更宽泛的育儿范围意味着对孕前生育触发激活，以及治疗交接期间的明确所有权较弱。
  sourceRefs:
  - 24
  - 25
regulatoryTechnicalConstraints:
- point: 触及妊娠状态、分娩恢复、哺乳或产后抑郁的产品，必须将 PWFA 配合安排和反歧视规定落地化。
  sourceRefs:
  - 16
  - 17
  - 31
- point: 休假触发的工作流必须遵循 FMLA 时机、资格和工作保障逻辑，而非创建并行流程。
  sourceRefs:
  - 18
  - 19
- point: 接入 HRIS、休假和薪资生态系统需要跨多个平台的仔细 API 和数据映射工作。
  sourceRefs:
  - 33
  - 34
  - 35
- point: 买方将期望激活、休假或孕产结果方面的可量化证据——而非通用健康参与度。
  sourceRefs:
  - 3
  - 24
  - 26
  - 36
validationSignals:
- point: Carrot 2025 年报告称仅 21% 的在职母亲认为职场福利有效支持了孕产需求，45% 因支持不足而考虑离职。
  sourceRefs:
  - 20
- point: Cleo 的一家运输公司案例研究称育儿支持将休假时长缩短了五周。
  sourceRefs:
  - 25
- point: PepsiCo 将使用率不足的产假计划替换为 Cleo 后，新任父母群体的持续参与度大幅提升。
  sourceRefs:
  - 24
- point: Maven 的主要案例研究集和年度报告均将改善孕产结果和降低支持感知缺口作为雇主买方的董事会级验证点。
  sourceRefs:
  - 9
  - 26
- point: June 表示雇主和合作伙伴是核心分发渠道，并将新融资用于深化 AI 和雇主合作关系。
  sourceRefs:
  - 29
  - 30
openQuestions:
- 什么样的最小授权数据包足以触发有效外联，同时在首次销售中不强制要求深度医疗理赔集成？
- 福利买方更倾向于企业级 PEPM 定价、基于群体的定价，还是连续性层的按事件计费？
- 哪些现有厂商愿意在跨供应商分析上合作，哪些会因为产品暴露了其薄弱交接而抵制？
- 激活率、休假时长或 90 天复职留存率需要改善多少，才能让新供应商在削减成本之年存活下来？
