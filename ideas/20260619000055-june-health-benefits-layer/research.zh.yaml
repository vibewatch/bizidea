  validationPlan:
  - priority: high
    question: 使用一个 HRIS 和一个休假管理连接器的双连接器试点，能否在不使安全审查超出正常福利采购周期的前提下识别触发事件？
    evidenceToGather: 来自 3 至 5 家共创客户的安全审查时间线、数据最小化要求和连接器范围。
  - priority: high
    question: 触发式外联是否相对常规流程，在育儿群体的多福利激活率和休假时长方差上有所改善？
    evidenceToGather: 试点群体在激活率、休假时长、产后支持使用率和 90 天复职留存率上的数据。
  - priority: medium
    question: 买方是否会从现有生育健康或育儿预算中为连续性层买单，而非要求新增预算行？
    evidenceToGather: 跨福利负责人、休假领导、HRIT 和财务合作伙伴的预算负责人访谈。
