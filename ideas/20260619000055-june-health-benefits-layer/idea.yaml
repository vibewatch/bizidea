  - job: "When an employee starts fertility treatment or reports pregnancy, help our benefits team trigger the right covered care and leave support, so we reduce missed handoffs and avoid manager escalations."
    currentAlternative: "Benefits PDFs, separate vendor portals, and ad hoc HR guidance"
