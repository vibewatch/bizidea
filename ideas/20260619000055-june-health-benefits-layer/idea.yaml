topRisks:
  - name: "Budget-owner ambiguity"
    description: "HR, benefits, and clinical-navigation stakeholders may all feel the pain but none may clearly own the budget for a new continuity layer."
    mitigation: "Sell around benefit renewals with shared KPIs such as activation, leave friction, and retention, and start with a pilot funded from existing women's-health or family-benefits spend."
  - name: "Data and privacy friction"
    description: "Connecting HRIS, leave, and benefit-vendor data can trigger long security, legal, and privacy reviews that slow deployment."
    mitigation: "Start with employee-consented trigger data, minimal PHI, and one or two system connectors, then deepen integrations only after proving workflow value."
  - name: "Vendor resistance"
    description: "Fertility, leave, or navigation vendors may resist a neutral layer that exposes weak handoffs or tries to own the employee relationship."
    mitigation: "Position the product as an activation and measurement overlay that helps vendors show more usage and better outcomes rather than replacing their core service."
