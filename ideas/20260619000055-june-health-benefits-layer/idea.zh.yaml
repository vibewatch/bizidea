topRisks:
  - name: "预算归属模糊"
    description: "HR、福利和临床导航利益相关方可能都感受到痛点，但没有人会明确拥有为新连续性层买单的预算。"
    mitigation: "围绕福利续签进行销售，以激活率、休假摩擦和留存率等共享 KPI 为框架，从现有女性健康或家庭福利支出中申请试点预算。"
  - name: "数据与隐私阻力"
    description: "连接 HRIS、休假和福利供应商数据可能触发漫长的安全、法律和隐私审查，拖慢部署。"
    mitigation: "从员工授权的触发数据起步，最小化受保健康信息（PHI），仅接入一两个系统连接器，在证明工作流价值后再深化集成。"
  - name: "供应商阻力"
    description: "生育、休假或导航供应商可能抵制一个暴露其交接弱点、或试图拥有员工关系的中立层。"
    mitigation: "将产品定位为激活与衡量覆盖层——帮助供应商展示更高的使用量和更好的结果，而非替代其核心服务。"
