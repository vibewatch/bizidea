problem: >-
  雇主越来越多地采购独立的生育、产假、心理健康、更年期和护理导航福利，但员工从一个生命阶段过渡到下一个时仍会掉入缝隙。最难解决的是连续性问题：HR
  团队不知道何时触发帮助，各点解决方案之间互不协调，员工最终拿到一堆门户而非一条有引导的路径。由此带来使用率低、管理层不断升级处理、不必要的休假摩擦，以及高价值女性员工中本可避免的流失。
targetUser:
  primary: "北美雇主中的福利负责人——员工规模 3,000 至 20,000 人，持有独立的家庭健康点解决方案，并在女性管理者和专业人员的留才上面临明显压力。"
  secondary: "同一雇主内部的人力运营、休假管理和员工体验团队。"
  buyer: "福利负责人、VP 人才或 CHRO"
startupThesis:
  nonObviousInsight: >-
    雇主福利领域下一家真正有价值的女性健康公司，未必是另一个单病种诊所。一旦雇主完成了生育、育儿、心理健康和更年期的品类广度采购，控制点就转移到了连续性层——那个能在生命事件触发时捕捉员工、并将其导入已付费福利的连接层。
  beachhead: >-
    员工规模 3,000 至 20,000 的北美雇主，女性占多数的受薪劳动力，同时持有独立的生育、产假和心理健康供应商，但没有统一的连续性工作流来承接员工从治疗到孕期再到复职的全程
  wedge: >-
    一个 HRIS 与休假系统触发的连续性引擎——检测生育登记、孕期休假和复职事件，继而将员工导入正确的已覆盖医疗、休假、心理健康和育儿资源，并进行闭环协调
  whyNowCatalyst: >-
    June 超额认购的融资，以及从更年期延伸至生育、育儿、心理健康、PCOS 和子宫内膜异位症的扩张，表明雇主已准备好购买更广泛的协调层，而非又一个窄化的健康应用。
  ventureScalePath: >-
    从已为多种家庭健康福利买单的雇主处起步，以生育至产后连续性为切入点，逐步扩展至更年期、慢性妇科疾病、承运商白标分发，最终成为大型人群中女性健康福利激活与供应商绩效的记录系统。
solution: >-
  生育产后福利 OS 接入 HRIS、休假管理和福利资格系统，检测员工何时开始生育治疗、进入孕期休假或准备复职。随即启动由 AI
  引导、人工升级的路径，将员工导入雇主现有的已覆盖福利、专科医生、休假资源、心理健康支持和管理层配合安排。福利团队获得实时连续性仪表盘，可看到员工在哪些供应商之间停滞、哪些事件触发了管理层升级、哪些支持路径改善了复职留存率。初始产品不替换生育或休假供应商，而是将其拼接进一个基于触发的工作流并量化激活情况。随时间推移，该产品成为雇主在女性健康福利使用和结果基准方面的运营底层。
goToMarketSeed:
  firstCustomer: >-
    员工规模 5,000 至 15,000 的北美专业服务、医疗或零售雇主，已提供独立的生育、休假和心理健康福利，并在产后支持使用率偏低或复职留存上遇到问题
  buyingTrigger: >-
    生育或家庭健康福利的续签或扩展、产假摩擦激增，或高层施压要求改善经历重大生命阶段过渡后的女性员工留存
  currentAlternative: >-
    福利 PDF、HR 业务伙伴人工指导、保险公司导航热线、休假管理方，以及互不协调的独立生育或心理健康点解决方案
  switchingReason: >-
    该切口让雇主保留现有供应商，同时将其连接成一套由触发驱动的员工旅程——无需 HR 拆换现有福利堆栈，即可提升使用率和留存率
  pricingHypothesis: >-
    年度平台费加适格员工人头费（PEPM），可选的高触达护理协调和 ROI 报告模块按次计费
