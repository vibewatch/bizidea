modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by growing from 3 active paid employers at Y1 exit to 26 at Y3 exit while holding blended employer-year value near $185K through PEPM plus modest ROI-module attach."
  - checkName: "Must go right"
    finding: "The model needs the 45-day two-connector rollout and renewal-timed sales motion to hold, because a quarter of sales-cycle slippage pushes the cash trough far closer to the downside case."
  - checkName: "Model breaks if"
    finding: "If deployment speed and attach rate slip together, Y3 EBITDA falls to about -$402K and cash compresses toward roughly $36K, leaving almost no room for another delayed quarter."
  - checkName: "Next-round proof"
    finding: "The next financing is justified once the company reaches about 9 production employers, publishes the first benchmark report, and shows that at least one partner-assisted deployment expands without a services-heavy margin penalty."
sanityChecks:
  ruleOf40: "Y3 growth 215.9% + EBITDA margin 3.6% = 219.5% (directionally strong but flattered by the still-small Y2 revenue base)."
  burnMultiple: "About 0.8x in Y2 on net new ARR; by Y3 EBITDA turns slightly positive, so financing risk is driven more by sales-cycle slippage than by raw burn."
  revenuePerFte: "$268K Y3 revenue per end-of-year FTE (benchmark roughly $200K-$400K SaaS)."
  flags:
    - "The base case still requires 17 net new employers from Q4Y2 to Q4Y3, so partner-assisted pipeline must become real rather than purely founder-led."
    - "ARPU assumes buyers buy some ROI/reporting or adjacent-workflow attach above the roughly $150K core PMPY anchor; if accounts stay core-only, the downside case becomes more likely."
    - "Gross-margin improvement depends on care coordination staying standardized; if employer-specific handoffs remain bespoke, the 70% target shifts right."
    - "Even in the base case, cash bottoms around $474K before Q3Y3, so an extra quarter of deployment delay or early over-hiring would likely raise the funding need above $2.4M."
