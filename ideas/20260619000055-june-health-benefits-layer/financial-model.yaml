slug: "fertility-postpartum-benefits-os"
date: "2026-06-19"
currency: "USD"
modelStartMonth: "2026-07"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-06-19] Base case starts the first full month after the business-plan date."
  - id: "A2"
    name: "Opening cash after pre-seed close"
    value: "2400.0"
    unit: "USDK"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses a $2.4M close near the low-middle of the stated range, enough to reach the month-24 proof point plus roughly six months of buffer without assuming a full $4M raise."
  - id: "A3"
    name: "Modeled customer unit"
    value: "active paid employer account"
    unit: "definition"
    source: "[BP investorMemo.firstCustomer.initialContract] customersEop counts employers on a paid pilot or production contract, not raw eligible lives."
  - id: "A4"
    name: "Starting paid customers (M1)"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months] The model starts pre-revenue and closes its first paid pilot only after connector and security work."
  - id: "A5"
    name: "Blended annual revenue per active paid employer"
    value: "185.0"
    unit: "USDK"
    source: "[BP market.som roughly $150K employer-year core spend; BP investorMemo.firstCustomer.initialContract $150k-$300k ACV after proof; BP businessModel optional ROI/reporting modules] Base case assumes the core PMPY package plus modest module attach, producing a $185K blended employer-year value."
  - id: "A6"
    name: "Revenue recognition method"
    value: "average active paid employers per period"
    unit: "formula"
    source: "Startup-finance heuristic anchored to BP pilot motion: new employer accounts contribute half-period revenue in the landing month or quarter, then full run-rate thereafter."
  - id: "A7"
    name: "Year 1 paid-account ramp"
    value: "M6 first paid pilot; M8 second; M10 third; M12 exits with 3 active paid employers"
    unit: "timing"
    source: "[BP product.sixMonth; BP milestones 0-12 months] This is a conservative read of 1-2 paid pilots by month 6 and at least 1 pilot-to-production conversion by month 12."
  - id: "A8"
    name: "Year 2 quarter-end customers"
    value: "Q1Y2 4; Q2Y2 5; Q3Y2 7; Q4Y2 9"
    unit: "count"
    source: "[BP milestones 12-24 months] Base case reaches 3-5 production employers by month 18 and lands two account expansions plus partner-assisted pipeline by month 24."
  - id: "A9"
    name: "Year 3 quarter-end customers"
    value: "Q1Y3 13; Q2Y3 17; Q3Y3 22; Q4Y3 26"
    unit: "count"
    source: "[BP milestones 24-36 months] Exits Y3 inside the stated 20-30 employer range and still below the 50-employer SOM outer case."
  - id: "A10"
    name: "Gross margin ramp"
    value: "58-65% in Y1, 67-68% in Y2, and 69-70% in Y3"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70; BP risks human care coordination expands faster than automation] Margin starts below target while care playbooks and connector operations are still manual, then converges on the 70% target by Y3."
  - id: "A11"
    name: "Founding CEO / benefits GTM loaded cash compensation"
    value: "120.0"
    unit: "USDK annual per FTE"
    source: "[BP team Founding CEO / benefits GTM] Startup-finance heuristic: below-market founder salary for an enterprise-health pre-seed company."
  - id: "A12"
    name: "Founding engineer loaded cash compensation"
    value: "180.0"
    unit: "USDK annual per FTE"
    source: "[BP team Founding eng] Startup-finance heuristic for a senior technical founder building integrations, consent controls, and the dashboard."
  - id: "A13"
    name: "Care operations lead loaded cash compensation"
    value: "125.0"
    unit: "USDK annual per FTE"
    source: "[BP team Care operations lead] Startup-finance heuristic for an early operator who standardizes escalation playbooks across fertility, leave, and postpartum support."
  - id: "A14"
    name: "Integrations engineer loaded cash compensation"
    value: "170.0"
    unit: "USDK annual per FTE"
    source: "[BP team Integrations engineer] Startup-finance heuristic for an engineer focused on repeatable HRIS and leave-admin connectors."
  - id: "A15"
    name: "Customer success / implementation lead loaded cash compensation"
    value: "120.0"
    unit: "USDK annual per FTE"
    source: "[BP team Customer success / implementation lead] Startup-finance heuristic for a first implementation and renewals owner."
  - id: "A16"
    name: "Partnerships lead loaded cash compensation"
    value: "140.0"
    unit: "USDK annual per FTE"
    source: "[BP team Partnerships lead] Startup-finance heuristic for the first partner/channel owner once direct pilots produce proof."
  - id: "A17"
    name: "Data / analytics engineer loaded cash compensation"
    value: "165.0"
    unit: "USDK annual per FTE"
    source: "[BP product.twelveMonth benchmark report goal] Startup-finance heuristic for the first analytics-heavy product hire added once cross-vendor KPI proof matters."
  - id: "A18"
    name: "Account executive loaded cash compensation"
    value: "150.0"
    unit: "USDK annual per FTE"
    source: "[BP gtm channels and funnelTargets] Startup-finance heuristic for the first quota-carrying seller added after founder-led proof."
  - id: "A19"
    name: "Care coordinator loaded cash compensation"
    value: "95.0"
    unit: "USDK annual per FTE"
    source: "[BP operations weekly case review; BP risks care coordination can erode gross margin] Startup-finance heuristic for a junior delivery hire who absorbs repeatable human escalations."
  - id: "A20"
    name: "Implementation manager loaded cash compensation"
    value: "110.0"
    unit: "USDK annual per FTE"
    source: "[BP product.twentyFourMonth and operations] Startup-finance heuristic for the manager who keeps multi-account rollouts and KPI reviews on schedule."
  - id: "A21"
    name: "Integrations engineer II loaded cash compensation"
    value: "170.0"
    unit: "USDK annual per FTE"
    source: "[BP product.twentyFourMonth third connector goal] Startup-finance heuristic for a second connector-focused engineer added after Y2 proof."
  - id: "A22"
    name: "Account executive II loaded cash compensation"
    value: "150.0"
    unit: "USDK annual per FTE"
    source: "[BP milestones 24-36 months] Startup-finance heuristic for a second seller added only after partner-assisted pipeline is repeatable."
  - id: "A23"
    name: "Hiring cadence"
    value: "CEO and founding engineer in M1; care operations lead in M2; integrations engineer in M4; customer success / implementation lead in M6; partnerships lead in M9; data / analytics engineer in M12; account executive in M16; care coordinator in M19; implementation manager in M22; integrations engineer II in M25; account executive II in M30"
    unit: "timing"
    source: "[BP team startTiming; BP sequencingRationale; BP product.twentyFourMonth] Scale hires are added only after deployment repeatability and renewal proof improve."
  - id: "A24"
    name: "Functional payroll allocation"
    value: "CEO 70% S&M and 30% G&A; founding and integrations engineers 100% R&D; care operations 60% R&D and 40% G&A; customer success / implementation 30% S&M, 40% R&D, 30% G&A; partnerships 80% S&M and 20% G&A; data / analytics 100% R&D; account executives 100% S&M; care coordinator 20% S&M, 40% R&D, 40% G&A; implementation manager 30% S&M, 40% R&D, 30% G&A"
    unit: "policy"
    source: "[BP team rationales; BP operations] Allocation follows who sells, who builds connectors and product, and who handles delivery and governance."
  - id: "A25"
    name: "Non-payroll operating-spend ramp"
    value: "S&M non-payroll runs about $5K monthly pre-pilot, $7K with live pilots, $8.5K with partnerships, $12K after the first AE, and $16K after the second AE; R&D tooling/cloud runs about $8K early, $10K with connectors live, $12.5K through the benchmark phase, and $15K once the third-connector build begins; G&A runs about $6K early, $7.5K with live employer data, $9K through Y2 security/compliance work, and $12K from the broader production stage onward"
    unit: "USDK"
    source: "Startup-finance heuristic for a lean enterprise health-tech software company covering cloud, travel, legal, insurance, and security-review costs without assuming a services bench."
  - id: "A26"
    name: "Repeatable deployment cadence"
    value: "45 days after the first two deployments"
    unit: "days"
    source: "[BP operatingAssumptions repeat two-connector rollout in 45 days or less; BP experimentRoadmap] The model assumes the first bespoke integrations become a repeatable implementation motion instead of permanent custom services."
  - id: "A27"
    name: "Monthly churn for unit economics"
    value: "1.5"
    unit: "percent"
    source: "[BP risks budget-owner ambiguity and incumbent pressure; Startup-finance heuristic] Annual employer contracts are sticky once embedded, but early vendor-consolidation and renewal risk still justify non-trivial churn."
  - id: "A28"
    name: "Blended CAC"
    value: "55.0"
    unit: "USDK per new paid employer"
    source: "[BP gtm channels and funnelTargets; Research distributionChannels] Founder-led direct sales plus broker, consultant, and partner introductions should keep CAC below heavy-enterprise benchmarks but still meaningful."
  - id: "A29"
    name: "Cash conversion policy"
    value: "ending cash equals opening cash plus cumulative EBITDA"
    unit: "formula"
    source: "Startup-finance heuristic: no debt, taxes, capex, or material working-capital swings are modeled for this early software business."
  - id: "A30"
    name: "Funding-sizing rule"
    value: "raise enough to reach the month-24 production and partner-proof milestone with roughly six months of buffer"
    unit: "policy"
    source: "[BP fundingAsk runwayMonths 18; BP milestones 12-24 months] The round is sized to get through 9 production employers, one benchmark report, and one partner-assisted deployment without immediately re-fundraising."
