slug: bank-pilot-readiness-os
date: '2026-05-18'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: 月
  source: '[BP date 2026-05-18] 业务计划日期后的首个完整月份。'
- id: A2
  name: 期初现金 / 模型中的 pre-seed 融资
  value: '2000.0'
  unit: USDK
  source: '[BP fundingAsk round pre-seed, targetFundingRangeUsd $2-4M, runwayMonths 18] 由于滩头切口较窄、招聘分阶段展开，模型采用偏保守的低位 $2.0M 融资。'
- id: A3
  name: 模型里的客户单位
  value: active paid program or expansion module
  unit: 定义
  source: '[BP businessModel.revenueStreams] 收入同时包含年度批次许可、实施导向的首单部署和高级治理模块，因此到 Y3 同一个银行 logo 可能贡献不止一个付费单元。'
- id: A4
  name: 第 1 年付费单元爬坡
  value: M4 first paid design partner, M9 second paid design partner, M12 exits at 2 active paid units
  unit: 节奏
  source: '[BP milestones 0-12 months] 要做到 2 个付费共创客户部署；[BP investorMemo.firstCustomer] 也把首个部署定价为付费批次项目。'
- id: A5
  name: 第 2-3 年付费单元爬坡
  value: Q1Y2 2, Q2Y2 3, Q3Y2 4, Q4Y2 5, Q1Y3 6, Q2Y3 6, Q3Y3 7, Q4Y3 8
  unit: 活跃付费单元
  source: '[BP milestones 12-24 months and 24-36 months] 加上 [Research market.som]，支持到 Y3 大致做到 6 个持续性 logo，另有 2 个来自现有账户的扩展模块。'
- id: A6
  name: 每个活跃付费单元的混合年收入
  value: Y1 $70K; Y2 $115K; Y3 $135K
  unit: USDK / 年
  source: '[BP investorMemo.firstCustomer] 给出首单 $40K-75K、年度许可 $100K-150K；[BP businessModel.expansionLevers] 增加高级治理模块，使 Y3 混合值高于只按 logo 计的 SOM 情景。'
- id: A7
  name: 收入确认规则
  value: average active paid units per period
  unit: 公式
  source: 创业公司财务经验法则：Financial Modeler 的期中上线规则；收入 = ((期初单元 + 期末单元) / 2) × 年化 ARPU ÷ 每年期数。
- id: A8
  name: 毛利率爬坡
  value: Y1 40%-60% by month; Y2 63%-68% by quarter; Y3 69%-72% by quarter
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct 70] 和 [BP operatingAssumptions] 表明，早期高触达部署会压低毛利，随后随着模板复用和导出能力增强，交付杠杆会上来。'
- id: A9
  name: 按角色计的年化全成本薪资
  value: Founder/CEO 120; founding engineer 84; head of implementations 60; compliance workflow lead 72; product engineer 78; account executive 84; customer success/ops 54
  unit: USDK / FTE / 年
  source: '[BP team] 加上创业公司财务经验法则：印度企业 SaaS pre-seed 阶段的薪酬与用工负担。'
- id: A10
  name: 招聘顺序
  value: Founder and founding engineer at M1; head of implementations M6; compliance workflow lead M8; product engineer M11; account executive M16; customer success/ops M31
  unit: 时间点
  source: '[BP team] 与 [BP strategicChoices.sequencingRationale] 都明确：先补交付和合规深度，再做更广的 GTM 招聘。'
- id: A11
  name: 非人力销售与市场费用爬坡
  value: $3K/mo in Q1Y1 rising to $11K/mo in Q4Y3
  unit: USDK / 月
  source: '[BP GTM channels and funnelTargets] 加上创始人主导企业销售的经验法则，覆盖差旅、伙伴拓展和事件驱动获客。'
- id: A12
  name: 非人力研发费用爬坡
  value: $4K/mo in Q1Y1 rising to $13K/mo in Q4Y3
  unit: USDK / 月
  source: '[BP product roadmap and operations] 覆盖云资源、工作流工具、安全加固、导入能力和证据包导出。'
- id: A13
  name: 非人力 G&A 费用爬坡
  value: $4K/mo in Q1Y1 rising to $12K/mo in Q4Y3
  unit: USDK / 月
  source: '[BP operations] 加上早期 SaaS 在法务、审计、隐私、保险和银行供应商管理上的经验法则。'
- id: A14
  name: 稳态月流失率
  value: '1.5'
  unit: 百分比
  source: 创业公司财务经验法则：这类企业工作流软件黏性较强，但切口仍窄；同时参考 [Research reportMemo.sensitivityCases] 对在位厂商打包和季节性项目风险的提醒。
- id: A15
  name: 混合 CAC
  value: '75.0'
  unit: USDK / 活跃付费单元
  source: 根据模型里 Y2-Y3 约 $452K 的 GTM 投入计算（AE 薪资、50% 创始人销售时间、20% CS onboarding 时间，以及非人力 S&M），除以 6 个净新增付费单元。
- id: A16
  name: 融资规模规则
  value: capital sized to 24-month milestone plus 6-month buffer
  unit: 规则
  source: 开发者指令加上 [BP fundingAsk runwayMonths 18]；模型拉长到 30 个月，用来覆盖里程碑验证和额外 6 个月运营缓冲。
- id: A17
  name: 现金转化简化假设
  value: cash approximates EBITDA
  unit: 经验法则
  source: 创业公司早期 SaaS 规划经验法则；默认债务、资本开支、税和营运资金波动，相对 burn 来说都不显著。
- id: A18
  name: 延后 GTM 招聘的跃迁点
  value: First dedicated AE starts in Q2Y2 only after two paid deployments and reusable templates exist
  unit: 节奏说明
  source: '[BP strategicChoices.sequencingRationale] 与 [BP milestones 12-24 months] 共同支持：只有先拿到可复用的实施证据，才在 Q2Y2 增配第一位专职 AE。'
