scenarios:
  downside:
    description: 每笔成交都比基准慢一个季度，年度批次许可之外拿不到高级扩展模块，退出时毛利率停在 67%。
    y3RevenueK: 642.0
    y3EbitdaK: -430.0
    cashLowPointK: 560.0
    keyAssumptionChanges:
    - ARPU 基本停留在研究里的 SOM 情景，而不是继续往上扩。
    - 付费单元爬坡停在 6 个活跃单元，而不是 8 个。
    - 因为部署仍偏服务化，退出毛利率比基准低 5 个点。
  base:
    description: 两个付费共创客户转成年度许可，到第 18 个月在现有账户里拿下一个常态化扩展，模型在 Y3 结束时做到约 6 个 logo、共 8 个活跃付费单元。
    y3RevenueK: 894.5
    y3EbitdaK: -271.4
    cashLowPointK: 842.9
    keyAssumptionChanges:
    - 年化 ARPU 从 $70K 的试点定价，提升到 Y3 $135K 的混合持续性单元。
    - 毛利率从 Y1 的 40%-60%，提升到 Q4Y3 的 72%。
    - 招聘按 BP 的节奏执行，首位 AE 推迟到 Q2Y2 才入职。
  upside:
    description: 银行更快把场景扩到常态化接入，两家账户再各挂上一项高级模块，退出时毛利率达到 74%。
    y3RevenueK: 1085.0
    y3EbitdaK: -135.0
    cashLowPointK: 905.0
    keyAssumptionChanges:
    - 到 Q4Y3，付费单元爬坡到 9 个活跃单元。
    - 由于高级模块挂载更好，混合 ARPU 高于基准。
    - 交付杠杆提升后，收入增长不再要求把大规模招聘提前。
sensitivity:
- variable: ARPU
  downsideCase: 由于银行只买批次工作流，Y3 混合 ARPU 停在 $120K。
  baseCase: 随着一个扩展模块进入市场，Y3 混合 ARPU 达到 $135K。
  upsideCase: 如果挂上两个高级模块，Y3 混合 ARPU 提升到 $150K。
  y3RevenueImpactK: 99.0
  cashImpactK: 71.0
- variable: CAC
  downsideCase: 由于采购和法务多出若干轮，CAC 升到 $90K。
  baseCase: 依靠创始人主导销售和转介绍，CAC 维持在 $75K。
  upsideCase: 如果孵化器和顾问渠道把管道预热好，CAC 可降到 $60K。
  y3RevenueImpactK: -35.0
  cashImpactK: -90.0
- variable: churn
  downsideCase: 由于项目仍偏季节性且扩展失败，月流失率升到 2.0%。
  baseCase: 月流失率维持在 1.5%。
  upsideCase: 一旦常态化接入嵌进账户，月流失率可降到 1.0%。
  y3RevenueImpactK: -55.0
  cashImpactK: -45.0
- variable: sales cycle
  downsideCase: 每一笔银行成交都延后一个季度。
  baseCase: 共创客户到付费部署按模型设定时间线转化。
  upsideCase: 前两个部署跑出 ROI 后，销售周期可缩短一个季度。
  y3RevenueImpactK: -160.0
  cashImpactK: -115.0
- variable: gross margin
  downsideCase: 由于模板复用不深，退出毛利率只能到 67%。
  baseCase: 退出毛利率达到 72%。
  upsideCase: 如果导出自动化更强，退出毛利率可到 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: 45.0
- variable: hiring pace
  downsideCase: 在年度许可可复制性还没被证明前，AE 和 CS 招聘就提前两个季度发生。
  baseCase: GTM 和 CS 招聘继续排在实施验证之后。
  upsideCase: 如果现有团队就能承接扩展模块，Y3 期间招聘可维持不变。
  y3RevenueImpactK: 20.0
  cashImpactK: 140.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[Bank program pipeline] --> PaidUnits[Active paid units]
      PaidUnits --> Revenue[Revenue]
      Revenue --> COGS[COGS]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA after salary and opex]
      EBITDA --> Cash[Ending cash]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入来自：Y1 的 2 个付费共创客户，爬坡到 Q4Y3 的 8 个活跃付费单元；同时随着年度许可和高级治理模块替代纯试点定价，ARPU 逐步抬升。
- checkName: 必须做对的事
  finding: 必须有一个发起项目运营方愿意拥有预算，并在第 18 个月前批准至少一个常态化扩展，因为模型更依赖 ARPU 抬升，而不是单纯多几个 logo。
- checkName: 模型失效的情况
  finding: 如果银行销售周期延后一个季度，或 ARPU 一直停在只按 logo 计算的 $100K SOM 水平附近，悲观情景下公司会因为现金太紧而难以支撑下一轮融资。
- checkName: 下一轮证明点
  finding: 只有做到 3 个年度项目许可、1 个常态化扩展，并证明试点就绪周期至少提速 25%，把 burn multiple 拉向 Y3 水平，下一轮融资才有说服力。
sanityChecks:
  ruleOf40: Y3 增长 130.4% + EBITDA 利润率 -30.3% = 100.1%
  burnMultiple: Y2 burn multiple 约 1.5x；到 Y3 改善到约 0.5x，因为更高 ARPU 的扩展开始吸收更多固定薪资。
  revenuePerFte: $127.8K Y3（低于约 $150-250K 的精简垂直 SaaS 基准，反映出银行工作流这条路径仍偏服务化）
  flags:
  - 如果至少 6 个 logo 里没有 2 家购买常态化模块，第 3 年收入就会高于研究里的 SOM 情景，说明基准情景偏乐观。
  - 按软件公司标准看，人均收入仍然偏轻，因此招聘节奏必须紧紧跟住付费年度许可转化。
  - 源材料还没有证明预算归属；如果采购或风险完全掌控支出，CAC 和成交周期大概率都会恶化。
  - 业务到 Y3 仍然是 EBITDA 负值，所以下一轮融资仍要靠更清晰的交付杠杆，而不只是表面收入增长。
