scenarios:
  downside:
    description: One-quarter slower closes, no premium expansion modules beyond annual cohort licenses, and exit gross margin stalls at 67%.
    y3RevenueK: 642.0
    y3EbitdaK: -430.0
    cashLowPointK: 560.0
    keyAssumptionChanges:
      - ARPU holds near the research SOM case instead of expanding above it.
      - Paid-unit ramp ends at 6 active units rather than 8.
      - Gross margin exits 5 points below base because deployments stay services-heavy.
  base:
    description: Two paid design partners convert into annual licenses, one in-account always-on expansion lands by month 18, and the model exits Y3 at 8 active paid units across about 6 logos.
    y3RevenueK: 894.5
    y3EbitdaK: -271.4
    cashLowPointK: 842.9
    keyAssumptionChanges:
      - Annual ARPU steps from $70K pilot pricing to $135K blended recurring units by Y3.
      - Gross margin improves from 40%-60% in Y1 to 72% by Q4Y3.
      - Hiring follows BP sequencing, with the first AE delayed until Q2Y2.
  upside:
    description: Banks expand faster into always-on onboarding, a second premium module attaches in two accounts, and gross margin reaches 74% by exit.
    y3RevenueK: 1085.0
    y3EbitdaK: -135.0
    cashLowPointK: 905.0
    keyAssumptionChanges:
      - Paid-unit ramp reaches 9 active units by Q4Y3.
      - Blended ARPU rises above base through better premium module attach.
      - Delivery leverage improves enough to add revenue without pulling forward major hires.
sensitivity:
  - variable: ARPU
    downsideCase: Blended Y3 ARPU stays at $120K because banks buy only the cohort workflow.
    baseCase: Blended Y3 ARPU reaches $135K with one expansion module in-market.
    upsideCase: Blended Y3 ARPU reaches $150K with two premium modules attaching.
    y3RevenueImpactK: 99.0
    cashImpactK: 71.0
  - variable: CAC
    downsideCase: CAC rises to $90K as procurement and legal add extra cycles.
    baseCase: CAC stays at $75K through founder-led selling and referrals.
    upsideCase: CAC falls to $60K if incubator and adviser channels warm the pipeline.
    y3RevenueImpactK: -35.0
    cashImpactK: -90.0
  - variable: churn
    downsideCase: Monthly churn rises to 2.0% because programs stay seasonal and fail to expand.
    baseCase: Monthly churn holds at 1.5%.
    upsideCase: Monthly churn drops to 1.0% once always-on onboarding embeds inside accounts.
    y3RevenueImpactK: -55.0
    cashImpactK: -45.0
  - variable: sales cycle
    downsideCase: Every bank close slips by one quarter.
    baseCase: Design-partner to paid deployment converts on the modeled timeline.
    upsideCase: One quarter comes out of the cycle after the first two deployments prove ROI.
    y3RevenueImpactK: -160.0
    cashImpactK: -115.0
  - variable: gross margin
    downsideCase: Exit gross margin reaches only 67% because template reuse remains shallow.
    baseCase: Exit gross margin reaches 72%.
    upsideCase: Exit gross margin reaches 74% with stronger export automation.
    y3RevenueImpactK: 0.0
    cashImpactK: 45.0
  - variable: hiring pace
    downsideCase: AE and CS hires are pulled forward two quarters before repeatable annual-license proof.
    baseCase: GTM and CS hiring stay sequenced behind implementation proof.
    upsideCase: Hiring remains flat through Y3 because existing team handles expansion modules.
    y3RevenueImpactK: 20.0
    cashImpactK: 140.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Bank program pipeline] --> PaidUnits[Active paid units]
      PaidUnits --> Revenue[Revenue]
      Revenue --> COGS[COGS]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA after salary and opex]
      EBITDA --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from moving from 2 paid design partners in Y1 to 8 active paid units by Q4Y3, with ARPU rising as annual licenses and premium governance modules replace pilot-only pricing.
  - checkName: Must go right
    finding: A sponsor-program operator has to own budget and approve at least one always-on expansion by month 18, because the model needs ARPU lift more than raw logo count.
  - checkName: Model breaks if
    finding: If bank sales cycles slip by a quarter or ARPU stays near the $100K logo-only SOM case, the downside scenario leaves the company too cash-constrained to support a strong next round.
  - checkName: Next-round proof
    finding: The next financing is justified only after 3 annual program licenses, 1 always-on expansion, and proof of at least 25% faster pilot-readiness cycles improve the burn multiple toward Y3 levels.
sanityChecks:
  ruleOf40: "Y3 growth 130.4% + EBITDA margin -30.3% = 100.1%"
  burnMultiple: "Y2 burn multiple ~1.5x, improving to ~0.5x in Y3 as higher-ARPU expansions absorb more fixed payroll."
  revenuePerFte: "$127.8K Y3 (below a roughly $150-250K lean vertical SaaS benchmark, reflecting a still-services-heavy bank workflow motion)"
  flags:
    - Year-3 revenue is above the research SOM case unless at least two of the six logos buy always-on modules; without that expansion, the base case is optimistic.
    - Revenue per FTE remains light for software, so hiring must stay tightly sequenced to paid annual-license conversions.
    - Budget ownership is not yet proven in the source materials; if procurement or risk fully controls spend, CAC and cycle time likely worsen.
    - The business is still EBITDA negative in Y3, so the next round still depends on clearer delivery leverage rather than pure top-line growth.
