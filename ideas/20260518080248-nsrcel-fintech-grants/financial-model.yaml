slug: bank-pilot-readiness-os
date: "2026-05-18"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-06"
    unit: month
    source: "[BP date 2026-05-18] first full month after the business-plan date."
  - id: A2
    name: Opening cash / modeled pre-seed raise
    value: "2000.0"
    unit: USDK
    source: "[BP fundingAsk round pre-seed, targetFundingRangeUsd $2-4M, runwayMonths 18] model uses a lean low-end $2.0M raise because the beachhead is narrow and hiring is staged."
  - id: A3
    name: Customer unit in the model
    value: active paid program or expansion module
    unit: definition
    source: "[BP businessModel.revenueStreams] combines annual cohort licenses, implementation-heavy first deployments, and premium governance modules, so one bank logo can contribute more than one paid unit by Y3."
  - id: A4
    name: Year 1 paid unit ramp
    value: "M4 first paid design partner, M9 second paid design partner, M12 exits at 2 active paid units"
    unit: schedule
    source: "[BP milestones 0-12 months] calls for 2 paid design-partner deployments; [BP investorMemo.firstCustomer] prices the first deployment as a paid cohort engagement."
  - id: A5
    name: Year 2-3 paid unit ramp
    value: "Q1Y2 2, Q2Y2 3, Q3Y2 4, Q4Y2 5, Q1Y3 6, Q2Y3 6, Q3Y3 7, Q4Y3 8"
    unit: active paid units
    source: "[BP milestones 12-24 months and 24-36 months] plus [Research market.som] support roughly 6 recurring logos by Y3 with 2 extra expansion modules inside existing accounts."
  - id: A6
    name: Blended annual revenue per active paid unit
    value: "Y1 $70K; Y2 $115K; Y3 $135K"
    unit: USDK per year
    source: "[BP investorMemo.firstCustomer] gives $40K-75K first deployments and $100K-150K annual licenses; [BP businessModel.expansionLevers] adds premium governance modules that lift Y3 blend above the logo-only SOM case."
  - id: A7
    name: Revenue recognition convention
    value: average active paid units per period
    unit: formula
    source: "Startup-finance heuristic named source: Financial Modeler mid-period go-live rule; revenue = ((BoP units + EoP units) / 2) × annual ARPU ÷ periods per year."
  - id: A8
    name: Gross margin ramp
    value: "Y1 40%-60% by month; Y2 63%-68% by quarter; Y3 69%-72% by quarter"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70] and [BP operatingAssumptions] imply early white-glove deployments depress margin before reusable templates and exports improve delivery leverage."
  - id: A9
    name: Loaded annual salaries by role
    value: "Founder/CEO 120; founding engineer 84; head of implementations 60; compliance workflow lead 72; product engineer 78; account executive 84; customer success/ops 54"
    unit: USDK per FTE per year
    source: "[BP team] plus startup-finance heuristic named source: India enterprise SaaS pre-seed compensation with payroll burden."
  - id: A10
    name: Hiring sequence
    value: "Founder and founding engineer at M1; head of implementations M6; compliance workflow lead M8; product engineer M11; account executive M16; customer success/ops M31"
    unit: timing
    source: "[BP team] and [BP strategicChoices.sequencingRationale] explicitly prioritize implementation and compliance depth before broader GTM hiring."
  - id: A11
    name: Non-payroll sales and marketing spend ramp
    value: "$3K/mo in Q1Y1 rising to $11K/mo in Q4Y3"
    unit: USDK per month
    source: "[BP gtm channels and funnelTargets] plus startup-finance heuristic for founder-led enterprise sales with travel, partner development, and event-driven outreach."
  - id: A12
    name: Non-payroll R&D spend ramp
    value: "$4K/mo in Q1Y1 rising to $13K/mo in Q4Y3"
    unit: USDK per month
    source: "[BP product roadmap and operations] covering cloud, workflow tooling, security hardening, imports, and evidence-packet exports."
  - id: A13
    name: Non-payroll G&A spend ramp
    value: "$4K/mo in Q1Y1 rising to $12K/mo in Q4Y3"
    unit: USDK per month
    source: "[BP operations] plus startup-finance heuristic for legal, audit, privacy, insurance, and bank-vendor overhead."
  - id: A14
    name: Steady-state monthly churn
    value: "1.5"
    unit: percent
    source: "Startup-finance heuristic for sticky but still narrow enterprise workflow software; tempered by [Research reportMemo.sensitivityCases] on incumbent bundling and seasonal program risk."
  - id: A15
    name: Blended CAC
    value: "75.0"
    unit: USDK per active paid unit
    source: "Calculated from modeled Y2-Y3 GTM spend of roughly $452K (AE payroll, 50% founder selling time, 20% CS onboarding time, and non-payroll S&M) divided by 6 net new paid units."
  - id: A16
    name: Funding sizing rule
    value: capital sized to 24-month milestone plus 6-month buffer
    unit: policy
    source: "Developer instruction plus [BP fundingAsk runwayMonths 18]; the model stretches to 30 months to cover milestone proof and six more months of operating buffer."
  - id: A17
    name: Cash conversion simplification
    value: cash approximates EBITDA
    unit: heuristic
    source: "Startup-finance heuristic for early-stage SaaS planning; debt, capex, taxes, and working-capital swings are assumed immaterial relative to burn."
  - id: A18
    name: Delayed GTM hire step-change
    value: "First dedicated AE starts in Q2Y2 only after two paid deployments and reusable templates exist"
    unit: schedule note
    source: "[BP strategicChoices.sequencingRationale] and [BP milestones 12-24 months] justify the sharp payroll step-up after repeatable implementation evidence."
