    - 28
  - point: Templates tuned to Indian digital-lending, outsourcing, privacy, and AA requirements could compound into reusable implementation IP across similar programs.
    sourceRefs:
    - 7
    - 9
    - 10
    - 11
    - 15
  geographicConsiderations:
  - point: The first market should stay India-focused because RBI rules, AA rails, and sponsor-bank program formats are all locally specific.
    sourceRefs:
    - 7
    - 10
    - 11
    - 13
    - 15
  - point: Initial GTM is likely concentrated around large private-bank and incubator ecosystems in Bengaluru, Mumbai, and Delhi rather than spread evenly across all Indian banks.
    sourceRefs:
    - 1
