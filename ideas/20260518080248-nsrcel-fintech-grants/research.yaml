    - 5
    - 14
  sensitivityCases:
  - case: Bank-backed fintech programs remain annual or semi-annual only
    impact: Revenue becomes seasonal and the standalone beachhead stays too small unless the product expands into always-on partner onboarding.
    sourceRefs:
    - 1
