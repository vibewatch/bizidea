  validationPlan:
  - priority: high
    question: How many Indian private banks or bank-backed incubators actually push more than two fintech startups per year into live pilots?
    evidenceToGather: Buyer interviews, cohort rosters, and pilot conversion data from NSRCEL-, RBIH-, and bank-sponsored programs.
  - priority: high
    question: 'Who really owns the budget: innovation, partnerships, CSR, procurement, or risk?'
    evidenceToGather: Budget-owner interviews, implementation scoping calls, and post-demo-day operating review documents.
  - priority: medium
    question: Which evidence packet is truly reusable across lending, payments, and insurance startups versus still bespoke for each bank?
    evidenceToGather: Redacted pilot checklists, bank vendor-onboarding templates, and founder-side security questionnaire exports.
