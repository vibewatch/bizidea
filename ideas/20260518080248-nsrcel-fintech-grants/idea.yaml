topRisks:
  - name: Budget owner ambiguity
    description: Innovation teams, CSR programs, incubators, and risk groups may each value the product but assume another budget should pay for it.
    mitigation: Sell around cohort-to-pilot conversion KPIs, start with sponsor-program budgets, and prove ROI through faster pilot launch and fewer stalled startups.
  - name: Episodic cohort volume
    description: If the product stays limited to annual accelerator cohorts, usage could look too seasonal for a large software business.
    mitigation: Expand the same workflow into always-on startup-partner onboarding, vendor reviews, and pilot governance inside the same bank accounts.
  - name: Enterprise adoption drag
    description: Bank control teams may resist adding another tool if they already use project management or vendor-risk systems.
    mitigation: Position the product as an overlay for pre-production readiness, integrate with existing systems, and win first in a single sponsor program before broader rollout.
