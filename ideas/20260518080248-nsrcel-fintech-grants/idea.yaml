jobsToBeDone:
  - job: >-
      When we select a startup for our bank-backed fintech program, help our
      team clear every approval and evidence gap before pilot kickoff, so we
      can turn cohort slots into live partnerships instead of demo-day theater.
    currentAlternative: Shared drives, WhatsApp and email follow-ups, and manual tracker sheets
    successMetric: Days from cohort selection to approved pilot kickoff
  - job: >-
      When our sponsor program promises measurable business outcomes, help us
      see which startup is blocked on compliance, security, or KPI definition,
      so we can intervene before grant money and mentor time are wasted.
    currentAlternative: Weekly status calls and anecdotal founder updates
    successMetric: Pilot-conversion rate and percentage of blockers resolved within SLA
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The cluster gives a concrete same-day signal that sponsor-backed fintech programs are funding post-demo execution, though evidence is still single-source.
  painIntensity:
    score: 4
    rationale: Failed pilot conversion wastes grants, sponsor time, and scarce partnership opportunities, but the bottleneck is operational rather than existential.
  wedgeClarity:
    score: 5
