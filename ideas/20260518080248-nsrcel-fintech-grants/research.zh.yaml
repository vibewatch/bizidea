  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品依赖集成、监管模板和买方审批流程，但没有任何单一上游厂商能卡住整条工作流。真正的约束更多来自银行安全和数据访问，而不是供应商集中度。
      sourceRefs:
      - 7
      - 9
      - 10
      - 23
      - 25
    buyerPower:
      score: 4
      rationale: 滩头买方集中在少数民营银行和发起项目手里，而且他们完全可以退回手工流程或相邻工具。
      sourceRefs:
      - 1
      - 3
      - 4
      - 5
      - 17
      - 31
    threatOfEntrants:
      score: 3
      rationale: 工作流软件本身并不难做，但银行信任、印度本地监管映射和多方证据设计，仍然构成中等强度的进入门槛。
      sourceRefs:
      - 7
      - 9
      - 15
      - 21
      - 22
    threatOfSubstitutes:
      score: 5
      rationale: 邮件、表格、加速器软件、初创公司合规工具、顾问和大型 TPRM 套件，都能覆盖这条流程的某一部分，因此替代威胁很强。
      sourceRefs:
      - 21
      - 23
      - 25
      - 28
      - 31
    competitiveRivalry:
      score: 4
      rationale: 预算重叠是真实存在的，因为批次工具、信任平台和 TPRM 套件都在争夺同一笔“让伙伴变得可审”的预算。
      sourceRefs:
      - 23
      - 25
      - 27
      - 29
      - 31
  pestle:
  - factor: 政治
    impact: positive
    point: 公共和准公共机构仍在通过 RBIH 和银行关联创业计划推动金融创新，这给试验提供了自上而下的支持。
    sourceRefs:
    - 3
    - 14
  - factor: 经济
    impact: positive
    point: 印度金融科技与风险投资活动仍有足够体量，即使融资较 2021 年高点更克制，银行依旧愿意经营精选的初创合作管道。
    sourceRefs:
    - 19
    - 20
  - factor: 社会
    impact: positive
    point: 金融普惠和可量化结果的叙事，让发起银行项目更倾向支持那些能证明自己已准备好的初创公司，而不是只会讲故事的团队。
    sourceRefs:
    - 1
    - 2
    - 14
  - factor: 技术
    impact: positive
    point: AA 轨道、sandbox 和 API 密集型金融科技模式，让试点就绪工作变得更数据化、更可复用，也抬高了结构化证据工作流的价值。
    sourceRefs:
    - 11
    - 12
    - 13
    - 16
  - factor: 法律
    impact: negative
    point: 数字借贷、外包和隐私规则会增加合规负担，也会拖慢那些没有可审计证据链的试点。
    sourceRefs:
    - 7
    - 9
    - 10
    - 15
  adoptionFrictionMatrix:
  - friction: 创新、CSR、合作和风险之间的预算归属模糊
    severity: 高
    affectedBuyer: 金融科技合作或项目运营负责人
    mitigation: 别卖抽象创新价值，直接围绕试点转化 SLA 和结果复盘成交。
    sourceRefs:
    - 1
    - 3
    - 5
  - friction: 当初创公司材料进入受监管流程时，安全和数据共享顾虑会放大
    severity: 高
    affectedBuyer: 风险、合规和信息安全相关方
    mitigation: 把产品定位成可导出证据包的叠加层，并强调它与现有 TPRM/合规工具共存。
    sourceRefs:
    - 7
    - 9
    - 10
    - 23
  - friction: 批次数量具有季节性或阶段性
    severity: 中
    affectedBuyer: 项目发起方
    mitigation: 把同一套工作流扩到常态化第三方接入和试点治理。
    sourceRefs:
    - 1
    - 4
    - 5
    - 17
  - friction: 创始人如果已经在用信任/合规工具，就会担心重复录数
    severity: 中
    affectedBuyer: 初创公司创始人或合规负责人
    mitigation: 尽量复用既有系统里的问卷答案、控制库和信任材料。
    sourceRefs:
    - 25
    - 29
market:
