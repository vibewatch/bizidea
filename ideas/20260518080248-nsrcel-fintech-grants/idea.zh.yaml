topRisks:
- name: 预算归属不清
  description: 创新团队、CSR 项目、孵化器和风险部门都可能认可这款产品的价值，但每一方都可能以为该由别人出预算。
  mitigation: 围绕批次到试点的转化 KPI 去卖，先从发起项目预算切入，再用更快启动试点、减少卡住项目来证明 ROI。
- name: 批次量是阶段性的
  description: 如果产品始终只服务年度加速器批次，使用频率会显得过于季节性，撑不起一家大的软件公司。
  mitigation: 把同一套工作流扩到同一家银行里的常态化初创伙伴接入、供应商评审和试点治理。
- name: 企业采用阻力大
  description: 如果银行控制团队已经在用项目管理或供应商风险系统，他们可能不愿再多上一套工具。
  mitigation: 把产品定位成正式上线前的就绪叠加层，接入现有系统，先在单个发起项目里拿下，再逐步推广。
