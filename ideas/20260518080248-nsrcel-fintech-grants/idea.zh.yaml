jobsToBeDone:
- job: 当我们为银行支持的金融科技项目选出一家初创公司后，帮团队把所有审批和证据缺口在试点启动前补齐，这样批次名额才能真正变成在线合作，而不是停留在 demo day。
  currentAlternative: 共享盘、WhatsApp 和邮件跟进、以及手工维护的追踪表
  successMetric: 从批次入选到试点获批启动的天数
- job: 当发起方项目承诺要交付可量化业务结果时，帮我们看清哪家初创公司卡在合规、安全还是 KPI 定义上，这样资助资金和导师时间就不会白白耗掉。
  currentAlternative: 每周状态会和创始人口头更新
  successMetric: 试点转化率，以及在 SLA 内解决的卡点占比
