- point: 同一批次覆盖借贷、支付、保险、财富科技、监管科技和嵌入式金融，说明这不是一次性的细分痛点，而是可复制的横向就绪问题。
  signalRefs:
  - 跨赛道批次说明流程可以复用
  sourceRefs:
