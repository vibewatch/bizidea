differentiator: 通用加速器软件只管日程和导师，银行供应商风险工具又默认合作方已经是成熟供应商。这家公司卡在两者之间缺失的那一层：一家有潜力的金融科技公司要在 8-16 周内，让银行控制职能看得懂、审得过，同时又不能把势头耗没。它的护城河来自按金融科技品类沉淀的就绪模板、不断累积的“哪些卡点会杀死试点”数据，以及同时服务发起方与创业公司的双边工作流，而不是只偏一边。
