problem: 印度由银行发起的金融科技项目很会找项目、办 demo day，但很多入选公司在真正试点前就卡住，因为产品材料、合规答复、安全文档和成功指标散落在邮件、共享盘和导师电话里。发起银行、孵化器和创始人各自看到的卡点都不一样，结果大家把几周时间都耗在补证据上，而不是把路打通到正式上线。等资助和引荐开始跟可量化结果挂钩，真正的瓶颈就不再是发现初创公司，而是试点就绪。
targetUser:
  primary: 印度民营银行或银行支持的金融科技卓越中心里，负责把批次中的初创公司推进成首个试点的项目总监、合作负责人和靠近风险条线的运营人员
  secondary: 入选发起方银行合作项目的印度 Seed 到 Series A 金融科技初创公司里的创始人和合规负责人
  buyer: 在民营银行、银行基金会或运营该批次的孵化器里，负责金融科技合作、创新或项目运营的负责人
startupThesis:
  nonObviousInsight: 一旦金融科技项目开始叠加资助、监管资源和结果导向支持，稀缺资源就不再是找项目，而是把入选的初创公司推进成银行愿意放行的试点，并让风险、法务和合规相关方拿到足够证据点头。
  beachhead: 先切入每年运营 10-20 家初创公司批次的印度民营银行和银行支持的金融科技卓越中心，从借贷和支付初创公司开始——这些公司在首个正式上线或真实试点前，需要先过发起银行的风险、信息安全、法务和监管沟通关。
  wedge: 一套共享的试点就绪工作台，把每家入选初创公司的产品、控制项和 KPI 计划映射到发起方的审批清单上，把卡点分给正确责任人，并输出一份可审计的银行试点材料包。
  whyNowCatalyst: NSRCEL 与 HDFC Bank Parivartan 已明确给初创公司拨资助，并把支持和可量化业务结果挂钩，这让“批次必须转成真实合作”这一刻的软件需求一下子变得很急。
  ventureScalePath: 先从印度银行支持的金融科技批次切入，再扩到 NBFC、保险公司和大型企业-初创公司合作项目，最终成为受监管金融机构在第三方接入、试点治理和持续伙伴风险监控上的操作层。
solution: 产品为发起银行、孵化器、初创公司、导师和所有参与试点的控制职能部门搭一个共享工作台。每家初创公司都有一张就绪图谱，覆盖产品流程、API 依赖、安全材料、合规文件、利益相关方审批和约定好的试点 KPI。它不是一个泛泛的数据室，而是把缺失项直接变成工作流：有明确责任人、有截止时间、也有银行与初创公司之间的升级路径。系统还会持续维护一张动态记分卡，显示这家公司是否已经准备好去见监管、申请 sandbox、启动试点，以及继续推进投资人后续沟通。时间拉长后，产品还能沉淀出哪些就绪缺口最常拖慢银行试点，并帮助发起方在批次名额被浪费前先出手。
goToMarketSeed:
  firstCustomer: 首个客户应是印度前十民营银行或银行支持的孵化器里的合作与项目运营团队：他们运营一个 10 家金融科技初创公司的批次，其中 2-3 家借贷或支付公司要在 90 天内启动试点。
  buyingTrigger: 一旦发生批次入选、demo day 或资助发放，发起方就被迫在下一次董事会、CSR 或创新评审前，把候选初创公司变成可量化的试点结果。
  currentAlternative: 邮件、表格、共享盘、创业公司自己维护的数据室，以及项目经理、创始人和外部导师临时拼出来的清单
  switchingReason: 这套切口能赢过现状，因为它给所有相关方一张就绪地图、一个卡点工作流和一份统一证据包，在不要求银行替换现有供应商风险或项目管理系统的前提下，把“入选到试点启动”的时间压短。
  pricingHypothesis: 按活跃批次初创公司数量和真实试点数量收取年度项目许可费；监管会议、供应商风险评审和生产上线治理等流程模块另行增购。
