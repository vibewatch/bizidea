problem: >-
  致力于将宫颈癌筛查延伸至设备完善医院之外的机构，仍依赖集中实验室、纸质登记册
  和人工随访。一旦快速无实验室 HPV 检测成为现实，瓶颈就从化验周转时间转移到运营层面：
  登记每次检测、采集可信结果、将阳性患者导入转诊流程、证明随访在分散站点间确实发生。
  这些环节一旦断裂，同次就诊筛查便失去价值，高危患者仍在检测后消失无踪。
targetUser:
  primary: "女性健康诊所网络和 NGO 或公共卫生资助的宫颈筛查运营者的筛查项目主任，管理着分散的外展站点。"
  secondary: "同一筛查项目中的站点督导、护士负责人和转诊协调员。"
  buyer: "筛查项目主任、COO 或医疗运营负责人"
startupThesis:
  nonObviousInsight: >-
    无实验室分子诊断带来的首个软件大赢家，或许不是另一款诊断应用或实验室系统。
    当 PCR 级 HPV 检测可在约 30 分钟内随处完成，新的卡点就变成现场操作层——
    把一个结果转化为完成的转诊和可审计的项目产出。
  beachhead: >-
    运营 20 至 100 个卫星站、药店、流动站或社区站点的女性健康筛查网络，
    这些站点无法稳定将 HPV 检测样本送至中心实验室，
    阳性患者常在筛查与随访之间消失。
  wedge: >-
    去中心化 HPV 筛查运营系统：登记检测、采集结果、执行站点规范，并在
    低基础设施筛查站点间触发当天转诊与随访工作流。
  whyNowCatalyst: >-
    Intu 的融资与试制生产推进让无实验室 HPV 检测从科研故事变成即将落地的现实；
    30 分钟随处出结果的格式同时制造紧迫感——工作流层需要立即搭建，
    才能在真实项目中守住这一速度优势。
  ventureScalePath: >-
    从 HPV 筛查部署起步，随着 LAB-TO-GO 类平台从诊所延伸至居家和资源匮乏场景，
    将同一运营层扩展至其他去中心化女性健康和传染病分子诊断项目。
solution: >-
  Rapid HPV Screening Ops 为每个去中心化筛查站点提供轻量工作流应用和督导仪表盘。
  工作人员在同一流程中登记每个试剂盒、记录结果，并启动下一步规范动作——
  患者咨询、预约转诊或随访外展——无需依赖纸质记录和电话回访。
  项目负责人可跨网络查看库存水平、无效检测率、各站点完成情况、阳性结果队列和
  转诊闭环情况。第一版明确定位为部署与随访操作系统，而非诊断解读产品，
  让切口保持可衡量且聚焦运营。随着时间推移，它将成为多病种去中心化
  分子筛查项目的系统档案。
goToMarketSeed:
  firstCustomer: >-
    捐助资助或私营女性健康筛查网络，正在 20 个以上流动站、药店或卫星站点推进快速
    HPV 试点，并在没有中心实验室工作流的情况下难以追踪结果采集和转诊完成。
  buyingTrigger: >-
    新的快速 HPV 试点、赠款资助的筛查扩展，或领导层推动降低宫颈癌阳性筛查后失访率。
  currentAlternative: >-
    纸质登记册、电子表格、通用电子病历记录、基础 LIS 导出，以及由站点工作人员操作
    的人工电话或短信随访。
  switchingReason: >-
    产品在保全无实验室检测速度与覆盖范围的同时，免除运营方在每个新站点手工搭建
    结果采集、质量追踪和转诊管理工作流的负担。
  pricingHypothesis: >-
    年度按站点 SaaS 费用加按完成筛查案例的使用计费，并提供转诊分析和多项目
    报告的高级模块。
