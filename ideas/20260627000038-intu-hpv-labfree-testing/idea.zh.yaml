topRisks:
  - name: "硬件采用依赖风险"
    description: "若无实验室 HPV 平台的监管或商业化进展慢于预期，软件切口可能在足够客户准备好之前提前到来。"
    mitigation: "从可支持任何快速 HPV 推广的试点和工作流工具入手，随后跟随率先实际部署的诊断平台一同扩展。"
  - name: "采购周期拖沓"
    description: "筛查项目、NGO 和诊所网络的预算周期可能较慢，且医疗、运营和资助方等利益相关者的决策分散。"
    mitigation: "将每笔销售锚定在有具体 KPI 归属的实际推广事件上，辅以站点级 ROI 指标（如转诊完成率和无效检测降幅），并将部署支持与软件打包销售。"
  - name: "工作流碎片化"
    description: "转诊路径因站点和地域差异显著，僵化的产品可能沦为昂贵的定制服务，而非可复制的软件。"
    mitigation: "第一个产品围绕可配置规范模板设计，将初始 ICP 收窄到具备可复制工作流的多站点项目，而非一次性定制试点。"
