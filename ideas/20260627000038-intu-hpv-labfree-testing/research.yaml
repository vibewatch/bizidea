competitors:
- name: Roche navify Cervical Screening
  stage: incumbent
  wedge: Organized cervical-screening program software tied to Roche's broader cervical portfolio.
  pricing: Custom enterprise / not public
  strength: Purpose-built screening positioning, security posture, and proximity to a major HPV diagnostics portfolio.
  weaknessVsUs: More naturally aligned to organized screening programs and Roche-centric ecosystems than to a vendor-neutral decentralized ops layer spanning mixed site types.
  sourceRefs:
  - 20
  - 22
- name: Dimagi CommCare
  stage: scale-up
  wedge: Offline-first configurable workflow platform for frontline programs.
  pricing: Custom / platform subscription
  strength: Battle-tested offline execution, fast form and case workflow configuration, and strong field credibility.
  weaknessVsUs: Requires cervical-specific protocol design, referral analytics, and integrations to be layered on through implementation work.
  sourceRefs:
  - 15
  - 16
- name: DHIS2 toolkit / tracker ecosystem
  stage: incumbent
  wedge: Public-sector reporting, supervision, and case-tracking backbone.
  pricing: Open-source; implementation-led
  strength: Common in public health, extensible, and already part of many reporting environments.
  weaknessVsUs: Better at reporting and supervision than at same-visit workflow control and referral closure at decentralized edges.
  sourceRefs:
  - 17
  - 18
- name: CCSM CDS Tools
  stage: open-source
  wedge: Standards-based cervical screening logic embedded into EHR workflows.
  pricing: Open-source
  strength: Clinically rigorous, interoperable, and attractive where EHR integration is already strong.
  weaknessVsUs: Guideline logic is not the same thing as field deployment orchestration across outreach, pharmacy, or mobile sites.
  sourceRefs:
  - 27
  - 34
- name: Cepheid / GeneXpert HPV ecosystem
  stage: incumbent
  wedge: Near-point-of-care assay platform that can anchor decentralized HPV programs.
  pricing: Instrument plus consumables; workflow economics not public
  strength: Strong assay brand and fast turnaround that make same-visit workflows valuable.
  weaknessVsUs: Owns the test, not the full cross-site referral and follow-up operating layer buyers still need.
  sourceRefs:
  - 21
  - 13
