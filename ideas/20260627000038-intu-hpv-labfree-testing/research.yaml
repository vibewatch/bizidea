openQuestions:
- Which initial geography has the best mix of organized screening budgets, decentralized site density, and tractable data-sharing rules?
- Will diagnostic OEMs expose enough event, serial, and result data to automate reconciliation instead of forcing manual entry?
- How often can buyers procure workflow software outside grant-funded pilots, and what KPI threshold unlocks that spend?
- Can the first release stay clearly outside medical-device classification while still automating protocol next-best-actions?
