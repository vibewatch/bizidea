    - 25
  - point: Donor- and NGO-backed deployments where CHAI, Unitaid, or similar implementers are already funding screen-and-treat scale-up.
    sourceRefs:
    - 12
    - 13
    - 14
  partnershipEcosystem:
  - point: Diagnostic manufacturers are natural channel partners because rapid-HPV value erodes if positives are not routed into action quickly.
    sourceRefs:
    - 20
