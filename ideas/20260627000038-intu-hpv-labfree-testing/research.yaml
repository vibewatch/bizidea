  adoptionFrictionMatrix:
  - friction: Grant-driven procurement slows decision cycles
    severity: high
    affectedBuyer: Public-health and NGO screening operators
    mitigation: Package the product around rollout milestones and measurable follow-up KPIs, not generic digital transformation language.
    sourceRefs:
    - 12
    - 13
  - friction: Offline identity and sync failures can create duplicate or missing episodes
    severity: high
    affectedBuyer: Mobile and community screening sites
    mitigation: Design offline-first with deterministic sync, local queues, and simple supervisory exception handling.
