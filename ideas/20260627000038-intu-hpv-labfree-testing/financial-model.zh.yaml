scenarios:
  downside:
    description: 采购周期延迟两个季度、试点转生产转化偏弱，使公司实施比重更高。
    y3RevenueK: 2140
    y3EbitdaK: -560
    cashLowPointK: 120
    keyAssumptionChanges:
      - 第 3 年第 4 季度付费项目期末数为 15 而非 20。
      - 每活跃项目混合季度收入比基准低约 10%，因为站点扩展更慢。
      - 毛利率比基准低 5 个百分点，因为入驻仍较定制化。
  base:
    description: 两个第一年试点完成转化，直接销售验证切口，一个渠道在第 2 年开始贡献业绩。
    y3RevenueK: 2937
    y3EbitdaK: -180.6
    cashLowPointK: 194.2
    keyAssumptionChanges:
      - 付费项目数第 4 季度第 2 年达到 10 个，第 4 季度第 3 年达到 20 个。
      - 随部署跨站点扩展，每活跃项目季度收入从 $36K 升至 $49K。
      - 集成和手册将交付模板化后，毛利率进入低 70% 区间。
  upside:
    description: OEM 和实施商渠道缩短周期，在不带来大规模支持压力的情况下实现更快的多站点扩展。
    y3RevenueK: 3520
    y3EbitdaK: 180
    cashLowPointK: 720
    keyAssumptionChanges:
      - 第 4 季度第 3 年付费项目期末数达到 24 而非 20。
      - 附加分析模块提前落地，每活跃项目季度收入比基准高约 8%。
      - 集成复用更早到来，毛利率比基准高 3 个百分点。
sensitivity:
  - variable: ARPU
    downsideCase: 第 3 年混合年化 ARPU 降至每项目约 $132K
    baseCase: 每项目约 $147K
    upsideCase: 每项目约 $159K
    y3RevenueImpactK: -294
    cashImpactK: -215
  - variable: CAC
    downsideCase: 直接销售仍以创始人为主，CAC 升至约 $90K
    baseCase: 约 $83.2K
    upsideCase: 渠道来源交易使 CAC 降至约 $62K
    y3RevenueImpactK: 0
    cashImpactK: -255
  - variable: churn
    downsideCase: 试点滑落和预算重置导致月度流失率 3.0%
    baseCase: 月度流失率 2.0%
    upsideCase: 年度合同粘性更强，月度流失率 1.5%
    y3RevenueImpactK: -220
    cashImpactK: -170
  - variable: 销售周期
    downsideCase: 试点转生产转化延迟 2 个季度
    baseCase: 试点验证在 6–9 个月内完成转化
    upsideCase: 渠道协助使转化提前 1 个季度
    y3RevenueImpactK: -480
    cashImpactK: -330
  - variable: 毛利率
    downsideCase: 第 3 年毛利率上限约 65%
    baseCase: 约 70%
    upsideCase: 约 73%
    y3RevenueImpactK: 0
    cashImpactK: -150
  - variable: 招聘节奏
    downsideCase: 第 2 年商业和实施岗位提前 2 个季度到岗
    baseCase: 招聘遵循实施优先计划
    upsideCase: 一个非关键岗位推迟至种子后融资时机
    y3RevenueImpactK: 90
    cashImpactK: -185
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Programs[Paid programs] --> Sites[Active screening sites]
      Sites --> Episodes[Completed screening episodes]
      Episodes --> Revenue[Site + episode revenue]
      Revenue --> GrossProfit[Gross profit after implementation and support]
      GrossProfit --> Cash[Operating cash runway]
      Programs --> Renewals[Pilot to production conversion]
      Renewals --> Revenue
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形收入由将两个第一年试点转化为第 4 季度第 2 年 10 个、第 4 季度第 3 年 20 个付费项目驱动，年化 ARPU 约 $147K。
  - checkName: 必须做到
    finding: 试点验证必须在 6–9 个月内完成转化，才能让 OEM 和实施商渠道降低 CAC，而非增加另一层缓慢的采购环节。
  - checkName: 模型崩塌条件
    finding: 若买家默认选择 DHIS2 或 CommCare 加本地集成商，且销售周期延迟两个季度，悲观情形将几乎耗尽现金缓冲。
  - checkName: 下轮融资验证点
    finding: 种子轮故事在第 4 季度第 2 年展示 10 个付费项目、两次生产转化、一个有效渠道，以及通向第 3 年第 4 季度正 EBITDA 的路径时最为有力。
sanityChecks:
  ruleOf40: 第 3 年增长率 166.5% + EBITDA 利润率 -6.1% = 160.4%
  burnMultiple: 第 2 年烧钱倍数 1.1x，随着试点转化为更广的生产部署，第 3 年改善至 0.1x。
  revenuePerFte: 第 3 年 $267K（使用第 4 季度第 3 年人数，SaaS 行业基准 $200–400K）。
  flags:
    - 基准情形假设赠款或推广支持的预算按时释放；若公共卫生采购停滞，没有自助式需求引擎作为支撑。
    - 毛利率只有在入驻和规范配置模板化而非定制化时才能达标。
    - 第 3 年收入接近研究得出的 $3.0M SOM，种子后上行空间依赖相邻筛查工作流扩展或各项目内部更快的站点增长。
