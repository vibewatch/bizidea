slug: rapid-hpv-screening-ops
date: '2026-06-27'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-27] 模型从业务计划日期后的第一个完整月份开始。'
  - id: A2
    name: 初始资金 / 种子前融资
    value: $2.4M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2–4M + BP fundingAsk runwayMonths 18] 基准情形采用下中位数种子前融资，规模覆盖 18 个月计划加 6 个月缓冲。'
  - id: A3
    name: 初始付费项目数
    value: '0'
    unit: count
    source: '[BP milestones 0-12 months + BP experimentRoadmap] 公司从收入前阶段起步，需先完成付费试点签约。'
  - id: A4
    name: 付费项目定义
    value: 针对一个多站点 HPV 筛查运营方的付费试点或生产部署
    unit: definition
    source: '[BP businessModel.revenueStreams + BP investorMemo.firstCustomer.initialContract] customersEop 计入任何已为试点或生产范围付费的运营方。'
  - id: A5
    name: 第一年试点收入实现
    value: 活跃付费项目上线后每月每项目 $10K–$12K
    unit: USD/program/month
    source: '[BP investorMemo.firstCustomer.initialContract $40k-$120k + BP gtm.pricing] 早期收入建模为付费试点和有限生产收入，分摊至第一年客户的活跃月份。'
  - id: A6
    name: 第 2–3 年每活跃项目混合生产收入
    value: 每季度 $36K–$49K（年化 $144K–$196K）
    unit: USD/program/quarter
    source: '[BP gtm.pricing 年度按站点 SaaS 加按完成筛查案例计费 + BP businessModel.expansionLevers + Research market.som $3.0M] 随试点转化、站点扩展和模块附加，每项目收入提升，同时将第三年收入控制在研究 SOM 以下。'
  - id: A7
    name: 客户增长节奏
    value: 第 12 个月 3 个付费项目，第 4 季度第 2 年 10 个，第 4 季度第 3 年 20 个
    unit: customersEop
    source: '[BP milestones + BP gtm.funnelTargets + Research reportMemo.buyingTriggers] 基准情形假设两个第一年付费试点转化，验证后渠道协助部署加速。'
  - id: A8
    name: 收入确认惯例
    value: 当期收入 = customersEop × 该期每活跃付费项目的混合已实现收入
    unit: formula
    source: '[BP gtm.pricing + BP businessModel.unitOfValue] 保持收入与付费项目数和套餐组合直接挂钩。'
  - id: A9
    name: 毛利率爬坡
    value: 第 1 年 45%–55%，第 2 年 60%–66%，第 3 年 68%–72%
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryTechnicalConstraints] 早期部署在工作流模板化之前承载较重的现场支持、集成和合规拖累。'
  - id: A10
    name: 招聘时间线
    value: M1 创始人/运营者和技术联合创始人；M4 临床实施负责人；M5 集成工程师；M7 合作伙伴销售；M10 客户成功/运营；M11 第二工程师；M16 行政/合规；M20 第二临床负责人和第二销售；M28 第三工程师
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale] 团队先以实施为重，在试点验证后再扩充渠道能力。'
  - id: A11
    name: 创始人/产品实施薪酬（含附加）
    value: $150K
    unit: USD/year
    source: '[BP team Product / implementation founder + startup-finance heuristic] 精简的创始人薪酬，含薪资税和福利。'
  - id: A12
    name: 工程薪酬（含附加）
    value: $180K
    unit: USD/year
    source: '[BP team Founding eng + startup-finance heuristic] 反映种子前现金水平下有经验的应用与工作流工程人才的市场水平。'
  - id: A13
    name: 集成工程师薪酬（含附加）
    value: $175K
    unit: USD/year
    source: '[BP team Backend / integration eng + startup-finance heuristic] 集成人才需处理 OEM、DHIS2 和本地记录互操作性。'
  - id: A14
    name: 临床实施薪酬（含附加）
    value: $135K
    unit: USD/year
    source: '[BP team Clinical implementation lead + startup-finance heuristic] 反映规范梳理、培训和推广管理的市场水平。'
  - id: A15
    name: 销售/合作伙伴薪酬（含附加）
    value: $170K
    unit: USD/year
    source: '[BP team Partnerships / enterprise seller + BP gtm.channels + startup-finance heuristic] 含早期企业和渠道销售的差旅和浮动薪酬。'
  - id: A16
    name: 客户成功/运营薪酬（含附加）
    value: $120K
    unit: USD/year
    source: '[BP operations + startup-finance heuristic] 支持入驻、支持和 KPI 评审，但不建立服务团队。'
  - id: A17
    name: 行政/合规薪酬（含附加）
    value: $110K
    unit: USD/year
    source: '[Research regulatoryTechnicalConstraints + startup-finance heuristic] 覆盖隐私、合同、审计支持和核心后台职能。'
  - id: A18
    name: 薪资分配至损益科目
    value: 创始人 40% 销售市场 / 35% 研发 / 25% 行政；工程和集成 100% 研发；临床实施 50% 销售市场 / 50% 研发；销售 100% 销售市场；客户成功 70% 销售市场 / 30% 行政；行政/合规 100% 行政
    unit: allocation
    source: '[BP team role rationales + BP operations] 将人力成本映射至市场拓展、产品和管理费用科目。'
  - id: A19
    name: 非薪资运营支出爬坡
    value: 第 1 年初每月 $18K，第 3 年第 4 季度升至每月 $53K
    unit: USD/month
    source: '[BP operations + Research regulatoryTechnicalConstraints + startup-finance heuristic] 覆盖云服务、差旅、法务、保险、培训和监管尽调，不假设建立大型现场服务团队。'
  - id: A20
    name: 现金转换惯例
    value: 现金变动 = EBITDA
    unit: formula
    source: '[startup-finance heuristic] 种子前规模下，资本支出、税务、债务偿还和营运资金时序均假设为可忽略不计。'
  - id: A21
    name: 稳态月度流失率
    value: '2.0'
    unit: percent per month
    source: '[startup-finance heuristic for early workflow SaaS] 年度合同和工作流粘性支持低流失率，但公共卫生采购风险使模型不假设成熟企业级留存水平。'
  - id: A22
    name: CAC 计算惯例
    value: 第 2–3 年销售市场支出除以 17 个净新增付费项目
    unit: formula
    source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 覆盖公司开始超越首批试点扩展后的创始人主导和渠道协助获客。'
  - id: A23
    name: 下轮融资里程碑
    value: 到第 4 季度第 2 年，达到 10 个付费项目、至少 2 个试点转生产转化、1 个可复制的 OEM 或实施商渠道；融资含超出该里程碑的 6 个月缓冲
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk runwayMonths 18 + BP investorMemo.nextDiligence] 本轮融资规模旨在达到种子轮就绪验证并保留第 3 年扩展缓冲。'
