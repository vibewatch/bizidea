slug: rapid-hpv-screening-ops
date: '2026-06-27'
executiveSummary: >-
  Rapid HPV Screening Ops 是面向女性健康筛查运营者的工作流平台，服务对象为在 20 至 100
  个卫星站、流动站、药店或社区站点推进去中心化快速 HPV 项目的运营方。产品的核心任务不是
  诊断解读，而是让每一次筛查案例从检测登记到结果采集、咨询、转诊、随访全程可审计。初始
  滩头市场是捐助资助或私营诊所网络，因为这些项目有明确的推广事件、可衡量的 KPI，以及足够
  的站点重复性来支撑产品化而非定制服务。GTM 从高触达部署起步，以转诊闭环改善、失访率降低
  和无效案例减少作为销售锚点，而非泛化的分析售卖。产品路径始终保持厂商中立和运营侧定位，
  首版可与多种检测及报告环境互操作，同时避免触碰诊断软件的监管负担。主要反向风险包括硬件
  采用时机、公共卫生采购周期，以及 OEM 是否能开放足够的事件数据来减少人工录入。研究支持
  约 $120.0M 的可服务市场规模，以及建模得出的第三年 $3.0M SOM，足以支撑纪律性的种子前
  切入，但尚不足以支持全面类目圈地。需要进一步核实的关键事项包括真实报销行为、OEM 数据
  共享意愿，以及买家是否会从运营预算、赠款预算或诊断推广预算中支付这笔费用。
problem:
  - 快速或无实验室 HPV 检测消除了实验室周转时间这一瓶颈，但去中心化项目仍在结果、咨询、转诊和随访之间丢失患者。
  - 纸质登记册、电子表格、通用电子病历记录、DHIS2 报告或可配置现场工具等现有替代方案，均无法原生控制同次就诊去中心化 HPV 工作流。
  - 筛查运营者需要一套能跨低连接性、混合基础设施站点运行的系统，而不是把每次推广变成定制服务项目。
  - 若结果采集、监管链和转诊闭环失效，同次就诊筛查的经济价值和临床价值就会崩塌。
solution:
  - 支持离线的现场工作流应用，用于每个筛查站点的检测登记、结果采集、规范执行和下一步任务分配。
  - 督导仪表盘，提供库存可见性、无效检测监控、阳性结果队列、转诊状态和网络级站点完成度指标。
  - 去中心化 HPV 项目可配置规范模板，让新站点能以可复制的运营模式上线，而非依赖定制表格和消息群。
  - 厂商中立互操作层，可接入检测厂商、DHIS2 级报告系统和本地记录系统，同时在第一版中规避诊断决策逻辑。
whyWeWin:
  - "切口窄而紧迫：面向去中心化 HPV 项目的结果到转诊编排，而非宽泛的电子病历、LIS 或消费者检测平台。"
  - 厂商中立、离线优先的设计比 OEM 专属软件或诊所内置指南工具更适配混合站点类型。
  - 每次部署都能完善可复用的规范模板，并积累无效率、咨询延迟、转诊滞后和闭环情况的基准数据。
  - 先守住工作流运营侧，比从诊断或分诊自动化起步的团队跑得更快。
strategicChoices:
  beachhead: >-
    在 20 个以上分散站点推广快速 HPV 或自采样项目的女性健康筛查网络和捐助资助宫颈筛查运营者，
    其阳性患者目前常在筛查与随访之间消失。
  wedgeRationale: >-
    这类买家有实时推广事件、跨多站点的重复工作流，以及对闭环指标的直接问责；
    比销售给医院、单一诊所或消费者检测渠道更容易快速验证部署软件的价值。
  sequencingRationale: >-
    公司应先以人工或轻集成方式验证运营工作流产品，再叠加基准分析和更深层的系统集成，
    最后才扩展至相邻病种项目或更自动化的推荐逻辑。GTM 遵循同样顺序：先直接试点，
    在有 KPI 验证和可复制入驻后再开拓 OEM 和实施商渠道。招聘也跟随这一节奏：
    先配齐创始产品/工程和实施，产品经受住真实现场考验后再加集成和渠道销售。
  notYet:
    - 以消费者居家 HPV 检测工作流作为主要市场
    - 完整替换电子病历或 LIS
    - 自动化诊断解读或治疗推荐逻辑
    - 在 HPV 转诊闭环指标得到验证之前大幅扩展多病种
market:
  tam: $0.6B
  sam: $120.0M
  som: $3.0M
  segments:
    - "主要市场：采用去中心化 HPV 工作流的有组织多站点女性健康筛查网络和捐助资助宫颈筛查项目"
    - "次要市场：需要厂商中立工作流层围绕其检测产品的诊断 OEM 或经销商主导推广项目"
  buyingProcess: >-
    经济买家通常是掌握推广 KPI 的筛查项目主任、COO 或医疗运营负责人，但采购还会拉入
    项目发起方、实施商、IT 和合规利益相关者。当采购与有资金支持的推广事件、
    质量改善任务或含明确转诊闭环和采集指标的试点预算挂钩时，最容易获批。
product:
  mvp: >-
    第一版是面向去中心化 HPV 项目的支持离线的案例工作流：登记检测、采集结果、
    执行规范步骤、分配随访任务、按站点和队列报告闭环情况。应支持可配置规范模板、
    基于角色的访问控制、审计日志，以及人工或轻集成路径，而非完整的诊断自动化。
  sixMonth: >-
    将生产版 MVP 部署至一个共创客户项目，具备离线同步、站点仪表盘、转诊队列管理、
    可配置规范，以及导出至买家现有报告工作流的能力。
  twelveMonth: >-
    添加可复用的入驻手册、基准分析、一到两个检测厂商或报告系统集成，以及多项目管理，
    让试点能转化为可复制的生产账户。
  twentyFourMonth: >-
    从纯 HPV 工作流扩展至相邻的去中心化女性健康或传染病筛查项目，
    这些项目共享相同的边缘站点编排和转诊闭环问题。
  keyBets:
    - 买家会在要求广泛分析之前，先为可衡量的转诊闭环和无效案例改善付费。
    - 可配置规范引擎能在不把实施变成定制软件项目的前提下，吸收地域和站点级的差异。
    - 如果工作流能显著改善闭环指标且同步可靠性高，早期试点中人工或半人工结果采集是可接受的。
    - 厂商中立集成对买家的吸引力将超过深度绑定单一诊断 OEM。
gtm:
  wedge: "将首次部署作为让同次就诊去中心化 HPV 筛查可审计的运营层来销售：每个检测案例有记录、每个阳性有路由、每次转诊追踪到闭环。"
  channels:
    - 在试点启动或站点扩展期间直接销售给筛查项目运营者
    - 与诊断 OEM 和经销商联合销售
    - 通过 CHAI、Unitaid 或 Jhpiego 类实施商开展捐助或 NGO 支持的部署
  funnelTargets: "线索→合格试点 20–30%，合格试点→付费试点 40%+，付费试点→生产转化 50%+，生产账户→第二区域或多站点扩展 60%+"
  pricing: >-
    年度按站点 SaaS 加按完成筛查案例计费，附带付费实施和可选转诊分析/报告模块；
    这与推广预算匹配，因为买家为随活跃筛查量扩展的具体运营能力付费，而非泛化的席位许可证。
businessModel:
  revenueStreams:
    - 按站点软件订阅
    - 按完成筛查案例计费
    - 实施与入驻费用
    - 高级转诊分析和多项目报告模块
  unitOfValue: "从结果采集到记录下一步完成情况，全程托管的完整筛查案例"
  targetGrossMarginPct: 70
  expansionLevers:
    - 从一个试点区域扩展至客户的完整站点网络
    - 核心工作流上线后叠加报告、基准和督导模块
    - 支持更多检测厂商和样本路径
    - 将规范引擎延伸至相邻的去中心化分子筛查项目
strategyMap:
  northStarMetric: >-
    阳性 HPV 筛查案例在项目目标时间窗内完成记录转诊或同次就诊下一步的比例
  inputMetrics:
    - 结果采集完整率
    - 阳性结果到咨询的时间
    - SLA 内转诊闭环率
    - 各站点无效检测率
    - 新站点激活时间
    - 离线同步成功率
  moatsToBuild:
    - 可复用的去中心化 HPV 规范模板
    - 跨站点转诊闭环、无效率和工作流延迟的基准数据集
    - 检测和报告系统的厂商中立集成适配器
    - 降低新项目上线时间的实施手册
  killCriteria:
    - 若 12 个月内没有两个多站点项目同意付费试点，则购买触发假设比预期弱。
    - 若前两个试点未能将转诊闭环至少提升 10 个百分点，或将未采集案例减少至少 20%，则切口力度不足。
    - 若三次上线后生产部署仍需大量定制实施，则商业模式是服务主导而非软件主导。
  mermaid: |-
    flowchart LR
      Wedge[Decentralized HPV workflow wedge] --> MVP[Offline MVP for registration result capture and referral queues]
      MVP --> Proof[Paid pilots prove closure improvement and repeatable onboarding]
      Proof --> Expansion[OEM channels multi-site expansion and adjacent screening workflows]
investorMemo:
  verdict:
    call: 观察
    conviction: 运营痛点真实、切口逻辑清晰，但客户预算归属和硬件时机风险尚未化解。
    whyBelieve: >-
      计划针对的是一个真实的去中心化筛查瓶颈，电子病历、HMIS、OEM 和通用工作流工具
      对此只有部分解答。
    whyDoubt: >-
      制造紧迫感的同一批事实也带来了脆弱性，因为落地时机取决于检测平台采用、赠款周期
      和合作伙伴互操作性。
    nextDiligence: >-
      下一个验证点是一个付费多站点试点，证明转诊闭环或未采集案例指标的改善幅度足以
      支撑持续软件支出。
  firstCustomer:
    title: 多站点宫颈筛查项目的筛查运营主任
    profile: >-
      捐助资助或私营女性健康网络，运营 20 个以上卫星站、药店、流动站或社区筛查站点，
      并难以将去中心化 HPV 案例追踪至闭环。
    trigger: >-
      快速 HPV 或自采样项目的推广启动，或明确要求降低宫颈癌阳性筛查后失访率的管理指令。
    buyer: 筛查项目主任、COO 或医疗运营负责人
    initialContract: "假设：初始付费试点规模约 $40k–$120k，覆盖一个区域或 20–50 个站点，一旦闭环和采集 KPI 达标即转为年度按站点和按案例计费。"
  mustBeTrue:
    - 至少有一类买家细分能从推广预算、赠款预算或运营预算中支付产品费用，而无需等待全国平台决策。
    - 首批试点能将转诊闭环改善到足以让项目负责人将软件视为核心工具而非可选报告。
    - 可复制的部署能在 60 天内以有限定制工作跨 20 个以上站点上线。
    - CommCare、DHIS2 或电子病历等通用替代方案在同次就诊去中心化 HPV 运营上明显逊色。
    - 至少有一个 OEM、经销商或实施商合作伙伴在前 12 个月内联合销售或共享集成访问权限。
  diligenceQuestions:
    - 前三个目标项目中，哪条预算线实际支付工作流软件费用？
    - 转诊闭环或护士节时改善到多少才能触发付费转化？
    - 没有厂商事件和序列号数据源，MVP 有多少能自动化？
    - 哪些地区同时具备去中心化筛查痛点和可行的隐私与互操作要求？
    - 买家选择 DHIS2 或 CommCare 加本地集成商的频率有多高？
operatingAssumptions:
  - assumption: 首批买家将从诊断推广预算、赠款预算或与明确部署 KPI 挂钩的项目运营预算中支付产品费用。
    basis: research.yaml
    validationTest: 收集五份近期的试点预算、RFP 或 LOI，明确工作流支出的预算归属以及触发预算释放的指标。
    decisionImpact: 若为假，则将 GTM 收窄至 OEM 捆绑或实施商主导渠道，而非直接项目销售。
  - assumption: 初始 ICP 在站点间具有足够的工作流相似性，可配置模板胜过定制服务。
    basis: idea.yaml
    validationTest: 梳理三个共创客户项目的工作流，验证至少 80% 的核心案例流程可由一套规范引擎处理。
    decisionImpact: 若为假，则将 ICP 进一步收窄至单一站点原型，或放弃软件优先模式。
  - assumption: 若闭环指标有改善且同步可靠性高，早期试点可接受人工或半人工结果采集。
    basis: operator judgment
    validationTest: 进行试点工作流计时研究，确认站点工作人员能在可接受的额外分钟内完成每个案例，且同步失败率低于 2%。
    decisionImpact: 若为假，集成工作需提前启动，广泛部署前的资金需求上升。
  - assumption: 第一版可通过编排工作流而非进行诊断或治疗决策，安全地停留在医疗器械分类的安全侧。
    basis: research.yaml
    validationTest: 在正式生产上线前，取得覆盖欧盟 MDR/IVDR 和首批目标地域的外部监管意见备忘录。
    decisionImpact: 若为假，路线图范围、QA 负担和融资需求均大幅增加。
  - assumption: HPV 只是切入点；要实现更大的创业回报，还需要扩展至相邻的去中心化分子诊断项目。
    basis: research.yaml
    validationTest: 到第 18 个月，确定至少两个在买家、集成和单位经济上与客户发现验证相重叠的相邻筛查工作流。
    decisionImpact: 若为假，公司应作为聚焦类目企业运营，收紧支出并调低估值预期。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 对三类目标项目类型的 20 名筛查运营者、实施商和站点负责人进行访谈和工作流梳理。
    hypothesis: 购买触发、KPI 归属者和工作流故障点足够一致，能支撑单一清晰的滩头 ICP。
    successMetric: 三个共创客户确认相同的核心案例流程，并同意进入试点范围界定。
    owner: CEO / 产品联合创始人
  - horizon: 0–90 天
    experiment: 为一个去中心化 HPV 规范原型化离线现场工作流和督导仪表盘。
    hypothesis: 现场工作人员能在一套轻量流程中完成结果采集和转诊任务分配，且不影响工作效率。
    successMetric: 至少 80% 的可用性测试参与者在无引导干预的情况下完成完整案例流程。
    owner: 技术联合创始人
  - horizon: 3–6 个月
    experiment: 与基线和上线后测量采集完整率、无效案例和转诊闭环情况的首个付费多站点试点合作运营。
    hypothesis: 产品创造的可衡量运营提升足以支撑持续支出。
    successMetric: 转诊闭环至少提升 10 个百分点，或未采集案例下降至少 20%。
    owner: 临床实施负责人
  - horizon: 3–6 个月
    experiment: 与至少两家 OEM 或经销商完成技术尽调，并构建一个轻量集成适配器。
    hypothesis: 合作伙伴事件和结果数据能充分减少人工对账，从而强化切口。
    successMetric: 一家合作伙伴提供样本规格或沙箱访问，且适配器显著减少人工案例对账。
    owner: 后端/集成工程师
  - horizon: 6–12 个月
    experiment: 在首个直接试点之外启动一个联合销售或实施商支持的部署。
    hypothesis: KPI 验证一旦存在，OEM 和实施商渠道能缩短销售周期。
    successMetric: 一个渠道协助的签约部署或有资金支持的推广扩展在试点验证后 120 天内完成。
    owner: 合作伙伴与企业销售
operations:
  - 支持离线的移动端同步，含重复案例检测和转诊状态对账
  - 基于角色的 PHI 访问控制、审计日志和客户专属数据保留策略
  - 站点入驻、规范配置和督导 KPI 评审的实施手册
  - 导出和集成路径，接入 DHIS2 级报告系统、本地电子病历或 OEM 数据源
  - 推广期间为站点督导和转诊协调员提供的培训与支持循环
team:
  - role: 技术联合创始人
    startTiming: Month 0
    rationale: 自主构建离线优先工作流引擎、审计链和首版部署架构，不外包技术核心。
  - role: 产品/实施联合创始人
    startTiming: Month 0
    rationale: 主导 ICP 发现、推广设计和 KPI 定义，确保产品始终贴近真实筛查运营。
  - role: 临床实施负责人
    startTiming: Month 3
    rationale: 将规范变体转化为可复制模板，培训站点，防止早期部署沦为临时服务。
  - role: 后端/集成工程师
    startTiming: Month 4
    rationale: 在 MVP 经受初步现场考验后，加速 OEM、DHIS2 和记录系统集成。
  - role: 合作伙伴与企业销售
    startTiming: Month 6
    rationale: 在首个价值案例确立后，将试点验证转化为 OEM、实施商和多项目渠道合作。
milestones:
  - horizon: 0–12 个月
    items:
      - 交付支持离线的去中心化 HPV 案例管理和转诊追踪 MVP。
      - 与多站点筛查项目签订两份付费试点合同。
      - 在至少一个试点中证明转诊闭环或未采集案例方面的可衡量改善。
      - 完成一项 OEM 或报告系统集成，并取得一份外部监管意见备忘录。
  - horizon: 12–24 个月
    items:
      - 将至少两个试点转化为覆盖更广站点网络的生产合同。
      - 跨客户推出基准分析，并在续约和扩展动作中使用。
      - 建立一个能产出合格部署的可复制 OEM 或实施商渠道。
      - 将规范支持扩展至相邻的自采样或相关去中心化筛查工作流。
  - horizon: 24–36 个月
    items:
      - 运营一个具备足够基准数据、能与通用现场工作流工具形成差异化的多项目网络。
      - 在保持厂商中立定位的同时，支持多种检测和报告环境。
      - 根据销售效率和留存数据，决定是否继续专注 HPV 或扩展至更多分子筛查类别。
risks:
  - risk: 快速或无实验室 HPV 硬件采用慢于预期。
    likelihood: Medium
    impact: High
    mitigation: 销售切入推广规划、自采样和随访工作流——这些在任何检测时间线上都有用；避免在需求可见之前过度构建 OEM 专属产品。
  - risk: 预算和采购周期比早期 SaaS 计划预想的更慢、更分散。
    likelihood: High
    impact: High
    mitigation: 将每笔销售锚定在有明确 KPI 归属的实际推广事件上，并通过 OEM 和实施商建立平行渠道。
  - risk: 跨地域的工作流差异将入驻变成定制服务。
    likelihood: Medium
    impact: High
    mitigation: 先聚焦可复制的多站点项目，并强制采用规范模板架构，而非逐一定制构建。
  - risk: 产品提前向受监管的临床决策领域漂移。
    likelihood: Medium
    impact: Medium
    mitigation: 第一版聚焦任务编排、文档记录和分析，在添加最优行动自动化之前验证监管边界。
  - risk: OEM 或本地系统的集成访问不足，遗留过多人工对账。
    likelihood: Medium
    impact: Medium
    mitigation: 先将 MVP 设计为人工可运行，再优先选择事件级互操作性现实可行的合作伙伴和地域。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: >-
    资金覆盖 18 个月：构建离线优先 MVP、招募初始实施和集成团队、完成监管和互操作性
    基础工作、运行两至四个付费试点，并验证去中心化 HPV 项目能从试点预算转化为持续
    生产收入。
