slug: rapid-hpv-screening-ops
date: '2026-06-27'
executiveSummary: Rapid HPV Screening Ops is a workflow platform for women's-health screening operators launching decentralized rapid HPV programs across 20 to 100 satellite, mobile, pharmacy, or community sites. The product's job is not diagnostic interpretation; it is to make every screening episode auditable from test registration through result capture, counseling, referral, and follow-up. The initial beachhead is donor-funded or private clinic networks rolling out rapid-HPV or self-collection pilots, because those programs have a visible launch event, measurable rollout KPIs, and enough site repetition to support a product instead of custom services. Go-to-market starts with high-touch deployments sold against referral-closure improvement, lost-to-follow-up reduction, and invalid-episode reduction, not a generic analytics pitch. Product sequencing stays vendor-neutral and operational so the first release can interoperate with multiple assay and reporting environments without taking
  on avoidable diagnostic-software regulatory burden. The main disconfirming risks are hardware adoption timing, slow public-health procurement, and whether OEMs expose enough event data to reduce manual entry. Research supports a roughly $120.0M serviceable market for organized multi-site programs and a modeled $3.0M year-three SOM, which justifies a disciplined pre-seed wedge but not a broad category land-grab yet. Missing facts that matter for underwriting are real reimbursement behavior, OEM data-sharing willingness, and whether buyers will fund this from operating, grant, or diagnostic rollout budgets.
problem:
- Rapid or lab-free HPV testing removes lab turnaround as the bottleneck, but decentralized programs still lose patients between result, counseling, referral, and follow-up.
- Current alternatives such as paper registers, spreadsheets, generic EHR notes, DHIS2 reporting, or configurable field tools do not natively control same-visit decentralized HPV workflows.
- Screening operators need one system that works across low-connectivity, mixed-infrastructure sites without turning each rollout into bespoke services work.
- If result capture, chain-of-custody, and referral closure fail, the economic and clinical value of same-visit screening collapses.
solution:
- Offline-capable field workflow app for test registration, result capture, protocol enforcement, and next-step tasking at each screening site.
- Supervisor dashboard for stock visibility, invalid-test monitoring, positive-result queues, referral status, and site-level completion metrics.
- Configurable protocol templates for decentralized HPV programs so new sites can launch on a repeatable operating model instead of custom spreadsheets and messaging threads.
- Vendor-neutral interoperability layer that can plug into assay vendors, DHIS2-class reporting systems, and local record systems while avoiding diagnostic decisioning in v1.
whyWeWin:
- 'The wedge is narrow and urgent: result-to-referral orchestration for decentralized HPV programs, not a broad EHR, LIS, or consumer testing platform.'
- Vendor-neutral and offline-first design fits mixed site types better than OEM-specific software or clinic-bound guideline tools.
- Every deployment can improve reusable protocol templates and benchmark data on invalid rates, counseling latency, referral lag, and closure.
- By staying on the operational side of the workflow first, the company can move faster than teams that start with diagnostic or triage automation.
strategicChoices:
  beachhead: Women's-health screening networks and donor-backed cervical-screening operators launching rapid HPV or self-collection programs across 20+ distributed sites where positive patients are currently lost between screening and follow-up.
  wedgeRationale: This buyer has a live rollout event, repeated workflows across many sites, and direct accountability for closure metrics; that makes deployment software easier to prove quickly than a broader sell into hospitals, single clinics, or consumer testing.
  sequencingRationale: 'The company should first prove an operational workflow product with manual or light integration, then add benchmark analytics and deeper system integrations, and only later expand into adjacent disease programs or more automated recommendation logic. GTM follows the same order: direct pilots first, then OEM and implementer channels once KPI proof and repeatable onboarding exist. Hiring should mirror that sequence with founding product/engineering and implementation first, integration and channel sales after the product survives real field use.'
  notYet:
  - Consumer at-home HPV testing workflows as the primary market
  - Full EHR or LIS replacement
  - Automated diagnostic interpretation or treatment recommendation logic
  - Broad multi-disease expansion before HPV referral closure metrics are proven
market:
  tam: $0.6B
  sam: $120.0M
  som: $3.0M
  segments:
  - 'Primary: organized multi-site women''s-health screening networks and donor-backed cervical-screening programs adopting decentralized HPV workflows'
  - 'Secondary: diagnostic OEM or distributor-led rollout programs that need a vendor-neutral workflow layer around their assays'
  buyingProcess: The economic buyer is usually the screening-program director, COO, or medical-operations lead who owns rollout KPIs, but procurement also pulls in program sponsors, implementers, IT, and compliance stakeholders. Purchases are most likely to clear when tied to a funded rollout, quality-improvement mandate, or pilot budget with explicit referral-closure and capture metrics.
product:
  mvp: 'Version 1 is an offline-capable episode workflow for decentralized HPV programs: register the test, capture the result, enforce protocol steps, assign follow-up tasks, and report closure by site and cohort. It should support configurable protocol templates, role-based access, audit logs, and manual or light integration paths rather than full diagnostic automation.'
  sixMonth: Deploy a production MVP into one design-partner program with offline sync, site dashboards, referral queue management, configurable protocols, and exports into the buyer's existing reporting workflow.
  twelveMonth: Add reusable onboarding playbooks, benchmark analytics, one to two assay or reporting integrations, and multi-program administration so pilots can convert into repeatable production accounts.
  twentyFourMonth: Expand from HPV-only workflows into adjacent decentralized women's-health or infectious-disease screening programs that share the same edge-site orchestration and referral-closure problem.
  keyBets:
  - Buyers will pay for measurable referral-closure and invalid-episode improvement before they demand broad analytics.
  - A configurable protocol engine can absorb geography and site-level variation without turning implementations into custom software projects.
  - Manual or semi-manual result capture is acceptable for early pilots if the workflow materially improves closure metrics.
  - Vendor-neutral integrations will matter more to buyers than deep lock-in to a single diagnostic OEM.
gtm:
  wedge: 'Sell the first deployment as the operating layer that makes same-visit decentralized HPV screening auditable: every test episode captured, every positive routed, every referral tracked to closure.'
  channels:
  - Direct sales to screening-program operators during pilot launch or site expansion
  - Co-sell partnerships with diagnostic OEMs and distributors
  - Donor- or NGO-backed deployments with implementers such as CHAI, Unitaid, or Jhpiego-like partners
  funnelTargets: lead→qualified pilot 20–30%, qualified pilot→paid pilot 40%+, paid pilot→production conversion 50%+, production account→second-region or multi-site expansion 60%+
  pricing: Annual per-site SaaS plus per completed screening episode, with paid implementation and optional referral analytics/reporting modules; this matches rollout budgets because buyers pay for a concrete operating capability that scales with active screening volume rather than a generic seat license.
businessModel:
  revenueStreams:
  - Per-site software subscriptions
  - Per completed screening episode fees
  - Implementation and onboarding fees
  - Premium referral analytics and multi-program reporting modules
  unitOfValue: Completed screening episode managed from result capture to documented next-step completion
  targetGrossMarginPct: 70
  expansionLevers:
  - Expand from one pilot region into the customer's full site network
  - Add reporting, benchmark, and supervisor modules once core workflow is live
  - Support additional assay vendors and sample pathways
  - Extend the protocol engine into adjacent decentralized molecular screening programs
strategyMap:
  northStarMetric: Percentage of positive HPV screening episodes that reach documented referral or same-visit next-step completion within the program target window
  inputMetrics:
  - Result capture completeness rate
  - Positive-result to counseling time
  - Referral closure rate within SLA
  - Invalid-test rate by site
  - New-site activation time
  - Offline sync success rate
  moatsToBuild:
  - Reusable decentralized-HPV protocol templates
  - Cross-site benchmark dataset on referral closure, invalid rates, and workflow latency
  - Vendor-neutral integration adapters for assay and reporting systems
  - Implementation playbooks that reduce time-to-live for new programs
  killCriteria:
  - If within 12 months no two multi-site programs agree to paid pilots, the buying trigger is weaker than assumed.
  - If the first two pilots fail to improve referral closure by at least 10 percentage points or reduce uncaptured episodes by at least 20%, the wedge is not strong enough.
  - If production deployments still require heavy custom implementation after three launches, the business is services-led rather than software-led.
  mermaid: |-
    flowchart LR
      Wedge[Decentralized HPV workflow wedge] --> MVP[Offline MVP for registration result capture and referral queues]
      MVP --> Proof[Paid pilots prove closure improvement and repeatable onboarding]
      Proof --> Expansion[OEM channels multi-site expansion and adjacent screening workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Compelling operational pain and a coherent wedge, but customer budget ownership and hardware-timing risk are still unresolved.
    whyBelieve: The plan targets a real decentralized screening bottleneck that current EHR, HMIS, OEM, and generic workflow tools only partially solve.
    whyDoubt: The same facts that create urgency also create fragility because rollout timing depends on assay adoption, grant cycles, and partner interoperability.
    nextDiligence: The next proof point is a paid multi-site pilot showing that referral closure or uncaptured-episode metrics improve enough to justify recurring software spend.
  firstCustomer:
    title: Director of screening operations at a multi-site cervical-screening program
    profile: A donor-funded or private women's-health network running 20+ satellite, pharmacy, mobile, or community screening sites and struggling to track decentralized HPV episodes to closure.
    trigger: Launch of a rapid-HPV or self-collection rollout, or an explicit mandate to reduce lost-to-follow-up after positive screens.
    buyer: Director of screening programs, COO, or medical operations lead
    initialContract: 'Hypothesis: a paid pilot in the roughly $40k–$120k range covering one region or 20–50 sites, converting to annual per-site and per-episode pricing once closure and capture KPIs are met.'
  mustBeTrue:
  - At least one buyer segment can fund the product from rollout, grant, or operating budgets without waiting for a national platform decision.
  - The first pilots can improve referral closure enough that program leaders treat the software as mission-critical, not optional reporting.
  - A repeatable deployment can go live across 20+ sites in under 60 days with limited custom work.
  - Generic alternatives such as CommCare, DHIS2, or EHR workflows are materially worse on same-visit decentralized HPV operations.
  - At least one OEM, distributor, or implementer partner will co-sell or share integration access within the first 12 months.
  diligenceQuestions:
  - Which budget line actually pays for workflow software in the first three target programs?
  - What measurable lift in referral closure or nurse time savings is required for a paid conversion?
  - How much of the MVP can be automated without vendor event and serial-number feeds?
  - Which geographies combine decentralized screening pain with tractable privacy and interoperability requirements?
  - How often do buyers choose DHIS2 or CommCare plus local integrators instead of a vertical product?
operatingAssumptions:
- assumption: First buyers will fund the product from diagnostic rollout budgets, grant budgets, or program operations budgets tied to explicit deployment KPIs.
  basis: research.yaml
  validationTest: Collect five recent pilot budgets, RFPs, or LOIs showing where workflow spend sits and what metrics release budget.
  decisionImpact: If false, narrow GTM to OEM-bundled or implementer-led channels instead of direct program sales.
- assumption: The initial ICP has enough repeated workflow similarity across sites that configurable templates beat custom services.
  basis: idea.yaml
  validationTest: Map workflows in three design-partner programs and verify that at least 80% of the core episode flow can be handled by one protocol engine.
  decisionImpact: If false, tighten the ICP further to one site archetype or abandon the software-first model.
- assumption: Manual or semi-manual result capture is acceptable in early pilots if closure metrics improve and sync reliability is high.
  basis: operator judgment
  validationTest: Run a pilot workflow time study and confirm site staff can complete each episode with acceptable added minutes and less than 2% sync failure.
  decisionImpact: If false, integration work must move earlier and capital needs rise before broad deployment.
- assumption: The first release can stay on the safe side of medical-device classification by orchestrating workflows rather than making diagnostic or treatment decisions.
  basis: research.yaml
  validationTest: Obtain an external regulatory memo covering EU MDR/IVDR and the first target geographies before full production launch.
  decisionImpact: If false, roadmap scope, QA burden, and funding needs all increase materially.
- assumption: HPV is only the beachhead; adjacent decentralized molecular programs will be needed for larger venture outcomes.
  basis: research.yaml
  validationTest: By month 18, identify at least two adjacent screening workflows with overlapping buyers, integrations, and unit economics validated by customer discovery.
  decisionImpact: If false, the company should operate as a focused category business with tighter spending and lower valuation expectations.
experimentRoadmap:
- horizon: 0-90 days
  experiment: Interview and workflow-map 20 screening operators, implementers, and site leads across three target program types.
  hypothesis: The buying trigger, KPI owner, and workflow failure points are consistent enough to support one clear beachhead ICP.
  successMetric: Three design partners confirm the same core episode flow and agree to pilot scoping.
  owner: CEO / product founder
- horizon: 0-90 days
  experiment: Prototype an offline field workflow and supervisor dashboard for one decentralized HPV protocol.
  hypothesis: Field staff can complete result capture and referral tasking in one lightweight flow without harming throughput.
  successMetric: At least 80% of usability test participants complete the full episode flow without facilitator intervention.
  owner: Founding eng
- horizon: 3-6 months
  experiment: Run the first paid multi-site pilot with baseline and post-launch measurement of capture completeness, invalid episodes, and referral closure.
  hypothesis: The product creates measurable operational lift large enough to justify recurring spend.
  successMetric: Referral closure improves by at least 10 percentage points or uncaptured episodes fall by at least 20%.
  owner: Clinical implementation lead
- horizon: 3-6 months
  experiment: Complete technical diligence with at least two OEMs or distributors and build one lightweight integration adapter.
  hypothesis: Partner event and result data can reduce manual reconciliation enough to strengthen the wedge.
  successMetric: One partner provides sample specs or sandbox access and the adapter reduces manual episode reconciliation materially.
  owner: Backend / integration eng
- horizon: 6-12 months
  experiment: Launch one co-sold or implementer-backed deployment beyond the first direct pilot.
  hypothesis: OEM and implementer channels can shorten sales cycles once KPI proof exists.
  successMetric: One signed channel-assisted deployment or funded rollout expansion closes within 120 days of pilot proof.
  owner: Partnerships lead
operations:
- Offline-first mobile sync with duplicate-episode detection and referral-state reconciliation
- Role-based PHI access, audit logging, and customer-specific data retention controls
- Implementation playbooks for site onboarding, protocol configuration, and supervisor KPI reviews
- Export and integration pathways into DHIS2-class reporting systems, local EHRs, or OEM data feeds
- Training and support loops for site supervisors and referral coordinators during rollout
team:
- role: Founding eng
  startTiming: Month 0
  rationale: Build the offline-first workflow engine, audit trail, and first deployment architecture without outsourcing the technical core.
- role: Product / implementation founder
  startTiming: Month 0
  rationale: Own ICP discovery, rollout design, and KPI definition so the product stays tied to actual screening operations.
- role: Clinical implementation lead
  startTiming: Month 3
  rationale: Translate protocol variation into repeatable templates, train sites, and keep early deployments from becoming ad hoc services.
- role: Backend / integration eng
  startTiming: Month 4
  rationale: Accelerate OEM, DHIS2, and record-system integrations once the MVP survives initial field use.
- role: Partnerships / enterprise seller
  startTiming: Month 6
  rationale: Convert pilot proof into OEM, implementer, and multi-program channel deals after the first value case is established.
milestones:
- horizon: 0-12 months
  items:
  - Ship offline-capable MVP for decentralized HPV episode management and referral tracking.
  - Secure two paid pilots with multi-site screening programs.
  - Prove measurable improvement in referral closure or uncaptured-episode reduction in at least one pilot.
  - Complete one OEM or reporting-system integration and one external regulatory memo.
- horizon: 12-24 months
  items:
  - Convert at least two pilots into production contracts spanning broader site networks.
  - Launch benchmark analytics across customers and use them in renewal and expansion motions.
  - Establish one repeatable OEM or implementer channel that produces qualified deployments.
  - Expand protocol support to adjacent self-collection or related decentralized screening workflows.
- horizon: 24-36 months
  items:
  - Operate a multi-program network with enough benchmark data to differentiate from generic field-workflow tools.
  - Support multiple assay and reporting environments while preserving vendor-neutral positioning.
  - Decide whether to remain HPV-focused or expand into additional molecular screening categories based on sales efficiency and retention evidence.
risks:
- risk: Rapid or lab-free HPV hardware adoption takes longer than expected.
  likelihood: Medium
  impact: High
  mitigation: Sell into rollout planning, self-collection, and follow-up workflows that remain useful across assay timelines, and avoid overbuilding OEM-specific product before demand is visible.
- risk: Budget and procurement cycles are slower and more fragmented than an early SaaS plan assumes.
  likelihood: High
  impact: High
  mitigation: Anchor every sale to a live rollout event with explicit KPI ownership and build parallel channel paths through OEMs and implementers.
- risk: Workflow variation across geographies turns onboarding into custom services work.
  likelihood: Medium
  impact: High
  mitigation: Narrow the ICP to repeatable multi-site programs first and enforce a protocol-template architecture instead of bespoke builds.
- risk: The product drifts into regulated clinical decisioning earlier than planned.
  likelihood: Medium
  impact: Medium
  mitigation: Keep v1 focused on task orchestration, documentation, and analytics, and validate regulatory boundaries before adding next-best-action automation.
- risk: OEM or local-system integration access is insufficient, leaving too much manual reconciliation.
  likelihood: Medium
  impact: Medium
  mitigation: Design the MVP to work manually first, then prioritize partners and geographies where event-level interoperability is realistic.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to build the offline-first MVP, hire the initial implementation and integration team, complete regulatory and interoperability groundwork, run two to four paid pilots, and prove that decentralized HPV programs convert from pilot budgets into recurring production revenue.
