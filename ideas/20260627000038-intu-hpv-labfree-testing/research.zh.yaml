competitors:
- name: Roche navify Cervical Screening
  stage: incumbent
  wedge: 与 Roche 宫颈组合绑定的有组织宫颈筛查项目软件。
  pricing: 企业定制 / 不公开
  strength: 专为筛查定位、安全态势良好，并紧邻主要 HPV 诊断组合。
  weaknessVsUs: 更自然地与有组织筛查项目和以 Roche 为中心的生态系统对齐，而非跨混合站点类型的厂商中立去中心化运营层。
  sourceRefs:
  - 20
  - 22
- name: Dimagi CommCare
  stage: scale-up
  wedge: 面向一线项目的离线优先可配置工作流平台。
  pricing: 定制 / 平台订阅
  strength: 久经考验的离线执行能力、快速的表单和案例工作流配置，以及强劲的现场口碑。
  weaknessVsUs: 需要通过实施工作叠加宫颈特异性规范设计、转诊分析和集成。
  sourceRefs:
  - 15
  - 16
- name: DHIS2 toolkit / tracker ecosystem
  stage: incumbent
  wedge: 公共部门报告、督导和案例追踪骨干。
  pricing: 开源；实施主导
  strength: 公共卫生领域普及度高，可扩展，已成为许多报告环境的组成部分。
  weaknessVsUs: 在报告和督导方面更强，而在去中心化边缘节点的同次就诊工作流控制和转诊闭环方面较弱。
  sourceRefs:
  - 17
  - 18
- name: CCSM CDS Tools
  stage: open-source
  wedge: 嵌入电子病历工作流的基于标准的宫颈筛查逻辑。
  pricing: 开源
  strength: 临床严谨、可互操作，在电子病历集成已有基础的场景中有吸引力。
  weaknessVsUs: 指南逻辑与跨外展站、药店或流动站的现场部署编排并非同一回事。
  sourceRefs:
  - 27
  - 34
- name: Cepheid / GeneXpert HPV ecosystem
  stage: incumbent
  wedge: 可作为去中心化 HPV 项目锚点的近床旁检测平台。
  pricing: 仪器加耗材；工作流经济学不公开
  strength: 强大的检测品牌和快速周转，让同次就诊工作流有价值。
  weaknessVsUs: 掌控的是检测，而非买家仍然需要的跨站点转诊和随访完整运营层。
  sourceRefs:
  - 21
  - 13
regulatoryTechnicalConstraints:
- point: 欧洲健康数据处理正朝着 EHDS 及配套规则下更严格的互操作性、访问控制和隐私义务方向演进。
  sourceRefs:
  - 33
  - 34
- point: 若产品从工作流编排跨越至诊断或管理推荐逻辑，MDR/IVDR 软件问题就会变得重要得多。
  sourceRefs:
  - 34
  - 35
  - 36
- point: 离线优先采集在许多目标场景中是必选项，但同步设计不佳可能造成案例重复或转诊孤儿。
  sourceRefs:
  - 16
  - 17
  - 19
- point: 若要保持厂商中立，产品需要跨临床采集、自采样、近床旁和实验室检测实现互操作。
  sourceRefs:
  - 21
  - 22
  - 23
  - 26
validationSignals:
- point: WHO 和各国行动方持续推动高性能 HPV 筛查和覆盖率扩展。
  sourceRefs:
  - 1
  - 4
  - 14
- point: CHAI 和 Unitaid 已压低关键硬件成本，并在多个国家资助真实的即筛即治部署。
  sourceRefs:
  - 12
  - 13
- point: 指南和监管批准正为自采样和非传统护理场景开绿灯，增加了运营者的工作流复杂性。
  sourceRefs:
  - 10
  - 11
  - 39
  - 40
- point: Intu 的近期融资具体表明无实验室、低基础设施 HPV 检测正在从纯粹的愿景变为运营上的可能。
  sourceRefs:
  - 24
  - 25
openQuestions:
- 哪个初始地域最能兼顾有组织筛查预算、去中心化站点密度和可行的数据共享规则？
- 诊断 OEM 是否愿意开放足够的事件、序列号和结果数据来自动化检测登记和对账，而非强制人工录入？
- 买家能多频繁地在赠款试点之外采购工作流软件，以及触发该支出的 KPI 门槛是多少？
- 在添加规范下一步自动化的同时，第一版能否明确停留在医疗器械分类范围之外？

