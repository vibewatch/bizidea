  searchedQueries:
  - 查找关于全球宫颈癌筛查覆盖率缺口、WHO 消除目标以及 HPV 检测建议（含自采样和即筛即治）的权威来源。
  - 查找关于去中心化或床旁 HPV 检测、同天即筛即治工作流以及宫颈癌筛查项目中失访等运营挑战的权威和近期来源。
  - 查找宫颈癌筛查、社区健康筛查和去中心化诊断运营中使用的数字工作流平台和软件的来源，包括产品页面和案例研究。
  - 查找关于 HPV 阳性筛查后失访、同次就诊治疗、转诊完成情况以及低资源或去中心化项目运营壁垒的权威来源。
  - 查找与去中心化或近床旁筛查相关的 HPV 诊断平台的产品页面和权威文档，包括 Xpert HPV、careHPV、cobas HPV、Aptima HPV 及任何快速无实验室平台。
  - 查找与欧洲及低资源公共卫生项目的筛查工作流软件相关的数字健康数据隐私、医疗器械法规和软件合规约束的权威来源。
  - 查找关于 HPV 自采样和宫颈癌筛查在社区、药店、流动站或偏远站点推广的近期案例研究、项目报告或 NGO/政府来源。
  - 查找 PATH、CHAI、Unitaid、FIND、Jhpiego 或 WHO 关于 HPV 检测推广、宫颈筛查市场塑造、采购或实施的 NGO、捐助方和公共卫生项目资源。
  - 查找美国、欧洲和 WHO 项目中 HPV 自采样或 HPV 初筛报销、政策采纳或国家项目指南的权威来源。
  - 查找低资源卫生项目中用于现场工作流、离线数据采集和转诊追踪的数字公共卫生平台来源，尤其是 CommCare、DHIS2、OpenMRS、Medic 及相关案例研究。
