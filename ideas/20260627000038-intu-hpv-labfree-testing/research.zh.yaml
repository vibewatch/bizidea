  fiveForces:
    supplierPower:
      score: 3
      rationale: 检测厂商和现有医疗数据栈因影响集成访问和推广时机而举足轻重，但若工作流层避免锁定单一仪器家族，仍可保持相对厂商中立。
      sourceRefs:
      - 20
      - 21
      - 22
      - 23
      - 24
      - 25
    buyerPower:
      score: 4
      rationale: 买家群体集中，采购往往由卫生部、NGO 或赠款项目介入，因此客户可在购买前要求证明运营 ROI。
      sourceRefs:
      - 6
      - 7
      - 12
      - 13
    threatOfEntrants:
      score: 3
      rationale: 通用平台和开放标准让新进入者或服务公司拼凑出基础工作流产品并非不可能，但病种专属模板和基准数据仍需时间积累。
      sourceRefs:
      - 15
      - 16
      - 17
      - 27
    threatOfSubstitutes:
      score: 5
      rationale: 项目确实会用纸质记录、电子病历备注、DHIS2、CommCare、OEM 工具和人工追访替代，即便这些替代方案在转诊闭环上表现欠佳。
      sourceRefs:
      - 6
      - 15
      - 17
      - 19
      - 27
    competitiveRivalry:
      score: 3
      rationale: "竞争真实存在但较分散：在位企业各覆盖工作流的相邻切片，而非完整的去中心化 HPV 运营栈，为聚焦型产品留有空间。"
      sourceRefs:
      - 15
      - 17
      - 20
      - 27
  pestle:
  - factor: 政治
    impact: positive
    point: 全球和国家消除运动让宫颈筛查持续位于政策议程，并能开启项目资金窗口。
    sourceRefs:
    - 1
    - 14
  - factor: 经济
    impact: neutral
    point: 较低的检测和治疗设备价格有助于推广采用，但预算仍呈波动状态，与公共卫生资金周期紧密相连。
    sourceRefs:
    - 12
    - 13
  - factor: 社会
    impact: positive
    point: 自采样将筛查覆盖面扩展至回避或无法前往临床采集检查的人群。
    sourceRefs:
    - 4
    - 8
    - 39
    - 40
  - factor: 技术
    impact: positive
    point: 近床旁和无实验室 HPV 检测加大了对集中实验室外同次就诊工作流控制的需求。
    sourceRefs:
    - 21
    - 24
    - 25
    - 26
  - factor: 法律
    impact: negative
    point: 欧盟健康数据和医疗器械法规提高了在 PHI 处理或悄然进入临床决策支持领域方面疏忽的代价。
    sourceRefs:
    - 33
    - 34
    - 35
    - 36
  - factor: 环境
    impact: neutral
    point: 电池供电、低基础设施筛查工具让低资源场景的外展更具可行性，但连接条件和物理物流仍因站点而异。
    sourceRefs:
    - 13
    - 21
    - 24
  adoptionFrictionMatrix:
  - friction: 赠款驱动的采购拖慢决策周期
    severity: high
    affectedBuyer: 公共卫生和 NGO 筛查运营者
    mitigation: 将产品围绕推广里程碑和可衡量的随访 KPI 打包，而非泛化的数字化转型语言。
    sourceRefs:
    - 12
    - 13
  - friction: 离线身份核验和同步失败可能造成重复或缺失案例
    severity: high
    affectedBuyer: 流动和社区筛查站点
    mitigation: 采用离线优先设计，含确定性同步、本地队列和简单的督导异常处理。
    sourceRefs:
    - 16
    - 17
    - 19
  - friction: 项目已有部分系统在用
    severity: medium
    affectedBuyer: 具有电子病历/HMIS 基础的诊所网络
    mitigation: 集成至现有报告栈，以规范执行和转诊闭环取胜，而非替换和重建定位。
    sourceRefs:
    - 17
    - 20
    - 27
  - friction: 临床团队对自采样样本处理和随访义务存有顾虑
    severity: medium
    affectedBuyer: 医疗运营负责人
    mitigation: 在第一版中嵌入监管链、反射工作流规则和文档模板。
    sourceRefs:
    - 9
    - 10
    - 11
  - friction: 硬件时机不确定可能延迟紧迫性
    severity: medium
    affectedBuyer: 早期商业买家
    mitigation: 从已有资金支持的试点起步，并支持多种检测路径，而非押注单一 OEM。
    sourceRefs:
    - 24
    - 25
    - 26
