problem: >-
  Organizations trying to expand cervical-cancer screening beyond well-equipped
  hospitals still depend on centralized labs, paper registers, and manual
  follow-up. Once a rapid lab-free HPV test exists, the bottleneck shifts from
  assay turnaround to operations: registering each test, capturing a trustworthy
  result, routing positives into referral, and proving follow-up happened across
  distributed sites. If those steps break, same-visit screening loses its value
  and high-risk patients still disappear after the test.
targetUser:
  primary: "Directors of screening programs at women's-health clinic networks and NGO- or public-health-funded cervical-screening operators running distributed outreach sites."
  secondary: "Site supervisors, nurse leads, and referral coordinators inside the same screening programs."
  buyer: "Director of screening programs, COO, or medical operations lead"
startupThesis:
  nonObviousInsight: >-
    The first big software winner from lab-free molecular diagnostics may not be
    another diagnostic app or lab system. When PCR-quality HPV testing can
    happen anywhere in about 30 minutes, the new choke point becomes the field
    operating layer that turns a result into a completed referral and auditable
    program outcome.
  beachhead: >-
    Women's-health screening networks operating 20 to 100 satellite, pharmacy,
    mobile, or community sites where HPV tests cannot reliably be shipped to a
    central lab and positive patients are often lost between screening and
    follow-up
  wedge: >-
    A decentralized HPV screening operations system that registers tests,
    captures results, enforces site protocols, and triggers same-day referral
    and follow-up workflows across low-infrastructure screening sites
  whyNowCatalyst: >-
    Intu's financing and reported pilot-manufacturing push make lab-free HPV
    testing feel operationally imminent, while the 30-minute anywhere-result
    format creates urgency to build the workflow layer that preserves that speed
    in real-world programs.
  ventureScalePath: >-
    Start with HPV screening deployments, then expand the same operating layer
    into other decentralized women's-health and infectious-disease molecular
    programs as LAB-TO-GO-like platforms spread from clinics into home and
    resource-limited settings.
solution: >-
  Rapid HPV Screening Ops gives every decentralized screening site a lightweight
  workflow app and a supervisor dashboard. Staff register each cartridge, record
  the result, and launch the next protocol step such as patient counseling,
  referral booking, or follow-up outreach from one flow instead of paper logs
  and callbacks. Program leaders see stock levels, invalid-test rates,
  completion by site, positive-result queues, and referral closure across the
  network. The first version is explicitly a deployment and follow-up operating
  system, not a diagnostic interpretation product, which keeps the wedge
  measurable and operational. Over time it becomes the system of record for
  decentralized molecular screening programs across many disease categories.
goToMarketSeed:
  firstCustomer: >-
    A donor-funded or private women's-health screening network launching rapid
    HPV pilots across 20 or more mobile, pharmacy, or satellite sites and
    struggling to track result capture and referral completion outside a central
    lab workflow
  buyingTrigger: >-
    A new rapid-HPV pilot, grant-funded screening expansion, or leadership push
    to reduce lost-to-follow-up after positive cervical-cancer screens
  currentAlternative: >-
    Paper registers, spreadsheets, generic EHR notes, basic LIS exports, and
    manual phone or SMS follow-up run by site staff
  switchingReason: >-
    The product preserves the speed and reach of lab-free testing without
    forcing the operator to build bespoke workflows for result capture, quality
    tracking, and referral management across each new site
  pricingHypothesis: >-
    Annual per-site SaaS fee plus usage-based pricing per completed screening
    episode, with premium modules for referral analytics and multi-program
    reporting
