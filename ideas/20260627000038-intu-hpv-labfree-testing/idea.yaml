topRisks:
  - name: "Hardware adoption dependency"
    description: "If lab-free HPV platforms take longer to gain regulatory or commercial traction, the software wedge may arrive before enough customers are ready."
    mitigation: "Start with pilots and workflow tooling that can support any rapid HPV rollout, then expand alongside whichever diagnostics platforms actually deploy first."
  - name: "Procurement drag"
    description: "Screening programs, NGOs, and clinic networks can have slow budget cycles and fragmented decision-making across medical, operations, and funder stakeholders."
    mitigation: "Sell into concrete rollout events with site-level ROI metrics such as referral completion and invalid-test reduction, and package deployment support with the software."
  - name: "Workflow fragmentation"
    description: "Referral pathways vary widely by site and geography, so a rigid product could become expensive services work instead of repeatable software."
    mitigation: "Design the first product around configurable protocol templates and narrow the initial ICP to multi-site programs with repeatable workflows rather than bespoke one-off pilots."
