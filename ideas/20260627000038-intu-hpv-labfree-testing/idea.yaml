differentiator: >-
  Most screening software is built either for centralized laboratories or for
  patient engagement after the fact. This product is designed for the messy
  middle: decentralized molecular testing that still needs chain-of-custody,
  protocol compliance, and referral completion across many low-infrastructure
  sites. The moat compounds through site-level performance benchmarks, workflow
  templates tuned to rapid diagnostics, and integrations that make the platform
  the operational system of record around each screening episode.
