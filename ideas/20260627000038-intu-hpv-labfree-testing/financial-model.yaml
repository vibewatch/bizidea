scenarios:
  downside:
    description: Two-quarter slower procurement and weaker pilot-to-production conversion keep the company more implementation-heavy.
    y3RevenueK: 2140
    y3EbitdaK: -560
    cashLowPointK: 120
    keyAssumptionChanges:
      - Q4Y3 customersEop ends at 15 instead of 20.
      - Blended quarterly revenue per active program runs about 10% below base because site expansion is slower.
      - Gross margin is 5 points below base as onboarding remains more bespoke.
  base:
    description: Two Y1 pilots convert, direct sales prove the wedge, and one channel starts contributing by Y2.
    y3RevenueK: 2937
    y3EbitdaK: -180.6
    cashLowPointK: 194.2
    keyAssumptionChanges:
      - Paying-program count reaches 10 by Q4Y2 and 20 by Q4Y3.
      - Quarterly revenue per active program expands from $36K to $49K as deployments widen across sites.
      - Gross margin reaches the low 70s once integrations and playbooks template delivery.
  upside:
    description: OEM and implementer channels shorten cycles, producing faster multi-site expansions without a big support penalty.
    y3RevenueK: 3520
    y3EbitdaK: 180
    cashLowPointK: 720
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 24 instead of 20.
      - Quarterly revenue per active program runs about 8% above base as add-on analytics attach sooner.
      - Gross margin is 3 points above base because integration reuse arrives earlier.
