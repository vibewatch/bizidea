slug: rapid-hpv-screening-ops
date: '2026-06-27'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-27] the model starts in the first full month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.4M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2–4M + BP fundingAsk runwayMonths 18] base case uses a lower-midpoint pre-seed sized to cover the 18-month plan plus a 6-month buffer.'
  - id: A3
    name: Starting paying programs
    value: '0'
    unit: count
    source: '[BP milestones 0-12 months + BP experimentRoadmap] the company begins pre-revenue and must first close paid pilots.'
  - id: A4
    name: Paying program definition
    value: A paid pilot or production deployment for one multi-site HPV screening operator
    unit: definition
    source: '[BP businessModel.revenueStreams + BP investorMemo.firstCustomer.initialContract] customersEop counts any operator already paying for pilot or production scope.'
  - id: A5
    name: Year-1 pilot revenue realization
    value: $10K-$12K monthly revenue per active paying program once pilots start
    unit: USD/program/month
    source: '[BP investorMemo.firstCustomer.initialContract $40k-$120k + BP gtm.pricing] early revenue is modeled as paid pilot and limited production revenue spread across the active months of Y1 customers.'
  - id: A6
    name: Y2-Y3 blended production revenue per active program
    value: $36K-$49K per quarter ($144K-$196K annualized)
    unit: USD/program/quarter
    source: '[BP gtm.pricing annual per-site SaaS plus per completed screening episode + BP businessModel.expansionLevers + Research market.som $3.0M] per-program revenue rises as pilots convert, sites expand, and modules attach while keeping Y3 revenue just under the researched SOM.'
  - id: A7
    name: Customer ramp
    value: 3 paying programs by M12, 10 by Q4Y2, 20 by Q4Y3
    unit: customersEop
    source: '[BP milestones + BP gtm.funnelTargets + Research reportMemo.buyingTriggers] base case assumes two Y1 paid pilots convert and channel-assisted deployments accelerate after proof.'
  - id: A8
    name: Revenue recognition convention
    value: Period revenue equals customersEop multiplied by the blended realized revenue per active paying program for that period
    unit: formula
    source: '[BP gtm.pricing + BP businessModel.unitOfValue] this keeps revenue directly traceable to paying-program count and package mix.'
  - id: A9
    name: Gross margin ramp
    value: 45%-55% in Y1, 60%-66% in Y2, 68%-72% in Y3
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryTechnicalConstraints] early deployments carry onsite support, integration, and compliance drag before the workflow becomes more templated.'
  - id: A10
    name: Hiring timeline
    value: M1 founder/operator and founding engineer; M4 clinical implementation lead; M5 integration engineer; M7 partnerships seller; M10 customer success/ops; M11 second engineer; M16 G&A/compliance; M20 second clinical lead and second seller; M28 third engineer
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale] the team is implementation-heavy first, then adds channel capacity after pilot proof.'
  - id: A11
    name: Founder / product-implementation loaded compensation
    value: $150K
    unit: USD/year
    source: '[BP team Product / implementation founder + startup-finance heuristic] lean founder pay including payroll taxes and benefits.'
  - id: A12
    name: Engineering loaded compensation
    value: $180K
    unit: USD/year
    source: '[BP team Founding eng + startup-finance heuristic] reflects experienced application and workflow engineering talent at pre-seed cash levels.'
  - id: A13
    name: Integration engineer loaded compensation
    value: $175K
    unit: USD/year
    source: '[BP team Backend / integration eng + startup-finance heuristic] integration talent must handle OEM, DHIS2, and local-record interoperability.'
  - id: A14
    name: Clinical implementation loaded compensation
    value: $135K
    unit: USD/year
    source: '[BP team Clinical implementation lead + startup-finance heuristic] reflects protocol mapping, training, and rollout ownership.'
  - id: A15
    name: Sales / partnerships loaded compensation
    value: $170K
    unit: USD/year
    source: '[BP team Partnerships / enterprise seller + BP gtm.channels + startup-finance heuristic] includes travel and variable pay for early enterprise and channel selling.'
  - id: A16
    name: Customer success / ops loaded compensation
    value: $120K
    unit: USD/year
    source: '[BP operations + startup-finance heuristic] supports onboarding, support, and KPI reviews without building a services bench.'
  - id: A17
    name: G&A / compliance loaded compensation
    value: $110K
    unit: USD/year
    source: '[Research regulatoryTechnicalConstraints + startup-finance heuristic] covers privacy, contracts, audit support, and core back office.'
  - id: A18
    name: Payroll allocation to P&L lines
    value: Founder 40% S&M / 35% R&D / 25% G&A; engineering and integration 100% R&D; clinical implementation 50% S&M / 50% R&D; sales 100% S&M; customer success 70% S&M / 30% G&A; G&A/compliance 100% G&A
    unit: allocation
    source: '[BP team role rationales + BP operations] maps headcount costs into go-to-market, product, and overhead lines.'
  - id: A19
    name: Non-payroll opex ramp
    value: Total non-payroll opex rises from $18K/month in early Y1 to $53K/month by Q4Y3
    unit: USD/month
    source: '[BP operations + Research regulatoryTechnicalConstraints + startup-finance heuristic] covers cloud, travel, legal, insurance, training, and regulatory diligence without assuming a large field-services organization.'
  - id: A20
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: formula
    source: '[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at pre-seed scale.'
  - id: A21
    name: Steady-state monthly churn
    value: '2.0'
    unit: percent per month
    source: '[startup-finance heuristic for early workflow SaaS] annual contracts and workflow stickiness support low churn, but public-health procurement risk keeps the model from assuming mature enterprise retention.'
  - id: A22
    name: CAC convention
    value: Y2-Y3 sales and marketing spend divided by 17 net new paying programs
    unit: formula
    source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] captures founder-led and channel-led acquisition once the company starts scaling beyond the first pilots.'
  - id: A23
    name: Next-round milestone for funding sizing
    value: By Q4Y2 reach 10 paid programs, at least 2 pilot-to-production conversions, and 1 repeatable OEM or implementer channel; the raise includes a 6-month buffer beyond that milestone
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk runwayMonths 18 + BP investorMemo.nextDiligence] the round is sized to reach seed-ready proof and still preserve buffer for Y3 expansion.'
