modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Programs[Paid programs] --> Sites[Active screening sites]
      Sites --> Episodes[Completed screening episodes]
      Episodes --> Revenue[Site + episode revenue]
      Revenue --> GrossProfit[Gross profit after implementation and support]
      GrossProfit --> Cash[Operating cash runway]
      Programs --> Renewals[Pilot to production conversion]
      Renewals --> Revenue
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by converting two Y1 pilots into 10 paid programs by Q4Y2 and 20 by Q4Y3 at roughly $147K annual ARPU.
  - checkName: Must go right
    finding: Pilot proof must convert inside 6-9 months so OEM and implementer channels reduce CAC instead of adding another slow procurement layer.
  - checkName: Model breaks if
    finding: If buyers default to DHIS2 or CommCare plus local integrators and sales cycles slip two quarters, the downside case nearly consumes the cash buffer.
  - checkName: Next-round proof
    finding: The seed story is strongest once Q4Y2 shows 10 paying programs, two production conversions, one working channel, and a path to positive Q4Y3 EBITDA.
sanityChecks:
  ruleOf40: Y3 growth 166.5% + EBITDA margin -6.1% = 160.4%
  burnMultiple: Y2 burn multiple 1.1x, improving to Y3 0.1x as pilots convert into broader production rollouts.
  revenuePerFte: $267K Y3 using Q4Y3 headcount (benchmark $200–400K SaaS).
  flags:
    - The base case assumes grant- or rollout-backed budgets release on time; there is no self-serve demand engine if public-health procurement stalls.
    - Gross margin only reaches target if onboarding and protocol configuration become templated rather than custom services work.
    - Y3 revenue lands close to the researched $3.0M SOM, so post-seed upside depends on adjacent screening workflows or faster site expansion within each program.
