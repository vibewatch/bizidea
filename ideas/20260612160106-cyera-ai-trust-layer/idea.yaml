problem: >-
  Large enterprises are pushing Microsoft 365 copilots and internal agents into live workflows before they understand what sensitive data those agents can inherit through years of messy permissions. Security teams often cannot tell whether a risky action came from a human, a delegated service principal, or an AI agent, which turns every rollout review into a slow manual investigation. Existing DSPM, IAM, and SIEM tools show pieces of the problem, but they do not produce agent-specific blast radius and audit evidence that lets a cautious CISO approve expansion.
targetUser:
  primary: Head of Data Security or AI Security Engineering at a Fortune 1000 financial-services or pharma enterprise rolling out Microsoft 365 copilots and internal service agents
  secondary: Identity governance lead or SharePoint platform owner responsible for sensitive collaboration data
  buyer: CISO or VP of Information Security
startupThesis:
  nonObviousInsight: >-
    The next enterprise AI budget is not for another generic model-governance dashboard. It is for identity-resolution infrastructure that can separate human activity from agent activity when both travel through the same SaaS permissions, groups, and service principals.
  beachhead: >-
    Fortune 1000 financial-services and pharma enterprises with 15,000+ Microsoft 365 seats, sprawling SharePoint and OneDrive estates, and live Copilot Studio or ServiceNow employee-support agent pilots
  wedge: >-
    An agent attribution graph that maps each agent workflow to reachable sensitive M365, SharePoint, OneDrive, Teams, and ServiceNow data, then produces per-run audit evidence and prioritized permission fixes before production expansion
  whyNowCatalyst: Cyera’s framing of data access as the new AI perimeter, combined with the 68% attribution blind spot, makes agent rollout approval an immediate governance bottleneck.
  ventureScalePath: >-
    Start with Microsoft-centric agent readiness, then expand into cross-SaaS and data-cloud entitlement observability, continuous agent recertification, policy enforcement, and automated remediation for every enterprise AI workflow.
solution: >-
  The product connects to Entra ID, Microsoft 365, SharePoint, OneDrive, Teams, ServiceNow, and existing SIEM or DSPM tools to build a live graph of users, service principals, agents, data stores, and inherited permissions. For each proposed or active agent workflow, it simulates reachable sensitive data, labels which access paths depend on user delegation versus standing machine identity, and records what the agent actually touched at runtime. Security teams get an approver-ready view that answers three questions in one place: what this agent can see, what it did see, and which permission chains should be cleaned up first. The first version wins by shortening rollout reviews from months of spreadsheet-driven access analysis to a few days of evidence-backed signoff.
goToMarketSeed:
  firstCustomer: >-
    A top-20 U.S. bank or global pharma company expanding a 5,000+ seat Microsoft 365 Copilot rollout and a Copilot Studio or ServiceNow agent for HR or IT support
  buyingTrigger: >-
    Expansion of an AI pilot into broader employee access, or an internal audit and risk review before granting agents access to SharePoint, Teams, and ticketing data
  currentAlternative: SIEM logs, quarterly access reviews, manual SharePoint cleanup, and freezing agent expansion until security signs off
  switchingReason: >-
    The wedge gives security an agent-specific blast-radius map and attributable runtime evidence in days, avoiding a multi-quarter least-privilege rebuild before rollout can continue.
  pricingHypothesis: Annual platform fee based on monitored agent workflows, connected M365 tenants, and protected sensitive data stores
