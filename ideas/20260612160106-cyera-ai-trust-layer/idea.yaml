topRisks:
  - name: Platform dependency
    description: Microsoft or ServiceNow could improve native attribution and reduce the perceived need for a third-party layer.
    mitigation: Start with cross-system evidence, permission-chain analysis, and remediation workflows that native logs do not unify, then build deep ecosystem partnerships.
  - name: Incumbent compression
    description: Cyera, Varonis, or other DSPM vendors could extend into agent attribution and crowd the category quickly.
    mitigation: Win with a narrow rollout-approval wedge, ship faster in Microsoft-heavy environments, and become the system of record for agent-specific evidence before broadening.
  - name: Weak urgency outside rollout gates
    description: If a prospect is still experimenting with small pilots, the problem may not feel painful enough to buy now.
    mitigation: Sell only into expansion, audit, or incident-review triggers where approval delays already have an executive owner and visible cost.
