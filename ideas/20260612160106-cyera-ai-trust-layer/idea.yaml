jobsToBeDone:
  - job: >-
      When a Copilot rollout is about to expand beyond one department, help AI security engineers prove which sensitive data each agent can reach, so they can approve deployment without blind exposure.
    currentAlternative: Manual permission reviews, spreadsheet-based access attestations, and rollout delays
    successMetric: Days to approve rollout expansion and number of excessive access paths removed
  - job: >-
      When internal audit asks who touched sensitive data through AI, help data security teams distinguish human, delegated, and agent activity, so they can answer with evidence instead of log stitching.
    currentAlternative: SIEM log stitching and manual investigations across identity, SaaS, and data tools
    successMetric: Mean time to produce an audit trail for an agent-driven access event
