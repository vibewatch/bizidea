modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads --> PaidPilots\n  PaidPilots --> ProductionAccounts\n  ProductionAccounts --> WorkflowExpansion\n  WorkflowExpansion --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入由 Q4Y3 的 16 家受监管企业付费账户驱动；随着付费试点转化，以及老客户叠加更多受治理工作流和留存模块，blended annual ARPU 到 Y3 做到 $330K。
- checkName: 必须跑对什么
  finding: 公司必须证明：审批包能把 rollout signoff 明显压短，这样在 Y2 期间，即便不太早扩销售，也能靠伙伴引来的账户持续做到每季度至少净增 1 个付费 logo。
- checkName: 模型会在哪坏掉
  finding: 如果销售周期拖向 9 个月，或 ARPU 卡在 $280K 左右，下行情景会在公司形成可复制生产首单前先把现金打穿。
- checkName: 下一轮融资凭证
  finding: 只要公司在 Y2 结束时做到 9 个付费账户、2+ 个有伙伴背书的生产胜利案例，并明确证明这个切口能支撑 $250K+ 首单而不滑成服务型业务，就足以支持下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长 124% + EBITDA 利润率 -5% = 119%
  burnMultiple: Y2 burn multiple 约 0.70x（+$1.51M 收入对应 -$1.05M EBITDA），到 Y3 改善到约 0.09x（+$2.26M 收入对应 -$203K）。
  revenuePerFte: 按年末 FTE 计，Y3 每名员工对应 $340K 年收入（SaaS 基准约 $200-400K）。
  flags:
  - 模型假设：重 Microsoft 与 ServiceNow 的 rollout review 足够紧迫，因此即便赛道尚未完全成熟，净新增 logo 也能持续走高。
  - ARPU 依赖于把付费价值验证转成 $250K-$400K 年订阅，再叠加第二条工作流或留存 upsell；如果扩张更弱，Y3 收入会明显下修。
  - 模型把现金直接近似成 EBITDA，没有建营运资金时点、capex 或融资延迟；现实里若回款偏慢或 seed close 更晚，跑道会比基础情景更紧。
