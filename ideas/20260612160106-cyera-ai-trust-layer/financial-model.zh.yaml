  downsideCase: 如果试点始终保持创始人定制化交付，CAC 升到 $190K
  baseCase: $153K CAC
  upsideCase: 如果伙伴引荐更强，CAC 可降到 $125K
  y3RevenueImpactK: -140.0
  cashImpactK: -260.0
