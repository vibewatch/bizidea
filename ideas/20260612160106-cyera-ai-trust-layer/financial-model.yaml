scenarios:
  downside:
    description: "Microsoft-native and incumbent alternatives slow conversion, so the company closes fewer accounts and pricing stays closer to the first-year production floor."
    y3RevenueK: 3125.0
    y3EbitdaK: -785.0
    cashLowPointK: -365.0
    keyAssumptionChanges:
      - "Y3 blended annual ARPU reaches only about $280K because customers buy the first workflow package but delay retention and remediation upsells."
      - "New paid accounts slow to 3 in Y2 and 5 in Y3, ending near 13 total paid accounts."
      - "Gross margin exits near 68% because onboarding remains more services-heavy than the base case."
  base:
    description: "Founder-led design partners convert into a repeatable partner-assisted enterprise motion, then existing regulated customers add workflows and evidence retention on the same account."
    y3RevenueK: 4083.75
    y3EbitdaK: -203.33
    cashLowPointK: 449.97
    keyAssumptionChanges:
      - "Blended annual ARPU reaches $330K by Y3 as customers move from credited proof-of-value into $250K-$400K production subscriptions with modest expansion."
      - "Net new paid accounts total 4 in Y2 and 7 in Y3, ending at 16 paid accounts by Q4Y3."
      - "Gross margin rises from 45%-60% in Y1 to 72% by Q4Y3 as approval-packet delivery and integrations standardize."
  upside:
    description: "Blocked-rollout urgency proves stronger than expected, partners source warmer introductions, and expansion lands earlier inside each bank and pharma account."
    y3RevenueK: 4920.0
    y3EbitdaK: 420.0
    cashLowPointK: 835.0
    keyAssumptionChanges:
      - "Y3 blended annual ARPU reaches about $350K because evidence retention and second-workflow expansion attach sooner."
      - "New paid accounts accelerate to 5 in Y2 and 9 in Y3, ending near 19 paid accounts."
      - "Gross margin reaches 74% as onboarding becomes mostly template-led and partner-enabled."
sensitivity:
  - variable: ARPU
    downsideCase: "$280K blended annual ARPU by Y3"
    baseCase: "$330K blended annual ARPU by Y3"
    upsideCase: "$350K blended annual ARPU by Y3"
    y3RevenueImpactK: -620.0
    cashImpactK: -430.0
  - variable: CAC
    downsideCase: "$190K CAC if pilots stay founder-bespoke"
    baseCase: "$153K CAC"
    upsideCase: "$125K CAC through stronger partner sourcing"
    y3RevenueImpactK: -140.0
    cashImpactK: -260.0
  - variable: churn
    downsideCase: 4.0% monthly churn after first annual term
    baseCase: 2.5% monthly churn
    upsideCase: 1.5% monthly churn
    y3RevenueImpactK: -180.0
    cashImpactK: -135.0
  - variable: sales cycle
    downsideCase: 9-month pilot-to-production cycle
    baseCase: 6-7 month blended cycle
    upsideCase: 4-5 month cycle with live audit deadlines
    y3RevenueImpactK: -700.0
    cashImpactK: -410.0
  - variable: gross margin
    downsideCase: 68% exit gross margin
    baseCase: 72% exit gross margin
    upsideCase: 74% exit gross margin
    y3RevenueImpactK: 0.0
    cashImpactK: -165.0
  - variable: hiring pace
    downsideCase: "Pull forward AE, support, and alliances hiring by two quarters"
    baseCase: "Hire after design-partner and production proof points"
    upsideCase: "Delay one commercial hire until late Y3 because partner motions carry more load"
    y3RevenueImpactK: -90.0
    cashImpactK: -285.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> WorkflowExpansion
      WorkflowExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by 16 paying regulated-enterprise accounts by Q4Y3 at a $330K blended annual ARPU as paid pilots convert and existing customers add more governed workflows and retention."
  - checkName: Must go right
    finding: "The company must prove approval packets shorten rollout signoff enough that partner-sourced accounts keep adding at least one net new paid logo per quarter through Y2 without scaling sales too early."
  - checkName: Model breaks if
    finding: "If sales cycles stretch toward nine months or ARPU stalls near $280K, the downside case turns cash negative before the company establishes repeatable production lands."
  - checkName: Next-round proof
    finding: "The next financing is justified once the company exits Y2 with 9 paid accounts, 2+ partner-backed production wins, and clear evidence that the wedge supports $250K+ lands without becoming services-heavy."
sanityChecks:
  ruleOf40: "Y3 growth 124% + EBITDA margin -5% = 119%"
  burnMultiple: "Y2 burn multiple ~0.70x (-$1.05M EBITDA on +$1.51M revenue), improving to ~0.09x in Y3 (-$203K on +$2.26M revenue)."
  revenuePerFte: "$340K Y3 revenue per year-end FTE (benchmark $200-400K SaaS)."
  flags:
    - "The model assumes Microsoft- and ServiceNow-heavy rollout reviews create enough urgency to keep net new logo adds rising even before the category is fully established."
    - "ARPU depends on converting paid proofs of value into $250K-$400K annual subscriptions and then attaching second-workflow or retention upsells; weaker expansion would cut Y3 revenue materially."
    - "Cash is modeled as EBITDA with no working-capital timing, capex, or financing delay, so real-world collections or a later seed close would tighten runway versus the base case."
