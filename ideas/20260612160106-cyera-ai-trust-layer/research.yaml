competitors:
- name: Microsoft
  stage: incumbent
  wedge: Native governance across Copilot, Copilot Studio, Entra, Purview, and Microsoft 365 auditing.
  pricing: Native stack / enterprise licensing context, not a standalone specialist product on fetched pages.
  strength: Owns the identity, content, and admin surfaces where much of the data-access risk originates.
  weaknessVsUs: Does not default to a neutral, cross-system agent-attribution packet that also explains ServiceNow reach and prioritized permission cleanup.
  sourceRefs:
  - 3
  - 4
  - 6
- name: Cyera
  stage: scale-up
  wedge: DSPM plus AI Guardian links data sensitivity, identity, exposure, and AI usage.
  pricing: Custom enterprise quote.
  strength: Strong converged framing around the data layer as the AI perimeter, backed by category momentum and Microsoft partnership messaging.
  weaknessVsUs: Broader data-security scope can dilute a narrow rollout-approval workflow centered on per-agent runtime evidence for M365 plus ServiceNow.
  sourceRefs:
  - 1
  - 23
  - 24
- name: Varonis
  stage: incumbent
  wedge: Deep Microsoft 365, Entra ID, and data-behavior analytics for oversharing and anomalous access.
  pricing: Custom enterprise quote.
  strength: Very strong fit for SharePoint, OneDrive, and Entra-centric data exposure cleanup ahead of Copilot deployments.
  weaknessVsUs: Varonis is strongest on data exposure and behavior analytics, but less explicitly positioned around agent-run-specific approval artifacts spanning ServiceNow workflows.
  sourceRefs:
  - 21
  - 22
- name: SailPoint
  stage: incumbent
  wedge: Identity governance, agent identity security, and file access governance across SharePoint and other file systems.
  pricing: Custom enterprise quote.
  strength: Natural buyer alignment with identity and access-governance teams plus strong file-access governance semantics.
  weaknessVsUs: Identity depth does not automatically equal actionable blast-radius simulation for a given Copilot or ServiceNow agent run.
  sourceRefs:
  - 14
  - 25
  - 26
- name: Zenity
  stage: scale-up
  wedge: Purpose-built AI agent observability, posture management, and runtime security.
  pricing: Custom enterprise quote.
  strength: Agent-native discovery, configuration analysis, runtime monitoring, and shadow-AI detection.
  weaknessVsUs: More posture-and-runtime focused than explicitly optimized for regulated rollout signoff and Microsoft-to-ServiceNow evidence packaging.
  sourceRefs:
  - 27
  - 28
regulatoryTechnicalConstraints:
- point: Copilot honors existing user permissions, so oversharing and stale access in SharePoint or OneDrive become amplified rather than neutralized by the assistant itself.
  sourceRefs:
  - 6
  - 7
- point: Agent identities and delegated authority are now first-class governance objects in Entra, which raises the bar for lifecycle management and ownership tracking.
  sourceRefs:
  - 8
  - 9
- point: EU and UK guidance pushes enterprises toward accountable, auditable, human-supervised AI deployments when personal or sensitive data is involved.
  sourceRefs:
  - 19
  - 33
- point: Healthcare and pharma buyers will care about stronger governance and documentation expectations even when the first use case is operational rather than clinical.
  sourceRefs:
  - 34
