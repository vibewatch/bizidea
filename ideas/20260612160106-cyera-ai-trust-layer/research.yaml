openQuestions:
- How often do target buyers need runtime evidence at the individual file or record level versus summary approval evidence at the workflow level?
- Can the startup win as a read-only evidence layer first, or do design partners insist on automated remediation before they will buy?
- How much of the first-year delivery burden is graph normalization and permissions cleanup rather than recurring software usage?
- Will Microsoft and ServiceNow expose enough runtime identity detail to distinguish agent, delegated user, and service-principal actions consistently across all target workflows?
