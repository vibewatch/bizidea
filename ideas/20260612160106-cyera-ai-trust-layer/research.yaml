    - 10
  - friction: Native Microsoft controls already exist, so the product can be perceived as duplicative.
    severity: medium
    affectedBuyer: Microsoft platform owner
    mitigation: Frame the value as cross-system attribution, remediation ranking, and audit packet generation rather than generic policy management.
