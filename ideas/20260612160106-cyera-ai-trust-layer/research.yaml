  adoptionFrictionMatrix:
  - friction: Permission estates are already messy, so customers may need cleanup before simulation outputs look credible.
    severity: high
    affectedBuyer: SharePoint or data security owner
    mitigation: Start with highest-risk sites and service principals, then show prioritized fixes instead of insisting on tenant-wide remediation first.
    sourceRefs:
    - 7
    - 35
  - friction: Security teams may hesitate to grant another vendor broad graphing access to M365 and ServiceNow.
    severity: high
    affectedBuyer: CISO / identity lead
    mitigation: Lead with read-only connectors, customer-controlled retention, and explicit scope boundaries on what the platform collects.
    sourceRefs:
