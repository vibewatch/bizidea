differentiator: 大多数 AI 治理产品从模型策略或泛化的数据分类切入，这家公司则从一个一直没被解开的身份问题切进去：当 agent 真正碰到企业数据时，到底是谁在行动。也因此，它在上线前后都能派上用场：先做新 agent 的审批引擎，再做审计和事故调查时的运行证据系统。这个切口在重 Microsoft 的环境里尤其强，因为群组继承、委托权限和协作内容蔓延会藏出一大片隐形影响半径，而泛 IAM 或 DSPM 工具很难用 agent 原生的语言把它讲清。
