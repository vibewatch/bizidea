topRisks:
- name: 平台依赖
  description: Microsoft 或 ServiceNow 可能补齐原生归因能力，削弱第三方信任层的必要性。
  mitigation: 先从原生日志做不到统一的跨系统证据、权限链分析和修复工作流切进去，再尽快建立深生态合作。
- name: 现有厂商挤压
  description: Cyera、Varonis 或其他 DSPM 厂商可能很快补到 agent 归因，把赛道挤满。
  mitigation: 先赢下狭窄的 rollout 审批切口，在重 Microsoft 的环境里更快交付，并在赛道变宽前先占住 agent 专属证据系统的位置。
- name: 扩容闸门之外紧迫感不够
  description: 如果潜在客户还停在小规模试点，问题未必痛到现在就买。
  mitigation: 只卖给正处在扩容、审计或事故复盘触发点上的客户，因为这些场景里审批延迟已经有明确负责人和可见成本。
