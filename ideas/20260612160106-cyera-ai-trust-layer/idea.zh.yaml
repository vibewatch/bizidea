jobsToBeDone:
- job: 当 Copilot rollout 要从一个部门扩到更大范围时，帮 AI 安全工程师证明每个 agent 能触达哪些敏感数据，好让他们在不盲目暴露的前提下批准部署。
  currentAlternative: 手工权限审查、基于表格的访问证明，以及 rollout 延期
  successMetric: 批准 rollout 扩容所需天数，以及被移除的过度访问路径数量
- job: 当内部审计追问是谁通过 AI 碰了敏感数据时，帮数据安全团队把人工、委托和 agent 行为拆开，用证据回答，而不是临时去拼日志。
  currentAlternative: 在身份、SaaS 和数据工具之间手工串 SIEM 日志做调查
  successMetric: 为一次 agent 驱动的访问事件产出完整审计链路的平均耗时
