problem: 大型企业还没搞清楚，多年累积下来的混乱权限会让 Microsoft 365 copilot 和内部 agent 继承到哪些敏感数据，就已经把它们推进真实工作流。安全团队往往分不清一次高风险操作到底来自员工、受委托的 service principal，还是 AI agent，于是每次扩容评审都得陷入漫长的人工排查。现有 DSPM、IAM 和 SIEM 工具各自只能看见问题的一部分，给不出按 agent 划分的影响半径和审计证据，谨慎的 CISO 也就不敢放行继续扩容。
targetUser:
  primary: Fortune 1000 金融服务或药企里负责 Microsoft 365 copilot 与内部 service agent 上线的 数据安全负责人或 AI 安全工程负责人
  secondary: 负责敏感协作数据的身份治理负责人或 SharePoint 平台负责人
  buyer: CISO 或信息安全副总裁
startupThesis:
  nonObviousInsight: 下一笔企业 AI 预算，不会再投向一个泛泛的模型治理仪表盘，而会投向一层身份解析基础设施：当人和 agent 都沿着同一套 SaaS 权限、群组和 service principal 在跑时，它能把两者拆开。
  beachhead: Fortune 1000 金融服务和药企，拥有 15,000+ Microsoft 365 席位、庞杂的 SharePoint 与 OneDrive 资产，并且已经在跑 Copilot Studio 或 ServiceNow 员工支持 agent 试点。
  wedge: 一张 agent 归因图谱：把每条 agent 工作流能触达的敏感 M365、SharePoint、OneDrive、Teams 和 ServiceNow 数据画出来，再在生产扩容前给出按运行批次拆分的审计证据和权限修复优先级。
  whyNowCatalyst: Cyera 把数据访问定义成 AI 新边界，再叠加 68% 的归因盲区，让 agent 上线审批立刻变成治理瓶颈。
  ventureScalePath: 先从以 Microsoft 为中心的 agent readiness 切进去，再扩到跨 SaaS 与 data cloud 的权限可观测性、持续 recertification、策略执行，以及覆盖所有企业 AI 工作流的自动修复。
solution: 产品接入 Entra ID、Microsoft 365、SharePoint、OneDrive、Teams、ServiceNow 以及现有 SIEM 或 DSPM 工具，搭出一张实时图谱，把用户、service principal、agent、数据存储和继承权限放到一处。针对每条拟上线或已上线的 agent 工作流，它会模拟能触达哪些敏感数据，标出访问路径里哪些靠用户委托、哪些靠常驻机器身份，再把运行时真正碰过什么记下来。安全团队最终拿到的是一份能直接给审批人看的视图，一次回答三个问题：这个 agent 能看什么、它实际看了什么、哪些权限链该先清。第一版的赢法很直接——把原本靠表格做的访问分析，从几个月压到几天。
goToMarketSeed:
  firstCustomer: 一家正在把 5,000+ 席位的 Microsoft 365 Copilot rollout 扩大，同时为 HR 或 IT 支持上线 Copilot Studio 或 ServiceNow agent 的美国前 20 大银行或全球药企。
  buyingTrigger: AI 试点要从小范围扩到更广的员工访问，或在给 agent 开放 SharePoint、Teams 与工单数据之前，内部审计与风险评审先卡进来。
  currentAlternative: SIEM 日志、季度访问审查、手工清理 SharePoint，以及在安全团队签字前先冻结 agent 扩容。
  switchingReason: 这个切口能在几天内给安全团队一张按 agent 划分的影响半径图和可归因的运行证据，不必先花多个季度重做一遍 least-privilege 架构，rollout 才能继续往前走。
  pricingHypothesis: 按受监控的 agent 工作流、接入的 M365 tenant 数量和受保护的敏感数据存储收取年度平台费。
