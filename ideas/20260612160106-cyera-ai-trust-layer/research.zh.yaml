  strength: 身份、内容和管理界面本来就在它手里，数据访问风险大多也从这些表面长出来。
  weaknessVsUs: 默认不会给出一份中立、跨系统的 agent 归因包，也很难同时解释 ServiceNow 的可达范围和权限修复优先级。
