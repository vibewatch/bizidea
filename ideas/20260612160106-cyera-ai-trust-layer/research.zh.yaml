  - 4
  - 6
- name: Cyera
  stage: scale-up
  wedge: DSPM 加 AI Guardian，把数据敏感度、身份、暴露面和 AI 使用串起来。
  pricing: 企业定制定价。
  strength: 从数据层切 AI 边界的 framing 很强，赛道 momentum 也在，加上对 Microsoft 生态的合作叙事。
  weaknessVsUs: 更宽的数据安全范围，可能稀释掉那个围绕 M365 + ServiceNow 单次 agent 运行证据的窄审批工作流。
  sourceRefs:
  - 1
  - 23
  - 24
- name: Varonis
  stage: incumbent
  wedge: 深耕 Microsoft 365、Entra ID 以及面向 oversharing 和异常访问的数据行为分析。
  pricing: 企业定制定价。
  strength: 在 Copilot 部署前做 SharePoint、OneDrive 和 Entra 场景的数据暴露清理，非常贴。
  weaknessVsUs: Varonis 的强项是数据暴露和行为分析，但它没有把自己明确定位成跨 ServiceNow 工作流、按 agent 运行批次出审批工件的产品。
  sourceRefs:
  - 21
  - 22
- name: SailPoint
  stage: incumbent
  wedge: 身份治理、agent identity security，以及覆盖 SharePoint 和其他文件系统的文件访问治理。
  pricing: 企业定制定价。
  strength: 和身份及访问治理团队的买方画像天然贴合，文件访问治理语义也很强。
  weaknessVsUs: 身份做得深，不等于就能把某次 Copilot 或 ServiceNow agent 运行的影响半径模拟成可执行结果。
  sourceRefs:
  - 14
  - 25
  - 26
- name: Zenity
  stage: scale-up
  wedge: 专为 AI agent 打造的可观测性、posture 管理和运行时安全。
  pricing: 企业定制定价。
  strength: 对 agent 原生的发现、配置分析、运行监控和 shadow AI 检测更强。
  weaknessVsUs: 更偏 posture 与运行时，不是专门围绕受监管 rollout 签字和 Microsoft 到 ServiceNow 的证据打包来优化。
  sourceRefs:
  - 27
  - 28
regulatoryTechnicalConstraints:
- point: Copilot 会继承用户现有权限，所以 SharePoint 或 OneDrive 里的过度共享和陈旧访问不会被助手抹平，只会被放大。
  sourceRefs:
  - 6
  - 7
- point: Entra 已经把 agent 身份和委托权限当成一等治理对象，这直接抬高了生命周期管理和归属追踪的要求。
  sourceRefs:
  - 8
  - 9
- point: 当个人数据或敏感数据卷进来时，欧盟和英国的指导都在把企业往“可问责、可审计、有人监督”的 AI 部署方式上推。
  sourceRefs:
  - 19
  - 33
- point: 医疗和 pharma 买方即便首个用例是运营类而非临床类，也会更在意治理和文档要求。
  sourceRefs:
  - 34
validationSignals:
- point: Cyera 最近的大额融资和 trust-layer framing，说明投资人相信：面向 agentic AI 的数据访问治理会长成基础设施。
  sourceRefs:
  - 1
  - 2
- point: 多项调查已经显示，企业环境里未知 agent、范围越界、事故和审批覆盖不足并不罕见。
  sourceRefs:
  - 15
  - 16
  - 17
- point: 连 Microsoft 自己的 rollout 指南，都把 oversharing 整改和治理护栏当成 Copilot 大规模部署前的基础前提。
  sourceRefs:
  - 5
  - 7
openQuestions:
- 目标买方到底多常需要看到单个文件或记录级别的运行证据，而不是工作流级别的摘要审批证据？
- 这家初创公司能不能先以只读证据层切进去，还是说共创客户一上来就会要求自动修复？
- 第 1 年交付压力里，有多少其实花在图谱标准化和权限清理，而不是持续的软件使用？
- Microsoft 和 ServiceNow 暴露出来的运行时身份细节，能否在所有目标工作流里稳定区分 agent、委托用户和 service principal 行为？
