slug: agent-activity-attribution-graph
date: '2026-06-12'
executiveSummary: >-
  This company sells an agent-attribution trust layer for regulated enterprises
  rolling out Microsoft 365 Copilot, Copilot Studio, and ServiceNow agents over
  messy permission estates. The first product is a read-only graph that shows
  what a given agent can reach across Entra ID, SharePoint, OneDrive, Teams, and
  ServiceNow before expansion, then records what it actually touched at runtime.
  The initial buyer is a CISO-led security team at a bank or pharma company with
  15,000+ Microsoft 365 seats and a blocked rollout review, because that is
  where oversharing and attribution risk already has executive visibility. The
  wedge is narrower than generic AI governance: produce approval packets and
  remediation priorities that shorten rollout signoff from manual spreadsheet
  work to days. Research supports real urgency, with Microsoft emphasizing
  oversharing readiness and multiple surveys showing unknown agents, scope
  violations, and incomplete approval coverage; however, exact conversion rates
  and the minimum evidence package that buyers will pay for still need
  validation. TAM, SAM, and SOM are modeled estimates from installed-base and
  ACV assumptions, not booked demand. The company should deliberately avoid
  broad model-governance, customer-facing agent use cases, and inline enforcement
  until it proves a repeatable land motion around pre-production approval and
  audit evidence. If the team can win three paid design partners and convert
  pilots into $250k-$400k production lands, it can become the system of record
  for agent-specific evidence before incumbents flatten the category.
problem:
  - >-
    Copilot and ServiceNow agent rollouts inherit stale Microsoft 365
    permissions and overshared SharePoint or OneDrive content, so security teams
    cannot prove an agent's blast radius before broader deployment.
  - >-
    Existing SIEM, DSPM, and identity tools show pieces of the problem but do
    not separate human, delegated, and agent activity into one approver-ready
    record.
  - >-
    Manual access review and audit preparation stretch rollout approval into
    weeks or quarters, turning security into the gating function for otherwise
    funded AI programs.
solution:
  - >-
    Build a read-only attribution graph across Entra ID, Microsoft 365,
    SharePoint, OneDrive, Teams, and ServiceNow that simulates what each agent
    can reach before production expansion.
  - >-
    Capture runtime evidence that labels whether sensitive access came through a
    human, delegated user context, or standing machine identity, then tie that
    evidence back to the approved workflow.
  - >-
    Generate approval packets and ranked permission-cleanup actions so rollout
    committees can sign off faster without requiring a full least-privilege
    rebuild first.
whyWeWin:
  - >-
    The product is anchored to a concrete approval workflow, not a generic AI
    governance dashboard, which makes the first ROI metric shorter rollout
    review time rather than abstract compliance posture.
  - >-
    The wedge spans Microsoft 365 and ServiceNow in one evidence model, where
    native controls and incumbent tools usually stop at a single stack or a
    broader data-security story.
  - >-
    Early focus on regulated banks and pharma creates tighter feedback loops on
    audit evidence quality, remediation patterns, and partner requirements than
    a broader horizontal launch would.
strategicChoices:
  beachhead: >-
    Fortune 1000 banks and global pharma companies with 15,000+ Microsoft 365
    seats that are expanding an internal HR or IT-support agent from pilot to
    broader employee access.
  wedgeRationale: >-
    This slice already has oversharing cleanup projects, formal rollout
    committees, and named security owners, so a product that reduces review time
    can get paid before buyers ask for a full autonomous-agent security suite.
  sequencingRationale: >-
    Start read-only with pre-launch simulation and post-run evidence on the
    highest-risk Microsoft and ServiceNow connectors; add remediation workflows
    only after the approval packet is repeatable; hire enterprise solutions and
    identity engineering before scaling sales because trust and integration depth
    determine early conversions more than top-of-funnel volume.
  notYet:
    - Customer-facing autonomous agents and external customer data workflows
    - Generic model policy management
    - Inline blocking and autonomous remediation by default
    - Non-Microsoft collaboration stacks
market:
  tam: >-
    $900M modeled TAM based on roughly 3,000 large global Microsoft 365 and
    ServiceNow accounts at about $300k annual land value.
  sam: >-
    $75M modeled SAM for roughly 250 finance and pharma accounts with 15k+
    Microsoft 365 seats, SharePoint sprawl, and active Copilot or ServiceNow
    rollouts.
  som: >-
    $7.5M year-3 SOM assuming 25 beachhead customers at roughly $300k annual
    land value.
  segments:
    - Regulated financial-services enterprises expanding Microsoft 365 Copilot
    - Global pharma enterprises deploying internal support agents over sensitive collaboration data
  buyingProcess: >-
    A rollout committee or audit event usually starts the deal. AI security or
    data-security teams run evaluation with SharePoint, Entra, and ServiceNow
    owners, and the CISO or VP of Information Security signs budget once the
    proof of value shows faster approval cycles and fewer excessive access
    paths.
product:
  mvp: >-
    The MVP is a read-only approval and evidence layer for one Microsoft 365
    tenant and one ServiceNow instance. It ingests identities, permissions,
    sensitive-data pointers, and audit events to produce per-agent blast-radius
    maps, permission-chain explanations, and downloadable approval packets for
    rollout committees.
  sixMonth: >-
    Cover Entra ID, SharePoint, OneDrive, Teams, and one ServiceNow instance;
    deploy at 2-3 design partners; and prove the system can generate usable
    approval packets within 10 business days of data connection.
  twelveMonth: >-
    Add runtime evidence retention, finance and pharma policy templates, ranked
    remediation workflows, and integrations into Purview, SIEM, and SailPoint
    for handoff rather than rip-and-replace.
  twentyFourMonth: >-
    Expand into cross-SaaS agent flows and continuous recertification, then add
    policy enforcement and automated remediation only where observed evidence
    shows repeatable false-positive rates are low.
  keyBets:
    - Buyers will pay for read-only approval evidence before demanding inline control.
    - Five core connectors capture most first-year risk in the beachhead.
    - Approval packets can become a standard artifact in rollout committees.
    - Runtime evidence and remediation outcomes can compound into a durable scoring moat.
gtm:
  wedge: >-
    Security-led proof of value for blocked Copilot or ServiceNow rollout
    expansions in regulated enterprises.
  channels:
    - Direct enterprise selling into active rollout reviews and audit escalations
    - Microsoft security, Purview, and identity partners
    - ServiceNow implementers and security advisory firms
  funnelTargets: "Target account to security discovery 20-30%, discovery to paid pilot 40-50%, pilot to production 60%+, production to second governed workflow within 12 months 50%+"
  pricing: >-
    Annual subscription priced by monitored agent workflows plus connected tenant
    and instance count, with a paid proof of value credited toward production;
    this matches value because approval effort and audit scope scale with
    governed workflows more than seat count alone.
businessModel:
  revenueStreams:
    - Annual platform subscription
    - Paid proof-of-value and onboarding packages
    - Premium modules for extended evidence retention and remediation automation
  unitOfValue: Governed agent workflow in production
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more agent workflows within the same tenant and business unit
    - Expand into additional business units, geographies, or regulated data stores
    - Upsell longer evidence retention and audit reporting
    - Upsell remediation automation once manual handoff is proven
strategyMap:
  northStarMetric: Production agent workflows with continuous approval and runtime evidence coverage
  inputMetrics:
    - Qualified design partners with a live blocked-rollout use case
    - Days from connector activation to first approval packet
    - Excessive access paths remediated per onboarded workflow
    - Paid pilot to production conversion rate
    - Production workflows expanded per customer within 12 months
  moatsToBuild:
    - Cross-system identity and permission graph linking Entra, Microsoft 365, and ServiceNow
    - Historical dataset comparing approved access scope to actual runtime touches
    - Library of remediation playbooks for overshared Microsoft 365 estates
    - Partner trust with rollout committees in regulated enterprises
  killCriteria:
    - Fewer than 3 of the first 15 target accounts report rollout delay or audit pain severe enough to fund a pilot.
    - Less than 50% of paid pilots convert to production within 6 months.
    - Microsoft or an incumbent closes the cross-system evidence gap enough that prospects stop asking for a neutral third-party approval packet.
  mermaid: |
    flowchart LR
      Wedge[Blocked Copilot expansion review] --> MVP[Read-only attribution graph]
      MVP --> Proof[Approval packets and runtime evidence]
      Proof --> Expansion[Multi-workflow expansion and recertification]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Real buyer pain and a disciplined wedge, but differentiation against Microsoft and DSPM incumbents still needs field proof.
    whyBelieve: The plan targets an already-funded approval bottleneck in regulated Microsoft-heavy enterprises rather than asking buyers to invent a new governance budget from scratch.
    whyDoubt: Native controls or incumbent extensions could absorb enough of the workflow that a startup never becomes the system of record.
    nextDiligence: Verify that 3-5 banks or pharma enterprises will pay for pre-production approval packets before demanding full inline enforcement.
  firstCustomer:
    title: AI security lead at a top-20 bank running Copilot expansion
    profile: >-
      A 15,000+ seat Microsoft 365 enterprise with overshared SharePoint and
      OneDrive content, active Copilot Studio or ServiceNow HR or IT agents, and
      a formal rollout review committee.
    trigger: >-
      A pilot is ready to expand beyond one department and security must prove
      least-privilege data reach before broader employee access.
    buyer: CISO
    initialContract: >-
      Paid 8-12 week proof of value at $50k-$100k, credited toward a
      $250k-$400k annual production subscription for one tenant, one ServiceNow
      instance, and the first 5-10 governed workflows.
  mustBeTrue:
    - At least half of target design partners currently delay rollout expansion because agent-specific data reach cannot be proven quickly.
    - Buyers accept read-only evidence plus remediation ranking as a budget-worthy first product before they require inline blocking.
    - Microsoft and ServiceNow expose enough identity and runtime telemetry to distinguish agent, delegated user, and service-principal actions in the initial workflows.
    - A neutral approval packet converts pilots faster than incumbent tool combinations or manual review alone.
    - The company can land at $250k+ ACV and expand through additional workflows without becoming a services-heavy business.
  diligenceQuestions:
    - Which exact approval artifacts make a rollout committee shorten signoff time?
    - How often do early customers require runtime evidence at file or record level instead of workflow summary level?
    - What parts of onboarding are repeatable software versus bespoke entitlement cleanup?
    - How differentiated is the product if Microsoft improves native cross-app attribution in the next 12 months?
    - Which incumbent is easiest for buyers to extend instead of adding a new vendor?
operatingAssumptions:
  - assumption: Buyers will fund a read-only approval and evidence layer before they demand inline enforcement.
    basis: research.yaml
    validationTest: Convert at least 2 of the first 4 paid pilots without committing to inline blocking in the initial contract.
    decisionImpact: If false, the roadmap and hiring plan must shift earlier toward policy enforcement and deeper control-plane integrations.
  - assumption: Entra, SharePoint, OneDrive, Teams, and ServiceNow capture most first-year risk in the beachhead.
    basis: research.yaml
    validationTest: In the first 8 design-partner scoping calls, more than 70% of high-risk workflows involve these five connectors.
    decisionImpact: If false, narrow the ICP further or fund broader integration work before scaling sales.
  - assumption: A production land of $250k-$400k is achievable for the first workflow package.
    basis: operator judgment
    validationTest: Secure 3 written pilot-to-production proposals that preserve at least $250k annual contract value.
    decisionImpact: If false, the company needs lower-cost onboarding, a different pricing basis, or a larger top-of-funnel before raising for scale.
  - assumption: Approval packets can cut rollout review cycles to fewer than 10 business days after data connection.
    basis: idea.yaml
    validationTest: Measure before and after approval-cycle timing across 3 design partners and confirm at least a 50% reduction.
    decisionImpact: If false, reposition the product toward audit and incident evidence rather than rollout acceleration.
  - assumption: Partner-led introductions can accelerate enterprise trust faster than a large direct sales team in year one.
    basis: research.yaml
    validationTest: At least 50% of qualified pipeline in the first 12 months is introduced or materially accelerated by Microsoft, ServiceNow, or advisory partners.
    decisionImpact: If false, increase direct sales hiring and expect a larger capital requirement before repeatability.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview and scope 10 target banks and pharma accounts with active Copilot or ServiceNow expansion reviews.
    hypothesis: The majority of qualified prospects already have a named approval bottleneck and can describe the current manual workflow.
    successMetric: 6 or more accounts share a live review process and 3 agree to design-partner scoping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build the first Entra, SharePoint, OneDrive, Teams, and ServiceNow read-only ingestion pipeline.
    hypothesis: The core graph can reconstruct agent-to-data reach without write access or disruptive deployment changes.
    successMetric: One pilot tenant produces a credible blast-radius map for at least 2 real agent workflows.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run paid proof-of-value projects with approval packets for 3 design partners.
    hypothesis: Approval artifacts and remediation ranking are valuable enough to convert a free evaluation into paid work.
    successMetric: 2 or more paid pilots signed and at least one security committee uses the packet in a real review.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Test pricing and packaging with workflow-based production proposals.
    hypothesis: Buyers prefer workflow-count pricing over seat-based pricing because it matches risk committee scope and internal budgeting.
    successMetric: At least 2 proposals above $250k annual value advance to procurement or budget approval.
    owner: Founding security product lead
  - horizon: 6–12 months
    experiment: Launch runtime evidence retention and compare pilot conversion against simulation-only deployments.
    hypothesis: Post-run evidence materially improves conversion and expansion because audit teams need proof of actual access, not just simulated reach.
    successMetric: Production conversion is at least 20 points higher in accounts using runtime evidence.
    owner: Founding eng
  - horizon: 6–12 months
    experiment: Formalize partner co-sell motions with one Microsoft-focused integrator and one ServiceNow implementation partner.
    hypothesis: Partners can supply better qualified, later-stage opportunities than cold outbound in the first year.
    successMetric: Two partner-sourced opportunities enter paid pilot and one closes to production.
    owner: Design partner seller
operations:
  - Read-only ingestion and normalization pipeline for Entra, Microsoft 365 audit signals, SharePoint permissions, and ServiceNow roles
  - Standard approval-packet template for rollout committees with blast radius, evidence, and remediation ranking
  - Solutions-engineering playbook that hands permission cleanup into customer teams or incumbent tools instead of custom consulting
  - Evidence-retention controls and customer-managed access policies suitable for regulated audit requests
  - Partner enablement for Microsoft security integrators and ServiceNow implementers
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the graph ingestion, identity resolution, and approval-packet generation engine.
  - role: Founding security product lead
    startTiming: Month 0
    rationale: Translate rollout-committee pain into product requirements, policy templates, and buyer-facing evidence design.
  - role: Solutions architect
    startTiming: Month 3
    rationale: Own M365 and ServiceNow deployment design, shorten pilot time, and keep onboarding standardized.
  - role: Design partner seller
    startTiming: Month 6
    rationale: Convert founder-led traction into a repeatable enterprise sales motion once the first proof points exist.
  - role: Identity and integrations engineer
    startTiming: Month 6
    rationale: Deepen Purview, SIEM, and SailPoint interoperability once the core wedge is working in production.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid design partners in bank or pharma accounts
      - Ship the Microsoft 365 and ServiceNow read-only graph with approval-packet export
      - Convert at least 2 pilots into production subscriptions
      - Establish 2 referenceable partner motions with Microsoft or ServiceNow ecosystem firms
  - horizon: 12–24 months
    items:
      - Add runtime evidence retention and standardized remediation workflows
      - Reach 8-10 production customers with repeatable workflow-based pricing
      - Prove expansion from first workflow into second workflow in at least half of customers
      - Publish benchmark data on approval-cycle reduction and excessive access removal
  - horizon: 24–36 months
    items:
      - Expand beyond the initial connector set into broader cross-SaaS agent coverage
      - Become the system of record for agent recertification in the beachhead verticals
      - Demonstrate that automation and retention upsells lift net revenue retention without a large services burden
risks:
  - risk: Microsoft closes enough of the cross-app attribution gap that buyers treat third-party evidence as optional.
    likelihood: Medium
    impact: High
    mitigation: Focus on neutral approval packets, ServiceNow correlation, and prioritized remediation workflows that native controls do not unify.
  - risk: Incumbent DSPM or identity vendors extend into agent approval quickly and compress new-vendor appetite.
    likelihood: High
    impact: High
    mitigation: Win the narrow rollout-approval workflow first, integrate with incumbents instead of displacing them, and collect proprietary approval-versus-runtime evidence data.
  - risk: Early deployments become services-heavy entitlement cleanup projects with weak software leverage.
    likelihood: Medium
    impact: High
    mitigation: Keep the first product read-only, standardize onboarding playbooks, and route remediation execution to customer teams or partners.
  - risk: Prospects in tiny pilots do not feel enough urgency to buy.
    likelihood: Medium
    impact: Medium
    mitigation: Qualify only accounts with active expansion, audit, or incident-review triggers and disqualify generic AI experimentation.
  - risk: Runtime telemetry is too inconsistent to separate agent, delegated user, and service-principal actions in key workflows.
    likelihood: Medium
    impact: High
    mitigation: Narrow the initial workflow set to the connectors with reliable evidence and make unsupported workflows explicit in scope documents.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of core graph and evidence product development, prove 3 paid
    design partners and 2-3 production conversions, hire engineering plus
    solutions and enterprise sales coverage, and reach repeatable $250k+
    workflow-based enterprise lands in regulated accounts.
