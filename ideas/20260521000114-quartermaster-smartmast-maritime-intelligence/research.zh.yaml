    - 23
  - friction: 工作流惯性和人工回退
    severity: 中
    affectedBuyer: 海上业务负责人
    mitigation: 先作为调查助手贴着现有签单和理赔流程跑，再逐步扩进 system-of-record 工作流。
    sourceRefs:
    - 28
