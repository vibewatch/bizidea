    - 25
    - 24
market:
  tam:
    value: $90.0M
    rationale: UNCTAD 报告显示，散货船、油轮和普通货船合计约 1.754B dwt。按平均每艘约 45k dwt 倒推，相关船舶约 3.9 万艘；再假设其中 20% 属于高审查船队，每个船舶等价值单位年软件支出约 $11.5k，对应 TAM 约 $90M。
    isEstimate: true
    sourceRefs:
    - 4
    - 8
  sam:
    value: $21.0M
    rationale: 把 TAM 收缩到地中海、红海、海湾和东南亚这些制裁敏感走廊里的油轮、散货船和货运业务簿：大约 1,800 艘受监控船，按每个船舶等价值单位每年约 $11.5k 计算。
    isEstimate: true
    sourceRefs:
    - 1
    - 23
    - 15
  som:
    value: $4.5M
    rationale: 一个说得通的第 3 年 SOM，是大约 15 个正式部署的保险公司或协会 logo，混合 ACV 约 $300k；每个客户相当于跑 1-2 条重点业务簿。
    isEstimate: true
    sourceRefs:
    - 28
    - 15
    - 14
