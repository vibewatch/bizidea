  wedge: 用于欺瞒航运、制裁和船舶风险识别的海事 AI
  pricing: 企业定制定价
  strength: 在制裁合规工作流里，它的行为模型深、市场公信力也强。
  weaknessVsUs: 但它的第一定位并不是面向保险公司的签单 / 续保 / 理赔证据工作台。
  sourceRefs:
  - 29
  - 26
  - 28
- name: Pole Star Global
  stage: 规模化公司
  wedge: 持续跟踪与海事制裁合规情报
  pricing: 企业定制定价
  strength: 在持续跟踪、dark fleet 分析和合规级船舶可见性上，叙事很强。
  weaknessVsUs: 它更偏跟踪 / 合规，而不是围绕组合学习的承保或理赔工作流。
  sourceRefs:
  - 21
  - 22
  - 20
- name: Insurwave
  stage: 规模化公司
  wedge: 带船舶跟踪与航次分析的特种保险工作流平台
  pricing: 企业定制定价
  strength: 相比纯海事情报厂商，它离保险运营和保单工作流更近。
  weaknessVsUs: 但它是更广义的特种险平台，焦点会被稀释，不像我们这么专盯 dark fleet 行为真相切口。
  sourceRefs:
  - 34
  - 32
  - 35
- name: Kpler
  stage: 现有厂商
  wedge: 服务 P&I 风险管理和制裁监控的大宗商品与海事情报
  pricing: 企业定制定价
  strength: 它在 shadow fleet 暴露分析上，对协会和风险团队有很强分析公信力。
  weaknessVsUs: 但它落点仍然是情报和分析，不是一套为承保人量身做的 underwriting OS。
  sourceRefs:
  - 14
  - 11
regulatoryTechnicalConstraints:
- point: AIS 在多数商船上是强制要求，而且原则上必须保持开启，所以产品不能把每一次中断都直接当成欺诈，必须把例外讲清楚。
  sourceRefs:
  - 2
  - 16
- point: 油价上限和制裁工作流越来越要求逐航次证明、附带成本权利和对 STS 敏感的文档链路。
  sourceRefs:
  - 1
  - 18
  - 25
- point: P&I 协会已经在高风险区域维护最低船舶跟踪标准，所以任何新工具都必须接进既有合规流程，而不是另起一套。
  sourceRefs:
  - 24
  - 14
- point: 车船联网和历史航次数据会带出留存、共享、隐私和理赔解释等治理问题。
  sourceRefs:
  - 9
  - 33
validationSignals:
- point: Quartermaster 说自己的 SmartMast 网络已经部署在 600+ 艘船上，覆盖 1,000 万平方英里海域，这意味着第三方海事真相层已经不是概念验证。
  sourceRefs:
  - 6
- point: Windward 发现 75% 的海上承保人如果能立刻拿到数据，就会更快做决定；这直接验证了“提速工作流”这条切口。
  sourceRefs:
  - 28
- point: 国际集团旗下协会本来就在采购跟踪工具，并用它们监控高风险区域的船舶行为，这说明预算和流程归属已经存在。
  sourceRefs:
  - 24
- point: Insurwave 已经上线伪造位置过滤和威胁情报集成，说明保险用户确实在乎船舶数据完整性。
  sourceRefs:
  - 35
  - 33
openQuestions:
- 第三方观测证据究竟会不会实质改变签单和续保判断，还是买方一开始只会把它局限在承保后调查？
- 哪些数据供应商愿意给到足够的历史回放和导出权，让创业公司拥有面向保险公司的证据包，而不是只转卖告警？
- 对一个 5-20 人的承保团队来说，要看到多大的处理周期缩短或风险泄漏下降，才愿意付 $200k-$300k 年费？
- 面对一条可疑航次时，理赔、制裁和承保团队会在证据门槛上分歧多大，最后谁说了算？
