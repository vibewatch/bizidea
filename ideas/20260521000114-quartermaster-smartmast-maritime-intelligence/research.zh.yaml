  adoptionFrictionMatrix:
  - friction: 第三方数据权与可迁移性
    severity: 高
    affectedBuyer: 产品与采购负责人
    mitigation: 在正式试点前就把历史回放、导出权和多源冗余写进合同。
    sourceRefs:
