slug: dark-fleet-underwriting-os
date: '2026-05-21'
executiveSummary: Dark Fleet Underwriting OS 卖给海上保险公司和 P&I 协会——即便 AIS 能被伪造或直接关闭，它们仍得做签单、续保和理赔决定。首个滩头市场是那些 5-20 人的专业承保团队，负责 100-300 艘油轮、散货船和沿海货船，航线覆盖地中海、红海、波斯湾和东南亚等制裁敏感走廊；在那里，可疑黑屏已经会触发人工升级。产品从一套“航次真相”工作台起步，把 AIS、第三方观测、经纪人证明和理赔文件拼成可解释的时间线与证据包，让团队不用再把表格和外部调查员当默认方案。为什么是现在尤其成立：保险公司已经在应对逐航次证明和 spoofing 相关审查，而第三方海事感知据称已覆盖 600+ 艘船、1,000 万平方英里海域。公司要刻意避开“另一个泛海事仪表盘”的坑，也不要自己去养传感器网络；真正的切口是原生面向保险公司的工作流、可审计性，以及组合反馈闭环。第一单应该是一笔围绕单一制裁敏感业务簿的付费试点，由续保季、审计或争议损失事件触发；等团队在真实决策周期里接受这套证据后，再扩成年度正式部署。定价应顺着当前预算归属来走：团队订阅费，加按船舶和按调查收费；等跑完一个续保周期后，再上企业级合同。眼下最大的开放问题有两个：数据伙伴会不会给回放和导出权；第三方观测到底能不能影响承保前判断，而不是只停留在承保后的调查。如果这两条成立，公司可以从承保一路长到理赔、再保险报告、贸易融资尽调和其他海事风险流程；若不成立，它更可能只是个更窄的调查工具。
problem:
- 承保人和理赔团队到现在还在靠 AIS 历史、经纪人问卷和人工分析做判断，可 AIS 明明能被伪造，也能直接关掉。
- 一旦出现可疑黑屏、船对船转运或航线异常，案件就会慢慢升级到资深承保人或外部调查员手里，证据链又弱。
- 现有海事数据产品会给告警，但做不出保险级的签单、续保、理赔决策包，也没有组合学习闭环。
solution:
- 把 AIS、第三方观测数据、经纪人证明和理赔文件接进一条航次真相时间线，事件带可信度评分，也能追溯来源。
- 给承保团队一套续保和新业务工作台，在保单签发前拎出黑屏时段、可疑会合和航线不一致。
- 给理赔和制裁团队一套结构化调查包，把证据、分析师判断和案件结果都沉淀下来，供后续组合学习。
whyWeWin:
- 公司可以踩着正在成形的传感器和 RF 生态往上走，而不必自己砸钱做船载硬件。
- 产品是按保险公司的原生工作流、可审计性和案件证据来设计的，不是泛海事监控。
- 承保和理赔结果会不断沉淀成专有标签，时间越久，模型质量和切换成本越强。
- 先打透一条业务簿，比第一天就去卖泛海事情报平台，更快拿到验证。
strategicChoices:
  beachhead: 先切入制裁敏感的海上保险公司和 P&I 协会：承保团队 5-20 人，管理 100-300 艘油轮和干散货船，航线覆盖地中海、红海、波斯湾或东南亚。
  wedgeRationale: 先盯住单一业务簿里的可疑航次续保复核和争议理赔调查，因为这里的用户、预算归属、触发点和替代方案全都看得见；如果一上来就做泛海事仪表盘或跨细分平台，只会拖慢验证、稀释产品边界。
  sequencingRationale: 顺序要卡准：先拿下数据权合作，再做 concierge 式调查助手，再做让人信得过的续保工作流，最后才是在同一家保险公司内部扩组合。这样能先把证据可信度跑通，再去要求买方改签单权限或深度连到保单系统。
  notYet:
  - 自建船载硬件，或部署自有感知网络
  - 面向政府和船队运营方的通用海事情报控制台
  - 在保险工作流产品契合度跑通前，就提前做贸易融资、租船风险或港口合规产品
market:
  tam: 全球高审查油轮、散货船和货运船队，对应的软件 TAM 约 $90M。
  sam: 地中海、红海、海湾和东南亚制裁敏感油轮、散货船与货运业务簿，对应的 SAM 约 $21M。
  som: 按第 3 年约 15 个正式部署的保险公司或协会 logo、每个约 $300k ACV 估算，SOM 约 $4.5M。
  segments:
  - 承保制裁敏感油轮、散货船和货运业务簿的海上保险公司与 P&I 协会
  - 处理可疑航次调查的专业 MGA 和海事理赔团队
  buyingProcess: 销售起点应是海上业务负责人或首席承保官，但理赔和合规方必须先确认这套证据经得起审计，产品才能进正式部署。最可能的路径，是先在一条业务簿上做付费试点；等真实续保周期或审计复核证明它能缩短处理时间、且误报率可接受后，再走采购。
product:
  mvp: MVP 是一套网页工作台：接入 AIS、至少两路第三方观测数据、经纪人证明和理赔文件，拉出完整航次时间线，标记黑屏时段或船对船事件，并导出可解释的证据包。MVP 一开始不替代保险公司的 system of record，而是先贴着现有签单和理赔流程跑。
  sixMonth: 6 个月内，把 MVP 变成一个真实承保或理赔试点：有按走廊调好的阈值、分析师反馈采集、历史回放和可追溯来源的证据导出。
  twelveMonth: 12 个月内，加上组合视图、续保队列管理、案件结果标注，以及接入制裁审查和文档流程，让单个客户能在平台上跑多条业务簿。
  twentyFourMonth: 24 个月后，等保险工作流被信任起来，再从可疑航次复核扩到更广的组合风险运营——比如再保险报告、第二条理赔自动化工作流，以及相邻的海事合规模块。
  keyBets:
  - 只要模型足够聚焦具体走廊和船型，就有机会把误报压到承保人愿意信任的水平。
  - 在早期采购里，历史回放和来源可追溯性，比实时告警更重要。
  - 续保和理赔沉淀下来的结果标签，会比单纯扩大通用船舶数据规模，更快把模型喂好。
gtm:
  wedge: 先卖一笔付费试点：围绕一条制裁敏感油轮或散货船业务簿，处理可疑航次续保复核和争议理赔调查。
  channels:
  - 直销给海上业务负责人和 P&I 运营负责人
  - 挂靠在制裁控制或理赔现代化项目上的共创试点
  - 来自海事情报厂商、经纪人和调查公司的合作转介
  funnelTargets: Discovery→合格试点 20-30%，合格试点→付费试点 50%+，付费试点→年度正式部署 50%+，正式部署 logo→第二工作流扩单在 12 个月内达到 40%+。
  pricing: 先收一笔 $75k-$125k 的付费试点费，覆盖单一业务簿；随后转成承保团队年度订阅，价格落在 $200k-$300k，再叠加按船舶或按调查收费。这样能对齐现有承保、合规和理赔预算，也避免买方把它当成 rip-and-replace 采购。
businessModel:
  revenueStreams:
  - 承保团队年度订阅
  - 按船舶监控或按续保审查收费
  - 按理赔调查包收费，以及实施服务
  unitOfValue: 受监控船舶等价值单位，以及已完成的可疑航次审查
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一条业务簿扩到同一家保险公司里的多条走廊和多种船型
  - 在承保客户里继续卖理赔调查和季度组合复盘模块
  - 等保险场景验证跑出来后，再把证据层延伸到再保险报告、贸易融资尽调和租船方风险评分
strategyMap:
  northStarMetric: 进入正式合同、且签单、续保或理赔决策会实际使用航次真相证据的年化船舶等价值数量
  inputMetrics:
  - 带真实历史案件复核的付费试点数量
  - 无需外部调查、就被分析师接受的高可信案件比例
  - 从一条工作流扩成两条的业务簿数量
  - 从数据伙伴处拿到历史回放和导出权的进度
  moatsToBuild:
  - 由保险公司标注的黑屏、船对船转运、spoofing 和假旗案件库
  - 嵌进承保和理赔工作流的、可追溯来源的证据包
  - 多源数据权、历史回放能力，以及按走廊调优的数据
  killCriteria:
  - 在 20 次合格共创客户会之后，付费保险试点仍少于 2 个
  - 前 200 个已审案件里，高可信告警被判为误报的比例超过 15%
  - 首个正式部署前，仍拿不到至少 2 家数据供应商的回放与导出授权合同
  mermaid: |
    flowchart LR
      Wedge[Beachhead renewal and claims wedge] --> MVP[Multi-source voyage-truth workspace]
      MVP --> Proof[Cycle-time savings plus audit-ready evidence]
      Proof --> Expansion[More books, claims module, adjacent maritime risk ops]
investorMemo:
  verdict:
    call: 值得见 / 继续尽调
    conviction: 如果供应商权利和证据信任两关都能过，这项目值得看；若最后只能停在理赔调查工具，赛道就太窄，撑不起高确信度。
    whyBelieve: 它盯住的是一个明确的监管与赔付率痛点，背后又有新的第三方真相层支撑；而海事数据厂商和保险平台都没有清楚拿下这块工作流。
    whyDoubt: 初始市场买方高度集中，而且相邻厂商或数据供应商，很可能在公司证明自己能影响承保前就把这个切口吃掉。
    nextDiligence: 让一笔真实试点跑完整个续保或争议理赔周期，确认买方会足够快地接受这套证据，进而支撑 $200k-$300k 的正式合同。
  firstCustomer:
    title: 专业海上保险公司或 P&I 协会里，负责船体险或特殊风险承保的负责人
    profile: 团队 5-20 人，管理地中海、红海或东南亚 100-300 艘油轮和干散货船，而且已经在用邮件和表格升级处理 AIS 异常。
    trigger: 续保季、一次制裁控制审计，或发生在 AIS 黑屏、航线偏离、疑似船对船转运之后的可疑损失。
    buyer: 首席承保官或海上业务 GM
    initialContract: 先签一笔 90 天付费试点，覆盖单一业务簿，价格 $75k-$125k；如果平台能压缩升级调查时间，并在一次真实续保或理赔调查里被接受，再转成 $200k-$300k 的年度部署。
  mustBeTrue:
  - 至少两家目标保险公司愿意在要求全量集成前，先为试点付费。
  - 在相当比例的可疑航次案件里，第三方观测证据确实能改变或加速决策。
  - 至少两家数据供应商愿意在合同里给回放、导出和面向保险客户打包证据的权利。
  - 高可信告警在早期案件中的分析师驳回率，能压在大约 10-15% 以下。
  - 第一个客户能在 12 个月内，从一条业务簿或一条工作流扩到第二条。
  diligenceQuestions:
  - 第一次部署的预算，到底归承保、理赔还是制裁合规团队？
  - 要扛过审计或承保争议，证据链和可解释性到底得达到什么标准？
  - 哪些合作条款会让传感器或海事情报供应商有机会绕过我们，直接吃掉工作流？
  - 对一个 5-20 人的团队来说，得看到多大的风险泄漏下降或周期缩短，才愿意付 $200k-$300k ACV？
  - 如果承保场景的采纳始终很集中，相邻扩张机会到底有多大？
operatingAssumptions:
- assumption: 第一条能真正部署的切口，是制裁敏感走廊里油轮和干散货业务簿的可疑航次续保复核。
  basis: research.yaml
  validationTest: 至少访谈 10 个目标账户；只有当其中 3 个以上把这条工作流排在泛海事监控之前，才继续推进。
  decisionImpact: 如果不成立，首发定位就改成理赔调查，或更窄的 P&I 合规工作流。
- assumption: 数据伙伴愿意给到足够的历史回放和导出权，让创业公司能拥有自己的证据包。
  basis: research.yaml
  validationTest: 在正式上线前，先和两家供应商拿到签字版 term sheet，覆盖 API 接入、历史回放和导出。
  decisionImpact: 如果不成立，公司就拿不到足够强的工作流差异化，销售也不值得放大。
- assumption: 带人工复核的走廊专属模型，会比通用异常告警更能赢得承保人信任。
  basis: 运营判断
  validationTest: 在前 200 个已审案件里，把分析师驳回的误报压到 15% 以下，并向用户明确收集信任评分。
  decisionImpact: 如果不成立，就先收缩成分析师辅助调查工具，等精度提升后再扩。
- assumption: 只要一条业务簿能证明缩短处理周期或减少风险泄漏，$200k-$300k ACV 就能被接受。
  basis: research.yaml
  validationTest: 在试点方案里拿到预算确认，并按目标价格至少签下一份正式部署 LOI。
  decisionImpact: 如果不成立，就得把范围缩成理赔优先工具，或重算团队规模和融资需求。
- assumption: 理赔和承保标签能被足够干净地采集下来，最终沉淀成专有模型护城河。
  basis: idea.yaml
  validationTest: 把结果埋点接好，并在续保和理赔场景里至少拿到 100 个已审案件的结构化反馈。
  decisionImpact: 如果不成立，防守力就会从模型质量退回到工作流和服务执行，风险投资逻辑会被削弱。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 12 家海上保险公司和 P&I 协会，把续保、理赔和制裁工作流按痛点与预算归属排个序。
  hypothesis: 续保复核和可疑理赔工作流，会进入至少一半合格账户的前二痛点。
  successMetric: 3 个共创客户承诺做范围明确的试点，并指出经济买方。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 拿两家海事情报或传感器提供方，用历史可疑航次案件去谈数据权试点。
  hypothesis: 公司能在不付独家经济对价的前提下，拿到回放、导出和面向保险客户的使用权。
  successMetric: 签下 2 份带回放和导出条款的合作协议。
  owner: CEO + 法务或商务拓展
- horizon: 90–180 天
  experiment: 在一条制裁敏感走廊的 50-100 个历史案件上跑 concierge MVP。
  hypothesis: 多源时间线能把人工调查时间至少打下来 30%，同时把分析师驳回的误报控制在 15% 以下。
  successMetric: 决策中位时长下降 30%，误报驳回率低于 15%。
  owner: 产品 + 海事风险分析师
- horizon: 90–180 天
  experiment: 在一条真实续保业务簿和一条争议理赔队列里部署付费试点。
  hypothesis: 只要证据包可解释、可审计，买方会在全量系统集成前先付费。
  successMetric: 至少签下 1 个 $75k+ 的付费试点，并完成 1 个真实决策周期。
  owner: 销售负责人
- horizon: 6–12 个月
  experiment: 验证首条工作流在同一客户内向组合复盘或理赔扩张。
  hypothesis: 第一条被信任的工作流，会比拿新 logo 更便宜地带来第二单。
  successMetric: 12 个月内，至少有 1 个客户新增第二条工作流或第二条走廊。
  owner: 客户成功负责人
- horizon: 12–18 个月
  experiment: 用同一层证据底座，试跑一个相邻的再保险方或经纪人报告模块。
  hypothesis: 不新增核心数据接入，也能借同一套数据模型切进海事风险栈里的第二类买家。
  successMetric: 至少完成 2 次相邻场景共创会，并拿到 1 个有预算的 POC。
  owner: 合作负责人
operations:
- 围绕回放、导出和面向保险客户使用证据的合同化数据权管理
- 针对黑屏时段、船对船事件和争议航线的人在回路案件复核分类体系
- 为每一次被标记航次保留来源追溯、文档留存和审计日志
- 按季度做组合复盘，并把赔付率、升级量和误报调优绑在一起
- 与经纪人、海事调查员和情报供应商建立边缘案件协作机制
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 把数据接入、证据流水线和核心工作流产品握在自己手里，不外包。
- role: 海事风险产品负责人
  startTiming: Month 0
  rationale: 负责保险工作流设计、标签体系，以及和承保、理赔团队之间的信任。
- role: 全栈与数据工程师
  startTiming: Month 3
  rationale: 首个试点范围敲定后，把历史回放、案件反馈闭环和客户集成做出来。
- role: 保险销售负责人
  startTiming: Month 4
  rationale: 把共创客户转成付费试点，并经营这批高度集中的企业买家。
- role: 客户成功与情报分析师
  startTiming: Month 6
  rationale: 负责上线、按走廊调阈值，并把试点经验变成正式部署扩张。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 家带回放和导出权的数据供应商
  - 拿下 3 个共创客户和至少 1 个付费试点
  - 跑完 1 个真实续保或理赔周期，并把决策时间下降做出量化结果
  - 上线可审计证据导出和案件反馈采集
- horizon: 12–24 个月
  items:
  - 以 $200k-$300k ACV 拿下 2-4 个正式部署 logo
  - 让首个客户扩到第二条工作流或第二条走廊
  - 上线组合复盘仪表盘和理赔模块
  - 沉淀可对外引用的 ROI 案例，打动承保和合规买家
- horizon: 24–36 个月
  items:
  - 做到约 15 个正式部署的保险公司或协会 logo
  - 在核心走廊维持多源数据覆盖，不依赖单一供应商
  - 试点再保险报告、贸易融资尽调或租船方风险评分等相邻产品
  - 证明与承保和理赔结果绑定的可复用标注案件护城河
risks:
- risk: 核心数据伙伴限制回放或导出权，或者自己上线保险工作流。
  likelihood: Medium
  impact: High
  mitigation: 保持多源接入，尽早谈下可迁移的历史权利，并让保险工作流系统独立于任何单一供应商。
- risk: 承保人只把产品当成承保后情报工具，不愿把它用进真实定价或续保判断。
  likelihood: Medium
  impact: High
  mitigation: 先从顾问式调查切入，量化处理周期收益；只有在一轮真实决策证明信任之后，才继续扩。
- risk: 对正常 AIS 中断的误报太多，直接打掉用户信心。
  likelihood: Medium
  impact: High
  mitigation: 在自动化任何建议前，先上按走廊调的阈值、可解释可信度评分和强制分析师反馈闭环。
- risk: 滩头市场始终太窄，撑不起风险投资回报。
  likelihood: Medium
  impact: Medium
  mitigation: 在扩大客户细分前，先用保险场景验证点扩到理赔、再保险报告和相邻海事风险工作流。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的资金应足以买下核心产品团队、多源数据权、3-5 个付费试点、可审计工作流能力，以及最初 2-4 个正式部署的保险公司 logo。
