scenarios:
  downside:
    description: Data-rights friction and slower carrier trust keep production conversions behind plan and hold contracts below the top end of the target ACV range.
    y3RevenueK: 2200.0
    y3EbitdaK: -1026.25
    cashLowPointK: -159.97
    keyAssumptionChanges:
      - Y2 exits at 4 paid deployments and Y3 exits at 12 instead of 15
      - Blended production pricing reaches only $275K ACV in Y3 and $210K in Y2
      - Gross margin plateaus at 67% because suppliers and services take more share
  base:
    description: One late-Y1 paid pilot converts into steady annual contracts, the first logo expands, and gross margin reaches the 70% target by Y3.
    y3RevenueK: 2925.0
    y3EbitdaK: -453.81
    cashLowPointK: 466.37
    keyAssumptionChanges:
      - Y2 exits at 5 active deployments and Y3 exits at 15
      - Blended annual contract value steps from $225K in Y2 to $300K in Y3
      - Gross margin ramps to 70% once onboarding and supplier usage normalize
  upside:
    description: Design partners convert faster, a second workflow sells earlier, and the company adds deployments without materially pulling forward the fixed-cost base.
    y3RevenueK: 4160.0
    y3EbitdaK: 475.59
    cashLowPointK: 1086.04
    keyAssumptionChanges:
      - Y1 pilot closes one month earlier, Y2 exits at 6 deployments, and Y3 exits at 18
      - Blended annual contract value reaches $320K with second-workflow pricing
      - Gross margin improves to 72% as evidence-pack delivery standardizes
