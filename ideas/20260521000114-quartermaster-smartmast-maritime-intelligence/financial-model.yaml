    baseCase: Add post-pilot hires only after Y2 production proof
    upsideCase: Delay second AE and finance hire by one quarter
    y3RevenueImpactK: -120.0
    cashImpactK: -260.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DesignPartners[Design partners and live cases] --> PaidDeployments[Paid insurer deployments]
      PaidDeployments --> ACV[Annual contract value plus workflow expansion]
      ACV --> Revenue[Recognized revenue]
      Revenue --> GrossProfit[Gross profit after supplier and services costs]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by moving from 1 paid pilot in Y1 to 5 active deployments in Y2 and 15 by Q4Y3 at a blended $300K ACV.
  - checkName: Must go right
    finding: The model needs insurers to accept the evidence pack in live renewal or claims workflows quickly enough for one pilot to convert into steady annual contracts and one second-workflow expansion.
  - checkName: Model breaks if
    finding: If supplier rights stay restrictive or buyers treat the product as a narrow investigations tool, the downside case turns cash negative before the next round.
  - checkName: Next-round proof
    finding: The strongest next financing story is 5 production logos by Q4Y2 and roughly 10 active deployments by Q2Y3 with one referenceable expansion inside the first customer.
sanityChecks:
  ruleOf40: Y3 growth 333% + EBITDA margin -16% = 317%
  burnMultiple: Improves from about 2.2x in Y2 to about 0.2x in Y3 as higher-ACV deployments absorb the fixed team.
  revenuePerFte: $225K Y3 using Q4Y3 headcount of 13 FTE (benchmark $200–400K vertical SaaS)
  flags:
    - Gross margin only reaches the business-plan target in Y3, so any supplier price increase or extra services work would require a larger round.
    - Revenue concentration is high because the plan depends on a small number of marine-insurance buyers and one early logo expanding into a second workflow.
    - The model still exits Y3 slightly cash-constrained, so missing the Q4Y2 to Q2Y3 proof milestones would compress fundraising options quickly.
