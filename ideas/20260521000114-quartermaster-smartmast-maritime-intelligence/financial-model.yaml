    cashImpactK: -170.63
  - variable: CAC
    downsideCase: $160K CAC per paid deployment
    baseCase: $129.56K CAC per paid deployment
    upsideCase: $110K CAC per paid deployment
    y3RevenueImpactK: 0.0
    cashImpactK: -426.16
  - variable: churn
    downsideCase: 3.0% monthly churn once renewals begin
    baseCase: 2.0% monthly churn
    upsideCase: 1.5% monthly churn
    y3RevenueImpactK: -220.0
    cashImpactK: -165.0
  - variable: sales cycle
    downsideCase: Paid pilot and production closes slip by one quarter
    baseCase: Pilot-to-production close inside roughly one renewal cycle
    upsideCase: Referral-led deals close in under two months after a pilot
    y3RevenueImpactK: -525.0
    cashImpactK: -390.0
  - variable: gross margin
    downsideCase: 67%
    baseCase: 70%
    upsideCase: 72%
    y3RevenueImpactK: 0.0
