  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      DesignPartners[Design partners and live cases] --> PaidDeployments[Paid insurer deployments]
      PaidDeployments --> ACV[Annual contract value plus workflow expansion]
      ACV --> Revenue[Recognized revenue]
      Revenue --> GrossProfit[Gross profit after supplier and services costs]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入引擎，来自付费部署数从 Y1 的 1 个试点，爬到 Y2 的 5 个活跃部署，再到 Q4Y3 的 15 个；对应混合 ACV 为 $300K。
- checkName: 必须成立的前提
  finding: 模型要求保险公司足够快地在真实续保或理赔工作流里接受这套证据包，让 1 个试点能转成稳定年约，并带出 1 次第二工作流扩单。
- checkName: 模型会在哪些情况下失效
  finding: 如果供应商权利始终受限，或买方只把产品当成狭窄的调查工具，下行情形会在下一轮融资前把现金打到负数。
- checkName: 下一轮融资证明
  finding: 下一轮最好讲的故事，是到 Q4Y2 拿下 5 个正式部署 logo，再到 Q2Y3 跑到约 10 个活跃部署，并在首个客户里做出 1 次可被引用的扩单。
sanityChecks:
  ruleOf40: Y3 growth 333% + EBITDA margin -16% = 317%
  burnMultiple: 随着高 ACV 部署逐步吸收固定团队成本，burn multiple 从 Y2 的约 2.2x 改善到 Y3 的约 0.2x。
  revenuePerFte: 按 Q4Y3 的 13 名 FTE 计算，Y3 人均收入约为 $225K（对标 vertical SaaS 的 $200–400K）。
  flags:
  - 毛利率到 Y3 才跑到 business-plan 目标，所以只要供应商涨价或服务工作量上去，就得融更大一轮。
  - 收入集中度很高，因为计划高度依赖少数海上保险买家，以及首个客户扩到第二条工作流。
  - 模型到 Y3 末现金仍偏紧，所以如果错过 Q4Y2 到 Q2Y3 这段验证窗口，融资选择会很快被压缩。
