scenarios:
  downside:
    description: 数据权摩擦更大、保险方建立信任更慢，导致正式部署转化落后于计划，合同价格也打不到目标 ACV 区间上沿。
    y3RevenueK: 2200.0
    y3EbitdaK: -1026.25
    cashLowPointK: -159.97
    keyAssumptionChanges:
    - Y2 结束时只有 4 个付费部署，Y3 结束时只有 12 个，而不是 15 个
    - Y3 的混合正式部署价格只能到 $275K ACV，Y2 只有 $210K
    - 供应商和服务成本吃掉更多份额，毛利率在 67% 就见顶
  base:
    description: Y1 末的 1 个付费试点顺利转成年约合同，首个客户完成一次扩单，毛利率也在 Y3 跑到 70% 目标。
    y3RevenueK: 2925.0
    y3EbitdaK: -453.81
    cashLowPointK: 466.37
    keyAssumptionChanges:
    - Y2 结束时有 5 个活跃部署，Y3 结束时有 15 个
    - 混合 ACV 从 Y2 的 $225K 逐步抬到 Y3 的 $300K
    - 随着上线流程和供应商使用标准化，毛利率爬到 70%
  upside:
    description: 共创客户转正式更快，第二条工作流更早卖出，公司在不明显前置固定成本的情况下拿下更多部署。
    y3RevenueK: 4160.0
    y3EbitdaK: 475.59
    cashLowPointK: 1086.04
    keyAssumptionChanges:
    - Y1 试点提前 1 个月成交，Y2 结束时有 6 个部署，Y3 结束时有 18 个
    - 因为第二条工作流定价抬升，混合 ACV 能到 $320K
    - 证据包交付标准化后，毛利率提升到 72%
