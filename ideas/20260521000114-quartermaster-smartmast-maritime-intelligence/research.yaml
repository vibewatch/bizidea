openQuestions:
- Will third-party observation evidence materially change bind and renewal decisions, or will buyers confine it to post-bind investigations first?
- Which data suppliers will grant enough historical replay and export rights for a startup to own insurer-facing evidence packs rather than just resell alerts?
- What measurable cycle-time or leakage reduction is required for a 5-20 person underwriting team to justify a $200k-$300k annual contract?
- How often will claims, sanctions, and underwriting teams disagree on the evidentiary threshold for a suspicious voyage, and who ultimately owns that standard?
