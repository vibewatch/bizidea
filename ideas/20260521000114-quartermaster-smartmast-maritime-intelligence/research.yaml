  validationPlan:
  - priority: high
    question: Will underwriters treat third-party observation evidence as bind/renew decision support rather than nice-to-have intelligence?
    evidenceToGather: Three to five design-partner interviews plus one live renewal workflow pilot with measured escalation-time savings.
