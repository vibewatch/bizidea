topRisks:
- name: 数据接入依赖
  description: 如果传感器网络提供方限制数据接入，或者自己往上做承保工作流，这家创业公司就可能失去最核心的证据来源。
  mitigation: 尽早搭好多源接入层，保持保险工作流的 system of record 独立，并在合同里拿到可迁移的历史数据权利。
- name: 保险业采纳偏慢
  description: 海上保险公司也许认可洞察价值，但如果没有 ROI 证明和审计层面的接受度，它们仍可能不愿改动签单或理赔流程。
  mitigation: 先在现有流程旁边做顾问式调查，拿一条业务簿跑出周期缩短和风险泄漏下降，再等续保结果可量化后扩进去。
- name: 误报会打掉信任
  description: 如果产品把太多正常航次错判成可疑，承保人很快就会退回到资深人员拍板，系统也就没人用了。
  mitigation: 上线时先给可解释证据包、保守阈值和人工反馈闭环，让团队能按航线和船型把模型行为慢慢调准。
