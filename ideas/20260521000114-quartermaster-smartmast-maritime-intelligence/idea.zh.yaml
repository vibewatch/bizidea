problem: 海上保险公司和 P&I 协会现在给航次定价、续保、做理赔调查，依然靠 AIS 航迹、经纪人证明和人工分析——可 AIS 既能伪造，也能直接关掉。结果是，承保人暴露在规避制裁、走私和伪造损失叙事的风险里，却拿不出独立核验手段。每碰到一次可疑黑屏或航线异常，都得升级成一轮昂贵的人工调查：证据弱、决策慢、成本高。
targetUser:
  primary: 海上保险公司或 P&I 协会里负责船体险或特殊风险承保的负责人，覆盖油轮、散货船和沿海货运船队，航线集中在制裁敏感走廊
  secondary: 负责审查可疑 AIS 缺口、会合事件和航次争议的理赔情报负责人或海事风险分析师
  buyer: 对赔付率和制裁暴露负责的首席承保官或海上业务 GM
startupThesis:
  nonObviousInsight: 当分布式船载感知足够密、也足够便宜后，最先跑出来的商业切口不会是另一个泛海事仪表盘，而是一层给保险公司用的“行为真相”验证层——因为它们已经不能再把 AIS 当成定价和理赔的地面真相。
  beachhead: 先切入那些给 50-500 艘油轮、散货船和沿海货船承保的海上保险公司与 P&I 协会；这些船会经过制裁敏感或走私高发走廊，而团队现在还在依赖 AIS 历史和经纪人问卷。
  wedge: 做一套承保和理赔工作台，把 AIS 和独立传感器网络观测并排比对，专门抓黑屏时段、可疑会合、航线不一致，以及和实际船舶行为对不上的理赔叙事。
  whyNowCatalyst: Quartermaster 的 SmartMast 网络已经铺到 600 艘船，而且明确点出了保险场景；与此同时，AIS spoofing 又让保险公司暴露在制裁和欺诈风险里。非 AIS 的海上真相层，正好在这个时点开始具备商业可得性。
  ventureScalePath: 先从海上保险公司的承保和理赔决策切进去，再往贸易融资尽调、租船方风险评分、港口与沿海合规，最终走到全球海事贸易共用的风险数据层。
solution: 搭一套海上承保 OS，把 SmartMast 一类的第三方观测、AIS、经纪人提交材料和理赔文件一起吃进来，给每条船和每趟航次算出“航次真相分”。第一条工作流服务承保人：在保单签发前，把可疑黑屏、解释不通的改道，以及大概率的船对船接触先拎出来，帮团队审新单和续保。第二条工作流服务理赔团队：一旦出现损失、延误或制裁问题，系统就自动拉出结构化调查时间线，不再靠零散邮件链和外部调查简报拼证据。时间久了，产品会学到哪些模式更容易对应拒赔、制裁升级或高利润业务簿，把个人判断沉淀成可复用的数据资产。创业公司没必要自建传感器网络；真正该拿下的是面向保险公司的决策工作流、证据打包能力和组合反馈闭环。
goToMarketSeed:
  firstCustomer: 第一家客户应该是一家专业海上保险公司或 P&I 协会：承保团队 5-20 人，覆盖地中海、红海或东南亚 100-300 艘成品油轮和干散货船，而且已经在用邮件升级处理可疑 AIS 缺口。
  buyingTrigger: 续保季、一次制裁控制审计，或一场发生在 AIS 黑屏、航线偏离、争议会合之后的可疑损失事件。
  currentAlternative: AIS 数据源、经纪人问卷、分析师手工表格、外部调查员，以及资深承保人的老办法判断
  switchingReason: 独立传感器证据能让承保人比单靠可伪造的 AIS 更快、更站得住脚地下决定，也能把每次可疑航次升级调查的成本打下来。
  pricingHypothesis: 按承保团队收年度平台订阅费，再按受监控船舶、续保审查次数或理赔调查包收使用费。
