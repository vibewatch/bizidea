differentiator: 通用海事数据厂商卖的是数据流、地图或告警；可真正要把噪音变成承保和理赔决策的，还是保险公司自己。这个创业公司要拿下的是原生面向保险人的工作流层：航次真相评分、调查时间线、组合反馈闭环，以及围绕海事风险和制裁控制打造的证据包，而不是政府 ISR 那套用例。它的防守力来自保险场景专属标签：哪些行为可疑、哪些案件被拒或被批、组合结果最终如何。这些反馈会随着每次续保和理赔，不断把风险模型喂得更准。
