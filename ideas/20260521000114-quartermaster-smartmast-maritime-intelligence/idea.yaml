differentiator: >-
  Generic maritime data vendors sell feeds, maps, or alerting; insurers still have to turn that noise into underwriting and claims decisions. This company would own the insurer-native workflow layer: voyage-truth scoring, investigation timelines, portfolio feedback loops, and evidence packs built around marine risk and sanctions controls rather than government ISR use cases. Defensibility comes from insurer-specific labels on suspicious behaviors, denied or approved cases, and portfolio outcomes that improve the risk model with every renewal and claim.
