topRisks:
  - name: Data access dependency
    description: If sensor-network providers restrict access or move up-stack into underwriting workflows, the startup could lose its core evidence source.
    mitigation: Build a multi-source ingestion layer early, keep the insurer workflow system-of-record independent, and contract for portable historical data rights.
  - name: Slow insurance adoption
    description: Marine insurers may like the insight but still hesitate to change bind or claims workflows without proof of ROI and audit acceptance.
    mitigation: Start with advisory investigations beside existing workflows, prove cycle-time and leakage reduction on one book, and expand only after renewals show measurable impact.
  - name: False positive trust loss
    description: If the product flags too many innocent voyages as suspicious, underwriters will revert to senior judgment and ignore the system.
    mitigation: Launch with explainable evidence packs, conservative thresholds, and human feedback loops that let teams tune model behavior by corridor and vessel class.
