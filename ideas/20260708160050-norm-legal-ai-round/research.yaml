openQuestions:
- How many U.S. fund complexes already permit AI-authored client-facing materials outside shadow mode today?
- Can the product command ~$150k+ ACV as a dedicated overlay, or must it bundle archive exports and workflow routing from day one to justify budget?
- How much services work is required to normalize prospectus disclosures, performance windows, and house-language rules for the first fund family at each client?
- Does expansion into adviser and wholesaler email kits require a separate FINRA-oriented policy module before the product can scale beyond manager-owned channels?
