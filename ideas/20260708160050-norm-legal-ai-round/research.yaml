  adoptionFrictionMatrix:
  - friction: Policy ingestion across prospectuses, factsheets, performance windows, and house language is messy
    severity: high
    affectedBuyer: Head of marketing compliance
    mitigation: Start with one fund family and one outbound package, ingest from existing disclosure libraries, and template the most repeatable rule structures first.
    sourceRefs:
    - 1
    - 23
    - 29
    - 31
    - 32
    - 33
  - friction: Buyers need to reconstruct why an AI-generated claim was approved months later
    severity: high
    affectedBuyer: Chief Compliance Officer
    mitigation: Make evidence packets, retention exports, and approval diffs first-class outputs, not follow-up reporting tasks.
    sourceRefs:
    - 24
    - 25
    - 27
    - 28
  - friction: Distributor and broker-dealer channels add another communications rule stack
