problem: >-
  资管公司希望用 AI 帮忙写季度点评、基金概况表和顾问邮件素材包，但每一句涉及业绩、定位或风险的表述都可能触发 SEC 营销规则审查。人手紧张的营销合规团队仍要在 Word、PDF 和存档系统里手工清稿，AI 试点一到要发给客户看的材料这一步就卡住。通用大模型的护栏不了解每只基金已批准的披露内容、业绩展示区间或内部标准用语，这让法务监督成了企业 AI 落地真正的瓶颈。
targetUser:
  primary: "美国共同基金或 ETF 管理公司里，负责用 AI 起草面向客户产品材料的营销合规或内容合规负责人。"
  secondary: "负责季度点评、基金概况表和分销商邮件素材包的分销赋能或内容运营负责人。"
  buyer: "首席合规官或总法律顾问。"
startupThesis:
  nonObviousInsight: >-
    受监管 AI 领域第一笔站得住脚的法务基础设施预算，不会流向通用治理看板，而会流向嵌入在某一个对外工作流里的发布前监督系统——在那里，一句 AI 生成的坏句子就能立刻带来监管风险。Norm 被管理规模超过 30 万亿美元的客户采用，说明只要法务监督从一个更慢的事后法务队列，变成 AI 生成内容的运行时基础设施，资管公司就愿意付费。
  beachhead: >-
    管理规模 500 亿到 5000 亿美元、旗下 20 到 150 只基金、营销合规团队 3 到 10 人、且已在用 AI 试点起草季度基金点评、概况表和分销商邮件素材包的美国共同基金及 ETF 集团。
  wedge: >-
    一条基金营销监督管线，把招募说明书披露内容、已批准的宣传用语、业绩使用规则和内部标准用语，编译成对 AI 生成的点评和分销内容的发布前检查。
  whyNowCatalyst: >-
    Norm 的融资以及被管理规模超过 30 万亿美元的客户采用，说明资管公司正把 AI 法务监督从咨询性质的工作，推进到真实运行的部署基础设施。
  ventureScalePath: >-
    先从基金点评和面向顾问的材料切入，再扩展到尽职调查问卷（DDQ）、招标书（RFP）、基金经理话术、客户信函、财富顾问助手，最终覆盖银行、保险公司和私募市场机构里其他受监管的对外 AI 工作流。
solution: >-
  产品把已批准的业绩数据、招募说明书、披露内容库、存档系统和内容工作流连接起来，并为参与基金营销的每一个 AI 起草智能体建档。它逐句核对生成内容是否符合必需披露、已批准的业绩展示区间、内部标准用语、过期数字容差，以及针对概况表、邮件素材包和网页点评的各渠道规则。高风险表述会连同政策引用、支持证据和一份精确显示智能体改动之处的差异对比，一起转给合规人员处理。获批后，平台把最终内容推送进现有的 CMS、CRM 和存档系统，同时保存包含模型版本、审核决定和证据链的审计包。随着时间推移，系统会学习各基金和各渠道下可复用的审批模式，让每一个新的 AI 工作流都比人工法务队列过得更快。
goToMarketSeed:
  firstCustomer: >-
    一家管理规模 1200 亿美元的美国主动型管理公司，旗下有 60 只共同基金和 ETF，营销合规团队 4 人，2026 年有明确任务要用生成式 AI 完成季度点评和分销商邮件制作。
  buyingTrigger: >-
    内部 AI 起草试点被要求在季末分销或 SEC 检查周期之前，产出面向客户的基金点评或概况表的那一刻。
  currentAlternative: >-
    在 Word 和 PDF 里做人工法务与合规审查、存档合规软件、只读且受限的 AI 试点，以及为新型披露内容聘请外部律师。
  switchingReason: >-
    第一个客户之所以转向这套系统，是因为它把政策变成了发布前检查和证据包，让小规模合规团队能更快清掉更多 AI 生成内容，而不必信任每个智能体或加大外部律师开支。
  pricingHypothesis: >-
    按季度计费的年度软件订阅，定价依据是纳入监管的基金策略数量和已批准的对外内容包数量，存档导出和多司法辖区政策库提供付费高级模块。
