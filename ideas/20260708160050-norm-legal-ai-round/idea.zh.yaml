topRisks:
  - name: "买家态度保守"
    description: "部分合规负责人可能干脆全面禁止 AI 生成的客户内容，而不是采购一层新的监督系统。"
    mitigation: "优先卖给有明确 AI 授权的公司，并打包影子模式，让团队能在批准任何正式发布之前先验证安全性。"
  - name: "现有厂商捆绑功能"
    description: "存档服务商、合规平台或内容套件可能加上基础的 AI 审查检查，试图把这个品类挤没。"
    mitigation: "把跨系统的政策图谱、证据链和特定工作流的审批数据牢牢握在手里——这些是相邻厂商无法靠单一产品面拼凑出来的。"
  - name: "政策接入的复杂度"
    description: "招募说明书用语、基金例外情况和渠道规则的差异可能大到让第一次部署显得像是重服务项目。"
    mitigation: "先从一个基金系列和一个内容渠道开始，提供预置政策模板，等证明能实实在在节省审查周期后再扩展。"
