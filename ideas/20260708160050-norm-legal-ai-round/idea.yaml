problem: >-
  Asset managers want AI to help produce quarterly commentary, factsheets, and
  advisor email kits, but every statement about performance, positioning, or
  risk can trigger SEC marketing-rule review. Lean marketing-compliance teams
  still clear content manually in Word, PDF, and archive systems, so AI pilots
  stall at the moment firms want to publish client-facing material. Generic LLM
  guardrails do not know each fund's approved disclosures, performance windows,
  or house language, which makes legal oversight the real bottleneck to
  shipping enterprise AI.
targetUser:
  primary: "Head of marketing compliance or content compliance at a U.S. mutual fund or ETF manager using AI to draft client-facing product materials."
  secondary: "Head of distribution enablement or content operations responsible for quarterly commentary, factsheets, and wholesaler email kits."
  buyer: "Chief Compliance Officer or General Counsel."
startupThesis:
  nonObviousInsight: >-
    The first durable legal-infrastructure budget in regulated AI will not be a
    generic governance dashboard. It will be a pre-publish supervisor embedded
    in one outward-facing workflow where a bad AI-generated sentence can create
    immediate regulatory exposure. Norm's adoption among clients representing
    more than $30 trillion in assets under management shows asset managers will
    pay when legal oversight becomes runtime infrastructure for AI-generated
    content rather than a slower after-the-fact counsel queue.
  beachhead: >-
    U.S. mutual fund and ETF complexes with $50B-$500B AUM, 20-150 funds, a
    3-10 person marketing-compliance team, and active pilots using AI to draft
    quarterly fund commentary, factsheets, and wholesaler email kits.
  wedge: >-
    A fund-marketing supervisory rail that compiles prospectus disclosures,
    approved claims, performance-use rules, and house language into
    pre-publish checks for AI-generated commentary and distribution content.
  whyNowCatalyst: >-
    Norm's financing and adoption by clients representing more than $30
    trillion in assets under management show that asset managers are moving
    legal supervision for AI from advisory work into live deployment
    infrastructure.
  ventureScalePath: >-
    Start with fund commentary and advisor-facing materials, then expand into
    DDQs, RFPs, portfolio-manager scripts, client letters, wealth-advisor
    assistants, and eventually other regulated outbound AI workflows across
    banks, insurers, and private-markets firms.
solution: >-
  The product connects approved performance data, prospectuses, disclosure
  libraries, archive systems, and content workflows, then registers every AI
  drafting agent involved in fund marketing. It checks each generated sentence
  against required disclosures, approved performance periods, house language,
  stale-number tolerances, and channel-specific rules for factsheets, email
  kits, and web commentary. High-risk language routes to compliance with a
  policy citation, supporting evidence, and a diff that shows exactly what the
  agent changed. Once approved, the platform pushes the final content into
  existing CMS, CRM, and archive systems while storing an audit packet with
  model version, reviewer decision, and evidence chain. Over time it learns
  reusable approval patterns across funds and channels so each new AI workflow
  clears faster than a manual legal queue.
goToMarketSeed:
  firstCustomer: >-
    A $120B U.S. active manager with 60 mutual funds and ETFs, a four-person
    marketing-compliance team, and a 2026 mandate to use generative AI for
    quarterly commentary and wholesaler email production.
  buyingTrigger: >-
    The moment an internal AI drafting pilot is asked to produce client-facing
    fund commentary or factsheets ahead of quarter-end distribution or an SEC
    exam cycle.
  currentAlternative: >-
    Manual legal and compliance review in Word and PDF, archive-compliance
    software, restricted read-only AI pilots, and outside counsel for novel
    disclosures.
  switchingReason: >-
    The first customer switches because the rail turns policy into pre-publish
    checks and evidence packets, letting a small compliance team clear more
    AI-assisted content faster without trusting each agent or expanding outside
    counsel spend.
  pricingHypothesis: >-
    Annual software subscription priced by governed fund strategies and
    approved outbound content packages per quarter, with premium modules for
    archival exports and multi-jurisdiction policy libraries.
