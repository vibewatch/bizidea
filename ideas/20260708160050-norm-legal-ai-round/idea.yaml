topRisks:
  - name: "Conservative buyer behavior"
    description: "Some compliance leaders may ban AI-generated client content entirely instead of buying a new supervisory layer."
    mitigation: "Sell into firms with an active AI mandate and package shadow mode so teams can prove safety before approving any live publication."
  - name: "Incumbent bundling"
    description: "Archive vendors, compliance platforms, or content suites may add basic AI-review checks and try to collapse the category."
    mitigation: "Own the cross-system policy graph, evidence chain, and workflow-specific approval data that adjacent vendors cannot assemble from one product surface."
  - name: "Policy-ingestion complexity"
    description: "Prospectus language, fund exceptions, and channel rules can vary enough to make the first deployment feel services-heavy."
    mitigation: "Start with one fund family and one content channel, ship prebuilt policy templates, and expand only after proving measurable review-cycle savings."
