differentiator: >-
  Horizontal AI governance tools stop at prompts, logs, or model access, while
  existing marketing-review software assumes humans wrote the first draft. This
  company sits at the exact point where an AI agent turns portfolio data into a
  regulated client claim, using fund-level disclosures, evidence requirements,
  and prior approvals as a policy graph. That gives it a faster ROI story than
  generic governance dashboards and a defensible dataset of approved versus
  blocked investment-language patterns across channels and fund families.
