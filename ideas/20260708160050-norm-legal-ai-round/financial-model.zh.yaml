slug: fund-marketing-rule-supervisor
date: "2026-07-08"
currency: USD
modelStartMonth: "2026-08"
assumptions:
- id: A1
  name: 模型起始月份
  value: "2026-08"
  unit: YYYY-MM
  source: '[BP date 2026-07-08] 模型从商业计划落款之后第一个完整运营月开始。'
- id: A2
  name: 期初现金 / pre-seed 融资额
  value: $2.4M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情形采用一笔精简的融资额，刚好够到下一个生产转化里程碑，同时还留出约六个月的现金缓冲。'
- id: A3
  name: 起始付费基金集团数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先签下付费的季末试点。'
- id: A4
  name: 付费客户定义
  value: 一个正在为试点、年度生产工作流或扩展纳管渠道付费的基金集团。
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计任何已经在为受监管的点评、概况表或相邻发布关卡范围付费的集团。'
- id: A5
  name: 付费试点经济模型
  value: 约 3 个月内 4 万美元（约合每月 1.3 万美元）
  unit: USD/complex
  source: '[BP gtm.pricing paid pilot $30k-$50k + BP investorMemo.firstCustomer.initialContract] 模型采用一个基金系列、一个季末内容包的试点中位值。'
- id: A6
  name: 生产合同与扩展经济模型
  value: 核心生产合同落地时约为 12 万到 18 万美元 ARR，随着存档导出和第二渠道模块的加入，到 Y3 第 4 季度末每个集团的混合年度价值接近约 17 万美元。
  unit: USD/complex/year
  source: '[BP gtm.pricing annual subscription $120k-$180k + BP businessModel.expansionLevers + Research market.som ~$160k blended ACV] 由于部分客户到第 3 年会加购高级模块，年末 ARPU 略高于研究得出的 SOM 混合值。'
- id: A7
  name: 客户增长节奏
  value: 到 M12 有 3 个付费集团，Y2 第 4 季度 8 个，Y3 第 4 季度 30 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + Research market.som 30 logos] 基准情形对齐第 1 年试点目标、第 2 年生产集团里程碑，以及研究得出的第 3 年 SOM。'
- id: A8
  name: 收入确认口径
  value: '期间收入等于活跃付费集团数乘以每集团混合已实现月收入：Y1 约 1.2 万到 1.3 万美元，Y2 为 1.30 万到 1.36 万美元，Y3 为 1.38 万到 1.42 万美元。'
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som] 这样收入能直接追溯到客户数和订阅加模块的定价模型。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 40%-50%，Y2 为 55%-62%，Y3 为 64%-70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + BP risks] 早期试点在可复用政策模板和存档导出把毛利率推向 BP 目标之前，实施成本较重。'
- id: A10
  name: 招聘时间表
  value: M1 创始人/CEO 和创始工程师；M4 合规产品负责人；M7 解决方案工程师；M10 第二名工程师；M13 首位 GTM 岗；M16 客户成功/运营；M19 第三名工程师；M25 第二位解决方案岗；M28 第二位 GTM 岗；M31 第二位客户成功/运营岗；M34 第四名工程师
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 前四个岗位直接对齐商业计划，之后的招聘则按里程碑门控，让公司先证明可复制性再扩张团队。'
- id: A11
  name: 创始人/CEO 全成本薪酬
  value: $140K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] 精简的创始人现金薪酬，含工资税和福利。'
- id: A12
  name: 工程全成本薪酬
  value: $175K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] pre-seed 阶段面向资深产品与集成工程人才的现金薪酬，其余总薪酬由股权承担。'
- id: A13
  name: 合规/政策全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP team Compliance product lead + startup-finance heuristic] 对应一个把 SEC 和 FINRA 逻辑转译成机器可检查规则的复合型合规产品岗位。'
- id: A14
  name: 解决方案/实施全成本薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] 覆盖上线、工作流集成、存档导出和安全审查支持，不假设有一支庞大的服务团队。'
- id: A15
  name: 销售/合作全成本薪酬
  value: $170K
  unit: USD/year
  source: '[BP gtm.channels + startup-finance heuristic] 集中的企业销售和联合销售工作仍由创始人辅助完成，所以前几位 GTM 岗位保持精简。'
- id: A16
  name: 客户成功/运营全成本薪酬
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 对应一个高语境的上线与留存岗位，而非人工审查团队。'
- id: A17
  name: 薪酬分摊到损益科目
  value: 创始人 60% 销售市场 / 20% 研发 / 20% 一般管理；工程 100% 研发；合规/政策 15% 销售市场 / 70% 研发 / 15% 一般管理；解决方案 35% 销售市场 / 55% 研发 / 10% 一般管理；销售 100% 销售市场；客户成功/运营 50% 销售市场 / 15% 研发 / 35% 一般管理
  unit: allocation
  source: '[BP team role rationales + BP operations] 这把薪酬分摊映射进各运营科目，同时让创始人主导销售和重实施的上线工作在数字上可见。'
- id: A18
  name: 非薪酬运营支出爬坡
  value: 月度非薪酬支出从 Y1 早期的销售市场/研发/一般管理各 5 千/8 千/5 千美元，爬升到 Y3 第 4 季度的 1.4 万/1.6 万/1 万美元。
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 覆盖云服务、数据供应商、差旅、法务、保险和审计就绪工具，不假设有大规模付费获客投入。'
- id: A19
  name: 现金换算口径
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 在 pre-seed 规模下，假设资本支出、税务、融资费用和营运资金时点差异都可以忽略不计。'
- id: A20
  name: 稳态月流失率
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets] 受监管的发布工作流一旦嵌入使用理应很粘，但模型对狭窄滩头市场仍保持保守估计。'
- id: A21
  name: CAC 口径
  value: 4.84 万美元 = 36 个月销售与市场总支出除以 30 个净新增付费集团
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.channels + BP gtm.funnelTargets] 狭窄的 ICP 和付费试点打法让获客支出保持集中，而非广撒网。'
- id: A22
  name: 下一轮融资的里程碑口径
  value: 大约到第 18-24 个月，公司应达到 5-6 个生产环境集团，上线标准化到 4 周或更短，并至少有 2 次扩展到第二个基金系列或渠道。
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap 180-360 days] pre-seed 融资的规模设定，是为了在留有六个月缓冲的同时，证明转化率、上线复用率和早期扩展达到种子轮就绪水平。'
- id: A23
  name: 季度薪酬滚算口径
  value: Y2-Y3 的薪酬行采用每季度内实际逐月的招聘情况，而不只是已公布的季末快照
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 即便 Y2 和 Y3 的员工人数表只显示年末快照，这样处理也能让薪酬支出内部保持一致。'
