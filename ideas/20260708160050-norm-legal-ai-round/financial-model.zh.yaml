scenarios:
  downside:
    description: 面向客户的 AI 内容在影子模式停留更久，试点转生产的转化滞后约一个季度，政策接入仍然偏重人工服务。
    y3RevenueK: 2492.4
    y3EbitdaK: -467.6
    cashLowPointK: 243.2
    keyAssumptionChanges:
    - Y3 第 4 季度末 customersEop 只到 24 个，而非 30 个，因为季末试点转化更慢。
    - Y3 混合已实现收入停留在每集团每月约 1.32 万到 1.36 万美元，而非基准情形的 1.38 万到 1.42 万美元。
    - 期末毛利率约为 67%，而非 70%，因为政策映射和证据组装仍偏人工。
  base:
    description: 季末试点按计划转化，上线标准化为可复用的基金系列模板，存档导出和第二渠道模块从第 3 年开始加入。
    y3RevenueK: 3110.5
    y3EbitdaK: 18.3
    cashLowPointK: 472.7
    keyAssumptionChanges:
    - 到 M12 有 3 个付费基金集团，Y2 第 4 季度 8 个，Y3 第 4 季度 30 个。
    - 每集团混合已实现收入从 Y1 每月约 1.2 万到 1.3 万美元，升到 Y3 第 4 季度约每月 1.42 万美元。
    - 毛利率只有在上线模板和存档级证据包减少服务工作量之后，才能在期末达到商业计划目标的 70%。
  upside:
    description: 季末触发点和合作伙伴转介加速，更多客户扩展到第二个基金系列或渠道，复用效应让毛利率提前跑赢计划。
    y3RevenueK: 3632.0
    y3EbitdaK: 434.6
    cashLowPointK: 560.3
    keyAssumptionChanges:
    - Y3 第 4 季度末 customersEop 达到 34 个，而非 30 个，因为转介和联合销售渠道更早见效。
    - Y3 混合已实现收入升向每集团每月 1.39 万到 1.48 万美元，因为存档导出和第二渠道模块接入更快。
    - 期末毛利率达到约 72%，因为上线和政策复用提前于计划改善。
sensitivity:
- variable: ARPU
  downsideCase: 每个付费集团的混合年度价值稳定在约 15.5 万美元。
  baseCase: 每个付费集团的期末混合年度价值达到约 17 万美元。
  upsideCase: 第二基金系列和渠道模块把混合年度价值推向 18 万美元。
  y3RevenueImpactK: -311.1
  cashImpactK: -220.0
- variable: CAC
  downsideCase: 如果转介表现不佳、创始人主导的外联持续更久，CAC 会升向 6.5 万美元。
  baseCase: 在狭窄 ICP 和付费试点打法下，CAC 保持在约 4.8 万美元。
  upsideCase: 合作伙伴转介让 CAC 保持在约 4 万美元。
  y3RevenueImpactK: -90.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: 如果首次部署之后切口显得太窄，月流失率会升到 3.0%。
  baseCase: 一旦合规工作流和证据包嵌入使用，月流失率保持在 2.0%。
  upsideCase: 因为存档级审批成为发布系统记录的一部分，月流失率保持在约 1.2%。
  y3RevenueImpactK: -180.0
  cashImpactK: -140.0
- variable: sales cycle
  downsideCase: 试点转生产的转化周期拉长到约 150 天。
  baseCase: 付费试点围绕季末发布周期，大约 90 到 120 天内转化。
  upsideCase: 高管赞助和检查周期带来的紧迫感，把转化周期压缩到约 75 天。
  y3RevenueImpactK: -420.0
  cashImpactK: -260.0
- variable: gross margin
  downsideCase: 由于政策接入仍偏定制化，期末毛利率停滞在约 67%。
  baseCase: 随着模板和导出变得可复用，期末毛利率达到商业计划目标的 70%。
  upsideCase: 可复用上线改善更快，期末毛利率达到约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: hiring pace
  downsideCase: 在可复制性得到验证之前，就提前招聘了一名额外的实施或政策岗位。
  baseCase: 招聘保持里程碑门控，到 Y3 第 4 季度末达到 12 名员工。
  upsideCase: 因为模板和合作伙伴工作流更早见效，一次扩张型招聘可以推迟。
  y3RevenueImpactK: -60.0
  cashImpactK: -130.0
modelDiagram:
  title: fund-marketing unit economics flow
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered fund complexes] --> PaidPilots[Paid quarter-end pilots]
      PaidPilots --> Production[Production governed workflows]
      Production --> Expansion[Second fund family or channel]
      Expansion --> Revenue[Subscription + module revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入增长，来自付费基金集团从 Y1 期末的 3 个，增长到 Y3 第 4 季度末的 30 个，随着存档导出和第二工作流模块的加入，混合年度价值升向约 17 万美元。
- checkName: 必须成立的前提
  finding: 试点转生产的转化率和上线复用率必须保持接近商业计划目标，这样一支 12 人的团队才能在不变成重服务模式的前提下，在 Y2 第 4 季度支持 8 个付费集团。
- checkName: 模型失效的情况
  finding: 如果对外 AI 发布在影子模式停留更久，或政策接入始终偏定制化，下行情形会把 Y3 EBITDA 推向约 -47 万美元，现金底线推向约 24 万美元。
- checkName: 下一轮融资的证明
  finding: 一旦 5-6 个生产环境集团上线，存档导出和审批路由能带动试点转化，并且至少两个客户扩展到第二个基金系列或渠道，就有理由启动种子轮。
sanityChecks:
  ruleOf40: Y3 增长率 242.4% + EBITDA 利润率 0.6% = 243.0%
  burnMultiple: Y2 烧钱倍数约为 1.1 倍，用约 94 万美元的 EBITDA 消耗对比约 84 万美元的净新增 ARR；基准情形下 Y3 第 3 季度转为 EBITDA 转正。
  revenuePerFte: Y3 人均创收 25.9 万美元，对应 12 名期末员工（对标 SaaS 基准 20 万-40 万美元）
  flags:
  - 基准情形达到研究得出的完整第 3 年 30 个客户的 SOM，所以哪怕试点转化只是小幅放缓，也会明显压缩收入。
  - 只有当政策接入、证据包和存档导出从定制服务变成可复用能力，毛利率才能达到商业计划的 70% 目标。
  - customersEop 既包含付费试点也包含生产部署，所以完全复购的生产客户数量在 Y1 和 Y2 早期会落后于表面数字。
  - 模型假设 12 名期末员工能支持 30 个客户，前提是上线复用是真实的；如果每个基金系列都需要大量定制规则工作，招聘和融资需求都要上调。
  - 现金按 EBITDA 建模；提前开票、采购延迟或集成专属的安全成本，都可能让实际现金时点早于或晚于模型所示。
