slug: fund-marketing-rule-supervisor
date: "2026-07-08"
currency: USD
modelStartMonth: "2026-08"
assumptions:
- id: A1
  name: Model start month
  value: "2026-08"
  unit: YYYY-MM
  source: '[BP date 2026-07-08] the model begins with the first full operating month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.4M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a lean ask sized to reach the next production-conversion milestone and still preserve roughly six months of cash buffer.'
- id: A3
  name: Starting paying fund complexes
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first sign paid quarter-end pilots.'
- id: A4
  name: Paying customer definition
  value: One fund complex paying for a pilot, annual production workflow, or expanded governed channel.
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any complex already paying for governed commentary, factsheet, or adjacent release-gate scope.'
- id: A5
  name: Paid pilot economics
  value: $40K over about 3 months (~$13K/mo)
  unit: USD/complex
  source: '[BP gtm.pricing paid pilot $30k-$50k + BP investorMemo.firstCustomer.initialContract] the model uses the midpoint pilot value for one fund family and one quarter-end package.'
- id: A6
  name: Production contract and expansion economics
  value: Core production lands at roughly $120K-$180K ARR and exits near about $170K blended annual value per complex by Q4Y3 as archive-export and second-channel modules attach.
  unit: USD/complex/year
  source: '[BP gtm.pricing annual subscription $120k-$180k + BP businessModel.expansionLevers + Research market.som ~$160k blended ACV] late-year ARPU sits slightly above the research SOM blend because some customers add premium modules by year 3.'
- id: A7
  name: Customer ramp
  value: 3 paying complexes by M12, 8 by Q4Y2, and 30 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + Research market.som 30 logos] the base case matches the year-1 pilot targets, the year-2 production-complex milestone, and the researched year-3 SOM.'
- id: A8
  name: Revenue recognition convention
  value: 'Period revenue equals active paying complexes multiplied by blended realized monthly revenue per complex: about $12K-$13K in Y1, $13.0K-$13.6K in Y2, and $13.8K-$14.2K in Y3.'
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som] this keeps revenue directly traceable to customers and the subscription-plus-module pricing model.'
- id: A9
  name: Gross margin ramp
  value: 40%-50% in Y1, 55%-62% in Y2, and 64%-70% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + BP risks] early pilots are implementation-heavy before reusable policy templates and archive exports lift margin toward the BP target.'
- id: A10
  name: Hiring timeline
  value: M1 founder/CEO and founding engineer; M4 compliance product lead; M7 solutions engineer; M10 second engineer; M13 first GTM hire; M16 customer success/ops; M19 third engineer; M25 second solutions hire; M28 second GTM hire; M31 second customer success/ops; M34 fourth engineer
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] the first four hires follow the BP directly and later hires remain milestone-gated so the company proves repeatability before scaling.'
- id: A11
  name: Founder / CEO loaded compensation
  value: $140K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] lean founder cash compensation with payroll taxes and benefits included.'
- id: A12
  name: Engineering loaded compensation
  value: $175K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] pre-seed cash pay for senior product and integration engineering talent, with equity carrying the rest of total compensation.'
- id: A13
  name: Compliance / policy loaded compensation
  value: $160K
  unit: USD/year
  source: '[BP team Compliance product lead + startup-finance heuristic] reflects a hybrid compliance-product role translating SEC and FINRA logic into machine-checkable rules.'
- id: A14
  name: Solutions / implementation loaded compensation
  value: $150K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] covers onboarding, workflow integration, archive export, and security-review support without assuming a large services bench.'
- id: A15
  name: Sales / partnerships loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP gtm.channels + startup-finance heuristic] concentrated enterprise sales and co-sell work stays founder-assisted, so the first GTM hires remain lean.'
- id: A16
  name: Customer success / ops loaded compensation
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] reflects a high-context onboarding and retention role rather than a manual review team.'
- id: A17
  name: Payroll allocation to P&L lines
  value: Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; compliance/policy 15% S&M / 70% R&D / 15% G&A; solutions 35% S&M / 55% R&D / 10% G&A; sales 100% S&M; customer success/ops 50% S&M / 15% R&D / 35% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] this maps payroll into the operating lines while making founder-led sales and solutions-heavy onboarding visible.'
- id: A18
  name: Non-payroll opex ramp
  value: Monthly non-payroll spend rises from S&M/R&D/G&A of $5K/$8K/$5K in early Y1 to $14K/$16K/$10K by Q4Y3.
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] covers cloud, data vendors, travel, legal, insurance, and audit-readiness tooling without assuming broad paid demand generation.'
- id: A19
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A20
  name: Steady-state monthly churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets] regulated publishing workflows should be sticky once embedded, but the model stays conservative for a narrow beachhead.'
- id: A21
  name: CAC convention
  value: $48.4K = total 36-month sales and marketing spend divided by 30 net new paying complexes
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.channels + BP gtm.funnelTargets] the narrow ICP and paid-pilot motion keep acquisition spend concentrated rather than broad-based.'
- id: A22
  name: Next-round milestone for funding sizing
  value: By roughly month 18-24 the company should have 5-6 production complexes, onboarding standardized to 4 weeks or less, and at least 2 expansions into a second fund family or channel.
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap 180-360 days] the pre-seed is sized to hit seed-ready proof on conversion, onboarding reuse, and early expansion with six months of buffer.'
- id: A23
  name: Quarterly salary-roll convention
  value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only the published quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent even though Y2 and Y3 headcount tables only show year-end snapshots.'
