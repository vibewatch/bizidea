scenarios:
  downside:
    description: Client-facing AI stays in shadow mode longer, pilot-to-production conversion slips roughly one quarter, and policy ingestion remains more services-heavy.
    y3RevenueK: 2492.4
    y3EbitdaK: -467.6
    cashLowPointK: 243.2
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 24 instead of 30 because quarter-end pilots convert more slowly.
    - Blended Y3 realized revenue stays near $13.2K-$13.6K per month per complex instead of the $13.8K-$14.2K base range.
    - Exit gross margin reaches about 67% instead of 70% because policy mapping and evidence assembly stay more manual.
  base:
    description: Quarter-end pilots convert on plan, onboarding standardizes to a reusable fund-family template, and archive-export plus second-channel modules start attaching in year 3.
    y3RevenueK: 3110.5
    y3EbitdaK: 18.3
    cashLowPointK: 472.7
    keyAssumptionChanges:
    - 3 paying fund complexes by M12, 8 by Q4Y2, and 30 by Q4Y3.
    - Blended realized revenue per complex rises from roughly $12K-$13K monthly in Y1 to about $14.2K monthly by Q4Y3.
    - Gross margin exits at the BP target 70% only after onboarding templates and archive-ready evidence packets reduce services work.
  upside:
    description: Quarter-end triggers and partner referrals accelerate, more customers expand into a second fund family or channel, and reuse lifts margin ahead of plan.
    y3RevenueK: 3632.0
    y3EbitdaK: 434.6
    cashLowPointK: 560.3
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 34 instead of 30 because referral and co-sell channels start producing earlier.
    - Blended Y3 realized revenue rises toward $13.9K-$14.8K per month per complex as archive-export and second-channel modules attach faster.
    - Exit gross margin reaches about 72% as onboarding and policy reuse improve ahead of plan.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual value settles near $155K per paying complex.
  baseCase: Exit blended annual value reaches about $170K per paying complex.
  upsideCase: Second-family and channel modules lift blended annual value toward $180K.
  y3RevenueImpactK: -311.1
  cashImpactK: -220.0
- variable: CAC
  downsideCase: CAC rises toward $65K if referrals underperform and founder-led outreach dominates longer.
  baseCase: CAC stays near $48K with a narrow ICP and paid-pilot motion.
  upsideCase: Partner referrals keep CAC near $40K.
  y3RevenueImpactK: -90.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: Monthly churn rises to 3.0% if the wedge feels too narrow after first deployment.
  baseCase: Monthly churn holds at 2.0% once compliance workflows and evidence packets are embedded.
  upsideCase: Monthly churn stays near 1.2% because archive-ready approvals become part of the release system of record.
  y3RevenueImpactK: -180.0
  cashImpactK: -140.0
- variable: sales cycle
  downsideCase: Pilot-to-production conversion stretches toward 150 days.
  baseCase: Paid pilots convert in roughly 90-120 days around a quarter-end release cycle.
  upsideCase: Executive sponsorship and exam-driven urgency compress conversion toward about 75 days.
  y3RevenueImpactK: -420.0
  cashImpactK: -260.0
- variable: gross margin
  downsideCase: Exit gross margin stalls near 67% because policy ingestion stays bespoke.
  baseCase: Exit gross margin reaches the BP target 70% as templates and exports become repeatable.
  upsideCase: Exit gross margin reaches about 72% as reusable onboarding improves faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: hiring pace
  downsideCase: An extra implementation or policy hire is pulled forward before repeatability is proven.
  baseCase: Hiring stays milestone-gated and reaches 12 ending FTE by Q4Y3.
  upsideCase: One scale hire can be delayed because templates and partner workflows work sooner.
  y3RevenueImpactK: -60.0
  cashImpactK: -130.0
modelDiagram:
  title: fund-marketing unit economics flow
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered fund complexes] --> PaidPilots[Paid quarter-end pilots]
      PaidPilots --> Production[Production governed workflows]
      Production --> Expansion[Second fund family or channel]
      Expansion --> Revenue[Subscription + module revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing from 3 paying fund complexes at Y1 exit to 30 by Q4Y3 while blended annual value rises toward about $170K as archive-export and second-workflow modules attach.
- checkName: Must go right
  finding: Pilot-to-production conversion and onboarding reuse have to stay near the BP targets so a 12-FTE team can support 8 paying complexes by Q4Y2 without becoming services-heavy.
- checkName: Model breaks if
  finding: If external AI publishing stays in shadow mode longer or policy ingestion remains bespoke, the downside case pushes Y3 EBITDA to about -$0.47M and the cash floor toward roughly $0.24M.
- checkName: Next-round proof
  finding: A seed round is justified once 5-6 production complexes are live, archive-export and approval-routing convert pilots, and at least two customers expand into a second fund family or channel.
sanityChecks:
  ruleOf40: Y3 growth 242.4% + EBITDA margin 0.6% = 243.0%
  burnMultiple: Y2 burn multiple is about 1.1x using roughly $0.94M of EBITDA burn against about $0.84M of net new ARR; Q3Y3 turns EBITDA positive in the base case.
  revenuePerFte: $259K Y3 on 12 ending FTE (benchmark $200-400K SaaS)
  flags:
  - The base case reaches the full researched 30-logo year-3 SOM, so even modest pilot-conversion slippage materially compresses revenue.
  - Gross margin reaches the BP 70% target only if policy ingestion, evidence packets, and archive exports become repeatable instead of bespoke services.
  - CustomersEop includes paid pilots as well as production deployments, so fully recurring production logos trail the headline count through Y1 and early Y2.
  - The model assumes 12 ending FTE can support 30 complexes because onboarding reuse is real; if each fund family needs heavy custom rule work, both hiring and funding need rise.
  - Cash is modeled as EBITDA; upfront billing, delayed procurement, or integration-specific security costs could move actual cash earlier or later than shown.
