  pricing: Outcome-based / custom enterprise
  strength: 有力证明受监管企业愿意为运行时法务监督付费，也愿意把客户专属标准编码进 AI 工作流。
  weaknessVsUs: 法务范围更广、模式偏重服务，并非专为发布前基金点评、概况表和存档工作流打造。
