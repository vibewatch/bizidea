operations:
  - "为 SEC 营销规则、业绩、披露和留存管控维护一份按基金系列分类的版本化美国政策库"
  - "在每个审查周期之前，把已批准的业绩数据和披露来源拉进一张证据图谱"
  - "为每个发布事件生成带来源引用、差异对比、审核决定和模型版本的存档级审批包"
  - "用人工升级和最小权限系统访问，处理提示注入、无支持宣称和例外情况"
  - "在 SEC 常见问题、风险提示或 FINRA 指导变化时，与合规顾问或律所合作方一起跑规则更新节奏"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: >-
      主导创始人式销售、共创客户招募，以及存档或合规合作伙伴生态，因为最早的成交都由触发事件驱动，需要顾问式打法。
  - role: "创始工程负责人"
    startTiming: "第 0 个月"
    rationale: >-
      从第一天起构建政策图谱、内容检查工作流、证据包和安全集成模式。
  - role: "合规产品负责人"
    startTiming: "第 3 个月"
    rationale: >-
      把 SEC 和 FINRA 政策逻辑加上内部规则模板，转译成机器可检查的管控，并随指导变化持续更新政策库。
  - role: "解决方案工程师"
    startTiming: "第 6 个月"
    rationale: >-
      在前两个共创客户上线后，缩短上线时间、工作流集成、存档导出和安全审查周期。
milestones:
  - horizon: "0–12 个月"
    items:
      - "拿下 2 到 3 个绑定季末点评或概况表周期的付费美国基金营销试点"
      - "为一个基金系列交付生产就绪的政策包，配上证据包和存档导出"
      - "把至少 2 个试点转为年度合同，证明范围内内容包的中位审批时间低于一个工作日"
      - "把上线流程标准化，让一个新基金系列能在 4 周或更短时间内配置完成"
  - horizon: "12–24 个月"
    items:
      - "达到 6 到 8 个生产环境基金集团，其中至少一半扩展到第二个基金系列或渠道"
      - "推出一个 FINRA 导向的顾问邮件模块，以及一个可复用的存档或工作流集成套件"
      - "在进入新垂直领域之前，先在现有资管客户内部加上 DDQ、RFP 或客户信函治理"
  - horizon: "24–36 个月"
    items:
      - "达到约 30 个客户，与研究得出的 480 万美元第 3 年 SOM 一致"
      - "用可复用的证据和政策模板，扩展到资管领域相邻的受监管对外工作流"
      - "只有当美国上线利润率维持在计划内时，才测试一个非美国司法辖区政策包或相邻金融服务细分市场"
risks:
  - risk: "买家把对外 AI 生成内容留在影子模式的时间比预期更久"
    likelihood: "Medium"
    impact: "High"
    mitigation: >-
      优先卖给有明确 AI 授权的公司，从第一天起支持影子模式审查，如果生产发布持续受阻，转向审核辅助加证据留存。
  - risk: "现有审查或存档厂商把够用的 AI 检查捆绑进现有合同"
    likelihood: "High"
    impact: "High"
    mitigation: >-
      靠基金专属的政策深度、证据包和最快的季末部署取胜，而不是靠泛泛的 AI 审查宣传。
  - risk: "招募说明书、业绩展示区间和内部标准用语的政策接入始终是重服务项目"
    likelihood: "High"
    impact: "High"
    mitigation: >-
      先从一个基金系列和一个内容包开始，尽早把可复用的规则结构模板化，在上线指标保持在计划内之前，拒绝接入相邻渠道。
  - risk: "FINRA 和跨境规则扩张，在美国工作流可复制之前就扩大了产品范围"
    likelihood: "Medium"
    impact: "Medium"
    mitigation: >-
      把顾问邮件、英国和欧盟支持当作模块化政策包，在至少两个生产环境案例跑通之前，不超出美国基础工作流范围。
  - risk: "大模型的溯源或安全问题造成错误放行，侵蚀买家信任"
    likelihood: "Medium"
    impact: "High"
    mitigation: >-
      在生产发布之前，采用限定范围的工作流、有来源支撑的证据、人工可覆盖机制，以及提示注入或无支持输出测试。
fundingAsk:
  round: "pre-seed"
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    资助一个 18 个月的计划，交付美国点评加概况表 MVP，招聘一名合规产品负责人和一名解决方案工程师，完成 2 到 3 个付费季末试点，把其中至少 2 个转为 12 万美元以上的年度合同，并证明政策接入和存档级证据能规模化，而不必依赖重服务的交付模式。
