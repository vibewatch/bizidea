    name: Target gross margin
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct = 70] COGS includes partner settlement rev-share (~15-20% of revenue) and variable compliance/infra tooling (~10%); consistent with research showing 2-3% yield vs 8-12% BDC spread leaves margin room"
