scenarios:
  downside:
    description: >-
      Partner channel closes 6 months late; no second PSP signed by Y2; company cuts headcount to 8 FTEs to preserve pre-seed cash; customers reach only 250 by Y3 end in direct-outbound mode.
    y3RevenueK: 242.0
    y3EbitdaK: -1050.0
    cashLowPointK: 480.0
    keyAssumptionChanges:
      - "Partner channel delayed 6 months; Y3 customer count cut to ~250 (vs 900 base)"
      - "CAC rises to $4k in direct-only mode; S&M spend approximately 2x base case"
      - "Headcount capped at 8 FTEs to conserve pre-seed; seed round not raised without repeat-usage proof"
  base:
    description: >-
      KongaPay partnership signed by M3; 50 active merchants by Y1 end, 250 by Y2 end, 900 by Y3 end; $6M seed raised at Q2Y2; headcount scales to 13 FTEs; $163/month blended ARPU at 70% gross margin.
    y3RevenueK: 1127.2
    y3EbitdaK: -1276.0
    cashLowPointK: 1609.3
    keyAssumptionChanges:
      - "One PSP partner active by M3; backup liquidity partner by M9; $1.8k steady-state CAC"
      - "50 merchants at Y1 end, 250 at Y2 end, 900 at Y3 end; 2%/month churn"
      - "$6M seed raised at Q2Y2 (~M15); headcount grows from 6 to 13 FTEs over 3 years"
  upside:
    description: >-
      Two PSP partners signed by Q2Y2; referral funnel compounds to 1,200 merchants by Y3 end; ARPU grows as merchant payables increase; monthly churn falls to 1% as invoice-linked workflow proves sticky.
    y3RevenueK: 1921.0
    y3EbitdaK: -1155.0
    cashLowPointK: 1600.0
    keyAssumptionChanges:
      - "Two PSP partners active by Q1Y2; compounding referral funnel reaches 1,200 merchants by Y3 end"
      - "ARPU grows to $195/month as avg merchant payables rise to $200k+/year"
      - "Monthly churn falls to 1% as invoice-linked approval workflow proves habit-forming"

