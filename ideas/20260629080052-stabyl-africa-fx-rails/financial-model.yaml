    baseCase: "70% gross margin per BP target; 30% COGS = partner fees + compliance tooling"
    upsideCase: "75% gross margin (volume discounts on partner rails at 250+ merchants)"
    y3RevenueImpactK: 0.0
    cashImpactK: -169.0
  - variable: sales cycle
    downsideCase: "90-day pilot-to-paid cycle (KYC/regulatory delays); customer ramp approximately 2x slower"
