    name: Y1-end active paying merchants
    value: "50"
    unit: count
    source: "[BP 12-month milestone] 'converting 30-50 merchants to repeat monthly usage'; using top of range; partner channel assumed live by M3"
  - id: A5
    name: Y2-end active paying merchants
    value: "250"
    unit: count
    source: "[BP 12-24 month milestone] 'Reach 150-250 active merchants'; using top of range consistent with two PSP channels active by Y2"
  - id: A6
    name: Y3-end active paying merchants
    value: "900"
    unit: count
    source: "[BP 24-36 month milestone / research SOM] 'about 900 active merchants and roughly $144M annual executed volume'"
  - id: A7
    name: Monthly customer churn rate
    value: "2.0"
    unit: percent/month
    source: "[Finance heuristic: Africa SME fintech B2B workflow] 2-3%/month range (~24-36% annual) for recurring invoice-linked software; 2% used reflecting sticky workflow adoption; net new customer ramp accounts for gross adds offsetting churn"
  - id: A8
    name: Blended fully-loaded FTE cost Year 1
    value: "100000"
    unit: USD/year
    source: "[Finance heuristic] Mix of Lagos-based roles ($60-80k base) and remote/senior roles ($90-120k); 20% benefits and payroll-tax burden applied; consistent with BP team of 6 by Y1 end"
  - id: A9
    name: Blended fully-loaded FTE cost Year 2
    value: "110000"
    unit: USD/year
    source: "[Finance heuristic] Senior engineering and partnerships hires command higher rates; 10% step-up from Y1 reflects experience premium and scale"
  - id: A10
    name: Blended fully-loaded FTE cost Year 3
    value: "120000"
    unit: USD/year
    source: "[Finance heuristic] Continued senior hiring as company scales; 9% step-up from Y2"
  - id: A11
    name: Pre-seed raise
    value: "3000000"
    unit: USD
    source: "[BP fundingAsk] targetFundingRangeUsd = $2-4M; $3M base-case provides 18-month operating runway plus 6-month buffer at M12 burn rate of ~$88k/month"
  - id: A12
    name: Expected seed raise (modeled as cash inflow)
    value: "6000000"
    unit: USD
    source: "[Finance heuristic] Nigeria fintech seed rounds 2024-2026 range $3-8M; $6M mid-range assumed at Q2Y2 (~M15) after 90-day repeat-usage proof and PSP partner signed; not part of the current pre-seed fundingAsk"
  - id: A13
    name: Steady-state partner-channel CAC
    value: "1800"
    unit: USD
    source: "[BP investorMemo] 'one partner channel can make acquisition efficient enough for roughly $1.6k-$3.7k annual merchant revenue profile'; $1.8k CAC implies ~16-month payback at base ARPU and 70% gross margin"
  - id: A14
    name: Monthly non-salary G&A (legal, compliance, admin)
    value: "15000-28000"
    unit: USD/month
    source: "[Finance heuristic: Nigeria fintech] AML/KYC compliance stack, PSP legal agreements, and local accounting run $15-25k/month; rising to $28k/month post-M6 as merchant volumes and partner obligations increase"
  - id: A15
    name: Monthly non-salary R&D (cloud, APIs, compliance tooling)
    value: "7000"
    unit: USD/month
    source: "[Finance heuristic] Cloud infra, stablecoin/payout API access fees, and approval-workflow tooling from M3 onwards; minimal in M1-M2 during MVP build"
  - id: A16
    name: Revenue recognition basis
    value: "average of BOM and EOP customer count times ARPU per month"
    unit: convention
    source: "[Finance heuristic] Standard mid-period SaaS recognition; slightly overstates early-month revenue for net-new cohorts but immaterial at small absolute levels"
  - id: A17
    name: COGS rate
    value: "30"
    unit: percent of revenue
    source: "[BP businessModel.targetGrossMarginPct = 70] COGS = 100% - 70% = 30%; includes partner settlement rev-share, stablecoin/payout rail fees, and variable compliance tooling proportional to executed volume"
  - id: A18
    name: Partnerships lead S&M step-up at M9
    value: "Salary $7.5k/month plus $12k/month marketing budget from M9"
    unit: USD/month
    source: "[BP team] 'Partnerships lead, startTiming: Month 9, rationale: Only add dedicated channel capacity after one PSP path and first repeat-use cohort are proven'; monthly S&M jumps from $18k to $30k at M9"
  - id: A19
    name: Y2 OpEx quarterly ramp
    value: "285k / 320k / 405k / 460k per quarter"
    unit: K USD/quarter
    source: "[Finance heuristic] Smooth headcount ramp from 6 FTEs (Y1 end) to 11 FTEs (Y2 end); Q3Y2 step-up reflects post-seed expanded hiring after $6M seed; non-salary overhead scales from $33k to $53k/month"
  - id: A20
    name: Y3 OpEx quarterly ramp
    value: "460k / 500k / 545k / 560k per quarter"
    unit: K USD/quarter
    source: "[Finance heuristic] Headcount stable at 11 entering Y3, growing to 13 FTEs by Q3Y3; measured growth to preserve burn multiple below 2.0x as revenue accelerates"

