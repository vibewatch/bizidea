    baseCase: "2.0%/month churn; avg customer life 50 months"
    upsideCase: "1.0%/month churn (sticky invoice-deadline workflow); avg customer life 100 months"
    y3RevenueImpactK: -338.0
    cashImpactK: -338.0
  - variable: CAC
    downsideCase: "Partner channel unavailable; direct-only CAC rises to $4k; S&M spend +$360k cumulative over 3 years"
    baseCase: "$1.8k steady-state CAC via KongaPay-embedded referral and co-sell"
    upsideCase: "$1.2k CAC as PSP partner subsidises acquisition through volume rev-share"
    y3RevenueImpactK: 0.0
    cashImpactK: -360.0
  - variable: gross margin
