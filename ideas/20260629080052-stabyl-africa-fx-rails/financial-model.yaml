    upsideCase: "30-day cycle (partner pre-vets merchants); 40%+ conversion rate"
    y3RevenueImpactK: -338.0
    cashImpactK: -338.0
  - variable: partner availability
    downsideCase: "KongaPay declines embedded orchestration; product forced into advisory-only mode with manual execution"
    baseCase: "KongaPay grants approval-mode execution orchestration access by M3"
    upsideCase: "Two PSPs grant full rule-based auto-execution access by M6; second African corridor opens in Y3"
    y3RevenueImpactK: -814.0
    cashImpactK: -814.0

modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Partner[PSP Partner\nKongaPay] -->|refers merchants| Leads[Merchant Leads]
      Leads -->|30% pilot convert| Pilots[Pilot Merchants]
      Pilots -->|60% first payment| Active[Active Merchants]
      Active --> Sub[Subscription\n$99 per month]
      Active --> Fee[Execution Fee\n0.5% of FX volume]
      Sub --> Revenue[Total Revenue]
      Fee --> Revenue
      Revenue -->|30% COGS\npartner and rail fees| COGS[Cost of Revenue]
      Revenue -->|70% gross margin| GrossProfit[Gross Profit]
      GrossProfit --> Cash[Operating Cash]
      Active -->|2% per month churn| Lost[Churned Merchants]

modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base case revenue is driven by 900 merchants executing recurring USD supplier payments at a blended $163/month ARPU (0.5% execution fee on avg $155k annual payables plus $99 subscription), sourced almost entirely through a KongaPay-embedded partner channel that holds steady-state CAC to $1.8k and 16-month payback.
  - checkName: Must go right
    finding: >-
      KongaPay or a comparable licensed PSP must grant embedded approval-mode execution orchestration by M3; without partner distribution the CAC and onboarding timeline inflate to levels that exhaust the $3M pre-seed before the 30-merchant repeat-usage proof needed to close the seed round.
  - checkName: Model breaks if
    finding: >-
      Steady-state monthly churn exceeds 3.5% or partner execution fees compress gross margin below 55%, as either condition makes LTV/CAC fall below 2.0x and destroys the unit economics argument for a $6M seed round at Q2Y2.
  - checkName: Next-round proof
    finding: >-
      A $6M seed round at Q2Y2 is justified by the sensitivity table showing that at 100+ active merchants with greater than 2% median net savings, 70%+ 90-day repeat rate, and M18 monthly burn below $120k, all six base-case assumptions remain intact with at least $1.6M cash cushion before the raise.

sanityChecks:
  ruleOf40: >-
    Y3 revenue growth 297% (from $284k to $1,127k) + EBITDA margin -113% = +184; metric
    is not meaningful at this hypergrowth pre-profitability stage; flagged as early-stage
    pre-profit where growth dominates
  burnMultiple: >-
    Y3 net burn $1,276k divided by incremental Y3 revenue $843k = 1.5x; within
    acceptable 1-2x range for growth-stage fintech investing ahead of a partner channel
    build-out; would deteriorate to 4.0x in the downside scenario
  revenuePerFte: >-
    $1,127k Y3 annual revenue divided by 13 FTEs = $87k per FTE; well below $200-400k
    SaaS benchmark; expected during pre-profitability scale phase; projected to reach
    ~$180k per FTE at 900-merchant steady-state run rate of $1.76M with 10-FTE core team
  flags:
    - "Single PSP dependency: if KongaPay declines embedded orchestration the entire customer ramp collapses and the $1.8M SOM run-rate is unreachable without 24+ months of additional direct-only CAC spend at 2x cost"
    - "$6M seed raise at Q2Y2 is a modeled assumption not a committed term sheet; if seed does not close before pre-seed cash falls below $1.6M the Y2-Y3 headcount plan must be cut by approximately 40% and Y3 revenue drops to the downside scenario"
    - "Y3 annual revenue of $1,127k is a ramp-year total; the $1.8M SOM figure from the business plan is the annualised run-rate at 900 merchants achieved at Y3 end, so stated SOM and annual-total revenue will appear to diverge if measured on calendar-year totals"
    - "Revenue per FTE of $87k is below SaaS benchmarks; the company is investing ahead of revenue which is appropriate for pre-seed but requires seed investors to accept two additional years of negative EBITDA before reaching a $200k+ per-FTE steady state"
    - "2%/month churn assumption requires merchants to have recurring disciplined invoice workflows; if the SME cohort is more opportunistic or naira volatility eases materially, churn could reach 4-5%/month, halving LTV and eliminating LTV/CAC viability at the $1.8k CAC target"
