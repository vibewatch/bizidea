openQuestions:
- Will KongaPay or another licensed PSP permit third-party orchestration of merchant FX execution rather than only manual settlement support?
- What realized spread advantage versus BDC/manual sourcing is achievable for $10k-$100k supplier-payment tickets after partner and compliance fees?
- How many Nigerian online importers have recurring monthly USD payables above $50k and enough process discipline to use target-rate automation?
- Can Stabyl or an equivalent partner provide reliable executable rates and post-trade evidence, not just indicative quote feeds?
