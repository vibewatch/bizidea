    - 17
    - 20
    - 164
  sam:
    value: $9.7M
    rationale: Assumes an initial reachable segment of 5,000 merchants concentrated in marketplace-led and Lagos-centric importer workflows, each averaging ~$150k in annual payables on the same monetization model.
