competitors:
- name: Verto
  stage: scale-up
  wedge: Africa-first B2B FX and treasury platform with supplier-payment use cases and strong African currency coverage.
  pricing: Custom / quote-based; no public self-serve tariff on site.
  strength: Strong FX transparency narrative, Africa-specific treasury positioning, and explicit supplier-payment workflows.
  weaknessVsUs: Broad treasury platform rather than a marketplace-embedded importer autopilot that ties quotes to invoice deadlines and inventory plans.
  sourceRefs:
  - 67
  - 74
  - 79
- name: Fincra
  stage: scale-up
  wedge: African payment APIs, virtual accounts, and payout infrastructure for online businesses.
  pricing: Custom pricing based on product needs, transaction volume, markets, and risk profile.
  strength: Useful Nigeria/Africa collections stack and virtual-account infrastructure that can sit close to merchant cash flows.
  weaknessVsUs: Good plumbing, but weaker public positioning around FX timing intelligence and importer-specific budget automation.
  sourceRefs:
  - 53
  - 58
- name: Yellow Card
  stage: scale-up
  wedge: Licensed stablecoin infrastructure, treasury services, and API rails across Africa and other emerging markets.
  pricing: Enterprise / talk-to-sales model; no public standard tariff.
  strength: Strong compliance posture, broad local-currency reach, and explicit stablecoin-powered invoice and payout support.
  weaknessVsUs: Infrastructure provider first; does not specialize in a Nigeria-first importer UX for rate targets, due-date logic, and BDC benchmark reporting.
  sourceRefs:
  - 36
  - 39
  - 40
  - 49
- name: Nium
  stage: incumbent
  wedge: Global payouts and FX infrastructure with enterprise-grade reach, 24-hour rate locks, and large corridor coverage.
  pricing: Custom enterprise pricing; no public self-serve fee card.
  strength: 190+ country payouts, 125+ currency FX, and strong partner credibility with Circle and Visa-related stablecoin settlement.
  weaknessVsUs: Optimized for platforms and international enterprises, not for Nigeria-first importer workflow design and BDC-versus-CLOB decision support.
  sourceRefs:
  - 99
  - 100
  - 104
- name: dLocal
  stage: incumbent
  wedge: One-API emerging-market payments orchestration, now expanding deeper into African stablecoin and OTC FX via AZA Finance.
  pricing: Custom enterprise pricing / contact sales.
  strength: Broad merchant-platform coverage, stablecoin orchestration, and reinforced Africa treasury depth through AZA.
  weaknessVsUs: Enterprise expansion platform rather than an SME importer execution copilot tailored to Nigerian merchant cash cycles.
  sourceRefs:
  - 95
  - 96
