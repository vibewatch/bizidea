  pestle:
  - factor: political
    impact: negative
    point: FX and payments policy in Nigeria can shift abruptly, which increases compliance burden and partner dependency for a merchant-facing FX product.
    sourceRefs:
    - 1
    - 159
    - 43
  - factor: economic
    impact: positive
    point: Naira volatility and expensive cross-border money movement increase urgency for tools that reduce spread leakage and payment uncertainty.
    sourceRefs:
    - 7
    - 154
    - 163
  - factor: social
    impact: positive
    point: Nigeria’s shift toward digital payments after cash shortages expands comfort with non-cash workflows and lowers behavioral barriers to treasury software.
    sourceRefs:
    - 33
    - 20
  - factor: technological
    impact: positive
    point: Stablecoin settlement, local payout APIs, and multi-currency treasury tooling are mature enough to support an execution layer without building core rails from scratch.
    sourceRefs:
    - 39
    - 95
    - 104
    - 114
  - factor: legal
    impact: negative
    point: AML/KYC, stablecoin-policy ambiguity, and settlement-routing requirements mean the startup must be explicit about partner roles and audit evidence.
    sourceRefs:
    - 24
    - 43
    - 159
  adoptionFrictionMatrix:
  - friction: Merchant trust in auto-executing FX purchases
    severity: high
    affectedBuyer: Founder / CFO of importer
    mitigation: Start with alert-plus-approval mode, show benchmark-versus-executed pricing, and produce post-trade audit trails before enabling full automation.
    sourceRefs:
    - 49
    - 67
    - 100
  - friction: Licensed-partner and compliance approvals
    severity: high
    affectedBuyer: Platform partner / compliance lead
    mitigation: Route settlement through existing licensed PSP or treasury partners and treat rules, limits, and KYC states as first-class product objects.
    sourceRefs:
    - 12
    - 24
    - 43
    - 159
  - friction: Need to pre-fund or maintain multi-currency balances
    severity: medium
    affectedBuyer: Finance manager
    mitigation: Support staged targets, wallet-based batching, and invoice-linked recommendations rather than forcing always-on full prefunding.
    sourceRefs:
    - 40
    - 53
    - 99
  - friction: Integration with invoices, logistics, and merchant data
    severity: medium
    affectedBuyer: Operations / platform lead
    mitigation: Start with CSV or lightweight API ingestion for supplier invoices and inventory deadlines, then deepen platform embeddings after pilots prove ROI.
    sourceRefs:
    - 11
    - 20
    - 79
market:
  tam:
    value: $39.3M
    rationale: Modeled as 20,000 import-active merchants × ~$155k average annual USD payables = ~$3.1B annual addressable payment volume, then monetized at 0.5% execution fees plus $99/month SaaS; the implied volume is ~5% of Nigeria’s 2024 goods imports, a conservative cross-check for online consumer-goods and SME distributor flows.
    isEstimate: true
    sourceRefs:
