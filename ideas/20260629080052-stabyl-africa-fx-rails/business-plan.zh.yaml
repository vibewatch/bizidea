slug: africa-importer-fx-autopilot
date: '2026-06-29'
executiveSummary: 2026 年 6 月，Stabyl 融资并与 KongaPay 建立结算合作，说明面向尼日利亚商户的程序化 FX 通道开始具备可用性；但真正的空白，还在商户必须给供应商发票备付那一刻的执行判断。第一批客户最该切的是 Konga 平台上的电子或时尚进口商：每年有 $100k-$500k 的 USD 应付款，却没有专门财资团队。首版产品不该自建钱包、银行账户或 FX 库存，而该把可执行汇率或伙伴给出的报价拿来对照 BDC 价格，告诉商户什么时候买，并把获批执行路由给持牌伙伴。这个滩头市场成立，是因为痛点会反复出现、购买触发极尖锐，而且如果想让低 ACV 商户模型跑通，伙伴分发大概率不可少。刻意的取舍是：先做提醒 + 审批模式和发票绑定的报表，而不是一上来就做多通道全自动交易，因为真正卡点在伙伴许可、商户信任和审计可追溯性。如果试点能证明，相比 BDC 采购，净节省超过 2%，首笔供应商付款之后还能月月复用，而且伙伴结算证据可靠，公司就能顺势扩到分销商、更多商户平台，以及后续的财资产品，例如敞口预测和由伙伴发行的远期。最该怀疑的地方也很明确：监管边界仍不清晰、第三方流动性和结算通道依赖过重，以及真正具备规律性应付款纪律的商户群到底有多大，仍未验证。正因为这些缺口都很实质，前 18 个月的钱应该买来的是伙伴准入、懂合规的工作流软件和商户群证明，而不是过早做地域扩张。
problem:
- 尼日利亚进口商每月都有供应商发票要付，却常常在最后一刻通过 BDC、银行排队或非正式黄牛找 USD，结果买到的汇率比基准价高出 5–15%。
- FX 敞口散落在表格和聊天线程里，一次奈拉波动或一个供应商截止日，就会演变成预算失真、结算延迟和审计链条残缺。
solution:
- 把一个发票绑定的 FX 看板嵌进商户已信任的工作流里，实时展示基准汇率或可执行汇率与 BDC 点差的对比，跟踪未结应付款，并允许商户按目标汇率或截止日期设规则。
- 把获批的 USD 采购和供应商付款，路由给 KongaPay 等持牌伙伴以及多源流动性提供方，再回传对账和可报税报表。
whyWeWin:
- 产品卡在商户做决定的那一刻，而不是只停留在资金流转层，所以它能把伙伴通道变成看得见的节省和更少错过的供应商付款。
- 通过 Konga 这类商户生态做伙伴分发，能把信任和入驻门槛压下来；若全靠直销，这个低 ACV 细分太贵。
- 基准价与实际执行价的历史、发票绑定的行为数据，以及合规级审计轨迹，会一起滚成一条路由与推荐护城河——这是通用 FX 供应商天然采不到的数据。
strategicChoices:
  beachhead: Konga 平台上从中国或阿联酋进口电子和时尚品类、每年大约有 $100k-$500k USD 供应商付款、且没有内建财资团队的商户。
  wedgeRationale: 这批商户每个月都在做同一件事，本来就活在商户平台里，又会直接被 FX 波动打到落地毛利。若一开始就铺向所有尼日利亚 SME，买家工作流、付款体量和伙伴渠道差异太大，验证只会变慢。
  sequencingRationale: 先上审批模式软件、发票接入和伙伴路由执行，先把节省和信任跑出来，再去要求商户或监管接受全自动化。只有伙伴准入、复用率和低触达入驻被证明后，才该加自动规则、第二渠道和新通道。
  notYet:
  - 在 Konga 式商户工作流还没反复跑通之前，不碰 Jumia、独立站和 FMCG 分销商。
  - 在事后审计轨迹和信任指标还不够强之前，不做无需审批的自动执行。
  - 不碰自营资产负债表放贷，也不囤自有 FX 库存。
  - 在单一渠道下尼日利亚单位经济模型还没跑通之前，不去肯尼亚和加纳扩张。
market:
  tam: 按 20,000 个活跃进口商、每家年均约 $155k 的 USD 应付款，以及当前定价模型测算，TAM 约为 $39.3M。
  sam: 按约 5,000 家可通过伙伴渠道触达、且以平台主导、并集中在拉各斯的商户测算，SAM 约为 $9.7M。
  som: 第 3 年 SOM 约为 $1.8M，对应约 900 家活跃商户和约 $144M 年执行体量。
  segments:
  - 有重复性 USD 供应商发票的尼日利亚平台型进口商。
  - 月度应付款较稳定的尼日利亚 FMCG 进口商和分销商。
  buyingProcess: 触发点通常是供应商发票到期，或奈拉波动把商户的落地成本预算打穿。若入驻能搭上现成 PSP 关系，创始人或 CFO 很快就能批试点；但伙伴的合规审查和结算权限，仍是能否正式上线的关口。
product:
  mvp: 一个审批模式的 FX 工作流：接收发票 CSV 上传或轻量平台数据，对照 BDC 价格给出伙伴汇率基准，推荐何时买，并让商户通过持牌结算伙伴批准执行。MVP 必须回传执行回执、基准差值和可导出的对账报表，而不是第一天就承诺全自动交易。
  sixMonth: 先给前 10–20 家试点商户，在一条持牌伙伴路径上交付发票上传、目标汇率提醒、基于截止日的建议、人工审批、执行回执抓取和可报税 FX 报表。
  twelveMonth: 增加多源流动性路由、商户客群分析、重复付款规则，以及第二个分发或结算伙伴，同时把 30–50 家商户转成按月复用。
  twentyFourMonth: 如果尼日利亚的重复使用经济性和伙伴可靠性都被证明，再给复用商户上线可信的规则式自动执行，给更大分销商做团队账户，并只在那之后扩到另一个非洲市场。
  keyBets:
  - 持牌 PSP 会允许嵌入式编排和面向商户的执行审批。
  - 典型 $10k-$100k 的供应商付款票面，在扣除费用后，仍能比 BDC 采购省出足够有意义的净收益。
  - 商户在第一次供应商付款成功后，会每月反复用这套流程。
  - 单一伙伴渠道足以把获客效率打到适配约 $1.6k-$3.7k 年商户收入画像的水平。
gtm:
  wedge: 嵌入 KongaPay 的供应商发票与 USD 预充值审批工作流。
  channels:
  - 通过 KongaPay 或类似商户 PSP 看板做嵌入式分发。
  - 由创始人亲自打单，直达那些本来就在反复支付 USD 供应商款的高体量尼日利亚平台型进口商。
  - 与流动性和财资伙伴联合销售，让他们在自家通道上吃到稳定、重复的商户体量。
  funnelTargets: 伙伴转介绍商户→完成试点入驻 30%+，已入驻试点→首笔供应商付款执行 60%+，首笔付款→90 天内重复使用 70%+，试点→付费正式版 50%+。
  pricing: 起步就按研究里的 0.5% 执行费 + $99/月收费，因为买家感受到的痛点本来就是点差流失和人工成本，不是按席位计费的软件问题。前 1–2 笔供应商付款先用审批模式按标准价格跑，不做服务味太重的企业试点。
businessModel:
  revenueStreams:
  - 按已完成 USD 换汇收 0.5% 执行费。
  - 每月 $99 订阅，覆盖汇率提醒、敞口跟踪和 FX 报表。
  unitOfValue: 每个活跃商户账户的重复性 USD 供应商付款体量。
  targetGrossMarginPct: 70
  expansionLevers:
  - 吃下每个商户每月更大份额的供应商应付款体量。
  - 在不改核心发票工作流的前提下，加更多商户渠道和分销商客群。
  - 向更大的分销商和 PSP 账户加卖团队审批、审计导出和伙伴看板。
  - 在重复执行体量跑起来后，上由伙伴发行的对冲或远期产品。
strategyMap:
  northStarMetric: 已绑定重复性发票工作流的商户，其月度 USD 供应商付款执行体量。
  inputMetrics:
  - 14 天内激活的伙伴转介绍商户数。
  - 相对当日 BDC 基准价的中位数净节省。
  - 完成首笔供应商付款的已入驻商户数。
  - 首笔付款后 90 天内再次执行的商户占比。
  - 具备完整事后审计证据的付款占比。
  moatsToBuild:
  - 按票面大小、通道和截止时效沉淀的报价与实际执行价历史数据集。
  - 把发票、供应商与执行行为串起来的商户级敞口图谱。
  - 很难重建的嵌入式伙伴集成和合规规则。
  - 由基准价报表、审批日志和结算证据组成的信任层。
  killCriteria:
  - 6 个月内，没有一家持牌 PSP 愿意开放嵌入式执行审批或编排。
  - 前 100 笔试点付款里，相对 BDC 或人工采购的中位数净节省始终低于 2%。
  - 完成首笔付款的商户里，90 天内做出第二笔付款的比例低于 30%。
  - 前 20 个试点之后，渠道转介绍从试点到付费的转化率仍低于 25%。
  mermaid: |
    flowchart LR
      Wedge[Konga merchant wedge] --> MVP[Approval-mode invoice and FX MVP]
      MVP --> Proof[Net savings, repeat usage, settlement evidence]
      Proof --> Expansion[More merchants, more partners, broader treasury products]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点真实、工作流切口也站得住，但在伙伴准入和商户复用行为被证明前，判断还不够强，达不到约伙伴深聊的程度。
    whyBelieve: 这家公司正好卡进一个可量化的成本项，而且切在一个明确的进口商工作流里；与此同时，可编程的伙伴通道也刚开始具备可用性。
    whyDoubt: 公司过度依赖伙伴授权和低成本渠道分发，而这个细分商户 ACV 小、横向替代者也不弱。
    nextDiligence: 先拿到一份真实 PSP 分发协议，再看至少 20 家商户的试点数据：净节省、复用率，以及可靠的结算证据。
  firstCustomer:
    title: Konga 上的电子或时尚进口商
    profile: 一家在尼日利亚运营的平台卖家，从中国或阿联酋进口消费品，每年支付约 $100k-$500k 的 USD 供应商发票，目前还在手工管理 FX。
    trigger: 奈拉突然走弱或 BDC 点差猛增，而供应商发票或发货截止日又只剩几天。
    buyer: 创始人或 CFO
    initialContract: 前 1–2 笔供应商付款先跑 60 天试点，之后转成 $99/月 + 0.5% 执行费；按 $100k-$500k 年体量算，每个商户年收入约为 $1.6k-$3.7k，尚未扣除伙伴分成。
  mustBeTrue:
  - KongaPay 或同类持牌 PSP 会分发或嵌入这套工作流，而不是把公司逼回纯冷启动获客。
  - 典型 $10k-$100k 票面在扣除伙伴费用后，相对 BDC 或人工采购的净节省仍能稳定高于 2%。
  - 确实存在一批商户，既有重复性的 USD 发票，又有足够流程纪律去设置目标汇率或截止日规则。
  - 商户能很快信任审批模式下的推荐，愿意在没有高触达人工作盘的情况下月月复用。
  - 在横向现有厂商抹平切口之前，同一产品就能扩到分销商、更多 PSP 和由伙伴发行的财资产品。
  diligenceQuestions:
  - KongaPay 或其他 PSP 到底愿意给第三方编排层开放哪些商业和技术权限？
  - 在常见票面下，对比 BDC、银行柜台和直接稳定币路径，真实净点差到底是多少？
  - Konga 或 Jumia 的卖家里，有多少可触达商户每年重复性 USD 应付款超过 $50k？
  - 伙伴通道会带来多少分成、结算责任和合规负担？
  - 首笔供应商付款成功之后，哪些商户行为最能预测后续复用？
operatingAssumptions:
- assumption: 在公司拿到独立牌照之前，KongaPay 或同类 PSP 会允许嵌入式的审批模式编排。
  basis: research.yaml
  validationTest: 90 天内拿到沙盒或 API 访问权限，并签下一份试点协议，写清伙伴职责。
  decisionImpact: 如果不成立，产品就得先退回成建议型看板，或卖成持牌伙伴的白标，而不能直接拥有商户工作流。
- assumption: 扣除伙伴费和合规费后，产品仍能比 BDC 采购多留出 2% 以上的净节省。
  basis: idea.yaml
  validationTest: 至少对比 30 组真实报价和已完成试点付款，在 $10k-$100k 票面上与同日 BDC 汇率做基准对比。
  decisionImpact: 如果不成立，就得改定价、改票面聚焦，甚至换商户细分，因为当前价值主张会明显变弱。
- assumption: 伙伴转介绍的商户，无需高定制、高触达实施，也能完成入驻并打出首笔付款。
  basis: research.yaml
  validationTest: 按统一操作手册入驻 20 家转介绍商户，测量搭建时间、发票上传完成率和首笔付款转化。
  decisionImpact: 如果不成立，公司应上探到更大的分销商或平台账户，而不是继续放大 SMB 动作。
- assumption: 到第 12 个月，备用流动性或结算提供方能把对 Stabyl 的依赖降下来。
  basis: research.yaml
  validationTest: 接入一家替代报价或结算伙伴，并通过非 Stabyl 路径完成 10 笔试点付款。
  decisionImpact: 如果不成立，供应商集中度仍然过高，公司就该放慢扩张，或重谈伙伴经济模型。
- assumption: 先信任审批模式的商户，后续会愿意把规则式自动化也打开。
  basis: 运营判断
  validationTest: 完成 3 笔审批模式付款的商户里，至少 70% 新建过 1 条目标汇率或截止日规则。
  decisionImpact: 如果不成立，路线图就该继续押在辅助式财资软件，而不是全自动驾驶。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 拿下一家持牌 PSP 共创客户，并把执行、KYC 和结算职责写清楚。
  hypothesis: 在公司自有牌照到手前，伙伴愿意先放开一个嵌入式商户工作流。
  successMetric: 签下一份试点协议，并拿到伙伴流程的沙盒或实际接入权限。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 跑一轮价差研究，对比典型供应商付款票面下的 BDC 报价、银行柜台报价和伙伴执行路径。
  hypothesis: 在最关键的 $10k-$100k 票面上，公司能稳定交付 2% 以上的税费后净节省。
  successMetric: 至少 30 笔观察或已完成交易的中位数净节省高于 2%。
  owner: 产品 / 合规负责人
- horizon: 0–90 天
  experiment: 让 10 家目标商户接入审批模式的发票和截止日跟踪。
  hypothesis: 高体量平台型进口商，即便没有定制服务，也能完成配置并批出首笔付款。
  successMetric: 10 家已入驻商户中，至少 6 家在 45 天内上传发票并完成首笔供应商付款。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 跟踪首笔供应商付款后的复用行为。
  hypothesis: 只要节省看得见、结算证据够清楚，商户在下一个发票周期还会再用。
  successMetric: 完成首笔付款的商户中，至少 60% 会在 90 天内再次执行。
  owner: 商户成功 / 运营
- horizon: 90–180 天
  experiment: 接入第二家流动性或结算伙伴，比较成交质量和可靠性。
  hypothesis: 多源路由能提升韧性，同时不破坏核心的节省故事。
  successMetric: 第二条路径完成 10 笔付款，净节省恶化不超过 50 个基点。
  owner: 集成工程师
- horizon: 6–12 个月
  experiment: 在 Konga 式商户之外测试第二条渠道，先从一家分销商或另一类平台商户群起步。
  hypothesis: 同一套发票绑定工作流，无需大改产品也能迁移过去。
  successMetric: 第二个客群拿到 5 个合格试点，至少 2 个转成按月复用。
  owner: 合作伙伴负责人
operations:
- 建立每日 BDC 基准价抓取和事后执行台账，让节省主张随时经得起审计。
- 结算一律走持牌 PSP 或财资伙伴，并把 KYC、限额、争议和付款确认的职责矩阵写清楚。
- 先用 CSV 和轻量发票接入起步，之后再做更深的 ERP 或平台 API 集成。
- 把交易规则、制裁控制和异常队列当成核心运营流程，而不是后台清理工作。
- 准备好伙伴切换和故障应急流程，别让商户在供应商到期日当天掉线。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责发票接入、基准价逻辑、商户看板以及第一版执行工作流集成。
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 在一个高度依赖信任的市场里，亲自抓伙伴销售、商户洞察和监管关系。
- role: 产品 / 合规负责人
  startTiming: 第 1 个月
  rationale: 把伙伴和商户的约束翻成审批规则、审计轨迹和可重复的入驻流程。
- role: 集成工程师
  startTiming: 第 3 个月
  rationale: 首批试点跑起来后，负责第二伙伴路由、商户数据导入和可靠性工具。
- role: 商户成功 / 运营
  startTiming: 第 6 个月
  rationale: 前 10–20 家商户活起来后，开始专人抓入驻质量、复用率和异常处理。
- role: 合作伙伴负责人
  startTiming: 第 9 个月
  rationale: 只有一条 PSP 路径和首个复用客群被验证后，才值得配专职渠道产能。
milestones:
- horizon: 0–12 个月
  items:
  - 签下一家持牌 PSP 分发伙伴，以及一家备用流动性或结算伙伴。
  - 上线审批模式 MVP，包含发票上传、基准价报表、执行回执和对账导出。
  - 入驻 20 家试点商户，其中至少 10 家转成按月复用。
  - 在前 100 笔已完成付款上，证明相对 BDC 采购的中位数净节省高于 2%。
  - 验证标准定价和可复制的伙伴主导入驻操作手册。
- horizon: 12–24 个月
  items:
  - 新增第二个商户或 PSP 渠道，以及多源路由。
  - 在电子、时尚和首批分销商账户中，做到 150–250 家活跃商户。
  - 为更大客户上线基于角色的审批、团队账户和更强的审计导出。
  - 在不重建核心发票绑定工作流的前提下，切入一个相邻的分销商客群。
- horizon: 24–36 个月
  items:
  - 做到约 900 家活跃商户和约 $144M 的年执行体量，与研究中的 SOM 案例一致。
  - 只有在尼日利亚复用经济性站稳后，才依托现有伙伴通道扩到另一条非洲走廊。
  - 为高体量账户增加敞口预测和由伙伴发行的对冲或远期产品。
  - 拿下平台或财资白标分发协议，继续放大渠道杠杆。
risks:
- risk: KongaPay 或其他持牌伙伴可能拒绝嵌入式编排，或提出会打穿 SMB 模型的经济条件。
  likelihood: High
  impact: High
  mitigation: 先从审批模式起步，至少拿下一条备用 PSP 路径，并在放大商户获客前先把伙伴分成条款测清楚。
- risk: 一旦把所有费用都算进去，相比 BDC 采购的真实节省可能比研究显示的小得多，也不够稳定。
  likelihood: Medium
  impact: High
  mitigation: 每笔试点付款都跟同日替代方案做基准对比，先盯最痛的票面大小；若节省低于阈值，就改定价或换细分。
- risk: 过度依赖单一早期流动性提供方，可能带来故障、定价压力或结算证据不足。
  likelihood: Medium
  impact: High
  mitigation: 尽早把多源路由层搭起来，并要求每条伙伴路径都给出报价、成交和结算日志。
- risk: 商户创始人可能不信任自动化，或无法稳定维护发票数据，导致复用率起不来。
  likelihood: Medium
  impact: Medium
  mitigation: 首版保留人工审批、CSV 上传和清晰的基准价报表，同时由商户成功团队帮助复用用户养成习惯。
- risk: 通用 FX 或平台现有厂商可能在公司建立数据护城河前，就把足够的财资功能打包进去，抹平切口。
  likelihood: Medium
  impact: Medium
  mitigation: 尽快往发票绑定工作流深度、审批历史和伙伴嵌入式分发上冲，而不是做一个泛化的多币种钱包。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道，应该用来养一支 5-7 人团队、打通一条持牌 PSP 集成加一条备用流动性路径，搭好审批模式执行所需的合规与审计栈，并完成足够多的商户入驻，验证复用率、伙伴经济模型和第二条渠道，再去拿 seed。
