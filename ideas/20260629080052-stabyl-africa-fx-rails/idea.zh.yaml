differentiator: 普通多币种钱包只给一个平面 FX 价格，不给执行判断。本产品直接连到 CLOB 流动性，能把实时、透明的汇率基准和按进口付款流程定制的算法执行时点一起交付给商户。Konga 的分发合作先给了商户信任和一条现成的高频 USD 买家管道；而 CLOB 接入又带来成本优势——没有同等基础设施，BDC 和非正式黄牛根本抄不了。
