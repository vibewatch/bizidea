  - KongaPay，负责奈拉结算与商户分发。
  - 尼日利亚商业银行，负责奈拉托管和 CBN 报告。
  costStructure:
  - 负责 CLOB 接入和看板的工程与产品团队。
  - 监管合规和 CBN 牌照费用。
  - 通过行业协会合作与数字营销获取客户。
  - FX 流动性提供方 API 和结算费用。
jobsToBeDone:
- job: 当一张供应商发票 7 天后到期时，帮尼日利亚进口商现在就锁定一个公平的 USD 汇率，别让付款前一天的 BDC 汇率跳涨再吃掉 10% 成本。
  currentAlternative: 在 WhatsApp 群里盯 BDC 市场，外加每天给非正式 FX 黄牛打电话。
  successMetric: 每笔交易相对当时 BDC 基准价省下多少 FX 成本，用百分比衡量。
- job: 做年终账时，帮尼日利亚进口商把所有 FX 交易按准确汇率和费用对齐，好让他们不用再手工补账就能报税。
  currentAlternative: 靠 BDC 纸质收据手工填表，常常既不完整也不准确。
  successMetric: 生成完整 FX 对账报告的时间，从几天压到 10 分钟以内。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Stabyl 融资 $2.7M，Konga 既领投又做首个实时结算伙伴，这是很强、而且具名的验证信号；但窗口期内只有一个来源，所以分数上限是 4。
  painIntensity:
    score: 5
    rationale: 尼日利亚进口商每次给供应商付款都要多付 5–15% 的 FX 溢价，这在非洲电商和贸易里属于最尖锐、也最好量化的运营成本之一。
  wedgeClarity:
    score: 4
    rationale: Konga 商户群 + KongaPay 集成，给出了一个具体、可执行的分发切口，而且首个伙伴已经点名；CBN 牌照复杂度让首收路径略窄。
  defensibility:
    score: 3
    rationale: 汇率透明工具本身并不难抄，真正的可防守性要看 Konga 合作是否独占、CLOB 数据是否越积越厚，以及嵌入式财资工作流能否随着时间变得难替换。
  ventureScale:
    score: 4
    rationale: 尼日利亚每年进口约 $30B；其中电商进口商对应的 FX 流量大约在 $2-5B；再往肯尼亚和加纳通道扩，通往 $500M+ 收入机会的路径是清楚的。
topRisks:
- name: CBN 监管摩擦
  description: 尼日利亚央行可能会延迟或限制面向零售进口商、接入 CLOB 的 FX 执行产品发牌，从而把 GTM 往后拖 12–24 个月。
  mitigation: 首版先做 FX 汇率建议看板，结算通过 KongaPay 现有的 CBN 牌照走；与此同时并行申请独立 PSSP 牌照。
- name: Stabyl 基础设施依赖
  description: 产品底层只押一个 pre-seed 阶段的 CLOB 提供方，一旦 Stabyl 扩不起来、转向或调整 API 定价，就会出现集中度风险。
  mitigation: 从第一天起就把多源汇率聚合层搭好，除 Stabyl 外再接 AZA Finance 等其他非洲 FX 流动性提供方，避免被单一供应商锁死。
- name: 现有渠道阻力
  description: 如果 CLOB 驱动的竞争加速，BDC 运营商和商业银行 FX 柜台可能会游说 CBN，限制非银行玩家获得程序化 FX 接入。
  mitigation: 尽早和监管建立关系，把产品包装成一个提升透明度和 AML 合规的工具，让 CBN 能实时看到 SME FX 流向，把监管要求反过来变成结构性护城河。
