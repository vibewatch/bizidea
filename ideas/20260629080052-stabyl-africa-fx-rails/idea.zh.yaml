problem: 尼日利亚电商进口商每次给供应商付款，需要从 BDC 或非正式 WhatsApp FX 黄牛那里买 USD，通常都要比中间价多付 5–15%。他们看不到自己拿到的汇率到底公不公平，也没有工具去管理尚未结清的进口流水线里的 FX 敞口，更谈不上在 CLOB 汇率开始可用后聪明地选择换汇时点。随着 Stabyl 这类平台把程序化 FX 接入带出来，瓶颈已经不再是能不能换到汇，而是怎么执行——进口商真正需要的是预算与自动执行层，不只是一个银行账户。
targetUser:
  primary: 在尼日利亚做跨境进口的电商商户，从中国或阿联酋进消费品，通过 KongaPay 或 Paystack 收奈拉，每年要支付 $50K–$1M 的 USD 供应商发票。
  secondary: 尼日利亚 FMCG 进口商或分销商的财务经理，手里有可预测的月度 USD 应付款。
  buyer: 尼日利亚中小进口商的创始人或 CFO，或 Konga 这类平台的商户金融负责人。
startupThesis:
  nonObviousInsight: 尼日利亚进口商真正的瓶颈不是拿不到 FX，而是缺少 FX 执行判断。等 Stabyl 这类通道把 CLOB 流动性送到前台后，谁先把程序化汇率能力做成非专业进口商也能用的预算自动驾驶，谁就能拿走底层基础设施释放出来的大头价值。
  beachhead: Konga 上做电子和时尚品类的尼日利亚线上商户，从中国供应商进货，每年经 BDC 或非正式渠道支付 $50K–$500K 的 USD 供应商款。
  wedge: 一个汇率透明度看板——实时展示 CLOB 汇率与 BDC 点差对比，并通过 KongaPay 把一键 USD 预充值执行路由到当下最优价格。
  whyNowCatalyst: 2026 年 6 月 Stabyl 的 $2.7M 融资和 KongaPay 集成，让尼日利亚商户平台第一次拿到可编程的 CLOB 汇率数据流，自动执行工具因此第一次变得可行。
  ventureScalePath: 先从汇率执行切到完整 FX 财资管理——敞口跟踪、自动对冲、远期合约——覆盖尼日利亚进口商，再扩到肯尼亚和加纳通道，最终成为非洲 SME 贸易金融的 FX 操作系统。
solution: 一个 FX 预算自动驾驶，接入尼日利亚进口商现有的 Konga 商户账户和供应商开票流程，对比实时 CLOB 汇率、BDC 和平行市场基准，并在汇率打到商户设定目标或供应商付款期限临近时，自动执行 USD 换汇。产品会跟踪未结进口订单及其 USD 敞口，提醒商户抓住合适的汇率窗口，并生成可直接报税的 FX 交易报告。商户只要花 2 分钟设定目标汇率和付款时间线；自动驾驶就能把执行点差压到 1% 以下，而 BDC 通常要收 5–15%。
goToMarketSeed:
  firstCustomer: Konga 平台卖家，从 Alibaba 供应商进口 500–2,000 个 SKU 的消费电子或时尚品类，每年通过 WhatsApp BDC 或非正式黄牛支付 $100K–$500K 的 USD 发票。
  buyingTrigger: 奈拉突然贬值，或 BDC 汇率意外拉高，让一笔供应商付款比预算贵出 15% 以上，迫使商户立刻去找更可预测的替代方案。
  currentAlternative: 主要还是靠 BDC 和非正式 WhatsApp FX 黄牛，偶尔才去商业银行 FX 柜台排队，拿到的还是价格不透明、要多天结算的报价。
  switchingReason: 把执行点差从 5–15% 的 BDC 成本压到 1% 以下，同时用自动化汇率监控替代全天盯盘。
  pricingHypothesis: 每笔 USD 换汇收 0.5% 执行费，外加 $99/月 SaaS 订阅，用于看板、汇率提醒和 FX 费用报告。
