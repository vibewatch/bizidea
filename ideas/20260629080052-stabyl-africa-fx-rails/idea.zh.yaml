businessModelCanvas:
  customerSegments:
  - Konga、Jumia 上做电子、时尚和 FMCG 的尼日利亚 SME 电商进口商
  - 每月都有重复性 USD 应付款的尼日利亚 FMCG 进口商和分销商
  valuePropositions:
  - FX 执行点差压到 1% 以下，对比 BDC 市场常见 5–15%。
  - 自动盯汇与自动执行，替代人工管 FX。
  - 可直接报税的 FX 交易报告，以及进口流水线敞口跟踪。
  channels:
  - 通过白标嵌入接入 KongaPay 商户看板。
  - 借助 CACCI、NACCIMA 等尼日利亚进口商行业协会直达客户。
  - 靠 SEO 和金融科技社群内容做线上自助注册。
  customerRelationships:
  - 基于现有 Konga 商户账户的自助入驻。
  - 对年处理额超过 $250K 的高体量账户配专属成功经理。
