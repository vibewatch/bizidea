  - 尼日利亚 CBN 的 PSSP 金融科技牌照。
  - Konga / KongaPay 分发合作协议。
  keyActivities:
  - 开发 CLOB 汇率聚合与自动执行算法。
  - 搭建商户看板并接入 KongaPay API。
