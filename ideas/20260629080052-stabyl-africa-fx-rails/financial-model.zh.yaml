scenarios:
  downside:
    description: 伙伴渠道晚 6 个月才打通；Y2 之前签不下第二家 PSP；公司把团队压到 8 名 FTE 以保住 pre-seed 现金；到 Y3 末也只靠直销做到 250 家客户。
    y3RevenueK: 242.0
    y3EbitdaK: -1050.0
    cashLowPointK: 480.0
    keyAssumptionChanges:
    - 伙伴渠道延后 6 个月；Y3 客户数砍到约 250 家（基准为 900）。
    - 在只能直销的模式下 CAC 升至 $4k；S&M 支出约为基准的 2 倍。
    - 团队人数封顶 8 名 FTE 以保住 pre-seed；在复用率没跑出来前，Seed 不起。
  base:
    description: M3 签下 KongaPay；Y1 末 50 家、Y2 末 250 家、Y3 末 900 家活跃商户；Q2Y2 融 $6M Seed；团队扩到 13 名 FTE；混合 ARPU 为 $163/月、毛利率 70%。
    y3RevenueK: 1127.2
    y3EbitdaK: -1276.0
    cashLowPointK: 1609.3
    keyAssumptionChanges:
    - M3 起有 1 家 PSP 伙伴在跑；M9 前补上备用流动性伙伴；稳态 CAC 为 $1.8k。
    - Y1 末 50 家商户、Y2 末 250 家、Y3 末 900 家；月流失率 2%。
    - Q2Y2（约 M15）融到 $6M Seed；3 年里团队从 6 名扩到 13 名 FTE。
  upside:
    description: 到 Q2Y2 签下 2 家 PSP；转介绍漏斗开始滚雪球，Y3 末做到 1,200 家商户；随着商户应付款体量变大，ARPU 上升；发票绑定工作流越用越黏，月流失率降到 1%。
    y3RevenueK: 1921.0
    y3EbitdaK: -1155.0
    cashLowPointK: 1600.0
    keyAssumptionChanges:
    - Q1Y2 起有 2 家 PSP 伙伴在跑；滚雪球式转介绍到 Y3 末带来 1,200 家商户。
    - 随着平均商户年应付款升至 $200k+，ARPU 提升到 $195/月。
    - 发票绑定审批工作流形成习惯后，月流失率降到 1%。
sensitivity:
- variable: ARPU
  downsideCase: 执行费降到 0.3%（合规摩擦 / 伙伴费挤压）；ARPU 降至 $141/月。
  baseCase: 0.5% 执行费 + $99/月订阅；ARPU = $163/月。
  upsideCase: 商户应付款均值升至 $200k/年；ARPU 提升到 $199/月。
  y3RevenueImpactK: -152.0
  cashImpactK: -152.0
- variable: 客户流失率
  downsideCase: 月流失 3.5%（SME 经营不稳、发票流程纪律不足）；平均客户生命周期 29 个月。
  baseCase: 月流失 2.0%；平均客户生命周期 50 个月。
  upsideCase: 月流失 1.0%（发票截止日工作流黏性很强）；平均客户生命周期 100 个月。
  y3RevenueImpactK: -338.0
  cashImpactK: -338.0
- variable: CAC
  downsideCase: 伙伴渠道不可用；只能直销，CAC 升到 $4k；3 年累计 S&M 支出多出 $360k。
  baseCase: $1.8k 的稳态 CAC，主要来自嵌入 KongaPay 的转介绍和联合销售。
  upsideCase: PSP 伙伴用体量分成补贴获客，CAC 降到 $1.2k。
  y3RevenueImpactK: 0.0
  cashImpactK: -360.0
- variable: 毛利率
  downsideCase: 毛利率只有 55%（伙伴分成和稳定币通道费高于建模值）。
  baseCase: 按 BP 目标保持 70% 毛利率；30% COGS = 伙伴费用 + 合规工具。
  upsideCase: 在商户数超过 250 后，伙伴通道拿到量大折扣，毛利率提升到 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -169.0
- variable: 销售周期
  downsideCase: 试点到付费要 90 天（KYC / 监管拖慢节奏）；客户爬坡速度约慢 2 倍。
  baseCase: 试点到付费约 45 天；伙伴转介绍到完成入驻的转化率按 BP funnelTargets 维持在 30%+。
  upsideCase: 伙伴预筛客户后，周期压到 30 天；转化率提升到 40%+。
  y3RevenueImpactK: -338.0
  cashImpactK: -338.0
- variable: 伙伴可用性
  downsideCase: KongaPay 拒绝开放嵌入式编排；产品被迫退回到只给建议 + 人工执行。
  baseCase: KongaPay 在 M3 前开放审批模式执行编排权限。
  upsideCase: 到 M6，2 家 PSP 都开放完整的规则式自动执行权限；Y3 再打开第二条非洲通道。
  y3RevenueImpactK: -814.0
  cashImpactK: -814.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Partner[PSP Partner\nKongaPay] -->|refers merchants| Leads[Merchant Leads]
      Leads -->|30% pilot convert| Pilots[Pilot Merchants]
      Pilots -->|60% first payment| Active[Active Merchants]
      Active --> Sub[Subscription\n$99 per month]
      Active --> Fee[Execution Fee\n0.5% of FX volume]
      Sub --> Revenue[Total Revenue]
      Fee --> Revenue
      Revenue -->|30% COGS\npartner and rail fees| COGS[Cost of Revenue]
      Revenue -->|70% gross margin| GrossProfit[Gross Profit]
      GrossProfit --> Cash[Operating Cash]
      Active -->|2% per month churn| Lost[Churned Merchants]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入引擎，是 900 家商户按月反复执行 USD 供应商付款，混合 ARPU 为 $163/月（平均年应付款 $155k 上 0.5% 执行费，再加 $99 订阅）；这些客户几乎都来自嵌入 KongaPay 的伙伴渠道，因此稳态 CAC 才能压到 $1.8k，回本约 16 个月。
- checkName: 必须做对的事
  finding: KongaPay 或同类持牌 PSP 必须在 M3 前开放嵌入式审批模式执行编排；没有伙伴分发，CAC 和入驻周期都会膨胀到足以在完成 30 家商户复用证明前烧光 $3M pre-seed 的程度。
- checkName: 模型会失效，如果……
  finding: 如果稳态月流失率超过 3.5%，或伙伴执行费把毛利率压到 55% 以下，模型就会塌：LTV/CAC 会跌破 2.0x，Q2Y2 融 $6M Seed 的单位经济模型论点也站不住。
- checkName: 下一轮融资证明
  finding: Q2Y2 融 $6M Seed 的依据，是敏感性表显示：只要活跃商户超过 100 家、中位数净节省大于 2%、90 天复用率超过 70%，且 M18 月烧钱低于 $120k，6 个基准假设都还成立，并且融资前至少还留有 $1.6M 现金缓冲。
sanityChecks:
  ruleOf40: Y3 收入增速 297%（从 $284k 到 $1,127k）+ EBITDA 利润率 -113% = +184；在这个高速增长、尚未盈利的阶段，这个指标参考意义不大，因此只标记为早期、增长优先。
  burnMultiple: Y3 净烧钱 $1,276k，除以 Y3 增量收入 $843k，烧钱倍数为 1.5x；对仍在搭伙伴渠道的成长期金融科技公司来说，1-2x 还在可接受区间；若落入下行情景，数值会恶化到 4.0x。
  revenuePerFte: $1,127k 的 Y3 年收入除以 13 名 FTE，得到每 FTE $87k；明显低于 $200-400k 的 SaaS 基准，但在尚未盈利的扩张期属于可预期；若 900 家商户的稳态年化运行率达到 $1.76M，同时核心团队收在 10 名 FTE，预计每 FTE 可到约 $180k。
  flags:
  - 单一 PSP 依赖：如果 KongaPay 不开放嵌入式编排，整个客户爬坡都会塌掉；不再额外多烧 24+ 个月、且把直销 CAC 提到 2 倍以上，$1.8M 的 SOM 年化运行率根本达不到。
  - $6M Seed 在 Q2Y2 落地只是建模假设，不是已承诺的投资意向书；如果种子前轮现金跌到 $1.6M 以下前还融不到钱，Y2-Y3 的团队编制计划必须砍掉约 40%，Y3 收入也会掉到下行情景。
  - Y3 年收入 $1,127k 代表的是爬坡期全年收入；商业计划里的 $1.8M SOM 是 Y3 末做到 900 家商户时的年化运行率，因此如果按自然年收入看，两者会显得不一致。
  - 每 FTE 收入 $87k 低于 SaaS 基准；公司在收入前面先投人是合理的 pre-seed 动作，但也意味着 Seed 投资人要接受未来两年继续负 EBITDA，直到每 FTE 稳态超过 $200k。
  - 2% 的月流失假设，前提是商户有规律、流程纪律够强的发票工作流；如果这批 SME 更机会主义，或奈拉波动明显缓和，月流失可能升到 4-5%，LTV 会减半，$1.8k CAC 目标下的 LTV/CAC 也就站不住了。
