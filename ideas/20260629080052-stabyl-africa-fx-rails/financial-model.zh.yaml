slug: africa-importer-fx-autopilot
date: '2026-06-29'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 第 1 个月起始付费客户数
  value: '0'
  unit: count
  source: '[BP exec summary] MVP 尚未上线，且 M1 起点时 PSP 伙伴协议还没签。'
- id: A2
  name: 混合月 ARPU
  value: '163'
  unit: USD/month
  source: '[BP pricing] $99/月订阅 + 0.5% 执行费；按年均 $155k 应付款 / 12 个月，执行费约 $64.6/月，总计 $163.6，取整为 $163。'
- id: A3
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct = 70] COGS 包含伙伴结算分成（约占收入 15-20%）和可变合规 / 基础设施工具（约占 10%）；与研究里 2-3% 收益率对 8-12% BDC 点差仍有毛利空间的判断一致。'
- id: A4
  name: 第 1 年末活跃付费商户数
  value: '50'
  unit: count
  source: '[BP 12-month milestone] 对应“把 30-50 家商户转成按月复用”的里程碑，这里取区间上沿；默认伙伴渠道在 M3 上线。'
- id: A5
  name: 第 2 年末活跃付费商户数
  value: '250'
  unit: count
  source: '[BP 12-24 month milestone] 对应“做到 150-250 家活跃商户”，这里取上沿，并假设到 Y2 已有两条 PSP 渠道在跑。'
- id: A6
  name: 第 3 年末活跃付费商户数
  value: '900'
  unit: count
  source: '[BP 24-36 month milestone / research SOM] 对应“约 900 家活跃商户和约 $144M 年执行体量”。'
- id: A7
  name: 月度客户流失率
  value: '2.0'
  unit: percent/month
  source: '[Finance heuristic: Africa SME fintech B2B workflow] 面向发票工作流的经常性软件，常见区间是每月 2-3%（年化约 24-36%）；这里取 2%，因为工作流一旦用上会比较黏；净新增节奏已把新增客户抵消自然流失的效果算进去了。'
- id: A8
  name: 第 1 年全成本单个 FTE 均价
  value: '100000'
  unit: USD/year
  source: '[Finance heuristic] 角色组合里既有拉各斯本地岗位（底薪 $60-80k），也有远程 / 高级岗位（$90-120k）；再加 20% 福利和工资税负；与 BP 中 Y1 末 6 人团队相符。'
- id: A9
  name: 第 2 年全成本单个 FTE 均价
  value: '110000'
  unit: USD/year
  source: '[Finance heuristic] 更高级的工程和合作岗位抬高均价；相对 Y1 上浮 10%，反映经验溢价和规模化。'
- id: A10
  name: 第 3 年全成本单个 FTE 均价
  value: '120000'
  unit: USD/year
  source: '[Finance heuristic] 公司继续往更资深的人才结构走；相对 Y2 再上浮 9%。'
- id: A11
  name: Pre-seed 融资额
  value: '3000000'
  unit: USD
  source: '[BP fundingAsk] targetFundingRangeUsd = $2-4M；基准情景取 $3M，可覆盖 18 个月运营跑道，并在 M12 约 $88k/月烧钱水平上再留 6 个月缓冲。'
- id: A12
  name: 预期 Seed 融资额（按现金流入建模）
  value: '6000000'
  unit: USD
  source: '[Finance heuristic] 2024-2026 年尼日利亚金融科技公司的 Seed 轮多在 $3-8M；这里取中位的 $6M，落在 Q2Y2（约 M15），前提是 90 天复用率被证明且 PSP 伙伴签下；这不属于当前 pre-seed fundingAsk。'
- id: A13
  name: 稳态伙伴渠道 CAC
  value: '1800'
  unit: USD
  source: '[BP investorMemo] 对应“单一伙伴渠道足以把获客效率打到适配约 $1.6k-$3.7k 年商户收入画像的水平”；按基准 ARPU 和 70% 毛利，$1.8k CAC 对应约 16 个月回本。'
- id: A14
  name: 月度非薪酬 G&A（法务、合规、行政）
  value: 15000-28000
  unit: USD/month
  source: '[Finance heuristic: Nigeria fintech] AML/KYC 合规栈、PSP 法务协议和本地会计每月约 $15-25k；M6 之后随着商户体量和伙伴义务上升，抬到 $28k/月。'
- id: A15
  name: 月度非薪酬 R&D（云、API、合规工具）
  value: '7000'
  unit: USD/month
  source: '[Finance heuristic] 从 M3 起，主要是云基础设施、稳定币 / 代发 API 接入费和审批工作流工具；M1-M2 做 MVP 时开销最低。'
- id: A16
  name: 收入确认口径
  value: 每月按 BOM 与 EOP 客户数均值乘以 ARPU 确认
  unit: convention
  source: '[Finance heuristic] 采用标准的 SaaS 期中确认口径；对早月净新增客户群的收入略有高估，但在绝对体量还小时影响不大。'
- id: A17
  name: COGS 比率
  value: '30'
  unit: percent of revenue
  source: '[BP businessModel.targetGrossMarginPct = 70] COGS = 100% - 70% = 30%；包含伙伴结算分成、稳定币 / 出金通道费，以及与执行体量成比例的可变合规工具费用。'
- id: A18
  name: 第 9 个月合作伙伴负责人带来的 S&M 台阶上升
  value: 从 M9 起，薪资 $7.5k/月 + 市场预算 $12k/月
  unit: USD/month
  source: '[BP team] 对应“合作伙伴负责人第 9 个月入职；只有一条 PSP 路径和首个复用客群被验证后才配专职渠道能力”；因此月度 S&M 从 $18k 抬到 $30k。'
- id: A19
  name: 第 2 年 OpEx 季度爬坡
  value: 每季度 285k / 320k / 405k / 460k
  unit: K USD/quarter
  source: '[Finance heuristic] 把团队从 Y1 末 6 名 FTE 平滑拉到 Y2 末 11 名；Q3Y2 的台阶上升反映 $6M Seed 后扩编；非薪酬 overhead 从 $33k/月拉到 $53k/月。'
- id: A20
  name: 第 3 年 OpEx 季度爬坡
  value: 每季度 460k / 500k / 545k / 560k
  unit: K USD/quarter
  source: '[Finance heuristic] Y3 开始时 11 名 FTE，Q3Y3 增至 13 名；增长节奏刻意收着走，好让 burn multiple 保持在 2.0x 以下，同时收入继续提速。'
