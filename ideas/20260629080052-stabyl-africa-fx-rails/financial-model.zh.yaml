  amountM: 3.0
  runwayMonths: 18
  milestone: 签下一家持牌 PSP 分发伙伴和一家备用流动性伙伴；上线带发票上传、基准价报表和执行回执的审批模式 MVP；拿下 30 家活跃商户，其中至少 70% 在 90 天内复用，且相对 BDC 采购的中位数净节省高于 2%，以便在 Seed 前验证伙伴主导获客的单位经济模型。
