competitors:
- name: Verto
  stage: scale-up
  wedge: 非洲优先的 B2B FX 与财资平台，覆盖供应商付款场景，且在非洲货币上的覆盖力很强。
  pricing: 定制定价 / 报价制；官网没有公开自助价目表。
  strength: FX 透明度叙事强、非洲财资定位明确，并且直接覆盖供应商付款工作流。
  weaknessVsUs: 它更像广义财资平台，而不是把报价与发票截止日、库存计划绑在一起的 平台嵌入式进口商自动驾驶。
  sourceRefs:
  - 67
  - 74
  - 79
- name: Fincra
  stage: scale-up
  wedge: 面向线上企业的非洲支付 API、虚拟账户和代发基础设施。
  pricing: 按产品需求、交易量、市场和风险画像定制定价。
  strength: 在尼日利亚 / 非洲的收款栈和虚拟账户基础设施很实用，离商户现金流也更近。
  weaknessVsUs: 底层管道很好，但在 FX 时点判断和进口商预算自动化上的公开定位明显更弱。
  sourceRefs:
  - 53
  - 58
- name: Yellow Card
  stage: scale-up
  wedge: 持牌稳定币基础设施、财资服务和 API 通道，覆盖非洲及其他新兴市场。
  pricing: 企业版 / 联系销售；没有公开标准费率。
  strength: 合规姿态强、本地货币覆盖广，并明确支持稳定币驱动的发票付款和代发。
  weaknessVsUs: 它首先是基础设施提供方，而不是一个尼日利亚优先、围绕目标汇率、到期日逻辑和 BDC 基准报表的进口商 UX。
  sourceRefs:
  - 36
  - 39
  - 40
  - 49
- name: Nium
  stage: incumbent
  wedge: 覆盖全球的代发和 FX 基础设施，具备企业级覆盖、24 小时锁价和大通道能力。
  pricing: 企业定制定价；没有公开自助费率卡。
  strength: 覆盖 190+ 国家代发、125+ 币种 FX，并与 Circle、Visa 相关的稳定币结算形成强伙伴背书。
  weaknessVsUs: 它优化的是平台和跨国企业，而不是尼日利亚优先的进口商工作流设计，或 BDC 对 CLOB 的决策支持。
  sourceRefs:
  - 99
  - 100
  - 104
- name: dLocal
  stage: incumbent
  wedge: 一套 API 打通新兴市场支付编排，如今又通过 AZA Finance 深入非洲稳定币和 OTC FX。
  pricing: 企业定制定价 / 联系销售。
  strength: 平台覆盖广、稳定币编排能力强，并通过 AZA 进一步补深了非洲财资能力。
  weaknessVsUs: 它更像企业扩张平台，而不是围绕尼日利亚商户现金周期设计的 SME 进口商执行副驾。
  sourceRefs:
  - 95
  - 96
regulatoryTechnicalConstraints:
- point: 结算大概率必须走持牌 PSP 或财资伙伴，而 AML/KYC 与带规则的审计轨迹必须从第一天起就算核心产品能力。
  sourceRefs:
  - 24
  - 25
  - 43
  - 159
- point: 执行质量取决于能否拿到可 API 化的汇率来源，以及能把指示性报价真正推进到确认结算的钱包 / 代发基础设施。
  sourceRefs:
  - 39
  - 67
  - 104
  - 152
- point: 任何自动驾驶都得把发票、锁价、代发状态和本地货币到账确认，在多条通道之间对齐起来。
  sourceRefs:
  - 49
  - 95
  - 99
  - 114
validationSignals:
- point: Stabyl 的 $2.7M pre-seed 和由 Konga 牵头的首个结算合作，说明可编程的非洲 FX 采购正在从概念走向部署。
  sourceRefs:
  - 152
- point: Visa 与 Yellow Card 的合作，说明全球主要支付网络把非洲稳定币结算视为战略方向，而非实验项目。
  sourceRefs:
  - 118
  - 153
- point: Nium / Circle 和 dLocal 的稳定币产品上线，说明现有厂商现在就已经在把稳定币到本地代发和财资编排产品化。
  sourceRefs:
  - 95
  - 104
  - 114
- point: Jumia 和 Konga 已经拥有面向商户的分发表面，完全可以承载 FX 自动驾驶工作流，而不必先教育商户切到一套新操作系统。
  sourceRefs:
  - 11
  - 12
  - 17
  - 20
openQuestions:
- KongaPay 或其他持牌 PSP，会不会允许第三方编排商户 FX 执行，而不只是提供人工结算支持？
- 在扣掉伙伴费和合规费后，$10k-$100k 的供应商付款票面，相比 BDC / 人工采购到底能拿到多大的真实点差优势？
- 有多少尼日利亚线上进口商每月重复性 USD 应付款超过 $50k，而且流程纪律足够支撑目标汇率自动化？
- Stabyl 或同类伙伴，能不能提供稳定可靠的可执行汇率和事后证据，而不只是指示性报价数据流？
