      sourceRefs:
      - 1
      - 33
      - 79
      - 99
      - 154
    competitiveRivalry:
      score: 4
      rationale: 竞争很激烈，因为大量玩家都在往非洲财资和稳定币结算收敛，哪怕真正盯进口商执行自动化的还不多。
      sourceRefs:
      - 39
      - 67
      - 95
      - 99
      - 153
  pestle:
  - factor: political
    impact: negative
    point: 尼日利亚的 FX 与支付政策可能突然变向，这会抬高一个面向商户的 FX 产品的合规负担和伙伴依赖。
    sourceRefs:
    - 1
    - 159
    - 43
  - factor: economic
    impact: positive
    point: 奈拉波动和昂贵的跨境资金流转，让任何能减少点差流失和付款不确定性的工具都更显得紧迫。
    sourceRefs:
    - 7
    - 154
    - 163
  - factor: social
    impact: positive
    point: 尼日利亚在现金短缺后进一步转向数字支付，提升了市场对非现金工作流的接受度，也降低了财资软件的行为门槛。
    sourceRefs:
    - 33
    - 20
  - factor: technological
    impact: positive
    point: 稳定币结算、本地代发 API 和多币种财资工具已经足够成熟，创业公司无需自建底层通道，也能叠出执行层。
    sourceRefs:
    - 39
    - 95
    - 104
    - 114
  - factor: legal
    impact: negative
    point: AML/KYC、稳定币政策模糊地带和结算路由要求，意味着公司必须把伙伴职责和审计证据写得非常明白。
    sourceRefs:
    - 24
    - 43
    - 159
  adoptionFrictionMatrix:
  - friction: 商户是否信任自动执行 FX 采购
    severity: high
    affectedBuyer: 进口商创始人 / CFO
    mitigation: 先做提醒 + 审批模式，清楚展示基准价与实际执行价的对比，并在开放全自动前先把事后审计轨迹做全。
    sourceRefs:
    - 49
    - 67
    - 100
  - friction: 持牌伙伴与合规审批
    severity: high
    affectedBuyer: 平台伙伴 / 合规负责人
    mitigation: 结算统一走现有持牌 PSP 或财资伙伴，并把规则、限额和 KYC 状态都做成一等产品对象。
    sourceRefs:
    - 12
    - 24
    - 43
    - 159
  - friction: 需要预充值或维持多币种余额
    severity: medium
    affectedBuyer: 财务经理
    mitigation: 支持分阶段目标、基于钱包的批量执行和发票绑定建议，而不是强迫客户长期满仓预充值。
    sourceRefs:
    - 40
    - 53
    - 99
  - friction: 要把发票、物流和商户数据接进来
    severity: medium
    affectedBuyer: 运营 / 平台负责人
    mitigation: 先用 CSV 或轻量 API 吃供应商发票和库存截止日，等试点把 ROI 跑出来后，再加深平台嵌入。
    sourceRefs:
    - 11
    - 20
    - 79
market:
  tam:
    value: $39.3M
    rationale: 按 20,000 家活跃进口商、每家约 $155k 年均 USD 应付款建模，对应约 $3.1B 的可寻址年支付体量；再按 0.5% 执行费 + $99/月 SaaS 变现，得到约 $39.3M 的 TAM。这个体量只相当于尼日利亚 2024 年商品进口额的约 5%，拿来给线上消费品和 SME 分销商场景做交叉校验，算得上保守。
    isEstimate: true
    sourceRefs:
    - 2
    - 11
    - 17
    - 20
    - 164
  sam:
    value: $9.7M
    rationale: 假设第一阶段能触达的细分是 5,000 家商户，主要集中在平台驱动、且以拉各斯为核心的进口工作流里；按每家约 $150k 年应付款、沿用同一套变现模型，SAM 约为 $9.7M。
    isEstimate: true
    sourceRefs:
    - 11
    - 12
    - 17
