problem: >-
  Nigerian e-commerce importers pay 5–15% above mid-market rates for every USD they
  source from bureau de change operators or informal WhatsApp FX dealers to fund
  supplier payments. They have no visibility into whether they received a fair rate,
  no tools to plan FX exposure across an open import pipeline, and no way to time
  conversions intelligently as CLOB-sourced rates become available. As programmatic
  FX access emerges through platforms like Stabyl, the constraint shifts from access
  to execution intelligence — importers need a budgeting and auto-execution layer,
  not just a bank account.
targetUser:
  primary: "Nigerian e-commerce merchant importing consumer goods from China or the UAE, collecting naira via KongaPay or Paystack, and paying USD supplier invoices of $50K–$1M per year"
  secondary: "Finance manager at a Nigerian FMCG importer or distributor with predictable monthly USD payables"
  buyer: "Founder or CFO of a Nigerian SME importer, or Head of Merchant Finance at a platform like Konga"
startupThesis:
  nonObviousInsight: "The bottleneck for Nigerian importers is not FX access — it is FX execution intelligence. As CLOB-backed liquidity arrives via Stabyl-style rails, the first product to translate programmatic rate access into a simple budget autopilot for non-sophisticated importers will capture the lion's share of value created by the entire infrastructure layer below it."
  beachhead: "Nigerian online merchants on Konga importing electronics and fashion from Chinese suppliers, processing $50K–$500K per year in USD supplier payments through BDC operators or informal channels"
  wedge: "Rate transparency dashboard showing live CLOB rate versus BDC spread, with one-click USD pre-funding execution at the best available rate routed through KongaPay"
  whyNowCatalyst: "Stabyl's $2.7M raise and KongaPay integration in June 2026 create the first programmatic CLOB rate feed accessible to Nigerian merchant platforms, making auto-execution tools viable for the first time."
  ventureScalePath: "Expand from rate execution to full FX treasury management — exposure tracking, auto-hedging, forward contracts — across Nigerian importers, then extend to Kenya and Ghana corridors, ultimately becoming the FX operating system for African SME trade finance."
solution: >-
  An FX budget autopilot that connects to a Nigerian importer's existing Konga merchant
  account and supplier invoicing workflow, surfaces a live CLOB rate feed versus BDC
  and parallel market benchmarks, and auto-executes USD conversions when the rate hits
  a merchant-set target or a supplier payment deadline is approaching. The product
  tracks open import orders and their USD exposure, alerts merchants to rate windows,
  and generates tax-ready FX transaction reports. A merchant spends two minutes setting
  their rate target and payment timeline; the autopilot handles execution at sub-1%
  spread versus the 5-15% typically paid to BDC operators.
goToMarketSeed:
  firstCustomer: "Konga marketplace seller importing 500–2,000 SKUs of consumer electronics or fashion from Alibaba suppliers, paying $100K–$500K per year in USD invoices via WhatsApp BDC or informal dealers"
  buyingTrigger: "Naira devaluation spike or surprise BDC rate increase that makes a supplier payment 15%+ more expensive than budgeted, triggering urgency to find a predictable alternative"
  currentAlternative: "Bureau de change operators and informal WhatsApp FX dealers, with occasional use of commercial bank FX desk queues at opaque multi-day settlement rates"
  switchingReason: "Sub-1% execution spread versus 5–15% BDC cost, combined with automated rate monitoring that eliminates the need to watch the FX market manually throughout the trading day"
  pricingHypothesis: "0.5% execution fee per USD converted plus a $99/month SaaS fee for the dashboard, rate alerts, and FX expense reporting"
