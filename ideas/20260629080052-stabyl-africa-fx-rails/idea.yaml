topRisks:
  - name: "CBN regulatory friction"
    description: "The Central Bank of Nigeria may delay or restrict licensing for a CLOB-connected FX execution product targeting retail importers, creating a 12-24 month go-to-market gap."
    mitigation: "Structure the initial product as an FX rate advisory dashboard with settlement routed through KongaPay's existing CBN license, and apply for an independent PSSP license in parallel."
  - name: "Stabyl infrastructure dependency"
    description: "Building the product on a single pre-seed-stage CLOB provider creates concentration risk if Stabyl fails to scale, pivots, or changes API pricing terms."
    mitigation: "Design a multi-source rate aggregation layer from day one, integrating alternative African FX liquidity providers such as AZA Finance alongside Stabyl to avoid single-vendor lock-in."
  - name: "Incumbent channel resistance"
    description: "BDC operators and commercial bank FX desks may lobby the CBN to restrict programmatic FX access for non-bank players if CLOB-driven competition accelerates."
    mitigation: "Build regulator relationships early and frame the product as a transparency and AML compliance tool that gives the CBN real-time visibility into SME FX flows, converting regulation into a structural moat."
