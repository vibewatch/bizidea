slug: africa-importer-fx-autopilot
date: '2026-06-29'
executiveSummary: >-
  Stabyl's June 2026 raise and KongaPay settlement partnership suggest that
  programmatic FX rails for Nigerian merchants are becoming available, but the
  researched gap is still execution intelligence at the moment a merchant must
  fund a supplier invoice. The first customer should be a Konga marketplace
  importer of electronics or fashion with $100k-$500k in annual USD payables and
  no dedicated treasury team. The initial product should not try to become a new
  wallet, bank, or FX inventory provider; it should benchmark executable or
  partner-sourced rates against BDC pricing, recommend when to buy, and route
  approved execution through a licensed partner. This beachhead works because
  pain is recurring, the buying trigger is sharp, and partner distribution is
  likely necessary to make a low-ACV merchant model viable. The deliberate
  tradeoff is to start with alert-plus-approval mode and invoice-linked
  reporting, not autonomous multi-corridor trading, because partner permission,
  merchant trust, and auditability are the real gating risks. If pilots show
  more than 2% net savings versus BDC sourcing, repeat monthly usage after the
  first supplier payment, and reliable partner settlement evidence, the company
  can expand into distributors, more merchant platforms, and later treasury
  products such as exposure forecasting and partner-issued forwards. The main
  reasons to doubt are regulatory ambiguity, dependency on third-party liquidity
  and settlement rails, and the still-unverified size of the exact merchant
  cohort with disciplined recurring payables. Because those gaps are material,
  the first 18 months should buy partner access, compliance-aware workflow
  software, and merchant cohort proof rather than broad geographic expansion.
problem:
  - Nigerian importers with recurring supplier invoices often pay 5–15% above benchmark USD rates because they source FX through BDC operators, bank queues, or informal dealer networks at the last minute.
  - FX exposure lives in spreadsheets and chat threads, so a naira move or supplier deadline turns into budget misses, settlement delays, and weak audit trails.
solution:
  - Embed an invoice-linked FX dashboard inside a trusted merchant workflow that shows live benchmarked or executable rates versus BDC spreads, tracks open payables, and lets merchants set target rates or deadline rules.
  - Route approved USD purchases and supplier payments through licensed partners such as KongaPay plus multi-source liquidity providers, then return reconciliation and tax-ready reports.
whyWeWin:
  - The product sits at the merchant's decision moment rather than only at the money-movement layer, so it can turn partner rails into measurable savings and fewer missed supplier payments.
  - Partner distribution through Konga-like merchant ecosystems lowers trust and onboarding friction in a segment that would be expensive to win with pure direct sales.
  - Benchmark-versus-execution history, invoice-linked behavior data, and compliance-grade audit trails can compound into a routing and recommendation moat that horizontal FX vendors do not naturally collect.
strategicChoices:
  beachhead: Konga marketplace merchants importing electronics and fashion from China or the UAE with roughly $100k-$500k in annual USD supplier payments and no in-house treasury desk.
  wedgeRationale: >-
    This slice faces the same repeatable job every month, already lives inside a
    merchant platform, and feels FX volatility directly in landed margins. A
    broader launch across all Nigerian SMEs would slow proof because buyer
    workflows, volumes, and partner channels differ too much.
  sequencingRationale: >-
    Start with approval-mode software, invoice ingestion, and partner-routed
    execution so the company can prove savings and trust before asking merchants
    or regulators to accept full automation. Only after partner access, repeat
    usage, and low-touch onboarding are proven should the company add automatic
    rules, second channels, and new corridors.
  notYet:
    - Jumia, standalone webstores, and FMCG distributors before the Konga-style merchant workflow converts repeatedly.
    - Autonomous no-approval execution before post-trade audit trails and trust metrics are strong.
    - Proprietary balance-sheet lending or warehoused FX inventory.
    - Kenya and Ghana expansion before Nigeria unit economics work through one repeatable channel.
market:
  tam: Estimated $39.3M TAM based on 20,000 import-active merchants at roughly $155k annual USD payables and current pricing.
  sam: Estimated $9.7M SAM based on roughly 5,000 marketplace-led and Lagos-centric merchants reachable through partner channels.
  som: Estimated $1.8M year-three SOM assuming about 900 active merchants and roughly $144M annual executed volume.
  segments:
    - Nigerian marketplace importers with recurring USD supplier invoices.
    - Nigerian FMCG importers and distributors with predictable monthly payables.
  buyingProcess: >-
    The trigger is usually a supplier invoice deadline or a naira move that
    breaks the merchant's landed-cost budget. The founder or CFO can approve a
    pilot quickly if onboarding rides an existing PSP relationship, but partner
    compliance review and settlement permissions still gate production rollout.
product:
  mvp: >-
    An approval-mode FX workflow that accepts invoice CSV uploads or lightweight
    platform data, benchmarks partner rates against BDC pricing, recommends when
    to buy, and lets the merchant approve execution through a licensed settlement
    partner. The MVP must return execution receipts, benchmark deltas, and
    exportable reconciliation reports rather than promise fully autonomous
    trading from day one.
  sixMonth: >-
    Ship invoice upload, target-rate alerts, deadline-based recommendations,
    manual approval, execution receipt capture, and tax-ready FX reporting for
    the first 10-20 pilot merchants on one licensed partner path.
  twelveMonth: >-
    Add multi-source liquidity routing, merchant cohort analytics, recurring
    payment rules, and a second distribution or settlement partner while
    converting 30-50 merchants to repeat monthly usage.
  twentyFourMonth: >-
    Launch trusted rule-based auto-execution for repeat merchants, team accounts
    for larger distributors, and corridor expansion into one additional African
    market only if Nigeria repeat economics and partner reliability are proven.
  keyBets:
    - A licensed PSP will permit embedded orchestration and merchant-facing execution approval.
    - Typical $10k-$100k supplier-payment tickets will preserve meaningful after-fee savings versus BDC sourcing.
    - Merchants will reuse the workflow monthly after the first successful supplier payment.
    - One partner channel can make acquisition efficient enough for a roughly $1.6k-$3.7k annual merchant revenue profile.
gtm:
  wedge: KongaPay-embedded approval workflow for supplier invoices and USD pre-funding.
  channels:
    - Embedded distribution through KongaPay or a similar merchant PSP dashboard.
    - Founder-led outbound to high-volume Nigerian marketplace importers already making recurring USD supplier payments.
    - Co-sell with liquidity and treasury partners that benefit from recurring merchant volume on their rails.
  funnelTargets: "Partner-referred merchant→onboarded pilot 30%+, onboarded pilot→first executed supplier payment 60%+, first payment→90-day repeat usage 70%+, pilot→paid production 50%+."
  pricing: >-
    Start with the researched 0.5% execution fee plus $99 per month because the
    buyer already measures the pain as spread leakage and manual effort, not as
    seat-count software. Use standard pricing from the first one to two supplier
    payments in approval mode rather than a services-heavy enterprise pilot.
businessModel:
  revenueStreams:
    - 0.5% execution fee on completed USD conversions.
    - $99 per month subscription for rate alerts, exposure tracking, and FX reporting.
  unitOfValue: Recurring USD supplier-payment volume per active merchant account.
  targetGrossMarginPct: 70
  expansionLevers:
    - Capture a larger share of each merchant's monthly supplier-payable volume.
    - Add adjacent merchant channels and distributor cohorts without changing the core invoice workflow.
    - Upsell team approvals, audit exports, and partner dashboards to larger distributors and PSP accounts.
    - Introduce partner-issued hedging or forward products after recurring execution volume is established.
strategyMap:
  northStarMetric: Monthly USD supplier-payment volume executed for merchants with linked recurring invoice workflows.
  inputMetrics:
    - Partner-referred merchants activated within 14 days.
    - Median net savings versus same-day BDC benchmark.
    - Onboarded merchants completing a first supplier payment.
    - First-payment merchants repeating within 90 days.
    - Payments with complete post-trade audit evidence.
  moatsToBuild:
    - Historical dataset of quoted versus executed rates by ticket size, corridor, and deadline urgency.
    - Merchant-specific exposure graph linking invoices, suppliers, and execution behavior.
    - Embedded partner integrations and compliance rules that are costly to re-create.
    - Trust layer of benchmark reporting, approval logs, and settlement evidence.
  killCriteria:
    - No licensed PSP partner permits embedded execution approval or orchestration within 6 months.
    - Median net savings versus BDC or manual sourcing stays below 2% on the first 100 pilot payments.
    - Fewer than 30% of merchants who complete a first payment execute a second payment within 90 days.
    - Channel-referred pilot-to-paid conversion remains below 25% after the first 20 pilots.
  mermaid: |
    flowchart LR
      Wedge[Konga merchant wedge] --> MVP[Approval-mode invoice and FX MVP]
      MVP --> Proof[Net savings, repeat usage, settlement evidence]
      Proof --> Expansion[More merchants, more partners, broader treasury products]
investorMemo:
  verdict:
    call: Watch
    conviction: Real pain and a credible workflow wedge exist, but conviction stays below partner-meeting level until partner access and repeat merchant behavior are proven.
    whyBelieve: The startup attacks a measurable cost line item inside a specific importer workflow just as programmable partner rails become available.
    whyDoubt: The company depends on partner permissions and low-cost channel distribution in a segment with small merchant ACV and credible horizontal substitutes.
    nextDiligence: Obtain one live PSP distribution agreement plus pilot data showing net savings, repeat usage, and reliable settlement across at least 20 merchants.
  firstCustomer:
    title: Konga electronics or fashion importer
    profile: A Nigeria-based marketplace seller importing consumer goods from China or the UAE, paying roughly $100k-$500k per year in USD supplier invoices, and managing FX manually.
    trigger: A naira selloff or BDC spread spike hits while a supplier invoice or shipment deadline is due within days.
    buyer: Founder or CFO
    initialContract: 60-day pilot on the first one to two supplier payments, then conversion to $99 per month plus a 0.5% execution fee; at $100k-$500k annual volume that implies roughly $1.6k-$3.7k annual revenue per merchant before partner revenue share.
  mustBeTrue:
    - KongaPay or a similar licensed PSP will distribute or embed the workflow instead of forcing the startup into pure cold-start acquisition.
    - Net realized savings versus BDC or manual sourcing stay above 2% after partner fees on typical $10k-$100k tickets.
    - A meaningful cohort of merchants has recurring USD invoices and enough process discipline to set target-rate or deadline rules.
    - Merchants trust approval-mode recommendations quickly enough to repeat the workflow monthly without high-touch human dealing.
    - The same product can expand into distributors, more PSPs, and partner-issued treasury products before horizontal incumbents neutralize the wedge.
  diligenceQuestions:
    - What commercial and technical rights will KongaPay or another PSP actually grant a third-party orchestration layer?
    - What are the true net spreads versus BDC, bank desk, and direct stablecoin routes across common ticket sizes?
    - How many reachable Konga or Jumia sellers have more than $50k in recurring annual USD payables?
    - What revenue share, settlement liability, and compliance burden do partner rails impose?
    - Which merchant behaviors best predict repeat usage after the first successful supplier payment?
operatingAssumptions:
  - assumption: KongaPay or a similar PSP will permit embedded approval-mode orchestration before the startup has an independent license.
    basis: research.yaml
    validationTest: Secure sandbox or API access and one signed pilot agreement with documented partner responsibilities within 90 days.
    decisionImpact: If false, the product must start as an advisory dashboard or sell white-label into licensed partners instead of owning the merchant workflow directly.
  - assumption: The product can preserve more than 2% net savings versus BDC sourcing after partner and compliance fees.
    basis: idea.yaml
    validationTest: Benchmark at least 30 live quotes and completed pilot payments against same-day BDC rates across $10k-$100k tickets.
    decisionImpact: If false, pricing, ticket-size focus, or the merchant segment itself must change because the current value proposition weakens materially.
  - assumption: Partner-referred merchants can onboard and reach first payment without custom high-touch implementation.
    basis: research.yaml
    validationTest: Onboard 20 referred merchants and measure setup time, invoice-upload completion, and first-payment conversion using a standard playbook.
    decisionImpact: If false, the company should move upmarket toward larger distributors or platform accounts instead of scaling the SMB motion.
  - assumption: A backup liquidity or settlement provider can reduce dependence on Stabyl by month 12.
    basis: research.yaml
    validationTest: Integrate one alternative rate or settlement partner and complete 10 pilot payments through the non-Stabyl path.
    decisionImpact: If false, vendor concentration remains too high and the company must slow scale or negotiate different partner economics.
  - assumption: Merchants who trust approval mode will later opt into rule-based automation.
    basis: operator judgment
    validationTest: At least 70% of merchants who complete three approval-mode payments create one target-rate or deadline rule.
    decisionImpact: If false, the roadmap should stay focused on assisted treasury software rather than full autopilot.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Secure one licensed PSP design partner and document the exact execution, KYC, and settlement responsibilities.
    hypothesis: A partner will permit an embedded merchant workflow before the startup obtains its own license.
    successMetric: One signed pilot agreement plus sandbox or operational access to the partner flow.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run a spread study comparing BDC quotes, bank desk quotes, and partner-executed routes on typical supplier-payment tickets.
    hypothesis: The startup can consistently deliver more than 2% after-fee savings on the $10k-$100k tickets that matter most.
    successMetric: Median net savings above 2% across at least 30 observed or completed transactions.
    owner: Product / compliance lead
  - horizon: 0–90 days
    experiment: Onboard 10 target merchants into approval-mode invoice and deadline tracking.
    hypothesis: High-volume marketplace importers will complete setup and approve a first payment without custom services work.
    successMetric: At least 6 of 10 onboarded merchants upload invoices and execute a first supplier payment within 45 days.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Capture repeat behavior after the first completed supplier payment.
    hypothesis: Merchants who see clear savings and settlement evidence will reuse the product in the next invoice cycle.
    successMetric: At least 60% of first-payment merchants execute again within 90 days.
    owner: Merchant success / ops
  - horizon: 90–180 days
    experiment: Integrate a second liquidity or settlement partner and compare fill quality and reliability.
    hypothesis: Multi-source routing will improve resilience and preserve the core savings story.
    successMetric: Ten completed payments on the second path with no worse than 50 basis points deterioration in net savings.
    owner: Integrations engineer
  - horizon: 6–12 months
    experiment: Test a second channel beyond Konga-style merchants, starting with one distributor or alternate marketplace cohort.
    hypothesis: The same invoice-linked workflow transfers without a full product rebuild.
    successMetric: Five qualified pilots in the second cohort and at least two converting to repeat monthly usage.
    owner: Partnerships lead
operations:
  - Maintain a daily BDC benchmark capture process and post-trade execution ledger so savings claims stay auditable.
  - Route settlement through licensed PSP or treasury partners with a clear responsibility matrix for KYC, limits, disputes, and payout confirmation.
  - Start with CSV and lightweight invoice ingestion before deeper ERP or marketplace API work.
  - Review transaction rules, sanctions controls, and exception queues as core operating processes rather than back-office cleanup.
  - Maintain backup partner-routing and outage procedures so merchants are not stranded on supplier due dates.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns invoice ingestion, benchmark logic, merchant dashboard, and the first execution workflow integrations.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Runs founder-led partner sales, merchant discovery, and regulatory relationship management in a trust-sensitive market.
  - role: Product / compliance lead
    startTiming: Month 1
    rationale: Converts partner and merchant constraints into approval rules, audit trails, and a repeatable onboarding flow.
  - role: Integrations engineer
    startTiming: Month 3
    rationale: Adds second-partner routing, merchant data imports, and reliability tooling once the first pilots are live.
  - role: Merchant success / ops
    startTiming: Month 6
    rationale: Drives onboarding quality, repeat usage, and exception handling after the first 10-20 merchants are active.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Only add dedicated channel capacity after one PSP path and the first repeat-use cohort are proven.
milestones:
  - horizon: 0–12 months
    items:
      - Sign one licensed PSP distribution partner and one backup liquidity or settlement partner.
      - Launch the approval-mode MVP with invoice upload, benchmark reporting, execution receipts, and reconciliation exports.
      - Onboard 20 pilot merchants and convert at least 10 to repeat monthly usage.
      - Prove median net savings above 2% versus BDC sourcing on the first 100 completed payments.
      - Validate standard pricing and a repeatable partner-led onboarding playbook.
  - horizon: 12–24 months
    items:
      - Add a second merchant or PSP channel and multi-source routing.
      - Reach 150-250 active merchants across electronics, fashion, and the first distributor accounts.
      - Launch role-based approvals, team accounts, and stronger audit exports for larger customers.
      - Enter one adjacent distributor cohort without rebuilding the core invoice-linked workflow.
  - horizon: 24–36 months
    items:
      - Reach roughly 900 active merchants and about $144M annual executed volume, consistent with the researched SOM case.
      - Expand into one additional African corridor through existing partner rails only after Nigeria repeat economics hold.
      - Add exposure forecasting and partner-issued hedging or forward products for higher-volume accounts.
      - Secure platform or treasury white-label distribution deals that deepen channel leverage.
risks:
  - risk: KongaPay or another licensed partner may refuse embedded orchestration or require economics that break the SMB model.
    likelihood: High
    impact: High
    mitigation: Start in approval mode, secure at least one backup PSP path, and test partner rev-share terms before scaling merchant acquisition.
  - risk: Realized savings versus BDC sourcing may be smaller or less consistent than research suggests once all fees are included.
    likelihood: Medium
    impact: High
    mitigation: Benchmark every pilot payment against same-day alternatives, focus on the highest-pain ticket sizes first, and adjust pricing or segment if savings fall below threshold.
  - risk: Dependence on a single early-stage liquidity provider could create outages, pricing pressure, or weak settlement evidence.
    likelihood: Medium
    impact: High
    mitigation: Build a multi-source routing layer early and require quote, fill, and settlement logs from every partner path.
  - risk: Merchant founders may not trust automation or may fail to maintain invoice data consistently enough for repeat usage.
    likelihood: Medium
    impact: Medium
    mitigation: Keep manual approval, CSV upload, and clear benchmark reporting in the first product while merchant success helps repeat users form habits.
  - risk: Horizontal FX or marketplace incumbents could bundle enough treasury functionality to narrow the wedge before the startup builds a data moat.
    likelihood: Medium
    impact: Medium
    mitigation: Move quickly into invoice-linked workflow depth, approval history, and partner-embedded distribution rather than shipping a generic multicurrency wallet.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund a 5-7 person team, one licensed PSP integration plus one backup liquidity path, the compliance and audit stack for approval-mode execution, and enough merchant onboarding to prove repeat usage, partner economics, and one second channel before a seed round.
