- point: 模型质量依赖来自网关、承运商和 OMS 的可靠结果标签，而这些数据往往是碎片化的。
  sourceRefs:
  - 11
  - 28
  - 30
- point: 跨商家风险汇聚是一种潜在护城河，但也会成为品牌在治理和采购上的顾虑。
  sourceRefs:
  - 18
  - 19
- point: 若商家准入控制不严，担保会引入逆向选择和准备金资本风险。
  sourceRefs:
