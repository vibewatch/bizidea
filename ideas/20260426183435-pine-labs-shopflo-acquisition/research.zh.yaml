  adoptionFrictionMatrix:
  - friction: 商户担心限制 COD 会伤害转化
    severity: high
    affectedBuyer: 电商负责人
    mitigation: 先用严控的 A/B 测试和预付占比实验切入，而不是一刀切封掉 COD。
    sourceRefs:
    - 5
    - 20
  - friction: 需要同时打通店面、OMS、支付网关和承运商系统
    severity: medium
    affectedBuyer: COO / 电商运营
    mitigation: 先从只接收银台和简单 webhook 结果回传做起，缩短集成路径。
    sourceRefs:
    - 21
    - 30
  - friction: 数据隐私和安全审查
    severity: medium
    affectedBuyer: CTO / 法务
    mitigation: 从第一天开始就使用明确同意文案、数据最小化原则和强安全控制。
    sourceRefs:
    - 18
    - 24
  - friction: 保障模式可能最先吸引最危险的商户
    severity: high
    affectedBuyer: 创始人 / CFO
    mitigation: 先发软件，严格封顶覆盖范围，并用运营质量门槛控制准入。
    sourceRefs:
    - 12
    - 29
