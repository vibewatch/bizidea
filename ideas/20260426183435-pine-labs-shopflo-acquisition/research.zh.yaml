      - 24
      - 27
      - 30
    buyerPower:
      score: 4
      rationale: 中市场品牌有众多替代选项——人工确认、应用、网关和物流工具——且在切换前会要求看到可见 ROI。
      sourceRefs:
      - 20
      - 21
      - 22
      - 29
    threatOfEntrants:
      score: 3
      rationale: 基础 COD 规则和 OTP 工作流容易推出，但跨商户风控数据、可服务性反馈循环和保障模块较难复制。
      sourceRefs:
      - 6
      - 21
      - 22
    threatOfSubstitutes:
      score: 5
      rationale: 商户可以用支付平台结账功能、物流工作流、基础 Shopify 应用或内部团队来解决部分问题。
      sourceRefs:
      - 8
      - 11
      - 20
      - 21
      - 22
    competitiveRivalry:
      score: 5
      rationale: 多家已获融资的印度商业厂商正向同一商户群营销转化、预付提升、结账和 RTO 降低。
      sourceRefs:
      - 1
      - 6
      - 8
      - 9
      - 11
  pestle:
  - factor: economic
    impact: positive
    point: 印度电商和 D2C 市场仍在快速增长，足以支持新型基础设施投入。
    sourceRefs:
    - 15
    - 16
    - 17
  - factor: social
    impact: positive
    point: 持续的信任缺口和 COD 偏好使核查与选择性 COD 工作流的需求长期存在。
    sourceRefs:
    - 13
    - 20
  - factor: technological
    impact: positive
    point: 随着身份识别、路由、优惠和数据分析在结账层汇聚，结账正成为更丰富的决策面。
    sourceRefs:
    - 2
    - 8
    - 14
  - factor: legal
    impact: negative
    point: DPDP 合规义务和支付数据监管提高了实施和采购摩擦。
    sourceRefs:
    - 18
    - 24
  - factor: political
    impact: neutral
    point: 印度总体支持电商发展和数字商业基础设施，但这并不降低品类层面的执行风险。
    sourceRefs:
    - 15
  adoptionFrictionMatrix:
  - friction: 商户担心限制 COD 会损害转化率
    severity: high
    affectedBuyer: 电商负责人
    mitigation: 以能量化的 A/B 测试和预付比例实验为切口，而非直接推行全面 COD 屏蔽。
    sourceRefs:
    - 5
    - 20
  - friction: 跨店铺前端、OMS、网关和承运商系统的集成工作量
    severity: medium
    affectedBuyer: COO / 电商运营
    mitigation: 先从纯结账集成起步，采用简单的基于 Webhook 的结果数据接入。
    sourceRefs:
    - 21
    - 30
  - friction: 数据隐私和安全审查
    severity: medium
    affectedBuyer: CTO / 法务
    mitigation: 从第一天起使用明确的授权同意语言、数据最小化和强安全控制。
    sourceRefs:
    - 18
    - 24
  - friction: 保障模型可能首先吸引风险最高的商户
    severity: high
    affectedBuyer: 创始人 / CFO
    mitigation: 先做软件，严格限制覆盖额度，并用运营质量门槛控制入驻资格。
    sourceRefs:
    - 12
    - 29
