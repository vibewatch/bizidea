topRisks:
- name: 逆向选择
  description: 最差质量的商家可能最先购买，从而造成足以破坏担保模型的赔付率。
  mitigation: 先以纯软件评分切入，严格限制担保覆盖范围，并只引入达到基础订单量与运营质量门槛的品牌。
- name: 数据冷启动
  description: 新商家在第一天可能没有足够的历史数据来实现准确核保。
  mitigation: 先采用“规则+模型”的方式，优先利用承运商、地址和设备信号，然后随着商家专属数据积累逐步提高额度。
- name: incumbent 打包
  description: 支付网关或结账平台可能添加基础 COD 控制能力，从而压缩差异化空间。
  mitigation: 保持平台中立，把重点放在更难复制的核保、担保以及跨商家信任图谱数据层上。
