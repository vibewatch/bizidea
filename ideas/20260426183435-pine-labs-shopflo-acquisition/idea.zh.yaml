  painIntensity:
    score: 5
    rationale: RTO 和 COD 欺诈直接冲击 D2C 品牌的毛利率和营运资金。
  wedgeClarity:
    score: 5
    rationale: 动态 COD 资格认定加可选保障是一个范围窄、落地快、ROI 明确的工作流切口。
  defensibility:
    score: 4
    rationale: 跨商户信任数据、损失历史和核保反馈循环可以持续积累，形成有分量的护城河。
  ventureScale:
    score: 4
    rationale: 滩头市场聚焦，但平台可向更广泛的商业风险控制、支付编排和商户金融延伸。
topRisks:
  - name: 逆向选择
    description: 风险最高的商户可能最先购买，导致损失率打破保障模型。
    mitigation: 先做纯软件评分，严格限制保障覆盖额度，仅入驻满足订单量和运营质量基线门槛的品牌。
  - name: 数据冷启动
    description: 新商户第一天可能没有足够的历史数据支持精准核保。
    mitigation: 先以规则加模型的方式结合承运商、地址和设备信号，待商户专属数据积累后再逐步放宽限制。
  - name: 现有厂商捆绑
    description: 支付网关或结账平台可能添加基础 COD 控制功能，压缩差异化空间。
    mitigation: 保持平台中立，聚焦于捆绑工具难以复制的核保、保障及跨商户信任图谱数据层。
