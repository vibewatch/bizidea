jobsToBeDone:
  - job: 当 COD 订单开始侵蚀利润时，帮助电商负责人判断哪些买家可以享受 COD、在什么条件下可以，从而在维持营收的同时削减 RTO 损失。
    currentAlternative: 静态 COD 资格规则和人工订单确认
    successMetric: RTO 率下降，结账转化率稳定或有所提升
  - job: 当品牌将付费获客扩展至新地域时，帮助运营团队在发货前核查高风险订单，以规避虚假需求和浪费的物流成本。
    currentAlternative: 呼叫中心核查和承运商异常报告
    successMetric: 虚假订单发货减少，订单放行速度加快
ideaScorecard:
  signalStrength:
    score: 5
