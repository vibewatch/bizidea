problem: 印度 D2C 品牌仍高度依赖货到付款，但虚假订单、派送失败和高 RTO 率正在吞噬贡献利润。如今，团队往往在订单已生成后，才把结账工具、人工确认、物流面板和粗糙的欺诈规则拼接起来补救。随着结账环节成为核心收入与风险界面，品牌需要一套系统来决定哪些订单本就应该提供 COD，以及谁来承担剩余风险。
targetUser:
  primary: 印度 Shopify Plus D2C 品牌中 COD 占比较高的电商负责人或 COO
  secondary: 数字优先零售品牌的运营与反欺诈团队
  buyer: 创始人、COO 或电商业务 VP
startupThesis:
  nonObviousInsight: 商业中的高价值控制点，正从支付受理转向结账环节的订单风险核保。Pine Labs 收购 Shopflo 表明，结账、身份、支付和商家金融正收敛为同一层，使 COD 资格与 RTO 风险成为一个新近战略化的软件+金融问题。
  beachhead: 运行于 Shopify Plus 的印度时尚、美妆和健康 D2C 品牌，月订单量 5,000 到 50,000，COD 占比 30%+，且 RTO 为双位数
  wedge: 一套结账与下单后引擎：有选择地提供 COD，对边缘风险订单要求部分预付，自动验证高风险发货，并可对批准的 COD 订单提供可选担保
  whyNowCatalyst: Pine Labs 对 Shopflo 的收购验证了结账已成为转化、身份、支付和欺诈决策的发生地，促使品牌必须从静态 COD 规则升级。
  ventureScalePath: 先从中型 D2C 品牌的 COD 核保切入，再扩展到网关编排、消费者身份图谱、退货风险，以及基于已验证订单质量定价的商家营运资金产品。
solution: 该产品接入结账与订单管理系统，在履约前基于结账行为、设备与地址模式、历史派送结果以及支付意图信号，为每笔订单打分。系统会动态决定是否展示 COD、是否要求小额预付、是否提供预付激励，或是否通过 SMS/WhatsApp 触发轻量验证。对于其批准的订单，公司可就 RTO 损失提供付费担保，使软件从“又一个看板”变成直接影响利润表的杠杆。商家可获得一个控制中心，查看转化提升、COD 占比变化、避免的 RTO，以及按 SKU、地域和投放活动划分的群组风险模式。长期来看，该网络还能在商家之间沉淀可复用的消费者与地址信任图谱。
goToMarketSeed:
  firstCustomer: 印度美妆或服饰类 Shopify Plus 品牌，月订单量 10,000+、COD 占比 40%+、RTO 高于 15%
  buyingTrigger: 失败派送突然激增，或董事会要求在不削减获客支出的情况下改善贡献利润
  currentAlternative: 人工确认工作流、自建 COD 规则、通用结账插件以及承运商面板
  switchingReason: 它作用于结账决策点，而不是下单之后；同时把可量化的损失降低与现有工具不提供的可选金融担保结合起来。
  pricingHypothesis: 按月平台费 + 受保护 COD GMV 的基点费率 + 受担保订单的单独抽成
