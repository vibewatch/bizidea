  ventureScale:
    score: 4
    rationale: 滩头市场足够聚焦，但平台之后还能扩到更广的商业风控、支付编排和商户金融。
topRisks:
  - name: 逆向选择
    description: 风险最差的商户可能最先来买，导致保障模型的赔付率失控。
    mitigation: 先从纯软件评分做起，严格限制保障覆盖范围，只接入达到基础订单量和运营质量门槛的品牌。
  - name: 数据冷启动
    description: 新商户在上线第一天可能没有足够历史数据，难以做准承保。
    mitigation: 先用规则加模型的组合，优先使用承运商、地址和设备信号；随着商户专属数据累积，再逐步放宽额度。
  - name: 现有厂商打包竞争
    description: 支付网关或收银台平台可能加入基础 COD 控制能力，压缩产品差异化。
    mitigation: 保持平台中立，把重点放在更难复制的承保、保障，以及跨商户信任图谱数据层。