jobsToBeDone:
  - job: 当 COD 订单开始侵蚀利润时，帮助电商负责人判断哪些消费者应该拿到 COD，以及应附带什么条件，从而在保住收入的同时削减 RTO 损失。
    currentAlternative: 静态 COD 准入规则和人工订单确认
    successMetric: 在收银台转化率稳定或提升的情况下，RTO 率下降
  - job: 当品牌把付费投放扩展到新地区时，帮助运营团队在发货前核验高风险订单，从而避免虚假需求和被浪费的物流支出。
    currentAlternative: 呼叫中心核验和承运商异常报表
    successMetric: 虚假订单履约减少，订单放行速度更快
