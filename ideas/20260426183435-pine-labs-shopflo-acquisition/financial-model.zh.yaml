scenarios:
  downside:
    description: 试点转化与渠道爬坡更慢，混合 ARPU 更低且流失率更高。
    y3RevenueK: 1330.0
    y3EbitdaK: -1050.0
    cashLowPointK: -420.0
    keyAssumptionChanges:
    - 自 Q2Y2 起，客户新增量约比基准低 25%。
    - Y3 每商家的混合月收入为 $2.7K，而非 $3.0K。
    - 随着商家测试替代方案，月流失率升至 2.5%。
  base:
    description: 创始人主导的试点按计划转化，代理渠道在 Y2 开始贡献，并且定价随使用量小幅扩张。
    y3RevenueK: 1811.32
    y3EbitdaK: -677.85
    cashLowPointK: 71.33
    keyAssumptionChanges:
    - 客户新增节奏遵循 A9-A11。
    - 每商家的混合月收入从早期试点的 $2.0K 上升至 Y3 的 $3.0K。
    - 由于业务仍以软件为主，毛利率仅逐步下降到 72%。
  upside:
    description: 试点更早验证成功，代理加速拉新，且账户在服务成本未显著上升的情况下更快扩大使用。
    y3RevenueK: 2290.0
    y3EbitdaK: -390.0
    cashLowPointK: 260.0
    keyAssumptionChanges:
    - 自 Q3Y2 起，客户新增量约比基准高 20%。
    - Y3 每商家的混合月收入达到 $3.3K。
    - Y1 之后月流失率改善至 1.0%。
