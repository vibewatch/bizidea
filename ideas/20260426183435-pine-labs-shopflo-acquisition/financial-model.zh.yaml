    name: 非薪酬管理及行政费用
    value: '$5k/mo in Y1, $7k/mo in Y2, $10k/mo in Y3'
    unit: USDK per month
    source: '[Legal, compliance, accounting, and admin heuristic; anchored to DPDP/procurement needs in research]'
