    downsideCase: 创始人主导外呼持续为主要渠道，完全加载 CAC 升至 $30K
    baseCase: 完全加载 CAC 为 $23K
    upsideCase: 代理商转介落地，CAC 降至 $20K
    y3RevenueImpactK: 0.0
    cashImpactK: -168.0
  - variable: 流失率
    downsideCase: 月度流失率为 2.5%
    baseCase: 月度流失率为 1.5%
    upsideCase: 月度流失率为 1.0%
    y3RevenueImpactK: -210.0
    cashImpactK: -240.0
  - variable: 销售周期
    downsideCase: 试点转正式生产转化率降至 40%，且新增客户滑落一个季度
    baseCase: 试点转正式生产转化率维持在 50% 以上
    upsideCase: 试点转正式生产转化率达到 60% 以上
    y3RevenueImpactK: -260.0
    cashImpactK: -300.0
  - variable: 毛利率
    downsideCase: 支持和核查成本居高不下，毛利率落在 68%
    baseCase: 毛利率落在 72%
    upsideCase: 毛利率落在 75%
    y3RevenueImpactK: 0.0
    cashImpactK: -72.0
  - variable: 招聘节奏
    downsideCase: 即使营收里程碑延迟，团队仍按计划招聘
    baseCase: 招聘按 A16–A17 分阶段计划执行
    upsideCase: 两个非关键岗位推迟一至两个季度，待证明节点落地后再招
    y3RevenueImpactK: 0.0
    cashImpactK: 120.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionMerchants
      ProductionMerchants --> SaaSAndUsageRevenue
      SaaSAndUsageRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准场景下，活跃商户数从第一年的 8.72 家增至第三年的 76.69 家，同期每商户混合月收入从 $2.0K 扩展至 $3.0K，驱动收入增长。
  - checkName: 必须做对的事
    finding: 模型需要 50% 以上的试点转正式生产转化率，以及可引用的 RTO 降低案例，才能让代理商转介在第二年补充创始人主导的销售。
  - checkName: 模型崩溃条件
    finding: 敏感性分析显示，若流失率达到 2.5% 或销售周期滑落约一个季度，现金在第三年结束前将转负。
  - checkName: 下一轮融资证明条件
    finding: 若公司达到 25–40 家正式商户、证明共享数据提升效果，并准备好合作方支持的保障试点方案，则下一轮融资有充分依据。
sanityChecks:
  ruleOf40: "第三年增长率 188.7% + EBITDA 利润率 -37.4% = 151.3%"
  burnMultiple: "第三年烧钱倍数 0.6x（净消耗除以较第二年的净新增收入）"
  revenuePerFte: "$148K（第三年平均 12.25 名全职员工；低于成熟 SaaS 基准 $200–400K，但在前规模化阶段属合理水平）"
  flags:
    - 每 FTE 收入仍低于成熟软件基准，下一轮融资更依赖核保提升的证明而非纯效率指标。
    - 基准场景假设商户允许结账策略实时变更，且至少一半付费试点能转化；任一条件未达到都会实质性削弱收入爬坡。
    - 第三年毛利率建模为 72%，前提是保障账簿尚未规模化；若市场更早要求财务覆盖，毛利率可能不达预期。
