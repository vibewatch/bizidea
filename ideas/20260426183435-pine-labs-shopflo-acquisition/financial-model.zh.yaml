    name: 核心招聘序列
    value: 'Founder seller and founding eng at start; Product/CS M3; Data/Risk M6; Partnerships M9'
    unit: timing
    source: '[BP team]'
  - id: A17
    name: 规模化招聘序列
    value: 'Additional eng M13/M19/M28/M33; Product/CS M16/M31; Data/Risk M18; Partnerships M21/M29; Finance/Ops M25'
    unit: timing
    source: '[Heuristic aligned to BP milestones and GTM sequencing]'
