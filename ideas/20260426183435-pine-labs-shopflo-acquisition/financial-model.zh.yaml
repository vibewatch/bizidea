modelDiagram:
  title: 单位经济流
  mermaid: "flowchart LR\n  Leads[线索] --> PaidPilots[付费试点]\n  PaidPilots --> ProductionMerchants[正式商家]\n  ProductionMerchants --> SaaSAndUsageRevenue[SaaS 与使用费收入]\n  SaaSAndUsageRevenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入由活跃商家数量驱动：从 Y1 的 8.72 增长到 Y3 的 76.69，同时每商家的混合月收入从 $2.0K 扩大到 $3.0K。
- checkName: 必须成立的条件
  finding: 该模型要求试点转正式转化率达到 50%+，并且 RTO 降幅可被引用，从而使代理推荐能在 Y2 补充创始人主导销售。
- checkName: 模型失效条件
  finding: 敏感性分析显示，如果流失率达到 2.5%，或销售周期大约延后一季度，现金会在 Y3 结束前转负。
- checkName: 下一轮融资证明
  finding: 如果公司达到 25-40 个正式商家、证明汇聚数据增益，并准备好由合作伙伴支持的担保试点设计，则下一轮融资具有正当性。
sanityChecks:
  ruleOf40: Y3 增长率 188.7% + EBITDA 利润率 -37.4% = 151.3%
  burnMultiple: Y3 burn multiple 为 0.6x，按净烧钱额除以相对 Y2 的净新增收入计算
  revenuePerFte: $148K（Y3，平均 12.25 FTE；低于成熟 SaaS $200-400K 的基准，但对扩张前阶段仍属合理）
  flags:
  - 每 FTE 收入仍低于成熟软件基准，因此下一轮融资仍更多取决于核保增益证明，而非纯效率。
  - 基础情景假设商家允许实时调整结账策略，且至少一半付费试点能转正；任一项失手都会明显削弱收入爬坡。
  - Y3 毛利率按 72% 建模，且尚未扩张出大规模担保账本；若市场更早要求金融覆盖，毛利率可能低于预期。
