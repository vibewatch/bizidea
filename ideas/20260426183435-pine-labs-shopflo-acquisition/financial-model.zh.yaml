    baseCase: 招聘按 A16-A17 的分阶段计划推进
    upsideCase: 两个非关键岗位延后一到两个季度再招
    y3RevenueImpactK: 0.0
    cashImpactK: 120.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads[线索] --> PaidPilots[付费试点]
      PaidPilots --> ProductionMerchants[正式生产商户]
      ProductionMerchants --> SaaSAndUsageRevenue[SaaS 与使用费收入]
      SaaSAndUsageRevenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，活跃商户从 Y1 的 8.72 家增长到 Y3 的 76.69 家，同时每个商户的综合月收入从 $2.0K 提升到 $3.0K。
  - checkName: 必须顺利的关键点
    finding: 这个模型要求试点转正式生产达到 50%+，并且 RTO 改善证据足够可引用，这样代理商推荐才能在 Y2 补充创始人销售。
  - checkName: 什么时候模型会失效
    finding: 敏感性分析显示，如果 churn 升到 2.5%，或销售周期大约延后一季度，现金会在 Y3 结束前转负。
  - checkName: 下一轮融资证明点
    finding: 如果公司能达到 25-40 家生产商户、证明汇聚数据带来的提升，并准备好由合作伙伴支持的保障试点设计，就足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 growth 188.7% + EBITDA margin -37.4% = 151.3%
  burnMultiple: Y3 burn multiple 0.6x using net burn divided by net new revenue versus Y2
  revenuePerFte: $148K Y3 on average 12.25 FTE (below mature SaaS benchmark of $200-400K, but plausible pre-scale)
  flags:
    - 每名 FTE 对应收入仍低于成熟软件公司的常见水平，因此下一轮融资更依赖承保效果的证明，而不是纯效率故事。
    - 基准情形默认商户愿意实时调整收银台策略，且至少一半付费试点会转正；这两个条件任何一个失手，都会明显削弱收入爬坡。
    - Y3 毛利率按 72% 建模，前提是保障账本没有大规模展开；如果市场更早要求金融覆盖，毛利率可能不及预期。
