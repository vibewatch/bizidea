    name: 各职能薪酬基准
    value: 'CEO $120k, Eng $144k, Product/CS $84k, Data/Risk $120k, Partnerships $84k, Finance/Ops $72k'
    unit: annual USD
    source: '[India startup fully-loaded compensation heuristic for experienced seed team]'
