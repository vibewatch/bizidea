    downsideCase: 第三年每商户混合月收入为 $2.7K
    baseCase: 第三年每商户混合月收入为 $3.0K
    upsideCase: 第三年每商户混合月收入为 $3.3K
    y3RevenueImpactK: -181.0
    cashImpactK: -131.0
