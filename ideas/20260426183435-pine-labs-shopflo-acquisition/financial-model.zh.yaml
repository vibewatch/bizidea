scenarios:
  downside:
    description: 试点转化和渠道爬坡更慢，综合 ARPU 更低，流失率更高。
    y3RevenueK: 1330.0
    y3EbitdaK: -1050.0
    cashLowPointK: -420.0
    keyAssumptionChanges:
      - 从 Q2Y2 起，新增客户比基准情形低约 25%。
      - Y3 每个商户的综合月收入为 $2.7K，而不是 $3.0K。
      - 随着商户测试替代方案，月度 churn 升至 2.5%。
  base:
    description: 创始人主导的试点按计划转化，代理商在 Y2 开始贡献客户，价格也随着使用量温和上升。
    y3RevenueK: 1811.32
    y3EbitdaK: -677.85
    cashLowPointK: 71.33
    keyAssumptionChanges:
      - 新增客户节奏按照 A9-A11 执行。
      - 每个商户的综合月收入从早期试点的 $2.0K 提升到 Y3 的 $3.0K。
      - 由于业务仍以软件为主，毛利率仅缓慢回落到 72%。
  upside:
    description: 试点证明来得更早，代理商加速拉新，客户扩容更快，且服务成本没有明显上升。
    y3RevenueK: 2290.0
    y3EbitdaK: -390.0
    cashLowPointK: 260.0
    keyAssumptionChanges:
      - 从 Q3Y2 起，新增客户比基准情形高约 20%。
      - Y3 每个商户的综合月收入提升至 $3.3K。
      - Y1 之后月度 churn 改善到 1.0%。
