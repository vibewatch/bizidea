scenarios:
  downside:
    description: 试点转化和渠道增速放缓，混合 ARPU 下降，流失率上升。
    y3RevenueK: 1330.0
    y3EbitdaK: -1050.0
    cashLowPointK: -420.0
    keyAssumptionChanges:
      - 从 Q2Y2 起，新增客户数较基准低约 25%。
      - 第三年每商户混合月收入为 $2.7K，低于基准的 $3.0K。
      - 商户尝试替代方案，月度流失率升至 2.5%。
  base:
    description: 创始人主导的试点按计划转化，代理商从第二年起贡献增量，定价随使用量温和扩展。
    y3RevenueK: 1811.32
    y3EbitdaK: -677.85
    cashLowPointK: 71.33
    keyAssumptionChanges:
      - 新增客户按 A9–A11 节奏进行。
      - 每商户混合月收入从早期试点的 $2.0K 增长至第三年的 $3.0K。
      - 业务保持软件优先属性，毛利率仅降至 72%。
  upside:
    description: 试点证明提前落地，代理商加速带单，账户使用量扩展快于预期且未显著增加服务成本。
    y3RevenueK: 2290.0
    y3EbitdaK: -390.0
    cashLowPointK: 260.0
    keyAssumptionChanges:
      - 从 Q3Y2 起，新增客户数较基准高约 20%。
      - 第三年每商户混合月收入达 $3.3K。
      - 第一年后月度流失率改善至 1.0%。
