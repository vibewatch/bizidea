signals:
- title: Full-stack merchant stack is consolidating
  summary: The acquisition pairs Shopflo's checkout layer with Pine Labs' payments, POS, and credit rails, pointing to a market
    that wants one merchant stack across online and offline.
  sourceRefs:
  - 1
  - 2
  - 7
  - 8
  - 9
  - 10
  - 11
- title: Checkout is being bought for conversion economics
  summary: Shopflo's own positioning centers on higher conversion, AOV, and repeatability, showing that checkout software
    is sold on measurable revenue lift rather than just payment acceptance.
  sourceRefs:
  - 2
  - 3
  - 5
  - 6
- title: COD fraud and RTO remain a live pain point
  summary: Shopflo explicitly markets reduction of fake and high-risk COD orders, which keeps delivery failure and fraud prevention
    inside the checkout workflow.
  sourceRefs:
  - 1
  - 2
  - 4
- title: Merchant data and identity are becoming part of checkout
  summary: Shopflo's identity, analytics, and payments surfaces suggest merchants want one loop for checkout, risk, attribution,
    and retention data.
  sourceRefs:
  - 2
  - 3
  - 5
  - 6
- title: Pine Labs is extending beyond acceptance into software
  summary: Pine Labs already positions itself across gateway, online payments, POS, and credit processing, so Shopflo looks
    like a software wedge into a broader merchant platform.
  sourceRefs:
  - 7
  - 8
  - 9
  - 10
  - 11
- title: Shopflo has meaningful D2C distribution
  summary: Shopflo's announcement and landing page claim 1,000+ brands and 50M+ shoppers, showing the checkout layer already
    has real merchant reach.
  sourceRefs:
  - 2
  - 3
