openQuestions:
- 'What is the first product buyers will trust enough to install: selective COD rules, partial-prepay prompts, or a guarantee-backed approval workflow?'
- How much accuracy lift comes from cross-merchant data versus merchant-specific history in the first 30 days of onboarding?
- Will brands allow pooled shopper and address signals under DPDP-compliant terms if the product is not their payment provider?
- 'Who is the economically viable risk carrier for approved COD orders: the startup, the merchant, an insurer, or an NBFC partner?'
