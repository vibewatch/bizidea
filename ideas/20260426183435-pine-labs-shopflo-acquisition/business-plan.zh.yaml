slug: adaptive-cod-underwriting
date: '2026-04-26'
executiveSummary: >-
  自适应 COD 承保面向以 Shopify 为核心的印度 D2C 品牌销售。这些品牌依然高度依赖货到付款，利润却不断被虚假订单、配送失败和高退回原寄地率吞掉。它的切口很窄：在收银台判断是否该提供 COD、是否该要求部分预付，以及高风险订单在放行前是否需要核验。这个入口比通用收银台更强，因为买家已经在边际贡献和营运资金上切身感受到痛，而 Pine Labs 收购 Shopflo 进一步证明收银台正在变成商户的战略控制点。第一版产品应先做纯软件，只有在公司先证明审批质量和商户筛选纪律后，才引入保障。GTM 应聚焦月订单 10,000+、COD 占比 40%+ 的美妆和服饰品牌，通过创始人主导外呼配合 Shopify 代理商引荐，切入那些 RTO 问题最紧急的场景。只要公司能在一个简单命题上明显优于规则式替代方案——在不伤害收银台转化的情况下把 RTO 压下去、把预付占比拉上来——它就有机会赢。最大的风险不是客户没有痛点，而是在产品证明承保表现之前，打包型现有厂商就先把“够用”的 COD 控制能力做出来。另一个尚未解开的风险是保障经济性：在创业公司拿到足够审批与损失历史数据、并找到保险公司或 NBFC 合作结构之前，这仍只是经营假设。
problem:
  - 高 COD 占比的印度 D2C 品牌，一边需要保留货到付款来守住转化，一边又持续被虚假订单、配送失败和 RTO 吃掉边际贡献。
  - 现有替代方案分散在插件、人工核验、承运商看板和支付网关工具里，不是发生在下单之后，就是只优化支付完成率，而不是在收银台做风险筛选。
solution:
  - 在收银台基于行为、地址、设备、支付意图和历史结果信号，对每笔订单评分，判断是提供 COD、要求部分预付、引导预付，还是触发核验。
  - 给商户一个直接对业务结果负责的控制中心，能看到减少了多少 RTO、预付占比怎样变化、不同分层的审批质量如何；等模型跑顺后，再加上对获批 COD 订单的可选损失保障。
whyWeWin:
  - 产品在履约成本真正花出去之前就做决策，比物流工具更早，也比通用收银台 UX 产品更直接地作用于经济结果。
  - 如果公司能获得商户许可，把手机号、地址、邮编和签收结果沉淀成跨商户信任图谱，审批质量会随着时间持续提升。
  - 横跨不同支付网关和承运商保持中立很重要，因为商户不愿为了一个利润问题被迫绑定到单一支付栈。
  - 保障可以成为差异化的变现方式和切换杠杆，但前提是软件试点先证明承保引擎确实优于商户自己的规则。
strategicChoices:
  beachhead: 月订单量 5,000 到 50,000 单、COD 占比超过 30%、RTO 长期高于 15% 的印度 Shopify Plus 服饰、美妆和健康品牌。
  wedgeRationale: 这个滩头市场痛点紧、结果可量化、决策人可触达，而且订单量足够大，能很快产出承保信号。相比更宽泛的“全收银台”产品，它更容易在一个季度内用“少亏多少钱、预付提升多少”证明 ROI。
  sequencingRationale: 先做收银台埋点、策略引擎和商户看板，在实时分层上证明能在不伤转化的前提下降低 RTO；等这些结果跑出来后，再把风险放到自有或合作方资产负债表上。前期先由创始人亲自把单打进一个很窄的 ICP，等案例足够后再引入代理商和平台合作伙伴；只有当试点积累出可靠的审批与理赔数据集后，才扩招风控运营。
  notYet:
    - 在 COD 承保效果尚未被证明前，就扩成覆盖全部支付方式的广义网关编排
    - 在收银台切口还没跑出可复制销售之前，就做退货风险和购买后套件扩张
    - 面向 SMB Shopify 商户做自助式销售，那会让产品在应用商店定价里迅速同质化
    - 在没有商户筛选门槛、损失上限和外部风险承载能力之前，就以保障为先发布产品
market:
  tam: 面向有显著 COD 暴露的印度电商和 D2C 品牌，年化软件与工作流支出预计约 $150M。
  sam: 约 3,000 家足够大、会购买专门收银台风控工具的印度中端 D2C 品牌，对应约 $36M 年支出。
  som: 按窄切口、伙伴驱动 GTM 估算，第三年大约能触达 150 家聚焦商户，对应可达收入池约 $2.7M。
  segments:
    - 以 Shopify 为核心、COD 占比高的印度中端 D2C 服饰、美妆和健康品牌
    - 拥有专门电商运营团队、且长期受到配送失败困扰的数字原生零售品牌
  buyingProcess: >-
    经济买家通常是创始人、COO，或电商副总裁/负责人；日常使用和评估产品的则是运营与风控团队。真正触发采购的往往是 RTO 突然上升，或收银台技术栈要重构；而能否通过审批，取决于一轮短试点是否能证明在不拉低转化的情况下改善利润。
product:
  mvp: >-
    接入 Shopify 收银台和下单后埋点，提供一套规则加模型的策略引擎，用于选择性 COD 与部分预付，配合轻量 OTP 或 WhatsApp 核验，以及展示审批决策、预付占比、RTO 结果和分层提升效果的商户看板。MVP 不应一开始就背完整保障账本；最多只做影子承保，以及在少量获批订单上做小范围、封顶的保障实验。
  sixMonth: 上线 5 到 10 个实时试点，具备收银台评分、选择性 COD 规则、预付引导、核验工作流，以及按 RTO 和转化追踪的日报输出。
  twelveMonth: 加入跨商户信任信号、按品类和邮编生成的商户策略模板、自助实验控制台，以及为支付网关、OMS 和承运商准备好的合作 API。
  twentyFourMonth: 对合格商户推出带保障的审批，扩展到退货风险评分，并沉淀可复用的身份与地址信任层，以支持相邻的商业金融产品。
  keyBets:
    - 收银台时点的决策，在毛利影响上优于下单后的工作流。
    - 部分预付和预付激励能改变支付结构，而不会伤到顶层转化。
    - 跨商户数据在冷启动阶段就能比单商户规则明显更强。
    - 只要满足 DPDP 要求，商户愿意共享足够多的结果数据，形成持续增强的承保闭环。
gtm:
  wedge: 把一轮 60 到 90 天、围绕利润改善的试点卖给高 COD 的 Shopify Plus 品牌；这些买家本身已经有清晰的 RTO 问题，也能较快批准收银台策略调整。
  channels:
    - 创始人主导，直接触达目标 D2C 品牌的电商负责人、COO 和创始人
    - 已在安装收银台工具的 Shopify 代理商和实施伙伴
    - D2C 从业者社群，以及围绕物流或 RTO 讨论最活跃的论坛
    - 在首批案例跑出来后，再引入精选的网关、承运商和应用生态推荐
  funnelTargets: 线索→合格试点 15–25%，试点→正式生产 50%+，生产→可引用客户 60%+
  pricing: 月度平台费，加上按受保护或被优化的 COD GMV 计费；只有在损失率被验证后，才对获批且被保障的订单收取保障费。这样定价更符合买家的预算逻辑，因为这笔支出是靠减少 RTO 和提升预付占比来论证，而不是作为一项泛化的软件科目。
businessModel:
  revenueStreams:
    - 为承保工作流、分析和策略管理收取 SaaS 订阅费
    - 按策略引擎评估或保护的 COD GMV 收取使用费
    - 对合格商户的获批保障订单收取保障费或损失保护费
    - 通过退货风险、身份和支付编排模块获得扩展收入
  unitOfValue: 能够被审批策略显著改变 RTO、预付占比和边际贡献的 COD GMV 与订单分层
  targetGrossMarginPct: 70
  expansionLevers:
    - 先从单一店铺或类目切入，再把引擎扩到该客户全部订单量
    - 对运营行为干净、模型拟合已被证明的商户推出带保障的审批
    - 用同一套信任图谱继续销售退货风险、可服务性决策等相邻风控产品
    - 成为支付路由和商户金融的智能层，按已验证订单质量定价
strategyMap:
  northStarMetric: 在收银台转化率没有统计学显著下滑的前提下，每个在线商户分层带来的边际贡献提升
  inputMetrics:
    - 在履约放行前完成评分的合格订单占比
    - 相对对照组的 RTO 降幅
    - 相对对照组的预付或部分预付提升
    - 试点转正式生产的转化率
    - 跨商户数据相对单商户规则的精度提升
  moatsToBuild:
    - 覆盖手机号、地址、邮编和结果历史的跨商户信任图谱
    - 与真实签收和取消结果绑定的商户专属策略调优数据
    - 能支撑保障定价的风险筛选纪律与理赔历史
    - 通过代理商、支付网关和物流伙伴建立的生态分发网络
  killCriteria:
    - 如果 10 个试点品牌在两轮试点后，仍无法在不损伤转化的前提下取得至少 20% 的 RTO 中位数降幅或同等级别的毛利提升，就应收窄假设，或停止押注承保切口。
    - 如果商户拒绝接受数据汇聚条款，或数据集成碎片化到 90 天内都无法闭合反馈回路，护城河假设就会明显变弱。
    - 如果在软件效果被证明之后，保障合作方仍给不出可行结构，就把业务维持在软件层，不再把资产负债表假设写进路线图。
  mermaid: |
    flowchart LR
      Wedge[高 COD D2C 利润问题] --> MVP[收银台承保 MVP]
      MVP --> Proof[验证 RTO 下降与预付提升]
      Proof --> Expansion[保障加相邻商业风险产品]
investorMemo:
  verdict:
    call: 值得会面 / 继续深入
    conviction: 痛点强、切口也够锋利，但前提是公司要在推出保障前，先证明自己能跑赢打包型现有厂商。
    whyBelieve: 公司瞄准的是收银台这个控制点上的紧迫利润问题，而近期市场动作与商户工具演进都在验证它正变得越来越关键。
    whyDoubt: 市场拥挤、替代方案很多，而且公司尚未证明，汇聚式承保与可选保障真的能打赢支付网关和平台的打包方案。
    nextDiligence: 验证 3 到 5 个共创客户承诺，并检查多商户历史订单回测，确认能在不伤转化的前提下把 RTO 压下去。
  firstCustomer:
    title: 印度 Shopify Plus 美妆或服饰品牌的电商负责人
    profile: 这类数字原生品牌月订单超过 10,000 单，COD 占比超过 40%，RTO 为两位数，团队已经在用人工核验或粗糙的 COD 规则兜底。
    trigger: 某个季度配送失败上升、边际贡献恶化，或收银台重构迫使团队重新审视支付策略逻辑。
    buyer: 创始人、COO 或电商副总裁
    initialContract: 先签一轮 60 到 90 天、价格在 $8k-$20k 的付费试点，明确对照组与实验组指标；若效果被验证，再转成 $18k-$40k 的年度软件加使用费合同。
  mustBeTrue:
    - 至少一半的合格试点品牌，必须在 60 到 90 天测试后转为年度生产客户。
    - 试点分层的 RTO 中位数降幅或毛利提升，必须足够明显，同时转化不能出现统计上显著的下滑。
    - 跨商户汇聚数据必须在上线前 30 到 60 天内就优于单商户规则，早到足以影响结果。
    - 买家必须接受与 COD GMV 或受保护订单挂钩的结果导向定价，而不是把产品压成廉价应用定价。
    - 在中立承保或损失保护上，现有厂商的打包方案必须仍明显弱于创业公司的专注工作流。
  diligenceQuestions:
    - 在 Shopify、支付网关、OMS 和承运商体系里，第一天到底能拿到哪些订单字段？
    - 团队打算如何衡量“在不伤转化的前提下降低 RTO”，才能让持怀疑态度的 COO 也认可？
    - 在任何保障上线之前，商户筛选机制如何避免逆向选择？
    - 在跨多个品类的回测里，汇聚数据相对商户历史数据究竟带来多大提升？
    - 哪些代理商、网关或物流伙伴，能稳定带来前 20 个试点？
  riskHeatmap:
    - risk: 在创业公司证明更优承保能力之前，现有厂商打包方案先把差异化压缩掉。
      likelihood: High
      impact: High
      leadingIndicator: 潜在客户反复表示 Razorpay、Cashfree、GoKwik 或 Shopflo 已经能解决足够多的问题，因此不愿启动试点。
      mitigation: 围绕中立的 COD 风险决策讲一个更窄、更强的 ROI 故事，并在扩展功能前先公开试点证据。
    - risk: 逆向选择导致保障经济性失控。
      likelihood: Medium
      impact: High
      leadingIndicator: 最早表达兴趣的商户历史 RTO 异常高，或在共享数据前就要求全额覆盖。
      mitigation: 先做软件，设置商户准入门槛，严格封顶覆盖范围，并在规模化前锁定外部风险承载能力。
    - risk: 数据冷启动削弱新商户的模型质量。
      likelihood: Medium
      impact: High
      leadingIndicator: 新商户前 30 天的试点准确率，并不优于简单规则。
      mitigation: 使用规则加模型的组合，以跨商户与邮编信号做种子，并要求承运商和 OMS 工具快速回传结果。
    - risk: 商户担心限制 COD 会伤害转化。
      likelihood: High
      impact: Medium
      leadingIndicator: 试点潜在客户坚持只做只读分析，不愿允许线上收银台策略调整。
      mitigation: 在严控的 A/B 分层中先试边缘风险群体，把预付引导包装成转化优化，而不是取消 COD。
    - risk: DPDP 或安全审查拖慢部署，并阻断汇聚式学习。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 安全审查拖过一个完整销售周期，或潜在客户拒绝汇聚数据条款。
      mitigation: 从一开始就把显式同意、数据最小化、留存控制和面向商户的治理语言做好。
operatingAssumptions:
  - assumption: 高 COD 的中端 D2C 品牌，会在保障功能还不存在时，先购买纯软件试点。
    basis: research.yaml
    validationTest: 在外呼启动后的前 90 天内，仅凭 RTO 和预付提升 ROI，拿下至少 3 个付费共创客户试点。
    decisionImpact: 如果这一点不成立，公司就必须更早补上金融背书，或进一步收窄到痛得更深、购买触发更快的商户。
  - assumption: 跨商户汇聚数据会在上线后的前 30 到 60 天内，把审批质量拉升到足以产生业务意义。
    basis: research.yaml
    validationTest: 回测至少 100 万笔、跨多个商户的历史订单，对比汇聚数据与单商户数据在精度和损失结果上的差异。
    decisionImpact: 如果不成立，护城河就会从网络数据退化为工作流执行，长期防御性和定价权都会下降。
  - assumption: 在拿到最初几个可引用客户后，Shopify 代理商能够持续输送合格试点。
    basis: research.yaml
    validationTest: 签下 2 家代理或实施伙伴，并让每家在一个季度内至少引荐 3 个符合 ICP 的合格商户。
    decisionImpact: 如果不成立，获客将更长时间依赖创始人亲自销售，渠道合作的招聘节奏也应放慢。
  - assumption: 部分预付和预付引导可以提高预付占比，同时不会明显拉低成交订单数。
    basis: idea.yaml
    validationTest: 按品类、AOV 和邮编做受控实验，确认在约定容差内维持转化的同时提升预付占比。
    decisionImpact: 如果不成立，产品就应更倚重选择性 COD 审批与核验，而不是支付结构引导。
  - assumption: 一旦软件试点证明损失表现足够纪律化，就能找到保障覆盖的合作结构。
    basis: operator judgment
    validationTest: 在试点数据形成后，拿到至少 2 份来自保险公司、NBFC 或准备金结构方的方案，且其损失走廊与免责条款具有可行性。
    decisionImpact: 如果不成立，公司就应保持软件和分析业务定位，把“保障驱动扩张”从融资叙事中拿掉。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 与 3 到 5 个共创客户做历史订单回测
    hypothesis: 基于收银台时点的规则加模型引擎，能比每个商户当前策略更准确地识别边缘 COD 订单。
    successMetric: 回测在目标分层上显示至少 20% 的模拟 RTO 降幅，或同等级别的毛利提升，同时不能过滤掉过多优质需求。
    owner: CEO 与创始工程师
  - horizon: 0–90 天
    experiment: 付费试点报价与打包方案测试
    hypothesis: 只要定价绑定可衡量的利润结果，而不是泛化 SaaS 席位，买家愿意签 60 到 90 天的付费试点。
    successMetric: 拿下 3 个付费试点，并就对照组与实验组测量方案达成一致。
    owner: CEO
  - horizon: 0–90 天
    experiment: Shopify 加 webhook 式 OMS 与承运商结果接入的集成提速冲刺
    hypothesis: 团队可以在不依赖重服务投入的情况下，把单个商户在 2 周内推上线做实时实验。
    successMetric: 前两个试点在签约后 14 天内上线。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 选择性 COD、部分预付与预付激励的实时 A/B 测试
    hypothesis: 混合策略在利润和客户体验两端，都优于简单粗暴地限制 COD。
    successMetric: 至少 2 个试点商户在转化维持于预设护栏内时，同时看到预付占比提升和 RTO 下降。
    owner: 产品与客户成功负责人
  - horizon: 3–6 个月
    experiment: 代理商推荐渠道测试
    hypothesis: 只要产品能缩短商户在收银台与 RTO 问题上的见效时间，Shopify 代理商就愿意推荐。
    successMetric: 2 个合作伙伴各带来至少 1 个上线试点和 1 个额外合格商机。
    owner: CEO
  - horizon: 6–12 个月
    experiment: 汇聚数据增益测试
    hypothesis: 跨商户信任信号，相比单商户数据，能明显改善新商户早期表现。
    successMetric: 测得的精度或审批质量提升足够大，足以支撑汇聚数据治理投入和差异化主张。
    owner: 数据负责人
  - horizon: 6–12 个月
    experiment: 联合外部风险伙伴设计保障方案
    hypothesis: 只要试点损失数据到位，就能对封顶的获批订单分层做出经济上成立的定价与承保。
    successMetric: 至少拿到 1 份可执行的 term sheet 或试点结构，且免责条款与损失分摊可接受。
    owner: CEO 与风控负责人
operations:
  - 每天按商户复盘审批决策、误杀情况和承运商结果，尽快闭合学习回路。
  - 把 Shopify、OMS、支付网关和承运商集成流程标准化，确保实施周期控制在 2 周以内。
  - 严格执行 A/B 测试纪律，设置对照组、预先约定护栏，并与买家每周复盘 ROI。
  - 建立涵盖同意文案、数据留存、访问控制和商户专属共享条款的数据治理流程。
  - 维护代理商、物流服务商以及未来风险承载方的合作关系。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责搭建收银台埋点、策略引擎和集成层，让试点部署和数据采集成为可能。
  - role: CEO / 创始人销售
    startTiming: Month 0
    rationale: 前 10 个客户必须由创始人亲自完成需求探索、销售、定价和合作拓展，并且一切都要锚定可量化的商户 ROI。
  - role: 产品 / 客户成功负责人
    startTiming: Month 3
    rationale: 试点需要严密的实验设计、商户 onboarding 和每周结果复盘，才能顺利转成生产案例。
  - role: 数据 / 风控负责人
    startTiming: Month 6
    rationale: 一旦试点开始产出真实结果数据，公司就需要专人对模型质量、策略调优和损失分析负责。
  - role: 合作伙伴负责人
    startTiming: Month 9
    rationale: 只有当首批可引用客户出现后，代理商、网关、承运商和风险承载关系才能真正形成杠杆。
milestones:
  - horizon: 0–12 个月
    items:
      - 在目标 ICP 中启动 5 到 10 个付费试点，并至少把其中 5 个转成年度生产客户。
      - 在实时分层上证明 RTO 中位数下降或毛利提升，同时收银台转化没有明显下滑。
      - 通过可复用集成和实施手册，把部署时间压到 2 周以内。
      - 发布 3 个可引用案例，并签下前 2 个代理或生态渠道伙伴。
  - horizon: 12–24 个月
    items:
      - 生产商户达到 25 到 40 家，并集中在同一垂直和平台栈里。
      - 证明汇聚式信任数据相较单商户承保确有可测量提升。
      - 为合格商户上线封顶覆盖、由外部风险能力支持的保障试点。
      - 增加退货风险和策略模板，在现有客户中做出更多扩展收入。
  - horizon: 24–36 个月
    items:
      - 成为印度 Shopify 主导型 D2C 品牌里一块默认的 COD 风险层。
      - 扩展到更广的订单风险、支付路由和商户金融工作流，并按已验证订单质量定价。
      - 建立让打包型收银台厂商无法快速复制的信任图谱与理赔数据集。
risks:
  - risk: 在创业公司证明更优承保之前，现有厂商先做出“够用”的 COD 控制能力。
    likelihood: High
    impact: High
    mitigation: 聚焦一个更窄的 ROI 证明，保持网关中立，在拿到清晰效果证据前不要扩成大平台功能。
  - risk: 逆向选择和糟糕的商户筛选让保障赔付在经济上不成立。
    likelihood: Medium
    impact: High
    mitigation: 先发软件，设置商户门槛、严格封顶覆盖范围，并优先使用外部承载能力而不是自己长期裸持风险。
  - risk: 收银台、OMS 和承运商之间的数据碎片化拖慢学习回路，并削弱模型表现。
    likelihood: Medium
    impact: High
    mitigation: 先从最少必需集成做起，把结果接入标准化，在数据质量成熟前使用规则加模型策略。
  - risk: 商户担心实时改动收银台策略会损害转化，因此拒绝上线。
    likelihood: High
    impact: Medium
    mitigation: 在边缘分层中做受控实验，按周展示结果，并始终把叙事锚定在边际贡献改善上。
  - risk: 隐私和安全要求拖慢类企业级采购流程，并限制汇聚数据条款。
    likelihood: Medium
    impact: Medium
    mitigation: 从第一天开始就在产品和销售材料里内建显式治理、同意机制和数据最小化控制。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月时间搭建核心的收银台承保产品，服务并跑通 10 到 20 个试点，证明在不伤转化的前提下可以抬升利润，建立伙伴分发能力，并判断保障经济性是否足以支撑下一阶段扩张。
