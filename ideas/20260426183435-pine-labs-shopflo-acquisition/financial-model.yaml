scenarios:
  downside:
    description: Slower pilot conversion and channel ramp, with lower blended ARPU and higher churn.
    y3RevenueK: 1330.0
    y3EbitdaK: -1050.0
    cashLowPointK: -420.0
    keyAssumptionChanges:
      - Gross adds run about 25% below base from Q2Y2 onward.
      - Y3 blended monthly revenue per merchant is $2.7K instead of $3.0K.
      - Monthly churn rises to 2.5% as merchants test alternatives.
  base:
    description: Founder-led pilots convert at plan, agencies begin contributing in Y2, and pricing expands modestly with usage.
    y3RevenueK: 1811.32
    y3EbitdaK: -677.85
    cashLowPointK: 71.33
    keyAssumptionChanges:
      - Gross adds follow the cadence in A9-A11.
      - Blended monthly revenue per merchant rises from $2.0K in early pilots to $3.0K in Y3.
      - Gross margin steps down only to 72% as the business remains software-first.
  upside:
    description: Pilot proof lands early, agencies accelerate adds, and accounts expand usage faster without materially higher service cost.
    y3RevenueK: 2290.0
    y3EbitdaK: -390.0
    cashLowPointK: 260.0
    keyAssumptionChanges:
      - Gross adds run about 20% above base from Q3Y2 onward.
      - Y3 blended monthly revenue per merchant reaches $3.3K.
      - Monthly churn improves to 1.0% after Y1.
