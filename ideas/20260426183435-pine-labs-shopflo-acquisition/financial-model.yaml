modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionMerchants
      ProductionMerchants --> SaaSAndUsageRevenue
      SaaSAndUsageRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by active merchants growing from 8.72 in Y1 to 76.69 in Y3 while blended monthly revenue per merchant expands from $2.0K to $3.0K.
  - checkName: Must go right
    finding: The model needs 50%+ pilot-to-production conversion and referenceable RTO reduction so agency referrals can supplement founder-led sales in Y2.
  - checkName: Model breaks if
    finding: Sensitivity shows cash turns negative before the end of Y3 if churn reaches 2.5% or the sales cycle slips by roughly one quarter.
  - checkName: Next-round proof
    finding: The next financing is justified if the company reaches 25-40 production merchants, proves pooled-data lift, and has a partner-backed guarantee pilot design ready.
sanityChecks:
  ruleOf40: Y3 growth 188.7% + EBITDA margin -37.4% = 151.3%
  burnMultiple: Y3 burn multiple 0.6x using net burn divided by net new revenue versus Y2
  revenuePerFte: $148K Y3 on average 12.25 FTE (below mature SaaS benchmark of $200-400K, but plausible pre-scale)
  flags:
    - Revenue per FTE remains below mature software benchmarks, so the next round still depends more on proof of underwriting lift than on pure efficiency.
    - The base case assumes merchants allow live checkout-policy changes and that at least half of paid pilots convert; either miss materially weakens the revenue ramp.
    - Gross margin is modeled at 72% in Y3 without a scaled guarantee book; if the market demands financial coverage earlier, margin could underperform.
