slug: adaptive-cod-underwriting
date: '2026-04-26'
executiveSummary: >-
  Adaptive COD Underwriting sells to Indian Shopify-centric D2C brands that
  still depend on cash on delivery and are losing margin to fake orders, failed
  deliveries, and high return-to-origin rates. The wedge is narrow: decide at
  checkout whether COD should be offered, whether a partial prepayment should be
  requested, and whether a risky order should be verified before release. This
  is a stronger entry point than generic checkout because the buyer already
  feels the pain in contribution margin and working capital, and Pine Labs'
  acquisition of Shopflo confirms checkout is becoming a strategic merchant
  control point. The first product should be software-first, with guarantees
  introduced only after the company proves approval quality and merchant
  selection discipline on pilot cohorts. Go-to-market should focus on 10,000+
  monthly order beauty and apparel brands with 40%+ COD share, sold through
  direct founder-led outbound plus Shopify agency referrals into urgent RTO
  situations. The company can win if it is materially better than rules-based
  alternatives on a simple proof point: lower RTO and higher prepaid mix without
  hurting checkout conversion. The biggest risk is not lack of customer pain;
  it is failing to show underwriting performance before bundled incumbents ship
  good-enough COD controls. A second unresolved risk is guarantee economics,
  which remain an operating assumption until the startup has enough historical
  approval and loss data plus an insurance or NBFC partner structure.
problem:
  - High-COD Indian D2C brands lose contribution margin to fake orders, failed deliveries, and RTO while still needing COD to preserve conversion.
  - Existing alternatives are fragmented across plugins, manual verification, carrier dashboards, and gateway tools that act after order placement or optimize payment completion instead of checkout-time risk selection.
solution:
  - Score each order at checkout using behavior, address, device, payment-intent, and prior outcome signals to decide whether to offer COD, require partial prepay, nudge prepaid, or trigger verification.
  - Give merchants a control center tied to business outcomes such as RTO avoided, prepaid mix shift, approval quality by cohort, and, once proven, optional loss protection on approved COD orders.
whyWeWin:
  - The product acts before fulfillment spend is committed, which is earlier than logistics tools and more economically explicit than generic checkout UX products.
  - A cross-merchant trust graph built from phones, addresses, pincodes, and delivery outcomes can improve approval quality over time if the company earns permission to pool learning.
  - Platform neutrality across gateways and carriers matters because merchants resist being forced into a single payment stack to solve a margin problem.
  - The guarantee can become a differentiated monetization and switching lever, but only after software pilots prove the underwriting engine is better than merchant rules.
strategicChoices:
  beachhead: Indian Shopify Plus fashion, beauty, and wellness brands doing 5,000 to 50,000 monthly orders with 30%+ COD share and persistent RTO above 15%.
  wedgeRationale: The beachhead has urgent, measurable pain, accessible decision-makers, and enough order volume to produce underwriting signal quickly. It creates faster proof than a broader all-checkout product because the ROI can be measured on avoided losses and prepaid uplift within one quarter.
  sequencingRationale: Start with checkout instrumentation, policy engine, and merchant dashboards so the company can prove conversion-safe RTO reduction on live cohorts before taking risk onto its own or a partner balance sheet. Sell founder-led into a narrow ICP first, use agencies and platform partners after the case studies exist, and hire risk operations only once pilots create a reliable approval and claims dataset.
  notYet:
    - Broad gateway orchestration across all payment methods before COD underwriting performance is proven
    - Returns-risk and post-purchase suite expansion before the checkout wedge has repeatable sales
    - SMB Shopify self-serve motion where app-store pricing would commoditize the product
    - Guarantee-first launch without merchant selection filters, loss caps, and external risk capacity
market:
  tam: $150M estimated annual software and workflow spend for Indian ecommerce and D2C brands with meaningful COD exposure.
  sam: $36M estimated annual spend from roughly 3,000 mid-market Indian D2C brands large enough to buy specialized checkout-risk tooling.
  som: $2.7M estimated year-three reachable revenue pool from about 150 focused merchants under a narrow partner-led GTM.
  segments:
    - Shopify-centric Indian mid-market D2C brands in fashion, beauty, and wellness with high COD mix
    - Digital-first retail brands with dedicated ecommerce operations teams and recurring failed-delivery pain
  buyingProcess: >-
    The economic buyer is usually the founder, COO, or VP/Head of Ecommerce,
    with operations and fraud teams as daily users and evaluators. Buying is
    most likely triggered by a spike in RTO or a checkout-stack refresh, and
    approval depends on a short pilot that proves margin improvement without
    lowering conversion.
product:
  mvp: >-
    Shopify checkout and post-order instrumentation, a rules-plus-model policy
    engine for selective COD and partial prepay, lightweight OTP or WhatsApp
    verification, and a merchant dashboard showing approval decisions, prepaid
    mix, RTO outcomes, and cohort-level lift. The MVP should not include a full
    guarantee book; at most it should support shadow underwriting and capped
    coverage experiments on a small approved subset.
  sixMonth: Launch 5 to 10 live pilots with checkout scoring, selective COD rules, prepaid nudges, verification workflows, and daily outcome reporting tied to RTO and conversion.
  twelveMonth: Add pooled trust signals, merchant policy templates by category and pincode, self-serve experiment controls, and partner-ready APIs for gateways, OMS, and carriers.
  twentyFourMonth: Expand into guarantee-backed approvals for qualified merchants, returns-risk scoring, and a reusable identity and address trust layer that supports adjacent commerce-finance products.
  keyBets:
    - Checkout-time decisions outperform post-order workflows on gross-margin impact.
    - Partial prepay and prepaid incentives can shift payment mix without damaging top-line conversion.
    - Cross-merchant data materially improves early onboarding performance versus merchant-only rules.
    - Merchants will share enough outcome data to create a compounding underwriting loop under DPDP-compliant terms.
gtm:
  wedge: Sell a 60- to 90-day margin-improvement pilot to high-COD Shopify Plus brands where the buyer already has a visible RTO problem and can approve checkout changes quickly.
  channels:
    - Founder-led outbound to Heads of Ecommerce, COOs, and founders at target D2C brands
    - Shopify agencies and implementation partners already installing checkout tooling
    - D2C operator communities and logistics or RTO-focused forums where pain is actively discussed
    - Select gateway, carrier, and app-ecosystem referrals after initial case studies exist
  funnelTargets: lead→qualified pilot 15–25%, pilot→production 50%+, production→referenceable account 60%+
  pricing: Monthly platform fee plus usage priced against protected or optimized COD GMV, with guarantee fees charged only on approved covered orders once loss ratios are validated. This matches how buyers budget the problem, because spend is justified from avoided RTO and prepaid uplift rather than generic software line items.
businessModel:
  revenueStreams:
    - SaaS subscription for underwriting workflow, analytics, and policy management
    - Usage-based fee on COD GMV evaluated or protected by the policy engine
    - Guarantee or loss-protection fee on approved covered orders for qualified merchants
    - Expansion revenue from returns-risk, identity, and payment-orchestration modules
  unitOfValue: COD GMV and order cohorts whose approval policy measurably changes RTO, prepaid share, and contribution margin
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more order volume within an account as the engine moves from one storefront or category to all cohorts
    - Introduce guarantee-backed approvals for merchants with clean operating behavior and proven model fit
    - Sell adjacent risk products such as returns-risk and serviceability decisioning using the same trust graph
    - Become an intelligence layer for gateway routing and merchant finance priced off verified order quality
strategyMap:
  northStarMetric: Contribution margin lift per live merchant cohort without a statistically significant decline in checkout conversion
  inputMetrics:
    - Percentage of eligible orders scored before fulfillment release
    - RTO reduction versus control cohorts
    - Prepaid or partial-prepay uplift versus control cohorts
    - Pilot-to-production conversion rate
    - Accuracy lift from pooled data versus merchant-only rules
  moatsToBuild:
    - Cross-merchant trust graph on phone, address, pincode, and outcome history
    - Merchant-specific policy tuning data tied to real delivery and cancellation outcomes
    - Risk selection discipline and claims history that support guarantee pricing
    - Ecosystem distribution through agencies, gateways, and logistics partners
  killCriteria:
    - If 10 pilot brands do not show at least 20% median RTO reduction or comparable gross-margin lift without conversion degradation after 2 pilot cycles, narrow the thesis or stop pursuing the underwriting wedge.
    - If merchants refuse pooled-data terms or data integrations are too fragmented to close the feedback loop within 90 days, the moat thesis weakens materially.
    - If guarantee partners will not quote viable structures after software proof, keep the business software-only and remove balance-sheet assumptions from the roadmap.
  mermaid: |
    flowchart LR
      Wedge[High COD D2C margin problem] --> MVP[Checkout underwriting MVP]
      MVP --> Proof[RTO reduction and prepaid uplift proof]
      Proof --> Expansion[Guarantee plus adjacent commerce risk products]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: High pain and a sharp wedge, but conviction depends on proving the startup can outperform bundled incumbents before launching guarantees.
    whyBelieve: The company targets an urgent, measurable margin problem at the checkout control point that recent market activity and merchant tooling both validate as strategic.
    whyDoubt: The market is crowded, substitutes are abundant, and the company has not yet proven that pooled underwriting and optional guarantees beat gateway and platform bundles.
    nextDiligence: Validate 3 to 5 design-partner commitments and inspect historical-order backtests showing conversion-safe RTO reduction on multi-merchant data.
  firstCustomer:
    title: Head of Ecommerce at a Shopify Plus beauty or apparel brand in India
    profile: A digital-first brand with 10,000+ monthly orders, 40%+ COD mix, double-digit RTO, and a team already running manual verification or crude COD rules.
    trigger: A quarter with rising failed deliveries, worsening contribution margin, or a checkout replatform that forces the team to revisit payment-policy logic.
    buyer: Founder, COO, or VP Ecommerce
    initialContract: 60- to 90-day paid pilot in the $8k-$20k range with explicit control-vs-treatment metrics, converting to a $18k-$40k annual software and usage contract if lift is proven.
  mustBeTrue:
    - At least half of qualified pilot brands must convert to annual production after a 60- to 90-day test.
    - Median pilot cohorts must show material RTO reduction or gross-margin lift without a statistically meaningful conversion decline.
    - Cross-merchant pooled data must outperform merchant-only rules early enough to matter in the first 30 to 60 days of onboarding.
    - Buyers must accept an outcome-based pricing model tied to COD GMV or protected orders rather than demand commodity app pricing.
    - Incumbent bundles must remain materially weaker on neutral underwriting or loss protection than the startup's focused workflow.
  diligenceQuestions:
    - Which exact order attributes are available at checkout across Shopify, gateways, OMS, and carriers on day one?
    - How does the team plan to measure conversion-safe RTO reduction in a way a skeptical COO will trust?
    - What merchant filters prevent adverse selection before any guarantee is introduced?
    - How much lift comes from pooled data versus merchant history in backtests across multiple categories?
    - Which agency, gateway, or logistics partners can repeatedly source the first 20 pilots?
  riskHeatmap:
    - risk: Incumbent bundling compresses differentiation before the startup proves superior underwriting.
      likelihood: High
      impact: High
      leadingIndicator: Prospects repeatedly say Razorpay, Cashfree, GoKwik, or Shopflo already solve enough of the problem to avoid a pilot.
      mitigation: Sell a narrower ROI case around neutral COD-risk decisions and publish pilot evidence before expanding feature scope.
    - risk: Adverse selection breaks guarantee economics.
      likelihood: Medium
      impact: High
      leadingIndicator: Early interested merchants have unusually poor historical RTO or demand full coverage before sharing data.
      mitigation: Start software-first, use merchant qualification thresholds, cap coverage tightly, and secure external risk capacity before scaling guarantees.
    - risk: Data cold start weakens model quality for new merchants.
      likelihood: Medium
      impact: High
      leadingIndicator: Pilot accuracy on new merchants is no better than simple rules during the first 30 days.
      mitigation: Use a rules-plus-model approach, seed with cross-merchant and pincode signals, and require rapid outcome ingestion from carriers and OMS tools.
    - risk: Merchants fear COD restrictions will hurt conversion.
      likelihood: High
      impact: Medium
      leadingIndicator: Pilot prospects insist on read-only analytics because they will not allow live checkout-policy changes.
      mitigation: Run tightly controlled A/B cohorts, start with marginal-risk segments, and present prepaid nudges as conversion optimization rather than COD removal.
    - risk: DPDP or security review slows deployments and blocks pooled learning.
      likelihood: Medium
      impact: Medium
      leadingIndicator: Security reviews stall beyond one sales cycle or prospects refuse pooled-data clauses.
      mitigation: Build explicit consent, data minimization, retention controls, and merchant-facing governance language from the start.
operatingAssumptions:
  - assumption: High-COD mid-market D2C brands will buy a software-first pilot before the guarantee exists.
    basis: research.yaml
    validationTest: Close at least 3 paid design-partner pilots using RTO and prepaid-lift ROI alone within the first 90 days of outreach.
    decisionImpact: If false, the company must either add stronger financial backing earlier or narrow to merchants with more acute pain and faster buying triggers.
  - assumption: Pooled cross-merchant data will improve approval quality enough to matter within the first 30 to 60 days of onboarding.
    basis: research.yaml
    validationTest: Backtest at least 1 million historical orders across multiple merchants and compare pooled versus merchant-only precision and loss outcomes.
    decisionImpact: If false, the moat shifts from network data to workflow execution, reducing long-term defensibility and pricing power.
  - assumption: Shopify agencies can become a repeatable source of qualified pilots after the first few reference accounts.
    basis: research.yaml
    validationTest: Sign 2 agency or implementation partners that each introduce at least 3 qualified ICP merchants in one quarter.
    decisionImpact: If false, customer acquisition stays founder-heavy longer and the plan should slow hiring for channel partnerships.
  - assumption: Partial prepay and prepaid nudges can raise prepaid mix without a meaningful drop in completed orders.
    basis: idea.yaml
    validationTest: Run controlled merchant experiments segmented by category, AOV, and pincode to confirm conversion stays within an agreed tolerance while prepaid share rises.
    decisionImpact: If false, the product should lean more on selective COD approval and verification than on payment-mix steering.
  - assumption: A partner structure for guarantee coverage will become available once software pilots show disciplined loss performance.
    basis: operator judgment
    validationTest: Obtain at least 2 insurer, NBFC, or reserve-structure proposals after pilot data exists, with viable loss corridors and exclusions.
    decisionImpact: If false, the company should remain a software and analytics business and remove guarantee-led expansion from fundraising claims.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Historical-order backtest across 3 to 5 design partners
    hypothesis: A checkout-time rules-plus-model engine can identify marginal COD orders better than each merchant's current policy.
    successMetric: Backtest shows at least 20% modeled RTO reduction or equivalent gross-margin lift on target cohorts without excluding too much good demand.
    owner: CEO and founding eng
  - horizon: 0–90 days
    experiment: Paid pilot offer and packaging test
    hypothesis: Buyers will sign a paid 60- to 90-day pilot if pricing is tied to measurable margin outcomes rather than generic SaaS seats.
    successMetric: Close 3 paid pilots with agreed control-vs-treatment measurement plans.
    owner: CEO
  - horizon: 0–90 days
    experiment: Integration-speed sprint for Shopify plus webhook-based OMS and carrier ingestion
    hypothesis: The team can deploy a merchant into live experimentation in under 2 weeks without a heavy services burden.
    successMetric: First two pilots go live within 14 days of contract signature.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Live A/B test of selective COD, partial prepay, and prepaid incentives
    hypothesis: A mixed policy approach outperforms blanket COD restriction on both margin and customer experience.
    successMetric: At least 2 pilot merchants show prepaid-share lift and lower RTO while conversion stays inside pre-agreed guardrails.
    owner: Product and customer success lead
  - horizon: 3–6 months
    experiment: Agency referral channel test
    hypothesis: Shopify agencies will refer the product when it shortens merchant time to value on checkout and RTO problems.
    successMetric: 2 partners each generate at least 1 live pilot and 1 additional qualified opportunity.
    owner: CEO
  - horizon: 6–12 months
    experiment: Pooled-data uplift test
    hypothesis: Cross-merchant trust signals materially improve new-merchant performance relative to merchant-only data.
    successMetric: Measured precision or approval-quality lift is large enough to justify pooled-data governance and differentiation claims.
    owner: Data lead
  - horizon: 6–12 months
    experiment: Guarantee design with external risk partner
    hypothesis: A capped approval cohort can be priced and covered economically once pilot loss data exists.
    successMetric: Receive at least 1 workable term sheet or pilot structure with acceptable exclusions and loss-sharing.
    owner: CEO and risk lead
operations:
  - Daily merchant-level review of approval decisions, false positives, and carrier outcomes to close the learning loop quickly.
  - Standardized Shopify, OMS, gateway, and carrier integration playbooks to keep implementation under 2 weeks.
  - A/B testing discipline with control cohorts, pre-agreed guardrails, and weekly ROI reviews with buyers.
  - Data governance processes covering consent language, retention, access controls, and merchant-specific data-sharing terms.
  - Partner management for agencies, logistics providers, and future risk carriers.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the checkout instrumentation, policy engine, and integration layer that makes pilot deployment and data capture possible.
  - role: CEO / founder seller
    startTiming: Month 0
    rationale: The first 10 customers require founder-led discovery, sales, pricing, and partner development anchored in measurable merchant ROI.
  - role: Product and customer success lead
    startTiming: Month 3
    rationale: Pilots need tight experiment design, merchant onboarding, and weekly results reviews to convert into production references.
  - role: Data / risk lead
    startTiming: Month 6
    rationale: Once pilots generate live outcome data, the company needs dedicated ownership of model quality, policy tuning, and loss analysis.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Agency, gateway, carrier, and risk-capacity relationships become leverage only after the first reference accounts exist.
milestones:
  - horizon: 0–12 months
    items:
      - Launch 5 to 10 paid pilots in the target ICP and convert at least 5 into annual production accounts.
      - Prove median RTO reduction or gross-margin lift on live cohorts without significant checkout conversion decline.
      - Reduce implementation time to under 2 weeks through repeatable integrations and playbooks.
      - Publish 3 referenceable case studies and sign the first 2 agency or ecosystem channel partners.
  - horizon: 12–24 months
    items:
      - Reach 25 to 40 production merchants concentrated in the same verticals and platform stack.
      - Demonstrate measurable uplift from pooled trust data versus merchant-only underwriting.
      - Launch qualified guarantee pilots with capped coverage and external risk capacity.
      - Add returns-risk and policy templates that increase expansion revenue within existing accounts.
  - horizon: 24–36 months
    items:
      - Become the default COD-risk layer for a focused share of Indian Shopify-centric D2C brands.
      - Expand into broader order-risk, payment-routing, and merchant-finance workflows priced off verified order quality.
      - Build a defensible trust graph and claims dataset that bundled checkout vendors cannot replicate quickly.
risks:
  - risk: Incumbents bundle good-enough COD controls before the startup proves superior underwriting.
    likelihood: High
    impact: High
    mitigation: Focus on a narrow ROI proof, stay gateway-neutral, and avoid broad platform features until the company has clear performance evidence.
  - risk: Adverse selection and poor merchant qualification make guarantee losses uneconomic.
    likelihood: Medium
    impact: High
    mitigation: Launch software-first, set merchant thresholds, cap coverage, and use external capacity rather than holding open-ended risk internally.
  - risk: Data fragmentation across checkout, OMS, and carriers slows learning loops and weakens model performance.
    likelihood: Medium
    impact: High
    mitigation: Start with minimal required integrations, standardize outcome ingestion, and use rules-plus-model policies until data quality improves.
  - risk: Merchants resist live checkout-policy changes because they fear conversion loss.
    likelihood: High
    impact: Medium
    mitigation: Use controlled experiments on marginal cohorts, show weekly results, and lead with measurable contribution-margin outcomes.
  - risk: Privacy and security requirements delay enterprise-style procurement and limit pooled-data terms.
    likelihood: Medium
    impact: Medium
    mitigation: Build explicit governance, consent, and data-minimization controls into product and sales materials from day one.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to build the core checkout-underwriting product, launch and service 10 to 20 pilots, prove conversion-safe margin lift, establish partner distribution, and determine whether guarantee economics justify a second-stage expansion.
