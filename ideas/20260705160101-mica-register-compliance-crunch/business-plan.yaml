slug: mica-counterparty-monitor
date: '2026-07-05'
executiveSummary: >-
  MiCA Counterparty Monitor should start as a workflow-grade permission and
  evidence layer for MiCA-authorized brokers and custodians in France,
  Germany, and the Netherlands that rely on multiple external CASPs across the
  EEA. The immediate pain is not winning a license; it is proving during each
  onboarding, renewal, and institutional diligence event that a counterparty's
  exact MiCA service scope and host-state coverage match the workflow being
  activated. ESMA's weekly CSV and national notices make the raw data
  available, but teams still reconcile legal-entity aliases, passport
  coverage, and service codes manually in spreadsheets, screenshots, and
  counsel memos. The MVP should therefore focus on daily ingestion,
  entity-resolution, service-taxonomy mapping, evidence snapshots, alerts, and
  a human-review queue embedded in onboarding or ticketing systems rather than
  trying to replace AML, Travel Rule, or transaction-monitoring stacks. This
  beachhead is narrower and faster to prove than a broad crypto-compliance
  suite because 59 of the 115 FR/DE/NL home-state CASPs already passport to 5+
  markets and are more likely to feel repeated counterparty-scope friction.
  The modeled beachhead is still small—about "$8.6M" of SAM and "$0.8M" of
  year-3 SOM for the initial slice—so the venture case depends on showing that
  the same control layer can expand into banks, asset managers, and
  multi-jurisdiction licensing workflows. The biggest evidence gap is how many
  of the 115 beachhead CASPs actually manage enough counterparties to buy a
  standalone system at roughly "$75k" ACV, and that must be validated before
  scaling headcount. The first 12 months therefore need to prove willingness
  to pay, measurable reduction in approval or evidence-pack labor, and
  external acceptance of the startup's evidence packs in standard diligence
  cases.
problem:
  - "Compliance teams at MiCA-authorized brokers and custodians still re-check counterparties through public registers, screenshots, and counsel memos, so onboarding and renewal decisions slow down while evidence goes stale."
  - "A counterparty can appear authorized yet still lack the exact service permission or host-state coverage a custody, exchange, or portfolio-management workflow assumes, creating revenue delay or regulatory exposure."
solution:
  - "Ingest ESMA and selected NCA updates, resolve legal entities to brands, and convert MiCA service codes plus passport data into workflow-specific approval logic for each monitored counterparty."
  - "Generate current evidence packs, alert on material register changes, and route ambiguous cases into human review inside onboarding, CRM, or ticketing systems before a partner is activated or renewed."
whyWeWin:
  - "The wedge is narrower than generic crypto compliance and more operational than legal research: a system of record for who can perform which MiCA service in which market before money moves."
  - "Historical delta logs, entity-alias resolution, and reusable service-policy mappings compound with every monitored counterparty in ways that raw registers and one-off legal memos do not."
  - "Adjacent vendors already own AML, Travel Rule, and KYB budgets, so the startup can win by embedding into their workflows instead of competing head-on as another broad suite."
strategicChoices:
  beachhead: "MiCA-authorized brokers and custodians in France, Germany, and the Netherlands that manage 8-20 external CASP counterparties across 3+ EEA markets and must re-check service scope before onboarding, renewal, or institutional diligence."
  wedgeRationale: "This slice creates faster proof than selling all crypto-compliance teams because the regulatory trigger is current, the buyer already owns partner-approval workflow, and one caught scope mismatch can justify the product faster than a broader analytics or AML pitch."
  sequencingRationale: "Start as an evidence and exception layer that plugs into existing onboarding, ticketing, and Travel Rule workflows because trust and adoption depend on reducing manual review without claiming autonomous legal judgment. Only after the product proves repeatable ACV and accepted evidence packs should the company deepen into hard workflow blocking, bank onboarding, and broader cross-border license intelligence; that ordering keeps product scope, hiring, and sales motion aligned with a small initial market."
  notYet:
    - "A full AML, KYC, or Travel Rule suite"
    - "Direct first-market selling to banks and asset managers before CASP proof exists"
    - "Automatic legal determinations on ambiguous Article 60 or Article 63 edge cases"
    - "Non-EEA licensing coverage beyond the first expansion experiments"
market:
  tam: "$20.9M estimated TAM based on 279 authorized CASPs at roughly $75k annual contract value per customer."
  sam: "$8.6M estimated beachhead SAM based on 115 Germany, France, and Netherlands home-state CASPs before filtering for complexity."
  som: "$0.8M modeled year-3 SOM based on 11 high-complexity beachhead customers at about $75k ACV."
  segments:
    - "Primary: MiCA-authorized brokers and custodians in France, Germany, and the Netherlands with repeated external-counterparty approval workflows"
    - "Secondary: banks, asset managers, fintechs, and licensing hubs such as Luxembourg or Ireland that need the same evidence layer after the CASP wedge proves out"
  buyingProcess: >-
    Deals usually start when a new counterparty, passport expansion,
    post-transition review, or institutional diligence request forces current
    permission proof into a controlled approval process. The operational
    champion is typically the head of compliance operations or onboarding, but
    the economic buyer is the CCO or COO because the decision determines who
    may be activated, renewed, or left live.
product:
  mvp: >-
    MVP covers weekly ESMA plus selected NCA ingestion, brand and legal-entity
    resolution, MiCA service-code mapping, evidence snapshots, alerts, and a
    manual-review queue that writes back to ticketing or CRM. It should
    auto-clear only unambiguous cases and escalate Article 60/63, passporting,
    and service-scope ambiguities instead of pretending to deliver autonomous
    legal advice.
  sixMonth: "Ship a design-partner release for one French or Dutch broker or custodian that monitors 10-40 counterparties, generates onboarding and renewal evidence packs, and records every exception with source snapshots."
  twelveMonth: "Convert 2-3 paid pilots into production accounts, add repeatable connectors for ticketing, CRM, and at least one Travel Rule or onboarding surface, and prove at least 50% faster evidence preparation or approval turnaround."
  twentyFourMonth: "Expand from CASP-to-CASP approvals into institutional diligence modules, bank onboarding, and the first adjacent licensing datasets while keeping MiCA permission control as the system of record."
  keyBets:
    - "Enough of the 115 FR/DE/NL home-state CASPs run complex cross-border counterparty networks to support roughly $60k-$90k ACV."
    - "Most standard diligence cases can be resolved with productized evidence and human review, without bespoke legal memos on every file."
    - "Buyers will accept an embedded evidence layer that complements existing analytics, KYB, and Travel Rule tools rather than waiting for those vendors to add a lightweight feature."
    - "Historical change tracking and policy mapping will create enough switching cost before ESMA or incumbents improve the raw data experience."
gtm:
  wedge: "Sell a paid pilot to a MiCA-authorized broker or custodian that is re-checking counterparties after July 1 or before a live institutional diligence event, then convert that pilot into an annual monitored-permission contract tied to regulated entities, counterparties, and approval workflows."
  channels:
    - "Founder-led direct outbound to CCOs, COOs, and heads of compliance operations at FR/DE/NL CASPs identified from the ESMA register"
    - "Referral and co-delivery motion with MiCA legal advisers and regulatory consultants who already help customers with passporting, filings, and edge-case reviews"
    - "Selective co-sell with Travel Rule, KYB, and onboarding vendors once the product has one reference deployment and a documented approval-time win"
  funnelTargets: "Target account→qualified workflow assessment 15-25%, assessment→paid pilot 25-35%, paid pilot→production 50%+, production→second-entity or bank-diligence expansion 40%+ within 12 months."
  pricing: >-
    Start with a paid pilot and setup package, then convert to an annual
    subscription priced by regulated entity, monitored counterparties, and
    active approval workflows, with target production ACV around "$60k-$90k"
    and additional setup fees for entity mapping and policy design. This
    matches the real unit of pain—the number of relationships and decisions a
    team must keep current—rather than user seats.
businessModel:
  revenueStreams:
    - "Annual subscription for regulated entities and monitored counterparty workflows"
    - "Setup and implementation fees for entity resolution, policy design, and workflow integration"
    - "Premium modules for institutional diligence packs, API access, and broader licensing coverage"
  unitOfValue: "Regulated entity and monitored counterparty workflow under active MiCA permission monitoring"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one regulated entity's onboarding queue to all entities, counterparties, and renewal workflows in the customer group"
    - "Add institutional diligence, audit-response, and counterparty evidence modules once the core approval record is trusted"
    - "Move from CASP buyers into banks, funds, and multi-jurisdiction licensing intelligence that reuse the same entity and permission graph"
strategyMap:
  northStarMetric: "Percentage of active counterparties with current workflow-specific MiCA evidence on file and no unresolved permission exception"
  inputMetrics:
    - "Qualified target accounts with a live onboarding, renewal, or institutional diligence trigger"
    - "Percentage of monitored counterparties resolved to the correct legal entity and brand"
    - "Time from approval request to evidence-pack completion"
    - "Percentage of ESMA or NCA changes matched to affected counterparties within 24 hours"
    - "Share of reviews handled with productized rules versus bespoke counsel escalation"
    - "Pilot-to-production conversion rate"
  moatsToBuild:
    - "Historical ESMA and NCA delta log tied to customer approval decisions and evidence snapshots"
    - "Legal-entity, brand, and service-taxonomy resolution dataset for MiCA counterparties"
    - "Reusable approval-policy library mapping MiCA permissions to real custody, exchange, transfer, and portfolio workflows"
  killCriteria:
    - "Fewer than 3 paid pilots signed after 12 months of focused selling into FR/DE/NL CASPs"
    - "The first 2 paid pilots fail to cut evidence-pack preparation or approval turnaround by at least 50% while catching at least 1 live permission or passport mismatch"
    - "More than 25% of standard counterparty files still require bespoke outside-counsel interpretation after the first 100 reviewed cases"
  mermaid: |
    flowchart LR
      Wedge[MiCA counterparty wedge] --> MVP[Permission graph and evidence MVP]
      MVP --> Proof[Faster approvals and caught scope mismatches]
      Proof --> Expansion[Bank diligence and broader license intelligence]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Real post-MiCA workflow pain, but the market is too small and adjacent competition too strong for a partner meeting until paid pilots prove enough counterparty density and expansion headroom."
    whyBelieve: "The company targets a specific control gap between public registers and existing crypto-compliance suites: workflow-ready proof of who may perform which service in which jurisdiction."
    whyDoubt: "A public-data substitute, legal edge-case ambiguity, and an initial SAM of only about $8.6M could trap the business in a narrow feature category before durable distribution forms."
    nextDiligence: "Verify 2 paid pilots, at least one accepted external evidence pack, and evidence that a meaningful share of target CASPs manage enough counterparties to justify roughly $75k ACV."
  firstCustomer:
    title: "Head of Compliance at a MiCA-authorized broker or custodian"
    profile: "A 20-100 person French or Dutch CASP operating across 3+ EEA markets, with 8-20 external custody, liquidity, or portfolio-management partners and recurring institutional diligence requests."
    trigger: "A new counterparty onboarding, renewal review, or due-diligence questionnaire after July 1 requires current proof of exact service scope and host-state coverage."
    buyer: "Chief Compliance Officer or COO"
    initialContract: "$25k-$40k paid pilot for one regulated entity and 10-30 monitored counterparties, converting to roughly $60k-$90k annual subscription plus setup if the workflow becomes the system of record for approvals and renewals."
  mustBeTrue:
    - "At least 20-30 of the 115 FR/DE/NL home-state CASPs manage enough cross-border counterparties and approval churn to buy a standalone permission workflow at roughly $75k ACV."
    - "The first production pilots reduce approval or evidence-pack labor by at least 50% while surfacing real permission or passport mismatches that manual checks miss."
    - "CCOs and COOs will fund this as a separate workflow layer instead of insisting that existing Travel Rule, KYB, analytics, or counsel relationships absorb the problem."
    - "Register-derived evidence packs and historical deltas will satisfy most standard bank, auditor, or institutional diligence requests without bespoke legal memos."
    - "The startup can win workflow position and proprietary mapping data before adjacent vendors or improved regulator tooling compress the wedge."
  diligenceQuestions:
    - "How many FR/DE/NL CASPs actually manage more than 10 external counterparties across 3+ EEA markets today?"
    - "Which approval surface creates the fastest proof and lowest security friction: ticketing, CRM, onboarding, or Travel Rule tooling?"
    - "What percentage of real counterparty files still need bespoke legal interpretation after productized service-scope mapping?"
    - "Will buyers pay standalone ACV in the $60k-$90k range, or does the product need to ride as an OEM or bundled module?"
    - "Do banks, asset managers, and auditors accept evidence packs built from register data plus change history, or do they still require custom legal opinions in most edge cases?"
operatingAssumptions:
  - assumption: "A meaningful minority of the 115 FR/DE/NL home-state CASPs operate enough counterparties and passporting complexity to support standalone software spend."
    basis: research.yaml
    validationTest: "Interview 20 target accounts, collect anonymized counterparty counts and market footprints, and confirm at least 8-10 fit the high-complexity ICP."
    decisionImpact: "If false, narrow the ICP to passporting-heavy brokers or custodians only, or shift the expansion plan toward banks and institutional onboarding much earlier."
  - assumption: "Standard diligence requests can usually be closed with register-derived evidence packs plus human review, not bespoke legal memos."
    basis: research.yaml
    validationTest: "Collect 10 real diligence or audit requests from design partners and confirm that at least 70% close using product output without outside-counsel drafting."
    decisionImpact: "If false, the product becomes a services-heavy compliance layer and pricing, gross-margin expectations, and hiring plans must change."
  - assumption: "Buyers will approve a separate budget line for permission monitoring because it reduces operational risk and manual approval work."
    basis: research.yaml
    validationTest: "Run 12 pricing conversations and secure at least 3 paid pilots above $25k with a stated path to $60k-$90k annual production pricing."
    decisionImpact: "If false, pursue OEM or partner distribution earlier and deprioritize direct standalone sales."
  - assumption: "Weekly ESMA cadence, supplemented with selected NCA checks, is timely enough for most approval and renewal workflows."
    basis: research.yaml
    validationTest: "Backtest 90 days of ESMA and national notices at one design partner and measure how often source lag would have changed an approval decision."
    decisionImpact: "If false, the company must invest sooner in deeper NCA coverage, stale-data warnings, and higher-touch operations."
  - assumption: "Adjacent Travel Rule, KYB, and analytics vendors will partner or tolerate the layer long enough for the startup to win reference accounts."
    basis: operator judgment
    validationTest: "Run 8 partnership conversations and secure at least 1 co-sell or integration agreement before the first 4 production customers."
    decisionImpact: "If false, the company must rely on direct distribution longer and emphasize standalone workflow depth over partnership-led scale."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Complex-counterparty ICP validation"
    hypothesis: "A meaningful subset of FR/DE/NL CASPs already run enough counterparties and cross-border activity to justify standalone permission software."
    successMetric: "20 interviews completed and at least 8-10 accounts match the target ICP with stated budget authority."
    owner: "Founder CEO"
  - horizon: "0–90 days"
    experiment: "Concierge evidence-pack backtest on historical counterparty files"
    hypothesis: "The startup can cut evidence prep time materially before full automation by mapping current counterparty files into a repeatable permission graph."
    successMetric: "50 historical files processed with at least 50% less analyst time and at least 3 non-obvious service-scope or passport exceptions found."
    owner: "Compliance domain lead"
  - horizon: "90–180 days"
    experiment: "ESMA plus NCA freshness and delta monitor"
    hypothesis: "Weekly central-register updates plus selected national notices are sufficient to flag material permission changes quickly enough for the beachhead."
    successMetric: "At least 95% of material register changes detected and matched to affected counterparties within 24 hours of source publication."
    owner: "Founding eng"
  - horizon: "90–180 days"
    experiment: "Paid pilot embedded in onboarding or renewal queue"
    hypothesis: "Workflow embedding, not dashboard visibility alone, is what converts interest into budget and measurable ROI."
    successMetric: "First paid pilot cuts approval turnaround or evidence-pack prep by at least 50% and converts at least 1 manual-review escalation into a caught mismatch before go-live."
    owner: "Founder CEO"
  - horizon: "6–12 months"
    experiment: "Institutional diligence acceptance test"
    hypothesis: "Banks, auditors, or institutional clients will accept the evidence pack in standard cases if it includes source snapshots and change history."
    successMetric: "At least 2 external diligence requests closed using the product output without bespoke memo drafting."
    owner: "Product / integrations lead"
  - horizon: "12–18 months"
    experiment: "Advisor and adjacent-vendor channel test"
    hypothesis: "Legal advisers and adjacent compliance vendors can source opportunities without forcing the product into low-margin services work."
    successMetric: "At least 3 qualified partner-sourced opportunities or 1 signed co-sell agreement by month 18."
    owner: "Partnerships / customer success lead"
operations:
  - "Run weekly ESMA and selected NCA ingestion QA, including stale-record flags, delta review, and evidence snapshot retention."
  - "Maintain a counsel-approved rulebook and manual review queue for Article 60, Article 63, passporting, and service-scope ambiguities."
  - "Track approval turnaround, evidence-pack labor, exception rates, and caught mismatches as one operating dashboard by customer and counterparty."
  - "Package repeatable implementation playbooks for ticketing, CRM, onboarding, and Travel Rule connectors before expanding product scope."
  - "Store every approval decision, source snapshot, and follow-up change alert in an audit-ready evidence log."
team:
  - role: "Founder CEO"
    startTiming: "Month 0"
    rationale: "Owns founder-led sales, ICP qualification, pilot packaging, and early partner development while the category is still being defined."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Builds the ESMA and NCA ingestion pipeline, entity graph, alerting, and the first repeatable workflow connectors."
  - role: "Compliance domain lead"
    startTiming: "Month 1"
    rationale: "Designs the service taxonomy, evidence rules, manual-review playbook, and customer-facing policy configuration needed to stay out of generic legal-advice territory."
  - role: "Product / integrations lead"
    startTiming: "Month 4"
    rationale: "Turns pilot workflows into reusable onboarding, ticketing, and evidence-pack product surfaces once the first account proves demand."
  - role: "Partnerships / customer success lead"
    startTiming: "Month 9"
    rationale: "Owns advisor and adjacent-vendor channels plus implementation discipline after the first reference deployment exists."
milestones:
  - horizon: "0–12 months"
    items:
      - "Close 2-3 paid pilots in FR/DE/NL CASPs with active onboarding or diligence triggers."
      - "Launch the first repeatable permission-graph workflow covering 10-40 monitored counterparties and at least one ticketing or CRM integration."
      - "Prove at least 50% faster evidence preparation or approval turnaround and close at least one external diligence request with product output."
  - horizon: "12–24 months"
    items:
      - "Convert 3-5 pilots into annual production contracts and monitor more than 100 counterparties across the live base."
      - "Add reusable Travel Rule or onboarding integrations plus an institutional diligence module."
      - "Secure 1-2 advisor or adjacent-vendor channel partners that each produce qualified opportunities."
  - horizon: "24–36 months"
    items:
      - "Reach 8-12 production customers and prove expansion from CASP approvals into bank, fund, or auditor-facing diligence workflows."
      - "Add the first non-MiCA licensing datasets or jurisdictions that reuse the same entity and permission graph."
      - "Demonstrate that expansion modules lift ACV beyond the initial roughly $75k beachhead level without turning the company into a services business."
risks:
  - risk: "The beachhead is smaller or operationally simpler than expected because too few FR/DE/NL CASPs manage enough cross-border counterparties."
    likelihood: High
    impact: High
    mitigation: "Qualify ICP density before hiring ahead of demand, focus first on passporting-heavy brokers and custodians, and test bank or institutional-onboarding expansion early."
  - risk: "Buyers treat the product as a thin wrapper around public data or wait for existing compliance vendors to bundle similar capability."
    likelihood: High
    impact: High
    mitigation: "Win on workflow embedding, evidence history, and accepted diligence outputs rather than raw data access, and pursue selective co-sell relationships with adjacent tools."
  - risk: "Service-scope and Article 60/63 edge cases require too much bespoke legal interpretation to productize profitably."
    likelihood: High
    impact: High
    mitigation: "Keep human review in scope, codify only unambiguous rules first, and use counsel-approved playbooks to define what the product will not decide automatically."
  - risk: "Weekly ESMA updates and national notice timing are too inconsistent for customers to trust automated approval decisions."
    likelihood: Medium
    impact: Medium
    mitigation: "Cross-check multiple official sources, flag stale records, and start in evidence-pack and alert mode before offering harder workflow blocks."
  - risk: "Enterprise sales cycles stay too trust-heavy and reference-dependent to reach enough customers before the wedge is copied."
    likelihood: Medium
    impact: High
    mitigation: "Keep the first offer narrow and trigger-driven, use paid pilots as the proof object, and add advisor referrals before building a larger direct sales team."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 months buys a five-person founding team, a counsel-backed MiCA rulebook, 2-3 paid design partners, repeatable workflow integrations, and enough proof to decide whether the company can expand beyond the initial CASP beachhead."
