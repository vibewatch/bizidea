reportMemo:
  executiveTakeaways:
  - 切口确实存在，但首个市场比“欧盟加密合规”这类大叙事小得多：ESMA 当前的 CASP 文件里只有 279 家唯一获授权实体，其中德国、法国和荷兰本土注册的只有 115 家，持有交易平台权限的仅 18 家 [3]。
  - 痛点不在有没有信息，而在能不能把流程跑通：ESMA 已经每周发布 CSV，NCA 也会公布表格、通行通知和持续报告义务，但团队在放开交易对手方之前，仍得把服务代码、东道国覆盖、法律实体别名和具体工作流所需权限一一对齐 [2][3][4][20][24][25][30]。
  - 预算只有产品嵌进现有合规动作里才会打开。Notabene 2024 年调研显示，47% 的受访者在牌照申请时需要证明 Travel Rule（转账规则）合规，64% 会在交易前做尽调；与此同时，Chainalysis、Elliptic、Notabene 和 Sumsub 已经在向同一买方销售筛查、分析、Travel Rule 和 KYB 工具 [51][63][75][78][97]。
  - 来自相邻厂商和“公共注册库 + 表格 + 截图 + 法律备忘录”这套免费替代方案的竞争都很强。真正的空白更窄：一张 MiCA 专属图谱，回答某个法律实体能在某个司法辖区做哪项服务，并附带可直接使用的证据和变更历史 [2][3][51][63][75][97]。
  - 这个项目能不能跑成风险投资级别，取决于能否走出 CASP。MiCA 确实给了一个可信滩头市场，但如果不扩到银行、稳定币发行方和更广义的多司法辖区牌照工作流，眼前的 SAM 大概率只有个位数百万美元 [3][33][45]。
  marketDefinition: 这是一个面向 MiCA 监管下加密公司的工作流级授权与交易对手方权限层。它夹在原始注册库和现有 AML、Travel Rule（转账规则）栈之间，把 ESMA 和各国 NCA 的记录、服务代码、通行通知与转账数据义务，翻成托管、兑换、转账、交易和投资组合管理工作流里的准入信号 [2][3][4][15][24][30][75][83]。
  customerAndBuyer: 日常用户是合规运营或准入经理，他们在激活交易对手方前必须证明对方当前状态没问题；真正掏钱的一般是 CCO、COO 或合规负责人，因为授权质量、通行通知、管理层适格性和牌照后的持续报告，都在受监管的监督流程里，而不是临时性的运营动作 [18][23][24][25][30][33][35]。
  buyingTriggers:
  - point: 新交易对手方准入或跨境扩张，会逼着团队在激活前证明对方究竟持有哪些 MiCA 服务资质、覆盖哪些东道国。
    sourceRefs:
    - 20
    - 24
    - 30
  - point: 过渡期截止、清退计划或注册库更新，会让团队必须马上重查哪些服务商还能合法服务欧盟客户。
    sourceRefs:
    - 18
    - 33
    - 42
  - point: 牌照复核、机构尽调问卷或 Travel Rule 审计，会要求企业拿出交易对手方和控制措施仍然有效、且发生在交易前的证据。
    sourceRefs:
    - 33
    - 35
    - 78
    - 79
  willingnessToPay:
    summary: '公开定价信息不多，但预算确实存在：受监管加密公司已经在向 Chainalysis、Elliptic、Notabene 和 Sumsub 采购报价制的加密合规、筛查、Travel Rule 和 KYB 产品，Notabene 的调研又显示，47% 的受访者在牌照申请时必须证明 Travel Rule 合规。这说明工作流级权限层有付费空间，但买方会希望它替代手工查注册库、拼证据包或反复找外部律师，而不是再多一个仪表盘。'
    sourceRefs:
