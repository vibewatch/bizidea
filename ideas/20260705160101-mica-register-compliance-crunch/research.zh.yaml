  regulatoryLandscape: MiCA 把授权和跨境通行统一了，但真正的流程依然分层。只有已获授权的 CASP 或符合 Article 60 条件的金融实体才能提供服务；各成员国过渡期长短不同；ESMA 的注册库每周更新；而欧盟《Transfer of Funds Regulation》又给汇款人与收款人数据加上义务，把企业推向交易前核查，而不是一年查一次牌照 [2][15][18][24][30][33][75][83]。
  technologyLandscape: '原始数据底座已经成形：ESMA 发布的 CSV 已包含所属母国、法律实体、服务代码、东道国和最近更新时间等字段 [2][3][4]。技术难点不是爬一个网页，而是把品牌和法律实体对上，把 MiCA 服务代码翻译成客户工作流，给注册库变化做版本管理，再把决策写回 Chainalysis、Elliptic、Notabene 和 Sumsub 已经卖进来的筛查、Travel Rule、KYB 与工单系统 [51][63][75][97]。'
  distributionChannels:
  - point: 直接卖给德国、法国和荷兰已获授权或在申请中的 CASP，是最清晰的路径，因为这些地方的 MiCA 监管已经是董事会层面的议题。
    sourceRefs:
    - 3
    - 18
    - 35
  - point: 通过分析、Travel Rule 和 KYB 厂商联合销售，能缩短部署周期，因为这些工具本来就嵌在交易前或准入流程里。
    sourceRefs:
    - 51
    - 63
    - 75
    - 97
  - point: MiCA 申请顾问和预审项目是不错的线索入口，因为监管方一直强调尽早沟通和高质量申报包。
    sourceRefs:
    - 23
    - 30
    - 33
  partnershipEcosystem:
  - point: 区块链分析和 Travel Rule 厂商是天然伙伴，因为 CASP 已经靠它们做钱包筛查、KYT、VASP 识别和交易前检查。
    sourceRefs:
    - 52
    - 53
    - 76
    - 79
  - point: 专项法律与监管顾问很关键，因为 Article 60 通知和 Article 63 授权之间的界线，依然需要细致界定服务范围和申报质量。
    sourceRefs:
    - 18
    - 23
    - 30
    - 33
  - point: 准入与报告系统也很重要，因为企业拿到授权后，仍得持续维护通行、报告和重大变更义务。
    sourceRefs:
    - 24
    - 25
    - 38
  dataMoats:
  - point: 跨每周 ESMA 文件和各国通知的历史差分日志会越来越值钱，因为公开注册库默认不给工作流可用的变更历史。
    sourceRefs:
    - 2
    - 3
    - 4
  - point: 法律实体与品牌映射很难，因为 Travel Rule 运营方至今仍经常搞不清对手钱包背后到底是哪家 VASP 或法律实体。
    sourceRefs:
    - 76
    - 77
    - 81
  - point: 一旦客户把哪些服务组合会真正卡住准入这套规则调顺，把法律服务代码映射成工作流策略，就会沉淀成可复用的审批逻辑。
    sourceRefs:
    - 3
