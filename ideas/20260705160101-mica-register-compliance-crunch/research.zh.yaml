  sensitivityCases:
  - case: ESMA 或各国 NCA 提升注册库 UX、API 或字段丰富度的速度快于预期
    impact: 数据标准化这层护城河会被压缩，所以创业公司必须靠工作流嵌入、历史记录和证据处理取胜，而不是靠拿数据。
    sourceRefs:
