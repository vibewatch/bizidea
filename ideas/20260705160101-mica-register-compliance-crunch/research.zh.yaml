    - 94
  geographicConsiderations:
  - point: 德国、法国和荷兰是最好的第一刀，因为在当前 ESMA 文件里，这三地合计有 115 家本土注册 CASP。
    sourceRefs:
    - 3
  - point: 整个欧盟内部的过渡期紧迫度并不一样——法国到 2026 年 7 月 1 日、爱尔兰到 2025 年 12 月 30 日，其他一些国家窗口更短——所以必须按各国截止日排优先级。
    sourceRefs:
