    - 97
  - case: 115 家滩头客户里，真正管理足够多跨境交易对手方的只占少数
    impact: 初始 SAM 会缩小，项目要更早靠扩到银行、基金和更广义的牌照情报才撑得住。
    sourceRefs:
    - 3
