  competitiveLandscape: 相邻市场大致分成三类：区块链分析、Travel Rule 与交易对手方网络、以及 KYB / 准入套件。默认替代方案仍是监管机构的公开注册库，加上表格、截图和法律备忘录。真正的空白不是泛泛的“加密合规”，而是在资金动起来之前，先把“哪个法律实体能在什么司法辖区做哪项 MiCA 服务”这件事判清楚 [2][3][51][63][75][97]。
  incumbentThesis:
  - incumbentClass: 区块链分析套件
    point: Chainalysis 和 Elliptic 能识别高风险钱包、实体与交易模式，但它们并不把自己定位成 MiCA 权限图谱或跨境通行审计轨迹的权威来源。
    sourceRefs:
    - 51
    - 52
    - 53
    - 63
    - 64
  - incumbentClass: Travel Rule 网络
    point: Notabene 最强的场景，是流程从转账消息与交易对手方 VASP 尽调开始的那一刻；但它的公开材料更聚焦 Travel Rule 数据交换和 VASP 识别，而不是跨交易对手方、覆盖完整 MiCA 服务范围历史。
    sourceRefs:
    - 75
    - 76
    - 77
    - 79
    - 81
  - incumbentClass: KYB 与准入套件
    point: Sumsub 已经销售加密准入、Travel Rule、监控和企业验证，但这套产品更像广义身份与合规基础设施，不是监管级 MiCA 权限层。
    sourceRefs:
    - 94
    - 97
    - 98
    - 99
  - incumbentClass: 监管机构与原始注册库
    point: ESMA、各国 NCA 和官方表格是最原始的真相来源，但它们负责公布记录和处理通知，不会替运营方解决实体别名、历史变化或具体工作流审批逻辑。
    sourceRefs:
