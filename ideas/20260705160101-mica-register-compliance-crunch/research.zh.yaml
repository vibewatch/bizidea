    - 4
  - case: 相邻的 Travel Rule、分析或 KYB 厂商扩展到 MiCA 权限图谱
    impact: 如果产品在服务范围逻辑、历史差分和可审计证据包上没有明显更深，独立产品的差异化就会变弱。
    sourceRefs:
