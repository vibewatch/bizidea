  validationPlan:
  - priority: high
    question: 德国、法国和荷兰的 CASP 里，到底有多少家在 3 个以上 EEA 市场管理 10 家以上外部交易对手方？
    evidenceToGather: 访谈 20 个共创客户候选，收集匿名交易对手方清单、准入检查表和市场覆盖情况。
  - priority: high
    question: 注册库变化或服务范围不匹配，到底多常会真的制造出准入或续约例外？
    evidenceToGather: 在两个共创客户处回测 90 天的新老交易对手方，记录每一次注册库核查、歧义和升级处理。
  - priority: medium
    question: 机构银行和资管会接受基于注册库的证据包，还是在边缘情况里仍然要求定制法律意见？
    evidenceToGather: 收集一家银行、一家资管和一家审计机构的尽调请求，对比真正能把请求关掉的证据是什么。
  - priority: medium
    question: Article 60 和 Article 63 的范围界定，能不能产品化，同时又不让客户把软件当成法律意见？
    evidenceToGather: 让专业律师审阅 25 个真实场景，标注哪些能自动化、哪些需要人工复核、哪些必须保留法律判断。
