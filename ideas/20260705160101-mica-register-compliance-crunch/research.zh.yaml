    rationale: ESMA 文件中德国、法国和荷兰共有 115 家本土 CASP；115 × $75k ≈ $8.6M，且还没按复杂度继续筛。
    isEstimate: true
    sourceRefs:
    - 3
  som:
    value: $0.8M
    rationale: 第 3 年可触达情形是假设拿下 11 个滩头客户，每家 ACV 为 $75k；只有产品真正嵌进跨境通行和交易前尽调流程，这个数字才站得住。
    isEstimate: true
    sourceRefs:
    - 3
    - 24
    - 78
bottomUpSizingDrivers:
- driver: 可服务总单位
  value: ESMA 当前文件里的 279 家唯一获授权 CASP
  source: '[3] 计算'
- driver: 滩头单位
  value: 德国、法国和荷兰的 115 家本土 CASP
  source: '[3] 计算'
- driver: 高复杂度滩头子集
  value: 在 5 个以上市场完成跨境通行的 59 家法德荷企业
  source: '[3] 计算'
- driver: 假设年合同额
  value: 每个客户 $75k
  source: 基于 [51][63][75][97] 中报价制企业销售模式的估算
categoryDynamics:
  growthRate: 过渡期后的第一轮 ESMA 刷新新增了 37 家 CASP；当前 CSV 显示共有 279 家唯一获授权实体，其中 18 家持有交易平台权限。
  growthRateSourceRefs:
  - 3
  - 42
  tailwinds:
  - point: ESMA 注册库现在是每周更新、字段机器可读的运营数据集，包含服务项和东道国字段。
    sourceRefs:
    - 2
    - 3
    - 4
  - point: Travel Rule 以及受益人/汇款人义务，会把加密公司推向交易前交易对手方核查。
    sourceRefs:
    - 15
    - 75
    - 79
    - 83
  - point: MiCA 正把传统金融和全球平台拉进同一套欧洲经济区（EEA）监管框架，交易对手方尽调需求随之上升。
    sourceRefs:
    - 42
    - 45
  headwinds:
  - point: 底层注册库是公开的，买方一开始可能低估工作流软件的价值。
    sourceRefs:
    - 2
    - 3
  - point: 现有分析、Travel Rule 和 KYB 套件已经在争抢同一个买方和集成预算。
    sourceRefs:
    - 51
    - 63
    - 75
    - 97
  - point: 有些服务可以走 Article 60 通知，或者需要细致法律解释，这限制了彻底自动化。
    sourceRefs:
    - 18
    - 30
    - 33
competitors:
- name: Chainalysis
  stage: 在位企业
  wedge: 区块链分析、KYT、制裁筛查，以及广义加密合规工作流。
  pricing: 抓取页面未披露公开价格。
  strength: 强在交易监控和钱包风险基础设施，合规团队已经信任。
  weaknessVsUs: 不主打 MiCA 专属法律实体权限图谱、跨境通行历史或审批证据工作流。
  sourceRefs:
  - 51
  - 52
  - 53
- name: Elliptic
  stage: 在位企业
  wedge: 面向加密合规团队的钱包筛查、实体尽调和调查工具。
  pricing: 抓取页面未披露公开价格。
  strength: 相比多数分析厂商，对交易对手方和实体尽调的公开定位更深。
  weaknessVsUs: 仍被框成分析和尽调工具，而不是 MiCA 服务范围控制平面。
  sourceRefs:
  - 63
  - 64
  - 67
- name: Notabene
  stage: 成长期
  wedge: Travel Rule 合规、VASP 识别与交易对手方尽调。
  pricing: 抓取页面未披露公开价格。
  strength: 在交易前交易对手方核查和 VASP 识别上的公开叙事最接近本项目。
  weaknessVsUs: 重点是 Travel Rule 消息与 VASP 识别，不是完整 MiCA 权限映射和跨境通行证据管理。
  sourceRefs:
  - 75
  - 76
  - 79
- name: Sumsub
  stage: 成长期
  wedge: 更大身份合规套件里的 KYB、准入、Travel Rule 和加密监控。
  pricing: 抓取页面未披露公开价格。
  strength: 准入覆盖广，企业验证工具包能早早卡进审批流程。
  weaknessVsUs: 更像广义合规套件，不是监管级 MiCA 权限历史和服务覆盖逻辑。
  sourceRefs:
  - 94
  - 97
  - 98
  - 99
regulatoryTechnicalConstraints:
- point: ESMA 每周更新中央注册库，不是实时更新，所以必须管理中央注册库的时滞。
  sourceRefs:
  - 2
  - 3
- point: Article 60 通知和 Article 63 授权从外面看可能很像，但对应的权限逻辑并不一样。
  sourceRefs:
  - 18
  - 20
  - 30
  - 33
- point: Travel Rule 对汇款人和受益人的义务，意味着权限检查必须连到真实交易流，而不只是实体主数据。
  sourceRefs:
  - 15
  - 75
  - 83
validationSignals:
- point: 过渡期后的首轮刷新新增 37 家 CASP，总量拉到 280，说明注册库变化足够快，值得持续监控。
  sourceRefs:
  - 42
- point: Notabene 2024 年调研发现，47% 的受访者在牌照申请中必须证明 Travel Rule 合规，64% 会在交易前做尽调。
  sourceRefs:
  - 78
- point: Central Bank of Ireland 指出，CASP 授权比 VASP 注册的范围大得多，而且没有简化评估流程。
  sourceRefs:
  - 33
openQuestions:
- 德国、法国和荷兰这 115 家本土 CASP 里，到底有多少家在 3 个以上 EEA 市场管理 10 家以上外部交易对手方，而不是只跑更简单的本地流程？
- ESMA 的每周文件相对各国注册库变化，究竟会滞后到什么程度，才会真的带来审批风险？
- 机构银行和资管会接受基于注册库的证据包，还是在服务范围边缘案例里仍会坚持要定制法律意见？
- Article 60 通知逻辑能否安全产品化，同时又不让买方把软件当成法律意见？
