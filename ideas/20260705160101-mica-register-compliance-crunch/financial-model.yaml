slug: mica-counterparty-monitor
date: "2026-07-05"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-05] the operating model starts in the first full month after the dated business plan."
  - id: A2
    name: Opening cash / pre-seed raise
    value: "$2.2M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] the base case uses the low end of the stated range because hiring stays deliberately lean until production proof appears."
  - id: A3
    name: Starting paying accounts
    value: "0"
    unit: count
    source: "[BP product.sixMonth + BP milestones 0-12 months] the company starts pre-revenue and must first close paid pilots."
  - id: A4
    name: Paying account definition
    value: "A paid pilot or production deployment for one regulated entity's monitored MiCA approval workflow."
    unit: definition
    source: "[BP businessModel.unitOfValue + BP gtm.wedge] customersEop counts any account already paying for monitored permission workflow scope."
  - id: A5
    name: Paid pilot package economics
    value: "$30K over about 3 months (~$10K per month)"
    unit: USD/account
    source: "[BP investorMemo.firstCustomer.initialContract $25k-$40k paid pilot] the base case uses the midpoint of the pilot range."
  - id: A6
    name: Production and expansion revenue per average paying account
    value: "Y2 blended monthly revenue per average account rises from $7.0K to $7.9K; Y3 rises from $8.0K to $8.6K, or about $100K annualized on the Y3 average base."
    unit: USD/account/year
    source: "[BP gtm.pricing target production ACV $60k-$90k + BP businessModel.revenueStreams + BP market.som roughly $75k ACV] subscription ACV stays inside the stated range while setup and premium diligence modules lift realized revenue."
  - id: A7
    name: Customer ramp
    value: "4 paying accounts by M12, 7 by Q4Y2, and 11 by Q4Y3."
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP product.twelveMonth/twentyFourMonth + Research market.som 11 customers] the model tracks the top end of the stated year-3 customer milestone."
  - id: A8
    name: Revenue recognition convention
    value: "Revenue equals average paying accounts multiplied by blended monthly revenue per average account for each period."
    unit: formula
    source: "[BP gtm.pricing + BP businessModel.unitOfValue] this keeps revenue directly traceable to account count and packaging assumptions."
  - id: A9
    name: Gross margin ramp
    value: "46%-56% in Y1, 60%-69% in Y2, and 71%-74% in Y3."
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on evidence packs versus bespoke legal work] the model only reaches low-70s gross margin once workflow reuse reduces manual review drag."
  - id: A10
    name: Hiring timeline
    value: "M1 founder CEO, founding engineer, and compliance lead; M4 product/integrations lead; M9 partnerships/customer success; M31 second engineer."
    unit: timeline
    source: "[BP team + BP risks] the base case keeps the five-role founding team intact through Q4Y2 and adds the first scale engineer only after production proof in order to avoid hiring ahead of a small initial market."
  - id: A11
    name: Founder / CEO loaded compensation
    value: "$140K"
    unit: USD/FTE/year
    source: "[BP team Founder CEO + startup-finance heuristic] founder pay stays lean at pre-seed stage while covering payroll taxes and benefits."
  - id: A12
    name: Engineering loaded compensation
    value: "$170K"
    unit: USD/FTE/year
    source: "[BP team Founding eng + startup-finance heuristic] assumes a senior data/integration engineer in a Europe-focused startup compensation band."
  - id: A13
    name: Compliance / policy loaded compensation
    value: "$150K"
    unit: USD/FTE/year
    source: "[BP team Compliance domain lead + startup-finance heuristic] reflects a senior domain lead who owns rulebooks, review playbooks, and policy configuration."
  - id: A14
    name: Product / integrations loaded compensation
    value: "$140K"
    unit: USD/FTE/year
    source: "[BP team Product / integrations lead + startup-finance heuristic] reflects a senior product/integration owner without assuming a broad product org."
  - id: A15
    name: Partnerships / customer success loaded compensation
    value: "$130K"
    unit: USD/FTE/year
    source: "[BP team Partnerships / customer success lead + startup-finance heuristic] includes travel and variable pay for a narrow founder-assisted enterprise motion."
  - id: A16
    name: Second engineer loaded compensation
    value: "$170K"
    unit: USD/FTE/year
    source: "[BP product.twentyFourMonth + startup-finance heuristic] the first scale engineering hire matches the founding engineer cost because the work is still specialized."
  - id: A17
    name: Payroll allocation to P&L lines
    value: "Founder 70% S&M and 30% G&A; engineers 100% R&D; compliance lead 65% R&D and 35% G&A; product/integrations 50% S&M and 50% R&D; partnerships/customer success 85% S&M and 15% G&A."
    unit: allocation
    source: "[BP team role rationales + BP operations] payroll is mapped into the functional lines used in the operating model."
  - id: A18
    name: Non-payroll operating spend ramp
    value: "$12K/mo in early Y1, $15K/mo in M4-M6, $18K/mo in M7-M9, $20K/mo in Q4Y1, then $21K-$24K/mo through Y2 and $25K-$28K/mo through Y3."
    unit: USD/month
    source: "[BP fundingAsk.useOfFundsSummary + BP operations + startup-finance heuristic] covers cloud, legal counsel, insurance, travel, data QA, and integration support without large paid-demand programs."
  - id: A19
    name: Cash conversion convention
    value: "Cash movement equals EBITDA."
    unit: formula
    source: "[startup-finance heuristic] capex, debt service, taxes, and working-capital timing are assumed immaterial at this pre-seed scale."
  - id: A20
    name: Monthly logo churn
    value: "2.0%"
    unit: percent per month
    source: "[startup-finance heuristic for early enterprise workflow SaaS + BP expansionLevers] annual approvals and workflow embedding support low churn, but the model stays conservative because the wedge is narrow."
  - id: A21
    name: CAC convention
    value: "Y2-Y3 sales and marketing spend divided by 7 net new paying accounts from 4 at Y1 exit to 11 at Y3 exit."
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures the cost of founder-led outbound plus advisor and adjacent-vendor partner development."
  - id: A22
    name: Funding sizing milestone
    value: "Reach 6-7 production customers, monitor more than 100 counterparties, and prove at least one partner channel by Q2Y3; remaining cash then carries the base case to the 11-customer Q4Y3 proof point."
    unit: milestone
    source: "[BP milestones 12-24 and 24-36 months + BP fundingAsk runwayMonths 18] the pre-seed is sized to reach the next financing story with a six-month buffer."
  - id: A23
    name: Use-of-funds mix
    value: "Engineering, product, and compliance 45%; GTM 22%; G&A and counsel 13%; six-month buffer 20%."
    unit: allocation
    source: "[BP fundingAsk.useOfFundsSummary + model spend mix] the split follows the R&D-heavy build plan and explicit need for regulatory counsel plus cash buffer."
