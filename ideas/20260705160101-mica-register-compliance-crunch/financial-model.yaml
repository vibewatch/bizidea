  round: pre-seed
  amountM: 2.2
  runwayMonths: 24
  milestone: >-
    Reach 6-7 production customers, monitor more than 100 counterparties, and
    prove at least one advisor or adjacent-vendor channel by Q2Y3; the included
    six-month buffer carries the base case to the 11-customer Q4Y3 proof point.
  useOfFunds:
    - bucket: Engineering
      amountUsd: 990000
      percentage: 45
    - bucket: GTM
      amountUsd: 484000
      percentage: 22
    - bucket: "G&A"
      amountUsd: 286000
      percentage: 13
    - bucket: "Buffer (6 mo)"
      amountUsd: 440000
      percentage: 20
scenarios:
  downside:
    description: >-
      Pilot conversion slips by roughly one quarter, the company exits Y3 with
      only 9 paying customers, and gross margin stalls below 70% because human
      review and counsel-heavy edge cases remain too manual.
    y3RevenueK: 706.5
    y3EbitdaK: -654.9
    cashLowPointK: 1.6
    keyAssumptionChanges:
      - "Y1 exit paying accounts fall to 3 instead of 4, Q4Y2 exits at 6, and Q4Y3 exits at 9."
      - "Blended monthly revenue per average paying account runs about 7%-8% below base through Y2-Y3."
      - "Gross margin tops out at 69% instead of reaching the low 70s."
  base:
    description: >-
      The base case follows the business-plan milestone path closely: 4 paying
      accounts by Y1 exit, 7 by Q4Y2, and 11 by Q4Y3, with pricing moving from
      ~$30K pilots to production subscriptions plus modest setup and premium
      diligence revenue.
    y3RevenueK: 899.4
    y3EbitdaK: -479.1
    cashLowPointK: 287.1
    keyAssumptionChanges:
      - "Paying accounts grow from 4 at Y1 exit to 11 at Y3 exit, matching the researched SOM path."
      - "Blended realized revenue per average account reaches about $100K annualized in Y3 through production conversion and expansion modules."
      - "Headcount stays at 5 FTE through Q4Y2 and only adds the first scale engineer in Q3Y3."
  upside:
    description: >-
      One partner channel starts working in Y2, customers adopt premium modules
      faster, and the company exits Y3 with 13 paying accounts plus better
      margin on a largely unchanged cost base.
    y3RevenueK: 1109.6
    y3EbitdaK: -303.9
    cashLowPointK: 567.5
    keyAssumptionChanges:
      - "Q4Y2 exits at 8 paying accounts and Q4Y3 exits at 13 instead of 11."
      - "Blended monthly revenue per average account runs about 5%-7% above base as expansion modules attach earlier."
      - "Gross margin reaches 76% by Q4Y3 because evidence packs and connectors standardize faster."
sensitivity:
  - variable: ARPU
    downsideCase: "Y3 realized annual revenue per average paying account lands near $90K instead of ~$100K."
    baseCase: "Y3 realized annual revenue per average paying account is about $100K."
    upsideCase: "Expansion modules lift realized annual revenue per average paying account toward $110K."
    y3RevenueImpactK: -90.0
    cashImpactK: -120.0
  - variable: CAC
    downsideCase: "$130K CAC if founder-led outbound stays primary and partner referrals underperform."
    baseCase: "$107.8K CAC using Y2-Y3 S&M spend over 7 net new paying accounts."
    upsideCase: "$85K CAC if advisers and adjacent vendors source a larger share of qualified pilots."
    y3RevenueImpactK: -35.0
    cashImpactK: -150.0
  - variable: churn
    downsideCase: "3.0% monthly churn if customers treat the product as a point tool rather than a control system."
    baseCase: "2.0% monthly churn once accounts convert into production workflows."
    upsideCase: "1.0% monthly churn if renewal and diligence workflows become deeply embedded."
    y3RevenueImpactK: -70.0
    cashImpactK: -85.0
  - variable: sales cycle
    downsideCase: "9-month pilot-to-production cycle with the first paid pilot slipping by one quarter."
    baseCase: "6-7 month cycle tied to active onboarding, renewal, or diligence triggers."
    upsideCase: "4-5 month cycle when one channel partner delivers trigger-ready opportunities."
    y3RevenueImpactK: -175.0
    cashImpactK: -200.0
  - variable: gross margin
    downsideCase: "69% Y3 gross margin because evidence-pack handling remains services-heavy."
    baseCase: "73% Y3 gross margin."
    upsideCase: "76% Y3 gross margin once alerts, evidence packs, and integrations become repeatable."
    y3RevenueImpactK: 0.0
    cashImpactK: -95.0
  - variable: hiring pace
    downsideCase: "A second engineer and an operations hire are pulled forward before partner proof exists."
    baseCase: "The only scale hire before the next round is one engineer in Q3Y3."
    upsideCase: "The scale engineer waits until after seed if growth lags and management protects cash."
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered accounts] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionAccounts[Production accounts]
      ProductionAccounts --> ExpansionModules[Expansion modules]
      ProductionAccounts --> Revenue[Subscription revenue]
      ExpansionModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Revenue is driven by paying accounts rising from 4 at Y1 exit to 11 at Y3 exit while blended realized account revenue approaches about $100K annualized.
  - checkName: Must go right
    finding: Pilots must convert into production without turning evidence packs and Article 60 or 63 edge cases into a services-heavy delivery model.
  - checkName: Model breaks if
    finding: If the Y3 exit slips from 11 to 9 customers or the sales cycle stretches toward 9 months, the downside case finishes with almost no cash left.
  - checkName: Next-round proof
    finding: The seed story works only after the company shows more than 100 monitored counterparties, one functioning partner channel, and clear ACV lift beyond the initial roughly $75K beachhead.
sanityChecks:
