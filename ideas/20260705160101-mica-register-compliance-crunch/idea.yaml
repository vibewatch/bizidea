topRisks:
  - name: Public-data commoditization
    description: Buyers may initially see this as a thin wrapper around the ESMA register rather than a must-have operating system.
    mitigation: Embed the product in approval workflows, historical change logs, and counterparty evidence packs that are costly to reproduce manually.
  - name: Regulatory edge-case ambiguity
    description: Raw register entries and passporting facts may still require legal interpretation in nuanced service or jurisdiction cases, limiting full automation.
    mitigation: Keep human-review queues, partner with specialist counsel, and automate the unambiguous service-permission checks first.
  - name: Beachhead market size
    description: The first segment of MiCA-authorized firms with complex counterparty networks may be smaller than expected as the regime matures.
    mitigation: Use the CASP wedge to expand into banks, PSPs, and multi-jurisdiction licensing workflows once the permission graph is established.
