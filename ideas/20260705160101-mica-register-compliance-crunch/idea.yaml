jobsToBeDone:
  - job: >-
      When onboarding a new custody or liquidity partner, help our compliance team prove the firm is authorized for the
      exact MiCA service and market, so we can turn on the relationship without hidden exposure.
    currentAlternative: Manual register searches plus counsel memos and spreadsheet checklists
    successMetric: Time to approve a new counterparty and number of permission exceptions caught before go-live
  - job: >-
      When an institutional client or auditor asks why we rely on a given CASP, help us produce current and historical
      evidence of that partner's permission scope and status changes, so we can close diligence quickly and keep the
      revenue relationship live.
    currentAlternative: Screenshot archives and ad hoc evidence packs assembled from shared drives
    successMetric: Hours to answer a diligence request and percentage of counterparties with fresh evidence on file
