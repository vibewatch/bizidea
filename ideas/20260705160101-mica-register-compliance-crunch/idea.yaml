problem: >-
  After July 1, an EU crypto firm cannot treat MiCA authorization as a once-a-year legal filing. Every custody, exchange,
  or portfolio-management counterparty now needs ongoing proof of exact permission scope and market coverage before
  compliance teams let revenue workflows run. The ESMA register is expanding quickly, but permissions are uneven, so
  spreadsheets and one-time screenshots go stale fast. That creates a new failure mode: a firm can be broadly registered
  yet still lack the specific authorization a broker, custodian, or institutional client assumes it has.
targetUser:
  primary: Compliance operations leaders at MiCA-authorized crypto brokers, custodians, and OTC desks that rely on external CASPs across the EEA
  secondary: Institutional onboarding and risk teams at banks, asset managers, and fintechs relying on MiCA-authorized crypto partners
  buyer: Chief Compliance Officer, COO, or Head of Compliance Operations at a MiCA-authorized CASP
startupThesis:
  nonObviousInsight: >-
    The real bottleneck after MiCA is not winning a license; it is proving, every day, which other licensed firms may
    legally touch which workflow. Once the ESMA register becomes both the service gate and the public trust credential, the
    winner is the company that turns fragmented legal permissions into an operational graph embedded in onboarding,
    routing, and partner approval, not another KYC or chain-analytics vendor.
  beachhead: >-
    MiCA-authorized crypto brokers and custodians in France, the Netherlands, and Germany that onboard 5-30 external CASPs
    for custody, exchange, or portfolio-management workflows across 3+ EEA markets and need daily evidence of each
    counterparty's exact permission scope before activating or renewing them
  wedge: >-
    A live MiCA authorization graph that maps legal entities to brands, tracks permission scope and register changes,
    stores passporting and onboarding evidence, and triggers alerts or workflow blocks when a counterparty lacks the exact
    authorization a workflow requires
  whyNowCatalyst: >-
    The July 1 cutoff made register status the live gate to EU crypto service delivery, so any mismatch between what a
    counterparty claims and what the register actually permits became an immediate compliance and revenue risk.
  ventureScalePath: >-
    Start with MiCA counterparty onboarding and monitoring for CASPs, then expand into bank onboarding, transaction-policy
    enforcement, vendor-risk workflows, and a broader global license graph for digital-asset and payments counterparties.
solution: >-
  The product ingests the ESMA register daily, resolves legal entities and trade names, and translates license entries
  into an internal service taxonomy compliance teams can actually use. When a broker wants to onboard or renew a
  custodian, liquidity venue, or portfolio-management partner, the system checks the exact permission set, stores the
  proof, and opens an exception if the scope or jurisdiction is ambiguous. Integrations with CRM, ticketing, or
  transaction-approval workflows let teams block activation until the right evidence is attached, while alerts flag any
  later register change that could invalidate an existing relationship. Over time the company builds the canonical
  historical change log and counterparty graph that banks, auditors, and institutions trust when underwriting crypto
  exposure.
goToMarketSeed:
  firstCustomer: >-
    Head of Compliance at a Paris- or Amsterdam-based MiCA-authorized brokerage or custodian with 10-40 operations staff,
    8-20 external liquidity or custody partners, and an institutional-sales motion that depends on proving every partner's
    MiCA status
  buyingTrigger: >-
    A new counterparty onboarding, an institutional due-diligence questionnaire, or a post-July-1 review that forces the
    team to re-check existing partner permissions
  currentAlternative: Manual ESMA register searches, spreadsheet counterparty lists, screenshots in shared drives, and outside-counsel memos
  switchingReason: >-
    The wedge gives live, workflow-specific proof instead of stale one-time checks, catching cases where a provider is on
    the register but lacks the precise permission or geography a trade or custody flow needs.
  pricingHypothesis: Annual subscription priced by number of regulated entities, monitored counterparties, and automated approval workflows, with setup fees for entity mapping and policy design
