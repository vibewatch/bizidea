slug: mica-counterparty-monitor
date: '2026-07-05'
executiveSummary: >-
  MiCA 交易对手方监控应该先做一件事：给法国、德国、荷兰的 MiCA 持牌经纪商和托管机构，建一层工作流级的权限与证据系统——这些机构都要靠多家分布在欧洲经济区（EEA）各地的外部加密资产服务商（CASP）。眼下真正的痛点不是拿牌照，而是每次准入、续约和机构尽调时，都要证明交易对手方的 MiCA 服务范围和东道国覆盖，跟即将启动的工作流严丝合缝。ESMA 每周发布 CSV，各国主管机构（NCA）也发通知，原始数据不难拿到；难的是团队还得在表格、截图和律师备忘录里手工核对法律实体别名、跨境通行覆盖范围和服务代码。MVP 因此应该聚焦在每日数据摄取、实体解析、服务分类映射、证据快照、告警，以及嵌入准入或工单系统的人工复核队列——而不是去替代 AML、Travel Rule 或交易监控系统。这个滩头市场比一整套加密合规产品更窄、验证也更快：115 家法/德/荷本国 CASP 里有 59 家已经在 5 个以上市场做跨境通行，这类机构更容易反复碰到交易对手方权限范围的摩擦。建模出来的滩头市场依然不大——SAM 约 "$8.6M"，第 3 年 SOM 约 "$0.8M"——所以这门生意能不能成立，取决于同一套控制层能不能扩展到银行、资产管理公司和跨辖区牌照工作流。最大的证据缺口在于：115 家滩头 CASP 里到底有多少真正管理着足够多的交易对手方，值得以约 "$75k" 的 ACV 买一套独立系统，这一点必须先验证，再考虑扩招人手。头 12 个月要证明的是付费意愿、准入或证据包人力投入的可衡量下降，以及创业公司的证据包在标准尽调场景里能被外部接受。
problem:
  - "MiCA 持牌经纪商和托管机构的合规团队，还在靠公开注册库、截图和律师备忘录反复核实交易对手方，准入和续约决策因此被拖慢，证据也很快过期。"
  - "交易对手方哪怕看起来已获授权，也可能缺少托管、交易所或资产管理工作流所依赖的确切服务权限或东道国覆盖，由此造成收入延迟或监管风险。"
solution:
  - "摄取 ESMA 和部分 NCA 的更新，把法律实体解析到品牌，再把 MiCA 服务代码和跨境通行数据转成针对每个被监控交易对手方的工作流级审批逻辑。"
  - "生成实时证据包，对注册库的重大变化发出告警，把有疑义的案例路由进准入、CRM 或工单系统的人工复核——赶在合作伙伴被激活或续约之前。"
whyWeWin:
  - "这个切口比泛泛的加密合规更窄，也比法律研究更偏运营：在资金动起来之前，先建一套记录谁能在哪个市场做哪项 MiCA 服务的系统。"
  - "历史变更日志、实体别名解析和可复用的服务政策映射，会随着每新增一个被监控的交易对手方持续复利——这是原始注册库和一次性法律备忘录做不到的。"
  - "AML、Travel Rule 和 KYB 的预算已经被相邻厂商占了，创业公司该嵌入它们的工作流里去赢，而不是正面硬刚去做另一套大而全的产品。"
strategicChoices:
  beachhead: "法国、德国、荷兰的 MiCA 持牌经纪商和托管机构，它们管理着 8-20 家外部 CASP 交易对手方，业务覆盖 3 个以上 EEA 市场，在准入、续约或机构尽调前必须重新核查服务范围。"
  wedgeRationale: "比起卖给所有加密合规团队，这个切片能更快拿出证明：监管触发点正在当下发生，买家已经拥有合作伙伴审批工作流，一次抓住的范围错配，就能比更泛的分析或 AML 说辞更快说服客户。"
  sequencingRationale: "先做一层证据与例外层，嵌入现有的准入、工单和 Travel Rule 工作流——因为信任和采用，取决于能不能在不宣称自主法律判断的前提下减少人工复核。等产品证明了可复现的 ACV 和被接受的证据包之后，公司再深入到硬性工作流拦截、银行准入和更广的跨境牌照情报；这样的顺序才能让产品范围、招聘和销售动作，始终匹配一个尚小的初始市场。"
  notYet:
    - "一整套 AML、KYC 或 Travel Rule 产品"
    - "在 CASP 验证完成之前，直接把银行和资产管理公司作为第一批销售对象"
    - "对 Article 60 或 Article 63 边缘案例做自动法律判定"
    - "第一批扩张实验之外的非 EEA 牌照覆盖"
market:
  tam: "TAM 约 $20.9M，基于 279 家持牌 CASP，按每个客户约 $75k 的年合同金额估算。"
  sam: "SAM 约 $8.6M，基于德国、法国、荷兰 115 家本国 CASP，尚未按复杂度筛选。"
  som: "第 3 年建模 SOM 约 $0.8M，基于 11 个高复杂度滩头客户，ACV 约 $75k。"
  segments:
    - "主要：法国、德国、荷兰的 MiCA 持牌经纪商和托管机构，它们有持续的外部交易对手方审批需求"
    - "次要：银行、资产管理公司、金融科技公司，以及卢森堡、爱尔兰这类牌照枢纽——CASP 切口跑通后，它们也需要同一套证据层"
  buyingProcess: >-
    交易通常始于新交易对手方接入、跨境通行扩张、过渡期后复核，或机构尽调请求——这些都会迫使当下的权限证明进入受控审批流程。业务层面的推动者一般是合规运营或准入负责人，但真正的付费决策人是 CCO 或 COO，因为这个决定关系到谁能被激活、续约，或继续保留在系统里。
product:
  mvp: >-
    MVP 覆盖每周的 ESMA 加部分 NCA 摄取、品牌与法律实体解析、MiCA 服务代码映射、证据快照、告警，以及一个能回写工单或 CRM 的人工复核队列。它应该只自动放行没有争议的案例，把 Article 60/63、跨境通行和服务范围的疑义案例升级给人工——而不是假装能提供自主法律意见。
  sixMonth: "为一家法国或荷兰的经纪商/托管机构上线共创客户版本，监控 10-40 个交易对手方，生成准入和续约证据包，并用源快照记录每一个例外。"
  twelveMonth: "把 2-3 个付费试点转成正式付费账户，为工单、CRM 以及至少一个 Travel Rule 或准入系统加上可复用连接器，并证明证据准备或审批周转至少提速 50%。"
  twentyFourMonth: "从 CASP 对 CASP 的审批，扩展到机构尽调模块、银行准入，以及第一批相邻牌照数据集——同时继续把 MiCA 权限控制当作系统的记录中枢。"
  keyBets:
    - "115 家法/德/荷本国 CASP 里，有足够多运行着复杂跨境交易对手方网络，能撑起约 $60k-$90k 的 ACV。"
    - "大多数标准尽调案例可以靠产品化的证据加人工复核解决，不需要每个文件都写定制法律备忘录。"
    - "买家会接受一层嵌入式证据层，让它去补充现有的分析、KYB 和 Travel Rule 工具，而不是干等这些厂商加一个轻量功能。"
    - "历史变更追踪和政策映射，能在 ESMA 或现有厂商改善原始数据体验之前，建立起足够的转换成本。"
gtm:
  wedge: "把付费试点卖给正在 7 月 1 日之后重新核查交易对手方、或即将面对机构尽调的 MiCA 持牌经纪商/托管机构，再把试点转成绑定持牌实体、交易对手方和审批工作流的年度权限监控合同。"
  channels:
    - "创始人主导，直接外联从 ESMA 注册库筛选出的法/德/荷 CASP 的 CCO、COO 和合规运营负责人"
    - "与已经帮客户处理跨境通行、备案和边缘案例复核的 MiCA 法律顾问、监管咨询机构做推荐与联合交付"
    - "产品有了一个参考部署和有据可查的审批提速成果后，选择性地和 Travel Rule、KYB、准入厂商联合销售"
  funnelTargets: "目标客户到合格工作流评估 15-25%，评估到付费试点 25-35%，付费试点到正式付费 50%+，正式付费到第二实体或银行尽调扩展 40%+，12 个月内完成。"
  pricing: >-
    先从付费试点加实施套餐起步，再转为按持牌实体、被监控交易对手方和活跃审批工作流定价的年度订阅，目标正式付费 ACV 约 "$60k-$90k"，实体映射和政策设计另收实施费。这样定价对应的是真正的痛点单位——团队必须持续更新的关系和决策数量——而不是按用户席位收费。
businessModel:
  revenueStreams:
    - "面向持牌实体和被监控交易对手方工作流的年度订阅"
    - "实体解析、政策设计和工作流集成的实施费"
    - "机构尽调包、API 访问和更广牌照覆盖的高级模块"
  unitOfValue: "处于 MiCA 权限主动监控下的持牌实体与被监控交易对手方工作流"
  targetGrossMarginPct: 70
  expansionLevers:
    - "从一个持牌实体的准入队列，扩展到客户集团里所有实体、交易对手方和续约工作流"
    - "核心审批记录建立信任后，加上机构尽调、审计响应和交易对手方证据模块"
    - "从 CASP 买家扩展到银行、基金和跨辖区牌照情报——复用同一套实体与权限图谱"
strategyMap:
  northStarMetric: "活跃交易对手方中，拥有当下工作流专属 MiCA 证据、且无未解决权限例外的比例"
  inputMetrics:
    - "有实时准入、续约或机构尽调触发点的合格目标客户"
    - "被监控交易对手方中，正确解析到法律实体和品牌的比例"
    - "从审批请求到证据包完成的耗时"
    - "24 小时内匹配到受影响交易对手方的 ESMA 或 NCA 变更比例"
    - "用产品化规则处理、而非升级到定制法律顾问的复核占比"
    - "试点转正式付费的转化率"
  moatsToBuild:
    - "绑定客户审批决策和证据快照的历史 ESMA、NCA 变更日志"
    - "面向 MiCA 交易对手方的法律实体、品牌和服务分类解析数据集"
    - "把 MiCA 权限映射到真实托管、交易所、转账和资产管理工作流的可复用审批政策库"
  killCriteria:
    - "专注向法/德/荷 CASP 销售满 12 个月后，签约付费试点不足 3 个"
    - "前 2 个付费试点未能把证据包准备或审批周转提速至少 50%，同时未能抓住至少 1 起真实的权限或跨境通行不匹配"
    - "复核完前 100 个案例后，超过 25% 的标准交易对手方文件仍需要外部律师定制解读"
  mermaid: |
    flowchart LR
      Wedge[MiCA counterparty wedge] --> MVP[Permission graph and evidence MVP]
      MVP --> Proof[Faster approvals and caught scope mismatches]
      Proof --> Expansion[Bank diligence and broader license intelligence]
investorMemo:
  verdict:
    call: "观察"
    conviction: "post-MiCA 工作流痛点是真实存在的，但市场太小、相邻竞争太强，在付费试点验证出足够的交易对手方密度和扩张空间之前，还谈不上进合伙人会议。"
    whyBelieve: "公司瞄准的是公开注册库和现有加密合规产品之间一个具体的控制缺口：证明谁能在哪个辖区做哪项服务，而且是工作流级、随时可用的证明。"
    whyDoubt: "公开数据的替代方案、法律边缘案例的模糊性，加上初始 SAM 只有约 $8.6M，都可能把这门生意困在一个狭窄的功能品类里，等不到形成稳固分销就先卡住。"
    nextDiligence: "验证 2 个付费试点、至少 1 份被外部接受的证据包，并确认有相当比例的目标 CASP 确实管理着足够多的交易对手方，值得付约 $75k 的 ACV。"
  firstCustomer:
    title: "MiCA 持牌经纪商或托管机构的合规负责人"
    profile: "一家 20-100 人规模的法国或荷兰 CASP，业务覆盖 3 个以上 EEA 市场，有 8-20 家外部托管、流动性或资产管理合作伙伴，并经常收到机构尽调请求。"
    trigger: "7 月 1 日之后的新交易对手方准入、续约复核或尽调问卷，要求提供当下确切服务范围和东道国覆盖的证明。"
    buyer: "首席合规官或 COO"
    initialContract: "一份 $25k-$40k 的付费试点，覆盖一个持牌实体和 10-30 个被监控交易对手方；如果这套工作流成为审批和续约的记录中枢，就转为约 $60k-$90k 的年度订阅加实施费。"
  mustBeTrue:
    - "115 家法/德/荷本国 CASP 里，至少有 20-30 家管理着足够多的跨境交易对手方和审批更替量，值得以约 $75k 的 ACV 购买一套独立的权限工作流。"
    - "第一批正式付费试点能把审批或证据包人力至少降低 50%，同时揪出人工核查会漏掉的真实权限或跨境通行不匹配。"
    - "CCO 和 COO 愿意把这个当成一条独立的工作流预算来出钱，而不是硬塞给现有的 Travel Rule、KYB、分析或法律顾问关系去消化。"
    - "从注册库生成的证据包和历史变更记录，能满足大多数标准的银行、审计或机构尽调要求，不用另写定制法律备忘录。"
    - "在相邻厂商或监管方改进原始数据体验、压缩这个切口之前，创业公司能先拿下工作流位置和专有映射数据。"
  diligenceQuestions:
    - "今天到底有多少法/德/荷 CASP 真正管理着 10 个以上、覆盖 3 个以上 EEA 市场的外部交易对手方？"
    - "哪个审批场景能最快证明价值、安全摩擦最小：工单、CRM、准入，还是 Travel Rule 工具？"
    - "产品化的服务范围映射跑通之后，还有多少比例的真实交易对手方文件需要定制法律解读？"
    - "买家会不会为 $60k-$90k 区间的独立 ACV 付费，还是产品必须靠 OEM 或捆绑模块搭车？"
    - "银行、资产管理公司和审计方，能不能接受由注册库数据加变更历史构成的证据包，还是大多数边缘案例仍要求定制法律意见？"
operatingAssumptions:
  - assumption: "115 家法/德/荷本国 CASP 里，有相当一部分交易对手方数量和跨境通行复杂度足够高，撑得起独立软件支出。"
    basis: research.yaml
    validationTest: "访谈 20 个目标客户，收集匿名化的交易对手方数量和市场覆盖数据，确认至少 8-10 家符合高复杂度 ICP。"
    decisionImpact: "如果不成立，就把 ICP 收窄到跨境通行负担重的经纪商和托管机构，或者把扩张计划提前转向银行和机构准入。"
  - assumption: "标准尽调请求通常靠注册库生成的证据包加人工复核就能结案，不需要定制法律备忘录。"
    basis: research.yaml
    validationTest: "从共创客户那收集 10 个真实尽调或审计请求，确认至少 70% 能靠产品输出结案，不需要外部律师起草。"
    decisionImpact: "如果不成立，产品就会变成一层服务很重的合规产品，定价、毛利预期和招聘计划都要跟着改。"
  - assumption: "买家愿意为权限监控单独批预算，因为它能降低操作风险和人工审批负担。"
    basis: research.yaml
    validationTest: "跑 12 场定价对话，拿下至少 3 个 $25k 以上的付费试点，并明确写下通往 $60k-$90k 年度正式定价的路径。"
    decisionImpact: "如果不成立，就更早转向 OEM 或合作分销，把直接独立销售的优先级往后放。"
  - assumption: "每周的 ESMA 更新节奏，加上部分 NCA 复核，对大多数审批和续约工作流来说已经够及时。"
    basis: research.yaml
    validationTest: "在一个共创客户处回测 90 天的 ESMA 和各国通知，衡量数据滞后会改变审批决策的频率。"
    decisionImpact: "如果不成立，公司就必须更早投入更深的 NCA 覆盖、过期数据预警和更高触达的运营。"
  - assumption: "相邻的 Travel Rule、KYB 和分析厂商，会容忍这层产品存在或愿意合作，让创业公司有足够时间赢下参考客户。"
    basis: 运营判断
    validationTest: "跑 8 场合作对话，在前 4 个正式付费客户之前，拿下至少 1 份联合销售或集成协议。"
    decisionImpact: "如果不成立，公司就必须更长时间依赖直接分销，把重心放在独立工作流深度而不是合作驱动的规模化上。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "复杂交易对手方 ICP 验证"
    hypothesis: "相当一部分法/德/荷 CASP 已经管理着足够多的交易对手方和跨境业务，值得为独立权限软件付费。"
    successMetric: "完成 20 场访谈，至少 8-10 家客户符合目标 ICP 且有明确预算决策权。"
    owner: "创始人 CEO"
  - horizon: "0–90 天"
    experiment: "历史交易对手方文件的证据包人工代跑回测"
    hypothesis: "把现有交易对手方文件映射进一套可复用的权限图谱，创业公司能在实现全自动化之前，就大幅压缩证据准备时间。"
    successMetric: "处理 50 份历史文件，分析师用时至少减少 50%，并发现至少 3 起非显而易见的服务范围或跨境通行例外。"
    owner: "合规领域负责人"
  - horizon: "90–180 天"
    experiment: "ESMA 加 NCA 新鲜度与变更监控"
    hypothesis: "每周中央注册库更新加部分国家通知，足以在滩头市场及时标出重大权限变化。"
    successMetric: "至少 95% 的重大注册库变更能在发布 24 小时内被检测到并匹配到受影响交易对手方。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "嵌入准入或续约队列的付费试点"
    hypothesis: "真正把兴趣转成预算和可衡量 ROI 的，是工作流嵌入，而不仅是仪表盘可见性。"
    successMetric: "第一个付费试点把审批周转或证据包准备提速至少 50%，并在上线前把至少 1 起人工复核升级案例变成实际抓获的不匹配。"
    owner: "创始人 CEO"
  - horizon: "6–12 个月"
    experiment: "机构尽调接受度测试"
    hypothesis: "只要证据包附带源快照和变更历史，银行、审计方或机构客户就会在标准场景下接受它。"
    successMetric: "至少 2 起外部尽调请求靠产品输出结案，不需要定制备忘录。"
    owner: "产品与集成负责人"
  - horizon: "12–18 个月"
    experiment: "顾问和相邻厂商渠道测试"
    hypothesis: "法律顾问和相邻合规厂商能带来商机，而不会把产品拖入低毛利的服务型工作。"
    successMetric: "到第 18 个月，至少拿到 3 个合格的合作方引荐商机，或签下 1 份联合销售协议。"
    owner: "合作与客户成功负责人"
operations:
  - "每周跑 ESMA 和部分 NCA 摄取的质检，包括过期记录标记、变更复核和证据快照留存。"
  - "为 Article 60、Article 63、跨境通行和服务范围的疑义案例，维护一套律师审定的规则手册和人工复核队列。"
  - "把审批周转、证据包人力、例外率和已抓获的不匹配，汇总成一个按客户和交易对手方拆分的运营看板。"
  - "在扩大产品范围之前，先把工单、CRM、准入和 Travel Rule 连接器的可复用实施 playbook 打包好。"
  - "把每一次审批决策、源快照和后续变更告警，都存进一份经得起审计的证据日志。"
team:
  - role: "创始人 CEO"
    startTiming: "Month 0"
    rationale: "在这个品类还没定型时，负责创始人主导销售、ICP 筛选、试点打包和早期合作伙伴开发。"
  - role: "创始工程师"
    startTiming: "Month 0"
    rationale: "搭建 ESMA 和 NCA 摄取管道、实体图谱、告警系统，以及第一批可复用工作流连接器。"
  - role: "合规领域负责人"
    startTiming: "Month 1"
    rationale: "设计服务分类、证据规则、人工复核 playbook，以及面向客户的政策配置——确保产品不越界成为通用法律意见。"
  - role: "产品与集成负责人"
    startTiming: "Month 4"
    rationale: "第一个客户验证了需求之后，把试点工作流打磨成可复用的准入、工单和证据包产品化界面。"
  - role: "合作与客户成功负责人"
    startTiming: "Month 9"
    rationale: "第一个参考部署跑通后，负责顾问和相邻厂商渠道，以及实施规范。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "在有实时准入或尽调触发点的法/德/荷 CASP 中，签下 2-3 个付费试点。"
      - "上线第一套可复用的权限图谱工作流，覆盖 10-40 个被监控交易对手方，并完成至少一个工单或 CRM 集成。"
      - "证明证据准备或审批周转至少提速 50%，并用产品输出结案至少一起外部尽调请求。"
  - horizon: "12–24 个月"
    items:
      - "把 3-5 个试点转成年度正式合同，监控的交易对手方总数超过 100 个。"
      - "加上可复用的 Travel Rule 或准入集成，以及一个机构尽调模块。"
      - "拿下 1-2 个各自都能产出合格商机的顾问或相邻厂商渠道伙伴。"
  - horizon: "24–36 个月"
    items:
      - "客户数达到 8-12 个，并证明能从 CASP 审批扩展到面向银行、基金或审计方的尽调工作流。"
      - "加入第一批复用同一套实体与权限图谱的非 MiCA 牌照数据集或辖区。"
      - "证明扩张模块能把 ACV 拉到初始约 $75k 滩头水平之上，同时不让公司变成一门服务生意。"
risks:
  - risk: "由于符合条件、管理着足够多跨境交易对手方的法/德/荷 CASP 太少，滩头市场比预期更小或运营上更简单。"
    likelihood: High
    impact: High
    mitigation: "在按需求扩招之前先验证 ICP 密度，优先聚焦跨境通行负担重的经纪商和托管机构，并及早测试银行或机构准入的扩张方向。"
  - risk: "买家把产品当成公开数据的一层薄封装，或者干等现有合规厂商捆绑出类似能力。"
    likelihood: High
    impact: High
    mitigation: "靠工作流嵌入、证据历史和被接受的尽调产出取胜，而不是靠原始数据访问权，并有选择地与相邻工具建立联合销售关系。"
  - risk: "服务范围和 Article 60/63 边缘案例，需要太多定制法律解读，产品化之后利润跑不出来。"
    likelihood: High
    impact: High
    mitigation: "把人工复核留在产品范围内，先只把无争议的规则代码化，并用律师审定的 playbook 明确定义产品不会自动判定的部分。"
  - risk: "每周 ESMA 更新和各国通知的时间点太不稳定，客户不敢信任自动化审批决策。"
    likelihood: Medium
    impact: Medium
    mitigation: "交叉核对多个官方数据源，标记过期记录，先以证据包和告警模式起步，再考虑提供更硬性的工作流拦截。"
  - risk: "企业级销售周期太依赖信任和参考案例，来不及在切口被复制之前触达足够多客户。"
    likelihood: Medium
    impact: High
    mitigation: "把第一版产品做窄、绑定明确触发场景，用付费试点当作证明物，在组建更大的直销团队之前先靠顾问引荐。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月要撑起一支五人创始团队、一份律师审定的 MiCA 规则手册、2-3 个付费共创客户、可复用的工作流集成，以及足够的证据来判断公司能否从最初的 CASP 滩头市场往外扩张。"
