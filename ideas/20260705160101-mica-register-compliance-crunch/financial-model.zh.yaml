fundingAsk:
  round: pre-seed
  amountM: 2.2
  runwayMonths: 24
  milestone: >-
    到 Q2Y3 前拿下 6-7 个正式付费客户，监控超过 100 个交易对手方，并验证至少
    一条顾问或相邻厂商渠道；内含的 6 个月缓冲资金，能让基线情形撑到 Q4Y3 的
    11 客户验证点。
  useOfFunds:
    - bucket: 工程
      amountUsd: 990000
      percentage: 45
    - bucket: GTM
      amountUsd: 484000
      percentage: 22
    - bucket: "行政管理（G&A）"
      amountUsd: 286000
      percentage: 13
    - bucket: "缓冲资金（6 个月）"
      amountUsd: 440000
      percentage: 20
scenarios:
  downside:
    description: >-
      试点转化延后约一个季度，公司在 Y3 期末只做到 9 个付费客户；人工复核和
      依赖律师的边缘案例仍然太重手工，毛利率卡在 70% 以下。
    y3RevenueK: 706.5
    y3EbitdaK: -654.9
    cashLowPointK: 1.6
    keyAssumptionChanges:
      - "Y1 期末付费账户从 4 降到 3，Q4Y2 期末为 6，Q4Y3 期末为 9。"
      - "Y2-Y3 期间，平均付费账户的混合月收入比基线低约 7%-8%。"
      - "毛利率最高只到 69%，达不到基线的 70% 出头。"
  base:
    description: >-
      基线情形紧跟商业计划书的里程碑路径：Y1 期末 4 个付费账户，Q4Y2 达到
      7 个，Q4Y3 达到 11 个；定价从约 $30K 的试点，逐步转向正式订阅，外加
      适度的实施费和高级尽调收入。
    y3RevenueK: 899.4
    y3EbitdaK: -479.1
    cashLowPointK: 287.1
    keyAssumptionChanges:
      - "付费账户从 Y1 期末的 4 个，增长到 Y3 期末的 11 个，与研究得出的 SOM 路径一致。"
      - "靠正式转化和扩张模块，Y3 平均账户的混合实际收入达到约 $100K 年化。"
      - "团队人数在 Q4Y2 前维持 5 名 FTE，直到 Q3Y3 才加入第一名扩张期工程师。"
  upside:
    description: >-
      Y2 有一条合作渠道开始见效，客户更快采用高级模块；公司在成本结构基本
      不变的情况下，Y3 期末做到 13 个付费账户，且毛利率更高。
    y3RevenueK: 1109.6
    y3EbitdaK: -303.9
    cashLowPointK: 567.5
    keyAssumptionChanges:
      - "Q4Y2 期末做到 8 个付费账户，Q4Y3 期末做到 13 个，而不是 11 个。"
      - "扩张模块更早接入，让平均账户的混合月收入比基线高约 5%-7%。"
      - "证据包和连接器标准化得更快，毛利率到 Q4Y3 能做到 76%。"
sensitivity:
  - variable: ARPU
    downsideCase: "Y3 平均付费账户的实际年化收入落在约 $90K，而不是约 $100K。"
    baseCase: "Y3 平均付费账户的实际年化收入约为 $100K。"
    upsideCase: "扩张模块把平均付费账户的实际年化收入拉高到约 $110K。"
    y3RevenueImpactK: -90.0
    cashImpactK: -120.0
  - variable: CAC
    downsideCase: "如果创始人主导外联仍是主力，而合作方引荐表现不佳，CAC 为 $130K。"
    baseCase: "按 Y2-Y3 的 S&M 支出除以 7 个净新增付费账户计算，CAC 为 $107.8K。"
    upsideCase: "如果顾问和相邻厂商能带来更大比例的合格试点线索，CAC 为 $85K。"
    y3RevenueImpactK: -35.0
    cashImpactK: -150.0
  - variable: 流失率
    downsideCase: "如果客户把产品当成一个点工具而不是控制系统，月度流失率为 3.0%。"
    baseCase: "账户转为正式工作流后，月度流失率为 2.0%。"
    upsideCase: "如果续约和尽调工作流深度嵌入，月度流失率为 1.0%。"
    y3RevenueImpactK: -70.0
    cashImpactK: -85.0
  - variable: 销售周期
    downsideCase: "试点到正式的周期拉长到 9 个月，第一个付费试点延后一个季度。"
    baseCase: "6-7 个月周期，绑定实时的准入、续约或尽调触发点。"
    upsideCase: "有一个渠道伙伴持续带来触发点已就绪的商机时，周期缩短到 4-5 个月。"
    y3RevenueImpactK: -175.0
    cashImpactK: -200.0
  - variable: 毛利率
    downsideCase: "证据包处理仍然偏服务化，Y3 毛利率为 69%。"
    baseCase: "Y3 毛利率为 73%。"
    upsideCase: "告警、证据包和集成实现可复用后，Y3 毛利率为 76%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -95.0
  - variable: 招聘节奏
    downsideCase: "在合作渠道得到验证之前，就提前招进第二名工程师和一名运营人员。"
    baseCase: "下一轮融资前唯一的扩张期招聘，是 Q3Y3 的一名工程师。"
    upsideCase: "如果增长放缓、管理层要保现金，扩张期工程师的招聘就推迟到种子轮之后。"
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered accounts] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionAccounts[Production accounts]
      ProductionAccounts --> ExpansionModules[Expansion modules]
      ProductionAccounts --> Revenue[Subscription revenue]
      ExpansionModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "收入靠付费账户数从 Y1 期末的 4 个涨到 Y3 期末的 11 个来驱动，平均账户的混合实际收入逼近约 $100K 年化。"
  - checkName: 必须跑通的地方
    finding: "试点必须顺利转成正式付费，同时不能让证据包和 Article 60、63 边缘案例把交付拖成服务化模式。"
  - checkName: 模型会在哪种情况下失灵
    finding: "如果 Y3 期末客户数从 11 个滑到 9 个，或者销售周期拉长到接近 9 个月，downside 情形结束时现金几乎所剩无几。"
  - checkName: 下一轮融资证明点
    finding: "只有当公司展示出监控超过 100 个交易对手方、一条能跑通的合作渠道，以及 ACV 明显拉高到初始约 $75K 滩头水平之上，种子轮的融资故事才站得住。"
sanityChecks:
  ruleOf40: "Y3 增长 94.6% + EBITDA 利润率 -53.3% = 41.4%"
  burnMultiple: "Y2 burn multiple 约为 2.1x，对应 $331.5K 增量收入；到 Y3，同一支团队支撑更多正式账户，burn multiple 改善到约 1.1x。"
  revenuePerFte: "Y3 按 Q4Y3 的 6 名 FTE 计算，每名 FTE 约 $149.9K 收入（工作流 SaaS 基准约 $200-400K）"
  flags:
    - "基线情形已经触及商业计划书 Y3 客户里程碑 8-12 个的高值，实质上把研究得出的初始 SOM 用尽了，所以下一轮融资仍然要靠 CASP 切口之外的扩张。"
    - "基线 CAC 约 $108K，相对约 $100K 年化收入的账户来说偏高，所以在扩大 GTM 建设之前，顾问和相邻厂商渠道必须先把获客成本降下来。"
    - "到 Y3，人均 FTE 收入仍低于典型 SaaS 效率基准，这是一个警示信号：光靠这个滩头市场，规模还够不上风险投资的量级。"
    - "基线情形下模型现金始终为正，但 downside 情形结束时现金接近于零，如果不削减开支或放慢招聘，种子轮一旦延后就没什么余地。"
