slug: mica-counterparty-monitor
date: "2026-07-05"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-05] 运营模型从商业计划书署期之后的第一个完整月份开始起算。"
  - id: A2
    name: 期初现金 / 种子前融资
    value: "$2.2M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] 基线情形取区间低值，因为在拿到正式付费验证之前，招聘会刻意保持精简。"
  - id: A3
    name: 起始付费账户数
    value: "0"
    unit: 数量
    source: "[BP product.sixMonth + BP milestones 0-12 months] 公司从零收入起步，必须先签下付费试点。"
  - id: A4
    name: 付费账户定义
    value: "一个持牌实体的被监控 MiCA 审批工作流对应的付费试点或正式部署。"
    unit: 定义
    source: "[BP businessModel.unitOfValue + BP gtm.wedge] customersEop 统计的是任何已经在为被监控权限工作流范围付费的账户。"
  - id: A5
    name: 付费试点套餐经济模型
    value: "约 3 个月 $30K（约每月 $10K）"
    unit: USD/account
    source: "[BP investorMemo.firstCustomer.initialContract $25k-$40k paid pilot] 基线情形取试点区间的中点。"
  - id: A6
    name: 平均付费账户的正式与扩张收入
    value: "Y2 平均账户的混合月收入从 $7.0K 涨到 $7.9K；Y3 从 $8.0K 涨到 $8.6K，按 Y3 平均基数折算约合 $100K 年化。"
    unit: USD/account/year
    source: "[BP gtm.pricing target production ACV $60k-$90k + BP businessModel.revenueStreams + BP market.som roughly $75k ACV] 订阅 ACV 保持在给定区间内，实施费和高级尽调模块则进一步拉高实际收入。"
  - id: A7
    name: 客户爬坡
    value: "M12 达到 4 个付费账户，Q4Y2 达到 7 个，Q4Y3 达到 11 个。"
    unit: 期末客户数
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP product.twelveMonth/twentyFourMonth + Research market.som 11 customers] 模型采用第 3 年客户里程碑区间的高值。"
  - id: A8
    name: 收入确认口径
    value: "每期收入等于平均付费账户数乘以平均账户的混合月收入。"
    unit: 计算方式
    source: "[BP gtm.pricing + BP businessModel.unitOfValue] 这样收入就能直接追溯到账户数和定价打包假设。"
  - id: A9
    name: 毛利率爬坡
    value: "Y1 为 46%-56%，Y2 为 60%-69%，Y3 为 71%-74%。"
    unit: 毛利率百分比
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on evidence packs versus bespoke legal work] 只有当工作流复用降低了人工复核的拖累，模型才会升到 70% 出头的毛利率。"
  - id: A10
    name: 招聘时间线
    value: "M1 招创始人 CEO、创始工程师和合规负责人；M4 招产品/集成负责人；M9 招合作与客户成功负责人；M31 招第二名工程师。"
    unit: 时间线
    source: "[BP team + BP risks] 基线情形让五人创始团队维持到 Q4Y2 不变，只有在正式付费得到验证之后，才加入第一名扩张期工程师，避免在初始市场还很小的时候提前扩招。"
  - id: A11
    name: 创始人 / CEO 全额薪酬成本
    value: "$140K"
    unit: USD/FTE/year
    source: "[BP team Founder CEO + startup-finance heuristic] 种子前阶段创始人薪资保持精简，同时覆盖薪资税和福利。"
  - id: A12
    name: 工程全额薪酬成本
    value: "$170K"
    unit: USD/FTE/year
    source: "[BP team Founding eng + startup-finance heuristic] 按欧洲创业公司薪酬带里一名资深数据/集成工程师估算。"
  - id: A13
    name: 合规 / 政策全额薪酬成本
    value: "$150K"
    unit: USD/FTE/year
    source: "[BP team Compliance domain lead + startup-finance heuristic] 对应一名资深领域负责人，统管规则手册、复核 playbook 和政策配置。"
  - id: A14
    name: 产品 / 集成全额薪酬成本
    value: "$140K"
    unit: USD/FTE/year
    source: "[BP team Product / integrations lead + startup-finance heuristic] 对应一名资深产品/集成负责人，且不假设有一整个产品团队。"
  - id: A15
    name: 合作与客户成功全额薪酬成本
    value: "$130K"
    unit: USD/FTE/year
    source: "[BP team Partnerships / customer success lead + startup-finance heuristic] 包含差旅和浮动薪酬，对应一套创始人协助的窄口径企业销售动作。"
  - id: A16
    name: 第二名工程师全额薪酬成本
    value: "$170K"
    unit: USD/FTE/year
    source: "[BP product.twentyFourMonth + startup-finance heuristic] 第一名扩张期工程师的成本和创始工程师持平，因为这份工作依然需要专业能力。"
  - id: A17
    name: 薪酬在损益表科目间的分摊
    value: "创始人 70% 计入 S&M、30% 计入 G&A；工程师 100% 计入 R&D；合规负责人 65% 计入 R&D、35% 计入 G&A；产品/集成负责人 50% 计入 S&M、50% 计入 R&D；合作与客户成功负责人 85% 计入 S&M、15% 计入 G&A。"
    unit: 分配方式
    source: "[BP team role rationales + BP operations] 薪酬按运营模型使用的职能科目进行映射。"
  - id: A18
    name: 非薪酬运营支出爬坡
    value: "Y1 初期每月 $12K，M4-M6 每月 $15K，M7-M9 每月 $18K，Q4Y1 每月 $20K，此后 Y2 每月 $21K-$24K，Y3 每月 $25K-$28K。"
    unit: USD/month
    source: "[BP fundingAsk.useOfFundsSummary + BP operations + startup-finance heuristic] 覆盖云服务、法律顾问、保险、差旅、数据质检和集成支持，不含大规模付费获客项目。"
  - id: A19
    name: 现金转换口径
    value: "现金变动等于 EBITDA。"
    unit: 计算方式
    source: "[startup-finance heuristic] 在种子前这个规模下，假设资本支出、债务偿付、税费和营运资金时点的影响可以忽略。"
  - id: A20
    name: 月度客户流失率
    value: "2.0%"
    unit: 每月百分比
    source: "[startup-finance heuristic for early enterprise workflow SaaS + BP expansionLevers] 年度审批和工作流嵌入本该支撑低流失率，但由于切口尚窄，模型仍保持保守。"
  - id: A21
    name: CAC 口径
    value: "Y2-Y3 的销售与市场支出，除以净新增付费账户数 7 个（从 Y1 期末的 4 个增至 Y3 期末的 11 个）。"
    unit: 计算方式
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] 这涵盖了创始人主导外联，加上顾问和相邻厂商合作开发的成本。"
  - id: A22
    name: 融资规模里程碑
    value: "到 Q2Y3 前拿下 6-7 个正式付费客户，监控超过 100 个交易对手方，并验证至少一条合作渠道；剩余现金足以支撑基线情形走到 Q4Y3 的 11 客户验证点。"
    unit: 里程碑
    source: "[BP milestones 12-24 and 24-36 months + BP fundingAsk runwayMonths 18] 这轮种子前融资的规模，是按能讲出下一轮融资故事再加 6 个月缓冲来定的。"
  - id: A23
    name: 资金用途结构
    value: "工程、产品和合规 45%；GTM 22%；G&A 和法律顾问 13%；6 个月缓冲资金 20%。"
    unit: 分配方式
    source: "[BP fundingAsk.useOfFundsSummary + model spend mix] 这个拆分对应偏重研发的建设计划，以及对监管顾问和现金缓冲的明确需求。"
