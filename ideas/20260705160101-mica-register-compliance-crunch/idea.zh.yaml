problem: >-
  7 月 1 日之后，欧盟加密公司不能再把 MiCA 授权当成一年一次的法务申报走过场。每一个托管、交易或资产管理类交易对手方，
  现在都需要持续提供准确权限范围和市场覆盖的证明，合规团队才敢放行创收工作流。ESMA 注册库扩容很快，但各家权限参差
  不齐，表格和一次性截图很快就会过时。这就催生了一种新的失败模式：一家企业可能整体上已经注册，却仍然缺少经纪商、
  托管方或机构客户默认它拥有的那项具体授权。
targetUser:
  primary: MiCA 授权加密经纪商、托管机构和 OTC 柜台的合规运营负责人，他们依赖整个欧洲经济区（EEA）内的外部 CASP
  secondary: 银行、资产管理公司和金融科技公司里的机构准入与风控团队，他们依赖 MiCA 授权的加密合作伙伴
  buyer: MiCA 授权 CASP 的首席合规官（CCO）、首席运营官（COO）或合规运营负责人
startupThesis:
  nonObviousInsight: >-
    MiCA 之后真正卡住企业的，不是拿牌照，而是每天都要证明：到底哪些持牌机构能合法碰哪个工作流。一旦 ESMA
    注册库同时变成服务准入门槛和公开信任凭证，赢家就会是那家把零散法律权限拼成一张运营图谱、嵌进准入、路由和
    合作伙伴审批流程里的公司——而不是又一个 KYC 或链上分析厂商。
  beachhead: >-
    法国、荷兰和德国的 MiCA 授权加密经纪商与托管机构：它们要为托管、交易或资产管理工作流接入 5-30 家外部
    CASP，业务覆盖 3 个以上 EEA 市场，需要每天拿到每个交易对手方确切权限范围的证据才能激活或续约
  wedge: >-
    一张实时更新的 MiCA 授权关系图谱：把法律实体和品牌对应起来，跟踪权限范围与注册库变化，保存跨境通行与
    准入证据，一旦交易对手方缺少工作流所需的确切授权，就触发提醒或直接拦下流程
  whyNowCatalyst: >-
    7 月 1 日这个截止日，让注册状态变成了欧盟加密服务交付的实时门槛；交易对手方自称的资质和注册库实际
    许可之间只要出现一丝偏差，立刻就是合规和收入风险。
  ventureScalePath: >-
    先从 CASP 的 MiCA 交易对手方准入与监控切入，再扩展到银行准入、交易政策执行、供应商风险工作流，最终
    做成覆盖数字资产和支付类交易对手方的全球牌照关系图谱。
solution: >-
  产品每天摄取 ESMA 注册库数据，解析法律实体和品牌名称，把牌照条目翻译成合规团队真正用得上的内部服务分类
  体系。经纪商要给某个托管方、流动性场所或资产管理合作伙伴做准入或续约时，系统会核对其确切权限集合、存下
  证明，遇到范围或司法辖区不清楚的情况就开一个例外工单。产品和 CRM、工单系统或交易审批工作流打通后，团队
  可以在证据补齐之前直接拦住激活动作；一旦后续注册库变化可能让现有合作关系失效，系统也会及时提醒。随着
  时间推移，公司会沉淀出一份权威的历史变更日志和交易对手方关系图谱，成为银行、审计机构和各类机构在评估
  加密风险敞口时信赖的依据。
goToMarketSeed:
  firstCustomer: >-
    巴黎或阿姆斯特丹一家 MiCA 授权经纪商或托管机构的合规负责人：运营团队 10-40 人，有 8-20 家外部流动性或
    托管合作伙伴，机构销售业务依赖于证明每个合作伙伴的 MiCA 资质状态
  buyingTrigger: >-
    新交易对手方准入、机构尽调问卷，或 7 月 1 日之后的复核工作，都会迫使团队重新核查现有合作伙伴的权限。
  currentAlternative: 手动检索 ESMA 注册库、表格记录交易对手方名单、共享盘里的截图，以及外部律所出具的备忘录
  switchingReason: >-
    这个切口能给出实时、按工作流定制的证明，而不是一次性的过时核查，还能揪出那些"人在注册库里、却没有
    交易或托管流程所需精确权限或地域覆盖"的情况。
  pricingHypothesis: 按受监管实体数量、监控的交易对手方数量和自动化审批工作流数量收取年度订阅费，实体映射和策略设计另收实施费
whyNow:
  - point: 祖父条款窗口期已经结束，没进注册库的企业不能再合法服务欧盟客户，交易对手方必须立刻重新核查此前的假设。
    signalRefs: [过渡期已经关闭]
    sourceRefs: [1, 3]
  - point: ESMA 一次更新新增 37 家 CASP，说明这份注册库正在变成一个快速变动的运营数据集，而不是一张静态的合规网页。
    signalRefs: [注册库扩容变成了日常运营变量]
    sourceRefs: [2]
  - point: 据报道仅约 17 家注册服务商持有交易平台权限，服务级别的权限不匹配现在足以打乱准入或订单路由决策。
    signalRefs: [权限范围成了关键变量]
    sourceRefs: [2]
  - point: 由于注册库现在是交易对手方和机构眼中的公开信誉信号，授权证明会直接影响销售周期和合作伙伴审批。
    signalRefs: [注册库变成了信任凭证]
    sourceRefs: [1]
  - point: 高管们正把合规质量定义为竞争优势，这就为那些能把权限监控变成可重复运营流程的软件腾出了预算。
    signalRefs: [合规质量变成了商业筹码]
    sourceRefs: [3]
differentiator: >-
  链上分析和 KYC 厂商盯的是"客户是谁"以及"资金是否有风险"；律所和顾问给的是一次性意见。这家公司占据的是
  另一层：跨法律实体、服务类别和司法辖区的机器可读权限范围，外加嵌入运营工作流的历史变更日志。这层东西的
  价值体现在两头——交易对手方获批之前用得上，上线之后同样有用，一旦注册库悄悄发生变化，风险敞口也能被及时
  捕捉。它监控的交易对手方越多、处理的例外情况和权限映射模式越多，普通表格或单一供应商合规套件就越难把它
  替代掉。
conceptDiagram:
  title: MiCA 交易对手方授权流程
  mermaid: |
    flowchart LR
      Buyer[CASP compliance lead] --> Pain[Cannot prove counterparty permission scope daily]
      Pain --> Product[Live MiCA authorization graph]
      Product --> Outcome[Faster onboarding and safer EU crypto service delivery]
businessModelCanvas:
  customerSegments:
    - MiCA 授权加密经纪商和 OTC 柜台
    - MiCA 授权托管机构和资产管理服务商
    - 正在准入 MiCA 受监管加密合作伙伴的银行和机构投资者
  valuePropositions:
    - 每日提供交易对手方确切权限范围与司法辖区覆盖的证明
    - 自动生成交易对手方证据包并推送变更提醒
    - 未获批合作伙伴接触托管或执行流程前直接拦截
  channels:
    - 直销给欧盟 CASP 的 CCO、COO 和合规运营负责人
    - 来自处理 MiCA 就绪事务的加密法律顾问和审计机构的转介
    - 与托管、经纪和交易对手方准入软件厂商建立合作
  customerRelationships:
    - 高触达实施服务，负责实体映射和审批策略设计
    - 随新市场和新交易对手方持续推进监控复核
  revenueStreams:
    - 企业年度订阅
    - 准入与策略映射实施费
    - 高级 API 和工作流自动化模块
  keyResources:
    - MiCA 实体与权限关系图谱
    - 历史注册库变更日志与证据库
    - 对接准入、CRM 和工单系统的连接器
  keyActivities:
    - 摄取并标准化 ESMA 注册库变更
    - 把法律权限映射到客户工作流策略
    - 生成审计与交易对手方尽调证据
  keyPartners:
    - 加密法律与监管顾问机构
    - 托管、经纪和合规工作流平台
    - 审计机构和机构准入服务商
  costStructure:
    - 监管数据工程
    - 合规领域专家与客户成功团队
    - 企业销售与系统集成
jobsToBeDone:
  - job: >-
      准入新的托管或流动性合作伙伴时，帮合规团队证明对方确实获得了该 MiCA 服务和该市场的授权，让我们能在
      没有隐藏风险的情况下启用这段合作关系。
    currentAlternative: 手动检索注册库，加上律师备忘录和表格清单
    successMetric: 批准新交易对手方所需时间，以及上线前发现的权限例外数量
  - job: >-
      当机构客户或审计方问起我们为什么依赖某家 CASP 时，帮我们拿出该合作伙伴权限范围和状态变化的当前与
      历史证据，让尽调能快速过关，收入关系也能继续维持。
    currentAlternative: 截图存档，加上从共享盘里临时拼凑的证据包
    successMetric: 答复一次尽调请求所需的小时数，以及有最新证据在案的交易对手方占比
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 三篇同日报道用具体数字和买方影响佐证了这次监管转变，尽管窗口内没有 ESMA 的一手发布。
  painIntensity:
    score: 4
    rationale: 宽限期结束后，交易对手方权限范围一旦判断错误，就可能卡住创收工作流，或立刻带来合规风险敞口。
  wedgeClarity:
    score: 5
    rationale: 每日交易对手方授权核查、权限范围监控和证据包生成，构成了一个买方明确、触发点清晰的窄工作流。
  defensibility:
    score: 4
    rationale: 实体解析、权限本体、历史变更日志和工作流嵌入，能沉淀出超越原始公开数据的复合型专有价值。
  ventureScale:
    score: 4
    rationale: MiCA 的初始滩头市场虽窄，但可以成长为跨市场数字资产交易对手方牌照与合作伙伴风控工作流的控制层。
topRisks:
  - name: 公开数据被商品化
    description: 买方一开始可能会把它看成 ESMA 注册库外面套了层壳，而不是一套非用不可的操作系统。
    mitigation: 把产品嵌进审批工作流、历史变更日志和交易对手方证据包里，这些东西靠人工复现的成本很高。
  - name: 监管边缘案例存在模糊地带
    description: 涉及细微服务差异或司法辖区问题时，原始注册库条目和跨境通行事实仍可能需要法律解读，这限制了完全自动化的空间。
    mitigation: 保留人工复核队列，与专业律所合作，先把没有歧义的服务权限核查自动化。
  - name: 滩头市场规模有限
    description: 随着监管制度成熟，第一批拥有复杂交易对手方网络的 MiCA 授权企业，数量可能比预期更少。
    mitigation: 权限图谱建成后，用 CASP 这个切口向银行、支付服务商（PSP）和跨司法辖区牌照工作流扩展。
