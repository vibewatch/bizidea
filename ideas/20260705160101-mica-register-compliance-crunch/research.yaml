reportMemo:
  executiveTakeaways:
  - 'The wedge is real but the first market is smaller than generic EU crypto-compliance hype suggests: ESMA''s current CASP file contains 279 unique authorised entities, only 115 home-based in Germany, France, and the Netherlands, and just 18 trading-platform permissions [3].'
  - 'The pain is operational, not informational: ESMA already publishes weekly CSVs and NCAs publish forms, passport notifications, and ongoing reporting obligations, but teams still have to reconcile service codes, host-state coverage, legal-entity aliases, and workflow-specific permissions before turning on counterparties [2][3][4][20][24][25][30].'
  - Budget exists only if the product sits inside existing compliance motions. Notabene's 2024 survey says 47% of respondents had to demonstrate Travel Rule compliance during licence applications and 64% do due diligence pre-transaction, while Chainalysis, Elliptic, Notabene, and Sumsub already sell adjacent screening, analytics, Travel Rule, and KYB tools into the same buyer [51][63][75][78][97].
  - 'Competitive intensity is high from adjacent vendors and from the free substitute of public registers plus spreadsheets, screenshots, and legal memos. The white space is narrower: a MiCA-specific graph of which legal entity can perform which service in which jurisdiction, with usable evidence and change history [2][3][51][63][75][97].'
  - The venture case depends on expansion beyond CASPs. MiCA creates a credible beachhead, but the immediate SAM is probably single-digit millions unless the product expands to banks, stablecoin issuers, and broader multi-jurisdiction licensing workflows [3][33][45].
  marketDefinition: This market is a workflow-grade authorisation and counterparty-permission layer for regulated crypto firms operating under MiCA. It sits between raw registers and existing AML and Travel Rule stacks, translating ESMA and NCA records, service codes, passport notifications, and transfer-data obligations into an approval signal for custody, exchange, transfer, trading, and portfolio-management workflows [2][3][4][15][24][30][75][83].
  customerAndBuyer: The day-to-day user is the compliance operations or onboarding manager who must prove counterparties' current status before activation; the economic buyer is usually the CCO, COO, or head of compliance because authorisation quality, passport notifications, management-body suitability, and post-licence reporting all sit inside controlled supervisory processes rather than ad hoc operations [18][23][24][25][30][33][35].
  buyingTriggers:
  - point: A new counterparty onboarding or cross-border expansion forces the team to prove the exact MiCA service and host-state coverage before activation.
    sourceRefs:
    - 20
    - 24
    - 30
  - point: A transitional deadline, wind-down plan, or register update creates urgency to re-check which providers can still legally serve EU clients.
    sourceRefs:
    - 18
    - 33
    - 42
  - point: A licence review, institutional diligence questionnaire, or Travel Rule audit requires evidence that counterparties and controls are current and pre-transaction.
    sourceRefs:
    - 33
    - 35
    - 78
    - 79
  willingnessToPay:
    summary: 'Public pricing is scarce, but budget is real: regulated crypto firms already buy quote-led crypto-compliance, screening, Travel Rule, and KYB products from Chainalysis, Elliptic, Notabene, and Sumsub, and Notabene''s survey found that 47% of respondents had to demonstrate Travel Rule compliance during licence applications. That supports spend for a workflow-grade layer, but buyers will want it to replace manual register checks, evidence packs, or outside-counsel loops rather than add another dashboard.'
    sourceRefs:
    - 51
    - 63
    - 75
    - 78
    - 97
    - 98
  competitiveLandscape: The adjacent market clusters into blockchain analytics, Travel Rule and counterparty networks, and KYB or onboarding suites. The default substitute remains the regulator's public register plus spreadsheets, screenshots, and legal memos. The white space is not “crypto compliance” broadly, but a system that resolves which legal entity can do which MiCA service in which jurisdiction before money moves [2][3][51][63][75][97].
  incumbentThesis:
  - incumbentClass: Blockchain analytics suites
    point: Chainalysis and Elliptic can identify risky wallets, entities, and transaction patterns, but they do not present themselves as the canonical MiCA permission graph or passporting audit trail.
    sourceRefs:
    - 51
    - 52
    - 53
    - 63
    - 64
  - incumbentClass: Travel Rule networks
    point: Notabene is strongest where the workflow begins at transfer messaging and counterparty VASP due diligence, yet its public materials focus on Travel Rule data exchange and VASP discovery rather than full MiCA service-scope history across counterparties.
    sourceRefs:
    - 75
    - 76
    - 77
    - 79
    - 81
  - incumbentClass: KYB and onboarding suites
    point: Sumsub already sells crypto onboarding, Travel Rule, monitoring, and business verification, but the product family is broader identity and compliance infrastructure rather than a regulator-grade MiCA entitlement layer.
    sourceRefs:
    - 94
    - 97
    - 98
    - 99
  - incumbentClass: Regulators and raw registers
    point: ESMA, NCAs, and official forms are the raw source of truth, but they publish records and process notifications rather than resolve entity aliases, historical deltas, or workflow-specific approval logic for operators.
    sourceRefs:
    - 2
    - 3
    - 20
    - 24
    - 30
  regulatoryLandscape: MiCA harmonised authorisation and passporting, but the workflow is still multi-layered. Only authorised CASPs or eligible Article 60 financial entities may provide services; transition windows differ by member state; ESMA's register updates weekly; and the EU Transfer of Funds Regulation adds originator and beneficiary data obligations that push counterparties toward pre-transaction checks, not just annual licensing review [2][15][18][24][30][33][75][83].
  technologyLandscape: 'The raw data substrate is now real: ESMA publishes CSVs with home state, legal entity, service code, host states, and last-update fields [2][3][4]. The technical challenge is not scraping a website; it is resolving brands to legal entities, translating MiCA service codes into customer workflows, versioning register changes, and writing decisions back into existing screening, Travel Rule, KYB, and ticketing systems already sold by Chainalysis, Elliptic, Notabene, and Sumsub [51][63][75][97].'
  distributionChannels:
  - point: Direct sales into authorised or in-process CASPs in Germany, France, and the Netherlands are the clearest path because MiCA supervision is already a board-level agenda there.
    sourceRefs:
    - 3
    - 18
    - 35
  - point: Co-selling through analytics, Travel Rule, and KYB vendors can shorten deployment because those tools already sit in pre-transaction or onboarding workflows.
    sourceRefs:
    - 51
    - 63
    - 75
    - 97
  - point: MiCA application advisers and pre-scan projects are useful feeders because regulators emphasise early engagement and high-quality filing packs.
    sourceRefs:
    - 23
    - 30
    - 33
  partnershipEcosystem:
  - point: Blockchain analytics and Travel Rule providers are natural partners because CASPs already use them for wallet screening, KYT, VASP discovery, and pre-transaction checks.
    sourceRefs:
    - 52
    - 53
    - 76
    - 79
  - point: Specialist legal and regulatory advisers matter because Article 60 notifications versus Article 63 authorisations still require careful service scoping and filing quality.
    sourceRefs:
    - 18
