openQuestions:
- How many of the 115 German, French, and Dutch home-state CASPs actually manage more than ten external counterparties across three or more EEA markets, versus simpler domestic flows?
- How often do ESMA's weekly files lag national register changes by enough to create real approval risk?
- Will institutional banks and asset managers accept register-derived evidence packs, or still insist on bespoke legal opinions in scope edge cases?
- Can Article 60 notification logic be productized safely without buyers treating the software as legal advice?
