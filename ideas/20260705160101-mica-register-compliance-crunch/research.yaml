  geographicConsiderations:
  - point: Germany, France, and the Netherlands are the best first wedge because they account for 115 home-state CASPs in the current ESMA file.
    sourceRefs:
    - 3
  - point: Transition urgency differs across the bloc—France to 1 July 2026, Ireland to 30 December 2025, and several other states shortened windows—so sequencing by national deadline matters.
    sourceRefs:
    - 18
    - 33
    - 94
  - point: Luxembourg, Malta, Cyprus, and Ireland matter next because they are licensing hubs for firms that want EEA-wide passporting.
    sourceRefs:
    - 30
    - 33
