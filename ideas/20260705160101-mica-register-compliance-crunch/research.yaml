  validationPlan:
  - priority: high
    question: What share of German, French, and Dutch CASPs actually manage more than ten external counterparties across three or more EEA markets?
    evidenceToGather: Interview 20 design-partner candidates and collect anonymized counterparty inventories, onboarding checklists, and market footprints.
  - priority: high
    question: How often do register changes or service-scope mismatches create real onboarding or renewal exceptions?
    evidenceToGather: Backtest 90 days of new and renewed counterparties at two design partners, logging every register check, ambiguity, and escalation.
  - priority: medium
    question: Will institutional banks and asset managers accept register-derived evidence packs, or still demand bespoke legal opinions in edge cases?
    evidenceToGather: Collect diligence requests from one bank, one asset manager, and one auditor and compare what evidence actually closes the request.
  - priority: medium
    question: Can Article 60 and Article 63 scoping be productized without customers treating the software as legal advice?
    evidenceToGather: Have specialist counsel review 25 real scenarios and label which can be automated, which need human review, and which must remain legal judgment.
