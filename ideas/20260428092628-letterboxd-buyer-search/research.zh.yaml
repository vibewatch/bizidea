competitors:
  - name: Letterboxd
    stage: incumbent
    wedge: 以社交化电影日志、评论、榜单和社区身份为核心，并通过付费统计和筛选功能变现。
    pricing: 免费；Pro $18.99/年；Patron $48.99/年。
    strength: 掌握电影社交习惯，并已提供由 JustWatch 驱动的流媒体服务筛选。
    weaknessVsUs: 并非围绕中立、跨界面的自然语言口味搜索构建，而且在新所有权下可能面临相互冲突的货币化激励。
    sourceRefs: [1, 6, 9]
  - name: JustWatch
    stage: incumbent
    wedge: 覆盖数千家提供商的跨服务可看性、热度、降价提醒与片单工具。
    pricing: 免费核心功能；iOS 上列出的 JustWatch Pro 应用内购买价格为 $3.99。
    strength: 提供商覆盖强，围绕“它在哪个平台能看？”形成了稳定习惯，并已有平台级集成。
    weaknessVsUs: 更擅长目录检索，而不是个人口味推理；相较于 Letterboxd 原生用户，也缺少电影文化身份感。
    sourceRefs: [10, 11, 25, 26]
  - name: Plex Discover
    stage: incumbent
    wedge: 在更大的 Plex 生态内提供通用搜索、片单、社交图谱和媒体管理。
    pricing: 免费核心功能；Plex Pass $6.99/月 或 $69.99/年。
    strength: 装机基数大，跨服务发现能力强，也有朋友/社交功能。
    weaknessVsUs: 产品面向的是更广义的家庭媒体聚合，而不是基于导入口味历史的电影发烧友搜索层。
    sourceRefs: [12, 13]
  - name: Google TV
    stage: incumbent
    wedge: 借助操作系统级聚合和 Gemini 驱动的对话式发现，提供统一浏览体验。
    pricing: 随平台/设备生态打包。
    strength: 分发杠杆强，并处于默认屏幕位置。
    weaknessVsUs: 优化目标是泛家庭娱乐，而不是可迁移的电影发烧友身份或 Letterboxd 式的口味深度。
    sourceRefs: [15]
regulatoryTechnicalConstraints:
  - point: TMDb API 条款限制衍生用途、AI 训练使用，以及超过六个月的缓存。
    sourceRefs: [18]
  - point: 虽然旧版公开上限已退役，TMDb 仍执行约每秒 40 次请求的上层速率限制。
    sourceRefs: [29]
  - point: 流媒体可看性分散在大量提供商之间，并随地域变化，增加了数据标准化负担。
    sourceRefs: [10, 25]
  - point: 发现工具会处理敏感的口味/画像数据；应用商店披露也说明，用户已经被要求信任这些产品处理标识符、使用数据，有时还包括搜索历史。
    sourceRefs: [9, 11, 13]
  - point: GDPR 有助于“可迁移性”叙事，但实际获取仍取决于平台控制的导出路径和用户投入。
    sourceRefs: [7, 20]
validationSignals:
  - point: 据报道，Letterboxd 在 2026 年达到 2600 万用户，而 2020 年这一数字仅为 170 万。
    sourceRefs: [1, 2]
  - point: Letterboxd 在 2024 年报告了 1700 万成员、7.01 亿次观影，以及每五秒新增一名成员。
    sourceRefs: [5]
  - point: 电影制片厂、发行商和影院已经把 Letterboxd 当作营销和受众信号渠道。
    sourceRefs: [4]
  - point: Letterboxd 如今不仅靠订阅变现，也通过视频商店租赁赚钱，说明交易可以附着在发现链路上。
    sourceRefs: [9]
  - point: Google TV、Apple TV 和 Plex 都明确宣传统一发现与减少应用切换，说明这个痛点已经走向主流。
    sourceRefs: [12, 14, 15]
openQuestions:
  - 在 Letterboxd 的 2600 万用户里，真正达到“已记录 200+ 部电影且订阅 2+ 个付费流媒体”滩头门槛的人，到底占多少？
  - 会有足够多的用户频繁授权导出/导入吗？如果更新不够及时，个性化搜索会不会显得陈旧？
  - 真正的付费锚点更接近 Letterboxd Pro、Patron，还是一次性工具购买？
  - 在没有平台特权数据的情况下，创业公司能否做出明显优于 JustWatch、Plex 和 Google TV 的推荐？
