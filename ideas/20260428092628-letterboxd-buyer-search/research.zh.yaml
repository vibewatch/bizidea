competitors:
  - name: Letterboxd
    stage: incumbent
    wedge: 社交化电影日记、评论、片单与社区身份，并提供付费统计和筛选。
    pricing: Free; Pro $18.99/year; Patron $48.99/year.
    strength: 拥有最强的电影社交习惯，并且已经提供 JustWatch 驱动的平台筛选。
    weaknessVsUs: 并非围绕中立、跨界面、自然语言品味搜索打造，而且在新东家背景下可能面临相互冲突的商业化激励。
    sourceRefs: [1, 6, 9]
  - name: JustWatch
    stage: incumbent
    wedge: 覆盖数千家提供方的跨服务上架、热度、降价和想看清单工具。
    pricing: Free core; JustWatch Pro listed as a $3.99 in-app purchase on iOS.
    strength: 平台覆盖强，用户对“它在哪能看？”这一场景已有习惯，而且已有现成平台集成。
    weaknessVsUs: 更擅长目录查找而不是个人品味推理；相对 Letterboxd 原生用户，也缺乏电影文化身份感。
    sourceRefs: [10, 11, 25, 26]
  - name: Plex Discover
    stage: incumbent
    wedge: 在更大的 Plex 生态里提供统一搜索、想看清单、社交图谱和媒体管理。
    pricing: Free core; Plex Pass $6.99/month or $69.99/year.
    strength: 安装基础强，具备跨服务发现能力和朋友/社交功能。
    weaknessVsUs: 产品面向的是广义家庭媒体聚合，而不是建立在导入品味历史之上的电影发烧友搜索层。
    sourceRefs: [12, 13]
  - name: Google TV
    stage: incumbent
    wedge: 借助 OS-level 聚合提供统一浏览和 Gemini 驱动的对话式发现。
    pricing: Bundled with platform/device ecosystem.
    strength: 拥有分发杠杆和默认屏幕入口。
    weaknessVsUs: 优化目标是泛家庭娱乐，而不是可迁移的影迷身份或 Letterboxd 式的品味深度。
    sourceRefs: [15]
regulatoryTechnicalConstraints:
  - point: TMDb API 条款限制衍生用途、AI-training usage，以及超过 six months 的缓存。
    sourceRefs: [18]
  - point: TMDb 虽然下线了旧的公开限制，但仍执行约 40 requests per second 的速率上限。
    sourceRefs: [29]
  - point: 流媒体上架信息在不同提供方和地理区域之间高度碎片化，增加了数据标准化负担。
    sourceRefs: [10, 25]
  - point: 发现工具会处理敏感的品味/档案数据；应用商店披露显示，用户已经被要求信任此类产品处理标识符、使用数据，有时还包括搜索历史。
    sourceRefs: [9, 11, 13]
  - point: GDPR 有助于支撑可迁移叙事，但实际访问仍取决于平台控制的导出路径和用户付出的努力。
    sourceRefs: [7, 20]
validationSignals:
  - point: 据报道，Letterboxd 在 2026 年达到 26M users，而 2020 年仅为 1.7M。
    sourceRefs: [1, 2]
  - point: Letterboxd 在 2024 年报告 17M members、701M films watched，以及 every five seconds 新增一名成员。
    sourceRefs: [5]
  - point: 电影制片厂、发行商和影院已经把 Letterboxd 当作营销与受众信号渠道。
    sourceRefs: [4]
  - point: Letterboxd 的变现已经不只依赖订阅，还包含视频商店租赁，说明交易可以叠加在发现之上。
    sourceRefs: [9]
  - point: Google TV、Apple TV 和 Plex 都明确主打统一发现与减少应用切换，确认这个痛点已进入主流。
    sourceRefs: [12, 14, 15]
openQuestions:
  - Letterboxd 的 26M users 中，真正符合切入市场门槛——已记录 200+ 部电影且订阅 2+ 付费流媒体——的人占比究竟有多大？
  - 有多少用户会足够频繁地授权导出/导入，以至于个性化搜索体验能保持“实时”而不是“陈旧”？
  - 真正的付费意愿锚点更接近 Letterboxd Pro、Patron，还是一次性工具购买？
  - 在没有特权平台数据的情况下，创业公司能否持续给出明显优于 JustWatch、Plex 和 Google TV 的推荐？
