    name: Year 2 gross new paying customers by month
    value: '[320, 380, 440, 520, 600, 700, 800, 900, 1000, 1100, 1200, 1300]'
    unit: customers per month
    source: '[BP milestones 12–24 months] assumes referrals, alerts, and repeatable onboarding lift acquisition after product-market fit signals appear.'
  - id: A7
    name: Year 3 gross new paying customers by month
    value: '[1400, 1500, 1600, 1700, 1800, 1900, 2000, 2100, 2200, 2300, 2400, 2500]'
    unit: customers per month
    source: '[BP milestones 24–36 months + research SOM] reaches ~27.5K paying users by end of Year 3, still only a low-single-digit share of the modeled SAM.'
  - id: A8
    name: Target gross margin
    value: '70%'
    unit: pct of revenue
    source: '[BP businessModel.targetGrossMarginPct] modeled as 30% COGS on subscription revenue.'
  - id: A9
    name: Founder / CEO loaded cash compensation
    value: '$84K'
    unit: USD per year
    source: '[BP team] startup-finance heuristic: ~$70K founder cash salary plus ~20% payroll tax / benefits load.'
  - id: A10
    name: Founding engineer loaded cash compensation
    value: '$132K'
    unit: USD per year
    source: '[BP team] startup-finance heuristic: ~$110K salary plus ~20% load for an early consumer-product engineer.'
  - id: A11
    name: Product / design loaded cash compensation
    value: '$108K'
    unit: USD per year
    source: '[BP team] startup-finance heuristic: ~$90K salary plus ~20% load for the first product/design hire.'
  - id: A12
    name: Growth / community loaded cash compensation
    value: '$90K'
    unit: USD per year
    source: '[BP team] startup-finance heuristic: ~$75K salary plus ~20% load for creator/community GTM.'
  - id: A13
    name: Data / partnerships loaded cash compensation
    value: '$108K'
    unit: USD per year
    source: '[BP team] startup-finance heuristic: ~$90K salary plus ~20% load for metadata, partnerships, and coverage quality.'
  - id: A14
    name: Second engineer loaded cash compensation
    value: '$132K'
    unit: USD per year
    source: '[Startup-finance heuristic] second engineer added only after growth is proven; compensation held equal to the founding-engineer benchmark.'
  - id: A15
    name: Hiring timeline
    value: M1 founder and founding engineer; M5 product/design; M8 growth/community; M11 data/partnerships; M31 second engineer
    unit: timeline
    source: '[BP team] first four roles follow the plan; the second engineer is a conservative Year 3 support hire once usage scale is proven.'
  - id: A16
    name: Non-payroll sales and marketing spend ladder
    value: '$2K M1-M6, $4K M7-M12, $6K M13-M18, $8K M19-M24, $10K M25-M30, $12K M31-M36'
    unit: USD per month
    source: '[BP gtm channels] heuristic for creator partnerships, content, referral experiments, and limited paid testing rather than heavy paid media.'
  - id: A17
    name: Non-payroll R&D tools spend ladder
    value: '$3K per month in Y1, $4K per month in Y2, $5K per month in Y3'
    unit: USD per month
    source: '[BP operations + product] heuristic for cloud, metadata tooling, ranking evals, and app infrastructure.'
  - id: A18
    name: Non-payroll G&A spend ladder
    value: '$3K per month in Y1, $4K per month in Y2, $5K per month in Y3'
    unit: USD per month
    source: '[BP operations] heuristic for legal, accounting, insurance, app-store/admin tooling, and customer privacy compliance.'
  - id: A19
    name: CAC calculation convention
    value: '$12.7'
    unit: USD per new paying customer
    source: '[Model calc] trailing 18-month sales and marketing spend of ~$378K divided by 29.7K gross new paying customers.'
  - id: A20
    name: Funding milestone for this round
    value: Reach ~9.2K paying users by end of Year 2, ship alerts/households, and preserve 6 months of post-milestone cash buffer
    unit: milestone
    source: '[BP milestones + developer requirement] funding ask is set to the next financing proof point plus explicit 6-month cushion.'
