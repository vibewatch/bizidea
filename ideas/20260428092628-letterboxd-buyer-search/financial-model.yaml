    name: Year 1 gross new paying customers by month
    value: '[0, 0, 20, 30, 40, 60, 80, 100, 130, 170, 220, 280]'
    unit: customers per month
    source: '[BP experimentRoadmap + funnelTargets] founder-led launch assumes early creator/community seeding and annual-plan conversion after import.'
