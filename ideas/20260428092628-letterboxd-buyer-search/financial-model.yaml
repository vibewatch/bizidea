scenarios:
  downside:
    description: 25% slower paid-subscriber adds and 50 bps worse monthly churn if willingness to pay or onboarding trust is weaker than planned.
    y3RevenueK: 799.3
    y3EbitdaK: -280.5
    cashLowPointK: 316.1
    keyAssumptionChanges:
      - Gross new paying-customer ramp cut to 75% of base.
      - Monthly churn increases from 2.5% to 3.0%.
  base:
    description: Creator-led acquisition compounds, churn stays contained, and the team remains lean until the second engineer is added in late Year 3.
    y3RevenueK: 1101.6
    y3EbitdaK: -69.0
    cashLowPointK: 540.7
    keyAssumptionChanges:
      - Uses the modeled paid-add ramps in A5-A7.
      - Holds gross margin at 70% and keeps headcount at 5-6 FTE.
  upside:
    description: Better creator pull-through and stronger retention lift revenue into profitability without meaningfully accelerating headcount.
    y3RevenueK: 1367.0
    y3EbitdaK: 116.9
    cashLowPointK: 654.1
    keyAssumptionChanges:
      - Gross new paying-customer ramp increases to 120% of base.
      - Monthly churn improves from 2.5% to 2.0%.
sensitivity:
  - variable: ARPU
    downsideCase: Annual ARPU lands near $50 as price-sensitive users choose lower-value monthly behavior.
    baseCase: $60 annual equivalent recognized ARPU with annual-first packaging.
    upsideCase: Annual ARPU reaches $70 with better packaging and modest commerce contribution.
    y3RevenueImpactK: -183.6
    cashImpactK: -162.5
  - variable: churn
    downsideCase: Monthly churn rises to 3.0% if the product feels like a nice-to-have after first import.
    baseCase: 2.5% monthly churn.
    upsideCase: 2.0% monthly churn if saved searches and alerts create real habit.
    y3RevenueImpactK: -35.8
    cashImpactK: -29.0
  - variable: CAC
    downsideCase: Cash CAC rises ~30% because creator/community growth underperforms and paid acquisition is needed.
    baseCase: Trailing 18-month CAC of about $12.7 from creator-led and referral-heavy growth.
    upsideCase: CAC falls ~15% if referrals and creator loops do more of the work.
    y3RevenueImpactK: 0.0
    cashImpactK: -178.7
  - variable: sales cycle
    downsideCase: Import-to-paid conversion ramps 15% slower, reducing monthly new paying users despite similar traffic.
    baseCase: Paid-add ramp follows A5-A7.
    upsideCase: Import-to-paid conversion ramps 15% faster on better onboarding and clearer utility messaging.
    y3RevenueImpactK: -165.2
    cashImpactK: -146.3
  - variable: gross margin
    downsideCase: Gross margin slips to 65% if availability or data costs rise faster than expected.
    baseCase: 70% gross margin.
    upsideCase: Gross margin improves to 75% with better data efficiency and infrastructure scale.
    y3RevenueImpactK: 0.0
    cashImpactK: -69.6
  - variable: hiring pace
    downsideCase: The second engineer is pulled forward two quarters earlier to fix scale and data-quality issues.
    baseCase: Second engineer starts in M31 only after usage is proven.
    upsideCase: The team delays the second engineer beyond Year 3 and leans on contractors/tools instead.
    y3RevenueImpactK: 0.0
    cashImpactK: -66.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      CreatorChannels[Creator and community traffic] --> Imports[Completed imports]
      Imports --> PaidUsers[Paying subscribers]
      PaidUsers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit at 70% margin]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by creator/community acquisition compounding into ~27.5K paying users by Q4Y3 at a $60 annual ARPU.
  - checkName: Must go right
    finding: Import-to-paid conversion has to stay inside the BP's 8-15% target band so paid adds can scale without expensive paid media.
  - checkName: Model breaks if
    finding: If paid adds run 25% below plan and churn rises to 3.0%, cash low point falls to about $316K and Y3 EBITDA stays deeply negative.
  - checkName: Next-round proof
    finding: The seed story works if the company exits Year 2 around 9K paying users with retention proof, sub-$15 CAC, and product habit from alerts and household workflows.
sanityChecks:
  ruleOf40: Y3 growth 303.8% plus EBITDA margin -6.3% = 297.5%.
  burnMultiple: Y2 burn multiple is about 1.8x on recognized revenue growth, improving to ~0.1x in Y3 as the model approaches breakeven.
  revenuePerFte: $184K Y3 revenue per ending FTE (benchmark roughly $150K-$300K for a pre-scale prosumer subscription app).
  flags:
    - The model only works if creator/community distribution keeps cash CAC near the modeled ~$13; a pivot to paid media would raise the funding need materially.
    - Y3 recognized revenue reaches only about $1.1M, so the next round must be sold on retention and exit ARR rather than on mature-scale income statement size.
    - Onboarding still depends on Letterboxd export reliability, so platform changes could hurt both top-of-funnel conversion and churn at the same time.
    - No deferred-revenue benefit from annual prepay and no affiliate upside are modeled, which is conservative on cash but leaves less room for execution misses.
