    name: Blended annual paying-user ARPU
    value: '$60'
    unit: USD per paying user per year
    source: '[BP gtm.pricing] uses the plan''s $60 annual tier as the base recognized ARPU; no affiliate revenue or annual prepay cash uplift is modeled.'
