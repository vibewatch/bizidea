slug: movie-taste-search
date: '2026-04-28'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-05'
    unit: YYYY-MM
    source: "[BP date 2026-04-28] 模型从计划发布后的下一个月份开始。"
  - id: A2
    name: pre-seed 轮关闭后的期初现金
    value: '$1.6M'
    unit: USD
    source: "[BP fundingAsk $1.5–2.5M] 模型采用区间内偏保守的融资规模，用于支撑下一阶段种子轮证明里程碑并保留 6 个月缓冲。"
  - id: A3
    name: 混合年化付费用户 ARPU
    value: '$60'
    unit: USD per paying user per year
    source: "[BP gtm.pricing] 使用计划中的 $60 年费档作为确认收入口径的基础 ARPU；未计入联盟分成收入或年费预付带来的现金抬升。"
  - id: A4
    name: 月度付费流失率
    value: '2.5%'
    unit: pct per month
    source: "[BP funnelTargets 第 3 个月留存 >65%] 结合创业财务经验法则，适用于一个有意义黏性但尚未达到企业级稳定性的细分消费者订阅工具。"
  - id: A5
    name: 第 1 年每月新增付费用户总数
    value: '[0, 0, 20, 30, 40, 60, 80, 100, 130, 170, 220, 280]'
    unit: customers per month
    source: "[BP experimentRoadmap + funnelTargets] 创始人主导的发布假设，依赖早期创作者/社区冷启动，以及导入后的年费转化。"
  - id: A6
    name: 第 2 年每月新增付费用户总数
    value: '[320, 380, 440, 520, 600, 700, 800, 900, 1000, 1100, 1200, 1300]'
    unit: customers per month
    source: "[BP milestones 12–24 months] 假设在出现产品市场契合信号后，推荐传播、提醒功能和可复用引导流程会抬升获客。"
  - id: A7
    name: 第 3 年每月新增付费用户总数
    value: '[1400, 1500, 1600, 1700, 1800, 1900, 2000, 2100, 2200, 2300, 2400, 2500]'
    unit: customers per month
    source: "[BP milestones 24–36 months + research SOM] 到第 3 年末达到约 27.5K 付费用户，仍只占建模 SAM 的个位数低位份额。"
  - id: A8
    name: 目标毛利率
    value: '70%'
    unit: pct of revenue
    source: "[BP businessModel.targetGrossMarginPct] 订阅收入按 30% COGS 建模。"
  - id: A9
    name: 创始人 / CEO 全成本现金薪酬
    value: '$84K'
    unit: USD per year
    source: "[BP team] 创业财务经验法则：创始人现金年薪约 $70K，叠加约 20% 的薪资税与福利附加成本。"
  - id: A10
    name: 创始工程师全成本现金薪酬
    value: '$132K'
    unit: USD per year
    source: "[BP team] 创业财务经验法则：早期消费者产品工程师年薪约 $110K，叠加约 20% 附加成本。"
  - id: A11
    name: 产品 / 设计负责人全成本现金薪酬
    value: '$108K'
    unit: USD per year
    source: "[BP team] 创业财务经验法则：首位产品/设计岗位年薪约 $90K，叠加约 20% 附加成本。"
  - id: A12
    name: 增长 / 社区负责人全成本现金薪酬
    value: '$90K'
    unit: USD per year
    source: "[BP team] 创业财务经验法则：负责创作者/社区 GTM 的岗位年薪约 $75K，叠加约 20% 附加成本。"
  - id: A13
    name: 数据 / 合作负责人全成本现金薪酬
    value: '$108K'
    unit: USD per year
    source: "[BP team] 创业财务经验法则：负责元数据、合作与覆盖质量的岗位年薪约 $90K，叠加约 20% 附加成本。"
  - id: A14
    name: 第二位工程师全成本现金薪酬
    value: '$132K'
    unit: USD per year
    source: "[Startup-finance heuristic] 只有在增长被验证后才增加第二位工程师；薪酬按创始工程师基准持平处理。"
  - id: A15
    name: 招聘时间线
    value: M1 创始人和创始工程师；M5 产品/设计；M8 增长/社区；M11 数据/合作；M31 第二位工程师
    unit: timeline
    source: "[BP team] 前四个岗位遵循业务计划；第二位工程师作为保守的第 3 年支撑岗位，在使用规模被验证后再增加。"
  - id: A16
    name: 非薪酬销售与营销支出阶梯
    value: '$2K M1-M6, $4K M7-M12, $6K M13-M18, $8K M19-M24, $10K M25-M30, $12K M31-M36'
    unit: USD per month
    source: "[BP gtm channels] 按创作者合作、内容、推荐实验和有限付费测试的经验法则建模，而不是重度投放付费媒体。"
  - id: A17
    name: 非薪酬研发工具支出阶梯
    value: '$3K per month in Y1, $4K per month in Y2, $5K per month in Y3'
    unit: USD per month
    source: "[BP operations + product] 依据云资源、元数据工具、排序评测和应用基础设施的经验法则建模。"
  - id: A18
    name: 非薪酬 G&A 支出阶梯
    value: '$3K per month in Y1, $4K per month in Y2, $5K per month in Y3'
    unit: USD per month
    source: "[BP operations] 依据法务、会计、保险、应用商店/后台工具和用户隐私合规的经验法则建模。"
  - id: A19
    name: CAC 计算口径
    value: '$12.7'
    unit: USD per new paying customer
    source: "[Model calc] 过去 18 个月销售与营销支出约 $378K，除以 29.7K 新增付费用户总数。"
  - id: A20
    name: 本轮融资要达到的里程碑
    value: 在第 2 年末达到约 9.2K 付费用户，上线提醒与家庭功能，并保留 6 个月的里程碑后现金缓冲。
    unit: milestone
    source: "[BP milestones + developer requirement] 融资规模围绕下一轮融资所需证明点设置，并额外保留明确的 6 个月缓冲。"
