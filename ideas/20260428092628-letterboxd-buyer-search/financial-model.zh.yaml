slug: movie-taste-search
date: '2026-04-28'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-05'
    unit: YYYY-MM
    source: '[BP date 2026-04-28] 模型从计划发布后的次月开始。'
  - id: A2
    name: pre-seed 轮完成后的期初现金
    value: '$1.6M'
    unit: USD
    source: '[BP fundingAsk $1.5–2.5M] 模型采用区间内偏保守的融资额，用于支撑下一阶段种子轮证明里程碑，并预留 6 个月缓冲。'
  - id: A3
    name: 综合年度付费用户 ARPU
    value: '$60'
    unit: USD per paying user per year
    source: '[BP gtm.pricing] 以计划中的 $60 年费档作为基础确认 ARPU；模型未计入联盟收入，也未计入年付预收带来的现金抬升。'
  - id: A4
    name: 月度付费流失率
    value: '2.5%'
    unit: pct per month
    source: '[BP funnelTargets month-3 retention >65%] 再叠加创业财务经验法则，适用于一款黏性可观但达不到企业级稳定性的细分消费订阅工具。'
  - id: A5
    name: 第 1 年各月新增付费用户总数
    value: '[0, 0, 20, 30, 40, 60, 80, 100, 130, 170, 220, 280]'
    unit: customers per month
    source: '[BP experimentRoadmap + funnelTargets] 创始人主导的上线期假设会通过创作者/社区冷启动，并在导入后转向年费方案。'
  - id: A6
    name: 第 2 年各月新增付费用户总数
    value: '[320, 380, 440, 520, 600, 700, 800, 900, 1000, 1100, 1200, 1300]'
    unit: customers per month
    source: '[BP milestones 12–24 months] 假设在产品市场契合信号出现后，转介绍、提醒功能和可复用引导流程会抬升获客。'
  - id: A7
    name: 第 3 年各月新增付费用户总数
    value: '[1400, 1500, 1600, 1700, 1800, 1900, 2000, 2100, 2200, 2300, 2400, 2500]'
    unit: customers per month
    source: '[BP milestones 24–36 months + research SOM] 到第 3 年末达到约 27.5K 位付费用户，仍只占建模 SAM 的低个位数份额。'
  - id: A8
    name: 目标毛利率
    value: '70%'
    unit: pct of revenue
    source: '[BP businessModel.targetGrossMarginPct] 以订阅收入的 30% COGS 建模。'
  - id: A9
    name: 创始人 / CEO 全负担现金薪酬
    value: '$84K'
    unit: USD per year
    source: '[BP team] 创业财务经验法则：约 $70K 创始人现金工资，加约 20% 的工资税 / 福利负担。'
  - id: A10
    name: 创始工程师全负担现金薪酬
    value: '$132K'
    unit: USD per year
    source: '[BP team] 创业财务经验法则：早期消费产品工程师约 $110K 工资，加约 20% 负担。'
  - id: A11
    name: 产品 / 设计全负担现金薪酬
    value: '$108K'
    unit: USD per year
    source: '[BP team] 创业财务经验法则：首位产品/设计招聘约 $90K 工资，加约 20% 负担。'
  - id: A12
    name: 增长 / 社区全负担现金薪酬
    value: '$90K'
    unit: USD per year
    source: '[BP team] 创业财务经验法则：负责创作者/社区 GTM 的岗位约 $75K 工资，加约 20% 负担。'
  - id: A13
    name: 数据 / 合作全负担现金薪酬
    value: '$108K'
    unit: USD per year
    source: '[BP team] 创业财务经验法则：首位负责元数据、合作与覆盖质量的岗位约 $90K 工资，加约 20% 负担。'
  - id: A14
    name: 第二位工程师全负担现金薪酬
    value: '$132K'
    unit: USD per year
    source: '[Startup-finance heuristic] 第二位工程师只在增长得到验证后加入；薪酬按创始工程师基准持平。'
  - id: A15
    name: 招聘时间线
    value: M1 创始人和创始工程师；M5 产品/设计；M8 增长/社区；M11 数据/合作；M31 第二位工程师
    unit: timeline
    source: '[BP team] 前四个岗位沿用计划；第二位工程师是保守设置在第 3 年的支持性招聘，前提是使用规模已被验证。'
  - id: A16
    name: 非薪酬销售与市场费用阶梯
    value: '$2K M1-M6, $4K M7-M12, $6K M13-M18, $8K M19-M24, $10K M25-M30, $12K M31-M36'
    unit: USD per month
    source: '[BP gtm channels] 经验法则：主要用于创作者合作、内容、转介绍实验和有限的付费测试，而不是重度买量。'
  - id: A17
    name: 非薪酬研发工具费用阶梯
    value: '$3K per month in Y1, $4K per month in Y2, $5K per month in Y3'
    unit: USD per month
    source: '[BP operations + product] 经验法则：覆盖云服务、元数据工具、排序评估和应用基础设施。'
  - id: A18
    name: 非薪酬 G&A 费用阶梯
    value: '$3K per month in Y1, $4K per month in Y2, $5K per month in Y3'
    unit: USD per month
    source: '[BP operations] 经验法则：覆盖法务、会计、保险、应用商店/管理工具，以及客户隐私合规。'
  - id: A19
    name: CAC 计算口径
    value: '$12.7'
    unit: USD per new paying customer
    source: '[Model calc] 取过去 18 个月约 $378K 的销售与市场费用，除以 29.7K 位新增付费用户。'
  - id: A20
    name: 本轮融资要达到的里程碑
    value: 到第 2 年末达到约 9.2K 位付费用户，上线提醒/家庭功能，并在达到里程碑后仍保留 6 个月现金缓冲
    unit: milestone
    source: '[BP milestones + developer requirement] 融资需求以达到下一轮融资证明点并显式保留 6 个月缓冲为准。'
