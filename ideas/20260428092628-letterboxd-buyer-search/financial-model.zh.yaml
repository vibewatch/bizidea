scenarios:
  downside:
    description: 如果付费意愿或导入信任弱于计划，付费订阅新增速度下降 25%，且月度流失率恶化 50 个基点。
    y3RevenueK: 799.3
    y3EbitdaK: -280.5
    cashLowPointK: 316.1
    keyAssumptionChanges:
      - 每月新增付费用户爬坡降至 base 的 75%。
      - 月度流失率从 2.5% 上升到 3.0%。
  base:
    description: 创作者驱动获客持续复利，流失率保持可控，团队在第 3 年后段增加第二位工程师之前始终保持精简。
    y3RevenueK: 1101.6
    y3EbitdaK: -69.0
    cashLowPointK: 540.7
    keyAssumptionChanges:
      - 使用 A5-A7 中建模的付费新增爬坡。
      - 毛利率保持 70%，团队规模维持在 5-6 FTE。
  upside:
    description: 更强的创作者拉新和更好的留存，使收入走向盈利，而无需明显提前增加人员编制。
    y3RevenueK: 1367.0
    y3EbitdaK: 116.9
    cashLowPointK: 654.1
    keyAssumptionChanges:
      - 每月新增付费用户爬坡提升到基准情境的 120%。
      - 月度流失率从 2.5% 改善到 2.0%。
sensitivity:
  - variable: ARPU
    downsideCase: 当价格敏感用户选择更低价值的月费行为时，年化 ARPU 会更接近 $50。
    baseCase: 采用年费优先包装时，确认收入口径的年化 ARPU 为 $60。
    upsideCase: 通过更优打包和少量交易贡献，年化 ARPU 达到 $70。
    y3RevenueImpactK: -183.6
    cashImpactK: -162.5
  - variable: churn
    downsideCase: 如果产品在首次导入后被认为只是“有更好、没有也行”，月度流失率会升至 3.0%。
    baseCase: 月度流失率为 2.5%。
    upsideCase: 如果已保存搜索和提醒形成真实习惯，月度流失率可改善至 2.0%。
    y3RevenueImpactK: -35.8
    cashImpactK: -29.0
  - variable: CAC
    downsideCase: 如果创作者/社区增长不及预期、不得不依赖付费获客，现金 CAC 将上升约 30%。
    baseCase: 依靠创作者驱动和推荐传播，过去 18 个月的 CAC 约为 $12.7。
    upsideCase: 如果推荐传播和创作者回路承担更多工作，CAC 将下降约 15%。
    y3RevenueImpactK: 0.0
    cashImpactK: -178.7
  - variable: sales cycle
    downsideCase: 导入到付费的转化爬坡慢 15%，即便流量相近，每月新增付费用户仍会减少。
    baseCase: 付费新增爬坡遵循 A5-A7。
    upsideCase: 如果引导更顺畅、工具价值表达更清晰，导入到付费的转化爬坡将加快 15%。
    y3RevenueImpactK: -165.2
    cashImpactK: -146.3
  - variable: gross margin
    downsideCase: 如果上架或数据成本上涨快于预期，毛利率会降至 65%。
    baseCase: 毛利率为 70%。
    upsideCase: 通过更高的数据效率和基础设施规模，毛利率提升到 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -69.6
  - variable: hiring pace
    downsideCase: 为修复规模和数据质量问题，第二位工程师被提前两个季度招入。
    baseCase: 第二位工程师只在 M31、使用规模被验证后加入。
    upsideCase: 团队把第二位工程师延后到第 3 年之后，通过外部承包与工具支撑。
    y3RevenueImpactK: 0.0
    cashImpactK: -66.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      CreatorChannels[创作者与社区流量] --> Imports[完成导入]
      Imports --> PaidUsers[付费订阅用户]
      PaidUsers --> Revenue[订阅收入]
      Revenue --> GrossProfit[按 70% 毛利率计算的毛利]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情境下的收入由创作者/社区获客的复利驱动，到 Q4Y3 达到约 27.5K 付费用户，对应 $60 年化 ARPU。
  - checkName: 必须成立的前提
    finding: 导入到付费的转化必须维持在 BP 中 8-15% 的目标区间内，才能在不依赖昂贵付费媒体的情况下扩大付费新增。
  - checkName: 模型会在何种情况下失效
    finding: 如果付费新增比计划低 25%，且 churn 升至 3.0%，现金低点会降至约 $316K，且 Y3 EBITDA 仍深度为负。
  - checkName: 下一轮融资证明点
    finding: 如果公司在第 2 年结束时接近 9K 付费用户，并拥有留存证明、低于 $15 的 CAC，以及来自提醒和家庭工作流的产品习惯，那么种子轮故事就能成立。
sanityChecks:
  ruleOf40: Y3 增长率 303.8% 加上 EBITDA 利润率 -6.3% = 297.5%。
  burnMultiple: Y2 的 burn multiple 约为确认收入增长的 1.8x，并在模型接近盈亏平衡时于 Y3 改善到约 0.1x。
  revenuePerFte: 每个期末 FTE 对应的 Y3 收入为 $184K（对标尚未规模化的发烧友订阅应用，基准区间约为 $150K-$300K）。
  flags:
    - 这个模型只有在创作者/社区分发把现金 CAC 维持在建模的约 $13 水平时才成立；如果转向付费媒体，融资需求会显著增加。
    - Y3 的确认收入只有约 $1.1M，因此下一轮融资必须更多卖“留存与退出 ARR”，而不是成熟规模的利润表体量。
    - 引导流程仍依赖 Letterboxd 导出的可靠性，因此平台变化会同时伤害漏斗顶端转化和流失率。
    - 模型未计入年费预收带来的递延收入收益，也未计入联盟分成上行；这在现金层面偏保守，但也给执行失误留下了更小余地。
