scenarios:
  downside:
    description: 如果付费意愿或引导信任弱于预期，付费订阅新增会慢 25%，月度流失则恶化 50 bps。
    y3RevenueK: 799.3
    y3EbitdaK: -280.5
    cashLowPointK: 316.1
    keyAssumptionChanges:
      - 新增付费用户爬坡速度降至基准情形的 75%。
      - 月度流失率从 2.5% 升至 3.0%。
  base:
    description: 创作者驱动获客持续复利，流失维持可控，团队在第 3 年后段增加第二位工程师之前都保持精简。
    y3RevenueK: 1101.6
    y3EbitdaK: -69.0
    cashLowPointK: 540.7
    keyAssumptionChanges:
      - 采用 A5-A7 中建模的付费新增爬坡。
      - 毛利率维持 70%，团队规模保持在 5-6 FTE。
  upside:
    description: 更强的创作者拉新和更好的留存提升，使收入在不明显加快招聘的情况下进入盈利。
    y3RevenueK: 1367.0
    y3EbitdaK: 116.9
    cashLowPointK: 654.1
    keyAssumptionChanges:
      - 新增付费用户爬坡提升至基准情形的 120%。
      - 月度流失率从 2.5% 改善至 2.0%。
sensitivity:
  - variable: ARPU
    downsideCase: 如果价格敏感用户更倾向于低价值的月付行为，年度 ARPU 会落到接近 $50。
    baseCase: 以年付优先包装确认的 $60 年化 ARPU。
    upsideCase: 若包装更好且有少量交易收入，年度 ARPU 可达到 $70。
    y3RevenueImpactK: -183.6
    cashImpactK: -162.5
  - variable: churn
    downsideCase: 如果产品在首次导入后更像“可有可无”，月度流失会升至 3.0%。
    baseCase: 2.5% 月度流失。
    upsideCase: 如果已保存搜索和提醒真正形成习惯，月度流失可降到 2.0%。
    y3RevenueImpactK: -35.8
    cashImpactK: -29.0
  - variable: CAC
    downsideCase: 如果创作者/社区增长不及预期、不得不转向付费买量，现金 CAC 会抬升约 30%。
    baseCase: 由创作者驱动和转介绍主导下，过去 18 个月 CAC 约为 $12.7。
    upsideCase: 如果更多增长来自转介绍和创作者闭环，CAC 可下降约 15%。
    y3RevenueImpactK: 0.0
    cashImpactK: -178.7
  - variable: sales cycle
    downsideCase: 导入到付费的转化爬坡慢 15%，即便流量相近，每月新增付费用户也会减少。
    baseCase: 付费新增爬坡沿用 A5-A7。
    upsideCase: 如果引导更顺和工具价值表达更清晰，导入到付费转化爬坡会快 15%。
    y3RevenueImpactK: -165.2
    cashImpactK: -146.3
  - variable: gross margin
    downsideCase: 如果可看性或数据成本上涨更快，毛利率会降到 65%。
    baseCase: 70% 毛利率。
    upsideCase: 若数据效率和基础设施规模更好，毛利率可提升至 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -69.6
  - variable: hiring pace
    downsideCase: 为解决规模和数据质量问题，第二位工程师会提前两个季度入职。
    baseCase: 只有在使用规模被验证后，第二位工程师才会在 M31 入职。
    upsideCase: 团队把第二位工程师推迟到 Year 3 之后，用外包/工具先顶住。
    y3RevenueImpactK: 0.0
    cashImpactK: -66.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      CreatorChannels[创作者与社区流量] --> Imports[完成导入]
      Imports --> PaidUsers[付费订阅用户]
      PaidUsers --> Revenue[订阅收入]
      Revenue --> GrossProfit[70% 毛利下的毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下的收入由创作者/社区获客复利驱动，到 Q4Y3 形成约 27.5K 位付费用户，对应 $60 年化 ARPU。
  - checkName: 必须做对的事
    finding: 导入到付费的转化必须维持在 BP 里 8-15% 的目标带内，否则付费新增无法在不依赖昂贵买量的情况下放大。
  - checkName: 模型何时失效
    finding: 如果新增付费用户比计划低 25%，且流失升到 3.0%，现金低点会降到约 $316K，Y3 EBITDA 也仍会深度为负。
  - checkName: 下一轮融资证明
    finding: 如果公司能在 Year 2 末带着约 9K 位付费用户、留存证明、低于 $15 的 CAC，以及由提醒和家庭工作流形成的产品习惯进入下一轮，这个种子轮故事就讲得通。
sanityChecks:
  ruleOf40: Y3 增长 303.8% 加上 EBITDA 利润率 -6.3%，合计 297.5%。
  burnMultiple: Y2 的 burn multiple 约为 1.8x（按确认收入增长计），到 Y3 随着模型接近盈亏平衡改善到约 0.1x。
  revenuePerFte: $184K 的 Y3 期末人均收入（对标大致 $150K-$300K 的 pre-scale 高端消费订阅应用）。
  flags:
    - 只有当创作者/社区分发把现金 CAC 稳定在模型中的约 $13 左右，模型才成立；一旦转向买量，融资需求会明显上升。
    - Y3 确认收入只有约 $1.1M，因此下一轮必须主要卖“留存和退出 ARR 的故事”，而不是成熟规模的损益表。
    - 引导仍然依赖 Letterboxd 导出的稳定性，所以平台变化可能同时打击顶部漏斗转化和流失表现。
    - 模型没有计入年付预收带来的递延收入现金优势，也没有计入联盟收入，这对现金是保守的，但也让执行失误的缓冲更小。
