competitors:
  - name: Letterboxd
    stage: incumbent
    wedge: Social film diary, reviews, lists and community identity with paid stats and filters.
    pricing: Free; Pro $18.99/year; Patron $48.99/year.
    strength: Owns the film-social habit and already offers JustWatch-powered streaming-service filters.
    weaknessVsUs: Not built around neutral, cross-surface natural-language taste search and may face conflicting monetization incentives under new ownership.
    sourceRefs: [1, 6, 9]
  - name: JustWatch
    stage: incumbent
    wedge: Cross-service availability, popularity, price-drop and watchlist utility across thousands of providers.
    pricing: Free core; JustWatch Pro listed as a $3.99 in-app purchase on iOS.
    strength: Strong provider coverage, habit around "where is it streaming?" and existing platform integrations.
    weaknessVsUs: Better at catalog lookup than personal taste reasoning; weak film-culture identity versus Letterboxd-native users.
    sourceRefs: [10, 11, 25, 26]
  - name: Plex Discover
    stage: incumbent
    wedge: Universal search plus watchlists, social graph and media management inside the broader Plex ecosystem.
    pricing: Free core; Plex Pass $6.99/month or $69.99/year.
    strength: Strong installed base, cross-service discovery and friend/social features.
    weaknessVsUs: Product is broad household media aggregation, not a film-obsessive search layer grounded in imported taste history.
    sourceRefs: [12, 13]
  - name: Google TV
    stage: incumbent
    wedge: OS-level aggregation with unified browsing and Gemini-driven conversational discovery.
    pricing: Bundled with platform/device ecosystem.
    strength: Distribution leverage and default-screen placement.
    weaknessVsUs: Optimized for general household entertainment, not for portable cinephile identity or Letterboxd-style taste depth.
    sourceRefs: [15]
regulatoryTechnicalConstraints:
  - point: TMDb API terms restrict derivatives, AI-training use and caching beyond six months.
    sourceRefs: [18]
  - point: TMDb still enforces upper-rate ceilings around 40 requests per second despite retiring the older published limit.
    sourceRefs: [29]
  - point: Streaming availability is fragmented across many providers and varies by geography, increasing data-normalization burden.
    sourceRefs: [10, 25]
  - point: Discovery utilities handle sensitive taste/profile data; app-store disclosures show users are already asked to trust products with identifiers, usage data and sometimes search history.
    sourceRefs: [9, 11, 13]
  - point: Portability narratives are helped by GDPR, but operational access still depends on platform-controlled export paths and user effort.
    sourceRefs: [7, 20]
validationSignals:
  - point: Letterboxd reportedly reached 26M users in 2026 after scaling from 1.7M in 2020.
    sourceRefs: [1, 2]
  - point: Letterboxd reported 17M members in 2024, 701M films watched and a new member every five seconds.
    sourceRefs: [5]
  - point: Film studios, distributors and theaters already use Letterboxd as a marketing and audience-signal channel.
    sourceRefs: [4]
  - point: Letterboxd now monetizes not only subscriptions but also video-store rentals, suggesting commerce can attach to discovery.
    sourceRefs: [9]
  - point: Google TV, Apple TV and Plex all explicitly market unified discovery and reduced app-switching, confirming the pain point is mainstream.
    sourceRefs: [12, 14, 15]
openQuestions:
  - What share of Letterboxd's 26M users actually meet the beachhead threshold of 200+ logged films and 2+ paid streamers?
  - Will enough users grant export/import access frequently enough for personalized search to feel live rather than stale?
  - Is the true willingness-to-pay anchor closer to Letterboxd Pro, Patron, or a one-time utility purchase?
  - Can the startup produce materially better recommendations than JustWatch, Plex and Google TV without privileged platform data?
