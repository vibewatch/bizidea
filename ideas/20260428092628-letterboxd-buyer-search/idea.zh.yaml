topRisks:
  - name: 平台依赖
    description: Letterboxd 可能限制导出、API 访问或互操作性，从而削弱用户引导。
    mitigation: 围绕用户可控导入、浏览器和邮件解析以及更多元数据源来构建，而不是依赖单一平台。
  - name: 消费者付费意愿
    description: 用户也许会喜欢更好的电影搜索，但还没喜欢到愿意再买一个订阅。
    mitigation: 围绕已保存搜索、家庭筛选和提醒先划出清晰的免费到付费边界，再测试联盟收入来补贴获客。
  - name: 现有厂商复制风险
    description: Letterboxd、JustWatch 或某家流媒体平台都可能补上类似的搜索功能。
    mitigation: 在更大的玩家真正重视这个细分领域之前，先用中立性、跨平台深度和面向重度用户的快速迭代取胜。
