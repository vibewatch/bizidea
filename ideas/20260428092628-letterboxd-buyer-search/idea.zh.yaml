  wedgeClarity:
    score: 5
    rationale: 围绕导入的 Letterboxd 历史数据做个性化电影搜索，是一个狭窄而明确的切入产品。
  defensibility:
    score: 3
    rationale: 防御力来自品味图谱数据、搜索质量和使用习惯，但现有平台仍可能快速跟进。
  ventureScale:
    score: 4
    rationale: 从高端搜索延伸到交易、身份与发现分发，具备支撑一家大型消费者媒体公司的路径。
topRisks:
  - name: 平台依赖
    description: Letterboxd 可能限制导出、API 访问或互操作性，从而削弱导入与激活效果。
    mitigation: 围绕用户可控导入、浏览器与邮件解析，以及额外元数据来源构建，而不是依赖单一平台。
  - name: 消费者付费意愿
    description: 用户可能会喜欢更好的电影搜索，但还不足以再购买一个订阅。
    mitigation: 在已保存搜索、家庭筛选和提醒上建立清晰的免费到付费边界，并测试联盟分成收入来补贴获客。
  - name: 头部平台复制风险
    description: Letterboxd、JustWatch 或某个流媒体平台都可能加入类似搜索功能。
    mitigation: 在更大的玩家重视这一细分市场之前，先凭借中立性、跨平台深度和对重度用户更快的迭代速度取胜。
