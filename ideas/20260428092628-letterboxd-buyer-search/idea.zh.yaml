problem: 电影超级用户越来越把 Letterboxd 当作自己的观影记忆库，但“下一部看什么”的实际搜索流程仍然分散在 Letterboxd 片单、JustWatch、Google、Reddit 和各流媒体应用之间。如果所有权发生变化，用户就更有理由需要一层中立工具，帮助他们在不依赖某个社交平台未来优先级的前提下，搜索自己的品味、想看清单和流媒体上架情况。
targetUser:
  primary: 每周记录观影并订阅多个流媒体服务的 Letterboxd 重度用户。
  secondary: 希望进入高意图电影发现流程的独立影院、电影节和精品发行商。
  buyer: 已经愿意为电影发现工具付费的 Letterboxd Pro 或 Patron 风格消费者。
startupThesis:
  nonObviousInsight: Letterboxd 的出售不只是一则并购新闻；它证明电影品味图谱已经足够有价值，以至于在新东家更偏向货币化而不是工具体验优化之前，用户会需要一个独立的搜索与可迁移层。
  beachhead: 英语市场中已记录 200 部以上电影、且每周都会在多个流媒体之间做观影选择的 Letterboxd 重度用户。
  wedge: 导入用户的 Letterboxd 历史数据，并让他们用自然语言发起同时结合情绪、约束条件和实时流媒体上架情况的品味查询。
  whyNowCatalyst: 围绕一个拥有 26 million 用户的平台出现的买家动作，让用户更有紧迫感去采用一款中立的电影搜索工具，以免新东家改变内容发现激励机制。
  ventureScalePath: 从高端消费者搜索起步，随后扩展到品味档案、想看清单可迁移、联盟分成电商、票务，以及面向影院、流媒体和电影营销方的发现分发能力。
solution: Movie Taste Search 把用户的 Letterboxd 导出数据或已保存片单连接到一个为电影意图而非通用片名检索打造的搜索引擎。用户可以提出类似“Netflix 上我还没记录过的高智商 90 分钟惊悚片”或“我伴侣没看过、画面丰富的失恋电影”这样的查询，并获得附带流媒体上架信息和推荐理由的排序结果。首个产品形态是一款面向重度用户的付费移动端与 Web 工具，提供导入、个性化搜索、家庭共享品味筛选和想看清单提醒。长期来看，公司还能加入一键跳转到播放、租赁、购票、关注创作者或影展场馆的能力，把发现转化为交易。
goToMarketSeed:
  firstCustomer: 25 至 40 岁、重度使用 Letterboxd 的美国、英国、加拿大和澳大利亚影迷；他们已经为至少两个流媒体付费，并且每周都会使用 Letterboxd。
  buyingTrigger: 用户在挑选电影时出现决策疲劳，或担心平台出售后 Letterboxd 会变得广告更重、立场不再中立。
  currentAlternative: 在 Letterboxd 片单、流媒体应用搜索、JustWatch、Google、Reddit 和群聊之间手动切换。
  switchingReason: 这一切入口把原本割裂的五个步骤压缩成一次个性化查询，并且比任何单一现有工具都更懂品味、可看性和社交语境。
  pricingHypothesis: 高级个性化搜索、提醒和家庭共享品味功能定价为每月 $8 或每年 $60。
whyNow:
  - point: 媒体公司对该平台的买方兴趣验证了电影品味数据具备战略价值，因此出现了一个服务用户而非平台所有者的独立工具空间。
    signalRefs: [Strategic buyers want the film social graph]
    sourceRefs: [1]
  - point: 报道中的 26 million 用户基数意味着这一细分市场已经足够大，可以支撑一款面向重度用户的高端发现产品。
    signalRefs: [Letterboxd has reached breakout scale]
    sourceRefs: [1]
  - point: 正在进行的出售流程正是那种会让用户突然更愿意接受可迁移与中立搜索工具的事件。
    signalRefs: [Ownership change creates a portability window]
    sourceRefs: [1]
  - point: 之所以选择这一新闻簇，是因为并购流程足够具体，使其成为一个时机明确的切入口，而不是对趋势的投机式押注。
    signalRefs: [Concrete M&A makes adjacent tooling timely]
    sourceRefs: [1]
differentiator: 这不是另一个泛电影数据库，也不是社交信息流的翻版。它的优势在于，围绕个人品味数据和实时上架情况提供意图丰富的搜索，并首先服务于那群虽小但具备付费能力、且被主流流媒体与通用搜索引擎持续忽视的电影痴迷者。如果它能成为严肃选片的默认查询层，就能凌驾于最终拥有这张社交图谱的任何平台之上。
