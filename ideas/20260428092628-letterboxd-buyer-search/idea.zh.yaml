jobsToBeDone:
  - job: 当我今晚想看点什么时，帮我按品味和约束条件搜索，这样我就能不用在多个应用间来回切换，在 3 分钟内选出一部电影。
    currentAlternative: 在 Letterboxd、JustWatch、Google 和流媒体应用之间手动切换。
    successMetric: 决策时间低于 3 分钟。
  - job: 当平台所有权变得不确定时，帮我在别处保留并使用自己的电影身份，这样我就能在没有锁定风险的情况下继续发现电影。
    currentAlternative: 继续留在现状平台上，并寄希望于政策不会变化。
    successMetric: 每位导入用户的成功导入率与每周保留搜索次数。
