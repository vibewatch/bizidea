jobsToBeDone:
  - job: 当我今晚想看点什么时，帮我按口味和约束条件搜索，这样我就能在不同应用之间来回跳转之前，快速选出一部电影。
    currentAlternative: 在 Letterboxd、JustWatch、Google 和流媒体应用之间手动切换。
    successMetric: 决策时间低于 3 分钟。
  - job: 当我觉得平台所有权不确定时，帮我在别处保留并使用自己的电影身份，这样我就能继续发现电影，而不必承担被平台锁定的风险。
    currentAlternative: 继续留在现有平台上，并希望它的政策不要改变。
    successMetric: 成功导入率，以及每位已导入用户的周度留存搜索次数。
