problem: 电影发烧友越来越把 Letterboxd 当成自己的观影记忆库，但“下一部看什么”的真实搜索流程，仍然被切碎在 Letterboxd 榜单、JustWatch、Google、Reddit 和各家流媒体应用之间。如果所有权发生变化，用户会更希望拥有一层中立工具，帮助他们搜索自己的口味、片单和流媒体可看性，而不必受制于某个社交平台未来的优先级。
targetUser:
  primary: 每周都会记录电影，并订阅多个流媒体服务的 Letterboxd 重度用户。
  secondary: 希望进入高意图电影发现流程的独立影院、电影节和精品发行商。
  buyer: 已经愿意为电影发现工具付费、类似 Letterboxd Pro 或 Patron 用户的消费者。
startupThesis:
  nonObviousInsight: Letterboxd 的出售不只是一起并购新闻；它说明电影口味图谱已经有了足够高的价值，用户会在新主人开始优先优化货币化而非实用性之前，需要一层独立的搜索与可迁移工具。
  beachhead: 英语市场中已记录 200 部及以上电影、且每周都要在多个流媒体之间做选择的 Letterboxd 重度用户。
  wedge: 导入用户的 Letterboxd 历史后，让他们用自然语言发起同时结合情绪、约束条件和实时流媒体可看性的口味搜索。
  whyNowCatalyst: 围绕一个 2600 万用户平台出现的买家动作，正在制造紧迫感，促使用户在新所有者改变发现激励之前，先采用一款中立的电影搜索工具。
  ventureScalePath: 先从高端消费级搜索切入，再扩展到口味画像、片单迁移、联盟电商、票务，以及面向影院、流媒体和电影营销方的发现分发。
solution: Movie Taste Search 把用户的 Letterboxd 导出记录或已保存榜单，接到一个为“观影意图”而不是通用片名检索打造的搜索引擎上。用户可以提出诸如“Netflix 上时长 90 分钟、我还没标记过的聪明惊悚片”或“画面丰富、而且我伴侣没看过的分手电影”这类问题，并获得带有流媒体可看性和推荐理由的排序结果。第一版产品会是一款面向重度用户的付费移动端与网页工具，提供导入、个性化搜索、家庭共享口味筛选和片单提醒。长期看，公司还可以加入一键跳转至播放、租赁、购票，或关注创作者和经典影院，把发现直接变成交易。
goToMarketSeed:
  firstCustomer: 25 至 40 岁、身处美国、英国、加拿大和澳大利亚的重度 Letterboxd 电影爱好者；他们至少为两家流媒体付费，并且每周都会使用 Letterboxd。
  buyingTrigger: 用户在选片时陷入决策疲劳，或者担心出售会让 Letterboxd 变得广告更重、立场更不再中立。
  currentAlternative: 在 Letterboxd 榜单、流媒体应用搜索、JustWatch、Google、Reddit 和群聊之间手动来回切换。
  switchingReason: 这个切口把原本碎成五步的流程压缩成一次个性化提问，而且对口味、可看性和社交语境的理解都优于任何单一现有工具。
  pricingHypothesis: 每月 $8 或每年 $60，提供高级个性化搜索、提醒和家庭共享口味功能。
whyNow:
  - point: 来自媒体公司的买家兴趣验证了电影口味数据已经具备战略价值，也为一款服务用户而非服务所有者的独立工具留出了空间。
    signalRefs: [战略买家争夺电影社交图谱]
    sourceRefs: [1]
  - point: 约 2600 万用户的规模说明，这个细分市场已经大到足以支撑一款面向重度用户的付费发现产品。
    signalRefs: [Letterboxd 已迈入爆发规模]
    sourceRefs: [1]
  - point: 正在进行的出售流程，正是那种会让用户突然更愿意尝试可迁移和中立搜索工具的事件。
    signalRefs: [所有权变动打开可迁移窗口]
    sourceRefs: [1]
  - point: 之所以选中这个事件簇，是因为并购流程已经足够具体，让这更像一个时机明确的切口，而不是一次投机性的趋势押注。
    signalRefs: [明确的并购进程让周边工具时机成熟]
    sourceRefs: [1]
differentiator: 这不是另一个泛电影数据库，也不是社交信息流的复制品。它的优势在于，把个人口味数据与实时可看性结合，做成面向明确观影意图的搜索，先服务那一小群但可货币化的电影痴迷者——而主流流媒体和通用搜索引擎都没有很好照顾这类人。如果它能成为严肃选片场景中的默认查询层，就能站在最终拥有社交图谱的平台之上。
