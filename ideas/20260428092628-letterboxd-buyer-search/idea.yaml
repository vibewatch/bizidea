topRisks:
  - name: Platform dependency
    description: Letterboxd could limit exports, API access, or interoperability, weakening onboarding.
    mitigation: Build around user-controlled imports, browser and email parsing, and additional metadata sources rather than a single platform dependency.
  - name: Consumer willingness to pay
    description: Users may like better movie search but not enough to buy yet another subscription.
    mitigation: Start with a sharp free-to-paid boundary around saved searches, household filters, and alerts, then test affiliate revenue to subsidize acquisition.
  - name: Incumbent copy risk
    description: Letterboxd, JustWatch, or a streaming platform could add similar search features.
    mitigation: Win on neutrality, cross-platform depth, and speed of iteration for power users before larger players prioritize the segment.
