    score: 4
    rationale: The sale report is concrete and the 26 million-user figure is strong, though the cluster is based on a single source.
  painIntensity:
    score: 3
    rationale: Movie choice frustration is real but less acute than workflow pain in enterprise markets.
  wedgeClarity:
    score: 5
    rationale: Personalized film search over imported Letterboxd history is a narrow, specific entry product.
  defensibility:
    score: 3
