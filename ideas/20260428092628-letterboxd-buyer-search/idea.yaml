differentiator: The product is not another broad movie database or a social feed clone. Its edge is intent-rich search over personal taste data plus live availability, aimed first at the small but monetizable group of film obsessives whose behavior mainstream streamers and generic search engines underserve. If it becomes the default query layer for serious movie choice, it can sit above whichever platform ultimately owns the social graph.
