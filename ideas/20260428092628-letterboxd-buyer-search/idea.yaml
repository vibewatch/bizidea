problem: Film superfans increasingly use Letterboxd as their movie memory, but the actual search workflow for what to watch next is still fragmented across Letterboxd lists, JustWatch, Google, Reddit, and streaming apps. If ownership changes, users have even more reason to want a neutral layer that helps them search their taste, watchlists, and streaming availability without depending on a social platform's future priorities.
targetUser:
  primary: Letterboxd power users who log films weekly and subscribe to multiple streaming services.
  secondary: Independent theaters, festivals, and specialty distributors that want placement inside high-intent film discovery flows.
  buyer: Letterboxd Pro or Patron style consumers already willing to pay for movie discovery utilities.
startupThesis:
  nonObviousInsight: The sale of Letterboxd is not just an M&A story; it is proof that the film taste graph has become valuable enough that users will need an independent search and portability layer before new owners optimize for monetization rather than utility.
  beachhead: English-speaking Letterboxd power users with 200 or more logged films who routinely decide between several streamers each week.
  wedge: Import a user's Letterboxd history and let them run natural-language taste queries that combine mood, constraints, and live streaming availability.
  whyNowCatalyst: Reported buyer activity around a 26 million-user platform creates urgency for users to adopt a neutral film search tool before a new owner changes discovery incentives.
  ventureScalePath: Start with premium consumer search, then expand into taste profiles, watchlist portability, affiliate commerce, ticketing, and discovery distribution for theaters, streamers, and film marketers.
solution: Movie Taste Search connects a user's Letterboxd exports or saved lists to a search engine built for film intent, not generic title lookup. A user can ask for queries like "smart 90-minute thrillers on Netflix that I have not logged" or "visually rich breakup movies my partner has not seen," and get ranked results with streaming availability and rationale. The first product is a paid mobile and web utility for power users, with import, personalized search, shared household taste filters, and watchlist alerts. Over time, the company can add one-click links to stream, rent, buy tickets, or follow creators and repertory venues, turning discovery into commerce.
goToMarketSeed:
  firstCustomer: 25 to 40 year-old Letterboxd-heavy movie fans in the US, UK, Canada, and Australia who already pay for at least two streamers and use Letterboxd weekly.
  buyingTrigger: A user hits decision fatigue while choosing a movie, or becomes worried that a sale could make Letterboxd more ad-heavy or less neutral.
  currentAlternative: Manual workflow across Letterboxd lists, streaming-app search, JustWatch, Google, Reddit, and group chats.
  switchingReason: This wedge collapses five fragmented steps into one personalized query that understands taste, availability, and social context better than any single incumbent tool.
  pricingHypothesis: $8 per month or $60 per year for premium personalized search, alerts, and shared household taste features.
