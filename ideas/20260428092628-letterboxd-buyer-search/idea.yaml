jobsToBeDone:
  - job: When I want to watch something tonight, help me search by taste and constraints, so I can pick a movie fast without bouncing across apps.
    currentAlternative: Manual workflow across Letterboxd, JustWatch, Google, and streaming apps.
    successMetric: Time to decision under 3 minutes.
  - job: When platform ownership feels uncertain, help me preserve and use my film identity elsewhere, so I can keep discovering movies without lock-in risk.
    currentAlternative: Staying on the status quo platform and hoping policies do not change.
    successMetric: Successful import rate and weekly retained searches per imported user.
ideaScorecard:
