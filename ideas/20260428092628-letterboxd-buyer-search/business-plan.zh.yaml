slug: movie-taste-search
date: 2026-04-28
executiveSummary: >-
  Movie Taste Search 是面向 Letterboxd 重度用户的高端消费工具，帮助他们基于自己的口味历史，在多个流媒体之间更快决定看什么。计划聚焦一个很窄的滩头市场：英语世界里已记录 200+ 部电影、至少订阅两项付费流媒体，并且每周使用 Letterboxd 的用户。眼前切口是导入 Letterboxd 历史，再叠加能同时理解情绪、片长、未看状态和实时可看性的自然语言搜索。时机来自 Letterboxd 被报道进入出售流程，中立性和可迁移性更显眼；但如果产品不能在决策时间上打赢手动工作流和免费现有厂商，生意就跑不通。调研支持的是一个小而真实的高端软件机会：首批英语市场估算 SAM 为 $51.0M，按约 20.8K 付费用户建模的 SOM 为 $1.0M。核心取舍是克制地做发烧友搜索工具，而不是过早扩张到泛社交、电视优先聚合或制片厂 SaaS。最可能推翻逻辑的，是消费者付费意愿弱、Letterboxd 导出变化让引导变脆、以及 JustWatch、Plex、Google TV 或 Letterboxd 自己快速补齐功能。前 6 个月应优先证伪留存、导入可靠性和付费转化，再谈放大获客。
problem:
  - 电影痴迷用户至今还要把 Letterboxd、JustWatch、Google、流媒体 App 和群聊拼在一起，只为回答一个问题：今晚该看什么？
  - 如果 Letterboxd 的所有权或货币化方式变化，重度用户还没有一层中立搜索工具，既能保住口味图谱，又能跨服务工作。
solution:
  - 导入用户的 Letterboxd 历史和榜单，让他们用自然语言按口味、约束条件和实时可看性一起搜索。
  - 通过排序解释、播放/租赁深链、已保存搜索、家庭筛选和片单提醒，把搜索直接推到行动。
whyWeWin:
  - 这个切口比现有厂商更窄：做的是基于导入后个人口味的电影发烧友级搜索，而不是泛化的跨目录检索。
  - 对滩头用户来说，中立性有意义，因为只要导入质量和相关性明显好于手动工作流，产品就能站在无论谁拥有社交图谱的平台之上。
strategicChoices:
  beachhead: 大致 25 到 40 岁、英语市场中的 Letterboxd 重度用户；他们已记录 200+ 部电影、订阅两项或以上付费流媒体，并且每周都有选片习惯。
  wedgeRationale: 这群人已经能清楚感受到痛点，也已经愿意为电影工具付费；在公司把资源投向更广泛的娱乐发现之前，他们最适合先验证更好的搜索是否真的能显著缩短决策时间。
  sequencingRationale: 先把导入、搜索相关性和可看性准确率做扎实，因为这三点是留存和付费转化的最低证明；等核心查询闭环真正黏住用户后，再加家庭功能、提醒和交易；在区域版权覆盖和用户习惯被验证之前，先不要急着做合作和国际扩张。
  notYet:
    - 不要新建一个社交信息流或影评网络，去正面挑战 Letterboxd。
    - 不要扩张到电视优先的发现赛道；那里的现有厂商默认分发更强，而滩头市场紧迫性更弱。
    - 在高端发烧友需求和用户注意力还没被证实之前，不要先卖给制片厂、电影节或影院营销工具。
market:
  tam: "$127.4M 的估算 TAM，基于 2600 万 Letterboxd 用户 × 10% 重度用户群体 × $48.99 年度 ARPU。"
  sam: "$51.0M 的估算 SAM，基于美国、英国、加拿大和澳大利亚约 40% 的重度用户群体。"
  som: "$1.0M 的建模 SOM，对应约 20.8K 位付费用户，约占 SAM 的 2%。"
  segments:
    - 希望更快做出观影决定、并且已经习惯为发现工具付费的重度 Letterboxd 多流媒体消费者。
    - 电影导向的家庭，以及更后期可能进入高意图发现流的分发伙伴，例如独立影院或精品发行商。
  buyingProcess: 用户会通过创作者/社区渠道发现产品，用一次即时选片场景试用，导入自己的历史，如果前几次使用确实节省时间，就自助转化。通常同一个人既是用户也是经济买家，因此引导速度和第一次查询的相关性，比正式销售流程更重要。
product:
  mvp: >-
    Web 与移动端测试版，支持导入 Letterboxd 导出文件、基于个人历史的自然语言电影搜索、面向首批地域的国家级流媒体可看性、结果解释，以及跳转观看的深链。MVP 还应包含已保存搜索和基础片单提醒，让价值不会只停留在一次性的新鲜感上。
  sixMonth: 在 50 个真实提示词上，把搜索相关性与 JustWatch / Plex / 手动工作流做基准比较，跑通稳定导入流程，并上线围绕已保存搜索、提醒和家庭筛选的清晰免费到付费边界与年度付费方案。
  twelveMonth: 增加家庭共享口味画像、超出 Letterboxd 之外的跨来源片单迁移、来自可分享搜索结果的转介绍闭环，以及在数据质量足够高的地方接入第一批租赁或票务联盟链接。
  twentyFourMonth: 成为跨多种数据源与设备的中立电影查询层，用更强的个性化、面向精品发行的合作库存，以及能持续改进排序和提醒的一方口味图谱建立防御力。
  keyBets:
    - 导入的观看历史能把排序质量提升到足以在“中位数决策时间”上打赢免费替代品。
    - 在四个首发地域内，可看性覆盖能稳定到足以不破坏用户信任。
    - 如果产品被感知为“工具”而不是“又一个流媒体”，那么接近 Letterboxd Patron 水平的年费，对一个窄发烧友群体是可接受的。
gtm:
  wedge: 把产品卖成一件事：让严肃的 Letterboxd 用户用最快的方式，在他们已经付费的所有流媒体之间回答“今晚看什么？”，同时给他们一个中立的口味图谱归属地。
  channels:
    - 与 Letterboxd 邻接的创作者、影评人和电影播客
    - 聚焦电影发现的 TikTok、YouTube 和 newsletter 创作者
    - 用户本来就会交换观影推荐的 Reddit 与电影论坛社区
    - 当产品的愉悦度证据足够强后，再利用应用商店搜索和评分
    - 由共享搜索、家庭协同和片单提醒形成的转介绍闭环
  funnelTargets: "落地页访问到邮箱注册 8-12%，注册到完成导入 35-50%，导入用户到付费年费转化 8-15%，以及付费用户第 3 个月留存高于 65%。"
  pricing: 免费增值模式：保留有限的免费搜索体验，把高级方案锚定在 $8/月 或 $60/年，强调年付，因为这个场景会重复发生，但用户也很价格敏感；付费功能应围绕已保存搜索、提醒、更深的个性化和家庭筛选，而不是基础片名检索。
businessModel:
  revenueStreams:
    - 来自年费与月费高级方案的消费者订阅收入
    - 一旦转化路径可测量，即从租赁、购买和票务链接获得联盟分成
    - 更后期为精品发行内容提供赞助位或推广式发现，但必须受限于用户信任边界
  unitOfValue: 已导入口味图谱、并保持每周重复搜索行为的付费用户。
  targetGrossMarginPct: 70
  expansionLevers:
    - 通过更好的搜索相关性和提醒，提高年付转化
    - 用家庭方案和高级可迁移功能提高 ARPU
    - 在不抬高订阅价格的前提下，把交易型变现叠加在发现意图之上
    - 只有在本地提供商覆盖与准确率被验证后，才扩张地域
strategyMap:
  northStarMetric: 已导入用户的周度成功观影决策数。
  inputMetrics:
    - 导入完成率
    - 从首次查询到跳转观看点击的中位时长
    - 已导入用户的周度查询留存
    - 已导入用户的付费转化率
    - 抽样结果的可看性准确率
  moatsToBuild:
    - 基于用户授权历史、评分、榜单和家庭偏好的第一方口味图谱
    - 来自重复查询、保存与点击行为的相关性反馈闭环
    - 由提醒、已保存搜索和共享决策流程形成的习惯闭环
  killCriteria:
    - 如果在两轮相关性迭代后，已导入用户的第 4 周留存仍低于 25%，说明核心习惯太弱。
    - 如果在 $49-$60 年费定价下，已导入用户的付费转化仍低于 5%，说明付费意愿过窄，不足以支撑风险投资级消费软件。
    - 如果首发地域的可看性准确率始终无法超过 95%，信任流失会快于获客扩张。
  mermaid: |
    flowchart LR
      Wedge[Letterboxd 重度用户搜索切口] --> MVP[导入 + 口味搜索 + 可看性]
      MVP --> Proof[留存与付费转化证明]
      Proof --> Expansion[家庭功能、提醒、可迁移性与交易]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口清晰、叙事时机也对，但现有证据更像一款高端发烧友细分工具，而不是已经明确会爆发成风投级公司的机会。
    whyBelieve: Letterboxd 的规模、现有厂商对跨应用切换痛点的验证，以及可识别的付费发烧友群体，让它有机会成为可信的高端工具——前提是产品显著缩短决策时间。
    whyDoubt: 消费者订阅疲劳、平台依赖和强势免费替代品，会让公司很容易滑成“不错但非必需”的工具，而不是耐久品类领导者。
    nextDiligence: 先与 20-30 位重度用户验证：基于导入的搜索能否在真实选片场景中打赢他们当前工作流，并在接近 Letterboxd Patron 的年费水平上实现转化。
  firstCustomer:
    title: 拥有多个流媒体订阅的 Letterboxd 重度用户
    profile: 身处美国、英国、加拿大或澳大利亚的个人消费者；每周记录电影，已记录 200+ 部影片，维护榜单，并至少为两个流媒体服务付费。
    trigger: 他们今晚正在选片，却不断在 Letterboxd、JustWatch、Google 和流媒体应用之间切换，或者开始担心 Letterboxd 的出售会削弱平台中立性。
    buyer: 个人消费者订阅者
    initialContract: 先提供免费导入与搜索试用，再自助转化为年化约 $49-$60 的高级订阅；路径是免费搜索 → 导入 → 付费提醒与更深个性化。
  mustBeTrue:
    - 在被访谈、且已记录 200+ 部电影的用户中，至少 40% 会把“按情绪 + 可看性搜索”描述为当前痛点，而不是只是个有趣功能。
    - 首次导入引导能在 5 分钟内完成，且成功历史导入率至少达到 85%。
    - 在 50 个真实提示词的盲测中，用户至少有 60% 的场景会更偏好创业公司的首屏结果，而不是 JustWatch、Plex 或手动工作流。
    - 已导入用户在前 30 天内对 $49-$60 年费方案的转化率至少达到 8%。
    - 即使只有 Letterboxd 2600 万用户中的 5%-10% 符合滩头定义，市场规模仍足以支撑有意义的可触达群体。
  diligenceQuestions:
    - 重度 Letterboxd 用户究竟多久会导出一次，或授予一次历史访问权限？这些数据要陈旧到什么程度，相关性才会明显下降？
    - 与 JustWatch、Plex、Google TV 和手动搜索相比，产品究竟在哪些具体提示词类型上能赢？
    - 最好的定价锚点更接近 Letterboxd Pro、Letterboxd Patron，还是一次性工具购买？
    - 如果 Letterboxd 改变导出格式或降低互操作性，引导路径会脆弱到什么程度？
    - 在不损害信任和搜索中立性的情况下，交易型变现能贡献多少有意义的收入？
  riskHeatmap:
    - risk: 对 Letterboxd 控制的导出与互操作性存在平台依赖
      likelihood: High
      impact: High
      leadingIndicator: 在 Letterboxd 格式变化后，导入完成率跌破 85%，或需要反复人工支持才能完成。
      mitigation: 先围绕用户可控导出设计引导流程，支持多种导入路径，并逐步扩展数据源。
    - risk: 消费者付费意愿弱到不足以支撑订阅业务
      likelihood: High
      impact: High
      leadingIndicator: 即使用户参与度强，已导入用户到付费的转化率在 $49-$60 年费下仍低于 5%。
      mitigation: 围绕工具型功能收紧免费到付费边界，测试年付优先包装，并在大规模增长前叠加联盟收入。
    - risk: 现有厂商迅速补齐功能差距
      likelihood: Medium
      impact: High
      leadingIndicator: 用户开始反馈，Letterboxd、JustWatch、Plex 或 Google TV 已能以相近质量回答同类问题。
      mitigation: 聚焦最窄、意图最强的提示词场景，用第一方口味数据持续提升个性化，并比更宽泛的现有厂商更快迭代。
    - risk: 各地域的可看性数据质量破坏用户信任
      likelihood: Medium
      impact: Medium
      leadingIndicator: 抽样结果准确率持续低于 95%，或客服工单集中抱怨错误的提供商链接。
      mitigation: 缩小首发地域，透明展示提供商覆盖范围，并把链接准确率作为产品 KPI 持续监控。
operatingAssumptions:
  - assumption: 可触达的滩头市场更接近调研中的 10% 重度用户占比，而不是悲观情形下的 5%。
    basis: research.yaml
    validationTest: 至少对 1,000 名候补名单或测试用户做问卷和埋点，测量已记录影片数、流媒体订阅数与每周搜索频率。
    decisionImpact: 如果不成立，就把公司收缩为更小的发烧友工具业务，并下调增长投入与融资 ambition。
  - assumption: 即使没有深度原生集成，用户也愿意信任并完成基于用户授权导出/导入的引导流程。
    basis: research.yaml
    validationTest: 在 30 位测试用户中重复跑引导测试，目标是成功导入率至少 85%，且每 100 位用户所需创始人支持少于 10 分钟。
    decisionImpact: 如果不成立，产品就必须先简化为更轻的搜索工具，并在接入改善前降低对个性化的依赖。
  - assumption: 对这个细分市场来说，$49-$60 左右的年费方案会优于更低价、月付优先的方案。
    basis: idea.yaml
    validationTest: 做年付与月付包装的假门测试，并对不同 cohort 的导入到付费转化和 60 天留存进行比较。
    decisionImpact: 如果不成立，就需要降低价格点或更依赖交易型变现，路线图也应降低对纯订阅经济性的依赖。
  - assumption: 基于第一方口味数据的相关性质量，能在选片提示词上明显打赢以可看性为主的现有厂商。
    basis: operator judgment
    validationTest: 基于重度用户的 50 个真实提示词，对比 JustWatch、Plex、Google TV 和手动工作流做盲测基准。
    decisionImpact: 如果不成立，创业公司就没有差异化切口，不该扩大获客。
  - assumption: TMDb 与可看性合作方能在四国首发中提供足够的法律和技术覆盖。
    basis: research.yaml
    validationTest: 在公开测试前完成对 API 条款、速率限制、缓存规则和各国覆盖范围的法务审查。
    decisionImpact: 如果不成立，就缩小地域、重做数据架构，或推迟依赖版权准确率的交易功能。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 与已记录 200+ 部电影、且拥有多个付费流媒体的用户开展 20-30 次访谈和日记研究。
    hypothesis: 滩头用户会把选片摩擦描述得足够频繁，足以支撑一款专门的付费工具。
    successMetric: 至少 40% 的受访者把跨应用搜索痛点排进自己前三大重复性观影挫败，并能讲出具体的近期流程。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 搭建一个可点击原型和假门落地页，测试基于导入的搜索承诺和年度定价。
    hypothesis: 产品承诺和定价足够强，能从创作者与社区流量中拉来候补注册和导入意向。
    successMetric: 落地页访问到候补名单转化率高于 10%，且至少 25% 的注册用户愿意申请导入测试资格。
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: 上线封闭测试版，包含导出导入、50 个提示词相关性基准，以及查询级反馈闭环。
    hypothesis: 导入历史能产出明显优于手动工作流和纯可看性工具的推荐结果。
    successMetric: 在至少 60% 的基准提示词里，用户更偏好创业公司的结果；且已导入用户第 4 周留存超过 25%。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 测试年付优先、月付优先以及邀请制创始会员等不同定价与包装方式。
    hypothesis: 接近 $49-$60 的年费方案，能在不显著伤害重度用户转化的前提下最大化收入。
    successMetric: 已导入用户付费转化率至少达到 8%，且早期获客实验回本期低于 6 个月。
    owner: 创始人/CEO
  - horizon: 180–360 天
    experiment: 上线已保存搜索、提醒和家庭画像，然后衡量它们对转介绍与留存的提升。
    hypothesis: 超出首次查询之外的工具能力，会形成使用习惯和自然增长闭环。
    successMetric: 周度留存搜索用户数提高 20%，且至少 15% 的付费用户会分享或邀请另一位家庭成员。
    owner: 产品/设计招聘
  - horizon: 180–360 天
    experiment: 在最高置信度结果类别中试点租赁、购买或票务联盟链接。
    hypothesis: 只要链接相关且透明，交易型变现就能在不降低信任的情况下增加收入。
    successMetric: 适用结果的外跳交易点击率高于 10%，且搜索满意度分数不下降。
    owner: 商务合作负责人
operations:
  - 维护一条具备版权意识的元数据管线，结合 TMDb 与可看性数据源，并按国家做质量检查。
  - 从第一天起就埋点引导流程、搜索相关性和外跳观看点击，让留存和转化能按 cohort 被追踪。
  - 围绕导入隐私、数据删除和提供商覆盖透明度，建立客服与信任流程。
  - 在付费买量之前，先把创作者合作和社区种子传播当成主要早期分发引擎。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 搭建导入管线、排序系统、数据集成和产品埋点——这些决定了切口到底能不能跑通。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 负责客户发现、创作者驱动分发、定价测试，以及围绕中立性与可迁移性的叙事。
  - role: 产品/设计招聘
    startTiming: Month 4-6
    rationale: 消费级转化更依赖首次使用清晰度、快速引导和高信任搜索交互，而不是原始功能数量。
  - role: 增长/社区负责人
    startTiming: Month 6-9
    rationale: 如果早期留存成立，下一个瓶颈就会变成创作者合作、转介绍闭环，以及在电影原生渠道里的社区铺设。
  - role: 数据/合作负责人
    startTiming: Month 9-12
    rationale: 一旦核心消费习惯站稳，就需要专人负责交易链接、提供商覆盖以及后续发行合作关系。
milestones:
  - horizon: 0–12 个月
    items:
      - 招募并访谈前 30 位滩头用户，沉淀出可复用的搜索提示词。
      - 上线封闭测试版，包含 Letterboxd 导入、自然语言搜索，以及四国可看性覆盖。
      - 证明已导入用户的第 4 周留存至少 25%，且付费年费转化至少 8%。
      - 建立由创作者驱动的获客闭环，以及从注册到导入再到付费的可复用引导漏斗。
  - horizon: 12–24 个月
    items:
      - 上线家庭共享画像、已保存搜索、提醒以及第一批联盟交易链接。
      - 在法律和技术覆盖可靠的前提下，把导入能力扩展到 Letterboxd 之外的更多用户可控来源。
      - 实现由转介绍驱动的产品增长，并积累一批可衡量的周度留存付费用户。
      - 判断公司究竟是一门可持续的高端发烧友订阅业务，还是已经具备向更广发现分发扩张的证据。
  - horizon: 24–36 个月
    items:
      - 围绕用户与家庭构建有防御力的一方口味图谱，实质性提高排序质量。
      - 在不破坏中立性的前提下，为精品发行、影院或发行商接入有选择的合作库存。
      - 只在提供商准确率、付费行为和创作者分发渠道都已被验证的地区扩张。
      - 基于此前的留存与变现证据，准备走向围绕中立查询层的种子轮级增长，或接受更窄但可盈利的工具型结果。
risks:
  - risk: 对 Letterboxd 导出格式与互操作性的依赖限制了引导流程。
    likelihood: High
    impact: High
    mitigation: 先用用户可控导出，支持多种导入方式，并逐步降低对任何单一平台的依赖。
  - risk: 消费者订阅疲劳压低转化与留存。
    likelihood: High
    impact: High
    mitigation: 先证明决策时间确实缩短，主推年费定价，并在工具价值站稳后再叠加交易型变现。
  - risk: 现有厂商在公司建立习惯和数据优势之前，就复制了搜索体验。
    likelihood: Medium
    impact: High
    mitigation: 聚焦最被忽视的电影发烧友提示词，快速迭代，并收集更宽泛现有厂商不会优先做的第一方反馈闭环。
  - risk: 可看性与元数据约束限制了产品质量或法律灵活性。
    likelihood: Medium
    impact: Medium
    mitigation: 缩小首发地域，尽早审查合作条款，并让数据层从一开始就围绕合规与来源冗余来设计。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $1.5–2.5M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的跑道应足以覆盖创始产品团队、数据与元数据基础设施、创作者驱动的 GTM 实验，以及用来证明或证伪这个高端发烧友付费切口是否耐久的客户/相关性验证。
