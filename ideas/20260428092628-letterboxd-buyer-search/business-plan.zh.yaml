slug: movie-taste-search
date: 2026-04-28
executiveSummary: >-
  Movie Taste Search 是一款面向 Letterboxd 重度用户的高端消费者工具，帮助他们基于自己的品味历史，在多个流媒体服务之间更快决定“今晚看什么”。计划聚焦于一个狭窄的切入市场：英语市场中已记录 200+ 部电影、至少订阅两个付费流媒体、并且每周都会使用 Letterboxd 的用户。眼下最直接的切入口，是将导入的 Letterboxd 历史与自然语言搜索结合，在一次查询中同时处理情绪、片长、未看状态和实时流媒体上架情况。这个时机成立，是因为据报道 Letterboxd 正在出售，使“中立性”和“可迁移性”更加突出；但若产品不能在决策耗时上击败手动工作流和免费 incumbents，这门生意依然跑不通。研究显示，初始英语市场的估算 SAM 为 $51.0M，可形成一个小众但真实的高端软件机会；按模型测算，约 20.8K paying users 对应的 SOM 为 $1.0M。核心战略取舍在于：必须克制自己，做成一个高阶用户搜索工具，而不是过早扩张到泛社交、TV-first 聚合，或面向片方的 SaaS。最可能证伪这一机会的风险包括：消费者付费意愿不足；若 Letterboxd 的导出访问路径变化，导入流程会变脆弱；以及 JustWatch、Plex、Google TV 或 Letterboxd 自身迅速补齐功能差距。当前仍缺乏对 26M 用户基数中真实重度用户密度，以及高于 Letterboxd Pro 定价锚点时可实现转化率的直接证据，因此前 6 months 的首要任务应是优先证伪留存、导入可靠性和付费转化，再去扩大获客。
problem:
  - 电影发烧友用户至今仍要把 Letterboxd、JustWatch、Google、流媒体应用和群聊拼在一起，才能回答一个问题：今晚我该看什么？
  - 如果 Letterboxd 的所有权或商业化方式发生变化，重度用户没有一层中立搜索层，既能保留自己的品味图谱，又能跨服务使用。
solution:
  - 导入用户的 Letterboxd 历史与片单，然后让他们使用自然语言查询，把品味、约束条件和实时上架情况合并到一次搜索里。
  - 用排序解释、跳转到播放或租赁的深链、已保存搜索、家庭筛选和想看清单提醒，把“搜索”变成“行动”。
whyWeWin:
  - 这个切入口比 incumbents 更窄：它不是泛目录检索，而是围绕导入的个人品味数据做影迷级搜索。
  - 对切入市场而言，中立性很重要，因为只要导入质量和相关性明显优于手动工作流，产品就能凌驾于最终拥有社交图谱的任何平台之上。
strategicChoices:
  beachhead: 年龄大致在 25 to 40、以英语为主的 Letterboxd 重度用户；他们已记录 200+ 部电影，订阅两个或更多付费流媒体，并且每周都有选片习惯。
  wedgeRationale: 这批用户已经切实感受到痛点，也已经在为电影工具付费，因此在公司把资源投向更广泛的娱乐发现之前，他们最适合验证“更好的搜索是否能显著缩短决策时间”。
  sequencingRationale: 先把导入、搜索相关性和上架准确性做好，因为这三点是留存和付费转化成立的最低证明；在核心查询循环真正黏住用户之后，再加入家庭功能、提醒和交易；在区域版权覆盖和用户习惯被验证之前，推迟合作和国际扩张。
  notYet:
    - 不要新建一个社交信息流或影评网络，去正面对抗 Letterboxd。
    - 不要扩展到 TV-first 发现领域，因为那里的 incumbents 默认分发更强，而切入紧迫性更弱。
    - 在高阶用户需求和用户注意力尚未被验证之前，不要先卖给片方、电影节或影院做营销工具。
market:
  tam: "$127.4M estimated TAM based on 26.0M Letterboxd users × 10% power-user cohort × $48.99 annual ARPU."
  sam: "$51.0M estimated SAM based on roughly 40% of the power-user cohort in the U.S., U.K., Canada, and Australia."
  som: "$1.0M modeled SOM based on about 20.8K paying users, or roughly 2% of SAM."
  segments:
    - 重度使用 Letterboxd、同时订阅多个流媒体的消费者；他们希望更快完成选片，并且已经习惯为发现工具付费。
    - 电影导向的家庭，以及后续可能切入的发行合作方，例如独立影院或精品发行商；这些角色希望进入高意图的内容发现流程。
  buyingProcess: 用户会通过创作者与社区渠道发现产品，在一个即时的观影决策场景中试用它，导入自己的历史记录，并在最初几次会话确实节省时间时以自助方式完成付费。通常同一个人既是使用者也是付费决策者，因此上手速度和首次查询的相关性，比正式销售流程更重要。
product:
  mvp: >-
    提供 Web 和移动端 beta，支持导入 Letterboxd 导出数据、基于个人历史的自然语言电影搜索、面向初始市场的国家级流媒体上架信息、结果解释以及跳转观看深链。MVP 还应包含已保存搜索和基础想看清单提醒，让价值不仅停留在一次性的新鲜感上。
  sixMonth: 在 6 months 内，把导入流程做到稳定可用，用 50 个真实提示词把搜索相关性与 JustWatch/Plex/手动工作流对比测试，并上线付费年费方案，在已保存搜索、提醒和家庭筛选上建立清晰的免费到付费边界。
  twelveMonth: 在 12 months 内，加入共享家庭品味档案、超越 Letterboxd 的跨来源想看清单可迁移能力、基于可分享搜索结果的推荐传播回路，以及在数据质量足够高的场景下提供首批租赁或票务联盟分成链接。
  twentyFourMonth: 在 24 months 内，成为跨多个数据源与设备的中立电影查询层，拥有更强的个性化能力、面向精品发行的合作库存，以及一个能够持续提升排序和提醒质量、具备防御力的第一方品味图谱。
  keyBets:
    - 导入的观影历史能够显著提升排序质量，从而在中位决策耗时上击败免费替代方案。
    - 在四个首发市场中，上架覆盖和准确性能够保持在不破坏用户信任的水平。
    - 只要产品足够像一个工具而不是“另一个流媒体”，接近 Letterboxd Patron 水平的年费定价就能被狭窄但高热度的爱好者群体接受。
gtm:
  wedge: 把产品卖点定义为：这是严肃的 Letterboxd 用户在他们已经付费的所有流媒体之间，最快回答“今晚看什么”的方式，同时也是一个中立的电影品味归宿。
  channels:
    - 与 Letterboxd 相邻的创作者、影评人和电影播客
    - 聚焦电影发现的 TikTok、YouTube 和 newsletter 创作者
    - 用户本就会交换观影建议的 Reddit 和电影论坛社区
    - 当产品已有足够“惊喜感”证明后，依靠应用商店搜索和评分获客
    - 基于共享搜索、家庭协同和想看清单提醒形成的推荐传播回路
  funnelTargets: "Landing page visit to email signup 8-12%, signup to completed import 35-50%, imported user to paid annual conversion 8-15%, and paid month-3 retention above 65%."
  pricing: 采用 freemium，免费层提供有限搜索体验，premium 计划目标定价为 $8/month 或 $60/year，并强调年费，因为这个使用场景具备经常性但也对价格敏感；付费功能应聚焦于已保存搜索、提醒、更深度个性化和家庭筛选，而不是基础片名检索。
businessModel:
  revenueStreams:
    - 来自年费与月费 premium 计划的消费者订阅收入
    - 当转化路径可衡量后，来自租赁、购买和票务跳转的联盟分成
    - 后续为精品影片提供赞助式或推广式发现位，但前提是不损害用户信任
  unitOfValue: 拥有已导入品味图谱、并保持每周重复搜索行为的付费用户。
  targetGrossMarginPct: 70
  expansionLevers:
    - 通过更好的搜索相关性和提醒提升年费转化
    - 用家庭方案和高级可迁移功能提高 ARPU
    - 在不抬高订阅价格的情况下，把交易型变现叠加到发现意图之上
    - 仅在本地平台覆盖和准确性被验证后再扩展地理市场
strategyMap:
  northStarMetric: 已导入用户每周成功完成的观影决策数。
  inputMetrics:
    - 导入完成率
    - 从首次查询到点击外部观看链接的中位时间
    - 已导入用户的每周查询留存
    - 已导入用户的付费转化率
    - 抽样结果中的上架准确率
  moatsToBuild:
    - 基于用户授权的历史、评分、片单和家庭偏好构建的第一方品味图谱
    - 来自重复查询、收藏和点击行为的相关性反馈回路
    - 由提醒、已保存搜索和共享决策工作流形成的习惯回路
  killCriteria:
    - 如果在两轮相关性迭代后，已导入用户的 week-4 retention 仍低于 25%，说明核心习惯太弱。
    - 如果在 $49-$60 annual pricing 下，已导入用户的付费转化率持续低于 5%，说明付费意愿过窄，不足以支撑 venture-scale consumer software。
    - 如果首发市场中的上架准确率无法超过 95%，信任流失速度会快于获客扩张速度。
  mermaid: |
    flowchart LR
      Wedge[Letterboxd 重度用户搜索切入口] --> MVP[导入 + 品味搜索 + 上架信息]
      MVP --> Proof[留存和付费转化证明]
      Proof --> Expansion[家庭功能、提醒、可迁移性与交易]
investorMemo:
  verdict:
    call: Watch
    conviction: 切入口清晰、叙事时机也很好，但当前证据更支持一个小众高阶用户工具，而不是一个已经明确具备风险投资级爆发力的机会。
    whyBelieve: Letterboxd 的规模、既有玩家对“多应用切换”痛点的验证，以及一个可识别、愿意付费的影迷群体，使其成为一个合理的高端工具机会，前提是产品确实能明显缩短决策时间。
    whyDoubt: 消费者订阅疲劳、平台依赖和强大的免费替代品，很容易让公司变成“锦上添花”而非持久的品类领导者。
    nextDiligence: 与 20-30 名重度用户验证，基于导入历史的搜索是否能在真实选片场景中优于他们的当前工作流，并且在接近 Letterboxd Patron 的年费水平上完成转化。
  firstCustomer:
    title: 拥有多个流媒体订阅的 Letterboxd 重度用户
    profile: 位于美国、英国、加拿大或澳大利亚的个人消费者；他们每周记录观影，已记录 200+ 部影片，会维护片单，并为至少两个流媒体服务付费。
    trigger: 他们正在为今晚看什么而苦恼，需要在 Letterboxd、JustWatch、Google 和流媒体应用之间来回切换；或者他们开始担心 Letterboxd 的出售会削弱平台中立性。
    buyer: Individual consumer subscriber
    initialContract: 先提供免费的导入与搜索试用，再以大约 $49-$60 annualized 的自助 premium 订阅完成转化；路径是免费搜索 → 导入 → 为提醒和更深个性化付费。
  mustBeTrue:
    - 在接受访谈的、已记录 200+ 部电影的用户中，至少 40% 会把“按情绪 + 上架情况搜索”描述为当前痛点，而不是一个有趣但可有可无的功能。
    - 已导入用户能在 under 5 minutes 内完成首次引导，且历史导入成功率至少达到 85%。
    - 在 50 个真实提示词的盲测中，用户至少有 60% 的情况下更偏好本产品的顶部结果，而不是 JustWatch、Plex 或手动工作流。
    - 已导入用户在 first 30 days 内，对 $49-$60 annual plan 的转化率达到 8% 或更高。
    - 即使只有 5%-10% 的 Letterboxd 26M users 符合切入市场定义，依然存在一个可触达、足够有意义的重度用户细分。
  diligenceQuestions:
    - 重度 Letterboxd 用户究竟会多频繁地导出或授权访问自己的历史记录？这些数据陈旧到什么程度后，相关性会明显下降？
    - 相较于 JustWatch、Plex、Google TV 和手动搜索，产品究竟在哪些具体提示词类型上能明显胜出？
    - 最佳定价锚点更接近 Letterboxd Pro、Letterboxd Patron，还是一次性购买的工具产品？
    - 如果 Letterboxd 更改导出格式或降低互操作性，引导流程会脆弱到什么程度？
    - 在不损害信任或搜索中立性的前提下，交易型变现能否贡献有意义的收入？
  riskHeatmap:
    - risk: 依赖 Letterboxd 控制的导出与互操作能力，导致引导流程受制于平台
      likelihood: High
      impact: High
      leadingIndicator: 如果 Letterboxd 更改格式后，导入完成率跌破 85%，或需要反复人工支持，说明风险正在显现。
      mitigation: 先围绕用户可控导出设计引导，支持多种导入路径，并逐步扩展数据来源。
    - risk: 消费者付费意愿过弱，无法支撑订阅业务
      likelihood: High
      impact: High
      leadingIndicator: 即使用户参与度很高，在 $49-$60 annual pricing 下，已导入用户的付费转化率仍长期低于 5%。
      mitigation: 把免费到付费边界收紧到工具型功能上，测试以年费为先的打包方式，并在大规模增长投入前叠加联盟分成收入。
    - risk: incumbents 很快补齐功能差距
      likelihood: Medium
      impact: High
      leadingIndicator: 用户开始反馈 Letterboxd、JustWatch、Plex 或 Google TV 已经能以接近的质量回答同类提示词。
      mitigation: 聚焦最狭窄、最高意图的提示词类型，用第一方品味数据强化个性化，并在更大的既有玩家重视这一细分市场之前快速迭代。
    - risk: 跨地域的上架数据质量损害用户信任
      likelihood: Medium
      impact: Medium
      leadingIndicator: 抽样结果准确率持续低于 95%，或客服工单集中在错误的平台链接上。
      mitigation: 限制首发市场范围，透明展示平台覆盖情况，并把链接准确率作为产品 KPI 监控。
operatingAssumptions:
  - assumption: 可触达的切入市场更接近研究中的 10% power-user share，而不是悲观情境下的 5%。
    basis: research.yaml
    validationTest: 对至少 1,000 名等待名单或 beta 用户做调研和埋点，测量已记录影片数、流媒体订阅数和每周搜索频次。
    decisionImpact: 如果这一点不成立，公司应收缩为更小的发烧友工具，并下调增长投入假设与融资 ambition。
  - assumption: 用户会足够信任基于授权导出/导入的引导流程，即使没有深度原生集成也愿意完成设置。
    basis: research.yaml
    validationTest: 在 30 名 beta 用户中反复测试引导流程，目标是至少 85% 成功导入，且每 100 名用户所需 founder 支持少于 10 minutes。
    decisionImpact: 如果这一点不成立，产品就必须先简化为更轻量的搜索工具，并在访问改善前降低对个性化的优先级。
  - assumption: 对这个细分市场而言，$49-$60 左右的 annual pricing 会优于更低价、以月费为先的方案。
    basis: idea.yaml
    validationTest: 通过年费优先 vs 月费优先的假门测试，对比不同 cohort 的导入到付费转化和 60-day retention。
    decisionImpact: 如果这一点不成立，就需要更低价格点或更依赖交易型变现，路线图也应降低对纯订阅经济的依赖。
  - assumption: 基于第一方品味数据的相关性质量，能够在选片提示词上显著优于以上架信息为主的 incumbents。
    basis: operator judgment
    validationTest: 针对重度用户的 50 个真实提示词，与 JustWatch、Plex、Google TV 和手动工作流做盲测基准。
    decisionImpact: 如果这一点不成立，创业公司就缺少真正差异化的切入口，不应扩大获客。
  - assumption: TMDb 和上架数据合作方在法律与技术上，足以支持一个初始 four-country launch。
    basis: research.yaml
    validationTest: 在公开 beta 前完成对 API 条款、速率限制、缓存规则和国家覆盖的法律审查。
    decisionImpact: 如果这一点不成立，就应收缩地理范围、重构数据架构，或推迟依赖版权准确性的交易功能。
experimentRoadmap:
  - horizon: 0–90 days
    experiment: 与已记录 200+ 部电影、且订阅多个付费流媒体的用户开展 20-30 次客户访谈和 diary studies。
    hypothesis: 切入市场会把选片摩擦描述为足够高频的问题，从而愿意为一个专门工具付费。
    successMetric: 至少 40% 的用户把跨应用搜索痛点列入自己前三大重复性观影挫败点，并给出具体、近期的工作流案例。
    owner: 创始人 / CEO
  - horizon: 0–90 days
    experiment: 为基于导入的搜索和年费定价搭建可点击原型与假门 landing page。
    hypothesis: 产品承诺和定价足够有吸引力，能从创作者与社区流量中带来等待名单报名和导入意愿。
    successMetric: Landing page visit 到 waitlist conversion 高于 10%，且至少 25% 的报名用户愿意加入导入 beta。
    owner: 创始人 / CEO
  - horizon: 90–180 days
    experiment: 上线封闭 beta，包含导出导入、50-prompt 相关性基准测试，以及按查询级别收集反馈的回路。
    hypothesis: 已导入历史将带来显著优于手动工作流和仅有上架信息工具的推荐结果。
    successMetric: 在至少 60% 的基准提示词中，用户更偏好本产品结果；且已导入用户的 week-4 retention 超过 25%。
    owner: 创始工程师
  - horizon: 90–180 days
    experiment: 用年费优先、月费优先和邀请制 founding-member 方案测试定价与打包。
    hypothesis: 接近 $49-$60 的 annual plan 能在不明显伤害重度用户转化的情况下最大化收入。
    successMetric: 已导入用户的付费转化率至少达到 8%，且早期获客实验的 payback 低于 6 months。
    owner: 创始人 / CEO
  - horizon: 180–360 days
    experiment: 上线已保存搜索、提醒和家庭档案，然后衡量推荐传播与留存提升。
    hypothesis: 超越首次查询的工具功能会形成使用习惯和自然增长。
    successMetric: 每周保留搜索用户提升 20%，且至少 15% 的付费用户分享搜索结果或邀请另一位家庭成员。
    owner: 产品 / 设计负责人
  - horizon: 180–360 days
    experiment: 在最有把握的结果品类中试点租赁、购买或票务的联盟分成链接。
    hypothesis: 只要链接相关且透明，交易型变现就能在不损害信任的情况下创造收入。
    successMetric: 合格结果中的外部交易点击率高于 10%，且搜索满意度评分不下降。
    owner: 数据 / 合作负责人
operations:
  - 维护一个具备版权感知能力的元数据管道，整合 TMDb 与上架数据来源，并按国家做质量检查。
  - 从 day one 起埋点引导流程、搜索相关性和外部观看点击，使留存与转化能够按 cohort 被追踪。
  - 围绕导入隐私、数据删除和平台覆盖透明度建立客服与信任工作流。
  - 在付费获客之前，优先把创作者合作和社区冷启动作为早期分发引擎。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责搭建导入管道、排序系统、数据集成和产品埋点，因为这些直接决定切入口是否成立。
  - role: 创始人 / CEO
    startTiming: Month 0
    rationale: 负责客户发现、创作者驱动分发、定价测试，以及围绕中立性和可迁移性的叙事。
  - role: 产品 / 设计负责人
    startTiming: Month 4-6
    rationale: 消费者转化更依赖首会话清晰度、快速上手和高信任搜索交互，而不是原始功能数量。
  - role: 增长 / 社区负责人
    startTiming: Month 6-9
    rationale: 如果早期留存成立，下一阶段的瓶颈将变成创作者合作、推荐回路和电影原生渠道中的社区冷启动。
  - role: 数据 / 合作负责人
    startTiming: Month 9-12
    rationale: 一旦核心消费者习惯被建立，交易链接、平台覆盖和后续发行合作就需要专人负责。
milestones:
  - horizon: 0–12 months
    items:
      - 招募并访谈首批 30 名切入市场用户，沉淀可复用的选片提示词。
      - 上线封闭 beta，提供 Letterboxd 导入、自然语言搜索和四国范围的平台上架覆盖。
      - 证明已导入用户的 week-4 retention 至少为 25%，且付费年费计划转化至少达到 8%。
      - 建立由创作者驱动的获客回路，以及从 signup 到 import 再到付费的可复用引导漏斗。
  - horizon: 12–24 months
    items:
      - 上线共享家庭档案、已保存搜索、提醒，以及首批联盟分成交易链接。
      - 在法律和技术覆盖可靠的前提下，把导入能力从仅支持 Letterboxd 扩展到更多用户可控来源。
      - 形成由推荐传播驱动的产品增长，并建立一批每周留存的付费用户 cohort。
      - 判断公司究竟是一个可持续的高阶用户订阅业务，还是已经具备更广泛发现分发的证据。
  - horizon: 24–36 months
    items:
      - 在用户与家庭层面建立具备防御力的第一方品味图谱，实质性提升排序质量。
      - 在不损害中立性的前提下，加入针对精品发行、影院或发行商的精选合作库存。
      - 仅在平台准确率、支付行为和创作者分发渠道都已验证的市场扩张地理范围。
      - 基于此前的留存与变现证据，为“中立查询层”的 seed-scale growth 做准备，或接受更窄但可盈利的工具结果。
risks:
  - risk: 平台依赖 Letterboxd 的导出格式和互操作性，限制引导流程。
    likelihood: High
    impact: High
    mitigation: 优先使用用户可控导出，支持多种导入方式，并随着时间推移降低对单一平台的依赖。
  - risk: 消费者订阅疲劳压制转化和留存。
    likelihood: High
    impact: High
    mitigation: 先证明决策时间上的明确收益，主打年费，并只在工具价值建立之后再加入交易型变现。
  - risk: incumbents 在公司建立习惯和数据优势前复制搜索体验。
    likelihood: Medium
    impact: High
    mitigation: 聚焦最被忽视的影迷提示词，快速迭代，并沉淀更广泛 incumbents 不会优先打造的第一方反馈回路。
  - risk: 上架和元数据约束限制产品质量或法律灵活性。
    likelihood: Medium
    impact: Medium
    mitigation: 缩小首发地理范围，尽早审查合作条款，并围绕合规与来源冗余设计数据层。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $1.5–2.5M
  runwayMonths: 18
  useOfFundsSummary: 18 months 的 runway 应用于支持创始产品团队、数据与元数据基础设施、创作者驱动 GTM 实验，以及足够的客户/相关性验证，用来证明或证伪一个可持续的高阶用户付费切入口。
