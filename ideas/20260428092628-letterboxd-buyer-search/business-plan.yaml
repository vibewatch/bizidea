slug: movie-taste-search
date: 2026-04-28
executiveSummary: >-
  Movie Taste Search is a premium consumer utility for Letterboxd power users who
  want to decide what to watch faster across multiple streaming services using
  their own taste history. The plan focuses on a narrow beachhead: English-speaking
  users with 200+ logged films, at least two paid streamers, and an existing habit
  of using Letterboxd weekly. The immediate wedge is imported Letterboxd history
  plus natural-language search that combines mood, runtime, unseen status, and
  live streaming availability in one query. This is timely because Letterboxd's
  reported sale process makes neutrality and portability more salient, but the
  business does not work unless the product also beats manual workflows and free
  incumbents on time-to-decision. The researched market supports a niche but real
  premium software opportunity, with an estimated $51.0M SAM in the initial
  English-speaking geographies and a modeled $1.0M SOM at roughly 20.8K paying
  users. The core strategic tradeoff is to stay disciplined as a prosumer search
  utility instead of expanding early into broad social, TV-first aggregation, or
  studio SaaS. The biggest disconfirming risks are weak consumer willingness to
  pay, fragile onboarding if Letterboxd export access changes, and the possibility
  that JustWatch, Plex, Google TV, or Letterboxd close the feature gap quickly.
  Key evidence gaps remain around true power-user density inside the 26M user base
  and the conversion rate achievable above Letterboxd Pro-level pricing, so the
  first 6 months should prioritize falsifying retention, import reliability, and
  paid conversion before scaling acquisition.
problem:
  - Film-obsessive users still piece together Letterboxd, JustWatch, Google, streamer apps, and group chats to answer a single question: what should I watch tonight?
  - If Letterboxd ownership or monetization changes, heavy users have no neutral search layer that preserves their taste graph and works across services.
solution:
  - Import a user's Letterboxd history and lists, then let them run natural-language queries that combine taste, constraints, and live availability.
  - Turn search into action with ranked explanations, deep links to stream or rent, saved searches, household filters, and watchlist alerts.
whyWeWin:
  - The wedge is narrower than incumbents: cinephile-grade search over imported personal taste rather than generic cross-catalog lookup.
  - Neutrality matters for the beachhead because the product can sit above whichever platform owns the social graph, provided import quality and relevance are materially better than manual workflows.
strategicChoices:
  beachhead: English-speaking Letterboxd power users aged roughly 25 to 40 with 200+ logged films, two or more paid streaming subscriptions, and a weekly movie-selection habit.
  wedgeRationale: This cohort already feels the pain, already pays for movie utilities, and can validate whether better search meaningfully reduces time-to-decision before the company spends on broader entertainment discovery.
  sequencingRationale: Start with import, search relevance, and availability accuracy because those are the minimum proof points for retention and paid conversion; add household features, alerts, and commerce only after the core query loop is sticky; delay partnerships and international expansion until regional rights coverage and user habit are proven.
  notYet:
    - Build a new social feed or review network to compete head-on with Letterboxd.
    - Expand into TV-first discovery where incumbents have stronger default distribution and weaker beachhead urgency.
    - Sell studio, festival, or theater marketing tools before prosumer demand and user attention are established.
market:
  tam: "$127.4M estimated TAM based on 26.0M Letterboxd users × 10% power-user cohort × $48.99 annual ARPU."
  sam: "$51.0M estimated SAM based on roughly 40% of the power-user cohort in the U.S., U.K., Canada, and Australia."
  som: "$1.0M modeled SOM based on about 20.8K paying users, or roughly 2% of SAM."
  segments:
    - Letterboxd-heavy multi-streamer consumers who want faster film decisions and are already comfortable paying for discovery utilities.
    - Film-focused households and later-stage distribution partners such as indie theaters or specialty distributors seeking placement in high-intent discovery flows.
  buyingProcess: Users will discover the product through creator/community channels, test it on an immediate watch decision, import their history, and convert self-serve if the first sessions save time. The same person is usually both user and economic buyer, so onboarding speed and first-query relevance matter more than formal sales.
product:
  mvp: >-
    Web and mobile beta that supports Letterboxd export import, natural-language
    film search over personal history, country-specific streaming availability for
    the initial geographies, result explanations, and deep links to watch. The
    MVP should also include saved searches and basic watchlist alerts so the value
    persists beyond one-off novelty.
  sixMonth: Reach reliable import flows, benchmark search relevance against JustWatch/Plex/manual workflows on 50 real prompts, and ship paid annual plans with a clear free-to-paid boundary around saved searches, alerts, and household filters.
  twelveMonth: Add shared household taste profiles, cross-source watchlist portability beyond Letterboxd, referral loops from shareable search results, and first affiliate commerce links for rentals or ticketing where data quality is high.
  twentyFourMonth: Become a neutral movie query layer across multiple data sources and devices, with stronger personalization, partner inventory for specialty releases, and a defensible first-party taste graph that improves ranking and alerts.
  keyBets:
    - Imported watch history improves ranking enough to beat free alternatives on median time-to-decision.
    - Availability coverage can stay accurate enough in four launch geographies without breaking user trust.
    - Annual pricing near Letterboxd Patron levels is acceptable for a narrow enthusiast cohort if the product feels like a utility rather than another streamer.
gtm:
  wedge: Sell the product as the fastest way for serious Letterboxd users to answer "what should I watch tonight?" across all the streamers they already pay for, while giving them a neutral home for their taste graph.
  channels:
    - Letterboxd-adjacent creators, critics, and film podcasts
    - TikTok, YouTube, and newsletter creators focused on film discovery
    - Reddit and film-forum communities where users already swap watch recommendations
    - App store search and ratings once the product has enough proof of delight
    - Referral loops from shared searches, household planning, and watchlist alerts
  funnelTargets: "Landing page visit to email signup 8-12%, signup to completed import 35-50%, imported user to paid annual conversion 8-15%, and paid month-3 retention above 65%."
  pricing: Freemium with a limited free search experience and a premium plan targeted at $8/month or $60/year, with annual billing emphasized because the use case is recurring but price-sensitive; paid features should center on saved searches, alerts, deeper personalization, and household filters rather than basic title lookup.
businessModel:
  revenueStreams:
    - Consumer subscription revenue from annual and monthly premium plans
    - Affiliate fees from rental, purchase, and ticketing links once conversion paths are measurable
    - Later sponsored placement or promoted discovery for specialty releases, constrained to preserve user trust
  unitOfValue: Paying user with an imported taste graph and recurring weekly search activity.
  targetGrossMarginPct: 70
  expansionLevers:
    - Increase annual conversion through better search relevance and alerts
    - Expand ARPU with household plans and premium portability features
    - Add commerce monetization on top of discovery intent without raising subscription price
    - Expand geography only after provider coverage and accuracy are proven locally
strategyMap:
  northStarMetric: Weekly successful watch decisions from imported users.
  inputMetrics:
    - Import completion rate
    - Median time from first query to outbound watch click
    - Weekly query retention for imported users
    - Paid conversion rate from imported users
    - Availability accuracy on sampled results
  moatsToBuild:
    - First-party taste graph built from user-consented history, ratings, lists, and household preferences
    - Relevance feedback loops from repeated query, save, and click behavior
    - Habit loops from alerts, saved searches, and shared decision workflows
  killCriteria:
    - If imported-user week-4 retention stays below 25% after two relevance iterations, the core habit is too weak.
    - If paid conversion from imported users stays below 5% at $49-$60 annual pricing, willingness to pay is too narrow for venture-scale consumer software.
    - If availability accuracy cannot exceed 95% in launch geographies, trust will erode faster than acquisition can scale.
  mermaid: |
    flowchart LR
      Wedge[Letterboxd power-user search wedge] --> MVP[Import plus taste search plus availability]
      MVP --> Proof[Retention and paid conversion proof]
      Proof --> Expansion[Households alerts portability and commerce]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong wedge clarity and timely narrative, but current evidence still supports a niche prosumer utility more than a clear venture-scale breakout.
    whyBelieve: Letterboxd's scale, incumbent validation of the app-switching pain, and an identifiable paid enthusiast cohort make this a plausible premium utility if the product materially reduces time-to-decision.
    whyDoubt: Consumer subscription fatigue, platform dependency, and strong free substitutes make it easy for the company to become a nice-to-have rather than a durable category leader.
    nextDiligence: Validate with 20-30 power users that import-based search beats their current workflow on real movie-choice sessions and converts at annual pricing near Letterboxd Patron levels.
  firstCustomer:
    title: Letterboxd power user with multiple streamers
    profile: An individual consumer in the U.S., U.K., Canada, or Australia who logs films weekly, has 200+ logged titles, maintains lists, and pays for at least two streaming services.
    trigger: They are trying to choose a movie tonight and are frustrated by switching between Letterboxd, JustWatch, Google, and streaming apps, or they become concerned that Letterboxd's sale could reduce neutrality.
    buyer: Individual consumer subscriber
    initialContract: Self-serve premium subscription at roughly $49-$60 annualized after a free import-and-search trial; conversion path is free search to import to paid alerts and deeper personalization.
  mustBeTrue:
    - At least 40% of interviewed users with 200+ logged films describe mood-plus-availability search as a current pain, not just an interesting feature.
    - Imported users complete first-time onboarding in under 5 minutes with at least 85% successful history import.
    - In blind testing on 50 real prompts, users prefer the startup's top results over JustWatch, Plex, or manual workflows at least 60% of the time.
    - Imported users convert to a $49-$60 annual plan at 8% or higher within the first 30 days.
    - A meaningful power-user segment remains reachable even if only 5%-10% of Letterboxd's 26M users meet the beachhead definition.
  diligenceQuestions:
    - How often do heavy Letterboxd users actually export or grant access to their history, and how stale can that data be before relevance drops?
    - What specific prompt types does the product win on versus JustWatch, Plex, Google TV, and manual search?
    - Is the best pricing anchor closer to Letterboxd Pro, Letterboxd Patron, or a one-time utility purchase?
    - How fragile is the onboarding path if Letterboxd changes export formats or reduces interoperability?
    - Can commerce monetization add meaningful revenue without degrading trust or search neutrality?
  riskHeatmap:
    - risk: Platform dependency on Letterboxd-controlled exports and interoperability
      likelihood: High
      impact: High
      leadingIndicator: Import completion falls below 85% or requires repeated manual support after Letterboxd format changes.
      mitigation: Design onboarding around user-controlled exports first, support multiple import paths, and broaden data sources over time.
    - risk: Consumer willingness to pay is too weak for a subscription business
      likelihood: High
      impact: High
      leadingIndicator: Imported-user to paid conversion remains below 5% at $49-$60 annual pricing despite strong engagement.
      mitigation: Tighten the free-to-paid boundary around utility features, test annual-first packaging, and layer in affiliate revenue before spending heavily on growth.
    - risk: Incumbents close the feature gap quickly
      likelihood: Medium
      impact: High
      leadingIndicator: Users report that Letterboxd, JustWatch, Plex, or Google TV now answer the same prompts with comparable quality.
      mitigation: Focus on the narrowest high-intent prompts, improve personalization with first-party taste data, and ship faster than broader incumbents prioritize the niche.
    - risk: Availability data quality breaks trust across geographies
      likelihood: Medium
      impact: Medium
      leadingIndicator: Sampled result accuracy stays under 95% or support volume clusters around bad provider links.
      mitigation: Limit launch geographies, expose provider coverage transparently, and monitor link accuracy as a product KPI.
operatingAssumptions:
  - assumption: The reachable beachhead is closer to the researched 10% power-user share than the downside 5% case.
    basis: research.yaml
    validationTest: Survey and instrument at least 1,000 waitlist or beta users to measure logged-film counts, streamer count, and weekly search frequency.
    decisionImpact: If false, narrow the company to a smaller enthusiast utility and reduce growth-spend assumptions and fundraising ambition.
  - assumption: Users will trust a user-consented export/import onboarding flow enough to complete setup without deep native integrations.
    basis: research.yaml
    validationTest: Run repeated onboarding tests across 30 beta users and target at least 85% successful import with less than 10 minutes of founder support per 100 users.
    decisionImpact: If false, the product must simplify to lighter-weight search and deprioritize personalization until access improves.
  - assumption: Annual pricing around $49-$60 can outperform a lower-price monthly-first plan for this niche.
    basis: idea.yaml
    validationTest: Fake-door pricing test with annual-versus-monthly packaging and compare import-to-paid conversion and 60-day retention by cohort.
    decisionImpact: If false, lower price points or commerce-heavy monetization become necessary and the roadmap should deprioritize subscription-only economics.
  - assumption: Relevance quality from first-party taste data can materially beat availability-first incumbents on film-choice prompts.
    basis: operator judgment
    validationTest: Blind benchmark against JustWatch, Plex, Google TV, and manual workflows across 50 real prompts from power users.
    decisionImpact: If false, the startup lacks a differentiated wedge and should not scale acquisition.
  - assumption: TMDb and availability partners provide sufficient legal and technical coverage for an initial four-country launch.
    basis: research.yaml
    validationTest: Complete legal review of API terms, rate limits, caching rules, and country coverage before public beta.
    decisionImpact: If false, reduce geography, redesign data architecture, or delay commerce features that depend on rights accuracy.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run 20-30 customer interviews and diary studies with users who have 200+ logged films and multiple paid streamers.
    hypothesis: The beachhead will describe movie-choice friction as frequent enough to justify a dedicated paid utility.
    successMetric: At least 40% rank cross-app search pain among their top three recurring movie frustrations and share concrete recent workflows.
    owner: Founder/CEO
  - horizon: 0–90 days
    experiment: Build a clickable prototype plus fake-door landing page for import-based search and annual pricing.
    hypothesis: The product promise and pricing are strong enough to drive waitlist signups and import intent from creator and community traffic.
    successMetric: Landing page visit to waitlist conversion above 10% and at least 25% of signups opt into import beta access.
    owner: Founder/CEO
  - horizon: 90–180 days
    experiment: Launch closed beta with export import, 50-prompt relevance benchmarking, and query-level feedback loops.
    hypothesis: Imported history will produce meaningfully better recommendations than manual workflows and availability-only tools.
    successMetric: Users prefer the startup's results in at least 60% of benchmarked prompts and imported-user week-4 retention exceeds 25%.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test pricing and packaging with annual-first, monthly-first, and invite-only founding-member plans.
    hypothesis: An annual plan near $49-$60 will maximize revenue without materially hurting conversion among heavy users.
    successMetric: Imported-user paid conversion of at least 8% and payback under 6 months on early acquisition experiments.
    owner: Founder/CEO
  - horizon: 180–360 days
    experiment: Ship saved searches, alerts, and household profiles, then measure referral and retention lift.
    hypothesis: Utility features beyond the first query will create habit loops and organic growth.
    successMetric: Weekly retained search users increase by 20% and at least 15% of paid users share or invite another household member.
    owner: Product/design hire
  - horizon: 180–360 days
    experiment: Pilot affiliate commerce links for rentals, purchases, or ticketing in the highest-confidence result categories.
    hypothesis: Commerce can add monetization without reducing trust if links are relevant and transparent.
    successMetric: Outbound commerce click-through above 10% on eligible results with no decline in search satisfaction scores.
    owner: Partnerships lead
operations:
  - Maintain a rights-aware metadata pipeline combining TMDb and availability sources with country-level quality checks.
  - Instrument onboarding, search relevance, and outbound watch clicks from day one so retention and conversion are traceable by cohort.
  - Build customer support and trust workflows around import privacy, data deletion, and transparent provider coverage.
  - Use creator partnerships and community seeding as the primary early distribution engine before paid acquisition.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the import pipeline, ranking system, data integrations, and product instrumentation that determine whether the wedge works at all.
  - role: Founder/CEO
    startTiming: Month 0
    rationale: Own customer discovery, creator-led distribution, pricing tests, and the narrative around neutrality and portability.
  - role: Product/design hire
    startTiming: Month 4-6
    rationale: Consumer conversion depends on first-session clarity, fast onboarding, and high-trust search interactions rather than raw feature count.
  - role: Growth/community lead
    startTiming: Month 6-9
    rationale: If early retention is real, the next constraint becomes creator partnerships, referral loops, and community seeding in film-native channels.
  - role: Data/partnerships lead
    startTiming: Month 9-12
    rationale: Commerce links, provider coverage, and later distributor relationships require dedicated ownership once the core consumer habit is established.
milestones:
  - horizon: 0–12 months
    items:
      - Recruit and interview the first 30 beachhead users and document repeatable search prompts.
      - Ship closed beta with Letterboxd import, natural-language search, and four-country availability coverage.
      - Prove at least 25% week-4 retention for imported users and at least 8% conversion to a paid annual plan.
      - Establish creator-led acquisition loops and a repeatable onboarding funnel from signup to import to paid.
  - horizon: 12–24 months
    items:
      - Launch shared household profiles, saved searches, alerts, and first affiliate commerce links.
      - Expand beyond Letterboxd-only imports to additional user-controlled sources where legal and technical coverage is reliable.
      - Reach product-led growth driven by referrals and a measurable cohort of weekly retained paying users.
      - Decide whether the company is a durable prosumer subscription business or has evidence to pursue broader discovery distribution.
  - horizon: 24–36 months
    items:
      - Build a defensible first-party taste graph across users and households that meaningfully improves ranking quality.
      - Add selective partner inventory for specialty releases, theaters, or distributors without compromising neutrality.
      - Expand geography only where provider accuracy, payment behavior, and creator distribution channels are already validated.
      - Prepare for either seed-scale growth around a neutral query layer or a narrower profitable utility outcome based on the prior retention and monetization evidence.
risks:
  - risk: Platform dependency on Letterboxd export formats and interoperability constrains onboarding.
    likelihood: High
    impact: High
    mitigation: Use user-controlled exports first, support multiple import methods, and reduce reliance on any single platform over time.
  - risk: Consumer subscription fatigue caps conversion and retention.
    likelihood: High
    impact: High
    mitigation: Prove clear time-to-decision gains, lead with annual pricing, and add commerce monetization only after utility is established.
  - risk: Incumbents replicate the search experience before the company builds habit and data advantages.
    likelihood: Medium
    impact: High
    mitigation: Focus on the most underserviced cinephile prompts, ship fast, and collect first-party feedback loops that broader incumbents do not prioritize.
  - risk: Availability and metadata constraints limit product quality or legal flexibility.
    likelihood: Medium
    impact: Medium
    mitigation: Keep launch geography narrow, review partner terms early, and architect the data layer around compliance and source redundancy.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $1.5–2.5M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund the founding product team, data and metadata infrastructure, creator-led GTM experiments, and enough customer/relevance validation to prove or disprove a durable paid prosumer wedge.
