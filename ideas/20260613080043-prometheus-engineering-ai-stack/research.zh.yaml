  pricing: 定制企业报价 / Teamcenter X SaaS 打包
  strength: 很能证明结构化变更工作流确实能省成本、压周期，而且在航空这类面向监管的环境里可信度高。
  weaknessVsUs: 平台过重，更像系统底座；相比之下，它没有专门为单个供应商项目做快速、AI 辅助的放行资料包拼装。
  sourceRefs:
  - 12
  - 13
  - 14
  - 15
- name: PTC Windchill Aerospace & Defense
  stage: 现有厂商
  wedge: 面向 A&D 的配置管理与受控变更，叠在 Windchill PDMLink 之上。
  pricing: 定制企业报价
  strength: 原生支持 CDRL/SDRL、未并入变更等航空专用对象。
  weaknessVsUs: 更适合已经全面押注 Windchill 的组织；对只想先拿下一条工作流的中端供应商来说还是太重。
  sourceRefs:
  - 10
  - 11
- name: PTC Arena
  stage: 现有厂商
  wedge: 面向电子制造商的云 PLM/QMS，重点是变更治理与供应链协同。
  pricing: 定制报价
  strength: 在电子和供应链场景里站位很强，关于变更管理和产品上市速度的故事也讲得清楚。
  weaknessVsUs: 它卖的仍是宽平台，这就给“无需大范围上线、专门自动化鉴定资料包拼装”的一层工具留下空间。
  sourceRefs:
  - 4
  - 9
- name: Propel
  stage: 成长中
  wedge: 基于 Salesforce 的云 PLM/QMS，再叠加供应商协同、集成与产品文档 AI。
  pricing: 定制报价，另加模块与支持包
  strength: 覆盖供应商和合规面的广度很大，也强调集成能力和安全 AI。
  weaknessVsUs: 面铺得越宽，聚焦就越慢；相对那条紧迫的一项目放行审批工作，它还是太宽。
  sourceRefs:
  - 16
  - 17
  - 18
  - 19
  - 20
  - 21
  - 22
- name: Duro
  stage: 成长中
  wedge: 现代硬件 PLM，支持可配置的变更单、校验和工作流模板。
  pricing: 定制报价 / 无公开目录价
  strength: 变更单工作流模型清楚、可审计，硬件团队很容易听懂。
  weaknessVsUs: 它盯的是 PLM 对象治理，不是跨供应商职能把测试、采购和可对监管方提交的放行资料包编排起来。
  sourceRefs:
  - 23
  - 26
  - 27
  - 28
regulatoryTechnicalConstraints:
- point: 首件检验仍是航空供应商的正式要求，所以任何生成出来的资料包都必须把可追溯性一路拉回到适用标准和当前记录。
  sourceRefs:
  - 29
  - 30
- point: FAA PMA 规则与 EASA Part 21 下的适航变更控制，把“什么能改、怎么记、谁来批”的门槛抬得很高。
  sourceRefs:
  - 31
  - 32
- point: 靠近国防的工程数据可能落进 NIST 800-171 和相关 SPRS 报告要求里，从而约束模型部署与数据处理方式。
  sourceRefs:
  - 33
  - 34
- point: 现有 PLM 系统已经编码了复杂变更状态和航空专用数据对象，所以创业公司必须学会集成或共存，而不是覆盖重写。
  sourceRefs:
  - 10
  - 12
  - 23
validationSignals:
- point: Prometheus 拿到 $12B 融资，又强调重算力的 physical AI 路线，说明压缩工程周期已经被当成一类重要软件赛道。
  sourceRefs:
  - 1
  - 2
- point: Siemens 报告称，Teradyne 把 ECO 周期从 90 多天压到 14 天，每年还省下 $2 million，这证明痛点既真实又能量化。
  sourceRefs:
  - 14
- point: Fokker Services 表示，航空监管方坚持要求完整流程和文档，而基于 Teamcenter 的方法又得到了荷兰监管机构认可——这说明数字化工作流是有机会过合规审的。
  sourceRefs:
  - 15
- point: Boeing 对供应商的 AS9102 首件要求下传，进一步说明供应商要为变更硬件反复拼出严谨证据包，本来就是高频动作。
  sourceRefs:
  - 29
openQuestions:
- 目标供应商里，到底有多大比例还在 PLM 之外，用电子表格和邮件做变更影响分析与放行资料包拼装？又有多少已经被配置进正式工作流？
- 主机厂要求的资料包格式和审批证据，有多大概率会超出 AS9102 式首件要求，变成客户专属的负担？
- 滩头客户会不会接受安全云部署？还是说足够多的项目都要求私有模型或政府云，以至于产品架构必须从一开始就换路？
- 第一条切口能否既足够窄、足够快拿下，又同时沉淀出可迁移到相邻航空、汽车和工业供应商类别的数据原语？
