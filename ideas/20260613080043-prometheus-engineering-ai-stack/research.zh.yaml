reportMemo:
  executiveTakeaways:
  - 最近阶段最锋利的切口，不是做自主设计平台，而是吃下设计完成后的变更放行：每次上游修订一来，航电供应商都会立刻承受采购、测试和质量返工的高协同成本。
  - 滩头市场真实存在，但体量偏窄；一个可信的第 3 年结果更像是 $5M-$10M ARR 的公司，除非产品能顺利扩到相邻的受监管子系统供应商。
  - 现有 PLM 套件已经掌握了变更记录，但它们更像系统底座和企业骨架，并不擅长给中端供应商快速拼出 AI 辅助的鉴定资料包。
  - 合规负担既是阻力，也是护城河：AS9102 式 FAI、Part 21 适航规则和 CUI 安全控制，都让可审计、人在环的自动化比通用 copilot 更值钱。
  - 试点能不能成立，只看一件事：它能否在不逼客户替换 PLM 的前提下，把某个真实项目从收到修订到交出可放行资料包的时间砍掉几天。
  marketDefinition: 把工程修订变成可审批放行资料包的工作流软件，服务对象是受监管的硬件供应商。这个类别叠在 PLM 和文档仓库之上：它把变更识别、验证范围界定、采购更新和资料包拼装，串进工程、质量、测试与供应链之间。
  customerAndBuyer: 核心用户是服务 UAV 与卫星项目的北美 100-800 人航电和电力电子供应商里的项目经理、制造工程负责人，以及质量/测试经理。真正掏预算的人通常是 VP Engineering 或 VP Operations，因为排期滑点、重新鉴定的人力和供应商协同成本都压在他们头上。
  buyingTriggers:
  - point: 客户修订威胁到鉴定窗口或试产排期，迫使供应商在高压之下重跑影响分析、验证范围和首件文档。
    sourceRefs:
    - 4
    - 5
    - 29
  - point: 团队分散协作或把制造外包出去之后，大家会更清楚地看到：纸面和电子表格驱动的 ECO 工作流，会拖慢制造放行并制造返工。
    sourceRefs:
    - 14
    - 15
  - point: 国防或军民两用项目需要更强的工程数据控制和证据链管理，这让靠邮件线程审批越来越站不住脚。
    sourceRefs:
    - 33
    - 34
  willingnessToPay:
    summary: 只要工具能明显缩短受治理约束的放行周期，客户就愿意付钱。Siemens 提到 Teradyne 把工程变更单周期从 90 多天压到 14 天，每年省下 $2 million；而现有 PLM/QMS 厂商今天卖的仍是带实施和支持的企业平台，不是低价自助工具。这说明，只要产品能落进真实项目并证明能降低排期风险，买方会按企业软件预算买单。
    sourceRefs:
    - 9
    - 14
    - 21
    - 22
  competitiveLandscape: 竞争大致分四类：重型企业级 PLM 底座（Siemens Teamcenter、Windchill）、面向电子与受监管制造的云 PLM/QMS 套件（Arena、Propel）、硬件优先的新一代 PLM 挑战者（Duro），以及企业内部那套 PLM 导出 + 电子表格 + Jira + 服务团队的拼装栈。真正的空白，是一层只服务单个供应商项目的审批编排层，能在测试、采购和放行文档之间提供可追溯的 AI 辅助。
  incumbentThesis:
  - incumbentClass: 企业级 PLM 套件
    point: Teamcenter 和 Windchill 早就能管理正式变更、配置和航空专用数据结构，所以创业公司赢法不会是再造一个仓库；真正能赢的，是把这些系统仍留给流程设计和人工劳动的跨团队放行工作压缩掉。
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
    - 14
    - 15
  - incumbentClass: 云 PLM/QMS 套件
    point: Arena 和 Propel 在治理、供应商协同和可审计性上都很强，但它们想覆盖的是整个平台。正因为面铺得宽，才给单项目放行 copilot 留出空间——专盯影响地图、验证矩阵和 RFQ 资料包拼装。
    sourceRefs:
    - 4
    - 9
    - 16
    - 17
    - 18
    - 19
    - 20
    - 21
    - 22
  - incumbentClass: 硬件 PLM 挑战者
    point: Duro 证明现代硬件团队很想要可配置的变更单工作流，但它的重心仍在 PLM 对象治理，不在跨质量、采购和测试的鉴定资料包生成。
    sourceRefs:
    - 23
    - 26
    - 27
    - 28
  - incumbentClass: 内部工具与服务
    point: Teradyne 上 Teamcenter 之前那套状态——电子表格、文档、文件服务器、纸面审批，再加上 15 人的管理负担——说明“内部缝合”虽然效率差，却依然是最顽固的替代方案。
    sourceRefs:
    - 6
    - 14
  regulatoryLandscape: 这条工作流天然落在高合规赛道里。航空航天供应商必须保住首件证据、配置可追溯性和受控变更纪律；与此同时，靠近国防的项目也越来越需要 CUI 安全防护和有据可查的评估。因此，比起自主设计变更或黑箱审批，一个可审计、人在环的助手更符合现实。
  technologyLandscape: 技术栈现在已经够成熟了：产品团队手里有数字线程基础设施、可配置 PLM 工作流、供应商协作工具，以及产品文档 AI 助手。真正还没被解决的，不是存储或检索，而是如何把多份工程资料串起来做推理——从 CAD/BOM 变化一路推到验证、采购和审批输出，而且全过程可追溯。
  distributionChannels:
  - point: 第一条路仍然得是创始人主导、直接卖给 VP Engineering 和运营负责人，因为这个痛点强依赖具体项目，价值也只能在一轮真实放行周期里被证明。
    sourceRefs:
    - 14
    - 15
  - point: PLM 和 ERP 集成伙伴是天然渠道，因为买方本来就期待变更工作流能接进企业系统，而不是把它们整套替掉。
    sourceRefs:
    - 7
    - 17
  - point: 一旦产品证明自己能安全地协调外部审批和文档交接，供应商协同与制造伙伴工作流会变成很有潜力的扩展渠道。
    sourceRefs:
    - 18
    - 19
  partnershipEcosystem:
  - point: CAD、PLM 和 ERP 连接器只是入场券；相比单纯提升模型质量，更能降低部署摩擦的是集成面够不够广。
    sourceRefs:
    - 16
    - 17
    - 126
  - point: 航空航天质量和认证伙伴很关键，因为 FAI、Part 21，以及面向监管方的文档解释，到今天仍然高度依赖行业信任和既有经验。
    sourceRefs:
    - 29
    - 31
    - 32
  - point: 对靠近国防的供应商来说，安全 AI 和数据治理伙伴同样关键——他们不会把受控工程内容直接丢进公共模型。
    sourceRefs:
    - 20
    - 33
    - 34
  dataMoats:
  - point: 一套历史变更单、审批评论和处理结果的语料库，能比通用 PLM 元数据更好地训练影响分类和审批推荐。
    sourceRefs:
    - 23
    - 26
  - point: 跨团队结果数据——放行耗时、资料包返工、验证重跑和采购变更——能堆出工作流护城河，因为现有套件很少把单项目放行表现清楚地暴露出来。
    sourceRefs:
    - 7
    - 14
    - 15
  - point: 如果产品能在私有工程内容上做保留权限的文档 AI，并把它和权限、可追溯性、供应商专属证据模板绑在一起，粘性会很强。
    sourceRefs:
    - 20
    - 33
  geographicConsiderations:
  - point: 北美就是最合适的滩头：2025 年该地区占了 UAV 市场 34.12% 的份额，而自 2015 年以来美国又占了全部 smallsat 发射的 75%，目标项目和供应商预算都更集中。
    sourceRefs:
    - 35
    - 37
  - point: 美国靠近国防的供应商可能最先感到痛，因为 NIST 800-171 和 SPRS 评估流程抬高了安全、可审计工程工作流的价值。
    sourceRefs:
    - 33
    - 34
  - point: 欧洲会是合理的第二地理市场，因为 EASA Part 21 和密集的航空供应商群同样需要强追溯性；但监管解释和部署要求会不一样。
    sourceRefs:
    - 32
    - 38
  sensitivityCases:
  - case: PLM 现有厂商推出可信的 AI 辅助资料包拼装功能
    impact: 那时差异化会迅速收缩到部署速度、项目专属模板，以及放行结果数据上，而不再只是“工作流编排”本身。
    sourceRefs:
    - 12
    - 13
    - 14
    - 15
    - 20
    - 127
  - case: 如果 UAV 和 smallsat 项目增长因认证或 BVLOS 审批继续偏慢
    impact: 滩头客户的新增速度会放缓，逼着公司更早把相邻航空和工业子系统项目纳入重点。
    sourceRefs:
    - 35
    - 41
    - 42
  - case: 国防买方从第一天就要求私有模型或政府云部署
    impact: 销售周期会拉长、上线成本会变高，但这个市场也会因此更难被轻量级横向 copilot 服务。
    sourceRefs:
    - 20
    - 33
    - 34
  validationPlan:
  - priority: high
    question: 目标供应商画像每个月到底会打进来多少工程变更？而今天从收到修订到资料包达到可放行状态，中位数又是多少天？
    evidenceToGather: 至少从 5 家共创客户那里拿到带时间戳的变更日志、审批资料包时间戳和返工环节。
  - priority: high
    question: 今天最拖时间的环节到底是哪一步：CAD diff、验证范围界定、采购更新，还是资料包排版？
    evidenceToGather: 在每家试点里 shadow 一笔真实变更单，按步骤和角色标记时间消耗。
  - priority: medium
    question: 如果产品保持人在环且全程可追溯，客户会不会信任 AI 生成的推荐？
    evidenceToGather: 追踪试点验收标准、建议验证矩阵与 RFQ 资料包的覆盖率、改写率和审批评论。
