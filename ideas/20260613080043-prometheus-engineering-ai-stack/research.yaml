- point: Defense-adjacent engineering data can fall under NIST 800-171 and related SPRS reporting, constraining model deployment and data handling.
  sourceRefs:
  - 33
  - 34
- point: Incumbent PLM systems already encode complex change states and aerospace-specific data objects, so the startup must integrate or coexist rather than overwrite them.
