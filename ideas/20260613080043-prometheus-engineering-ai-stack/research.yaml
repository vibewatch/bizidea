- name: PTC Windchill Aerospace & Defense
  stage: incumbent
  wedge: A&D-focused configuration management and controlled change on top of Windchill PDMLink.
  pricing: Custom enterprise quote
  strength: Built-in support for aerospace-specific constructs such as CDRL/SDRL and unincorporated changes.
  weaknessVsUs: Best fit for organizations standardizing on Windchill; relatively heavy for mid-market suppliers that want one workflow wedge first.
