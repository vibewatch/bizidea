  validationPlan:
  - priority: high
    question: How many engineering changes per month hit the target supplier archetype, and what is today’s median days-from-revision-to-release-ready-packet?
    evidenceToGather: Time-stamped change logs, approval packet timestamps, and rework loops from at least five design partners.
  - priority: high
    question: 'Which artifacts actually drive delay: CAD diffing, validation scoping, sourcing updates, or packet formatting?'
    evidenceToGather: Shadow one live change order per pilot account and tag time spent by step and stakeholder.
  - priority: medium
    question: Will customers trust AI-generated recommendations if the product stays human-in-the-loop and fully traceable?
    evidenceToGather: Pilot acceptance criteria, override rates, and approver comments on suggested validation matrices and RFQ packets.
