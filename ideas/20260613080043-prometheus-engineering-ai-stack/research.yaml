openQuestions:
- What percentage of target suppliers still run change-impact analysis and release-packet assembly outside PLM in spreadsheets and email, versus inside configured workflows?
- How often do primes require supplier-specific packet formats or approval evidence beyond AS9102-style first-article requirements?
- Will beachhead customers accept secure cloud deployment, or do enough programs require private-model or government-cloud deployment to force a different product architecture?
- Can the first wedge stay narrow enough to win quickly while still creating data primitives that transfer into adjacent aerospace, automotive, and industrial supplier categories?
