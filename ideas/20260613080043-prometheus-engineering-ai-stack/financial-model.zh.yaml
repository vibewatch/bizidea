scenarios:
  downside:
    description: 试点转生产变慢，私有部署工作始终偏定制化，公司到第 3 年年底只做到 26 个付费账户。
    y3RevenueK: 3002.0
    y3EbitdaK: -765.7
    cashLowPointK: -52.0
    keyAssumptionChanges:
    - Quarter-end customers slip to 4, 5, 7, 9 in Y2 and 12, 15, 20, 26 in Y3.
    - Recurring ACV softens from $150K to $144K and onboarding fees from $45K to $40K as buyers push smaller first-program scopes.
    - Gross margin falls from 70% to 67% because secure deployment and connector work remain services-heavy.
  base:
    description: 3 家付费共创客户成功转成参考案例，伙伴带来的管道在第 2 年开始起量，公司到 Q4Y3 做到 33 家付费供应商账户。
    y3RevenueK: 4091.3
    y3EbitdaK: 86.9
    cashLowPointK: 701.7
    keyAssumptionChanges:
    - Quarter-end customers follow A8 and A9 to 10 accounts by Q4Y2 and 33 by Q4Y3.
    - Recurring ACV stays at $150K and each new logo still contributes a $45K onboarding fee.
    - Gross margin holds at the 70% target as implementation becomes template-driven rather than bespoke.
  upside:
    description: 共创客户证明跑得更快，渠道更早起量，公司到第 3 年年底做到 38 个账户，且价格与毛利都略优。
    y3RevenueK: 5048.0
    y3EbitdaK: 857.6
    cashLowPointK: 1317.1
    keyAssumptionChanges:
    - Quarter-end customers reach 5, 8, 11, 14 in Y2 and 18, 24, 28, 38 in Y3.
    - Recurring ACV rises from $150K to $156K and onboarding fees from $45K to $50K as second-program value is proven earlier.
    - Gross margin improves from 70% to 72% after connector reuse and private-model packaging standardize.
sensitivity:
- variable: ARPU
  downsideCase: Recurring ACV slips to $135K.
  baseCase: Recurring ACV stays at $150K.
  upsideCase: Recurring ACV reaches $165K after second-program proof.
  y3RevenueImpactK: -305.0
  cashImpactK: -213.0
- variable: CAC
  downsideCase: Blended CAC rises to $125K because founder-led direct sales remains the dominant motion.
  baseCase: Blended CAC stays at $95K with partner-sourced opportunities contributing from Y2.
  upsideCase: Blended CAC falls to $75K once integrator and quality-advisor referrals warm the pipeline.
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 流失率
  downsideCase: Monthly churn rises to 2.0% because workflows stay one-program-specific.
  baseCase: Monthly churn stays at 1.5%.
  upsideCase: Monthly churn improves to 1.0% once multi-program templates become sticky.
  y3RevenueImpactK: -240.0
  cashImpactK: -168.0
- variable: 销售周期
  downsideCase: Pilot-to-production stretches by roughly 3 months because security and connector approvals take longer.
  baseCase: Pilot-to-production stays around 6 months and supports the A8/A9 landing pattern.
  upsideCase: Security review compresses and production conversion closes inside one quarter for lighthouse accounts.
  y3RevenueImpactK: -540.0
  cashImpactK: -378.0
- variable: 毛利率
  downsideCase: Gross margin falls to 67% because private-model and connector work stays custom.
  baseCase: Gross margin stays at the 70% plan target.
  upsideCase: Gross margin reaches 72% with better template reuse and standardized secure deployment.
  y3RevenueImpactK: 0.0
  cashImpactK: -123.0
- variable: 招聘节奏
  downsideCase: Two Y2-Y3 hires are pulled forward by two quarters before demand warrants them.
  baseCase: Hiring follows A10.
  upsideCase: One noncritical late-stage hire slips until after 20 production contracts.
  y3RevenueImpactK: 0.0
  cashImpactK: -230.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  TargetAccounts --> PaidPilots\n  PaidPilots --> AnnualContracts\n  AnnualContracts --> ProgramExpansion\n  AnnualContracts --> Revenue\n  ProgramExpansion --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的收入来自：到 Q4Y3 做到 33 家付费供应商账户，经常性 ACV 为 $150K，且每个新部署再叠加 $45K 上线费。
- checkName: 哪些事必须做对
  finding: 前 3 家付费共创客户必须转成可引用的年度合同，这样模板复用和伙伴带来的管道，才可能在第 2 年拉低 CAC，而不是逼公司继续堆更大的直销团队。
- checkName: 模型会在哪坏掉
  finding: 如果私有部署要求始终无法标准化，且客户增长更接近 26 家而不是 33 家，那么 downside 情景会在公司真正 ready for seed 之前先把现金打穿。
- checkName: 下一轮证明点
  finding: 一个可信的 seed 故事应该包含：10 份年度生产合同、2 次第二项目扩张、2 个可复制渠道伙伴，以及在融资跑道内做出可基准化的周期改善。
sanityChecks:
  ruleOf40: 第 3 年增长 221.8% + EBITDA 利润率 2.1% = 223.9%（方向上很强，但也被第 2 年基数较小放大了）。
  burnMultiple: 第 2 年 burn multiple 约为 0.9x：$984.8K EBITDA burn，对应约 $1.05M 的净新增 ARR（从第 1 年退出 ARR 约 $0.45M 提到第 2 年约 $1.50M）。
  revenuePerFte: 按 13 名年末 FTE 算，第 3 年人均收入约 $315K（粗略垂直 SaaS 对标区间：$200K-$400K）。
  flags:
  - 基础情景仍要求一个细分滩头在 Q4Y3 前支撑起 33 家付费账户；如果 UAV 与卫星供应商新增速度比预期更慢，计划会很快被压缩。
  - 毛利率只有在安全部署与连接器工作逐步可复制时，才能守住 70%；若早期客户普遍要求定制私有环境，模型就会更像 downside。
  - 公司到第 3 年只是接近盈亏平衡，因此管理层仍需要在完全自我造血之前启动 seed 流程。
  - 收入里包含了每个新 logo 对应的一笔可观上线费；如果试点停滞或转化放缓，回本期和跑道都会比单看经常性 ACV 时更快恶化。
