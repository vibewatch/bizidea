jobsToBeDone:
  - job: >-
      When a prime customer issues a late design revision, help a supplier program team determine what changed and what evidence must be regenerated, so they can keep the qualification schedule intact.
    currentAlternative: Manual impact reviews across PLM exports, spreadsheets, and email threads
    successMetric: Days from revision receipt to approved release packet
  - job: >-
      When sourcing and quality teams need updated documentation for a changed assembly, help them assemble RFQ, validation, and approval materials from the same source of truth, so they can avoid rework and missed builds.
    currentAlternative: Rebuilding packet contents by hand with PLM records and shared drives
    successMetric: Percentage of change orders approved without packet rework
