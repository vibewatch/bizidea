problem: >-
  Low-volume aerospace electronics suppliers live inside constant engineering-change traffic from primes, but every revised CAD file or interface spec still kicks off a manual scramble across PLM, quality, sourcing, and test teams. The real delay is not drawing the new part; it is figuring out what changed, which validations must rerun, which supplier quotes must update, and what release evidence must be rebuilt before schedule slips. Existing PLM and ERP systems store records, but they do not assemble a trusted, cross-functional change packet fast enough for qualification-driven programs.
targetUser:
  primary: >-
    Program managers and manufacturing engineering leads at 100-800 person North American avionics and power-electronics suppliers shipping flight computers, power modules, or sensor-interface boards into UAV and satellite programs
  secondary: >-
    Quality and test managers responsible for first-article, qualification, and deviation approvals on the same supplier programs
  buyer: VP Engineering or VP Operations
startupThesis:
  nonObviousInsight: >-
    The first durable market for engineering AI is not fully autonomous product design inside giant OEMs; it is supplier-side change release, where one upstream revision creates immediate, high-cost coordination work that existing PLM systems and services teams still handle manually.
  beachhead: >-
    Engineering-change approval workflows for North American avionics and power-electronics suppliers supporting low-volume UAV and satellite builds with recurring customer-driven revisions
  wedge: >-
    A change-approval workspace that ingests revised CAD, requirements, and prior release artifacts, then generates an impact map, validation matrix, updated RFQ package, and approver-ready release packet for one supplier program
  whyNowCatalyst: >-
    Prometheus' funding, compute spend, and explicit design-to-manufacturing mandate make cycle-compression software newly credible, while supplier teams feel the pain immediately when primes accelerate revision loops.
  ventureScalePath: >-
    Once embedded in avionics change release, the platform can expand into adjacent aerospace subsystems, then automotive and industrial suppliers, and eventually become the workflow and data layer for supplier qualification, cost updates, and manufacturing readiness across complex-product supply chains.
solution: >-
  The product connects CAD revisions, requirements documents, PLM records, prior test evidence, and supplier quote templates for one active program. It highlights what actually changed, maps the affected assemblies and validations, and drafts the release packet quality, sourcing, and program teams need to approve the update. Instead of generating novel designs, it focuses on the brittle handoff work between engineering intent and manufacturable release. Over time, it learns from historical change orders, approval comments, and qualification outcomes to recommend the minimum evidence package that will pass internal and customer review. The first measurable outcome is fewer days between revision receipt and release-ready packet delivery.
goToMarketSeed:
  firstCustomer: >-
    A 150-500 person North American avionics supplier with 3-10 concurrent UAV or satellite programs and weekly customer-driven engineering changes before qualification or pilot production
  buyingTrigger: >-
    A prime customer issues a late interface, enclosure, or board revision that threatens a qualification test window, pilot build, or contracted delivery date
  currentAlternative: PLM plus spreadsheets, Jira, email threads, and engineering-services support
  switchingReason: >-
    The wedge removes the slowest cross-functional work—impact analysis, validation scoping, sourcing updates, and packet assembly—without forcing a full PLM replacement.
  pricingHypothesis: Annual platform fee priced by active program count and engineering-change volume
