topRisks:
  - name: Validation trust gap
    description: Safety-critical suppliers may resist relying on AI-generated impact analysis or release documents without proof they are accurate.
    mitigation: Start as a human-in-the-loop copilot with full artifact traceability, confidence flags, and approval checklists on one bounded workflow.
  - name: Incumbent overlap
    description: PLM vendors or systems integrators could position this as a feature rather than a standalone product.
    mitigation: Focus on cross-system packet assembly and approval intelligence that sits above fragmented PLM, ERP, and QA stacks and shows time-to-release ROI fast.
  - name: Narrow initial market
    description: Avionics suppliers are attractive but finite, creating a risk that the company tops out before expansion.
    mitigation: Build reusable change-release primitives from day one so the same product can expand into other aerospace, automotive, and industrial supplier programs.
