differentiator: 大多数工程 AI 公司都想帮客户做出更好的设计，于是很容易掉进漫长验证周期，并正面撞上大型 CAD 与仿真现有厂商。这条思路往后退一步，专挑今天已经在丢钱的地方：把一个已被接受的修订，变成一份能放行、能测试、能发给供应商的跨团队资料包。这样积累出来的历史变更单、审批逻辑和鉴定结果数据，会形成一条专有数据护城河——通用 copilot 和横向 PLM 厂商都抓不干净。
