topRisks:
- name: 验证信任缺口
  description: 安全关键型供应商可能不愿直接依赖 AI 生成的影响分析或放行文档，除非先证明它足够准。
  mitigation: 先把产品做成人在环的 copilot：每份输出都能追到原始资料，带置信标记和审批清单，只覆盖一条边界清楚的工作流。
- name: 现有厂商重叠
  description: PLM 厂商或系统集成商可能把这件事包装成自家功能，而不是独立产品。
  mitigation: 把重点放在跨系统资料包拼装和审批智能上，叠在碎片化的 PLM、ERP、QA 堆栈之上，并尽快用“放行提速”的 ROI 把价值打出来。
- name: 初始市场偏窄
  description: 航电供应商虽然有吸引力，但总体数量有限，如果扩张太慢，公司可能很快触顶。
  mitigation: 从第一天起就把可复用的变更放行原语做出来，这样同一套产品才能扩进更多航空、汽车和工业供应商项目。
