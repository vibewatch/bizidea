problem: 低产量航空航天电子供应商长期泡在主机厂不断抛来的工程变更里，但每次 CAD 文件或接口规范一改，PLM、质量、采购和测试团队还是得手工冲一遍。真正拖慢进度的，不是把新零件画出来，而是搞清楚哪里变了、哪些验证要重跑、哪些供应商报价得更新，以及在进度滑掉之前，哪些放行证据要重新拼一遍。现有 PLM 和 ERP 系统能存记录，却不能在鉴定驱动的项目里，足够快地把一份跨团队、可信的变更资料包拼出来。
targetUser:
  primary: 北美 100-800 人规模的航电和电力电子供应商里的项目经理、制造工程负责人——这些团队把飞控计算机、电源模块或传感器接口板交付给 UAV 与卫星项目。
  secondary: 同一批供应商项目里的质量与测试经理——他们负责首件、鉴定和偏差审批。
  buyer: VP Engineering or VP Operations
startupThesis:
  nonObviousInsight: 工程 AI 第一个能跑出耐久市场的地方，不是在巨型 OEM 内部做全自动产品设计，而是在供应商侧做变更放行：上游只要改一次，下游立刻就会冒出高成本的协同工作，而现有 PLM 系统和服务团队到今天还在靠手工兜。
  beachhead: 面向北美航电与电力电子供应商的工程变更审批工作流——服务低产量 UAV 与卫星项目，且持续承受客户驱动的修订。
  wedge: 一个变更审批工作台：吃进修订后的 CAD、需求文档和既有放行材料，再为单个供应商项目产出影响地图、验证矩阵、更新后的 RFQ 包，以及可直接送审的放行资料包。
  whyNowCatalyst: Prometheus 的融资、算力投入和“从设计走到制造”的明确任务，让周期压缩型软件第一次显得足够可信；而当主机厂加快修订节奏时，供应商团队的痛感又最先冒出来。
  ventureScalePath: 先嵌进航电变更放行，再扩到相邻航空子系统，随后进入汽车和工业供应商，最后把自己做成复杂产品供应链里，承接供应商鉴定、成本更新和制造就绪度的工作流与数据层。
solution: 产品把某个在运项目的 CAD 修订、需求文档、PLM 记录、既有测试证据和供应商报价模板接起来，先标出真正发生了哪些变化，再把受影响的部件和验证项映射出来，最后起草质量、采购和项目团队审批更新所需的放行资料包。它不去生成全新的设计，而是盯住工程意图走到可制造放行之间，那段最脆、最容易卡壳的交接工作。时间一长，它会从历史变更单、审批评论和鉴定结果里学出经验，推荐一份刚好够过内审和客户审的最小证据包。第一条能量化的结果，是从收到修订到交出可放行资料包之间的天数下降。
goToMarketSeed:
  firstCustomer: 首个客户画像：一家北美 150-500 人的航电供应商，手上同时跑着 3-10 个 UAV 或卫星项目，而且在鉴定或试生产前，每周都会遇到客户驱动的工程变更。
  buyingTrigger: 主机厂在后期突然改了接口、外壳或电路板设计，直接威胁到鉴定测试窗口、试产排期或合同交付日期。
  currentAlternative: PLM 加电子表格、Jira、邮件线程和工程服务支持
  switchingReason: 这个切口能先拿掉最慢的跨团队工作——影响分析、验证范围界定、采购更新和资料包拼装——同时又不逼客户整套替换 PLM。
  pricingHypothesis: 按活跃项目数量和工程变更量收取年度平台费。
