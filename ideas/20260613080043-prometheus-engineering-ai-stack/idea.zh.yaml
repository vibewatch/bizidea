jobsToBeDone:
- job: 当主机厂客户在后期抛出设计修订时，帮供应商项目团队迅速看清到底改了什么、哪些证据要重做，这样他们才能把鉴定排期守住。
  currentAlternative: 在 PLM 导出、电子表格和邮件线程之间手工做影响评审
  successMetric: 从收到修订到放行资料包获批的天数
- job: 当采购和质量团队需要给变更后的组件补齐文档时，帮他们从同一套事实源里把 RFQ、验证和审批材料拼起来，这样就能少返工、少错过生产窗口。
  currentAlternative: 靠 PLM 记录和共享盘手工重建资料包内容
  successMetric: 无需资料包返工就获批的变更单占比
