scenarios:
  downside:
    description: "Pilot-to-production conversion slows, private-deployment work stays custom, and the company exits Y3 with only 26 paying accounts."
    y3RevenueK: 3002.0
    y3EbitdaK: -765.7
    cashLowPointK: -52.0
    keyAssumptionChanges:
      - "Quarter-end customers slip to 4, 5, 7, 9 in Y2 and 12, 15, 20, 26 in Y3."
      - "Recurring ACV softens from $150K to $144K and onboarding fees from $45K to $40K as buyers push smaller first-program scopes."
      - "Gross margin falls from 70% to 67% because secure deployment and connector work remain services-heavy."
  base:
    description: "Three paid design partners convert into references, partner-led pipeline starts in Y2, and the company reaches 33 paying supplier accounts by Q4Y3."
    y3RevenueK: 4091.3
    y3EbitdaK: 86.9
    cashLowPointK: 701.7
    keyAssumptionChanges:
      - "Quarter-end customers follow A8 and A9 to 10 accounts by Q4Y2 and 33 by Q4Y3."
      - "Recurring ACV stays at $150K and each new logo still contributes a $45K onboarding fee."
      - "Gross margin holds at the 70% target as implementation becomes template-driven rather than bespoke."
  upside:
    description: "Design-partner proof lands faster, channels contribute earlier, and the company exits Y3 with 38 accounts at slightly better price and margin."
    y3RevenueK: 5048.0
    y3EbitdaK: 857.6
    cashLowPointK: 1317.1
    keyAssumptionChanges:
      - "Quarter-end customers reach 5, 8, 11, 14 in Y2 and 18, 24, 28, 38 in Y3."
      - "Recurring ACV rises from $150K to $156K and onboarding fees from $45K to $50K as second-program value is proven earlier."
      - "Gross margin improves from 70% to 72% after connector reuse and private-model packaging standardize."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Recurring ACV slips to $135K."
    baseCase: "Recurring ACV stays at $150K."
    upsideCase: "Recurring ACV reaches $165K after second-program proof."
    y3RevenueImpactK: -305.0
    cashImpactK: -213.0
  - variable: "CAC"
    downsideCase: "Blended CAC rises to $125K because founder-led direct sales remains the dominant motion."
    baseCase: "Blended CAC stays at $95K with partner-sourced opportunities contributing from Y2."
    upsideCase: "Blended CAC falls to $75K once integrator and quality-advisor referrals warm the pipeline."
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: "churn"
    downsideCase: "Monthly churn rises to 2.0% because workflows stay one-program-specific."
    baseCase: "Monthly churn stays at 1.5%."
    upsideCase: "Monthly churn improves to 1.0% once multi-program templates become sticky."
    y3RevenueImpactK: -240.0
    cashImpactK: -168.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production stretches by roughly 3 months because security and connector approvals take longer."
    baseCase: "Pilot-to-production stays around 6 months and supports the A8/A9 landing pattern."
    upsideCase: "Security review compresses and production conversion closes inside one quarter for lighthouse accounts."
    y3RevenueImpactK: -540.0
    cashImpactK: -378.0
  - variable: "gross margin"
    downsideCase: "Gross margin falls to 67% because private-model and connector work stays custom."
    baseCase: "Gross margin stays at the 70% plan target."
    upsideCase: "Gross margin reaches 72% with better template reuse and standardized secure deployment."
    y3RevenueImpactK: 0.0
    cashImpactK: -123.0
  - variable: "hiring pace"
    downsideCase: "Two Y2-Y3 hires are pulled forward by two quarters before demand warrants them."
    baseCase: "Hiring follows A10."
    upsideCase: "One noncritical late-stage hire slips until after 20 production contracts."
    y3RevenueImpactK: 0.0
    cashImpactK: -230.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> ProgramExpansion
      AnnualContracts --> Revenue
      ProgramExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from growing to 33 paying supplier accounts by Q4Y3 at a $150K recurring ACV plus a $45K onboarding fee on each new deployment."
  - checkName: "Must go right"
    finding: "The first three paid design partners must convert into referenceable annual contracts so template reuse and partner-sourced pipeline can lower CAC in Y2 instead of forcing a larger direct-sales team."
  - checkName: "Model breaks if"
    finding: "If private-deployment requirements stay bespoke and customer growth lands closer to 26 accounts than 33, the downside case turns cash negative before the company is truly seed-ready."
  - checkName: "Next-round proof"
    finding: "A credible seed story is 10 annual production contracts, two second-program expansions, two repeatable channel partners, and benchmarked cycle-time improvement reached inside the funded runway."
sanityChecks:
  ruleOf40: "Y3 growth 221.8% + EBITDA margin 2.1% = 223.9% (directionally strong but inflated by the small Y2 base)."
  burnMultiple: "Y2 burn multiple is ~0.9x: $984.8K EBITDA burn against roughly $1.05M of net new ARR (from ~$0.45M exit ARR in Y1 to ~$1.50M in Y2)."
  revenuePerFte: "$315K Y3 revenue per end-of-year FTE on 13 FTE (rough vertical SaaS benchmark: $200K-$400K)."
  flags:
    - "The base case still requires a niche beachhead to support 33 paying accounts by Q4Y3, so slower-than-expected account creation in UAV and satellite suppliers would compress the plan quickly."
    - "Gross margin only stays at 70% if secure deployment and connector work become repeatable; early customer demands for bespoke private environments would push the model toward the downside case."
    - "The company is only near breakeven in Y3, so management would still need to begin the seed process before full self-funding."
    - "Revenue includes meaningful onboarding fees on each new logo; if pilots stall or convert more slowly, both payback and runway weaken faster than the recurring ACV alone suggests."
