slug: avionics-change-approval-os
date: '2026-06-13'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "month"
    source: "[BP date 2026-06-13] The model starts in the month after the plan date."
  - id: A2
    name: "Opening cash from pre-seed"
    value: "2.8"
    unit: "USDM"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] Base case uses a $2.8M round inside the stated range to fund 24 months including a six-month buffer."
  - id: A3
    name: "Recurring subscription ACV"
    value: "150"
    unit: "USDK per customer-year"
    source: "[BP gtm pricing $120k-$180k ARR; Research market.som 40 customers at $150k ACV] Base case uses the midpoint of the recurring price range."
  - id: A4
    name: "Onboarding and implementation fee"
    value: "45"
    unit: "USDK per new customer"
    source: "[BP gtm pricing $30k-$60k implementation] Base case uses the midpoint for one-program setup and artifact onboarding."
  - id: A5
    name: "Gross margin"
    value: "70"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70] Held flat in the base case once onboarding becomes more repeatable."
  - id: A6
    name: "Monthly customer churn"
    value: "1.5"
    unit: "percent"
    source: "[BP investorMemo.mustBeTrue and renewal logic; startup-finance heuristic] Embedded compliance workflows should retain well, but the company is still early."
  - id: A7
    name: "Year 1 customer landing pattern"
    value: "M1-M12 EOP customers = 0,0,0,0,0,1,1,1,2,2,2,3"
    unit: "count"
    source: "[BP milestones 0-12 months sign 3 paid design partners; BP experiment roadmap first paid pilot in 90-180 days]"
  - id: A8
    name: "Year 2 and Year 3 customer milestones"
    value: "Q4Y2 10 customers; Q1Y3 14; Q2Y3 20; Q3Y3 26; Q4Y3 33"
    unit: "count"
    source: "[BP milestones 12-24 and 24-36 months; Research SOM of 40 customers at Y3] Base case stays below the full SOM case but still reaches the BP milestone band of 25-40 accounts by 36 months."
  - id: A9
    name: "Loaded cash compensation by role"
    value: "CEO founder 150; founding engineer 190; implementation lead 140; aerospace quality advisor 130; product/integration engineer 180; partnerships lead 170; solutions engineer 150; security/product engineer 180; account executive 180; customer success manager 130; finance and ops manager 120; product manager 160"
    unit: "USDK per year"
    source: "[BP team roles and sequencingRationale; startup-finance heuristic for a lean North American enterprise software team including payroll tax and benefits.]"
  - id: A10
    name: "Hiring cadence"
    value: "M1 CEO founder and founding engineer; M2 implementation lead; M3 aerospace quality advisor; M7 product/integration engineer; M10 partnerships lead; M15 solutions engineer; M18 security/product engineer; M20 account executive; M23 customer success manager; M26 second account executive; M29 finance and ops manager; M31 product manager"
    unit: "timing"
    source: "[BP team startTiming; BP strategicChoices.sequencingRationale] Product and deployment hires precede scaled GTM, with later commercial and ops hires only after reference customers exist."
  - id: A11
    name: "Functional payroll allocation"
    value: "CEO 70% S&M / 30% G&A; engineers and product manager 100% R&D; implementation lead 60% R&D / 40% G&A; quality advisor 40% R&D / 60% G&A; partnerships and AEs 100% S&M; solutions engineer 50% R&D / 50% G&A; customer success manager 40% S&M / 60% G&A; finance and ops 100% G&A"
    unit: "allocation"
    source: "[BP team rationales] Used to roll headcount cost into the P&L by function."
  - id: A12
    name: "Non-payroll operating spend ramp"
    value: "S&M non-payroll 8K/mo in early Y1 rising to 30K/mo by late Y3; R&D tooling/cloud 10K/mo rising to 28K/mo; G&A 8K/mo rising to 23K/mo"
    unit: "USDK per month"
    source: "[Startup-finance heuristic anchored to BP security, connector, travel, partner, and compliance needs.]"
  - id: A13
    name: "Blended CAC"
    value: "95"
    unit: "USDK per customer"
    source: "[BP founder-led outbound plus partner channels; startup-finance heuristic] Long enterprise cycles and regulated onboarding keep CAC high until partner referrals start contributing in Y2."
  - id: A14
    name: "Revenue recognition policy"
    value: "Monthly recurring revenue equals average active customers in the period times A3 divided by 12, plus A4 for each new customer that starts in the period"
    unit: "policy"
    source: "[BP businessModel revenue streams] Keeps P&L tied directly to customer count, recurring ACV, and onboarding fees."
  - id: A15
    name: "Cash conversion policy"
    value: "EBITDA approximates cash movement"
    unit: "policy"
    source: "[Startup-finance heuristic] No debt, capex, tax, or material working-capital swings are modeled at this stage."
  - id: A16
    name: "Funding milestone for next round"
    value: "By month 24 the company should have 10 annual production contracts, at least 2 second-program expansions, 2 repeatable channel relationships, and a secure private-model-ready deployment option"
    unit: "milestone"
    source: "[BP milestones 12-24 months; BP fundingAsk.useOfFundsSummary] Used to size the ask with a six-month fundraising buffer."
