slug: avionics-change-approval-os
date: '2026-06-13'
executiveSummary: 对投资人最顺手、也最能落地的版本，不是一个自主设计平台，而是给北美航电和电力电子供应商用的人在环变更审批工作台——这些团队长期承受主机厂不断抛来的修订。首个客户应是一家 150-500 人规模的 UAV 或卫星供应商，手里跑着 3-10 个活跃项目，每周都有工程变更，而且眼前就有一场鉴定或试产 deadline，把放行协同变成了管理层问题。MVP 应该吃进修订后的 CAD、需求文档、既有放行资料和采购模板，再起草影响地图、验证矩阵、RFQ 更新和可直接送审的放行资料包，同时不替换 PLM 或 ERP。GTM、定价和上线方式都要围绕同一个事件设计：创始人直接卖给 VP Engineering 或 VP Operations；先部署到一个项目；年费按活跃项目数和变更量计价，因为买方真正买的是排期保护。战略上必须先死盯供应商侧的放行编排，直到公司能证明自己确实把“收到修订到放行资料包就绪”的时间砍掉几天，并减少真实项目里的资料包返工。这个故事最成立的地方在于：现有厂商掌握了记录和工作流原语，但仍把跨团队资料包拼装的负担留给电子表格、邮件和服务团队，所以叠加层有机会更快切进去。投资人最担心的是，滩头市场虽然真实却不大，而独立预算科目也还没被证明，所以向相邻受监管子系统供应商扩张不是加分项，而是必选项。还有两个尽调缺口仍然关键：目标供应商每月真实变更单量到底有多少，以及早期客户里有多少会要求私有模型或政府云部署。
problem:
- 每次客户在后期改设计，航电供应商都得重新拉起工程、质量、测试和采购之间的影响分析；可今天大多数工作，依然散落在 PLM 导出、电子表格、邮件线程和手工资料包拼装里。
- 受鉴定约束的项目容不下证据缺漏或变更范围含糊，所以只要放行准备慢一点、错一点，就会直接变成测试窗口滑掉、试产延误和额外返工。
- 现有 PLM 和 QMS 系统能保住记录和审批，但碰到一个 deadline 压顶的真实供应商项目时，它们还是没法很快拼出那份跨团队的放行资料包。
solution:
- 做一个可追溯的变更审批工作台：围绕一个在运项目，把修订后的 CAD、需求文档、既有审批、测试证据和供应商报价模板吃进来，再起草影响地图、验证矩阵、RFQ 更新和放行资料包。
- 第一天起就保持人在环：输出可编辑、资料级可追溯、按角色审批，并带上适配鉴定与适航流程的审计轨迹。
- 先吃导出文件和少量窄连接器，让公司先证明周期缩短，再考虑更深的 PLM、ERP 或涉密环境部署。
whyWeWin:
- 这个切口正好卡在预算、紧迫性和可量化 ROI 同时出现的瞬间：一次后期修订，马上威胁到鉴定节点或生产排期。
- 叠加层架构比“整套替换”的故事更贴近客户现实，因为供应商早就跑在 PLM、ERP、QA 和文档系统上，项目中途根本换不掉。
- 每次部署都会沉淀专有数据：变更类型、审批评论、验证重跑、采购更新和资料包返工率。宽平台 PLM 套件很少把这类“放行表现数据集”暴露出来。
strategicChoices:
  beachhead: 面向北美 100-800 人规模、服务低产量 UAV 与卫星项目的航电和电力电子供应商，切入他们持续承受客户修订的工程变更审批工作流。
  wedgeRationale: 相比兜售泛化工程 AI，这个入口更快拿到证明：买方已经在某个真实项目里被痛点反复教育，成功也能直接量化成省下多少天、少了多少返工；同时产品还能与现有系统共存，而不必一开始就要求大范围流程重构。
  sequencingRationale: 产品应先从导出资料、影响映射、验证范围界定和资料包生成做起，因为这是赢下第一笔受鉴定约束部署所需的最小能力集。GTM 也要继续由创始人主导，并辅以服务式交付，直到团队证明周期改善能复制、安全姿态到底要做到什么程度，以及模板已经足够可复用。招聘顺序也必须跟着这个节奏走：先工程和实施，后渠道与规模化销售，因为前 18 个月里，部署信任比销售漏斗体量更重要。
  notYet:
  - 自主产品设计或仿真生成
  - 整套替换 PLM 或 ERP
  - 在拿下 3-5 个航空生产 logo 前，就扩到汽车和工业供应商
  - 在没有人工签字前提下，给出全自动审批建议
market:
  tam: $0.6B 估算 TAM：北美约 3,500 家受监管子系统供应商，每家按约 $175k 的放行编排层年度混合 ACV 计算。
  sam: $91.0M 估算滩头 SAM：北美约 650 家服务 UAV 或卫星项目的航电与电力电子供应商，每家约 $140k 年度 ACV。
  som: $6.0M 估算第 3 年 SOM：先拿下一项目试点，再在同一账户内部扩张，做到 40 家客户、每家约 $150k ACV。
  segments:
  - 服务 UAV 与卫星项目的北美航电和电力电子供应商
  - 待放行模板库被证明后，再扩到相邻航空、国防电子，以及更后面的工业子系统供应商
  buyingProcess: 销售动作通常始于这样一个时刻：主机厂驱动的修订开始威胁鉴定测试窗口、试产，或既定交付日期。VP Engineering 或 VP Operations 在通过安全审查后，为单个项目拍板部署；续费则取决于修订到放行的周期，和资料包返工是否真的下降。
product:
  mvp: MVP 是一个围绕单个项目的变更审批工作台：吃进修订后的工程资料，标出受影响的部件和验证项，起草采购与放行文档，并为人工审批保住资料级可追溯性。它应当先跑在导出文件或轻量连接器上，让首个客户在不做平台替换项目的前提下先证明 ROI。
  sixMonth: 在 6 个月内交付一个可用于生产的部署：覆盖影响分析、可编辑验证矩阵、RFQ 资料包起草、审批路由、审计日志，以及至少 1 条接进客户 PLM 或 BOM 工作流的连接器。
  twelveMonth: 到 12 个月时，补上更深的 CAD/PLM 与 QA 集成、首批客户群共享的可复用审批模板、私有模型部署选项，以及对周期、资料包返工和验证重跑的基准报告。
  twentyFourMonth: 到 24 个月时，在既有账户里扩到多项目部署、供应商协同工作流，并在安全要求和模板复用被证明后，进入相邻航空子系统品类。
  keyBets:
  - 导出文件加一条窄连接器，就足以在全系统集成前先证明价值。
  - 只要每条建议都可追溯、可编辑，质量和项目负责人就会接受 AI 生成的草稿。
  - 至少 60% 的放行资料包结构，能在早期滩头客户之间复用。
  - 当上线从定制转成模板驱动后，按项目计价能支撑 70% 毛利率。
gtm:
  wedge: 卖一个单项目部署：把一次后期工程修订，比客户现有“PLM 加电子表格”的流程更快地变成一份可放行资料包，而且不要求供应商替换核心系统。
  channels:
  - 创始人外呼 VP Engineering、VP Operations，以及 UAV/卫星供应商里的制造工程负责人
  - 已经参与变更控制项目的 PLM、CAD 和 ERP 实施伙伴
  - 会影响放行证据如何拼装的航空质量顾问和认证顾问
  funnelTargets: 目标账户 -> 合格发现 25-35%；合格发现 -> 付费试点 25-35%；付费试点 -> 年度生产合同 50%+；生产客户 -> 12 个月内扩到第二个项目 40%+
  pricing: 先收一笔围绕单项目的付费实施与试点费，再转成按活跃项目数和工程变更量计价的年度订阅。可信的起步区间是 $120k-$180k ARR，外加 $30k-$60k 的实施费，因为买方比较的不是按席位卖的效率工具，而是一场鉴定窗口被拖延的成本。
businessModel:
  revenueStreams:
  - 按活跃项目数和工程变更量计价的年度订阅
  - 一次性的实施、连接器配置和历史资料接入费用
  - 面向私有部署、高级基准分析和外部供应商协同的高级模块
  unitOfValue: 在放行工作流里真正跑工程变更的受监管项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家供应商账户里增加更多项目和站点
  - 向靠近国防的客户售卖安全部署与可审计模块
  - 从内部资料包拼装延伸到供应商与实验室协同
  - 待模板复用被证明后，扩到相邻航空和受监管子系统供应商
strategyMap:
  northStarMetric: 通过变更审批工作台管理的生产中活跃项目数
  inputMetrics:
  - 每季度签下的付费试点数
  - 从收到修订到放行资料包就绪的中位天数
  - 无需资料包返工就获批的变更单占比
  - 付费试点转年度合同的转化率
  - 跨部署场景中，资料包字段从模板库复用的占比
  moatsToBuild:
  - 与放行结果绑定的历史变更单与审批评论数据集
  - 面向受监管航空供应商的可复用验证、RFQ 与审批模板
  - 横跨 PLM、QA、采购与证据仓库的集成和权限层
  killCriteria:
  - 前 9 个月签不下 3 家付费共创客户
  - 前 3 个已完成部署后，中位周期改善仍低于 20%
  - 做完 5 个试点后，付费试点转年度生产合同的转化率仍低于 40%
  - 超过一半的合格机会都要求公司在第 1 年无法支持的部署模式
  mermaid: "flowchart LR\n  Wedge[Supplier change-approval wedge] --> MVP[One-program release packet MVP]\n  MVP --> Proof[Shorter revision-to-release cycle]\n  Proof --> Expansion[More programs and adjacent regulated suppliers]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 客户痛点够强，工作流切口也讲得通；但在买方证明自己愿意为这层独立叠加产品按可复制 ACV 掏预算之前，判断上限仍然要收着。
    whyBelieve: 公司盯住的是一个受鉴定约束的瓶颈：只要阻止一次排期滑点，就能立刻创造看得见、算得出的价值。
    whyDoubt: 滩头市场偏窄，现有厂商早就占住了相邻系统位子，而安全与部署要求又可能把产品拖成一个慢吞吞的服务生意。
    nextDiligence: 至少在 2 个真实、已付费的在运项目里证明：产品把放行资料包周期压低了 20%+，并且至少把 1 个试点转成年度经常性预算。
  firstCustomer:
    title: 北美航电供应商里的 VP Engineering
    profile: 一家 150-500 人的供应商，把飞控计算机、电源模块或传感器接口板交给 UAV 或卫星项目；客户驱动修订每周都来，而且眼前就有一场鉴定节点。
    trigger: 后期的接口、外壳或电路板修订，开始威胁测试窗口、试产，或承诺交付日期。
    buyer: VP Engineering
    initialContract: 围绕一个活跃项目，先签 $30k-$60k 的付费实施与试点；如果第一轮变更周期证明资料包就绪速度快了 20%+，且返工下降，再转成 $120k-$180k 的年度经常性合同。
  mustBeTrue:
  - 目标供应商每个月必须遇到足够多、受鉴定约束的工程变更，这样单项目叠加层省下来的钱才会明显高于产品价格。
  - 前 3-5 个客户必须接受导出文件或轻量连接器部署，而不是从第一天就要求完整替换 PLM。
  - 人在环的 AI 草稿，必须把审批信任抬到足以让质量负责人愿意把它放进真实放行资料包里。
  - 至少一半付费试点要能转成年度合同，ARR 大致落在 $120k-$180k。
  - 来自航电供应商的模板和结果数据，必须足够可迁移，能在细分滩头饱和之前扩到相邻受监管子系统。
  diligenceQuestions:
  - 目标供应商画像每个月会打进来多少工程变更？现在从收到修订到资料包可放行的中位数是多少天？
  - 今天最拖时间的环节到底是哪一步——影响分析、验证范围界定、采购更新，还是资料包格式整理？
  - 早期客户里，有多大比例从第一个试点起就要求私有模型或政府云部署？
  - 哪些现有工作流仍然在 PLM 之外，用电子表格和邮件跑？这些土办法到底有多黏？
  - 对 VP Engineering 这样的买方来说，什么级别的证明，才足以把预算从试点挪到年度运营科目？
operatingAssumptions:
- assumption: The target supplier archetype experiences enough recurring engineering-change traffic to justify six-figure annual spend on one-program release orchestration.
  basis: research.yaml
  validationTest: Collect change-log and packet-timestamp data from at least 5 design-partner accounts and confirm frequent revision events plus meaningful cycle-time cost.
  decisionImpact: If false, narrow the segment to larger suppliers with denser change traffic or reduce ACV expectations materially.
- assumption: Lightweight ingestion from exports and one narrow connector can prove ROI before customers demand full PLM, ERP, and QA integration.
  basis: idea.yaml
  validationTest: Deliver the first 2 pilots using exports plus one connector and measure time to first usable packet versus customer willingness to expand.
  decisionImpact: If false, onboarding cost and implementation time rise enough to delay scaled GTM and require more capital.
- assumption: Buyers will trust AI-generated impact and validation drafts if the product stays traceable, editable, and human-approved.
  basis: research.yaml
  validationTest: Track override rates, approver comments, and acceptance of suggested validation matrices across the first 3 pilots.
  decisionImpact: If false, the product should narrow to workflow coordination and document assembly rather than recommendation logic.
- assumption: Most early accounts will accept secure cloud or private-model deployment without requiring a bespoke government environment.
  basis: research.yaml
  validationTest: During 10 qualified sales cycles, document required deployment posture and secure at least 3 buyers willing to pilot on the supported architecture.
  decisionImpact: If false, roadmap and funding must shift toward heavier security infrastructure and a smaller initial account set.
- assumption: Release templates, approval logic, and outcome data from avionics accounts are reusable enough to support expansion into adjacent aerospace suppliers.
  basis: operator judgment
  validationTest: Compare packet structure and approval stages across 3 pilot customers and measure common fields, roles, and evidence types.
  decisionImpact: If false, the company becomes a narrower vertical workflow business with lower venture-scale potential.
experimentRoadmap:
- horizon: 0–90 天
  experiment: Interview 12 VP Engineering, manufacturing engineering, and quality leaders at UAV and satellite suppliers in the target size band.
  hypothesis: Qualification-bound change release is a top-3 operational bottleneck when a prime revision lands close to a test window.
  successMetric: At least 8 of 12 interviews confirm an urgent buying trigger and 5 share baseline cycle-time or packet-rework data.
  owner: CEO founder
- horizon: 0–90 天
  experiment: Run 2 concierge change-packet assessments using historical revisions and manually assembled impact maps before full automation.
  hypothesis: The release-packet wedge produces visible value even before deep integration.
  successMetric: Two prospects receive quantified cycle-time baseline and at least one signs a paid pilot SOW.
  owner: Founding eng
- horizon: 90–180 天
  experiment: Deploy the first paid pilot on one active program using exports plus one PLM or BOM connector.
  hypothesis: A useful packet can be produced in under 6 weeks without a system replacement project.
  successMetric: First pilot generates a release-ready packet within 6 weeks and tracks baseline versus new cycle time.
  owner: Implementation lead
- horizon: 90–180 天
  experiment: Test pilot packaging against the proposed $120k-$180k ARR conversion path with at least 3 qualified buyers.
  hypothesis: Buyers will fund a one-program pilot and accept annual pricing if ROI is framed against schedule risk.
  successMetric: At least 2 paid pilots signed and 1 buyer pre-approves annual pricing subject to KPI hit.
  owner: CEO founder
- horizon: 180–360 天
  experiment: Add traceable validation-matrix recommendations and measure trust versus manual packet assembly.
  hypothesis: Recommendation accuracy and traceability improve conversion and expansion more than document generation alone.
  successMetric: Override rate stays below 30% and at least 2 customers cite recommendation quality in renewal or expansion decisions.
  owner: Product lead
- horizon: 180–540 天
  experiment: Launch one co-sell motion with a PLM integrator or aerospace quality consultancy after the first production reference.
  hypothesis: A partner channel can shorten deployment friction once there is one live proof point.
  successMetric: Partner-sourced opportunities reach at least 20% of qualified pipeline and produce one signed pilot.
  owner: Partnerships lead
operations:
- Standardize onboarding around one active program, baseline revision-to-release metrics, and weekly review of packet accuracy, rework, and cycle time.
- Maintain role-based permissions, private-content handling, and artifact-level audit trails as a core operating requirement rather than a later compliance feature.
- Build repeatable coexistence with PLM, QA, sourcing, and document systems so implementation stays narrow even when customer stacks vary.
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: Owns founder-led sales, design-partner selection, pricing, and partner development while budget ownership is still being proven.
- role: 创始工程师
  startTiming: Month 0
  rationale: Builds artifact ingestion, traceability, workflow engine, and the first packet-generation logic that determines time to value.
- role: 实施负责人
  startTiming: Month 2
  rationale: Encodes customer-specific approval stages, shortens onboarding, and turns early pilots into repeatable deployment playbooks.
- role: 航空航天质量顾问
  startTiming: Month 3
  rationale: Ensures FAI, qualification, and change-control outputs are credible enough for quality and program leaders to trust in production.
- role: 合作伙伴负责人
  startTiming: Month 9
  rationale: Adds channel capacity only after one production reference proves the product can coexist with incumbent PLM and consulting ecosystems.
milestones:
- horizon: 0–12 个月
  items:
  - 在滩头细分里签下 3 家付费共创客户
  - 完成 2 个单项目的真实部署，并拿到部署前后周期对比数据
  - 交付一种让首批靠近国防客户可接受的安全部署姿态
  - 在首批客户群里搭起可复用的资料包模板与审批工作流库
- horizon: 12–24 个月
  items:
  - 至少把 3 个试点转成年度生产合同
  - 至少在 2 家客户里拿下第二个项目或第二个站点扩张
  - 与 PLM 集成商或航空质量顾问建立 2 条可复制的渠道关系
  - 沉淀可复用的周期、返工和验证重跑基准数据
- horizon: 24–36 个月
  items:
  - 做到 25-40 家付费供应商账户；如果模型里的 $6.0M SOM 根本够不着，就主动把公司收窄
  - 从航电扩到至少 1 个相邻、受监管的航空子系统品类
  - 把多项目账户部署和供应商协同工作流做成生产标准能力
  - 证明模板与结果数据，确实能比第 1 年基线带来更高赢单率或更快上线速度
risks:
- risk: 质量与项目负责人可能不信任 AI 生成的影响分析或验证草稿，尤其面对安全关键硬件变更时。
  likelihood: High
  impact: High
  mitigation: 先从人在环草稿、完整资料追溯、可编辑输出和每份资料包的明确审批闸口做起。
- risk: PLM 现有厂商或服务公司，可能把足够多的资料包拼装能力打包进去，削弱独立预算意愿。
  likelihood: Medium
  impact: High
  mitigation: 靠单项目 ROI 落地速度、跨系统编排能力，以及现有厂商难以清楚展示的结果基准来赢。
- risk: 安全与 CUI 要求可能比计划更早逼出私有部署，从而抬高实施成本。
  likelihood: Medium
  impact: High
