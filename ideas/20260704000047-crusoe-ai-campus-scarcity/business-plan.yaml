slug: campus-spec-delivery-os
date: '2026-07-04'
executiveSummary: >-
  The strongest investor-ready version of this company is not a general
  data-center project platform; it is a spec-to-delivery control layer for
  owner-side teams trying to freeze a financeable AI-campus basis-of-design
  before EPC and OEM packages go out. The first customer is a North American
  developer or owner-operator with one 80-150 MW single-tenant phase, an
  anchor-tenant LOI, active bids out to power, cooling, and networking
  vendors, and a 2027 energization target. The MVP should ingest tenant
  cluster assumptions, utility constraints, cooling architecture, network
  topology, and milestone dependencies, then keep one human-approved baseline
  with quantified schedule and capex impact for each material change. GTM,
  pricing, and onboarding should all revolve around the same moment: a density
  revision or financing gate that forces the buyer to re-freeze design faster
  than spreadsheet- and consultant-led coordination can. Research supports real
  pain and credible willingness to pay because buyers are already underwriting
  billion-dollar campuses amid power scarcity, preleasing, liquid-cooling
  complexity, and financing pressure. The deliberate constraint is to remain an
  overlay above Aconex, Procore, Autodesk, Bentley, and vendor tools rather
  than trying to replace BIM, DCIM, or EPC workflows in year one. The business
  is attractive if it can land 3-5 live campuses at roughly $250k-$400k annual
  software value plus implementation and then expand into procurement,
  commissioning, and lender reporting. The main investor reservation is that
  the initial buyer pool is tiny and the research still leaves two crucial
  gaps: how often live programs actually re-freeze design and which function
  truly owns the budget for this category.
problem:
  - >-
    Anchor-tenant capacity is increasingly committed before power, cooling,
    network, and utility assumptions are fully frozen, so one tenant revision
    can trigger rework across EPCs, OEMs, utilities, carriers, and financing
    materials.
  - >-
    Today's workflow is fragmented across spreadsheets, BIM exports, email,
    owner's reps, and document-control systems that preserve records but do not
    keep one live basis-of-design synchronized across disciplines.
  - >-
    Long interconnection timelines, high-density liquid cooling, and lender
    scrutiny make late spec drift economically dangerous because a bad re-freeze
    can delay procurement, financing releases, or energization on a
    hundred-million-dollar campus phase.
solution:
  - >-
    Build a versioned basis-of-design workspace that ingests tenant cluster
    requirements, utility assumptions, cooling selections, network topology,
    and milestone dependencies for one live campus phase.
  - >-
    Quantify the schedule and capex impact of each material change across
    power, cooling, and network domains, while keeping every recommendation
    human-approved, permissioned, and audit-linked.
  - >-
    Export synchronized vendor, utility, and lender packets back into incumbent
    systems so the product lands as an upstream control plane rather than a new
    document silo.
whyWeWin:
  - >-
    The wedge is tied to a specific event when budget, urgency, and measurable
    ROI converge: an anchor-tenant revision or financing milestone that forces
    a rapid design re-freeze.
  - >-
    An overlay architecture fits customer reality better than a rip-and-replace
    pitch because developers, EPCs, and owner's reps already run Aconex,
    Procore, Autodesk, Bentley, and vendor-specific tools they will not swap
    mid-program.
  - >-
    Each deployment compounds proprietary data on spec drift, vendor response
    times, capex and schedule impacts, and packet-approval outcomes that broad
    construction or DCIM suites do not capture in one place.
strategicChoices:
  beachhead: >-
    Owner-side development and delivery teams at North American AI-campus
    developers or owner-operators running a first 50-200 MW single-tenant
    phase with an anchor-tenant LOI, active EPC and OEM package issuance, and
    a 12-18 month design-freeze window.
  wedgeRationale: >-
    One live anchor-tenant phase creates faster proof than broader data-center
    software because the buyer already has named downstream packages and
    financing gates, success can be measured in days to re-freeze plus package
    sync accuracy, and the product can coexist with incumbent systems instead
    of asking for enterprise-wide process change first.
  sequencingRationale: >-
    Start with version control, scenario comparison, and exportable vendor and
    lender packets because that is the minimum unit of value before deeper BIM,
    DCIM, procurement, or commissioning modules matter. Keep sales founder-led
    into delivery leaders, pair it with high-touch implementation, and add
    partner motion only after 2-3 live references prove the product shortens
    design re-freeze and survives security review. Hiring follows the same
    order: engineering, product, and implementation first; channel and scaled
    sales later.
  notYet:
    - Full BIM authoring or digital-twin simulation
    - Multi-tenant colocation or generic data-center project management
    - Automated engineering sign-off of power, cooling, or network designs
    - Brownfield retrofit and sovereign-campus expansion before 3-5 reference campuses
market:
  tam: >-
    $155.0M estimated TAM based on roughly 388 active global AI-campus
    design/procurement campus-years at a modeled $0.4M annual workflow budget
    per campus-year.
  sam: >-
    $11.2M estimated beachhead SAM based on roughly 28 North American
    single-tenant 50-200 MW campus-years in active spec-freeze windows at
    about $0.4M annual software budget.
  som: >-
    $2.0M reachable year-3 SOM based on 5 live campus phases paying about
    $0.4M annually after a high-touch land-and-expand motion.
  segments:
    - North American AI-campus developers and owner-operators running first-wave 50-200 MW single-tenant phases
    - Owner's reps, EPC-led delivery teams, and infrastructure-finance stakeholders attached to those same programs
  buyingProcess: >-
    The sale usually starts when an anchor-tenant LOI, density revision, or
    financing gate forces a fast design freeze before EPC and OEM packages go
    out. The Chief Development Officer or SVP Delivery sponsors a one-campus
    deployment, while owner's-rep and infrastructure-finance teams validate
    that the system can generate auditable vendor and lender packets.
product:
  mvp: >-
    MVP is a one-campus spec-control workspace that ingests tenant cluster
    requirements, utility and cooling assumptions, network topology, and
    milestone dependencies, then maintains one versioned basis-of-design with
    change-impact views and exportable vendor and lender packets. It stays
    human-approved and overlay-first, using imports and lightweight
    integrations instead of replacing BIM or project systems of record.
  sixMonth: >-
    Ship the first production deployment with scenario versioning,
    impacted-artifact graph across power, cooling, and network domains,
    role-based approvals, immutable audit logs, and export paths into at least
    one incumbent record system plus lender packet templates.
  twelveMonth: >-
    Add procurement orchestration, package reissue tracking, partner access
    for EPC and owner's-rep collaborators, and benchmark reporting on re-freeze
    cycle time, package churn, and change-order impact across the first
    customer cohort.
  twentyFourMonth: >-
    Expand to multi-campus portfolio management, commissioning-readiness
    workflows, and lender or insurer reporting modules, then test adjacent
    brownfield or sovereign-campus use cases only after the first 3-5
    reference campuses prove template reuse.
  keyBets:
    - Imported artifacts and one narrow connector are enough to prove value before deep BIM, Aconex, Procore, or Bentley integration.
    - Delivery teams will trust a new system with sensitive tenant and power data if every baseline and change stays human-approved, permissioned, and auditable.
    - Vendor, lender, and owner's-rep packet templates are reusable enough across campuses to keep deployments from turning into custom consulting projects.
    - Expansion inside the same account to later phases or the next campus is easier than finding net-new logos and is required for venture-scale economics.
gtm:
  wedge: >-
    Land as the owner-side system that turns an anchor-tenant revision into a
    re-approved basis-of-design and synchronized vendor and lender packets
    faster than spreadsheet-, BIM-export-, and consultant-led coordination,
    without asking the customer to rip out existing construction systems.
  channels:
    - Founder-led direct sales to Chief Development Officers, SVPs Delivery, and program leaders on live AI-campus phases
    - Owner's-rep, EPC, cooling, and power-advisory partners already involved in package issuance and change-control work
    - Infrastructure-investor and data-center ecosystem networks that see live campus financing and procurement milestones early
  funnelTargets: "Target account -> qualified design partner 20-30%; qualified design partner -> paid pilot 30-40%; paid pilot -> annual production contract 60%+; production customer -> second phase or next-campus expansion within 18 months 50%+"
  pricing: >-
    Annual per-campus subscription priced by megawatts under active design and
    number of synchronized workstreams, plus a one-time implementation fee for
    data-model setup, packet templates, and integrations. A credible starting
    assumption is $250k-$400k ARR plus $100k-$150k implementation for a 50-200
    MW phase, because research models a roughly $0.4M annual workflow budget
    and buyers are protecting million-dollar schedule and financing risk rather
    than buying seats.
businessModel:
  revenueStreams:
    - Annual subscription priced by live campus phase, MW band, and enabled workstreams
    - One-time implementation, integration, and historical package-onboarding fees
    - Premium modules for procurement orchestration, commissioning readiness, and lender reporting
  unitOfValue: One live campus phase under active design, priced by MW band and enabled workstreams
  targetGrossMarginPct: 70
  expansionLevers:
    - Add later phases, additional vendor packages, and more stakeholders within the same campus account
    - Upsell procurement, commissioning, and lender-reporting modules once the basis-of-design workflow is trusted
    - Expand from first-wave single-tenant campuses into brownfield retrofits, sovereign campuses, or infrastructure-fund oversight only after the core wedge is proven
strategyMap:
  northStarMetric: Active campus megawatts governed through a current approved basis-of-design in the platform
  inputMetrics:
    - Paid design partners signed
    - Median days from material tenant change to re-frozen basis-of-design
    - Percentage of impacted vendor and lender packets regenerated within 48 hours of approval
    - Paid pilot to annual contract conversion rate
    - Second-phase or next-campus expansion rate within existing accounts
  moatsToBuild:
    - Historical dataset of tenant-spec changes tied to schedule slip, capex variance, and vendor response outcomes
    - Reusable packet templates and approval paths accepted by vendors, utilities, owner's reps, and lenders
    - Integration and permissions layer that sits above Aconex, Procore, Autodesk, Bentley, and vendor tools without forcing system replacement
  killCriteria:
    - Fewer than 3 paid design partners signed within the first 12 months
    - Median design re-freeze time improves by less than 25% after the first 3 live deployments
    - Fewer than half of paid pilots convert into annual contracts after one full package-issuance cycle
    - More than half of qualified accounts either refuse to share required tenant-spec data or demand a full system replacement before piloting
  mermaid: |
    flowchart LR
      Wedge[Single-tenant AI campus wedge] --> MVP[Versioned basis of design MVP]
      MVP --> Proof[Faster design re-freeze and packet sync]
      Proof --> Expansion[Procurement commissioning and multi-campus expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Compelling pain and a coherent control-point thesis, but conviction stays
      limited until budget ownership and expansion beyond a tiny initial buyer
      pool are proven.
    whyBelieve: >-
      The company targets a billion-dollar delivery bottleneck where preventing
      one bad design re-freeze or financing delay can pay for the software
      quickly.
    whyDoubt: >-
      The beachhead is concentrated, incumbents already own adjacent systems,
      and the research still does not quantify real-world re-freeze frequency
      or the first budget holder.
    nextDiligence: >-
      Secure two paid live-campus design partners and show at least one full
      package-issuance cycle with 25%+ faster design re-freeze and reusable
      lender-ready packets.
  firstCustomer:
    title: Chief Development Officer at a North American AI-campus developer
    profile: >-
      An owner-side team running one 80-150 MW single-tenant phase with an
      anchor-tenant LOI, active EPC and OEM bids, and a 2027 energization
      target.
    trigger: >-
      An anchor-tenant density, redundancy, or timing revision lands before EPC
      or OEM packages and financing close, forcing a rapid design re-freeze.
    buyer: Chief Development Officer or SVP Delivery
    initialContract: >-
      $100k-$150k paid implementation and design-partner deployment on one live
      campus, converting to a $250k-$400k annual campus subscription once the
      platform is used for one full design-freeze cycle and at least one
      package issuance.
  mustBeTrue:
    - There must be enough live North American 50-200 MW single-tenant campus phases to support at least 5 production campus contracts by year 3.
    - Development or delivery executives must fund an owner-side control layer at roughly $250k-$400k ARR without waiting for a broader platform replacement.
    - Imported artifacts and lightweight integrations must be enough to prove value before the buyer demands full Aconex, Procore, Autodesk, or Bentley replacement.
    - The product must cut basis-of-design re-freeze time by at least 25% and reduce package-sync errors on live campuses.
    - Templates and outcome data from the first campuses must transfer into second phases, new campuses, or adjacent AI-infrastructure workflows before the beachhead saturates.
  diligenceQuestions:
    - How many material spec revisions per campus typically force package reissue, capex review, or financing escalation?
    - Which role signs the first budget: Chief Development Officer, SVP Delivery, infrastructure-finance lead, or owner's rep?
    - What minimum security, access-control, and deployment requirements must be met before buyers share tenant topology and power data?
    - Which incumbent systems must be integrated for the first deployment, and can exports really substitute for deep integrations?
    - Have lenders, insurers, or board committees actually required auditable design-change packets on live campuses?
    - How likely are EPCs or incumbent project systems to absorb this workflow before the startup builds a durable data moat?
operatingAssumptions:
  - assumption: Enough live North American 50-200 MW single-tenant phases exist each year to support 3-5 paid design partners during the first 12 months.
    basis: research.yaml
    validationTest: Build a named pipeline of active campus phases, confirm design-freeze windows, and verify at least 10 near-term target accounts fit the beachhead profile.
    decisionImpact: If false, widen the entry segment to brownfield AI retrofits or sovereign-campus programs sooner, or lower the initial growth plan.
  - assumption: Delivery executives will pay roughly $250k-$400k ARR plus implementation from delivery or development budgets for one-campus spec control.
    basis: research.yaml
    validationTest: Price 10 qualified discovery conversations and secure at least 2 design-partner LOIs or paid pilots at the target commercial range.
    decisionImpact: If false, reduce initial ACV expectations, narrow the product to the most valuable packet workflow, or treat the product as a services-assisted tool rather than a software budget line.
  - assumption: Imports and one narrow connector can prove ROI before deep replacement of Aconex, Procore, Autodesk, Bentley, or DCIM systems is required.
    basis: idea.yaml
    validationTest: Deliver the first 2 pilots using exports plus one connector and measure time to first usable packet and conversion willingness.
    decisionImpact: If false, onboarding cost and deployment time rise materially, which delays revenue and requires more capital or a tighter ICP.
  - assumption: Buyers will trust a new vendor with sensitive tenant cluster, utility, and network assumptions if the platform stays human-approved, permissioned, and auditable.
    basis: research.yaml
    validationTest: Pass security review and data-access approval with at least 3 qualified design partners before promising broad rollout.
    decisionImpact: If false, the company must shift toward on-prem or private deployment, slower sales cycles, and a narrower initial account set.
  - assumption: Lenders, owner's reps, and board-level reviewers will accept the platform's packet structure as credible evidence for financing or milestone review.
    basis: operator judgment
    validationTest: Run 3 packet walkthroughs with infrastructure-finance, owner's-rep, or lender-adjacent stakeholders and document whether the exported packet can be used with only minor edits.
    decisionImpact: If false, the roadmap should deprioritize lender workflows and stay focused on internal delivery coordination until external credibility is proven.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Interview 12 Chief Development Officers, delivery VPs, owner's reps, and infrastructure-finance leads on live AI-campus phases.
    hypothesis: Basis-of-design re-freeze and packet sync are top-3 operational bottlenecks once an anchor tenant or financing milestone is in play.
    successMetric: At least 8 of 12 interviews confirm an urgent trigger and 5 share recent change logs, package histories, or rework metrics.
    owner: CEO founder
  - horizon: "0–90 days"
    experiment: Run 2 concierge reconstructions of a recent campus design change using manually assembled impact maps and packet templates before full product automation.
    hypothesis: Quantified change-impact and packet-sync outputs create enough immediate value to win a paid design partner before deep integrations exist.
    successMetric: Two prospects receive quantified before-and-after analyses and at least one signs a paid pilot or LOI.
    owner: Founding product lead
  - horizon: "90–180 days"
    experiment: Deploy the MVP on one live campus using imports plus one system-of-record export path.
    hypothesis: The product can re-freeze a material change 25% faster than the customer's current spreadsheet and consultant workflow without replacing incumbent systems.
    successMetric: First deployment shows 25%+ faster re-freeze or regenerates 80%+ of impacted packets within 48 hours of approval.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Run a lender or owner's-rep walkthrough of the first exported diligence packet.
    hypothesis: External stakeholders will accept the packet structure with minor edits rather than requiring a full manual rewrite.
    successMetric: At least one external stakeholder uses the packet in a live review process with only minor formatting changes.
    owner: Infrastructure finance advisor
  - horizon: "180–360 days"
    experiment: Convert 2-3 design partners into annual campus contracts at the target price range and expand one into a second phase or workstream.
    hypothesis: The budget holder will fund ongoing software once the first design-freeze cycle proves cycle-time and coordination gains.
    successMetric: Two annual contracts closed and one within-account expansion achieved by the end of the first year.
    owner: CEO founder
  - horizon: "180–540 days"
    experiment: Launch one partner-sourced motion with an owner's-rep, EPC, or cooling/power advisor after the first production reference.
    hypothesis: Partners who already influence package issuance can source qualified opportunities once the product has one live proof point.
    successMetric: Partner-sourced leads reach 20% of qualified pipeline and produce one additional paid pilot.
    owner: Partnerships lead
operations:
  - Standardize onboarding around one live campus phase, the last three material design changes, and a weekly review of re-freeze cycle time, packet accuracy, and approval latency.
  - Keep immutable audit trails, role-based permissions, and export-back into the customer's system of record as core operating requirements rather than later enterprise features.
  - Build a reusable library of vendor, lender, and owner's-rep packet templates so implementation effort shrinks with each campus.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Owns founder-led sales, design-partner selection, pricing, and the first ecosystem relationships while the buyer and budget owner are still being proven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the basis-of-design data model, workflow engine, permissions layer, and first integrations that determine time to value.
  - role: Founding product lead
    startTiming: Month 0
    rationale: Encodes campus delivery workflows, packet templates, and user experience so the product solves a live design-freeze event instead of becoming generic project software.
  - role: Implementation lead
    startTiming: Month 2
    rationale: Shortens onboarding, captures customer-specific package logic, and turns the first pilots into repeatable deployment playbooks.
  - role: Infrastructure finance advisor
    startTiming: Month 3
    rationale: Ensures lender, board, and owner's-rep evidence requirements are reflected early enough to defend the financing workflow thesis.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Adds referral capacity only after one production reference proves the product can coexist with incumbent construction and infrastructure ecosystems.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 3 paid design partners on live 50-200 MW campus phases
      - Demonstrate 25%+ faster design re-freeze on the first 2 deployments
      - Ship at least one incumbent export path and a reusable lender-packet template library
      - Convert 2 design partners into annual contracts and win 1 within-account phase or workstream expansion
  - horizon: "12–24 months"
    items:
      - Reach 3-4 production campus phases under contract
      - Add procurement orchestration, package reissue tracking, and partner-facing collaboration workflows
      - Secure 2 repeat referral partners across owner's-rep, EPC, or infrastructure-design ecosystems
      - Publish benchmark reporting on change types, response times, and package-turnaround outcomes across the installed base
  - horizon: "24–36 months"
    items:
      - Reach 5 production campus phases under contract, consistent with the researched year-3 SOM
      - Expand into commissioning-readiness and lender or insurer reporting modules
      - Prove template reuse in one adjacent segment such as brownfield AI retrofits or sovereign-campus programs
risks:
  - risk: The initial buyer pool is small and concentrated in a limited number of first-wave North American AI-campus programs.
    likelihood: High
    impact: High
    mitigation: Prioritize high-ACV live phases, maximize within-account expansion, and only widen into adjacent campus types after the first reference customers prove reuse.
  - risk: Buyers may refuse to share sensitive tenant, power, or network assumptions with a new vendor before procurement is finalized.
    likelihood: Medium
    impact: High
    mitigation: Start with human-approved baselines, strict role-based access, immutable audit trails, and deployment options that pass security review early.
  - risk: Incumbent construction systems or EPC firms may pull the workflow into existing document-control or services stacks once the category becomes visible.
    likelihood: Medium
    impact: High
    mitigation: Integrate above Aconex, Procore, Autodesk, Bentley, and vendor tools while differentiating on cross-domain spec translation and accumulated outcome data.
  - risk: The true budget owner may sit in delivery, development, infrastructure finance, or even the anchor-tenant program office, slowing sales cycles.
    likelihood: Medium
    impact: Medium
    mitigation: Run disciplined discovery on budget ownership, tailor ROI to the triggering milestone, and avoid hiring scaled sales until one buyer pattern repeats.
  - risk: Reference designs and standardization may reduce architecture variance faster than expected, narrowing the technical wedge.
    likelihood: Medium
    impact: Medium
    mitigation: Emphasize approval workflow, scenario management, and packet generation value so the product remains useful even as hardware architectures converge.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund the founding product and security layer, deploy 3-5 live-campus
    design partners, ship the first integration and packet-template library,
    and convert at least 2 campuses into annual contracts with evidence of
    25%+ faster design re-freeze.
