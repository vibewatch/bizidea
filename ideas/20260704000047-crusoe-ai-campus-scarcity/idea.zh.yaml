problem: >-
  AI 园区开发商越来越早就把单一租户的产能卖出去了——常常是在电力、冷却、网络和施工方案都还没定稿之前。锚定租户一旦调整 GPU 密度、冗余等级或部署时间表，团队还得靠电子表格、BIM 导出文件和邮件，去协调电力公司、EPC、冷却供应商、贷款方和网络运营商。结果就是昂贵的返工、互相打架的采购材料包，还有融资风险——而这恰恰发生在一个园区已经砸进去数亿美元的节骨眼上。
targetUser:
  primary: >-
    北美 AI 园区开发商的首席开发官（CDO）、设计交付副总裁，或项目负责人——正在为模型实验室、云厂商或 GPU 云服务商建设第一个 50-200 MW 的单一租户项目
  secondary: >-
    为同一园区协调设计冻结和供应商材料包的业主代表、EPC 团队和基础设施融资团队
  buyer: "首席开发官或交付高级副总裁"
startupThesis:
  nonObviousInsight: >-
    稀缺的资产已经不再只是通电的土地或电力容量，而是一份能拿去融资的基准设计——它得让租户的 GPU 需求、电力公司的承诺、冷却架构和网络方案始终对得上。当 Crusoe 这类运营商走向全栈化，控制点就转移到了软件层：谁能在一次设计变更冲垮整个项目之前，把模型实验室的规格翻译成可执行的园区范围，谁就掌握了话语权。
  beachhead: >-
    北美单一租户 AI 园区开发商——已经签约或即将签约 50-200 MW 的锚定项目，必须在 EPC 和 OEM 采购之前冻结电力、冷却和网络设计
  wedge: >-
    一个规格到交付工作台：把锚定租户的集群需求转化成共享的基准设计，跟踪电力、冷却和网络三大领域的变更影响，自动生成供应商和贷款方都能直接用的采购材料包
  whyNowCatalyst: >-
    Crusoe 的融资谈判和 Abilene 案例都说明，资金和需求正涌入园区规模的 AI 项目，而电力、土地、冷却和网络必须同时对齐——跨专业的规格管控因此成了迫在眉睫的瓶颈。
  ventureScalePath: >-
    先在一个园区里跑通设计冻结和变更管控流程，再扩展到采购编排、试运行准备、贷款方尽调，以及面向更广泛 AI 基础设施市场的多园区交付基准。
solution: >-
  这款产品成了锚定租户的集群规格和所有要据此施工的团队之间的共享操作层。它接入租户需求、电力假设、冷却选型、网络拓扑、EPC 里程碑和采购依赖关系，产出一份经得起审计的基准设计，附带方案对比和冲突预警。团队用它同步发出供应商材料包，量化每一次规格变更对进度和资本支出的影响，让贷款方和租户始终对"到底能不能建"这件事保持一致认知。随着时间推移，公司会积累一套专有数据：哪些设计选择、哪些供应商、哪种排期方式，真正能让 AI 园区保持可融资、按期交付。
goToMarketSeed:
  firstCustomer: >-
    一家北美 AI 园区开发商：手握一份 80-150 MW 部署的锚定租户意向书（LOI），电力、冷却和网络供应商的招标正在进行中，通电目标定在 2027 年
  buyingTrigger: >-
    一份锚定租户意向书、一次 GPU 密度调整，或一个融资里程碑，逼着团队必须在发出 EPC 和 OEM 材料包之前冻结基准设计
  currentAlternative: >-
    靠业主代表、EPC 顾问、BIM 模型、邮件往来和电子表格变更记录手工拼凑的流程
  switchingReason: >-
    这套工作台能砍掉数周的跨专业返工，标出哪些租户变更会打破电力或冷却假设，还能生成一份可复用的证明材料包，同时说服供应商、融资方和锚定租户。
  pricingHypothesis: >-
    按在建设计中的兆瓦（MW）容量收取年度软件费，外加实施费和面向采购、试运行的高级模块
