jobsToBeDone:
  - job: >-
      锚定租户调整集群需求时，帮园区团队同步更新电力、冷却和网络这份基准设计，让他们能发出同步的供应商材料包，而不用付出昂贵的返工代价。
    currentAlternative: "邮件往来、BIM 版本修订，以及顾问主导的协调电话会议"
    successMetric: "重新冻结设计所需的天数，以及无需人工返工就能更新的下游材料包数量"
  - job: >-
      开发商必须向贷款方和锚定租户证明进度与范围时，帮团队生成经得起审计的变更影响证据，让融资和采购能在更少意外中持续推进。
    currentAlternative: "定制化的备忘录写作，以及靠电子表格驱动的进度评审"
    successMetric: "生成一份获批变更材料包所需的时间，以及每个里程碑解决的融资或采购阻塞项数量"
