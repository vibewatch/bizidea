topRisks:
  - name: "初期买家池太小"
    description: "目前只有少数团队在建第一波单一租户 AI 园区，收入很可能集中在一个狭窄的细分市场里。"
    mitigation: "先从高客单价的在建项目切入，等这个品类跑通之后，再把同一套工作流扩展到改造项目、主权园区和贷款方尽调。"
  - name: "工作流信任缺口"
    description: "如果源文件不完整，或工程责任归属不清，开发团队可能会抗拒把设计决策交给软件。"
    mitigation: "先做成一套经得起审计的记录系统，基准由人工审批、变更与证据挂钩，而不是一台自动化的工程签字机器。"
  - name: "现有厂商功能蚕食"
    description: "一旦这个品类被看见，施工软件套件、DCIM 厂商或 EPC 公司都可能把相邻的变更管控功能打包进自己的产品。"
    mitigation: "尽早拿下从租户规格到融资的这条完整工作流，和现有工具做集成，同时不断积累一套针对 AI 园区变更结果的专有数据集。"
