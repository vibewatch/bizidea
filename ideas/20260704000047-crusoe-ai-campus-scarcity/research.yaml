competitors:
- name: Autodesk Construction Cloud
  stage: incumbent
  wedge: Broad construction collaboration, documents, integrations, and project information management.
  pricing: Public overview page shows a broad platform; a separate pricing entry point exists, but no campus-specific list price is disclosed on fetched pages.
  strength: Strong ecosystem reach and a credible home for project information once models and documents already exist.
  weaknessVsUs: It is not purpose-built to translate anchor-tenant GPU and redundancy assumptions into synchronized campus power, cooling, network, and financing artifacts.
  sourceRefs:
  - 38
- name: Procore
  stage: incumbent
  wedge: Construction execution, document management, and cross-team visibility from preconstruction through closeout.
  pricing: Modular enterprise sales motion; fetched pages show product-suite packaging but not a public AI-campus list price.
  strength: Excellent downstream document control and execution visibility across owners, builders, and trades.
  weaknessVsUs: It is strongest after scope is already defined, not at the earlier spec-to-basis-of-design layer where AI-campus assumptions keep moving.
  sourceRefs:
  - 36
  - 37
- name: Bentley ProjectWise
  stage: incumbent
  wedge: Infrastructure-engineering collaboration and document control for complex capital projects.
  pricing: Public list pricing is not surfaced on the fetched product page.
  strength: Credible fit for engineering-heavy infrastructure environments and federated project information.
  weaknessVsUs: It does not appear opinionated about AI-cluster spec changes or their procurement and lender-impact implications.
  sourceRefs:
  - 39
- name: Oracle Aconex
  stage: incumbent
  wedge: Contractual system of record, document processes, and audit trails for large capital projects.
  pricing: Public list pricing is not disclosed on the fetched product and announcement pages.
  strength: Very strong at traceability, auditability, and keeping reviews and test plans tied to a contractual record.
  weaknessVsUs: Aconex governs project records once they exist; it is not the layer that translates fluid tenant-compute assumptions into a cross-domain campus baseline.
  sourceRefs:
  - 34
  - 35
- name: Schneider EcoStruxure IT
  stage: incumbent
  wedge: DCIM, planning/modeling, and vendor-led power/cooling expertise for mission-critical facilities.
  pricing: Fetched pages present a solution-sales motion without a public list price.
  strength: Deep credibility on power, cooling, DCIM, and AI-ready infrastructure design.
  weaknessVsUs: It is a vendor-centered infrastructure layer, not a neutral spec-to-delivery operating system across tenant, EPC, utility, carrier, and financier workflows.
  sourceRefs:
  - 22
  - 23
  - 40
