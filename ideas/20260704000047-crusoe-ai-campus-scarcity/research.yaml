openQuestions:
- How many live North American 50-200 MW single-tenant phases will still buy software from an owner-side control vendor rather than push the workflow into EPC-led custom process?
- 'Which function actually owns the budget for this category: development, delivery, infrastructure finance, or the anchor tenant''s program office?'
- Will buyers share enough sensitive tenant topology, rack-density, and utility data with a neutral vendor before procurement packages are finalized?
- How often do lenders, insurers, or boards require explicit re-underwriting when a campus basis-of-design changes late in preconstruction?
