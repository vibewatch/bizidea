market:
  tam:
    value: $155.0M
    rationale: Modeled as 97 GW of global new capacity from 2025-2030 / 100 MW average campus = 970 campus-equivalents; with a 2-year active design/procurement window that averages 388 active campus-years; at a modeled $0.4M annual workflow budget per campus-year, TAM is about $155M.
    isEstimate: true
    sourceRefs:
    - 6
    - 28
  sam:
    value: $11.2M
    rationale: 'Modeled from more than 35 GW under construction in North America, applying JLL''s 40% owner-occupied mix and then a conservative 20% filter for beachhead-like 50-200 MW single-tenant programs in active spec-freeze windows: roughly 28 campus-equivalents x $0.4M annual budget.'
    isEstimate: true
    sourceRefs:
    - 5
    - 28
  som:
    value: $2.0M
    rationale: A plausible year-3 reachable share is about five live campuses paying roughly $0.4M annually after a high-touch land-and-expand motion with early design partners.
    isEstimate: true
    sourceRefs:
    - 27
    - 28
    - 29
