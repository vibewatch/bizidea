  - case: Reference designs reduce architecture variance faster than expected
    impact: If GB200/GB300-style reference designs standardize early campus decisions, the wedge narrows unless the startup proves value in approval workflows, scenario management, and downstream packet generation.
    sourceRefs:
    - 21
