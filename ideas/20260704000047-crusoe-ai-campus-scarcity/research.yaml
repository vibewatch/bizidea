  sensitivityCases:
  - case: Construction and document incumbents move upstream
    impact: If Aconex, Procore, Autodesk, or Bentley add stronger AI-campus change modeling, the startup will need to defend a narrower wedge around cross-domain spec translation and financing workflows.
    sourceRefs:
