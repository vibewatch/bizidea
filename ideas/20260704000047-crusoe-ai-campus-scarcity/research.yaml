  validationPlan:
  - priority: high
    question: How often do anchor-tenant density, redundancy, or timing revisions force a campus team to re-freeze the basis-of-design?
    evidenceToGather: Change logs, meeting artifacts, and package re-issue histories from 5-10 active campus programs.
  - priority: high
    question: 'Which artifact is most painful today: vendor package sync, utility assumption sync, or lender diligence packet generation?'
    evidenceToGather: Interviews with delivery leaders, owner's reps, EPCs, and infra-finance teams on live AI campus phases.
  - priority: medium
    question: Will buyers trust a new vendor with tenant GPU and power assumptions before procurement is finalized?
    evidenceToGather: Security, access-control, and approval requirements from early design partners.
  - priority: medium
    question: Can the product become a financing primitive rather than just an engineering workflow?
    evidenceToGather: Examples where lenders, insurers, or board committees requested auditable design-change evidence before funding release.
