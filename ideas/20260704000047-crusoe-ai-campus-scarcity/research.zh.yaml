competitors:
- name: Autodesk Construction Cloud
  stage: 现有厂商
  wedge: 覆盖广泛的施工协作、文档、系统集成和项目信息管理。
  pricing: 公开概览页面展示的是一个覆盖面很广的平台；虽然有独立的定价入口，但抓取到的页面没有披露针对园区场景的具体报价。
  strength: 生态覆盖面广，一旦模型和文档已经存在，就是存放项目信息的可靠归宿。
  weaknessVsUs: 它不是专门为把锚定租户的 GPU 和冗余假设，翻译成同步的园区电力、冷却、网络和融资材料而打造的。
  sourceRefs:
  - 38
- name: Procore
  stage: 现有厂商
  wedge: 从施工前到收尾的施工执行、文档管理和跨团队可见性。
  pricing: 模块化的企业销售模式；抓取到的页面展示了产品套件的打包方式，但没有公开的 AI 园区报价。
  strength: 在业主、承建商和各工种之间，下游文档管控和执行可见性做得非常出色。
  weaknessVsUs: 它最强的地方是在范围已经确定之后，而不是在 AI 园区假设仍在变动的、更早的规格到基准设计层。
  sourceRefs:
  - 36
  - 37
- name: Bentley ProjectWise
  stage: 现有厂商
  wedge: 面向复杂资本项目的基础设施工程协作和文档管控。
  pricing: 抓取到的产品页面没有公开报价。
  strength: 非常适合工程密集型的基础设施环境和联合项目信息管理。
  weaknessVsUs: 它似乎对 AI 集群的规格变更，以及这些变更对采购和贷款方的影响，没有明确的态度或方法论。
  sourceRefs:
  - 39
- name: Oracle Aconex
  stage: 现有厂商
  wedge: 面向大型资本项目的合同记录系统、文档流程和审计记录。
  pricing: 抓取到的产品页面和公告页面都没有披露公开报价。
  strength: 在可追溯性、可审计性方面非常强，能把评审和测试计划牢牢绑定在合同记录上。
  weaknessVsUs: Aconex 管的是项目记录已经存在之后的治理；它不是那个把不断变化的租户算力假设，翻译成跨领域园区基准的层。
