  adoptionFrictionMatrix:
  - friction: 现有的资本项目系统和顾问流程已经占据了文档和审批环节
    severity: high
    affectedBuyer: 设计交付副总裁
    mitigation: 叠加在 Aconex、Procore、Autodesk 和 Bentley 之上而不是替换它们；把同步好的材料包导出回它们的记录系统界面。
    sourceRefs:
    - 34
