    severity: high
    affectedBuyer: 首席开发官
    mitigation: 先从人工审批的基准、基于角色的访问权限和不可篡改的审计记录做起，再考虑自动化建议。
    sourceRefs:
    - 34
    - 35
  - friction: 当下的买家池很窄，被数量有限的在建项目主导
    severity: high
    affectedBuyer: CEO/首席开发官
    mitigation: 优先服务已签约租户、且近期就要发材料包的在建园区，再在这些账户内部向后续阶段扩展。
    sourceRefs:
    - 5
    - 27
    - 28
    - 29
  - friction: 电力公司和电力假设的变化速度，快过标准项目模板本来能应付的程度
