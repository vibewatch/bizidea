jobsToBeDone:
  - job: >-
      When an anchor tenant changes cluster requirements, help the campus team update one basis-of-design across power, cooling, and network, so they can issue synchronized vendor packages without expensive rework.
    currentAlternative: Email threads, BIM revisions, and consultant-led coordination calls
    successMetric: Days to re-freeze design and number of downstream packages updated without manual rework
  - job: >-
      When a developer must defend schedule and scope to lenders and the anchor tenant, help the team generate auditable change-impact evidence, so financing and procurement can keep moving with fewer surprises.
    currentAlternative: Custom memo writing and spreadsheet-driven status reviews
    successMetric: Time to produce an approved change package and number of financing or procurement blockers resolved per milestone
