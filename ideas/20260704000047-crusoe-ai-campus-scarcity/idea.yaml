topRisks:
  - name: Small initial buyer pool
    description: Only a limited number of teams are building first-wave single-tenant AI campuses today, so revenue could concentrate in a narrow segment.
    mitigation: Start with high-ACV live programs, then expand the same workflow into retrofits, sovereign campuses, and lender diligence once the category is proven.
  - name: Workflow trust gap
    description: Development teams may resist relying on software for design decisions if source documents are incomplete or engineering ownership is unclear.
    mitigation: Start as an auditable system of record with human-approved baselines and evidence-linked changes, not as an automated engineering sign-off engine.
  - name: Incumbent stack encroachment
    description: Construction suites, DCIM vendors, or EPC firms could bundle adjacent change-control features after the category becomes visible.
    mitigation: Own the tenant-spec-to-financing workflow early, integrate with incumbent tools, and compound a proprietary dataset on AI-campus-specific change outcomes.
