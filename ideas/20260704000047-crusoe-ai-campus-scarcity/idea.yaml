problem: >-
  AI campus developers are increasingly selling single-tenant capacity before the site's power, cooling, network, and construction assumptions are fully frozen. When an anchor tenant changes GPU density, redundancy, or deployment timing, teams still coordinate utilities, EPCs, cooling vendors, lenders, and network carriers through spreadsheets, BIM exports, and email. That creates expensive rework, conflicting procurement packages, and financing risk precisely when hundreds of millions of dollars are being committed to one campus.
targetUser:
  primary: >-
    Chief Development Officer, VP Design and Delivery, or program leader at a North American AI campus developer building a first single-tenant 50-200 MW deployment for a model lab, cloud provider, or GPU cloud
  secondary: >-
    Owner's-rep, EPC, and infrastructure-finance teams coordinating design freeze and vendor packages for the same campus
  buyer: Chief Development Officer or SVP Delivery
startupThesis:
  nonObviousInsight: >-
    The scarce asset is no longer just powered land or megawatts; it is a financeable basis-of-design that keeps tenant GPU requirements, utility commitments, cooling architecture, and network plans in sync. As operators like Crusoe go full-stack, the control point shifts to the software layer that translates model-lab specs into executable campus scope before one design change cascades through the whole project.
  beachhead: >-
    Single-tenant North American AI campus developers with a signed or near-signed 50-200 MW anchor deployment that must freeze power, cooling, and network designs before EPC and OEM procurement
  wedge: >-
    A spec-to-delivery workbench that converts anchor-tenant cluster requirements into a shared basis-of-design, tracks change impacts across power, cooling, and network domains, and auto-generates vendor- and lender-ready procurement packets
  whyNowCatalyst: >-
    Crusoe's fundraising talks and the Abilene example show money and demand rushing into campus-scale AI projects where power, land, cooling, and networking all have to line up at once, making cross-discipline spec control an urgent bottleneck.
  ventureScalePath: >-
    Start with design-freeze and change-control workflows on one campus, then expand into procurement orchestration, commissioning readiness, lender diligence, and multi-campus delivery benchmarks for the wider AI infrastructure market.
solution: >-
  The product becomes the shared operating layer between the anchor tenant's cluster spec and everyone who must build against it. It ingests tenant requirements, utility assumptions, cooling selections, network topology, EPC milestones, and procurement dependencies, then produces one auditable basis-of-design with variant comparisons and conflict alerts. Teams use it to issue synchronized vendor packages, quantify the schedule and capex impact of every spec change, and keep lenders and tenants aligned on what is actually buildable. Over time, the company builds proprietary data on which design choices, vendors, and sequencing patterns keep AI campuses bankable and on schedule.
goToMarketSeed:
  firstCustomer: >-
    A North American AI campus developer with one anchor tenant LOI for an 80-150 MW deployment, active bids out to power, cooling, and networking vendors, and a 2027 energization target
  buyingTrigger: >-
    An anchor tenant LOI, GPU-density revision, or financing milestone that forces the team to freeze the basis-of-design before issuing EPC and OEM packages
  currentAlternative: >-
    Manual workflow across owner's reps, EPC consultants, BIM models, email threads, and spreadsheet change logs
  switchingReason: >-
    The workbench cuts weeks of cross-discipline rework, flags which tenant changes break power or cooling assumptions, and creates one reusable proof package for vendors, financiers, and the anchor tenant.
  pricingHypothesis: >-
    Annual per-campus software fee tied to megawatts under active design, plus implementation and premium modules for procurement and commissioning
