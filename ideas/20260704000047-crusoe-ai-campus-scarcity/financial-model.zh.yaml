slug: "campus-spec-delivery-os"
date: "2026-07-04"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-07"
    unit: YYYY-MM
    source: "[BP date]"
  - id: A2
    name: 种子前轮交割后的期初现金
    value: "3000"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $3-4M] 采用区间下限，因为基准计划在 300 万美元规模下就能为 Q4Y2 里程碑留出 6 个月缓冲。"
  - id: A3
    name: 起始活跃付费园区阶段数（M1）
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months]"
  - id: A4
    name: 园区阶段爬坡
    value: "活跃阶段分别在第 4、7、10、23 和 29 个月启动；第 1 年期末为 3 个，第 2 年期末为 4 个，第 3 年期末为 5 个。"
    unit: timing
    source: "[BP milestones], [BP market.som], [Research market.som]"
  - id: A5
    name: 新共创客户部署的收入结构
    value: "新园区部署的头三个月分别产生 6 万、5 万和 3 万美元收入。"
    unit: USDK by month
    source: "[BP investorMemo.firstCustomer.initialContract], [BP gtm.pricing]"
  - id: A6
    name: 部署完成后的基础经常性园区订阅收入
    value: "月度约 3.1 万美元（约合 37.2 万美元 ARR）。"
    unit: USDK per month
    source: "[BP gtm.pricing] 锚定在一个在建 80-150 MW 阶段 25 万-40 万美元 ARR 区间的偏上半段。"
  - id: A7
    name: 成熟期扩展阶段收入
    value: "月度 3.5 万美元，账户内扩展成功后再加月度 2000 美元附加项，让成熟账户维持在研究测算的约 40 万美元年度工作流预算附近。"
    unit: USDK per month
    source: "[BP businessModel.expansionLevers], [Research market.som], [Research bottomUpSizingDrivers]"
  - id: A8
    name: 稳态毛利率目标
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]"
  - id: A9
    name: COGS（销售成本）爬坡
    value: "第 1 年为收入的 32%，第 2 年 31%，第 3 年 30%。"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 加上实施占比高的上线经验法则。"
  - id: A10
    name: 月度阶段级流失率
    value: "2.0"
    unit: percent
    source: "面向项目制企业基础设施软件的创业财务经验法则；基准模型假设账户内扩展能在第 3 年之前抵消流失。"
  - id: A11
    name: 全成本 CAC
    value: "180"
    unit: USDK per campus phase
    source: "[BP gtm.funnelTargets] 加上创始人主导的企业基础设施销售经验法则。"
  - id: A12
    name: 创始人/高管全成本薪酬
    value: "180"
    unit: USDK per year
    source: "[BP team CEO founder] 加上种子前轮薪酬经验法则。"
  - id: A13
    name: 工程全成本薪酬
    value: "185"
    unit: USDK per FTE per year
    source: "[BP team Founding eng] 加上基础设施工作流工程薪酬经验法则。"
  - id: A14
    name: 产品全成本薪酬
    value: "165"
    unit: USDK per year
    source: "[BP team Founding product lead] 加上企业工作流产品薪酬经验法则。"
  - id: A15
    name: 实施全成本薪酬
    value: "145"
    unit: USDK per FTE per year
    source: "[BP team Implementation lead] 加上解决方案上线薪酬经验法则。"
  - id: A16
    name: 合作伙伴/GTM 全成本薪酬
    value: "150"
    unit: USDK per year
    source: "[BP team Partnerships lead] 加上早期生态销售薪酬经验法则。"
  - id: A17
    name: 基础设施融资顾问及财务运营人力配置
    value: "第 3 年之前作为合同工计入 G&A 支出，而不是按全职员工建模。"
    unit: policy
    source: "[BP team Infrastructure finance advisor] 加上精简种子前轮人力配置经验法则。"
  - id: A18
    name: 创始人之外的招聘顺序
    value: "第 2 个月招实施负责人，第 7 个月招第二名工程师，第 10 个月招合作伙伴负责人，第 14 个月招第三名工程师，第 16 个月招第二名实施人员；在某种买家模式重复出现之前，不招规模化的 AE（客户经理）。"
    unit: timing
    source: "[BP team], [BP strategicChoices.sequencingRationale]"
  - id: A19
    name: 非薪资运营支出爬坡
    value: "第 1 年初期月均约 2.1 万美元，第 2 年全年月均 3.9 万-4 万美元，第 3 年月均 4 万-4.4 万美元，涵盖差旅、云服务、法务、安全和合同工支持。"
    unit: USDK per month
    source: "[BP fundingAsk.useOfFundsSummary], [BP risks], [Research regulatoryLandscape] 加上创业财务经验法则。"
  - id: A20
    name: 现金转换假设
    value: "EBITDA 近似等于现金变动。"
    unit: policy
    source: "创业财务经验法则；模型未纳入债务、资本支出或营运资金科目。"
  - id: A21
    name: 种子前轮目标
    value: "达到 4 个生产园区阶段、1 条重复合作伙伴渠道，并完成首个采购或贷款方模块的追加销售，同时保留 6 个月现金缓冲。"
    unit: milestone
    source: "[BP fundingAsk], [BP milestones 12-24 months]"
