scenarios:
  downside:
    description: "一家共创客户转化的时间晚于计划，第四个活跃阶段推迟到第 3 年，账户扩展来得太晚，抵消不了更重的上线工作量。"
    y3RevenueK: 1581.0
    y3EbitdaK: -753.5
    cashLowPointK: 584.7
    keyAssumptionChanges:
      - "Q4Y2 期末为 3 个活跃阶段（而非 4 个），Q4Y3 期末为 4 个（而非 5 个）。"
      - "基础经常性定价维持在约 34.8 万-39.6 万美元年化区间，而不是走向约 40 万美元以上的成熟阶段路径。"
      - "毛利率收于约 69%，因为上线和安全审查在更长时间内保持较重的工作量。"
  base:
    description: "三家付费共创客户到 Q4Y3 转化为五个活跃园区阶段，同时适度的模块扩展把老账户拉向研究测算的第三年 SOM 路径。"
    y3RevenueK: 2000.0
    y3EbitdaK: -444.4
    cashLowPointK: 1125.1
    keyAssumptionChanges:
      - "前三家付费共创客户分别在第 4、7、10 个月落地，第四个活跃阶段在 Q4Y2 落地，第五个在 Q2Y3 落地。"
      - "新园区遵循 6 万/5 万/3 万美元的部署收入模式，之后趋稳在约 37.2 万美元年化经常性收入附近。"
      - "前四个账户中有三个在约 18 个月内，新增约 2.4 万美元 ARR 的工作流扩展。"
  upside:
    description: "合作伙伴推荐和可复用的材料包模板，把第六个园区拉进 Q4Y3，并让成熟账户在不明显增加人手的情况下更早扩展。"
    y3RevenueK: 2270.0
    y3EbitdaK: -209.9
    cashLowPointK: 1399.6
    keyAssumptionChanges:
      - "第四个园区提前一个季度落地，第六个活跃阶段在 Q4Y3 之前落地。"
      - "随着采购和贷款方模块附加得更快，扩展账户的年化收入攀升至约 43.2 万美元以上。"
      - "由于模板复用和叠加式集成保持轻量，毛利率达到约 72%。"
sensitivity:
  - variable: ARPU
    downsideCase: "每个活跃阶段的成熟期混合年度收入为 36 万美元"
    baseCase: "每个活跃阶段的成熟期混合年度收入为 40.8 万美元"
    upsideCase: "每个活跃阶段的成熟期混合年度收入为 45 万美元"
    y3RevenueImpactK: -240.0
    cashImpactK: -170.0
  - variable: CAC
    downsideCase: "每个园区阶段的全成本 CAC 为 22 万美元"
    baseCase: "每个园区阶段的全成本 CAC 为 18 万美元"
    upsideCase: "每个园区阶段的全成本 CAC 为 15 万美元"
    y3RevenueImpactK: 0.0
    cashImpactK: -200.0
  - variable: churn
    downsideCase: "月度阶段级流失率为 2.8%"
    baseCase: "月度阶段级流失率为 2.0%"
    upsideCase: "月度阶段级流失率为 1.2%"
    y3RevenueImpactK: -110.0
    cashImpactK: -95.0
  - variable: sales cycle
    downsideCase: "试点到生产的转化周期为 9-10 个月"
    baseCase: "试点到生产的转化周期为 6-7 个月"
    upsideCase: "试点到生产的转化周期为 4-5 个月"
    y3RevenueImpactK: -330.0
    cashImpactK: -280.0
  - variable: gross margin
    downsideCase: "毛利率为 66%-69%"
    baseCase: "毛利率为 70%"
    upsideCase: "毛利率为 72%"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: hiring pace
    downsideCase: "在第四个园区上线之前多招一名工程师和一名实施人员"
    baseCase: "Q4Y2 之后维持 8 名全职员工的计划不变"
    upsideCase: "把任何非关键的后台招聘推迟到下一轮融资之后"
    y3RevenueImpactK: 0.0
    cashImpactK: -260.0
modelDiagram:
  title: "单位经济流转"
  mermaid: |
    flowchart LR
      Accounts[Target AI-campus accounts] --> DesignPartners[Paid design partners]
      DesignPartners --> Contracts[Annual campus contracts]
      Contracts --> Expansions[Phase + module expansions]
      Expansions --> Revenue[Subscription + implementation revenue]
      Revenue --> GrossProfit[70% gross profit target]
      GrossProfit --> Cash[Runway]
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景的收入来自三家付费共创客户，到 Q4Y3 转化为五个活跃园区阶段，老账户从约 37.2 万美元经常性收入向研究测算的约 40 万美元年度预算靠拢。"
  - checkName: "必须跑对的地方"
    finding: "公司必须让部署始终保持足够的叠加优先属性，让同一支 8 人团队能撑住第五个园区，而不必再招一名重服务的员工。"
  - checkName: "模型失效条件"
    finding: "如果销售周期拖后一个季度，或买家要求更深的现有系统替换工作，下行情景会把现金推向约 60 万美元的地板，即便完成了本轮融资也是如此。"
  - checkName: "下一轮融资的证明点"
