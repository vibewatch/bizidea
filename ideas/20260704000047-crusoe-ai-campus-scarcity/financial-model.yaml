modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target AI-campus accounts] --> DesignPartners[Paid design partners]
      DesignPartners --> Contracts[Annual campus contracts]
      Contracts --> Expansions[Phase + module expansions]
      Expansions --> Revenue[Subscription + implementation revenue]
      Revenue --> GrossProfit[70% gross profit target]
      GrossProfit --> Cash[Runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from three paid design partners converting into five active campus phases by Q4Y3, with older accounts expanding from roughly $372K recurring toward the researched ~$0.4M annual budget.
- checkName: Must go right
  finding: The company must keep deployments overlay-first enough that the same 8-FTE team can support the fifth campus without adding another services-heavy hire.
- checkName: Model breaks if
  finding: If sales cycles slip by a quarter or buyers demand deeper incumbent-system replacement work, the downside case pushes cash toward the ~$0.6M floor even after the raise.
- checkName: Next-round proof
  finding: The next financing is justified once four production phases, one repeat referral channel, and the first procurement-or-lender upsell are visible before the Q4Y2 milestone.
sanityChecks:
  ruleOf40: Y3 growth 51.3% + EBITDA margin -22.2% = 29.1%.
  burnMultiple: Burn multiple improves from about 1.3x in Y2 to about 0.66x in Y3 as implementation revenue becomes more recurring and hiring stays flat after Q4Y2.
  revenuePerFte: $250.0K Y3 using 8 exit FTE (within the lower half of a rough $200K-$400K enterprise SaaS benchmark range).
  flags:
  - The model still sits below the Rule of 40 in Y3 because implementation work and revenue concentration keep EBITDA margins negative even after reaching the SOM path.
  - Base-case customer counts assume no net logo losses through Y3 because within-account phase expansion offsets project roll-off; if campuses end sooner, revenue will miss plan.
  - Headcount stays flat at 8 FTE from Q4Y2 through Q4Y3, so the model depends on reusable packet templates and lightweight integrations actually shrinking implementation load.
  - Five active phases is a meaningful share of the modeled 28-campus beachhead SAM, so one lost reference account would have outsized impact on the revenue path.
