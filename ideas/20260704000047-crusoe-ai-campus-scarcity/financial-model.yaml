scenarios:
  downside:
    description: One design partner converts later than planned, the fourth active phase slips into Y3, and account expansion arrives too late to offset heavier onboarding work.
    y3RevenueK: 1581.0
    y3EbitdaK: -753.5
    cashLowPointK: 584.7
    keyAssumptionChanges:
    - Q4Y2 exits with 3 active phases instead of 4 and Q4Y3 exits with 4 instead of 5.
    - Base recurring pricing stays closer to roughly $348K-$396K annualized rather than the ~$400K-plus mature phase path.
    - Gross margin exits near 69% because onboarding and security review remain heavier for longer.
  base:
    description: Three paid design partners convert into five active campus phases by Q4Y3 while moderate module expansion lifts older accounts toward the researched year-3 SOM path.
    y3RevenueK: 2000.0
    y3EbitdaK: -444.4
    cashLowPointK: 1125.1
    keyAssumptionChanges:
    - The first three paid design partners land in M4, M7, and M10, a fourth active phase lands in Q4Y2, and a fifth lands in Q2Y3.
    - New campuses follow the 60K/50K/30K deployment pattern before settling near ~$372K recurring annualized revenue.
    - Three of the first four accounts add a roughly $24K ARR workstream expansion within about 18 months.
  upside:
    description: Partner referrals and reusable packet templates pull a sixth campus into Q4Y3 and let mature accounts expand earlier without meaningfully increasing headcount.
    y3RevenueK: 2270.0
    y3EbitdaK: -209.9
    cashLowPointK: 1399.6
    keyAssumptionChanges:
    - A fourth campus lands one quarter earlier and a sixth active phase lands by Q4Y3.
    - Expanded accounts climb toward roughly $432K-plus annualized revenue as procurement and lender modules attach faster.
    - Gross margin reaches about 72% as template reuse and overlay integrations stay light.
