  source: '[BP gtm.pricing] anchored to the upper half of the $250K-$400K ARR range for a live 80-150 MW phase.'
- id: A7
  name: Mature expanded phase revenue
  value: 35K monthly plus a 2K monthly add-on on successful within-account expansions, keeping mature accounts near the researched ~$0.4M annual workflow budget.
