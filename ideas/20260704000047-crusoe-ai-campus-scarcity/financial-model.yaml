  name: Monthly phase-level churn
  value: '2.0'
  unit: percent
  source: Startup-finance heuristic for project-based enterprise infrastructure software; the base model assumes within-account expansion offsets churn through Y3.
- id: A11
  name: Fully loaded CAC
