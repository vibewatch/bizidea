  value: Retained as contractors inside G&A spend rather than modeled as FTE through Y3.
  unit: policy
  source: '[BP team Infrastructure finance advisor] plus lean pre-seed staffing heuristic.'
- id: A18
  name: Hiring sequence beyond founders
  value: M2 implementation lead, M7 second engineer, M10 partnerships lead, M14 third engineer, and M16 second implementation hire; no scaled AE before one buyer pattern repeats.
  unit: timing
  source: '[BP team], [BP strategicChoices.sequencingRationale]'
- id: A19
  name: Non-payroll operating-spend ramp
  value: About 21K per month in early Y1, 39K-40K per month through Y2, and 40K-44K per month in Y3 across travel, cloud, legal, security, and contractor support.
  unit: USDK per month
  source: '[BP fundingAsk.useOfFundsSummary], [BP risks], [Research regulatoryLandscape] plus startup-finance heuristic.'
- id: A20
  name: Cash conversion assumption
  value: EBITDA approximates cash movement.
  unit: policy
  source: Startup-finance heuristic; no debt, capex, or working-capital line is modeled.
- id: A21
  name: Pre-seed round objective
  value: Reach 4 production campus phases, 1 repeat partner channel, and the first procurement-or-lender module upsell with 6 months of cash buffer.
  unit: milestone
  source: '[BP fundingAsk], [BP milestones 12-24 months]'
