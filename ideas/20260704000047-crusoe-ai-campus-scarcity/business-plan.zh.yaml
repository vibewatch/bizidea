slug: "campus-spec-delivery-os"
date: "2026-07-04"
executiveSummary: >-
  这家公司最有投资价值的版本，不是一个通用的数据中心项目平台，而是一层规格到交付的管控系统，帮业主方团队在 EPC 和 OEM 材料包发出之前，冻结一份可融资的 AI 园区基准设计。第一个客户是一家北美开发商或运营商，手上有一个 80-150 MW 的单一租户项目，签了锚定租户意向书，电力、冷却和网络供应商的招标正在进行，通电目标定在 2027 年。MVP 应该接入租户集群假设、电力约束、冷却架构、网络拓扑和里程碑依赖关系，为每一次重大变更维护一份人工审批的基准，并量化其对进度和资本支出的影响。GTM、定价和客户上线都应该围绕同一个时刻展开：一次密度调整或融资节点，逼着买家比靠电子表格和顾问协调更快地重新冻结设计。研究支持这里存在真实的痛点和可信的付费意愿——买家本来就在电力稀缺、提前租赁、液冷复杂性和融资压力之下承销数十亿美元的园区。刻意设下的约束是：第一年只做 Aconex、Procore、Autodesk、Bentley 及各家供应商工具之上的叠加层，而不是去取代 BIM、DCIM 或 EPC 工作流。如果公司能拿下 3-5 个在建园区，年软件价值约 25 万-40 万美元，外加实施费，再扩展到采购、试运行和贷款方报告，这门生意就值得做。投资人最大的顾虑是：初期买家池极小，研究还留了两个关键缺口——在建项目到底多久要重新冻结一次设计，以及这个品类的预算到底归谁管。
problem:
  - >-
    锚定租户的产能越来越早就被锁定，早于电力、冷却、网络和公用事业假设完全冻结之前，所以一次租户变更就可能在 EPC、OEM、电力公司、网络运营商和融资材料上引发连锁返工。
  - >-
    今天的工作流散落在电子表格、BIM 导出文件、邮件、业主代表和文档管控系统里——这些系统能留存记录，却维持不了一份跨专业实时同步的基准设计。
  - >-
    电网接入周期长、高密度液冷复杂、贷款方审查严格，晚期的规格漂移因此代价高昂：一次糟糕的重新冻结就可能拖延一个数亿美元园区阶段的采购、融资放款或通电时间。
solution:
  - >-
    搭建一个带版本管理的基准设计工作台，接入一个在建园区阶段的租户集群需求、电力假设、冷却选型、网络拓扑和里程碑依赖关系。
  - >-
    量化每一次重大变更在电力、冷却和网络三大领域的进度与资本支出影响，同时保证每一条建议都经过人工审批、权限管控并与审计记录关联。
  - >-
    把同步好的供应商、电力公司和贷款方材料包导回现有系统，让产品成为上游的管控层，而不是又一个文档孤岛。
whyWeWin:
  - >-
    这个切口绑定在一个具体的事件上——预算、紧迫感和可衡量的投资回报在这一刻同时出现：一次锚定租户变更或融资里程碑，逼着团队快速重新冻结设计。
  - >-
    叠加层架构比"推倒重来"的打法更贴近客户现实，因为开发商、EPC 和业主代表已经在用 Aconex、Procore、Autodesk、Bentley 和各家供应商工具，不会在项目中途更换。
  - >-
    每一次部署都在加厚一套专有数据——规格漂移、供应商响应时间、资本支出与进度影响、材料包审批结果——这是通用施工或 DCIM 套件捕捉不到的数据。
strategicChoices:
  beachhead: >-
    北美 AI 园区开发商或运营商里的业主侧开发与交付团队，正在推进第一个 50-200 MW 单一租户项目，手握锚定租户意向书、正在发出 EPC 和 OEM 材料包，设计冻结窗口为 12-18 个月。
  wedgeRationale: >-
    比起泛泛的数据中心软件，一个在建的锚定租户项目能更快跑出证明：买家已经有明确的下游材料包和融资节点，成功与否可以用重新冻结的天数和材料包同步的准确率来衡量，而且产品可以和现有系统共存，不必先要求整个企业改造流程。
  sequencingRationale: >-
    先做版本管理、方案对比和可导出的供应商、贷款方材料包，因为这是在深入 BIM、DCIM、采购或试运行模块之前，能证明价值的最小单元。销售保持创始人主导，直接面向交付负责人，配合高触达的实施服务，等 2-3 个在建参考客户证明产品能缩短重新冻结周期、通得过安全审查之后，再加合作伙伴打法。招聘顺序也是一样：先工程、产品和实施，渠道和规模化销售放到后面。
  notYet:
    - "完整的 BIM 建模或数字孪生仿真"
    - "多租户主机托管或通用数据中心项目管理"
    - "对电力、冷却或网络设计做自动化工程签字"
    - "在拿到 3-5 个参考园区之前做存量改造和主权园区扩展"
market:
  tam: >-
    估算 TAM 为 1.55 亿美元，基于全球约 388 个在建 AI 园区设计/采购的园区年，按每园区年 40 万美元的建模年度工作流预算计算。
  sam: >-
    估算滩头 SAM 为 1120 万美元，基于北美约 28 个处于活跃规格冻结窗口的单一租户 50-200 MW 园区年，按约 40 万美元的年度软件预算计算。
  som: >-
    第三年可触达 SOM 估算为 200 万美元，基于高触达的滚动获客打法拿下 5 个在建园区阶段，每个年付约 40 万美元。
  segments:
    - "推进第一波 50-200 MW 单一租户项目的北美 AI 园区开发商与运营商"
    - "挂靠在这些项目上的业主代表、EPC 主导的交付团队和基础设施融资相关方"
  buyingProcess: >-
    销售通常始于一份锚定租户意向书、一次密度调整或一个融资节点，逼着团队在 EPC 和 OEM 材料包发出之前快速冻结设计。首席开发官或交付高级副总裁牵头推动单一园区的部署，业主代表和基础设施融资团队负责验证系统能否生成经得起审计的供应商与贷款方材料包。
product:
  mvp: >-
    MVP 是一个单一园区的规格管控工作台，接入租户集群需求、电力和冷却假设、网络拓扑和里程碑依赖关系，维护一份带版本管理的基准设计，附带变更影响视图和可导出的供应商、贷款方材料包。它坚持人工审批、叠加优先，靠导入和轻量集成，而不是替换 BIM 或项目记录系统。
  sixMonth: >-
    上线首个生产部署，包含方案版本管理、跨电力/冷却/网络域的受影响材料关系图、基于角色的审批、不可篡改的审计日志，以及至少一条通向现有记录系统的导出路径，加上贷款方材料包模板。
  twelveMonth: >-
    加入采购编排、材料包重发跟踪、面向 EPC 和业主代表协作方的伙伴访问权限，并针对首批客户群做重新冻结周期时长、材料包重发率和变更单影响的基准报告。
  twentyFourMonth: >-
    扩展到多园区组合管理、试运行准备工作流，以及贷款方或保险公司报告模块，等前 3-5 个参考园区证明模板可复用之后，再测试相邻的存量改造或主权园区场景。
  keyBets:
    - "导入的资料加一个窄范围连接器，就足以在深度对接 BIM、Aconex、Procore 或 Bentley 之前证明价值。"
    - "只要每一份基准和每一次变更都保持人工审批、权限管控且可审计，交付团队就愿意把敏感的租户和电力数据交给一个新系统。"
    - "供应商、贷款方和业主代表的材料包模板足够跨园区复用，不会让每次部署都沦为定制咨询项目。"
    - "在同一个账户内向后续阶段扩展，比不断开新客户更容易，也是实现风险投资级增长曲线的必要条件。"
gtm:
  wedge: >-
    以业主侧系统的身份切入：把一次锚定租户变更转化为重新审批的基准设计和同步好的供应商、贷款方材料包，比电子表格、BIM 导出和顾问主导的协调更快，同时不要求客户拆掉现有的施工系统。
  channels:
    - "创始人直接销售，对接首席开发官、交付高级副总裁和在建 AI 园区项目负责人"
    - "已经参与材料包发放和变更管控工作的业主代表、EPC、冷却和电力顾问伙伴"
    - "能第一时间看到在建园区融资和采购节点的基础设施投资人和数据中心生态网络"
  funnelTargets: "目标客户 -> 合格的共创客户 20-30%；合格的共创客户 -> 付费试点 30-40%；付费试点 -> 年度生产合同 60%以上；生产客户 -> 18 个月内扩展到第二阶段或下一个园区 50%以上"
  pricing: >-
    按在建设计的兆瓦（MW）容量和同步的工作流数量收取年度按园区订阅费，外加一次性实施费，用于数据模型搭建、材料包模板和系统集成。一个可信的起始假设是：一个 50-200 MW 阶段的 ARR 为 25 万-40 万美元，外加 10 万-15 万美元实施费，因为研究模型显示年度工作流预算约为 40 万美元，而买家买的是保护数百万美元的进度和融资风险，不是按人头买席位。
businessModel:
  revenueStreams:
    - "按在建园区阶段、MW 档位和启用的工作流数收取的年度订阅"
    - "一次性的实施、集成和历史材料包导入费"
    - "面向采购编排、试运行准备和贷款方报告的高级模块"
  unitOfValue: "一个正在设计中的在建园区阶段，按 MW 档位和启用的工作流数定价"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一园区账户内增加后续阶段、更多供应商材料包和更多相关方"
    - "在基准设计工作流获得信任之后，向上销售采购、试运行和贷款方报告模块"
    - "只有在核心切口验证成功之后，才从第一波单一租户园区扩展到存量改造、主权园区或基础设施基金监管"
strategyMap:
  northStarMetric: "平台上由当前已批准基准设计管控的在建园区兆瓦数"
  inputMetrics:
    - "签约的付费共创客户数"
    - "从租户重大变更到重新冻结基准设计的中位天数"
    - "获批 48 小时内重新生成的受影响供应商与贷款方材料包占比"
    - "付费试点转年度合同的转化率"
    - "现有账户内第二阶段或下一个园区的扩展率"
  moatsToBuild:
    - "把租户规格变更与进度延误、资本支出偏差和供应商响应结果绑定的历史数据集"
    - "被供应商、电力公司、业主代表和贷款方接受的可复用材料包模板和审批路径"
    - "叠加在 Aconex、Procore、Autodesk、Bentley 和各供应商工具之上、不强迫替换系统的集成与权限层"
  killCriteria:
    - "前 12 个月内签约的付费共创客户少于 3 家"
    - "前 3 个在建部署完成后，中位设计重新冻结时间改善幅度不到 25%"
    - "完成一整个材料包发放周期后，不到一半的付费试点转化为年度合同"
    - "超过一半的合格客户拒绝分享所需的租户规格数据，或在试点前就要求全面替换系统"
  mermaid: |
    flowchart LR
      Wedge[Single-tenant AI campus wedge] --> MVP[Versioned basis of design MVP]
      MVP --> Proof[Faster design re-freeze and packet sync]
      Proof --> Expansion[Procurement commissioning and multi-campus expansion]
investorMemo:
  verdict:
    call: "观察"
    conviction: >-
      痛点确实存在，控制点的逻辑也站得住，但在买家池太小的问题和预算归属得到验证之前，信心还有限。
    whyBelieve: >-
      公司瞄准的是一个数十亿美元级的交付瓶颈——只要能避免一次糟糕的重新冻结或一次融资延误，软件费用很快就能赚回来。
    whyDoubt: >-
      滩头市场高度集中，现有厂商已经占据相邻系统，而研究依然没有量化真实世界的重新冻结频率，也没找到第一个掏钱的预算负责人。
    nextDiligence: >-
      拿下两家付费的在建园区共创客户，展示至少一整个材料包发放周期，设计重新冻结提速 25% 以上，并产出可复用的贷款方材料包。
  firstCustomer:
    title: "一家北美 AI 园区开发商的首席开发官"
    profile: >-
      一个业主侧团队，正在推进一个 80-150 MW 的单一租户阶段，手握锚定租户意向书、EPC 和 OEM 招标正在进行，通电目标定在 2027 年。
    trigger: >-
      锚定租户的密度、冗余或时间表调整，赶在 EPC 或 OEM 材料包及融资敲定之前落地，逼出一次快速的设计重新冻结。
    buyer: "首席开发官或交付高级副总裁"
    initialContract: >-
      在一个在建园区上签下 10 万-15 万美元的付费实施与共创客户部署，等平台跑完一整个设计冻结周期并至少发出一次材料包后，转为 25 万-40 万美元的年度园区订阅。
  mustBeTrue:
    - "必须有足够多的北美 50-200 MW 单一租户在建园区阶段，才能在第三年支撑至少 5 份在建园区合同。"
    - "开发或交付高管必须愿意为一层业主侧管控软件付约 25 万-40 万美元 ARR，而不是等一个更大范围的平台替换方案。"
    - "导入的资料加轻量集成必须足以证明价值，赶在买家要求全面替换 Aconex、Procore、Autodesk 或 Bentley 之前。"
    - "产品必须把基准设计重新冻结的时间至少缩短 25%，并减少在建园区的材料包同步错误。"
    - "在滩头市场饱和之前，第一批园区的模板和结果数据必须能迁移到第二阶段、新园区或相邻的 AI 基础设施工作流中。"
  diligenceQuestions:
    - "每个园区通常有多少次重大规格变更，会触发材料包重发、资本支出复核或融资升级？"
    - "谁签下第一笔预算：首席开发官、交付高级副总裁、基础设施融资负责人，还是业主代表？"
    - "在买家愿意分享租户拓扑和电力数据之前，必须满足哪些最低安全、访问权限和部署要求？"
    - "首次部署必须集成哪些现有系统，导出功能真的能替代深度集成吗？"
    - "贷款方、保险公司或董事会真的在在建园区上要求过经得起审计的设计变更材料包吗？"
    - "在这家公司建立起牢固的数据护城河之前，EPC 或现有项目系统吸收这套工作流的可能性有多大？"
operatingAssumptions:
  - assumption: "每年有足够多的北美 50-200 MW 单一租户在建阶段，能在头 12 个月支撑 3-5 家付费共创客户。"
    basis: "research.yaml"
    validationTest: "建立一份在建园区阶段的名单，确认设计冻结窗口，验证至少 10 个近期目标客户符合滩头画像。"
    decisionImpact: "如果不成立，就更早把切入细分市场扩大到 AI 存量改造或主权园区项目，或者调低最初的增长计划。"
  - assumption: "交付高管愿意从交付或开发预算里拿出约 25 万-40 万美元 ARR 外加实施费，为单一园区的规格管控付费。"
    basis: "research.yaml"
    validationTest: "对 10 场合格的探讨性对话报价，并在目标商业区间内拿下至少 2 份共创客户意向书或付费试点。"
    decisionImpact: "如果不成立，就下调初始 ACV 预期，把产品收窄到最有价值的材料包工作流，或把产品当成服务辅助工具而不是软件预算项。"
  - assumption: "在深度替换 Aconex、Procore、Autodesk、Bentley 或 DCIM 系统之前，导入加一个窄范围连接器就能证明投资回报。"
    basis: "idea.yaml"
    validationTest: "用导出加一个连接器交付头两个试点，衡量首次可用材料包的产出时间和转化意愿。"
    decisionImpact: "如果不成立，上线成本和部署时间会明显上升，拖慢收入并需要更多资本或更窄的目标客户画像。"
  - assumption: "只要平台保持人工审批、权限管控且可审计，买家就愿意把敏感的租户集群、电力和网络假设交给一个新供应商。"
    basis: "research.yaml"
    validationTest: "在承诺大规模上线之前，先和至少 3 家合格共创客户走完安全审查和数据访问审批。"
    decisionImpact: "如果不成立，公司必须转向本地部署或私有化部署，销售周期变长，最初的目标客户群也会更窄。"
  - assumption: "贷款方、业主代表和董事会级评审人会把平台生成的材料包结构当作融资或里程碑评审的可信证据。"
    basis: "经验判断"
    validationTest: "和基础设施融资、业主代表或贷款方相关方一起做 3 次材料包演示，记录导出的材料包是否只需小幅修改就能使用。"
    decisionImpact: "如果不成立，路线图应该降低贷款方工作流的优先级，专注于内部交付协调，直到外部可信度得到证明。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "访谈 12 位在建 AI 园区阶段的首席开发官、交付副总裁、业主代表和基础设施融资负责人。"
    hypothesis: "一旦锚定租户或融资里程碑出现，基准设计重新冻结和材料包同步就是排名前三的运营瓶颈。"
    successMetric: "至少 8/12 场访谈确认了紧迫的触发点，5 场愿意分享近期的变更记录、材料包历史或返工数据。"
    owner: "CEO 创始人"
  - horizon: "0–90 天"
    experiment: "在完整产品自动化之前，用人工拼接的影响图和材料包模板，重新复原 2 次近期的园区设计变更。"
    hypothesis: "量化后的变更影响和材料包同步结果，足以在深度集成建成之前就赢得一位付费共创客户。"
    successMetric: "两个潜在客户拿到量化的前后对比分析，至少一家签下付费试点或意向书。"
    owner: "创始产品负责人"
  - horizon: "90–180 天"
    experiment: "在一个在建园区上，用导入数据加一条记录系统导出路径部署 MVP。"
    hypothesis: "在不替换现有系统的前提下，产品能比客户当前的电子表格和顾问工作流快 25% 完成一次重大变更的重新冻结。"
    successMetric: "首次部署实现重新冻结提速 25% 以上，或在获批 48 小时内重新生成 80% 以上的受影响材料包。"
    owner: "创始工程负责人"
  - horizon: "90–180 天"
    experiment: "为首份导出的尽调材料包，安排一次贷款方或业主代表的演示评审。"
    hypothesis: "外部相关方会接受这份材料包结构，只需小幅修改，而不需要从头手工重写。"
    successMetric: "至少一位外部相关方在实际评审流程中使用该材料包，只做了少量格式调整。"
    owner: "基础设施融资顾问"
  - horizon: "180–360 天"
    experiment: "把 2-3 家共创客户转化为按目标价格区间签约的年度园区合同，并把其中一家扩展到第二阶段或新工作流。"
    hypothesis: "一旦第一个设计冻结周期证明了周期缩短和协调收益，预算负责人就会持续为软件付费。"
    successMetric: "到第一年年底完成两份年度合同，并实现一次账户内扩展。"
    owner: "CEO 创始人"
  - horizon: "180–540 天"
    experiment: "在首个生产参考客户之后，启动一条由业主代表、EPC 或冷却/电力顾问牵线的合作伙伴打法。"
    hypothesis: "已经影响材料包发放的合作伙伴，一旦产品有了一个在建的证明案例，就能带来合格的商机。"
    successMetric: "伙伴带来的线索占合格销售线索的 20%，并促成一份额外的付费试点。"
    owner: "合作伙伴负责人"
operations:
  - "以一个在建园区阶段、最近三次重大设计变更为基础，把上线流程标准化，每周复核重新冻结周期时长、材料包准确率和审批延迟。"
  - "把不可篡改的审计记录、基于角色的权限管控，以及导回客户记录系统的导出能力，当作核心运营要求，而不是后期才补的企业功能。"
  - "建立一套可复用的供应商、贷款方和业主代表材料包模板库，让每个园区的实施工作量越做越小。"
team:
  - role: "CEO 创始人"
    startTiming: "第 0 个月"
    rationale: "在买家和预算负责人还没定型时，负责创始人主导销售、共创客户筛选、定价和最初的生态关系。"
  - role: "创始工程负责人"
    startTiming: "第 0 个月"
    rationale: "搭建基准设计数据模型、工作流引擎、权限层和最初的系统集成，这些决定了产品见效的速度。"
  - role: "创始产品负责人"
    startTiming: "第 0 个月"
    rationale: "把园区交付工作流、材料包模板和使用体验固化下来，让产品解决的是一次真实的设计冻结事件，而不是变成通用项目软件。"
  - role: "实施负责人"
    startTiming: "第 2 个月"
    rationale: "缩短上线时间，捕捉客户特有的材料包逻辑，把首批试点变成可复制的部署手册。"
  - role: "基础设施融资顾问"
    startTiming: "第 3 个月"
    rationale: "确保贷款方、董事会和业主代表的证据要求足够早地反映在产品里，能撑得住融资工作流这个论点。"
  - role: "合作伙伴负责人"
    startTiming: "第 9 个月"
    rationale: "只有在一个生产参考客户证明产品能和现有的建筑与基础设施生态共存之后，才加入推荐渠道的产能。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "在在建的 50-200 MW 园区阶段上签下 3 家付费共创客户"
      - "在前 2 个部署中证明设计重新冻结提速 25% 以上"
      - "上线至少一条现有系统导出路径和一套可复用的贷款方材料包模板库"
      - "把 2 家共创客户转化为年度合同，并在一个账户内实现阶段或工作流扩展"
  - horizon: "12–24 个月"
    items:
      - "达到 3-4 个在建园区阶段的生产合同"
      - "加入采购编排、材料包重发跟踪和面向伙伴的协作工作流"
      - "在业主代表、EPC 或基础设施设计生态中拿下 2 家重复推荐伙伴"
      - "针对已部署客户群，发布关于变更类型、响应时间和材料包周转结果的基准报告"
  - horizon: "24–36 个月"
    items:
      - "达到 5 个在建园区阶段的生产合同，与研究得出的第三年 SOM 一致"
      - "扩展到试运行准备和贷款方或保险公司报告模块"
      - "在一个相邻细分市场（如 AI 存量改造或主权园区项目）证明模板可复用"
risks:
  - risk: "初期买家池小，集中在数量有限的北美第一波 AI 园区项目里。"
    likelihood: High
    impact: High
    mitigation: "优先服务高客单价的在建阶段，最大化账户内扩展，只有在首批参考客户证明可复用之后，才拓展到相邻的园区类型。"
  - risk: "买家在采购最终敲定之前，可能拒绝向新供应商分享敏感的租户、电力或网络假设。"
    likelihood: Medium
    impact: High
    mitigation: "从人工审批的基准、严格的角色权限、不可篡改的审计记录做起，并尽早提供能通过安全审查的部署选项。"
  - risk: "一旦这个品类被看见，现有的施工系统或 EPC 公司可能把这套工作流拉进它们现有的文档管控或服务体系里。"
    likelihood: Medium
    impact: High
    mitigation: "叠加在 Aconex、Procore、Autodesk、Bentley 和各供应商工具之上，同时在跨领域规格翻译和积累的结果数据上做出差异化。"
  - risk: "真正的预算负责人可能落在交付、开发、基础设施融资，甚至锚定租户的项目办公室里，拖慢销售周期。"
    likelihood: Medium
    impact: Medium
    mitigation: "对预算归属做严谨的探索，把投资回报论证贴合触发这次采购的具体里程碑，在一种买家模式反复出现之前不要招规模化销售。"
  - risk: "参考设计和标准化推进的速度可能超出预期，压缩技术层面的切口空间。"
    likelihood: Medium
    impact: Medium
    mitigation: "强调审批工作流、方案管理和材料包生成的价值，让产品在硬件架构趋同之后依然有用。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    资助创始产品和安全层建设，部署 3-5 家在建园区共创客户，上线首个系统集成和材料包模板库，并把至少 2 个园区转化为年度合同，拿出设计重新冻结提速 25% 以上的证据。
