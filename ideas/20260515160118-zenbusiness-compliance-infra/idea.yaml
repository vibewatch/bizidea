jobsToBeDone:
  - job: When a contractor customer expands into a new state, help a platform operations team activate the required registrations and licenses inside the product, so the customer can start payroll and jobs without compliance delays.
    currentAlternative: Manual checklists plus outsourced filing vendors
    successMetric: Faster time to compliant multi-state activation
  - job: When an SMB's annual reports or trade licenses are coming due, help the platform complete renewals proactively, so it can reduce support escalations and customer churn caused by lapses.
    currentAlternative: Reminder emails and reactive support tickets
    successMetric: Higher on-time renewal rate and lower compliance-related churn
