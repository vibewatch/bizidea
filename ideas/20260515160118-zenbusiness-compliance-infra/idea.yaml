topRisks:
  - name: Channel concentration
    description: If a few large software partners dominate distribution, the company could become overly dependent on long sales cycles and partner roadmap shifts.
    mitigation: Start with mid-market vertical SaaS design partners, prove retention and activation lift, and build reusable APIs that lower integration cost across many platforms.
  - name: Jurisdiction complexity
    description: State and local filing rules for licensed contractors can vary enough to make automation brittle or expensive if coverage expands too quickly.
    mitigation: Launch with a narrow set of contractor trades and the highest-volume states first, then add jurisdictions only after workflow accuracy and unit economics are proven.
  - name: Incumbent bundling
    description: ZenBusiness, legal-service incumbents, or payroll vendors could bundle similar filing workflows and compress the standalone pricing window.
    mitigation: Differentiate around partner-native APIs, event-driven workflow automation, and deep integration into payroll and field-service product experiences rather than generic filing fulfillment.
