jobsToBeDone:
- job: 当某个承包商客户扩到新州时，帮助平台运营团队在产品内完成所需登记和牌照激活，让客户不用因为合规延误就能开始 payroll 和开工。
  currentAlternative: 人工清单加外包申报供应商
  successMetric: 多州合规激活时间更短
- job: 当某个 SMB 的年度报告或工种牌照即将到期时，帮助平台提前完成续期，减少因失效带来的支持升级和客户流失。
  currentAlternative: 提醒邮件和被动处理的支持工单
  successMetric: 按时续期率更高、合规相关流失更低
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两条当日验证来源都指向同一个真实的平台迁移：嵌入式合规基础设施正在成形，不过证据仍偏早期，且由厂商主导。
  painIntensity:
    score: 4
    rationale: 对受监管 SMB 软件平台来说，登记漏做和续期漏做会直接打断 payroll 激活、作业执行和客户留存。
  wedgeClarity:
    score: 5
    rationale: 面向多州承包商合规、适合 agent 调用的良好存续轨道，切口很窄、实现路径很具体，也方便共创客户评估。
  defensibility:
    score: 3
    rationale: 辖区逻辑、工作流数据和合作伙伴集成都能累积，但现有厂商和申报服务商也可能打到同一块表面。
  ventureScale:
    score: 4
    rationale: 滩头市场很具体，但主体生命周期可以继续向更广的 SMB 合规、保险、融资和嵌入式服务基础设施扩张。
topRisks:
- name: 渠道集中
  description: 如果分发被少数大型软件合作伙伴掌控，公司就可能过度依赖漫长销售周期和合作伙伴路线图变化。
  mitigation: 先从中端垂直 SaaS 共创客户切入，证明留存和激活提升，再沉淀可复用 API，把跨平台集成成本压下来。
- name: 辖区复杂度
  description: 持证承包商面对的州和地方申报规则差异很大，如果覆盖扩得太快，自动化很容易变脆或变贵。
  mitigation: 先做少数承包工种和最高频州别，等工作流准确率与单位经济模型跑顺，再逐步加辖区。
- name: 现有厂商捆绑
  description: ZenBusiness、法律服务现有厂商或 payroll 供应商，都可能把类似申报工作流打包进来，压缩独立定价窗口。
  mitigation: 差异化点放在原生适配合作伙伴的 API、事件驱动的工作流自动化，以及深度嵌入 payroll 和现场服务产品体验，而不是通用申报履约。
