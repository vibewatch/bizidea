problem: SMB 软件平台越来越喜欢把自己说成小企业的操作系统，但客户一旦扩到新州，或者要续某个受监管工种的牌照，流程还是会碎成提醒邮件、PDF、外部律师和支持工单。这个缺口对服务持证承包商的 payroll 和现场服务平台尤其痛：登记漏做、牌照过期，轻则 payroll 延迟，重则无法开工，还会带来流失。随着 AI 副驾进入 SMB 产品，用户期待软件能把这些合规任务端到端做完，而不是只会解释。
targetUser:
  primary: 服务美国持证家居服务类 SMB 的 payroll 和现场服务软件平台里的产品负责人、合规运营负责人。
  secondary: 负责让承包商客户在跨州扩张时维持良好存续的 onboarding 和客户成功团队。
  buyer: 嵌入式服务总经理或产品副总裁
startupThesis:
  nonObviousInsight: 下一个赢家不会是又一个 SMB 申报助手，而是一条执行轨道：把企业设立、登记、年度报告和牌照续期，变成 SMB 每天都在用的软件里的 API 调用和对 agent 安全的工作流。
  beachhead: 服务 HVAC、水暖和电气承包商的美国 payroll 与现场服务平台。这些客户正从单州扩到多州，必须持续维护主体状态、雇主登记和承包商牌照。
  wedge: 一条既有 API、又适合 agent 调用的良好存续轨道：盯住扩州和续期事件，按辖区判断该做哪些申报，并在合作伙伴的 onboarding、payroll 和后台流程里直接完成。
  whyNowCatalyst: ZenBusiness 的企业版发布说明，payroll、商业、会计和 AI 原生 SMB 平台现在已经在主动找嵌入式合规基础设施，而不再满足于站外导流。
  ventureScalePath: 先从 payroll 和现场服务平台里的持证承包商合规切入，再扩到更广的 SMB 主体生命周期管理、融资与保险资格校验、年度订阅式合规服务，以及跨平台的小企业良好存续系统记录层。
solution: 产品以合规基础设施层的形式接入 payroll 和现场服务平台，服务对象是持证 SMB。它会跟踪每个客户账户的主体状态、注册代理人覆盖、年度报告截止日、雇主登记，以及州级或工种牌照续期；当企业新增州别、变更持股信息或临近到期时，就触发对应申报流程。平台可以把这些动作放进 onboarding 清单、payroll 设置、扩张流程或 AI 副驾提示里，后端则负责处理辖区规则、材料收集、申报编排和审计留痕。时间一长，这套系统会变成让承包商 SMB 持续保持良好存续的默认交易轨道，而不是把他们赶去另一个法律服务场景。
goToMarketSeed:
  firstCustomer: 拥有 5,000-50,000 个美国 SMB 账户、服务 HVAC、水暖或电气行业，且相当一部分客户跨多州经营的 payroll 或现场服务管理平台。
  buyingTrigger: 客户开始向第二个或第三个州扩张，或者因为牌照过期、年度报告漏交、登记不完整而反复升级支持工单，进而拖慢 payroll 设置或工单激活。
  currentAlternative: 提醒邮件、内部运营团队、外包申报供应商，以及把用户导出平台的通用法律服务转介。
  switchingReason: 这条轨道把合规执行留在产品内，给 AI 副驾真正的执行端点，比只发提醒或做转介更能降流失、减轻支持负担。
  pricingHypothesis: 按平台收费，再叠加按活跃 SMB 主体或已完成申报计费；更广辖区覆盖、审计历史和 agent 工作流权限可以卖更高档位。
