slug: contractor-good-standing-rail
date: '2026-05-15'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP 日期 2026-05-15] 取商业计划日期之后的第一个完整月份。'
- id: A2
  name: 期初现金 / 模型中的 pre-seed
  value: '3200'
  unit: USDK
  source: '[BP fundingAsk $2-4M 与 18 个月跑道] 模型采用 $3.2M 的 pre-seed，覆盖运营计划并额外预留 6 个月缓冲。'
- id: A3
  name: 稳态下每个活跃主体的年收入
  value: '0.60'
  unit: USDK per year
  source: '[Research market/SOM] 第 3 年 SOM 为 9,000 个活跃主体，按每个主体约 $600 年价值计算。'
- id: A4
  name: 第 1 年每个活跃主体的混合年收入
  value: '0.72'
  unit: USDK per year
  source: '[BP pricing 与 firstCustomer initialContract $25k-50k 试点] 按创业公司财务经验法则，把 试点 最低价摊到较小的早期主体基数上。'
- id: A5
  name: 第 2 年每个活跃主体的混合年收入
  value: '0.66'
  unit: USDK per year
  source: '[BP pricing 平台费加 用量] 基准情形下，定价会从 试点 阶段逐步回落到研究支持的稳态 $600 水平。'
- id: A6
  name: 模型中的客户单位
  value: 通过合作伙伴工作流被监控的活跃承包商主体
  unit: definition
  source: '[BP businessModel unitOfValue 与 research SOM] 收入按活跃承包商主体建模，而不是按合作伙伴 logo 数建模。'
- id: A7
  name: 生产级合作伙伴爬坡
  value: M6 达到 1 家，M10 达到 2 家，Q4Y2 达到 4 家，Q4Y3 达到 6 家
  unit: partners
  source: '[BP product sixMonth/twelveMonth/twentyFourMonth 与 research SOM] 对应里程碑节奏，到第 3 年大致落在 6 次上线。'
- id: A8
  name: 活跃主体爬坡
  value: M6 为 100；M12 为 1000；Q1Y2 为 1500；Q2Y2 为 2300；Q3Y2 为 3300；Q4Y2 为 4500；Q1Y3 为 5800；Q2Y3 为 7100；Q3Y3 为 8200；Q4Y3 为 9000
  unit: entities
  source: '[Research SOM 第 3 年约 9,000 个活跃主体] 这条分阶段曲线体现的是共创客户先转正，再逐步铺开。'
- id: A9
  name: 毛利率路径
  value: Y1 为 55%，Y2 为 65%，Y3 为 72%
  unit: percent
  source: '[BP targetGrossMarginPct 70 与 operatingAssumptions] 按创业公司财务经验法则，软件加运营模式前期服务占比重，等工作流标准化后再越过目标值。'
- id: A10
  name: 活跃主体月流失率
  value: '1.0'
  unit: percent
  source: '[创业财务经验法则：通过平台销售、黏性较强的 B2B 工作流基础设施] 这个假设足够保守，不会在证明前就假定完美留存。'
- id: A11
  name: 创始人综合现金薪酬
  value: '141.6'
  unit: USDK per year
  source: '[创业财务经验法则：pre-seed 创始人工资加 payroll burden] 用于薪资汇总。'
- id: A12
  name: 工程岗位综合薪酬
  value: '188.8'
  unit: USDK per year
  source: '[创业财务经验法则：美国 seed 阶段全栈工程师加 payroll burden] 用于薪资汇总。'
- id: A13
  name: 合规 / 运营岗位综合薪酬
  value: '135.7'
  unit: USDK per year
  source: '[创业财务经验法则：合规产品 / 运营岗位加 payroll burden] 用于薪资汇总。'
- id: A14
  name: 解决方案岗位综合薪酬
  value: '171.1'
  unit: USDK per year
  source: '[创业财务经验法则：早期解决方案工程师加 payroll burden] 用于薪资汇总。'
- id: A15
  name: GTM 岗位综合薪酬
  value: '177.0'
  unit: USDK per year
  source: '[创业财务经验法则：早期合作 / 销售岗位加 payroll burden] 用于薪资汇总。'
- id: A16
  name: G&A 岗位综合薪酬
  value: '106.2'
  unit: USDK per year
  source: '[创业财务经验法则：精简财务 / 运营岗位加 payroll burden] 用于薪资汇总。'
- id: A17
  name: 招聘节奏
  value: 起步即配创始人、工程和合规；Q2Y1 增加解决方案；Q3Y1 增加第二名工程；Q4Y1 增加第三名工程、GTM 和 G&A；Y2 增配工程、GTM 和合规；Y3 增配工程、GTM、合规和第二名解决方案岗位
  unit: schedule
  source: '[BP team 与 sequencingRationale] 在 试点→正式上线 动作可复用前，不做规模化销售。'
- id: A18
  name: 不含薪资的 R&D 支出
  value: H1Y1 为 6K/月，Q3Y1 为 8K/月，Q4Y1 为 10K/月；Y2 各季度分别为 36/42/48/54K，Y3 各季度分别为 60/66/72/78K
  unit: USDK
  source: '[创业财务经验法则] 云成本、工具和产品基础设施会随着部署复杂度上升。'
- id: A19
  name: 不含薪资的 GTM 支出
  value: Q1Y1 为 3K/月，Q2Y1 为 4K/月，Q3Y1 为 6K/月，Q4Y1 为 10K/月；Y2 各季度分别为 18/24/30/36K，Y3 各季度分别为 42/48/54/60K
  unit: USDK
  source: '[创业财务经验法则] 在第一批可复用转化出现前，创始人主导销售保持精简。'
- id: A20
  name: 不含薪资的 G&A 支出
  value: Q1Y1 为 6K/月，Q2Y1 为 7K/月，Q3Y1 为 8K/月，Q4Y1 为 10K/月；Y2 各季度分别为 30/33/36/39K，Y3 各季度分别为 42/45/48/51K
  unit: USDK
  source: '[创业财务经验法则] 法务、保险、合规管理和行政成本会随合作伙伴数量缓慢上升。'
- id: A21
  name: 现金转换口径
  value: 期末现金按期初现金加 EBITDA 滚动；在这个阶段，债务、capex 和营运资本波动假设影响不大
  unit: policy
  source: '[创业财务经验法则] 对一个 pre-seed 阶段、年费预付且 capex 很低的软件加运营模型来说，这样的处理可以接受。'
