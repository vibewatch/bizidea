scenarios:
  downside:
    description: 合作伙伴上线大约晚一个季度，且异常场景偏重的运营模式让毛利率始终达不到目标。
    y3RevenueK: 3133.1
    y3EbitdaK: -861.3
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - 由于 试点→正式上线 转化更慢，Q4Y3 的活跃主体只有 6,500，而不是 9,000。
    - 由于人工复核负担高于计划，稳态毛利率只能到 65%。
    - 团队为保跑道而不是在失速时继续招人，因此 GTM 支出维持不变。
  base:
    description: 基准情形下，早期试点会转成 6 次合作伙伴上线，并达到研究支持的第 3 年 9,000 个活跃主体。
    y3RevenueK: 4177.5
    y3EbitdaK: 110.0
    cashLowPointK: 1091.8
    keyAssumptionChanges:
    - 第 6 个月有 1 家生产级合作伙伴上线，第 10 个月达到 2 家，Q4Y2 达到 4 家，Q4Y3 达到 6 家。
    - 随着 试点 最低价回归常态，每个活跃主体的年收入从 Y1 的 $720 逐步降到稳态 $600。
    - 随着启动州工作流和异常处理标准化，毛利率从 55% 提升到 72%。
  upside:
    description: 更快的附着率和更干净的自动化，让公司在保持同样克制招聘计划的前提下跑赢基准情形。
    y3RevenueK: 4804.1
    y3EbitdaK: 705.3
    cashLowPointK: 1180.0
    keyAssumptionChanges:
    - 两个 试点 转正更快，在相同 6 家合作伙伴版图下，把 Q4Y3 活跃主体抬到约 10,200。
    - 随着异常分流更依赖规则引擎，稳态毛利率提高到 75%。
    - 平台费留存更强，使每个主体的混合年收入维持在约 $620，而不是 $600。
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃主体年化价值为 $550。
  baseCase: 每个活跃主体年化价值为 $600。
  upsideCase: 每个活跃主体年化价值为 $620。
  y3RevenueImpactK: -348.1
  cashImpactK: -250.0
- variable: CAC
  downsideCase: 每个活跃主体的 CAC 为 $0.25K，因为合作伙伴销售依然高度定制、缺少可引用案例。
  baseCase: 按模型爬坡，每个活跃主体的 CAC 为 $0.14K。
  upsideCase: 随着合作伙伴转介绍改善，每个活跃主体的 CAC 降到 $0.10K。
  y3RevenueImpactK: -180.0
  cashImpactK: -450.0
- variable: 流失率
  downsideCase: 活跃主体月流失率 1.5%。
  baseCase: 活跃主体月流失率 1.0%。
  upsideCase: 活跃主体月流失率 0.6%。
  y3RevenueImpactK: -420.0
  cashImpactK: -300.0
- variable: 销售周期
  downsideCase: 试点→正式上线 转化再额外晚一个季度。
  baseCase: 生产爬坡按 A7 和 A8 的里程碑节奏推进。
  upsideCase: 有两个 试点 比基准情形快一个季度转正。
  y3RevenueImpactK: -620.0
  cashImpactK: -500.0
- variable: 毛利率
  downsideCase: Y3 毛利率为 65%，因为运营复核依然很重。
  baseCase: Y3 毛利率为 72%。
  upsideCase: 凭借更干净的自动化和供应商杠杆，Y3 毛利率达到 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -294.0
- variable: 招聘节奏
  downsideCase: 在尚未拿到证明前就提前招入 GTM 和工程岗位，burn 上升。
  baseCase: 招聘仍像 A17 一样按里程碑闸门推进。
  upsideCase: 1 个非关键岗位延后到下一轮融资之后再招。
  y3RevenueImpactK: -100.0
  cashImpactK: -350.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Partners[生产级合作伙伴] --> Entities[活跃承包商主体]
      Entities --> ARPU[平台费加 用量 ARPU]
      ARPU --> Revenue[收入]
      Revenue --> COGS[可变申报与履约成本]
      COGS --> GrossProfit[毛利]
      GrossProfit --> Opex[薪资与运营支出]
      Opex --> Cash[期末现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入由 6 次合作伙伴上线驱动，到约 9,000 个活跃承包商主体，对应研究支持的稳态价值约为每主体每年 $600。
- checkName: 必须成立的事
  finding: 前两个付费 试点 必须按 A7 和 A8 的节奏转成 production；否则模型既拿不到收入规模，也拿不到支撑 seed 融资的现金缓冲。
- checkName: 模型失效条件
  finding: 如果事件频率弱于 10-15% 的 必须成立 区间，或毛利率停在 65% 左右，下行情形就会让下一轮融资前的现金几乎见底。
- checkName: 下一轮融资证明
  finding: 只要公司做到 4 家生产级合作伙伴、约 3,300 个活跃主体，并能重复跑通 试点→正式上线 且工作流按时完成，下一轮融资就有依据。
sanityChecks:
  ruleOf40: Y3 增长 157.0% + EBITDA 利润率 2.6% = 159.6%。
  burnMultiple: Y2 burn multiple 为 0.5x = $1057.1K burn / $2100.0K 新增 ARR。
  revenuePerFte: Y3 年末 15 名 FTE 对应的人均收入为 $278500（SaaS 基准为 $200-400K）。
  flags:
  - 模型假设毛利率能从 55% 提升到 72%，但启动州复杂度本身就是已知运营风险；如果异常处理长期靠人工，EBITDA 仍会为负。
  - 按主体计算的 CAC 看起来异常漂亮，因为 1 笔平台销售就能撬动很多承包商账户；如果合作伙伴要求更重的实施支持，真实回收期会比这个简化指标慢。
  - Y1 和 Y2 合计仍会烧掉超过 $2.0M，之后才有像样规模，所以按里程碑闸门来控制招聘不是可选项，而是硬约束。
