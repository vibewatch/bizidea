competitors:
- name: ZenBusiness Enterprise
  stage: scale-up
  wedge: Embedded formation and compliance services for partner platforms with link-off, white-label, and embedded integration models.
  pricing: Retail Worry-Free Compliance is $199 per year and annual report filing is priced separately at $100, while enterprise is sold as an embedded partner motion.
  strength: Strong existing customer base, partner-ready packaging, and broad SMB compliance coverage.
  weaknessVsUs: Broader SMB scope and lighter contractor-specific workflow specialization than a good-standing rail designed around expansion and renewal triggers.
  sourceRefs:
  - 2
  - 4
  - 5
  - 6
- name: Middesk
  stage: scale-up
  wedge: API-native business identity, payroll registration, and compliance monitoring infrastructure.
  pricing: Custom / API-led pricing.
  strength: 400-plus sources, auditability, business verification at scale, and a concrete payroll-platform use case.
  weaknessVsUs: Its clearest value prop is KYB and payroll compliance, not the contractor-license, annual-report, and good-standing lifecycle of licensed trades.
  sourceRefs:
  - 8
  - 10
  - 11
- name: Harbor Compliance
  stage: incumbent
  wedge: Managed multistate entity, license, tax, and registered-agent services supported by compliance software.
  pricing: $199 per state annual reports, $149 per year registered agent, $399 foreign qualification, $500-plus business licensing, and $600 payroll tax registration.
  strength: Deep rules database, nationwide service ops, and real public pricing across multiple compliance tasks.
  weaknessVsUs: Service-heavy offering that is less natively embedded into partner onboarding, payroll, and field-service UX.
  sourceRefs:
  - 13
  - 15
  - 16
  - 17
  - 18
  - 19
  - 20
  - 21
  - 22
- name: Avalara Business Licenses
  stage: incumbent
  wedge: Enterprise license management, managed services, and project support across multijurisdiction licensing.
  pricing: License guidance from $119 and registration from $403 per location, with broader services sold via custom quote.
  strength: Brand trust, broad licensing coverage, and enterprise-grade compliance operations.
  weaknessVsUs: Generic enterprise licensing orientation rather than contractor-specific execution inside payroll and field-service software.
  sourceRefs:
  - 23
  - 24
  - 25
