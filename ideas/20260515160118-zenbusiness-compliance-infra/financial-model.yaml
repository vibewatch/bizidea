  - variable: "hiring pace"
    downsideCase: "GTM and engineering hires are pulled forward before proof, increasing burn."
    baseCase: "Hiring stays milestone-gated as in A17."
    upsideCase: "One non-critical hire slips until after the next financing."
    y3RevenueImpactK: -100.0
    cashImpactK: -350.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Partners[Production partners] --> Entities[Active contractor entities]
      Entities --> ARPU[Platform fee plus usage ARPU]
      ARPU --> Revenue[Revenue]
      Revenue --> COGS[Variable filing and fulfillment cost]
      COGS --> GrossProfit[Gross profit]
      GrossProfit --> Opex[Payroll and operating spend]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by six partner launches ramping to 9,000 active contractor entities at a research-backed steady-state value of about $600 per entity per year."
  - checkName: Must go right
    finding: "The first two paid pilots must convert into production on the timetable in A7 and A8 or the model loses both revenue scale and the cash buffer that justifies the seed raise."
  - checkName: Model breaks if
    finding: "If event frequency is weaker than the 10-15% must-be-true band or gross margin stalls near 65%, the downside case drives cash close to zero before the next round."
  - checkName: Next-round proof
    finding: "The next financing is justified once the company shows four production partners, roughly 3,300 active entities, and repeatable pilot-to-production conversion with on-time workflow completion."
sanityChecks:
  ruleOf40: "Y3 growth 157.0% + EBITDA margin 2.6% = 159.6%."
  burnMultiple: "Y2 burn multiple 0.5x = $1057.1K burn / $2100.0K net new ARR."
  revenuePerFte: "$278500 Y3 on 15 end-of-year FTE (benchmark $200-400K SaaS)."
  flags:
    - "The model assumes gross margin can improve from 55% to 72% even though launch-state complexity is a known operational risk; if exception handling stays manual, EBITDA stays negative."
    - "Entity-level CAC looks unusually strong because one platform sale can unlock many contractor accounts; if partners demand heavier implementation support, true payback will be slower than the simple unit metric shows."
    - "Y1 and Y2 still burn more than $2.0M combined before meaningful scale, so disciplined milestone-gated hiring is essential and not optional in this plan."
