slug: contractor-good-standing-rail
date: "2026-05-15"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-06"
    unit: month
    source: "[BP date 2026-05-15] first full month after the plan date."
  - id: A2
    name: "Opening cash / modeled pre-seed"
    value: "3200"
    unit: USDK
    source: "[BP fundingAsk $2-4M and 18-month runway] model uses a $3.2M pre-seed to cover the operating plan plus a 6-month buffer."
  - id: A3
    name: "Steady-state annual revenue per active entity"
    value: "0.60"
    unit: USDK per year
    source: "[Research market/SOM] year-3 SOM is 9,000 active entities at roughly $600 annual value each."
  - id: A4
    name: "Year 1 blended annual revenue per active entity"
    value: "0.72"
    unit: USDK per year
    source: "[BP pricing and firstCustomer initialContract $25k-50k pilot] startup-finance heuristic spreads pilot minimums across a small early entity base."
  - id: A5
    name: "Year 2 blended annual revenue per active entity"
    value: "0.66"
    unit: USDK per year
    source: "[BP pricing platform fee plus usage] base case steps down from pilot pricing toward the research-backed steady-state $600 level."
  - id: A6
    name: "Customer unit in the model"
    value: "active contractor entity monitored through partner workflows"
    unit: definition
    source: "[BP businessModel unitOfValue and research SOM] revenue is modeled on active contractor entities rather than partner logos."
  - id: A7
    name: "Production partner ramp"
    value: "1 by M6, 2 by M10, 4 by Q4Y2, 6 by Q4Y3"
    unit: partners
    source: "[BP product sixMonth/twelveMonth/twentyFourMonth and research SOM] matches the milestone sequence into roughly 6 launches by year 3."
  - id: A8
    name: "Active entity ramp"
    value: "M6 100; M12 1000; Q1Y2 1500; Q2Y2 2300; Q3Y2 3300; Q4Y2 4500; Q1Y3 5800; Q2Y3 7100; Q3Y3 8200; Q4Y3 9000"
    unit: entities
    source: "[Research SOM ~9,000 active entities in year 3] phased ramp reflects design-partner conversion before broader rollout."
  - id: A9
    name: "Gross margin path"
    value: "55% Y1, 65% Y2, 72% Y3"
    unit: percent
    source: "[BP targetGrossMarginPct 70 and operatingAssumptions] startup-finance heuristic assumes software-plus-ops is services-heavy first, then clears the target once workflows standardize."
  - id: A10
    name: "Monthly churn on active entities"
    value: "1.0"
    unit: percent
    source: "[Startup finance heuristic: sticky B2B workflow infrastructure sold through platforms] conservative enough to avoid assuming perfect retention before proof."
  - id: A11
    name: "Loaded founder cash compensation"
    value: "141.6"
    unit: USDK per year
    source: "[Startup finance heuristic: pre-seed founder salary plus payroll burden] used in salary roll-up."
  - id: A12
    name: "Loaded engineering compensation"
    value: "188.8"
    unit: USDK per year
    source: "[Startup finance heuristic: U.S. seed-stage full-stack engineer plus payroll burden] used in salary roll-up."
  - id: A13
    name: "Loaded compliance / ops compensation"
    value: "135.7"
    unit: USDK per year
    source: "[Startup finance heuristic: compliance product / operator hire plus payroll burden] used in salary roll-up."
  - id: A14
    name: "Loaded solutions compensation"
    value: "171.1"
    unit: USDK per year
    source: "[Startup finance heuristic: early solutions engineer plus payroll burden] used in salary roll-up."
  - id: A15
    name: "Loaded GTM compensation"
    value: "177.0"
    unit: USDK per year
    source: "[Startup finance heuristic: early partnerships / sales hire plus payroll burden] used in salary roll-up."
  - id: A16
    name: "Loaded G&A compensation"
    value: "106.2"
    unit: USDK per year
    source: "[Startup finance heuristic: lean finance / operations hire plus payroll burden] used in salary roll-up."
  - id: A17
    name: "Hiring sequence"
    value: "Founder, eng, and compliance at start; solutions in Q2Y1; second eng in Q3Y1; third eng plus GTM and G&A in Q4Y1; eng, GTM, and compliance adds in Y2; eng, GTM, compliance, and second solutions hire in Y3"
    unit: schedule
    source: "[BP team and sequencingRationale] no scaled sales before repeatable pilot-to-production motion."
  - id: A18
    name: "Non-payroll R&D spend"
    value: "6K/month in H1Y1, 8K/month in Q3Y1, 10K/month in Q4Y1, then 36/42/48/54K per quarter in Y2 and 60/66/72/78K per quarter in Y3"
    unit: USDK
    source: "[Startup finance heuristic] cloud, tooling, and product infrastructure scale with deployment complexity."
  - id: A19
    name: "Non-payroll GTM spend"
    value: "3K/month in Q1Y1, 4K/month in Q2Y1, 6K/month in Q3Y1, 10K/month in Q4Y1, then 18/24/30/36K per quarter in Y2 and 42/48/54/60K per quarter in Y3"
    unit: USDK
    source: "[Startup finance heuristic] founder-led selling stays lean until the first repeatable conversions exist."
  - id: A20
    name: "Non-payroll G&A spend"
    value: "6K/month in Q1Y1, 7K/month in Q2Y1, 8K/month in Q3Y1, 10K/month in Q4Y1, then 30/33/36/39K per quarter in Y2 and 42/45/48/51K per quarter in Y3"
    unit: USDK
    source: "[Startup finance heuristic] legal, insurance, compliance overhead, and admin rise gradually with partner count."
  - id: A21
    name: "Cash conversion convention"
    value: "Ending cash rolls as opening cash plus EBITDA; debt, capex, and working-capital swings are assumed immaterial at this stage"
    unit: policy
    source: "[Startup finance heuristic] acceptable for a pre-seed software-plus-ops model with prepaid annual contracts and low capex."
