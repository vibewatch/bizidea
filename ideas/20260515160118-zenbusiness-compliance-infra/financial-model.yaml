  - variable: "sales cycle"
    downsideCase: "Pilot-to-production conversion slips by one extra quarter."
    baseCase: "Production ramp follows the milestone schedule in A7 and A8."
    upsideCase: "Two pilots convert one quarter faster than base."
    y3RevenueImpactK: -620.0
    cashImpactK: -500.0
  - variable: "gross margin"
    downsideCase: "65% Y3 gross margin because operator review remains heavy."
    baseCase: "72% Y3 gross margin."
