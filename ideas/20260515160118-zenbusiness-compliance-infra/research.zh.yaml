competitors:
- name: ZenBusiness Enterprise
  stage: scale-up
  wedge: 面向合作伙伴平台的嵌入式企业设立与合规服务，支持 link-off、white-label 和嵌入式集成。
  pricing: 零售版 Worry-Free Compliance 每年 $199，年度报告另行收费；企业版以嵌入式合作伙伴模式销售。
  strength: 存量客户基础强、面向合作伙伴的包装成熟，而且覆盖面广。
  weaknessVsUs: 覆盖面更宽，且围绕承包商扩张与续期触发的工作流专业化不如我们的良好存续轨道。
  sourceRefs:
  - 2
  - 4
  - 5
  - 6
- name: Middesk
  stage: scale-up
  wedge: API 原生的企业身份、payroll 登记和合规监控基础设施。
  pricing: 定制定价 / API 模式。
  strength: 拥有 400+ 数据源、可审计性、规模化企业验证能力，以及清晰的 payroll 平台使用场景。
  weaknessVsUs: 最清晰的价值仍是 KYB 和 payroll 合规，而不是持证工种里的承包商牌照、年度报告和良好存续生命周期。
  sourceRefs:
  - 8
  - 10
  - 11
- name: Harbor Compliance
  stage: incumbent
  wedge: 由合规软件支撑的多州主体、牌照、税务和注册代理人托管服务。
  pricing: 年度报告每州 $199，注册代理人每年 $149，外州资格备案 为 $399，营业执照 $500+，payroll 税务登记 $600。
  strength: 规则数据库深、全国服务运营成熟，而且多个合规任务都有真实公开定价。
  weaknessVsUs: 服务比重很高，不像我们这样原生嵌在合作伙伴 onboarding、payroll 和现场服务 UX 里。
  sourceRefs:
  - 13
  - 15
  - 16
  - 17
  - 18
  - 19
  - 20
  - 21
  - 22
- name: Avalara Business Licenses
  stage: incumbent
  wedge: 覆盖多辖区许可的企业级许可管理、托管服务和项目支持。
  pricing: 许可指引 $119 起，按地点登记 $403 起，更广服务按定制报价。
  strength: 品牌信任强、许可覆盖广，也具备企业级合规运营能力。
  weaknessVsUs: 更像通用企业许可管理，而不是被 payroll 或作业激活触发的承包商专属执行流。
  sourceRefs:
  - 23
  - 24
  - 25
