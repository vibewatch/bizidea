openQuestions:
- 目标合作伙伴平台里的 HVAC、水暖和电气 SMB 账户中，到底有多少比例会跨州经营，或遇到足够复杂的续期痛点，以致值得单独上一条轨道？
- 前 10 个启动州里，哪些申报可以完全自动化，哪些仍需要人工复核或湿签材料收集？
- 第一批买方更偏好纯 API、嵌入式 UI，还是上线初期带托底服务的方案？
- 滩头细分市场里，合作伙伴侧支持成本究竟有多少是被 payroll 激活延迟、牌照过期或年度报告漏做拉出来的？
