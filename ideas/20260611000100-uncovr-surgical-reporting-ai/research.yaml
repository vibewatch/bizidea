  adoptionFrictionMatrix:
    - friction: Video capture and metadata quality vary by center and vendor.
      severity: high
      affectedBuyer: Director of endoscopy operations
      mitigation: Start with rooms already capturing reliable video and require a pre-implementation capture audit before rollout.
