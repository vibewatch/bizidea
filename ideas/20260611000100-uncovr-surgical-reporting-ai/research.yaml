    - case: Payers treat AI-generated evidence as advisory unless surgeon-signed
      impact: Human review stays mandatory, so workflow design and timestamped traceability matter more than raw model autonomy.
      sourceRefs:
        - 4
        - 6
        - 7
  validationPlan:
    - priority: high
      question: Can the system reduce median time from procedure end to signed note by at least 70% in real GI ASC workflow?
      evidenceToGather: Pre/post pilot timestamps for note completion, surgeon edits per case, and coder handoff time across one 30-60 room platform.
    - priority: high
      question: Does timestamped video evidence reduce coding queries, amendments, or appeal-prep time compared with template notes alone?
      evidenceToGather: Side-by-side review of challenged cases, coder query counts, and appeal-prep minutes before and after rollout.
    - priority: medium
      question: Which reporting stack combinations are easiest to integrate without forcing rip-and-replace?
      evidenceToGather: Technical scoping with Provation-, EndoSoft-, and Epic-adjacent environments plus sample write-back requirements.
    - priority: medium
      question: What minimum video and metadata quality threshold is required for acceptable draft accuracy?
      evidenceToGather: Capture-rate audit by room and vendor, plus accuracy/error analysis by procedure type and site.
