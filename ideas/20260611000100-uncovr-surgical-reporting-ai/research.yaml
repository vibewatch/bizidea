  - name: EndoSoft
    stage: incumbent
    wedge: Endoscopy EHR and procedure documentation platform with workflow, reporting, and image/video capture.
    pricing: custom enterprise quote; no public list pricing on fetched pages
    strength: Deep endoscopy workflow coverage and existing image capture footprint.
    weaknessVsUs: Existing product surface is documentation software plus capture rather than automated claim-proof synthesis from video.
    sourceRefs:
