competitors:
  - name: Uncovr
    stage: seed
    wedge: AI analyzes surgical or endoscopic video to capture billable events and draft operative notes.
    pricing: custom enterprise quote; no public list pricing on fetched pages
    strength: Direct video-to-documentation and reimbursement framing matches the proposed wedge most closely.
    weaknessVsUs: Current positioning is broad surgical-system-of-record, which leaves room for a GI-first, ASC-specific workflow and distribution focus.
    sourceRefs:
      - 1
      - 2
      - 3
  - name: Provation Apex GI
    stage: incumbent
    wedge: Cloud GI documentation platform for physician and nursing procedure notes, images, and coding workflows.
    pricing: custom enterprise quote; demo-led sales
    strength: Installed GI footprint and credibility with large multi-site operators.
    weaknessVsUs: Starts from structured manual documentation workflow rather than automated video-linked evidence capture.
    sourceRefs:
