      - 24
      - 25
  - name: Ambience Healthcare
    stage: scale-up
    wedge: Ambient AI for documentation and coding across 200+ specialties.
    pricing: custom enterprise quote; no public list pricing on fetched pages
    strength: Strong clinician-facing documentation and coding narrative with broad specialty adoption.
    weaknessVsUs: Speech- and chart-first approach is less naturally defensible for endoscopy claims than video-native evidence.
