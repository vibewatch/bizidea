regulatoryTechnicalConstraints:
  - point: Operative documentation remains a regulated clinical record that must be written immediately after surgery and signed by the surgeon, so AI output has to fit a human-reviewed workflow.
    sourceRefs:
      - 4
  - point: Colonoscopy and EGD reporting must meet explicit quality benchmarks including cecal landmark photo proof, bowel prep documentation, and EGD photodocumentation.
    sourceRefs:
      - 10
      - 11
      - 38
  - point: ASC quality data are collected and publicly reported through CMS programs, which raises expectations for auditable data quality.
    sourceRefs:
      - 18
  - point: Covered entities must perform ongoing risk analysis across all systems that store or access ePHI, not just the EHR, which directly affects medical-video architectures.
    sourceRefs:
      - 32
      - 33
validationSignals:
  - point: Uncovr's funding round and stated deployment pipeline show investors and providers now view video-to-note workflow as commercially credible.
    sourceRefs:
      - 1
      - 3
  - point: United Digestive's standardization on Provation Apex confirms that large GI operators already buy platform-wide documentation modernization.
    sourceRefs:
      - 23
      - 24
  - point: University of Miami's live AI surgical agent cut median signed-note time from about 26 minutes to under two minutes, proving the time-savings claim is technically plausible.
    sourceRefs:
      - 31
openQuestions:
  - What percentage of target GI ASC rooms already retain full-fidelity procedure video plus metadata that is reliable enough for production-grade note generation?
  - How much incremental payer-defense value does timestamped clip linkage add versus better text-only documentation inside current reporting systems?
  - Which incumbent stacks dominate the 30-60 room GI platform segment, and which write-back or evidence-attachment points are actually available in production?
  - What edit-rate threshold per case will surgeons tolerate before the workflow feels like extra work instead of same-day relief?
