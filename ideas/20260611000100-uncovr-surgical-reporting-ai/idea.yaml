problem: >-
  In high-volume GI and ambulatory surgery settings, surgeons still finish documentation from memory after the procedure,
  while centralized coders reconstruct what happened from sparse notes and whatever clips they can pull later. That delay
  creates note amendments, coding disputes, and payer exposure on the very cases that should be standardized and billed
  quickly. The pain is not missing data alone; it is that the best evidence of what happened already exists on video but is
  not turned into a claim-ready record in time.
targetUser:
  primary: VP Revenue Cycle or Director of Endoscopy Operations at a multi-site U.S. GI and ambulatory surgery platform
  secondary: Central coding manager responsible for CPT accuracy and audit defense across procedure sites
  buyer: CFO or VP Revenue Cycle of a PE-backed ASC platform
startupThesis:
  nonObviousInsight: >-
    The first breakout surgical-AI company will not win by jumping straight to intraoperative decision support. It will
    win by converting procedure video into reimbursement-grade documentation in the most repetitive, video-native
    specialties, because that is where hospitals already have the raw evidence, the edit burden is measurable, and the ROI
    shows up in cash collections and coder productivity.
  beachhead: >-
    PE-backed U.S. GI and endoscopy ASC operators with 20-100 procedure rooms, centralized coding teams, and recurring
    documentation amendment or downcoding pressure across colonoscopy and upper endoscopy workflows
  wedge: >-
    A video-native documentation engine that turns endoscopy footage plus room metadata into a surgeon-reviewed procedure
    note and CPT evidence packet before the patient leaves recovery
  whyNowCatalyst: >-
    Same-day reports of live deployments, real-time video-to-note generation, and a 400-room pipeline show that surgical
    video has crossed from archive media into structured workflow input, making reimbursement automation newly credible.
  ventureScalePath: >-
    Start with endoscopy note generation and coding defense, then expand into additional ASC specialties, inpatient OR
    documentation, quality reporting, implant and device traceability, training analytics, and eventually the longitudinal
    data layer for surgical operations and decision support.
solution: >-
  The product ingests procedure video, scope metadata, room timestamps, and existing documentation templates to produce a
  draft note immediately after the case instead of hours later. It highlights detected procedural steps, likely CPT support
  points, and any missing evidence so the surgeon and coder review one structured draft rather than starting from scratch.
  Every generated statement links back to a timestamped clip or event marker, creating an audit trail that can be used for
  internal QA, coder handoff, and payer defense. The first release stays narrowly focused on endoscopy because the video is
  already available, the workflows are repetitive, and same-day documentation quality directly affects throughput and
  reimbursement.
goToMarketSeed:
  firstCustomer: >-
    A PE-backed GI platform with 30-60 endoscopy rooms across multiple states, centralized RCM, and weekly coder backlog
    tied to same-day colonoscopy and upper-endoscopy documentation
  buyingTrigger: >-
    A spike in documentation amendments, payer downcoding, coder vacancy pressure, or post-acquisition standardization
    across newly combined procedure centers creates budget and urgency
  currentAlternative: >-
    Surgeon dictation and template-based notes in Epic or Provation, followed by manual coder review and ad hoc video
    lookup when claims are challenged
  switchingReason: >-
    This wedge turns the primary evidence source that already exists in the room into a prefilled note with traceable code
    support, reducing addenda and audit friction without forcing the operator to rip out its EHR or endoscopy reporting
    stack
  pricingHypothesis: >-
    Annual software contract priced by active procedure room, with a usage component per finalized case and premium tiers
    for audit-defense workflows
