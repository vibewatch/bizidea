topRisks:
  - name: Surgeon review friction
    description: If clinicians must heavily edit the draft, the product will feel like extra admin rather than same-day acceleration.
    mitigation: Start with repetitive endoscopy workflows, measure edit-rate by template and physician, and deliver the draft inside the existing sign-off queue.
  - name: Video integration gaps
    description: Some centers may have inconsistent video capture, missing metadata, or fragmented reporting systems that weaken output quality.
    mitigation: Launch first with operators that already record procedures reliably, support manual metadata fallback, and prioritize the most common scope and reporting vendors.
  - name: Audit-grade trust
    description: Revenue-cycle leaders may hesitate to rely on AI-generated coding support if they cannot prove the evidence chain in payer disputes.
    mitigation: Position the first product as surgeon-reviewed documentation plus evidence packet generation, keep full timestamped audit trails, and publish appeal and edit metrics from early accounts.
