jobsToBeDone:
  - job: When a high-volume endoscopy center finishes a procedure, help the surgeon and coder finalize a defensible note immediately, so they can submit cleaner claims without late addenda.
    currentAlternative: Dictation, templated reports, and manual coder backfill from the chart
    successMetric: Reduction in time from procedure end to signed note and claim-ready coding packet
  - job: When a payer questions a billed endoscopy case, help the coding team show what happened in the room with proof, so they can defend reimbursement without manual clip hunting.
    currentAlternative: Manual chart review, coder memory, and ad hoc video retrieval
    successMetric: Lower audit-prep time and higher upheld reimbursement on challenged cases
