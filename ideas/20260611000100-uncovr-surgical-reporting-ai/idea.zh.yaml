topRisks:
- name: 医生审核摩擦
  description: 如果临床医生还得大改草稿，产品给人的感觉就会从“当天提速”变成“又多了一层行政负担”。
  mitigation: 先从重复度最高的内镜流程做起，按模板和医生去量修改率，并把草稿直接送进现有签署队列。
- name: 视频集成缺口
  description: 有些中心的视频采集不稳定、元数据缺失，报告系统也很碎，这会直接拉低输出质量。
  mitigation: 第一批只找本来就稳定录制术式的运营方，允许少量人工补元数据，并优先适配最常见的镜体和报告厂商。
- name: 审计级信任
  description: 如果在付费方争议里拿不出完整证据链，收入周期负责人就不会轻易相信 AI 生成的编码支撑。
  mitigation: 第一版就把产品定位成“医生审核的文档 + 证据包生成”，保留完整的时间戳审计轨迹，并把早期客户的申诉和修改指标公开出来。
