jobsToBeDone:
- job: 当高吞吐内镜中心做完一台手术时，帮医生和编码员立刻敲定一份站得住脚的病历，这样他们就能在没有晚补录的情况下报出更干净的理赔。
  currentAlternative: 口述、模板报告，再加编码员手工补病历
  successMetric: 从手术结束到病历签署、编码包可提交的时间缩短
- job: 当付费方质疑一台已计费的内镜病例时，帮编码团队拿着证据把房间里发生了什么讲清楚，不用再手工翻片段来保住回款。
  currentAlternative: 人工翻病历、靠编码员记忆，再临时回找视频
  successMetric: 降低审计备料时间，并提高争议病例的回款保住率
