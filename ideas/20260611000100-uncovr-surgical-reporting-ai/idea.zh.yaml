problem: 在高频 GI 和日间手术场景里，医生做完手术后仍要靠回忆补完文档；而集中编码团队则只能翻稀碎笔记，再去回找零散视频片段，勉强拼出当时发生了什么。越是该标准化、该快速出账的病例，越会因为这个延迟冒出补录、编码争议和付费方风险。真正的问题不只是数据缺失，而是最有力的证据其实早就躺在视频里，却没能及时变成可直接理赔的病历记录。
targetUser:
  primary: 美国多点位 GI 与日间手术平台里的收入周期副总裁，或内镜运营总监
  secondary: 负责跨院区 CPT 准确性和审计应对的中央编码负责人
  buyer: PE 支持的 ASC 平台 CFO 或收入周期副总裁
startupThesis:
  nonObviousInsight: 第一个真正跑出来的手术 AI 公司，不会靠一步跳到术中决策支持取胜。它更可能先在最重复、最视频原生的专科里，把术式视频变成回款级别的文档记录——因为这里医院本来就有原始证据，修改负担也量得出来，ROI 最终会直接落在回款和编码效率上。
  beachhead: 先切 PE 支持的美国 GI 和内镜 ASC 运营方：有 20-100 间手术室、集中编码团队，而且在结肠镜和上消化道内镜流程里反复遇到文档补录或降码压力
  wedge: 一台视频原生文档引擎，把内镜影像和手术室元数据拼成医生审核版术式记录和 CPT 证据包，在患者离开恢复区前就出稿
  whyNowCatalyst: 同日出现的真实部署、实时“视频到病历”生成能力，以及 400 间手术室的管线，都说明手术视频已经从档案素材跨进结构化工作流输入，回款自动化这件事因此突然变得可信。
  ventureScalePath: 先从内镜记录生成和编码应对切入，再扩到更多 ASC 专科、住院 手术间 文档、质量上报、植入物和器械追溯、培训分析，最终长成手术运营和决策支持的纵向数据层。
solution: 产品会把术式视频、镜体元数据、房间时间戳和现有文档模板一起吃进来，不再等几个小时后再补写，而是在手术刚结束时就先给出一版草稿。系统会标出识别到的关键步骤、可能支撑 CPT 的证据点，以及还缺哪些材料，让医生和编码员面对的是一份结构化草稿，而不是从零开写。每一句自动生成的表述都能回链到带时间戳的片段或事件标记，内部质控、编码交接和付费方申诉都能直接用这条证据链。第一版会刻意只做内镜，因为视频本来就在、流程足够重复，而且当天文档质量会直接打到吞吐和回款。
goToMarketSeed:
  firstCustomer: 一家 PE 支持的 GI 平台，横跨多个州，有 30-60 间内镜室、集中式 RCM，而且结肠镜和上消化道内镜的当日文档每周都会堆出编码 积压
  buyingTrigger: 一旦文档补录激增、付费方降码变多、编码岗位招不到人，或并购后的多个中心开始推进标准化，预算和紧迫性就会同时冒出来。
  currentAlternative: 现有替代方案通常是医生在 Epic 或 Provation 里口述加模板填报，之后再由编码员人工复核；只有理赔被质疑时，才临时回头翻视频。
  switchingReason: 这条切口把手术室里原本就存在的主证据源，直接变成预填好的病历和可追溯的编码支撑；既能减少补录和审计摩擦，也不用逼运营方把 EHR 或内镜报告栈整套拆掉重来。
  pricingHypothesis: 按活跃手术室数收年度软件费，再叠加按最终成案病例计费；若要用审计应对工作流，再卖更高档位。
