slug: endoscopy-claim-proof-os
date: '2026-06-11'
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: "[BP date 2026-06-11] The model starts in the first full month after the business-plan date."
  - id: A2
    name: Starting cash after pre-seed close
    value: "$2.8M"
    unit: usdM
    source: "[BP fundingAsk $2–4M; BP fundingAsk.runwayMonths 18] The base case uses $2.8M so the company can fund the planned hiring ramp and still carry a 6-month buffer into the next raise."
  - id: A3
    name: Paid pilot pricing
    value: "$90K over 3 months"
    unit: usdK_per_pilot
    source: "[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] The midpoint of the BP's $60K-$120K 90-day pilot range is modeled as $30K monthly pilot revenue."
  - id: A4
    name: Steady-state annual platform value
    value: "$1.41M ARR per live GI platform"
    unit: usdM_per_customer_year
    source: "[BP market.som; BP gtm.pricing; research.market.som] The model assumes a mature 30-room platform lands well below the research SOM ceiling of about $2.59M at $20 per case, reflecting startup discounting, partial room rollout during early years, and a mix of platform fee plus case-based usage."
  - id: A5
    name: Customer ramp
    value: "3 paid pilots by M10, 2 pilot-to-production conversions by Y2, and 4 live GI platforms by Q4Y3"
    unit: customers
    source: "[BP milestones; BP product.twelveMonth; BP product.twentyFourMonth] This follows the plan to sign 3 paid pilots early, convert at least 2 into annual contracts, and reach 4 live platforms by months 24-36."
  - id: A6
    name: Expansion ramp within landed accounts
    value: "10-20 pilot rooms, then 18-24 rooms in first production year, then roughly 30 rooms at mature rollout"
    unit: rooms_per_platform
    source: "[BP gtm.wedge; BP market.som; BP milestones] Revenue growth after logo acquisition is driven mainly by room expansion inside each landed GI platform rather than rapid logo proliferation."
  - id: A7
    name: Gross margin ramp
    value: "45%-55% in Y1, 60%-65% in Y2, and 67%-70% in Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70; BP strategicChoices.sequencingRationale; BP operatingAssumptions] Early pilots carry heavier implementation, QA, and workflow-support cost before the model reaches the BP's long-run software target."
  - id: A8
    name: Monthly churn
    value: "2.0%"
    unit: percent
    source: "Startup-finance heuristic for early but sticky enterprise workflow software sold into a small number of large healthcare platforms; logo churn should be low once live, but early-product risk still warrants a non-zero assumption."
  - id: A9
    name: Fully loaded CAC
    value: "$450K per production platform"
    unit: usdK_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; BP risks] Founder-led enterprise selling, compliance review, room audits, and solutions-heavy pilot work make CAC materially higher than mid-market SaaS norms."
  - id: A10
    name: Loaded salary bands
    value: "Founder/CEO $180K; engineering $190K; product/clinical $170K; solutions $160K; revenue cycle/coding $150K; GTM/partnerships $150K; G&A $130K"
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for U.S. pre-seed enterprise software hiring, mapped to [BP team] roles and the GI workflow specialization described in the plan."
  - id: A11
    name: Headcount ramp snapshots
    value: "Founder 1/1/1/1/1/1; engineering 1/1/1/1/2/3; product-clinical 1/1/1/1/1/1; solutions 0/1/1/1/2/2; revenue-cycle 0/0/1/1/1/1; GTM-partnerships 0/0/0/1/1/2; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP strategicChoices.sequencingRationale] The model follows the BP hiring order: workflow and implementation first, then revenue-cycle proof, then channel and scale support after the first pilots."
  - id: A12
    name: Non-payroll operating budgets
    value: "Y1 non-salary opex $36K-$59K per month; Y2 non-salary opex $210K-$245K per quarter; Y3 non-salary opex $259K-$295K per quarter"
    unit: usdK
    source: "Startup-finance heuristic for a healthcare workflow startup carrying security, cloud inference, travel, legal, insurance, implementation, and compliance overhead on top of payroll."
  - id: A13
    name: Quarterly payroll smoothing
    value: "Y2 and Y3 salary expense ramps between the required snapshot columns instead of stepping only at year-end"
    unit: method
    source: "[Financial Modeler contract] Quarterly salary lines are smoothed so payroll stays consistent with the BP sequencing and the fixed six-column headcount schema."
  - id: A14
    name: Downside scenario deltas
    value: "3 live platforms by Q4Y3, mature platform ARR about $1.15M, and 65% steady-state gross margin"
    unit: scenario_inputs
    source: "[BP risks; research.sensitivityCases] The downside reflects slower room expansion, higher edit burden, and more services-heavy delivery if capture quality or surgeon acceptance underperform."
  - id: A15
    name: Upside scenario deltas
    value: "4 platforms arrive earlier, mature platform ARR about $1.60M, and 72% steady-state gross margin"
    unit: scenario_inputs
    source: "[BP businessModel.expansionLevers; BP milestones] The upside assumes the audit-defense module attaches earlier and platform rollouts reach the full 30-room target faster."
  - id: A16
    name: Cash conversion simplification
    value: "EBITDA approximates cash movement after the financing close"
    unit: method
    source: "Startup-finance heuristic for an asset-light software company with no debt, tax, or capex line modeled separately at this stage."
