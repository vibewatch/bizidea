scenarios:
  downside:
    description: "Room expansion and conversion lag because capture quality and surgeon edit rates improve more slowly than planned."
    y3RevenueK: 3560.0
    y3EbitdaK: -310.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
      - "Q4Y3 live-platform count falls from 4 to 3."
      - "Steady-state platform ARR falls from about $1.41M to about $1.15M."
      - "Gross margin tops out near 65% because implementation stays services-heavy."
      - "Platform room expansion takes 12-15 months instead of about 9-12 months."
  base:
    description: "The base case lands 3 paid pilots in year 1, converts 2 by year 2, and grows mostly through room expansion inside 4 live GI platforms by Q4Y3."
    y3RevenueK: 4740.0
    y3EbitdaK: 587.4
    cashLowPointK: 1118.1
    keyAssumptionChanges:
      - "Pilot pricing stays near the BP midpoint at about $90K for 90 days."
      - "Live platforms reach roughly 30 rooms at mature rollout, lifting ARR to about $1.41M each."
      - "Gross margin reaches the BP target of 70% by Q4Y3."
      - "The logo count tops out at 4, so most year-3 growth comes from account expansion rather than new logos."
  upside:
    description: "Evidence-packet ROI and packaged integrations pull forward platform-wide rollouts and premium module attach."
    y3RevenueK: 6120.0
    y3EbitdaK: 1320.0
    cashLowPointK: 1220.0
    keyAssumptionChanges:
      - "All 4 platforms expand to near-full room coverage one to two quarters faster than base case."
      - "Steady-state platform ARR rises from about $1.41M to about $1.60M with audit-defense module attach."
      - "Gross margin reaches roughly 72% as deployment playbooks standardize earlier."
      - "The fourth platform lands by mid-Y2 instead of late Y2."
sensitivity:
  - variable: ARPU
    downsideCase: "$1.20M mature platform ARR"
    baseCase: "$1.41M mature platform ARR"
    upsideCase: "$1.60M mature platform ARR with analytics attach"
    y3RevenueImpactK: -620.0
    cashImpactK: -420.0
  - variable: CAC
    downsideCase: "$550K per production platform"
    baseCase: "$450K per production platform"
    upsideCase: "$350K with repeatable referrals and cleaner audits"
    y3RevenueImpactK: 0.0
    cashImpactK: -400.0
  - variable: churn
    downsideCase: "3.0% monthly churn if workflow trust stays fragile"
    baseCase: "2.0% monthly churn"
    upsideCase: "1.0% monthly churn with deeper reporting-stack lock-in"
    y3RevenueImpactK: -210.0
    cashImpactK: -160.0
  - variable: sales cycle
    downsideCase: "15-month enterprise cycle because security and workflow review drag"
    baseCase: "9-12 months from workflow assessment to production expansion"
    upsideCase: "6-9 months with reference wins and packaged integrations"
    y3RevenueImpactK: -950.0
    cashImpactK: -680.0
  - variable: gross margin
    downsideCase: "65% steady-state gross margin"
    baseCase: "70% target gross margin"
    upsideCase: "72% with lighter implementation burden"
    y3RevenueImpactK: 0.0
    cashImpactK: -240.0
  - variable: hiring pace
    downsideCase: "Pull one engineer and one GTM hire forward by two quarters"
    baseCase: "Hire in the BP sequence"
    upsideCase: "Delay one non-core scale hire until platform 3 is live"
    y3RevenueImpactK: 0.0
    cashImpactK: -280.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Workflow assessments] --> Pilots[Paid pilots]
      Pilots --> Platforms[Live GI platforms]
      Platforms --> Revenue[Room + case revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by 4 GI platforms by Q4Y3, with same-account room expansion contributing more than new-logo growth after Y2.
  - checkName: Must go right
    finding: Pilot accounts have to convert into broader room rollouts quickly enough that usage revenue outruns the added solutions, security, and compliance cost.
  - checkName: Model breaks if
    finding: The downside case appears if capture audits fail or sales cycles stretch, because that combination pushes Y3 EBITDA negative and drops cash toward the roughly $420K low point.
  - checkName: Next-round proof
    finding: The next round is justified once 2 pilots convert, 4 platforms are live, and audit-defense ROI is visible on coder-query or appeal-prep metrics.
sanityChecks:
  ruleOf40: "Y3 growth 110.7% + EBITDA margin 12.4% = 123.1%."
  burnMultiple: "Y2 burn multiple is about 0.3x on roughly $1.92M of net new ARR; Y3 turns cash generative while adding about $2.28M of net new ARR."
  revenuePerFte: "$431K Y3 using $4.74M revenue and 11 year-end FTE (benchmark $200–400K SaaS)."
  flags:
    - "Revenue concentration remains high because only 4 GI platforms account for the full base-case year-3 revenue."
    - "The model assumes most year-3 growth comes from room expansion inside existing accounts; if operators stall at pilot-room coverage, revenue misses even without logo churn."
    - "Year-3 revenue per FTE sits slightly above a generic SaaS benchmark even though implementation is still workflow- and compliance-heavy, so execution discipline must stay unusually strong."
