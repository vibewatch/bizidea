competitors:
- name: Uncovr
  stage: 种子轮
  wedge: AI 分析手术或内镜视频，抓取可计费事件并起草手术记录。
  pricing: 企业定制报价；抓取到的页面里没有公开标价
  strength: 它直接把“视频到文档”和“回款”绑在一起，和拟议切口最接近。
  weaknessVsUs: 它当前的定位更像宽泛的手术底账系统，因此仍给 GI 优先、ASC 专用的工作流和分发打法留了空。
  sourceRefs:
  - 1
  - 2
  - 3
- name: Provation Apex GI
  stage: 现有厂商
  wedge: 面向医生和护理端术式记录、影像与编码工作流的云 GI 文档平台。
  pricing: 企业定制报价；以演示驱动销售
  strength: 在 GI 场景里已有安装基础，也更容易拿到大型多点位运营方的信任。
  weaknessVsUs: 它的起点是结构化人工文档流程，而不是自动化的视频回链证据采集。
  sourceRefs:
  - 23
  - 24
  - 25
- name: Ambience Healthcare
  stage: 规模化公司
  wedge: 覆盖 200+ 专科的环境式文档与编码 AI。
  pricing: 企业定制报价；抓取到的页面里没有公开标价
  strength: 面向临床的文档和编码叙事很强，跨专科采用面也很广。
  weaknessVsUs: 相比视频原生证据，它以语音和病历为先的做法，在内镜理赔里天然没那么站得住。
  sourceRefs:
  - 26
  - 30
- name: Theator
  stage: 规模化公司
  wedge: 把手术视频变成结构化数据和报告输出的手术智能平台。
  pricing: 企业定制报价；抓取到的页面里没有公开标价
  strength: 视频原生的手术智能故事很强，也和手术记录自动化高度相邻。
  weaknessVsUs: 它更偏宽泛 手术间 分析，因此在 GI 专属工作流和付费方防守上不够聚焦。
  sourceRefs:
  - 27
  - 30
  - 34
  - 35
- name: EndoSoft
  stage: 现有厂商
  wedge: 带工作流、报告和图像/视频采集能力的内镜 EHR 与术式文档平台。
  pricing: 企业定制报价；抓取到的页面里没有公开标价
  strength: 内镜工作流覆盖很深，也已有影像采集基础。
  weaknessVsUs: 现有产品面更像“文档软件 + 采集”，而不是自动从视频里合成理赔级证据。
  sourceRefs:
  - 28
regulatoryTechnicalConstraints:
- point: 手术文档依旧是受监管的临床病历，必须在术后及时完成并由医生签字，因此 AI 输出必须适配人工复核工作流。
  sourceRefs:
  - 4
- point: 结肠镜和 EGD 报告都得满足明确的质量 对标，包括盲肠定位照片、肠道准备记录和 EGD 影像记录。
  sourceRefs:
  - 10
  - 11
  - 38
- point: ASC 质量数据会通过 CMS 项目收集并公开披露，这会显著抬高对可审计数据质量的要求。
  sourceRefs:
  - 18
- point: 受监管主体必须对所有存储或访问 ePHI 的系统持续做风险分析，不只是 EHR；这会直接影响医疗视频架构。
  sourceRefs:
  - 32
  - 33
validationSignals:
- point: Uncovr 的融资和公开部署管线说明，投资人和医疗机构都开始把“视频到病历”工作流当成有商业可行性的东西。
  sourceRefs:
  - 1
  - 3
- point: United Digestive 在 Provation Apex 上做平台级标准化，说明大型 GI 运营方本来就会为整个平台的文档现代化买单。
  sourceRefs:
  - 23
  - 24
- point: 迈阿密大学的 AI 手术代理把签署病历中位时长从约 26 分钟压到 2 分钟以内，这说明“节省时间”这条价值主张在技术上是讲得通的。
  sourceRefs:
  - 31
openQuestions:
- 目标 GI ASC 房间里，到底有多少已经留存了全保真、足够稳定、能支撑生产级病历生成的术式视频和元数据？
- 和现有报告系统里更好的纯文本文档相比，带时间戳的片段回链，到底多贡献了多少额外的付费方防守价值？
- 30-60 间房的 GI 平台市场里，主流现有栈到底是哪几套？在生产环境里真正可用的回写点或证据挂载点又有哪些？
- 单病例的修改率阈值到底在哪？超过这个点，医生就会觉得这套流程不是当天减负，而是额外添活。
