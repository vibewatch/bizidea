  fiveForces:
    supplierPower:
      score: 3
      rationale: 对 EHR、GI 报告系统、视频采集流程和 HIPAA 合规基础设施的集成依赖，让上游供应商拥有一定杠杆，但还没有哪一家能彻底控制整个品类。
      sourceRefs:
      - 24
      - 28
      - 32
      - 33
    buyerPower:
      score: 4
      rationale: GI MSO 和 PE 支持的平台把很多房间集中在同一个采购中心之下，因此它们在扩单前，完全可以要求看到围绕拒付、吞吐和标准化的可量化 ROI。
      sourceRefs:
      - 6
      - 8
      - 19
      - 20
      - 22
    threatOfEntrants:
      score: 3
      rationale: 通用 AI 模型确实拉低了技术门槛，但要想真正站得住，仍然得补上 GI 本体、工作流集成，以及对临床视频和回款证据的可信处理能力。
      sourceRefs:
      - 26
      - 32
      - 34
      - 35
