      sourceRefs:
      - 23
      - 24
      - 25
      - 26
      - 28
    competitiveRivalry:
      score: 4
      rationale: 竞争强度已经不低，因为直接和相邻玩家都在从文档、视频分析和 GI 工作流三个方向切这个问题，哪怕“理赔防守”这个细分位子还没被坐满。
      sourceRefs:
      - 1
      - 24
      - 26
      - 27
      - 28
      - 29
  pestle:
  - factor: 政治
    impact: neutral
    point: CMS 还在持续加码 ASC 的质量和公开披露要求，这一方面有利于可量化的文档质量，另一方面也把合规门槛抬得更高。
    sourceRefs:
    - 18
  - factor: 经济
    impact: positive
    point: 拒付、人手短缺和利润压力，让工作流自动化在能改善文档质量和现金回收时，更容易讲清价值。
    sourceRefs:
    - 6
    - 8
    - 9
  - factor: 社会
    impact: positive
    point: 临床医生对文档负担的厌烦，会转化成对新工具的尝试意愿——只要它真能减少下班后补病历和重复录入。
    sourceRefs:
    - 26
    - 30
  - factor: 技术
    impact: positive
    point: 多模态 AI、手术视频分析和真实生产部署，正在让“视频到文档”这条工作流第一次显得真正可信。
    sourceRefs:
    - 27
    - 31
    - 34
    - 35
  - factor: 法律
    impact: negative
    point: 手术记录依旧是受监管的临床病历，任何处理关联视频和 ePHI 的系统，都得通过安全分析，并保住可审计性。
    sourceRefs:
    - 4
    - 32
    - 33
  adoptionFrictionMatrix:
  - friction: 不同中心、不同厂商的视频采集和元数据质量差异很大。
    severity: 高
    affectedBuyer: 内镜运营总监
    mitigation: 先从本来就能稳定采视频的房间开始，上线前必须先做采集审计。
    sourceRefs:
    - 2
    - 32
    - 33
  - friction: 如果修改还是频繁，或表述让临床觉得别扭，医生就会直接拒绝草稿。
    severity: 高
    affectedBuyer: 医生带头人
    mitigation: 初版模型只盯重复度最高的结肠镜和 EGD 工作流，按病例量修改次数，并把审核留在现有签署队列里。
    sourceRefs:
    - 31
    - 36
  - friction: 如果没有业界认可的文档 对标，买家不会信任 AI 生成的编码支撑。
    severity: 高
    affectedBuyer: 中央编码负责人
    mitigation: 把输出锚定在公开发布的结肠镜和 EGD 质量指标上，并为每条与理赔相关的表述展示带时间戳的证据。
    sourceRefs:
    - 10
    - 11
    - 38
  - friction: 接入现有报告和 EHR 工作流，很容易把试点拖住。
    severity: 中
    affectedBuyer: CIO 或实施负责人
    mitigation: 把自己定位成写回现有工作流的一层能力，而不是整套系统替换；同时提前为主流 GI 栈做连接器。
    sourceRefs:
    - 23
    - 24
    - 25
    - 28
market:
  tam:
