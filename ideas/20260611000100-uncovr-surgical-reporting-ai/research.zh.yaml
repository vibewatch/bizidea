  coverageGap: 这是美国 GI 和 ASC 文档体系里一条很窄的工作流市场。本轮虽然找到了很多相关候选 URL，但有些本来有价值的页面因为 机器人拦截、跳转、浏览器拦截或付费内容，没法在本轮里可信抓取（尤其是 Becker's、HST Pathways 的细节页、Medtronic 产品页、Caresyntax 页面，以及一些媒体存档）。如果硬凑到 100 条保留来源，只能塞进重复厂商页或低价值镜像，所以语料库就停在 39 条已验证的独立条目。
