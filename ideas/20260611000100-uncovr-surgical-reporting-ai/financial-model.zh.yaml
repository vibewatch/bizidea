slug: endoscopy-claim-proof-os
date: '2026-06-11'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-06-11] 模型从 business-plan 日期后的第一个完整月份开始。'
- id: A2
  name: pre-seed 后起始现金
  value: $2.8M
  unit: usdM
  source: '[BP fundingAsk $2–4M; BP fundingAsk.runwayMonths 18] 基准情形按 $2.8M 测算，这样既能覆盖计划中的招聘爬坡，也能在下一轮融资前保留 6 个月缓冲。'
- id: A3
  name: 付费试点定价
  value: 3 个月合计 $90K
  unit: usdK_per_pilot
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] BP 里 90 天试点 $60K-$120K 区间的中位数，被折成每月 $30K 的试点收入。'
- id: A4
  name: 稳态平台年价值
  value: 每个已上线 GI 平台 $1.41M ARR
  unit: usdM_per_customer_year
  source: '[BP market.som; BP gtm.pricing; research.market.som] 模型假设，一个成熟的 30 间房平台对应的 ARR 明显低于 research SOM 里按每例 $20 推出来、约 $2.59M 的上限；这里已经考虑了创业公司折价、早期只覆盖部分房间，以及平台费 + 按例收费的混合结构。'
- id: A5
  name: 客户爬坡节奏
  value: 到 M10 拿下 3 个付费试点、到 Y2 转正 2 个、到 Q4Y3 做到 4 个已上线 GI 平台
  unit: customers
  source: '[BP milestones; BP product.twelveMonth; BP product.twentyFourMonth] 这里沿用了计划里的节奏：先签 3 个付费试点，至少把 2 个转成年约，并在第 24-36 个月做到 4 个真实上线平台。'
- id: A6
  name: 已签客户内的扩张节奏
  value: 试点期 10-20 间房，首个生产年扩到 18-24 间房，完整铺开后约 30 间房
  unit: rooms_per_platform
  source: '[BP gtm.wedge; BP market.som; BP milestones] 拿下 logo 之后，收入增长主要来自单个已签 GI 平台内部的房间扩张，而不是快速堆新 logo。'
- id: A7
  name: 毛利率爬坡
  value: Y1 为 45%-55%，Y2 为 60%-65%，Y3 为 67%-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP strategicChoices.sequencingRationale; BP operatingAssumptions] 早期试点会背上更重的实施、QA 和工作流支持成本，所以在毛利率爬到 BP 的长期软件目标前，会先显得更重。'
- id: A8
  name: 月流失率
  value: 2.0%
  unit: percent
  source: 创业公司财务常用假设：这类卖给少数大型医疗平台的企业工作流软件，早期虽新，但一旦上线通常黏性不低；因此 logo 流失率应该偏低，不过早期产品风险仍然要求留一个非零假设。
- id: A9
  name: 完全成本 CAC
  value: 每个生产级平台 $450K
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP risks] 创始人主导的企业销售、合规评审、房间审计，以及偏重解决方案的试点交付，都会把 CAC 明显抬到高于中端 SaaS 常态的水平。'
- id: A10
  name: 完全成本薪资带
  value: 创始人 / CEO $180K；工程 $190K；产品 / 临床 $170K；解决方案 $160K；收入周期 / 编码 $150K；GTM / 合作 $150K；G&A $130K
  unit: usdK_per_fte_year
  source: 创业公司财务常用假设：按美国 pre-seed 企业软件招聘水平估算，并映射到 [BP team] 里的岗位，以及计划里强调的 GI 工作流专门化。
- id: A11
  name: 人员爬坡快照
  value: 创始人 1/1/1/1/1/1；工程 1/1/1/1/2/3；产品-临床 1/1/1/1/1/1；解决方案 0/1/1/1/2/2；收入周期 0/0/1/1/1/1；GTM-合作 0/0/0/1/1/2；G&A 0/0/0/0/1/1，对应 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale] 模型遵循 BP 的招聘顺序：先补工作流和实施，再补收入周期验证，等第一批试点跑出来后再补渠道和规模化支持。'
- id: A12
  name: 非薪酬经营预算
  value: Y1 非薪酬 opex 每月 $36K-$59K；Y2 每季度 $210K-$245K；Y3 每季度 $259K-$295K
  unit: usdK
  source: 创业公司财务常用假设：医疗工作流创业公司除了薪资外，还要背安全、云推理、差旅、法务、保险、实施和合规等额外开销。
- id: A13
  name: 季度薪酬平滑规则
  value: Y2 和 Y3 的薪资费用会在必填快照列之间平滑爬升，而不是只在年末跳变
  unit: method
  source: '[Financial Modeler contract] 季度薪资会在相邻快照之间做平滑，这样 payroll 才能同时贴合 BP 的招聘顺序和固定的六列表头模型。'
- id: A14
  name: 下行情形变动
  value: 到 Q4Y3 只有 3 个已上线平台、成熟平台 ARR 约 $1.15M、稳态毛利率 65%
  unit: scenario_inputs
  source: '[BP risks; research.sensitivityCases] 下行情形对应的是：如果采集质量或医生接受度不达预期，房间扩张会更慢、修改负担更高，交付也会更偏重服务。'
- id: A15
  name: 上行情形变动
  value: 第 4 个平台更早到来、成熟平台 ARR 约 $1.60M、稳态毛利率 72%
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones] 上行情形假设审计应对模块更早卖进去，平台 铺开 也更快铺满 30 间房。'
- id: A16
  name: 现金转换简化规则
  value: 融资完成后，以 EBITDA 近似现金变动
  unit: method
  source: 创业公司财务常用简化：这是轻资产软件公司，现阶段没有单独拆出债务、税项或 capex 行。
