scenarios:
  downside:
    description: 因为采集质量和医生修改率改善得比计划更慢，房间扩张和转正节奏都会落后。
    y3RevenueK: 3560.0
    y3EbitdaK: -310.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
    - Q4Y3 的真实上线平台数从 4 个降到 3 个。
    - 稳态平台 ARR 从约 $1.41M 降到约 $1.15M。
    - 由于实施仍然偏服务化，毛利率最高只能爬到约 65%。
    - 单个平台的房间扩张要花 12-15 个月，而不是约 9-12 个月。
  base:
    description: 基准情形是：第 1 年拿下 3 个付费试点，到第 2 年转正 2 个，并在 Q4Y3 前主要靠 4 个已上线 GI 平台内部的房间扩张来增长。
    y3RevenueK: 4740.0
    y3EbitdaK: 587.4
    cashLowPointK: 1118.1
    keyAssumptionChanges:
    - 试点定价维持在 BP 中位数附近，即 90 天约 $90K。
    - 已上线平台在成熟 铺开 后大致做到 30 间房，把单个平台 ARR 拉到约 $1.41M。
    - 毛利率在 Q4Y3 达到 BP 目标的 70%。
    - logo 数最高做到 4 个，因此第 3 年的大部分增长来自老客户扩张，而不是新 logo。
  upside:
    description: 证据包 ROI 和打包好的集成能力，会把平台级 铺开 和高级模块附加销售一并提前。
    y3RevenueK: 6120.0
    y3EbitdaK: 1320.0
    cashLowPointK: 1220.0
    keyAssumptionChanges:
    - 4 个平台都会比基准情形早 1-2 个季度接近满房覆盖。
    - 随着审计应对模块挂上去，稳态平台 ARR 会从约 $1.41M 升到约 $1.60M。
    - 由于部署打法更早标准化，毛利率能爬到约 72%。
    - 第 4 个平台会在 Y2 中期拿下，而不是拖到 Y2 末。
sensitivity:
- variable: ARPU
  downsideCase: $1.20M 成熟平台 ARR
  baseCase: $1.41M 成熟平台 ARR
  upsideCase: 附带分析模块时，成熟平台 ARR 为 $1.60M
  y3RevenueImpactK: -620.0
  cashImpactK: -420.0
- variable: CAC
  downsideCase: 每个生产级平台 $550K
  baseCase: 每个生产级平台 $450K
  upsideCase: 如果转介绍可复用、审计更顺，每个平台 CAC 可降到 $350K
  y3RevenueImpactK: 0.0
  cashImpactK: -400.0
- variable: churn
  downsideCase: 如果工作流信任始终脆弱，月流失率会到 3.0%
  baseCase: 月流失率 2.0%
  upsideCase: 如果报告栈锁定更深，月流失率可降到 1.0%
  y3RevenueImpactK: -210.0
  cashImpactK: -160.0
- variable: 销售周期
  downsideCase: 若安全和工作流评审拖慢进度，企业销售周期会拉到 15 个月
  baseCase: 从工作流评估到生产扩张约 9-12 个月
  upsideCase: 若已有标杆案例和打包集成，周期可缩到 6-9 个月
  y3RevenueImpactK: -950.0
  cashImpactK: -680.0
- variable: 毛利率
  downsideCase: 稳态毛利率 65%
  baseCase: 目标毛利率 70%
  upsideCase: 若实施更轻，毛利率可到 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -240.0
- variable: 招聘节奏
  downsideCase: 把 1 个工程岗和 1 个 GTM 岗都提前 2 个季度招进来
  baseCase: 按 BP 里的顺序招聘
  upsideCase: 把 1 个非核心扩张岗位延后到第 3 个平台上线后再招
  y3RevenueImpactK: 0.0
  cashImpactK: -280.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[工作流评估] --> Pilots[付费试点]
      Pilots --> Platforms[真实上线的 GI 平台]
      Platforms --> Revenue[房间费 + 按例收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[期末现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形里的收入引擎，来自 Q4Y3 前做到 4 个 GI 平台；Y2 之后，单个老账户内的房间扩张贡献会大于新 logo 增长。
- checkName: 必须成立的前提
  finding: 试点账户必须足够快地转成更大范围的房间 铺开，让按使用量带来的收入跑赢新增的解决方案、安全和合规成本。
- checkName: 模型会在哪些情况下失效
  finding: 如果采集审计过不了，或者销售周期被拉长，下行情形就会出现；这两个因素叠加会把 Y3 EBITDA 打回负值，也会把现金压向约 $420K 的低点。
- checkName: 下一轮融资证明
  finding: 当 2 个试点成功转正、4 个平台真实上线，而且审计应对 ROI 已经能在编码问询或申诉备料指标上看出来时，下一轮融资的故事才真正讲得顺。
sanityChecks:
  ruleOf40: Y3 增长 110.7% + EBITDA 利润率 12.4% = 123.1%。
  burnMultiple: Y2 的 burn multiple 约为 0.3x，对应约 $1.92M 的净新增 ARR；Y3 则转为现金正向，同时新增约 $2.28M 的净 ARR。
  revenuePerFte: 按 Y3 收入 $4.74M 和年末 11 名 FTE 计算，收入 / FTE 为 $431K（SaaS 对标 常见区间约 $200–400K）。
  flags:
  - 收入集中度依旧很高，因为基准情形下第 3 年的全部收入只靠 4 个 GI 平台撑起来。
  - 模型假设第 3 年的大部分增长来自现有账户内部的房间扩张；如果运营方停在试点房间覆盖不再往前走，即便没有 logo 流失，收入也会落空。
  - 尽管实施仍然很重工作流和合规，第 3 年的人均收入还是略高于泛 SaaS 对标；这意味着执行纪律必须异常强。
