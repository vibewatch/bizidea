slug: endoscopy-claim-proof-os
date: '2026-06-11'
executiveSummary: Endoscopy Claim-Proof OS 应该先卖给 PE 支持的美国 GI 和日间手术平台：这些平台已经在录术式视频，也把收入周期运营集中起来。最急的痛点不是泛泛的临床文档，而是高频结肠镜和 EGD 流程里，医生靠记忆补病历、编码员反复返工、付费方风险持续暴露——明明最好的证据就在视频里，却没能足够快地变成签署完成、可直接理赔的记录。MVP 应该把内镜视频、房间元数据和现有病历模板一起吃进来，在病例离开当日工作流前，先给出一份医生审核版术式记录和带时间戳的 CPT 证据包。这个滩头市场比泛手术 AI 平台更窄、也更容易率先验证，因为 GI 中心流程重复、原本就会买文档软件，而且拒付、吞吐和标准化压力都直接落在平台层。第一波 GTM 应该卡在拒付激增、编码团队缺人，或并购后开始推标准化的时间点，直接卖给拥有 30-60 间手术室的 GI 平台里的收入周期副总裁或 CFO。研究给出了一个看起来站得住的 TAM $425.9M、滩头 SAM $69.1M，以及第 3 年 SOM $10.4M；但这些数字建立在按病例捕捉价值的前提上，并不能直接证明现成预算已经存在。最大的反证风险有两个：一是目标房间里真正留存可用视频和元数据的比例太低，撑不起生产级病历生成；二是医生修改率始终压不下来，最后让这套流程看起来更像额外行政负担。也因此，前 12 个月必须在一个账户里同时证明三件事：采集覆盖稳定、当天出稿且修改很少、以及编码问询或申诉备料工作量确实下降。
problem:
- 医生和编码员到现在还在靠回忆、模板和临时翻片段，去拼高频内镜病例，这才会不断冒出晚补录、编码争议，以及在付费方申诉里站不住脚的证据。
- 如果术式视频只是档案素材，而不是手术室里到底发生了什么的底账，多点位 GI 平台就不可能在并购后的各中心之间把病历质量和理赔支撑真正拉齐。
solution:
- 把结肠镜和 EGD 视频连同房间元数据，直接变成手术后立刻可审的病历草稿；在签署前就把识别到的步骤和缺失文档提示先亮出来。
- 把每一条和理赔相关的表述都挂到带时间戳的可视证据上，让集中编码团队和申诉团队面对的是一份完整证据包，而不是只靠文字重新拼病例。
whyWeWin:
- 这条切口比泛环境式 AI 更窄，也比大而全的手术智能平台更贴工作流：它只做 GI 的当日文档和经得起回款审核的证据。
- 现有 GI 报告套件已经占住模板和影像采集入口，但它们大多还是从人工录入起步，而不是自动把视频合成为证据。
- 数据护城河会从三处一起滚大：GI 专属术式本体、医生的修改历史，以及编码和申诉结果里真正能通过复核的证据包样本。
strategicChoices:
  beachhead: 先打 PE 支持的美国 GI 与内镜 ASC 平台：有 20-100 间手术室、集中编码团队，而且结肠镜和 EGD 长期承受文档补录或降码压力。
  wedgeRationale: 这块市场比更大的医院手术场景更快出验证，因为流程够重复，买家已经把拒付和缺人问题算成了现金损失，而且一次平台 铺开 就能覆盖很多房间，不需要第一天就接入住院 OR。
  sequencingRationale: 顺序一定要卡住：先在结肠镜和 EGD 里，把“医生审核的当天出稿 + 证据包”跑通，因为眼下更重要的是信任、工作流贴合度和可量化 ROI，而不是模型铺得有多宽。只有当公司证明修改负担很低、也能干净地回写到现有 GI 报告栈后，才去加多点位 对标、审计应对分析，以及相邻专科；产品边界、销售打法和招聘节奏都得服从这个纪律。
  notYet:
  - 术中决策支持或息肉检测功能
  - GI 和日间内镜之外的大范围住院 手术间 工作流
  - 整套替换式 GI 文档系统
  - 申诉外包或重服务型收入周期业务
market:
  tam: 基于美国每年 21.30M 台结肠镜加 EGD，以及每个最终成案病例约 $20 的软件价值假设，估算 TAM 为 $425.9M。
  sam: 按约 20 家可触达的 PE 支持或多点位 GI 平台、每家平均 40 间房、每房每年约 4,320 例病例估算，滩头 SAM 为 $69.1M。
  som: 按第 3 年拿下 4 个平台、每个平台 30 间上线房间、试点转正后按病例收费来测算，SOM 为 $10.4M。
  segments:
  - 主要：拥有集中收入周期管理能力的多点位 GI 与内镜 ASC 运营方
  - 次要：正在跨站点统一文档和编码标准的医院自营门诊 GI 网络
  buyingProcess: 业务 champion 往往是内镜运营总监、GI 医疗负责人或中央编码主管；真正拍板付钱的通常还是 CFO 或收入周期副总裁，因为价值最终会体现在少拒付、编码效率提升和当天文档纪律上。交易最好围绕明确触发点启动——比如并购后的标准化、编码岗位空缺压力，或付费方审计激增；随后再过 IT 和合规评审，因为产品同时碰到视频、报告系统和 ePHI。
product:
  mvp: MVP 只做结肠镜和 EGD：吃进录制好的术式视频和房间元数据，起草一份医生审核版病历，标出缺失的质量要素，再生成一份带证据回链的编码包，回写进现有报告流程，而不是直接替掉它。人工审核仍然必不可少，因为手术记录本身就是受监管的临床病历；第一阶段要赢的不是“全自动”，而是更快、更可审计。
  sixMonth: 在一家 GI 平台里交付 共创客户 版本：能接主流本地栈、覆盖结肠镜和 EGD 的病历生成、按模板衡量医生修改率，并在至少 2 个真实中心里当天返回证据包。
  twelveMonth: 把 2-3 个试点转成平台合同，为试点里最常见的 GI 报告系统和 EHR 组合做出打包集成，并在争议病例里证明编码问询或申诉备料时间确实下降。
  twentyFourMonth: 在守住 GI 文档这个控制点的前提下，从当天出稿继续长到 对标 分析、拒付应对报表，以及相邻的门诊术式家族。
  keyBets:
  - 足够多的目标房间本来就有稳定的视频和元数据覆盖，不用大改工作流也能撑起生产级草稿。
  - 只要单病例平均修改量够低，而且草稿直接出现在现有签署队列里，医生就愿意接受当天审核。
  - 即便现有报告系统不替换，收入周期负责人也会为这层带证据回链的能力付钱。
  - 在前 10 个企业销售周期里，GI 优先的工作流深度会比泛手术定位更能赢单。
gtm:
  wedge: 先卖一笔平台试点给正在统一文档标准、或正被拒付返工拖住的 PE 支持 GI 运营方；从 10-20 间房和一个集中编码中心起步，再往全平台推开。
  channels:
  - 由创始人直接卖给 CFO、收入周期副总裁、GI 平台运营方和内镜运营高管
  - 拿到第一个可引用部署后，再和 GI 文档、编码及围手术期咨询伙伴做共销和转介绍
  - 在 GI 质量管理、收入周期和日间手术社区里定点出现——这些地方本来就把文档 对标 和标准化当成优先级
  funnelTargets: 目标账户→合格工作流评估 20-30%；合格评估→付费试点 30-40%；试点→生产级平台合同 50%+；生产级平台→第二站点集群或审计模块扩单在 12 个月内做到 60%+。
  pricing: 先卖 90 天付费试点，覆盖 10-20 间房，价格在 $60k-$120k；之后转成年约软件合同，按活跃房间数 + 最终成案病例使用量收费，再叠加高级审计应对档位。底层逻辑是：买家买的是更快签署、返工更少、对付付费方更有力的证据，不是多几个医生席位。
businessModel:
  revenueStreams:
  - 按活跃手术室数收费的平台年费
  - 带证据回链文档的按最终成案病例收费
  - 高级审计应对、对标 和拒付分析模块
  - 企业 铺开 需要时，再收有限的实施与集成费用
  unitOfValue: 被证据回链文档覆盖的活跃手术室和最终成案病例
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一个编码中心、10-20 间房扩到整个平台的 GI 铺开
  - 系统接住病历周转和证据完整性后，再加拒付应对分析和 对标
  - 只有当 GI 的打法和集成变得可复制后，再从结肠镜和 EGD 扩到相邻 ASC 专科
strategyMap:
  northStarMetric: 符合条件的 GI 病例里，当天签署、带证据回链、且后续没有编码问询的占比
  inputMetrics:
  - 当前就带拒付、缺人或标准化触发点的合格平台机会数
  - 目标房间里具备生产级视频与元数据采集的占比
  - 从术式结束到医生签署病历的中位分钟数
  - 按术式类型和模板拆分后的单病例医生修改中位数
  - 每个争议病例的编码问询率和申诉备料分钟数
  - 从试点房间转成生产覆盖的比例
  moatsToBuild:
  - GI 专属的视频到术式本体与质量要素映射
  - 修改与回款反馈闭环，知道哪类证据包过审最快
  - 把文档质量、吞吐和拒付结果连起来的多点位 对标 数据集
  killCriteria:
  - 前置审计后，已评估目标房间里可用视频和元数据覆盖率低于 60%。
  - 前 200 个接近生产环境的病例里，医生修改率仍高于草稿字段的 20%。
  - 前 2 个试点没能把病历周转时间至少砍掉 50%，或把编码/申诉备料工作量至少砍掉 30%。
  mermaid: |
    flowchart LR
      Wedge[GI 当日理赔切口] --> MVP[视频回链病历与证据 MVP]
      MVP --> Proof[当天签署，编码返工更少]
      Proof --> Expansion[平台 铺开 与审计应对分析]
investorMemo:
  verdict:
    call: 值得见 / 继续尽调
    conviction: GI 这条切口很扎实，买家痛点也真；但要不要更高确信度，还是得看真实 ASC 工作流里能不能证明采集覆盖够高、医生修改负担够低。
    whyBelieve: 公司盯住的是一处很窄、却很关键的收入周期控制点：现有文档系统和泛环境式 AI 都没真正把带时间戳、视频原生的理赔防守做好。
    whyDoubt: 如果真正保留可用视频的房间太少，或者现有 GI 报告厂商在公司拿下分发前就把 AI 证据工作流补得差不多，这个市场会很快被压扁。
    nextDiligence: 先核实一笔付费 GI 平台试点：视频覆盖达到生产级、医生修改很少，而且编码问询或付费方应对人力确实下降。
  firstCustomer:
    title: PE 支持的多点位 GI 平台收入周期副总裁
    profile: 一家拥有 30-60 间房的运营方：编码集中、已有 GI 报告软件、结肠镜和 EGD 量稳定，而且正被并购后的标准化或拒付激增推着改文档。
    trigger: 病历补录激增、付费方降码、编码岗位空缺，或并购后的流程整合，只要出现其中一个，就会把“当天出具、带证据回链的报告”推成紧急经营项目。
    buyer: CFO 或收入周期副总裁
    initialContract: 10-20 间房、一个编码中心的付费试点，价格 $60k-$120k；如果运营方跨站点扩开，再转成大约 $250k-$500k 的平台年约，外加按病例计费。
  mustBeTrue:
  - 前 10 个合格 GI 平台里，至少有 3 家愿意在要求整套替换式文档系统之前，先为试点付费。
  - 试点房间里至少 70% 的病例，视频和元数据质量足以生成可用的首稿。
  - 医生审核的中位时长会明显下降，让当天签署实打实快过现有流程。
  - 带时间戳的证据包会把编码问询、病历补录或申诉备料工作量压到一个让经济买方愿意给预算的水平。
  - 现有报告厂商补齐证据回链能力的速度，不会快到足以拦住前 5 个企业客户。
  diligenceQuestions:
  - 目标 GI ASC 房间里，到底有多少已经存下了全保真、带元数据、并且生产环境可访问的术式视频？
  - 30-60 间房的 GI 平台里，主流现有栈组合到底是哪几种？产品今天又能往哪里回写或挂证据？
  - GI 医生能接受的修改率阈值到底是多少？超过这个点，草稿就会被视为额外文档工作。
  - 在真实交易里，哪类 ROI 证明转化最快：当天病历周转、编码效率、降码减少，还是申诉应对更快？
  - GI 平台买家有多大比例更愿意扩展 Provation、EndoSoft 或 Epic 的现有流程，而不是单独再买一层理赔防守能力？
operatingAssumptions:
- assumption: 足够多的目标 GI 房间已经在采集并留存可用的术式视频和元数据，足以支持软件先行 铺开。
  basis: research.yaml
  validationTest: 在 3 家 共创客户 账户里审计至少 100 间房的采集质量，并确认至少 70% 达到结肠镜和 EGD 病历生成的最低覆盖门槛。
  decisionImpact: 如果不成立，就把 ICP 收窄到采集基础设施已经标准化的运营方，或把定位改成“影像回链文档”，而不是完整的视频原生工作流。
- assumption: 只要 AI 起草的 GI 病历直接进现有签署队列，而且修改负担很低，医生就愿意审和签。
  basis: idea.yaml
  validationTest: 在前 200 个试点病例里量单病例修改中位数、审核时长和当天签署率；目标是草稿字段被修改的比例低于 20%，当天签署率至少 80%。
  decisionImpact: 如果不成立，产品就得进一步收窄范围、调整 UX，或把价值主张从“节省医生时间”改成更偏编码效率。
- assumption: 收入周期负责人会愿意单独为这层证据回链能力买单，而不是一上来就要求替换整套现有 GI 文档系统。
  basis: research.yaml
  validationTest: 做 12 场合格买家访谈，并拿下至少 3 个付费试点；这些试点必须是写回现有系统，而不是整体替换。
  decisionImpact: 如果不成立，销售周期就会变得更大、更 IT 驱动，也会逼着公司比原计划更早走合作或 OEM。
- assumption: 第一个试点能在一个季度内，把编码问询、文档补录或申诉备料工作量做出可量化下降。
  basis: research.yaml
  validationTest: 在一个编码中心里，把试点前后的问询量、补录率和申诉备料分钟数拉通对比 90 天，并确认其中至少一项改善达到 30%。
  decisionImpact: 如果不成立，定价和融资叙事就得从收入周期 ROI 转向文档合规或医生效率。
- assumption: 前 18 个月里，GI 优先的专科化路线比泛手术定位更能带来销售速度和产品信任。
  basis: 运营判断
  validationTest: 把 GI 专属机会和任何进入漏斗的更广义手术机会放在一起，持续跟踪转化率、周期时长和实施负担。
  decisionImpact: 如果不成立，公司就该更早扩到相邻门诊专科，或和更广的手术平台合作，而不是死守单一垂直。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 12-15 位近期正被拒付或标准化问题困住的 GI 平台 CFO、收入周期副总裁、编码负责人和内镜运营负责人。
  hypothesis: 最先拍板的买家会是多点位 GI 平台里的收入周期负责人，而不是创新预算或 CIO 预算。
  successMetric: 至少 8 场访谈能讲出当前明确的购买触发点，其中 3 家同意做范围清晰的工作流评估。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 在一家 共创客户 平台里，先跑视频和元数据的上线前审计。
  hypothesis: 滩头市场里的生产级采集覆盖足够高，撑得起软件先行 铺开。
  successMetric: 被审计的房间里，至少 70% 通过最低采集与元数据门槛。
  owner: 创始工程师
- horizon: 0–90 天
  experiment: 拿现有录像，对一批结肠镜和 EGD 病例做 concierge 式的带证据回链病历草稿。
  hypothesis: 哪怕自动化还没完全跑通，只要 GI 本体够窄，也能先产出医生觉得真有用的草稿。
  successMetric: 临床人员对样本草稿的评价里，至少 70% 认为可审，且修改工作量中等或更低。
  owner: 产品负责人
- horizon: 90–180 天
  experiment: 在 10-20 间房启动一个付费试点，并把病历周转时间和编码问询率与基线做对比。
  hypothesis: 当天出具、带证据回链的草稿，能把文档延迟和后续返工压到足以支撑平台扩张的程度。
  successMetric: 试点流程里的病历完成中位时长至少快 50%，编码问询率至少降 20%。
  owner: 创始人 / CEO
- horizon: 90–180 天
  experiment: 把试点里遇到的前两种主流现有栈组合拿来做集成打包测试。
  hypothesis: 回写和证据挂载可以产品化，不需要每个中心都做一遍定制开发。
  successMetric: 两种可复用的连接器模式，就能覆盖前 3 个上线站点里至少 80% 的工作流步骤。
  owner: 创始工程师
- horizon: 6–12 个月
  experiment: 在一个编码中心里，持续跟踪 铺开 前后争议理赔和申诉备料工作的变化。
  hypothesis: 带时间戳的证据包，除了更快起草病历之外，还能带来可量化的付费方防守杠杆。
  successMetric: 争议病例里的申诉备料分钟数至少下降 30%，或与证据相关的编码升级明显减少。
  owner: 收入周期负责人
- horizon: 12–18 个月
  experiment: 和一家 GI 文档或编码顾问机构试跑一条合作伙伴主导的共销路径。
  hypothesis: 一旦有了可引用部署，围绕集成或 ROI 的渠道引荐就能成立，同时不至于把价格打穿。
  successMetric: 至少有 2 个合格机会来自一条可重复的合作伙伴渠道。
  owner: 合作负责人
operations:
- 上线前先做房间审计：视频留存、元数据完整性、工作流回写点和 HIPAA 安全要求都要摸清。
- 在扩专科之前，先把结肠镜和 EGD 的 GI 术式本体、质量指标规则和证据回链 QA 做扎实。
- 把病历周转、医生修改、编码问询和争议理赔结果拉成一张按房间、按站点看的运营看板。
- 把早期平台 铺开 里最常见的 GI 报告系统和 EHR 组合，沉淀成实施 打法手册。
- 所有回链视频和文档产物都要保留带时间戳的审计轨迹和访问控制。
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 负责创始人主导销售、共创客户 招募和 ROI 叙事，因为前几单全靠收入周期痛点够清楚、也够让高管信。
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责搭采集、证据回链，以及第一批可复用的 GI 报告工作流集成模式。
- role: 产品与临床工作流负责人
  startTiming: Month 1
  rationale: 把 GI 文档、质量指标和编码要求，压成医生真会签字的窄产品范围。
- role: 解决方案工程师
  startTiming: Month 4
  rationale: 负责房间审计、部署打包，以及客户侧实施问题，别让它们最后全变成定制开发。
- role: 收入周期与编码专家
  startTiming: Month 6
  rationale: 负责验证理赔防守证据包，量化编码和申诉 ROI，并推动试点转成平台合同。
- role: 合作负责人
  startTiming: Month 9
  rationale: 只有在第一批直销部署跑出价值后，才去和 GI 文档与咨询伙伴建立共销关系。
milestones:
- horizon: 0–12 个月
  items:
  - 在滩头市场里签下 3 个付费 GI 平台试点。
  - 在第一家 共创客户 平台里证明至少 70% 的视频和元数据可用。
  - 启动一个覆盖 10-20 间房的生产级试点，并让至少 80% 的符合条件病例在当天完成病历签署。
  - 至少跑出一项可量化下降：编码问询、文档补录，或申诉备料工作量。
- horizon: 12–24 个月
  items:
  - 至少把 2 个试点转成年约平台合同。
  - 为早期客户里最常见的 GI 报告栈组合交付可复用连接器。
  - 补上 对标 和拒付应对分析，把收入拉到基础病历生成之外。
  - 建立一条可重复的合作伙伴渠道，能持续供给或加速企业级交易。
- horizon: 24–36 个月
  items:
  - 做到 4 个真实上线的 GI 平台、约 120 间生产房。
  - 在不明显抬高实施负担的前提下，从结肠镜和 EGD 扩到至少一个相邻门诊术式家族。
  - 证明来自分析与审计应对模块的扩展收入，已经超过试点服务收入。
risks:
- risk: 不同 GI 平台之间，房间级视频采集和元数据质量差异太大。
  likelihood: High
  impact: High
  mitigation: 先做上线前采集审计，只从本来就稳定录制的运营方开始；只有在不破坏经济性的前提下，才允许极窄范围的人工补元数据。
- risk: 医生的修改负担一直压不下来，导致当天审核看起来像额外文书劳动。
  likelihood: High
  impact: High
  mitigation: 只盯重复度最高的结肠镜和 EGD 工作流，把草稿塞进现有签署队列；在修改指标稳定够低之前，坚决不扩。
- risk: 现有 GI 报告厂商在这家创业公司拿下分发前，就把 AI 辅助起草能力做得够用了。
  likelihood: Medium
  impact: High
  mitigation: 差异化别只押在病历起草，要押在带时间戳的证据回链、编码工作流和拒付应对结果；如果正面替代压力上来，就及时转向合作或 OEM。
- risk: 买家把 AI 输出只当参考，没有更强的回款证明就不给预算。
  likelihood: Medium
  impact: High
  mitigation: 先打“医生审核工作流”这张牌，严密量基线与试点 ROI，并把早期客户在问询、补录和申诉上的结果做成可引用案例。
- risk: 企业级集成和安全评审把试点拖得太慢，不适合 pre-seed 阶段的销售经济性。
  likelihood: Medium
  impact: Medium
  mitigation: 把试点打包成有限范围版本，先优先做最常见的 GI 栈；在扩 GTM 团队之前，先补解决方案工程。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道应足以覆盖 3-5 个试点、核心“视频到病历”和证据回链产品研发、首批主流 GI 栈集成、HIPAA 级安全与实施打包，以及一支覆盖工程、产品工作流和创始人主导销售的小团队。
