topRisks:
  - name: Cloud provider counter-move
    description: >-
      AWS, Azure, and GCP could bundle native long-context batch scheduling into their managed inference APIs,
      commoditizing the core wedge within 12–18 months.
    mitigation: >-
      Build multi-cloud and self-hosted model compatibility before any single provider ships competing batch APIs and
      shift moat to proprietary job-shape datasets and FinOps integrations cloud providers cannot easily replicate.
  - name: Open-source substitution
    description: >-
      The vLLM or LiteLLM communities could add throughput-aware batch scheduling as an open-source feature,
      undermining the commercial value proposition.
    mitigation: >-
      Contribute core scheduling primitives to open source as a distribution channel while keeping the managed control
      plane, cost attribution engine, and multi-endpoint routing proprietary.
  - name: Single-source evidence gap
    description: >-
      Fractile's hardware performance claims (40 to 1,200 tokens/sec) are unverified by independent benchmarks; if
      the hardware thesis proves overblown, urgency signals for inference scheduling may weaken.
    mitigation: >-
      Validate customer pain directly through ML infra interviews before Series A; the scheduling product's value case
      is independent of Fractile's hardware shipping on schedule.
