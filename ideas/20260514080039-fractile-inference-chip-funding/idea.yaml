jobsToBeDone:
  - job: >-
      When my inference bill spikes above budget, help me understand which jobs are driving cost so I can selectively
      defer low-priority batch jobs and protect latency SLAs on customer-facing requests.
    currentAlternative: Manual review of cloud cost explorer dashboards with no per-job cost granularity
    successMetric: Monthly inference spend reduced by 50% with no degradation to P95 latency on SLA-critical requests
  - job: >-
      When I need to process 500 documents overnight with 100k-token contexts each, help me schedule and batch the
      workload intelligently so I can complete the run without provisioning additional GPU capacity.
    currentAlternative: Over-provisioning H100 instances and manually queuing jobs with vLLM's default scheduler
    successMetric: Batch run completes on existing infrastructure with GPU utilization above 75% and per-document cost reduced by 60%
