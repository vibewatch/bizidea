problem: >-
  ML engineering teams building production agentic systems and RAG pipelines over large document corpora face ballooning
  inference costs and unpredictable latency as context windows grow beyond 32k tokens. Existing serving frameworks like
  vLLM and TGI were optimized for short-context, latency-first online serving and lack native support for batching,
  sharding, and prioritizing throughput-bound long-context jobs. The result is gross GPU overprovisioning, multi-hour
  job queues, and no cost-attribution tooling that connects token spend to business-level outcomes.
targetUser:
  primary: ML infrastructure engineers at Series A–C AI-native startups running production agentic pipelines with context windows exceeding 32k tokens
  secondary: Platform engineering leads at mid-market enterprises adopting LLM-backed document processing or legal review workflows
  buyer: VP of Engineering or Head of ML Infrastructure
startupThesis:
  nonObviousInsight: >-
    The inference bottleneck is not purely hardware-limited—it is a scheduling problem. Long-context LLM jobs have
    throughput-bound, batch-friendly characteristics identical to HPC workloads, yet every major inference serving
    framework treats them as low-latency online requests. Fractile's raise is a hardware bet; the complementary software
    scheduling layer—a scheduler that understands job shape, context length, and SLA tiers—is the whitespace a
    software-only startup can capture now without fabricating chips.
  beachhead: >-
    Series A–C AI-native startups (10–80 engineers) running production document-analysis or code-review agents that
    regularly process 64k–200k token contexts and are already spending more than $30k per month on inference
  wedge: >-
    A drop-in Python SDK plus cloud control plane that intercepts inference requests, profiles them by context length,
    batches compatible jobs, and routes to the cheapest available endpoint—reducing per-job cost 50–70% with a
    sub-hour integration
  whyNowCatalyst: >-
    Fractile's $220M raise in May 2026 crystallizes investor and operator consensus that inference throughput is the
    new frontier; ML teams are actively seeking software-layer fixes while next-generation hardware is still 12–18
    months from general availability.
  ventureScalePath: >-
    Start with the scheduling SDK for agentic inference teams, expand into a full inference FinOps platform (cost
    attribution, budget alerts, capacity planning), then offer a managed multi-cloud inference broker that abstracts
    across Nvidia, Fractile, and cloud TPUs as heterogeneous inference hardware proliferates.
solution: >-
  The product is a cloud-hosted inference scheduling control plane deployed as a thin proxy in front of any
  OpenAI-compatible endpoint. When a request arrives, the scheduler profiles the job by context length, priority tier,
  and deadline, then dynamically batches it with compatible in-flight requests and selects the cheapest endpoint that
  meets the latency SLA. Teams instrument their code with a single SDK call and immediately see per-job cost
  breakdowns, queue depth, and throughput metrics in a dashboard. The scheduler's batching engine achieves GPU
  utilization rates above 80% compared to the industry-typical 30–40% seen in over-provisioned setups. For jobs with
  relaxed deadlines—overnight batch analysis, large-corpus ingestion—the scheduler automatically downgrades to
  preemptible compute and reduces effective per-token cost by 60–70%.
