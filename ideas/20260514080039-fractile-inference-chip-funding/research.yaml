competitors:
- name: AWS Bedrock
  stage: incumbent
  wedge: Native batch inference, cache pricing, and reserved/provisioned cloud controls inside AWS.
  pricing: Usage-based token pricing with 50% lower batch pricing on supported models; provisioned throughput via account team.
  strength: Trusted enterprise procurement path with integrated logging, quotas, and adjacent AWS services.
  weaknessVsUs: Primarily optimizes workloads that stay on AWS, not a neutral broker across clouds, self-hosted stacks, and new hardware.
  sourceRefs:
  - 2
  - 1
- name: Baseten
  stage: scale-up
  wedge: Managed inference platform combining infrastructure and runtime optimizations for reliability, speed, and cost.
  pricing: Public token pricing for model APIs plus compute-based dedicated deployments and enterprise plans.
  strength: Deep production focus, self-host options, and strong inference branding backed by fresh capital.
  weaknessVsUs: Wants customers on Baseten rather than routing across every endpoint the buyer already uses.
  sourceRefs:
  - 9
  - 8
  - 7
- name: Fireworks AI
  stage: scale-up
  wedge: Fast serverless and deployment-based inference with public cached-token and batch discounts.
  pricing: Public per-token serverless pricing, 50% cached-input discount, 50% batch discount, and GPU-hour on-demand pricing.
  strength: Clear speed/cost messaging and prompt-caching mechanics for repeated-prefix workloads.
  weaknessVsUs: Still a single-vendor execution venue rather than an optimizer across clouds and self-hosted clusters.
  sourceRefs:
  - 16
  - 17
- name: Together AI
  stage: scale-up
  wedge: Open-source model cloud with serverless, dedicated, and batch inference under one commercial umbrella.
  pricing: Public per-token pricing with batch inference marketed at 50% lower cost for many models.
  strength: Broad model catalog and strong appeal to AI-native teams that prefer open models.
  weaknessVsUs: Economic incentive is to land more traffic on Together rather than arbitrage between providers.
  sourceRefs:
  - 36
  - 35
- name: Anyscale
  stage: scale-up
  wedge: Ray Serve orchestration plus vLLM-based serving for teams willing to run a more customizable platform.
  pricing: Custom / enterprise-led pricing not publicly detailed on the cited serving overview pages.
  strength: Strong open-source credibility and a flexible orchestration story for advanced teams.
  weaknessVsUs: Heavier platform adoption path than a drop-in scheduler and still leaves cost attribution policy work to the customer.
  sourceRefs:
  - 6
  - 5
regulatoryTechnicalConstraints:
- point: Batch APIs often exclude interactive features like tool calling or structured output, which limits where a scheduler can defer work without changing application behavior.
  sourceRefs:
  - 2
  - 3
  - 35
- point: Prompt caching gains depend on stable prefixes and sometimes session affinity or replica locality, so software scheduling must understand workload shape, not just price tables.
  sourceRefs:
  - 4
  - 17
  - 40
- point: Throughput reservations and regional deployment modes are provider-specific, complicating a neutral control plane that must normalize quotas, latencies, and residency options.
  sourceRefs:
