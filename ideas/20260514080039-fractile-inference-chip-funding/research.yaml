openQuestions:
- What percentage of target workloads are truly deferrable batch jobs versus latency-sensitive user interactions that cannot tolerate queueing?
- How much incremental savings remains after a customer fully enables native batch, cached-input, and provisioned-throughput features on its current provider?
- Will buyers prefer a neutral broker if it sits in the hot path, or will security teams insist on cloud-native controls first?
- How quickly will specialized inference hardware become available through mainstream cloud channels, changing the endpoint mix the scheduler can optimize across?
