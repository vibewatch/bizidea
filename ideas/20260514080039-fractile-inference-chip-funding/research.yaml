  validationPlan:
  - priority: high
    question: How many target accounts have long-context jobs that are materially deferrable, rather than all traffic being user-facing and low-latency?
    evidenceToGather: 15 design-partner interviews plus a week of anonymized job traces segmented by context length and deadline.
  - priority: high
    question: Do buyers prefer a neutral control plane over managed migration to Baseten, Fireworks, Together, or one cloud provider?
    evidenceToGather: Competitive bake-offs across three live stacks with a common savings and latency dashboard.
  - priority: medium
    question: What share of savings is already captured by provider-native batch or caching features before a third-party scheduler is installed?
    evidenceToGather: Pre/post benchmarks on at least five production workloads using native vendor features only.
  - priority: medium
    question: 'Which governance controls block adoption first: residency, model approval, or observability gaps?'
    evidenceToGather: Security review notes from UK/EU and US prospects handling sensitive documents.
