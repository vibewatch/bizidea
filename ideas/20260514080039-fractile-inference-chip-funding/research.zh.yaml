  - point: 企业 GenAI 正从 pilot 走向规模化项目，真正需要优化推理运营的组织数量还会继续增加。
    sourceRefs:
    - 11
    - 13
  - point: 基础设施资本正从训练转向推理，这一点从 Fractile、Groq、Baseten 和 SambaNova/Intel 的信号都能看到。
    sourceRefs:
    - 18
    - 22
    - 7
    - 26
  - point: 云厂商和平台已经明确对 batch、cache 和 throughput 选项定价，这让买家越来越习惯按工作负载类别讨论节省空间。
    sourceRefs:
    - 1
    - 29
    - 4
    - 16
    - 36
  headwinds:
  - point: 一大块最容易拿的节省，本来就可以靠原生 provider 的 batch 或缓存功能吃到。
    sourceRefs:
    - 1
    - 29
    - 4
    - 17
    - 35
  - point: 技术强的买家可以直接在开源栈上自建，降低他们为无差异路由逻辑付费的意愿。
    sourceRefs:
    - 41
    - 6
    - 28
    - 27
  - point: Governance and data-protection requirements can limit endpoint choice for the exact document-heavy workloads that most need cost optimization.
    sourceRefs:
    - 31
    - 14
    - 25
competitors:
- name: AWS Bedrock
  stage: 现有厂商
  wedge: AWS 体系内原生的 batch inference、缓存定价和预留/预配云控制。
  pricing: 按 token 用量收费；支持模型的 batch 定价低 50%；预配吞吐通过客户团队报价。
  strength: 企业采购路径成熟，日志、配额和周边 AWS 服务一体化。
  weaknessVsUs: 主要优化留在 AWS 上的工作负载，不是面向跨云、自托管栈和新硬件的中立 broker。
  sourceRefs:
  - 2
  - 1
- name: Baseten
  stage: 成长期
  wedge: 托管推理平台，把基础设施和 runtime 优化打包，卖稳定性、速度和成本。
  pricing: 公开 token 定价，另有按算力计费的专属部署和企业方案。
  strength: 强生产导向、支持 self-host，且在推理赛道里品牌很强，最近也拿到新资金。
  weaknessVsUs: 它希望客户把负载留在 Baseten，而不是在买家已使用的所有端点之间做路由。
  sourceRefs:
  - 9
  - 8
  - 7
- name: Fireworks AI
  stage: 成长期
  wedge: 高性能 serverless 与部署式推理，公开给出 cached token 与 batch 折扣。
  pricing: 公开 serverless 按 token 定价，cached-input 折扣 50%，batch 折扣 50%，也提供按 GPU 小时计费的按需价格。
  strength: 速度/成本叙事清楚，针对重复前缀工作负载的 prompt caching 机制也成熟。
  weaknessVsUs: 它仍然是单一执行场所，不是一个跨云和自托管集群的优化层。
  sourceRefs:
  - 16
  - 17
- name: Together AI
  stage: 成长期
  wedge: 把 serverless、dedicated 和 batch inference 放在同一商业体系下的开源模型云。
  pricing: 公开按 token 定价，且对很多模型宣传 batch inference 成本低 50%。
  strength: 模型目录广，对偏好开源模型的 AI-native 团队吸引力强。
  weaknessVsUs: 它的经济激励是把更多流量留在 Together，而不是在多个 provider 之间做套利。
  sourceRefs:
  - 36
  - 35
- name: Anyscale
  stage: 成长期
  wedge: 提供 Ray Serve 编排加 vLLM serving，适合愿意使用更可定制平台的团队。
  pricing: 企业导向的定制定价，公开页面未给出明确数字。
  strength: 开源信誉强，面向高级团队的编排叙事也完整。
  weaknessVsUs: 相比可直接接入的调度器，它的采用路径更重，而且成本归因与策略工作仍要客户自己补。
  sourceRefs:
  - 6
  - 5
regulatoryTechnicalConstraints:
- point: batch API 往往不支持工具调用或结构化输出这类交互能力，所以调度器能延后的工作，不能靠改变应用行为来硬做。
  sourceRefs:
  - 2
  - 3
  - 35
- point: prompt caching 的收益取决于前缀是否稳定，有时还依赖 session 亲和性或 replica locality，所以软件调度不能只看价格表，还得懂工作负载形态。
  sourceRefs:
  - 4
  - 17
  - 40
- point: 吞吐预留和区域部署模式高度 provider-specific，这会显著增加中立控制平面对配额、时延和驻留选项的归一化难度。
  sourceRefs:
  - 30
  - 21
  - 23
- point: 只要请求可能跨区域或跨模型提供方，敏感企业文档流就需要可审计的治理与数据保护控制。
  sourceRefs:
  - 31
  - 14
  - 25
validationSignals:
- point: Fractile 的 $220M 融资，明确把推理时延定义成训练之后的下一个瓶颈。
  sourceRefs:
  - 18
- point: Baseten 和 Groq 都围绕推理基础设施拿到大额融资，说明这个类别还在持续吸资本。
  sourceRefs:
  - 7
  - 22
- point: 云厂商和托管平台已经把 batch 与缓存折扣直接写进定价页，说明买家早就在按工作负载类别，而不只是模型质量，来优化成本。
  sourceRefs:
  - 1
  - 29
  - 16
  - 36
  - 4
- point: 社区和一线操盘材料里仍不断冒出 long-context 性能痛点和 continuous batching 的收益，说明这不是一个抽象问题。
  sourceRefs:
  - 19
  - 5
  - 10
openQuestions:
- 目标工作负载里，真正可延后的 batch 任务占比是多少？又有多少是不能排队的低时延用户交互？
- 当客户把当前 provider 的原生 batch、cached-input 和 provisioned-throughput 全部开足后，还剩多少增量节省？
- 如果中立 broker 必须跑在热路径上，买家还会偏向它吗？还是安全团队会先要求云原生控制？
- 专用推理硬件要多久才会通过主流云渠道大规模可得，并进而改变调度器可优化的端点组合？
