reportMemo:
  executiveTakeaways:
  - long-context 推理已经是实打实的运营问题，但现有厂商大多给的是点状优化——batch API、prompt caching 或 provider-specific serving stack——而不是一套按上下文长度、SLA 和最便宜可行端点来分类任务的中立调度器 [18][2][4][40]。
  - 最适合起步的买家，仍然是已经为生产推理付费的 ML infra 负责人，因为企业 AI 正从 pilot 走向规模化部署，而组织在扩实验和补治理这两件事上依然卡得很厉害 [11][13]。
  - 竞争很激烈，但格局仍然分散：超大云卖吞吐预留，托管平台卖自己云上的更快推理，开源栈给原语；真正的空白，是跨 provider 的成本归因，加上对 long-context 任务做 SLA 感知路由 [1][30][9][16][28]。
  - 技术 thesis 站得住，因为文献已经证明，持续批处理、prefix caching 和 prefill/decode 解耦都能带来明显增益；在 Fractile 或 Cerebras 这类定制芯片还没全面普及前，创业公司先把编排层商业化是可行的 [37][38][39][12]。
  - 监管摩擦可控，但绝不轻：买家一旦把敏感文档路由到多个端点，就需要能审计的治理、区域控制和数据保护姿态，而不只是更低时延 [31][14][25][29]。
  marketDefinition: 这个市场指的是：服务于 long-context LLM 推理的控制平面软件，位于模型 API、自托管 runtime 和托管推理云之上。它给任务做形态画像、把兼容请求排队拼批、结合 batch/caching 感知做路由，并按工作负载归因支出。这个市场不包括通用模型托管，也不包括泛可观测性工具，除非它们明确在优化 long-context 批处理经济性和跨 provider 调度 [2][30][35][41]。
  customerAndBuyer: 主要用户是 ML infrastructure 工程师和平台团队：他们在运营生产级的文档分析、代码分析或 agentic 工作流，提示词很长、截止时间也参差不齐。真正的经济买家通常是 Head of ML Infrastructure、VP Engineering，或对吞吐、时延和云 GPU 支出负责的中央平台 owner [11][13][9]。
  buyingTriggers:
  - point: 当月度推理支出大到值得系统化地运营 batch、缓存和预留吞吐折扣，而不是再靠人工管理时，采购意愿会起来。
    sourceRefs:
    - 1
    - 29
    - 4
    - 16
    - 36
  - point: 当 long-context 任务或隔夜文档批处理在现有 vLLM/TGI 栈上带来明显排队、解码变慢或尾时延失稳时，买方会开始找解法。
    sourceRefs:
    - 19
    - 9
    - 5
  - point: 当管理层把推理视为下一个基础设施瓶颈，并在下一代硬件大规模落地前先拨预算做优化时，购买就会被推进。
    sourceRefs:
    - 18
    - 22
    - 7
    - 26
  willingnessToPay:
    summary: 市场已经接受为优化能力做明确价格分层。Anthropic 对 cache read 收费远低于基础输入价，AWS 和 Azure 都公开打出 50% 的 batch 折扣，Fireworks 对缓存 token 和 batch token 也给折扣，Together 则直接宣传 batch inference 成本低 50%。这给调度器留出了可信的预算空间——前提是它能证明自己在单一 provider 之外还能再多省一截 [4][1][29][16][36]。
    sourceRefs:
    - 4
    - 1
    - 29
    - 16
    - 36
  competitiveLandscape: 竞争格局可以拆成四类。超大云（AWS、Azure、Vertex）在单一云里卖 batch、缓存和预留吞吐 [1][30][21]。Baseten、Fireworks、Together 这类托管推理平台，卖的是它们自己基础设施上的更快、更便宜推理 [9][16][36]。Anyscale、vLLM、LiteLLM、BentoML、KServe 这类开源编排层提供的是原语，但集成和策略工作仍然压在买家身上 [6][41][28][10][27]。Groq、Cerebras、SambaNova、Fractile 这类专用硬件厂商则把性能天花板继续往上抬，同时也让端点异构性更强，反而进一步强化了中立路由层的价值 [22][12][26][18]。
  incumbentThesis:
  - incumbentClass: 云平台
    point: AWS、Azure 和 Vertex 越来越多地暴露 batch 与预留吞吐控制，但这些能力都长在云厂商自己的体系里，默认并不能解决跨 provider 调度或硬件无关的 FinOps。
    sourceRefs:
    - 2
    - 1
    - 30
    - 29
    - 21
  - incumbentClass: 托管推理平台
    point: Baseten、Fireworks 和 Together 已经能把速度和成本效率卖出去，但它们的胜法是把工作负载留在自家栈里，而不是在多套栈之间替客户挑最便宜端点。
    sourceRefs:
    - 9
    - 8
    - 16
    - 36
    - 35
  - incumbentClass: 开源与自建
    point: vLLM、LiteLLM、Ray Serve、BentoML 和 KServe 给了强团队足够多原始零件，但买家仍要自己设计路由策略、节省归因和可靠性运营。
    sourceRefs:
    - 40
    - 41
    - 6
    - 28
    - 10
    - 27
  - incumbentClass: 专用推理硬件
    point: Groq、Cerebras、SambaNova 和 Fractile 能把 tokens-per-second 抬高，但它们并没有解决“先分类工作负载、在多个端点间裁决、再按任务类型解释支出”这件事。
    sourceRefs:
    - 22
    - 23
    - 12
    - 26
    - 18
  regulatoryLandscape: 真正的主要约束不是芯片监管，而是企业在模型路由和敏感数据上的治理要求。NIST 的 GenAI profile 推动组织建立结构化的 govern-map-measure-manage 控制，EU AI Act 提高了企业 AI 治理审视强度，ICO 也提醒 UK 买家：AI 系统依然要承担数据保护问责。与此同时，云部署选择本身也很关键，因为 provider 之间对 global、regional 和 data-zone 吞吐模式的区分越来越细 [31][14][25][29]。
  technologyLandscape: 底层原语已经齐了。PagedAttention 让 KV-cache 内存管理变得可行，SARATHI 和 Splitwise 证明更聪明的批处理与阶段拆分能带来吞吐/成本收益，NVIDIA 也开始直接宣传 disaggregated serving 工具，因为调优复杂度已经是现实问题。与此同时，vLLM、TGI、Ray Serve、BentoML 和 KServe 说明：runtime 创新的推进速度，已经快过大多数企业团队自己把它们运营起来的速度 [37][38][39][32][41][24][10][27]。
  distributionChannels:
  - point: 通过 vLLM、LiteLLM、BentoML、Ray 和 KServe 社区做开源分发，能直接触达那些已经在自己缝补批处理和路由的操盘手。
    sourceRefs:
    - 40
    - 6
    - 28
    - 10
    - 27
  - point: 直接 outbound 找 AI-native 创业公司的 ML infra 负责人也成立，因为很多买家本来就已经背着推理账单，急需一个马上能落地的运营修复工具。
    sourceRefs:
    - 11
    - 13
    - 9
  - point: 云厂商和加速器合作是有机会的，因为异构端点越来越多，厂商希望负载被导向自己的容量，却又不想强迫客户整个平台迁移。
    sourceRefs:
    - 30
    - 22
    - 12
    - 26
  partnershipEcosystem:
  - point: 模型与云 API 提供方是天然合作伙伴，因为 batch、缓存和预留吞吐这些能力，只有被更好的编排和策略默认值接住，利用率才会上去。
    sourceRefs:
    - 1
    - 30
    - 21
    - 4
  - point: 开源 serving 项目是渠道互补，而不是正面替代：调度器可以架在 vLLM、Ray Serve、LiteLLM、BentoML 或 KServe 之上。
    sourceRefs:
    - 41
    - 6
    - 28
    - 10
    - 27
  - point: 专用硬件厂商也会受益于中立控制平面，因为它能只把合适的工作负载导到这些基础设施上。
    sourceRefs:
    - 18
    - 22
    - 12
    - 26
  dataMoats:
  - point: 跨 provider 的遥测——上下文长度、prefix 复用率、截止时间松弛度，以及每个完成任务的真实成本——能沉淀成一套通用 runtime 看不到的专有路由数据集。
    sourceRefs:
    - 4
    - 17
    - 40
    - 23
  - point: 历史策略结果——何时该拼批、何时该拆 prefill/decode、何时该降级到 async 端点——会慢慢长成一套难以靠静态文档复现的调度模型。
    sourceRefs:
    - 38
    - 39
    - 32
    - 5
  geographicConsiderations:
  - point: 美国优先、敏感度较低的工作负载最适合起步，因为买家可以在不立刻触发驻留争议的前提下，优化更多端点。
    sourceRefs:
    - 29
    - 22
    - 12
  - point: EU 和 UK 买家仍然值得做，但必须先把路由控制讲清楚，因为 AI 治理和数据保护问责会压缩可接受的模型与区域范围。
    sourceRefs:
    - 14
    - 25
    - 29
  sensitivityCases:
  - case: 超大云把 batch、缓存和预留吞吐做得更容易原生运营
    impact: 除非创业公司能证明自己在跨 provider 分配、任务级成本归因或部署速度上，比单云控制更强，否则切口会迅速收窄。
    sourceRefs:
    - 2
    - 1
    - 30
    - 21
  - case: prompt caching 和更便宜的 async API 把重复前缀工作负载里最容易拿的节省先吃掉
    impact: 价值会从“直接打折”转向策略、可观测性和跨端点调度，重点服务那些本来就吃不到缓存红利的负载。
    sourceRefs:
    - 4
    - 17
    - 36
  - case: 专用推理硬件显著提升 long-context 吞吐
    impact: 调度器反而可能更有用，因为端点异构性更强；但“纯软件就能在现有 GPU 上大幅降本”的说法需要重新包装。
    sourceRefs:
    - 18
    - 22
    - 12
    - 26
  validationPlan:
  - priority: high
    question: 目标账户里，到底有多少 long-context 任务是真正能延后的，而不是全部都面向用户、必须低时延？
    evidenceToGather: 做 15 次共创客户访谈，并拿 1 周匿名任务 trace，按上下文长度和截止时间做切分。
  - priority: high
    question: 买家究竟更愿意装一个中立控制平面，还是更愿意直接迁去 Baseten、Fireworks、Together 或某家云厂商？
    evidenceToGather: 在 3 套真实栈上做对照 bake-off，并统一用同一套节省与时延看板来比较。
  - priority: medium
    question: 在装第三方调度器之前，原生 provider 的 batch 或缓存功能已经拿走了多少节省？
    evidenceToGather: 至少在 5 个生产工作负载上，先只开原生厂商功能做前后 benchmark。
  - priority: medium
    question: 最先卡 adoption 的治理控制是什么：驻留、模型审批，还是可观测性缺口？
    evidenceToGather: 收集 UK/EU 与美国敏感文档 prospect 的安全审查记录。
