topRisks:
- name: 云厂商反制
  description: AWS、Azure 和 GCP 可能会把原生 long-context 批量调度直接打包进托管推理 API，12–18 个月内就把核心切口商品化。
  mitigation: 在任何单一云厂商推出竞争性 batch API 之前，先把多云和自托管模型兼容性做出来，并把护城河转到专有任务形态数据和云厂商难以复制的 FinOps 集成上。
- name: 开源替代
  description: vLLM 或 LiteLLM 社区可能会把“感知吞吐”的批量调度做成开源能力，削弱商业产品的价值主张。
  mitigation: 把底层调度原语贡献给开源，拿它做分发渠道；同时把托管控制平面、成本归因引擎和多端点路由留在商业闭源层。
- name: 单一来源证据缺口
  description: Fractile 的硬件性能说法（40 到 1,200 tokens/sec）还没有独立 benchmark 验证；如果这套硬件叙事被证明夸大，推理调度的紧迫信号也会变弱。
  mitigation: 在 Series A 之前，先靠 ML infra 访谈直接验证客户痛点；这个调度产品的价值，并不依赖 Fractile 硬件是否准时出货。
