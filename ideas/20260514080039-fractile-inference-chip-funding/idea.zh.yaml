problem: 给大文档语料做生产级 agentic 系统和 RAG pipeline 的 ML 工程团队，随着上下文窗口超过 32k tokens，推理成本迅速膨胀，延迟也越来越不可预测。vLLM 和 TGI 这类现有 serving 框架，本来是为短上下文、低时延在线请求优化的，并不原生支持对吞吐受限的 long-context 任务做批处理、分片和优先级调度。结果就是 GPU 被严重超配，任务队列一排就是好几个小时，还没有一套成本归因工具能把 token 花费对应回业务结果。
targetUser:
  primary: Series A–C 的 AI-native 创业公司里的 ML 基础设施工程师；他们在生产环境运行 agentic pipeline，上下文窗口通常超过 32k tokens
  secondary: 正在导入 LLM 文档处理或法务审阅流程的中端企业平台工程负责人
  buyer: 工程副总裁或 ML Infrastructure 负责人
startupThesis:
  nonObviousInsight: 推理瓶颈不只是硬件不够，核心更是调度问题。long-context LLM 任务本质上吞吐受限、适合批处理，和 HPC 负载很像，但主流推理框架却都把它当低时延在线请求来处理。Fractile 下注的是硬件；与之互补的软件层空白，是一层真正理解任务形态、上下文长度和 SLA 分层的调度器。纯软件创业公司现在就能吃下这个空白，不用自己造芯片。
  beachhead: 先打 Series A–C 的 AI-native 创业公司（10–80 名工程师），它们已经把文档分析或代码审查 agent 跑到生产环境，常态处理 64k–200k token 上下文，而且每月推理花费已经超过 $30k
  wedge: 一个可直接接入的 Python SDK 加云端控制平面，拦截推理请求，按上下文长度给任务画像，把兼容任务打包后发往最便宜的可用端点——接入不到 1 小时，单任务成本就能降 50–70%
  whyNowCatalyst: Fractile 在 2026 年 5 月融到 $220M，把投资人和一线操盘者的共识彻底坐实：推理吞吐就是新战场。在下一代硬件距离全面可用还要 12–18 个月时，ML 团队已经在主动找软件层补丁。
  ventureScalePath: 先从 agentic 推理团队的调度 SDK 切入，再扩成完整的 inference FinOps 平台（成本归因、预算预警、容量规划），最后做成托管式多云推理 broker。等 Nvidia、Fractile 和云 TPU 这类异构推理硬件越来越多，它负责把复杂度全都抽掉。
solution: 产品是一套云托管的推理调度控制平面，作为一层轻代理，部署在任何兼容 OpenAI 的端点前面。请求一进来，调度器先按上下文长度、优先级和截止时间给任务画像，再把它和兼容的在途请求动态拼批，并挑出既满足时延 SLA、又最便宜的端点。团队只要在代码里加一次 SDK 调用，马上就能在看板里看到单任务成本拆解、队列深度和吞吐指标。调度器的批处理引擎能把 GPU 利用率拉到 80% 以上，而行业里很多超配部署通常只有 30–40%。遇到截止时间宽松的任务——比如隔夜批量分析、大语料导入——调度器会自动切到可抢占算力，把实际单 token 成本再压低 60–70%。
goToMarketSeed:
  firstCustomer: 首个客户画像，是一家 30–60 人的 Series B AI-native 创业公司里的 ML Infrastructure 负责人。它的核心产品是文档审阅或代码分析 agent，当前在 AWS Bedrock 或 Azure OpenAI 上每月推理支出已达 $50k–$120k，也试过调 vLLM，但 100k+ token 任务还是会出现延迟尖峰。
  buyingTrigger: 触发购买的节点，要么是推理账单第一次超过 $50k，要么是 long-context 任务第一次因 SLA 违约引发客户升级投诉。
  currentAlternative: 现在的替代方案，是人工把 GPU 集群配得更宽，再配合自托管 vLLM 或 TGI、临时写的队列脚本，以及不断重谈云 GPU 预留实例。
  switchingReason: 只要 30 分钟接入 SDK，就能马上看到任务级成本归因，还能把月账单砍掉 50%；相比之下，继续花几个月折腾 devops，而且还得买新硬件，显然不划算。
  pricingHypothesis: 先在 90 天 pilot 期按节省额抽成定价（拿到已验证推理成本降幅的 20%），之后切到每个 cluster 每月 $2,000–$8,000 的平台费，再叠加超出承诺量的按 token 收费。
