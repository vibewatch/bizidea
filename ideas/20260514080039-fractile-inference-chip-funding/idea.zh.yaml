differentiator: 现有推理 serving 框架（vLLM、TGI、LiteLLM）盯的是在线请求的中位时延，默认每个请求都同样紧急；这款产品则第一次把“感知吞吐”的批处理调度和按 SLA 分层的优先级机制，专门做给 long-context 任务。和云厂商自带的 batch API 不同，它不绑模型，任何兼容 OpenAI 的端点都能接，包括私有基础设施上的自托管模型。按节省额分成的定价方式，也和工程团队的利益天然一致——他们得向 CFO 证明新工具值这个钱，但又不想先背一笔固定承诺。
conceptDiagram:
