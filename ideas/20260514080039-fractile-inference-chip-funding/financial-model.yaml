    upsideCase: Delay one non-critical GTM hire until deployment count exceeds 30
    y3RevenueImpactK: -90.0
    cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ActiveDeployments
      ActiveDeployments --> PlatformRevenue
      PlatformRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: The base case reaches 67 active paid deployments by Q4Y3 at roughly $60K blended annual revenue per deployment, with most of the lift coming from repeat pilot conversion after Year 1.
  - checkName: Must go right
    finding: The product must keep proving savings beyond native batch and caching features so net adds can sustain 4-6 per quarter in Y2 and 8-12 per quarter in Y3.
  - checkName: Model breaks if
    finding: If pricing slips toward $52K and gross margin stalls near 68%, downside cash falls below zero before the next round case is proven.
  - checkName: Next-round proof
    finding: The next financing is justified if the company exits Y2 with 25 active deployments, ~68% gross margin, and multiple production references that shorten the sales cycle.
sanityChecks:
  ruleOf40: Y3 growth 224.8% + EBITDA margin -14.79% = 210.01%
  burnMultiple: Y2 burn multiple 0.93x, improving to 0.16x in Y3 on net new ARR.
  revenuePerFte: "$221K Y3 on 12 exit FTE (benchmark $200-400K SaaS)"
  flags:
    - The model still burns more than $1.0M in Y1 and $1.17M in Y2, so execution risk is concentrated in proving faster pilot conversion before cash falls under $1M.
    - Revenue per exit FTE only reaches the low end of SaaS benchmarks because solutions work and deployment support remain meaningful through Y3.
    - Q4Y3 is the first positive EBITDA quarter, so a one-to-two quarter slip in conversion timing would likely pull fundraising forward.
    - Customer counts are modeled as net of churn and small expansions; if real gross churn exceeds the 2.0% heuristic without offsetting upsell, Y3 revenue will miss materially.
