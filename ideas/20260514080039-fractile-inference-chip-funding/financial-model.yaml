    baseCase: "$60K annual revenue per active deployment"
    upsideCase: "$66K annual revenue per active deployment"
    y3RevenueImpactK: -354.0
    cashImpactK: -255.0
  - variable: CAC
    downsideCase: "$35K CAC because pilots require heavier founder and solutions time"
    baseCase: "$25.2K CAC"
    upsideCase: "$20K CAC via open-source and partner-sourced pipeline"
    y3RevenueImpactK: -140.0
    cashImpactK: -300.0
  - variable: churn
    downsideCase: 3.0% monthly churn on active deployments
    baseCase: 2.0% monthly churn
    upsideCase: 1.5% monthly churn
    y3RevenueImpactK: -175.0
    cashImpactK: -135.0
  - variable: sales cycle
    downsideCase: 9-month pilot-to-production cycle
    baseCase: 6-month blended cycle
    upsideCase: 4-5 month cycle with warm references
    y3RevenueImpactK: -320.0
    cashImpactK: -290.0
  - variable: gross margin
    downsideCase: 68% steady-state gross margin
    baseCase: 72% steady-state gross margin
    upsideCase: 75% steady-state gross margin
    y3RevenueImpactK: 0.0
