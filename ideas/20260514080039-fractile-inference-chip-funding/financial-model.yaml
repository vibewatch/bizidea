scenarios:
  downside:
    description: Native vendor features compress pricing, pilot conversion slows, and the company reaches fewer net paid deployments before a seed round.
    y3RevenueK: 1885.0
    y3EbitdaK: -1022.53
    cashLowPointK: -378.38
    keyAssumptionChanges:
      - Annual revenue per active deployment falls to about $52K.
      - Net new deployments slow to 3,4,5,5 in Y2 and 6,8,10,10 in Y3.
      - Gross margin tops out near 68% because support and infra overhead stay elevated.
  base:
    description: The company proves incremental savings beyond native tooling, keeps pricing near the middle of the BP production band, and compounds founder-led sales with open-source-led inbound.
    y3RevenueK: 2655.0
    y3EbitdaK: -392.73
    cashLowPointK: 386.95
    keyAssumptionChanges:
      - Annual revenue per active deployment stays at $60K.
      - Net new deployments follow 4,5,6,6 in Y2 and 8,10,12,12 in Y3.
      - Gross margin rises from 50% early in Y1 to 72% in Y3.
  upside:
    description: Benchmark wins and partner referrals produce faster conversion, cleaner deployment economics, and a stronger seed-ready growth story.
    y3RevenueK: 3448.5
    y3EbitdaK: 282.04
    cashLowPointK: 885.97
    keyAssumptionChanges:
      - Annual revenue per active deployment reaches about $66K through larger production scopes.
      - Net new deployments rise to 5,6,7,7 in Y2 and 10,12,14,14 in Y3.
      - Gross margin improves to roughly 75% as routing and support become more standardized.
