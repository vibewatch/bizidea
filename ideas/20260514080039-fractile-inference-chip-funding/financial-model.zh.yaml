scenarios:
  downside:
    description: 原生厂商功能压缩定价空间，pilot 转化变慢，公司在进入 seed 轮前拿到的净付费部署更少。
    y3RevenueK: 1885.0
    y3EbitdaK: -1022.53
    cashLowPointK: -378.38
    keyAssumptionChanges:
    - 每个活跃部署的年收入降到约 $52K。
    - Y2 的净新增部署放缓到 3、4、5、5；Y3 放缓到 6、8、10、10。
    - 由于支持和基础设施负担持续偏高，毛利率最高只到约 68%。
  base:
    description: 公司证明自己在原生工具之外仍能带来增量节省，定价维持在 BP production 区间中部，并把创始人主导销售和开源导流叠加起来。
    y3RevenueK: 2655.0
    y3EbitdaK: -392.73
    cashLowPointK: 386.95
    keyAssumptionChanges:
    - 每个活跃部署的年收入维持在 $60K。
    - Y2 的净新增部署按 4、5、6、6 走；Y3 按 8、10、12、12 走。
    - 毛利率从 Y1 早期的 50% 抬升到 Y3 的 72%。
  upside:
    description: benchmark 胜出与合作伙伴转介绍带来更快转化、更干净的部署经济性，以及更强的 seed-ready 增长故事。
    y3RevenueK: 3448.5
    y3EbitdaK: 282.04
    cashLowPointK: 885.97
    keyAssumptionChanges:
    - 凭更大的 production 范围，每个活跃部署的年收入提升到约 $66K。
    - Y2 的净新增部署提升到 5、6、7、7；Y3 提升到 10、12、14、14。
    - 随着路由和支持进一步标准化，毛利率提升到约 75%。
