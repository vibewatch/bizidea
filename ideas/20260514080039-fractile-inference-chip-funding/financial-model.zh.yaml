  cashImpactK: -210.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ActiveDeployments
      ActiveDeployments --> PlatformRevenue
      PlatformRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景在 Q4Y3 达到 67 个活跃付费部署，混合年收入约 $60K/部署；大部分抬升来自 Year 1 之后 pilot 的重复转化。
- checkName: 必须跑顺的事
  finding: 产品必须持续证明自己比原生 batch 和缓存功能更省钱，净新增才能在 Y2 维持每季度 4–6 个、在 Y3 维持每季度 8–12 个。
- checkName: 模型会失效的条件
  finding: 如果定价滑向 $52K，且毛利率卡在 68% 左右，downside 情景会在下一轮融资逻辑坐实前把现金打到 0 以下。
- checkName: 下一轮融资证明点
  finding: 只有当公司在 Y2 末拿到 25 个活跃部署、约 68% 毛利率，以及能缩短销售周期的多个 production reference，下一轮融资才算站得住。
sanityChecks:
  ruleOf40: Y3 增长 224.8% + EBITDA 利润率 -14.79% = 210.01%
  burnMultiple: Y2 burn multiple 为 0.93x，在 Y3 随着净新增 ARR 提升，改善到 0.16x。
  revenuePerFte: Y3 每个退出 FTE 对应收入 $221K（12 个退出 FTE；SaaS benchmark 为 $200–400K）
  flags:
  - 模型在 Y1 仍要烧掉超过 $1.0M，Y2 再烧 $1.17M，因此执行风险高度集中在：要在现金跌破 $1M 前，证明 pilot 转化能更快。
  - 由于 Y3 仍有不少 solutions 工作和部署支持，退出时每个 FTE 的收入只到 SaaS benchmark 的低端。
  - Q4Y3 才是第一个 EBITDA 转正季度，所以只要转化节奏慢 1–2 个季度，融资时间点大概率就会被迫提前。
  - 客户数按“扣除流失并包含小幅扩张后的净值”建模；如果真实毛流失超过 2.0% 这个经验值，且没有 upsell 抵消，Y3 收入会明显低于预期。
