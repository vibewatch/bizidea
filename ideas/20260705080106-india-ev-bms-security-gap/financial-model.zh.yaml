slug: india-ev-bms-security-gap
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08 年
  unit: month
  source: '[商业计划书日期 2026-07-05] 运营模型从商业计划书日期之后的第一个完整月份开始。'
- id: A2
  name: 期初现金与种子前轮融资
  value: $1.5M
  unit: USD
  source: '[商业计划书 fundingAsk.targetFundingRangeUsd $1.5-2.5M；fundingAsk.runwayMonths 18] 基准情形采用所述区间的下限，因为团队保持印度本地化，招聘在拿下首个供应商试点之前都保持精简。'
- id: A3
  name: 起始付费客户数
  value: '0'
  unit: count
  source: '[商业计划书 milestones 0-12个月；experimentRoadmap] 公司从零收入起步，必须先把事件外联转化为第一笔付费冲刺服务。'
- id: A4
  name: 活跃付费客户的定义
  value: 一笔付费车企补救冲刺服务、一份车企发布保障续约合同，或一份供应商参考技术栈试点/许可。
  unit: definition
  source: '[商业计划书 businessModel.revenueStreams；businessModel.unitOfValue] customersEop 统计的是在期末为在运行中的补救、保障或供应商技术栈范围付费的任意客户。'
- id: A5
  name: 车企事件冲刺定价
  value: 每笔车企补救冲刺 $30K
  unit: USD/account
  source: '[商业计划书 investorMemo.firstCustomer.initialContract $20k-$40k；product.mvp] 模型采用所述紧急补救区间的中点。'
- id: A6
  name: 车企持续保障服务价值
  value: 早期续约合同 $90K ARR，到第3年提升至 $120K ARR。
  unit: USD/account/year
  source: '[商业计划书 gtm.pricing 年度发布保障续约 $60k-$120k；research.bottomUpSizingDrivers 车企年度支出 $120k] 一旦证据与发布门禁工作得到验证，持续性车企收入会从商业计划书区间中段，逐步爬升到研究测算的年度支出水平。'
- id: A7
  name: 供应商试点与许可价值
  value: 每月 $15K-$25K，第3年年化约达 $300K。
  unit: USD/account
  source: '[商业计划书 businessModel.revenueStreams 供应商参考技术栈授权；research.bottomUpSizingDrivers 供应商年度支出 $300k] 供应商客户从付费试点起步，只有在车企成效证明出现之后，才能达到研究测算的基准水平。'
- id: A8
  name: 客户增长节奏
  value: 第12个月达到3个活跃付费客户，第2年第4季度达到6个，第3年第4季度达到9个。
  unit: customersEop
  source: '[商业计划书 milestones 0-12、12-24、24-36个月；research.market.som] 这与第3年达到约8个车企客户加1个供应商客户的计划相符。'
- id: A9
  name: 收入确认惯例
  value: 期末活跃客户数，乘以该期间每个活跃客户的混合已实现收入。
  unit: formula
  source: '[商业计划书 businessModel.unitOfValue；gtm.pricing] 这让收入直接与客户数量，以及冲刺服务、续约合同和供应商授权的组合挂钩。'
- id: A10
  name: 每客户混合已实现收入路径
  value: 第1年末约每月 $7.5K；第2年约每月 $8.8K-$12.5K；第3年约每月 $12.1K-$13.8K，供应商客户拉高了整体组合。
  unit: USD/account/month
  source: '[A5-A8 源自商业计划书定价和客户结构] 季度收入行反映出从一次性车企冲刺服务，逐步转向更高价值的持续保障服务加一个供应商许可。'
- id: A11
  name: 毛利率爬升路径
  value: 第1年 50%-65%，第2年 62%-68%，第3年 70%-72%。
  unit: gross margin percent
  source: '[商业计划书 businessModel.targetGrossMarginPct 70；operatingAssumptions 测试台架复用；research.adoptionFrictionMatrix] 早期工作以服务为主，随后随着重复出现的板卡家族和证据模板减少交付工时，毛利率逐步改善。'
- id: A12
  name: 招聘时间线
  value: 第1个月：创始人与创始固件工程师；第4个月：现场应用/测试工程师；第7个月：供应商合作负责人；第16个月：第二名固件工程师；基准情形在第3年之前不再新增全职员工。
  unit: timeline
  source: '[商业计划书 team；strategicChoices.sequencingRationale] 招聘持续偏向固件与现场执行能力，之后才考虑扩大团队规模。'
- id: A13
  name: 创始人综合薪酬
  value: $90K
  unit: USD/year
  source: 印度深科技创业融资经验法则，对应 [商业计划书 team 创始人／车企事件负责人]；假设创始人现金薪酬维持精简。
- id: A14
  name: 固件工程综合薪酬
  value: $90K
  unit: USD/year
  source: 印度嵌入式安全创业融资经验法则，对应 [商业计划书 team 创始固件安全工程师]；薪酬反映出 BLE、固件和协议人才的稀缺性，但未采用全球企业级薪酬水平。
- id: A15
  name: 现场应用与测试综合薪酬
  value: $45K
  unit: USD/year
  source: 印度硬件测试创业融资经验法则，对应 [商业计划书 team 现场应用与测试工程师]；该岗位在运营上至关重要，但薪酬低于资深固件工程师。
- id: A16
  name: 供应商合作综合薪酬
  value: $60K
  unit: USD/year
  source: 印度工业级 B2B 市场拓展创业融资经验法则，对应 [商业计划书 team 供应商合作与客户负责人]；包含差旅和面向合作伙伴开发的浮动薪酬。
- id: A17
  name: 薪酬分摊到损益表科目
  value: 创始人：60% 销售与市场、40% 行政管理；固件工程：100% 研发；现场应用/测试：20% 销售与市场、80% 研发；供应商合作：100% 销售与市场。
  unit: allocation
  source: '[商业计划书 team 各岗位说明；operations] 薪酬计入各职能运营支出科目，而不单列为一项损益表支出。'
- id: A18
  name: 非薪酬运营支出爬升路径
  value: 每月非薪酬销售与市场/研发/行政管理支出，从第1年末约 $8K/$15K/$6K，上升到第3年第4季度约 $15.5K/$18.5K/$8K。
  unit: USD/month
  source: '[商业计划书 operations 共用台架实验室与证据材料包工作流；fundingAsk.useOfFundsSummary；创业融资经验法则] 涵盖实验室台架搭建、差旅、法律、验证、保险和基础工具。'
- id: A19
  name: 现金转换惯例
  value: 融资到账后，EBITDA 近似等同于现金变动。
  unit: method
  source: 适用于一家资产轻量的补救与软件业务的创业融资经验法则，未单独建模债务、税务或资本支出计划。
- id: A20
  name: 月流失率
  value: 2.5%
  unit: percent
  source: 适用于一门粘性较强但对预算敏感的工业软件与服务混合业务的创业融资经验法则；如果事件确实让客户感到痛，客户理应续约，但下沉市场车企的预算依然带来真实的流失风险。
- id: A21
  name: CAC 计算惯例
  value: 第2-3年销售与市场支出，除以从第1年末的3个到第3年末的9个之间净新增的6个客户。
  unit: formula
  source: '[商业计划书 gtm.funnelTargets；模型测算] 这反映的是规模化扩张期由创始人和合作伙伴主导的获客方式，而不只是直接广告投放。'
- id: A22
  name: 用于融资规模测算的下一轮里程碑
  value: 到第2年第2季度，公司应已完成3笔付费车企补救服务、至少2份持续续约合同，并有首个付费供应商试点在进行中。
  unit: milestone
  source: '[商业计划书 fundingAsk.useOfFundsSummary；milestones 0-12和12-24个月] 种子前轮融资规模的设定，是为了在留有缓冲的情况下达到首个供应商成效证明里程碑。'
- id: A23
  name: 第3年持平的基准情形人数
  value: 从第2年第4季度到第3年第4季度，人数维持在5名全职员工，因为第3年的增长被假设来自测试台架复用和供应商分发，而不是扩大服务团队。
  unit: operating posture
  source: '[商业计划书 strategicChoices.sequencingRationale；operatingAssumptions 至少一半早期服务复用已有测试台架] 如果这种复用没有出现，模型就必须提前招聘，毛利率也会下降。'
