scenarios:
  downside:
    description: 独立证据的重要性下降，供应商授权进度推迟，更多工作停留在定制化服务层面。
    y3RevenueK: 900.0
    y3EbitdaK: -220.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
    - 第3年第4季度期末客户数落在7个而非9个，因为只有6个车企客户加1个供应商试点在运行。
    - 车企年度支出维持在接近 $90K 的水平，供应商账户也停留在试点定价，没能达到年化 $300K 的水平。
    - 毛利率封顶在接近65%，因为板卡和协议复用率没能达到商业计划书中的目标。
  base:
    description: 第1年的三笔车企成效证明转化为续约合同，随后一个供应商试点拉高了混合客单价，公司在第3年第4季度末达到8个车企客户加1个供应商客户。
    y3RevenueK: 1230.0
    y3EbitdaK: 15.0
    cashLowPointK: 551.6
    keyAssumptionChanges:
    - 第12个月达到3个活跃付费客户，第2年第4季度达到6个，第3年第4季度达到9个。
    - 随着发布门禁和证据工作标准化，车企持续性收入从约 $90K ARR 提升到约 $120K ARR。
    - 一个供应商试点在第2年启动，到第3年年化规模达到约 $300K。
  upside:
    description: 首个供应商试点更早成交，车企成效证明集中在同一批板卡家族上，持续性保障服务的定价靠近区间上限。
    y3RevenueK: 1530.0
    y3EbitdaK: 210.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 供应商试点在第2年第2季度前成交，比基准情形提前一到两个季度达到覆盖多项目的完整定价。
    - 第3年第4季度期末客户数达到10个，因为第8个车企客户更早签下，且多运行了一个续约项目。
    - 毛利率达到约75%，因为超过60%的付费工作能复用已有测试台架或证据模板。
sensitivity:
- variable: 客单价（ARPU）
  downsideCase: 车企续约合同维持在接近 $90K ARR，供应商定价也低于研究测算的 $300K 基准封顶。
  baseCase: 期末混合年化客单价达到约 $153K，因为一个 $300K 的供应商客户拉高了整体客户组合。
  upsideCase: 车企购买保障套餐的顶配版本，供应商支持也带来适度的增值范围。
  y3RevenueImpactK: -180.0
  cashImpactK: -130.0
- variable: 获客成本（CAC）
  downsideCase: 创始人和合作伙伴差旅增加，加上成交速度放缓，把 CAC 推高到 $120K 以上。
  baseCase: 按第2-3年销售与市场支出除以6个净新增客户计算，CAC 约为 $97.5K。
  upsideCase: 来自实验室和供应商的转介绍，把 CAC 拉低到接近 $80K。
  y3RevenueImpactK: -60.0
  cashImpactK: -95.0
- variable: 流失率
  downsideCase: 事件热度消退后，预算车企回归"只打补丁"的做法，月流失率升至接近4.0%。
  baseCase: 发布门禁工作流到位后，月流失率维持在接近2.5%。
  upsideCase: 证据材料包成为默认的发布环节，月流失率维持在接近1.5%。
  y3RevenueImpactK: -95.0
  cashImpactK: -70.0
- variable: 销售周期
  downsideCase: 从冲刺服务到续约合同、从车企到供应商的转化，都推迟一到两个季度。
  baseCase: 付费事件服务大约在30-60天内转化为续约合同，供应商试点在第2年启动。
  upsideCase: 第一份成功的材料包缩短了续约合同和供应商成交的周期。
  y3RevenueImpactK: -210.0
  cashImpactK: -160.0
- variable: 毛利率
  downsideCase: 期末毛利率停滞在接近65%，因为太多固件和现场工作仍然是定制化的。
  baseCase: 测试台架复用和供应商工具成熟后，毛利率达到70%出头。
  upsideCase: 如果板卡家族收敛得干净，证据模板也标准化，毛利率能达到约75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -85.0
- variable: 招聘节奏
  downsideCase: 在供应商杠杆效应被验证之前，就提前招聘第三名工程或运营人员。
  baseCase: 第二名工程师到位后人数保持不变，第3年的规模增长来自复用能力，而不是扩大团队。
  upsideCase: 同样5名全职员工能支持更多客户，因为供应商主导的部署减少了定制化工作。
  y3RevenueImpactK: 0.0
  cashImpactK: -140.0
- variable: 供应商授权时点
  downsideCase: 付费供应商试点从第2年推迟到第3年年中。
  baseCase: 供应商试点在第2年启动，到第3年年化规模达到约 $300K。
  upsideCase: 供应商授权提前一个季度启动，并更快地扩散到多个下游车企项目中。
  y3RevenueImpactK: -210.0
  cashImpactK: -170.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[事件驱动的车企线索] --> Sprints[付费补救冲刺]\n  Sprints --> Retainers[发布保障续约合同]\n  Retainers --> Revenue[收入]\n  Retainers --> SupplierLicense[供应商参考技术栈授权]\n  SupplierLicense --> Revenue\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金与现金跑道]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入始于三笔车企事件成效证明，将其转化为持续性保障服务，再用这些参考案例，在第3年拿下一个规模约 $300K 的供应商客户。
- checkName: 必须成立的前提
  finding: 板卡重合度必须真实到足以让一个五人团队，在不扩大服务团队的情况下支持9个付费客户。
- checkName: 模型会失效的情况
  finding: 如果独立证据无法改变买家行为，且供应商试点延迟，下行情形第3年收入会跌至约 $0.9M，现金也可能压缩至20万美元出头。
- checkName: 下一轮融资的证明点
  finding: 下一轮融资的故事，是在第2年第2季度前至少留住两家车企续约客户，外加一笔付费供应商试点，证明这条切口正从一次性事件服务，走向可复制的分发模式。
sanityChecks:
  ruleOf40: 第3年增长率86.4% + EBITDA 利润率1.2% = 87.6%。
  burnMultiple: 第2年燃烧倍数约为0.6倍——约 $0.41M 的 EBITDA 烧钱对应约 $0.63M 的净新增 ARR；第3年基本盈亏平衡，同时新增约 $0.48M 的净新增 ARR。
  revenuePerFte: 第3年人均产出 $246K，按 $1.23M 收入除以5名年末全职员工计算（对标 SaaS 行业 $200-400K 的基准）。
  flags:
  - 一个供应商客户加上高价位的车企续约合同，仍然贡献了第3年收入的很大一部分，客户集中度风险依然真实存在。
  - 模型假设从第2年第4季度到第3年第4季度人数保持不变；如果板卡碎片化导致工作持续定制化，毛利率和交付能力都会不达预期。
  - 车企客单价达到商业计划书所述续约区间的高端，且假设买家在紧急危机过去后，仍会继续为发布保障服务付费。
