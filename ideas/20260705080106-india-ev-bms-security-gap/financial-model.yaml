slug: india-ev-bms-security-gap
date: "2026-07-05"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: month
    source: "[BP date 2026-07-05] the operating model starts in the first full month after the business plan date."
  - id: A2
    name: Opening cash and pre-seed raise
    value: "$1.5M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $1.5-2.5M; BP fundingAsk.runwayMonths 18] the base case uses the low end of the stated range because the team stays India-local and hiring remains lean through the first supplier pilot."
  - id: A3
    name: Starting paying accounts
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months; BP experimentRoadmap] the company begins pre-revenue and must first convert incident outreach into the first paid sprint."
  - id: A4
    name: Active paying account definition
    value: "A paid OEM remediation sprint, OEM release-assurance retainer, or supplier reference-stack pilot/license."
    unit: definition
    source: "[BP businessModel.revenueStreams; BP businessModel.unitOfValue] customersEop counts any account paying for live remediation, assurance, or supplier-stack scope at period end."
  - id: A5
    name: OEM incident sprint pricing
    value: "$30K per OEM remediation sprint"
    unit: USD/account
    source: "[BP investorMemo.firstCustomer.initialContract $20k-$40k; BP product.mvp] the model uses the midpoint of the stated emergency remediation range."
  - id: A6
    name: OEM recurring assurance value
    value: "$90K ARR in early retainers, rising toward $120K ARR by Y3."
    unit: USD/account/year
    source: "[BP gtm.pricing $60k-$120k annual release-assurance retainer; research.bottomUpSizingDrivers annual OEM spend $120k] recurring OEM revenue ramps from the middle of the BP range toward the researched annual spend level once evidence and release-gate work are proven."
  - id: A7
    name: Supplier pilot and license value
    value: "$15K-$25K per month, reaching roughly $300K annualized in Y3."
    unit: USD/account
    source: "[BP businessModel.revenueStreams supplier reference-stack licensing; research.bottomUpSizingDrivers annual supplier spend $300k] the supplier account starts as a paid pilot and reaches the research benchmark only after OEM proofs exist."
  - id: A8
    name: Customer ramp
    value: "3 active paying accounts by M12, 6 by Q4Y2, and 9 by Q4Y3."
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months; research.market.som] this matches the plan to reach roughly 8 OEM accounts plus 1 supplier account by year 3."
  - id: A9
    name: Revenue recognition convention
    value: "Period-end active accounts multiplied by the blended realized revenue per active account for that period."
    unit: formula
    source: "[BP businessModel.unitOfValue; BP gtm.pricing] this keeps revenue directly tied to account count and the mix of sprints, retainers, and supplier licensing."
  - id: A10
    name: Blended realized revenue per active account path
    value: "Late Y1 about $7.5K monthly; Y2 about $8.8K-$12.5K monthly; Y3 about $12.1K-$13.8K monthly as the supplier account lifts the mix."
    unit: USD/account/month
    source: "[A5-A8 derived from BP pricing and customer mix] the quarterly revenue rows reflect a gradual shift from one-off OEM sprints to higher-value recurring assurance plus one supplier license."
  - id: A11
    name: Gross margin ramp
    value: "50%-65% in Y1, 62%-68% in Y2, and 70%-72% in Y3."
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70; BP operatingAssumptions harness reuse; research.adoptionFrictionMatrix] early work is services-heavy, then margin improves as repeated board families and evidence templates reduce delivery hours."
  - id: A12
    name: Hiring timeline
    value: "Founder and founding firmware engineer in M1; field applications/test engineer in M4; supplier partnerships lead in M7; second firmware engineer in M16; no further base-case FTE adds through Y3."
    unit: timeline
    source: "[BP team; BP strategicChoices.sequencingRationale] hiring stays skewed toward firmware and field execution before adding any broader scale team."
  - id: A13
    name: Founder loaded compensation
    value: "$90K"
    unit: USD/year
    source: "India deep-tech startup-finance heuristic mapped to [BP team Founder / OEM incident lead]; lean founder cash pay is assumed."
  - id: A14
    name: Firmware engineering loaded compensation
    value: "$90K"
    unit: USD/year
    source: "India embedded-security startup-finance heuristic mapped to [BP team Founding firmware security engineer]; compensation reflects scarce BLE, firmware, and protocol talent without using global enterprise pay levels."
  - id: A15
    name: Field applications and test loaded compensation
    value: "$45K"
    unit: USD/year
    source: "India hardware-test startup-finance heuristic mapped to [BP team Field applications and test engineer]; this role is operationally critical but below senior firmware pay."
  - id: A16
    name: Supplier partnerships loaded compensation
    value: "$60K"
    unit: USD/year
    source: "India industrial B2B GTM startup-finance heuristic mapped to [BP team Supplier partnerships and account lead]; includes travel and variable pay for partner development."
  - id: A17
    name: Payroll allocation to P&L lines
    value: "Founder 60% S&M and 40% G&A; firmware engineering 100% R&D; field applications/test 20% S&M and 80% R&D; supplier partnerships 100% S&M."
    unit: allocation
    source: "[BP team role rationales; BP operations] payroll is rolled into the functional opex lines rather than shown as a separate P&L expense."
  - id: A18
    name: Non-payroll operating spend ramp
    value: "Monthly non-payroll S&M/R&D/G&A rises from about $8K/$15K/$6K in late Y1 to about $15.5K/$18.5K/$8K by Q4Y3."
    unit: USD/month
    source: "[BP operations shared bench lab and evidence-pack workflow; BP fundingAsk.useOfFundsSummary; startup-finance heuristic] this covers lab rig build, travel, legal, validation, insurance, and basic tools."
  - id: A19
    name: Cash conversion convention
    value: "EBITDA approximates cash movement after the financing close."
    unit: method
    source: "Startup-finance heuristic for a small asset-light remediation and software business with no separate debt, tax, or capex schedule modeled."
  - id: A20
    name: Monthly churn
    value: "2.5%"
    unit: percent
    source: "Startup-finance heuristic for a sticky but budget-sensitive industrial software and services hybrid; customers should renew if incidents are painful, but down-market OEM budgets still create real churn risk."
  - id: A21
    name: CAC convention
    value: "Y2-Y3 sales and marketing spend divided by 6 net new accounts from 3 at Y1 exit to 9 at Y3 exit."
    unit: formula
    source: "[BP gtm.funnelTargets; model calc] this captures founder-led and partner-led acquisition for the scale-up period rather than only direct ad spend."
  - id: A22
    name: Next-round milestone for funding sizing
    value: "By Q2Y2 the company should have 3 paid OEM remediations, at least 2 recurring retainers, and the first paid supplier pilot underway."
    unit: milestone
    source: "[BP fundingAsk.useOfFundsSummary; BP milestones 0-12 and 12-24 months] the pre-seed raise is sized to reach the first supplier-proof milestone with buffer."
  - id: A23
    name: Flat Y3 headcount base case
    value: "Headcount stays at 5 FTE from Q4Y2 through Q4Y3 because Y3 growth is assumed to come from harness reuse and supplier distribution rather than adding a services bench."
    unit: operating posture
    source: "[BP strategicChoices.sequencingRationale; BP operatingAssumptions at least half of early engagements reuse an existing harness] if this reuse does not appear, the model must hire earlier and margins fall."
