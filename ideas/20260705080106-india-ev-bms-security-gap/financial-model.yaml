scenarios:
  downside:
    description: "Independent evidence matters less, supplier licensing slips, and more work stays bespoke services."
    y3RevenueK: 900.0
    y3EbitdaK: -220.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
      - "Q4Y3 customersEop lands at 7 instead of 9 because only 6 OEM accounts plus 1 supplier pilot are active."
      - "OEM annual spend stays closer to $90K and the supplier account remains at pilot pricing instead of reaching the $300K annualized level."
      - "Gross margin tops out near 65% because board and protocol reuse stays below the BP target."
  base:
    description: "Three OEM proofs in Y1 convert into retainers, then one supplier pilot lifts blended account value and the company reaches 8 OEM accounts plus 1 supplier account by Q4Y3."
    y3RevenueK: 1230.0
    y3EbitdaK: 15.0
    cashLowPointK: 551.6
    keyAssumptionChanges:
      - "3 active paying accounts by M12, 6 by Q4Y2, and 9 by Q4Y3."
      - "OEM recurring revenue moves from about $90K ARR toward $120K ARR as release-gate and evidence work standardize."
      - "One supplier pilot starts in Y2 and reaches roughly $300K annualized by Y3."
  upside:
    description: "The first supplier pilot closes earlier, OEM proofs cluster around the same board families, and recurring assurance attaches at the top end of the pricing range."
    y3RevenueK: 1530.0
    y3EbitdaK: 210.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "The supplier pilot closes by Q2Y2 and reaches full multi-program pricing one to two quarters earlier than base case."
      - "Q4Y3 customersEop reaches 10 because the eighth OEM logo lands earlier and one additional retained program is active."
      - "Gross margin reaches about 75% because more than 60% of paid work reuses an existing harness or evidence template."
sensitivity:
  - variable: ARPU
    downsideCase: "OEM retainers stay near $90K ARR and supplier pricing tops out below the $300K research benchmark."
    baseCase: "Exit blended annualized revenue per active account reaches about $153K because one $300K supplier account lifts the OEM mix."
    upsideCase: "OEMs buy the top end of the assurance package and supplier support lands modest add-on scope."
    y3RevenueImpactK: -180.0
    cashImpactK: -130.0
  - variable: CAC
    downsideCase: "Higher founder and partner travel plus slower close rates push CAC above $120K."
    baseCase: "CAC is about $97.5K using Y2-Y3 S&M spend over 6 net new accounts."
    upsideCase: "Referrals from labs and suppliers pull CAC toward $80K."
    y3RevenueImpactK: -60.0
    cashImpactK: -95.0
  - variable: churn
    downsideCase: "Monthly churn rises toward 4.0% as budget OEMs revert to patch-only behavior after the incident fades."
    baseCase: "Monthly churn holds near 2.5% once the release-gate workflow is in place."
    upsideCase: "Monthly churn stays near 1.5% because the evidence pack becomes the default release step."
    y3RevenueImpactK: -95.0
    cashImpactK: -70.0
  - variable: sales cycle
    downsideCase: "Sprint-to-retainer and OEM-to-supplier conversion slip by one to two quarters."
    baseCase: "Paid incidents convert into retainers within roughly 30-60 days and the supplier pilot begins in Y2."
    upsideCase: "A successful first dossier shortens both retainer and supplier close cycles."
    y3RevenueImpactK: -210.0
    cashImpactK: -160.0
  - variable: gross margin
    downsideCase: "Exit gross margin stalls near 65% because too much firmware and field work stays bespoke."
    baseCase: "Gross margin reaches the low-70s once harness reuse and supplier tooling mature."
    upsideCase: "Gross margin reaches about 75% if the board families cluster cleanly and evidence templates standardize."
    y3RevenueImpactK: 0.0
    cashImpactK: -85.0
  - variable: hiring pace
    downsideCase: "A third engineering or operations hire is pulled forward before supplier leverage is proven."
    baseCase: "Headcount stays flat after the second engineer, with Y3 scale coming from reuse rather than a larger bench."
    upsideCase: "The same 5 FTE team supports more accounts because supplier-led deployments reduce bespoke work."
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: supplier licensing timing
    downsideCase: "The paid supplier pilot slips from Y2 into mid-Y3."
    baseCase: "The supplier pilot begins in Y2 and reaches about $300K annualized by Y3."
    upsideCase: "Supplier licensing starts one quarter earlier and spreads across multiple downstream OEM programs faster."
    y3RevenueImpactK: -210.0
    cashImpactK: -170.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Incident-led OEM leads] --> Sprints[Paid remediation sprints]
      Sprints --> Retainers[Release-assurance retainers]
      Retainers --> Revenue[Revenue]
      Retainers --> SupplierLicense[Supplier reference-stack license]
      SupplierLicense --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue starts with three OEM incident proofs, converts them into recurring assurance, and then uses those references to add one $300K-class supplier account by Y3."
  - checkName: Must go right
    finding: "Board overlap has to be real enough that a five-person team can support nine paying accounts without adding a services bench."
  - checkName: Model breaks if
    finding: "If independent evidence does not change buyer behavior and the supplier pilot slips, the downside case falls to about $0.9M Y3 revenue and cash can compress toward the low-$200Ks."
  - checkName: Next-round proof
    finding: "The next financing story is at least two retained OEMs plus a paid supplier pilot by Q2Y2, proving the wedge is moving from incident work into repeatable distribution."
sanityChecks:
  ruleOf40: "Y3 growth 86.4% + EBITDA margin 1.2% = 87.6%."
  burnMultiple: "Y2 burn multiple is about 0.6x using roughly $0.41M of EBITDA burn against about $0.63M of net new ARR; Y3 is roughly breakeven while adding about $0.48M of net new ARR."
  revenuePerFte: "$246K Y3 using $1.23M revenue and 5 year-end FTE (benchmark $200-400K SaaS)."
  flags:
    - "One supplier account plus high-end OEM retainers still drives a large share of Y3 revenue, so account concentration remains real."
    - "The model assumes headcount stays flat from Q4Y2 through Q4Y3; if board fragmentation remains bespoke, both gross margin and delivery capacity will miss."
    - "OEM ARPU reaches the high end of the BP's stated retainer range and assumes buyers continue paying for release assurance after the immediate crisis has passed."
