- name: VicOne
  stage: 成长期公司
  wedge: ECU 入侵检测与虚拟补丁
  pricing: 平台授权加服务费
  strength: 轻量级 ECU 监控，虚拟补丁的故事讲得好
  weaknessVsUs: 更擅长车内防护，而非应用商店恢复上架和供应商斡旋
  sourceRefs:
  - 77
- name: Block Harbor
  stage: 成长期公司
  wedge: 原生面向车辆的红队测试与验证
  pricing: 按报价收费的专业服务
  strength: 汽车攻防领域的深度能力，信号度高
  weaknessVsUs: 定位是全球高端服务，不聚焦印度预算车型的运营需求
  sourceRefs:
  - 78
- name: Vecmocon
  stage: 成长期公司
  wedge: 卖给电动车企工作流的本土 BMS、VIM、充电器和固件工具
  pricing: 软硬件打包合同
  strength: 已经嵌入车企的电子和刷写工作流
  weaknessVsUs: 当供应商自己的技术栈就是根因时存在利益冲突，算不上中立的修复方
  sourceRefs:
  - 34
  - 35
  - 37
regulatoryTechnicalConstraints:
- point: 应用商店和 CERT-In 的义务要求意味着，任何事件都可能需要走法律和报告流程，而不只是修个固件。
  sourceRefs:
  - 11
  - 13
  - 14
  - 15
- point: 板卡五花八门，CAN、UART、RS485 混杂并存，这决定了必须有一套可复用的实验台架。
  sourceRefs:
  - 37
  - 38
- point: 如果没有供应商配合，补救工作可能会卡在固件签名、OTA 或刷写这几个环节。
  sourceRefs:
  - 34
  - 35
  - 37
- point: AIS-189、AIS-190 正式落地，可能在销售周期进行到一半时改变客户对证据的要求。
  sourceRefs:
  - 8
  - 9
  - 41
  - 95
validationSignals:
- point: MeitY 关联的下架事件证明，这个问题紧迫到足以触发渠道层面的干预。
  sourceRefs:
  - 1
  - 2
  - 3
- point: 截至2025年6月，FAME II 已经补贴支持了143.5万辆电动两轮车和16.5万辆电动三轮车，所以即便是一条很窄的安全切口，背后也站着庞大的存量基数。
  sourceRefs:
  - 22
- point: Ather 的公开漏洞披露计划说明，印度电动车企已经理解如何接纳第三方安全反馈。
  sourceRefs:
  - 43
- point: Vecmocon 的 Battery Buddy 版本说明显示，刷写、PIN 保护和板卡支持都是实实在在跑着的运营流程，不是纸上谈兵的需求。
  sourceRefs:
  - 37
  - 38
- point: 车队分析厂商已经在量化 BMS 误报率和正常运行时间的提升，这给了买家一套合规之外、讲得清 ROI 的语言。
  sourceRefs:
  - 31
  - 32
openQuestions:
