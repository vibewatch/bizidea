problem: >-
  Budget electric two-wheeler OEMs in India outsource their Bluetooth connectivity and battery-management-system
  (BMS) firmware to a handful of white-label vendors (Generic BAT BMS, Lossigy, Epoch Li-ion) that ship with weak
  or default access controls. Attackers within 10-15 metres can pair over Bluetooth and remotely disable battery
  output, stranding riders who depend on these vehicles for daily income. MeitY has now asked Google and Apple to
  pull at least seven affected apps, putting named OEMs like Yatri, Mayuri, Vande Bharat, and City Life at risk of
  losing their customer-facing app entirely mid-sales-cycle, with no in-house security team able to fix the
  firmware fast enough to get reinstated.
targetUser:
  primary: >-
    Head of Engineering or Founder/CTO at a budget electric two-wheeler OEM (sub-₹150,000 price point) whose
    companion app was removed or flagged by an app store following the MeitY directive
  secondary: The white-label BMS/connectivity firmware vendors (e.g. Generic BAT BMS, Lossigy, Epoch Li-ion) that license software to multiple budget OEMs
  buyer: Founder/CTO or Head of Engineering at the affected OEM, sometimes with dealer-network pressure pushing the decision
startupThesis:
  nonObviousInsight: >-
    This is not a one-off bug at a single OEM — dozens of unrelated budget EV brands license the same handful of
    white-label BMS/Bluetooth firmware stacks, so one supplier-side vulnerability propagates across the entire
    low-cost segment. None of these OEMs have in-house security engineering, and the MeitY app-store takedown has
    turned a latent defect into an urgent, budgeted, existential problem overnight.
  beachhead: >-
    Budget electric two-wheeler OEMs in India (sub-₹150,000 retail price, under 50,000 annual unit volume) whose
    companion app runs on the Generic BAT BMS, Lossigy, or Epoch Li-ion white-label stack and has been named,
    flagged, or removed under the MeitY investigation
  wedge: >-
    A rapid BLE/firmware security audit and remediation engagement that produces a patched access-control layer
    plus a compliance dossier the OEM can hand to MeitY and the app stores to get its app reinstated within days,
    not months
  whyNowCatalyst: >-
    MeitY's active investigation and the Google/Apple app removals give named OEMs an immediate, budgeted, and
    time-boxed reason to pay for remediation instead of treating security as a someday project.
  ventureScalePath: >-
    Start as a paid audit-and-remediation engagement for the first named OEMs, then package the fix as a licensed
    secure-BMS reference firmware/SDK sold to the white-label vendors themselves, then stand up a recurring
    monitoring and recertification subscription so it becomes the de facto security compliance layer for India's
    budget EV supply chain, and expand the same secure-by-default retrofit playbook to adjacent low-cost connected
    device categories (e-rickshaws, solar inverters, smart locks) facing similar MeitY-style scrutiny.
solution: >-
  A security engineering studio that runs a rapid BLE/firmware penetration test against an OEM's BMS and companion
  app, ships a patched firmware access-control layer (pairing authentication, command signing, rate limiting) within
  days, and produces a compliance dossier formatted for MeitY and app-store reinstatement review. After the
  emergency engagement, OEMs subscribe to ongoing firmware monitoring and pre-release security testing so future
  releases do not reintroduce the same class of vulnerability. Over time, the same hardened firmware module is
  offered directly to the white-label BMS vendors as a licensable reference stack, so new OEM customers inherit the
  fix by default instead of needing a bespoke engagement.
goToMarketSeed:
  firstCustomer: >-
    One of the four named budget e-2W OEMs (Yatri, Mayuri, Vande Bharat, or City Life) whose app was flagged or
    removed following the MeitY directive and needs it reinstated to keep selling and onboarding new riders
  buyingTrigger: >-
    MeitY investigation notice or an actual Google Play / App Store takedown of the OEM's companion app, which
    blocks new vehicle activations and dealer onboarding until the app is reinstated
  currentAlternative: >-
    Generalist cybersecurity consultants unfamiliar with automotive BLE/BMS protocols, or simply asking the
    original white-label firmware vendor for a quiet patch with no independent verification or compliance
    documentation
  switchingReason: >-
    Automotive-specific BLE/firmware pentesting expertise moves faster than generalist consultants, and an
    independent compliance dossier is what MeitY and app-store trust-and-safety teams actually need to approve
    reinstatement — something the original vendor cannot credibly self-certify.
  pricingHypothesis: >-
    Fixed-fee emergency remediation engagement priced against the OEM's daily revenue loss from a pulled app,
    followed by a per-vehicle-fleet monthly subscription for ongoing firmware security monitoring and
    recertification
