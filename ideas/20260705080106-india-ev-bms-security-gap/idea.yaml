topRisks:
  - name: Regulatory urgency fades
    description: >-
      If MeitY issues a blanket amnesty or the app stores quietly reinstate apps without per-OEM certification,
      the time-boxed budget and urgency driving this wedge could disappear.
    mitigation: >-
      Sell recurring value beyond the one-time compliance event — ongoing monitoring, pre-release testing, and a
      dealer-facing "security certified" badge — so demand persists independent of any single regulatory action.
  - name: Thin OEM budgets and low willingness to pay
    description: >-
      Budget EV OEMs operate on thin margins and may treat security as a cost to minimize rather than invest in,
      especially once the immediate app-store crisis passes.
    mitigation: >-
      Price against measurable downside (lost sales per day the app is pulled), offer success-based or
      milestone billing tied to reinstatement, and aggregate demand through OEM associations or dealer networks
      to lower per-customer acquisition cost.
  - name: White-label vendors or large OEMs build this in-house
    description: >-
      The original firmware vendors (Generic BAT BMS, Lossigy, Epoch Li-ion) could patch the flaw themselves at
      low cost, or a larger EV player could build in-house security tooling, cutting off the need for a third
      party.
    mitigation: >-
      Move fast to become the neutral, regulator-trusted certifying party and embed the hardened reference
      firmware as licensed IP early, creating switching costs before vendors or large OEMs can replicate the
      compliance-dossier relationship with regulators.
