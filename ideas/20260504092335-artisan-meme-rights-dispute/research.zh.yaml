        Red Points: [0.70, 0.30]
        Pixsy: [0.75, 0.20]
        Proposed startup: [0.92, 0.92]
  fiveForces:
    supplierPower:
      score: 4
      rationale: 已授权替代素材库存和创作者授权高度分散；如果创业公司必须提供已批准替代方案，而不仅仅是风险评分，权利持有人就会拥有更强议价能力。
      sourceRefs:
      - 23
      - 29
    buyerPower:
      score: 4
      rationale: 买方有可信的替代方案，包括人工审查、图库和上线后执法服务商，而且预算归属又分散在营销与法务之间。
      sourceRefs:
      - 16
      - 21
      - 26
    threatOfEntrants:
      score: 4
      rationale: 检测能力越来越容易获得；更难复制的价值位于权利数据、工作流位置和创作者供给，而不是底层图像匹配本身。
      sourceRefs:
      - 14
      - 25
      - 28
    threatOfSubstitutes:
      score: 5
      rationale: 市场已经提供人工法务审查、平台政策执法、图库替代素材以及品牌保护/下架工具，能够部分解决该问题。
      sourceRefs:
      - 8
      - 10
      - 21
    competitiveRivalry:
      score: 4
      rationale: 虽然今天尚无单一供应商明确掌控“表情包版权投放前清查”，但相邻 incumbents 已从不同角度拥挤在这条工作流周围。
      sourceRefs:
      - 21
      - 22
      - 26
  pestle:
  - factor: technological
    impact: positive
    point: AI 辅助内容生产正在成为营销人员的默认行为，增加了待审素材量，也提高了工作流自动化的价值。
    sourceRefs:
    - 16
    - 18
    - 19
  - factor: legal
    impact: negative
    point: 围绕演绎作品和合理使用的判断仍高度依赖具体事实，因此产品无法完全自动消除可识别表情包引用的法律不确定性。
    sourceRefs:
    - 3
    - 4
    - 5
  - factor: economic
    impact: positive
    point: 数字广告市场持续增长，意味着活动更多、预算更大，一旦某个创意素材被撤下或重做，风险敞口也更高。
    sourceRefs:
    - 15
  - factor: social
    impact: positive
    point: 创作者主导的反弹会在付费社媒投放所在的同一渠道迅速扩散，从而提升声誉层面的紧迫性。
    sourceRefs:
    - 1
    - 18
  - factor: legal
    impact: neutral
    point: 欧洲 AI 治理框架提高了文档留存要求，但它们本身并不能解决版权归属和授权问题。
    sourceRefs:
    - 33
    - 34
  adoptionFrictionMatrix:
  - friction: 误报拖慢上线速度
    severity: high
    affectedBuyer: 创意运营负责人
    mitigation: 先从高置信度表情包家族开始，对边界案例交由人工复核。
    sourceRefs:
    - 25
    - 28
  - friction: 法务与营销之间的预算归属不清
    severity: high
    affectedBuyer: 营销运营副总裁 / 营销法务
    mitigation: 销售重点放在减少媒体浪费和缩短审查周期，而不是抽象的合规价值。
    sourceRefs:
    - 16
    - 21
  - friction: 来自创作者的替代素材库存不足
    severity: medium
    affectedBuyer: 创意工作室和法务审批方
    mitigation: 围绕最高频的表情包/漫画家族建立早期创作者合作。
    sourceRefs:
    - 23
  - friction: 工作流集成和审计要求
    severity: medium
    affectedBuyer: 企业 IT / 采购
    mitigation: 利用来源追踪标准，并保留与每项素材关联的可审计审批日志。
    sourceRefs:
    - 14
    - 34
