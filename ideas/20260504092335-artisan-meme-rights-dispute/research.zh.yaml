competitors:
- name: 平台原生广告政策栈
  stage: incumbent
  wedge: 广告平台直接定义哪些广告内容可发，并在自己的生态内掌握执法权。
  pricing: 包含在现有广告平台投放体系内
  strength: 拥有直接分发能力，而且真能拒登或下架不合规广告。
  weaknessVsUs: 它们不会在营销工作流里提供跨平台的 meme 版权检测、创作者触达或一键已授权替换。
  sourceRefs:
  - 7
  - 8
  - 9
  - 10
  - 11
- name: Getty Images / iStock
  stage: incumbent
  wedge: 面向商业用途的已授权素材库，以及 AI 辅助的图库内容生成。
  pricing: 按套餐与素材授权收费
  strength: 拥有深厚的内容库存、成熟的授权基础设施，以及比抓取互联网原生文化更安全的替代路径。
  weaknessVsUs: 它们不会检查营销团队现成的广告草稿，也无法识别其中已经嵌入的 meme 或漫画引用。
  sourceRefs: *id001
- name: Red Points
  stage: scale-up
  wedge: 企业级品牌保护、广告监控、下架，以及基于图像识别的执法能力。
  pricing: 企业定制定价
  strength: 已经验证了企业预算存在，并能覆盖广告、平台和社媒上的广泛执法场景。
  weaknessVsUs: 它的重心在内容发布后的检测与移除，而不是上线前的创意团队审批。
  sourceRefs:
  - 21
  - 22
  - 23
  - 25
- name: Pixsy
  stage: scale-up
  wedge: 面向创作者的图像监控、所有权证明，以及下架 / 追索工作流。
  pricing: 以登记与追索工作流收费；抓取页面未披露公开企业定价
  strength: 在图像盗用、版权和所有权证明流程上，有很强的创作者教育与产品叙事。
  weaknessVsUs: 它的工作流是从使用之后、或者从权利人一侧开始，而不是从广告主在预算投放前的一侧开始。
  sourceRefs:
  - 26
  - 27
  - 28
  - 29
regulatoryTechnicalConstraints:
- point: 版权保护覆盖原创作品及其演绎形态，因此就算只是轻微改动的 meme 引用，也依然可能构成暴露。
  sourceRefs:
  - 3
  - 4
- point: 合理使用判断高度依赖具体事实，无法压缩成一套适用于所有广告的确定性模型分数。
  sourceRefs:
  - 5
- point: 广告平台可以拒登或下架广告，也可能要求第三方 IP 的授权证明。
  sourceRefs:
  - 7
  - 8
  - 10
- point: 来源追踪标准可以解释素材来源和修改历史，但它们本身并不能证明某个可辨认文化引用已经拿到商业授权。
  sourceRefs:
  - 14
  - 34
- point: 找到真正的权利人本身就不简单，尤其是那些在转发和变体传播中不断流动的互联网原生图像。
  sourceRefs:
  - 29
validationSignals:
- point: 已经出现过一场围绕可辨认漫画 / meme 引用的 AI 广告反弹，这直接证明了上线前版权审核的紧迫性。
  sourceRefs:
  - 1
- point: TikTok 为 IP 侵权和品牌内容单独维护广告政策页面，这说明权利问题本身就足够重要，值得独立政策入口。
  sourceRefs:
  - 7
  - 8
- point: Google 和 Snap 保留了广泛的广告审核与 IP 执法权，这会进一步放大买家对审批风险和下架风险的痛感。
  sourceRefs:
  - 9
  - 10
  - 11
- point: 品牌保护厂商已经在卖假广告监测和社媒下架工作流，这说明即便切口更晚，围绕相邻痛点的预算也已被验证。
  sourceRefs:
  - 21
  - 23
- point: 创作者保护工具已经开始专门发布关于生成式 AI 抓取和图像盗用的指引，说明市场对 AI 时代视觉资产复用的担忧正在升温。
  sourceRefs:
  - 27
  - 28
- point: 营销研究来源显示，AI 已被广泛用于内容创作和媒介生产，这会持续抬高审核决策量。
  sourceRefs:
  - 16
  - 18
  - 19
openQuestions:
- 目标买家到底多频繁会在付费社媒里使用可辨认的 meme 或漫画引用，而不是改用更安全的“像 meme 但不碰授权”的格式？
- 创业公司能否作为提升工作流速度的工具拿到预算，还是买家最终仍会把它归类为法务成本中心？
- 要让“已授权替代素材”这个承诺在日常投放里真正有意义，最低需要多少创作者 / 权利人库存？
- 在裁剪、改色、加字幕或 AI 重绘版本上，可识别性检测能否维持足够准确，而不把审核人淹没在误报里？
