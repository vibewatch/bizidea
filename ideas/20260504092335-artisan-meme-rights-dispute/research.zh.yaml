- name: Pixsy
  stage: scale-up
  wedge: 面向创作者的图像监测、权属证明与下架/追偿工作流。
  pricing: 以登记和追偿工作流为主；抓取页面中未显示公开企业定价
  strength: 在图像盗用、版权和权属证明工作流方面，拥有强烈的创作者导向教育与服务。
  weaknessVsUs: 它的工作流起点是使用发生之后，或从权利持有人一侧出发，而不是在广告主投放预算前介入。
  sourceRefs:
  - 26
  - 27
  - 28
  - 29
regulatoryTechnicalConstraints:
- point: 版权保护适用于原创作品和演绎作品分析，因此轻度编辑过的表情包引用仍可能带来风险。
  sourceRefs:
  - 3
  - 4
- point: 合理使用分析高度依赖事实，无法被压缩成一个适用于所有广告的确定性模型分数。
  sourceRefs:
  - 5
- point: 广告平台可以拒登或移除广告，并可能要求提供第三方 IP 的授权证明。
  sourceRefs:
  - 7
  - 8
  - 10
- point: 来源追踪标准可以解释素材来源和编辑历史，但本身无法证明可识别文化引用已取得商业授权。
  sourceRefs:
  - 14
  - 34
- point: 找到正确的权利持有人本身就不容易，尤其是对于在多次转发和变体传播中扩散的互联网原生图片。
  sourceRefs:
  - 29
validationSignals:
- point: 围绕可识别漫画/表情包引用的 AI 广告争议已经真实发生，证明投放前权利审查具备紧迫性。
  sourceRefs:
  - 1
- point: TikTok 为 IP 侵权和品牌内容保留独立广告政策页面，说明版权问题的重要性足以单独形成政策界面。
  sourceRefs:
  - 7
  - 8
- point: Google 和 Snap 保留广泛的广告审查与 IP 执法权，强化了买家对审批风险和内容下架的痛感。
  sourceRefs:
  - 9
  - 10
  - 11
- point: 品牌保护服务商已经在销售虚假广告监测和社交媒体下架工作流，这验证了相邻痛点存在预算，即使它们的切口更靠后。
  sourceRefs:
  - 21
  - 23
- point: 面向创作者的保护服务商正在专门发布关于生成式 AI 抓取和图像盗用的指南，说明市场对 AI 时代视觉素材复用的担忧正在上升。
  sourceRefs:
  - 27
  - 28
- point: 营销研究来源显示，AI 已被广泛用于内容创作和媒体生产，从而增加了需要审查的决策量。
  sourceRefs:
  - 16
  - 18
  - 19
openQuestions:
- 目标买家在付费社媒中究竟有多频繁地投放可识别的表情包或漫画引用，而不是使用更安全、无需授权的“类表情包”形式？
- 创业公司能否以提升工作流速度为由拿到预算，还是买家仍会把它归类为法务成本中心？
- 要让“已授权替代素材”承诺在日常活动运营中真正重要，至少需要多大的创作者/权利持有人库存？
- 在不让审核人员被误报淹没的前提下，可识别性检测能否在裁剪、重着色、加字幕或 AI 重绘变体上保持准确？
