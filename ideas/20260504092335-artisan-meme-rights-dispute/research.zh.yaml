competitors:
- name: 平台原生广告政策体系
  stage: incumbent
  wedge: 广告平台在自身生态内定义哪些广告内容被允许，并保留执法权。
  pricing: 打包在现有广告平台使用中
  strength: 拥有直接分发渠道，以及拒登或移除不合规广告的能力。
  weaknessVsUs: 它们无法在营销工作流中提供跨平台表情包版权检测、创作者联系或一键式已授权替代。
  sourceRefs:
  - 7
  - 8
  - 9
  - 10
  - 11
- name: Getty Images / iStock
  stage: incumbent
  wedge: 面向商业用途的已授权素材库和 AI 辅助图库生成。
  pricing: 按套餐和素材授权收费
  strength: 拥有深厚的内容库存、成熟授权基础设施，以及比直接抓取互联网原生文化更安全的替代路径。
  weaknessVsUs: 它们不会检查营销人员的广告草稿，来识别其中已经嵌入的可识别表情包或漫画引用。
  sourceRefs: *id001
- name: Red Points
  stage: scale-up
  wedge: 企业品牌保护、广告监测、下架，以及基于图像识别的执法。
  pricing: 企业定制定价
  strength: 已经建立清晰的企业预算先例，并在广告、市场平台和社交媒体上覆盖广泛的执法场景。
  weaknessVsUs: 其重心是发布后的检测与移除，而不是在预算上线前让创意团队完成投放前审批。
  sourceRefs:
  - 21
