jobsToBeDone:
- job: 当增长团队希望在数小时内上线一条热点 AI 生成表情包广告时，帮助创意运营快速完成权利清查，以便他们在不引发创作者反弹或活动下架的情况下投放。
  currentAlternative: 人工法务审查和非正式的反向图片搜索
  successMetric: 在上线前完成审查，且没有被标记的创作者纠纷
- job: 当品牌法务需要审批数十个 AI 广告变体时，帮助法务只筛查高风险创意，从而在不成为瓶颈的情况下放行营销。
  currentAlternative: 人工抽样审核素材或全面放慢发布节奏
  successMetric: 创意自动放行比例和法务审查时间中位数
