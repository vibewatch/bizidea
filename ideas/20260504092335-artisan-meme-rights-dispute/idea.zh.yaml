topRisks:
- name: 检测漏掉变形表情包
  description: 受版权保护的引用常被裁剪、重绘或轻度修改，这会降低模型准确率并造成漏报。
  mitigation: 先从使用量最高的表情包家族入手，对边界匹配保留人工复核，并利用客户反馈回路快速再训练。
- name: 创作者供给不足
  description: 只有当足够多的艺术家和权利持有人愿意提供可商业使用的素材时，替代素材市场才能成立。
  mitigation: 先从独立网络漫画创作者切入，提供透明的收入分成，并把授权流程做得比直接联系更简单。
- name: 预算归属不清
  description: 营销团队可能把它视为法务工具，而法务又可能把它视为营销问题，从而拖慢初始采购。
  mitigation: 先落地在创意运营团队，为法务提供审批席位，并通过更快上线、更少下架和减少媒体浪费来证明 ROI。
