problem: >-
  AI 创意工具让增长团队每天都能产出几十个广告变体，但针对 meme、漫画和有文化辨识度
  的图像做法务审查，仍然高度依赖人工判断，也很主观。团队往往要等到创作者公开投诉时，
  才知道自己踩线了，随后就得下架素材、出面道歉沟通，还白白浪费媒介投放。最痛的是那些
  依赖速度取胜的自营效果团队：多加一轮审核就会拖慢投放节奏，但不审又会把品牌和法务
  风险一起放大。
targetUser:
  primary: >-
    在 Series B-D 消费应用和金融科技公司里，负责自营 AI 辅助付费社媒工作室的创意运营负责人
  secondary: 快速生产 meme 广告、服务消费品牌的效果营销代理商
  buyer: 市场运营副总裁，或负责营销事务的副总法律顾问
startupThesis:
  nonObviousInsight: >-
    AI 广告的新瓶颈，不是图像生成，而是互联网原生文化内容的商业授权清理。AI 让团队能以很低
    的成本批量做出像 meme 一样的创意，这也把过去偶发性的法务检查，变成了高频的运营问题。
  beachhead: >-
    面向美国消费应用增长团队的上线前版权审查工具：这些团队每周会在 Meta 和 TikTok 上发布
    20+ 条 AI 辅助生成的 meme 或文化梗广告。
  wedge: >-
    一个 API 和浏览器插件，扫描广告草稿里的创意和提示词，识别可辨认的 meme / 漫画 IP，给出
    授权风险评分，并提供一键替换的已授权素材或审批流转。
  whyNowCatalyst: >-
    Artisan 与 KC Green 的争议表明，在付费 AI 广告里，只要出现一个可识别的 meme，就可能立刻引发
    公共舆论反弹；因此，节奏快的广告团队现在需要在上线前做版权检查，而不是等投诉后再补救。
  ventureScalePath: >-
    公司可以先从付费社媒里的 meme 和漫画授权切入，再逐步扩展到更广泛的 AI 创意权利基础设施，
    覆盖肖像、音乐、创作者素材，以及跨渠道广告活动的审计链路。
solution: >-
  Meme License Switchboard 直接嵌入团队已在使用的设计和审批栈，在素材导出或上传广告平台之前，
  先扫描图像和提示词。系统会识别可能受版权保护的 meme 和漫画引用，解释它们为什么有风险，
  并且只把边界模糊的案例送给法务复核。对于被标记的素材，它会推荐已获授权的替代项，或把团队
  接入一套更轻量的权利人授权流程。随着使用积累，系统会逐步形成一张专有的权利图谱，记录反复
  出现的互联网原生 IP、已批准变体和替代素材，而且每跑一轮广告，这张图都会更有价值。
goToMarketSeed:
  firstCustomer: >-
    一家美国移动订阅应用的创意运营负责人：每月在付费社媒上投放 $500k+，内部 AI 创意团队有
    4-10 人。
  buyingTrigger: >-
    创作者公开投诉、外部律师审查意见，或内部 AI 创意试点铺开后，把原本靠人工的品牌/法务审查
    压垮。
  currentAlternative: 人工法务审查，加上设计师用反向搜图、Slack 讨论串和临时参考素材文件夹硬撑
  switchingReason: >-
    它既保住投放速度，又能让法务拿到一份可审计的放行/拦截结论，并在需要时立刻给出已授权的
    替代方案，而不是等到被下架。
  pricingHypothesis: >-
    平台订阅费外加按用量计费，基于每月扫描的创意数量和交付的已授权替代素材数量收费。
whyNow:
  - point: >-
      现在品牌一旦未经许可复用有代表性的互联网图像，创作者往往会直接在公开场合发声，让原本
      普通的一条广告素材迅速升级成声誉事件。
    signalRefs:
      - 创作者公开点名风险
    sourceRefs:
      - 1
  - point: >-
      团队已经不能再指望靠轻微视觉改动就让 meme 安全用于付费投放，因此自动化的可识别性检查
      开始变得有价值。
    signalRefs:
      - 改造过的 meme 仍有版权暴露
    sourceRefs:
      - 1
  - point: >-
      当下的补救模式仍然是上线后再去联系艺术家，这会同时制造预算浪费和法务风险，而上线前工具
      可以把这部分摩擦直接切掉。
    signalRefs:
      - 权利清理仍然偏事后补救
    sourceRefs:
      - 1
  - point: >-
      互联网原生 IP 已经从自然传播的社媒文化，进入付费获客创意，这正在催生一个围绕商业化 meme
      授权的新软件品类。
    signalRefs:
      - 付费获客正在把互联网原生 IP 拉进来
    sourceRefs:
      - 1
differentiator: >-
  大多数品牌安全工具关注的是平台政策审核或泛化的来源追踪，并不回答“这条付费广告里，人能不能
  一眼认出某个受版权保护的 meme 或漫画格子”这个问题。这个产品把可识别性检测、权利图谱和已授权
  替代素材库存绑在一起，因此输出不只是“高风险”，而是“改发这个”。每一次审核都会强化一张专有地图，
  记录反复出现的互联网原生 IP、创作者归属、已批准变体和历史和解路径。
