problem: AI 创意工具让增长团队每天能产出数十个广告变体，但针对表情包、漫画和具有文化辨识度的艺术作品的法务审查，仍然依赖人工且带有主观性。团队往往只有在创作者公开投诉后，才意识到自己越线，继而被迫下架、公开致歉并浪费媒体投放预算。痛点对内部效果营销团队尤其尖锐，因为他们的优势就是速度：每多一轮审查，活动推进速度就会下降；但跳过审查，又会带来品牌与法律风险。
targetUser:
  primary: 在 B 轮到 D 轮消费应用和金融科技公司中，负责内部 AI 辅助付费社媒创意工作室的创意运营负责人
  secondary: 为消费品牌快速制作表情包广告的效果营销代理商
  buyer: 营销运营副总裁或负责营销事务的副总法律顾问
startupThesis:
  nonObviousInsight: AI 广告的新瓶颈不在图像生成，而在互联网原生文化内容的商业权利清查。AI 让大规模生成类表情包创意变得廉价，从而把原本偶发的法务核查，变成高频的运营问题。
  beachhead: 为美国消费应用增长团队提供投放前权利审查；这些团队每周会在 Meta 和 TikTok 上生成 20+ 条 AI 辅助的表情包或文化引用广告。
  wedge: 一个 API 和浏览器插件，用于扫描草稿创意中可识别的表情包/漫画 IP，给出授权风险评分，并提供一键式已授权替代素材或审批流转。
  whyNowCatalyst: Artisan 与 KC Green 的纠纷表明，在付费 AI 广告活动中，只需一个可识别的表情包就可能立即引发公开反弹，因此快节奏广告团队现在需要在上线前完成权利检查，而不是在投诉后补救。
  ventureScalePath: 先从付费社媒中的表情包和漫画清查切入，公司随后可扩展到更广泛的 AI 创意权利基础设施，包括肖像、音乐、创作者素材以及跨渠道活动审计轨迹。
solution: Meme License Switchboard 嵌入团队已经在使用的设计与审批栈，在素材导出或上传至广告平台之前扫描图片和提示词。它识别可能受版权保护的表情包和漫画引用，解释风险原因，并只将边界案例流转给法务审核。对于被标记的素材，系统会推荐已预先获授权的替代方案，或将团队接入与权利持有人的轻量化授权流程。随着时间推移，系统会沉淀一个专有权利图谱，涵盖高频互联网原生 IP、已批准变体和替代素材，并随着每次广告活动持续增强。
goToMarketSeed:
  firstCustomer: 美国一家移动订阅应用的创意运营负责人；该公司每月在付费社媒上的投放超过 $500k，并拥有一个 4-10 人的内部 AI 创意团队。
  buyingTrigger: 创作者公开投诉、外部律师审查，或内部 AI 创意试点上线后压垮人工品牌/法务审查。
  currentAlternative: 人工法务审查，加上设计师使用反向图片搜索、Slack 讨论串和临时参考素材文件夹。
  switchingReason: 它在保留投放速度的同时，为法务团队提供可审计的放行/不放行结论，并在下架之外给出即时的已授权替代方案。
  pricingHypothesis: 平台订阅费加按使用量计费，依据每月扫描的创意数量和交付的已授权替代素材数量收费。
