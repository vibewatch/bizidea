jobsToBeDone:
  - job: >-
      当增长团队想在几小时内上线一条蹭热点的 AI 生成 meme 广告时，帮创意运营快速完成版权清理，
      让他们既能发出去，也不会招来创作者反弹或广告下架。
    currentAlternative: 人工法务审查加非正式的反向搜图
    successMetric: 上线前完成审查，且没有被创作者正式点名或发起争议
  - job: >-
      当品牌法务要审批几十条 AI 广告变体时，帮法务只聚焦真正高风险的创意，让营销继续往前跑，
      而不是被法务卡死。
    currentAlternative: 手工抽样审核素材，或一刀切拖慢发布节奏
    successMetric: 自动放行创意占比，以及法务审核的中位用时
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      催化事件真实且很新，但整个信号簇仍然主要依赖一篇已验证报道，而不是更广泛的来源集。
  painIntensity:
    score: 4
    rationale: >-
      创作者公开争议会烧掉投放预算、迫使广告下架，也会把法务拉进来，而这些恰好都砸在最依赖速度
      的团队身上。
  wedgeClarity:
    score: 5
    rationale: >-
      上线前扫描加已授权替代素材工作流，是一个很窄、也很具体的切口，而且能直接嵌进现有创意审批流程。
  defensibility:
    score: 3
    rationale: >-
      公司有机会建立数据和授权网络护城河，但在早期，如果没有足够强的权利图谱，功能层看起来仍然
      容易被复制。
  ventureScale:
    score: 4
    rationale: >-
      meme 清理可以继续扩展，变成覆盖 AI 媒体权利、来源和商业化工作流的更大平台。
topRisks:
  - name: 检测漏掉变形后的 meme
    description: >-
      受版权保护的引用经常会被裁剪、重绘或轻度改动，这会拉低模型准确率，形成漏报。
    mitigation: >-
      先覆盖出现频率最高的 meme 家族，对边界案例保留人工审核，并用客户反馈快速重训。
  - name: 创作者供给太薄
    description: >-
      只有足够多艺术家和权利人愿意提供可商业使用的素材，替代素材市场才跑得起来。
    mitigation: >-
      先从独立网络漫画创作者切入，给出透明的分成方案，并把授权流程做得比直接私信沟通更省事。
  - name: 预算归属不清
    description: >-
      市场团队可能把它看成法务工具，法务又可能把它看成营销问题，从而拖慢首单采购。
    mitigation: >-
      先落在创意运营侧，给法务提供审批席位，并用更快上线、更少下架和更少媒介浪费来证明 ROI。
