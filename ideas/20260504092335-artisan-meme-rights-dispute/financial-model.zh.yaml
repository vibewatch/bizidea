slug: meme-license-switchboard
date: 2026-05-04
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始时点现金余额
    value: "2700"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd] 基准情形采用 $2.7M pre-seed 融资，位于 $2-3M 区间中值。"
  - id: A2
    name: 起始付费 logo（M1）
    value: "0"
    unit: count
    source: "[BP milestones.0-12 months] 公司从零收入起步，必须在第 1 年拿下第一批 3 个付费试点。"
  - id: A3
    name: 核心年度订阅 ACV
    value: "24.0"
    unit: USDK
    source: "[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract; Research market.sam]"
  - id: A4
    name: 扫描量与替代素材费用带来的附加收入提升
    value: "Y1 为 0%，Y2 为 10%，Y3 为 20%"
    unit: percent of subscription revenue
    source: "[BP businessModel.revenueStreams] 在 $24k 核心 ACV 之外，再叠加扫描用量费和替代素材流程抽成。"
  - id: A5
    name: 付费 logo 增长爬坡
    value: "Y1 末 4 个 logo，Y2 末 18 个，Y3 末 75 个"
    unit: count
    source: "[BP milestones; Research market.som] Y3 末的 logo 数量与研究中的 75-logo SOM 情形一致。"
  - id: A6
    name: 毛利率爬坡
    value: "70% Y1, 71% Y2, 72% Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 随着供给与工作流更可复用，毛利率小幅提升，属于早期公司常见财务假设。"
  - id: A7
    name: 漏斗转化护栏
    value: "线索到合格试点 25%，试点到年度付费 40%"
    unit: percent
    source: "[BP gtm.funnelTargets] 基准情形假设公司维持在既定 20-30% 和 40%+ 目标带内。"
  - id: A8
    name: 创始人或 GTM 负责人完全成本现金薪酬
    value: "120"
    unit: USDK per FTE per year
    source: "早期公司财务经验值：包含税费和福利的精简 pre-seed 创始人现金薪酬。"
  - id: A9
    name: 工程岗位完全成本现金薪酬
    value: "180"
    unit: USDK per FTE per year
    source: "早期公司财务经验值：美国早期软件工程师的完全成本薪酬。"
  - id: A10
    name: 应用 ML 岗位完全成本现金薪酬
    value: "210"
    unit: USDK per FTE per year
    source: "早期公司财务经验值：美国早期应用 ML 负责人的完全成本薪酬。"
  - id: A11
    name: 权利运营岗位完全成本现金薪酬
    value: "130"
    unit: USDK per FTE per year
    source: "早期公司财务经验值，并结合 BP 中对权利运营与创作者合作的岗位需求。"
  - id: A12
    name: 销售或解决方案负责人完全成本现金薪酬
    value: "150"
    unit: USDK per FTE per year
    source: "早期公司财务经验值：首位企业客户经理或解决方案销售的薪酬水平。"
  - id: A13
    name: 客户成功或行政岗位完全成本现金薪酬
    value: "110"
    unit: USDK per FTE per year
    source: "早期公司财务经验值：覆盖基础运营与客户支持的早期岗位薪酬。"
  - id: A14
    name: 非薪酬运营支出爬坡
    value: "$5-12K per month S&M, $5-8K per month R&D tools, $5-8K per month G&A"
    unit: USDK per month
    source: "早期公司财务经验值：精简 pre-seed 软件公司在云工具、外呼软件、法务和合规供应商上的支出水平。"
  - id: A15
    name: 月度客户流失率
    value: "1.5"
    unit: percent
    source: "早期公司财务经验值：适用于具备周度使用潜力、但留存尚未完全验证的工作流产品。"
  - id: A16
    name: 稳态 blended CAC
    value: "12.0"
    unit: USDK per new paying logo
    source: "基于模型推导：用 Y2-Y3 销售与市场支出除以新增 logo，再四舍五入到便于规划的数值。"
  - id: A17
    name: 现金转换简化假设
    value: "用 EBITDA 近似代表经营性现金流"
    unit: policy
    source: "早期公司财务经验值：假设资本开支、税项和营运资本波动在这一阶段影响不大。"
