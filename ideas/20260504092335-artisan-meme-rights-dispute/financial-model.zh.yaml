scenarios:
  downside:
    description: 更长的法务采购周期和更弱的替代方案附着率，将公司在 Q4Y3 限制在 50 个 logo。
    y3RevenueK: 810.0
    y3EbitdaK: -860.0
    cashLowPointK: -330.0
    keyAssumptionChanges:
    - 试点转付费转化率从 40% 下滑到 30%。
    - 综合 ARPU 基本停留在 $24k 核心订阅附近，替代方案费用提升极小。
    - 由于预算归属转向法务，销售周期从约 6 个月拉长到 9 个月。
  base:
    description: 创始人主导直销，加上少数代理商合作，可将一个小众但真实的工作流在 Q4Y3 转化为 75 个付费 logo。
    y3RevenueK: 1227.6
    y3EbitdaK: -532.1
    cashLowPointK: 109.9
    keyAssumptionChanges:
    - 核心 ACV 保持在 $24k，而扫描或替代方案附加费将综合 ARPU 在 Y3 提升到 $28.8k。
    - logo 增长轨迹为 Y1 达到 4 个，Y2 达到 18 个，Q4Y3 达到 75 个。
    - 随着审查工作流和供给更可复用，毛利率从 70% 提升至 72%。
  upside:
    description: 代理商聚合与强劲的替代方案附着率，可在 Q4Y3 将公司拉升至 90 个 logo，并实现更好的变现。
    y3RevenueK: 1512.0
    y3EbitdaK: -250.0
    cashLowPointK: 290.0
    keyAssumptionChanges:
    - 代理商渠道加速新增 logo，而无需明显提前招聘。
    - 随着使用量和替代方案分成更早附着，综合 ARPU 提升至约 $31.2k。
    - 团队周活使用率更快达到 70% 目标，使有效流失率下降至接近 1.0% 月度。
sensitivity:
- variable: ARPU
  downsideCase: 仅有 $24k 年度核心订阅，附加费用有限
  baseCase: Y3 综合年度 ARPU 为 $28.8k
  upsideCase: Y3 综合年度 ARPU 为 $31.2k
  y3RevenueImpactK: -204.6
  cashImpactK: -147.0
- variable: CAC
  downsideCase: 由于转化更慢、创始人投入时间更多，CAC 为 $18k
  baseCase: CAC 为 $12k
  upsideCase: 借助代理商杠杆，CAC 降至 $9k
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: 若无法维持周使用，月流失率为 2.5%
  baseCase: 月流失率为 1.5%
  upsideCase: 月流失率为 1.0%
  y3RevenueImpactK: -132.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: 由于营销与法务无法明确预算归属，销售周期为 9 个月
  baseCase: 6 个月
  upsideCase: 强试点证明后缩短至 4.5 个月
  y3RevenueImpactK: -245.0
  cashImpactK: -230.0
- variable: gross margin
  downsideCase: 若人工审核和权利持有人分成持续偏高，毛利率为 66%
  baseCase: 72%
  upsideCase: 75%
  y3RevenueImpactK: 0.0
  cashImpactK: -74.0
- variable: hiring pace
  downsideCase: 比计划提前 2 个季度多招 1 名工程师和 1 名销售
  baseCase: Y3 期间保持 7 FTE
  upsideCase: 在达到 20 个 logo 之后再招聘非关键岗位
  y3RevenueImpactK: 0.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> PaidLogos
      PaidLogos --> SubscriptionRevenue
      PaidLogos --> ReplacementFees
      SubscriptionRevenue --> GrossProfit
      ReplacementFees --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自一条狭窄的直销加代理商 logo 增长曲线：Y2 末 18 个客户，Y3 末 75 个客户，且综合 ARPU 高于 $24k 核心订阅。
- checkName: 必须做对的事
  finding: 公司必须在增加实质性 GTM 支出前，证明团队每周审查量和试点转付费转化率能达到 BP 目标区间。
- checkName: 模型失效条件
  finding: 如果法务主导采购使销售周期拉长至接近 9 个月，或替代方案附着始终没有出现，下行情景中现金将转负。
- checkName: 下一轮证明点
  finding: 一旦业务达到约 18 个付费 logo、70%+ 周活使用率，并证明替代方案不仅能提示风险、还能改善转化，种子轮故事才算可信。
sanityChecks:
  ruleOf40: Y3 增长 343% 加 EBITDA 利润率 -43% = 300%；早期增长在方向上足以抵消亏损，但仍不足以避免再融资。
  burnMultiple: 随着收入增速超过 opex，从 Y2 约 4.9x 改善到 Y3 的 0.6x。
  revenuePerFte: Y3 以 Q4 的 7 FTE 计算，人均收入为 $175K，低于成熟 SaaS 的 $200-400K 基准，因此招聘仍需保持克制。
  flags:
  - 研究中的海滩头 SAM 只有约 $24M，因此风投上行空间取决于能否从表情包清查扩展到更广泛的 AI 媒体权利工作流。
  - 基准情景要求从 Y2 末 18 个 logo 快速跃升到 Y3 末 75 个 logo；即便有代理商帮助，这对创始人主导的增长动作仍然激进。
  - Y3 仍为 EBITDA 亏损，因此在扩大团队前，公司仍需要种子轮融资或显著更好的变现。
  - 收入质量取决于已授权替代方案附着率；如果产品只是一个警告层，ARPU 和转化率都可能被压缩。
