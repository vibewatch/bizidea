scenarios:
  downside:
    description: "更长的法务采购周期和更弱的替代素材挂接率，使公司到 Q4Y3 只能达到 50 个 logo。"
    y3RevenueK: 810.0
    y3EbitdaK: -860.0
    cashLowPointK: -330.0
    keyAssumptionChanges:
      - "试点转付费的转换率从 40% 降到 30%。"
      - "混合 ARPU 基本停留在 $24k 核心订阅附近，替代素材带来的附加收入很少。"
      - "由于预算归属转向法务，销售周期从约 6 个月拉长到 9 个月。"
  base:
    description: "创始人主导直销加少量代理商渠道，把一个小而真实的工作流做到 Q4Y3 的 75 个付费 logo。"
    y3RevenueK: 1227.6
    y3EbitdaK: -532.1
    cashLowPointK: 109.9
    keyAssumptionChanges:
      - "核心 ACV 维持在 $24k，而扫描或替代素材费用把 Y3 的 混合 ARPU 拉到 $28.8k。"
      - "logo 增长路径为 Y1 末 4 个、Y2 末 18 个、Q4Y3 达到 75 个。"
      - "随着审核工作流和供给更可复用，毛利率从 70% 提升到 72%。"
  upside:
    description: "代理商聚合和更强的替代素材挂接率，让公司到 Q4Y3 达到 90 个 logo，并拿到更高变现。"
    y3RevenueK: 1512.0
    y3EbitdaK: -250.0
    cashLowPointK: 290.0
    keyAssumptionChanges:
      - "代理商渠道在不明显提前招聘的情况下，加快新增 logo。"
      - "随着用量和替代素材抽成更早挂上，混合 ARPU 提升到约 $31.2k。"
      - "团队周活率更快突破 70% 目标，使有效月流失率接近 1.0%。"
sensitivity:
  - variable: ARPU
    downsideCase: "只有 $24k 的年度核心订阅，附加费用贡献有限"
    baseCase: "$28.8k blended annual ARPU by Y3"
    upsideCase: "$31.2k blended annual ARPU by Y3"
    y3RevenueImpactK: -204.6
    cashImpactK: -147.0
  - variable: CAC
    downsideCase: "$18k CAC from slower conversion and more founder time"
    baseCase: "$12k CAC"
    upsideCase: "$9k CAC via agency leverage"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "如果周度使用撑不住，月流失率升到 2.5%"
    baseCase: "1.5% monthly churn"
    upsideCase: "1.0% monthly churn"
    y3RevenueImpactK: -132.0
    cashImpactK: -170.0
  - variable: sales cycle
    downsideCase: "9 months because marketing and legal cannot agree on budget owner"
    baseCase: "6 months"
    upsideCase: "4.5 months after strong pilot proof"
    y3RevenueImpactK: -245.0
    cashImpactK: -230.0
  - variable: gross margin
    downsideCase: "66% if human review and rights-holder payouts stay heavy"
    baseCase: "72%"
    upsideCase: "75%"
    y3RevenueImpactK: 0.0
    cashImpactK: -74.0
  - variable: hiring pace
    downsideCase: "比计划提前 2 个季度多招 1 名工程师和 1 名销售"
    baseCase: "到 Y3 都维持在 7 名 FTE"
    upsideCase: "非关键岗位等到 20 个 logo 之后再招"
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> PaidLogos
      PaidLogos --> SubscriptionRevenue
      PaidLogos --> ReplacementFees
      SubscriptionRevenue --> GrossProfit
      ReplacementFees --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基准情形收入由一条很窄的直销加代理商 logo 增长驱动：客户数从 Y2 末的 18 个升到 Y3 末的 75 个，同时 混合 ARPU 高于 $24k 核心订阅。"
  - checkName: 必须做对的事
    finding: "公司必须先证明每周审核量和试点转付费能达到 BP 目标区间，然后才值得加大 GTM 投入。"
  - checkName: 模型会失灵的情况
    finding: "如果法务主导采购把销售周期拖到 9 个月，或者替代素材挂接始终起不来，downside 情形下现金就会转负。"
  - checkName: 下一轮融资证明点
    finding: "当业务达到约 18 个付费 logo、70%+ 周活率，并拿出替代素材确实提升转化的证据时，seed 故事才更可信。"
sanityChecks:
  ruleOf40: "Y3 增长 343% 加上 EBITDA 利润率 -43%，合计 300%；对于这个阶段的高增长公司，方向上足以抵消亏损，但还不够支撑不融资继续跑。"
  burnMultiple: "随着收入增速超过 opex，burn multiple 从 Y2 的约 4.9x 改善到 Y3 的 0.6x。"
  revenuePerFte: "$175K Y3 using 7 Q4 FTE，低于成熟 SaaS 常见的 $200-400K 区间，因此招聘必须继续克制。"
  flags:
    - "研究里的滩头 SAM 只有约 $24M，因此风险投资回报能否成立，取决于公司能否从 meme 清理扩到更广的 AI 媒体权利工作流。"
    - "基准情形要求客户数从 Y2 末的 18 个猛增到 Y3 末的 75 个；对一条创始人主导的销售路径来说，这个跳跃相当激进。"
    - "Y3 仍然 EBITDA 为负，因此在扩大团队前，公司仍需要 seed 轮，或明显更强的变现能力。"
    - "收入质量很依赖已授权替代素材的挂接率；如果产品最终只是预警层，ARPU 和转换率都很可能被压缩。"
