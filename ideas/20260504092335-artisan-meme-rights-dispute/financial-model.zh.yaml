slug: meme-license-switchboard
date: 2026-05-04
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始时现金
  value: '2700'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd] 基准情景采用 $2.7M 的 pre-seed 交割，位于所述 $2-3M 区间内。'
- id: A2
  name: 起始付费 logo（M1）
  value: '0'
  unit: count
  source: '[BP milestones.0-12 months] 公司从收入前阶段起步，必须在第 1 年拿下首批 3 个付费试点。'
- id: A3
  name: 核心年度订阅 ACV
  value: '24.0'
  unit: USDK
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract; Research market.sam]'
- id: A4
  name: 扫描量与替代费带来的附加收入提升
  value: 0% in Y1, 10% in Y2, 20% in Y3
  unit: percent of subscription revenue
  source: '[BP businessModel.revenueStreams] 在 $24k 核心 ACV 之外，增加按使用量收费和替代工作流分成。'
- id: A5
  name: 付费 logo 增长曲线
  value: 4 logos by Y1 end, 18 by Y2 end, 75 by Y3 end
  unit: count
  source: '[BP milestones; Research market.som] 第 3 年末的 logo 数与研究中的 75 个 logo SOM 情景一致。'
- id: A6
  name: 毛利率爬坡
  value: 70% Y1, 71% Y2, 72% Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 随着产品组合和工作流规模扩大而略有改善，属于创业公司财务建模经验值。'
- id: A7
  name: 漏斗转化护栏
  value: 25% lead-to-qualified-pilot and 40% pilot-to-paid annual
  unit: percent
  source: '[BP gtm.funnelTargets] 基准情景假设公司维持在所述 20-30% 和 40%+ 的目标区间内。'
- id: A8
  name: 创始人或 GTM 负责人总现金薪酬
  value: '120'
  unit: USDK per FTE per year
  source: 创业公司财务经验值：精简的 pre-seed 创始人现金薪资，已含工资税和福利。
- id: A9
  name: 工程岗位总现金薪酬
  value: '180'
  unit: USDK per FTE per year
  source: 创业公司财务经验值：美国早期软件工程师的完全成本薪酬。
- id: A10
  name: 应用 ML 岗位总现金薪酬
  value: '210'
  unit: USDK per FTE per year
  source: 创业公司财务经验值：美国早期应用 ML 负责人的完全成本薪酬。
- id: A11
  name: 权利运营岗位总现金薪酬
  value: '130'
  unit: USDK per FTE per year
  source: 创业公司财务经验值：参考 BP 中对权利运营和创作者合作的团队需求。
- id: A12
  name: 销售或解决方案负责人总现金薪酬
  value: '150'
  unit: USDK per FTE per year
  source: 创业公司财务经验值：首位企业客户经理或解决方案销售的薪酬。
- id: A13
  name: 客户成功或行政岗位总现金薪酬
  value: '110'
  unit: USDK per FTE per year
  source: 创业公司财务经验值：用于覆盖早期运营和客户支持。
- id: A14
  name: 非薪酬运营支出爬坡
  value: $5-12K per month S&M, $5-8K per month R&D tools, $5-8K per month G&A
  unit: USDK per month
  source: 创业公司财务经验值：面向精简 pre-seed 软件公司，覆盖云工具、外呼软件、法务与合规供应商。
- id: A15
  name: 月度客户流失率
  value: '1.5'
  unit: percent
  source: 创业公司财务经验值：适用于具备周使用潜力、但留存仍未被完全验证的早期工作流产品。
- id: A16
  name: 稳态综合 CAC
  value: '12.0'
  unit: USDK per new paying logo
  source: 根据模型隐含：用 Y2-Y3 销售与营销支出除以新增 logo 得出，并四舍五入为实用规划数。
- id: A17
  name: 现金转换简化
  value: EBITDA approximates operating cash flow
  unit: policy
  source: 创业公司财务经验值：假设在该阶段资本开支、税项和营运资本波动影响不大。
