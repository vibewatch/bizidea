assumptions:
  - id: A1
    name: Starting cash at model start
    value: "2700"
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd] Base case uses a $2.7M pre-seed close inside the stated $2-3M range."
  - id: A2
    name: Starting paying logos (M1)
    value: "0"
    unit: count
    source: "[BP milestones.0-12 months] Company starts pre-revenue and must earn the first 3 paid pilots in year 1."
  - id: A3
    name: Core annual subscription ACV
    value: "24.0"
    unit: USDK
    source: "[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract; Research market.sam]"
  - id: A4
    name: Ancillary revenue uplift from scan-volume and replacement fees
    value: "0% in Y1, 10% in Y2, 20% in Y3"
    unit: percent of subscription revenue
    source: "[BP businessModel.revenueStreams] Adds usage fees and replacement-workflow take rate on top of the $24k core ACV."
  - id: A5
    name: Paying-logo ramp
    value: "4 logos by Y1 end, 18 by Y2 end, 75 by Y3 end"
    unit: count
    source: "[BP milestones; Research market.som] Y3 end logo count matches the researched 75-logo SOM case."
  - id: A6
    name: Gross margin ramp
    value: "70% Y1, 71% Y2, 72% Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] Slight improvement from mix and workflow scale is a startup-finance heuristic."
  - id: A7
    name: Funnel conversion guardrails
    value: "25% lead-to-qualified-pilot and 40% pilot-to-paid annual"
    unit: percent
    source: "[BP gtm.funnelTargets] Base case assumes the company stays inside the stated 20-30% and 40%+ target bands."
  - id: A8
    name: Founder or GTM lead loaded cash compensation
    value: "120"
    unit: USDK per FTE per year
    source: "Startup-finance heuristic: lean pre-seed founder cash salary with payroll tax and benefits included."
  - id: A9
    name: Engineering loaded cash compensation
    value: "180"
    unit: USDK per FTE per year
    source: "Startup-finance heuristic: early-stage U.S. software engineer fully loaded compensation."
  - id: A10
    name: Applied ML loaded cash compensation
    value: "210"
    unit: USDK per FTE per year
    source: "Startup-finance heuristic: early-stage U.S. applied ML lead fully loaded compensation."
  - id: A11
    name: Rights ops loaded cash compensation
    value: "130"
    unit: USDK per FTE per year
    source: "Startup-finance heuristic anchored to BP team need for rights ops and creator partnerships."
  - id: A12
    name: Sales or solutions lead loaded cash compensation
    value: "150"
    unit: USDK per FTE per year
    source: "Startup-finance heuristic for first enterprise account executive or solutions seller."
  - id: A13
    name: Customer success or admin loaded cash compensation
    value: "110"
    unit: USDK per FTE per year
    source: "Startup-finance heuristic for early operations and customer support coverage."
  - id: A14
    name: Non-payroll operating spend ramp
    value: "$5-12K per month S&M, $5-8K per month R&D tools, $5-8K per month G&A"
    unit: USDK per month
    source: "Startup-finance heuristic for a lean pre-seed software company using cloud tooling, outbound software, legal, and compliance vendors."
  - id: A15
    name: Monthly customer churn
    value: "1.5"
    unit: percent
    source: "Startup-finance heuristic for an early workflow product with weekly usage potential but still-unproven retention."
  - id: A16
    name: Steady-state blended CAC
    value: "12.0"
    unit: USDK per new paying logo
    source: "Model-implied from Y2-Y3 sales and marketing spend divided by new logos, rounded to a practical planning number."
  - id: A17
    name: Cash conversion simplification
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "Startup-finance heuristic: capex, taxes, and working-capital swings are assumed immaterial at this stage."
