  round: pre-seed
  amountM: 2.7
  runwayMonths: 28
  milestone: "Reach 18 paying logos, 70%+ weekly-active-team usage, 25+ creator LOIs, and proof that licensed replacements improve pilot-to-paid conversion before the seed round."
  useOfFunds:
    - bucket: Engineering
      amountUsd: 1134000
      percentage: 42
    - bucket: GTM
      amountUsd: 729000
      percentage: 27
    - bucket: G&A
      amountUsd: 432000
      percentage: 16
    - bucket: Buffer (6 mo)
      amountUsd: 405000
      percentage: 15
scenarios:
  downside:
    description: "Longer legal procurement and weaker replacement attach limit the company to 50 logos by Q4Y3."
    y3RevenueK: 810.0
    y3EbitdaK: -860.0
    cashLowPointK: -330.0
    keyAssumptionChanges:
      - "Pilot-to-paid conversion slips from 40% to 30%."
      - "Blended ARPU stays near the $24k core subscription with minimal replacement-fee uplift."
      - "Sales cycle stretches from roughly 6 months to 9 months because budget ownership shifts to legal."
  base:
    description: "Founder-led direct sales plus a few agencies convert a niche but real workflow into 75 paying logos by Q4Y3."
    y3RevenueK: 1227.6
    y3EbitdaK: -532.1
    cashLowPointK: 109.9
    keyAssumptionChanges:
      - "Core ACV stays at $24k and ancillary scan or replacement fees lift blended ARPU to $28.8k by Y3."
      - "Logo growth follows 4 in Y1, 18 in Y2, and 75 by Q4Y3."
      - "Gross margin improves from 70% to 72% as review workflows and supply become more repeatable."
  upside:
    description: "Agency aggregation and strong replacement attach pull the company to 90 logos with better monetization by Q4Y3."
    y3RevenueK: 1512.0
    y3EbitdaK: -250.0
    cashLowPointK: 290.0
    keyAssumptionChanges:
      - "Agency channel accelerates new-logo adds without pulling hiring materially ahead of plan."
      - "Blended ARPU reaches roughly $31.2k as usage and replacement take rate attach earlier."
      - "Weekly-active-team usage clears the 70% target quickly, lowering effective churn toward 1.0% monthly."
sensitivity:
  - variable: ARPU
    downsideCase: "$24k annual core subscription only and limited ancillary fees"
    baseCase: "$28.8k blended annual ARPU by Y3"
    upsideCase: "$31.2k blended annual ARPU by Y3"
    y3RevenueImpactK: -204.6
    cashImpactK: -147.0
  - variable: CAC
    downsideCase: "$18k CAC from slower conversion and more founder time"
    baseCase: "$12k CAC"
    upsideCase: "$9k CAC via agency leverage"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "2.5% monthly churn if weekly usage is not sustained"
    baseCase: "1.5% monthly churn"
    upsideCase: "1.0% monthly churn"
    y3RevenueImpactK: -132.0
    cashImpactK: -170.0
  - variable: sales cycle
    downsideCase: "9 months because marketing and legal cannot agree on budget owner"
    baseCase: "6 months"
    upsideCase: "4.5 months after strong pilot proof"
    y3RevenueImpactK: -245.0
    cashImpactK: -230.0
  - variable: gross margin
    downsideCase: "66% if human review and rights-holder payouts stay heavy"
    baseCase: "72%"
    upsideCase: "75%"
    y3RevenueImpactK: 0.0
    cashImpactK: -74.0
  - variable: hiring pace
    downsideCase: "One extra engineer and one extra seller hired 2 quarters earlier than planned"
    baseCase: "Stay at 7 FTE through Y3"
    upsideCase: "Delay non-critical hires until after 20 logos"
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> PaidLogos
      PaidLogos --> SubscriptionRevenue
      PaidLogos --> ReplacementFees
      SubscriptionRevenue --> GrossProfit
      ReplacementFees --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by a narrow direct plus agency logo ramp from 18 customers at Y2 exit to 75 at Y3 exit with blended ARPU rising above the $24k core subscription."
  - checkName: Must go right
    finding: "The company has to prove weekly review volume and pilot-to-paid conversion around the BP target range before adding material GTM spend."
  - checkName: Model breaks if
    finding: "Cash turns negative in the downside case if legal-led procurement pushes sales cycles toward 9 months or replacement attach never shows up."
  - checkName: Next-round proof
    finding: "The seed case is credible once the business reaches roughly 18 paying logos, 70%+ weekly-active usage, and evidence that replacements improve conversion rather than just flag risk."
sanityChecks:
  ruleOf40: "Y3 growth 343% plus EBITDA margin -43% = 300%; early-stage growth is strong enough to offset losses directionally but not to avoid a seed raise."
  burnMultiple: "Improves from about 4.9x in Y2 to 0.6x in Y3 as revenue scales faster than opex."
  revenuePerFte: "$175K Y3 using 7 Q4 FTE, below the $200-400K mature SaaS benchmark and a reason to keep hiring tight."
  flags:
    - "The researched beachhead SAM is only about $24M, so venture upside depends on expanding from meme clearance into broader AI media-rights workflows."
    - "The base case requires a sharp jump from 18 logos at Y2 exit to 75 at Y3 exit, which is aggressive for a founder-led motion even with agency help."
    - "Y3 remains EBITDA negative, so the company still needs a seed round or materially better monetization before scaling headcount."
    - "Revenue quality depends on licensed replacement attach; if the product is only a warning layer, ARPU and conversion likely both compress."
