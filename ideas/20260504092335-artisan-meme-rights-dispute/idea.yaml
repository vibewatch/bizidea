topRisks:
  - name: Detection misses transformed memes
    description: >-
      Copyrighted references are often cropped, redrawn, or lightly altered,
      which can reduce model accuracy and create false negatives.
    mitigation: >-
      Start with the highest-volume meme families, keep human review for
      borderline matches, and use customer feedback loops to retrain quickly.
  - name: Thin creator supply
    description: >-
      The replacement marketplace only works if enough artists and rights
      holders opt in with commercially usable assets.
    mitigation: >-
      Begin with independent webcomic creators, offer transparent revenue-share
      payouts, and package permission workflows that are easier than direct
      outreach.
  - name: Ambiguous budget owner
    description: >-
      Marketing may view this as a legal tool while legal may view it as a
      marketing problem, slowing initial purchases.
    mitigation: >-
      Land in creative operations with legal approver seats and prove ROI
      through faster launch times, reduced takedowns, and avoided media waste.
