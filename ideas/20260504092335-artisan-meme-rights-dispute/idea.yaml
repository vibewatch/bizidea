differentiator: >-
  Most brand-safety tools focus on policy moderation or generic provenance, not
  on whether a human can recognize a copyrighted meme or comic panel inside a
  paid ad. This product couples recognizability detection with a rights graph
  and licensed replacement inventory, so the output is not just "high risk" but
  "ship this instead." Every review strengthens a proprietary map of recurring
  internet-native IP, creator ownership, approved variants, and settlement
  patterns.
