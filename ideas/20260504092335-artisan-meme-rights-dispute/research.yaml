openQuestions:
- How often do target buyers actually ship recognizable meme or comic references in paid social, versus using safer “meme-like” formats that avoid licensing needs?
- Can the startup win budget as a workflow-speed tool, or will buyers still categorize it as a legal cost center?
- What minimum creator / rights-holder inventory is needed for the licensed-replacement promise to matter in daily campaign operations?
- Can recognizability detection remain accurate on cropped, recolored, captioned, or AI-redrawn variants without overwhelming reviewers with false positives?
