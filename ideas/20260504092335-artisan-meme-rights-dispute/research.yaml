  partnershipEcosystem:
  - point: Creator-rights holders and licensed asset marketplaces are needed so flagged creative can be swapped, not merely blocked.
    sourceRefs: *id001
  - point: Ad-platform policy hooks matter because buyer urgency increases when launch or removal risk is explicit.
    sourceRefs:
