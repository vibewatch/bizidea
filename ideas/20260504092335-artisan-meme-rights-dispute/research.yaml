competitors:
- name: Platform-native ad policy stacks
  stage: incumbent
  wedge: Ad platforms define what ad content is allowed and reserve enforcement rights inside their own ecosystems.
  pricing: Bundled into existing ad platform usage
  strength: Direct distribution and the power to reject or remove non-compliant ads.
  weaknessVsUs: They do not offer cross-platform meme-rights detection, creator outreach, or one-click licensed replacements inside marketer workflows.
  sourceRefs:
  - 7
  - 8
  - 9
  - 10
  - 11
- name: Getty Images / iStock
  stage: incumbent
  wedge: Licensed asset libraries and AI-assisted stock creation for commercial use.
  pricing: Plan- and asset-based licensing
  strength: Deep content inventory, licensing infrastructure, and a safer replacement path than scraping internet-native culture.
  weaknessVsUs: They do not inspect a marketer’s draft ad to identify recognizable meme or comic references already embedded in it.
  sourceRefs: *id001
- name: Red Points
  stage: scale-up
  wedge: Enterprise brand protection, ad monitoring, takedowns, and image-recognition-based enforcement.
  pricing: Custom enterprise pricing
  strength: Clear enterprise budget precedent and broad enforcement coverage across ads, marketplaces, and social media.
  weaknessVsUs: Its center of gravity is post-publication detection and removal, not creative-team preflight approval before launch.
  sourceRefs:
  - 21
  - 22
  - 23
  - 25
- name: Pixsy
  stage: scale-up
  wedge: Creator-side image monitoring, ownership proof, and takedown / recovery workflows.
  pricing: Registration and recovery workflow; public enterprise pricing not surfaced in fetched pages
  strength: Strong creator-oriented education around image theft, copyright, and proof-of-ownership workflows.
  weaknessVsUs: Its workflow starts after use or from the rights-holder side, not from the advertiser side before media spend goes live.
  sourceRefs:
  - 26
  - 27
  - 28
  - 29
