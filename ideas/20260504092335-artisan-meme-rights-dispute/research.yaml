  validationPlan:
  - priority: high
    question: Do high-spend consumer app teams actually use recognizable memes or comics in paid ads often enough to create weekly review volume?
    evidenceToGather: 20 interviews with creative-ops leads plus recent ad-library samples from target accounts.
  - priority: high
    question: Will the budget sit with marketing ops, brand protection, or legal?
    evidenceToGather: Budget-owner interviews and procurement notes from 10 pilot accounts after a mock incident review.
  - priority: medium
    question: What recall and false-positive rate can a recognizability model sustain on cropped, redrawn, or lightly edited meme variants?
    evidenceToGather: Blind benchmark on a labeled set of real paid-social creatives and known meme families.
  - priority: medium
    question: Can a licensed replacement marketplace be assembled fast enough to make one-click swaps meaningful?
    evidenceToGather: Signed LOIs with 25-50 webcomic / creator rights holders and test turnaround times for approvals.
