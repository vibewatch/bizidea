problem: >-
  Sidewalk delivery robot operators do not fail first on hardware; they fail on
  city-by-city approval, route defensibility, and public-right-of-way risk.
  Before a pilot can launch, expansion teams must assemble maps, accessibility
  arguments, operating rules, and council-facing materials by hand. That slows
  every new metro and makes retailers hesitant to commit before approvals are
  real.
targetUser:
  primary: "Market expansion and policy leads at autonomous sidewalk delivery robot operators entering a new downtown pilot zone."
  secondary: "City innovation or transportation staff evaluating small-scale sidewalk robot pilots."
  buyer: "Head of market expansion, public policy lead, or GM for new city launches at a delivery robotics company."
startupThesis:
  nonObviousInsight: >-
    The scarce asset in sidewalk robotics is no longer robot supply; it is
    approval-grade evidence that a bot network will not create pedestrian or
    accessibility problems on specific blocks. Once pilots become council votes,
    expansion software becomes as strategic as autonomy software.
  beachhead: >-
    North American sidewalk robot operators seeking approval for a first
    1-3-square-kilometer downtown pilot in a city where council or transport
    staff must sign off before launch.
  wedge: >-
    A permit and launch OS that converts sidewalk maps, robot dimensions, stop
    points, and service hours into route risk scores, ADA pinch-point flags,
    geofenced operating rules, and permit-ready application packets.
  whyNowCatalyst: >-
    Serve's Vancouver proposal shows that entering a new city now requires a
    formal municipal process for a neighborhood-scale pilot, creating urgent
    demand for software that can prove a rollout is safe and manageable.
  ventureScalePath: >-
    Start with launch approval for delivery robot operators, then expand into
    ongoing compliance, incident reporting, insurer documentation, retailer site
    onboarding, and eventually the system of record for sidewalk and curbside
    autonomy across robots, e-bikes, and teleoperated fleets.
solution: >-
  The product ingests city sidewalk GIS layers, proposed delivery zones, robot
  dimensions, operating windows, and merchant endpoints to produce a launch plan
  that both operators and municipalities can review. It scores each block for
  pedestrian conflict, ADA bottlenecks, school-zone sensitivity, and curb
  crossing complexity, then recommends route exclusions and geofenced behavior
  rules before the pilot starts. It auto-generates permit maps, operating
  policies, and community-facing documentation so expansion teams stop hiring
  consultants for every new city. After approval, the same system becomes the
  compliance layer for monitoring rule adherence and preparing renewal packets.
goToMarketSeed:
  firstCustomer: >-
    A Series A-B autonomous delivery robot startup preparing its first
    council-reviewed downtown pilot in a Canadian or U.S. city outside its
    existing launch footprint.
  buyingTrigger: >-
    A city motion, transport review, or anchor merchant launch date that
    requires a formal pilot approval package before robots can operate.
  currentAlternative: "Manual workflow using internal ops staff, policy consultants, GIS contractors, spreadsheets, and slide decks."
  switchingReason: >-
    The wedge replaces weeks of bespoke prep with a repeatable approval package,
    catches sidewalk-risk issues before a council review, and gives operators a
    faster path to launch than hiring local consultants city by city.
  pricingHypothesis: "Annual SaaS priced per active metro, with a launch setup fee for each new city approval process."
