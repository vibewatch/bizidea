topRisks:
  - name: "Market timing"
    description: "If sidewalk robot rollouts stay niche or pilots stall politically, the initial customer base may remain too small."
    mitigation: "Target adjacent curbside and micromobility approval workflows early so the platform serves a broader public-right-of-way automation market."
  - name: "Workflow budget resistance"
    description: "Operators may try to keep permit prep internal instead of paying for a new software layer."
    mitigation: "Anchor ROI on faster launch timelines, fewer council revisions, and reduced consultant spend with a per-metro pricing model."
  - name: "Policy fragmentation"
    description: "Every city may require different language, data, and review steps, making product standardization hard."
    mitigation: "Start with a narrow set of North American pilot cities and build configurable templates rather than a one-size-fits-all compliance engine."
