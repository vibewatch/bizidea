differentiator: >-
  Existing routing tools optimize speed after launch, while policy consultants
  produce static documents before launch. This product combines sidewalk-aware
  routing, accessibility risk analysis, permit generation, and operating-rule
  management in one workflow built for the public right of way. As it expands,
  it can compound defensibility through city-specific templates, incident
  benchmarks, and cross-metro approval data that neither consultants nor generic
  fleet software collect.
