  stage: scale-up
  wedge: Mobility data, fee management, and compliance tooling for cities and operators.
  pricing: Custom / not publicly disclosed.
  strength: Strong position around MDS, fee tracking, and mobility program analytics.
  weaknessVsUs: Designed for ongoing mobility program operations, not pre-launch sidewalk robot approval workflows at block level.
