  wedge: Manual launch preparation using internal teams, GIS contractors, and slide decks.
  pricing: Internal headcount plus consulting spend.
  strength: Already trusted by operators and adaptable to each city.
  weaknessVsUs: Slow, inconsistent, and non-compounding across metros; does not create reusable software workflow or benchmark data.
