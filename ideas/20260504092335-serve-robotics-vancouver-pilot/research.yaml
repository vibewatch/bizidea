  validationPlan:
  - priority: high
    question: What do operators currently spend per city on policy consultants, GIS analysis, and permit preparation?
    evidenceToGather: Five operator interviews plus at least three postmortems from recent city launches; request budget ranges and launch timelines.
  - priority: high
    question: Which city stakeholders actually block or approve pilots in practice?
    evidenceToGather: Interview transport, innovation, ADA, and risk staff in 6-8 target metros; map decision rights and required packet contents.
  - priority: medium
    question: Which sidewalk and curb datasets are consistently obtainable at the fidelity needed for pre-launch scoring?
    evidenceToGather: Pilot data-integration tests in three metros using public GIS, curb, construction, and accessibility layers.
  - priority: medium
    question: Will adjacent customers beyond sidewalk robots pull the same workflow?
    evidenceToGather: Customer discovery with micromobility, teleop, and low-speed autonomy operators plus two city curb teams.
