scenarios:
  downside:
    description: "Sales cycles stretch to 6 months, only 10 active metros are live by Q4Y3, and services work pushes gross margin below plan."
    y3RevenueK: 1170.0
    y3EbitdaK: -690.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - "Launch-to-subscription conversion falls from 60% to 45%."
      - "Q4Y3 active metros fall from 15 to 10."
      - "Gross margin drops from 72% to 65% because GIS cleanup stays manual."
  base:
    description: "Two paid launches in Year 1 compound to 15 active metros by Q4Y3 with pricing near the research-based $120k annualized spend per metro."
    y3RevenueK: 1695.0
    y3EbitdaK: -354.6
    cashLowPointK: 406.8
    keyAssumptionChanges:
      - "Launch engagement fee stays at $45k."
      - "Annual subscription stays at $120k per active metro."
      - "Active metros grow to 2 in Y1, 6 in Y2, and 15 in Y3."
  upside:
    description: "Template reuse works early, adjacency pull accelerates demand, and the team reaches 18 active metros with limited extra hiring by Q4Y3."
    y3RevenueK: 2210.0
    y3EbitdaK: 110.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - "Average annual subscription expands to $130k with renewals and incident logging."
      - "Q4Y3 active metros rise from 15 to 18."
      - "Gross margin improves to 78% as implementations standardize."
