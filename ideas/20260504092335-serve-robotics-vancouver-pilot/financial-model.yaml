modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Leads[Qualified operator launch deadlines] --> PaidLaunch[Paid launch engagements]
      PaidLaunch --> ActiveMetros[Active metros on subscription]
      ActiveMetros --> Revenue[Launch fees plus subscription revenue]
      Revenue --> GrossProfit[72% gross profit]
      GrossProfit --> Cash[Runway to next milestone]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case Y3 revenue is driven by 15 active metros at $120k ARR plus $45k launch fees on 9 new metros, mostly inside a small set of operator accounts."
  - checkName: Must go right
    finding: "The first 3-5 metros must share enough workflow structure for template reuse to keep gross margin above 70% while still converting 60%+ of launches into subscriptions."
  - checkName: Model breaks if
    finding: "If sales cycles slip to 6 months or implementations stay services-heavy, downside cash turns negative before the company earns a seed-quality proof point."
  - checkName: Next-round proof
    finding: "The next round is justified once the company shows 6 active metros across 2+ operators, live renewal and incident workflows, and one signed adjacency LOI."
sanityChecks:
  ruleOf40: "Y3 growth 135.4% + EBITDA margin -20.9% = 114.5%"
  burnMultiple: "Y2 burn multiple is about 1.5x and improves to about 0.3x in Y3 as exit ARR grows from $0.72M to $1.80M."
  revenuePerFte: "$212K Y3 on 8 FTE, which is acceptable for a pre-scale vertical SaaS company but still below best-in-class SaaS efficiency."
  flags:
    - "The beachhead is still narrow; the seed story needs adjacency pull, not just more sidewalk-robot launches."
    - "Base case assumes zero realized logo churn through Y3 because early growth is concentrated inside 3-5 operators; real renewals could be weaker."
    - "Gross margin stays above target only if GIS cleanup and permit-packet QA do not turn into a consultant-heavy services model."
    - "Two paid design partners in Y1 are a hard gating assumption, and a six-month slip would likely require slower hiring or a larger round."
