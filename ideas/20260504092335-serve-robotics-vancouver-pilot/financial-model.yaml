assumptions:
  - id: A1
    name: Starting cash after pre-seed close
    value: "2100"
    unit: USDK
    source: "[BP fundingAsk] target range is $2-3M; model uses a $2.1M close as a lean pre-seed case sized to reach the next milestone plus 6 months of buffer."
  - id: A2
    name: Starting active metros (M1)
    value: "0"
    unit: count
    source: "[BP executiveSummary] no live approved metros are described at model start."
  - id: A3
    name: Launch engagement fee per new metro
    value: "45"
    unit: USDK
    source: "[BP gtm pricing] launch setup fee midpoint of the stated $30k-60k range."
  - id: A4
    name: Annual subscription per active metro
    value: "120"
    unit: USDK
    source: "[BP market, BP investorMemo, research.market] annualized spend per active metro is anchored around $120k."
  - id: A5
    name: Revenue recognition for a new metro
    value: "launch fee plus first month of subscription in the close month"
    unit: policy
    source: "[BP businessModel] revenue combines launch setup fees and annual per-metro subscriptions."
  - id: A6
    name: Gross margin
    value: "72"
    unit: pct
    source: "[BP businessModel] target gross margin is 70%; base case assumes modest outperformance as software revenue mixes above manual validation cost."
  - id: A7
    name: Base customer ramp
    value: "2 active metros by M12, 6 by Q4Y2, 15 by Q4Y3"
    unit: count
    source: "[BP milestones] 2 paid design partners in Year 1, 5-7 active metros in Years 1-2, and 15 active metros by Years 2-3."
  - id: A8
    name: Realized logo churn in 3-year base model
    value: "0"
    unit: pct
    source: "[BP expansionLevers] base model assumes early growth comes from expanding within 3-5 operator accounts before observed churn data exists."
  - id: A9
    name: Steady-state monthly churn for LTV math
    value: "1.5"
    unit: pct
    source: "[Startup finance heuristic] sticky workflow/compliance SaaS often underwrites 1-2% monthly churn; used for unit economics, not explicit cohort losses in the 3-year base."
  - id: A10
    name: Founder loaded cash compensation
    value: "12"
    unit: USDK per month
    source: "[Startup finance heuristic] $120k salary plus 20% payroll tax and benefits."
  - id: A11
    name: Engineer loaded cash compensation
    value: "14"
    unit: USDK per month
    source: "[Startup finance heuristic] $140k salary plus 20% payroll tax and benefits for geospatial/product engineers."
  - id: A12
    name: Geospatial and policy product lead loaded compensation
    value: "15"
    unit: USDK per month
    source: "[BP team] specialist hire is critical early; modeled at $150k salary plus 20% load."
  - id: A13
    name: Implementation and customer success loaded compensation
    value: "11"
    unit: USDK per month
    source: "[BP team] implementation lead role modeled at $110k salary plus 20% load."
  - id: A14
    name: Account executive loaded compensation
    value: "13"
    unit: USDK per month
    source: "[Startup finance heuristic] enterprise GTM hire modeled at $130k salary plus 20% load before commissions."
  - id: A15
    name: Hiring timing
    value: "Geo/policy M2; Eng2 M7; CS1 M10; Sales1 M16; Eng3 M22; CS2 M28"
    unit: schedule
    source: "[BP team, BP product, BP milestones] sequencing follows MVP first, then implementation, then modest GTM after reference launches."
  - id: A16
    name: R&D non-payroll spend
    value: "3-8"
    unit: USDK per month
    source: "[BP operations, research.reportMemo] GIS data, cloud, and QA tooling rise as metro templates and risk scoring expand."
  - id: A17
    name: Sales and marketing non-payroll spend
    value: "4-12"
    unit: USDK per month
    source: "[BP gtm] founder-led outbound, travel, and design-partner selling stay light but increase with active pipeline."
  - id: A18
    name: G&A non-payroll spend
    value: "7-12"
    unit: USDK per month
    source: "[Startup finance heuristic] legal, accounting, insurance, and admin stack for an early enterprise software company."
  - id: A19
    name: CAC per new metro
    value: "40"
    unit: USDK
    source: "[Startup finance heuristic] base CAC reflects founder-led enterprise selling with one AE and travel-heavy diligence, but excludes retention-oriented customer success cost."
  - id: A20
    name: Average sales cycle
    value: "4"
    unit: months
    source: "[BP gtm] launch-readiness selling starts 60-120 days before council or transport review; modeled at 4 months."
  - id: A21
    name: Next financing milestone
    value: "6 active metros across 2+ operators, 60%+ launch-to-subscription conversion, renewal plus incident logging live, and 1 adjacency LOI"
    unit: milestone
    source: "[BP milestones, BP experimentRoadmap] this is the next proof point before a larger seed round."
  - id: A22
    name: Cash conversion assumption
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "[Startup finance heuristic] model assumes no debt, capex, or working-capital swings material enough to change early-stage cash materially."
