  - 14
  - 15
- point: Coco 公布了有意义的运营指标，表明多家人行道机器人玩家现在已有足够现场活动来支撑上线工具。
  sourceRefs:
  - 17
- point: Populus 和 Ride Report 说明，城市侧已经存在用于路缘和出行监管的相邻软件预算。
