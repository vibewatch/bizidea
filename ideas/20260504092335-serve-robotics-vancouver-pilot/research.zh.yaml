openQuestions:
- 在上线前，运营商当前在政策、GIS、法务审查和顾问支持上的单城市真实支出到底是多少？
- 在人行道机器人试点中，最终 yes/no 决策通常由哪类城市利益相关方掌握：交通部门、创新办公室、ADA/合规团队、风险管理还是市议会？
- 前 10 个目标城市的人行道、坡道、施工区和学区数据集完整度如何？
- 在狭窄的人行道机器人滩头市场饱和之前，产品能否足够快地扩展到相邻自动化或微出行合规？
