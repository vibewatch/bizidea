competitors:
- name: Populus
  stage: scale-up
  wedge: 面向公共机构的数字化路侧、停车和共享出行管理。
  pricing: Custom / not publicly disclosed.
  strength: 已经向城市销售路侧运营、政策执行和联合采购路径相关的软件。
  weaknessVsUs: 它优化的是机构侧路侧项目管理，而不是运营商侧的人行道机器人许可材料生成和路线可辩护性。
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
- name: Ride Report
  stage: scale-up
  wedge: 面向城市与运营商的出行数据、费用管理与合规工具。
  pricing: Custom / not publicly disclosed.
  strength: 在 MDS、费用追踪和出行项目分析上占据较强位置。
  weaknessVsUs: 它更适合已上线后的出行项目运营，而不是街区级的人行道机器人上线审批工作流。
  sourceRefs:
  - 22
  - 23
  - 24
- name: Esri ArcGIS + integrators
  stage: incumbent
  wedge: 通用型空间分析、路线规划和交通 GIS 技术栈。
  pricing: Custom enterprise licensing.
  strength: 在网络分析、路径规划和空间数据管理上是非常强的 incumbents 工具箱。
  weaknessVsUs: 客户仍需要自己拼出许可逻辑、审查模板和面向机器人的运营规则。
  sourceRefs:
  - 25
  - 26
- name: In-house ops + policy consultants
  stage: incumbent substitute
  wedge: 用内部团队、GIS 承包商和演示文稿手工完成上线准备。
  pricing: Internal headcount plus consulting spend.
  strength: 已被运营商信任，而且能按城市灵活调整。
  weaknessVsUs: 慢、不一致，且无法跨都市圈沉淀复用的软件工作流和基准数据。
  sourceRefs:
  - 1
  - 5
  - 9
regulatoryTechnicalConstraints:
- point: 任何路线方案都必须保留无障碍行人通行空间，并避免制造人行道障碍，因此类似 ADA 的路线检查是产品的核心要求。
  sourceRefs:
  - 7
  - 8
  - 9
- point: 城市可能在正式规则尚未写定前先允许机器人运行，但也可能在起草法规时把它们暂时叫停。
  sourceRefs:
  - 2
  - 3
- point: 安全运营的证明依赖高质量地理空间图层、过街逻辑和可审计的运营规则，而不只是路线规划本身。
  sourceRefs:
  - 18
  - 25
  - 26
- point: 社区事故或病毒式传播的视频，很快就会演变成政策事件，因此事故日志和面向续期的材料，和上线准备本身一样重要。
  sourceRefs:
  - 8
  - 30
validationSignals:
- point: Serve 在温哥华的提案，让议会审查明确成了新城市试点上线的闸门。
  sourceRefs:
  - 1
- point: Long Beach 在最终地方规则定稿前，就已经出现机器人送餐，这凸显了审批与续期工作流的即时痛点。
  sourceRefs:
  - 2
  - 3
- point: Arlington 已经能看到配送机器人运营商在上线前做地图勘测，这说明路线与人行道尽调会发生在服务开始前。
  sourceRefs:
  - 4
- point: West Hollywood 从试点批准一路走到是否转为永久项目的讨论，说明工作流不只覆盖首次上线，也会延伸到续期和公众审视。
  sourceRefs:
  - 5
  - 8
  - 30
- point: Starship 继续通过新校园、1,000 万公里里程碑和新增融资扩大运营规模。
  sourceRefs:
  - 13
  - 14
  - 15
- point: Coco 公布了有意义的运营指标，说明不止一家人行道机器人玩家已经有足够多的现场活动，值得为上线工具买单。
  sourceRefs:
  - 17
- point: Populus 和 Ride Report 证明城市侧已经存在路侧和出行监管的软件预算。
  sourceRefs:
  - 19
  - 20
  - 21
  - 22
  - 23
openQuestions:
- 运营商在上线前，到底会为政策、GIS、法务审查和顾问支持投入多少真实的逐城预算？
- 哪类城市角色最常掌握人行道机器人试点最终的 yes/no 决策权：交通部门、创新办公室、ADA/合规团队、风险团队，还是议会？
- 前 10 个目标都市圈的人行道、路缘坡道、施工和学校区域数据，到底有多完整？
- 在狭窄的人行道机器人滩头市场饱和前，产品能否足够快地扩展到相邻自动化或微出行合规？
