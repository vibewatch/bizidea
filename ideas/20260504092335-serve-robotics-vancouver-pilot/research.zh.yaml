competitors:
- name: Populus
  stage: 扩张期
  wedge: 面向公共机构的数字路缘、停车和共享出行管理。
  pricing: 定制 / 未公开。
  strength: 已经向城市销售路缘运营、政策执行和联合采购路径相关软件。
  weaknessVsUs: 其优化对象是城市侧的路缘项目管理，而不是运营商侧的机器人许可材料生成和人行道路线可辩护性。
  sourceRefs:
  - 18
  - 19
  - 20
  - 21
- name: Ride Report
  stage: 扩张期
  wedge: 面向城市和运营商的出行数据、收费管理与合规工具。
  pricing: 定制 / 未公开。
  strength: 在 MDS、费用追踪和出行项目分析方面占据较强位置。
  weaknessVsUs: 其设计目标是持续性的出行项目运营，而不是街区级的人行道机器人上线前审批工作流。
  sourceRefs:
  - 22
  - 23
  - 24
- name: Esri ArcGIS + integrators
  stage: 成熟厂商
  wedge: 通用型空间分析、路径规划和交通 GIS 技术栈。
  pricing: 定制化企业许可。
  strength: 在网络分析、路径规划和空间数据管理方面是强势 incumbents 工具集。
  weaknessVsUs: 需要客户自己拼装许可逻辑、审查模板和机器人专属运营规则。
  sourceRefs:
  - 25
  - 26
- name: In-house ops + policy consultants
  stage: 成熟替代方案
  wedge: 依靠内部团队、GIS 承包商和演示文稿进行手工上线准备。
  pricing: 内部人力 + 顾问支出。
  strength: 已被运营商信任，且可针对每个城市灵活调整。
  weaknessVsUs: 速度慢、不一致，且无法在多个城市间复利；不能形成可复用的软件工作流或基准数据。
  sourceRefs:
  - 1
  - 5
  - 9
regulatoryTechnicalConstraints:
- point: 任何路线方案都必须保留无障碍行人通行并避免形成障碍，因此 ADA 风格的路线检查是核心产品要求。
  sourceRefs:
  - 7
  - 8
  - 9
- point: 城市可能允许机器人在正式规则定稿前先开始运营，但也可能在起草法规期间要求其撤出。
  sourceRefs:
  - 2
  - 3
- point: 安全运营的证明依赖高质量地理空间图层、路缘穿越逻辑和可审计的运营规则，而不只是路线规划本身。
  sourceRefs:
  - 18
  - 25
  - 26
- point: 社区事件或病毒式视频会迅速演变为政策事件，因此事件日志和可用于续期的文档，与上线准备同样重要。
  sourceRefs:
  - 8
  - 30
validationSignals:
- point: Serve 在温哥华的提案把市议会审查明确设为新城市试点的上线门槛。
  sourceRefs:
  - 1
- point: Long Beach 在本地规则最终敲定前就已有机器人配送，凸显了审批与续期工作流的即时痛点。
  sourceRefs:
  - 2
  - 3
- point: Arlington 已经出现配送机器人运营商在上线前进行测绘的情况，这表明路线和人行道尽调发生在服务开始之前。
  sourceRefs:
  - 4
- point: West Hollywood 从试点批准走向永久项目辩论，证明该工作流会从首次上线延伸到续期和公众审视。
  sourceRefs:
  - 5
  - 8
  - 30
- point: Starship 持续通过新校园、1000 万公里里程碑和新融资实现运营扩张。
  sourceRefs:
