scenarios:
  downside:
    description: "销售周期拉长至 6 个月，Q4Y3 仅有 10 个活跃城市上线，且服务性工作把毛利率压到计划以下。"
    y3RevenueK: 1170.0
    y3EbitdaK: -690.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - 启动项目向订阅的转化率从 60% 降至 45%。
    - Q4Y3 活跃城市从 15 个降至 10 个。
    - 由于 GIS 清洗仍依赖人工，毛利率从 72% 降至 65%。
  base:
    description: "第 1 年的两个付费上线项目复利增长，到 Q4Y3 达到 15 个活跃城市，定价接近研究得出的每个城市年化 $120k 支出。"
    y3RevenueK: 1695.0
    y3EbitdaK: -354.6
    cashLowPointK: 406.8
    keyAssumptionChanges:
    - 启动项目费维持在 $45k。
    - 每个活跃城市的年度订阅维持在 $120k。
    - 活跃城市在 Y1 增长到 2 个、Y2 到 6 个、Y3 到 15 个。
  upside:
    description: "模板复用较早奏效，相邻场景需求加速增长，团队在 Q4Y3 以有限额外招聘达到 18 个活跃城市。"
    y3RevenueK: 2210.0
    y3EbitdaK: 110.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 随着续期和事件日志模块上线，平均年度订阅提升至 $130k。
    - Q4Y3 活跃城市从 15 个升至 18 个。
    - 随着实施标准化，毛利率提升至 78%。
