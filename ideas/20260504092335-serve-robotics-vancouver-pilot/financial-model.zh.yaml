slug: "sidewalk-autonomy-permit-os"
date: "2026-05-04"
currency: USD
modelStartMonth: "2026-06"
assumptions:
- id: A1
  name: pre-seed 交割后的期初现金
  value: "2100"
  unit: USDK
  source: "[BP fundingAsk] 目标区间为 $2-3M；模型采用 $2.1M 的交割额，作为精简型 pre-seed 情景，足以达到下一里程碑并保留 6 个月缓冲。"
- id: A2
  name: 期初活跃城市（M1）
  value: "0"
  unit: count
  source: "[BP executiveSummary] 模型起始时未描述任何已上线且获批的活跃城市。"
- id: A3
  name: 每个新城市的启动项目费
  value: "45"
  unit: USDK
  source: "[BP gtm pricing] 取所述 $30k-60k 区间的中位数作为启动设置费。"
- id: A4
  name: 每个活跃城市的年度订阅费
  value: "120"
  unit: USDK
  source: "[BP market, BP investorMemo, research.market] 每个活跃城市的年化支出锚定在约 $120k。"
- id: A5
  name: 新城市的收入确认方式
  value: "在交割当月确认启动费和首月订阅收入"
  unit: policy
  source: "[BP businessModel] 收入由启动设置费和按城市计费的年度订阅组成。"
- id: A6
  name: 毛利率
  value: "72"
  unit: pct
  source: "[BP businessModel] 目标毛利率为 70%；基准情景假设软件收入占比更高，略优于目标，因为其混合毛利高于人工校验成本。"
- id: A7
  name: 基础客户爬坡
  value: "M12 时 2 个活跃城市，Q4Y2 时 6 个，Q4Y3 时 15 个"
  unit: count
  source: "[BP milestones] 第 1 年有 2 个付费 design partner，第 1-2 年达到 5-7 个活跃城市，第 2-3 年达到 15 个活跃城市。"
- id: A8
  name: 3 年基准模型中的实际 logo 流失
  value: "0"
  unit: pct
  source: "[BP expansionLevers] 基准模型假设早期增长主要来自 3-5 个运营商账户内的扩张，在有观察到的流失数据之前不计入显性流失。"
- id: A9
  name: 用于 LTV 计算的稳态月流失率
  value: "1.5"
  unit: pct
  source: >-
    [Startup finance heuristic] 黏性较强的工作流/合规 SaaS 通常可按 1-2% 月流失率承保；此值用于单位经济模型，不用于 3 年基准中的显式 cohort 流失。
- id: A10
  name: 创始人综合现金薪酬
  value: "12"
  unit: USDK per month
  source: "[Startup finance heuristic] $120k 薪资加 20% 薪资税与福利。"
- id: A11
  name: 工程师综合现金薪酬
  value: "14"
  unit: USDK per month
  source: "[Startup finance heuristic] 地理空间/产品工程师按 $140k 薪资加 20% 负担计。"
- id: A12
  name: 地理空间与政策产品负责人综合薪酬
  value: "15"
  unit: USDK per month
  source: "[BP team] 该专业岗位在早期至关重要；按 $150k 薪资加 20% 负担建模。"
- id: A13
  name: 实施与客户成功综合薪酬
  value: "11"
  unit: USDK per month
  source: "[BP team] 实施负责人岗位按 $110k 薪资加 20% 负担建模。"
- id: A14
  name: 客户经理综合现金薪酬
  value: "13"
  unit: USDK per month
  source: "[Startup finance heuristic] 企业 GTM 招聘按 $130k 薪资加 20% 负担建模，未含佣金。"
- id: A15
  name: 招聘时间安排
  value: "Geo/policy M2; Eng2 M7; CS1 M10; Sales1 M16; Eng3 M22; CS2 M28"
  unit: schedule
  source: "[BP team, BP product, BP milestones] 排期先做 MVP，再补实施，待参考上线案例出现后再进行适度 GTM 扩张。"
- id: A16
  name: 研发非薪酬支出
  value: "3-8"
  unit: USDK per month
  source: "[BP operations, research.reportMemo] 随着城市模板和风险评分扩展，GIS 数据、云资源和 QA 工具支出会提高。"
- id: A17
  name: 销售与营销非薪酬支出
  value: "4-12"
  unit: USDK per month
  source: "[BP gtm] 创始人主导的外呼、差旅和 design partner 销售在早期保持轻量，但会随活跃 pipeline 增长。"
- id: A18
  name: G&A 非薪酬支出
  value: "7-12"
  unit: USDK per month
  source: "[Startup finance heuristic] 早期企业软件公司的法务、会计、保险和行政工具栈。"
- id: A19
  name: 每个新城市的 CAC
  value: "40"
  unit: USDK
  source: "[Startup finance heuristic] 基准 CAC 反映创始人主导的企业销售模式，包含一位 AE 和重差旅尽调，但不含偏向留存的客户成功成本。"
- id: A20
  name: 平均销售周期
  value: "4"
  unit: months
  source: "[BP gtm] 上线就绪销售通常在市议会或交通审查前 60-120 天开始；模型按 4 个月处理。"
- id: A21
  name: 下一轮融资里程碑
  value: >-
    在至少 2 家运营商中达到 6 个活跃城市，启动转订阅率 60%+，续期与事件日志功能上线，并拿到 1 份相邻场景 LOI
  unit: milestone
  source: "[BP milestones, BP experimentRoadmap] 这是在进行更大 seed 轮融资前需要达到的下一个验证点。"
- id: A22
  name: 现金转换假设
  value: "EBITDA approximates operating cash flow"
  unit: policy
  source: "[Startup finance heuristic] 模型假设不存在足以实质改变早期现金状况的债务、资本开支或营运资本波动，因此 EBITDA 近似经营现金流。"
