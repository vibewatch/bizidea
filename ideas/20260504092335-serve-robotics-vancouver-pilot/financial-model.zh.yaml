slug: "sidewalk-autonomy-permit-os"
date: "2026-05-04"
currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: "pre-seed 完成后的期初现金"
    value: "2100"
    unit: USDK
    source: "[BP fundingAsk] 目标融资区间为 $2-3M；模型采用 $2.1M 的精简 pre-seed 情形，以覆盖到下一里程碑并保留 6 个月缓冲。"
  - id: A2
    name: "期初活跃都市圈数（M1）"
    value: "0"
    unit: count
    source: "[BP executiveSummary] 模型起点未描述任何已获批并活跃的都市圈。"
  - id: A3
    name: "每个新都市圈的上线项目费"
    value: "45"
    unit: USDK
    source: "[BP gtm pricing] 取所述 $30k-60k 区间的中位数。"
  - id: A4
    name: "每个活跃都市圈的年度订阅费"
    value: "120"
    unit: USDK
    source: "[BP market, BP investorMemo, research.market] 每个活跃都市圈的年化支出锚定在约 $120k。"
  - id: A5
    name: "新都市圈的收入确认方式"
    value: "launch fee plus first month of subscription in the close month"
    unit: policy
    source: "[BP businessModel] 收入由一次性上线费和按都市圈计费的年度订阅共同构成。"
  - id: A6
    name: "毛利率"
    value: "72"
    unit: pct
    source: "[BP businessModel] 目标毛利率为 70%；基础情形假设软件收入占比更高，略高于目标。"
  - id: A7
    name: "基础客户增长节奏"
    value: "2 active metros by M12, 6 by Q4Y2, 15 by Q4Y3"
    unit: count
    source: "[BP milestones] 第一年 2 个付费 design partner，1-2 年做到 5-7 个活跃都市圈，2-3 年做到 15 个。"
  - id: A8
    name: "3 年基础模型中的实际 logo churn"
    value: "0"
    unit: pct
    source: "[BP expansionLevers] 基础模型假设早期增长主要来自 3-5 个运营商账户内部扩张，因此暂不计已观测 churn。"
  - id: A9
    name: "用于 LTV 计算的稳定态月流失率"
    value: "1.5"
    unit: pct
    source: "[Startup finance heuristic] 黏性较强的工作流/合规 SaaS 常按 1-2% 月流失率估算；仅用于单位经济，不直接映射到 3 年显性 cohort 流失。"
  - id: A10
    name: "创始人综合现金薪酬"
    value: "12"
    unit: USDK per month
    source: "[Startup finance heuristic] 按 $120k 年薪外加 20% 税费与福利计。"
  - id: A11
    name: "工程师综合现金薪酬"
    value: "14"
    unit: USDK per month
    source: "[Startup finance heuristic] 面向地理空间/产品工程师，按 $140k 年薪外加 20% 负担计。"
  - id: A12
    name: "地理空间与政策产品负责人综合薪酬"
    value: "15"
    unit: USDK per month
    source: "[BP team] 该关键岗位需尽早到位；模型按 $150k 年薪外加 20% 负担计。"
  - id: A13
    name: "实施与客户成功综合薪酬"
    value: "11"
    unit: USDK per month
    source: "[BP team] 实施负责人按 $110k 年薪外加 20% 负担计。"
  - id: A14
    name: "客户经理综合薪酬"
    value: "13"
    unit: USDK per month
    source: "[Startup finance heuristic] 企业 GTM 岗位按 $130k 年薪外加 20% 负担计，未含提成。"
  - id: A15
    name: "招聘节奏"
    value: "Geo/policy M2; Eng2 M7; CS1 M10; Sales1 M16; Eng3 M22; CS2 M28"
    unit: schedule
    source: "[BP team, BP product, BP milestones] 顺序是先做 MVP，再补实施，最后在有参考项目后再适度加 GTM。"
  - id: A16
    name: "研发非薪酬支出"
    value: "3-8"
    unit: USDK per month
    source: "[BP operations, research.reportMemo] 随着城市模板和风险评分扩张，GIS 数据、云成本与 QA 工具支出会上升。"
  - id: A17
    name: "销售与市场非薪酬支出"
    value: "4-12"
    unit: USDK per month
    source: "[BP gtm] 早期以创始人外呼、差旅和 design partner 销售为主，投入较轻，但会随管道增长而上升。"
  - id: A18
    name: "G&A 非薪酬支出"
    value: "7-12"
    unit: USDK per month
    source: "[Startup finance heuristic] 早期企业软件公司的法务、财务、保险和行政成本。"
  - id: A19
    name: "每个新都市圈的 CAC"
    value: "40"
    unit: USDK
    source: "[Startup finance heuristic] 基础 CAC 反映创始人主导、差旅密集的企业销售方式，未包含偏留存的客户成功成本。"
  - id: A20
    name: "平均销售周期"
    value: "4"
    unit: months
    source: "[BP gtm] 上线准备类销售通常会在议会或交通评审前 60-120 天启动，因此模型按 4 个月处理。"
  - id: A21
    name: "下一轮融资里程碑"
    value: "6 active metros across 2+ operators, 60%+ launch-to-subscription conversion, renewal plus incident logging live, and 1 adjacency LOI"
    unit: milestone
    source: "[BP milestones, BP experimentRoadmap] 这是发起更大 seed 轮前需要拿到的下一组证明。"
  - id: A22
    name: "现金转换假设"
    value: "EBITDA approximates operating cash flow"
    unit: policy
    source: "[Startup finance heuristic] 假设无债务、无重大 capex、也没有足以显著改变早期现金的营运资金波动。"
