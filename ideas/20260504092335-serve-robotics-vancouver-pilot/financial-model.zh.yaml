modelDiagram:
  title: "单位经济流转"
  mermaid: |
    flowchart LR
      Leads[合格的运营商上线截止期] --> PaidLaunch[付费启动项目]
      PaidLaunch --> ActiveMetros[进入订阅的活跃城市]
      ActiveMetros --> Revenue[启动费 + 订阅收入]
      Revenue --> GrossProfit[72% 毛利润]
      GrossProfit --> Cash[支撑至下一里程碑的 runway]
modelSanity:
- checkName: 收入引擎
  finding: "基准情景下的 Y3 收入由 15 个活跃城市按 $120k ARR 贡献，并叠加 9 个新城市各自 $45k 的启动费，且大多来自少数几个运营商账户。"
- checkName: 必须做对的事
  finding: "前 3-5 个城市必须共享足够多的工作流结构，模板复用才能在把 60%+ 启动项目转化为订阅的同时，把毛利率维持在 70% 以上。"
- checkName: 模型失效条件
  finding: "如果销售周期滑到 6 个月，或实施仍然高度服务化，那么在公司形成 seed 级验证点之前，downside 现金就会转负。"
- checkName: 下一轮证明
  finding: "当公司在至少 2 家运营商中达到 6 个活跃城市、续期与事件工作流上线，并签下一份相邻场景 LOI 时，就有理由进入下一轮融资。"
sanityChecks:
  ruleOf40: "Y3 增长 135.4% + EBITDA 利润率 -20.9% = 114.5%"
  burnMultiple: "Y2 的 burn multiple 约为 1.5x；随着退出 ARR 从 $0.72M 增长到 $1.80M，Y3 改善到约 0.3x。"
  revenuePerFte: "Y3 在 8 名 FTE 下的人均收入为 $212K；对尚未规模化的垂直 SaaS 公司来说可以接受，但仍低于最佳 SaaS 效率。"
  flags:
  - 滩头市场仍然狭窄；seed 故事需要相邻场景拉动，而不只是更多人行道机器人上线。
  - 基准情景假设到 Y3 都没有实际 logo 流失，因为早期增长集中在 3-5 家运营商内部；真实续约情况可能更弱。
  - 只有当 GIS 清洗和许可材料 QA 没有演变成重顾问式服务模式时，毛利率才能维持在目标之上。
  - Y1 的两个付费 design partner 是刚性门槛假设；若延迟 6 个月，很可能需要放慢招聘或提高融资规模。
