  round: pre-seed
  amountM: 2.1
  runwayMonths: 30
  milestone: "在至少 2 家运营商中做到 6 个活跃都市圈，把 60% 以上的上线项目转成订阅，上线续期与事故记录功能，并签下 1 份相邻赛道 LOI。"
  useOfFunds:
    - bucket: "工程"
      amountUsd: 882000
      percentage: 42
    - bucket: "GTM"
      amountUsd: 546000
      percentage: 26
    - bucket: "G&A"
      amountUsd: 336000
      percentage: 16
    - bucket: "缓冲资金（6 个月）"
      amountUsd: 336000
      percentage: 16
scenarios:
  downside:
    description: "销售周期拉长到 6 个月，Q4Y3 时只做到 10 个活跃都市圈，且服务型工作把毛利率拖到低于计划。"
    y3RevenueK: 1170.0
    y3EbitdaK: -690.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - "上线项目转订阅比例从 60% 降到 45%。"
      - "Q4Y3 活跃都市圈从 15 个降到 10 个。"
      - "由于 GIS 清洗仍偏手工，毛利率从 72% 降到 65%。"
  base:
    description: "第一年 2 个付费上线项目，逐步滚成 Q4Y3 的 15 个活跃都市圈，定价维持在研究锚定的每个都市圈年化 $120k 左右。"
    y3RevenueK: 1695.0
    y3EbitdaK: -354.6
    cashLowPointK: 406.8
    keyAssumptionChanges:
      - "上线项目费维持在 $45k。"
      - "每个活跃都市圈年度订阅维持在 $120k。"
      - "活跃都市圈在 Y1 达到 2 个、Y2 达到 6 个、Y3 达到 15 个。"
  upside:
    description: "模板复用很早跑通，相邻赛道带来加速需求，团队在不大幅扩编的情况下于 Q4Y3 做到 18 个活跃都市圈。"
    y3RevenueK: 2210.0
    y3EbitdaK: 110.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - "随着续期和事故记录模块上线，平均年度订阅提升到 $130k。"
      - "Q4Y3 活跃都市圈从 15 个升到 18 个。"
      - "随着实施标准化，毛利率提升到 78%。"
sensitivity:
  - variable: ARPU
    downsideCase: "$100k annual subscription per active metro"
    baseCase: "$120k annual subscription per active metro"
    upsideCase: "$135k annual subscription per active metro"
    y3RevenueImpactK: -215.0
    cashImpactK: -155.0
  - variable: CAC
    downsideCase: "$55k CAC because founder-led sales does not transition cleanly to repeatable AE motion"
    baseCase: "$40k CAC"
    upsideCase: "$30k CAC with referrals and repeat operator wins"
    y3RevenueImpactK: 0.0
    cashImpactK: -135.0
  - variable: churn
    downsideCase: "3.0% monthly steady-state churn"
    baseCase: "1.5% monthly steady-state churn"
    upsideCase: "1.0% monthly steady-state churn"
    y3RevenueImpactK: -130.0
    cashImpactK: -94.0
  - variable: sales cycle
    downsideCase: "6 months from qualified opportunity to paid launch"
    baseCase: "4 months"
    upsideCase: "3 months"
    y3RevenueImpactK: -110.0
    cashImpactK: -79.0
  - variable: gross margin
    downsideCase: "65% because packet QA and GIS correction stay services-heavy"
    baseCase: "72%"
    upsideCase: "78%"
    y3RevenueImpactK: 0.0
    cashImpactK: -119.0
  - variable: hiring pace
    downsideCase: "Pull Eng3 and CS2 forward by 2 quarters before conversion proof"
    baseCase: "Current lean hiring schedule"
    upsideCase: "Delay CS2 until after Y3 conversion proof"
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: "单位经济流转图"
  mermaid: |
    flowchart LR
      Leads[具备明确上线节点的运营商机会] --> PaidLaunch[付费上线项目]
      PaidLaunch --> ActiveMetros[订阅中的活跃都市圈]
      ActiveMetros --> Revenue[上线费加订阅收入]
      Revenue --> GrossProfit[72% 毛利润]
      GrossProfit --> Cash[支撑到下一融资里程碑的现金跑道]
modelSanity:
  - checkName: "收入引擎"
    finding: "基础情形下，Y3 收入来自 15 个活跃都市圈的 $120k ARR，以及 9 个新都市圈各自 $45k 的上线费，且多数落在少数几个运营商账户内。"
  - checkName: "必须跑通的关键环节"
    finding: "最早的 3-5 个都市圈必须共享足够多的流程结构，模板复用才能把毛利率维持在 70% 以上，同时仍能把 60% 以上的上线项目转成订阅。"
  - checkName: "模型何时会失效"
    finding: "如果销售周期拖到 6 个月，或实施始终偏服务型，下行情形会在公司拿到 seed 级证明前先把现金打穿。"
  - checkName: "下一轮融资所需证明"
    finding: "只有当公司证明自己拿下 2 家以上运营商的 6 个活跃都市圈、续期和事故工作流已上线、并拿到 1 份相邻赛道 LOI，下一轮才讲得通。"
sanityChecks:
  ruleOf40: "Y3 growth 135.4% + EBITDA margin -20.9% = 114.5%"
  burnMultiple: "Y2 burn multiple 约 1.5x，随着 exit ARR 从 $0.72M 升到 $1.80M，Y3 改善到约 0.3x。"
  revenuePerFte: "Y3 每个 FTE 约 $212K，对一家尚未规模化的垂直 SaaS 公司算合理，但仍低于顶级 SaaS 效率。"
  flags:
    - "滩头市场仍然偏窄；seed 故事必须靠相邻扩张拉动，不能只靠更多人行道机器人落地。"
    - "基础情形假设到 Y3 都没有实际 logo churn，因为早期增长集中在 3-5 家运营商内部；真实续约情况可能更弱。"
    - "只有在 GIS 清洗和许可材料 QA 不演变成重顾问模式时，毛利率才守得住目标。"
    - "Y1 拿下 2 家付费 design partner 是硬门槛，若延迟 6 个月，几乎必然要更慢招人或多融一轮。"