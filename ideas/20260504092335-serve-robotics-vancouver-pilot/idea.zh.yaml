problem: >-
  人行道配送机器人运营商最先卡住的往往不是硬件，而是逐城审批、路线可辩护性，以及公共通行权风险。
  在试点启动前，扩张团队得手工拼出地图、无障碍论证、运营规则和面向议会的材料。每进入一个新都市圈，
  节奏都会被拖慢，也让零售商在审批落地前不敢轻易承诺。
targetUser:
  primary: "准备进入新城市中心试点区的自动化人行道配送机器人运营商中的市场拓展与政策负责人。"
  secondary: "正在评估小规模人行道机器人试点的城市创新或交通部门工作人员。"
  buyer: "配送机器人公司的市场拓展负责人、公共政策负责人，或负责新城市落地的 GM。"
startupThesis:
  nonObviousInsight: >-
    在人行道机器人领域，稀缺资产已不再是机器人供给，而是能证明机器人网络不会在具体街区制造行人或无障碍问题的审批级证据。
    一旦试点要走到议会表决，扩张软件的重要性就会上升到接近自动驾驶软件本身的级别。
  beachhead: >-
    北美的人行道机器人运营商；它们想在一个新城市启动首个 1-3 平方公里的市中心试点，而且上线前需要市议会或交通部门签字。
  wedge: >-
    一套许可与落地 OS，把人行道地图、机器人尺寸、停靠点和服务时段转成路线风险评分、ADA 卡点预警、电子围栏运营规则，以及可直接递交的许可材料包。
  whyNowCatalyst: >-
    Serve 在温哥华的提案说明，进入新城市如今往往要走一个正式的市政流程，先批准一个社区级试点；这让能够证明落地安全、可控的软件需求一下变得紧迫。
  ventureScalePath: >-
    先从配送机器人运营商的落地审批切入，再扩展到持续合规、事故上报、保险材料、零售点位 onboarding，最终成为机器人、电助力车和远程接管车队在人行道与路侧自动化上的事实记录系统。
solution: >-
  产品会接入城市人行道 GIS 图层、拟议配送区域、机器人尺寸、运营时间窗和商户终点，生成一份运营商和市政部门都能审阅的落地方案。它会按街区评估行人冲突、ADA 瓶颈、学校区域敏感度和过街复杂度，并在试点启动前就给出路线排除建议和电子围栏行为规则。系统还能自动生成许可地图、运营政策和面向社区的说明材料，让扩张团队不用每进一城就再请一轮顾问。获批后，同一套系统还能继续承担合规层，监控规则执行并准备续期材料。
goToMarketSeed:
  firstCustomer: >-
    一家 Series A-B 的自动配送机器人创业公司，正在加拿大或美国一个尚未进入过的城市，筹备其首个需要议会审议的市中心试点。
  buyingTrigger: >-
    一项市政动议、交通评审，或关键商户的上线时间，要求机器人正式运营前必须先提交完整的试点审批材料。
  currentAlternative: "依赖内部运营人员、政策顾问、GIS 承包商、电子表格和演示文稿的手工流程。"
  switchingReason: >-
    这个切口把原本需要数周、而且每城都要重做的准备流程，变成一套可复用的审批材料包；还能在议会审查前先发现人行道风险，给运营商一条比逐城雇顾问更快的落地路径。
  pricingHypothesis: "按活跃都市圈收取年度 SaaS 费用，并对每个新城市的审批流程收取一次性上线设置费。"
