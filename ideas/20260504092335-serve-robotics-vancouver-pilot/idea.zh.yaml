jobsToBeDone:
- job: "当一个新城市要求进行试点审查时，帮助扩张负责人证明机器人 rollout 是安全且可管理的，从而赢得批准并按时上线。"
  currentAlternative: "顾问、演示文稿、手工 GIS 分析以及内部法务审查。"
  successMetric: "从首次城市会议到提交可直接申请许可的材料所需天数，以及各城市的批准率。"
ideaScorecard:
  signalStrength:
    score: 3
    rationale: "该主题簇基于一个经过验证的来源，具备明确的城市试点信号，但来源基础仍然较薄。"
  painIntensity:
    score: 4
    rationale: "城市上线被阻止或延迟会拖累整个城市的收入，因此审批摩擦对运营商具有实质影响。"
  wedgeClarity:
    score: 5
    rationale: "为首城试点生成许可材料并进行人行道风险规划，是一个狭窄、紧迫且用户与买方都清晰的工作流。"
  defensibility:
    score: 3
    rationale: "首版主要依赖软件与工作流，但城市模板、基准数据和运营商集成可逐步构建防御力。"
  ventureScale:
    score: 4
    rationale: "这一滩头阵地可扩展为多城市人行道与路缘自动化的合规和运营层。"
topRisks:
- name: "市场时机"
  description: "如果人行道机器人 rollout 仍然小众，或试点在政治层面停滞，初始客户群可能过小。"
  mitigation: "尽早覆盖相邻的路缘与微出行审批工作流，使平台服务更广泛的公共通行空间自动化市场。"
- name: "工作流预算阻力"
  description: "运营商可能会尝试把许可准备保留在内部，而不愿为新的软件层付费。"
  mitigation: "以更快的上线时间、更少的市议会修改轮次和更低的顾问支出作为 ROI 锚点，并采用按城市计费的定价模型。"
- name: "政策碎片化"
  description: "每个城市可能都需要不同的话术、数据和审查步骤，使产品标准化变得困难。"
  mitigation: "先从少量北美试点城市切入，构建可配置模板，而不是一开始就做一刀切的合规引擎。"
