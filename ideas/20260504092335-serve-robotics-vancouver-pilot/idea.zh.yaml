differentiator: >-
  现有路线工具主要优化上线后的效率，政策顾问则在上线前产出静态文件。这个产品把“感知人行道的路线规划、无障碍风险分析、许可材料生成、运营规则管理”合并进一条为公共通行权场景设计的工作流。随着覆盖城市增加，它还能靠城市模板、事故基准和跨都市圈审批数据持续积累壁垒，而这些数据既不是顾问，也不是通用车队软件会系统采集的。
