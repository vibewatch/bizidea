ideaScorecard:
  signalStrength:
    score: 3
    rationale: "这个信号簇建立在一个经过核实的城市试点来源上，落地信号具体，但来源面仍然偏薄。"
  painIntensity:
    score: 4
    rationale: "如果一个城市的上线被卡住或延迟，整个都市圈的收入都会跟着停摆，因此审批摩擦对运营商是实打实的痛点。"
  wedgeClarity:
    score: 5
    rationale: "围绕首城试点的许可材料生成和人行道风险规划，是一个范围窄、紧迫度高、用户和买方都很清楚的工作流。"
  defensibility:
    score: 3
    rationale: "第一版主要靠软件和流程取胜，但城市模板、基准数据和运营商集成会逐步堆出可防守的护城河。"
  ventureScale:
    score: 4
    rationale: "这个滩头市场后续可以扩展成多城人行道与路侧自动化的合规和运营层。"
topRisks:
  - name: "市场时机"
    description: "如果人行道机器人落地始终停留在小众规模，或试点持续被政治层面拖住，初期客户池可能会小到撑不起业务。"
    mitigation: "尽早切入相邻的路侧自动化和微出行审批工作流，让平台服务更广义的公共通行权自动化市场。"
  - name: "工作流预算阻力"
    description: "运营商可能会选择继续把许可准备留在内部完成，而不是为新软件层买单。"
    mitigation: "用更快的上线节奏、更少的议会修改轮次，以及更低的顾问开支来锚定 ROI，并采用按都市圈计费的定价模型。"
  - name: "政策碎片化"
    description: "每个城市可能都需要不同的表述、数据和评审步骤，这会让产品标准化变得困难。"
    mitigation: "先聚焦少数北美试点城市，构建可配置模板，而不是一开始就做成一套试图包打天下的合规引擎。"