differentiator: >-
  现有路线工具主要优化上线后的效率，政策顾问则在上线前产出静态文件。这个产品把人行道感知路线规划、无障碍风险分析、许可材料生成和运营规则管理合并为一条面向公共通行权的工作流。随着覆盖城市增加，它还能靠城市模板、事故基准和跨都市圈审批数据累积壁垒；这些数据不是顾问或通用车队软件会系统采集的。
