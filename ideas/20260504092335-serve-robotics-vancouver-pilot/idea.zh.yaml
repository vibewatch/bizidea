differentiator: >-
  现有路径规划工具是在上线后优化速度，而政策顾问则在上线前产出静态文档。本产品把人行道感知路线规划、无障碍风险分析、许可材料生成和运营规则管理整合到一套面向公共通行空间的工作流中。随着扩展，它可通过城市模板、事件基准以及跨城市审批数据形成复利式壁垒，而这些都是顾问和通用车队软件无法积累的。
