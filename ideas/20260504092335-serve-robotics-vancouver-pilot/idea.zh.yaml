problem: >-
  人行道配送机器人运营商最先失败的并不是硬件，而是逐城审批、路线可辩护性以及公共通行空间风险。在试点上线之前，扩张团队必须手工整理地图、无障碍论证、运营规则以及面向市议会的材料。这会拖慢每个新城市的进入速度，也让零售商在审批真正落地前不愿承诺。
targetUser:
  primary: "进入新市中心试点区域的自动人行道配送机器人运营商中的市场拓展与政策负责人。"
  secondary: "评估小规模人行道机器人试点的城市创新或交通部门人员。"
  buyer: "配送机器人公司的市场拓展负责人、公共政策负责人，或负责新城市启动的 GM。"
startupThesis:
  nonObviousInsight: >-
    在人行道机器人领域，稀缺资产已不再是机器人供给，而是能够证明机器人网络不会在特定街区造成行人或无障碍问题的审批级证据。一旦试点变成市议会表决，扩张软件的重要性就会与自动驾驶软件相当。
  beachhead: >-
    寻求在一个上线前必须获得市议会或交通部门批准的城市，为首个 1-3 平方公里市中心试点拿到许可的北美人行道机器人运营商。
  wedge: >-
    一个许可与启动 OS，可把人行道地图、机器人尺寸、停靠点和服务时段转化为路线风险评分、ADA 瓶颈预警、地理围栏运营规则以及可直接提交的许可申请材料包。
  whyNowCatalyst: >-
    Serve 在温哥华的提案表明，进入新城市现在需要正式的市政流程来批准街区级试点，从而催生了对能够证明 rollout 安全、可管理的软件的迫切需求。
  ventureScalePath: >-
    先从配送机器人运营商的启动审批切入，再扩展到持续合规、事件报告、保险资料、零售商站点接入，最终成为涵盖机器人、电助力自行车和远程操作车队的人行道与路缘自动化记录系统。
solution: >-
  产品接入城市人行道 GIS 图层、拟议配送区域、机器人尺寸、运营窗口以及商户终点，生成一个可供运营商与市政部门共同审阅的启动方案。它对每个街区的人行冲突、ADA 瓶颈、学区敏感性和路缘穿越复杂度进行评分，并在试点开始前给出路线排除建议和地理围栏行为规则。系统还能自动生成许可地图、运营政策和面向社区的说明材料，让扩张团队不必在每个新城市都雇顾问。获批后，同一套系统还可作为合规层，用于监控规则执行并准备续期材料。
goToMarketSeed:
  firstCustomer: >-
    一家处于 Series A-B 阶段、正准备在加拿大或美国现有版图之外启动首个需经市议会审查的市中心试点的自动配送机器人初创公司。
  buyingTrigger: >-
    市议会动议、交通审查，或锚定商户上线日期要求在机器人开始运营前提交正式试点审批包。
  currentAlternative: "由内部运营人员、政策顾问、GIS 承包商、电子表格和演示文稿组成的手工流程。"
  switchingReason: >-
    该切入点用可复用的审批材料包替代数周的定制准备，在市议会审查前发现人行道风险问题，并比逐城雇本地顾问更快地帮助运营商上线。
  pricingHypothesis: "按活跃城市计费的年度 SaaS，并对每个新城市审批流程收取启动设置费。"
whyNow:
- point: "市政审批现在已成为市场进入的门槛，因此扩张团队在需要更多机器人之前，就已经需要软件。"
