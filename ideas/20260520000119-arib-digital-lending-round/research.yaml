competitors:
- name: Arib
  stage: scale-up
  wedge: Licensed digital financing brokerage and comparison marketplace connecting borrowers to licensed providers.
  pricing: No public enterprise pricing disclosed; marketplace emphasizes comparison across 800+ offers from licensed providers.
  strength: Strong borrower-facing distribution, partner network, and increasingly data-rich matching.
  weaknessVsUs: Does not obviously solve neutral lender-side workflow orchestration across many channels and internal approval paths.
  sourceRefs:
  - 31
  - 33
  - 35
- name: Lendo
  stage: scale-up
  wedge: Digital SME financing and debt-crowdfunding platform with programmatic channels into government-linked sectors.
  pricing: Invoice financing fees no more than 3%; term loans 3% annually (4% for terms under 12 months); funding up to SAR 7.5M on invoice products.
  strength: Concrete SME product depth, visible monetization, and strong distribution through program partners.
  weaknessVsUs: Primarily a financing platform, not a neutral orchestration layer that can sit across many lenders and products.
  sourceRefs:
  - 39
  - 40
  - 42
  - 43
  - 45
  - 46
- name: Raqamyah
  stage: scale-up
  wedge: SAMA-licensed crowdfunding platform for Saudi SME financing.
  pricing: Arrangement fees from 2% to 5%; financing up to SAR 7.5M; typical repayment 3 to 9 months.
  strength: Clear product scope, explicit pricing, and fast borrower timeline.
  weaknessVsUs: Focused on its own funding marketplace rather than lender-agnostic origination operating software.
  sourceRefs:
  - 53
  - 54
- name: Temenos
  stage: incumbent
  wedge: Sharia-compliant core banking plus lifecycle management for origination, decisioning, collections, and compliance.
  pricing: Custom enterprise pricing not publicly disclosed.
  strength: Deep Islamic-banking capabilities and broad end-to-end enterprise scope.
  weaknessVsUs: Heavier transformation footprint than an overlay built specifically for one Saudi SME-finance workflow problem.
  sourceRefs:
  - 71
  - 72
  - 77
- name: Finastra
  stage: incumbent
  wedge: Global lending and origination suite spanning business, consumer, and commercial flows.
  pricing: Custom enterprise pricing not publicly disclosed.
  strength: Broad origination, documentation, and commercial-lending capabilities backed by large enterprise credibility.
  weaknessVsUs: Generic global suite orientation leaves room for a faster Saudi-specific control plane with stronger marketplace / partner routing focus.
  sourceRefs:
  - 81
  - 82
  - 83
