openQuestions:
- 'Which Saudi lender sub-segment has the highest willingness to adopt a neutral origination overlay first: invoice finance, SME murabaha, equipment finance, or bank-affiliated program lending?'
- What share of application fallout today comes from missing documentation versus underwriting rejection versus partner handoff delays?
- How much Sharia workflow variance exists across lenders for SME murabaha and equipment-finance approvals?
- Will finance companies buy this as a standalone control plane, or insist on procurement through existing LOS / core-banking vendors and implementation partners?
