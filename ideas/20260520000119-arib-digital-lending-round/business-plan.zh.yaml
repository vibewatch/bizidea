slug: sharia-lending-origination-os
date: '2026-05-20'
executiveSummary: 符合伊斯兰教法的贷款发起 OS 瞄准的是沙特数字化中小企业融资里正在冒出来的放贷方侧瓶颈：怎么把一份线上申请，变成一套放贷方可直接处理、又符合伊斯兰教法的档案，材料、经授权的银行数据、审批步骤和审计证据都得齐。首个客户应是一家沙特持牌金融公司，或银行旗下的金融业务部门：它正通过至少 3 条进件渠道上线数字化中小企业穆拉巴哈或设备融资产品，其中既有聚合平台，也有直营网页。产品刻意只做叠在现有 LOS 和核心系统上的一层，因为最快拿到预算的办法，不是推动核心替换，而是先证明审批更快、审计更清楚。切口故意收得很窄：只做高摩擦中小企业产品的申请打包、材料编排、合作方路由和审批状态跟踪，而不是整座市场平台、授信引擎或贷后系统。GTM 应该从创始人主导销售起步，绑定一个明确的上线事件，比如新融资产品发布、新聚合平台伙伴接入，或管理层要求在不加运营编制的前提下缩短周转时间。市场证据足以支撑一个可信的沙特滩头市场，但还谈不上天然巨大的独立市场；研究给出的第 3 年 SOM 只有约 $2.4M，所以风险投资回报要靠后续把沙特切口做成可复制模板后，再扩到相邻产品线、渠道和 GCC 市场。最强的看多理由，是监管正在走向正规化、开放金融底座日渐成熟，以及公开证据显示眼下借款人旅程依旧材料很重、对 SLA 很敏感。最大的保留则来自三点：人工流程替代很强、现有套件和平台原生工具都能部分替代，以及目前还没有直接证据说明究竟哪一类放贷方会最先采购一个中立的叠加层。
problem:
- 沙特放贷方即便开始上线数字化中小企业融资，依旧要在碎片化的邮件、PDF、表格和 LOS 流程里管理按机构定制的材料包、审批步骤和合作方交接。
- 符合伊斯兰教法的中小企业产品会带来更高的工作流差异和审计要求，所以新渠道和新产品越多，人工工作越重，审批越慢，转化也越差。
solution:
- 一套放贷方侧发起 OS，把一份中小企业融资申请转成每家放贷方、每条渠道都需要的产品模板、材料清单、授权流程、合作方路由和审批路径。
- 系统会持续维护实时任务状态、异常处理，以及上传记录、规则触发、审批和拒绝的审计链，同时把结果喂给现有 LOS 和核心系统，而不是取而代之。
whyWeWin:
- 公司切进的是现有厂商和聚合平台天然做不好的那层薄薄控制层：围绕沙特本地、又理解伊斯兰教法的多渠道发起编排。
- 每一次部署都会沉淀可复用的放贷方政策映射、材料异常模式、授权日志和审批路径表现数据，时间越久，转化和上线速度越有优势。
strategicChoices:
  beachhead: 在聚合平台和直营渠道上线数字化中小企业穆拉巴哈或设备融资产品的沙特持牌金融公司，以及银行旗下的金融业务部门。
  wedgeRationale: 这条切片有看得见的上线触发器、很痛的材料与路由差异，而且买方能用更快的审批 SLA 和更低的人工运营成本，为软件预算辩护，而不用批准一场完整的信贷栈替换。
  sequencingRationale: 先围绕一条产品线和少数几条进件渠道，做出工作流控制和可审计性；只有在 pilot ROI 和实施可复制性跑通之后，再补开放金融数据抓取、渠道模板和相邻的放贷方工作流。
  notYet:
  - 消费信贷工作流
  - 核心授信或核心银行系统替换
  - 在沙特模板和集成尚未可复用前就做大 GCC 扩张
  - 把贷后和催收当成第一款产品
market:
  tam: $30.0M 的沙特 TAM 估算，基于约 100 家相关机构，每家年 ACV 约 $300k。
  sam: $7.5M 的 SAM 估算，基于未来 3 年内约 25 家最可能上线数字化中小企业融资或合作方引流发起流程的沙特早期采用者。
  som: 第 3 年 SOM 估算为 $2.4M，基于 8 家付费客户、每家年化 ACV 约 $300k。
  segments:
  - 核心细分：正在把中小企业穆拉巴哈和设备融资发起流程数字化的沙特持牌金融公司
  - 次级细分：增加聚合平台或嵌入式金融渠道的银行系金融业务和项目型放贷方
  buyingProcess: 日常使用者会落在数字信贷、信贷运营、合作伙伴和伊斯兰产品团队，但真正拍预算的人通常是首席数字官、信贷负责人，或中小企业融资业务线负责人。最容易解锁预算的场景，是新产品上线、新渠道接入，或被要求缩短周转时间；而是否愿意下单，通常卡在集成舒适度、合规审查，以及这层叠加层能否和现有栈共存。
product:
  mvp: 把单一的中小企业申请流程接到可配置的产品模板、材料清单、审批路由、授权状态和审计日志上，先覆盖 1-2 个沙特中小企业融资产品。MVP 应优先解决放贷方可直接处理的打包和异常管理，而不是自动授信或大而全的贷后功能。
  sixMonth: 为一条滩头产品线交付生产级 pilot：包含渠道接入、清单编排、审批状态跟踪、放贷方政策配置，以及基础的 LOS 或 CRM 集成。
  twelveMonth: 补上开放金融数据连接器、覆盖最常见渠道与产品组合的可复用模板、借款人和运营看板，以及面向新聚合平台或项目伙伴的入驻流程。
  twentyFourMonth: 在沙特部署可复制、毛利转正之后，再扩到多放贷方政策管理、更多中小企业产品线、贷后交接，以及首个面向 GCC 的本地化版本。
  keyBets:
  - 一小套沙特中小企业产品和材料模板，就足以覆盖早期管道里的大部分场景，从而把实施做成可复制产品。
  - 当买方眼下最急的是上一条新产品或新渠道时，他们会更愿意买一层可共存的叠加层，而不是继续扩展现有套件。
  - 开放金融数据和授权事件会进一步提升打包效率和审批速度，但即便这些集成落地比预期慢，产品一开始也能靠工作流本身赢下来。
gtm:
  wedge: 把产品卖成一件事：这是在聚合平台和直营渠道里，最快把数字化中小企业发起流程跑顺、又不用加运营编制或替换核心栈的方法。
  channels:
  - 创始人主导直销，直接找信贷负责人、数字化转型负责人和伊斯兰产品负责人
  - 围绕新中小企业产品上线或聚合平台接入做共创客户合作
  - 借开放金融、聚合平台和实施伙伴已经在信贷上线流程里的位置拿转介绍
  - 从 SME Bank 等项目和生态渠道拿转介绍
  funnelTargets: 目标客户到账户 qualified pilot 的转化率 15-25%，qualified pilot 到付费 pilot 40%+，付费 pilot 到生产环境 60%+，生产账户在 12 个月内完成扩单 50%+。
  pricing: 按活跃融资产品和进件渠道收取年度平台费，再叠加按完成申请流程或成功入账融资笔数计费的实施费和 usage 费用；目标生产期 ACV 约为 $180k-$300k，让定价能与审批更快、流失更少、人工复核更少带来的企业 ROI 对齐。
businessModel:
  revenueStreams:
  - 面向发起工作流编排的年度 SaaS 订阅
  - 实施与集成费用
  - 按完成申请流程或成功入账融资笔数收取的 usage 费用
  - 面向新产品、新渠道和开放金融数据工作流的扩展模块
  unitOfValue: 受管理的活跃融资产品和渠道，usage 则按完成的中小企业申请流程计。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家放贷方内扩到更多中小企业融资产品线
  - 增加更多进件渠道，例如聚合平台、项目门户和嵌入式金融伙伴
  - 开放金融核验、授权管理和分析模块
  - 在沙特本地化跑通后，扩到相邻 GCC 市场
strategyMap:
  northStarMetric: 每月在约定 SLA 内被转成放贷方可处理档案的中小企业申请量
  inputMetrics:
  - 无需人工返工就进入放贷方可处理状态的申请占比
  - 从提交到材料齐全的中位耗时
  - 按渠道拆分的材料缺失退回率
  - 付费 pilot 转生产环境的转化率
  - 上线一个新放贷方产品或渠道模板所需天数
  moatsToBuild:
  - 理解沙特本地和伊斯兰教法的产品模板与放贷方政策库
  - 按渠道和产品沉淀的材料缺失、异常和审批路径结果数据集
  - 嵌进聚合平台、开放金融和实施生态里的伙伴分发网络
  killCriteria:
  - 如果前 8 个共创客户里，不到 3 家能把周转时间至少缩短 25%，或把材料缺失退回率至少降 20%，就停止大范围扩建，收窄 ICP。
  - 如果付费 pilot 到生产环境的转化长期低于 40%，而原因是买方宁愿延用现有 LOS 或人工流程，那就要重新定位，甚至放弃这个切口。
  - 如果前 2 套产品模板和 3 个渠道适配器还覆盖不了目标管道体量的至少 60%，就先收紧滩头市场，再谈规模化招聘。
  mermaid: "flowchart LR\n  Wedge[沙特中小企业发起切口] --> MVP[放贷方可处理的打包式 MVP]\n  MVP --> Proof[审批更快且有审计链的证明]\n  Proof --> Expansion[更多产品、更多渠道与 GCC 扩张]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 这是个很有潜力的基础设施切口，客户痛点也清楚；但在真实放贷方部署里证明买方紧迫度、pilot ROI 和叠加层采用之前，还太早，没法下明确判断。
    whyBelieve: 市场里已经出现真实的数字信贷活动，监管也在变得更正式，公开信息同样说明沙特中小企业融资旅程到今天依旧材料繁重、运营割裂。
    whyDoubt: 沙特滩头市场是聚焦的，不是天然巨大的；如果这层叠加层不能显著更快落地，人工运营、平台原生工作流和现有套件的替代，会很快把采用上限压住。
    nextDiligence: 先拿下 3-5 家放贷方共创客户，再证明一条产品线的部署能明显缩短审批周转时间、减少材料缺失流失，从而支撑每年六位数的软件预算。
  firstCustomer:
    title: 在沙特金融公司里负责线上中小企业穆拉巴哈的数字信贷负责人
    profile: 受 SAMA 监管的放贷方，或银行旗下的金融业务部门；至少有 3 条进件渠道、仍在人工审档，而且还背着“上线或放大数字化中小企业融资但不能扩运营编制”的压力。
    trigger: 一旦新中小企业产品上线、新聚合平台或项目分发伙伴接入，或管理层下达 SLA 目标，团队就会发现现在的材料和审批流程根本撑不起规模。
    buyer: 首席数字官或信贷负责人
    initialContract: 先卖一个 $50k-$100k 的 10-14 周付费 pilot 与实施包；如果周转时间下降约 25-30%，且材料缺失退回明显减少，再折抵到约 $180k-$300k 的年度生产合同里。
  mustBeTrue:
  - 未来 12 个月里，至少 40% 的目标沙特中小企业放贷方会把发起工作流摩擦视为一个已经拨预算的问题。
  - 一层中立叠加层能接进首个客户现有的 LOS 和渠道栈，而不用启动核心替换项目。
  - 首批滩头模板足以覆盖足够多的产品和材料差异，不至于每次实施都沦为定制服务。
  - 更快审批和更低流失带来的 pilot ROI，强到足以支撑高于 $180k 的生产期 ACV。
  - 在现有厂商把这个切口抹平之前，公司能从单一的沙特产品工作流扩到更多渠道、更多产品和更多地区。
  diligenceQuestions:
  - 究竟是哪类沙特放贷方最先会买一个中立的发起叠加层：应收账款融资、中小企业穆拉巴哈、设备融资，还是银行系项目融资？
  - 申请流失里，有多少来自材料缺失？有多少来自授信拒绝？又有多少来自合作方交接延迟？
  - 买方为什么会选择这个叠加层，而不是去扩展 Temenos、Finastra、自建中间件，或平台原生工作流工具？
  - 不同放贷方之间，伊斯兰教法工作流差异到底有多大？模板引擎要可配置到什么程度，才能避免部署过于服务化？
  - 真正能撬开预算的 pilot 指标到底是什么：周转时间、放款转化、新渠道入驻速度，还是合规把握？
operatingAssumptions:
- assumption: 最急迫的首批买方，是正在上线数字化中小企业穆拉巴哈或设备融资产品的沙特持牌金融公司，以及银行旗下的金融业务部门。
  basis: idea.yaml
  validationTest: 至少访谈 15 位目标买方，确认上线时点、渠道复杂度和人工审档，反复排进发起痛点的前两位。
  decisionImpact: 如果不是这样，公司就该把 ICP 转向另一类沙特放贷方，比如应收账款融资或项目型放贷方，再决定是否扩产品广度。
- assumption: 对首个生产场景来说，一层可共存的叠加层，比推动更大范围的信贷套件改造更容易被买下，也更容易落地。
  basis: research.yaml
  validationTest: 跟踪 10 个真实销售周期，确认即便买方拒绝整套系统改造，仍愿意在窄集成、无核心迁移的前提下跑 pilot。
  decisionImpact: 如果不是这样，公司就得转向和现有厂商一起转售，或重新定义产品位置。
- assumption: 围绕材料、审批和授权事件的沙特本地模板，可以被标准化到足以把部署做成产品，而不只是项目。
  basis: 运营判断
  validationTest: 映射前 5 家共创客户，验证首版模板库是否能用配置而非定制代码，覆盖至少 60% 的工作流体量。
  decisionImpact: 如果做不到，招聘和定价都得转向更重实施交付，而这个市场也未必撑得起风险投资回报。
- assumption: 当产品能缩短审批周期、减少材料缺失流失时，目标客户愿意给出每年六位数预算。
  basis: research.yaml
  validationTest: 至少成交 3 个付费 pilot，并把其中 2 个转成生产环境，价格不低于目标带宽，且 ROI 明确绑定审批速度、转化或编制替代。
  decisionImpact: 如果做不到，商业模式就得下沉、增加服务收入，或者把交付价值再做宽。
- assumption: 开放金融数据会让产品更强，但首个切口即便没有它，也能先交付价值。
  basis: research.yaml
  validationTest: 跑一个先只做材料编排的 pilot，再和一个同时接入经授权银行数据流程的 pilot 对比结果。
  decisionImpact: 如果做不到，产品路线和伙伴优先级就得更早压向开放金融集成，非数据功能则要往后放。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 访谈 15-20 家沙特金融公司、银行系金融业务和项目型放贷方。
  hypothesis: 产品上线和渠道接入事件，会立刻把发起工作流软件预算拉出来。
  successMetric: 至少 10 次访谈确认，当前或近期就有与审批 SLA、上线时点或运营编制相关、已经拨预算的项目。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 从 3-5 家潜在共创客户那里，收集真实的材料清单、审批路径和异常日志。
  hypothesis: 一小组可复用的材料与审批模式，已经解释了滩头市场里大部分工作流摩擦。
  successMetric: 至少 60% 的观察到的工作流体量，能被首版模板库覆盖，而不用写专门代码。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 在 2-3 家放贷方里，为一条沙特中小企业产品线试跑“放贷方可直接处理”的打包工作流。
  hypothesis: 这层叠加层能在不替换核心 LOS 的前提下，明显缩短周转时间并降低材料缺失流失。
  successMetric: 至少 2 个 pilot 跑出 25%+ 的周转提速，或 20%+ 的材料缺失退回下降。
  owner: 实施负责人
- horizon: 90-180 天
  experiment: 把付费 pilot 定价和“产品 + 渠道打包”一起测试，并写清生产环境转化标准。
  hypothesis: 买方更愿意接受一个有明确期限、可抵生产合同的实施型 pilot，而不是没有边界的服务项目。
  successMetric: 至少拿下 2 个落在计划价格带内的付费 pilot，而且两者都进入生产环境谈判。
  owner: 创始人/CEO
- horizon: 180-360 天
  experiment: 分别和 1 家开放金融服务商、1 家聚合平台或项目分发渠道，启动伙伴合作动作。
  hypothesis: 实施伙伴和渠道伙伴带来的机会，时点会比纯 outbound 更准。
  successMetric: 至少拿到 5 个合格引荐，并通过伙伴渠道成交 1 个生产环境账户。
  owner: 创始人/CEO
- horizon: 180-360 天
  experiment: 为额外一条产品线或渠道模板交付可复用的入驻流程。
  hypothesis: 先把一条产品线部署跑通之后，在滩头市场内部扩张会更容易。
  successMetric: 首批上线后 12 个月内，至少 2 家现有客户采用第二个产品模块或渠道模块。
  owner: 产品负责人
operations:
- 维护一套受控模板库，把沙特本地材料、产品结构、审批路径和授权事件沉淀进去，让每次实施学到的东西都变成可复用的产品资产。
- 产品、实施和销售每周一起复盘审批流失、材料缺失原因和合作方路由异常。
- 在扩大自动化深度前，先把按角色授权、授权可见性、审计日志和拒绝链路做好。
- 把集成打包成渠道适配器和产品适配器，并把实施边界说清楚，避免服务化失控。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 亲自抓销售、共创客户发现和伙伴拓展，因为现阶段真正的约束仍是买方认知和切口定位。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭建工作流引擎、模板系统、审计链，以及付费 pilot 所需的首批 LOS 或 CRM 集成。
- role: 实施负责人
  startTiming: Month 3-6
  rationale: 把早期放贷方部署打磨成可复用的入驻手册，避免定制集成把产品路线图拖垮。
- role: 产品/合规负责人
  startTiming: Month 6-9
  rationale: 随着产品线扩展，负责放贷方政策配置、伊斯兰教法工作流映射和证据要求。
- role: 客户经理
  startTiming: Month 9-12
  rationale: 只有在 pilot 可引用、ROI 叙事清楚、实施边界稳定之后，才加专职销售。
milestones:
- horizon: 0-12 个月
  items:
  - 完成 15-20 次买方访谈，并在沙特滩头市场拿下 3-5 家共创客户。
  - 为一条中小企业融资产品线交付 MVP，包含模板化打包、审批跟踪和审计日志。
  - 至少转化出 2 个付费 pilot 和 1 个生产环境部署，而且不需要替换核心系统。
  - 建立起首批开放金融或聚合平台转介绍伙伴，以及安全与合规审查包。
- horizon: 12-24 个月
  items:
  - 在沙特滩头市场里达到 6-8 家生产环境客户，并跑到目标 ACV。
  - 为额外产品线和进件渠道交付可复用模板，明显压低实施工作量。
  - 至少在 2 个账户里，跑出来自第二产品模块或第二渠道模块的扩展收入。
  - 证明伙伴带来的管道能补上创始人主导销售。
- horizon: 24-36 个月
  items:
  - 把第 3 年 SOM 规模稳在约 8 家付费客户、约 $2.4M ARR。
  - 从发起打包扩到多放贷方政策管理、贷后交接或 GCC 本地化。
  - 证明部署经济性已经可复制，并拿到首个超出沙特初始切口的区域扩张证据。
risks:
- risk: 不同放贷方之间，符合伊斯兰教法的工作流差异高到超出可复用产品核心的承受范围。
  likelihood: Medium
  impact: High
  mitigation: 从可配置模板起步，把首个滩头市场限定在窄产品集合内，再在激进扩招前验证差异程度。
- risk: 买方更愿意扩展现有套件或内部中间件，而不是采用一层新的叠加层。
  likelihood: High
  impact: High
  mitigation: 把“可共存、见效快”讲透，先证明一条窄上线场景，再用付费 pilot 把 ROI 跑出来，然后再谈更大的改造决策。
- risk: 由于每家放贷方和合作渠道都要单独集成，部署变得过于服务化。
  likelihood: Medium
  impact: High
  mitigation: 尽早把渠道和产品适配器标准化，坚决拒绝超范围定制，并在看清可复用模式后再补实施岗位。
- risk: 开放金融的授权和数据治理要求拖慢产品上线或安全审查。
  likelihood: Medium
  impact: Medium
  mitigation: 把授权可见性、webhook 处理和审计控制做进产品核心，再在非数据切口跑通后按顺序补数据集成。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 融资将覆盖 18 个月：拿下共创客户、交付首批可复用的沙特发起模板与集成、通过企业级安全与合规审查、把付费 pilot 转成生产环境，并证明公司能向更多产品线或渠道扩张。
