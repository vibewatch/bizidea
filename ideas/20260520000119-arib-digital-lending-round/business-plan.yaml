slug: "sharia-lending-origination-os"
date: "2026-05-20"
executiveSummary: >-
  Sharia Lending Origination OS targets the lender-side bottleneck emerging in
  Saudi digital SME finance: turning one online application into a
  lender-ready, Sharia-compatible file with the right documents, consented bank
  data, approval steps, and audit evidence. The first customer is a Saudi
  licensed finance company or bank-affiliated finance arm launching digital SME
  murabaha or equipment-finance products across at least three inbound channels,
  including marketplace and direct web flows. The product is deliberately an
  overlay on existing LOS and core systems, because the fastest path to budget
  is proving faster approvals and cleaner auditability without forcing a core
  replacement. The wedge is narrow by design: application packaging, document
  orchestration, partner routing, and approval-state tracking for high-friction
  SME products rather than a full marketplace, underwriting engine, or
  servicing stack. Go-to-market should start with founder-led sales tied to a
  concrete launch event such as a new financing product, a new marketplace
  partner, or an executive mandate to cut turnaround time without adding ops
  headcount. Market evidence supports a credible Saudi beachhead, but not yet a
  huge standalone market; the year-3 SOM in the research is only about $2.4M,
  so venture upside depends on later expansion into adjacent product lines,
  channels, and GCC markets after the Saudi wedge is repeatable. The strongest
  reasons to believe are regulatory formalization, maturing open-finance rails,
  and public evidence that current borrower journeys remain document-heavy and
  SLA-sensitive. The biggest reasons for caution are strong substitutes from
  manual workflows, incumbent suites, and marketplace-native tools, plus the
  lack of direct proof yet on which lender sub-segment will buy a neutral
  overlay first.
problem:
  - "Saudi lenders launching digital SME finance still manage lender-specific document packs, approval steps, and partner handoffs through fragmented email, PDF, spreadsheet, and LOS workflows."
  - "Sharia-compliant SME products add workflow variance and audit requirements, so new channels and products increase manual work, slow approvals, and reduce conversion."
solution:
  - "A lender-side origination OS converts one SME financing application into the right product template, document checklist, consent flow, partner route, and approval path for each lender and channel."
  - "The system maintains real-time task status, exception handling, and an audit trail of uploads, rule triggers, approvals, and rejections while feeding existing LOS and core systems instead of replacing them."
whyWeWin:
  - "The company wedges into the thin layer incumbents and marketplaces do not own well by default: Saudi-specific, Sharia-aware origination orchestration across multiple channels and existing systems."
  - "Each deployment compounds reusable lender-policy mappings, document-exception patterns, consent logs, and approval-path performance data that improve conversion and onboarding speed over time."
strategicChoices:
  beachhead: "Saudi licensed finance companies and bank-affiliated finance arms launching digital SME murabaha or equipment-finance products across marketplace and direct channels."
  wedgeRationale: "This slice has a visible launch trigger, painful document and routing variance, and a buyer who can justify software spend on faster approval SLAs and lower manual ops without approving a full lending-stack replacement."
  sequencingRationale: "Start with workflow control and auditability for one product line and a few inbound channels, then add open-finance data pulls, channel templates, and adjacent lender workflows only after pilot ROI and implementation repeatability are proven."
  notYet:
    - "Consumer lending workflows"
    - "Core underwriting or core-banking replacement"
    - "Broad GCC expansion before Saudi templates and integrations are reusable"
    - "Servicing and collections as a first product"
market:
  tam: "$30.0M estimated Saudi TAM based on roughly 100 relevant institutions at about $300k annual ACV."
  sam: "$7.5M estimated SAM based on roughly 25 likely Saudi early adopters launching digital SME finance or partner-led origination in the next 3 years."
  som: "$2.4M estimated year-3 SOM based on 8 paying customers at about $300k annualized ACV."
  segments:
    - "Primary: Saudi licensed finance companies digitizing SME murabaha and equipment-finance origination"
    - "Secondary: Bank-affiliated finance arms and program-linked lenders adding marketplace or embedded-finance channels"
  buyingProcess: >-
    The day-to-day users are digital lending, credit-operations, partnerships,
    and Islamic-product teams, but the economic buyer is usually the Chief
    Digital Officer, Head of Lending, or business owner of the SME-finance
    line. Budget is most likely unlocked during a product launch, channel
    onboarding, or turnaround-time mandate and is gated by integration comfort,
    compliance review, and proof that the overlay coexists with the current
    stack.
product:
  mvp: >-
    Connect a single SME application flow to configurable product templates,
    document checklists, approval routing, consent status, and audit logs for
    one or two Saudi SME finance products. The MVP should prioritize lender-ready
    packaging and exception management over automated underwriting or broad
    servicing functionality.
  sixMonth: "Production pilot release for one beachhead product line with channel intake, checklist orchestration, approval-state tracking, lender-policy configuration, and baseline LOS or CRM integrations."
  twelveMonth: "Add open-finance data connectors, reusable templates for the most common channel and product combinations, borrower and ops dashboards, and onboarding workflows for new marketplace or program partners."
  twentyFourMonth: "Expand into multi-lender policy management, additional SME product lines, servicing handoff, and the first GCC-ready localization once Saudi deployments are repeatable and margin-positive."
  keyBets:
    - "A small library of Saudi SME product and document templates covers enough of the initial pipeline to create repeatable implementation."
    - "Buyers will prefer a coexistence overlay over extending incumbent suites when the urgent need is one product launch or one new channel."
    - "Open-finance data and consent events improve packaging and approval speed, but the product can win initially even if those integrations roll out more slowly than expected."
gtm:
  wedge: "Sell the product as the fastest way to launch or clean up digital SME origination across marketplaces and direct channels without adding operations headcount or replacing the lender's core stack."
  channels:
    - "Founder-led direct sales to Heads of Lending, digital transformation leaders, and Islamic-product owners"
    - "Design-partner deals tied to new SME product launches or marketplace onboarding"
    - "Referrals from open-finance, marketplace, and implementation partners already inside lending rollouts"
    - "Program and ecosystem referrals from channels such as SME Bank-linked financing programs"
  funnelTargets: "Target account to qualified pilot 15-25%, qualified pilot to paid pilot 40%+, paid pilot to production 60%+, production account expansion 50%+ within 12 months."
  pricing: "Annual platform fee by active financing product and inbound channel, plus implementation and usage-based fees per completed application flow or booked facility; target production ACV is roughly $180k-$300k so pricing matches enterprise ROI from faster approvals, lower fallout, and fewer manual reviews."
businessModel:
  revenueStreams:
    - "Annual SaaS subscription for origination workflow orchestration"
    - "Implementation and integration fees"
    - "Usage-based fees tied to completed application flows or booked facilities"
    - "Expansion modules for new products, channels, and open-finance data workflows"
  unitOfValue: "Active financing products and channels managed, with usage tied to completed SME application flows"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Additional SME finance product lines within the same lender"
    - "More inbound channels such as marketplaces, program portals, and embedded-finance partners"
    - "Open-finance verification, consent-management, and analytics modules"
    - "Regional rollout into adjacent GCC markets after Saudi localization is proven"
strategyMap:
  northStarMetric: "Monthly SME applications converted to lender-ready files within agreed SLA"
  inputMetrics:
    - "Percent of applications reaching lender-ready state without manual rework"
    - "Median hours from submission to complete document package"
    - "Missing-document return rate by channel"
    - "Paid pilot to production conversion rate"
    - "Days to onboard a new lender product or channel template"
  moatsToBuild:
    - "Saudi and Sharia-aware product-template and lender-policy library"
    - "Dataset of missing-document, exception, and approval-path outcomes by channel and product"
    - "Partner distribution inside marketplace, open-finance, and implementation ecosystems"
  killCriteria:
    - "If fewer than 3 of the first 8 design partners show at least 25% faster turnaround or 20% fewer missing-document returns, stop broad build-out and narrow the ICP."
    - "If paid pilot to production conversion stays below 40% because buyers extend incumbent LOS or manual workflows instead, reposition or abandon the wedge."
    - "If the first 2 product templates and 3 channel adapters do not cover at least 60% of target-pipeline volume, tighten the beachhead before hiring for scale."
  mermaid: |
    flowchart LR
      Wedge[Saudi SME origination wedge] --> MVP[Lender-ready packaging MVP]
      MVP --> Proof[Faster approvals and audit trail proof]
      Proof --> Expansion[More products channels and GCC expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Promising infrastructure wedge with clear customer pain, but still too early to underwrite until buyer urgency, pilot ROI, and overlay adoption are proven in real lender deployments."
    whyBelieve: "The market shows real digital-lending activity, rising regulatory formality, and public evidence that current Saudi SME journeys remain document-heavy and operationally fragmented."
    whyDoubt: "The Saudi beachhead is focused rather than huge, and strong substitutes from manual ops, marketplace-native workflows, and incumbent suites could cap adoption if the overlay is not measurably faster to deploy."
    nextDiligence: "Win 3-5 lender design partners and prove that one product-line deployment can reduce approval turnaround and missing-document fallout enough to support six-figure annual software budgets."
  firstCustomer:
    title: "Head of digital lending at a Saudi finance company launching SME murabaha online"
    profile: "A SAMA-supervised lender or bank-affiliated finance arm with at least three inbound channels, manual file review, and pressure to launch or scale digital SME financing without adding operations headcount."
    trigger: "A new SME product launch, a new marketplace or program-distribution partnership, or an executive SLA mandate exposes that current document and approval workflows do not scale."
    buyer: "Chief Digital Officer or Head of Lending"
    initialContract: "Paid 10-14 week pilot and implementation package in the $50k-$100k range, credited toward a roughly $180k-$300k annual production contract if turnaround time falls by about 25-30% and missing-document returns drop materially."
  mustBeTrue:
    - "At least 40% of target Saudi SME lenders treat origination workflow friction as a funded problem within the next 12 months."
    - "A neutral overlay can integrate into the first customer's existing LOS and channel stack without a core replacement project."
    - "The first beachhead templates cover enough product and document variance to keep implementation from becoming custom services each time."
    - "Pilot ROI from faster approval and lower fallout is strong enough to support production ACVs above $180k."
    - "The company can expand beyond one Saudi product workflow into more channels, products, and geographies before incumbents neutralize the wedge."
  diligenceQuestions:
    - "Which Saudi lender sub-segment buys a neutral origination overlay first: invoice finance, SME murabaha, equipment finance, or bank-affiliated programs?"
    - "What share of application fallout comes from missing documents versus underwriting rejection versus partner handoff delays?"
    - "Why would a buyer choose this overlay instead of extending Temenos, Finastra, in-house middleware, or marketplace-native workflow tools?"
    - "How much Sharia workflow variance exists across lenders, and how configurable must the template engine be to avoid services-heavy deployments?"
    - "What pilot metric actually unlocks budget: turnaround time, funded-facility conversion, onboarding speed for new channels, or compliance confidence?"
operatingAssumptions:
  - assumption: "The most urgent first buyers are Saudi licensed finance companies and bank-affiliated finance arms launching digital SME murabaha or equipment-finance products."
    basis: "idea.yaml"
    validationTest: "Interview at least 15 target buyers and confirm that launch timing, channel complexity, and manual file review repeatedly rank as top-two origination pains."
    decisionImpact: "If false, the company should shift the ICP toward another Saudi lender segment such as invoice finance or program-led lending before building more product breadth."
  - assumption: "A coexistence overlay is easier to buy and deploy than a broader lending-suite transformation for the first production use case."
    basis: "research.yaml"
    validationTest: "Track 10 live sales cycles and confirm that buyers who reject full-suite change are still willing to run a pilot with narrow integrations and no core migration."
    decisionImpact: "If false, the company will need a partner-led resale strategy with incumbent vendors or a different product position."
  - assumption: "Saudi-specific templates for documents, approvals, and consent events can be standardized enough to keep deployments product-like."
    basis: "operator judgment"
    validationTest: "Map the first 5 design partners and verify that the initial template library handles at least 60% of workflow volume with configuration rather than custom code."
    decisionImpact: "If false, hiring and pricing must shift toward implementation-heavy delivery and the market may not support venture returns."
  - assumption: "Target customers will support six-figure annual budgets when the product shortens approval cycles and reduces missing-document fallout."
    basis: "research.yaml"
    validationTest: "Close at least 3 paid pilots and convert 2 to production at or above the target pricing band with ROI tied to approval speed, conversion, or headcount avoidance."
    decisionImpact: "If false, the business model must move downmarket, add more services revenue, or broaden the scope of value delivered."
  - assumption: "Open-finance data rails improve the product but are not required for the first wedge to deliver value."
    basis: "research.yaml"
    validationTest: "Run one pilot with document orchestration first and compare results against a pilot that also uses consented bank-data workflows."
    decisionImpact: "If false, product roadmap and partnerships must prioritize open-finance integrations earlier and delay non-data features."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Run 15-20 customer interviews across Saudi finance companies, bank-affiliated finance arms, and program-linked lenders."
    hypothesis: "Launch and channel-onboarding events create immediate budget urgency for origination workflow software."
    successMetric: "At least 10 interviews confirm a current or near-term budgeted project tied to approval SLA, launch timing, or ops headcount."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Collect real document checklists, approval paths, and exception logs from 3-5 prospective design partners."
    hypothesis: "A small set of repeatable document and approval patterns explains most workflow friction in the beachhead."
    successMetric: "At least 60% of observed workflow volume fits within the first template library without bespoke code."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Pilot the lender-ready packaging workflow for one Saudi SME product line in 2-3 lenders."
    hypothesis: "The overlay can cut turnaround time and missing-document fallout materially without replacing the core LOS."
    successMetric: "At least 2 pilots show 25%+ faster turnaround or 20%+ lower missing-document returns."
    owner: "Implementation lead"
  - horizon: "90-180 days"
    experiment: "Test paid pilot pricing with product-plus-channel packaging and explicit production conversion criteria."
    hypothesis: "Buyers prefer a time-boxed implementation pilot credited toward production rather than an open-ended services engagement."
    successMetric: "At least 2 paid pilots close in the planned price band and both advance to production negotiations."
    owner: "Founder/CEO"
  - horizon: "180-360 days"
    experiment: "Launch partner motions with one open-finance provider and one marketplace or program-distribution channel."
    hypothesis: "Implementation and channel partners can source better-timed deals than pure outbound alone."
    successMetric: "At least 5 qualified introductions and 1 closed production account sourced through partners."
    owner: "Founder/CEO"
  - horizon: "180-360 days"
    experiment: "Ship reusable onboarding for one additional product line or channel template."
    hypothesis: "Expansion inside the beachhead is easier after proving one product-line deployment."
    successMetric: "At least 2 existing customers adopt a second product or channel module within 12 months of first go-live."
    owner: "Product lead"
operations:
  - "Maintain a controlled template library for Saudi documents, product structures, approval paths, and consent events so implementation lessons become reusable product assets."
  - "Run weekly review of approval fallout, missing-document reasons, and partner routing exceptions across product, implementation, and sales."
  - "Build role-based access, consent visibility, audit logging, and rejection lineage before expanding automation depth."
  - "Package integrations as channel and product adapters with clear implementation boundaries to prevent services sprawl."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, design-partner discovery, and partner development because buyer learning and wedge positioning are still the main constraints."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the workflow engine, template system, audit trail, and first LOS or CRM integrations required for paid pilots."
  - role: "Implementation lead"
    startTiming: "Month 3-6"
    rationale: "Turn early lender deployments into repeatable onboarding playbooks and keep custom integration work from overwhelming the product roadmap."
  - role: "Product/compliance lead"
    startTiming: "Month 6-9"
    rationale: "Own lender-policy configuration, Sharia workflow mapping, and evidence requirements as product scope expands across product lines."
  - role: "Account executive"
    startTiming: "Month 9-12"
    rationale: "Add dedicated selling capacity only after the company has referenceable pilots, a clear ROI story, and repeatable implementation boundaries."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 15-20 buyer interviews and secure 3-5 design partners in the Saudi beachhead."
      - "Ship MVP for one SME finance product line with template-based packaging, approval tracking, and audit logs."
      - "Convert at least 2 paid pilots and at least 1 production deployment without requiring core replacement."
      - "Establish initial open-finance or marketplace referral partnerships and a security-compliance review package."
  - horizon: "12-24 months"
    items:
      - "Reach 6-8 production customers in the Saudi beachhead at target ACV."
      - "Launch reusable templates for additional product lines and inbound channels with materially lower implementation effort."
      - "Show expansion revenue from second product or channel modules in at least 2 accounts."
      - "Prove that partner-sourced pipeline can supplement founder-led sales."
  - horizon: "24-36 months"
    items:
      - "Sustain year-3 SOM scale of roughly 8 paying customers and around $2.4M ARR."
      - "Expand from origination packaging into multi-lender policy management, servicing handoff, or GCC localization."
      - "Demonstrate repeatable deployment economics and the first regional expansion proof point beyond the initial Saudi wedge."
risks:
  - risk: "Sharia-compliant workflow variance across lenders is too high for a reusable product core."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Start with configurable templates, constrain the first beachhead to a narrow product set, and validate variance before hiring aggressively."
  - risk: "Buyers extend incumbent suites or internal middleware instead of adopting a new overlay."
    likelihood: "High"
    impact: "High"
    mitigation: "Sell coexistence and faster time-to-value, prove one narrow launch use case, and use paid pilots to show ROI before a larger transformation decision."
  - risk: "Deployments become services-heavy because each lender and partner channel needs custom integration."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Standardize channel and product adapters early, reject out-of-scope custom work, and hire implementation only after identifying reusable patterns."
  - risk: "Open-finance consent and data-governance requirements slow product rollout or security approval."
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Build consent visibility, webhook handling, and audit controls into the core product and sequence data integrations after the non-data wedge is proven."
fundingAsk:
  round: "pre-seed"
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months to win design partners, ship the first reusable Saudi origination templates and integrations, clear enterprise security and compliance reviews, convert paid pilots to production, and prove expansion into additional product lines or channels."
