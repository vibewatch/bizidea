fundingAsk:
  round: pre-seed
  amountM: 2.6
  runwayMonths: 24
  milestone: 在第 18 个月前做到 4 家生产客户，把 2 个付费 pilot 转成可对外引用的部署案例，并至少拿下 1 个同账户内的产品或渠道扩展，同时保留 6 个月缓冲。
  useOfFunds:
  - bucket: 工程
    amountUsd: 1040000
    percentage: 40
  - bucket: GTM
    amountUsd: 650000
    percentage: 25
  - bucket: G&A
    amountUsd: 390000
    percentage: 15
