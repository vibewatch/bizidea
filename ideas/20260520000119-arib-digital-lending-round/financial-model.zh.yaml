    amountUsd: 520000
    percentage: 20
scenarios:
  downside:
    description: 成交节奏整体慢 1 个季度，生产期 ACV 更接近 $250K，且因为部署依旧偏服务化，毛利率收在 68% 左右。
    y3RevenueK: 1530.0
    y3EbitdaK: -620.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
    - 客户爬坡终点只有 6 家付费客户，而不是 8 家。
    - Y3 blended ARPU 落在接近 $250K，而不是 $300K。
    - 毛利率改善更慢，期末比基础情景低 4 个点。
  base:
    description: Y1 的 2 个付费 pilot 逐步转成生产客户，到 Q4Y2 达到 6 家，到 Q4Y3 达到 8 家；定价走到研究里的 SOM 情景，毛利率也略高于 70% 目标。
    y3RevenueK: 2025.0
    y3EbitdaK: -370.9
    cashLowPointK: 757.0
    keyAssumptionChanges:
    - 客户数沿 BP 里程碑路径推进，到 Q4Y3 达到 8 家付费客户。
    - blended ARPU 从试点年的 $180K，逐步抬到 Y3 的 $300K，靠的是生产合同和 usage 费用成熟。
    - 招聘始终落在实施验证之后，第二个 AE 延后到 Q2Y3 才入职。
  upside:
    description: 伙伴转介绍加快采购流程，到 Q4Y3 已有 9 家客户上线，而且模板复用更强，在不提前大规模招聘的情况下把毛利率抬到 74%。
    y3RevenueK: 2350.0
    y3EbitdaK: -180.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - 客户爬坡到 Q4Y3 达到 9 家付费客户。
    - Y3 blended ARPU 借更强的渠道和产品扩展，抬到约 $315K。
    - 实施杠杆更强，期末毛利率比基础情景高约 2 个点。
sensitivity:
- variable: ARPU
  downsideCase: 如果客户只买核心发起工作流，Y3 blended ARPU 会停在 $250K。
  baseCase: Y3 blended ARPU 随着 usage 费用和渠道扩展费落地，达到 $300K。
  upsideCase: 如果第二产品或第二渠道模块更早挂载，Y3 blended ARPU 可到 $325K。
  y3RevenueImpactK: 337.5
  cashImpactK: 243.0
- variable: CAC
  downsideCase: 如果采购、安全审查和集成范围确认拖长销售周期，CAC 会升到 $225K。
  baseCase: 依靠创始人主导销售和伙伴转介绍，CAC 维持在 $180K。
  upsideCase: 如果开放金融和聚合平台伙伴能带来更热的机会，CAC 可降到 $150K。
  y3RevenueImpactK: -40.0
  cashImpactK: -180.0
- variable: 流失率
  downsideCase: 如果 pilot 期后被现有套件顶掉，月流失率会升到 2.0%。
  baseCase: 对黏性较高的放贷方工作流来说，月流失率维持在约 1.25%。
  upsideCase: 一旦审计链和模板深嵌进放贷方运营，月流失率可降到 0.8%。
  y3RevenueImpactK: -120.0
  cashImpactK: -95.0
- variable: 销售周期
  downsideCase: 如果合规和采购比预期更慢，每笔成交都会后移 1 个季度。
  baseCase: pilot 转生产的节奏按建模里的 BP 时间线推进。
  upsideCase: 前两个可引用部署把 ROI 证明跑出来后，销售周期可缩短 1 个季度。
  y3RevenueImpactK: -315.0
  cashImpactK: -250.0
- variable: 毛利率
  downsideCase: 如果实施依旧高度依赖人工，期末毛利率只能到 68%。
  baseCase: 随着模板复用加深，期末毛利率到 72%-73%。
  upsideCase: 如果连接器复用更强、人工异常处理更少，期末毛利率可到 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -81.0
- variable: 招聘节奏
  downsideCase: 第二个 AE 和第三名工程师都比计划提前 2 个季度入职。
  baseCase: 规模化招聘等到 6 家生产客户和更清楚的实施可复制性之后才启动。
  upsideCase: 如果创始人主导销售和伙伴管道持续高效，第二个 AE 会推迟到 Q4Y3 之后。
  y3RevenueImpactK: 60.0
  cashImpactK: -170.0
modelDiagram:
  title: 单位经济流转图
  mermaid: "flowchart LR\n  Pipeline[目标放贷方销售管道] --> Customers[活跃付费客户]\n  Customers --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> EBITDA[扣除薪酬和运营费用后的 EBITDA]\n  EBITDA --> Cash[期末现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的收入引擎，是把付费客户从 Y1 的 2 家拉到 Q4Y3 的 8 家，同时把 blended ACV 从 pilot 定价抬到研究支持的 $300K SOM 水位。
- checkName: 必须做对的事
  finding: 付费 pilot 必须足够快地转成可对外引用的生产部署，才有理由在补第二个 AE 和后续工程师之前，把六位数 ACV 站稳。
- checkName: 模型会失效，如果
  finding: 最大的失效模式，是销售周期整体慢 1 个季度，同时 ARPU 也抬不上去；这样公司就会滑向 downside 情景，现金位置和下一轮融资质量都会一起恶化。
- checkName: 下一轮融资需要的证明
  finding: 只要公司拿下 4 家生产客户、1 个同账户扩展，并证明审批周转时间或材料缺失流失改善到足以支撑可重复的六位数续费，seed 叙事就会明显更强。
sanityChecks:
  ruleOf40: Y3 增速 110.9% + EBITDA 利润率 -18.3% = 92.6%
  burnMultiple: Y2 的 burn multiple 约为 1.0x；到 Y3，随着更高 ACV 合同吸收固定薪酬，改善到约 0.35x。
  revenuePerFte: Y3 为每名 FTE 贡献约 $225K 收入（落在精简型垂直 SaaS 约 $200-400K 的基准区间内，但前提是团队人数控制在 9 名 FTE）。
  flags:
  - 基础情景要求期末定价打到 BP 目标带宽的上沿，并且与研究里“8 家客户、约 $300K 年化 ACV”的 SOM 框架完全对齐。
  - 相对收入规模，Y2 的 burn 依旧偏重，因此任何过早招聘或服务化蔓延都会迅速压缩跑道。
  - CAC 的前提是创始人主导销售和伙伴转介绍持续有效；一旦采购或安全审查主导购买过程，payback 会明显变差。
  - 公司到 Y3 仍是 EBITDA 亏损，所以下一轮融资更看部署杠杆和可引用案例，而不是盈利本身。
