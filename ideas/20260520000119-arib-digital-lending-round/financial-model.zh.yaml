slug: sharia-lending-origination-os
date: '2026-05-20'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-20] 之后的第一个完整建模月份。'
- id: A2
  name: 期初现金 / 建模用 pre-seed 融资
  value: '2600.0'
  unit: USDK
  source: '[BP fundingAsk round pre-seed, targetFundingRangeUsd $2-4M, runwayMonths 18] 模型取中位值 $2.6M，这样既能覆盖 18 个月的验证计划，也多留 6 个月缓冲。'
- id: A3
  name: 期初客户数（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司从零收入起步，必须先拿下 3-5 家共创客户，之后才有付费生产规模。'
- id: A4
  name: 第 1 年客户爬坡
  value: M5 first paid pilot, M9 second paid pilot, exit Y1 at 2 active paying customers
  unit: schedule
  source: '[BP experimentRoadmap 90-180 days] 和 [BP milestones 0-12 months] 都要求第 1 年至少拿下 2 个付费 pilot，并至少有 1 个转成生产环境。'
- id: A5
  name: 第 2-3 年客户爬坡
  value: Q1Y2 3, Q2Y2 4, Q3Y2 5, Q4Y2 6, Q1Y3 6, Q2Y3 7, Q3Y3 7, Q4Y3 8
  unit: active paying customers
  source: '[BP milestones 12-24 months and 24-36 months] 加上 [Research market.som]，支撑基础情景：到 Q4Y2 达到 6 家生产客户，到 Q4Y3 达到 8 家。'
- id: A6
  name: 分阶段 blended 年度 ARPU
  value: Y1 $180K, Y2 $240K, Y3 $300K
  unit: USDK per customer per year
  source: '[BP gtm.pricing target production ACV roughly $180k-$300k, BP investorMemo.firstCustomer paid pilot $50k-$100k, Research market.som 8 customers at about $300k annualized ACV] 模型假设试点年份收入更低，并在 Y3 走到 SOM 对应的稳态 ACV。'
- id: A7
  name: 收入确认口径
  value: Average active customers in period × annual ARPU ÷ periods per year
  unit: formula
  source: 创业财务经验法则：企业合同在周期中上线时，按“周期内平均活跃客户数 × 年 ARPU ÷ 每年周期数”确认收入。
- id: A8
  name: 毛利率爬坡
  value: Y1 50%-62%, Y2 64%-70%, Y3 71%-73%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 和 [BP strategicChoices.sequencingRationale] 都说明，早期高触达实施会压低毛利，等模板复用和集成成熟后毛利才会抬上去。'
- id: A9
  name: 各岗位全年 fully-loaded 薪酬
  value: Founder/CEO 144, engineering 180, implementation 132, product/compliance 156, sales/partnerships 168, G&A/ops 96
  unit: USDK per FTE per year
  source: '[BP team] 加上创业财务经验法则：GCC 企业软件 pre-seed 阶段，精简创始团队的 fully-loaded 薪酬带宽。'
- id: A10
  name: 招聘节奏
  value: Founder and founding engineer M1; implementation lead M4; product/compliance lead M7; first AE M10; second engineer M13; G&A/ops M16; second AE M28; third engineer M31
  unit: timing
  source: '[BP team] 和 [BP strategicChoices.sequencingRationale] 都要求，在大规模 GTM 招聘前，先把实施与产品深度补齐。'
- id: A11
  name: 非薪酬销售与营销费用爬坡
  value: $4K per month in Q1Y1 to $20K per month in Q4Y3
  unit: USDK per month
  source: '[BP gtm channels, funnelTargets, and partner motion] 加上创业财务经验法则：涵盖创始人主导企业销售、差旅和伙伴拓展。'
- id: A12
  name: 非薪酬研发费用爬坡
  value: $6K per month in Q1Y1 to $17K per month in Q4Y3
  unit: USDK per month
  source: '[BP product roadmap and operations]，覆盖云成本、集成、审计日志、安全加固和工作流工具。'
- id: A13
  name: 非薪酬 G&A 费用爬坡
  value: $5K per month in Q1Y1 to $14K per month in Q4Y3
  unit: USDK per month
  source: '[Research regulatoryTechnicalConstraints] 加上创业财务经验法则：覆盖沙特金融软件销售里的法务、审计、保险、合规和行政开支。'
- id: A14
  name: 稳态月流失率
  value: '1.25'
  unit: percent
  source: 创业财务经验法则：针对黏性较高的企业工作流软件，并结合 [Research sensitivityCases] 与 [BP risks] 里关于现有厂商替代和部署服务化的风险做了折中。
- id: A15
  name: blended CAC
  value: '180.0'
  unit: USDK per customer
  source: 按建模得到的启发式结果：把 Y1-Y3 的 GTM 投入——含 AE 薪酬、创始人 50% 的销售时间、伙伴拓展和非薪酬销售费用——摊到 8 家落地付费客户上。
- id: A16
  name: 融资规模规则
  value: 18-month operating plan plus 6-month buffer
  unit: policy
  source: '[BP fundingAsk runwayMonths 18] 加上“18 个月经营计划 + 6 个月缓冲”的融资规则。'
- id: A17
  name: 现金转换简化
  value: Cash approximates EBITDA
  unit: heuristic
  source: 创业公司早期 SaaS 规划里的经验法则：税、capex、债务和营运资金波动，相比 burn 可视为不重大，因此现金近似 EBITDA。
- id: A18
  name: 延后规模化招聘说明
  value: Second AE starts in Q2Y3 and third engineer in Q3Y3 only after 6 production customers exist
  unit: schedule note
  source: '[BP team]、[BP milestones] 和 [BP strategicChoices.sequencingRationale] 都支持：只有在 6 家生产客户跑出来之后，才补第二个 AE 和第三名工程师。'
