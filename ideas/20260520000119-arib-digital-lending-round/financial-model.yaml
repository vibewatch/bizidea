scenarios:
  downside:
    description: "One-quarter slower closes, production ACV stalls closer to $250K, and gross margin exits at 68% because deployments stay services-heavy."
    y3RevenueK: 1530.0
    y3EbitdaK: -620.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
      - "Customer ramp ends at 6 paying customers rather than 8."
      - "Blended Y3 ARPU lands near $250K instead of $300K."
      - "Gross margin improves more slowly and exits 4 points below base."
  base:
    description: "Two paid pilots in Y1 convert into 6 production customers by Q4Y2 and 8 by Q4Y3, with pricing reaching the research SOM case and gross margin slightly above the 70% target."
    y3RevenueK: 2025.0
    y3EbitdaK: -370.9
    cashLowPointK: 757.0
    keyAssumptionChanges:
      - "Customer count follows the BP milestone path to 8 paying customers by Q4Y3."
      - "Blended ARPU steps from $180K in the pilot year to $300K by Y3 as production contracts and usage fees mature."
      - "Hiring stays sequenced behind implementation proof, with the second AE delayed until Q2Y3."
  upside:
    description: "Partner referrals accelerate procurement, 9 customers are live by Q4Y3, and better template reuse lifts gross margin to 74% without pulling forward major hires."
    y3RevenueK: 2350.0
    y3EbitdaK: -180.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - "Customer ramp reaches 9 paying customers by Q4Y3."
      - "Blended Y3 ARPU reaches roughly $315K through stronger channel and product expansion."
      - "Implementation leverage lifts exit gross margin about 2 points above base."
sensitivity:
  - variable: ARPU
    downsideCase: "Y3 blended ARPU stays at $250K because customers buy only the core origination workflow."
    baseCase: "Y3 blended ARPU reaches $300K with usage and channel expansion fees."
    upsideCase: "Y3 blended ARPU reaches $325K as second-product or second-channel modules attach earlier."
    y3RevenueImpactK: 337.5
    cashImpactK: 243.0
  - variable: CAC
    downsideCase: "CAC rises to $225K as procurement, security review, and integration scoping lengthen sales cycles."
    baseCase: "CAC stays at $180K through founder-led selling and partner referrals."
    upsideCase: "CAC falls to $150K if open-finance and marketplace partners source warmer opportunities."
    y3RevenueImpactK: -40.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "Monthly churn rises to 2.0% because overlays are displaced by incumbent suites after the pilot period."
    baseCase: "Monthly churn holds near 1.25% for sticky lender workflows."
    upsideCase: "Monthly churn falls to 0.8% once audit trails and templates become embedded in lender operations."
    y3RevenueImpactK: -120.0
    cashImpactK: -95.0
  - variable: sales cycle
    downsideCase: "Every close slips by one quarter because compliance and procurement take longer than expected."
    baseCase: "Pilot-to-production conversion follows the modeled BP timeline."
    upsideCase: "One quarter comes out of the cycle after the first two reference deployments prove ROI."
    y3RevenueImpactK: -315.0
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: "Exit gross margin reaches only 68% because implementation remains labor intensive."
    baseCase: "Exit gross margin reaches 72%-73% as template reuse deepens."
    upsideCase: "Exit gross margin reaches 74% with stronger connector reuse and less manual exception handling."
    y3RevenueImpactK: 0.0
    cashImpactK: -81.0
  - variable: hiring pace
    downsideCase: "The second AE and third engineer are hired two quarters earlier than planned."
    baseCase: "Scale hires wait until 6 production customers and clearer implementation repeatability."
    upsideCase: "The second AE is delayed until after Q4Y3 because founder-led and partner pipeline remains efficient."
    y3RevenueImpactK: 60.0
    cashImpactK: -170.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Pipeline[Target lender pipeline] --> Customers[Active paying customers]
      Customers --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA after salary and opex]
      EBITDA --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by growing from 2 paying customers in Y1 to 8 by Q4Y3 while lifting blended ACV from pilot pricing to the research-backed $300K SOM level."
  - checkName: Must go right
    finding: "Paid pilots must convert into referenceable production deployments fast enough to justify six-figure ACVs before the second AE and later engineering hires are added."
  - checkName: Model breaks if
    finding: "The biggest failure mode is a one-quarter sales-cycle slip combined with lower ARPU, because that pushes the business toward the downside case where cash and next-round quality both deteriorate."
  - checkName: Next-round proof
    finding: "The seed story is strongest once the company has 4 production customers, 1 in-account expansion, and evidence that approval turnaround or missing-document fallout improves enough to support repeat six-figure renewals."
sanityChecks:
  ruleOf40: "Y3 growth 110.9% + EBITDA margin -18.3% = 92.6%"
  burnMultiple: "Y2 burn multiple is about 1.0x, improving to about 0.35x in Y3 as fixed payroll is absorbed by higher ACV contracts."
  revenuePerFte: "$225K Y3 (inside a roughly $200-400K lean vertical SaaS benchmark, but only if headcount stays at 9 FTE)."
  flags:
    - "The base case requires exit pricing to reach the top end of the BP target band and exactly match the research SOM framing of 8 customers at about $300K annualized ACV."
    - "Y2 burn is still heavy relative to revenue, so any premature hiring or services creep will compress runway quickly."
    - "CAC assumes founder-led selling and partner referrals remain effective; if procurement or security review dominates buying, payback will worsen materially."
    - "The company is still EBITDA negative in Y3, so the next round depends more on deployment leverage and referenceability than on profitability."
