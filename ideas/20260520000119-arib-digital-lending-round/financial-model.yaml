assumptions:
  - id: A1
    name: Model start month
    value: "2026-06"
    unit: month
    source: "[BP date 2026-05-20] first full modeled month after the business-plan date."
  - id: A2
    name: Opening cash / modeled pre-seed raise
    value: "2600.0"
    unit: USDK
    source: "[BP fundingAsk round pre-seed, targetFundingRangeUsd $2-4M, runwayMonths 18] model uses a mid-range $2.6M raise so the company can fund the 18-month proof plan plus a 6-month buffer."
  - id: A3
    name: Starting customers (M1)
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months] the company starts pre-revenue and must first secure 3-5 design partners before paid production scale exists."
  - id: A4
    name: Year 1 customer ramp
    value: "M5 first paid pilot, M9 second paid pilot, exit Y1 at 2 active paying customers"
    unit: schedule
    source: "[BP experimentRoadmap 90-180 days] and [BP milestones 0-12 months] call for at least 2 paid pilots and at least 1 production deployment in the first year."
  - id: A5
    name: Year 2-3 customer ramp
    value: "Q1Y2 3, Q2Y2 4, Q3Y2 5, Q4Y2 6, Q1Y3 6, Q2Y3 7, Q3Y3 7, Q4Y3 8"
    unit: active paying customers
    source: "[BP milestones 12-24 months and 24-36 months] plus [Research market.som] support a base case of 6 production customers by Q4Y2 and 8 by Q4Y3."
  - id: A6
    name: Blended annual ARPU by stage
    value: "Y1 $180K, Y2 $240K, Y3 $300K"
    unit: USDK per customer per year
    source: "[BP gtm.pricing target production ACV roughly $180k-$300k, BP investorMemo.firstCustomer paid pilot $50k-$100k, Research market.som 8 customers at about $300k annualized ACV] model uses lower pilot-year revenue and reaches the SOM steady-state ACV by Y3."
  - id: A7
    name: Revenue recognition convention
    value: "Average active customers in period × annual ARPU ÷ periods per year"
    unit: formula
    source: "Startup-finance heuristic named source: Financial Modeler mid-period go-live rule for enterprise contracts with in-period launches."
  - id: A8
    name: Gross margin ramp
    value: "Y1 50%-62%, Y2 64%-70%, Y3 71%-73%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70] and [BP strategicChoices.sequencingRationale] imply early white-glove implementation depresses margin before template reuse and integrations mature."
  - id: A9
    name: Loaded annual salaries by role
    value: "Founder/CEO 144, engineering 180, implementation 132, product/compliance 156, sales/partnerships 168, G&A/ops 96"
    unit: USDK per FTE per year
    source: "[BP team] plus startup-finance heuristic named source: GCC enterprise-software pre-seed loaded compensation for a lean founding team."
  - id: A10
    name: Hiring sequence
    value: "Founder and founding engineer M1; implementation lead M4; product/compliance lead M7; first AE M10; second engineer M13; G&A/ops M16; second AE M28; third engineer M31"
    unit: timing
    source: "[BP team] and [BP strategicChoices.sequencingRationale] sequence implementation and product depth ahead of scaled GTM hiring."
  - id: A11
    name: Non-payroll sales and marketing spend ramp
    value: "$4K per month in Q1Y1 to $20K per month in Q4Y3"
    unit: USDK per month
    source: "[BP gtm channels, funnelTargets, and partner motion] plus startup-finance heuristic for founder-led enterprise selling, travel, and partner development."
  - id: A12
    name: Non-payroll R&D spend ramp
    value: "$6K per month in Q1Y1 to $17K per month in Q4Y3"
    unit: USDK per month
    source: "[BP product roadmap and operations] covering cloud, integrations, audit logging, security hardening, and workflow tooling."
  - id: A13
    name: Non-payroll G&A spend ramp
    value: "$5K per month in Q1Y1 to $14K per month in Q4Y3"
    unit: USDK per month
    source: "[Research regulatoryTechnicalConstraints] plus startup-finance heuristic for legal, audit, insurance, compliance, and admin overhead in Saudi financial-software sales."
  - id: A14
    name: Steady-state monthly churn
    value: "1.25"
    unit: percent
    source: "Startup-finance heuristic for sticky enterprise workflow software, tempered by [Research sensitivityCases] and [BP risks] around incumbent substitution and services-heavy deployments."
  - id: A15
    name: Blended CAC
    value: "180.0"
    unit: USDK per customer
    source: "Calculated heuristic using modeled Y1-Y3 GTM spend including AE payroll, 50% of founder selling time, partner development, and non-payroll sales expense spread across 8 landed paying customers."
  - id: A16
    name: Funding sizing rule
    value: "18-month operating plan plus 6-month buffer"
    unit: policy
    source: "[BP fundingAsk runwayMonths 18] and developer instruction to add 6 months of buffer for the financing milestone."
  - id: A17
    name: Cash conversion simplification
    value: "Cash approximates EBITDA"
    unit: heuristic
    source: "Startup-finance heuristic for early-stage SaaS planning; taxes, capex, debt, and working-capital swings are assumed immaterial versus burn."
  - id: A18
    name: Delayed scale-hiring note
    value: "Second AE starts in Q2Y3 and third engineer in Q3Y3 only after 6 production customers exist"
    unit: schedule note
    source: "[BP team], [BP milestones], and [BP strategicChoices.sequencingRationale] justify delaying scale hires until implementation repeatability is visible."
