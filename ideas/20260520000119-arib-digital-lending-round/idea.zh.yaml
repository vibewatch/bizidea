problem: 沙特数字信贷开始拿到分发流量，但很多持牌放贷方在处理融资申请时，仍被割裂的信贷运营流程、按机构定制的材料包，以及聚合平台、销售团队和审批团队之间的人工交接拖住。要是再叠加企业融资和伊斯兰结构化产品，情况只会更糟——不同渠道、产品和审批路径往往对应不同的证明材料、交易对手和合同步骤。结果就是审批慢、转化低、审计链条也不清楚，而需求偏偏正在加速线上化。
targetUser:
  primary: 在沙特持牌金融公司里，负责数字信贷或伊斯兰产品运营的人，正通过聚合平台和自有直营渠道上线中小企业融资产品
  secondary: 在沙特银行或金融公司里，负责合作伙伴和嵌入式金融分发的负责人，正通过聚合平台分发融资产品
  buyer: 首席数字官或信贷负责人
startupThesis:
  nonObviousInsight: 像 Arib 这类多放贷方聚合平台正在变成数字流量的前门，借款人获取反而没那么稀缺，真正稀缺的是发起履约能力。瓶颈转成了：怎么把一份线上申请，变成一套能直接交给放贷方处理、又符合伊斯兰教法的融资档案——产品结构、材料、审批和审计链条都得齐。
  beachhead: 从在聚合平台和直营网页渠道上线数字化中小企业穆拉巴哈和设备融资产品的沙特持牌金融公司切入，先解决申请打包、材料编排和按放贷方路由审批。
  wedge: 一套发起操作系统，把一份中小企业融资申请转换成放贷方可直接处理的产品结构、必备材料清单、合作方路由和符合伊斯兰教法的审批证据链。
  whyNowCatalyst: Arib 这轮融资明确要投向信贷基础设施，并把产品从个人端扩到企业端；对想追上数字化需求的沙特放贷方来说，原本靠人工跑的发起运营，既更痛，也更容易拿到预算。
  ventureScalePath: 先吃下沙特中小企业发起工作流，再扩到嵌入式卖家融资、多放贷方政策管理、合作方入驻、贷后交接，以及覆盖银行、金融公司和聚合平台的更广 GCC 伊斯兰金融基础设施。
solution: 做一套夹在聚合平台流量、商户渠道和放贷方后台系统之间的发起 OS。产品接住一份融资申请后，先判断最匹配的产品模板和放贷路径，再生成入账所需的准确材料、审批和合同流程。它会把缺项实时回传给销售、聚合平台和借款人，而不是让申请淹没在邮件和 PDF 积压里。合规和治理层面，系统完整保留证据链：谁上传了什么、哪条政策规则被触发、哪个审批节点还没过、申请为什么被路由或拒绝。首版不是替换 LOS 和核心系统，而是叠在现有系统之上的一层。
goToMarketSeed:
  firstCustomer: 首个客户应是一家沙特持牌金融公司，或银行旗下的金融业务部门：它正上线数字化中小企业穆拉巴哈或设备融资产品，至少有 3 条以上进件渠道，其中包含类似 Arib 的聚合平台，而且运营团队还在逐份人工审核材料。
  buyingTrigger: 新数字化中小企业融资产品上线、新聚合平台伙伴接入，或高层要求在不增加运营编制的前提下把审批周转时间压下来。
  currentAlternative: 围绕 PDF、邮件、WhatsApp、内部 LOS 规则和工程团队维护的定制中间件拼出来的人工信贷运营流程
  switchingReason: 首个客户之所以会切换，是因为这个切口能缩短审批周期、抬高转化，还能在不替换核心信贷栈的情况下，把发起链条做成可审计。
  pricingHypothesis: 按活跃融资产品和渠道收取年度平台费，再叠加按完成申请流程或成功入账融资笔数计费的 usage-based 收费。
