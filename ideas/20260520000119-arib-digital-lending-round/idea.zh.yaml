topRisks:
- name: 伊斯兰教法工作流差异
  description: 不同放贷方可能对应不同的产品结构、审批路径和材料要求，这会让标准化变难。
  mitigation: 先从可配置模板和按放贷方分层的政策引擎做起，再和伊斯兰金融顾问合作，把已批准的流程变体编码进去。
- name: 核心系统惯性
  description: 放贷方可能更愿意在现有 LOS 上继续打补丁，或继续靠人工团队撑着，而不是引入新的编排层。
  mitigation: 按叠加层来卖，先和现有栈集成；用一条产品线证明上线更快、审批 SLA 更优，避免一上来就逼客户做核心迁移。
- name: 地域集中度
  description: 如果产品长期只适用于一个国家的信贷规则，公司就可能看起来像一个服务很重的小众项目。
  mitigation: 先把沙特做成样板，再把同样的发起控制模型扩到相邻的 GCC 伊斯兰金融市场和嵌入式渠道。
