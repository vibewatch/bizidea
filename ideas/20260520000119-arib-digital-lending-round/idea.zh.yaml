jobsToBeDone:
- job: 当我们上线新的数字化中小企业融资产品时，帮信贷团队把所需材料、审批和路由逻辑收进一套工作流里，这样我们就能在不按线性扩运营编制的前提下，批出更多融资。
  currentAlternative: 在表格、邮箱和按放贷方定制的清单之间人工审核
  successMetric: 审批周转时间和成功放款转化率
- job: 当我们接入新的聚合平台或嵌入式金融伙伴时，帮我们把进件打包和审计方式标准化，这样新渠道放量时也不会把合规漏洞一起放大。
  currentAlternative: 定制中间件加上运营和工程团队的人工异常处理
  successMetric: 新渠道上线所需时间，以及因材料缺失被退回的档案占比
