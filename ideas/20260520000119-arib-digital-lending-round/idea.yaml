topRisks:
  - name: "Sharia workflow variance"
    description: "Different lenders may require different product structures, approval paths, and documentation, which can make standardization difficult."
    mitigation: "Start with configurable templates and lender-specific policy layers, and partner with Islamic-finance advisors to encode approved workflow variants."
  - name: "Core-system inertia"
    description: "Lenders may prefer extending their existing LOS or manual teams instead of adopting a new orchestration layer."
    mitigation: "Sell as an overlay that integrates with the current stack, prove faster launch and approval SLAs on one product line, and avoid forcing a core migration."
  - name: "Geographic concentration"
    description: "If the product stays limited to one country's lending rules, the company could look like a services-heavy niche."
    mitigation: "Use Saudi as the proving ground, then expand the same origination-control model into adjacent GCC Islamic-finance markets and embedded channels."
