problem: >-
  Saudi digital lending is getting distribution, but licensed lenders still fulfill many financing applications through
  fragmented credit-ops workflows, lender-specific document packs, and manual handoffs between marketplaces, sales
  teams, and underwriting. That gets worse when a lender wants to add business financing and Islamic-structure products,
  because every channel, product, and approval path can require different evidence, counterparties, and contract steps.
  The result is slow approvals, low conversion, and weak auditability right when digital demand is moving online.
targetUser:
  primary: >-
    Heads of digital lending or Islamic product operations at Saudi licensed finance companies launching SME financing
    products through marketplaces and their own direct channels
  secondary: >-
    Partnerships and embedded-finance leads at Saudi banks or finance companies distributing financing through aggregator
    platforms
  buyer: "Chief Digital Officer or Head of Lending"
startupThesis:
  nonObviousInsight: >-
    As multi-lender marketplaces like Arib become the digital front door, borrower acquisition becomes less scarce than
    origination fulfillment. The real bottleneck shifts to turning one online application into a lender-ready,
    Sharia-compatible financing file with the right product structure, documents, approvals, and audit trail.
  beachhead: >-
    Saudi licensed finance companies launching digital SME murabaha and equipment-financing products through
    marketplaces and direct web channels, starting with application packaging, document orchestration, and
    lender-specific approval routing
  wedge: >-
    An origination operating system that converts one SME financing application into lender-ready product structures,
    required document checklists, partner routing, and audit evidence for Sharia-compliant approval workflows
  whyNowCatalyst: >-
    Arib's round explicitly funds lending infrastructure and expansion into both consumer and business products, making
    manual origination ops newly painful and newly budgetable for Saudi lenders trying to keep up with digital demand.
  ventureScalePath: >-
    Start with Saudi SME origination workflows, then expand into embedded seller finance, multi-lender policy
    management, partner onboarding, servicing handoffs, and broader GCC Islamic-finance infrastructure across banks,
    finance companies, and marketplaces.
solution: >-
  Build an origination OS that sits between marketplace traffic, merchant channels, and lender back-office systems. The
  product ingests a single financing application, identifies the product template and lender path that fit the request,
  and then generates the exact document, approval, and contract workflow needed to book the facility. It tracks missing
  items in real time for sales teams, marketplaces, and borrowers instead of letting applications disappear into email
  and PDF backlogs. For compliance and governance, the system keeps a full evidence trail of who uploaded what, which
  policy rule fired, which approval step is outstanding, and why an application was routed or rejected. The initial
  deployment is an overlay on top of existing LOS and core systems rather than a core replacement.
goToMarketSeed:
  firstCustomer: >-
    A Saudi licensed finance company or bank-affiliated finance arm launching a digital SME murabaha or equipment
    financing product with three or more inbound channels, including an Arib-like marketplace, and a manual ops team
    reviewing every file
  buyingTrigger: >-
    Launch of a new digital SME finance product, onboarding of a new marketplace partner, or executive pressure to cut
    approval turnaround time without adding more operations headcount
  currentAlternative: >-
    Manual credit-ops workflows across PDFs, email, WhatsApp, internal LOS rules, and custom middleware maintained by
    operations and engineering teams
  switchingReason: >-
    The first customer switches because this wedge shortens approval cycles, raises conversion, and creates an
    audit-ready origination trail without forcing the lender to replace its core lending stack.
  pricingHypothesis: >-
    Annual platform fee by active financing product and channel, plus usage-based pricing per completed application flow
    or booked facility
