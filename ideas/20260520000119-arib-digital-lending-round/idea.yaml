      When we launch a new digital SME financing product, help our lending team collect the right documents, approvals,
      and routing logic in one workflow, so we can approve more facilities without growing ops headcount linearly.
    currentAlternative: "Manual reviews across spreadsheets, inboxes, and lender-specific checklists"
