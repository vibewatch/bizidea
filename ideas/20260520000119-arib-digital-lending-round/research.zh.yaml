  validationPlan:
  - priority: 高
    question: 今天最痛的沙特放贷方细分究竟是谁：应收账款融资、设备融资、穆拉巴哈流动资金，还是银行系中小企业项目？
    evidenceToGather: 和持牌金融公司、银行系金融业务里的信贷 / 运营负责人做 10+ 次访谈。
  - priority: 高
    question: 申请流失里，有多少来自材料缺失？有多少来自授信慢？又有多少来自合作方交接失败？
    evidenceToGather: 从至少 3 家共创客户那里拿到漏斗截图和月度运营指标，覆盖平台渠道和直营渠道。
  - priority: 中
    question: 买方会更偏好中立叠加层，还是直接去扩现有 LOS / 核心厂商模块？
    evidenceToGather: 收集 RFP 材料、实施伙伴访谈和输单记录，对比 Temenos / Finastra / 自建方案。
  - priority: 中
    question: 在中小企业穆拉巴哈和设备融资里，不同放贷方之间的伊斯兰教法工作流差异到底有多大？
    evidenceToGather: 向多家放贷方和顾问收集产品政策图、材料模板和合规签核要求。
