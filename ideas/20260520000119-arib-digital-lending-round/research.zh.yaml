competitors:
- name: Arib
  stage: 成长期
  wedge: 持牌数字融资经纪与比价平台，把借款人接到持牌机构。
  pricing: 暂无公开企业级定价；平台强调可比对来自持牌机构的 800+ 个产品报价。
  strength: 借款人侧分发强、伙伴网络强，而且匹配数据越来越丰富。
  weaknessVsUs: 它并没有明显解决中立的放贷方侧工作流编排问题，尤其是跨多渠道和内部审批路径的场景。
  sourceRefs:
  - 31
  - 33
  - 35
- name: Lendo
  stage: 成长期
  wedge: 面向中小企业的数字融资与债权众筹平台，并通过政府关联项目渠道分发。
  pricing: 应收账款融资费用不高于 3%；定期贷款年费率 3%（12 个月以下为 4%）；发票融资额度最高 SAR 7.5M。
  strength: 中小企业产品深度扎实、变现路径清楚，也通过项目伙伴拿到了很强分发。
  weaknessVsUs: 它首先是一家融资平台，而不是一层能横跨多家放贷方和多种产品的中立编排层。
  sourceRefs:
  - 39
  - 40
  - 42
  - 43
  - 45
  - 46
- name: Raqamyah
  stage: 成长期
  wedge: 受 SAMA 许可、面向沙特中小企业融资的众筹平台。
  pricing: 手续费 2%-5%；融资额度最高 SAR 7.5M；典型还款期 3-9 个月。
  strength: 产品边界清楚、定价明确，而且借款人时间线很快。
  weaknessVsUs: 它围绕的是自己的资金市场，而不是放贷方无关的发起操作软件。
  sourceRefs:
  - 53
  - 54
- name: Temenos
  stage: 现有厂商
  wedge: 覆盖核心银行、并支持符合伊斯兰教法的端到端发起、决策、催收与合规管理。
  pricing: 企业级定制定价，暂无公开报价。
  strength: 伊斯兰银行能力很深，且企业级范围覆盖完整。
  weaknessVsUs: 相较之下，一层专门为沙特中小企业融资发起问题打造的叠加层，改造半径更小、落地更快。
  sourceRefs:
  - 71
  - 72
  - 77
- name: Finastra
  stage: 现有厂商
  wedge: 覆盖企业、消费和商业场景的全球信贷与发起套件。
  pricing: 企业级定制定价，暂无公开报价。
  strength: 发起、文档和商业信贷能力很全，也有大型企业背书。
  weaknessVsUs: 它是通用全球套件，反而给一层更快、更本地化、也更强调平台 / 伙伴路由的沙特控制平面留出了空间。
  sourceRefs:
  - 81
  - 82
  - 83
regulatoryTechnicalConstraints:
- point: 产品必须能落进受 SAMA 监管的金融公司环境里，并为持牌机构提供可审计的工作流证据。
  sourceRefs:
  - 2
  - 3
  - 4
- point: 开放金融集成必须支持客户授权可见性、授权撤销，以及状态 webhook 处理。
  sourceRefs:
  - 14
  - 15
- point: 借款人档案往往依赖沙特本地的企业材料和注册文件，这会抬高本地化要求。
  sourceRefs:
  - 33
  - 41
  - 43
  - 54
- point: 数据治理要求已经高到，隐私控制和清晰的授权处理会直接进入企业尽调清单。
  sourceRefs:
  - 1
  - 14
validationSignals:
- point: Arib 拿到 $23.5M 融资，并明确表示会扩建技术基础设施、增加面向个人和企业的融资产品。
  sourceRefs:
  - 95
- point: SAMA 正在积极把开放银行公司从 sandbox 推向正式牌照。
  sourceRefs:
  - 1
- point: Lendo 已经通过 SME Bank、MODON、旅游和文化基金等项目分发融资，说明多渠道发起需求真实存在。
  sourceRefs:
  - 43
  - 44
  - 45
  - 46
- point: Raqamyah 和 Lendo 都把快速决策 / 快速放款写成卖点，说明审批速度已经是明确的竞争杠杆。
  sourceRefs:
  - 40
  - 42
  - 54
- point: Arib 正在接入 Tarabut 做即时收入核验、账户校验和安全支付，这证明放贷方愿意采用模块化数据底座。
  sourceRefs:
  - 35
  - 63
  - 64
openQuestions:
- 究竟哪类沙特放贷方细分最愿意最先采用一层中立的发起叠加层：应收账款融资、中小企业穆拉巴哈、设备融资，还是银行系项目融资？
- 今天的申请流失里，有多大比例来自材料缺失？又有多大比例来自授信拒绝或合作方交接延迟？
- 不同放贷方之间，在中小企业穆拉巴哈和设备融资审批上的伊斯兰教法工作流差异到底有多大？
- 金融公司会把它当成一层独立控制平面来买，还是会坚持通过既有 LOS / 核心银行厂商和实施伙伴来采购？
