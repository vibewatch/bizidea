    sourceRefs:
    - 1
    - 7
    - 35
    - 43
    - 63
  som:
    value: $2.4M
    rationale: SOM 假设第 3 年拿到 8 家付费客户、每家年化 ACV 约 $300k；获客方式以直销金融公司为主，辅以生态伙伴转介绍。
    isEstimate: true
    sourceRefs:
    - 35
    - 43
    - 63
