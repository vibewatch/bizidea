slug: pix-payout-passport
date: "2026-06-19"
executiveSummary: >-
  Pix 付款护照向全球市场平台和创作者平台出售一套中立的控制层——这些平台以集中的资金库向巴西打款，但在 BRL 能通过 Pix 落地之前，仍需银行级放款凭证。巴西 2026 年 FX 分类变化和 Trace $10B+ 的通道验证意味着结算基础设施已就位，但客户端的收款方护照核验、用途码映射和审计包组装仍靠人工完成。首个切口是每月向 500 至 5,000 名巴西卖家或创作者打款、希望实现当天 Pix 打款、且没有专职巴西 FX 运营团队的欧美平台。MVP 应保持在资金流之上，专注于付款前核验、异常路由和账务就绪凭证生成——即便客户使用 Trace、Nium 或 Circle 类合作伙伴，这部分工作流仍归客户所有。GTM 应聚焦于创始人主导的销售，切入巴西上线和付款扣押事件，并借助持牌付款合作伙伴的转介绍——这些合作伙伴希望获得更干净的收款方和 FX 数据，但不想成为客户的完整控制平台。定价应遵循企业控制软件逻辑而非支付点差：收取付费通道上线实施费加上按通道、法律实体和已验证收款方或受保护付款量定价的六位数年度软件费。主要尽调缺口在于：银行拒付基准线、促使买方放弃 PSP+电子表格工作流的付款量阈值，以及中立工作流软件能否在合作伙伴绑定竞争中胜出。本项目足够值得深入调研，因为切口具体且时机到位，但公司应在验证两个付费试点和一个合作伙伴背书部署之前只融 pre-seed。
problem:
  - "巴西稳定币关联付款要求收款方、付款用途和 FX 凭证，而大多数全球平台仍靠电子表格、工单和 PSP 控制台手工管理。"
  - "当天 Pix 上线或付款扣押激增时，财务和付款运营团队会失去卖家信任，并花大量时间在各通道合作伙伴和 ERP 之间拼凑审计与对账凭证。"
solution:
  - "巴西通道护照为每个收款方创建可复用记录，在每批付款发出前将 CPF/CNPJ、KYB、银行或钱包路由、已审批用途码和合作伙伴专属放款要求绑定在一起。"
  - "工作流层对付款账本、ERP 和持牌银行合作伙伴执行付款前核验、异常队列管理，并在每次付款批次生成批次级 FX、手续费和凭证导出，让正式付款和月末结账使用同一数据源。"
whyWeWin:
  - "在位通道和稳定币编排服务商优化的是通过自家网络转账，而非给平台提供跨多个合作伙伴的中立控制层。"
  - "每批受保护的付款都在积累收款方资格、异常模式和合作伙伴文档规则的专有图谱，其替换成本比通道本身更高。"
  - "上线时保持在资金流之上，公司能更快交付产品、保持服务商中立，并避免承担巴西牌照或资产负债表风险。"
strategicChoices:
  beachhead: "每月巴西付款超过 1,000 笔、集中 USD 资金库、希望当天 Pix 打款、且没有专职巴西 FX 运营团队的欧美创作者、应用商店和数字商品市场平台。"
  wedgeRationale: "这类客户最先感受到痛苦：付款频率高、卖家体验可见，一次周末提现失败立刻带来客服压力和财务审查。它也让公司能用一个通道、一类买方和一套重复工作流证明价值，而不是在上线第一天就铺开薪资、贸易或多国定制化。"
  sequencingRationale: "首先与一家持牌合作伙伴、一个付款账本和一套 ERP 编码巴西收款方护照和凭证要求，因为这能带来可量化的付款扣押减少和结账时间改善，同时无需自行结算。正式试点降低异常工作量后，再加入第二合作伙伴支持，届时才扩展至相邻通道和更广泛垂直市场；销售招聘应等到合作伙伴要求和实施模式可重复后再启动。"
  notYet:
    - "持有稳定币结算、FX 点差或本地付款牌照"
    - "在巴西规则模板和合作伙伴集成可重复之前上线墨西哥、哥伦比亚或亚太"
    - "需要不同合规和买方动作的 SMB 自助服务或薪资、贸易工作流"
market:
  tam: "估计 TAM $480M，基于全球约 3,200 家付款密集型平台、金融科技公司和付款运营商，每家或每个通道项目的综合 ACV 约 $150K。"
  sam: "估计 SAM $63M，基于约 450 家具有显著巴西/Pix 复杂性的欧美市场平台、创作者、零工、薪资和付款运营商，初始巴西 ACV 约 $140K。"
  som: "第三年 SOM 示意值 $5.3M，基于巴西通道在地理扩展前的 35 个客户、综合 ACV 约 $150K。"
  segments:
    - "主要：每月向 500 至 5,000 名巴西卖家或创作者打款的欧美创作者、应用商店和数字商品市场平台"
    - "次要：正在添加巴西和 Pix 拨款、需要在持牌合作伙伴上层提供中立控制层的付款网络和 B2B 市场平台"
  buyingProcess: >-
    付款运营和财务系统团队是日常痛苦的承受者，但一旦巴西上线、当天 Pix 推出或反复出现付款扣押危及卖家留存和结账质量，预算审批通常落到财务副总裁、财务总监或全球付款主管。财资、合规、ERP 负责人以及选定的银行或支付机构合作伙伴都会影响采购决策，因为买方必须同时信任放款逻辑和审计链。
product:
  mvp: >-
    MVP 应打通一个付款账本、一套 KYB 或入驻系统、一套 ERP 和一家持牌巴西付款合作伙伴，为正式 Pix 付款生成可复用收款方护照、付款前批次核验、异常队列和账务就绪凭证。应从一个通道、一个法律实体和人工审批异常开始，而非自动化多国路由或资金流转。
  sixMonth: "上线付费正式试点，保护巴西付款批次、减少手工凭证收集工作，并按收款方、用途码和合作伙伴维度暴露被拦截原因。"
  twelveMonth: "加入第二合作伙伴支持、自助规则版本管理、财务总监级结账导出，以及按通道和服务商维度的拒付与付款延迟基准报告。"
  twentyFourMonth: "将护照模型扩展至墨西哥或哥伦比亚及部分亚太通道，再将跨服务商路由和凭证基准演化为多通道拨款控制平台。"
  keyBets:
    - "前三个客户共享足够多的数据字段和合作伙伴逻辑，使第三次部署的实施时间大幅缩短。"
    - "只要产品能将人工异常工作量减半并生成更干净的银行凭证，人工在环的放款审批在初期是可接受的。"
    - "合作伙伴状态数据和拒付案例日志足够支撑构建可复用规则，而不是沉淀为不透明的服务手册。"
    - "一旦巴西成为内部系统级记录工具，同一客户会购买第二个通道或第二个合作伙伴连接。"
gtm:
  wedge: "向正在切换至当天 Pix 或稳定币支付资金库的付款密集型平台出售巴西通道上线与控制方案，软件成为客户账本与持牌付款合作伙伴之间的放款关口。"
  channels:
    - "创始人主导外呼，目标是在欧美平台中正在上线巴西付款的财务副总裁、全球付款主管和付款运营负责人"
    - "来自持牌付款服务商、支付机构和 PSP 的转介绍与联合销售——这些合作伙伴希望在放款前获得更干净的收款方和 FX 数据"
    - "已在帮助平台采用稳定币支付或对账跨境付款运营的财务系统和财资转型顾问"
  funnelTargets: "潜在客户→合格试点转化率 20–30%，试点→正式生产转化率 50%+，正式生产→12 个月内第二合作伙伴或第二通道扩展 40%+。"
  pricing: "收取 $25K–$50K 通道上线实施费，加上按活跃通道和法律实体数量及已验证收款方或受保护付款量分级的 $120K–$180K 年度软件费；这样的定价把购买理由锚定在减少付款扣押、加速卖家打款和优化月末结账，而非支付点差。"
businessModel:
  revenueStreams:
    - "付费通道上线实施和规则设计费"
    - "收款方护照工作流、异常管理和凭证生成的年度企业订阅"
    - "按已验证收款方数量或受保护付款量的计量费"
  unitOfValue: "有受保护付款批次和可复用收款方护照的活跃法律实体和通道。"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一客户内添加更多付款实体、卖家群组和付款合作伙伴"
    - "将同一工作流和凭证模型扩展至墨西哥或哥伦比亚等新通道"
    - "将基准报告、财务总监导出和多合作伙伴路由治理作为控制平台系统级记录工具来销售"
strategyMap:
  northStarMetric: "首次通过率——巴西付款量中附带完整收款方护照和审计就绪批次凭证即完成放款的比例。"
  inputMetrics:
    - "付款批次执行前收款方护照完成率"
    - "受保护批次被拦截或拒付率"
    - "付款异常解决中位时长"
    - "生成月末 FX 和手续费凭证所需时长"
    - "试点转正式生产转化率"
  moatsToBuild:
    - "关联 CPF/CNPJ、付款用途、路由信息和历史异常结果的收款方护照图谱"
    - "与客户账本和 ERP 绑定的跨合作伙伴凭证模板和规则版本"
    - "按通道和服务商维度的拒付原因、付款延迟和结账质量基准数据"
  killCriteria:
    - "前 12 个 ICP 访谈中，少于 4 个能找到有专项预算负责人的巴西付款控制软件需求。"
    - "前 2 个付费试点在 90 天内未能将人工凭证收集或异常处理工作量减少至少 50%。"
    - "第 9 个月前没有任何持牌付款合作伙伴同意签署试点或联合销售协议。"
  mermaid: |
    flowchart LR
      Wedge[巴西通道护照切口] --> MVP[付款前核验与凭证 MVP]
      MVP --> Proof[付款扣押减少与结账提速验证]
      Proof --> Expansion[多合作伙伴与多通道扩展]
investorMemo:
  verdict:
    call: "值得进一步调研"
    conviction: "通道控制切口具体、时机顺风明确，但投资信念在买方愿意为中立层付费、且合作伙伴不将功能打包进自有通道之前保持有条件。"
    whyBelieve: "研究显示巴西特有的监管摩擦、活跃的稳定币到 Pix 基础设施，以及资金流转与客户端放款工作流之间的明确缺口。"
    whyDoubt: "初始市场集中，在位合作伙伴可能捆绑浅层护照功能，目前还没有直接证据表明促使买方放弃电子表格的付款量阈值在哪里。"
    nextDiligence: "在将本项目视为完整种子轮质量之前，先确认两个付费共创客户、一个持牌合作伙伴集成承诺，以及一个可量化减少付款扣押或结账工作量的试点。"
  firstCustomer:
    title: "美国创作者市场平台财务副总裁或全球付款主管"
    profile: "每月巴西付款超过 1,000 笔、集中 USD 资金库、一个 PSP 合作关系、没有专职巴西 FX 运营团队的欧美数字商品或创作者平台。"
    trigger: "巴西上线、当天 Pix 打款推出，或反复出现银行扣押迫使手工说明收款方和 FX 细节。"
    buyer: "财务副总裁或全球付款主管"
    initialContract: "8–12 周的付费试点，覆盖一个巴西实体和一个付款合作伙伴，费用 $25K–$50K，待所有巴西付款批次接入护照工作流后转为约 $120K–$180K 年度软件费加计量费。"
  mustBeTrue:
    - "前 12 个目标买方中至少 5 个确认有专项预算负责人负责巴西付款控制，优先于自建内部运营团队。"
    - "前 3 个客户在巴西付款批次上的人工异常处理或凭证组装时间减少至少 50%。"
    - "持牌银行或支付机构合作伙伴愿意共享足够的放款状态和文档逻辑，支撑产品编码可重复规则。"
    - "至少 2 个通道或付款合作伙伴容忍并支持中立工作流层，而非将其阻断以推广自家捆绑工具。"
    - "相邻通道在 18 个月内能复用至少 60% 的巴西数据模型和工作流。"
  diligenceQuestions:
    - "巴西付款批次当前的被拦截和拒付率是多少？主要原因是什么？"
    - "平台上线当天 Pix 打款时，谁实际签署预算和安全审批？"
    - "合作伙伴 API 文档之外有多少专属逻辑只能通过服务方式学习？"
    - "Trace、Nium、Circle 或本地银行合作伙伴会联合销售中立控制层，还是会竞相将其打包进自有工具？"
    - "收款方护照模型迁移到墨西哥或哥伦比亚时，是否需要重置实施成本？"
operatingAssumptions:
  - assumption: "巴西上线和当天 Pix 项目在买方自建本地运营团队或延续电子表格方案之前会产生软件预算。"
    basis: research.yaml
    validationTest: "访谈 12 个 ICP 账户，完成至少 2 个与活跃巴西上线或付款整改项目关联的付费试点。"
    decisionImpact: "若不成立，将 ICP 缩窄至有现存付款扣押痛苦的更大平台，或重新定位为服务主导的实施合作伙伴。"
  - assumption: "一个持牌付款合作伙伴、一个付款账本和一套 ERP 覆盖足够多的前三个客户，使 MVP 保持可重复。"
    basis: idea.yaml
    validationTest: "梳理前 5 个合格账户，确认至少 60% 共享相同的初始合作伙伴和财务系统组合。"
    decisionImpact: "若不成立，进一步收窄滩头市场或提高实施定价，因为产品复用率太低。"
  - assumption: "产品只需通过强制付款前护照核验和凭证生成，无需持有资金流，即可将人工异常工作量减半。"
    basis: operator judgment
    validationTest: "对两批付款批次进行正式或影子试点，测量人工触点数、解决时长和被拦截率的前后对比。"
    decisionImpact: "若不成立，相对于 PSP 控制台的差异化减弱，路线图可能需要更深的自动化或更窄的合规用例。"
  - assumption: "持牌合作伙伴将提供足够的文档和状态接口，支撑规则版本管理和联合销售对话。"
    basis: research.yaml
    validationTest: "在 9 个月内完成 3 个合作伙伴工作坊，并签署至少 1 份集成或转介绍协议。"
    decisionImpact: "若不成立，公司须转向白标交付、基准报告或更小范围的特定服务商集成。"
  - assumption: "巴西收款方护照模型将在至少一个相邻通道实现大部分规则复用。"
    basis: idea.yaml
    validationTest: "完成墨西哥和哥伦比亚通道设计评审，在前两个巴西客户之后展示至少 60% 的字段和工作流复用率。"
    decisionImpact: "若不成立，风险投资规模化论点减弱，融资应基于更窄的巴西专属业务。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "访谈 12 位巴西上线平台的付款运营、财务和财务总监负责人，收集当前被拦截率、客服量和结账工作量基准。"
    hypothesis: "巴西上线和当天 Pix 推出催生的是有资金支撑的控制软件需求，而非泛化的支付痛苦。"
    successMetric: "至少 6 个访谈得出量化的人工工作量基准，且至少 2 个潜在客户同意付费试点。"
    owner: "创始人/CEO"
  - horizon: 0–90 天
    experiment: "与 3 家持牌银行、支付机构或 Trace/Nium 类合作伙伴进行合作伙伴设计会议，定义最小收款方、用途码和 FX 凭证包。"
    hypothesis: "存在一套可重复的核心凭证模式，能在无需每个账户定制服务的情况下支撑首款产品。"
    successMetric: "至少 2 个合作伙伴产出重叠的必填字段，且至少 1 个同意共享异常原因参与试点。"
    owner: "创始人/CEO"
  - horizon: 90–180 天
    experiment: "基于一个共创客户的历史巴西付款批次构建影子模式护照 MVP。"
    hypothesis: "付款前核验和可复用收款方护照能在正式放款前发现大多数可预防的被拦截情况。"
    successMetric: "MVP 在采样批次上标记至少 70% 的已知数据或用途码异常。"
    owner: "创始工程师"
  - horizon: 90–180 天
    experiment: "上线首个付费正式巴西试点，覆盖一个法律实体、一个合作伙伴和一个月末结账周期。"
    hypothesis: "窄范围的正式部署能将人工凭证和异常工作量削减到足以转化为年度软件合同的程度。"
    successMetric: "人工异常处理时间减少至少 50%，客户签署年度合同。"
    owner: "产品/合规主管"
  - horizon: 180–365 天
    experiment: "向同一客户添加第二个付款合作伙伴或 PSP，并对两者的被拦截率、延迟和凭证质量进行基准对比。"
    hypothesis: "服务商中立控制是真实的购买理由，且能产生可量化的跨合作伙伴洞察。"
    successMetric: "客户通过两个合作伙伴路由正式付款量，同时维护一套共享护照和凭证工作流。"
    owner: "集成工程师"
  - horizon: 180–365 天
    experiment: "与现有巴西客户共同设计和验证墨西哥或哥伦比亚通道模板。"
    hypothesis: "至少一个相邻通道能复用大部分巴西数据模型，且 ACV 扩展速度快于净新增客户获取。"
    successMetric: "至少 60% 的字段和工作流步骤得到复用，且至少一个客户承诺第二通道路线图。"
    owner: "创始人/CEO"
operations:
  - "为通道规则、收款方要求和审批策略标注明确的生效日期和合作伙伴归属，进行版本管理。"
  - "维护可审计的批次日志，关联源账本数据、合作伙伴响应、FX 凭证和 ERP 凭证导出。"
  - "在银行合作伙伴拒付数据支撑更深自动化之前，为高风险或低置信度的放款保留人工审批路径。"
  - "用本地合规顾问和 BCB 授权合作伙伴处理规则变更，而非在产品内做无依据的监管解释。"
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: "主导共创客户销售、合作伙伴拓展和监管探索，因为买方话语体系和合作伙伴激励机制仍是最大的未知量。"
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: "构建收款方护照数据模型、合作伙伴连接器、异常引擎和审计导出工作流。"
  - role: 产品/合规主管
    startTiming: 第 2–4 个月
    rationale: "将合作伙伴文档要求转化为版本化规则，并主导首批客户实施。"
  - role: 集成工程师
    startTiming: 第 4–6 个月
    rationale: "将首批客户的映射关系转化为跨付款账本、ERP 和合作伙伴 API 的可复用连接器。"
  - role: 实施主管
    startTiming: 第 6–9 个月
    rationale: "主导正式批次入驻、异常运营和可引用的客户结果，避免工程团队沦为服务团队。"
milestones:
  - horizon: 0–12 个月
    items:
      - "完成 12–15 个 ICP 访谈、3 个合作伙伴设计会议和 2 个付费巴西试点。"
      - "交付收款方护照、批次付款前核验、异常队列和账务就绪凭证的 MVP。"
      - "将至少 1 个试点转化为六位数年度合同，并签署至少 1 份持牌合作伙伴集成或转介绍协议。"
      - "建立被拦截率、异常处理时长和月末凭证生成的基准指标。"
  - horizon: 12–24 个月
    items:
      - "实现 8–12 个付费巴西客户，部署上线时间缩短至 30 天以内。"
      - "加入第二合作伙伴支持、财务总监级结账工作流，以及拒付和付款延迟基准报告。"
      - "在现有账户内赢得首次扩展——向第二合作伙伴或第二通道延伸。"
  - horizon: 24–36 个月
    items:
      - "上线 2 个相邻通道，数据模型大部分复用，并在核心 ICP 内验证多通道扩展。"
      - "构建跨多个持牌合作伙伴的基准驱动路由和凭证控制平台。"
      - "在考虑薪资或贸易等相邻垂直市场之前，先展示软件级毛利率和稳定的续约率。"
risks:
  - risk: "通道和付款合作伙伴捆绑足够多的护照和异常工具，削弱独立产品的 ACV。"
    likelihood: Medium
    impact: High
    mitigation: "围绕服务商中立工作流、ERP 凭证和跨合作伙伴基准数据建立差异化；优先服务正在使用或评估多个付款合作伙伴的客户。"
  - risk: "巴西监管变化或合作伙伴政策调整超过团队规则更新速度。"
    likelihood: High
    impact: High
    mitigation: "从一个通道起步，与本地顾问和持牌合作伙伴对规则进行版本管理，并对高风险案例保留人工审批。"
  - risk: "痛苦阈值高于预期，中等量级平台继续容忍 PSP+电子表格的运营模式。"
    likelihood: Medium
    impact: High
    mitigation: "切入活跃上线和反复扣押事件进行销售，资格审查须有量化痛苦数据，并将 ICP 收窄至每月付款超过 1,000 笔的平台。"
  - risk: "跨账本、KYB 系统和合作伙伴 API 的集成蔓延使部署过于定制化，软件毛利率难以维持。"
    likelihood: Medium
    impact: High
    mitigation: "将早期客户限制在一个主流合作伙伴和财务系统模式，量化模板复用率，并对定制化工作单独定价。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月资金跑道，用于构建巴西护照 MVP、完成两个付费共创客户试点、组建初始产品合规和实施团队、签署持牌合作伙伴集成协议，并验证六位数年度合同能从通道上线项目转化而来。"
