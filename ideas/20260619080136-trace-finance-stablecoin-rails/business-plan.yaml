slug: pix-payout-passport
date: "2026-06-19"
executiveSummary: >-
  Pix Payout Passport sells a neutral control layer for global marketplaces and
  creator platforms that fund Brazil payouts from centralized treasury flows but
  still need bank-grade release evidence before BRL can land through Pix.
  Brazil's 2026 FX classification change and Trace's $10B-plus corridor proof
  mean the settlement stack now exists, but customer-side beneficiary
  passporting, purpose-code mapping, and audit packet assembly remain manual.
  The first wedge is U.S.- and European-based platforms paying 500-5,000
  Brazilian sellers or creators per month that want same-day Pix cash-outs
  without building a Brazil FX operations team. The MVP should stay above funds
  flow and focus on pre-flight checks, exception routing, and journal-ready
  evidence because that is the workflow buyers still own even when they use
  Trace-, Nium-, or Circle-linked partners. Go-to-market should center on
  founder-led sales into Brazil launches and payout-hold incidents, with
  referrals from regulated payout partners that want cleaner beneficiary and FX
  data but do not want to become the customer's full control plane. Pricing
  should follow enterprise control-software logic rather than payment spread:
  paid corridor-launch implementation plus six-figure annual software priced by
  corridor, legal entity, and verified-beneficiary or protected-volume bands.
  The main diligence gaps are exact bank rejection baselines, the payout-volume
  threshold at which buyers abandon PSP-plus-spreadsheet workflows, and whether
  neutral workflow software can win against partner bundling. This is strong
  enough for further investigation because the wedge is specific and timely, but
  the company should raise only a pre-seed round until it proves two paid pilots
  and one partner-backed deployment.
problem:
  - "Brazil stablecoin-linked payouts require beneficiary, payout-purpose, and FX evidence that most global platforms still manage in spreadsheets, tickets, and PSP dashboards."
  - "When same-day Pix launches or payout holds spike, finance and payout operations teams lose seller trust and spend hours assembling audit and reconciliation evidence across rail partners and the ERP."
solution:
  - "A Brazil corridor passport creates a reusable beneficiary record linking CPF/CNPJ, KYB, bank or wallet routing, approved payout-purpose codes, and partner-specific release requirements before each batch is sent."
  - "The workflow layer runs pre-flight checks, exception queues, and batch-level FX, fee, and journal exports across payout ledgers, ERPs, and regulated bank partners so live payouts and month-end close use the same source of truth."
whyWeWin:
  - "Incumbent rails and stablecoin orchestration vendors optimize for moving money through their own network, not for giving the platform a neutral control plane across multiple partners."
  - "Every protected batch builds a proprietary graph of beneficiary eligibility, exception patterns, and partner documentation rules that becomes harder to replace than the payout rail itself."
  - "By staying above funds flow at launch, the company can ship faster, remain provider-neutral, and avoid taking Brazil licensing or balance-sheet risk."
strategicChoices:
  beachhead: "U.S.- and European-based creator, app-store, and digital-goods marketplaces with 1,000+ monthly Brazilian payouts, centralized USD treasury, same-day Pix ambitions, and no dedicated Brazil FX operations team."
  wedgeRationale: "This slice feels the pain first because payout frequency is high, seller experience is visible, and one failed weekend cash-out immediately creates support load and finance scrutiny. It also lets the company prove value with one corridor, one buyer group, and one recurring workflow instead of spreading across payroll, trade, or multi-country customization on day one."
  sequencingRationale: "First encode Brazil beneficiary-passport and evidence requirements with one licensed partner, one payout ledger, and one ERP because that yields measurable hold-rate and close-time improvements without owning settlement. Once live pilots prove lower exception effort, add second-partner support and only then extend to adjacent corridors and broader verticals; sales hiring should wait until partner requirements and implementation patterns are repeatable."
  notYet:
    - "Owning stablecoin settlement, FX spread, or local payout licenses"
    - "Launching Mexico, Colombia, or APAC before Brazil rule templates and partner integrations are repeatable"
    - "Broad SMB self-serve or payroll and trade workflows that need different compliance and buyer motions"
market:
  tam: "$480.0M estimated TAM based on roughly 3,200 payout-heavy platforms, fintechs, and payout operators globally at about $150k blended ACV per entity or corridor program."
  sam: "$63.0M estimated SAM based on roughly 450 U.S.- and Europe-based marketplace, creator, gig, payroll, and payout operators with meaningful Brazil and Pix complexity at about $140k initial Brazil ACV."
  som: "$5.3M illustrative year-3 SOM based on 35 logos at about $150k blended ACV in the Brazil corridor before broader geographic expansion."
  segments:
    - "Primary: U.S.- and Europe-based creator, app-store, and digital-goods marketplaces paying 500-5,000 Brazilian sellers or creators monthly"
    - "Secondary: Payout networks and B2B marketplaces adding Brazil and Pix disbursements and needing a neutral control layer above licensed partners"
  buyingProcess: >-
    Payout operations and finance systems teams feel the daily pain, but budget
    approval usually sits with the VP Finance, controller, or Head of Global
    Payouts once a Brazil launch, same-day Pix rollout, or repeated payout holds
    threatens seller retention and close quality. Treasury, compliance, ERP
    owners, and the selected bank or payment-institution partner influence the
    deal because the buyer must trust both the release logic and the audit trail.
product:
  mvp: >-
    The MVP should connect one payout ledger, one KYB or onboarding system, one
    ERP, and one licensed Brazil payout partner to generate reusable beneficiary
    passports, pre-flight batch checks, exception queues, and journal-ready
    evidence for live Pix payouts. It should start with one corridor, one legal
    entity, and human approval on exceptions rather than automated multi-country
    routing or funds movement.
  sixMonth: "Ship paid production pilots that protect live Brazil payout batches, cut manual evidence collection, and expose hold reasons by beneficiary, purpose code, and partner."
  twelveMonth: "Add second-partner support, self-serve rule versioning, controller-grade close exports, and benchmark reporting on rejection and payout-latency patterns."
  twentyFourMonth: "Expand the passport model into Mexico or Colombia and selected APAC corridors, then turn cross-provider routing and evidence benchmarks into a multi-corridor disbursement control plane."
  keyBets:
    - "The first three customers share enough data fields and partner logic that implementation time drops materially by the third deployment."
    - "Human-in-the-loop release approvals are acceptable initially if the product halves manual exception work and produces cleaner bank evidence."
    - "Partner status data and rejected-case logs are available enough to build reusable rules instead of opaque services playbooks."
    - "The same customer will buy a second corridor or second partner connection once Brazil becomes the internal system of record."
gtm:
  wedge: "Sell a Brazil corridor launch-and-control program for payout-heavy platforms moving to same-day Pix or stablecoin-funded treasury flows, where the software becomes the release gate between the customer's ledger and a licensed payout partner."
  channels:
    - "Founder-led outbound to VP Finance, Head of Global Payouts, and payout-operations leads at U.S. and European platforms launching Brazil payouts"
    - "Referrals and co-sell motions from regulated payout providers, payment institutions, and PSPs that want cleaner beneficiary and FX data before release"
    - "Finance-systems and treasury-transformation consultants already helping platforms adopt stablecoin funding or reconcile cross-border payout operations"
  funnelTargets: "Lead→qualified pilot 20-30%, pilot→production 50%+, and production→second partner or second corridor expansion 40%+ within 12 months."
  pricing: "Charge a $25k-$50k corridor-launch implementation plus $120k-$180k annual software priced by active corridor and legal-entity count and verified-beneficiary or protected-volume bands; this keeps the buying case tied to fewer payout holds, faster seller cash-out, and cleaner month-end close rather than to payments spread."
businessModel:
  revenueStreams:
    - "Paid corridor-launch implementation and rules-design fees"
    - "Annual enterprise subscription for beneficiary-passport workflow, exception management, and evidence generation"
    - "Usage fees on verified beneficiaries or protected payout volume"
  unitOfValue: "Active legal entity and corridor with protected payout batches and reusable beneficiary passports."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more payout entities, seller cohorts, and payout partners inside the same customer"
    - "Extend the same workflow and evidence model to new corridors such as Mexico or Colombia"
    - "Sell benchmark reporting, controller exports, and multi-partner routing governance as the control plane becomes system-of-record"
strategyMap:
  northStarMetric: "Percentage of Brazil payout volume released on first pass with a complete beneficiary passport and audit-ready batch evidence."
  inputMetrics:
    - "Beneficiary-passport completion rate before payout run"
    - "Protected-batch hold or rejection rate"
    - "Median hours to resolve payout exceptions"
    - "Hours to produce month-end FX and fee evidence"
    - "Pilot-to-production conversion rate"
  moatsToBuild:
    - "Beneficiary-passport graph linking CPF/CNPJ, payout purpose, routing details, and prior exception outcomes"
    - "Cross-partner evidence templates and rule versions tied to the customer ledger and ERP"
    - "Benchmark data on rejection reasons, payout latency, and close quality by corridor and provider"
  killCriteria:
    - "Fewer than 4 of the first 12 ICP interviews identify a funded budget owner for Brazil payout control software."
    - "The first 2 paid pilots fail to reduce manual evidence-collection or exception-handling effort by at least 50% within 90 days."
    - "No licensed payout partner agrees to a signed pilot or co-sell path by month 9."
  mermaid: |
    flowchart LR
      Wedge[Brazil corridor passport wedge] --> MVP[Pre-flight and evidence MVP]
      MVP --> Proof[Lower holds and faster close proof]
      Proof --> Expansion[Multi-partner and multi-corridor expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Compelling corridor-control wedge with real timing tailwinds, but conviction stays conditional until buyers fund a neutral layer and partners do not collapse the feature into bundled rails."
    whyBelieve: "Research shows Brazil-specific regulatory friction, live stablecoin-to-Pix infrastructure, and a clear gap between money movement and the customer-owned release workflow."
    whyDoubt: "The initial market is concentrated, incumbent partners may bundle shallow passporting, and no direct evidence yet shows the volume threshold that forces buyers off spreadsheets."
    nextDiligence: "Confirm two paid design partners, one licensed-partner integration commitment, and a pilot that measurably cuts payout holds or close effort before treating this as a full seed-quality story."
  firstCustomer:
    title: "VP Finance or Head of Global Payouts at a U.S. creator marketplace"
    profile: "A U.S. or European digital-goods or creator platform with 1,000+ monthly Brazilian payouts, centralized USD treasury, one PSP relationship, and no dedicated Brazil FX operations team."
    trigger: "Brazil launch, same-day Pix cash-out rollout, or repeated bank holds that force manual beneficiary and FX justification."
    buyer: "VP Finance or Head of Global Payouts"
    initialContract: "An 8-12 week paid pilot for one Brazil entity and one payout partner at $25k-$50k, converting to roughly $120k-$180k annual software plus usage fees once all Brazil payout batches run through the passport workflow."
  mustBeTrue:
    - "At least 5 of the first 12 target buyers confirm a dedicated budget owner for Brazil payout controls before they build an internal ops team."
    - "The first 3 customers see at least a 50% drop in manual exception handling or evidence-assembly time on Brazil payout batches."
    - "A licensed bank or payment-institution partner will share enough release-status and documentation logic for the startup to encode repeatable rules."
    - "At least 2 rail or payout partners tolerate and support a neutral workflow layer instead of blocking it in favor of bundled tooling."
    - "An adjacent corridor can reuse at least 60% of the Brazil data model and workflow within 18 months."
  diligenceQuestions:
    - "What are current hold and rejection rates for Brazil payout batches, and which reasons dominate?"
    - "Who actually signs budget and security approval when a platform launches same-day Pix payouts?"
    - "How much provider-specific logic sits outside published APIs and must be learned through services?"
    - "Will Trace-, Nium-, Circle-, or local bank partners co-sell a neutral control layer or race to bundle it?"
    - "How portable is the beneficiary-passport model to Mexico or Colombia without resetting implementation cost?"
operatingAssumptions:
  - assumption: "Brazil-launch and same-day Pix projects create software budget before buyers hire a local ops team or continue with spreadsheets."
    basis: research.yaml
    validationTest: "Interview 12 ICP accounts and close at least 2 paid pilots tied to an active Brazil launch or payout-remediation project."
    decisionImpact: "If false, narrow the ICP to larger platforms with existing hold pain or reposition as a services-led implementation partner."
  - assumption: "One licensed payout partner, one payout ledger, and one ERP cover enough of the first three customers to keep the MVP repeatable."
    basis: idea.yaml
    validationTest: "Map the first 5 qualified accounts and confirm at least 60% share the same initial partner and finance-stack combination."
    decisionImpact: "If false, tighten the beachhead further or raise implementation pricing because product reuse will be too low."
  - assumption: "The product can halve manual exception work without owning funds flow, just by enforcing pre-flight passporting and evidence generation."
    basis: operator judgment
    validationTest: "Run a live or shadow pilot on two payout batches and measure manual touches, resolution hours, and hold rate before versus after."
    decisionImpact: "If false, differentiation versus PSP dashboards weakens and the roadmap may need deeper automation or a narrower compliance use case."
  - assumption: "Regulated partners will provide enough documentation and status hooks to support rule versioning and co-sell conversations."
    basis: research.yaml
    validationTest: "Secure 3 partner workshops and at least 1 signed integration or referral agreement within 9 months."
    decisionImpact: "If false, the company must shift toward white-label delivery, benchmark reporting, or a smaller set of provider-specific integrations."
  - assumption: "The Brazil beneficiary-passport model will transfer to at least one adjacent corridor with majority rule reuse."
    basis: idea.yaml
    validationTest: "Complete corridor-design reviews for Mexico and Colombia and show at least 60% field and workflow reuse after the first two Brazil customers."
    decisionImpact: "If false, the venture-scale thesis weakens and fundraising should be based on a narrower Brazil-centric business."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 12 payout-operations, finance, and controller leaders at Brazil-launch platforms and collect current hold, support, and close-work baselines."
    hypothesis: "Brazil launches and same-day Pix rollouts create a funded control-software problem, not just generic payment pain."
    successMetric: "At least 6 interviews yield quantified manual-work baselines and at least 2 prospects agree to a paid pilot."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Run partner-design sessions with 3 licensed banks, payment institutions, or Trace- and Nium-like partners to define the minimum beneficiary, purpose-code, and FX evidence packet."
    hypothesis: "There is a repeatable core evidence schema that can support the first product without bespoke services on every account."
    successMetric: "At least 2 partners produce overlapping mandatory fields and one agrees to pilot with shared exception reasons."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Build a shadow-mode passport MVP on historical Brazil payout batches for one design partner."
    hypothesis: "Pre-flight validation and reusable beneficiary passports can surface the majority of preventable holds before live release."
    successMetric: "The MVP flags at least 70% of known data or purpose-code exceptions on sampled batches."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Launch the first paid live Brazil pilot covering one legal entity, one partner, and one month-end close cycle."
    hypothesis: "A narrow live deployment can cut manual evidence and exception effort enough to convert into annual software."
    successMetric: "Manual exception-handling time falls by at least 50% and the customer signs an annual contract."
    owner: "Product/compliance lead"
  - horizon: "180-365 days"
    experiment: "Add a second payout partner or PSP to the same customer and benchmark hold rate, latency, and evidence quality across both."
    hypothesis: "Provider-neutral control is a real buying reason and produces measurable cross-partner insight."
    successMetric: "The customer routes production volume through two partners while keeping one shared passport and evidence workflow."
    owner: "Integration engineer"
  - horizon: "180-365 days"
    experiment: "Design and validate a Mexico or Colombia corridor template with an existing Brazil customer."
    hypothesis: "At least one adjacent corridor reuses most of the Brazil data model and expands ACV faster than net-new logo acquisition."
    successMetric: "At least 60% of fields and workflow steps are reused and one customer commits to a second-corridor roadmap."
    owner: "Founder/CEO"
operations:
  - "Version corridor rules, beneficiary requirements, and approval policies with explicit effective dates and partner ownership."
  - "Maintain auditable batch logs linking source ledger data, partner responses, FX evidence, and ERP journal exports."
  - "Keep a human-approval path for high-risk or low-confidence releases until bank-partner rejection data supports deeper automation."
  - "Use local compliance advisers and BCB-authorized partners for rule changes rather than making unsupported regulatory interpretations in-product."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own design-partner sales, partner development, and regulatory discovery because buyer language and partner incentives are still the biggest unknowns."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the beneficiary-passport data model, partner connectors, exception engine, and audit-export workflows."
  - role: "Product/compliance lead"
    startTiming: "Month 2-4"
    rationale: "Translate partner documentation requirements into versioned rules and run the first customer implementations."
  - role: "Integration engineer"
    startTiming: "Month 4-6"
    rationale: "Turn first-customer mappings into reusable connectors across payout ledgers, ERPs, and partner APIs."
  - role: "Implementation lead"
    startTiming: "Month 6-9"
    rationale: "Own live batch onboarding, exception operations, and referenceable customer outcomes without turning engineering into a services team."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 12-15 ICP interviews, 3 partner design sessions, and 2 paid Brazil pilots."
      - "Ship MVP for beneficiary passports, batch pre-flight checks, exception queue, and journal-ready evidence."
      - "Convert at least 1 pilot into a six-figure annual contract and secure 1 licensed-partner integration or referral agreement."
      - "Establish baseline metrics for hold rate, exception time, and month-end evidence production."
  - horizon: "12-24 months"
    items:
      - "Reach 8-12 paying Brazil customers with deployments starting in under 30 days."
      - "Add second-partner support, controller-grade close workflows, and benchmark reporting on rejection and payout latency."
      - "Win the first expansion inside an existing account to a second partner or second corridor."
  - horizon: "24-36 months"
    items:
      - "Launch 2 adjacent corridors with majority data-model reuse and prove multi-corridor expansion inside the core ICP."
      - "Build a benchmark-driven routing and evidence control plane across multiple regulated partners."
      - "Demonstrate software-like gross margins and durable renewals before considering adjacent verticals such as payroll or trade."
risks:
  - risk: "Rail and payout partners bundle enough passporting and exception tooling to weaken standalone ACV."
    likelihood: Medium
    impact: High
    mitigation: "Differentiate around provider-neutral workflow, ERP evidence, and cross-partner benchmark data; prioritize customers using or evaluating multiple payout partners."
  - risk: "Brazil regulatory changes or partner policy shifts outpace the team's rule updates."
    likelihood: High
    impact: High
    mitigation: "Start with one corridor, version rules with local advisers and licensed partners, and keep human approval on high-risk cases."
  - risk: "The pain threshold is higher than expected and mid-volume platforms keep tolerating PSP-plus-spreadsheet operations."
    likelihood: Medium
    impact: High
    mitigation: "Sell into active launches and repeated hold events, require quantified pain in qualification, and tighten the ICP around 1,000+ monthly payouts."
  - risk: "Integration sprawl across ledgers, KYB systems, and partner APIs makes deployments too bespoke for software margins."
    likelihood: Medium
    impact: High
    mitigation: "Constrain early customers to one dominant partner and finance-stack pattern, measure template reuse, and price custom work separately."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to build the Brazil passport MVP, complete two paid design-partner pilots, hire the initial product-compliance and implementation team, secure a licensed-partner integration, and prove that six-figure annual contracts convert from corridor-launch projects."
