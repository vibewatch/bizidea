differentiator: >-
  This is not another stablecoin API, local payout processor, or treasury dashboard. The product owns the customer-side
  workflow that regulated partners still push back onto the platform: beneficiary passporting, purpose-code logic,
  corridor rules, and evidence packaging before payout release. That creates a defensible corpus of payout eligibility
  rules, exception patterns, and local-rail playbooks that becomes more valuable with each new corridor.
