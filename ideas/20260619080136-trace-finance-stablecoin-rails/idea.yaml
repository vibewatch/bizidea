jobsToBeDone:
  - job: When we open or scale a Brazil payout corridor, help our payout ops team pre-clear each beneficiary and payout purpose, so we can release Pix payouts without bank rejections or manual evidence hunts.
    currentAlternative: Spreadsheet trackers, PSP dashboards, email approvals, and local ops analysts
    successMetric: Reduction in payout holds and time from payout approval to local receipt
  - job: When month-end close or a banking partner review arrives, help finance explain every stablecoin-funded local payout, so we can defend FX treatment and reconcile fees without stitching screenshots.
    currentAlternative: Manual exports from PSPs, bank portals, and the ERP combined in spreadsheets
    successMetric: Hours to produce corridor audit evidence and percentage of payouts reconciled on first pass
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Three fetched sources combine funding, operational detail, customer proof, corridor scale, and policy tailwinds around one clear workflow shift.
  painIntensity:
    score: 4
    rationale: Payout holds, launch delays, and manual FX evidence creation are painful for high-volume platforms, even if the pain is concentrated in a specific corridor workflow.
  wedgeClarity:
    score: 5
    rationale: A Brazil corridor passport for stablecoin-funded Pix payouts is a narrow first product with a clear trigger, buyer, and manual alternative.
  defensibility:
    score: 4
    rationale: Beneficiary-passport data, corridor rules, exception histories, and local-rail playbooks create sticky workflow intelligence that single-rail providers do not naturally own across systems.
  ventureScale:
    score: 5
    rationale: The beachhead is Brazil-specific, but the same regulated-corridor passport can expand across LatAm, APAC, and multiple enterprise disbursement categories.
topRisks:
  - name: Provider bundling
    description: Trace, dLocal, or another PSP could add basic beneficiary and corridor checks inside their own platform.
    mitigation: Stay provider-neutral and own the cross-system workflow, reusable beneficiary passport, and ERP evidence layer that customers need across multiple partners and corridors.
  - name: Regulatory drift
    description: Brazil or later corridor rules may change faster than the product can encode them, creating trust risk for finance teams.
    mitigation: Start with one corridor, version rules with local advisers and bank partners, and keep human-approved exception paths before deeper automation.
  - name: Narrow initial wedge
    description: Some marketplaces may not feel enough pain until Brazil payout volume or rejection rates are already high.
    mitigation: Sell during corridor launches and same-day payout rollouts, quantify seller churn and ops cost from held payouts, and expand first into adjacent LatAm corridors where the same customer can reuse the platform.
