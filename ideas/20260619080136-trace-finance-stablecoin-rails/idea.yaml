problem: >-
  Global marketplaces can now settle cross-border value with stablecoins, but Brazil and similar corridors still demand
  bank-grade FX classification, beneficiary checks, and local rail evidence before funds can land. Payout teams usually
  stitch together seller KYB, purpose codes, Pix details, PSP dashboards, and ERP reconciliation in spreadsheets and ops
  tickets. That turns every corridor launch into a manual compliance project and every payout exception into a seller
  retention problem.
targetUser:
  primary: Heads of payout operations and finance systems at global creator, app-store, and B2B marketplace platforms paying Brazilian sellers or creators
  secondary: LatAm treasury or compliance leads at the same platforms
  buyer: VP Finance or Head of Global Payouts
startupThesis:
  nonObviousInsight: >-
    Once Brazil treats virtual-asset cross-border flows as FX operations, moving money is no longer the hard part. The
    scarce workflow is packaging beneficiary identity, payment purpose, rail eligibility, and audit evidence so a
    regulated local-bank partner can release each payout at scale. Stablecoin settlement becomes a back-end
    implementation detail; the winning software owns the corridor passport.
  beachhead: >-
    U.S.- and European marketplace and creator-platform operators that pay 500-5,000 Brazilian sellers or creators per
    month from a centralized USD treasury, want same-day Pix payouts, and lack a dedicated Brazil FX operations team
  wedge: >-
    A Brazil corridor passport that binds beneficiary tax and KYB data, payout-purpose mapping, bank or wallet routing,
    and audit-ready FX evidence to every payout batch before release
  whyNowCatalyst: >-
    Brazil's FX classification change, Trace's $10B-plus proof in the US-Brazil corridor, and enterprise expansion around
    Pix-plus-stablecoin infrastructure make corridor-specific payout control software newly urgent.
  ventureScalePath: >-
    Start with Brazil marketplace payouts, then extend the same corridor passport model across Mexico, Colombia, and
    APAC local-rail markets, eventually becoming the operating system for regulated cross-border disbursements across
    marketplaces, payroll, trade, and treasury products.
solution: >-
  Build a workflow layer between the platform payout ledger, onboarding and KYB systems, ERP, and regulated payout
  partners such as Trace-like providers. For each beneficiary and batch, it verifies tax IDs, payout purpose,
  corridor rules, and whether the payout should land via Pix-linked bank rails or another local method, then attaches the
  required evidence before funds are released. It maintains a reusable beneficiary-passport record so repeat payouts stop
  generating fresh compliance tickets. Ops teams get a case queue for rejected bank data, mismatched purpose codes, and
  failed local-rail handoffs, while finance gets journal-ready FX and fee reconciliation. Over time, the product becomes
  a multi-corridor rules engine and system of record for global platform payouts.
goToMarketSeed:
  firstCustomer: >-
    A U.S.-based creator monetization or digital-goods marketplace with 1,000-plus monthly Brazilian payouts, weekend
    seller cash-out demand, and one global PSP relationship but no in-house Brazil FX and compliance operations team
  buyingTrigger: >-
    Brazil launch, a switch to same-day Pix payouts, or repeated payout holds that force operations and finance teams to
    manually justify beneficiary and FX details to a banking partner
  currentAlternative: >-
    One cross-border payment processor or local payout partner plus spreadsheets, ops tickets, email approvals, and
    manual ERP reconciliation
  switchingReason: >-
    Rail providers move funds, but they do not give the platform a reusable beneficiary passport, purpose-code workflow,
    or audit packet embedded in its own payout operations
  pricingHypothesis: >-
    Annual SaaS fee by active corridor and legal entity, plus usage-based pricing on verified beneficiaries or protected
    payout volume
