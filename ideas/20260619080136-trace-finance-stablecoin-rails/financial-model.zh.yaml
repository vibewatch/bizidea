modelSanity:
- checkName: 营收引擎
  finding: "基准案例营收主要由客户数增长驱动——从 Y1 末 3 个客户，到 Q4Y2 的 12 个，再到 Q4Y3 的 26 个，年度 ARPU $150K。"
- checkName: 必须做对的事
  finding: "合作伙伴背书的试点必须足够快速转化，才能在 GTM 招聘加速之前达到商业计划 8–12 个客户 Y2 目标的上限。"
- checkName: 模型崩溃的条件
  finding: "下行案例中，若销售周期延长约两个月、定价稳定在每客户年 $140K 附近，现金将转为负值。"
- checkName: 下轮融资证明
  finding: "若 pre-seed 能将公司带到约 7 个付费巴西客户、一个合作伙伴背书的年度部署，以及可重复的 30 天内实施，则下轮融资故事成立。"
sanityChecks:
  ruleOf40: "Y3 增长率 143.2% + EBITDA 利润率 -7.9% = 135.3%"
  burnMultiple: "Y2 基于净新增 ARR 约 0.6x，随着重复部署和合作伙伴转介绍吸收固定团队成本，Y3 改善至约 0.1x。"
  revenuePerFte: "$222.1K Y3 年末人均营收（B2B SaaS 基准 $200K–$400K）"
  flags:
  - "模型假设第三年前无实际客户流失；流失仅用于 LTV 测算，直到首批续约数据可观测。"
  - "Q4Y2 落在商业计划 8–12 个客户里程碑的上限，因此合作伙伴来源的管道和试点转化必须都如期推进。"
  - "毛利率维持在目标附近的前提是实施工作标准化；若服务强度持续偏高，COGS 和招聘都会上漂。"
  - "现金以 EBITDA 驱动建模，未反映递延收入时序、回款滞后或资本支出，这些因素可能使现金曲线小幅提前或推后。"
