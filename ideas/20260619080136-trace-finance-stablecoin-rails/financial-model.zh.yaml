slug: pix-payout-passport
date: "2026-06-19"
currency: USD
modelStartMonth: "2026-07"
assumptions:
- id: A1
  name: 基础损益表收入确认政策
  value: 仅计入经常性软件收入；实施费不计入基准案例
  unit: policy
  source: "[BP businessModel.revenueStreams; BP gtm.pricing] 商业计划包含一次性安装费，但基准损益表将收入等同于客户数×ARPU，将一次性实施费视为上行空间。"
- id: A2
  name: 起始客户数（第 1 个月）
  value: "0"
  unit: count
  source: "[BP experimentRoadmap; BP milestones 0-12 months] 探索和影子模式工作先于首笔付费正式试点。"
- id: A3
  name: 综合年度 ARPU
  value: "150000"
  unit: USD/customer/year
  source: "[BP gtm.pricing; Research bottomUpSizingDrivers] 年度软件费 $120K–$180K 区间的中位值，与研究中约 $140K–$150K 的 ACV 区间吻合。"
- id: A4
  name: 首个付费正式客户时间
  value: 第 5 个月
  unit: month
  source: "[BP experimentRoadmap 90-180 days] 首笔付费正式巴西试点建模在 90–180 天上线窗口的中间点。"
- id: A5
  name: 第一年客户爬坡节奏
  value: 第 5 月首个客户，第 9 月第二个，第 12 月第三个
  unit: schedule
  source: "[BP milestones 0-12 months] 两个付费试点加上一个转化的六位数年度部署，支撑第一年结束时退出 3 个客户。"
- id: A6
  name: 第二年末客户数
  value: "12"
  unit: customers at Q4Y2
  source: "[BP milestones 12-24 months] 计划要求 8–12 个付费巴西客户；基准案例在合作伙伴转介开始发挥作用后取上限。"
- id: A7
  name: 第三年末客户数
  value: "26"
  unit: customers at Q4Y3
  source: "[Research market.som; BP milestones 24-36 months] 基准案例低于研究中 35 个客户的 SOM，并假设多通道扩展仅在巴西可重复性得到验证后启动。"
- id: A8
  name: 目标毛利率
  value: "70"
  unit: pct
  source: "[BP businessModel.targetGrossMarginPct] 商业计划明确目标毛利率为 70%。"
- id: A9
  name: COGS 公式
  value: 每月固定 $9,000 加营收的 25%
  unit: USD/month + pct of revenue
  source: "[Heuristic: regulated-fintech SaaS cost structure] 云服务、审计日志、对账和合作伙伴数据费用在软件毛利率向商业计划目标收敛之前构成非零底部成本。"
- id: A10
  name: 创始人/CEO 全包年薪
  value: "100000"
  unit: USD/FTE/year
  source: "[BP team Founder/CEO; Heuristic: founder-below-market compensation] 创始人主导销售以低于市场的现金薪资建模，以节约 pre-seed 阶段的消耗。"
- id: A11
  name: 工程师全包年薪
  value: "165000"
  unit: USD/FTE/year
  source: "[BP team Founding eng and Integration engineer; Heuristic: seed-stage enterprise fintech compensation] 高级产品工程师建模在 10 万美元中段，全包计算。"
- id: A12
  name: 产品与合规全包年薪
  value: "155000"
  unit: USD/FTE/year
  source: "[BP team Product/compliance lead; Heuristic: seed-stage compliance software compensation] 高级产品与合规岗略低于工程师水平建模。"
- id: A13
  name: 销售与 GTM 全包年薪
  value: "150000"
  unit: USD/FTE/year
  source: "[BP gtm.channels; Heuristic: founder-led enterprise SaaS GTM compensation] 早期客户经理和合作伙伴岗位精简建模，因为创始人仍承担大部分初期销售工作。"
- id: A14
  name: 实施与运营全包年薪
  value: "135000"
  unit: USD/FTE/year
  source: "[BP team Implementation lead; Heuristic: startup operations compensation] 实施和财务运营支持按高级通才岗建模，而非组建完整的服务团队。"
- id: A15
  name: 招聘序列
  value: "CEO 第 1 月；创始工程师第 1 月；产品/合规第 3 月；集成工程师第 5 月；实施主管第 8 月；客户经理第 13 月；工程师第 15 月；第二产品/合规第 20 月；第二 GTM 第 23 月；第二运营第 24 月；工程师第 28 月；第三 GTM 第 31 月；工程师第 34 月"
  unit: schedule
  source: "[BP team; BP strategicChoices.sequencingRationale] 销售招聘等到可重复性出现，实施和合规容量在相邻通道扩展前提前步进。"
- id: A16
  name: 非薪资运营费用爬坡
  value: "销售与市场 $6K–$26K/月，研发/合规工具 $6K–$12K/月，一般管理 $9K–$15K/月"
  unit: USD/month
  source: "[Heuristic: lean seed-stage enterprise SaaS operating model] 支出随销售管道、合规工具、审计、出差和保险增长，但在第二年可重复性可见之前保持受控。"
- id: A17
  name: 起始现金 / pre-seed 募资
  value: "2400000"
  unit: USD
  source: "[BP fundingAsk] 商业计划 $2M–$4M pre-seed 范围的中低值，与精简招聘计划一致，并遵循商业计划在可重复性得到验证前只融 pre-seed 的原则。"
- id: A18
  name: LTV 测算用标准化月度流失率
  value: "1.3"
  unit: pct/month
  source: "[Heuristic: enterprise workflow software retention] 合规关键型 B2B 工作流软件留存率应优于 SMB SaaS，但模型仍假设年度流失率在十几个百分点的中段，用于单位经济模型测算。"
- id: A19
  name: 客户获取成本（CAC）
  value: "75000"
  unit: USD/customer
  source: "[BP gtm.channels; Heuristic: founder-led enterprise SaaS CAC] 通过创始人外呼加合作伙伴转介绍完成的高触达试点，CAC 应低于首年 ACV，但远高于 SMB SaaS 水平。"
- id: A20
  name: 资金分配
  value: "45% 工程与产品，25% GTM，15% 一般管理，15% 六个月缓冲"
  unit: allocation
  source: "[BP fundingAsk.useOfFundsSummary; modeled burn mix] 大部分现金用于产品、合规和实施容量，刻意保留现金储备以应对合作伙伴或销售时间线滑期。"
- id: A21
  name: 现金转换惯例
  value: EBITDA 近似现金变动
  unit: policy
  source: "[Heuristic: early-stage model simplification] 模型假设营运资金、递延收入时序、资本支出和债务相对于薪资与运营消耗不重要。"
- id: A22
  name: 基准案例中实际客户流失数
  value: "0"
  unit: lost customers through 36 months
  source: "[BP investorMemo.mustBeTrue; Heuristic: design-partner retention] 第一批客户建模为在第三年前保持留存，流失仅作为单位经济模型假设，而非预测事件。"
