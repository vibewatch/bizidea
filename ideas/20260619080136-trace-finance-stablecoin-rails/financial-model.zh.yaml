scenarios:
  downside:
    description: "首个正式试点滑期，合作伙伴转介绍爬坡推迟，产品停留在较窄的纯巴西工作流阶段，定价能力下降。"
    y3RevenueK: 2000.7
    y3EbitdaK: -952.5
    cashLowPointK: -501.9
    keyAssumptionChanges:
    - "首个付费正式客户从第 5 月推迟至第 6 月，Q4Y2 以 9 个客户退出而非 12 个。"
    - "综合年度 ARPU 稳定在约 $140K，因为买方推迟引入第二合作伙伴和第二通道扩展。"
    - "毛利率停留在 60% 末段，因为异常处理和合作伙伴专属工作仍比计划更依赖人工。"
  base:
    description: "创始人主导销售在第一年拿下两个试点，合作伙伴转介绍在第二年开始发挥作用，公司在多通道扩展前达到商业计划 Y2 客户目标上限。"
    y3RevenueK: 2887.5
    y3EbitdaK: -227.6
    cashLowPointK: 567.0
    keyAssumptionChanges:
    - "Y1 以 3 个付费客户退出，首个正式试点在第 5 月上线。"
    - "Q4Y2 达到 12 个客户，即商业计划 8–12 个客户里程碑的上限。"
    - "Q4Y3 达到 26 个客户，年度 ARPU $150K，毛利率维持在商业计划 70% 目标附近。"
  upside:
    description: "合作伙伴渠道更早拐点，第二合作伙伴和第二通道绑定速度超预期，实施工作标准化比预期更快。"
    y3RevenueK: 3670.8
    y3EbitdaK: 396.6
    cashLowPointK: 1249.8
    keyAssumptionChanges:
    - "Q4Y2 达到 14 个客户，Q4Y3 达到 30 个，合作伙伴转介绍更早带来合格管道。"
    - "更多账户绑定第二合作伙伴或相邻通道后，综合年度 ARPU 升至约 $160K。"
    - "可复用手册更快减少人工实施和异常处理工作，毛利率达到约 72%。"
sensitivity:
- variable: ARPU
  downsideCase: "买方将产品范围限于单一通道和单一合作伙伴，综合年度 ARPU 稳定在约 $140K。"
  baseCase: "年度 ARPU 按建模维持在 $150K。"
  upsideCase: "第二合作伙伴和相邻通道模块更早绑定，年度 ARPU 达到约 $160K。"
  y3RevenueImpactK: -184.8
  cashImpactK: -178.2
- variable: CAC
  downsideCase: "创始人外呼主导、转介绍渠道薄弱，CAC 升至约 $90K。"
  baseCase: "创始人主导销售与合作伙伴引荐混合，CAC 维持在约 $75K。"
  upsideCase: "两个持牌合作伙伴持续带来合格试点后，CAC 降至约 $60K。"
  y3RevenueImpactK: -262.5
  cashImpactK: -224.8
- variable: 客户流失
  downsideCase: "客户将产品视为一次性上线项目，续约流失率升至月度 2.0%。"
  baseCase: "标准化月度流失率维持在 1.3%，第三年前实际流失保持极低水平。"
  upsideCase: "护照层成为月末控制流程的一部分后，标准化月度流失率改善至 1.0%。"
  y3RevenueImpactK: -125.0
  cashImpactK: -65.5
- variable: 销售周期
  downsideCase: "合规审查和合作伙伴入驻拖延约 2 个月，试点转正式生产时间拉长。"
  baseCase: "从合格发现到正式上线，销售周期维持在约 4–5 个月。"
  upsideCase: "有参考价值的合作伙伴背书试点将周期压缩至 3–4 个月。"
  y3RevenueImpactK: -350.0
  cashImpactK: -403.0
- variable: 毛利率
  downsideCase: "更多实施工作和合作伙伴直通成本留在交付环节，毛利率维持在约 67%。"
  baseCase: "毛利率维持在商业计划 70% 目标。"
  upsideCase: "入驻和异常处理更快模板化，毛利率达到约 72%。"
  y3RevenueImpactK: 0.0
  cashImpactK: -107.6
