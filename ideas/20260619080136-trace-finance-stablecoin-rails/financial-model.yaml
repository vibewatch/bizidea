"scenarios":
  "downside":
    "description": "The first live pilot slips, partner referrals ramp later, and the product stays a narrower Brazil-only workflow with less pricing power."
    "y3RevenueK": 2000.7
    "y3EbitdaK": -952.5
    "cashLowPointK": -501.9
    "keyAssumptionChanges":
    - "First paid live customer moves from M5 to M6 and Q4Y2 exits at 9 customers instead of 12."
    - "Blended annual ARPU settles near $140K instead of $150K as buyers delay second-partner and second-corridor expansion."
    - "Gross margin stays in the high-60s because exception handling and partner-specific work remain more manual than planned."
  "base":
    "description": "Founder-led sales lands two pilots in year 1, partner referrals begin to work in year 2, and the company grows to the top end of the BP Y2 customer target before multi-corridor expansion."
    "y3RevenueK": 2887.5
    "y3EbitdaK": -227.6
    "cashLowPointK": 567.0
    "keyAssumptionChanges":
    - "Y1 exits with 3 paying customers after the first live pilot lands in M5."
    - "Q4Y2 reaches 12 customers, which is the top end of the BP 8-12 customer milestone."
    - "Q4Y3 reaches 26 customers at a $150K annual ARPU while gross margin stays near the 70 percent BP target."
  "upside":
    "description": "Partner channels inflect earlier, second-partner and second-corridor attach happens faster, and implementation work standardizes sooner than expected."
    "y3RevenueK": 3670.8
    "y3EbitdaK": 396.6
    "cashLowPointK": 1249.8
    "keyAssumptionChanges":
    - "Q4Y2 reaches 14 customers and Q4Y3 reaches 30 as partner referrals add qualified pipeline earlier."
    - "Blended annual ARPU rises to about $160K once more accounts attach a second partner or adjacent corridor."
    - "Gross margin reaches roughly 72 percent as reusable playbooks reduce manual implementation and exception effort faster."
"sensitivity":
- "variable": "ARPU"
  "downsideCase": "Blended annual ARPU settles near $140K because buyers keep the product scoped to one corridor and one partner."
  "baseCase": "Annual ARPU holds at $150K as modeled."
  "upsideCase": "Annual ARPU reaches about $160K once second-partner and adjacent-corridor modules attach sooner."
  "y3RevenueImpactK": -184.8
  "cashImpactK": -178.2
- "variable": "CAC"
  "downsideCase": "CAC rises toward $90K because founder-led outbound dominates and referral channels stay thin."
  "baseCase": "CAC stays near $75K with a mix of founder-led selling and partner introductions."
  "upsideCase": "CAC falls toward $60K once two regulated partners consistently originate qualified pilots."
  "y3RevenueImpactK": -262.5
  "cashImpactK": -224.8
- "variable": "churn"
  "downsideCase": "Renewal churn drifts toward 2.0 percent monthly if customers treat the product as a one-time launch project."
  "baseCase": "Normalized churn stays at 1.3 percent monthly for LTV math and realized churn stays de minimis through Y3."
  "upsideCase": "Normalized churn improves toward 1.0 percent monthly once the passport layer becomes part of month-end controls."
  "y3RevenueImpactK": -125.0
  "cashImpactK": -65.5
- "variable": "sales cycle"
  "downsideCase": "Pilot-to-production stretches by about 2 months because compliance review and partner onboarding take longer."
  "baseCase": "The sales cycle stays near 4 to 5 months from qualified discovery to live production."
  "upsideCase": "Referenceable partner-backed pilots compress the cycle toward 3 to 4 months."
  "y3RevenueImpactK": -350.0
  "cashImpactK": -403.0
- "variable": "gross margin"
  "downsideCase": "Gross margin holds near 67 percent because more implementation work and partner pass-through costs stay in delivery."
  "baseCase": "Gross margin stays at the 70 percent BP target."
  "upsideCase": "Gross margin reaches about 72 percent once onboarding and exception handling templatize faster."
  "y3RevenueImpactK": 0.0
  "cashImpactK": -107.6
- "variable": "hiring pace"
  "downsideCase": "Three later-stage hires are pulled forward by two quarters because implementations stay bespoke."
  "baseCase": "Hiring follows A15 and stays lean until partner repeatability is visible."
  "upsideCase": "The last three hires can slip later because the base team and playbooks absorb more work than planned."
  "y3RevenueImpactK": 0.0
  "cashImpactK": -225.0
"modelDiagram":
  "title": "unit economics flow"
  "mermaid": |
    flowchart LR
      Leads[Founder-led + partner referrals] --> Pilots
      Pilots --> Customers
      Customers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
"modelSanity":
- "checkName": "Revenue engine"
  "finding": "Base-case revenue is driven mainly by logo adds from 3 customers at Y1 exit to 12 at Q4Y2 and 26 at Q4Y3 on a $150K annual ARPU."
- "checkName": "Must go right"
  "finding": "Partner-backed pilots must convert quickly enough to hit the top end of the BP 8-12 customer Y2 target before GTM hiring steps up."
- "checkName": "Model breaks if"
  "finding": "The downside case turns cash negative if the sales cycle slips by about two months and pricing settles closer to $140K per customer-year."
- "checkName": "Next-round proof"
  "finding": "The next financing story is credible if the pre-seed gets the company to roughly 7 paying Brazil customers, one partner-backed annual deployment, and repeatable sub-30-day implementations."
"sanityChecks":
  "ruleOf40": "Y3 growth 143.2% + EBITDA margin -7.9% = 135.3%"
  "burnMultiple": "About 0.6x in Y2 on net new ARR, improving to about 0.1x in Y3 as repeat deployments and partner referrals absorb the fixed team."
  "revenuePerFte": "$222.1K Y3 revenue per end-of-year FTE (benchmark $200-400K B2B SaaS)"
  "flags":
  - "The model assumes no realized logo churn through Y3; churn is used for LTV math only until the first renewals are observable."
  - "Q4Y2 lands at the top end of the BP 8-12 customer milestone, so partner-sourced pipeline and pilot conversion must both work on schedule."
  - "Gross margin stays near target only if implementation work standardizes; if services intensity remains high, both COGS and hiring would drift upward."
  - "Cash is modeled as EBITDA-driven and does not reflect deferred revenue timing, collection lag, or capex, which could move the cash curve modestly earlier or later."
