"slug": "pix-payout-passport"
"date": "2026-06-19"
"currency": "USD"
"modelStartMonth": "2026-07"
"assumptions":
- "id": "A1"
  "name": "Base P&L revenue recognition policy"
  "value": "Recurring software revenue only; implementation fees excluded from base case"
  "unit": "policy"
  "source": "[BP businessModel.revenueStreams; BP gtm.pricing] The business plan includes setup fees, but the base P&L keeps revenue equal to customers × ARPU and treats one-time implementation as upside."
- "id": "A2"
  "name": "Starting customers (M1)"
  "value": "0"
  "unit": "count"
  "source": "[BP experimentRoadmap; BP milestones 0-12 months] Discovery and shadow-mode work precede the first paid live pilot."
- "id": "A3"
  "name": "Blended annual ARPU"
  "value": "150000"
  "unit": "USD/customer/year"
  "source": "[BP gtm.pricing; Research bottomUpSizingDrivers] Midpoint of the $120K-$180K annual software band and the research ACV band of about $140K-$150K."
- "id": "A4"
  "name": "First paid live customer timing"
  "value": "Month 5"
  "unit": "month"
  "source": "[BP experimentRoadmap 90-180 days] The first paid live Brazil pilot is modeled in the middle of the 90-180 day launch window."
- "id": "A5"
  "name": "Year-1 customer ramp"
  "value": "M5 first customer, M9 second customer, M12 third customer"
  "unit": "schedule"
  "source": "[BP milestones 0-12 months] Two paid pilots plus one converted six-figure annual deployment support a 3-customer exit to Y1."
- "id": "A6"
  "name": "Year-2 exit customers"
  "value": "12"
  "unit": "customers at Q4Y2"
  "source": "[BP milestones 12-24 months] The plan calls for 8-12 paying Brazil customers; base case uses the top end once partner referrals begin to work."
- "id": "A7"
  "name": "Year-3 exit customers"
  "value": "26"
  "unit": "customers at Q4Y3"
  "source": "[Research market.som; BP milestones 24-36 months] Base case stays below the research SOM of 35 logos and assumes multi-corridor expansion begins only after Brazil repeatability is proven."
- "id": "A8"
  "name": "Target gross margin"
  "value": "70"
  "unit": "pct"
  "source": "[BP businessModel.targetGrossMarginPct] Explicit target gross margin is 70 percent."
- "id": "A9"
  "name": "COGS formula"
  "value": "9000 fixed per month plus 25 percent of revenue"
  "unit": "USD/month + pct of revenue"
  "source": "[Heuristic: regulated-fintech SaaS cost structure] Cloud, audit logging, reconciliation, and partner-data fees create a non-zero floor before software margins converge toward the BP target."
- "id": "A10"
  "name": "Founder / CEO fully loaded annual salary"
  "value": "100000"
  "unit": "USD/FTE/year"
  "source": "[BP team Founder/CEO; Heuristic: founder-below-market compensation] Founder-led selling is modeled at a below-market cash salary to conserve pre-seed burn."
- "id": "A11"
  "name": "Engineering fully loaded annual salary"
  "value": "165000"
  "unit": "USD/FTE/year"
  "source": "[BP team Founding eng and Integration engineer; Heuristic: seed-stage enterprise fintech compensation] Senior product engineers are modeled in the mid-$100Ks fully loaded."
- "id": "A12"
  "name": "Product and compliance fully loaded annual salary"
  "value": "155000"
  "unit": "USD/FTE/year"
  "source": "[BP team Product/compliance lead; Heuristic: seed-stage compliance software compensation] Senior product and compliance hires are modeled slightly below engineering."
- "id": "A13"
  "name": "Sales and GTM fully loaded annual salary"
  "value": "150000"
  "unit": "USD/FTE/year"
  "source": "[BP gtm.channels; Heuristic: founder-led enterprise SaaS GTM compensation] Early AEs and partner roles are modeled lean because the founder still carries much of the first-motion selling."
- "id": "A14"
  "name": "Implementation and ops fully loaded annual salary"
  "value": "135000"
  "unit": "USD/FTE/year"
  "source": "[BP team Implementation lead; Heuristic: startup operations compensation] Implementation and finance-ops support are modeled as senior generalist hires rather than a full services bench."
- "id": "A15"
  "name": "Hiring sequence"
  "value": "CEO M1; founding eng M1; product/compliance M3; integration engineer M5; implementation lead M8; AE M13; engineer M15; second product/compliance M20; second GTM M23; second ops M24; engineer M28; third GTM M31; engineer M34"
  "unit": "schedule"
  "source": "[BP team; BP strategicChoices.sequencingRationale] Sales hiring waits until repeatability appears, while implementation and compliance capacity step up ahead of adjacent-corridor expansion."
- "id": "A16"
  "name": "Non-salary opex ramp"
  "value": "S&M $6K-$26K per month, R&D/compliance tools $6K-$12K per month, G&A $9K-$15K per month"
  "unit": "USD/month"
  "source": "[Heuristic: lean seed-stage enterprise SaaS operating model] Spend ramps with pipeline, compliance tooling, audit, travel, and insurance but stays controlled until year-2 repeatability is visible."
- "id": "A17"
  "name": "Starting cash / pre-seed raise"
  "value": "2400000"
  "unit": "USD"
  "source": "[BP fundingAsk] Lower-midpoint of the stated $2M-$4M pre-seed range, consistent with a lean hiring plan and the BP instruction to raise only a pre-seed before repeatability is proven."
- "id": "A18"
  "name": "Normalized monthly churn for LTV math"
  "value": "1.3"
  "unit": "pct/month"
  "source": "[Heuristic: enterprise workflow software retention] A compliance-critical B2B workflow should retain better than SMB SaaS, but the model still assumes mid-teens annual churn for unit economics."
- "id": "A19"
  "name": "Customer acquisition cost"
  "value": "75000"
  "unit": "USD/customer"
  "source": "[BP gtm.channels; Heuristic: founder-led enterprise SaaS CAC] High-touch pilots sold through founder outbound plus partner referrals should land below first-year ACV but well above SMB SaaS CAC."
- "id": "A20"
  "name": "Capital allocation"
  "value": "45 percent engineering and product, 25 percent GTM, 15 percent G&A, 15 percent six-month buffer"
  "unit": "allocation"
  "source": "[BP fundingAsk.useOfFundsSummary; modeled burn mix] Most cash goes to product, compliance, and implementation capacity, with a deliberate cash reserve for partner or sales timing slip."
- "id": "A21"
  "name": "Cash conversion convention"
  "value": "EBITDA approximates cash movement"
  "unit": "policy"
  "source": "[Heuristic: early-stage model simplification] The model assumes working capital, deferred revenue timing, capex, and debt are immaterial versus payroll and operating burn."
- "id": "A22"
  "name": "Realized logo churn in base case"
  "value": "0"
  "unit": "lost customers through 36 months"
  "source": "[BP investorMemo.mustBeTrue; Heuristic: design-partner retention] The first-wave customers are modeled as retained through Y3 while churn remains a unit-economics assumption rather than a forecasted event."
