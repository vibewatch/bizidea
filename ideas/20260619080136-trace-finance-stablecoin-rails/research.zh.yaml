competitors:
- name: Trace Finance
  stage: scale-up
  wedge: 巴西和拉美的持牌稳定币+本地银行基础设施，支持 Pix 和当天结算。
  pricing: 定制/企业报价（抓取页面未公开列出）。
  strength: 深厚的巴西通道执行能力、合规定位框架，以及与主要支付服务商客户的交易量验证。
  weaknessVsUs: 以服务商为中心的通道层，而非跨多个合作伙伴的中立客户端护照和凭证系统。
  sourceRefs:
  - 1
  - 2
  - 1
- name: Bridge/Stripe
  stage: incumbent
  wedge: 通过 Bridge 和 Stripe 提供的稳定币账户、编排和全球支付分发。
  pricing: 定制/企业报价（抓取页面未公开列出）。
  strength: 庞大的分发网络、财资切入点，以及围绕稳定币采用的强劲产品势头。
  weaknessVsUs: 广泛的平台优先级，以及针对巴西付款运营团队的通道专属收款方护照深度不足。
  sourceRefs:
  - 54
  - 15
  - 84
- name: BVNK
  stage: scale-up
  wedge: 具有合规和 API 交付选项的稳定币支付和付款基础设施。
  pricing: 定制/企业报价（抓取页面未公开列出）。
  strength: 强劲的稳定币原生执行层，以及在承包商或平台付款场景中的验证。
  weaknessVsUs: 优化围绕使用 BVNK 自家通道，而非嵌入客户财务运营的中立跨服务商放款工作流。
  sourceRefs:
  - 6
  - 24
- name: Nium
  stage: incumbent
  wedge: 正在添加巴西直接牌照和稳定币结算连接的全球付款网络。
  pricing: 定制/企业报价（抓取页面未公开列出）。
  strength: 本地牌照加多国付款覆盖，使 Nium 成为可信的单一供应商替代方案。
  weaknessVsUs: 更广泛的网络策略可能无法满足巴西异常管理所需的客户端规则引擎和可复用收款方护照。
  sourceRefs:
  - 13
  - 21
  - 12
- name: Zero Hash
  stage: scale-up
  wedge: 面向进入全球流量的平台的持牌稳定币结算、汇款和付款基础设施，含筛查和出/入金组件。
  pricing: 定制/企业报价（抓取页面未公开列出）。
  strength: 强劲的合规态势和模块化稳定币付款栈。
  weaknessVsUs: 基础设施优先的取向意味着财务专属放款控制和 ERP 凭证仍需在其上层叠加。
  sourceRefs:
  - 23
  - 14
  - 28
regulatoryTechnicalConstraints:
- point: BCB 第 561 号决议限制 eFX 服务商在持牌框架内使用稳定币或加密货币结算跨境支付，将部署推向授权银行或支付机构结构。
  sourceRefs:
  - 3
  - 33
- point: Pix 接入和受理仍有本地实体、参与方或持牌合作伙伴要求，外资平台无法回避。
  sourceRefs:
  - 9
  - 58
  - 21
- point: 国际 Pix 关联资金流可触发 IOF 和 eFX 文档要求，使 FX 凭证和合作伙伴数据质量成为核心产品要求。
  sourceRefs:
  - 26
  - 30
- point: 结构化消息和 API 协调要求意味着付款数据不能停留在自由文本运营工作流中，否则无法与银行和本地通道干净集成。
  sourceRefs:
  - 63
  - 41
validationSignals:
- point: Trace 表示已在跨境交易量超过 $10B，并服务拉美头部支付服务商，证明了持牌通道基础设施的真实商业需求。
  sourceRefs:
  - 2
- point: Circle CPN 已与 Alfred Pay 合作在巴西上线 USDC 到 Pix 出金通道，证明稳定币到本地通道交付已正式运营。
  sourceRefs:
  - 16
  - 27
- point: Nium 的巴西牌照和与 Circle 的 USDC 结算合作伙伴关系表明，全球付款网络正朝着直接持牌本地+稳定币结算组合迈进。
  sourceRefs:
  - 21
  - 12
- point: Visa 的付款研究显示，卖家愿意为更好或即时的打款体验切换平台，甚至愿意支付小额手续费。
  sourceRefs:
  - 7
- point: EY 发现相当比例的现有稳定币用户已报告 10%+ 的成本节省，说明这不再是纯粹投机性的买方对话。
  sourceRefs:
  - 19
openQuestions:
- 哪些付款用途类别和收款方文件组合在巴西银行/eFX 合作伙伴处产生最高的拒付或扣押率？
- 平台需要多大的巴西付款量或多少卖家客服痛苦，才会停止容忍 PSP+电子表格的工作流？
- Trace、Circle 或 Nium 类合作伙伴会联合销售中立控制层，还是会优先自行构建浅层工作流工具？
- 在实施复杂性超过 ACV 之前，巴西收款方护照模型能多顺畅地迁移到墨西哥、哥伦比亚和亚太？
