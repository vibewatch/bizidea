  searchedQueries:
  - 关于巴西 Pix、跨境支付及影响企业国际打款工作流的稳定币相关监管的权威近期资料。
  - 关于稳定币企业采用、跨境 B2B 支付、财资运营及交易量或市场规模证据的权威近期资料。
  - 关于 Trace Finance、稳定币+本地银行付款基础设施，以及 Stripe/Bridge、BVNK、Nium、Circle、Conduit、Zero Hash 等竞争对手的主要权威来源。
  - 展示市场或平台打款客户痛苦的权威来源，包括付款扣押、FX 复杂性、本地银行或税号要求，以及当天结算需求。
