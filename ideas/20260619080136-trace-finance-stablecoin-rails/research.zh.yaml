  adoptionFrictionMatrix:
  - friction: 跨卖家记录的收款方和付款用途数据不完整或不一致。
    severity: high
    affectedBuyer: 付款运营主管
    mitigation: 付款前收款方护照核验、必填字段校验和资金放款前的异常路由。
