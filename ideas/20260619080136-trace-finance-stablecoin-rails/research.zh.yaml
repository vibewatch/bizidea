  - BCB 第 561 号决议、巴西稳定币交易量数据及巴西加密货币采用证据。
  - Circle CPN、Nium 巴西牌照，以及稳定币至本地通道结算合作伙伴资料。
  - 世界银行汇款数据库和 KNOMAD 汇款简报，用于通道规模和手续费背景。
  - BIS/FSB/美联储关于跨境支付摩擦、稳定币、结构化数据和运营时间挑战的资料。
  - 来自 EY、PwC 和 Juniper Research 的企业财资与稳定币采用证据。
