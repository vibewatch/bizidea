problem: >-
  全球平台现在已能用稳定币进行跨境结算，但巴西及类似走廊仍要求银行级 FX 分类、受益人审核和本地通道凭证，资金才能落地。付款团队通常把卖家 KYB、用途码、Pix 账户信息、PSP 控制台和 ERP 对账数据拼凑在电子表格和运营工单里。这让每次通道上线都变成一个人工合规项目，每一笔付款异常都变成卖家流失隐患。
targetUser:
  primary: 向巴西卖家或创作者打款的全球创作者平台、应用商店及 B2B 市场平台的付款运营和财务系统负责人
  secondary: 上述平台的拉美财资或合规负责人
  buyer: 财务副总裁（VP Finance）或全球付款主管（Head of Global Payouts）
startupThesis:
  nonObviousInsight: >-
    一旦巴西将虚拟资产跨境流量定性为外汇业务，转账本身就不再是难点。真正稀缺的是这样一套工作流：把收款方身份、付款用途、通道资格和审计证据打包好，让持牌本地银行合作伙伴能在规模化场景下逐笔放款。稳定币结算退化为后端实现细节；拿下通道护照的软件才是赢家。
  beachhead: >-
    每月向 500 至 5,000 名巴西卖家或创作者打款、以集中的美元资金库运营、希望实现当天 Pix 打款、且没有专职巴西 FX 运营团队的欧美市场平台和创作者平台运营商
  wedge: >-
    一本巴西通道护照，在每次付款批次放款前，将收款方税号和 KYB 数据、付款用途映射、银行或钱包路由，以及审计就绪的 FX 凭证绑定在一起
  whyNowCatalyst: >-
    巴西 FX 分类政策变化、Trace $10B+ 在美巴走廊的验证，以及围绕 Pix+稳定币基础设施的企业级扩张，共同让通道专属付款控制软件的需求变得迫切。
  ventureScalePath: >-
    先从巴西市场付款切入，再将同一套通道护照模型复制到墨西哥、哥伦比亚和亚太本地通道市场，最终成为涵盖市场、薪资、贸易和财资产品的全球合规跨境打款操作系统。
solution: >-
  在平台付款账本、入驻与 KYB 系统、ERP 以及 Trace 类持牌付款合作伙伴之间构建一个工作流层。针对每个收款方和每批次，自动核验税号、付款用途、通道规则以及付款应走 Pix 关联银行通道还是其他本地方式，再将所需凭证附上，最终才放款。系统维护可复用的收款方护照记录，让重复打款不再产生新的合规工单。运营团队获得一个专门处理银行数据被拒、用途码不匹配和本地通道交接失败的案件队列，财务团队则获得账务就绪的 FX 和手续费对账记录。产品最终演化为多通道规则引擎，成为全球平台付款的系统级记录工具。
goToMarketSeed:
  firstCustomer: >-
    一家位于美国的创作者变现或数字商品平台，每月巴西付款超过 1,000 笔、周末卖家提现需求旺盛、只有一家全球 PSP 合作关系，但没有内部巴西 FX 与合规运营团队
  buyingTrigger: >-
    巴西上线、切换至当天 Pix 打款，或反复出现付款扣押——迫使运营和财务团队手工向银行合作伙伴说明收款方和 FX 细节
  currentAlternative: >-
    一家跨境支付处理商或本地付款合作伙伴，加上电子表格、运营工单、邮件审批和人工 ERP 对账
  switchingReason: >-
    通道服务商只负责转账，并不给平台提供可复用的收款方护照、用途码工作流，或内嵌于自有付款运营体系的审计包
  pricingHypothesis: >-
    按活跃通道和法律实体收取年度 SaaS 费用，另加基于已验证收款方数量或受保护付款量的计量收费
