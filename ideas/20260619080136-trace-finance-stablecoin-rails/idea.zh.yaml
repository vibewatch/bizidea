jobsToBeDone:
  - job: 当我们开启或扩大巴西付款通道时，帮助付款运营团队提前核验每个收款方和付款用途，让我们能在不遭遇银行拒付或手工举证的情况下完成 Pix 打款。
    currentAlternative: 电子表格跟踪、PSP 控制台、邮件审批和本地运营分析师
    successMetric: 付款扣押减少量，以及从付款审批到本地到账的时间缩短
  - job: 当月末结账或银行合作伙伴审查到来时，帮助财务团队说明每一笔稳定币支付的本地打款情况，让我们能在不拼凑截图的情况下完成 FX 处理说明和手续费对账。
    currentAlternative: 从 PSP、银行门户和 ERP 手工导出，再拼合到电子表格
    successMetric: 生成通道审计凭证所需时间，以及首次对账即通过的付款比例
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 三个获取的信源汇集了融资信息、运营细节、客户证明、通道规模和政策顺风，共同指向一次清晰的工作流转变。
  painIntensity:
    score: 4
    rationale: 付款扣押、上线延迟和人工 FX 举证对高量平台来说是真实痛点，即便这种痛苦集中在特定的通道工作流环节。
  wedgeClarity:
    score: 5
    rationale: 针对稳定币付款的 Pix 打款设计的巴西通道护照，是一个触发条件清晰、买家明确、人工替代方案具体的窄切口首款产品。
  defensibility:
    score: 4
    rationale: 收款方护照数据、通道规则、异常历史和本地通道手册形成了黏性的工作流情报，单一通道服务商天然无法跨系统拥有这些。
  ventureScale:
    score: 5
    rationale: 滩头市场聚焦巴西，但同一套持牌通道护照可延伸至拉美、亚太以及多个企业打款品类。
topRisks:
  - name: 服务商绑定风险
    description: Trace、dLocal 或其他 PSP 可能在自有平台内添加基础的收款方和通道核验功能。
    mitigation: 保持服务商中立，拥有跨系统工作流、可复用收款方护照和客户需要跨多个合作伙伴及通道使用的 ERP 凭证层。
  - name: 监管变动风险
    description: 巴西或后续通道的规则更新速度可能超过产品编码速度，给财务团队造成信任风险。
    mitigation: 从单一通道起步，与本地顾问和银行合作伙伴对规则进行版本管理，在深度自动化之前保留人工审批的异常处理路径。
  - name: 初始切口过窄
    description: 部分市场平台可能要等到巴西付款量或拒付率已经很高时才感受到足够的痛苦。
    mitigation: 在通道上线和当天付款推出期间开展销售，量化因付款扣押造成的卖家流失和运营成本，优先向同一客户群的相邻拉美通道扩展。
