openQuestions:
- Which payout-purpose categories and beneficiary-document combinations create the highest rejection or hold rates at Brazil bank/eFX partners?
- How much Brazil payout volume or seller-support pain is required before platforms stop tolerating PSP-plus-spreadsheet workflows?
- Will providers like Trace-, Circle-, or Nium-connected partners co-sell a neutral control layer, or will they prioritize building shallow workflow tooling themselves?
- How portable is the Brazil beneficiary-passport model to Mexico, Colombia, and APAC before implementation complexity outruns ACV?
