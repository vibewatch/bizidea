competitors:
- name: Trace Finance
  stage: scale-up
  wedge: Regulated stablecoin-plus-local-bank infrastructure for Brazil and LatAm with Pix and same-day settlement.
  pricing: Custom / enterprise quote (not publicly listed on fetched pages).
  strength: Deep Brazil corridor execution, compliance framing, and proof of volume with major payment-provider customers.
  weaknessVsUs: Provider-centric rail layer, not a neutral customer-side passport and evidence system across multiple partners.
  sourceRefs:
  - 1
  - 2
  - 1
- name: Bridge/Stripe
  stage: incumbent
  wedge: Stablecoin accounts, orchestration, and global payment distribution via Bridge and Stripe.
  pricing: Custom / enterprise quote (not publicly listed on fetched pages).
  strength: Massive distribution, treasury entry point, and strong product momentum around stablecoin adoption.
  weaknessVsUs: Broad platform priorities and weaker corridor-specific beneficiary-passport depth for Brazil payout ops.
  sourceRefs:
  - 54
  - 15
  - 84
- name: BVNK
  stage: scale-up
  wedge: Stablecoin payment and payout infrastructure with compliance and API-based delivery options.
  pricing: Custom / enterprise quote (not publicly listed on fetched pages).
  strength: Strong stablecoin-native execution layer and proof in contractor or platform payout use cases.
  weaknessVsUs: Optimized around using BVNK rails rather than a neutral cross-provider release workflow embedded in customer finance ops.
  sourceRefs:
