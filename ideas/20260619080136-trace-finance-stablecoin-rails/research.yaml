  - 24
- name: Nium
  stage: incumbent
  wedge: Global payout network adding direct Brazil licensing and stablecoin settlement connections.
  pricing: Custom / enterprise quote (not publicly listed on fetched pages).
  strength: Local licensing plus multi-country payout reach makes Nium a credible one-vendor substitute.
  weaknessVsUs: Broader network strategy may underserve the customer-side rule engine and reusable beneficiary passport needed for Brazil exception management.
