regulatoryTechnicalConstraints:
- point: BCB Resolution 561 restricts eFX providers from using stablecoins or crypto to settle cross-border payments inside the regulated framework, pushing deployments toward authorized bank or payment-institution structures.
  sourceRefs:
  - 3
  - 33
- point: Pix access and acceptance still come with local-entity, participant, or licensed-partner requirements that foreign platforms cannot ignore.
  sourceRefs:
  - 9
  - 58
  - 21
- point: International Pix-linked flows can trigger IOF and eFX documentation requirements, making FX evidence and partner data quality central product requirements.
  sourceRefs:
  - 26
  - 30
- point: Structured messaging and API harmonization requirements mean payout data cannot stay in free-text ops workflows if the product is meant to integrate cleanly with banks and local rails.
  sourceRefs:
  - 63
  - 41
