  sourceRefs:
  - 16
  - 27
- point: Nium’s Brazil license and USDC settlement partnership with Circle show global payout networks are moving toward direct regulated-local plus stablecoin-settlement combinations.
  sourceRefs:
  - 21
  - 12
- point: Visa’s payout research shows sellers are willing to switch platforms and even pay a small fee for better or instant payout experiences.
  sourceRefs:
