  adoptionFrictionMatrix:
  - friction: Beneficiary and payout-purpose data are incomplete or inconsistent across seller records.
    severity: high
    affectedBuyer: Head of Payout Operations
    mitigation: Pre-flight beneficiary passporting, required-field validation, and exception routing before funds are released.
