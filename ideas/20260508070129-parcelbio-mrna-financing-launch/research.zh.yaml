  adoptionFrictionMatrix:
  - friction: 结果未必能在不同组织、载荷和递送化学之间稳定迁移。
    severity: high
    affectedBuyer: CSO / 平台负责人
    mitigation: 从一个边界很紧的生物学—递送切口起步，只有在可比数据积累后再扩展。
    sourceRefs:
    - 24
  - friction: 买家仍可能更愿意自己管理多个专业供应商，而不是信任一家新的整合工场。
    severity: high
    affectedBuyer: 临床前项目负责人
    mitigation: 把销售叙事锚定在一个近期主候选选择节点，并证明一体化方案如何为这个节点降风险。
    sourceRefs:
    - 8
    - 12
    - 16
  - friction: 项目一旦逼近 IND 使能阶段，分析和文档要求会迅速抬升。
    severity: high
    affectedBuyer: CMC / 转化负责人
    mitigation: 从第一天起就按照质量体系预期，把检测面板、QC 输出和报告模板标准化。
    sourceRefs:
    - 10
    - 21
    - 25
  - friction: 保密顾虑可能限制客户贡献那些本该用来构建护城河的数据。
    severity: medium
    affectedBuyer: 高管团队
    mitigation: 把客户 IP 与基准使用权分开，并把数据集定位为标准化检测结果，而不是暴露专有载荷。
    sourceRefs:
    - 4
    - 11
