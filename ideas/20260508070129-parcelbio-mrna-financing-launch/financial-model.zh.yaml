scenarios:
  downside:
    description: 转介绍转化走弱，项目定价落在试点区间低位，且合作伙伴返工压缩了毛利率。
    y3RevenueK: 3900.0
    y3EbitdaK: -1010.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
    - ARPU 从 $900K 降到 $750K，因为试点没能转成更高价值的复购包。
    - 销售周期从 4 个月拉长到 6 个月，导致到 Q4Y3 只有 6 个活跃账户。
    - 毛利率从 70% 压缩到 65%，因为合作伙伴主导的检测需要更多返工和人工 QA。
  base:
    description: 公司在 Y1 拿下 3 个付费试点，在 Y2 达到 4 个活跃账户，并在目标毛利率下于 Q4Y3 扩至 8 个活跃账户。
    y3RevenueK: 5400.0
    y3EbitdaK: 15.0
    cashLowPointK: 1012.5
    keyAssumptionChanges:
    - 无变化；这就是假设 A2 到 A22 隐含的运营计划。
  upside:
    description: 复购框架包更早启动，基准报告支撑更高定价，且转介绍驱动的销售在不明显增加现金消耗的情况下填满交付能力。
    y3RevenueK: 6750.0
    y3EbitdaK: 780.0
    cashLowPointK: 1450.0
    keyAssumptionChanges:
    - 随着更多客户购买多轮次框架包，ARPU 从 $900K 提高到 $1.0M。
    - 由于转介绍转化好于漏斗中位数假设，Q4Y3 活跃账户从 8 个升到 9 个。
    - 随着首选合作伙伴栈稳定，毛利率从 70% 提高到 72%。
