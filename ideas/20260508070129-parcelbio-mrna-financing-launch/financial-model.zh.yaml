modelDiagram:
  title: 单位经济流转图
  mermaid: |-
    flowchart LR
      FinancingEvents[融资事件] --> QualifiedPipeline[合格管线]
      QualifiedPipeline --> PaidPrograms[付费项目]
      PaidPrograms --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      Revenue --> COGS[营业成本]
      GrossProfit --> Opex[运营费用]
      Opex --> Cash[现金]
      PaidPrograms --> BenchmarkData[基准数据]
      BenchmarkData --> RepeatWork[重复合作]
      RepeatWork --> Revenue
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自由融资触发的转介绍，转成 Y1 的 3 个付费试点，并在 Q4Y3 前扩展到 8 个活跃账户，年化 ARPU 约为 $900K。
- checkName: 必须跑通的条件
  finding: 首选合作伙伴必须足够稳定地交付标准化检测输出，才能在守住 70% 毛利率的同时沉淀可复用基准数据。
- checkName: 模型失效条件
  finding: 如果销售周期拉长到 6 个月，或复购明显走弱，模型就会变得很紧，因为 downside 情景会把现金低点压到接近 0。
- checkName: 下一轮融资证明点
  finding: 下一轮融资最干净的故事，是已完成 6+ 个项目交付、3 次重复合作，并把基准报告跑到生产状态，证明业务不只是定制 CRO。
sanityChecks:
  ruleOf40: Y3 增长 71.4% + EBITDA 利润率 0.3% = 71.7%
  burnMultiple: Y2 现金消耗倍数为 0.4x（相对 Y1，新增净收入 $1.8M，对应 EBITDA -$0.8M）；Y3 因 EBITDA 略转正而接近 0x。
  revenuePerFte: 按 Q4Y3 的 14 名 FTE 计算，Y3 人均收入为 $386K（服务增强型软件业务的参考区间约为 $200K-$400K）。
  flags:
  - 可触达客户池很窄；如果拿不到计划中的 15-20 个融资触发账户，整个收入爬坡都会延后。
  - 收入是按活跃账户等价物和按期确认建模，因此会比真实项目制签单和回款更平滑。
  - 现金滚动近似 EBITDA，未纳入营运资本时点、税项、债务和 capex。
  - 70% 的目标毛利率依赖合作伙伴 SLA 稳定；如果检测反复返工，利润率会很快被压缩。
