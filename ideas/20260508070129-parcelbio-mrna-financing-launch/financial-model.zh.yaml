slug: mrna-expression-tuning-foundry
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date] 模型从 2026-05-08 方案日期后的下一个月份开始。'
- id: A2
  name: 前 12 个月可触达的切口账户数
  value: '18'
  unit: accounts
  source: '[BP operatingAssumptions + research market] 基准情景采用方案预计 15-20 个可触达账户的中位数。'
- id: A3
  name: 目标账户转为合格试点的比例
  value: 25%
  unit: percent
  source: '[BP gtm.funnelTargets] 采用目标账户到合格试点 20-30% 区间的中位数。'
- id: A4
  name: 合格试点转付费项目的成交率
  value: 55%
  unit: percent
  source: '[BP gtm.funnelTargets] 略高于 50%+ 的付费项目转化目标。'
- id: A5
  name: 每个活跃客户的混合年化收入
  value: $900K
  unit: USD per customer-year
  source: '[Research market.som + BP pricing] 采用研究模型约 $0.9M 的项目价值，位于 BP 的 $500K-$1.5M 单项目区间内。'
- id: A6
  name: 毛利率
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 伙伴协同式工场的目标毛利率。'
- id: A7
  name: 月度客户流失率
  value: 5.0%
  unit: percent
  source: '[BP investorMemo.mustBeTrue + startup-finance heuristic] 将 40%+ 的复购目标换算为一个偏保守的项目制留存假设。'
- id: A8
  name: 平均销售周期
  value: '4'
  unit: months
  source: '[BP executiveSummary + investorMemo.firstCustomer.trigger + startup-finance heuristic] 由融资触发的生物科技工作流销售，通常需要科学尽调和采购流程。'
- id: A9
  name: 收入模型中的客户定义
  value: 期末处于活跃状态的付费账户；只要账户活跃，项目收入就按时间均摊确认。
  unit: policy
  source: '[BP businessModel.unitOfValue] 需要把按项目收费转换成按月和按季度的 P&L 切片。'
- id: A10
  name: 初始创始团队规模
  value: '3'
  unit: FTE
  source: '[BP team] CEO、CSO 和创始数据/工作流工程师在 Month 0 入职。'
- id: A11
  name: 项目运营负责人入职时间
  value: M4
  unit: month
  source: '[BP team] 项目运营负责人在 Month 3 入职，对应本模型的 Q2Y1。'
- id: A12
  name: 质量与法规负责人入职时间
  value: M7
  unit: month
  source: '[BP team] 质量与法规顾问在 Month 6 入职，对应本模型的 Q3Y1。'
- id: A13
  name: 现场应用科学家与 BD 负责人入职时间
  value: M10
  unit: month
  source: '[BP team] 现场应用科学家与 BD 负责人在 Month 9 入职，对应本模型的 Q4Y1。'
- id: A14
  name: Y2-Y3 扩招规则
  value: 每新增约 2-3 个活跃项目，就增加 1 名交付或 GTM 人员；只有在可复制性被证明后，才追加工程岗位。
  unit: policy
  source: '[BP milestones + startup-finance heuristic] 只有在交付量和复购足以支撑时才加人。'
- id: A15
  name: 各职能含负担年现金薪酬
  value: 高管 $245K；工程/数据 $200K；科学/质量 $185K；项目运营 $150K；销售/BD $190K
  unit: USD per FTE-year
  source: '[Startup-finance heuristic: Boston biotech startup cash comp with payroll tax and benefits, no equity value included]'
- id: A16
  name: 非薪资运营费用爬坡
  value: Y1 $1.07M；Y2 $1.44M；Y3 $1.56M
  unit: USD per year
  source: '[Startup-finance heuristic] 覆盖法务、保险、软件、差旅、科学顾问，以及受监管工作流业务所需的 QA/合规外包。'
- id: A17
  name: 第 1 年定价节奏
  value: 在 M10 前拿下 3 个付费试点，并随着活跃账户爬坡，从 M4、M7 和 M10 开始确认收入。
  unit: timing
  source: '[BP milestones + BP investorMemo.firstCustomer.initialContract] 对齐方案中“前 12 个月拿下 3 个付费试点”的目标。'
- id: A18
  name: 已交付项目规模目标
  value: 到 Q4Y2 交付 6+ 个滩头项目，到 Q4Y3 达到 8 个活跃账户。
  unit: accounts
  source: '[BP milestones + research market.som] 让基准情景与方案在 3 年内可达到的市场份额保持一致。'
- id: A19
  name: 客户获取成本
  value: $175K
  unit: USD per customer
  source: '[BP gtm channels + startup-finance heuristic] 高触达科学销售会被创始人、投资人和供应商转介绍部分抵消。'
- id: A20
  name: 起始现金
  value: $3.30M
  unit: USD
  source: '[BP fundingAsk + model output] 假设 seed 轮在模型起始时到账，并覆盖运营计划。'
- id: A21
  name: 融资里程碑与缓冲测试
  value: 到 Q4Y2 时完成 6+ 个已交付项目、3 次重复合作，并上线基准报告，同时保留约 $0.66M、相当于 6 个月的缓冲现金。
  unit: milestone
  source: '[BP milestones + fundingAsk + startup-finance heuristic]'
- id: A22
  name: 现金流简化假设
  value: 现金变动近似 EBITDA；税项、capex、债务和营运资本波动未单独建模。
  unit: policy
  source: '[Startup-finance heuristic] 对早期运营计划来说可以接受，但已在 sanity checks 中标记。'
