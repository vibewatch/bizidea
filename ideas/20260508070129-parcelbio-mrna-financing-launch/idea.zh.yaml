- point: 市场已经把重点推向“把 mRNA 表达拉长到适合慢性病的区间”，瓶颈也因此从递送新奇性转向可编程的持续时间和安全性。
  signalRefs:
  - 表达持续时间正成为核心瓶颈
  sourceRefs:
  - 3
- point: 启动期生物科技公司得从零把这些工作流拼起来，所以更愿意先买外部杠杆，而不是过早重建一整套定制平台。
  signalRefs:
  - 新团队在扩大实验室前先需要平台杠杆
  sourceRefs:
