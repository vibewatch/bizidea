jobsToBeDone:
- job: 当一家刚融到资的 mRNA 生物科技公司必须给自身免疫项目提名主候选时，帮它的平台团队尽快把构建体和制剂方案排出先后，好让团队更稳地推进 IND 使能工作。
  currentAlternative: 手工内部实验，加上外包 CRO 研究
  successMetric: 完成候选提名所需周数，以及少做了多少轮优化
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多个已验证来源都指向同一件事：市场确实在转向可编程、面向慢性病的 mRNA，而且启动资金已经跟上了。
  painIntensity:
    score: 4
    rationale: 对团队小、出手机会又少的生物科技公司来说，主候选优化一旦拖慢，吞掉的就是现金跑道。
  wedgeClarity:
    score: 5
    rationale: 首个用例收得很紧：就在自身免疫 mRNA 项目里，候选提名前把表达调优这件事解决掉。
  defensibility:
    score: 4
    rationale: 只要公司能成为默认优化层，跨项目的表达与安全数据就会越滚越厚，最后堆成很强的护城河。
  ventureScale:
    score: 5
    rationale: 同一套数据和工作流能往多种慢性病 mRNA 模态扩，长期有机会长成更广 RNA 治疗市场的基础设施。
topRisks:
- name: 客户量有限
  description: 初始滩头市场本来就窄，放到任何单一年份里，够格融资的早期自身免疫 mRNA 团队都未必多。
  mitigation: 先咬住自身免疫项目，但同步覆盖共享同类表达调优问题的慢性炎症和蛋白替代 mRNA 适应症。
- name: 落入服务陷阱
  description: 公司可能最后只是高触达的 CRO 替代品，而不是能放大的平台业务。
  mitigation: 把检测面板标准化，用可复用模板组织项目，并从第一批客户起就把数据层和决策软件产品化。
- name: 科学结果波动大
  description: 表达结果未必能在不同载荷、组织和递送系统之间稳定泛化，平台承诺可能因此被削弱。
  mitigation: 先把切口锁在狭窄的生物学和递送组合里，等可比内部数据攒够了再往外扩。
