jobsToBeDone:
- job: 当一家刚完成融资的 mRNA 生物科技公司必须为自身免疫项目提名主候选时，帮助其平台团队快速给构建体和制剂方案排序，这样团队就能更有把握地推进 IND 使能工作。
  currentAlternative: 手工内部实验，加上外包 CRO 研究
  successMetric: 完成候选提名所需周数，以及少做了多少轮优化
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多家已验证来源都指向一个真实变化：市场正转向可编程、面向慢性病的 mRNA，且启动资金已经跟进。
  painIntensity:
    score: 4
    rationale: 对规模很小、出手机会有限的生物科技团队来说，主候选优化一旦延迟，就会直接吞噬现金跑道。
  wedgeClarity:
    score: 5
    rationale: 首个用例界定得很清楚：在自身免疫 mRNA 项目里，于候选提名前解决表达调优问题。
  defensibility:
    score: 4
    rationale: 如果公司能成为默认的优化层，专有的跨项目表达与安全数据就能逐步堆出很强的护城河。
  ventureScale:
    score: 5
    rationale: 同一套数据和工作流能扩展到多种慢性病 mRNA 模态，并成为更广 RNA 治疗市场的核心基础设施。
topRisks:
- name: 客户量有限
  description: 初始滩头市场很窄，任何单一年份里，值得投的早期自身免疫 mRNA 团队数量都可能不多。
  mitigation: 先从自身免疫项目切入，但支持共享同类表达调优问题的相邻慢性炎症和蛋白替代 mRNA 适应症。
- name: 落入服务陷阱
  description: 公司可能沦为高触达的 CRO 替代品，而不是可扩展的平台业务。
  mitigation: 标准化检测面板，用可复用模板组织项目，并从首批客户开始产品化数据层和决策软件。
- name: 科学结果波动大
  description: 表达结果未必能在不同载荷、组织和递送系统之间稳定泛化，从而削弱平台承诺。
  mitigation: 先把切口限制在狭窄的生物学和递送组合里，等积累了足够可比的内部数据后再扩展。
