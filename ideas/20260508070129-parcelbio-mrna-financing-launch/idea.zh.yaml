problem: 慢性病 mRNA 项目要把表达持续时间、免疫激活和剂量窗口卡得更准，这早就超出了疫苗时代那套工作流的能力边界。可早期 mRNA 生物科技公司今天还是靠割裂的湿实验、CRO 交接和临时生信去给构建体排队，主候选筛得慢，向投资人和监管方也很难把逻辑讲扎实。对手上只有一条主线项目的启动团队来说，每多跑一轮优化，烧掉的都是现金跑道。
targetUser:
  primary: 开发慢性病或体内细胞治疗项目的 seed 到 Series A mRNA 治疗公司中的平台主管或临床前负责人
  secondary: 同类公司的转化生物学与 CMC 负责人
  buyer: 首席科学官或平台主管
startupThesis:
  nonObviousInsight: 下一波 mRNA 的难点，已经不是再证明 mRNA 有没有用，而是能不能在慢性病场景里稳定调住表达多久、落在哪个组织、以及安全边界卡在哪里。刚融到资的平台型生物科技公司，内部数据闭环普遍还没建起来，短期内很难自己把这件事跑顺。
  beachhead: 面向自身免疫疾病中体内 CAR-T 或 B 细胞清除项目、且仍处于候选提名前阶段的 seed 到 Series A mRNA 生物科技公司的主候选优化项目
  wedge: 一个共享的表达调优工场：负责设计构建体库、跑标准化表达与免疫原性检测，并交付排序后的候选名单和可用于 IND 的证据包
  whyNowCatalyst: ParcelBio 围绕可编程 mRNA、延长表达和自身免疫体内 CAR-T 启动，说明市场正在从疫苗式 mRNA 转向慢性病项目，而表达调优正变成成败关键。
  ventureScalePath: 先咬住自身免疫体内细胞治疗项目，再往更广的慢性炎症、肿瘤和蛋白替代 mRNA 项目扩；一路沉淀专有数据集，把序列和制剂选择同持续时间、效力与安全结果连成一张图。
solution: 这家公司卖的是一套 mRNA 表达调优工场，服务那些没法在内部堆出完整平台栈的精简治疗团队。客户给出目标生物学和递送约束后，平台负责设计构建体与制剂变体，组织一套标准化的体外、体内检测，并建模判断哪组组合最贴近目标表达窗口。交付物不是一堆原始实验结果，而是一整套决策包：帮团队挑出主候选、向董事会讲清为什么这么选，并把后续 IND 使能工作接上。随着项目滚动，这家公司还能靠跨项目数据持续变厚——普通 CRO 并不会把表达持续时间、组织反应和免疫原性数据真正攒成库。
goToMarketSeed:
  firstCustomer: 刚完成融资、拥有 1-3 个临床前项目、团队规模 10-40 人，并且在未来 12 个月内需要完成候选提名的 mRNA 生物科技公司，重点是自身免疫或体内细胞治疗方向
  buyingTrigger: seed 或 Series A 融资之后，团队需要在接下来两到三个季度内拿出主候选筛选方案或 IND 前数据包
  currentAlternative: 内部湿实验迭代，叠加 CRO 检测和临时生信分析
  switchingReason: 这套工场能把原本分散的多轮优化压进一次结构化战役里，交付的主候选筛选故事也会比一摞拼起来的 CRO 报告更完整。
  pricingHypothesis: 单个项目按 $500k-$1.5M 收费，覆盖设计加检测；对反复做优化的客户，再叠加年度平台框架包。
whyNow:
- point: 投资人已经愿意在公司一成立时就给新 mRNA 平台投钱，这意味着新团队会立刻需要基础设施，而不是等规模拉起来再补课。
