problem: 慢性病 mRNA 项目在表达持续时间、免疫激活和剂量上的控制要求，远高于疫苗时代 mRNA 工作流的设计上限。早期 mRNA 生物科技公司仍靠割裂的湿实验、CRO 交接和临时生信来给构建体排序，导致主候选筛选既慢，也很难向投资人或监管方讲清楚。对只有一个主候选项目的启动期公司来说，每多一轮优化都会消耗宝贵的现金跑道。
targetUser:
  primary: 开发慢性病或体内细胞治疗项目的 seed 到 Series A mRNA 治疗公司中的平台主管或临床前负责人
  secondary: 同类公司的转化生物学与 CMC 负责人
  buyer: 首席科学官或平台主管
startupThesis:
  nonObviousInsight: 下一波 mRNA 的难点，已经不是证明 mRNA 能不能起效，而是在慢性病场景里可预测地调控它表达多久、表达在哪里，以及安全边界。刚拿到融资的平台型生物科技公司，内部数据闭环还不够快，短期内解不了这个问题。
  beachhead: 面向自身免疫疾病中体内 CAR-T 或 B 细胞清除项目、且仍处于候选提名前阶段的 seed 到 Series A mRNA 生物科技公司的主候选优化项目
  wedge: 一个共享的表达调优工场：负责设计构建体库、执行标准化表达与免疫原性检测，并返回排序后的候选项和适合 IND 的证据包
  whyNowCatalyst: ParcelBio 围绕可编程 mRNA、延长表达和自身免疫体内 CAR-T 启动，说明市场正在从疫苗式 mRNA 转向慢性病项目，而表达调优正变成成败关键。
  ventureScalePath: 先从自身免疫体内细胞治疗项目切入，再扩展到更广的慢性炎症、肿瘤和蛋白替代 mRNA 项目，同时沉淀一套专有数据集，把序列与制剂选择同持续时间、效力和安全结果连起来。
solution: 公司提供一套 mRNA 表达调优工场，服务那些没有能力在内部搭全平台栈的精简治疗团队。客户提交目标生物学和递送约束后，平台会设计构建体和制剂变体，运行一组标准化的体外与体内检测，并建模判断哪种组合最符合目标表达窗口。交付物不只是原始检测数据，而是一套决策包，帮助团队选出主候选、向董事会解释为什么这样选，并组织下一阶段的 IND 使能工作。随着项目累积，这家初创公司还能靠跨项目的数据集持续增值——普通 CRO 并不会汇总表达持续时间、组织反应和免疫原性这样的数据。
goToMarketSeed:
  firstCustomer: 刚完成融资、拥有 1-3 个临床前项目、团队规模 10-40 人，并且在未来 12 个月内需要完成候选提名的 mRNA 生物科技公司，重点是自身免疫或体内细胞治疗方向
  buyingTrigger: seed 或 Series A 融资之后，团队需要在接下来两到三个季度内拿出主候选筛选方案或 IND 前数据包
  currentAlternative: 内部湿实验迭代，叠加 CRO 检测和临时生信分析
  switchingReason: 这套工场能把多轮优化压缩成一次结构化项目，并给出比拼凑的 CRO 报告更完整的主候选筛选叙事。
  pricingHypothesis: 每个项目按 $500k-$1.5M 收费，覆盖设计加检测项目；对需要重复优化的客户，再叠加年度平台框架包。
whyNow:
- point: 投资人愿意在公司启动时就为新的 mRNA 平台买单，因此一批新团队会立刻需要基础设施，而不是等规模做大后再补。
  signalRefs:
