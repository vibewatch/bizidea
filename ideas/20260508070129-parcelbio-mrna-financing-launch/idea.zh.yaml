- point: 自身免疫疾病里的体内 CAR-T，让表达控制问题比疫苗 mRNA 更窄、也更难，这给专业化工具公司留出了空间。
  signalRefs:
  - 体内 CAR-T 正在进入自身免疫疾病
  sourceRefs:
  - 1
- point: 市场明确在推动把 mRNA 表达延长到适合慢性病的区间，瓶颈因此正从递送新奇性转向可编程的持续时间与安全性。
  signalRefs:
  - 表达持续时间正成为核心瓶颈
  sourceRefs:
  - 3
- point: 启动期生物科技公司要从零搭这些工作流，因此更愿意先买外部杠杆，而不是太早重建一套定制平台。
  signalRefs:
  - 新团队在扩大实验室前先需要平台杠杆
  sourceRefs:
  - 2
differentiator: 通用 CRO 卖的是检测产能，AI 序列工具卖的是设计建议，但两者都没有打通“构建设计—实测表达持续时间—监管级决策输出”这个闭环，尤其在慢性病 mRNA 场景里更是如此。这家初创公司的赢面，在于死磕“可编程持久性最关键”的那一类新项目，并在多家客户之间沉淀专有结果数据集。如果这套数据集最终变成慢性 mRNA 优化的默认基准，公司就能从服务切口，长成 mRNA 项目设计选择的系统记录层。
