    baseCase: "70% gross margin"
    upsideCase: "72% gross margin"
    y3RevenueImpactK: 0.0
    cashImpactK: -270.0
  - variable: hiring pace
    downsideCase: "Scale headcount 2 quarters ahead of revenue"
    baseCase: "Hire to matched delivery milestones"
    upsideCase: "Delay noncritical hires by 1 quarter until repeat work is visible"
    y3RevenueImpactK: 0.0
    cashImpactK: -450.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      FinancingEvents --> QualifiedPipeline
      QualifiedPipeline --> PaidPrograms
      PaidPrograms --> Revenue
      Revenue --> GrossProfit
      Revenue --> COGS
      GrossProfit --> Opex
      Opex --> Cash
      PaidPrograms --> BenchmarkData
      BenchmarkData --> RepeatWork
      RepeatWork --> Revenue
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from financing-triggered referrals converting into 3 paid pilots in Y1 and 8 active accounts by Q4Y3 at roughly $900K annualized ARPU."
  - checkName: Must go right
    finding: "Preferred partners must deliver standardized assay outputs reliably enough to hold 70% gross margin while creating reusable benchmark data."
  - checkName: Model breaks if
    finding: "The plan gets tight if sales cycles move to 6 months or repeat work weakens, because the downside case pushes the cash low point close to zero."
  - checkName: Next-round proof
    finding: "The clean next financing story is 6+ delivered programs, 3 repeat engagements, and benchmark reporting in production, proving the business is more than bespoke CRO work."
sanityChecks:
  ruleOf40: "Y3 growth 71.4% + EBITDA margin 0.3% = 71.7%"
  burnMultiple: "Y2 burn multiple 0.4x (-$0.8M EBITDA on $1.8M net new revenue vs. Y1); Y3 is near 0x as EBITDA turns slightly positive."
  revenuePerFte: "$386K Y3 using Q4Y3 headcount of 14 FTE (benchmark roughly $200K-$400K for services-enabled software businesses)."
  flags:
    - "The reachable customer pool is narrow, so missing the planned 15-20 financing-triggered accounts would delay the whole revenue ramp."
    - "Revenue is modeled on active account equivalents and ratable recognition, which smooths what will likely be lumpier project bookings and collections."
    - "Cash roll-forward approximates EBITDA and excludes working-capital timing, taxes, debt, and capex."
    - "The 70% gross-margin target depends on partner SLAs holding; repeated assay rework would compress margin quickly."
