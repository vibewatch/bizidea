    y3RevenueImpactK: -900.0
    cashImpactK: -630.0
  - variable: CAC
    downsideCase: "$225K CAC from heavier founder time and conference spend"
    baseCase: "$175K CAC"
    upsideCase: "$125K CAC from investor and vendor referrals"
    y3RevenueImpactK: 0.0
    cashImpactK: -300.0
  - variable: churn
    downsideCase: "7% monthly churn because pilots do not repeat"
    baseCase: "5% monthly churn"
    upsideCase: "3.5% monthly churn with strong retainer uptake"
    y3RevenueImpactK: -675.0
    cashImpactK: -520.0
  - variable: sales cycle
    downsideCase: "6-month sales cycle"
    baseCase: "4-month sales cycle"
    upsideCase: "3-month sales cycle"
