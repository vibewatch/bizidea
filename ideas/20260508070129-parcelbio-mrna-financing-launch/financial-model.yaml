slug: mrna-expression-tuning-foundry
date: '2026-05-08'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: month
    source: "[BP date] Model starts the month after the 2026-05-08 plan date."
  - id: A2
    name: Targetable wedge accounts in the first 12 months
    value: '18'
    unit: accounts
    source: "[BP operatingAssumptions + research market] Base case uses the midpoint of the 15-20 targetable accounts the plan expects."
  - id: A3
    name: Qualified pilot conversion from target accounts
    value: '25%'
    unit: percent
    source: "[BP gtm.funnelTargets] Uses the midpoint of the 20-30% target-account-to-qualified-pilot range."
  - id: A4
    name: Paid-program close rate from qualified pilots
    value: '55%'
    unit: percent
    source: "[BP gtm.funnelTargets] Slightly above the 50%+ paid-program conversion target."
  - id: A5
    name: Blended annualized revenue per active customer
    value: '$900K'
    unit: USD per customer-year
    source: "[Research market.som + BP pricing] Uses the research model's ~$0.9M engagement value inside the BP's $500K-$1.5M per-program range."
  - id: A6
    name: Gross margin
    value: '70%'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] Target gross margin for a partner-orchestrated foundry."
  - id: A7
    name: Monthly customer churn
    value: '5.0%'
    unit: percent
    source: "[BP investorMemo.mustBeTrue + startup-finance heuristic] Converts a 40%+ repeat target into a conservative project-business retention assumption."
  - id: A8
    name: Average sales cycle
    value: '4'
    unit: months
    source: "[BP executiveSummary + investorMemo.firstCustomer.trigger + startup-finance heuristic] Financing-triggered biotech workflow sales usually need scientific diligence and procurement."
  - id: A9
    name: Revenue-model customer definition
    value: "Active paying account at period end, with project revenue recognized ratably while the account is active."
    unit: policy
    source: "[BP businessModel.unitOfValue] Needed to translate per-program fees into monthly and quarterly P&L slices."
  - id: A10
    name: Starting founding team
    value: '3'
    unit: FTE
    source: "[BP team] CEO, CSO, and founding data/workflow engineer start at Month 0."
  - id: A11
    name: Program operations lead start
    value: M4
    unit: month
    source: "[BP team] Program operations lead starts at Month 3, which is Q2Y1 in this model."
  - id: A12
    name: Quality and regulatory lead start
    value: M7
    unit: month
    source: "[BP team] Quality and regulatory consultant starts at Month 6, which is Q3Y1 in this model."
  - id: A13
    name: Field application scientist and BD lead start
    value: M10
    unit: month
    source: "[BP team] Field application scientist and BD lead starts at Month 9, which is Q4Y1 in this model."
  - id: A14
    name: Scaling hires in Y2-Y3
    value: "Add one delivery or GTM hire for each roughly 2-3 additional active programs, with extra engineering after repeatability is proven."
    unit: policy
    source: "[BP milestones + startup-finance heuristic] Hires are delayed until delivery volume and repeat work support them."
  - id: A15
    name: Loaded annual cash compensation by function
    value: "Executive $245K; Engineering/Data $200K; Science/Quality $185K; Program Ops $150K; Sales/BD $190K"
    unit: USD per FTE-year
    source: "[Startup-finance heuristic: Boston biotech startup cash comp with payroll tax and benefits, no equity value included]"
  - id: A16
    name: Non-payroll operating expense ramp
    value: "Y1 $1.07M; Y2 $1.44M; Y3 $1.56M"
    unit: USD per year
    source: "[Startup-finance heuristic] Covers legal, insurance, software, travel, scientific advisors, and QA/compliance contractors for a regulated workflow business."
  - id: A17
    name: Pricing cadence in Year 1
    value: "3 paid pilots close by M10, with revenue recognized from M4, M7, and M10 as active accounts ramp."
    unit: timing
    source: "[BP milestones + BP investorMemo.firstCustomer.initialContract] Matches the plan to close 3 paid pilots in the first 12 months."
  - id: A18
    name: Delivered-program scale target
    value: "6+ delivered beachhead programs by Q4Y2 and 8 active accounts by Q4Y3"
    unit: accounts
    source: "[BP milestones + research market.som] Keeps the base case in line with the plan's reachable 3-year share."
  - id: A19
    name: Customer acquisition cost
    value: '$175K'
    unit: USD per customer
    source: "[BP gtm channels + startup-finance heuristic] High-touch scientific selling is moderated by founder, investor, and vendor referrals."
  - id: A20
    name: Starting cash
    value: '$3.30M'
    unit: USD
    source: "[BP fundingAsk + model output] Assumes the seed round closes at model start and funds the operating plan."
  - id: A21
    name: Funding milestone and buffer test
    value: "Reach 6+ delivered programs, 3 repeat engagements, and live benchmark reporting by Q4Y2 while preserving about $0.66M of six-month buffer cash."
    unit: milestone
    source: "[BP milestones + fundingAsk + startup-finance heuristic]"
  - id: A22
    name: Cash-flow simplification
    value: "Cash movement approximates EBITDA; taxes, capex, debt, and working-capital swings are not separately modeled."
    unit: policy
    source: "[Startup-finance heuristic] Acceptable for an early-stage operating plan but flagged in sanity checks."
