scenarios:
  downside:
    description: "Referral conversion softens, programs price near the low end of the pilot range, and partner rework trims gross margin."
    y3RevenueK: 3900.0
    y3EbitdaK: -1010.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
      - "ARPU falls from $900K to $750K because pilots do not convert into richer repeat packages."
      - "Sales cycle stretches from 4 months to 6 months, leaving only 6 active accounts by Q4Y3."
      - "Gross margin compresses from 70% to 65% because partner-led assays need more rework and manual QA."
  base:
    description: "The company closes 3 paid pilots in Y1, reaches 4 active accounts in Y2, and scales to 8 active accounts by Q4Y3 at target gross margin."
    y3RevenueK: 5400.0
    y3EbitdaK: 15.0
    cashLowPointK: 1012.5
    keyAssumptionChanges:
      - "No changes; this is the operating plan implied by assumptions A2 through A22."
  upside:
    description: "Repeat retainers start earlier, benchmark reporting supports higher pricing, and referral-led sales fill delivery capacity without materially increasing burn."
    y3RevenueK: 6750.0
    y3EbitdaK: 780.0
    cashLowPointK: 1450.0
    keyAssumptionChanges:
      - "ARPU rises from $900K to $1.0M as more customers buy multi-cycle retainers."
      - "Q4Y3 active accounts rise from 8 to 9 because referral conversion beats the midpoint funnel assumption."
      - "Gross margin improves from 70% to 72% as the preferred partner stack stabilizes."
