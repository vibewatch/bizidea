  adoptionFrictionMatrix:
  - friction: Results may not transfer cleanly across tissues, payloads, and delivery chemistries.
    severity: high
    affectedBuyer: CSO / Head of Platform
    mitigation: Start with one tightly bounded biology-delivery wedge and expand only after comparable datasets accumulate.
    sourceRefs:
    - 24
  - friction: Buyers may still prefer managing several specialist vendors rather than trusting a new integrated foundry.
    severity: high
    affectedBuyer: Preclinical program lead
    mitigation: Anchor the pitch around one near-term lead-selection decision and show how the integrated package de-risks that milestone.
    sourceRefs:
    - 8
    - 12
    - 16
  - friction: Analytical and documentation expectations rise sharply as programs approach IND-enabling work.
    severity: high
    affectedBuyer: CMC / translational lead
    mitigation: Standardize assay panels, QC outputs, and report templates against quality-system expectations from day one.
    sourceRefs:
    - 10
    - 21
    - 25
  - friction: Confidentiality concerns may limit customers' willingness to contribute data that would build the moat.
    severity: medium
    affectedBuyer: Executive team
    mitigation: Separate customer IP from benchmarking rights and position the dataset around normalized assay outcomes rather than proprietary payload disclosure.
    sourceRefs:
    - 4
