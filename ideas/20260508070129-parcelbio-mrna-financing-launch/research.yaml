competitors:
- name: TriLink BioTechnologies
  stage: incumbent
  wedge: RNA inputs, discovery synthesis, analytics, and CDMO manufacturing for mRNA programs.
  pricing: Custom quote for services; service-led and modular.
  strength: Deep RNA manufacturing credibility and adjacent analytical stack.
  weaknessVsUs: Sells components and process capacity, not a narrow biological ranking workflow or neutral cross-program expression dataset.
  sourceRefs:
  - 7
  - 8
  - 10
- name: Aldevron
  stage: incumbent
  wedge: RNA manufacturing, drug product, and broader CDMO support for RNA therapeutics.
  pricing: Custom quote or enterprise CDMO engagement.
  strength: Strong process-development, formulation, and drug-product infrastructure.
  weaknessVsUs: Optimizes manufacturing readiness more than early construct ranking and expression-window selection.
  sourceRefs:
  - 12
  - 13
  - 14
- name: VectorBuilder
  stage: scale-up
  wedge: Therapeutic IVT RNA, CRO development, RNA-LNP production, and GMP manufacturing.
  pricing: Project quote across discovery and manufacturing services.
  strength: Broad externalized RNA and LNP toolkit that looks close to the current buyer workflow.
  weaknessVsUs: Still structured like a broad services provider; the differentiation is execution breadth rather than a standardized decision dataset.
  sourceRefs:
  - 15
  - 16
  - 17
- name: Strand Therapeutics
  stage: scale-up
  wedge: Programmable mRNA therapeutics company building its own expression-control platform and pipeline.
  pricing: Not sold as a fee-for-service platform; substitute is internal platform ownership.
  strength: Strong proof point that programmable-expression know-how matters and can support differentiated therapeutics.
  weaknessVsUs: It is a vertical biotech, not a neutral infrastructure partner for other startups.
  sourceRefs:
