  validationPlan:
  - priority: high
    question: How many U.S. or EU seed-to-Series A mRNA companies will hit candidate-nomination pressure in the next 12 months?
    evidenceToGather: Build a live target-account list from financings, pipeline updates, and investor portfolios; confirm stage, program count, and nomination timing in 20 customer calls.
  - priority: high
    question: Will CSOs pay for an integrated foundry outcome rather than patching together existing vendors?
    evidenceToGather: Run five paid or design-partner pilots scoped around one lead-ranking decision, then compare cycle time and board-readout quality against the current vendor stack.
  - priority: medium
    question: How narrow does the first biology and delivery scope need to be for data reuse to matter?
    evidenceToGather: Backtest historical program data across one tissue, one payload class, and one delivery regime before broadening the template.
  - priority: medium
    question: What exact evidence package do buyers want before pre-IND meetings?
    evidenceToGather: Interview translational and CMC leaders plus regulatory consultants to define the minimum standardized assay and report set.
