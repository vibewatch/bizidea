openQuestions:
- How many seed-to-Series A chronic-disease mRNA teams are realistically in market for outsourced lead-optimization over the next 24 months?
- Will scientific buyers pay for an integrated ranked-candidate package, or will they keep stitching together synthesis, analytics, and formulation vendors?
- How narrow does the first assay and biology scope need to be before cross-program data becomes meaningfully predictive?
- Which minimum assay outputs and documentation elements do buyers want a foundry to deliver before pre-IND planning?
