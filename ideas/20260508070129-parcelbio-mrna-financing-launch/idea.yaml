topRisks:
  - name: Limited customer volume
    description: The initial beachhead is narrow, and the number of fundable early mRNA teams in autoimmune disease may be small in any single year.
    mitigation: Start with autoimmune programs but support adjacent chronic inflammatory and protein-replacement mRNA indications that share the same expression-tuning problem.
  - name: Services trap
    description: The company could become a high-touch CRO substitute instead of a scalable platform business.
    mitigation: Standardize assay panels, structure engagements around reusable templates, and productize the data layer and decision software from the first customers.
  - name: Scientific variance
    description: Expression results may not generalize cleanly across payloads, tissues, and delivery systems, weakening the platform promise.
    mitigation: Constrain the first wedge to a narrow biology and delivery profile, then expand only after enough internally comparable data has been collected.
