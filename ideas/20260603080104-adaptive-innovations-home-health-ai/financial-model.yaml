scenarios:
  downside:
    description: >-
      Slower pilot conversion and more integration-heavy rollouts leave the company below the
      year-three SOM path and still meaningfully burning cash.
    y3RevenueK: 1540
    y3EbitdaK: -915
    cashLowPointK: 220
    keyAssumptionChanges:
      - Q4Y3 customers end at 30 instead of 40.
      - Blended ACV stays closer to $65K because multi-branch expansion lands later.
      - Gross margin stays near 67% because services and support remain heavier for longer.
  base:
    description: >-
      Three paid pilots convert into 12 production agencies by year two and the company reaches 40
      live agencies by year-three exit through founder-led sales plus one new PE-platform channel.
    y3RevenueK: 1965
    y3EbitdaK: -645.4
    cashLowPointK: 894.4
    keyAssumptionChanges:
      - >-
        Q4Y2 reaches 12 live customers and Q4Y3 reaches 40, matching the SOM milestone path in the
        plan.
      - >-
        Entry ACV starts around $60K and expands into a blended $72K-plus annualized revenue base on
        older accounts.
      - >-
        Gross margin holds at the 70% target because implementation stays overlay-first rather than
        custom integration led.
  upside:
    description: >-
      Pilot-to-production conversion stays above target and the first PE-platform deal expands
      earlier, letting the company outgrow the base plan without adding much more headcount.
    y3RevenueK: 2410
    y3EbitdaK: -330
    cashLowPointK: 1180
    keyAssumptionChanges:
      - Q4Y3 customers end at 45 instead of 40.
      - >-
        Mature accounts expand faster toward the upper end of the $60K-$150K budget window in the
        business plan.
      - >-
        Gross margin improves to 72% as onboarding templates and rule libraries become more
        repeatable.
