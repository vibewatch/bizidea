    cashImpactK: -120
  - variable: sales cycle
    downsideCase: 6-month pilot-to-production cycle
    baseCase: 4-5 month pilot-to-production cycle
    upsideCase: 3-4 month pilot-to-production cycle
    y3RevenueImpactK: -310
    cashImpactK: -280
  - variable: gross margin
    downsideCase: 67%
    baseCase: 70%
    upsideCase: 72%
    y3RevenueImpactK: 0
    cashImpactK: -84
  - variable: hiring pace
    downsideCase: One extra engineer and one extra implementation hire by Y2
    baseCase: Lean hiring plan shown in headcount table
    upsideCase: Delay one noncritical hire until after Q2Y3
    y3RevenueImpactK: 0
    cashImpactK: -220
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Qualified agency targets] --> Pilots[Paid pilots]
      Pilots --> Customers[Production agencies]
      Customers --> Revenue[Branch subscription + usage revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue is driven by reaching 12 live agencies by Q4Y2 and 40 by Q4Y3 while
      expanding older accounts from pilot pricing into roughly $72K-plus blended annual revenue.
  - checkName: Must go right
    finding: >-
      The company must keep deployment overlay-first and convert pilots to production within about
      4-5 months or the lean headcount plan stops covering burn.
  - checkName: Model breaks if
    finding: >-
      If sales cycles stretch to 6 months or gross margin falls below 67%, cash drops toward the
      downside case even without missing the full customer target.
  - checkName: Next-round proof
    finding: >-
      The next financing is justified once the company can show 10-12 production agencies,
      repeatable sub-8-week onboarding, and one portfolio-style expansion path from the first
      PE-platform channel.
sanityChecks:
  ruleOf40: >-
    Y3 growth 246.6% + EBITDA margin -32.8% = 213.8% directionally strong growth but still pre-scale
    on efficiency.
  burnMultiple: >-
    Burn multiple improves from about 2.0x in Y2 to about 0.5x in Y3 as onboarding templates and
    account expansion lift gross profit faster than hiring.
  revenuePerFte: >-
    $178K Y3 using 11 exit FTE (below mature SaaS benchmarks and consistent with an
    implementation-heavy healthcare workflow motion).
  flags:
    - >-
      Revenue per exit FTE remains below typical mature SaaS benchmarks because the base case still
      carries meaningful onboarding and support work.
    - >-
      The model assumes 40 live agencies by Q4Y3, so underperformance in pilot-to-production
      conversion would likely require a tighter hiring plan or earlier fundraising.
    - >-
      Gross margin is capped at 70%; if buyers demand deeper write-back integrations sooner,
      services intensity could delay the path to break-even.
