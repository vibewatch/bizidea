competitors:
- name: WellSky Enterprise Referral Manager
  stage: incumbent
  wedge: 嵌在 WellSky EHR 里的集中式、AI 驱动转介与 intake 管理。
  pricing: 企业级定制定价；以 demo 驱动，未公开报价。
  strength: 和拟议切口重叠度最高：既能集中处理入站转介，也有 AI 数据抽取，还宣称有客户每周多处理 38% 的转介。
  weaknessVsUs: 产品仍更宽、更偏生态位打法；它卖的是集中式 intake，而不是一个 vendor-neutral、专门服务混合 payer 分支经济账的接收引擎。
  sourceRefs:
  - 31
  - 32
- name: Homecare Homebase
  stage: incumbent
  wedge: 深度渗透居家护理的 EHR，覆盖文档、计费、分析和互操作。
  pricing: 企业级定制定价；无公开报价。
  strength: 装机量大、客户留存高、运营触点深，一旦被选成 system of record，就很难替换。
  weaknessVsUs: 公开产品叙事更偏广义护理交付，不是接单前的转介转化，也不是分支级决策自动化。
  sourceRefs:
  - 30
- name: MatrixCare
  stage: incumbent
  wedge: 以临床人员为中心的居家健康 EHR，覆盖互操作、资格核验、移动工作流和一体化 intake 支持。
  pricing: 企业级定制定价；无公开报价。
  strength: 临床体验、互操作和 intake/文档一体化能力都很强，能帮助机构管理完整患者旅程。
  weaknessVsUs: 它是为了优化整段护理流程而设计，接收决策只是其中一环，不是产品战略中心。
  sourceRefs:
  - 33
  - 34
- name: AlayaCare
  stage: scale-up
  wedge: 面向居家护理的云平台，覆盖 intake、排班、护理管理、计费和分析。
  pricing: 企业级定制定价；无公开报价。
  strength: 云端体验现代、对排班的抓手强，也明确围绕效率和增长来讲故事。
  weaknessVsUs: 更聚焦端到端机构管理和接单后的运营，而不是那段最难的 yes/no 转介决策窗口。
  sourceRefs:
  - 35
  - 36
- name: Axxess
  stage: incumbent
  wedge: 一体化居家健康平台，覆盖移动文档、上门追踪、QA、理赔和 Medicare 资格访问。
  pricing: 企业级定制定价；无公开报价。
  strength: 装机面广、移动工作流强、收入循环连接直接，是分支运营里非常强势的 incumbent。
  weaknessVsUs: 核心价值主张仍是广义居家健康运营；转介转化只是邻近能力，不是明确的一号切口。
  sourceRefs:
  - 37
  - 38
regulatoryTechnicalConstraints:
- point: 根据 CMS 规则，acceptance-to-service 决策必须和机构已记录的产能、staffing 水平、能力边界以及患者需求保持一致。
  sourceRefs:
  - 4
  - 5
- point: 任何影响时效、start-of-care 或 transfer-of-information 流程的工作流，都会碰到 HH QRP 和 OASIS 报告要求。
  sourceRefs:
  - 6
  - 7
- point: 价值导向采购和质量 benchmark，让机构更需要把 intake 选择和下游结果连起来，而不是把它只当成一项孤立的行政任务。
  sourceRefs:
  - 8
- point: 医院和机构越来越需要在转介网络、EHR 和居家监测工具之间建立安全、可互操作的数据流。
  sourceRefs:
  - 27
  - 29
  - 34
validationSignals:
- point: Adaptive 报告称，自己已完成超过 100,000 次服务、对接 500 多家转介机构，并把 AI 从 intake 一路用到 QA，这证明行政压缩可以支撑真实运营规模。
  sourceRefs:
  - 1
  - 2
- point: WellSky 称，有客户用 Enterprise Referral Manager 后，每周处理的转介多了 38%，说明 intake 自动化的需求是可量化的。
  sourceRefs:
  - 32
- point: 转介拒绝率高达 76%，痛点已经足够强，买方不需要再被教育“问题存不存在”。
  sourceRefs:
  - 13
  - 15
  - 16
- point: 超过一半的居家护理服务商已经投资或计划投资 AI，而且最主要的驱动就是 staffing 压力。
  sourceRefs:
  - 21
openQuestions:
- 目标客群里，被拒转介有多大一部分真是文档问题驱动，而不是单纯临床人手不够？
- 分支特定的 payer 与服务区域逻辑，到底已经被 incumbent EHR 编进系统多少，还有多少仍只存在于一线经验里？
- 哪些混合 payer 机构最愿意买独立 intake overlay，而不是继续等 incumbent 模块补齐？
- 当机构响应速度变成出院瓶颈时，医院到底会多频繁地直接影响软件选型？
