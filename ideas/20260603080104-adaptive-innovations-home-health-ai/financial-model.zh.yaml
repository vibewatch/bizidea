modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  Leads[Qualified agency targets] --> Pilots[Paid pilots]\n  Pilots --> Customers[Production agencies]\n  Customers --> Revenue[Branch subscription + usage revenue]\n  Revenue --> GrossProfit[70% gross profit]\n  GrossProfit --> Cash[Cash runway]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入，建立在 Q4Y2 做到 12 家在线机构、Q4Y3 做到 40 家，同时把老账户从 pilot 定价一路扩到约 $72K+ 混合年收入。
- checkName: 必须跑对的事
  finding: 公司必须坚持 overlay-first 的部署方式，并把 pilot 到 production 的转化压在约 4-5 个月内，否则精简 headcount 计划就兜不住 burn。
- checkName: 模型失效条件
  finding: 如果销售周期拉长到 6 个月，或毛利率掉到 67% 以下，即使客户目标没有整体失手，现金也会向 downside 情景滑落。
- checkName: 下一轮融资证明
  finding: 当公司能拿出 10-12 家 production 机构、可复制的 8 周内 onboarding，以及首个 PE 平台渠道带来的组合式扩张路径时，下一轮融资就有理有据。
sanityChecks:
  ruleOf40: Y3 增长 246.6% + EBITDA 利润率 -32.8% = 213.8%；增长方向很强，但效率上仍处于规模化前阶段。
  burnMultiple: 随着 onboarding 模板和账户扩张让毛利增长快于招聘，burn multiple 会从 Y2 约 2.0x 改善到 Y3 约 0.5x。
  revenuePerFte: 按退出时 11 名 FTE 计算，Y3 人均收入约 $178K；低于成熟 SaaS benchmark，但和“实施负担偏重的医疗工作流”这一路径一致。
  flags:
  - 退出时的人均收入仍低于典型成熟 SaaS benchmark，因为基准情景下 onboarding 和支持工作量依然不轻。
  - 模型假设 Q4Y3 有 40 家在线机构，因此一旦 pilot 转 production 不及预期，公司很可能要么收紧招聘，要么更早融资。
  - 毛利率被封顶在 70%；如果买方更早要求更深的写回集成，服务强度会把盈亏平衡点继续往后推。
