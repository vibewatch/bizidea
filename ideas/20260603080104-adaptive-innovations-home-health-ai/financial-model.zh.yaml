scenarios:
  downside:
    description: pilot 转 production 更慢，而且 rollout 更依赖深度集成，结果公司跑不到第 3 年 SOM 路径，现金消耗也仍然偏重。
    y3RevenueK: 1540
    y3EbitdaK: -915
    cashLowPointK: 220
    keyAssumptionChanges:
    - Q4Y3 期末客户数为 30 家，而不是 40 家。
    - 混合 ACV 更接近 $65K，因为多分支扩张来得更晚。
    - 毛利率维持在约 67%，因为服务和支持负担更久都偏重。
  base:
    description: 3 个付费 pilot 在第 2 年转成 12 家 production 机构，公司则在第 3 年退出时，通过创始人主导销售加 1 条新的 PE 平台渠道做到 40 家在线机构。
    y3RevenueK: 1965
    y3EbitdaK: -645.4
    cashLowPointK: 894.4
    keyAssumptionChanges:
    - Q4Y2 做到 12 家在线客户，Q4Y3 做到 40 家，与计划中的 SOM 里程碑路径一致。
    - 入门 ACV 从约 $60K 起步，老账户再扩到年化 $72K+ 的混合收入基线。
    - 毛利率守在 70% 目标，因为实施仍以 overlay 优先，而不是被定制集成拖着走。
  upside:
    description: pilot 转 production 的转化始终高于目标，且首个 PE 平台交易更早扩张，让公司在不显著增加人头的情况下跑赢基准计划。
    y3RevenueK: 2410
    y3EbitdaK: -330
    cashLowPointK: 1180
    keyAssumptionChanges:
    - Q4Y3 期末客户数为 45 家，而不是 40 家。
    - 成熟账户会更快向商业计划里 $60K-$150K 预算区间的上沿扩张。
    - 随着 onboarding 模板和规则库更可复用，毛利率提升到 72%。
