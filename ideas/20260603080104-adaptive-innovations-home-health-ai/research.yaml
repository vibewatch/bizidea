      rationale: "Agency buyers are fragmented but ROI-sensitive; they can stay manual or lean on incumbent suites unless the startup proves faster referral conversion and lower admin load."
      sourceRefs: [13, 14, 30]
    threatOfEntrants:
      score: 3
      rationale: "AI tooling and OCR are broadly available, yet compliance knowledge, branch-specific operations data, and EHR integration create meaningful execution barriers."
      sourceRefs: [29, 34, 36]
    threatOfSubstitutes:
      score: 4
      rationale: "The default substitute remains manual intake teams supported by incumbent EHRs and referral portals, so the startup must beat a familiar workflow rather than an empty white space."
      sourceRefs: [14, 31, 38]
    competitiveRivalry:
      score: 4
      rationale: "Rivalry is already strong across home health suites and referral-management vendors, even if few players focus tightly on pre-acceptance conversion."
      sourceRefs: [30, 32, 34, 36, 38]
