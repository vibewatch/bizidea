      sourceRefs: [27, 34]
  adoptionFrictionMatrix:
    - friction: Change management across branches with different acceptance rules
      severity: high
      affectedBuyer: COO or regional operations leader
      mitigation: "Start as an overlay on existing fax/email/portal intake flows and encode branch rules incrementally."
      sourceRefs: [14, 34]
    - friction: Integration anxiety with incumbent EHRs
      severity: high
      affectedBuyer: IT and operations leadership
      mitigation: "Prove value before deep integration, then map accepted referrals into the existing system of record."
      sourceRefs: [30, 34, 36, 38]
    - friction: Data trust on AI-extracted referral packets
      severity: medium
      affectedBuyer: Intake managers and QA leads
      mitigation: "Use human-in-the-loop review for high-risk fields and log every acceptance recommendation."
      sourceRefs: [31, 32, 34]
    - friction: Budget competition during reimbursement pressure
      severity: medium
      affectedBuyer: CFO and COO
      mitigation: "Sell against recovered starts of care and reduced intake labor, not generic AI productivity."
      sourceRefs: [4, 12, 13]
market:
  tam:
    value: "$137.7M"
    rationale: "Bottom-up estimate: 11,474 Medicare-certified HHAs [6] x 20% estimated fit for independent or PE-backed multi-branch agencies resembling the beachhead x estimated $60k annual category spend for referral-conversion workflow software = about $137.7M."
    isEstimate: true
    sourceRefs: [6, 39]
  sam:
    value: "$24.8M"
    rationale: "Regional SAM assumes roughly 18% of national targetable agencies sit in Texas and neighboring states, yielding about 413 target accounts x $60k estimated annual category spend."
    isEstimate: true
    sourceRefs: [1, 6]
  som:
    value: "$2.6M"
    rationale: "Year-3 SOM assumes 40 live customers at an estimated $65k blended annual contract value, which is reachable if the product becomes the intake overlay for a small set of regional operators and PE platforms."
    isEstimate: true
    sourceRefs: [13, 40]
