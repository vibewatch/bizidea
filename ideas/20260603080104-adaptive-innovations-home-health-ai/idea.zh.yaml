topRisks:
- name: 工作流集成阻力
  description: 如果新 intake 层要在分支和现有软件之间推动太多变更管理，机构可能不愿采用。
  mitigation: 先从轻量 intake overlay 起步，直接吃传真、邮件和导出的转介材料包，再逐步做更深的系统集成。
- name: 结果归因不清
  description: 医院和机构可能会互相甩锅，把未能按时开案的责任推给对方，早期销售阶段会更难算清 ROI。
  mitigation: 从第一天起就埋点接收时长、拒绝原因和 start-of-care 完成率，让试点能清楚证明收入和服务影响。
- name: 现有厂商快速补功能
  description: 一旦这个品类跑出来，现有居家健康软件厂商可能会补上轻量 AI intake 功能。
  mitigation: 把重心放在接单前工作流和分支级运营 intelligence 上——这些正是 incumbents 缺的——再用多分支 benchmark 和并购整合 playbook 把护城河继续做深。
