jobsToBeDone:
- job: 当医院在临近下班时给我们发来一笔复杂转介，请帮团队迅速判断能不能接、还缺什么，好让我们在竞争对手抢走患者前启动服务。
  currentAlternative: 给各分支打电话、手工查 payer 规则，再用表格分拣材料
  successMetric: 从转介到接收的时长，以及原本会被拒病例的接收率
