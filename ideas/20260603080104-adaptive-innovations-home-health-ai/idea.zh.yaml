differentiator: 大多数居家健康软件，卖点都发生在机构已经决定接患者之后——做记录、计费或文档。这个项目要拿下的，是“接不接”之前那段决策窗口。经济价值也恰恰在这里最厚，因为每救回一笔转介，收入会立刻增加，医院信任也会同步加深。这样的护城河，比再做一个通用医疗 AI 助手更硬：系统会持续积累分支层面的接收逻辑、payer 细节、staffing 约束和 QA 结果，时间越久，路由和定价越准。以后如果它还能承接并购整合，就会变成碎片化区域机构的半个操作系统、半个网络骨架。
