problem: 区域型居家健康机构丢收入，也丢医院信任，原因不是没需求，而是处理复杂转介的速度不够快：资格核验、匹配合适临床人员、补齐 charting、按时开案，任何一环慢下来都可能掉单。最难啃的那批转介——多支付方、非 Medicare、下班后进来的、或临床上更复杂的病例——经常被拒，不是因为真的没有护士，而是因为协同成本太高，接了不划算。结果就是出院团队四处救火，患者在家里等得更久，机构明明看得到市场需求，在服患者规模却上不去。
targetUser:
  primary: 区域型居家健康机构里，负责多分支转介 intake 和开案 staffing 的运营负责人
  secondary: 医院和医疗系统里的出院协调团队，他们需要一条可靠路径，把难安置的居家健康转介送出去
  buyer: 独立或 PE 支持的居家健康机构里的 COO 或运营副总裁
startupThesis:
  nonObviousInsight: 居家健康的瓶颈，与其说卡在临床人数，不如说卡在机构能不能用合算的方式，把一团乱的转介转成合规的开案服务。只要 AI 能把 intake、资格核验、排班、chart 准备和 QA 压进一条工作流，赢面最大的就不会是另一个环境式记录工具，而是那个能把过去被拒的转介也跑通、还跑出利润的系统。
  beachhead: 德州及周边州的独立居家健康机构，分支机构 5-20 家，Medicare 与商业保险 payer 混合，而且医院转介经常在下班后涌入
  wedge: 一套转介转化软件：吃进出院材料包，核验 coverage，生成临床可直接开工的 start-of-care 任务草稿，匹配 staffing，并在机构接单前先把 QA 风险挑出来
  whyNowCatalyst: Adaptive Innovations 的规模和融资已经说明，AI 原生的后台压缩能力足够把协同成本很高的居家健康转介变成真实服务。对那些正在被更快运营商抢走单量的传统机构来说，窗口已经很紧。
  ventureScalePath: 先从转介转化这一层切入，随后扩到分支 staffing 优化、编码 QA、并购机构整合、payer 表现分析，最终做成一张网络，把难安置患者路由给最合适的服务商。
solution: 产品卡在转介 intake 和正式开案之间。它从传真材料包、门户导出文件或 EHR 生成的出院摘要里拉取结构化与非结构化数据；核验 payer 资格和分支规则；推荐最合适的临床人员与上门时间窗；并在员工真正接手前，把缺失项标出来，先拼出一条 start-of-care 工作队列草稿。对机构来说，第一层价值很直接：不用加 intake 人头，也不用拿不完整的 charting 去透支临床团队，就能多接利润更好的转介。往后走，系统会逐渐学会哪些 case 容易 QA 不过、容易延迟、或容易被分支拒掉，让运营团队更早介入，守住医院关系。再往后，同一套流程还可以把并购整合标准化——新收进来的机构第一天就接入同一套 intake 和 QA 引擎。
goToMarketSeed:
  firstCustomer: 位于德州的居家健康机构，拥有 100-500 名临床人员、至少 3 家主要医院转介伙伴，而且晚间和周末转介积压明显
  buyingTrigger: 新医院合作、分支扩张，或拒单突然攀升，把慢 intake 和排班导致的在服患者流失直接暴露出来
  currentAlternative: 人工 intake 协调员配合传真队列、表格、电话、分支自定义规则，以及传统居家健康软件硬撑
  switchingReason: 这个切口能让机构更快对更难的转介说“能接”，同时减少文档返工；它带来的不是让现有人手只快一点点，而是直接抬高在服患者规模、守住转介关系。
  pricingHypothesis: 按分支收平台费，再按每笔接收转介或每次 start of care 收 usage fee
