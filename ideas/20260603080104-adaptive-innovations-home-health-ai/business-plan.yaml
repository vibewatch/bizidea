slug: home-health-referral-conversion
date: '2026-06-03'
executiveSummary: >-
  This company should start as a vendor-neutral referral conversion layer for regional home health agencies that lose census on
  high-friction referrals before care even starts. The best first customer is a Texas-based independent or PE-backed agency with
  5-20 branches, 100-500 clinicians, multiple hospital referral partners, and a visible backlog of evening, weekend, or mixed-payer
  referrals that staff cannot clear fast enough. The product wedge is intentionally narrow: ingest discharge packets, verify
  coverage and service-area fit, encode branch acceptance rules, recommend staffing, and generate a clinician-ready start-of-care
  work queue before the agency accepts the patient. That scope matches the buying trigger because operators act when declined
  referrals, branch expansion, or a new hospital relationship expose lost revenue and response-time risk. The strongest strategic
  advantage is not generic OCR; it is accumulating branch-level accept-decline logic, payer nuances, missing-document patterns, and
  downstream QA outcomes that incumbents and manual teams do not centralize today. Product sequencing should stay disciplined by
  proving an overlay deployment on fax, email, and referral-portal exports before deeper EHR integrations, broader staffing
  optimization, or payer-performance products. Public market sizing and pricing data are still modeled rather than transaction-backed,
  and the biggest open question is whether agencies will buy a standalone overlay fast enough to support repeatable ACVs. The first
  12 months therefore need customer-owned proof on acceptance-rate lift, referral-to-decision time, pilot-to-production conversion,
  and implementation burden.
problem:
  - Agencies lose profitable starts of care because complex referrals require manual coverage checks, branch-specific rule lookups, staffing calls, and chart-prep rework before anyone can say yes.
  - Hospitals and discharge teams remember slow or inconsistent response times, so agencies risk both immediate census loss and long-term referral share when after-hours or mixed-payer cases stall.
solution:
  - Deploy an intake overlay that parses faxed or exported referral packets, verifies payer and geography fit, flags missing documentation, and recommends whether a branch can accept the case.
  - Turn accepted cases into clinician-ready work queues with staffing recommendations, audit logs, and QA-risk flags so agencies can start care faster without adding proportional intake headcount.
whyWeWin:
  - The company owns the highest-value decision window before admission, where one recovered referral creates revenue immediately and where incumbent suites are less specialized.
  - Each deployment compounds proprietary data on branch rules, payer exceptions, decline reasons, response times, and downstream QA outcomes, creating a workflow moat that point AI features are unlikely to match quickly.
strategicChoices:
  beachhead: Independent and PE-backed home health agencies in Texas and neighboring states with 5-20 branches, mixed Medicare and commercial payer volume, and hospital referrals that arrive after business hours.
  wedgeRationale: >-
    This entry point creates faster proof than selling a full agency operating system because the buyer already feels the pain in
    referral rejection, response time, and census leakage today. A narrow pre-acceptance overlay can show value in weeks on
    acceptance rate, time to decision, and saved coordinator effort without asking the agency to replace its EHR or billing stack.
  sequencingRationale: >-
    The company should first win with packet ingestion, branch rule encoding, coverage verification, staffing fit, and work queues
    because those are the minimum features needed to convert hard referrals into starts of care. Only after 3-5 production accounts
    prove repeatable ROI should the roadmap add deeper EHR integrations, QA benchmarking, M&A integration tooling, and broader
    network routing; otherwise implementation complexity and adjacent use cases will outrun evidence.
  notYet:
    - Replacing the core home health EHR or revenue-cycle system
    - Selling directly to hospitals as the primary buyer before agency-side proof exists
    - Building a nationwide referral-routing marketplace before branch-level acceptance logic is reliable
    - Expanding into generalized home care or hospice workflows in the first year
market:
  tam: "$137.7M estimated TAM based on 11,474 Medicare-certified HHAs, an estimated 20% fit for the target segment, and roughly $60k annual software spend per target account."
  sam: "$24.8M estimated SAM for Texas and neighboring states using the researched regional concentration and the same modeled category spend."
  som: "$2.6M estimated year-3 SOM based on 40 live customers at roughly $65k blended annual contract value."
  segments:
    - Regional independent and PE-backed home health agencies with multi-branch intake operations
    - Multi-agency platforms and referral-network partners as secondary expansion paths after beachhead proof
  buyingProcess: >-
    The champion is usually a COO, VP of Operations, or regional operations leader who owns intake throughput and branch staffing,
    while intake managers and QA leads shape requirements. Deals should start when a hospital relationship, branch launch, or
    decline-rate spike makes lost referrals visible, with a paid pilot on a limited branch set before annual rollout.
product:
  mvp: >-
    MVP is a thin intake overlay for fax, email, and portal-export referrals that extracts packet data, checks payer and branch-fit
    rules, highlights missing items, recommends staffing, and creates an auditable acceptance work queue. It should prove that one
    agency can accept more hard referrals and cut referral-to-decision time without replacing its system of record.
  sixMonth: >-
    Launch 2-3 paid pilots with packet ingestion, branch rules, coverage and geography checks, staffing recommendations, exception
    queues, and dashboards for acceptance rate, response time, and reasons for decline.
  twelveMonth: >-
    Convert at least 3 pilots to production, add repeatable connectors into the most common referral sources and EHR export flows,
    and introduce QA-risk prediction tied to missing-document and start-of-care completion outcomes.
  twentyFourMonth: >-
    Expand into multi-branch benchmarks, acquired-agency onboarding templates, and payer-performance analytics after the company has
    enough production data to standardize cross-branch acceptance logic credibly.
  keyBets:
    - Agencies can improve acceptance rates materially before solving the full clinician-supply problem if the product removes coordination bottlenecks first.
    - Buyers will approve an overlay deployment that works on existing referral inputs faster than they will approve a core-platform replacement.
    - Branch-specific rules and decline-outcome data will become more defensible than generic AI extraction features.
    - QA-risk prediction tied to intake decisions will increase retention and expansion more than stand-alone document automation.
gtm:
  wedge: Sell a referral conversion overlay that helps agencies say yes to hard referrals faster rather than pitching a generic AI assistant or a replacement EHR.
  channels:
    - Founder-led direct sales to COOs and VP Operations at regional agencies
    - Warm introductions through PE-backed home health platforms and operating partners
    - Hospital discharge and referral-network influencers once the first agency case study proves faster response on hard-to-place patients
  funnelTargets: "Lead→qualified pilot 20-30%, qualified pilot→paid pilot 30-40%, paid pilot→production 60%+, production account→multi-branch expansion within 12 months in 50%+ of converted customers."
  pricing: >-
    Start with a paid pilot for 2-5 branches, then convert to an annual subscription priced per active branch with a usage fee per
    accepted referral or start of care processed through the platform. This matches buyer economics because operators are paying for
    recovered census and lower coordination cost on live workflows, not for user seats.
businessModel:
  revenueStreams:
    - Annual branch-based software subscription
    - Usage fees per accepted referral or staffed start of care
    - One-time implementation and branch-rule configuration fees
    - Premium benchmarking and acquired-agency onboarding modules
  unitOfValue: Accepted referral converted into a staffed, compliant start of care, anchored by branch subscription
  targetGrossMarginPct: 70
  expansionLevers:
    - Add branches within the same agency after pilot proof
    - Roll up to PE-backed multi-agency portfolios with standardized intake workflows
    - Add QA benchmarking and payer-performance analytics once outcome data accumulates
    - Add acquired-agency integration tooling for customers pursuing M&A
strategyMap:
  northStarMetric: Percent of targeted hard referrals converted into staffed starts of care within 48 hours
  inputMetrics:
    - Referral-to-decision median hours
    - Acceptance rate for evening, weekend, or mixed-payer referrals
    - Percent of packets requiring manual document chase after first AI pass
    - Pilot branch coordinator hours saved per accepted referral
    - Paid pilot to annual production conversion rate
  moatsToBuild:
    - Branch-level acceptance-rule and decline-reason dataset across payers, geographies, and acuity profiles
    - Feedback loop linking intake decisions to QA defects, delayed starts, and downstream care outcomes
    - Reusable integration and onboarding playbooks for fragmented regional agencies and acquired branches
    - Benchmark data on response time and referral conversion performance across agencies
  killCriteria:
    - If the first 3 design-partner agencies cannot provide enough referral-status data to baseline decline reasons and response times within 45 days, the standalone overlay thesis is too hard to operationalize.
    - If paid pilots do not improve acceptance of targeted hard referrals by at least 15% or reduce referral-to-decision time by at least 30% versus baseline, the wedge is not strong enough for premium pricing.
    - If fewer than half of paid pilots convert to annual production after measurable ROI proof, budget ownership is too weak for venture-scale growth.
  mermaid: |
    flowchart LR
      Wedge[Referral conversion wedge] --> MVP[Overlay intake MVP]
      MVP --> Proof[Acceptance and response-time proof]
      Proof --> Expansion[Multi-branch benchmarks and portfolio expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: High pain and a coherent wedge justify a partner meeting, but conviction stays moderate until one agency proves a standalone overlay can convert to annual budget.
    whyBelieve: The company targets a severe, measurable bottleneck where agencies lose revenue before admission and can prove value on short-cycle operational metrics without waiting for long-term clinical outcomes.
    whyDoubt: Incumbent systems, manual workflows, and clinician-supply constraints may blunt willingness to buy a new overlay even if the operational pain is real.
    nextDiligence: Validate one live multi-branch pilot that shows customer-owned acceptance-rate lift, materially faster decisions, and a credible annual rollout path.
  firstCustomer:
    title: COO or VP of Operations at a Texas multi-branch home health agency
    profile: Operates 5-20 branches with 100-500 clinicians, receives frequent hospital referrals across mixed payers, and still coordinates intake through fax queues, spreadsheets, and branch phone calls.
    trigger: A new hospital relationship, branch expansion, or visible spike in declined evening and weekend referrals that exposes lost census and referral-share risk.
    buyer: COO or VP of Operations
    initialContract: "$25K-$50K paid pilot for 2-5 branches, converting to roughly $60K-$150K ARR plus usage fees if the agency rolls the workflow across branches and referral sources."
  mustBeTrue:
    - The first 5 target agencies must show a material share of declined referrals are caused by intake and documentation friction rather than clinician scarcity alone.
    - A thin overlay must go live on existing fax, email, or portal-export workflows without requiring a multi-quarter EHR integration project.
    - Paid pilots must raise hard-referral acceptance or reduce referral-to-decision time enough for operators to fund an annual contract from operating budget.
    - Buyers must prefer a vendor-neutral pre-acceptance layer over waiting for incumbent EHR suites to add similar features.
    - Branch-rule, payer, and QA outcome data must compound into better decisioning and expansion, or the product will collapse into a lower-value automation tool.
  diligenceQuestions:
    - What percentage of current declines at target agencies are driven by documentation, payer, and coordination issues versus pure clinician capacity?
    - Which branch-specific acceptance rules are still tribal knowledge rather than codified in incumbent systems?
    - How many weeks of implementation work will buyers tolerate before demanding native EHR integration?
    - What proof threshold converts a pilot from innovation budget to recurring operating budget?
    - How exposed is the wedge if WellSky or major EHR vendors add basic AI intake automation in the next 12 months?
operatingAssumptions:
  - assumption: A meaningful share of rejected referrals in the beachhead segment can be recovered through better intake coordination before additional clinician hiring is required.
    basis: research.yaml
    validationTest: Collect 90 days of referral-status exports from 3 pilot agencies and verify that at least 25% of targeted declines are tagged as documentation, payer, service-area, or coordination failures rather than no-clinician-available.
    decisionImpact: If false, the product must reposition toward staffing optimization or narrow to agencies with clearer coordination-driven leakage.
  - assumption: Buyers will accept an overlay that starts with fax, email, and portal exports before full EHR integration.
    basis: idea.yaml
    validationTest: In 10 qualified discovery calls, secure at least 5 buyer commitments to pilot without requiring native write-back into the core EHR on day one.
    decisionImpact: If false, implementation cost rises sharply and the roadmap must prioritize fewer EHR-specific integrations over rapid pilot volume.
  - assumption: A per-branch plus usage pricing model can fit inside the researched category spend and still feel ROI-positive to operators.
    basis: research.yaml
    validationTest: Test 3 pricing packages during pilot proposals and require at least 4 qualified buyers to accept a path to $60K-$150K annual spend if acceptance metrics improve.
    decisionImpact: If false, ACV and margin expectations fall and the company may need to rely more on services or enterprise portfolio deals.
  - assumption: Branch-specific acceptance rules and QA outcomes are not already captured well enough by incumbent suites to erase the startup's wedge.
    basis: operator judgment
    validationTest: During 5 implementation scoping sessions, map existing incumbent workflows and confirm operators still rely on manual spreadsheets, calls, or undocumented branch rules for key acceptance decisions.
    decisionImpact: If false, the company must differentiate through faster deployment or shift upmarket toward benchmark analytics rather than workflow ownership.
  - assumption: PE-backed platforms can become a scalable second channel once one agency case study exists.
    basis: idea.yaml
    validationTest: After the first production case study, secure at least 3 platform-level meetings and one signed portfolio pilot within 6 months.
    decisionImpact: If false, distribution remains fully founder-led and growth assumptions should be reset around slower direct sales.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 COOs, intake leaders, and branch directors at Texas and neighboring-state agencies in the beachhead segment.
    hypothesis: Buyers will describe the same urgent failure mode around after-hours, mixed-payer, and documentation-heavy referrals.
    successMetric: At least 10 interviews confirm a shared buying trigger and 5 provide sample decline-reason or response-time data.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run 2 concierge referral-conversion assessments using historical packet samples and manual rule encoding before full product automation.
    hypothesis: Even a semi-manual workflow can surface enough recoverable referrals to justify a paid pilot.
    successMetric: Two agencies receive quantified baseline estimates for acceptance lift and sign pilot scoping documents.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Ship the first overlay MVP for 2-5 branches with packet ingestion, branch rules, coverage checks, exception queues, and audit logs.
    hypothesis: The product can go live in under 8 weeks without replacing the system of record.
    successMetric: First paid pilot live within 8 weeks and reporting complete enough to track weekly acceptance rate, median decision time, and top decline reasons.
    owner: Product and implementation lead
  - horizon: 90–180 days
    experiment: Test pilot packaging against annual branch subscription and usage pricing with at least 3 qualified buyers.
    hypothesis: Buyers will fund a defined pilot more readily than an open-ended services engagement and will accept the conversion pricing logic if ROI is explicit.
    successMetric: At least 2 paid pilots signed and one buyer pre-approves an annual pricing framework pending KPI hit.
    owner: CEO founder
  - horizon: 180–360 days
    experiment: Add QA-risk prediction and compare pilot renewals between agencies using only intake automation and agencies using intake plus QA risk scoring.
    hypothesis: Linking acceptance decisions to downstream QA outcomes increases retention and expansion.
    successMetric: At least 2 customers cite QA-risk reporting in renewal or expansion decisions.
    owner: Product lead
  - horizon: 180–540 days
    experiment: Launch one PE platform or referral-network co-sell motion after the first production case study.
    hypothesis: A distribution partner can shorten sales cycles once the company shows credible branch-level ROI.
    successMetric: Partner-sourced opportunities reach at least 20% of qualified pipeline and produce one signed pilot.
    owner: Strategic partnerships lead
operations:
  - Standardize onboarding around a limited branch set, explicit decline-reason taxonomy, and weekly KPI reviews before promising system-wide rollout.
  - Maintain audit logs, human review for high-risk fields, and survey-ready documentation because acceptance decisions intersect with CMS capacity and quality expectations.
  - Build coexistence with incumbent EHRs and referral networks as a core operating discipline rather than a later integration project.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Owns founder-led sales, pilot design, pricing, and PE or hospital relationship development while the motion is still discovery-heavy.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds packet ingestion, rules engine, audit logging, and the first integrations that determine deployment speed and product credibility.
  - role: Product and implementation lead
    startTiming: Month 2
    rationale: Encodes branch workflows, shortens pilot onboarding, and translates customer operations into repeatable deployment playbooks.
  - role: Clinical informatics and QA advisor
    startTiming: Month 3
    rationale: Ensures acceptance recommendations, documentation checks, and QA-risk logic map cleanly into compliance and start-of-care workflows.
  - role: Strategic account executive
    startTiming: Month 9
    rationale: Adds sales capacity only after the company has one repeatable pilot case study and a documented rollout process.
milestones:
  - horizon: 0–12 months
    items:
      - Complete 15-20 buyer interviews and 2 concierge assessments that quantify referral leakage by decline reason.
      - Launch 2-3 paid pilots covering 2-5 branches each and prove baseline reporting on acceptance rate, response time, and reasons for decline.
      - Convert at least 3 pilots or design partners into production deployments with annual pricing frameworks.
  - horizon: 12–24 months
    items:
      - Reach 10-15 production agencies with repeatable onboarding on common referral inputs and at least one incumbent coexistence playbook.
      - Release cross-branch benchmark reporting and QA-risk prediction tied to downstream start-of-care and documentation outcomes.
      - Win the first PE platform or multi-agency rollout and use it to standardize acquired-branch onboarding.
  - horizon: 24–36 months
    items:
      - Reach the researched year-3 SOM path of roughly 40 live customers and prove multi-branch expansion inside converted accounts.
      - Add payer-performance analytics and acquired-agency integration modules without becoming a replacement EHR.
      - Decide whether benchmark density and channel leverage justify a broader referral-routing network strategy.
risks:
  - risk: Buyers may resist a new intake layer if branch workflow change management is too heavy.
    likelihood: Medium
    impact: High
    mitigation: Start as an overlay on existing referral inputs, limit pilots to a small branch set, and measure time-to-live as a core product KPI.
  - risk: Clinician supply constraints may dominate outcomes and hide the value of intake automation.
    likelihood: Medium
    impact: High
    mitigation: Target agencies where decline data shows coordination friction is material and report staffing-related versus documentation-related decline reasons separately.
  - risk: AI extraction errors or opaque recommendations could create compliance distrust with intake and QA teams.
    likelihood: Medium
    impact: High
    mitigation: Keep humans in the loop for high-risk fields, log every recommendation, and tie model outputs to auditable branch rules.
  - risk: Incumbent EHR and referral-management vendors may add enough AI intake functionality to compress differentiation.
    likelihood: High
    impact: Medium
    mitigation: Differentiate on vendor-neutral deployment speed, branch-specific acceptance logic, and cross-agency benchmark data rather than generic extraction.
  - risk: Standalone software budget may be hard to win under reimbursement pressure.
    likelihood: Medium
    impact: Medium
    mitigation: Price against recovered starts of care, use short paid pilots with explicit ROI scorecards, and pursue portfolio rollouts where standardization value is higher.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Build the overlay MVP, prove 2-3 paid pilots, harden compliance and integration foundations, and reach the first repeatable production rollouts in the Texas beachhead.
