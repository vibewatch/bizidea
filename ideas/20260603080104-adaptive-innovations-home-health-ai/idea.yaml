differentiator: >-
  Most home health software vendors sell record-keeping, billing, or documentation tools after an agency has already decided to take a patient. This company would own the decision window before acceptance, where the economic value is highest because every recovered referral immediately adds revenue and deepens hospital trust. That creates a better moat than another generic healthcare AI assistant: the system accumulates branch-level acceptance logic, payer nuances, staffing constraints, and QA outcomes that improve routing and pricing over time. If it later powers acquisition integrations, the company becomes part operating system and part network spine for fragmented regional agencies.
