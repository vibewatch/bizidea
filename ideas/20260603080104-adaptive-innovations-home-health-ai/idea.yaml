problem: >-
  Regional home health agencies lose revenue and hospital trust because they cannot process complicated referrals fast enough to verify eligibility, assign the right clinician, prepare charting, and start care on time. The highest-friction cases—multi-payer, non-Medicare, after-hours, or clinically complex referrals—often get declined not because no nurse exists, but because the coordination burden makes the case uneconomic. That leaves discharge teams scrambling, patients waiting longer at home, and agencies stuck with stagnant census despite clear market demand.
targetUser:
  primary: Operations leaders at regional home health agencies managing referral intake and start-of-care staffing across multiple branches
  secondary: Hospital and health-system discharge teams that need a reliable path for hard-to-place home health referrals
  buyer: COO or VP of Operations at an independent or PE-backed home health agency
startupThesis:
  nonObviousInsight: Home health capacity is constrained less by raw clinician headcount than by whether an agency can economically convert messy referrals into compliant starts of care. Once AI can compress intake, eligibility, scheduling, chart prep, and QA into one workflow, the winning company is not another ambient scribe vendor; it is the system that makes previously rejected referrals operable and profitable.
  beachhead: Independent home health agencies in Texas and neighboring states with 5-20 branches, mixed Medicare and commercial payer volume, and frequent hospital referrals that arrive after business hours
  wedge: Referral conversion software that ingests discharge packets, verifies coverage, drafts clinician-ready start-of-care tasks, matches staffing, and flags QA risk before the agency accepts the patient
  whyNowCatalyst: Adaptive Innovations' scale and funding show that AI-native back-office compression is already good enough to turn coordination-heavy home health referrals into real visits, creating urgency for legacy agencies that are losing volume to faster operators.
  ventureScalePath: Start as the operating layer for referral conversion, then expand into branch staffing optimization, coding QA, M&A integration for acquired agencies, payer-performance analytics, and eventually a network that routes hard-to-place patients to the best-fit provider.
solution: >-
  The product sits between referral intake and start of care. It pulls structured and unstructured data from faxed packets, portal exports, or EHR-generated discharge summaries; checks payer eligibility and branch rules; recommends the right clinician and visit window; and assembles a draft start-of-care work queue with missing items highlighted before staff touch the case. For agencies, the first value is simple: accept more profitable referrals without adding intake headcount or burning out clinicians with incomplete charting. Over time, the system learns which cases are likely to fail QA, get delayed, or be rejected by a branch, letting operators intervene earlier and protect hospital relationships. The same workflow can later standardize acquisitions by giving newly purchased agencies a common intake and QA engine on day one.
goToMarketSeed:
  firstCustomer: Texas-based home health agencies with 100-500 clinicians, at least three major hospital referral partners, and a visible backlog of evening and weekend referrals
  buyingTrigger: A new hospital partnership, branch expansion, or spike in declined referrals that exposes how much census is being lost to slow intake and scheduling
  currentAlternative: Manual intake coordinators using fax queues, spreadsheets, phone calls, branch-specific rules, and legacy home health software
  switchingReason: The wedge helps agencies say yes to harder referrals faster while reducing documentation rework, which directly grows census and protects referral relationships instead of just making existing staff slightly more efficient
  pricingHypothesis: Platform fee per branch plus usage-based pricing per accepted referral or start of care
