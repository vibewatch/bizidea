jobsToBeDone:
  - job: When a hospital sends us a complicated referral near the end of the day, help my team decide quickly whether we can accept it and what is missing, so we can start care before a competitor wins the patient.
    currentAlternative: Calling branches, checking payer rules manually, and triaging paperwork in spreadsheets
    successMetric: Referral-to-acceptance time and acceptance rate for previously declined cases
  - job: When we expand into new branches or acquire an agency, help us standardize intake and QA workflows, so we can grow census without hiring a proportional amount of back-office staff.
    currentAlternative: Branch-specific SOPs inside legacy home health software and manual training
    successMetric: Accepted referrals per intake coordinator and QA defect rate
