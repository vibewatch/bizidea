topRisks:
  - name: Workflow integration drag
    description: Agencies may resist adopting a new intake layer if it requires too much change management across branches and existing software.
    mitigation: Start with a thin intake-overlay product that works from fax, email, and exported referral packets before deeper system integrations.
  - name: Outcome ownership ambiguity
    description: Hospitals and agencies may blame each other for missed starts of care, making ROI attribution harder during early sales cycles.
    mitigation: Instrument acceptance time, rejection reason, and start-of-care completion metrics from day one so pilots prove the revenue and service impact clearly.
  - name: Incumbent feature catch-up
    description: Existing home health software vendors could add lightweight AI intake features once the category becomes visible.
    mitigation: Focus on the pre-acceptance workflow and branch-level operating intelligence that incumbents lack, then deepen the moat through multi-branch benchmarks and acquisition integration playbooks.
