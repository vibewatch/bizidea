scenarios:
  downside:
    description: 经纪人渠道爬坡滞后，迁移转订阅转化率接近业务计划退出标准下限，更多薪资清理工作仍需人工处理。
    y3RevenueK: 1050.0
    y3EbitdaK: -610.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - 第三年 Q4 活跃付费雇主约 24 家，而非 34 家。
      - 经常性订阅定价接近 $12K-$30K 区间的低端。
      - 模板复用慢于计划，毛利率停滞在 60% 中段。
  base:
    description: 第一年三个付费试点形成经纪人辅助的扩张路径，第三年末经常性行政管理收入开始超越一次性迁移收入。
    y3RevenueK: 1460.0
    y3EbitdaK: -324.2
    cashLowPointK: 559.3
    keyAssumptionChanges:
      - 活跃付费雇主 M12 达 3 家，Y2 Q4 达 12 家，Y3 Q4 达 34 家。
      - 经常性订阅 ARPU 成熟至每家在役雇主约 $24K ARR。
      - 薪资和供应商映射标准化后，毛利率在 Y3 Q4 达约 72%。
  upside:
    description: 经纪人和薪资转介更早见效，经常性转化更强，实施人工下降快于预期。
    y3RevenueK: 1820.0
    y3EbitdaK: -120.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - 第三年 Q4 活跃付费雇主约 40 家，而非 34 家。
      - 更大比例的雇主在上线后一个季度内转为经常性行政管理。
      - 定制迁移工作下降更快，毛利率在第三年末达 70% 中段。
sensitivity:
  - variable: ARPU
    downsideCase: 经常性订阅价值稳定在每家雇主约 $20K ARR。
    baseCase: 经常性订阅价值成熟至每家雇主约 $24K ARR。
    upsideCase: 经纪人席位和合规模块将成熟 ARR 推高至每家雇主约 $28K。
    y3RevenueImpactK: -190.0
    cashImpactK: -150.0
  - variable: CAC
    downsideCase: 合作伙伴来源管道表现不佳，CAC 升至约 $35K。
    baseCase: 创始人主导和渠道主导动作分担压力，CAC 维持在约 $27.8K。
    upsideCase: 经纪人转介占更大管道份额，CAC 降至约 $22K。
    y3RevenueImpactK: -80.0
    cashImpactK: -220.0
  - variable: 客户流失率
    downsideCase: 迁移事件结束后月度流失率升至约 2.0%。
    baseCase: 雇主采用经常性行政管理工作流后月度流失率维持在约 1.3%。
    upsideCase: 薪资和合规工作流嵌入后月度流失率降至约 0.8%。
    y3RevenueImpactK: -110.0
    cashImpactK: -90.0
  - variable: 销售周期
    downsideCase: 付费迁移项目关单和转化超过 150 天。
    baseCase: 首个企业销售周期约为一个续约季加实施规划时间。
    upsideCase: 经纪人背书交易随模板和参考客户积累压缩至约 90 天。
    y3RevenueImpactK: -240.0
    cashImpactK: -180.0
  - variable: 毛利率
    downsideCase: 人工薪资清理持续，第三年末毛利率约 66%。
    baseCase: 首批模板可复用后，第三年末毛利率约 72%。
    upsideCase: 迁移进一步标准化，第三年末毛利率约 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
  - variable: 招聘节奏
    downsideCase: 第二工程师提前招入，并在转化证明前增加一名运营岗位。
    baseCase: 招聘与业务计划中的交付和模板里程碑挂钩。
    upsideCase: 第二工程师推迟一个季度，不影响客户交付。
    y3RevenueImpactK: 40.0
    cashImpactK: -160.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      RenewalEvents[Renewal and harmonization events] --> PaidMigrations[Paid migration projects]
      PaidMigrations --> LiveEmployers[Live employer admin subscriptions]
      LiveEmployers --> Revenue[Recurring + migration revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准收入由活跃付费雇主从第一年末 3 家增长至第三年 Q4 34 家驱动，组合从一次性迁移向经常性行政管理订阅迁移。
  - checkName: 必须成真的前提
    finding: 公司必须足够快地标准化首批薪资和供应商模板，才能在不增设大型服务团队的情况下将毛利率从第一年中 40% 推至第三年 Q4 约 72%。
  - checkName: 模型失效条件
    finding: 若经纪人渠道停滞且迁移转订阅转化率接近 40% 退出标准底线，悲观情景将把现金底线压至下一轮融资前约 $0.1M。
  - checkName: 下一轮证明
    finding: 下一轮融资故事是第三年 Q2 约 20 家活跃付费雇主、50% 以上经常性转化、合作伙伴来源交易已跑通，且手头仍有六个月以上现金。
sanityChecks:
  ruleOf40: Y3 growth 206.7% + EBITDA margin -22.2% = 184.5%
  burnMultiple: 第二年燃烧乘数约 1.6x——约 $0.8M EBITDA 亏损对应约 $0.5M 新增年化运行率收入；在获得更好转化和利润率之前，模型难以支撑高溢价的下一轮。
  revenuePerFte: 第三年 7 名 FTE 产出 $209K（基准 $200-400K SaaS）
  flags:
    - 混合每家活跃雇主收入偏高，因为 customersEop 同时包含迁移项目和经常性订阅；真实纯订阅 ARR 在第三年末之前低于总报告收入。
    - 基准情景依赖经纪人和薪资渠道在第二年实质性贡献；若主要为直接销售模式，则可能需要降低增长预期或扩大融资规模。
    - 即使团队精简，模型在第三年内仍未达到全年 EBITDA 盈亏平衡，利润率爬坡放缓或提前招聘将推高融资需求。
