slug: belgian-pension-switch-os
date: '2026-06-23'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-23] 运营模型从业务计划日期后的第一个完整月开始。'
  - id: A2
    name: 期初现金 / 种子前融资
    value: $2.4M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP runwayMonths 18] 基准情景采用接近区间下中值的种子前融资，确保有六个月缓冲金额足以支撑至下一里程碑。'
  - id: A3
    name: 起始付费雇主数
    value: '0'
    unit: count
    source: '[BP milestones 0-12 months + BP experimentRoadmap] 公司从零收入起步，必须先将共创客户工作转化为付费迁移。'
  - id: A4
    name: 活跃付费雇主定义
    value: 一家雇主的付费迁移项目或实时经常性行政管理订阅
    unit: definition
    source: '[BP gtm wedge + BP businessModel revenueStreams] customersEop 含任何已为迁移或上线后行政管理付费的雇主。'
  - id: A5
    name: 迁移项目经济模型
    value: 约 3 个月合计 $27.5K（约 $9.2K/月）
    unit: USD / employer
    source: '[BP investorMemo.firstCustomer.initialContract $20k-$35k paid migration project] 模型取区间中值。'
  - id: A6
    name: 经常性订阅经济模型
    value: 成熟期每家在役雇主 ARR $24K
    unit: USD / employer / year
    source: '[BP investorMemo.firstCustomer.initialContract $12k-$30k annual software subscription + Research market.som 700 members × $26/member-year ≈ $18.2K] 基准情景假设适度的最低平台费和超出纯按人数底价的附加项。'
  - id: A7
    name: 客户增长节奏
    value: M12 达 3 家活跃付费雇主，Y2 Q4 达 12 家，Y3 Q4 达 34 家
    unit: customersEop
    source: '[BP milestones + BP gtm.funnelTargets + Research validationSignals around 100 Belgian employer migrations in market] 节奏与第一年三个付费试点及经纪人辅助扩张路径匹配，低于研究中 60 家雇主 SOM 框架。'
  - id: A8
    name: 每家活跃雇主混合实现收入
    value: 第一年迁移期间每家活跃雇主月收入约 $8K-$9.2K；第二年季末运行率暗示每季约 $15.0K、$15.0K、$16.0K、$16.5K；第三年约 $16.0K、$15.5K、$15.4K、$15.0K，随经常性比例上升而趋稳
    unit: USDK / active employer / period
    source: '[A5 + A6 + BP sequencingRationale] 混合每客户收入以迁移为主起步，随着向较低但更黏性的经常性行政管理收入迁移而逐步调整。'
  - id: A9
    name: 毛利率爬坡
    value: 第一年 45%-52%，第二年 58%-65%，第三年 69%-72%
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on template reuse + Research sensitivityCases data-cleanup drag] 映射和手册标准化之前早期部署服务密集。'
  - id: A10
    name: 招聘时间线
    value: M1 创始人/CEO 和创始工程师；M2 养老金运营负责人；M5 解决方案工程师；M9 渠道合作负责人；M16 实施/成功负责人；M25 第二工程师
    unit: timeline
    source: '[BP team startTiming + BP sequencingRationale] 计划只增加将迁移转化为经常性软件收入所需的交付和产品化岗位。'
  - id: A11
    name: 创始人含税薪酬
    value: $150K
    unit: USD / year
    source: '[BP team Founder CEO + startup-finance heuristic] 种子前企业级公司的精简创始人现金薪酬加薪资税。'
  - id: A12
    name: 创始工程师含税薪酬
    value: $180K
    unit: USD / year
    source: '[BP team Founding eng + startup-finance heuristic] 反映高级集成与工作流工程人才。'
  - id: A13
    name: 养老金运营负责人含税薪酬
    value: $140K
    unit: USD / year
    source: '[BP team Pension operations lead + startup-finance heuristic] 该角色承担领域实施知识和合规边缘情形所有权。'
  - id: A14
    name: 解决方案工程师含税薪酬
    value: $130K
    unit: USD / year
    source: '[BP team Solutions engineer + startup-finance heuristic] 涵盖实施所有权，但不假设配备大型服务团队。'
  - id: A15
    name: 渠道合作负责人含税薪酬
    value: $150K
    unit: USD / year
    source: '[BP team Channel partnerships lead + BP gtm.channels + startup-finance heuristic] 含创始人辅助的企业销售和合作伙伴差旅。'
  - id: A16
    name: 实施/成功负责人含税薪酬
    value: $120K
    unit: USD / year
    source: '[BP product.twelveMonth + BP milestones 12-24 months + startup-finance heuristic] 经常性行政管理工作流开始重要时加入。'
  - id: A17
    name: 第二工程师含税薪酬
    value: $170K
    unit: USD / year
    source: '[BP product.twentyFourMonth + startup-finance heuristic] 第二工程师招聘用于扩展可复用工作流和模板深度，而非定制服务。'
  - id: A18
    name: 薪资分配至职能 P&L 线
    value: 创始人 60% S&M / 40% G&A；工程 100% R&D；养老金运营 70% R&D / 30% G&A；解决方案 30% S&M / 70% R&D；渠道负责人 100% S&M；实施 30% S&M / 70% R&D
    unit: allocation
    source: '[BP team rationales + BP operations] 薪资按实际拥有销售、交付和行政管理工作的职能分配。'
  - id: A19
    name: 非薪资运营支出爬坡
    value: 每月非薪资支出起始接近 S&M/R&D/G&A 各约 $4K/$4K/$3K，渠道动作启动后升至约 $6.5K/$5.5K/$4K，第三年末约 $13K/$9.5K/$6.5K
    unit: USDK / month
    source: '[BP operations + startup-finance heuristic] 涵盖云服务、差旅、法务、保险、翻译和雇主支持工具，不假设大规模付费流量获取。'
  - id: A20
    name: 现金转换惯例
    value: 现金变动等于 EBITDA
    unit: formula
    source: '[startup-finance heuristic] 种子前软件阶段假设资本支出、税务、债务服务和营运资金时序可忽略不计。'
  - id: A21
    name: 稳态月度流失率
    value: 1.3%
    unit: percent / month
    source: '[startup-finance heuristic for early workflow SaaS] 合同上线后应具粘性，但事件驱动的买家行为使流失率高于成熟企业软件水平。'
  - id: A22
    name: CAC 惯例
    value: 第二至三年销售与营销支出除以 31 家净新增活跃付费雇主
    unit: formula
    source: '[model calc + BP gtm.funnelTargets] 涵盖创始人主导的直接销售及经纪人和薪资渠道在规模扩张期的投入。'
  - id: A23
    name: 下一轮融资里程碑
    value: 第三年 Q2 约 20 家活跃付费雇主，至少一半已完成迁移转为经常性行政管理，且剩余现金超过 $0.6M（六个月缓冲）
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk runwayMonths 18 + model cash curve] 种子前融资设计为在更广泛扩张招聘之前取得订阅转化证明。'
