    - 23
  headwinds:
  - point: 现有保险公司和薪资服务商已销售行政门户和外包，新入局者仅靠便利性无法胜出。
    sourceRefs:
    - 18
    - 19
    - 20
    - 24
  - point: 转移权利、税务处理和缴费规则使计划比较成为高信任工作流，建模错误有真实法律和预算风险。
    sourceRefs:
    - 17
    - 27
    - 30
  - point: 比利时滩头市场真实存在但较窄，留在国内的公司将很快触顶。
    sourceRefs:
    - 1
    - 2
    - 4
competitors:
- name: Warren
  stage: 成长期
  wedge: 低费率合规 OFP 加员工应用和辅导，以固定会员月费模式销售而非 AUM 收费。
  pricing: 每成员每月固定费 / 固定雇主订阅；关键材料中未披露入场或退出费。
  strength: 最直接的证明——比利时雇主在产品经济性和员工体验同步改善时会迁移。
  weaknessVsUs: 以基金主导而非中立；希望独立基准测试和跨多种供应商结构迁移的买家可能不愿立即绑定 Warren 自有轨道。
  sourceRefs:
  - 12
  - 15
  - 16
- name: OFP Prolocus
  stage: 现有厂商
  wedge: 为佛兰德地方政府建立的职业养老基金，提供 DC、DB、混合型和现金余额型产品。
  pricing: 雇主出资养老结构；无公开软件式定价。
  strength: 证明共同 OFP 行政管理在比利时可行，雇主愿意接受非保险公司的养老基金结构。
  weaknessVsUs: 专注于地方政府和基金运营，而非跨供应商的中立中型私营部门迁移工作流。
  sourceRefs:
  - 21
  - 22
- name: AG Employee Benefits
  stage: 现有厂商
  wedge: 产品优先的团体保险和补充养老金行政管理，提供多种计划结构和员工门户。
  pricing: 报价导向的雇主定价；公开页面强调雇主可控预算，但未披露标准费率。
  strength: 深度分发、广泛的计划设计菜单，以及对大型比利时雇主可信的持续行政管理。
  weaknessVsUs: AG 的工具帮助运营 AG 合同，但雇主变更工作流仍通过客户经理路由，而非中立切换工作台。
  sourceRefs:
  - 19
  - 20
- name: NN Belgium
  stage: 现有厂商
  wedge: 团体保险加 MyWorkplace 门户，用于日常员工福利行政管理。
  pricing: 报价导向定价；未找到公开标准费率卡。
  strength: 安全在线行政管理、更少文书工作，以及已安装的团体保险基础，使 NN 成为偏好单一问责供应商的雇主的可信现有厂商。
  weaknessVsUs: MyWorkplace 是服务门户，而非跨供应商的审计与迁移控制平面。
  sourceRefs:
  - 18
  - 27
- name: SD Worx
  stage: 现有厂商
  wedge: 薪资外包、集成和人员成本工具，掌控养老金切换周围的数据管道。
  pricing: 定制企业/外包定价。
  strength: 拥有薪资信任、集成深度，以及围绕更少错误和更少人工行政管理的清晰 ROI 故事。
  weaknessVsUs: 掌控薪资层，但不具备端到端的养老金比较逻辑、转移权利或供应商迁移工作流。
  sourceRefs:
  - 23
  - 24
regulatoryTechnicalConstraints:
- point: 补充养老金必须由保险公司或养老基金管理，因此初创公司必须与持牌机构集成，而非自行进入资产负债表链。
  sourceRefs:
  - 7
  - 11
- point: DB2P / PensionPro 报告要求干净的组织者、供应商和关联方映射，加上版本化的 schema 支持。
  sourceRefs:
  - 9
  - 10
- point: 蓝领/白领统一化通过 2030 年形成法律项目依赖，可能延迟或重塑雇主的计划变更。
  sourceRefs:
  - 25
  - 26
  - 30
- point: 团体保险比较涉及 8.86% 雇主社会缴费、Wijninckx 缴费、80% 规则和派发税处理，建模错误造成真实的法律和预算风险。
  sourceRefs:
  - 17
  - 30
validationSignals:
- point: FinTech Global 报道，约 100 家比利时企业在 Warren 运营的第一年内已将养老金安排迁移至其平台。
  sourceRefs:
  - 16
- point: Warren 的 Helio 案例研究声称上线六个月后周活跃成员比例达 78%，表明体验简单且有雇主背书时员工会参与。
  sourceRefs:
  - 14
- point: NN 和 SD Worx 明确以低文书工作行政管理、集成和外包为卖点，证实运营简化已有预算支持。
  sourceRefs:
  - 18
  - 23
  - 24
- point: KBC、P&V 和 Test-Aankoop 的详细员工 FAQ 显示，储备可见性、转移选择和税务处理仍是反复出现的痛点。
  sourceRefs:
  - 27
  - 28
  - 29
  - 31
openQuestions:
- 每年有多少 250-3,000 名员工的比利时雇主在强制统一化或企业事件之外实际重新招标其补充养老金供应商？
- 目标市场中有多大比例处于行业计划或其他实质性限制供应商选择的安排中？
- 经纪人会欢迎使其流程更透明的迁移工作台，还是会通过抵制来保护服务密集的经济模式？
- 中立迁移 OS 在打包养老金产品本身或跨境扩张之前，能赢得多大的合同价值？
