  fiveForces:
    supplierPower:
      score: 3
      rationale: 供应商议价能力中等——产品依赖合规养老机构和薪资数据来源，但多种 schema 和保险公司/基金选项防止单一上游供应商完全主导条款。
      sourceRefs:
      - 7
      - 9
      - 10
      - 23
    buyerPower:
      score: 4
      rationale: 买家议价能力高——雇主切换频率低、可拖延行动，且可回退到经纪人、保险公司门户和人工行政管理，而不购买新工作流层。
      sourceRefs:
      - 17
      - 18
      - 25
      - 27
    threatOfEntrants:
      score: 3
      rationale: 新进入者可以快速拼出工作流软件，但养老金规则专业知识、DB2P 数据逻辑和买家信任仍构成不容忽视的进入成本。
      sourceRefs:
      - 9
      - 10
      - 11
      - 30
    threatOfSubstitutes:
      score: 4
      rationale: 替代方案是现有的保险公司合同、经纪人项目管理、薪资行政管理和员工 FAQ 组合——它已经很糟糕地解决了问题，但对许多雇主来说仍然足够。
      sourceRefs:
      - 18
      - 20
      - 23
      - 24
      - 27
    competitiveRivalry:
      score: 4
      rationale: 竞争中高——Warren 已验证低费率 OFP 赛道，而 AG、NN 和薪资运营商已拥有相邻工作流，可用打包服务防守。
      sourceRefs:
      - 12
      - 16
      - 18
      - 19
      - 23
  pestle:
  - factor: political
    impact: positive
    point: 统一化截止日期和持续的养老金改革让补充养老金持续在雇主议程上，而非陷入休眠。
    sourceRefs:
    - 25
    - 26
  - factor: economic
    impact: positive
    point: 低储备和分层的费用/缴费机制让养老金成果和总成本在财务领导者面前更加可见。
    sourceRefs:
    - 16
    - 17
  - factor: social
    impact: positive
    point: 员工往往看不懂团体保险，在换雇主或收到年度养老金通知时需要帮助。
    sourceRefs:
    - 28
    - 29
    - 31
  - factor: technological
    impact: positive
    point: 雇主门户、DB2P schema 和薪资集成使工作流 OS 在技术上可行，无需替换每一个系统性记录。
    sourceRefs:
    - 9
    - 10
    - 18
    - 23
  - factor: legal
    impact: negative
    point: 供应商切换受持牌机构规则、转移权利、税务处理和披露义务约束。
    sourceRefs:
    - 7
    - 11
    - 30
  - factor: environmental
    impact: neutral
    point: 该品类或可减少纸质沟通和表单，但可持续性相比成本、成果和合规并非购买触发器。
    sourceRefs:
    - 18
    - 29
  adoptionFrictionMatrix:
  - friction: 保险公司和薪资数据清理混乱
    severity: 高
    affectedBuyer: 薪资/福利经理
    mitigation: 先做只读审计、预构建薪资映射和供应商专属导入模板，再自动化完整转移。
    sourceRefs:
    - 20
    - 23
    - 24
  - friction: 经纪人或中间商阻力
    severity: 高
    affectedBuyer: CFO / CHRO
    mitigation: 将产品定位为经纪人协作工作台，明确角色所有权和渠道友好的经济模型。
    sourceRefs:
    - 25
    - 32
  - friction: 转移期间员工沟通与信任
    severity: 中
    affectedBuyer: HR 负责人
    mitigation: 以成员专属 FAQ、通俗储备解释和回答"对我有什么变化"的门户流程为主。
    sourceRefs:
    - 14
    - 27
    - 28
    - 29
  - friction: 法规边缘情形和计划规则解读
    severity: 中
    affectedBuyer: CFO / 法务 / 薪酬负责人
    mitigation: 提供计划规则库加 DB2P 和披露检查，确保每次迁移在资金流动前可审计。
    sourceRefs:
    - 9
    - 10
    - 17
    - 30
market:
  tam:
    value: $21.1M
    rationale: '比利时 250 名以上员工私营企业就业人口 1,014,709 人 [2]；假设 80% 第二支柱覆盖率（来自 OECD/IOPS 档案 [4]）；估计工作流层每名在册成员年费约 $26，因为最近的新入局者已采用固定会员月费模式而非 AUM 计费 [12][16]。计算：1,014,709 × 80% × $26。'
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 12
    - 16
  sam:
    value: $5.9M
    rationale: '在 TAM 基础上收窄至实际滩头市场：对 250 名以上企业中 250-3,000 人规模段打七折，再对切换痛点尖锐的传统保险公司主导计划打四折。计算：1,014,709 × 80% × 70% × 40% × $26。'
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 12
    - 16
  som:
    value: $1.1M
    rationale: 可及的第三年份额建模为 60 家雇主 × 700 名在册成员 × 每人每年 $26，假设通过围绕统一化和续约窗口的经纪人辅助部署，而非纯直接销售动作。
    isEstimate: true
    sourceRefs:
    - 3
    - 23
    - 25
