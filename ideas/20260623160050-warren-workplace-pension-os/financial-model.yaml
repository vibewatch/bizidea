slug: belgian-pension-switch-os
date: '2026-06-23'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-23] the operating model starts in the first full month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.4M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP runwayMonths 18] base case uses a lower-midpoint pre-seed sized to reach the next milestone with six months of buffer.'
  - id: A3
    name: Starting paying employers
    value: '0'
    unit: count
    source: '[BP milestones 0-12 months + BP experimentRoadmap] the company starts pre-revenue and must first convert design-partner work into paid migrations.'
  - id: A4
    name: Active paying employer definition
    value: A paid migration project or a live recurring administration subscription for one employer
    unit: definition
    source: '[BP gtm wedge + BP businessModel revenueStreams] customersEop includes any employer already paying for migration or post-go-live administration.'
  - id: A5
    name: Migration project economics
    value: $27.5K over roughly 3 months (~$9.2K per month)
    unit: USD / employer
    source: '[BP investorMemo.firstCustomer.initialContract $20k-$35k paid migration project] the model uses the midpoint of the stated project range.'
  - id: A6
    name: Recurring subscription economics
    value: $24K ARR per live employer at maturity
    unit: USD / employer / year
    source: '[BP investorMemo.firstCustomer.initialContract $12k-$30k annual software subscription + Research market.som 700 members × $26/member-year ≈ $18.2K] base case assumes a modest minimum-platform fee and attach-ons above the pure per-member floor.'
  - id: A7
    name: Customer ramp
    value: 3 active paying employers by M12, 12 by Q4Y2, and 34 by Q4Y3
    unit: customersEop
    source: '[BP milestones + BP gtm.funnelTargets + Research validationSignals around 100 Belgian employer migrations in market] the ramp matches three paid pilots in year 1 and a broker-assisted expansion path that stays below the researched 60-employer SOM frame.'
  - id: A8
    name: Blended realized revenue per active employer
    value: Y1 monthly revenue per active employer runs about $8K-$9.2K while migration-heavy; Y2 quarter-end run rates imply about $15.0K, $15.0K, $16.0K, and $16.5K per quarter; Y3 implies about $16.0K, $15.5K, $15.4K, and $15.0K per quarter as recurring mix rises
    unit: USDK / active employer / period
    source: '[A5 + A6 + BP sequencingRationale] blended per-customer revenue starts migration-heavy and gradually shifts toward lower but stickier recurring administration revenue.'
  - id: A9
    name: Gross margin ramp
    value: 45%-52% in Y1, 58%-65% in Y2, and 69%-72% in Y3
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on template reuse + Research sensitivityCases data-cleanup drag] early deployments are services-heavy before mappings and playbooks standardize.'
  - id: A10
    name: Hiring timeline
    value: M1 founder CEO and founding engineer; M2 pension operations lead; M5 solutions engineer; M9 channel partnerships lead; M16 implementation / success hire; M25 second engineer
    unit: timeline
    source: '[BP team startTiming + BP sequencingRationale] the plan adds only the delivery and productization hires needed to convert migrations into recurring software revenue.'
  - id: A11
    name: Founder loaded compensation
    value: $150K
    unit: USD / year
    source: '[BP team Founder CEO + startup-finance heuristic] lean founder cash pay plus payroll burden for an enterprise pre-seed company.'
  - id: A12
    name: Founding engineer loaded compensation
    value: $180K
    unit: USD / year
    source: '[BP team Founding eng + startup-finance heuristic] reflects senior integration and workflow engineering talent.'
  - id: A13
    name: Pension operations lead loaded compensation
    value: $140K
    unit: USD / year
    source: '[BP team Pension operations lead + startup-finance heuristic] this role carries domain implementation knowledge and compliance-edge-case ownership.'
  - id: A14
    name: Solutions engineer loaded compensation
    value: $130K
    unit: USD / year
    source: '[BP team Solutions engineer + startup-finance heuristic] covers implementation ownership without assuming a large services bench.'
  - id: A15
    name: Channel partnerships lead loaded compensation
    value: $150K
    unit: USD / year
    source: '[BP team Channel partnerships lead + BP gtm.channels + startup-finance heuristic] includes founder-assisted enterprise selling and partner travel.'
  - id: A16
    name: Implementation / success loaded compensation
    value: $120K
    unit: USD / year
    source: '[BP product.twelveMonth + BP milestones 12-24 months + startup-finance heuristic] added once recurring administration workflows begin to matter.'
  - id: A17
    name: Second engineer loaded compensation
    value: $170K
    unit: USD / year
    source: '[BP product.twentyFourMonth + startup-finance heuristic] the second engineering hire funds reusable workflow and template depth rather than bespoke services.'
  - id: A18
    name: Payroll allocation to functional P&L lines
    value: Founder 60% S&M / 40% G&A; engineering 100% R&D; pension operations 70% R&D / 30% G&A; solutions 30% S&M / 70% R&D; channel lead 100% S&M; implementation 30% S&M / 70% R&D
    unit: allocation
    source: '[BP team rationales + BP operations] payroll is allocated to the functions that actually own selling, delivery, and administration work.'
  - id: A19
    name: Non-payroll operating spend ramp
    value: Monthly non-payroll spend starts near S&M/R&D/G&A of $4K/$4K/$3K, rises to about $6.5K/$5.5K/$4K once the channel motion starts, and exits Y3 near $13K/$9.5K/$6.5K
    unit: USDK / month
    source: '[BP operations + startup-finance heuristic] covers cloud, travel, legal, insurance, translation, and employer-support tooling without assuming a heavy paid-demand engine.'
  - id: A20
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: formula
    source: '[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at this pre-seed software stage.'
  - id: A21
    name: Steady-state monthly churn
    value: 1.3%
    unit: percent / month
    source: '[startup-finance heuristic for early workflow SaaS] contracts should be sticky after go-live, but event-driven buyer behavior keeps churn above mature enterprise-software levels.'
  - id: A22
    name: CAC convention
    value: Y2-Y3 sales and marketing spend divided by 31 net new active paying employers
    unit: formula
    source: '[model calc + BP gtm.funnelTargets] this captures founder-led direct sales plus broker and payroll channel effort during the scale-up period.'
  - id: A23
    name: Next-round milestone for funding sizing
    value: About 20 active paying employers by Q2Y3, at least half of completed migrations converting to recurring administration, and more than $0.6M of cash left as six months of buffer
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk runwayMonths 18 + model cash curve] the pre-seed is sized to reach subscription-conversion proof before broader expansion hiring.'
