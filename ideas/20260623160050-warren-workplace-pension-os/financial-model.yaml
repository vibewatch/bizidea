scenarios:
  downside:
    description: Broker channels ramp later, migration-to-subscription conversion stays near the BP kill-criteria floor, and more payroll cleanup remains manual.
    y3RevenueK: 1050.0
    y3EbitdaK: -610.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches only about 24 instead of 34.
      - Recurring subscription pricing lands closer to the low end of the stated $12K-$30K range.
      - Gross margin stalls in the mid-60s because template reuse is slower than planned.
  base:
    description: Three paid pilots in year 1 become a broker-assisted expansion path, while recurring administration starts to overtake one-time migration revenue by late Y3.
    y3RevenueK: 1460.0
    y3EbitdaK: -324.2
    cashLowPointK: 559.3
    keyAssumptionChanges:
      - Active paying employers grow to 3 by M12, 12 by Q4Y2, and 34 by Q4Y3.
      - Recurring subscription ARPU matures toward about $24K ARR per live employer.
      - Gross margin reaches roughly 72 percent by Q4Y3 as payroll and provider mappings standardize.
  upside:
    description: Broker and payroll referrals work earlier, recurring conversion is stronger, and implementation labor drops faster than expected.
    y3RevenueK: 1820.0
    y3EbitdaK: -120.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 40 instead of 34.
      - A larger share of employers convert to recurring administration within one quarter of go-live.
      - Gross margin exits Y3 in the mid-70s as custom migration work falls faster.
sensitivity:
  - variable: ARPU
    downsideCase: Recurring subscription value settles around $20K ARR per employer.
    baseCase: Recurring subscription value matures toward $24K ARR per employer.
    upsideCase: Broker seats and compliance modules lift mature ARR toward $28K per employer.
    y3RevenueImpactK: -190.0
    cashImpactK: -150.0
  - variable: CAC
    downsideCase: Partner-sourced pipeline underperforms and CAC rises toward $35K.
    baseCase: CAC stays near $27.8K as founder-led and channel-led motions share load.
    upsideCase: Broker referrals take a bigger share of pipeline and CAC falls toward $22K.
    y3RevenueImpactK: -80.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: Monthly churn rises toward 2.0% after migration events finish.
    baseCase: Monthly churn holds near 1.3% once employers adopt recurring admin workflows.
    upsideCase: Monthly churn falls toward 0.8% as payroll and compliance workflows become embedded.
    y3RevenueImpactK: -110.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: Paid migration projects take 150+ days to close and convert.
    baseCase: The first enterprise cycle stays around one renewal season plus implementation planning.
    upsideCase: Broker-backed deals compress closer to 90 days as templates and references accumulate.
    y3RevenueImpactK: -240.0
    cashImpactK: -180.0
  - variable: gross margin
    downsideCase: Gross margin exits Y3 near 66% because manual payroll cleanup persists.
    baseCase: Gross margin exits Y3 near 72% after the first templates become reusable.
    upsideCase: Gross margin exits Y3 near 75% as migrations become more standardized.
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
  - variable: hiring pace
    downsideCase: The second engineer is pulled forward and an extra ops hire is added before conversion proof.
    baseCase: Hiring stays tied to delivery and template milestones in the business plan.
    upsideCase: The second engineer slips one quarter without hurting customer delivery.
    y3RevenueImpactK: 40.0
    cashImpactK: -160.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      RenewalEvents[Renewal and harmonization events] --> PaidMigrations[Paid migration projects]
      PaidMigrations --> LiveEmployers[Live employer admin subscriptions]
      LiveEmployers --> Revenue[Recurring + migration revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue is driven by growing active paying employers from 3 at Y1 exit to 34 by Q4Y3 while the mix shifts from one-time migrations toward recurring administration subscriptions.
  - checkName: Must go right
    finding: The company must standardize the first payroll and provider templates fast enough that gross margin can move from the mid-40s in Y1 to roughly 72% by Q4Y3 without adding a large services bench.
  - checkName: Model breaks if
    finding: If broker channels stall and migration-to-subscription conversion stays near the 40% kill-criteria floor, the downside case compresses the cash floor toward roughly $0.1M before the next raise.
  - checkName: Next-round proof
    finding: The next financing story is about 20 active paying employers by Q2Y3 with 50%+ recurring conversion, partner-sourced deals working, and more than six months of cash still on hand.
sanityChecks:
  ruleOf40: Y3 growth 206.7% + EBITDA margin -22.2% = 184.5%
  burnMultiple: Y2 burn multiple is about 1.6x using roughly $0.8M of EBITDA burn against about $0.5M of added annualized run-rate revenue; the model needs better conversion and margin before a premium next round.
  revenuePerFte: $209K Y3 on 7 ending FTE (benchmark $200-400K SaaS)
  flags:
    - The blended revenue per active employer stays elevated because customersEop combines migration projects and recurring subscriptions; true pure-subscription ARR is lower than total reported revenue until late Y3.
    - The base case depends on broker and payroll channels contributing materially by Y2; a mostly direct-sales motion would likely require either lower growth or a larger round.
    - Even with a lean team, the model does not reach full-year EBITDA breakeven by Y3, so a slower margin ramp or earlier hiring would push the funding ask upward.
