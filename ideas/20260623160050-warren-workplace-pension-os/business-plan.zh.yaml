slug: belgian-pension-switch-os
date: '2026-06-23'
executiveSummary: >-
  比利时养老金切换 OS 是一个工作流与数据层，帮助比利时中型雇主将补充养老金从不透明的团体保险合同迁出。
  首批买家是 500 至 2,000 名员工企业的 CFO、CHRO 或全面薪酬总监，
  其在 12 个月内面临合同续签、统一化项目或福利重新设计。
  痛点以运营为主而非信息缺失：雇主可以比较供应商，但切换仍会在保险公司文件、
  薪资映射、经纪人交接、DB2P 报告和员工问答上崩盘。
  研究证实了通过合规养老基金形成的真实替代轨道，并显示市场已发生约 100 次雇主迁移，
  但证据基础仍集中于一家近期入局者，尚未完全厘清定价或实施人工问题。
  初始产品应从以读取为主的迁移工作台起步——审计现有计划、建模员工级成果，
  协调供应商、薪资、经纪人和员工任务，而不成为养老金产品本身。
  研究得出的比利时 SAM 仅约 $5.9M，因此风投可行性取决于将本地迁移经验转化为可复制软件，
  再输出至其他碎片化欧洲福利市场。GTM 应优先与经纪人和薪资合作伙伴协作，
  因为这些渠道已掌握信任，若受到威胁将封堵采用。
  公司应推迟跨境扩张、公共部门计划和泛化财务健康功能，
  直至证明迁移关单更快、错误率下降，且雇主从一次性切换项目转化为经常性行政收入。
  董事会层面的核心问题是：在基金主导和保险公司主导的产品打包足够多工作流之前，
  中立切换 OS 能否先拿到预算。
problem:
  - "传统比利时团体保险计划成本高、不透明、难以理解，但雇主仍难以更换供应商——切换横跨薪资重映射、经纪人协调、转移逻辑、DB2P 报告和员工沟通。"
  - "合同续签和统一化项目制造了紧迫感，但 HR 和财务团队仍通过电子表格、PDF、邮件链和服务密集的中间商来推进变更，拉高错误风险并掩盖真实经济性。"
solution:
  - "构建迁移工作台，导入现有计划文档和薪资导出文件，呈现费用与计划规则，并生成跨替代结构的员工级成果对比。"
  - "在一个可审计的工作流中编排薪资映射、供应商交接、经纪人任务、合规检查点和员工答疑，上线后仍可用于缴费变更和计划行政管理。"
whyWeWin:
  - "切口比卖新养老基金或泛化福利门户更窄：它精准命中雇主已需要采取行动的高摩擦时刻。"
  - "中立控制平面可跨保险公司、经纪人、薪资系统和养老基金运作，比那些要求买家在承诺前先押注某一轨道的方案更契合需求。"
  - "每完成一次迁移，供应商规则库、薪资映射和员工沟通模板都在优化，下一个客户的实施风险随之降低。"
strategicChoices:
  beachhead: 比利时私营部门、250-3,000 名员工、持有传统团体保险合同、且在未来 12 个月内有续签、统一化或重新设计事件的雇主。
  wedgeRationale: 该细分市场已有预算决策方、强制性事件，以及足以证明付费迁移工作流合理的员工规模，同时仍深受电子表格式协调之苦——软件能比泛化养老金行政管理提案更快取代这一工作。
  sequencingRationale: 先做只读审计、建模和迁移协调，让公司在承担更深层经常性行政管理责任之前，先证明切换时间缩短和错误减少；只有在首批迁移建立信任和可复制性之后，再加入经纪人协作、薪资模板和上线后运营。
  notYet:
    - 销售或制造养老金产品本身
    - 公共部门和地方政府养老金细分市场
    - 250 名员工以下的自助 SMB 分发
    - 比利时实施手册可复制之前的跨境扩张
    - 与实时养老金变更事件无关的泛化财务健康功能
market:
  tam: 基于 250 名以上员工企业、80% 覆盖率及工作流层约每名在册员工年费 $26，估算比利时 TAM 约 $21.1M。
  sam: 将 TAM 收窄至 250-3,000 人规模、传统保险公司主导计划、切换痛点尖锐的雇主，估算比利时 SAM 约 $5.9M。
  som: 基于约 60 家雇主、每家平均 700 名在册员工、每人每年 $26，通过续约和经纪人主导部署，估算第三年可及 SOM 约 $1.1M。
  segments:
    - 持有传统补充养老金合同的比利时中型雇主
    - 参与养老金审查的福利经纪人及薪资/社会秘书处合作伙伴
  buyingProcess: >-
    主导者通常是需要推动切换落地的 HR、薪资或福利运营人员，
    但经济批准权在 CFO、CHRO 或全面薪酬总监手中——当续签或统一化事件迫使决策时。
    一笔可信的首单是有偿迁移项目，在首个完整缴费周期顺利关闭后转化为年度行政管理订阅。
product:
  mvp: >-
    MVP 是针对单次雇主续签的以读取为主的迁移工作台——
    导入现有养老金文件和薪资文件，生成员工级成果对比模型，
    并跟踪供应商、薪资和员工任务直至上线。
    应包含审计追踪和异常队列，但暂不自动化资金流动或成为合规养老金载体。
  sixMonth: 支持三种最常见目标薪资导出格式，上线经纪人协作视图，并启动含迁移清单、成果建模和员工 FAQ 分发的生产试点。
  twelveMonth: 加入上线后缴费变更工作流、新员工和离职行政管理、供应商专属导入模板，以及供经常性运营使用的 DB2P 或披露检查。
  twentyFourMonth: 扩展至多供应商基准情报、跨比利时行业的可复用迁移模板，并为一个具有类似碎片化补充养老金工作流的相邻欧洲市场做好准备。
  keyBets:
    - 常见比利时薪资导出和现有养老金报表可通过有限的人工清理统一为一个规范迁移模型。
    - 雇主将足够信任员工级成果建模，在供应商评选会议上采用它。
    - 经纪人协作功能将比经纪人取代策略更能加速采用。
    - 上线后行政管理收入将从至少一半成功迁移项目中转化。
gtm:
  wedge: 销售让供应商切换在操作上安全的养老金续约迁移方案，在新计划上线后将该项目转化为经常性养老金运营软件。
  channels:
    - 创始人主导向比利时面临强制审查窗口的 CFO、CHRO 和全面薪酬负责人直接销售
    - 经纪人和顾问联合销售，配合协作功能和渠道友好的经济模型
    - 薪资、HRIS 和社会秘书处转介，数据清理和行政减负是核心价值主张
  funnelTargets: 线索→合格续约机会 15-25%，合格机会→付费迁移试点 40%+，付费试点→生产订阅 50%+，生产→多雇主经纪人扩展 25%+（第一年）
  pricing: >-
    按在册员工数的年度 SaaS 定价，设最低平台费，加上每次供应商切换的一次性迁移费和可选经纪人席位。
    这与买家的价值感知相符：一次高风险过渡事件，随后是经常性行政管理节省，
    而非泛化的席位使用量。
businessModel:
  revenueStreams:
    - 年度按在册员工数平台订阅
    - 一次性迁移实施费
    - 经纪人或顾问席位许可
    - 高级合规、基准和员工沟通模块
  unitOfValue: 活跃雇主养老金计划上的在册员工，加上每家雇主独立的迁移项目范围
  targetGrossMarginPct: 70
  expansionLevers:
    - 将迁移客户转化为经常性行政管理账户
    - 从单一雇主拓展至经纪人管理的多雇主客户群
    - 待供应商规则数据积累后，加入高级基准和合规工作流
    - 比利时手册可复制后进入相邻碎片化欧洲福利市场
strategyMap:
  northStarMetric: 在首个缴费周期零关键薪资或报告异常完成迁移到新计划的在册员工数
  inputMetrics:
    - 从数据接收到完成现有计划审计的时间
    - 薪资和供应商字段无需人工返工自动映射的比例
    - 付费迁移试点转年度订阅的转化率
    - 迁移期间员工 FAQ 自助使用率
    - 经纪人来源机会在合格管道中的占比
  moatsToBuild:
    - 涵盖保险公司、OFP 和转移边缘情形的供应商规则与费用结构库
    - 规范化薪资与 DB2P 映射层，随每次迁移降低实施风险
    - 与实际储备、转移和缴费问题绑定的员工沟通语料库
  killCriteria:
    - 9 个月内签约付费迁移试点少于 3 个
    - 前 5 个试点完成后，仍有超过 20% 的必要薪资或供应商字段需要定制化手动映射
    - 前 6 个雇主项目完成后，付费试点转经常性订阅的转化率低于 40%
    - 渠道优先协作计划启动后，经纪人来源机会仍低于管道的 20%
  mermaid: |
    flowchart LR
      Wedge[Renewal-driven switching wedge] --> MVP[Migration workspace MVP]
      MVP --> Proof[Clean go-live and lower manual coordination]
      Proof --> Expansion[Recurring pension operations and channel expansion]
investorMemo:
  verdict:
    call: 观望
    conviction: 痛点强烈、购买触发器可信，但在中立工作流软件证明能在国内小市场拿到预算之前，高置信度评级暂缓。
    whyBelieve: 研究表明雇主在摩擦降低后会主动切换，且目前尚无现有厂商拥有跨保险公司、经纪人、薪资和员工工作流的中立可审计迁移层。
    whyDoubt: 仅靠比利时市场太小，难以支撑风投回报；基金主导或保险公司主导的产品若打包足够多迁移工作流，可能压缩独立软件的单独定价空间。
    nextDiligence: 确认 2-3 个在役雇主续签案例，验证初创公司能否缩短实施时间、减少错误，并在无经纪人阻力的情况下将项目转化为经常性软件收入。
  firstCustomer:
    title: 正在续签传统团体保险计划的比利时中型雇主 CFO 或 CHRO
    profile: 500-2,000 名员工的私营企业，使用常见比利时薪资系统，依赖经纪人，并在 12 个月内面临养老金续签、统一化或重新设计。
    trigger: 合同续签、工人群体统一化，或同时要求供应商比较和员工沟通的福利重新设计。
    buyer: CFO、CHRO 或全面薪酬总监
    initialContract: 一次性付费迁移项目 $20k-$35k，加上 500-2,000 名员工的年度软件订阅 $12k-$30k，首个完整缴费周期顺利完成后转为经常性行政管理。
  mustBeTrue:
    - 经纪人和顾问接受协作优先模式，并帮助来源至少部分首批管道，而非封堵产品。
    - 三种最常见目标薪资和保险公司文件组合可在三周内完成规范化，无需每次定制工程。
    - 面向买家的成果模型足够可信，能在真实续签流程的供应商评选决策中发挥影响。
    - 至少一半付费迁移项目在上线后转化为年度经常性行政管理订阅。
    - 中立工作流层即使雇主尚未选定某一具体养老基金或保险公司轨道，也能拿到预算。
  diligenceQuestions:
    - 哪些具体的续签或统一化事件会让 CFO 和 CHRO 额外拨出预算，而非把流程留给经纪人和保险公司？
    - 前五个薪资和现有计划数据集需要多少人工清理？
    - 经纪人需要什么样的经济让利或工作流收益才会主动联合销售这个产品？
    - 雇主留在现有保险公司但仍希望获得更好的切换和行政管理工具时，初创公司能否拿单？
    - 上线后哪个经常性工作流有足够价值支撑迁移事件结束后的软件留存？
operatingAssumptions:
  - assumption: 首批可复制部署可围绕少数几种薪资导出和现有养老金文件格式实现标准化。
    basis: research.yaml
    validationTest: 使用共创客户的匿名文件完成三次演练迁移，并衡量有多少映射可以模板化，有多少需要手动构建。
    decisionImpact: 若假设不成立，服务负担上升、利润率压缩，公司必须将滩头市场收窄至更少的薪资或保险公司组合。
  - assumption: 经纪人会将产品视为工作流基础设施，而非对顾问经济模式的威胁。
    basis: research.yaml
    validationTest: 进行十次经纪人访谈，并在两个有经纪人参与的试点中获取关于工作流所有权和收入分成条款的明确反馈。
    decisionImpact: 若假设不成立，直接销售 CAC 上升，续签事件的准入收窄，产品可能需要转向对经纪人依赖程度较低的雇主。
  - assumption: 雇主愿意为独立的软件和迁移费用付款，而非期望该能力被打包进基金、保险公司或经纪人经济中。
    basis: idea.yaml
    validationTest: 向目标雇主测试两份付费试点提案，在养老金供应商决策敲定前确认是否愿意批准独立预算行项。
    decisionImpact: 若假设不成立，ACV 下降、TAM 收窄，公司可能需要通过经纪人或养老金机构采用打包分发模式。
  - assumption: 员工门户和通俗 FAQ 流程将在迁移过程中显著减少 HR 工单量。
    basis: research.yaml
    validationTest: 对比两个试点雇主上线前后的支持工单量，并在切换期间衡量员工门户使用率。
    decisionImpact: 若假设不成立，员工参与度降为较低优先级路线图项，公司应将产品资源集中于行政和合规工作流。
  - assumption: 比利时迁移经验能足够快地转化为可复用软件，支撑未来跨境扩张的投资逻辑。
    basis: 运营判断
    validationTest: 前五次上线后，衡量实施时间缩减、模板复用率及跨账户经常性收入转化情况。
    decisionImpact: 若假设不成立，公司将成为本地服务密集的利基业务，不应为欧洲扩张故事融资。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15 位目前处于续签或统一化窗口的比利时 CFO、CHRO、薪资和薪酬负责人。
    hypothesis: 最强烈的购买触发器是财务、HR 和员工沟通都需要同步推进的强制审查事件。
    successMetric: 至少 8 位买家描述 12 个月内的主动变更事件，且 4 位同意分享工作流和数据样本。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 进行 10 次经纪人和顾问访谈，聚焦协作模式、工作流所有权和渠道经济。
    hypothesis: 对经纪人友好的工作台在获取合格机会方面将优于经纪人取代提案。
    successMetric: 至少 3 家经纪人同意试点或转介一个实时续约工作流。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 使用共创客户的匿名现有报表和薪资导出，执行 3 次演练迁移。
    hypothesis: 首个规范迁移模型可以覆盖最常见的数据结构，手动字段映射比例低于 20%。
    successMetric: 全部 3 次演练完成，每次生成可复用模板且配置时间不超过 3 周。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 启动 2 个付费迁移试点，包含只读审计、成果建模、经纪人工作台和员工 FAQ 分发。
    hypothesis: 如果产品能降低实施风险，买家愿意在完整经常性行政管理上线前资助迁移项目。
    successMetric: 2 个付费试点签约，且均在无关键薪资或报告缺陷的情况下达到上线。
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: 在前几次实时迁移中衡量员工支持工单量和门户参与度。
    hypothesis: 通俗员工沟通将充分减少 HR 支持负担，足以证明将其作为核心功能保留。
    successMetric: 每个试点养老金相关 HR 工单减少 25% 以上，员工门户激活率至少 50%。
    owner: 养老金运营负责人
  - horizon: 180–365 天
    experiment: 向已转化客户加入经常性缴费变更和新员工工作流，并测试年度订阅续约。
    hypothesis: 上线后行政管理是从一次性迁移收入走向持久 ARR 的主要路径。
    successMetric: 至少 50% 的已完成迁移试点转化为年度订阅，并在上线后显示每月工作流使用量。
    owner: 创始工程师
  - horizon: 180–365 天
    experiment: 与 2 个薪资或社会秘书处渠道正式签订转介或实施合作。
    hypothesis: 与薪资相邻的合作伙伴能减少数据清理摩擦并缩短生产时间。
    successMetric: 2 家合作伙伴签约，通过这些渠道来源 2 个合格机会。
    owner: 渠道合作负责人
operations:
  - 为每条支持的迁移路径提供版本化模板的供应商和薪资映射库
  - 每条计划规则假设、员工沟通步骤和合规检查点的审计日志
  - 面向雇主、经纪人、薪资和养老金供应商参与者的基于角色的工作台
  - 针对比利时部署的双语员工沟通和 FAQ 工作流
  - 含每周迁移审查和首个缴费周期复盘的试点运营节奏
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 创始人主导销售是必要的，因为首单具有触发驱动性、顾问性，且横跨财务、HR、经纪人和供应商利益方。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 核心早期风险是跨薪资、供应商和报告系统的数据规范化与工作流可靠性。
  - role: 养老金运营负责人
    startTiming: Month 2
    rationale: 产品需要在规模化之前在内部拥有比利时养老金工作流、合规边缘情形和实施手册的所有权。
  - role: 解决方案工程师
    startTiming: Month 5
    rationale: 早期客户成功依赖快速的薪资和供应商配置，而非仅靠软件路线图速度。
  - role: 渠道合作负责人
    startTiming: Month 9
    rationale: 经纪人和薪资合作在首批参考迁移证明工作流和经济性之后才会实质化。
milestones:
  - horizon: 0–12 个月
    items:
      - 在比利时中型市场滩头市场签约 3 个付费迁移试点
      - 前 2 次雇主迁移实现无关键薪资或报告缺陷的清洁上线
      - 将前 3 种薪资或供应商迁移模式模板化为可复用入职手册
      - 将至少 1 家经纪人和 1 家薪资相邻合作伙伴转化为活跃转介渠道
  - horizon: 12–24 个月
    items:
      - 将至少 50% 的已完成迁移项目转化为年度经常性行政管理订阅
      - 为存量客户支持经常性缴费变更、新员工和离职工作流
      - 基于已完成迁移构建基准报告，提升定价、证明效力和实施速度
      - 在初始比利时细分市场的主要目标薪资系统上实现可参考覆盖率
  - horizon: 24–36 个月
    items:
      - 采用同一迁移控制平面架构，在一个相邻欧洲市场启动试点
      - 从单一雇主突破拓展至经纪人管理的多雇主客户群
      - 证明经常性行政管理收入超过一次性迁移收入
risks:
  - risk: 经纪人因产品压缩其专项顾问工作而抵制透明化。
    likelihood: High
    impact: High
    mitigation: 从协作功能、明确的角色所有权和让经纪人保留客户关系的渠道经济入手。
  - risk: 数据清理和薪资映射耗费过多人工，无法实现软件级利润率。
    likelihood: High
    impact: High
    mitigation: 将首批细分市场收窄至常见薪资系统，从只读审计起步，并在扩展工作流范围前早期投入模板复用。
  - risk: 基金主导或保险公司主导的竞争对手打包足够多迁移工作流，使中立软件难以单独定价。
    likelihood: Medium
    impact: High
    mitigation: 以中立基准、多供应商工作流支持和雇主可控的可审计性差异化，而非仅靠门户体验。
  - risk: 若上线后经常性工作流无法留住客户，比利时市场被证明太小。
    likelihood: Medium
    impact: High
    mitigation: 在为欧洲扩张故事提前招聘之前，将经常性行政管理转化率和实施复用率作为硬性董事会指标。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月应资助创始产品和实施团队、首批薪资与供应商模板库、3-5 个付费迁移试点，以及在更广泛渠道招聘或跨境扩张之前获取经常性行政管理转化的证据。
