topRisks:
  - name: Distribution capture by brokers
    description: Benefits brokers may prefer to keep switching workflows opaque and service-heavy, limiting direct software adoption by employers.
    mitigation: Start with broker-friendly collaboration features and revenue share so the product upgrades broker workflow instead of trying to displace distribution on day one.
  - name: Regulatory and product dependence
    description: If regulated pooled-fund structures prove harder to deploy broadly than the source suggests, migration demand could narrow to a smaller slice of the market.
    mitigation: Keep the software fund-agnostic so it can support comparisons, migrations, and administration across multiple approved pension structures, not one provider model.
  - name: Data and payroll integration drag
    description: Employer pension files, payroll codes, and incumbent insurer records may be too messy for fast time to value in early deployments.
    mitigation: Focus first on a narrow renewal playbook for common Belgian payroll systems and read-heavy migrations before expanding into deeper ongoing administration workflows.
