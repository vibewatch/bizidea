differentiator: >-
  Most benefits vendors either sell the pension product itself or provide
  generic financial wellness content. This company would own the hard layer in
  between: the workflow that converts an employer from one retirement setup to
  another while preserving payroll accuracy, employee trust, and auditability.
  That creates sticky system-of-record data around plan rules, contribution
  flows, and employee communications that brokers, insurers, and coaching apps
  do not currently unify.
