problem: >-
  Belgian mid-market employers still buy supplementary pensions through opaque
  group insurance products that are expensive, hard to compare, and poorly
  understood by employees. When HR or finance teams want to improve outcomes,
  they face a messy migration across insurers, payroll mappings, employee
  communications, and plan-governance paperwork. That switching complexity lets
  weak products persist even when employers know staff balances are too low and
  employees do not trust what they have.
targetUser:
  primary: >-
    HR and finance leaders at Belgian employers with 250 to 3,000 employees who
    sponsor supplementary pensions through legacy group insurance contracts
  secondary: >-
    Belgian employee-benefits brokers and payroll integrators helping employers
    review pension providers and communicate plan changes
  buyer: >-
    CFO, CHRO, or Head of Total Rewards at a Belgian employer renewing or
    redesigning its workplace pension plan
startupThesis:
  nonObviousInsight: >-
    The real wedge is not a better pension dashboard or a generic financial
    wellness app; it is software that makes switching retirement rails
    operationally safe for employers. Once a platform becomes the system that
    reconciles payroll, plan rules, employee communication, and migration tasks
    between an incumbent insurer and a new pooled fund, it controls the highest
    friction point in the market and can own the ongoing pension operating
    layer.
  beachhead: >-
    Belgian employers with 250 to 3,000 employees whose supplementary pension
    contract renews within 12 months and whose HR team still manages provider
    changes through brokers, spreadsheets, and insurer PDFs
  wedge: >-
    A pension-switching workspace that audits the incumbent group insurance
    plan, models employee-level outcomes under a fee-light pooled fund, and
    orchestrates migration, payroll mapping, and employee Q&A in one workflow
  whyNowCatalyst: >-
    Warren's funding, proof of about 100 employer migrations, and the headline
    claim that Belgium's current group insurance products are costly and poorly
    understood show that both buyer pain and a regulated replacement path now
    exist at the same time.
  ventureScalePath: >-
    Start as the migration and administration control plane for Belgian
    workplace pensions, then expand into ongoing contribution operations,
    employee retirement advice, broker distribution tooling, and eventually
    cross-border supplementary pension infrastructure for other fragmented
    European employer-benefits markets.
solution: >-
  Build a vertical SaaS platform for employers and brokers switching workplace
  pensions away from opaque group insurance products. The first module imports
  incumbent plan documents and payroll files, surfaces fees and plan rules, and
  generates a side-by-side employee outcome model for the replacement fund. A
  migration workflow then coordinates payroll field mapping, employee consent
  steps, broker tasks, and insurer handoffs so the switch feels like a managed
  software rollout instead of a legal project. An embedded employee portal and
  coaching layer answers "what changes for me?" questions in plain language,
  lifting adoption and reducing HR ticket volume. Over time, the platform
  becomes the operating system for contribution changes, new-hire onboarding,
  and retirement-plan analytics after the migration is complete.
goToMarketSeed:
  firstCustomer: >-
    A Belgian employer with 500 to 2,000 employees, a group insurance contract
    up for renewal in the next year, and a CFO dissatisfied with fees and low
    employee engagement in the current supplementary pension plan
  buyingTrigger: >-
    A pension contract renewal, broker-led benefits review, or employee-benefit
    redesign that forces the company to compare providers and explain the change
    to staff
  currentAlternative: >-
    Broker-managed insurer switching projects using spreadsheets, email,
    incumbent carrier portals, and manual employee communication
  switchingReason: >-
    The wedge cuts weeks of manual coordination, makes plan economics visible at
    employee level, and gives employers a single system for migration and
    post-switch administration instead of handing the whole process back to a
    broker and insurer stack they do not control.
  pricingHypothesis: >-
    Annual SaaS platform fee priced per enrolled employee, with a one-time
    migration fee for each pension-plan switch and optional broker seats
