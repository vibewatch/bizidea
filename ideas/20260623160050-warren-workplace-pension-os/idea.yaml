jobsToBeDone:
  - job: >-
      When our workplace pension contract comes up for renewal, help the CFO and
      HR lead compare the real employee outcomes and switching effort across
      providers, so they can move to a better plan without operational chaos.
    currentAlternative: >-
      Broker-led spreadsheet comparisons and manual insurer coordination
    successMetric: Time to complete provider switch and projected employee
      retirement-balance improvement
  - job: >-
      When employees ask what a pension change means for them, help the HR team
      explain contributions, fees, and expected retirement outcomes, so they can
      preserve trust during the migration.
    currentAlternative: >-
      Static FAQ documents, insurer brochures, and ad hoc HR email responses
    successMetric: Reduction in pension-related HR tickets and employee
      activation of the new plan portal
