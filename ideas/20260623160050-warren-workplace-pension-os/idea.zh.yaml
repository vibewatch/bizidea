jobsToBeDone:
  - job: >-
      职场养老金合同到期续签时，帮助 CFO 和 HR 负责人比较各供应商的真实员工成果和切换工作量，
      让他们能在不造成运营混乱的情况下迁移到更好的计划。
    currentAlternative: >-
      经纪人主导的电子表格比较和人工保险公司协调
    successMetric: >-
      完成供应商切换的时间，以及预测的员工退休余额提升幅度
  - job: >-
      员工询问养老金变更对自己意味着什么时，帮助 HR 团队解释缴费、费用和预期退休成果，
      在迁移过程中维持员工信任。
    currentAlternative: >-
      静态 FAQ 文档、保险公司宣传册和临时 HR 邮件回复
    successMetric: >-
      养老金相关 HR 工单减少比例，以及员工激活新计划门户的比率
