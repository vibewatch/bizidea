problem: >-
  比利时中型雇主仍通过不透明的团体保险产品购买补充养老金——费用高、难比较、员工看不懂。
  当 HR 或财务团队想改善成果时，面对的是跨越保险公司、薪资映射、员工沟通和计划治理文档的繁琐迁移。
  这种切换复杂度让劣质产品得以延续，即便雇主知道员工余额太低、员工对现有方案毫无信任。
targetUser:
  primary: >-
    比利时 250 至 3,000 名员工的雇主中，通过传统团体保险合同为员工提供补充养老金的
    HR 和财务领导者
  secondary: >-
    协助雇主审查养老金供应商并沟通计划变更的比利时员工福利经纪人及薪资集成商
  buyer: >-
    比利时某雇主的 CFO、CHRO 或全面薪酬总监，正在续签或重新设计职场养老金计划
startupThesis:
  nonObviousInsight: >-
    真正的切口不是更好看的养老金仪表盘，也不是泛化的财务健康应用；
    而是让切换退休轨道在操作上对雇主安全可行的软件。
    一旦某平台成为整合薪资、计划规则、员工沟通与迁移任务的系统——
    协调现有保险公司与新共同基金之间的交接——
    它就占据了市场中摩擦最高的节点，从而拥有持续的养老金运营层。
  beachhead: >-
    比利时 250 至 3,000 名员工、补充养老金合同在 12 个月内到期续签，
    且 HR 团队仍通过经纪人、电子表格和保险公司 PDF 管理供应商变更的雇主
  wedge: >-
    一个养老金切换工作台——审计现有团体保险计划、按员工级别模拟低费率共同基金下的成果，
    并在同一工作流中编排迁移、薪资映射和员工答疑
  whyNowCatalyst: >-
    Warren 的融资、约 100 家雇主迁移的证明，以及比利时现有团体保险产品成本高昂、
    难以理解的明确背书，共同表明买家痛点与合规替代路径已同时出现。
  ventureScalePath: >-
    从比利时职场养老金的迁移和行政管控平面起步，逐步扩展至持续缴费运营、
    员工退休建议、经纪人分发工具，最终进入其他碎片化欧洲雇主福利市场，
    构建跨境补充养老金基础设施。
solution: >-
  为雇主和经纪人打造一个垂直 SaaS 平台，帮助职场养老金从不透明的团体保险迁出。
  第一个模块导入现有计划文档和薪资文件，呈现费用与计划规则，
  并为替代基金生成员工级别的成果对比模型。迁移工作流协调薪资字段映射、
  员工同意步骤、经纪人任务及保险公司交接，让切换感觉像一次有管理的软件上线，
  而非法务项目。内嵌的员工门户和辅导层以通俗语言回答"对我有什么变化？"，
  提升参与度、降低 HR 工单量。随着时间推移，平台将成为迁移完成后处理缴费变更、
  新员工入职和退休计划分析的操作系统。
goToMarketSeed:
  firstCustomer: >-
    比利时 500 至 2,000 名员工的雇主，团体保险合同在未来一年到期，
    且 CFO 对费用和员工低参与度感到不满
  buyingTrigger: >-
    养老金合同续签、经纪人主导的福利审查，或迫使公司比较供应商并向员工解释变更的福利重新设计
  currentAlternative: >-
    经纪人主导的保险公司切换项目，使用电子表格、邮件、现有承运人门户及人工员工沟通
  switchingReason: >-
    切口能节省数周的人工协调，把计划经济性可视化到员工层面，
    并为雇主提供迁移和切换后行政管理的统一系统——
    而非把整个流程交还给他们无法掌控的经纪人和保险公司组合。
  pricingHypothesis: >-
    按在册员工数收取年度 SaaS 平台费，每次养老金计划切换收取一次性迁移费，
    并提供可选的经纪人席位
