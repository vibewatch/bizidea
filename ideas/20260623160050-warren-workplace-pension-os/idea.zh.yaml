topRisks:
  - name: 经纪人控制分发渠道
    description: 福利经纪人可能倾向于保持切换工作流不透明、服务密集，从而限制雇主直接采用软件。
    mitigation: 从对经纪人友好的协作功能和收入分成入手，让产品升级经纪人工作流，而非第一天就试图取代其分发地位。
  - name: 监管与产品依赖
    description: 如果合规共同基金结构的实际部署比来源所描述的更难推广，迁移需求可能收窄至市场的一小部分。
    mitigation: 保持软件对基金中立，支持跨多种经批准养老金结构的比较、迁移和行政管理，而非绑定单一供应商模式。
  - name: 数据与薪资集成拖累
    description: 雇主养老金文件、薪资代码和现有保险公司记录可能太混乱，导致早期部署的价值实现时间过长。
    mitigation: 优先针对常见比利时薪资系统的精简续约流程和以读取为主的迁移，再扩展至更深层的持续行政管理工作流。
