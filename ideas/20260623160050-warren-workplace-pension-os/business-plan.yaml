slug: belgian-pension-switch-os
date: '2026-06-23'
executiveSummary: >-
  Belgian pension switch OS is a workflow and data layer for Belgian mid-market
  employers moving supplementary pensions off opaque group insurance contracts.
  The first buyer is a CFO, CHRO, or Head of Total Rewards at a 500-2,000
  employee company facing a renewal, harmonization project, or benefits redesign
  within 12 months. The pain is operational more than informational: employers
  can compare providers, but switching still breaks across insurer documents,
  payroll mappings, broker handoffs, DB2P reporting, and employee questions.
  Research supports a real replacement rail through regulated pension funds and
  shows roughly 100 employer migrations already happened in the market, but the
  evidence base is still concentrated in one recent entrant and does not fully
  resolve pricing or implementation-labor questions. The initial product should
  therefore start as a read-heavy migration workspace that audits the incumbent
  plan, models employee-level outcomes, and coordinates provider, payroll,
  broker, and employee tasks without becoming the pension product itself. The
  researched Belgian SAM is only about $5.9M, so the venture case depends on
  turning local migration know-how into repeatable software and then exporting
  it into adjacent fragmented European benefits markets. Go-to-market should be
  collaboration-first with brokers and payroll partners because those channels
  already own trust and can block adoption if threatened. The company should
  delay cross-border expansion, public-sector plans, and broad financial
  wellness until it proves that migrations close faster, error rates fall, and
  employers convert from one-off switch projects into recurring administration
  revenue. The board-level question is whether a neutral switching OS can win
  budget before fund-led players and incumbent insurers bundle enough workflow
  to make a standalone layer unnecessary.
problem:
  - Legacy Belgian group insurance plans are costly, opaque, and poorly understood, but employers still struggle to change providers because the switch spans payroll remapping, broker coordination, transfer logic, DB2P reporting, and employee communications.
  - Contract renewals and harmonization projects create urgency, yet HR and finance teams still run the change process through spreadsheets, PDFs, email chains, and service-heavy intermediaries that increase error risk and hide true economics.
solution:
  - Build a migration workspace that imports incumbent plan documents and payroll exports, surfaces fees and plan rules, and generates employee-level outcome comparisons across replacement structures.
  - Orchestrate payroll mapping, provider handoffs, broker tasks, compliance checkpoints, and employee Q&A in one auditable workflow that stays useful after go-live for contribution changes and plan administration.
whyWeWin:
  - The wedge is narrower than selling a new pension fund or a generic benefits portal: it targets the highest-friction moment when employers already need to act.
  - A neutral control plane can work across insurers, brokers, payroll systems, and pension funds, which is a better fit for buyers that want proof before committing to one rail.
  - Every completed migration improves provider-rule libraries, payroll mappings, and employee communication templates, lowering implementation risk on the next account.
strategicChoices:
  beachhead: Belgian private-sector employers with 250-3,000 employees, legacy group insurance contracts, and a renewal, harmonization, or redesign event inside the next 12 months.
  wedgeRationale: This segment already has a budget owner, a forcing event, and enough employee volume to justify a paid migration workflow, while still suffering from spreadsheet-heavy coordination that software can replace faster than a broad pension-administration pitch.
  sequencingRationale: Start with read-only audit, modeling, and migration coordination so the company can prove time-to-switch and error-reduction before taking responsibility for deeper recurring administration; add broker collaboration, payroll templates, and post-go-live operations only after the first migrations establish trust and repeatability.
  notYet:
    - Selling or manufacturing the pension product itself
    - Public-sector and local-authority pension segments
    - Self-serve SMB distribution below 250 employees
    - Cross-border expansion before Belgian implementation playbooks are repeatable
    - Broad financial wellness features unrelated to a live pension change event
market:
  tam: $21.1M estimated Belgian TAM based on 250+ employee enterprises, 80% coverage, and about $26 per covered member-year for the workflow layer.
  sam: $5.9M estimated Belgian SAM for employers in the 250-3,000 range with legacy insurer-led plans where switching pain is acute.
  som: $1.1M estimated year-three SOM based on roughly 60 employers averaging about 700 covered members each through renewal- and broker-led deployments.
  segments:
    - Belgian mid-market employers with legacy supplementary pension contracts
    - Benefits brokers and payroll or social-secretariat partners involved in pension reviews
  buyingProcess: >-
    The champion is usually the HR, payroll, or rewards operator who has to make
    the switch work, but the economic approval sits with the CFO, CHRO, or Head
    of Total Rewards when a renewal or harmonization event forces a decision.
    A credible first sale is a scoped paid migration project that converts to an
    annual administration subscription after the first live contribution cycle
    closes cleanly.
product:
  mvp: >-
    MVP is a read-heavy migration workspace for one employer renewal that
    ingests incumbent pension documents and payroll files, produces an
    employee-level comparison model, and tracks provider, payroll, and employee
    tasks to go-live. It should include audit trails and exception queues, but
    not yet automate money movement or become the regulated pension vehicle.
  sixMonth: Support the three most common target payroll export patterns, ship broker collaboration views, and launch production pilots with migration checklists, outcome modeling, and employee FAQ delivery.
  twelveMonth: Add post-go-live contribution-change workflows, new-hire and offboarding administration, provider-specific import templates, and DB2P or disclosure checks for recurring operations.
  twentyFourMonth: Expand into multi-provider benchmark intelligence, reusable migration templates across Belgian sectors, and readiness for one adjacent European market with similar fragmented supplementary pension workflows.
  keyBets:
    - Common Belgian payroll exports and incumbent pension statements can be normalized into one canonical migration model with limited manual cleanup.
    - Employers will trust employee-level outcome modeling enough to use it in provider-selection meetings.
    - Broker collaboration features will accelerate adoption more than a broker-displacement strategy.
    - Post-switch administration revenue will convert from at least half of successful migration projects.
gtm:
  wedge: Sell a pension-renewal migration program that makes provider switching operationally safe, then convert that project into recurring pension operations software once the new plan is live.
  channels:
    - Founder-led direct sales to Belgian CFOs, CHROs, and total-rewards leaders facing a forced review window
    - Broker and consultant co-sell with collaboration features and channel-friendly economics
    - Payroll, HRIS, and social-secretariat referrals where data cleanup and admin relief are central to the value proposition
  funnelTargets: lead→qualified renewal opportunity 15-25%, qualified opportunity→paid migration pilot 40%+, paid pilot→production subscription 50%+, production→multi-employer broker expansion 25%+ in year one
  pricing: >-
    Annual SaaS priced per enrolled employee with a minimum platform fee, plus
    a one-time migration fee per provider switch and optional broker seats.
    This matches how buyers experience value: a high-stakes transition event
    followed by recurring administration savings, rather than generic seat
    usage.
businessModel:
  revenueStreams:
    - Annual per-enrolled-employee platform subscriptions
    - One-time migration implementation fees
    - Broker or advisor seat licenses
    - Premium compliance, benchmarking, and employee-communication modules
  unitOfValue: Covered enrolled employee on a live employer pension plan, with separate migration project scope per employer
  targetGrossMarginPct: 70
  expansionLevers:
    - Convert migration customers into recurring administration accounts
    - Expand from one employer to additional broker-managed employer books
    - Add premium benchmarking and compliance workflows once provider-rule data accumulates
    - Enter adjacent fragmented European benefits markets after Belgian playbooks are repeatable
strategyMap:
  northStarMetric: Covered employees migrated onto a new plan with zero critical payroll or reporting exceptions in the first contribution cycle
  inputMetrics:
    - Time from data receipt to completed incumbent-plan audit
    - Percent of payroll and provider fields auto-mapped without manual rework
    - Paid migration pilot to annual subscription conversion rate
    - Employee FAQ self-serve rate during migration
    - Broker-sourced share of qualified pipeline
  moatsToBuild:
    - Provider-rule and fee-structure library spanning insurer, OFP, and transfer edge cases
    - Normalized payroll plus DB2P mapping layer that reduces implementation risk with each migration
    - Employee communication corpus tied to actual reserve, transfer, and contribution questions
  killCriteria:
    - Fewer than 3 paid migration pilots signed within 9 months
    - More than 20% of required payroll or provider fields still need custom manual mapping after the first 5 pilots
    - Paid pilot to recurring subscription conversion below 40% after the first 6 employer projects
    - Broker-sourced opportunities remain below 20% of pipeline after a collaboration-first channel program is launched
  mermaid: |
    flowchart LR
      Wedge[Renewal-driven switching wedge] --> MVP[Migration workspace MVP]
      MVP --> Proof[Clean go-live and lower manual coordination]
      Proof --> Expansion[Recurring pension operations and channel expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong pain and credible buying triggers, but conviction stays limited until neutral workflow software proves it can capture budget in a domestically small market.
    whyBelieve: Research shows employers already switch when friction drops, and no incumbent appears to own a neutral, auditable migration layer across insurer, broker, payroll, and employee workflows.
    whyDoubt: Belgium alone is too small for venture returns, and fund-led or insurer-led products may bundle enough migration workflow to cap standalone software value.
    nextDiligence: Confirm 2-3 live employer renewals where the startup can shorten implementation time, reduce errors, and convert the project into recurring software revenue without broker pushback.
  firstCustomer:
    title: CFO or CHRO at a Belgian mid-market employer renewing a legacy group insurance plan
    profile: A 500-2,000 employee private-sector company using a common Belgian payroll stack, relying on a broker, and facing a pension renewal, harmonization, or redesign inside 12 months.
    trigger: Contract renewal, worker-group harmonization, or a benefits redesign that forces provider comparison and employee communication at the same time.
    buyer: CFO, CHRO, or Head of Total Rewards
    initialContract: $20k-$35k paid migration project plus $12k-$30k annual software subscription for 500-2,000 employees, converting to recurring administration after the first clean contribution cycle.
  mustBeTrue:
    - Brokers and consultants accept a collaboration-first model and help source at least part of the first pipeline instead of blocking the product.
    - The three most common target payroll and insurer file combinations can be normalized in under three weeks without bespoke engineering each time.
    - Buyer-facing outcome models are trusted enough to influence provider-selection decisions in real renewal processes.
    - At least half of paid migration projects convert into annual recurring administration subscriptions after go-live.
    - A neutral workflow layer can win budget even when the employer has not yet chosen one specific pension fund or insurer rail.
  diligenceQuestions:
    - Which exact renewal or harmonization events make CFOs and CHROs spend incremental budget instead of leaving the process with brokers and insurers?
    - How much manual cleanup is required on the first five payroll and incumbent-plan datasets?
    - What economic concession or workflow benefit does a broker need to actively co-sell this product?
    - Can the startup win when the employer stays with an incumbent insurer but still wants better switching and administration tooling?
    - What recurring workflow after go-live is valuable enough to sustain software retention beyond the migration event?
operatingAssumptions:
  - assumption: The first repeatable deployments can standardize around a small set of payroll exports and incumbent pension file formats.
    basis: research.yaml
    validationTest: Complete three dry-run migrations using anonymized files from design partners and measure how many mappings can be templated versus manually built.
    decisionImpact: If false, services load rises, margins compress, and the company must narrow the beachhead to fewer payroll or insurer combinations.
  - assumption: Brokers will treat the product as workflow infrastructure rather than as a threat to advisory economics.
    basis: research.yaml
    validationTest: Run ten broker interviews and secure two broker-involved pilots with explicit feedback on workflow ownership and revenue-share terms.
    decisionImpact: If false, direct-sales CAC rises, access to renewal events shrinks, and the product may need to target employers with weaker broker dependence.
  - assumption: Employers will pay a separate software and migration fee instead of expecting the capability to be bundled into fund, insurer, or broker economics.
    basis: idea.yaml
    validationTest: Test two paid pilot proposals with target employers and confirm willingness to approve a discrete budget line before the pension provider decision is finalized.
    decisionImpact: If false, ACV falls, TAM shrinks, and the company may need a bundled distribution model through brokers or pension institutions.
  - assumption: An employee portal and plain-language FAQ flow will materially reduce HR ticket volume during migration.
    basis: research.yaml
    validationTest: Compare support-ticket volume before and after launch across two pilot employers and measure employee portal usage during the switch period.
    decisionImpact: If false, employee engagement becomes a lower-priority roadmap item and the company should focus product resources on admin and compliance workflows.
  - assumption: Belgian migration know-how can become reusable software quickly enough to justify future cross-border expansion.
    basis: operator judgment
    validationTest: After the first five go-lives, measure implementation time reduction, template reuse, and recurring revenue conversion across accounts.
    decisionImpact: If false, the company becomes a local services-heavy niche business and should not raise for a European expansion story.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview 15 Belgian CFO, CHRO, payroll, and rewards leaders currently within a renewal or harmonization window.
    hypothesis: The strongest buying trigger is a forced review event where finance, HR, and employee communication all have to move together.
    successMetric: At least 8 buyers describe an active change event within 12 months and 4 agree to share workflow and data examples.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Run 10 broker and consultant interviews focused on collaboration mode, workflow ownership, and channel economics.
    hypothesis: A broker-friendly workspace will outperform a broker-displacement pitch in access to qualified opportunities.
    successMetric: At least 3 brokers agree to pilot or refer a live renewal workflow.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Execute 3 dry-run migrations using anonymized incumbent statements and payroll exports from design partners.
    hypothesis: The first canonical migration model can cover the most common data structures with less than 20% manual field mapping.
    successMetric: All 3 dry runs finish with reusable templates and under 3 weeks of setup each.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Launch 2 paid migration pilots with read-only audit, outcome modeling, broker workspace, and employee FAQ delivery.
    hypothesis: Buyers will fund a migration project before full recurring administration is live if the product reduces implementation risk.
    successMetric: 2 paid pilots signed and both reach go-live with no critical payroll or reporting defects.
    owner: Founder CEO
  - horizon: 90-180 days
    experiment: Measure employee support-ticket volume and portal engagement during the first live migrations.
    hypothesis: Plain-language employee communication will reduce HR support load enough to justify retention as a core feature.
    successMetric: 25%+ reduction in pension-related HR tickets and at least 50% employee portal activation in each pilot.
    owner: Pension operations lead
  - horizon: 180-365 days
    experiment: Add recurring contribution-change and new-hire workflows to converted customers and test annual subscription renewal.
    hypothesis: Post-go-live administration is the main path from one-off migration revenue to durable ARR.
    successMetric: At least 50% of completed migration pilots convert to annual subscription and show monthly workflow usage after go-live.
    owner: Founding eng
  - horizon: 180-365 days
    experiment: Formalize referral or implementation partnerships with 2 payroll or social-secretariat channels.
    hypothesis: Payroll-adjacent partners can reduce data-cleanup friction and shorten time to production.
    successMetric: 2 signed partners and 2 qualified opportunities sourced through those channels.
    owner: Channel partnerships lead
operations:
  - Provider and payroll mapping library with versioned templates for each supported migration path
  - Audit log for every plan-rule assumption, employee communication step, and compliance checkpoint
  - Role-based workspace for employer, broker, payroll, and pension-provider participants
  - Bilingual employee communication and FAQ workflow for Belgian deployments
  - Pilot operating cadence with weekly migration reviews and first-contribution-cycle postmortems
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Founder-led sales is required because the first sale is trigger-driven, consultative, and crosses finance, HR, broker, and provider stakeholders.
  - role: Founding eng
    startTiming: Month 0
    rationale: The core early risk is data normalization and workflow reliability across payroll, provider, and reporting systems.
  - role: Pension operations lead
    startTiming: Month 2
    rationale: The product needs in-house ownership of Belgian pension workflow, compliance edge cases, and implementation playbooks before scale.
  - role: Solutions engineer
    startTiming: Month 5
    rationale: Early customer success depends on fast payroll and provider setup, not just software roadmap velocity.
  - role: Channel partnerships lead
    startTiming: Month 9
    rationale: Broker and payroll partnerships become material only after the first reference migrations prove the workflow and economics.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 3 paid migration pilots in the Belgian mid-market beachhead
      - Reach clean go-live on the first 2 employer migrations with zero critical payroll or reporting defects
      - Template the first 3 payroll or provider migration patterns into reusable onboarding playbooks
      - Convert at least 1 broker and 1 payroll-adjacent partner into active referral channels
  - horizon: 12-24 months
    items:
      - Convert at least 50% of completed migration projects into annual recurring administration subscriptions
      - Support recurring contribution-change, new-hire, and offboarding workflows for live customers
      - Build benchmark reporting across completed migrations to improve pricing, proof, and implementation speed
      - Reach referenceable coverage across the main target payroll stacks in the initial Belgian segment
  - horizon: 24-36 months
    items:
      - Launch one adjacent European market pilot using the same migration-control-plane architecture
      - Expand from single-employer wins into broker-managed multi-employer books
      - Demonstrate that recurring administration revenue exceeds one-time migration revenue
risks:
  - risk: Brokers resist transparency because the product compresses bespoke advisory work.
    likelihood: High
    impact: High
    mitigation: Start with broker collaboration features, explicit role ownership, and channel economics that let brokers keep the client relationship.
  - risk: Data cleanup and payroll mapping take too much manual effort to deliver software-like margins.
    likelihood: High
    impact: High
    mitigation: Narrow the first segment to common payroll stacks, begin with read-only audits, and invest early in template reuse before expanding workflow scope.
  - risk: Fund-led or insurer-led competitors bundle enough migration workflow to make neutral software hard to price separately.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on neutral benchmarking, multi-provider workflow support, and employer-controlled auditability rather than portal UX alone.
  - risk: The Belgian market proves too small if recurring post-migration workflows do not retain customers.
    likelihood: Medium
    impact: High
    mitigation: Treat recurring administration conversion and implementation reuse as hard board metrics before hiring ahead of a European expansion story.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months should fund the founding product and implementation team, the first payroll and provider template library, 3-5 paid migration pilots, and evidence on recurring administration conversion before broader channel hiring or cross-border expansion.
