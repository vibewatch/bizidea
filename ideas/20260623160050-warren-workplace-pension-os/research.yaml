reportMemo:
  executiveTakeaways:
  - 'The real wedge is operational switching, not a prettier pension dashboard: Belgium already has regulated replacement rails, but employers still treat provider changes as brittle legal projects.'
  - 'This is an event-driven sale: harmonization deadlines, reorganisations, and provider reviews are the moments when CFO and CHRO attention actually appears.'
  - Belgium is a credible but narrow beachhead, so the venture case depends on turning local migration know-how into repeatable software and exporting it into other fragmented European benefits markets.
  - The biggest go-to-market risk is channel resistance from brokers and payroll administrators who currently monetize the mess; collaboration-first distribution is likelier to work than open disintermediation.
  marketDefinition: This category sits between pension product, broker service, and payroll administration. The defensible product is the migration and operations layer that audits the incumbent contract, models a replacement structure, coordinates the transfer, and keeps payroll, reporting, and employee communication aligned after go-live.
  customerAndBuyer: The daily user is the HR, payroll, or benefits manager who has to reconcile provider data, payroll changes, and employee questions. The economic buyer is typically the CFO, CHRO, or head of total rewards when a renewal, harmonization project, or organisational change forces a decision.
  buyingTriggers:
  - point: Blue-collar / white-collar harmonization and the 2030 deadline create forced review windows for supplementary pension plans.
    sourceRefs:
    - 25
    - 26
    - 30
  - point: Changes inside the company such as provider changes, mergers, or reorganisations expose how manual the current insurer-and-broker workflow still is.
    sourceRefs:
    - 18
    - 20
  - point: Employee job changes and reserve-transfer questions create a communication burden that HR teams currently solve with letters, FAQs, and ad hoc explanations.
    sourceRefs:
    - 27
    - 28
    - 29
    - 31
  willingnessToPay:
    summary: 'Budget clearly exists around pension administration and change management: employers already absorb special pension contributions, insurer/broker servicing, portal tooling, payroll integration, and outsourcing costs. A switching OS can attach to that budget line if it reduces paperwork, errors, and fee opacity.'
    sourceRefs:
    - 17
    - 18
    - 23
    - 24
  competitiveLandscape: 'Budget and trust are fragmented across four lanes: insurers that own the pension product, brokers that run the review project, payroll/social-secretariat players that own the employee-data plumbing, and new fee-light pension funds that improve economics but still sell their own rail. The startup wins only if it becomes the neutral switching layer across those lanes.'
  incumbentThesis:
  - incumbentClass: Insurers
    point: AG and NN already offer plan design and admin portals, but they still optimize around their own contract book rather than around making it easy for an employer to defect to a better structure.
    sourceRefs:
    - 18
    - 19
    - 20
    - 27
  - incumbentClass: Brokers and consultants
    point: Vanbreda-class advisers own the renewal conversation, yet their workflow is still service-led and bespoke rather than a reusable, auditable software control plane.
    sourceRefs:
    - 25
    - 26
    - 30
  - incumbentClass: Payroll and social secretariats
    point: SD Worx and Securex have the integration trust and payroll data, but not the pension-modeling and transfer-rights logic that makes provider switching safe.
    sourceRefs:
    - 23
    - 24
    - 32
  - incumbentClass: Pension funds and OFPs
    point: Prolocus and Warren prove that pooled pension-fund structures can be more transparent, but a fund does not automatically own the migration OS layer across multiple provider types.
    sourceRefs:
    - 12
    - 16
    - 21
    - 22
  regulatoryLandscape: 'The software cannot become the pension promise itself: Belgian second-pillar plans must sit with a licensed insurer or pension fund, and provider changes also pull in DB2P reporting, transfer-rights, disclosure, and worker-category harmonization logic. That makes the product a regulated-workflow control plane around the institution, not a shadow pension product.'
  technologyLandscape: This is mostly an integration and data-normalization problem, not frontier AI. The hard work is ingesting insurer documents and payroll exports, mapping them into DB2P-style entities, and giving employers, brokers, and employees secure role-based views through the migration.
  distributionChannels:
  - point: Founder-led direct sales into CFO, CHRO, and total-rewards owners should anchor the first deals, especially when harmonization or a provider review forces action.
    sourceRefs:
    - 25
    - 26
  - point: Broker and consultant co-sell is important because employers are explicitly told to consult their broker or social secretariat when harmonization and plan changes arise.
    sourceRefs:
    - 25
    - 32
  - point: Payroll and social-secretariat referrals are a natural expansion channel because clean payroll integration and admin relief are central to the value proposition.
    sourceRefs:
    - 23
    - 24
    - 32
  partnershipEcosystem:
  - point: Regulated pension institutions and OFPs matter because the software layer cannot replace the licensed vehicle that actually holds the pension promise.
    sourceRefs:
    - 7
    - 8
    - 21
  - point: Payroll and HR data partners matter because contributor, salary, and absence data must be moved cleanly into both payroll and pension-reporting workflows.
    sourceRefs:
    - 9
    - 10
    - 23
  - point: Employee-communication and member-portal tooling matters because trust during transfer is a material adoption lever, not an afterthought.
    sourceRefs:
    - 14
    - 27
    - 29
  dataMoats:
  - point: A reusable library of provider fee structures, plan rules, and migration edge cases becomes valuable once the product has benchmarked enough Branch 21, Branch 23, and OFP transitions.
    sourceRefs:
    - 12
    - 13
    - 17
    - 20
  - point: Normalized payroll-plus-DB2P mappings become defensible because every successful migration reduces the cost and risk of the next one.
    sourceRefs:
