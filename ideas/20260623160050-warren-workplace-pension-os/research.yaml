  - 31
openQuestions:
- How many 250-3,000 employee Belgian employers actually re-tender their supplementary pension provider each year outside mandatory harmonization or a corporate event?
- What percentage of the target market sits inside sector plans or other arrangements that materially limit provider choice?
- Will brokers embrace a migration workspace that makes their process more transparent, or will they protect service-heavy economics by resisting it?
- What contract value can a neutral migration OS win before it also bundles the pension product itself or expands cross-border?
