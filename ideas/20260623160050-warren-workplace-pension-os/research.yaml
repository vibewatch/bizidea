competitors:
- name: Warren
  stage: scale-up
  wedge: Fee-light regulated OFP plus employee app and coaching, sold on a fixed fee/member/month model instead of AUM charges.
  pricing: Fixed fee per member per month / fixed employer subscription; no entry or exit fees disclosed on key materials.
  strength: Closest direct proof that Belgian employers will move when product economics and employee experience improve together.
  weaknessVsUs: It is fund-led rather than neutral; buyers that want independent benchmarking and migration across multiple provider structures may not want to commit immediately to Warren’s own rail.
  sourceRefs:
  - 12
  - 15
  - 16
- name: OFP Prolocus
  stage: incumbent
  wedge: Occupational pension fund built for Flemish local authorities, with DC, DB, hybrid, and cash-balance variants.
  pricing: Employer-funded pension structure; no public software-style pricing disclosed.
  strength: Proves that pooled OFP administration can work in Belgium and that employers will accept non-insurer pension-fund structures.
  weaknessVsUs: Focused on local authorities and fund operation, not on neutral mid-market private-sector migration workflows across providers.
  sourceRefs:
  - 21
  - 22
- name: AG Employee Benefits
  stage: incumbent
  wedge: Product-first group insurance and supplementary-pension administration with multiple plan structures and an employee portal.
  pricing: Quote-led employer pricing; public pages emphasize employer-controlled budgets but do not disclose standard rates.
  strength: Deep distribution, broad plan-design menu, and credible ongoing administration for large Belgian employers.
  weaknessVsUs: AG’s tooling helps run AG contracts, but employer change workflows still route through contact managers rather than through a neutral switching workspace.
  sourceRefs:
  - 19
  - 20
- name: NN Belgium
  stage: incumbent
  wedge: Group insurance plus MyWorkplace portal for day-to-day employee-benefits administration.
  pricing: Quote-led pricing; no public standard fee card found.
  strength: Secure online administration, lower paperwork, and an installed group-insurance base make NN a credible incumbent for employers that prefer one accountable vendor.
  weaknessVsUs: MyWorkplace is a servicing portal, not a cross-provider audit and migration control plane.
  sourceRefs:
  - 18
  - 27
- name: SD Worx
  stage: incumbent
  wedge: Payroll outsourcing, integrations, and personnel-cost tooling that control the data plumbing around a pension switch.
  pricing: Custom enterprise / outsourcing pricing.
  strength: Owns payroll trust, integration depth, and a clear ROI story around fewer errors and less manual administration.
  weaknessVsUs: Controls the payroll layer but not the pension-comparison logic, transfer rights, or provider migration workflow end-to-end.
  sourceRefs:
  - 23
  - 24
regulatoryTechnicalConstraints:
- point: Supplementary pensions must be managed by an insurer or pension fund, so the startup must integrate with regulated institutions rather than sit in the balance-sheet chain itself.
  sourceRefs:
  - 7
  - 11
- point: DB2P / PensionPro reporting requires clean organiser, provider, and affiliate mappings plus versioned schema support.
  sourceRefs:
  - 9
  - 10
- point: Blue-collar / white-collar harmonization creates legal project dependencies through 2030 that can delay or reshape employer plan changes.
  sourceRefs:
  - 25
  - 26
  - 30
- point: Group-insurance comparisons touch the 8.86% employer social contribution, the Wijninckx contribution, the 80% rule, and payout-tax treatment, so modeling errors create real legal and budget risk.
  sourceRefs:
  - 17
  - 30
