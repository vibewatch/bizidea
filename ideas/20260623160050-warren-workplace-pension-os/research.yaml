market:
  tam:
    value: $21.1M
    rationale: '1,014,709 persons employed in Belgian 250+ private-sector enterprises [2]; assume 80% second-pillar coverage from the OECD/IOPS profile [4]; estimate ~$26 per covered member-year because the closest new entrant already sells a fixed fee/member/month model instead of AUM pricing [12][16]. Calc: 1,014,709 × 80% × $26.'
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 12
    - 16
  sam:
    value: $5.9M
    rationale: 'Constrain TAM to the practical beachhead by applying a 70% haircut to approximate employers in the 250-3,000 band inside the public 250+ bucket and a 40% haircut for legacy insurer-led plans where switching pain is acute. Calc: 1,014,709 × 80% × 70% × 40% × $26.'
    isEstimate: true
    sourceRefs:
    - 2
    - 4
    - 12
    - 16
  som:
    value: $1.1M
    rationale: Reachable year-3 share modeled as 60 employers × 700 covered members × $26 per member-year, assuming broker-assisted deployments around harmonization and renewal windows rather than a pure direct-sales motion.
    isEstimate: true
    sourceRefs:
    - 3
    - 23
    - 25
