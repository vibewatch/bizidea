    - 29
    - 31
  geographicConsiderations:
  - point: Belgium is multilingual and heavily shaped by sector agreements, so the software must handle both bilingual communication and legally different plan logics across worker groups.
    sourceRefs:
    - 25
    - 26
    - 30
  - point: Public-sector and local-authority pensions already run through a different institutional setup, so the private-sector mid-market remains the cleaner initial beachhead.
    sourceRefs:
    - 21
    - 22
  sensitivityCases:
  - case: Brokers insist on owning the project
    impact: The startup needs a broker-collaboration mode and channel economics that improve broker workflow instead of trying to delete the intermediary from day one.
    sourceRefs:
    - 25
    - 32
  - case: Incumbent insurers improve portals and service levels
    impact: Differentiation must stay on neutral fee modelling and transfer orchestration, because UX alone can be copied by insurer admin tools.
    sourceRefs:
    - 18
    - 19
    - 20
  - case: Data cleanup takes longer than expected
    impact: Implementation margins fall quickly unless payroll mappings and provider-specific import rules are templated early.
    sourceRefs:
    - 9
    - 10
    - 23
    - 24
  validationPlan:
  - priority: high
    question: Will Belgian brokers treat a migration workspace as an upgrade to their service model or as a threat to their economics?
    evidenceToGather: Ten broker interviews plus two live renewal pilots with explicit workflow and revenue-share feedback.
  - priority: high
    question: How much manual cleanup is required to map the three most common payroll exports and insurer statements into one canonical migration model?
    evidenceToGather: Three dry-run migrations using anonymized payroll exports and incumbent pension statements from design partners.
  - priority: medium
    question: Does an employee portal materially reduce HR ticket volume during a provider switch?
    evidenceToGather: Before-and-after support logs and FAQ volumes for at least two pilot employers.
  - priority: medium
    question: Can a per-member outcome model beat the incumbent broker memo on speed and clarity?
    evidenceToGather: Time-boxed buyer tests comparing a spreadsheet/broker pack against a software-generated outcome model on one real renewal.
