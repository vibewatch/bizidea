jobsToBeDone:
- job: 当我们完成一笔收购时，帮合规入职团队证明每位新顾问都完成了必做步骤，这样团队能更快激活，又不会把检查风险带进来。
  currentAlternative: 电子表格清单加上从多套系统里手工扒证据
  successMetric: 从交割到顾问激活所需天数，以及内审里缺失材料为零
- job: 当检查人员追问某个分支机构或新并购团队是如何遵循政策时，帮 CCO 迅速拿出站得住脚的证据包，不再临时救火，也减少检查问题。
