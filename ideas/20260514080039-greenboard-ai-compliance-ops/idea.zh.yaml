differentiator: 不同于那些想把自己做成完整系统记录层的综合合规套件，这家公司先咬住一个最痛的事件：监管压力下的新收购顾问入职。它真正的核心资产是一张证据图谱，能把现有工具里的动作串成监管看得懂、也经得起追问的执行叙事。这件事，手工顾问和通用工作流软件都很难复刻。只要先拿下这个滩头市场，同一套跨系统映射和异常语料，就能继续长到更高频的监督工作流里。
