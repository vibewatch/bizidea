topRisks:
- name: 现有套件向外扩张
  description: 大型合规厂商一旦看见需求，可能很快把入职工作流补进产品。
  mitigation: 先把并购后顾问入职这个细分场景吃透，深度接入现有厂商栈，并把最强的跨系统证据图谱做出来，而不是去做泛化套件。
- name: 集成复杂度过高
  description: 财富管理机构跑着大量异构老系统，部署可能因此放慢，ROI 也会被稀释。
  mitigation: 先覆盖 RIA 整合平台最常见的 4 套系统，只卖一个受限工作流，前几批客户用服务带着上。
- name: 自动化信任缺口
  description: 如果合规负责人担心 AI 给出幻觉式建议或漏掉异常，就不会轻易把关键流程交给系统。
  mitigation: 把人工审批牢牢留在环路里，让 AI 只负责证据拼装和异常分诊，并把每条建议背后的源记录全部记清楚。
