  adoptionFrictionMatrix:
  - friction: Integrating legacy systems and proving connector coverage
    severity: high
    affectedBuyer: CCO / compliance operations leader
    mitigation: Start with the smallest set of systems needed for one onboarding proof packet, then expand connector coverage after first value is proven.
    sourceRefs:
    - 20
    - 31
    - 33
  - friction: Trust in AI-generated guidance or routing
    severity: high
    affectedBuyer: CCO / legal / risk
    mitigation: Keep approvals expert-in-the-loop, log every recommendation, and expose the record sources behind each suggested action.
    sourceRefs:
    - 19
    - 37
    - 43
  - friction: Data-retention, privacy, and vendor-risk reviews
    severity: medium
    affectedBuyer: Compliance + security + IT
    mitigation: Use WORM-compatible retention patterns, narrow data scopes in pilots, and present explicit vendor-offboarding and incident-response controls.
    sourceRefs:
    - 3
    - 4
    - 10
    - 52
    - 63
  - friction: Change management for advisors and branch teams
    severity: medium
    affectedBuyer: Operations managers and onboarding leads
    mitigation: Land as a guided proof workflow that reduces meetings and paper before asking users to adopt a broader compliance operating model.
    sourceRefs:
    - 31
    - 44
    - 58
market:
  tam:
    value: $210.0M
    rationale: 'Bottom-up estimate: ((15,870 SEC-registered RIAs × 12.3% with 50+ employees) + 3,298 broker-dealers) × $40k estimated annual software budget = (1,952 + 3,298) × $40k ≈ $210.0M.'
    isEstimate: true
    sourceRefs:
    - 12
    - 13
    - 64
  sam:
    value: $22.1M
    rationale: 'Conservative beachhead uses only the 295 PE-backed RIAs as a proxy for frequent acquirers and excludes broker-dealer upside: 295 × $75k estimated annual contract value ≈ $22.1M.'
    isEstimate: true
    sourceRefs:
    - 17
    - 64
  som:
    value: $2.4M
    rationale: Reachable year-three case assumes 30 customers at roughly $80k ACV, consistent with urgent workflow savings and a focused land-and-expand motion inside the PE-backed buyer pool.
