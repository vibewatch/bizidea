openQuestions:
- How many PE-backed RIAs can buy an onboarding-proof layer from the CCO budget versus needing COO or integration-office sponsorship?
- Which source systems dominate the top 50 acquisitive RIAs, and therefore which connectors most constrain implementation speed?
- What proportion of onboarding proof pain sits in branch-level rep transitions versus full-acquisition team migrations?
- Can the first version avoid ingesting full communications content while still producing enough defensible evidence to satisfy compliance teams?
