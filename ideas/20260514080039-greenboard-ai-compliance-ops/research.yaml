competitors:
- name: Greenboard
  stage: scale-up
  wedge: AI-native securities compliance operating system spanning communications, employee, marketing, firm, and third-party workflows.
  pricing: Custom enterprise pricing
  strength: Broad books-and-records foundation plus multiple adjacent modules makes Greenboard a credible consolidator of existing compliance spend.
  weaknessVsUs: Broader platform scope can imply a heavier replacement motion, whereas the proposed startup is a thinner overlay for one acquired-advisor event first.
  sourceRefs:
  - 19
  - 20
  - 30
  - 31
- name: Hadrius
  stage: scale-up
  wedge: AI-native compliance platform centered on program management, marketing review, communications, employee oversight, and transaction monitoring.
  pricing: Custom enterprise pricing
  strength: Strong exam-ready and audit-trail positioning with clear ROI claims around time saved and false-positive reduction.
  weaknessVsUs: Positioning is broad and firm-wide, not specifically optimized around advisor-acquisition onboarding packets and cross-system cohort proof.
  sourceRefs:
  - 37
  - 43
  - 44
- name: ComplyRIA / Comply
  stage: incumbent
  wedge: Broad RIA compliance suite spanning registration, annual review, archiving, employee compliance, and consulting support.
  pricing: Custom pricing
  strength: One-stop-shop positioning plus services, registration support, annual reviews, and archiving give it procurement credibility with RIAs.
  weaknessVsUs: The product center of gravity is ongoing program administration and consulting rather than a lightweight evidence graph for post-acquisition onboarding.
  sourceRefs:
  - 48
  - 52
  - 56
  - 58
- name: Smarsh
  stage: incumbent
  wedge: Communications archiving and supervision platform for regulated firms.
  pricing: Vendr reports average contract value around $22,759, with per-user pricing commonly ranging from roughly $8 to $35+ per month
  strength: Deep capture coverage, WORM archiving, and audit-ready production make Smarsh a strong incumbent for communications evidence.
  weaknessVsUs: Smarsh solves communications retention well but does not by itself orchestrate the full onboarding proof packet across approvals, attestations, and policy exceptions.
  sourceRefs:
  - 63
  - 64
regulatoryTechnicalConstraints:
- point: Any product handling broker-dealer workflows must support books-and-records preservation, supervisory review, and retention obligations for business communications.
  sourceRefs:
