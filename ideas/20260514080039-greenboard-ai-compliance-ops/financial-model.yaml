scenarios:
  downside:
    description: Budget approval slips outside live acquisition windows, expansion modules land later, and implementation labor stays manual for longer.
    y3RevenueK: 1420.0
    y3EbitdaK: -525.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - Blended annual revenue per workflow unit settles near $120K instead of $135K.
    - Y3 workflow adds slow to roughly 1-2 per quarter, ending near 15 active units.
    - Gross margin exits near 68% because connector reuse and template automation arrive later.
  base:
    description: The company converts a handful of acquisitive RIA pilots into repeatable production workflows, then expands the second workflow motion inside existing logos.
    y3RevenueK: 1850.67
    y3EbitdaK: -192.96
    cashLowPointK: 580.66
    keyAssumptionChanges:
    - Annual revenue per active workflow unit reaches $135K by Y3 through implementation and module expansion.
    - Workflow adds follow 6 new units in Y2 and 11 in Y3, ending at 20 active units.
    - Gross margin rises from 50%-68% in Y1 pilots to 73% by Q4Y3 as templates and common connectors stabilize.
  upside:
    description: Partner referrals work earlier, buyers standardize the proof layer across more acquired cohorts, and second-workflow adoption lifts monetization without much extra headcount.
    y3RevenueK: 2280.0
    y3EbitdaK: 145.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Blended annual revenue per workflow unit reaches about $145K as more accounts buy add-on workflows sooner.
    - Y3 workflow adds accelerate to roughly 3-4 per quarter, ending around 24 active units.
    - Gross margin exits near 75% because implementation becomes mostly template-led.
sensitivity:
- variable: ARPU
  downsideCase: $120K annual revenue per active workflow unit
  baseCase: $135K annual revenue per active workflow unit
  upsideCase: $145K annual revenue per active workflow unit
  y3RevenueImpactK: -205.0
  cashImpactK: -150.0
- variable: CAC
  downsideCase: $60K CAC as founder-led cycles stay bespoke
  baseCase: $49K CAC
  upsideCase: $40K CAC via partner-sourced deals
  y3RevenueImpactK: -80.0
  cashImpactK: -185.0
- variable: churn
  downsideCase: 3.0% monthly churn after first annual terms
  baseCase: 2.0% monthly churn
  upsideCase: 1.5% monthly churn
  y3RevenueImpactK: -125.0
  cashImpactK: -95.0
- variable: sales cycle
  downsideCase: 9-month pilot-to-production cycle
  baseCase: 6-month blended cycle
  upsideCase: 4-5 month cycle with live-close urgency and warm partner intros
  y3RevenueImpactK: -320.0
  cashImpactK: -260.0
- variable: gross margin
  downsideCase: 68% steady-state gross margin
  baseCase: 73% steady-state gross margin
  upsideCase: 75% steady-state gross margin
  y3RevenueImpactK: 0.0
  cashImpactK: -95.0
- variable: hiring pace
  downsideCase: Add CSM and second seller two quarters earlier than modeled
  baseCase: Delay support and second GTM hire until workflow proof is visible
  upsideCase: Keep second seller until after 20 active units
  y3RevenueImpactK: -60.0
  cashImpactK: -145.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      PartnerReferrals --> QualifiedPilots
      FounderOutbound --> QualifiedPilots
      QualifiedPilots --> ActiveWorkflowUnits
      ActiveWorkflowUnits --> PlatformAndModuleRevenue
      PlatformAndModuleRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches 20 active workflow units by Q4Y3, with most revenue coming from converting onboarding pilots and then adding a second workflow inside existing RIA logos.
- checkName: Must go right
  finding: The company must keep pilot-to-production cycles around six months so the first seller is productive before the second GTM hire is added.
- checkName: Model breaks if
  finding: If pricing falls toward $120K per workflow unit and gross margin stalls near 68%, downside cash compresses toward roughly $140K before the next round proof is achieved.
- checkName: Next-round proof
  finding: A credible seed case is exiting Y2 with 4-6 production logos, 9 active workflow units, >70% gross margin, and at least one live expansion workflow on the same evidence graph.
sanityChecks:
  ruleOf40: Y3 growth 179.87% + EBITDA margin -10.43% = 169.44%
  burnMultiple: Y2 burn multiple 0.97x, improving to 0.12x in Y3 on net new ARR.
  revenuePerFte: $231.33K Y3 on 8 exit FTE (benchmark $200-400K SaaS)
  flags:
  - The model depends on treating workflow units, not logos, as the revenue driver; if customers only buy one workflow per logo, growth toward the research SOM slows materially.
  - Y1 and Y2 remain meaningfully EBITDA negative because the company invests in implementation capacity before the partner channel is proven.
  - Pricing assumes buyers will pay for implementation and add-on workflows in addition to the initial $75K-$100K annual platform subscription discussed in the business plan.
  - Cash low point lands in Q3Y3, so a slower-than-modeled partner channel would likely pull the next raise earlier even though Q4Y3 turns slightly EBITDA positive.
