topRisks:
  - name: Incumbent suite expansion
    description: Broad compliance vendors may extend into onboarding workflows once they see demand.
    mitigation: Own the post-acquisition onboarding niche first, integrate into incumbent stacks, and build the best cross-system evidence graph rather than a generic suite.
  - name: Integration complexity
    description: Wealth-management firms run heterogeneous legacy systems, which can slow deployment and dilute ROI.
    mitigation: Start with the four most common systems in RIA consolidators, sell a constrained workflow, and use services-led onboarding for the first cohort.
  - name: Automation trust gap
    description: Compliance leaders may resist relying on AI if they fear hallucinated guidance or missed exceptions.
    mitigation: Keep humans in approval loops, focus AI on evidence assembly and exception triage, and log every recommendation with underlying source records.
