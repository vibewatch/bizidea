jobsToBeDone:
  - job: >-
      When we close an acquisition, help our compliance onboarding team prove every new advisor completed the required steps, so
      we can activate the team quickly without creating exam risk.
    currentAlternative: Spreadsheet checklists plus manual evidence gathering from multiple systems
    successMetric: Days from close to advisor activation and zero missing artifacts in internal review
  - job: >-
      When an examiner asks how a branch or acquired team followed policy, help our CCO deliver a defensible evidence packet, so
      we can avoid scramble work and reduce findings.
    currentAlternative: Manual audit prep by internal staff and outside consultants
    successMetric: Hours to assemble exam packet and number of exceptions discovered late
