  pricing: 企业级定制报价
  strength: 以账簿与记录为底座，再叠加多个相邻模块，使 Greenboard 成为整合既有合规预算的可信平台。
  weaknessVsUs: 平台边界更宽，通常意味着更重的替换动作；而这家创业公司先卖的是一个围绕新收购顾问事件的更薄叠加层。
  sourceRefs:
  - 19
  - 20
  - 30
  - 31
- name: Hadrius
  stage: scale-up
  wedge: 以项目管理、营销审查、通讯、员工监督和交易监控为核心的 AI 原生合规平台。
  pricing: 企业级定制报价
  strength: 在检查就绪和审计轨迹上的定位很强，也给出了节省时间和降低误报的明确 ROI。
  weaknessVsUs: 它卖的是更宽泛、全公司的平台，不是专门为顾问并购入职证据包和跨系统批次证明做优化。
  sourceRefs:
  - 37
  - 43
  - 44
- name: ComplyRIA / Comply
  stage: incumbent
  wedge: 覆盖注册、年度审查、归档、员工合规和咨询服务的综合型 RIA 合规套件。
  pricing: 定制报价
  strength: 一站式定位，再叠加服务、注册支持、年度审查和归档，让它在 RIA 采购环节很有信用。
  weaknessVsUs: 产品重心仍是持续性项目管理和咨询，而不是围绕交割后入职的一张轻量证据图谱。
  sourceRefs:
  - 48
  - 52
  - 56
  - 58
- name: Smarsh
  stage: incumbent
  wedge: 服务受监管机构的通讯归档与监督平台。
  pricing: Vendr 报告其平均合同价值约为 $22,759，常见按用户定价区间约在每月 $8-$35+。
  strength: 深度抓取覆盖、WORM 归档和审计就绪生产能力，使 Smarsh 在通讯证据领域是很强的现有厂商。
  weaknessVsUs: Smarsh 很擅长解决通讯留痕，但单靠它并不能把审批、声明和政策异常一起编排成完整的入职证据包。
  sourceRefs:
  - 63
  - 64
regulatoryTechnicalConstraints:
- point: 只要产品涉及经纪交易商工作流，就必须支持业务通讯的账簿与记录保存、监督复核和留存义务。
  sourceRefs:
  - 2
  - 6
  - 7
  - 8
- point: 供应商及其下游供应商仍处在监督、尽调、事故响应和数据返还要求的范围内。
  sourceRefs:
  - 3
  - 4
  - 10
- point: 若 AI 被用于政策检索、任务分派或证据拼装，公司仍必须配套技术治理、隐私控制和人工监督。
  sourceRefs:
  - 4
  - 9
  - 19
  - 37
- point: 若入职材料涉及营销内容或背书，只要被审查或传播，就需要及时披露和可辩护留痕。
  sourceRefs:
  - 5
  - 43
validationSignals:
- point: 据报道，Root Financial 上线 Greenboard 后，在营销审查和相关手工工作上每周追回了约 24 小时。
  sourceRefs:
  - 18
  - 30
- point: 据报道，JMG Financial 把合规入职时间缩短了 60%，并在通讯监控上每周节省 10 小时以上。
  sourceRefs:
  - 18
  - 31
- point: Republic 报告称，采用 Hadrius 后，日常合规时间下降 60%，通讯审查时间至少下降 75%。
  sourceRefs:
  - 44
- point: DeVoe 统计 2025 年共有 322 笔 RIA 并购交易、95 个买家，说明反复面对整合任务的机构基数已经不小。
  sourceRefs:
  - 15
openQuestions:
- 在 PE 支持型 RIA 里，到底有多少家能从 CCO 预算直接购买一层入职证明产品，又有多少必须依赖 COO 或整合办公室背书？
- 最活跃的前 50 家持续并购 RIA，最常见的源系统到底是哪几套，因此真正卡住实施速度的连接器又是什么？
- 入职证明的痛点里，有多大一部分来自分支机构层面的代表迁移，而不是整支团队并购？
- 首版若不接入完整通讯内容，是否仍能产出足够有说服力、让合规团队接受的证据？
