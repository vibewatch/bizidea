  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品高度依赖厂商系统、通讯归档和敏感数据的接入；监管机构也明确要求公司继续监督外包供应商和 AI 提供商。这会抬高集成与尽调成本，但还不足以让任何一家供应商拥有绝对控制权。
      sourceRefs:
