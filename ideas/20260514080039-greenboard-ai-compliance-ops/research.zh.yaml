      - 52
    buyerPower:
      score: 4
      rationale: 滩头市场的买家既专业又相对集中：真正活跃的收购方就那么一小群，它们熟悉手工替代方案，而且市场上已有数家可信厂商可以满足相邻需求。
      sourceRefs:
      - 14
      - 15
      - 17
      - 48
    threatOfEntrants:
      score: 3
      rationale: AI 确实降低了部分产品开发门槛，但若没有监管信任、审计级 lineage 和生产级集成，新进入者仍很难被看作可信供应商。
      sourceRefs:
      - 9
      - 10
      - 37
      - 43
    threatOfSubstitutes:
      score: 4
      rationale: 电子表格、邮件、顾问和现有厂商模块仍是可用替代品，尤其在买家不想再上一个新系统的时候。
      sourceRefs:
      - 31
      - 48
      - 58
    competitiveRivalry:
      score: 4
      rationale: Greenboard、Hadrius、Comply 和 Smarsh 都在争同一笔合规运营预算，所以竞争是真实存在的，哪怕各自的切口不同。
      sourceRefs:
      - 20
      - 37
      - 48
      - 63
  pestle:
  - factor: 政治
    impact: neutral
    point: 政府换届也许会让部分专项整治的语气放缓，但财富管理机构仍要长期承担监督和留痕义务。
    sourceRefs:
    - 65
    - 66
    - 67
  - factor: 经济
    impact: positive
    point: PE 支持型整合仍在持续制造交割后整合事件，这会持续奖励工作流自动化和标准化能力。
    sourceRefs:
    - 14
    - 15
    - 17
  - factor: 社会
    impact: positive
    point: 行业顾问群体老龄化，加上持续向顾问制模式迁移，会继续强化整合趋势和对可扩展运营基础设施的需求。
    sourceRefs:
    - 12
    - 13
    - 16
  - factor: 技术
    impact: positive
    point: GenAI 能帮企业检索政策、总结记录和拼装证据，但前提是公司把监督和 lineage 控制先做扎实。
    sourceRefs:
    - 4
    - 9
    - 19
    - 37
  - factor: 法律
    impact: negative
    point: 账簿与记录、通讯、供应商监督和营销规则义务，决定了哪些信息必须被捕获，以及它们必须怎样被监督。
    sourceRefs:
    - 2
    - 5
    - 6
    - 7
    - 8
    - 10
    - 43
  adoptionFrictionMatrix:
  - friction: 接入老系统并证明连接器覆盖率
    severity: high
    affectedBuyer: CCO / 合规运营负责人
    mitigation: 先只接出完成 1 份入职证据包所需的最小系统集合，等首个价值被证明后再扩连接器覆盖。
    sourceRefs:
    - 20
    - 31
    - 33
  - friction: 是否信任 AI 生成的建议或分派
    severity: high
    affectedBuyer: CCO / 法务 / 风险
    mitigation: 审批继续让专家留在环里；每条建议都记日志，并把建议背后的记录来源直接暴露出来。
    sourceRefs:
    - 19
    - 37
    - 43
  - friction: 数据留存、隐私和供应商风险审查
    severity: medium
    affectedBuyer: 合规 + 安全 + IT
    mitigation: 试点阶段尽量收窄数据范围，使用兼容 WORM 的留存方式，并提前摆出清晰的供应商退出和事故响应控制。
    sourceRefs:
    - 3
    - 4
    - 10
    - 52
    - 63
  - friction: 顾问和分支团队的变更管理
    severity: medium
    affectedBuyer: 运营经理与入职负责人
    mitigation: 先把产品落成一条引导式证据工作流，先减少会议和纸面流转，再谈更宽的合规操作系统。
    sourceRefs:
    - 31
    - 44
    - 58
