scenarios:
  downside:
    description: 预算审批被拖到真实并购窗口之外，扩展模块落地更晚，而实施工作比预期更久停留在人工模式。
    y3RevenueK: 1420.0
    y3EbitdaK: -525.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - 每个工作流单元的混合年收入稳定在约 $120K，而不是 $135K。
    - 第 3 年新增工作流放慢到每季度约 1-2 个，期末约 15 个活跃单元。
    - 由于连接器复用和模板自动化来得更晚，毛利率最终只能停在约 68%。
  base:
    description: 公司把少数几家持续并购的 RIA 试点转成可复制的生产工作流，再在现有客户内推动第二工作流扩张。
    y3RevenueK: 1850.67
    y3EbitdaK: -192.96
    cashLowPointK: 580.66
    keyAssumptionChanges:
    - 到第 3 年，每个活跃工作流单元的年收入提升到 $135K，主要来自实施费和模块扩张。
    - 新增工作流单元按 Y2 新增 6 个、Y3 新增 11 个推进，期末做到 20 个活跃单元。
    - 随着模板和常见连接器稳定，毛利率会从第 1 年试点期的 50%-68%，提升到 Q4Y3 的 73%。
  upside:
    description: 伙伴转介绍更早跑通，买家把证据层标准化到更多新收购批次里，第二工作流也在几乎不增加人头的情况下推高变现。
    y3RevenueK: 2280.0
    y3EbitdaK: 145.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - 随着更多客户更早购买附加工作流，每个工作流单元的混合年收入提升到约 $145K。
    - 第 3 年新增工作流加速到每季度约 3-4 个，期末接近 24 个活跃单元。
    - 由于实施已大多模板化，毛利率最终可来到约 75%。
sensitivity:
- variable: ARPU
  downsideCase: $120K annual revenue per active workflow unit
  baseCase: $135K annual revenue per active workflow unit
  upsideCase: $145K annual revenue per active workflow unit
  y3RevenueImpactK: -205.0
  cashImpactK: -150.0
- variable: CAC
  downsideCase: $60K CAC as founder-led cycles stay bespoke
  baseCase: $49K CAC
  upsideCase: $40K CAC via partner-sourced deals
  y3RevenueImpactK: -80.0
  cashImpactK: -185.0
- variable: churn
  downsideCase: 3.0% monthly churn after first annual terms
  baseCase: 2.0% monthly churn
  upsideCase: 1.5% monthly churn
  y3RevenueImpactK: -125.0
  cashImpactK: -95.0
- variable: 销售周期
  downsideCase: 9 个月试点到生产周期
  baseCase: 6 个月混合周期
  upsideCase: 在真实交割紧迫感和伙伴暖介绍推动下缩短到 4-5 个月
  y3RevenueImpactK: -320.0
  cashImpactK: -260.0
- variable: 毛利率
  downsideCase: 68% 稳态毛利率
  baseCase: 73% 稳态毛利率
  upsideCase: 75% 稳态毛利率
  y3RevenueImpactK: 0.0
  cashImpactK: -95.0
- variable: 招聘节奏
  downsideCase: 比模型提前两个季度招入 CSM 和第二名销售
  baseCase: 在工作流价值被验证前，继续延后支持和第二个 GTM 招聘
  upsideCase: 把第二名销售推迟到 20 个活跃单元之后再招
  y3RevenueImpactK: -60.0
  cashImpactK: -145.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      PartnerReferrals --> QualifiedPilots
      FounderOutbound --> QualifiedPilots
      QualifiedPilots --> ActiveWorkflowUnits
      ActiveWorkflowUnits --> PlatformAndModuleRevenue
      PlatformAndModuleRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形在 Q4Y3 做到 20 个活跃工作流单元；大部分收入来自把入职试点转成生产，再在现有 RIA 客户内加上第二工作流。
- checkName: 必须跑通的事
  finding: 公司必须把试点到生产周期守在约 6 个月，这样第一名销售在第二个 GTM 岗位加入前才能真正跑出产能。
- checkName: 模型会在哪种情况下失效
  finding: 若定价下滑到每个工作流单元约 $120K，且毛利率卡在约 68%，那么在下一轮融资证明完成前，现金低点会被压到约 $140K。
- checkName: 下一轮证明
  finding: 一个可信的 seed 故事，应是在第 2 年结束时做到 4-6 家生产客户、9 个活跃工作流单元、70%+ 毛利率，并在同一张证据图谱上至少跑通 1 个扩展工作流。
sanityChecks:
  ruleOf40: 第 3 年增长 179.87% + EBITDA 利润率 -10.43% = 169.44%
  burnMultiple: Y2 burn multiple 为 0.97x，到 Y3 随着净新增 ARR 提升，改善到 0.12x。
  revenuePerFte: 第 3 年每名 FTE 对应收入为 $231.33K，按期末 8 名 FTE 计算（SaaS 基准为 $200-400K）。
  flags:
  - 模型默认收入驱动来自工作流单元，而不是客户数；如果客户每家只买 1 个工作流，向研究里 SOM 靠近的速度会明显放慢。
  - 第 1 年和第 2 年的 EBITDA 仍明显为负，因为公司要在伙伴渠道被验证前，先把实施能力投出来。
  - 定价默认买家除了 business plan 里提到的 $75K-$100K 年度平台订阅，还会愿意为实施和附加工作流继续付费。
  - 现金低点落在 Q3Y3，因此若伙伴渠道比模型更慢，下一轮融资大概率要提前，即便 Q4Y3 已轻微转正。
