topRisks:
- name: 现有工作流厂商
  description: 客服工单、CRM 或智能体构建器厂商可能补上一层轻量审批闸门，试图把这个品类吸进去。
  mitigation: 靠跨系统攻击回放、面向欺诈的策略包，以及异构栈上的运行时证据去赢——这些都不是单一厂商能完整掌控的。
- name: 落动作智能体推进慢于预期
  description: 有些企业可能会让客服智能体更久地停在仅辅助模式，拖慢对执行层控制的预算释放。
  mitigation: 先把影子模式测试卖给那些已经承受账号找回或退款自动化压力的团队，再在真正上线时扩到运行时控制。
- name: 集成与误报负担
  description: 如果太早把部署面铺得太宽，内部后台接入和误拦真实动作都可能拖慢客服效率。
  mitigation: 从密码重置或退款这样的单一工作流起步，先在观察模式里学出审批基线，精度达标后再扩。
