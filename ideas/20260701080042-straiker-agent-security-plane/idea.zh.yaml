jobsToBeDone:
- job: 当我们准备让 AI 客服智能体审批账号找回或退款时，帮安全和客服团队把滥用案例回放出来，并划清安全动作边界，这样我们就能在不制造账号接管或收入流失的前提下把自动化放出去。
  currentAlternative: 纯人工队列，加上手工质检和零散的欺诈规则。
  successMetric: 在零高严重度安全或欺诈事故的前提下，可自动化客服工单的占比。
- job: 当智能体准备执行高风险用户变更动作时，帮信任安全团队要求更强核验，或直接停下这次动作，这样我们就能在几分钟内把影响面控住，而不是等到事故公开后再补救。
  currentAlternative: 事后再从 Zendesk、CRM 和内部后台日志里拼凑审计。
  successMetric: 拦下或提级一笔高风险客服智能体动作的平均时间稳定低于 5 分钟。
