  adoptionFrictionMatrix:
  - friction: Integrating cross-stack actions and permissions across help desk, CRM, email, and internal admin tools
    severity: high
    affectedBuyer: VP Customer Platform Engineering
    mitigation: Start with one protected workflow and reuse the existing OAuth, API, and action surfaces instead of trying to normalize every tool on day one.
    sourceRefs:
    - 5
    - 10
    - 16
  - friction: False positives that slow legitimate account recovery or refunds
    severity: high
    affectedBuyer: Head of Support Operations
    mitigation: Run historical-ticket replay in shadow mode first and convert hard blocks into step-up approval until precision is proven.
    sourceRefs:
    - 44
    - 94
    - 126
  - friction: Privacy and retention concerns when replaying historical tickets
    severity: medium
    affectedBuyer: CISO / Privacy Counsel
    mitigation: Tokenize or minimize sensitive ticket data and align evidence retention to the customer’s existing trust and privacy controls.
    sourceRefs:
    - 55
    - 130
  - friction: Budget ownership split between CX, security, fraud, and trust teams
    severity: medium
    affectedBuyer: CISO / VP CX Platform
    mitigation: Sell against production-readiness gates and incident avoidance rather than generic AI ROI alone.
    sourceRefs:
    - 6
    - 43
    - 103
  - friction: Platform vendors shipping their own monitoring and trust features
    severity: medium
    affectedBuyer: Enterprise Architecture / Procurement
    mitigation: Position as the neutral cross-stack mutation-control and incident-evidence layer rather than a replacement for the support platform.
