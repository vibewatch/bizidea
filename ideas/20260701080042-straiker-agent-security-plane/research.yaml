market:
  tam:
    value: $330M
    rationale: Estimate 3,000 global beachhead enterprises x 750 governed support mutations/day x 365 days x $0.40 per protected action (~40% of Fin’s public $0.99/outcome benchmark) = about $329M; cross-checked
      against visible AI-support adoption and platform spend.
    isEstimate: true
    sourceRefs:
    - 6
    - 41
    - 43
    - 53
  sam:
    value: $99M
    rationale: 'Assume 30% of TAM units are North America and Europe consumer platforms with enough AI-adoption and governance urgency for near-term buying: 900 accounts x $109.5k implied ARR each = about
      $98.6M.'
    isEstimate: true
