competitors:
- name: Straiker
  stage: scale-up
  wedge: Horizontal agentic-AI security spanning discovery, adversarial testing, and runtime protection.
  pricing: Custom enterprise pricing; public pricing not listed.
  strength: Clear control-plane narrative plus discovery, red teaming, and runtime blocking across agent types.
  weaknessVsUs: Broad agent-security scope is not purpose-built around support-specific mutations like password resets, refunds, or entitlements.
  sourceRefs:
  - 119
  - 121
  - 123
- name: Zenity
  stage: scale-up
  wedge: AI security posture management, observability, and detection/response for enterprise AI ecosystems.
  pricing: Custom enterprise pricing; public pricing not listed.
  strength: Strong cross-platform governance story across ecosystems such as Agentforce, Microsoft, and ServiceNow.
  weaknessVsUs: More horizontal posture and observability than workflow-specific replay and step-up control for support actions.
  sourceRefs:
  - 29
- name: Noma Security
  stage: scale-up
  wedge: AI security posture, agentic access control, red teaming, and runtime protection.
  pricing: Custom enterprise pricing; public pricing not listed.
  strength: Security-depth positioning around access control and runtime enforcement.
  weaknessVsUs: Designed for the broader AI stack rather than a narrow support-operations mutation boundary with replayable ticket history.
  sourceRefs:
  - 23
- name: Salesforce Agentforce
  stage: incumbent
  wedge: Native autonomous service agents with platform observability, partner actions, and deep Salesforce data access.
  pricing: Free builder tier plus $500 per 100k flex credits; Service Cloud starts at $25/user/month.
  strength: Owns the workflow, data, and action surface inside one of the dominant enterprise service stacks.
  weaknessVsUs: Stack-specific control does not solve neutral security policy across Zendesk, Intercom, mail, and off-platform admin tooling.
  sourceRefs:
  - 8
  - 40
  - 48
  - 65
- name: Zendesk AI agents
  stage: incumbent
  wedge: Resolution-focused AI agents embedded in the Zendesk service platform with actions, analytics, and trust controls.
  pricing: $55 per agent/month for Suite Team paid yearly, with higher tiers and add-ons for more advanced AI.
  strength: Strong support-domain data, actions in authorized systems, and native QA/trust tooling inside Zendesk.
  weaknessVsUs: Best inside Zendesk, but not designed as a cross-stack security gate for risky mutations spanning external admin tools and custom recovery flows.
  sourceRefs:
  - 10
  - 53
  - 87
regulatoryTechnicalConstraints:
- point: Action-taking support agents inherit powerful delegated permissions, so least-privilege scoping is a product requirement rather than a later hardening step.
  sourceRefs:
  - 5
  - 16
- point: Indirect prompt injection can arrive through emails, documents, and external content, which means replay tests must include hostile-content scenarios, not just happy paths.
  sourceRefs:
  - 18
  - 20
- point: Account recovery and password-reset workflows need identity-proofing and authentication lifecycle policies strong enough for privileged mutations.
  sourceRefs:
  - 103
  - 131
- point: Deployers need human oversight, logging, and data-minimization controls around AI-supported account changes and customer-data handling.
  sourceRefs:
  - 12
  - 13
  - 128
  - 130
