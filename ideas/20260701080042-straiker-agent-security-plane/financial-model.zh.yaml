slug: support-action-replay-gate
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始时点现金
  value: '3000'
  unit: K USD
  source: '[BP fundingAsk targetFundingRangeUsd $2.5-4.0M and runwayMonths 18]；基础情景假设在 2026-07 之前完成一笔 $3.0M 的 种子前轮融资。'
- id: A2
  name: 起始付费客户数
  value: '0'
  unit: accounts
  source: '[BP milestones and firstCustomer]；模型起点假设还没有现成的付费账户。'
- id: A3
  name: 付费试点单价
  value: '50'
  unit: K USD per pilot
  source: '[BP firstCustomer.initialContract $35k-$60k paid pilot]；按中位数附近向上取整到 $50k。'
- id: A4
  name: 试点收入确认周期
  value: '2'
  unit: months
  source: '[BP gtm pricing 6-8 week pilot]；按 2 个月平均确认。'
- id: A5
  name: 首个工作流正式生产 ARR
  value: '120'
  unit: K USD per customer-year
  source: '[BP firstCustomer.initialContract $100k-$150k annual production contract]；基础情景按偏保守的中位附近 $120k 建模。'
- id: A6
  name: 扩容 ARR 增量
  value: '25'
  unit: K USD per expanded customer-year
  source: '[BP businessModel.revenueStreams plus milestones for second workflow and premium evidence modules]；对每个扩容账户采取保守附加收入。'
- id: A7
  name: 扩容附加率
  value: 15 by Q4Y2; 35 by Q4Y3
  unit: pct of production customers
  source: '[BP milestones：至少一半生产客户应在 12 个月内扩到第二条工作流]；模型用更低的综合附加率，因为较新的客户批次还没来得及完成第二条工作流扩容。'
- id: A8
  name: 毛利率爬坡
  value: 65 Y1; 70 Y2; 72 Y3
  unit: pct
  source: '[BP businessModel targetGrossMarginPct 70]；基础情景假设打包集成让 Y3 毛利率略高于目标。'
- id: A9
  name: 月度生产客户流失率
  value: '1.5'
  unit: pct
  source: 早期企业安全软件的创业财务经验值：粘性较强，但仍高于成熟基础设施软件的标杆。
- id: A10
  name: 第 1 年付费试点转正式生产率
  value: '67'
  unit: pct
  source: '[BP milestones target 3 paid pilots and 2 production deployments in the first 12 months]；按第一个 3 个试点里有 2 个在 Y1 内转化来建模。'
- id: A11
  name: 第 1 年付费客户节奏
  value: M6 1; M8 2; M11 3; M12 3
  unit: accounts
  source: '[BP milestones]；Y1 的 customersEop 同时计入付费试点和正式生产，因为试点是第一个产生收入的状态。'
- id: A12
  name: 试点后的正式生产客户节奏
  value: Q1Y2 4; Q2Y2 7; Q3Y2 9; Q4Y2 13; Q1Y3 17; Q2Y3 22; Q3Y3 27; Q4Y3 32
  unit: accounts
  source: '[BP milestones 12-15 production customers by 12-24 months]，再叠加一个由伙伴助推的 Y3 扩张经验假设，与 BP sequencingRationale 保持一致。'
- id: A13
  name: 创始人/管理层全负担薪酬
  value: '180'
  unit: K USD per FTE-year
  source: 创业财务经验值：创始人工资加 20% 税费与福利负担。
- id: A14
  name: 工程研发全负担薪酬
  value: '210'
  unit: K USD per FTE-year
  source: 创业财务经验值：资深产品或后端工程师工资加 20% 税费与福利负担。
- id: A15
  name: 安全/策略全负担薪酬
  value: '216'
  unit: K USD per FTE-year
  source: 创业财务经验值：安全工程师溢价工资加 20% 税费与福利负担。
- id: A16
  name: 解决方案/集成全负担薪酬
  value: '198'
  unit: K USD per FTE-year
  source: 创业财务经验值：集成工程师工资加 20% 税费与福利负担。
- id: A17
  name: 客户成功/合作全负担薪酬
  value: '174'
  unit: K USD per FTE-year
  source: 创业财务经验值：早期售后或渠道负责人工资加 20% 税费与福利负担。
- id: A18
  name: 销售/GTM 全负担薪酬
  value: '192'
  unit: K USD per FTE-year
  source: 创业财务经验值：早期企业 GTM 招聘工资加 20% 税费与福利负担。
- id: A19
  name: 行政/运营全负担薪酬
  value: '156'
  unit: K USD per FTE-year
  source: 创业财务经验值：财务或运营通才工资加 20% 税费与福利负担。
- id: A20
  name: 第 1 年招聘顺序
  value: Founder and founding eng M1; security/policy M4; solutions M6; partnerships/CS M10
  unit: month
  source: '[BP team]。'
- id: A21
  name: Y2-Y3 招聘延伸
  value: Sales M15; engineering M16 and M27; solutions M19; ops M22; security M29; sales M30; CS M32
  unit: month
  source: 这是 [BP sequencingRationale] 的经验外推，用来支撑 BP 里 Y2 达到 13 个、Y3 达到 32 个生产客户的里程碑路径。
- id: A22
  name: 非薪酬 Opex 爬坡
  value: R&D tools 5-11; GTM programs 3-30; G&A legal/compliance 5-8
  unit: K USD per month
  source: 创业财务经验值，与创始人主导的企业销售路径以及安全/合规工具支出需求保持一致。
- id: A23
  name: 融资覆盖跑道目标
  value: '24'
  unit: months
  source: '[Repo instruction plus BP runwayMonths 18]；融资规模按 Q4Y2 证明点外加约 6 个月额外缓冲来设计。'
- id: A24
  name: 稳态单位经济 ARPU
  value: '135'
  unit: K USD per customer-year
  source: '[A5 first-workflow ARR plus A6 expansion uplift weighted by A7 attach]；这项用于单位经济模型，不含试点收入。'
- id: A25
  name: CAC
  value: '60'
  unit: K USD per new production customer
  source: 由 Y2 创始人主导销售和早期 GTM 支出，对应新增正式生产客户数倒推出，再与企业安全 SaaS 的经验值交叉校验。
