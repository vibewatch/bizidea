  upsideCase: 如果试点走慢，可把 2 个非关键岗位推迟到 Q4Y2 之后
  y3RevenueImpactK: 0.0
  cashImpactK: -320.0
modelDiagram:
  title: 客服动作安全收入飞轮
  mermaid: "flowchart LR\n  DesignPartners[共创客户] --> PaidPilots[付费试点]\n  PaidPilots --> ProductionCustomers[正式生产客户]\n  ProductionCustomers --> BaseSubscription[基础订阅]\n  ProductionCustomers --> UsageAndExpansion[按量收入与扩容]\n  BaseSubscription --> Revenue[收入]\n  UsageAndExpansion --> Revenue\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下，Y3 收入来自：把 Y1 的 3 个试点转成 Y2 的 13 个生产客户底盘，再叠加伙伴带来的新生产客户和第二条工作流 增购，最终在 Q4Y3 到 32 个客户。
- checkName: 必须跑通的事
  finding: 打包部署路径必须把销售周期守在 6 个月左右，因为在敏感性表里，销售周期滑坡对 Y3 收入和现金的综合打击最大。
- checkName: 模型失效条件
  finding: 如果会落动作的客服项目长期停在辅助模式，正式生产客户卡在 20 个附近，downside 情景会让公司在下一轮融资前把现金打到零以下。
- checkName: 下一轮证明点
  finding: 只有当公司在 Q4Y2 走出大约 13 个正式生产客户、能看见第二条工作流附加率，而且伙伴来源 商机管道 足以支撑 Y3 爬坡时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 增速 246% + EBITDA 利润率 -14% = 232%（主要受 Y2 基数较小影响）。
  burnMultiple: Y2 burn multiple 约为 0.8x，对应约 $1.45M 的净新增 ARR；到 Y3，随着经常性收入追上招聘节奏，这一指标会改善到约 0.1x。
  revenuePerFte: 按年末 14 FTE 计，Y3 人均收入约 $231K（SaaS 参考带为 $200-400K）。
  flags:
  - Y1 收入故意做成了台阶状，因为模型遵循的是 BP 里“付费试点 → 年度合同”的节奏，而不是假设从 第一天 就是平滑的 SaaS MRR。
  - 基础情景高度依赖可接 API 的后台工具和打包集成；如果工作流主要跑在只读浏览器后台里，部署会变慢、毛利率也会被压缩。
  - 即便到 Q4Y3，季度 EBITDA 也只是小幅转正，因此公司更应该在 Q4Y2 到 Q2Y3 的证明点去融资，而不是等现金继续往下烧。
  - Rule of 40 看上去异常高，主要因为 Y2 收入基数太小；投资人更该盯的是转化证明、毛利率爬坡，以及 burn multiple。
