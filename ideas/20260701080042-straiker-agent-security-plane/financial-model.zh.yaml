scenarios:
  downside:
    description: 如果会落动作的客服工作流采用延后约两个季度，那么正式生产客户增长和扩容附加率都会落后于基础情景。
    y3RevenueK: 1791.0
    y3EbitdaK: -1333.3
    cashLowPointK: -459.1
    keyAssumptionChanges:
    - 因为销售周期被拉长到接近 9 个月，Q4Y2 的正式生产客户大约只有 10 个，而不是 13 个；Q4Y3 也只到约 20 个，而不是 32 个。
    - 由于第二条工作流附加和高级证据模块更晚落地，稳态 ARPU 会往 $110K 靠。
    - 毛利率最高只能到约 70%，因为部署会持续更偏服务化。
  base:
    description: Y1 拿下 3 个付费试点，打包部署路径在 Q4Y2 前跑出 13 个正式生产客户，再借助伙伴扩张在 Q4Y3 把客户数拉到 32 个。
    y3RevenueK: 3236.2
    y3EbitdaK: -441.5
    cashLowPointK: 623.8
    keyAssumptionChanges:
    - 前 3 个付费试点里有 2 个在 Y1 内转化，第三个在 Y2 初转成正式生产。
    - 正式生产客户从 Q4Y2 的 13 个扩到 Q4Y3 的 32 个，同时保持温和的第二条工作流附加率。
    - 随着集成打包、服务强度下降，毛利率会从 Y1 的 65% 提升到 Y3 的 72%。
  upside:
    description: 如果试点转化、伙伴带单和扩容附加率都好于预期，公司会更快从第一条工作流切到可重复的多工作流扩张路径。
    y3RevenueK: 4482.6
    y3EbitdaK: 545.6
    cashLowPointK: 1308.9
    keyAssumptionChanges:
    - 随着销售周期压缩到约 4.5-5 个月，Q4Y2 的正式生产客户可到约 17 个，Q4Y3 可到约 40 个。
    - 因为第二条工作流和证据模块更早附加，稳态 ARPU 会向 $150K 抬。
    - 更干净的打包路径能拿到约 74% 的毛利率，因为定制集成工作被进一步削减。
