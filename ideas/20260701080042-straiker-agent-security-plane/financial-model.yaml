    y3RevenueImpactK: -470.0
    cashImpactK: -330.0
  - variable: CAC
    downsideCase: "$80K CAC because channel leverage arrives late"
    baseCase: "$60K CAC"
    upsideCase: "$45K CAC with partner-sourced deals"
    y3RevenueImpactK: -180.0
    cashImpactK: -380.0
  - variable: churn
    downsideCase: "2.5% monthly production churn"
    baseCase: "1.5% monthly production churn"
    upsideCase: "1.0% monthly production churn"
    y3RevenueImpactK: -290.0
    cashImpactK: -210.0
  - variable: sales cycle
    downsideCase: "9-month enterprise cycle with slower production approvals"
    baseCase: "6-month cycle from pilot to annual contract"
    upsideCase: "4.5-month cycle after packaged deployment proof"
    y3RevenueImpactK: -650.0
    cashImpactK: -520.0
  - variable: gross margin
    downsideCase: "70% Y3 gross margin because custom integrations stay high"
    baseCase: "72% Y3 gross margin"
    upsideCase: "75% Y3 gross margin with cleaner packaging"
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
  - variable: hiring pace
    downsideCase: "Pull two hires forward before packaged deployment is repeatable"
    baseCase: "Current milestone-gated hiring plan"
    upsideCase: "Delay two noncritical hires until Q4Y2 if pilots slip"
    y3RevenueImpactK: 0.0
    cashImpactK: -320.0
modelDiagram:
  title: support-action security revenue loop
  mermaid: |
    flowchart LR
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> BaseSubscription
      ProductionCustomers --> UsageAndExpansion
      BaseSubscription --> Revenue
      UsageAndExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case Y3 revenue comes from converting three Y1 pilots into a 13-customer Y2 base and then adding partner-assisted production customers plus second-workflow upsell to reach 32 customers by Q4Y3."
  - checkName: Must go right
    finding: "The packaged deployment path has to keep the sales cycle near six months because sales-cycle slippage is the biggest combined hit to Y3 revenue and cash in the sensitivity table."
  - checkName: Model breaks if
    finding: "If action-taking support programs stay assistive-only and production customers stall near 20, the downside scenario drives cash below zero before the next round."
  - checkName: Next-round proof
    finding: "The next financing is justified if the company exits Q4Y2 with roughly 13 production customers, visible second-workflow attach, and enough pipeline from partners to support the Y3 ramp."
sanityChecks:
  ruleOf40: "Y3 growth 246% + EBITDA margin -14% = 232% (small-base effect from Y2)."
  burnMultiple: "Y2 burn multiple is roughly 0.8x on about $1.45M of net new ARR and improves toward 0.1x in Y3 as recurring revenue catches up to hiring."
  revenuePerFte: "$231K Y3 revenue per end-of-year FTE (14 FTE; benchmark $200-400K SaaS)."
  flags:
    - "Y1 revenue is intentionally lumpy because the model follows the BP sequence of paid pilots converting into annual contracts rather than assuming straight-line SaaS MRR from day one."
    - "The base case depends on API-accessible admin tools and packaged integrations; browser-only back-office workflows would slow deployment and compress gross margin."
    - "Q4Y3 still reaches only modest positive quarterly EBITDA, so the company should raise the next round from Q4Y2 to Q2Y3 proof points rather than waiting for cash to run lower."
    - "Rule of 40 looks unusually high because Y2 revenue starts from a small base; investors should focus more on conversion proof, gross margin progress, and burn multiple."
