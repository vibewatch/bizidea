slug: support-action-replay-gate
date: '2026-07-01'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: Starting cash at model start
    value: "3000"
    unit: K USD
    source: "[BP fundingAsk targetFundingRangeUsd $2.5-4.0M and runwayMonths 18]; base case uses a $3.0M pre-seed close before 2026-07."
  - id: A2
    name: Starting paying customers
    value: "0"
    unit: accounts
    source: "[BP milestones and firstCustomer]; no existing paying accounts are assumed at model start."
  - id: A3
    name: Paid pilot fee
    value: "50"
    unit: K USD per pilot
    source: "[BP firstCustomer.initialContract $35k-$60k paid pilot]; midpoint rounded to $50k."
  - id: A4
    name: Pilot revenue recognition period
    value: "2"
    unit: months
    source: "[BP gtm pricing 6-8 week pilot]; modeled evenly across 2 months."
  - id: A5
    name: First workflow production ARR
    value: "120"
    unit: K USD per customer-year
    source: "[BP firstCustomer.initialContract $100k-$150k annual production contract]; base case uses a conservative midpoint-ish $120k."
  - id: A6
    name: Expansion ARR uplift
    value: "25"
    unit: K USD per expanded customer-year
    source: "[BP businessModel.revenueStreams plus milestones for second workflow and premium evidence modules]; conservative add-on per expanded account."
  - id: A7
    name: Expansion attach rate
    value: "15 by Q4Y2; 35 by Q4Y3"
    unit: pct of production customers
    source: "[BP milestones says at least half of production customers should expand within 12 months]; model uses a lower blended attach rate because newer cohorts have not aged into second-workflow expansion yet."
  - id: A8
    name: Gross margin progression
    value: "65 Y1; 70 Y2; 72 Y3"
    unit: pct
    source: "[BP businessModel targetGrossMarginPct 70]; base case assumes packaged integrations lift margin slightly above target by Y3."
  - id: A9
    name: Monthly production churn
    value: "1.5"
    unit: pct
    source: "Startup-finance heuristic for sticky but early enterprise security software; intentionally higher than mature infrastructure benchmarks."
  - id: A10
    name: Paid pilot to production conversion in first year
    value: "67"
    unit: pct
    source: "[BP milestones target 3 paid pilots and 2 production deployments in the first 12 months]; modeled as 2 of the first 3 pilots converting inside Y1."
  - id: A11
    name: Y1 paying-customer schedule
    value: "M6 1; M8 2; M11 3; M12 3"
    unit: accounts
    source: "[BP milestones]; Y1 customersEop counts paying pilot or production accounts because pilots are the first billed state."
  - id: A12
    name: Production-customer schedule after pilots
    value: "Q1Y2 4; Q2Y2 7; Q3Y2 9; Q4Y2 13; Q1Y3 17; Q2Y3 22; Q3Y3 27; Q4Y3 32"
    unit: accounts
    source: "[BP milestones 12-15 production customers by 12-24 months] plus a partner-assisted Y3 scaling heuristic consistent with BP sequencingRationale."
  - id: A13
    name: Founder/Exec fully loaded pay
    value: "180"
    unit: K USD per FTE-year
    source: "Startup-finance heuristic for a founder salary plus 20% payroll burden."
  - id: A14
    name: Engineering fully loaded pay
    value: "210"
    unit: K USD per FTE-year
    source: "Startup-finance heuristic for senior product or backend engineering plus 20% payroll burden."
  - id: A15
    name: Security/Policy fully loaded pay
    value: "216"
    unit: K USD per FTE-year
    source: "Startup-finance heuristic for a security engineer premium plus 20% payroll burden."
  - id: A16
    name: Solutions/Integration fully loaded pay
    value: "198"
    unit: K USD per FTE-year
    source: "Startup-finance heuristic for an integration engineer plus 20% payroll burden."
  - id: A17
    name: Customer Success/Partnerships fully loaded pay
    value: "174"
    unit: K USD per FTE-year
    source: "Startup-finance heuristic for an early post-sales or channel lead plus 20% payroll burden."
  - id: A18
    name: Sales/GTM fully loaded pay
    value: "192"
    unit: K USD per FTE-year
    source: "Startup-finance heuristic for an early enterprise GTM hire plus 20% payroll burden."
  - id: A19
    name: G&A/Ops fully loaded pay
    value: "156"
    unit: K USD per FTE-year
    source: "Startup-finance heuristic for a finance or operations generalist plus 20% payroll burden."
  - id: A20
    name: Y1 hiring sequence
    value: "Founder and founding eng M1; security/policy M4; solutions M6; partnerships/CS M10"
    unit: month
    source: "[BP team]."
  - id: A21
    name: Y2-Y3 hiring extension
    value: "Sales M15; engineering M16 and M27; solutions M19; ops M22; security M29; sales M30; CS M32"
    unit: month
    source: "Heuristic extension of [BP sequencingRationale] to support the BP milestone path to 13 Y2 and 32 Y3 production customers."
  - id: A22
    name: Non-payroll opex ramp
    value: "R&D tools 5-11; GTM programs 3-30; G&A legal/compliance 5-8"
    unit: K USD per month
    source: "Startup-finance heuristic consistent with founder-led enterprise sales and security or compliance tooling needs."
  - id: A23
    name: Funding runway target
    value: "24"
    unit: months
    source: "[Repo instruction plus BP runwayMonths 18]; ask is sized to the Q4Y2 proof point plus roughly 6 months of extra buffer."
  - id: A24
    name: Steady-state unit-economics ARPU
    value: "135"
    unit: K USD per customer-year
    source: "[A5 first-workflow ARR plus A6 expansion uplift weighted by A7 attach]; used for unit economics rather than pilot revenue."
  - id: A25
    name: CAC
    value: "60"
    unit: K USD per new production customer
    source: "Implied by Y2 founder-led and early GTM spend against production-customer additions, then checked against enterprise security SaaS heuristic."
