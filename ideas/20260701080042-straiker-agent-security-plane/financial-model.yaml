scenarios:
  downside:
    description: "Buyer adoption of action-taking support workflows slips by roughly two quarters, so production-customer growth and expansion attach both lag the base case."
    y3RevenueK: 1791.0
    y3EbitdaK: -1333.3
    cashLowPointK: -459.1
    keyAssumptionChanges:
      - "Q4Y2 production customers land at about 10 instead of 13 and Q4Y3 lands near 20 instead of 32 because the sales cycle stretches toward 9 months."
      - "Steady-state ARPU falls toward $110K as second-workflow attach and premium evidence modules arrive later."
      - "Gross margin tops out near 70% because deployments stay more services-heavy."
  base:
    description: "Three paid pilots land in Y1, the packaged deployment path produces 13 production customers by Q4Y2, and partner-assisted expansion lifts the company to 32 by Q4Y3."
    y3RevenueK: 3236.2
    y3EbitdaK: -441.5
    cashLowPointK: 623.8
    keyAssumptionChanges:
      - "Two of the first three paid pilots convert inside Y1 and the third converts at the start of Y2."
      - "Production customers scale from 13 at Q4Y2 to 32 at Q4Y3 with moderate second-workflow attach."
      - "Gross margin improves from 65% in Y1 to 72% in Y3 as integrations package and services intensity falls."
  upside:
    description: "Pilot conversion, partner sourcing, and expansion attach all outperform, creating a faster jump from workflow one into repeatable multi-workflow land-and-expand."
    y3RevenueK: 4482.6
    y3EbitdaK: 545.6
    cashLowPointK: 1308.9
    keyAssumptionChanges:
      - "Q4Y2 production customers reach about 17 and Q4Y3 reaches about 40 as sales cycles compress toward 4-5 months."
      - "Steady-state ARPU rises toward $150K as second-workflow and evidence-module attach happen earlier."
      - "Gross margin reaches about 74% because the packaged path removes more custom integration work."
