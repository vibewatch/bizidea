topRisks:
  - name: "Incumbent workflow vendors"
    description: "Helpdesk, CRM, or agent-builder vendors could add lightweight approval gates and try to absorb the category."
    mitigation: "Win on cross-system attack replay, fraud-specific policy packs, and runtime evidence across heterogeneous stacks that single vendors do not control."
  - name: "Slow move to action-taking agents"
    description: "Some enterprises may keep support agents in draft-only mode longer than expected, delaying budget for enforcement."
    mitigation: "Sell shadow-mode testing first to teams already under pressure to automate account recovery or refunds, then expand into runtime controls at go-live."
  - name: "Integration and false-positive burden"
    description: "Connecting internal admin tools and overblocking legitimate actions could slow support operations if deployment is too broad too early."
    mitigation: "Start with one workflow such as password resets or refunds, learn approval baselines in observe mode, and expand only after precision targets are met."
