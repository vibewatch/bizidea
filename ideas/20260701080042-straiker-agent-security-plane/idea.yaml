jobsToBeDone:
  - job: "When we want an AI support agent to approve account recovery or refunds, help our security and support teams replay abuse cases and set safe action boundaries, so we can launch automation without creating account takeover or revenue leakage."
    currentAlternative: "Human-only queues plus manual QA and scattered fraud rules."
    successMetric: "Share of eligible support tickets automated with zero high-severity security or fraud incidents."
  - job: "When an agent attempts a risky customer mutation, help our trust and safety team require more verification or stop the action, so we can contain blast radius in minutes instead of after a public incident."
