problem: >-
  Customer-support and trust-and-safety teams are starting to let AI agents
  reset passwords, issue refunds, and restore digital entitlements inside live
  admin tools. That turns one bad agent decision from a QA bug into direct
  account takeover or revenue leakage, yet most controls still focus on prompts
  or generic permissions rather than the state-changing action itself. Security
  teams cannot reliably red-team these workflows before launch or enforce step-
  up checks once the agent is live, so they either keep agents read-only or
  accept a hidden fraud surface.
targetUser:
  primary: "Support-platform and product-security leaders at digital consumer platforms deploying action-taking service agents."
  secondary: "Trust and safety operations leads responsible for account recovery, refunds, and entitlement workflows."
  buyer: "CISO, VP of Customer Platform Engineering, or Head of Trust and Safety Engineering."
startupThesis:
  nonObviousInsight: >-
    The first costly AI-agent failures will not look like bad chatbot answers;
    they will look like privileged support actions executed at machine speed.
    The control point that matters is the mutation boundary around account
    recovery, refunds, and entitlements, where product security, fraud, and CX
    budgets suddenly overlap.
  beachhead: >-
    Digital consumer apps with stored value or reversible entitlements, 2-20
    million user accounts, a Zendesk or Salesforce support stack, and internal
    admin consoles for password resets, wallet refunds, and digital entitlement
    restoration.
  wedge: >-
    An adversarial release gate that replays real support tickets and abuse
    patterns against agent workflows, then enforces step-up approval or policy
    blocks on risky account, refund, and entitlement mutations at runtime.
  whyNowCatalyst: >-
    Straiker's financing, 15x revenue growth, and the cited Meta support-agent
    incident show that enterprises have moved from theoretical agent risk to
    paying for testing and runtime containment of action-taking support
    workflows.
  ventureScalePath: >-
    Start with high-risk customer-support mutations, then expand into payments
    disputes, seller operations, workforce access changes, and any AI agent
    that can change money, identity, or entitlements across enterprise systems.
solution: >-
  The product connects to support-agent builders, CRM and ticketing systems,
  customer-verification tools, and internal admin panels to create a catalog of
  every state-changing action an agent can take. Before launch, it replays
  historical tickets plus adversarial scenarios such as social-engineered
  recovery attempts, refund stacking, and entitlement abuse to show exactly
  where the agent would overstep. Teams approve an action policy by intent,
  amount, customer state, and verification strength instead of writing brittle
  prompt rules. In production, the runtime proxy can force a human review,
  trigger additional verification, or block the mutation entirely when the
  action falls outside the approved envelope. Every approved and blocked action
  becomes evidence for fraud, security, and compliance reviews, giving
  operators a kill switch without shutting down all automation.
goToMarketSeed:
  firstCustomer: >-
    A gaming marketplace or subscription app with 10 million or more user
    accounts, a centralized Zendesk or Salesforce support organization, and a
    2026 program to let AI agents approve password resets, refunds, or digital
    entitlement restoration.
  buyingTrigger: >-
    A production-readiness review for moving a support agent from reply drafting
    into live account-recovery, refund, or entitlement actions, especially
    after a fraud or account-takeover incident.
  currentAlternative: "Read-only copilots, manual QA queues, homegrown rules engines, and generic fraud checks wrapped around human support workflows."
  switchingReason: >-
    The first customer switches because this wedge combines adversarial pre-
    launch testing with runtime step-up controls on the exact mutations that
    can cause account takeover or revenue leakage, which is hard to stitch
    together from helpdesk tooling and fraud systems alone.
  pricingHypothesis: "Annual platform subscription plus usage-based pricing per protected state-changing action or governed support workflow."
