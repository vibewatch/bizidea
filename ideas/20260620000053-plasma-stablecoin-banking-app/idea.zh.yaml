    - 服务跨境机构的本地会计事务所
    - 创作者平台和机构软件集成合作伙伴
  costStructure:
    - 账本和集成工程
    - 合规与合作伙伴管理开销
    - 财务团队入驻的客户成功
jobsToBeDone:
  - job: >-
      当创作者机构收到美元预付款时，帮助财务负责人将资金分配到创作者付款、活动支出和储备金，确保活动启动时不出现资金缺口。
    currentAlternative: 银行账户加电子表格加手动稳定币转账
    successMetric: 资金到账当天完成创作者付款和活动资金划拨
  - job: >-
      月末到来时，帮助财务团队将每笔刷卡消费和付款追溯到对应客户活动，迅速完成账务结清并汇报利润率。
    currentAlternative: 从银行、支出卡工具和钱包历史记录中手动导出数据到电子表格
    successMetric: 借助活动层面的现金可视度，在更少的天数内完成月末结账
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      信号群展示了具体的产品发布，包含明确的工作流细节和测试期用量，但证据仍依赖单一抓取来源。
  painIntensity:
    score: 4
    rationale: >-
      跨境机构每周都能感受到资金碎片化的痛——付款延误和现金不透明直接影响活动推进和外包方信任。
  wedgeClarity:
    score: 5
    rationale: >-
      初始切入口被明确定义为创作者机构的活动资金管理，而非面向所有人的广泛稳定币账户。
  defensibility:
    score: 3
    rationale: >-
      防御力来自工作流深度、账本数据和嵌入式集成，但核心金融通道对其他竞争者仍然开放。
  ventureScale:
    score: 4
    rationale: >-
      滩头市场聚焦，但同一操作系统可扩展到众多出口服务型中小企业，后续还可叠加贷款、应付账款和资金管理产品。
topRisks:
  - name: 客户获取渠道集中
    description: >-
      廉价触达机构创始人可能很难，因为该群体分散，对资金流转高度看重信任。
    mitigation: >-
      先从一个走廊市场入手，靠会计和运营人员转介，再借助活动级 ROI 和同业案例在机构社区扩散。
  - name: 监管依赖
    description: >-
      稳定币、收益和刷卡经济在机构所在市场及其客户和外包方所在司法管辖区可能差异显著。
    mitigation: >-
      以持牌合作方之上的软件和管控层身份推出，将收益设为可选功能，将初始 GTM 范围限定在规则相对清晰的司法管辖区。
  - name: 通道商品化
    description: >-
      一旦品类被验证，通用稳定币数字银行或发卡机构可能复制基础账户和付款功能。
    mitigation: >-
      靠工作流深度取胜——掌握活动账本、对账逻辑、审批规则和机构专属集成，这些比单纯的资金流转更难复制。
