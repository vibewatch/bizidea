problem: >-
  拉美跨境创作者和效果营销机构，往往用一个工具收美元、另一个工具给达人和外包方付款、第三个工具给团队发消费卡、备用金又散落在其他地方。每次资金流转都带来汇率损耗、付款延误和月末对账混乱——活动按周滚动现金，这种痛每周都发作。通用稳定币钱包确实能加快转账速度，但仍不提供活动级别的管控、共享账本或机构财务工作流。
targetUser:
  primary: 拉美服务美国品牌的创作者机构和效果营销机构的运营与财务主管
  secondary: 机构创始人与活动运营经理
  buyer: 跨境创作者机构的创始人、COO 或财务负责人
startupThesis:
  nonObviousInsight: >-
    稳定币银行最终能站稳脚跟的，不会是通用消费者钱包，而是专为微型跨国企业设计的业务专属操作账户——这类企业每周既收美元，又要把钱分发出去。刷卡消费、即时转账、收益一旦打包在一起，真正的难题就落到了团队支出与付款的运营管控和对账上。
  beachhead: >-
    拉美有 10—100 名外包方、以美元计费的美国客户、每周给创作者付款、且在多个活动中持续刷卡消费的网红营销和效果营销机构
  wedge: >-
    一个活动资金管理工作台——接入美元或稳定币，按活动开立虚拟卡，即时给创作者打款，闲置资金自动归集到一个受控账本内的储备池中
  whyNowCatalyst: >-
    Plasma 的发布证明，集刷卡消费、即时转账和收益于一体的零手续费稳定币账户已足够成熟，可以重新封装为垂直行业操作软件，而不再是另一款通用钱包。
  ventureScalePath: >-
    从创作者机构起步，再扩展到其他出口服务型中小企业，如招聘公司、外包机构和跨境平台卖家——它们需要同样的跨境现金架构。随着时间推移，产品可在交易账本之上叠加开票、信贷、供应商付款和营运资金产品。
solution: >-
  Creator Agency Cash OS 为机构提供以活动工作流为核心构建的稳定币原生操作账户，而非个人钱包式体验。机构可接收客户资金、按活动或客户开立子账户、向媒体采购人员发放虚拟卡，并从同一账本中即时给创作者或外包方付款。系统自动将每笔资金流转标注到对应活动，导出可直接用于记账的对账记录，闲置余额存入储备池而非散落在各处账户。产品的第一个胜点不是通用银行业务，而是消除那些本已像小型跨境金融网络一样运转的机构的现金碎片化问题。
goToMarketSeed:
  firstCustomer: >-
    墨西哥城、布宜诺斯艾利斯和圣保罗的创始人主导型创作者与网红营销机构，年收费 $2M—$15M，服务美国客户，每月有 20—200 笔创作者或供应商付款
  buyingTrigger: >-
    机构新签多个美国客户，或创作者付款量增加到手动管理银行账户、支出卡和手动稳定币转账开始延误付款和客户汇报的程度
  currentAlternative: >-
    Wise 或美国中小企业银行账户加支出卡工具、电子表格、WhatsApp 付款指令和偶尔的手动 USDC 转账
  switchingReason: >-
    一个统一账户缩短付款时间、减少汇率损耗，让财务团队无需拼凑银行和钱包产品，就能看清每张卡、每笔转账和储备余额在活动层面的情况。
  pricingHypothesis: >-
    月度平台费加按受管付款量和刷卡消费量计费，可选收取合作银行或收益产品的分成。
whyNow:
  - point: >-
      稳定币现在被定位为主力账户而非专用钱包，降低了机构主只想要更好的美元运营方案时面临的品类摩擦。
    signalRefs:
      - 统一稳定币账户
    sourceRefs: [1]
  - point: >-
      捆绑发卡和即时转账，让从一套操作系统同时运行活动支出和创作者付款成为可能。
    signalRefs:
      - 银行卡与转账通道融为一款产品
    sourceRefs: [1]
  - point: >-
      闲置余额附加收益，让机构有直接的资金管理理由把资金整合进新工作流，而非将储备分散在各家服务商。
    signalRefs:
      - 交易余额附加收益
    sourceRefs: [1]
  - point: >-
      据报道的测试期用量表明需求已超出纯粹的试用阶段，垂直软件可以顺应已经形成的行为习惯，而无需从零教育整个市场。
    signalRefs:
      - 正式上线前的测试期需求
    sourceRefs: [1]
differentiator: >-
  产品不是另一款通用稳定币钱包，而是恰好使用稳定币通道的机构财务运营软件。通用数字银行可以提供账户、卡或转账，但它们不对活动、创作者付款、客户对账或团队审批建模。工作流深度可以成为护城河——通过掌握跨境机构的账本、报告和运营习惯。
