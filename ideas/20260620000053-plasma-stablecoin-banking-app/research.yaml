reportMemo:
  executiveTakeaways:
  - 'LatAm stablecoin rails have crossed the maturity threshold for this wedge: Stripe now supports stablecoin
    financial accounts and card programs, Visa is extending stablecoin-linked cards, Mastercard is adding
    stablecoin settlement options, and Plasma shows the account-plus-card-plus-yield UX already exists.[36][46][48][53][56]'
  - The buyer pain is operational, not merely FX. Agencies already use separate tools for batch payouts,
    accounting sync, cards, multi-currency accounts, and creator/vendor paperwork, which is why a campaign-level
    ledger could be more defensible than another wallet.[3][7][24][26][66]
  - Latin America is one of the best launch regions for this model because institutions there report unusually
    high cross-border stablecoin usage, customer demand, and integration readiness.[76][77][79]
  - Competition is crowded at the rail layer—Wise, Jeeves, Bitso, Conduit, and Plasma all cover parts
    of the workflow—but the fetched evidence still leaves room for a vertical control plane focused on
    campaign treasury and month-end close.[2][11][20][23][30][36]
  marketDefinition: 'The market is creator-agency treasury orchestration: software that turns stablecoin
    accounts, card rails, and payout APIs into a controlled operating ledger for agencies. It sits between
    generic money products and pure infrastructure by adding campaign-level approvals, sub-accounts, payouts,
    and reconciliation.[11][14][18][20][23][30][36][39][46][60]'
  customerAndBuyer: 'The practical buyer is the founder, COO, or finance lead at a creator or performance
    agency that already looks like a micro-multinational: it gets paid by U.S. clients, runs cross-border
    cards and payouts, and must reconcile creator campaigns quickly. Publicis’ BR Media acquisition shows
    the creator-agency layer is already strategic infrastructure, while agency density in Mexico City,
    São Paulo, and Buenos Aires is large enough for corridor-specific outbound.[91][96][97][98][99][100]'
  buyingTriggers:
  - point: Weekly creator or vendor payouts start to overwhelm manual batch-pay, spreadsheet, and tax-document
      workflows.
    sourceRefs:
    - 3
    - 20
    - 66
  - point: Campaign spend grows on team cards and founders need tighter approval, visibility, and multi-account
      control.
    sourceRefs:
    - 24
    - 26
  - point: Stablecoin partner readiness lowers perceived implementation risk for a treasury migration.
    sourceRefs:
    - 76
    - 77
    - 79
  willingnessToPay:
    summary: 'Agencies already pay, implicitly or explicitly, for pieces of this workflow: Wise charges
      transaction-based fees and a $31 Advanced upgrade, Jeeves monetizes FX and card usage while giving
      free virtual cards, and Payoneer monetizes multi-currency payments plus creator paperwork and tax
      handling. That supports a workflow-layer software budget when it replaces manual close work rather
      than only when it beats transfer pricing.'
    sourceRefs:
    - 2
    - 9
    - 24
    - 26
    - 66
  competitiveLandscape: 'Alternatives cluster into four camps: fiat-first business accounts and payouts,
    spend-management/card stacks, stablecoin payment infrastructure, and emerging stablecoin neobanks.
    All can move money or issue cards, but none of the fetched evidence centers campaign-by-campaign treasury
    controls for creator agencies as the core workflow.[2][20][23][30][36][66]'
  incumbentThesis:
  - incumbentClass: Cross-border business accounts
    point: Wise-class providers optimize receipt, FX, and payouts, but they still leave campaign-by-campaign
      controls and month-end close workflows outside the product.
    sourceRefs:
    - 2
    - 3
    - 9
  - incumbentClass: Spend-management stacks
    point: Jeeves makes cards and multi-currency accounts easier, but it does not make stablecoin payout
      orchestration or campaign-ledger tagging the primary object.
    sourceRefs:
    - 23
    - 24
    - 26
  - incumbentClass: Stablecoin infrastructure
    point: Bitso, Conduit, Stripe, and Circle sell the rails. They are strong partners, but not the finance-ops
      system of record for creator campaigns.
    sourceRefs:
    - 14
    - 18
    - 20
    - 30
    - 31
    - 46
    - 60
  - incumbentClass: Stablecoin neobanks
    point: Plasma proves the neobank experience can be compelling, yet it is still a generic account product
      rather than workflow software for agencies.
    sourceRefs:
    - 36
    - 37
    - 39
    - 40
  regulatoryLandscape: Regulatory execution is the biggest structural constraint. Brazil’s Law 14,478
    creates the VASP framework; Mexico’s FinTech Law and Banxico Circular 4/2019 set tighter guardrails
    for regulated institutions using virtual assets; and Argentina now routes PSAV registration through
    the CNV. Plasma’s own disclosures also remind users that stablecoin balances and yield products are
    not bank deposits and may depend on third-party or DeFi structures. The safest initial posture is
    to sell software and controls on top of licensed partners rather than hold customer funds directly.[84][85][86][87][37][40]
  technologyLandscape: The enabling stack now exists but is fragmented. Stripe supports stablecoin financial
    accounts and stablecoin-backed cards, Visa and Mastercard are extending stablecoin-linked card and
    settlement capabilities, Circle provides USDC and payment primitives, and LatAm institutions already
    report meaningful partner readiness for stablecoin integration. The startup’s job is orchestration
    and workflow abstraction, not inventing a new rail.[46][48][53][56][59][60][76][79]
  distributionChannels:
  - point: Corridor-focused outbound into Mexico City, São Paulo, and Buenos Aires agency clusters.
    sourceRefs:
    - 98
    - 99
    - 100
  - point: Partner-led distribution through stablecoin infrastructure firms and card/account enablers
      already serving LatAm enterprises.
    sourceRefs:
    - 14
    - 18
    - 30
    - 46
    - 53
    - 60
  - point: Accountant, operations, and finance-ops referrals because payout paperwork, card oversight,
      and reconciliation are already painful budget lines.
    sourceRefs:
    - 7
    - 24
    - 66
  partnershipEcosystem:
  - point: Stablecoin on/off-ramp and orchestration partners such as Bitso, Conduit, Stripe, and Circle
      are necessary to avoid becoming the regulated money mover on day one.
    sourceRefs:
    - 14
    - 18
    - 30
    - 46
    - 60
  - point: Card and spend-control partners matter because campaign budgets are frequently deployed on
      cards before they are paid out as creator fees.
    sourceRefs:
