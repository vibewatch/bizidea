competitors:
- name: Wise Business
  stage: incumbent
  wedge: Global business account with multi-currency balances, batch payouts, collections, and team cards.
  pricing: Transaction-based fees plus a one-time $31 Advanced plan upgrade.
  strength: Trusted global collections and payout product with mature batch-pay, card, and account capabilities.
  weaknessVsUs: Not stablecoin-native and does not organize money by campaign, approvals, and creator
    payout workflows.
  sourceRefs:
  - 2
  - 3
  - 9
- name: Jeeves
  stage: scale-up
  wedge: Corporate cards, expense controls, and multi-currency accounts for international businesses.
  pricing: Unlimited virtual cards at no extra cost; FX pricing is competitive but broader platform economics
    are not fully public.
  strength: Strong spend controls and LATAM-friendly multi-currency account coverage.
  weaknessVsUs: Optimizes corporate spend management, not stablecoin payout orchestration or campaign-ledger
    close.
  sourceRefs:
  - 23
  - 24
  - 26
- name: Bitso Business
  stage: scale-up
  wedge: LatAm stablecoin and FX infrastructure for cross-border payments, orchestration, treasury, and
    mass payouts.
  pricing: Custom / contact sales.
  strength: Deep regional on/off-ramp coverage and strong stablecoin orchestration primitives.
  weaknessVsUs: Infrastructure-first rather than a finance-ops workspace for agencies and campaign owners.
  sourceRefs:
  - 11
  - 14
  - 18
  - 20
- name: Conduit
  stage: scale-up
  wedge: Stablecoin-powered cross-border B2B payments and virtual multi-currency accounts.
  pricing: Custom / contact sales.
  strength: Clear stablecoin off-ramp and virtual-account product for businesses moving dollars internationally.
  weaknessVsUs: Focused on moving and holding money, not on creator-agency workflow controls or campaign
    reporting.
  sourceRefs:
  - 30
  - 31
- name: Plasma One
  stage: seed
  wedge: Stablecoin neobank combining account, card, transfers, and yield in one product.
  pricing: Zero-fee USDt transfers, with cashback and yield varying by membership tier.
  strength: Compelling stablecoin account UX and strong signal that category friction is falling fast.
  weaknessVsUs: Generic account experience; it does not model campaigns, agency approvals, or close-ready
    payout ledgers.
  sourceRefs:
  - 36
  - 37
  - 39
  - 40
