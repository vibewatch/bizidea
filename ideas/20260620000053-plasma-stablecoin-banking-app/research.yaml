  adoptionFrictionMatrix:
  - friction: Finance leads may resist holding operating cash in non-deposit stablecoin balances, especially
      when yield touches DeFi structures.
    severity: high
    affectedBuyer: Founder or head of finance
    mitigation: Launch with yield off by default, avoid custody, and position the product as the control
      layer above licensed partners.
    sourceRefs:
    - 37
    - 40
    - 84
    - 86
  - friction: Current stacks already solve slices of the problem, so agencies may prefer stitching tools
      unless reconciliation savings are obvious.
    severity: medium
    affectedBuyer: COO or finance lead
    mitigation: Sell on month-end close speed, approval trails, and campaign sub-ledgers instead of transfer
      speed alone.
    sourceRefs:
    - 2
    - 3
    - 24
    - 26
    - 66
  - friction: Cross-border recipient onboarding and creator paperwork remain messy even when money movement
      is fast.
    severity: high
    affectedBuyer: Operations and finance lead
    mitigation: Reuse recipient, tax, and payout templates so recurring campaigns do not restart the same
      admin loop every month.
    sourceRefs:
    - 20
    - 66
  - friction: Partner coverage and local off-ramp quality differ by corridor, which can slow multi-country
      rollout.
    severity: high
    affectedBuyer: Founder
    mitigation: Start with Mexico-Brazil-Argentina corridors and lock in card, off-ramp, and bookkeeping
      partners before broad expansion.
    sourceRefs:
    - 18
    - 30
    - 46
    - 59
