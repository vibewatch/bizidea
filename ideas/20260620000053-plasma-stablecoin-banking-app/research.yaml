      graph that generic payout or card tools do not capture together.
    sourceRefs:
    - 3
    - 20
    - 24
    - 26
  - point: Corridor routing data across stablecoin and fiat off-ramps can improve cost-speed decisions
      over time.
    sourceRefs:
