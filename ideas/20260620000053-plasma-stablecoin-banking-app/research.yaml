openQuestions:
- What share of the target agencies already hold part of operating cash in stablecoins versus using stablecoins
  only as an occasional payout rail?
- Which partner configuration can support campaign sub-accounts, card issuance, and compliant payout flows
  without pulling the startup into custody?
- How much close-time reduction can the product prove in a live agency before it needs deeper AP, invoicing,
  or ERP integrations?
- Will agency founders pay for a dedicated control layer before a finance incident happens, or only after
  payout volume becomes painful?
