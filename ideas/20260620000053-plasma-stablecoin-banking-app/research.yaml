    - 86
    - 87
  - case: Generic stablecoin neobanks add basic business controls
    impact: Differentiation narrows to campaign-ledger depth, approvals, and close-ready reporting rather
      than raw account features.
    sourceRefs:
    - 36
    - 39
    - 46
    - 48
  - case: Agencies keep payout volumes low enough that stitched incumbent tools feel good enough
    impact: The startup should focus only on agencies with recurring weekly payouts, meaningful card spend,
      and a real month-end close burden.
    sourceRefs:
    - 2
    - 3
    - 24
    - 66
  validationPlan:
  - priority: high
    question: Do finance leads value campaign-level close and approval controls enough to pay above low-cost
      transfer tools?
    evidenceToGather: Run 15 interviews plus three workflow shadowing sessions across Mexico City, São
      Paulo, and Buenos Aires agencies; quantify hours spent today on payout prep, card reconciliation,
      and month-end close.
  - priority: high
    question: Can one workflow replace the current Wise/Payoneer/Jeeves/USDC patchwork without forcing
      the startup to custody funds?
    evidenceToGather: Build a design-partner pilot with one Mexico City and one São Paulo agency using
      partner rails only; measure payout cycle time, approval latency, and reconciliation accuracy.
  - priority: medium
    question: Which partner combinations will support cards, local rails, and stablecoin balances in the
      launch corridors with acceptable compliance overhead?
    evidenceToGather: Complete partner diligence with at least one stablecoin orchestration vendor, one
      card issuer/sponsor, and one bookkeeping integration partner before full product scoping.
