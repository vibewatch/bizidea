  sensitivityCases:
  - case: Regulators or partners tighten rules around custody, yield, or stablecoin-linked cards
    impact: The startup remains viable as a software/control layer, but monetization shifts away from
      float or yield-linked economics and onboarding slows.
    sourceRefs:
