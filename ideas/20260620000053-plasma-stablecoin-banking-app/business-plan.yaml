slug: creator-agency-cash-os
date: '2026-06-20'
executiveSummary: >-
  Creator Agency Cash OS should start as a campaign treasury control layer for
  Latin American creator and performance-marketing agencies that already collect
  U.S. dollars, issue campaign spend cards, and run frequent creator payouts.
  The first buyer is the founder, COO, or finance lead at a $2M-$15M billing
  agency whose weekly cash cycle has outgrown a stitched stack of Wise-class
  transfers, card tools, spreadsheets, and occasional manual stablecoin
  transfers. The urgent pain is not only FX cost; it is the operational burden
  of routing money across campaigns, approving spend, paying creators on time,
  and closing books from fragmented ledgers. The product wedge is a
  software-first workspace that sits on licensed partners, creates sub-ledgers
  by campaign, issues virtual cards, runs payouts, and exports close-ready
  records without taking direct custody on day one. Research supports a focused
  beachhead with modeled $33.9M TAM, $11.5M SAM, and $2.2M year-three SOM for
  the initial corridor hubs, but those estimates depend on assumed fit rate and
  assumed $12k ARR. The strongest reason to believe is that stablecoin account,
  card, and payout rails now exist and Latin America shows unusually high
  stablecoin readiness for cross-border use. The biggest disconfirming risks are
  that agencies may keep tolerating stitched incumbent tools, partner and
  regulatory complexity may block a repeatable launch corridor, and willingness
  to pay for a standalone control layer is still unproven. Missing evidence
  remains around how many target agencies already keep operating cash in
  stablecoins and which exact partner stack can support sub-accounts, cards, and
  compliant payouts without dragging the company into custody.
problem:
  - Cross-border creator agencies often receive dollars in one account, fund campaign cards in another tool, pay creators through manual batch workflows, and reconcile everything in spreadsheets at month-end.
  - Generic stablecoin wallets and neobanks improve transfer speed but do not make campaigns, approvals, recipient records, and close-ready reporting the system of record for an agency finance team.
solution:
  - Provide a campaign treasury workspace that receives USD or stablecoins, creates campaign and client sub-ledgers, issues virtual cards, and sends instant creator or contractor payouts from one controlled ledger.
  - Layer approvals, recipient templates, accounting exports, and reserve management on top of licensed rails so the first product win is faster close and tighter cash control, not direct custody.
whyWeWin:
  - The company sells finance-ops workflow depth around campaign treasury rather than another general business account, which is where incumbent rail providers remain shallow.
  - Campaign-level mappings of inflows, card spend, approvals, and payouts can compound into a proprietary operating graph that generic payout, card, or wallet products do not capture together.
  - The beachhead has a visible weekly pain cycle, a clear buying trigger, and a narrow first customer, which makes proof faster than starting with all export-service SMBs.
strategicChoices:
  beachhead: Latin American creator and performance-marketing agencies with U.S.-dollar client inflows, 20-200 monthly creator or vendor payouts, and recurring campaign card spend across Mexico City, São Paulo, and Buenos Aires.
  wedgeRationale: This entry point concentrates pain into one workflow where cash intake, card spend, and creator payouts already collide every week, so the startup can prove same-day payout speed and faster month-end close before attempting a broader SMB treasury pitch.
  sequencingRationale: Start as a non-custodial software and controls layer on top of licensed partners because that is the fastest way to ship a compliant product, validate buyer demand, and learn corridor economics; add deeper routing, bookkeeping integrations, and adjacent treasury products only after one agency workflow converts from pilot to annual use.
  notYet:
    - Broad export-service SMB coverage outside creator and performance agencies
    - Lending, underwriting, or working-capital products
    - Direct custody or yield-led positioning as the primary sales message
    - Full AP, invoicing, or ERP replacement before the campaign treasury wedge is repeatable
market:
  tam: "$33.9M estimated TAM based on 35,299 agencies across Brazil, Mexico, and Argentina, an assumed 8% fit rate, and assumed $12,000 annual software spend."
  sam: "$11.5M estimated SAM based on 9,560 agencies across Mexico City, São Paulo, and Buenos Aires, an assumed 10% first-customer fit rate, and assumed $12,000 ARR."
  som: "$2.2M modeled year-three SOM based on 180 reachable agencies at assumed $12,000 ARR."
  segments:
    - "Primary segment: Latin American creator and performance-marketing agencies serving U.S. brands with recurring weekly payouts and campaign card spend"
    - "Secondary segment: other export-service SMBs with the same cross-border cash workflow after the agency wedge proves repeatable"
  buyingProcess: >-
    The likely champion is the founder, COO, or head of finance who already owns
    payout timeliness, spend controls, and month-end reconciliation. The most
    credible first sale is a paid pilot for one live agency account covering a
    handful of active campaigns, with annual conversion once the buyer sees
    faster payouts, tighter approvals, and measurable close-time reduction.
product:
  mvp: >-
    MVP should support one agency account with campaign sub-ledgers, virtual-card
    issuance, payout approval flows, recurring recipient templates, and
    accounting export for Mexico, Brazil, and Argentina corridors through
    partner rails only. Yield should stay off by default and the product should
    position itself as the control plane above licensed providers rather than the
    regulated money holder.
  sixMonth: Launch 3-5 paid design-partner pilots, prove campaign tagging plus payout approvals on one repeatable partner stack, and ship close-ready exports with audit logs for the initial three-city corridor.
  twelveMonth: Add bookkeeping integrations, recurring payout templates, corridor-aware routing rules, and production-grade approval policies so pilot agencies can move from one campaign to agency-wide deployment.
  twentyFourMonth: Expand the same treasury ledger into adjacent export-service SMBs and add invoicing, supplier payments, and reserve-management workflows once the core agency motion converts repeatedly.
  keyBets:
    - Agencies will pay for reconciliation control and approval visibility, not only for cheaper transfers.
    - A software-first overlay on partner rails can replace the incumbent Wise plus cards plus spreadsheets patchwork without direct custody.
    - Campaign-ledger depth creates a stronger wedge than launching as a generic stablecoin business account.
    - One corridor-focused product can expand into adjacent export-service workflows after the first agency use case proves ROI.
gtm:
  wedge: Sell a paid pilot that consolidates one agency's live campaign cards, creator payouts, and reserve tracking into a campaign-tagged ledger, then convert to annual production once the buyer trusts the close and approval workflow.
  channels:
    - Founder-led outbound into agency founders, COOs, and finance leads in Mexico City, São Paulo, and Buenos Aires
    - Referrals from stablecoin-friendly accountants, finance operators, and bookkeeping partners already cleaning up payout and close workflows
    - Partner-led introductions from stablecoin orchestration, card, and multi-currency account providers serving LatAm businesses
  funnelTargets: "Lead→qualified pilot 15-25%, qualified pilot→paid pilot 35-50%, paid pilot→production 50%+, production→additional workflow or corridor expansion 30%+ within 12 months."
  pricing: Monthly platform fee for campaign sub-ledgers, approvals, and close-ready reporting, plus usage-based fees on managed payout volume and card spend; this matches the customer's weekly cash intensity better than seat pricing and leaves room for optional partner-finance revenue share later.
businessModel:
  revenueStreams:
    - Platform subscription for the campaign treasury workspace
    - Usage fees on payout volume and managed card spend
    - Partner revenue share from card, FX, or reserve products where permitted
    - One-time onboarding and workflow configuration fees for early design partners
  unitOfValue: Managed campaign treasury volume flowing through approved sub-ledgers
  targetGrossMarginPct: 70
  expansionLevers:
    - Increase wallet share per agency as more campaigns, cards, and payout recipients move into the ledger
    - Add bookkeeping, invoicing, supplier payments, and reserve-management modules on the same treasury graph
    - Expand into recruiting firms, outsourcing shops, and other export-service SMBs that share the same dollar-in, distributed-payout workflow
strategyMap:
  northStarMetric: Percent of customer campaign cash movements routed through the platform and reconciled to a campaign within 24 hours
  inputMetrics:
    - Paid pilot to annual production conversion rate
    - Same-day payout completion rate for covered creator and vendor payments
    - Median month-end close time reduction for pilot agencies
    - Percentage of card and payout transactions auto-tagged to the correct campaign
    - Number of active campaigns and recipients per agency on the platform
  moatsToBuild:
    - Campaign-level treasury graph linking client inflows, card spend, approvals, recipients, and payout outcomes
    - Corridor routing and off-ramp decision data across partner rails
    - Reusable recipient, approval, and documentation templates that reduce operational friction each payout cycle
  killCriteria:
    - Fewer than 3 paid design partners within 9 months
    - Paid pilot to production conversion below 40% after the first 6 pilots
    - Pilot customers fail to show at least 30% month-end close-time reduction or same-day payout completion in the majority of covered flows
    - No repeatable partner stack supports the Mexico, Brazil, and Argentina launch corridors without custody by month 12
  mermaid: |
    flowchart LR
      Wedge[Campaign treasury wedge] --> MVP[Partner-led control-plane MVP]
      MVP --> Proof[Faster payouts and cleaner close]
      Proof --> Expansion[Broader export-service treasury workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Coherent wedge with real operational pain, but conviction stays limited until the company proves agencies will fund a standalone control layer and partner complexity is manageable.
    whyBelieve: The startup targets a specific weekly cash workflow at a moment when stablecoin account, card, and payout infrastructure appears mature enough to be repackaged into vertical finance software.
    whyDoubt: The initial modeled market is modest, regulation and partners remain gating factors, and many agencies may keep tolerating stitched incumbent tools unless ROI is clearly above transfer-speed savings.
    nextDiligence: Confirm paid pilot demand, buyer ownership, and one repeatable partner configuration through 3-5 live agency pilots in the three launch hubs.
  firstCustomer:
    title: Finance lead at a cross-border creator agency
    profile: A Mexico City, São Paulo, or Buenos Aires agency with $2M-$15M in annual billings, U.S. brand clients, 20-200 monthly creator or vendor payouts, and recurring campaign card spend.
    trigger: The agency adds new U.S. clients or creator volume and the existing bank plus cards plus spreadsheet workflow starts delaying payouts or client reporting.
    buyer: Founder or COO
    initialContract: "$8k-$15k paid pilot for one agency covering 2-5 live campaigns, converting to roughly $12k-$30k annual subscription plus usage fees once payouts, cards, and close workflows move into production."
  mustBeTrue:
    - At least half of qualified target agencies must describe weekly payout and reconciliation pain severe enough to fund a dedicated treasury workflow.
    - A non-custodial partner stack must support campaign sub-ledgers, cards, and compliant payouts across the first launch corridors.
    - Early pilots must reduce month-end close time by at least 30% while maintaining same-day payout completion for most covered payments.
    - Buyers must accept stablecoin-linked workflows with yield off by default and still treat the product as a primary operating workspace.
    - The company must sustain at least $12k ARR-equivalent pricing and 50%+ pilot-to-production conversion before scaling sales.
  diligenceQuestions:
    - What share of target agencies already hold operating cash in stablecoins versus using them only as a payout rail?
    - Which exact partner combination can support sub-accounts, card issuance, and local off-ramps without creating custody exposure?
    - How many hours and close days can the product realistically remove before buyers switch from stitched incumbents?
    - Does budget authority sit more often with the founder, COO, or head of finance in the target accounts?
    - How concentrated is early distribution through accountants, operators, and stablecoin infrastructure partners?
operatingAssumptions:
  - assumption: The first repeatable buyer is a founder, COO, or finance lead at a creator or performance agency with weekly payout volume and recurring card spend.
    basis: idea.yaml
    validationTest: Complete 15 qualified interviews and require at least 10 to match the target workflow and identify an active buying trigger in the next 12 months.
    decisionImpact: If false, the ICP is too broad or mis-specified and the company should narrow by geography, agency size, or workflow before hiring GTM.
  - assumption: Agencies will pay for close-time reduction and approval control even if transfer pricing is only incrementally better than incumbent stacks.
    basis: research.yaml
    validationTest: In the first 5 pricing conversations, secure at least 2 paid pilot commitments where reconciliation and control are cited as the primary reason to buy.
    decisionImpact: If false, the product must reposition around lower-cost money movement or risk losing its workflow differentiation.
  - assumption: Partner rails can deliver cards, stablecoin balances, and local payout coverage without requiring the startup to custody customer funds.
    basis: research.yaml
    validationTest: Complete diligence and technical scoping with at least one orchestration partner, one card issuer, and one bookkeeping integration partner before pilot launch.
    decisionImpact: If false, roadmap scope, compliance burden, and funding needs all increase materially.
  - assumption: Buyers will adopt the product with yield off by default if the core payout and close workflow is compelling.
    basis: operator judgment
    validationTest: During pilot discovery, require at least 3 prospects to accept a no-yield initial deployment scope focused only on controls, cards, and payouts.
    decisionImpact: If false, stablecoin trust is too low and the company may need a different corridor, partner posture, or customer segment.
  - assumption: The initial pricing model can support roughly $12k-$30k annual subscriptions before partner-finance revenue share matters.
    basis: research.yaml
    validationTest: Convert at least 2 paid pilots into annual contracts within that range and confirm gross-margin targets remain above 70% on the partner stack.
    decisionImpact: If false, the modeled SAM and venture case compress and the company should rethink pricing basis or expansion plans.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 founders, COOs, and finance leads at target agencies across Mexico City, São Paulo, and Buenos Aires.
    hypothesis: Weekly payout volume, campaign card oversight, and month-end close pain are urgent enough to create a named first buyer and live buying trigger.
    successMetric: 10 qualified interviews confirm the target workflow and 5 agree to detailed workflow mapping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run 3 workflow shadowing sessions that manually reconstruct one recent campaign cash cycle from receipt through payout and close.
    hypothesis: Agencies are already spending enough manual time on approvals and reconciliation to justify a control-layer product.
    successMetric: Document at least 30% potential reduction in close effort or payout-prep effort in 2 of 3 mapped agencies.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Launch 3 paid design-partner pilots using partner rails only for one live agency account each.
    hypothesis: A non-custodial software overlay can replace the incumbent patchwork without forcing a bank-account migration on day one.
    successMetric: 3 paid pilots live, at least 2 delivering same-day payout completion and campaign-tagged reporting within 6 weeks.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test pricing with a platform-fee-plus-volume package versus a seat-based package.
    hypothesis: Workflow and volume pricing better matches buyer ROI than seat pricing for agency finance teams.
    successMetric: At least 2 of the first 3 paid pilots choose the platform-fee-plus-volume package at equal or higher annualized value.
    owner: Founder CEO
  - horizon: 180–365 days
    experiment: Ship bookkeeping integrations and recurring recipient templates for converted pilot agencies.
    hypothesis: Accounting export and repeat recipient setup are the features that move the product from useful treasury tool to production system of record.
    successMetric: 50%+ of converted customers use integrations or templates in monthly operations and report measurable close-time reduction.
    owner: Product and integrations engineer
  - horizon: 180–365 days
    experiment: Sign 3 referral relationships with accountants, finance operators, or stablecoin infrastructure partners.
    hypothesis: Trusted intermediaries can source qualified pilots more efficiently than cold outbound alone.
    successMetric: 3 active partners and at least 2 qualified pilot introductions from partner channels.
    owner: Founder CEO
operations:
  - Corridor-specific onboarding playbook covering partner eligibility, recipient setup, and approval policy by country
  - Daily reconciliation and campaign-tagging QA so card and payout records remain close-ready
  - Reusable recipient, tax, and documentation templates for recurring creator and vendor payouts
  - Audit logs for every approval, card issuance, payout, and export event
  - Weekly pilot ROI reviews tracking payout speed, close time, and manual override rates
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Founder-led sales and partner development are required because the category is new, trust-sensitive, and still needs corridor-specific positioning.
  - role: Founding eng
    startTiming: Month 0
    rationale: The first product risk is a reliable campaign ledger and partner integration stack, not surface-level wallet UX.
  - role: Product and integrations engineer
    startTiming: Month 3
    rationale: Bookkeeping exports, payout templates, and partner connectivity are central to proving month-end ROI and reducing onboarding friction.
  - role: Compliance and partnerships lead
    startTiming: Month 6
    rationale: The company needs dedicated ownership of corridor sequencing, partner diligence, disclosures, and sponsor-bank or infrastructure relationships before scaling pilots.
  - role: Solutions engineer
    startTiming: Month 9
    rationale: Early deployments will require hands-on workflow mapping and customer-specific configuration before the onboarding motion is repeatable.
  - role: GTM lead
    startTiming: Month 12
    rationale: Add a quota-carrying seller only after pilot packaging, buyer ownership, and conversion metrics are repeatable.
milestones:
  - horizon: 0–12 months
    items:
      - Win 3-5 paid design partners in the creator-agency beachhead across the three launch hubs
      - Prove same-day payout completion and campaign-tagged reporting in at least 2 live pilots
      - Convert at least 2 paid pilots into annual subscriptions
      - Lock one repeatable partner stack for cards, payouts, and accounting export without custody
  - horizon: 12–24 months
    items:
      - Expand converted agencies from one campaign workflow to agency-wide treasury coverage
      - Add bookkeeping integrations, recurring recipient templates, and corridor-aware routing rules
      - Begin adjacent expansion into one additional export-service SMB segment with the same cash workflow
  - horizon: 24–36 months
    items:
      - Reach multi-corridor production coverage across the initial LatAm markets
      - Launch invoicing, supplier payment, or reserve-management modules on the same ledger
      - Prove the product can sell beyond agencies without breaking onboarding or gross-margin targets
risks:
  - risk: Regulatory or partner requirements delay a repeatable launch configuration across Mexico, Brazil, and Argentina.
    likelihood: High
    impact: High
    mitigation: Stay non-custodial, keep yield optional, sequence corridors carefully, and close partner diligence before expanding geography.
  - risk: Agencies continue stitching together Wise-class transfers, card tools, and spreadsheets because the control-layer ROI is not high enough.
    likelihood: High
    impact: High
    mitigation: Sell on same-day payouts plus close-time reduction, target only payout-intense agencies, and require quantified workflow ROI in every pilot.
  - risk: Stablecoin trust remains too low for finance leads to move operating workflows into the platform even if transfer speed is attractive.
    likelihood: Medium
    impact: High
    mitigation: Launch with yield off by default, avoid custody, position the product as a control layer, and collect customer references tied to finance outcomes rather than crypto narratives.
  - risk: Rail-layer vendors or neobanks add enough business controls to compress differentiation.
    likelihood: Medium
    impact: Medium
    mitigation: Invest in campaign-ledger depth, approvals, bookkeeping integrations, and recipient workflow data that are harder to copy than account features.
  - risk: Distribution through fragmented agencies is too expensive for a founder-led sales motion.
    likelihood: Medium
    impact: Medium
    mitigation: Focus on dense city clusters first and build referral channels through accountants, operators, and infrastructure partners before hiring sales.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund the core founding team, partner integrations, compliance and partnership work, and 3-5 paid pilots that prove one repeatable non-custodial corridor stack plus annual conversion in the agency beachhead.
