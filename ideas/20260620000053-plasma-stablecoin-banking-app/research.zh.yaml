openQuestions:
- 目标机构中有多大比例已将部分运营资金存放在稳定币，而非仅将稳定币作为偶尔的付款通道？
- 哪种合作伙伴配置能在不将初创公司拉入托管的情况下，支持活动子账户、发卡和合规付款流？
- 产品在需要更深的应付账款、开票或 ERP 集成之前，能在真实机构中验证多少结账时间缩短？
- 机构创始人愿意在资金事故发生之前为专用管控层付费，还是只有当付款量变得痛苦之后才愿意？
