    - 46
    - 48
  - case: 机构将付款量维持在足够低水平，使现有拼凑工具感觉已经够用
    impact: 初创公司应只专注于有定期每周付款、有意义刷卡消费和真实月末结账负担的机构。
    sourceRefs:
