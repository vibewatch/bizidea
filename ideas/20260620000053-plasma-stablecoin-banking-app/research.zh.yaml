  sensitivityCases:
  - case: 监管机构或合作伙伴收紧托管、收益或稳定币关联银行卡的规则
    impact: 初创公司作为软件/管控层仍可存续，但变现从浮动收益或收益关联经济转向，入驻速度放缓。
    sourceRefs:
