  adoptionFrictionMatrix:
  - friction: 财务负责人可能抵制将运营资金存放在非存款稳定币余额中，尤其是当收益涉及 DeFi 结构时。
    severity: high
    affectedBuyer: 创始人或财务负责人
    mitigation: 收益默认关闭，避免托管，将产品定位为持牌合作伙伴之上的管控层。
