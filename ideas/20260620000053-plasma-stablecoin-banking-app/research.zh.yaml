  validationPlan:
  - priority: high
    question: 财务负责人对活动级结账和审批管控的付费意愿，是否足以超过低成本转账工具？
    evidenceToGather: 在墨西哥城、圣保罗和布宜诺斯艾利斯机构中开展 15 次访谈和 3 次工作流跟踪；量化目前花在付款准备、银行卡对账和月末结账上的时长。
  - priority: high
    question: 一个工作流能否在不强迫初创公司托管资金的情况下，替代当前的 Wise/Payoneer/Jeeves/USDC 拼凑？
    evidenceToGather: 仅使用合作方通道，与一家墨西哥城和一家圣保罗机构建立共创客户试点；测量付款周期时间、审批延迟和对账准确率。
  - priority: medium
    question: 哪种合作伙伴组合能以可接受的合规成本，在发布走廊支持银行卡、本地通道和稳定币余额？
    evidenceToGather: 在完整产品立项之前，完成与至少一家稳定币编排供应商、一家发卡机构/赞助商和一家记账集成合作伙伴的尽调。
