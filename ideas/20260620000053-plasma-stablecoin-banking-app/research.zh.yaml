competitors:
- name: Wise Business
  stage: incumbent
  wedge: 全球商业账户，提供多币种余额、批量付款、收款和团队银行卡。
  pricing: 基于交易的手续费加一次性 $31 高级套餐升级。
  strength: 受信任的全球收款和付款产品，具备成熟的批量支付、银行卡和账户功能。
  weaknessVsUs: 非稳定币原生，不按活动、审批和创作者付款工作流组织资金。
  sourceRefs:
  - 2
  - 3
  - 9
- name: Jeeves
  stage: scale-up
  wedge: 面向国际企业的企业银行卡、费用管控和多币种账户。
  pricing: 虚拟卡无额外费用；FX 定价有竞争力，但更广泛的平台经济学未完全公开。
  strength: 强劲的支出管控和拉美友好的多币种账户覆盖。
  weaknessVsUs: 优化企业支出管理，而非稳定币付款编排或活动账本结账。
  sourceRefs:
  - 23
  - 24
  - 26
- name: Bitso Business
  stage: scale-up
  wedge: 面向跨境支付、编排、资金管理和批量付款的拉美稳定币和 FX 基础设施。
  pricing: 定制/联系销售。
  strength: 深厚的区域出入金覆盖和强大的稳定币编排基础元件。
  weaknessVsUs: 基础设施优先，而非面向机构和活动负责人的财务运营工作台。
  sourceRefs:
  - 11
  - 14
  - 18
  - 20
- name: Conduit
  stage: scale-up
  wedge: 稳定币驱动的跨境 B2B 支付和虚拟多币种账户。
  pricing: 定制/联系销售。
  strength: 面向跨国转移美元企业的清晰稳定币出金和虚拟账户产品。
  weaknessVsUs: 专注于资金流转和持有，而非创作者机构工作流管控或活动报告。
  sourceRefs:
  - 30
  - 31
- name: Plasma One
  stage: seed
  wedge: 将账户、银行卡、转账和收益合并为一款产品的稳定币数字银行。
  pricing: USDt 转账零手续费，现金返还和收益按会员层级变化。
  strength: 引人入胜的稳定币账户 UX，以及品类摩擦快速下降的强烈信号。
  weaknessVsUs: 通用账户体验；不对活动、机构审批或可结账付款账本建模。
  sourceRefs:
  - 36
  - 37
  - 39
  - 40
regulatoryTechnicalConstraints:
- point: 稳定币余额和收益功能不是存款，可能依赖第三方或 DeFi 结构，需要明确的风险披露。
  sourceRefs:
  - 37
  - 40
- point: 发布走廊处于不同的虚拟资产和金融科技监管框架之下，这支持在早期产品中采用软件层定位而非直接托管。
  sourceRefs:
  - 84
