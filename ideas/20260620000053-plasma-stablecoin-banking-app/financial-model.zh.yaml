slug: creator-agency-cash-os
date: '2026-06-20'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date] 基础情景从商业计划日期的下一个月开始。'
- id: A2
  name: Pre-seed 完成后的起始现金
  value: '2.3'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M] 基础情景采用接近下限的 $2.3M 完成额，用于资助前 24 个月加缓冲。'
- id: A3
  name: 活跃客户每年平均收入
  value: '40.0'
  unit: USDK per customer-year
  source: '[BP investorMemo.firstCustomer.initialContract $12k-$30k annual subscription plus usage fees; BP businessModel revenueStreams] 基础情景假设约 $24K 平台订阅加生产规模下 $16K 的付款/银行卡/合作费收入。'
- id: A4
  name: 毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct] 因此 COGS 在模型中按收入的 30% 计算，涵盖合作通道费、支付支持和入驻运营。'
- id: A5
  name: 月度流失率
  value: '1.8'
  unit: percent
  source: '[BP killCriteria and workflow-stickiness thesis; startup-finance heuristic for an early annual-contract fintech workflow product.]'
- id: A6
  name: Y1 客户获取模式
  value: Month-end customers 0, 0, 0, 0, 1, 1, 2, 3, 3, 4, 5, 5
  unit: count
  source: '[BP milestones 0-12 months] 采用 3—5 个付费共创合作伙伴目标的上限，年末仍仅有 5 家付费机构上线。'
- id: A7
  name: Y2 季末客户数
  value: Q1Y2 8; Q2Y2 13; Q3Y2 19; Q4Y2 25
  unit: count
  source: '[BP milestones 12-24 months] 假设早期客户内的全机构扩展加稳定的走廊集群外联和转介。'
- id: A8
  name: Y3 季末客户数
  value: Q1Y3 35; Q2Y3 48; Q3Y3 63; Q4Y3 80
  unit: count
  source: '[BP milestones 24-36 months; BP market SOM 180 reachable agencies] 基础情景在第 3 年末达到可触达滩头市场机构不到一半。'
- id: A9
  name: 创始人/CEO 含税现金薪酬
  value: '96.0'
  unit: USDK per year
  source: '[BP team Founder CEO; startup-finance heuristic: below-market founder pay at pre-seed.]'
- id: A10
  name: 创始工程师含税现金薪酬
  value: '132.0'
  unit: USDK per year
  source: '[BP team Founding eng; startup-finance heuristic for a senior founding product/integration engineer.]'
- id: A11
  name: 产品与集成工程师含税现金薪酬
  value: '120.0'
  unit: USDK per year
  source: '[BP team Product and integrations engineer] 反映一名专注拉美的工程师招聘加薪资负担。'
- id: A12
  name: 合规与合作伙伴主管含税现金薪酬
  value: '96.0'
  unit: USDK per year
  source: '[BP team Compliance and partnerships lead] 精简的早期合规与合作伙伴负责人，专注走廊。'
- id: A13
  name: 解决方案工程师含税现金薪酬
  value: '96.0'
  unit: USDK per year
  source: '[BP team Solutions engineer] 涵盖客户专属工作流设置和入驻。'
- id: A14
  name: GTM 负责人含税现金薪酬
  value: '120.0'
  unit: USDK per year
  source: '[BP team GTM lead] 在试点可重复性明确后的第一个有配额的商务招聘。'
- id: A15
  name: 客户主管含税现金薪酬
  value: '108.0'
  unit: USDK per year
  source: '[BP gtm channels and funnelTargets; startup-finance heuristic for the first dedicated seller after the GTM lead.]'
- id: A16
  name: 客户成功与运营含税现金薪酬
  value: '84.0'
  unit: USDK per year
  source: '[BP operations weekly pilot ROI reviews and recurring templates] 早期售后操作员，负责付款和结账工作流。'
- id: A17
  name: 平台工程师 II 含税现金薪酬
  value: '108.0'
  unit: USDK per year
  source: '[BP product twelveMonth and twentyFourMonth] 在 Y2 增加，用于集成、路由规则和生产加固。'
- id: A18
  name: 招聘节奏
  value: Founder CEO and founding engineer in M1; product and integrations engineer in M4; compliance and partnerships lead in M7; solutions engineer in M10; GTM lead in M13; account executive in M18; customer success and ops in M19; platform engineer II in M22
  unit: timing
  source: '[BP team startTiming; BP strategicChoices.sequencingRationale] 只有在试点打包和合作伙伴尽调降低切口风险后，才增加规模化招聘。'
- id: A19
  name: 职能薪资分配
  value: Founder 70% S&M and 30% G&A; founding/product/platform engineers 100% R&D; compliance lead 40% S&M and 60% G&A; solutions engineer 60% R&D and 40% G&A; GTM and AE 100% S&M; customer success and ops 60% S&M and 40% G&A
  unit: allocation
  source: '[BP team rationales and operations] 分配遵循销售、研发、入驻和合规/合作伙伴工作的职责划分。'
- id: A20
  name: 非薪资运营支出
  value: Monthly non-payroll spend starts around $12.5K, rises to $19.0K once the first pilots are live, and reaches roughly $42.0K-$45.0K per quarter in Y3 sales/marketing, $36.0K-$42.0K per quarter in R&D, and $24.0K-$27.0K per quarter in G&A
  unit: USDK
  source: '[Startup-finance heuristic anchored to BP operations and corridor launch scope] 涵盖软件、云服务、差旅、法律、会计和合作伙伴尽调，不假设大量付费营销。'
- id: A21
  name: 收入确认政策
  value: Revenue equals average active customers in the period times A3, divided by 12 for Y1 months and by 4 for Y2/Y3 quarters; landing customers contribute half-period revenue in the entry period
  unit: policy
  source: '[Modeling convention anchored to BP paid-pilot-to-production conversion path] 将收入与客户数量和混合 ARPU 保持一致。'
- id: A22
  name: 现金转换政策
  value: EBITDA approximates cash movement; no debt, capex, taxes, or material working-capital swings are modeled
  unit: policy
  source: '[Startup-finance heuristic for a pre-seed software company selling annual or monthly contracts.]'
- id: A23
  name: 稳态 CAC
  value: '18.0'
  unit: USDK per new customer
  source: '[BP gtm channels and funnelTargets; research distributionChannels] 假设创始人主导销售加会计/基础设施转介，保持较低获客成本。'
- id: A24
  name: 融资里程碑
  value: Reach 25 paying agencies, prove one repeatable non-custodial stack across the three launch corridors, and activate at least 2 referral channels while preserving 6 months of buffer
  unit: milestone
  source: '[BP milestones 0-24 months; BP fundingAsk runwayMonths] 用于确定 pre-seed 融资需求规模。'
- id: A25
  name: Y3 人效杠杆
  value: End-of-year headcount stays at 9 FTE because recurring templates, audit exports, and partner-led onboarding absorb the Y3 customer ramp
  unit: operating leverage
  source: '[BP operations templates/audit logs and partner-led GTM thesis] 若此假设不成立，招聘节奏敏感性是模型第一个崩溃点。'
