scenarios:
  downside:
    description: 合作伙伴尽调和试点转化进展较慢，公司在 Y3 末以 60 家机构退出，混合客户年价值 $34K，且因更多手动支持导致利润率压缩。
    y3RevenueK: 1317.5
    y3EbitdaK: -548.3
    cashLowPointK: 320.2
    keyAssumptionChanges:
    - Y1 末 4 家付费机构（而非 5 家），Y2 末 20 家（而非 25 家）。
    - Y3 季末客户数从 35、48、63、80 降至 28、38、49、60。
    - 混合年收入从 $40K 降至 $34K，毛利率从 70% 滑落至 67%。
  base:
    description: 公司在 Y2 末以 25 家付费机构退出，Y3 末扩展至 80 家，维持约 $40K 的混合客户年价值和商业计划毛利率目标。
    y3RevenueK: 1985.0
    y3EbitdaK: -41.5
    cashLowPointK: 811.7
    keyAssumptionChanges:
    - 客户数遵循 A6、A7 和 A8。
    - 随着平台费和使用费同时挂钩，混合年收入维持在 $40K。
    - 毛利率维持商业计划 70% 目标，招聘遵循 A18，人效杠杆遵循 A25。
  upside:
    description: 转介渠道更早复利，机构采用更广泛的付款/银行卡量，公司在 Y3 末以 92 名客户退出，混合客户年价值 $44K，交付杠杆略有改善。
    y3RevenueK: 2585.0
    y3EbitdaK: 430.2
    cashLowPointK: 1135.5
    keyAssumptionChanges:
    - Y1 末 7 家付费机构，Y2 季末客户数升至 10、16、23、30。
    - Y3 季末客户数升至 42、58、74、92。
    - 混合年收入从 $40K 升至 $44K，毛利率从 70% 提升至 72%。
sensitivity:
- variable: ARPU
  downsideCase: 机构用量维持在较窄范围，合作分成收入有限，混合客户年价值稳定在 $34K。
  baseCase: 混合客户年价值维持模型设定的 $40K。
  upsideCase: 更多活动、银行卡和付款流进入平台后，混合客户年价值达到 $44K。
  y3RevenueImpactK: -297.5
  cashImpactK: -208.3
- variable: CAC
  downsideCase: 合作伙伴转介表现不佳，创始人主导外联需承担更多工作，CAC 上升至约 $24K。
  baseCase: 转介加走廊聚焦外联将 CAC 维持在约 $18K。
  upsideCase: 会计师和基础设施合作伙伴引入更多暖线索后，CAC 降至约 $14K。
  y3RevenueImpactK: -240.0
  cashImpactK: -420.0
- variable: churn
  downsideCase: 若产品仍局限于活动专属功能，未能成为系统记录，月度流失率上升至 2.5%。
  baseCase: 月度流失率维持模型设定的 1.8%。
  upsideCase: 可结账导出和重复模板嵌入每周运营后，月度流失率降至 1.2%。
  y3RevenueImpactK: -265.0
  cashImpactK: -190.0
- variable: sales cycle
  downsideCase: 因合规和合作伙伴审批仍需定制，试点转生产周期延长约 2 个月。
  baseCase: 试点转生产维持约 4 个月，与商业计划试点设计一致。
  upsideCase: 可重复的执行手册将周期压缩至约 3 个月。
  y3RevenueImpactK: -450.0
  cashImpactK: -360.0
- variable: gross margin
  downsideCase: 因入驻和付款支持比计划更手动，毛利率维持在 67%。
  baseCase: 毛利率维持商业计划 70% 目标。
  upsideCase: 合作方路由和模板减少支持负担后，毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -59.6
- variable: hiring pace
  downsideCase: 第二位解决方案工程师或财务运营招聘在 Y2 里程碑验证前被提前。
  baseCase: 招聘在 Y3 前保持精简，依赖合作伙伴主导的入驻杠杆。
  upsideCase: 客户成功指标保持强劲，非关键岗位招聘推迟至下一轮融资后。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionAgencies
      ProductionAgencies --> ManagedVolume
      ManagedVolume --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入靠 Y1 末 5 家付费机构增长到 Y2 末 25 家，再到 Y3 末 80 家，混合客户年收入维持约 $40K。
- checkName: 必须做对的事
  finding: 合作伙伴转介和可重复入驻必须将 CAC 维持在约 $18K，这样 9 名员工才能支撑 Y3 客户增长，而不形成服务密集型成本结构。
- checkName: 模型在以下情况崩溃
  finding: 若销售周期拉长且 ARPU 滑向下行情景，现金低点降至约 $320K，Y3 EBITDA 恶化至约 -$548K。
- checkName: 下轮融资验证条件
  finding: 一旦 25 家付费机构、两个活跃转介渠道和一套可重复三走廊非托管架构以约 70% 毛利率得到验证，下一轮融资即可推进。
sanityChecks:
  ruleOf40: Y3 增长率 260.9% + EBITDA 利润率 -2.1% = 258.8%（数值较高，因为 Y2 收入基数仍较小）。
  burnMultiple: Y2 约 1.0 倍，净新增 ARR 约 $800K（20 家净新增客户，混合客户年价值 $40K）。
  revenuePerFte: $221K Y3 每位年末员工收入（对比约 $200K—$400K SaaS 基准）。
  flags:
  - 基础情景假设 9 名年末员工支持 80 家机构，因此入驻模板和合作伙伴支持必须承接比典型服务密集型金融科技推出更多的负担。
  - $40K 混合客户年价值高于 $12K 市场规模测算锚点，因为模型包含使用费；尽调应将纯软件预算与支付衍生收入分开。
  - Y2 仍在 Y3 运营杠杆出现前消耗 $764K EBITDA，因此公司在不重新审视招聘节奏的情况下，无法承受长期监管或合作伙伴延误。
  - Rule-of-40 输出值偏高，仅因 Y2 收入基数仍较小；投资者应更关注 CAC、试点转化率和客户留存，而非头部百分比。
