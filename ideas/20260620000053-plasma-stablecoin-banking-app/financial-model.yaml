slug: creator-agency-cash-os
date: '2026-06-20'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date] Base case starts the month after the business-plan date.'
- id: A2
  name: Starting cash after pre-seed close
  value: '2.3'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M] Base case uses a near-low-end $2.3M close to fund the first 24 months plus buffer.'
- id: A3
  name: Blended annual revenue per active customer
  value: '40.0'
  unit: USDK per customer-year
  source: '[BP investorMemo.firstCustomer.initialContract $12k-$30k annual subscription plus usage fees; BP businessModel revenueStreams] Base case assumes roughly a $24K platform subscription plus $16K of payout/card/partner-fee revenue at production scale.'
- id: A4
  name: Gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct] COGS therefore model at 30% of revenue for partner-rail fees, payment support, and onboarding operations.'
- id: A5
  name: Monthly churn
  value: '1.8'
  unit: percent
  source: '[BP killCriteria and workflow-stickiness thesis; startup-finance heuristic for an early annual-contract fintech workflow product.]'
- id: A6
  name: Y1 customer landing pattern
  value: Month-end customers 0, 0, 0, 0, 1, 1, 2, 3, 3, 4, 5, 5
  unit: count
  source: '[BP milestones 0-12 months] Uses the top end of the 3-5 paid design-partner goal and still keeps only 5 paying agencies live by year-end.'
- id: A7
  name: Y2 quarter-end customers
  value: Q1Y2 8; Q2Y2 13; Q3Y2 19; Q4Y2 25
  unit: count
  source: '[BP milestones 12-24 months] Assumes agency-wide expansion within early customers plus steady corridor-cluster outbound and referrals.'
- id: A8
  name: Y3 quarter-end customers
  value: Q1Y3 35; Q2Y3 48; Q3Y3 63; Q4Y3 80
  unit: count
  source: '[BP milestones 24-36 months; BP market SOM 180 reachable agencies] Base case reaches fewer than half of the reachable beachhead agencies by year 3.'
- id: A9
  name: Founder CEO loaded cash compensation
  value: '96.0'
  unit: USDK per year
  source: '[BP team Founder CEO; startup-finance heuristic: below-market founder pay at pre-seed.]'
- id: A10
  name: Founding engineer loaded cash compensation
  value: '132.0'
  unit: USDK per year
  source: '[BP team Founding eng; startup-finance heuristic for a senior founding product/integration engineer.]'
- id: A11
  name: Product and integrations engineer loaded cash compensation
  value: '120.0'
  unit: USDK per year
  source: '[BP team Product and integrations engineer] Reflects a LatAm-focused engineering hire plus payroll burden.'
- id: A12
  name: Compliance and partnerships lead loaded cash compensation
  value: '96.0'
  unit: USDK per year
  source: '[BP team Compliance and partnerships lead] Lean early compliance-and-partner owner with corridor-specific focus.'
- id: A13
  name: Solutions engineer loaded cash compensation
  value: '96.0'
  unit: USDK per year
  source: '[BP team Solutions engineer] Covers customer-specific workflow setup and onboarding.'
- id: A14
  name: GTM lead loaded cash compensation
  value: '120.0'
  unit: USDK per year
  source: '[BP team GTM lead] First quota-carrying commercial hire after pilot repeatability is visible.'
- id: A15
  name: Account executive loaded cash compensation
  value: '108.0'
  unit: USDK per year
  source: '[BP gtm channels and funnelTargets; startup-finance heuristic for the first dedicated seller after the GTM lead.]'
- id: A16
  name: Customer success and ops loaded cash compensation
  value: '84.0'
  unit: USDK per year
  source: '[BP operations weekly pilot ROI reviews and recurring templates] Early post-sale operator for payout and close workflows.'
- id: A17
  name: Platform engineer II loaded cash compensation
  value: '108.0'
  unit: USDK per year
  source: '[BP product twelveMonth and twentyFourMonth] Added in Y2 for integrations, routing rules, and production hardening.'
- id: A18
  name: Hiring cadence
  value: Founder CEO and founding engineer in M1; product and integrations engineer in M4; compliance and partnerships lead in M7; solutions engineer in M10; GTM lead in M13; account executive in M18; customer success and ops in M19; platform engineer II in M22
  unit: timing
  source: '[BP team startTiming; BP strategicChoices.sequencingRationale] Adds scale hires only after pilot packaging and partner diligence de-risk the wedge.'
- id: A19
  name: Functional payroll allocation
  value: Founder 70% S&M and 30% G&A; founding/product/platform engineers 100% R&D; compliance lead 40% S&M and 60% G&A; solutions engineer 60% R&D and 40% G&A; GTM and AE 100% S&M; customer success and ops 60% S&M and 40% G&A
  unit: allocation
  source: '[BP team rationales and operations] Allocation follows who sells, builds, onboards, and manages partner/compliance work.'
- id: A20
  name: Non-payroll operating spend
  value: Monthly non-payroll spend starts around $12.5K, rises to $19.0K once the first pilots are live, and reaches roughly $42.0K-$45.0K per quarter in Y3 sales/marketing, $36.0K-$42.0K per quarter in R&D, and $24.0K-$27.0K per quarter in G&A
  unit: USDK
  source: '[Startup-finance heuristic anchored to BP operations and corridor launch scope] Covers software, cloud, travel, legal, accounting, and partner diligence without assuming heavy paid marketing.'
- id: A21
  name: Revenue recognition policy
  value: Revenue equals average active customers in the period times A3, divided by 12 for Y1 months and by 4 for Y2/Y3 quarters; landing customers contribute half-period revenue in the entry period
  unit: policy
  source: '[Modeling convention anchored to BP paid-pilot-to-production conversion path] Keeps revenue reconciled to customer counts and blended ARPU.'
- id: A22
  name: Cash conversion policy
  value: EBITDA approximates cash movement; no debt, capex, taxes, or material working-capital swings are modeled
  unit: policy
  source: '[Startup-finance heuristic for a pre-seed software company selling annual or monthly contracts.]'
- id: A23
  name: Steady-state CAC
  value: '18.0'
  unit: USDK per new customer
  source: '[BP gtm channels and funnelTargets; research distributionChannels] Assumes founder-led selling plus accountant/infrastructure referrals keep acquisition efficient.'
- id: A24
  name: Funding milestone
  value: Reach 25 paying agencies, prove one repeatable non-custodial stack across the three launch corridors, and activate at least 2 referral channels while preserving 6 months of buffer
  unit: milestone
  source: '[BP milestones 0-24 months; BP fundingAsk runwayMonths] Used to size the pre-seed ask.'
- id: A25
  name: Headcount leverage in Y3
  value: End-of-year headcount stays at 9 FTE because recurring templates, audit exports, and partner-led onboarding absorb the Y3 customer ramp
  unit: operating leverage
  source: '[BP operations templates/audit logs and partner-led GTM thesis] If this proves false, the hiring-pace sensitivity is the first place the model breaks.'
