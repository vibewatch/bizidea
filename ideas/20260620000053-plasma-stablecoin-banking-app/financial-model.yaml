scenarios:
  downside:
    description: Partner diligence and pilot conversion move slower, so the company exits Y3 with 60 agencies at a $34K blended customer-year value and margin compression from more manual support.
    y3RevenueK: 1317.5
    y3EbitdaK: -548.3
    cashLowPointK: 320.2
    keyAssumptionChanges:
    - Y1 exits with 4 paying agencies instead of 5 and Y2 exits with 20 instead of 25.
    - Y3 quarter-end customers fall from 35, 48, 63, 80 to 28, 38, 49, 60.
    - Blended annual revenue per active customer falls from $40K to $34K and gross margin slips from 70% to 67%.
  base:
    description: The company exits Y2 with 25 paying agencies, then scales to 80 by Y3 exit while holding a roughly $40K blended customer-year value and the BP gross-margin target.
    y3RevenueK: 1985.0
    y3EbitdaK: -41.5
    cashLowPointK: 811.7
    keyAssumptionChanges:
    - Customer counts follow A6, A7, and A8.
    - Blended annual revenue per active customer stays at $40K as platform fees and usage fees both attach.
    - Gross margin stays at the 70% BP target while hiring follows A18 and headcount leverage follows A25.
  upside:
    description: Referral channels compound earlier and agencies adopt broader payout/card volumes, so the company exits Y3 with 92 customers at a $44K blended customer-year value and slightly better delivery leverage.
    y3RevenueK: 2585.0
    y3EbitdaK: 430.2
    cashLowPointK: 1135.5
    keyAssumptionChanges:
    - Y1 exits with 7 paying agencies and Y2 quarter-end customers rise to 10, 16, 23, and 30.
    - Y3 quarter-end customers rise to 42, 58, 74, and 92.
    - Blended annual revenue per active customer rises from $40K to $44K and gross margin improves from 70% to 72%.
sensitivity:
- variable: ARPU
  downsideCase: Blended customer-year value settles at $34K because agencies keep usage narrow and partner-share revenue stays modest.
  baseCase: Blended customer-year value stays at $40K as modeled.
  upsideCase: Blended customer-year value reaches $44K once more campaigns, cards, and payout flows land on-platform.
  y3RevenueImpactK: -297.5
  cashImpactK: -208.3
- variable: CAC
  downsideCase: CAC rises toward $24K because partner referrals underperform and founder-led outbound has to do more of the work.
  baseCase: CAC stays near $18K with referrals plus corridor-focused outbound.
  upsideCase: CAC falls toward $14K once accountants and infrastructure partners source warmer leads.
  y3RevenueImpactK: -240.0
  cashImpactK: -420.0
- variable: churn
  downsideCase: Monthly churn rises to 2.5% if the product stays campaign-specific and fails to become the system of record.
  baseCase: Monthly churn stays at 1.8% as modeled.
  upsideCase: Monthly churn falls to 1.2% once close-ready exports and recurring templates are embedded in weekly operations.
  y3RevenueImpactK: -265.0
  cashImpactK: -190.0
- variable: sales cycle
  downsideCase: Pilot-to-production stretches by roughly 2 months because compliance and partner approvals stay bespoke.
  baseCase: Pilot-to-production stays near 4 months, consistent with the BP pilot design.
  upsideCase: Repeatable playbooks compress the cycle toward 3 months.
  y3RevenueImpactK: -450.0
  cashImpactK: -360.0
- variable: gross margin
  downsideCase: Gross margin holds at 67% because onboarding and payout support stay more manual than planned.
  baseCase: Gross margin stays at the BP target of 70%.
  upsideCase: Gross margin reaches 72% as partner routing and templates reduce support load.
  y3RevenueImpactK: 0.0
  cashImpactK: -59.6
- variable: hiring pace
  downsideCase: A second solutions or finance-ops hire is pulled forward before the Y2 milestone is proven.
  baseCase: Hiring stays lean through Y3 and relies on partner-led onboarding leverage.
  upsideCase: Noncritical hires are delayed until after the next round because customer success metrics stay strong.
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionAgencies
      ProductionAgencies --> ManagedVolume
      ManagedVolume --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by moving from 5 paying agencies at Y1 exit to 25 at Y2 exit and 80 at Y3 exit while blended customer-year revenue stays near $40K.
- checkName: Must go right
  finding: Partner referrals and repeatable onboarding have to keep CAC near $18K so 9 FTE can support the Y3 customer ramp without a services-heavy cost structure.
- checkName: Model breaks if
  finding: If sales cycles stretch and ARPU slips toward the downside case, cash low point falls to about $320K and Y3 EBITDA deteriorates to roughly -$548K.
- checkName: Next-round proof
  finding: The next financing is justified once 25 paying agencies, two active referral channels, and one repeatable three-corridor non-custodial stack are proven at about 70% gross margin.
sanityChecks:
  ruleOf40: Y3 growth 260.9% + EBITDA margin -2.1% = 258.8% (numerically strong because the Y2 revenue base is still small).
  burnMultiple: About 1.0x in Y2 on roughly $800K of net new ARR from 20 net customer adds at a $40K blended customer-year value.
  revenuePerFte: $221K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K SaaS).
  flags:
  - The base case assumes 80 agencies on 9 end-of-year FTE, so onboarding templates and partner support must absorb more load than a typical services-heavy fintech rollout.
  - The $40K blended customer-year value sits above the $12K market-sizing anchor because the model includes usage fees; diligence should separate pure software budget from payment-derived revenue.
  - Y2 still burns $764K of EBITDA before the Y3 operating leverage appears, so the company cannot afford a long regulatory or partner delay without revisiting hiring pace.
  - The rule-of-40 output looks unusually high only because Y2 revenue is still small; investors should focus more on CAC, pilot conversion, and customer retention than on the headline percentage.
