problem: >-
  Cross-border creator and performance-marketing agencies in Latin America often
  collect U.S. dollars in one tool, pay creators and contractors from another,
  issue team spend cards from a third, and park reserves somewhere else. Every
  handoff creates FX leakage, payout delays, and messy month-end reconciliation,
  which is painful when campaigns run on weekly cash cycles. Generic stablecoin
  wallets speed transfers but still do not provide campaign-level controls,
  shared ledgers, or finance workflows for agency teams.
targetUser:
  primary: Operations and finance leads at Latin American creator and performance-marketing agencies serving U.S. brands
  secondary: Agency founders and campaign operations managers
  buyer: Founder, COO, or head of finance at a cross-border creator agency
startupThesis:
  nonObviousInsight: >-
    The first durable stablecoin-banking winners will not be generic consumer
    wallets; they will be workflow-specific operating accounts for
    micro-multinationals that both receive and redeploy dollars every week. Once
    card spend, instant transfers, and yield are bundled, the hard remaining
    problem is operational control and reconciliation around team spending and
    payouts.
  beachhead: >-
    Latin American influencer-marketing and performance agencies with 10-100
    contractors, U.S.-dollar client retainers, weekly creator payouts, and
    recurring ad-spend card usage across multiple active campaigns
  wedge: >-
    A campaign treasury workspace that takes in USD or stablecoins, issues
    virtual cards per campaign, sends instant creator payouts, and auto-sweeps
    idle cash into a reserve bucket inside one controlled ledger
  whyNowCatalyst: >-
    Plasma's launch shows that zero-fee stablecoin accounts with card spend,
    instant transfers, and yield are mature enough to be repackaged into
    vertical operating software rather than another generic wallet.
  ventureScalePath: >-
    Start with creator agencies, then expand into other export-service SMBs such
    as recruiting firms, outsourcing shops, and marketplace sellers that need
    the same cross-border cash stack. Over time, the product can add invoicing,
    underwriting, supplier payments, and working-capital products on top of the
    transaction ledger.
solution: >-
  Creator Agency Cash OS gives agencies a stablecoin-native operating account
  built around campaign workflows instead of personal-wallet UX. Agencies can
  receive client funds, create sub-accounts by campaign or client, issue virtual
  cards to media buyers, and pay creators or contractors instantly from the same
  ledger. The system auto-tags every movement to a campaign, exports close-ready
  records for bookkeeping, and lets idle balances sit in a reserve bucket rather
  than in scattered accounts. The first product win is not generic banking; it
  is eliminating cash fragmentation for agencies that already behave like tiny
  cross-border financial networks.
goToMarketSeed:
  firstCustomer: >-
    Founder-led creator and influencer-marketing agencies in Mexico City,
    Buenos Aires, and São Paulo with $2 million-$15 million in annual billings,
    U.S. clients, and 20-200 monthly creator or vendor payouts
  buyingTrigger: >-
    The agency lands several new U.S. clients or increases creator payout volume
    to the point that juggling bank accounts, cards, and manual stablecoin
    transfers starts delaying payouts and client reporting
  currentAlternative: >-
    Wise or a U.S. SMB bank account plus card tools, spreadsheets, WhatsApp
    payout instructions, and occasional manual USDC transfers
  switchingReason: >-
    One controlled account cuts payout time, reduces FX leakage, and gives the
    finance team campaign-level visibility across cards, transfers, and reserve
    balances without stitching together separate bank and wallet products.
  pricingHypothesis: >-
    Monthly platform fee plus usage pricing on managed payout volume and card
    spend, with optional revenue share from partner banking or yield products.
