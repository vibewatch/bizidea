jobsToBeDone:
  - job: >-
      When a creator agency receives U.S.-dollar retainers, help the finance
      lead route funds into creator payouts, campaign spend, and reserves so
      campaigns launch without cash gaps.
    currentAlternative: Bank account plus spreadsheets plus manual stablecoin transfers
    successMetric: Creator payouts and campaign funding completed within the same day funds arrive
  - job: >-
      When month-end arrives, help the finance team reconcile every card swipe
      and payout back to a client campaign so they can close books and report
      margin quickly.
    currentAlternative: Manual exports from banks, card tools, and wallet history into spreadsheets
    successMetric: Month-end close completed in fewer days with campaign-level cash visibility
