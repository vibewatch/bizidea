topRisks:
  - name: Distribution concentration
    description: >-
      Reaching agency founders cheaply may be difficult because the segment is
      fragmented and trust-sensitive around money movement.
    mitigation: >-
      Start in one corridor with accountant and operator referrals, then use
      campaign-specific ROI and peer case studies to expand through agency
      communities.
  - name: Regulatory dependency
    description: >-
      Stablecoin, yield, and card economics can vary sharply across the agency's
      home market and the jurisdictions of its clients and contractors.
    mitigation: >-
      Launch as a software and controls layer on top of licensed partners, keep
      yield optional, and narrow initial go-to-market to jurisdictions with
      clearer operating rules.
  - name: Rail commoditization
    description: >-
      Generic stablecoin neobanks or card issuers may copy basic account and
      payout features once the category proves out.
    mitigation: >-
      Win on workflow depth by owning campaign ledgers, reconciliation, approval
      logic, and agency-specific integrations that are harder to replicate than
      raw money movement.
