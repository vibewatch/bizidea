topRisks:
- name: 捐助方采购拖慢进度
  description: 冗长的 grant 周期和多方审批，可能让前几年的销售既慢又偏服务化。
  mitigation: 先从已经拿到试点预算的捐助型执行机构切入，先签单一国家部署，再把重复语言和工作流扩成订阅续费。
- name: 临床安全责任风险
  description: 一旦 Copilot 给出不安全的孕产健康建议，在工作流数据沉淀起来之前，信任就可能先崩掉。
  mitigation: 只在协议边界清楚的推荐流程里上线，强制保留临床升级转介，并把评测与审批产物嵌进每一次部署。
- name: 平台能力被快速商品化
  description: 一旦公益需求变得显眼，大模型厂商或开源工具可能补上通用的本地化和治理功能。
  mitigation: 在低资源语言运营、按国家定制的审核流程，以及深度主权部署执行上赢下来——这些通常不是通用平台会深做的部分。
