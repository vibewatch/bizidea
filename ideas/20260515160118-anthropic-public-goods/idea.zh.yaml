jobsToBeDone:
- job: 当一个捐助型项目想在本地语言里上线孕产风险 Copilot 时，帮数字医疗团队证明它足够安全、受协议约束，而且能部署在获批基础设施上，这样他们就能不用再做一个定制顾问项目也能上线。
  currentAlternative: 手工翻译审核、顾问搭建的试点，以及通用云 MLOps 流程
  successMetric: 从试点概念到境内部署获批的时间
- job: 当卫生部或捐助方追问某个 AI 工作流到底是怎么测试、怎么治理的，帮实施团队拿出按语言划分的证据和审计轨迹，这样他们才能拿到审批并续上资金。
  currentAlternative: 共享文档、电子表格追踪器和临时拼出来的验证笔记
  successMetric: 审批周期时长，以及每次部署触发的审核问题数
