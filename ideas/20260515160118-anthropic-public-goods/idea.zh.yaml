problem: 捐助资金支持的医疗执行机构和卫生部越来越想给一线工作人员上 AI 工具，但本地语言部署至今仍靠一次性的翻译供应商、顾问临时写的 提示词 和通用云工具硬拼起来——这些东西本来就不是为低资源语言、离线场景或公共部门审计设计的。即便新的公共数据集和模型已经出现，团队还是很难证明回答始终受协议约束、敏感数据只会流向获批基础设施，也很难留下按语言版本管理的测试记录。结果就是，每进入一个国家都要重做一遍定制化服务项目，公益 AI 本该变成可复制的公共卫生基础设施，这一步反而被拖慢了。
targetUser:
  primary: 在撒哈拉以南非洲运营社区卫生工作者项目、负责孕产和儿童健康项目的捐助型执行机构数字医疗负责人。
  secondary: 负责各国部署审批的卫生部 AI、数据与临床协议团队。
  buyer: 大型公共卫生 NGO 的国家项目总监、CIO，或数字化创新负责人
startupThesis:
  nonObviousInsight: 真正稀缺的资产，已经不只是模型或语料。随着公共资金开始产出开放的非洲语言数据和公益模型，瓶颈会转到那层运营工作流：怎么把模型本地化、评测、审批，再安全地部署进真实的医疗项目。谁把这层运营层做成标准件，谁就有机会成为公共 AI 资产通向一线服务的默认路径。
  beachhead: 从撒哈拉以南非洲的社区卫生工作者决策支持项目切入，先做孕产风险筛查和转诊场景；这些项目需要在 NGO 和卫生部部署中，以斯瓦希里语、豪萨语、阿姆哈拉语等低资源语言提供经过审批的指导。
  wedge: 做一套本地化与安全运营栈，把公共语言数据集和临床协议转成带版本的评测套件、人工审核流程、获批 prompt 包，以及面向孕产健康 Copilot 的主权部署包。
  whyNowCatalyst: Anthropic 与 Gates Foundation 现在已经真金白银押注开放的非洲语言数据和公共卫生工具，这意味着执行机构很快就会拿到可用资产，但仍然缺少一层运营系统，把这些资产做得足够安全、足够本地化、也足够可部署。
  ventureScalePath: 先拿下孕产健康和社区卫生工作者工作流，再把同一套本地化、评测和主权部署栈扩到宫颈筛查、传染病、教师知识助手，最后成为医疗、教育和政府服务中公益 AI 项目的默认基础设施层。
solution: 产品会吃进公共语言数据集、各国临床指南和工作流记录，为每种部署语言、每个用例自动生成本地化评测集。项目团队可以在一个工作区里把翻译、临床审核、红队测试和审批签字全部走完，再决定是否交到一线人员手里。审批通过后，系统会把 Copilot 打包到允许使用的基础设施上，包括主权云或境内部署，并附上数据处理、升级转介和审计日志的策略规则。第一版聚焦社区卫生工作者使用的孕产风险分诊、转诊建议和协议遵循，因为这里的价值最具体，安全边界也足够窄，便于量化。
goToMarketSeed:
  firstCustomer: 首个客户最好是一家在肯尼亚或尼日利亚运行社区卫生工作者项目、且拿到 Gates 或类似基金资助的孕产与儿童健康执行机构；它想试点斯瓦希里语或豪萨语 AI 助手，但又不愿把敏感健康数据送进海外托管的黑箱流程。
  buyingTrigger: 新的捐助 grant、国家级试点启动，或卫生部评审到来时，项目必须同时拿出低资源语言支持，以及主权、安全测试和协议遵循的证据，才能上线。
  currentAlternative: 当前替代方案通常是：在通用 MLOps 栈上做定制顾问项目，再配合手工翻译、临床审核，以及散落在表格和共享文档里的 NGO/卫生部试点流程。
  switchingReason: 这个切口能让执行机构拿到可复用的本地语言评测包、审批流程和部署证据，之后跨国家复制时不用每次都从头重建信任和合规。
  pricingHypothesis: 收费假设是：按活跃国家项目收年平台费，再对每个语言-工作流包收一次性上线费；若客户需要主权托管、临床审核和审计报告，则卖更高价的高级支持。
