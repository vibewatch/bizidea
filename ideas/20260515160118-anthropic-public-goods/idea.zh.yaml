differentiator: 这不是给 NGO 再套一层基础模型壳。产品从一开始就是为低资源语言评测、主权部署和公益场景里的审批工作流而做——在这些场景里，每一种语言、每一条协议、每一次托管选择都得说得清、经得起审。它的护城河不在模型本身，而在可复用的评测包、各国部署 操作手册，以及一张不断积累的工作流图谱：哪些做法能在不同语言和司法辖区的孕产项目里真正过审。
