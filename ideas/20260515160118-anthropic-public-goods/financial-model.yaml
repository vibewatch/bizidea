modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      GrantTrigger --> PaidPilot
      PaidPilot --> ApprovedWorkflowUnits
      ApprovedWorkflowUnits --> ExpansionPacks
      ApprovedWorkflowUnits --> PlatformRevenue
      ExpansionPacks --> PlatformRevenue
      PlatformRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches 10 active workflow units by Q4Y3, with revenue driven by 3 initial pilots converting and 2-3 existing programs adding a second language or workflow pack.
- checkName: Must go right
  finding: At least 2 early pilots must convert to production by Y2 so the company monetizes expansion before adding a broader services bench.
- checkName: Model breaks if
  finding: If sales cycles drift toward 9 months or blended ARPU falls toward $120K, downside cash compresses to roughly $165K before the next round proof is visible.
- checkName: Next-round proof
  finding: A credible next raise happens once Y2 exits with 7 active workflow units, about 70% gross margin, and one live second-language expansion inside an existing maternal-health account.
sanityChecks:
  ruleOf40: Y3 growth 127.78% + EBITDA margin -26.43% = 101.35%
  burnMultiple: Y2 burn multiple 1.14x, improving to 0.56x in Y3 on net new ARR.
  revenuePerFte: $175.98K Y3 on 7 exit FTE (benchmark $200-400K SaaS)
  flags:
  - Revenue per FTE remains below a typical SaaS benchmark because the product still carries implementation and approval-workflow overhead through Y3.
  - The model stays EBITDA negative in Y3, so a slower conversion cadence would pull the next financing forward despite improved gross margin.
  - ARPU assumes some programs buy sovereign-hosting support and second-language or adjacent workflow packs; if buyers stay pilot-only, the revenue base is too light for the planned team.
  - Customer concentration and donor procurement risk are high because only a handful of implementers likely drive most of the first 10 workflow units.
