competitors:
- name: Dimagi CommCare
  stage: 在位
  wedge: 面向 NGO 和医疗项目的离线优先一线工作流与 个案管理 平台。
  pricing: $250/mo 标准版，到 $4,000/mo+ 企业版起。
  strength: 安装底座大、定价透明、支持云区域选择，且安全与合规能力成熟。
  weaknessVsUs: 它擅长工作流基础设施，但并不是为多语言 AI 评测、人工审核治理或主权部署证据而做。
  sourceRefs:
  - 15
  - 16
  - 18
  - 19
- name: Jacaranda PROMPTS
  stage: 成长期
  wedge: 面向孕产健康的 SMS 平台，带 AI 助手与本地化非洲语言模型。
  pricing: 无公开价目表；强调低单元成本，并可与政府预算共同出资。
  strength: 对孕产健康工作流理解深、真实使用规模大，而且在低资源语言 AI 上有可信执行力。
  weaknessVsUs: 它更像垂直一体化的应用，而不是其他执行机构可跨项目、跨国家复用的中立平台。
  sourceRefs:
  - 23
  - 27
  - 28
  - 29
  - 33
  - 34
- name: OpenSRP
  stage: 在位
  wedge: 面向一线工作者和国家项目的 FHIR 原生开源智能登记平台。
  pricing: 核心开源，商业模式以实施服务为主；没有统一公开的 SaaS 价目表。
  strength: 有国家级部署、离线优先架构，并明确对齐 WHO SMART 指南与 FHIR。
  weaknessVsUs: 它掌握的是登记和工作流层，不是 AI 助手的本地化、评测与审批控制平面。
  sourceRefs:
  - 37
  - 38
- name: Medic CHT
  stage: 在位
  wedge: 面向偏远场景的开源社区医疗工具包，服务最后一公里 CHW 应用。
  pricing: 软件开源，实施和支持通过生态合作伙伴交付，而不是公开 seat 定价。
  strength: 在 CHW 场景可信度高、国家覆盖广，而且为农村最后一公里场景深度做了离线优先设计。
  weaknessVsUs: 它非常适合社区医疗工作流，但不是专门做孕产 AI 安全运营和主权部署的产品。
  sourceRefs:
  - 43
  - 44
- name: Viamo
  stage: 成长期
  wedge: 面向低连接环境普通手机用户的语音与 IVR 触达基础设施。
  pricing: 企业和项目报价定制，未公开。
  strength: 能触达到没有智能手机、没有网络、甚至识字能力有限的用户，而且在非洲已有真实医疗项目部署。
  weaknessVsUs: 它更像分发渠道或交互层，而不是端到端的本地化与治理技术栈。
  sourceRefs:
  - 51
  - 52
  - 53
regulatoryTechnicalConstraints:
- point: 孕产健康 AI 部署需要明确的伦理、伤害最小化和人工审核控制，而不能走完全自动化建议流程。
  sourceRefs:
  - 5
  - 25
  - 36
- point: 肯尼亚的医疗数据处理已经处在正式的数据控制者 / 处理者合规与指南体系下，这直接抬高了审计就绪门槛。
  sourceRefs:
  - 60
  - 61
- point: 产品必须适应有限连接和本地基础设施现实；在很多目标场景里，离线优先不是可选项。
  sourceRefs:
  - 38
  - 44
  - 55
- point: 想和国家系统及现有平台打通，产品就必须讲 FHIR 这类标准，并支持交换层编排模式。
  sourceRefs:
  - 37
  - 39
  - 56
  - 57
validationSignals:
- point: Anthropic 与 Gates Foundation 已经新建了一池多年期公益 AI 资金，目标直指医疗、教育和非洲语言数据。
  sourceRefs:
  - 1
  - 2
- point: UNICEF 的数字医疗平台已经在 18 个国家触达数千万名母亲、CHW、接种人员和医疗机构工作人员。
  sourceRefs:
  - 10
- point: Jacaranda 证明孕产健康数字支持不必永远停在试点，也能长到国家层面的买方认可。
  sourceRefs:
  - 29
  - 32
  - 33
- point: 开源一线平台已经在这家创业公司面向的同一买方宇宙里，证明了国家级部署是可行的。
  sourceRefs:
  - 37
  - 43
  - 55
- point: 在不能假设用户有智能手机、识字能力或持续流量的地方，语音和 IVR 渠道依然有效。
  sourceRefs:
  - 51
  - 52
  - 53
openQuestions:
- 肯尼亚和尼日利亚有哪些具名执行机构，已经在 2026 年预算里为本地化 AI 的孕产或 CHW 工作流留出资金？
- 在每个目标国家里，孕产健康 Copilot 从捐助试点走到国家部署之前，卫生部到底强制要求哪些审查产物？
- 在最初三个国家里，现在花在定制咨询和翻译上的持续预算，有多少能转成年软件合同？
- 除了斯瓦希里语、豪萨语和约鲁巴语之外，还有哪些语言对滩头市场足够紧迫，值得第一年就投专门的评测包？
