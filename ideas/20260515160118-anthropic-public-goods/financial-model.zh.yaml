modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  GrantTrigger[Grant 触发] --> PaidPilot[付费试点]\n  PaidPilot --> ApprovedWorkflowUnits[获批工作流单元]\n  ApprovedWorkflowUnits --> ExpansionPacks[扩张包]\n  ApprovedWorkflowUnits --> PlatformRevenue[平台收入]\n  ExpansionPacks --> PlatformRevenue\n  PlatformRevenue --> GrossProfit[毛利润]\n  GrossProfit --> OperatingCash[经营现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形在 Q4Y3 达到 10 个活跃工作流单元，收入来自 3 个初始试点转生产，以及 2-3 个现有项目增加第二语言或工作流包。
- checkName: 必须做对的事
  finding: 到 Y2 至少要有 2 个早期试点转成生产合同，这样公司才能在扩招更大服务团队前，先靠扩张收入变现。
- checkName: 模型会在哪种情况下失效
  finding: 如果销售周期滑到 9 个月，或混合 ARPU 跌向 $120K，下行情形下的现金最低点会被压到大约 $165K，而下一轮融资证明还没形成。
- checkName: 下一轮融资证明
  finding: 当 Y2 结束时做到 7 个活跃工作流单元、约 70% 毛利率，并在现有孕产健康客户里跑出 1 个真实的第二语言扩张，公司才有可信的下一轮融资故事。
sanityChecks:
  ruleOf40: Rule of 40：Y3 增长率 127.78% + EBITDA 利润率 -26.43% = 101.35%
  burnMultiple: Burn multiple：Y2 为 1.14x，基于净新增 ARR 到 Y3 改善至 0.56x。
  revenuePerFte: 人均收入：Y3 退出时 7 名 FTE，对应 $175.98K（对比 SaaS 常见基准 $200-400K）
  flags:
  - 由于产品到 Y3 仍带着实施和审批工作流负担，人均收入仍低于典型 SaaS 基准。
  - 模型在 Y3 仍是 EBITDA 亏损，因此如果转化节奏更慢，下一轮融资就会被提前。
  - ARPU 假设里包含部分项目购买主权托管支持，以及第二语言或相邻工作流包；如果买方始终只愿做试点，这套收入底座撑不起计划中的团队。
  - 客户集中度和捐助方采购风险都很高，因为前 10 个工作流单元大概率只由少数几家执行机构贡献。
