scenarios:
  downside:
    description: grant 审批推迟，试点按时转化的数量更少，而语言包复用也比计划来得更晚。
    y3RevenueK: 770.0
    y3EbitdaK: -680.05
    cashLowPointK: 164.59
    keyAssumptionChanges:
    - Y2 年末只做到 5 个活跃工作流单元，Y3 年末做到 7 个而不是 10 个，因为销售周期被拉长到接近 9 个月。
    - 混合年 ARPU 落在约 $120K，因为买方把更多工作留在项目预算内，并且更少购买主权托管附加项。
    - 毛利率只能走到约 68%，因为临床审核和本地化工作流更久地停留在手工状态。
  base:
    description: 公司先把第一批孕产健康试点转成可复制的年度部署，再在现有项目里拿下少量第二语言和相邻工作流扩张。
    y3RevenueK: 1231.88
    y3EbitdaK: -325.6
    cashLowPointK: 580.22
    keyAssumptionChanges:
    - 活跃工作流单元从 Y1 结束时的 3 个，升到 Y2 结束时的 7 个，再到 Y3 结束时的 10 个，因为有 2-3 个项目会从首个部署继续扩张。
    - 到 Y3，混合年 ARPU 提升到 $135K；这仍落在 business plan 的生产定价区间内，但高级托管和扩张包占比更高。
    - 随着审核产物和部署模板越来越可复用，到 Q4Y3 毛利率改善到 73%。
  upside:
    description: 合作伙伴渠道更早奏效，复用效率更强，公司在几乎不增加额外人头的情况下就卖出更多第二语言包。
    y3RevenueK: 1601.04
    y3EbitdaK: -29.99
    cashLowPointK: 850.07
    keyAssumptionChanges:
    - Y2 年末做到 8 个活跃单元，Y3 年末做到 13 个，因为多国执行机构比预期更快采纳第二个包。
    - 随着主权托管和合规报告更常被一起购买，混合年 ARPU 升到约 $145K。
    - 审核与审批工作流变得更依赖模板、而不是重运营，毛利率走到接近 75%。
