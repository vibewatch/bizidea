problem: >-
  Donor-funded health implementers and ministries increasingly want to launch AI tools for frontline workers, but local-language
  deployment is still held together with one-off translation vendors, consultant-built prompts, and generic cloud tooling that
  was never designed for low-resource languages, offline use, or public-sector audit. Even when new public datasets and models
  exist, teams struggle to prove that answers stay within protocol, route sensitive data to approved infrastructure, and keep a
  versioned record of what was tested in each language. That turns every country rollout into a bespoke services project and
  slows the moment when public-good AI is supposed to become a repeatable public-health utility.
targetUser:
  primary: Directors of digital health at donor-funded maternal and child health implementers operating community health worker programs in sub-Saharan Africa.
  secondary: Ministry of Health AI, data, and clinical protocol teams overseeing country-specific deployment approvals.
  buyer: Country program director, CIO, or head of digital innovation at a large public-health NGO
startupThesis:
  nonObviousInsight: >-
    The scarce asset is no longer just the model or the corpus. As public funding creates open African-language data and
    public-interest models, the bottleneck moves to the workflow that localizes, evaluates, approves, and deploys those models
    safely inside real health programs. The company that owns that operational layer can become the standard path from public
    AI assets to live frontline services.
  beachhead: >-
    Community health worker decision-support programs for maternal-risk screening and referral in sub-Saharan Africa that need
    approved guidance in Swahili, Hausa, Amharic, or other low-resource languages across NGO and ministry deployments
  wedge: >-
    A localization and safety-operations stack that turns public language datasets and clinical protocols into versioned eval
    suites, human review workflows, approved prompt packs, and sovereign deployment packages for maternal-health copilots
  whyNowCatalyst: >-
    Anthropic and the Gates Foundation are putting real money behind open African-language data and public-health tooling now,
    which means implementers will soon have assets to build with but still need an operational layer that makes those assets
    safe, local, and deployable.
  ventureScalePath: >-
    Start with maternal-health and community health worker workflows, then expand the same localization, evaluation, and
    sovereign deployment stack into cervical screening, infectious disease, teacher knowledge assistants, and eventually the
    default infrastructure layer for public-interest AI programs across health, education, and government service delivery.
solution: >-
  The product ingests public language datasets, country clinical guidelines, and workflow transcripts to generate localized
  evaluation sets for each deployment language and use case. Program teams can route translations, clinician review, red-team
  checks, and approval sign-offs through one workspace before anything reaches frontline workers. Once approved, the system
  packages the copilot for allowed infrastructure, including sovereign cloud or in-country hosting, with policy rules for data
  handling, escalation, and audit logging. The first release focuses on maternal-risk triage, referral guidance, and protocol
  adherence for community health workers, where value is concrete and safety boundaries are narrow enough to measure.
goToMarketSeed:
  firstCustomer: >-
    A Gates-funded maternal and child health implementer running community health worker programs in Kenya or Nigeria that
    wants to pilot a Swahili- or Hausa-language AI assistant without sending sensitive health data through a foreign-hosted
    black-box workflow
  buyingTrigger: >-
    A new donor grant, country pilot launch, or ministry review that requires low-resource-language support plus evidence of
    sovereignty, safety testing, and protocol adherence before rollout
  currentAlternative: >-
    Bespoke consulting builds on generic MLOps stacks, manual translation and clinician review, and fragmented NGO or ministry
    pilot workflows stitched together in spreadsheets and shared documents
  switchingReason: >-
    This wedge gives implementers reusable local-language eval packs, approval workflows, and deployment evidence they can
    carry country to country, instead of rebuilding trust and compliance from scratch for every pilot
  pricingHypothesis: >-
    Annual platform fee per active country program plus setup fees for each language-workflow pack and premium support for
    sovereign hosting, clinical review, and audit reporting
