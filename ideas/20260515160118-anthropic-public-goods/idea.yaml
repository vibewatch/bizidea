differentiator: >-
  This is not another foundation model wrapper for NGOs. The product is purpose-built for low-resource language evaluation,
  sovereign deployment, and approval workflows in public-interest settings where each language, protocol, and hosting decision
  must be justified. Its moat comes from reusable eval packs, country-specific deployment playbooks, and an accumulating
  workflow graph of what actually passes review in maternal-health programs across languages and jurisdictions.
