jobsToBeDone:
  - job: When a donor-funded program wants to launch a maternal-risk copilot in a local language, help the digital health team prove it is safe, protocol-bound, and deployable on approved infrastructure, so they can go live without a bespoke consulting project.
    currentAlternative: Manual translation reviews, consultant-built pilots, and generic cloud MLOps workflows
    successMetric: Time from pilot concept to approved in-country deployment
  - job: When a ministry or donor asks how an AI workflow was tested and governed, help the implementation team produce language-specific evidence and audit trails, so they can secure approval and renew funding.
    currentAlternative: Shared documents, spreadsheet trackers, and ad hoc validation notes
    successMetric: Approval cycle time and number of review findings per deployment
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Two verified reports point to a large multi-year funding commitment, public language-data creation, and explicit sovereignty needs, which is a meaningful new signal even without named customers yet.
  painIntensity:
    score: 4
    rationale: The pain is real because failed localization or governance can block frontline deployment entirely, though the urgency varies by donor program and country.
  wedgeClarity:
    score: 4
    rationale: Maternal-health localization and safety operations for community health worker copilots is a narrow first workflow with a clear user, deployment motion, and measurable outcome.
  defensibility:
    score: 3
    rationale: Open assets reduce data exclusivity, but reusable eval packs, review workflows, and sovereign deployment know-how can compound into a differentiated operating layer.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow, but the same infrastructure can spread across languages, countries, health use cases, and education or public-sector deployments.
topRisks:
  - name: Donor procurement drag
    description: Long grant cycles and multi-stakeholder approvals could make sales slow and services-heavy in the first years.
    mitigation: Start with donor-funded implementers already budgeted for pilots, land with one-country deployments, and convert repeat languages and workflows into subscription renewals.
  - name: Clinical safety liability
    description: If the copilot gives unsafe maternal-health guidance, trust could collapse before the workflow dataset compounds.
    mitigation: Launch only in protocol-bounded recommendation flows, keep clinician escalation mandatory, and make evaluation and approval artifacts part of every deployment.
  - name: Platform commoditization
    description: Large model vendors or open-source tooling could add generic localization and governance features once public-interest demand becomes visible.
    mitigation: Win on low-resource language ops, country-specific review workflows, and sovereign deployment execution that generic platforms are unlikely to productize deeply.
