slug: maternal-language-eval-stack
date: '2026-05-15'
executiveSummary: 这家公司瞄准的是撒哈拉以南非洲捐助型孕产与社区医疗项目里的一个具体部署瓶颈：怎么把新出现的公共 AI 资产，变成卫生部和执行机构真正敢上线的本地语言工作流。第一款产品不是孕产健康聊天机器人，而是一套面向受协议约束的孕产风险筛查与转诊 Copilot 的控制平面，负责本地化、评测、人工审核和主权部署。最合适的首个客户，是肯尼亚或尼日利亚一家具备数字化 CHW 项目、又拿到 Gates 或类似资助的孕产与儿童健康执行机构；它现在需要能扛过卫生部审查的斯瓦希里语或豪萨语 AI 支持。GTM 必须紧扣这个触发点：当新的 grant、国家试点或语言扩张同时带来预算和审批压力时切入，定价锚定的是省掉多少定制化本地化和合规工作，而不是模型调用量本身。这里有意做出的选择，是先靠审批速度、可审计性和部署打包能力赢下来，再往更广的医疗工作流或教育场景扩，因为在孕产协议边界足够窄、又足够高风险的地方，买方痛点最强。真正能沉淀成护城河的，是一套越来越厚的语言版孕产评测包、审核产物和国家部署 操作手册，它们共同回答一个问题：真实项目里，到底什么方案能过审。最大的反证风险不在技术，而在商业：如果买方始终把这件事当成 grant 驱动的咨询项目，或各国项目不愿拿出持续的软件预算，业务就会长期偏服务化。研究支持这个切口成立，也支持相邻市场外扩，但具名预算拥有者和采购时间表仍然缺失，所以在试点证明能稳定转化之前，投资判断应保持谨慎。
problem:
- 捐助型孕产与 CHW 项目已经能把数字化工作流跑起来，但低资源语言 AI 的本地化、审核和审批，至今仍散落在表格、翻译供应商和顾问搭的临时流程里。
- 每进入一个新国家、每增加一种语言，团队都要从头重做安全测试、托管审查和协议签字；部署因此被拖慢，主权和审计要求也更难满足。
solution:
- 搭一套控制平面，把公共语言数据集、孕产健康协议和工作流记录转成带版本的评测套件、审核队列、审批记录，以及面向每个国家-语言工作流的部署包。
- 先从社区卫生工作者使用的孕产风险筛查、转诊建议和协议遵循 Copilot 切入；所有已获批部署都打包到允许使用的基础设施上，并带上审计日志、升级规则和人工审核。
whyWeWin:
- 产品站在 CommCare、OpenSRP、Medic 和消息系统等现有基础设施之上，而不是要求买方把现有工作流平台整体换掉。
- 这个切口解决的是一个真正值得单独掏预算的问题：开放模型和数据集本身并不能证明多语言孕产健康 AI 足够安全、可审、可部署，也不解决本地主权约束。
- 每一次生产环境上线，都会沉淀更多可复用的评测资产、审批产物和国家-语言部署经验；这些东西，通用云工具很难深度积累。
strategicChoices:
  beachhead: 先切入肯尼亚或尼日利亚那些运行社区卫生工作者项目、且需要把斯瓦希里语或豪萨语孕产风险 Copilot 送审上线的捐助型孕产与儿童健康执行机构。
  wedgeRationale: 相比一上来就做更泛的公共部门 AI 平台，这个入口更容易更快拿到证明：孕产风险工作流发生频率高、安全要求高，而且本来就在现有 CHW 项目预算里，买方可以在一个 grant 周期内直接量化审批周期、部署就绪度和跨语言复用效果。
  sequencingRationale: 公司应该先把一个受协议约束的孕产场景跑通：本地化、评测、审核工作流和主权部署打包；再补连接器、可复用的合规产物和相邻孕产工作流；最后才考虑扩到教育或更广的政府服务。这个顺序能把早期实施范围压窄，贴合买方信任阈值，也让 GTM、招聘和合作伙伴都围着同一个可复制的审批问题转，而不是太早追逐更大但更散的市场。
  notYet:
  - 暂不自己做完整的终端孕产健康应用，也不做直达患者的消息产品。
  - 在孕产健康尚未验证之前，暂不扩到教师知识助手和更广的教育部署。
  - 在没有强制人工审核和协议约束之前，不做自动化诊断或治疗建议。
market:
  tam: 估算 TAM 为 $11.3M：大约 75 个年度孕产或 CHW 国家项目等价单元，每个单元年支出约 $150K。
  sam: 估算 SAM 为 $3.6M：约 30 个首波可触达项目，且这些项目同时具备孕产健康、本地语言和主权部署需求。
  som: 按模型测算，第 3 年 SOM 为 $0.9M：8 个共创客户或扩展项目，混合年合同额约 $110K。
  segments:
  - 在撒哈拉以南非洲运营数字化 CHW 项目的捐助型孕产与儿童健康执行机构
  - 在国家级或 NGO 既有系统之上审批本地化 AI 上线的卫生部数字医疗与协议团队
  buyingProcess: 实际推动项目的人通常是孕产健康执行机构内部的数字医疗或 AI 负责人；真正批预算的人，则是国家项目总监、CIO 或数字化创新负责人，他们要对 grant 交付和卫生部审批风险负责。交易应从单一国家-语言工作流的付费试点切入，卫生部的数据和临床团队在签年度生产合同前作为共同审批方参与。
product:
  mvp: MVP 只覆盖一个国家、一个语言、一个孕产风险工作流：吃进协议内容和工作流记录，生成评测集，编排翻译与临床审核，保存审批记录，再把获批 Copilot 打包到允许托管的环境中并附上审计日志。它必须证明：相比手工顾问流程，项目能更快从试点概念走到卫生部可审的部署包。
  sixMonth: 6 个月内，上线一个斯瓦希里语或豪萨语孕产风险工作流的共创客户部署，带审核队列、适配离线场景的证据采集、基础管理看板，以及导出到一个现有项目技术栈的能力。
  twelveMonth: 12 个月内，补上可复用的语言-工作流模板、FHIR 或交换层连接器、主权托管策略控制，以及覆盖 2-3 个项目的审批周期、评测覆盖率和审核异常报告。
  twentyFourMonth: 24 个月内，把同一套本地化和审批引擎扩到相邻孕产工作流与更多语言，再挑选少数 CHW 和公益场景复制，而不是把自己做成一个定制服务公司。
  keyBets:
  - 买方愿意为缩短审批和本地化周期付费，而不是只为更强的多语言模型买单。
  - 受协议约束的孕产分诊和转诊，既窄到可以安全评测，也广到可以跨国家反复复制。
  - 现有数字医疗平台已经提供了足够的集成表面，能支撑一层叠加式产品，而不用重做替换项目。
  - 国家-语言评测包和审批产物会变成可复用资产，买方也会认可它们的价值。
gtm:
  wedge: 当新的 grant、试点启动或国家扩张迫使执行机构在上线前证明本地语言安全和主权合规时，向已经在跑 CHW 或孕产项目的客户卖一套孕产语言本地化与审批栈。
  channels:
  - 由创始人直接面向孕产与儿童健康执行机构的数字医疗负责人和项目总监销售
  - 通过基金会、捐助型创新项目和公共卫生系统集成商建立共创客户关系
  - 借助开放数字医疗技术栈运营方和本地部署伙伴做合作分销
  funnelTargets: 线索→合格试点 20-30%；合格试点→付费试点 30-40%；付费试点→生产合同 50%+；首个国家部署→12 个月内第二语言或第二国家扩张 40%+。
  pricing: 先按单一国家-语言工作流收一笔付费试点费，再转成按活跃国家项目计费的年软件合同；每个语言-工作流包单独收上线费，主权托管支持、临床审核运营和审计报告则加价收费。这样定价更贴合买方逻辑，因为他们买的是省掉多少定制化本地化和审批劳动，而不是 seat 数或 API 调用量。
businessModel:
  revenueStreams:
  - 为协议映射、语言包上线，以及安全或卫生部审查准备收取试点与实施费用
  - 对使用本地化、评测和审批工作流的活跃国家项目收年订阅费
  - 通过新增语言、相邻孕产工作流，以及高级主权托管或合规支持拿扩张收入
  unitOfValue: 一个已获批可在生产环境使用的国家-语言孕产工作流
  targetGrossMarginPct: 70
  expansionLevers:
  - 一个工作流过审后，在同一国家项目内继续加更多语言
  - 沿用同一套审核与部署引擎，把孕产风险分诊扩到相邻孕产和 CHW 工作流
  - 先落进一个执行机构，再把同一套审批栈扩到更多国家或卫生部挂钩项目
  - 把可复用合规产物和托管控制打包成高级模块，卖给大型多国客户
strategyMap:
  northStarMetric: 通过平台完成审批记录并成功上线的年度生产级孕产健康国家-语言部署数
  inputMetrics:
  - 从试点启动到产出卫生部可审部署包的中位天数
  - 审批前完成的必需评测用例占比
  - 本地化工作流输出的一次审核通过率
  - 付费试点转年度生产合同的转化率
  - 从首个语言或国家扩张到第二次部署的比例
  moatsToBuild:
  - 语言版孕产健康评测数据集与审核反馈闭环
  - 按国家积累的审批产物图谱，覆盖托管、协议和升级转介要求
  - 面向现有数字医疗平台和主权基础设施模式的集成与部署模板
  killCriteria:
  - 前 5 个付费试点中，少于 2 个能在试点启动后 9 个月内转成年度生产合同
  - 实施后，审批准备时间中位数相对客户手工基线的改善幅度不到 30%
  - 早期收入中超过一半仍来自无法模板化成可复用语言包或合规包的定制咨询
  mermaid: "flowchart LR\n  Wedge[孕产语言切口] --> MVP[本地化与审批 MVP]\n  MVP --> Proof[获批的国家级部署]\n  Proof --> Expansion[更多语言、国家与相邻工作流]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 切口和时点都成立，但在软件经常性预算能否顶住咨询和开源替代之前，判断仍应克制。
    whyBelieve: 新的公益 AI 资金，加上现有数字医疗部署底座，确实催生出一层新需求：把本地语言 AI 变成能过审上线的孕产健康工作流。
    whyDoubt: 初始市场不大，而且买方愿不愿为经常性软件而不是项目制实施买单，目前仍只有间接证据。
    nextDiligence: 下一步要用 6-8 个目标客户证明：单一国家-语言部署能从付费试点稳定转成六位数的软件经常性收入，因为审批和本地化工作量确实被压缩了。
  firstCustomer:
    title: 捐助型孕产与儿童健康执行机构的数字医疗总监
    profile: 此人正在肯尼亚或尼日利亚基于既有数字医疗技术栈运行 CHW 或孕产健康项目，现在需要一个能过卫生部审查的低资源语言 AI 工作流。
    trigger: 新的 grant、试点启动，或国家/语言扩张要求项目在上线前拿出协议遵循、数据主权和本地语言安全的证据。
    buyer: 国家项目总监、CIO，或数字化创新负责人
    initialContract: $40K-$80K 的付费试点，覆盖一个国家和一个语言-工作流包；随着更多语言、工作流或托管控制上线，再转成大约 $100K-$150K 的年度生产 ARR。
  mustBeTrue:
  - 前 10 个目标客户里，至少 3 个要明确确认：真正值得掏预算的是审批速度和可审计性，而不只是模型质量。
  - 前 5 个试点必须证明，产出卫生部可审部署包所需时间至少缩短 30%。
  - 至少 50% 的付费试点要在 9 个月内转成年生产合同。
  - 为早期客户做出的一个语言-工作流包，必须能以有限返工复用到至少第二次部署。
  - 一旦临床审核和实施流程被标准化，生产部署的毛利率必须往 70% 以上走。
  diligenceQuestions:
  - 肯尼亚和尼日利亚哪些具名执行机构已经掌握了面向孕产或 CHW 工作流的本地化 AI 预算？
  - 在前两个目标国家里，孕产健康 Copilot 上线前到底有哪些卫生部审查材料是强制性的？
  - 现在花在咨询、翻译和审批上的预算里，有多少是真能搬到年软件预算里的？
  - 前 20 个目标客户最常见的现有技术栈是什么？在不做替换销售的前提下，叠加集成到底有多难？
  - 面对不同国家的协议与托管规则，孕产语言包到底能复用到什么程度？
operatingAssumptions:
- assumption: 执行机构愿意购买一层审批与本地化系统，而不必替换现有工作流或记录系统。
  basis: research.yaml
  validationTest: 完成 10 通发现式访谈，并拿下 3 个试点；这些试点要明确表示在部署期间继续保留 CommCare、OpenSRP、Medic 或同类系统。
  decisionImpact: 如果这个假设不成立，公司就会变成更重的工作流平台供应商或系统集成商，实施成本更高，销售也更慢。
- assumption: 孕产风险分诊与转诊，是最快拿到可复制证明的滩头市场。
  basis: idea.yaml
  validationTest: 在前 5 次设计讨论里，对比孕产风险分诊、宫颈筛查和通用 CHW 知识助手三类场景的试点需求、协议清晰度和审核异常率。
  decisionImpact: 如果不成立，就该先把重心挪到审批逻辑更干净的工作流上，再让产品范围和合作伙伴围着孕产健康固化。
- assumption: 只要产品能明显减少定制化本地化和卫生部审查工作，买方就愿意为经常性软件付费。
  basis: research.yaml
  validationTest: 在至少 3 个付费试点里测试：买方是否接受按活跃国家项目收年费，而不是只接受一次性实施。
  decisionImpact: 如果不成立，定价和招聘都必须转向更偏服务的模式，毛利和风险投资吸引力都会下降。
- assumption: 国家-语言评测包能被模板化到足以支撑 70%+ 毛利。
  basis: 运营判断
  validationTest: 跟踪前 4 次部署里的定制审核工时、本地化返工和实施投入，确认每一个后续语言包都比前一个明显更少依赖定制劳动。
  decisionImpact: 如果不成立，护城河依然有价值，但公司应缩小地理范围，或按更小的结果去募更少的钱。
- assumption: 即便低资源语言模型质量持续提升，主权托管和审计要求仍会是买方的重要差异化需求。
  basis: research.yaml
  validationTest: 让 8 个目标买方给模型质量、托管控制和可审计性排序，并跟踪每一笔认真推进的交易里，是否都出现了托管或治理层面的卡点。
  decisionImpact: 如果不成立，差异化就会从部署控制转到数据或应用所有权，路线图也得跟着改。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 10 家孕产健康执行机构，并为每家梳理一套当前的本地化与审批流程。
  hypothesis: 比起泛泛而谈的孕产健康聊天机器人需求，审批与审核工作流的痛点更能触发预算。
  successMetric: 10 家里至少 7 家把本地化、治理或主权工作列为前三大阻碍，并有 3 家同意进入共创客户范围界定。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 用手工创建评测集和人工协调审核的方式，为一个国家-语言的孕产工作流跑一次 concierge 试点。
  hypothesis: 即便产品还没完全成型，一套结构化控制平面也能缩短做出卫生部可审包所需的时间。
  successMetric: 至少有 1 个试点产出完整审核包，而且速度比客户原先的手工流程快 30% 以上。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 上线 MVP 审核工作流、审计日志，以及一个现有系统导出或连接器。
  hypothesis: 只要保住客户现有工作流栈，并能产出可审核证据，买方就愿意接受叠加式部署。
  successMetric: 2 个付费试点成功上线，而且不需要替换客户的核心数字医疗平台。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 测试一套打包报价：包含语言包上线、安全审查，以及转生产合同所需的明确门槛。
  hypothesis: 如果商业方案围绕更快审批和可复用的国家-语言资产来讲，买方就会愿意为试点付费。
  successMetric: 至少签下 2 个单价 $40K+ 的付费试点，并明确写出转年度软件合同的条件。
  owner: 创始人 / CEO
- horizon: 180–360 天
  experiment: 把第一套语言-工作流模板复用到第二个国家或第二种语言部署里。
  hypothesis: 只有当审批产物和评测包能以有限返工迁移时，产品才真正接近软件，而不是服务。
  successMetric: 第二次部署的定制实施时间，比第一次至少少 40%。
  owner: 实施负责人
- horizon: 180–540 天
  experiment: 为一个与卫生部挂钩的部署补上主权托管控制和标准化集成路径。
  hypothesis: 相比扩更多应用功能，托管灵活性和集成就绪度更能提升转化和扩张。
  successMetric: 至少有 1 个生产客户因为托管或集成要求而扩大采购范围，而不是因为增加了全新工作流。
  owner: 产品负责人
operations:
- 围绕所有受协议约束的孕产输出，建立必须人工审核的临床与本地化 QA 流程
- 按国家维护部署清单，覆盖托管、审计日志、基于角色的权限和卫生部审批材料
- 为 FHIR、交换层和现有开源数字医疗技术栈准备标准化集成 操作手册
- 在启动阶段通过合作网络补齐翻译、临床审核和境内基础设施运营能力，而不是全部自己养团队
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 前几笔交易必须由创始人亲自打，因为买方信任、捐助语境和卫生部审批流程洞察，都是成交核心。
- role: 创始工程师
  startTiming: Month 0
  rationale: 产品最核心的风险在评测工作流、可审计性、部署打包和集成骨架，这些从第一天就得自己握住。
- role: 临床安全与本地化负责人
  startTiming: Month 1
  rationale: 早期部署需要有人把孕产协议翻成审核标准，并在不冒安全风险的前提下管住临床和语言 QA。
- role: 实施与集成工程师
  startTiming: Month 4
  rationale: 首批试点之后，部署速度和标准化集成会成为转化和扩张的主要瓶颈。
- role: 合作伙伴与项目销售负责人
  startTiming: Month 8
  rationale: 一旦共创客户拿到证明，公司就需要有人专门经营捐助方、集成商和多国客户关系。
milestones:
- horizon: 0–12 个月
  items:
  - 在肯尼亚或尼日利亚签下 3 个共创客户，并完成至少 2 个付费试点。
  - 上线一个孕产风险工作流的 MVP，带审核队列、审计日志和一条现有系统集成路径。
  - 在至少 1 次接近生产环境的部署里，把审批包准备时间缩短 30% 以上。
- horizon: 12–24 个月
  items:
  - 至少把 2 个试点转成年生产合同，并让 1 个客户扩到第二种语言或第二个国家。
  - 把可复用的语言-工作流模板和主权托管控制做成产品，支持多种部署模式。
  - 在不增加单次部署实施强度的前提下，补上相邻孕产工作流和标准化连接器。
- horizon: 24–36 个月
  items:
  - 做到 8 个活跃的共创客户或生产项目，与研究里的第 3 年 SOM 模型一致。
  - 证明现有客户里，从首个部署扩到更多语言、工作流或国家是可重复发生的。
  - 验证这套控制平面扩到教育或其他公益工作流时，产品逻辑不会散掉。
risks:
- risk: 捐助方采购周期和卫生部审批会让早期收入来得慢、也更不均匀。
  likelihood: High
  impact: High
  mitigation: 先从已经拿到预算的项目切入，坚持付费试点，并优先挑那些因为国家扩张或新 grant 而产生短期紧迫性的客户。
- risk: 只要在孕产健康工作流里出现一次不安全的本地化回答，整个买方群体都可能踩刹车。
  likelihood: Medium
  impact: High
  mitigation: 把范围压在受协议约束的指导场景里，强制保留人工审核，并让审批产物成为每次部署的标配。
- risk: 开源技术栈或模型厂商一旦把本地化和治理功能补得差不多，差异化会被压缩。
  likelihood: Medium
  impact: Medium
  mitigation: 持续沉淀自有的语言版评测包、国家审批产物和部署 操作手册——这些不是通用工具天然会收集到的。
- risk: 如果各国的集成与托管要求差异太大，产品就会滑向定制化服务生意。
  likelihood: Medium
  impact: High
  mitigation: 围绕少数主流现有技术栈做标准化，先把首批国家-语言包模板化；一旦某个市场要求过于零碎，就果断不做。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要撑出 18 个月跑道：签下共创客户，做出本地化与审批 MVP，补齐核心临床和集成人才，并证明至少有两个孕产健康项目能从付费试点转成经常性生产合同，而且语言-工作流资产可以复用。
