competitors:
- name: Dimagi CommCare
  stage: incumbent
  wedge: Offline-first frontline workflow and case-management platform for NGOs and health programs.
  pricing: $250/mo standard to $4,000/mo+ enterprise starting price.
  strength: Large installed base, transparent pricing, cloud-region options, and mature security/compliance posture.
  weaknessVsUs: Strong on workflow infrastructure but not purpose-built for multilingual AI evaluation, human review governance, or sovereign deployment evidence.
  sourceRefs:
  - 15
  - 16
  - 18
  - 19
- name: Jacaranda PROMPTS
  stage: scale-up
  wedge: Maternal-health SMS platform with AI-enabled helpdesk and localized African-language models.
  pricing: No public list price; designed for low unit costs and co-funding inside government budgets.
  strength: Deep maternal-health workflow knowledge, real usage at scale, and credible low-resource language AI execution.
  weaknessVsUs: Application-specific and vertically integrated; less naturally positioned as a neutral platform other implementers can use across programs and countries.
  sourceRefs:
  - 23
  - 27
  - 28
  - 29
  - 33
  - 34
- name: OpenSRP
  stage: incumbent
  wedge: FHIR-native open-source smart register platform for frontline workers and national programs.
  pricing: Open-source core with implementation-led service economics; no standard public SaaS list price.
  strength: Country-scale deployments, offline-first architecture, and explicit alignment to WHO SMART guidance and FHIR.
  weaknessVsUs: Owns registry and workflow layers, but not the localization, evaluation, and approval-control plane for AI assistants.
  sourceRefs:
  - 37
  - 38
- name: Medic CHT
  stage: incumbent
  wedge: Open-source community-health toolkit for last-mile CHW applications in hard-to-reach settings.
  pricing: Open-source software with implementation and support delivered through an ecosystem rather than public seat pricing.
  strength: Strong CHW credibility, large country footprint, and deep offline-first design for rural last-mile care.
  weaknessVsUs: Excellent for community-health workflows, but not a specialized maternal AI safety-ops and sovereign deployment product.
  sourceRefs:
  - 43
  - 44
- name: Viamo
  stage: scale-up
  wedge: Voice and IVR engagement infrastructure for simple phones in low-connectivity contexts.
  pricing: Custom enterprise and program pricing; not publicly listed.
  strength: Reaches users without smartphones, internet, or literacy and has real health-program deployments in Africa.
  weaknessVsUs: Best seen as a distribution channel or engagement layer, not as the end-to-end localization and governance stack.
  sourceRefs:
  - 51
  - 52
  - 53
