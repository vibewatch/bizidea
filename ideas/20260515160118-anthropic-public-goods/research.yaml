openQuestions:
- Which named Kenya- and Nigeria-based implementers already have approved 2026 budgets for localized AI in maternal or CHW workflows?
- What exact ministry review artifacts are required before a maternal-health copilot can move from donor pilot to country deployment in each target geography?
- How much recurring budget can be shifted from bespoke consulting and translation work into annual software contracts in the first three countries?
- Which language pairs beyond Swahili, Hausa, and Yoruba are urgent enough in the beachhead to justify dedicated evaluation-pack investment in year one?
