openQuestions:
- 今天到底有多少印度 FMCG、零售、3PL 和医院网络已经拥有不止 1 个上线的室内机器人站点？
- 当前 rollout 支出里，有多少是算在 OEM 合同里，又有多少来自独立的 IT、设施和集成预算？
- 在印度的棕地机器人部署中，最常反复出现的是哪些电梯厂商、WMS 和 ERP 系统？
- 在客户真正运行混合车队之前，他们能否接受独立 rollout 层，还是只有规模更大后才会感到痛？
- 医院垂直场景的痛点是否真的比仓库更强，还是它只是购买路径更慢，因此只适合作为第二阶段扩张？
