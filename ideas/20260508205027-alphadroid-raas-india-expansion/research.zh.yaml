  - 今天到底有多少印度 FMCG、零售、3PL 和医院网络，已经拥有不止一个室内机器人站点？
  - 目前有多少部署预算是打包在 OEM 合同里，又有多少落在独立的 IT、设施和集成预算里？
  - 在印度存量场地机器人部署中，最常出现的电梯厂商、WMS 和 ERP 系统分别是谁？
  - 在客户尚未运行混合车队前，他们会不会接受一层独立部署层，还是只有到更大规模时才真正感到痛？
  - 医院垂直到底比仓储更痛，还是只是采购更慢，因此更适合作为第二阶段扩张？
