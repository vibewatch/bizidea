jobsToBeDone:
  - job: 当首个机器人试点在一个仓库跑通后，帮助运营负责人把后续站点的部署标准化，这样他们才能扩大自动化规模，而不是反复陷入定制项目混乱。
    currentAlternative: 由厂商主导、依靠电子表格和内部项目管理推进的定制部署
    successMetric: 从管理层批准扩张到每个新站点跑出首个有效任务的时间
  - job: 当存量场地需要机器人和电梯、旧系统一起工作时，帮助自动化团队尽早拆掉集成风险，这样他们上线后才能守住利用率和 ROI 目标。
    currentAlternative: 借助承包商和内部 IT 推进的临时集成项目
    successMetric: 上线后没有因集成问题延误的站点占比
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 有具名企业客户、已验证定价，还有战略物流投资人，对一家早期机器人公司来说，这是非常扎实的牵引信号。
  painIntensity:
    score: 4
    rationale: 一旦首个机器人试点跑通，多站点部署失败会直接毁掉 ROI，也会拖慢运营团队后续扩张。
  wedgeClarity:
    score: 5
    rationale: 面向室内运输机器人的存量场地部署编排，是一个切口很尖、首批客户和工作流都很明确的切入产品。
  defensibility:
    score: 3
    rationale: 单靠软件起步时不难被模仿，但模板、部署数据和生态合作有机会慢慢筑起护城河。
  ventureScale:
    score: 4
    rationale: 这个滩头市场可以继续长成一层更大的室内机器人部署控制平面，覆盖仓储、医疗及更多设施场景。
topRisks:
  - name: 厂商打包挤压
    description: 机器人 OEM 可能自己把部署工具一起打包卖掉，压缩独立部署层的生存空间。
    mitigation: 从多厂商并存、或必须做跨站点标准化的客户切入，这类需求不是 OEM 的点状方案能轻松满足的。
  - name: 交付过度依赖服务
    description: 早期客户很可能提出大量定制实施需求，把公司拖成一家集成咨询公司。
    mitigation: 把前十次部署沉淀成可复用连接器、任务模板和固定范围的上线包，尽快把服务产品化。
  - name: 自动化预算周期偏慢
    description: 印度运营商仍可能以很慢的节奏扩张机器人，导致在多站点规模真正出现前，软件预算很难单独解锁。
    mitigation: 按已上线站点定价，并把部署用时缩短和利用率提升做成能量化收益，让产品搭载现有自动化扩张预算，而不是再去申请一条全新的预算线。
