topRisks:
- name: 厂商捆绑
  description: 机器人 OEM 可能会把部署工具一起打包出售，从而挤压独立部署层的空间。
  mitigation: 先切入那些已经采用多家厂商，或需要跨站点标准化、OEM 单点方案难以覆盖的客户。
- name: 交付过度依赖服务
  description: 早期客户可能会提出大量定制实施要求，让业务更像集成咨询公司。
  mitigation: 把前 10 次部署产品化为可复用连接器、任务模板和固定范围的上线包。
- name: 自动化预算周期偏慢
  description: 印度运营方仍可能以较慢节奏扩机器人，使得在多站点规模出现前更难单独拿到软件预算。
  mitigation: 按上线站点计费，并把部署时间缩短和利用率提升做成可量化收益，让产品直接吃现有自动化扩张预算，而不是要求新增预算科目。
