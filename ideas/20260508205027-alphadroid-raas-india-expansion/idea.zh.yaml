problem: 印度大型仓库和医院运营方如今已经能为室内运输机器人算清账，但每个棕地站点的路线、电梯、载荷规则和后台系统组合都不同。于是每次上线都变成定制项目，拖慢投产时间、压低机器人利用率，也让第二个、第三个站点比第一个更难推进。运营团队只能靠表格去协调供应商、设施承包商和内部 IT，所以即便机器人本身已经能工作，扩张仍会卡住。
targetUser:
  primary: 印度 FMCG、零售或 3PL 网络中负责运营卓越的负责人，已在一个仓库跑通物料搬运机器人，现在需要把它扩到多个棕地站点
  secondary: 私立医院连锁中负责运营转型的负责人，正在部署用于药房、布草或检验样本运输的机器人
  buyer: 负责多站点部署 ROI 的运营副总裁或供应链自动化负责人
startupThesis:
  nonObviousInsight: 在印度这种成本敏感市场，稀缺层已经不再是机器人硬件本身；一旦机器人以月度服务卖进真实企业，瓶颈就会转到跨楼宇、电梯和后台系统的可复制棕地部署。
  beachhead: 为印度 FMCG、零售和 3PL 运营方提供部署编排服务，帮助其把室内物料搬运机器人从 1 个试点仓扩到 5–20 个正式站点
  wedge: 以软件加部署 playbook 的方式，标准化站点测绘、电梯与 WMS 集成、任务规则和上线后 ROI 跟踪，用于室内机器人部署
  whyNowCatalyst: 具名企业客户、真实订阅价格，以及拥有仓配分发能力的投资人，说明印度 RaaS 市场已从新奇玩意进入规模部署阶段。
  ventureScalePath: 先从仓库部署切入，再把同一层集成与 ROI 能力延伸到医院、工厂和园区，最终成为跨厂商室内机器人部署、基准分析、融资和服务网络采购的系统记录层。
solution: 棕地机器人部署 OS 会在机器人到场前先接入站点楼层图、电梯规则、载荷流向和后台系统要求，自动生成标准部署方案。产品提供可复用的电梯、WMS 以及工单/任务系统连接器，也提供适用于常见仓库和医院运输路线的任务模板。上线后，产品会跟踪利用率、交接失败、路线异常和节省的人力，让运营方有依据把部署扩到更多站点。公司一开始可以在软件之上叠加高毛利实施服务，随后再把沉淀下来的部署模板和基准数据转化为软件护城河。
goToMarketSeed:
  firstCustomer: 在印度拥有 3–20 个区域仓库的全国性 FMCG 或零售运营方，已经批准一个室内机器人试点，现在需要把方案扩到更多棕地设施
  buyingTrigger: 首个机器人试点达到吞吐或人力目标，管理层批准扩到初始仓库之外的更多站点
  currentAlternative: 由机器人供应商、设施承包商、内部 IT 团队和表格 ROI 跟踪共同拼起来的逐站点手工部署
  switchingReason: 这个切口把定制部署知识沉淀为可复用模板，帮助运营方在每个新站点压缩部署时间和集成返工
  pricingHypothesis: 按上线站点收取年度平台费，并对每个设施以及每个电梯或后台连接器收取一次性集成设置费
