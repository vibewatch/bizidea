    signalRefs:
      - 存量场地集成才是真瓶颈
    sourceRefs: [1]
  - point: 有战略物流投资人带来部署通路，仓库扩点速度很可能快过厂商逐项目定制交付的能力上限。
    signalRefs:
      - 物流渠道正在打开
    sourceRefs: [1, 2]
  - point: 印度优先、强成本约束的环境，会奖励那些能把低成本机器人部署做成可复制流程，并最终输出到其他价格敏感市场的软件层。
    signalRefs:
      - 印度成本底线可向全球复制
    sourceRefs: [2]
differentiator: >-
  这不是又一个给已上线机器人看的车队管理看板。产品往上走了一层，专门把室内机器人带进有电梯、老旧软件和不一致流程的存量场地时，最混乱的那一段标准化。时间一长，它的防守力会来自场地集成模板、部署基准，以及覆盖不同站点、不同厂商、不同任务类型的起效速度数据——这些数据不只运营方会在意，放款方也会在意。
