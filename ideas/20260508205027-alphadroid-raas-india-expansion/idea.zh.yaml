problem: >-
  印度的大型仓储和医院运营方，已经能为室内运输机器人算清账；但每个存量场地的路线、电梯、载重规则和后台系统都不一样。结果就是每次扩点都像重做一个定制项目——上线变慢、机器人利用率被压低，第二个第三个站点反而比第一个更难。运营团队最后只能靠电子表格去协调供应商、设施承包商和内部 IT，机器人明明能跑，扩张却卡住了。
targetUser:
  primary: 在印度 FMCG、零售或 3PL 网络里，负责把物料搬运机器人从一个仓库铺到多个存量站点的运营卓越负责人
  secondary: 在私立医院连锁中，负责部署药房、布草或检验运输机器人的运营转型负责人
  buyer: 对多站点部署 ROI 负责的运营副总裁或供应链自动化负责人
startupThesis:
  nonObviousInsight: >-
    在印度这样极度看成本的市场里，真正稀缺的已经不是机器人硬件本身；一旦机器人开始以月度服务形式卖进真实企业，瓶颈就会从“能不能买到机器人”转向“能不能跨楼宇、电梯和后台系统，把存量场地部署稳定复用出来”。
  beachhead: 帮印度 FMCG、零售和 3PL 运营商，把室内物料搬运机器人从一个试点仓扩到 5-20 个真实站点的部署编排层
  wedge: 软件加部署打法，把站点建模、电梯和 WMS 集成、任务规则、上线后 ROI 跟踪标准化，专门服务室内机器人扩点
  whyNowCatalyst: 已有具名企业客户、已有公开订阅定价、还有能打通仓储分发路径的投资人，这说明印度 RaaS 市场已经从“新鲜事”进入“可以规模部署”的阶段。
  ventureScalePath: >-
    先从仓库扩点切入，再把同一层集成和 ROI 能力延伸到医院、工厂和园区，最终成为跨厂商室内机器人部署、基准评估、融资和服务网络采购的系统记录层。
solution: >-
  存量场地机器人部署 OS 会在机器人进场前，先吃下站点平面图、电梯规则、载重流向和后台系统要求，生成一套标准部署方案。产品会提供可复用的电梯、WMS、工单或任务系统连接器，以及适用于常见仓库和医院运输路线的任务模板。上线后，它继续跟踪利用率、交接失败、路径异常和节省的人力，让运营方能据此为更多站点拿到扩张审批。公司早期可以先叠加高毛利实施服务，之后再把沉淀下来的部署模板和基准数据做成软件护城河。
goToMarketSeed:
  firstCustomer: 在印度拥有 3-20 个区域仓、已经跑通一个室内机器人试点、现在要把方案铺向更多存量仓的全国性 FMCG 或零售运营商
  buyingTrigger: 首个机器人试点达到吞吐或人力目标，管理层批准从首个仓库向外扩张
  currentAlternative: 由机器人厂商、设施承包商、内部 IT 团队加电子表格逐站推进的人工部署方式
  switchingReason: 这套切口把原本零散的定制部署经验沉淀成可复用模板，让运营方能在每个新站点少返工、更快上线。
  pricingHypothesis: 按已上线站点收取年度平台费，并对每个场地、电梯或后台连接器收取一次性集成设置费
whyNow:
  - point: 具名客户已经证明，室内运输机器人在印度不再只是演示预算里的玩具，而是正式进入企业运营。
