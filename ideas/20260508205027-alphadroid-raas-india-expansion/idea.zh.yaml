jobsToBeDone:
- job: 当一个仓库的首个机器人试点成功后，帮助运营负责人把部署标准化并扩展到更多站点，让自动化扩张不再陷入定制项目混乱。
  currentAlternative: 依赖供应商主导的定制部署，加上表格和内部项目管理
  successMetric: 从批准扩张到每个新站点跑出首个有效任务的时间
- job: 当棕地设施需要让机器人接入电梯和遗留系统时，帮助自动化团队提前把集成风险降下来，从而在上线后达成利用率与 ROI 目标。
  currentAlternative: 依赖承包商和内部 IT 的临时集成项目
  successMetric: 上线后无需额外集成延期即可启动的站点占比
