slug: brownfield-robot-rollout-os
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: month
  source: '[BP date 2026-05-08；模型与 pre-seed 交割在同一个月份启动。]'
- id: A2
  name: pre-seed 交割后的期初现金
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk.targetFundingRangeUsd $2-3M；基础情景取区间下限 $2.0M，以保持在计划指引内。]'
- id: A3
  name: 模型中的计费单位
  value: 1 个正式上线站点 = 1 个客户
  unit: policy
  source: '[BP businessModel.unitOfValue 为上线棕地站点；Research market.som 以 45 个上线站点作为 Y3 可触达基数。]'
- id: A4
  name: 定价结构
  value: 每个站点和连接器收取一次性设置费，再加按上线站点计费的年度软件费
  unit: pricing model
  source: '[BP gtm.pricing；BP businessModel.revenueStreams。]'
- id: A5
  name: 每个上线站点的综合年度 ARPU
  value: '30'
  unit: USDK
  source: '[Research bottomUpSizingDrivers 给出每个上线站点每年 $20K 软件支出；BP pricing 还包含设置与连接器费用，因此基础情景采用保守的首年综合站点收入 $30K。]'
- id: A6
  name: 收入确认节奏
  value: 只要站点在当月上线并处于活跃状态，就按该月完整的按月摊销收入计入
  unit: policy
  source: '[创业公司财务常用简化假设：pre-seed SaaS 一旦站点上线，即按月线性确认收入。]'
- id: A7
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct。]'
- id: A8
  name: 第 1 年末上线站点数
  value: '10'
  unit: sites
  source: '[BP product.twelveMonth 为 8-12 个正式生产站点；基础情景取 10。]'
- id: A9
  name: 第 2 年末上线站点数
  value: '28'
  unit: sites
  source: '[BP milestones 12-24 months 目标约 45 个上线站点；Research adoptionFrictionMatrix 提示 onboarding 偏服务化且预算碎片化，因此基础情景把 Q4Y2 下调到 28。]'
- id: A10
  name: 第 3 年末上线站点数
  value: '45'
  unit: sites
  source: '[BP market.som 和 milestones 都把 Y3 可触达基础情景锚定在约 45 个上线站点。]'
- id: A11
  name: 用于单位经济模型的稳态月度站点流失率
  value: '1.5'
  unit: percent per month
  source: '[创业公司财务常用假设：面向运营场景的软件黏性较强，但产品仍处早期，因此设定稳态月流失率为 1.5%。]'
- id: A12
  name: 显式预测中的流失假设
  value: 在 Y4 之前不显式建模站点流失
  unit: forecast policy
  source: '[创业公司财务常用假设：前三年主要是少数锚点账户内的参考驱动扩张部署，因此经营预测假设没有站点流失；尽管单位经济模型仍使用稳态流失率。]'
- id: A13
  name: 每个新增上线站点的综合 CAC
  value: '14'
  unit: USDK
  source: '[模型推导假设，锚定 BP GTM 渠道、创始人主导的企业销售，以及伙伴转介绍。]'
- id: A14
  name: 平均销售周期
  value: '4'
  unit: months
  source: '[BP gtm.funnelTargets 与 Research buyingTriggers 都暗示这是一个多利益相关方的扩张型销售流程，周期略高于一个季度。]'
- id: A15
  name: 招聘节奏
  value: 起步时只有创始人与创始工程负责人；M2 加入部署工程师；M6 加入产品/集成负责人；M9 加入客户成功/基准分析负责人；M12 加入首位销售/合作伙伴负责人；之后到 Y3 维持精益扩招
  unit: hiring plan
  source: '[BP team startTiming；后续招聘是在 Y2-Y3 站点爬坡基础上的创业公司财务延展。]'
- id: A16
  name: 全包年化现金薪酬
  value: Founder 72；工程或产品 55；部署或客户成功 42；销售或合作伙伴 48
  unit: USDK per FTE
  source: '[创业公司财务常用假设：印度企业软件创业公司的现金薪酬区间，已含福利。]'
- id: A17
  name: 非人力运营支出爬坡
  value: Y1 早期约每月 15K，逐步升至 Q4Y3 约每月 42K
  unit: USDK per month
  source: '[创业公司财务常用假设，锚定云工具、棕地上线差旅、伙伴发展和法务/行政开销。]'
- id: A18
  name: 现金转换假设
  value: EBITDA 近似等于经营现金变动
  unit: cash policy
  source: '[创业公司财务常用假设：pre-seed 阶段不建模债务、capex、税务或明显营运资金波动。]'
- id: A19
  name: 融资目标
  value: 在 seed 轮前达到约 45 个上线站点、6 个锚点运营网络、可复制的伙伴来源 pipeline，并保留 6 个月缓冲
  unit: milestone
  source: '[BP fundingAsk.useOfFundsSummary；BP milestones；财务模型要求在下一轮融资前保留 6 个月缓冲。]'
