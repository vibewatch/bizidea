modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[伙伴转介绍 + 直接触达] --> Assessments[合格 rollout 评估]\n  Assessments --> LiveSites[上线生产站点]\n  LiveSites --> Revenue[综合站点收入]\n  Revenue --> GrossProfit[70% 毛利润]\n  GrossProfit --> Cash[现金跑道]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下的收入由上线站点数从 10 增长到 45 驱动，同时每个站点维持 $30K 的综合年度收入，其中包含软件费及适度的设置和连接器费用。
- checkName: 必须跑通的环节
  finding: 连接器复用和伙伴转介绍必须足够快地改善，才能支撑 Y2 末 28 个站点，而不让部署人力把 70% 毛利率目标压垮。
- checkName: 模型失效条件
  finding: 如果 rollout 预算持续被锁在 OEM 合同里，而公司到 Y3 结束时仍低于约 34 个上线站点，downside 情景下的现金将不足以支撑一次干净的 seed 融资流程。
- checkName: 下一轮融资证明点
  finding: 只要公司能够证明拥有 6 个锚点网络、约 45 个上线站点、伙伴来源 pipeline 占比超过 40%，并拿出可复制上线经济模型的基准数据，seed 故事就成立。
sanityChecks:
  ruleOf40: Y3 growth 104% + EBITDA margin -34% = 70%
  burnMultiple: Y2 burn multiple 0.9x and Y3 burn multiple 0.7x, improving as revenue growth outruns burn.
  revenuePerFte: $72K Y3 using Q4Y3 15 FTE, well below pure-play SaaS benchmarks and acceptable only if deployment work keeps getting productized.
  flags:
  - 基础情景有意把 BP 中 45 个上线站点的目标从 24 个月后移到 36 个月，因为研究表明 onboarding 偏服务化且预算责任分散。
  - 按 FTE 计算的收入对软件公司来说仍偏低，因此除非连接器复用明显改善，否则这门生意仍会同时像软件和部署服务。
  - 模型假设买家愿意在 OEM 关系之外，再为中立 rollout 层付费；如果他们只买打包好的供应商软件，CAC 和增长都会迅速恶化。
  - 综合站点 ARPU 包含适度的设置费和连接器收入，因此真正只看经常性 ARR 时，会低于 headline 综合收入。
