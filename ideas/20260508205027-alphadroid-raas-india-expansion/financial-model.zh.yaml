slug: brownfield-robot-rollout-os
date: '2026-05-08'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: 模型启动月份
    value: '2026-05'
    unit: 月
    source: '[BP 日期为 2026-05-08；模型从 pre-seed 交割当月启动。]'
  - id: A2
    name: pre-seed 交割后的期初现金
    value: '2000'
    unit: USDK
    source: '[BP fundingAsk.targetFundingRangeUsd 为 $2-3M；基础情景取区间下限 $2.0M，以保持在计划指引内。]'
  - id: A3
    name: 模型中的计费单位
    value: 1 个已上线生产站点 = 1 个客户
    unit: 口径
    source: '[BP businessModel.unitOfValue 为 live brownfield site；Research market.som 也以第 3 年 45 个已上线站点作为可达基础。]'
  - id: A4
    name: 定价结构
    value: 每个站点和连接器收取一次性设置费，并按已上线站点收取年度软件费
    unit: 定价模型
    source: '[BP gtm.pricing；BP businessModel.revenueStreams。]'
  - id: A5
    name: 每个已上线站点的年化综合 ARPU
    value: '30'
    unit: USDK
    source: '[Research bottomUpSizingDrivers 假设每个已上线站点每年软件支出约 $20K；BP 定价还包括设置费和连接器费用，因此基础情景采用较保守的首年单站点综合收入 $30K。]'
  - id: A6
    name: 收入确认节奏
    value: 处于活跃状态的已上线站点，在对应月份按整月均摊确认收入
    unit: 口径
    source: '[创业公司财务启发式：pre-seed SaaS 常用的简化确认方式，站点一旦上线即按月均摊确认收入。]'
  - id: A7
    name: 目标毛利率
    value: '70'
    unit: 百分比
    source: '[BP businessModel.targetGrossMarginPct。]'
  - id: A8
    name: 第 1 年年末已上线站点数
    value: '10'
    unit: 站点
    source: '[BP product.twelveMonth 为 8-12 个生产站点；基础情景取中位数 10。]'
  - id: A9
    name: 第 2 年年末已上线站点数
    value: '28'
    unit: 站点
    source: '[BP milestones 12-24 months 的目标约为 45 个已上线站点；Research adoptionFrictionMatrix 指出服务型导入和预算割裂会拖慢速度，因此基础情景把该里程碑打折到 Y2 Q4 的 28 个站点。]'
  - id: A10
    name: 第 3 年年末已上线站点数
    value: '45'
    unit: 站点
    source: '[BP market.som 与 milestones 都把第 3 年可达基础锚定在约 45 个已上线站点。]'
  - id: A11
    name: 用于单元经济的稳态月流失率
    value: '1.5'
    unit: 每月百分比
    source: '[创业公司财务启发式：适用于预算粘性较高、但产品仍处早期的运营软件。]'
  - id: A12
    name: 显式预测中的流失政策
    value: 第 4 年前不在经营预测中计入站点流失
    unit: 预测口径
    source: '[创业公司财务启发式：前 3 年主要是少量锚点账户里的参考驱动式扩张，因此经营预测假设没有站点流失；但单元经济部分仍采用稳态流失率。]'
  - id: A13
    name: 每个新已上线站点的综合 CAC
    value: '14'
    unit: USDK
    source: '[基于模型推导的启发式假设，锚定于 BP 的 GTM 渠道以及创始人主导的企业销售加伙伴转介绍。]'
  - id: A14
    name: 平均销售周期
    value: '4'
    unit: 月
    source: '[BP gtm.funnelTargets 与 Research buyingTriggers 都说明这是一笔多干系人的扩张销售，周期略长于一个季度。]'
  - id: A15
    name: 招聘节奏
    value: 起步即有创始人与创始工程师；M2 招部署工程师；M6 招产品/集成负责人；M9 招客户成功与基准负责人；M12 招首位销售/合作负责人；之后在第 2-3 年做克制扩编
    unit: 招聘计划
    source: '[BP team 的 startTiming；后续岗位是基于第 2-3 年站点爬坡做的创业公司财务延展。]'
  - id: A16
    name: 全成本年化现金薪酬
    value: 创始人 72；工程或产品 55；部署或客户成功 42；销售或合作 48
    unit: 每个 FTE 对应 USDK
    source: '[创业公司财务启发式：印度企业软件创业公司的现金薪酬带，已含福利。]'
  - id: A17
    name: 非薪酬经营支出爬坡
    value: 第 1 年前期约每月 15K，到第 3 年 Q4 提升到约每月 42K
    unit: 每月 USDK
    source: '[创业公司财务启发式：锚定云工具、存量场地上线差旅、伙伴拓展和法务/行政开支。]'
  - id: A18
    name: 现金转化假设
    value: EBITDA 近似等于经营现金变动
    unit: 现金口径
    source: '[创业公司财务启发式：模型中不计债务、资本开支、税项或显著营运资金波动。]'
  - id: A19
    name: 融资目标
    value: 在 seed 融资前做到约 45 个已上线站点、6 个锚点运营商网络、可复制的伙伴来源管道，并保留 6 个月缓冲
    unit: 里程碑
    source: '[BP fundingAsk.useOfFundsSummary；BP milestones；财务模型要求保留 6 个月缓冲。]'
