scenarios:
  downside:
    description: 预算仍部分被 OEM 打包，因此站点爬坡放缓，业务也继续更偏实施服务。
    y3RevenueK: 780.0
    y3EbitdaK: -520.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 每个上线站点的综合年度 ARPU 降至 $26K。
    - Q4Y3 上线站点数只有 34，而不是 45。
    - 由于连接器复用滞后，毛利率最高只能到 65%。
    - 伙伴来源 pipeline 表现不及预期，综合 CAC 升至 $18K。
  base:
    description: 仓库扩张需求稳步转化，到 Q4Y3 达到 45 个上线站点，同时毛利率达到计划中的 70%。
    y3RevenueK: 1083.75
    y3EbitdaK: -371.38
    cashLowPointK: 910.52
    keyAssumptionChanges:
    - 每个上线站点的综合年度 ARPU 维持在 $30K。
    - 上线站点数从 Y1 末的 10，增长到 Y2 末的 28，再到 Y3 末的 45。
    - 随着部署模板开始复用，毛利率提升到 70% 目标。
  upside:
    description: 伙伴转介绍提前拉来更多网络，并提高模块附着率，在交付拖累更小的情况下带来更快的站点增长。
    y3RevenueK: 1350.0
    y3EbitdaK: -170.0
    cashLowPointK: 1060.0
    keyAssumptionChanges:
    - 更强的基准分析与连接器附着率把综合年度 ARPU 提升到每站点 $34K。
    - 通过锚点账户内更快扩张，Q4Y3 上线站点达到 55。
    - 随着可复用连接器覆盖大多数上线项目，毛利率提升到 72%。
