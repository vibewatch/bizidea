    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
modelDiagram:
  title: 单元经济流程
  mermaid: |
    flowchart LR
      Leads[伙伴转介绍 + 直接外呼] --> Assessments[合格部署评估]
      Assessments --> LiveSites[已上线生产站点]
      LiveSites --> Revenue[综合站点收入]
      Revenue --> GrossProfit[70% 毛利]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景收入来自已上线站点从 10 个增至 45 个，同时每个站点的年化综合收入维持在 $30K，构成是软件费加适度的设置费与连接器收入。
  - checkName: 必须做对的事
    finding: 连接器复用和伙伴转介绍必须足够快地改善，才能支持第 2 年末做到 28 个站点，同时不让部署人力把 70% 的目标毛利率压垮。
  - checkName: 模型会在哪种情况下失效
    finding: 如果部署预算始终锁在 OEM 合同里、而公司到第 3 年末又做不到约 34 个已上线站点，下行情景会让账上现金不足以支持一次体面的 seed 融资。
  - checkName: 下一轮融资需要的证明
    finding: 只要公司能证明自己拿下 6 个锚点网络、约 45 个已上线站点、伙伴来源管道占比超过 40%，并且基准数据已经说明上线经济模型可复制，seed 故事就成立了。
sanityChecks:
  ruleOf40: 第 3 年增长 104% + EBITDA 利润率 -34% = 70%
  burnMultiple: 第 2 年烧钱倍数为 0.9x，第 3 年为 0.7x；随着收入增速跑赢烧钱速度，指标在改善。
  revenuePerFte: 以 Q4Y3 的 15 个 FTE 计算，第 3 年人均收入为 $72K；这明显低于纯 SaaS 基准，只有在部署工作持续被产品化的前提下才说得过去。
  flags:
    - 基础情景有意把 BP 中 24 个月做到 45 个已上线站点的目标，后移到 36 个月，因为研究明确指出服务型导入和预算归口割裂会拖慢节奏。
    - 人均收入对软件公司来说仍然偏低，所以在连接器复用显著提升之前，这门生意更像“软件 + 部署服务”的混合体。
    - 模型假设买家愿意在 OEM 关系之外，再为一层中立部署层付费；如果他们只接受打包的厂商软件，CAC 和增速都会迅速恶化。
    - 综合站点 ARPU 里包含适度的设置费和连接器收入，因此如果只看纯经常性 ARR，数字会低于这个综合收入口径。
