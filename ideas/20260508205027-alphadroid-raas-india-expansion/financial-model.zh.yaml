scenarios:
  downside:
    description: 预算仍有一部分被 OEM 打包带走，导致站点爬坡延后，业务也更像实施服务。
    y3RevenueK: 780.0
    y3EbitdaK: -520.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - 每个已上线站点的年化综合 ARPU 降到 $26K。
      - Q4Y3 的已上线站点只有 34 个，而不是 45 个。
      - 由于连接器复用滞后，毛利率最高只能到 65%。
      - 因伙伴来源管道不达预期，综合 CAC 升到每个站点 $18K。
  base:
    description: 仓库扩张需求稳步转成 Q4Y3 的 45 个已上线站点，同时毛利率达到计划中的 70%。
    y3RevenueK: 1083.75
    y3EbitdaK: -371.38
    cashLowPointK: 910.52
    keyAssumptionChanges:
      - 每个已上线站点的年化综合 ARPU 维持在 $30K。
      - 已上线站点从第 1 年末的 10 个，增长到第 2 年末 28 个、第 3 年末 45 个。
      - 随着部署模板开始复用，毛利率提升到目标的 70%。
  upside:
    description: 伙伴转介绍提前带来更多网络客户，同时模块附加率更高，站点增长更快，交付负担也更轻。
    y3RevenueK: 1350.0
    y3EbitdaK: -170.0
    cashLowPointK: 1060.0
    keyAssumptionChanges:
      - 基准与连接器附加销售更强，带动每个已上线站点的年化综合 ARPU 升到 $34K。
      - 通过锚点账户内更快扩张，Q4Y3 的已上线站点达到 55 个。
      - 可复用连接器覆盖了大部分上线项目，毛利率提升到 72%。
