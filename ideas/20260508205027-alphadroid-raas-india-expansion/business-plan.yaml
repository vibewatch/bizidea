slug: brownfield-robot-rollout-os
date: '2026-05-08'
executiveSummary: >-
  Brownfield Robot Rollout OS targets Indian FMCG, retail, and 3PL operators
  that have already proven one indoor robot deployment and now need to expand to
  multiple brownfield warehouses without re-running a custom project at each
  site. The core pain is not robot demand; it is repeatable deployment across
  elevators, backend systems, and site-specific workflows, which current OEM-led
  rollouts and spreadsheet coordination handle poorly. The proposed wedge is a
  neutral rollout-control layer that standardizes site discovery, integration
  planning, launch checklists, and post-go-live benchmarking across sites and
  vendors. Research supports a real near-term buyer and buying trigger, but it
  also suggests the standalone software market is modest at roughly $6.0M SAM
  and $0.9M year-3 SOM unless the company expands into a broader deployment
  system of record. The first product should therefore stay narrow: warehouse
  rollout governance first, hospitals second, and day-to-day fleet execution not
  yet. Go-to-market should start through OEM and RaaS partners plus direct
  selling to operations leaders immediately after a successful pilot creates
  rollout urgency. The largest unresolved question is whether buyers will pay an
  independent software vendor before they run mixed fleets at meaningful scale,
  so the company must validate paid design-partner demand before building a
  broad platform.
problem:
  - Multi-site warehouse operators that approve robot expansion after a successful pilot still repeat site mapping, elevator integration, WMS or ERP handoffs, and launch governance at every brownfield facility, which delays productive go-live and weakens rollout ROI.
  - Budget ownership is split across operations, IT, OEM deployment teams, and facility contractors, so operators struggle to prove rollout speed, exception rates, and labor impact across sites using vendor services and spreadsheets alone.
solution:
  - A rollout OS captures site-readiness data before hardware arrives, generates reusable deployment plans, scores integration risk, and tracks open blockers across elevator, facility, and backend workstreams.
  - After launch, the product benchmarks time-to-go-live, mission stability, failed handoffs, and utilization by site so operators can justify additional sites and OEM partners can standardize delivery.
whyWeWin:
  - The company is positioned as the neutral cross-vendor system of record for rollout readiness, which OEM-first stacks and one-off integrators are poorly set up to provide.
  - India-first template libraries for brownfield warehouses, elevator and WMS connectors, and rollout benchmark data can compound with each launch faster than custom services alone.
strategicChoices:
  beachhead: Indian FMCG, retail, and 3PL networks expanding indoor material-movement robots from one pilot warehouse to 5-20 brownfield sites
  wedgeRationale: Warehouse rollouts have the clearest budget trigger because the first pilot already proved robot value and peak-season SLA pressure makes time-to-go-live economically visible; this is faster to validate than starting in hospitals, where workflow and safety scrutiny slow procurement.
  sequencingRationale: Start with warehouse deployment readiness, connector reuse, and ROI benchmarking because those capabilities shorten launch time for the current buyer; only after proving repeated multi-site expansion should the company add hospital-specific workflow controls, broader benchmarking products, and financing or procurement layers.
  notYet:
    - Clinical hospital workflows and patient-facing routes
    - Greenfield warehouse design software
    - Daily fleet execution and robot teleoperation
    - Cross-border expansion before India warehouse templates are repeatable
market:
  tam: $24.0M estimated TAM based on roughly 150 Indian multi-site warehouse and hospital operators, 8 eligible rollout sites each, and modeled annual rollout-software spend of about $20k per live site
  sam: $6.0M estimated three-year SAM focused on about 40 automation-ready Indian operators with near-term multi-site rollout pressure
  som: $0.9M estimated year-3 SOM assuming 6 anchor customers, roughly 45 live sites, and expansion from a first design partner into adjacent sites
  segments:
    - Indian FMCG, retail, and 3PL warehouse networks
    - Private hospital chains with non-clinical transport workflows
  buyingProcess: >-
    The initial sale starts when a first robot pilot clears ROI or throughput
    targets and leadership approves more sites. The economic buyer is usually an
    operations or automation leader, but IT, facility teams, and OEM partners
    influence approval because rollout risk sits in integrations and launch
    readiness.
product:
  mvp: >-
    V1 should cover warehouse site discovery, launch checklists, connector
    configuration for common WMS and elevator handoffs, risk scoring, and a
    post-go-live dashboard for rollout time, exceptions, and utilization. It
    should not attempt full fleet orchestration or broad hospital workflow
    support in the first release.
  sixMonth: Sign 2-3 paid design partners, ship the first warehouse rollout workspace, and productize at least two repeatable connector templates plus a standard launch scorecard.
  twelveMonth: Convert design partners into 8-12 live production sites, add benchmark views across sites, and package fixed-scope implementation playbooks that reduce custom engineering hours per launch.
  twentyFourMonth: Expand to a broader deployment system of record with multi-account benchmark data, partner-facing rollout portals, and a hospital logistics module limited to non-clinical transport routes.
  keyBets:
    - The same elevator, WMS, ERP, and facility handoff patterns recur often enough to justify reusable templates.
    - Operators will buy a rollout-governance layer before they demand a full mixed-fleet control plane.
    - Benchmarking time-to-go-live and exception rates creates enough executive value to defend software budget against OEM services bundling.
gtm:
  wedge: Sell into the expansion moment immediately after a successful first robot pilot, positioning the product as the fastest way to commission additional warehouses without custom rollout chaos.
  channels:
    - OEM and RaaS design-partner referrals
    - Direct sales to operations excellence and supply-chain automation leaders
    - ERP, WMS, and facility-integration partner referrals
  funnelTargets: "Partner intro or outbound lead to qualified rollout assessment 30%+, assessment to paid pilot 40%+, pilot to multi-site production rollout 60%+, first production site to 5-site expansion within 12 months 50%+"
  pricing: One-time site and connector setup plus annual per-live-site software, priced to fit within existing rollout and automation OpEx budgets rather than require a new standalone innovation budget.
businessModel:
  revenueStreams:
    - One-time rollout assessment and integration setup fees
    - Annual per-live-site software subscriptions
    - Benchmarking and partner collaboration modules for larger networks
  unitOfValue: Live brownfield site managed through the rollout workspace
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more sites within the same operator network
    - Sell connector packs for recurring backend and facility integrations
    - Add benchmark and compliance modules for more complex deployments
    - Expand from warehouse networks into hospital logistics after proof
strategyMap:
  northStarMetric: Live production sites launched through the platform and still active after 90 days
  inputMetrics:
    - Qualified rollout assessments started per quarter
    - Paid design partners signed
    - Median days from site kickoff to productive go-live
    - Connector reuse rate across launches
    - Pilot-to-multi-site expansion rate
  moatsToBuild:
    - Library of India-specific brownfield site archetypes and launch playbooks
    - Reusable integration templates for common elevator and backend systems
    - Cross-site benchmark data on launch speed, exception rates, and stability
    - Partner distribution with OEMs and integrators who prefer a neutral rollout layer
  killCriteria:
    - Fewer than 2 paid design partners in the first 9 months
    - Less than 30% reuse of connectors or playbooks across the first 10 launches
    - Pilot-to-production conversion below 40% because operators keep buying OEM services instead
  mermaid: |
    flowchart LR
      Wedge[Post-pilot warehouse expansion] --> MVP[Rollout readiness workspace]
      MVP --> Proof[Shorter go-live and lower exception rates]
      Proof --> Expansion[More sites per account plus hospital adjacencies]
investorMemo:
  verdict:
    call: Watch
    conviction: Moderate interest only if the team can prove paid multi-site rollout demand early; current market size and budget-creation risk cap conviction.
    whyBelieve: Named Indian robot customers, live subscription pricing, and repeated brownfield integration pain create a credible wedge around rollout readiness.
    whyDoubt: The independent software layer may stay too small or get absorbed by OEM services unless buyers value neutral cross-site benchmarking quickly.
    nextDiligence: Validate 2-3 paid design partners with funded site expansion plans and inspect whether rollout budgets sit outside OEM contracts today.
  firstCustomer:
    title: Post-pilot warehouse automation leader at an Indian FMCG or 3PL network
    profile: A network with 3-20 regional warehouses, one successful indoor robot deployment, and immediate pressure to launch additional brownfield sites before peak demand periods.
    trigger: The first site hits labor or throughput targets and leadership approves the next wave of warehouse rollouts.
    buyer: VP Operations or Supply Chain Automation Lead
    initialContract: Paid rollout assessment and first-site setup worth roughly ₹25-60 lakh across 1-2 warehouses and 2 integrations, converting into annual per-site software plus setup fees on each added facility.
  mustBeTrue:
    - At least 5-10 Indian operators already have one live indoor robot site and a funded plan to expand within 12 months.
    - Buyers view rollout delay and rework as a separate, measurable cost that can support software spend beyond the OEM contract.
    - The first 10 launches reveal recurring connector and workflow patterns rather than fully bespoke deployment requirements.
    - A neutral cross-vendor system of record matters before operators run large mixed fleets, not only after that point.
    - Warehouse expansion can reach enough sites per account to offset a modest standalone market size.
  diligenceQuestions:
    - How many current prospects have approved next-site rollout budgets versus only pilot curiosity?
    - Which budget line pays for rollout software today if the OEM contract already includes deployment services?
    - What percentage of integration work is actually reusable across the first ten target customers?
    - How hard would it be for Alphadroid, GreyOrange, or Addverb to bundle the same workflow into existing deals?
    - Do hospitals show better pain intensity than warehouses, or only slower procurement and higher safety burden?
  riskHeatmap:
    - risk: OEMs or orchestration vendors bundle rollout governance into broader robot or WES contracts
      likelihood: High
      impact: High
      leadingIndicator: More than half of qualified prospects insist the OEM must remain the only rollout software provider of record.
      mitigation: Focus on multi-site and multi-vendor accounts where neutrality and cross-site benchmarking matter more than single-vendor tooling.
    - risk: Delivery stays services-heavy and prevents software-like margins
      likelihood: High
      impact: High
      leadingIndicator: Connector reuse stays below 30% and custom implementation hours do not fall by the sixth launch.
      mitigation: Restrict the first product to repeatable warehouse workflows, fixed-scope launch packages, and a small set of connector patterns.
    - risk: Buyers do not create a separate budget for rollout software
      likelihood: Medium
      impact: High
      leadingIndicator: Prospects agree the pain is real but refuse paid pilots unless the product is bundled free into the robot contract.
      mitigation: Price against rollout speed, SLA protection, and lower rework inside existing automation expansion budgets.
    - risk: Hospitals require more workflow and safety customization than the product can support early
      likelihood: Medium
      impact: Medium
      leadingIndicator: Hospital pilots stall in procurement or safety review for more than two quarters while warehouse deals move forward.
      mitigation: Keep hospitals as a second-phase adjacency and start with non-clinical transport routes only after warehouse proof.
operatingAssumptions:
  - assumption: Repeated elevator, WMS, and ERP integration patterns exist across Indian warehouse rollouts.
    basis: research.yaml
    validationTest: Document the top 10 connector patterns across the first 20 discovery calls and confirm at least 3 appear in 3 or more target accounts.
    decisionImpact: If false, narrow the beachhead further by warehouse subtype or shift toward a services-led integrator model.
  - assumption: The expansion trigger after a successful first pilot is the best moment to win budget and urgency.
    basis: idea.yaml
    validationTest: In 10 buyer interviews, confirm that at least half of paid opportunities start immediately after leadership approves more sites.
    decisionImpact: If false, reposition toward OEM design-stage tooling or later-stage mixed-fleet analytics instead of post-pilot rollout control.
  - assumption: Buyers will accept per-site software pricing layered on top of rollout setup fees.
    basis: operator judgment
    validationTest: Close 2 paid pilots where software value is explicitly separated from implementation and expands to a second site at similar pricing.
    decisionImpact: If false, repackage pricing as partner-led revenue share or success-based launch fees.
  - assumption: Warehouses will convert faster than hospitals even if hospital pain is real.
    basis: research.yaml
    validationTest: Run paired discovery and compare median sales-cycle length, stakeholder count, and paid-pilot conversion across 5 warehouse and 5 hospital prospects.
    decisionImpact: If false, reallocate product and go-to-market resources toward hospital logistics sooner than planned.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview operators and OEM partners with live pilots
    hypothesis: The strongest buyer urgency appears within 90 days after a first pilot is approved for expansion.
    successMetric: 10 operator interviews and 5 partner interviews completed, with at least 6 prospects confirming funded next-site rollout plans.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Sell a paid rollout assessment
    hypothesis: Buyers will pay for a structured site-readiness audit before the full product exists.
    successMetric: 2 paid assessments signed at or above ₹10 lakh each.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Productize the first connector set
    hypothesis: A limited set of elevator and WMS integration patterns covers a meaningful share of target accounts.
    successMetric: 3 reusable connector templates cover at least 50% of blockers in the first 5 pilots.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Benchmark launch outcomes
    hypothesis: Time-to-go-live and exception-rate reporting materially improves expansion conversations with operators and partners.
    successMetric: At least 3 customers use benchmark outputs in internal site-expansion decisions.
    owner: Product lead
  - horizon: 6–12 months
    experiment: Prove partner-led distribution
    hypothesis: OEM and integrator partners can deliver lower-cost pipeline than founder-led outbound alone.
    successMetric: 40% of qualified pipeline originates from partners and converts at equal or better rates than direct outbound.
    owner: Partnerships lead
  - horizon: 12–18 months
    experiment: Test hospital adjacency
    hypothesis: Non-clinical hospital transport routes can use the same rollout-control core with limited workflow extensions.
    successMetric: 1 paid hospital pilot launched without requiring a custom product fork.
    owner: Deployment solutions engineer
operations:
  - Standardized site-readiness checklist covering floor maps, payload flows, elevator logic, backend handoffs, and safety procedures
  - Shared connector library with versioned templates for recurring WMS, ERP, and facility integrations
  - Fixed-scope launch package with weekly blocker reviews and go-live exit criteria
  - Partner certification motion for OEMs, integrators, and facility contractors using the rollout workspace
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns the initial rollout workspace, connector architecture, and first benchmark instrumentation.
  - role: Founder-led sales
    startTiming: Month 0
    rationale: Early demand must be learned directly from operators and OEM partners before a repeatable sales motion exists.
  - role: Deployment solutions engineer
    startTiming: Month 2
    rationale: Converts custom rollout work into reusable launch playbooks and keeps services load from overwhelming the product roadmap.
  - role: Product and integration lead
    startTiming: Month 6
    rationale: Prioritizes connector reuse, benchmark outputs, and partner workflows once multiple live launches create real tradeoffs.
  - role: Customer success and benchmarking manager
    startTiming: Month 9
    rationale: Drives multi-site expansion, captures proof points, and operationalizes quarterly rollout reviews with customers.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2-3 paid design partners in warehouse networks
      - Launch the first 8-12 production sites with measured go-live and exception benchmarks
      - Reduce custom implementation hours per site through fixed-scope playbooks and reusable connectors
  - horizon: 12–24 months
    items:
      - Reach 6 anchor customers and roughly 45 live sites across warehouse accounts
      - Establish partner-sourced pipeline as a repeatable acquisition channel
      - Release benchmark and partner-collaboration modules plus a narrow hospital logistics pilot
  - horizon: 24–36 months
    items:
      - Become the deployment system of record for multi-site indoor robot expansion in India
      - Prove hospital adjacency without diluting the warehouse core
      - Prepare selective expansion into other cost-sensitive markets only after India templates and margins hold
risks:
  - risk: OEM and orchestration vendors bundle away the wedge before the startup owns enough neutral benchmark data
    likelihood: High
    impact: High
    mitigation: Target accounts where cross-site governance, mixed vendors, or executive benchmarking make neutrality valuable from day one.
  - risk: The business remains implementation-heavy and fails to reach software-like gross margins
    likelihood: High
    impact: High
    mitigation: Limit early scope, codify the first 10 launches into templates, and refuse bespoke features that do not generalize across accounts.
  - risk: Operators keep rollout budgets inside OEM contracts and resist a separate software category
    likelihood: Medium
    impact: High
    mitigation: Price within existing automation expansion budgets and show direct impact on time-to-go-live, SLA adherence, and rework reduction.
  - risk: Hospital expansion distracts the team before the warehouse wedge is proven
    likelihood: Medium
    impact: Medium
    mitigation: Treat hospitals as a second-phase adjacency and only pursue non-clinical logistics pilots that reuse the warehouse core.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to win paid design partners, build the warehouse rollout core, productize connector reuse, and prove multi-site expansion economics before a larger seed round.
