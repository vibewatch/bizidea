openQuestions:
- How many Indian FMCG, retail, 3PL, and hospital networks already have more than one live indoor robot site today?
- What portion of rollout spend is currently billed inside OEM contracts versus separate IT, facility, and integration budgets?
- Which elevator vendors, WMSs, and ERP systems recur most often in India’s brownfield robot deployments?
- Will buyers tolerate an independent rollout layer before they are running mixed fleets, or do they only feel the pain at larger scale?
- Does the hospital vertical have a clearer pain signal than warehouses, or a slower buying path that makes it a second-phase expansion only?
