slug: brownfield-robot-rollout-os
date: '2026-05-08'
executiveSummary: >-
  存量场地机器人部署 OS 面向的是印度 FMCG、零售和 3PL 运营商——他们已经在一个室内部署里证明机器人能跑，现在要把它扩到多个存量仓，却不想每个站点都重新做一遍定制项目。核心痛点不是有没有机器人需求，而是如何跨电梯、后台系统和各站点不同的工作流，把部署稳定复用出来；这件事无论 OEM 主导的交付，还是靠电子表格协同，都做得很差。最合适的切口是一层中立的部署控制层，把站点摸排、集成规划、上线清单和上线后基准评估，在不同站点和不同厂商之间标准化。研究显示，近期确实有真实买家和明确触发点；但如果公司不能顺势长成更广义的部署系统记录层，独立软件市场本身大概率只有约 $6.0M 的 SAM 和 $0.9M 的第 3 年 SOM，空间并不大。因此首个产品必须收窄：先做仓库部署治理，再看医院，先不碰日常车队执行。GTM 也应该从 OEM 与 RaaS 合作伙伴切入，同时在首个试点成功后的扩点窗口，直接卖给运营负责人。眼下最大的不确定性，是买家会不会在混合车队真正成规模之前，就愿意为独立软件厂商付钱；所以公司必须先拿到付费共创客户，再谈大平台。
problem:
  - 首个试点跑通后，多站点仓储运营商在每个存量场地仍要重复做站点建模、电梯集成、WMS 或 ERP 交接，以及上线治理；这会拖慢真正产出的上线速度，也会削弱扩点 ROI。
  - 预算归口分散在运营、IT、OEM 部署团队和设施承包商之间，结果是运营方很难仅靠厂商服务和电子表格，就把部署速度、异常率和人力影响跨站点算清楚。
solution:
  - 这套部署 OS 会在硬件进场前采集站点就绪数据，生成可复用部署方案，给集成风险打分，并持续跟踪电梯、设施和后台各条工作流里的未解决阻塞项。
  - 上线后，产品继续按站点衡量上线用时、任务稳定性、交接失败率和利用率，让运营方能更有把握地批准更多站点，也让 OEM 伙伴能把交付动作标准化。
whyWeWin:
  - 公司把自己摆在“跨厂商、中立的部署就绪系统记录层”这个位置上，而 OEM 自有栈和一次性集成商天然不适合做这件事。
  - 面向印度存量仓库的模板库、电梯和 WMS 连接器、以及部署基准数据，会随着每次上线越滚越厚，复利速度会快过纯定制服务。
strategicChoices:
  beachhead: 把室内物料搬运机器人从一个试点仓扩到 5-20 个存量站点的印度 FMCG、零售和 3PL 网络
  wedgeRationale: 仓库扩点的预算触发最清楚，因为首个试点已经证明了机器人价值，而旺季 SLA 压力又会把上线速度直接变成经济问题；相比之下，医院虽然也痛，但工作流和安全审查会拖慢采购。
  sequencingRationale: 先把仓库部署就绪、连接器复用和 ROI 基准做透，因为这些能力最能缩短当前买家的上线时间；只有在多站点重复扩张被验证后，公司才该补上医院专用工作流控制、更广的基准产品，以及融资或采购层。
  notYet:
    - 临床医院工作流和面向病人的运输路线
    - 绿地仓库设计软件
    - 日常车队执行和机器人遥操作
    - 在印度仓库模板尚未做成可复用流程前的跨境扩张
market:
  tam: 基于约 150 家印度多站点仓储与医院运营商、每家 8 个可部署站点、以及每个已上线站点约 $20k 的年度部署软件支出，估算 TAM 为 $24.0M
  sam: 聚焦约 40 家近 3 年内有多站点自动化压力、且已具备采购条件的印度运营商，估算三年期 SAM 为 $6.0M
  som: 假设第 3 年拿下 6 家锚点客户、约 45 个已上线站点，并从首个共创客户向周边站点扩张，估算第 3 年 SOM 为 $0.9M
  segments:
    - 印度 FMCG、零售和 3PL 仓储网络
    - 拥有非临床运输场景的私立医院连锁
  buyingProcess: >-
    第一单通常发生在首个机器人试点跑出 ROI 或吞吐结果、管理层批准新增站点之后。经济买家往往是运营或自动化负责人，但 IT、设施团队和 OEM 伙伴都会影响审批，因为部署风险主要卡在集成和上线准备，而不是机器人本身。
product:
  mvp: >-
    V1 应先覆盖仓库站点摸排、上线清单、常见 WMS 与电梯交接的连接器配置、风险评分，以及针对上线用时、异常和利用率的上线后看板。第一版不该尝试做完整车队编排，也不该一上来就大范围支持医院工作流。
  sixMonth: 签下 2-3 家付费共创客户，交付第一套仓库部署工作台，并把至少 2 个可重复使用的连接器模板和一套标准上线评分卡产品化。
  twelveMonth: 把共创客户转成 8-12 个真实生产站点，上线跨站点基准视图，并把固定范围的实施打法打包出来，逐步压低每次上线消耗的定制工程时数。
  twentyFourMonth: 把产品扩成更完整的部署系统记录层，加入跨客户基准数据、面向合作伙伴的部署门户，以及仅覆盖非临床运输路线的医院物流模块。
  keyBets:
    - 相同的电梯、WMS、ERP 和设施交接模式会高频重复，值得沉淀成模板。
    - 运营方会在真正需要混合车队控制平面之前，先为部署治理层买单。
    - 只要把上线用时和异常率的基准做出来，就能给高管提供足够价值，支撑软件预算不被 OEM 服务打包吞掉。
gtm:
  wedge: 紧贴首个机器人试点成功后的扩张窗口切入，把产品讲成“在不重做定制项目的前提下，最快把更多仓库上线”的工具。
  channels:
    - OEM 和 RaaS 共创客户转介绍
    - 面向运营卓越与供应链自动化负责人的直销
    - ERP、WMS 和设施集成伙伴转介绍
  funnelTargets: 伙伴引荐或外呼线索到合格部署评估 30%+，评估到付费试点 40%+，试点到多站点生产部署 60%+，首个生产站点到 12 个月内扩到 5 个站点 50%+
  pricing: 在每个站点和连接器的一次性设置费之外，再按已上线站点收取年度软件费；定价要能落进现有部署和自动化 OpEx 预算，而不是逼客户另开一笔创新预算。
businessModel:
  revenueStreams:
    - 一次性部署评估和集成设置费
    - 按已上线站点收取的年度软件订阅费
    - 面向大型网络的基准和伙伴协同模块
  unitOfValue: 通过部署工作台管理的一个已上线存量站点
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一运营商网络内增加更多站点
    - 为重复出现的后台和设施集成出售连接器包
    - 为更复杂的部署增加基准和合规模块
    - 仓库场景跑通后，再扩到医院物流
strategyMap:
  northStarMetric: 通过平台上线、且 90 天后仍在稳定运行的生产站点数量
  inputMetrics:
    - 每季度启动的合格部署评估数量
    - 签下的付费共创客户数量
    - 从站点立项到有效上线的中位天数
    - 跨项目的连接器复用率
    - 试点向多站点扩张的转化率
  moatsToBuild:
    - 面向印度存量场地的站点原型库和上线打法手册
    - 常见电梯与后台系统的可复用集成模板
    - 跨站点的上线速度、异常率和稳定性基准数据
    - 更偏好中立部署层的 OEM 与集成商分发网络
  killCriteria:
    - 前 9 个月拿不到 2 家以上付费共创客户
    - 前 10 次上线里，连接器或打法复用率低于 30%
    - 试点到生产转化率低于 40%，因为运营方持续只买 OEM 服务
  mermaid: |
    flowchart LR
      Wedge[首个试点后的仓库扩点] --> MVP[部署就绪工作台]
      MVP --> Proof[更短上线时间与更低异常率]
      Proof --> Expansion[单账户更多站点与医院邻接场景]
investorMemo:
  verdict:
    call: 观察
    conviction: 只有团队能尽早证明付费的多站点部署需求，这个方向才值得保持中等关注；当前市场空间和预算独立性风险，限制了判断强度。
    whyBelieve: 印度已经出现具名机器人客户、公开订阅定价和反复出现的存量场地集成痛点，这让“部署就绪层”这个切口站得住。
    whyDoubt: 如果买家很快看不到中立的跨站点基准价值，这层独立软件要么太小，要么会被 OEM 服务直接吃掉。
    nextDiligence: 先验证 2-3 家有已批站点扩张计划的付费共创客户，再看当前部署预算是否真的在 OEM 合同之外。
  firstCustomer:
    title: 印度 FMCG 或 3PL 网络里，首个试点后准备扩张的仓库自动化负责人
    profile: 拥有 3-20 个区域仓、已经跑通一个室内机器人部署、并在旺季前急着把更多存量站点上线的网络型客户。
    trigger: 首个站点达到人力或吞吐目标，管理层批准下一波仓库扩点。
    buyer: 运营副总裁或供应链自动化负责人
    initialContract: 对 1-2 个仓库、2 个集成项收取约 ₹25-60 lakh 的付费部署评估和首站设置费，之后每新增一个场地，再转成按站点年度软件费加设置费。
  mustBeTrue:
    - 至少已经有 5-10 家印度运营商，拥有 1 个已上线的室内机器人站点，并计划在 12 个月内继续扩张。
    - 买家会把部署延期和返工看成一项单独、可量化的成本，愿意在 OEM 合同之外为软件付费。
    - 前 10 次上线会暴露出重复出现的连接器和工作流模式，而不是每次都完全定制。
    - 在客户拥有大规模混合车队之前，中立的跨厂商系统记录层就已经有价值，而不是只能等到更后期。
    - 每个账户里的仓库扩张能铺到足够多站点，弥补独立市场空间偏小的问题。
  diligenceQuestions:
    - 当前潜在客户里，到底有多少已经批了下一个站点的部署预算，而不是还停留在试点兴趣？
    - 如果 OEM 合同里已经含部署服务，今天到底是哪条预算在为部署软件买单？
    - 前十个目标客户里，真正能复用的集成工作占比到底有多高？
    - Alphadroid、GreyOrange 或 Addverb 把同样流程打包进现有交易，会有多容易？
    - 医院场景的痛感真的强过仓库，还是只是采购更慢、安全负担更重？
  riskHeatmap:
    - risk: OEM 或编排厂商把部署治理能力打包进更大的机器人或 WES 合同
      likelihood: High
      impact: High
      leadingIndicator: 超过一半的合格潜在客户坚持 OEM 必须是唯一的部署软件记录方。
      mitigation: 集中打多站点、多厂商账户，因为这类客户更在意中立性和跨站点基准，而不是单一厂商自带工具。
    - risk: 交付长期维持重服务模式，做不出软件型毛利
      likelihood: High
      impact: High
      leadingIndicator: 连接器复用率始终低于 30%，到第六次上线时定制实施工时仍无明显下降。
      mitigation: 把首个产品严格限制在可重复的仓库工作流、固定范围的上线包和少量连接器模式内。
    - risk: 买家不会单独给部署软件建预算
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户都承认痛点真实，但除非产品免费打包进机器人合同，否则不愿意付费试点。
      mitigation: 定价锚定部署速度、SLA 保护和返工减少，直接搭载现有自动化扩张预算。
    - risk: 医院场景需要的工作流和安全定制超出早期产品承受能力
      likelihood: Medium
      impact: Medium
      leadingIndicator: 医院试点在采购或安全审查阶段卡超过两个季度，而仓库交易还在继续推进。
      mitigation: 把医院明确放到第二阶段，只在仓库跑通后，才切入可复用核心能力的非临床运输路线。
operatingAssumptions:
  - assumption: 印度仓库扩点里，电梯、WMS 和 ERP 集成模式会反复出现。
    basis: research.yaml
    validationTest: 在前 20 次需求沟通里整理前 10 大连接器模式，并确认至少有 3 类模式在 3 个以上目标账户中重复出现。
    decisionImpact: 如果不成立，就进一步缩窄滩头场景，按仓库子类型切分，或者转回以服务为主的集成商模式。
  - assumption: 首个试点成功后的扩张窗口，是拿到预算和紧迫性的最佳时点。
    basis: idea.yaml
    validationTest: 做 10 次买家访谈，确认至少一半付费机会都发生在管理层批准新增站点之后。
    decisionImpact: 如果不成立，就把定位改到 OEM 设计阶段工具，或更后期的混合车队分析，而不是首个试点后的部署控制。
  - assumption: 买家会接受按站点的软件定价，再叠加部署设置费。
    basis: 运营判断
    validationTest: 拿下 2 个付费试点，明确把软件价值和实施服务分开报价，并在第二个站点以近似价格扩张成功。
    decisionImpact: 如果不成立，就把定价改成伙伴分成，或按上线成功收费。
  - assumption: 即便医院痛点真实，仓库成交速度仍会快于医院。
    basis: research.yaml
    validationTest: 对 5 家仓库和 5 家医院潜在客户做成对访谈，比对销售周期中位数、干系人数和付费试点转化率。
    decisionImpact: 如果不成立，就更早把产品和 GTM 资源切向医院物流。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈已有试点的运营方与 OEM 伙伴
    hypothesis: 最强的买方紧迫性，会出现在首个试点获批扩张后的 90 天内。
    successMetric: 完成 10 次运营方访谈和 5 次伙伴访谈，其中至少 6 家潜在客户确认已经有下一站点的预算和计划。
    owner: 创始人 / CEO
  - horizon: 0–90 天
    experiment: 卖出一份付费部署评估
    hypothesis: 即使完整产品尚未成型，买家也愿意为结构化站点就绪审计付费。
    successMetric: 至少签下 2 份单价不低于 ₹10 lakh 的付费评估。
    owner: 创始人 / CEO
  - horizon: 90–180 天
    experiment: 把第一批连接器做成产品
    hypothesis: 有限几类电梯和 WMS 集成模式就能覆盖相当一部分目标客户。
    successMetric: 3 个可复用连接器模板，覆盖前 5 个试点里至少 50% 的阻塞项。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 建立上线结果基准
    hypothesis: 上线用时和异常率的可视化，能明显改善运营方和伙伴讨论扩点时的决策效率。
    successMetric: 至少 3 家客户把基准输出用于内部站点扩张决策。
    owner: 产品负责人
  - horizon: 6–12 个月
    experiment: 证明伙伴主导分发可行
    hypothesis: OEM 和集成伙伴带来的获客成本，会低于纯靠创始人外呼。
    successMetric: 40% 的合格管道来自伙伴，且转化率不低于直销外呼。
    owner: 渠道合作负责人
  - horizon: 12–18 个月
    experiment: 测试医院邻接场景
    hypothesis: 只做少量工作流扩展，非临床医院运输路线也能复用同一套部署控制核心。
    successMetric: 在不为医院单独分叉产品的前提下，成功上线 1 个付费医院试点。
    owner: 部署解决方案工程师
operations:
  - 一套标准化站点就绪清单，覆盖平面图、载重流、电梯逻辑、后台交接和安全流程
  - 带版本管理的共享连接器库，沉淀重复出现的 WMS、ERP 和设施集成模板
  - 固定范围的上线包，配合每周阻塞项复盘和上线退出标准
  - 面向 OEM、集成商和设施承包商的伙伴认证动作，让他们都在同一个部署工作台里协作
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 负责最初的部署工作台、连接器架构和第一批基准埋点。
  - role: 创始人主导销售
    startTiming: 第 0 个月
    rationale: 在形成可复制销售动作之前，必须由创始人直接从运营方和 OEM 伙伴身上学需求。
  - role: 部署解决方案工程师
    startTiming: 第 2 个月
    rationale: 把定制部署工作转成可复用上线打法，避免服务负担把产品路线拖垮。
  - role: 产品与集成负责人
    startTiming: 第 6 个月
    rationale: 一旦出现多个真实上线项目，就需要有人专门排序连接器复用、基准输出和伙伴工作流的优先级。
  - role: 客户成功与基准经理
    startTiming: 第 9 个月
    rationale: 推动多站点扩张、沉淀证明材料，并把季度部署复盘变成标准客户动作。
milestones:
  - horizon: 0–12 个月
    items:
      - 在仓储网络里签下 2-3 家付费共创客户
      - 跑出前 8-12 个生产站点，并开始衡量上线用时和异常基准
      - 通过固定范围打法和可复用连接器，降低每站点的定制实施工时
  - horizon: 12–24 个月
    items:
      - 拿下 6 家锚点客户，并在仓库账户里铺到约 45 个已上线站点
      - 把伙伴带来的管道做成稳定获客渠道
      - 发布基准和伙伴协作模块，并启动一个收窄版医院物流试点
  - horizon: 24–36 个月
    items:
      - 成为印度多站点室内机器人扩张的部署系统记录层
      - 在不削弱仓库核心的前提下，验证医院邻接场景
      - 只有在印度模板和毛利站稳后，才准备进入其他成本敏感市场
risks:
  - risk: 在公司积累足够中立基准数据之前，OEM 与编排厂商就先把这个切口打包带走
    likelihood: High
    impact: High
    mitigation: 优先打那些从第一天起就重视跨站点治理、多厂商协作或高管基准的账户，让中立性一开始就有价值。
  - risk: 生意长期停留在重实施模式，达不到软件型毛利
    likelihood: High
    impact: High
    mitigation: 严格限制早期范围，把前 10 次上线沉淀成模板，并拒绝那些无法在多个账户中泛化的定制需求。
  - risk: 运营方继续把部署预算包进 OEM 合同里，不愿接受独立软件品类
    likelihood: Medium
    impact: High
    mitigation: 定价直接挂钩上线用时、SLA 达成和返工减少，把预算落在现有自动化扩张支出里。
  - risk: 医院扩张在仓库切口尚未验证前就分散团队注意力
    likelihood: Medium
    impact: Medium
    mitigation: 明确把医院当作第二阶段邻接市场，只追那些能复用仓库核心能力的非临床物流试点。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月时间拿下付费共创客户，搭出仓库部署核心，把连接器复用做成产品，并在下一轮 seed 融资前验证多站点扩张的单位经济模型。
