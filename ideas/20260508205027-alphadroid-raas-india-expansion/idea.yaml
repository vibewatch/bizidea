topRisks:
  - name: Vendor bundling
    description: Robot OEMs may try to include deployment tooling themselves and squeeze an independent rollout layer.
    mitigation: Start where operators use multiple vendors or require cross-site standardization that OEM point solutions cannot easily support.
  - name: Services-heavy delivery
    description: Early customers may demand so much custom implementation that the business looks like an integration consultancy.
    mitigation: Productize the first ten deployments into reusable connectors, mission templates, and fixed-scope launch packages.
  - name: Slow automation budget cycles
    description: Indian operators may still expand robots gradually, making software budgets harder to unlock before multi-site scale appears.
    mitigation: Price per live site with measurable rollout-time and utilization gains so the product rides existing automation expansion budgets instead of asking for a new line item.
