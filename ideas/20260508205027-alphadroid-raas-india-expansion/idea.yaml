differentiator: >-
  This is not another fleet-management dashboard for robots already in production. The product sits one layer higher,
  standardizing how operators take indoor robots into messy brownfield facilities with elevators, legacy software, and
  inconsistent workflows. Over time it becomes defensible through facility integration templates, rollout benchmarks, and
  a dataset on time-to-value across sites, vendors, and task types that both operators and lenders will care about.
