problem: >-
  Large Indian warehouse and hospital operators can now justify indoor transport robots, but each brownfield site has a
  different mix of routes, elevators, payload rules, and backend systems. That turns every rollout into a custom project
  that delays go-live, depresses robot utilization, and makes the second and third deployment far harder than the first.
  Ops teams end up coordinating vendors, facility contractors, and internal IT in spreadsheets, so expansion stalls even
  when the robot itself already works.
targetUser:
  primary: Head of operations excellence at an Indian FMCG, retail, or 3PL network rolling material-movement robots from one warehouse to multiple brownfield sites
  secondary: Operations transformation leader at a private hospital chain deploying robots for pharmacy, linen, or lab transport
  buyer: VP operations or supply chain automation lead with responsibility for multi-site rollout ROI
startupThesis:
  nonObviousInsight: >-
    In India's cost-sensitive market, the scarce layer is no longer access to robot hardware; once robots are sold as a
    monthly service to real enterprises, the bottleneck shifts to repeatable brownfield deployment across buildings,
    elevators, and backend systems.
  beachhead: Rollout orchestration for Indian FMCG, retail, and 3PL operators expanding indoor material-movement robots from one pilot warehouse to 5-20 live sites
  wedge: Software plus deployment playbooks that standardize site mapping, elevator and WMS integration, mission rules, and post-launch ROI tracking for indoor robot rollouts
  whyNowCatalyst: Named enterprise customers, live subscription pricing, and an investor with warehouse distribution paths show India's RaaS market has moved from novelty to rollout.
  ventureScalePath: >-
    Start with warehouse rollouts, then extend the same integration and ROI layer to hospitals, factories, and campuses,
    becoming the system of record for cross-vendor indoor robot deployment, benchmarking, financing, and service network
    procurement.
solution: >-
  Brownfield Robot Rollout OS would ingest a site's floor maps, lift rules, payload flows, and backend system requirements
  to generate a standard deployment plan before a robot arrives. It would provide reusable connectors for elevators, WMS,
  and ticketing or task systems, plus mission templates for common warehouse and hospital transport routes. After launch,
  the product would track utilization, failed handoffs, route exceptions, and labor savings so the operator can justify
  rollout to additional sites. The company can layer high-margin implementation on top at first, then turn the accumulated
  deployment templates and benchmarks into a software moat.
goToMarketSeed:
  firstCustomer: National FMCG or retail operators in India with 3-20 regional warehouses that have approved one indoor robot pilot and need to roll it out to additional brownfield facilities
  buyingTrigger: A first robot pilot hits throughput or labor targets and leadership approves expansion beyond the initial warehouse
  currentAlternative: Manual site-by-site rollout run by the robot vendor, facility contractors, internal IT teams, and spreadsheet ROI tracking
  switchingReason: The wedge cuts rollout time and integration rework by turning custom deployment knowledge into reusable templates the operator can apply across every new site
  pricingHypothesis: Annual platform fee per live site plus one-time integration setup for each facility and elevator or backend connector
