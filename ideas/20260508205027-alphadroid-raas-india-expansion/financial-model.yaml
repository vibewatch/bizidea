modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Partner referrals + direct outreach] --> Assessments[Qualified rollout assessments]
      Assessments --> LiveSites[Live production sites]
      LiveSites --> Revenue[Blended site revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by expanding from 10 to 45 live sites and holding blended annual site revenue at $30K through software plus modest setup and connector fees.
  - checkName: Must go right
    finding: Connector reuse and partner referrals must improve fast enough to support the 28-site Y2 exit without letting deployment labor crush the 70% gross-margin target.
  - checkName: Model breaks if
    finding: If rollout budgets stay trapped inside OEM contracts and the company exits Y3 below roughly 34 live sites, the downside case leaves too little cash for a clean seed process.
  - checkName: Next-round proof
    finding: The seed story works once the company can show 6 anchor networks, about 45 live sites, partner-sourced pipeline above 40%, and benchmark data proving repeatable launch economics.
sanityChecks:
  ruleOf40: Y3 growth 104% + EBITDA margin -34% = 70%
  burnMultiple: Y2 burn multiple 0.9x and Y3 burn multiple 0.7x, improving as revenue growth outruns burn.
  revenuePerFte: $72K Y3 using Q4Y3 15 FTE, well below pure-play SaaS benchmarks and acceptable only if deployment work keeps getting productized.
  flags:
    - The base case intentionally pushes the BP 45-live-site target from 24 months to 36 months because research points to services-heavy onboarding and fragmented budget ownership.
    - Revenue per FTE remains low for software, so the business still looks part-software and part-deployment-services unless connector reuse improves materially.
    - The model assumes buyers will pay for a neutral rollout layer alongside OEM relationships; if they will only buy bundled vendor software, CAC and growth both worsen quickly.
    - Blended site ARPU includes modest setup and connector revenue, so realized recurring-only ARR will look lower than the headline blended revenue figure.
