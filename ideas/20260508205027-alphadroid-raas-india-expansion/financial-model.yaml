slug: brownfield-robot-rollout-os
date: '2026-05-08'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-05'
    unit: month
    source: "[BP date 2026-05-08; model starts in the same month as the pre-seed close.]"
  - id: A2
    name: Opening cash after pre-seed close
    value: '2000'
    unit: USDK
    source: "[BP fundingAsk.targetFundingRangeUsd $2-3M; base case uses the low end $2.0M to stay inside plan guidance.]"
  - id: A3
    name: Billable unit in the model
    value: 1 live production site = 1 customer
    unit: policy
    source: "[BP businessModel.unitOfValue live brownfield site; Research market.som uses 45 live sites as the Y3 reachable base.]"
  - id: A4
    name: Pricing architecture
    value: One-time site and connector setup plus annual per-live-site software
    unit: pricing model
    source: "[BP gtm.pricing; BP businessModel.revenueStreams.]"
  - id: A5
    name: Blended annual ARPU per live site
    value: '30'
    unit: USDK
    source: "[Research bottomUpSizingDrivers $20K annual software spend per live site; BP pricing also includes setup and connector fees, so the base case uses a conservative blended first-year site revenue of $30K.]"
  - id: A6
    name: Revenue recognition cadence
    value: Active live sites contribute a full monthly ratable amount in the month shown
    unit: policy
    source: "[Startup-finance heuristic: simple pre-seed SaaS recognition using monthly ratable revenue once a site is live.]"
  - id: A7
    name: Target gross margin
    value: '70'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct.]"
  - id: A8
    name: Year 1 ending live sites
    value: '10'
    unit: sites
    source: "[BP product.twelveMonth 8-12 live production sites; base case uses 10.]"
  - id: A9
    name: Year 2 ending live sites
    value: '28'
    unit: sites
    source: "[BP milestones 12-24 months target roughly 45 live sites; Research adoptionFrictionMatrix flags services-heavy onboarding and budget fragmentation, so the base case discounts that milestone to 28 by Q4Y2.]"
  - id: A10
    name: Year 3 ending live sites
    value: '45'
    unit: sites
    source: "[BP market.som and milestones both anchor the reachable Y3 base case at roughly 45 live sites.]"
  - id: A11
    name: Steady-state monthly site churn for unit economics
    value: '1.5'
    unit: percent per month
    source: "[Startup-finance heuristic for sticky operations software with annual budgets but still-early product maturity.]"
  - id: A12
    name: Explicit forecast churn policy
    value: No modeled site churn before Y4
    unit: forecast policy
    source: "[Startup-finance heuristic: the first three years are reference-sensitive expansion deployments inside a small number of anchor accounts, so the operating forecast assumes no site loss even though unit economics uses a steady-state churn rate.]"
  - id: A13
    name: Blended CAC per new live site
    value: '14'
    unit: USDK
    source: "[Model-derived heuristic anchored to BP GTM channels and founder-led enterprise selling with partner referrals.]"
  - id: A14
    name: Average sales cycle
    value: '4'
    unit: months
    source: "[BP gtm.funnelTargets and Research buyingTriggers both imply a multi-stakeholder expansion sale with one-quarter-plus cycles.]"
  - id: A15
    name: Hiring cadence
    value: Founder and founding engineer at start; deployment engineer in M2; product/integration lead in M6; CS benchmarking lead in M9; first sales/partnerships hire in M12; then lean expansion hires through Y3
    unit: hiring plan
    source: "[BP team startTiming; later hires are a startup-finance extension sized to the Y2-Y3 site ramp.]"
  - id: A16
    name: Fully loaded annual cash compensation
    value: Founder 72; engineering or product 55; deployment or CS 42; sales or partnerships 48
    unit: USDK per FTE
    source: "[Startup-finance heuristic: India enterprise-software startup salary bands with cash comp and benefits.]"
  - id: A17
    name: Non-payroll operating spend ramp
    value: About 15K per month in early Y1 rising to about 42K per month by Q4Y3
    unit: USDK per month
    source: "[Startup-finance heuristic anchored to cloud tooling, travel for brownfield launches, partner development, and legal/admin overhead.]"
  - id: A18
    name: Cash conversion assumption
    value: EBITDA approximates operating cash movement
    unit: cash policy
    source: "[Startup-finance heuristic: no debt, capex, taxes, or material working-capital swings are modeled at pre-seed stage.]"
  - id: A19
    name: Fundraise objective
    value: Reach roughly 45 live sites, 6 anchor operator networks, repeatable partner-sourced pipeline, and preserve 6 months of buffer before a seed round
    unit: milestone
    source: "[BP fundingAsk.useOfFundsSummary; BP milestones; Financial-model requirement to include a 6-month buffer.]"
