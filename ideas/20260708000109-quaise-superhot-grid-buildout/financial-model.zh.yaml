scenarios:
  downside:
    description: 试点转年度订阅的转化放缓，第四个账户落在第 3 年第四季度而非第二季度，只有 4 座在线场地达到经常性尽调室状态。
    y3RevenueK: 1335.0
    y3EbitdaK: -661.0
    cashLowPointK: 205.0
    keyAssumptionChanges:
    - 一旦场地进入外部尽调，试点转年度订阅的转化率更接近 40%，而不是商业计划设定的 60%+ 目标。
    - 在线场地密度最终落在每账户约 1.0 座，而不是基准 SOM 情形隐含的 1.5 座。
    - 毛利率停滞在约 66%，因为合作伙伴交接的可复用程度低于 A12 的假设。
  base:
    description: 两个付费共创客户转化成功，第三个业主在第 2 年下半年签约，第四个在第 3 年第二季度前加入，公司在第 3 年末达到 4 个业主账户、6 座在线场地。
    y3RevenueK: 1754.7
    y3EbitdaK: -338.6
    cashLowPointK: 717.0
    keyAssumptionChanges:
    - 一旦有场地进入投委会评审，试点转年度订阅的转化率维持在商业计划设定的 60%+ 目标附近。
    - 在不新增商业计划团队规划之外全职员工的情况下，在线场地密度达到研究得出的第 3 年 6 座 SOM 情形。
    - 随着辖区模板和尽调室变得可复用，毛利率在第 3 年末达到商业模式设定的 72% 目标。
  upside:
    description: 第三个和第四个业主都提前一个季度落地，基准报告支撑起第七座在线场地，定价达到商业计划区间的上半区，且不增加额外全职员工。
    y3RevenueK: 2050.0
    y3EbitdaK: -118.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - 第四个账户在第 3 年第一季度前加入，因为早期参考场地表现强劲，转化顺畅。
    - 到第 3 年末，平均在线场地密度靠账户扩张（而不仅是新增客户数）达到每账户约 1.75 座。
    - 由于合作伙伴赋能的实施吸纳了更多定制工作，毛利率提前一个季度达到 73%-74%。
