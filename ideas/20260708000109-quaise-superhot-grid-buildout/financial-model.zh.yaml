      SiteRooms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准收入来自 2 个早期共创客户的转化、第 2 年下半年的第三个业主，以及第 3 年上半年的第四个业主，6 间在线场地尽调室把退出 ARR 推高到约 190 万美元。
- checkName: 必须成立的前提
  finding: 只有实施流程足够模板化，公司才能把全职员工维持在 6 人，同时让合作伙伴工程师承接定制场地工作，模型才能成立。
- checkName: 模型失效的情形
  finding: 下行情形显示，如果第四个账户延后、在线场地密度低于第 3 年 6 座 SOM 情形，现金将压缩到约 20 万美元。
- checkName: 下一轮融资的证明
  finding: 一旦公司拥有 4 个业主账户、5-6 座在线场地、基准报告，并验证了一种合作伙伴主导的实施模式，证明这个模型是软件优先而非咨询优先，就有理由启动种子轮。
sanityChecks:
  ruleOf40: 第 3 年增长率 57.7% + EBITDA 利润率 -19.3% = 38.4%
  burnMultiple: 按退出 ARR 从 41 万美元增至 146 万美元再到 188 万美元计算，第 2 年约为 0.9 倍，第 3 年约为 0.8 倍。
  revenuePerFte: 第 3 年 29.24 万美元（对标垂直 SaaS 基准 20 万-40 万美元）
  flags:
  - 第 3 年情形只靠 4 个西部业主账户支撑，丢掉一笔交易或退役延后都会显著改变收入和融资节奏。
  - 模型假设业主工程师工作始终由合作伙伴主导；如果定制工程转为公司自聘，72% 的稳态毛利率很可能撑不住。
  - 退出时的运行速率已经接近研究得出的 SOM，所以创投级的上行空间仍然取决于能否从超热优先筛查扩展到更广的棕地改造工作流。
