reportMemo:
  executiveTakeaways:
  - 'The timing signal is real: Quaise is targeting first power from Project Obsidian by 2030, TNW reports a signed 50 MW hyperscaler buyer for the first tranche, and Google/Fervo already show buyer appetite for geothermal-backed 24/7 carbon-free energy [4][14][95].'
  - 'The beachhead is strategically sharp but economically narrow: our bottom-up model based on EIA retired and planned thermal sites implies roughly $13.4M of Western near-term annual spend capture, so venture scale requires expansion beyond superhot-only screening into broader thermal-asset redevelopment workflows [81][82].'
  - No direct software incumbent owns this workflow. Today the job is split across generic clean-energy development tools such as Paces, lifecycle systems such as Sitetracker, one-off owner’s-engineer studies, and developer-led geothermal programs [50][53][65][69][89].
  - 'Adoption risk is driven more by technical and regulatory uncertainty than by lead generation: site-specific geology, generator-replacement rules, and the real extent of turbine or balance-of-plant reuse all vary materially by asset [5][84][87][93].'
  marketDefinition: Software and structured diligence workflows for owners of retired or soon-to-retire thermal generation assets who need to test whether a brownfield site can be converted into a lender- and offtaker-ready next-generation geothermal project instead of losing interconnection value.
  customerAndBuyer: Primary users are redevelopment leads, asset-strategy teams, and owner’s engineers at Western U.S. IPPs and municipal utilities that control retired or planned-to-retire thermal plants. The economic buyer is typically the SVP or VP who owns thermal-asset strategy, queue preservation, and capital allocation across the redevelopment portfolio.
  buyingTriggers:
  - point: A retirement, announced retirement, or redevelopment mandate creates a hard clock to preserve site value before thermal assets drift into decommission-only status.
    sourceRefs:
    - 81
    - 82
  - point: Queue timelines and generator-interconnection complexity push owners to prioritize brownfield options that can reuse existing rights or at least avoid a full greenfield queue reset.
    sourceRefs:
    - 84
    - 87
    - 94
  - point: 24/7 clean-power demand from utilities and data-center buyers raises the option value of firm geothermal repowers near load.
    sourceRefs:
    - 33
    - 95
    - 100
    - 102
  - point: As next-generation geothermal reaches project-finance and framework-supply milestones, investment committees need standardized diligence packages instead of bespoke slide decks.
    sourceRefs:
    - 25
    - 26
    - 75
  willingnessToPay:
    summary: A six-figure annual software-and-diligence budget is rational if it helps kill weak sites earlier or accelerate strong ones on assets where queue-to-COD timelines now exceed four years and brownfield replacement strategies can bypass expensive standard interconnection paths.
    sourceRefs:
    - 87
    - 94
  competitiveLandscape: The market is fragmented rather than crowded. Paces attacks front-end siting, permitting, and power diligence for new projects; Sitetracker manages the asset lifecycle once portfolios are moving; geothermal developers such as Fervo, Sage, and Eavor absorb diligence inside proprietary project-development motions; and owner’s engineers still assemble bespoke PDF studies site by site [50][53][65][69][25][40][45][89].
  incumbentThesis:
  - incumbentClass: Asset lifecycle platforms
    point: Platforms like Sitetracker coordinate sites, permits, capital, and handoffs, but they do not underwrite subsurface assumptions, geothermal milestones, or turbine-reuse logic for thermal-site repowers.
    sourceRefs:
    - 65
    - 69
    - 70
  - incumbentClass: Clean-energy origination platforms
    point: Paces is strong at siting, diligence, power, and permitting for new projects, but it is not organized around geothermal retrofit-specific artifacts such as steam-cycle compatibility, queue-preservation paths, or lender-ready repower memos.
    sourceRefs:
    - 50
    - 53
    - 54
  - incumbentClass: Geothermal developers
    point: Fervo, Sage, and Eavor can win project scope directly, yet owners still need a neutral control plane before they commit a site to one technical pathway or vendor stack.
    sourceRefs:
    - 25
    - 40
    - 45
  - incumbentClass: Owner’s engineers and consultants
    point: Consultants can produce one-off feasibility studies, but those studies do not compound into a reusable benchmark on which asset types, reuse assumptions, and capital stacks clear investment committees fastest.
    sourceRefs:
    - 89
    - 93
    - 94
  regulatoryLandscape: The product itself is not a regulated utility asset, but its workflow has to encode geothermal permitting, environmental review, interconnection timing, and tax-credit logic. DOE permitting guidance and BLM process requirements shape development sequencing, CAISO and broader queue reforms shape interconnection strategy, and the Section 48E clean-electricity investment credit can materially change repower economics [80][85][84][86][87].
  technologyLandscape: 'Quaise represents the superhot frontier, but commercial validation today is stronger in adjacent next-generation geothermal pathways: Fervo has non-recourse financing and large-scale supply agreements, Sage positions pressure geothermal as flexible and geographically broad, and Eavor argues for a closed-loop alternative with lower reservoir dependence [4][25][26][28][40][45].'
  distributionChannels:
  - point: Founder-led sales into Western utilities and IPPs with active retirement or retirement-planning portfolios is the fastest path because the relevant asset owners are countable and concentrated.
    sourceRefs:
    - 81
    - 82
  - point: Channel partnerships with owner’s engineers, geothermal developers, and project-finance advisors can pull the software into already-budgeted diligence workstreams.
    sourceRefs:
    - 25
    - 40
    - 45
    - 89
  - point: Buyer-side pull can come from hyperscaler and utility 24/7 procurement programs that force thermal-site owners to re-open brownfield redevelopment options.
    sourceRefs:
    - 33
    - 95
    - 100
    - 102
  partnershipEcosystem:
  - point: Quaise, Fervo, Sage, and Eavor are natural data or workflow partners because they control drilling assumptions, performance milestones, and early commercial templates.
    sourceRefs:
    - 4
    - 25
    - 40
    - 45
  - point: ISO, utility, and specialist interconnection advisors are essential because brownfield value depends on how generator replacement and queue preservation are interpreted in each territory.
    sourceRefs:
    - 84
    - 87
  - point: Lenders and offtakers become downstream users once projects move from feasibility into financing and power marketing, so diligence-room outputs should be designed for them early.
    sourceRefs:
    - 25
    - 95
  dataMoats:
  - point: A benchmark dataset that links EIA plant attributes and retirement timing to geothermal screening outcomes would compound faster than one-off consultant studies.
    sourceRefs:
    - 81
    - 82
    - 89
  - point: Capturing queue, permitting, and financing clock data across projects can produce the first reliable benchmark on which brownfield pathways actually move faster than greenfield ones.
    sourceRefs:
    - 84
    - 87
    - 94
  - point: A library of steam-cycle and balance-of-plant reuse outcomes could become proprietary because public sources mostly discuss reuse conceptually, not as a structured dataset.
    sourceRefs:
    - 15
    - 89
    - 93
  geographicConsiderations:
  - point: The best initial market is the Western U.S., where geothermal development is already concentrated and the thermal-retirement inventory is still meaningful enough to support focused enterprise sales.
    sourceRefs:
    - 75
    - 81
    - 82
  - point: Utah, Nevada, Colorado, New Mexico, and California matter disproportionately because they combine next-generation geothermal activity with identifiable retirement or planned-retirement assets.
    sourceRefs:
    - 25
    - 33
    - 75
    - 82
  - point: Oregon is a strong lighthouse market because Project Obsidian makes the thermal-site repower story concrete, but it is not yet evidence that the workflow generalizes across all retired plants.
    sourceRefs:
    - 2
    - 5
    - 18
  sensitivityCases:
  - case: Project Obsidian slips or superhot drilling milestones stall
    impact: Demand shifts from active investment-committee packages toward lighter-weight portfolio triage and adjacent next-generation geothermal use cases.
    sourceRefs:
    - 4
    - 5
    - 26
  - case: Queue reforms materially shorten generator interconnection timelines
    impact: The brownfield speed advantage narrows, reducing urgency for some owners but not eliminating the need for site-specific repower diligence.
    sourceRefs:
    - 84
    - 87
    - 94
  - case: Hyperscaler and utility 24/7 demand accelerates faster than expected
    impact: Interconnection-ready retired sites become scarcer and more valuable, improving budget justification for standardized redevelopment software.
    sourceRefs:
    - 33
    - 95
    - 100
    - 102
  - case: Steam-turbine and balance-of-plant reuse proves rarer than early narratives suggest
    impact: The product still has value, but economics shift from retrofit optimization toward full brownfield rebuild underwriting.
    sourceRefs:
    - 15
    - 89
    - 93
  validationPlan:
  - priority: high
    question: What fraction of Western retired or planned thermal sites pass a first-pass screen when geology, water, and interconnection constraints are evaluated together?
    evidenceToGather: Run 10-20 live site screens with an owner’s engineer and at least one geothermal developer; record which assumptions break first.
  - priority: high
    question: Will IPPs and municipal utilities buy workflow software before multiple superhot projects reach FID?
    evidenceToGather: Secure at least two paid design partners with active retirements and compare software budget appetite versus consultant budget already approved.
  - priority: medium
    question: How often can generator replacement or brownfield interconnection preservation actually be used for geothermal repowers across WECC territories?
    evidenceToGather: Collect counsel memos and case examples across CAISO, NV Energy, PacifiCorp, PSCo, and municipal utility territories.
  - priority: medium
    question: Can turbine and balance-of-plant reuse be standardized enough to become templates rather than bespoke engineering notes?
    evidenceToGather: Review OEM data and retired-plant one-lines for 5-10 candidate sites and tag which equipment classes are reusable, replaceable, or no-go.
