openQuestions:
- What share of Western retired or planned thermal sites have geology, water access, and subsurface temperature profiles that can support superhot wells instead of only conventional geothermal or a no-go decision?
- How often can interconnection rights actually be preserved or modified for geothermal repowers across CAISO and major Western utility territories without a full queue restart?
- Which classes of steam turbines and balance-of-plant equipment are genuinely reusable under superhot or adjacent next-generation geothermal conditions, versus only conceptually reusable?
- Will buyers fund standalone workflow software before multiple superhot lighthouse projects reach FID, or will they insist on bundling the tool with consultants and developers during the first wave?
