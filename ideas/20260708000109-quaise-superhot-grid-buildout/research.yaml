  adoptionFrictionMatrix:
  - friction: Site-level geothermal uncertainty
    severity: high
    affectedBuyer: IPP or municipal redevelopment lead
    mitigation: Position the product as a faster go/no-go screen and benchmark system, not as a guarantee that any site can be repowered.
    sourceRefs:
    - 5
    - 40
    - 45
  - friction: Interconnection and regulatory variance by territory
    severity: high
    affectedBuyer: Asset-strategy lead and interconnection counsel
    mitigation: Ship territory-specific templates and generator-replacement playbooks starting with CAISO and major Western utility footprints.
    sourceRefs:
    - 84
    - 87
  - friction: Trust gap with lenders and executive committees
    severity: high
    affectedBuyer: SVP Development / Investment Committee sponsor
    mitigation: Design outputs as auditable diligence rooms that mirror the artifacts lenders and offtakers already require.
