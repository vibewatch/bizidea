competitors:
- name: Paces
  stage: scale-up
  wedge: AI-assisted siting, power, permitting, and diligence for power and data-center developers.
  pricing: Custom enterprise contracts; no public pricing.
  strength: Strong at front-end origination and de-risking across multiple clean-energy project types.
  weaknessVsUs: Not built around geothermal retrofit templates, steam-cycle reuse, or lender-ready repower packages for retired thermal assets.
  sourceRefs:
  - 50
  - 53
  - 54
- name: Sitetracker
  stage: incumbent
  wedge: Asset lifecycle management across planning, development, construction, and operations.
  pricing: Custom enterprise contracts; no public pricing.
  strength: Deep enterprise workflow, agreement, reporting, and asset-management coverage once portfolios are in motion.
  weaknessVsUs: Optimized for coordination and execution rather than subsurface screening, geothermal milestone logic, and brownfield repower underwriting.
  sourceRefs:
  - 65
  - 69
  - 70
- name: Fervo Energy
  stage: scale-up
  wedge: Developer-led enhanced geothermal projects with financing, data-center positioning, and utility-scale execution.
  pricing: Project-specific development economics; no public software pricing.
  strength: Strong commercial validation through financing, supply-chain deals, and buyer narrative around clean firm power.
  weaknessVsUs: Asset owners still need a neutral comparison layer before committing a site to one developer or technical pathway.
  sourceRefs:
  - 25
  - 26
  - 33
- name: Sage Geosystems
  stage: scale-up
  wedge: Pressure-geothermal systems positioned for both power generation and storage-like flexibility.
  pricing: Project-specific commercial terms; no public software pricing.
  strength: Compelling pitch around flexible geothermal and broader geography.
  weaknessVsUs: A vendor-specific development path, not a control plane for screening many retired thermal sites across vendors.
  sourceRefs:
  - 40
  - 41
- name: Eavor
  stage: scale-up
  wedge: Closed-loop geothermal designed to reduce reservoir dependence and support 24/7 carbon-free power.
  pricing: Project-specific commercial terms; no public software pricing.
  strength: Strong differentiation on closed-loop design and technical-resources posture.
  weaknessVsUs: Also a generation vendor, so it does not solve the neutral diligence-room and portfolio benchmarking problem for site owners.
  sourceRefs:
  - 45
  - 46
