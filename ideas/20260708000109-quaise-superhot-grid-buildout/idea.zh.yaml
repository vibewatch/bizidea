problem: >-
  坐拥退役火电厂的公用事业公司和独立发电商，手握有价值的并网权、当地许可，有时还有可以复用的蒸汽循环设备，但没有一套可重复的方法来判断超热地热能否经济地为这些场地重新供电。今天，答案分散在地热工程师、业主工程师、并网律师和电子表格财务模型各自手里，协调起来要花上几个月。当负荷增长在加速、队列价值又可能在场地进入投委会之前就蒸发掉时，这种拖延代价高昂。
targetUser:
  primary: 美国西部独立发电商或市政公用事业公司里，负责开发副总裁、资产战略负责人或发电改造牵头人，手上有退役火电厂
  secondary: 为地热改造候选场地做尽调的业主工程师和基础设施投资者
  buyer: 开发高级副总裁、发电改造副总裁或热电资产战略负责人
startupThesis:
  nonObviousInsight: >-
    稀缺资源不再只是获取地热的能力，而是那些已经占有电网接口、许可、水权，也许还有可复用发电设备、又靠近新负荷的退役火电厂场地。Quaise 已签购电协议加改造角度暗示，第一批真正跑出来的赢家，可能是那些能比绿地项目更快把搁置电厂资产组合转化为可融资地热场地的业主——绿地项目还得先闯过并网和尽调关。
  beachhead: >-
    美国西部独立发电商和市政公用事业公司，手上有近期退役的 50-250 MW 火电机组，想通过评估在现有发电场地做超热地热改造来保住并网权
  wedge: >-
    一套热电场地改造尽调 OS，把电厂资产清单、并网权、地下资源假设、汽轮机兼容性检查和融资模板整合成一份可直接交给放款方和购电方的改造方案包
  whyNowCatalyst: >-
    Quaise 的融资、已签下的 50 MW 超大规模云服务商购电协议，加上明确围绕电网瓶颈和化石燃料场地改造潜力做的宣传，让热电场地改造在这些稀缺场地被瓜分之前变得紧迫起来。
  ventureScalePath: >-
    先做超热地热改造决策的控制平面，再向公用事业公司、独立发电商及相邻的稳定清洁能源改造品类扩展，覆盖退役热电资产的组合改造、融资和供应商协调。
solution: >-
  产品把场地单线图、汽轮机规格、并网协议、土地和水资源限制、附近负荷数据以及地热资源假设，都汇入同一个改造工作空间。它为改造候选场地生成去留评分，标出哪些设备可能可以复用、哪些需要更换，并为高管、放款方和购电方搭建一个共享尽调室。随着项目推进，它跟踪钻探里程碑、EPC 依赖项和融资条件，让场地业主清楚知道改造设想是在增强还是在瓦解。假以时日，这个平台会成为基准数据集，记录哪些退役热电场地能以怎样的资本结构最快通过超热地热开发审核。
goToMarketSeed:
  firstCustomer: >-
    美国西部一家独立发电商，过去 36 个月内退役了一座 100-300 MW 的燃气调峰机组或燃煤机组，仍掌握并网协议，正在评估超热地热能否让该场地继续为公用事业公司或数据中心买家服务
  buyingTrigger: >-
    电厂退役决定、并网续约期限，或公用事业公司/AI 园区开发商发来的全天候电力询价，都会催生紧迫感，促使业主证明该场地比绿地方案更快通向稳定清洁电力
  currentAlternative: >-
    业主工程师研究、地热顾问、并网律师，以及定制的 Excel 项目融资模型
  switchingReason: >-
    产品把一次六个月的定制研究变成标准化的去留方案包，既保住队列价值，又让技术和商务团队对齐，还能让高管更早去找放款方和购电方谈
  pricingHypothesis: >-
    按改造组合收取年度订阅费，再对投委会方案包和放款方/购电方尽调室按场地收取额外费用
whyNow:
  - point: 已签下的 50 MW 超大规模云服务商买家，让搁浅热电场地的业主现在就能为改造尽调找到理由，不必等通用地热需求成熟。
    signalRefs: ["超大规模云服务商的购电协议赶在首次发电之前落地"]
    sourceRefs: [2]
  - point: 太平洋西北地区需求上升叠加输电受限，让已有并网接口的场地比单纯的地热用地更值钱。
    signalRefs: ["输电受限的电网更看重本地稳定发电"]
    sourceRefs: [1]
  - point: B 轮资本加上计划中的项目债权，意味着投委会很快会要求标准化的尽调方案包，而不是空谈气候愿景。
    signalRefs: ["超热地热正从研发阶段迈入项目融资阶段"]
    sourceRefs: [1, 3]
  - point: 改造角度催生出一类新的稀缺库存——可能复用资产的退役热电场地，一旦早期项目验证成功，各团队都会抢着锁定这类场地。
    signalRefs: ["退役火电厂场地可能成为最快的部署路径"]
    sourceRefs: [3]
  - point: 钻探进度已经推进到这样一个地步：具体场地和资本结构的择时决策现在就有意义，而不是留给一个假想的研发之后的未来。
    signalRefs: ["深层钻探的执行进度是关键技术里程碑"]
    sourceRefs: [1, 2]
differentiator: >-
  通用项目开发软件只会跟踪任务，地热工程工具只会建模井孔，但没有一个能把电厂资产清单、地下可行性、并网期限、放款方/购电方材料串到一个工作流里。业主工程师能出一份研究报告，可每份报告都是一次性的 PDF，攒不成一个可沉淀的组合基准。这家公司要赢，靠的是把改造评估变成一个可复用的数据集——数据能说清楚哪些场地类型、设备状况和融资结构真正能最快通过投委会。
