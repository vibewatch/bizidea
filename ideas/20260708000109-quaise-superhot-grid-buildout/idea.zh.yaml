jobsToBeDone:
  - job: 一座热电厂退役后，帮改造牵头人判断超热地热能否保住这块场地的电网价值，让他们只把值得推上投委会的场地继续往前推进。
    currentAlternative: 顾问主导的可行性研究，以及绿地方案和改造方案之间的电子表格比较
    successMetric: 从场地纳入到去留备忘录获批之间的周数
  - job: 一处有前景的场地进入融资或购电谈判时，帮项目团队把技术、商务和并网证据打包好，缩短放款方和买家的尽调周期。
    currentAlternative: 一次性的业主工程师备忘录、邮件往来，以及定制的项目融资模型
    successMetric: term sheet 或投资获批前尽调周期的缩短幅度
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这组信号把大额融资、具名项目、已签下的早期需求、电网瓶颈表述和具体的改造角度结合在一起，三条信源都能相互印证。
  painIntensity:
    score: 5
    rationale: 丢掉一处并网就绪的热电场地，或者改造范围判断失误，都可能困住多年的队列价值，在供给受限的市场里拖慢稀缺的稳定电力。
  wedgeClarity:
    score: 5
    rationale: 热电场地筛选和改造尽调是一个边界清晰的工作流，触发条件明确，预算负责人具名，要替代的材料也很清楚。
  defensibility:
    score: 4
    rationale: 护城河来自一个不断沉淀的基准数据集——场地复用、尽调结果、融资就绪度，不过早期客户可能仍然依赖顾问。
  ventureScale:
    score: 4
    rationale: 滩头市场集中，但全球范围的退役电厂组合和相邻的稳定清洁能源改造品类，为做成一家大型基础设施软件公司打开了路径。
topRisks:
  - name: 改造物理条件的不确定性
    description: 很多退役电厂在地质条件、蒸汽参数或可复用设备上都不具备超热地热所需的条件。
    mitigation: 先做筛选和尽调，而不是承诺一定能改造成功，并用早期合作伙伴的组合数据搭建去留基准。
  - name: 市场时机风险
    description: Obsidian 项目或同类超热地热电厂可能延期，拖慢主流客户的预算安排。
    mitigation: 卖给正在评估多个场地的资产业主，把工作流设计成也能支持传统地热和其他稳定清洁热电改造，以防超热地热的时间线后移。
  - name: 服务蔓延
    description: 客户可能会要求定制工程研究，在软件可重复性显现之前，把公司拖成一家咨询公司。
    mitigation: 把审批工作流、尽调室和基准库产品化，与业主工程师建立合作而不是取代他们。
