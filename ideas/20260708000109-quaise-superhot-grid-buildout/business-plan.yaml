slug: thermal-site-repower-os
date: "2026-07-08"
executiveSummary: >-
  Retired thermal plants in the Western U.S. hold interconnection rights, water
  access, permits, and industrial land, but owners currently rely on slow
  consultant-led studies to decide whether a brownfield geothermal repower can
  preserve that value before deadlines expire. We start with Western U.S. IPPs
  and municipal utilities that retired or will retire 50-250 MW thermal units
  because they are countable buyers with hard triggers: plant retirements,
  interconnection-renewal clocks, and 24/7 clean-power RFPs. The MVP is not
  project-management software; it is a repower diligence OS that turns
  one-lines, equipment inventories, subsurface assumptions, and queue rules
  into an investment-committee go/no-go packet and auditable diligence room.
  Research shows no direct software incumbent owns this workflow; adjacent
  tools such as Paces and Sitetracker cover origination or lifecycle
  management, while owner's engineers still deliver one-off PDFs. Bottom-up
  sizing suggests a credible but narrow Western SAM of roughly $13.4M and a
  year-3 SOM of roughly $1.9M, so the investment case depends on using this
  wedge to expand into broader brownfield firm-clean redevelopment rather than
  staying superhot-only. The first proof point is two paid design partners and
  10-20 live site screens that cut decision time from consultant-style
  six-month cycles to eight weeks or less. The research could not quantify how
  often steam turbines or balance-of-plant equipment are truly reusable, so the
  plan explicitly sells faster go/no-go decisions rather than retrofit
  guarantees. Because those risks remain unresolved and the near-term market is
  concentrated, this looks like a pre-seed Watch rather than a partner-meeting
  quality investment today.
problem:
  - Retired thermal-site owners lose time and queue value while asset strategy, geothermal engineering, interconnection counsel, and project finance teams reconcile separate studies and spreadsheets.
  - Buyers have no repeatable way to determine which brownfield sites deserve deeper superhot geothermal diligence versus immediate rejection before retirement or procurement deadlines pass.
solution:
  - Ingest plant one-lines, equipment inventories, interconnection documents, land and water constraints, and geothermal assumptions into a single brownfield repower workspace.
  - Produce a structured go/no-go packet, reuse flags, blocking issues, and a shared diligence room that stays useful as a site moves from internal screening into lender and offtaker review.
whyWeWin:
  - No named software incumbent connects plant asset inventory, subsurface assumptions, queue strategy, and lender-ready diligence artifacts in one brownfield geothermal workflow.
  - The defensible asset is a benchmark dataset on which site types, equipment conditions, and territory-specific regulatory paths actually clear investment committees fastest, not just another task tracker.
strategicChoices:
  beachhead: >-
    Western U.S. independent power producers and municipal utilities with one
    to five retired or planned-to-retire 50-250 MW thermal units, live
    interconnection rights, and an immediate need to decide whether a
    brownfield geothermal repower deserves investment-committee attention.
  wedgeRationale: >-
    This segment has countable buyers, hard clocks, and already-approved
    consultant spend, so a narrow site-intake-to-go/no-go-packet product can
    prove value in one portfolio cycle; going after all geothermal development
    or generic brownfield software would force the company to compete against
    existing workflow tools before it has differentiated data.
  sequencingRationale: >-
    The company should first encode site screening, asset-reuse assumptions,
    and territory-specific queue logic into an auditable diligence room because
    that is where the pain is acute and the buyer already exists; only after
    two or three paid design partners validate the workflow should it invest in
    benchmark analytics, lender and offtaker modules, and broader
    next-generation geothermal or brownfield repower coverage. Hiring follows
    the same order: domain-heavy product and implementation roles before a
    scaled sales team, because early credibility depends more on correct
    technical and regulatory templates than on top-of-funnel volume.
  notYet:
    - Greenfield geothermal siting and land acquisition workflows outside brownfield thermal conversions
    - Full EPC, owner's-engineer, or project-management services that turn the company into a consultancy
    - Direct procurement marketplaces for hyperscalers or utilities before the platform owns the owner-side diligence workflow
market:
  tam: "$69.8M (research estimate: 147 U.S. owner organizations at ~$300k portfolio value plus 206 retired or planned sites at ~$125k active-site diligence value)"
  sam: "$13.4M (research estimate: 28 Western U.S. owners and 40 retired or planned Western sites that fit the initial thermal-site repower wedge)"
  som: "$1.9M (research estimate: year-3 reachable share of 4 Western owner accounts and 6 active sites under management)"
  segments:
    - Western U.S. IPPs redeveloping retired or soon-to-retire coal and gas plants
    - Municipal utilities and infrastructure investors underwriting brownfield next-generation geothermal conversions
  buyingProcess: >-
    The redevelopment lead or owner's engineer usually raises the project when
    a retirement decision, interconnection-renewal deadline, or 24/7 clean
    power inquiry forces a site review, but budget is approved by the SVP or
    VP responsible for thermal-asset strategy after engineering,
    interconnection counsel, and finance agree the site deserves a formal
    screen. The first deal closes fastest when it replaces consultant study
    spend on a live site rather than asking the customer to create a new
    exploratory software budget.
product:
  mvp: >-
    A brownfield geothermal diligence workspace that ingests plant one-lines,
    equipment inventories, interconnection documents, water and land
    constraints, and vendor subsurface assumptions, then outputs a structured
    go/no-go memo with reuse flags, blocking issues, and a decision log for one
    customer portfolio. No construction management, no generic project CRM, and
    no promise that a site is viable without partner engineering review.
  sixMonth: >-
    Add territory-specific generator-replacement and queue-preservation
    templates for the first Western footprints, versioned assumption tracking,
    and partner-facing workflows so owner's engineers and geothermal developers
    can contribute evidence without turning the product into email and PDF
    chaos.
  twelveMonth: >-
    Ship lender and offtaker diligence rooms, benchmark views across screened
    sites, and reusable equipment-class templates that show which turbine and
    balance-of-plant configurations have historically advanced, failed, or
    required full replacement.
  twentyFourMonth: >-
    Expand from superhot-only screening into a broader brownfield firm-clean
    redevelopment control plane covering adjacent next-generation geothermal
    pathways and full-rebuild scenarios in additional Western and Mountain West
    territories, while keeping brownfield thermal conversions as the core
    wedge.
  keyBets:
    - Customers will share sensitive plant and interconnection documents early enough for the platform to replace the first tranche of consultant work.
    - Territory-specific interconnection and permitting logic can be templatized for enough Western footprints that each new customer does not require a bespoke legal workflow.
    - Lenders, offtakers, and executive committees will treat a structured digital diligence room as more useful than a one-off owner's-engineer PDF.
gtm:
  wedge: >-
    Land as the fastest way to turn one retired thermal site from an
    interesting brownfield story into an investment-committee-grade decision
    packet, then expand within the same account as more sites enter active
    diligence and external lenders or buyers need the same evidence room.
  channels:
    - Founder-led account-based sales into Western IPP and municipal utility asset-strategy teams with active retirements or redevelopment mandates
    - Referral and implementation partnerships with owner's engineers, interconnection counsel, and next-generation geothermal developers already paid to evaluate the same sites
    - Targeted outreach tied to utility and hyperscaler 24/7 power solicitations that reopen brownfield firm-power options near load
  funnelTargets: "named target account→qualified diligence program 35-45%; qualified program→paid pilot 40%+; pilot→annual portfolio subscription 60%+ once one site reaches investment-committee review"
  pricing: >-
    Charge a $250k-$350k annual portfolio subscription for one owner's active
    redevelopment book, plus $100k-$125k per site advanced into a formal
    investment-committee or lender and offtaker diligence room; this matches
    the researched six-figure willingness-to-pay envelope and anchors the pitch
    to avoided consultant spend and preserved interconnection value, not
    generic workflow seats.
businessModel:
  revenueStreams:
    - Annual portfolio subscription for active brownfield redevelopment programs
    - Per-site diligence-room and investment-committee package fees
    - Premium benchmarking, lender reporting, and buyer-facing diligence modules
  unitOfValue: "Per active redevelopment portfolio, with incremental charges for each site advanced into formal diligence"
  targetGrossMarginPct: 72
  expansionLevers:
    - Add more candidate sites and business units inside an existing utility or IPP portfolio
    - Upsell lender and offtaker diligence-room access once a screened site attracts outside capital or a buyer
    - Expand from superhot geothermal screening into adjacent next-generation geothermal and brownfield firm-clean redevelopment workflows
strategyMap:
  northStarMetric: "Median days from site intake to investment-committee-ready go or no-go decision"
  inputMetrics:
    - Number of paid design-partner portfolios with live site data loaded
    - Percentage of screened sites delivered with a territory-specific interconnection path and documented blocking issues
    - Time from site intake to first executive review compared with the customer's prior consultant-led process
    - Pilot-to-annual conversion rate once a first site advances into lender or buyer diligence
  moatsToBuild:
    - Outcome dataset linking plant attributes, geology assumptions, territory rules, and capital-structure choices to actual advancement or rejection outcomes
    - Reuse library showing which equipment classes and brownfield conditions tend to survive due diligence versus force full rebuilds
    - Trusted diligence-room outputs already consumed by owner's engineers, lenders, and offtakers, making the workflow sticky beyond the initial site screen
  killCriteria:
    - Fewer than 2 of the first 6 target owner accounts convert to paid pilots within 12 months, indicating the buyer will not fund standalone workflow software at this stage
    - The first 10-20 live site screens fail to show either a materially faster decision cycle or a reusable screening template, implying the product is just packaging consultant work
    - Territory-specific queue and generator-replacement logic still requires bespoke legal analysis for most deals after the first 3 footprints, breaking the software repeatability thesis
  mermaid: |
    flowchart LR
      Wedge[Western retired thermal site diligence wedge] --> MVP[Repower OS MVP]
      MVP --> Proof[Paid pilots and faster go or no-go packets]
      Proof --> Expansion[Benchmark data and broader brownfield expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Interesting wedge with real buyer timing, but conviction stays limited until paid pilots prove that brownfield owners will buy software before superhot geothermal is fully banked."
    whyBelieve: "The research shows a concrete trigger set, no direct software incumbent, and a real data moat if the company becomes the system of record for brownfield repower decisions."
    whyDoubt: "The Western beachhead is narrow, site-level technical pass rates are unknown, and buyers may postpone budgets until more next-generation geothermal projects reach FID."
    nextDiligence: "Win two paid Western design partners and run 10-20 live site screens that measure cycle-time reduction, pass-rate distribution, and conversion into external diligence."
  firstCustomer:
    title: "Western U.S. IPP redevelopment lead with a recently retired 100-300 MW thermal unit"
    profile: "A portfolio owner with one to three recently retired coal or gas sites, live interconnection agreements, and a mandate to test whether brownfield repower can satisfy a utility or data-center firm-power opportunity faster than greenfield development."
    trigger: "A retirement decision, interconnection-renewal deadline, or inbound 24/7 clean-power request creates a board-level need to decide whether the site should be preserved, repowered, or abandoned."
    buyer: "SVP Development, VP Generation Redevelopment, or Head of Thermal Asset Strategy"
    initialContract: "A $75k-$125k pilot covering one or two sites over 8-12 weeks, credited toward a $250k-$350k annual portfolio subscription if the customer adopts the platform for recurring screening and external diligence."
  mustBeTrue:
    - At least two Western IPPs or municipal utilities will pay for a pilot before multiple superhot geothermal plants reach final investment decision.
    - The first 10-20 live screens produce a reusable decision template and enough viable or conditionally viable sites to justify portfolio-level subscriptions.
    - Generator-replacement or brownfield queue-preservation paths can be standardized across at least three initial Western territories.
    - Owner's engineers and geothermal developers prefer to plug into a neutral diligence room instead of forcing the customer into vendor-specific or PDF-only workflows.
    - A pilot can cut time to an investment-committee-grade decision from roughly months to eight weeks or less and still convert into a $250k+ annual contract.
  diligenceQuestions:
    - Which named Western owners have live retirement or renewal deadlines in the next 12 months, and who inside those accounts controls the budget?
    - What percentage of the first screened sites pass geology, water, and interconnection filters strongly enough to justify deeper diligence?
    - How much of the workflow can truly be templatized by territory before legal and engineering customization overwhelms software margins?
    - Will the first customer buy from a standalone software vendor, or only if the tool is bundled through an owner's engineer or developer?
    - What prevents Paces, Sitetracker, or a geothermal developer from adding a lighter-weight version of this workflow once the category is proven?
    - How often do turbine and balance-of-plant reuse assumptions survive detailed engineering, versus collapsing into full brownfield rebuild economics?
operatingAssumptions:
  - assumption: "Target owners will fund paid pilots before the market has multiple superhot geothermal plants at FID."
    basis: research.yaml
    validationTest: "Close at least 2 paid design partners from the first 6 named target accounts within 12 months of fundraising."
    decisionImpact: "If pilots do not close pre-FID, the wedge must shift toward broader next-generation geothermal or brownfield redevelopment workflows rather than superhot-first positioning."
  - assumption: "A customer's first site screen can be completed with standardized product workflows rather than an open-ended consulting engagement."
    basis: idea.yaml
    validationTest: "Run the first 5 customer sites end to end and measure whether each can produce a decision packet within 8 weeks and fewer than 80 hours of internal implementation time."
    decisionImpact: "If onboarding remains bespoke, the company must narrow the input surface, raise pricing materially, or accept a services-heavy model with lower venture attractiveness."
  - assumption: "Interconnection and generator-replacement rules are templateable across enough Western territories to support product reuse."
    basis: research.yaml
    validationTest: "Obtain counsel-backed playbooks for CAISO, NV Energy, PacifiCorp, and PSCo footprints and use them successfully on at least 3 live site screens."
    decisionImpact: "If territory variance stays too high, the company should narrow to one or two jurisdictions or reposition as partner-enabled workflow software rather than a repeatable platform."
  - assumption: "Owner's engineers will partner with the software instead of displacing it with their own studies."
    basis: operator judgment
    validationTest: "Secure 2 referral or implementation partnerships and track whether partner-led deals convert faster than direct deals without margin collapse."
    decisionImpact: "If partners treat the product as replaceable, the company must build more in-house domain expertise or target buyers who want an independent control plane."
  - assumption: "The researched six-figure pricing envelope is acceptable because the product replaces consultant effort and preserves queue value."
    basis: research.yaml
    validationTest: "Present $75k-$125k pilot proposals and $250k-$350k annual expansion proposals to 5 qualified accounts and record close rate and procurement objections."
    decisionImpact: "If buyers anchor below roughly $150k annual value, the modeled SAM and gross-margin targets no longer support a venture software outcome without broader product scope."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Build a named-account pipeline of 10 Western owners and collect retirement dates, interconnection deadlines, current consultant process, and budget owner for each."
    hypothesis: "The market contains enough time-sensitive accounts that founder-led sales can convert discovery into paid pilots without broad brand spend."
    successMetric: "At least 6 of 10 accounts have a live retirement, renewal, or procurement trigger inside 12 months and agree to a scoped workflow review."
    owner: "Founder / CEO"
  - horizon: "0-90 days"
    experiment: "Create territory playbooks with counsel and owner's-engineer partners for CAISO, NV Energy, and PacifiCorp-style brownfield geothermal evaluations."
    hypothesis: "The first three territories cover enough early deals that regulatory variance will not kill repeatability."
    successMetric: "Three counsel-reviewed templates used in at least one customer screening conversation each."
    owner: "Power-market and interconnection lead"
  - horizon: "3-6 months"
    experiment: "Run 10-20 live site screens with one owner's engineer and at least one geothermal developer feeding assumptions through the product."
    hypothesis: "The product can deliver a faster go or no-go packet than consultant-led studies while capturing reusable benchmark fields."
    successMetric: "Median time from data intake to decision packet under 8 weeks and at least 80% of screens using the same core template structure."
    owner: "Founding eng"
  - horizon: "3-6 months"
    experiment: "Close the first paid pilot on one or two live brownfield sites and compare it with the customer's prior consultant workflow."
    hypothesis: "A redevelopment lead will pay pre-FID for speed, coordination, and decision quality rather than waiting for generic geothermal maturity."
    successMetric: "One paid pilot signed at $75k+ and documented cycle-time improvement versus the customer's prior process."
    owner: "Founder / CEO"
  - horizon: "6-9 months"
    experiment: "Launch a lender and offtaker diligence room on the first advancing site and track who actually uses the outputs."
    hypothesis: "External stakeholders beyond the redevelopment team create expansion revenue and stickiness once a site moves forward."
    successMetric: "At least 3 external participants such as a lender, buyer, counsel, or engineer use the diligence room and the customer authorizes annual expansion pricing."
    owner: "Implementation and customer success lead"
  - horizon: "9-15 months"
    experiment: "Ship cross-site benchmark reporting and use it to expand one account from a pilot site to a multi-site portfolio contract."
    hypothesis: "Benchmark data, not just workflow coordination, is the reason the product expands inside the first customer."
    successMetric: "One customer expands to 3 or more active sites or multiple business units and cites benchmark visibility as a purchase reason."
    owner: "Data / benchmarking engineer"
operations:
  - Maintain a standardized site-intake checklist covering one-lines, turbine records, interconnection documents, water rights, land constraints, and vendor subsurface inputs before any screen begins.
  - Run each live site through a versioned assumption register so customers can see which geology, reuse, or regulatory assumptions changed between first screen and investment-committee decision.
  - Formalize partner handoffs with owner's engineers, interconnection counsel, and geothermal developers so bespoke analysis happens outside the product while the platform remains the shared control plane.
  - Treat the diligence room as an auditable record with customer-specific access controls because plant records, queue documents, and buyer negotiations are commercially sensitive.
  - Review blocked deals monthly to determine whether the failure came from market timing, site physics, regulatory path, or product scope, and feed that taxonomy into the benchmark dataset.
team:
  - role: "Founder / CEO"
    startTiming: "Month 0"
    rationale: "The first 10-15 accounts are countable and relationship driven, so founder-led sales and partnership building are more important than hiring a broad enterprise sales team."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "The product needs a rigorous data model for plant assets, interconnection documents, and decision-state workflows before it needs polished enterprise UI."
  - role: "Power-market and interconnection lead"
    startTiming: "Month 1"
    rationale: "Credibility depends on encoding generator-replacement paths, permitting sequences, and diligence templates correctly in the first territories."
  - role: "Implementation and customer success lead"
    startTiming: "Month 4"
    rationale: "Early customers will share messy plant data and expect white-glove onboarding; this role keeps that work standardized enough to avoid services creep."
  - role: "Data / benchmarking engineer"
    startTiming: "Month 9"
    rationale: "Once live screens are running, the company needs a dedicated owner for the benchmark dataset that turns project work into a defensible product moat."
  - role: "Account executive"
    startTiming: "Month 12"
    rationale: "Do not add a dedicated seller until at least two reference customers and a repeatable pilot-to-annual conversion story exist."
milestones:
  - horizon: "0-12 months"
    items:
      - "Sign 2 paid Western design partners and complete 10-20 live site screens"
      - "Deliver three territory-specific queue and generator-replacement playbooks"
      - "Produce the first investment-committee-ready go or no-go packet from within the product"
      - "Launch one external diligence room used by a lender, buyer, or partner engineer"
  - horizon: "12-24 months"
    items:
      - "Convert 2-3 pilot accounts into annual portfolio subscriptions"
      - "Manage 4-5 live sites across at least three Western territories"
      - "Release benchmark reporting on site pass rates, equipment-reuse outcomes, and cycle-time performance"
      - "Prove one partner-led implementation model that preserves software margins"
  - horizon: "24-36 months"
    items:
      - "Reach 4 Western owner accounts and roughly 6 active sites under management, matching the researched year-3 SOM case"
      - "Expand the product from superhot-first screening into broader next-generation geothermal and brownfield full-rebuild workflows"
      - "Establish the platform as a repeat diligence system for lenders and offtakers, not only internal redevelopment teams"
      - "Demonstrate that benchmark data, not implementation labor, is the primary reason accounts expand"
risks:
  - risk: "Superhot geothermal commercialization slips or first lighthouse projects disappoint, delaying software budgets."
    likelihood: High
    impact: High
    mitigation: "Anchor the workflow to brownfield redevelopment decisions and be ready to support adjacent next-generation geothermal and full-rebuild scenarios if superhot timing moves right."
  - risk: "Too few retired thermal sites pass geology, water, and interconnection filters to justify recurring portfolio subscriptions."
    likelihood: Medium
    impact: High
    mitigation: "Measure pass-rate distribution across the first 10-20 screens quickly and reposition toward broader brownfield firm-clean redevelopment if viable inventory is too sparse."
  - risk: "Territory-specific interconnection and permitting variance makes each deployment too custom to scale."
    likelihood: Medium
    impact: High
    mitigation: "Start in a small set of Western footprints, productize playbooks with counsel, and refuse custom territory expansion until repeatability is proven."
  - risk: "Customers push bespoke engineering work into the startup, eroding software margins and slowing productization."
    likelihood: High
    impact: Medium
    mitigation: "Keep engineering studies partner-led, use fixed-scope onboarding, and measure internal hours per site as a board-level constraint."
  - risk: "Adjacent incumbents or geothermal developers add enough workflow features to collapse differentiation before the data moat forms."
    likelihood: Medium
    impact: Medium
    mitigation: "Move quickly to capture cross-project benchmark fields and lender and offtaker usage data that generic project tools and vendor-specific developers cannot easily assemble."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months to win 2-3 paid design partners, build the first territory-specific diligence templates, complete 10-20 live site screens, stand up a lender and offtaker diligence room, and prove the benchmark-data moat needed for a seed round."
