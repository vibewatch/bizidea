fundingAsk:
  round: pre-seed
  amountM: 3.0
  runwayMonths: 30
  milestone: Land 4 Western owner accounts, reach 5 active diligence-room sites, release benchmark reporting, and prove one partner-led implementation motion before the seed raise.
  useOfFunds:
  - bucket: Engineering
    amountUsd: 1260000
    percentage: 42
  - bucket: GTM
    amountUsd: 900000
