    amountUsd: 300000
    percentage: 10
scenarios:
  downside:
    description: Pilot-to-annual conversion slips, the fourth account lands in Q4Y3 instead of Q2Y3, and only 4 active sites reach recurring diligence-room status.
    y3RevenueK: 1335.0
    y3EbitdaK: -661.0
    cashLowPointK: 205.0
    keyAssumptionChanges:
    - Pilot-to-annual conversion lands closer to 40% than the BP target of 60%+ once a site reaches external diligence.
    - Active-site density ends near 1.0 per account instead of the 1.5 implied by the base SOM case.
    - Gross margin stalls around 66% because partner handoffs are less reusable than A12 assumes.
  base:
    description: Two paid design partners convert, a third owner signs in H2Y2, and a fourth enters by Q2Y3 so the company exits Y3 at 4 owner accounts and 6 active sites.
    y3RevenueK: 1754.7
    y3EbitdaK: -338.6
    cashLowPointK: 717.0
    keyAssumptionChanges:
    - Pilot-to-annual conversion stays near the BP target of 60%+ once one site reaches investment-committee review.
    - Active-site density reaches the researched 6-site Y3 SOM case without adding full-time headcount beyond the BP team plan.
    - Gross margin reaches the 72% business-model target by late Y3 as territory templates and diligence rooms become repeatable.
  upside:
    description: A third and fourth owner each land one quarter faster, benchmark reporting supports a seventh active site, and pricing reaches the top half of the BP range without extra FTE.
    y3RevenueK: 2050.0
    y3EbitdaK: -118.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - The fourth account enters by Q1Y3 and converts cleanly because early reference sites are strong.
    - Average active-site density reaches roughly 1.75 per account by Y3 exit through account expansion rather than logo count alone.
    - Gross margin reaches 73%-74% one quarter earlier as partner-enabled implementation absorbs more bespoke work.
