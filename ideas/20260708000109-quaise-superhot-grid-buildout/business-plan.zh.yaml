slug: thermal-site-repower-os
date: "2026-07-08"
executiveSummary: >-
  美国西部的退役火电厂手握并网权、水权、许可和工业用地，但业主眼下只能靠缓慢的顾问主导研究，来判断棕地地热改造能否在期限到期前保住这些价值。我们从退役或即将退役 50-250 MW 火电机组的美国西部独立发电商和市政公用事业公司切入，因为这批买家数得清、触发条件硬：电厂退役、并网续约倒计时、全天候清洁电力询价。MVP 不是项目管理软件，而是一套改造尽调 OS——把单线图、设备清单、地下假设和队列规则，直接转成投委会可用的去留方案包和可审计的尽调室。研究显示没有任何软件厂商直接垄断这个工作流；Paces 和 Sitetracker 这类相邻工具覆盖的是项目起源或全生命周期管理，业主工程师给出的仍是一次性 PDF。自下而上测算显示，西部 SAM 约为 1340 万美元，规模可信但偏窄，第 3 年 SOM 约为 190 万美元，所以投资逻辑的关键在于，能否借这个切口扩展到更广的棕地稳定清洁能源改造，而不是只守着超热地热这一块。第一个验证点是拿下两个付费共创客户，跑通 10-20 个在线场地筛查，把决策周期从顾问式的六个月缩短到八周以内。研究没能量化蒸汽轮机或厂用设备到底有多大比例真能复用，所以计划明确卖的是更快的去留决策，而不是改造保证。正因为这些风险尚未解决、近期市场又相对集中，这更像是一个 pre-seed 阶段的 Watch，而不是今天就值得进入合伙人会议的投资标的。
problem:
  - "退役热电场地的业主，在资产战略、地热工程、并网律师和项目财务团队各自核对研究报告和电子表格的过程中，白白损失时间和队列价值。"
  - "买家没有可重复的方法来判断，在退役或采购期限到来之前，哪些棕地场地值得深入做超热地热尽调，哪些该直接拒绝。"
solution:
  - 把电厂单线图、设备清单、并网文件、土地和水资源限制、地热假设都汇入同一个棕地改造工作空间。
  - 产出结构化的去留方案包、复用标记、卡点问题，以及一个共享尽调室——场地从内部筛查推进到放款方和购电方评审时，这个尽调室依然管用。
whyWeWin:
  - 没有任何具名的软件厂商能把电厂资产清单、地下假设、队列策略和放款方级尽调材料串到同一个棕地地热工作流里。
  - 真正的护城河是一个基准数据集——记录哪些场地类型、设备状况、特定辖区的监管路径实际上能最快通过投委会，而不只是又一个任务跟踪器。
strategicChoices:
  beachhead: >-
    美国西部独立发电商和市政公用事业公司，手上有一到五座已退役或计划退役的 50-250 MW 火电机组，并网权仍然有效，急需判断棕地地热改造是否值得投委会关注。
  wedgeRationale: >-
    这个细分市场买家数得清、时限硬、顾问预算早就批过了，所以一款专注"场地纳入到去留方案包"的窄产品能在一个组合周期内证明价值；如果一上来就做全地热开发或通用棕地软件，公司在还没形成差异化数据之前就得先跟现有工作流工具正面竞争。
  sequencingRationale: >-
    公司应该先把场地筛查、设备复用假设和特定辖区的队列逻辑，编码进一个可审计的尽调室，因为这里痛点最重、买家也已经存在；只有等两三个付费共创客户验证了这套工作流之后，才该投入基准分析、放款方/购电方模块，以及更广的下一代地热或棕地改造覆盖面。招聘顺序也一样：先招领域重的产品和实施角色，再招规模化销售团队，因为早期的可信度更多取决于技术和监管模板对不对，而不是漏斗顶端的量有多大。
  notYet:
    - 棕地热电改造之外的绿地地热选址和土地收购工作流
    - 把公司变成咨询公司的全套 EPC、业主工程师或项目管理服务
    - 平台还没拿下业主侧尽调工作流之前，就上马面向超大规模云服务商或公用事业公司的直采市场
market:
  tam: "6980 万美元（研究估算：147 家美国业主机构，按约 30 万美元/组合估值，加上 206 座已退役或计划退役场地，按约 12.5 万美元/在线场地尽调价值）"
  sam: "1340 万美元（研究估算：28 家美国西部业主和 40 座符合初期热电场地改造切口的西部退役或计划退役场地）"
  som: "190 万美元（研究估算：第 3 年可触达份额，对应 4 个西部业主账户和 6 个在管在线场地）"
  segments:
    - 正在改造退役或即将退役煤电、燃气电厂的美国西部独立发电商
    - 为棕地下一代地热改造做尽调的市政公用事业公司和基础设施投资者
  buyingProcess: >-
    通常是改造牵头人或业主工程师在退役决定、并网续约期限或全天候清洁电力询价逼出场地评审时提出项目立项，但预算要等工程、并网律师、财务都认定该场地值得正式筛查后，由分管热电资产战略的高级副总裁或副总裁批准。第一笔交易最快的成交路径，是替代一个在线场地上已有的顾问研究支出，而不是让客户新开一笔探索性的软件预算。
product:
  mvp: >-
    一个棕地地热尽调工作空间，接入电厂单线图、设备清单、并网文件、水土限制和供应商的地下假设，为单个客户组合输出结构化的去留备忘录、复用标记、卡点问题和决策日志。不做施工管理，不做通用项目 CRM，也不承诺场地一定可行——必须经过合作伙伴工程审核。
  sixMonth: >-
    为西部首批落地区域新增特定辖区的替代发电机与队列保留模板、带版本记录的假设追踪，以及面向合作伙伴的工作流，让业主工程师和地热开发商能贡献证据，而不是把产品变成邮件加 PDF 的一团乱麻。
  twelveMonth: >-
    上线放款方和购电方尽调室、跨场地基准视图，以及可复用的设备类别模板，展示哪些汽轮机和厂用设备配置历史上顺利推进、失败，或必须全部更换。
  twentyFourMonth: >-
    从超热地热专属筛查扩展为更广的棕地稳定清洁能源改造控制平面，覆盖相邻的下一代地热路径和全部重建场景，拓展到更多西部和山地西部辖区，同时保持棕地热电改造作为核心切口。
  keyBets:
    - 客户会足够早地分享敏感的电厂和并网文件，让平台能替代第一批顾问工作。
    - 特定辖区的并网和许可逻辑可以模板化到足够多的西部辖区，让每个新客户都不需要一套定制法务工作流。
    - 放款方、购电方和高管委员会会认为一个结构化的数字尽调室比一次性的业主工程师 PDF 更有用。
gtm:
  wedge: >-
    先拿下一座退役热电场地，把它从一个有意思的棕地故事变成一份投委会级的决策方案包——这是最快的切入方式，然后随着更多场地进入在线尽调、外部放款方或买家需要同一份证据室，在同一账户内继续扩张。
  channels:
    - 创始人主导的客户经理式销售，切入有活跃退役或改造任务的西部独立发电商和市政公用事业资产战略团队
    - 与业主工程师、并网律师、下一代地热开发商建立推荐和实施合作关系——他们本就受雇评估同一批场地
    - 围绕公用事业公司和超大规模云服务商全天候电力招标做定向拓展，这类招标会重新打开靠近负荷的棕地稳定电力选项
  funnelTargets: "具名目标账户→合格尽调项目 35%-45%；合格项目→付费试点 40%+；试点→年度组合订阅 60%+（一旦有场地进入投委会评审）"
  pricing: >-
    对业主一份活跃改造账本收取 25 万-35 万美元的年度组合订阅费，另外每有一个场地进入正式投委会或放款方/购电方尽调室，再收取 10 万-12.5 万美元；这个价位对应研究得出的六位数付费意愿区间，把销售话术锚定在"省下的顾问支出、保住的并网价值"上，而不是通用的工作流坐席费。
businessModel:
  revenueStreams:
    - 面向活跃棕地改造项目的年度组合订阅
    - 按场地收取的尽调室和投委会方案包费用
    - 面向放款方和买家的高级基准分析、报告模块
  unitOfValue: "按活跃改造组合计费，每有场地推进到正式尽调再叠加收费"
  targetGrossMarginPct: 72
  expansionLevers:
    - 在已有公用事业公司或独立发电商的组合内，追加候选场地和业务单元
    - 一旦筛查过的场地吸引到外部资本或买家，追加销售放款方/购电方尽调室访问权限
    - 从超热地热筛查扩展到相邻的下一代地热和棕地稳定清洁能源改造工作流
strategyMap:
  northStarMetric: "从场地纳入到投委会级去留决策，所需天数的中位数"
  inputMetrics:
    - 已加载在线场地数据的付费共创客户组合数量
    - 交付时附带特定辖区并网路径和明确卡点问题的场地筛查占比
    - 从场地纳入到首次高管评审的耗时，与客户先前顾问主导流程的对比
    - 一旦首个场地进入放款方或买家尽调，试点转年度订阅的转化率
  moatsToBuild:
    - 一个结果数据集，把电厂属性、地质假设、辖区规则、资本结构选择，与实际的推进或拒绝结果关联起来
    - 一个复用库，展示哪些设备类别和棕地条件容易通过尽调，哪些会逼出全部重建
    - 业主工程师、放款方、购电方已经在用的可信尽调室产出，让工作流在初次场地筛查之后依然黏着
  killCriteria:
    - 首批 6 个目标业主账户中，12 个月内转化为付费试点的不足 2 个，说明这个阶段买家不会为独立的工作流软件掏钱
    - 前 10-20 个在线场地筛查，既没有展现出明显更快的决策周期，也没形成可复用的筛查模板，说明产品只是在给顾问工作打包
    - 三个落地区域之后，多数交易的特定辖区队列和替代发电机逻辑仍需定制法务分析，软件可重复性的假设不成立
  mermaid: |
    flowchart LR
      Wedge[Western retired thermal site diligence wedge] --> MVP[Repower OS MVP]
      MVP --> Proof[Paid pilots and faster go or no-go packets]
      Proof --> Expansion[Benchmark data and broader brownfield expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "这是一个有意思的切口，买家时机也是真实的，但在付费试点证明棕地业主愿意在超热地热完全跑通融资之前就买软件之前，信心水平仍然有限。"
    whyBelieve: "研究显示触发条件具体、没有直接的软件竞品，而且如果公司成为棕地改造决策的系统记录，还能形成真正的数据护城河。"
    whyDoubt: "西部滩头市场偏窄，场地级技术通过率未知，买家可能会等更多下一代地热项目到达 FID 之后再放预算。"
    nextDiligence: "拿下两个付费西部共创客户，跑 10-20 个在线场地筛查，量化周期缩短幅度、通过率分布，以及转化为外部尽调的比例。"
  firstCustomer:
    title: "美国西部独立发电商改造牵头人，手上有近期退役的 100-300 MW 热电机组"
    profile: "一位组合业主，有一到三座近期退役的煤电或燃气场地，并网协议仍然有效，肩负测试棕地改造能否比绿地开发更快满足公用事业公司或数据中心稳定电力需求的任务。"
    trigger: "退役决定、并网续约期限，或来自公用事业公司的全天候清洁电力询价，让董事会层面必须决定该场地是保留、改造还是放弃。"
    buyer: "开发高级副总裁、发电改造副总裁或热电资产战略负责人"
    initialContract: "一份 7.5 万-12.5 万美元、覆盖一到两座场地、为期 8-12 周的试点，如果客户后续采用平台做常态化筛查和外部尽调，这笔费用可抵扣 25 万-35 万美元的年度组合订阅。"
  mustBeTrue:
    - 至少有两家西部独立发电商或市政公用事业公司，会在多座超热地热电厂到达最终投资决策之前就为试点付费。
    - 前 10-20 个在线筛查能产出一套可复用的决策模板，并筛出足够多可行或有条件可行的场地，撑得起组合级订阅。
    - 替代发电机或棕地队列保留路径，能在至少三个初期西部辖区实现标准化。
    - 业主工程师和地热开发商更愿意接入一个中立的尽调室，而不是把客户逼进厂商专属或纯 PDF 的工作流。
    - 一次试点能把投委会级决策时间从数月缩短到八周以内，同时还能转化成一份 25 万美元以上的年度合同。
  diligenceQuestions:
    - 哪些具名的西部业主未来 12 个月内有活跃的退役或续约期限，这些账户内谁掌控预算？
    - 首批筛查场地中，有多大比例能强有力地通过地质、水资源和并网筛选，值得做更深入的尽调？
    - 在法务和工程定制化压垮软件毛利之前，这套工作流到底能按辖区模板化到什么程度？
    - 第一个客户会直接向独立软件厂商采购，还是只有通过业主工程师或开发商打包销售才愿意买？
    - 一旦这个品类被验证，是什么阻止 Paces、Sitetracker 或某个地热开发商加一个轻量版工作流来抢生意？
    - 汽轮机和厂用设备的复用假设，在详细工程审查后能扛住多少，还是大多会崩塌成全棕地重建的经济账？
operatingAssumptions:
  - assumption: "在市场上有多个超热地热电厂到达 FID 之前，目标业主就会为付费试点掏钱。"
    basis: research.yaml
    validationTest: "融资完成后 12 个月内，从首批 6 个具名目标账户中拿下至少 2 个付费共创客户。"
    decisionImpact: "如果试点没能在 FID 之前成交，切口就必须转向更广的下一代地热或棕地改造工作流，而不是继续以超热地热为主打定位。"
  - assumption: "客户的第一次场地筛查可以靠标准化产品工作流完成，而不是一场无边界的咨询项目。"
    basis: idea.yaml
    validationTest: "端到端跑完前 5 个客户场地，衡量每个场地能否在 8 周内、内部实施时间少于 80 小时的情况下产出决策方案包。"
    decisionImpact: "如果引导流程仍然是定制化的，公司就必须收窄输入范围、大幅提价，或者接受一个毛利更低、服务更重的模式，牺牲一部分创投吸引力。"
  - assumption: "并网和替代发电机规则可以在足够多的西部辖区模板化，支撑产品复用。"
    basis: research.yaml
    validationTest: "为 CAISO、内华达电力、PacifiCorp、PSCo 辖区拿到律师背书的操作手册，并在至少 3 个在线场地筛查中成功使用。"
    decisionImpact: "如果辖区差异始终太大，公司应该收窄到一两个司法辖区，或者把自己定位为合作伙伴赋能型工作流软件，而不是一个可重复的平台。"
  - assumption: "业主工程师会与这款软件合作，而不是用自己的研究把它挤出去。"
    basis: operator judgment
    validationTest: "拿下 2 个推荐或实施合作伙伴关系，跟踪合作伙伴主导的交易转化是否更快、且毛利没有塌陷。"
    decisionImpact: "如果合作伙伴把产品当成可替代品，公司就必须自建更多领域专长，或者转向那些想要一个独立控制平面的买家。"
  - assumption: "研究得出的六位数定价区间是可接受的，因为产品替代了顾问工作量，还保住了队列价值。"
    basis: research.yaml
    validationTest: "向 5 个合格账户报出 7.5 万-12.5 万美元的试点方案和 25 万-35 万美元的年度扩展方案，记录成交率和采购方的异议。"
    decisionImpact: "如果买家的心理锚点低于约 15 万美元的年度价值，那么在不扩大产品覆盖面的情况下，建模出的 SAM 和毛利目标就撑不起一个创投级软件结局。"
experimentRoadmap:
  - horizon: "0-90 天"
    experiment: "搭建一个覆盖 10 家西部业主的具名账户管线，收集每家的退役日期、并网期限、当前顾问流程和预算负责人。"
    hypothesis: "市场上有足够多的时限敏感账户，创始人主导的销售不需要大规模品牌投入就能把接触转化为付费试点。"
    successMetric: "10 个账户中至少 6 个存在 12 个月内的活跃退役、续约或采购触发条件，并同意做一次范围明确的工作流评审。"
    owner: "创始人 / CEO"
  - horizon: "0-90 天"
    experiment: "联合律师和业主工程师合作伙伴，为 CAISO、内华达电力和 PacifiCorp 类型的棕地地热评估制作辖区操作手册。"
    hypothesis: "前三个辖区能覆盖足够多的早期交易，监管差异不会拖垮可重复性。"
    successMetric: "三份经律师审核的模板，每份都在至少一次客户筛查对话中被使用。"
    owner: "电力市场与并网负责人"
  - horizon: "3-6 个月"
    experiment: "与一位业主工程师、至少一家地热开发商合作，把假设输入产品，跑完 10-20 个在线场地筛查。"
    hypothesis: "产品能比顾问主导的研究更快交付去留方案包，同时捕获可复用的基准字段。"
    successMetric: "从数据纳入到决策方案包的时间中位数低于 8 周，至少 80% 的筛查使用同一套核心模板结构。"
    owner: "创始工程师"
  - horizon: "3-6 个月"
    experiment: "在一到两座在线棕地场地上拿下第一个付费试点，并与客户先前的顾问工作流做对比。"
    hypothesis: "改造牵头人愿意在 FID 之前为速度、协同和决策质量付费，而不是等通用地热成熟。"
    successMetric: "签下一个 7.5 万美元以上的付费试点，并记录相对客户先前流程的周期改善情况。"
    owner: "创始人 / CEO"
  - horizon: "6-9 个月"
    experiment: "在首个推进中的场地上线放款方和购电方尽调室，跟踪谁真正在用这些产出。"
    hypothesis: "一旦场地推进，改造团队之外的外部利益相关方会带来扩张收入和黏性。"
    successMetric: "至少 3 位外部参与者（如放款方、买家、律师或工程师）使用尽调室，客户批准年度扩展定价。"
    owner: "实施与客户成功负责人"
  - horizon: "9-15 个月"
    experiment: "上线跨场地基准报告，用它把一个账户从单场地试点扩展为多场地组合合同。"
    hypothesis: "产品在首个客户内部扩张的原因是基准数据，而不仅仅是工作流协调。"
    successMetric: "一个客户扩展到 3 个以上活跃场地或多个业务单元，并把基准可视化列为购买理由。"
    owner: "数据 / 基准分析工程师"
operations:
  - 在任何筛查开始之前，维护一份标准化的场地纳入清单，覆盖单线图、汽轮机记录、并网文件、水权、土地限制和供应商的地下输入。
  - 让每座在线场地都跑一个带版本记录的假设登记册，让客户能看清从首次筛查到投委会决策之间，哪些地质、复用或监管假设发生了变化。
  - 与业主工程师、并网律师、地热开发商正式约定交接方式，让定制分析在产品之外完成，平台则始终是共享控制平面。
  - 把尽调室当作一份可审计记录，设置客户级访问控制，因为电厂档案、队列文件和买家谈判都具有商业敏感性。
  - 每月复盘卡住的交易，判断失败原因来自市场时机、场地物理条件、监管路径还是产品范围，并把这套分类反馈进基准数据集。
team:
  - role: "创始人 / CEO"
    startTiming: "第 0 个月"
    rationale: "前 10-15 个账户数得清、靠关系驱动，所以创始人主导销售和建立合作关系比组建一支广撒网的企业销售团队更重要。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "产品需要先为电厂资产、并网文件和决策状态工作流建立严谨的数据模型，然后才谈得上打磨企业级 UI。"
  - role: "电力市场与并网负责人"
    startTiming: "第 1 个月"
    rationale: "可信度取决于能否在首批辖区正确编码替代发电机路径、许可流程和尽调模板。"
  - role: "实施与客户成功负责人"
    startTiming: "第 4 个月"
    rationale: "早期客户会提供杂乱的电厂数据，也期待高触达式引导；这个角色能让这部分工作足够标准化，避免陷入服务蔓延。"
  - role: "数据 / 基准分析工程师"
    startTiming: "第 9 个月"
    rationale: "一旦在线筛查跑起来，公司就需要一个专职负责人，把项目工作沉淀成基准数据集，形成真正有护城河的产品。"
  - role: "客户经理"
    startTiming: "第 12 个月"
    rationale: "在至少两个参考客户和一套可重复的试点转年度故事出现之前，不要新增专职销售岗位。"
milestones:
  - horizon: "0-12 个月"
    items:
      - "签下 2 个付费西部共创客户，完成 10-20 个在线场地筛查"
      - "交付三份特定辖区的队列和替代发电机操作手册"
      - "在产品内产出第一份投委会级去留方案包"
      - "上线一个外部尽调室，供放款方、买家或合作伙伴工程师使用"
  - horizon: "12-24 个月"
    items:
      - "把 2-3 个试点账户转化为年度组合订阅"
      - "管理跨至少三个西部辖区的 4-5 座在线场地"
      - "发布基准报告，覆盖场地通过率、设备复用结果和周期表现"
      - "验证一种能保住软件毛利的合作伙伴主导实施模式"
  - horizon: "24-36 个月"
    items:
      - "拿下 4 个西部业主账户，约 6 座在管在线场地，对应研究得出的第 3 年 SOM 情形"
      - "把产品从超热优先筛查扩展到更广的下一代地热和棕地全重建工作流"
      - "把平台确立为放款方和购电方的常态化尽调系统，而不只是内部改造团队的工具"
      - "证明账户扩张的主要原因是基准数据，而不是实施人力"
risks:
  - risk: "超热地热商业化延期，或首批标杆项目表现不及预期，拖慢软件预算。"
    likelihood: High
    impact: High
    mitigation: "把工作流锚定在棕地改造决策上，并做好准备，一旦超热地热时间线后移，就去支持相邻的下一代地热和全重建场景。"
  - risk: "能通过地质、水资源和并网筛选的退役热电场地太少，撑不起经常性的组合订阅。"
    likelihood: Medium
    impact: High
    mitigation: "尽快测算前 10-20 个筛查的通过率分布，如果可行库存太稀薄，就转向更广的棕地稳定清洁能源改造定位。"
  - risk: "特定辖区的并网和许可差异，让每次部署都定制到无法规模化。"
    likelihood: Medium
    impact: High
    mitigation: "先在一小批西部辖区落地，联合律师把操作手册产品化，在可重复性得到证明之前拒绝定制辖区扩展。"
  - risk: "客户把定制工程工作推给初创公司，侵蚀软件毛利，拖慢产品化进程。"
    likelihood: High
    impact: Medium
    mitigation: "让工程研究始终由合作伙伴主导，采用固定范围的引导流程，把每个场地的内部工时作为董事会层面的约束指标来跟踪。"
  - risk: "相邻的现有厂商或地热开发商在数据护城河形成之前，加够工作流功能就抹平了差异化。"
    likelihood: Medium
    impact: Medium
    mitigation: "尽快抢占跨项目的基准字段和放款方/购电方使用数据，这是通用项目工具和厂商专属开发商难以轻易攒出来的。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: "支撑 18 个月，拿下 2-3 个付费共创客户，搭建首批特定辖区尽调模板，完成 10-20 个在线场地筛查，上线放款方/购电方尽调室，并证明支撑种子轮所需的基准数据护城河。"
