    currentAlternative: Consultant-led feasibility studies and spreadsheet comparisons across greenfield and repower options
    successMetric: Weeks from site intake to approved go or no-go memo
  - job: When a promising site enters financing or offtake talks, help the project team package technical, commercial, and interconnection evidence, so they can shorten lender and buyer diligence cycles.
