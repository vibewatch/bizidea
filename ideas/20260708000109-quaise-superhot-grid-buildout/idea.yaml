problem: >-
  Utilities and independent power producers sitting on retired thermal plants
  have valuable interconnection rights, local permits, and sometimes potentially
  reusable steam-cycle infrastructure, but no repeatable way to decide whether
  superhot geothermal can repower those sites economically. Today the answer
  lives across separate geothermal engineers, owner’s engineers,
  interconnection counsel, and spreadsheet finance models that take months to
  reconcile. That delay is costly when load growth is accelerating and queue
  value can evaporate before a site reaches investment committee.
targetUser:
  primary: VP Development, Head of Asset Strategy, or generation redevelopment lead at a Western U.S. independent power producer or municipal utility holding retired thermal sites
  secondary: Owner’s engineers and infrastructure investors underwriting geothermal repower candidates
  buyer: SVP Development, VP Generation Redevelopment, or Head of Thermal Asset Strategy
startupThesis:
  nonObviousInsight: >-
    The scarce asset is no longer just access to heat; it is retired thermal
    sites that already sit on wires, permits, water access, and potentially
    reusable plant equipment near new load. Quaise’s signed off-take and
    retrofit angle imply the first breakout winners may be the owners who can
    convert stranded plant portfolios into bankable geothermal sites faster than
    greenfield projects can clear transmission and diligence hurdles.
  beachhead: >-
    Western U.S. independent power producers and municipal utilities with
    recently retired 50-250 MW thermal plants that want to preserve
    interconnection rights by evaluating superhot geothermal repowering at
    existing generation sites
  wedge: >-
    A thermal-site repower diligence OS that combines plant asset inventories,
    interconnection rights, subsurface assumptions, turbine-compatibility
    checks, and financing templates into a lender- and offtaker-ready
    redevelopment package
  whyNowCatalyst: >-
    Quaise’s financing, signed 50 MW hyperscaler off-take, and explicit pitch
    around grid constraints and fossil-site retrofit potential make
    thermal-site repowering urgent before those scarce sites are spoken for.
  ventureScalePath: >-
    Start as the control plane for superhot geothermal repower decisions, then
    expand into portfolio redevelopment, financing, and supplier coordination
    for retired thermal assets across utilities, IPPs, and adjacent firm-clean
    repower categories.
solution: >-
  The product ingests site one-lines, turbine specs, interconnection
  agreements, land and water constraints, nearby load data, and geothermal
  resource assumptions into a single redevelopment workspace. It produces go or
  no-go scores for retrofit candidates, highlights what infrastructure may be
  reusable versus replaced, and builds a shared diligence room for executives,
  lenders, and offtakers. As projects advance, it tracks drilling milestones,
  EPC dependencies, and financing conditions so a site owner knows when a
  repower thesis is strengthening or breaking. Over time the platform becomes
  the benchmark dataset for which retired thermal sites clear superhot
  geothermal development fastest and on what capital structure.
goToMarketSeed:
  firstCustomer: >-
    A Western U.S. IPP that retired a 100-300 MW gas peaker or coal unit in the
    last 36 months, still controls the interconnection agreement, and is
    evaluating whether superhot geothermal can keep the site in service for a
    utility or data-center buyer
  buyingTrigger: >-
    A plant retirement, interconnection-renewal deadline, or inbound 24/7 power
    RFP from a utility or AI-campus developer creates urgency to prove the site
    has a faster path to firm clean power than a greenfield alternative
  currentAlternative: >-
    Owner’s-engineer studies, geothermal consultants, interconnection counsel,
    and bespoke Excel project-finance models
  switchingReason: >-
    The product turns a six-month bespoke study into a standardized go or no-go
    package that preserves queue value, aligns technical and commercial teams,
    and lets executives approach lenders and offtakers sooner
  pricingHypothesis: >-
    Annual subscription per redevelopment portfolio plus per-site fees for
    investment-committee packages and lender or offtaker diligence rooms
