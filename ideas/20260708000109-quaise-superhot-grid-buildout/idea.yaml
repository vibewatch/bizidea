ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster combines a large financing, a named project, signed early demand, grid-constraint language, and a concrete retrofit angle across three verified sources.
  painIntensity:
    score: 5
    rationale: Losing an interconnection-ready thermal site or mis-scoping a repower can strand years of queue value and delay scarce firm power in constrained markets.
  wedgeClarity:
    score: 5
    rationale: Thermal-site screening and redevelopment diligence is a narrow workflow with obvious triggers, named budget owners, and clear artifacts to replace.
  defensibility:
    score: 4
    rationale: The moat comes from a compounding benchmark dataset on site reuse, diligence outcomes, and financing readiness, though early customers may still lean on consultants.
  ventureScale:
    score: 4
    rationale: The beachhead is concentrated, but global retired-plant portfolios and adjacent firm-clean repower categories create a path to a large infrastructure software business.
topRisks:
  - name: Retrofit physics uncertainty
    description: Many retired plants will not have the right geology, steam conditions, or reusable equipment for superhot geothermal.
    mitigation: Start with screening and diligence rather than guaranteed retrofit claims, and build go or no-go benchmarks from early partner portfolios.
  - name: Market timing risk
    description: Project Obsidian or comparable superhot geothermal plants could slip, delaying mainstream customer budgets.
    mitigation: Sell to asset owners evaluating multiple sites and design the workflow so it can support conventional geothermal and other firm-clean thermal redevelopments if superhot timelines move right.
  - name: Services creep
    description: Customers may ask for bespoke engineering studies and turn the company into a consultancy before software repeatability appears.
    mitigation: Productize the approval workflow, diligence room, and benchmark library, and partner with owner’s engineers instead of replacing them.
