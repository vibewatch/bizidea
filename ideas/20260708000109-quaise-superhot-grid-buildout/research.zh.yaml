    impact: positive
    point: 即便主要设备仍需更换，棕地复用相比纯绿地路径也能减少用地、输电和地方许可方面的摩擦。
    sourceRefs:
    - 89
    - 94
  adoptionFrictionMatrix:
  - friction: 场地层面的地热不确定性
    severity: high
    affectedBuyer: 独立发电商或市政公用事业公司的改造牵头人
    mitigation: 把产品定位成更快的去留筛查和基准系统，而不是承诺任何场地都能改造成功。
    sourceRefs:
    - 5
    - 40
    - 45
  - friction: 各辖区并网和监管差异
    severity: high
    affectedBuyer: 资产战略负责人和并网律师
    mitigation: 从 CAISO 和主要西部公用事业公司辖区开始，提供特定辖区模板和替代发电机操作手册。
    sourceRefs:
    - 84
    - 87
  - friction: 与放款方和高管委员会之间的信任差距
    severity: high
    affectedBuyer: 开发高级副总裁 / 投委会发起人
    mitigation: 把产出设计成可审计的尽调室，对标放款方和购电方本就要求的材料。
    sourceRefs:
    - 25
    - 89
    - 95
  - friction: 定制工程诉求带来的服务蔓延
    severity: medium
    affectedBuyer: 实施与客户成功团队
    mitigation: 与业主工程师和地热开发商合作承接定制工程，软件专注把数据采集、工作流和审批系统化。
    sourceRefs:
    - 50
    - 89
    - 93
