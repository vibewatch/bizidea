competitors:
- name: Paces
  stage: scale-up
  wedge: 面向电力和数据中心开发商，提供 AI 辅助的选址、电力、许可和尽调服务。
  pricing: 定制企业合同，无公开定价。
  strength: 在多种清洁能源项目类型的前端起源和风险排查方面很强。
  weaknessVsUs: 不是围绕地热改造模板、蒸汽循环复用，或面向退役热电资产的放款方级改造方案包搭建的。
  sourceRefs:
  - 50
  - 53
  - 54
- name: Sitetracker
  stage: incumbent
  wedge: 覆盖规划、开发、施工和运营各阶段的资产生命周期管理。
  pricing: 定制企业合同，无公开定价。
  strength: 一旦组合开始运转，在企业级工作流、协议、报告和资产管理方面覆盖深入。
  weaknessVsUs: 优化的是协调和执行，而不是地下筛查、地热里程碑逻辑和棕地改造核验。
  sourceRefs:
  - 65
  - 69
  - 70
- name: Fervo Energy
  stage: scale-up
  wedge: 开发商主导的增强型地热项目，具备融资、数据中心定位和公用事业规模的执行能力。
  pricing: 按项目而定的开发经济性条款，无公开软件定价。
  strength: 通过融资、供应链协议和围绕清洁稳定电力的买家叙事，展现出强劲的商业验证。
  weaknessVsUs: 资产业主在把场地交给某个开发商或某条技术路径之前，仍然需要一个中立的比较层。
  sourceRefs:
  - 25
  - 26
  - 33
- name: Sage Geosystems
  stage: scale-up
  wedge: 面向发电和类储能灵活性场景的压力地热系统。
  pricing: 按项目而定的商业条款，无公开软件定价。
  strength: 围绕灵活地热和更广地域范围有很强的宣传亮点。
  weaknessVsUs: 是一条厂商专属的开发路径，而不是跨厂商筛查大量退役热电场地的控制平面。
  sourceRefs:
  - 40
  - 41
- name: Eavor
  stage: scale-up
  wedge: 闭环地热设计，旨在降低储层依赖，支撑全天候零碳电力。
  pricing: 按项目而定的商业条款，无公开软件定价。
  strength: 在闭环设计和技术资源姿态上差异化明显。
  weaknessVsUs: 同样是发电厂商，所以解决不了场地业主中立尽调室和组合基准分析的问题。
  sourceRefs:
  - 45
  - 46
regulatoryTechnicalConstraints:
- point: 地热改造仍要面对项目特定的许可、环境审查，部分情况下还有联邦土地流程要求，用棕地场地并不能免除这些环节。
  sourceRefs:
  - 80
  - 85
- point: 发电机并网和队列保留路径因辖区而异，所以场地价值取决于当地关税解读，而不是一条通用规则。
  sourceRefs:
  - 84
  - 87
- point: 税收抵免能明显改善经济性，但前提是项目结构、投运时间和合规路径都符合第 48E/45Y 条规则。
  sourceRefs:
  - 86
- point: 蒸汽轮机和厂用设备的复用是可行的，但高度依赖具体场地；很多项目仍需大规模更换或重新设计。
  sourceRefs:
  - 15
  - 89
  - 93
- point: 在首批商业电厂投运之前，超热钻探和井孔性能假设仍然是一个硬性的技术闸门因素。
  sourceRefs:
  - 4
  - 5
  - 26
validationSignals:
- point: TNW 报道称 Quaise 已经在 Obsidian 项目首次发电之前，为首批 50 MW 签下一家超大规模云服务商。
  sourceRefs:
  - 14
- point: 美国地热市场报告称，2024 年美国地热装机容量达到 3.97 GWe，截至 2025 年 6 月已新签 27 份购电协议。
  sourceRefs:
  - 75
- point: Google 公开表示其地热项目支撑公司面向数据中心和园区的全天候零碳能源战略。
  sourceRefs:
  - 95
- point: Fervo 为 Cape Station 拿到 4.21 亿美元的非追索权项目融资，说明放款方对公用事业规模的下一代地热有胃口。
  sourceRefs:
  - 25
- point: 《Queued Up》2025 版显示队列到 COD 的时间线已超过四年，撤单率非常高，抬高了棕地捷径的价值。
  sourceRefs:
  - 87
openQuestions:
- 美国西部退役或计划退役热电场地中，有多大比例具备支撑超热井孔所需的地质条件、水资源和地下温度剖面，而不是只能做传统地热或直接判定不可行？
- 在 CAISO 及主要西部公用事业公司辖区，地热改造实际上能在多大程度上保留或修改并网权，而不用完全重排队列？
- 哪些类别的蒸汽轮机和厂用设备，在超热或相邻的下一代地热条件下真正可以复用，而不只是概念上可以复用？
- 在多个超热灯塔项目达到 FID 之前，买家会不会为独立的工作流软件付费，还是会坚持在第一波浪潮中把工具跟顾问和开发商打包？
