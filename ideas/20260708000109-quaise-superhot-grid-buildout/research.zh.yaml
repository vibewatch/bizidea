  - 查找官方 DOE、FERC、IRS、BLM，以及俄勒冈、内华达、犹他、加州的页面（带直接 URL），内容涉及地热许可、替代发电机或并网，以及与退役火电厂改造相关的清洁电力税收抵免。
  - 查找官方 EIA、DOE 或 LBNL 信源（带直接 URL），内容涉及美国煤电或燃气电厂退役、退役热电场地，或退役化石能源场地用于清洁能源改造的潜力。
