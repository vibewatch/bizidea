jobsToBeDone:
  - job: >-
      When we win a rollout from one demo cell to several customer plants, help
      our applications team prove the vision stack will handle local lighting,
      materials, and line conditions, so we can pass site acceptance without
      weeks of field retuning.
    currentAlternative: "Sample runs, engineer travel, spreadsheet test logs, and manual camera tuning on the plant floor"
    successMetric: "Days from install to site acceptance for each new plant"
  - job: >-
      When a customer changes packaging formats or adds another plant, help our
      deployment team reuse prior perception evidence and failure cases, so we
      can replicate the cell without sending the same senior vision engineers
      back through the full debug cycle.
    currentAlternative: "Vendor professional services, ad hoc test footage review, and engineer memory of past failures"
    successMetric: "Applications-engineering hours required per additional rollout"
