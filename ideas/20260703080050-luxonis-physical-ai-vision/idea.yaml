topRisks:
  - name: "Incumbents bundle the wedge"
    description: "Camera vendors, robot OEMs, or integrators may add lightweight signoff tooling and make a standalone product harder to justify."
    mitigation: "Stay vendor-neutral, support mixed stacks, and win on cross-site benchmarking plus reusable evidence across deployments that no single hardware vendor can see."
  - name: "Site variance is too bespoke"
    description: "If each plant's lighting, materials, and motion profile differ too much, the product could collapse into expensive custom services."
    mitigation: "Start with one tightly defined cell family and build a structured failure taxonomy so reuse grows from patterned edge cases rather than generic promises."
  - name: "Sales cycles stretch"
    description: "Industrial OEMs may only buy after a painful missed rollout, which can slow initial revenue and logo accumulation."
    mitigation: "Sell into active expansion programs with imminent site-acceptance dates and price against avoided travel, rework, and delay rather than abstract AI ROI."
