differentiator: >-
  Existing robot-vision vendors sell cameras, SDKs, or custom integration
  services; they usually do not own the operator's reusable proof that a
  perception workflow is ready for the next site. This company is vendor-neutral
  and focuses on the deployment-evidence layer: scene libraries, acceptance
  tests, failure taxonomies, and retuning history across every rollout. Its
  moat compounds as it learns which environment changes actually break
  production perception and how to sign off the fix faster than any single OEM
  or integrator can on its own.
