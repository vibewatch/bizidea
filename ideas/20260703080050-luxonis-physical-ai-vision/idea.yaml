problem: >-
  Robotics and machine-vision teams can get a perception demo working in a
  lab, but production sites introduce new lighting, packaging materials,
  conveyor geometry, glare, occlusion, and camera-placement constraints that
  break the same model. Applications engineers then burn weeks retuning
  thresholds, collecting test footage, and rebuilding acceptance evidence
  plant by plant. The result is a painful prototype-to-production gap just as
  buyers want to replicate a successful cell across multiple sites.
targetUser:
  primary: >-
    Director of applications engineering at a North American secondary-packaging
    OEM or robotics integrator rolling out 3D vision-guided case-packing,
    cartoning, or infeed cells across multiple food, beverage, or
    household-goods plants.
  secondary: >-
    Perception or controls lead responsible for camera placement, lighting, and
    site-acceptance tuning on each rollout.
  buyer: "VP of engineering, VP of service, or GM of the automation business unit."
startupThesis:
  nonObviousInsight: >-
    Luxonis signals that the scarce asset in physical AI is no longer just
    access to a capable camera or SDK. As OAK-class hardware and DepthAI-style
    software become widely available, the real bottleneck shifts to proving
    that perception will stay inside tolerance across messy real-world sites.
    The winning wedge is the deployment-evidence layer that turns lighting,
    placement, SKU mix, and failure thresholds into reusable signoff packages,
    not another proprietary vision stack.
  beachhead: >-
    North American secondary-packaging OEMs and robotics integrators rolling
    out 3D vision-guided case-packing, cartoning, or infeed cells across 5-20
    food, beverage, or household-goods plants with recurring SKU, material,
    and lighting variation.
  wedge: >-
    A perception signoff cloud that ingests sample footage, camera layouts, SKU
    libraries, and acceptance thresholds, then produces reusable site-readiness
    tests, failure taxonomies, and rollout evidence for one robot-cell family.
  whyNowCatalyst: >-
    Luxonis is funding OAK camera production and the OAK4 ecosystem
    specifically to move customers from prototype systems to production
    automation, making perception-acceptance software urgent for the next wave
    of multisite rollouts.
  ventureScalePath: >-
    Start with packaging-line deployments, then extend the same signoff and
    drift-evidence layer into warehouse handling, agriculture, medtech
    automation, defense systems, and broader industrial robotics as common
    camera-and-software stacks spread across physical-AI buyers.
solution: >-
  Perception Signoff Cloud would sit between the OEM's vision stack and its
  deployment team. It would capture the exact camera placement, exposure
  settings, scene assumptions, SKU library, and acceptance thresholds used in a
  successful demo cell, then turn them into site-specific validation suites for
  each new plant. Before install, teams would run footage and test-case packs
  against the target environment to surface likely failure modes such as glare,
  occlusion, glossy packaging, or conveyor-speed drift. During rollout, the
  product would log exceptions, compare them to prior deployments, and
  recommend the smallest set of retuning or additional captures needed for
  signoff. Over time, the company becomes the system of record for which
  perception configurations reliably survive real production environments and
  which changes break them.
goToMarketSeed:
  firstCustomer: >-
    A 200-1,500 employee North American secondary-packaging automation OEM with
    one successful vision-guided case-packing cell and 3-8 follow-on customer
    plants scheduled this year, where the same applications team currently
    travels site to site to requalify the vision stack.
  buyingTrigger: >-
    Winning a multisite rollout after a demo-cell success, or missing a
    site-acceptance date because camera tuning and validation keep slipping once
    the cell hits live plant conditions.
  currentAlternative: >-
    Field applications engineers, robot-vendor professional services, manual
    FAT/SAT checklists, spreadsheet test logs, and ad hoc camera retuning at
    each plant.
  switchingReason: >-
    The first customer switches because the product turns one validated demo
    cell into reusable perception signoff packs, cutting travel-heavy rework
    and making later plants faster to approve without rebuilding acceptance
    evidence from scratch.
  pricingHypothesis: >-
    Annual subscription priced per automation program or cell family, plus
    onboarding fees for connectors, validation template setup, and new-site
    rollout packs.
