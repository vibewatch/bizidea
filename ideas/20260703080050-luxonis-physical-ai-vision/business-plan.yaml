slug: perception-signoff-cloud
date: "2026-07-03"
executiveSummary: >-
  Perception Signoff Cloud targets the prototype-to-production gap in
  vision-guided packaging robotics, where a demo cell works once but later
  plants fail under different lighting, reflective materials, conveyor
  geometry, and SKU mix. The first customer is a North American
  secondary-packaging OEM or integrator that already sold one successful
  case-packing or cartoning cell and now faces 3-8 follow-on rollouts whose
  SAT dates are at risk. The product does not try to replace the camera or
  vision stack; it captures baseline camera settings, footage, SKU
  definitions, and acceptance thresholds from the reference cell, then
  generates reusable readiness tests, failure taxonomies, and signoff evidence
  for each new site. Research supports the urgency: Luxonis is explicitly
  funding the jump from prototype to production, North American food and
  consumer-goods robot orders grew 65% in 2024, and packaging buyers already
  live inside FAT/SAT documentation-heavy workflows. The near-term market is
  real but not massive on its own, with research estimating roughly $19.6M SAM
  and $2.0M year-three SOM for the initial U.S.-anchored packaging beachhead,
  so the company must prove packaging first and only then extend the same
  evidence layer into adjacent physical-AI workflows. Go-to-market should be
  founder-led and tied to live rollout calendars, with pricing per active cell
  family or rollout program plus onboarding and connector fees. The critical
  operating bet is that reusable signoff packs reduce on-site
  applications-engineering time by at least 30% and convert a travel-heavy
  service problem into defensible software with benchmark data. The biggest
  open risks are whether mixed camera and robot stacks expose enough telemetry,
  whether site variance is repetitive enough to avoid a services trap, and
  whether food and regulated plants require hybrid or private-edge deployment
  earlier than planned.
problem:
  - >-
    A vision-guided packaging cell that passes a demo or FAT often fails in
    later plants because lighting, reflective film, occlusion, conveyor speed,
    and camera placement change faster than the OEM's tacit knowledge can
    travel.
  - >-
    The current alternative of field applications engineers, manual FAT/SAT
    checklists, spreadsheet evidence, and ad hoc retuning extends launch dates,
    burns scarce labor, and does not create reusable proof for the next
    rollout.
solution:
  - >-
    Capture the reference cell's camera configuration, footage, SKU library,
    acceptance thresholds, and site assumptions, then generate reusable
    preinstall readiness tests and SAT evidence packs for each new plant.
  - >-
    Log exceptions during rollout, classify failure modes across plants, and
    recommend the smallest retune or recapture step needed to pass signoff so
    knowledge compounds instead of staying with one engineer.
whyWeWin:
  - >-
    The wedge is vendor-neutral deployment evidence, not another vision stack;
    the researched competitors sell cameras, tooling, equipment, or horizontal
    AI infrastructure, but none clearly owns multisite perception signoff
    across mixed stacks.
  - >-
    Packaging OEMs already operate inside documented FAT/SAT and changeover
    workflows, so the product can sell against delayed launches and avoided
    field-service time rather than abstract AI ROI.
  - >-
    A cross-site graph of failure modes, acceptance thresholds, and fix history
    compounds into benchmarks that are harder for any single OEM, integrator,
    or camera vendor to recreate.
strategicChoices:
  beachhead: >-
    North American secondary-packaging OEMs and robotics integrators deploying
    one vision-guided case-packing, cartoning, or infeed cell family across
    5-20 food, beverage, or household-goods plants.
  wedgeRationale: >-
    Packaging is the fastest proof market because the same cell family repeats
    across plants, FAT/SAT documentation already exists, and the cost of a
    slipped launch is visible to engineering and service leaders. Broader
    warehouse or general robotics markets are larger, but they introduce more
    workflow variance before the company has benchmark data or partner
    integrations.
  sequencingRationale: >-
    Start with one cell family, one active rollout, and low-friction evidence
    capture so the company can prove time savings before building a heavy
    integration surface. After two or three design-partner wins, add the
    connectors, hybrid edge capture, and benchmark reports that make the
    product sticky; only then expand sales beyond founder-led OEM programs and
    into adjacent workflows.
  notYet:
    - "Warehouse picking, depalletizing, and broader intralogistics workflows before packaging templates show repeatable reuse"
    - "General-purpose model training, labeling, or robot fleet management"
    - "Direct end-user manufacturer sales that bypass OEM and integrator rollout owners"
market:
  tam: "$207.9M estimated TAM using U.S. food, beverage, tobacco, and soap or cleaning plant counts as a conservative proxy for the North American packaging beachhead"
  sam: "$19.6M estimated SAM across relevant U.S. secondary-packaging OEM and integrator rollout programs"
  som: "$2.0M year-three SOM, assuming 27 active programs at roughly $75k ACV"
  segments:
    - "North American secondary-packaging OEMs with multisite vision-guided cell families"
    - "Robotics integrators standardizing food, beverage, and household-goods packaging rollouts"
  buyingProcess: >-
    The sale starts inside a live rollout when a demo cell has already sold
    into follow-on plants or a SKU-heavy changeover and SAT risk becomes
    visible. The champion is the applications, service, or perception lead;
    the economic buyer is usually VP engineering or service leadership, and
    approval rides an existing program budget rather than a separate innovation
    line item.
product:
  mvp: >-
    The MVP captures one validated reference cell's camera settings, layout,
    representative footage, SKU definitions, and SAT criteria, then turns them
    into reusable readiness tests, exception taxonomies, and exportable
    signoff packs for the next plant. It should start with upload-first and
    API-light integrations rather than automated retuning so proof arrives
    before the integration burden does.
  sixMonth: >-
    Deploy with two design partners on one packaging cell family each and ship
    baseline capture, footage ingest, SAT checklist generation, issue tagging,
    and customer-ready evidence exports.
  twelveMonth: >-
    Add connectors for one camera stack, one robot or controller event stream,
    and one pack-pattern or OEM software export; release hybrid edge evidence
    capture and benchmark variance across at least ten plants or SKU
    changeovers.
  twentyFourMonth: >-
    Support multi-program rollouts inside five to seven OEM or integrator
    accounts, expand into a second packaging cell family, and launch premium
    benchmarking and drift modules before testing one adjacent physical-AI
    workflow.
  keyBets:
    - "A structured failure taxonomy can cover most packaging perception failures without bespoke computer-vision work"
    - "Customers will adopt an evidence-first workflow before they demand automated model tuning"
    - "Connector coverage for a few dominant stacks is enough to unlock buying and expansion"
    - "Benchmark data becomes harder for incumbents to copy than simple signoff checklists"
gtm:
  wedge: >-
    Sell a paid design-partner package into the next 3-8 plant rollouts of one
    packaging cell family, using the first delayed or high-risk SAT as the
    forcing event.
  channels:
    - "Founder-led outbound to applications-engineering and service leaders at top North American packaging OEMs and integrators"
    - "Design-partner sales tied to active multisite rollout programs with imminent SAT dates"
    - "Referral and co-sell motions with camera, vision, and packaging-stack vendors once deployment-proof pain is proven"
  funnelTargets: "Discovery->qualified rollout 35%+, qualified rollout->paid pilot 40%+, pilot->production 50%+, first account expansion to a second plant or cell family within 9 months"
  pricing: >-
    Annual subscription per active cell family or rollout program, plus
    onboarding and connector fees and optional per-site rollout packs. This
    matches how OEMs budget around launch-critical software and lets ROI map to
    avoided field-engineer travel, lower requalification effort, and faster
    SAT.
businessModel:
  revenueStreams:
    - "Annual subscription for each active cell family or rollout program"
    - "Onboarding, connector implementation, and template setup fees"
    - "Premium benchmarking, drift monitoring, and customer-facing audit reporting modules"
  unitOfValue: "One active cell family or rollout program"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from the first plant to later plants and SKU variants inside the same program"
    - "Add second and third cell families within the same OEM or integrator account"
    - "Sell benchmark and drift modules once cross-site evidence accumulates"
    - "Extend the same signoff layer into adjacent packaging and physical-AI workflows after packaging proof"
strategyMap:
  northStarMetric: "Median days from install to perception signoff for follow-on plants"
  inputMetrics:
    - "Percent of target plants with readiness tests completed before shipment"
    - "Median on-site applications-engineering hours per rollout"
    - "Pilot-to-production conversion rate"
    - "Template reuse rate across new plants and SKU changes"
    - "Plants signed off per active cell family"
  moatsToBuild:
    - "Cross-site failure taxonomy linked to lighting, materials, conveyor context, and fix outcomes"
    - "Acceptance-evidence graph connecting baseline configs, SAT criteria, exceptions, and approvals across plants"
    - "Connector layer and benchmark dataset across mixed camera, robot, and OEM software stacks"
  killCriteria:
    - "After 12 months, fewer than two design partners show a 30% or better reduction in on-site engineering hours per follow-on plant"
    - "By the third connector program, more than half of deployment work still requires bespoke data mapping or manual evidence assembly"
    - "Within 18 months, no pilot converts to a production subscription above $60k ACV or expands to a second plant or cell family"
  mermaid: |
    flowchart LR
      Wedge[One packaging cell family at 3-8 follow-on plants] --> MVP[Evidence capture and readiness tests]
      MVP --> Proof[On-time SAT with 30% less onsite engineering]
      MVP --> Data[Failure taxonomy and acceptance graph]
      Proof --> Expansion[More plants and a second cell family]
      Data --> Expansion
      Expansion --> Adjacent[Adjacent packaging and physical-AI workflows]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Moderate conviction on customer pain and timing; conviction should rise only if one OEM proves 30%+ rollout-effort reduction and a second cell-family expansion."
    whyBelieve: "There is explicit, budget-linked prototype-to-production pain in packaging rollouts, and no researched incumbent clearly owns vendor-neutral signoff evidence across mixed stacks."
    whyDoubt: "The beachhead is only venture-scale if repeatability beats services gravity and packaging wins extend into adjacent workflows quickly."
    nextDiligence: "On the next live rollout, measure baseline versus assisted SAT effort, verify telemetry access, and test whether the customer will sign a production contract after two successful plants."
  firstCustomer:
    title: "Director of Applications Engineering at a secondary-packaging OEM"
    profile: "A 200-1,500 employee North American packaging OEM or integrator with one reference vision cell and 3-8 scheduled follow-on plants in food, beverage, or household goods."
    trigger: "A demo cell has sold into multiple plants or a launch is slipping because site acceptance keeps missing on perception tuning."
    buyer: "VP of engineering"
    initialContract: "Paid design partner at $25-40k onboarding and setup, converting to a $60-90k annual program subscription plus per-site rollout packs after the first two plants pass SAT on time."
  mustBeTrue:
    - "Target OEMs run at least three follow-on plants or major SKU changeovers per year on one reusable cell family"
    - "The product cuts on-site applications-engineering hours per rollout by 30% or more versus the prior baseline"
    - "Two or more dominant camera, robot, and pack-pattern stacks expose enough configuration and event data for a neutral evidence layer"
    - "Buyers accept roughly $75k annual program pricing plus onboarding when ROI is framed against travel, delay, and missed SAT costs"
    - "A packaging win expands into a second cell family or adjacent workflow within 18 months without turning the company into services"
  diligenceQuestions:
    - "How many repeat rollouts per year does each target account actually run by cell family?"
    - "What are the current days, trips, and senior-engineer hours between install and SAT on the last three programs?"
    - "Which camera, robot, and pack-pattern systems expose exportable configs, events, and footage today?"
    - "Who owns the budget and final signoff authority when a rollout slips?"
    - "What internal templates or OEM software already cover signoff well enough to delay a standalone purchase?"
    - "Which regulated customers require private-edge evidence storage, and how much does that change deployment cost?"
operatingAssumptions:
  - assumption: "Target accounts run enough repeat rollouts per cell family to justify software instead of one-off services."
    basis: research.yaml
    validationTest: "Review 12-month rollout calendars from the first three target accounts; proceed only if median volume is at least three follow-on plants or major SKU changeovers per cell family."
    decisionImpact: "If false, move upmarket to integrators with larger installed bases or widen the unit of value beyond a single cell family."
  - assumption: "Buyers will pay roughly $75k ACV plus onboarding if the product cuts on-site engineering time by at least 30%."
    basis: research.yaml
    validationTest: "Run two paid pilot price tests and compare quoted ROI to actual avoided travel, service labor, and SAT delay on the customer's prior rollout."
    decisionImpact: "If false, reduce product scope, lower integration cost, or reposition the offer as a managed service until ROI is stronger."
  - assumption: "Core camera, robot, and pack-pattern systems expose enough configuration and event data for the platform to become the system of record."
    basis: research.yaml
    validationTest: "Complete connector feasibility reviews for one Luxonis or OAK-class camera stack, one robot or controller stack, and one packaging-OEM software export with no critical telemetry gaps."
    decisionImpact: "If false, narrow the supported stack list or change the product into an upload-first workflow instead of a live evidence layer."
  - assumption: "Food and regulated plants will accept hybrid edge capture with cloud metadata rather than requiring fully on-prem architecture."
    basis: research.yaml
    validationTest: "Run security and IT reviews with two food-packaging design partners and secure written approval for the proposed retention and redaction policy."
    decisionImpact: "If false, pull forward private-cloud or on-prem deployment work and raise more capital earlier."
  - assumption: "The top failure modes repeat enough across plants to create reusable templates instead of bespoke consulting."
    basis: idea.yaml
    validationTest: "Tag the first 25 rollout incidents across at least two programs and confirm the top 10 failure types explain more than 70% of observed issues."
    decisionImpact: "If false, stay narrowly verticalized to one stack or abandon the standalone software thesis."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Measure rollout economics with the first ten target accounts"
    hypothesis: "The beachhead buyer already loses enough engineer time, travel, and schedule certainty on follow-on plants to fund a dedicated signoff layer."
    successMetric: "At least three accounts share baseline data showing two or more site trips and ten or more senior-engineer days per follow-on plant."
    owner: "Founder / CEO"
  - horizon: "0–90 days"
    experiment: "Run a concierge signoff-pack pilot on one live rollout"
    hypothesis: "A mostly manual workflow can still prevent predictable perception failures before the next plant ships."
    successMetric: "The first assisted plant avoids at least one previously recurring failure mode and cuts unplanned perception-tuning days by 25% or more."
    owner: "Founder / CEO"
  - horizon: "90–180 days"
    experiment: "Build connector spikes for one camera stack, one robot stack, and one pack-pattern export"
    hypothesis: "Eighty percent of the required evidence can be captured without bespoke engineering for every site."
    successMetric: "All three connector spikes are completed in under three weeks each with no blocking telemetry gap."
    owner: "CV and integrations engineer"
  - horizon: "90–180 days"
    experiment: "Test whether buyers will pay for rollout software instead of a free proof of concept"
    hypothesis: "If the offer is tied to a live launch risk, design partners will pay for setup and commit to production pricing early."
    successMetric: "Two paid pilots close at $20k or more in setup fees or convert to signed production proposals at $60k or more ACV."
    owner: "Founder / CEO"
  - horizon: "180–365 days"
    experiment: "Validate hybrid edge evidence capture in food-packaging environments"
    hypothesis: "Security and quality teams will approve local video capture with cloud-hosted metadata, audit logs, and reports."
    successMetric: "Two customer security reviews pass without a full on-prem requirement and one regulated deployment goes live."
    owner: "Founding eng"
  - horizon: "180–540 days"
    experiment: "Expand from the first cell family into a second cell family or second account"
    hypothesis: "The evidence model and failure taxonomy are reusable enough to support expansion with limited customization."
    successMetric: "One customer expands to a second plant or cell family and a second account launches with no more than 20% workflow customization."
    owner: "Solutions engineer"
operations:
  - "Version-controlled acceptance template library by cell family, SKU class, and camera layout"
  - "Evidence ingestion pipeline for video, camera configs, pack-pattern files, and SAT criteria with audit logs"
  - "Weekly root-cause review with design partners to tag every perception miss into a shared failure taxonomy"
  - "Hybrid edge-capture and retention policy for regulated plants, including redaction and storage settings approved by the customer"
  - "Partner-management process for one camera vendor, one robot or controller vendor, and one packaging-software stack"
team:
  - role: "Founder / CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, price against avoided rollout delay, and translate design-partner pain into a narrow commercial wedge."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the evidence model, readiness-test workflow, audit outputs, and first benchmark dataset without overbuilding a generic platform."
  - role: "CV and integrations engineer"
    startTiming: "Month 2"
    rationale: "Handle camera, robot, and pack-pattern connectors plus the edge-capture architecture that determines whether the product can become the system of record."
  - role: "Solutions engineer"
    startTiming: "Month 4"
    rationale: "Run implementations, baseline rollout savings, and turn customer-specific learnings into reusable templates instead of bespoke services."
milestones:
  - horizon: "0–12 months"
    items:
      - "Sign two paid design partners in secondary packaging"
      - "Prove a 30% or better reduction in on-site engineering hours on at least one live rollout"
      - "Ship the reusable signoff workflow for one cell family plus three core data imports"
      - "Convert one pilot to production and expand it to at least two plants"
  - horizon: "12–24 months"
    items:
      - "Reach five to seven production programs across three to four OEM or integrator accounts"
      - "Launch hybrid edge deployment and customer-facing audit exports"
      - "Add a second packaging cell family and release a benchmark module"
      - "Secure two referral or co-sell partners in the camera, robot, or packaging stack"
  - horizon: "24–36 months"
    items:
      - "Land 20-27 active programs across six to eight accounts"
      - "Expand into the first adjacent packaging or physical-AI workflow"
      - "Demonstrate template reuse across mixed stacks while holding a gross-margin target above 70%"
risks:
  - risk: "Packaging-only demand may be too small to justify venture returns if adjacency arrives slowly."
    likelihood: Medium
    impact: High
    mitigation: "Make second-cell-family expansion a month-18 gate and do not scale headcount ahead of proof that the signoff layer generalizes beyond one packaging workflow."
  - risk: "Packaging OEMs, camera vendors, or horizontal vision platforms bundle lightweight signoff features."
    likelihood: Medium
    impact: High
    mitigation: "Stay vendor-neutral, focus on mixed-stack evidence portability, and ship benchmarks and audit trails that are hard for any one vendor to match."
  - risk: "Site variance remains too bespoke, pushing the business into a services trap."
    likelihood: Medium
    impact: High
    mitigation: "Stay inside one tightly defined cell family first, enforce root-cause tagging, and only expand when templates cover the majority of incidents."
  - risk: "Target stacks do not expose enough telemetry or configuration state for reliable automation."
    likelihood: Medium
    impact: High
    mitigation: "Qualify accounts by stack early, build upload-first fallbacks, and prioritize partners whose exports can support a neutral system of record."
  - risk: "Food and regulated plants require private-edge or on-prem deployment sooner than planned."
    likelihood: Medium
    impact: Medium
    mitigation: "Design the evidence pipeline for hybrid deployment from the start and use customer-approved retention policies before storing production footage."
  - risk: "Industrial sales cycles stretch until buyers experience a painful missed rollout."
    likelihood: High
    impact: Medium
    mitigation: "Target active expansion programs with near-term SAT dates and price against specific avoided rework and launch-delay costs."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months of runway buys a design-partner product for one packaging cell family, three core integrations, hybrid evidence architecture, proof of 30%+ rollout-effort reduction, and a repeatable pilot-to-production motion across the first few OEM accounts."
