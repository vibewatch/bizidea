openQuestions:
- How many packaging OEMs already maintain reusable internal SAT or FAT templates that are good enough to delay buying a standalone signoff layer?
- 'Which failure modes create the most calendar slip in the beachhead cell family: glare, reflective film, SKU graphics, occlusion, or conveyor-speed drift?'
- Will OEMs expose enough device, robot, and pack-pattern telemetry for a neutral signoff platform to become the system of record?
- How strongly will buyers prefer private-edge evidence capture over cloud-hosted video and configuration records in food and regulated plants?
