  sensitivityCases:
  - case: Incumbent feature creep
    impact: If packaging OEMs or vision vendors add lightweight recipe-validation and signoff tooling, differentiation shifts toward cross-vendor benchmarking and audit trails rather than simple pattern editing.
    sourceRefs:
    - 20
    - 24
    - 25
    - 26
    - 29
  - case: Variance is too cell-specific
    impact: If every plant differs too much, the startup risks collapsing into expensive services unless it starts with a tightly bounded cell family and failure taxonomy.
    sourceRefs:
    - 21
    - 22
    - 23
    - 27
  - case: Compliance teams require hybrid or on-prem evidence
    impact: Sales cycles lengthen and product architecture needs stronger edge or private-cloud deployment from day one instead of cloud-only assumptions.
    sourceRefs:
