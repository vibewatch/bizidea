competitors:
- name: KEYENCE
  stage: incumbent
  wedge: Integrated machine-vision hardware, 3D guidance, and inspection tooling for industrial automation.
  pricing: Custom quote / enterprise equipment sale.
  strength: Huge installed base plus practical know-how around lighting, appearance inspection, and 3D guidance in difficult production conditions.
  weaknessVsUs: Sells vision tools, not a vendor-neutral cross-site signoff record that spans mixed camera and OEM stacks.
  sourceRefs:
  - 20
  - 21
  - 22
- name: MVTec
  stage: incumbent
  wedge: Developer-centric industrial vision software and deep-learning tooling.
  pricing: Enterprise / OEM licensing motion.
  strength: Strong integrator-friendly software foundation for robust inspection, recognition, and food-packaging use cases.
  weaknessVsUs: Still a toolkit layer; it does not own FAT/SAT workflows or multisite acceptance evidence.
  sourceRefs:
  - 28
  - 29
- name: Quest
  stage: incumbent
  wedge: Packaging-OEM software and equipment for case packing, top-load systems, and operator-editable pack patterns.
  pricing: Bundled with Quest systems / custom quote.
  strength: Direct fit with packaging buyers, proven end-of-line workflows, and editable pack-pattern software already inside the cell.
  weaknessVsUs: Tied to Quest equipment and pattern creation, not a neutral perception signoff layer across later plants and mixed stacks.
  sourceRefs:
  - 25
  - 26
- name: Robovision
  stage: scale-up
  wedge: Industrial vision AI platform for packaging, logistics, and food environments.
  pricing: Custom quote / enterprise deployment.
  strength: Closer than generic AI vendors to industrial COPQ, shift variance, and packaging workflows.
  weaknessVsUs: Center of gravity is model deployment and inspection economics, not signoff packs for brownfield multisite rollouts.
  sourceRefs:
  - 30
  - 31
- name: Intrinsic
  stage: scale-up
  wedge: Horizontal robotics software platform with secure cloud services and a production-grade developer environment.
  pricing: Custom quote / request-demo motion.
  strength: Strong infrastructure for secure build, deploy, monitor, and troubleshoot across robotics solutions.
  weaknessVsUs: Horizontal by design; a packaging-specific signoff vendor can still own the acceptance-content layer.
  sourceRefs:
  - 33
  - 34
