  validationPlan:
  - priority: high
    question: How many follow-on plants or SKU changeovers each year actually reuse the same cell family for the first three target OEMs?
    evidenceToGather: Recent rollout calendars, plant counts, and pack-pattern reuse data from 3 packaging OEMs or integrators.
  - priority: high
    question: 'Which failure modes cause the most late-stage retuning today: lighting, reflective films, SKU graphics, occlusion, or conveyor-context drift?'
    evidenceToGather: Issue logs, service tickets, and engineer postmortems from two multisite programs with root-cause tagging.
  - priority: high
    question: Can reusable signoff packs cut on-site engineering time by at least 30% on the next rollout wave?
    evidenceToGather: Time-and-motion data for FAT prep, SAT execution, and post-install tuning across one baseline and one signoff-assisted rollout.
  - priority: medium
    question: Do camera, robot, and pack-pattern vendors expose enough telemetry and configuration state for a neutral layer to be the system of record?
    evidenceToGather: API docs, sample exports, and connector requirements from Luxonis, Keyence, Quest, and two reference OEM stacks.
