differentiator: 现有机器人视觉厂商卖的是相机、SDK 或定制集成服务；它们通常并不掌握运营方那套可复用的证据，证明某条感知工作流已经能去下一个站点量产。这个公司保持厂商中立，盯住的是部署证据层：场景库、验收测试、故障分类体系，以及每次部署的重调历史。它的护城河会随着学习不断加深：什么环境变化真的会击穿量产感知，怎样修得更快、签得更快，这些经验不是单个 OEM 或集成商能轻松自己攒出来的。
