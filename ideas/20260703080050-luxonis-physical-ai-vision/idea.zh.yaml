jobsToBeDone:
- job: 当我们把一套演示单元扩到多个客户工厂时，帮应用团队证明视觉栈能扛住当地的光照、材料和产线条件，这样我们就能不靠几周现场重调，也顺利过现场验收。
  currentAlternative: 样机试跑、工程师出差、电子表格测试日志，以及工厂现场手工调相机
  successMetric: 每家新工厂从安装到现场验收所需天数
- job: 当客户换包装规格或新增工厂时，帮部署团队复用以往的感知证据和故障案例，这样我们就不用把同一批资深视觉工程师再送回完整的排障循环里。
  currentAlternative: 厂商专业服务、临时查看测试视频，以及工程师对过往故障的个人记忆
  successMetric: 每新增一次部署所需的应用工程工时
ideaScorecard:
