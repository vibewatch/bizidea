topRisks:
- name: 现有厂商把切口打包带走
  description: 相机厂商、机器人 OEM 或集成商可能会补上一层轻量签核工具，让独立产品更难单独立住。
  mitigation: 坚持厂商中立，支持混合技术栈，并在跨站点基准能力和可复用证据上赢——这些都是单一硬件厂商看不到的。
- name: 站点差异太碎太定制
  description: 如果每家工厂的光照、材料和运动特征差异都太大，产品就可能塌成高成本定制服务。
  mitigation: 先盯住一个定义非常紧的单元家族，并把故障分类体系做扎实，让复用从有模式的边缘案例长出来，而不是靠空泛承诺。
- name: 销售周期被拉长
  description: 工业 OEM 往往要等部署真正失手后才会买单，这会拖慢早期收入和客户积累。
  mitigation: 只打正在扩张、现场验收时间临近的项目，并把定价锚在省下的差旅、返工和延期成本上，而不是抽象的 AI ROI。
