  wedgeClarity:
    score: 5
    rationale: 面向包装产线部署的感知签核，是一个足够窄的工作流：买家明确、触发器明确、替代方案也很具体。
  defensibility:
    score: 4
    rationale: 跨站点的失效模式、验收测试和重调历史会越积越厚，尽管大型视觉厂商未来也可能把相邻功能打包进去。
  ventureScale:
    score: 4
