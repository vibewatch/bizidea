problem: 机器人和机器视觉团队能在实验室里把感知演示跑通，但一进量产现场，光照、包装材料、输送线几何、反光、遮挡和相机安装位置都变了，同一个模型就会失灵。应用工程师随后得一厂一厂地花上几周，重调阈值、补采测试视频、重建验收证据。结果就是：买家明明想把一套成功单元复制到多个工厂，团队却被卡在从原型走到量产的鸿沟里。
targetUser:
  primary: 北美二次包装 OEM 或机器人集成商里的应用工程总监，正把 3D 视觉引导的装箱、装盒或上料单元，铺到多家食品、饮料或日化工厂。
  secondary: 负责每次部署中相机机位、照明和现场验收调参的感知或控制负责人。
  buyer: 工程 VP、服务 VP，或自动化事业部总经理。
startupThesis:
  nonObviousInsight: Luxonis 释放的信号是：具身 AI 里最稀缺的资产，已经不只是好相机或好 SDK。随着 OAK 级硬件和 DepthAI 式软件越来越普及，真正卡脖子的环节变成：如何证明感知在复杂的真实工厂里仍能稳稳跑在容差内。赢面最大的切口不是再造一套专有视觉栈，而是把光照、机位、SKU 组合和失效阈值封装成可复用的签核证据层。
  beachhead: 北美二次包装 OEM 和机器人集成商；它们正把 3D 视觉引导的装箱、装盒或上料单元，复制到 5–20 家食品、饮料或日化工厂，而 SKU、材料和光照经常变化。
  wedge: 一套感知签核云，吃进样例视频、相机布局、SKU 库和验收阈值，再为同一类机器人单元产出可复用的站点就绪测试、故障分类体系和部署证据。
  whyNowCatalyst: Luxonis 这轮融资明确要扩 OAK 相机产能和 OAK4 生态，把客户从原型系统推向量产自动化。对下一波多站点部署来说，感知验收软件一下子变成了刚需。
  ventureScalePath: 先从包装产线部署切入，再把同一套签核与漂移证据层，扩到仓储搬运、农业、医疗科技自动化、国防系统以及更广的工业机器人场景——前提是通用的相机 + 软件技术栈继续在具身 AI 买家里铺开。
solution: 感知签核云夹在 OEM 的视觉栈和部署团队之间。它会把一套成功演示单元的相机位置、曝光设置、场景假设、SKU 库和验收阈值完整收进来，再为每一家新工厂生成对应的站点级验证套件。安装前，团队先拿目标环境的视频和测试包跑一遍，提前找出反光、遮挡、亮面包装或输送线速度漂移等高概率失效点。落地时，产品会把异常逐条记下来，对照过往部署做比较，并给出最小化的重调或补采建议，帮助团队完成签核。时间一长，公司就会变成一套主记录系统：哪些感知配置在真实量产环境里能稳住，哪些改动会把它们打穿，都沉淀在这里。
goToMarketSeed:
  firstCustomer: 一家 200–1,500 人的北美二次包装自动化 OEM；它已经把一套视觉引导装箱单元跑通，还排了 3–8 家后续客户工厂要在今年落地。同一支应用团队现在得在各厂之间来回奔波，重复给视觉栈做复验。
  buyingTrigger: 演示单元一跑通，就拿下多工厂部署；或者单元一进真实工厂环境，相机调参和验证不断延误，结果把现场验收日期拖掉。
  currentAlternative: 现场应用工程师、机器人厂商专业服务、人工 FAT/SAT 清单、电子表格测试日志，以及每家工厂各自做一轮临时相机重调。
  switchingReason: 首个客户会切换，是因为这款产品能把一个已经验证过的演示单元，变成可复用的感知签核包，减少高差旅成本的返工，也让后续工厂更快过审，不用每次都从头重建验收证据。
  pricingHypothesis: 按自动化项目或单元家族收取年度订阅费，另加连接器、验证模板配置和新站点部署包的实施费。
