slug: perception-signoff-cloud
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-03] 模型从这份业务计划日期之后的首个完整运营月开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk round pre-seed + BP fundingAsk targetFundingRangeUsd $2-4M + model cash curve] 基准情景取区间下沿，用于把公司送到 Y2 末证明点，并留出 6 个月缓冲。'
- id: A3
  name: 起始付费项目数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先拿下付费共创客户。'
- id: A4
  name: 客户单位定义
  value: 一个活跃的单元家族或部署项目
  unit: definition
  source: '[BP businessModel.unitOfValue] customersEop 统计的是付费部署项目，而不是不同 OEM 客户的数量。'
- id: A5
  name: 付费共创客户套餐
  value: 约 3 个月合计 $36K（约每月 $12K）
  unit: USD/program
  source: '[BP investorMemo.firstCustomer.initialContract $25-40k 上线配置 and setup] 模型取该设置费区间的偏高位，用来模拟第一批真实落地项目。'
- id: A6
  name: 量产项目年价值与附加率
  value: 核心订阅从约 $75K ARR 起步；到 Y3 末，在部署包和基准 / 漂移模块附加后，实际年化价值约为 $96K。
  unit: USD/program/year
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract $60-90k annual subscription plus per-site 部署包 + BP businessModel.revenueStreams] 到 Y3 末的价值高于单纯订阅，因为高级模块和部署包会带来附加收入。'
- id: A7
  name: 活跃项目爬坡
  value: M12 达到 3 个付费项目，Q4Y2 达到 9 个，Q4Y3 达到 24 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som 27 active programs by year 3] 基准情景略低于研究给出的项目数上限。'
- id: A8
  name: 收入确认口径
  value: 按期末活跃项目数乘以当期每个项目的混合实现收入：Y1 里有收入的月份先按 $12K-$12K，再按每月 $11K-$12K；Y2 按每季度 $18K-$22K；Y3 按每季度 $21K-$24K。
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + startup-finance heuristic] 这样能把收入明确绑在活跃项目数和定价结构上。'
- id: A9
  name: 毛利率爬坡
  value: Y1 有收入月份的毛利率为 45%-56%，Y2 为 61%-69%，Y3 为 70%-73%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research adoption frictions around mixed-stack integration and food documentation] 随着模板和连接器替代定制部署工作，毛利率会逐步改善。'
- id: A10
  name: 招聘节奏
  value: M1 配创始人和创始工程师；M3 招计算机视觉 / 集成工程师；M5 招解决方案工程师；M11 招首位销售 / 伙伴负责人；M16 补第 3 名工程师；M18 配运营；M31 再招第 4 名工程师和第 2 名解决方案工程师
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在重复部署和基准证明压低服务风险之前，团队保持精瘦。'
- id: A11
  name: 创始人总包薪酬
  value: $145K
  unit: USD/year
  source: '[BP team Founder / CEO + startup-finance heuristic] 假设创始人现金薪酬保持克制，但包含薪税和福利。'
- id: A12
  name: 工程岗位总包薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Founding eng + CV and integrations engineer + startup-finance heuristic] 工业集成人才偏资深，但现金水平仍按 pre-seed 公司口径控制。'
- id: A13
  name: 解决方案岗位总包薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Solutions engineer + BP experimentRoadmap 部署-baselining work + startup-finance heuristic] 反映技术实施负责人要扛交付，但不搭大规模服务团队。'
- id: A14
  name: 销售 / 伙伴岗位总包薪酬
  value: $165K
  unit: USD/year
  source: '[BP gtm founder-led outbound + referral / co-sell motion + startup-finance heuristic] 包含高差旅企业销售和浮动激励。'
- id: A15
  name: G&A / 运营岗位总包薪酬
  value: $110K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 覆盖财务、供应商管理、客户资料流转和基础合规运营。'
- id: A16
  name: 薪酬在 P&L 科目间的分摊
  value: Founder 50% S&M / 25% R&D / 25% G&A；engineering 100% R&D；solutions 55% S&M / 45% R&D；sales 100% S&M；ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 在 P&L 科目里分摊总包薪酬，同时反映创始人主导销售和实施偏重的交付结构。'
- id: A17
  name: 非薪酬 opex 爬坡
  value: Y1 早期每月非薪酬 S&M / R&D / G&A 为 $4K / $7K / $5K，到 Q4Y3 升到 $13K / $12K / $9K。
  unit: USD/month
  source: '[BP operations + Research regulatoryTechnicalConstraints + startup-finance heuristic] 覆盖差旅、云、数据存储、法务、保险和现场硬件，不预设付费获客会大规模放量。'
- id: A18
  name: 现金转换口径
  value: 现金变动等于 EBITDA
  unit: formula
  source: '[startup-finance heuristic] 在 pre-seed 阶段，默认 capex、税、融资费用和营运资金时差影响不大。'
- id: A19
  name: 稳态月流失率
  value: 1.5%
  unit: percent per month
  source: '[startup-finance heuristic for industrial workflow SaaS + BP businessModel.expansionLevers + BP whyWeWin evidence graph] 一旦嵌进 FAT/SAT 工作流，项目流失率应当很低，但不会是零。'
- id: A20
  name: CAC 口径
  value: 36 个月累计销售和市场支出 ÷ 24 个净新增活跃项目
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm founder-led expansion motion] CAC 以付费项目为单位，而不是不同客户，因为同一账户内扩张就是核心切口。'
- id: A21
  name: 下一轮融资的里程碑口径
  value: 到 Y2 末，公司应达到 5–9 个付费项目、分布在 3–4 个账户里；混合边缘证据采集正式上线，并有 1 个基准模块试点。
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP product.twelveMonth and twentyFourMonth] 这轮融资的目标，是在种子轮之前把“可重复性”证明跑出来。'
- id: A22
  name: 季度薪酬滚动口径
  value: Y2-Y3 的薪资行按季度内真实入职月份计算，而不是只看季度末快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 这样能让薪资费用和按月招聘节奏保持内部一致。'
