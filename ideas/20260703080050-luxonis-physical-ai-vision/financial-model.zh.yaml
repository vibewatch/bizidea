scenarios:
  downside:
    description: 试点转量产变慢，基准模块附加晚了 1 年，Y3 末同一账户内扩张也更弱。
    y3RevenueK: 1180.0
    y3EbitdaK: -860.0
    cashLowPointK: -760.0
    keyAssumptionChanges:
    - Q4Y3 的活跃项目约为 18 个，而不是 24 个。
    - 实际年化价值停在约 $84K，因为部署包和基准模块附加率偏低。
    - 站点定制工作比计划更重，导致毛利率末值只到约 69%。
  base:
    description: 两家共创客户转成可重复的 OEM 项目，创始人主导销售在少数账户内扩张，基准模块附加从 Y2 末开始起量。
    y3RevenueK: 1595.0
    y3EbitdaK: -519.2
    cashLowPointK: -266.3
    keyAssumptionChanges:
    - 付费项目从 Y1 末的 3 个，增长到 Q4Y3 的 24 个。
    - 随着部署包和基准功能附加，单个活跃项目的实际年化价值到末期接近 $96K。
    - 模板和连接器减少了定制工作，Q4Y3 毛利率升到 73%。
  upside:
    description: 1 家相机伙伴和 1 条 OEM 转介绍渠道加速重复项目增长，而混合边缘复用又抬高了高级模块附加率和毛利率。
    y3RevenueK: 1920.0
    y3EbitdaK: -180.0
    cashLowPointK: -40.0
    keyAssumptionChanges:
    - Q4Y3 的活跃项目约为 27 个，而不是 24 个。
    - 由于基准和漂移模块更早附加，实际年化价值向 $100K 靠近。
    - 混合栈连接器复用快于预期，末期毛利率接近 75%。
sensitivity:
- variable: ARPU
  downsideCase: 高级基准模块和部署包的附加率，比计划低约 15%。
  baseCase: 期末单个活跃项目的实际年化价值达到约 $96K。
  upsideCase: 基准模块附加和第二单元家族范围，把实际年化价值抬向约 $100K。
  y3RevenueImpactK: -240.0
  cashImpactK: -180.0
- variable: CAC
  downsideCase: 创始人主导外呼效果不佳，CAC 抬到每个活跃项目约 $65K。
  baseCase: CAC 稳在约 $49K，因为增长主要来自重复项目和转介绍。
  upsideCase: 伙伴转介绍把 CAC 压在约 $40K。
  y3RevenueImpactK: -60.0
  cashImpactK: -200.0
- variable: 流失率
  downsideCase: 如果签核层显得过窄或过重服务，月流失率会上升到约 2.5%。
  baseCase: 一旦审计轨迹和模板嵌进流程，月流失率稳定在约 1.5%。
  upsideCase: 由于基准历史进入每次部署复盘，月流失率维持在约 1.0%。
  y3RevenueImpactK: -130.0
  cashImpactK: -110.0
- variable: 销售周期
  downsideCase: 试点转量产周期从约 120 天拉长到约 180 天。
  baseCase: 首两家工厂证明节省时间后，付费试点大约一个季度转成量产。
  upsideCase: 如果遇到预算和时点都很急的真实部署，转量产周期有望压到约 90 天。
  y3RevenueImpactK: -260.0
  cashImpactK: -250.0
- variable: 毛利率
  downsideCase: 由于混合边缘和连接器工作仍然定制，末期毛利率只到约 69%。
  baseCase: 第一个单元家族和基准工作流标准化后，末期毛利率达到约 73%。
  upsideCase: 可复用证据模板覆盖大多数后续工厂后，毛利率可到 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: 招聘节奏
  downsideCase: 在还没有基准证明之前，第 4 名工程师和第 2 名解决方案工程师就提前 6 个月入职。
  baseCase: 招聘等到 M31，在重复项目证据已经清晰后再放大。
  upsideCase: 由于连接器和模板复用快于预期，这两位招聘可以再往后推一点。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Rollouts[Live rollout calendars] --> DesignPartners[Paid design-partner programs]
      DesignPartners --> Production[Production subscriptions and rollout packs]
      Production --> Modules[Benchmark and drift modules]
      Modules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入来自活跃付费项目数，从 Y1 末的 3 个增长到 Q4Y3 的 24 个，同时单个项目的实际年化价值向约 $96K 抬升。
- checkName: 必须跑通的环节
  finding: 前几家共创客户必须证明：现场工程工时至少降低 30%，并且足够快地转成重复项目，让少数几个 OEM 账户吃下 Y2 的主要增长。
- checkName: 模型会在哪些地方断掉
  finding: 如果转化周期拖向 180 天，或毛利率长期卡在约 69% 以下，那么在基准模块还没拿到种子轮级别证明之前，下行情景就会把现金打到约 -$0.8M。
- checkName: 下一轮融资证明点
  finding: 种子轮故事应该是：到 Y2 末，在 3–4 个账户里做到 5–9 个付费项目，并拿下混合边缘审批和 1 个基准模块试点。
sanityChecks:
  ruleOf40: Y3 增长 208.5% + EBITDA 利润率 -32.6% = 175.9%
  burnMultiple: Y2 的烧钱倍数约为 2.8x：大约 $1.0M 的 EBITDA burn，对应约 $0.36M 的净新增 ARR；到 Y3，随着重复项目扩张开始复利，指标改善到约 0.3x。
  revenuePerFte: Y3 末 9 名 FTE 对应约 $177K 收入 / FTE（SaaS 基准一般为 $200–400K）
  flags:
  - 即便拿到 $2.0M 的 pre-seed 资金，基准情景下公司在 Q2Y3 现金仍会转负，所以在自我造血前仍需要再融一轮种子轮融资。
  - 收入 / FTE 低于经典 SaaS 基准，因为模型默认到第 3 年仍有不小的实施和证据打包工作。
  - CAC 看起来高效，是因为 customersEop 统计的是活跃项目和同一账户内扩张，而不是不同 OEM 客户。
  - 如果只看纯订阅，Y3 末年化收入跑速略高于研究里的 $2.0M 包装 SOM；这里默认核心约 $75K 项目费之上，还会叠加基准模块和部署包。
  - 现金按 EBITDA 直接建模，所以任何营运资金拖累、硬件预采买或客户特定部署 capex，都会进一步压缩真实跑道。
