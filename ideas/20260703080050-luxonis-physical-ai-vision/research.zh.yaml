competitors:
- name: KEYENCE
  stage: 现有厂商
  wedge: 为工业自动化提供一体化机器视觉硬件、3D 引导和检测工具。
  pricing: 定制报价 / 企业设备销售。
  strength: 装机基数庞大，又在复杂产线条件下积累了照明、外观检测和 3D 引导的实战经验。
  weaknessVsUs: 它卖的是视觉工具，不是跨混合相机与 OEM 技术栈的厂商中立跨站点签核记录。
  sourceRefs:
  - 20
  - 21
  - 22
- name: MVTec
  stage: 现有厂商
  wedge: 面向开发者的工业视觉软件与深度学习工具。
  pricing: 企业 / OEM 授权模式。
  strength: 对集成商友好的软件底座很强，尤其适合高鲁棒性检测、识别和食品包装场景。
  weaknessVsUs: 它仍然是一层工具箱，并不掌握 FAT/SAT 工作流或多站点验收证据。
  sourceRefs:
  - 28
  - 29
- name: Quest
  stage: 现有厂商
  wedge: 面向装箱、顶装系统和操作员可编辑装箱模式的包装 OEM 软件与设备。
  pricing: 随 Quest 系统打包 / 定制报价。
  strength: 和包装买家直接贴得很近，产线末端工作流成熟，而且单元内部已经有可编辑的装箱模式软件。
  weaknessVsUs: 它绑定的是 Quest 设备与模式创建，不是跨后续工厂和混合技术栈的中立感知签核层。
  sourceRefs:
  - 25
  - 26
- name: Robovision
  stage: 成长期公司
  wedge: 服务包装、物流和食品场景的工业视觉 AI 平台。
  pricing: 定制报价 / 企业级部署。
  strength: 比通用 AI 厂商更理解工业 COPQ、班次差异和包装工作流。
  weaknessVsUs: 它的重心是模型部署和检测经济性，不是为存量多站点部署交付签核包。
  sourceRefs:
  - 30
  - 31
- name: Intrinsic
  stage: 成长期公司
  wedge: 带安全云服务与量产级开发环境的横向机器人软件平台。
  pricing: 定制报价 / 预约演示。
  strength: 在安全构建、部署、监控和排障机器人方案上，基础设施能力很强。
  weaknessVsUs: 它天生是横向平台；包装垂直签核厂商仍有机会占住验收内容层。
  sourceRefs:
  - 33
  - 34
