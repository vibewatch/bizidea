openQuestions:
- 到底有多少包装 OEM 已经维护了足够好用的内部 SAT / FAT 模板，以至于会推迟购买独立签核层？
- 在滩头单元家族里，最容易拖慢进度的失效模式到底是眩光、反光膜、SKU 图案、遮挡，还是输送线速度漂移？
- OEM 是否愿意开放足够多的设备、机器人和装箱模式遥测，让中立签核平台成为主记录系统？
- 在食品和受监管工厂里，买家会多强烈地偏好私有边缘证据采集，而不是托管在云端的视频和配置记录？
