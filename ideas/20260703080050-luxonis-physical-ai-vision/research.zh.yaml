    rationale: 估算：美国包装机械制造业共有 523 家机构，其中 50% 可能与二次包装或机器人视觉相关；假设每家平均有 1 个活跃的合格部署项目、年预算约 $75k，则 SAM 约 $19.6M。
    isEstimate: true
    sourceRefs:
    - 10
    - 25
    - 26
  som:
    value: $2.0M
    rationale: 估算：第 3 年做到 27 个活跃 OEM 或集成商项目，ACV 约 $75k，则 SOM 约 $2.0M；前提是公司先拿下少数几家包装 OEM，再在每个账户内从单个项目扩成小组合。
    isEstimate: true
    sourceRefs:
    - 25
    - 26
    - 27
