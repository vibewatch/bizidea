  validationPlan:
  - priority: 高
    question: 前 3 个目标 OEM 每年到底有多少家后续工厂或 SKU 换型，确实会复用同一个单元家族？
    evidenceToGather: 向 3 家包装 OEM 或集成商拿最近的部署日历、工厂数量和装箱模式复用数据。
  - priority: 高
    question: 今天最容易把项目拖到后期重调的失效模式，到底是光照、反光膜、SKU 图案、遮挡，还是输送线语境漂移？
    evidenceToGather: 拿 2 个多站点项目的问题日志、服务工单和工程复盘，并要求做根因标签。
  - priority: 高
    question: 可复用签核包能不能在下一波部署里，把现场工程时间至少砍掉 30%？
    evidenceToGather: 对比 1 次基线部署和 1 次签核辅助部署的 FAT 准备、SAT 执行与安装后调参时间。
  - priority: 中
    question: 相机、机器人和装箱模式厂商能不能吐出足够的遥测与配置状态，让中立层真正成为主记录系统？
    evidenceToGather: 拿 Luxonis、Keyence、Quest 和 2 套参考 OEM 技术栈的 API 文档、样例导出和连接器需求。
