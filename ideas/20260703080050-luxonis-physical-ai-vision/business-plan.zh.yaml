slug: perception-signoff-cloud
date: '2026-07-03'
executiveSummary: 感知签核云瞄准视觉引导包装机器人里从原型到量产的断层：样板单元在一次演示里能跑通，换到后续工厂，却会被不同的光照、反光材料、输送线几何和 SKU 组合击穿。首个客户应是北美二次包装 OEM 或集成商：它已经卖出一套成功的装箱或装盒单元，现在又要做 3–8 个后续部署，而 SAT 日期已经开始悬。产品不去替代相机或视觉栈；它把参考单元的基线相机设置、视频、SKU 定义和验收阈值收进来，再为每个新站点生成可复用的就绪测试、故障分类体系和签核证据。研究支持这个时点判断：Luxonis 明确在为从原型走向量产加码，北美食品和消费品机器人订单在 2024 年增长 65%，而包装买家本来就活在 FAT/SAT 重文档的工作流里。短期市场真实存在，但单靠包装并不够大——研究测得以美国为锚点的初始滩头市场 SAM 约 $19.6M，第 3 年 SOM 约 $2.0M。所以公司必须先把包装场景跑通，再把同一层证据工作流扩到相邻的具身 AI 场景。GTM 应该由创始人主导，直接绑在真实部署日历上；定价按活跃单元家族或部署项目收年费，另收实施和连接器费用。最关键的运营赌注是：可复用签核包能把现场应用工程时间至少砍掉 30%，把一个高差旅、高服务占比的问题，硬生生拧成带基准数据的可防守软件生意。最大的开放风险在于：混合相机和机器人技术栈到底能不能吐出足够的遥测数据；站点差异是否足够重复，避免掉进服务陷阱；以及食品和强监管工厂是否会比计划更早要求混合式或私有边缘部署。
problem:
- 一套视觉引导包装单元在演示或 FAT 里过了关，到了后续工厂却常常失手——光照、反光膜、遮挡、输送线速度和机位变化的速度，比 OEM 默会知识传递得更快。
- 现在的替代方案是现场应用工程师、人工 FAT/SAT 清单、电子表格证据和临时调参。这会拖长投产日期，烧掉稀缺人手，也不给下一次部署留下可复用的证明。
solution:
- 把参考单元的相机配置、视频、SKU 库、验收阈值和现场假设收进来，再为每家新工厂生成可复用的安装前就绪测试和 SAT 证据包。
- 在部署过程中记录异常，跨工厂归类失效模式，并推荐最小化的重调或补采动作来通过签核，让知识持续沉淀，而不是只留在某个工程师脑子里。
whyWeWin:
- 切口是厂商中立的部署证据层，不是再做一套视觉栈；研究覆盖的竞争者卖的是相机、工具、设备或横向 AI 基础设施，但没有谁明确占住混合技术栈下的多站点感知签核。
- 包装 OEM 本来就活在 FAT/SAT 和换型文档流程里，所以产品可以直接对着延迟投产和节省现场服务工时卖，而不是讲抽象的 AI ROI。
- 跨站点的失效模式、验收阈值和修复历史一旦连成图谱，就会变成越来越难复制的基准资产，不是单个 OEM、集成商或相机厂商能轻松补齐的。
strategicChoices:
  beachhead: 北美二次包装 OEM 和机器人集成商，把一类视觉引导的装箱、装盒或上料单元复制到 5–20 家食品、饮料或日化工厂。
  wedgeRationale: 包装是最快能出证据的市场：同一单元家族会反复在不同工厂出现，FAT/SAT 文档本来就有，而一次投产延期会直接打到工程和服务负责人的预算。更广的仓储或通用机器人市场虽然更大，但在公司还没有基准数据和伙伴集成之前，工作流差异太大。
  sequencingRationale: 先盯住一个单元家族、一条正在落地的项目，再用低摩擦的证据采集跑出时间节省效果，别一开始就背上很重的集成面。拿下两到三家共创客户之后，再补连接器、混合边缘采集和基准报告，把产品做黏；只有这样，销售才值得从创始人主导，扩到更广的 OEM 项目和相邻工作流。
  notYet:
  - 在包装模板还没证明可重复复用之前，先不做仓储拣选、拆垛和更广泛的内部物流工作流
  - 先不做通用模型训练、标注或机器人车队管理
  - 先不直接卖终端制造商，绕开真正掌握部署的 OEM 和集成商
market:
  tam: 估算 TAM 为 $207.9M；这里用美国食品、饮料、烟草以及肥皂/清洁用品工厂数量，给北美包装滩头市场做保守代理。
  sam: 估算 SAM 为 $19.6M，覆盖相关的美国二次包装 OEM 与集成商部署项目。
  som: 第 3 年 SOM 约 $2.0M，假设能拿下 27 个活跃项目，ACV 约 $75k。
  segments:
  - 拥有多工厂视觉引导单元家族的北美二次包装 OEM
  - 正把食品、饮料和日化包装部署标准化的机器人集成商
  buyingProcess: 销售往往从一个真实部署里启动：演示单元已经卖到后续工厂，或 SKU 很多的换型让 SAT 风险肉眼可见。日常推动人通常是应用、服务或感知负责人；经济买手多半是工程 VP 或服务管理层，审批走现有项目预算，而不是另开一笔创新预算。
product:
  mvp: MVP 会先把一套已验证参考单元的相机设置、布局、代表性视频、SKU 定义和 SAT 标准收进来，再为下一家工厂生成可复用的就绪测试、异常分类体系和可导出的签核包。起步阶段应以先上传、轻 API 集成为主，而不是一上来就做自动调参——先把证据做出来，再慢慢背负集成复杂度。
  sixMonth: 与两家共创客户各围绕一个包装单元家族落地，交付基线采集、视频导入、SAT 清单生成、问题标注和面向客户的证据导出。
  twelveMonth: 补上一个相机栈、一个机器人 / 控制器事件流，以及一个装箱模式或 OEM 软件导出的连接器；上线混合边缘证据采集，并在至少 10 家工厂或 SKU 换型里跑出差异基准。
  twentyFourMonth: 在 5–7 个 OEM 或集成商账户里支持多项目部署，扩到第二个包装单元家族，并在测试第一个相邻具身 AI 工作流之前，先发布高级基准与漂移模块。
  keyBets:
  - 只要故障分类体系足够结构化，大多数包装感知失效就不需要专门做一轮定制 CV 工程
  - 客户会先接受一套以证据为中心的工作流，再逐步要求自动模型调参
  - 只要覆盖少数几条主流技术栈的连接器，就足以撬动采购和扩张
  - 相较于简单的签核清单，基准数据更难被现有厂商照抄
gtm:
  wedge: 把付费共创客户套餐卖进同一个包装单元家族接下来 3–8 家工厂的部署，用第一次延迟或高风险 SAT 作为强触发事件。
  channels:
  - 创始人主导外呼，直找北美头部包装 OEM 与集成商的应用工程和服务负责人
  - 把共创客户销售绑在 SAT 日期临近的多站点部署项目上
  - 等部署痛点被验证后，再与相机、视觉和包装技术栈厂商做转介绍与联合销售
  funnelTargets: 商机发现->合格落地项目 35%+，合格落地项目->付费试点 40%+，试点->量产 50%+，首个账户在 9 个月内扩到第二家工厂或第二个单元家族。
  pricing: 按活跃单元家族或部署项目收年度订阅费，另收实施、连接器费用和可选的单站点部署包。这种定价贴合 OEM 对关键上线软件的预算方式，也能把 ROI 直接映射到少出差、少复验、更快过 SAT。
businessModel:
  revenueStreams:
  - 按每个活跃单元家族或部署项目收年度订阅
  - 收取上线配置、连接器实施和模板配置费用
  - 对基准对比、漂移监控和面向客户的审计报告模块收高级费用
  unitOfValue: 一个活跃的单元家族或部署项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 先从首家工厂扩到同一项目里的后续工厂和 SKU 变体
  - 在同一个 OEM 或集成商账户里，继续加第二、第三个单元家族
  - 跨站点证据积累后，再卖基准和漂移模块
  - 把同一层签核工作流扩到相邻包装和具身 AI 场景
strategyMap:
  northStarMetric: 后续工厂从安装到感知签核的中位天数
  inputMetrics:
  - 发货前完成就绪测试的目标工厂占比
  - 每次部署的现场应用工程中位工时
  - 试点转量产的转化率
  - 新工厂和 SKU 变化里的模板复用率
  - 每个活跃单元家族完成签核的工厂数
  moatsToBuild:
  - 把光照、材料、输送线语境与修复结果串起来的跨站点故障分类体系
  - 把基线配置、SAT 标准、异常和审批连成一体的验收证据图谱
  - 覆盖混合相机、机器人和 OEM 软件栈的连接器层与基准数据集
  killCriteria:
  - 12 个月后，如果还没有至少两家共创客户在后续工厂把现场工程工时降到 30% 或以上，就停下。
  - 做到第 3 个连接器项目时，如果一半以上部署工作仍要定制数据映射或手工拼证据，说明模型站不住。
  - 18 个月内，如果没有任何试点能转成高于 $60k ACV 的量产订阅，或扩到第二家工厂 / 第二个单元家族，说明扩张逻辑太弱。
  mermaid: |
    flowchart LR
      Wedge[One packaging cell family at 3-8 follow-on plants] --> MVP[Evidence capture and readiness tests]
      MVP --> Proof[On-time SAT with 30% less onsite engineering]
      MVP --> Data[Failure taxonomy and acceptance graph]
      Proof --> Expansion[More plants and a second cell family]
      Data --> Expansion
      Expansion --> Adjacent[Adjacent packaging and physical-AI workflows]
investorMemo:
  verdict:
    call: 值得见面 / 继续尽调
    conviction: 对客户痛点和时点判断有中等把握；只有当一家 OEM 证明部署工时能下降 30%+，并扩到第二个单元家族时，把握才该上升。
    whyBelieve: 包装部署里确实存在直接连着预算的原型到量产痛点，而现有研究覆盖的厂商里，也没有谁明确占住混合技术栈下、厂商中立的签核证据层。
    whyDoubt: 只有当可重复性真的压过服务重力，且包装胜利能很快外溢到相邻工作流时，这个滩头市场才算真正够得上风投回报。
    nextDiligence: 在下一次真实部署里，测清基线 SAT 工时与辅助后 SAT 工时的差异，核实遥测数据是否拿得到，并测试客户在两家工厂成功后是否愿意签量产合同。
  firstCustomer:
    title: 二次包装 OEM 的应用工程总监
    profile: 一家 200–1,500 人的北美包装 OEM 或集成商，拥有一套参考视觉单元，并已排好 3–8 家食品、饮料或日化工厂的后续部署。
    trigger: 一套演示单元已经卖进多家工厂，或项目已经因为感知调参迟迟过不了现场验收而开始滑期。
    buyer: 工程 VP
    initialContract: 先签 $25–40k 的付费共创客户上线配置与实施，等前两家工厂按时过 SAT 后，再转成 $60–90k 的年度项目订阅，并叠加单站点部署包。
  mustBeTrue:
  - 目标 OEM 每年在同一个可复用单元家族上，至少会跑 3 家后续工厂或大规模 SKU 换型
  - 相较于历史基线，产品能把每次部署的现场应用工程工时降到 30% 以上
  - 至少两条主流的相机、机器人和装箱模式技术栈，能吐出足够的配置与事件数据，支撑一层厂商中立的证据层
  - 当 ROI 锚定在出差、延误和 SAT 失手成本上时，买家愿意接受约 $75k 的年度项目定价，再加上线配置费用
  - 包装场景的胜利能在 18 个月内扩到第二个单元家族或相邻工作流，而不会把公司拖成服务业务
  diligenceQuestions:
  - 每个目标账户按单元家族算，一年到底有多少次重复部署？
  - 最近 3 个项目里，从安装到 SAT 一共花了多少天、多少次出差、多少资深工程师工时？
  - 今天哪些相机、机器人和装箱模式系统能导出配置、事件和视频？
  - 当部署滑期时，预算和最终签核权到底掌握在谁手里？
  - 客户内部现有的模板或 OEM 软件，哪些地方已经足够覆盖签核，足以推迟独立采购？
  - 哪些受监管客户会要求私有边缘证据存储，而这会把部署成本推高多少？
operatingAssumptions:
- assumption: 目标账户在每个单元家族上有足够多的重复部署，值得用软件，而不是一单一单做服务。
  basis: research.yaml
  validationTest: 调取前 3 个目标账户未来 12 个月的部署日历；只有当每个单元家族的中位量至少达到 3 家后续工厂或大型 SKU 换型时，才继续推进。
  decisionImpact: 如果不成立，就上探到装机量更大的集成商，或把单位价值从单一单元家族扩宽。
- assumption: 只要能把现场工程时间至少砍掉 30%，买家就愿意付约 $75k ACV，再加上线配置。
  basis: research.yaml
  validationTest: 做两次付费试点定价测试，并把报价里的 ROI 与客户上一次部署真正省下的差旅、服务工时和 SAT 延误做对照。
  decisionImpact: 如果不成立，就缩小产品范围、降低集成成本，或者先把交付方式改成托管服务。
- assumption: 核心相机、机器人和装箱模式系统能吐出足够的配置与事件数据，让平台成为主记录系统。
  basis: research.yaml
  validationTest: 完成一条 Luxonis / OAK 级相机栈、一条机器人 / 控制器栈，以及一个包装 OEM 软件导出的连接器可行性评审，且不能出现关键遥测缺口。
  decisionImpact: 如果不成立，就缩窄支持的技术栈名单，或把产品改成先上传资料的工作流，而不是实时证据层。
- assumption: 食品和受监管工厂会接受“本地采集视频 + 云端存元数据”的混合边缘方案，而不要求全部本地化。
  basis: research.yaml
  validationTest: 和两家食品包装共创客户做安全与 IT 审查，并拿到对拟议保留与脱敏策略的书面批准。
  decisionImpact: 如果不成立，就把私有云或本地部署工作前置，并更早去融更多钱。
- assumption: 头部失效模式在不同工厂之间足够重复，能长出可复用模板，而不是逼出定制咨询。
  basis: idea.yaml
  validationTest: 在至少两个项目里标注前 25 个部署事故，并确认前 10 类失效能解释超过 70% 的问题。
  decisionImpact: 如果不成立，就继续死盯一条更窄的垂直技术栈，或干脆放弃独立软件这条命题。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 和前 10 个目标账户算清部署经济账
  hypothesis: 滩头买家在后续工厂上已经损失了足够多的工程时间、差旅和排期确定性，足以支撑一层独立的签核软件。
  successMetric: 至少 3 个账户愿意分享基线数据，显示每个后续工厂平均需要 2 次以上现场往返、10 天以上资深工程师工时。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 在一条真实部署上跑一次人工陪跑式签核包试点
  hypothesis: 即便大部分流程先靠人工，一套签核工作流也能在下一家工厂发货前提前拦下可预见的感知失效。
  successMetric: 首家辅助工厂至少避开 1 类过去反复出现的失效，并把计划外感知调试天数降低 25% 以上。
  owner: 创始人 / CEO
- horizon: 90–180 天
  experiment: 为一条相机栈、一条机器人栈和一个装箱模式导出做连接器预研
  hypothesis: 80% 的必需证据可以在不为每个站点单独定制工程的情况下拿到。
  successMetric: 3 个连接器预研都能在 3 周内完成，且不存在阻塞性的遥测缺口。
  owner: 计算机视觉与集成工程师
- horizon: 90–180 天
  experiment: 验证买家是否愿意为部署软件付费，而不是只要免费概念验证
  hypothesis: 只要销售锚在真实上线风险上，共创客户就会愿意先付配置费，并提早承诺量产定价。
  successMetric: 拿下 2 个 $20k 以上的付费试点，或转成 $60k ACV 以上的已签量产方案。
  owner: 创始人 / CEO
- horizon: 180–365 天
  experiment: 在食品包装环境里验证混合边缘证据采集
  hypothesis: 安全与质量团队会接受本地采视频、云端托管元数据、审计日志和报告的方案。
  successMetric: 2 家客户的安全审查通过，且不要求全本地部署；其中 1 家受监管客户正式上线。
  owner: 创始工程师
- horizon: 180–540 天
  experiment: 从第一个单元家族扩到第二个单元家族或第二个账户
  hypothesis: 证据模型和故障分类体系具备足够复用性，能在有限定制下支撑扩张。
  successMetric: 1 个客户扩到第二家工厂或第二个单元家族，且第 2 个账户上线时，工作流定制不超过 20%。
  owner: 解决方案工程师
operations:
- 按单元家族、SKU 类别和相机布局维护版本化的验收模板库
- 为视频、相机配置、装箱模式文件和 SAT 标准搭一条带审计日志的证据导入流水线
- 每周与共创客户做一次根因复盘，把每次感知失误都标进共享故障分类体系
- 为受监管工厂设计混合边缘采集与保留策略，包含客户批准的脱敏和存储设置
- 建立面向 1 家相机厂商、1 家机器人 / 控制器厂商和 1 套包装软件栈的伙伴管理流程
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 负责创始人主导销售，把产品定价锚在避免部署延期上，并把共创客户的痛点压缩成一个足够窄的商业切口。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭建证据模型、就绪测试工作流、审计输出和第一版基准数据集，避免一开始就过度搭成通用平台。
- role: 计算机视觉与集成工程师
  startTiming: 第 2 个月
  rationale: 负责相机、机器人和装箱模式连接器，以及决定产品能否成为主记录系统的边缘采集架构。
- role: 解决方案工程师
  startTiming: 第 4 个月
  rationale: 负责项目实施、量化部署节省，并把客户特有经验抽象成可复用模板，而不是定制服务。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 家二次包装付费共创客户
  - 在至少 1 条真实部署上证明现场工程工时下降 30% 或以上
  - 为 1 个单元家族交付可复用签核工作流，并打通 3 类核心数据导入
  - 把 1 个试点转成量产，并扩到至少 2 家工厂
- horizon: 12–24 个月
  items:
  - 在 3–4 个 OEM 或集成商账户里做到 5–7 个量产项目
  - 上线混合边缘部署和面向客户的审计导出
  - 增加第 2 个包装单元家族，并发布基准模块
  - 拿下 2 个来自相机、机器人或包装技术栈的转介绍 / 联合销售伙伴
- horizon: 24–36 个月
  items:
  - 在 6–8 个账户里拿下 20–27 个活跃项目
  - 扩到第 1 个相邻包装或具身 AI 工作流
  - 在混合技术栈中证明模板可复用，同时把毛利率守在 70% 以上
risks:
- risk: 如果相邻场景扩张太慢，只靠包装的需求可能撑不起风投回报。
  likelihood: Medium
  impact: High
  mitigation: 把“能否扩到第二个单元家族”设成第 18 个月的硬门槛；在没证明这套签核层能超出单一包装工作流之前，不要提前扩编。
- risk: 包装 OEM、相机厂商或横向视觉平台可能会把轻量签核功能打包进去。
  likelihood: Medium
  impact: High
  mitigation: 坚持厂商中立，盯住混合技术栈下证据的可迁移性，并交付任何单一厂商都难以补齐的基准能力和审计轨迹。
- risk: 站点差异可能仍然太定制，逼着业务掉进服务陷阱。
  likelihood: Medium
  impact: High
  mitigation: 先死盯一个定义极窄的单元家族，强制做根因标注；只有当模板已覆盖大多数事故时，才扩张。
- risk: 目标技术栈可能拿不出足够的遥测或配置状态，无法支撑可靠自动化。
  likelihood: Medium
  impact: High
  mitigation: 尽早按技术栈筛选账户，准备“先上传资料”的兜底流程，并优先合作那些导出能力足以支撑中立主记录系统的伙伴。
- risk: 食品和受监管工厂可能比预期更早要求私有边缘或本地部署。
  likelihood: Medium
  impact: Medium
  mitigation: 从第一天就按混合部署来设计证据流水线；在存任何量产视频前，先拿到客户批准的保留策略。
- risk: 工业销售周期可能会拉长，直到买家亲历一次痛苦的部署失手。
  likelihood: High
  impact: Medium
  mitigation: 只打 SAT 日期临近的扩张项目，并把定价直接锚在少返工、少滑期的具体节省上。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道要买到的是：围绕一个包装单元家族的共创客户产品、3 个核心集成、混合证据架构、30%+ 部署工时下降的证明，以及在前几个 OEM 账户里可重复的“试点转量产”动作。
