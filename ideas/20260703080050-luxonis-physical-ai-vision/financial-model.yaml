slug: perception-signoff-cloud
date: "2026-07-03"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-03] the model begins with the first full operating month after the dated business plan."
  - id: A2
    name: Opening cash / pre-seed raise
    value: "$2.0M"
    unit: USD
    source: "[BP fundingAsk round pre-seed + BP fundingAsk targetFundingRangeUsd $2-4M + model cash curve] the base case uses the low end of the stated range to reach late-Y2 proof with a six-month buffer."
  - id: A3
    name: Starting paying programs
    value: "0"
    unit: count
    source: "[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid design partners."
  - id: A4
    name: Customer unit definition
    value: "One active cell family or rollout program"
    unit: definition
    source: "[BP businessModel.unitOfValue] customersEop counts paid rollout programs rather than distinct OEM logos."
  - id: A5
    name: Paid design-partner package
    value: "$36K over roughly 3 months (~$12K per month)"
    unit: USD/program
    source: "[BP investorMemo.firstCustomer.initialContract $25-40k onboarding and setup] the model uses the high-middle of the stated setup range for the first live rollout packages."
  - id: A6
    name: Production program annual value and attach
    value: "Core subscriptions start near $75K ARR and exit Y3 at roughly $96K realized annual value after rollout-pack and benchmark/drift attach."
    unit: USD/program/year
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract $60-90k annual subscription plus per-site rollout packs + BP businessModel.revenueStreams] late-Y3 value is above plain subscription because premium modules and rollout packs attach."
  - id: A7
    name: Active program ramp
    value: "3 paid programs by M12, 9 by Q4Y2, and 24 by Q4Y3"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + Research market.som 27 active programs by year 3] the base case lands slightly under the researched program-count ceiling."
  - id: A8
    name: Revenue recognition convention
    value: "End-of-period active programs multiplied by blended realized revenue per program for that period: Y1 pilot-heavy months at $12K-$12K then $11K-$12K per month, Y2 at $18K-$22K per quarter, and Y3 at $21K-$24K per quarter."
    unit: formula
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + startup-finance heuristic] this keeps revenue explicitly tied to active programs and pricing mix."
  - id: A9
    name: Gross margin ramp
    value: "45%-56% in revenue-bearing Y1 months, 61%-69% in Y2, and 70%-73% in Y3"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + Research adoption frictions around mixed-stack integration and food documentation] margins improve as templates and connectors replace bespoke rollout work."
  - id: A10
    name: Hiring timeline
    value: "M1 founder and founding engineer; M3 CV/integrations engineer; M5 solutions engineer; M11 first sales/partnerships hire; M16 third engineer; M18 ops; M31 fourth engineer and second solutions engineer"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until repeat rollouts and benchmark proof reduce services risk."
  - id: A11
    name: Founder loaded compensation
    value: "$145K"
    unit: USD/year
    source: "[BP team Founder / CEO + startup-finance heuristic] assumes lean founder cash compensation plus payroll taxes and benefits."
  - id: A12
    name: Engineering loaded compensation
    value: "$180K"
    unit: USD/year
    source: "[BP team Founding eng + CV and integrations engineer + startup-finance heuristic] industrial integrations talent is senior but still priced at pre-seed cash levels."
  - id: A13
    name: Solutions loaded compensation
    value: "$150K"
    unit: USD/year
    source: "[BP team Solutions engineer + BP experimentRoadmap rollout-baselining work + startup-finance heuristic] reflects technical implementation ownership without building a large services bench."
  - id: A14
    name: Sales / partnerships loaded compensation
    value: "$165K"
    unit: USD/year
    source: "[BP gtm founder-led outbound + referral / co-sell motion + startup-finance heuristic] includes travel-heavy enterprise selling and variable comp."
  - id: A15
    name: G&A / ops loaded compensation
    value: "$110K"
    unit: USD/year
    source: "[BP operations + startup-finance heuristic] covers finance, vendor management, customer paperwork, and basic compliance operations."
  - id: A16
    name: Payroll allocation to P&L lines
    value: "Founder 50% S&M / 25% R&D / 25% G&A; engineering 100% R&D; solutions 55% S&M / 45% R&D; sales 100% S&M; ops 100% G&A"
    unit: allocation
    source: "[BP team role rationales + BP operations] maps loaded payroll into the functional P&L lines while reflecting founder-led sales and implementation-heavy delivery."
  - id: A17
    name: Non-payroll opex ramp
    value: "Monthly non-payroll S&M/R&D/G&A rises from $4K/$7K/$5K in early Y1 to $13K/$12K/$9K by Q4Y3."
    unit: USD/month
    source: "[BP operations + Research regulatoryTechnicalConstraints + startup-finance heuristic] covers travel, cloud, data storage, legal, insurance, and field hardware without assuming paid-demand scale."
  - id: A18
    name: Cash conversion convention
    value: "Cash movement equals EBITDA"
    unit: formula
    source: "[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: A19
    name: Steady-state monthly churn
    value: "1.5%"
    unit: percent per month
    source: "[startup-finance heuristic for industrial workflow SaaS + BP businessModel.expansionLevers + BP whyWeWin evidence graph] once embedded in FAT/SAT workflows, program churn should be low but not zero."
  - id: A20
    name: CAC convention
    value: "Total 36-month sales and marketing spend divided by 24 net new active programs"
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm founder-led expansion motion] CAC is measured per paid program, not per distinct logo, because same-account expansions are core to the wedge."
  - id: A21
    name: Next-round milestone for funding sizing
    value: "By late Y2 the company should have 5-9 paid programs across 3-4 accounts, hybrid-edge evidence capture live, and one benchmark-module pilot."
    unit: milestone
    source: "[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP product.twelveMonth and twentyFourMonth] the raise is sized to reach repeatability proof before a seed round."
  - id: A22
    name: Quarterly salary-roll convention
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than just quarter-end snapshots."
    unit: convention
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the monthly hiring ramp."
