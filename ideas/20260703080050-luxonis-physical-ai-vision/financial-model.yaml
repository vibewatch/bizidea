scenarios:
  downside:
    description: "Pilot-to-production conversion slips, premium benchmark attach lands a year late, and the business exits Y3 with fewer in-account expansions."
    y3RevenueK: 1180.0
    y3EbitdaK: -860.0
    cashLowPointK: -760.0
    keyAssumptionChanges:
      - "Q4Y3 active programs reach about 18 instead of 24."
      - "Realized annual value stalls near $84K because rollout-pack and benchmark attach stay light."
      - "Gross margin exits near 69% because site-specific work remains heavier than planned."
  base:
    description: "Two design partners convert into repeat OEM programs, founder-led selling expands within a few accounts, and benchmark attach begins late in Y2."
    y3RevenueK: 1595.0
    y3EbitdaK: -519.2
    cashLowPointK: -266.3
    keyAssumptionChanges:
      - "Paid programs rise from 3 at Y1 exit to 24 by Q4Y3."
      - "Realized annual value per active program exits near $96K as rollout packs and benchmark features attach."
      - "Gross margin reaches 73% in Q4Y3 as templates and connectors reduce bespoke work."
  upside:
    description: "One camera partner and one OEM referral channel accelerate repeat programs, while hybrid-edge reuse improves premium-module attach and margins."
    y3RevenueK: 1920.0
    y3EbitdaK: -180.0
    cashLowPointK: -40.0
    keyAssumptionChanges:
      - "Q4Y3 active programs reach about 27 instead of 24."
      - "Realized annual value moves toward $100K because benchmark and drift modules attach earlier."
      - "Gross margin exits near 75% as mixed-stack connector reuse improves faster than planned."
sensitivity:
  - variable: ARPU
    downsideCase: "Premium benchmark and rollout-pack attach land about 15% below plan."
    baseCase: "Exit realized annual value per active program reaches about $96K."
    upsideCase: "Benchmark attach and second-cell-family scope lift realized annual value toward about $100K."
    y3RevenueImpactK: -240.0
    cashImpactK: -180.0
  - variable: CAC
    downsideCase: "Founder-led outreach underperforms and CAC rises toward about $65K per active program."
    baseCase: "CAC stays near $49K because most growth comes from repeat programs and referrals."
    upsideCase: "Partner introductions keep CAC near $40K."
    y3RevenueImpactK: -60.0
    cashImpactK: -200.0
  - variable: churn
    downsideCase: "Monthly churn rises to about 2.5% if the signoff layer feels too narrow or too services-heavy."
    baseCase: "Monthly churn holds near 1.5% once audit trails and templates are embedded."
    upsideCase: "Monthly churn stays near 1.0% because benchmark history becomes part of every rollout review."
    y3RevenueImpactK: -130.0
    cashImpactK: -110.0
  - variable: sales cycle
    downsideCase: "Pilot-to-production conversion stretches from roughly 120 days to roughly 180 days."
    baseCase: "Paid pilots convert in about one quarter after the first two plants prove time savings."
    upsideCase: "A live rollout with budget urgency compresses conversion toward roughly 90 days."
    y3RevenueImpactK: -260.0
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: "Gross margin exits near 69% because hybrid-edge and connector work stay bespoke."
    baseCase: "Gross margin exits near 73% after the first cell family and benchmark workflow standardize."
    upsideCase: "Gross margin reaches 75% as reusable evidence templates cover most follow-on plants."
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: hiring pace
    downsideCase: "The fourth engineer and second solutions hire are pulled forward six months before benchmark proof exists."
    baseCase: "Scale hires wait until M31 after repeat-program evidence is visible."
    upsideCase: "Those hires shift slightly later because connectors and templates reuse faster than expected."
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Rollouts[Live rollout calendars] --> DesignPartners[Paid design-partner programs]
      DesignPartners --> Production[Production subscriptions and rollout packs]
      Production --> Modules[Benchmark and drift modules]
      Modules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: "Base revenue comes from expanding active paid programs from 3 at Y1 exit to 24 by Q4Y3 while realized annual value per program rises toward about $96K."
  - checkName: Must go right
    finding: "The first design partners must prove at least 30% lower on-site engineering effort and convert into repeat programs fast enough that a few OEM accounts drive most Y2 growth."
  - checkName: Model breaks if
    finding: "If conversion drifts toward 180 days or gross margin stalls below roughly 69%, the downside case pushes cash toward about negative $0.8M before the benchmark module has seed-ready proof."
  - checkName: Next-round proof
    finding: "The seed story is 5-9 paid programs across 3-4 accounts plus hybrid-edge approval and one benchmark-module pilot by late Y2."
sanityChecks:
  ruleOf40: "Y3 growth 208.5% + EBITDA margin -32.6% = 175.9%"
  burnMultiple: "Y2 burn multiple is about 2.8x using roughly $1.0M of EBITDA burn against about $0.36M of net new ARR; it improves toward about 0.3x in Y3 as repeat-program expansion compounds."
  revenuePerFte: "$177K Y3 on 9 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "The base case still requires a seed round before self-sufficiency because cash turns negative in Q2Y3 even after a $2.0M pre-seed."
    - "Revenue per FTE remains below classic SaaS benchmarks because the model assumes meaningful implementation and evidence-pack work through year 3."
    - "CAC looks efficient only because customersEop counts active programs and in-account expansions, not distinct OEM logos."
    - "Late-Y3 run-rate slightly exceeds the researched $2.0M packaging SOM on a pure-subscription basis because the model assumes benchmark and rollout-pack attach on top of the core ~$75K program fee."
    - "Cash is modeled as EBITDA, so any working-capital drag, hardware prebuy, or customer-specific deployment capex would reduce actual runway."
