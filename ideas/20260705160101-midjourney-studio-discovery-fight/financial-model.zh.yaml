scenarios:
  downside:
    description: 销售周期拉过 90 天的试点形态，按时转化的试点更少，扩展模块的附加也晚于计划。
    y3RevenueK: 2167.5
    y3EbitdaK: -440.3
    cashLowPointK: 108.0
    keyAssumptionChanges:
      - Q4Y3 的 customersEop 只到 8 个而非 9 个，Q3Y3 仅 7 个。
      - 每个付费账户的实现收入比基准季度路径低约 5-10 个百分点。
      - 因出包搭建和覆盖审计仍服务繁重，毛利率只到 70% 出头。
  base:
    description: 第 12 个月落地 3 个付费客户，年化合同向研究测算的 $300K ACV 扩展，打包改进把第 3 年毛利率推到 70% 中段。
    y3RevenueK: 2653.5
    y3EbitdaK: -13.7
    cashLowPointK: 662.5
    keyAssumptionChanges:
      - 付费客户从 M12 的 3 个增长到 Q4Y2 的 6 个、Q4Y3 的 9 个。
      - 每个付费账户的实现收入从约 $100K 的试点升到约 $300K+ 的已部署年化范围。
      - 毛利率从第 1 年末试点繁重的 45-55% 升到第 3 年的 72-76%。
  upside:
    description: 外部律师转介和第二界面扩展提前一到两个季度到来，同时抬高客户数和账户范围。
    y3RevenueK: 3085.5
    y3EbitdaK: 369.1
    cashLowPointK: 877.8
    keyAssumptionChanges:
      - 因转介和重复部署转化更快，Q4Y3 的 customersEop 到 10 个而非 9 个。
      - 第二界面和保全席位扩展把每个账户的实现收入推到高于基准路径的高个位数百分点。
      - 因部署复用同一套证据模板、定制工作更少，毛利率到 70% 高段。
sensitivity:
  - variable: ARPU
    downsideCase: 扩展落地更慢，综合年化账户价值更接近 $275K 而非 $300K+。
    baseCase: 成熟的项目订阅和模块稳定在研究测算的约 $300K ACV。
    upsideCase: 保全、留存和第二界面模块把成熟账户价值推到 $325K 以上。
    y3RevenueImpactK: -265.4
    cashImpactK: -190.0
  - variable: CAC
    downsideCase: 律师转介表现不及预期，综合 CAC 漂向每个付费影视公司账户 $190K。
    baseCase: 第 1-2 年累计 S&M 支出意味着转介飞轮成熟前 CAC 约 $151K。
    upsideCase: 共创客户背书和顾问把有效 CAC 压向 $120K。
    y3RevenueImpactK: -90.0
    cashImpactK: -230.0
  - variable: churn
    downsideCase: 若产品仍是一个窄诉讼应对工具，月度流失升到 3.0%。
    baseCase: 因法务工作流嵌入和年度合同黏性强，月度流失稳定在 2.0% 左右。
    upsideCase: 若这个保险库成为默认的证据记录系统，月度流失维持在 1.0% 左右。
    y3RevenueImpactK: -170.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: 评估到试点、试点到年度的转化拉长到 120-150 天。
    baseCase: 合并的付费试点周期贴近计划的 90 天。
    upsideCase: 紧迫的保全和政策落地把决策压缩到 60-75 天。
    y3RevenueImpactK: -320.0
    cashImpactK: -220.0
  - variable: gross margin
    downsideCase: 因覆盖审计和定制出包工作持续，毛利率卡在 70% 附近。
    baseCase: 到 Q4Y3 毛利率达到约 75% 的稳态。
    upsideCase: 因连接器和出包搭建变成可复用模板，毛利率达到 78%。
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: hiring pace
    downsideCase: 在转介和第二界面需求得到验证之前，就提前招了第二名 GTM 或工程人员。
    baseCase: 招聘遵循商业计划里的窄切口顺序，对着小滩头市场保持精简。
    upsideCase: 因模板减少了定制工作，后续招聘推迟一到两个季度也不影响交付。
    y3RevenueImpactK: 60.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济流
  mermaid: |
    flowchart LR
      Trigger[Preservation notice or AI policy trigger] --> Pilot[Paid readiness pilot]
      Pilot --> Rollout[Annual production rollout]
      Rollout --> Expansion[Hold seats and second-surface expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准收入来自付费影视公司账户从第 1 年末的 3 个增长到 Q4Y3 的 9 个，同时综合账户价值通过范围扩展向研究测算的约 $300K ACV 攀升。
  - checkName: 必须做对的事
    finding: 抓取到出包的工作流必须足够模板化，让 3 名工程师和 2 名解决方案人员能撑起 Q4Y2 的 6 个客户，且毛利率不跌破 70%。
  - checkName: 模型崩掉的条件
    finding: 若试点到年度的转化滑向 120-150 天，或账户价值落到既定定价区间之下，下行情形会把现金底线拉向约 $0.1M，此时转介渠道还没被证明。
  - checkName: 下一轮的证明
    finding: 下一轮融资叙事是到 Q2Y3 有 8 个付费账户、第二个创意界面上线、律师转介开始贡献管道，且季度 EBITDA 接近盈亏平衡。
sanityChecks:
  ruleOf40: 第 3 年增长 76.2% + EBITDA 利润率 -0.5% = 75.7%
  burnMultiple: 第 2 年烧钱倍数约 0.6x——用约 $0.5M 的 EBITDA 烧钱对比从第 1 年末到第 2 年末约 $0.8M 的年化运行收入扩张。
  revenuePerFte: 第 3 年 9 名期末 FTE 上 $295K（基准 $200-400K SaaS）
  flags:
    - 第 1 年的 customersEop 既含付费试点也含年度订阅，所以首年末的经常性 ARR 低于简单客户数所暗示的水平。
    - 第 3 年的收入路径要求公司通过保全、留存和第二界面扩展模块，达到既定 $250K-$350K 年度定价区间的上半段。
    - 只有当部署变得模板化，毛利率才能过 70% 目标；若覆盖审计仍是定制的，业务会滑向服务型面貌。
    - 近期滩头市场只有约 25 个以美国为主的账户，所以在转介之前过度招聘 GTM 会很快损害 CAC 和现金跑道。
    - 现金按 EBITDA 建模、营运资金时点忽略不计；实施预付款或递延收入可能让实际现金略微提前或推后。
