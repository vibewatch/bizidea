slug: studio-ai-evidence-vault
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-08
    unit: YYYY-MM
    source: '[BP date 2026-07-05] 模型从商业计划落款日之后的第一个完整月份开始。'
  - id: A2
    name: 期初现金 / pre-seed 融资额
    value: $2.1M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash trough] 基准情形采用区间偏低但兼顾风险的融资额，能撑到下一个证明点、并留出六个月以上的缓冲。'
  - id: A3
    name: 期初付费客户数
    value: '0'
    unit: count
    source: '[BP milestones 0-12 months + BP investorMemo.firstCustomer] 公司起步时尚无收入，必须先把共创客户转成付费试点。'
  - id: A4
    name: 活跃付费客户的定义
    value: 一个影视公司买家账户内的付费试点或年度项目订阅
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 计入任何已在为试点或项目范围付费的账户。'
  - id: A5
    name: 付费试点定价
    value: 约 90 天内 $100K（约每月 $33.3K）
    unit: USD/account
    source: '[BP gtm.pricing $75k-$125k pilots + BP investorMemo.firstCustomer.initialContract] 基准模型对首批付费就绪试点取中位值。'
  - id: A6
    name: 每个付费账户实现收入的爬坡
    value: M9-M11 每月约 $33.3K 试点收入，M12 每月约 $30.0K 综合值，随后 Q1Y2 $24.0K、Q2Y2 $24.5K、Q3Y2 $25.5K、Q4Y2 $26.0K、Q1Y3 $26.0K、Q2Y3 $26.5K、Q3Y3 $27.0K、Q4Y3 每月 $27.5K
    unit: USD/account/month
    source: '[BP gtm.pricing $250k-$350k annualized conversion + Research bottomUpSizingDrivers blended ACV ~$300k] 实现收入先从试点强度回落到年度合同，再随保全、席位和第二界面模块的附加而攀升。'
  - id: A7
    name: 客户爬坡
    value: M9 1 个、M11 2 个、M12 3 个付费客户；Q1Y2 4 个；Q2Y2 5 个；Q3Y2 5 个；Q4Y2 6 个；Q1Y3 7 个；Q2Y3 8 个；Q3Y3 9 个；Q4Y3 9 个
    unit: customersEop
    source: '[BP milestones + BP gtm.funnelTargets + Research market.som] 基准情形对应第 12 个月 3 个付费客户，第 21 个月达到 5 个，第 3 年末落到研究测算的 9 个客户 SOM 路径。'
  - id: A8
    name: 收入确认口径
    value: 期末付费客户数乘以当月或当季每个账户的综合实现月收入
    unit: formula
    source: '[BP businessModel.unitOfValue + BP gtm.pricing] 这让收入能直接追溯到 customersEop 和定价假设。'
  - id: A9
    name: 毛利率爬坡
    value: 第 1 年末付费月份 45%-55%，第 2 年 60%-70%，第 3 年 72%-76%
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP risks services-heavy deployments + Research willingnessToPay] 早期试点支持繁重，之后出包模板和连接器复用把模型推到 70% 目标之上。'
  - id: A10
    name: 招聘时间线
    value: M1 创始 CEO 和创始工程师；M2 集成工程师；M4 解决方案/法务运营负责人；M9 合作/客户负责人；M16 第三名工程师；M21 第二名解决方案人员；M28 G&A/运营；M31 第二名 GTM 人员
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + BP milestones] 招聘在证明期之前保持精简，等可复制性提升后再补充有限的交付和 GTM 产能。'
  - id: A11
    name: 创始人全负担薪酬
    value: $160K
    unit: USD/year
    source: '[BP team Founding CEO + startup-finance heuristic] 精简的创始人现金薪酬，含工资税和福利。'
  - id: A12
    name: 工程全负担薪酬
    value: $195K
    unit: USD/FTE/year
    source: '[BP team Founding eng and Integrations engineer + startup-finance heuristic] 反映资深产品和连接器人才，同时低于大型影视公司的企业软件现金水平。'
  - id: A13
    name: 解决方案 / 法务运营全负担薪酬
    value: $165K
    unit: USD/FTE/year
    source: '[BP team Solutions and legal-ops lead + startup-finance heuristic] 假设一名资深实施与工作流负责人，能在法务和创意运营之间搭桥。'
  - id: A14
    name: 销售 / 合作全负担薪酬
    value: $175K
    unit: USD/FTE/year
    source: '[BP team Partnerships and account lead + BP gtm.channels + startup-finance heuristic] 含企业账户销售和转介的浮动薪酬与差旅。'
  - id: A15
    name: G&A / 运营全负担薪酬
    value: $115K
    unit: USD/FTE/year
    source: '[BP operations + startup-finance heuristic] 覆盖精简的财务、供应商管理和合规支持，待客户群扩大后启用。'
  - id: A16
    name: 薪酬向损益科目的分摊
    value: 创始人 70% 计入 S&M、30% 计入 G&A；解决方案/法务运营 50% S&M、50% R&D；工程 100% R&D；销售/合作 100% S&M；G&A/运营 100% G&A
    unit: allocation
    source: '[BP team role rationales + BP operations] 把薪酬映射到运营模型所用的职能科目。'
  - id: A17
    name: 非薪酬运营开支爬坡
    value: 月度非薪酬支出从第 1 年初 S&M/R&D/G&A 的 $5K/$6K/$7K 升至 Q4Y3 的 $23K/$16K/$12.5K
    unit: USD/month
    source: '[BP operations + startup-finance heuristic] 覆盖云工具、安全存储、法务、保险、差旅和合作支持，不假设大规模的付费需求生成。'
  - id: A18
    name: 现金转换口径
    value: 现金变动等于 EBITDA
    unit: formula
    source: '[startup-finance heuristic] 在 pre-seed 阶段，资本开支、税、还本付息和营运资金时点均假设可忽略不计。'
  - id: A19
    name: 稳态月度流失率
    value: 2.0%
    unit: percent per month
    source: '[startup-finance heuristic for early enterprise workflow SaaS] 年度合同和法务工作流的嵌入支撑了低流失，但模型对一个新品类仍保持保守。'
  - id: A20
    name: 单位经济口径
    value: LTV = 年度 ARPU ÷ 12 × 毛利率 × 平均生命周期（月）；CAC 回本 = CAC ÷ 每客户月度毛利
    unit: formula
    source: '[startup-finance heuristic] 把标准 SaaS 单位经济算法套用到商业计划的定价和留存假设上。'
  - id: A21
    name: CAC 口径
    value: $151.1K，基于第 1-2 年累计 S&M 支出除以 Q4Y2 的 6 个付费账户
    unit: USD/customer
    source: '[model calc + BP gtm.funnelTargets + BP milestones] 这刻画了在飞轮成熟之前，创始人主导加转介辅助获取一个早期影视公司客户的全负担成本。'
  - id: A22
    name: 融资规模里程碑
    value: 到 Q2Y3，公司应显示 8 个付费账户、一套已验证的第二界面部署模板，以及接近盈亏平衡的季度 EBITDA
    unit: milestone
    source: '[BP milestones 12-24 and 24-36 months + model cash curve] 融资规模按撑到下一轮证明点、同时仍保留六个月以上缓冲来设定。'
  - id: A23
    name: 资金用途结构
    value: 45% 工程、29% GTM、10% G&A、16% 明确缓冲
    unit: allocation
    source: '[headcount plan + non-payroll opex mix + funding buffer heuristic] 大部分现金支持产品和交付产能，另留一小笔明确的储备应对里程碑滑期。'
