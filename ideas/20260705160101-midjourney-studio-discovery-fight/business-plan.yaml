slug: studio-ai-evidence-vault
date: '2026-07-05'
executiveSummary: >-
  Film and episodic studios are moving Midjourney-style ideation into shared
  pre-production workflows just as discovery requests are reaching internal
  prompts, outputs, storyboards, and related metadata. The company sells a
  vendor-neutral evidence vault that continuously captures sanctioned AI
  creative activity by production, then generates matter-scoped legal-hold and
  discovery packets before outside counsel has to reconstruct history from chats
  and exports. The initial beachhead is deliberately narrow: Los Angeles or
  U.S.-centric studios and streamers with centralized storyboard or concept-art
  teams and at least one shared Midjourney workflow across multiple active
  productions. That wedge is credible because the economic buyer already spends
  on preservation, e-discovery, and outside-counsel collection, so the product
  can reallocate existing risk and operations budget rather than invent a
  speculative AI budget line. The go-to-market is one coherent system: sell a
  paid legal-hold-readiness pilot to a Deputy GC triggered by a preservation
  notice or AI policy rollout, sponsor it with the Head of Creative Technology,
  price it by active productions and connected workspaces, and expand only after
  the first matter packet proves faster and narrower than manual collection. The
  strongest moat is a production-level evidence graph linking prompts, outputs,
  edits, release state, and prior matter-response patterns across tools that
  generic holds, DAMs, and provenance labels do not assemble. Two diligence
  gaps remain open: how much relevant workflow actually stays inside sanctioned
  studio-owned workspaces, and whether legal or creative-technology leaders own
  the first budget in practice. If the first two pilots cannot reach useful
  coverage and convert to annual contracts at software-like gross margins, the
  opportunity is a services niche rather than a venture-scale platform.

problem:
  - >-
    Discovery and preservation now reach internal AI storyboarding, ideation,
    prompts, outputs, and related metadata before any asset is publicly
    released, so studios can no longer treat pre-production AI usage as
    disposable scratch work.
  - >-
    The record is fragmented across Midjourney workspaces, Discord or Slack
    channels, Box folders, asset review tools, and manual exports, forcing legal
    teams to over-collect or reconstruct creative history by hand under time
    pressure.
  - >-
    Generic substitutes such as legal holds, storage retention, provenance
    labels, and outside-counsel collections preserve pieces of the story but do
    not create a production-scoped prompt-to-output-to-edit evidence packet with
    release-state context.

solution:
  - >-
    Connect sanctioned Midjourney workspaces plus adjacent Discord, Slack, Box,
    and review surfaces to continuously capture prompts, outputs, user identity,
    timestamps, project tags, and downstream asset references by production.
  - >-
    Apply release-state labels, retention rules, and matter-scoped legal holds
    so counsel can freeze the right sessions and generate narrow discovery
    packets without dumping an entire studio's experimentation history.
  - >-
    Provide a privilege-review workspace and outside-counsel access model that
    turns captured creative exhaust into a repeatable response workflow rather
    than a one-off forensic scramble.

whyWeWin:
  - >-
    The company sits upstream of Relativity-, Everlaw-, Adobe-, and
    collaboration-stack alternatives by capturing evidence before a matter
    exists instead of after custodians and files must already be identified.
  - >-
    Vendor-neutral, production-level lineage across prompts, outputs, edits,
    approvals, and release state is the missing system of record that neither
    native AI vendors nor provenance tools currently own.
  - >-
    Internal IT or creative-ops teams can script exports, but they do not want
    to maintain evolving connector coverage, privilege workflows, and
    matter-ready packet design across legal and creative systems.
  - >-
    Starting with one urgent storyboard-evidence wedge creates referenceable
    proof faster than a broad media-governance platform and compounds into a
    studio-specific evidence graph that becomes harder to replace over time.

strategicChoices:
  beachhead: >-
    Los Angeles and U.S.-centric film, episodic, and streaming-content groups
    with centralized previs or concept-art teams, at least one shared
    Midjourney workflow, and five or more active productions per quarter where
    internal storyboarding can become discoverable.
  wedgeRationale: >-
    Internal storyboard and ideation evidence is the narrowest workflow where
    legal pain, named buyer urgency, and measurable ROI all coincide. A broader
    "AI governance for media" platform would dilute the trigger, multiply
    integrations, and force the company to sell abstract policy instead of a
    live preservation problem.
  sequencingRationale: >-
    Build sanctioned-workspace capture, production tagging, release-state
    classification, and matter-packet generation first because that is the
    minimum product that changes a Deputy GC's response time. Delay broader tool
    coverage, vertical expansion, and scaled sales hiring until one studio
    division shows repeatable coverage and paid conversion, because early
    success depends more on connector accuracy and workflow trust than lead
    volume.
  notYet:
    - Game studios, agencies, and publishers before three studio reference accounts
    - Full public-release provenance or asset-licensing workflows
    - Personal-account capture or employee-surveillance features outside sanctioned enterprise workspaces
    - Full e-discovery review or DAM replacement

market:
  tam: "$24.0M (est. ~80 global studio, streamer, animation, and premium-content groups × ~$300k blended annual platform value)"
  sam: "$7.5M (est. ~25 Los Angeles or U.S.-centric film, episodic, and streaming groups with immediate discovery or policy triggers × ~$300k ACV)"
  som: "$2.7M year-3 (9 customers at roughly $300k each after design-partner deployments and counsel-led referrals)"
  segments:
    - "Primary: U.S.-centric film and episodic studios or streamers with shared Midjourney storyboarding workflows"
    - "Secondary: The same buyer set's adjacent animation, game, or brand-content divisions after the studio wedge is proven"
  buyingProcess: >-
    The Deputy GC for IP or litigation usually initiates after a preservation
    notice, discovery dispute, or internal AI policy rollout, while the Head of
    Creative Technology validates connector scope and workflow fit. Security,
    procurement, and outside counsel then review access boundaries; the first
    contract is most likely a paid design-partner pilot for one division or
    shared workspace before a broader studio rollout.

product:
  mvp: >-
    The MVP covers sanctioned Midjourney workspaces plus Discord, Slack, and Box
    ingest, automatic production-tagging defaults, release-state labels,
    legal-hold freeze, and a privilege-review workspace for one studio division.
    It is intentionally human-reviewed and matter-scoped, not a full studio
    surveillance or e-discovery suite.
  sixMonth: >-
    First design partners live with Midjourney plus one collaboration or
    storage connector, packet generation in under 48 hours for a simulated hold,
    and dashboards for tagged-session coverage, hold-response time, and
    production-level completeness.
  twelveMonth: >-
    Reusable deployment template for additional divisions, outside-counsel
    seats, historical ingest, and one second creative surface such as Runway or
    Frame.io where the same production evidence model can be reused.
  twentyFourMonth: >-
    Vendor-neutral evidence graph spanning Midjourney, Runway, collaboration
    systems, and review assets across multiple divisions, with insurer- and
    counsel-ready reporting and the first adjacent expansion outside film or TV
    only after the core studio wedge is repeatable.
  keyBets:
    - Sanctioned shared workspaces capture enough relevant activity to make the first matter packet credible without policing every personal account
    - Production and release-state tagging can be automated enough that creatives do not revolt against compliance overhead
    - Outside counsel will value matter-scoped packet generation enough to sponsor paid pilots instead of one-off manual collections
    - The same evidence model can extend from Midjourney into adjacent tools without a custom rebuild per vendor

gtm:
  wedge: >-
    Sell "AI storyboard legal-hold readiness" into one studio division using
    shared Midjourney workflows; the first proof point is producing a narrower
    production packet in under 48 hours and eliminating multi-week manual
    reconstruction, not generic AI governance.
  channels:
    - Founder-led outbound to Deputy GCs for IP or litigation and Heads of Creative Technology at Los Angeles studios and streamers
    - Outside-counsel and e-discovery consultant referrals tied to active preservation notices or AI policy reviews
    - Creative-workflow consultants and insurer or governance advisers once the first packet format is validated
  funnelTargets: "Target account → workflow assessment 30–40%; assessment → paid 90-day pilot 25–35%; pilot → annual production rollout 50%+"
  pricing: >-
    Annual enterprise subscription priced by active productions and connected AI
    workspaces, with premium fees for legal holds, outside-counsel seats, and
    long-term retention. Initial pilots should land around $75k–$125k for one
    division or shared workspace and convert toward roughly $250k–$350k
    annualized once the customer expands coverage across 8–15 active
    productions, because the spend replaces manual collection and
    over-disclosure costs rather than adding a new AI experimentation budget.

businessModel:
  revenueStreams:
    - Annual platform subscription by active production and connected workspace
    - Legal-hold, outside-counsel-seat, and long-term-retention modules
    - Historical ingest and deployment fees for prior prompt and asset archives
    - Expansion fees for additional tools, divisions, and insurer or audit reporting
  unitOfValue: Active production with connected AI workspaces under continuous evidence coverage
  targetGrossMarginPct: 70
  expansionLevers:
    - More productions and divisions inside the same studio group
    - Additional creative AI and review surfaces such as Runway and Frame.io
    - Adjacent media buyers such as game studios or agencies after the studio wedge is proven

strategyMap:
  northStarMetric: Active productions that can generate a matter-ready AI evidence packet within 24 hours
  inputMetrics:
    - Percentage of sanctioned AI sessions linked to the correct production
    - Hours from hold trigger to first production-scoped packet
    - Percentage of captured assets with release-state classification
    - Pilot-to-annual conversion rate
    - Average number of productions or workspaces expanded per account
    - Outside-counsel referral-sourced pipeline
  moatsToBuild:
    - Cross-tool evidence graph linking prompts, outputs, edits, users, productions, and release state
    - Studio-specific matter-response playbooks showing what packet scope satisfied counsel and courts
    - Workflow trust with Deputy GCs, outside counsel, and creative-tech teams around privilege and narrow collection
  killCriteria:
    - Fewer than 3 paid design partners by month 12 after 20 or more target-account sales cycles
    - First 2 pilots fail to capture at least 80% of sanctioned storyboard activity or cannot produce a usable packet within 48 hours
    - No pilot converts to an annual contract at $250k or more because buyers still choose manual collection
  mermaid: |
    flowchart LR
      Wedge[Studio AI evidence wedge] --> MVP[Midjourney plus collaboration capture]
      MVP --> Proof[48-hour matter packets with 80% plus sanctioned coverage]
      Proof --> Expansion[More productions tools and adjacent media buyers]

investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Real trigger and credible buyer, but conviction stays moderate until
      coverage and budget ownership are proven in multiple studio accounts.
    whyBelieve: >-
      The Midjourney discovery fight moves internal storyboarding prompts and
      outputs from ignored workflow exhaust into discoverable ESI with a named
      budget owner.
    whyDoubt: >-
      The measured beachhead is small and technically messy, and the company can
      slide into custom services if sanctioned-workspace coverage is weak.
    nextDiligence: >-
      Show three paid design partners, one 48-hour matter packet, and at least
      one pilot conversion to roughly $250k+ annual recurring revenue before
      treating this as a partner-meeting opportunity.
  firstCustomer:
    title: Deputy GC for IP at a studio AI workflow program
    profile: >-
      Los Angeles studio or streamer with 8–15 active productions, one shared
      Midjourney storyboard or concept-art workflow, and outside counsel already
      asking how internal AI use is documented by production.
    trigger: >-
      A preservation notice, discovery dispute, or studio-wide AI policy rollout
      forces legal and creative-tech teams to inventory prompts, outputs, and
      human edits before they can answer counsel safely.
    buyer: Deputy General Counsel for IP and Litigation
    initialContract: >-
      Paid 90-day design-partner pilot of roughly $75k–$125k for one division or
      shared workspace, converting toward a $250k–$350k annual subscription when
      the customer rolls the workflow across 8–15 active productions and adds
      legal-hold plus outside-counsel access.
  mustBeTrue:
    - At least 10 of the ~25 U.S. beachhead accounts already run shared creative-AI workflows across multiple active productions.
    - Deputy GCs will sign a paid pilot before a live sanctions event if the trigger is a preservation notice or policy rollout.
    - Sanctioned-workspace capture plus collaboration and storage ingest can cover at least 80% of relevant storyboard activity in the first two customers.
    - A production-scoped packet can be generated in 48 hours or less and materially reduce outside-counsel collection effort versus manual exports.
    - Relativity, Everlaw, Adobe, and collaboration stacks will not close the upstream capture gap before the startup lands five referenceable accounts.
  diligenceQuestions:
    - Which named studios already run studio-owned Midjourney or Runway workspaces across multiple productions?
    - What is the current time and outside-counsel cost to respond to one AI preservation request by production?
    - Who controls the first budget and procurement path on this joint legal and creative-tech problem?
    - What share of relevant workflow sits outside sanctioned workspaces or disappears behind privacy modes?
    - Do counsel and insurers care enough about release-state lineage to prefer this over generic holds plus manual review?

operatingAssumptions:
  - assumption: >-
      Sanctioned shared workspaces and adjacent enterprise systems contain enough
      of the real workflow to make a first packet useful without capturing every
      personal account or direct message.
    basis: research.yaml
    validationTest: >-
      Inventory the workflow in 5 design-partner accounts and measure whether at
      least 80% of relevant storyboard and ideation sessions can be captured from
      sanctioned tools plus approved imports.
    decisionImpact: >-
      If false, the product becomes a partial governance layer with weaker legal
      value and may need to pivot toward policy enforcement or managed services.
  - assumption: >-
      Deputy GCs can open budget for a paid pilot before a live lawsuit fully
      matures if the offer is framed as legal-hold readiness rather than generic
      AI tooling.
    basis: research.yaml
    validationTest: >-
      Run 15 buyer interviews and target 3 paid pilots or LOIs above $75k tied
      to an active policy, preservation, or governance initiative.
    decisionImpact: >-
      If false, sales will depend on slower emergency-response cycles or lower
      ACV projects, weakening the venture case.
  - assumption: >-
      Customers will convert from a pilot to roughly $250k–$350k annual pricing
      because manual reconstruction and outside-counsel collection costs are
      already high enough to reallocate.
    basis: idea.yaml
    validationTest: >-
      In the first 2 paid pilots, quantify current response cost and require at
      least 1 annual conversion at $250k or more after measured cycle-time
      reduction and narrower packet scope.
    decisionImpact: >-
      If false, pricing or packaging must move downmarket or toward services,
      reducing margin and limiting hiring pace.
  - assumption: >-
      Release-state lineage and matter-scoped packet generation are meaningful
      differentiation versus Relativity-, Adobe-, and collaboration-stack
      alternatives.
    basis: research.yaml
    validationTest: >-
      In competitive pilot reviews, ask buyers and outside counsel to rank the
      top 3 reasons to purchase and confirm this workflow is cited in at least 2
      of the first 3 wins.
    decisionImpact: >-
      If false, the company should partner with incumbents more deeply or narrow
      the product to a connector layer instead of a new system of record.
  - assumption: >-
      The evidence graph can extend from Midjourney into adjacent creative tools
      and divisions without a custom rebuild for each account.
    basis: operator judgment
    validationTest: >-
      By month 12, complete 2 second-surface pilots such as Runway or Frame.io
      using the same core data model and less than 25% bespoke engineering per
      connector.
    decisionImpact: >-
      If false, the business remains constrained to a small wedge and should
      stay capital-efficient rather than funding broad platform claims.

experimentRoadmap:
  - horizon: 0–90 days
    experiment: Buyer and budget map
    hypothesis: >-
      The first contract can be sold to a Deputy GC with a creative-tech sponsor
      before litigation peaks if the offer is tied to legal-hold readiness.
    successMetric: 15 target-account interviews completed, 8 confirm active urgency, and 3 agree to pilot terms or LOIs above $75k
    owner: Founding CEO
  - horizon: 0–90 days
    experiment: Workflow coverage audit
    hypothesis: >-
      Sanctioned Midjourney, Discord, Slack, and Box systems contain most of the
      evidence needed for a production-scoped response packet.
    successMetric: At least 80% of relevant storyboard sessions mapped in 3 sample accounts without requiring personal-account surveillance
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Matter-packet simulation
    hypothesis: >-
      One studio division can generate a usable privilege-reviewed packet in
      under 48 hours using captured workflow data and hold controls.
    successMetric: One end-to-end simulation signed off by outside counsel with packet turnaround under 48 hours
    owner: Solutions and legal-ops lead
  - horizon: 90–180 days
    experiment: First paid studio pilot
    hypothesis: >-
      A production-tagging and hold-readiness workflow can convert from design
      partner to paid deployment when legal and creative-tech sponsors share the
      same success metrics.
    successMetric: One paid pilot live across 5 or more active productions and one shared workspace, with at least 85% tagged-session accuracy
    owner: Founding CEO
  - horizon: 180–365 days
    experiment: Outside-counsel referral channel
    hypothesis: >-
      IP litigators and e-discovery consultants will introduce qualified studio
      accounts if the packet format reduces over-collection and manual scramble.
    successMetric: 5 qualified introductions and 1 closed pilot sourced from counsel or consultant referrals
    owner: Partnerships and account lead
  - horizon: 180–365 days
    experiment: Second-surface expansion test
    hypothesis: >-
      The same production evidence model can extend into Runway or Frame.io
      without breaking packet quality or gross-margin targets.
    successMetric: 2 second-surface deployments completed with less than 25% bespoke engineering effort per connector
    owner: Integrations engineer

operations:
  - "Capture: sanctioned Midjourney, Discord, Slack, and Box data normalized into a production-level evidence graph with chain-of-custody logs."
  - "Governance: project taxonomy, release-state rules, retention windows, and legal-hold triggers managed jointly with creative ops and legal."
  - "Matter response: privilege-review workspace, outside-counsel seats, and export packets scoped by production rather than all-studio dumps."
  - "Security: role-based access, matter isolation, and auditable approvals for every hold, export, and retention override."
  - "Partners: outside IP counsel, e-discovery providers, creative-workflow consultants, and insurer or governance advisers."

team:
  - role: Founding CEO
    startTiming: Month 0
    rationale: >-
      Sells to Deputy GCs and Heads of Creative Technology, runs design-partner
      discovery, and keeps legal, workflow, and pricing choices tied to one
      wedge.
  - role: Founding eng
    startTiming: Month 0
    rationale: >-
      Builds the evidence graph, hold workflow, and first Midjourney, Discord,
      Slack, and Box connectors with auditability from day one.
  - role: Integrations engineer
    startTiming: Month 2
    rationale: >-
      Improves connector depth, historical ingest, and production-tagging
      automation so pilots can reach coverage targets without bespoke scripting.
  - role: Solutions and legal-ops lead
    startTiming: Month 4
    rationale: >-
      Owns deployment design, privilege workflow, and outside-counsel handoffs
      so the first customers measure packet quality, not just data capture.
  - role: Partnerships and account lead
    startTiming: Month 9
    rationale: >-
      Builds the outside-counsel, consultant, and insurer referral channel after
      the first reference customer proves the packet format and pricing.

milestones:
  - horizon: 0–12 months
    items:
      - "Month 3: 15 target-account interviews completed and 2 design-partner LOIs with identified legal and creative-tech sponsors"
      - "Month 6: first simulated hold returns a production-scoped packet in under 48 hours with at least 80% sanctioned-workflow coverage"
      - "Month 9: first paid studio pilot live across one shared Midjourney workspace and 5+ active productions"
      - "Month 12: 3 paid customers, 1 outside-counsel referral source, and 1 pilot converted to roughly $250k+ annual subscription"
  - horizon: 12–24 months
    items:
      - "Month 18: second creative surface integrated at 2 accounts and average packet turnaround under 24 hours"
      - "Month 21: 5 customers and a repeat deployment template that launches a new division in under 30 days"
      - "Month 24: first same-buyer expansion beyond Midjourney into Runway or Frame.io, plus first insurer or governance-driven deal"
  - horizon: 24–36 months
    items:
      - "Month 30: 7 customers and the evidence graph reused across multiple productions at 3 studio groups"
      - "Month 33: at least 50% of new pipeline sourced by referrals or existing-account expansion"
      - "Month 36: 9 customers at roughly the researched $2.7M year-3 SOM and clear evidence on whether adjacent media verticals justify Series A expansion"

risks:
  - risk: Capture blind spots from privacy modes, personal accounts, or unsanctioned creative workflows
    likelihood: High
    impact: High
    mitigation: >-
      Start with sanctioned shared workspaces, measure coverage explicitly,
      require project tagging through policy, and refuse to promise complete
      observability until design-partner data proves it.
  - risk: Split-budget procurement between legal, creative technology, and IT slows deal cycles
    likelihood: High
    impact: High
    mitigation: >-
      Sell one narrow legal-hold-readiness workflow with quantified response-time
      savings, require a named legal and creative-tech champion, and use outside
      counsel as a forcing-function referral source.
  - risk: The beachhead remains too small or too slow because production volumes stay soft
    likelihood: Medium
    impact: High
    mitigation: >-
      Keep burn aligned to a small number of high-ACV accounts, prioritize same-
      buyer expansion across divisions and tools, and delay broader vertical
      hiring until reference sales are repeatable.
  - risk: Native AI vendors or incumbents ship enough logging and hold functionality to look sufficient
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Stay vendor-neutral, emphasize production release-state lineage and
      matter-ready packet design, and integrate with incumbents rather than
      trying to replace their downstream systems.
  - risk: Early deployments become services-heavy custom implementations
    likelihood: Medium
    impact: High
    mitigation: >-
      Limit year-one scope to one storyboard-evidence template, charge
      implementation separately, and reject adjacent feature requests that do not
      improve reusable connector or packet infrastructure.

fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway to build the sanctioned-workspace capture and
    matter-packet product, hire founding engineering plus solutions and
    partner-distribution talent, win 3–5 paid studio pilots, prove 48-hour
    packet generation and $250k+ annual conversion, and decide from evidence
    rather than hope whether broader tool and vertical expansion merits the next
    round.
