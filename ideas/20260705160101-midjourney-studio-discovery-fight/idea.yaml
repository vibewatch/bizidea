differentiator: >-
  Most adjacent vendors focus on what ships publicly, on asset licensing, or on
  generic post-hoc e-discovery. This company owns the missing layer between
  internal creative experimentation and legal response: continuously captured,
  project-scoped AI workflow evidence with privilege and retention controls.
  Because it maps lineage across prompts, outputs, edits, and productions over
  time, it compounds into a studio-specific record generic storage, DLP, or
  legal-hold tools cannot recreate.
