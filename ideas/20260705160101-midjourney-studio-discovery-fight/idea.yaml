jobsToBeDone:
  - job: >-
      When outside counsel asks us to preserve AI storyboarding activity on a
      live production, help our legal and creative-ops teams freeze and package
      the right prompts, outputs, and edits, so we can respond without halting
      pre-production.
    currentAlternative: "Manual exports from shared workspaces, asset folders, and chat threads."
    successMetric: "Hours to issue a complete legal hold and percentage of captured sessions tied to the correct production."
  - job: >-
      When we roll out a new internal AI ideation workflow, help us separate
      backstage experimentation from approved downstream assets, so we can govern
      use and answer policy questions later.
    currentAlternative: "Internal policy docs, spreadsheet attestations, and disconnected vendor logs."
    successMetric: "Percentage of AI sessions with project tags and time to answer a policy or diligence questionnaire."
