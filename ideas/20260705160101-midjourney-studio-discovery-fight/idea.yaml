problem: >-
  Film and episodic studios are adopting generative-image tools for internal
  storyboards, mood boards, and concept ideation, but they rarely keep a
  matter-ready record of who prompted what, on which project, and whether the
  output ever left pre-production. When a copyright dispute arrives, legal teams
  have to reconstruct prompts, outputs, and human edits from chat threads, asset
  folders, and vendor dashboards. The Midjourney discovery fight shows that
  internal-only AI use can now become evidence, not just a creative experiment.
  That creates a new budget line for software that preserves AI creative exhaust
  before litigation forces a chaotic scramble.
targetUser:
  primary: "Head of Creative Technology or AI creative-ops lead at a film or episodic studio running shared Midjourney storyboarding workflows."
  secondary: "Deputy GC for IP litigation, outside counsel, and e-discovery managers responsible for preservation and production in AI-rights disputes."
  buyer: "Deputy General Counsel for IP and Litigation, with the Head of Creative Technology as technical sponsor."
startupThesis:
  nonObviousInsight: >-
    The unprotected surface is not finished AI media; it is the backstage
    creative exhaust that studios assumed would stay ephemeral. If fair-use and
    industry-custom defenses hinge on internal storyboards, ideation prompts,
    rejected outputs, and edit history, the system of record has to sit upstream
    of release, inside pre-production, before a dispute starts.
  beachhead: >-
    Los Angeles film and episodic studios plus streaming-content groups with
    centralized previsualization or concept-art teams using Midjourney for
    internal storyboards or ideation across five or more active productions per
    quarter.
  wedge: >-
    A litigation-ready evidence vault that automatically captures prompts,
    outputs, project tags, human edits, and release status for internal
    Midjourney storyboard and ideation workflows, then generates legal-hold and
    discovery packets by production.
  whyNowCatalyst: >-
    Midjourney's push to force disclosure of internal storyboarding, ideation,
    and full prompt and output histories makes backstage AI usage an immediate
    litigation and governance problem for studios.
  ventureScalePath: >-
    Start with Hollywood pre-production and copyright-discovery readiness, then
    expand into game studios, advertising agencies, publishers, and enterprise
    brand teams that need a cross-tool system of record for AI-assisted media
    creation, rights diligence, and counsel-ready evidence.
solution: >-
  The product connects to sanctioned Midjourney workspaces, creative review
  channels, and asset libraries, then stamps each prompt and output with
  project, user, timing, and downstream-use metadata. It separates purely
  internal ideation from assets approved for external use, so counsel can answer
  narrower questions without dumping an entire studio's experimentation history.
  When a dispute or preservation notice lands, the system freezes relevant
  sessions, maps output lineage to edits and exports, and opens a privilege-
  review workspace instead of a raw file scramble. Policy rules can require
  project tagging, retention windows, and manager approval for shared AI
  workspaces, giving studios defensible process before a court ever asks. Over
  time, the vault becomes the canonical evidence layer studios, outside counsel,
  and insurers trust when evaluating AI-assisted productions.
goToMarketSeed:
  firstCustomer: >-
    A Los Angeles studio or streaming-content group with eight to fifteen active
    productions, one shared Midjourney workspace for storyboard and concept-art
    teams, and outside counsel already asking how internal AI use is documented
    across projects.
  buyingTrigger: >-
    A discovery request, outside-counsel preservation notice, or new studio AI
    policy that forces the team to inventory storyboarding and ideation activity
    across productions.
  currentAlternative: "Chat exports, shared-drive folders, manual vendor dashboard pulls, and ad hoc outside-counsel e-discovery collections."
  switchingReason: >-
    The first customer switches because the vault creates a project-scoped,
    continuously captured evidence record before a dispute hits, reducing
    over-disclosure risk and preventing production teams from spending weeks
    reconstructing prompt history by hand.
  pricingHypothesis: >-
    Annual enterprise subscription priced by active productions and connected AI
    workspaces, with premium fees for legal holds, outside-counsel seats, and
    long-term evidence retention.
