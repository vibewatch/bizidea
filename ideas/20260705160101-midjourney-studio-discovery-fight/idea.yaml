  - name: "Split-budget sales motion"
    description: "Legal feels the discovery pain, but creative-tech or IT may own the tools and budget, slowing deal cycles."
    mitigation: "Sell one quantified matter-response workflow with joint legal and creative-ops champions plus outside-counsel validation."
