slug: studio-ai-evidence-vault
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: YYYY-MM
    source: '[BP date 2026-07-05] the model starts in the first full month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.1M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash trough] base case uses a low-end but risk-aware raise that reaches the next proof point with more than six months of buffer.'
  - id: A3
    name: Starting paying customers
    value: '0'
    unit: count
    source: '[BP milestones 0-12 months + BP investorMemo.firstCustomer] the company starts pre-revenue and must first convert design partners into paid pilots.'
  - id: A4
    name: Active paying customer definition
    value: A paid pilot or annual production subscription inside one studio buyer account
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop includes any account already paying for pilot or production scope.'
  - id: A5
    name: Paid pilot pricing
    value: $100K over about 90 days (~$33.3K per month)
    unit: USD/account
    source: '[BP gtm.pricing $75k-$125k pilots + BP investorMemo.firstCustomer.initialContract] the base model uses the midpoint for first paid readiness pilots.'
  - id: A6
    name: Realized revenue per paying account ramp
    value: M9-M11 about $33.3K/month pilot revenue, M12 about $30.0K/month blended, then Q1Y2 $24.0K, Q2Y2 $24.5K, Q3Y2 $25.5K, Q4Y2 $26.0K, Q1Y3 $26.0K, Q2Y3 $26.5K, Q3Y3 $27.0K, Q4Y3 $27.5K per month
    unit: USD/account/month
    source: '[BP gtm.pricing $250k-$350k annualized conversion + Research bottomUpSizingDrivers blended ACV ~$300k] realized revenue steps down from pilot intensity into annual contracts, then climbs as hold, seat, and second-surface modules attach.'
  - id: A7
    name: Customer ramp
    value: M9 1, M11 2, M12 3 paying customers; Q1Y2 4; Q2Y2 5; Q3Y2 5; Q4Y2 6; Q1Y3 7; Q2Y3 8; Q3Y3 9; Q4Y3 9
    unit: customersEop
    source: '[BP milestones + BP gtm.funnelTargets + Research market.som] the base case matches 3 paid customers by month 12, reaches 5 by month 21, and ends year 3 at the researched 9-logo SOM path.'
  - id: A8
    name: Revenue recognition convention
    value: Period-end paying customers multiplied by the blended realized monthly revenue per account for that month or quarter
    unit: formula
    source: '[BP businessModel.unitOfValue + BP gtm.pricing] this keeps revenue directly traceable to customersEop and pricing assumptions.'
  - id: A9
    name: Gross margin ramp
    value: Late Y1 paid months 45%-55%, Y2 60%-70%, Y3 72%-76%
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP risks services-heavy deployments + Research willingnessToPay] early pilots are support-heavy before packet templates and connector reuse push the model above the 70% target.'
  - id: A10
    name: Hiring timeline
    value: M1 founder CEO and founding engineer; M2 integrations engineer; M4 solutions/legal-ops lead; M9 partnerships/account lead; M16 third engineer; M21 second solutions hire; M28 G&A/ops; M31 second GTM hire
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + BP milestones] hiring stays narrow through proof, then adds limited delivery and GTM capacity after repeatability improves.'
  - id: A11
    name: Founder loaded compensation
    value: $160K
    unit: USD/year
    source: '[BP team Founding CEO + startup-finance heuristic] lean founder cash pay with payroll taxes and benefits.'
  - id: A12
    name: Engineering loaded compensation
    value: $195K
    unit: USD/FTE/year
    source: '[BP team Founding eng and Integrations engineer + startup-finance heuristic] reflects senior product and connector talent while staying below large-studio enterprise-software cash levels.'
  - id: A13
    name: Solutions / legal-ops loaded compensation
    value: $165K
    unit: USD/FTE/year
    source: '[BP team Solutions and legal-ops lead + startup-finance heuristic] assumes a senior implementation and workflow owner who bridges legal and creative operations.'
  - id: A14
    name: Sales / partnerships loaded compensation
    value: $175K
    unit: USD/FTE/year
    source: '[BP team Partnerships and account lead + BP gtm.channels + startup-finance heuristic] includes variable compensation and travel for enterprise account selling and referrals.'
  - id: A15
    name: G&A / ops loaded compensation
    value: $115K
    unit: USD/FTE/year
    source: '[BP operations + startup-finance heuristic] covers lean finance, vendor management, and compliance support once the customer base broadens.'
  - id: A16
    name: Payroll allocation to P&L lines
    value: Founder 70% S&M and 30% G&A; solutions/legal-ops 50% S&M and 50% R&D; engineering 100% R&D; sales/partnerships 100% S&M; G&A/ops 100% G&A
    unit: allocation
    source: '[BP team role rationales + BP operations] maps payroll into the functional lines used in the operating model.'
  - id: A17
    name: Non-payroll opex ramp
    value: Monthly non-payroll spend rises from S&M/R&D/G&A of $5K/$6K/$7K early in Y1 to $23K/$16K/$12.5K by Q4Y3
    unit: USD/month
    source: '[BP operations + startup-finance heuristic] covers cloud tools, secure storage, legal, insurance, travel, and partner support without assuming broad paid demand generation.'
  - id: A18
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: formula
    source: '[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at this pre-seed stage.'
  - id: A19
    name: Steady-state monthly churn
    value: 2.0%
    unit: percent per month
    source: '[startup-finance heuristic for early enterprise workflow SaaS] annual contracts and legal-workflow embed support low churn, but the model stays conservative for a new category.'
  - id: A20
    name: Unit economics convention
    value: LTV = annual ARPU ÷ 12 × gross margin × average life in months; CAC payback = CAC ÷ monthly gross profit per customer
    unit: formula
    source: '[startup-finance heuristic] standard SaaS unit-economics math is applied to the business-plan pricing and retention assumptions.'
  - id: A21
    name: CAC convention
    value: $151.1K based on cumulative Y1-Y2 S&M spend divided by 6 paying accounts at Q4Y2
    unit: USD/customer
    source: '[model calc + BP gtm.funnelTargets + BP milestones] this captures the fully loaded founder-led and referral-assisted cost to acquire an early studio logo before the flywheel matures.'
  - id: A22
    name: Funding-sizing milestone
    value: By Q2Y3 the company should show 8 paying accounts, one proven second-surface deployment template, and quarterly EBITDA near breakeven
    unit: milestone
    source: '[BP milestones 12-24 and 24-36 months + model cash curve] the raise is sized to reach the next round proof point and still preserve more than six months of buffer.'
  - id: A23
    name: Use-of-funds mix
    value: 45% Engineering, 29% GTM, 10% G&A, 16% explicit buffer
    unit: allocation
    source: '[headcount plan + non-payroll opex mix + funding buffer heuristic] most cash supports product and delivery capacity, with a smaller but explicit reserve for milestone slippage.'
