scenarios:
  downside:
    description: Sales cycles extend beyond the 90-day pilot shape, fewer pilots convert on time, and expansion modules attach later than planned.
    y3RevenueK: 2167.5
    y3EbitdaK: -440.3
    cashLowPointK: 108.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 8 instead of 9, with only 7 by Q3Y3.
      - Realized revenue per paying account stays about 5-10 percent below the base quarterly path.
      - Gross margin reaches only the low-70s because packet setup and coverage audits remain services-heavy.
  base:
    description: Three paid customers land by month 12, annualized contracts expand toward the researched $300K ACV, and packaging improves gross margin into the mid-70s by Y3.
    y3RevenueK: 2653.5
    y3EbitdaK: -13.7
    cashLowPointK: 662.5
    keyAssumptionChanges:
      - Paid customers progress from 3 at M12 to 6 at Q4Y2 and 9 at Q4Y3.
      - Realized revenue per paying account rises from roughly $100K pilots to roughly $300K-plus deployed annualized scope.
      - Gross margin moves from pilot-heavy 45-55 percent in late Y1 to 72-76 percent across Y3.
  upside:
    description: Outside-counsel referrals and second-surface expansion arrive one to two quarters earlier, lifting both logo count and account scope.
    y3RevenueK: 3085.5
    y3EbitdaK: 369.1
    cashLowPointK: 877.8
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 10 instead of 9 because referrals and repeat deployments convert faster.
      - Second-surface and hold-seat expansion push realized revenue per account above the base path by high single digits.
      - Gross margin reaches the high-70s as deployments reuse the same evidence template with less custom work.
sensitivity:
  - variable: ARPU
    downsideCase: Expansion lands slower and blended annualized account value stays closer to $275K than $300K-plus.
    baseCase: Mature production subscriptions and modules settle near the researched ~$300K ACV.
    upsideCase: Hold, retention, and second-surface modules push mature account value above $325K.
    y3RevenueImpactK: -265.4
    cashImpactK: -190.0
  - variable: CAC
    downsideCase: Counsel referrals underperform and blended CAC drifts toward $190K per paying studio account.
    baseCase: Cumulative Y1-Y2 S&M spend implies about $151K CAC before the referral flywheel matures.
    upsideCase: Design-partner references and consultants lower effective CAC toward $120K.
    y3RevenueImpactK: -90.0
    cashImpactK: -230.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.0 percent if the product remains a narrow matter-response tool.
    baseCase: Monthly churn holds near 2.0 percent because legal-workflow embed and annual contracts are sticky.
    upsideCase: Monthly churn stays near 1.0 percent if the vault becomes the default evidence system of record.
    y3RevenueImpactK: -170.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: Assessment-to-pilot and pilot-to-annual conversion stretch toward 120-150 days.
    baseCase: The combined paid-pilot cycle stays close to the planned 90 days.
    upsideCase: Urgent holds and policy rollouts compress decisions toward 60-75 days.
    y3RevenueImpactK: -320.0
    cashImpactK: -220.0
  - variable: gross margin
    downsideCase: Gross margin stalls near 70 percent because coverage audits and custom packet work persist.
    baseCase: Gross margin reaches roughly 75 percent steady-state by Q4Y3.
    upsideCase: Gross margin reaches 78 percent as connector and packet setup become repeatable templates.
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: hiring pace
    downsideCase: A second GTM or engineering hire is pulled forward before referrals and second-surface demand are proven.
    baseCase: Hiring follows the narrow-wedge sequence in the business plan and stays lean against the small beachhead.
    upsideCase: Later hires slip one to two quarters without hurting delivery because templates reduce custom work.
    y3RevenueImpactK: 60.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[Preservation notice or AI policy trigger] --> Pilot[Paid readiness pilot]
      Pilot --> Rollout[Annual production rollout]
      Rollout --> Expansion[Hold seats and second-surface expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from growing paying studio accounts from 3 at Y1 exit to 9 by Q4Y3 while blended account value rises toward the researched ~$300K ACV through scope expansion.
  - checkName: Must go right
    finding: The capture-and-packet workflow must stay template-driven enough that 3 engineers and 2 solutions hires can support 6 customers by Q4Y2 without gross margin stalling below 70 percent.
  - checkName: Model breaks if
    finding: If pilot-to-annual conversion slips toward 120-150 days or account value lands below the stated pricing band, the downside case drives the cash floor toward roughly $0.1M before the referral channel is proven.
  - checkName: Next-round proof
    finding: The next financing story is 8 paying accounts by Q2Y3 with a second creative surface live, counsel-sourced referrals contributing pipeline, and quarterly EBITDA close to breakeven.
sanityChecks:
  ruleOf40: Y3 growth 76.2% + EBITDA margin -0.5% = 75.7%
  burnMultiple: Y2 burn multiple is about 0.6x using roughly $0.5M of EBITDA burn against about $0.8M of annualized run-rate expansion from Y1 exit to Y2 exit.
  revenuePerFte: $295K Y3 on 9 ending FTE (benchmark $200-400K SaaS)
  flags:
    - Y1 customersEop includes paid pilots as well as annual subscriptions, so recurring ARR at the first year-end is lower than the simple customer count suggests.
    - The Y3 revenue path requires the company to reach the upper half of the stated $250K-$350K annual pricing band through hold, retention, and second-surface expansion modules.
    - Gross margin only clears the 70 percent target if deployments become template-driven; if coverage audits stay custom, the business can slide toward a services profile.
    - The near-term beachhead is only about 25 U.S.-centric accounts, so over-hiring GTM ahead of referrals would quickly damage CAC and runway.
    - Cash is modeled as EBITDA with immaterial working-capital timing; implementation prepayments or deferred revenue could move actual cash somewhat earlier or later.
