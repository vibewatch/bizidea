categoryDynamics:
  growthRate: 10.4% CAGR（相邻电子取证软件，2025-2030）
  growthRateSourceRefs:
    - 40
  tailwinds:
    - point: 这场诉讼和法院文件，把内部提示词、产出和分镜记录变成了一个明确的调证议题，而不是一个假设性的治理问题。
      sourceRefs:
        - 1
        - 2
        - 4
    - point: 影视公司和电视网正从 AI 试验走向前期制作、开发和营销中的点名厂商合作。
      sourceRefs:
        - 32
        - 33
        - 34
    - point: 保全、留存和溯源的基本能力已在协作和内容系统里存在，为一层专用底座降低了技术采用门槛。
      sourceRefs:
        - 22
        - 23
        - 24
        - 29
        - 30
  headwinds:
    - point: 洛杉矶的制作量以及更广的电视或电影开机量仍低于此前预期，可能拖慢新系统的采购。
      sourceRefs:
        - 35
        - 36
        - 37
    - point: 在买家亲历一场进行中纠纷的完整重建负担之前，通用法务保全和协作栈可能看上去够用了。
      sourceRefs:
        - 26
        - 27
        - 29
        - 30
        - 31
    - point: 原生 AI 厂商的隐私模式和零散日志，让完整抓取比第一眼听上去更难。
      sourceRefs:
        - 6
        - 7
        - 8
        - 31
competitors:
  - name: RelativityOne
    stage: incumbent
    wedge: 法务保全、收集、审阅和 AI 辅助的法务工作流。
    pricing: 定制企业订阅
    strength: 深厚的法务信任、成熟的保全工作流，以及强大的下游审阅工具。
    weaknessVsUs: 通常在纠纷已存在后才介入，且不会在影视公司创意工作流内部原生抓取提示词、产出和发布状态脉络。
    sourceRefs:
      - 26
      - 40
  - name: Everlaw
    stage: scale-up
    wedge: 云原生电子取证，带法务保全、协作和 AI 辅助。
    pricing: 定制企业订阅
    strength: 易用的云工作流、来源留存，以及面向内部法务团队的审计轨迹协作。
    weaknessVsUs: 仍聚焦在锁定保管人之后的留存和审阅，而非持续的上游创意抓取。
    sourceRefs:
      - 27
      - 40
  - name: Adobe Content Credentials + Frame.io
    stage: incumbent
    wedge: 面向媒体工作流的创意审阅、素材历史和溯源标签。
    pricing: Adobe 企业创意栈支出 / 定制工作流套餐
    strength: 比法务科技现有厂商更贴近素材审阅和溯源，创意工作流可信度清晰。
    weaknessVsUs: 溯源和审阅语境有帮助，但默认不产出法务保全范围、提示词历史或可用于诉讼的证据包。
    sourceRefs:
      - 24
      - 25
  - name: Credo AI
    stage: scale-up
    wedge: 企业 AI 治理登记册、风险库和政策映射。
    pricing: 定制企业订阅
    strength: 强在跨业务单元的 AI 治理控制和政策工作流。
    weaknessVsUs: 为模型和用例治理而优化，而非影视公司前期制作证据那种杂乱的素材级脉络。
    sourceRefs:
      - 21
      - 28
  - name: Slack + Box + Discord 手工收集栈
    stage: incumbent
    wedge: 现有的协作、存储和管理日志工具，搭配外部律师的收集工作。
    pricing: 现有企业订阅加外部律师收集成本
    strength: 已经部署到位，能在系统层面保住记录的一部分。
    weaknessVsUs: 跨工具零散、发布状态薄弱，当提示词和产出必须打包在一起时重建很慢。
    sourceRefs:
      - 29
      - 30
      - 31
regulatoryTechnicalConstraints:
  - point: 当相关且在控制范围内时，规则 26 和 34 把提示词、产出、图像及相关元数据变成可调证的 ESI；规则 37 在留存失败时抬高制裁风险。
    sourceRefs:
      - 13
      - 14
      - 15
  - point: 版权法定赔偿可按作品逐件累加，放大草率证据边界的代价。
    sourceRefs:
      - 16
  - point: 版权局正另行审视数字复制品、产出可版权性和训练，所以影视公司的 AI 政策会持续变动。
    sourceRefs:
      - 9
      - 10
      - 11
      - 12
  - point: WGA 规则要求在向编剧提供 AI 生成材料时披露，催生了对溯源和工作流标注的运营需求。
    sourceRefs:
      - 20
  - point: Discord 审计日志保留 45 天、Slack 法务保全有范围限制，所以单靠原生协作日志不足以充当长周期的记录系统。
    sourceRefs:
      - 30
      - 31
validationSignals:
  - point: Midjourney 在调证中明确索要内部 AI 商业计划、分镜用途以及完整的提示词或产出历史。
