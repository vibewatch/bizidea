  adoptionFrictionMatrix:
    - friction: Capturing complete Midjourney activity across public channels, private servers, and privacy modes
      severity: high
      affectedBuyer: Head of Creative Technology
      mitigation: Start with sanctioned workspaces, require project tagging, and ingest adjacent collaboration and storage systems rather than waiting for perfect native coverage.
      sourceRefs:
        - 6
        - 7
        - 8
        - 31
    - friction: Limiting over-collection and privilege risk while still satisfying holds
      severity: high
      affectedBuyer: Deputy GC for IP and Litigation
      mitigation: Default to matter-scoped holds, privilege-review workspaces, and narrower production packets instead of all-studio dumps.
