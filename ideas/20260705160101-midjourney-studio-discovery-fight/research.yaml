openQuestions:
  - How much sanctioned Midjourney activity in target studios actually occurs inside studio-owned Discord servers versus personal accounts or direct messages?
  - 'Which buyer owns the first budget line in practice: IP litigation, creative technology, IT, or insurer-driven risk management?'
  - How far do outside counsel and insurers need release-state lineage versus simple prompt or output preservation before they treat the product as mandatory?
  - Can the startup capture enough metadata without a richer Midjourney admin surface, or must year-one scope lean harder on sanctioned workflows and adjacent systems?
