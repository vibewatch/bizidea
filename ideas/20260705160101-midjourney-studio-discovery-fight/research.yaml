reportMemo:
  executiveTakeaways:
    - 'The wedge is upstream preservation of creative AI exhaust: discovery is already reaching internal storyboarding, ideation, prompts, and outputs, not only shipped assets.'
    - Budget adjacency is strong because legal hold, e-discovery, and creative workflow systems already absorb the cost of manual preservation and review.
    - The first credible buyer is the Deputy GC for IP or litigation with a creative-technology sponsor, not the art department alone.
    - The strongest substitutes are generic holds, storage exports, and provenance labels, so the startup must win on cross-tool capture plus matter-ready packaging.
    - 'Execution risk is mainly technical coverage: Midjourney activity spans privacy modes and Discord contexts while native logs are time-limited or fragmented.'
  marketDefinition: >-
    Software that preserves and packages internal generative-media evidence for film and TV production teams: prompts, outputs, edits, approvals, release status, and legal-hold context across creative AI and collaboration tools.
  customerAndBuyer: >-
    Primary users are AI creative-ops leaders, production technology managers, and litigation-support staff who need to freeze and reconstruct creative workflows by production. The economic buyer is usually the Deputy GC for IP or litigation, with the Head of Creative Technology as the operational sponsor because the problem crosses legal risk, workflow governance, and pre-production continuity.
  buyingTriggers:
    - point: A discovery request or preservation notice now reaches internal AI prompts, outputs, and storyboarding work, forcing studios to identify custodians and ESI before public release is even at issue.
      sourceRefs:
        - 1
        - 2
        - 4
        - 13
        - 14
        - 17
        - 19
    - point: A sanctioned rollout of Runway-style or Midjourney-based pre-production workflows creates pressure to separate internal experimentation from release-ready assets and to keep project-level histories.
      sourceRefs:
        - 6
        - 7
        - 8
        - 32
        - 33
        - 34
    - point: Union, copyright, and AI-governance scrutiny makes buyers ask what AI-generated material was provided to writers, how outputs were created, and whether training or rights questions can be answered later.
      sourceRefs:
        - 9
        - 10
        - 11
        - 12
        - 20
        - 21
  willingnessToPay:
    summary: >-
      Willingness to pay is credible because the problem already burns budget in adjacent systems: legal holds, e-discovery review, collaboration retention, and outside-counsel collection. The startup is not inventing a new line item so much as collapsing manual matter-response work into a cross-tool evidence layer before sanctions, statutory damages, or expensive over-collection arrive.
    sourceRefs:
      - 16
      - 18
      - 19
      - 26
      - 27
      - 29
      - 30
      - 40
  competitiveLandscape: >-
    Competition is fragmented across e-discovery, collaboration retention, creative provenance, and enterprise AI governance. No incumbent owns the narrow system-of-record layer that continuously captures prompts, outputs, human edits, and release status by production before a matter exists.
  incumbentThesis:
    - incumbentClass: E-discovery platforms
      point: Relativity-class and Everlaw-class platforms are trusted once a matter exists, but they are optimized for legal hold, collection, and review after the preservation scramble has already begun.
      sourceRefs:
        - 26
        - 27
        - 40
    - incumbentClass: Collaboration and storage systems
      point: Slack, Box, and Discord can preserve pieces of the record, yet they remain fragmented systems with scope limits, short-lived logs, and weak production-level release-state context.
      sourceRefs:
        - 29
        - 30
        - 31
    - incumbentClass: Creative provenance and review stack
      point: Adobe, C2PA, and Frame.io improve asset provenance and review history, but they do not by default own counsel-ready prompt history, legal holds, or cross-tool matter packets.
      sourceRefs:
        - 22
        - 23
        - 24
        - 25
    - incumbentClass: AI-governance control planes
      point: Credo-class governance tools are strong at registries, policies, and enterprise AI risk workflows, but they are not built around studio-specific creative exhaust and production evidence.
      sourceRefs:
        - 21
        - 28
    - incumbentClass: Native AI vendors and manual collections
      point: Midjourney privacy settings and native collaboration logs help at the margin, but vendor-specific controls still leave legal teams reconstructing the full chain across tools.
      sourceRefs:
        - 6
        - 7
        - 8
        - 31
  regulatoryLandscape: >-
    The first market is shaped less by sector-specific AI law than by overlapping preservation, copyright, and labor obligations. Buyers need enough context to answer what was generated, by whom, for which production, and what downstream use occurred without opening every experimental workspace in the studio.
  technologyLandscape: >-
    The enabling stack already exists in pieces: collaboration systems expose holds and retention, provenance standards can label content history, and vendors like Runway are embedding AI deeper into media workflows. The gap is a neutral evidence graph that spans prompt tools, chats, asset review, and release decisions rather than a single repository.
  distributionChannels:
    - point: Direct sales via outside IP counsel, e-discovery consultants, and litigation-support teams are the fastest wedge because they already own the preservation workflow and vendor shortlist.
      sourceRefs:
        - 17
        - 19
        - 26
        - 27
    - point: Creative-technology consultants and sanctioned AI vendors can pull the product into design-partner accounts when studios operationalize new pre-production workflows.
      sourceRefs:
        - 24
        - 25
        - 32
        - 33
        - 34
    - point: Insurers and governance advisors become effective introducers when buyers need a policy answer rooted in Copyright Office and NIST guidance, not only a tool demo.
      sourceRefs:
        - 9
        - 12
        - 21
  partnershipEcosystem:
    - point: Slack, Box, and Discord are natural ingestion partners because matter-ready preservation depends on holds, exports, and admin logs across collaboration surfaces.
      sourceRefs:
        - 29
        - 30
        - 31
    - point: Adobe, C2PA, and Frame.io are complements because they add provenance, review, and asset-history context that can feed a legal packet rather than replace it.
      sourceRefs:
        - 22
        - 23
        - 24
        - 25
    - point: Runway and other sanctioned studio AI vendors matter because adoption is moving from experimentation to formal partnerships, making vendor-neutral capture more valuable.
      sourceRefs:
        - 32
        - 33
        - 34
  dataMoats:
    - point: A cross-tool graph linking prompts, outputs, users, projects, and downstream edits by production becomes harder to rebuild from raw exports after the fact.
      sourceRefs:
        - 1
        - 2
        - 4
        - 31
    - point: Matter-specific patterns—what counsel requested, which custodians mattered, and which packets proved sufficient—compound into a proprietary response playbook.
      sourceRefs:
        - 17
        - 18
        - 19
        - 26
        - 27
    - point: Release-state and provenance labels attached across tools become more valuable as more studios adopt standards like Content Credentials but still need counsel-ready context.
      sourceRefs:
        - 22
        - 23
        - 24
  geographicConsiderations:
    - point: Los Angeles is the cleanest first geography because production concentration and California tax incentives keep the highest-leverage buyers and live productions in view.
      sourceRefs:
        - 35
        - 37
        - 38
    - point: The first product posture should be U.S.-legal-first because discovery, copyright damages, and union disclosure issues create the clearest forcing function there.
      sourceRefs:
        - 13
        - 14
        - 15
        - 16
        - 20
    - point: Expansion can follow global studio groups and affiliated teams once sanctioned AI adoption moves beyond a single Hollywood division.
      sourceRefs:
        - 32
        - 34
        - 37
  sensitivityCases:
    - case: Courts keep discovery confined to consumer-facing AI uses
      impact: Urgency cools for pure litigation readiness, so the wedge must emphasize policy, insurer, and union-ready evidence rather than only live disputes.
      sourceRefs:
        - 2
        - 4
        - 13
    - case: Midjourney or adjacent vendors ship stronger native admin and privacy controls
      impact: The startup still has room only if it stays cross-tool, matter-oriented, and focused on release-state lineage rather than simple logging.
      sourceRefs:
        - 6
        - 7
        - 8
        - 31
    - case: Production volumes remain weak and legal budgets stay centralized
      impact: Logo velocity slows, making design-partner proofs and outside-counsel referrals more important than broad studio-platform sales.
      sourceRefs:
        - 26
        - 27
        - 35
        - 36
        - 37
  validationPlan:
    - priority: high
      question: How many sanctioned Midjourney, Runway, or equivalent creative-AI workspaces does a target studio actually need to preserve by production?
      evidenceToGather: Workspace inventories, project lists, and channel/server maps from 5-8 target accounts plus sample export flows from creative ops.
    - priority: high
      question: 'Which budget owner signs first: Deputy GC, creative technology, IT, or insurer-driven risk owner?'
      evidenceToGather: Buyer interviews and current-state spend maps across legal hold, DAM, collaboration governance, and outside-counsel services.
    - priority: medium
      question: Can a sanctioned-workspace-only capture model reach enough of the real workflow without blocking creatives?
      evidenceToGather: Pilot deployments with one legal matter simulation and measured coverage gaps versus ad hoc personal-account behavior.
    - priority: medium
      question: Do insurers and outside counsel value release-state lineage and provenance enough to accelerate procurement?
      evidenceToGather: Carrier questionnaires, outside-counsel preservation checklists, and sample matter-response packets reviewed by design partners.
