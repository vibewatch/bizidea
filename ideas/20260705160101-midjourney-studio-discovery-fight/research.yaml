competitors:
  - name: RelativityOne
    stage: incumbent
    wedge: Legal hold, collection, review, and AI-assisted legal workflows.
    pricing: Custom enterprise subscription
    strength: Deep legal trust, mature hold workflows, and strong downstream review tooling.
    weaknessVsUs: Typically enters after a matter exists and does not natively capture prompt, output, and release-state lineage inside studio creative workflows.
    sourceRefs:
      - 26
      - 40
  - name: Everlaw
    stage: scale-up
    wedge: Cloud-native eDiscovery with legal holds, collaboration, and AI assistance.
    pricing: Custom enterprise subscription
    strength: Accessible cloud workflow, source preservation, and audit-trail collaboration for in-house legal teams.
    weaknessVsUs: Still focuses on preservation and review after identification of custodians rather than continuous upstream creative capture.
    sourceRefs:
      - 27
      - 40
  - name: Adobe Content Credentials + Frame.io
    stage: incumbent
    wedge: Creative review, asset history, and provenance labels for media workflows.
    pricing: Adobe enterprise creative-stack spend / custom workflow plans
    strength: Closer to asset review and provenance than legaltech incumbents, with clear creative workflow credibility.
    weaknessVsUs: Provenance and review context are helpful, but they do not by default produce legal-hold scopes, prompt histories, or matter-ready evidence packets.
    sourceRefs:
      - 24
      - 25
  - name: Credo AI
    stage: scale-up
    wedge: Enterprise AI governance registry, risk library, and policy mapping.
    pricing: Custom enterprise subscription
    strength: Strong at AI governance controls and policy workflows across business units.
    weaknessVsUs: Optimized for model and use-case governance, not the messy, asset-level lineage of studio pre-production evidence.
    sourceRefs:
      - 21
      - 28
  - name: Slack + Box + Discord manual collection stack
    stage: incumbent
    wedge: Existing collaboration, storage, and admin-log tools paired with outside-counsel collection work.
    pricing: Existing enterprise subscriptions plus outside-counsel collection costs
    strength: Already deployed and capable of preserving parts of the record at the system level.
    weaknessVsUs: Fragmented across tools, weak on production release state, and slow to reconstruct when prompts and outputs must be packaged together.
    sourceRefs:
      - 29
      - 30
      - 31
regulatoryTechnicalConstraints:
  - point: Rules 26 and 34 turn prompts, outputs, images, and related metadata into discoverable ESI when relevant and within control; Rule 37 raises sanctions risk if preservation fails.
    sourceRefs:
      - 13
      - 14
      - 15
  - point: Copyright statutory damages can scale per work, magnifying the cost of sloppy evidence boundaries.
    sourceRefs:
      - 16
  - point: The Copyright Office is separately examining digital replicas, output copyrightability, and training, so studio AI policies will keep moving.
    sourceRefs:
      - 9
      - 10
      - 11
      - 12
  - point: WGA rules require disclosure when AI-generated material is provided to writers, creating an operational need for provenance and workflow tagging.
    sourceRefs:
      - 20
  - point: Discord audit logs are retained for 45 days and Slack legal holds have scope limits, so native collaboration logs alone are not enough as a long-horizon system of record.
    sourceRefs:
      - 30
      - 31
