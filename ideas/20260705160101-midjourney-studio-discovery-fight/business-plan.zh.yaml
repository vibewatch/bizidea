slug: studio-ai-evidence-vault
date: '2026-07-05'
executiveSummary: >-
  影视和剧集公司正把 Midjourney 式的创意构思搬进共享的前期制作工作流，而调证请求恰好开始
  伸向内部的提示词、产出、分镜及相关元数据。这家公司卖的是一个厂商中立的证据保险库：按项目
  持续抓取获授权的 AI 创意活动，再在外部律师被迫从聊天和导出文件里重建历史之前，生成按诉讼
  范围划分的法务保全和调证包。首个滩头市场刻意收得很窄——洛杉矶或以美国为主、设有集中式分镜
  或概念美术团队、且在多个在制项目里至少有一条共享 Midjourney 工作流的影视公司和流媒体。
  这个切口之所以站得住，是因为经济买家本就在留存、电子取证和外部律师收集上花钱，所以产品可以
  把现有的风险与运营预算重新分配过来，而不必凭空造出一条投机性的 AI 预算项。GTM 是一套连贯
  的打法：由保全通知或 AI 政策落地触发，向副总法律顾问卖一个付费的法务保全就绪试点，请创意
  技术负责人做发起人，按在制项目数和接入工作区数计价，等第一份诉讼应对包证明比手工收集更快
  更窄之后再扩张。最强的护城河，是一张项目级的证据图谱——把提示词、产出、修改、发布状态和过往
  诉讼应对模式跨工具串起来，这是通用保全、DAM 和溯源标签都拼不出来的。两处尽调缺口还敞着：
  真正相关的工作流有多少留在获授权、公司自有的工作区里，以及实际中第一笔预算到底归法务还是
  创意技术负责人。如果头两个试点做不到有用的覆盖率、也无法以近似软件的毛利率转成年度合同，那
  这个机会就只是个服务型小众生意，而不是能上规模的风投级平台。

problem:
  - >-
    调证和保全如今在任何素材公开发布之前，就已经伸向内部 AI 分镜、构思、提示词、产出及相关
    元数据，所以影视公司再也不能把前期制作的 AI 使用当作可随手丢弃的草稿。
  - >-
    记录散落在 Midjourney 工作区、Discord 或 Slack 频道、Box 文件夹、素材审阅工具和手动
    导出文件之间，逼着法务团队在时间压力下要么过度收集，要么手工重建创意历史。
  - >-
    法务保全、存储留存、溯源标签、外部律师收集等通用替代方案能保住故事的碎片，却拼不出一份
    按项目划分、带发布状态语境的提示词到产出到修改的证据包。

solution:
  - >-
    接入获授权的 Midjourney 工作区，以及相邻的 Discord、Slack、Box 和审阅界面，按项目
    持续抓取提示词、产出、用户身份、时间戳、项目标签和下游素材引用。
  - >-
    套用发布状态标签、留存规则和按诉讼范围划分的法务保全，让律师能冻结对的会话、生成聚焦的
    调证包，而不必倒出整家公司的试验历史。
  - >-
    提供一个特权审阅工作区和外部律师取用模型，把抓取来的创意残留变成一套可复用的应对流程，
    而不是一次性的取证乱局。

whyWeWin:
  - >-
    这家公司坐在 Relativity、Everlaw、Adobe 及各类协作栈替代方案的上游——在诉讼存在之前
    就抓取证据，而不是等到必须先锁定保管人和文件之后才动手。
  - >-
    厂商中立、贯穿提示词、产出、修改、审批到发布状态的项目级脉络，正是那套缺失的记录系统——
    原生 AI 厂商和溯源工具眼下都没握在手里。
  - >-
    内部 IT 或创意运营团队可以自己写脚本导出，但他们并不想在法务和创意系统之间维护不断演进
    的连接器覆盖、特权工作流和可用于诉讼的证据包设计。
  - >-
    从一个紧迫的分镜证据切口切进去，比铺一个宽泛的媒体治理平台能更快拿到可背书的样板，还会
    沉淀成一张影视公司专属、越往后越难被替换的证据图谱。

strategicChoices:
  beachhead: >-
    洛杉矶及以美国为主的影视、剧集和流媒体内容集团，设有集中式预演或概念美术团队、至少一条
    共享 Midjourney 工作流、每季度五个以上在制项目，且内部分镜有可能被调证。
  wedgeRationale: >-
    内部分镜和构思证据，是法务之痛、点名买家的紧迫感和可衡量 ROI 三者唯一交汇的最窄工作流。
    一个更宽的"媒体 AI 治理"平台只会稀释触发点、堆叠集成量，还逼着公司去卖抽象的政策，而不是
    一个正在发生的保全难题。
  sequencingRationale: >-
    先把获授权工作区抓取、项目标注、发布状态分类和诉讼应对包生成做出来，因为这是能改变一位
    副总法律顾问应对速度的最小产品。把更广的工具覆盖、纵向扩张和规模化销售招聘往后压，直到
    某一个公司部门跑出可复用的覆盖率和付费转化——因为早期成败更取决于连接器的精度和工作流的
    信任，而不是线索数量。
  notYet:
    - 在拿到三个影视公司标杆账户之前，不碰游戏工作室、广告公司和出版商
    - 完整的公开发布溯源或素材授权工作流
    - 获授权企业工作区之外的个人账户抓取或员工监控功能
    - 完整的电子取证审阅或替代 DAM

market:
  tam: "$24.0M（估算：全球约 80 家影视、流媒体、动画和优质内容集团 × 每家约 $300k 的综合年度平台价值）"
  sam: "$7.5M（估算：约 25 家洛杉矶或以美国为主、有即时调证或政策触发的影视、剧集和流媒体集团 × 约 $300k ACV）"
  som: "$2.7M（第 3 年：共创客户部署和律师转介之后，9 个客户，每个约 $300k）"
  segments:
    - "主要：以美国为主、有共享 Midjourney 分镜工作流的影视和剧集公司或流媒体"
    - "次要：同一批买家旗下相邻的动画、游戏或品牌内容部门，待影视公司切口跑通之后再攻"
  buyingProcess: >-
    通常由负责知识产权或诉讼的副总法律顾问在保全通知、调证纠纷或内部 AI 政策落地之后发起，
    创意技术负责人则来核验连接器范围和工作流契合度。安全、采购和外部律师随后审查取用边界；
    第一份合同最可能是针对一个部门或共享工作区的付费共创客户试点，之后才是更大范围的公司级
    铺开。

product:
  mvp: >-
    MVP 覆盖获授权的 Midjourney 工作区，加上 Discord、Slack、Box 导入、自动项目标注默认值、
    发布状态标签、法务保全冻结，以及面向一个公司部门的特权审阅工作区。它刻意保持人工审阅、按
    诉讼范围划分，不做成一套全公司监控或电子取证套件。
  sixMonth: >-
    首批共创客户上线，接通 Midjourney 加一个协作或存储连接器，模拟保全场景下 48 小时内出包，
    并配上带标签会话覆盖率、保全应对时间和项目级完整度的仪表盘。
  twelveMonth: >-
    面向更多部门、外部律师席位、历史数据导入的可复用部署模板，以及第二个创意界面——比如 Runway
    或 Frame.io——同一套项目证据模型能在上面复用。
  twentyFourMonth: >-
    一张厂商中立的证据图谱，横跨 Midjourney、Runway、协作系统和审阅素材、覆盖多个部门，配上
    面向保险公司和律师的报告；只有在核心影视公司切口能被复制之后，才做第一次影视电视之外的相邻
    扩张。
  keyBets:
    - 获授权的共享工作区能抓到足够多相关活动，让第一份诉讼应对包站得住脚，而不必去盯每一个个人账户
    - 项目和发布状态标注能自动到足够程度，让创意人员不会因为合规负担而抵触
    - 外部律师会足够看重按诉讼范围划分的出包能力，愿意为付费试点做发起人，而不是走一次性的手工收集
    - 同一套证据模型能从 Midjourney 延伸到相邻工具，不必为每家厂商定制重做

gtm:
  wedge: >-
    向一个用着共享 Midjourney 工作流的公司部门卖"AI 分镜法务保全就绪"；第一个证明点是 48 小时
    内产出一份更窄的项目包、免掉数周的手工重建，而不是泛泛的 AI 治理。
  channels:
    - 由创始人主导，向洛杉矶影视公司和流媒体的知识产权或诉讼副总法律顾问、创意技术负责人做外呼
    - 绑定进行中的保全通知或 AI 政策审查，来自外部律师和电子取证顾问的转介
    - 待第一版出包格式验证之后，引入创意工作流顾问和保险或治理顾问
  funnelTargets: "目标客户 → 工作流评估 30–40%；评估 → 付费 90 天试点 25–35%；试点 → 年度项目铺开 50%+"
  pricing: >-
    按在制项目数和接入的 AI 工作区数计价的年度企业订阅，法务保全、外部律师席位和长期留存另收
    溢价费用。首批试点应落在每个部门或共享工作区 $75k–$125k 左右，等客户把覆盖扩展到 8–15
    个在制项目后，年化转向大约 $250k–$350k——因为这笔支出替代的是手工收集和过度披露的成本，
    而不是新增一条 AI 试验预算。

businessModel:
  revenueStreams:
    - 按在制项目和接入工作区计价的年度平台订阅
    - 法务保全、外部律师席位和长期留存模块
    - 针对既有提示词和素材归档的历史导入与部署费用
    - 面向更多工具、部门以及保险或审计报告的扩展费用
  unitOfValue: 处于持续证据覆盖下、接入了 AI 工作区的一个在制项目
  targetGrossMarginPct: 70
  expansionLevers:
    - 同一影视集团内更多的项目和部门
    - Runway、Frame.io 等更多创意 AI 和审阅界面
    - 待影视公司切口跑通之后，游戏工作室或广告公司等相邻媒体买家

strategyMap:
  northStarMetric: 能在 24 小时内生成一份可用于诉讼的 AI 证据包的在制项目数
  inputMetrics:
    - 挂到正确项目的获授权 AI 会话占比
    - 从保全触发到出第一份项目级证据包的小时数
    - 带发布状态分类的抓取素材占比
    - 试点到年度合同的转化率
    - 每个账户平均扩展的项目或工作区数量
    - 由外部律师转介带来的管道
  moatsToBuild:
    - 一张把提示词、产出、修改、用户、项目和发布状态串起来的跨工具证据图谱
    - 影视公司专属的诉讼应对手册，记录哪种证据包范围让律师和法庭满意
    - 与副总法律顾问、外部律师和创意技术团队围绕特权与聚焦收集建立的工作流信任
  killCriteria:
    - 走完 20 个以上目标客户销售周期后，第 12 个月仍不足 3 个付费共创客户
    - 头 2 个试点抓不到至少 80% 的获授权分镜活动，或无法在 48 小时内出一份可用的包
    - 没有一个试点能转成 $250k 或以上的年度合同，因为买家仍选择手工收集
  mermaid: |
    flowchart LR
      Wedge[Studio AI evidence wedge] --> MVP[Midjourney plus collaboration capture]
      MVP --> Proof[48-hour matter packets with 80% plus sanctioned coverage]
      Proof --> Expansion[More productions tools and adjacent media buyers]

investorMemo:
  verdict:
    call: Watch
    conviction: >-
      触发点真实、买家可信，但在多个影视公司账户里证明覆盖率和预算归属之前，信心只能维持中等。
    whyBelieve: >-
      Midjourney 这场调证战，把内部分镜的提示词和产出从被忽视的工作流残留，变成了有明确预算
      归属的可调证电子存储信息（ESI）。
    whyDoubt: >-
      实测的滩头市场很小、技术上也很杂乱，一旦获授权工作区的覆盖率偏弱，公司就可能滑向定制服务。
    nextDiligence: >-
      在把这当作合伙人会议级机会之前，先拿出三个付费共创客户、一份 48 小时诉讼应对包，以及至少
      一个转成约 $250k+ 年度经常性收入的试点。
  firstCustomer:
    title: 某影视公司 AI 工作流项目的知识产权副总法律顾问
    profile: >-
      一家洛杉矶影视公司或流媒体，有 8–15 个在制项目、一条共享的 Midjourney 分镜或概念美术
      工作流，且外部律师已经在追问内部 AI 使用是怎么按项目留档的。
    trigger: >-
      一份保全通知、一场调证纠纷，或一次全公司 AI 政策落地，逼着法务和创意技术团队在能安全答复
      律师之前，先把提示词、产出和人工修改盘点清楚。
    buyer: 负责知识产权与诉讼的副总法律顾问
    initialContract: >-
      针对一个部门或共享工作区、约 $75k–$125k 的付费 90 天共创客户试点，等客户把工作流铺到
      8–15 个在制项目、并加上法务保全和外部律师取用后，转向 $250k–$350k 的年度订阅。
  mustBeTrue:
    - 约 25 个美国滩头账户里，至少有 10 个已经在多个在制项目上跑着共享的创意 AI 工作流。
    - 只要触发点是保全通知或政策落地，副总法律顾问就愿意在正式制裁事件发生之前签下付费试点。
    - 获授权工作区抓取加上协作与存储导入，能在头两个客户里覆盖至少 80% 的相关分镜活动。
    - 一份项目级证据包能在 48 小时内生成，并相比手工导出实打实减少外部律师的收集工作量。
    - 在这家创业公司拿下五个可背书账户之前，Relativity、Everlaw、Adobe 和各类协作栈不会先把上游抓取的缺口补上。
  diligenceQuestions:
    - 哪些点得出名的影视公司，已经在多个项目上跑着公司自有的 Midjourney 或 Runway 工作区？
    - 眼下按项目应对一份 AI 保全请求，要花多少时间和外部律师成本？
    - 在这个横跨法务与创意技术的问题上，第一笔预算和采购路径归谁管？
    - 有多少相关工作流落在获授权工作区之外，或藏进了隐私模式里？
    - 律师和保险公司是否足够在意发布状态脉络，愿意选它而不是通用保全加手工审阅？

operatingAssumptions:
  - assumption: >-
      获授权的共享工作区和相邻的企业系统，装着足够多的真实工作流，让第一份证据包不必抓取每一个
      个人账户或私信也能有用。
    basis: research.yaml
    validationTest: >-
      在 5 个共创客户账户里盘点工作流，衡量能否从获授权工具加已批准的导入中，抓到至少 80% 的
      相关分镜和构思会话。
    decisionImpact: >-
      若不成立，产品就退化成一层残缺的治理层，法务价值更弱，可能得转向政策强制或托管服务。
  - assumption: >-
      只要把方案框定成"法务保全就绪"而不是泛泛的 AI 工具，副总法律顾问就能在诉讼完全成型之前
      为付费试点开出预算。
    basis: research.yaml
    validationTest: >-
      做 15 场买家访谈，争取 3 个绑定进行中的政策、保全或治理动议、金额高于 $75k 的付费试点或
      意向书。
    decisionImpact: >-
      若不成立，销售就得依赖更慢的应急响应周期或更低 ACV 的项目，削弱风投级论证。
  - assumption: >-
      客户会从试点转到大约 $250k–$350k 的年度定价，因为手工重建和外部律师收集的成本本就高到
      足以重新分配。
    basis: idea.yaml
    validationTest: >-
      在头 2 个付费试点里量化当前应对成本，并要求在周期缩短和出包范围收窄得到验证后，至少拿到
      1 个 $250k 或以上的年度转化。
    decisionImpact: >-
      若不成立，定价或打包就得往下走或转向服务，压低毛利、限制招聘节奏。
  - assumption: >-
      相比 Relativity、Adobe 和各类协作栈替代方案，发布状态脉络和按诉讼范围划分的出包是有意义
      的差异化。
    basis: research.yaml
    validationTest: >-
      在竞争性试点评审中，请买家和外部律师排出购买的前 3 大理由，确认头 3 个成单里至少有 2 个
      提到了这条工作流。
    decisionImpact: >-
      若不成立，公司就该更深地与现有厂商合作，或把产品收窄成一层连接器，而不是一套新的记录系统。
  - assumption: >-
      这张证据图谱能从 Midjourney 延伸到相邻创意工具和部门，不必为每个账户定制重做。
    basis: operator judgment
    validationTest: >-
      到第 12 个月，用同一套核心数据模型、每个连接器不到 25% 的定制工程，完成 2 个第二界面试点，
      比如 Runway 或 Frame.io。
    decisionImpact: >-
      若不成立，业务就困在一个小切口里，应当保持资本高效，而不是去给宽泛的平台叙事砸钱。

experimentRoadmap:
  - horizon: 0–90 天
    experiment: 买家与预算地图
    hypothesis: >-
      只要把方案绑定到法务保全就绪，第一份合同就能在诉讼见顶之前卖给一位有创意技术发起人的副总
      法律顾问。
    successMetric: 完成 15 场目标客户访谈，8 个确认有实际紧迫感，3 个同意试点条款或签下高于 $75k 的意向书
    owner: 创始 CEO
  - horizon: 0–90 天
    experiment: 工作流覆盖审计
    hypothesis: >-
      获授权的 Midjourney、Discord、Slack 和 Box 系统，装着一份项目级应对包所需的大部分证据。
    successMetric: 在 3 个样本账户里，无需个人账户监控即可映射到至少 80% 的相关分镜会话
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 诉讼应对包模拟
    hypothesis: >-
      一个公司部门能用抓取来的工作流数据和保全控制，在 48 小时内生成一份可用、经特权审阅的证据包。
    successMetric: 一次端到端模拟经外部律师签字认可，出包周转在 48 小时以内
    owner: 解决方案与法务运营负责人
  - horizon: 90–180 天
    experiment: 首个付费影视公司试点
    hypothesis: >-
      当法务和创意技术发起人共用同一套成功指标时，项目标注和保全就绪工作流能从共创客户转成付费
      部署。
    successMetric: 一个付费试点在 5 个以上在制项目和一个共享工作区上线，带标签会话准确率至少 85%
    owner: 创始 CEO
  - horizon: 180–365 天
    experiment: 外部律师转介渠道
    hypothesis: >-
      只要出包格式能减少过度收集和手工乱局，知识产权诉讼律师和电子取证顾问就会引荐合格的影视公司
      账户。
    successMetric: 5 个合格引荐，1 个由律师或顾问转介带来的成单试点
    owner: 合作与客户负责人
  - horizon: 180–365 天
    experiment: 第二界面扩展测试
    hypothesis: >-
      同一套项目证据模型能延伸到 Runway 或 Frame.io，不破坏出包质量或毛利率目标。
    successMetric: 完成 2 个第二界面部署，每个连接器的定制工程量不到 25%
    owner: 集成工程师

operations:
  - "抓取：把获授权的 Midjourney、Discord、Slack 和 Box 数据规整成一张项目级证据图谱，附带保管链日志。"
  - "治理：项目分类体系、发布状态规则、留存窗口和法务保全触发，由创意运营和法务共同管理。"
  - "诉讼应对：特权审阅工作区、外部律师席位，以及按项目而非全公司倾倒的导出包。"
  - "安全：基于角色的访问、诉讼隔离，以及对每次保全、导出和留存覆写的可审计审批。"
  - "合作方：外部知识产权律师、电子取证服务商、创意工作流顾问，以及保险或治理顾问。"

team:
  - role: 创始 CEO
    startTiming: Month 0
    rationale: >-
      向副总法律顾问和创意技术负责人销售，主持共创客户探索，把法务、工作流和定价选择都拴在一个
      切口上。
  - role: 创始工程师
    startTiming: Month 0
    rationale: >-
      从第一天起就带着可审计性，搭建证据图谱、保全工作流，以及首批 Midjourney、Discord、Slack
      和 Box 连接器。
  - role: 集成工程师
    startTiming: Month 2
    rationale: >-
      提升连接器纵深、历史数据导入和项目标注自动化，让试点无需定制脚本也能达到覆盖率目标。
  - role: 解决方案与法务运营负责人
    startTiming: Month 4
    rationale: >-
      负责部署设计、特权工作流和外部律师交接，让首批客户衡量的是出包质量，而不只是数据抓取。
  - role: 合作与客户负责人
    startTiming: Month 9
    rationale: >-
      待第一个标杆客户验证了出包格式和定价之后，搭建外部律师、顾问和保险公司的转介渠道。

milestones:
