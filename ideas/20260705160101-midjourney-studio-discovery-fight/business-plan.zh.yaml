      - "第 6 个月：首次模拟保全在 48 小时内返回一份项目级证据包，获授权工作流覆盖率至少 80%"
      - "第 9 个月：首个付费影视公司试点在一个共享 Midjourney 工作区和 5 个以上在制项目上线"
      - "第 12 个月：3 个付费客户、1 个外部律师转介来源，1 个试点转成约 $250k+ 的年度订阅"
  - horizon: 12–24 个月
    items:
      - "第 18 个月：第二个创意界面在 2 个账户集成，平均出包周转降到 24 小时以内"
      - "第 21 个月：5 个客户，一套可复用的部署模板能在 30 天内启动一个新部门"
      - "第 24 个月：首个同一买家从 Midjourney 扩展到 Runway 或 Frame.io，以及首笔保险或治理驱动的成单"
  - horizon: 24–36 个月
    items:
      - "第 30 个月：7 个客户，证据图谱在 3 个影视集团的多个项目上复用"
      - "第 33 个月：至少 50% 的新管道来自转介或既有账户扩展"
      - "第 36 个月：9 个客户，约合研究测算的第 3 年 $2.7M SOM，并拿到明确证据判断相邻媒体赛道是否值得做 A 轮扩张"

risks:
  - risk: 隐私模式、个人账户或未授权创意工作流带来的留存盲区
    likelihood: High
    impact: High
    mitigation: >-
      先从获授权的共享工作区做起，明确衡量覆盖率，通过政策强制项目标注，在共创客户数据证明之前
      拒绝承诺完全可观测。
  - risk: 法务、创意技术和 IT 之间预算分散的采购，拖慢成交周期
    likelihood: High
    impact: High
    mitigation: >-
      拿一个量化了应对时间节省的窄法务保全就绪工作流去卖，要求配一位点名的法务和创意技术拥护者，
      并把外部律师用作倒逼式转介来源。
  - risk: 因制作量持续疲软，滩头市场太小或太慢
    likelihood: Medium
    impact: High
    mitigation: >-
      把烧钱压在少数高 ACV 账户上，优先做同一买家跨部门、跨工具的扩展，把更广的纵向招聘推迟到
      标杆销售能被复制之后。
  - risk: 原生 AI 厂商或现有厂商推出足够多的日志和保全功能，看上去够用了
    likelihood: Medium
    impact: Medium
    mitigation: >-
      保持厂商中立，强调项目发布状态脉络和可用于诉讼的出包设计，与现有厂商集成，而不是去替换
      他们的下游系统。
  - risk: 早期部署沦为服务繁重的定制实施
    likelihood: Medium
    impact: High
    mitigation: >-
      把第一年范围限定在一套分镜证据模板上，实施费用单独计价，拒绝那些无助于提升可复用连接器
      或出包基础设施的相邻功能需求。

fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的现金跑道，用来搭建获授权工作区抓取和诉讼应对包产品，招募创始工程加解决方案与
    合作分发人才，拿下 3–5 个付费影视公司试点，证明 48 小时出包和 $250k+ 的年度转化，并
    凭证据而非指望来判断更广的工具和纵向扩张是否值得下一轮。
