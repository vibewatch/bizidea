problem: >-
  影视和剧集公司正把生成式图像工具用于内部分镜、情绪板和概念构思，却很少留下一份可用于诉讼
  的记录——谁在哪个项目上提示了什么、产出有没有流出前期制作阶段。等版权纠纷找上门，法务团队
  只能从聊天记录、素材文件夹和厂商后台里拼凑出提示词、产出和人工修改。Midjourney 这场调证
  战表明，纯内部的 AI 使用如今也能变成证据，而不只是一次创意试验。这就催生了一条新的预算项：
  为在诉讼逼得团队手忙脚乱之前留存 AI 创意残留的软件买单。
targetUser:
  primary: "在影视或剧集公司里运营共享 Midjourney 分镜工作流的创意技术负责人或 AI 创意运营主管。"
  secondary: "负责 AI 版权纠纷中留存与举证的知识产权诉讼副总法律顾问、外部律师和电子取证经理。"
  buyer: "负责知识产权与诉讼的副总法律顾问，由创意技术负责人担任技术发起人。"
startupThesis:
  nonObviousInsight: >-
    没有被保护的那块，不是成品 AI 影像，而是影视公司以为会转瞬即逝的幕后创意残留。如果合理
    使用和行业惯例抗辩要靠内部分镜、构思提示词、被弃用的产出和修改历史撑起来，那么记录系统就
    必须坐在发布上游——在前期制作里、在纠纷开始之前。
  beachhead: >-
    洛杉矶的影视和剧集公司，以及那些设有集中式预演或概念美术团队、每季度在五个以上在制项目里
    用 Midjourney 做内部分镜或构思的流媒体内容集团。
  wedge: >-
    一个可直接用于诉讼的证据保险库：自动抓取内部 Midjourney 分镜和构思工作流的提示词、产出、
    项目标签、人工修改和发布状态，再按项目生成法务保全和调证包。
  whyNowCatalyst: >-
    Midjourney 强行要求披露内部分镜、构思以及完整的提示词和产出历史，让幕后 AI 使用一下子
    变成了影视公司眼前的诉讼和治理难题。
  ventureScalePath: >-
    先从好莱坞前期制作和版权调证的应对做起，再扩展到游戏工作室、广告公司、出版商，以及那些需要
    一套跨工具记录系统来管理 AI 辅助创作、版权尽调和可供律师取用证据的企业品牌团队。
solution: >-
  产品接入获授权的 Midjourney 工作区、创意审阅频道和素材库，为每条提示词和产出打上项目、
  用户、时间和下游用途的元数据。它把纯内部构思和已获批对外使用的素材区分开，这样律师就能回答
  更聚焦的问题，而不必倒出整家公司的试验历史。一旦纠纷或保全通知到来，系统会冻结相关会话、把
  产出脉络映射到修改和导出，并打开一个特权审阅工作区，而不是让人对着一堆原始文件手忙脚乱。策略
  规则可以强制要求共享 AI 工作区做项目标注、设定留存窗口、经主管审批，让影视公司在法院开口之前
  就有一套站得住脚的流程。久而久之，这个保险库会成为影视公司、外部律师和保险公司在评估 AI 辅助
  作品时都信赖的那层权威证据底座。
goToMarketSeed:
  firstCustomer: >-
    一家洛杉矶影视公司或流媒体内容集团，手上有八到十五个在制项目、一个供分镜和概念美术团队共用
    的 Midjourney 工作区，且外部律师已经在追问跨项目的内部 AI 使用是怎么留档的。
  buyingTrigger: >-
    一份调证请求、一封外部律师的保全通知，或一项新的公司 AI 政策，逼着团队把各个项目的分镜和
    构思活动盘点清楚。
  currentAlternative: "聊天记录导出、共享盘文件夹、手动从厂商后台拉数据，以及临时找外部律师做电子取证收集。"
  switchingReason: >-
    首个客户会转过来，是因为这个保险库能在纠纷来临之前就建起一份按项目划分、持续抓取的证据记录，
    既降低了过度披露的风险，也免得制作团队花好几周去手工重建提示词历史。
  pricingHypothesis: >-
    按在制项目数和接入的 AI 工作区数计价的年度企业订阅，法务保全、外部律师席位和长期证据留存
    另收溢价费用。
