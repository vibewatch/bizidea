jobsToBeDone:
  - job: >-
      当外部律师要求我们保全某个在制项目上的 AI 分镜活动时，帮我们的法务和创意运营团队冻结并
      打包对的提示词、产出和修改，让我们不必停下前期制作就能应对。
    currentAlternative: "从共享工作区、素材文件夹和聊天记录里手动导出。"
    successMetric: "签发一份完整法务保全所需的小时数，以及抓取会话中挂到正确项目的比例。"
  - job: >-
      当我们上线一套新的内部 AI 构思工作流时，帮我们把幕后试验和已获批的下游素材区分开，让我们
      能管住使用、日后也答得上政策问题。
    currentAlternative: "内部政策文档、电子表格确认，以及互不相通的厂商日志。"
    successMetric: "带项目标签的 AI 会话占比，以及回答一份政策或尽调问卷所需的时间。"
