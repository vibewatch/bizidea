topRisks:
  - name: "留存盲区"
    description: "创意团队上线第一天，可能就用着产品看不到的未授权工具、私下的聊天或本地工作流。"
    mitigation: "先从获授权的共享工作区、聊天和素材导入做起，再靠政策背书的连接器和历史数据导入扩大覆盖。"
  - name: "预算分散的销售困局"
    description: "感受到调证之痛的是法务，但握着工具和预算的可能是创意技术或 IT，拖慢成交周期。"
    mitigation: "拿一个量化了的诉讼应对工作流去卖，联手法务和创意运营的共同拥护者，再加上外部律师背书。"
  - name: "滩头市场过于集中"
    description: "拥有成熟内部 AI 前期制作工作流的好莱坞影视公司，数量可能比预想的更少、动作更慢。"
    mitigation: "借旗舰影视公司共创客户，快速扩展到流媒体、游戏工作室、广告公司，以及由保险公司驱动的合规审查。"
