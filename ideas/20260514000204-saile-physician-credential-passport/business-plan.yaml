slug: physician-privileging-passport
date: '2026-05-14'
executiveSummary: >-
  Physician privileging across multi-hospital systems remains a conversion bottleneck: hospitals can identify willing
  moonlighting physicians, but still take 90-120 days to clear them across facilities because each site rebuilds the
  packet from scratch. The best first customer is a 3-6 hospital regional system with a centralized medical staff office
  and recurring hospitalist night or weekend coverage gaps, because the same doctors already exist inside or adjacent to
  the network and locums spend makes the ROI visible. The product wedge is a physician passport that stores a reusable,
  verified core file and maps it into each facility's privileging checklist, approval path, and missing-item workflow
  without forcing a rip-and-replace of incumbent credentialing software. Go-to-market should stay tightly coupled to this
  workflow: founder-led sales to medical staff leadership, a paid specialty pilot across 2-3 hospitals, and pricing
  anchored to faster physician-site activation rather than generic automation claims. The defensible asset is not document
  storage alone; it is the growing rules graph of facility-specific privileging requirements plus benchmark data on where
  approval cycles stall by specialty and site. The deliberate sequencing is to prove same-system hospitalist reuse first,
  then add adjacent specialties and partner integrations, and only later expand into locums onboarding, allied health,
  or payer enrollment. The biggest disconfirming risk is that site-one data does not materially shorten site-two
  committee review, which would turn the product into a services-heavy workflow layer instead of a compounding software
  asset. Evidence for startup traction in the source idea is promising but partly single-source, so the first 12 months
  must produce customer-owned time stamps, pilot conversion data, and physician profile retention data rather than relying
  on anecdotal category momentum.
problem:
  - Regional health systems often have willing physicians for secondary-site coverage, but each hospital recreates the privileging packet from scratch, so open shifts convert into 90-120 day onboarding projects and avoidable locums spend.
  - Medical staff offices still run credentialing through email, PDFs, spreadsheets, and committee follow-up, which creates audit risk, coordinator backlog, and weak reuse of physician data across facilities.
solution:
  - Build a physician privileging passport that stores a reusable core credential file, tracks completeness, and generates facility-specific, committee-ready packets with full evidence trails and audit logs.
  - Start as a readiness layer for one specialty inside one regional system, showing exactly what blocks activation at each site and exporting into incumbent credentialing or scheduling workflows rather than replacing them on day one.
whyWeWin:
  - The product ties the physician-side incentive to keep data current to the hospital-side need to clear doctors faster for paid shifts, which incumbent suites and CVO workflows do not consistently do.
  - Every deployment adds facility-specific privileging logic, exception patterns, and activation benchmarks that improve implementation speed and create a harder-to-copy rules and operations dataset.
strategicChoices:
  beachhead: Internal moonlighting hospitalists in 3-6 hospital regional systems operating within one state or metro region and managed by a centralized medical staff office.
  wedgeRationale: >-
    Hospitalists offer frequent night and weekend coverage pain, a repeatable document set, and a realistic same-system
    reuse loop where site-one data already exists. That creates faster proof than starting with external locums,
    national networks, or specialties with higher privilege variance and lower recurring volume.
  sequencingRationale: >-
    The company should first ship packet reuse, missing-item resolution, and audit-safe approval visibility for one
    specialty because buyer trust depends on measurable activation improvement before deeper automation. Only after 3-5
    paid pilots convert should the team add scheduling integrations, adjacent specialties, and channel partnerships,
    because broad feature scope or early sales hiring would outrun evidence on portability and buyer willingness to adopt
    a layer-on-top product.
  notYet:
    - External locums marketplace and agency fulfillment
    - Full credentialing system-of-record replacement
    - Allied-health credentialing and payer enrollment
    - Multi-state expansion before same-state privilege reuse is proven
market:
  tam: "$59.6M estimated wedge TAM: 397 U.S. health systems at roughly $150K annual contract value per system for passport and privileging workflow."
  sam: "$32.9M estimated beachhead SAM: 219 smaller health systems closest to the 2-8 hospital ICP at roughly $150K annual contract value."
  som: "$3.8M estimated year-3 SOM: 25 reachable regional systems at roughly $150K annual contract value through a specialty-led land-and-expand motion."
  segments:
    - Regional health systems with 2-8 hospitals and centralized medical staff operations
    - Community hospital groups and ambulatory networks that privilege the same physicians across nearby sites
  buyingProcess: >-
    The usual champion is the director of medical staff services or physician-enterprise operations lead, while the
    economic buyer is the CMO, CFO, or VP of physician enterprise responding to locums overspend or delayed provider
    activation. Deals should start as a paid pilot for one specialty and 2-3 facilities, with committee, compliance, and
    CIO review focused on auditability and integration risk before a systemwide annual contract.
product:
  mvp: >-
    The MVP includes physician passport creation, facility checklist mapping, missing-document detection, committee-ready
    packet generation, approval status tracking, audit logs, and export or API handoff into incumbent systems. It should
    be narrow enough to prove that site-two hospitalist activation is materially faster when site-one data already exists.
  sixMonth: >-
    Launch one specialty workflow across 2-3 hospitals with manual QA in the loop, show customer-owned time stamps on
    median days to activation, and ship role-based dashboards for coordinators and physician applicants.
  twelveMonth: >-
    Add a second specialty, deeper integrations into credentialing and scheduling systems, benchmark reporting on packet
    bottlenecks, and templated implementation playbooks that keep new-site setup under six weeks.
  twentyFourMonth: >-
    Expand into multi-specialty regional deployments, recredentialing and monitoring workflows, and partner APIs for
    staffing firms or CVOs while remaining the physician-readiness layer rather than a full HR or EHR platform.
  keyBets:
    - Hospitalist cross-facility activation yields a repeatable >30 day reduction versus manual packet rebuilds.
    - Buyers will adopt a passport and readiness layer without replacing incumbent committee systems.
    - Physicians will keep profiles current when faster approval is tied to visible paid shifts.
    - Facility-specific rules can be templatized enough to preserve software-like gross margins.
gtm:
  wedge: Sell faster activation of same-system or recently hired moonlighting hospitalists across 2-5 hospitals before locums coverage is booked.
  channels:
    - Founder-led outbound into NAMSS and AAPPR networks
    - Physician champion and CMO referrals inside early regional systems
    - CVO, locums, and staffing partners that already see urgent coverage requests
    - Integration-led co-selling with incumbent credentialing suites once pilots prove value
  funnelTargets: "Intro→workflow audit 25-35%, audit→paid pilot 40-50%, pilot→annual production 60%+, first-site→second-site expansion within 6 months in 50%+ of wins."
  pricing: >-
    Charge an annual SaaS contract by hospital count and activated physician volume, plus a one-time implementation fee
    for privileging-rule setup. This matches how buyers perceive value: each additional physician-site activation avoids
    locums cost and coordinator labor, while the fixed contract keeps revenue less dependent on shift volume swings.
businessModel:
  revenueStreams:
    - Annual subscription for passport and privileging workflow by system and hospital count
    - One-time implementation and facility-rule configuration fees
    - Premium modules or per-activation fees for expansion into additional specialties, benchmarking, or partner workflows
  unitOfValue: Cleared physician-site activation
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more hospitals inside the same regional system
    - Expand from hospitalists into anesthesia, emergency medicine, and other repeat-shift specialties
    - Layer on recredentialing, sanctions monitoring, and readiness benchmarking
    - Extend the passport into locums onboarding, ASC privileging, and adjacent provider categories after the core wedge is proven
strategyMap:
  northStarMetric: Quarterly physician-site activations cleared within 30 days
  inputMetrics:
    - Median days from physician interest to cleared secondary-site privileges
    - Percent of physician passports complete before packet submission
    - Missing-item resolution cycle time
    - Paid pilot to annual production conversion rate
    - Expansion rate from first specialty to second specialty within existing accounts
  moatsToBuild:
    - Facility-specific privileging rules graph by specialty and site
    - Continuously refreshed physician passport dataset with reuse history
    - Activation benchmark database showing bottlenecks and approval variance
    - Integration and workflow templates around incumbent credentialing suites
  killCriteria:
    - If the first 3 paid pilots fail to improve median site-two activation time by at least 20 days, narrow the wedge or abandon the passport-first thesis.
    - If fewer than 40% of pilots convert to annual production despite measured time savings, the buyer pain is not strong enough for venture-scale workflow software.
    - If fewer than 60% of physicians refresh required profile data within 90 days when paid shifts are visible, the physician-held passport moat is weaker than assumed.
  mermaid: |
    flowchart LR
      Wedge[Hospitalist cross-facility wedge] --> MVP[Passport plus packet workflow MVP]
      MVP --> Proof[30 plus day activation reduction and pilot conversion]
      Proof --> Expansion[More hospitals, specialties, and partner channels]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Medium conviction if early pilots prove same-system privilege reuse; low conviction if each site still behaves like a bespoke services deployment.
    whyBelieve: Hospitals already feel credentialing delay as a staffing and finance problem, and this wedge attacks the conversion bottleneck between willing physicians and schedulable capacity.
    whyDoubt: Local committee variance and incumbent workflow ownership could cap automation gains and keep the business too implementation-heavy for venture returns.
    nextDiligence: Verify with customer-owned pilot data that one approved hospitalist file can reduce time to second-site clearance by at least 20-30 days without increasing compliance exceptions.
  firstCustomer:
    title: Director of Medical Staff Services at a regional health system
    profile: Runs credentialing for 3-6 nearby hospitals, faces recurring hospitalist coverage gaps, and has a centralized team that still assembles packets manually across sites.
    trigger: A spike in locums spend, repeated weekend coverage failures, or a newly added facility that forces the same physicians through another round of privileging.
    buyer: Chief Medical Officer or CFO
    initialContract: "$30K-$60K paid pilot for one specialty across 2-3 hospitals, converting to a $120K-$180K annual system contract if activation time falls by 30+ days and compliance exceptions stay flat."
  mustBeTrue:
    - One hospitalist file approved at site one must shorten median site-two clearance by at least 20 days.
    - At least 60% of paid pilots must convert to annual production within six months of pilot completion.
    - The first specialty deployment must stay below six weeks of implementation effort per new hospital site.
    - At least 60% of physicians offered real shift opportunities must keep required passport data current over a 90-day period.
    - Gross margin on new deployments must still trend above 70% once manual QA and implementation are included.
  diligenceQuestions:
    - How much of hospitalist packet content is truly reusable across facilities versus still re-reviewed locally?
    - Which incumbent systems dominate the first 20 target accounts, and how hard is it to integrate without becoming a replacement project?
    - What documented locums or coverage savings does a buyer need to justify a six-figure annual contract?
    - Which specialty shows the best mix of urgent demand, repeatable documents, and low committee variance?
    - Are physicians willing to maintain the passport absent visible paid work, or is shift access the real retention engine?
operatingAssumptions:
  - assumption: Regional systems will buy a readiness layer before they replace incumbent credentialing software.
    basis: research.yaml
    validationTest: Secure 10 integration discovery calls and at least 3 design-partner LOIs that explicitly keep the incumbent suite in place during the pilot.
    decisionImpact: If false, the company must reposition as an integration partner or abandon direct sales into accounts that require full suite replacement.
  - assumption: Hospitalists are the fastest beachhead specialty for repeatable packet reuse and urgent budget pain.
    basis: operator judgment
    validationTest: Compare lost-shift logs, locums spend, and packet exception rates across hospitalists, anesthesia, and emergency medicine in the first 5 target systems.
    decisionImpact: If false, shift the wedge to the specialty with cleaner reuse economics before scaling implementation templates.
  - assumption: Physicians will keep passport data current when faster approval is tied to visible paid shifts.
    basis: idea.yaml
    validationTest: Track 90-day refresh and completion rates for physicians with live shift access versus profile-only users during pilots.
    decisionImpact: If false, the moat shifts from physician-held data to admin-maintained workflow software, reducing network effects and changing product design.
  - assumption: Facility-specific privileging rules can be templated enough to keep setup time under six weeks per site.
    basis: operator judgment
    validationTest: Measure implementation hours, manual exceptions, and time to first packet across the first 10 hospital sites.
    decisionImpact: If false, services intensity rises, gross margin compresses, and expansion should narrow to fewer specialties and partner-led deployments.
  - assumption: Audit-safe packet generation and approval visibility can cut coordinator effort by at least 30% without autonomous final approval.
    basis: research.yaml
    validationTest: Run before-and-after time studies with medical staff coordinators and monitor compliance exception rates during paid pilots.
    decisionImpact: If false, ROI messaging weakens and pricing must shift down toward administrative tooling rather than coverage-cost savings.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Acquire 3-5 design partners and collect baseline time stamps for one hospitalist workflow across 2-3 hospitals each.
    hypothesis: Buyers will engage when shown current activation delays and will share operational data if the pilot stays audit-safe and narrow.
    successMetric: 3 signed pilot LOIs plus complete baseline process maps and cycle-time data from at least 6 hospitals.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run a concierge packet-reuse pilot with manual QA before building full automation.
    hypothesis: Even a semi-manual passport workflow can cut secondary-site packet preparation time enough to justify MVP buildout.
    successMetric: 10 physician packets processed with a documented 30%+ reduction in coordinator prep time and no material compliance defects.
    owner: Credentialing operations lead
  - horizon: 90–180 days
    experiment: Ship MVP packet generation, checklist mapping, and audit-log workflow into one incumbent system integration or export path.
    hypothesis: A layer-on-top deployment is acceptable if coordinators can preserve committee workflow and evidence trails.
    successMetric: 2 paid pilots live in production with incumbents still in place and no security or compliance blocker from customer review.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test physician passport retention by exposing a subset of users to real moonlighting opportunities.
    hypothesis: Profile freshness improves materially when physicians see faster access to paid shifts.
    successMetric: 60%+ required document refresh rate among exposed physicians versus materially lower refresh in a control cohort.
    owner: Product lead
  - horizon: 180–270 days
    experiment: Add a second specialty and measure template portability of facility rules.
    hypothesis: The implementation model becomes more software-like after the first specialty because packet logic and missing-item workflows partially transfer.
    successMetric: Second-specialty deployment goes live in under six weeks at 2 customer sites with fewer manual exceptions than the first launch.
    owner: Implementation lead
  - horizon: 270–540 days
    experiment: Launch one channel partnership with a staffing firm, CVO, or incumbent suite integrator.
    hypothesis: Partners can source urgent coverage workflows more efficiently than cold outbound once customer ROI is proven.
    successMetric: 25%+ of qualified pipeline sourced by partners and at least 1 partner-sourced account converts to paid pilot.
    owner: CEO founder
operations:
  - NAMSS-aligned credential packet SOPs, evidence trails, and QA checklists for every specialty rollout
  - Data ingestion and normalization from sources such as CAQH, NPPES, and other permitted provider-data utilities
  - Site-by-site implementation playbook covering bylaws review, rules mapping, and committee escalation paths
  - Human-in-the-loop review for any missing, conflicting, or high-risk credential artifact
  - Monthly customer ROI reviews on activation time, coordinator effort, and avoided locums usage
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Founder-led selling is required early because buyer trust, workflow discovery, and specialty selection all depend on direct operator credibility.
  - role: Founding eng
    startTiming: Month 0
    rationale: Core product risk sits in data normalization, packet generation, audit trails, and integration scaffolding that must be owned from day one.
  - role: Credentialing operations lead
    startTiming: Month 1
    rationale: This role converts local privileging rules into product requirements, designs QA controls, and keeps the first deployments from becoming unsafe automation experiments.
  - role: Full-stack integration engineer
    startTiming: Month 4
    rationale: Once the first pilots exist, integration depth and deployment speed become the main bottlenecks to pilot conversion and multi-site expansion.
  - role: Account executive or strategic partnerships lead
    startTiming: Month 9
    rationale: Hire only after the company can show repeatable paid-pilot conversion and a clear partner motion, otherwise sales capacity will outrun product proof.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3-5 design partners in one region and one specialty
      - Convert at least 3 paid pilots into annual production contracts
      - Prove median secondary-site activation improvement of at least 30 days in hospitalist workflows
      - Keep first-site implementation under eight weeks and second-site rollout under six weeks
      - Establish one incumbent integration or export path that customers accept in production
  - horizon: 12–24 months
    items:
      - Expand to a second and third specialty within existing customer systems
      - Reach 8-10 production health-system customers with repeatable implementation playbooks
      - Launch at least 2 channel or integration partnerships that generate qualified pipeline
      - Introduce benchmarking, monitoring, and recredentialing modules that raise net revenue retention
  - horizon: 24–36 months
    items:
      - Reach 25 regional systems and the researched year-3 SOM target
      - Support multi-specialty deployments with auditable rules templates across common hospital configurations
      - Extend the passport into adjacent readiness workflows such as locums onboarding or ASC privileging without losing core gross-margin discipline
risks:
  - risk: Facility and committee variance may limit how reusable one physician packet really is across sites.
    likelihood: High
    impact: High
    mitigation: Start with one specialty inside same-system hospitals, instrument every exception, and refuse expansion until reuse metrics are proven.
  - risk: A missing or incorrect credential artifact could destroy buyer trust in an audit-sensitive workflow.
    likelihood: Medium
    impact: High
    mitigation: Keep human approval in the loop, maintain full evidence trails, and launch as readiness and packet-generation software rather than autonomous privileging.
  - risk: Incumbent suites or CVO vendors may bundle similar passport features once the ROI is visible.
    likelihood: Medium
    impact: High
    mitigation: Win on physician engagement, cross-facility rules data, and activation benchmarks before incumbents treat the wedge as strategically important.
  - risk: Enterprise sales cycles may stay long even when buyers acknowledge the pain.
    likelihood: High
    impact: Medium
    mitigation: Sell against acute locums and coverage events, use paid pilots with hard cycle-time baselines, and leverage partner channels into already-active accounts.
  - risk: Physicians may not keep profiles current unless the product also shows immediate earning opportunities.
    likelihood: Medium
    impact: Medium
    mitigation: Tie refresh workflows to actual shift access and design the product so coordinators can still maintain readiness if physician engagement lags.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Build an audit-safe passport MVP, prove 3-5 paid regional-system pilots in one specialty, establish incumbent integrations and QA controls, and reach repeatable pilot-to-production conversion before scaling GTM.
