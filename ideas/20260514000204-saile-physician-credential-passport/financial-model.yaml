modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Founder outreach plus partners] --> Pilots[Paid pilots]
      Pilots --> Customers[Production health-system customers]
      Customers --> Revenue[Subscription and implementation revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from 3 paying systems at Y1 exit to 25 at Y3 exit while normalized annual ARPU steps from $140K to $165K as customers expand beyond pilot scope.
- checkName: Must go right
  finding: Facility-rule templating and incumbent-friendly integrations must make second-site rollouts repeatable enough for gross margin to move from sub-50% early pilots to ~70% by year two.
- checkName: Model breaks if
  finding: If pilot-to-production conversion stretches toward nine months and Y3 lands closer to 20 customers, downside cash falls to about $0.3M and forces an earlier raise.
- checkName: Next-round proof
  finding: The next financing is justified by reaching 8-10 production systems, at least 2 partner channels, and a repeatable sub-six-week rollout motion that supports measured multi-specialty expansion.
sanityChecks:
  ruleOf40: Y3 growth 187.7% + EBITDA margin -8.1% = 179.6%
  burnMultiple: Approx. Y2 burn multiple 0.8x and Y3 burn multiple 0.1x using year-end ARR expansion.
  revenuePerFte: $301.7K Y3 (benchmark $200–400K SaaS)
  flags:
  - Base case requires the company to hit the full researched year-3 SOM of 25 systems, so execution slip has limited room before the next raise is pressured.
  - Gross margin improvement assumes rules templating and human QA become materially more reusable after the first few deployments.
  - CAC and churn are still heuristic because the company has no observed cohorts yet, so early pilot data may move unit economics materially.
  - Revenue concentration remains meaningful because 25 regional systems still represent a relatively small account base for a venture-scale outcome.
