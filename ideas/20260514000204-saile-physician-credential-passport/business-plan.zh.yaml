slug: physician-privileging-passport
date: '2026-05-14'
executiveSummary: >-
  多院区医疗系统中的医生特权授予仍是激活瓶颈：医院能找到有意愿的兼职医生，却仍要花 90–120 天跨机构完成清件，
  因为每个院区都从头重建材料包。最佳首客是一个 3–6 家医院的区域医疗系统，设有集中医务处，且住院医生夜班或
  周末覆盖缺口反复出现——因为同一批医生已在网络内部或边缘存在，且 locums 支出让 ROI 一目了然。产品切口是
  医生护照：存储可复用的已核验核心档案，并映射到每家机构的特权授予清单、审批路径和缺失项工作流，无需拆换
  现有资质认证软件。GTM 打法必须紧密耦合这一工作流：创始人主导销售触达医务处管理层、跨 2–3 家医院的付费
  专科试点、定价锚定于更快的医生院区激活而非泛化的自动化主张。可防御资产不只是文件存储——而是机构专属
  特权授予要求的持续增长规则图谱，加上按专科和院区追踪审批周期在哪里卡住的基准数据。刻意的推进节奏是：
  先证明同系统住院医生复用，再增加相邻专科和合作伙伴集成，最后才扩展到 locums 入职、辅助医疗或付款方注册。
  最大的否定性风险是第一个院区的数据不能实质性缩短第二个院区的委员会审查周期——那会使产品变成服务密集型
  工作流层，而非持续积累价值的软件资产。来源意见中的创业牵引力数据有希望但部分依赖单一来源，因此前 12 个月
  必须产出客户持有的时间戳、试点转化数据和医生档案留存数据，而不是依赖关于类别动能的道听途说。
problem:
  - 区域医疗系统通常有意愿在次级院区值班的医生，但每家医院都从头重建特权授予材料包，导致空班演变成 90–120 天的入职项目和本可避免的 locums 支出。
  - 医务处仍通过电子邮件、PDF、电子表格和委员会跟进来运营资质认证流程，这造成审计风险、协调员积压和跨机构医生数据复用率低。
solution:
  - 构建医生执业特权护照，存储可复用的核心资质档案、追踪完整性，并生成带有完整证据链和审计日志的机构专属委员会审核材料包。
  - 先作为一个专科在一个区域医疗系统内的就绪度层起步，精确展示每个院区的激活阻碍，并以导出或 API 方式接入现有资质认证或排班工作流，而非第一天就取而代之。
whyWeWin:
  - 产品将医生端维护数据的动力与医院端更快清件以获得付费班次的需求绑定在一起——这是现有套件和 CVO 工作流始终无法持续做到的。
  - 每次部署都会新增机构专属特权授予逻辑、异常模式和激活基准，使实施速度持续提升，并构建出竞争对手难以复制的规则与运营数据集。
strategicChoices:
  beachhead: 在一个州或大都市区内运营、由集中医务处管理的 3–6 家医院区域医疗系统中，内部兼职住院医生群体。
  wedgeRationale: >-
    住院医生提供频繁的夜班和周末覆盖痛点、可重复的文件集，以及现实的同系统复用循环——第一个院区的数据已经存在。
    这比从外部 locums、全国网络或特权差异性更高、重复量更低的专科起步能更快产出证明。
  sequencingRationale: >-
    公司应首先为一个专科交付材料包复用、缺失项解决和符合审计要求的审批可见性，因为买方信任取决于在深度自动化之前
    看到可量化的激活改善。只有 3–5 个付费试点转化之后，团队才应增加排班集成、相邻专科和渠道合作，因为宽泛的
    功能范围或过早的销售扩编会超越可移植性和买方采用意愿的证据。
  notYet:
    - 外部 locums 市场和中介履约
    - 完整资质认证档案系统的替代
    - 辅助医疗资质认证和付款方注册
    - 在同州特权授予复用被证明之前的跨州扩展
market:
  tam: "$59.6M 估算切口 TAM：397 个美国医疗系统，每系统年合同价值约 $150K，涵盖护照和特权授予工作流。"
  sam: "$32.9M 估算滩头市场 SAM：219 个更接近 2–8 家医院 ICP 的小型医疗系统，每系统年合同价值约 $150K。"
  som: "$3.8M 估算第 3 年 SOM：通过专科主导的落地扩张模式可触及 25 个区域医疗系统，每系统年合同价值约 $150K。"
  segments:
    - 拥有 2–8 家医院且设有集中医务处的区域医疗系统
    - 在邻近院区为同一批医生授予特权的社区医院集团和门诊网络
  buyingProcess: >-
    典型冠军是医务服务主任或医生企业运营负责人，经济买方是响应 locums 超支或医生激活延迟的 CMO、CFO
    或医生企业副总裁。交易应从一个专科和 2–3 家机构的付费试点起步，委员会、合规和 CIO 审查聚焦于
    可审计性和集成风险，之后再签署全系统年度合同。
product:
  mvp: >-
    MVP 包括医生护照创建、机构清单映射、缺失文件检测、委员会审核材料包生成、审批状态追踪、
    审计日志，以及导出或 API 方式接入现有系统。范围应足够窄，以证明当第一个院区数据已存在时，
    第二个院区住院医生激活速度实质性更快。
  sixMonth: >-
    在 2–3 家医院上线一个专科工作流并保留人工质检环节，展示客户持有的中位激活天数时间戳，
    并为协调员和医生申请者上线基于角色的仪表板。
  twelveMonth: >-
    增加第二个专科、更深入的资质认证和排班系统集成、材料包瓶颈基准报告，以及将新院区配置压缩到
    六周以内的模板化实施手册。
  twentyFourMonth: >-
    扩展到多专科区域部署、复查认证和监控工作流，以及为人员配置公司或 CVO 开放合作伙伴 API，
    同时保持医生就绪度层的定位而非全面 HR 或 EHR 平台。
  keyBets:
    - 住院医生跨机构激活相比手工重建材料包可实现可重复的 30 天以上缩短。
    - 买方在不替换现有委员会系统的情况下接受护照和就绪度层。
    - 当更快审批与可见的付费班次挂钩时，医生会持续维护档案。
    - 机构专属规则可以模板化到足以保留软件级毛利率。
gtm:
  wedge: 在 locums 覆盖预订之前，销售同系统或近期入职兼职住院医生跨 2–5 家医院的更快激活。
  channels:
    - 创始人主导进入 NAMSS 和 AAPPR 网络的外向拓客
    - 早期区域医疗系统内部的医生冠军和 CMO 转介
    - 已看到紧急覆盖请求的 CVO、locums 和人员配置合作伙伴
    - 试点证明价值后与现有资质认证套件的集成联合销售
  funnelTargets: "介绍→工作流审计 25–35%，审计→付费试点 40–50%，试点→年度生产合同 60%+，首个院区→六个月内第二个院区扩展 50%+ 赢单中。"
  pricing: >-
    按医院数量和激活医生数量收取年度 SaaS 合同费，加一次性特权规则配置实施费。这与买方的价值认知
    一致：每个额外的医生-院区激活都能避免 locums 成本和协调员人工，而固定合同使收入对班次量波动的
    依赖度更低。
businessModel:
  revenueStreams:
    - 按系统和医院数量计费的护照和特权授予工作流年度订阅
    - 一次性实施和机构规则配置费
    - 面向额外专科、基准报告或合作伙伴工作流扩展的高级模块或单次激活费
  unitOfValue: 已完成资质清件的医生-院区激活
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一区域医疗系统内增加更多医院
    - 从住院医生扩展到麻醉科、急诊科及其他高重复班次专科
    - 叠加复查认证、制裁监控和就绪度基准报告
    - 在核心切口被证明后将护照扩展到 locums 入职、门诊手术中心特权授予和相邻医疗机构类别
strategyMap:
  northStarMetric: 季度内 30 天完成资质清件的医生-院区激活数
  inputMetrics:
    - 从医生有意愿到次级院区完成特权授予的中位天数
    - 提交材料包前护照完整的医生比例
    - 缺失项解决周期时间
    - 付费试点转为年度生产合同的转化率
    - 现有客户账户内从第一个专科扩展到第二个专科的速度
  moatsToBuild:
    - 按专科和院区划分的机构专属特权授予规则图谱
    - 含复用历史的持续更新医生护照数据集
    - 展示瓶颈和审批差异的激活基准数据库
    - 围绕现有资质认证套件的集成和工作流模板
  killCriteria:
    - 如果前 3 个付费试点未能将第二院区中位激活时间改善至少 20 天，则收窄切口或放弃护照优先策略。
    - 如果尽管有可量化的时间节省，仍有不足 40% 的试点在六个月内转化为年度生产合同，则买方痛点不足以支撑创业级工作流软件。
    - 如果当付费班次可见时，不足 60% 的医生在 90 天内刷新所需档案数据，则医生持有护照的护城河弱于预期。
  mermaid: |
    flowchart LR
      Wedge[Hospitalist cross-facility wedge] --> MVP[Passport plus packet workflow MVP]
      MVP --> Proof[30 plus day activation reduction and pilot conversion]
      Proof --> Expansion[More hospitals, specialties, and partner channels]
investorMemo:
  verdict:
    call: 继续跟进/深入调查
    conviction: 如果早期试点证明同系统特权授予复用，则中等信心；如果每个院区仍像定制化服务部署，则低信心。
    whyBelieve: 医院已将资质认证延迟视为人员配置和财务问题，这个切口直击有意愿医生与可排班产能之间的激活瓶颈。
    whyDoubt: 本地委员会差异性和现有厂商的工作流控制权可能限制自动化收益，并使业务实施服务过重而难以达到创业级回报。
    nextDiligence: 通过客户持有的试点数据核实：一份已审批的住院医生档案是否能在不增加合规异常的情况下，将第二院区清件时间缩短至少 20–30 天。
  firstCustomer:
    title: 区域医疗系统医务服务主任
    profile: 负责 3–6 家邻近医院的资质认证，面临住院医生覆盖缺口反复出现，并有仍需跨院区手工组装材料包的集中团队。
    trigger: locums 支出突增、周末覆盖反复失败，或新增机构迫使同一批医生再走一轮特权授予流程。
    buyer: 首席医疗官（CMO）或首席财务官（CFO）
    initialContract: "$30K–$60K 跨 2–3 家医院单专科付费试点，如激活时间缩短 30 天以上且合规异常持平，则转化为 $120K–$180K 年度系统合同。"
  mustBeTrue:
    - 在第一个院区获批的住院医生档案必须将第二院区中位清件周期缩短至少 20 天。
    - 至少 60% 的付费试点必须在试点完成六个月内转化为年度生产合同。
    - 首个专科部署每个新医院院区的实施工作量必须低于六周。
    - 提供真实班次机会的医生中，至少 60% 必须在 90 天内保持所需护照数据的更新。
    - 包含人工质检和实施在内的新部署毛利率必须仍趋向 70% 以上。
  diligenceQuestions:
    - 住院医生材料包内容中，真正可跨机构复用的比例是多少，还是本地仍会重新审查大部分内容？
    - 哪些现有系统主导前 20 个目标账户，在不变成替换项目的情况下集成难度如何？
    - 买方需要什么量化的 locums 或覆盖节省，才能支撑六位数年度合同？
    - 哪个专科的紧迫需求、可重复文件和低委员会差异性组合最优？
    - 医生是否会在没有可见付费工作的情况下维护护照，还是班次机会才是真正的留存引擎？
operatingAssumptions:
  - assumption: 区域医疗系统会在替换现有资质认证软件之前购买就绪度层。
    basis: research.yaml
    validationTest: 获取 10 次集成探索通话和至少 3 份共创客户 LOI，明确在试点期间保留现有套件。
    decisionImpact: 如果为假，公司必须重新定位为集成合作伙伴，或放弃需要完整套件替换的账户中的直销。
  - assumption: 住院医生是可重复材料包复用和紧急预算痛点的最快切入专科。
    basis: operator judgment
    validationTest: 在前 5 个目标系统中，比较住院医生、麻醉科和急诊科的空班日志、locums 支出和材料包异常率。
    decisionImpact: 如果为假，在扩展实施模板之前将切口转向具有更好复用经济性的专科。
  - assumption: 当更快审批与可见的付费班次挂钩时，医生会保持护照数据更新。
    basis: idea.yaml
    validationTest: 在试点期间追踪有实时班次机会的医生与仅有档案访问权限的用户的 90 天刷新率和完整率。
    decisionImpact: 如果为假，护城河从医生持有的数据转向管理员维护的工作流软件，削弱网络效应并改变产品设计。
  - assumption: 机构专属特权授予规则可以模板化到每个院区配置时间低于六周。
    basis: operator judgment
    validationTest: 在前 10 个医院院区测量实施工时、手工异常和首次出包时间。
    decisionImpact: 如果为假，服务密集度上升，毛利率收窄，扩展应收窄到更少专科并转向合作伙伴主导的部署。
  - assumption: 符合审计要求的材料包生成和审批可见性能在不自主最终审批的前提下将协调员工作量减少至少 30%。
    basis: research.yaml
    validationTest: 与医务协调员进行前后时间研究，并在付费试点期间监控合规异常率。
    decisionImpact: 如果为假，ROI 信息减弱，定价必须下移至行政工具而非覆盖成本节省。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 获取 3–5 个共创客户，在每个客户的 2–3 家医院中收集一个住院医生工作流的基准时间戳。
    hypothesis: 当展示当前激活延迟并确保试点符合审计要求且范围窄时，买方会积极参与并共享运营数据。
    successMetric: 3 份签署的试点 LOI，加上来自至少 6 家医院的完整基准流程图和周期时间数据。
    owner: CEO founder
  - horizon: 0–90 天
    experiment: 在构建完整自动化之前，先进行有人工质检的材料包复用礼宾式试点。
    hypothesis: 即使是半手工的护照工作流，也能将次级院区材料包准备时间削减到足以支撑 MVP 构建的程度。
    successMetric: 处理 10 份医生材料包，记录协调员准备时间减少 30% 以上且无实质性合规缺陷。
    owner: Credentialing operations lead
  - horizon: 90–180 天
    experiment: 将 MVP 材料包生成、清单映射和审计日志工作流接入一个现有系统集成或导出路径。
    hypothesis: 如果协调员能保留委员会工作流和证据链，叠加层部署是可接受的。
    successMetric: 2 个付费试点在保留现有系统的情况下上线生产，且客户审查无安全或合规阻断。
    owner: Founding eng
  - horizon: 90–180 天
    experiment: 通过向部分用户开放真实兼职机会来测试医生护照留存。
    hypothesis: 当医生看到更快获得付费班次的途径时，档案新鲜度会实质性改善。
    successMetric: 暴露组医生所需文件刷新率 60% 以上，对照组明显更低。
    owner: Product lead
  - horizon: 180–270 天
    experiment: 增加第二个专科，衡量机构规则的模板可移植性。
    hypothesis: 由于材料包逻辑和缺失项工作流部分迁移，首个专科之后的实施模式更接近软件化。
    successMetric: 第二专科在 2 个客户院区六周内上线，手工异常少于首次发布。
    owner: Implementation lead
  - horizon: 270–540 天
    experiment: 与一家人员配置公司、CVO 或现有套件集成商启动一个渠道合作关系。
    hypothesis: 一旦客户 ROI 被证明，合作伙伴比冷外向拓客更高效地引入紧急覆盖工作流。
    successMetric: 至少 25% 的合格管道来自合作伙伴，且至少 1 个合作伙伴引入账户转化为付费试点。
    owner: CEO founder
operations:
  - 符合 NAMSS 标准的资质材料包 SOP、证据链和每次专科发布的质检清单
  - 从 CAQH、NPPES 及其他许可医疗机构数据工具摄取和规范化数据
  - 覆盖章程审查、规则映射和委员会升级路径的逐院区实施手册
  - 对任何缺失、冲突或高风险资质凭证的人工环内审查
  - 每月客户 ROI 复盘，涵盖激活时间、协调员工作量和规避的 locums 使用量
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 早期必须创始人主导销售，因为买方信任、工作流探索和专科选择都依赖直接的运营可信度。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 核心产品风险在于数据规范化、材料包生成、审计追踪和集成脚手架，这些必须从第一天起内部掌控。
  - role: 资质运营负责人
    startTiming: Month 1
    rationale: 该角色将本地特权授予规则转化为产品需求、设计质检控制，并使首批部署不至于变成不安全的自动化实验。
  - role: 全栈集成工程师
    startTiming: Month 4
    rationale: 一旦首批试点存在，集成深度和部署速度就成为试点转化和多院区扩展的主要瓶颈。
  - role: 客户主管/战略合作负责人
    startTiming: Month 9
    rationale: 只有在公司能展示可重复的付费试点转化和清晰的合作伙伴路径之后才雇佣，否则销售产能会超越产品证明。
milestones:
  - horizon: 0–12 个月
    items:
      - 在一个区域和一个专科签署 3–5 个共创客户
      - 将至少 3 个付费试点转化为年度生产合同
      - 在住院医生工作流中证明中位次级院区激活改善至少 30 天
      - 将首个院区实施控制在八周以内，第二个院区发布控制在六周以内
      - 建立一条客户在生产环境中接受的现有系统集成或导出路径
  - horizon: 12–24 个月
    items:
      - 在现有客户系统中扩展到第二和第三个专科
      - 以可重复的实施手册达到 8–10 个生产医疗系统客户
      - 至少启动 2 个产生合格管道的渠道或集成合作关系
      - 引入基准报告、监控和复查认证模块以提升净收入留存
  - horizon: 24–36 个月
    items:
      - 达到 25 个区域医疗系统，实现研究中的第 3 年 SOM 目标
      - 支持跨常见医院配置的具有可审计规则模板的多专科部署
      - 在不失去核心毛利率纪律的前提下，将护照扩展到相邻就绪度工作流，如 locums 入职或门诊手术中心特权授予
risks:
  - risk: 机构和委员会差异性可能限制一份医生材料包跨院区真正可复用的程度。
    likelihood: High
    impact: High
    mitigation: 从同系统医院内的一个专科起步，记录每个异常，并拒绝在复用指标被证明之前扩展。
  - risk: 一项缺失或错误的资质凭证可能在审计敏感工作流中摧毁买方信任。
    likelihood: Medium
    impact: High
    mitigation: 保留人工审批环节，维护完整证据链，以就绪度和材料包生成软件而非自主特权授予的方式发布。
  - risk: 现有套件或 CVO 供应商可能在 ROI 显现后捆绑类似的护照功能。
    likelihood: Medium
    impact: High
    mitigation: 在医生参与度、跨机构规则数据和激活基准上率先获胜，赶在现有厂商认为该切口具有战略重要性之前。
  - risk: 即使买方承认痛点，企业销售周期可能仍然漫长。
    likelihood: High
    impact: Medium
    mitigation: 针对急性 locums 和覆盖事件进行销售，使用带有硬周期时间基准的付费试点，并利用合作伙伴渠道进入已活跃账户。
  - risk: 除非产品同时展示即时收入机会，否则医生可能不会保持档案更新。
    likelihood: Medium
    impact: Medium
    mitigation: 将刷新工作流与实际班次机会挂钩，并设计产品使协调员在医生参与度滞后时仍能维护就绪度。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 构建符合审计要求的护照 MVP，在一个专科内证明 3–5 个付费区域系统试点，建立现有系统集成和质检控制，并在扩展 GTM 之前实现可重复的试点转生产转化。
