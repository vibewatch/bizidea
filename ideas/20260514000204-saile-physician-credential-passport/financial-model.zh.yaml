scenarios:
  downside:
    description: 现有厂商阻力使合同更接近基准 ACV，销售周期拉长，人工审查重度持续更久。
    y3RevenueK: 2137.5
    y3EbitdaK: -706.5
    cashLowPointK: 310.4
    keyAssumptionChanges:
    - 由于扩展模块未能如期落地，Y3 标准化 ARPU 保持在 $150K 而非 $165K。
    - 由于付费试点转化滑向 9 个月周期，Y3 退出时客户数为 20 家而非 25 家。
    - 由于人工质检和规则映射仍服务密集，毛利率停滞在约 68%。
  base:
    description: 三个转化的试点形成可重复的同系统手册，随后公司在区域医疗系统内扩展并增加合作伙伴引入的需求。
    y3RevenueK: 2715.7
    y3EbitdaK: -220.0
    cashLowPointK: 730.9
    keyAssumptionChanges:
    - 随着基准报告和相邻模块适度提升 $150K 基础合同，Y3 标准化 ARPU 达到 $165K。
    - Q4Y3 客户数达到 25 家，与商业计划和研究中的第 3 年 SOM 目标一致。
    - 一旦规则模板和集成在院区间可复用，毛利率达到 70%–72%。
  upside:
    description: 合作伙伴渠道更早起效，现有系统更快扩展，定价更充分实现年度合同高端区间。
    y3RevenueK: 3310.4
    y3EbitdaK: 340.4
    cashLowPointK: 905.1
    keyAssumptionChanges:
    - 随着更多客户购买多专科和监控模块，Y3 标准化 ARPU 升至约 $175K。
    - 由于渠道合作伙伴引入更多区域医疗系统，Q4Y3 客户数约达 30 家。
    - 延后支持岗招聘和 74% 的退出毛利率使 Q4Y3 明显实现现金盈利。
