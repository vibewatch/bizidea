modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Leads[Founder outreach plus partners] --> Pilots[Paid pilots]
      Pilots --> Customers[Production health-system customers]
      Customers --> Revenue[Subscription and implementation revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入由从 Y1 末 3 个付费系统增长到 Y3 末 25 个系统驱动，同时标准化年度 ARPU 随客户超出试点范围扩展而从 $140K 升至 $165K。
- checkName: 必须跑通的
  finding: 机构规则模板化和对现有系统友好的集成必须使第二院区发布足够可重复，才能使毛利率从早期试点的 50% 以下升至第二年约 70%。
- checkName: 模型的破局点
  finding: 如果试点转生产周期拉长至 9 个月，Y3 落在约 20 个客户，则下行情景现金降至约 $0.3M，被迫提前融资。
- checkName: 下一轮融资证明
  finding: 下一轮融资的理由是达到 8–10 个生产系统、至少 2 个合作伙伴渠道，以及支持可量化多专科扩展的可重复六周以内发布节奏。
sanityChecks:
  ruleOf40: Y3 增速 187.7% + EBITDA 利润率 -8.1% = 179.6%
  burnMultiple: 约 Y2 消耗倍数 0.8x，Y3 消耗倍数 0.1x（基于年末 ARR 扩展）。
  revenuePerFte: $301.7K Y3（SaaS 基准 $200–400K）
  flags:
  - 基础情景要求公司达成研究中的第 3 年 SOM 完整目标（25 个系统），执行失误几乎没有余地可在下次融资前缓冲。
  - 毛利率改善假设规则模板化和人工质检在前几次部署后变得实质性更可复用。
  - CAC 和流失率仍是启发式估算，因为公司尚无可观察的队列，早期试点数据可能实质性改变单位经济指标。
  - 收入集中度仍然显著，因为 25 个区域医疗系统对于创业级结果而言账户基数仍相对偏小。
