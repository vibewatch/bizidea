openQuestions:
- How often can one hospital’s approved packet materially shorten committee review at a second site versus forcing near-restart for specialty-specific privilege evidence?
- Which specialty shows the best combination of repeatable documents, urgent coverage pain, and low objection from department chairs?
- Will regional systems accept a passport layer sitting on top of incumbent suites, or will they insist on suite-vendor ownership of all credentialing events?
- How much of the real opportunity is internal moonlighting versus external locums and agency-supplied physicians in 2-8 hospital systems?
