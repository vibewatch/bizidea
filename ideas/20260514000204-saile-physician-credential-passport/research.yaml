competitors:
- name: Medallion
  stage: scale-up
  wedge: AI-led provider operations spanning credentialing, privileging, enrollment, and health-system automation
  pricing: Custom enterprise pricing
  strength: Strong automation narrative, explicit health-system messaging, and clear compliance framing for NCQA, Joint Commission, and CMS workflows.
  weaknessVsUs: Broad provider-operations scope dilutes focus on a physician-held passport and the specialty-specific shift activation loop for moonlighters.
  sourceRefs:
  - 24
  - 25
  - 26
  - 28
- name: Verifiable
  stage: scale-up
  wedge: API-first credentialing software plus NCQA-certified CVO and monitoring
  pricing: Custom enterprise pricing
  strength: Deep PSV automation, strong provider-data workflows, and visible audit/compliance posture at network scale.
  weaknessVsUs: Less centered on hospital privileging committees and local cross-facility activation than on generic credentialing throughput and CVO outcomes.
  sourceRefs:
  - 31
  - 32
  - 33
  - 36
- name: CredentialStream (HealthStream)
  stage: incumbent
  wedge: Hospital credentialing, privileging, and multi-facility medical-staff workflow suite
  pricing: Custom enterprise pricing
  strength: Entrenched trust with privilege-granting organizations, multi-facility support, and an expanding provider-portfolio layer.
  weaknessVsUs: Heavier suite motion and weaker physician-side incentive loop than a passport product built around side-job activation.
  sourceRefs:
  - 37
  - 38
  - 51
  - 56
- name: Modio Health
  stage: scale-up
  wedge: Cloud profile, licensing, and credential-management tooling with services support
  pricing: Custom pricing
  strength: Good provider-profile and licensing-management orientation for reducing repeat data collection.
  weaknessVsUs: Less depth in hospital privileging committees, acute-care governance, and urgent cross-facility activation than the proposed wedge.
  sourceRefs:
  - 41
  - 42
