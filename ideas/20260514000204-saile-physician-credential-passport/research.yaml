  validationPlan:
  - priority: high
    question: How much faster can a physician be privileged at site two when site one data already exists?
    evidenceToGather: Pilot time stamps for one specialty across two to three hospitals, including committee review deltas and missing-item patterns.
  - priority: high
    question: Which specialty has the cleanest combination of repeatable documents and urgent shift demand?
    evidenceToGather: Lost-shift logs, locums spend by specialty, and packet exception rates for hospitalists, anesthesia, emergency medicine, and internal moonlighter pools.
  - priority: medium
    question: Will buyers accept a layer-on-top product before replacing incumbent systems?
    evidenceToGather: Integration scoping calls with HealthStream/CredentialStream, MD-Staff users, and medical staff office leaders.
  - priority: medium
    question: Do physicians keep a reusable passport current only when compensated work is visible?
    evidenceToGather: Activation and document-refresh rates for physicians exposed to actual side-shift opportunities versus profile-only experiences.
