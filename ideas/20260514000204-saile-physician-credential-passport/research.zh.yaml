  - 56
- name: Modio Health
  stage: scale-up
  wedge: 带服务支持的云端档案、许可证和资质管理工具
  pricing: 定制定价
  strength: 良好的医疗机构档案和许可证管理导向，有效减少重复数据收集。
  weaknessVsUs: 在医院特权委员会、急性医疗治理和紧急跨机构激活上的深度不及拟议切口。
