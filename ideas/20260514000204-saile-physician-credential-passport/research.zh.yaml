    - 18
  - factor: economic
    impact: positive
    point: 医生短缺和持续的 locums 依赖提升了把有意愿的临床医生更快转化为可计费、可排班产能的价值。
    sourceRefs:
    - 4
    - 5
    - 6
  - factor: social
    impact: positive
    point: 医生日益重视灵活性、补充收入和减少文书负担，使可复用的职业档案更具可信度。
    sourceRefs:
    - 19
    - 44
    - 46
  - factor: technological
    impact: positive
    point: 执业者身份和可核验资质凭证的标准，加上 AI 辅助的 PSV 和材料包生成，使可携带就绪度基础设施在现在更可行。
    sourceRefs:
    - 21
    - 22
    - 25
    - 31
  - factor: legal
    impact: negative
    point: 资质认证和特权授予仍受本地章程、NCQA 政策和医院审计要求约束，因此自动化仍需严格控制。
    sourceRefs:
    - 13
    - 17
    - 18
  adoptionFrictionMatrix:
  - friction: 对 AI 生成资质材料包的信任
    severity: high
    affectedBuyer: 医务服务负责人
    mitigation: 在循环中保留人工审查，并为每个材料包决策展示完整证据链。
    sourceRefs:
    - 17
    - 18
    - 25
    - 33
  - friction: 跨机构的专科和委员会差异性
    severity: high
    affectedBuyer: 科室主任和资质认证委员会
    mitigation: 从一个专科起步，在扩展院区数量之前将本地规则编成代码。
    sourceRefs:
    - 11
    - 24
    - 26
  - friction: 与现有系统的集成负担
    severity: medium
    affectedBuyer: CIO 或运营赞助方
    mitigation: 定位为带有 API 和导出接口的就绪度层，而非第一天就要求替换档案系统。
    sourceRefs:
    - 21
    - 37
    - 38
    - 56
  - friction: 保持医生档案更新
    severity: medium
    affectedBuyer: 医生用户
    mitigation: 将更新与更快审批、更少表格和可见兼职机会等切实利益挂钩。
    sourceRefs:
    - 15
    - 19
    - 44
    - 56
