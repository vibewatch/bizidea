openQuestions:
- 一家医院已审批的材料包能在多大程度上实质性缩短第二个院区的委员会审查，而不是迫使专科特权证据几乎从头重来？
- 哪个专科在可重复文件、紧急覆盖痛点和科室主任低异议三者上的组合最优？
- 区域医疗系统会接受叠加在现有套件之上的护照层，还是会坚持套件供应商拥有所有资质认证事件？
- 在 2–8 家医院系统中，真正的机会有多少来自内部兼职，有多少来自外部 locums 和中介供应的医生？
