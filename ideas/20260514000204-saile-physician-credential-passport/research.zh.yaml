  - 36
- name: CredentialStream (HealthStream)
  stage: incumbent
  wedge: 医院资质认证、特权授予和多机构医务处工作流套件
  pricing: 定制企业定价
  strength: 在特权授予机构中深度信任、多机构支持，以及持续扩展的医疗机构档案层。
  weaknessVsUs: 更重的套件销售动作，以及比围绕兼职激活构建的护照产品更弱的医生端激励循环。
  sourceRefs:
