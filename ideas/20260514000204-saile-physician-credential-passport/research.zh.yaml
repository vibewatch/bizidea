  sourceRefs:
  - 15
- point: AMA 和 HealthStream 都在投资预填充档案和医疗机构档案集，验证了对可携带职业身份的市场需求。
  sourceRefs:
  - 19
  - 56
- point: 医务处报告人员流失、低自动化和多系统重复录入，这正是该产品所针对的工作流缺口。
  sourceRefs:
