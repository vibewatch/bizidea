jobsToBeDone:
  - job: When a hospital has open weekend or night coverage and a willing moonlighting physician, help the medical staff office clear that doctor across multiple facilities fast, so they can fill shifts before the need rolls into expensive locums spend.
    currentAlternative: Email-based packet collection, spreadsheet trackers, and manual follow-up with credentialing services or staffing agencies
    successMetric: Days from physician interest to cleared privileges and percent of urgent shifts filled internally
  - job: When a physician wants to work at a second or third site, help them reuse one professional file instead of resubmitting everything, so they can start earning faster with less admin drag.
    currentAlternative: Re-entering the same documents into each hospital or agency workflow
    successMetric: Physician time spent on onboarding and number of additional sites activated per quarter
