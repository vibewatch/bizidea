topRisks:
  - name: Privileging variance
    description: Each hospital and specialty committee may interpret required documents and approval steps differently, which can slow standardization.
    mitigation: Start with a narrow specialty set and a configurable rules engine, then prove repeatable time savings before expanding to more committees.
  - name: Trust and compliance failure
    description: One missing or incorrect credential artifact could erode trust with medical staff leaders and make the product feel unsafe for a regulated workflow.
    mitigation: Keep human approval in the loop, maintain full audit trails, and launch first as a packet-generation and readiness layer rather than autonomous final approval.
  - name: Incumbent bundling
    description: Staffing firms, CVOs, or medical staff software vendors could bundle a lighter credential passport once the ROI becomes obvious.
    mitigation: Win on the hardest cross-facility activation workflow first and build network effects through physician reuse and multi-hospital privileging data incumbents do not already control.
