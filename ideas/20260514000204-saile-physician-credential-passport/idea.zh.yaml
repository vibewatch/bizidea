topRisks:
  - name: 特权授予差异性
    description: 每家医院和每个专科委员会对所需文件和审批步骤的解读可能各不相同，这会拖慢标准化进程。
    mitigation: 先聚焦于小范围专科集合和可配置规则引擎，在扩展到更多委员会之前证明可复现的时间节省。
  - name: 信任与合规失效
    description: 一项缺失或错误的资质凭证可能侵蚀医务处管理层的信任，使产品在受监管工作流中显得不安全。
    mitigation: 保留人工审批环节，维护完整审计追踪，首先作为材料生成和就绪度层发布，而非自主最终审批。
  - name: 现有厂商捆绑竞争
    description: 一旦 ROI 显现，人员配置公司、CVO 或医务处软件供应商可能会捆绑一个更轻量的资质护照功能。
    mitigation: 率先拿下最难的跨院区激活工作流，通过医生复用数据和多院区特权授予数据构建网络效应——这些都是现有厂商尚未控制的。
