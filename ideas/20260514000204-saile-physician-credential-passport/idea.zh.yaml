jobsToBeDone:
  - job: 当医院有空班且有意愿的兼职医生时，帮助医务处跨多机构快速完成该医生的资质清件，在需求演变为高价 locums 支出之前填上班次。
    currentAlternative: 基于电子邮件的材料收集、电子表格追踪，以及与资质认证服务机构或人员配置中介的手工跟进
    successMetric: 从医生有意愿到完成特权授予的天数，以及紧急班次内部填充的比例
  - job: 当医生想在第二或第三家机构工作时，帮助他们复用同一份职业档案，无需重新提交所有材料，从而更快开始赚钱、减少行政负担。
    currentAlternative: 在每家医院或中介机构的工作流中重新录入相同文件
    successMetric: 医生用在入职上的时间，以及每季度激活的额外院区数量
