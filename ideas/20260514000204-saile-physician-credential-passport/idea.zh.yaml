problem: >-
  区域医疗系统需要兼职和兼任专科医生填补夜班、周末及季节性人员缺口，但每家医院在医生上岗前仍要从头重建同一套资质档案。
  医务处疲于应对电子邮件、PDF、委员会规则和人员供应商，医生则一遍遍地重复提交相同文件，导致上岗延迟长达 90–120 天，
  紧急空班长期高价难填。卡住的不只是找到医生本身——而是能否快到位，把一位有意愿的医生转化为获得特权授予、
  符合合规要求、可排班上岗的临床医生。
targetUser:
  primary: 美国区域医疗系统（2–8 家医院）的医务服务主任或医生企业副总裁
  secondary: 负责跨机构专科班次排班的劳动力运营经理或 locums 项目负责人
  buyer: 首席医疗官（CMO）或首席财务官（CFO）
startupThesis:
  nonObviousInsight: >-
    这个市场的赢家不会从另一个人员配置市场起步——它将拥有可复用的医生身份和机构专属特权授予材料包，
    把潜在的医生供给转化为已激活的排班产能。变化在于：AI 现在能够跨招募、入职、合规和排班等环节打通同一套
    资质认证工作，而医生也已表现出维护可携带档案的意愿，因为这直接关乎兼职收入。
  beachhead: >-
    美国区域医疗系统（2–8 家医院），这些系统依赖兼职或兼任内科、急诊科、麻醉科或住院医生跨多机构值班，
    目前仍对每个院区分别从头重建资质档案
  wedge: >-
    一个医生执业特权护照——存储可复用的已核验资质档案，映射到每家医院的特权授予清单，
    并为跨院区医生生成委员会审核材料包和班次激活工作流
  whyNowCatalyst: >-
    Saile 的融资、近 5,000 名活跃医生以及声称缩短 45 天入职时间，共同表明医生意愿和 AI 驱动的
    工作流压缩已同时成立，可携带特权授予正变得紧迫且可信。
  ventureScalePath: >-
    从医院侧激活兼职医生起步，再扩展到 locums 入职、门诊手术中心特权授予、付款方注册、
    辅助医疗人员资质认证，最终成为可携带临床工作者身份与产能分配的档案级系统。
solution: >-
  产品为每位医生提供一本持续更新的执业护照，涵盖核心资质文件、工作经历、推荐信和合规材料，
  再将该档案转化为网络内每家医院的专属特权授予材料包。对医务处而言，它用一套工作流取代了电子邮件链
  和电子表格追踪——该工作流能标出缺失项、推送审批，并精确显示哪些环节阻止了医生接班。对医生而言，
  它把反复填写表格变成一次性设置，从而解锁次级院区更快的上岗激活和更多增量收入机会。首发版本专注于
  兼职和内部弹性排班覆盖，因为 ROI 是即时的：减少专科空班、降低 locums 依赖、压缩每位激活医生的
  协调员工时。随着时间推移，平台将成为每一项人员配置动作都接入的数据层。
goToMarketSeed:
  firstCustomer: >-
    一个处于临床医生短缺市场的 3–6 家医院区域医疗系统，长期使用兼职住院医生或麻醉科医生，
    设有集中医务处，且在医生完成特权授予材料前经常损失数周时间
  buyingTrigger: >-
    locums 支出突增、专科夜班反复出现空缺，或新收购医院迫使系统对同一批医生在额外院区重走
    特权授予流程，这些情形都会制造预算压力和紧迫感
  currentAlternative: >-
    内部医务协调员依靠电子邮件和电子表格、资质认证服务机构或 CVO、locums 中介，
    以及每个机构从头组装的手工特权授予材料包
  switchingReason: >-
    该切口能跨多家医院压缩激活时间，无需系统拆换现有 HR 或人员配置软件，同时给医生
    一个持续更新自己档案的动力——审批更快直接意味着轮班收入更快到账
  pricingHypothesis: >-
    按医院数量和激活医生数量定价的年度 SaaS 合同，加上特权授予规则配置的实施费用，
    以及与成功完成资质清件的医生数量挂钩的可选单次激活费
whyNow:
  - point: 围绕 AI 资质认证护照的融资表明，投资者已相信临床医生资质可携带性足够大——值得作为基础设施独立押注，而不仅是人员配置功能。
    signalRefs: ["融资验证资质可携带性"]
    sourceRefs: [1]
  - point: 来源引用的 90–120 天瓶颈和 45 天缩短记录，使激活速度成为医院财务和劳动力管理层可量化的运营杠杆。
    signalRefs: ["入职延迟是预算级痛点"]
    sourceRefs: [1]
  - point: 报告平台上近 5,000 名活跃医生表明，供给侧行为已经改变——只要能解锁更多工作机会，医生愿意维护可复用的职业档案。
    signalRefs: ["医生愿意维护可复用的职业身份"]
    sourceRefs: [1]
  - point: 横跨招募、入职、资质认证、排班和合规的五个 AI 智能体，意味着长期被服务束缚的手工运营现在可以用软件低得多的行政开销来交付。
    signalRefs: ["AI 已能拆解资质认证业务"]
    sourceRefs: [1]
differentiator: >-
  现有资质认证供应商和人员配置中介仍将每个机构的材料包视为独立的服务工作流，导致数据碎片化、激活缓慢。
  这家公司从可复用的医生护照起步，但制胜点在于将不同医院如何把同一套基础档案转化为本地特权授予审批的规则编成代码，
  构建出通用 HR 或排班供应商都不拥有的跨院区规则图谱。该数据集随着每位医生、每家机构的加入而持续积累，
  使产品在系统增加院区、专科和人员配置合作伙伴后价值递增。
