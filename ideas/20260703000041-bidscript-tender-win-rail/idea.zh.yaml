    - 客户导入与档案整理
    - 行业专属模板开发
    - 面向中型承包商的销售与支持
jobsToBeDone:
  - job: >-
      新的公共部门招标一到，帮投标经理快速判断是否要投、快速拼出已验证的证据，这样团队才能提交合规投标，而不是把造价师的时间浪费在没戏的项目上。
    currentAlternative: >-
      靠电子表格分诊、翻共享盘、套旧 Word 模板，再跨运营和合作方团队追邮件
    successMetric: >-
      24 小时内做出投标/弃标决策，3 个工作日内拿出首版合规应答包
  - job: >-
      招标要求提供过往业绩、资质和团队简历时，帮预施工负责人调出对的证据点，把质量类评分项的得分拉满。
    currentAlternative: >-
      手工翻旧投标材料复用，再请外部投标文案填补证据缺口
    successMetric: >-
      用已验证的可复用证据回答的评分题占比，以及各招标类型的入围率
