differentiator: >-
  多数 AI 投标产品做的是在一堆乱七八糟的文件上写文案。这家公司赢在拿下证据层：哪个项目、哪个人、哪张证书、哪个合作方能回答每一条评分标准，这些证据又和中标结果有多大相关性。久而久之，每一次提交和评审结果都会沉淀成专属的中标/落标数据，反过来打磨模板、合作方推荐和投标/弃标决策。
conceptDiagram:
  title: 投标证据图谱
  mermaid: |
    flowchart LR
      买方[投标总监] --> 痛点[手工投标证据大乱斗]
      痛点 --> 产品[投标证据图谱]
      产品 --> 结果[更高中标率与更低投标成本]
