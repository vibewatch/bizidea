    score: 4
    rationale: >-
      这个切口起步很窄，但能扩展到其他招标密集型行业，以及中标前后相邻的工作流。
topRisks:
  - name: ROI 证据缺口
    description: >-
      买家可能会打折看待最高 50% 的中标率提升，因为信源把这个数字归为公司自报的客户结果，而非独立对标。
    mitigation: >-
      上线时就带上基线数据导入和逐单招标结果分析，让早期客户能拿自己的历史数据，对照测出中标率和投标成本的提升。
  - name: 档案导入拖累
    description: >-
      历史投标、资质证书和合作方材料又乱又不统一，会拖慢导入进度，推迟见到价值的时间。
    mitigation: >-
      初期产品只聚焦一种招标类型，提供管家式档案整理服务，优先打通投标团队本来就在用的文件夹和模板连接器。
  - name: 工作流邻接竞争
    description: >-
      SharePoint 顾问、投标文案代理和建筑软件厂商可能把这款产品说成是现有工具上又叠了一层，从而拖慢采用速度。
    mitigation: >-
      把产品定位成插在现有存储上的证据与决策层，让顾问干得更快，用每次投标成本下降的实证说话，而不是讲推倒重来的故事。
