problem: >-
  中型承包商判断是否要投标、拼凑投标应答时，靠的还是散落在旧 Word 文件、电子表格、共享盘和邮件里的零散知识。真正卡住他们的不只是写文案，而是要在提交截止日前，快速拿出过往业绩、人员配置、资质证书、安全记录和合作方资质的证明。结果就是昂贵的投标/弃标误判、中标证据复用率低，各次投标的合规水平也参差不齐。
targetUser:
  primary: >-
    英国 50-500 人规模土木与基础设施承包商的投标经理和预施工负责人
  secondary: >-
    负责过往业绩、人员配置和合作方证据的造价师、项目管控经理和投标协调员
  buyer: 商务总监或预施工负责人
startupThesis:
  nonObviousInsight: >-
    招标 AI 赛道的赢家不会是那个文案写得更漂亮的工具，而是能把多年沉淀在共享盘里的投标残料，变成一张项目、人员、资质、合作方可复用证据图谱的系统。变化在于：大语言模型如今能把这堆无人打理的档案结构化，新玩家也能拿明确的中标率提升说事，而不再是含糊的效率承诺。
  beachhead: >-
    英国 50-500 人规模的土木工程承包商，每年投标 20-150 个公共部门框架协议和项目招标，涉及公路、公用事业和 100 万英镑以上的地方基础设施工程
  wedge: >-
    一条投标证据流水线——把历史投标、项目成果、简历包、HSEQ 认证和分包商数据，转成逐条需求的答案草稿、缺口提示和红队评分卡
  whyNowCatalyst: >-
    BidScript 宣称的最高 50% 中标率提升，加上 Tech.eu 指出团队仍在用电子表格和共享盘跑投标，让 2026 年成了招标运营从手工作坊转向软件化的窗口期。
  ventureScalePath: >-
    先从土木承包商的投标/弃标决策、证据拼装和应答评分切入，再扩展到分包商预审、框架协议合规、中标后义务跟踪，并为其他招标密集型行业搭建跨垂直的中标率对标网络。
solution: >-
  Bid Evidence Graph 把历史投标、项目案例、简历包、HSEQ 认证和合作方文档，都收进一张按需求打标的证据图谱。新招标一到，它先解析评分标准，把每道题对应到可复用的证据，在团队烧掉造价师工时之前就标出证据缺口。产品会给投标负责人一个投标/弃标评分、责任到人的工作流和红队检查清单，然后导出带引用、可追溯到已验证原始材料的合规应答包。提交之后，系统还会记录中标/落标反馈，让每一次招标都比上一次更聪明。
goToMarketSeed:
  firstCustomer: >-
    一家 150 人规模的英国土木工程承包商，每年投标 40-60 个市政、公用事业和框架协议招标，投标团队 6 人，内部没有任何投标知识系统
  buyingTrigger: >-
    新框架协议招标或年度续标周期，逼团队在 2-6 周内重新拼出方法说明、简历包、安全证据和合作方文档
  currentAlternative: >-
    靠电子表格、共享盘、Word 和 SharePoint 投标库拼凑的手工流程，外加外部投标文案顾问
  switchingReason: >-
    这个切口能复用已验证的证据，在造价师和领域专家为一份应答耗费数天之前就标出证据缺口，既提高入围概率，又拉低每次投标的成本。
  pricingHypothesis: >-
    每个投标团队每年 3 万至 7.5 万英镑的 SaaS 订阅费，另加档案导入的入场费；扩容按活跃招标数量和合作方工作区收费
