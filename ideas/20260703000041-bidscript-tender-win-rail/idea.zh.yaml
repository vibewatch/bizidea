    score: 4
    rationale: >-
      该信号簇窗口期内有三条信源，质量分 4.1，中标率提升的说法也很具体，但结果数据依然来自公司自报。
  painIntensity:
    score: 5
    rationale: >-
      信源 2 明确指出许多团队至今仍靠电子表格和共享盘跑投标，错过一个招标或评分失误都会直接吃掉收入。
  wedgeClarity:
    score: 5
