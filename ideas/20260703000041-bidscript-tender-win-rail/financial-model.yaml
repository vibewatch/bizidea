modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Bid director and preconstruction leads] --> Audits[Paid evidence audits]
      Audits --> Pilots[Design-partner onboarding, 8-12 weeks]
      Pilots --> Subscriptions[Annual bid-desk subscriptions]
      Subscriptions --> Revenue[Blended ARPU x subscription customers]
      Revenue --> GrossProfit[Gross profit after delivery cost]
      GrossProfit --> Cash[Cash runway toward next round]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by subscription ACV stepping from $45K (Year 1 pilot pricing) to $65K (Year 3 blended) across a customer base that scales from 3 to 30 logos, plus one-time onboarding fees for each newly signed design partner."
  - checkName: Must go right
    finding: "The company must convert at least 2 of the first 3 paid design partners into annual subscriptions in Year 1 and keep onboarding partner/template-led so gross margin can climb from 55% toward the BP's 70% target instead of getting stuck in services-heavy delivery."
  - checkName: Model breaks if
    finding: "The Q4Y2-to-Q4Y3 jump from 8 to 30 customers slips or gross margin stalls near 64%, which the sensitivity table shows could cut Year 3 revenue by roughly $200K+ and pull the cash trough down toward the tighter $1.0-1.3M minimum-burn estimate."
  - checkName: Next-round proof
    finding: "The seed case is strongest once the company reaches 5-7 subscription customers with at least one partner-sourced pilot by Q4Y2 and begins posting EBITDA-positive quarters in Year 3, as shown in Q3Y3-Q4Y3."
sanityChecks:
  ruleOf40: "Y3 growth 317% (off a small $503.8K Y2 base) + EBITDA margin 1.7% = ~319%; this figure is inflated by the tiny revenue base rather than reflecting mature-SaaS rule-of-40 health."
  burnMultiple: "Y2 burn multiple ~1.6x using $582.0K net burn over $371.8K incremental revenue vs Y1; Year 3 turns cash-generative (EBITDA +$36.1K) so a burn multiple is not meaningful that year."
  revenuePerFte: "$150.2K Y3 revenue per FTE (14 FTE) vs a mature SaaS benchmark of roughly $200-400K; still below benchmark, consistent with an implementation-heavy vertical SaaS company in its third year."
  flags:
    - "Year 3 customer count jumps from 8 (Q4Y2) to 30 (Q4Y3), a roughly 3.75x logo increase in a single year that mirrors the BP's own 24-36 month milestone but is far more aggressive than the hiring-constrained Year 1-Year 2 pace; this is the single biggest execution risk in the model."
    - "Rule-of-40 and YoY growth % are distorted by a very small Year 2 revenue base ($503.8K) and should not be benchmarked against mature SaaS comparables."
    - "Gross margin recovery from 55% (Y1) to 70% (Y3) assumes onboarding standardizes largely as hoped; the BP's own risk section warns archive ingestion could 'remain too bespoke,' in which case both gross margin and the Year 3 customer ramp are optimistic."
    - "Revenue per FTE ($150.2K) stays below the $200-400K mature SaaS benchmark through Year 3, so headcount efficiency at scale is not yet proven."
    - "The $2.5M funding ask leaves a modeled cash trough of ~$1.42M, comfortably above zero; this is sized to the BP's own $2-4M/18-month guidance rather than the tighter ~$1.0-1.3M minimum this cost model implies is strictly required, with the gap acting as a buffer against slower sales cycles or heavier services costs than modeled here."
