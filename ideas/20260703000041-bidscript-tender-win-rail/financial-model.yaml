slug: bid-evidence-graph
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: YYYY-MM
    source: "[BP date 2026-07-03; model starts the next month]"
  - id: A2
    name: Opening cash after pre-seed close
    value: '2500'
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M; model uses the low-mid point $2.5M as the amount that closes at model start]"
  - id: A3
    name: Archive-onboarding / evidence-audit one-time fee per new design partner, Year 1
    value: '29'
    unit: USDK per project
    source: "[BP gtm.pricing GBP15k-GBP30k archive-onboarding fee; USD estimate uses a GBP:USD ~1.27 FX heuristic (A20), midpoint ~$28.5K rounded to $29K]"
  - id: A4
    name: Archive-onboarding fee, Year 2 new customer
    value: '32'
    unit: USDK per project
    source: "[Heuristic: onboarding fee grows ~10%/yr as templates and rule packs mature, consistent with BP pricing note that onboarding stays a discrete line item alongside the subscription]"
  - id: A5
    name: Archive-onboarding fee, Year 3 new customer
    value: '35'
    unit: USDK per project
    source: "[Same onboarding-fee growth heuristic as A4, applied for a second year]"
  - id: A6
    name: Annual subscription ARPU, Year 1 pilot-conversion pricing
    value: '45'
    unit: USDK per customer per year
    source: "[BP investorMemo.firstCustomer initialContract GBP30k-GBP75k annual subscription; model uses the low-mid end for first-year pilot-tier pricing before ROI is proven]"
  - id: A7
    name: Annual subscription ARPU, Year 2 blended
    value: '55'
    unit: USDK per customer per year
    source: "[Interpolated ramp between the Year 1 pilot ARPU (A6) and the Year 3 mature blended ACV (A8), consistent with BP expansionLevers such as extra bid desks and partner workspaces lifting ACV over time]"
  - id: A8
    name: Annual subscription ARPU, Year 3 mature blended
    value: '65'
    unit: USDK per customer per year
    source: "[research.yaml bottomUpSizingDrivers 'Blended ACV' ~$65k est., the same figure used to build the SAM/SOM math]"
  - id: A9
    name: Customer ramp, subscription customers end of period
    value: 'Year 1: 3; Year 2: 8; Year 3: 30'
    unit: customers EOP
    source: "[BP milestones: 0-12mo 'close 2-3 paid design partners...convert at least 2 pilots into annual subscriptions'; 12-24mo 'Reach 5-7 subscription customers and at least 2 partner-sourced opportunities' (model hits 6 by Q2Y2, extends to 8 by Q4Y2 with partner-sourced adds); 24-36mo 'Reach roughly 25-30 customers and about $2.0M ARR']"
  - id: A10
    name: Gross margin ramp
    value: 'Year 1: 55%; Year 2: 62%; Year 3: 70%'
    unit: percent
    source: "[BP businessModel targetGrossMarginPct 70 as the mature target; early years held lower given BP risks flag that archive ingestion and document normalization 'remain too bespoke, stretching onboarding past 90 days']"
  - id: A11
    name: CEO / founding seller loaded cash compensation
    value: '85'
    unit: USDK per FTE per year
    source: "[UK early-stage B2B SaaS founder compensation heuristic: below-market cash salary plus ~20% employer NI/pension load; role per BP team 'CEO / founding seller', Month 0]"
  - id: A12
    name: Founding engineer loaded cash compensation
    value: '120'
    unit: USDK per FTE per year
    source: "[UK early-stage B2B SaaS senior engineer compensation heuristic plus ~20% employer NI/pension load; role per BP team 'Founding eng', Month 0]"
  - id: A13
    name: Bid-domain product lead loaded cash compensation
    value: '110'
    unit: USDK per FTE per year
    source: "[UK early-stage product/domain-lead compensation heuristic plus ~20% employer load; role per BP team 'Bid-domain product lead', Month 0-3]"
  - id: A14
    name: Applied AI and document engineer loaded cash compensation
    value: '130'
    unit: USDK per FTE per year
    source: "[UK senior applied-AI/document-engineering compensation heuristic plus ~20% employer load; role per BP team 'Applied AI and document engineer', Month 6-9]"
  - id: A15
    name: Implementation and channel manager loaded cash compensation
    value: '95'
    unit: USDK per FTE per year
    source: "[UK implementation/channel-manager compensation heuristic plus ~20% employer load; role per BP team 'Implementation and channel manager', Month 9-12]"
  - id: A16
    name: Sales / BDR loaded cash compensation
    value: '90'
    unit: USDK per FTE per year
    source: "[UK enterprise SaaS sales-development compensation heuristic plus ~20% employer load; hire added post-Year 1 to scale beyond founder-led selling per BP sequencingRationale ('channel and module expansion only after pilots convert')]"
  - id: A17
    name: G&A / finance-ops loaded cash compensation
    value: '70'
    unit: USDK per FTE per year
    source: "[UK early-stage finance/admin compensation heuristic plus ~20% employer load; first dedicated back-office hire added in Year 2 as headcount and billing complexity grow, operator judgment since BP team list does not name this role explicitly]"
  - id: A18
    name: Non-payroll operating baseline
    value: 'Year 1: $6K/mo; Year 2: $10K/mo; Year 3: $15K/mo'
    unit: USDK per month
    source: "[Startup-finance heuristic for cloud hosting/LLM inference, tools, legal/compliance, insurance, and founder-led sales travel in an early UK B2B SaaS company]"
  - id: A19
    name: CAC per new subscription customer
    value: '36.25'
    unit: USDK per customer
    source: "[Derived from modeled Year 1 sales & marketing spend ($108.75K) divided by 3 new subscription customers signed; consistent with BP GTM 'founder-led outbound' plus early implementation/channel spend]"
  - id: A20
    name: GBP:USD FX heuristic
    value: '1.27'
    unit: ratio
    source: "[Simplifying FX heuristic used only to translate BP's GBP-denominated onboarding-fee anchors into USD; all other BP/research market-sizing figures are already USD-denominated]"
  - id: A21
    name: Monthly subscription logo churn
    value: '1.2'
    unit: percent
    source: "[Industry heuristic for vertical enterprise SaaS embedded in a compliance workflow with high switching cost, roughly 12-15% annual logo churn; no churn figure is given directly in BP or research]"
  - id: A22
    name: Average sales cycle, paid audit to signed annual subscription
    value: '3'
    unit: months
    source: "[Heuristic mapped to BP investorMemo.firstCustomer initialContract '8-12 weeks' evidence-audit and archive-onboarding project before conversion to the annual subscription decision]"
  - id: A23
    name: Cash conversion simplification
    value: EBITDA approximates operating cash flow
    unit: policy
    source: "[Startup-finance heuristic: no debt, capex, or separate working-capital financing modeled in this pre-seed view]"
  - id: A24
    name: Hiring sequence
    value: "CEO, Founding eng, and Bid-domain product lead at Month 0 (Q1Y1); Applied AI and document engineer at Month 6-9 (Q3Y1); Implementation and channel manager at Month 9-12 (Q4Y1); additional Engineering, Sales/BDR, and G&A hires phased through Year 2-3"
    unit: role-start timing
    source: "[BP team section start timings for the first five roles; Year 2-3 scale-up hires (2nd/3rd engineer, sales rep, G&A) are operator judgment sized to the customer ramp in A9]"
  - id: A25
    name: Funding ask amount and runway
    value: "$2.5M pre-seed, 18-month runway"
    unit: USDM / months
    source: "[BP fundingAsk: round pre-seed, targetFundingRangeUsd $2-4M, runwayMonths 18; model selects the low-mid point of the range]"
