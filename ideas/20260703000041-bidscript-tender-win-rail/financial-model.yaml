scenarios:
  downside:
    description: "Archive ingestion stays services-heavy and partner-sourced pilots arrive a quarter late, so gross margin stalls and the Year 3 logo count falls well short of the BP's 25-30 milestone."
    y3RevenueK: 1350.0
    y3EbitdaK: -230.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - "Year 3 ends at ~22 subscription customers instead of 30 as onboarding queues back up."
      - "Blended ARPU stays near $58K instead of $65K because fewer accounts reach production-tier pricing."
      - "Gross margin caps at 64% instead of 70% as archive cleanup remains partly bespoke, per the BP's own top risk."
  base:
    description: "Three Year 1 design partners convert into a growing subscription base that reaches 8 customers by Q4Y2 and 30 by Q4Y3, consistent with the BP's milestone path and the research.yaml $65K blended ACV anchor."
    y3RevenueK: 2102.5
    y3EbitdaK: 36.1
    cashLowPointK: 1415.5
    keyAssumptionChanges:
      - "Subscription ARPU steps from $45K (Year 1 pilot pricing) to $55K (Year 2) to $65K (Year 3 blended)."
      - "Gross margin ramps from 55% to 70% as onboarding standardizes around one common evidence ontology."
      - "Customer count grows 3 to 8 to 30 across the three years, matching BP milestones for each 12-month horizon."
  upside:
    description: "Channel and partner-sourced referrals convert faster than modeled, pushing ACV and logo count above the base case without a major unplanned hiring pull-forward."
    y3RevenueK: 2700.0
    y3EbitdaK: 260.0
    cashLowPointK: 1560.0
    keyAssumptionChanges:
      - "Year 3 ends at ~36 subscription customers as partner-sourced pilots convert faster than the base case."
      - "Blended ARPU rises toward $72K as more accounts add partner workspaces and extra bid desks."
      - "Gross margin reaches 73% as template reuse further reduces exception-handling labor."
