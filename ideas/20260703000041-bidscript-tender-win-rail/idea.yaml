jobsToBeDone:
  - job: >-
      When a new public-sector tender lands, help a bid manager decide whether to pursue it and assemble validated evidence fast, so they can submit a compliant bid without wasting estimator time on weak pursuits.
    currentAlternative: >-
      Spreadsheet triage, shared-drive searches, old Word templates, and email chases across operations and partner teams
    successMetric: >-
      Go/no-go decision within 24 hours and first compliant draft package within 3 business days
  - job: >-
      When a tender asks for past performance, certifications, and team CVs, help a preconstruction lead pull the right proof points, so they can maximize scoring on quality criteria.
    currentAlternative: >-
      Reusing old submissions by hand and hiring external bid writers to fill evidence gaps
    successMetric: >-
      Share of scored questions answered with validated reusable evidence and shortlist rate by tender type
