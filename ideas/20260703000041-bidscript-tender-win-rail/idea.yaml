topRisks:
  - name: ROI proof gap
    description: >-
      Buyers may discount the up-to-50% win-rate lift because the sources attribute it to company-reported customer results rather than independent benchmarking.
    mitigation: >-
      Launch with baseline imports and tender-by-tender outcome analytics so early customers can measure win-rate and bid-cost improvement against their own history.
  - name: Archive ingestion drag
    description: >-
      Past bids, certifications, and partner materials are messy and inconsistent, which can make onboarding slow and delay time to value.
    mitigation: >-
      Narrow the initial product to one tender type, offer concierge archive cleanup, and prioritize connectors for the folders and templates bid teams already use.
  - name: Workflow adjacency
    description: >-
      SharePoint consultants, bid-writing agencies, and construction software vendors can slow adoption by positioning the product as another layer on top of existing tools.
    mitigation: >-
      Sell as an evidence and decision layer that plugs into current storage and makes consultants faster, with proof of lower bid cost per submission rather than a rip-and-replace story.
