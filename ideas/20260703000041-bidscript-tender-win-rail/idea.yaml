problem: >-
  Mid-market contractors still decide whether to pursue a tender and assemble the response using fragmented knowledge spread across old Word files, spreadsheets, shared drives, and email. The bottleneck is not prose generation alone; it is proving past performance, staffing, certifications, safety records, and partner qualifications fast enough to hit submission deadlines. That creates expensive go/no-go mistakes, low reuse of winning evidence, and inconsistent compliance across bids.
targetUser:
  primary: >-
    Bid managers and preconstruction leads at 50-500 employee UK civil and infrastructure contractors
  secondary: >-
    Estimators, project controls managers, and bid coordinators who own past-performance, staffing, and partner evidence
  buyer: Commercial director or head of preconstruction
startupThesis:
  nonObviousInsight: >-
    The tender AI winner will not be the tool that writes prettier copy; it will be the system that turns years of shared-drive bid exhaust into a reusable proof graph of projects, people, certifications, and partners. What changed is that LLMs can now structure this unowned archive, while new vendors can sell against explicit win-rate improvement rather than vague productivity claims.
  beachhead: >-
    UK civil engineering contractors with 50-500 employees bidding 20-150 public-sector framework and project tenders per year for highways, utilities, and local infrastructure work above £1 million
  wedge: >-
    A tender evidence rail that converts prior submissions, project outcomes, CV packs, HSEQ certificates, and subcontractor data into requirement-level answer drafts, gap flags, and red-team scorecards
  whyNowCatalyst: >-
    BidScript's reported up-to-50% win-rate lift and Tech.eu's note that teams still run bids through spreadsheets and shared drives make 2026 the moment when tender ops can shift from artisanal process work to software.
  ventureScalePath: >-
    Start with bid/no-bid, evidence assembly, and response scoring for civil contractors, then expand into subcontractor prequalification, framework compliance, post-award obligation tracking, and a cross-vertical win-rate benchmarking network for other tender-heavy sectors.
solution: >-
  Bid Evidence Graph ingests prior submissions, project case studies, CV packs, HSEQ certificates, and partner documentation into a requirement-tagged evidence graph. When a new tender arrives, it parses evaluation criteria, maps each question to reusable proof, and flags missing evidence before the team burns estimator hours. The product gives a bid lead a go/no-go score, owner-by-owner workflow, and red-team checklist, then exports a compliant response package with citations back to validated source material. After submission, it records win/loss feedback so each tender improves the next one.
goToMarketSeed:
  firstCustomer: >-
    A 150-person UK civil engineering contractor bidding 40-60 council, utilities, and framework tenders per year with a 6-person bid team and no internal bid knowledge system
  buyingTrigger: >-
    A new framework tender or annual rebid cycle that forces the team to rebuild method statements, CV packs, safety evidence, and partner documentation under a 2-6 week deadline
  currentAlternative: >-
    Manual workflow across spreadsheets, shared drives, Word and SharePoint bid libraries, plus external bid-writing consultants
  switchingReason: >-
    The wedge reuses validated evidence and highlights missing proofs before estimators and subject-matter experts spend days on a response, improving shortlist odds while reducing bid cost per submission.
  pricingHypothesis: >-
    £30k-£75k annual SaaS subscription per bid desk, plus onboarding for archive ingestion; expansion priced by active tenders and partner workspaces
