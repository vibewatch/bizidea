      sourceRefs:
      - 103
      - 105
      - 106
      - 108
    buyerPower:
      score: 4
      rationale: 买家可以靠继续用共享盘、请顾问或采用更轻量的工具来拖延采购，而且这个品类已经有公开的价格锚点。
      sourceRefs:
      - 27
      - 41
      - 46
      - 73
    threatOfEntrants:
      score: 4
      rationale: AI 原生的新进入者现在能靠通用大模型快速上线抽取、投标/弃标判断和提案自动化功能，这加快了新玩家的入场速度。
      sourceRefs:
      - 58
      - 73
      - 77
      - 92
    threatOfSubstitutes:
      score: 4
      rationale: 手工内容库、通用提案套件和外包投标支持，都能在一定程度上解决部分问题，对保守型买家来说已经够用。
      sourceRefs:
      - 34
      - 46
      - 90
    competitiveRivalry:
      score: 4
      rationale: 多个厂商正从不同角度攻打同一块预算——SRM、AI 文案、合规分析和垂直招标管理——话术重叠已经相当严重。
      sourceRefs:
      - 36
      - 45
      - 68
      - 77
      - 92
  pestle:
  - factor: political
    impact: positive
    point: 采购制度改革明确考虑了中小企业的准入门槛和公共利益，这对能降低投标摩擦、提升可追溯性的工具有利。
    sourceRefs:
    - 10
    - 19
    - 20
  - factor: economic
    impact: positive
    point: 2024 年英国建筑业新增订单增长 5.6%，即便团队仍然精打细算，也支撑着一条活跃的投标管道。
    sourceRefs:
    - 4
  - factor: social
    impact: negative
    point: 提案团队被要求承担更多工作，人手却没有同比例增加，这造成了职业倦怠，也让团队对见效慢的工具产生抵触。
    sourceRefs:
    - 46
    - 83
  - factor: technological
    impact: positive
    point: 文档 AI、RAG 和有引用支撑的输出，如今让可审计的答案生成在技术上变得现实可行。
    sourceRefs:
    - 103
    - 108
  - factor: legal
    impact: negative
    point: 参与条件、评估摘要和信息公布规则，让缺乏支撑或无法审计的 AI 输出在公共招标中变得很危险。
    sourceRefs:
    - 20
    - 21
    - 22
  - factor: environmental
    impact: positive
    point: 社会价值和更广泛的供应链披露要求，正在增加承包商必须拼装的非价格类证据量。
    sourceRefs:
    - 25
    - 111
  adoptionFrictionMatrix:
  - friction: 档案整理与证据规范化
    severity: high
    affectedBuyer: 投标经理 / 预施工负责人
    mitigation: 先聚焦一种框架协议或招标类型，采用管家式导入，在全面推广前要求证据必须带溯源。
    sourceRefs:
    - 34
    - 46
    - 90
  - friction: 对 AI 生成合规答案的信任
    severity: high
    affectedBuyer: 商务总监 / 金牌评审团队
    mitigation: 在任何答案导出之前，都要展示引用来源、置信度和逐条需求的复核工作流。
    sourceRefs:
    - 34
    - 92
    - 108
  - friction: 跨领域专家和交付团队的变革管理
    severity: medium
    affectedBuyer: 跨职能领域专家
    mitigation: 在用户现有的协作工具和按角色划分的任务里接上头，而不是强推彻底的推倒重来。
    sourceRefs:
    - 40
    - 50
  - friction: 签年度软件合同前的 ROI 证明
    severity: medium
    affectedBuyer: 商业买家 / 财务方
    mitigation: 围绕减少被取消资格情况、首稿速度和投标/弃标判断质量来跑试点，而不是靠含糊的 AI 效率说法。
    sourceRefs:
    - 41
    - 73
    - 83
market:
  tam:
    value: $45.5M
    rationale: 测算约 700 个英国招标密集型建筑工程投标团队 × 6.5 万美元的混合 ACV；700 这个团队数由 178 亿英镑公共基础设施产值加 183 亿英镑私营基础设施产值，除以每家目标企业约 5200 万英镑的年招标收入测算得出。
    isEstimate: true
    sourceRefs:
    - 3
    - 30
    - 73
  sam:
    value: $19.5M
    rationale: 测算约 300 家滩头市场承包商 × 6.5 万美元的混合 ACV；企业数由 140 亿英镑基础设施新增订单，加上 104 亿英镑公共类其他订单的 40%，除以每家目标企业约 6000 万英镑的招标收入测算得出。
    isEstimate: true
    sourceRefs:
    - 4
    - 31
    - 73
  som:
    value: $2.0M
    rationale: 第三年约 30 家客户（约为测算滩头市场的 10%）× 6.5 万美元 ACV，通过以实施为先导的直销加合作方转介实现；假设产品靠合规和证据深度取胜，而不是靠 PLG 式的走量。
    isEstimate: true
    sourceRefs:
    - 27
    - 41
    - 73
    - 111
bottomUpSizingDrivers:
- driver: 潜在总单位数
  value: 约 700 个英国招标密集型建筑工程投标团队（测算：362 亿英镑基础设施产值 ÷ 每家目标企业约 5200 万英镑）
  source: '[3] + 测算'
- driver: 滩头市场单位数
  value: 约 300 家英国公共部门土木/基础设施承包商（测算：140 亿英镑基础设施新增订单 + 104 亿英镑公共类其他订单的 40% ÷ 每家企业约 6000 万英镑）
  source: '[4] + 测算'
- driver: 典型年度项目量
  value: 在透明定价的 AI 原生方案里，每年 24-50 个项目；厂商 ROI/报告口径中采用每年 50 个项目
  source: '[73] + [83]'
- driver: 混合 ACV
  value: 估算 6.5 万美元（介于入门/成长期公开价格锚点和定制企业方案之间）
  source: '[27] + [41] + [73] + 测算'
categoryDynamics:
  growthRate: 2024 年英国建筑业新增订单同比增长 5.6%
  growthRateSourceRefs:
  - 4
  tailwinds:
  - point: 2024 年公共基础设施和公共类其他新增订单回升，维持了一条活跃的招标管道。
    sourceRefs:
    - 4
  - point: 《采购法》的数据复用和透明度要求，催生出更结构化的供应商信息工作流。
    sourceRefs:
    - 10
    - 22
  - point: AI 应用正从加快首稿速度，转向知识治理和自助服务，这提高了买家对记录系统类工具的接受度。
    sourceRefs:
    - 46
    - 83
  headwinds:
  - point: 建筑业仍面临技术工人短缺，这既提高了紧迫性，也限制了长周期实施的产能。
    sourceRefs:
    - 1
    - 5
  - point: 对流程纪律不强的团队来说，通用 RFP 工具和手工内容库仍是可以接受的替代方案。
    sourceRefs:
    - 45
    - 50
    - 90
competitors:
- name: BidScript
  stage: seed
  wedge: 聚焦英国市场的投标管理，覆盖公私招标的商机搜索、资质判断、写作、合规和提交全流程。
  pricing: 按投标量、金额、复杂度和节奏定制的按坐席定价。
  strength: 在英国公共部门建筑工作流、框架协议和合规语言上最贴近直接对标。
  weaknessVsUs: 仍然覆盖多行业和全生命周期管理，比较宽泛；一套专注轨道/土木的证据图谱在证据复用和分包商证明包上能做得更深。
  sourceRefs:
  - 27
  - 30
  - 31
  - 34
  - 109
- name: Responsive
  stage: incumbent
  wedge: 围绕治理化内容、协作和 AI 辅助应答搭建的战略应答管理平台。
  pricing: 入门版 Lite Edition 每年 5000 美元起，再往上是更高版本和定制企业方案。
  strength: 规模、成熟的工作流和庞大的存量客户群，让它对企业级应答团队来说很有说服力。
  weaknessVsUs: 内容库治理负担更重，对英国基础设施招标和承包商证据包的适配也不够明确。
  sourceRefs:
  - 40
  - 41
  - 45
  - 46
  - 50
- name: AutogenAI
  stage: scale-up
  wedge: AI 提案写作、资质判断/信息抽取、商机捕获、调研，以及面向公共部门/联邦项目的提案工具。
  pricing: 定制报价 / 以演示驱动销售。
  strength: AI 文案/抽取的品牌力强，在公共部门提案领域也有明显的公信力。
  weaknessVsUs: 重心在提案写作和商机捕获，而不是一张覆盖框架协议、简历和合作方资质的承包商专属证据图谱。
  sourceRefs:
  - 35
  - 58
  - 68
- name: AutoRFP.ai
  stage: scale-up
  wedge: AI 原生的 RFP/DDQ 平台，定价透明，自动化投标/弃标判断、缺口分析和内容库工具一应俱全。
  pricing: 年付每月 899-1299 美元，覆盖 24-50 个项目，之后是定制企业方案。
  strength: 在资质判断、合规分析和 ROI 话术的产品化上做得很扎实。
  weaknessVsUs: 面向多行业、以软件为中心；没有针对 NEC/JCT、公共工程证据或分包商密集型投标包做调优。
  sourceRefs:
  - 73
  - 77
  - 78
  - 83
- name: Arphie
  stage: seed
  wedge: AI 原生的提案软件，具备可审计的来源、实时集成和快速首稿生成。
  pricing: 定制报价 / 以迁移为主导。
  strength: 可审计性和连接原始来源的 AI，直接对症陈旧内容库的痛点。
  weaknessVsUs: 定位是通用企业级 RFP；相比轨道/土木证据图谱，在英国基础设施采购上的工作流深度不够明确。
  sourceRefs:
  - 92
  - 100
regulatoryTechnicalConstraints:
- point: 参与条件只能测试相称的法律/财务能力和技术能力，因此供应商层面的证据必须和答案文案分开组织。
  sourceRefs:
  - 20
- point: 评估摘要让供应商更容易理解自己的投标是怎么得分的，这提升了逐条需求可追溯性和审计就绪笔记的价值。
  sourceRefs:
  - 21
- point: 中央数字平台减少了重复录入数据的工作，但也提高了对干净、可跨采购复用的核心供应商信息的要求。
  sourceRefs:
  - 10
  - 22
- point: 社会价值方面的要求，正在把所需的支持性证据扩大到价格和技术方法说明之外。
  sourceRefs:
  - 25
  - 111
- point: 高风险招标场景下的 AI，需要有据可查的检索和人工复核，才能符合可信 AI 的风险实践。
  sourceRefs:
  - 107
  - 108
validationSignals:
- point: BidScript 已经在主打英国建筑/公共部门工作流，独立报道也称早期客户中标率最高提升了 50%。
  sourceRefs:
  - 30
  - 109
- point: Responsive/APMP 的对标研究显示，配备专用 RFP 软件的团队提交的提案数量明显更多，否则就要在太多互不相连的工具间疲于奔命。
  sourceRefs:
  - 46
- point: AutoRFP 公开的定价、投标/弃标判断和缺口分析模块说明，买家愿意为决策质量和合规分析买单，而不只是为答案文案买单。
  sourceRefs:
  - 73
  - 77
  - 78
- point: Constructionline 围绕社会价值的定位证实，公共部门供应链中非价格类证据负担依然存在。
  sourceRefs:
  - 25
  - 111
openQuestions:
- 一家英国土木承包商用上证据图谱工作流 90 天后，能拿出怎样独立测量的中标率提升、投标成本下降或被取消资格情况减少的数据？
- 英国 50-500 人规模的土木/基础设施承包商中，实际每年跑 20-150 个招标的到底有多少，和从公共订单量推算出的约 300 家企业模型相比如何？
- 哪类招标文档带来的导入痛点最大——简历包、HSEQ 认证、案例研究，还是分包商证据——需要多少管家式服务？
- 一套专注轨道/土木的证据图谱，能否和现有的 SharePoint/Teams/顾问工作流共存，还是必须成为主要的投标记录系统才能兑现 ROI？
