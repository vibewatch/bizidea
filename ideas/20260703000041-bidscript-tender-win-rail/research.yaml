openQuestions:
  - "What independently measured win-rate lift, bid-cost reduction, or disqualification reduction can a UK civil contractor show after 90 days on an evidence-graph workflow?"
  - "How many UK 50-500 employee civil/infrastructure contractors actually run 20-150 tenders per year, versus the ~300-firm model inferred from public-order volumes?"
  - "Which tender documents create the highest onboarding pain—CV packs, HSEQ certificates, case studies, or subcontractor evidence—and how much concierge service is required?"
  - "Can a specialist rail/civil evidence graph coexist with existing SharePoint/Teams/consultant workflows, or must it become the primary bid system of record to deliver ROI?"
