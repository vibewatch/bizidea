  fiveForces:
    supplierPower:
      score: 2
      rationale: "Document extraction, search, and grounding are available from multiple cloud and model vendors, so no single upstream supplier owns the workflow by default; the harder constraint is enterprise security and implementation quality."
      sourceRefs:
