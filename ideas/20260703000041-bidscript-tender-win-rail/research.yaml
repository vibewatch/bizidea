market:
  tam:
    value: "$45.5M"
    rationale: "700 estimated UK tender-heavy construction/engineering bid desks × $65k blended ACV; 700 desks modeled from £17.8bn public-infrastructure output plus £18.3bn private-infrastructure output divided by about £52m annual tender revenue per target firm."
    isEstimate: true
    sourceRefs:
      - 3
      - 30
      - 73
  sam:
    value: "$19.5M"
    rationale: "300 estimated beachhead contractors × $65k blended ACV; units modeled from £14.0bn infrastructure new orders plus 40% of £10.4bn public-other orders divided by about £60m tender revenue per target firm."
    isEstimate: true
    sourceRefs:
      - 4
      - 31
      - 73
  som:
    value: "$2.0M"
    rationale: "30 year-3 logos (~10% of the modeled beachhead) × $65k ACV via implementation-led direct sales plus partner referrals; assumes the product wins on compliance and evidence depth, not PLG volume."
    isEstimate: true
    sourceRefs:
      - 27
      - 41
      - 73
      - 111
