        - 106
        - 108
    buyerPower:
      score: 4
      rationale: "Buyers can delay purchase by staying in shared drives, using consultants, or adopting lighter tools, and public-facing price anchors already exist in the category."
      sourceRefs:
        - 27
        - 41
        - 46
        - 73
    threatOfEntrants:
      score: 4
      rationale: "AI-native entrants can now ship extraction, go/no-go, and proposal automation quickly on commodity models, which raises the pace of entry."
      sourceRefs:
        - 58
        - 73
        - 77
        - 92
    threatOfSubstitutes:
      score: 4
      rationale: "Manual libraries, generic proposal suites, and outsourced bid support can all solve slices of the problem well enough for conservative buyers."
      sourceRefs:
        - 34
        - 46
        - 90
    competitiveRivalry:
      score: 4
      rationale: "Multiple vendors attack the same budget from different angles—SRM, AI drafting, compliance analytics, and vertical tender management—so messaging overlap is already substantial."
      sourceRefs:
        - 36
        - 45
        - 68
        - 77
        - 92
  pestle:
    - factor: "political"
      impact: "positive"
      point: "Procurement reform explicitly considers SME barriers and public benefit, which favors tools that reduce bidding friction and improve traceability."
      sourceRefs:
        - 10
        - 19
        - 20
    - factor: "economic"
      impact: "positive"
      point: "GB construction new orders grew 5.6% in 2024, which supports a live pipeline of bids even as teams stay cost-conscious."
      sourceRefs:
        - 4
    - factor: "social"
      impact: "negative"
      point: "Proposal teams are asked to handle more work without proportional headcount growth, creating burnout and resistance to tools that do not show fast value."
      sourceRefs:
        - 46
        - 83
    - factor: "technological"
      impact: "positive"
      point: "Document AI, RAG, and citation-grounded outputs now make auditable answer generation technically realistic."
      sourceRefs:
        - 103
        - 108
    - factor: "legal"
      impact: "negative"
      point: "Conditions of participation, assessment summaries, and publication rules make unsupported or non-auditable AI outputs risky in public tenders."
      sourceRefs:
        - 20
        - 21
        - 22
    - factor: "environmental"
      impact: "positive"
      point: "Social-value and broader supply-chain disclosure expectations expand the amount of non-price evidence contractors must assemble."
      sourceRefs:
        - 25
        - 111
  adoptionFrictionMatrix:
    - friction: "Archive cleanup and evidence normalization"
      severity: "high"
      affectedBuyer: "Bid manager / preconstruction lead"
      mitigation: "Start with one framework or tender type, use concierge import, and require source-linked evidence before broader rollout."
      sourceRefs:
        - 34
        - 46
        - 90
    - friction: "Trust in AI-generated compliance answers"
      severity: "high"
      affectedBuyer: "Commercial director / gold-team reviewer"
      mitigation: "Expose citations, confidence, and requirement-level review workflows before any answer is exported."
      sourceRefs:
        - 34
        - 92
        - 108
    - friction: "Change management across SMEs and delivery teams"
      severity: "medium"
      affectedBuyer: "Cross-functional subject matter experts"
      mitigation: "Meet users inside existing collaboration tools and role-based tasks instead of forcing a full rip-and-replace."
      sourceRefs:
        - 40
        - 50
    - friction: "Proof of ROI before annual software commitment"
      severity: "medium"
      affectedBuyer: "Commercial buyer / finance sponsor"
      mitigation: "Run pilots around disqualification reduction, first-draft speed, and go/no-go quality rather than vague AI productivity claims."
      sourceRefs:
        - 41
        - 73
