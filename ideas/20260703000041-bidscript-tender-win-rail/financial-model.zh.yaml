      percentage: 15
scenarios:
  downside:
    description: "档案导入持续偏重人力服务，合作方带来的试点晚到一个季度，导致毛利率停滞不前，第三年客户数远低于 BP 25-30 家的里程碑。"
    y3RevenueK: 1350.0
    y3EbitdaK: -230.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - "第三年末订阅客户约 22 家，而非 30 家，因为导入排期积压。"
      - "混合 ARPU 停在约 5.8 万美元，而非 6.5 万美元，因为达到生产级定价的客户更少。"
      - "毛利率上限为 64%，而非 70%，因为档案整理仍部分依赖定制——正是 BP 自己列出的首要风险。"
  base:
    description: "第一年的三个共创客户转化为不断扩大的订阅基础，到第二年第四季度达到 8 家客户，第三年第四季度达到 30 家，与 BP 的里程碑路径以及 research.yaml 中 6.5 万美元的混合 ACV 锚点一致。"
    y3RevenueK: 2102.5
    y3EbitdaK: 36.1
    cashLowPointK: 1415.5
    keyAssumptionChanges:
      - "订阅 ARPU 从 4.5 万美元（第一年试点定价）升到 5.5 万美元（第二年），再到 6.5 万美元（第三年混合值）。"
      - "毛利率随导入围绕单一通用证据本体论标准化，从 55% 爬升到 70%。"
      - "客户数三年内从 3 增长到 8 再到 30，与 BP 每个 12 个月阶段的里程碑吻合。"
  upside:
    description: "渠道和合作方带来的转介转化速度快于建模预期，把 ACV 和客户数推高到基准情形之上，且不需要大幅提前招聘。"
    y3RevenueK: 2700.0
    y3EbitdaK: 260.0
    cashLowPointK: 1560.0
    keyAssumptionChanges:
      - "第三年末订阅客户约 36 家，因为合作方带来的试点转化快于基准情形。"
      - "混合 ARPU 升向 7.2 万美元，因为更多客户新增了合作方工作区和额外投标团队。"
      - "毛利率达到 73%，因为模板复用进一步减少了异常处理的人力。"
sensitivity:
  - variable: ARPU
    downsideCase: "第三年混合 ARPU 平均为 5.8 万美元，而非 6.5 万美元。"
    baseCase: "第三年混合 ARPU 为 6.5 万美元。"
    upsideCase: "第三年混合 ARPU 升至 7.2 万美元。"
    y3RevenueImpactK: -210.0
    cashImpactK: -140.0
  - variable: CAC
    downsideCase: "创始人主导销售加差旅，把 CAC 推高到每客户约 4.5 万美元。"
    baseCase: "每个新订阅客户的 CAC 为 3.625 万美元。"
    upsideCase: "合作方带来的转介把 CAC 压低到约 3 万美元。"
    y3RevenueImpactK: 0.0
    cashImpactK: -60.0
  - variable: churn
    downsideCase: "部分早期试点不续约，月度客户流失率升至 2.0%。"
    baseCase: "月度客户流失率为 1.2%。"
    upsideCase: "证据图谱嵌入投标工作流后，月度客户流失率改善至 0.8%。"
    y3RevenueImpactK: -150.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: "从付费审计到签下订阅的平均周期从 3 个月拉长到 5 个月。"
    baseCase: "平均销售周期约为 3 个月。"
    upsideCase: "已验证的案例研究把周期缩短到约 2 个月。"
    y3RevenueImpactK: -180.0
    cashImpactK: -130.0
  - variable: gross margin
    downsideCase: "由于导入仍部分依赖定制，毛利率停滞在 64%。"
    baseCase: "第三年毛利率达到 70%。"
    upsideCase: "凭借更强的模板和合作方复用，毛利率达到 73%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -110.0
  - variable: hiring pace
    downsideCase: "两个非营收岗位（第二名工程师、G&A）提前两个季度招聘。"
    baseCase: "招聘按与客户爬坡挂钩的既定季末计划推进。"
    upsideCase: "后台和第二名工程师的招聘推迟到证明有 5-7 家客户之后。"
    y3RevenueImpactK: 10.0
    cashImpactK: -150.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      潜在客户[投标总监与预施工负责人] --> 审计[付费证据审计]
      审计 --> 试点[共创客户导入，8-12 周]
      试点 --> 订阅[年度投标团队订阅]
      订阅 --> 收入[混合 ARPU x 订阅客户数]
      收入 --> 毛利润[扣除交付成本后的毛利润]
      毛利润 --> 现金[通向下一轮融资的现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: "基准情形的收入由订阅 ACV 驱动，从第一年试点定价的 4.5 万美元逐步升至第三年混合值 6.5 万美元，客户基础从 3 家扩大到 30 家，另加每个新签共创客户的一次性导入费。"
  - checkName: 必须做对的事
    finding: "公司必须在第一年把前 3 个付费共创客户中至少 2 个转化为年度订阅，并保持导入以合作方/模板为主导，这样毛利率才能从 55% 向 BP 的 70% 目标爬升，而不是卡在重服务交付里。"
  - checkName: 模型会失效的情形
    finding: "如果第二年第四季度到第三年第四季度从 8 家客户跳到 30 家客户的节奏放缓，或毛利率停滞在约 64%，敏感性表显示第三年收入可能因此减少约 20 万美元以上，现金低点也会被拉低到更紧的 100-130 万美元最低烧钱估算附近。"
  - checkName: 下一轮融资的证明
    finding: "一旦公司在第二年第四季度前达到 5-7 家订阅客户、且至少有一个合作方带来的试点，并在第三年开始出现 EBITDA 转正的季度（如第三年第三、四季度所示），种子轮案例就会最扎实。"
sanityChecks:
  ruleOf40: "第三年增长率 317%（基于较小的第二年 50.38 万美元基数）+ EBITDA 利润率 1.7% ≈ 319%；这个数字被极小的收入基数放大，并不能反映成熟期 SaaS 的“40 法则”健康度。"
  burnMultiple: "第二年烧钱倍数约为 1.6 倍，用 58.2 万美元的净烧钱除以相对第一年的 37.18 万美元增量收入得出；第三年转为现金正流入（EBITDA +3.61 万美元），当年谈烧钱倍数已无意义。"
  revenuePerFte: "第三年每 FTE 收入为 15.02 万美元（14 名 FTE），对比成熟期 SaaS 基准约 20-40 万美元；仍低于基准，与一家进入第三年、重实施的垂直 SaaS 公司的情况一致。"
  flags:
    - "第三年客户数从第二年第四季度的 8 家跳到第三年第四季度的 30 家，一年内增长约 3.75 倍，虽然对应 BP 自己 24-36 个月的里程碑，但比受招聘约束的第一、二年节奏激进得多；这是模型中最大的单一执行风险。"
    - "“40 法则”和同比增长率被极小的第二年收入基数（50.38 万美元）扭曲，不应与成熟期 SaaS 可比公司做基准对比。"
    - "毛利率从第一年的 55% 回升到第三年的 70%，前提是导入基本按预期实现标准化；BP 自己的风险章节警示档案导入可能“仍过于依赖定制”，若如此，毛利率和第三年客户爬坡都偏乐观。"
    - "每 FTE 收入（15.02 万美元）在整个第三年都低于 20-40 万美元的成熟期 SaaS 基准，说明规模化后的人效尚未得到验证。"
    - "250 万美元的融资额对应建模出的约 142 万美元现金低点，比零舒适得多；这个额度是按 BP 自身 200-400 万美元/18 个月的指引设定的，而不是这套成本模型所暗示的更紧的约 100-130 万美元最低必需现金，两者之间的差额充当了应对更慢销售周期或更重服务成本的缓冲垫。"
