slug: bid-evidence-graph
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-08
    unit: YYYY-MM
    source: "[BP 日期 2026-07-03；模型从下个月开始]"
  - id: A2
    name: 种子前完成后的期初现金
    value: '2500'
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M；模型取区间偏中低值 $2.5M，作为模型起始时完成的融资额]"
  - id: A3
    name: 第一年新共创客户的一次性档案导入/证据审计费
    value: '29'
    unit: USDK per project
    source: "[BP gtm.pricing 1.5-3 万英镑档案导入费；USD 估算按约 1.27 的 GBP:USD 汇率经验值 (A20) 换算，中点约 $28.5K，取整为 $29K]"
  - id: A4
    name: 第二年新客户的档案导入费
    value: '32'
    unit: USDK per project
    source: "[经验假设：随模板和规则包成熟，导入费每年增长约 10%，与 BP 定价说明中导入费始终作为订阅之外独立计费项的描述一致]"
  - id: A5
    name: 第三年新客户的档案导入费
    value: '35'
    unit: USDK per project
    source: "[与 A4 相同的导入费增长经验假设，延续第二年]"
  - id: A6
    name: 年度订阅 ARPU，第一年试点转化定价
    value: '45'
    unit: USDK per customer per year
    source: "[BP investorMemo.firstCustomer initialContract 3-7.5 万英镑年度订阅；模型在 ROI 尚未证实前，第一年试点档定价取区间偏中低值]"
  - id: A7
    name: 年度订阅 ARPU，第二年混合值
    value: '55'
    unit: USDK per customer per year
    source: "[在第一年试点 ARPU（A6）和第三年成熟混合 ACV（A8）之间插值得出，与 BP expansionLevers 中新增投标团队和合作方工作区会逐步拉高 ACV 的说法一致]"
  - id: A8
    name: 年度订阅 ARPU，第三年成熟混合值
    value: '65'
    unit: USDK per customer per year
    source: "[research.yaml bottomUpSizingDrivers 中的“混合 ACV”估算约 $65k，与测算 SAM/SOM 所用的数字一致]"
  - id: A9
    name: 客户爬坡，期末订阅客户数
    value: '第一年：3；第二年：8；第三年：30'
    unit: customers EOP
    source: "[BP milestones：0-12 个月“拿下 2-3 家付费共创客户……把至少 2 个试点转化为年度订阅”；12-24 个月“达到 5-7 家订阅客户，且至少有 2 个合作方带来的机会”（模型在 Y2 第二季度做到 6 家，靠合作方带来的新增到 Y2 第四季度做到 8 家）；24-36 个月“达到约 25-30 家客户和约 200 万美元 ARR”]"
  - id: A10
    name: 毛利率爬坡
    value: '第一年：55%；第二年：62%；第三年：70%'
    unit: percent
    source: "[BP businessModel targetGrossMarginPct 70 为成熟期目标；鉴于 BP 风险条款警示档案导入和文档规范化“可能仍过于依赖定制”，早期年份取更低值]"
  - id: A11
    name: CEO / 创始销售的税前现金薪酬
    value: '85'
    unit: USDK per FTE per year
    source: "[英国早期 B2B SaaS 创始人薪酬经验值：低于市场水平的现金工资加约 20% 的雇主国民保险/养老金负担；角色对应 BP team 中的“CEO / 创始销售”，Month 0]"
  - id: A12
    name: 创始工程师的税前现金薪酬
    value: '120'
    unit: USDK per FTE per year
    source: "[英国早期 B2B SaaS 高级工程师薪酬经验值，加约 20% 雇主国民保险/养老金负担；角色对应 BP team 中的“创始工程师”，Month 0]"
  - id: A13
    name: 投标领域产品负责人的税前现金薪酬
    value: '110'
    unit: USDK per FTE per year
    source: "[英国早期产品/领域负责人薪酬经验值，加约 20% 雇主负担；角色对应 BP team 中的“投标领域产品负责人”，Month 0-3]"
  - id: A14
    name: 应用 AI 与文档工程师的税前现金薪酬
    value: '130'
    unit: USDK per FTE per year
    source: "[英国高级应用 AI/文档工程薪酬经验值，加约 20% 雇主负担；角色对应 BP team 中的“应用 AI 与文档工程师”，Month 6-9]"
  - id: A15
    name: 实施与渠道经理的税前现金薪酬
    value: '95'
    unit: USDK per FTE per year
    source: "[英国实施/渠道经理薪酬经验值，加约 20% 雇主负担；角色对应 BP team 中的“实施与渠道经理”，Month 9-12]"
  - id: A16
    name: 销售 / BDR 的税前现金薪酬
    value: '90'
    unit: USDK per FTE per year
    source: "[英国企业级 SaaS 销售拓展岗薪酬经验值，加约 20% 雇主负担；按 BP sequencingRationale（“渠道和模块扩张只在试点转化之后”）在第一年之后新增此岗位，用于超越创始人主导销售的规模化]"
  - id: A17
    name: G&A / 财务运营的税前现金薪酬
    value: '70'
    unit: USDK per FTE per year
    source: "[英国早期财务/行政岗薪酬经验值，加约 20% 雇主负担；随着人数和计费复杂度上升，在第二年新增首个专职后台岗位；由于 BP team 列表未明确列出该角色，此处为运营判断]"
  - id: A18
    name: 非人力经营成本基线
    value: '第一年：$6K/月；第二年：$10K/月；第三年：$15K/月'
    unit: USDK per month
    source: "[初创企业财务经验值，覆盖英国早期 B2B SaaS 公司的云托管/LLM 推理、工具、法务/合规、保险和创始人主导销售的差旅]"
  - id: A19
    name: 每个新订阅客户的 CAC
    value: '36.25'
    unit: USDK per customer
    source: "[由建模的第一年销售与市场支出（$108.75K）除以签下的 3 个新订阅客户得出；与 BP GTM 中“创始人主导外呼”加早期实施/渠道支出一致]"
  - id: A20
    name: GBP:USD 汇率经验值
    value: '1.27'
    unit: ratio
    source: "[仅用于把 BP 中以英镑计价的导入费锚点换算成美元的简化汇率经验值；BP/research 中其他市场测算数字均已是美元计价]"
  - id: A21
    name: 每月订阅客户流失率
    value: '1.2'
    unit: percent
    source: "[行业经验值，适用于嵌入合规工作流、切换成本高的垂直企业级 SaaS，年化客户流失率大致在 12%-15% 区间；BP 或 research 中均未直接给出流失率数字]"
  - id: A22
    name: 平均销售周期，从付费审计到签下年度订阅
    value: '3'
    unit: months
    source: "[经验值，对应 BP investorMemo.firstCustomer initialContract 中“8-12 周”的证据审计与档案导入项目，之后再转为年度订阅决策]"
  - id: A23
    name: 现金转换简化假设
    value: EBITDA 约等于经营性现金流
    unit: policy
    source: "[初创企业财务经验假设：本种子前视图未建模债务、资本开支或独立的营运资金融资]"
  - id: A24
    name: 招聘顺序
    value: "CEO、创始工程师和投标领域产品负责人于 Month 0（第一年第一季度）到岗；应用 AI 与文档工程师于 Month 6-9（第一年第三季度）到岗；实施与渠道经理于 Month 9-12（第一年第四季度）到岗；第二至第三年新增的工程、销售/BDR 和 G&A 岗位分阶段到岗"
    unit: role-start timing
    source: "[BP team 部分对前五个岗位的起始时间安排；第二至第三年的规模化招聘（第二/第三名工程师、销售代表、G&A）为运营判断，按 A9 的客户爬坡节奏配置]"
  - id: A25
    name: 融资额与现金跑道
    value: "250 万美元种子前融资，18 个月现金跑道"
    unit: USDM / months
    source: "[BP fundingAsk：round pre-seed，targetFundingRangeUsd $2-4M，runwayMonths 18；模型取区间偏中低值]"
