slug: bid-evidence-graph
date: "2026-07-03"
executiveSummary: >-
  英国土木与基础设施承包商至今仍靠共享盘、电子表格、Word 文档库和顾问来拼凑投标证据，而采购制度改革又在不断加码，要求可复用的供应商数据、可追溯的评估摘要和社会价值证据。本计划提出的公司要卖一套承包商原生的投标证据图谱：导入历史投标、项目案例、简历包、HSEQ 认证和分包商文档，一次聚焦一种公共部门招标类型，把它们映射成逐条需求的答案、缺口提示和合规工作流。首个客户是一家 150 人规模的英国土木承包商，每年投标 40-60 个市政、公用事业和框架协议招标，一次续标或新框架截止日一到，翻找文档和不合规的风险立刻就能算成预算。打法从付费证据审计和档案导入切入，如果产品能压缩专家搜索时间、减少提交缺陷、加快拿出合规初稿，就转化为按投标团队和招标量计费、年费 3 万到 7.5 万英镑的订阅。这个切口刻意做得比通用 RFP 自动化更窄——研究测算的 SAM 只有约 1950 万美元，公司必须先证明一套承包商本体论、一套规则包、一种实施打法能反复跑通，才谈得上扩到相邻行业或地区。真正的护城河不是文案生成得更好，而是招标条款、历史证据、分包商资质和最终评审结果之间那张通用内容库做不出来的可复用映射网。最大的证伪风险是档案整理和变革管理仍然太依赖人力服务，这样 BidScript、Responsive、顾问公司或内部 SharePoint 流程就足够用了。市场规模和部分 ROI 说法目前仍是测算或供应商自报，尚未经过独立对标，所以这份种子前计划的评判标准，应该是前五个试点能否转化为可复制的导入流程、可衡量的合规提升，以及高于点状工具价位的订阅。
problem:
  - "每次新的框架协议或项目招标一到，投标团队都要花好几天在共享盘、Word 文档库和邮件里翻找案例、简历包、HSEQ 认证和分包商证明。"
  - "公共部门建筑类招标现在要求可复用的供应商数据、社会价值证据和经得起审计的合规记录，手工复用只会推高被取消资格的风险，评分也参差不齐。"
solution:
  - "把历史投标、项目记录、简历包、证书和合作方文档，导入一张按需求打标的证据图谱，一次只服务一种英国土木招标工作流。"
  - "把每个新招标解析成投标/弃标信号、带溯源的答案草稿、证据缺口提示和审核工作流，导出合规提交包，不替换现有存储。"
whyWeWin:
  - "产品是围着承包商证据对象和英国基础设施规则包搭的，不是通用提案文案，这让横向 RFP 工具很难在证据深度上追上来。"
  - "每一次真实投标都会新增逐条需求映射、评审反馈和中标/落标数据，让资质判断、证据复用和合作方文档覆盖随时间越滚越准。"
strategicChoices:
  beachhead: "英国 50-500 人规模的土木工程承包商，每年投标 20-150 个公共部门框架协议和项目招标，涉及公路、公用事业和 100 万英镑以上的地方基础设施工程。"
  wedgeRationale: >-
    这个滩头市场有周期性的截止日压力、可衡量的中标/落标结果，还有一堆杂乱的项目证据、简历包、资质证书和合作方文档，正好能验证一套承包商专属的证据层是否比宽泛的 AI 写作卖点更有价值。如果一上来就做通用 RFP 软件，公司在证明可复制导入或差异化合规成果之前，就会先被现有厂商的定位淹没。
  sequencingRationale: >-
    先聚焦一种招标类型、一个地区，并和 SharePoint、顾问工作流共存，这样团队才能卖进正在续标的真实客户、快速上线，并在增加相邻模块或地区之前先测出合规和专家工时的提升。招聘和合作伙伴关系也按同样顺序推进：先是创始人主导销售，再是重实施的产品打磨，最后才是等试点稳定转化之后再做渠道和模块扩张。
  notYet:
    - "规则包不同、合规紧迫性也更弱的私营商业投标"
    - "需要另一套政策和模板逻辑的非英国采购制度"
    - "完整的 ERP、造价或门户替代"
    - "与横向 RFP 套件重叠的宽泛提案写作功能"
market:
  tam: "$45.5M，测算自英国约 700 个招标密集型建筑工程投标团队的软件支出。"
  sam: "$19.5M，测算自初始滩头市场里约 300 家英国土木与基础设施承包商的软件支出。"
  som: "$2.0M 的第三年营收计划，基于约 30 家客户、约 6.5 万美元的混合 ACV，通过直销加合作方转介实现。"
  segments:
    - "英国 50-500 人规模、频繁投标公共部门招标的土木与基础设施承包商"
    - "投标咨询公司，以及在土木验证跑通后能复用同一套证据工作流的相邻英国招标密集型承包商"
  buyingProcess: >-
    投标经理或预施工负责人通常在框架协议续标期间发起试点，因为他们是第一批感受到证据大搜捕之苦的人。商务总监或预施工负责人只有在付费导入展示出更少的合规失误、更低的专家工时、更快的引证初稿之后，才会签下年度合同。
product:
  mvp: >-
    一套面向单一公共部门土木招标类型、带溯源的证据图谱：导入历史投标、案例、简历包、HSEQ 认证和分包商文档，把它们映射到招标问题，附上引用、缺口提示和投标/弃标评分。V1 应该从现有存储读取，而不是强制迁移，任何答案在离开系统前都要经过人工复核。
  sixMonth: "支持前两家共创客户，交付一个框架协议招标解析器、SharePoint 和 Teams 导入、逐条需求证据映射，以及导出合规答案包的审核工作流。"
  twelveMonth: "把产品打磨成可复制的投标团队系统，服务 5-7 家客户，配上招标类型模板、合作方工作区、评估摘要反馈采集，以及基线对比当前表现的报告。"
  twentyFourMonth: "在英国基础设施内部，通过新增招标品类、分包商预审和框架义务跟踪继续扩张，同时用一套独立规则包测试一个相邻行业或地区。"
  keyBets:
    - "案例、简历包、HSEQ 认证和分包商证据可以用一套通用本体论覆盖前五个客户。"
    - "比起文案质量的边际提升，买家更看重有引用的证据覆盖率和更低的合规风险。"
    - "评估摘要和中标/落标反馈能足够快地打磨资质判断和证据复用，把 ACV 拉到点状工具定价之上。"
gtm:
  wedge: "针对一次真实框架协议续标的付费证据审计和档案导入，聚焦一种招标类型，用可衡量的缺陷率、速度和复用指标交付。"
  channels:
    - "创始人主导的外呼，直接触达正进入框架协议、市政或公用事业续标周期的投标总监和预施工负责人"
    - "与已经在救场超载投标团队的投标咨询公司建立转介与联合交付关系"
    - "通过 SharePoint 或微软合作伙伴、建筑工作流顾问做集成式引荐"
  funnelTargets: "目标是 20%-30% 的意向转付费审计率、60%以上的审计转共创试点率、50%以上的试点转年度订阅率，并在 9 个月内通过新增投标团队或合作方工作区实现首次账户扩容。"
  pricing: >-
    先收 1.5 万到 3 万英镑的档案导入与证据审计费，再转为按投标团队、年招标量和合作方工作区数量计费的 3 万到 7.5 万英镑年度订阅。这个价位低于重量级企业级 SRM 套件，但高于点状文案工具，因为 ROI 卖点是更低的不合规风险和更少的专家工时，而不只是文字生成更快。
businessModel:
  revenueStreams:
    - "年度软件订阅"
    - "一次性档案导入和框架模板导入费"
    - "高级合作方工作区、评估分析和额外招标规则包"
  unitOfValue: "带招标量分级和可选合作方工作区的投标团队"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一家承包商内新增投标团队或区域团队"
    - "追加销售合作方与分包商证据工作区"
    - "推出预审、框架义务跟踪等相邻招标模块"
strategyMap:
  northStarMetric: "从收到招标到拿出合规引证初稿所用的工作日数"
  inputMetrics:
    - "从档案交接到建成首个可复用证据库所用天数"
    - "评分招标问题中，由带溯源可复用证据回答的比例"
    - "每次真实招标提交前消耗的专家工时"
    - "付费试点转年度订阅的转化率"
    - "扩展到额外投标团队或合作方工作区的比例"
  moatsToBuild:
    - "招标条款与已验证的项目、人员、证书、合作方证据之间的逐条需求映射"
    - "覆盖 NEC 或 JCT、框架规则、社会价值和参与条件的英国承包商本体论"
    - "把证据覆盖率和结果按招标类型关联起来的评估摘要与中标/落标语料库"
  killCriteria:
    - "前 5 个付费试点中，共用同一套招标模板和证据本体论、能在 30 天内完成导入的不足 3 个"
    - "试点未能把专家搜索和撰写时间压缩至少 25%，也没能明显减少真实投标的提交缺陷"
    - "付费试点转为年费超过 3 万英镑的年度订阅的比例低于 50%，且未在 6 个月内实现"
  mermaid: |
    flowchart LR
      切口[英国土木招标切口] --> 最小可行产品[带溯源的证据图谱]
      最小可行产品 --> 验证[更快合规初稿 更少缺陷 更高入围率]
      验证 --> 扩张[更多投标团队 合作方工作区与相邻招标模块]
investorMemo:
  verdict:
    call: Watch
    conviction: "真实的工作流痛点和差异化的合规切口都在，但测算的滩头市场规模不大，可复制的导入流程还需要证据支撑。"
    whyBelieve: "采购制度改革、社会价值证据和杂乱的共享盘工作流，共同为一套通用文案工具无法完全覆盖的承包商原生系统开出了一个具体的口子。"
    whyDoubt: "如果档案整理始终依赖人力定制，或者真实滩头市场更接近 200 家企业，公司可能会在一个拥挤品类里止步于一个重服务的点状方案。"
    nextDiligence: "跑通两个付费框架协议续标试点，验证能否更快拿出合规初稿、减少提交缺陷，并转化为 3 万英镑以上的年度合同。"
  firstCustomer:
    title: "一家 150 人规模英国土木工程承包商的投标经理"
    profile: "一家每年投标 40-60 个市政、公用事业和框架协议招标的承包商，投标团队 6 人，档案散落共享盘，没有结构化证据库。"
    trigger: "新框架协议招标或年度续标，2-6 周的截止日逼团队重写方法说明、社会价值叙述、简历包和合作方证据。"
    buyer: "商务总监或预施工负责人"
    initialContract: "先做一个 8-12 周、1.5 万到 3 万英镑的证据审计与档案导入项目，如果一次真实续标顺利跑通、团队把它当成投标团队的日常系统，再转为 3 万到 7.5 万英镑的年度订阅。"
  mustBeTrue:
    - "前 5 个共创客户中至少 3 个必须共用一套能在 30 天或更短时间内完成导入的窄口径证据本体论。"
    - "真实试点必须在至少一个真实公共部门招标上，把专家搜索和撰写时间减少 25% 以上。"
    - "商业买家必须在 6 个月内，把至少一半的付费试点转化为年费超过 3 万英镑的年度合同。"
    - "评审结果或内部质检必须证明合规失误比客户之前的手工流程更少。"
    - "扩展到额外投标团队、合作方工作区或相邻招标模块，必须能把 ACV 拉到约 6.5 万美元以上，且定制服务不超过交付工作量的 30%。"
  diligenceQuestions:
    - "英国到底有多少家 50-500 人规模的土木承包商，真正每年跑 20-150 个相关招标，并有集中的软件预算？"
    - "简历包、HSEQ 认证、案例和分包商文档中，有多大比例的档案导入工作能实现标准化？"
    - "在看到独立测量的中标率提升之前，买家会不会先为更少的合规错误和更低的专家工时买单？"
    - "产品能否与 SharePoint、顾问和现有投标库共存，还是必须取而代之才能兑现 ROI？"
    - "公路、公用事业、地方政府和框架协议招标之间，规则包和证据需求差异有多大？"
operatingAssumptions:
  - assumption: "前五个客户会共用足够多的通用证据对象——比如案例、简历包、HSEQ 认证和分包商包——足以围绕一种公共部门招标类型把导入流程产品化。"
    basis: research.yaml
    validationTest: "从 10 个目标客户收集样本档案，确认至少 70% 的所需证据能不经定制提取就映射到同一套通用模式。"
    decisionImpact: "如果不成立，就把目标客户收窄到一个框架协议族，或者把导入重新定价为更重人力的服务，而不是走风投式 SaaS 路线。"
  - assumption: "即便独立中标率提升尚未得到证实，买家在看到更低的缺陷率和更省的专家工时后也会签年度软件合同。"
    basis: research.yaml
    validationTest: "签下至少 3 个付费审计，并在 6 个月内基于真实招标指标转化 2 个到 3 万英镑以上的年费订阅。"
    decisionImpact: "如果不成立，就把产品打包进咨询交付，或者接受更低的 ACV 和更慢的风投式增长。"
  - assumption: "与 SharePoint 和 Teams 共存足以带来初始 ROI，产品不需要替代整套投标库或提交门户。"
    basis: research.yaml
    validationTest: "跑 2 个试点，超过 80% 的源文档留在现有存储中，审核人员仍能按时完成工作流。"
    decisionImpact: "如果不成立，集成范围、安全审查和销售周期都会拉长，需要更多资本和更窄的客户筛选。"
  - assumption: "评估摘要和社会价值证据能对通用 AI RFP 工具形成可复制的合规优势。"
    basis: research.yaml
    validationTest: "在 2 个试点中比较至少 20 道真实招标问题，证明引证证据覆盖率更高、合规失误比客户之前的流程更少。"
    decisionImpact: "如果不成立，差异化就会削弱，公司应该把定位调整为文案生成或资质判断，而不是完整的证据系统。"
  - assumption: "测算的 1950 万美元滩头市场，只有在合作方工作区、相邻招标模块或再新增一个地区能复用大部分同一图谱和规则引擎时，才撑得起一个风投级结果。"
    basis: operator judgment
    validationTest: "到第 18 个月，证明至少 2 条扩展路径能在不重建本体论的前提下提升 ACV 或客户数。"
    decisionImpact: "如果不成立，就把这门生意当成小众的现金流工具来经营，或者在冲更大规模的种子后轮之前及时止步。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "开展 12 场探索访谈，从目标土木承包商收集匿名档案样本。"
    hypothesis: "潜在客户共用足够多的文档结构，且有足够多的近期招标截止日，能支撑一个统一的 MVP。"
    successMetric: "12 家客户中至少 8 家能映射到同样的四类证据对象，并在 6 个月内报告一次真实续标或新框架招标。"
    owner: CEO
  - horizon: 0–90 天
    experiment: "在真实框架协议或公用事业招标上交付 2 个付费证据审计，后台用人工工作流，前端做成产品化界面。"
    hypothesis: "在整套平台自动化之前，买家就愿意为证据映射和合规缺口分析付费。"
    successMetric: "签下 2 个各 1.5 万英镑以上的付费项目，且至少 1 个推进到生产范围规划。"
    owner: CEO
  - horizon: 90–180 天
    experiment: "上线一个招标类型解析器，带引证答案草稿、投标/弃标评分和带溯源的审核工作流。"
    hypothesis: "一条窄的招标工作流足以压缩初稿周转时间、降低缺陷风险，值得按订阅定价。"
    successMetric: "两个共创客户都能在招标解析完成后 3 个工作日内拿出合规引证初稿。"
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: "为前 2 个试点部署 SharePoint 和 Teams 共存方案，加上合作方文档采集。"
    hypothesis: "产品能在现有协作工具内运作，不需要强制推倒重来。"
    successMetric: "超过 80% 的源文档留在现有存储中，合作方证据通过新工作流到位且不耽误截止日。"
    owner: 投标领域产品负责人
  - horizon: 180–365 天
    experiment: "围绕投标团队、招标量分级和合作方工作区打包年度定价。"
    hypothesis: "与按坐席收费相比，与用量挂钩的团队定价更容易获得商业买家批准。"
    successMetric: "至少 50% 的付费试点转为年度合同，且没有一个转化客户要求改回按坐席定价。"
    owner: CEO
  - horizon: 180–365 天
    experiment: "围绕框架协议续标和档案整理，推出 2 个咨询或实施合作方打法。"
    hypothesis: "合作方能带来合格试点、减少导入人力，同时不会把公司变成定制投标服务商。"
    successMetric: "至少 1 个付费试点由合作方带来，且定制服务始终低于交付工作量的 25%。"
    owner: CEO
operations:
  - "维护一套带溯源的证据质检流程，导出前拦截无引用的答案和过期证书。"
  - "从现有的 SharePoint、Teams 和投标库文件夹同步导入，权限感知，V1 不强制文件迁移。"
  - "把招标、问题、证据、审核人和结果都记录成结构化对象，用于中标/落标和评估摘要分析。"
  - "培训咨询公司和实施合作方做档案整理和模板搭建，而不是代写定制答案。"
team:
  - role: "CEO / 创始销售"
    startTiming: Month 0
    rationale: "主导真实续标的直接销售、定价摸索和合作方拓展，把客户 ROI 转化成前 5 单。"
  - role: 创始工程师
    startTiming: Month 0
    rationale: "搭建导入层、证据图谱、需求解析器和带引证的审核工作流。"
  - role: 投标领域产品负责人
    startTiming: Month 0-3
    rationale: "把杂乱的承包商工作流、框架规则和合规痛点，变成可复制的产品范围，而不是零散的人力服务。"
  - role: 应用 AI 与文档工程师
    startTiming: Month 6-9
    rationale: "在第一套文档本体论和招标模板得到验证后，把抽取、检索和答案溯源打磨扎实。"
  - role: 实施与渠道经理
    startTiming: Month 9-12
    rationale: "在首批订阅转化之后，把档案导入标准化，支持咨询公司或集成商的转介。"
milestones:
  - horizon: 0–12 个月
    items:
      - "在英国土木基础设施招标中签下 2-3 家付费共创客户"
      - "把一个招标类型解析器、带溯源证据库和 SharePoint 共存工作流产品化"
      - "在真实试点中证明专家搜索和撰写时间至少降低 25%，提交缺陷明显减少"
      - "把至少 2 个试点转化为年度订阅"
  - horizon: 12–24 个月
    items:
      - "达到 5-7 家订阅客户，且至少有 2 个合作方带来的机会"
      - "新增合作方工作区、评估摘要反馈采集，以及至少 2 套相邻招标模板"
      - "证明能在现有客户内部通过新增投标团队或分包商证据工作流实现扩张"
  - horizon: 24–36 个月
    items:
      - "在测算的 SOM 内达到约 25-30 家客户和约 200 万美元 ARR"
      - "为现有英国基础设施客户推出预审或中标后合规模块"
      - "用一套独立规则包测试一个相邻行业或地区，同时保持英国土木核心业务的可复制性"
risks:
  - risk: "档案导入和文档规范化仍然过于依赖定制，把导入周期拖过 90 天。"
    likelihood: High
    impact: High
    mitigation: "先聚焦一种招标类型，成交前要求样本档案资质核查，在共性模式被验证之前，把管家式整理服务的范围收得很紧。"
  - risk: "买家把中标率说法当成营销话术，没有独立 ROI 证据就拒签年度合同。"
    likelihood: Medium
    impact: High
    mitigation: "从第一天起就测量缺陷减少、专家工时和初稿周转时间，这样价值主张就不必只靠中标率提升的头条数字。"
  - risk: "BidScript、Responsive 或通用 AI RFP 工具对中型承包商来说已经足够好用。"
    likelihood: Medium
    impact: High
    mitigation: "靠承包商本体论、分包商包、评估摘要反馈和逐条需求可追溯性做差异化，而不是拼通用文案功能。"
  - risk: "变革管理阻力让团队继续留在 SharePoint、邮件和顾问主导的工作流里。"
    likelihood: Medium
    impact: Medium
    mitigation: "先卖共存方案，把审核任务导入现有工具，把咨询公司当成加速器而不是对手。"
  - risk: "真实滩头市场更接近 200 家企业而不是 300 家，压缩了纯英国市场的机会空间。"
    likelihood: Medium
    impact: High
    mitigation: "按账户内 ACV 扩张定价，并在承诺更大规模的种子后轮之前，先验证一个相邻招标细分或地区。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "用 18 个月的资金证明一条承包商原生的证据流水线：把档案导入产品化，拿下 5-7 家订阅客户，验证合作方带来的分销渠道，并证明公司能转化付费试点，而不会沦为一家重服务的投标咨询公司。"
