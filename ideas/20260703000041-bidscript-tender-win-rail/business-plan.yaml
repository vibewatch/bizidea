slug: bid-evidence-graph
date: "2026-07-03"
executiveSummary: >-
  UK civil and infrastructure contractors still run tender evidence assembly through shared drives, spreadsheets, Word libraries, and consultants, even as procurement reform increases the need for reusable supplier data, traceable assessment summaries, and social-value evidence. The proposed company sells a contractor-native bid evidence graph that ingests prior submissions, project case studies, CV packs, HSEQ certificates, and subcontractor documents, then maps them to requirement-level answers, gap flags, and compliance workflows for one public-sector tender type at a time. The first customer is a 150-person UK civil contractor bidding 40-60 council, utilities, and framework tenders per year, where a live rebid or new framework deadline makes document hunting and non-compliance risk immediately budgetable. Go-to-market starts with a paid evidence audit and archive onboarding, then converts into a £30k-£75k annual subscription priced by bid desk and tender volume if the product cuts SME search time, submission defects, and time to compliant first draft. The wedge is deliberately narrower than generic RFP automation because the researched SAM is only about $19.5M and the company needs proof that one contractor ontology, one rule pack, and one implementation motion repeat before expanding into adjacent sectors or geographies. The defensible angle is not better prose generation but a reusable mapping among tender clauses, past proof, subcontractor credentials, and eventual assessment outcomes that generic content libraries do not capture cleanly. The biggest disconfirming risk is that archive cleanup and change management remain too services-heavy, which would let BidScript, Responsive, consultants, or internal SharePoint workflows stay good enough. Market size and some ROI claims remain modeled or vendor-reported rather than independently benchmarked, so this pre-seed plan should be judged on whether the first five pilots convert into repeatable onboarding, measurable compliance gains, and subscriptions above point-tool price levels.
problem:
  - "Bid teams lose days hunting for case studies, CV packs, HSEQ certificates, and subcontractor proof across shared drives, Word libraries, and email every time a live framework or project tender lands."
  - "Public-sector construction bids now require reusable supplier data, social-value evidence, and audit-ready compliance, so manual reuse creates higher disqualification risk and inconsistent scoring."
solution:
  - "Ingest prior submissions, project records, CV packs, certificates, and partner documents into a requirement-tagged evidence graph for one UK civil tender workflow."
  - "Parse each new tender into go/no-go signals, source-linked draft answers, evidence gap flags, and reviewer workflows that export a compliant submission package without replacing existing storage."
whyWeWin:
  - "The product is built around contractor evidence objects and UK infrastructure rule packs rather than generic proposal text, which makes it harder for horizontal RFP tools to match proof depth."
  - "Each live bid adds requirement-level mappings, assessment feedback, and win/loss data that improve qualification, reuse, and partner-document coverage over time."
strategicChoices:
  beachhead: "UK civil engineering contractors with 50-500 employees bidding 20-150 public-sector framework and project tenders per year in highways, utilities, and local infrastructure work above £1 million."
  wedgeRationale: >-
    This beachhead has recurring deadline-driven tenders, measurable win/loss outcomes, and a messy mix of project evidence,
    CV packs, certifications, and partner documents, so it can prove whether a contractor-specific evidence layer is more
    valuable than a broader AI writing pitch. Going broader into generic RFP software would blur the product against
    incumbents before the company proves repeatable onboarding or differentiated compliance outcomes.
  sequencingRationale: >-
    Start with one tender type, one geography, and coexistence with SharePoint and consultant workflows so the team can sell
    into a live rebid, onboard quickly, and measure compliance and SME-time improvement before adding adjacent modules or
    geographies. Hiring and partnerships follow the same order: founder-led sales first, implementation-heavy product work
    second, then channel and module expansion only after pilots convert without bespoke services.
  notYet:
    - "Private-sector commercial bids with different rule packs and weaker compliance urgency"
    - "Non-UK procurement regimes that require separate policy and template logic"
    - "Full ERP, estimating, or portal replacement"
    - "Broad proposal-writing features that duplicate horizontal RFP suites"
market:
  tam: "$45.5M modeled UK annual software spend across roughly 700 tender-heavy construction and engineering bid desks."
  sam: "$19.5M modeled spend across about 300 UK civil and infrastructure contractors in the initial beachhead."
  som: "$2.0M year-3 revenue plan based on roughly 30 logos at about $65k blended ACV through direct sales plus partner referrals."
  segments:
    - "50-500 employee UK civil and infrastructure contractors bidding frequent public-sector tenders"
    - "Bid consultancies and adjacent UK tender-heavy contractors that can reuse the same evidence workflow after civil proof"
  buyingProcess: >-
    A bid manager or preconstruction lead usually champions the pilot during a live framework rebid because they feel the
    evidence scramble first. The commercial director or head of preconstruction signs the annual contract only after a paid
    onboarding shows fewer compliance misses, lower SME hours, and a faster cited first draft on a real tender.
product:
  mvp: >-
    A source-linked evidence graph for one public-sector civil tender type that ingests prior bids, case studies, CV packs,
    HSEQ certificates, and subcontractor documents, then maps them to tender questions with citations, gap flags, and a
    go/no-go score. V1 should read from existing storage, not force migration, and should require human review before any
    answer leaves the system.
  sixMonth: "Support the first two design partners with one framework-tender parser, SharePoint and Teams import, requirement-level evidence mapping, and a reviewer workflow that exports a compliant answer pack."
  twelveMonth: "Convert the product into a repeatable bid-desk system for 5-7 customers with tender-type templates, partner workspaces, assessment-summary feedback capture, and baseline-versus-current performance reporting."
  twentyFourMonth: "Expand inside UK infrastructure through additional tender families, subcontractor prequalification, and framework obligation tracking while testing one adjacent sector or geography with a separate rule pack."
  keyBets:
    - "One common ontology for case studies, CV packs, HSEQ certificates, and subcontractor evidence can cover the first five customers."
    - "Buyers value cited evidence coverage and lower compliance risk more than marginal improvements in prose quality."
    - "Assessment summaries and win/loss feedback can sharpen qualification and evidence reuse fast enough to lift ACV beyond point-tool pricing."
gtm:
  wedge: "Paid evidence audit and archive onboarding for a live framework rebid, delivered against one tender type with measurable defect, speed, and reuse metrics."
  channels:
    - "Founder-led outbound to bid directors and preconstruction leads entering known framework, council, or utilities rebid cycles"
    - "Referral and co-delivery partnerships with bid consultancies that already rescue overloaded tender teams"
    - "Integration-led introductions through SharePoint or Microsoft partners and construction workflow advisers"
  funnelTargets: "Target 20-30% intro-to-paid audit, 60%+ audit-to-design-partner pilot, 50%+ pilot-to-annual conversion, and first account expansion within 9 months through another bid desk or partner workspace."
  pricing: >-
    Charge a £15k-£30k archive-onboarding and evidence-audit fee, then convert to a £30k-£75k annual subscription priced by
    bid desk, annual tender volume, and partner-workspace count. This keeps entry below heavyweight enterprise SRM suites but
    above point drafting tools because the ROI claim is lower non-compliance risk and fewer SME hours on live tenders, not
    just faster text generation.
businessModel:
  revenueStreams:
    - "Annual software subscriptions"
    - "One-time archive ingestion and framework-template onboarding fees"
    - "Premium partner workspaces, assessment analytics, and additional tender-rule packs"
  unitOfValue: "Bid desk with a tender-volume band and optional partner workspaces"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add extra bid desks or regional teams inside the same contractor"
    - "Upsell partner and subcontractor evidence workspaces"
    - "Launch adjacent tender modules such as prequalification and framework obligation tracking"
strategyMap:
  northStarMetric: "Business days from tender receipt to a compliant cited first draft"
  inputMetrics:
    - "Days from archive handoff to first reusable evidence library"
    - "Percent of scored tender questions covered by source-linked reusable evidence"
    - "SME hours consumed per live tender before submission"
    - "Paid pilot to annual subscription conversion rate"
    - "Expansion rate into additional bid desks or partner workspaces"
  moatsToBuild:
    - "Requirement-level mapping between tender clauses and validated project, people, certificate, and partner evidence"
    - "A UK contractor ontology for NEC or JCT, framework rules, social value, and conditions of participation"
    - "Assessment-summary and win/loss corpus that links evidence coverage to outcome by tender type"
  killCriteria:
    - "Fewer than 3 of the first 5 paid pilots share the same tender template and evidence ontology enough to onboard within 30 days"
    - "Pilots fail to cut SME search and drafting time by at least 25% or to materially reduce submission defects on live bids"
    - "Less than 50% of paid pilots convert to annual subscriptions above £30k ARR within 6 months"
  mermaid: |
    flowchart LR
      Wedge[UK civil tender wedge] --> MVP[Source linked evidence graph]
      MVP --> Proof[Faster compliant drafts fewer defects better shortlist rate]
      Proof --> Expansion[More bid desks partner workspaces and adjacent tender modules]
investorMemo:
  verdict:
    call: Watch
    conviction: "Real workflow pain and a differentiated compliance wedge, but the modeled beachhead is modest and repeatable onboarding still needs proof."
    whyBelieve: "Procurement reform, social-value evidence, and messy shared-drive workflows create a concrete opening for a contractor-native system of record that generic drafting tools do not fully address."
    whyDoubt: "If archive cleanup stays bespoke or the true beachhead is closer to 200 firms, the company may top out as a services-heavy point solution in a crowded category."
    nextDiligence: "Run two paid framework-rebid pilots and verify faster compliant drafts, fewer submission defects, and conversion into £30k+ annual contracts."
  firstCustomer:
    title: "Bid manager at a 150-person UK civil engineering contractor"
    profile: "A contractor bidding 40-60 council, utilities, and framework tenders per year with a 6-person bid team, shared-drive archives, and no structured evidence library."
    trigger: "A new framework tender or annual rebid with a 2-6 week deadline that forces refresh of method statements, social-value narratives, CV packs, and partner evidence."
    buyer: "Commercial director or head of preconstruction"
    initialContract: "Start with a £15k-£30k evidence-audit and archive-onboarding project over 8-12 weeks, then convert to a £30k-£75k annual subscription if one live rebid runs through the workflow and the team adopts it as the bid desk system."
  mustBeTrue:
    - "At least 3 of the first 5 design partners must share a narrow evidence ontology that can be onboarded in 30 days or less."
    - "Live pilots must reduce SME search and drafting time by at least 25% on one real public-sector tender."
    - "Commercial buyers must convert at least half of paid pilots into annual contracts above £30k ARR within 6 months."
    - "Assessment outcomes or internal QA must show fewer compliance misses than the customer's prior manual process."
    - "Expansion into extra bid desks, partner workspaces, or adjacent tender modules must lift ACV beyond roughly $65k without custom services exceeding 30% of delivery effort."
  diligenceQuestions:
    - "How many UK 50-500 employee civil contractors truly run 20-150 relevant tenders per year and own a software budget centrally?"
    - "What percent of archive-ingestion work can be standardized across CV packs, HSEQ certificates, case studies, and subcontractor documents?"
    - "Will buyers pay for fewer compliance errors and lower SME hours before they see independently measured win-rate lift?"
    - "Can the product coexist with SharePoint, consultants, and current bid libraries, or must it replace them to deliver ROI?"
    - "How different are rule packs and evidence needs across highways, utilities, local-authority, and framework tenders?"
operatingAssumptions:
  - assumption: "The first five customers will share enough common evidence objects such as case studies, CV packs, HSEQ certificates, and subcontractor packs to productize onboarding around one public-sector tender type."
    basis: research.yaml
    validationTest: "Collect sample archives from 10 target accounts and confirm at least 70% of required evidence maps to one common schema without custom extraction work."
    decisionImpact: "If false, narrow the ICP to one framework family or reprice onboarding as higher-touch services instead of venture-style SaaS."
  - assumption: "Buyers will sign annual software contracts after seeing lower defect rates and SME time savings, even before independent win-rate lift is proven."
    basis: research.yaml
    validationTest: "Close at least 3 paid audits and convert 2 into £30k+ ARR subscriptions within 6 months based on live tender metrics."
    decisionImpact: "If false, bundle the product into consultancy delivery or accept lower ACV and slower venture-scale growth."
  - assumption: "Coexisting with SharePoint and Teams is sufficient for initial ROI and the product does not need to replace the full bid library or submission portal."
    basis: research.yaml
    validationTest: "Run 2 pilots where more than 80% of source documents remain in existing storage and reviewers still complete the workflow on time."
    decisionImpact: "If false, integration scope, security review, and sales cycle length increase enough to require more capital and narrower customer selection."
  - assumption: "Assessment summaries and social-value evidence create a repeatable compliance advantage over generic AI RFP tools."
    basis: research.yaml
    validationTest: "Compare at least 20 live tender questions across 2 pilots and show higher cited evidence coverage plus fewer compliance misses than the customer's prior process."
    decisionImpact: "If false, differentiation weakens and the company should reposition around drafting or qualification rather than a full evidence system."
  - assumption: "The modeled $19.5M beachhead can support a venture outcome only if partner workspaces, adjacent tender modules, or one additional geography reuse most of the same graph and rule engine."
    basis: operator judgment
    validationTest: "By month 18, prove at least 2 expansion paths can raise ACV or logo count without rebuilding the ontology from scratch."
    decisionImpact: "If false, finance the business as a niche cash-flow tool or stop before a larger venture round."
experimentRoadmap:
  - horizon: 0–90 days
    experiment: "Run 12 discovery sessions and collect anonymized archive samples from target civil contractors."
    hypothesis: "Prospects share enough document structure and have enough near-term tender deadlines to support one common MVP."
    successMetric: "At least 8 of 12 accounts map to the same four evidence objects and report a live rebid or new framework tender within 6 months."
    owner: CEO
  - horizon: 0–90 days
    experiment: "Deliver 2 paid evidence audits on live framework or utilities tenders using manual back-end workflows behind a productized front end."
    hypothesis: "Buyers will pay for evidence mapping and compliance gap analysis before the full platform is automated."
    successMetric: "2 paid projects signed at £15k+ each and at least 1 proceeds to production-scope planning."
    owner: CEO
  - horizon: 90–180 days
    experiment: "Ship one tender-type parser with cited answer drafts, go/no-go scoring, and source-linked reviewer workflow."
    hypothesis: "A narrow tender workflow can cut first-draft turnaround and defect risk enough to justify subscription pricing."
    successMetric: "Both design partners reach a compliant cited first draft within 3 business days of tender parsing."
    owner: Founding eng
  - horizon: 90–180 days
    experiment: "Deploy SharePoint and Teams coexistence plus partner-document collection for the first 2 pilots."
    hypothesis: "The product can work inside existing collaboration tools without forcing a rip-and-replace."
    successMetric: "More than 80% of source documents stay in current storage and partner evidence arrives through the new workflow without deadline slippage."
    owner: Bid-domain product lead
  - horizon: 180–365 days
    experiment: "Package annual pricing around bid desks, tender-volume bands, and partner workspaces."
    hypothesis: "Usage-linked desk pricing is easier for commercial buyers to approve than seat-only pricing."
    successMetric: "At least 50% of paid pilots convert to annual contracts and no converted customer asks to replace the model with seat-only pricing."
    owner: CEO
  - horizon: 180–365 days
    experiment: "Launch 2 consultancy or implementation-partner motions around framework rebids and archive cleanup."
    hypothesis: "Partners can source qualified pilots and reduce onboarding labor without turning the company into custom bid services."
    successMetric: "At least 1 paid pilot is sourced by a partner and custom services remain below 25% of delivery effort."
    owner: CEO
operations:
  - "Maintain a source-linked evidence QA process that blocks uncited answers and expired certificates before export."
  - "Ingest from existing SharePoint, Teams, and bid-library folders with permissions-aware sync instead of forcing file migration in v1."
  - "Capture tender, question, evidence, reviewer, and outcome data as structured objects for win/loss and assessment-summary analysis."
  - "Train consultancies and implementation partners on archive cleanup and template setup, not bespoke answer writing."
team:
  - role: "CEO / founding seller"
    startTiming: Month 0
    rationale: "Own direct sales into live rebids, pricing discovery, and partner development while translating customer ROI into the first 5 deals."
  - role: Founding eng
    startTiming: Month 0
    rationale: "Build the ingestion layer, evidence graph, requirement parser, and cited reviewer workflow."
  - role: Bid-domain product lead
    startTiming: Month 0-3
    rationale: "Turn messy contractor workflows, framework rules, and compliance pain into a repeatable product scope instead of ad hoc services."
  - role: Applied AI and document engineer
    startTiming: Month 6-9
    rationale: "Harden extraction, retrieval, and answer-grounding once the first document ontology and tender templates are proven."
  - role: Implementation and channel manager
    startTiming: Month 9-12
    rationale: "Standardize archive onboarding and support consultancy or integrator referrals after the first subscription conversions."
milestones:
  - horizon: 0–12 months
    items:
      - "Close 2-3 paid design partners in UK civil infrastructure tenders"
      - "Productize one tender-type parser, source-linked evidence library, and SharePoint coexistence workflow"
      - "Demonstrate at least 25% lower SME search and drafting time plus materially fewer submission defects on live pilots"
      - "Convert at least 2 pilots into annual subscriptions"
  - horizon: 12–24 months
    items:
      - "Reach 5-7 subscription customers and at least 2 partner-sourced opportunities"
      - "Add partner workspaces, assessment-summary feedback capture, and at least 2 adjacent tender templates"
      - "Prove expansion inside existing customers through extra bid desks or subcontractor evidence workflows"
  - horizon: 24–36 months
    items:
      - "Reach roughly 25-30 customers and about $2.0M ARR in the modeled SOM"
      - "Launch prequalification or post-award compliance modules for existing UK infrastructure customers"
      - "Test one adjacent sector or geography with a separate rule pack while keeping the UK civil core repeatable"
risks:
  - risk: "Archive ingestion and document normalization remain too bespoke, stretching onboarding past 90 days."
    likelihood: High
    impact: High
    mitigation: "Start with one tender type, require sample-archive qualification before closing, and keep concierge cleanup tightly scoped until common patterns are proven."
  - risk: "Buyers view win-rate claims as marketing and refuse annual contracts without independent ROI proof."
    likelihood: Medium
    impact: High
    mitigation: "Measure defect reduction, SME hours, and first-draft turnaround from day one so the value case does not depend only on headline win-rate lift."
  - risk: "BidScript, Responsive, or generic AI RFP tools become good enough for mid-market contractors."
    likelihood: Medium
    impact: High
    mitigation: "Differentiate on contractor ontology, subcontractor packs, assessment-summary feedback, and requirement-level traceability rather than generic drafting features."
  - risk: "Change-management resistance keeps teams in SharePoint, email, and consultant-led workflows."
    likelihood: Medium
    impact: Medium
    mitigation: "Sell coexistence first, route review tasks through current tools, and use consultancies as accelerators rather than adversaries."
  - risk: "The real beachhead is closer to 200 firms than 300, compressing the UK-only opportunity."
    likelihood: Medium
    impact: High
    mitigation: "Price for ACV expansion within each account and validate one adjacent tender segment or geography before committing to a larger post-seed scale plan."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months to prove one contractor-native evidence rail: productize archive onboarding, win 5-7 subscription customers, validate partner-sourced distribution, and show the business can convert paid pilots without becoming a services-heavy bid consultancy."
