problem: >-
  AI 园区开发商如今可以采购模块化燃气发电机组，却仍在用 EPC 表格、OEM 邮件和每周战情室管理整个项目。
  一个 20 至 100 MW 的桥接电力包涉及设备预订、现场就绪、冗余设计、燃料规划、工厂验收与调试等多个环节，
  任何一个环节的延误都可能把租户的营收推迟数月。现有项目工具太过通用，既无法按兆瓦级逐块建模依赖关系，
  也无法向高管和贷款方证明临时电力真的能按时到位。
targetUser:
  primary: 北美 AI 园区开发商的数据中心开发副总裁或电力交付负责人——园区规模 20 至 100 MW，电网服务尚未就绪
  secondary: 业主工程师或微电网 EPC 项目负责人，负责协调同一园区内多家发电机、开关设备和控制系统供应商
  buyer: AI 基础设施开发商的首席开发官、COO 或电力交付副总裁
startupThesis:
  nonObviousInsight: >-
    真正的难点不再是找到新型电力技术，而是抢占稀缺的制造排期、对齐现场准备与交付里程碑，
    并以足够快的速度完成多供应商发电机群的调试，从而赶上 AI 需求变现的窗口。
    当可部署电力已有 7.5 GW 积压订单和专属工厂，能赢得市场的软件是程序管控层，
    而不是另一款能源资产产品。
  beachhead: 北美 AI 园区绿地项目——采购首个 20 至 80 MW 表后往复式发电桥接包，电网并网时间超出 12 个月
  wedge: 一套桥接电力调试操作系统，将每一个发电机组、平衡系统依赖项、FAT 与 SAT 里程碑、燃料就绪检查和商务节点，整合进统一的园区级控制塔
  whyNowCatalyst: VoltaGrid 融资、Propell 收购及明确的数据中心聚焦，表明可部署发电产能正在快速扩张——客户的紧迫痛点已转移至采购与交付协调。
  ventureScalePath: >-
    从 AI 园区桥接电力项目起步，逐步扩展至永久微电网、工业园区、电网韧性项目，
    以及需要分布式电力资产交付风险记录系统的贷款方和保险机构。
solution: >-
  为业主和 EPC 构建一套软件系统，将可部署发电当作受管供应链而非普通建设项目来运营。
  产品为每个园区创建按兆瓦数字化物料清单，将设备排期与土建、电气和审批前置条件绑定，
  并实时标注最可能延误首次送电的依赖项。同时，它跨供应商标准化工厂验收、运输、现场验收
  和黑启动测试流程，让团队能将实际进度与承诺的通电日期逐项比对。随着时间推移，
  公司将积累模块化发电项目滑期、供应商履约和设计选择缩短营收周期的最佳基准数据集。
goToMarketSeed:
  firstCustomer: 北美 AI 基础设施开发商——新 GPU 园区已有租户签约需求，但电网延误 12 至 24 个月，须采购 20 至 80 MW 发电机桥接方案
  buyingTrigger: 租户合同或融资交割依赖于在电网永久并网前确定首次送电日期
  currentAlternative: 跨表格、OEM 门户、EPC 计划表和业主工程师会议的内部项目管理，有时辅以传统项目管控顾问
  switchingReason: 切口产品让高管拥有一个可信的单一信源，确认桥接电力能否准时到位、进度风险在哪——这是通用建设软件和顾问在兆瓦包层面无法建模的
  pricingHypothesis: 按活跃园区收取年度平台费，加上实施费和面向在运桥接电力项目的按 MW 调试模块费
