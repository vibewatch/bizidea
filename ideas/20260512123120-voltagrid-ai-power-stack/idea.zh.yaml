jobsToBeDone:
  - job: 当新 AI 租户签约而电网尚未就绪时，帮助园区开发团队协调桥接电力交付，确保在承诺日期前完成算力通电。
    currentAlternative: 通用建设计划表、表格跟踪工具和跨供应商周度协调会
    successMetric: 从开工通知到首兆瓦并网的天数，以及提前检出里程碑滑期的比例
  - job: 当 EPC 管理多供应商发电机包时，帮助项目负责人证明调试就绪，避免代价高昂的最后一刻交付或测试失败。
    currentAlternative: 手工检查清单、邮件往来、分散的工厂与现场验收追踪工具
    successMetric: 规避的变更订单数量，以及首次通过 FAT 和 SAT 的发电机组比例
