topRisks:
  - name: 项目过于定制化
    description: 早期桥接电力项目在园区和供应商组合上差异过大，软件标准化难以落地。
    mitigation: 从往复式发电机包的特定 MW 区间起步，先将通用 FAT、SAT 和现场就绪里程碑固化，再扩展范围。
  - name: OEM 捆绑基础工具
    description: 发电机集成商或 EPC 可能添加基础里程碑看板，削弱采购独立软件的紧迫性。
    mitigation: 凭借中立的跨供应商协调能力和单一供应商工具无法可信提供的贷款方级风险报告来赢单。
  - name: 电网延误提前缓解
    description: 若电网升级加速，部分开发商可能选择等待而非资助桥接电力项目。
    mitigation: 尽快扩展至永久微电网和韧性部署，同一套调试与交付管控工作流在这些场景中同样适用。
