    - 36
  validationPlan:
  - priority: high
    question: How many live bridge-power programs per year does a target developer actually run in the 20-100 MW band?
    evidenceToGather: Interview 10 North American AI-campus developers and map their last three energization programs, including canceled or delayed bridge-power efforts.
  - priority: high
    question: Which milestones can be pulled directly from OEM, EPC, and commissioning systems without adding manual field admin?
    evidenceToGather: Run a pilot with one developer, one owner’s engineer, and one vendor packager to audit FAT, SAT, shipping, and fuel-readiness data availability.
  - priority: medium
    question: Will lenders, insurers, or investors pay for risk-reporting modules, or will they simply require the owner to provide them?
    evidenceToGather: Test reporting prototypes with two infrastructure lenders and two insurance underwriters tied to on-site power programs.
  - priority: medium
    question: How much permitting-timeline variance exists by county and airshed beyond Texas?
    evidenceToGather: Benchmark 15 recent projects across Texas, PJM/Mid-Atlantic, and one frontier market using permitting advisors and public permit records.
