competitors:
- name: VoltaGrid
  stage: scale-up
  wedge: Vertically integrated modular behind-the-meter power platform for data centers and other demanding sites.
  pricing: Custom power-service contract; no standalone software price found.
  strength: Owns hardware, supply chain, and deployment credibility at multi-hundred-megawatt to multi-gigawatt scale.
  weaknessVsUs: Not neutral across multiple vendors; incentives are tied to selling and operating its own generation assets.
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: Oracle Primavera / Oracle Construction
  stage: incumbent
  wedge: CPM scheduling and capital-project controls for large infrastructure programs.
  pricing: Custom / enterprise quote; no public seat pricing found.
  strength: Deep schedule, cost, and portfolio-governance pedigree for complex capital programs.
  weaknessVsUs: Generic capital-project abstraction rather than native modeling of generator blocks, FAT/SAT, fuel readiness, and energization logic.
  sourceRefs:
  - 29
  - 39
- name: Procore
  stage: incumbent
  wedge: Connected lifecycle platform for owners and mission-critical construction teams.
  pricing: Custom quote; no public list pricing found.
  strength: Strong owner adoption, collaboration workflows, and audit-ready records on mission-critical builds.
  weaknessVsUs: Better at general construction governance than at power-domain sequencing and commissioning benchmarks.
  sourceRefs:
  - 30
  - 31
  - 32
- name: InEight
  stage: scale-up
  wedge: Capital-project controls and scheduling platform with an energy and power vertical.
  pricing: Custom / enterprise quote; no public pricing found.
  strength: Closer than general PM tools to serious schedule, cost, and risk control on regulated capital projects.
  weaknessVsUs: Still horizontal and configuration-heavy for bridge-power commissioning across OEM and EPC boundaries.
  sourceRefs:
  - 33
  - 34
  - 35
- name: Enchanted Rock
  stage: scale-up
  wedge: Bridge-to-grid and resiliency-as-a-service using managed on-site natural-gas generation.
  pricing: Flexible/custom contract pricing; no standalone software price found.
  strength: Understands the bridge-power use case and can bundle delivery, operation, and post-grid resiliency.
  weaknessVsUs: Asset/operator bias makes it a substitute for outsourced power, not a neutral multi-vendor system of record.
  sourceRefs:
  - 36
