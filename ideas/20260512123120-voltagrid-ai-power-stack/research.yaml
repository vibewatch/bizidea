    - 21
    - 22
    - 23
    - 25
    - 26
  - point: Benchmark models that show which sequencing choices shorten time-to-power or improve first-pass commissioning success can become lender-grade intelligence over time.
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
    - 36
  geographicConsiderations:
  - point: Texas and ERCOT are the cleanest beachhead because growth is accelerating, on-site gas solutions are common, and ERCOT now has explicit large-load and proposed net-metering processes.
    sourceRefs:
    - 1
    - 3
    - 25
    - 36
  - point: PJM and the Mid-Atlantic are urgent but more politically complex because co-located-load rules are still being rewritten and reliability-cost allocation is contested.
    sourceRefs:
    - 17
    - 26
    - 27
    - 28
  - point: Frontier U.S. markets matter because power availability is outranking legacy market prestige, which lets the startup expand wherever it can productize local compliance playbooks.
    sourceRefs:
    - 7
    - 8
    - 9
    - 10
    - 12
  sensitivityCases:
  - case: Utility lead times improve materially
    impact: Pure bridge-power urgency falls, but a narrower resiliency and non-firm-service workflow still remains.
    sourceRefs:
    - 6
    - 10
    - 11
    - 36
  - case: Air permitting tightens or public scrutiny rises
    impact: Sales cycles lengthen and implementation becomes heavier, but compliance workflow becomes more valuable once a buyer commits.
    sourceRefs:
