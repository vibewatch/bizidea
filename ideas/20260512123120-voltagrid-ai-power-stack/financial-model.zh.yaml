scenarios:
  downside:
    description: 试点转生产大约推迟一个季度，ARPU 落在纯订阅定价附近，实施服务保持定制化导致毛利率改善较慢。
    y3RevenueK: 4207.5
    y3EbitdaK: -120.0
    cashLowPointK: 320.0
    keyAssumptionChanges:
    - 每园区混合年度收入降至约 $33 万，因高级报告和实施附加延迟落地。
    - 第三年期末约 16 个园区而非 20 个，因前三个试点未全部按时扩展。
    - 毛利率期末约 68% 而非 72%，因集成仍依赖服务工作。
  base:
    description: 三个付费试点形成可复制的园区上线动作，之后在现有账户内扩展，无需超前大规模招聘。
    y3RevenueK: 5310.0
    y3EbitdaK: 598.0
    cashLowPointK: 760.7
    keyAssumptionChanges:
    - 每园区混合年度收入 $36 万，以订阅、实施和报告混合方式锚定计划定价。
    - 客户数到 Q4Y3 达到 20 个园区，与商业计划和研究 SOM 终点一致。
    - 第三年模板和集成标准化后，毛利率达到 70% 至 72%。
  upside:
    description: 合作伙伴转介缩短销售周期，第二园区扩展提前发生，报告模块更早在各账户内附加。
    y3RevenueK: 6142.5
    y3EbitdaK: 1185.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
    - 基准和报告模块附加加速，每园区混合年度收入升至约 $39 万。
    - 至少两个账户提前扩展至另一个园区，第三年期末约 22 个园区。
    - 实施复用 ERCOT 模板速度快于基准情形，毛利率期末约 74%。
