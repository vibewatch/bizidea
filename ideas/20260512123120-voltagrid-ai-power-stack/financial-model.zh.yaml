modelDiagram:
  title: 单位经济模型流转图
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ActiveCampuses
      ActiveCampuses --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形依靠从第一年末 3 个付费园区扩张至第三年末 20 个园区，每个园区混合年度价值 $36 万来驱动。
- checkName: 必须做对的事
  finding: 前三个试点必须转化为可复制的多园区上线模式，实施工作才能从定制服务演变为标准化软件。
- checkName: 模型失效条件
  finding: 若销售周期拉长至约九个月，或毛利率持续低于 60% 末尾，悲观情形将指向在下一个验证节点前再次融资。
- checkName: 下一轮融资证明
  finding: 下一轮融资的依据是达到 8 至 10 个生产园区、展示至少一次账户内扩展，并证明基准或报告模块能提升 ACV。
sanityChecks:
  ruleOf40: 第三年增长率 122.6% + EBITDA 利润率 11.3% = 133.9%
  burnMultiple: 约第二年烧钱倍数 0.3x（基于 ARR 从 $110 万扩张至 $360 万的退出数据）；第三年 EBITDA 转正，烧钱倍数不再是关键视角。
  revenuePerFte: 第三年 $44.25 万（SaaS 基准 $20 万至 $40 万）
  flags:
  - 模型假设买方群体高度集中，少数园区延误就能对收入产生实质影响。
  - 第三年人均收入高于通用 SaaS 基准，只有在实施持续标准化、而非演变为服务部门的前提下才成立。
  - 单位经济模型使用启发式 CAC 和流失率，因公司尚无可观测的客户历史数据。
  - 毛利率达到 70% 出头，取决于基于导出的数据录入和可复用 ERCOT 合规模板能否覆盖大多数部署。
