slug: generator-bridge-commissioning-os
date: '2026-05-12'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-12] 建模为计划日期后的第一个完整月份'
- id: A2
  name: 客户单元定义
  value: 处于桥接电力交付管理中的活跃付费园区
  unit: definition
  source: '[BP businessModel.unitOfValue] 平台上受管的活跃园区桥接电力兆瓦数'
- id: A3
  name: 单个成熟园区的年度混合收入
  value: '360.0'
  unit: USDk per campus per year
  source: '[RS market.som 20 campuses x $360k blended annual value] 及 [BP gtm pricing $200k-$350k subscription plus implementation/module uplift]'
- id: A4
  name: 新客户收入确认
  value: 50% of full month or quarter in activation period
  unit: heuristic
  source: '种子前阶段中期上线的创业财务启发式规则，来源命名：Financial Modeler onboarding heuristic'
- id: A5
  name: 第一年新增园区计划
  value: M5 1, M8 1, M11 1
  unit: new campuses
  source: '[BP milestones 0-12 months] 12 个月内签署 3 个付费在运园区试点'
- id: A6
  name: 第二年园区期末数
  value: Q1Y2 5, Q2Y2 7, Q3Y2 8, Q4Y2 10
  unit: customers EOP
  source: '[BP milestones 12-24 months] 达到 8 至 10 个生产园区，并在现有账户内完成至少一次第二园区或报告扩展'
- id: A7
  name: 第三年园区期末数
  value: Q1Y3 12, Q2Y3 15, Q3Y3 17, Q4Y3 20
  unit: customers EOP
  source: '[BP milestones 24-36 months] 达到约 20 个付费园区，与 [RS market.som $7.2M at year 3] 一致'
- id: A8
  name: 毛利率爬坡
  value: Y1 45%-65%; Y2 67%-70%; Y3 70%-72%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70]，早期实施拖累来自创业财务启发式规则'
- id: A9
  name: 起始现金
  value: '2400.0'
  unit: USDk
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 以保守的种子前金额建模，仍能在有缓冲的情况下支撑里程碑'
- id: A10
  name: 含负担的薪酬基础
  value: 20% burden included in loaded salaries
  unit: percent
  source: '创业财务启发式规则，来源命名：early-stage SaaS loaded-comp heuristic'
- id: A11
  name: 各岗位年度含负担薪资
  value: Founding eng 210; Product/implementation 180; Founder-led GTM 180; Solutions 165; Compliance 165; Full-stack eng 195; CS/implementation 140; AE 180; Finance/ops 130
  unit: USDk per FTE per year
  source: '[BP team] 加创业财务启发式规则（种子阶段美国基础设施软件招聘）'
- id: A12
  name: 招聘节奏
  value: Month 0 core trio; Month 4 solutions; Month 8 compliance; Month 10 second engineer; Months 16 and 19 first CS and AE; Year 3 adds a second eng, second CS, second AE, and finance/ops
  unit: timing
  source: '[BP team] 及 [BP strategicChoices.sequencingRationale]——推迟规模化招聘，直至可复制试点成立'
- id: A13
  name: 第一年非薪酬运营支出
  value: 27K monthly in Q1, rising to 44K by M12
  unit: USDk per month
  source: '[BP operations] 加创始人主导企业销售的出行、云计算、法务和试点实施启发式规则'
- id: A14
  name: 第二、三年非薪酬运营支出
  value: Y2 quarterly opex 220, 245, 260, 285; Y3 quarterly opex 330, 360, 385, 410
  unit: USDk per quarter
  source: '[BP milestones] 加 [BP gtm channels]，随园区扩张出行、合作伙伴、云计算和合规成本增加'
- id: A15
  name: 每园区客户获取成本
  value: '150.0'
  unit: USDk per campus
  source: '[BP gtm founder-led direct sales plus partner referrals]，参照长周期企业基础设施软件的创业财务启发式规则'
- id: A16
  name: 月度流失率
  value: '1.5'
  unit: percent
  source: 适用于粘性较强但高度集中的企业工作流软件的创业财务启发式规则，参照 [BP risks bespoke workflow] 和 [RS openQuestions on post-grid transition]
- id: A17
  name: 融资里程碑与缓冲
  value: 24 months of runway to reach 8-10 production campuses plus 6 months of cash buffer
  unit: months
  source: '[BP fundingAsk runwayMonths 18] 加 Financial Modeler 阶段规则要求的 6 个月缓冲'
- id: A18
  name: 现金流简化
  value: Cash approximates EBITDA with no debt, capex, or working-capital swings modeled
  unit: heuristic
  source: '创业财务启发式规则，来源命名：early-stage SaaS cash simplification for pre-seed planning'
