  validationPlan:
  - priority: high
    question: 目标开发商每年实际在 20 至 100 MW 区间运行多少个在运桥接电力项目？
    evidenceToGather: 访谈 10 位北美 AI 园区开发商，梳理其最近三次通电项目，包括取消或推迟的桥接电力方案。
  - priority: high
    question: 哪些里程碑可直接从 OEM、EPC 和调试系统提取，无需增加手工录入负担？
    evidenceToGather: 与一位开发商、一位业主工程师和一家供应商集成商试点，审计 FAT、SAT、运输和燃料就绪数据的可用性。
  - priority: medium
    question: 贷款方、保险方或投资人是否愿意为风险报告模块付费，还是只要求业主提供相关数据？
    evidenceToGather: 与两家基础设施贷款方和两家与现场电力项目相关的保险核保方测试报告原型。
  - priority: medium
    question: 在德克萨斯以外地区，20 至 100 MW 部署的审批时间表按县和空气质量区有多大差异？
    evidenceToGather: 通过审批顾问和公开许可记录，对德克萨斯、PJM/中大西洋和一个边疆市场的 15 个近期项目进行基准比较。
