    - 13
    - 36
  geographicConsiderations:
  - point: 德克萨斯州和 ERCOT 是最干净的滩头——增长加速、现场燃气方案普遍，且 ERCOT 已建立明确的大负荷流程并提出净计量研究。
    sourceRefs:
