jobsToBeDone:
  - job: When a new AI tenant signs before utility power is ready, help the campus development team coordinate bridge-power delivery so they can energize compute on the promised date.
    currentAlternative: Generic construction schedules, spreadsheet trackers, and weekly coordination calls across vendors
    successMetric: Days from notice to proceed to first synchronized megawatt and percentage of milestone slips detected early
  - job: When an EPC is managing a multi-vendor generator package, help the program lead prove commissioning readiness so they can avoid expensive last-minute delivery or testing failures.
    currentAlternative: Manual checklists, email chains, and separate factory and site acceptance trackers
    successMetric: Change orders avoided and percent of generator blocks passing FAT and SAT on first attempt
