problem: >-
  AI campus developers can now buy modular gas generation, but they still manage the program through EPC spreadsheets,
  OEM emails, and weekly war rooms. A single 20 to 100 MW bridge-power package touches equipment reservation, site
  readiness, redundancy design, fuel planning, factory acceptance, and commissioning, and delays in any one stream can
  push tenant revenue back by months. Existing project tools are too generic to model megawatt-by-megawatt dependencies
  or prove to executives and lenders that interim power will actually arrive on schedule.
targetUser:
  primary: VP Data Center Development or Head of Power Delivery at a North American AI campus developer bringing a 20 to 100 MW site online before utility service is ready
  secondary: Owner’s engineer or microgrid EPC program lead coordinating multiple generator, switchgear, and controls vendors for the same campus
  buyer: Chief Development Officer, COO, or VP Power Delivery at an AI infrastructure developer
startupThesis:
  nonObviousInsight: >-
    The hard part is no longer finding a novel power technology. It is reserving scarce manufacturing slots, aligning
    site-prep and delivery milestones, and commissioning multi-vendor generation fleets fast enough to monetize AI demand.
    Once deployable power has a 7.5 GW backlog and dedicated factories, the winning software is a program control layer,
    not another energy asset.
  beachhead: Greenfield North American AI campuses procuring their first 20 to 80 MW behind-the-meter reciprocating-generation bridge package because utility interconnection is more than 12 months late
  wedge: A bridge-power commissioning OS that maps every generator block, balance-of-plant dependency, FAT and SAT milestone, fuel-readiness check, and commercial gate into one site-level control tower
  whyNowCatalyst: VoltaGrid’s financing, Propell acquisition, and explicit data-center focus show that deployable generation capacity is scaling fast, which shifts the urgent customer pain to procurement and delivery coordination.
  ventureScalePath: >-
    Start with AI campus bridge-power programs, then expand into permanent microgrids, industrial campuses, utility
    resilience projects, and lenders or insurers that need a system of record for delivery risk across fleets of
    distributed power assets.
solution: >-
  Build a software system for owners and EPCs that treats deployable generation like a managed supply chain instead of a
  generic construction project. The product creates a digital bill of megawatts for each site, ties equipment slots to
  civil, electrical, and permitting prerequisites, and surfaces which dependency is most likely to delay first power.
  It also standardizes factory acceptance, shipping, site acceptance, and black-start testing across vendors so teams can
  compare real progress against the promised energization date. Over time, the company builds the best benchmark dataset on
  how modular generation projects slip, which vendors hit schedule, and which design choices shorten time to revenue.
goToMarketSeed:
  firstCustomer: A North American AI infrastructure developer launching a new GPU campus with signed tenant demand but a 12 to 24 month utility delay, forcing the site to procure a 20 to 80 MW generator bridge
  buyingTrigger: A tenant contract or financing close depends on a firm first-power date before the utility can energize the permanent interconnect
  currentAlternative: Internal program management across spreadsheets, OEM portals, EPC schedules, and owner’s-engineer meetings, sometimes supplemented by incumbent project-controls consultants
  switchingReason: The wedge gives executives one credible source of truth for whether bridge power will arrive on time and where schedule risk sits, which generic construction software and consultants do not model at the megawatt-package level
  pricingHypothesis: Annual platform fee per active campus plus implementation fees and a per-MW commissioning module for live bridge-power programs
