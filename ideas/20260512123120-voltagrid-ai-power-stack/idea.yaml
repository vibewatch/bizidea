topRisks:
  - name: Projects stay too bespoke
    description: Early bridge-power programs may differ so much by site and vendor mix that software standardization is hard.
    mitigation: Start with reciprocating-generation packages in a narrow MW band and encode the common FAT, SAT, and site-readiness milestones before expanding.
  - name: OEMs bundle lightweight tooling
    description: Generator packagers or EPCs may add basic milestone dashboards and reduce urgency to buy standalone software.
    mitigation: Win on neutral cross-vendor coordination and lender-grade risk reporting that single-vendor tools cannot provide credibly.
  - name: Utility delays ease faster than expected
    description: If grid upgrades accelerate, some developers may choose to wait instead of funding bridge-power projects.
    mitigation: Expand quickly into permanent microgrid and resilience deployments where the same commissioning and delivery-control workflow still matters.
