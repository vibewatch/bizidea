modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ActiveCampuses
      ActiveCampuses --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by growing from 3 paying campuses at Y1 exit to 20 at Y3 exit on a $360K blended annual campus value.
- checkName: Must go right
  finding: The first three pilots must convert into repeatable multi-campus rollouts before implementation work behaves like standardized software rather than consulting.
- checkName: Model breaks if
  finding: If sales cycles stretch toward nine months or gross margin stays below the high-60s, the downside case points to another raise before the next proof point.
- checkName: Next-round proof
  finding: The next financing is justified by reaching 8-10 production campuses, showing at least one in-account expansion, and proving benchmark or reporting modules lift ACV.
sanityChecks:
  ruleOf40: Y3 growth 122.6% + EBITDA margin 11.3% = 133.9%
  burnMultiple: Approx. Y2 burn multiple 0.3x using exit ARR expansion from $1.1M to $3.6M; Y3 is EBITDA-positive, so burn multiple stops being the binding lens.
  revenuePerFte: $442.5K Y3 (benchmark $200–400K SaaS)
  flags:
  - The model assumes a very concentrated buyer universe, so a small number of delayed campuses can move revenue materially.
  - Revenue per FTE sits above generic SaaS benchmarks by Y3, which only works if implementations keep standardizing instead of turning into a services arm.
  - Unit economics use heuristic CAC and churn because the company has no observed cohort history yet.
  - Gross margin reaching the low 70s depends on export-based ingest and reusable ERCOT compliance templates staying sufficient for most deployments.
