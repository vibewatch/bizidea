  name: Gross margin ramp
  value: Y1 45%-65%; Y2 67%-70%; Y3 70%-72%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70] with early implementation drag from startup-finance heuristic'
- id: A9
  name: Starting cash
  value: '2400.0'
  unit: USDk
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] modeled at a conservative pre-seed amount that still funds the milestone with buffer'
- id: A10
  name: Loaded compensation basis
  value: 20% burden included in loaded salaries
  unit: percent
  source: 'Startup finance heuristic, named source: early-stage SaaS loaded-comp heuristic'
- id: A11
  name: Loaded annual salaries by role
  value: Founding eng 210; Product/implementation 180; Founder-led GTM 180; Solutions 165; Compliance 165; Full-stack eng 195; CS/implementation 140; AE 180; Finance/ops 130
  unit: USDk per FTE per year
  source: '[BP team] plus startup-finance heuristic for seed-stage U.S. infrastructure-software hiring'
- id: A12
  name: Hiring sequence
  value: Month 0 core trio; Month 4 solutions; Month 8 compliance; Month 10 second engineer; Months 16 and 19 first CS and AE; Year 3 adds a second eng, second CS, second AE, and finance/ops
  unit: timing
  source: '[BP team] and [BP strategicChoices.sequencingRationale] to delay scale hires until repeatable pilots exist'
- id: A13
  name: Y1 non-payroll operating spend
  value: 27K monthly in Q1, rising to 44K by M12
  unit: USDk per month
  source: '[BP operations] + founder-led enterprise sales heuristic for travel, cloud, legal, and pilot implementation overhead'
- id: A14
  name: Y2 and Y3 non-payroll operating spend
  value: Y2 quarterly opex 220, 245, 260, 285; Y3 quarterly opex 330, 360, 385, 410
  unit: USDk per quarter
  source: '[BP milestones] + [BP gtm channels] with heavier travel, partner, cloud, and compliance costs as campuses scale'
- id: A15
  name: CAC per campus
  value: '150.0'
  unit: USDk per campus
  source: '[BP gtm founder-led direct sales plus partner referrals] using startup-finance heuristic for long-cycle enterprise infrastructure software'
- id: A16
  name: Monthly churn
  value: '1.5'
  unit: percent
  source: Startup finance heuristic for sticky but concentrated enterprise workflow software, informed by [BP risks bespoke workflow] and [RS openQuestions on post-grid transition]
- id: A17
  name: Funding milestone and buffer
  value: 24 months of runway to reach 8-10 production campuses plus 6 months of cash buffer
  unit: months
  source: '[BP fundingAsk runwayMonths 18] plus Financial Modeler stage rule requiring a 6-month buffer'
- id: A18
  name: Cash flow simplification
  value: Cash approximates EBITDA with no debt, capex, or working-capital swings modeled
  unit: heuristic
  source: 'Startup finance heuristic, named source: early-stage SaaS cash simplification for pre-seed planning'
