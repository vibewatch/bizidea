- id: A7
  name: Y3 campus endpoints
  value: Q1Y3 12, Q2Y3 15, Q3Y3 17, Q4Y3 20
  unit: customers EOP
  source: '[BP milestones 24-36 months] reach about 20 paying campuses, consistent with [RS market.som $7.2M at year 3]'
