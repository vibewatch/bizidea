slug: generator-bridge-commissioning-os
date: '2026-05-12'
executiveSummary: >-
  This company should start as a bridge-power commissioning OS for Texas and ERCOT-led AI campus developers bringing 20-80 MW
  of behind-the-meter reciprocating generation online before utility service is ready. The buyer pain is operational, not
  conceptual: first power still depends on spreadsheets, OEM portals, consultant war rooms, and generic project controls even
  though a missed FAT, permitting gate, fuel-readiness item, or controls shipment can delay tenant revenue by months. The
  first product should be a neutral system of record that ties generator blocks, balance-of-plant dependencies, air-permit and
  large-load gates, FAT and SAT evidence, and executive risk reporting into one campus-level control tower. Go-to-market
  should stay narrow and coherent: sell a paid live-project pilot to the VP Power Delivery or COO right after a tenant
  commitment or financing close makes a first-power date board-critical, price by active campus and MW band, and win
  distribution through owner’s engineers and permitting advisors already inside the same delivery loop. The strategic reason
  to start in ERCOT is not market size alone but repeatability: Texas has visible bridge-power activity, explicit large-load
  process rules, and a permit path that can be productized sooner than PJM’s moving co-location regime. The moat is the
  cross-project dataset on which vendors, milestones, and sequencing choices actually predict first-power slippage and
  first-pass commissioning success. The main disconfirming risk is that projects remain too bespoke and data too fragmented for
  software deployment to stay lighter than consultant-led coordination. Exact delivered cost per MW, customer concentration by
  developer, and how much milestone data can be pulled automatically from OEM and EPC systems remain missing, so the first year
  must prove both repeatable integrations and pilot-to-production conversion.
problem:
  - AI campus developers using bridge power still coordinate generator reservation, site readiness, permitting, fuel planning, FAT, SAT, and first synchronization through spreadsheets, email, OEM portals, and weekly war rooms, so no one has a trustworthy view of which dependency will delay first power.
  - Horizontal tools such as Primavera, Procore, and InEight can track generic schedule and document status, but they do not natively model megawatt-block dependencies, cross-vendor commissioning gates, or audit-ready regulatory evidence for behind-the-meter generation.
solution:
  - Provide a live-project control tower that creates a digital bill of megawatts for each campus and ties every generator block, switchgear package, controls cabinet, fuel-readiness check, permit gate, FAT milestone, and SAT milestone to the promised energization date.
  - Start with evidence capture, critical-path risk scoring, and executive readiness reporting for bridge-power programs, then expand into benchmark analytics, lender and insurer reporting, and bridge-to-grid handoff once the core workflow is trusted.
whyWeWin:
  - The company is neutral across OEMs, EPCs, owner teams, and financiers, which matters because hardware vendors and EPCs are aligned to their own assets and cannot credibly be the system of record for cross-vendor delivery risk.
  - The wedge sits inside an urgent, measurable workflow where a schedule slip delays tenant revenue and financing milestones, making the ROI easier to defend than generic construction productivity software.
  - Each live project compounds proprietary data on slot reservations, FAT and SAT outcomes, permit delays, and vendor performance that horizontal PM suites and consultant war rooms do not naturally retain in reusable form.
strategicChoices:
  beachhead: Texas and broader ERCOT greenfield AI campuses procuring their first 20-80 MW reciprocating-engine bridge-power package because utility energization is more than 12 months late.
  wedgeRationale: ERCOT offers the fastest path to proof because the buyer pain is acute, on-site generation is already mainstream in the market, and the regulatory and permitting path is more stable and productizable than broader national expansion.
  sequencingRationale: Start with one narrow live-project workflow where the company can be system of record without replacing Primavera or Procore, use founder-led sales to win paid pilots tied to first-power deadlines, hire implementation and compliance depth only after the first pilots expose the repeatable milestones, then add benchmark reporting and lender or insurer modules from the same underlying dataset.
  notYet:
    - PJM co-location and Mid-Atlantic expansion before ERCOT and one secondary region have repeatable compliance playbooks
    - Full DERMS, dispatch optimization, or steady-state plant operations software
    - OEM-specific white-label dashboards that compromise neutral positioning
    - Smaller sub-20 MW resiliency projects without board-level first-power urgency
market:
  tam: $105.0M modeled TAM from roughly 350 North American bridge-power, prime-power, and adjacent distributed-power delivery programs at about $300k blended annual software and onboarding value.
  sam: $52.5M modeled SAM from roughly 175 North American data-center bridge-power programs implied by the researched 35 GW pipeline, a 30% bridge-power share assumption, and about 60 MW average program size.
  som: $7.2M year-3 SOM assuming about 20 paying campuses at roughly $360k blended annual value, consistent with a deliberately narrow founder-led beachhead.
  segments:
    - AI campus developers and owner-side power-delivery teams managing first 20-80 MW bridge-power programs
    - Owner’s engineers and microgrid EPC program-controls teams coordinating the same multi-vendor campus deployments
  buyingProcess: >-
    The sale usually starts when a utility delay, tenant commitment, or financing close turns first power into a board-level
    date owned by the VP Power Delivery, COO, or Chief Development Officer, with the owner’s engineer acting as workflow
    champion. The fastest path is a paid pilot on one live campus, followed by annual production deployment only after the
    buyer sees earlier detection of milestone slips, cleaner readiness evidence, and a credible path to on-time energization.
product:
  mvp: >-
    MVP is a live-campus bridge-power control tower for one 20-80 MW program with generator-block dependency mapping,
    critical-path milestones, Texas permit and ERCOT readiness checklists, FAT and SAT evidence capture, fuel-readiness
    status, and an executive dashboard showing whether first power is still achievable. It should integrate first through
    exports and structured evidence intake rather than promise full automation across every vendor system on day one.
  sixMonth: Launch 2-3 paid pilots with repeatable templates for reciprocating-engine bridge-power programs, milestone ingest from Primavera or Procore exports, risk scoring by generator block, and executive readiness reports used in weekly power-delivery reviews.
  twelveMonth: Add reusable integrations for the most common OEM, EPC, and commissioning inputs, benchmark delay analytics, lender and insurer reporting packs, and a bridge-to-grid handoff record so the project history survives after utility service arrives.
  twentyFourMonth: Expand into permanent microgrid and non-firm-service deployments across ERCOT plus one secondary U.S. market, with vendor benchmarking, regional compliance libraries, and portfolio reporting across multiple campuses.
  keyBets:
    - A neutral control layer can sit above existing PM suites without triggering a rip-and-replace sales cycle.
    - Reciprocating-engine bridge-power programs in the 20-80 MW band are standardized enough to support repeatable templates and software-like gross margins.
    - Buyers will pay six-figure ACVs because the software protects energization dates tied to tenant revenue and financing, not back-office admin time.
    - Lender, insurer, and owner reporting modules will materially raise ACV after the core campus workflow is adopted.
gtm:
  wedge: Sell a paid pilot on one live ERCOT-area campus where a tenant commitment or financing close depends on a firm first-power date before utility service arrives, positioning the product as the neutral readiness and risk system across OEMs, EPCs, and the owner team.
  channels:
    - Founder-led direct sales to VP Power Delivery, COO, and Chief Development Officer buyers at AI campus developers
    - Referral and implementation partnerships with owner’s engineers, permitting advisors, and specialist counsel already inside bridge-power diligence
    - Select pipeline-sharing relationships with generator packagers, microgrid EPCs, and infrastructure investors while maintaining neutral product positioning
  funnelTargets: "Target account→qualified pilot 15-25%, qualified pilot→paid pilot 40-60%, paid pilot→production 60%+, first production campus→second campus or reporting-module expansion within 12 months 50%+."
  pricing: "$75k-$150k paid pilot for one live campus, converting to roughly $200k-$350k annual subscription priced by active campus and MW band, plus implementation fees and an optional commissioning or reporting module; this fits how buyers budget against project risk rather than seat count."
businessModel:
  revenueStreams:
    - Annual subscription for each active campus running bridge-power delivery through the platform
    - One-time implementation and integration fees for new campus rollouts
    - Premium lender, insurer, and executive reporting modules
  unitOfValue: Active campus megawatts under managed bridge-power delivery and readiness reporting.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add additional campuses, phases, or generator blocks within the same developer account
    - Expand from owner workflow into owner’s engineer, EPC, lender, and insurer reporting seats on the same project
    - Extend the same data model into permanent microgrid, non-firm-service, and resilience deployments after bridge-power adoption is repeatable
strategyMap:
  northStarMetric: Megawatts of live campus bridge power under production readiness management on the platform.
  inputMetrics:
    - Number of paid live-campus pilots signed
    - Percentage of critical milestones with evidence captured before due date
    - Median days of schedule-risk warning before a slip hits the energization date
    - Paid pilot to annual production conversion rate
    - Production accounts expanding to a second campus or premium reporting module
  moatsToBuild:
    - Cross-project benchmark data on which vendors, equipment classes, and milestones predict first-power delay
    - Regional compliance and readiness libraries linking permit, fuel, FAT, SAT, and utility requirements into one repeatable playbook
    - Embedded multi-party workflow across owner, EPC, OEM, commissioning, and financing stakeholders that is hard to replace once trusted
  killCriteria:
    - Fewer than 3 paid live-campus pilots signed within 12 months of focused ERCOT selling
    - No pilot shows at least 14 days earlier detection of a material schedule risk or a measurable reduction in missed readiness gates before SAT
    - More than half of qualified deals require net-new bespoke workflow configuration that cannot be reduced to the standard 20-80 MW reciprocating-engine template
  mermaid: |
    flowchart LR
      Wedge[ERCOT bridge-power wedge] --> MVP[Neutral commissioning control tower]
      MVP --> Proof[On-time readiness proof and benchmark data]
      Proof --> Expansion[Multi-campus, lender, and microgrid expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong urgency and a credible control-point wedge, but conviction depends on proving deployments stay repeatable enough to avoid becoming a project-controls consultancy.
    whyBelieve: Utility delays, rapid on-site generation adoption, and weak incumbent workflow fit create a real board-level problem with a clear buyer and a data moat if the company becomes the neutral system of record early.
    whyDoubt: The buyer universe is concentrated and project-specific, and it is still unproven that milestone data quality and workflow standardization are good enough to support venture-scale software margins.
    nextDiligence: Verify with live ERCOT-area projects that one standardized pilot can influence first-power decisions, convert to annual software, and reuse the same milestone schema across more than one campus.
  firstCustomer:
    title: VP Power Delivery at an AI campus developer
    profile: A North American developer bringing a new 20-80 MW GPU campus online in ERCOT, with signed or near-signed tenant demand, a 12-24 month utility delay, and multiple OEM and EPC parties coordinating a bridge-power package.
    trigger: A tenant contract, financing close, or internal investment approval depends on a credible first-power date before utility energization.
    buyer: COO or VP Power Delivery
    initialContract: "$75k-$150k paid pilot across one live campus over 4-6 months, converting to about $200k-$350k ARR plus implementation and premium reporting modules if the workflow becomes the standing readiness system."
  mustBeTrue:
    - At least 15-20 beachhead campuses per year face first-power risk severe enough to fund a standalone control layer.
    - A standard milestone schema for 20-80 MW reciprocating-engine programs covers most early pilots without heavy custom services.
    - VP Power Delivery or COO buyers will buy a neutral overlay without requiring replacement of Primavera, Procore, or OEM portals.
    - Pilot customers will permit the company to retain anonymized benchmark data on milestone slips, vendor performance, and commissioning outcomes.
    - Lender, insurer, or executive reporting needs create expansion revenue beyond the initial campus workflow.
  diligenceQuestions:
    - Which developers and owner’s engineers actually control budget when the trigger is a utility delay plus signed tenant demand?
    - How many live bridge-power programs in the 20-80 MW band does a typical beachhead account run in a two-year period?
    - What exact milestone data can be pulled automatically from OEM, EPC, and commissioning systems versus entered manually?
    - Why will Primavera, Procore, InEight, or consultant-led controls teams not satisfy the first customer well enough?
    - How stable is the ERCOT-first thesis if permitting or large-load rules tighten faster than expected?
operatingAssumptions:
  - assumption: ERCOT and Texas provide enough near-term project density and regulatory consistency to support the first 3-5 paying accounts.
    basis: research.yaml
    validationTest: Build a target-account map of 15 qualified ERCOT-area campuses and close at least 3 paid pilots within 12 months without expanding outside the beachhead.
    decisionImpact: If false, widen the initial market to one secondary region sooner or reposition toward owner’s engineers and EPCs as the primary channel.
  - assumption: Buyers will accept a neutral overlay that ingests exports and evidence first, before deep system integrations are complete.
    basis: idea.yaml
    validationTest: Convert 2 live projects to paid pilots using export-based data ingest and manual evidence capture, then confirm weekly operating use by the owner team for at least 8 weeks.
    decisionImpact: If false, the roadmap must shift toward heavier integrations earlier, increasing burn and reducing confidence in pre-seed software margins.
  - assumption: The first repeatable unit of sale is one active campus in a defined MW band, not seats or portfolio-wide enterprise deployment.
    basis: idea.yaml
    validationTest: Test three pricing structures in at least 8 buyer conversations and close 2 pilots where campus-based pricing is accepted without reverting to pure time-and-materials billing.
    decisionImpact: If false, ACV modeling and expansion logic change, and the company may need a services-led model or a portfolio contract motion.
  - assumption: Milestone benchmark data will become materially more valuable after 3-5 live campuses, not only after dozens of projects.
    basis: operator judgment
    validationTest: After the first 3 pilots, show that benchmark views on vendor delay patterns or readiness gaps are actively used in at least 2 executive or lender review meetings.
    decisionImpact: If false, delay analytics and reporting-module investment should be deprioritized in favor of core workflow depth.
  - assumption: Lender and insurer reporting is an expansion lever rather than a day-one primary buyer motion.
    basis: research.yaml
    validationTest: In 6 diligence interviews with infrastructure lenders or underwriters, confirm they value standardized reporting but prefer the owner to be the first contracted customer.
    decisionImpact: If false, product packaging and GTM should shift earlier toward capital-provider workflows and multi-party account acquisition.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 AI campus developers, owner’s engineers, and power-delivery leaders focused on ERCOT bridge-power programs.
    hypothesis: Utility delay plus tenant or financing pressure creates a budgeted, near-term trigger for a neutral readiness system.
    successMetric: At least 10 interviews confirm an active or recent bridge-power workflow and 5 agree to milestone-mapping follow-up sessions.
    owner: CEO
  - horizon: 0–90 days
    experiment: Run a manual workflow audit on one design partner covering generator blocks, permitting steps, FAT, SAT, fuel readiness, and current reporting artifacts.
    hypothesis: One repeatable milestone schema can represent the majority of a 20-80 MW reciprocating-engine bridge-power program.
    successMetric: A design partner accepts a standard template covering at least 80% of milestones without major structural changes.
    owner: Product lead
  - horizon: 0–90 days
    experiment: Prototype export-based ingest from Primavera or Procore plus structured evidence capture from one OEM or commissioning partner.
    hypothesis: The product can create useful readiness reporting before full API integration across every stakeholder system.
    successMetric: One live project dashboard is updated weekly with less than 4 hours of manual admin per project week.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Convert 2 design partners into paid pilots tied to live first-power dates and run weekly executive readiness reviews.
    hypothesis: A live-campus pilot can surface materially earlier schedule-risk signals and justify annual production conversion.
    successMetric: Two paid pilots signed and at least one detects a material readiness risk at least 14 days earlier than the incumbent workflow.
    owner: CEO
  - horizon: 90–180 days
    experiment: Test pilot-to-production pricing and premium reporting packaging with owner teams plus one lender or insurer per pilot.
    hypothesis: Campus-based annual pricing plus a reporting module is easier to defend than seat-based enterprise pricing.
    successMetric: At least 2 buyers accept a written pilot-to-production pricing path and 1 counterparty requests premium reporting outputs.
    owner: CEO
  - horizon: 180–360 days
    experiment: Productize the first compliance library for Texas permits and ERCOT large-load readiness, then deploy it on a second and third campus.
    hypothesis: Regional compliance playbooks can shorten deployment time enough to preserve software margins as the company scales.
    successMetric: Second and third implementations launch in under 4 weeks each with at least 60% reuse of the prior checklist and evidence model.
    owner: Compliance lead
operations:
  - Run weekly campus readiness reviews that reconcile owner, EPC, OEM, commissioning, and permitting milestones against one first-power date.
  - Maintain auditable evidence for permit, FAT, SAT, fuel, and utility-readiness gates so executive and financing stakeholders can trust the status.
  - Standardize the initial product around one reciprocating-engine bridge-power template before supporting broader fuel mixes or project types.
  - Preserve a neutral data model and partner posture so the platform is not captured by any single OEM or EPC.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the milestone data model, integrations, evidence workflow, and risk engine that define the product wedge.
  - role: Product and implementation lead
    startTiming: Month 0
    rationale: Turns messy live-project coordination into repeatable templates and owns pilot success on the first campuses.
  - role: Founder-led GTM
    startTiming: Month 0
    rationale: Needed immediately because the first sales depend on credibility with a small set of senior power-delivery buyers and design partners.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Reduces deployment time by standardizing data ingest from incumbent PM tools and vendor milestone sources.
  - role: Compliance and market expansion lead
    startTiming: Month 8
    rationale: Encodes Texas permitting and ERCOT process knowledge first, then prepares expansion into the next geographic market.
milestones:
  - horizon: 0–12 months
    items:
      - "Sign 3 paid live-campus pilots in the ERCOT beachhead."
      - "Convert at least 2 pilots to annual production deployments tied to active first-power programs."
      - "Standardize one milestone schema and Texas readiness library covering the core 20-80 MW reciprocating-engine workflow."
  - horizon: 12–24 months
    items:
      - "Reach 8-10 production campuses and prove at least one second-campus or premium-reporting expansion inside an existing account."
      - "Launch benchmark reporting on vendor delay patterns, FAT or SAT outcomes, and readiness risk across the first project cohort."
      - "Enter one secondary U.S. market only after compliance templates and deployment timing remain within target."
  - horizon: 24–36 months
    items:
      - "Reach about 20 paying campuses, consistent with the researched year-3 SOM."
      - "Become the default neutral readiness system for a meaningful share of AI campus bridge-power deployments in the initial beachhead."
      - "Expand the same workflow into permanent microgrid and non-firm-service programs without losing template discipline."
risks:
  - risk: Early bridge-power programs remain too bespoke for software templates to capture without heavy services work.
    likelihood: High
    impact: High
    mitigation: Stay in one engine type, MW band, and region first, and track deployment-time thresholds that trigger narrowing rather than broadening scope.
  - risk: OEMs, EPCs, or incumbent PM suites ship good-enough milestone dashboards that blunt willingness to pay for a standalone product.
    likelihood: Medium
    impact: Medium
    mitigation: Win on neutral cross-vendor readiness reporting, executive risk visibility, and benchmark data that single-vendor tools cannot provide.
  - risk: Regulatory or permitting rules tighten, lengthening sales cycles or invalidating some bridge-power plans.
    likelihood: Medium
    impact: High
    mitigation: Encode compliance evidence into the core workflow, begin in Texas where the rules are clearer, and avoid expansion into volatile regions before playbooks exist.
  - risk: Utility lead times improve or buyers decide to wait for the grid rather than fund bridge power.
    likelihood: Low
    impact: Medium
    mitigation: Expand only after proof into permanent microgrid, non-firm-service, and resiliency workflows that use the same commissioning control layer.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds product engineering, two to three design-partner pilots, compliance and solutions capacity for the ERCOT beachhead, and enough founder-led GTM to prove repeatable pilot-to-production conversion before broader geographic expansion.
