- name: Unseenlabs
  stage: scale-up
  wedge: 以暗船和频谱监控为核心场景的无源 RF 海上监视。
  pricing: 定制化企业 / 政府定价；无公开价目。
  strength: 海上定位清晰，围绕 AIS 局限和暗船探测的叙事很强。
  weaknessVsUs: 它仍是数据与探测供应商，而不是由买方掌握的工作流和证据系统。
  sourceRefs:
  - 4
  - 5
- name: Kleos Space
  stage: scale-up
  wedge: 利用编队飞行卫星星座提供 RF 侦察 DaaS 和海事情报产品。
  pricing: 订阅 / DaaS 风格企业定价，未公开披露。
  strength: 有明确的美国海军试验背书，RF 地理定位架构也很明确。
  weaknessVsUs: 规模更小，且仍集中在前链路数据供给，而不是后链路项目工作流。
  sourceRefs:
  - 6
  - 7
- name: Palantir
  stage: incumbent
  wedge: 面向分析、决策支持和任务工作流的广义防务数据操作平台。
  pricing: 定制化多年企业 / 政府合同；价格不公开。
  strength: 认证足迹深、集成范围广，且深受防务买方信任。
  weaknessVsUs: 与专用海上发射源案件层相比，它更通用、也更偏实施导向。
  sourceRefs:
  - 8
  - 10
regulatoryTechnicalConstraints:
- point: 产品必须适配国家级或盟友海事信息共享中心模式，并能经受住对数据来源和运营交接的审查。
  sourceRefs:
  - 13
  - 15
  - 17
- point: 暗船案件常伴随 AIS 关闭、GNSS 操纵、换旗和身份伪装，因此软件必须保留证据链，而不能依赖单一传感器。
  sourceRefs:
  - 22
  - 23
  - 24
- point: 运营价值依赖 RF 与 AIS、SAR、登记信息及规则分析的关联，因此集成负担高于单数据流产品。
  sourceRefs:
  - 10
  - 26
  - 27
validationSignals:
- point: HawkEye 360 报告 2025 年收入为 $117.6M、backlog 为 $302.6M，并完成 $416M IPO，说明底层 RF 数据层确实存在真实的商业和政府需求。
  sourceRefs:
  - 1
- point: 海军以第四个 IPMDA 年度续签 HawkEye 360，合同规模达 $98.8M，证明盟友海上 RF 预算线是持续存在的。
  sourceRefs:
  - 2
- point: NGA 延长了 HawkEye 360 合同，并新增 $2.5M 分析任务单，说明买方想要的不只是原始探测。
  sourceRefs:
  - 25
- point: Quad 区域试点已在东南亚、印度洋和太平洋沿岸国家向海事机构交付商业 RF 数据。
  sourceRefs:
  - 14
openQuestions:
- 到底有多少盟友海上项目可以直接采购一层非密级案件工作流，而不是必须部署在由主承包商或政府托管方持有的认证隔离环境中？
- 哪些 RF 厂商会在合同中允许后链路保存探测历史、分析师标签和模型训练反馈，而不设置锁定性惩罚？
- 在买方把新工具视为冗余之前，有多少工作流可以嵌入既有 SeaVision 或 Palantir 环境中？
- 在产品触及涉密数据上限之前，单个试点能否积累够多的标注发射源结果，从而真正提高告警质量？
