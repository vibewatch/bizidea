slug: commercial-sigint-casework
date: '2026-05-08'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: YYYY-MM
    source: "[BP date] Model starts the first full month after the 2026-05-08 business plan date."
  - id: A2
    name: Starting cash before financing
    value: '250'
    unit: USD K
    source: "Startup-finance heuristic for a pre-seed defense-software company that has covered incorporation and early diligence before the institutional round."
  - id: A3
    name: Pre-seed round closes in M1
    value: '2500'
    unit: USD K
    source: "[BP fundingAsk] Inside the stated $2M-$4M range; sized to reach the end-of-Y2 milestone plus roughly 6 months of buffer."
  - id: A4
    name: Paid pilot contract value
    value: '180'
    unit: USD K per pilot
    source: "[BP gtm.pricing, investorMemo.firstCustomer] Base case uses a conservative in-range pilot price inside the stated $150k-$250k range."
  - id: A5
    name: Production program ACV
    value: '720'
    unit: USD K per year
    source: "[BP market.som, gtm.pricing, research market.som] SOM is based on roughly $700k blended ACV; base case uses $720k to include modest setup or connector revenue while staying inside the stated $500k-$900k production range."
  - id: A6
    name: Recognized monthly revenue per active paying program
    value: '60'
    unit: USD K per month
    source: "[Derived from A4 and A5] A 3-month $180k pilot and a $720k annual production subscription both recognize at about $60k per active program-month."
  - id: A7
    name: Y1 paying-program ramp
    value: 'M1-M6: 0; M7-M9: 1; M10-M12: 2'
    unit: active paying programs
    source: "[BP milestones 0-12 months] Supports 2 paid pilots in year 1 and at least 1 pilot converted to production by month 12."
  - id: A8
    name: Y2-Y3 paying-program ramp
    value: 'Q1Y2: 2; Q2Y2: 3; Q3Y2: 4; Q4Y2: 5; Q1Y3: 5; Q2Y3-Q4Y3: 6'
    unit: customers EOP
    source: "[BP milestones 12-24 months and 24-36 months, BP market.som] Reaches 4-6 production programs in Y2 and the modeled 6-program SOM case in Y3."
  - id: A9
    name: Gross margin ramp
    value: '55% in Y1; 65% in Y2; 72% in Y3'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct, BP operatingAssumptions] Early pilots are more services-heavy; margin reaches the 72% target in Y3 after deployment patterns standardize."
  - id: A10
    name: Founder / CEO loaded compensation
    value: '180'
    unit: USD K annual
    source: "Startup-finance heuristic for founder-led defense-software selling with below-market cash but fully loaded payroll cost."
  - id: A11
    name: Engineering loaded compensation
    value: '210'
    unit: USD K annual per FTE
    source: "Startup-finance heuristic for senior product and integration engineers working in secure B2B software."
  - id: A12
    name: Maritime workflow lead loaded compensation
    value: '200'
    unit: USD K annual per FTE
    source: "[BP team] Domain specialist compensation heuristic for a maritime intelligence workflow expert shaping ontology and evidence-pack logic."
  - id: A13
    name: Forward-deployed engineer loaded compensation
    value: '190'
    unit: USD K annual per FTE
    source: "[BP team] Delivery-heavy engineering compensation heuristic for enclave deployment and partner integration work."
  - id: A14
    name: Customer success / solutions lead loaded compensation
    value: '170'
    unit: USD K annual per FTE
    source: "[BP team] Compensation heuristic for pilot-to-production conversion, enablement, and account expansion support."
  - id: A15
    name: Sales / BD loaded compensation
    value: '220'
    unit: USD K annual per FTE
    source: "Startup-finance heuristic for high-ACV enterprise and defense sales with travel and commission load."
  - id: A16
    name: G&A / ops loaded compensation
    value: '150'
    unit: USD K annual per FTE
    source: "Startup-finance heuristic for finance and operations support in a pre-seed startup."
  - id: A17
    name: Hiring plan basis
    value: 'Founder and founding eng at start; maritime workflow lead by M2; forward-deployed engineer by M6; customer success by M9; second engineer by M7; seller by M14; ops by M16; second FDE by M19; fourth engineer by M25'
    unit: timing
    source: "[BP team, BP milestones] Explicit first-year hires from the plan plus lean follow-on hires added only when needed to support 5 then 6 programs."
  - id: A18
    name: Non-payroll operating spend ramp
    value: '$30K per month in Q1Y1, $36K in Q2Y1, $42K in Q3Y1, $48K in Q4Y1, rising to about $82K by Q4Y3'
    unit: USD K per month
    source: "[BP operations, BP risks, BP fundingAsk.useOfFundsSummary] Covers cloud, travel, legal, insurance, audit logging, and enclave deployment overhead."
  - id: A19
    name: Average sales cycle
    value: '5'
    unit: months
    source: "[BP market.buyingProcess, BP gtm.funnelTargets, research reportMemo.sensitivityCases] Government-integrator buying plus security review makes a sub-quarter close unrealistic in the base case."
  - id: A20
    name: Blended CAC
    value: '250'
    unit: USD K per new production customer
    source: "Startup-finance heuristic anchored to founder-led high-ACV selling, narrow defense pipeline, travel, and long qualification cycles."
  - id: A21
    name: Monthly churn
    value: '1.5'
    unit: percent
    source: "Startup-finance heuristic: sticky mission workflow software should churn slowly, but budget concentration and vendor lock-in risk keep churn above best-in-class SaaS."
  - id: A22
    name: Cash conversion policy
    value: EBITDA approximates operating cash flow
    unit: policy
    source: "Startup-finance heuristic for an early software company with no debt and no material capex or working-capital modeling in the base case."
  - id: A23
    name: Milestone financed by this round
    value: 'Reach 4-5 production programs, 2 standardized deployment patterns, and first mission-platform interoperability by end of Y2'
    unit: milestone
    source: "[BP milestones 12-24 months, BP fundingAsk.useOfFundsSummary] This is the proof package used to size the round and buffer."
