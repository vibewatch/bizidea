scenarios:
  downside:
    description: "Security reviews slip, pilots convert later, and the company exits Y3 with only five active programs."
    y3RevenueK: 3240.0
    y3EbitdaK: -640.0
    cashLowPointK: -220.0
    keyAssumptionChanges:
      - "Sales cycle stretches from 5 months to 8 months."
      - "Paid-pilot-to-production conversion falls below the BP target to roughly 35%."
      - "Y3 customer ramp lands at 4, 4, 5, 5 instead of 5, 6, 6, 6."
  base:
    description: "Two Y1 paid pilots seed a steady attach-sale motion that reaches six active paying programs by Q2Y3."
    y3RevenueK: 4140.0
    y3EbitdaK: -107.2
    cashLowPointK: 744.0
    keyAssumptionChanges:
      - "Production ACV stays near $720k blended with no aggressive upsell assumption."
      - "Gross margin reaches the BP target only in Y3 after deployment patterns standardize."
      - "Hiring remains lean until Y2 proof rather than front-loading a large sales team."
  upside:
    description: "Pilot conversion stays above plan and two integrator accounts add second programs a quarter earlier than the base case."
    y3RevenueK: 5040.0
    y3EbitdaK: 420.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - "Sales cycle compresses to about 4 months through partner-led entry."
      - "Paid-pilot-to-production conversion holds above 60%."
      - "Y3 customer ramp reaches 6, 7, 7, 8 active programs across the four quarters."
sensitivity:
  - variable: ARPU
    downsideCase: "$650K blended annual revenue per production program"
    baseCase: "$720K blended annual revenue per production program"
    upsideCase: "$800K blended annual revenue per production program"
    y3RevenueImpactK: -402.0
    cashImpactK: -322.0
  - variable: CAC
    downsideCase: "$320K CAC because partner-led access does not materialize"
    baseCase: "$250K CAC"
    upsideCase: "$200K CAC with better co-sell leverage"
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
  - variable: churn
    downsideCase: "2.5% monthly churn from program budget turnover"
    baseCase: "1.5% monthly churn"
    upsideCase: "1.0% monthly churn"
    y3RevenueImpactK: -240.0
    cashImpactK: -180.0
  - variable: sales cycle
    downsideCase: "8 months because accreditation and contract routing drag"
    baseCase: "5 months"
    upsideCase: "4 months through integrator-led contracting"
    y3RevenueImpactK: -720.0
    cashImpactK: -650.0
  - variable: gross margin
    downsideCase: "67% gross margin because deployments stay bespoke"
    baseCase: "72% gross margin"
    upsideCase: "75% gross margin with repeatable connectors"
    y3RevenueImpactK: 0.0
    cashImpactK: -207.0
  - variable: hiring pace
    downsideCase: "Add seller and second forward-deployed engineer 2 quarters earlier"
    baseCase: "Hire to the modeled proof milestones"
    upsideCase: "Delay the final engineer until after the sixth program is live"
    y3RevenueImpactK: 0.0
    cashImpactK: -250.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ActivePrograms
      ActivePrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from two Y1 pilots compounding into five active programs by Q4Y2 and six by Q2Y3 at roughly $60K of monthly revenue per active program."
  - checkName: Must go right
    finding: "The company has to standardize enclave deployment fast enough that pilot-to-production conversion stays at or above the BP's 50%+ target without turning the product into custom services."
  - checkName: Model breaks if
    finding: "If security review and procurement push the sales cycle toward eight months, the downside case sends cash below zero before the Y2 milestone is fully proved."
  - checkName: Next-round proof
    finding: "The next financing is justified once the company shows 4-5 production programs, two repeatable deployment patterns, and a credible path to six live programs without a large sales-team step-up."
sanityChecks:
  ruleOf40: "Y3 growth 64% + EBITDA margin -3% = 61%."
  burnMultiple: "Y2 burn multiple is about 0.4x ($868K EBITDA burn on $1.98M net new revenue), improving toward near-breakeven in Y3."
  revenuePerFte: "$376K Y3 using Q4Y3 11 FTE (benchmark $200-$400K B2B software)."
  flags:
    - "Base case still depends on only six total programs, so one slipped conversion or non-renewal removes roughly $720K of annual revenue."
    - "Gross margin does not reach the 72% target until Y3 because enclave deployment and evidence-pack setup remain delivery-heavy through Y2."
    - "Cash is modeled from EBITDA and does not include working-capital swings or unusual security-accreditation capex, so real runway could be somewhat shorter."
