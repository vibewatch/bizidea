problem: >-
  Commercial RF intelligence is becoming easier to buy, but most program teams still do the hard work of interpreting detections, validating emitter identity, and packaging findings in spreadsheets, slide decks, and one-off scripts. For maritime surveillance programs, every new emitter, anomaly, or movement requires analysts to reconcile raw detections with mission context before anyone can act. That slows alerts, burns scarce RF expertise, and makes it hard for integrators and government buyers to prove the value of their commercial SIGINT spend.
targetUser:
  primary: Lead intelligence analyst or mission product manager at a maritime surveillance integrator using commercial RF detections for one allied coast-guard or navy program
  secondary: Mission systems engineer maintaining emitter libraries, thresholds, and analyst workflows
  buyer: VP ISR Programs or program manager responsible for a coastal surveillance deliverable that already includes commercial RF data spend
startupThesis:
  nonObviousInsight: The bottleneck is no longer collecting RF signals from space; it is converting growing volumes of commercial detections into mission-trusted casework that operators, primes, and government customers can act on and audit.
  beachhead: Maritime ISR integrators supporting one allied coast-guard or navy coastal-surveillance program that already licenses commercial RF detections but still triages emitters manually
  wedge: A casework layer that turns raw commercial RF detections into persistent emitter libraries, explainable anomaly alerts, and shareable evidence packs for one monitored coastline or chokepoint
  whyNowCatalyst: HawkEye 360's IPO, first-day share surge, and planned constellation expansion show commercial RF SIGINT has crossed from niche capability into a growing data layer that now needs workflow software on top.
  ventureScalePath: Start with maritime emitter casework, then expand into land-border monitoring, EW and jamming incident analysis, multi-sensor intelligence fusion, and eventually the operating layer that helps allies buy, validate, and operationalize commercial sensing feeds across programs.
solution: >-
  The product sits above commercial RF data providers and gives each program a mission-specific workspace for known emitters, anomalies, and analyst decisions. It automatically groups repeated detections into persistent entities, flags movement or behavior changes that matter to the program, and records why an alert was promoted or dismissed. Analysts can publish case-ready outputs for commanders, primes, or government customers without rebuilding the narrative each time from raw detections. Over time, the system becomes the source of truth for emitter histories, decision logic, and measurable program outcomes tied to commercial SIGINT.
goToMarketSeed:
  firstCustomer: A 200-800 person maritime surveillance integrator delivering coastal ISR software for one European or Indo-Pacific allied coast guard and already evaluating HawkEye-style RF feeds
  buyingTrigger: Contract award, pilot, or renewal that adds commercial RF data into an existing coastal-surveillance workflow and exposes the need to operationalize detections quickly
  currentAlternative: Manual analyst workflow plus internal Python scripts on top of provider dashboards and spreadsheet-based emitter logs
  switchingReason: The casework layer cuts analyst hours, creates cleaner audit trails, and turns raw detections into repeatable deliverables without the customer hiring a larger RF analysis team
  pricingHypothesis: Annual platform fee per monitored program or theater plus usage-based pricing by active emitter libraries, alert volume, and analyst seats
