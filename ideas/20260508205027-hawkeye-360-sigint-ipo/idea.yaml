topRisks:
  - name: Provider dependency
    description: If one or two RF vendors control too much of the data supply, they could squeeze downstream workflow startups or launch similar tooling.
    mitigation: Build multi-provider connectors early, own the analyst workflow and audit layer, and make customer value portable across data sources.
  - name: Government adoption drag
    description: Direct ministry sales can be slow, which can stall revenue even if users like the product.
    mitigation: Start through integrators and primes that already hold program contracts and can buy workflow software against existing budgets.
  - name: Analyst trust gap
    description: RF analysts may reject automated grouping or alert scoring if the system feels like a black box.
    mitigation: Ship human-in-the-loop review, transparent confidence explanations, and narrow initial deployments around one emitter class or coastline.
