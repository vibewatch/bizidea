differentiator: >-
  HawkEye and peers own collection infrastructure; generic intel tools own broad dashboards. This company would own the mission-specific interpretation layer between them: persistent emitter libraries, analyst decision history, and case-ready outputs tuned to one surveillance program's thresholds and reporting chain. That workflow data compounds into defensibility because every confirmed emitter, dismissed alert, and published case improves the customer's operating model and is hard to recreate inside a spreadsheet stack.
