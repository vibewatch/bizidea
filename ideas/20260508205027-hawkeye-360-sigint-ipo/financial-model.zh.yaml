scenarios:
  downside:
    description: 安全审查延后，试点转生产更慢，公司到 Y3 结束时仅有 5 个活跃项目。
    y3RevenueK: 3240.0
    y3EbitdaK: -640.0
    cashLowPointK: -220.0
    keyAssumptionChanges:
    - 销售周期从 5 个月拉长到 8 个月。
    - 付费试点转生产比例跌到 BP 目标以下，降至约 35%。
    - Y3 客户爬坡从 5、6、6、6 变为 4、4、5、5。
  base:
    description: Y1 的 2 个付费试点带动稳定的附着式销售，到 Q2Y3 达到 6 个活跃付费项目。
    y3RevenueK: 4140.0
    y3EbitdaK: -107.2
    cashLowPointK: 744.0
    keyAssumptionChanges:
    - 生产 ACV 维持在约 $720k 的综合水平，不假设激进增购。
    - 毛利率要到 Y3 才达到 BP 目标，因为部署模式标准化需要时间。
    - 在 Y2 证明跑顺前，团队始终保持精简，而不是提前堆大销售队伍。
  upside:
    description: 试点转生产持续好于计划，且有 2 个集成商账户比基准情景提前一个季度赢下第二个项目。
    y3RevenueK: 5040.0
    y3EbitdaK: 420.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
    - 借助伙伴主导切入，销售周期压缩到约 4 个月。
    - 付费试点转生产比例稳定高于 60%。
    - Y3 客户爬坡达到 6、7、7、8 个活跃项目。
sensitivity:
- variable: ARPU
  downsideCase: $650K 的综合生产项目年收入
  baseCase: $720K 的综合生产项目年收入
  upsideCase: $800K 的综合生产项目年收入
  y3RevenueImpactK: -402.0
  cashImpactK: -322.0
- variable: CAC
  downsideCase: CAC 为 $320K，因为伙伴主导获客未能实现
  baseCase: CAC 为 $250K
  upsideCase: 在联合销售杠杆更好的情况下，CAC 为 $200K
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
- variable: 流失率
  downsideCase: 由于项目预算轮换，月流失率升至 2.5%
  baseCase: 月流失率 1.5%
  upsideCase: 月流失率 1.0%
  y3RevenueImpactK: -240.0
  cashImpactK: -180.0
- variable: 销售周期
  downsideCase: 因认证与合同流转拖慢，销售周期变为 8 个月
  baseCase: 销售周期 5 个月
  upsideCase: 借助集成商主导签约，销售周期 4 个月
  y3RevenueImpactK: -720.0
  cashImpactK: -650.0
- variable: 毛利率
  downsideCase: 由于部署仍然高度定制，毛利率仅 67%
  baseCase: 毛利率 72%
  upsideCase: 依靠能复用连接器，毛利率 75%
  y3RevenueImpactK: 0.0
  cashImpactK: -207.0
- variable: 招聘节奏
  downsideCase: 提前 2 个季度招聘销售和第二名前置工程师
  baseCase: 按模型中的验证里程碑招聘
  upsideCase: 把最后一名工程师延后到第 6 个项目发布之后再招
  y3RevenueImpactK: 0.0
  cashImpactK: -250.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  TargetAccounts[目标账户] --> PaidPilots[付费试点]\n  PaidPilots --> ActivePrograms[活跃项目]\n  ActivePrograms --> Revenue[收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入来自 Y1 的 2 个试点，逐步滚动到 Q4Y2 的 5 个活跃项目和 Q2Y3 的 6 个活跃项目；每个活跃项目月收入约为 $60K。
- checkName: 必须做对的事
  finding: 公司必须够快地把隔离环境部署标准化，才能在不把产品做成定制服务的前提下，把试点转生产率稳定在 BP 设定的 50%+。
- checkName: 模型失效条件
  finding: 如果安全审查和采购把销售周期推向 8 个月，下行情景会在 Y2 里程碑完全验证前把现金打到 0 以下。
- checkName: 下一轮融资证明
  finding: 只要公司证明自己赢下了 4-5 个生产项目、两套能复用部署模式，并在不大幅扩充销售团队的前提下展现出通往 6 个在运项目的可信路径，下一轮融资就有充分依据。
sanityChecks:
  ruleOf40: Rule of 40：Y3 增长 64% + EBITDA 利润率 -3% = 61%。
  burnMultiple: Y2 的 burn multiple 约为 0.4x（$868K EBITDA 亏损对应 $1.98M 新增净收入），到 Y3 逐步逼近盈亏平衡。
  revenuePerFte: 按 Q4Y3 的 11 名 FTE 计算，Y3 的每名员工收入为 $376K（对标 B2B 软件的 $200-$400K）。
  flags:
  - 基准情景仍只依赖 6 个总项目，因此任何 1 个转化延期或不续约，都会抹去约 $720K 年收入。
  - 由于隔离环境部署和证据包配置在 Y2 仍偏交付驱动，毛利率要到 Y3 才达到 72% 目标。
  - 现金按 EBITDA 近似建模，没有纳入营运资本波动或很规安全认证资本开支，因此真实跑道可能略短。
