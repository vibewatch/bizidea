slug: commercial-sigint-casework
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date] 模型从 2026-05-08 商业计划日期后的第一个完整月份开始。'
- id: A2
  name: 融资前起始现金
  value: '250'
  unit: USD K
  source: 面向 pre-seed 防务软件公司的创业财务经验值：已覆盖注册和机构轮前的早期尽调成本。
- id: A3
  name: Pre-seed 轮在 M1 完成
  value: '2500'
  unit: USD K
  source: '[BP fundingAsk] 取自 $2M-$4M 区间内部；规模足以支撑到 Y2 末里程碑，并额外留出约 6 个月缓冲。'
- id: A4
  name: 付费试点合同金额
  value: '180'
  unit: USD K per pilot
  source: '[BP gtm.pricing, investorMemo.firstCustomer] 基准情景采用区间内偏保守的试点价格，位于 $150k-$250k 范围内。'
- id: A5
  name: 生产项目 ACV
  value: '720'
  unit: USD K per year
  source: '[BP market.som, gtm.pricing] SOM 基于约 $700k 的综合 ACV；基准情景采用 $720k，以纳入适度的实施/连接器收入，同时仍落在 $500k-$900k 的生产定价范围内。'
- id: A6
  name: 每个活跃付费项目的月确认收入
  value: '60'
  unit: USD K per month
  source: '[Derived from A4 and A5] 3 个月 $180k 的试点与 $720k 的年度生产订阅，折算后每个活跃项目月确认收入都约为 $60k。'
- id: A7
  name: Y1 付费项目爬坡
  value: 'M1-M6: 0; M7-M9: 1; M10-M12: 2'
  unit: active paying programs
  source: '[BP milestones 0-12 months] 支撑第 1 年 2 个付费试点，并在第 12 个月前至少有 1 个试点转生产。'
- id: A8
  name: Y2-Y3 付费项目爬坡
  value: 'Q1Y2: 2; Q2Y2: 3; Q3Y2: 4; Q4Y2: 5; Q1Y3: 5; Q2Y3-Q4Y3: 6'
  unit: customers EOP
  source: '[BP milestones 12-24 months and 24-36 months, BP market.som] 在 Y2 达到 4-6 个生产项目，并在 Y3 达到 6 个在运项目。'
- id: A9
  name: 毛利率爬坡
  value: 55% in Y1; 65% in Y2; 72% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 早期试点服务成分更重；随着部署模式标准化，毛利率在 Y3 达到 72% 目标。'
- id: A10
  name: 创始人 / CEO 全成本薪酬
  value: '180'
  unit: USD K annual
  source: 创业财务经验值：创始人亲自打单的防务软件公司，现金薪酬低于市场，但按全成本工资口径计入。
- id: A11
  name: 工程师全成本薪酬
  value: '210'
  unit: USD K annual per FTE
  source: 创业财务经验值：面向安全 B2B 软件的高级产品/集成工程师。
- id: A12
  name: 海事工作流负责人全成本薪酬
  value: '200'
  unit: USD K annual per FTE
  source: '[BP team] 领域专家薪酬经验值，适用于塑造发射源本体与证据包逻辑的海事情报工作流专家。'
- id: A13
  name: 前置工程师全成本薪酬
  value: '190'
  unit: USD K annual per FTE
  source: '[BP team] 以交付为重的工程薪酬经验值，适用于隔离环境部署与伙伴集成工作。'
- id: A14
  name: 客户成功 / 解决方案负责人全成本薪酬
  value: '170'
  unit: USD K annual per FTE
  source: '[BP team] 适用于试点转生产、赋能与账户扩张支持的薪酬经验值。'
- id: A15
  name: 销售 / BD 全成本薪酬
  value: '220'
  unit: USD K annual per FTE
  source: 创业财务经验值：适用于高-ACV 企业 / 防务销售，含出差与佣金负担。
- id: A16
  name: G&A / 运营全成本薪酬
  value: '150'
  unit: USD K annual per FTE
  source: 创业财务经验值：适用于 pre-seed 创业公司的财务 / 运营支持。
- id: A17
  name: 招聘节奏依据
  value: "创始人与创始工程师从第 0 个月加入；海事工作流负责人在第 2 个月到位；前置工程师在第 6 个月到位；客户成功在第 9 个月到位；第二名工程师在第 7 个月到位；销售在第 14 个月到位；运营在第 16 个月到位；第二名前置工程师在第 19 个月到位；第四名工程师在第 25 个月到位"
  unit: timing
  source: '[BP team] 前 1 年招聘来自计划中的明确配置；后续人员只在需要支持 5 个、再到 6 个项目时才增加。'
- id: A18
  name: 非薪资经营开支爬坡
  value: "每月 $30K（Q1Y1），$36K（Q2Y1），$42K（Q3Y1），$48K（Q4Y1），至 Q4Y3 时升至约 $82K"
  unit: USD K per month
  source: '[BP operations, risks, fundingAsk.useOfFundsSummary] 覆盖云成本、差旅、法务、保险、审计日志与隔离环境部署开销。'
- id: A19
  name: 平均销售周期
  value: '5'
  unit: months
  source: '[BP market.buyingProcess, gtm.funnelTargets, research adoptionFrictionMatrix] 政府 / 集成商采购叠加安全审查，使得基准情景下在一个季度内成单并不现实。'
- id: A20
  name: 综合 CAC
  value: '250'
  unit: USD K per new production customer
  source: 创业财务经验值：基于创始人主导的高 ACV 销售、狭窄防务管道、差旅和较长资格验证周期。
- id: A21
  name: 月度流失率
  value: '1.5'
  unit: percent
  source: 创业财务经验值：任务工作流软件本应较黏，但预算集中和供应商锁定风险让流失率高于顶级 SaaS。
- id: A22
  name: 现金转换政策
  value: EBITDA 近似代表经营现金流
  unit: policy
  source: 创业财务经验值：对于无债务、且基准情景中未建模重大资本开支或营运资本波动的早期软件公司，EBITDA 可近似视为经营现金流。
- id: A23
  name: 本轮资金覆盖的里程碑
  value: 在 Y2 末前达到 4–5 个生产项目、2 种标准化部署模式，以及首条任务平台互操作路径
  unit: milestone
  source: '[BP milestones 12-24 months, fundingAsk.useOfFundsSummary] 这是本轮融资定额与缓冲的核心验证包。'
