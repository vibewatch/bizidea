slug: commercial-sigint-casework
date: '2026-05-08'
executiveSummary: >-
  HawkEye 360's IPO, $117.6M of 2025 revenue, $302.6M backlog, 61% U.S.
  government revenue mix, and renewed $98.8M Navy IPMDA contract show that
  commercial RF SIGINT is now a real procurement layer rather than an
  experiment. The gap is downstream: allied maritime programs still turn RF,
  AIS, SAR, and registry clues into actionable cases through provider portals,
  spreadsheets, and analyst scripts that do not preserve a trusted evidentiary
  chain. The proposed company sells a buyer-side casework layer for maritime
  ISR integrators that already license RF detections and need persistent
  emitter libraries, human-reviewed anomaly workflows, and audit-ready evidence
  packs. The first customer is a 200-800 person integrator supporting one
  Indo-Pacific or European coastal-surveillance program, because that buyer
  already has the budget line, the program trigger, and the delivery burden
  when commercial RF feeds are added or renewed. The company should enter as an
  attach sale inside an existing contract vehicle, not as a rip-and-replace
  mission platform. Research supports a narrow but credible beachhead with an
  estimated $38.5M SAM and a year-3 SOM of about $4.2M if the company reaches
  six production programs at roughly $700k ACV. The deliberate sequencing is to
  prove a 30-50% reduction in analyst time-to-case for one reporting workflow,
  then expand into cross-program templates and adjacent sanctions, border, or EW
  investigations that reuse the same case-management core. The main unresolved
  gaps are downstream data-rights terms, how often buyers will approve
  persistent adjudication history in third-party software, and whether enclave
  deployment can stay standardized enough to preserve software margins.
problem:
  - Maritime surveillance programs that already buy commercial RF detections still spend scarce analyst time turning raw events into trusted emitter cases, prioritized alerts, and customer-ready outputs.
  - Existing provider portals, common operating pictures, and in-house scripts do not preserve program-specific adjudication history or auditable evidence chains across coalition and interagency handoffs.
solution:
  - Deliver an enclave-ready casework workspace that ingests RF plus AIS context, groups detections into persistent emitter records, routes anomalies for human review, and records why each alert was promoted or dismissed.
  - Export evidence packs that combine RF, AIS, SAR, registry context, and analyst decisions for commanders, primes, and government customers without rebuilding the narrative from scratch each reporting cycle.
whyWeWin:
  - The company sits in the unowned layer between RF data vendors and broad mission platforms, so it can attach to existing programs without asking the buyer to replace upstream collection or the current common operating picture.
  - Program-specific emitter libraries, false-positive outcomes, and audit logs compound into sticky buyer-owned workflow data that is hard for spreadsheets, services teams, or vendor portals to recreate.
strategicChoices:
  beachhead: Indo-Pacific and European maritime ISR integrators supporting one allied coast guard or navy coastal-surveillance program that already uses commercial RF detections and still adjudicates emitters manually.
  wedgeRationale: This beachhead has the clearest budget trigger because RF data is already funded and the operational pain appears as soon as a program adds or renews the feed. Going broader into direct ministry sales, generic fusion software, or all-domain ISR would lengthen accreditation, blur the product, and slow proof of a repeatable attach motion.
  sequencingRationale: >-
    Start as a casework overlay for one coastline or chokepoint so the company
    can prove faster detection-to-case and stronger evidence trails without
    replacing the awareness dashboard. Once one program trusts the stored
    emitter history and evidence exports, add multi-vendor ingestion,
    interoperability with mission platforms, and cross-program templates, then
    expand into adjacent investigations that share the same workflow core.
    Hiring follows the same order: founder-led sales and delivery first,
    forward-deployed engineering second, and repeatable go-to-market only after
    pilot-to-production conversion is real.
  notYet:
    - Selling a new common operating picture or general-purpose defense data platform.
    - Going direct to ministries of defense before proving integrator-led deployments.
    - Expanding into land-border, sanctions, or EW workflows before maritime casework is repeatable.
    - Shipping black-box fully automated alerting that analysts cannot review or explain.
market:
  tam: Estimated TAM $180.0M based on roughly 180 allied maritime, border, and EW programs at about $1.0M annual casework software spend.
  sam: Estimated SAM $38.5M based on roughly 55 Europe and Indo-Pacific maritime programs or integrator-managed deployments already near commercial RF adoption at about $700k ACV.
  som: Estimated year-3 SOM $4.2M based on 6 live production programs at about $700k ACV sold as a workflow attach under existing RF and analytics budgets.
  segments:
    - Maritime ISR integrators and prime-led coastal-surveillance programs already using commercial RF feeds
    - Coast guard, navy, and regional fusion-center teams that need auditable dark-vessel and anomaly casework
  buyingProcess: A lead analyst, mission product manager, or mission systems engineer usually feels the workflow pain first when a program adds or renews commercial RF data. Budget authority then moves to the ISR program manager or VP-level program owner, who can buy the product as an attach line inside an existing delivery contract if the pilot shortens reporting cycles and produces customer-accepted evidence packs.
product:
  mvp: The MVP is an enclave-ready overlay for one monitored coastline or chokepoint that ingests one to two RF feeds plus AIS, creates persistent emitter records, provides a human review queue, and exports an evidence pack for one reporting chain. It should integrate with the existing dashboard or mission platform rather than replace the common operating picture.
  sixMonth: Ship one live pilot with RF ingestion, AIS correlation, human-reviewed anomaly handling, audit logging, and measurable time-to-case reporting for a single maritime program.
  twelveMonth: Add reusable emitter taxonomies, cross-case search, role-based audit trails, and one interoperability path into a SeaVision-, Palantir-, or integrator-owned mission environment.
  twentyFourMonth: Become a multi-program system of record for emitter histories, evidence templates, and benchmarked workflow metrics, then extend the same core into sanctions, border, or EW investigations.
  keyBets:
    - Buyers will fund a workflow layer without requiring the company to own the front-end operating picture.
    - One maritime emitter-case ontology can serve multiple allied programs with configuration rather than bespoke engineering.
    - Evidence-pack quality and stored adjudication history will matter enough to overcome analyst skepticism about automated grouping.
    - Two to three connector patterns can cover most early opportunities and keep deployment effort within software-like bounds.
gtm:
  wedge: Sell a paid pilot to one maritime ISR integrator standing up or renewing an allied coastal-surveillance program that has already budgeted commercial RF data, then convert to an annual per-program subscription once the team reuses emitter history and evidence packs across a second reporting cycle.
  channels:
    - Direct founder-led sales to ISR program managers, mission product leads, and lead analysts at maritime integrators
    - Co-sell and referral partnerships with RF and adjacent maritime-data vendors whose feeds need stronger downstream operationalization
    - Deployment partnerships with enclave hosts and mission-platform teams already approved inside allied maritime programs
  funnelTargets: "12-18 target accounts per year, discovery-to-qualified-pilot 25-35%, qualified-pilot-to-paid-pilot 35-45%, paid-pilot-to-production 50%+, and production-to-second-program expansion 30%+ within 12 months."
  pricing: Paid pilots should price at $150k-$250k for one monitored program, converting to about $500k-$900k annual recurring revenue per production program, because the buyer is funding mission output, auditability, and analyst time savings inside an existing RF budget line rather than buying seats or a new command-center platform.
businessModel:
  revenueStreams:
    - Paid pilots for one maritime surveillance program or monitored theater
    - Annual software subscriptions priced per active production program
    - Setup and integration fees for new data connectors, enclave deployments, and evidence templates
    - Expansion revenue from additional programs and adjacent investigation modules
  unitOfValue: One active maritime surveillance program using the casework layer
  targetGrossMarginPct: 72
  expansionLevers:
    - Add more monitored coastlines, chokepoints, or programs inside the same integrator account
    - Upsell benchmark reporting, reusable evidence templates, and shared emitter libraries across teams
    - Extend the same workflow core into sanctions, border, and EW investigations once maritime casework is trusted
strategyMap:
  northStarMetric: Number of production programs that reuse stored emitter history and evidence packs across consecutive reporting cycles.
  inputMetrics:
    - Median time from RF detection to analyst-approved case
    - Paid-pilot-to-production conversion rate
    - Percentage of resolved alerts that reference an existing emitter record
    - Number of evidence packs exported per active program
    - Average deployment effort per new account
  moatsToBuild:
    - Program-specific emitter libraries and adjudication histories across multiple allied programs
    - Buyer-trusted evidence-pack templates and audit trails that survive coalition handoffs
    - Multi-vendor interoperability across RF, AIS, SAR, registry, and mission-platform inputs
  killCriteria:
    - Fewer than 2 paid pilots signed in the first 12 months of focused integrator-led selling
    - Paid-pilot-to-production conversion below 30% after the first 4 pilots
    - Average onboarding remains above 8 engineer-weeks per account after the third deployment
    - Buyers refuse to store adjudication history or use exported evidence packs in live reporting workflows
  mermaid: |
    flowchart LR
      Wedge[Integrator-led maritime casework wedge] --> MVP[Emitter library and evidence-pack MVP]
      MVP --> Proof[Faster analyst-approved cases and reused reports]
      Proof --> Expansion[Multi-program workflow system of record]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Clear wedge and budget attach logic, but conviction remains conditional on proving standardized enclave deployment and durable differentiation from vendor portals.
    whyBelieve: The company addresses a specific workflow bottleneck created by rising commercial RF adoption and can attach to existing maritime ISR budgets without replacing the upstream data layer.
    whyDoubt: The beachhead is concentrated, substitute products are credible, and the business breaks if deployments become bespoke services or if buyers cannot retain derived casework data.
    nextDiligence: Verify with 10-15 target integrators and program owners that a paid pilot for adjudication workflow can be purchased inside an existing contract vehicle and converted after one live reporting cycle.
  firstCustomer:
    title: Maritime ISR program manager at an allied coastal-surveillance integrator
    profile: A 200-800 person integrator delivering one Indo-Pacific or European coastal-surveillance workflow that already combines commercial RF detections with analyst review and an existing mission dashboard.
    trigger: A new award, renewal, or RF-feed expansion creates a backlog of manual emitter triage and higher pressure to produce customer-accepted evidence for dark-vessel or anomaly investigations.
    buyer: VP ISR Programs or maritime program manager
    initialContract: $150k-$250k pilot for one monitored program, converting to $500k-$900k annual software once the same team reuses stored cases and evidence packs across a second reporting cycle or adjacent theater.
  mustBeTrue:
    - At least 5 of the first 10 target integrators confirm that RF-to-case workflow pain is current, budgeted, and not solved by existing portals or scripts.
    - At least 2 design partners approve persistent storage of analyst labels, adjudication history, and derived emitter records in an approved environment.
    - At least 50% of paid pilots convert to production because customers reuse prior cases and evidence packs in live reporting.
    - Two connector and deployment patterns cover more than 60% of qualified first-year opportunities without bespoke re-architecture.
    - At least 2 production customers request one adjacent investigation workflow before first renewal.
  diligenceQuestions:
    - Which output gets paid for today: faster alert triage, reusable emitter library, audit trail, or customer-ready evidence pack?
    - How often can an integrator buy this product inside an existing contract vehicle without waiting for a new ministry procurement line?
    - What data-rights terms govern storage of detections, analyst labels, and derived histories in a third-party workflow layer?
    - Can the product remain an overlay, or will buyers eventually require native workflow inside SeaVision-, Palantir-, or prime-owned environments?
    - What minimum security posture is required to move from pilot to production across allied programs?
  riskHeatmap:
    - risk: Security accreditation and enclave deployment slow time to value.
      likelihood: High
      impact: High
      leadingIndicator: More than half of qualified prospects require multi-month security review before a pilot can ingest real program data.
      mitigation: Start in customer or integrator enclaves, keep the MVP to one reporting workflow, and avoid front-end replacement before proving ROI.
    - risk: RF vendors or mission platforms bundle enough workflow features to compress pricing.
      likelihood: Medium
      impact: High
      leadingIndicator: Prospects increasingly compare the product to new vendor portal features and decline to fund a standalone casework layer.
      mitigation: Lead with multi-vendor interoperability, buyer-owned adjudication history, and portable evidence packs that bundled portals do not naturally provide.
    - risk: Analysts do not trust automated grouping or alert scoring.
      likelihood: Medium
      impact: High
      leadingIndicator: Pilot users override most suggested entity matches and do not reuse stored case histories in the next reporting cycle.
      mitigation: Keep a human-in-the-loop review model, expose confidence and source context, and narrow the first ontology to one emitter class or coastline.
    - risk: Early deployments become custom integration projects with weak software margins.
      likelihood: Medium
      impact: High
      leadingIndicator: Average onboarding effort stays above 8 engineer-weeks and each pilot requires custom connectors or evidence formats.
      mitigation: Standardize the first connector paths, price setup separately from software, and decline bespoke work that does not improve the repeatable product.
    - risk: The maritime beachhead is too narrow for venture-scale expansion.
      likelihood: Medium
      impact: Medium
      leadingIndicator: Fewer than 20 qualified Europe or Indo-Pacific beachhead programs remain after initial design-partner discovery.
      mitigation: Expand only after maritime proof into sanctions, border, or EW workflows that reuse the same case-management core.
operatingAssumptions:
  - assumption: Maritime integrators can fund a paid pilot from an existing RF or analytics budget when a program adds or renews commercial RF data.
    basis: research.yaml
    validationTest: Close 2 paid pilots inside existing contract vehicles without waiting for a new ministry procurement line.
    decisionImpact: If false, the company must rely on slower direct-government cycles or deeper vendor channel dependence.
  - assumption: Customers will allow persistent storage of analyst labels, adjudication history, and derived emitter records in a third-party workflow layer.
    basis: research.yaml
    validationTest: Obtain written approval or security signoff from 2 design partners that covers data retention and derived-record ownership.
    decisionImpact: If false, the moat weakens and the product becomes a lower-retention transient overlay.
  - assumption: One enclave-first deployment pattern can satisfy most early allied programs without custom platform architecture each time.
    basis: operator judgment
    validationTest: Deliver the first 3 pilots using a shared deployment pattern and keep implementation below 8 engineer-weeks per account.
    decisionImpact: If false, gross margin and sales velocity deteriorate, forcing a narrower ICP or a services-heavy model.
  - assumption: Buyers will pay $500k-$900k annually once the workflow is reused across reporting cycles because that price is small relative to RF program budgets and analyst labor.
    basis: idea.yaml
    validationTest: Convert at least 2 pilots into annual subscriptions at or above the proposed range within 12 months of pilot completion.
    decisionImpact: If false, the company needs lower-ACV packaging, heavier partner distribution, or a different initial workflow.
  - assumption: The same casework architecture can expand beyond coastal surveillance into sanctions, border, or EW investigations.
    basis: research.yaml
    validationTest: In the first 6 production deployments, at least 3 customers request one adjacent workflow before renewal.
    decisionImpact: If false, investors should underwrite the company as a niche maritime workflow business rather than a broader defense workflow platform.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12-15 maritime ISR integrators, lead analysts, and program managers and collect current casework artifacts.
    hypothesis: The first budgeted pain is manual RF-to-case workflow and evidence-pack creation, not raw data access alone.
    successMetric: At least 8 interviews rank adjudication workflow or evidence-pack creation as a top-3 pain and 3 accounts share a current artifact or process map.
    owner: CEO
  - horizon: 0–90 days
    experiment: Manually produce one sample emitter case and evidence pack on top of an existing RF feed, AIS context, and analyst notes.
    hypothesis: Buyers will judge value first on whether the output is reporting-ready and reusable before they demand full automation.
    successMetric: 3 design partners say the sample output is materially better than current slideware or spreadsheets and agree to scope a pilot.
    owner: Founding product lead
  - horizon: 90–180 days
    experiment: Build the first enclave-ready pilot with one RF connector, AIS correlation, human review queue, and exportable evidence pack.
    hypothesis: A narrow overlay can prove value without replacing the program's existing dashboard or mission platform.
    successMetric: One paid pilot goes live and reduces median time from detection to approved case by at least 30%.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test a second connector path into either another RF vendor or an existing mission-platform environment.
    hypothesis: Two connector patterns are enough to cover most first-year opportunities and defend against supplier concentration.
    successMetric: More than 60% of qualified pipeline fits one of the two supported deployment patterns.
    owner: Founding eng
  - horizon: 180–365 days
    experiment: Run two paid pilots through one full reporting cycle and track reuse of stored emitter history and evidence-pack templates.
    hypothesis: Customers convert to annual software only when prior adjudication decisions materially reduce future analyst effort.
    successMetric: At least one pilot converts to production and more than 40% of resolved alerts reference a prior emitter record or template.
    owner: Customer success lead
  - horizon: 180–540 days
    experiment: Prototype one adjacent sanctions or dark-vessel investigation workflow on top of the same casework core.
    hypothesis: The maritime wedge can expand without rebuilding the product or shifting buyers.
    successMetric: Two production customers request the adjacent module and at least one signs an expansion statement of work.
    owner: Product + CEO
operations:
  - Standardize ingestion, retention, and audit logging for RF, AIS, SAR, registry, and analyst-decision data inside customer-approved environments.
  - Maintain a review workflow that records confidence, promotion or dismissal reasons, and export history for every alert.
  - Build reusable partner integrations with RF vendors, enclave hosts, and mission-platform teams before broadening product scope.
  - Track deployment effort, evidence-pack usage, and case-resolution time per program to avoid drifting into a custom-services model.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Needed immediately to build the casework data model, enclave-ready deployment path, and first RF plus AIS connector.
  - role: Founder-led sales / CEO
    startTiming: Month 0
    rationale: Early sales require direct credibility with integrators, tight ICP discovery, and contract navigation inside defense program budgets.
  - role: Maritime intelligence workflow lead
    startTiming: Month 2
    rationale: Converts raw detections and analyst behavior into emitter taxonomies, review rules, and credible evidence-pack templates.
  - role: Forward-deployed product engineer
    startTiming: Month 6
    rationale: Supports pilot deployment, partner integrations, and time-to-value reduction without overloading the core engineering loop.
  - role: Customer success / solutions lead
    startTiming: Month 9
    rationale: Owns pilot-to-production conversion, reporting-cycle reuse, and second-program expansion while preserving product discipline.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid pilots with maritime ISR integrators in the Indo-Pacific or Europe beachhead.
      - Ship enclave-ready MVP with RF ingestion, AIS correlation, human review, and evidence-pack export for one reporting workflow.
      - Prove at least 30% reduction in median time from detection to analyst-approved case in one live program.
      - Convert at least 1 pilot to production annual revenue and standardize 2 deployment patterns.
  - horizon: 12–24 months
    items:
      - Reach 4-6 production programs and establish reusable emitter taxonomies plus audit templates across multiple customers.
      - Complete interoperability with at least 1 mission-platform environment and 2 upstream RF or adjacent data connectors.
      - Launch benchmark reporting and first adjacent investigation module for sanctions, dark-vessel, or border workflows.
  - horizon: 24–36 months
    items:
      - Reach the modeled 6-program year-3 SOM case and show multi-program expansion inside at least 2 integrator accounts.
      - Become the system of record for emitter histories and case outputs across multiple reporting cycles for flagship customers.
      - Demonstrate repeatable expansion beyond coastal surveillance into at least 1 adjacent defense investigation workflow.
risks:
  - risk: Security accreditation and deployment complexity delay pilots and compress runway.
    likelihood: High
    impact: High
    mitigation: Start enclave-first, narrow the MVP to one workflow, and avoid requiring sensitive front-end replacement before proving ROI.
  - risk: Upstream RF vendors and mission platforms absorb the workflow layer.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on buyer-owned casework records, multi-vendor interoperability, and portable evidence packs instead of generic alerting.
  - risk: Analysts reject the workflow as opaque or unreliable.
    likelihood: Medium
    impact: High
    mitigation: Keep review explainable, expose source context and confidence, and start with one narrow emitter ontology where humans can easily verify output.
  - risk: Early deployments become custom integration projects with weak software margins.
    likelihood: Medium
    impact: High
    mitigation: Standardize connectors, separate setup from subscription pricing, and decline bespoke work that does not improve the repeatable product.
  - risk: The maritime beachhead does not expand into adjacent workflows fast enough for venture returns.
    likelihood: Medium
    impact: Medium
    mitigation: Instrument adjacent demand early and require clear customer pull before hiring ahead of the core maritime wedge.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months should fund the founding product and deployment team, two to three enclave-ready design-partner pilots, core RF plus AIS integrations, and the proof needed to convert the first maritime programs into repeatable annual software revenue.
