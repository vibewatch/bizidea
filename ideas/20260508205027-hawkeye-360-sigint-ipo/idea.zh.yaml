problem: 商业 RF 情报越来越容易采购，但大多数项目团队仍要靠人工完成探测结果解读、发射源身份校验，以及用表格、幻灯片和一次性脚本整理结论。对海上监视项目来说，每出现一个新发射源、异常或动向，分析师都得先把原始探测和任务背景对齐，相关人员才能采取行动。这会拖慢告警、消耗稀缺的 RF 专业能力，也让集成商和政府买方更难证明商业 SIGINT 投入的价值。
targetUser:
  primary: 使用商业 RF 探测为某个盟友海岸警卫队或海军项目服务的海上监视集成商中的首席情报分析师或任务产品经理
  secondary: 维护发射源库、阈值和分析师工作流的任务系统工程师
  buyer: 负责某个沿海监视交付项目、且预算中已包含商业 RF 数据支出的 ISR 项目副总裁或项目经理
startupThesis:
  nonObviousInsight: 真正的瓶颈已不再是从太空采集 RF 信号，而是如何把不断增长的商业探测量转成任务可信、可供操作员、主承包商和政府客户行动并审计的案件处理。
  beachhead: 已经采购商业 RF 探测、但仍靠人工分拣发射源的海上 ISR 集成商，服务对象是某个盟友海岸警卫队或海军的沿海监视项目
  wedge: 一层案件工作台，把原始商业 RF 探测转成持续更新的发射源库、可解释的异常告警，以及适用于单个监控海岸线或咽喉水道的可共享证据包
  whyNowCatalyst: HawkEye 360 的 IPO、上市首日股价大涨以及计划中的星座扩张，都说明商业 RF SIGINT 已从小众能力跨进持续增长的数据层，现在需要在其上加一层工作流软件。
  ventureScalePath: 先从海上发射源案件处理切入，再扩展到陆地边境监测、电子战与干扰事件分析、多传感器情报融合，最终成为帮助盟友在多个项目里采购、验证并运营化商业感知数据流的操作层。
solution: 产品位于商业 RF 数据提供商之上，为每个项目提供面向任务的工作空间，用来管理已知发射源、异常和分析师决策。系统会自动把重复探测归并成持续存在的实体，标记对项目真正重要的动向或行为变化，并记录某条告警为何被升级或驳回。分析师无需每次都从原始探测重新拼叙事，就能发布可直接成案的输出给指挥官、主承包商或政府客户。长期来看，系统会成为发射源历史、决策逻辑和与商业 SIGINT 相关可量化项目成果的事实来源。
goToMarketSeed:
  firstCustomer: 员工规模 200–800 人、为某个欧洲或印太盟友海岸警卫队提供沿海 ISR 软件、且已在评估 HawkEye 类 RF 数据流的海上监视集成商
  buyingTrigger: 合同授予、试点或续约把商业 RF 数据加入现有沿海监视工作流，从而暴露出必须快速把探测运营化的需求
  currentAlternative: 分析师手工流程，加上建立在供应商仪表盘和表格式发射源日志之上的内部 Python 脚本
  switchingReason: 这层案件工作台能减少分析师工时、留下更清晰的审计轨迹，并把原始探测转成可重复交付的输出，而无需客户再扩充 RF 分析团队。
  pricingHypothesis: 按被监控项目或战区收取年度平台费，再按活跃发射源库、告警量和分析师席位收取使用费
