jobsToBeDone:
- job: 当我们的沿海监视项目开始接收商业 RF 探测时，帮助分析师团队把它们变成可信的发射源案件和优先级明确的告警，这样他们就能向操作员和客户汇报，而不必为每个异常临时写脚本。
  currentAlternative: 由分析师或任务工程师维护的供应商仪表盘、表格和一次性内部脚本
  successMetric: 从探测到分析师批准成案的时间，以及借助可复用发射源历史解决的告警占比
