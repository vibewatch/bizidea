topRisks:
- name: 供应商依赖
  description: 如果一两家 RF 厂商控制了过多数据供给，它们就可能挤压下游工作流创业公司，或直接推出类似工具。
  mitigation: 尽早建立多供应商连接器，牢牢掌握分析师工作流与审计层，让客户价值可在不同数据源之间迁移。
- name: 政府采纳拖慢
  description: 直接面向政府部门销售往往很慢，即使用户喜欢产品，也可能拖住收入兑现。
  mitigation: 先通过已持有项目合同的集成商和主承包商进入，用现有预算采购工作流软件。
- name: 分析师信任缺口
  description: 如果系统像黑箱，RF 分析师可能拒绝接受自动归并或告警评分。
  mitigation: 上线人机协同审核、透明置信度解释，并把初始部署收窄到单一发射源类别或单条海岸线。
