differentiator: HawkEye 及其同行掌握采集基础设施，通用情报工具掌握广义仪表盘；这家公司要占据的是两者之间、面向单个任务的解释层：持续更新的发射源库、分析师决策历史，以及按单个监视项目阈值和汇报链条定制的成案输出。这些工作流数据会不断累积为防御性资产，因为每个被确认的发射源、每条被驳回的告警、每份已发布的案件，都会强化客户的运营模型，而且很难在表格堆栈里重建。
