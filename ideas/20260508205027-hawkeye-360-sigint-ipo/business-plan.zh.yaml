slug: commercial-sigint-casework
date: '2026-05-08'
executiveSummary: 商业 RF SIGINT 已进入真实的政府预算科目，但多数海上项目仍靠分析师表格、供应商仪表盘和脆弱的内部脚本把探测运营起来。公司的切口，是面向已采购 RF 探测的盟友海上监视项目，提供买方侧案件处理层，补上持续发射源历史、可解释告警和可审计证据包。首个客户应是一家 200–800 人的 ISR 集成商，服务某个印太沿海监视项目，因为这类买方已有合同载体、现成 RF 支出，以及在新项目或续约加入商业 RF 数据时立刻出现的触发点。方案有意避开重新卖一套通用作战图或原始分析门户，而是先做一层覆盖层，在客户或集成商隔离环境中缩短从探测到成案的时间，并保留裁决历史。研究显示，这个滩头虽窄但可信：SAM 约为 $38.5M；如果公司赢下 6 个生产项目、综合 ACV 约 $700k，第 3 年 SOM 可达 $4.2M。要成立风险投资故事，关键在于把这层切口成为发射源库、证据包和跨项目工作流基准的高粘性系统记录，再向边境、制裁和电子战调查等相邻场景扩张。主要反证风险是前链路厂商锁定、安认证慢，以及客户认为 SeaVision、Palantir 或内部脚本已“够用”。公开证据仍无法完全回答后链路数据权属条款、认证部署要求，以及独立工作流层的真实付费意愿，因此这些假设必须在前 12 个月验证。
problem:
- 采购商业 RF 探测的海上监视团队，仍要花大量分析师时间，把原始事件整理成可信的发射源案件、优先级明确的告警和面向客户的报告。
- 既有供应商门户、通用作战图和内部脚本，无法在盟友与跨机构交接中保留项目特有的裁决历史或可审计的证据链。
solution:
- 部署面向任务的案件工作空间，把重复 RF 探测归并成持续存在的发射源记录，套用经人工审核的异常逻辑，并记录告警为何被升级或驳回。
- 生成能复用的证据包，把 RF、AIS、SAR、登记信息和分析师决策整合给指挥官、主承包商和政府客户，无需每次都从原始探测重新搭叙事。
whyWeWin:
- 产品位于原始数据厂商与广义任务平台之间的工作流空白地带，因此一开始就能兼容两侧，而不要求客户替换任何一方。
- 项目特有的发射源库、误报结果和审计轨迹会不断累积为高粘性运营数据，这是表格和供应商仪表盘天然抓不住的。
- 首个切口直接附着在既有 RF 与海事情报预算之上，因此销售是围绕在运行项目触发点的增购动作，而不是新建一个软件品类。
strategicChoices:
  beachhead: 已采购商业 RF 探测、但仍靠人工分拣发射源的印太海上 ISR 集成商，服务某个盟友海岸警卫队或海军沿海监视项目。
  wedgeRationale: 这个切片的触发点最明确，因为 RF 数据预算已存在，而在项目启动或续约时，人工裁决痛点会立刻出现。若直接卖给国防部门，或试图服务所有海上用户，不仅会拖慢验证，还会更早遭遇重度认证要求，也会模糊公司究竟是工作流层还是新任务平台。
  sequencingRationale: 先作为某条海岸线或咽喉水道上的覆盖层进入，这样公司就能在不替换既有仪表盘的前提下，证明更快的探测到成案速度和更清晰的审计轨迹。一旦某个项目信任这套案件记录，再加入跨项目模板、多供应商接入以及与任务平台更深的互操作，随后扩展到边境和制裁等相邻调查场景。招聘节奏也应跟着这个顺序走：先补产品与前置交付，再在试点到生产的路径跑顺后建立可复制销售。
  notYet:
  - 暂不销售新的通用作战图或广义防务数据平台。
  - 在集成商主导部署跑顺之前，暂不直接面向国防部门销售。
  - 在海上案件处理具备可复制性之前，暂不扩展到陆地边境、电子战或类保险合规工作流。
  - 暂不构建分析师无法审核或解释的全自动黑箱告警。
market:
  tam: 估算 TAM 为 $180.0M：约 180 个盟友海上、边境与电子战项目，每个项目每年约有 $1.0M 的案件工作流软件支出。
  sam: 估算 SAM 为 $38.5M：约 55 个位于欧洲与印太、已接近采用商业 RF 的海上项目或由集成商管理的部署，每个项目 ACV 约 $700k。
  som: 估算第 3 年 SOM 为 $4.2M：按 6 个在产项目、每个综合 ACV 约 $700k 计算，以既有 RF 与分析预算下的附着层形态出售。
  segments:
  - 使用商业 RF 数据流的盟友海上 ISR 集成商与主承包商主导的沿海监视项目
  - 需要可审计暗船与异常案件处理的海岸警卫队、海军和区域融合中心团队
  buyingProcess: 创始人亲自打单应从首席分析师、任务产品经理或任务系统工程师切入：当项目加入或续约商业 RF 数据时，人工裁决工作会立刻暴露出来。随后交易再推进到 ISR 项目经理或项目副总裁，由其在既有合同载体中把产品作为付费工作流增购项购买；当同一团队在第二轮汇报周期或新增监控战区中复用发射源历史与证据包时，再转成生产合同。
product:
  mvp: MVP 是部署在单条海岸线或咽喉水道上的安全案件覆盖层，接入 1–2 路商业 RF 数据流、AIS 与分析师笔记，生成持续发射源记录，把异常送入人工复核，并输出适配单条项目汇报链的证据包。它应部署在客户或集成商隔离环境中，并接入既有仪表盘，而不是替换通用作战图。
  sixMonth: 在 6 个月内交付一个可进隔离环境的试点：支持多供应商 RF 接入、人机协同裁决、证据包导出，并能为单一海上项目量化“从探测到成案”的时间。
  twelveMonth: 12 个月内补上能复用的发射源分类、跨案件检索、基于角色的审计轨迹，以及至少 1 条接入 SeaVision、Palantir 或集成商自有任务环境的互操作路径。
  twentyFourMonth: 24 个月内扩展为支撑多个项目的系统记录，具备基准化告警逻辑、共享证据模板，并进入制裁、边境监测与电子战事件分析等相邻工作流。
  keyBets:
  - 客户愿意购买一层工作流，而不要求公司自己掌握前端作战图。
  - 一套海上发射源案件本体可以通过配置，泛化到多个盟友项目，而不必每次都做定制工程。
  - 经人工复核的证据包，足以建立信任，缓解分析师对自动归并和评分的怀疑。
  - 即便 RF 供应商继续增加门户功能，多供应商互操作仍能让公司保持差异化。
gtm:
  wedge: 先向某个正在启动或续约盟友沿海监视项目、且已加入商业 RF 数据的海上 ISR 集成商卖一个付费试点；待同一团队在第二轮汇报周期中复用发射源历史与证据包后，再转成按项目计费的年度订阅。
  channels:
  - 创始人直接销售给海上集成商中的 ISR 项目经理、任务产品负责人和首席分析师
  - 与商业 RF 及相邻海事数据厂商建立联合销售和转介绍合作，其数据流需要更强的后链路案件处理
  - 与已获盟友海上项目批准的任务平台和隔离环境托管方建立部署合作
  funnelTargets: 每年瞄准 12–18 个目标账户；从初步接触到合格试点 25–35%；合格试点到付费试点 35–45%；付费试点到生产 50%+；生产后 12 个月内扩展到第二个项目 30%+。
  pricing: 单个监控项目或海岸线的付费试点定价为 $150k–$250k；转成生产后，每个项目的年经常性收入约为 $500k–$900k；新增数据连接器或隔离环境部署另收实施费。与按席位计费相比，这更符合调研得出的增购逻辑，因为买方买的是任务产出、可审计性，以及在既有 RF 预算内节省的分析师时间。
businessModel:
  revenueStreams:
  - 单个海上监视项目或监控战区的付费试点
  - 按生产项目计价的年度软件订阅
  - 新增数据源、隔离环境部署与汇报模板的实施和集成费用
  - 来自新增战区、相邻调查场景和基准模块的扩展收入
  unitOfValue: 使用该案件工作台的一条在运海上监视项目
  targetGrossMarginPct: 72
  expansionLevers:
  - 在同一集成商账户内增加更多被监控海岸线、咽喉水道或客户项目
  - 向上销售证据包模板、基准报告与跨项目发射源库
  - 在核心工作流建立信任后，从海上异常案件处理扩展到制裁、边境与电子战调查
strategyMap:
  northStarMetric: 在连续汇报周期中复用平台，且扩展到至少一种额外调查场景的生产级海上项目数量
  inputMetrics:
  - 从 RF 探测到分析师批准成案的中位时间
  - 付费试点转生产的转化率
  - 借助既有发射源历史解决的告警占比
  - 每个活跃项目导出的证据包数量
  - 接入新 RF 数据源或任务环境所需时间
  moatsToBuild:
  - 覆盖多个盟友项目的项目特有发射源库与裁决历史
  - 在联盟交接中仍可保留的、受买方信任的证据包模板和审计轨迹
  - 让工作流价值可在 RF、AIS、SAR 与任务平台输入之间迁移的多供应商互操作层
  killCriteria:
  - 在聚焦集成商主导销售后 12 个月内，签下的付费试点少于 2 个
  - 前 4 个付费试点之后，试点转生产率低于 30%
  - 第三次部署之后，平均导入工作量仍高于每账户 8 个工程师周
  - 客户拒绝保存裁决历史，或拒绝在真实汇报流程中使用导出的证据包
  mermaid: "flowchart LR\n  Wedge[集成商主导的海上案件切口] --> MVP[发射源库 + 证据包 MVP]\n  MVP --> Proof[更快的分析师成案与报告复用]\n  Proof --> Expansion[跨项目工作流系统记录]\n"
investorMemo:
  verdict:
    call: 值得会面 / 继续尽调
    conviction: 切口清晰、预算附着逻辑强，但判断强度取决于公司能否先证明隔离环境部署可复制，以及买方自有工作流差异化在供应商打包功能之前站稳。
    whyBelieve: 公司攻击的是商业 RF 采用上升后产生的明确运营瓶颈，能够在不替换既有数据层或平台层的前提下，进入已有预算的海上工作流。
    whyDoubt: 滩头规模有限且集中；若认证过慢或前链路厂商把功能打包进去，公司就可能退化成重服务的集成功能，而不是持久的软件品类。
    nextDiligence: 与 10–15 家海上集成商和盟友项目负责人确认：他们是否愿意为裁决工作流付费试点，并在真实汇报周期中复用第三方证据包。
  firstCustomer:
    title: 盟友沿海监视集成商中的海上 ISR 项目经理
    profile: 一家 200–800 人的集成商，负责某个印太或欧洲沿海监视工作流，已把商业 RF 数据、分析师复核和通用作战图结合在一起。
    trigger: 新授标、续约或 RF 数据流扩容，带来大量人工发射源分拣积压，也迫使团队用更强证据、更快速度向客户汇报。
    buyer: ISR 项目副总裁或海上项目经理
    initialContract: 单个被监控项目的 $150k–$250k 试点；当工作流在第二轮汇报周期或相邻战区中被复用后，转成 $500k–$900k 的年度生产软件合同。
  mustBeTrue:
  - 前 10 家目标集成商中，至少 5 家确认 RF 到成案的工作流痛点是当前问题、已有预算覆盖，且既有门户或脚本没有充分解决。
  - 至少 2 家共创伙伴同意在获批的客户或集成商环境内，持续保存裁决历史和分析师标注结果。
  - 至少 50% 的付费试点转成生产，因为证据包在真实汇报或调查周期中被复用。
  - 至少 1 条多供应商接入路径可以覆盖首年管道中超过 60% 的机会，而不需要定制连接器。
  - 在第一次年度续约前，客户至少会提出一种相邻工作流扩展需求，例如制裁、边境或电子战调查。
  diligenceQuestions:
  - 今天真正能拿到预算批准的输出到底是什么：更快的告警分拣、能复用的发射源库、审计轨迹，还是面向客户的证据包？
  - 集成商究竟能多频繁地在既有合同载体内购买这套软件，而无需等待部委主导的新采购？
  - RF 厂商对第三方工作流产品保存探测记录、分析师标签和衍生历史，究竟会施加哪些数据权属条款？
  - 产品能否始终作为覆盖层存在，还是客户最终会要求把原生前端工作流嵌入 SeaVision、Palantir 或主承包商自有环境？
  - 要从试点走向生产，最低安全姿态需要满足什么标准，且适用于多少盟友项目？
  riskHeatmap:
  - risk: 安认证与隔离环境部署拖慢价值兑现
    likelihood: High
    impact: High
    leadingIndicator: 超过一半的合格机会要求经历数月安全审查后，试点才能接入真实项目数据。
    mitigation: 先在集成商或客户隔离环境中部署，支持气隙路径，并把 MVP 限定为单一汇报工作流，而不是更广的平台替代。
  - risk: RF 厂商或任务平台打包够多的工作流功能，压低定价空间
    likelihood: Medium
    impact: High
    leadingIndicator: 潜在客户越来越把产品与供应商门户的新功能直接比较，并拒绝为独立案件工作层付费。
    mitigation: 主打多供应商互操作、买方自有裁决历史，以及打包门户天然不具备的证据包可迁移性。
  - risk: 分析师不信任自动归并或告警评分
    likelihood: Medium
    impact: High
    leadingIndicator: 试点用户覆盖或忽略了大多数系统建议的实体匹配，且不复用已保存的案件历史。
    mitigation: 坚持人机协同复核模式，展示置信度与来源背景，并把首个本体收窄到单一发射源类别或单条海岸线。
  - risk: 集成商主导部署滑向定制服务项目
    likelihood: Medium
    impact: High
    leadingIndicator: 平均导入工作量始终高于 8 个工程师周，且每个试点都需要定制证据格式或连接器。
    mitigation: 拒绝不能复用的功能工作，标准化前两条连接路径，并把实施费与经常性软件费分开定价。
  - risk: 滩头过窄，撑不起风险投资级扩张
    likelihood: Medium
    impact: Medium
    leadingIndicator: 完成首轮共创伙伴调研后，能识别出的欧洲或印太合格滩头项目少于 20 个。
    mitigation: 只有在海上场景验证完成后，才扩展到共享同一案件管理核心的制裁、边境和电子战工作流。
operatingAssumptions:
- assumption: 当项目新增或续约商业 RF 数据时，海上集成商能够从既有 RF 或分析预算中拿出钱来支付一个付费试点。
  basis: research.yaml
  validationTest: 在不等待新的部委采购条线的前提下，通过既有合同载体赢下 2 个付费试点。
  decisionImpact: 如果不成立，公司就必须更依赖供应商合作，或接受更长的政府直销周期。
- assumption: 客户会允许在第三方工作流层中持续保存分析师标签、裁决历史和衍生发射源记录。
  basis: research.yaml
  validationTest: 从 2 家共创伙伴获得覆盖数据保留与衍生记录所有权的书面批准或安全签字。
  decisionImpact: 如果不成立，护城河会变弱，产品可能只能做成保留价值更低的瞬时覆盖层。
- assumption: 单一“隔离环境优先”的部署模型，足以满足大多数早期盟友项目，而无需每次都重新设计平台架构。
  basis: 运营判断
  validationTest: 用共享部署模式交付前 3 个试点，并把每个账户实施工作量控制在 8 个工程师周以内。
  decisionImpact: 如果不成立，毛利率和销售速度都会断裂，公司只能进一步收窄 ICP，或接受重服务模式。
- assumption: 一旦工作流在多个汇报周期中被复用，买方愿意支付每年 $500k–$900k，因为这笔钱相对 RF 项目预算和分析师人工成本都不高。
  basis: idea.yaml
  validationTest: 在试点结束后的 12 个月内，至少把 2 个试点转成不低于提议区间的年度订阅。
  decisionImpact: 如果不成立，公司需要更低 ACV 的产品打包、更重的伙伴分销，或更换初始工作流。
- assumption: 同一套核心案件架构可以从海上沿海监视扩展到制裁、边境和电子战调查。
  basis: idea.yaml
  validationTest: 在前 6 个生产部署中，至少有 3 个客户在续约前请求一种相邻调查工作流。
  decisionImpact: 如果不成立，投资人就应把这门生意按“细分海上工作流公司”估值，而不是更广的防务案件平台。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 12–15 家海上 ISR 集成商、首席分析师和项目经理，并收集他们当前的案件处理产物。
  hypothesis: 最先有预算覆盖的痛点不是数据获取，而是项目加入商业 RF 数据流后出现的人工 RF 到成案工作流和证据包负担。
  successMetric: 至少 8 次访谈把裁决工作流或证据包制作列为前三大痛点，且有 3 个账户分享既有产物或流程图。
  owner: CEO
- horizon: 0–90 天
  experiment: 在既有 RF 数据流、AIS 背景和分析师笔记之上，人工产出一个样例发射源案件和证据包。
  hypothesis: 在工作流尚未完全自动化前，客户判断价值的标准首先是输出是否可直接进入汇报、是否能复用。
  successMetric: 3 家共创伙伴认为样例输出明显优于当前幻灯片或表格，并同意界定试点范围。
  owner: 创始产品负责人
- horizon: 90–180 天
  experiment: 搭建首个可进隔离环境的试点，包含 1 条 RF 厂商连接器、AIS 关联、人工复核队列和可导出的证据包。
  hypothesis: 即便不替换项目既有仪表盘或任务平台，狭窄覆盖层也足以证明价值。
  successMetric: 1 个付费试点发布，并把从探测到批准成案的中位时间至少缩短 30%。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 测试第二条连接路径，可接入另一家 RF 厂商或既有任务平台环境。
  hypothesis: 两条连接路径足以覆盖首年大多数机会，并降低供应商集中风险。
  successMetric: 超过 60% 的合格销售管道符合这两种已支持的部署模式之一。
  owner: 创始工程师
- horizon: 180–365 天
  experiment: 让 2 个付费试点跑完完整汇报周期，并跟踪已保存发射源历史和证据包模板的复用情况。
  hypothesis: 只有过往裁决决策能明显减少未来分析师工作量时，客户才会转成年度软件。
  successMetric: 至少 1 个试点转成生产，且超过 40% 的已解决告警引用了历史发射源记录或模板。
  owner: 客户成功负责人
- horizon: 180–540 天
  experiment: 在同一案件核心之上，原型化一个相邻的制裁或暗船调查工作流。
  hypothesis: 海上切口可以扩张，而无需重做产品或更换买方。
  successMetric: 2 个生产客户提出该相邻模块需求，且至少 1 个签署扩展工作说明书。
  owner: 产品 + CEO
operations:
- 在客户批准的环境内，把 RF、AIS、SAR、登记信息和分析师决策数据的接入、保留与审计日志标准化。
- 维护一套复核工作流，为每条告警记录置信度、升级或驳回原因，以及导出历史。
- 在拓宽产品范围之前，先把与 RF 厂商、隔离环境托管方和任务平台团队的能复用集成做出来。
- 按项目跟踪部署工作量、证据包使用情况和案件解决时间，避免公司滑入定制服务陷阱。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 需要立即到位，负责搭建案件数据模型、隔离环境优先的部署路径，以及首条 RF + AIS 连接器。
- role: 创始人亲自打单 / CEO
  startTiming: 第 0 个月
  rationale: 早期销售需要与集成商直接建立可信度，快速收窄 ICP，并在防务项目预算框架中穿越合同流程。
- role: 海事情报工作流负责人
  startTiming: 第 2 个月
  rationale: 把原始探测和分析师行为转成发射源分类、复核规则和可信的证据包模板。
- role: 前置产品工程师
  startTiming: 第 6 个月
  rationale: 支持试点部署、伙伴集成和价值实现提速，而不压垮核心工程循环。
- role: 客户成功 / 解决方案负责人
  startTiming: 第 9 个月
  rationale: 负责试点转生产、汇报周期复用，以及在保持产品纪律的前提下扩展到第二个项目。
milestones:
- horizon: 0–12 个月
  items:
  - 在印太或欧洲滩头签下 2 个海上 ISR 集成商付费试点。
  - 交付可进隔离环境的 MVP，涵盖 RF 接入、AIS 关联、人工复核，以及单一汇报工作流的证据包导出。
  - 在一个真实项目里证明：从探测到分析师批准成案的中位时间至少下降 30%。
  - 至少把 1 个试点转成年度生产收入，并标准化 2 种部署模式。
- horizon: 12–24 个月
  items:
  - 达到 4–6 个生产项目，并在多个客户之间建立能复用的发射源分类与审计模板。
  - 完成至少 1 个任务平台环境、2 条前链路 RF 或相邻数据连接器的互操作。
  - 发布基准报告和首个相邻调查模块，覆盖制裁、暗船或边境工作流。
- horizon: 24–36 个月
  items:
  - 达到模型中的第 3 年 6 项目 SOM 场景，并在至少 2 个集成商账户内实现多项目扩展。
  - 对旗舰客户而言，在多个汇报周期中成为发射源历史和案件输出的系统记录。
  - 证明公司能以可复制方式，从沿海监视扩展到至少 1 个相邻防务调查工作流。
risks:
- risk: 安认证与部署复杂度拖慢试点，并压缩跑道
  likelihood: High
  impact: High
  mitigation: 以隔离环境优先收口 MVP，聚焦单一工作流，在证明 ROI 前不要求替换敏感前端。
- risk: 前链路 RF 厂商和任务平台吸收掉工作流层
  likelihood: Medium
  impact: High
  mitigation: 围绕买方自有案件记录、多供应商互操作和可迁移证据包做差异化，而不是只做通用告警。
- risk: 分析师认为工作流不透明或不可靠，从而拒绝采用
  likelihood: Medium
  impact: High
  mitigation: 让复核过程可解释，暴露来源背景和置信度，并从人类容易验证的狭窄发射源本体起步。
- risk: 早期部署滑向定制集成项目，软件毛利偏弱
  likelihood: Medium
  impact: High
  mitigation: 标准化连接器，把实施费与订阅费拆开，对不能改善可复制产品的定制工作直接说不。
- risk: 海上滩头无法够快扩展到相邻工作流，支撑不了风险投资回报
  likelihood: Medium
  impact: Medium
  mitigation: 尽早量化相邻需求，在核心海上切口明确获得客户拉动前，不提前加人。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的资金应足以支撑创始产品与部署团队、2–3 个可进隔离环境的共创伙伴试点、核心 RF + AIS 集成，以及把首批海上项目转成可复制年度软件收入所需的验证。
