reportMemo:
  executiveTakeaways:
  - 'Commercial RF SIGINT demand is now visibly budgeted: HawkEye 360 reached the public markets with roughly $416M in proceeds, $117.6M of 2025 revenue, $302.6M of backlog, and a 61% U.S. government revenue mix, while also holding a renewed $98.8M Navy IPMDA contract [1][2].'
  - The product gap is no longer basic vessel visualization; it is turning RF, AIS, SAR and registry clues into analyst-trusted case files, decision logs and evidence packs that survive coalition and interagency handoffs [10][12][15][16].
  - 'Competition is real but layered: upstream RF providers sell detections, broad mission platforms sell configurable operating environments, and adjacent SAR/AIS vendors sell more sensor inputs; none is purpose-built for emitter-casework workflow by default [3][5][6][8][9][26][27].'
  - 'Beachhead economics look plausible as an attach sale rather than a standalone platform rip-and-replace: six allied programs at about $700k ACV yields a year-3 SOM near $4.2M, with upside coming from expansion into border, sanctions, and EW workflows [2][14][25].'
  marketDefinition: The relevant market is mission software that operationalizes commercial RF and adjacent maritime surveillance feeds—RF geolocation, AIS, SAR, registry data and analyst rules—into auditable casework for coast guards, navies and ISR integrators, rather than selling raw detections or generic dashboards alone [3][10][13][14].
  customerAndBuyer: The day-to-day user is a lead analyst, mission-product manager or mission systems engineer inside an integrator, fusion centre or maritime security program that already consumes multiple data feeds. The economic buyer is the program manager or VP-level ISR owner who must prove faster detection-to-action cycles and coordinate evidence across agencies or partners [10][12][14][15].
  buyingTriggers:
  - point: A new or renewed coastal-surveillance program adds commercial RF data and suddenly exposes the manual work of adjudicating detections into a shared operating picture.
    sourceRefs:
    - 2
    - 14
  - point: A spike in shadow-fleet, sanctions-evasion or IUU-fishing scrutiny raises the number of dark-vessel investigations and pushes programs to preserve stronger evidentiary chains.
    sourceRefs:
    - 22
    - 23
    - 24
  - point: Interagency or allied reporting obligations create pressure for measurable workflow outputs instead of ad hoc analyst notes and opaque scripts.
    sourceRefs:
    - 12
    - 13
    - 15
  willingnessToPay:
    summary: 'Budgets already exist upstream: the Navy renewed a $98.8M IPMDA contract for RF data and analytics, NGA added a $2.5M analytics task order, and SeaVision shows agencies already pay for maritime-awareness tooling plus commercial data layers. The startup can therefore sell as a workflow attach against existing program spend, not as a brand-new budget category.'
    sourceRefs:
    - 2
    - 10
    - 25
  competitiveLandscape: Upstream RF vendors such as HawkEye 360, Unseenlabs and Kleos monetize collection plus analytics; Palantir-class platforms monetize broad defense data operating environments; Spire and SAR vendors such as ICEYE monetize adjacent data layers. The defensible gap is a narrow workflow system for persistent emitter libraries, human adjudication, and case-ready evidence packs tuned to one maritime program’s thresholds and reporting chain [3][5][6][7][8][9][26][27].
  incumbentThesis:
  - incumbentClass: RF data vendors
    point: They monetize collection, geolocation and some analytics, but customer pain persists when analysts still need to turn detections into reusable cases and audit-ready outputs.
    sourceRefs:
    - 2
    - 3
    - 5
    - 6
  - incumbentClass: Mission platforms
    point: Palantir-class platforms are powerful but broad; they do not come with maritime emitter taxonomies, adjudication flows or evidence-pack templates out of the box.
    sourceRefs:
    - 8
    - 10
  - incumbentClass: Government visualization stacks
    point: SeaVision proves agencies want fused AIS, SAR and RF with rules-based alerts, but it is still a situational-awareness layer rather than a program-specific case-management product.
    sourceRefs:
    - 10
    - 12
  - incumbentClass: In-house integrator workflows
    point: Regional MDA programs still rely heavily on training, trust and local fusion-centre capacity, which suggests a large amount of brittle analyst-driven workflow remains outside packaged software.
    sourceRefs:
    - 14
    - 15
    - 16
  regulatoryLandscape: MDA is a whole-of-government and often allied workflow, so products must fit information-sharing centres, sanctions enforcement, and maritime-security doctrines rather than a single-user SaaS motion [13][14][17]. Shadow-fleet enforcement also raises evidentiary demands around vessel identity, registry status and suspicious behavior, which increases the value of explainability and chain-of-custody features [22][23][24].
  technologyLandscape: 'The stack is converging around multi-sensor fusion: RF geolocation from formation-flying or passive satellites, AIS, SAR, registry data and rules-based/ML alerts. HawkEye and Kleos show the RF collection layer, SeaVision shows operational correlation of AIS/SAR/RF, and ICEYE shows SAR derivatives being integrated with AIS and RF rather than replacing them [3][7][10][26][27].'
