competitors:
- name: HawkEye 360
  stage: scale-up
  wedge: Commercial RF data, geolocation and analytics sold directly into defense and maritime awareness programs.
  pricing: Custom multi-year government contracts; public example is a $98.8M Navy IDIQ for RF data and analytics.
  strength: Strong government traction, constellation scale, backlog and category credibility.
  weaknessVsUs: Optimized for collection and signal analytics, not for customer-specific casework, adjudication history, or evidence-pack generation across mixed data stacks.
  sourceRefs:
  - 1
  - 2
  - 3
- name: Unseenlabs
  stage: scale-up
  wedge: Passive RF maritime surveillance focused on dark-vessel and spectrum monitoring use cases.
  pricing: Custom enterprise/government pricing; no public list pricing.
  strength: Clear maritime positioning and strong narrative around AIS limitations and dark-vessel detection.
  weaknessVsUs: Still a data-and-detection supplier rather than a buyer-owned workflow and evidence system.
  sourceRefs:
  - 4
  - 5
- name: Kleos Space
  stage: scale-up
  wedge: RF reconnaissance DaaS using formation-flying satellite clusters and maritime intelligence products.
  pricing: Subscription/DaaS style enterprise pricing, not publicly disclosed.
  strength: Explicit U.S. Navy experimentation and a clear RF geolocation architecture.
  weaknessVsUs: Smaller scale and still concentrated on upstream data supply rather than downstream program workflow.
  sourceRefs:
  - 6
  - 7
- name: Palantir
  stage: incumbent
  wedge: Broad defense data operating platform for analytics, decision support and mission workflows.
  pricing: Custom multi-year enterprise/government contracts; pricing not public.
  strength: Accredited footprint, integration breadth and strong defense buyer trust.
  weaknessVsUs: More general-purpose and implementation-heavy than a dedicated maritime emitter-casework layer.
  sourceRefs:
  - 8
  - 10
