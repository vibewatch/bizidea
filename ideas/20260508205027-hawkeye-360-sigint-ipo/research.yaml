openQuestions:
- How many allied maritime programs can buy an unclassified casework layer directly versus requiring deployment inside an accredited enclave owned by a prime or government host?
- Which RF vendors will contractually allow downstream storage of detection history, analyst labels and model-training feedback without lock-in penalties?
- How much of the workflow can be embedded inside existing SeaVision or Palantir environments before buyers view a new tool as redundant?
- Can one pilot generate enough labelled emitter outcomes to improve alert quality before the product hits classified-data limits?
