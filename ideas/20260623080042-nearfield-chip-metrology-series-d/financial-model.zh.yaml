scenarios:
  downside:
    description: 销售周期拉长到每模块 12-15 个月；到 Q4Y3 只有 3 个模块转入生产；模块 2 的转化推迟到 Q2Y3，模块 3 推迟到 Q4Y3；Y2 收入爬坡更慢，现金低点更深。
    y3RevenueK: 4200.0
    y3EbitdaK: 1300.0
    cashLowPointK: 2500.0
    keyAssumptionChanges:
    - 销售周期从 9 个月拉长到 14 个月（A2 假设失效）
    - 模块 3 在 Q4Y3 而不是 Q2Y3 转化；模块 4 在 Y3 内无法签下
    - Q1Y2 基本没有收入，因为模块 1 试点超期；现金低点落在约 $2.5M
  base:
    description: 按模型计划，到 Q4Y3 有 4 个模块转入生产；模块 1 在 Q1Y2 转化，模块 2 在 Q4Y2，模块 3 在 Q2Y3，模块 4 在 Q4Y3；Y3 退出时毛利率为 78%。
    y3RevenueK: 6525.0
    y3EbitdaK: 3164.0
    cashLowPointK: 3837.0
    keyAssumptionChanges:
    - A1–A29 基线假设全部按原样成立
  upside:
    description: OEM 伙伴渠道在 Q3Y3 带来模块 5；随着跨模块分析扩张，每模块 ARPU 提升到 $2.2M；第二个晶圆厂站点试点在 Q4Y3 成交。
    y3RevenueK: 8500.0
    y3EbitdaK: 4700.0
    cashLowPointK: 3837.0
    keyAssumptionChanges:
    - 伙伴带来的模块 5 在 Q3Y3 签约（BP gtm.channels —— 与量测 OEM 共销）
    - 通过跨模块分析加购，ARPU 提升到 $2,200K（BP businessModel.expansionLevers）
    - 当订阅收入占比超过 90% 后，毛利率提升到 81%
sensitivity:
- variable: ARPU
  downsideCase: $1,500K/模块/年（价值没被充分证明；买方压价 25%）
  baseCase: $2,000K/模块/年（research.yaml SOM 计算 A5）
  upsideCase: $2,500K/模块/年（客户接受跨模块分析加购）
  y3RevenueImpactK: 1750.0
  cashImpactK: 1313.0
- variable: 销售周期
  downsideCase: 14 个月/模块；模块 4 落在 Q1Y4 而不是 Q4Y3
  baseCase: 按 BP investorMemo.firstCustomer，销售周期为 9 个月/模块
  upsideCase: 6 个月/模块；OEM 渠道缩短触达时间
  y3RevenueImpactK: 500.0
  cashImpactK: 375.0
- variable: 毛利率
  downsideCase: 65% —— 区域锁定的 customer VPC 部署要求每个晶圆厂站点配专属基础设施
  baseCase: 75% 综合（A8 + A9）
  upsideCase: 82% —— 到 Y3 时订阅型收入占比超过 95%
  y3RevenueImpactK: 0.0
  cashImpactK: 522.0
- variable: 流失率
  downsideCase: 20% 年流失率 —— Q3Y3 因一次信任事件丢掉一个模块续约
  baseCase: 10% 年流失率，即 0.83%/月（A27）
  upsideCase: 5% 年流失率 —— 生产上线后确认切换成本极高
  y3RevenueImpactK: 500.0
  cashImpactK: 375.0
- variable: 招聘节奏
  downsideCase: Y2 为了同时扛两条试点，多招 2 位工程师 —— opex +$550K
  baseCase: 按模型节奏招聘（见 headcount 表）
  upsideCase: 把 Q3Y2 的软件工程师招聘延后 1 个季度 —— opex -$275K
  y3RevenueImpactK: 0.0
  cashImpactK: 550.0
- variable: CAC
  downsideCase: $650K —— 第二家晶圆厂没有 OEM 引荐，需要更长时间铺关系
  baseCase: $450K，创始人主导直销的综合 CAC（A28）
  upsideCase: $250K —— OEM 共销渠道基本消掉模块 3-4 的冷启动成本
  y3RevenueImpactK: 0.0
  cashImpactK: 800.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads[Target Fab Modules\n~34 SAM] --> Pilot[Paid Pilot\n$350K / 6 mo]
      Pilot -->|60pct conversion| Sub[Annual Subscription\n$2M per module]
      Sub --> Revenue[Quarterly Revenue\n$500K per module]
      Revenue --> COGS[COGS\n20pct subscription\n45pct services]
      Revenue --> GP[Gross Profit\n75-78pct]
      GP --> Opex[Opex\nHeadcount + Overhead]
      GP --> EBITDA[EBITDA]
      EBITDA --> Cash[Cash EOP\nrolls forward quarterly]
modelSanity:
- checkName: Revenue engine
  finding: 收入引擎来自“付费试点 → $2M 订阅”的顺序转化，按每模块每季度 $500K 计。基线情景要在 Q4Y3 前拿下 4 个签约模块，才能达到 $6.5M 年收入和与 research.yaml SOM 一致的 $8M ARR run-rate。
- checkName: Must go right
  finding: 模块 1 试点必须在 Q1Y2、也就是第 15 个月前转成生产订阅——这一笔单独就能把 Q1Y2 EBITDA 从大约 -$500K 拉到 -$24K，并让公司无需过桥融资也能撑住。
- checkName: Model breaks if
  finding: 如果每家客户在量测、SPC 和 MES 数据栈上的集成时间拖到 9 个月以上，模型就会断。下行情景里，模块 4 因此滑到 Y4，Y3 收入从 $6.5M 掉到 $4.2M，现金低点压到 $2.5M，不到 6 个月跑道。
- checkName: Next-round proof
  finding: 如果到 Q3Y3 前，公司能拿下 3 个付费生产订阅模块，并且有至少一个第二晶圆厂试点，还能证明处置时间改善，那就足以支撑 Series A 里程碑，也说明这不是靠单一共创客户关系在硬撑。
sanityChecks:
  ruleOf40: Y2→Y3 收入增长 115% + Y3 EBITDA 利润率 48% = 163%（远高于 Rule of 40；这种表现更像高 ARPU 企业软件在超高速增长阶段的形态）
  burnMultiple: Y1 净烧钱 $1.14M / 新增 ARR 约 $700K（按试点年化） = 1.6x burn multiple —— 对一个资本轻、但企业销售周期长的软件切口来说，这个种子轮水平可以接受。
  revenuePerFte: $593K Y3（11 FTE）；SaaS 常见基准约为 $200–400K。这里偏高，主要是因为每模块 ARPU 达到 $2M，且 4 家客户集中度很高；随着团队扩张，指标会回落。
  flags:
  - Y3 只有 4 家客户，收入集中度很高：如果 Q4Y3 丢掉一次续约，就会少掉 $500K 收入和约 $390K EBITDA；模型没有给部分流失留缓冲。
  - 模块 1 从试点转生产，是 Y2 现金流的单点故障；只要拖过 M15，Q1Y2 现金流就会再恶化约 $450K，可能逼出过桥融资或提前延长种子轮。
  - 订阅 COGS 按 20% 假设建立在共享云基础设施之上；如果客户要求区域锁定的 customer VPC 部署，订阅 COGS 可能升到 25–30%，Y3 EBITDA 会被吃掉 $130–200K。
  - CAC 按 $450K 建立在 Y1–Y2 一直由创始人高效直销的前提上；一旦到 Q1Y2 以后开始把销售交给 Sales/BD，新模块的边际 CAC 可能抬到 $600K+。
  - Y3 毛利率 78% 高于 BP 里写的 70% 目标；只有当订阅收入占 Y3 收入超过 85% 时，这个数才站得住，而在 Q1–Q2Y3 仍有两个试点处于服务收入阶段。
