slug: hidden-layer-yield-os
date: 2026-06-23
executiveSummary: Hidden Layer Yield OS 是一层厂商中立的决策系统，面向那些已经靠新一代 3D 量测看见埋藏缺陷、却还来不及在生产流程里做出动作的领先晶圆厂。第一滩头市场是一家头部逻辑代工厂或 IDM 里的单个高良率敏感 GAA 模块：工艺控制团队到今天还得靠战情室、SPC 看板和设备厂商应用支持，来决定批次该暂停、抽样还是继续流转。产品一开始就该以建议模式落地，因为真正的门槛不是模型新不新，而是信任和数据接入。商业逻辑是顺的：节点爬坡或新量测设备上马先把痛点点燃，工艺控制 VP 或晶圆厂良率 VP 承担经济损失，而一次付费模块部署可以用避免下游晶圆损失和更快完成批次处置来证明回报。研究支持这是个窄但值钱的市场：TAM 约 $250.0M、滩头 SAM 约 $85.0M、第三年 SOM 约 $8.0M；但还没有点名的共创客户，也没有首轮部署可接受的误暂停阈值。因此，这家公司现在不该急着讲全厂铺开、闭环自动化或封装/HBM 邻接扩张，而要先在一个模块上证明：处置时间更短、误暂停更少、漏检不增加。真正的护城河来自晶圆厂专属的建议接受记录、工艺上下文和下游良率结果；通用分析平台和单设备 OEM 软件都很难复制。董事会层面的判断也很简单：如果只读试点在 12 个月内拿不到可信的操作员使用率和可量化的处置改进，这还算不上一家有风险投资规模的软件公司。
problem:
- 领先节点的 GAA 和 3D 集成流程已经出现埋藏结构，旧光学工作流根本看不清，所以很多关键缺陷要等到高成本下游步骤做完后才暴露出来。
- 工艺控制团队至今还靠 SPC、设备输出和专家会议做人工偏移复盘，批次处置因此变慢，漏检风险和误暂停一起抬高。
solution:
- Hidden Layer Yield OS 把单一模块的 3D 量测输出、工艺步骤历史和现有 SPC 上下文接进来，并在同一班次里推荐暂停、抽样或定向工艺修正动作。
- 第一版产品是带证据链和反馈采集的人机协同偏移看板，不是自动工艺控制；先让晶圆厂建立信任，再谈更大的权限。
whyWeWin:
- 公司卡的是量测 OEM 与通用工艺控制套件之间的行动层。这个工作流痛点很急，但研究里还看不到一个已经成型的厂商中立默认方案。
- 把隐藏层特征、被接受的决策和下游良率结果连起来的晶圆厂专属数据，会随着每一次偏移复盘持续累积，最终沉淀成单一设备厂商和客户内部都难以复制的操作记忆。
- 切口足够窄，能先在一个模块上证明 ROI；同时又能顺着跨模块偏移管理、配方迁移和更广泛的工艺智能往外扩。
strategicChoices:
  beachhead: 先拿下一家头部代工厂或 IDM 里已经装好新 3D 量测设备的先进逻辑 GAA 模块；这里同班次批次处置到现在还离不开人工专家复盘。
  wedgeRationale: 先做一个 GAA 模块，比一上来横跨多个模块或封装流程更容易打出证明：痛点尖锐、相关人清楚，而且处置时间改善可以对着同一类反复出现的偏移直接量。
  sequencingRationale: 公司必须先在建议模式里把信任挣出来，再去要更深的工作流权限。所以产品从只读建议开始，GTM 从创始人主导的共创客户起步，招聘先补重行业背景的应用人才，合作也先拿 OEM 和联盟入口，而不是追求大渠道铺量。
  notYet:
  - 未经人工批准的全闭环配方自动化
  - 替换全厂 SPC 或 MES
  - 在前道模块还没稳定证明 ROI 之前，就扩到混合键合封装或 HBM 相关模块
market:
  tam: $250.0M
  sam: $85.0M
  som: $8.0M
  segments:
  - 正在为 AI 加速器爬坡 GAA 模块的领先逻辑代工厂和 IDM
  - 等首个模块跑通后再切入的先进封装和混合键合团队
  buyingProcess: 这是一次长周期、高技术门槛的企业销售，主导者是工艺控制和良率团队。只有试点证明只读建议能改善批次处置经济性，VP 级审批才会真正启动。采购大概率会要求先圈定单一模块试点，做安全审查，并证明误暂停和漏检不会恶化。
product:
  mvp: MVP 是一块面向单一 GAA 模块的只读偏移看板：把隐藏层 3D 扫描、SPC 上下文和批次历史拼起来，对异常排序，并给出带人工可读证据的暂停、抽样或修正建议。MVP 不做自动配方改写，先把历史回放、操作员复核和建议采集跑通。
  sixMonth: 完成一类量测设备与 SPC/MES 历史的连接器，在一类偏移事件上做盲测式历史回放，并把建议模式部署进一家共创客户的班次工作流。
  twelveMonth: 在一个模块上支持生产影子模式，补上工程师反馈闭环和处置分析，并证明相较客户原流程，处置周期和误暂停率都能可量化改善。
  twentyFourMonth: 从一个模块扩到相邻先进节点模块和第二个晶圆厂站点，沉淀可复用的偏移分类手册、跨模块工艺记忆和区域锁定部署能力。
  keyBets:
  - 在拿不到深度 MES 控制权限前，只读集成也足以先交付第一笔 ROI。
  - 工程师会比相信自动控制更快相信带证据的建议。
  - 在隐藏层批次处置工作流里，模块专用模型会跑赢通用半导体分析平台。
gtm:
  wedge: 在节点爬坡或新 3D 量测上线期间，卖一套面向单一 GAA 模块的付费建议模式隐藏层偏移控制部署。成败就看两件事：从扫描告警到批次处置是否更快，以及有没有更少不必要的晶圆继续流到下游。
  channels:
  - 创始人主导，直接卖给头部代工厂和 IDM 的工艺控制 VP 与晶圆厂良率负责人
  - 通过量测 OEM 应用团队做共销和转介绍
  - 借助 imec、A*STAR IME 和先进封装生态关系切进共创客户
  funnelTargets: target account to qualified pilot 20-30%, qualified pilot to paid pilot 50%+, paid pilot to annual production contract 60%+
  pricing: 先收高触达部署费，覆盖集成、历史回放验证和偏移处置手册搭建；之后转成年订阅，按晶圆厂模块和监控批次数量计价。这样既对齐价值创造方式，也让第一份合同牢牢绑在一条可量化的工作流上。
businessModel:
  revenueStreams:
  - 为数据映射、历史回放和模型调优收取部署与验证服务费
  - 按晶圆厂模块收取年度软件订阅费
  - 新增模块、站点和跨模块分析带来的扩展收入
  unitOfValue: 一套已定义好隐藏层偏移工作流的受监控晶圆厂模块
  targetGrossMarginPct: 70
  expansionLevers:
  - 当一条工作流拿到可信的操作员使用率后，在同一晶圆厂加邻近模块
  - 向同一客户追加跨站点配方迁移和偏移记忆产品
  - 在前道场景跑通后，延展到混合键合和 HBM 相关模块
strategyMap:
  northStarMetric: 带证据建议被工程师接受后，能在同一班次内完成处置的隐藏层异常批次占比
  inputMetrics:
  - 从扫描告警到批次处置的时间
  - 工艺控制工程师对建议的接受率
  - 相对基线的误暂停率
  - 相对基线的漏检率
  - 首套量测加 SPC/MES 数据集的接入时间
  moatsToBuild:
  - 晶圆厂专属的隐藏层特征、决策和良率结果语料库
  - 覆盖单一模块量测、SPC、MES 和谱系数据的厂商中立数据模型
  - 由带证据建议和工程师反馈历史构成的信任层
  killCriteria:
  - 6 个月内，没有任何共创客户愿意为单一模块开放量测、SPC 和批次历史的只读数据接入。
  - 两组试点数据跑完后，历史回放和影子模式仍无法在漏检率不变的前提下，把处置时间至少压缩 30%。
  - 首个部署后的 12 个月内，付费试点仍转不出至少一份年度生产合同。
  mermaid: |
    flowchart LR
      Wedge[One GAA module wedge] --> MVP[Advisory mode excursion board]
      MVP --> Proof[Lower disposition time and fewer false holds]
      Proof --> Expansion[More modules, sites, and packaging workflows]
investorMemo:
  verdict:
    call: 值得见面 / 继续尽调
    conviction: 技术切口够硬，痛点也真，但最终把握度取决于能否在一个真实模块里证明数据接入和操作员信任。
    whyBelieve: 领先晶圆厂已经拥有隐藏层可见性，却还没有一个成熟的厂商中立行动层，这给工作流优先的软件公司留出了真实窗口。
    whyDoubt: 买方群体太小，现有厂商又离得很近；如果试点无法快速跨过集成、信任和 ROI 三道坎，公司就起不来。
    nextDiligence: 优先验证一家具名共创客户试点：历史回放能否让批次处置至少提速 30%，同时不增加漏检。
  firstCustomer:
    title: 头部 GAA 逻辑晶圆厂的工艺控制总监
    profile: 一家领先代工厂或 IDM 的模块团队，正在为 AI 加速器量产爬坡，引入了新的 3D 量测，但隐藏层偏移仍靠人工专家复盘来定。
    trigger: 节点爬坡或新隐藏层量测设备上马后，反复暴露出异常偏移，而且总是发现得太晚，来不及避免下游晶圆损失。
    buyer: 工艺控制 VP 或晶圆厂良率 VP
    initialContract: 先签一份 6–9 个月、价值 $250k-$500k 的付费试点；如果 ROI 跑通，再转成 $1.5M-$2.5M 的年度模块订阅，并叠加扩展服务。
  mustBeTrue:
  - 必须存在一条单模块工作流，让从扫描告警到批次处置的延迟足够痛，而且由 VP 级买方承担结果。
  - 量测、SPC 和批次历史系统的只读集成，必须能在不拖成多年 IT 项目的前提下完成。
  - 历史回放必须能找到一套建议策略，在不增加漏检的情况下，减少误暂停或缩短处置时间。
  - 工程师必须愿意每个班次都看这块建议看板，并持续反馈接受或拒绝的动作，才能积出专有决策记忆。
  - OEM 和生态伙伴必须容忍甚至支持这层厂商中立行动层，而不是卡数据或直接把它打包进自家方案。
  diligenceQuestions:
  - 今天到底是哪一条 GAA 模块工作流，在扫描告警到批次处置之间最吃资深工程师时间？
  - 首个客户愿意接受的影子模式误暂停率和漏检阈值分别是多少？
  - 在混合量测环境里，这家创业公司究竟能拿到多少厂商中立的数据接入，而不触发 OEM 阻力？
  - 更快打出第一笔收入的路径，到底是前道 GAA 控制，还是混合键合封装控制？
  - 买方是否从第一天起就要求本地部署或 customer VPC？
operatingAssumptions:
- assumption: 单模块建议式部署，比更广泛的全厂分析平台更容易获批。
  basis: research.yaml
  validationTest: 先锁定一家只覆盖单一模块的试点范围，再把销售周期与任何更大范围的需求做对比。
  decisionImpact: 如果不成立，公司就得更早包装更完整的平台叙事，并为更长的企业销售周期筹更多钱。
- assumption: 一旦付费试点证明 ROI，模块级年度订阅价值可以站上低七位数美元。
  basis: 主观判断
  validationTest: 在试点谈判里直接测试付费意愿，并确认至少有一家客户愿意在试点成功后签下 $1.5M-$2.5M 区间的年度生产合同。
  decisionImpact: 如果不成立，TAM 会明显收缩，公司就该降低服务强度，或者干脆别走风险融资路线。
- assumption: 在提供自动化之前，只靠建议证据和人工审批，就足以跨过操作员信任门槛。
  basis: idea.yaml
  validationTest: 在影子模式期间，跟踪工程师周活、建议接受率和定性信任反馈。
  decisionImpact: 如果不成立，产品就得退回分析报表，或者更深嵌进工作流，但采用速度会更慢。
- assumption: 厂商中立的跨设备定位，比紧贴单一 OEM 更能创造价值。
  basis: research.yaml
  validationTest: 对比一个 OEM 主导交易和一个混合设备客户沟通，在试点接入速度、数据丰富度和扩展空间上的差异。
  decisionImpact: 如果不成立，公司就该转向 OEM 中心的分销策略，用更低独立性换更快进场。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 6-8 位买方和用户，把一个目标 GAA 模块从扫描告警到批次处置的工作流完整画出来。
  hypothesis: 当前工作流里存在可重复出现的延迟和决策瓶颈，痛到足以支撑一次试点。
  successMetric: 至少 4 位受访者能量化当前处置 SLA 问题或误暂停成本，并对一类优先偏移事件达成共识。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 围绕一套量测来源，加上 SPC 和批次历史，做一次只读接入的技术冲刺。
  hypothesis: 在不碰深度 MES 控制面的前提下，也能拿到第一批有价值的数据。
  successMetric: 一家共创客户的单模块场景里，首个拼接后的数据集在 6 周内跑通。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 把历史偏移案例放进盲测回放，对照过去人工批次处置决定。
  hypothesis: 带证据的建议能在一类偏移事件上缩短决策时间，并减少误暂停。
  successMetric: 在漏检率不差于基线的前提下，建模后的处置时间至少快 30%。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 与具名工艺控制工程师一起，在影子模式里试跑一块建议复核看板。
  hypothesis: 工程师会足够频繁地复核并标注建议，从而沉淀专有训练数据。
  successMetric: 具名试点团队的周活至少达到 70%，且至少 60% 的告警批次留下建议反馈。
  owner: 现场应用负责人
- horizon: 6–12 个月
  experiment: 把一个建议模式试点转成付费年度生产部署。
  hypothesis: 单模块 ROI 足够强，能撑起模块制的经常性软件支出。
  successMetric: 拿下一份已签年度合同，并形成一份扩到第二个模块的明确计划。
  owner: 创始人/CEO
- horizon: 12–18 个月
  experiment: 通过一个量测 OEM 或产业联盟关系，测试伙伴驱动的销售线索。
  hypothesis: 伙伴渠道能缩短拿到合格试点的路径，同时又不牺牲厂商中立性。
  successMetric: 伙伴至少带来两条合格试点机会，其中至少一条进入付费评估。
  owner: 创始人/CEO
operations:
- 采用区域锁定部署架构，并把只读接入作为默认落地路径
- 为每一次暂停、抽样或修正建议保留正式证据日志
- 与 OEM 应用团队和精选联盟伙伴做联合账户规划
- 试点启动前先完成客户定制化的安全审查和数据治理流程
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 先把单模块所需的数据连接器、历史回放引擎和建议工作流做出来。
- role: 现场应用 / 工艺控制负责人
  startTiming: Month 0-3
  rationale: 把晶圆厂偏移处置逻辑翻成产品需求，并在试点里把良率工程师的信任一点点挣出来。
- role: 数据平台工程师
  startTiming: Month 3-6
  rationale: 把量测、SPC、MES 和谱系数据接入加固到足以支撑区域锁定的企业级部署。
- role: 创始人主导销售与合作
  startTiming: Month 0
  rationale: 第一批交易靠的是对晶圆厂、OEM 和研究联盟伙伴的高层可信度，不是规模化 SDR 流程。
milestones:
- horizon: 0–12 个月
  items:
  - 拿下一家只为单一 GAA 模块开放只读数据接入的共创客户
  - 完成一类偏移事件的历史回放和影子模式试点
  - 把一个试点转成付费年度生产部署
- horizon: 12–24 个月
  items:
  - 在至少两家客户中，把模块部署总数扩到 3-4 个
  - 推出可复用的跨模块偏移记忆和建议证据手册
  - 通过 OEM 或联盟关系增加一条伙伴带来的部署路径
- horizon: 24–36 个月
  items:
  - 实现多站点、区域锁定的部署交付
  - 沿用同一决策层架构，扩到混合键合或 HBM 邻接模块
  - 证明被接受的决策记忆能缩短新模块爬坡时间
risks:
- risk: 量测、SPC、MES 和谱系系统的集成时间，比客户能接受的更长。
  likelihood: High
  impact: High
  mitigation: 先锁一个模块、一类设备和只读接入，拒绝一切会拖慢首次回放速度的定制范围。
- risk: 工程师不愿意在生产批次上信任这层建议系统。
  likelihood: High
  impact: High
  mitigation: 强制先走建议模式；每次建议都展示证据，并先聚焦一类能回看验证的偏移事件。
- risk: 创业公司还没占住滩头账号，现有 OEM 或工艺控制厂商就先把类似工作流功能打包进方案。
  likelihood: Medium
  impact: High
  mitigation: 强调跨设备、厂商中立的工作流，沉淀反馈记忆，并在模块级部署速度上跑赢通用分析平台。
- risk: 出口管制和客户 IP 限制，会卡住地域、用工或部署架构。
