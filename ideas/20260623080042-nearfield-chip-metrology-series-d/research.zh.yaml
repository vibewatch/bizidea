competitors:
- name: KLA
  stage: incumbent
  wedge: 覆盖偏移分析、批次处置和先进封装量测的广义半导体工艺控制与软件栈。
  pricing: 无公开标价；企业级报价。
  strength: 在现有晶圆厂里扎得深，工艺控制语义丰富，而且明确支持 run-time process control、批次处置和异常通知。
  weaknessVsUs: 产品更广也更偏设备侧；看不出它被专门设计成一块跨多源量测、还能沉淀单模块决策记忆的中立隐藏层偏移看板。
  sourceRefs:
  - 10
  - 29
- name: Onto Innovation
  stage: incumbent
  wedge: 面向混合键合的 inline 工艺控制，以及多变量良率优化软件。
  pricing: 无公开标价；企业级报价。
  strength: 在混合键合工艺控制、CMP/集成量测和基于 ML 的目标优化上，公信力直接。
  weaknessVsUs: 能力仍锚定在设备侧量测和分析；如果客户想要的是跨设备、以建议为中心的工作流，而不是另一个优化器，它就没那么顺手。
  sourceRefs:
  - 7
  - 11
- name: PDF Solutions
  stage: incumbent
  wedge: 把制造、测试、封装和现场数据连起来的半导体大数据平台。
  pricing: 无公开标价；企业级报价。
  strength: 跨工序标准化和根因分析底子很强。
  weaknessVsUs: 平台定位太泛；公开证据更像广义数据基础设施，而不是专为隐藏层批次处置打造的工作流。
  sourceRefs:
  - 12
- name: yieldHUB
  stage: scale-up
  wedge: 强调快速良率分析、钻取、谱系和跨工序生产可视化。
  pricing: 无公开标价；企业级报价。
  strength: 公开客户证据里，分析提速、生产率提升、日常 PE/QE 使用和良率改善都很扎实。
  weaknessVsUs: 公开定位最强的还是广义良率/测试/生产分析，不是先进节点的隐藏层键合前偏移控制。
  sourceRefs:
  - 13
  - 32
- name: Nearfield Instruments
  stage: scale-up
  wedge: 面向隐藏结构和高深宽比半导体结构的先进 3D 量测平台。
  pricing: 无公开标价；以设备与应用服务为主导。
  strength: 能生成独特的隐藏层信号，资本支持强，而且与 GAA/CFET/混合键合痛点正面对齐。
  weaknessVsUs: 它最适合提供量测盒子和应用经验，但未必最适合在全厂层面做一块厂商中立、跨设备的行动层。
  sourceRefs:
  - 1
  - 9
  - 19
regulatoryTechnicalConstraints:
- point: 先进半导体制造及其支持服务都暴露在出口管制之下，这会限制客户组合和跨境服务模式。
  sourceRefs:
  - 26
- point: 混合键合要求极严的表面预处理和 overlay 控制；在一个 imec 的 D2W 示例里，Cu recess 需小于 2.5nm，而 200nm 路线图的 overlay 目标也只有约 50nm。
  sourceRefs:
  - 15
  - 16
  - 17
- point: 很多关键量测仍需要 AFM、光学、OCD、e-beam 和破坏性参考方法组合使用，这会显著抬高集成复杂度。
  sourceRefs:
  - 5
  - 6
  - 8
  - 14
  - 30
- point: GAA 的埋藏特征量测仍要求穿透光学不透明的堆叠结构，所以任何“看起来很确定”的假象都很危险，模块专用校准不可避免。
  sourceRefs:
  - 5
  - 19
validationSignals:
- point: Nearfield 的 $380M 融资明确投向应用中心、产能和更深的客户联合研发，说明晶圆厂花钱的重点已经是把新量测真正跑进产线，而不只是把设备买回来。
  sourceRefs:
  - 1
- point: imec 已经展示了 2µm D2W 混合键合和 200nm W2W 混合键合的关键里程碑；这不是降低了工艺控制层的重要性，恰恰是把它推得更急。
  sourceRefs:
  - 15
  - 17
- point: yieldHUB 的公开客户证言提到 4% 良率提升、PE/QE 日常使用和数量级级别的生产率改善，说明半导体客户只要 ROI 够硬，就愿意为分析能力付钱。
  sourceRefs:
  - 13
  - 32
- point: HBM 变得更高、更贵，缺陷在流程后段才被发现的成本越来越不能忍，这会继续强化更早做处置和抽样决策的价值。
  sourceRefs:
  - 27
  - 31
openQuestions:
- 哪些先进晶圆厂已经把隐藏层 3D 量测实时接进 SPC/MES，哪些仍停留在线下专家复盘？
- 首个 GAA 或混合键合模块试点，可接受的误暂停率到底是多少？
- 在不激怒 OEM 渠道伙伴的前提下，主流量测设备现实中能开放多少厂商中立数据？
- 最有速度的滩头，是前道 GAA 工艺控制、先进封装混合键合，还是 HBM 相关模块控制？
- 出于出口管制和 IP 限制，买方会不会从第一天就更偏好本地部署 / customer VPC？
