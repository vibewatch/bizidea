jobsToBeDone:
- job: 当隐藏层量测扫描提示可能出现异常偏移时，帮工艺控制团队决定这批晶圆该暂停、抽样还是继续流转，避免下游良率损失越滚越大。
  currentAlternative: 围着 SPC 看板、设备厂商意见和临时良率会议做人工异常复盘。
  successMetric: 从扫描告警到批次处置的时间更短，后来被证实有问题的晶圆跑过的下游步骤更少。
- job: 当一个新先进节点模块开始爬坡时，帮良率工程师尽快学会哪些 3D 扫描特征真会带来生产损失，这样既能更快调好配方，也不会把好晶圆误拦太多。
  currentAlternative: 用表格跟踪、离线做相关性分析，再靠工程师记忆回想过往偏移。
  successMetric: 更快收敛到稳定的偏移阈值，同时把误暂停率降下来。
