topRisks:
- name: 集成摩擦
  description: 半导体晶圆厂的数据环境分散而且安全等级高，量测、SPC 和工艺历史系统接起来，可能会把试点节奏拖慢。
  mitigation: 先从一个模块、一类设备和只读集成开始，先给出建议，再谈更深的流程嵌入。
- name: 现有厂商反扑
  description: 一旦行动层被证明有价值，量测或工艺控制现有厂商完全可能把自己的软件栈往上延展。
  mitigation: 把跨设备决策工作流和晶圆厂专属反馈语料握在自己手里；单一设备厂商在混合环境里更难复制这层能力。
- name: 企业采用缓慢
  description: 如果没有清楚证据说明系统能减少误暂停和漏检，良率负责人未必愿意在生产批次上信任一套新建议。
  mitigation: 先用顾问模式切进单一偏移类型；每次建议都附证据，先证明节拍和处置结果变好，再申请扩权。
