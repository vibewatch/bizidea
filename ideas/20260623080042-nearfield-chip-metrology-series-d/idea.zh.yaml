problem: 先进逻辑和先进封装产线已经能造出旧光学检测栈根本看不清的结构，尤其是深沟槽和隐藏层。工艺一旦漂移，或者隐藏层缺陷漏检，晶圆就会继续流过数百道昂贵的下游工序，等团队找到根因时，良率损失早已层层放大。晶圆厂并非没有设备输出、SPC 图表和专家战情室；它真正缺的是一层软件，能把新的 3D 量测信号足够快地变成面向具体模块的暂停、放行和配方修正决定，把经济性先守住。
targetUser:
  primary: 正在爬坡 GAA 或混合键合 3D AI 芯片模块的先进逻辑代工厂或 IDM 晶圆厂里，负责工艺控制与良率工程的总监。
  secondary: 负责量测配方调优、偏移复盘和晶圆批次处置的模块集成负责人，以及设备工程经理。
  buyer: 工艺控制 VP 或晶圆厂良率 VP
startupThesis:
  nonObviousInsight: 真正稀缺的资产，已经不只是量测设备本身，而是那层决策系统：它得足够快地读懂隐藏层 3D 扫描特征，并在下一道工序前改动作。先进节点已经跑到了光学检测前面，胜出的创业公司应该卡在昂贵量测设备与 MES/SPC 工作流之间，把原始扫描转成保良率的动作；通用分析平台做不到这件事。
  beachhead: 先拿下一家为 AI 加速器量产 GAA 或混合键合 3D 集成的先进逻辑试点晶圆厂。在这里，工艺控制团队必须在晶圆进入后续高成本光刻、键合或集成步骤前，先判断隐藏层量测异常该怎么处置。
  wedge: 从一个隐藏层异常偏移控制工作流切进去，把 3D 量测输出、工艺步骤历史和过往缺陷结果拼在一起，给一个关键模块推荐批次暂停、抽样优先级和配方修正。
  whyNowCatalyst: Nearfield 的崛起说明，晶圆厂已经进入一个新阶段：缺陷终于能看见了，但能不能足够快地做动作，成了新的瓶颈。
  ventureScalePath: 先从一家晶圆厂里一个最伤良率的模块做起，再扩到跨模块偏移管理、跨厂配方迁移、供应商与设备反馈闭环，最后长成先进半导体制造里的全厂闭环工艺智能层。
solution: Hidden Layer Yield OS 先接入一个先进模块（例如 GAA 或混合键合集成）的新 3D 量测设备、既有光学检测、SPC 数据和工艺步骤历史。系统会按下游良率影响给隐藏层异常打分，再建议这批晶圆是该暂停、做确认抽样，还是先下发针对性的工艺修正，避免在坏晶圆上继续叠加价值。第一版产品不是全自动的晶圆厂大脑，而是一块专门服务于关键时刻的人机协同偏移看板：昂贵的隐藏层扫描结果刚出来，但现场动作还靠人工、速度又慢。随着工程师接受、拒绝或修改建议，系统会学出晶圆厂自己的缺陷特征，最后沉淀成这条产线在先进节点上保良率的操作记忆。
goToMarketSeed:
  firstCustomer: 首个客户应是头部逻辑代工厂或 IDM 的试点晶圆厂：它刚在 GAA 或混合键合 AI 芯片产线上引入新的 3D 量测设备，隐藏层缺陷是否要触发工艺暂停，仍要靠跨职能良率会议拍板。
  buyingTrigger: 节点爬坡、新量测设备安装，或反复出现的偏移复盘场景里，隐藏层缺陷总是发现得太晚，已经开始拖累良率或节拍。
  currentAlternative: 光学检测与 SPC 看板、人工良率战情室、设备厂商应用工程师支持，以及少量破坏性抽样。
  switchingReason: 首个客户愿意切换，是因为这个切口能把新拿到的 3D 扫描数据，在同一班次里变成可引用、落到具体工艺步骤的动作，减少基于错误假设继续流向高成本下游工序的晶圆。
  pricingHypothesis: 按晶圆厂模块和监控批次数量收取年度企业订阅费，外加高触达部署费，用于数据映射、模型验证和偏移处置手册搭建。
