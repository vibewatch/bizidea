differentiator: 现有厂商大多占住了量测盒子，或者占住了通用工艺控制栈，但新的卡点在两者之间的行动层。这家公司从一开始就为先进节点上的隐藏层偏移决策而生：它把 3D 扫描特征、步骤历史、批次处置和建议修正动作连起来，而且一次只盯一个模块。真正能守住的资产，是晶圆厂专属的偏移决策语料库——哪些建议被接受、哪些缺陷最后对应什么结果。节点和模块越多，这套数据越值钱。
