regulatoryTechnicalConstraints:
  - point: "Advanced semiconductor manufacturing and support are exposed to export-control regimes that can restrict customer mix and cross-border service models."
    sourceRefs: [26]
  - point: "Hybrid bonding requires extremely tight surface prep and overlay control, including <2.5nm Cu recess in one imec D2W example and ~50nm overlay targets on the 200nm roadmap."
    sourceRefs: [15, 16, 17]
  - point: "Many critical measurements remain hybrid or complementary across AFM, optical, OCD, e-beam, and destructive reference methods, which raises integration complexity."
    sourceRefs: [5, 6, 8, 14, 30]
  - point: "Buried-feature GAA metrology still requires seeing through optically opaque stacks, so false certainty is dangerous and module-specific calibration is unavoidable."
    sourceRefs: [5, 19]

validationSignals:
  - point: "Nearfield’s $380M round explicitly funds applications centers, production capacity, and deeper customer R&D, signaling that fabs are spending to operationalize new metrology rather than just buy tools."
    sourceRefs: [1]
  - point: "imec has already demonstrated 2µm D2W hybrid bonding with good electrical yield and 200nm W2W hybrid bonding with full-wafer overlay results, which makes the process-control layer more urgent, not less."
    sourceRefs: [15, 17]
  - point: "Public yieldHUB testimonials describe 4% yield improvement, daily PE/QE usage, and order-of-magnitude productivity gains, showing that semiconductor buyers reward analytics when ROI is explicit."
    sourceRefs: [13, 32]
  - point: "HBM is becoming taller and more expensive, with defects increasingly costly to find late in the flow, which strengthens the case for earlier disposition and sampling decisions."
    sourceRefs: [27, 31]

