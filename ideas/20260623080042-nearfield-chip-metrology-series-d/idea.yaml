jobsToBeDone:
  - job: >-
      When a hidden-layer metrology scan flags a possible excursion, help the
      process-control team decide whether to hold, sample, or continue the lot,
      so they can avoid compounding yield loss downstream.
    currentAlternative: >-
      Manual excursion review across SPC dashboards, tool-vendor input, and
      ad hoc yield-engineering meetings
    successMetric: >-
      Lower time from scan alert to lot disposition and fewer downstream steps
      run on later-confirmed bad wafers
  - job: >-
      When a new advanced-node module ramps, help yield engineers learn which 3D
      scan signatures predict real production loss, so they can tune recipes
      faster without over-holding good wafers.
    currentAlternative: >-
      Spreadsheet tracking, offline correlation studies, and engineer memory
      across past excursions
    successMetric: >-
      Faster time to stable excursion thresholds and lower false-hold rate
