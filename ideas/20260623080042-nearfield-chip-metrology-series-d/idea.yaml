topRisks:
  - name: Integration friction
    description: >-
      Semiconductor fabs have fragmented, high-security data environments, so
      connecting metrology, SPC, and process-history systems may slow pilots.
    mitigation: >-
      Start with one module, one tool family, and read-only integrations that
      produce recommendations before attempting any deeper workflow embedding.
  - name: Incumbent pull
    description: >-
      Metrology or process-control incumbents could extend their software stack
      once the action layer proves valuable.
    mitigation: >-
      Own the cross-tool decision workflow and fab-specific feedback corpus,
      which are harder for a single equipment vendor to replicate across mixed
      environments.
  - name: Slow enterprise adoption
    description: >-
      Yield leaders may hesitate to trust new recommendations on production lots
      without clear proof that the system reduces false holds and missed defects.
    mitigation: >-
      Land with an advisory mode tied to one excursion class, publish
      recommendation evidence for every call, and prove cycle-time and
      disposition improvements before asking to expand scope.
