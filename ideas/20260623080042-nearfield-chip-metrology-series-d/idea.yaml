differentiator: >-
  Incumbents largely own the measurement box or the generic process-control
  stack, but the new bottleneck is the action layer between them. This company
  is purpose-built for hidden-layer excursion decisions at advanced nodes: it
  links 3D scan signatures to step history, lot disposition, and recommended
  corrections for one module at a time. The defensible asset is a fab-specific
  corpus of accepted excursion decisions and defect-to-outcome mappings that
  gets more valuable as each node and module ramps.
