problem: >-
  Advanced logic and packaging lines can now manufacture structures that their
  legacy optical inspection stack cannot really see, especially inside deep
  trenches and hidden layers. When process drift or hidden-layer defects escape
  detection, wafers continue through hundreds of expensive downstream steps and
  yield losses compound before a team can isolate root cause. Fabs still have
  tool output, SPC charts, and expert war rooms, but they lack a software layer
  that turns new 3D metrology signals into module-specific hold, release, and
  recipe-change decisions fast enough to protect economics.
targetUser:
  primary: >-
    Directors of process control and yield engineering at advanced logic foundry
    or IDM fabs ramping GAA or hybrid-bonded 3D AI-chip modules
  secondary: >-
    Module integration leaders and equipment engineering managers responsible
    for metrology recipe tuning, excursion review, and wafer disposition
  buyer: VP of process control or fab yield
startupThesis:
  nonObviousInsight: >-
    The scarce asset is no longer only the measurement instrument; it is the
    decision layer that interprets hidden-layer 3D scan signatures quickly
    enough to change the next process step. As advanced nodes outrun optical
    inspection, the winning startup can sit between expensive metrology tools
    and MES/SPC workflows, converting raw scans into yield-preserving actions
    that fabs cannot operationalize with generic analytics alone.
  beachhead: >-
    One pilot advanced-logic fab running Gate-All-Around or hybrid-bonded 3D
    integration for AI accelerators, where a process-control team must review
    hidden-layer metrology excursions before wafers proceed to additional
    high-cost patterning, bonding, or integration steps
  wedge: >-
    A hidden-layer excursion-control workflow that fuses 3D metrology output,
    process-step history, and prior defect outcomes to recommend wafer holds,
    sampling priorities, and recipe corrections for one critical module
  whyNowCatalyst: >-
    Nearfield's rise shows fabs have crossed into architectures where seeing the
    defect is finally possible but acting on it fast enough is the new bottleneck.
  ventureScalePath: >-
    Start with one yield-critical module in a single fab, then expand into
    cross-module excursion management, recipe transfer across sites, supplier
    and equipment feedback loops, and eventually a fab-wide closed-loop process
    intelligence layer for advanced semiconductor manufacturing.
solution: >-
  Hidden Layer Yield OS connects new 3D metrology tools, existing optical
  inspection, SPC data, and process-step history for a single advanced module
  such as GAA or hybrid-bonded integration. It scores hidden-layer anomalies by
  likely downstream yield impact, then recommends whether to hold a wafer lot,
  run confirmatory sampling, or push a targeted process correction before more
  value is added on top of a bad wafer. The first product is not an autonomous
  fab brain; it is a human-in-the-loop excursion board purpose-built for the
  exact moment when expensive hidden-layer scans become available but action is
  still manual and slow. As engineers accept, reject, or modify recommendations,
  the system learns fab-specific defect signatures and becomes the operating
  memory for how one line protects yield at advanced nodes.
