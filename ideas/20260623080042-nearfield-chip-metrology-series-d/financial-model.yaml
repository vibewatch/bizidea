currency: USD
modelStartMonth: "2026-07"

assumptions:
  - id: A1
    name: Starting production modules (M1)
    value: "0"
    unit: count
    source: "[BP executiveSummary — no paying customers at model start; design-partner outreach begins M1]"
  - id: A2
    name: Module 1 pilot start month
    value: "M7"
    unit: month
    source: "[BP experimentRoadmap horizons 0–90 and 90–180 days; ~6 months to secure data access, run blinded replay, and earn design-partner sign-off before charging]"
  - id: A3
    name: Paid pilot contract value per module
    value: "350"
    unit: K USD
    source: "[BP investorMemo.firstCustomer.initialContract — $250K–$500K paid pilot; midpoint $350K used]"
  - id: A4
    name: Pilot duration
    value: "6"
    unit: months
    source: "[BP investorMemo.firstCustomer.initialContract — 6–9 month paid pilot; low end used for conservatism]"
  - id: A5
    name: Annual subscription per module
    value: "2000"
    unit: K USD per module per year
    source: "[research.yaml market.som.rationale — 4 modules × $2.0M recurring value = $8M Y3 SOM; $2.0M per module confirmed as unit pricing target]"
  - id: A6
    name: Quarterly subscription revenue per module
    value: "500"
    unit: K USD per module per quarter
    source: "[Derived from A5: $2,000K / 4 quarters = $500K/quarter]"
  - id: A7
    name: Pilot to production conversion rate
    value: "100"
    unit: percent in base case
    source: "[BP gtm.funnelTargets — paid pilot to annual production contract 60%+; base case assumes all pilots in model convert; downside scenario applies 50% slip]"
  - id: A8
    name: Subscription COGS rate
    value: "20"
    unit: percent of subscription revenue
    source: "[Industry heuristic — enterprise SaaS at scale; region-locked hosting, dedicated support infra, and compliance overhead typically 20–25% of subscription revenue (Bessemer SaaS benchmarks); 20% used as base]"
  - id: A9
    name: Services/pilot COGS rate
    value: "45"
    unit: percent of services revenue
    source: "[Industry heuristic — professional-services-heavy software deployment; Field Apps Lead delivery time + cloud infra + compliance overhead; BP businessModel.revenueStreams notes high-touch deployment and validation fees]"
  - id: A10
    name: Target blended gross margin
    value: "70"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct — 70% stated target; model reaches 76% by Y2 and 78% by Y3 as subscription share grows]"
  - id: A11
    name: Founder/CEO fully-loaded annualized salary
    value: "313"
    unit: K USD
    source: "[Operator judgment — $250K base × 1.25 benefits/employer tax loading; senior deep-tech semiconductor founder salary, US market rate 2026]"
  - id: A12
    name: Founding engineer fully-loaded annualized salary
    value: "338"
    unit: K USD
    source: "[Operator judgment — $270K base × 1.25; senior semiconductor-software engineer with OEM background commands premium; BP team.role Founding eng]"
  - id: A13
    name: Field applications lead fully-loaded annualized salary
    value: "325"
    unit: K USD
    source: "[Operator judgment — $260K base × 1.25; domain expert translating fab excursion logic; BP team.role Field applications/process-control lead]"
  - id: A14
    name: Data platform engineer fully-loaded annualized salary
    value: "313"
    unit: K USD
    source: "[Operator judgment — $250K base × 1.25; hardening metrology/MES/SPC ingestion for region-locked enterprise; BP team.role Data platform engineer]"
  - id: A15
    name: Software engineer (additional hires) fully-loaded annualized salary
    value: "275"
    unit: K USD
    source: "[Operator judgment — $220K base × 1.25; slightly less senior than founding cohort; joins Q4Y1 and Y2–Y3 to build product and connectors]"
  - id: A16
    name: Sales/BD hire fully-loaded annualized salary
    value: "225"
    unit: K USD
    source: "[Operator judgment — $180K base × 1.25; enterprise semiconductor sales, joins Q1Y2 after first pilot proves the motion]"
  - id: A17
    name: Customer success hire fully-loaded annualized salary
    value: "213"
    unit: K USD
    source: "[Operator judgment — $170K base × 1.25; deployment support and expansion; joins Q2Y2 when second module pilot begins]"
  - id: A18
    name: G&A / ops hire fully-loaded annualized salary
    value: "175"
    unit: K USD
    source: "[Operator judgment — $140K base × 1.25; joins Q4Y3 when team reaches 11 FTE and admin overhead justifies the role]"
  - id: A19
    name: Benefits and employer-cost loading factor
    value: "1.25"
    unit: multiplier on base salary
    source: "[Industry heuristic — standard US startup fully-loaded factor: payroll tax ~8%, health/dental/vision ~10%, 401K match ~4%, recruiting amortization ~3%]"
  - id: A20
    name: Quarterly non-payroll overhead year 1
    value: "50–70"
    unit: K USD per quarter
    source: "[Operator judgment — cloud infra, international travel for fab visits, legal/export-control counsel, software tools; starts $50K Q1Y1 growing to $70K Q4Y1 as pilot activity increases]"
  - id: A21
    name: Quarterly non-payroll overhead year 2
    value: "90–135"
    unit: K USD per quarter
    source: "[Operator judgment — grows from $90K Q1Y2 to $135K Q4Y2; reflects Sales/BD travel, customer deployment infra, security compliance costs; driven by module 2-3 onboarding]"
  - id: A22
    name: Quarterly non-payroll overhead year 3
    value: "145–180"
    unit: K USD per quarter
    source: "[Operator judgment — grows from $145K Q1Y3 to $180K Q4Y3; multi-fab region-locked infra, partner conference spend, two-site support overhead]"
  - id: A23
    name: Seed funding raised at M1
    value: "5000"
    unit: K USD
    source: "[BP fundingAsk.targetFundingRangeUsd — $4–6M seed; midpoint $5M used as model starting cash]"
  - id: A24
    name: Module 2 pilot start quarter
    value: "Q2Y2"
    unit: quarter
    source: "[BP milestones horizon 12–24 months — expand to 3–4 total module deployments across at least two customers; assumes Q4Y1 outreach seeds the Q2Y2 pilot]"
  - id: A25
    name: Module 3 pilot start quarter
    value: "Q4Y2"
    unit: quarter
    source: "[BP milestones horizon 12–24 months — partner-sourced or second-customer module; follows 2-quarter sales cycle from Q2Y2 outreach]"
  - id: A26
    name: Module 4 pilot start quarter
    value: "Q2Y3"
    unit: quarter
    source: "[BP milestones horizon 24–36 months — multi-site deployments; 4th module lands via OEM or consortium channel per BP gtm.channels]"
  - id: A27
    name: Monthly churn rate
    value: "0.83"
    unit: percent per month
    source: "[Industry heuristic — 10% annual churn for mission-critical process-control software; once embedded in a fab shift workflow, switching cost is very high (research.yaml dataMoats); equivalent to ~120-month avg customer life]"
  - id: A28
    name: Customer acquisition cost (blended)
    value: "450"
    unit: K USD per production module
    source: "[Derived — Y1 S&M spend $318K acquires 1 pilot module; Y2 S&M ~$475K acquires 2 more; blended ($318+$475)/3 ≈ $264K; grossed up to $450K to account for founder opportunity cost and solutions engineering time embedded in R&D line]"
  - id: A29
    name: Revenue recognition basis
    value: "cash-equivalent; no deferred revenue adjustment"
    unit: policy
    source: "[Simplifying assumption — pilot fees recognized ratably over 6-month pilot period; subscription fees recognized quarterly as earned; actual cash flows may be better if annual contracts paid upfront]"

