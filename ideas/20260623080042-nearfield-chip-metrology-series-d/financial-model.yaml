modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target Fab Modules\n~34 SAM] --> Pilot[Paid Pilot\n$350K / 6 mo]
      Pilot -->|60pct conversion| Sub[Annual Subscription\n$2M per module]
      Sub --> Revenue[Quarterly Revenue\n$500K per module]
      Revenue --> COGS[COGS\n20pct subscription\n45pct services]
      Revenue --> GP[Gross Profit\n75-78pct]
      GP --> Opex[Opex\nHeadcount + Overhead]
      GP --> EBITDA[EBITDA]
      EBITDA --> Cash[Cash EOP\nrolls forward quarterly]

modelSanity:
  - checkName: Revenue engine
    finding: "Revenue is driven by sequential paid-pilot-to-$2M-subscription conversion at $500K/module/quarter; the base case needs four modules under contract by Q4Y3 to hit $6.5M annual revenue and a $8M ARR run-rate consistent with research.yaml SOM."
  - checkName: Must go right
    finding: "Module 1 pilot must convert to a production subscription before Q1Y2 month 15 — that single conversion swings Q1Y2 EBITDA from roughly -$500K to -$24K and keeps the company funded without a bridge raise."
  - checkName: Model breaks if
    finding: "Integration into metrology, SPC, and MES data stacks slips beyond 9 months per customer — the downside scenario shows this delays Module 4 to Y4, collapses Y3 revenue from $6.5M to $4.2M, and drives the cash trough to $2.5M, below 6 months of runway."
  - checkName: Next-round proof
    finding: "Three paying production module subscriptions with documented disposition-time improvement plus at least one second-fab pilot by Q3Y3 justify a Series A milestone and demonstrate repeatable enterprise motion beyond a single design-partner relationship."

sanityChecks:
  ruleOf40: "Y2→Y3 revenue growth 115% + Y3 EBITDA margin 48% = 163% (well above 40; typical for high-ARPU enterprise software in hypergrowth phase with 4-customer concentration)"
  burnMultiple: "Y1 net burn $1.14M / new ARR added ~$700K (pilot annualized) = 1.6x burn multiple — acceptable at seed stage for a capital-light software wedge with long enterprise sales cycles"
  revenuePerFte: "$593K Y3 (11 FTE); benchmark $200–400K for SaaS — above range due to $2M/module ARPU; 4-customer concentration inflates numerator and will normalize as headcount scales with pipeline"
  flags:
    - "Four-customer revenue concentration in Y3: a single non-renewal in Q4Y3 removes $500K revenue and ~$390K EBITDA; model does not include a partial-churn hedge."
    - "Module 1 pilot-to-production conversion is a single point of failure for Y2 cash flow; any slip past M15 turns Q1Y2 cash-flow negative by ~$450K and may require a bridge or accelerated seed extension."
    - "Subscription COGS of 20% assumes shared cloud infrastructure; region-locked customer-VPC deployments (required by some fabs per BP operations) may push subscription COGS to 25–30%, reducing Y3 EBITDA by $130–200K."
    - "CAC of $450K relies on founder-led direct sales efficiency throughout Y1–Y2; post-founder handoff to Sales/BD hire in Q1Y2 may increase marginal CAC toward $600K+ for Modules 3–4."
    - "Y3 gross margin of 78% exceeds BP target of 70%; this is achievable only if subscription revenue exceeds 85% of Y3 mix — valid by Q4Y3 but not in Q1–Q2Y3 when two pilots are still in services mode."
