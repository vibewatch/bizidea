  downside:
    description: "Sales cycles extend to 12–15 months per module; only 3 modules reach production by Q4Y3; Module 2 conversion slips to Q2Y3 and Module 3 to Q4Y3; cash trough deepens as Y2 revenue ramps slowly."
    y3RevenueK: 4200.0
    y3EbitdaK: 1300.0
    cashLowPointK: 2500.0
    keyAssumptionChanges:
      - "Sales cycle extends from 9 to 14 months (A2 assumption violated)"
      - "Module 3 converts Q4Y3 instead of Q2Y3; Module 4 not closed in Y3"
      - "Q1Y2 revenue near zero as Module 1 pilot overruns; cash trough at ~$2.5M"
  base:
    description: "Four modules reach production by Q4Y3 following the model plan; Module 1 pilot converts in Q1Y2, Module 2 in Q4Y2, Module 3 in Q2Y3, Module 4 in Q4Y3; gross margin exits Y3 at 78%."
    y3RevenueK: 6525.0
    y3EbitdaK: 3164.0
    cashLowPointK: 3837.0
    keyAssumptionChanges:
      - "Baseline assumptions A1–A29 hold as stated"
  upside:
    description: "OEM partner channel sources Module 5 by Q3Y3; Module ARPU grows to $2.2M as cross-module analytics expand; second fab site pilot closes Q4Y3."
    y3RevenueK: 8500.0
    y3EbitdaK: 4700.0
    cashLowPointK: 3837.0
    keyAssumptionChanges:
      - "Partner-sourced Module 5 signed Q3Y3 (BP gtm.channels — co-sell with metrology OEM)"
      - "ARPU lifts to $2,200K via cross-module analytics upsell (BP businessModel.expansionLevers)"
      - "Gross margin improves to 81% as subscription mix exceeds 90% of revenue"

