slug: hidden-layer-yield-os
date: 2026-06-23
executiveSummary: >-
  Hidden Layer Yield OS is a vendor-neutral decision layer for leading-edge
  fabs that now can see buried defects with new 3D metrology but still cannot
  act on those signals fast enough inside production workflows. The initial
  beachhead is one yield-critical GAA module in a top-tier logic foundry or IDM
  where process-control teams still use war rooms, SPC dashboards, and vendor
  application support to decide whether to hold, sample, or continue lots. The
  product should land in advisory mode first, because trust and data access are
  the gating constraints, not model novelty. The commercial logic is coherent:
  a node ramp or new metrology-tool install creates the pain, the VP of process
  control or fab yield owns the economic loss, and a paid module deployment can
  be justified on avoided downstream wafer loss and faster disposition. The
  research supports a narrow but valuable market, with an estimated $250.0M TAM,
  $85.0M beachhead SAM, and $8.0M year-3 SOM, but it does not identify named
  design partners or an acceptable false-hold threshold for first deployment.
  The company should therefore defer full-fab rollout, closed-loop automation,
  and packaging/HBM adjacency until it proves lower disposition time and fewer
  false holds on one module without increasing escaped defects. Defensibility
  comes from a fab-specific corpus of accepted recommendations, process context,
  and downstream yield outcomes that general analytics platforms and single-tool
  OEM software will struggle to replicate. The board-level risk is simple: if
  read-only pilots cannot earn trusted operator usage and measurable disposition
  improvement within 12 months, this is not yet a venture-scale software
  company.
problem:
  - Leading-edge GAA and 3D integration flows now contain buried structures that legacy optical workflows cannot inspect cleanly, so critical defects are visible only after expensive downstream value has already been added.
  - Process-control teams still rely on manual excursion review across SPC, tool output, and expert meetings, which slows lot disposition and increases both escaped-defect risk and false holds.
solution:
  - Hidden Layer Yield OS ingests 3D metrology output, process-step history, and existing SPC context for one module and recommends hold, sample, or targeted process-correction actions in the same shift.
  - The first product is a human-in-the-loop excursion board with recommendation evidence and feedback capture, not autonomous process control, so fabs can build trust before granting broader authority.
whyWeWin:
  - The company targets the action layer between metrology OEMs and generic process-control suites, where the workflow pain is urgent but no vendor-neutral default appears established in the research.
  - A fab-specific dataset linking hidden-layer signatures, accepted decisions, and downstream yield outcomes compounds with every reviewed excursion and becomes operational memory that is hard to reproduce internally or by a single tool vendor.
  - The wedge is narrow enough to prove ROI on one module yet expandable into cross-module excursion management, recipe transfer, and broader fab process intelligence.
strategicChoices:
  beachhead: One advanced-logic GAA module at a top-tier foundry or IDM where new 3D metrology is already installed and same-shift lot disposition still depends on manual expert review.
  wedgeRationale: Starting with one GAA module creates faster proof than launching across multiple modules or packaging workflows because the pain is acute, the stakeholders are identifiable, and disposition-time improvement can be measured against a single recurring excursion class.
  sequencingRationale: The company must earn trust in advisory mode before it asks for deeper workflow authority, so product starts with read-only recommendations, GTM starts with founder-led design partners, hiring starts with domain-heavy applications talent, and partnerships start with OEM and consortium access rather than broad channel scale.
  notYet:
    - Full closed-loop recipe automation without human approval
    - Fab-wide SPC or MES replacement
    - Hybrid-bonded packaging and HBM module expansion before one front-end module shows repeatable ROI
market:
  tam: "$250.0M"
  sam: "$85.0M"
  som: "$8.0M"
  segments:
    - Leading-edge logic foundries and IDMs ramping GAA modules for AI accelerators
    - Advanced-packaging and hybrid-bonding groups that can be added after the first module proof point
  buyingProcess: >-
    The sale is a long, technical enterprise motion led by process-control and
    yield teams, with VP-level approval once a pilot shows that read-only
    recommendations improve lot disposition economics. Procurement will likely
    require a scoped module pilot, security review, and proof that false holds
    and escaped defects do not worsen.
product:
  mvp: >-
    A read-only excursion board for one GAA module that combines hidden-layer 3D
    scans, SPC context, and lot history to rank excursions and recommend hold,
    sample, or correction actions with human- readable evidence. MVP excludes
    automated recipe changes and focuses on replay, operator review, and
    recommendation capture.
  sixMonth: >-
    Complete connectors for one metrology tool family plus SPC/MES history, run
    blinded historical replay on one excursion family, and deploy advisory-mode
    recommendations to one design partner shift workflow.
  twelveMonth: >-
    Support production shadow mode on one module, add engineer feedback loops
    and disposition analytics, and prove measurable improvement in
    disposition-cycle time and false-hold rate versus the customer's prior
    workflow.
  twentyFourMonth: >-
    Expand from one module into adjacent advanced-node modules and a second fab
    site, with reusable playbooks for excursion classification, cross-module
    process memory, and region-locked deployment.
  keyBets:
    - Read-only integration is sufficient to deliver first ROI before any deep MES control rights are granted.
    - Engineers will trust evidence-backed recommendations faster than they would trust autonomous control.
    - Module-specific models outperform generic semiconductor analytics in hidden-layer disposition workflows.
gtm:
  wedge: >-
    Sell a paid advisory-mode hidden-layer excursion-control deployment for one
    GAA module during a node ramp or new 3D metrology rollout, with success
    defined by faster scan-alert-to-disposition decisions and fewer unnecessary
    wafers proceeding downstream.
  channels:
    - Founder-led direct sales to VP process-control and fab-yield leaders at top-tier foundries and IDMs
    - Co-sell and referral access through metrology OEM application teams
    - Design-partner entry through imec, A*STAR IME, and advanced-packaging ecosystem relationships
  funnelTargets: "target account to qualified pilot 20-30%, qualified pilot to paid pilot 50%+, paid pilot to annual production contract 60%+"
  pricing: >-
    Charge a high-touch deployment fee for integration, replay validation, and
    excursion-playbook setup, then convert to an annual subscription priced per
    fab module and monitored lot volume; this matches how value is created and
    keeps the first contract tied to one measurable workflow.
businessModel:
  revenueStreams:
    - Deployment and validation services for data mapping, historical replay, and model tuning
    - Annual software subscription per fab module
    - Expansion revenue for additional modules, sites, and cross-module analytics
  unitOfValue: One monitored fab module with defined hidden-layer excursion workflows
  targetGrossMarginPct: 70
  expansionLevers:
    - Add adjacent modules in the same fab once one workflow reaches trusted operator usage
    - Add cross-site recipe-transfer and excursion-memory products for the same customer
    - Extend into hybrid-bonding and HBM-related modules after front-end proof
strategyMap:
  northStarMetric: Percentage of hidden-layer excursion lots dispositioned within the same shift with evidence-backed recommendations accepted by engineers
  inputMetrics:
    - Time from scan alert to lot disposition
    - Recommendation acceptance rate by process-control engineers
    - False-hold rate versus baseline
    - Escaped-defect rate versus baseline
    - Time to integrate first metrology plus SPC/MES data set
  moatsToBuild:
    - Fab-specific corpus of hidden-layer signatures, decisions, and yield outcomes
    - Vendor-neutral data model spanning metrology, SPC, MES, and genealogy for one module
    - Trust layer of evidence-backed recommendations and engineer feedback history
  killCriteria:
    - No design partner grants read-only access to metrology, SPC, and lot-history data for one module within 6 months.
    - Historical replay and shadow mode fail to reduce disposition time by at least 30% while keeping escaped-defect rate flat after two pilot datasets.
    - Paid pilots do not convert into at least one annual production contract within 12 months of first deployment.
  mermaid: |
    flowchart LR
      Wedge[One GAA module wedge] --> MVP[Advisory mode excursion board]
      MVP --> Proof[Lower disposition time and fewer false holds]
      Proof --> Expansion[More modules, sites, and packaging workflows]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong technical wedge and real pain, but conviction depends on proving data access and operator trust in one live module.
    whyBelieve: Leading-edge fabs now have hidden-layer visibility without an established vendor-neutral action layer, creating a credible opening for a workflow-first software company.
    whyDoubt: The buyer set is tiny, incumbents are adjacent, and the company fails if pilots cannot clear integration, trust, and ROI hurdles quickly.
    nextDiligence: Validate one design-partner pilot where historical replay can show at least 30% faster lot disposition and no increase in escaped defects.
  firstCustomer:
    title: Director of process control at a top-tier GAA logic fab
    profile: One leading-edge foundry or IDM module team ramping AI-accelerator production with new 3D metrology but still resolving hidden-layer excursions through manual expert review.
    trigger: A node ramp or new hidden-layer metrology install reveals recurring excursions that are being found too late to avoid downstream wafer loss.
    buyer: VP of process control or fab yield
    initialContract: 6-9 month paid pilot worth $250k-$500k that converts to a $1.5M-$2.5M annual module subscription plus expansion services if ROI is proven.
  mustBeTrue:
    - One module workflow exists where scan-alert-to-disposition delay is materially painful and owned by a VP-level buyer.
    - Read-only integration into metrology, SPC, and lot-history systems can be completed without a multi-year IT project.
    - Historical replay can identify a recommendation policy that cuts false holds or disposition time without increasing escaped defects.
    - Engineers will use a recommendation board every shift and feed back accepted or rejected actions often enough to build proprietary decision memory.
    - OEMs and ecosystem partners tolerate or support a vendor-neutral action layer instead of blocking data access or bundling it away.
  diligenceQuestions:
    - Which exact GAA module workflow consumes the most senior engineering time today between scan alert and lot disposition?
    - What false-hold and escaped-defect thresholds would a first customer accept for shadow-mode evaluation?
    - How much data access can the startup get from mixed metrology environments without OEM resistance?
    - Is the first faster path to revenue front-end GAA control or hybrid-bonding packaging control?
    - Does the buyer require on-prem or customer-VPC deployment from day one?
operatingAssumptions:
  - assumption: A single-module advisory deployment is easier to approve than a broader fab analytics rollout.
    basis: research.yaml
    validationTest: Secure one pilot scope limited to one module and compare sales-cycle length versus any request for wider scope.
    decisionImpact: If false, the company must package a broader platform story earlier and raise more capital for longer enterprise sales cycles.
  - assumption: Module-level annual subscription value can reach the low seven figures once a paid pilot proves ROI.
    basis: operator judgment
    validationTest: Test willingness to pay in pilot negotiations and confirm at least one customer will sign an annual production contract in the $1.5M-$2.5M range after pilot success.
    decisionImpact: If false, the TAM shrinks materially and the company should narrow services intensity or avoid venture financing.
  - assumption: Recommendation evidence and human approval are enough to overcome operator trust barriers before automation is offered.
    basis: idea.yaml
    validationTest: Measure weekly active engineer usage, recommendation acceptance rate, and qualitative trust feedback during shadow mode.
    decisionImpact: If false, product must shift toward analytics-only reporting or much deeper workflow embedding with slower adoption.
  - assumption: Vendor-neutral cross-tool positioning creates more value than building tightly around one OEM alone.
    basis: research.yaml
    validationTest: Compare pilot access speed, data richness, and expansion potential across one OEM-led deal and one mixed-tool customer conversation.
    decisionImpact: If false, the company should choose an OEM-centric distribution strategy and accept lower independence in exchange for faster market entry.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Map one target GAA module workflow from scan alert to lot disposition with 6-8 buyer and user interviews.
    hypothesis: The current workflow has a repeatable delay and decision bottleneck that is painful enough to fund a pilot.
    successMetric: At least 4 interviewees quantify a current disposition SLA problem or false-hold cost and agree on one priority excursion family.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run a technical integration spike on read-only ingest from one metrology source plus SPC and lot history.
    hypothesis: First-value data access can be achieved without deep MES control-plane integration.
    successMetric: Time to first joined dataset under 6 weeks for one design partner module.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Replay historical excursion cases in blinded mode against past human disposition decisions.
    hypothesis: Evidence-backed recommendations can cut decision time and reduce false holds on one excursion family.
    successMetric: At least 30% faster modeled disposition time with escaped-defect rate no worse than baseline.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Pilot a recommendation review board with named process-control engineers in shadow mode.
    hypothesis: Engineers will review and annotate recommendations often enough to create proprietary training data.
    successMetric: At least 70% weekly active usage by the named pilot team and recommendation feedback on at least 60% of flagged lots.
    owner: Field applications lead
  - horizon: 6–12 months
    experiment: Convert one advisory pilot into a paid annual production deployment.
    hypothesis: ROI on one module is strong enough to justify module-based recurring software spend.
    successMetric: One signed annual contract and one documented expansion plan to a second module.
    owner: Founder CEO
  - horizon: 12–18 months
    experiment: Test partner-led pipeline through one metrology OEM or consortium relationship.
    hypothesis: Partner channels shorten access to qualified pilots without collapsing vendor neutrality.
    successMetric: Two qualified pilot opportunities sourced by partners and at least one reaching paid evaluation.
    owner: Founder CEO
operations:
  - Region-locked deployment architecture with read-only ingestion as the default implementation path
  - Formal recommendation evidence logs for every hold, sample, or correction suggestion
  - Joint account planning with OEM application teams and selected consortium partners
  - Customer-specific security review and data-governance process before pilot start
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the first data connectors, replay engine, and recommendation workflow for one module.
  - role: Field applications / process-control lead
    startTiming: Month 0-3
    rationale: Translate fab excursion logic into product requirements and earn trust with yield engineers during pilots.
  - role: Data platform engineer
    startTiming: Month 3-6
    rationale: Harden metrology, SPC, MES, and genealogy ingestion for region-locked enterprise deployments.
  - role: Founder-led sales and partnerships
    startTiming: Month 0
    rationale: First deals require senior credibility with fabs, OEMs, and research-consortium partners rather than a scaled SDR motion.
milestones:
  - horizon: 0–12 months
    items:
      - Secure one design partner with read-only data access for a single GAA module
      - Complete historical replay and shadow-mode pilot for one excursion family
      - Convert one pilot into a paid annual production deployment
  - horizon: 12–24 months
    items:
      - Expand to 3-4 total module deployments across at least two customers
      - Launch reusable playbooks for cross-module excursion memory and recommendation evidence
      - Add one partner-sourced deployment path through an OEM or consortium relationship
  - horizon: 24–36 months
    items:
      - Reach multi-site deployments with region-locked delivery
      - Expand into hybrid-bonding or HBM-adjacent modules using the same decision-layer architecture
      - Prove that accepted-decision memory improves ramp time for new modules
risks:
  - risk: Integration into metrology, SPC, MES, and genealogy systems takes longer than customers will tolerate.
    likelihood: High
    impact: High
    mitigation: Start with one module, one tool family, and read-only ingest, and refuse custom scope that delays time to first replay.
  - risk: Engineers do not trust the recommendation layer on production lots.
    likelihood: High
    impact: High
    mitigation: Require advisory mode, show evidence for every recommendation, and focus first on one excursion family with measurable retrospective proof.
  - risk: Incumbent OEM or process-control vendors bundle similar workflow features before the startup establishes beachhead accounts.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on vendor-neutral cross-tool workflows, feedback memory, and faster module-specific deployment rather than generic analytics.
  - risk: Export controls and customer IP restrictions limit geography, staffing, or deployment architecture.
    likelihood: Medium
    impact: Medium
    mitigation: Prioritize region-locked deployments, narrow initial geographies, and design partner selection around compliance feasibility.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$4-6M"
  runwayMonths: 18
  useOfFundsSummary: Build the first production-grade module deployment capability, hire domain-heavy applications and data-platform talent, complete one paid design-partner pilot, and convert initial proof into 3-4 module opportunities.
