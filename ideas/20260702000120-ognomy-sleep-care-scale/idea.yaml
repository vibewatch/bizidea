ideaScorecard:
  signalStrength:
    score: 4
    rationale: Two corroborating July-1 sources confirm a $20M Series A, national virtual-visit scale, and an
      explicit adherence/wearable product roadmap, giving concrete evidence the underlying clinical model works.
  painIntensity:
    score: 5
    rationale: Unmanaged sleep apnea can cost a CDL driver their DOT medical certification and job, and costs the
      fleet lost driving days and liability exposure, making this a legally and financially forcing problem.
  wedgeClarity:
    score: 4
    rationale: The wedge is a narrow, well-defined pipeline (mobile testing, virtual titration, compliance reporting)
      sold to one accountable buyer with a specific regulatory trigger.
  defensibility:
    score: 3
    rationale: Data ties (adherence history, fleet-specific compliance records, driver qualification file
      integrations) build switching costs, though incumbents or Ognomy itself could eventually build a similar
      occupational module.
  ventureScale:
    score: 4
    rationale: The beachhead is bounded, but the same compliance-record model extends to other FMCSA- and
      safety-sensitive occupational categories and eventually to broader employer sleep-health compliance programs.
topRisks:
  - name: Incumbent expansion risk
    description: Ognomy or another well-funded virtual sleep clinic could add an occupational/fleet compliance
      module once they notice the segment, leveraging their existing clinical network and capital advantage.
    mitigation: Move first on driver qualification file integrations and fleet safety software partnerships that
      create switching costs a later entrant cannot replicate quickly.
  - name: Regulatory and reimbursement dependency
    description: The business model depends on FMCSA medical certification rules continuing to treat OSA adherence
      as a certification factor; a policy change could remove the forcing function entirely.
    mitigation: Build the adherence-tracking and compliance-reporting engine so it is valuable for general
      occupational health and workers' comp risk management even if the specific FMCSA rule changes.
  - name: Field logistics failure
    description: Mobile test kit distribution and titration scheduling around unpredictable dispatch routes could
      break down operationally, undermining the core speed advantage over incumbent referral clinics.
    mitigation: Start with a small number of high-volume terminal hubs to prove the logistics model before
      expanding to distributed, less predictable truck-stop drop points.
