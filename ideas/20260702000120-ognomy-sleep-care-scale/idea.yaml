differentiator: >-
  General virtual sleep clinics like Ognomy compete on consumer convenience and primary-care referral volume. This
  product competes on a different axis entirely: it is sold to an employer with a regulatory deadline and a single
  accountable buyer, and its core deliverable is a compliance artifact (the driver qualification file entry), not
  just a clinical outcome. That makes the sales motion enterprise (per-fleet contracts) rather than consumer
  (per-patient acquisition), and it creates a data moat: adherence and recertification outcomes tied to specific
  fleets and FMCSA audit cycles that a general consumer sleep-telehealth company has no reason to build.
