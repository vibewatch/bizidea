problem: >-
  Commercial truck drivers have obstructive sleep apnea (OSA) at roughly double the rate of the general population, and
  FMCSA medical examiner guidance treats undiagnosed or untreated OSA as grounds to deny or shorten a driver's DOT
  medical certification. Self-insured trucking and logistics fleets discover this risk episodically, at a driver's
  biennial DOT physical, and then have no fast path to testing, titration, or compliance proof: drivers get referred to
  independent sleep labs with multi-week waitlists, get pulled off routes while waiting, and fleets have no auditable
  way to show a medical examiner or FMCSA auditor that a flagged driver is actually adherent to therapy. The result is
  lost driving days, disrupted routes, and safety and liability exposure that falls on the fleet's occupational health
  and safety team, not on the driver alone.
targetUser:
  primary: Director of occupational health or fleet safety at a self-insured trucking or logistics carrier
  secondary: CDL drivers flagged for suspected obstructive sleep apnea at a DOT medical exam
  buyer: VP of Safety and Compliance or Chief Medical Officer overseeing DOT certification for the fleet
startupThesis:
  nonObviousInsight: >-
    Ognomy's scale-up proves the clinical and reimbursement playbook for virtual-first sleep-apnea care works, but its
    growth engine is a consumer/primary-care referral funnel that has no reason to prioritize the segment where
    sleep-apnea treatment is most urgent and highest-stakes: safety-sensitive workers whose job and driving
    certification legally depend on proven CPAP adherence. That population has a single, motivated budget owner (the
    self-insured employer or its stop-loss carrier), a regulatory deadline instead of a discretionary wellness
    decision, and no existing vendor that ties diagnosis and adherence data directly into the driver qualification
    file FMCSA auditors and medical examiners actually check.
  beachhead: Self-insured trucking and logistics carriers with 500 to 5,000 CDL drivers whose occupational health teams
    manage DOT medical certification renewals and are already flagging drivers for suspected sleep apnea at biennial
    physicals
  wedge: A mobile home-sleep-test-to-CPAP-compliance pipeline that ships testing kits to terminals and truck stops,
    runs virtual titration visits, and streams adherence data straight into the driver qualification file as an
    auditable FMCSA-ready compliance record
  whyNowCatalyst: Ognomy's $20M raise and 85,000-visit scale show virtual-first sleep-apnea diagnosis and adherence
    tracking is now a proven, investable clinical model, but its funding and product roadmap are aimed at wearable
    integration and consumer referral channels rather than the regulatory-driven occupational fleet market.
  ventureScalePath: Start with trucking and logistics fleets, expand to other FMCSA- and safety-sensitive occupational
    categories (rail, aviation ground crews, maritime, heavy-equipment operators), then broaden into a general
    occupational sleep-health compliance platform sold through self-insured employer health plans and stop-loss
    carriers.
solution: >-
  The product is an occupational sleep-apnea compliance program a fleet safety director can trigger the moment a
  medical examiner flags a driver during a DOT physical. A home sleep test kit ships to the driver's terminal or a
  designated truck-stop partner location within days, results route to a virtual sleep physician for same-week
  diagnosis, and if OSA is confirmed the driver starts CPAP with remote titration visits scheduled around dispatch
  windows instead of clinic hours. A connected CPAP device streams nightly usage data into a compliance dashboard that
  auto-generates the adherence documentation FMCSA medical examiners require to keep or restore certification, and
  alerts the fleet safety team before a driver's compliance lapses into a certification risk. Unlike a general virtual
  sleep clinic, the product's core deliverable is the audit-ready compliance record, not just the clinical visit.
goToMarketSeed:
  firstCustomer: Occupational health or safety compliance director at a self-insured trucking or logistics carrier
    running 500 to 5,000 CDL drivers with in-house DOT medical exam coordination
  buyingTrigger: A DOT medical examiner flags a driver for suspected OSA at a biennial physical, or an internal audit
    or stop-loss carrier review finds a cluster of drivers with unmanaged sleep-apnea risk
  currentAlternative: Manual referral to an independent occupational medicine clinic or regional sleep lab, tracked
    with spreadsheets and paper adherence letters in the driver qualification file
  switchingReason: It compresses a multi-week referral-to-diagnosis cycle that keeps drivers off the road into a
    days-long virtual pathway, and it is the only option that outputs adherence data already formatted for the
    driver qualification file instead of requiring the safety team to assemble it themselves
  pricingHypothesis: Per-enrolled-driver annual fee to the fleet, with an incremental per-compliance-report fee tied
    to DOT certification cycles
