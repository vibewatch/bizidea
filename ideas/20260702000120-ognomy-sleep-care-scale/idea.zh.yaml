jobsToBeDone:
- job: 当 DOT 体检医师标记出疑似睡眠呼吸暂停的司机时，帮助车队安全总监尽快让该司机完成检测和确诊，避免司机因等待预约而停运数周。
  currentAlternative: 手动转诊到独立职业医学诊所或区域睡眠实验室，往往需要排队数周
  successMetric: 从标记到确诊的天数，以及每名被标记司机保住的运营天数
- job: 当车队安全团队需要为 DOT 复审认证证明司机的 CPAP 依从性时，帮助他们生成可审计的依从性记录，从而不靠人工拼凑材料就能通过 FMCSA 审查。
  currentAlternative: 手动整理电子表格和纸质依从性证明信，归入驾驶员资质档案
  successMetric: 复审认证时拥有完整、可审计合规记录的被标记司机比例
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两篇互相印证的 7 月 1 日报道确认了 $20M A 轮融资、全国性的虚拟问诊规模，以及明确的依从性/可穿戴设备产品路线图，为底层临床模式行得通提供了实打实的证据。
  painIntensity:
    score: 5
    rationale: 未管理的睡眠呼吸暂停可能让 CDL 司机失去 DOT 医疗认证和工作，也让车队付出运营天数流失和责任风险，这是一个法律和财务上都具有强制性的问题。
  wedgeClarity:
    score: 4
    rationale: 这个切入点是一条边界清晰的窄流水线（移动检测、虚拟压力滴定、合规报告），卖给一个有具体监管触发条件的责任买家。
  defensibility:
    score: 3
    rationale: 数据绑定（依从性历史、车队专属合规记录、驾驶员资质档案集成）会建立转换成本，但现有厂商甚至 Ognomy 自己最终都可能搭建类似的职业化模块。
  ventureScale:
    score: 4
    rationale: 滩头市场规模有限，但同一套合规记录模式可以延伸到其他受 FMCSA 监管、安全敏感的职业类别，最终扩展到更广泛的雇主睡眠健康合规项目。
topRisks:
- name: 现有厂商扩张风险
  description: Ognomy 或其他资金充裕的虚拟睡眠诊所一旦注意到这个细分市场，就可能凭借既有的临床网络和资本优势加入职业/车队合规模块。
  mitigation: 率先在驾驶员资质档案集成和车队安全软件合作上落子，建立后来者难以快速复制的转换成本。
- name: 监管与报销依赖风险
  description: 商业模式依赖 FMCSA 医疗认证规则持续把 OSA 依从性作为认证因素；一旦政策变化，这个强制驱动因素可能彻底消失。
  mitigation: 把依从性追踪与合规报告引擎打造成即便特定 FMCSA 规则改变，也对通用职业健康和工伤风险管理有价值的产品。
- name: 现场物流失败风险
  description: 围绕不可预测调度路线的移动检测套件配送和压力滴定排期，在运营上可能出现纰漏，削弱相对现有转诊诊所的核心速度优势。
  mitigation: 先从少数几个高流量车队枢纽站点入手验证物流模式，再扩展到分散、可预测性更差的卡车休息站投放点。
