scenarios:
  downside:
    description: "车队采购决策仍然比较分散，标准材料包的接受度提升缓慢，渠道杠杆比计划来得更晚。"
    y3RevenueK: 1809.0
    y3EbitdaK: -1125.8
    cashLowPointK: -271.1
    keyAssumptionChanges:
    - "标准化的年化 ARPU 稳定在约 $108K，而不是 $114K，因为材料包和监测费收入面较窄。"
    - "Y3 期末只做到 28 家车队而不是 40 家，试点到落地的节奏拉长，直接需求也不如预期集中化。"
    - "毛利率停滞在 68%-69% 左右，一名数据/集成岗提前招聘，因为人工质检和返工持续存在。"
  base:
    description: "三个付费试点成为验证点，撬动 Y2 稳定的直接签约，并带来 Y3 的渠道协助扩张。"
    y3RevenueK: 2660.0
    y3EbitdaK: -394.4
    cashLowPointK: 475.6
    keyAssumptionChanges:
    - "标准化的年化 ARPU 从 Y1 的 $105K 提升到 Y2-Y3 的 $114K，与研究测算 SOM 隐含的每家车队价值一致。"
    - "客户数量从 Y1 期末的 3 家付费车队，增长到 Y2 期末的 10 家，再到 Q4Y3 的 40 家，与商业计划的第 3 年目标一致。"
    - "一旦窄 HST、PAP 和 DQ 工作流在各车队间变得可复用，毛利率就会达到 70%-73%。"
  upside:
    description: "被接受的模板标准化得更快，一个渠道更早跑通，定价也捕获了更多材料包和监测方面的价值。"
    y3RevenueK: 3250.0
    y3EbitdaK: 146.3
    cashLowPointK: 890.0
    keyAssumptionChanges:
    - "随着更多车队购买持续监测、材料包数量扩大，标准化的年化 ARPU 上升到约 $120K。"
    - "Y3 期末做到 46 家车队，因为合作方带来的需求在 Y2 末就开始出现，压缩了从试点到年度落地的时间。"
    - "毛利率提升到约 72%-75%，同时因为模板和连接器可复用，后期的支持类招聘保持克制。"
