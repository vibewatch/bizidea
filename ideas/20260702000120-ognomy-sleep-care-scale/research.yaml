openQuestions:
- What percentage of 500-5,000-driver self-insured fleets already centralize sleep-apnea escalation instead of leaving it to local clinics and drivers?
- How often do medical examiners ask for 30-day versus 12-month CPAP reports in practice, and which report format is most consistently accepted?
- Which PAP, HST, and DQ-file systems expose enough data to automate the compliance artifact without custom work for every fleet?
- Will stop-loss carriers, TPAs, or occupational-health partners sponsor this as a risk-management tool, or will fleets treat it as a narrow medical-benefit problem?
