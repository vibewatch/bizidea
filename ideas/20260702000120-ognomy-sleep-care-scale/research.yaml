  stage: scale-up
  wedge: Virtual sleep-care platform with payer, physician, and employer distribution plus remote monitoring and growing diagnostic infrastructure.
  pricing: Insurance-based or enterprise-partnership pricing
  strength: Strong channel breadth, growth funding, and evidence that remote CPAP setup can sustain Medicare compliance.
  weaknessVsUs: Broad sleep-care platform, not a trucking-specific compliance operating system.
