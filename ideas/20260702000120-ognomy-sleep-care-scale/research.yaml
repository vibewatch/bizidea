regulatoryTechnicalConstraints:
- point: There is no specific FMCSA OSA screening mandate, so the workflow must tolerate examiner discretion and employer-specific escalation policies.
  sourceRefs:
  - 36
  - 39
  - 63
- point: Certified medical examiners and driver qualification files remain the authoritative certification workflow, so any compliance record must map cleanly to Part 391 paperwork expectations.
  sourceRefs:
  - 40
  - 41
- point: PAP coverage and continued qualification depend on approved sleep-test pathways, documented adherence, and follow-up evidence rather than patient self-report alone.
  sourceRefs:
  - 43
  - 44
  - 65
- point: Home sleep testing is appropriate only for the right clinical cohort; some drivers will still need escalation to in-lab testing or more specialist oversight.
  sourceRefs:
