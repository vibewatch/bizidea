  validationPlan:
  - priority: high
    question: How often do 500-5,000-driver fleets centralize OSA escalation instead of leaving it to local clinics and drivers?
    evidenceToGather: Interview 8-10 safety or occupational-health leaders at self-insured carriers and map the current escalation flow from flagged exam to returned driver.
  - priority: high
    question: 'Which artifact actually unlocks budget first: preserved driver uptime, lower audit risk, or lower crash/liability exposure?'
    evidenceToGather: Pilot one fleet and measure days from flag to diagnosis, time to compliance proof, and count of near-expired or missing med-cert records caught early.
  - priority: medium
    question: Which PAP/HST and DQ-file systems can export enough data to automate the compliance artifact without custom work for every fleet?
    evidenceToGather: Hands-on connector tests with one HST vendor, one PAP-monitoring workflow, and two DQ-file platforms used by trucking fleets.
