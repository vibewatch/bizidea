  geographicConsiderations:
  - point: The United States is the natural first market because Part 391 creates one federal certification frame across interstate fleets.
    sourceRefs:
    - 39
    - 40
    - 41
  - point: Nationwide clinician coverage is table stakes for dispersed fleets; Ognomy and GEM show it is possible but operationally nontrivial.
    sourceRefs:
    - 4
    - 16
    - 18
  - point: Terminal density and route concentration matter more than consumer geography because kit delivery, device return, and follow-up must fit dispatch realities.
    sourceRefs:
