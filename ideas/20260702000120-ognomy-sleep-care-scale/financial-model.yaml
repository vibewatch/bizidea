scenarios:
  downside:
    description: "Fleet buying stays more fragmented, standard packet acceptance improves slowly, and channel leverage arrives later than planned."
    y3RevenueK: 1809.0
    y3EbitdaK: -1125.8
    cashLowPointK: -271.1
    keyAssumptionChanges:
      - "Normalized annual ARPU settles near $108K instead of $114K because packet and monitoring fees stay narrow."
      - "Y3 exits at 28 fleets instead of 40 as pilot-to-rollout timing stretches and direct demand stays less centralized."
      - "Gross margin stalls around 68%-69% and one data/integration hire is pulled forward because manual QA and rework persist."
  base:
    description: "Three paid pilots become the proof points that unlock steady direct wins in Y2 and channel-assisted expansion in Y3."
    y3RevenueK: 2660.0
    y3EbitdaK: -394.4
    cashLowPointK: 475.6
    keyAssumptionChanges:
      - "Normalized annual ARPU steps from $105K in Y1 to $114K by Y2-Y3, matching the per-fleet value implied by the research SOM."
      - "Customer count grows from 3 paid fleets at Y1 exit to 10 at Y2 exit and 40 at Q4Y3, matching the business-plan year-3 target."
      - "Gross margin reaches 70%-73% once the narrow HST, PAP, and DQ workflow becomes repeatable across fleets."
  upside:
    description: "Accepted templates standardize faster, one channel works early, and pricing captures more packet and monitoring value."
    y3RevenueK: 3250.0
    y3EbitdaK: 146.3
    cashLowPointK: 890.0
    keyAssumptionChanges:
      - "Normalized annual ARPU rises toward $120K as more fleets buy ongoing monitoring and packet volume scales."
      - "Y3 exits at 46 fleets because partner-sourced demand starts in late Y2 and compresses time from pilot to annual rollout."
      - "Gross margin improves to roughly 72%-75% while later support hiring stays disciplined because templates and connectors are reused."
