modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Outreach[Founder plus partner outreach] --> Pilots[Paid pilots]
      Pilots --> Fleets[Paying fleets]
      Fleets --> Drivers[Monitored flagged drivers]
      Drivers --> Revenue[Subscription plus packet revenue]
      Revenue --> GrossProfit[Gross profit after partner clinical and QA costs]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by growing from 3 paid fleets at Y1 exit to 40 fleets at Y3 exit while normalized annual ARPU standardizes at about $114K per fleet."
  - checkName: "Must go right"
    finding: "The narrow HST, PAP, and DQ workflow must stay reusable enough that one channel partner can help move the company from 10 fleets in Y2 to 40 fleets in Y3 without a services-heavy headcount spike."
  - checkName: "Model breaks if"
    finding: "If sales cycles drift toward 9 months and packet acceptance remains bespoke, downside cash falls below zero before the company reaches the planned 40-fleet scale."
  - checkName: "Next-round proof"
    finding: "The next financing is justified by reaching 8-10 live fleets, converting pilots into annual contracts, and proving accepted packets plus diagnosis speed that support partner-led expansion."
sanityChecks:
  ruleOf40: "Y3 growth 275.9% + EBITDA margin -14.8% = 261.1%"
  burnMultiple: "Approx. Y2 burn multiple 1.4x and Y3 burn multiple 0.1x using year-end ARR expansion from 3 to 10 to 40 fleets."
  revenuePerFte: "$295.6K Y3 (benchmark $200–400K SaaS)"
  flags:
    - "Base case requires the company to hit the full researched 40-fleet year-3 SOM, so GTM slippage leaves limited room before the next raise is pressured."
    - "Gross-margin improvement assumes manual packet QA and connector work become materially more repeatable after the first 10 fleets."
    - "CAC and churn remain heuristic because no observed fleet cohorts exist yet, so the first paid pilots can move unit economics materially."
    - "Forty fleets on 9 year-end FTE only works if partner-delivered clinical operations and standardized integrations absorb most implementation variance."
