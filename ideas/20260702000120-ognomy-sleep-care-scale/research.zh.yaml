- name: GEM SLEEP
  stage: scale-up
  wedge: 保险覆盖的虚拟睡眠诊所，具备远程监测、辅导和雇主福利渠道分销。
  pricing: 基于保险，并通过雇主/支付方渠道分销
  strength: 宣称 70% 的依从率、50 州覆盖，以及明确的雇主/福利市场野心。
  weaknessVsUs: 针对宽泛的雇主和支付方渠道做了优化，而不是针对 DOT 认证工作流或 DQ 档案集成。
