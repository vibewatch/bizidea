  sourceRefs:
  - 55
openQuestions:
- 拥有 500 到 5,000 名司机的自保型车队中，有多大比例已经把睡眠呼吸暂停的升级处理集中化管理，而不是交给当地诊所和司机？
- 体检医师在实际操作中要求 30 天还是 12 个月 CPAP 报告的频率各是多少，哪种报告格式最能被稳定接受？
- 哪些 PAP、HST 和 DQ 档案系统能暴露出足够的数据，在不为每家车队定制开发的情况下自动生成合规凭证？
- 止损保险方、第三方管理机构（TPA）或职业健康合作方，会不会把这个方案当作风险管理工具来赞助，还是车队只会把它当成一个狭窄的医疗福利问题？
