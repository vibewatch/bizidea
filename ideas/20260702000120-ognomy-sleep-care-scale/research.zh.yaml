      sourceRefs:
      - 1
      - 13
      - 18
      - 19
      - 52
      - 53
  pestle:
  - factor: 政治
    impact: neutral
    point: DOT 撤回了一项专门的 OSA 筛查规则，因此政策层面没有形成简单的强制要求，而是把这个议题留在更大的安全监管框架内。
    sourceRefs:
    - 63
  - factor: 经济
    impact: positive
    point: 可预防事故和停运问题存在于一个 $906B 规模的卡车运输行业中，这让降低风险的支出比健康福利支出更容易被论证。
    sourceRefs:
    - 35
    - 46
  - factor: 社会
    impact: positive
    point: OSA 在职业司机中很常见且诊断率不足，而是否确诊会直接影响司机的职业连续性和公共安全。
    sourceRefs:
    - 33
    - 34
  - factor: 技术
    impact: positive
    point: HSAT、远程监测、远程 CPAP 上机和联网 PAP 数据，共同让分布式的居家睡眠护理工作流变得可行。
    sourceRefs:
    - 15
    - 25
    - 27
    - 28
    - 30
  - factor: 法律
    impact: negative
    point: 车队必须维护医疗资质记录并依赖持证体检医师，但参差不齐的筛查操作让标准化变得复杂。
    sourceRefs:
    - 36
    - 40
    - 41
  - factor: 环境
    impact: neutral
    point: 常年在路上、调度时段不固定的司机群体，让去诊所就诊变得麻烦，这提升了居家优先诊断方案的相对吸引力。
    sourceRefs:
    - 6
    - 15
  adoptionFrictionMatrix:
  - friction: 把雇主工作流和受保护的临床数据分开
    severity: high
    affectedBuyer: 安全与合规负责人
    mitigation: 设计基于角色的报告机制，让车队只收到与认证相关的凭证，而临床细节完整留存在医生端。
    sourceRefs:
    - 41
    - 43
    - 65
  - friction: 整合来自参差不齐的 HST 和 PAP 系统的数据
    severity: high
    affectedBuyer: IT 与临床运营团队
    mitigation: 先从最常见的设备和监测工作流入手，等滩头市场跑通后再扩展连接器。
    sourceRefs:
    - 6
    - 57
    - 58
    - 60
  - friction: 不同体检医师对可接受证明的要求参差不齐
    severity: medium
    affectedBuyer: 职业健康团队与司机
    mitigation: 默认采用保守的事实标准，提供符合 4 小时/70% 预期的模板化报告。
    sourceRefs:
    - 36
    - 49
    - 50
    - 65
  - friction: 让司机保持足够长时间的参与度以维持依从
    severity: medium
    affectedBuyer: 司机与人力资源部门
    mitigation: 把监测和主动触达、辅导以及使用率下滑时的早期干预结合起来。
    sourceRefs:
    - 15
    - 18
    - 28
    - 30
market:
  tam:
    value: $338.3M
    rationale: 3.58M 名职业卡车司机 × 21% 的保守 OSA 患病比例 × 预估每名司机每年 $450 的雇主付费合规项目价值 = 约 $338.3M。
    isEstimate: true
    sourceRefs:
    - 3
    - 34
    - 46
    - 65
  sam:
    value: $50.7M
    rationale: '把 TAM 收窄到初始滩头市场：假设受 OSA 影响的卡车司机中有 15% 分布在拥有集中化合规团队、500 到 5,000 名司机规模的自保型车队里：751,800 × 15% × $450 = 约 $50.7M。'
    isEstimate: true
    sourceRefs:
    - 46
    - 53
    - 55
  som:
    value: $4.5M
    rationale: 可达成的第 3 年情形：40 家车队 × 平均每家 1,200 名司机 × 21% 的在管/监测比例 × 每年 $450 的项目价值 = 约 $4.5M。
    isEstimate: true
    sourceRefs:
    - 34
    - 46
    - 53
