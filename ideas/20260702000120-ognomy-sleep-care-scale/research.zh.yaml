  strength: 值得信赖的合规品牌，在 Part 391 相关运营中长期占据工作流位置。
  weaknessVsUs: 掌握文书流程，但不掌握临床睡眠路径或 PAP 数据层。
  sourceRefs:
  - 52
regulatoryTechnicalConstraints:
- point: FMCSA 没有专门的 OSA 筛查强制规定，因此工作流必须兼容体检医师的自由裁量和各雇主自定的升级处理政策。
  sourceRefs:
  - 36
  - 39
  - 63
- point: 持证体检医师和驾驶员资质档案仍然是权威的认证工作流，因此任何合规记录都必须干净地对应 Part 391 的文书要求。
  sourceRefs:
  - 40
  - 41
- point: PAP 报销覆盖和持续资质认定，依赖于获批的睡眠检测路径、书面记录的依从性和随访证据，而不能只靠患者自述。
  sourceRefs:
  - 43
  - 44
  - 65
- point: 居家睡眠检测只适用于合适的临床人群；部分司机仍然需要升级到实验室内检测或更专业的监督。
  sourceRefs:
  - 23
  - 25
