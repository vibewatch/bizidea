jobsToBeDone:
  - job: >-
      When we pilot an autonomous pharmacy cell in a rural county, help our
      pharmacy operations team decide which medications stay local and which
      route elsewhere, so patients do not lose access when a staffed store
      closes or cuts hours.
    currentAlternative: >-
      Spreadsheet demand reviews, wholesaler reports, and ad hoc judgment by
      pharmacy leaders
    successMetric: "Local prescription fill rate for targeted maintenance medications"
  - job: >-
      When exceptions start piling up after go-live, help our telepharmacy and
      outpatient pharmacy teams triage them by reason and route, so the robot
      reduces labor instead of creating a new manual queue.
    currentAlternative: >-
      Pharmacy-management reports, inbox-based escalation, and manual remote
      pharmacist review
    successMetric: "Exception resolution time and percentage of prescriptions completed without site handoffs"
