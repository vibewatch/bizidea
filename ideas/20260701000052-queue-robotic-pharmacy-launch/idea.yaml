topRisks:
  - name: "Hardware rollout lag"
    description: "If autonomous pharmacy deployments take longer than expected, the initial customer base may materialize more slowly than the software roadmap assumes."
    mitigation: "Start with design partners already planning pilots, keep the product hardware-agnostic, and support formulary and routing decisions that remain useful before full go-live."
  - name: "Workflow and compliance fragmentation"
    description: "State rules, payer workflows, and remote pharmacist processes may vary enough to turn a product into custom services work."
    mitigation: "Constrain the first ICP to repeatable rural outpatient pharmacy deployments, ship configurable routing templates, and avoid controlled-substance and edge-case scopes in the first release."
  - name: "Weak measurable ROI"
    description: "Operators may question whether better formulary and exception orchestration creates enough savings or access improvement to justify a new software layer."
    mitigation: "Sell against concrete launch KPIs such as local fill rate, exception turnaround, abandoned-prescription reduction, and avoided staffing or closure costs."
