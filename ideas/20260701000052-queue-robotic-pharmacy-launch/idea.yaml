differentiator: >-
  Pharmacy management systems record dispensing after a formulary and routing
  decision has already been made, while robotics vendors focus on the physical
  cell itself. This startup owns the missing decision layer between local
  demand, reimbursement pressure, robot capacity, and remote clinical
  exceptions. Its moat compounds through cross-site data on which medication
  mixes, routing rules, and exception patterns actually keep rural autonomous
  pharmacies safe, utilized, and economically viable.
