  sensitivityCases:
  - case: OEM rollout happens slower than current launch narratives imply
    impact: SAM opens more slowly and the startup must spend longer in design-partner mode rather than scaled multi-site rollout.
    sourceRefs:
    - 4
    - 6
    - 7
  - case: States keep restrictive telepharmacy rules or narrow remote-dispensing scope
    impact: Go-live geographies shrink to permissive states and non-controlled-substance workflows, delaying national repeatability.
    sourceRefs:
