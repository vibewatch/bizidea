  geographicConsiderations:
  - point: Rural 340B participation is large enough to matter—HRSA lists 1,166 critical access hospitals and 449 rural PPS hospitals in the program—but permissive telepharmacy states should be sequenced first.
    sourceRefs:
    - 23
