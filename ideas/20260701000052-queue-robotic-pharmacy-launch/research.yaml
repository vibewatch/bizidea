openQuestions:
- Which states allow the exact autonomous-dispensing plus remote-verification model needed for the target launch configuration?
- At a pilot rural 340B system, what percentage of prescriptions fits a 250-280 SKU local cell without hurting service levels?
- How often will 340B, payer, or clinical exceptions force a script to central fill even when local demand exists?
- Will robot OEMs and kiosk partners expose enough data and API access for a neutral orchestration layer to sit on top?
- What proof package will rural CFOs require before treating orchestration software as part of an access-preservation automation program?
