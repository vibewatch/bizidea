market:
  tam:
    value: $80.8M
    rationale: 1,615 rural 340B hospitals [23] × 1.25 candidate autonomous/remote-dispensing sites per hospital network (est.) × $40k annual control-layer budget proxy per site (roughly 29% of 2024 median pharmacist pay [20]) = about $80.8M.
    isEstimate: true
    sourceRefs:
    - 20
    - 23
  sam:
    value: $16.2M
    rationale: Apply a 20% readiness filter to TAM sites for systems that look like the beachhead—multi-site rural operators under access pressure and using contract-pharmacy or hub workflows—yielding roughly 404 sites × $40k = $16.2M.
    isEstimate: true
    sourceRefs:
    - 1
    - 9
    - 16
    - 23
  som:
    value: $1.4M
    rationale: A plausible year-3 outcome is about 35 live sites across 6-8 rural systems at the same $40k site-year budget proxy, which implies roughly $1.4M in annualized SOM.
    isEstimate: true
    sourceRefs:
    - 1
    - 26
    - 30
