    - 21
    - 38
  validationPlan:
  - priority: high
    question: How many rural 340B systems will pilot an autonomous or kiosk-style dispensing model in the next 12-24 months?
    evidenceToGather: Vendor pipeline interviews, signed pilot timelines, and board-approved capital plans from target systems.
  - priority: high
    question: What share of scripts at a design-partner site fit a 250-280 medication local formulary without harming fill-rate?
    evidenceToGather: De-identified historical dispense files and site-level demand concentration curves from at least one rural health system.
  - priority: medium
    question: Which states allow the intended remote verification and supervision model for the target drug classes and operating hours?
    evidenceToGather: State-board legal memos and a launch-state matrix aligned to the IPC and TelePharm maps.
  - priority: medium
    question: How much integration can be done read-only before deep claims and PMS workflow changes are required?
    evidenceToGather: API and file-interface discovery with at least one PMS, one 340B vendor, and one kiosk or robotics partner.
