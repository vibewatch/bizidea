  - 37
  - 38
openQuestions:
- 哪些州份恰好允许目标落地配置所需的自动配药加远程核验模式？
- 在一个试点农村 340B 系统里，有多大比例的处方能被 250 到 280 个 SKU 的本地配药舱覆盖，同时不损害服务水平？
- 即便本地有需求，340B、支付方或临床异常会以多高的频率，把一张处方逼去中心配药？
- 机器人 OEM 和自助终端合作伙伴，会不会开放足够的数据和 API 访问权限，让一层中立的编排层能架在上面？
- 农村 CFO 需要一套什么样的证据包，才会把编排软件当成可及性保障自动化项目的一部分？
