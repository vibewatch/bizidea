  sam:
    value: $16.2M
    rationale: 对 TAM 站点应用 20% 的就绪度筛选，筛出看起来像滩头市场的系统——面临可及性压力、采用合同药房或枢纽流程的多站点农村运营方——得到约 404 个站点 × 4 万美元 = 1620 万美元。
    isEstimate: true
    sourceRefs:
    - 1
    - 9
    - 16
    - 23
  som:
    value: $1.4M
    rationale: 第 3 年一个合理的结果是约 35 个上线站点，分布在 6 到 8 个农村系统中，按同样的每站点每年 4 万美元预算代理值测算，对应约 140 万美元的年化 SOM。
    isEstimate: true
    sourceRefs:
    - 1
    - 26
    - 30
