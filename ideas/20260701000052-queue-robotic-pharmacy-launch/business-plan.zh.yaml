slug: autonomous-pharmacy-control-tower
date: '2026-07-01'
executiveSummary: 自动配药正从原型走向规模化推广，Queue 这次发布让部署问题直接摆上药房运营方的桌面，不再是纸上谈兵。最好的第一个买家，是那些因关店、用工缺口或报销压力被迫重新设计运营模式、想保住本地用药可及性的农村 340B 医疗系统。这里的切入点不是又一台机器人，而是那层控制层——决定哪 250 到 280 种药留在本地，哪些处方转去中心配药或远程药房，以及如何让异常处理在 340B 和 DSCSA 流程中始终经得起审计。这让第一个验证点变得可操作，而不是空想：一套系统能不能在启动第一个自动化站点时，做到比 Excel 表格和人工排队更高的本地填单率、更低的异常处理人力？因此，产品应该先做成一层只读、不依赖具体硬件的规划与异常路由层，服务于宽松远程药房州份里的非受管制维持性用药，而不是一上来就做写回式配药系统。研究测算的农村 340B 滩头市场是真实存在的，但规模不大——目前 TAM 约 8080 万美元，所以整个创业假设都指望靠这个切入点，换来向更广泛的门诊和零售网络扩张的机会。研究里还有两个缺口没填上：一是没证实未来 12 到 24 个月内到底有多少家点名的农村系统会试点自动配药舱；二是没说清目标站点里，有多大比例的处方能被 250 到 280 个 SKU 的本地处方目录覆盖而不牺牲服务水平。因此，头 12 个月应该当作一次证伪计划来跑，聚焦共创客户、落地州份的合法性、集成的可复制性，以及可衡量的填单率或异常处理时长改善。
problem:
- 农村医院门诊药房和社区药店正在失去经济可行性：用工短缺、关店和报销倒挂不断侵蚀传统的人工值守模式，而患者照样需要就近拿到常用药。
- 第一代自动配药舱只能支持约 250 到 280 种常用药，这让每一次部署都变成一道高风险的处方目录难题：什么留在本地、什么转去中心配药、什么需要远程药师介入。
- 眼下的替代方案是 Excel 规划、批发商报表、人工远程药房排队和固定路由规则，这些手段太脆弱，撑不起多站点自动化部署的安全上线，也没法让 340B 和 DSCSA 流程保持可审计。
solution:
- 一座只读控制塔，摄入历史配药记录、报销数据和机器人产能约束，在每个自动化站点上线前，推荐出本地 250 到 280 个 SKU 的处方目录。
- 对因处方目录、支付方、临床或 340B 规则而不适合留在本地的处方，产品会在它们变成配药失败之前，就按规则分流到中心配药、有药师值守的药房或远程药房流程。
- 运营仪表盘跟踪本地填单率、弃单、异常处理时长、按 SKU 的毛利，以及按县划分的可及性表现，让买家有据可依，一个站点接一个站点地推进扩张。
whyWeWin:
- 现有厂商各自守着硬件、枢纽自动化或路由决策做完之后的合规记录，但没有一家真正拿下面向分布式农村可及性网络的中立、跨厂商处方目录与异常编排。
- 这个滩头市场有明确的购买触发点：关店、用工危机，或者已经签下的机器人试点，都会逼着运营方在第一个配药舱上线前，先定好启动处方目录和异常处理模式。
- 反复部署会沉淀出一份差异化数据集：需求集中度相对 250 到 280 个 SKU 预算的匹配情况、按支付方和 340B 状态划分的路由结果，以及哪些异常模式真正能保住可及性又不用把人力加回来。
- 先做只读集成、先挑宽松州份、先做非受管制维持性用药，这让第一版产品比彻底替换整套配药平台更容易被采用。
strategicChoices:
  beachhead: 拥有 4 到 8 家医院自营门诊药房、一家枢纽或中心配药药房的 340B 农村医疗系统——刚经历过缩短营业时间或附近门店关闭，正打算在一个远程药房政策宽松的州份，部署第一个自动化或自助终端式配药站点。
  wedgeRationale: 选这个切入点验证最快，因为客户已经有了预算触发点、被限定在 250 到 280 个 SKU 的硬件规模，以及可衡量的上线 KPI。要是一上来就卖更广泛的零售编排、全套远程药房软件或通用库存优化，会在公司证明自己能安全启动一个自动化站点之前，就背上更多买家和集成负担。
  sequencingRationale: 先做只读的处方目录规划和异常路由，这是通往上线前价值摩擦最小的路径，也能避免在合规和合作伙伴数据流程尚未获得信任前，就深入改写药房管理系统。先由创始人亲自向点名的农村系统打单，等第一个案例证明填单率提升或异常处理人力下降之后，再引入 OEM 和 340B 渠道伙伴。工程、药房信息学和实施岗位要先于规模化销售团队组建，因为这个阶段可复制的启动模板，比漏斗顶部的量更重要。
  notYet:
  - 受管制药品流程
  - 全面替换药房管理系统
  - 没有 340B 或可及性保障场景的城市便利型自助终端
  - 作为独立产品的送药上门编排
  - 在没有可复制远程药房模板的州份做全国推广
market:
  tam: 8080 万美元的当前滩头市场 TAM（1,615 家农村 340B 医院 × 每个网络 1.25 个候选自动化/远程配药站点 × 每站点约 4 万美元的年度控制层预算代理值）
  sam: 1620 万美元的近期 SAM（约为滩头市场中 20% 已具备多站点农村部署条件、拥有枢纽或合同药房流程的站点）
  som: 140 万美元的第 3 年 SOM（约 35 个上线站点，分布在 6 到 8 个农村系统中，按每站点每年约 4 万美元测算）
  segments:
  - 主要客群：正在启动第一个自动化或自助终端式配药站点的农村 340B 医院门诊药房网络
  - 次要客群：在农村模板得到验证后，协调自动化、中心配药和远程药房混合网络的区域医疗系统和零售药房运营方
  buyingProcess: 当关店、用工缺口或已签的硬件试点让本地可及性重新设计变得无可回避时，通常由首席药房官、药房运营副总裁或 COO 牵头立项。随后药房 IT、340B 负责人、远程药房主管和合规负责人会审查落地州份的合法性、数据访问权限和枢纽路由流程；第一份合同大概率是绑定一个站点和枢纽药房的付费上线前试点。
product:
  mvp: 面向一家农村医疗系统和一家枢纽药房的只读控制塔：导入历史配药、报销和机器人产能数据，为非受管制维持性用药推荐本地处方目录和每日路由规则。MVP 包含一个异常工作台，带有远程药房、中心配药和 340B 审计轨迹，但不做自动化临床决策，也不写回配药系统。
  sixMonth: 在一到两个政策宽松的州份，让 3 个共创客户站点上线，完成一个 PMS 集成、一路 340B 数据接入、一个 OEM 连接器，每日给出处方目录建议，并提供本地填单率、弃单和异常原因的仪表盘。
  twelveMonth: 在 2 到 3 个农村系统的 6 到 8 个上线站点上，沉淀出可复用的启动模板——涵盖远程药房合法性、感知 OPAIS 的纳入/排除规则和枢纽兜底流程，并提供填单率、异常处理时长和按 SKU 毛利的对标报告。
  twentyFourMonth: 在 15 个以上站点做跨厂商网络规划，并在医院门诊或区域零售网络启动首批扩张试点，同时让核心产品继续聚焦处方目录、路由和异常编排，而不是配药软件本身。
  keyBets:
  - 近期的自动化或自助终端式试点需求确实存在于农村 340B 系统内部，而不只是大型连锁药房里。
  - 250 到 280 个 SKU 的本地处方目录，能覆盖足够多的目标维持性用药需求，从而带来看得见的可及性提升。
  - 在需要深度写回自动化之前，只读集成就能创造足够价值。
  - 买家愿意按每个上线站点每年约 4 万美元付费，并在第一个验证点跑通后扩展到更多站点。
gtm:
  wedge: 把产品定位成一套"首个自动化站点启动系统"——决定什么留在本地、什么转去中心配药或远程药房，并在上线后 90 天内达到填单率和人力目标。
  channels:
  - 创始人亲自向农村 340B 首席药房官和 COO 直销，用药房荒漠、关店和可及性保障的叙事打动他们
  - 与已经掌握硬件采购流程的自动药房 OEM 和自助终端厂商联合销售
  - 第一个试点验证流程适配后，与 340B 分账计费厂商和远程药房服务商建立推荐与集成合作
  funnelTargets: 目标客户 → 完成需求确认 30%-40%，需求确认 → 付费试点 20%-30%，试点 → 正式上线 60%以上，正式上线 → 第二站点扩张 70%以上
  pricing: 按每个上线自动化站点或配药舱收取年度 SaaS 费用，约每站点每年 4 万美元，外加一次性实施费，以及可选的按处方管理量计费的异常分析附加费。这与研究测算的站点预算代理值相符，也把支出和可及性保障、自动化成果挂钩，而不是按用户席位或泛化 IT 预算收费。
businessModel:
  revenueStreams:
  - 按上线自动化站点或配药舱收取的年度订阅费
  - 实施与集成费用
  - 按处方管理量或异常分析计费的附加费
  - 面向多站点客户的网络对标与合规模块
  unitOfValue: 受处方目录与路由管理覆盖的上线自动化配药站点或配药舱
  targetGrossMarginPct: 70
  expansionLevers:
  - 从第一个上线站点扩展到同一医疗系统内所有符合条件的门诊站点
  - 增加可及性、报销和异常表现方面的对标分析
  - 支持更多 OEM 和药房软件连接器，赢得更广泛的混合网络
  - 把农村模板复用到医院门诊和区域零售网络
strategyMap:
  northStarMetric: 每月达到目标本地填单率和异常处理 SLA 的上线自动化站点数
  inputMetrics:
  - 拥有董事会批准启动时间表的付费共创客户
  - 目标维持性处方被推荐本地处方目录覆盖的比例
  - 目标药品的本地填单率
  - 异常处理时长
  - 弃单或转出处方比例
  - 试点转正式上线，以及正式上线转第二站点的扩张比例
  moatsToBuild:
  - 脱敏的需求集中度数据集，把本地 SKU 预算和实际填单结果关联起来
  - 跨站点、关联 340B、支付方和 DSCSA 条件的路由与异常日志库
  - 面向宽松州份、可复用的 OEM、PMS 和 340B 数据接入启动模板
  - 跨县域、跨网络对比自动化站点表现的可及性与投资回报对标数据集
  killCriteria:
  - 第 12 个月时付费医疗系统共创客户少于 3 家，或合作伙伴数据集成少于 2 个
  - 前 2 个上线试点未能把目标本地填单率相对人工基线提升至少 10 个百分点，或把异常处理时长缩短至少 30%
  - 超过一半的目标客户或落地州份，在法律或数据访问模式上卡住了可复制推广模板
  - 完成第三次部署后，每个新站点上线仍需超过 40 小时的定制合规或集成工作
  mermaid: |
    flowchart LR
      Wedge[First autonomous-site launch wedge] --> MVP[Read-only formulary and routing MVP]
      MVP --> Proof[Higher fill rate and lower exception labor]
      Proof --> Expansion[Broader outpatient and retail network orchestration]
investorMemo:
  verdict:
    call: 观望
    conviction: 痛点清晰，切入点也站得住脚，但信心只能打个中等分——公司还没证明近期有多少具名试点，也没证明能从小小的农村 340B 滩头市场扩张出去。
    whyBelieve: 自动配药恰好在农村药房经济账撑不住的时候到来，而且发布带来的问题足够具体，一层中立的控制层完全有可能在现有厂商反应过来之前，先把预算拿下。
    whyDoubt: 目前研究测算的 TAM 只有约 8080 万美元，一旦试点时间、州份合法性或合作伙伴数据访问，比计划假设的要弱，公司就会失败。
    nextDiligence: 核实 3 家有 12 到 24 个月部署计划、可具名的农村系统，并拿到一份脱敏处方数据集，证明有多大比例的需求能被 250 到 280 个 SKU 的本地处方目录覆盖。
  firstCustomer:
    title: 农村 340B 医疗系统的首席药房官
    profile: 一家拥有 4 到 8 个医院自营门诊药房站点、一家枢纽药房的农村医疗系统，刚经历关店或缩短营业时间的压力，正积极筹划启动第一个自动化或自助终端式配药站点。
    trigger: 用工缺口、附近药房关闭，或者已签的 OEM 试点，逼着系统在上线前就决定哪些药留在本地、异常又该怎么处理。
    buyer: 首席药房官
    initialContract: 首份付费启动套餐约 7.5 万到 12.5 万美元，涵盖处方目录建模、合规搭建和第一个上线站点；随着系统扩展到 4 到 8 个站点，转为每个上线站点每年约 4 万美元，外加实施费和可选的处方量附加费。
  mustBeTrue:
  - 未来 24 个月内，至少有 6 家农村 340B 系统计划开展自动化或自助终端式配药试点。
  - 目标站点排名前 250 到 280 的药品，能在不明显牺牲服务水平的前提下，覆盖至少 60% 的目标维持性处方需求。
  - 一层中立的控制层，能以只读方式接入 PMS、340B 和 OEM 数据，不需要在每个站点都做定制写回。
  - 第一个验证点跑通后，买家愿意从自动化或可及性保障预算中，按每个上线站点每年约 4 万美元付费。
  - 同一套路由与合规模板，能从农村 340B 扩展到更广泛的门诊或零售网络。
  diligenceQuestions:
  - 哪些具名的农村 340B 系统，已经拿到董事会批准的自动化或自助终端式试点时间表？
  - 目标站点有多大比例的处方能被首批 250 到 280 个 SKU 的本地处方目录覆盖？剩下的处方主要是哪些异常类型？
  - 哪些州份允许首批落地站点采用非受管制自动配药加远程核验的模式？
  - OEM、PMS 和 340B 厂商实际上会向一层中立的编排层开放哪些数据和 API 访问权限？
  - 哪套 KPI 组合能最快帮 CFO 和 CPO 解锁预算：填单率、节省的人力、弃单率下降，还是可及性保障的证据？
operatingAssumptions:
- assumption: 有足够多的农村 340B 系统，制定了 12 到 24 个月的自动化或自助终端式启动计划，能支撑一套聚焦共创客户的 GTM。
  basis: research.yaml
  validationTest: 访谈 15 家目标系统和 OEM 合作伙伴，在 6 个月内拿下至少 3 家付费共创客户，或获得董事会批准的启动计划。
  decisionImpact: 如果不成立，说明这个切入点为时过早；公司应该压低烧钱速度、推迟扩张性招聘，或转向面向 OEM 的规划软件。
- assumption: 250 到 280 个 SKU 的本地处方目录，能覆盖足够多的目标维持性处方需求，从而带来可衡量的可及性和人力改善。
  basis: research.yaml
  validationTest: 分析至少 2 个目标站点 12 个月的脱敏配药历史，确认拟定的本地处方目录能覆盖至少 60% 的目标需求，并能把本地填单率提升 10 个百分点。
  decisionImpact: 如果不成立，滩头市场就得收窄到高单量站点，或者说明核心切入点还不够强，撑不起一款独立软件。
- assumption: 至少 3 个目标落地州份，允许非受管制自动配药加远程核验的模式，并能配上可复制的合规模板。
  basis: research.yaml
  validationTest: 为前 5 个目标州份出具州药房委员会或律师认可的落地备忘录，其中至少 3 个不需要为流程做定制化的法律重新设计就能过关。
  decisionImpact: 如果不成立，公司就必须放慢 GTM 节奏，大幅收窄地域范围，把监管排期而不是产品本身当作主要瓶颈。
- assumption: 只读的 PMS、340B 和 OEM 集成，足以支撑 MVP 每日给出建议并展示异常情况。
  basis: research.yaml
  validationTest: 搭建一路 PMS 数据接入、一路 340B 数据源和一个 OEM 连接器，在客户上线 30 天内跑出每日路由建议。
  decisionImpact: 如果不成立，实施就会变成重服务模式，毛利率被压缩，招聘计划也得向集成人力倾斜。
- assumption: 只要产品能提升填单率、减少异常处理人力，买家就愿意按每个上线站点每年约 4 万美元付费，外加实施费。
  basis: idea.yaml
  validationTest: 向 10 位首席药房官或 COO 买家展示定价模型，拿下至少 3 份意向书或落在目标区间内的付费试点。
  decisionImpact: 如果不成立，定价就得下调，或改成向 OEM 分成，这会削弱独立软件的说服力，融资额度也可能相应下调。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 具名客户与 OEM 落地管道盘点
  hypothesis: 足够多的农村 340B 系统和 OEM 合作伙伴，制定了真实的 12 到 24 个月部署计划，能支撑一个聚焦的滩头市场。
  successMetric: 3 家具名系统和 2 家 OEM 或自助终端合作伙伴，确认了落地计划并同意开展后续方案讨论
  owner: 创始 CEO
- horizon: 0–90 天
  experiment: 落地州份合法性矩阵
  hypothesis: 至少 3 个目标州份，允许最初的非受管制自动化加远程核验流程。
  successMetric: 律师或州委员会指导备忘录，让 3 个州份过关，并记录另外 2 个州份的障碍
  owner: 药房信息学与合规负责人
- horizon: 90–180 天
  experiment: 历史配药集中度研究
  hypothesis: 250 到 280 个 SKU 的推荐处方目录，能覆盖足够多的目标需求，从而提升共创客户站点的本地可及性。
  successMetric: 排名前 250 到 280 的 SKU 覆盖至少 60% 的目标维持性处方，建模显示本地填单率提升 10 个百分点
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 只读集成试点
  hypothesis: PMS、340B 和 OEM 数据无需深度写回配药系统，就能支撑每日建议。
  successMetric: 30 天内上线每日建议数据流，试点站点每日人工重复录入降到 10 例以下
  owner: 创始工程师与药房运营负责人
- horizon: 180–365 天
  experiment: 第一个自动化站点正式上线
  hypothesis: 控制塔能让上线效果提升到足以支撑正式扩张的程度。
  successMetric: 上线前 90 天内，目标本地填单率相对人工基线提升至少 10 个百分点，或异常处理时长缩短 30%
  owner: 实施负责人
- horizon: 365–540 天
  experiment: 合作伙伴引流的扩张动作
  hypothesis: 一家 OEM、340B 或远程药房合作伙伴，能在不压垮定价的前提下带来更多部署。
  successMetric: 第 18 个月前，达成 2 个合作伙伴引流的试点，或 1 笔按目标经济模型成交的正式扩张合同
  owner: 创始 CEO 与合作伙伴负责人
operations:
- 数据管道：每日从 PMS、批发商和 OEM 数据源导入配药历史、报销、340B 状态和配药舱产能数据。
- 合规流程：在任何写回自动化之前，先配置好落地州份的远程药房规则、感知 OPAIS 的纳入/排除记录，以及 DSCSA 审计轨迹。
- 异常处理：不适合留在本地的处方，会被路由到远程药房、枢纽配药或有药师值守的站点，并附带明确的药师签核和原因代码。
- 客户节奏：上线期间每周复盘上线进展，此后每月复盘填单率、弃单、异常原因和按 SKU 毛利。
- 关键合作伙伴：自动药房 OEM、340B 分账计费厂商、远程药房服务商和枢纽药房。
team:
- role: 创始 CEO 兼药房运营销售
  startTiming: 第 0 个月
  rationale: 在可及性或自动化触发点最活跃的阶段，负责向首席药房官和 COO 推进共创客户销售、定价和伙伴关系拓展。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 构建路由引擎、脱敏需求模型、合作伙伴连接器，以及覆盖 PMS、340B 和 OEM 系统的可审计层。
- role: 药房信息学与合规负责人
  startTiming: 第 3 个月
  rationale: 把远程药房、340B 和 DSCSA 的落地规则编码进产品，让产品始终是可复制的模板，而不是沦为定制化服务。
- role: 实施与客户成功负责人
  startTiming: 第 6 个月
  rationale: 负责站点入驻、基线 KPI 采集和上线执行，让首批部署沉淀成案例研究和可复用的操作手册。
- role: 合作伙伴与销售工程师
  startTiming: 第 9 个月
  rationale: 在首批直销部署验证核心流程后，负责 OEM、340B 和远程药房集成，以及合作伙伴引流的商机管道。
milestones:
- horizon: 0–12 个月
  items:
  - 第 3 个月：拿下 2 家共创客户，完成前 3 个目标州份的落地备忘录
  - 第 6 个月：完成一路 PMS 数据接入、一路 340B 数据接入和一个 OEM 连接器，并完成一份经验证的处方目录集中度研究
  - 第 9 个月：启动第一个上线自动化站点，记录上线前后的填单率和异常指标
  - 第 12 个月：达到 3 家付费系统、6 个上线站点，并产出一份案例研究，显示填单率提升 10 个百分点或异常处理时长缩短 30%
- horizon: 12–24 个月
  items:
  - 第 18 个月：拿下第一笔合作伙伴引流的扩张合同，在至少 3 个系统中达到 10 个上线站点
  - 第 21 个月：借助可复用的合规与集成模板，把新站点的启动工作量降到 40 个定制工时以下
  - 第 24 个月：达到 15 个上线站点，并在非农村门诊或零售网络启动第一个扩张试点
- horizon: 24–36 个月
  items:
  - 第 30 个月：证明产品能管理跨多个 OEM 或药房软件体系的混合网络
  - 第 36 个月：在 6 到 8 个系统中达到约 35 个上线站点，并判断更广泛的门诊扩张是否支撑得起从种子轮到 A 轮的路径
risks:
- risk: 自动化或自助终端式硬件的推广速度，比目前的发布叙事更慢
  likelihood: High
  impact: High
  mitigation: 先从已经签约或已列预算的具名买家切入，让产品在上线前的规划阶段就有用，避免在部署时间表尚未验证前提前招人。
- risk: 远程药房、340B 和 DSCSA 的差异，把产品拖成定制化服务
  likelihood: High
  impact: High
  mitigation: 把 v1 限定在政策宽松州份的非受管制维持性用药，把可复制的启动模板固化下来，在常规部署路径得到验证之前，先不接边缘场景。
- risk: OEM、PMS 或 340B 厂商限制数据访问，或把类似的编排功能捆绑进自家产品
  likelihood: Medium
  impact: High
  mitigation: 尽早拿下至少 2 套合作伙伴体系的只读集成，如果中立性谈不出可接受的条件，也愿意暂时锚定在一个生态里。
- risk: KPI 提升幅度太小，不足以让买家为一层独立控制层买单
  likelihood: Medium
  impact: High
  mitigation: 围绕有实测基线的填单率、弃单率和异常处理人力来卖，拒绝那些不允许做上线前后 KPI 对比的试点。
- risk: 农村 340B 滩头市场没能扩展成更广泛的网络编排市场
  likelihood: Medium
  impact: High
  mitigation: 把烧钱速度控制在与当前 SOM 匹配的水平，只有在农村场景验证成功后，才去试相邻的门诊和零售场景，不要拿未经验证的扩张假设去融资。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的现金跑道，用来搭建只读处方目录与路由引擎、交付落地州份的合规模板、招募创始工程、信息学和实施人才、拿下 3 个付费农村医疗系统试点（6 到 10 个上线站点），并在下一轮融资决策前，判断农村 340B 切入点能否扩展到更广泛的门诊网络。
