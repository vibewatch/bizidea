slug: autonomous-pharmacy-control-tower
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-01]；由于计划日期正好落在当月第一天，财务模型从 2026 年 7 月立即开始起算。'
- id: A2
  name: 来自 Pre-seed 融资的期初现金
  value: '3000'
  unit: USD K
  source: '[BP fundingAsk.targetFundingRangeUsd $3-5M]；模型取下限 300 万美元，因为 GTM 由创始人主导、初始团队精简，滩头市场应该先证明资本效率，再考虑更大一轮融资。'
- id: A3
  name: 客户单位定义
  value: active autonomous dispensing site or cell under management
  unit: unit
  source: '[BP businessModel.unitOfValue 受管理的上线自动化配药站点或配药舱]；营收按活跃站点建模，公司仍在扩大每个客户账户时，把启动套餐和分析类收入混入站点经济模型。'
- id: A4
  name: 首个系统启动套餐
  value: '100'
  unit: USD K per system
  source: '[BP investorMemo.firstCustomer initialContract 涵盖处方目录建模、合规搭建和第一个上线站点的 7.5 万-12.5 万美元]；模型取中位数。'
- id: A5
  name: 稳态经常性站点收入
  value: '52'
  unit: USD K per site-year
  source: '[BP gtm.pricing 约每站点每年 4 万美元，外加可选的按处方管理量计费附加费]；模型假设 4 万美元订阅费加约 1.2 万美元的经常性分析与管理量附加收入。'
- id: A6
  name: 扩张站点实施费
  value: '15'
  unit: USD K per new site
  source: '[BP businessModel.revenueStreams 实施与集成费用]；经验法则：一旦某医疗系统已经上线，由于模板和连接器可复用，每新增一个站点的实施费远低于首个系统的启动套餐。'
- id: A7
  name: 第 1 年月末活跃站点数
  value: M1-M12 = 0,0,0,0,0,0,0,0,1,2,4,6
  unit: active sites
  source: '[BP milestones 第 9 个月首个上线自动化站点，第 12 个月 3 个付费系统下的 6 个上线站点]。'
- id: A8
  name: 第 2 年季末活跃站点数
  value: Q1-Q4 = 8,10,12,15
  unit: active sites
  source: '[BP milestones 第 18 个月 10 个上线站点，第 24 个月 15 个上线站点]；模型假设在首批系统内部保持稳步扩张。'
- id: A9
  name: 第 3 年季末活跃站点数
  value: Q1-Q4 = 19,24,29,35
  unit: active sites
  source: '[BP milestones 第 36 个月在 6-8 个系统中约 35 个上线站点]；模型假设第 2 年的首笔合作伙伴引流扩张交易，在第 3 年转化为更快的多站点推广。'
- id: A10
  name: 第 1 年每活跃站点月均混合收入
  value: M1-M8 = 0; M9-M12 = 20,24,28,30
  unit: USD K per active site-month
  source: '[A4-A6]；[BP investorMemo.firstCustomer initialContract 7.5 万-12.5 万美元]；[BP milestones 第 9 个月首个上线站点，第 12 个月 6 个上线站点]；早期站点经济模型以启动套餐为主，因为首批系统正在搭建中。'
- id: A11
  name: 第 2 年每活跃站点月均混合收入
  value: Q1-Q4 = 11.0,10.5,10.0,10.0
  unit: USD K per active site-month
  source: '[A4-A6]；[BP milestones 第 18 个月和第 24 个月]；随着一次性启动费被摊薄到更大的装机基数上，经常性按站点 SaaS 收入占比上升，每活跃站点的混合收入随之下降。'
- id: A12
  name: 第 3 年每活跃站点月均混合收入
  value: Q1-Q4 = 9.0,8.5,8.0,7.5
  unit: USD K per active site-month
  source: '[A5-A6]；[BP market.som 约每站点每年 4 万美元下的 35 个上线站点]；[研究 market.som 测算 35 个站点、每站点 4 万美元]；第 3 年收入结构向经常性按站点软件收入归一化，实施和分析收入仍在新部署上贡献可观增量。'
- id: A13
  name: 毛利率爬坡
  value: Y1 35-50%; Y2 55-62%; Y3 65-72%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70]；[BP operatingAssumptions 只读集成和可复用合规模板]；创业财务经验法则：早期部署偏服务型，随着启动模板和连接器被复用，毛利率逐步改善。'
- id: A14
  name: 月度活跃站点流失率
  value: '1.5'
  unit: percent
  source: 针对粘性较强的 To-B 医疗系统工作流软件的创业财务经验法则：多数增长来自同一买家的站点扩张，一旦嵌入使用，上线站点很少快速流失。
- id: A15
  name: 创始人全成本年现金薪酬
  value: '160'
  unit: USD K
  source: 针对 pre-seed 阶段创始人的创业财务经验法则：在覆盖工资税和福利的同时，接受低于市场水平的现金薪酬。
- id: A16
  name: 工程全成本年薪酬
  value: '190'
  unit: USD K per FTE
  source: '[BP team 创始工程师及后续平台招聘]；针对负责路由逻辑、数据接入和可审计性的受监管医疗科技软件工程师的创业财务经验法则。'
- id: A17
  name: 药房信息学与合规薪酬
  value: '170'
  unit: USD K per FTE
  source: '[BP team 药房信息学与合规负责人]；针对资深药房运营/合规岗位招聘的创业财务经验法则。'
- id: A18
  name: 实施与客户成功薪酬
  value: '135'
  unit: USD K per FTE
  source: '[BP team 实施与客户成功负责人]；针对农村医疗系统现场实施、入驻和 KPI 基线采集工作的创业财务经验法则。'
- id: A19
  name: 合作伙伴与销售工程薪酬
  value: '155'
  unit: USD K per FTE
  source: '[BP team 合作伙伴与销售工程师]；针对面向合作伙伴的售前与集成岗位的创业财务经验法则。'
- id: A20
  name: 销售/业务拓展薪酬
  value: '170'
  unit: USD K per FTE
  source: '[BP strategicChoices.sequencingRationale 提到规模化销售要在可复制性之后]；针对一名企业销售、附带适度浮动薪酬的创业财务经验法则。'
- id: A21
  name: 运营/行政管理薪酬
  value: '125'
  unit: USD K per FTE
  source: 针对仅在部署量上升后才增补的后期财务与运营通才岗位的创业财务经验法则。
- id: A22
  name: 招聘计划
  value: M3 Informatics; M6 Implementation1; M9 Partnerships/SE; M15 Implementation2; M18 Engineer2; M21 Sales1; M30 Ops1; M33 Engineer3
  unit: hires
  source: '[BP team startTiming]；[BP strategicChoices.sequencingRationale]；模型让商业化招聘落后于实施和产品工作，直到达成第一个合作伙伴引流扩张里程碑。'
- id: A23
  name: 非薪资销售与市场支出
  value: Y1 $6-10K/mo; Y2 $12-18K/mo; Y3 $20-30K/mo
  unit: USD K per month
  source: 创业财务经验法则：狭窄监管市场里创始人主导的企业销售，涵盖现场差旅、会议、伙伴拓展和 CRM 支出。
- id: A24
  name: 非薪资产品与工具支出
  value: Y1 $9-11K/mo; Y2 $12-16K/mo; Y3 $18-24K/mo
  unit: USD K per month
  source: '[BP operations 数据管道、OEM 连接器和可审计性流程]；针对云、数据工具和集成软件支出的创业财务经验法则。'
- id: A25
  name: 非薪资行政与合规支出
  value: Y1 $5-7K/mo; Y2 $8K/mo; Y3 $8-10K/mo
  unit: USD K per month
  source: '[BP operations 合规流程与合作伙伴合同管理]；针对法务、保险、财务和落地州份合规成本的创业财务经验法则。'
- id: A26
  name: 混合 CAC
  value: '43'
  unit: USD K per new active site
  source: 模型基于约 150 万美元的累计销售与市场支出，对应 35 次站点上线推算；由于业务计划预计正式客户会以 70% 以上的比例扩展到第二站点，按站点计算的 CAC 低于按客户逻辑计算的 CAC。
- id: A27
  name: 单位经济模型用的稳态年 ARPU
  value: '52'
  unit: USD K per active site-year
  source: '[A5]；单位经济模型采用经常性的 4 万美元站点订阅费，加上经常性的分析与管理量附加收入，而不是临时性的首个系统启动套餐。'
- id: A28
  name: 下一轮里程碑加缓冲
  value: 10 live sites by Month 18 and 15 live sites by Month 24
  unit: milestone
  source: '[BP milestones 第 18 个月 10 个上线站点及首笔合作伙伴引流扩张交易；第 24 个月 15 个上线站点]；融资额度包含超出第一个硬性扩张验证里程碑的 6 个月缓冲。'
