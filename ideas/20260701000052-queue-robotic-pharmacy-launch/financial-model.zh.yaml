modelSanity:
- checkName: 收入引擎
  finding: 收入由上线站点数驱动，从第 1 年末的 6 个增长到第 3 年末的 35 个，收入结构也从首个系统的启动套餐，逐步转向经常性的按站点 SaaS 加分析收入。
- checkName: 必须跑通的环节
  finding: 模型需要第 18 个月的合作伙伴引流扩张交易，以及可复用的合规模板，这样每新增一个站点才能在不堆砌重服务人力的情况下上线。
- checkName: 模型崩溃的条件
  finding: 如果销售周期拉长到 9 个月左右，或州份合规审批拖慢上线速度，下行情形会让第 3 年收入降到 180 万美元，现金也会压缩到约 20 万美元。
- checkName: 下一轮融资的证据
  finding: 一旦 pre-seed 轮把公司带到 10 个上线站点、覆盖 3 个系统、跑通一个有效的渠道合作伙伴，并积累足够的 KPI 证据支撑第 24 个月 15 个站点的目标，种子轮的故事就成立了。
sanityChecks:
  ruleOf40: 第 3 年增长率 89.1% + EBITDA 利润率 -20.3% = 68.9%
  burnMultiple: 第 2 年烧钱倍数 0.8 倍（在 96.95 万美元的增量收入上烧掉 79.08 万美元），第 3 年改善到 0.4 倍。
  revenuePerFte: 按第 3 年第 4 季度 10 名全职员工计算，第 3 年人均产出收入 23.63 万美元（对标 Workflow SaaS 基准 20 万-40 万美元）
  flags:
  - 研究测算的 140 万美元 SOM 是经常性站点预算代理值；本模型能做到第 3 年 240 万美元收入，是因为在约 4 万美元的站点订阅基础上，又叠加了实施和分析类收费。
  - 模型完全按照业务计划的里程碑假设——第 12 个月 6 个上线站点、第 36 个月 35 个——一旦 OEM 推广或州份合规审批放缓，收入和现金都会很快下滑。
  - 到第 3 年，人均产出收入只到约 23.6 万美元，尚可接受，但留给提前招聘的空间不多，招聘节奏一旦提前，就可能突破业务计划设定的 40 小时上线工作量目标。
  - 毛利率直到第 3 年后期才达到 70% 以上的目标；如果集成工作持续偏服务型，下一轮融资可能会在模型证明毛利率之前就到来。
