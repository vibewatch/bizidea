modelSanity:
  - checkName: "Revenue engine"
    finding: "Revenue is driven by live sites scaling from 6 at Y1 exit to 35 at Y3 exit while the mix shifts from first-system launch packages toward recurring per-site SaaS plus analytics."
  - checkName: "Must go right"
    finding: "The model needs the Month-18 partner-sourced expansion deal and reusable compliance templates so each incremental site can launch without adding services-heavy headcount."
  - checkName: "Model breaks if"
    finding: "If sales cycles stretch toward nine months or state legality slows launches, the downside case drops to $1.8M Y3 revenue and cash compresses to about $0.2M."
  - checkName: "Next-round proof"
    finding: "A seed story exists once the pre-seed gets the company to 10 live sites across 3 systems, one working channel partner, and enough KPI proof to justify the Month-24 15-site target."
sanityChecks:
  ruleOf40: "Y3 growth 89.1% + EBITDA margin -20.3% = 68.9%"
  burnMultiple: "Y2 burn multiple 0.8x (burn $790.8K on $969.5K incremental revenue), improving to 0.4x in Y3."
  revenuePerFte: "$236.3K Y3 using 10 Q4Y3 FTE (benchmark $200–400K workflow SaaS)"
  flags:
    - "The researched $1.4M SOM is a recurring site-budget proxy; this model reaches $2.4M Y3 revenue only because implementation and analytics fees are layered on top of the ~$40K site subscription."
    - "The model assumes 6 live sites by Month 12 and 35 by Month 36 exactly as the BP milestones state, so any OEM rollout or state-clearance slip quickly reduces both revenue and cash."
    - "Revenue per FTE reaches only about $236K by Y3, which is acceptable but leaves little room to pull hires forward before launch effort falls below the BP's 40-hour goal."
    - "Gross margin does not reach the 70%+ target until late Y3; if integrations become services-heavy, the next round arrives before the model shows margin proof."
