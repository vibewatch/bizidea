fundingAsk:
  round: pre-seed
  amountM: 3.0
  runwayMonths: 18
  milestone: >-
    Reach 10 live sites across at least 3 systems and secure the first partner-
    sourced expansion deal by Month 18; the included six-month buffer carries
    the company to the Month-24 target of 15 live sites.
  useOfFunds:
    - bucket: "Engineering"
      amountUsd: 1050000
      percentage: 35
    - bucket: "GTM"
      amountUsd: 750000
      percentage: 25
    - bucket: "G&A"
      amountUsd: 450000
      percentage: 15
    - bucket: "Buffer (6 mo)"
      amountUsd: 750000
      percentage: 25
scenarios:
  downside:
    description: >-
      OEM rollout and state-clearance slip one to two quarters, so the company
      exits Y3 at 28 live sites, ARPU stays closer to pilot-era budgets, and
      gross margin never fully reaches the 70% target.
    y3RevenueK: 1800.0
    y3EbitdaK: -942.8
    cashLowPointK: 217.9
    keyAssumptionChanges:
      - "Y1 exits at 4 live sites and Y3 exits at 28 live sites instead of 35."
      - "Blended monthly revenue per active site steps down to $7.0K by Q4Y3 instead of $7.5K because expansion sites and optional analytics convert more slowly."
      - "Gross margin tops out at 67% because state-by-state compliance work stays more custom."
  base:
    description: >-
      The base case follows the BP milestone path to 6 live sites by Month 12,
      10 by Month 18, 15 by Month 24, and roughly 35 by Month 36, with recurring
      site SaaS supplemented by implementation and managed-volume analytics
      fees.
    y3RevenueK: 2363.3
    y3EbitdaK: -478.6
    cashLowPointK: 957.2
    keyAssumptionChanges:
      - "Customer ramp matches the BP milestone path from 6 live sites at Y1 exit to 35 at Y3 exit."
      - "Blended monthly revenue per active site declines from launch-heavy $30K in M12 to $7.5K in Q4Y3 as revenue mix normalizes toward recurring site fees."
      - "Headcount grows only to 10 FTE by Q4Y3 because partner-sourced expansion and launch templates absorb deployment load."
  upside:
    description: >-
      KPI proof lands early, one OEM or 340B partner channel works by Year 2,
      and same-system rollouts accelerate the company to 40 live sites by Y3
      exit while holding hiring mostly flat.
    y3RevenueK: 2872.5
    y3EbitdaK: -80.7
    cashLowPointK: 1554.3
    keyAssumptionChanges:
      - "Y1 exits at 7 live sites, Y2 at 18, and Y3 at 40."
      - "Blended monthly revenue per active site stays 5-10% above base because more systems buy launch packages and optional analytics."
      - "Gross margin reaches 73% by Q4Y3 as templates and partner integrations reduce manual work."
sensitivity:
  - variable: "ARPU"
    downsideCase: "$48K recurring/analytics site-year with lighter managed-volume attach"
    baseCase: "$52K steady-state site-year"
    upsideCase: "$60K site-year with better analytics attach"
    y3RevenueImpactK: -240.0
    cashImpactK: -180.0
  - variable: "CAC"
    downsideCase: "$55K per live site if founder-led direct sales stays primary"
    baseCase: "$43K per live site with same-system expansion"
    upsideCase: "$30K per live site if partner-sourced deployments dominate"
    y3RevenueImpactK: -100.0
    cashImpactK: -250.0
  - variable: "churn"
    downsideCase: "2.5% monthly active-site churn"
    baseCase: "1.5% monthly active-site churn"
    upsideCase: "1.0% monthly active-site churn"
    y3RevenueImpactK: -130.0
    cashImpactK: -100.0
  - variable: "sales cycle"
    downsideCase: "9 months from first meeting to production go-live"
    baseCase: "6-7 months from first meeting to production go-live"
    upsideCase: "4-5 months with partner-qualified projects"
    y3RevenueImpactK: -560.0
    cashImpactK: -410.0
