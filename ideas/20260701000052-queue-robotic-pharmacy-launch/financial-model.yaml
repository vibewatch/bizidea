slug: autonomous-pharmacy-control-tower
date: '2026-07-01'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "month"
    source: "[BP date 2026-07-01]; because the plan date lands on the first day of the month, the financial model starts immediately in July 2026."
  - id: A2
    name: "Opening cash from pre-seed raise"
    value: "3000"
    unit: "USD K"
    source: "[BP fundingAsk.targetFundingRangeUsd $3-5M]; model uses the low end $3.0M because the GTM is founder-led, the initial team is lean, and the beachhead should prove capital efficiency before a larger round."
  - id: A3
    name: "Customer unit definition"
    value: "active autonomous dispensing site or cell under management"
    unit: "unit"
    source: "[BP businessModel.unitOfValue live autonomous dispensing site or cell]; revenue is modeled per active site with launch-package and analytics revenue blended into site economics while the company is still expanding each account."
  - id: A4
    name: "First-system launch package"
    value: "100"
    unit: "USD K per system"
    source: "[BP investorMemo.firstCustomer initialContract $75k-$125k covering formulary modeling, compliance setup, and the first live site]; model uses the midpoint."
  - id: A5
    name: "Steady-state recurring site revenue"
    value: "52"
    unit: "USD K per site-year"
    source: "[BP gtm.pricing roughly $40k per site-year plus optional managed prescription-volume fee]; model assumes $40K subscription plus about $12K of recurring analytics and managed-volume attach."
  - id: A6
    name: "Expansion-site implementation fee"
    value: "15"
    unit: "USD K per new site"
    source: "[BP businessModel.revenueStreams implementation and integration fees]; heuristic: once a health system is live, each additional site carries a much smaller implementation fee than the first-system launch package because templates and connectors are reused."
  - id: A7
    name: "Y1 end-of-month active sites"
    value: "M1-M12 = 0,0,0,0,0,0,0,0,1,2,4,6"
    unit: "active sites"
    source: "[BP milestones Month 9 first live autonomous site and Month 12 six live sites across three paid systems]."
  - id: A8
    name: "Y2 quarter-end active sites"
    value: "Q1-Q4 = 8,10,12,15"
    unit: "active sites"
    source: "[BP milestones Month 18 ten live sites and Month 24 fifteen live sites]; model assumes a steady expansion path inside the first systems."
  - id: A9
    name: "Y3 quarter-end active sites"
    value: "Q1-Q4 = 19,24,29,35"
    unit: "active sites"
    source: "[BP milestones Month 36 roughly 35 live sites across 6-8 systems]; model assumes the first partner-sourced expansion deal in Y2 converts into faster multi-site rollouts in Y3."
  - id: A10
    name: "Y1 blended monthly revenue per active site"
    value: "M1-M8 = 0; M9-M12 = 20,24,28,30"
    unit: "USD K per active site-month"
    source: "[A4-A6]; [BP investorMemo.firstCustomer initialContract $75k-$125k]; [BP milestones Month 9 first live site and Month 12 six live sites]; early site economics are launch-package heavy because the first systems are being stood up."
  - id: A11
    name: "Y2 blended monthly revenue per active site"
    value: "Q1-Q4 = 11.0,10.5,10.0,10.0"
    unit: "USD K per active site-month"
    source: "[A4-A6]; [BP milestones Month 18 and Month 24]; blended revenue per active site falls as one-time launch fees are spread across a larger installed base and recurring per-site SaaS becomes the larger share of revenue."
  - id: A12
    name: "Y3 blended monthly revenue per active site"
    value: "Q1-Q4 = 9.0,8.5,8.0,7.5"
    unit: "USD K per active site-month"
    source: "[A5-A6]; [BP market.som 35 live sites at roughly $40k per site-year]; [Research market.som rationale 35 sites at $40k]; Y3 mix normalizes toward recurring per-site software with implementation and analytics still adding meaningfully on new deployments."
  - id: A13
    name: "Gross margin ramp"
    value: "Y1 35-50%; Y2 55-62%; Y3 65-72%"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70]; [BP operatingAssumptions read-only integrations and repeatable compliance templates]; startup-finance heuristic: early deployments are services heavier, then margins improve as launch templates and connectors are reused."
  - id: A14
    name: "Monthly active-site churn"
    value: "1.5"
    unit: "percent"
    source: "Startup-finance heuristic for sticky B2B health-system workflow software where most growth comes from same-buyer site expansion and live sites rarely churn quickly once embedded."
  - id: A15
    name: "Founder loaded annual cash compensation"
    value: "160"
    unit: "USD K"
    source: "Startup-finance heuristic for a pre-seed founder taking below-market cash compensation while covering payroll tax and benefits."
  - id: A16
    name: "Engineering loaded annual compensation"
    value: "190"
    unit: "USD K per FTE"
    source: "[BP team founding eng and later platform hires]; startup-finance heuristic for a regulated healthtech software engineer working on routing logic, data ingestion, and auditability."
  - id: A17
    name: "Pharmacy informatics and compliance compensation"
    value: "170"
    unit: "USD K per FTE"
    source: "[BP team pharmacy informatics and compliance lead]; startup-finance heuristic for a senior pharmacy-operations/compliance hire."
  - id: A18
    name: "Implementation and customer success compensation"
    value: "135"
    unit: "USD K per FTE"
    source: "[BP team implementation and customer success lead]; startup-finance heuristic for field implementation, onboarding, and KPI-baseline work in rural health systems."
  - id: A19
    name: "Partnerships and sales engineering compensation"
    value: "155"
    unit: "USD K per FTE"
    source: "[BP team partnerships and sales engineer]; startup-finance heuristic for a partner-facing pre-sales and integration role."
  - id: A20
    name: "Sales / business development compensation"
    value: "170"
    unit: "USD K per FTE"
    source: "[BP strategicChoices.sequencingRationale says scaled sales comes after repeatability]; startup-finance heuristic for one enterprise seller with modest variable pay."
  - id: A21
    name: "Operations / G&A compensation"
    value: "125"
    unit: "USD K per FTE"
    source: "Startup-finance heuristic for a late-stage finance and operations generalist added only after deployment volume rises."
  - id: A22
    name: "Hiring schedule"
    value: "M3 Informatics; M6 Implementation1; M9 Partnerships/SE; M15 Implementation2; M18 Engineer2; M21 Sales1; M30 Ops1; M33 Engineer3"
    unit: "hires"
    source: "[BP team startTiming]; [BP strategicChoices.sequencingRationale]; model keeps commercial hiring behind implementation and product work until the first partner-sourced expansion milestone is hit."
  - id: A23
    name: "Non-salary sales and marketing spend"
    value: "Y1 $6-10K/mo; Y2 $12-18K/mo; Y3 $20-30K/mo"
    unit: "USD K per month"
    source: "Startup-finance heuristic for founder-led enterprise sales, site travel, conferences, partner development, and CRM spend in a narrow regulated market."
  - id: A24
    name: "Non-salary product and tooling spend"
    value: "Y1 $9-11K/mo; Y2 $12-16K/mo; Y3 $18-24K/mo"
    unit: "USD K per month"
    source: "[BP operations data pipeline, OEM connectors, and auditability workflows]; startup-finance heuristic for cloud, data tooling, and integration software spend."
  - id: A25
    name: "Non-salary G&A and compliance spend"
    value: "Y1 $5-7K/mo; Y2 $8K/mo; Y3 $8-10K/mo"
    unit: "USD K per month"
    source: "[BP operations compliance workflow and partner contracting]; startup-finance heuristic for legal, insurance, accounting, and launch-state compliance costs."
  - id: A26
    name: "Blended CAC"
    value: "43"
    unit: "USD K per new active site"
    source: "Model-derived from about $1.5M of cumulative sales and marketing spend across 35 site launches; site-level CAC is lower than logo CAC because the BP expects production customers to expand to second sites at a 70%+ rate."
  - id: A27
    name: "Steady-state annual ARPU for unit economics"
    value: "52"
    unit: "USD K per active site-year"
    source: "[A5]; unit economics use the recurring $40K site subscription plus recurring analytics and managed-volume attach, not the temporary first-system launch package."
  - id: A28
    name: "Next-round milestone plus buffer"
    value: "10 live sites by Month 18 and 15 live sites by Month 24"
    unit: "milestone"
    source: "[BP milestones Month 18 ten live sites and first partner-sourced expansion deal; Month 24 fifteen live sites]; funding ask includes a six-month buffer beyond the first hard expansion-proof milestone."
