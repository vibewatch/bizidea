slug: autonomous-pharmacy-control-tower
date: '2026-07-01'
executiveSummary: >-
  Autonomous dispensing is moving from prototype to rollout, and Queue's launch
  makes the deployment problem immediate for pharmacy operators rather than
  theoretical. The best first buyer is a rural 340B health system that is
  trying to keep local medication access alive after closures, staffing gaps,
  or reimbursement pressure force a new operating model. The wedge is not
  another robot; it is the control layer that decides which 250-280 medications
  stay local, which prescriptions route to hub fill or telepharmacy, and how
  exceptions remain auditable across 340B and DSCSA workflows. That makes the
  first proof point operational, not aspirational: can one system launch its
  first autonomous site with higher local fill rates and lower exception labor
  than spreadsheets and manual queues? The product should therefore start as a
  read-only, hardware-agnostic planning and exception-routing layer for
  non-controlled maintenance medications in permissive telepharmacy states, not
  as a write-back dispensing system. The researched rural 340B beachhead is
  real but small at about $80.8M of current TAM, so the venture case depends on
  using this wedge to earn expansion into broader outpatient and retail
  networks. Two gaps remain unresolved in the research: it does not yet prove
  how many named rural systems will pilot autonomous cells in the next 12-24
  months, and it does not yet show what share of scripts at a target site fits
  a 250-280 SKU local formulary without harming service levels. The first 12
  months should therefore be run as a falsification program focused on design
  partners, launch-state legality, integration repeatability, and measurable
  fill-rate or exception-turnaround gains.
problem:
  - >-
    Rural hospital outpatient pharmacies and community drugstores are losing
    economic viability because labor shortages, closures, and negative
    reimbursement erode the legacy staffed-store model while patients still need
    routine medications locally.
  - >-
    First-generation autonomous cells support only about 250-280 common
    medications, so every deployment creates a high-stakes formulary problem:
    what stays local, what routes to hub fill, and what requires remote
    pharmacist intervention.
  - >-
    The current alternative is spreadsheet planning, wholesaler reports, manual
    telepharmacy queues, and static routing rules, which are too brittle to
    launch multi-site autonomous access safely or keep 340B and DSCSA workflows
    auditable.
solution:
  - >-
    A read-only control tower ingests historical dispensing, reimbursement, and
    robot-capacity constraints to recommend the local 250-280 SKU formulary for
    each autonomous site before go-live.
  - >-
    The product routes non-fit prescriptions by formulary, payer, clinical, and
    340B rules into central fill, staffed pharmacy, or telepharmacy workflows
    before they become failed local fills.
  - >-
    Operations dashboards track local fill rate, abandoned scripts, exception
    turnaround, margin by SKU, and county-level access performance so the buyer
    can justify expansion site by site.
whyWeWin:
  - >-
    Incumbents own hardware, hub automation, or compliance records after a
    routing decision is made, but none clearly owns neutral, cross-vendor
    formulary and exception orchestration for distributed rural access
    networks.
  - >-
    The beachhead has a concrete buying trigger: a closure, staffing crisis, or
    signed robot pilot that forces the operator to choose a launch formulary and
    exception model before the first cell goes live.
  - >-
    Repeated deployments create a differentiated dataset on demand concentration
    versus a 250-280 SKU budget, routing outcomes by payer and 340B status, and
    which exception patterns actually preserve access without recreating labor.
  - >-
    Starting with read-only integrations, permissive states, and non-controlled
    maintenance medications makes the first product easier to adopt than a full
    dispensing-platform replacement.
strategicChoices:
  beachhead: >-
    340B rural health systems with 4-8 hospital-owned outpatient pharmacies,
    one hub or central-fill pharmacy, and a planned first autonomous or
    kiosk-style dispensing site in a permissive telepharmacy state after recent
    hour cuts or a nearby store closure.
  wedgeRationale: >-
    This entry point creates the fastest proof because the customer already has
    a budget trigger, a constrained 250-280 SKU hardware footprint, and a
    measurable launch KPI. Selling broader retail orchestration, full
    telepharmacy software, or general inventory optimization would add more
    buyers and integrations before the company proves it can launch one
    autonomous site safely.
  sequencingRationale: >-
    Build read-only formulary planning and exception routing first, because that
    is the lowest-friction path to pre-go-live value and avoids deep PMS write
    access before compliance and partner data flows are trusted. Sell founder
    led into named rural systems first, then add OEM and 340B channel partners
    only after the first case study proves higher fill rates or lower exception
    labor. Hire engineering, pharmacy informatics, and implementation ahead of
    a scaled sales team because repeatable launch templates matter more than top
    of funnel volume at this stage.
  notYet:
    - Controlled-substance workflows
    - Full pharmacy management system replacement
    - Urban convenience kiosks without a 340B or access-preservation use case
    - Home-delivery orchestration as a standalone product
    - National rollout into states without a repeatable telepharmacy template
market:
  tam: "$80.8M current beachhead TAM (1,615 rural 340B hospitals x 1.25 candidate autonomous or remote-dispensing sites per network x roughly $40k annual control-layer budget proxy per site)"
  sam: "$16.2M near-term SAM (about 20% of beachhead sites that look ready for multi-site rural deployments with hub or contract-pharmacy workflows)"
  som: "$1.4M year-3 SOM (about 35 live sites across 6-8 rural systems at roughly $40k per site-year)"
  segments:
    - "Primary: rural 340B hospital outpatient pharmacy networks launching their first autonomous or kiosk-style dispensing sites"
    - "Secondary: regional health systems and retail pharmacy operators coordinating mixed autonomous, central-fill, and telepharmacy networks after the rural template is proven"
  buyingProcess: >-
    The Chief Pharmacy Officer, VP Pharmacy Operations, or COO usually sponsors
    the project when a closure, staffing gap, or signed hardware pilot makes the
    local-access redesign unavoidable. Pharmacy IT, 340B owners, telepharmacy
    supervisors, and compliance leads then review launch-state legality, data
    access, and hub-routing workflows; the first contract is most likely a paid
    pre-go-live pilot tied to one site and the hub pharmacy.
product:
  mvp: >-
    A read-only control tower for one rural health system and one hub pharmacy
    that imports historical dispensing, reimbursement, and robot-capacity data
    to recommend a local formulary and daily routing rules for non-controlled
    maintenance medications. The MVP includes an exception workbench with
    telepharmacy, central-fill, and 340B audit trails, but no autonomous
    clinical decisions or write-back into dispensing systems.
  sixMonth: >-
    Three design-partner sites live in one to two permissive states with one
    PMS integration, one 340B data feed, one OEM connector, daily formulary
    recommendations, and dashboards for local fill rate, abandoned scripts, and
    exception reasons.
  twelveMonth: >-
    Reusable launch templates for telepharmacy legality, OPAIS-aware carve-in
    and carve-out rules, and hub fallback workflows across 6-8 live sites in
    two to three rural systems, with benchmark reports on fill rate, exception
    turnaround, and margin by SKU.
  twentyFourMonth: >-
    Cross-vendor network planning across 15 or more sites plus first expansion
    pilots in hospital outpatient or regional retail networks, while keeping the
    core product focused on formulary, routing, and exception orchestration
    rather than dispensing software.
  keyBets:
    - Near-term autonomous or kiosk-style pilot volume exists inside rural 340B systems, not just in large chains.
    - A 250-280 SKU local formulary covers enough targeted maintenance-demand volume to create visible access gains.
    - Read-only integrations deliver enough value before deep write-back automation is required.
    - Buyers will pay at roughly $40k per live site-year and expand to additional sites after the first proof point.
gtm:
  wedge: >-
    Sell a "first autonomous-site launch system" that decides what stays local,
    what routes to hub fill or telepharmacy, and how to hit fill-rate and labor
    targets within the first 90 days of go-live.
  channels:
    - Founder-led direct sales to rural 340B Chief Pharmacy Officers and COOs using pharmacy-desert, closure, and access-preservation narratives
    - Co-sell with autonomous pharmacy OEM and kiosk vendors that already own the hardware procurement motion
    - Referral and integration partnerships with 340B split-billing vendors and telepharmacy providers after the first pilot proves workflow fit
  funnelTargets: "Target account → qualified discovery 30-40%, discovery → paid pilot 20-30%, pilot → production 60%+, production → second-site expansion 70%+"
  pricing: >-
    Annual SaaS per live autonomous site or cell at roughly $40k per site-year,
    plus one-time implementation and an optional managed prescription-volume fee
    for exception analytics. This matches the researched site-budget proxy and
    ties spend to access-preservation and automation outcomes rather than user
    seats or generic IT budget.
businessModel:
  revenueStreams:
    - Annual subscription per live autonomous site or dispensing cell
    - Implementation and integration fees
    - Managed prescription-volume or exception-analytics add-on fees
    - Network benchmarking and compliance modules for multi-site customers
  unitOfValue: Live autonomous dispensing site or cell under formulary and routing management
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from the first live site to every eligible outpatient site in the same health system
    - Add benchmark analytics on access, reimbursement, and exception performance
    - Support additional OEM and pharmacy-software connectors to win broader mixed networks
    - Reuse the rural template in hospital outpatient and regional retail networks
strategyMap:
  northStarMetric: Live autonomous sites hitting target local fill rate and exception-turnaround SLA each month
  inputMetrics:
    - Paid design partners with board-approved launch timelines
    - Percentage of targeted maintenance scripts covered by the recommended local formulary
    - Local fill rate for targeted medications
    - Exception turnaround time
    - Abandoned or rerouted-script rate
    - Pilot-to-production and production-to-second-site expansion rates
  moatsToBuild:
    - De-identified demand-concentration dataset linking local SKU budgets to realized fill outcomes
    - Routing and exception log library tied to 340B, payer, and DSCSA conditions across sites
    - Repeatable launch templates for OEM, PMS, and 340B data ingestion in permissive states
    - Access and ROI benchmark dataset that compares autonomous-site performance across counties and networks
  killCriteria:
    - Fewer than 3 paid health-system design partners or fewer than 2 partner data integrations by month 12
    - The first 2 live pilots fail to improve either targeted local fill rate by at least 10 percentage points or exception turnaround by at least 30% versus manual baseline
    - More than half of target accounts or launch states block the legal or data-access model required for a repeatable rollout template
    - After the third deployment, each new site still needs more than 40 hours of custom compliance or integration work to go live
  mermaid: |
    flowchart LR
      Wedge[First autonomous-site launch wedge] --> MVP[Read-only formulary and routing MVP]
      MVP --> Proof[Higher fill rate and lower exception labor]
      Proof --> Expansion[Broader outpatient and retail network orchestration]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Clear pain and a credible wedge, but conviction stays moderate until the
      company proves named near-term pilot volume and expansion beyond a small
      rural 340B beachhead.
    whyBelieve: >-
      Autonomous dispensing is arriving exactly when rural pharmacy economics are
      breaking, and the launch problem is specific enough that a neutral control
      layer can plausibly win budget before incumbents react.
    whyDoubt: >-
      The current researched TAM is only about $80.8M, and the company fails if
      pilot timing, state legality, or partner data access are weaker than the
      plan assumes.
    nextDiligence: >-
      Verify three named rural systems with 12-24 month deployment plans and one
      de-identified script dataset proving what share of demand fits a 250-280
      SKU local formulary.
  firstCustomer:
    title: Chief Pharmacy Officer at a rural 340B health system
    profile: >-
      A 4-8-site rural health system with hospital-owned outpatient pharmacies,
      one hub pharmacy, recent closure or hour-cut pressure, and an active plan
      to launch its first autonomous or kiosk-style dispensing site.
    trigger: >-
      A staffing gap, nearby pharmacy closure, or signed OEM pilot forces the
      system to decide which medications stay local and how exceptions will be
      handled before go-live.
    buyer: Chief Pharmacy Officer
    initialContract: >-
      Paid launch package of roughly $75k-$125k covering formulary modeling,
      compliance setup, and the first live site, converting to about $40k per
      live site-year plus implementation and optional volume fees as the system
      expands to 4-8 sites.
  mustBeTrue:
    - At least 6 rural 340B systems plan autonomous or kiosk-style dispensing pilots in the next 24 months.
    - A target site's top 250-280 medications cover at least 60% of targeted maintenance-script demand without unacceptable service degradation.
    - A neutral control layer can ingest PMS, 340B, and OEM data read only without custom write-back at every site.
    - Buyers will fund roughly $40k per live site-year from automation or access-preservation budgets after the first proof point.
    - The same routing and compliance template can expand from rural 340B into broader outpatient or retail networks.
  diligenceQuestions:
    - Which named rural 340B systems already have board-approved autonomous or kiosk-style pilot timelines?
    - What share of scripts at a target site fits the first 250-280 SKU local formulary, and which exception types dominate the remainder?
    - Which states permit the intended non-controlled autonomous-dispensing plus remote-verification model for the first launch sites?
    - What data and API access will OEM, PMS, and 340B vendors actually expose to a neutral orchestration layer?
    - Which KPI package unlocks budget fastest for the CFO and CPO: fill rate, avoided labor, reduced abandoned scripts, or access-preservation evidence?
operatingAssumptions:
  - assumption: >-
      There are enough rural 340B systems with 12-24 month autonomous or
      kiosk-style launch plans to support a focused design-partner GTM.
    basis: research.yaml
    validationTest: >-
      Interview 15 target systems and OEM partners, then secure at least 3 paid
      design partners or board-approved launch plans within 6 months.
    decisionImpact: >-
      If false, the wedge is too early; the company should keep burn low, delay
      expansion hiring, or pivot toward OEM-facing planning software.
  - assumption: >-
      A 250-280 SKU local formulary covers enough targeted maintenance-script
      demand to create measurable access and labor gains.
    basis: research.yaml
    validationTest: >-
      Analyze 12 months of de-identified dispense history from at least 2 target
      sites and confirm that the proposed local formulary covers at least 60% of
      targeted demand and can improve local fill rate by 10 percentage points.
    decisionImpact: >-
      If false, the beachhead narrows to higher-volume sites or the core wedge
      is not strong enough to justify standalone software.
  - assumption: >-
      At least 3 target launch states allow the intended non-controlled,
      autonomous-dispensing plus remote-verification model with a repeatable
      compliance template.
    basis: research.yaml
    validationTest: >-
      Produce state-board or counsel-backed launch memos for the first 5 target
      states and clear at least 3 without custom legal redesign of the workflow.
    decisionImpact: >-
      If false, the company must slow GTM, narrow geography sharply, and treat
      regulatory sequencing as the main bottleneck rather than product.
  - assumption: >-
      Read-only PMS, 340B, and OEM integrations are sufficient for the MVP to
      deliver daily recommendations and exception visibility.
    basis: research.yaml
    validationTest: >-
      Stand up one PMS feed, one 340B data source, and one OEM connector and
      generate daily routing recommendations within 30 days of onboarding.
    decisionImpact: >-
      If false, implementation becomes services heavy, gross margin compresses,
      and the hiring plan must shift toward integration labor.
  - assumption: >-
      Buyers will pay at roughly $40k per live site-year plus implementation if
      the product improves fill rate and reduces exception labor.
    basis: idea.yaml
    validationTest: >-
      Present the pricing model to 10 Chief Pharmacy Officer or COO buyers and
      secure at least 3 LOIs or paid pilots at the target range.
    decisionImpact: >-
      If false, pricing must fall or move into OEM revenue share, which weakens
      the standalone software case and may reduce the appropriate funding ask.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Named-account and OEM launch-pipeline audit
    hypothesis: Enough rural 340B systems and OEM partners have real 12-24 month deployment plans to support a focused beachhead.
    successMetric: 3 named systems and 2 OEM or kiosk partners confirm planned launches and agree to follow-on design conversations
    owner: Founding CEO
  - horizon: 0-90 days
    experiment: Launch-state legality matrix
    hypothesis: At least 3 target states permit the initial non-controlled autonomous plus remote-verification workflow.
    successMetric: Counsel or board-guidance memos clear 3 states and document blockers for the next 2
    owner: Pharmacy informatics and compliance lead
  - horizon: 90-180 days
    experiment: Historical dispensing concentration study
    hypothesis: A 250-280 SKU recommended formulary can cover enough targeted demand to improve local access at design-partner sites.
    successMetric: Top 250-280 SKUs cover at least 60% of targeted maintenance scripts and modelled local fill rate improves by 10 percentage points
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Read-only integration pilot
    hypothesis: PMS, 340B, and OEM data can power daily recommendations without deep write-back into dispensing systems.
    successMetric: Daily recommendation feed live within 30 days and manual rekeying falls below 10 cases per day at the pilot site
    owner: Founding eng and pharmacy ops lead
  - horizon: 180-365 days
    experiment: First live autonomous-site launch
    hypothesis: The control tower improves launch outcomes enough to justify production expansion.
    successMetric: At least 10 percentage points higher targeted local fill rate or 30% faster exception turnaround versus manual baseline in the first 90 days
    owner: Implementation lead
  - horizon: 365-540 days
    experiment: Partner-sourced expansion motion
    hypothesis: One OEM, 340B, or telepharmacy partner can source additional deployments without collapsing pricing.
    successMetric: 2 partner-sourced pilots or 1 production expansion deal at target economics by month 18
    owner: Founding CEO and partnerships lead
operations:
  - "Data pipeline: daily imports of dispensing history, reimbursement, 340B status, and cell-capacity data from PMS, wholesaler, and OEM feeds."
  - "Compliance workflow: launch-state telepharmacy rules, OPAIS-aware carve-in or carve-out records, and DSCSA audit trails are configured before any write-back automation."
  - "Exception management: non-fit prescriptions are routed to telepharmacy, hub fill, or staffed sites with explicit pharmacist signoff and reason codes."
  - "Customer cadence: weekly go-live reviews during launch and monthly business reviews on fill rate, abandoned scripts, exception reasons, and margin by SKU."
  - "Key partners: autonomous pharmacy OEMs, 340B split-billing vendors, telepharmacy providers, and hub pharmacies."
team:
  - role: Founding CEO and pharmacy-operations seller
    startTiming: Month 0
    rationale: >-
      Owns design-partner sales, pricing, and partner development with Chief
      Pharmacy Officers and COOs during an active access or automation trigger.
  - role: Founding eng
    startTiming: Month 0
    rationale: >-
      Builds the routing engine, de-identified demand model, partner connectors,
      and auditability layer across PMS, 340B, and OEM systems.
  - role: Pharmacy informatics and compliance lead
    startTiming: Month 3
    rationale: >-
      Encodes telepharmacy, 340B, and DSCSA launch rules so the product stays a
      repeatable template instead of becoming custom services work.
  - role: Implementation and customer success lead
    startTiming: Month 6
    rationale: >-
      Runs site onboarding, baseline KPI capture, and go-live execution so the
      first deployments become case studies and reusable playbooks.
  - role: Partnerships and sales engineer
    startTiming: Month 9
    rationale: >-
      Owns OEM, 340B, and telepharmacy integrations plus partner-sourced
      pipeline once the first direct deployments prove the core workflow.
milestones:
  - horizon: 0-12 months
    items:
      - "Month 3: secure 2 design partners and complete launch-state memos for the first 3 target states"
      - "Month 6: finish one PMS feed, one 340B feed, and one OEM connector plus a validated formulary-concentration study"
      - "Month 9: launch the first live autonomous site with baseline and post-go-live fill-rate and exception metrics"
      - "Month 12: reach 3 paid systems, 6 live sites, and one case study showing either 10-point fill-rate lift or 30% faster exception turnaround"
  - horizon: 12-24 months
    items:
      - "Month 18: secure the first partner-sourced expansion deal and reach 10 live sites across at least 3 systems"
      - "Month 21: reduce new-site launch effort below 40 custom hours through reusable compliance and integration templates"
      - "Month 24: reach 15 live sites and start the first expansion pilot in a non-rural outpatient or retail network"
  - horizon: 24-36 months
    items:
      - "Month 30: prove the product can manage mixed networks across multiple OEM or pharmacy-software stacks"
      - "Month 36: reach roughly 35 live sites across 6-8 systems and decide whether broader outpatient expansion supports a seed-to-Series A path"
risks:
  - risk: Autonomous or kiosk-style hardware rollouts happen more slowly than current launch narratives suggest
    likelihood: High
    impact: High
    mitigation: >-
      Start with named buyers that already have signed or budgeted launch plans,
      keep the product useful for pre-go-live planning, and avoid hiring ahead
      of verified deployment timelines.
  - risk: Telepharmacy, 340B, and DSCSA variation turns the product into custom services work
    likelihood: High
    impact: High
    mitigation: >-
      Restrict v1 to non-controlled maintenance medications in permissive states,
      codify repeatable launch templates, and decline edge-case workflows until
      the common deployment path is proven.
  - risk: OEM, PMS, or 340B vendors limit data access or bundle similar orchestration features
    likelihood: Medium
    impact: High
    mitigation: >-
      Secure read-only integrations with at least 2 partner stacks early and be
      willing to anchor on one ecosystem temporarily if neutrality cannot be
      supported on acceptable terms.
  - risk: KPI lift is too small for buyers to fund a standalone control layer
    likelihood: Medium
    impact: High
    mitigation: >-
      Sell against measured baseline fill rate, abandoned scripts, and exception
      labor, and refuse pilots that do not allow pre and post KPI comparison.
  - risk: The rural 340B beachhead does not expand into a broader network-orchestration market
    likelihood: Medium
    impact: High
    mitigation: >-
      Keep burn aligned to the current SOM, test adjacent outpatient and retail
      use cases only after rural proof, and avoid raising on unproven expansion
      assumptions.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway to build the read-only formulary and routing engine,
    ship launch-state compliance templates, hire founding engineering,
    informatics, and implementation talent, secure 3 paid rural health-system
    pilots with 6-10 live sites, and determine whether the rural 340B wedge can
    expand into broader outpatient networks before the next financing decision.
