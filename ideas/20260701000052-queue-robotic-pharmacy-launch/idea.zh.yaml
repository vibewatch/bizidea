problem: 农村医院门诊药房和社区小药店，正被用工短缺、关店潮和报销倒挂三面夹击，可当地居民照样需要快速拿到常用药。自动配药舱承诺更便宜的运营模式，但首批系统只能覆盖有限的常用药目录，反而制造出一个新的运营难题：哪些处方该留在舱内，哪些需要远程药师介入，哪些该转到中心配药或其他站点。少了这层控制，买家很可能装上昂贵的硬件，却依然接不住本地需求、卡在异常处理上，最终没能真正恢复药品可及性。
targetUser:
  primary: 340B 农村医院系统的首席药房官和门诊药房运营负责人——他们正在试点自动配药舱，好在门店关闭或裁员之后，继续为药房荒漠地区的居民提供服务
  secondary: 同一网络内负责处方目录、异常处理和远程核验的远程药房主管、药品采购负责人和站点药师
  buyer: 首席药房官、药房运营副总裁或首席运营官（COO）
startupThesis:
  nonObviousInsight: 机器人药房赛道上第一个大赢家，未必是又一家硬件商。早期配药舱只能处理很窄的常用药目录，报销又已经倒挂，真正稀缺的能力是那层控制面——决定每种药该放在哪，异常又该怎么处理，同时不把机器人本该省掉的人力成本悄悄加回来。
  beachhead: 药房荒漠县域内、正在为 200 到 300 种维持性用药试点自动配药舱的 340B 农村医院门诊药房运营方
  wedge: 一座自动药房控制塔：为每个站点推荐本地处方目录，把不合适留在本地的处方分流到中心配药或远程药房，管理远程药师的异常处理，并按配药舱跟踪可及性和单位经济模型
  whyNowCatalyst: Queue 的发布、大型连锁药房原型和明年的推广计划，让自动药房部署迫在眉睫；与此同时，报销压力和用工缺口也在倒逼农村运营商重新思考本地用药可及性该怎么做。
  ventureScalePath: 从农村 340B 门诊药房起步，再扩展到医院门诊部、区域连锁零售药房、雇主和校园站点，最终成为协调自动配药舱、中心配药、远程药房和送药上门的网络运营层，覆盖所有常规用药的可及性问题。
solution: 自动药房控制塔摄入历史配药记录、本地需求、报销数据和机器人产能约束，为每个站点推荐该留哪 200 到 300 种药。对于因处方目录、支付方或临床原因不适合留在舱内的处方，产品会提前生成路由规则，在患者上门之前就把它们分流到中心配药、有药师值守的药房或远程药房队列。远程药师和运营负责人则拿到一块仪表盘，实时看异常率、弃单、缺货、按 SKU 的毛利，以及按县或站点划分的可及性表现。第一版产品刻意只做处方目录和异常编排，不碰核心配药本身，这样才能不依赖具体硬件，更快搭配 Queue 这类系统一起落地。随着时间推移，这套平台会成为分布式用药可及性网络的决策引擎，而不只是某家店里的一台机器人。
goToMarketSeed:
  firstCustomer: 一家 340B 农村医疗系统：在药房荒漠县域拥有 4 到 8 家医院自营门诊药房、一家中心配药或枢纽药房，并且刚经历过缩短营业时间或附近门店关闭，正在积极筹划试点第一个自动配药舱
  buyingTrigger: 本地药房关闭、持续招不到药师值守，或者已经签了自动药房厂商的试点协议——这些都会逼着系统立刻决定哪些药能留在本地、异常又该怎么处理
  currentAlternative: 用 Excel 表格规划处方目录、翻批发商和药房管理系统报表、人工过一遍远程药房审核队列、手写中心配药路由规则，外加缩短营业时间
  switchingReason: 控制塔能在上线前就给运营方一套针对该站点的启动方案和实时异常处理流程，让第一个自动配药舱达到本地填单率和安全目标，而不会把机器人本该省掉的人力又悄悄加回来
  pricingHypothesis: 按自动化站点或配药舱收取年度 SaaS 订阅费，再叠加按处方管理量计费的附加费，以及路由和分析功能的实施费
