- name: 硬件落地滞后
  description: 如果自动药房部署比预期慢，初始客户规模成型的速度可能跟不上软件路线图的假设。
  mitigation: 先从已经在筹划试点的共创客户切入，让产品保持硬件无关，并在正式上线前就支撑有用的处方目录和路由决策。
- name: 流程与合规碎片化
  description: 各州规则、支付方流程和远程药师作业方式可能千差万别，足以把一款产品拖成定制化服务项目。
  mitigation: 把第一版 ICP 限定在可复制的农村门诊药房部署场景，交付可配置的路由模板，第一版先不碰受管制药品和边缘场景。
- name: 投资回报难以量化
  description: 运营商可能会质疑：更好的处方目录和异常编排，省下的钱或可及性的提升，够不够撑起一层新软件的成本。
  mitigation: 围绕具体的上线 KPI 来卖，比如本地填单率、异常处理时长、弃单率下降幅度，以及省下的用工或关店成本。
