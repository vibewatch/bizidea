scenarios:
  downside:
    description: >-
      Pilot conversions slip by a quarter, mature ACV lands a bit below plan,
      and deployment work stays more bespoke through the Kenya rollout.
    y3RevenueK: 2576.0
    y3EbitdaK: -269.8
    cashLowPointK: 254.2
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches about 15 instead of 17."
      - "Blended realized revenue per mature logo tops out near $53K per quarter instead of $56K."
      - "Gross margin exits around 72% instead of 74% because connector and policy work stays more bespoke."
  base:
    description: >-
      Nigeria-first pilots convert on roughly one-quarter proof cycles, Kenya
      expansion is repeatable, and usage-based expansion lifts mature logo
      value toward the top half of the BP ACV band.
    y3RevenueK: 2951.0
    y3EbitdaK: 37.7
    cashLowPointK: 477.2
    keyAssumptionChanges:
      - "3 paying logos by M12, 8 by Q4Y2, and 17 by Q4Y3."
      - "Blended realized revenue per logo rises from $45K per quarter in early Y2 to $56K by Q4Y3."
      - "Gross margin crosses 70% in Y2 and exits Y3 at 74% as rule packs and connector reuse improve."
  upside:
    description: >-
      Partner-sourced pipeline lands earlier, Nigeria playbooks transfer cleanly
      into Kenya, and mature logos expand faster on recovered-account usage.
    y3RevenueK: 3338.0
    y3EbitdaK: 351.8
    cashLowPointK: 687.2
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches about 18 instead of 17."
      - "Blended realized revenue per mature logo reaches roughly $58K per quarter on stronger usage and expansion."
      - "Gross margin exits around 75% as deployments standardize faster than plan."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Mature logos plateau closer to $200K ARR with lighter usage attach."
    baseCase: "Mature logos exit near $224K ARR."
    upsideCase: "Usage-based expansion pushes mature logos toward about $232K ARR."
    y3RevenueImpactK: -295.0
    cashImpactK: -210.0
  - variable: "CAC"
    downsideCase: "Partner referrals underperform and CAC drifts toward about $120K per logo."
    baseCase: "CAC stays near $95K with founder-led plus partner-assisted selling."
    upsideCase: "Partner-sourced pilots hold CAC closer to about $80K per logo."
    y3RevenueImpactK: -140.0
    cashImpactK: -230.0
  - variable: "churn"
    downsideCase: "Monthly logo churn rises toward 2.5% if the wedge feels too narrow for some fintechs."
    baseCase: "Monthly logo churn holds near 1.5% once the workflow is embedded."
    upsideCase: "Monthly logo churn stays near 1.0% as audit logs and playbooks become sticky."
    y3RevenueImpactK: -180.0
    cashImpactK: -140.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production conversion stretches from one quarter to roughly two quarters."
    baseCase: "Paid pilots convert to annual production in roughly one quarter."
    upsideCase: "Economic buyers and compliance sign-off compress conversion toward 60-75 days."
    y3RevenueImpactK: -420.0
    cashImpactK: -280.0
  - variable: "gross margin"
    downsideCase: "Gross margin exits near 70%-72% because Kenya deployments remain bespoke."
    baseCase: "Gross margin exits around 74% after rule-pack and connector reuse."
    upsideCase: "Gross margin reaches about 75%-76% as secure-link workflows standardize faster."
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
  - variable: "hiring pace"
    downsideCase: "The second GTM and second solutions hires are pulled forward before Y2 proof is locked in."
    baseCase: "Scale hiring follows the BP sequencing and waits for logo-conversion proof."
    upsideCase: "One late Y3 scale hire can be delayed without slowing bookings materially."
    y3RevenueImpactK: 60.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      NamedAccounts[Named fintech accounts] --> PaidPilots[Paid recovery pilots]
      PaidPilots --> ProductionLogos[Production logos]
      ProductionLogos --> UsageFees[Volume and recovery usage]
      UsageFees --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue is driven by growing from 3 paying fintech logos at Y1 exit to 17 by Q4Y3 while mature logo value rises from pilot pricing to about $224K ARR."
  - checkName: "Must go right"
    finding: "The company must keep pilot-to-production conversion near one quarter and make Kenya deployments repeatable enough to hold the under-45-day implementation target."
  - checkName: "Model breaks if"
    finding: "If sales cycles stretch toward two quarters or gross margin stays near 70%, the downside case pushes the cash floor toward roughly $0.25M before Y3 scale is proven."
  - checkName: "Next-round proof"
    finding: "The seed story is 6-8 live production logos across Nigeria and Kenya plus at least one partner-sourced paid pilot before the company spends into the second half of Y3."
sanityChecks:
  ruleOf40: "Y3 growth 154.8% + EBITDA margin 1.3% = 156.1%"
  burnMultiple: "Y2 burn multiple is about 0.7x using roughly $697.2K of EBITDA burn against about $952.0K of net new ARR; Q4Y3 exits above breakeven."
  revenuePerFte: "$246K Y3 on 12 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "The base case reaches 17 paying logos in a modeled 55-account SAM, so concentrated referenceability and partner leverage are critical."
    - "CustomersEop includes paid pilots and annual contracts, so recurring-only production logos trail the headline count through most of Y1 and early Y2."
    - "Gross margin clears the 70% target only after deployment work becomes repeatable; a more services-heavy Kenya rollout would keep EBITDA negative longer."
    - "The Q2Y3 cash low point of about $0.48M leaves limited room for a failed country launch or a delayed partner channel before a follow-on round."
    - "Cash is modeled as EBITDA, so receivables timing, pilot prepayments, or one-time compliance spend could shift real cash movement."
