slug: first-funding-recovery-agent
date: "2026-07-09"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-09] the model begins with the first full operating month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed raise"
    value: "$2.0M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the stated range to fund the company through the Nigeria and Kenya repeatability milestone with a meaningful buffer."
  - id: A3
    name: "Starting paying logos"
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months] the company starts pre-revenue and must first win paid pilots."
  - id: A4
    name: "Paying logo definition"
    value: "A paid pilot or an annual production contract under activation recovery management"
    unit: definition
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any fintech already paying for pilot or production scope."
  - id: A5
    name: "Paid pilot economics"
    value: "$60K over about 3 months (~$20K/mo)"
    unit: "USD/logo"
    source: "[BP investorMemo.firstCustomer.initialContract $40k-$80k] the base case uses the midpoint for the first Nigeria-first pilots."
  - id: A6
    name: "Production contract and usage economics"
    value: "Production contracts start around $180K ARR and blend toward about $224K ARR by Y3 exit as conditional-approval volume and recovered-funded-account usage attach."
    unit: "USD/logo/year"
    source: "[BP operatingAssumptions sustain $150k-$250k annual production ACV + Research market.som 18 logos at ~$200k] the model stays inside the BP ACV band while letting mature logos earn modest usage expansion."
  - id: A7
    name: "Customer ramp"
    value: "3 paying logos by M12, 8 by Q4Y2, 17 by Q4Y3"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets] the base case matches 2 paid pilots plus 1 production customer in Y1, reaches the BP 6-8 logo range by Y2 exit, and lands near the middle of the year-3 target band."
  - id: A8
    name: "Revenue recognition convention"
    value: "Period-end paying logos multiplied by blended realized revenue per logo for that period: Y1 pilot-heavy months at $20K then $18K per month, Y2 at $45K-$50K per quarter, and Y3 at $50K-$56K per quarter."
    unit: formula
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + BP businessModel.revenueStreams] this keeps revenue directly traceable to customers and the planned pricing mix."
  - id: A9
    name: "Gross margin ramp"
    value: "50%-57% in Y1, 65%-70% in Y2, and 71%-74% in Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + startup-finance heuristic] early pilots are services-heavy before rule packs and connector reuse lift margin above the target threshold."
  - id: A10
    name: "Hiring timeline"
    value: "Founder and founding engineer in M1; compliance or product ops in M4; solutions and integration in M5; partnerships and customer success in M10; sales or GTM in M15; second engineer in M18; G&A in M21; third engineer in M27; second solutions hire in M28; second partnerships hire in M31; second GTM hire in M34."
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until paid-pilot proof exists, then adds delivery and sales capacity only as logos and country scope expand."
  - id: A11
    name: "Founder loaded compensation"
    value: "$120K"
    unit: "USD/year"
    source: "[BP team Founder/CEO + startup-finance heuristic] reflects lean cash pay plus taxes, benefits, and regional travel for founder-led enterprise sales."
  - id: A12
    name: "Engineering loaded compensation"
    value: "$135K"
    unit: "USD/year"
    source: "[BP team Founding eng + startup-finance heuristic] the product requires senior workflow and integration engineering while still operating below US scale-up cash levels."
  - id: A13
    name: "Compliance or product ops loaded compensation"
    value: "$100K"
    unit: "USD/year"
    source: "[BP team Compliance/product ops lead + startup-finance heuristic] this role converts sponsor-bank and country-policy requirements into repeatable controls and playbooks."
  - id: A14
    name: "Solutions or integration loaded compensation"
    value: "$115K"
    unit: "USD/year"
    source: "[BP team Solutions and integration engineer + startup-finance heuristic] delivery speed and connector quality are central to the under-45-day deployment target."
  - id: A15
    name: "Partnerships or customer success loaded compensation"
    value: "$95K"
    unit: "USD/year"
    source: "[BP team Partnerships and customer success lead + startup-finance heuristic] the role owns renewals, expansions, and early partner motions without assuming a large services bench."
  - id: A16
    name: "Sales or GTM loaded compensation"
    value: "$125K"
    unit: "USD/year"
    source: "[BP gtm.channels + startup-finance heuristic] reflects concentrated enterprise outbound, travel, and variable comp once the founder-led motion begins to scale."
  - id: A17
    name: "G&A or ops loaded compensation"
    value: "$80K"
    unit: "USD/year"
    source: "[BP operations + startup-finance heuristic] covers finance, vendor management, and compliance operations once the company is multi-country."
  - id: A18
    name: "Payroll allocation to P&L lines"
    value: "Founder 55% S&M / 15% R&D / 30% G&A; engineering 100% R&D; compliance or product ops 40% R&D / 60% G&A; solutions 30% S&M / 70% R&D; partnerships or customer success 85% S&M / 15% G&A; sales 100% S&M; G&A or ops 100% G&A."
    unit: allocation
    source: "[BP team role rationales + BP operations] this maps payroll into the functional P&L while reflecting founder-led selling and compliance-heavy delivery."
  - id: A19
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll spend rises from S&M/R&D/G&A of $8K/$10K/$8K in early Y1 to $35K/$29K/$22K by Q4Y3."
    unit: "USD/month"
    source: "[BP operations + BP experimentRoadmap + startup-finance heuristic] the ramp covers messaging fees, cloud, travel, legal, privacy and audit work, and partner enablement without assuming a broad paid-demand engine."
  - id: A20
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: formula
    source: "[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: A21
    name: "Steady-state monthly logo churn"
    value: "1.5%"
    unit: "percent per month"
    source: "[startup-finance heuristic for early enterprise workflow SaaS + BP whyWeWin] once activation playbooks, audit logs, and connectors are embedded, the workflow should be sticky but not yet mature-enterprise perfect."
  - id: A22
    name: "Base sales cycle"
    value: "About 90-120 days from discovery to paid pilot and one additional quarter to convert pilot proof into annual production."
    unit: days
    source: "[BP gtm.funnelTargets + BP experimentRoadmap + BP investorMemo.mustBeTrue] the model assumes one quarter is enough to prove recovered-funding lift for early conversions."
  - id: A23
    name: "CAC convention"
    value: "Total 36-month sales and marketing spend divided by 17 new paying logos"
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led and partner-assisted enterprise acquisition across the buildout period."
  - id: A24
    name: "Next-round milestone for funding sizing"
    value: "By Q4Y2 the company should have 6-8 production logos across Nigeria and Kenya, deployment time under 45 days, and at least one partner-sourced paid pilot."
    unit: milestone
    source: "[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap] the pre-seed is sized to reach repeatable multi-country deployment and partner-led pipeline before a seed round."
  - id: A25
    name: "Quarterly salary-roll convention"
    value: "Y2 and Y3 salary rows use actual monthly hires inside each quarter rather than just the year-end snapshots."
    unit: convention
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the monthly hiring ramp even when the schema shows only year-end Y2 and Y3 headcount snapshots."
