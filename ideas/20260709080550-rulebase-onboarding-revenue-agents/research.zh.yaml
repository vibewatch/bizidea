  validationPlan:
  - priority: high
    question: 在一个共创客户那里，已获条件性批准的商户账户中，有多大比例未能在七天内完成放款或交易？
    evidenceToGather: 从 CRM 或贷款发放系统导出的群组数据，按细分市场展示批准、文件异常和首次放款的时间戳。
  - priority: high
    question: 如果敏感材料上传都走安全链接和审计日志，担保银行和合规团队是否会接受以 WhatsApp 为主的文件追讨？
    evidenceToGather: 现有 SOP、法务评审，以及与尼日利亚和肯尼亚合规、运营负责人的联合走查。
  - priority: medium
    question: 预算所有者会把这看作开户类、风控类，还是客户运营类的采购？
    evidenceToGather: 与开户负责人、风控运营和财务做十次发现电话，加一份对标人工跟进成本的试点提案。
