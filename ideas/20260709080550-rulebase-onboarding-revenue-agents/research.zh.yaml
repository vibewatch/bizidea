competitors:
- name: Rulebase
  stage: seed
  wedge: 面向金融服务开户、再激活和服务挽回的持续型 AI 营收智能体。
  pricing: 企业级定制定价 / 联系销售
  strength: 在长周期个案接管和可衡量挽回结果方面，证据最接近。
  weaknessVsUs: 看不出对非洲中小企业钱包和营运资金工作流，或本地注册细节有专门优化。
  sourceRefs:
  - 1
  - 2
- name: Taktile
  stage: scale-up
  wedge: 面向金融机构的智能体化决策、开户和个案管理平台。
  pricing: 企业级定制定价 / 联系销售
  strength: 工作流、规则和个案管理深度都很强，企业信誉度高。
  weaknessVsUs: 优化的是宽泛的决策和个案，而不是接管消息渠道里的批准后激活。
  sourceRefs:
  - 30
  - 31
- name: Alloy
  stage: scale-up
  wedge: 面向银行和金融科技公司的身份、反欺诈、开户和合规编排。
  pricing: 企业级定制定价 / 联系销售
  strength: 平台覆盖面广，在开户和合规预算上占位很强。
  weaknessVsUs: 核心是风控和合规决策，而不是审批已经放行之后的首次放款挽回。
  sourceRefs:
  - 32
  - 33
- name: Smile ID
  stage: scale-up
  wedge: 面向非洲和新兴市场用户的身份验证与文件覆盖。
  pricing: 企业级定制定价 / 联系销售
  strength: 本地市场覆盖和文件专长，让它自然而然地成为身份层的现有厂商。
  weaknessVsUs: 止步于验证和筛查，而不是端到端地接管多步骤的企业激活。
  sourceRefs:
  - 36
  - 35
- name: YouVerify
  stage: scale-up
  wedge: 面向金融科技和支付公司的非洲 AML、KYB 和客户开户自动化。
  pricing: 企业级定制定价 / 联系销售
  strength: 区域合规定位很强，聚焦金融科技/支付也很清晰。
  weaknessVsUs: 本质上仍是合规技术栈和验证导向，而不是持久的营收挽回系统记录中枢。
  sourceRefs:
  - 34
  - 35
