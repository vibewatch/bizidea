openQuestions:
- 在一个共创客户金融科技公司里，已获条件性批准的商户申请人中，目前有多大比例未能在七天内完成放款？这部分流失中，有多少是文件原因，多少是渠道原因？
- 哪些担保银行或监管机构会允许通过 WhatsApp 相关流程收集文件，哪些会要求敏感材料必须完全走门户交接？
- 买家更倾向于一层独立的激活软件，还是会坚持要求产品与现有 KYB 供应商或决策技术栈紧密捆绑？
- 一旦套用国别注册数据缺口和受益所有权规则，挽回打法在商户、分销商和药店这几个细分市场之间，究竟能有多大程度的可复制性？
