businessModelCanvas:
  customerSegments:
    - 非洲中小企业商户钱包类金融科技公司
    - 服务药店、分销商和市场批发商的营运资金平台
    - 由担保银行支持、批准后流失率高的金融科技项目
  valuePropositions:
    - 挽回已获条件性批准的中小企业客户，而不必线性增加运营人力
    - 缩短从批准到首次入金或首次提款的时间
    - 在 KYB、CRM 和交易系统之间建立经得起审计的个案轨迹
  channels:
    - 创始人主导，直接面向中小企业金融科技公司的 COO 和开户负责人销售
    - 来自 KYB 供应商、担保银行和实施合作伙伴的转介
  customerRelationships:
    - 试点与账户挽回提升、激活耗时改善直接挂钩
    - 持续的政策调优和挽回打法优化
  revenueStreams:
    - 年度 SaaS 订阅
    - 按挽回的商户账户或放款信贷额度收取的使用费
    - 工作流与集成搭建的实施费
  keyResources:
    - 长周期个案编排引擎
    - WhatsApp、语音、CRM、KYB 和账本连接器
    - 覆盖各批中小企业开户群组的挽回结果数据集
  keyActivities:
    - 批准后工作流的政策映射
    - 异常分诊和人工在环升级处理
    - 按细分市场和地区做渠道优化
  keyPartners:
    - KYB 与文件验证供应商
    - 担保银行和核心金融科技平台
    - 消息服务商和 BPO 外包合作伙伴
  costStructure:
    - 集成工程
    - 模型与消息基础设施
    - 客户成功和领域支持
    - 企业销售与实施
jobsToBeDone:
  - job: >-
      当一个已获条件性批准的分销商在 KYB 审核后不再回应时，帮我们的开户团队要回缺失的材料和首次入金，把获客成本转化成真正产生营收的活跃账户。
    currentAlternative: 在 WhatsApp、表格和呼叫中心队列之间人工跟进
    successMetric: 已获条件性批准企业在七天内完成激活的比例
  - job: >-
      当担保银行或信贷政策变化带来新的文件异常时，帮我们的风控和运营团队更新挽回打法，而不用把全员重新培训一遍，从而守住审批质量和激活速度。
    currentAlternative: 内部重写 SOP、工单模板和主管带队的质检
    successMetric: 政策变化后激活耗时的中位数
ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      该事件集群包含一次当天发生的产品发布、量化的挽回与激活提升数据，以及具体的工作流范围，而不是一个笼统的 AI 叙事。
  painIntensity:
    score: 5
    rationale: >-
      已批未激活的账户白白浪费获客支出、拖延营收确认，还迫使金融科技公司在客户本该已经转化的环节继续堆人工跟进。
  wedgeClarity:
    score: 5
    rationale: >-
      非洲中小企业钱包和信贷产品的批准后激活是一个范围很窄的工作流，买家、触发点、替代方案和可衡量的成功条件都很清楚。
  defensibility:
    score: 4
    rationale: >-
      护城河来自政策映射、跨系统集成和挽回结果数据，不过 CRM 和 KYC 现有厂商也可能向这个方向靠拢。
  ventureScale:
    score: 4
    rationale: >-
      拿下激活环节后，可以扩展到服务、催收、续约，以及跨金融科技市场的跨产品企业身份基础设施。
topRisks:
  - name: 细分市场外推风险
    description: 信源证实了在非洲的部署，但没有证明商户钱包和营运资金类金融科技公司就是主要的成功细分市场。
    mitigation: 先从一个已经在开户环节使用 WhatsApp 的共创客户切入，按群组衡量挽回提升，在扩大销售前先收紧 ICP。
  - name: 政策碎片化
    description: 担保银行、KYB 供应商和信贷团队可能各自定义不同的证据和升级规则，这会拖慢标准化进程。
    mitigation: 先针对一个产品系列上线可配置的规则包，把智能体的每一步操作都放进人工复核控制台，再逐步扩大自动化范围。
  - name: 敏感渠道合规风险
    description: 通过 WhatsApp 或语音收集受监管的金融文件，可能引发隐私、同意和数据留存方面的担忧。
    mitigation: 使用安全上传链接、明确采集用户同意、加密存储，并为敏感或模糊个案设置确定性的人工兜底路径。
