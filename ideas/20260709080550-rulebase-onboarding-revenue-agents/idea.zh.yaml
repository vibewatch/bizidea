problem: >-
  非洲的中小企业金融科技公司几分钟内就能给一家商户或小微企业开出条件性批准，账户却往往要在原地搁置好几天——店主们得在 WhatsApp、电话和后台工单之间来回折腾，补齐 KYB 照片、银行流水、完税证明和首次放款所需的材料。运营团队获客的钱已经花出去了，风控信号也足以说"可以批"，但激活这一步仍然全靠人工跟进，还得东拼西凑地对接通用 KYC 供应商、CRM 队列和表格驱动的异常处理。结果就是"已批未激活"的账户变成一笔隐形的营收流失，每次开拓新产品或新市场，都只能靠堆更多开户人力来兜底。
targetUser:
  primary: >-
    非洲中小企业商户钱包类金融科技公司的开户/激活运营负责人，这些公司内嵌了面向药店、快消品分销商和市场批发商的营运资金产品
  secondary: >-
    负责文件异常处理、激活 SLA 和审批质量的风控运营团队及担保银行项目经理
  buyer: 非洲中小企业金融科技公司的 COO、运营副总裁或开户负责人
startupThesis:
  nonObviousInsight: >-
    金融科技开户中真正稀缺的那一层，早已不是文件识别，而是懂政策的个案记忆——让一个已获批的客户在 KYB、消息、运营和资金流转系统之间持续往前推进，直到第一笔交易真正发生。Rulebase 的发布说明，有价值的产品是长周期的激活运行时，而不是又一个前端聊天机器人或单点 KYC 检查。
  beachhead: >-
    东非和西非面向药店、快消品分销商和市场批发商、内嵌营运资金预支的中小企业商户钱包类金融科技公司——这里的已获条件性批准企业，经常卡在 WhatsApp 上传 KYB 照片、银行流水和首次放款这几步上。
  wedge: >-
    一个持续激活智能体，接管每一个已获条件性批准的中小企业个案，只通过 WhatsApp 或语音索要下一项缺失材料，按 KYB 和信贷政策校验提交内容，再把可激活的材料包和首次放款任务推送进运营系统。
  whyNowCatalyst: >-
    Rulebase 公布的挽回提升、跨日运行的智能体以及 WhatsApp 加 KYB 集成表明，过去只能扔给呼叫中心处理的批准后杂活，如今可以在保留人工监督的前提下实现自动化。
  ventureScalePath: >-
    先从中小企业钱包和营运资金产品的批准后激活切入，再扩展到续约、额度提升、催收、服务挽回，最终形成一张可复用的企业身份图谱，供金融机构跨产品、跨市场使用。
solution: >-
  产品卡在金融科技公司的审批引擎和现有运营体系之间。针对每一个已获条件性批准的企业，它会开出一个持续跟踪的个案，判断下一个卡点是什么，然后在店主本来就在用的渠道上——通常是 WhatsApp 或语音——发出一条精准的请求，而不是泛泛的提醒。收到的照片、PDF 或回复会先对照政策校验，再带着结构化的审计轨迹回传给 KYB、CRM 和交易系统。只有当智能体判断出真正的异常时，人工才会介入，而且拿到的是一份简明的个案摘要加建议下一步，不用重新翻一遍全部历史记录。当它成为把审批转化为首次放款和首次交易的系统记录中枢——横跨成千上万个中小企业个案——这家公司就赢了。
goToMarketSeed:
  firstCustomer: >-
    一家 B 轮到 D 轮的非洲中小企业金融科技公司，向药店和分销商提供商户钱包和营运资金预支，每月新开户至少 1000 家企业，且在首次放款前流失超过 20% 的已获条件性批准账户。
  buyingTrigger: >-
    拓展新国家、担保银行或 KYB 规则收紧，或者获客成本上升，都会把"已批未激活"账户暴露成一条无需新增 CAC 就能变现的最快路径。
  currentAlternative: >-
    叠加在 KYB 供应商、CRM 或工单队列、WhatsApp 收件箱、表格和外包呼叫中心跟进之上的人工流程。
  switchingReason: >-
    这家初创公司能从金融科技公司已经批准的客户身上挽回营收、缩短激活耗时，还能给运营负责人一份经得起审计的个案记录，而且不需要更换核心系统。
  pricingHypothesis: >-
    年度平台费加上按挽回商户账户或放款信贷额度计费的使用费，企业版价格档位按月度条件性批准量划分。
whyNow:
  - point: >-
      报告显示账户挽回率提升 120%，证明停滞的申请人是一块值得专门软件预算的可挽回营收池。
    signalRefs: ["账户挽回的经济账站得住脚"]
    sourceRefs: [1]
  - point: >-
      一个能让智能体持续跟进某个申请数天乃至数周的运行时，让多步骤的批准后挽回工作第一次能自动化，而不再只能靠外包人力。
    signalRefs: ["个案持久型智能体已能扛住跨日工作流"]
    sourceRefs: [1]
  - point: >-
      CRM、工单、KYC 和 KYB、交易系统之间的集成显示，瓶颈在于工具之间的编排，这就给激活控制层留出了空间。
    signalRefs: ["激活本质上是跨系统编排问题"]
    sourceRefs: [1]
  - point: >-
      对 WhatsApp、语音、短信和邮件的支持，意味着金融科技公司可以在小微企业主真正会用的渠道上完成受监管的跟进，而不必只靠门户网站登录。
    signalRefs: ["多渠道跟进已经产品化"]
    sourceRefs: [1]
differentiator: >-
  通用 KYC 供应商负责验证身份，通用 CRM 工具负责发提醒，但没有一个系统真正接管从条件性批准到首次实际使用这数天的行军路程。这家公司要成为这些工具之间的个案记忆和政策引擎——每挽回一个账户，都在为打法手册添砖加瓦：哪种请求、哪个渠道、哪条升级路径，能最快激活哪类中小企业画像。久而久之，这张激活图谱会比一个独立的 AI 智能体更难复制，因为它是在受监管的工作流和跨市场的运营数据里不断复利积累的。
