      UsageFees --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景的收入增长，靠的是付费金融科技客户数从第 1 年期末的 3 家，涨到 Q4Y3 的 17 家，同时成熟客户价值从试点定价升到约 $224K ARR。"
  - checkName: "必须做对的事"
    finding: "公司必须把试点转正式生产的周期控制在约一个季度，并让肯尼亚部署足够可复制，以守住 45 天以内的实施目标。"
  - checkName: "模型会失效的情形"
    finding: "如果销售周期拉长到约两个季度，或毛利率一直停在 70% 附近，下行情景会把现金底部推低到约 $0.25M，而第 3 年的规模化效果还没得到验证。"
  - checkName: "下一轮融资的验证依据"
    finding: "种子轮的故事是：在公司花到第 3 年下半年之前，尼日利亚和肯尼亚已有 6-8 家正式生产客户实时运行，并至少有一个来自合作伙伴渠道的付费试点。"
sanityChecks:
  ruleOf40: "第 3 年增速 154.8% + EBITDA 利润率 1.3% = 156.1%"
  burnMultiple: "第 2 年燃烧倍数约为 0.7 倍，按约 $697.2K 的 EBITDA 燃烧额对比约 $952.0K 的净新增 ARR 计算；Q4Y3 期末已经转正。"
  revenuePerFte: "第 3 年人均创收 $246K，对应期末 12 名全职员工（SaaS 基准区间 $200-400K）"
  flags:
    - "基准情景在一个建模为 55 家账户的 SAM 里拿下 17 家付费客户，因此集中的可参考案例和合作伙伴杠杆至关重要。"
    - "customersEop 统计的是付费试点和年度合同，所以纯经常性收入的正式生产客户数，在第 1 年大部分时间和第 2 年初都落后于表面上的客户数。"
    - "毛利率只有在部署工作变得可复制之后，才能越过 70% 的目标线；如果肯尼亚铺开阶段更偏重服务，EBITDA 为负的时间会拖得更长。"
    - "Q2Y3 约 $0.48M 的现金低点，在下一轮融资到位前，几乎没有余地容纳一次失败的国家上线或延迟的合作伙伴渠道。"
    - "现金按 EBITDA 建模，因此应收账款时点、试点预付款或一次性合规支出，都可能让实际现金变动出现偏差。"
