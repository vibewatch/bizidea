scenarios:
  downside:
    description: >-
      试点转化延后一个季度，成熟客户 ACV 略低于计划，肯尼亚铺开阶段的部署工作仍偏
      定制化。
    y3RevenueK: 2576.0
    y3EbitdaK: -269.8
    cashLowPointK: 254.2
    keyAssumptionChanges:
      - "Q4Y3 客户数约为 15 家，而不是 17 家。"
      - "成熟客户每季度混合已实现收入最高约 $53K，而不是 $56K。"
      - "毛利率期末约为 72%，而不是 74%，因为连接器和政策工作仍偏定制化。"
  base:
    description: >-
      以尼日利亚为起点的试点，大约一个季度就能完成验证转化；肯尼亚扩展可复制；基于
      使用量的扩展，把成熟客户价值推向 BP ACV 区间的上半段。
    y3RevenueK: 2951.0
    y3EbitdaK: 37.7
    cashLowPointK: 477.2
    keyAssumptionChanges:
      - "M12 时 3 家付费客户，Q4Y2 时 8 家，Q4Y3 时 17 家。"
      - "每家客户的混合已实现收入，从第 2 年初期的每季度 $45K，升到 Q4Y3 的 $56K。"
