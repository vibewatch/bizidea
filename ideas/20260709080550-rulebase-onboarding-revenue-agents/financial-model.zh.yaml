slug: first-funding-recovery-agent
date: "2026-07-09"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-09] 模型从带日期的商业计划之后的第一个完整运营月开始。"
  - id: A2
    name: "期初现金 / 种子前轮融资"
    value: "$2.0M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景采用区间下限，为公司提供足够缓冲，支撑到尼日利亚和肯尼亚可复制性里程碑。"
  - id: A3
    name: "起始付费客户数"
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months] 公司从零收入起步，必须先拿下付费试点。"
  - id: A4
    name: "付费客户定义"
    value: "处于激活挽回管理范围内的付费试点或年度生产合同"
    unit: definition
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计的是所有已经为试点或生产范围付费的金融科技公司。"
  - id: A5
    name: "付费试点单价"
    value: "约 3 个月 $60K（约 $20K/月）"
    unit: "USD/logo"
    source: "[BP investorMemo.firstCustomer.initialContract $40k-$80k] 基准情景对首批以尼日利亚为起点的试点采用区间中点。"
  - id: A6
    name: "生产合同与使用费单价"
    value: "生产合同起步约 $180K ARR，随着条件性批准量和挽回放款账户使用费叠加，到第 3 年期末混合升至约 $224K ARR。"
    unit: "USD/logo/year"
    source: "[BP operatingAssumptions sustain $150k-$250k annual production ACV + Research market.som 18 logos at ~$200k] 模型保持在 BP 的 ACV 区间内，同时让成熟客户能获得适度的使用费扩展。"
  - id: A7
    name: "客户爬坡"
    value: "M12 时 3 家付费客户，Q4Y2 时 8 家，Q4Y3 时 17 家"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets] 基准情景对应第 1 年 2 个付费试点加 1 个生产客户，到第 2 年期末达到 BP 的 6-8 家区间，第 3 年落在目标区间中段。"
  - id: A8
    name: "收入确认规则"
    value: "期末付费客户数 × 当期每家客户已实现的混合收入：第 1 年以试点为主的月份，先是每月 $20K，再降到 $18K；第 2 年每季度 $45K-$50K；第 3 年每季度 $50K-$56K。"
    unit: formula
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + BP businessModel.revenueStreams] 这样能让收入直接对应客户数和既定的定价组合。"
  - id: A9
    name: "毛利率爬坡"
    value: "Y1 为 50%-57%，Y2 为 65%-70%，Y3 为 71%-74%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + startup-finance heuristic] 早期试点服务占比较高，直到规则包和连接器复用把毛利抬到目标线以上。"
  - id: A10
    name: "招聘节奏"
    value: "M1 创始人和创始工程师；M4 合规/产品运营；M5 解决方案与集成；M10 合作伙伴与客户成功；M15 销售/GTM；M18 第二位工程师；M21 G&A；M27 第三位工程师；M28 第二位解决方案岗；M31 第二位合作伙伴岗；M34 第二位 GTM 岗。"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘在付费试点证明成立之前保持精简，只有当客户数和国家覆盖扩大后，才逐步增加交付和销售人力。"
  - id: A11
    name: "创始人全成本薪酬"
    value: "$120K"
    unit: "USD/year"
    source: "[BP team Founder/CEO + startup-finance heuristic] 反映精简的现金薪酬，加上税费、福利，以及创始人主导企业销售所需的区域差旅。"
  - id: A12
    name: "工程全成本薪酬"
    value: "$135K"
    unit: "USD/year"
    source: "[BP team Founding eng + startup-finance heuristic] 产品需要资深的工作流和集成工程能力，但薪酬仍低于美国成长期公司的现金水平。"
  - id: A13
    name: "合规/产品运营全成本薪酬"
    value: "$100K"
    unit: "USD/year"
    source: "[BP team Compliance/product ops lead + startup-finance heuristic] 该岗位把担保银行和国别政策要求，转化为可复制的管控措施和打法手册。"
  - id: A14
    name: "解决方案/集成全成本薪酬"
    value: "$115K"
    unit: "USD/year"
    source: "[BP team Solutions and integration engineer + startup-finance heuristic] 交付速度和连接器质量，是实现 45 天以内部署目标的关键。"
  - id: A15
    name: "合作伙伴/客户成功全成本薪酬"
    value: "$95K"
    unit: "USD/year"
    source: "[BP team Partnerships and customer success lead + startup-finance heuristic] 该岗位负责续约、扩展和早期合作伙伴动作，且不假设有庞大的服务团队支撑。"
  - id: A16
    name: "销售/GTM 全成本薪酬"
    value: "$125K"
    unit: "USD/year"
    source: "[BP gtm.channels + startup-finance heuristic] 反映一旦创始人主导的销售动作开始放量后，集中式企业外呼、差旅和浮动薪酬的成本。"
  - id: A17
    name: "G&A/运营全成本薪酬"
    value: "$80K"
    unit: "USD/year"
    source: "[BP operations + startup-finance heuristic] 覆盖公司进入多国运营后的财务、供应商管理和合规运营开支。"
  - id: A18
    name: "薪酬在损益表科目间的分摊"
    value: "创始人 55% 计入 S&M / 15% 计入 R&D / 30% 计入 G&A；工程 100% 计入 R&D；合规/产品运营 40% 计入 R&D / 60% 计入 G&A；解决方案 30% 计入 S&M / 70% 计入 R&D；合作伙伴/客户成功 85% 计入 S&M / 15% 计入 G&A；销售 100% 计入 S&M；G&A/运营 100% 计入 G&A。"
    unit: allocation
    source: "[BP team role rationales + BP operations] 这样能把薪酬映射进职能损益表，同时体现创始人主导销售和合规密集型交付的特点。"
  - id: A19
    name: "非薪酬运营支出爬坡"
    value: "月度非薪酬支出从第 1 年初期的 S&M/R&D/G&A 各 $8K/$10K/$8K，升到第 3 年第 4 季度的 $35K/$29K/$22K。"
    unit: "USD/month"
    source: "[BP operations + BP experimentRoadmap + startup-finance heuristic] 这一爬坡涵盖消息费用、云服务、差旅、法务、隐私与审计工作，以及合作伙伴赋能，且不假设有大规模付费需求引擎。"
  - id: A20
    name: "现金转化规则"
    value: "现金变动等于 EBITDA"
    unit: formula
    source: "[startup-finance heuristic] 假设在种子前轮规模下，资本支出、税费、融资费用和营运资金时点影响可忽略不计。"
  - id: A21
    name: "稳态月度客户流失率"
    value: "1.5%"
    unit: "percent per month"
    source: "[startup-finance heuristic for early enterprise workflow SaaS + BP whyWeWin] 一旦激活打法、审计日志和连接器嵌入进客户流程，这套工作流应该具备一定粘性，但还达不到成熟企业级产品的完美水平。"
  - id: A22
    name: "基准销售周期"
    value: "从发现到付费试点约 90-120 天，再加一个季度把试点验证转化为年度正式生产。"
    unit: days
    source: "[BP gtm.funnelTargets + BP experimentRoadmap + BP investorMemo.mustBeTrue] 模型假设一个季度足以为早期转化验证挽回放款提升效果。"
  - id: A23
    name: "CAC 计算规则"
    value: "36 个月销售与市场总支出除以新增的 17 家付费客户"
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] 这样能反映建设期内创始人主导加合作伙伴辅助的企业获客成本。"
  - id: A24
    name: "下一轮融资定额里程碑"
    value: "到第 2 年第 4 季度，公司应在尼日利亚和肯尼亚拥有 6-8 家正式生产客户，部署时间低于 45 天，并至少有一个来自合作伙伴渠道的付费试点。"
    unit: milestone
    source: "[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap] 种子前轮的额度，是为了在进入种子轮之前，先跑通可复制的多国部署和合作伙伴驱动的商机管道。"
  - id: A25
    name: "季度薪酬滚动规则"
    value: "第 2 年和第 3 年的薪酬行，采用每季度内实际的逐月招聘数据，而不只是年末快照。"
    unit: convention
    source: "[Headcount column convention + BP team startTiming] 这样即便结构里只展示第 2 年和第 3 年年末的人员快照，薪酬支出仍能与逐月招聘节奏保持内部一致。"
