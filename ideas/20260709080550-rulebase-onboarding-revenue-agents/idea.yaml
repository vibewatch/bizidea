topRisks:
  - name: Segment extrapolation risk
    description: The source confirms Africa deployments but does not prove that business-wallet and working-capital fintechs are the dominant successful segment.
    mitigation: Start with one design partner already using WhatsApp in onboarding, measure recovery lift by cohort, and tighten the ICP before scaling sales.
  - name: Policy fragmentation
    description: Sponsor banks, KYB vendors, and credit teams may each define different evidence and escalation rules, which can slow standardization.
    mitigation: Launch with configurable rule packs for one product family and expose every agent action in a human-review console before automating more steps.
  - name: Sensitive-channel compliance
    description: Collecting regulated financial documents over WhatsApp or voice can raise privacy, consent, and data-retention concerns.
    mitigation: Use secure upload links, explicit consent capture, encrypted storage, and deterministic fallbacks to human agents for sensitive or ambiguous cases.
