      When a conditionally approved distributor stops responding after KYB review, help our onboarding team recover the missing documents and first deposit so we can turn CAC into an active revenue account.
    currentAlternative: Manual follow-up across WhatsApp, spreadsheets, and call-center queues
    successMetric: Share of conditionally approved businesses activated within seven days
