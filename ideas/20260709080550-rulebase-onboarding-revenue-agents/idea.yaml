problem: >-
  African SME fintechs can conditionally approve a merchant or small business in minutes, then lose the account for days while owners chase KYB photos, bank statements, tax proof, and first-funding steps across WhatsApp, phone calls, and back-office tickets. The ops team already paid the acquisition cost and has enough signal to say yes, but activation still depends on manual follow-up stitched across generic KYC vendors, CRM queues, and spreadsheet-driven exception handling. That makes approved-but-inactive accounts a hidden revenue leak and turns every new product or geography launch into more onboarding headcount.
targetUser:
  primary: >-
    Heads of onboarding or activation operations at African SME business-wallet fintechs with embedded working-capital products serving pharmacies, FMCG distributors, and market wholesalers
  secondary: >-
    Risk operations and sponsor-bank program managers responsible for document exceptions, activation SLAs, and approval quality
  buyer: COO, VP Operations, or Head of Onboarding at an African SME fintech
startupThesis:
  nonObviousInsight: >-
    The scarce layer in fintech onboarding is no longer document detection; it is the policy-aware case memory that keeps one approved customer moving across KYB, messaging, ops, and money-movement systems until a first transaction happens. Rulebase's launch suggests the valuable product is a long-horizon activation runtime, not another front-end chatbot or point KYC check.
  beachhead: >-
    East and West African SME business-wallet fintechs with embedded working-capital advances serving pharmacies, FMCG distributors, and market wholesalers, where conditionally approved businesses frequently stall on KYB photos, bank-statement uploads, and first-funding steps over WhatsApp
  wedge: >-
    A persistent activation agent that owns each conditionally approved SMB case, requests only the next missing proof over WhatsApp or voice, validates submissions against KYB and credit policy, and pushes activation-ready packets plus first-funding tasks into ops systems
  whyNowCatalyst: >-
    Rulebase's reported recovery lift, multi-day agent runtime, and WhatsApp plus KYB integrations show that the messy post-approval work once left to call centers can now be automated without removing human oversight.
  ventureScalePath: >-
    Start with post-approval activation for SME wallets and working-capital products, then expand into renewals, limit increases, collections, service recovery, and a reusable business identity graph that financial institutions can apply across multiple products and markets.
solution: >-
  The product sits between the fintech's approval engine and its existing ops stack. For each conditionally approved business, it opens a persistent case, determines the next blocking item, and contacts the owner on the channel already in use, typically WhatsApp or voice, with a precise request rather than a generic reminder. Submitted photos, PDFs, or answers are matched against policy and routed back into KYB, CRM, and transaction systems with a structured audit trail. Human operators only step in when the agent detects a true exception, and they receive a concise case summary plus recommended next action instead of re-reading the full history. The company wins when it becomes the system of record for converting approval into first funding and first transaction across thousands of SMB cases.
goToMarketSeed:
  firstCustomer: >-
    A Series B to D African SME fintech offering business wallets and working-capital advances to pharmacies and distributors, onboarding at least 1,000 businesses per month and losing more than 20 percent of conditionally approved accounts before first funding
  buyingTrigger: >-
    Expansion into a new country, tighter sponsor-bank or KYB rules, or rising paid-acquisition spend exposes approved-but-inactive accounts as the fastest path to revenue without new CAC
  currentAlternative: >-
    Manual workflow layered on KYB vendors, CRM or ticket queues, WhatsApp inboxes, spreadsheets, and outsourced call-center follow-up
  switchingReason: >-
    The startup recovers revenue from customers the fintech already approved, shortens time-to-activation, and gives operations leaders an auditable case log without requiring a core-system replacement.
  pricingHypothesis: >-
    Annual platform fee plus usage pricing per recovered business account or funded credit line, with enterprise tiers based on monthly conditional approvals
