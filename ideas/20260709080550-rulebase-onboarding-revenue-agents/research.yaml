  searchedQueries:
  - Authoritative recent sources on African SME fintech onboarding friction, KYB or KYC document collection delays, and WhatsApp or messaging-led customer activation in 2024-2026.
  - Authoritative sources on the African fintech landscape in 2024-2026, including counts of fintech companies, SME-focused digital lenders or business-wallet providers, and market growth relevant to onboarding software.
  - Authoritative official sources on customer due diligence, KYB, data protection, and remote onboarding rules relevant to fintechs in Nigeria, Kenya, and South Africa.
  - Identify the most relevant competitors or adjacent platforms to an AI onboarding recovery agent for fintechs, especially Rulebase, Persona, Taktile, Smile ID, Prembly, Trulioo, Sardine, and related workflow or identity platforms, with product page sources.
  - Recent independent news or analyst coverage on Rulebase and AI revenue agents for financial services, plus similar launches in fintech onboarding or recovery automation.
  - Official technical documentation sources for WhatsApp Business messaging, Twilio WhatsApp, business verification or KYB APIs, and workflow tools relevant to multi-step fintech onboarding.
  - Official or reputable sources on WhatsApp usage by businesses or consumers in Africa, especially for customer communication in SMB or fintech contexts, 2024-2026.
  - Authoritative sources on African SME fintechs serving merchants, pharmacies, distributors, or small businesses with wallets, POS, or working capital, including Moniepoint, OPay, PalmPay, M-Pesa business, and similar providers.
  - Authoritative sources on SME counts and formal small businesses in Nigeria, Kenya, and South Africa, plus digital financial service adoption among MSMEs, relevant to bottom-up market sizing.
  - Official or reputable sources on digital onboarding abandonment, KYC remediation, or time-to-activation pain in fintech, banking, or payments onboarding workflows globally or in emerging markets.
  - Official URLs for FATF digital identity guidance, customer due diligence recommendations, and beneficial ownership guidance relevant to fintech KYB and remote onboarding.
  - Official regulator or legal repository URLs for Nigeria AML KYC customer due diligence rules, Nigeria Data Protection Act, and remote onboarding or e-KYC guidance for fintechs.
  - Official regulator or legal repository URLs for Kenya AML KYC customer due diligence rules, Kenya Data Protection Act, and business registration or beneficial ownership rules for fintech onboarding.
  - Official regulator or legal repository URLs for South Africa FICA customer due diligence guidance, POPIA, and remote onboarding or accountable institutions guidance for fintechs.
  - Official Kenya Law URL for the Data Protection Act 2019 PDF or HTML page.
  - Official CBN page or publication URL related to KYC, AML, or customer due diligence for fintechs in Nigeria.
  - Official FIC South Africa compliance guidance page URL and POPIA official document page URL.
