competitors:
- name: Rulebase
  stage: seed
  wedge: Persistent AI revenue agents for onboarding, reactivation, and service recovery in financial services.
  pricing: Custom enterprise pricing / contact sales
  strength: Closest evidence for long-horizon case ownership and measured recovery outcomes.
  weaknessVsUs: Not obviously specialized for African SME-wallet and working-capital workflows or local registry nuances.
  sourceRefs:
  - 1
  - 2
- name: Taktile
  stage: scale-up
  wedge: Agentic decisioning, onboarding, and case-management platform for financial institutions.
  pricing: Custom enterprise pricing / contact sales
  strength: Strong workflow, rule, and case-management depth with enterprise credibility.
  weaknessVsUs: Optimizes decisions and cases broadly rather than owning post-approval activation in messaging channels.
  sourceRefs:
  - 30
  - 31
- name: Alloy
  stage: scale-up
  wedge: Identity, fraud, onboarding, and compliance orchestration for banks and fintechs.
  pricing: Custom enterprise pricing / contact sales
  strength: Broad platform footprint and strong budget adjacency in onboarding and compliance.
  weaknessVsUs: Centers on risk and compliance decisions more than first-funding recovery after an approval is already granted.
  sourceRefs:
  - 32
  - 33
- name: Smile ID
  stage: scale-up
  wedge: Identity verification and document coverage for African and emerging-market users.
  pricing: Custom enterprise pricing / contact sales
  strength: Local market coverage and document expertise make it a natural identity-layer incumbent.
  weaknessVsUs: Stops at verification and screening rather than owning multi-step business activation end to end.
  sourceRefs:
  - 36
  - 35
- name: YouVerify
  stage: scale-up
  wedge: African AML, KYB, and customer-onboarding automation for fintech and payments companies.
  pricing: Custom enterprise pricing / contact sales
  strength: Strong regional compliance positioning and clear fintech/payments focus.
  weaknessVsUs: Still more compliance-stack and verification-led than a durable revenue-recovery system of record.
  sourceRefs:
  - 34
  - 35
