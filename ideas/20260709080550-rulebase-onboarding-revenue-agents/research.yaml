  validationPlan:
  - priority: high
    question: What share of conditionally approved business accounts fail to fund or transact within seven days at a design partner?
    evidenceToGather: A cohort export from CRM or loan-origination systems showing approval, document-exception, and first-funding timestamps by segment.
  - priority: high
    question: Will sponsor-bank and compliance teams accept WhatsApp-led document chasing if sensitive uploads move through secure links and audit logs?
    evidenceToGather: Current SOPs, legal review, and a joint walkthrough with compliance and operations leaders in Nigeria and Kenya.
  - priority: medium
    question: Does the budget owner view this as an onboarding, risk, or customer-operations purchase?
    evidenceToGather: Ten discovery calls with heads of onboarding, risk operations, and finance plus a pilot proposal benchmarked against manual follow-up cost.
