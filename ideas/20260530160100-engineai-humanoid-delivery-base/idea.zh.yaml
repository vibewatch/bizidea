jobsToBeDone:
- job: 当一家人形机器人 OEM 开始做多站点交付时，帮服务负责人把保修分诊和维修流程标准化，这样他们不用为每个伙伴和站点重搭一套运营，也能把 uptime 守住。
  currentAlternative: 在聊天线程、表格和通用 helpdesk 工具之间手工分诊工单
  successMetric: 平均修复时间，以及合作伙伴首次上门就解决问题的工单占比
- job: 当新一批机器人反复出现同类现场故障时，帮运营团队把问题追溯回制造、检测或零部件模式，在更多已部署机器人出问题前先把根因打掉。
  currentAlternative: 靠 ERP 导出、QA 日志和技师备注临时做根因分析
  successMetric: 从发现重复事故到采取纠正动作的时间，以及重复故障的下降幅度
