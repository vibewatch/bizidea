problem: 人形机器人公司现在已经能拿出可信的制造吞吐，但售后运营往往还是靠表格、聊天线程、临时 RMA 和通用现场服务软件硬撑。等到几百台机器人通过分销商或集成商发到现场后，每出一次故障，团队都得重新拼一遍这张工单背后的零部件、测试结果、软件版本和站点条件。维修因此变慢，备件库存被迫做厚，根因更难看清，企业买家也不敢把部署规模继续往上推。
targetUser:
  primary: 正在把试点批次推进到 100-500 台交付规模、服务仓储和工厂物料搬运场景的深圳人形机器人 OEM 的 COO 或售后负责人
  secondary: 负责 uptime、备件和现场维修的区域部署与维护合作伙伴
  buyer: 人形机器人 OEM 的 COO、服务负责人或 VP Operations
startupThesis:
  nonObviousInsight: 当一台人形机器人已经能做到每 15 分钟下线一次、还带着完整的工厂测试记录出厂，稀缺资产就不再是 demo 本身。新的控制点变成服务闭环：把每台机器的制造与 QA 指纹，连到现场故障、备件规划和工厂纠正动作上。进入批量交付后，卡住规模化的不只是本体能力，更是可靠性运营。
  beachhead: 面向深圳人形机器人 OEM 的售后可靠性运营：这些厂商正通过 3-5 家区域集成商，把首批 100-500 台机器人部署到中国各地的仓储和工厂物料搬运场景。
  wedge: 一套服务闭环 OS，把机器人序列号、工厂检测、模拟测试结果、保修工单、技师流程和零件需求拉进同一个可靠性闭环。
  whyNowCatalyst: EngineAI 已进入 10,000 台交付阶段，并明确把维护支持写进工厂流程，售后可靠性基础设施因此不再是未来的车队管理问题，而是眼下就得补齐的运营系统。
  ventureScalePath: 先从人形机器人 OEM 的售后运营切入，再扩到机器人分销商、租赁和保险伙伴，以及其他同样需要序列号级可靠性、保修和纠正动作底座的具身 AI 设备品类。
solution: Humanoid Service Loop OS 会在每台机器人出厂时就吃进它的 build record、检测历史、模拟测试结果、已安装软件版本和发货配置。现场工单一进来，系统就按对应机型和序列号把问题导进正确的服务 playbook，给出最可能的根因簇，并告诉技师这台机器最相关的替换件和检查项。OEM 服务负责人看到的不再是一堆彼此断开的支持案例，而是按站点、集成商、零部件批次和软件版本聚合出来的实时故障图谱。平台还会把结构化 CAPA 反馈回推给制造和供应链团队，让重复出现的现场故障真正改变检测阈值、测试计划和备件预测。时间越久，公司越像商业人形机器人车队 uptime 经济学的 system of record。
goToMarketSeed:
  firstCustomer: 一家刚启用新制造基地、今年计划交付 100 多台机器人、并通过 3-5 家区域服务伙伴支撑仓储或工厂部署的深圳人形机器人 OEM
  buyingTrigger: 公司签下首批多站点交付合同，不得不在合作伙伴网络里搭起保修响应、备件备库和维护 SLA
  currentAlternative: 表格、ERP 记录、WeChat 或邮件支持线程、通用工单系统，以及手工维护的 RMA / 备件流程
  switchingReason: 这个切口给 OEM 一个序列号级运营层，把工厂 QA 证据和现场服务决策真正连起来，而通用 field-service 和 ERP 栈做不到这一点。
  pricingHypothesis: 按年收平台费，再叠加按活跃机器人计费，并对合作伙伴席位、保修分析和备件规划模块额外收费。
