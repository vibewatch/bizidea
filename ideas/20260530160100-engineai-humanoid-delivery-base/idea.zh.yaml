differentiator: 这不是给稳定量产机器人做的通用 fleet management，也不是再包一层工单的 field-service 外壳。切口从序列号层开始：如果 OEM 想在故障扩散前学得更快，工厂检测、模拟测试、发货配置和现场维护就必须持续连在一起。真正的防御力来自跨车队的可靠性图谱——把零部件批次、测试指纹、站点条件和维修结果连起来。无论单个集成商还是通用 FSM 厂商，都很难轻易攒出这套数据。
