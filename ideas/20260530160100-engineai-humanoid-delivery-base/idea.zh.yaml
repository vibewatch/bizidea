topRisks:
- name: 市场时点
  description: 人形机器人出货量的爬坡可能比 headline 宣称更慢，导致专门服务基础设施的预算窗口被推迟。
  mitigation: 优先拿下今年已经签好多站点交付合同的 OEM 和集成商，同时兼容工作流相似的邻近移动操作机器人车队。
- name: OEM 内部自建
  description: 更大的机器人厂商可能会继续延展 ERP 或内部工具，而不是购买专门的可靠性平台。
  mitigation: 靠更快的见效速度、更深的跨伙伴工作流能力，以及内部团队早期攒不出的可靠性数据集来赢单。
- name: 集成负担
  description: 工厂 QA 系统、工单工具和伙伴服务流程的差异可能大到让 onboarding 过度依赖服务交付。
  mitigation: 先围绕 build record、检测、工单和备件流程做一套窄适配器，只服务一个机器人家族，再逐步扩面。
