slug: humanoid-service-loop-os
date: '2026-05-30'
executiveSummary: Humanoid Service Loop OS 瞄准的是中国人形机器人 OEM：这些厂商正从试点批次跨进首批 100-500 台、落在仓储和工厂场景的工业部署。产品把序列号谱系、工厂 QA 和模拟测试记录、现场工单、合作伙伴技师流程以及零件流转拉进同一套可靠性 system of record。第一单最该发生在 OEM 刚签下多站点交付合同、不得不在 3-5 家区域服务伙伴之间搭起保修响应和 uptime SLA 的时点，因为运营紧迫性、预算归属和数据接入会在这一刻同时到位。滩头市场必须收窄在深圳为中心的人形机器人 OEM 售后，而不是泛机器人运营软件：现有厂商已经覆盖通用遥测和现场服务，但这条从 QA 到保修的闭环还没有人清楚拿住。基于调研，中国是最适合起跑的地理市场，原因是 OEM 密度高、自动化强度大、国家支持明确；但近端 SAM 仍不大，直接的软件预算数据也还薄。核心护城河是一张跨车队可靠性图谱，把零部件批次、软件版本、站点条件、维修动作和故障结果连到单机层面。最关键的证伪风险有两点：车队爬坡比说法慢，以及 OEM 在中立平台证明更快见效前就先把系统内部化。如果 design partner 不能转成续费合同，且拿不出 MTTR 和重复故障改善的量化结果，公司就不该把范围扩到更广的机器人运营。
problem:
- 早期人形机器人 OEM 仍在用表格、ERP 导出和聊天线程处理保修分诊、RMA 决策与服务伙伴协同，所以每次故障都得手工重建这台机器究竟造了什么、测了什么、发了什么。
- 一旦车队扩到多个站点和合作伙伴，维修、OTA 变更、召回和零件使用如果没有序列号级审计链，downtime、备件浪费和企业买家的焦虑都会一起上升。
solution:
- 按每台机器人吃进序列号谱系、工厂检测、模拟测试输出、软件版本、工单历史和零件交易，再把事故导进机器人专属的服务 playbook。
- 通过闭环 CAPA 工作流把现场故障回推给制造、供应商和 QA 团队，让重复问题真正改动检测阈值、备件计划和发布决策。
whyWeWin:
- 切口正好卡在工厂 QA 和现场保修运营的边界上：robot-ops 平台、通用 FSM 套件和 OEM 自建工具都只覆盖其中一段。
- 随着公司跨 OEM 和伙伴网络拿到单机级故障、维修和零件数据，防御力会持续累积，最终长成一张单一厂商栈和服务公司都很难早期复制的可靠性图谱。
strategicChoices:
  beachhead: 面向深圳及更广中国市场的人形机器人 OEM：这些厂商正通过区域服务伙伴，把首批 100-500 台工业机器人部署到仓储和工厂物料搬运场景。
  wedgeRationale: 这个入口有真实的购买触发点、稠密的交付前 QA 数据，以及可量化的 uptime 和保修痛点；如果一开始就讲泛机器人运营，销售周期会更长，集成差异会更大，产品在拿到证明前就先把差异化摊薄。
  sequencingRationale: 先把一个机器人家族的服务闭环跑通，拿下序列历史、事故路由和零件流程；等干净数据流起来后，再加可靠性分析和 CAPA；只有当核心 OEM 动作能稳定转成续费收入后，才通过伙伴渠道和相邻机器人品类往外扩。
  notYet:
  - 泛化的多厂商运行时编排或任务调度
  - 在 OEM 侧还没验证前，直接卖给终端企业的软件
  - 消费、酒店或家庭场景的人形机器人流程
  - 在保修和 uptime benchmark 还不可信前就切入保险或租赁产品
market:
  tam: $102.0M 建模得到的近端全球人形服务闭环软件市场
  sam: $23.0M 建模得到的中国优先人形 OEM 滩头市场
  som: $3.6M，第 3 年在 3 家 OEM 和约 750 台活跃机器人下可触达的收入规模
  segments:
  - 负责售后运营的中国人形机器人 OEM，正交付首批工业车队
  - 为这些车队提供支持的区域部署与维护合作伙伴
  buyingProcess: 交易通常会在 OEM 因多站点交付合同而必须把保修和 uptime 运营正式化时，由 COO、服务负责人或 VP Operations 发起。随后 IT/OT、工厂 QA 和伙伴服务负责人需要一起确认数据接入、流程匹配和可审计性，产品才能进入交付或售后预算。
product:
  mvp: MVP 先覆盖序列历史接入、工厂测试导入、工单路由、技师 playbook、单机服务时间线，以及单个机器人家族的一组窄 ticketing / ERP 适配器。目标是先替代表格式保修分诊，而不是一上来就做大而全的遥测编排或多品类分析。
  sixMonth: 为一个机器人家族交付付费 design-partner 版本，包含序列号谱系、事故路由、伙伴门户基础能力和可审计维修历史。
  twelveMonth: 在 2-3 个 OEM 车队里证明 MTTR 和重复故障改善，把 CAPA 反馈接进制造团队，并上线与故障模式联动的备件规划视图。
  twentyFourMonth: 扩成可靠性控制平面，覆盖召回和 OTA 审计链、供应商与批次分析、benchmark 报告，以及同样面临服务闭环问题的相邻具身 AI 车队。
  keyBets:
  - 买家更在意更快找到根因、把住保修成本，而不是再来一个 fleet-telemetry 仪表盘。
  - 首批目标 OEM 的数据结构相似度足够高，靠一条窄适配器路线就能覆盖早期收入。
  - 只要 OEM 强制执行，区域服务伙伴会接受标准化 playbook 和零件流程。
  - 把 CAPA 反馈回制造会变成一个战略级购买结果，而不只是支持功能。
gtm:
  wedge: 在 OEM 决定做多站点工业交付、必须比表格和通用 FSM 更快把保修响应跑起来的那一刻，直接卖给服务负责人。
  channels:
  - 创始人主导直销，面向目标人形 OEM 的 COO、服务负责人和 VP Operations
  - 与认证区域服务集成商做联合交付和转介绍
  - 在适配器验证后，与 ERP、WMS、MES 和 robot-ops 生态伙伴开展集成带动的联合销售
  funnelTargets: 目标账户到合格 discovery 30%+，discovery 到付费 design partner 20%+，付费 design partner 到年度生产合同 60%+
  pricing: 按年收 OEM 平台费，再叠加按活跃机器人和合作伙伴席位计费，因为买家看重的是车队层面的可审计 uptime 和保修控制，而用量会随着部署单元和服务网络复杂度一起上升。
businessModel:
  revenueStreams:
  - 面向服务闭环 system of record 的年度 OEM 平台订阅
  - 围绕已管理序列历史和服务流程的按活跃机器人收费
  - 保修分析、CAPA 报告和备件规划的伙伴席位与高级模块
  unitOfValue: 纳入序列号级可靠性流程管理的活跃人形机器人
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一 OEM 账户内接入更多机器人、站点和机器人家族
  - 把伙伴席位和 SLA 流程扩到区域服务网络
  - 销售高级保修、召回和供应商质量分析模块
  - 把同一套可靠性底座延伸到相邻工业具身 AI 车队
strategyMap:
  northStarMetric: 已管理车队中高严重度现场事故的中位解决时间
  inputMetrics:
  - 已签付费 design partner 数，以及对应已承诺的多站点交付项目
  - 已加载完整序列号谱系和测试历史的活跃机器人占比
  - 使用产品 playbook 的伙伴技师首次上门修复率
  - 被 CAPA 流程标记零部件的重复故障率
  - 付费 design partner 到年度生产合同的转化率
  moatsToBuild:
  - 一张跨车队可靠性图谱，把测试、零件批次、软件版本和故障结果连起来
  - 面向常见人形机器人故障模式的标准化技师解决方案库
  - 覆盖滩头市场主流 ticketing、ERP 和伙伴服务流程的适配器能力
  - 达到审计级别的维修、OTA 变更、召回和纠正动作历史
  killCriteria:
  - 前 10 个目标 OEM 中，12 个月内确认已有资金支持的 100+ 台交付项目少于 3 个
  - 前 5 个 design-partner 潜在线索的样本数据里，看不到可复用的序列、测试、工单和零件通用模型
  - 前 2 个真实部署未能把 MTTR 至少改善 25%，或未能降低目标问题的重复故障
  - 即便 startup 承诺 90 天内上线，买家仍持续选择内部自建或通用 FSM
  mermaid: |
    flowchart LR
      Wedge[人形 OEM 售后切口] --> MVP[序列号与保修 MVP]
      MVP --> Proof[MTTR 与 CAPA 证明点]
      Proof --> Expansion[更多 OEM、伙伴和机器人家族]
      Expansion --> Moat[跨车队可靠性数据护城河]
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流痛点清晰、切口也可信，但在真实 OEM 预算归属，以及第三方方案相较内部自建是否更受偏好被证实前，判断仍应克制。
    whyBelieve: 现在没有哪个现有厂商真正拿住从工厂 QA 到现场维修的序列号级闭环，而首批量产交付正在把这块空白的经济价值直接摊到台面上。
    whyDoubt: 近端市场仍小且集中，领先 OEM 也可能在中立平台拿到控制点地位前先行自建。
    nextDiligence: 先拿下一家付费 OEM design partner，验证能否从工厂与服务系统抽取数据，并在真实运营里证明 MTTR 或重复故障有可量化改善。
  firstCustomer:
    title: 进入首批规模化工业部署的中国人形机器人 OEM 售后负责人或 COO
    profile: 负责一支刚开始发货的人形机器人车队的保修、uptime 和伙伴服务运营，计划覆盖仓储或工厂站点的 100+ 台设备。
    trigger: OEM 签下首批多站点商业交付合同，必须在 3-5 家区域伙伴之间统一维修 SLA、备件备库和单机可追溯性。
    buyer: COO 或服务负责人
    initialContract: $100k-150k 的付费 design partner，覆盖一个机器人家族和首批站点；随着 100-150 台活跃机器人和伙伴席位上线，转成约 $400k-700k 的年度生产合同。
  mustBeTrue:
  - 前 10 个目标 OEM 账户中，至少 5 个预计会在 12-18 个月内拥有 100 台以上活跃工业人形机器人。
  - 买家能在 60 天内提供序列、测试、工单和零件导出数据，而不会让定制集成项目吞掉整笔销售。
  - 产品能在前两次真实部署中，把 MTTR 至少改善 25%，或显著压低目标问题的重复故障。
  - 付费 design partner 会在 OEM 内部栈或通用 FSM 成为默认选项前，先转成年度生产合同。
  - 伙伴网络工作流足够重要，以至于中立 system of record 能胜过 OEM 自有工具和服务公司。
  diligenceQuestions:
  - 当人形机器人 OEM 从试点走向多站点交付时，服务系统预算究竟归谁管？
  - 到 2027 年，究竟会有多少中国 OEM 真的能稳定维持 100-500 台活跃工业机器人？
  - 首批目标账户里，工厂 QA、工单和零件系统有哪些数据字段是稳定可用的？
  - OEM 为什么要买这套产品，而不是继续扩内部工具或 ServiceMax 式 FSM？
  - 区域服务伙伴真的会使用被强制要求的 playbook 和零件流程，而不是回到聊天和表格吗？
operatingAssumptions:
- assumption: 未来 12-24 个月内，会有足够多的中国人形机器人 OEM 足够快地跑到 100-500 台活跃工业机器人规模，从而撑起专门的服务闭环系统。
  basis: research.yaml
  validationTest: 访谈 10 位 OEM 与生态负责人，确认至少 5 家已经签约或已编列预算，通向 100+ 台在服工业单元。
  decisionImpact: 如果不成立，就把 thesis 收窄到相邻机器人品类，或延后招聘和融资。
- assumption: 预算 owner 会在多站点交付和伙伴服务 SLA 搭建阶段出现，而不是更晚、等内部支持工具已经固化之后。
  basis: idea.yaml
  validationTest: 在 8-10 次买家访谈中，确认至少 5 位会在交付网络搭建期评估或预算新系统，而不是等 6 个月现场运营之后。
  decisionImpact: 如果不成立，就把定位改到部署后分析或集成商工具，而不是 OEM 侧的 system of record。
- assumption: 首批客户愿意共享足够结构化的序列、测试、工单和零件数据，支撑可复用的产品模型。
  basis: research.yaml
  validationTest: 收集至少 3 家 OEM 和 2 家区域服务伙伴的样本导出，确认主要数据实体能以有限定制映射进同一套 schema。
  decisionImpact: 如果不成立，公司会变成重服务的集成业务，应当缩范围或停止。
- assumption: 只要产品能缩短诊断时间、减少紧急备件使用，区域服务伙伴就会遵循 OEM 规定的流程。
  basis: operator judgment
  validationTest: 与至少 2 家伙伴机构跑一个 pilot，衡量 playbook 遵循率和首次上门修复率提升。
  decisionImpact: 如果不成立， rollout 模型就得转向 OEM 自有团队，或补更多 customer success 人力。
- assumption: 在首批滩头客户中，混合云或受控云部署会被接受用于承载序列号和保修数据。
  basis: research.yaml
  validationTest: 向每个 design-partner 潜客确认安全与部署要求，并验证前 5 个潜客里至少 3 个接受计划中的部署模型。
  decisionImpact: 如果不成立，路线图就必须更早加入 on-prem 或 VPC 部署，成本会上升，GTM 会放慢。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 围绕活跃交付项目，访谈中国人形机器人 OEM 的服务负责人和运营高管。
  hypothesis: 最高紧迫性会出现在多站点部署和伙伴 SLA 正在搭建的时点。
  successMetric: 10 次访谈里至少 5 次把这一刻描述成当前已有预算的痛点。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 从早期潜客收集序列号谱系、工厂测试、工单和零件样本导出。
  hypothesis: 首批 design partner 之间共享一套可复用的最小数据模型。
  successMetric: 3 家 OEM 和 2 家伙伴机构都能在各自少于两周的定制数据工作量内映射进同一 schema。
  owner: 创始人/CTO
- horizon: 90–180 天
  experiment: 为一个机器人家族交付 MVP，覆盖序列时间线、事故路由、playbook 和零件流程。
  hypothesis: 即便高级预测分析尚未上线，买家也愿意先为工作流控制买单。
  successMetric: 签下 2 家付费 design partner，并在真实事故上持续使用 MVP。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 与客户现有的表格和聊天流程做一次并行 live pilot。
  hypothesis: 标准化的序列号级工作流能实质性压低 MTTR 和重复故障。
  successMetric: 签出案例研究，证明 MTTR 至少改善 25%，或目标问题的重复故障下降 15%。
  owner: 部署负责人
- horizon: 180–360 天
  experiment: 为区域服务组织上线伙伴门户和 enablement 套件。
  hypothesis: 伙伴采用率会提高生产合同转化，也会让产品更难被替换。
  successMetric: 两家伙伴机构在一个 OEM 账户里，将系统用于超过 60% 的合格服务工单。
  owner: 客户成功负责人
- horizon: 180–360 天
  experiment: 上线与重复故障簇绑定的 CAPA 和备件规划分析。
  hypothesis: 制造反馈和零件节省会推动产品从初始支持流程继续扩张。
  successMetric: 至少一家客户在记录到 CAPA 或备件优化成果后扩大使用范围或增加支出。
  owner: 产品负责人
operations:
- 为每个支持的 ticketing、ERP 和工厂测试数据源维护受控的适配器与数据质量认证流程。
- 每月用同一套序列号级仪表盘和 CAPA backlog，与 OEM 及伙伴服务团队一起做可靠性复盘。
- 从第一天起就围绕安全敏感的维护和 OTA 流程设计部署方式、审计日志和访问控制。
- 把技师 playbook、零件主数据和召回流程纳入版本控制，确保现场动作始终可追溯。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 在高度集中的买家市场里，亲自负责 OEM 需求发现、企业销售和伙伴策略。
- role: 创始人/CTO
  startTiming: Month 0
  rationale: 定义序列数据模型、接入架构和范围纪律，避免业务滑向重服务。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭建 MVP 工作流引擎、工单路由逻辑和第一批操作界面。
- role: 解决方案集成工程师
  startTiming: Month 3
  rationale: 负责首批 design partner 的工厂测试、ticketing 和 ERP 适配器。
- role: 部署负责人
  startTiming: Month 4
  rationale: 把 live pilot 变成可复制的实施 playbook 和伙伴 onboarding 流程。
- role: 客户成功负责人
  startTiming: Month 8
  rationale: 在真实车队上线后，推动伙伴采用、续约和扩张。
milestones:
- horizon: 0–12 个月
  items:
  - 在前 10 个目标 OEM 账户里验证车队时点、预算归属和部署要求
  - 为一个机器人家族交付包含序列历史、事故路由和零件流程的 MVP
  - 拿下 2-3 家付费 design partner，并至少完成一个可量化展示 MTTR 或重复故障改善的 live case study
  - 证明一套可复用的数据模型能同时覆盖工厂 QA、ticketing 和零件系统
- horizon: 12–24 个月
  items:
  - 把 design partner 转成 3-5 份年度生产合同
  - 为主流机器人家族上线伙伴门户、CAPA 工作流和备件规划分析
  - 建立两条可复制的区域服务伙伴关系，带动扩张
  - 支持每家 OEM 的多个站点，并在活跃车队上展示可审计的召回和 OTA 历史
- horizon: 24–36 个月
  items:
  - 在不破坏核心 OEM 经济模型的前提下，扩到相邻工业具身 AI 车队
  - 成为滩头市场早期人形机器人车队运营方默认使用的保修与纠正动作 system of record
  - 上线由跨车队可靠性数据驱动的 benchmark 和供应商质量模块
risks:
- risk: 人形机器人交付量的爬坡慢于公司宣称，导致专门服务闭环软件的预算窗口延后。
  likelihood: High
  impact: High
  mitigation: 把需求发现聚焦在已经签好多站点交付合同的 OEM，并保留扩到工作流相似的相邻工业机器人车队的选项。
- risk: OEM 会在第三方系统建立控制点价值前，先把车队与服务工具内部化。
  likelihood: High
  impact: High
  mitigation: 抓住首轮交付网络搭建窗口切入，强调 90 天内上线，并证明跨伙伴中立性和跨职能报表是内部团队早期不会优先做的。
- risk: 数据接入和工作流差异让早期部署过度定制化，难以维持软件毛利。
  likelihood: High
  impact: High
  mitigation: 严格限制到一个机器人家族和一组窄适配器，凡是需要开放式系统集成的账户一律拒绝。
- risk: 服务伙伴继续在系统外协作，削弱数据质量和产品效果。
  likelihood: Medium
  impact: Medium
  mitigation: 把使用行为绑定到 OEM 强制的 SLA 报表、技师 playbook 和零件审批上，让现场团队有运营上的理由留在系统里。
- risk: 安全、on-prem 或审计要求比计划中更早扩大产品范围。
  likelihood: Medium
  impact: Medium
  mitigation: 在前五个账户里先验证部署约束；只有当它明显成为成交前提时，才为混合部署预留预算。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金要够支撑创始产品、集成和部署团队，交付第一版窄切口服务闭环 MVP，拿下 2-3 家付费 OEM design partner，证明 uptime 或保修结果可量化改善，并在更大扩张前确认这个市场是否真能跑出可复制的经常性软件生意。
