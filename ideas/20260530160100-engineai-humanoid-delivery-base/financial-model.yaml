scenarios:
  downside:
    description: 'OEM fleet ramps slip and more implementation work stays bespoke, delaying production-contractor expansion and margin recovery.'
    y3RevenueK: 2612.5
    y3EbitdaK: -308.78
    cashLowPointK: 359.28
    keyAssumptionChanges:
      - 'Exit Y2 at 4 active OEM accounts instead of 5 and exit Y3 at 6 instead of 7.'
      - 'Hold blended Y3 annual ARPU at $550K instead of $620K because module attachment and robot counts ramp more slowly.'
      - 'Cap Y3 gross margin in the 63%-66% range because deployment and adapter work stay more services-heavy.'
  base:
    description: 'Three paid design partners convert into five production OEM contracts by Y2, then expansion inside those fleets and two more logos drive Y3 growth.'
    y3RevenueK: 3565.0
    y3EbitdaK: 423.05
    cashLowPointK: 859.13
    keyAssumptionChanges:
      - 'Land 3 paid design partners in Y1 and convert into 5 active production OEM accounts by Q4Y2.'
      - 'Lift blended annual ARPU from $140K design-partner pricing in Y1 to $620K by Y3 as fleets, partner seats, and analytics expand.'
      - 'Recover toward the 70% gross-margin target only after adapter templates and deployment playbooks reduce services load.'
  upside:
    description: 'Budget ownership clarifies early, partner referrals speed conversions, and premium analytics attach faster than modeled.'
    y3RevenueK: 4760.0
    y3EbitdaK: 1364.47
    cashLowPointK: 1073.46
    keyAssumptionChanges:
      - 'Exit Y2 at 6 active OEM accounts and Y3 at 8 as service-partner channels open logos faster.'
      - 'Raise blended Y3 annual ARPU to $680K via stronger robot-count expansion and premium supplier-quality or recall analytics.'
      - 'Move mature gross margin into the 69%-72% range as partner-led deployments replace founder-heavy implementation.'
sensitivity:
  - variable: 'ARPU'
    downsideCase: '$550K blended annual revenue per active OEM account in Y3'
    baseCase: '$620K blended annual revenue per active OEM account in Y3'
    upsideCase: '$680K blended annual revenue per active OEM account in Y3'
    y3RevenueImpactK: -402.5
    cashImpactK: -295.0
  - variable: 'CAC'
    downsideCase: '$220K CAC if every OEM needs bespoke proof and executive selling'
    baseCase: '$180K CAC'
    upsideCase: '$150K CAC with partner referrals and repeatable design-partner conversion'
    y3RevenueImpactK: -90.0
    cashImpactK: -160.0
  - variable: 'churn'
    downsideCase: '3.0% monthly churn if OEMs keep part of the workflow in internal tools or services SOWs'
    baseCase: '2.0% monthly churn'
    upsideCase: '1.5% monthly churn after the serial-level system of record gets embedded'
    y3RevenueImpactK: -180.0
    cashImpactK: -130.0
  - variable: 'sales cycle'
    downsideCase: '9-month design-partner to production conversion cycle'
    baseCase: '6-7 month blended cycle'
    upsideCase: '5-6 month cycle with warm OEM and partner introductions'
    y3RevenueImpactK: -520.0
    cashImpactK: -360.0
  - variable: 'gross margin'
    downsideCase: '66% steady-state gross margin because deployment work stays custom'
    baseCase: '70% steady-state gross margin'
    upsideCase: '72% steady-state gross margin with more partner-led rollout'
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
  - variable: 'hiring pace'
    downsideCase: 'Pull the analyst and support hires forward by two quarters before proof points are banked'
    baseCase: 'Hold the current lean ramp through the Y2 milestone'
    upsideCase: 'Delay one Y3 hire until after the seventh active OEM account lands'
    y3RevenueImpactK: -80.0
    cashImpactK: -190.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetOEMs --> PaidDesignPartners
      PaidDesignPartners --> ProductionContracts
      ProductionContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 'Revenue engine'
    finding: 'The base case is driven by converting 3 paid design partners into 5 production OEM contracts by Q4Y2 and then expanding to 7 active OEM accounts at about $620K blended annual ARPU by Q4Y3.'
  - checkName: 'Must go right'
    finding: 'The company must prove measurable MTTR and repeat-failure improvement fast enough that OEMs buy the neutral service-loop layer before internal stacks harden.'
  - checkName: 'Model breaks if'
    finding: 'The downside case shows the model compressing to a roughly $359K cash low point if design-partner conversions slow and gross margin stays stuck in the mid-60s.'
  - checkName: 'Next-round proof'
    finding: 'A credible seed story is exiting Y2 with 5 production OEMs, partner-portal usage in live fleets, and evidence that the serial-level workflow improves service outcomes.'
sanityChecks:
  ruleOf40: 'Y3 growth 153.51% + EBITDA margin 11.87% = 165.38%'
  burnMultiple: 'Y2 burn multiple 0.44x, turning -0.17x in Y3 on net new ARR.'
  revenuePerFte: '$356.50K Y3 on 10 exit FTE (benchmark $200-400K SaaS)'
  flags:
    - 'The beachhead is small and concentrated, so 7 active OEM accounts by Q4Y3 already implies meaningful share capture inside the China-first niche.'
    - 'Gross margin does not reach the 70% target until Q4Y3, so extra bespoke integration work or earlier on-prem demands would likely push breakeven out.'
    - 'The model treats customers as active OEM accounts with blended robot, seat, and module spend; if buyers insist on project-heavy services SOWs, ARPU and CAC will move materially.'
    - 'Cash flow is approximated from EBITDA and excludes deferred-revenue timing, taxes, capex, and working-capital effects, so the file is a planning model rather than a treasury model.'
