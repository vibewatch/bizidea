    - 51
  - point: Certified service-partner networks are strategically important because adjacent robot vendors already differentiate on response coverage, spare parts, and preventive maintenance delivery.
    sourceRefs:
    - 44
    - 59
  dataMoats:
  - point: The strongest moat is a cross-fleet graph linking pre-delivery inspection fingerprints, component batches, software versions, and field failures at the unit level.
    sourceRefs:
    - 1
    - 2
    - 34
  - point: Condition and maintenance history becomes more valuable over time because it improves spare-parts planning, service prioritization, and failure prediction across heterogeneous deployments.
    sourceRefs:
    - 45
    - 51
  - point: Workflow knowledge from partner technicians—what resolved the issue, which part was replaced, and what site condition mattered—creates compounding service intelligence that generic FSM rarely captures in a robot-native way.
    sourceRefs:
