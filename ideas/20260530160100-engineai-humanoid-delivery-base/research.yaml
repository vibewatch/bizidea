  validationPlan:
  - priority: high
    question: Will Chinese humanoid OEMs buy a third-party service-loop system before they standardize on an internal stack?
    evidenceToGather: Interview 8-10 China-based OEM service leaders and product owners; ask what they built internally, where spreadsheets still break, and who owns service-system budget.
  - priority: high
    question: Which data feeds are consistently available at the first 3-5 target customers?
    evidenceToGather: Collect sample exports for serial genealogy, test logs, tickets, and parts transactions from at least three OEMs and two partner service organizations.
  - priority: medium
    question: Can a closed-loop parts and failure model cut repair time or warranty cost materially in the first deployment?
    evidenceToGather: Pilot with one OEM fleet and measure mean time to resolution, repeat-failure rate, and emergency-spares usage before and after rollout.
