competitors:
- name: Agility Arc
  stage: scale-up
  wedge: OEM-native humanoid fleet management integrated with Digit deployments, AMRs, and enterprise systems.
  pricing: Bundled in enterprise Digit programs
  strength: Directly coupled to real warehouse and manufacturing deployments, with tight integration to Digit operations and safety workflows.
  weaknessVsUs: Single-OEM stack that does not naturally become a neutral QA-to-warranty system across multiple humanoid vendors or partner networks.
  sourceRefs:
