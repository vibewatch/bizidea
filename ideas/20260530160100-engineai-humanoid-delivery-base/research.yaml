openQuestions:
- How many China-based humanoid OEMs will actually sustain 100-500 active industrial robots by 2027 rather than staying in pilot mode?
- Will early OEM buyers trust a third-party cloud layer with serial, warranty, and field-failure data, or insist on on-prem and internal ownership?
- How standardized are factory test outputs and service data models across EngineAI, UBTECH, Unitree, AgiBot, and other emerging vendors?
- Can a neutral platform win before OEM-native stacks like Figure's and Agility Arc become the default control plane?
