scenarios:
  downside:
    description: OEM 车队爬坡推迟，且更多实施工作仍然高度定制，导致生产合同扩张和毛利修复一起后移。
    y3RevenueK: 2612.5
    y3EbitdaK: -308.78
    cashLowPointK: 359.28
    keyAssumptionChanges:
    - Y2 末活跃 OEM 账户不是 5 个而是 4 个；Y3 末不是 7 个而是 6 个。
    - 由于模块挂载率和机器人数量爬坡更慢，Y3 混合年 ARPU 维持在 $550K，而不是 $620K。
    - 由于部署和适配器工作仍偏重服务，Y3 毛利率被压在 63%-66%。
  base:
    description: 3 家付费 design partner 在 Y2 转成 5 份生产级 OEM 合同，随后这些车队内部扩张再叠加 2 个新 logo，推高 Y3 增长。
    y3RevenueK: 3565.0
    y3EbitdaK: 423.05
    cashLowPointK: 859.13
    keyAssumptionChanges:
    - Y1 落地 3 家付费 design partner，并在 Q4Y2 前转成 5 个活跃生产级 OEM 账户。
    - 随着车队规模、伙伴席位和分析模块扩张，混合年 ARPU 从 Y1 的 $140K design-partner 定价抬升到 Y3 的 $620K。
    - 只有在适配器模板和部署 playbook 降低服务负担后，毛利率才逐步回到 70% 目标。
  upside:
    description: 预算归属更早厘清，伙伴转介绍加速转化，高级分析模块的挂载也快于模型假设。
    y3RevenueK: 4760.0
    y3EbitdaK: 1364.47
    cashLowPointK: 1073.46
    keyAssumptionChanges:
    - 随着服务伙伴渠道更快带来新 logo，Y2 末活跃 OEM 账户达到 6 个，Y3 末达到 8 个。
    - 靠更强的机器人数量扩张和供应商质量 / 召回分析模块，Y3 混合年 ARPU 提升到 $680K。
    - 随着伙伴主导部署取代创始人重投入实施，成熟毛利率进入 69%-72% 区间。
sensitivity:
- variable: ARPU
  downsideCase: $550K：Y3 每个活跃 OEM 账户的混合年收入
  baseCase: $620K：Y3 每个活跃 OEM 账户的混合年收入
  upsideCase: $680K：Y3 每个活跃 OEM 账户的混合年收入
  y3RevenueImpactK: -402.5
  cashImpactK: -295.0
- variable: CAC
  downsideCase: $220K CAC：如果每个 OEM 都要求定制化证明和高层重投入销售
  baseCase: $180K CAC
  upsideCase: $150K CAC：依靠伙伴转介绍和可复制的 design-partner 转化
  y3RevenueImpactK: -90.0
  cashImpactK: -160.0
- variable: churn
  downsideCase: 3.0% 月流失：如果 OEM 仍把部分流程留在内部工具或服务 SOW 中
  baseCase: 2.0% 月流失
  upsideCase: 1.5% 月流失：当序列号级 system of record 被真正嵌进流程后
  y3RevenueImpactK: -180.0
  cashImpactK: -130.0
- variable: sales cycle
  downsideCase: 9 个月：从 design partner 到生产合同的转化周期
  baseCase: 6-7 个月的混合周期
  upsideCase: 5-6 个月：依靠熟悉的 OEM 和伙伴引荐
  y3RevenueImpactK: -520.0
  cashImpactK: -360.0
- variable: gross margin
  downsideCase: 66% 稳态毛利率：因为部署工作一直偏定制
  baseCase: 70% 稳态毛利率
  upsideCase: 72% 稳态毛利率：更多 rollout 由伙伴主导
  y3RevenueImpactK: 0.0
  cashImpactK: -220.0
- variable: hiring pace
  downsideCase: 在证明点还没拿稳前，就把分析师和支持岗位提前两个季度招进来
  baseCase: 在 Y2 里程碑前维持当前精简爬坡
  upsideCase: 把一个 Y3 岗位延后到第 7 个活跃 OEM 账户落地之后再招
  y3RevenueImpactK: -80.0
  cashImpactK: -190.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetOEMs --> PaidDesignPartners
      PaidDesignPartners --> ProductionContracts
      ProductionContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的核心驱动，是把 3 家付费 design partner 在 Q4Y2 前转成 5 份生产级 OEM 合同，并在 Q4Y3 前扩到 7 个活跃 OEM 账户、约 $620K 的混合年 ARPU。
- checkName: 必须做对的事
  finding: 公司必须足够快地证明 MTTR 和重复故障确有改善，让 OEM 在内部栈固化前先买下这层中立的服务闭环。
- checkName: 模型失效条件
  finding: 下行情形显示，如果 design-partner 转化变慢、毛利率卡在 60% 中段，现金低点会被压到约 $359K。
- checkName: 下一轮融资证明点
  finding: 一个可信的 seed 叙事，是在 Y2 末走到 5 家生产级 OEM、伙伴门户已经在真实车队使用，而且序列号级工作流确实改善了服务结果。
sanityChecks:
  ruleOf40: Y3 增长 153.51% + EBITDA 利润率 11.87% = 165.38%
  burnMultiple: Y2 burn multiple 为 0.44x，Y3 按净新增 ARR 转为 -0.17x。
  revenuePerFte: $356.50K 的 Y3 收入，对应期末 10 个 FTE（对标 SaaS benchmark $200-400K）
  flags:
  - 滩头市场小且集中，所以到 Q4Y3 有 7 个活跃 OEM 账户，已经意味着在中国优先的细分市场里拿到不低份额。
  - 毛利率到 Q4Y3 才摸到 70% 目标，因此如果额外定制集成工作增加，或 on-prem 需求更早出现，breakeven 大概率会继续后移。
  - 模型把客户定义为活跃 OEM 账户，并把机器人、席位和模块支出混在一起；如果买家坚持项目制服务 SOW，ARPU 和 CAC 都会显著变动。
  - 现金流用 EBITDA 近似，未纳入递延收入时点、税项、capex 和营运资金影响，所以这是规划模型，不是 treasury 模型。
