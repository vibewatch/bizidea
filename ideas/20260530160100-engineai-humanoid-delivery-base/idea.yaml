differentiator: >-
  This is not generic fleet management for robots already in stable production
  and not another field-service wrapper around tickets. The wedge starts at the
  serial-number level, where factory inspections, simulated tests, shipped
  configuration, and field maintenance need to remain connected if OEMs want to
  learn faster than failures spread. Defensibility comes from the cross-fleet
  reliability graph linking component batches, test fingerprints, site
  conditions, and repair outcomes across many deployments, which neither a
  single integrator nor a generic FSM vendor can assemble easily.
