problem: >-
  Humanoid robot companies can now show credible manufacturing throughput, but
  their after-sales operation is still usually held together with spreadsheets,
  chat threads, ad hoc RMAs, and generic field-service software. Once hundreds
  of robots ship through distributors or integrators, every failure requires
  teams to reconstruct which parts, test results, software version, and site
  conditions sit behind a ticket. That slows repairs, bloats spare-parts
  inventory, obscures root causes, and makes enterprise buyers nervous about
  scaling beyond a first deployment.
targetUser:
  primary: COO or head of after-sales at a Shenzhen-based humanoid robot OEM moving from pilot batches to 100-500 delivered robots across warehouse and factory material-handling deployments
  secondary: Regional deployment and maintenance partners responsible for uptime, spare parts, and field repairs
  buyer: COO, head of service, or VP operations at a humanoid robot OEM
startupThesis:
  nonObviousInsight: >-
    Once a humanoid robot can roll off a line every 15 minutes and ships with a
    deep factory test record, the scarce asset stops being the demo itself. The
    new control point is the service loop that connects each robot's build and
    QA fingerprint to field failures, spare-parts planning, and factory
    corrective action. Mass delivery makes reliability operations, not just
    embodiment, the gating bottleneck.
  beachhead: >-
    After-sales reliability operations for Shenzhen humanoid OEMs shipping their
    first 100-500 robots through 3-5 regional integrators into warehouse and
    factory material-handling deployments across China
  wedge: >-
    A service-loop OS that ties robot serial numbers, factory inspections,
    simulated test results, warranty tickets, technician workflows, and parts
    demand into one closed reliability system
  whyNowCatalyst: >-
    EngineAI's move into a 10,000-unit delivery phase and its explicit inclusion
    of maintenance support in the factory workflow make after-sales reliability
    infrastructure an immediate operating need instead of a future fleet
    management problem.
  ventureScalePath: >-
    Start with humanoid OEM after-sales operations, then expand into robotics
    distributors, leasing and insurance partners, and adjacent embodied-AI
    device categories that need the same serial-level reliability, warranty, and
    corrective-action backbone.
solution: >-
  Humanoid Service Loop OS would ingest every robot's build record, inspection
  history, simulated test outcomes, installed software version, and shipped
  configuration the moment it leaves the factory. When a field ticket arrives,
  the product would route the issue through the right service playbook, suggest
  the most likely root-cause clusters, and show technicians which replacement
  parts and checks are tied to that exact unit profile. OEM service leaders
  would get live views of failure patterns by site, integrator, component batch,
  and software release rather than a pile of disconnected support cases. The
  platform would also push structured CAPA feedback back into manufacturing and
  supplier teams so recurring field failures change inspection thresholds,
  testing plans, and spares forecasts. Over time, the company becomes the system
  of record for uptime economics across commercial humanoid fleets.
goToMarketSeed:
  firstCustomer: A Shenzhen humanoid OEM with a newly opened manufacturing base, 100-plus robots scheduled for delivery this year, and 3-5 regional service partners handling warehouse or factory deployments
  buyingTrigger: The company signs its first multi-site delivery contracts and has to stand up warranty response, spare-parts stocking, and maintenance SLAs across partner networks
  currentAlternative: Spreadsheets, ERP records, WeChat or email support threads, generic ticketing systems, and manually managed RMA or spare-parts workflows
  switchingReason: >-
    The wedge gives OEMs one serial-level operating layer that links factory QA
    evidence to field service decisions, something generic field-service and ERP
    stacks do not capture for early humanoid fleets.
  pricingHypothesis: Annual platform fee plus per-active-robot pricing, with added fees for partner seats, warranty analytics, and parts-planning modules
