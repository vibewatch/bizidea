topRisks:
  - name: Market timing
    description: Humanoid shipment volumes may ramp slower than headline claims, delaying budgets for dedicated service infrastructure.
    mitigation: Start with OEMs and integrators that already have contracted multi-site deliveries this year and support adjacent mobile-manipulation fleets using similar workflows.
  - name: OEM internal build
    description: Larger robot makers may try to extend ERP or internal tools instead of buying a specialized reliability platform.
    mitigation: Win with faster time to value, cross-partner workflow depth, and a reliability dataset that internal teams cannot assemble early on.
  - name: Integration burden
    description: Factory QA systems, ticketing tools, and partner service processes may vary enough to make onboarding too services-heavy.
    mitigation: Begin with a narrow adapter set around build records, inspections, ticketing, and parts workflows for one fleet family before broadening coverage.
