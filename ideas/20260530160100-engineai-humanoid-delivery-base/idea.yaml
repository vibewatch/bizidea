jobsToBeDone:
  - job: When a humanoid OEM starts shipping multi-site deployments, help the service leader standardize warranty triage and repair workflows, so they can keep uptime high without rebuilding operations for every partner and site.
    currentAlternative: Manual ticket triage across chat threads, spreadsheets, and generic helpdesk tools
    successMetric: Mean time to repair and percentage of tickets resolved on the first partner visit
  - job: When a field failure repeats across a new robot batch, help operations trace the issue back to build, inspection, or component patterns, so they can fix the root cause before more deployed robots fail.
    currentAlternative: Ad hoc root-cause analysis across ERP exports, QA logs, and technician notes
    successMetric: Time from repeated incident detection to corrective action and reduction in repeat failures
