  wedge: 与 Digit 部署、AMR 和企业系统打通的 OEM 原生人形车队管理。
  pricing: Bundled in enterprise Digit programs
  strength: 它直接绑定真实仓储与制造部署，对 Digit 运营和安全流程的集成也更深。
  weaknessVsUs: 这是单一 OEM 的栈，天然不适合作为跨多个人形厂商或伙伴网络的中立 QA-to-warranty 系统。
  sourceRefs:
  - 17
  - 18
- name: Formant
  stage: scale-up
  wedge: 面向物理系统的 AI 驱动事故管理、预测性维护与运营工单。
  pricing: Demo-led enterprise software
  strength: 在高价值物理运营里，它的可观测性、遥测和告警路由叙事很强。
  weaknessVsUs: 它从实时事故和遥测出发，而不是从制造谱系、保修核算或人形机器人的零件 intelligence 出发。
  sourceRefs:
  - 37
  - 38
- name: InOrbit
  stage: scale-up
  wedge: 把 ERP/WMS 工作流接到多机器人任务上的 RobOps 与业务执行软件。
  pricing: Demo-led enterprise software
  strength: 跨厂商编排和多站点机器人运营支持，本来就是产品核心主题。
  weaknessVsUs: 它更偏运行时编排，而不是序列号级纠正动作、保修成本和回推到工厂 QA 的反馈闭环。
  sourceRefs:
  - 40
  - 41
  - 44
- name: Boston Dynamics Orbit
  stage: incumbent
  wedge: 机器人车队仪表盘、数字孪生视图、AI 洞察和偏巡检的软件层。
  pricing: Enterprise software add-on
  strength: 背靠成熟工业机器人品牌，提供企业级的跨站点、任务和车队健康可视化。
  weaknessVsUs: 它更适合运营监控和 Boston Dynamics 生态，不是为多 OEM 人形机器人售后可靠性闭环而生。
  sourceRefs:
  - 45
- name: ServiceMax
  stage: incumbent
  wedge: 围绕工单、保修、合同、RMA 和技师流程的资产中心型 FSM。
  pricing: Enterprise FSM subscription
  strength: 服务执行、保修和 installed-base 管理能力很成熟。
  weaknessVsUs: 它不是机器人原生系统，也不会默认把机器人遥测或工厂测试指纹连回工程 CAPA 流程。
  sourceRefs:
  - 52
  - 53
regulatoryTechnicalConstraints:
- point: 在人附近运行的机器人部署，需要协作安全控制，并证明维护动作不会破坏安全运行。
  sourceRefs:
  - 55
  - 56
- point: 联网机器人车队在远程监控、支持和软件更新上，都需要满足工业网络安全控制要求。
  sourceRefs:
  - 57
  - 58
- point: 面向全车队的软件变更和召回，必须保留逐台可审计的配置与升级历史。
  sourceRefs:
  - 34
  - 45
- point: 与成熟工业机器人品类相比，人形机器人部署仍面临不断变化的标准和验收门槛。
  sourceRefs:
  - 17
  - 55
validationSignals:
- point: EngineAI 现在声称能做到 15 分钟一台的产线节拍，每台还附带 79 项检测和 46 项模拟测试——这正是服务闭环平台最能吃到的 QA 密度。
  sourceRefs:
  - 1
  - 2
- point: Figure 明确表示，规模化迫使它自建现场服务、车队管理、OTA 和召回流程，这等于直接验证了工作流缺口。
  sourceRefs:
  - 34
- point: Agility Arc 已被作为商业化人形车队管理层来销售，并能接入 AMR 与企业系统，说明买家愿意在人形部署周围采购软件。
  sourceRefs:
  - 17
  - 18
- point: Geek+ 这类相邻机器人厂商已经在全球销售 24/7 支持、备件计划和预防性维护，说明生命周期运营在机器人行业本就有预算。
  sourceRefs:
  - 59
- point: Apptronik 与 Jabil 的合作把产能爬坡、验证测试、库存管理和维护简化都写成商业化前提。
  sourceRefs:
  - 27
openQuestions:
- 到 2027 年，究竟会有多少中国人形机器人 OEM 真正稳定维持 100-500 台活跃工业机器人，而不是停留在试点？
- 早期 OEM 买家会信任第三方云层来承载序列号、保修和现场故障数据吗，还是会坚持 on-prem 与内部控制？
- 在 EngineAI、UBTECH、Unitree、AgiBot 等新兴厂商之间，工厂测试输出和服务数据模型到底有多标准化？
- 在 Figure 内部栈和 Agility Arc 这类 OEM 原生控制平面成为默认之前，中立平台还能不能先赢下来？
