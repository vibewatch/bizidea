reportMemo:
  executiveTakeaways:
  - 量产迹象说明痛点已经不是未来式：EngineAI、Figure、Agility 和 Apptronik 都在描述从试点机器人走向可重复部署，uptime、可维护性和伙伴协同因此变成运营瓶颈。
  - 现在没有哪个现有厂商真正拿住从工厂 QA 到现场维修的序列号级闭环；robot ops 平台、OEM 自建车队栈和通用 FSM 都只覆盖其中一段，保修、CAPA 和备件 intelligence 仍是碎片化的。
  - 中国优先的滩头市场在战略上很有吸引力，但今天仍然偏小；只有当更多 OEM 真的稳定维持 100-500 台活跃人形机器人时，近端 SAM 才会跳出几千万美元量级。
  - 中国是最适合起跑的市场，因为它同时具备全球最密的机器人装机基础、对具身智能的明确国家支持，以及围绕深圳和周边制造带快速成型的本地 OEM 集群。
  - 最主要的证伪风险是内部自建：Figure 已经做出了自己的现场服务和车队管理栈，所以 startup 必须在 OEM 原生系统固化前先赢单，并证明自己比“表格 + 通用 FSM”更快见效。
  marketDefinition: 面向早期商业化人形机器人车队的单机级可靠性运营 system of record：覆盖 build 谱系、检测与测试数据、现场工单、保修流程、备件规划、技师 playbook，以及回推到制造端的纠正动作反馈。
  customerAndBuyer: 核心用户是中国人形机器人 OEM 的 COO、服务负责人或售后运营负责人，他们正把首批 100-500 台工业机器人推向交付。次级用户是区域服务伙伴和集成商。真正的经济买方，是那个要对 uptime、保修成本和客户信心负责的 OEM 运营 owner。
  buyingTriggers:
  - point: OEM 从试点样机走向多站点商业交付，必须把保修分诊、维修 playbook 和多区域伙伴响应标准化。
    sourceRefs:
    - 1
    - 2
    - 17
    - 27
    - 33
  - point: 商业部署开始依赖伙伴网络和企业系统集成后，靠聊天线程人工协同已经跟不上 SLA 级别的服务要求。
    sourceRefs:
    - 18
    - 41
    - 59
    - 63
  - point: 当车队规模大到需要处理重复故障、召回和 OTA 更新时，企业必须要有可审计的单机历史，而不是继续靠临时表格。
    sourceRefs:
    - 34
    - 45
    - 51
  willingnessToPay:
    summary: 直接面向人形机器人服务的软件预算并不公开，因此付费意愿只能间接判断。最强的证据是，相邻机器人运营方已经在为 24/7 支持、备件计划、预防性维护和企业级 FSM 栈持续付费；这说明当 uptime 和现场服务成为董事会级风险时，预算是能被调出来的，只是第一单更可能以运营平台而不是独立分析工具的名义卖出。
    sourceRefs:
    - 51
    - 52
    - 59
    - 63
  competitiveLandscape: 竞争格局是碎片化的。Formant 和 InOrbit 占住跨机器人运营与事故工作流；Boston Dynamics Orbit 提供车队可视化和偏巡检的软件；ServiceMax 和 Salesforce 占住通用服务执行；领先 OEM 也在自建车队/服务栈。真正的空白，是一层中立的、从工厂 QA 指纹起步、最终落到闭环纠正动作、保修和备件 intelligence 的序列号级可靠性层。
  incumbentThesis:
  - incumbentClass: 机器人运营平台
    point: Formant 和 InOrbit 在遥测、事故响应和编排上很强，但它们并不是从制造谱系、交付前 QA 或人形 OEM 的保修核算起步。
    sourceRefs:
    - 37
    - 40
    - 41
  - incumbentClass: 通用现场服务套件
    point: ServiceMax 和 Salesforce 已覆盖工单、保修、SLA 和技师排程，但它们不是机器人原生系统，也不会默认把工厂测试指纹连回车队工程反馈。
    sourceRefs:
    - 52
    - 53
  - incumbentClass: OEM 原生车队栈
    point: Agility Arc 和 Figure 的内部工具证明 OEM 确实能自建，但这些系统天然只服务单一厂商、围绕自家硬件优化，也更难成为跨伙伴或跨相邻车队的中立 system of record。
    sourceRefs:
    - 17
    - 18
    - 34
  - incumbentClass: 仓储与自动化执行层
    point: 仓储执行和机器人控制层已经能把 ERP/WMS 连到机器人，但它们优化的是吞吐和编排，而不是售后 CAPA、保修成本或备件预测。
    sourceRefs:
    - 41
    - 60
    - 63
  regulatoryLandscape: 人形机器人专属规则仍在形成，但部署负担已经存在：人与机器人近距离协作需要协作安全控制、工作场所安全合规、受治理的 AI 监控，以及工业网络安全。这意味着可审计性、配置历史和可追踪维护动作不是可选企业功能，而是产品底座。
  technologyLandscape: 底层能力其实已经具备：丰富的过程 QA、终检、OTA 更新、机器人遥测、数字孪生和跨车队仪表盘都不缺。真正缺的是一层编排，把工厂记录、现场工单、服务伙伴和纠正动作连起来，让每台已部署机器人始终挂着自己的序列号级 build 与故障历史。
  distributionChannels:
  - point: 当买家刚签下首批多站点部署合同、正为从零搭起服务和保修运营发愁时，先走 OEM 直销。
    sourceRefs:
    - 1
    - 2
    - 17
    - 27
    - 33
  - point: 区域服务伙伴和集成商是最好的第二渠道，因为他们本来就在处理现场响应，也最能放大标准化 playbook 和零件流程的价值。
    sourceRefs:
    - 18
    - 44
    - 59
  - point: ERP、WMS 和 robot-orchestration 生态适合作为联合销售和集成渠道，因为早期买家必须让产品接进既有的仓储与制造控制层。
    sourceRefs:
    - 41
    - 45
    - 60
  partnershipEcosystem:
  - point: ERP、WMS 和 MES 伙伴很关键，因为产品要吃进工单、安装配置和零件流转，而不是只活在 service desk 里。
    sourceRefs:
    - 41
    - 60
    - 63
  - point: 合同制造和零部件伙伴能提升根因定位速度，因为规模化的人形机器人厂商越来越依赖外部制造和更长的供应链。
    sourceRefs:
    - 27
    - 28
    - 51
  - point: 认证服务伙伴网络在战略上很重要，因为相邻机器人厂商已经在用响应覆盖、备件和预防性维护交付能力来做差异化。
    sourceRefs:
    - 44
    - 59
  dataMoats:
  - point: 最强的护城河是一张跨车队图谱：把交付前检测指纹、零部件批次、软件版本和现场故障连到单机层面。
    sourceRefs:
    - 1
    - 2
    - 34
  - point: 工况和维护历史会随着时间越来越值钱，因为它能持续改善异构部署下的备件规划、服务优先级和故障预测。
    sourceRefs:
    - 45
    - 51
  - point: 伙伴技师沉淀下来的工作流知识——问题是怎么解决的、换了哪个零件、现场哪个条件最关键——会累积成通用 FSM 很难原生拿住的机器人服务 intelligence。
    sourceRefs:
    - 44
    - 52
    - 59
  geographicConsiderations:
  - point: 中国是最有吸引力的首发市场，因为它已经占到全球工业机器人部署的 54%，在运工业机器人超过 200 万台，是早期人形机器人商业化最密集的自动化土壤。
    sourceRefs:
    - 4
    - 5
    - 11
  - point: 深圳及周边制造带尤其值得先打，因为 EngineAI、UBTECH 等 OEM 正把本地制造能力和工业部署野心同时推高。
    sourceRefs:
    - 1
    - 2
    - 12
    - 14
  - point: 国际扩张应当跟着已被验证的物流和制造场景走，Apptronik、Agility 和 Figure 都已经在这些领域给出部署信号。
    sourceRefs:
    - 18
    - 27
    - 33
  sensitivityCases:
  - case: 人形机器人商业化比乐观 headline 晚好几年。
    impact: 滩头 SAM 会迅速收缩，因为在车队达到有效规模前，真正愿意为专门售后软件买单的 OEM 只会剩下极少数。
    sourceRefs:
    - 3
    - 4
    - 10
    - 66
  - case: 领先 OEM 持续自建车队和现场服务系统。
    impact: startup 必须更早切入、更强调跨伙伴中立性，或者把自己卖成内部团队不想长期维护的那一层。
    sourceRefs:
    - 17
    - 34
    - 45
  - case: robot-ops 和 FSM 现有厂商把手伸进更深的可靠性流程。
    impact: 如果 startup 不能明确占住从 QA 到保修的数据模型和纠正动作闭环，定价权就会被压低。
    sourceRefs:
    - 37
    - 40
    - 52
  validationPlan:
  - priority: high
    question: 中国人形机器人 OEM 会在内部栈固化前购买第三方服务闭环系统吗？
    evidenceToGather: 访谈 8-10 位中国 OEM 服务负责人和产品 owner，问他们已经内部做了什么、表格卡在哪，以及服务系统预算归谁管。
  - priority: high
    question: 首批 3-5 个目标客户里，哪些数据源是稳定可拿到的？
    evidenceToGather: 至少从 3 家 OEM 和 2 家伙伴服务机构收集序列号谱系、测试日志、工单和零件交易样本导出。
  - priority: medium
    question: 闭环的零件与故障模型，能否在首个部署里实质性缩短维修时间或压低保修成本？
    evidenceToGather: 在一个 OEM 车队上做 pilot，上线前后对比平均解决时间、重复故障率和紧急备件使用。
