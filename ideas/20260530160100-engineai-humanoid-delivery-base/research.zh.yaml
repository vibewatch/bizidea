    - 51
  adoptionFrictionMatrix:
  - friction: 打通工厂 QA、WMS/ERP 和伙伴服务系统
    severity: high
    affectedBuyer: OEM 服务与 IT/OT 负责人
    mitigation: 先靠一组窄适配器拿下序列历史和工单，再等数据管道稳定后补零件与分析。
    sourceRefs:
    - 41
    - 60
  - friction: 证明现场动作在安全、保修责任和审计上的可控性
    severity: high
    affectedBuyer: COO 和售后负责人
    mitigation: 默认把每次维护动作、换件、OTA 变更和召回步骤都做成单机可追踪。
    sourceRefs:
    - 17
    - 55
    - 56
  - friction: 买家很容易继续扩内部工具或 OEM 原生系统
    severity: high
    affectedBuyer: COO 和产品负责人
    mitigation: 靠跨伙伴中立性、更快部署速度，以及内部团队早期不会优先做的分析能力拉开差距。
    sourceRefs:
    - 34
    - 52
  - friction: 多站点车队变大后，远程支持怎么跑顺
    severity: medium
    affectedBuyer: 区域集成商运营负责人
    mitigation: 直接为伙伴网络打包 playbook、远程分诊和升级流程，而不是假设客户自己会建 NOC。
    sourceRefs:
    - 44
    - 59
