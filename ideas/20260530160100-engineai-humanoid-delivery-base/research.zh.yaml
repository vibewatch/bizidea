  pestle:
  - factor: 政治
    impact: positive
    point: 中国正明确把 AI 驱动机器人和具身智能抬到国家战略优先级，这会直接推升本地试验和采购动能。
    sourceRefs:
    - 4
  - factor: 经济
    impact: positive
    point: 自动化需求、用工紧缺和制造业竞争力诉求还在上升，带动机器人投资持续走强，也把底层部署盘子越做越大。
