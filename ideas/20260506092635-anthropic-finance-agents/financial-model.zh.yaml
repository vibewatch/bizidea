scenarios:
  downside:
    description: 付费试点大致延后一个季度，到第 3 年末仅有 8 家银行上线，且扩展更接近年度合同价值的低端。
    y3RevenueK: 1989.5
    y3EbitdaK: -1251.0
    cashLowPointK: -705.2
    keyAssumptionChanges:
    - 新增客户落地时间后移，到 Q4Y3 客户总数仅达 8 家，而非 10 家。
    - 基础正式合同 ACV 从 $252K 降至约 $240K，成熟 ACV 从 $330K 降至约 $294K。
    - 由于实施仍较为定制化，第 3 年末毛利率约为 66%，而非 68%。
  base:
    description: 第 1 年的 3 个付费试点完成转化，到第 2 年末达到 8 家付费银行；随后相邻模块扩展提升了第 3 年 10 家银行客户群的单行收入。
    y3RevenueK: 2821.5
    y3EbitdaK: -645.8
    cashLowPointK: 214.2
    keyAssumptionChanges:
    - 新增客户计划为：第 1 年签下 3 家银行，第 2 年 5 家，第 3 年 2 家。
    - 付费试点按约 $90K 变现，随后转为 $252K 的年度正式合同；成熟账户在第一年后达到约 $330K ACV。
    - 随着 onboarding 和治理工作标准化，毛利率从第 1 年的 55% 提升至第 3 年的 68%。
  upside:
    description: 标杆客户与合作伙伴带动使成交加速，到第 3 年末达到 12 家银行，且更多账户向研究支持的每家银行 $350K 价值扩展。
    y3RevenueK: 3291.2
    y3EbitdaK: -260.3
    cashLowPointK: 854.1
    keyAssumptionChanges:
    - 新增客户时点前移，到 Q4Y3 达到 12 家银行，而非 10 家。
    - 随着相邻模块更快附加，成熟 ACV 从约 $330K 提升至约 $350K。
    - 随着实施更可复制，第 3 年末毛利率约达到 70%。
sensitivity:
- variable: ARPU
  downsideCase: 银行维持在基础年度合同附近，扩展 ACV 稳定在更接近约 $294K。
  baseCase: 正式合同 ACV 约为 $252K，成熟 ACV 约为 $330K。
  upsideCase: 随着模块采用加快，成熟 ACV 接近 $350K 的 SOM 基准。
  y3RevenueImpactK: -228.0
  cashImpactK: -205.5
- variable: CAC
  downsideCase: 为了维持充足管道，每月需要比计划多约 $6K 的 S&M 支出。
  baseCase: 创始人主导销售加 1 名 AE，使综合 CAC 保持在模型水平附近。
  upsideCase: 标杆客户和实施合作伙伴降低差旅及管道生成支出。
  y3RevenueImpactK: 0.0
  cashImpactK: -215.8
- variable: churn
  downsideCase: 第 3 年在相邻模块嵌入前，有 1 家重要银行流失。
  baseCase: 前 36 个月损益表未建模实际流失，但 LTV 使用 1.2% 的月流失经验值。
  upsideCase: 早期客户在 seed 叙事期间完成续约并扩展，保持零流失。
  y3RevenueImpactK: -330.0
  cashImpactK: -224.2
- variable: sales cycle
  downsideCase: 由于治理与采购审查拖长，试点启动延后一个季度。
  baseCase: 目标银行按计划节奏从发现进入付费试点。
  upsideCase: 标杆账户和合作伙伴引荐让多笔交易提前一个季度推进。
  y3RevenueImpactK: -246.5
  cashImpactK: -484.4
- variable: gross margin
  downsideCase: 由于实施和支持仍过于手工，第 3 年末毛利率约为 65%。
  baseCase: 毛利率在第 3 年逐步接近但尚未完全达到 70% 目标。
  upsideCase: 标准化 onboarding 和控制把第 3 年毛利率推升至约 70%。
  y3RevenueImpactK: 0.0
  cashImpactK: -140.5
- variable: hiring pace
  downsideCase: 计划中的招聘比收入成熟所需时间提前约 2 个月启动。
  baseCase: 团队仅在试点和首批正式合同转化得到证明后才增加编制。
  upsideCase: 公司将第二名 AE 或第三名工程师的招聘延后到扩展收入可见之后。
  y3RevenueImpactK: 0.0
  cashImpactK: -265.6
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  TargetAccounts --> PaidPilots\n  PaidPilots --> AnnualContracts\n  AnnualContracts --> ExpandedModules\n  ExpandedModules --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Opex\n  Opex --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情境收入来自第 3 年的 10 家付费银行，其中第 1 年的 3 个试点完成转化，成熟账户在第一年后从约 $252K ACV 扩展到约 $330K ACV。
- checkName: 必须做对的事
  finding: 上传优先试点必须在无需等待深度贷款技术栈集成的情况下转为年度合同，否则银行销售周期会压垮招聘计划。
- checkName: 如果出现以下情况模型会失效
  finding: 若销售周期延后一个季度且扩展走弱，下行情境下第 3 年收入将降至约 $2.0M，并使现金跌至约 -$705K。
- checkName: 下一轮融资证明
  finding: 当公司达到 8 家付费银行、实现 1 个相邻模块加售，并证明可复用的连接器驱动部署动作时，种子轮故事最有说服力。
sanityChecks:
  ruleOf40: 第 3 年增长率 85.1% + EBITDA 利润率 -22.9% = 62.2%
  burnMultiple: 第 2 年 burn multiple 为 0.59x；随着初始切口逐步填满且团队在盈亏平衡前提前投资，第 3 年升至 0.95x。
  revenuePerFte: 按平均 9.25 名 FTE 计算，第 3 年每名 FTE 收入为 $305K；按期末 10 名 FTE 计算为 $282K（对标 SaaS 基准 $200-400K）
  flags:
  - 基础情境假设每个付费试点最终都能转化；若实际转化仅达到商业计划漏斗的低端，公司将需要更多资本。
  - 第 3 年毛利率仍低于 70% 目标，因此在下一轮融资前，实施与治理工作必须进一步标准化。
  - 到第 3 年仅有 10 家银行，客户集中度仍然很高，因此任何一次扩展延迟或流失事件都会对现金产生过大影响。
  - 基础情境下，到第 3 年末现金仅约为 $214K，留给延迟的 seed 融资流程或更慢银行采购的余地有限。
  - 尽管模型中的前 36 个月损益表没有实际流失，单位经济仍使用了 1.2% 的月流失经验值。
