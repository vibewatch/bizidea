scenarios:
  downside:
    description: 付费试点整体延后约一个季度，到第 3 年末只有 8 家银行上线，扩展收入也更接近年度合同价值区间的低端。
    y3RevenueK: 1989.5
    y3EbitdaK: -1251.0
    cashLowPointK: -705.2
    keyAssumptionChanges:
    - 新客户签约节奏整体后移，到 Q4Y3 仅有 8 家客户，而不是 10 家。
    - 基础正式生产 ACV 从 $252K 降至约 $240K，成熟 ACV 从 $330K 降至约 $294K。
    - 因实施仍高度定制化，Y3 结束时毛利率仅约 66%，而不是 68%。
  base:
    description: 第 1 年的 3 个付费试点会在第 2 年末转化出 8 家付费银行，然后相邻模块扩展把第 3 年 10 家银行基础上的单银行收入继续抬高。
    y3RevenueK: 2821.5
    y3EbitdaK: -645.8
    cashLowPointK: 214.2
    keyAssumptionChanges:
    - 新客户计划为 Y1 签 3 家、Y2 签 5 家、Y3 再签 2 家。
    - 付费试点价格约为 $90K，之后转成 $252K 的年度正式生产合同；满一年后的成熟账户 ACV 约为 $330K。
    - 随着上线和治理工作标准化，毛利率会从 Y1 的 55% 提升到 Y3 的 68%。
  upside:
    description: 可引用客户案例和伙伴带单加速成交，到第 3 年末达到 12 家银行，且更多账户扩展到研究支持的 $350K 单银行价值水平附近。
    y3RevenueK: 3291.2
    y3EbitdaK: -260.3
    cashLowPointK: 854.1
    keyAssumptionChanges:
    - 新客户签约节奏提前，到 Q4Y3 达到 12 家，而不是 10 家。
    - 随着相邻模块更快挂载，成熟 ACV 从约 $330K 抬升到约 $350K。
    - 随着实施更可复制，Y3 结束时毛利率约 70%。
sensitivity:
- variable: ARPU
  downsideCase: 银行维持在基础年度合同水平，扩展后的 ACV 更接近约 $294K。
  baseCase: 正式生产 ACV 约为 $252K，成熟 ACV 约为 $330K。
  upsideCase: 在模块采用更快的情况下，成熟 ACV 接近 $350K 的 SOM 基准。
  y3RevenueImpactK: -228.0
  cashImpactK: -205.5
- variable: CAC
  downsideCase: 为维持漏斗充足，S&M 每月支出需要比计划再高约 $6K。
  baseCase: 由创始人主导销售，再加 1 名 AE，能把综合 CAC 控制在模型水平附近。
  upsideCase: 可引用客户和实施伙伴降低差旅与获客支出。
  y3RevenueImpactK: 0.0
  cashImpactK: -215.8
- variable: churn
  downsideCase: 第 3 年有一家重要银行在相邻模块嵌入前流失。
  baseCase: 前 36 个月 P&L 不计实际 churn，但 LTV 使用 1.2% 的月 churn 启发式。
  upsideCase: 早期客户全部续约并扩展，在 seed 叙事期内没有 churn。
  y3RevenueImpactK: -330.0
  cashImpactK: -224.2
- variable: sales cycle
  downsideCase: 由于治理和采购评审拉长，试点启动整体延后一个季度。
  baseCase: 目标银行按计划节奏从 discovery 推进到付费试点。
  upsideCase: 可引用客户和伙伴介绍让多个机会提前一个季度成交。
  y3RevenueImpactK: -246.5
  cashImpactK: -484.4
- variable: gross margin
  downsideCase: 因实施和支持仍过于手工，Y3 结束时毛利率只有约 65%。
  baseCase: 到 Y3 时毛利率持续上升，但仍略低于 70% 目标。
  upsideCase: 标准化上线和控制体系把 Y3 毛利率推到约 70%。
  y3RevenueImpactK: 0.0
  cashImpactK: -140.5
- variable: hiring pace
  downsideCase: 计划中的招聘比收入成熟所需节奏提前约 2 个月启动。
  baseCase: 团队只会在试点和首批正式生产转化被证明后再加人。
  upsideCase: 公司把第二名 AE 或第三名工程师延后到扩展收入可见之后再招。
  y3RevenueImpactK: 0.0
  cashImpactK: -265.6
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> ExpandedModules
      ExpandedModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Opex
      Opex --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，第 3 年收入来自 10 家付费银行，其中第 1 年的 3 个试点会转化，而成熟账户 ACV 会从约 $252K 升到约 $330K。
- checkName: 必须跑通的环节
  finding: 上传优先试点必须在不等待深度放贷技术栈集成的情况下转成年度合同，否则银行销售周期会拖垮当前招聘计划。
- checkName: 模型失效条件
  finding: 如果销售周期延后一季度且扩展更弱，下行情景下 Y3 收入会降至约 $2.0M，并把现金推到约 -$705K。
- checkName: 下一轮融资证明
  finding: 当公司达到 8 家付费银行、跑出一次相邻模块加购，并证明连接器驱动的部署动作可复制时，seed 故事会最有说服力。
sanityChecks:
  ruleOf40: Y3 growth 85.1% + EBITDA margin -22.9% = 62.2%
  burnMultiple: Y2 burn multiple 0.59x, rising to 0.95x in Y3 as ARR growth decelerates after the initial beachhead fills and the team invests ahead of breakeven.
  revenuePerFte: $305K Y3 on average 9.25 FTE and $282K on ending 10 FTE (benchmark $200-400K SaaS)
  flags:
  - 基准情景假设所有付费试点最终都会转化；如果实际转化率只落在商业计划漏斗的较低区间，公司就需要更多资金。
  - Y3 毛利率仍低于 70% 目标，说明在下一轮融资前，实施和治理工作还必须进一步标准化。
  - 到 Y3 时客户数仍只有 10 家，集中度很高，因此任何一次扩展延迟或流失都会对现金产生放大影响。
  - 基准情景下，Y3 年末现金仅剩约 $214K，几乎没有空间应对 seed 融资推迟或银行采购继续变慢。
  - 单位经济使用了 1.2% 的月 churn 启发式，但建模 P&L 在前 36 个月并未计入实际 churn。