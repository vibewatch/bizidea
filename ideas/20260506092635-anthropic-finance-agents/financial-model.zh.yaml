  round: pre-seed
  amountM: 2.8
  runwayMonths: 30
  milestone: 达到 8 家付费银行、2+ 个试点转正式生产、一个在线核心工作流连接器和一次相邻模块加购，同时在启动 seed 融资前保留约 6 个月缓冲。
