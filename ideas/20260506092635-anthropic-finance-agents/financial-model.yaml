- id: A4
  name: Initial annual production ACV
  value: '252.0'
  unit: USD K annual
  source: '[BP operatingAssumptions][BP investorMemo.firstCustomer] Base production contract is set near the lower-middle of the stated $200K-$350K annual range.'
