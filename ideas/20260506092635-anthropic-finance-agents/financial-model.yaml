scenarios:
  downside:
    description: Paid pilots slip by roughly one quarter, only 8 banks are live by Y3 end, and expansions stay closer to the low end of annual contract value.
    y3RevenueK: 1989.5
    y3EbitdaK: -1251.0
    cashLowPointK: -705.2
    keyAssumptionChanges:
    - New-logo timing shifts later and total customers reach only 8 by Q4Y3 instead of 10.
    - Base production ACV drops from $252K to about $240K and mature ACV drops from $330K to about $294K.
    - Gross margin exits Y3 at roughly 66% instead of 68% because implementation remains bespoke.
  base:
    description: Three paid pilots in Y1 convert into 8 paying banks by Y2 end, then adjacent module expansion lifts bank-level revenue across a 10-bank base in Y3.
    y3RevenueK: 2821.5
    y3EbitdaK: -645.8
    cashLowPointK: 214.2
    keyAssumptionChanges:
    - New-logo plan closes 3 banks in Y1, 5 in Y2, and 2 in Y3.
    - Paid pilots monetize at about $90K, then convert to $252K annual production contracts with mature accounts reaching about $330K ACV after year one.
    - Gross margin improves from 55% in Y1 to 68% in Y3 as onboarding and governance work standardize.
  upside:
    description: Reference customers and partner pull-through accelerate closings to 12 banks by Y3 end, and more accounts expand toward the research-backed $350K bank-level value.
    y3RevenueK: 3291.2
    y3EbitdaK: -260.3
    cashLowPointK: 854.1
    keyAssumptionChanges:
    - New-logo timing pulls forward to 12 banks by Q4Y3 instead of 10.
    - Mature ACV rises from about $330K to about $350K as adjacent modules attach faster.
    - Gross margin exits Y3 at roughly 70% as implementations become more repeatable.
sensitivity:
- variable: ARPU
  downsideCase: Banks stay near the base annual contract and expansion ACV settles closer to about $294K.
  baseCase: Production ACV is about $252K and mature ACV is about $330K.
  upsideCase: Mature ACV approaches the $350K SOM benchmark on faster module adoption.
  y3RevenueImpactK: -228.0
  cashImpactK: -205.5
- variable: CAC
  downsideCase: Keeping the pipeline full requires about $6K more S&M spend per month than planned.
  baseCase: Founder-led sales plus one AE keeps blended CAC near the modeled level.
  upsideCase: Reference customers and implementation partners reduce travel and pipeline-generation spend.
  y3RevenueImpactK: 0.0
  cashImpactK: -215.8
- variable: churn
  downsideCase: One meaningful bank churns in Y3 before adjacent modules are embedded.
  baseCase: No realized churn is modeled in the first 36 months, but LTV uses a 1.2% monthly heuristic.
  upsideCase: Early customers renew and expand with no churn through the seed narrative.
  y3RevenueImpactK: -330.0
  cashImpactK: -224.2
- variable: sales cycle
  downsideCase: Pilot starts slip by one quarter as governance and procurement reviews run long.
  baseCase: Target banks move from discovery to paid pilot on the planned cadence.
  upsideCase: Reference accounts and partner intros pull multiple deals forward by a quarter.
  y3RevenueImpactK: -246.5
  cashImpactK: -484.4
- variable: gross margin
  downsideCase: Gross margin exits Y3 at about 65% because implementation and support stay too manual.
  baseCase: Gross margin ramps toward but does not quite reach the 70% target by Y3.
  upsideCase: Standardized onboarding and controls push Y3 gross margin to about 70%.
  y3RevenueImpactK: 0.0
  cashImpactK: -140.5
- variable: hiring pace
  downsideCase: Planned hires start about 2 months earlier than revenue maturity requires.
  baseCase: The team adds headcount only after pilots and first production conversions prove out.
  upsideCase: The company delays the second AE or third engineer until expansion revenue is visible.
  y3RevenueImpactK: 0.0
  cashImpactK: -265.6
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> ExpandedModules
      ExpandedModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Opex
      Opex --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from 10 paying banks by Y3, with three Y1 pilots converting and mature accounts expanding from roughly $252K to about $330K ACV.
- checkName: Must go right
  finding: Upload-first pilots have to convert into annual contracts without waiting for deep lending-stack integrations, or the bank sales cycle overwhelms the hiring plan.
- checkName: Model breaks if
  finding: A one-quarter sales-cycle slip plus weaker expansion drops Y3 revenue to about $2.0M and pushes cash roughly $705K below zero in the downside case.
- checkName: Next-round proof
  finding: The seed story is strongest once the company reaches 8 paying banks, shows one adjacent-module upsell, and proves a repeatable connector-led deployment motion.
sanityChecks:
  ruleOf40: Y3 growth 85.1% + EBITDA margin -22.9% = 62.2%
  burnMultiple: Y2 burn multiple 0.59x, rising to 0.95x in Y3 as ARR growth decelerates after the initial beachhead fills and the team invests ahead of breakeven.
  revenuePerFte: $305K Y3 on average 9.25 FTE and $282K on ending 10 FTE (benchmark $200-400K SaaS)
  flags:
  - The base case assumes every paid pilot eventually converts; if conversion tracks only the lower end of the business-plan funnel, the company needs more capital.
  - Y3 gross margin is still below the 70% target, so implementation and governance work must standardize further before the next round.
  - Customer concentration remains high at only 10 banks by Y3, so one delayed expansion or churn event has an outsized impact on cash.
  - Base-case cash falls to about $214K by Y3 end, leaving limited room for a delayed seed process or slower bank procurement.
  - Unit economics use a 1.2% monthly churn heuristic even though the modeled P&L shows no realized churn in the first 36 months.
