competitors:
- name: Moody's Lending Suite
  stage: incumbent
  wedge: 覆盖 spreading、发起、监控、信贷数据与治理的 AI 辅助商业放贷套件
  pricing: 按企业报价的软件产品
  strength: 在核心放贷工作流上覆盖广，并掌握专有风险数据
  weaknessVsUs: 更偏向广谱套件，给专注年度审查、保持跨系统中立的证据层留下空间。
  sourceRefs:
  - 9
  - 10
  - 11
  - 12
  - 13
- name: Finastra Lending
  stage: incumbent
  wedge: 面向商业与公司金融的端到端放贷平台，主打减少复杂度和手工流程
  pricing: 按企业报价的软件产品
  strength: 装机基础强、对整体放贷流程覆盖广
  weaknessVsUs: 更像平台替换而不是工作流覆盖层，对带引证的年度审查备忘录生成没有那么强的优化。
  sourceRefs:
  - 23
  - 24
- name: Jack Henry Commercial Lending
  stage: incumbent
  wedge: 面向社区与区域性机构的商业贷款发起与数字放贷产品
  pricing: 按企业报价的软件产品
  strength: 银行渠道强，且紧邻核心系统
  weaknessVsUs: 公开定位更偏向发起流程和借款人体验，而不是持续信贷审查中的复核级证据拼装。
  sourceRefs:
  - 25
  - 26
- name: Temenos Loan Origination
  stage: incumbent
  wedge: 面向社区银行与贷款发起场景的工作流软件
  pricing: 按企业报价的软件产品
  strength: 银行业内可信品牌，并拥有相邻的风险与核心产品
  weaknessVsUs: 对美国中型市场年度审查备忘录工作流和跨系统证据抓取的针对性较弱。
  sourceRefs:
  - 29
- name: Claude for Financial Services
  stage: platform
  wedge: 具备信贷备忘录、比率和契约工作流的前沿金融代理层
  pricing: Enterprise plan / quote-based
  strength: 模型能力强，平台迭代速度快
  weaknessVsUs: 并不会天然提供银行专属政策图谱、监管检查工作流或系统中立的证据绑定。
  sourceRefs:
  - 5
  - 6
  - 7
  - 8
