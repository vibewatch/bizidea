    - 22
  - factor: 经济
    impact: positive
    point: 商业银行团队在更快、更干净的信贷工作流上直接承受收入和 ROE 压力，因此这类运营效率预算比纯后台工具更容易获批。
    sourceRefs:
    - 28
  - factor: 社会
    impact: positive
    point: 手工、跨团队的商业贷款工作流仍很常见，因此员工生产率和分析师体验依旧是真实痛点。
    sourceRefs:
    - 26
  - factor: 技术
    impact: positive
    point: 前沿厂商如今已经直接展示信贷备忘录和契约核查工作流，核心 job-to-be-done 的技术不确定性明显下降。
    sourceRefs:
    - 4
    - 5
  - factor: 法律
    impact: negative
    point: 模型风险、可审计性和企业访问控制要求会抬高部署成本，并拉长采购流程。
    sourceRefs:
    - 8
    - 18
    - 22
  - factor: 环境
    impact: neutral
    point: 环境因素不是海滩市场中的主要购买驱动，但更广义的银行 ESG 与物理风险数据，未来可能影响相邻信贷工作流。
    sourceRefs:
    - 13
    - 36
  adoptionFrictionMatrix:
  - friction: 模型风险与可审计性顾虑
    severity: high
    affectedBuyer: Chief Credit Officer / model risk / compliance
    mitigation: 从第一天起就交付确定性引证、政策校验和人工审批闸口。
    sourceRefs:
    - 18
    - 19
    - 22
  - friction: 与放贷、文档和 spreading 系统的集成
    severity: high
    affectedBuyer: CIO / credit operations
    mitigation: 先从只读证据拼装和分阶段连接器开始，再考虑完整回写。
    sourceRefs:
    - 23
    - 25
    - 29
  - friction: 借款人材料输入混乱、数据质量不一致
    severity: high
    affectedBuyer: Credit analysts and portfolio managers
    mitigation: 提供文档清单、缺失证据标记，以及按借款人维度追踪例外。
    sourceRefs:
    - 5
    - 10
    - 20
  - friction: 供应商风险与安全评审
    severity: medium
    affectedBuyer: CISO / vendor-risk / procurement
    mitigation: 以前置方式呈现企业级控制能力，例如审计日志、访问控制、SSO 和清晰的数据治理材料。
    sourceRefs:
    - 7
    - 8
    - 16
    - 22
