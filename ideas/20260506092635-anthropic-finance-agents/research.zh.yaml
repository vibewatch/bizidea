openQuestions:
- 目标资产规模 $20B–$80B 的银行，每年真实的年度审查量和复核工时负担到底是多少？
- 在必须人工复核的前提下，引证准确率要达到什么门槛，ROI 才不会被整份重做吃掉？
- 产品能否先以只读覆盖层证明价值，再进入深度 LOS / DMS 集成？
- 这条工作流的预算究竟由谁掌握：CCO、信贷运营、CIO，还是企业 AI 治理团队？
- 现有厂商要多久才会在既有放贷套件中补上带引证的年度审查起草能力？
