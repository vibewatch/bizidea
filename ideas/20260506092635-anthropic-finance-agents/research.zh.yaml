      sourceRefs:
      - 5
      - 9
      - 23
      - 25
      - 26
    competitiveRivalry:
      score: 4
      rationale: 没有任何一家现有厂商完全占住“证据层”这个精确切口，但已有多家供应商在 touching spreading、监控、商业放贷或金融代理，竞争会很快升温。
      sourceRefs:
      - 4
      - 9
      - 23
      - 25
      - 29
  pestle:
  - factor: 政治
    impact: neutral
    point: 美国银行监管机构并未禁止在信贷运营中使用 AI，但它们正在提高对第三方监督和治理的要求。
