differentiator: >-
  这不是一个泛用银行副驾，也并非横向的 LLM
  护栏层。产品围绕一条流程深度打磨：商业信贷年度审查，并内置政策图谱、比率逻辑、证据绑定和复核交接。正由于集中，它才能先交付监管检查级可追溯性和可量化的周期缩短，再向相邻信贷运营扩张。
