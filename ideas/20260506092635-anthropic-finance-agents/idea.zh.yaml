problem: 区域性银行仍通过大量分析师手工撰写备忘录、核查契约并追踪文件来完成年度商业信贷审查。这项工作重复性强但风险高，因此团队无法使用会幻觉比率、丢失来源溯源或忽视银行政策的通用副驾。随着前沿厂商推出面向金融的专用代理，阻碍因素已从模型原始能力转向真实信贷工作流中的可审计性。
targetUser:
  primary: 美国区域性银行的商业信贷分析师和组合经理
  secondary: 负责年度审查与契约监控的信贷管理团队
  buyer: 首席信贷官或商业信贷风险负责人
startupThesis:
  nonObviousInsight: 金融代理不会率先在光鲜的交易场景中胜出；它们会先在年度信贷审查与契约监控中胜出，因为这里劳动力投入巨大、流程标准化，而且每一份输出都必须达到监管检查可用标准。
  beachhead: 面向拥有 20-200 名信贷分析师的美国区域性银行中端市场商业贷款组合的年度审查备忘录准备
  wedge: 一个证据层代理，可汇集借款人财务数据、展开比率、检查政策例外，并起草供人工批准的带引证年度审查备忘录
  whyNowCatalyst: Anthropic 推出面向金融的专用代理，并与 Microsoft 和 Moody's 建立合作，使“只要输出可追踪且具备政策感知，银行就能自动化信贷繁琐工作”这一点首次变得可信。
  ventureScalePath: 先从年度审查切入，再扩展到契约监控、续作、问题贷款处置、组合监测，最终成为银行和保险公司以代理驱动商业信贷运营的记录系统。
solution: 构建一个覆盖银行文档系统、财务 spread 工具和政策手册之上的信贷审查证据层。产品摄取借款人报表、历史备忘录、契约资料包和客户关系记录；提取年度审查所需事实；并生成一份带逐行来源引证的审查备忘录草稿。在分析师提交至委员会前，它会标记缺失文件、政策违规和计算不一致。每一步都被记录，以便复核人员、模型风险团队和监管检查人员看到代理使用了什么、推断了什么，以及哪些内容由人工覆盖。
goToMarketSeed:
  firstCustomer: 一家资产规模 $20B-$80B、拥有中端市场商业贷款团队、每季度完成数百份年度审查的美国区域性银行
  buyingTrigger: 年度审查旺季积压增加、监管检查指出文档质量问题，或管理层要求在不增加编制的情况下提升信贷分析师生产率
  currentAlternative: 在 spread 软件、共享盘、Word 模板以及处于试点阶段的通用内部副驾之间手工流转
  switchingReason: 该产品以审计就绪、绑定银行政策和来源引证的草稿替代数小时的备忘录拼装，而这通常是通用 LLM 工具和内部自建系统所缺乏的。
  pricingHypothesis: 按处于审查中的活跃商业借款人数收取年度平台费，并为契约监控和监管审计日志提供高级模块
