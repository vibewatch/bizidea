problem: >-
  区域性银行至今仍靠大量分析师手工撰写备忘录、核对契约并追索文件来完成年度商业信贷审查。这项工作高度重复，却风险极高，因此团队没法放心使用会胡编比率、丢失来源链路或忽略银行政策的泛用副驾。随着前沿厂商开始推出金融专用代理，真正的卡点不再是模型本身够不够强，而是它能否在真实信贷流程里做到可审计。
targetUser:
  primary: 美国区域性银行的商业信贷分析师和组合经理
  secondary: 负责年度审查和契约监控的信贷管理团队
  buyer: 首席信贷官或商业信贷风险负责人
startupThesis:
  nonObviousInsight: 金融代理不会先在光鲜的交易情境里赢下来；它们会先在年度信贷审查和契约监控中站稳脚跟，由于这里劳动量大、流程标准化，同时每一份输出都必须经得起监管审查。
  beachhead: 面向拥有 20–200 名信贷分析师的美国区域性银行，为其中型市场商业贷款组合准备年度审查备忘录
  wedge: 一个证据层代理：汇总借款人财务资料、展开比率、核查政策例外，并生成带引证的年度审查备忘录草稿，供人工审批
  whyNowCatalyst: Anthropic 推出金融专用代理，并与 Microsoft 和 Moody's 建立合作，让“只要输出可追溯且理解政策，银行就能自动化繁琐信贷工作”这件事第一次显得真正可信。
  ventureScalePath: 先从年度审查切入，再扩展到契约监控、续作、问题贷款处置、组合监测，最终成为银行和保险公司代理驱动型商业信贷运营的记录系统。
solution: >-
  构建一层覆盖在银行文档系统、财务 spreading
  工具和政策手册之上的信贷审查证据层。产品会读取借款人报表、历史备忘录、契约材料和客户经理笔记，抽取年度审查所需事实，并生成一份逐行回链到源文件的备忘录草稿。分析师提交委员会前，系统会先标记缺失文件、政策违规和计算不一致之处。每一步都有日志，方便复核人员、模型风险团队和监管检查人员看到代理用了什么、推断了什么，以及哪些地方由人工覆盖。
goToMarketSeed:
  firstCustomer: 一家资产规模 $20B–$80B 的美国区域性银行，其中型市场商业贷款团队每季度要完成数百份年度审查
  buyingTrigger: 年度审查季积压加重、监管发现文档质量问题，或管理层要求在不增加编制的情况下拉升信贷分析师生产率
  currentAlternative: 依赖 spreading 软件、共享盘、Word 模板和仍处于试点期的泛用内部副驾的手工流程
  switchingReason: 产品能把数小时的备忘录拼装工作替换成一份与银行政策和源证据绑定、可审计的草稿；而泛用 LLM 工具和内部自研方案通常做不到这一点。
  pricingHypothesis: 按处于审查中的活跃商业借款人数量收取年度平台费，并对契约监控和监管审计日志模块单独加价
