differentiator: 这不是通用银行副驾，也不是横向 LLM 护栏层。产品围绕一个工作流形成明确取向：年度商业信贷审查，并内置政策图谱、比率逻辑、证据绑定和复核交接。这一聚焦使其在向相邻信贷运营扩张之前，就能交付检查级可追溯性和可量化的周期缩短。
