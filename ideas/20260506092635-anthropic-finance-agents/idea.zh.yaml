jobsToBeDone:
- job: 当年度审查季带来积压时，帮助商业信贷分析师生成一份准确的首稿审查备忘录并附上支持证据，以便他们在不削弱审计质量的前提下清空队列。
  currentAlternative: 分析师手动收集文件、复制历史备忘录、重新计算比率，并在 Word 中撰写叙述
  successMetric: 减少每份年度审查的分析师工时，并降低复核人员或监管检查人员提出的文档例外
