jobsToBeDone:
  - job: 当年度审查季造成积压时，帮商业信贷分析师快速拼出一份准确的一稿审查备忘录，并附上撑起证据，这样他们既能清掉队列，也不会牺牲审计质量。
    currentAlternative: 分析师手工收集文件、复制旧备忘录、重算比率，并在 Word 里撰写叙述
    successMetric: 压低每份年度审查所需分析师工时，并减少复核人员或监管方提出的文档例外
