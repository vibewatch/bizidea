topRisks:
- name: 模型风险否决
  description: 如果系统看起来只是一个缺乏治理的 LLM 外壳，银行的模型风险与合规团队可能阻止部署。
  mitigation: 从第一天起就提供确定性引证、政策规则校验、人工审批闸口以及模型风险文档。
- name: 集成拖累
  description: 如果产品在体现价值前需要过多脆弱集成，面向银行的销售可能停滞。
  mitigation: 先从文档上传和邮件输入的审查资料包切入，在证明 ROI 后再增加更深的 LOS 与 DMS 连接器。
- name: 现有厂商功能追赶
  description: 贷款发起、spread 或文档厂商可能增加基础的 AI 备忘录起草功能。
  mitigation: 占据跨系统证据层与审计工作流，而这正是现有厂商较弱、且银行需要中立性的地方。
