topRisks:
  - name: 模型风险被否决
    description: 如果系统看起来只是一个缺乏治理的 LLM 外壳，银行的模型风险和合规团队可能会阻止部署。
    mitigation: 从第一天起就交付确定性引证、政策规则校验、人工审批闸口，以及完整的模型风险文档。
  - name: 集成拖慢落地
    description: 如果产品在证实价值前就需要太多脆弱集成，银行销售很容易停滞。
    mitigation: 先从文档上传和邮件汇总的审查材料切入，证实 ROI 后再增加更深的 LOS 和 DMS 连接器。
  - name: 现有厂商功能追赶
    description: 贷款发起、spreading 或文档供应商可能会补上基础的 AI 备忘录起草能力。
    mitigation: 把跨系统证据层和审计流程牢牢握在手里——这里正是现有厂商较弱、而银行又需要中立性的地方。
