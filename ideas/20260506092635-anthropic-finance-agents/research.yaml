  dataMoats:
  - point: The strongest moat is not raw model IP but a proprietary corpus of cited annual reviews, overrides, policy exceptions, and reviewer edits tied to real borrower-document structures.
    sourceRefs:
    - 5
    - 20
    - 21
  - point: A second moat comes from cross-system mapping of covenant terms, risk-rating decisions, and missing-document patterns across borrowers and portfolios.
    sourceRefs:
    - 5
    - 11
    - 21
  geographicConsiderations:
  - point: The U.S. is the right beachhead because the product thesis depends on FDIC-bank counts, OCC-style supervision, and U.S. vendor-risk expectations. Geographic expansion should wait until the controls and audit model are proven in U.S. regional-bank procurement.
    sourceRefs:
    - 2
    - 3
    - 20
    - 22
  - point: 'The target-bank universe is lumpy enough to support concentrated founder selling: FDIC queries show multiple $20B-$80B banks in California, Florida, Pennsylvania, and Texas, which suggests a practical corridor-based GTM rather than a diffuse national campaign on day one.'
    sourceRefs:
    - 37
