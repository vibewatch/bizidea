    - 27
    - 29
  - point: Data and cloud partnerships matter because banks will ask how the product connects to risk data, enterprise controls, and existing AI policies before scaling.
    sourceRefs:
    - 4
    - 14
    - 16
    - 36
  partnershipEcosystem:
  - point: Risk-data and risk-rating partners such as Moody's and RMA-like scoring ecosystems can enrich borrower context and exception analysis.
    sourceRefs:
    - 10
    - 24
    - 36
  - point: Core, LOS, and commercial-banking vendors like Jack Henry, Q2, and Temenos are natural integration or channel partners because they already sit inside bank workflows.
    sourceRefs:
    - 25
