openQuestions:
- What is the true annual-review volume and reviewer-hour burden per target bank in the $20B-$80B asset band?
- What citation-accuracy threshold will credit-risk and model-risk teams accept before mandatory human rework eliminates ROI?
- Can the product prove value in a read-only overlay before deep LOS / DMS integration?
- 'Who actually owns budget for this workflow: CCO, credit ops, CIO, or enterprise AI governance?'
- How quickly will incumbents ship cited annual-review drafting inside existing lending suites?
