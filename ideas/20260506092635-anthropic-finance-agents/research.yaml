  validationPlan:
  - priority: high
    question: How many annual commercial reviews does a $20B-$80B bank actually complete per quarter, and how many analyst hours sit in memo assembly versus judgment?
    evidenceToGather: Time-and-motion studies and review-volume exports from 5-10 regional banks.
  - priority: high
    question: What citation error rate or omission rate is acceptable before every draft requires full line-by-line rework?
    evidenceToGather: Blind QA on 200-500 historical reviews with credit-administration scoring.
  - priority: medium
    question: Can the product land before deep LOS/DMS write-back, or is read-only evidence assembly insufficient for adoption?
    evidenceToGather: Pilot designs comparing upload-first deployments versus integrated deployments on cycle time and reviewer acceptance.
  - priority: medium
    question: Is the budget owner credit-risk leadership, commercial-banking operations, or enterprise AI / CIO?
    evidenceToGather: Discovery interviews across CCOs, heads of commercial credit risk, and bank CIO/vendor-risk leaders.
  - priority: low
    question: Which adjacent workflows expand naturally after annual review—covenant monitoring, renewals, criticized assets, or portfolio surveillance?
    evidenceToGather: Workflow maps and backlog data from early design partners.
