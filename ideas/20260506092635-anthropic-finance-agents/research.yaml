    - 40
  sensitivityCases:
  - case: Narrower reachable beachhead
    impact: If the real ICP is only the 65 banks in the $20B-$80B band rather than the broader 152-bank >$10B set, near-term SAM is materially smaller and sales efficiency matters more.
    sourceRefs:
    - 2
    - 3
  - case: Lower realized ACV
    impact: If buyers push pricing toward roughly $200k per bank rather than the base-case ~$300k-$350k bank-level value, the modeled SAM and Year-3 SOM fall by about one-third.
    sourceRefs:
    - 8
    - 23
    - 25
  - case: Incumbent bundling accelerates
    impact: If lending suites or platform vendors add credible cited memo-drafting inside existing contracts, the startup must win on implementation speed and cross-system neutrality rather than features alone.
    sourceRefs:
    - 5
    - 9
    - 23
