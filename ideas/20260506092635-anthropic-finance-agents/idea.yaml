problem: "Regional banks still run annual commercial credit reviews through analyst-heavy memo writing, covenant checking, and document chasing. The work is repetitive but high stakes, so teams cannot use generic copilots that hallucinate ratios, lose source provenance, or ignore bank policy. As finance-specific agents arrive from frontier vendors, the blocker shifts from raw model capability to auditability inside real credit workflows."
targetUser:
  primary: "Commercial credit analysts and portfolio managers at U.S. regional banks"
  secondary: "Credit administration teams running annual reviews and covenant monitoring"
  buyer: "Chief Credit Officer or Head of Commercial Credit Risk"
startupThesis:
  nonObviousInsight: "Finance agents will not win first in glamorous trading workflows; they will win in annual credit review and covenant-monitoring work where the labor is huge, the process is standardized, and every output must be examiner-ready."
  beachhead: "Annual review memo preparation for middle-market commercial loan portfolios at U.S. regional banks with 20-200 credit analysts"
  wedge: "An evidence-layer agent that assembles borrower financials, spreads ratios, checks policy exceptions, and drafts a cited annual review memo for human approval"
  whyNowCatalyst: "Anthropic's launch of finance-specific agents, plus Microsoft and Moody's partnerships, makes it newly credible that banks can automate credit grunt work if the outputs are traceable and policy-aware."
  ventureScalePath: "Start with annual reviews, expand into covenant monitoring, renewals, problem-loan workouts, portfolio surveillance, and eventually a system of record for agent-driven commercial credit operations across banks and insurers."
solution: "Build a credit-review evidence layer that sits on top of the bank's document systems, financial spreading tools, and policy manuals. The product ingests borrower statements, prior memos, covenant packages, and relationship notes; extracts the facts needed for annual review; and produces a draft memo with line-by-line citations back to source documents. It flags missing documents, policy breaches, and calculation inconsistencies before the analyst submits to committee. Every step is logged so reviewers, model-risk teams, and examiners can see what the agent used, what it inferred, and what a human overrode."
goToMarketSeed:
  firstCustomer: "A $20B-$80B asset U.S. regional bank with a middle-market commercial lending team that completes hundreds of annual reviews per quarter"
  buyingTrigger: "Backlog growth during annual review season, an examiner finding on documentation quality, or a mandate to improve credit analyst productivity without adding headcount"
  currentAlternative: "Manual workflow across spreading software, shared drives, Word templates, and generic internal copilots under pilot"
  switchingReason: "The product replaces hours of memo assembly with an audit-ready draft tied to bank policy and source citations, which generic LLM tools and internal builds typically lack."
  pricingHypothesis: "Annual platform fee priced by number of active commercial borrowers under review, with premium modules for covenant monitoring and examiner audit logs"
