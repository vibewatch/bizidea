topRisks:
  - name: "Model-risk rejection"
    description: "Bank model-risk and compliance teams may block deployment if the system looks like an ungoverned LLM wrapper."
    mitigation: "Ship with deterministic citations, policy-rule checks, human approval gates, and model-risk documentation from day one."
  - name: "Integration drag"
    description: "Selling into banks can stall if the product needs too many brittle integrations before showing value."
    mitigation: "Start with document uploads and email-fed review packets, then add deeper LOS and DMS connectors after proving ROI."
  - name: "Incumbent feature catch-up"
    description: "Loan origination, spreading, or document vendors could add basic AI memo drafting features."
    mitigation: "Own the cross-system evidence layer and audit workflow, where incumbents are weaker and banks need neutrality across existing tools."
