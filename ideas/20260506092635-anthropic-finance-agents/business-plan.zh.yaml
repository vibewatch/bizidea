slug: credit-review-evidence-layer
date: '2026-05-06'
executiveSummary: 信贷审查证据层是一款面向美国区域性银行的审计就绪工作流产品，在不要求银行替换其贷款技术栈的前提下，自动化年度商业信贷审查备忘录准备。首个客户是一家资产规模在 $20B-$80B、拥有 20-200 名信贷分析师、长期存在年度审查积压，并且要么曾被监管指出文档质量问题、要么被要求在不增加编制的情况下提升分析师吞吐量的银行。MVP 摄取借款人资料包、历史备忘录、契约包和政策手册，然后生成一份带引证的年度审查备忘录草稿，并附带缺失文件标记、政策例外提示和人工审批闸口。研究支持的是一个聚焦切口，而不是宽泛的“银行 AI”故事：初始细分市场模型为约 $258.3M TAM、$39.0M SAM 和第 3 年 $3.5M SOM，因此公司必须迅速赢下一个狭窄切口，然后再向更深的商业信贷运营扩张。时机点也很具体：Anthropic 和云厂商已让面向金融的专用代理变得可信，而 OCC 式监管和第三方风险指引则推动银行选择证据绑定型系统，而不是通用副驾。GTM 体系围绕一个明确买方事实展开：在积压痛点、审查质量问题或 AI 现代化指令出现后，由创始人直接向首席信贷官或商业信贷风险负责人销售；先在一个组合上做付费试点；再转化为按年度审查量或处于审查中的活跃借款人数计价的年度平台合同。核心竞争主张不是模型更强，而是宽泛贷款套件、内部副驾和前沿模型平台无法开箱即用提供的跨系统中立性、政策感知引证和监管检查级可审计性。最大的反证风险在于：银行是否会在深度集成前接受“上传优先”的部署方式、引证质量是否足以避免全面返工，以及该切口能否扩展超越一个适度规模的区域性银行起点；这些仍是必须在前 12 个月内验证的运营假设。
problem:
- 年度商业信贷审查仍要求分析师在共享盘、spread 工具和 Word 模板之间收集借款人文件、展开比率、核查契约并起草备忘录，从而造成反复积压和审查质量不一致。
- 当输出缺乏确定性引证、政策校验、覆盖日志和受控人工审批时，通用副驾、人工团队和内部 AI 试点都无法满足银行模型风险与监管检查的要求。
solution:
- 为年度审查提供一层证据层覆盖：从借款人报表、历史审查和契约资料包中提取事实，按银行政策进行校验，并生成一份带逐行来源引证的首稿备忘录。
- 加入缺失文件检测、政策例外检查、比率逻辑和不可篡改的人工覆盖日志，使产品能够先以“上传优先”工作流落地，再通过 DMS、LOS 和 spread 系统集成逐步加深。
whyWeWin:
- 这个切口聚焦于一个高频、高治理要求的工作流，银行能比购买宽泛 AI 平台更快衡量节省工时、降低缺陷和提升监管检查准备度。
- 中立的证据层可以跨现有贷款系统部署，而不是替换它们；与套件厂商相比，这降低了切换摩擦，也使产品即便在异构银行环境中依然有用。
- 客户专属的政策图谱、带引证的审查语料、覆盖历史和例外模式，可以累积成比原始模型接入更难复制的工作流护城河。
strategicChoices:
  beachhead: 面向资产约 $20B-$80B、拥有 20-200 名信贷分析师的美国区域性银行中端市场商业贷款组合的年度审查备忘录准备。
  wedgeRationale: 这一切片具备高频审查量、可衡量的人力负担、清晰的经济买方，以及文档质量不佳所带来的监管后果。如果在公司证明引证质量和 ROI 之前，就扩展到所有贷款工作流、社区银行或保险风控运营，只会拉长集成和销售周期。
  sequencingRationale: 先从上传优先的证据组装和人工审批的备忘录草稿做起，因为部署摩擦是眼前最大的销售风险。在证明复核接受度和试点转化后，再增加更深连接器、契约监控和续作工作流；只有当产品能持续把试点转化为生产部署后，才增加解决方案和合规能力。
  notYet:
  - 完整替换贷款发起系统
  - 自主信贷决策或风险评级审批
  - 资产规模约低于 $10B 的社区银行细分市场
  - 保险承保与理赔工作流
  - 宽泛的银行横向副驾定位
market:
  tam: 模型测算的 TAM 为 $258.3M，依据是资产高于 $1B 的 1,033 家活跃美国银行，以及每名商业信贷审查用户约 $10k 的年度工作流价值。
  sam: 模型测算的 SAM 为 $39.0M，对应资产处于 $20B-$80B 区间的约 65 家美国银行，并假设每家银行约有 60 名年度审查用户。
  som: 模型测算的第 3 年 SOM 为 $3.5M，假设赢得 10 家区域性银行客户，每家银行约 $350k 的银行级 ACV，适用于高风险工作流产品。
  segments:
  - 拥有中端市场商业贷款团队的美国区域性和超区域性银行
  - 在年度审查验证后，大型银行内部相邻的商业信贷运营场景，包括契约监控和续作
  buyingProcess: 初始交易很可能由首席信贷官、商业信贷风险负责人，或推动信贷运营现代化的 COO/CIO 主导，信贷管理、模型风险、供应商风险和 IT 则是必要干系人。现实路径是在一个组合或一个审查队列上做付费试点；只有当产品能在不引发治理例外的前提下减少分析师时间和文档缺陷时，才进入年度部署。
product:
  mvp: MVP 是一个上传优先的年度审查工作区，可摄取借款人资料包、历史备忘录、契约资料包和政策手册，然后产出带引证的备忘录草稿，并附带比率校验、缺失文件提醒和复核审批闸口。它必须在深度回写集成前就能工作，让银行无需启动完整平台项目即可验证价值。
  sixMonth: 交付可投入生产的文档摄取、引证追踪、比率逻辑、政策例外校验、复核覆盖日志，以及 2 到 3 个在真实年度审查队列上的设计伙伴试点。
  twelveMonth: 增加首批 spread 与文档管理系统连接器、组合看板、可配置政策模板，以及能缩短生产审批周期的模型风险 / 供应商风险文档包。
  twentyFourMonth: 在保持跨现有银行系统的中立证据层定位的前提下，从年度审查扩展到契约监控、续作、问题资产工作流和组合监测。
  keyBets:
  - 银行会比替换核心贷款系统更早购买一个受治理的证据层。
  - 如果引证质量和计算一致性足够高，以至人工复核主要是监督而非重建，那么就能赢得复核人员信任。
  - 在深度 LOS 或 DMS 集成完成之前，上传优先部署也能先证明 ROI。
  - 同一套政策与证据图谱可从年度审查扩展到由同一买方拥有的相邻商业信贷工作流。
gtm:
  wedge: 在积压激增、文档问题暴露或受治理 AI 指令凸显人工备忘录拼装成本之后，向区域性银行信贷管理层销售一套审计就绪的年度审查起草工作流。
  channels:
  - 由创始人直接销售给目标区域性银行的首席信贷官、商业信贷风险负责人和信贷运营负责人
  - 参与银行信贷运营现代化或贷款系统项目的顾问与实施合作伙伴
  - 在切口被证明后，与 spread、核心系统、LOS 和风险数据厂商建立集成与转介合作
  funnelTargets: 目标账户→合格发现 30%+，合格发现→付费试点 25%+，付费试点→年度生产 50%+，年度生产→可引用客户 50%+
  pricing: 按报价收取年度平台费，主要依据年度审查量或处于审查中的活跃商业借款人数计价，且付费试点费用可抵扣生产合同。这符合银行采购高风险工作流软件的方式：ROI 来自分析师工时节省和文档缺陷减少，而高级模块则可在契约监控、审计留存和更深集成上变现。
businessModel:
  revenueStreams:
  - 用于年度审查证据组装与审计工作流的年度 SaaS 订阅
  - 初始部署的实施与政策映射费用
  - 用于契约监控、组合看板、更长审计留存期和额外系统连接器的高级模块
  unitOfValue: 每家银行处理的年度商业审查数量，或处于审查中的活跃商业借款人数
  targetGrossMarginPct: 70
  expansionLevers:
  - 在每个银行账户内增加更多组合和审查用户
  - 从年度审查扩展到契约监控、续作和问题资产业务流
  - 审计留存、政策模板和深度系统集成等更高价值模块
strategyMap:
  northStarMetric: 以机器组装引证证据且无需人工重建证据即可获批的年度审查数量
  inputMetrics:
  - 试点转生产转化率
  - 每份年度审查节省的分析师中位工时
  - 首稿复核人员引证接受率
  - 无需因缺失文件而升级处理的审查占比
  - 首个真实组合上线的中位时间
  moatsToBuild:
  - 与借款人文档结构映射的、包含带引证年度审查、复核修改和覆盖日志的语料库
  - 连接比率、契约、例外和审查模板的客户专属政策图谱
  - 嵌入银行审查与监管检查工作流的跨系统证据连接器和审计轨迹
  killCriteria:
  - 首批 12 家目标银行中，不足 3 家存在近期年度审查积压或文档缺陷，且经济买方认为不值得预算。
  - 对 200 份历史审查进行盲测 QA 后，即便经过范围内调优，至少 90% 的引证和计算仍无法获得复核接受。
  - 首批 4 个付费试点中，不足 2 个能在试点完成后 6 个月内转化为高于 $200k ACV 的年度合同。
  - 如果用户在试点前仍要求深度回写集成，从而消除了“上传优先”部署优势，则应终止。
  mermaid: "flowchart LR\n  Wedge[区域性银行年度审查积压] --> MVP[上传优先的带引证审查工作区]\n  MVP --> Proof[付费试点，证明复核接受度和节省工时]\n  Proof --> Expansion[契约监控、续作和组合监测]\n"
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点明确、切口克制，但是否值得投资仍取决于能否证明银行部署速度、引证可信度，以及超越有限初始市场的扩张能力。
    whyBelieve: 公司瞄准一个反复出现且受监管的工作流，在这里，可审计性和跨系统编排比原始模型质量更重要；对创业公司而言，这是一个可信的切入位置，可在银行与宽泛平台之间形成楔子。
    whyDoubt: 区域性银行的初始市场有限且推进缓慢；除非创业公司证明自己在部署速度和复核级输出质量上明显更优，否则现有厂商或内部团队可能已经“足够好”。
    nextDiligence: 下一个关键证明点是 2 个来自区域性银行的付费试点成功转为年度生产合同，因为复核人员接受了带引证草稿，且买方愿意在不等待完整核心系统项目的情况下为扩展买单。
  firstCustomer:
    title: 一家资产规模 $20B-$80B 的美国区域性银行的首席信贷官
    profile: 一家拥有中端市场商业贷款团队、每季度要完成数百份年度审查，且工作流分散在文档系统、spread 工具和备忘录模板之间的区域性银行。
    trigger: 年度审查积压增长、监管或内部审计指出文档质量问题，或被要求在不增加编制的情况下提升分析师生产率。
    buyer: 首席信贷官或商业信贷风险负责人
    initialContract: 在单一组合上进行约 $75k-$125k 的付费试点；若分析师工时明显下降，且工作流通过模型风险和供应商风险审查，则转为约 $200k-$350k 的按报价年度合同。
  mustBeTrue:
  - 首批 15 家目标银行中，至少有 5 家能指出近期存在年度审查积压、文档例外或审查质量问题，且具有管理层可见性。
  - 只读或上传优先部署足以在深度 LOS 或 DMS 集成完成前运行真实试点。
  - 针对历史审查进行工作流专项调优后，信贷复核人员能接受至少 90% 的生成引证和计算。
  - 首席信贷官或信贷风险负责人可用运营或现代化预算，而非投机性 AI 预算，为付费试点和年度合同买单。
  - 在年度审查验证后，同一买方愿意为将产品扩展到契约监控、续作或组合监测继续付费。
  diligenceQuestions:
  - 目标银行每季度完成多少份年度审查？其中分析师多少工时花在证据收集上，多少用于判断？
  - 什么样的引证错误率或遗漏阈值会让复核人员退回到完全手工重建？
  - 这个工作流在实践中到底由谁拥有预算和供应商风险流程：CCO、信贷运营、CIO，还是企业 AI 治理团队？
  - 产品能否在深度回写集成前交付价值，还是客户从第一天起就要求更新记录系统？
  - Moody's、Jack Henry、Finastra 或与 Anthropic 相邻的内部团队，会多快推出足够好的带引证备忘录起草能力来中和这一切口？
  riskHeatmap:
  - risk: 模型风险和供应商风险团队将产品视为缺乏治理的 AI 外壳并予以否决
    likelihood: High
    impact: High
    leadingIndicator: 试点讨论在治理审查阶段即停滞，尚未进入真实历史审查测试；或买方要求 MVP 无法证明的控制项。
    mitigation: 从第一天起就提供确定性引证、人工审批、审计日志和模型风险文档，并优先瞄准已在试点受治理 AI 的银行。
  - risk: 引证质量过弱，无法让复核人员信任首稿
    likelihood: High
    impact: High
    leadingIndicator: 盲测 QA 反复出现引证遗漏、比率错误，或复核修改量接近整份备忘录重写。
    mitigation: 限制工作流范围，采用受政策约束的抽取与计算校验，并在历史审查集上调优期间保留人工审批。
  - risk: 集成拖累阻碍快速证明价值
    likelihood: Medium
    impact: High
    leadingIndicator: 潜在客户若没有 LOS 或 DMS 回写就不愿启动试点，导致实施周期超出一个预算周期。
    mitigation: 优先采用上传优先和只读部署，在一个真实组合上证明 ROI 后再增加首批连接器。
  - risk: 现有套件或内部团队吸收了足够多的切口功能
    likelihood: Medium
    impact: High
    leadingIndicator: 潜在客户表示，现有厂商或内部副驾如今已在当前合同内提供带引证的年度审查起草功能。
    mitigation: 竞争重点放在跨系统中立性、实施速度和监管检查就绪的审计工作流，而不是泛化起草功能。
  - risk: 切入口无法扩展为更大的商业信贷平台机会
    likelihood: Medium
    impact: High
    leadingIndicator: 早期客户购买了年度审查自动化，但到第 12 个月仍未对契约监控、续作或组合监测表现出预算兴趣。
    mitigation: 从一开始就按相邻工作流来设计政策与证据图谱，并在每次试点与续约中测试扩展需求。
operatingAssumptions:
- assumption: 首个经济买方会位于信贷风险管理层，而不是企业 IT，因为积压和审查质量痛点能在年度审查流程中被立刻量化。
  basis: research.yaml
  validationTest: 至少拿下 3 个付费试点，其商业赞助人是首席信贷官、商业信贷风险负责人或能在一个规划周期内控制预算的信贷运营负责人。
  decisionImpact: 如果不成立，公司必须转向面向 CIO 或企业 AI 赞助人，拉长预期销售周期，并更早增加治理包装。
- assumption: 在深度集成完成前，上传优先或只读部署也能证明足够价值。
  basis: idea.yaml
  validationTest: 使用文档上传和只读工作流跑 2 个真实试点，并在无回写集成情况下证明生产使用和可衡量的工时节省。
  decisionImpact: 如果不成立，实施成本与时间将显著上升，这需要更窄的 ICP 和更重服务化的部署模型。
- assumption: 在这个狭窄工作流中，通过政策校验和受限抽取，可以达到复核级引证准确性。
  basis: operator judgment
  validationTest: 对 200 份历史年度审查打分，并在记录覆盖率的前提下，使引证和计算获得至少 90% 的复核接受。
  decisionImpact: 如果不成立，产品应转向证据检索和例外发现，而不是完整草稿备忘录生成。
- assumption: 如果产品能在受监管流程中减少分析师劳动和文档缺陷，就可以拿到每家银行约 $200k-$350k 的年度 ACV。
  basis: research.yaml
  validationTest: 至少将 2 个付费试点转化为该区间或更高的年度合同，并让买方认可清晰的 ROI 叙事。
  decisionImpact: 如果不成立，这一切口对风险投资回报而言可能过小，公司需要更低成本的分发方式或不同的扩张路径。
- assumption: 年度审查是切入同一买方组织下契约监控、续作和组合监测的可信楔子。
  basis: idea.yaml
  validationTest: 在第 12 个月前，从试点客户中获得至少 3 场严肃的扩展对话，或 1 次相邻信贷工作流的付费模块加购。
  decisionImpact: 如果不成立，公司应优化为更窄的工作流业务，并降低资本强度，而不是追求更广的平台路线图。
experimentRoadmap:
- horizon: 0–90 days
  experiment: 访谈 15 位区域性银行信贷负责人，并收集历史年度审查资料包、政策手册和复核反馈材料。
  hypothesis: 积压痛点和文档质量风险足够尖锐，使买方愿意在单一组合上赞助付费试点。
  successMetric: 至少 5 家银行分享近期积压或文档事件，且至少 3 家同意基于历史审查来界定试点范围。
  owner: Founder / CEO
- horizon: 0–90 days
  experiment: 构建一个 MVP，可根据上传的借款人资料包起草带引证的年度审查备忘录，并标记缺失文件和政策例外。
  hypothesis: 受限的上传优先工作流，能在深度系统集成前产出对复核人员有用的首稿。
  successMetric: 两家设计伙伴完成历史审查测试，引证接受率至少 90%，且有明确的分析师节时效果。
  owner: Founding eng
- horizon: 90–180 days
  experiment: 在每家设计伙伴银行的一个组合真实年度审查队列上，运行 2 到 3 个付费试点。
  hypothesis: 产品能够足够程度地减少备忘录组装工时和文档缺陷，从而支撑年度生产合同。
  successMetric: 每份审查的分析师中位投入下降至少 40%，且至少 2 个试点进入年度合同谈判。
  owner: Founder / CEO
- horizon: 90–180 days
  experiment: 打包一套银行可直接使用的模型风险和供应商风险审查材料，包括审计日志、人工控制、安全架构和变更管理文档。
  hypothesis: 治理就绪是购买前提，而不是售后细节。
  successMetric: 至少 2 家试点银行在不要求根本性产品重构的情况下通过供应商风险和模型风险审查。
  owner: Product and compliance lead
- horizon: 180–270 days
  experiment: 交付首个对试点客户所用 spread 工具或文档管理系统的连接器。
  hypothesis: 一小组有针对性的连接器可以缩短生产扩展时间，而不会把公司变成服务项目。
  successMetric: 首个连接器显著减少分析师准备步骤，并将下一个客户的部署时间至少缩短 25%。
  owner: Solutions engineer
- horizon: 180–360 days
  experiment: 与现有试点客户测试一个用于契约监控证据组装的相邻付费模块。
  hypothesis: 如果产品在年度审查中证明可信度和工作流适配性，同一买方会扩大支出。
  successMetric: 有 1 家试点客户为相邻模块买单，或签署与契约监控或续作相关的扩展工作说明书。
  owner: Founder / CEO
operations:
- 带版本控制的政策模板库，每家银行部署均具备所有者、审批工作流和审查节奏
- 不可篡改的审计日志管道，记录源文件、计算、提示词、模型版本、复核动作和人工覆盖
- 标准化客户 onboarding 手册，用于历史审查导入、复核 QA、治理审查和试点成功衡量
- 覆盖访问控制、数据留存、变更管理和事件响应的安全与供应商风险材料包
- 面向 spread、文档管理、核心系统和风险数据厂商的合作流程，并明确 API 与转介优先级
team:
- role: Founder / CEO
  startTiming: Month 0
  rationale: 负责买方发现、试点销售、工作流映射和定价，因为客户真实需求与采购现实是公司最主要的风险。
- role: 创始工程师
  startTiming: Month 0
  rationale: 构建定义切口的证据摄取、引证、政策校验和审计日志系统。
- role: 应用 AI / 产品负责人
  startTiming: Month 3
  rationale: 把历史审查中的经验转化为受限、能赢得复核人员信任的工作流，而不是通用 LLM 外壳。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 缩短部署时间，负责早期集成，并将定制化试点工作沉淀为可复用的实施模式。
- role: 合规与客户成功负责人
  startTiming: Month 9
  rationale: 维护治理材料、培训复核人员、支持续约，并避免试点转生产 rollout 卡在创始人身上。
milestones:
- horizon: 0–12 months
  items:
  - 完成 15 次 ICP 访谈，并从目标区域性银行获得 3 个付费试点承诺
  - 交付上传优先的 MVP，用于带引证的年度审查起草，并具备政策校验、缺失文件标记和人工审批
  - 至少通过 2 家银行的治理审查，并将至少 2 个付费试点转化为年度生产合同
  - 发布 1 个可引用客户案例，证明显著节省分析师工时并获得复核接受
- horizon: 12–24 months
  items:
  - 增加首批 spread 与文档系统连接器，以及可配置政策模板和组合看板
  - 达到 8 到 12 家付费银行客户，并形成可复用的试点转生产实施动作
  - 为现有客户上线首个契约监控或续作相邻模块
- horizon: 24–36 months
  items:
  - 在不丢失证据层定位的前提下，扩展到更广泛的商业信贷运营，包括问题资产和组合监测
  - 构建可复用的银行政策与审查语料库，以提升跨客户 onboarding 速度和留存
  - 通过更多组合、工作流和审计模块，证明在早期银行内部实现多产品扩展
risks:
- risk: 模型风险和供应商风险团队在业务用户验证价值前就阻止部署
  likelihood: High
  impact: High
  mitigation: 以治理材料、确定性引证、人工审批和银行可用的审计控制为先，而不是通用 AI 试点说辞。
- risk: 引证准确率和比率一致性始终低于复核信任阈值
  likelihood: High
  impact: High
  mitigation: 保持工作流狭窄，对历史审查进行强力评分；如果完整草稿质量不足，则退回到证据组装加例外检测。
- risk: 集成要求让试点过慢或过于服务化
  likelihood: Medium
  impact: High
  mitigation: 强制采用上传优先 MVP，标准化首批连接器集，并在证明可复用 ROI 前避免定制回写工作。
- risk: 现有贷款套件或内部 AI 团队追上足够多的功能，从而降低紧迫性
  likelihood: Medium
  impact: High
  mitigation: 占据跨系统中立性、更快实施速度和监管检查就绪审计工作流，而不是只在通用备忘录起草上竞争。
- risk: 切入口仍过于狭窄，无法支撑风险投资级增长
  likelihood: Medium
  impact: High
  mitigation: 尽早测试相邻商业信贷扩展，并将扩展证明视为后续融资的门槛里程碑。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的资金将支持创始人主导面向区域性银行的 GTM 动作、一支小型产品与解决方案团队、2 到 4 个付费试点、治理与审计基础设施、首批系统连接器，以及足够的证据来证明“年度审查是否是通向更大商业信贷平台的前门”。
