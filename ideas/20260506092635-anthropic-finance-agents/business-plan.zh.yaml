slug: credit-review-evidence-layer
date: '2026-05-06'
executiveSummary: 'Credit Review Evidence Layer 是一款面向美国区域性银行的可审计工作流产品，能够自动化年度商业信贷审查备忘录的准备工作，而且不要求银行替换现有放贷技术栈。首个客户画像是一家资产规模 $20B–$80B、拥有 20–200 名信贷分析师的银行，长期面临年度审查积压，并且要么刚收到关于文档质量的监管意见，要么正被要求在不增加编制的情况下提升分析师吞吐。MVP 会读取借款人材料包、历史备忘录、契约材料和政策手册，然后生成一份带引证的年度审查备忘录草稿，同时标出缺失文件、政策例外，并设置人工审批闸口。研究结论支持一个聚焦切口，而不是泛泛而谈的“银行 AI”故事：按模型测算，初始细分市场约为 $258.3M TAM、$39.0M SAM 和第 3 年 $3.5M SOM，所以公司必须先快速拿下一个窄切口，再向更深的商业信贷运营扩展。现在窗口打开也很具体：Anthropic 和云厂商已经让金融专用代理变得可信，而 OCC 式监管和第三方风险指引又迫使银行选择证据绑定型系统，而不是通用副驾。GTM 路径也足够一致：在积压、审查质量问题或 AI 现代化指令出现后，由创始人直接卖给首席信贷官或商业信贷风险负责人；先从单个组合的付费试点开始；再转成按年度审查量或活跃审查借款人数量定价的报价型年度平台合同。公司最核心的竞争主张不是模型更强，而是跨系统中立性、理解政策的引证能力，以及开箱即用的监管检查级可审计性——这些都不是大型放贷套件、内部副驾或前沿模型平台天然具备的能力。最大的反证风险在于：银行是否会在深度集成之前接受上传优先部署、引证质量是否足够高到不用整份重做，以及这个切口能否扩展出一个不那么局促的区域性银行海滩市场；这些都还是必须在前 12 个月跑出来的经营假设。'
problem:
- 年度商业信贷审查仍要求分析师在共享盘、spreading 工具和 Word 模板之间来回收集借款人文件、展开比率、核查契约并撰写备忘录，反复形成积压，也拉低审查一致性。
- 通用副驾、人工团队和内部 AI 试点都无法满足银行模型风险团队和监管检查对确定性引证、政策校验、覆盖日志和受控人工审批的要求。
solution:
- 交付一层覆盖在年度审查之上的证据层：从借款人报表、历史审查和契约材料中抽取事实，按银行政策重新核对，再生成带逐行来源引证的一稿备忘录。
- 加上缺失文件检测、政策例外检查、比率逻辑和不可篡改的人为覆盖日志，让产品先以“上传优先”工作流落地，之后再通过 DMS、LOS 和 spreading 系统集成向更深处扩展。
whyWeWin:
- 切口聚焦在一个高频、高治理要求的工作流上，银行能比采购大型 AI 平台更快量化节省的工时、减少的缺陷和提升的监管就绪度。
- 一层中立的证据层可以跨现有放贷系统工作，而不是替换它们，因此相较套件型供应商，切换摩擦更小，在技术栈异构的银行环境里也更有用。
- 客户专属的政策图谱、带引证的审查语料、覆盖历史和例外模式会不断累积，形成比单纯模型访问更难复制的工作流护城河。
strategicChoices:
  beachhead: 面向资产规模约 $20B–$80B、拥有 20–200 名信贷分析师的美国区域性银行，为其中型市场商业贷款组合准备年度审查备忘录。
  wedgeRationale: 这类场景审查频繁、劳动负担可度量、经济买家明确，而且文档做不好就会带来监管后果。如果一开始就铺到所有放贷工作流、社区银行或保险风险运营，只会在公司证明引证质量和 ROI 之前拉长集成与销售周期。
  sequencingRationale: 先从上传优先的证据拼装和人工审批草稿做起，因为部署摩擦就是眼下最大的销售风险。等证明复核人员接受度和试点转化率后，再增加更深的连接器、契约监控和续作工作流；只有当产品能稳定把试点转成正式生产后，才扩充解决方案和合规团队。
  notYet:
  - 全面替换贷款发起系统
  - 自主做出信贷决策或风险评级审批
  - 资产规模大致低于 $10B 的社区银行
  - 保险承保和理赔工作流
  - 广义的横向银行副驾定位
market:
  tam: 基于 1,033 家资产高于 $1B 的美国活跃银行，以及每名商业信贷审查用户每年估算 $10k 的工作流价值，模型得出 TAM 为 $258.3M。
  sam: 面向约 65 家资产处于 $20B–$80B 区间的美国银行，假设每家有约 60 名年度审查用户，模型得出 SAM 为 $39.0M。
  som: 假设第 3 年拿下 10 家区域性银行客户、每家银行层面的高价值工作流 ACV 约 $350k，则模型得出第 3 年 SOM 为 $3.5M。
  segments:
  - 拥有中型市场商业放贷团队的美国区域性与超区域性银行
  - 在年度审查验证之后，可切入更大银行内部相邻的商业信贷运营，包括契约监控和续作
  buyingProcess: 初始交易大概率由首席信贷官、商业信贷风险负责人，或推动信贷运营现代化的 COO/CIO 主导；信贷管理、模型风险、供应商风险和 IT 会是必经的协作方。现实路径通常是先在一个组合或审查队列上做付费试点，只有当产品能在不制造治理例外的前提下，显著减少分析师时间和文档缺陷，才会扩展成年度部署。
product:
  mvp: MVP 是一个上传优先的年度审查工作台，读取借款人材料包、历史备忘录、契约文件和政策手册，然后生成带引证的备忘录草稿，并附上比率检查、缺失文件提醒和复核审批闸口。它必须在深度回写集成之前就能工作，这样银行才能在不启动整个平台项目的情况下验证价值。
  sixMonth: 交付生产可用的文档读取、引证追踪、比率逻辑、政策例外检查、复核覆盖日志，以及 2–3 个设计伙伴在真实年度审查队列上的试点。
  twelveMonth: 增加首批 spreading 和文档管理系统连接器、组合仪表盘、可配置政策模板，以及能缩短正式上线审批周期的模型风险 / 供应商风险文档包。
  twentyFourMonth: 在保持跨现有银行系统中立证据层定位的前提下，从年度审查扩展到契约监控、续作、问题资产工作流和组合监测。
  keyBets:
  - 银行会比起更换核心放贷系统，更早购买一层受治理的证据层。
  - 只要引证质量和计算一致性足够高，让人工复核变成监督而非重建，就能赢得复核人员信任。
  - 上传优先部署可以在深度 LOS 或 DMS 集成完成之前先证明 ROI。
  - 同一套政策与证据图谱可以从年度审查平滑扩展到由同一买家拥有的相邻商业信贷工作流。
gtm:
  wedge: 当积压、文档问题或受治理 AI 指令暴露出手工拼装备忘录的代价时，立即向区域性银行信贷管理层销售一套可审计的年度审查起草工作流。
  channels:
  - 由创始人直接销售给首席信贷官、商业信贷风险负责人和信贷运营负责人
  - 参与银行信贷运营现代化或放贷系统项目的顾问与实施伙伴
  - 当切口被验证后，与 spreading、核心系统、LOS 和风险数据供应商建立集成与转介合作
  funnelTargets: target account→qualified discovery 30%+, qualified discovery→paid pilot 25%+, paid pilot→annual production 50%+, annual production→referenceable customer 50%+
  pricing: '采用报价型年度平台费，主要按年度审查量或处于审查中的活跃商业借款人数量定价，并将付费试点金额抵扣正式生产合同。这符合银行采购高风险工作流软件的方式：ROI 来自节省的分析师工时和更少的文档缺陷，而契约监控、审计留存和更深集成则作为高级模块变现。'
businessModel:
  revenueStreams:
  - 用于年度审查证据拼装与审计工作流的年度 SaaS 订阅
  - 初始部署的实施与政策映射费用
  - 契约监控、组合仪表盘、更长审计留存和额外系统连接器的高级模块
  unitOfValue: 每家银行处理的年度商业审查数量，或处于审查中的活跃商业借款人数量
  targetGrossMarginPct: 70
  expansionLevers:
  - 在单家银行账户内覆盖更多组合和更多审查用户
  - 从年度审查扩展到契约监控、续作和问题资产工作流
  - 针对审计留存、政策模板和深度系统集成销售更高价值模块
strategyMap:
  northStarMetric: 在无需人工重建证据的前提下，由机器拼装引证证据并获批通过的年度审查数量
  inputMetrics:
  - 试点转正式生产的转化率
  - 每份年度审查节省的分析师工时中位数
  - 复核人员对首稿引证的接受率
  - 无缺失文件升级即可完成的审查占比
  - 首个真实组合上线的中位部署时间
  moatsToBuild:
  - 按借款人文件结构映射的带引证年度审查语料、复核修改和覆盖日志
  - 连接比率、契约、例外和审查模板的客户专属政策图谱
  - 嵌入银行复核与监管检查流程的跨系统证据连接器和审计轨迹
  killCriteria:
  - 前 12 家目标银行中，少于 3 家在近期出现过年度审查积压或文档缺陷，且经济买家认为这件事值得预算。
  - 在限定范围调优后，对 200 份历史审查的盲测 QA 仍无法让至少 90% 的引证和计算获得复核人员接受。
  - 前 4 个付费试点中，少于 2 个能在试点结束后 6 个月内转成高于 $200k ACV 的年度合同。
  - 产品依旧必须先做深度回写集成，用户才愿意启动试点，从而失去上传优先部署的优势。
  mermaid: |-
    flowchart LR
      Wedge[区域性银行年度审查积压] --> MVP[上传优先的带引证审查工作台]
      MVP --> Proof[付费试点验证复核接受度与节省工时]
      Proof --> Expansion[契约监控、续作与组合监测]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点明确、切口克制，但是否值得投资，仍取决于银行部署速度、引证可信度，以及能否从有限的初始市场继续扩张。
    whyBelieve: 公司切中一个反复发生且受监管的工作流，在这里，可审计性和跨系统编排比原始模型能力更重要，这确实是创业公司有机会卡位的平台缝隙。
    whyDoubt: 初始区域性银行市场规模有限、销售节奏又慢；如果公司拿不出显著更快的部署速度和达到复核标准的输出质量，现有厂商或内部团队很可能“够用就行”。
    nextDiligence: 下一步最关键的证据，是拿下 2 个付费区域性银行试点并转成年度正式生产，因为这意味着复核人员接受带引证草稿，而买家也愿意为扩张继续拨款，无需等待完整的核心系统项目。
  firstCustomer:
    title: 资产规模 $20B–$80B 的美国区域性银行首席信贷官
    profile: 一家拥有中型市场商业放贷团队、每季度要完成数百份年度审查，且工作流分散在文档系统、spreading 工具和备忘录模板之间的区域性银行。
    trigger: 年度审查积压扩大、监管或内审发现文档质量问题，或被要求在不增加编制的情况下提升分析师生产率。
    buyer: 首席信贷官或商业信贷风险负责人
    initialContract: 先在单一组合上做一笔约 $75k–$125k 的付费试点；如果分析师工时明显下降，且工作流通过模型风险和供应商风险评审，再转成约 $200k–$350k 的报价型年度合同。
  mustBeTrue:
  - 前 15 家目标银行中，至少有 5 家能指出近期出现过、且具备高管可见度的年度审查积压、文档例外或审查质量问题。
  - 只读或上传优先部署足以在深度 LOS 或 DMS 集成完成前跑一个真实试点。
  - 在历史审查上完成工作流定向调优后，信贷复核人员接受至少 90% 的生成引证与计算。
  - 首席信贷官或信贷风险负责人可以从运营或现代化预算中，为付费试点和年度合同买单，而不是依赖投机性的 AI 预算。
  - 在年度审查被验证后，同一买家愿意继续付费，把产品扩展到契约监控、续作或组合监测。
  diligenceQuestions:
  - 目标银行每季度究竟完成多少份年度审查，其中分析师有多少时间花在收集证据，多少时间花在判断上？
  - 引证错误或遗漏达到什么阈值时，复核人员就会退回到整份手工重建？
  - 这条工作流的预算和供应商风险流程在现实里到底归谁管：CCO、信贷运营、CIO，还是企业 AI 治理团队？
  - 产品能否在深度回写集成前交付价值，还是客户从第一天起就要求系统记录层面的更新？
  - Moody's、Jack Henry、Finastra，或围绕 Anthropic 搭建的内部团队，多久会补上足够好的带引证年度审查起草能力，从而削弱这个切口？
  riskHeatmap:
  - risk: 模型风险和供应商风险团队将产品视为缺乏治理的 AI 外壳，从而否决它
    likelihood: High
    impact: High
    leadingIndicator: 试点讨论在用户测试真实历史审查之前，就先卡在治理评审里，或买家提出 MVP 无法文档化的控制要求。
    mitigation: 从第一天起就交付确定性引证、人工审批、审计日志和模型风险文档，并优先面向已经在试点受治理 AI 的银行。
  - risk: 引证质量太弱，复核人员不信任首稿
    likelihood: High
    impact: High
    leadingIndicator: 盲测 QA 持续暴露出引证遗漏、比率错误，或复核修改量接近重写整份备忘录。
    mitigation: 严格收窄工作流，用受政策约束的抽取和计算校验，并在基于历史审查调优的同时坚持人工审批。
  - risk: 集成拖慢速度，导致价值迟迟无法证明
    likelihood: Medium
    impact: High
    leadingIndicator: 潜在客户若没有 LOS 或 DMS 回写就不肯启动试点，使实施周期拖过一个预算周期。
    mitigation: 优先做上传优先和只读部署，先在一个真实组合上跑出 ROI，再增加首批连接器。
  - risk: 现有套件或内部团队吸收了足够多的切口能力
    likelihood: Medium
    impact: High
    leadingIndicator: 潜在客户反馈现有供应商或内部副驾已经能在当前合同里提供带引证的年度审查起草能力。
    mitigation: 围绕跨系统中立性、实施速度和监管检查级审计工作流竞争，而不是围绕泛化起草功能竞争。
  - risk: 海滩市场无法扩展成更大的商业信贷平台机会
    likelihood: Medium
    impact: High
    leadingIndicator: 早期客户会买年度审查自动化，但到第 12 个月仍对契约监控、续作或组合监测没有新增预算兴趣。
    mitigation: 从一开始就按相邻工作流来设计政策与证据图谱，并在每一次试点和续约里测试扩张需求。
operatingAssumptions:
- assumption: 首个经济买家会坐在信贷风险管理层，而不是企业 IT，因为积压和审查质量问题能在年度审查流程里被直接量化。
  basis: research.yaml
  validationTest: 至少拿下 3 个付费试点，且其商业赞助人是在一个规划周期内掌握预算的 CCO、商业信贷风险负责人或信贷运营负责人。
  decisionImpact: 如果不成立，公司就必须转向 CIO 或企业 AI 赞助路径，接受更长销售周期，并更早补齐治理包装。
- assumption: 上传优先或只读部署能在深度集成完成前证明足够价值。
  basis: idea.yaml
  validationTest: 用文档上传和只读工作流跑 2 个真实试点，在没有回写集成的情况下也能形成正式生产使用和可量化的节省工时。
  decisionImpact: 如果不成立，实施成本和时间都会明显上升，公司就需要更窄的 ICP，以及更重服务化的部署模型。
- assumption: 在这个狭窄工作流上，靠政策校验和受限抽取可以把引证准确率做到复核标准。
  basis: operator judgment
  validationTest: 对 200 份历史年度审查进行评分，并在有文档化覆盖率的情况下，让至少 90% 的引证与计算获得复核接受。
  decisionImpact: 如果不成立，产品应从完整备忘录生成转向证据检索与例外发现。
- assumption: 如果产品能在受监管流程中减少分析师劳动并降低文档缺陷，那么每家银行每年约 $200k–$350k 的 ACV 是可以做到的。
  basis: research.yaml
  validationTest: 至少将 2 个付费试点转成这个价格区间或更高的年度合同，并让买家接受清晰的 ROI 逻辑。
  decisionImpact: 如果不成立，这个海滩市场可能不足以支撑风险投资回报，公司就需要更低成本的分销方式或不同的扩张路径。
- assumption: 年度审查是进入契约监控、续作和组合监测的可信切口，而且这些工作流归属于同一买方组织。
  basis: idea.yaml
  validationTest: 到第 12 个月时，从试点客户中拿到至少 3 次严肃的扩张讨论，或 1 次相邻信贷工作流的付费模块加购。
  decisionImpact: 如果不成立，公司应把自己优化成更窄的工作流生意，降低资本强度，而不是继续追求更宽的平台路线图。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位区域性银行信贷负责人，并收集历史年度审查材料包、政策手册和复核反馈材料。
  hypothesis: 积压压力和文档质量风险已经严重到足以让买家赞助单一组合的付费试点。
  successMetric: 至少 5 家银行分享近期的积压或文档问题，且至少 3 家同意基于历史审查来界定试点范围。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 构建一个 MVP，能从上传的借款人材料包中起草带引证的年度审查备忘录，并标记缺失文件和政策例外。
  hypothesis: 一个受约束、上传优先的工作流，在深度系统集成之前就能产出对复核人员有用的一稿。
  successMetric: 两家设计伙伴完成历史审查测试，其中至少 90% 的引证被接受，并且分析师时间有明确节省。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在每家设计伙伴银行的一个组合上，针对真实年度审查队列跑 2–3 个付费试点。
  hypothesis: 产品能显著减少备忘录拼装工时和文档缺陷，从而支撑年度正式生产合同。
  successMetric: 每份审查的分析师投入中位数至少下降 40%，且至少 2 个试点进入年度合同谈判。
  owner: 创始人 / CEO
- horizon: 90–180 天
  experiment: 打包一套银行可直接评审的模型风险和供应商风险资料，包括审计日志、人工控制、安全架构和变更管理文档。
  hypothesis: 治理准备不是售后细节，而是成交前提。
  successMetric: 至少 2 家试点银行完成供应商风险和模型风险评审，且无需对产品做根本性重构。
  owner: 产品与合规负责人
- horizon: 180–270 天
  experiment: 交付首个用于试点客户的 spreading 工具或文档管理系统连接器。
  hypothesis: 少量高度定向的连接器就能缩短正式生产扩张时间，而不会把公司拖成服务项目。
  successMetric: 首个连接器能显著减少分析师准备步骤，并将下一位客户的部署时间至少缩短 25%。
  owner: 解决方案工程师
- horizon: 180–360 天
  experiment: 在现有试点客户中测试一个面向契约监控证据拼装的相邻付费模块。
  hypothesis: 只要产品在年度审查中证明可信且贴合工作流，同一买家就会继续加大投入。
  successMetric: 有 1 家试点客户为相邻模块买单，或签署与契约监控、续作相关的扩展工作说明书。
  owner: 创始人 / CEO
operations:
- 带版本的政策模板库，为每家银行部署配置负责人、审批流和复核节奏
- 不可篡改的审计日志管线，记录源文件、计算、提示词、模型版本、复核动作和覆盖操作
- 标准化客户上线手册，涵盖历史审查导入、复核 QA、治理评审和试点成功衡量
- 覆盖访问控制、数据留存、变更管理和事件响应的安全与供应商风险资料包
- 面向 spreading、文档管理、核心系统和风险数据供应商的合作流程，并明确 API 与转介优先级
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 负责买家发现、试点销售、工作流映射和定价，因为客户真实需求与采购现实是公司最大的风险。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭建证据读取、引证、政策校验和审计日志系统，这些定义了产品切口。
- role: 应用 AI / 产品负责人
  startTiming: Month 3
  rationale: 把历史审查的学习转成一个受约束、能获得复核人员信任的工作流，而不是做成通用 LLM 外壳。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 缩短部署时间，负责早期集成，并把定制化试点工作沉淀成可复制的实施模式。
- role: 合规与客户成功负责人
  startTiming: Month 9
  rationale: 维护治理材料、培训复核人员、支持续约，并避免试点转正式生产的推进瓶颈长期卡在创始人身上。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 15 次 ICP 访谈，并从目标区域性银行拿到 3 个付费试点承诺
  - 交付上传优先的 MVP，能够进行带引证的年度审查起草，并支持政策校验、缺失文件标记和人工审批
  - 通过至少 2 家银行的治理评审，并把至少 2 个付费试点转成年度正式生产合同
  - 发布 1 个可公开引用的客户案例，证明分析师工时节省明显且复核人员接受输出
- horizon: 12–24 个月
  items:
  - 增加首批 spreading 和文档系统连接器，以及可配置政策模板和组合仪表盘
  - 达到 8–12 家付费银行客户，并形成可复制的“试点到正式生产”实施动作
  - 为现有客户上线第一个契约监控或续作相邻模块
- horizon: 24–36 个月
  items:
  - 在不丢失证据层定位的前提下，扩展到更广泛的商业信贷运营，包括问题资产和组合监测
  - 建立可复用的银行政策与审查语料库，持续提升跨客户的上线速度和留存
  - 在早期银行客户内部证明多产品扩张，通过新增组合、工作流和审计模块实现增长
risks:
- risk: 模型风险和供应商风险团队在业务用户验证价值之前就阻止部署
  likelihood: High
  impact: High
  mitigation: 先拿治理材料、确定性引证、人工审批和银行可接受的审计控制去成交，而不是先讲一个泛化 AI 试点故事。
- risk: 引证准确率和比率一致性始终达不到复核人员信任门槛
  likelihood: High
  impact: High
  mitigation: 把工作流收得足够窄，强力评分历史审查；如果完整草稿质量不够，就退回到证据拼装加例外检测。
- risk: 集成要求让试点推进过慢或过于服务化
  likelihood: Medium
  impact: High
  mitigation: 强制坚持上传优先 MVP，标准化首批连接器集合，并在可复制 ROI 被证明前避免定制化回写项目。
- risk: 现有放贷套件或内部 AI 团队追上足够多的功能，导致紧迫感下降
  likelihood: Medium
  impact: High
  mitigation: 围绕跨系统中立性、更快实施和监管检查级审计工作流建立优势，而不是围绕通用备忘录起草能力竞争。
- risk: 海滩市场过窄，无法支撑风险投资级增长
  likelihood: Medium
  impact: High
  mitigation: 尽早验证相邻商业信贷场景的扩张空间，并把扩张证明视作后续融资的硬门槛。
fundingAsk:
  stage: 种子前
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月资金将支持由创始人主导的区域性银行 GTM、小型产品与解决方案团队、2–4 个付费试点、治理与审计基础设施、首批系统连接器，以及足够多的证据，用来判断年度审查究竟是不是通往更大商业信贷平台的前门。