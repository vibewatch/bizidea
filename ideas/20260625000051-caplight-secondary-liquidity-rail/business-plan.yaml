slug: employee-liquidity-tender-rail
date: '2026-06-25'
executiveSummary: >-
  Employee liquidity programs are already a scaled behavior in private markets, but late-stage issuers still assemble each tender manually across cap-table exports, outside counsel, brokers, and spreadsheets. The company should start with U.S. Series C-E B2B SaaS issuers running employee liquidity windows, where the sponsor is usually finance with legal as co-sponsor and the trigger is a board decision to offer liquidity after delayed IPO timing, retention pressure, or accumulated transfer requests. The initial product should not be another marketplace; it should be an issuer-readiness workspace that models transfer rights, assembles diligence packets, and produces a board-defensible reserve-price band before a licensed broker runs execution. This wedge is attractive because cap-table systems, brokers, and data vendors each own part of the workflow, but none clearly owns the cross-functional approval layer that determines whether clean supply reaches market. Go-to-market should therefore start partner-led through venture law firms, secondary brokers, and cap-table ecosystems, with pricing anchored to a $25k-$75k per-window fee and later transaction-adjacent revenue only through licensed partners. The evidence supports real demand for company-sponsored liquidity and software-addressable workflows, but three material gaps remain unproven: how often the beachhead issuers run structured tenders, whether partners will co-sell a neutral workspace, and which non-Carta integrations are required to win the first 20 accounts. If the company can cut board-approval-to-buyer-ready launch time by at least half and turn first-window customers into repeat annual or quarterly programs, it can earn a defensible control point before expanding into settlement coordination and broader private transfers.
problem:
  - "Each employee tender is still rebuilt from scratch across cap-table exports, financing documents, counsel checklists, broker emails, and spreadsheet trackers, which drags launch timelines out for weeks."
  - "Late-stage companies are staying private longer, so employees and early investors need structured liquidity before an IPO, but issuers still want tight control over who joins the cap table."
  - "Boards and legal teams are cautious because pricing, disclosure, Rule 701, 409A, tender-offer mechanics, and broker-dealer boundaries all create failure modes that generic workflow tools do not address."
solution:
  - "Ingest cap-table, financing, board, and transfer-restriction data to build a rights-and-approvals graph for each proposed seller and share class."
  - "Generate a buyer-ready diligence packet and reserve-price workflow that combines issuer inputs with external pricing signals and produces an auditable approval record for board and counsel review."
  - "Route counsel, broker, finance, and corporate-secretary tasks in one command center while leaving buyer solicitation, settlement, and trade execution with licensed partners."
whyWeWin:
  - "The product sits in the missing layer between cap-table recordkeeping and broker execution, so it solves the issuer-readiness problem that still blocks supply even when buyers are active."
  - "Partner-led distribution through law firms, brokers, and cap-table ecosystems matches how these sensitive events are already bought and staffed, reducing the need for expensive direct-field sales first."
  - "Repeat rights decisions, approval steps, buyer questions, and launch outcomes create proprietary readiness benchmarks that incumbents do not fully expose to issuer teams today."
strategicChoices:
  beachhead: "U.S. Series C-E B2B SaaS companies with 300-2,000 employees, multiple preferred classes, and a planned employee tender or structured transfer window within the next 12 months."
  wedgeRationale: "Employee-liquidity tenders are urgent, episodic, and already budgeted through finance, legal, and broker workflows, so a narrow readiness product can attach to a real buying trigger faster than a broader private-share marketplace or generalized transfer software."
  sequencingRationale: "Start with a white-glove readiness workspace for first tenders, delivered with counsel and broker partners; then productize repeat templates, integrations, and pricing workflows for recurring programs; only after that expand into buyer matching, settlement orchestration, and more complex transfer types where regulatory scope and implementation cost are higher."
  notYet:
    - "Direct buyer marketplace or unlicensed solicitation layer"
    - "Cross-border employee and founder transfers with country-specific tax and securities complexity"
    - "Cap-table-system replacement"
    - "Fully automated pricing decisions without human board and counsel review"
market:
  tam: "$337.5M estimated TAM based on 4,500 global late-stage private-company liquidity programs per year at roughly $75k blended workflow revenue per program."
  sam: "$31.5M estimated SAM based on 900 U.S. Series C-E software issuers in the beachhead, about 0.5 liquidity windows per issuer per year, and roughly $70k blended revenue per window."
  som: "$6.0M estimated SOM by year 3 from about 85 programs at roughly $70k average revenue per program via a focused partner-led motion."
  segments:
    - "Primary segment: U.S. Series C-E B2B SaaS issuers running employee liquidity programs"
    - "Secondary segment: law firms and licensed secondary brokers managing repeat issuer tenders"
  buyingProcess: >-
    Selection is triggered by a specific liquidity event rather than an annual software budget cycle. The CFO or VP Finance typically owns spend, associate GC or corporate secretary vets compliance and workflow fit, and the chosen broker and outside counsel materially influence vendor selection because they absorb execution and disclosure risk.
product:
  mvp: >-
    A secure issuer workspace that ingests cap-table and financing data, maps transfer rights and approvals, tracks tender checklists, assembles buyer-ready packets, and exports an audit trail for board, counsel, and broker review. The MVP should support the first 5-10 live U.S. employee tenders with human-in-the-loop reserve-price support rather than autonomous pricing or execution.
  sixMonth: "Ship cap-table and document ingest, a rules library for common transfer restrictions, checklist routing, role-based permissions, audit exports, and partner portals for counsel and brokers."
  twelveMonth: "Add repeat-program templates, reserve-price workflow with external data inputs, cycle-time analytics, approval benchmarking, and annual-subscription packaging for issuers that expect recurring windows."
  twentyFourMonth: "Expand into settlement and data-room handoffs, adjacent founder and investor transfer workflows, and a partner ecosystem that can monetize execution referrals without taking regulated trade execution in-house."
  keyBets:
    - "At least 60% of pre-launch tender work can be standardized into reusable product flows without losing counsel trust."
    - "Boards will accept software-supported reserve-price bands if inputs, overrides, and approvals are fully auditable."
    - "The first customer values a faster, cleaner launch packet more than a new buyer pool."
    - "Repeat issuers will convert from per-window pricing to annual commitments once the product proves it lowers friction across multiple programs."
gtm:
  wedge: "Sell a board-ready tender-readiness workspace for the first structured employee liquidity window, positioned as reducing finance, legal, and broker coordination work before execution begins."
  channels:
    - "Venture law firms"
    - "Licensed secondary brokers"
    - "Cap-table and finance-operations ecosystems"
    - "CFO and people-ops networks at late-stage software companies"
  funnelTargets: "partner intro→qualified tender 25-35%, qualified tender→paid launch 40-50%, first paid window→repeat program or annual contract 60%+, paid window→partner-referred execution attach 50%+"
  pricing: "Charge $25k-$75k per liquidity window for readiness, approvals, and diligence packaging because buyers compare the spend against outside-counsel hours, broker project overhead, and time-to-launch risk; add annual minimums for repeat issuers and optional basis-point revenue only through licensed execution partners."
businessModel:
  revenueStreams:
    - "Per-window platform fees for issuer readiness and tender operations"
    - "Annual enterprise subscriptions for repeat issuers and advisor teams"
    - "Transaction-adjacent success fees or referral revenue through licensed broker and settlement partners"
  unitOfValue: "One issuer liquidity window brought from internal kickoff to buyer-ready launch"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Convert one-off tenders into annual or quarterly issuer programs"
    - "Sell shared workflow seats and templates to law-firm and broker partners"
    - "Add adjacent founder, investor, and block-transfer workflows after employee tenders are repeatable"
    - "Earn referral or software-attach revenue from settlement, pricing, and execution partners"
strategyMap:
  northStarMetric: "Number of issuer liquidity windows that reach buyer-ready status within 14 days of board go-ahead"
  inputMetrics:
    - "Partner-referred opportunities per quarter"
    - "Median days from kickoff to buyer-ready packet"
    - "Percent of checklist steps completed inside the platform"
    - "Paid window to repeat-program conversion rate"
    - "Board and counsel approval rate for reserve-price workflow"
  moatsToBuild:
    - "Rights-and-approvals benchmark data by clause, seller type, and program pattern"
    - "Reserve-price calibration data linking internal bands, external signals, and completed outcomes"
    - "Reusable diligence-packet templates and exception libraries across partners"
    - "Partner distribution embedded in counsel, broker, and cap-table workflows"
  killCriteria:
    - "Fewer than 5 of the first 20 qualified partner-referred issuers pay for a live window."
    - "Median prep time is not reduced by at least 50% after the first 10 live programs."
    - "Fewer than 2 law-firm or broker partners agree to co-sell or formally refer the workspace after pilot review."
  mermaid: |
    flowchart LR
      Wedge[Issuer tender readiness workspace] --> MVP[Rights graph and audit trail MVP]
      MVP --> Proof[Faster buyer-ready launch packets]
      Proof --> Expansion[Repeat programs and partner ecosystem]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Promising workflow wedge with real market timing, but conviction depends on proving repeat tender frequency and partner-led distribution within the first year."
    whyBelieve: "Issuer-sponsored liquidity is already scaled, incumbents are fragmented across records, execution, and data, and the company is targeting the operational bottleneck that still prevents clean supply from reaching market."
    whyDoubt: "The beachhead may be narrower and less frequent than it appears, and the product could get trapped as services-heavy project software if law firms, brokers, or boards do not trust a neutral readiness layer."
    nextDiligence: "Confirm with live customers and partners that the product can win paid first-window deployments, reduce launch cycle time materially, and create repeat programs without crossing broker-dealer lines."
  firstCustomer:
    title: "CFO and associate GC at a U.S. Series D infrastructure or vertical-SaaS company planning its first structured employee tender"
    profile: "A 500-1,500 employee company with multiple preferred classes, no recent priced round, rising employee liquidity pressure, and no dedicated in-house secondary-markets team."
    trigger: "Board-backed decision to run an employee liquidity window after delayed IPO timing, retention pressure, or a spike in ad hoc transfer requests."
    buyer: "CFO or VP Finance"
    initialContract: "$25k-$75k paid deployment for one live liquidity window, with conversion to an annual subscription if the company expects repeat programs or recurring transfer reviews."
  mustBeTrue:
    - "At least 30% of qualified partner-referred beachhead issuers will pay $25k or more for readiness software before a live tender."
    - "The product can cut board-go-ahead to buyer-ready packet time to 14 days or less on initial deployments."
    - "Two law firms and two licensed brokers will refer or co-sell the workspace without treating it as a threat to core billable or execution revenue."
    - "Boards and counsel will approve human-reviewed reserve-price bands built from issuer data plus external market signals on most programs."
    - "At least half of first-window customers will run another program or sign an annual contract within 18 months."
  diligenceQuestions:
    - "How many U.S. Series C-E software issuers actually run a structured employee tender within a 24-month period?"
    - "Which tender-prep steps consume the most finance and outside-counsel hours before a broker can launch?"
    - "What evidence makes a board trust a software-supported reserve-price workflow instead of a bespoke banker process?"
    - "Will brokers and law firms share workflow data and referrals, or do they prefer to keep the work inside services?"
    - "Which cap-table, document, and 409A systems must be integrated to win the first 20 customers?"
operatingAssumptions:
  - assumption: "Structured employee tenders recur often enough in the beachhead to support repeat revenue rather than only one-off project work."
    basis: research.yaml
    validationTest: "Run 20 discovery calls with CFOs, brokers, and venture lawyers, then map how many target issuers completed or actively planned at least one structured tender in the prior 24 months."
    decisionImpact: "If false, narrow ICP to larger repeat issuers or shift pricing toward advisor-seat subscriptions instead of issuer annual contracts."
  - assumption: "Law firms and licensed brokers will refer a neutral readiness workspace because it reduces prep friction without displacing execution economics."
    basis: research.yaml
    validationTest: "Secure at least 2 signed pilot-referral agreements or formal design-partner commitments from law-firm and broker channels within 6 months."
    decisionImpact: "If false, direct-sales CAC rises and the company should simplify scope to a self-contained issuer workflow tool."
  - assumption: "Human-in-the-loop reserve-price support can be productized without creating broker-dealer or compensation-tax exposure."
    basis: operator judgment
    validationTest: "Obtain outside-counsel product memos and complete 3 pilot workflows where pricing inputs, overrides, and approvals are documented without regulatory objections."
    decisionImpact: "If false, remove pricing recommendations from the core offer and compete only on approvals, audit trail, and packet assembly."
  - assumption: "The first 10 customers can be served with a small set of cap-table, document, and 409A integrations rather than heavy custom implementation."
    basis: operator judgment
    validationTest: "Track source systems in design-partner pilots and confirm that 80% of required data can be ingested from 3 or fewer connector patterns."
    decisionImpact: "If false, gross margin and onboarding time deteriorate, requiring a narrower ICP or more services-heavy delivery model."
experimentRoadmap:
  - horizon: 0-90 days
    experiment: "Interview 20 CFO, associate GC, broker, and law-firm stakeholders around recent employee tenders."
    hypothesis: "The hardest pre-launch bottleneck is rights, approvals, and packet assembly rather than buyer discovery."
    successMetric: "At least 15 of 20 interviews rank pre-launch coordination as a top-2 pain and describe a live buying trigger."
    owner: "Founder"
  - horizon: 0-90 days
    experiment: "Collect and normalize redlined checklists, document requests, and approval paths from 5-10 completed tenders."
    hypothesis: "A repeatable rules library can cover most pre-launch workflow steps across the beachhead."
    successMetric: "A reusable workflow model covers at least 60% of checklist steps across 5 or more programs."
    owner: "Product and legal ops lead"
  - horizon: 90-180 days
    experiment: "Run 3 concierge pilots with partner-referred issuers using a manual-plus-software prototype."
    hypothesis: "Issuers will pay for a readiness layer before broker execution if it reduces launch time and coordination burden."
    successMetric: "At least 2 of 3 pilots convert to paid engagements and each shows at least 30% cycle-time reduction versus prior process."
    owner: "Founder"
  - horizon: 90-180 days
    experiment: "Build cap-table ingest, permissions, audit export, and counsel-broker task routing for the top initial systems."
    hypothesis: "A focused MVP can support live programs without custom engineering for every customer."
    successMetric: "Three live pilots run on the same core product with no more than one customer-specific workflow exception each."
    owner: "Founding eng"
  - horizon: 6-12 months
    experiment: "Test reserve-price workflow with external data inputs and board-review templates on the first 10 paid windows."
    hypothesis: "Boards and counsel will trust software-supported pricing workflows if assumptions and overrides are explicit."
    successMetric: "At least 8 of 10 programs use the reserve-price module without reverting to a fully bespoke pricing memo."
    owner: "Product and legal ops lead"
  - horizon: 12-18 months
    experiment: "Offer annual plans and partner attach packages to issuers that completed a first window."
    hypothesis: "Repeat programs and partner ecosystem revenue can raise retention and reduce reliance on one-off tenders."
    successMetric: "At least 50% of first-window customers sign a repeat engagement or annual plan, and at least 50% of paid windows attach a partner referral."
    owner: "Partnerships lead"
operations:
  - "Maintain a secure document-ingestion and permissions model because tender materials, shareholder data, and board approvals are highly sensitive."
  - "Codify a counsel-reviewed rules library for Rule 701, 409A checkpoints, tender disclosures, and insider-participation edge cases."
  - "Run a partner handoff process with explicit boundaries between readiness software, licensed broker execution, and settlement providers."
  - "Track every program against kickoff date, buyer-ready date, approval exceptions, and post-mortem lessons to build cycle-time benchmarks."
  - "Use integration playbooks for cap-table, valuation, and document systems to keep onboarding repeatable and gross margins above target."
team:
  - role: "Founder"
    startTiming: "Month 0"
    rationale: "Owns design-partner sales, broker and law-firm relationships, and the definition of the initial workflow boundary."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Builds the core ingest, rights model, permissions, and audit trail needed for live tender workflows."
  - role: "Product and legal ops lead"
    startTiming: "Month 3"
    rationale: "Turns tender checklists and regulatory edge cases into repeatable templates while keeping product scope inside a defensible compliance boundary."
  - role: "Partnerships lead"
    startTiming: "Month 6"
    rationale: "Converts pilot relationships into repeat referral channels with brokers, law firms, and cap-table ecosystems once the first use cases are proven."
milestones:
  - horizon: 0-12 months
    items:
      - "Complete 20 discovery calls and 5-10 tender workflow teardowns."
      - "Win 3 paid pilot windows and publish quantified cycle-time improvements from kickoff to buyer-ready packet."
      - "Sign at least 2 law-firm or broker referral partners."
      - "Ship MVP integrations, permissions, and audit exports for the most common initial source systems."
  - horizon: 12-24 months
    items:
      - "Reach 15-20 paid issuer programs with at least half coming from partner channels."
      - "Launch annual subscription packaging for repeat issuers and advisor teams."
      - "Prove reserve-price workflow adoption on most paid programs with documented board and counsel signoff."
      - "Add adjacent founder and investor transfer workflows without expanding into direct trade execution."
  - horizon: 24-36 months
    items:
      - "Support about 85 annual programs and reach the researched year-3 SOM target."
      - "Establish settlement, pricing-data, and execution partner ecosystem revenue as a material second stream."
      - "Build benchmark datasets on approval exceptions, pricing ranges, and launch cycle times across repeat programs."
      - "Evaluate expansion into more complex transfer categories only after the U.S. employee-tender wedge is repeatable."
risks:
  - risk: "Issuer adoption friction for infrequent, high-stakes liquidity events"
    likelihood: High
    impact: High
    mitigation: "Start as a white-glove partner-led workflow layer attached to a live tender trigger, then convert repeat issuers into software accounts once value is proven."
  - risk: "Broker-dealer and tender-offer boundary gets blurred as the product expands toward pricing or buyer matching"
    likelihood: Medium
    impact: High
    mitigation: "Keep execution, solicitation, and settlement with licensed partners; document product boundaries in counsel-reviewed playbooks before adding any transaction-adjacent module."
  - risk: "Boards do not trust software-supported reserve-price workflows"
    likelihood: Medium
    impact: High
    mitigation: "Keep pricing human reviewed, use external market inputs, log overrides, and prove that the workflow improves defensibility rather than replacing judgment."
  - risk: "Incumbents such as Carta, Nasdaq Private Market, Forge, or brokers extend further into issuer readiness"
    likelihood: Medium
    impact: Medium
    mitigation: "Move fast on neutral partner workflows, cross-system integrations, and proprietary readiness benchmarks that are useful even when execution remains elsewhere."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months of runway should fund the core product team, compliance-aware product design, first integrations, 3-5 paid pilots, and the initial law-firm and broker channel needed to prove repeatable tender-readiness revenue."
