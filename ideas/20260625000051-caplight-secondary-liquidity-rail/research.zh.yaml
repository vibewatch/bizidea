competitors:
  - name: Carta
    stage: incumbent
    wedge: 股权结构表、409A 和集成的公司主导要约工作流
    pricing: 变现部分定制/不公开；其他部分按计划定价
    strength: 掌握发行方记录，可在同一系统内更新股权结构表、税务和股东通信
    weaknessVsUs: 最适合 Carta 原生执行，但对于所有发行方和顾问团队，未必是中立的跨合作伙伴就绪层
    sourceRefs:
      - 3
      - 4
      - 6
  - name: Nasdaq Private Market
    stage: incumbent
    wedge: 公司赞助变现方案、私人股权数据和结算基础设施
    pricing: 定制/不公开
    strength: 变现方案客户基础庞大、机构级数据和端到端结算支持
    weaknessVsUs: 相较于在经纪主导发起前启动的轻量发行方工作台，感觉更重、更偏执行
    sourceRefs:
      - 10
      - 11
      - 13
      - 15
  - name: Forge
    stage: scale-up
    wedge: 私人股权交易市场、指示性定价和公司变现方案
    pricing: 定制/不公开
    strength: 在一个品牌平台上整合市场准入、价格信号和公司变现支持
    weaknessVsUs: 针对交易和项目执行优化，而非专门为发起前的内部权利建模和审批编排设计
    sourceRefs:
      - 16
      - 17
      - 18
      - 19
      - 20
  - name: EquityZen
    stage: incumbent
    wedge: 发行方优先的私人股权交易市场，服务合格投资者，现已获 Morgan Stanley 加持
    pricing: 标准交易买卖双方各 2.5% 费率
    strength: 投资者分发能力强、消费者品牌认知高，Morgan Stanley 收购后费率已下降
    weaknessVsUs: 以市场为导向，仍依赖发行方审批，内部就绪和审计链工作在产品核心之外
    sourceRefs:
      - 21
      - 22
      - 23
      - 24
  - name: Caplight
    stage: scale-up
    wedge: 风险投资二级市场数据、实时交易流和机构私募市场基础设施
    pricing: 定制/不公开
    strength: 数据覆盖深、机构分发广，明确的 API/MCP 定位
    weaknessVsUs: 首要服务于投资者和市场情报，而非组装干净要约材料包的 CFO/法律指挥中心
    sourceRefs:
      - 1
      - 2
      - 34
regulatoryTechnicalConstraints:
  - point: Rule 701 仍是薪酬性股权发行的基础豁免，超过 1000 万美元门槛有额外披露要求，且限制性证券限额持续有效。
    sourceRefs:
      - 4
      - 5
  - point: 私人公司股权方案需要当前 409A 支持，尤其是在融资轮或其他可能使早期估值失效的重大事件之后。
    sourceRefs:
      - 6
  - point: 任何看似招募买方或促成交易的产品都面临经纪商问题，应将执行留给持牌合作伙伴。
    sourceRefs:
      - 7
      - 21
  - point: 现金自我要约在某些情况下现在可以使用更短的窗口期，但要约规则和披露义务仍高度技术性。
    sourceRefs:
      - 30
      - 31
      - 33
  - point: 在内部人员密集的员工要约中，溢价若结构不当，可能被认定为薪酬而非资本利得。
    sourceRefs:
      - 32
validationSignals:
  - point: Nasdaq Private Market 拥有 1000+ 个变现项目和 25 万+ 员工股东，证实发行方赞助变现已是规模化行为。
    sourceRefs:
      - 10
      - 14
  - point: Carta 称已解锁逾 140 亿美元的变现，并强调要约管理可以从手工转向自动化。
    sourceRefs:
      - 3
  - point: Caplight A 轮新闻稿显示机构买方已通过平台、API 和 MCP 服务器使用私募市场工作流。
    sourceRefs:
      - 1
  - point: Morgan Stanley 收购 EquityZen 并立即降费，表明大型在位企业预期私人股权持续交易量。
    sourceRefs:
      - 21
  - point: TechCrunch 采访的运营者认为，正式的重复变现方案相较临时出售能改善留人效果和股权台账可见性。
    sourceRefs:
      - 27
