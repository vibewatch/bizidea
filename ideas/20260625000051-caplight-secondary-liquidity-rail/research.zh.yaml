  fiveForces:
    supplierPower:
      score: 4
      rationale: 关键输入集中在持牌执行合作伙伴、法律/合规专业知识和定价数据服务商手中；新进者可以构建工作流软件，但很难轻易替代这些供应商。
      sourceRefs:
        - 7
        - 10
        - 11
        - 20
        - 30
    buyerPower:
      score: 4
      rationale: 每家发行方购买频率低，有电子表格加外部法律顾问和经纪商的可信替代方案，且在信任不足时可推迟采购。
      sourceRefs:
        - 10
        - 15
        - 16
        - 27
    threatOfEntrants:
      score: 3
      rationale: 工作流 SaaS 可构建，但信任、法律细节、合作伙伴分发和历史交易数据将门槛抬高到普通垂直 SaaS 工具之上。
      sourceRefs:
        - 2
        - 3
        - 11
        - 18
        - 20
    threatOfSubstitutes:
      score: 5
      rationale: 默认替代方案仍然是由投行和律所主导的执行，辅以股权结构表导出、邮件和电子表格拼凑，因此产品必须击败一个强大的在位流程，而非填补空白。
      sourceRefs:
        - 3
        - 10
        - 16
        - 27
        - 33
    competitiveRivalry:
      score: 4
      rationale: 几家相邻在位企业已在销售变现、定价或股权管理工具，但没有哪家完全掌控发行方侧就绪层，使得竞争真实存在，但品类定义仍然流动。
      sourceRefs:
        - 2
        - 3
        - 10
        - 16
        - 21
        - 25
  pestle:
    - factor: 政治
      impact: neutral
      point: 采用不明显需要政策顺风，但该品类对证券规则解释和执法节奏有所敞口。
      sourceRefs:
        - 5
        - 7
        - 30
        - 31
    - factor: 经济
      impact: positive
      point: IPO 市场低迷和私人公司长期保持私有，增加了对过渡期变现路径的需求。
      sourceRefs:
        - 8
        - 9
        - 13
        - 28
    - factor: 社会
      impact: positive
      point: 员工留任和公平预期使结构化变现成为人才管理问题，而不仅是财务事件。
      sourceRefs:
        - 10
        - 16
        - 26
        - 27
    - factor: 技术
      impact: positive
      point: 二级市场定价数据、基准数据和软件可访问工作流让自动化变得新颖可信。
      sourceRefs:
        - 1
        - 2
        - 11
        - 18
        - 20
    - factor: 法律
      impact: negative
      point: Rule 701、409A、披露义务和经纪商边界使合规失误代价高昂。
      sourceRefs:
        - 4
        - 5
        - 6
        - 7
        - 30
        - 32
        - 33
    - factor: 环境
      impact: neutral
      point: 相较其他金融科技品类，该工作流受环境法规或气候敞口的影响不明显。
      sourceRefs:
        - 8
        - 10
  adoptionFrictionMatrix:
    - friction: 将敏感的股权结构表和要约流程交给新供应商
      severity: 高
      affectedBuyer: CFO 和助理法律顾问
      mitigation: 以合作伙伴主导的高触达方式切入，审计链和基于角色的权限与现有法律顾问和经纪商工作流相辅相成。
      sourceRefs:
        - 3
        - 10
        - 16
        - 33
    - friction: 向董事会和卖方辩护价格区间和公平性
      severity: 高
      affectedBuyer: CFO 和董事会
      mitigation: 将底价支持锚定在 409A 时机、近期融资和外部二级市场数据上，而非仅凭经纪商经验。
      sourceRefs:
        - 2
        - 6
        - 11
        - 18
        - 32
    - friction: 越界进入受监管的招募或执行领域
      severity: 高
      affectedBuyer: 法律联合发起方
      mitigation: 将分发和资金流动留给持牌合作伙伴；将产品定位为就绪、审批和工作流基础设施。
      sourceRefs:
        - 7
        - 21
        - 30
        - 31
    - friction: 事件阶段性发生，团队可能抵制购买新软件
      severity: 中
      affectedBuyer: CFO
      mitigation: 将产品打包为重复窗口和临时转让请求服务，而不仅是单次一次性要约。
      sourceRefs:
        - 14
        - 15
        - 27
