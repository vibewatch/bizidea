    - 合规与法律基础设施
    - 合作伙伴成功管理与企业销售
jobsToBeDone:
  - job: >-
      当晚期初创公司决定发起员工要约时，帮助 CFO 和法律团队组装一份转让就绪材料包，让他们能快速且有据可依地启动经董事会批准的变现窗口。
    currentAlternative: 跨股权管理软件、外部法律顾问、经纪商和电子表格的手工协调
    successMetric: 从董事会批准到买方就绪材料包完成所需天数
  - job: >-
      当二级市场买方评估私人公司大宗交易时，帮助发行方提供规范化的权利信息、定价背景和审批状态，让买方无需大量定制尽调即可给出可信报价。
    currentAlternative: 经纪商邮件、临时数据室和法律顾问主导的文件审查
    successMetric: 从买方初步表达兴趣到提交可执行意向书所需时间
