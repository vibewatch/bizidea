topRisks:
  - name: 发行方采用摩擦
    description: 晚期初创公司在处理不频繁、高敏感的变现事件时，可能倾向于回避新工具，默认依赖其信任的投行和法律顾问。
    mitigation: 以高触达工作流层切入，通过现有律所和经纪商关系进行销售，再将重复使用的发行方转化为软件账户。
  - name: 经纪商边界风险
    description: 若公司看似在招募买方或直接执行交易，监管复杂性可能拖慢扩张步伐。
    mitigation: 初期产品专注于工作流、尽调和审批，同时与持牌经纪商合作，由其负责分发和执行。
  - name: 在位企业侧翼威胁
    description: 股权管理供应商、数据服务商或二级市场经纪商在切口被验证后，可能延伸至发行方要约工具。
    mitigation: 优先攻克最难的审批和权利自动化层，并积累在位企业尚未覆盖的专有交易就绪数据。
