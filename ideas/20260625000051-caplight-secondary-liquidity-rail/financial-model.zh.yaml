scenarios:
  downside:
    description: 合作伙伴转化滞后，重复窗口来得更晚，ARPU 更接近一次性项目定价。
    y3RevenueK: 4035.0
    y3EbitdaK: -462.0
    cashLowPointK: -145.0
    keyAssumptionChanges:
    - 合格→付费转化率 35%，而非 45%
    - 第 3 年年化 ARPU $125K，而非 $140K
    - 第 3 年 Q4 活跃发行方 52 家，而非 78 家
  base:
    description: 合作伙伴主导漏斗达到计划，重复方案拉动成熟发行方收入超越首次窗口费用。
    y3RevenueK: 6160.0
    y3EbitdaK: 676.0
    cashLowPointK: 458.7
    keyAssumptionChanges:
    - 合格→付费转化率 45%
    - 第 3 年年化 ARPU $140K
    - 第 3 年 Q4 活跃发行方 78 家
  upside:
    description: 转介合作伙伴扩张更快，重复节奏增强，毛利率受益于更标准化的工作流。
    y3RevenueK: 7440.0
    y3EbitdaK: 1458.0
    cashLowPointK: 702.0
    keyAssumptionChanges:
    - 合格→付费转化率 55%
    - 第 3 年年化 ARPU $150K
    - 第 3 年 Q4 活跃发行方 90 家
