slug: employee-liquidity-tender-rail
date: '2026-06-25'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型启动初始现金
  value: '2800'
  unit: USDK
  source: '[BP fundingAsk $2-4M 区间和 18 个月现金跑道目标；基础情景使用第 1 个月 $2.8M pre-seed 收款]'
- id: A2
  name: 目标毛利率
  value: '70'
  unit: pct
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A3
  name: 第 1 年每活跃发行方关系年化 ARPU
  value: '120'
  unit: USDK annual
  source: '[BP gtm.pricing 每窗口 $25k–$75k；启发式方法对首批付费项目增加了入驻/年度最低打包]'
- id: A4
  name: 第 2 年每活跃发行方关系年化 ARPU
  value: '125'
  unit: USDK annual
  source: '[BP 重复发行方年度订阅打包加有限合作伙伴附加收入]'
- id: A5
  name: 第 3 年每活跃发行方关系年化 ARPU
  value: '140'
  unit: USDK annual
  source: '[BP 24–36 个月 SOM 约 $6.0M 和 85 个年度项目；启发式假设重复发行方平均约两个窗口加小额合作伙伴附加]'
- id: A6
  name: 第 1 年客户爬坡
  value: M4 1; M7 2; M9 3; M12 4 active issuers EOP
  unit: count
  source: '[BP 0–12 个月里程碑：3 个付费试点窗口，前 18 个月资助 3–5 个付费试点]'
- id: A7
  name: 第 2 年客户爬坡
  value: Q1Y2 7; Q2Y2 10; Q3Y2 14; Q4Y2 18 active issuers EOP
  unit: count
  source: '[BP 12–24 个月里程碑：15–20 个付费发行方项目，合作伙伴渠道占比 >50%]'
- id: A8
  name: 第 3 年客户爬坡
  value: Q1Y3 26; Q2Y3 42; Q3Y3 60; Q4Y3 78 active issuers EOP
  unit: count
  source: '[BP 第 3 年 SOM 约 85 个年度项目；启发式将活跃发行方数量保持在项目数以下，因为部分发行方会重复]'
- id: A9
  name: 合作伙伴主导漏斗
  value: 30% intro→qualified; 45% qualified→paid; 60% first paid→repeat
  unit: pct
  source: '[BP gtm.funnelTargets 中间值]'
- id: A10
  name: 用于 LTV 计算的月度流失率
  value: '2.5'
  unit: pct
  source: '[启发式：事件驱动的企业工作流软件，在年度计划验证前存在有意义的重复风险]'
- id: A11
  name: 各职能全成本薪酬
  value: Founder 144; Engineering 216; Product-Legal 204; Partnerships 192; CS-Ops 156; G&A 132
  unit: USDK annual per FTE
  source: '[启发式：2026 年美国初创公司全成本现金薪酬，含约 20% 福利/工资税负担]'
- id: A12
  name: 第 1 年招聘计划
  value: Founder M1; Founding eng M1; Product-Legal M4; Partnerships M7; second Eng M8; CS-Ops M10
  unit: hire timing
  source: '[BP 团队 startTiming 加一名实施支持人员，确保早期试点可重复]'
- id: A13
  name: 第 2 年人员规模目标
  value: 11 FTE by Q4Y2
  unit: FTE
  source: '[BP 15–20 个付费发行方项目里程碑和合作伙伴主导 GTM 需要更多交付、产品和渠道产能]'
- id: A14
  name: 第 3 年人员规模目标
  value: 15 FTE by Q4Y3
  unit: FTE
  source: '[BP 85 个年度项目里程碑和向结算/数据合作伙伴工作流的扩张]'
- id: A15
  name: 非薪资运营支出
  value: Y1 S&M/R&D/G&A = 55 / 79 / 121; Y2 = 172 / 182 / 171; Y3 = 405 / 375 / 263
  unit: USDK per year
  source: '[启发式锚定 BP 运营：云/安全、合规/法律、合作伙伴差旅和行政]'
- id: A16
  name: 稳态 CAC
  value: '41.8'
  unit: USDK per new customer
  source: '[由基础情景第 2 年销售与营销支出 $585.6K 和 14 个净新增活跃发行方推导]'
- id: A17
  name: 收入确认规则
  value: Average active customers in period × period ARPU
  unit: formula
  source: '[启发式：将阶段性窗口平滑为规划模型，同时与 BP 第 3 年 SOM 保持对齐]'
- id: A18
  name: 现金转化假设
  value: No debt, capex, or working-capital swings modeled; EBITDA approximates cash movement
  unit: policy
  source: '[启发式：适用于固定资产需求可忽略的早期软件计划]'
