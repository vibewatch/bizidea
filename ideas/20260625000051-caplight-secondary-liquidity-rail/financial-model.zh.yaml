modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      PartnerReferrals --> QualifiedTenders
      QualifiedTenders --> PaidIssuers
      PaidIssuers --> RepeatPrograms
      PaidIssuers --> WindowFees
      RepeatPrograms --> SubscriptionRevenue
      WindowFees --> Revenue
      SubscriptionRevenue --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来源于活跃发行方从第 1 年的 4 家增至第 3 年 Q4 的 78 家，同时通过重复窗口和合作伙伴附加提升成熟发行方的人均收入。
- checkName: 必须走对的事
  finding: 合作伙伴主导漏斗必须达到商业计划书的中间转化率，使第 2 年 Q4 在无需大量直销成本的情况下达到 18 个活跃发行方。
- checkName: 模型失效条件
  finding: 若重复窗口未能落地且 ARPU 停留在首次窗口定价附近，悲观情景下现金将在下一轮融资里程碑前转负。
- checkName: 下轮融资证明
  finding: 达到 15–20 个付费发行方项目、2 家以上转介合作伙伴，并记录底价工作流采用情况——这是支撑下一轮融资的证据包。
sanityChecks:
  ruleOf40: 第 3 年增长 369% + EBITDA 利润率 11% = 380%（数学上亮眼，但受第 2 年收入基数较小的拉动）。
  burnMultiple: 第 2 年烧钱倍数 ≈ 1.1 倍（净烧钱 $1.24M / 净新增收入 $1.13M），第 3 年下半年起开始产生正现金流。
  revenuePerFte: 第 3 年按 Q4 的 15 名 FTE 计算人均收入 $411K（垂直 SaaS 基准约 $200K–$400K；略高于区间，但在合作伙伴主导 GTM 下合理可信）。
  flags:
  - 第 3 年假设重复方案和年度打包将成熟 ARPU 提升至 $140K，远高于单次窗口项目定价。
  - 客户数代表的是活跃发行方关系，因此实际收入确认可能比这一平滑规划视图更为不均匀。
  - 模型假设流失率温和，但对许多滩头市场发行方而言，要约频率仍未经验证。
  - 第 3 年 EBITDA 转正依赖于将人员规模维持在 15 名 FTE，同时由合作伙伴渠道持续供给大部分新需求。
