topRisks:
  - name: Issuer adoption friction
    description: Late-stage startups may avoid new tools for infrequent, sensitive liquidity events and default to trusted bankers and counsel.
    mitigation: Start as a white-glove workflow layer sold through existing law-firm and broker relationships, then convert repeat issuers into software accounts.
  - name: Broker-dealer boundary
    description: If the company looks like it is soliciting buyers or executing trades directly, regulatory complexity could slow expansion.
    mitigation: Keep the initial product on workflow, diligence, and approvals while partnering with licensed brokers for distribution and execution.
  - name: Incumbent adjacency
    description: Cap-table vendors, data providers, or secondary brokers could extend into issuer tender tooling once the wedge is proven.
    mitigation: Focus on the hardest approval and rights-automation layer first and build proprietary transaction-readiness data that incumbents do not already capture.
