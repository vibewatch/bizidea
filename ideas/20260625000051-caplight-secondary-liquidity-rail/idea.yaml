jobsToBeDone:
  - job: >-
      When a late-stage startup decides to run an employee tender, help the CFO and legal team assemble a transfer-ready
      packet, so they can launch a board-approved liquidity window quickly and defensibly.
    currentAlternative: Manual coordination across cap-table software, outside counsel, brokers, and spreadsheets
    successMetric: Days from board approval to buyer-ready launch packet
  - job: >-
      When a secondary buyer evaluates a private-company block, help the issuer provide normalized rights, pricing
      context, and approval status, so the buyer can issue a credible bid with less bespoke diligence.
    currentAlternative: Broker emails, ad hoc data rooms, and counsel-led document review
    successMetric: Time from initial buyer interest to executable indication of interest
