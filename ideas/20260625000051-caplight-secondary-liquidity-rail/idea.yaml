problem: >-
  Late-stage startups increasingly need repeatable employee and early-investor liquidity programs, but each tender or
  block trade still gets rebuilt from scratch across cap-table exports, law-firm checklists, broker emails, and board
  approvals. That makes pricing hard to defend, drags timelines out for weeks, and causes many issuers to avoid
  secondary windows even when employees, alumni funds, and long-dated investors need liquidity. The market now has
  more buyer capital and better data, but supply still stalls because most issuers lack a transaction-ready operating
  system for private transfers.
targetUser:
  primary: CFO or VP Finance at a U.S. Series C-E B2B SaaS company managing employee liquidity and investor transfer requests
  secondary: Associate General Counsel or corporate secretary coordinating board approvals, transfer restrictions, and tender documents
  buyer: CFO or VP Finance, usually with legal as a co-sponsor
startupThesis:
  nonObviousInsight: >-
    Venture secondaries do not primarily break on lack of buyer interest anymore; they break because issuers cannot turn
    messy cap-table rights, transfer restrictions, and valuation context into a board-approvable transaction packet fast
    enough. As institutional buyers gain programmatic access to better private-market data, the scarcest asset becomes
    clean, issuer-cleared supply.
  beachhead: >-
    Quarterly employee-liquidity tenders for U.S. Series C-E B2B SaaS companies with 300-2,000 employees, multiple
    preferred classes, and no dedicated in-house secondary-markets team
  wedge: >-
    A tender execution workspace that ingests cap-table and financing history, models transfer rights and approvals,
    generates buyer-ready diligence packets, and routes board, counsel, and broker tasks in one audit trail
  whyNowCatalyst: >-
    BlackRock-backed investment, $52 trillion of AUM already accessing secondary infrastructure by software interface,
    and explicit investment in agentic transaction workflows mean issuers that can package clean supply now will clear a
    market that previously depended on bespoke human coordination.
  ventureScalePath: >-
    Start with issuer-side tender orchestration, then expand into a network for qualified buyers, settlement partners,
    financing providers, and valuation benchmarks across employee tenders, founder liquidity, fund restructurings, and
    cross-border private transfers.
solution: >-
  The product ingests cap-table exports, board consents, financing terms, transfer restrictions, and 409A history to
  build a transfer-readiness graph for every seller and share class in a proposed liquidity window. It produces a
  board-defensible reserve-price band using recent rounds, comparable secondary prints, and live transaction signals
  from market-data partners rather than broker gossip alone. It then routes buyer eligibility, diligence requests,
  counsel checklists, board approvals, and closing milestones through a single issuer command center with a complete
  audit trail. For repeat issuers, it becomes the operating system for quarterly liquidity windows and investor transfer
  requests. Over time, the same workflow can power buyer matching, settlement coordination, and transaction-fee capture.
goToMarketSeed:
  firstCustomer: >-
    CFO and associate GC at a U.S. Series D infrastructure or vertical-SaaS company with 500-1,500 employees planning
    its first structured employee tender after 18 or more months without a priced primary round
  buyingTrigger: A board-approved employee liquidity discussion, tender launch, or spike in ad hoc transfer requests after delayed IPO timing
  currentAlternative: Investment-bank or broker-led tender processes stitched together with Carta exports, outside counsel, email, and spreadsheets
  switchingReason: >-
    The wedge reduces transaction prep time, makes approvals auditable, and gives issuers a cleaner pricing and rights
    package before they pay for a full broker process.
  pricingHypothesis: $25k-$75k per liquidity window plus optional basis points on completed transaction volume through broker partners
