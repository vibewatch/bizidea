  unit: USDK annual
  source: '[BP gtm.pricing $25k-$75k per window; heuristic adds setup/annual-minimum packaging for first paid programs]'
- id: A4
  name: Y2 annualized ARPU per active issuer relationship
  value: '125'
  unit: USDK annual
  source: '[BP annual subscription packaging for repeat issuers plus limited partner attach revenue]'
- id: A5
  name: Y3 annualized ARPU per active issuer relationship
  value: '140'
  unit: USDK annual
  source: '[BP 24-36 month SOM of ~$6.0M and 85 annual programs; heuristic assumes repeat issuers average roughly two windows plus small partner attach]'
- id: A6
  name: Y1 customer ramp
  value: M4 1; M7 2; M9 3; M12 4 active issuers EOP
  unit: count
  source: '[BP 0-12 month milestone for 3 paid pilot windows and funded 3-5 paid pilots in first 18 months]'
- id: A7
  name: Y2 customer ramp
  value: Q1Y2 7; Q2Y2 10; Q3Y2 14; Q4Y2 18 active issuers EOP
  unit: count
  source: '[BP 12-24 month milestone of 15-20 paid issuer programs with >50% partner channel mix]'
- id: A8
  name: Y3 customer ramp
  value: Q1Y3 26; Q2Y3 42; Q3Y3 60; Q4Y3 78 active issuers EOP
  unit: count
  source: '[BP year-3 SOM of ~85 annual programs; heuristic keeps active issuer count below program count because some issuers repeat]'
- id: A9
  name: Partner-led funnel
  value: 30% intro→qualified; 45% qualified→paid; 60% first paid→repeat
  unit: pct
  source: '[BP gtm.funnelTargets midpoint]'
- id: A10
  name: Monthly churn used for LTV
  value: '2.5'
  unit: pct
  source: '[Heuristic: event-driven enterprise workflow software with meaningful repeat risk until annual plans are proven]'
- id: A11
  name: Loaded compensation by role
  value: Founder 144; Engineering 216; Product-Legal 204; Partnerships 192; CS-Ops 156; G&A 132
  unit: USDK annual per FTE
  source: '[Heuristic: 2026 U.S. startup fully loaded cash compensation including ~20% benefits/payroll burden]'
- id: A12
  name: Y1 hiring plan
  value: Founder M1; Founding eng M1; Product-Legal M4; Partnerships M7; second Eng M8; CS-Ops M10
  unit: hire timing
  source: '[BP team startTiming plus one implementation-support hire to keep early pilots repeatable]'
- id: A13
  name: Y2 headcount target
  value: 11 FTE by Q4Y2
  unit: FTE
  source: '[BP 15-20 paid issuer programs milestone and partner-led GTM require more delivery, product, and channel capacity]'
- id: A14
  name: Y3 headcount target
  value: 15 FTE by Q4Y3
  unit: FTE
  source: '[BP 85 annual programs milestone and expansion into settlement/data partner workflows]'
- id: A15
  name: Non-payroll operating spend
  value: Y1 S&M/R&D/G&A = 55 / 79 / 121; Y2 = 172 / 182 / 171; Y3 = 405 / 375 / 263
  unit: USDK per year
  source: '[Heuristic anchored to BP operations: cloud/security, compliance/legal, partner travel, and admin]'
- id: A16
  name: Steady-state CAC
  value: '41.8'
  unit: USDK per new customer
  source: '[Derived from base-case Y2 sales & marketing spend of $585.6K and 14 net new active issuers]'
- id: A17
  name: Revenue recognition convention
  value: Average active customers in period × period ARPU
  unit: formula
  source: '[Heuristic used to smooth episodic windows into a planning model while staying aligned to BP year-3 SOM]'
- id: A18
  name: Cash conversion assumption
  value: No debt, capex, or working-capital swings modeled; EBITDA approximates cash movement
  unit: policy
  source: '[Heuristic for an early-stage software plan with immaterial fixed-asset needs]'
