modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      PartnerReferrals --> QualifiedTenders
      QualifiedTenders --> PaidIssuers
      PaidIssuers --> RepeatPrograms
      PaidIssuers --> WindowFees
      RepeatPrograms --> SubscriptionRevenue
      WindowFees --> Revenue
      SubscriptionRevenue --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing active issuers from 4 in Y1 to 78 by Q4Y3 and lifting mature revenue per issuer with repeat windows plus partner attach.
- checkName: Must go right
  finding: The partner-led funnel has to deliver roughly the BP midpoint conversion rates so Q4Y2 reaches 18 active issuers without a heavy direct-sales cost structure.
- checkName: Model breaks if
  finding: If repeat windows do not materialize and ARPU stays near first-window pricing, the downside case turns cash negative before the next financing milestone.
- checkName: Next-round proof
  finding: Reaching 15-20 paid issuer programs, 2+ referral partners, and documented reserve-price workflow adoption is the evidence package that supports the next round.
sanityChecks:
  ruleOf40: Y3 growth 369% + EBITDA margin 11% = 380% (mathematically strong but flattered by the small Y2 revenue base).
  burnMultiple: Y2 burn multiple ≈ 1.1x (net burn $1.24M / net new revenue $1.13M), then turns cash-generative in H2 Y3.
  revenuePerFte: $411K Y3 using Q4Y3 15 FTE (benchmark roughly $200K-$400K vertical SaaS; slightly above range but plausible with partner-led GTM).
  flags:
  - Y3 assumes repeat programs and annual packaging lift mature ARPU to $140K, well above first-window project pricing alone.
  - Customer counts represent active issuer relationships, so actual revenue recognition may be lumpier than this smoothed planning view.
  - The model assumes only moderate churn even though tender frequency is still unproven for many beachhead issuers.
  - Positive Y3 EBITDA depends on holding headcount to 15 FTE while partner channels continue to supply most new demand.
