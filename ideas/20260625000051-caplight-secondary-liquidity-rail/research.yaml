  adoptionFrictionMatrix:
    - friction: Handing a sensitive cap table and tender process to a new vendor
      severity: high
      affectedBuyer: CFO and associate GC
      mitigation: Start partner-led and white-glove, with audit trails and role-based controls that complement existing counsel and broker workflows.
      sourceRefs:
        - 3
        - 10
        - 16
        - 33
    - friction: Defending price bands and fairness to the board and sellers
      severity: high
      affectedBuyer: CFO and board
      mitigation: Anchor reserve-price support in 409A timing, recent financings, and external secondary data instead of only broker anecdotes.
      sourceRefs:
        - 2
        - 6
        - 11
        - 18
        - 32
    - friction: Crossing into regulated solicitation or execution
      severity: high
      affectedBuyer: Legal co-sponsor
      mitigation: Keep distribution and money movement with licensed partners; position the product as readiness, approvals, and workflow infrastructure.
      sourceRefs:
        - 7
        - 21
        - 30
        - 31
    - friction: Events are episodic, so teams may resist buying net-new software
      severity: medium
      affectedBuyer: CFO
      mitigation: Package the product for repeat windows and ad hoc transfer requests, not just a single one-off tender.
      sourceRefs:
        - 14
