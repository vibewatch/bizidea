competitors:
  - name: Carta
    stage: incumbent
    wedge: Cap table, 409A, and integrated company-run tender workflows
    pricing: Custom / not public for liquidity; plan-led platform pricing elsewhere
    strength: Owns issuer records and can update cap tables, taxes, and shareholder communications inside one system
    weaknessVsUs: Best positioned for Carta-native execution, but not obviously the neutral cross-partner readiness layer for every issuer and advisor team
    sourceRefs:
      - 3
      - 4
      - 6
  - name: Nasdaq Private Market
    stage: incumbent
    wedge: Company-sponsored liquidity programs, private-share data, and settlement infrastructure
    pricing: Custom / not public
    strength: Large installed base in liquidity programs, institutional-grade data, and end-to-end settlement support
    weaknessVsUs: Feels heavier and more execution-centric than a lightweight issuer workspace that starts before a broker-led launch
    sourceRefs:
      - 10
      - 11
      - 13
      - 15
  - name: Forge
    stage: scale-up
    wedge: Private-share marketplace, indicative pricing, and company liquidity programs
    pricing: Custom / not public
    strength: Combines market access, price signals, and company-liquidity support on one branded platform
    weaknessVsUs: Optimized for trading and program execution, not specifically for internal rights modeling and approval choreography before launch
    sourceRefs:
      - 16
      - 17
      - 18
      - 19
      - 20
  - name: EquityZen
    stage: incumbent
    wedge: Issuer-first private-share marketplace with accredited-investor access and now Morgan Stanley scale
    pricing: 2.5% seller fee and 2.5% buyer fee on standard marketplace transactions
    strength: Strong investor distribution, recognized consumer brand, and lower public fee points after the Morgan Stanley acquisition
    weaknessVsUs: Marketplace-oriented and still dependent on issuer approval, leaving internal readiness and audit-trail work outside the product core
    sourceRefs:
      - 21
      - 22
      - 23
      - 24
  - name: Caplight
    stage: scale-up
    wedge: Venture-secondary data, live transaction flow, and institutional private-market infrastructure
    pricing: Custom / not public
    strength: Deep data coverage, institutional distribution, and explicit API/MCP positioning
    weaknessVsUs: Built for investors and market intelligence first, not the CFO/legal command center that assembles a clean tender packet
    sourceRefs:
      - 1
      - 2
      - 34
regulatoryTechnicalConstraints:
  - point: Rule 701 remains the baseline exemption for compensatory equity issuance, with additional disclosures above the $10 million threshold and continued restricted-security limits.
    sourceRefs:
      - 4
      - 5
  - point: Private-company equity programs need current 409A support, especially after financing rounds or other material events that could invalidate an earlier valuation.
    sourceRefs:
      - 6
  - point: Any product that appears to solicit buyers or effect transactions risks broker-dealer issues and should keep execution with licensed partners.
    sourceRefs:
      - 7
      - 21
  - point: Cash self-tenders may now use a shorter window in some cases, but tender rules and disclosure obligations remain highly technical.
    sourceRefs:
      - 30
      - 31
      - 33
  - point: Premiums in insider-heavy employee tenders can be treated as compensation rather than capital gains if poorly structured.
    sourceRefs:
      - 32
validationSignals:
  - point: Nasdaq Private Market markets 1,000+ liquidity programs and 250K+ employee shareholders, confirming that issuer-sponsored liquidity is already a scaled behavior.
    sourceRefs:
      - 10
      - 14
  - point: Carta says it has unlocked more than $14B of liquidity and highlights that tender administration can move from manual to automated.
    sourceRefs:
      - 3
  - point: Caplight’s Series A release shows institutional buyers already consuming private-market workflows by platform, API, and MCP server.
    sourceRefs:
      - 1
  - point: Morgan Stanley’s acquisition of EquityZen and immediate fee reduction shows large incumbents expect sustained transaction volume in private shares.
    sourceRefs:
      - 21
  - point: Operators interviewed by TechCrunch argue that formal, repeat liquidity programs improve retention and cap-table visibility versus ad hoc selling.
    sourceRefs:
      - 27
openQuestions:
  - What share of U.S. Series C-E software companies actually run a structured employee tender at least once every 24 months?
  - How much pre-launch work can be standardized before law firms or brokers see the product as disintermediating billable or execution work?
  - Which non-Carta cap-table and document systems must be integrated to win the first 20 design partners?
  - What evidence will boards require to trust software-generated reserve-price bands without a full bespoke banker process?
