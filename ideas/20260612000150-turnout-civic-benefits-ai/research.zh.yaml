categoryDynamics:
  growthRate: LTD 新单近期增长基本持平；工作流现代化增速快于保费增速
  growthRateSourceRefs: [7]
  tailwinds:
    - point: AI 已在相邻福利维权领域承担候线、追档案和申请工作。
      sourceRefs: [1]
    - point: SSDI 工作流复杂性持续存在——一个月度逐州工作量数据集已在大规模更新，说明需求稳定。
      sourceRefs: [4]
    - point: 险企仍需向雇主提供职场福利以支撑留才叙事，对理赔服务改进保持关注。
      sourceRefs: [7]
  headwinds:
    - point: 抵扣做法受到监管约束，至少在部分州体制下不得依赖政府福利估算金额。
      sourceRefs: [3]
    - point: 被保人和律师对追偿和抵扣纠纷高度敏感，粗放自动化可能引发强烈反弹。
      sourceRefs: [37, 38]
competitors:
  - name: Allsup
    stage: incumbent
    wedge: 大规模 SSDI 代理，配合 LTD 协调、Medicare 支持和回归工作服务。
    pricing: 未公开
    strength: 已验证的规模、险企熟悉度、追偿协调和强大的代理结果。
    weaknessVsUs: 在转介前的早期承保商嵌入式证据采集操作系统方面定位不够清晰。
    sourceRefs: [16, 17, 18]
  - name: Brown & Brown Absence Services Group
    stage: incumbent
    wedge: 面向险企的 SSDI 维权和理赔管理组合，含 Claim Compass 预测模型。
    pricing: 未公开
    strength: 深厚的险企分发、预测裁定时机模型和广泛的残疾服务。
    weaknessVsUs: 产品组合广度和服务基因，使其难以呈现一个专为 SSDI 早期激活打造的窄版被保人授权工作流层。
    sourceRefs: [21, 23]
  - name: Advocator Advantage
    stage: incumbent
    wedge: 面向 Brown & Brown 旗下被保人的 SSDI、Medicare 和 Ticket-to-Work 导航。
    pricing: 未公开
    strength: 广泛的裁定后和福利邻近支持，可让被保人在首次申请后持续参与。
    weaknessVsUs: 证据更多指向被保人支持广度，而非深度的承保商运营系统嵌入。
    sourceRefs: [27, 28, 30]
  - name: Claimify
    stage: scale-up
    wedge: 数字优先的 SSDI 申请体验。
    pricing: 未公开
    strength: 比传统维权律所更简洁的软件主导被保人入组叙事。
    weaknessVsUs: 险企侧工作流集成、持牌升级处理深度或抵扣专属运营指标的公开证据稀少。
    sourceRefs: [31]
  - name: Majesco
    stage: incumbent
    wedge: 核心险企理赔软件和业务转型工具。
    pricing: 未公开
    strength: 现有险企 IT 覆盖和理赔现代化买家的信誉。
    weaknessVsUs: 通用理赔核心与具备档案追踪和例外路由的被保人专属 SSDI 维权层不是同一回事。
    sourceRefs: [34]
regulatoryTechnicalConstraints:
