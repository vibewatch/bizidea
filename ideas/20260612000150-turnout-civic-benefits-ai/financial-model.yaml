scenarios:
  downside:
    description: "One pilot slips conversion, sales cycles move closer to 12 months, and advocate-heavy delivery pulls gross margin down."
    y3RevenueK: 3960.0
    y3EbitdaK: 780.0
    cashLowPointK: 680.0
    keyAssumptionChanges:
      - "Production cohort ARPU falls to about 450K."
      - "Gross margin compresses to 62%."
      - "Y3 exits at 11 active cohorts instead of 15."
  base:
    description: "Three pilots land, two logos expand cohort-by-cohort in Y2, and a third-plus logo lands during Y3."
    y3RevenueK: 5940.0
    y3EbitdaK: 1990.0
    cashLowPointK: 1496.0
    keyAssumptionChanges:
      - "Pilot price stays at 120K and production cohort ARPU reaches 495K."
      - "Gross margin holds at the 70% business-plan target."
      - "Active cohorts rise from 3 at Y1 end to 15 at Y3 end."
  upside:
    description: "All three pilots convert on time, first-logo expansion happens one quarter faster, and the fourth logo lands before Q4Y3."
    y3RevenueK: 6930.0
    y3EbitdaK: 2580.0
    cashLowPointK: 1580.0
    keyAssumptionChanges:
      - "Production cohort ARPU reaches about 540K through better success-fee capture."
      - "Y3 exits at 17 active cohorts."
      - "Gross margin improves modestly to 73% as implementation gets repeatable."
