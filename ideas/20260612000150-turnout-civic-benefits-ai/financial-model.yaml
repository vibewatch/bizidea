date: '2026-06-12'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: month
    source: "[BP date] Base case begins the month after the 2026-06-12 plan date."
  - id: A2
    name: "Starting cash after pre-seed close"
    value: "2.2"
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M] Base case uses a disciplined low-middle pre-seed close."
  - id: A3
    name: "Customer definition"
    value: "1 paid cohort contract"
    unit: unit
    source: "[BP gtm.pricing; BP gtm.wedge] The model counts paid SSDI workflow cohorts because the company lands and expands cohort by cohort inside each carrier logo."
  - id: A4
    name: "Paid pilot price"
    value: "120.0"
    unit: USDK per 120-day pilot
    source: "[BP gtm.pricing $75k-$150k] Base case uses the midpoint of the pilot range."
  - id: A5
    name: "Steady-state production cohort ARPU"
    value: "495.0"
    unit: USDK per cohort-year
    source: "[BP market.som] Uses 150 managed files per cohort x roughly $3,300 realized revenue per file once pilots convert and expand."
  - id: A6
    name: "Gross margin"
    value: "70"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct] COGS covers advocate escalations, records retrieval, and claimant-support delivery."
  - id: A7
    name: "Y1 cohort ramp"
    value: "Pilot 1 M4 to production M8; Pilot 2 M7 to production M11; Pilot 3 M10 to production M14"
    unit: timing
    source: "[BP milestones 0–12 months] Matches three paid pilots and early proof of conversion potential."
  - id: A8
    name: "Y2 quarter-end active cohorts"
    value: "Q1Y2 3; Q2Y2 5; Q3Y2 7; Q4Y2 9"
    unit: count
    source: "[BP milestones 12–24 months] Assumes two production logos add adjacent cohorts once repeatable integrations exist."
  - id: A9
    name: "Y3 quarter-end active cohorts"
    value: "Q1Y3 10; Q2Y3 12; Q3Y3 13; Q4Y3 15"
    unit: count
    source: "[BP milestones 24–36 months; BP market.som] Reaches roughly 12 full-year cohort equivalents and 1,800 managed files annually across 3-4 logos."
  - id: A10
    name: "Monthly churn"
    value: "1.2"
    unit: percent
    source: "[Startup-finance heuristic] Sticky enterprise workflow contracts should churn slowly, but concentration risk keeps the base case above mature SaaS churn."
  - id: A11
    name: "Founder and core team loaded payroll"
    value: "Founder CEO 168.0; Founding eng 192.0; Benefits operations lead 156.0; Solutions engineer 168.0; Partnerships lead 156.0"
    unit: USDK per year
    source: "[BP team] Loaded cash compensation uses lean but recruitable startup salaries plus payroll burden."
  - id: A12
    name: "Y2 added hires and loaded payroll"
    value: "Workflow operations specialist 120.0 in M14; Product and data engineer 180.0 in M17; Account executive 168.0 in M21"
    unit: USDK per year
    source: "[BP team; BP sequencingRationale] Adds delivery, analytics, and GTM capacity only after pilots are live."
  - id: A13
    name: "Y3 added hires and loaded payroll"
    value: "Customer success manager 132.0 in M27; Senior workflow engineer 192.0 in M31"
    unit: USDK per year
    source: "[BP milestones 24–36 months] Adds retention and engineering depth once multi-logo expansion is underway."
  - id: A14
    name: "Functional payroll allocation"
    value: "Founder 70% S&M / 30% G&A; engineers 100% or majority R&D; benefits ops 40% R&D / 60% G&A; customer success 60% S&M / 40% G&A"
    unit: allocation
    source: "[BP team rationales] Allocation follows founder-led sales, workflow build-out, implementation, and customer retention ownership."
  - id: A15
    name: "Non-payroll operating spend"
    value: "S&M 7K monthly through M8, 12K through M20, 20K afterward; R&D 9K through M5, 12K through M16, 15K through M30, 18K afterward; G&A 12K through Y1, 14K in Y2, 18K in Y3"
    unit: USDK per month
    source: "[Startup-finance heuristic] Reflects enterprise travel, compliance, cloud, insurance, and security spend for a regulated workflow startup."
  - id: A16
    name: "CAC per production cohort"
    value: "120.0"
    unit: USDK
    source: "[BP gtm.funnelTargets] Founder-led enterprise sales with long buyer reviews but high cohort ACV supports a six-figure CAC."
  - id: A17
    name: "Cash conversion policy"
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] The model assumes no debt, taxes, capex, or material working-capital swings."
  - id: A18
    name: "Funding milestone"
    value: "Reach two production logos, six active production cohorts, and two repeatable integration patterns with six months of buffer"
    unit: milestone
    source: "[BP milestones 12–24 months; BP fundingAsk runwayMonths] Used to size the pre-seed ask and runway target."
