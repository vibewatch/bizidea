modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target carrier accounts] --> Pilots[Paid pilot cohorts]
      Pilots --> Production[Production cohorts]
      Production --> Files[Managed claimant files]
      Files --> Revenue[Platform + per-file + success fees]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash for hiring and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from expanding three initial pilots into 15 paid cohorts across 3-4 carrier logos at about 495K steady-state cohort ACV."
  - checkName: "Must go right"
    finding: "At least two of the first three pilots must convert and each production logo must add adjacent cohorts instead of stalling at a single team."
  - checkName: "Model breaks if"
    finding: "The downside case appears when sales cycles stretch toward 12 months or delivery turns services-heavy enough to push gross margin down to the low 60s."
  - checkName: "Next-round proof"
    finding: "The next financing should be underwritten by two production logos, repeatable integrations, and revenue that is mostly production-cohort rather than pilot fee driven."
sanityChecks:
  ruleOf40: "Y3 growth 121.5% + EBITDA margin 33.5% = 155.0%"
  burnMultiple: "Approx. 0.4x in Y1 versus ending ARR build, then non-meaningful after Q3Y2 because EBITDA turns positive."
  revenuePerFte: "$660K Y3 on about 9.0 average FTE (above the $200–400K SaaS benchmark because contracts are high-ACV enterprise cohorts)."
  flags:
    - "Base case assumes the company expands from three pilot cohorts to 15 paid cohorts by Y3; missing one major logo expansion would materially delay the SOM path."
    - "The 70% margin target only holds if licensed-advocate escalations stay exception-based rather than becoming a large delivery function."
    - "Revenue concentration stays high because a small number of carrier logos still drive most cohort volume even after contract-level diversification."
