problem: >-
  Group disability insurers only recover SSDI offsets when claimants survive a paperwork-heavy federal process that
  starts with a 70% initial denial rate and long record-chasing cycles. Most carriers hand this work to outsourced SSDI
  advocacy firms or internal case managers late in the claim, creating avoidable reserve drag for the payer and months
  of confusion for the claimant. The real bottleneck is not legal strategy alone; it is continuous evidence collection,
  deadline management, and follow-up across phone calls, forms, and medical records before a human expert ever needs to
  intervene.
targetUser:
  primary: VP of group disability claims or recovery operations at a U.S. disability insurer or TPA with an SSDI offset program
  secondary: Long-leave claimants who are likely SSDI-eligible but struggle to gather records and complete applications without support
  buyer: COO or head of disability claims at a top-20 U.S. group disability carrier or administrator
startupThesis:
  nonObviousInsight: >-
    The breakout opportunity is not another direct-to-consumer benefits app. It is an outcome-linked infrastructure
    layer for institutions that already bear the economic cost of failed claims progression. Turnout's sources show that
    waiting on hold, chasing records, and filling applications are now automatable, which turns SSDI advocacy from a
    labor-heavy services business into a measurable workflow product that carriers can deploy earlier in the claim.
  beachhead: >-
    U.S. group long-term disability insurers and TPAs managing claimants 90-180 days into leave who are probably
    SSDI-eligible, already run offset programs, and still rely on late-stage outsourced advocacy vendors
  wedge: >-
    A claimant-permissioned advocacy OS that gathers medical evidence, drafts SSA application packets, tracks deadlines,
    and routes only denials or judgment-heavy exceptions to licensed advocates inside the carrier's claims workflow
  whyNowCatalyst: >-
    Turnout's $35 million round, fivefold client growth, and workflow-level evidence that AI already handles hold
    times, records chasing, and applications make early-stage SSDI advocacy operationally credible just as denial rates
    and wait times keep manual support painfully expensive.
  ventureScalePath: >-
    Start with SSDI offset recovery for disability carriers, then expand into workers' compensation, veterans
    disability, Medicare enrollment support, Medicaid renewals, and education-accommodation advocacy for employers,
    plans, and public-benefit intermediaries.
solution: >-
  The product sits between the carrier, claimant, and advocacy specialist as an operating system for benefits recovery.
  It continuously collects claimant authorizations, requests medical records, assembles SSA-ready packets, monitors
  deadlines, and keeps a structured audit trail of every touchpoint instead of waiting for a late-stage referral to an
  outside firm. Licensed advocates see only the cases where denials, missing evidence, or claimant complexity require
  human judgment, which improves throughput without removing empathy or compliance safeguards. For the insurer, the
  first ROI is faster offset capture and lower reserve duration; for the claimant, it is less administrative burden and
  a clearer path through a confusing federal process. Over time, the company compounds a dataset on denial reasons,
  evidence gaps, and resolution paths that can raise win rates across adjacent benefits categories.
goToMarketSeed:
  firstCustomer: >-
    A top-20 U.S. group disability insurer or disability TPA with 10,000-plus active long-term disability claimants,
    an existing SSDI offset program, and manual vendor handoffs after month three of leave
  buyingTrigger: >-
    Rising long-duration reserves, backlog in SSDI-eligible claimants, or a renewal cycle where outsourced advocacy
    vendors are missing cycle-time or success-rate targets
  currentAlternative: Outsourced SSDI advocacy law firms, internal nurse or case-management teams, and spreadsheet-led document chasing
  switchingReason: >-
    This wedge starts earlier than external vendors, automates the clerical work that slows every file, preserves human
    escalation for sensitive moments, and ties value directly to faster awards and lower reserve drag rather than just
    billed hours
  pricingHypothesis: >-
    Per-active-claimant platform fee plus success-based pricing on awarded or accelerated SSDI offset outcomes, with
    enterprise minimums for large carrier deployments
