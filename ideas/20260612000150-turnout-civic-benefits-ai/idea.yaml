jobsToBeDone:
  - job: When an LTD claimant becomes likely SSDI-eligible, help my claims team start the advocacy process early, so we can shorten claim duration without adding more case managers.
    currentAlternative: Late referral to an outsourced SSDI advocacy firm plus manual internal follow-up
    successMetric: Days from eligibility flag to complete SSA packet submission
  - job: When medical evidence is incomplete or a claim is denied, help the advocate see exactly what is missing and what to do next, so award probability rises without starting the file over.
    currentAlternative: Email chains, call logs, and manual record-chasing across multiple systems
    successMetric: Higher award rate and lower time-to-resolution for appealed or exception cases
