topRisks:
  - name: Carrier adoption friction
    description: Insurers may hesitate to introduce a new claimant-facing workflow into regulated claims operations without proof that it improves outcomes safely.
    mitigation: Start with one claimant cohort, preserve human approval gates, and report reserve-impact and cycle-time metrics side by side with the incumbent vendor process.
  - name: Advocacy-compliance boundary
    description: The line between workflow automation, licensed advocacy, and legal advice could limit how far the product can automate sensitive claim steps.
    mitigation: Keep automation focused on evidence, deadlines, and packet assembly while escalating denials and judgment-heavy interactions to licensed specialists with clear audit logs.
  - name: Data-access bottlenecks
    description: Medical-record retrieval delays and weak integration into carrier claims systems could slow time-to-value even if the software works.
    mitigation: Launch with overlay workflows, standardized claimant authorizations, and a narrow set of high-volume record sources before expanding deeper integrations.
