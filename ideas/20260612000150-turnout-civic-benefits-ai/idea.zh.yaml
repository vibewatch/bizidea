problem: >-
  团体残疾险承保商只有在被保人熬过一套文书繁重的联邦流程后才能追回 SSDI 抵扣款——而该流程首次拒绝率高达 70%，追踪档案的周期也漫长。
  多数险企将这项工作外包给 SSDI 维权服务商，或在理赔后期才由内部案件经理接手，导致赔付方出现可避免的准备金占压，被保人则陷入数月混乱。
  真正的瓶颈不仅仅是法律策略；而是在人工专家介入之前，持续完成证据收集、截止日期管理，以及跨电话、表单和病历的跟进工作。
targetUser:
  primary: 美国残疾险承保商或 TPA 中主管 SSDI 抵扣项目的团体残疾理赔或追偿运营 VP
  secondary: 可能符合 SSDI 条件但难以自行整理档案、完成申请的长期留案被保人
  buyer: 美国前 20 大团体残疾险承保商或管理机构的 COO 或残疾理赔负责人
startupThesis:
  nonObviousInsight: >-
    真正的突破机会不是又一款面向消费者的福利应用，而是为那些已经承担理赔失败经济代价的机构提供一个与结果挂钩的基础设施层。
    Turnout 的数据表明：排队候线、追踪档案、填写申请均已可自动化——这让 SSDI 维权从劳动密集型服务业务，变成险企可在早期部署的、可量化的工作流产品。
  beachhead: >-
    美国团体长期残疾险承保商及 TPA：管理进入休假 90—180 天、可能符合 SSDI 条件的被保人，已有抵扣项目，但仍依赖后期外包维权服务商
  wedge: >-
    一套由被保人授权的维权操作系统，负责收集医疗证据、起草 SSA 申请材料包、追踪截止日期，并将拒绝裁定或判断类例外情况路由给险企理赔工作流中的持牌专员
  whyNowCatalyst: >-
    Turnout 完成 3500 万美元融资，客户量五倍增长，且在工作流层面已有证据——AI 现在能处理候线、追档案、填申请——让 SSDI 维权的早期介入在运营上切实可行，而拒绝率和等待时间仍使人工支持代价高昂。
  ventureScalePath: >-
    从残疾险承保商的 SSDI 抵扣追偿起步，随后扩展至工伤赔偿、退伍军人残疾、Medicare 参保支持、Medicaid 续保，以及雇主、保险计划和公共福利中介的教育合理安排维权。
solution: >-
  产品以操作系统的形式嵌入承保商、被保人与维权专员之间，持续收集被保人授权、请求病历、组装符合 SSA 要求的材料包、监控截止日期，并对每个接触点保留结构化审计记录——而非等到后期才将案件转给外部服务商。
  持牌专员只处理需要人工判断的案件——拒绝裁定、缺失证据或被保人情况复杂，从而在不牺牲共情或合规保障的前提下提升吞吐量。
  对险企而言，首要 ROI 是更快追回抵扣款、缩短准备金占用周期；对被保人而言，是减少行政负担、在一个令人困惑的联邦流程中看清方向。
  随着时间推移，公司将积累一套关于拒绝原因、证据缺口和解决路径的数据集，有望提升相邻福利类别的胜诉率。
goToMarketSeed:
  firstCustomer: >-
    美国前 20 大团体残疾险承保商或残疾 TPA，拥有 1 万名以上在保长期残疾被保人、现有 SSDI 抵扣项目，以及在休假第三个月后将案件手工移交外部服务商的流程
  buyingTrigger: >-
    长期准备金攀升、SSDI 符合条件被保人积压，或外包维权服务商在周期时间或成功率指标上表现欠佳的合同续签节点
  currentAlternative: 外包 SSDI 维权律所、内部护士或案件管理团队，以及电子表格主导的文件追踪
  switchingReason: >-
    本产品比外部服务商介入更早、自动化所有拖慢案件文书工作，保留敏感环节的人工升级通道，并将价值直接锚定在更快裁定和更低准备金占压上——而非仅仅是计费工时
  pricingHypothesis: >-
    按活跃被保人收取平台费，加上对已裁定或加速 SSDI 抵扣结果的成功定价，大型承保商部署附设企业底价
whyNow:
  - point: 70% 首次拒绝率和漫长等待使 SSDI 工作流代价高昂——任何承担理赔周期的机构，早期、结构化介入都能立即产生 ROI。
    signalRefs: [福利申请摩擦高、体量大]
    sourceRefs: [1]
  - point: AI 已不再局限于辅导消费者；它正在实际执行主导维权成本的事务性动作，包括候线、档案检索和表单填写。
    signalRefs: [AI 已能执行事务性维权循环]
    sourceRefs: [2]
  - point: 客户量五倍增长和超 1000 万分钟维权记录表明，这一模式已从新奇事物演变为被信任的生产行为。
    signalRefs: [混合维权模式正在规模化落地]
    sourceRefs: [1]
  - point: 扩展至医疗和教育意味着：胜出的公司可以在 SSDI 跑通后，将同一套权限、档案和升级处理体系复用于多个权益领域。
    signalRefs: [维权平台可横向扩展至相邻权益领域]
    sourceRefs: [2]
differentiator: >-
  传统 SSDI 维权服务商以工时计费，通常在案件已经混乱后才介入。面向消费者的福利应用则难以找到可靠的付款方，也难以融入决定证据能否按时收集的工作流。
  本公司从经济紧迫性最高处切入：嵌入承保商的理赔运营，产品边界收窄于证据采集、申请组装和例外路由。其护城河来自险企专属的周期时间数据、拒绝模式智能，以及让工作流比通用呼叫中心或 RPA 服务商更难被替换的嵌入式钩子。
