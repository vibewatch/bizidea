jobsToBeDone:
  - job: 当 LTD 被保人很可能符合 SSDI 条件时，帮助我的理赔团队尽早启动维权流程，让我们在不增加案件经理的情况下缩短理赔周期。
    currentAlternative: 晚期才转给外包 SSDI 维权律所，加上内部人工跟进
    successMetric: 从资格标记到完整 SSA 材料包提交的天数
  - job: 当医疗证据不完整或理赔被拒时，帮助专员精确看到缺什么、下一步做什么，从而提升裁定概率，无需从头重建案件。
    currentAlternative: 邮件链、通话记录和跨多系统的人工追档
    successMetric: 上诉或例外案件的更高裁定率和更短解决周期
