topRisks:
  - name: 险企采用摩擦
    description: 险企可能犹豫是否在受监管的理赔运营中引入新的面向被保人的工作流，直到有证据表明其安全地改善了结果。
    mitigation: 从单一被保人队列起步，保留人工审批门控，并将准备金影响和周期时间指标与现有服务商流程并排展示。
  - name: 维权合规边界
    description: 工作流自动化、持牌维权与法律建议之间的边界，可能限制产品自动化敏感理赔步骤的空间。
    mitigation: 将自动化聚焦于证据、截止日期和材料包组装，将拒绝裁定和判断类交互升级给持牌专员，并保留清晰的审计日志。
  - name: 数据访问瓶颈
    description: 病历检索延迟和与承保商理赔系统的弱集成，即便软件本身有效，也可能拖慢价值兑现时间。
    mitigation: 先以叠加工作流、标准化被保人授权和一组高频档案来源启动，再扩展更深层的集成。
