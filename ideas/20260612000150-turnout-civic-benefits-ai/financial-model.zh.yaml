slug: ssdi-offset-advocacy-os
date: '2026-06-12'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: month
    source: "[BP date] 基准情景从计划日期 2026-06-12 的次月开始。"
  - id: A2
    name: "种子前融资到账后的初始现金"
    value: "2.2"
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M] 基准情景取偏低的中间值。"
  - id: A3
    name: "客户定义"
    value: "1 份付费队列合同"
    unit: unit
    source: "[BP gtm.pricing; BP gtm.wedge] 模型按付费 SSDI 工作流队列计算客户数，因公司在每个险企标杆客户内逐队列落地和扩展。"
  - id: A4
    name: "付费试点价格"
    value: "120.0"
    unit: USDK per 120-day pilot
    source: "[BP gtm.pricing $75k-$150k] 基准情景取试点区间中点。"
  - id: A5
    name: "稳态生产队列 ARPU"
    value: "495.0"
    unit: USDK per cohort-year
    source: "[BP market.som] 每队列 150 个托管案件 × 约 3300 美元已实现收入（试点转化并扩展后的平台加成功联动费）。"
  - id: A6
    name: "毛利率"
    value: "70"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct] 销售成本涵盖专员升级处理、档案检索和被保人支持交付。"
  - id: A7
    name: "Y1 队列爬坡"
    value: "试点 1：M4 启动，M8 转生产；试点 2：M7 启动，M11 转生产；试点 3：M10 启动，M14 转生产"
    unit: timing
    source: "[BP milestones 0–12 months] 对应三个付费试点和早期转化验证。"
  - id: A8
    name: "Y2 季末活跃队列数"
    value: "Q1Y2 3；Q2Y2 5；Q3Y2 7；Q4Y2 9"
    unit: count
    source: "[BP milestones 12–24 months] 假设两个生产标杆客户在可复用集成建立后各自增加相邻队列。"
  - id: A9
    name: "Y3 季末活跃队列数"
    value: "Q1Y3 10；Q2Y3 12；Q3Y3 13；Q4Y3 15"
    unit: count
    source: "[BP milestones 24–36 months; BP market.som] 达到约 12 个全年队列等价量，跨 3—4 个标杆客户共约 1800 个年度托管案件。"
  - id: A10
    name: "月流失率"
    value: "1.2"
    unit: percent
    source: "[Startup-finance heuristic] 企业工作流合同黏性强应缓慢流失，但集中度风险使基准情景高于成熟 SaaS 流失率。"
  - id: A11
    name: "创始团队税后含福利薪酬"
    value: "创始人/CEO 168.0；联合创始工程师 192.0；福利运营负责人 156.0；解决方案工程师 168.0；合作关系负责人 156.0"
    unit: USDK per year
    source: "[BP team] 含薪资附加成本，采用精简但有竞争力的创业期薪资水平。"
  - id: A12
    name: "Y2 新增人员及薪酬"
    value: "工作流运营专员 120.0（M14）；产品与数据工程师 180.0（M17）；客户主管 168.0（M21）"
    unit: USDK per year
    source: "[BP team; BP sequencingRationale] 仅在试点上线后才添加交付、分析和 GTM 人员。"
  - id: A13
    name: "Y3 新增人员及薪酬"
    value: "客户成功经理 132.0（M27）；高级工作流工程师 192.0（M31）"
    unit: USDK per year
    source: "[BP milestones 24–36 months] 多标杆客户扩张启动后才增加留存和工程深度。"
  - id: A14
    name: "职能薪资分配"
    value: "创始人 70% 销售市场 / 30% 行政管理；工程师 100% 或主要研发；福利运营 40% 研发 / 60% 行政管理；客户成功 60% 销售市场 / 40% 行政管理"
    unit: allocation
    source: "[BP team rationales] 分配遵循创始人主导销售、工作流构建、实施和客户留存的职责归属。"
  - id: A15
    name: "非薪资运营支出"
    value: "销售市场：M8 前每月 7K，M20 前 12K，之后 20K；研发：M5 前每月 9K，M16 前 12K，M30 前 15K，之后 18K；行政管理：Y1 每月 12K，Y2 14K，Y3 18K"
    unit: USDK per month
    source: "[Startup-finance heuristic] 反映受监管工作流初创企业的企业差旅、合规、云服务、保险和安全支出。"
  - id: A16
    name: "每生产队列 CAC"
    value: "120.0"
    unit: USDK
    source: "[BP gtm.funnelTargets] 创始人主导的企业销售加上漫长的买家评审周期，但高队列 ACV 支撑六位数 CAC。"
  - id: A17
    name: "现金转换政策"
    value: "EBITDA 近似现金变动"
    unit: policy
    source: "[Startup-finance heuristic] 模型假设无债务、无税负、无资本支出、无重大营运资本波动。"
  - id: A18
    name: "融资里程碑"
    value: "达到两个生产标杆客户、六个活跃生产队列和两种可复用集成模式，且保有六个月缓冲现金"
    unit: milestone
    source: "[BP milestones 12–24 months; BP fundingAsk runwayMonths] 用于确定种子前融资规模和跑道目标。"
