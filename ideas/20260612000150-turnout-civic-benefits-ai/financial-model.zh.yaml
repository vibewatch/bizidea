modelDiagram:
  title: 单元经济流程
  mermaid: |
    flowchart LR
      Accounts[目标险企客户] --> Pilots[付费试点队列]
      Pilots --> Production[生产队列]
      Production --> Files[托管被保人案件]
      Files --> Revenue[平台费＋单案费＋成功费]
      Revenue --> GrossProfit[70% 毛利]
      GrossProfit --> Cash[现金支撑招聘与跑道]
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景收入来自将三个初始试点扩展为 15 个付费队列，跨 3—4 个险企标杆客户，稳态队列 ACV 约 49.5 万美元。"
  - checkName: "必须做对的事"
    finding: "前三个试点中至少两个必须转化，每个生产标杆客户必须增加相邻队列而非停在单一团队。"
  - checkName: "模型破裂条件"
    finding: "当销售周期拉长至 12 个月，或交付变成服务密集型推动毛利率降至 60% 出头时，下行情景出现。"
  - checkName: "下轮融资证明"
    finding: "下一轮融资应以两个生产标杆客户、可复用集成和以生产队列收入为主而非试点费为主的收入结构来支撑。"
sanityChecks:
  ruleOf40: "Y3 增长率 121.5% ＋ EBITDA 利润率 33.5% ＝ 155.0%"
  burnMultiple: "Y1 相对期末 ARR 积累约 0.4 倍，Q3Y2 后 EBITDA 转正则无实际意义。"
  revenuePerFte: "Y3 约 9.0 平均全职人员产出 66 万美元（高于 20—40 万美元的 SaaS 基准——因合同为高 ACV 企业队列）。"
