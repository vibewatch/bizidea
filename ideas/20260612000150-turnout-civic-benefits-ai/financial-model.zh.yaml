scenarios:
  downside:
    description: "一个试点延迟转化，销售周期接近 12 个月，专员密集的交付拉低毛利率。"
    y3RevenueK: 3960.0
    y3EbitdaK: 780.0
    cashLowPointK: 680.0
    keyAssumptionChanges:
      - "生产队列 ARPU 降至约 45 万美元。"
      - "毛利率压缩至 62%。"
      - "Y3 末活跃队列数降至 11 个而非 15 个。"
  base:
    description: "三个试点落地，两个标杆客户在 Y2 逐队列扩展，第三个以上标杆客户在 Y3 签约。"
    y3RevenueK: 5940.0
    y3EbitdaK: 1990.0
    cashLowPointK: 1496.0
    keyAssumptionChanges:
      - "试点价格维持 12 万美元，生产队列 ARPU 达到 49.5 万美元。"
      - "毛利率维持在商业计划 70% 目标。"
      - "活跃队列从 Y1 末 3 个增至 Y3 末 15 个。"
  upside:
    description: "三个试点全部按时转化，第一个标杆客户扩展提前一个季度，第四个标杆客户在 Q4Y3 前签约。"
    y3RevenueK: 6930.0
    y3EbitdaK: 2580.0
    cashLowPointK: 1580.0
    keyAssumptionChanges:
      - "生产队列 ARPU 因更好的成功费捕获达到约 54 万美元。"
      - "Y3 末活跃队列数达到 17 个。"
      - "随着实施标准化，毛利率小幅提升至 73%。"
