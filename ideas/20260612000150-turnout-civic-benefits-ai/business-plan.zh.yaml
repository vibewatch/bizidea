slug: ssdi-offset-advocacy-os
date: '2026-06-12'
executiveSummary: >-
  SSDI 抵扣维权操作系统应以叠加式工作流产品起步，服务于已有 SSDI 抵扣项目、却将被保人转交外部服务商过晚的大型美国团体残疾险承保商和 TPA。
  紧迫的痛点是：可能符合 SSDI 条件的 LTD 案件带着不完整的档案、糟糕的跟进记录进入联邦流程，加之 70% 首次拒绝率，造成准备金占压和被保人混乱。
  MVP 应收集被保人授权、请求病历、组装符合 SSA 要求的材料包，并将拒绝裁定或判断类例外情况路由给持牌专员，同时保留险企现有的理赔核心系统。
  这个滩头阵地比宽泛的福利导航平台更窄、更快验证——因为买家已有 SSDI 协调预算，工作流有明确的前后对照指标，一个标杆客户就能提供数百个同类案件。
  首个 GTM 动作应在外包服务商续签、准备金审查或积压激增时，瞄准残疾理赔或追偿运营 VP，出售与材料包完成率、周期时间和裁定进展挂钩的付费队列试点。
  研究支持约 1.8 亿美元的估算 TAM、5400 万美元的 SAM 以及 600 万美元的第 3 年模型 SOM，但现有服务商的单案定价和被保人量数据仍不完整，应视为假设而非既定预算事实。
  最大的否定性风险是：险企不允许更早的面向被保人的叠加层，或早期证据采集无法充分改善裁定速度，不足以超越现有服务商和内部团队。
  前 12 个月因此需要验证一个核心命题：叠加式工作流可在不替换核心系统的情况下上线，更早完成 SSA 材料包，并将这一速度优势转化为更快的抵扣追偿或更低的人工案件管理成本。
problem:
  - "险企在被保人带着不完整证据、低进展可见度过晚进入联邦流程时，承受准备金占压和抵扣漏损。"
  - "现有替代方案将工作流分散在内部案件经理、电子表格和外包维权律所之间，导致没有人在险企的运营节奏内真正掌管早期追档、截止日期管理和例外路由。"
solution:
  - "上线一套由被保人授权的工作流层，从 LTD 休假第 3—6 个月左右启动，收集授权、请求档案、起草 SSA 申请材料包，并在转介质量恶化前追踪每一项未完成任务。"
  - "将拒绝裁定、上诉及需要共情的被保人沟通保留给持牌专员，同时软件标准化事务性执行、审计记录，以及承保商侧对材料包状态、周期时间和裁定进展的可见度。"
whyWeWin:
  - "切入点在于经济紧迫性最高处：嵌入承保商理赔运营——那里已为 SSDI 协调付钱，且能量化准备金影响——而非在仍需寻找付款方的消费者应用里。"
  - "现有维权律所擅长转介后的代理，但并不明显拥有决定案件提交前是否干净的早期承保商嵌入式证据编排层。"
  - "若公司比竞争对手更早掌握被保人授权、档案检索时间节点、拒绝原因和升级处理结果，就能构建出难以用通用理赔软件复制的承保商专属时机与工作流手册。"
strategicChoices:
  beachhead: "美国前 20 大团体残疾险承保商和 TPA——为进入休假 90—180 天、可能符合 SSDI 条件的长期残疾被保人运营抵扣项目。"
  wedgeRationale: "这个切入点比宽泛的福利导航平台更快验证：买家已有 SSDI 协调预算，被保人队列在现有 LTD 工作流中可识别，成功可用材料包完成速度、裁定进展和准备金影响量化，而非模糊的参与度指标。"
  sequencingRationale: "先在单一险企队列中作为叠加层运行，再尝试更深层的理赔核心集成或相邻福利线——因为在这个阶段，合规信任和实施速度比覆盖广度更重要。产品范围聚焦于授权、档案、材料包组装和例外路由；GTM 保持创始人主导、瞄准服务商续签或积压节点；招聘在前几个试点转化之前侧重实施和工作流深度。"
  notYet:
    - "没有机构付款方的直接面向消费者福利导航"
    - "以上诉、法律代理或追偿纠纷处理为主要服务线"
    - "险企内部的理赔核心替换项目"
    - "在 SSDI 队列经济模型得到验证前进入相邻的 VA、Medicare、Medicaid 或教育工作流"
market:
  tam: "约 1.8 亿美元估算 TAM——约 20 家大型滩头买家、每家每年约 3000 个 SSDI 符合条件的工作流案件，以及每案约 3000 美元的年度工作流＋维权预算假设。"
  sam: "约 5400 万美元估算 SAM——约 30% 正在积极推进 SSDI 工作流现代化或对现有服务商不满的滩头买家。"
  som: "约 600 万美元第 3 年模型 SOM——3 家险企或 TPA 标杆客户，每家约 600 个活跃案件，混合已实现收入约每托管案件 3300 美元。"
  segments:
    - "主要：拥有在保 LTD 存量、SSDI 抵扣经济利益和现有外包维权服务商的团体残疾险承保商"
    - "次要：为险企或自保雇主项目管理类似 SSDI 协调工作流的残疾 TPA 或缺勤管理机构"
  buyingProcess: >-
    运营端牵头人通常是掌管案件进展和服务商绩效的理赔、追偿或 SSDI 项目负责人；
    经济买家通常是 COO 或残疾理赔负责人，因为价值体现在理赔周期、准备金压力和外部服务商支出上。
    销售应从服务商续签、积压或准备金审查触发点切入，再经过合规、被保人沟通、安全和理赔技术审查——因为产品触及敏感档案和面向被保人的工作流。
product:
  mvp: >-
    MVP 范围是单一 LTD 被保人队列的承保商叠加 SSDI 工作流：
    接收可能符合条件的案件、收集被保人授权、请求并追踪档案、起草符合 SSA 要求的材料包，
    并将拒绝裁定或复杂案件路由给持牌专员，附完整审计记录。
    首个产品胜利是更早、更完整的材料包完成和承保商可见度——不是自主法律判断，人工审批仍保持在环。
  sixMonth: "上线一个包含队列接收、被保人外联、授权收集、档案追踪、材料包状态看板和专员升级工作流的设计伙伴版本，服务一家险企试点。"
  twelveMonth: "将 2—3 个试点转化为年度生产队列，为试点中出现最多的理赔系统和档案服务商组合添加可复用集成，并对材料包周期时间和裁定进展的基线对比 ROI 做好量化。"
  twentyFourMonth: "从 SSDI 材料包早期工作流扩展至承保商专属倾向评分、经理看板和邻近的裁定后协调模块，同时以 SSDI 抵扣追偿为控制节点。"
  keyBets:
    - "可能符合 SSDI 条件的被保人能够在 LTD 周期中足够早地被识别，从而改变结果，而不仅仅是记录后期案件。"
    - "被保人完成授权和档案共享步骤的比例足够高，支撑一个以软件为主导的运营模式。"
    - "险企会在要求完整理赔核心替换之前先采用叠加式工作流。"
    - "更早的材料包完整性和结构化跟进将在时机上充分超越现有服务商，足以证明切换或增加预算的合理性。"
gtm:
  wedge: "向一家险企或 TPA 的可能符合 SSDI 条件的 LTD 被保人队列出售付费试点——在现有服务商介入过晚或积压可见度差的情况下切入，随后在周期时间和裁定进展得到验证后，从一个理赔团队扩展至相邻队列。"
  channels:
    - "创始人主导，直销给大型险企和 TPA 的残疾理赔、追偿及运营负责人"
    - "一个参考部署完成后，与理赔顾问、缺勤服务顾问和工作流现代化合作伙伴联合销售或转介"
    - "与档案检索和维权专员的实施合作，缩短价值兑现时间，而不将公司变成服务主包商"
  funnelTargets: "目标客户→合格工作流评审转化 20—30%，合格评审→付费试点 25—35%，试点→生产队列合同 50%+，生产标杆客户→12 个月内第二队列或相邻模块扩展 60%+。"
  pricing: "第一阶段：约 300—600 名可能符合 SSDI 条件的被保人队列，120 天付费试点定价约 7.5 万—15 万美元；转化后签署年度合同，结合平台底价、按活跃被保人计费的工作流费和对已裁定或加速抵扣结果的成功费——与现有买家绑定在协调成本和追偿价值上的预算匹配。"
businessModel:
  revenueStreams:
    - "单一险企队列的付费试点费"
    - "年度企业平台底价"
    - "按活跃被保人计费的工作流费"
    - "对已裁定或加速 SSDI 抵扣结果的成功费"
  unitOfValue: "处于工作流管理中的活跃可能符合 SSDI 条件的被保人"
  targetGrossMarginPct: 70
  expansionLevers:
    - "从一个理赔队列扩展至同一标杆客户的其他险种线或 TPA 业务"
    - "一旦掌握材料包工作流，添加经理分析、倾向评分和裁定后协调模块"
    - "仅在 SSDI 经济模型可复制后，将权限、档案和升级处理体系复用于相邻权益工作流"
strategyMap:
  northStarMetric: "在项目入组 45 天内完成完整 SSA 材料包提交的已标记 SSDI 符合条件 LTD 被保人比例"
  inputMetrics:
    - "具有活跃服务商续签、积压或准备金压力触发点的合格险企机会数"
    - "入组被保人在 14 天内完成授权的比例"
    - "从队列入组到完整病历材料包的中位天数"
    - "首次材料包审查时无缺失文件例外的案件比例"
    - "按队列计算的持牌专员升级处理率"
    - "按标杆客户计算的试点转化为生产合同比率"
  moatsToBuild:
    - "与工作流步骤挂钩的承保商专属证据缺口和拒绝模式数据集"
    - "按诊断和险企队列改善材料包完整性的档案检索和被保人参与手册"
    - "让工作流在理赔团队内部实现运营黏性的嵌入式集成和审计记录层"
  killCriteria:
    - "前 12 个合格目标客户中少于 2 家同意使用现有 SSDI 协调预算支付试点费用。"
    - "第一个试点中 45 天内完成授权和核心材料包要求的入组被保人不足 70%。"
    - "前 2 个试点未能将材料包周期时间缩短至少 20%，或相比现有服务商或人工基线，无任何可量化的裁定进展改善。"
  mermaid: |
    flowchart LR
      Wedge[险企 SSDI 队列切入] --> MVP[叠加式材料包工作流 MVP]
      MVP --> Proof[更快完成材料包与更清晰裁定进展]
      Proof --> Expansion[多队列推广与分析扩展]
investorMemo:
  verdict:
    call: "值得进一步深入调查"
    conviction: "有真实预算邻近性的有前途企业切入点，但信心取决于能否验证早期叠加采用和相对现有 SSDI 服务商的可量化提升。"
    whyBelieve: "公司瞄准一个窄的险企工作流——痛点可量化、预算已存在，且竞争对手明显更擅长后期代理而非早期证据编排。"
    whyDoubt: "若险企不允许新的面向被保人的叠加层，或更早的材料包工作不能产生比现有服务商更好的时机，计划将迅速削弱。"
    nextDiligence: "验证在一个活跃险企队列中有一个付费试点，其切入时间早于现有服务商移交，且材料包完成速度有实质性提升并通过合规审查。"
  firstCustomer:
    title: "美国前 20 大团体残疾险承保商的残疾理赔或追偿运营 VP"
    profile: "拥有大型 LTD 存量、现有 SSDI 抵扣项目、休假第 3 个月后的人工服务商移交流程，以及长期案件准备金压力明显的险企。"
    trigger: "SSDI 服务商续签、内部准备金审查或积压激增，暴露出过多可能符合条件的被保人带着不完整证据晚期进入流程。"
    buyer: "COO 或残疾理赔负责人"
    initialContract: "7.5 万—15 万美元付费试点（一个理赔队列），若材料包周期时间和裁定进展改善，则转化为约 25 万—75 万美元年度生产合同加单案和成功费。"
  mustBeTrue:
    - "前 10 家合格险企或 TPA 中至少 3 家会从现有 SSDI 协调或追偿预算中支付试点费用。"
    - "第 3—6 个月的 LTD 有意义队列能被足够早地标记，早期工作流介入仍能改变提交时机。"
    - "至少 70% 的入组被保人完成授权和证据步骤的速度足以支撑软件主导流程。"
    - "更早的材料包编排将充分改善周期时间或裁定进展，足以证明切换或增补现有服务商的合理性。"
    - "核心理赔服务商和现有维权机构不会在公司拿下前 3—5 个参考标杆客户之前封堵早期工作流缺口。"
  diligenceQuestions:
    - "前 20 大险企现有 SSDI 维权合同的当前单案支出、成功费结构和续签痛点是什么？"
    - "目标险企活跃 LTD 案件中，第 3、6、12 个月分别有多少比例符合 SSDI 条件？"
    - "哪些被保人授权和外联步骤在材料包完成前造成最高的流失率？"
    - "第一批试点机会中，哪些理赔系统和档案服务商占主导，产品能否每次不做定制集成就以叠加层落地？"
    - "在实际销售中，哪个 KPI 最快锁定预算：材料包周期时间、裁定进展、准备金释放还是内部人力节省？"
operatingAssumptions:
  - assumption: "险企在 SSDI 协调上已有足够支出，工作流层可从现有预算线而非全新转型预算中获得资金。"
    basis: research.yaml
    validationTest: "审查 5 份现有合同或续签资料，确认至少 3 家买家能将试点支出映射到现有 SSDI 协调、追偿或服务商预算。"
    decisionImpact: "若不成立，销售动作将变慢且更具自由裁量性，推动公司转向合作、OEM 或更窄的服务辅助型切入。"
  - assumption: "可能符合 SSDI 条件的 LTD 被保人能在休假周期足够早的时间被识别，从而受益于更早的证据收集。"
    basis: idea.yaml
    validationTest: "从至少 2 家目标险企获取队列数据，了解第 3—6 个月被标记案件的占比，并比较早期与晚期转介的裁定时机。"
    decisionImpact: "若不成立，切入点从早期激活转变为现有服务商的效率工具，差异化程度更低。"
  - assumption: "只要保留人工审批门控和审计记录，面向被保人的叠加式工作流对险企合规和运营团队是可接受的。"
    basis: research.yaml
    validationTest: "与理赔、法务和合规负责人进行 6 次设计评审，并在不要求替换理赔核心系统的前提下获得至少 2 份书面试点批准。"
    decisionImpact: "若不成立，实施摩擦大幅上升，公司须将自身重新定位为白标服务商工具，而非独立工作流产品。"
  - assumption: "更早的材料包完整性相比现有人工或服务商主导流程，能在提交时机或裁定进展上产生可量化的改善。"
    basis: operator judgment
    validationTest: "比较 90—120 天内的基线和试点队列，确认完整材料包周期时间至少缩短 20%，并在提交或裁定进展上出现领先指标提升。"
    decisionImpact: "若不成立，定价和投资者叙事须从与结果挂钩的追偿经济学转向劳动效率软件。"
  - assumption: "持牌专员升级处理能控制监管和执法风险，而不将公司推入低毛利率的服务模式。"
    basis: research.yaml
    validationTest: "与法律顾问逐步梳理每个工作流步骤，确认哪些步骤需要专员审查，并在试点中将专员处理的例外案件占比控制在预设阈值（如托管案件的 25%）以下。"
    decisionImpact: "若不成立，毛利率目标和招聘计划失效，公司应在工作流边界更窄之前避免扩张。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "访谈目标险企和 TPA 的 12—15 位残疾理赔、追偿及 SSDI 项目负责人，聚焦服务商续签和积压痛点。"
    hypothesis: "最快的第一个买家是掌管理赔周期和 SSDI 服务商绩效的运营负责人，而非通用创新预算持有者。"
    successMetric: "至少 8 次访谈确认活跃的痛点触发，3 个客户同意进行范围界定的工作流评审。"
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: "从设计伙伴处收集样本队列数据，测算第 3—6 个月可能符合条件的被保人规模。"
    hypothesis: "单一标杆客户内可触达的被保人队列足够大，支撑一个有意义的付费试点。"
    successMetric: "至少 2 家目标客户显示每年有 300 名以上可能符合 SSDI 条件的被保人可供试点。"
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: "在 25—50 个历史案件上运行人工辅助工作流，量化授权完成率、档案检索瓶颈和材料包组装时间。"
    hypothesis: "最难的操作步骤可以在深度产品集成完成前先标准化。"
    successMetric: "至少 70% 的测试案件形成完整草稿材料包，且阻碍因素记录在可复用工作流中。"
    owner: 福利运营负责人
  - horizon: 90–180 天
    experiment: "为单一险企队列上线付费试点，将材料包周期时间与现有服务商或人工基线对比。"
    hypothesis: "叠加式工作流可改善完整材料包时机，而不扰动险企理赔核心系统。"
    successMetric: "完整材料包中位周期时间缩短至少 20%，试点期间无重大合规事件。"
    owner: 联合创始工程师
  - horizon: 90–180 天
    experiment: "用试点中出现最多的理赔系统和档案服务商组合，测试两种集成模式。"
    hypothesis: "产品可以用可复用的叠加连接器落地，而不是每次做定制开发。"
    successMetric: "两种可复用集成模式覆盖前 3 个活跃队列至少 80% 的工作流步骤。"
    owner: 解决方案工程师
  - horizon: 6–12 个月
    experiment: "量化第一个类生产队列的提交进展、裁定进展和内部人力节省。"
    hypothesis: "更早的证据编排构建出比单纯劳动自动化更强的经济案例。"
    successMetric: "至少一个生产队列相比基线显示提交或裁定进展改善，且人工跟进工时可量化减少。"
    owner: 创始人/CEO
  - horizon: 12–18 个月
    experiment: "与一位理赔顾问、缺勤服务顾问或档案检索合作伙伴试点联合销售动作。"
    hypothesis: "参考部署使渠道来源的险企引荐可行，且不压价或将公司变成外包服务提供商。"
    successMetric: "一个可复用合作伙伴动作带来至少 2 个合格管线机会。"
    owner: 合作关系负责人
operations:
  - "运行被保人授权和外联手册，包含可审计的脚本、权限采集和按队列划定的任务归属。"
  - "维护档案检索 SLA、阻碍分类和升级规则，确保在提交截止日期滑落前就能看到缺失证据。"
  - "为早期试点中出现最多的理赔系统和档案服务商组合打包叠加集成。"
  - "在一个面向买家的 ROI 看板中追踪材料包完成率、专员升级、提交时机和裁定进展。"
  - "为拒绝裁定、上诉和法律敏感的工作流步骤保留合规审查日志和持牌专员签字记录。"
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: "负责创始人主导的企业销售、险企设计伙伴招募，以及与理赔周期和服务商替换挂钩的 ROI 叙事。"
  - role: 联合创始工程师
    startTiming: Month 0
    rationale: "构建工作流引擎、审计记录和第一批与理赔系统、档案系统的叠加集成。"
  - role: 福利运营负责人
    startTiming: Month 2
    rationale: "设计被保人外联、材料包质量保证和持牌专员升级处理手册，确保产品反映真实的 SSDI 运营而非抽象自动化。"
  - role: 解决方案工程师
    startTiming: Month 6
    rationale: "通过打包可复用集成、数据映射和安全审查降低险企部署的试点摩擦。"
  - role: 合作关系负责人
    startTiming: Month 9
    rationale: "仅在首个直销试点验证了可量化价值后，才建立联合销售和实施合作关系。"
milestones:
  - horizon: 0–12 个月
    items:
      - "在定义的滩头阵地中获得 3 个与险企或 TPA 的付费试点。"
      - "验证一个叠加部署可在不替换理赔核心系统的情况下上线。"
      - "在第一个活跃队列中实现完整材料包周期时间缩短至少 20%。"
      - "形成一个与买家可信的 ROI 案例，锚定于裁定进展、准备金影响或人工劳动减少。"
  - horizon: 12–24 个月
    items:
      - "将至少 2 个试点转化为年度生产合同。"
      - "为第一批主流理赔系统和档案服务商组合交付可复用集成。"
      - "添加面向险企的证据缺口、升级模式和队列进展分析。"
      - "建立一个加速合格管线的可复用合作伙伴渠道。"
  - horizon: 24–36 个月
    items:
      - "达到 3—5 个生产标杆客户，每年约 1800 个托管案件。"
      - "证明来自分析或相邻协调模块的扩展收入超过试点费收入。"
      - "根据 SSDI 队列经济模型验证情况和合规容量，决定是否进入一个相邻权益工作流。"
risks:
  - risk: "险企合规或运营团队在现有服务商移交前阻止更早的面向被保人叠加层。"
    likelihood: High
    impact: High
    mitigation: "从窄队列起步，保留人工审批门控，将产品定位为附完整审计记录的叠加层，而非理赔核心替换。"
  - risk: "更早的证据收集改善了工作流卫生，但未能充分改善提交时机或裁定进展，不足以证明预算合理性。"
    likelihood: Medium
    impact: High
    mitigation: "严格对比基线和试点指标，优先展示可量化的材料包周期改善，在一个经济 KPI 获得买家认可前避免扩张。"
  - risk: "被保人授权、档案检索或外联完成率对软件主导模式而言过低。"
    likelihood: Medium
    impact: High
    mitigation: "先用人工辅助运营测试工作流，聚焦最高倾向的被保人队列，并在自动化边缘案例前使用合作伙伴检索服务商。"
  - risk: "现有维权律所或核心理赔服务商将产品延伸至同一早期工作流层。"
    likelihood: Medium
    impact: High
    mitigation: "通过更早的承保商嵌入、可量化的队列分析和运营手册形成差异化，若分发渠道通过竞争对手更快封闭，则寻求合作或 OEM 路径。"
  - risk: "买家群体集中，企业实施周期对种子前销售效率而言过长。"
    likelihood: High
    impact: Medium
    mitigation: "优先服务有续签或积压触发点的客户，将试点范围和时间盒压小，并在广泛 GTM 招聘前先配备解决方案能力。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月跑道资金将用于前 3 个付费试点、工作流和集成产品开发、合规与专员升级处理设计、打包险企实施，以及覆盖创始人主导销售、工程和福利运营的小团队。"
