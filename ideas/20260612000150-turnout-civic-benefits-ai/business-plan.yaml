slug: ssdi-offset-advocacy-os
date: '2026-06-12'
executiveSummary: >-
  SSDI Offset Advocacy OS should start as an overlay workflow product for large
  U.S. group disability carriers and TPAs that already run SSDI offset programs
  but still refer claimants to services vendors too late. The urgent pain is
  reserve drag and claimant confusion created when likely SSDI-eligible LTD
  files enter the federal process with incomplete records, poor follow-up, and
  a 70% initial denial environment. The MVP should collect claimant
  authorizations, request medical records, assemble SSA-ready packets, and
  route denials or judgment-heavy exceptions to licensed advocates while
  leaving the carrier's claims core in place. This beachhead is narrower and
  faster to prove than a broad benefits-navigation platform because the buyer
  already funds SSDI coordination, the workflow has measurable before-and-after
  metrics, and one logo can provide hundreds of similar files. The first GTM
  motion should target a VP of disability claims or recovery operations during
  an outsourced-vendor renewal, reserve review, or backlog spike, and sell a
  paid cohort pilot tied to packet completion, cycle time, and award
  progression. Research supports an estimated "$180.0M" TAM, "$54.0M" SAM, and
  "$6.0M" modeled year-3 SOM for this beachhead, but incumbent per-file pricing
  and claimant-volume data remain incomplete and should be treated as
  assumptions rather than established budget facts. The biggest disconfirming
  risks are that carriers will not allow an earlier claimant-facing overlay or
  that earlier evidence capture fails to improve award speed enough to beat
  incumbent vendors and internal teams. The first 12 months therefore need to
  prove one coherent claim: an overlay workflow can launch without core-system
  replacement, complete SSA packets earlier, and convert that speed into faster
  offset recovery or lower manual case-management cost.
problem:
  - "Group disability carriers bear reserve drag and offset leakage when likely SSDI-eligible claimants enter a paperwork-heavy federal process too late, with incomplete evidence and low visibility into progress."
  - "Existing alternatives split the workflow between internal case managers, spreadsheets, and outsourced advocacy firms, so no one owns early record chasing, deadline management, and exception routing inside the carrier's operating cadence."
solution:
  - "Launch a claimant-permissioned workflow layer that starts around months 3-6 of LTD leave, gathers authorizations, requests records, drafts SSA application packets, and tracks every outstanding task before referral quality degrades."
  - "Keep denials, appeals, and empathy-heavy claimant moments with licensed advocates while the software standardizes clerical execution, audit trails, and carrier-side visibility into packet status, cycle time, and award progression."
whyWeWin:
  - "The wedge sits where economic urgency is highest: inside carrier claims operations that already pay for SSDI coordination and can measure reserve impact, rather than in consumer apps that still need to find a payer."
  - "Incumbent advocacy firms are strong at representation after referral, but they do not clearly own the earlier carrier-embedded evidence-orchestration layer that determines whether a file is clean before submission."
  - "If the company captures claimant permissions, record-retrieval timing, denial reasons, and escalation outcomes earlier than incumbents, it can build carrier-specific timing and workflow playbooks that are hard to replicate with generic claims software."
strategicChoices:
  beachhead: "Top-20 U.S. group disability carriers and TPAs running SSDI offset programs for long-term disability claimants who become likely SSDI-eligible around 90-180 days into leave."
  wedgeRationale: "This entry point creates faster proof than a broad benefits-navigation launch because the buyer already has a budget line for SSDI coordination, the claimant cohort is identifiable inside existing LTD workflows, and success can be measured with packet completion speed, award progression, and reserve impact instead of vague engagement metrics."
  sequencingRationale: "Start as an overlay for one carrier cohort before attempting deeper claims-core integration or adjacent benefit lines because compliance trust and implementation speed matter more than breadth at this stage. Product scope stays focused on authorizations, records, packet assembly, and exception routing; GTM stays founder-led into vendor-renewal or backlog moments; hiring stays weighted toward implementation and workflow depth until the first pilots convert."
  notYet:
    - "Direct-to-consumer benefits navigation without an institutional payer"
    - "Full appeals, legal representation, or overpayment-dispute handling as a primary service line"
    - "Claims-core replacement projects inside carriers"
    - "Adjacent VA, Medicare, Medicaid, or education workflows before SSDI cohort economics are proven"
market:
  tam: "$180.0M estimated TAM based on about 20 large beachhead buyers, roughly 3,000 SSDI-eligible workflow files per buyer-year, and an assumed $3,000 annual workflow-plus-advocacy budget per file."
  sam: "$54.0M estimated SAM assuming roughly 30% of beachhead buyers are actively modernizing SSDI workflows or dissatisfied with incumbent vendors."
  som: "$6.0M modeled year-3 SOM based on 3 carrier or TPA logos, about 600 live files per logo, and blended realized revenue near $3,300 per managed file."
  segments:
    - "Primary: group disability carriers with in-force LTD blocks, SSDI offset economics, and current outsourced advocacy vendors"
    - "Secondary: disability TPAs or absence administrators managing carrier or self-insured employer programs with similar SSDI coordination workflows"
  buyingProcess: >-
    The operational champion is usually the claims, recovery, or SSDI-program
    leader who owns file progression and vendor performance, while the economic
    buyer is typically the COO or head of disability claims because value shows
    up in claim duration, reserve pressure, and external-vendor spend. Deals
    should start around a vendor-renewal, backlog, or reserve-review trigger,
    then pass through compliance, claimant-communications, security, and claims
    technology review because the product touches sensitive records and
    claimant-facing workflow.
product:
  mvp: >-
    MVP scope is a carrier-overlay SSDI workflow for one LTD claimant cohort:
    intake likely-eligible files, collect claimant permissions, request and
    track records, draft SSA-ready packets, and route denials or complex cases
    to licensed advocates with full audit trails. Human approval remains in the
    loop because the first product win is earlier, cleaner packet completion
    and carrier visibility, not autonomous legal judgment.
  sixMonth: "Launch a design-partner release with cohort intake, claimant outreach, authorization collection, records tracking, packet status dashboards, and advocate escalation workflows for one carrier pilot."
  twelveMonth: "Convert 2-3 pilots into annual production cohorts, add repeatable integrations for the first claims-system and records-vendor combinations seen in pilots, and instrument baseline-versus-pilot ROI on packet cycle time and award progression."
  twentyFourMonth: "Expand from early SSDI packet workflow into carrier-specific propensity scoring, manager dashboards, and adjacent post-award coordination modules while keeping SSDI offset recovery as the control point."
  keyBets:
    - "Likely SSDI-eligible claimants can be identified early enough in the LTD lifecycle to change outcomes rather than merely document late-stage files."
    - "Claimants will complete permissions and record-sharing steps at a rate high enough to support a software-first operating model."
    - "Carriers will adopt an overlay workflow before demanding a full claims-core replacement."
    - "Earlier packet completeness and structured follow-up will beat incumbent vendor timing enough to justify switching or adding budget."
gtm:
  wedge: "Sell a paid pilot into one carrier or TPA cohort of likely SSDI-eligible LTD claimants where the incumbent vendor is engaged too late or backlog visibility is poor, then expand from one claims team into adjacent cohorts after cycle-time and award-progress proof."
  channels:
    - "Founder-led direct sales to disability claims, recovery, and operations leaders at large carriers and TPAs"
    - "Co-sell or referral motions with claims consultants, absence-services advisors, and workflow-modernization partners after one reference deployment"
    - "Implementation partnerships with records-retrieval and advocacy specialists that shorten time to value without turning the company into a services prime"
  funnelTargets: "Target account→qualified workflow review 20-30%, qualified review→paid pilot 25-35%, pilot→production cohort contract 50%+, production logo→second cohort or adjacent module expansion 60%+ within 12 months."
  pricing: "Start with a 120-day paid pilot priced around $75k-$150k for one cohort of roughly 300-600 likely SSDI-eligible claimants, then convert to an annual contract that combines a platform minimum, per-active-claimant workflow fees, and success-based fees on awarded or accelerated offset outcomes; this matches existing buyer budgets tied to coordination cost and recovery value."
businessModel:
  revenueStreams:
    - "Paid pilot fees for one carrier cohort"
    - "Annual enterprise platform minimums"
    - "Per-active-claimant workflow fees"
    - "Success-based fees on awarded or accelerated SSDI offset outcomes"
  unitOfValue: "Active likely-SSDI-eligible claimant under workflow management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one claims cohort to additional carrier lines or TPA books within the same logo"
    - "Add manager analytics, propensity scoring, and post-award coordination modules once the startup owns packet workflow"
    - "Reuse the permissions, records, and escalation stack in adjacent entitlement workflows only after SSDI economics are repeatable"
strategyMap:
  northStarMetric: "Percentage of flagged SSDI-eligible LTD claimants that reach complete SSA packet submission within 45 days of program entry"
  inputMetrics:
    - "Qualified carrier opportunities with an active vendor-renewal, backlog, or reserve-pressure trigger"
    - "Percentage of enrolled claimants who complete authorizations within 14 days"
    - "Median days from cohort entry to complete medical-record packet"
    - "Percentage of files submitted with no missing-document exception at first packet review"
    - "Licensed-advocate escalation rate by cohort"
    - "Pilot-to-production conversion by logo"
  moatsToBuild:
    - "Carrier-specific evidence-gap and denial-pattern dataset tied to workflow steps"
    - "Record-retrieval and claimant-engagement playbooks that improve packet completeness by diagnosis and carrier cohort"
    - "Embedded integration and audit-trail layer that makes the workflow operationally sticky inside claims teams"
  killCriteria:
    - "Fewer than 2 of the first 12 qualified target accounts agree to a paid pilot using existing SSDI coordination budgets."
    - "Less than 70% of enrolled claimants complete permissions and core packet requirements within 45 days across the first pilot."
    - "The first 2 pilots fail to improve packet cycle time by at least 20% or fail to show any measurable improvement in award progression versus the incumbent or manual baseline."
  mermaid: |
    flowchart LR
      Wedge[Carrier SSDI cohort wedge] --> MVP[Overlay packet workflow MVP]
      MVP --> Proof[Faster complete packets and clearer award progression]
      Proof --> Expansion[Multi-cohort rollout and analytics expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Promising enterprise wedge with real budget adjacency, but conviction depends on proving early-overlay adoption and measurable lift over entrenched SSDI vendors."
    whyBelieve: "The company targets a narrow carrier workflow where pain is quantifiable, budgets already exist, and incumbents appear stronger at late-stage representation than at earlier evidence orchestration."
    whyDoubt: "The plan weakens quickly if carriers will not permit a new claimant-facing overlay or if earlier packet work does not translate into better timing than incumbent vendors can already deliver."
    nextDiligence: "Verify one paid pilot in a live carrier cohort that starts before the current vendor handoff and shows materially faster packet completion with acceptable compliance review."
  firstCustomer:
    title: "VP of disability claims or recovery operations at a top-20 group disability carrier"
    profile: "A carrier with a large LTD block, an existing SSDI offset program, manual vendor handoffs after month 3 of leave, and visible reserve pressure on long-duration claims."
    trigger: "An SSDI vendor renewal, internal reserve review, or backlog spike exposes that too many likely-eligible claimants are entering the process late and without complete evidence."
    buyer: "COO or head of disability claims"
    initialContract: "$75k-$150k paid pilot for one claims cohort, converting to an approximately $250k-$750k annual production contract plus per-file and success-based fees if packet cycle time and award progression improve."
  mustBeTrue:
    - "At least 3 of the first 10 qualified carriers or TPAs will fund a pilot from existing SSDI coordination or recovery budgets."
    - "A meaningful month-3 to month-6 LTD cohort can be flagged early enough that earlier workflow intervention still changes submission timing."
    - "At least 70% of enrolled claimants will complete permissions and evidence steps fast enough for a software-led process."
    - "Earlier packet orchestration will improve cycle time or award progression enough to justify switching from or augmenting incumbent vendors."
    - "Core claims vendors and incumbent advocates will not close the early-workflow gap before the startup earns the first 3-5 reference logos."
  diligenceQuestions:
    - "What is the current per-file spend, success-fee structure, and renewal pain point for incumbent SSDI advocacy contracts at top-20 carriers?"
    - "What share of active LTD files becomes SSDI-eligible by month 3, month 6, and month 12 in the target carriers?"
    - "Which claimant-consent and outreach steps create the highest drop-off before a packet is complete?"
    - "Which claims systems and records vendors dominate the first pilot opportunities, and can the product land as an overlay without custom integration each time?"
    - "Which KPI closes the budget case fastest in live deals: packet cycle time, award progression, reserve release, or internal labor savings?"
operatingAssumptions:
  - assumption: "Carriers already spend enough on SSDI coordination that a workflow layer can be funded from an existing budget line rather than a net-new transformation budget."
    basis: research.yaml
    validationTest: "Review 5 incumbent contracts or renewal decks and confirm at least 3 buyers can map pilot spend to current SSDI coordination, recovery, or vendor budgets."
    decisionImpact: "If false, the sales motion becomes slower and more discretionary, pushing the company toward partnerships, OEM, or a narrower services-assisted entry."
  - assumption: "Likely SSDI-eligible LTD claimants can be identified early enough in the leave lifecycle to benefit from earlier evidence collection."
    basis: idea.yaml
    validationTest: "Obtain cohort data from at least 2 target carriers showing the share of active files flagged between months 3 and 6 and compare award timing for early versus late referrals."
    decisionImpact: "If false, the wedge shifts from early activation to incumbent-vendor productivity tooling, which is a less differentiated business."
  - assumption: "A claimant-facing overlay workflow is acceptable to carrier compliance and operations teams if human approval gates and audit trails are preserved."
    basis: research.yaml
    validationTest: "Run 6 design reviews with claims, legal, and compliance leaders and secure at least 2 written pilot approvals without requiring claims-core replacement."
    decisionImpact: "If false, implementation friction rises sharply and the company must reposition as a white-labeled vendor tool rather than a distinct workflow product."
  - assumption: "Earlier packet completeness produces measurable improvement in submission timing or award progression versus current manual or vendor-led processes."
    basis: operator judgment
    validationTest: "Compare baseline and pilot cohorts over 90-120 days and confirm at least 20% faster complete-packet cycle time plus a leading-indicator lift in submission or award progression."
    decisionImpact: "If false, pricing and investor narrative must shift toward labor-efficiency software rather than outcome-linked recovery economics."
  - assumption: "Licensed-advocate escalation can contain regulatory and practice-of-law risk without forcing the company into a low-margin services model."
    basis: research.yaml
    validationTest: "Map every workflow step with counsel, confirm which steps require specialist review, and keep advocate-handled exceptions below a predefined threshold such as 25% of managed files in pilot."
    decisionImpact: "If false, gross-margin targets and hiring plans break, and the company should avoid scaling until the workflow boundary is narrower."
experimentRoadmap:
  - horizon: 0–90 days
    experiment: "Interview 12-15 disability claims, recovery, and SSDI-program leaders at target carriers and TPAs around vendor-renewal and backlog pain."
    hypothesis: "The fastest first buyer is the operations owner of claim duration and SSDI vendor performance, not a generic innovation budget holder."
    successMetric: "At least 8 interviews confirm an active pain trigger and 3 accounts agree to a scoped workflow review."
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: "Collect sample cohort data from design partners to size the month-3 to month-6 likely-eligible claimant population."
    hypothesis: "The reachable claimant cohort is large enough inside one logo to support a meaningful paid pilot."
    successMetric: "At least 2 target accounts show a pilotable cohort of 300 or more likely SSDI-eligible claimants per year."
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: "Run a concierge workflow on 25-50 historical files to measure authorization completion, record-retrieval bottlenecks, and packet assembly time."
    hypothesis: "The hardest operational steps can be standardized before deep product integration is complete."
    successMetric: "At least 70% of test files reach a complete draft packet with identified blockers logged in a repeatable workflow."
    owner: Benefits operations lead
  - horizon: 90–180 days
    experiment: "Launch one paid pilot for a single carrier cohort and compare packet cycle time against the current vendor or manual baseline."
    hypothesis: "An overlay workflow can improve complete-packet timing without disrupting the carrier's claims core."
    successMetric: "At least 20% faster median complete-packet cycle time and no material compliance incident during pilot."
    owner: Founding eng
  - horizon: 90–180 days
    experiment: "Test two integration patterns with the most common claims-system and records-vendor combinations seen in pilots."
    hypothesis: "The product can land with a repeatable overlay connector pattern rather than one-off custom work each time."
    successMetric: "Two reusable integration patterns cover at least 80% of workflow steps in the first 3 live cohorts."
    owner: Solutions engineer
  - horizon: 6–12 months
    experiment: "Measure submission progression, award progression, and internal labor savings on the first production-like cohort."
    hypothesis: "Earlier evidence orchestration creates an economic case stronger than labor automation alone."
    successMetric: "At least one production cohort shows either improved submission or award progression versus baseline plus measurable reduction in manual follow-up hours."
    owner: Founder CEO
  - horizon: 12–18 months
    experiment: "Pilot one co-sell motion with a claims consultant, absence-services advisor, or records-retrieval partner."
    hypothesis: "A reference deployment makes channel-sourced carrier intros viable without collapsing pricing or turning the startup into outsourced services."
    successMetric: "At least 2 qualified pipeline opportunities sourced by one repeatable partner motion."
    owner: Partnerships lead
operations:
  - "Run a claimant-consent and outreach playbook with auditable scripts, permissions capture, and task ownership by cohort."
  - "Maintain record-retrieval SLAs, blocker taxonomy, and escalation rules so missing evidence is visible before submission deadlines slip."
  - "Package overlay integrations for the dominant claims-system and records-vendor combinations seen in early pilots."
  - "Track packet completion, advocate escalations, submission timing, and award progression in one buyer-facing ROI dashboard."
  - "Preserve compliance review logs and licensed-advocate signoff for denials, appeals, and legally sensitive workflow steps."
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: "Owns founder-led enterprise sales, carrier design-partner recruiting, and the ROI narrative tied to claim duration and vendor replacement."
  - role: Founding eng
    startTiming: Month 0
    rationale: "Builds the workflow engine, audit trail, and first overlay integrations with claims and records systems."
  - role: Benefits operations lead
    startTiming: Month 2
    rationale: "Designs claimant outreach, packet QA, and licensed-advocate escalation playbooks so the product reflects real SSDI operations rather than abstract automation."
  - role: Solutions engineer
    startTiming: Month 6
    rationale: "Reduces pilot friction by packaging repeatable integrations, data mapping, and security reviews for carrier deployments."
  - role: Partnerships lead
    startTiming: Month 9
    rationale: "Builds co-sell and implementation relationships only after the first direct pilot proves measurable value."
milestones:
  - horizon: 0–12 months
    items:
      - "Secure 3 paid pilots with carriers or TPAs in the defined beachhead."
      - "Prove one overlay deployment can launch without claims-core replacement."
      - "Achieve at least 20% faster complete-packet cycle time in the first live cohort."
      - "Document one buyer-credible ROI case tied to award progression, reserve impact, or manual labor reduction."
  - horizon: 12–24 months
    items:
      - "Convert at least 2 pilots into annual production contracts."
      - "Ship repeatable integrations for the first dominant claims-system and records-vendor combinations."
      - "Add carrier-facing analytics on evidence gaps, escalation patterns, and cohort progression."
      - "Establish one repeatable partner channel that accelerates qualified pipeline."
  - horizon: 24–36 months
    items:
      - "Reach 3-5 production logos and approximately 1,800 managed files annually."
      - "Demonstrate that expansion revenue from analytics or adjacent coordination modules exceeds pilot-fee revenue."
      - "Decide whether to enter one adjacent entitlement workflow based on proven SSDI cohort economics and compliance capacity."
risks:
  - risk: "Carrier compliance or operations teams block an earlier claimant-facing overlay before the existing vendor handoff."
    likelihood: High
    impact: High
    mitigation: "Start with narrow cohorts, preserve human approval gates, and position the product as an overlay with full audit trails rather than a claims-core replacement."
  - risk: "Earlier evidence collection improves workflow hygiene but does not improve submission timing or award progression enough to justify budget."
    likelihood: Medium
    impact: High
    mitigation: "Instrument baseline versus pilot metrics tightly, lead with measurable packet-cycle improvements first, and avoid scaling until one economic KPI is buyer-credible."
  - risk: "Claimant permissions, record retrieval, or outreach completion rates are too low for a software-led model."
    likelihood: Medium
    impact: High
    mitigation: "Test the workflow with concierge operations first, focus on the highest-propensity claimant cohorts, and use partner retrieval vendors before automating edge cases."
  - risk: "Incumbent advocacy firms or core claims vendors extend their products into the same early-workflow layer."
    likelihood: Medium
    impact: High
    mitigation: "Differentiate on earlier carrier embedding, measurable cohort analytics, and operational playbooks, then pursue partner or OEM paths if distribution closes faster through incumbents."
  - risk: "The buyer base is concentrated and enterprise implementation cycles stay too long for pre-seed sales efficiency."
    likelihood: High
    impact: Medium
    mitigation: "Prioritize accounts with live renewal or backlog triggers, keep pilots narrow and time-boxed, and hire solutions capability before broad GTM headcount."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months of runway should fund the first 3 paid pilots, workflow and integration product work, compliance and advocate-escalation design, packaged carrier implementation, and a small team spanning founder-led sales, engineering, and benefits operations."
