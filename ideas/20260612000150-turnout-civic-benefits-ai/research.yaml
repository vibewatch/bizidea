categoryDynamics:
  growthRate: roughly flat near-term LTD new-sales growth; workflow modernization growing faster than premium growth
  growthRateSourceRefs: [7]
  tailwinds:
    - point: AI already handles hold times, records chasing, and application work in adjacent benefits advocacy.
      sourceRefs: [1]
    - point: SSDI workflow complexity is persistent enough that a monthly state-by-state workload dataset exists and is updated at scale.
      sourceRefs: [4]
    - point: Carriers still need workplace benefits offerings to support employer retention narratives, sustaining interest in claim-service improvements.
      sourceRefs: [7]
  headwinds:
    - point: Offset practices are regulated and cannot rely on estimated government benefits in at least some state regimes.
      sourceRefs: [3]
    - point: Claimants and lawyers are highly attuned to overpayment and offset disputes, so careless automation could trigger backlash.
      sourceRefs: [37, 38]
competitors:
  - name: Allsup
    stage: incumbent
    wedge: Large-scale SSDI representation with LTD coordination, Medicare support, and return-to-work services.
    pricing: Not publicly posted
    strength: Demonstrated scale, carrier familiarity, overpayment coordination, and strong representation outcomes.
    weaknessVsUs: Less clearly positioned as an earlier carrier-embedded workflow OS for evidence capture before referral gets messy.
    sourceRefs: [16, 17, 18]
  - name: Brown & Brown Absence Services Group
    stage: incumbent
    wedge: Carrier-focused SSDI advocacy and claims-management portfolio with Claim Compass predictive models.
    pricing: Not publicly posted
    strength: Deep carrier distribution, predictive award-timing models, and broad disability services.
    weaknessVsUs: Portfolio breadth and services roots can make it harder to present a narrow claimant-permissioned workflow layer purpose-built for early SSDI activation.
    sourceRefs: [21, 23]
  - name: Advocator Advantage
    stage: incumbent
    wedge: SSDI, Medicare, and Ticket-to-Work navigation for claimants under the Brown & Brown umbrella.
    pricing: Not publicly posted
    strength: Broad post-award and benefits-adjacent support that can keep claimants engaged beyond the initial filing.
    weaknessVsUs: Evidence points more to claimant support breadth than to deep carrier-operating-system embedding.
    sourceRefs: [27, 28, 30]
  - name: Claimify
    stage: scale-up
    wedge: Digital-first SSDI application experience.
    pricing: Not publicly posted
    strength: Simpler software-led claimant onboarding narrative than legacy advocacy firms.
    weaknessVsUs: Sparse public evidence of carrier-side workflow integration, licensed escalation depth, or offset-specific operating metrics.
    sourceRefs: [31]
  - name: Majesco
    stage: incumbent
    wedge: Core insurer claims software and business-transformation tooling.
    pricing: Not publicly posted
    strength: Existing insurer IT footprint and credibility with claims modernization buyers.
    weaknessVsUs: Generic claims core is not the same as a claimant-facing SSDI advocacy layer with records chasing and exception routing.
    sourceRefs: [34]
regulatoryTechnicalConstraints:
  - point: New York DFS says disability benefits generally cannot be reduced using estimated government benefits before actual receipt, which constrains aggressive offset assumptions.
    sourceRefs: [3]
  - point: Evidence capture still depends on sensitive uploads, permissions, and external records retrieval, which raises operational complexity.
    sourceRefs: [13, 33]
  - point: Appeals, denials, and overpayment disputes remain legally sensitive moments that benefit from human specialist review.
    sourceRefs: [15, 37, 38]
validationSignals:
  - point: Turnout says its client base grew fivefold after seed financing while logging more than 10 million minutes of advocacy work.
    sourceRefs: [1]
  - point: Allsup claims to have helped more than 425,000 people and reports a 97% success rate for users who complete its process.
    sourceRefs: [16, 18]
  - point: Brown & Brown markets predictive models for SSDI award likelihood and timing, suggesting carriers already buy data-driven workflow support.
    sourceRefs: [21]
  - point: NOSSCR conference coverage highlights AI tools and post-entitlement issues as current representation topics, indicating the market is evolving rather than static.
    sourceRefs: [30, 35]
openQuestions:
  - What are current incumbent per-case economics for carrier SSDI advocacy contracts, including success fees and overpayment recovery support?
  - What percentage of active LTD claimants at target carriers become SSDI-eligible by month 3, month 6, and month 12?
  - Which claims systems and document vendors create the fastest wedge for an overlay deployment in the first pilot?
  - How much carrier appetite exists for a claimant-facing overlay before a file is formally referred to an external advocate?
