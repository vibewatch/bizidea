reportMemo:
  executiveTakeaways:
    - The beachhead is real because group disability carriers already pay for SSDI coordination, overpayment handling, and related claims-management work.
    - The wedge is timing: move evidence capture and claimant task execution earlier in the LTD lifecycle instead of waiting for a late-stage referral to a services vendor.
    - Competitive risk comes more from incumbent carrier vendors and core claims systems than from direct-to-consumer benefits apps.
    - The best expansion path stays inside adjacent entitlement workflows that reuse permissions, records retrieval, deadline tracking, and human escalation.
  marketDefinition: >-
    The relevant market is enterprise workflow software and hybrid advocacy services that help U.S. disability carriers
    and TPAs turn likely SSDI-eligible long-duration disability files into completed applications, awarded benefits, and
    coordinated offsets with less manual chasing.
  customerAndBuyer: >-
    The operational user is the disability claims or recovery leader responsible for LTD duration, reserves, and SSDI
    offset conversion. The economic buyer is typically the COO, head of disability claims, or recovery executive at a
    top-tier group disability carrier or administrator that already uses outsourced SSDI advocacy but wants earlier
    intervention and better workflow visibility.
  buyingTriggers:
    - point: Vendor renewal or internal audit shows manual SSDI coordination, retroactive overpayments, and offset recovery work are consuming specialist time without enough visibility.
      sourceRefs: [17, 21, 23]
    - point: Claim teams are struggling with documentation gaps and long post-filing cycles, making earlier evidence collection and claimant follow-up more valuable.
      sourceRefs: [11, 12, 13]
    - point: Workplace benefits remain strategically important even in a flat LTD sales environment, so carriers still need claim-cost control and service differentiation.
      sourceRefs: [5, 7]
  willingnessToPay:
    summary: >-
      Willingness to pay is credible where carriers already fund SSDI representation, claims-management support, and
      overpayment coordination; a workflow product that reduces manual chase work and surfaces earlier offset outcomes
      can slot into an existing budget line rather than inventing a new one.
    sourceRefs: [17, 18, 21, 23, 37]
  competitiveLandscape: >-
    The market is crowded with services-heavy SSDI advocates and generic insurer claims platforms, but neither owns the
    full claimant-permissioned operating layer proposed here. Incumbent advocates excel at filings, appeals, and
    overpayment handling after referral. Core claims vendors own systems of record. The gap is a workflow layer that
    starts earlier, continuously gathers evidence, and only escalates exceptions to licensed advocates.
  incumbentThesis:
    - incumbentClass: Outsourced SSDI advocacy vendors
      point: They do not win by default because their model still centers on representation and overpayment handling after referral, not on earlier carrier-embedded evidence orchestration.
      sourceRefs: [17, 21, 27]
    - incumbentClass: Core claims platforms
      point: They own system-of-record workflows but are not specialized claimant advocacy layers with human escalation and benefit-program expertise.
      sourceRefs: [23, 34]
    - incumbentClass: Internal case-management teams
      point: Internal teams know the claim but spend too much time on repetitive evidence, upload, and deadline work that software can standardize first.
      sourceRefs: [1, 11, 13]
    - incumbentClass: Direct-to-consumer benefits apps
      point: Consumer apps do not win by default because the payer and operational urgency sit with carriers that bear LTD duration and offset risk.
      sourceRefs: [1, 31]
  regulatoryLandscape: >-
    The business sits in a regulated claims environment. New York DFS explicitly says carriers cannot reduce disability
    benefits based on estimated government benefits unless benefits are actually received, which limits aggressive
    estimate-based offset practices. The safer posture is to automate evidence collection, deadlines, and audit trails
    while escalating denials and judgment-heavy steps to licensed advocates or counsel.
  technologyLandscape: >-
    The enabling stack already exists: AI agents can execute hold-time, records-chasing, and form-completion work;
    incumbent vendors already market predictive SSDI models; and record-retrieval vendors plus insurer claims systems
    can provide integration anchors. The remaining challenge is operational packaging, permissions, compliance, and
    carrier-grade workflow fit rather than foundational model capability.
  distributionChannels:
    - point: Direct enterprise sales into disability carriers and TPAs during claims-transformation or SSDI-vendor review cycles.
      sourceRefs: [21, 23]
    - point: Co-selling with claims-platform and workflow modernization partners that already touch carrier operations.
      sourceRefs: [23, 34]
    - point: Partnerships with record-retrieval and post-award coordination specialists to shorten implementation time.
      sourceRefs: [17, 28, 33]
  partnershipEcosystem:
    - point: Medical-record retrieval vendors can accelerate evidence collection and lower implementation friction.
      sourceRefs: [13, 33]
    - point: Core claims software vendors or system integrators can help the product land as an overlay instead of waiting for deep replacement projects.
      sourceRefs: [23, 34]
    - point: Licensed advocates, Medicare coordinators, and return-to-work specialists extend the workflow after award or denial.
      sourceRefs: [19, 20, 28, 43]
  dataMoats:
    - point: Structured data on evidence gaps, denial patterns, and cycle times can compound into carrier-specific playbooks.
      sourceRefs: [4, 11, 12, 13]
    - point: Early-claim workflow exhaust plus outcome labels can become a better SSDI propensity and timing model than a generic referral queue.
      sourceRefs: [21, 23]
    - point: Claimant-permissioned records and escalation logs create operational context that generic claims cores usually do not collect.
      sourceRefs: [1, 13, 33]
  geographicConsiderations:
    - point: U.S. focus is appropriate because SSDI and Medicare coordination are federally standardized, but state insurance guidance still shapes offset practices and policy language.
      sourceRefs: [3, 41]
    - point: Adjacent expansion into VA and Medicare workflows is also U.S.-specific and can reuse the same records-and-escalation stack.
      sourceRefs: [1, 8, 28]
  sensitivityCases:
    - case: SSA approval rates or processing times improve meaningfully
      impact: The ROI case shifts from pure win-rate lift toward labor savings, earlier case visibility, and claimant experience gains.
      sourceRefs: [4, 30, 39]
    - case: Carriers refuse new claimant-facing workflow changes
      impact: The product must land as an overlay that preserves existing case-manager approvals and existing claim-system steps.
      sourceRefs: [23, 34]
    - case: Regulators or counsel tighten scrutiny on estimate-based offsets
      impact: Product value must anchor on packet quality, cycle time, and auditability rather than speculative recoveries.
      sourceRefs: [3, 37, 38]
  validationPlan:
    - priority: high
      question: What is the current per-file spend and success-fee structure for outsourced SSDI advocacy across top-20 carriers?
      evidenceToGather: Carrier procurement data, vendor renewal decks, and anonymized incumbent statements of work.
    - priority: high
      question: What share of active LTD files becomes SSDI-eligible by month 3 to month 6 for the target carriers?
      evidenceToGather: Carrier cohort reports segmented by diagnosis, duration, and eventual SSDI referral or award.
    - priority: medium
      question: Which claims systems and records vendors dominate buyer implementations?
      evidenceToGather: Implementation architecture maps, partner rosters, and pilot integration effort estimates.
analysisModels:
  marketMapDiagram:
    title: SSDI advocacy workflow map
    mermaid: |
      quadrantChart
        title SSDI advocacy workflow map
        x-axis Generic workflow --> Specialized claimant workflow
        y-axis Low urgency --> High urgency
        Allsup: [0.58, 0.86]
        Brown & Brown Absence: [0.54, 0.82]
        Claimify: [0.72, 0.56]
        Majesco: [0.24, 0.40]
        Proposed startup: [0.84, 0.92]
  fiveForces:
    supplierPower:
      score: 3
      rationale: Record-retrieval, licensed advocacy, and post-award coordination partners matter, but none appears irreplaceable if the startup builds a flexible partner layer.
      sourceRefs: [28, 33, 43]
    buyerPower:
      score: 4
      rationale: The buyer base is concentrated among a limited set of large carriers and TPAs that already use established vendors and can demand pilots, integrations, and proof of ROI.
      sourceRefs: [5, 7, 21]
    threatOfEntrants:
      score: 3
      rationale: AI lowers the cost of automating clerical advocacy steps, but compliance, claimant permissions, and insurer workflow integration still slow greenfield entrants.
      sourceRefs: [1, 21, 30, 31]
    threatOfSubstitutes:
      score: 4
      rationale: Buyers can continue using outsourced SSDI advocates, internal case managers, or generic claims platforms, even if those substitutes are less specialized.
      sourceRefs: [17, 23, 27, 34]
    competitiveRivalry:
      score: 4
      rationale: Rivalry is meaningful because incumbent advocacy vendors are entrenched and claims-platform vendors already sit inside carrier operations.
      sourceRefs: [16, 21, 27, 34]
  pestle:
    - factor: political
      impact: neutral
      point: Federal and state oversight keeps benefits workflows stable but procedurally heavy, supporting software that improves auditability rather than changing benefit rules.
      sourceRefs: [3, 8]
    - factor: economic
      impact: positive
      point: Employers still treat benefits as retention tools, so carriers have reason to defend service quality while controlling claim duration and recovery economics.
      sourceRefs: [7]
    - factor: social
      impact: positive
      point: Claimants face high-friction bureaucratic work and frequent initial denials, increasing appetite for guided navigation.
      sourceRefs: [1, 39, 40]
    - factor: technological
      impact: positive
      point: AI task execution and predictive modeling are already appearing in advocacy and claims workflows, making the wedge implementation-timed rather than science-fictional.
      sourceRefs: [1, 21, 30]
    - factor: legal
      impact: negative
      point: Offset rules, overpayment handling, privacy, and the boundary between workflow help and legal advice create real design constraints.
      sourceRefs: [3, 37, 38]
  adoptionFrictionMatrix:
    - friction: Claimant consent and sensitive-record handling
      severity: high
      affectedBuyer: Claims operations and compliance leaders
      mitigation: Start with explicit permissions, narrow document scopes, and full audit trails for every outreach and upload.
      sourceRefs: [3, 13]
    - friction: Integration into incumbent claims operations
      severity: high
      affectedBuyer: COO and claims-technology owners
      mitigation: Land as an overlay workflow first, then integrate deeper with claims and record vendors after proving value.
      sourceRefs: [23, 33, 34]
    - friction: Proving economics versus incumbent vendors
      severity: medium
      affectedBuyer: Recovery and finance leaders
      mitigation: Benchmark cycle time, packet completion, and offset conversion against the incumbent vendor or manual baseline.
      sourceRefs: [17, 21, 23]
    - friction: Human-advocate escalation boundaries
      severity: medium
      affectedBuyer: Legal and compliance stakeholders
      mitigation: Keep appeals, denials, and empathy-heavy claimant moments routed to licensed specialists.
      sourceRefs: [1, 30, 37]
market:
  tam:
    value: "$180.0M"
    rationale: >-
      Estimate assumes 20 large carrier or TPA accounts in the beachhead x 3,000 SSDI-eligible workflow files per
      account per year x an estimated $3,000 annualized workflow-plus-advocacy budget per file; cross-check is that the
      surrounding group disability market is large and already supports specialist SSDI vendors. Calc = 20 x 3,000 x
      $3,000.
    isEstimate: true
    sourceRefs: [5, 7, 17, 21]
  sam:
    value: "$54.0M"
    rationale: >-
      Serviceable market narrows TAM to roughly 30% of beachhead buyers that are actively modernizing SSDI workflows or
      unhappy with incumbent vendors. Calc = $180.0M x 30%.
    isEstimate: true
    sourceRefs: [5, 7, 21, 23]
  som:
    value: "$6.0M"
    rationale: >-
      Reachable year-3 share assumes three carrier or TPA logos, each starting with about 600 SSDI-eligible files and a
      blended realized revenue of roughly $3,300 per file from platform plus outcome-linked fees. Calc = 3 x 600 x
      $3,300 = $5.94M, rounded.
    isEstimate: true
    sourceRefs: [17, 21, 23]
