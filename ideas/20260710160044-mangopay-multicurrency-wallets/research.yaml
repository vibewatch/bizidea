  adoptionFrictionMatrix:
  - friction: Noisy or incomplete remittance references reduce deterministic matching.
    severity: high
    affectedBuyer: Controller or head of payments operations
    mitigation: Start with expected-payment setup, remitter rules, and a reviewer queue instead of promising full touchless matching on day one.
