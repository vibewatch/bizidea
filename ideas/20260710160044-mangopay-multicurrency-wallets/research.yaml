    - 26
  validationPlan:
  - priority: high
    question: How many target platforms have structured invoice references in remittance data good enough for 70%+ first-pass matching?
    evidenceToGather: Anonymized bank-transfer reference strings, invoice metadata, and analyst-resolution logs from 5-10 design partners.
  - priority: high
    question: Which provider combinations dominate the beachhead and therefore determine connector order?
    evidenceToGather: Prospect-level stack mapping across PSP, ERP, subledger, and payout workflows for the first 50 target accounts.
  - priority: medium
    question: Can delayed seller releases and close backlogs be quantified tightly enough to justify a six-figure annual contract?
    evidenceToGather: Days-to-close, exception counts, seller-release delays, and finance headcount metrics before and after pilot deployment.
  - priority: medium
    question: Will PSP and ERP partners view the product as an attach opportunity or as a threat to their own roadmap?
    evidenceToGather: Partner interviews, referral economics, and co-sell feedback from Mangopay-like PSPs and NetSuite or Xero consultancies.
