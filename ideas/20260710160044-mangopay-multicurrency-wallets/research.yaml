openQuestions:
- What share of the target accounts have clean enough remittance references to achieve useful auto-match rates before custom integrations?
- 'Which provider combinations dominate the first 50 prospects: Mangopay plus NetSuite, Adyen plus SAP, Airwallex plus Xero, or something else?'
- Will buyers fund the product from payments-operations budget, controllership budget, or ERP modernization budget?
- How often do delayed seller releases or reserve holds trace back directly to buyer-cash matching failures rather than to compliance or dispute workflows?
