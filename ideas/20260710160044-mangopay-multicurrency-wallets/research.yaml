competitors:
- name: Mangopay
  stage: incumbent
  wedge: Platform wallet and virtual-account infrastructure for European marketplaces and platforms.
  pricing: Custom / enterprise quote
  strength: Strong platform-specific payments, wallet, and compliance posture in Europe.
  weaknessVsUs: Provider-bound data model stops short of provider-neutral invoice-to-seller-balance and ERP evidence orchestration.
  sourceRefs:
  - 1
  - 4
  - 7
- name: Adyen
  stage: incumbent
  wedge: Enterprise balance-platform infrastructure with multi pay-in, reporting, and marketplace account structures.
  pricing: Transaction-based listed pricing; platform terms custom
  strength: Global enterprise credibility with rich balance, reporting, and reconciliation primitives.
  weaknessVsUs: Broader platform scope means less focus on controller-grade receipt-to-subledger exception memory.
  sourceRefs:
  - 8
  - 9
  - 10
  - 11
- name: Airwallex
  stage: scale-up
  wedge: Global accounts, multi-currency business accounts, and embedded-finance APIs for cross-border businesses.
  pricing: Free-to-enterprise plans; custom sales pricing above self-serve
  strength: Fast multi-currency collection and embedded-finance footprint with public packaging.
  weaknessVsUs: Owns collection rails and FX, but not the multi-party seller-balance and ERP close graph the wedge targets.
  sourceRefs:
  - 16
  - 17
  - 18
  - 19
- name: Modern Treasury
  stage: scale-up
  wedge: Payment-operations infrastructure with virtual accounts, ledgers, and incoming-payment primitives.
  pricing: Custom enterprise quote
  strength: Provider-neutral infrastructure orientation and strong technical primitives for incoming-payment attribution.
  weaknessVsUs: Still requires customers to assemble finance-ops workflow, exception handling, and ERP semantics on top of the toolkit.
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: HighRadius
  stage: incumbent
  wedge: Cash-application and close-automation software for enterprise finance teams.
  pricing: Subscription-based enterprise pricing; quote-led
  strength: Proven finance-buyer category and strong automation narrative around cash application and close.
  weaknessVsUs: Optimized for enterprise receivables workflows, not multi-party platform wallets, seller balances, or provider-specific payout graphs.
