topRisks:
- name: PSP 捆绑
  description: Mangopay 或更大的 PSP，可能直接在自家看板里补上基础匹配和对账能力。
  mitigation: 坚持厂商中立，把能力做深到发票—子账逻辑、ERP 证据链和跨提供商异常记忆，这些都不是单一 PSP 顺手就能补齐的。
- name: 汇款数据太乱
  description: 买家银行转账的附言可能乱到一定程度，早期自动匹配质量会被压住。
  mitigation: 先从只读工作流起步，优先挑发票引用规范的客户，再把附言规则和人工复核叠起来，慢慢放大自动化范围。
- name: 预算归属不清
  description: 有些平台确实痛，但仍会把对账当后台杂务，而不是值得单列的软件预算。
  mitigation: 围绕新市场上线和关账质量卖，量化分析师工时与卖家放款拖延，优先找那些已经在加多个币种的财务负责人。
