  wedgeClarity:
    score: 5
    rationale: 给 B2B 平台收款做一张虚拟账户收款图谱，第一款产品够窄、买方一眼能懂，而且和来源细节贴得很紧。
  defensibility:
    score: 4
    rationale: 跨系统匹配规则、付款方历史和围绕专属币种钱包积累的异常记忆，都会沉成很黏的运营数据，而这些数据天然不在 PSP 手里。
  ventureScale:
