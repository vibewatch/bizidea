problem: 全球 B2B 平台现在能比财务团队消化得更快地，在更多市场开出本地收款账户。每一笔买家银行转账，在收入确认或出款逻辑启动前，仍得先对上对应发票、币种钱包、法人实体、费用拆分和卖家余额。团队通常只能把 PSP 看板、银行附言、内部钱包台账和 ERP 导出表手工拼在一起，所以每上一种新币种，异常队列就会变长，卖家放款会拖，月末关账也会更吵。
targetUser:
  primary: 欧洲 B2B 平台或自由职业者平台里的财务控制负责人或支付运营负责人：他们通过专属虚拟账户，收 3-8 个币种的企业买家银行转账。
  secondary: 负责卖家余额准确性和收款核销的财务系统负责人或平台运营负责人。
  buyer: CFO 或财务副总裁
startupThesis:
  nonObviousInsight: 像 Mangopay 这样的提供商把“开银行账户”这件项目活抹平后，瓶颈就会从通道接入，往下游挪到平台子账之间的收款核销。看上去简单的“一钱包一币种”模型，其实正是能让软件跑起来的那个底层原语：它让收款归因足够确定，软件才有机会把发票匹配、费用路由和卖家余额更新自动化。
  beachhead: 英国和欧洲的自由职业者平台、B2B 服务平台：每月买家发票超过 5,000 张，活跃收款币种 3-8 个，企业买家通过类似 Mangopay 的专属虚拟账户付款。
  wedge: 一张虚拟账户收款图谱，在资金往下游放行前，先把每笔买家入账对到正确的发票、钱包、费用拆分、卖家余额和 ERP 分录。
  whyNowCatalyst: Mangopay 在同一套虚拟账户架构上，把币种从 7 个拉到 24 个，多币种收款因此不再是重项目，而更像一次扩展开关；接下来真正卡住全球平台增长的，只会是越铺越大的对账摊子。
  ventureScalePath: 先从 B2B 平台的买家收款核销切进去，再往准备金管理、出款放行控制、资金预测、法人实体上线，以及跨提供商账本扩出去；凡是平台跨币种动钱的地方，都能接。
solution: 虚拟账户收款图谱会吃进虚拟账户入账、发票元数据、平台订单、卖家子账和 ERP 分录，给每个币种钱包建一张统一的收款图。钱一到账，系统就自动比对银行附言和应收金额，给出费用与卖家余额的变动建议；遇到模糊付款、部分付款或错币种付款，也会在它们把关账搅乱前先拦出来。第一版坚持只读，聚焦 B2B 发票收款，先给财务团队一张异常工作台和分录导出能力，而不是逼他们替换 Mangopay 或 ERP。随着数据积累，产品会学会重复付款方模式和不同币种通道下的异常规则，让每次新增币种都更像配参数，而不是继续堆人。后续模块还能沿着同一张事件图，管准备金释放、出款时点和资金预测。
goToMarketSeed:
  firstCustomer: 第一位客户应该是伦敦的一家自由职业者平台的财务副总裁：它每月有 10,000 多张买家发票，业务覆盖英国、欧元区和日本，收 GBP、EUR、USD、JPY 四个币种，钱先进 Mangopay 虚拟账户，再由团队手工把收款对到承包商余额和 NetSuite。
  buyingTrigger: 一次上两种以上新收款币种、在另一个市场推出企业开票，或者某个季度末关账时，部分回款和错配回款的积压开始失控。
  currentAlternative: PSP 看板、银行附言 CSV、内部钱包台账，以及由财务运营分析师跑的 ERP 手工收款核销流程。
  switchingReason: 第一位客户愿意切换，是因为产品压在现有 PSP 和 ERP 之上，不用推倒重来；自动匹配率马上能抬起来，拖慢卖家放款和月末关账的手工活也会立刻少很多。
  pricingHypothesis: 每个法人实体每月 $3,000-$8,000，再叠加按匹配收款笔数或活跃币种钱包计费。
