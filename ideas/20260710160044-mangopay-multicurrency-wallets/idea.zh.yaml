jobsToBeDone:
- job: 当我们上线新的买家收款币种时，帮财务运营团队把收款自动对上发票和卖家余额，这样平台扩张就不用继续招更多对账分析师。
  currentAlternative: 在 PSP 看板、银行附言和 ERP 工作簿之间手工做收款核销。
  successMetric: 自动匹配率，以及每 1,000 笔收款对应的人工对账工时。
- job: 当关账周到了，或者企业买家少付钱时，帮 Controller 把每一笔收款追到正确的钱包和分录上，这样团队才能按时放款、按时关账。
  currentAlternative: 内部脚本，加上分析师在钱包台账和 ERP 导出表之间人工复核。
  successMetric: 关账天数，以及部分或模糊收款的异常处理时长。
ideaScorecard:
  signalStrength:
    score: 3
    rationale: 这是一次非常具体的产品发布，工作流细节也足够干净；不足是，它仍然属于产品扩面，不是新预算已经被直接验证。
  painIntensity:
    score: 4
