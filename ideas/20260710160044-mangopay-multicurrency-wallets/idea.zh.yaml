differentiator: 通用 AR 自动化工具假设的是“一家公司对一个客户总账”这个世界，而 PSP 只能告诉你账户级余额和转账。这个产品从一开始就是给平台场景做的：同一笔入账，可能同时影响买家发票、平台费、卖家余额和多套内部账。真正能守住的资产，是一张围绕专属币种钱包搭起来、又不绑某一家提供商的事件图谱，以及随时间越滚越厚的异常记忆。它见过的付款方、附言模式和新市场边角情况越多，壁垒就越深。
