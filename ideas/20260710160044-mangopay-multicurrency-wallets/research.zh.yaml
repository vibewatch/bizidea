competitors:
- name: Mangopay
  stage: 现有厂商
  wedge: 面向欧洲平台的钱包和虚拟账户基础设施。
  pricing: 定制 / 企业报价
  strength: 在欧洲平台支付、钱包和合规上有很强的场景贴合度。
  weaknessVsUs: 数据模型绑在自家体系里，做不到厂商中立地编排从发票到卖家余额、再到 ERP 证据链。
  sourceRefs:
  - 1
  - 4
  - 7
- name: Adyen
  stage: 现有厂商
  wedge: 企业级 Balance Platform 基础设施，覆盖 multi pay-in、报表和平台账户结构。
  pricing: 公开按交易收费；平台条款需定制
  strength: 全球企业客户心智强，余额、报表和对账底层能力也很丰富。
  weaknessVsUs: 平台面太宽，对 Controller 级别的“收款到子账异常记忆”反而不够聚焦。
  sourceRefs:
  - 8
  - 9
  - 10
  - 11
- name: Airwallex
  stage: 成长期
  wedge: 面向跨境企业的全球账户、多币种企业账户和嵌入式金融 API。
  pricing: 从免费到企业版的套餐；超过自助范围后走定制销售
  strength: 多币种收款和嵌入式金融落地很快，而且公开包装清晰。
  weaknessVsUs: 它掌握收款通道和 FX，但不掌握这个切口真正盯住的多方卖家余额与 ERP 关账图谱。
  sourceRefs:
  - 16
  - 17
  - 18
  - 19
- name: Modern Treasury
  stage: 成长期
  wedge: 支付运营基础设施，覆盖虚拟账户、账本和入账底层能力。
  pricing: 企业定制报价
  strength: 厂商中立的基础设施取向很强，入账归因的技术底座也扎实。
  weaknessVsUs: 客户仍得自己在这套工具之上拼财务运营工作流、异常处理和 ERP 语义。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: HighRadius
  stage: 现有厂商
  wedge: 卖给企业财务团队的收款核销与关账自动化软件。
  pricing: 订阅制企业定价；以报价为主
  strength: 财务买方类别已经被验证，对收款核销和关账自动化的叙事也很强。
  weaknessVsUs: 它是按企业应收工作流优化的，不是按多方平台钱包、卖家余额或 provider-specific payout 图谱优化的。
  sourceRefs:
  - 24
  - 26
  - 27
regulatoryTechnicalConstraints:
- point: 产品必须保留支付机构和电子货币机构围绕客户资金做日常 safeguarding 对账所需的数据。
  sourceRefs:
  - 34
- point: 任何写回或自动放款路径，都需要达到 DORA 级别的完整性、日志和恢复控制。
  sourceRefs:
  - 35
- point: FX 收款和功能货币报表，要求分录逻辑与折算处理从一开始就对齐 IAS 21。
  sourceRefs:
  - 36
- point: 不同提供商的虚拟账户、报表和出款数据结构不一样，所以在谈多通道覆盖前，适配器工作就已经不小。
  sourceRefs:
  - 4
  - 8
  - 11
  - 18
  - 21
validationSignals:
- point: Mangopay 明显扩大了虚拟账户币种覆盖，说明平台加收款通道的速度，已经快过它们消化新运营复杂度的速度。
  sourceRefs:
  - 1
  - 2
- point: Adyen、Stripe、Airwallex 和 Modern Treasury 都公开了虚拟账户、报表或 Webhook 文档，说明只读覆盖层所需的接入面已经存在。
  sourceRefs:
  - 8
  - 12
  - 18
  - 21
  - 22
- point: 收款核销、账户对账和关账自动化，早就是财务负责人熟悉的软件品类。
  sourceRefs:
  - 24
  - 25
  - 26
  - 27
  - 29
- point: 监管机构明确要求客户资金工作流必须可对账、数据完整，这会把手工或黑盒式运营的痛感放大。
  sourceRefs:
  - 34
  - 35
openQuestions:
- 在真正需要大量定制集成前，有多少目标账户的汇款附言已经干净到足以做出有用的自动匹配率？
- 前 50 个潜客里，最常见的提供商组合到底是哪种：Mangopay + NetSuite、Adyen + SAP、Airwallex + Xero，还是别的搭法？
- 买家最后会从支付运营预算、Controller 预算，还是 ERP 现代化预算里给这款产品拨钱？
- 卖家放款延迟或准备金冻结里，到底有多少是直接由买家收款匹配失败引起的，而不是合规或争议流程导致的？
