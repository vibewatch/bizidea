scenarios:
  downside:
    description: M24 之后的新客起量更慢、单个客户内部扩张更弱、复核人力也更重，公司会明显跑不满原定的 Y3 节奏。
    y3RevenueK: 1746.2
    y3EbitdaK: -914.6
    cashLowPointK: 202.3
    keyAssumptionChanges:
    - Q4Y3 的付费客户只有 22 个，而不是 30 个，因为 M24 之后的试点启动更晚、伙伴转介绍放量也更慢。
    - 初始正式生产收入更接近约 $102K ARR，成熟扩张更接近约 $120K ARR，而不是基准情景里更高的多实体收入结构。
    - 期末毛利率只到约 68%，因为复核工作量和连接器交付仍比计划里更重、更定制。
  base:
    description: 基准情景沿着 BP 里程碑走：M12 有 3 个付费客户，M24 有 10 个，M36 有 30 个，同时毛利率逐步收敛到 70% 目标。
    y3RevenueK: 2402.6
    y3EbitdaK: -384.7
    cashLowPointK: 731.1
    keyAssumptionChanges:
    - 付费客户数按 BP 的 month-12、month-24、month-36 里程碑增长：M12 为 3 个，M24 为 10 个，M36 为 30 个。
    - 老客户会从约 $32.5K 的试点，走到约 $108K 的初始正式生产 ARR，再随着更多币种或实体挂上去，走到约 $132K 的成熟年化收入。
    - 毛利率会从 Y1 里偏试点、偏服务的高 40% 区间，爬到 Q4Y3 的 72%，因为连接器复用和可复制复核工作流会逐步把交付拖累打下来。
  upside:
    description: 标杆客户和渠道伙伴把试点启动时间往前拉，成功客户内部的扩张定价也更早挂上去。
    y3RevenueK: 2725.9
    y3EbitdaK: -109.0
    cashLowPointK: 892.8
    keyAssumptionChanges:
    - Q4Y3 的付费客户达到 34 个，而不是 30 个，因为参考客户背书和伙伴转介绍让 M24 之后的启动更快。
    - 初始正式生产收入达到约 $114K ARR，成熟扩张达到约 $138K ARR，因为更多客户更早挂上额外币种或实体。
    - 期末毛利率接近 74%，因为标准化对账打法让复核时间下降得比基准情景更快。
sensitivity:
- variable: ARPU
  downsideCase: 初始正式生产收入停在约 $102K ARR，成熟扩张停在约 $120K ARR。
  baseCase: 初始正式生产收入约为 $108K ARR，成熟扩张约为 $132K ARR。
  upsideCase: 初始正式生产收入提升到约 $114K ARR，成熟扩张提升到约 $138K ARR。
  y3RevenueImpactK: -137.0
  cashImpactK: -125.0
- variable: CAC
  downsideCase: CAC 上升约 20%，因为外拓、差旅和方案设计成本都更高。
  baseCase: 前 7 个正式生产客户的 CAC 稳在约 $98.6K。
  upsideCase: 更暖的转介绍和更紧的演示打法，让 CAC 维持在高 $80K 区间。
  y3RevenueImpactK: 0.0
  cashImpactK: -48.9
- variable: 流失率
  downsideCase: 月流失率升到约 2.5%，而且 Y3 计划中的 3 个客户流失或不续约。
  baseCase: 工作流一旦嵌进去，月流失率维持在约 1.4%。
  upsideCase: 月流失率维持在约 1.0%，因此 Y3 额外多留住 1 个客户。
  y3RevenueImpactK: -129.6
  cashImpactK: -92.7
- variable: 销售周期
  downsideCase: M24 之后的启动大约晚一个季度，因为 PSP、ERP 和财务审批都拉得更长。
  baseCase: 付费试点按计划转正，M24 之后的新客启动也沿着 BP 节奏推进。
  upsideCase: 标杆客户让 M24 之后的新客启动平均提前约 2 个月。
  y3RevenueImpactK: -465.6
  cashImpactK: -331.0
- variable: 毛利率
  downsideCase: 期末毛利率大约只有 69%，而不是低 70% 区间，因为复核人力始终更重。
  baseCase: Q4Y3 毛利率达到 72%，Y3 全年约 71%。
  upsideCase: 随着连接器复用和规则库更快标准化，期末毛利率可到约 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -98.4
- variable: 招聘节奏
  downsideCase: 在可复制性还没被证实前，实施、运营和第二个销售岗位就提前一个季度入场。
  baseCase: 等第一批可复用连接器和试点证明跑出来后，再放大招聘。
  upsideCase: 后期招聘可以整体再往后挪一个季度，而不会拖慢签单。
  y3RevenueImpactK: 0.0
  cashImpactK: -115.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Prospects[Target finance teams] --> PaidPilots[Paid 90-day pilots]
      PaidPilots --> Production[Production legal entities]
      Production --> Expansion[More currencies or entities]
      Expansion --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎的核心，是把 Y1 的 3 个付费试点转成 M24 的 10 个付费实体、M36 的 30 个付费实体，同时让老客户从试点价逐步扩到约 $132K 的成熟年化价值。
- checkName: 必须跑通的前提
  finding: 90 天试点必须顺利转成正式生产，并在大约再过两个季度后吃到扩张收入，因为这正是毛利率爬升和 Q4Y3 EBITDA 转正的关键。
- checkName: 模型会在哪儿坏掉
  finding: 如果 M24 之后的销售周期晚一个季度，或者成熟收入更接近下行情景，现金低点就会被压到约 $200K，seed 融资窗口也会一下子变紧。
- checkName: 下一轮证明
  finding: 只要做到 10 个付费客户、2 个可背书的正式生产转化、一个可复用的第二连接器，以及第一次多实体扩张，并且到 M24 手里还留着约 $1.2M 现金，下一轮融资就站得住。
sanityChecks:
  ruleOf40: Y3 增速 228.1% + EBITDA 利润率 -16.0% = 212.1%（方向上很强，但也被偏小的 Y2 基数放大了）。
  burnMultiple: Y2 的 burn multiple 约为 1.1x：用约 $1.03M 的 EBITDA burn，对应约 $0.90M 的净新增 exit ARR；到 Y3，随着模型逼近 breakeven，这个数会改善到约 0.2x。
  revenuePerFte: Y3 在 11 个期末 FTE 上做到约 $218K 的收入 / FTE（落在粗略 $200-400K SaaS 基准区间里，但前提是团队一直压得很精）。
  flags:
  - 从 M24 的 10 个付费客户跳到 M36 的 30 个，靠创始人单打独斗的外拓不够，必须有伙伴转介绍和可复制的连接器打法。
  - customersEop 把付费试点和正式生产实体都算进去了，所以在 Y1 和 Y2 早期，只看经常性正式生产客户数会低于表面上的付费客户数。
  - 模型要到 Q4Y3 才会在季度口径上 EBITDA 转正；Y3 全年仍然亏损，所以 seed 故事的关键，不是盈利，而是先把证明里程碑跑出来。
  - 扩张后的 MRR 默认老客户会从单实体试点继续挂上更多币种或实体；如果扩张停住，收入会很快滑向下行情景。
  - 现金直接按 EBITDA 建模，因此年度预付款、采购拖延或发票回款变慢，都可能让真实跑道前后挪动几个月。
