slug: virtual-account-cash-graph
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10；模型从这份商业计划定稿后的第一个完整月份开始]'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2.5-3.5M + BP fundingAsk runwayMonths 18；模型取中位数，用来覆盖第 18 个月证明包外加 6 个月的 seed 缓冲]'
- id: A3
  name: 起始付费客户数
  value: '0'
  unit: customers
  source: '[BP milestones；第一个付费试点要到第 6 个月左右才出现，所以模型从零收入起步]'
- id: A4
  name: 付费试点收入
  value: 每月 $10.8K（90 天合计约 $32.5K）
  unit: usdK per customer-month
  source: '[BP investorMemo.firstCustomer.initialContract $25k-$40k / 90 天；模型取中位数]'
- id: A5
  name: 试点周期
  value: '3'
  unit: months
  source: '[BP gtm.wedge 写明切口是一段 90 天、单实体的试点]'
- id: A6
  name: 每客户初始正式生产收入
  value: $9.0K MRR（ARR 约 $108K）
  unit: usdK per month
  source: '[BP gtm.pricing 每实体每月 $3k-$8k 外加用量费；模型假设试点转正后落在价格带上沿，并加上适度用量收入]'
- id: A7
  name: 每客户成熟扩张收入
  value: $11.0K MRR（ARR 约 $132K）
  unit: usdK per month
  source: '[BP businessModel.expansionLevers + BP market.som $3.6M / 30 客户 + Research bottomUpSizingDrivers blended ACV 约 $120K；成熟客户会高于混合均值，而晚期客户结构又让 Q4Y3 ARR 仍贴近 SOM 锚点]'
- id: A8
  name: 试点转正后的扩张滞后期
  value: '6'
  unit: production months
  source: '[BP milestones 第 18 个月出现第一次多实体扩张；模型假设客户在正式生产用成功约两个季度后，走到成熟定价]'
- id: A9
  name: 客户爬坡
  value: 到 M12 有 3 个付费客户，到 M24 有 10 个，到 M36 有 30 个
  unit: customersEop
  source: '[BP milestones month 12 / month 24 / month 36；月度起始节奏为 M6、M8、M11、M14、M17、M19、M20、M22、M23、M24，随后在 Y3 四个季度里净增 3、5、6、6]'
- id: A10
  name: 毛利率爬坡
  value: Y1 有收入的月份毛利率为 48%-53%，Y2 为 61%-69%，Y3 为 70%-72%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + Research reportMemo.sensitivityCases 对复核优先 adoption 与 noisy remittance data 的讨论；早期交付更像服务，直到连接器复用跑起来]'
- id: A11
  name: 单位经济模型里的月流失率
  value: 1.4%
  unit: percent per month
  source: '[企业财务 SaaS 的经验法则；用在 LTV 计算和下行情景敏感度里，而 customersEop 本身按净流失建模]'
- id: A12
  name: 创始人总包薪酬
  value: $168K
  unit: USD per year
  source: '[欧洲 pre-seed 创始人薪资、福利与 payroll load 的经验假设]'
- id: A13
  name: 工程岗位总包薪酬
  value: 每个 FTE $186K
  unit: USD per year
  source: '[BP team Founding eng + 欧洲资深 fintech / data 工程总包经验值]'
- id: A14
  name: 集成岗位总包薪酬
  value: 每个 FTE $180K
  unit: USD per year
  source: '[BP team Payments data integrations engineer + PSP / ERP 集成人才的经验总包]'
- id: A15
  name: 财务运营 / 产品岗位总包薪酬
  value: $162K
  unit: USD per year
  source: '[BP team Finance operations product lead + Controller 级产品 / 工作流岗位的经验总包]'
- id: A16
  name: 实施 / 客户成功岗位总包薪酬
  value: 每个 FTE $144K
  unit: USD per year
  source: '[BP team Customer implementation lead + 技术客户上线与 ROI 交付岗位的经验总包]'
- id: A17
  name: 销售 / 渠道岗位总包薪酬
  value: 每个 FTE $198K
  unit: USD per year
  source: '[BP gtm.channels + 欧洲企业财务销售（含浮动薪酬）的经验总包]'
- id: A18
  name: G&A / 运营岗位总包薪酬
  value: $120K
  unit: USD per year
  source: '[精简型财务、合规和供应商管理岗位的经验总包；放在第一批可复用部署之后再招]'
- id: A19
  name: 招聘时间线
  value: M1 招创始人、工程、集成；M4 招财务运营产品；M7 招实施；M13 招销售；M16 招第 2 个工程；M19 招第 2 个集成；M24 招第 2 个实施；M28 招运营；M30 招第 2 个销售
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale + 常见 startup-finance 经验；只有付费试点跑出证明后，才放大 GTM 与运营]'
- id: A20
  name: 薪酬在 P&L 科目间的分摊
  value: 创始人 60% 记入 S&M / 20% 记入 R&D / 20% 记入 G&A；工程 100% 记入 R&D；集成 20% 记入 S&M / 80% 记入 R&D；财务运营产品 65% 记入 R&D / 35% 记入 G&A；实施 40% 记入 S&M / 60% 记入 R&D；销售 100% 记入 S&M；运营 100% 记入 G&A
  unit: allocation
  source: '[BP team 的角色说明 + BP operations；把人力成本拆进各条 opex 科目，同时保证 salaryK 和 headcount 完整对齐]'
- id: A21
  name: 非薪酬 Opex 爬坡
  value: 36 个月里，S&M 从每月 $2.5K 爬到 $13.5K，R&D 从每月 $5.0K 爬到 $10.5K，G&A 从每月 $3.5K 爬到 $8.5K
  unit: usdK per month
  source: '[BP operations + Research reportMemo.distributionChannels + Research reportMemo.regulatoryLandscape + 云资源、差旅、法务、保险和审计准备的经验值]'
- id: A22
  name: 付费客户定义
  value: 1 个正在跑工作流的付费试点或正式生产法人实体；口径按净值算，并把试点算进去
  unit: definition
  source: '[BP businessModel.unitOfValue + BP milestones；纯经常性正式生产客户数，会在 Y1 和 Y2 早期落后于 customersEop 口径]'
- id: A23
  name: CAC 口径
  value: 每个正式生产客户 $98.6K
  unit: USD per production customer
  source: '[模型计算：用 Y1-Y2 的 salesMarketingK 除以 Q4Y2 的 7 个正式生产客户，再结合 BP gtm.funnelTargets 里 50%+ 的试点转正式生产转化率]'
- id: A24
  name: 现金转化口径
  value: 把 EBITDA 近似看作现金变动
  unit: formula
  source: '[startup-finance 经验法则；在 pre-seed 阶段，默认 capex、债务服务、税和营运资金时点影响都不大]'
- id: A25
  name: 决定融资规模的下一轮里程碑
  value: 做到 10 个付费客户、2 个可背书的正式生产转化、可复用的第二连接器交付，以及第一次多实体扩张
  unit: milestone
  source: '[BP milestones month 18 / month 24 + BP fundingAsk.useOfFundsSummary；这就是这轮 pre-seed 要买出来的、够去讲 seed 的证明包]'
- id: A26
  name: 季度薪酬口径
  value: Y2 和 Y3 的 salaryK 按季度内真实月度招聘算，不只看季度末快照
  unit: convention
  source: '[headcount 列口径 + A19 招聘时间线；保证季度 salaryK 和月度 payroll 爬坡能对上]'
