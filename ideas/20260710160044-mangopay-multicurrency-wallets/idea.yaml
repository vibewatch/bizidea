differentiator: >-
  Generic AR automation tools assume one company collecting against one customer ledger, while PSPs only show
  account-level balances and transfers. This product is purpose-built for platforms where one inbound receipt can affect
  buyer invoices, platform fees, seller balances, and multiple internal ledgers at once. The defensible asset is a
  provider-neutral event graph and exception memory built around dedicated currency wallets, which gets sharper as it
  sees more remitters, references, and market-launch edge cases across platforms.
