topRisks:
  - name: "PSP bundling"
    description: "Mangopay or larger PSPs could add basic matching and reconciliation features inside their own dashboards."
    mitigation: "Stay provider-neutral and win on invoice-to-subledger logic, ERP evidence, and cross-provider exception memory that customers need beyond one PSP."
  - name: "Messy remittance data"
    description: "Buyer bank-transfer references may be inconsistent enough to limit automated matching quality early on."
    mitigation: "Start with read-only workflows, focus on customers with structured invoice references, and combine reference rules with human review before broader automation."
  - name: "Hidden budget ownership"
    description: "Some platforms may feel the pain but still treat reconciliation as back-office work rather than a software budget line."
    mitigation: "Sell into market-launch and close-quality triggers, quantify analyst hours and delayed seller releases, and target finance leaders already adding multiple currencies."
