problem: >-
  Global B2B platforms can now open local collection accounts in more markets faster than their finance teams can absorb.
  Every buyer bank transfer still has to be matched to the right invoice, currency wallet, legal entity, fee split, and
  seller balance before revenue or payout logic moves. Teams usually piece this together from PSP dashboards, bank
  references, internal wallet ledgers, and ERP exports, so each new currency launch adds exception queues, delayed seller
  releases, and noisy month-end close.
targetUser:
  primary: "Controller or head of payments operations at a European B2B marketplace or freelancer platform collecting enterprise buyer bank transfers in 3-8 currencies through dedicated virtual accounts."
  secondary: "Finance systems lead or marketplace operations lead responsible for seller balance accuracy and cash application."
  buyer: "CFO or VP Finance"
startupThesis:
  nonObviousInsight: >-
    Once providers like Mangopay remove the bank-account-opening project, the bottleneck shifts from rail access to cash
    application across platform subledgers. The seemingly simple one-wallet-per-currency model is the enabling primitive:
    it makes receipt attribution deterministic enough for software to automate invoice matching, fee routing, and seller
    balance updates.
  beachhead: >-
    European freelancer and B2B-services marketplaces with 5,000-plus monthly buyer invoices, 3-8 active collection
    currencies, and Mangopay-like dedicated virtual accounts for enterprise buyers.
  wedge: >-
    A virtual-account cash graph that matches every inbound buyer transfer to the right invoice, wallet, fee split,
    seller balance, and ERP journal before funds are released downstream.
  whyNowCatalyst: >-
    Mangopay's jump from seven to 24 currencies on the same virtual-account setup makes multi-currency collection a
    rollout decision, which turns reconciliation sprawl into the next growth blocker for global platforms.
  ventureScalePath: >-
    Start with buyer cash application for B2B marketplaces, then expand into reserve management, payout release
    controls, treasury forecasting, entity launches, and multi-provider ledgers for any platform moving money across
    currencies.
solution: >-
  Virtual Account Cash Graph ingests virtual-account credits, invoice metadata, marketplace orders, seller subledgers,
  and ERP journals to build a single receipt graph for every currency wallet. When money lands, it auto-matches bank
  references and expected amounts, proposes the fee and seller-balance movements, and flags ambiguous, partial, or
  wrong-currency payments before they poison close. The first release is read-only and focused on B2B invoice
  collections, giving finance teams an exception workbench and journal export rather than asking them to replace
  Mangopay or their ERP. As the dataset grows, the product learns recurring remitter patterns and corridor-specific
  exception rules, turning each new currency launch into configuration instead of headcount. Later modules can govern
  reserve releases, payout timing, and treasury forecasting from the same event graph.
goToMarketSeed:
  firstCustomer: >-
    VP Finance at a London-based freelancer marketplace with 10,000-plus monthly buyer invoices across the UK, eurozone,
    and Japan, collecting GBP, EUR, USD, and JPY into Mangopay virtual accounts while manually matching receipts to
    contractor balances and NetSuite.
  buyingTrigger: >-
    Launching two or more new collection currencies, rolling out enterprise invoicing in another market, or a quarter-end
    close that exposes a growing backlog of partial and misapplied cash.
  currentAlternative: >-
    PSP dashboards, bank-reference CSVs, internal wallet ledgers, and manual ERP cash-application workflows run by
    finance-ops analysts.
  switchingReason: >-
    The first customer switches because the product sits on top of the existing PSP and ERP stack, improves auto-match
    rates immediately, and cuts the manual work that delays seller releases and month-end close.
  pricingHypothesis: >-
    $3,000-$8,000 per legal entity per month plus usage-based pricing on matched receipts or active currency wallets.
