- "id": "A19"
  "name": "Hiring timeline"
  "value": "M1 founder, eng, integrations; M4 finance-ops product; M7 implementation; M13 sales; M16 eng2; M19 integrations2; M24 implementation2; M28 ops; M30 sales2"
  "unit": "timeline"
  "source": "[BP team.startTiming + BP strategicChoices.sequencingRationale + startup-finance heuristic; scale GTM and ops only after paid-pilot proof exists]"
- "id": "A20"
  "name": "Payroll allocation to P&L lines"
  "value": "Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; integrations 20% S&M / 80% R&D; finance ops product 65% R&D / 35% G&A; implementation 40% S&M / 60% R&D; sales 100% S&M; ops 100% G&A"
