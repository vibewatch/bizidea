- "id": "A1"
  "name": "Model start month"
  "value": "2026-08"
  "unit": "YYYY-MM"
  "source": "[BP date 2026-07-10; model starts in the first full month after the dated business plan]"
- "id": "A2"
  "name": "Opening cash / pre-seed raise"
  "value": "$3.0M"
  "unit": "USD"
  "source": "[BP fundingAsk targetFundingRangeUsd $2.5-3.5M + BP fundingAsk runwayMonths 18; model uses the midpoint to fund the month-18 proof package plus a 6-month seed buffer]"
- "id": "A3"
  "name": "Starting paying customers"
  "value": "0"
  "unit": "customers"
  "source": "[BP milestones; first paid pilot is not expected until month 6, so the model begins pre-revenue]"
- "id": "A4"
  "name": "Paid pilot revenue"
  "value": "$10.8K per month (~$32.5K over 90 days)"
  "unit": "usdK per customer-month"
  "source": "[BP investorMemo.firstCustomer.initialContract $25k-$40k 90-day pilot; model uses the midpoint]"
- "id": "A5"
  "name": "Pilot duration"
  "value": "3"
  "unit": "months"
  "source": "[BP gtm.wedge says the wedge is a 90-day one-entity pilot]"
- "id": "A6"
  "name": "Initial production revenue per customer"
  "value": "$9.0K MRR (~$108K ARR)"
  "unit": "usdK per month"
  "source": "[BP gtm.pricing $3k-$8k per entity per month plus usage; model assumes top-of-band subscription plus modest usage after pilot conversion]"
- "id": "A7"
  "name": "Expanded mature revenue per customer"
  "value": "$11.0K MRR (~$132K ARR)"
  "unit": "usdK per month"
  "source": "[BP businessModel.expansionLevers + BP market.som $3.6M from 30 customers + Research bottomUpSizingDrivers blended ACV ~$120K; mature accounts expand above the blended average while the late-stage mix keeps Q4Y3 ARR close to the SOM anchor]"
- "id": "A8"
  "name": "Expansion lag after pilot conversion"
  "value": "6"
  "unit": "production months"
  "source": "[BP milestones month 18 first multi-entity expansion; model assumes a customer reaches mature pricing after roughly two quarters of successful production use]"
- "id": "A9"
  "name": "Customer ramp"
  "value": "3 paying customers by M12, 10 by M24, and 30 by M36"
  "unit": "customersEop"
  "source": "[BP milestones month 12 / month 24 / month 36; monthly start schedule is M6, M8, M11, M14, M17, M19, M20, M22, M23, M24, then 3, 5, 6, and 6 net adds across Y3 quarters]"
- "id": "A10"
  "name": "Gross margin ramp"
  "value": "48%-53% in Y1 revenue months, 61%-69% in Y2, and 70%-72% in Y3"
  "unit": "gross margin percent"
  "source": "[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + Research reportMemo.sensitivityCases on reviewer-first adoption and noisy remittance data; early delivery is more services-heavy before connector reuse]"
- "id": "A11"
  "name": "Monthly churn for unit economics"
  "value": "1.4%"
  "unit": "percent per month"
  "source": "[Startup-finance heuristic for sticky enterprise finance workflow SaaS; used in LTV math and downside sensitivity, while customersEop is modeled net of churn]"
