"scenarios":
  "downside":
    "description": "Slower post-M24 starts, weaker expansion inside each logo, and heavier reviewer labor leave the company well below the planned Y3 ramp."
    "y3RevenueK": 1746.2
    "y3EbitdaK": -914.6
    "cashLowPointK": 202.3
    "keyAssumptionChanges":
    - "Q4Y3 paying customers reach 22 instead of 30 because pilot starts after M24 arrive later and partner referrals scale more slowly."
    - "Initial production stays closer to about $102K ARR and mature expansion stays near about $120K ARR, not the higher multi-entity mix in the base case."
    - "Gross margin exits near 68% because reviewer effort and connector-specific delivery remain more bespoke than planned."
  "base":
    "description": "Base case follows the BP milestone path of 3 paying customers by M12, 10 by M24, and 30 by M36 while gross margin converges on the 70% target."
    "y3RevenueK": 2402.6
    "y3EbitdaK": -384.7
    "cashLowPointK": 731.1
    "keyAssumptionChanges":
    - "Paying customers grow from 3 at M12 to 10 at M24 and 30 at M36 in line with the BP month-12, month-24, and month-36 milestones."
    - "Older customers step from about $32.5K pilots to roughly $108K initial production ARR and about $132K mature annualized revenue as more currencies or entities attach."
    - "Gross margin climbs from pilot-heavy high-40s in Y1 to 72% in Q4Y3 as connector reuse and repeatable reviewer workflows reduce delivery drag."
  "upside":
    "description": "Reference logos and channel partners pull pilot starts forward, and expansion pricing attaches earlier inside each successful logo."
    "y3RevenueK": 2725.9
    "y3EbitdaK": -109.0
    "cashLowPointK": 892.8
    "keyAssumptionChanges":
    - "Q4Y3 paying customers reach 34 instead of 30 because referenceability and partner referrals accelerate starts after M24."
    - "Initial production reaches about $114K ARR and mature expansion reaches about $138K ARR as more customers add extra currencies or entities sooner."
    - "Gross margin exits near 74% because standardized reconciliation playbooks reduce reviewer time faster than in the base case."
"sensitivity":
- "variable": "ARPU"
  "downsideCase": "Initial production stays near about $102K ARR and mature expansion near about $120K ARR."
  "baseCase": "Initial production is about $108K ARR and mature expansion about $132K ARR."
  "upsideCase": "Initial production reaches about $114K ARR and mature expansion about $138K ARR."
  "y3RevenueImpactK": -137.0
  "cashImpactK": -125.0
- "variable": "CAC"
  "downsideCase": "CAC rises about 20% as outbound, travel, and solutioning effort per win all climb."
  "baseCase": "CAC stays near $98.6K on the first 7 production customers."
  "upsideCase": "Warm referrals and a tighter demo playbook keep CAC closer to the high-$80Ks."
  "y3RevenueImpactK": 0.0
  "cashImpactK": -48.9
- "variable": "churn"
  "downsideCase": "Monthly churn reaches about 2.5% and 3 planned Y3 logos are lost or fail to renew."
  "baseCase": "Monthly churn holds near 1.4% once the workflow is embedded."
  "upsideCase": "Monthly churn stays near 1.0% with one extra logo retained through Y3."
  "y3RevenueImpactK": -129.6
  "cashImpactK": -92.7
- "variable": "sales cycle"
  "downsideCase": "Post-M24 starts slip by roughly one quarter because PSP, ERP, and finance approvals take longer."
  "baseCase": "Paid pilots convert on plan and post-M24 starts follow the BP ramp."
  "upsideCase": "Reference logos pull post-M24 starts forward by roughly 2 months."
  "y3RevenueImpactK": -465.6
  "cashImpactK": -331.0
- "variable": "gross margin"
  "downsideCase": "Gross margin exits around 69% instead of the low-70s because reviewer labor stays heavier."
  "baseCase": "Gross margin reaches 72% in Q4Y3 and about 71% across Y3."
  "upsideCase": "Gross margin exits around 74% as connector reuse and rules libraries standardize faster."
  "y3RevenueImpactK": 0.0
  "cashImpactK": -98.4
- "variable": "hiring pace"
  "downsideCase": "Implementation, ops, and second-sales hires come forward by one quarter before repeatability is proven."
  "baseCase": "Scale hires wait for the first repeatable connectors and pilot proof."
  "upsideCase": "Late hires slide back by one quarter without slowing bookings."
  "y3RevenueImpactK": 0.0
  "cashImpactK": -115.5
"modelDiagram":
  "title": "unit economics flow"
  "mermaid": |
    flowchart LR
      Prospects[Target finance teams] --> PaidPilots[Paid 90-day pilots]
      PaidPilots --> Production[Production legal entities]
      Production --> Expansion[More currencies or entities]
      Expansion --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
"modelSanity":
- "checkName": "Revenue engine"
  "finding": "Base revenue comes from turning 3 Y1 paid pilots into 10 paying entities by M24 and 30 by M36 while older logos expand from pilot pricing to about $132K mature annualized value."
- "checkName": "Must go right"
  "finding": "The 90-day pilot must convert into production and then expand within about two more quarters, because that is what lifts both gross margin and the Q4Y3 EBITDA crossover."
