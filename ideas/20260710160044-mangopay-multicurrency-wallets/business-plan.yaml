slug: virtual-account-cash-graph
date: "2026-07-10"
executiveSummary: >-
  Multi-currency virtual accounts are making local collection rollout easier for
  European B2B platforms, but the finance bottleneck is moving downstream into
  cash application across invoices, seller balances, and ERP close. This
  company sells a reviewer-first cash graph that sits between Mangopay or
  Adyen-style rails and NetSuite or Xero-style accounting systems to map each
  inbound transfer to the right wallet, invoice, fee split, seller balance, and
  journal entry. The initial beachhead is UK and EU freelancer and B2B-services
  marketplaces with 5,000-plus monthly buyer invoices, 3-8 collection
  currencies, and dedicated virtual accounts, because they feel expansion pain
  quickly and already own close and payout-accuracy budgets. The first sale
  should be a paid one-entity pilot triggered by a new-currency launch or
  quarter-end backlog, sold founder-led to a controller or VP Finance and
  converted into per-entity subscription plus usage pricing once match accuracy
  and close improvement are proven. The wedge is attractive because PSPs are
  provider-bound, payment-operations vendors are primitives, and AR or close
  suites do not model platform-specific seller-balance semantics, leaving room
  for a provider-neutral layer. The product should stay read-only at launch;
  safeguarding, DORA, and IAS 21 make audit trails, human override, and
  currency-aware journal logic part of product-market fit rather than
  compliance cleanup. The central disconfirming risk is data quality: if target
  accounts cannot supply enough structured remittance and invoice references to
  achieve roughly 70% first-pass matching, the business becomes services-heavy
  and pricing power erodes. Two gaps still need proof in the first 90 days:
  which PSP and ERP combinations dominate the beachhead, and whether budget
  sits with payments operations, controllership, or ERP modernization.
problem:
  - >-
    Dedicated virtual accounts separate currencies cleanly but do not solve the
    downstream mapping from each inbound transfer to the right invoice, platform
    fee, seller balance, and ERP journal, so every new currency adds exception
    work.
  - >-
    Finance teams still reconcile across PSP dashboards, bank-reference CSVs,
    internal wallet ledgers, and ERP exports, which delays seller releases and
    stretches month-end close.
  - >-
    Controllers cannot safely automate postings or release rules when
    remittance references are partial, wrong-currency, or ambiguous and the
    audit trail is fragmented across systems.
solution:
  - >-
    Ingest virtual-account credits, invoice and order data, seller ledgers, and
    ERP mappings into a provider-neutral receipt graph keyed by
    single-currency wallets.
  - >-
    Auto-suggest invoice matches, fee routing, seller-balance updates, and
    journal exports, with a reviewer queue for partial, ambiguous, and
    wrong-currency receipts.
  - >-
    Start as a read-only overlay for one PSP and one ERP stack, then add rule
    libraries, remitter memory, and later reserve or payout-control modules
    only after reviewer accuracy is trusted.
whyWeWin:
  - >-
    The provider-neutral receipt graph goes deeper than PSP reporting and starts
    where generic AR tools stop by modeling multi-party seller-balance and fee
    attribution.
  - >-
    Reviewer-first design aligns with safeguarding, DORA, and IAS 21
    constraints, which makes trust and auditability a feature rather than a
    future enterprise requirement.
  - >-
    A one-entity deployment lands inside an existing finance pain and budget
    instead of asking the buyer to replace its PSP or ERP.
  - >-
    Every resolved exception improves remitter matching, corridor rules, and
    cross-provider journal mappings that incumbents rarely see in one place.
strategicChoices:
  beachhead: >-
    UK and EU freelancer and B2B-services marketplaces with 5,000-plus monthly
    buyer invoices, 3-8 collection currencies, Mangopay-style dedicated virtual
    accounts, and NetSuite or Xero close workflows.
  wedgeRationale: >-
    This slice is narrow enough to start with one PSP, one ERP, and one legal
    entity, but painful enough to win budget because each currency launch can
    delay seller releases and close. Broader AR automation or generic
    marketplace finance would add more workflows before the company proves that
    platform-specific cash application actually converts.
  sequencingRationale: >-
    Build the reviewer-first Mangopay and one-ERP workflow first because trust,
    auditability, and measurable close ROI are the gating proof points. Sell
    one-entity pilots before hiring a scaled sales team, add the second
    connector only after prospect stack data is clear, and defer payout-control
    automation until reviewers consistently trust match recommendations and
    journal evidence.
  notYet:
    - Broad AR automation for single-entity merchants
    - Consumer checkout and card-authorization workflows
    - Multi-PSP coverage before one PSP plus one ERP path is repeatable
    - Autonomous journal posting or seller-release execution
    - Treasury forecasting and reserve management before core cash-application proof
market:
  tam: "$720M estimated TAM across roughly 6,000 global platforms with multi-currency bank-transfer collections at about $120k blended ARR"
  sam: "$96M estimated SAM across roughly 800 UK and European beachhead accounts with 3-8 collection currencies and finance-owned close pain"
  som: "$3.6M estimated year-3 SOM from 30 paying customers after landing one-entity reviewer deployments and expanding into more entities or currencies"
  segments:
    - "Primary segment is UK and EU freelancer and B2B-services marketplaces with enterprise bank-transfer collections"
    - "Secondary segment is vertical B2B platforms that collect buyer funds before updating supplier or contractor balances"
  buyingProcess: >-
    A controller or VP Finance usually sponsors evaluation when a new-currency
    launch or quarter-end backlog exposes manual matching pain. Finance systems
    and payments-operations leads validate connector fit, while the CFO or VP
    Finance approves a one-entity paid pilot that converts to an annual entity
    subscription only if it improves close speed and release accuracy.
product:
  mvp: >-
    A reviewer-first Mangopay-first workflow for one legal entity and one ERP
    export path, with currency-wallet ingestion, remittance parsing, invoice
    match suggestions, seller-balance proposals, and journal-ready evidence
    packs. The MVP does not auto-post or release funds; every recommendation is
    reviewable and overrideable.
  sixMonth: >-
    Mangopay plus NetSuite workflow live on 2-3 design partners with remitter
    rules, exception queue, daily reconciliation evidence, and measured
    first-pass match performance by currency.
  twelveMonth: >-
    Second connector added based on dominant prospect stack, along with approval
    logs, close-performance dashboards, and reusable templates for launching
    new currencies or entities.
  twentyFourMonth: >-
    Multi-provider receipt graph, multi-entity controls, and reviewer-approved
    reserve or payout-release recommendations built on the same audit log and
    journal model.
  keyBets:
    - Structured invoice references on beachhead accounts support 70% or better first-pass match suggestions
    - Mangopay-first plus one ERP connector is enough to close the first 3-5 customers before broader integrations
    - A reviewer-first deployment can show at least a one-day faster close or materially fewer seller-release delays within one quarter
    - Provider-neutral exception memory compounds faster than PSP roadmaps
gtm:
  wedge: >-
    Sell a 90-day one-entity reviewer-first pilot to a controller or VP Finance
    at a marketplace expanding into new currencies, with success defined by
    higher first-pass match rates, shorter exception queues, and faster
    month-end close.
  channels:
    - Founder-led outbound to controllers, VPs Finance, and heads of payments operations at European freelancer and B2B-services marketplaces
    - Referral and co-sell through PSP implementation partners once the one-entity pilot playbook is proven
    - NetSuite and Xero consultancies that already own cash-application or close-modernization projects
  funnelTargets: "Target account -> qualified pilot 15-25%; pilot -> annual production contract 50%+; first entity -> second entity or added-currency expansion 60%+"
  pricing: >-
    Charge a paid 90-day pilot, then $3,000-$8,000 per legal entity per month
    plus usage on matched receipts or active currency wallets. That matches how
    buyers feel the pain by entity and currency launch rather than by seat
    count, and lets them fund the purchase from close and payout-operations
    budgets.
businessModel:
  revenueStreams:
    - Annual subscription per legal entity
    - Usage fees on matched receipts or active currency wallets
    - Onboarding and integration fees for new PSP, ERP, or entity rollouts
  unitOfValue: One legal entity running the cash-application workflow plus its matched receipt volume
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one legal entity to all entities and currencies inside the same platform
    - Add the dominant second PSP or ERP connector to unlock more of the beachhead
    - Layer reserve-management and payout-release controls once reviewer trust is established
    - Reuse the canonical model for treasury forecasting and multi-provider ledger views
strategyMap:
  northStarMetric: Monthly inbound buyer receipts matched to invoice, seller balance, and ERP journal within one business day with reviewer approval
  inputMetrics:
    - First-pass match rate on structured-reference receipts
    - Median time to resolve exceptions
    - Days from month-end to close for live entities
    - Seller-release delays attributable to cash-application issues
    - Pilot-to-production conversion rate
    - Time to add a new currency or legal entity
  moatsToBuild:
    - Remitter and reference-resolution library across recurring buyers and corridors
    - Provider-neutral canonical model linking virtual accounts, invoices, seller balances, and ERP journals
    - Approval, override, and audit log tuned to safeguarding, DORA, and IAS 21 evidence needs
    - Benchmark data on which currencies, remittance patterns, and workflow rules drive close delays
  killCriteria:
    - Fewer than 3 paid one-entity pilots by month 12 after 25 qualified buyer conversations
    - Design partners with structured references still fail to reach 70% first-pass match suggestions or cannot cut exception handling materially
    - No pilot shows at least a one-day close improvement or a 30% drop in seller-release delays within 90 days of go-live
    - The first 10 serious opportunities require more than 3 bespoke high-effort connector combinations
  mermaid: |
    flowchart LR
      Wedge[One-entity cash-application wedge] --> MVP[Reviewer-first cash graph MVP]
      MVP --> Proof[Higher match rates and faster close]
      Proof --> Expansion[Multi-entity rollout and payout-control modules]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Promising pre-seed wedge with real finance pain, but conviction depends on
      remittance-data quality and repeatable connector scope.
    whyBelieve: >-
      A provider-neutral cash-application layer can land where PSPs,
      payment-operations primitives, and close suites each stop short of
      platform-specific seller-balance reconciliation.
    whyDoubt: >-
      If structured references are too noisy or PSPs ship invoice-aware
      workflows quickly, the product could degrade into integration-heavy
      services with a capped market.
    nextDiligence: >-
      Verify 5-10 design-partner backtests and 3 paid pilots that show 70% or
      better first-pass matching plus measurable close or seller-release
      improvement.
  firstCustomer:
    title: VP Finance at a European freelancer marketplace
    profile: >-
      A London or Amsterdam-based marketplace with 10,000-plus monthly
      enterprise invoices, GBP, EUR, USD, and JPY collections into Mangopay
      virtual accounts, contractor balances, and a NetSuite close workflow.
    trigger: >-
      Adding two new collection currencies or entering a new enterprise market
      creates a close backlog and delayed seller releases.
    buyer: CFO or VP Finance
    initialContract: >-
      A $25k-$40k 90-day pilot for one legal entity and one PSP and ERP stack,
      converting to a $36k-$96k annual subscription plus usage as more
      currencies or entities go live.
  mustBeTrue:
    - At least 5 of the first 10 serious prospects process enough structured-reference receipts to support 70% or better first-pass match suggestions
    - Controllers or VPs Finance will fund a one-entity paid pilot from existing close or payments-operations budgets rather than wait for a full ERP project
    - More than half of successful pilots convert to annual production contracts within six months of go-live
    - One-entity deployments expand into additional currencies, entities, or modules quickly enough to support roughly $120k blended ARR
    - PSPs and payment-operations vendors do not close the provider-neutral invoice-to-seller-balance gap before the startup builds exception-memory and audit-log moats
  diligenceQuestions:
    - What percentage of target European platforms have structured invoice references in remittance data today
    - Which PSP and ERP combinations dominate the first 50 prospects
    - Who signs and who pays for the first pilot in practice
    - What baseline metric best predicts ROI for the buyer such as days to close, analyst hours, or seller-release delays
    - How far are Mangopay, Adyen, and Modern Treasury from provider-neutral invoice and ERP evidence workflows
operatingAssumptions:
  - assumption: >-
      Structured invoice and remittance references are good enough on beachhead
      accounts to support 70% or better first-pass match suggestions.
    basis: research.yaml
    validationTest: >-
      Collect anonymized remittance strings, invoice metadata, and analyst
      resolution logs from 5-10 design partners and backtest match performance
      by currency and entity.
    decisionImpact: >-
      If false, the company must narrow to cleaner accounts, rely more on human
      review, and accept lower gross margin and slower scaling.
  - assumption: >-
      A one-entity pilot can convert into a $36k-$96k annual subscription plus
      usage within six months of go-live.
    basis: idea.yaml
    validationTest: >-
      Run pricing and conversion tests across the first 3 paid pilots and target
      at least 2 production conversions at the planned pricing band.
    decisionImpact: >-
      If false, year-3 ARR assumptions and hiring pace both need to reset, and
      the company may need a lower-price or more usage-heavy model.
  - assumption: >-
      Mangopay-first plus one ERP connector covers most of the first 10
      customers before a broader integration buildout is required.
    basis: operator judgment
    validationTest: >-
      Map PSP, ERP, and close stacks across the first 50 prospects and confirm
      that one PSP and one ERP path cover at least 60% of qualified pipeline.
    decisionImpact: >-
      If false, connector sprawl becomes the main product and hiring risk, so
      the roadmap and funding ask must shift toward heavier integration
      capacity.
  - assumption: >-
      Controllers will adopt a reviewer-first overlay before they trust any
      auto-posting or payout-release automation.
    basis: research.yaml
    validationTest: >-
      In 8 buyer interviews and the first 2 paid pilots, confirm that the
      read-only workflow is acceptable if evidence packs and override controls
      are strong.
    decisionImpact: >-
      If false, the startup may need to sell through service partners or delay
      productization until a stronger compliance wrapper exists.
  - assumption: >-
      Delayed seller releases and close backlog create enough measurable ROI to
      justify software budget rather than discretionary tooling spend.
    basis: research.yaml
    validationTest: >-
      Measure pre and post pilot days to close, exception resolution time, and
      seller-release delays, targeting at least a one-day close improvement or a
      30% reduction in delays.
    decisionImpact: >-
      If false, the company should change segment, reduce pricing expectations,
      or reposition toward workflow infrastructure instead of direct SaaS.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: ICP and pricing discovery sprint
    hypothesis: >-
      Live new-currency launches and close backlogs are strong enough triggers
      to get a controller or VP Finance to sign a paid one-entity pilot.
    successMetric: 12 buyer interviews, 3 design-partner LOIs, and one pilot package preferred in more than half of pricing conversations
    owner: Founding CEO
  - horizon: 0-90 days
    experiment: Mangopay and NetSuite remittance backtest
    hypothesis: >-
      Structured-reference accounts can support reviewer-first matching quality
      high enough to create immediate ROI without write-back automation.
    successMetric: 70% or better first-pass match suggestions on 3 historical datasets and less than 15% unresolved exceptions at close cutoff
    owner: Founding eng
  - horizon: 90-180 days
    experiment: First reviewer-first production pilot
    hypothesis: >-
      The product can cut exception resolution time and produce journal-ready
      evidence without replacing the PSP or ERP.
    successMetric: One pilot live with median exception resolution time down 50% and at least a one-day faster close or a 30% drop in seller-release delays
    owner: Finance operations product lead
  - horizon: 90-180 days
    experiment: Connector-order validation
    hypothesis: >-
      One additional connector chosen from the pipeline can unlock most of the
      next set of opportunities.
    successMetric: Stack map of 50 prospects completed and second connector selected that covers 60% or more of qualified pipeline
    owner: Payments data integrations engineer
  - horizon: 180-365 days
    experiment: Pilot-to-production conversion test
    hypothesis: >-
      More than half of successful pilots convert to annual contracts and at
      least one expands to a second entity or currency inside the first account.
    successMetric: 2 of the first 3 paid pilots convert to production and 1 expands within six months of go-live
    owner: Customer implementation lead
  - horizon: 180-365 days
    experiment: Partner-sourced pipeline test
    hypothesis: >-
      PSP implementers and NetSuite or Xero consultancies can refer qualified
      accounts without commoditizing the product.
    successMetric: 4 partner-sourced qualified opportunities and 1 closed paid pilot
    owner: Founding CEO and customer implementation lead
operations:
  - >-
    Canonical receipt graph normalizing PSP virtual-account events, invoice
    metadata, seller ledgers, and ERP journal mappings into one reviewable cash
    object per receipt.
  - >-
    Reviewer workflow with explicit approvals, overrides, and immutable audit
    trail before any posting or payout recommendation leaves the system.
  - >-
    Currency-native journal logic and daily reconciliation evidence aligned to
    safeguarding and IAS 21 requirements.
  - >-
    Connector program starting with Mangopay and one ERP, then adding the
    second stack only after prospect concentration is proven.
  - >-
    Implementation playbook with PSP implementers and NetSuite or Xero
    consultancies to onboard one entity quickly and measure close or
    seller-release ROI.
team:
  - role: Founding CEO and finance seller
    startTiming: Month 0
    rationale: >-
      Owns founder-led outbound, design-partner recruiting, pricing, and the
      first PSP and consultancy relationships while translating live finance
      pain into product priorities.
  - role: Founding eng
    startTiming: Month 0
    rationale: >-
      Builds the canonical receipt graph, matching engine, approval controls,
      and evidence pack workflow that define the product moat.
  - role: Payments data integrations engineer
    startTiming: Month 1
    rationale: >-
      Owns Mangopay, ERP, and second-connector normalization so implementation
      does not drift into bespoke delivery.
  - role: Finance operations product lead
    startTiming: Month 3
    rationale: >-
      Encodes exception workflows, journal mappings, and close metrics so the
      product reflects controller-grade operations rather than generic AR
      automation.
  - role: Customer implementation lead
    startTiming: Month 6
    rationale: >-
      Runs pilots, proves ROI, and turns partner-assisted onboarding into a
      repeatable deployment motion before the company hires scaled sales.
milestones:
  - horizon: 0-12 months
    items:
      - "Month 3 - complete 12 customer interviews, price-test paid pilot packaging, and sign 3 design-partner LOIs"
      - "Month 6 - Mangopay-first MVP backtested on 3 historical datasets and live on the first one-entity pilot"
      - "Month 9 - prove 70% or better first-pass match suggestions on structured-reference receipts and publish the first close-improvement case study"
      - "Month 12 - close 3 paid pilots, add the dominant second connector, and convert at least 1 pilot to annual production"
  - horizon: 12-24 months
    items:
      - "Month 18 - reach 5 paying customers, complete the first multi-entity expansion, and embed reviewer-approved daily reconciliation evidence in production workflows"
      - "Month 24 - reach 10 paying customers, make 2 PSP or ERP connector paths repeatable, and launch the first reserve or payout-control recommendation module in reviewer mode"
  - horizon: 24-36 months
    items:
      - "Month 30 - canonical receipt graph spans multiple providers and entities with benchmark data on remitter patterns and exception rates"
      - "Month 36 - reach 30 paying customers and a year-3 footprint consistent with the researched $3.6M SOM, then decide whether retention and expansion support a Series A case"
risks:
  - risk: Structured remittance data may be too noisy to support strong first-pass matching
    likelihood: High
    impact: High
    mitigation: >-
      Start with accounts that already enforce invoice-reference discipline,
      keep reviewer queues in the loop, and measure match quality by corridor
      before broadening automation claims.
  - risk: PSPs may bundle enough reconciliation to shrink the visible wedge
    likelihood: Medium
    impact: High
    mitigation: >-
      Stay provider-neutral and go deeper into invoice, seller-balance, and ERP
      evidence than any single rail provider is likely to own.
  - risk: Budget ownership may be ambiguous between payments, controllership, and ERP programs
    likelihood: Medium
    impact: High
    mitigation: >-
      Sell against new-currency launches and close delays, tie pilots to one
      legal entity, and quantify ROI in days to close and release accuracy.
  - risk: Connector sprawl across PSPs and ERPs may slow onboarding and hurt gross margin
    likelihood: High
    impact: Medium
    mitigation: >-
      Sequence integrations from observed prospect concentration, refuse
      low-repeatability requests, and build a canonical data model before
      chasing long-tail providers.
  - risk: Reviewer-first mode may improve auditability but not enough operational ROI to convert pilots
    likelihood: Medium
    impact: High
    mitigation: >-
      Make the first pilots accountable to explicit metrics on exception
      resolution, close speed, and seller-release delays rather than generic
      workflow satisfaction.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway to build the Mangopay-first cash graph, hire founding
    engineering, integrations, and finance-operations implementation talent,
    win 3-5 paid one-entity pilots, validate 70% or better first-pass matching
    and production conversion, and decide whether second connectors and
    payout-control modules justify the next financing.
