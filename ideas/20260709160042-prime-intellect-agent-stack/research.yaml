        - 20
        - 22
        - 24
        - 25
    threatOfSubstitutes:
      score: 5
      rationale: >-
        Prompt engineering, manual QA, internal replay scripts, and horizontal eval platforms can all cover part of the
        job today.
      sourceRefs:
