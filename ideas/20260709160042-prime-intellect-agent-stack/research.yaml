        - 7
        - 13
        - 32
    threatOfEntrants:
      score: 3
      rationale: >-
        Open-source and vendor APIs lower the cost to start another eval product, but workflow-specific corpora,
        connector semantics, and enterprise data integrations create a meaningful second-order barrier.
      sourceRefs:
