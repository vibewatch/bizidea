        - 20
        - 22
  pestle:
    - factor: political
      impact: negative
      point: >-
        The EU AI Act raises compliance expectations around logging, oversight, and documentation for systems that move
        toward high-risk workflows.
      sourceRefs:
        - 29
        - 31
    - factor: economic
      impact: positive
      point: >-
        Enterprise AI spend is scaling rapidly, increasing the odds that reliability tooling can ride an existing budget
        line rather than create a new one.
      sourceRefs:
        - 32
    - factor: social
      impact: positive
      point: >-
        AI-exposed roles are shifting toward judgement and higher-order decision-making, which raises the value of
        trustworthy agent tooling rather than raw automation alone.
      sourceRefs:
        - 36
    - factor: technological
      impact: positive
      point: >-
        Reinforcement fine-tuning, eval APIs, prompt management, and agent observability are now mainstream enough to
        make a workflow-specific compiler technically feasible.
      sourceRefs:
        - 24
        - 25
        - 26
        - 27
    - factor: legal
      impact: negative
      point: >-
        Prompt injection, sensitive information disclosure, and excessive agency create liability if agents act across
        enterprise systems without guardrails.
      sourceRefs:
        - 30
  adoptionFrictionMatrix:
    - friction: Data onboarding across connectors, logs, and knowledge sources
      severity: high
      affectedBuyer: AI platform lead
      mitigation: Start with one connector family and read-only shadow replay before asking for full write-path access.
      sourceRefs:
        - 7
        - 8
        - 38
    - friction: Security and PII handling in traces and evaluators
      severity: high
      affectedBuyer: Security or compliance owner
      mitigation: Offer least-privilege access, verified identity, retention controls, and private deployment options.
      sourceRefs:
        - 9
        - 11
        - 20
        - 22
        - 29
        - 31
    - friction: ROI proof on a narrow buyer universe
      severity: high
      affectedBuyer: VP Product or GM Automation
      mitigation: Sell against first-run success, rollback reduction, and support-ticket avoidance in one launch cycle.
      sourceRefs:
        - 4
        - 10
        - 32
        - 36
    - friction: Model and toolchain churn across agent stacks
      severity: medium
      affectedBuyer: Platform engineering
      mitigation: Stay model-agnostic and compile workflow history into datasets and metrics that survive provider churn.
      sourceRefs:
        - 12
        - 13
        - 24
        - 25
