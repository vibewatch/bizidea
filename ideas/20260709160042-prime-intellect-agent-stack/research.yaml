        - 16
        - 18
        - 20
        - 22
    competitiveRivalry:
      score: 4
      rationale: >-
        The space is crowded with well-funded horizontal LLMOps vendors plus workflow incumbents, though few are focused
        on workflow-graph-derived reward data.
      sourceRefs:
        - 1
        - 16
