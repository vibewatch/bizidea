competitors:
  - name: Prime Intellect
    stage: scale-up
    wedge: Hosted compute, RL, environments, evals, and deployment for domain-specific agents
    pricing: Not publicly listed; enterprise, hosted stack sales motion.
    strength: Strong traction and credible end-to-end post-training narrative with named software-vendor customers.
    weaknessVsUs: Broad RL substrate rather than a workflow-graph compiler or shadow-run gate for connector-specific failures.
    sourceRefs:
      - 1
      - 2
  - name: LangSmith
    stage: scale-up
    wedge: Tracing, evaluation, deployment, alerts, and sandboxes for agent apps
    pricing: Developer free; Plus $39/seat/month plus usage; Enterprise custom.
    strength: Wide feature surface across observability, evals, and deployment with clear commercial packaging.
    weaknessVsUs: Horizontal platform; it helps score agents but does not automatically transform workflow history into reward data.
    sourceRefs:
      - 16
      - 17
  - name: Braintrust
    stage: scale-up
    wedge: Production logs, evals, experiments, and an improvement loop for AI apps
    pricing: Starter free; Pro $249/month plus usage; Enterprise custom.
    strength: Strong log-to-dataset loop and transparent pricing for evaluation infrastructure.
    weaknessVsUs: >-
      Still generic to AI applications and lacks workflow-graph semantics, connector drift intelligence, and replay
      gates.
    sourceRefs:
      - 18
      - 19
  - name: Humanloop
    stage: scale-up
    wedge: Enterprise evals, prompt management, observability, and compliance controls
    pricing: Free 2 members, 50 eval runs, and 10k logs; Enterprise custom.
    strength: Balances technical and non-technical collaboration with enterprise security posture.
    weaknessVsUs: >-
      Centered on prompt and eval lifecycle management rather than action-history compilation and connector-specific
      repair data.
    sourceRefs:
      - 20
      - 21
  - name: Arize AX / Phoenix
    stage: scale-up
    wedge: OpenTelemetry-native agent observability, tracing, and evaluation with open-source roots
    pricing: AX Free; Pro $50/month; Enterprise custom.
    strength: Strong tracing and evaluation primitives with open-source credibility and self-hosting paths.
    weaknessVsUs: Horizontal tracing and eval layer; it does not own the workflow-vendor exhaust that could become a moat.
    sourceRefs:
      - 22
      - 23
