topRisks:
- name: 自研替代风险
  description: 大型工作流厂商可能会认定自己的日志足够战略，不如直接在内部把奖励和评测栈搭出来。
  mitigation: 先从动作快、但 RL 基础设施还不深的厂商切入，开箱即用交付连接器专用编译器，并在一个发布周期内把回报跑出来。
- name: 奖励噪声风险
  description: 历史自动化运行里可能混着错误的客户配置，或过弱的隐式结果，最后把奖励模型带偏。
  mitigation: 先只吃成功、回滚、重试和人工接管这类显式信号；等校准完，再叠加更噪声的业务结果代理指标。
- name: 平台变迁风险
  description: 前沿模型提供商或集成类现有厂商，可能靠更强的原生工具调用和连接器 copilots，把这类痛点直接吃掉。
  mitigation: 坚持模型无关，守住专有动作历史语料，并把产品定位成跨模型的发布闸门和持续学习层，谁赢都得经过我们。
