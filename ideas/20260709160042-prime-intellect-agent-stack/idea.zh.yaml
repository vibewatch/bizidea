problem: 工作流自动化厂商都在抢着上线自然语言构建器和自动修复智能体，但通用前沿模型还是会把字段映射错、调用错连接器；一旦 app 的 schema 或鉴权流程变化，还会悄悄失效。每一次坏生成，最后都会变成客户工作流断掉、支持工单堆高、企业扩张变慢——因为背锅的是平台厂商，不是终端客户。这些平台其实早就攒齐了缺失的训练数据：工作流图、执行轨迹、重试、回滚、人工修复 diff，全都在手里。可大多数团队只把这些废气当可观测性数据看，没把它变成奖励信号。没有一套把运行历史接到评测和再训练上的产品化闭环，他们就只能继续卡在 prompt 调优、模板泛滥和人工 QA 里。
targetUser:
  primary: Series C+ 工作流自动化厂商里的 AI 平台负责人或产品副总裁，正面向企业 SaaS 连接器上线自然语言工作流构建器或自动修复智能体。
  secondary: 当生成式自动化失效时，对运行成功率、回滚率和重试指标负责的连接器平台工程负责人，以及客户支持负责人。
  buyer: 负责 AI 构建器路线图和企业可靠性 KPI 的 VP Product、GM Automation 或 Chief Product Officer。
startupThesis:
  nonObviousInsight: 企业行动智能体最有价值的强化学习数据，不是合成出来的企业对话，而是工作流平台自己已经攥在手里的历史自动化图、重试、回滚和人工修复数据。这些轨迹把具体动作、依赖关系、失败模式和修复结果都编码进去了，能持续再生奖励语料，让编写和修复智能体的改进速度跑在通用前沿模型更新前面。
  beachhead: 服务营收运营和财务运营团队的 Series C+ 工作流自动化厂商；月执行自动化超过 100,000 次，连接器覆盖 Salesforce、HubSpot、NetSuite 和 Slack，并且已有 beta 版自然语言构建器或工作流修复智能体。
  wedge: 一套工作流图编译器，把历史自动化、连接器 schema、执行轨迹、回滚日志和人工修复 diff 编成任务专用的 eval 套件、奖励模型和影子运行环境，供工作流编写与修复智能体使用。
  whyNowCatalyst: Prime Intellect 这轮 $130M 融资、6,000 客户规模，以及 Zapier 这类被点名的托管买家，说明工作流厂商已经在给后训练基础设施单列预算；而 Ramp 在电子表格搜索上的结果也证明，狭窄操作面只要调过，确实能压过前沿默认模型。
  ventureScalePath: 先吃下工作流自动化厂商，再把同一套图到奖励的编译器扩进 iPaaS、RPA、SaaS admin 和 ERP 定制平台，做成所有通过结构化 API 行动的 AI 产品的默认后训练层。
solution: 我们做的是一套工作流图编译器，直接接进厂商的连接器目录、执行日志和编辑历史，把历史自动化整理成标准任务、结果标签和边界案例评测集。系统会从运行成功、重试次数、回滚、人工接管和下游业务是否完成这些显式结果里推断奖励，再把信号打包给客户现有的模型或 RL 栈。发布前，影子回放闸门会拿真实历史自动化去重放新的构建器和修复策略，专门拦下通用模型评测抓不到的连接器级回归。时间一长，系统还会按连接器和工作流模式，把反复出现的失败模式聚成簇，让产品团队知道后训练预算到底该砸在哪儿，成功率才会动。第一版交付的不是又一个助手 UI，而是自动化平台智能体缺掉的持续学习和发布保障层。
