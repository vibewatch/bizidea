  - incumbentClass: 横向评测与可观测性平台
    point: LangSmith、Braintrust、Humanloop 和 Arize 都能帮团队追踪、打分和对比 Agent，但它们大体默认客户已经有数据集和失败 taxonomy，而不是从自动化历史里把这些东西长出来。
