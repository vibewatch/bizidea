  validationPlan:
  - priority: high
    question: 按连接器家族和失败类型拆开看，目标厂商现在每月到底会遇到多少条失败或回滚的 AI 生成自动化？
    evidenceToGather: 至少 5 家共创客户的任务历史、支持工单，以及回滚或重试日志。
  - priority: high
    question: 故障里有多少是连接器 schema / 鉴权漂移造成的，又有多少是模型推理差或客户配置不佳？
    evidenceToGather: 最近失败运行的 postmortem、事件标签，以及影子回放分类结果。
  - priority: medium
    question: 工作流厂商愿不愿意让动作历史语料离开自己的 VPC，还是从第一轮试点起就必须私有部署？
    evidenceToGather: 试点潜在客户的安全问卷、架构评审和数据处理附录。
