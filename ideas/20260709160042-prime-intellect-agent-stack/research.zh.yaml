  competitiveLandscape: 竞争分成四路：端到端 RL 基础设施、横向 Agent eval / 可观测性平台、自己在做控制面的工作流现有厂商，以及内部回放或测试脚本。真正的空白，不在通用 prompt 或 traces，而在那台从工作流图和修复历史起步的编译器。[1][7][12][13][16][18][20][22][37][38]
  incumbentThesis:
  - incumbentClass: 通用 RL 栈
    point: Prime Intellect 证明后训练预算是真存在的，但它卖的是通用算力、RL、eval 和部署底座，不是专门解决连接器漂移和修复闭环的工作流图编译器。
    sourceRefs:
