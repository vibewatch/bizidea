scenarios:
  downside:
    description: 安全审查把试点拖长，毛利率继续被服务交付拖住，公司到 Y3 结束时只拿到 12 个付费账户。
    y3RevenueK: 2518.8
    y3EbitdaK: -1405.9
    cashLowPointK: -814.5
    keyAssumptionChanges:
    - 客户爬坡放慢到 Q1Y2-Q4Y3 期末客户数 2,3,4,5,6,8,10,12。
    - 由于买家把首期范围压得更窄、也推迟第二连接器扩张，混合 ARPU 从 $335K 降到 $310K。
    - 客户 VPC 和部署工作更长时间维持定制化，毛利率因此从 75% 降到 72%。
  base:
    description: Y1 的 2 个付费试点逐步跑成可重复的正式生产打法，公司到 Q4Y3 做到 15 个付费账户，同时守住计划毛利率。
    y3RevenueK: 3685.0
    y3EbitdaK: -455.7
    cashLowPointK: 574.1
    keyAssumptionChanges:
    - 客户爬坡按 A6 和 A7 走：第 2 年末做到 7 家正式客户，第 3 年末做到 15 家。
    - 混合 ARPU 维持在每个活跃客户-年 $335K，略低于研究里 $350K 的 ACV 锚点。
    - 随着单租户和客户 VPC 部署逐步模板化，毛利率守在 BP 目标 75%。
  upside:
    description: 试点证明更早落地，第二连接器扩张前移，公司到 Y3 结束时做到 18 个付费账户，并转正 EBITDA。
    y3RevenueK: 4550.1
    y3EbitdaK: 284.3
    cashLowPointK: 1318.8
    keyAssumptionChanges:
    - 客户爬坡改善到 Q1Y2-Q4Y3 期末客户数 4,5,7,8,10,13,16,18。
    - 随着公司更快证明第二连接器的价值，混合 ARPU 从 $335K 抬到 $350K。
    - 上线和部署越来越可复用，毛利率从 75% 扩到 77%。
sensitivity:
- variable: ARPU
  downsideCase: 活跃客户的混合年收入掉到 $310K。
  baseCase: 活跃客户的混合年收入维持在 $335K。
  upsideCase: 随着第二连接器 upsell 更快跑通，活跃客户的混合年收入抬到 $350K。
  y3RevenueImpactK: -275.0
  cashImpactK: -302.2
- variable: churn
  downsideCase: 月度 logo 流失率更像 2.0%，等效于把 Q4Y3 的后期留存账户压到 13 家。
  baseCase: 月度 logo 流失率维持在 1.5%，支撑 15 账户的基准情形。
  upsideCase: 第二连接器家族上线后，月度 logo 流失率稳定在接近 1.0%。
  y3RevenueImpactK: -376.7
  cashImpactK: -376.8
- variable: sales cycle
  downsideCase: 安全审查和数据访问审批拉长，试点转正式大约再慢两个季度。
  baseCase: 试点转正式维持在 6-9 个月的企业销售周期附近，支撑 Q4Y2 做到 7 家正式客户。
  upsideCase: 安全审查压缩到足以把一整个季度的落地时间提前。
  y3RevenueImpactK: -963.0
  cashImpactK: -1078.2
- variable: gross margin
  downsideCase: 私有部署、回放基础设施和支持仍然更偏定制，毛利率只能守在 72%。
  baseCase: 毛利率达到 BP 目标 75%。
  upsideCase: 连接器上线和治理打包标准化后，毛利率扩到 77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -161.6
- variable: hiring pace
  downsideCase: 第二位平台工程师、财务 / 运营和第二位客户经理都提前一个季度入职，而收入还没追上。
  baseCase: 这几位分别按 M22、M25 和 M28 入职。
  upsideCase: 如果创始人主导运营继续高效，这几位可以等 seed 融资之后再补。
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
