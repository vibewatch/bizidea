modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入引擎，就是把 Y1 年末的 2 个付费试点一路推到 Q4Y3 的 15 个付费账户，并维持每个活跃客户 $335K 的混合 ARPU。
- checkName: 必须成立的条件
  finding: 公司必须把试点转正式的节奏守在 6-9 个月附近，并且至少打通一条通过安全审查的部署路径，这样 $3.4M 的 pre-seed 才够带着缓冲跑到 Q4Y2 里程碑。
- checkName: 模型失效条件
  finding: 下行情形已经说明，如果销售周期变慢、毛利率又只剩 72%，公司会在 Y3 结束前把现金打到零以下。
- checkName: 下一轮证明
  finding: 只要 Q4Y2 能看到 7 家正式客户、第二个连接器家族，以及上线周期朝 45 天压缩，seed 融资就有了充分理由。
sanityChecks:
  ruleOf40: Y3 增速 151.4% + EBITDA 利润率 -12.4% = 139.0%
  burnMultiple: Y2 burn multiple 约 1.0x；随着 Q4 在 Y3 略微转正 EBITDA，Y3 改善到约 0.2x。
  revenuePerFte: $335.0K 的 Y3 人均收入（粗看落在企业 SaaS 常见的 $200-400K 区间）
  flags:
  - 基准情形到 Y3 结束时只有 15 家客户，已经很贴近研究里 16 家灯塔账户的 SOM 上限；不往相邻品类扩张，容错空间非常小。
  - 模型用的是单一的 $335K 活跃客户混合 ARPU，没有把试点合同显式拆成更大的正式合同；所以真实收入节奏大概率会比这里更颠。
  - 要在 Y2 守住 75% 毛利率，前提是客户 VPC 和隔离部署能被模板化；如果私有部署长期保持定制，下行情形反而更像现实。
