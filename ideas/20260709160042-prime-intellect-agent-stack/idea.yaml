problem: >-
  Workflow-automation vendors are racing to ship natural-language builders and auto-repair agents, but generic
  frontier models still mis-map fields, call the wrong connectors, and fail silently when an app schema or auth flow
  changes. Every bad generation turns into broken customer workflows, support tickets, and slower enterprise
  expansion because the vendor, not the end customer, absorbs the reliability blame. These platforms already collect
  the missing training data in their workflow graphs, execution traces, retries, rollbacks, and human repair diffs,
  yet most teams treat that exhaust as observability data instead of reward signal. Without a productized loop from
  run history to eval and retraining, they stay stuck in prompt tuning, template sprawl, and manual QA.
targetUser:
  primary: >-
    Head of AI Platform or VP Product at a Series C+ workflow-automation vendor launching a natural-language workflow
    builder or auto-repair agent across enterprise SaaS connectors.
  secondary: >-
    Connector-platform engineering leaders and customer-support heads who own run success, rollback, and retry
    metrics when generated automations fail.
  buyer: >-
    VP Product, GM Automation, or Chief Product Officer who owns the AI-builder roadmap and enterprise reliability
    KPIs.
startupThesis:
  nonObviousInsight: >-
    The highest-quality reinforcement-learning data for enterprise action agents is not synthetic enterprise chatter;
    it is the historical automation graph plus retry, rollback, and human-fix data already owned by workflow
    platforms. Those traces encode exact actions, dependencies, failure modes, and successful repairs, making them a
    renewable reward corpus that can improve authoring and repair agents faster than generic frontier-model updates.
  beachhead: >-
    Series C+ workflow-automation vendors serving revenue-operations and finance-operations teams, with 100,000+
    monthly executed automations across Salesforce, HubSpot, NetSuite, and Slack connectors, and a live
    natural-language builder or workflow-repair agent in beta.
  wedge: >-
    A workflow-graph compiler that converts historical automations, connector schemas, execution traces, rollback
    logs, and human repair diffs into task-specific eval suites, reward models, and shadow-run environments for
    workflow-authoring and workflow-repair agents.
  whyNowCatalyst: >-
    Prime Intellect's $130M round, 6,000-customer footprint, and named hosted buyers such as Zapier show workflow
    vendors are already budgeting for post-training infrastructure, while Ramp's spreadsheet-search result proves
    narrow operational surfaces can beat frontier defaults once tuned.
  ventureScalePath: >-
    Start with workflow-automation vendors, then extend the same graph-to-reward compiler into iPaaS, RPA, SaaS
    admin, and ERP-customization platforms, becoming the default post-training layer for any product whose AI agent
    acts through structured APIs.
solution: >-
  We build a workflow-graph compiler that plugs into a vendor's connector catalog, execution logs, and edit history,
  then converts historical automations into canonical tasks, outcome labels, and edge-case eval sets. The product
  infers reward from explicit outcomes such as run success, retry count, rollback, human takeover, and downstream
  business completion, then packages that signal for whichever model or RL stack the customer already uses. A
  shadow-run gate replays new builder and repair policies against real historical automations before release, catching
  connector-specific regressions that generic model evals miss. Over time, the system clusters recurring failure modes
  by connector and workflow pattern, giving product teams a roadmap for where post-training spend actually moves
  success rates. The first deliverable is not another assistant UI; it is the missing continual-learning and
  release-assurance layer for automation-platform agents.
goToMarketSeed:
  firstCustomer: >-
    Head of AI Platform at a Series C+ workflow-automation vendor with more than 100,000 monthly automation runs, 50+
    enterprise customers, and a public beta for natural-language workflow generation across Salesforce, HubSpot,
    NetSuite, and Slack.
  buyingTrigger: >-
    The company moves an AI workflow builder or repair agent from beta toward general availability and sees support
    tickets spike from mis-mapped fields, connector auth drift, or broken handoffs.
  currentAlternative: >-
    Prompt engineering, human-authored template libraries, internal replay scripts, manual QA, and generic model-eval
    tools.
  switchingReason: >-
    The wedge learns from the vendor's own action graph and failure history, so it improves connector accuracy and
    catches regressions faster than template sprawl or a generic benchmark service.
  pricingHypothesis: >-
    Annual platform fee by connector family plus usage-based pricing on shadow-replayed runs and training episodes.
