topRisks:
  - name: In-house build risk
    description: Large workflow vendors may decide their logs are strategic enough to justify building a reward and eval stack internally.
    mitigation: Start with fast-moving vendors that lack deep RL infrastructure, ship connector-specific compilers out of the box, and prove time-to-value in one release cycle.
  - name: Reward-noise risk
    description: Historical automation runs can encode bad customer configurations or weak implicit outcomes that poison the reward model.
    mitigation: Begin with explicit signals such as success, rollback, retry, and human takeover, then layer in noisier business-outcome proxies only after calibration.
  - name: Platform-shift risk
    description: Frontier model providers or integration incumbents could reduce the pain with stronger native tool-use and connector copilots.
    mitigation: Stay model-agnostic, own the proprietary action-history corpus, and position the product as the release-gate and continual-learning layer across whichever model wins.
