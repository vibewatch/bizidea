scenarios:
  downside:
    description: Security review drags out pilots, gross margin stays services-heavy, and the company exits Y3 with only 12 paying accounts.
    y3RevenueK: 2518.8
    y3EbitdaK: -1405.9
    cashLowPointK: -814.5
    keyAssumptionChanges:
      - Customer ramp slips to Q1Y2-Q4Y3 EOP customers of 2,3,4,5,6,8,10,12.
      - Blended ARPU falls from $335K to $310K as buyers cap first-scope contracts and delay second-connector expansions.
      - Gross margin falls from 75% to 72% because customer-VPC and deployment work stay bespoke longer than planned.
  base:
    description: Two paid pilots in Y1 become a repeatable production motion, and the company reaches 15 paying accounts by Q4Y3 while holding plan gross margin.
    y3RevenueK: 3685.0
    y3EbitdaK: -455.7
    cashLowPointK: 574.1
    keyAssumptionChanges:
      - Customer ramp follows A6 and A7, ending Year 2 at 7 production customers and Year 3 at 15.
      - Blended ARPU holds at $335K per active customer-year, slightly below the research $350K ACV-equivalent anchor.
      - Gross margin stays at the BP target of 75% as single-tenant and customer-VPC deployments become more templated.
  upside:
    description: Pilot proof lands earlier, expansion to second connectors pulls forward, and the company exits Y3 with 18 paying accounts plus positive EBITDA.
    y3RevenueK: 4550.1
    y3EbitdaK: 284.3
    cashLowPointK: 1318.8
    keyAssumptionChanges:
      - Customer ramp improves to Q1Y2-Q4Y3 EOP customers of 4,5,7,8,10,13,16,18.
      - Blended ARPU rises from $335K to $350K as the company proves second-connector value faster.
      - Gross margin improves from 75% to 77% as onboarding and deployment become more reusable.
sensitivity:
  - variable: ARPU
    downsideCase: Blended annual revenue per active customer falls to $310K.
    baseCase: Blended annual revenue per active customer stays at $335K.
    upsideCase: Blended annual revenue per active customer reaches $350K with faster second-connector upsell.
    y3RevenueImpactK: -275.0
    cashImpactK: -302.2
  - variable: churn
    downsideCase: Monthly logo churn behaves more like 2.0%, which effectively trims late-stage retained accounts to 13 by Q4Y3.
    baseCase: Monthly logo churn stays at 1.5% and supports the 15-account base case.
    upsideCase: Monthly logo churn settles near 1.0% once the second connector family is live.
    y3RevenueImpactK: -376.7
    cashImpactK: -376.8
  - variable: sales cycle
    downsideCase: Pilot-to-production stretches by roughly two quarters because security review and data-access approvals drag out.
    baseCase: Pilot-to-production conversion stays near a 6-9 month enterprise cycle and supports 7 production customers by Q4Y2.
    upsideCase: Security review compresses enough to pull one quarter of landings forward.
    y3RevenueImpactK: -963.0
    cashImpactK: -1078.2
  - variable: gross margin
    downsideCase: Gross margin holds at 72% because private deployment, replay infra, and support stay more custom.
    baseCase: Gross margin reaches the BP target of 75%.
    upsideCase: Gross margin expands to 77% as connector onboarding and governance packaging standardize.
    y3RevenueImpactK: 0.0
    cashImpactK: -161.6
  - variable: hiring pace
    downsideCase: The second platform engineer, finance/ops, and second AE are pulled forward by one quarter before revenue catches up.
    baseCase: Those hires stay in M22, M25, and M28 respectively.
    upsideCase: Those hires can be delayed until after the seed raise if founder-led operations stay efficient.
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> DesignPartners
      DesignPartners --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      ProductionCustomers --> Expansion
      Expansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from moving from 2 paid pilots at Y1 end to 15 paying accounts by Q4Y3 at a blended $335K active-customer ARPU.
  - checkName: Must go right
    finding: The company must keep pilot-to-production conversion near a 6-9 month cycle and clear one security-approved deployment path so the $3.4M pre-seed reaches the Q4Y2 milestone with buffer.
  - checkName: Model breaks if
    finding: The downside case shows that slower sales cycles plus 72% gross margin push cash below zero before Y3 ends.
  - checkName: Next-round proof
    finding: A seed round is justified once Q4Y2 shows 7 production customers, a second connector family, and onboarding compressing toward 45 days.
sanityChecks:
  ruleOf40: Y3 growth 151.4% + EBITDA margin -12.4% = 139.0%
  burnMultiple: Y2 burn multiple ~1.0x; improves to ~0.2x in Y3 as Q4 turns slightly EBITDA-positive.
  revenuePerFte: $335.0K Y3 per Q4Y3 FTE (rough enterprise-SaaS benchmark $200-400K).
  flags:
    - The base case exits Y3 at 15 customers, which is close to the 16-account lighthouse SOM in research and therefore leaves limited room for error without adjacent-category expansion.
    - The model uses one blended $335K active-customer ARPU instead of explicitly stepping pilot contracts into larger production contracts, so real revenue timing will be lumpier than shown.
    - Holding 75% gross margin by Y2 assumes customer-VPC and isolated deployments become template-driven; if private deployments stay bespoke, the downside case is the more realistic path.
