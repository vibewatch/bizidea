modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Trigger[MiCA approval or launch-readiness trigger] --> Pilot[Paid pilot / first controlled deployment]
      Pilot --> Customers[Paying regulated entities]
      Customers --> Revenue[Recurring revenue at ~$150k ACV]
      Revenue --> GrossProfit[Gross profit at ~70% steady-state GM]
      GrossProfit --> Cash[Cash used to fund hiring and runway]
      Customers --> Expansion[Second entity / second program expansion]
      Expansion --> Revenue

modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by a small number of high-ACV regulated customers, growing from 3 by Y1 end to 18 by Y3 end at roughly $150k effective annual revenue per logo."
  - checkName: Must go right
    finding: "The company must prove that launch-readiness pilots convert into production control budgets fast enough to reach 8 customers by Y2 end before cash falls below a comfortable financing buffer."
  - checkName: Model breaks if
    finding: "If bundled infrastructure dashboards lengthen sales cycles toward 9 months and depress effective ACV, the downside case shows cash turning negative before the next financing milestone."
  - checkName: Next-round proof
    finding: "The next round is justified when the company can show 8 production customers plus at least 3 expansions, proving the product is a reusable control layer rather than one-off services work."

sanityChecks:
  ruleOf40: "Y3 revenue growth 128% ((1912.5-837.5)/837.5) + Y3 EBITDA margin -40% (-760.4/1912.5) = 88%."
  burnMultiple: "Y3 net burn $760.4K / net new ARR added in Y3 ~$1.5M (10 net new customers x $150K ACV) = 0.51x."
  revenuePerFte: "$159K Y3 revenue per end-of-year FTE (12 FTEs), below the typical $200K-$400K SaaS benchmark but acceptable for a compliance-heavy enterprise company still proving category fit."
  flags:
    - "The model relies on only 18 customers by Y3, so one delayed deal or one churn event would move revenue materially."
    - "Y1 gross margin is near zero because fixed compliance and reconciliation infrastructure costs are carried before the customer base is dense enough."
    - "Revenue per FTE is still below mature SaaS levels at Y3, which is honest for this wedge but means the company needs either more expansion revenue or tighter hiring discipline before the next round."
