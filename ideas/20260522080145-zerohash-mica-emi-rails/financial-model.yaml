assumptions:
  - id: A1
    name: Starting customers at M1
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months] Selling starts from zero installed customers."
  - id: A2
    name: Landed monthly revenue per paying customer
    value: "12500"
    unit: USD/month
    source: "[BP gtm.pricing; BP investorMemo.firstCustomer] Midpoint of $50k-$100k pilot over ~6 months is $75k, which equals $12.5k/month and also matches the midpoint of $120k-$200k ARR ($150k ARR)."
  - id: A3
    name: Year-1 customer ramp
    value: "M4 first customer, M7 second customer, M11 third customer"
    unit: schedule
    source: "[BP experimentRoadmap; BP milestones 0-12 months] Two paid pilots within 90-180 days and 3-5 design partners inside 12 months support a 3-customer Y1 exit."
  - id: A4
    name: Year-2 customer target
    value: "8"
    unit: customers at EOY2
    source: "[BP milestones 12-24 months] Reach 6-8 production customers; base case uses the top end of that range."
  - id: A5
    name: Year-3 customer target
    value: "18"
    unit: customers at EOY3
    source: "[BP market.som; BP milestones 24-36 months] Year-3 SOM and milestone both point to 15-18 customers; base case uses 18."
  - id: A6
    name: Steady-state gross margin target
    value: "70"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct] Explicit target gross margin is 70%."
  - id: A7
    name: Fixed platform and compliance COGS floor
    value: "14000"
    unit: USD/month
    source: "[Heuristic: regulated-fintech SaaS infra baseline] Cloud, audit logging, data retention, and reconciliation jobs create a non-zero cost floor before scale."
  - id: A8
    name: Variable COGS rate
    value: "20"
    unit: pct of revenue
    source: "[Heuristic: integration-heavy enterprise SaaS COGS] Early managed integrations and customer support keep variable delivery cost above pure software norms."
  - id: A9
    name: Founding team at model start
    value: "3"
    unit: FTE
    source: "[BP team] Founding eng, product and compliance lead, and CEO/founder-sales all start at Month 0."
  - id: A10
    name: Solutions engineer hire timing
    value: "Month 4"
    unit: month
    source: "[BP team] Solutions engineer starts in Month 4."
  - id: A11
    name: Enterprise account executive hire timing
    value: "Month 12"
    unit: month
    source: "[BP team] Enterprise account executive starts in Month 12 after early pilot proof."
  - id: A12
    name: Year-2 hiring ramp
    value: "+4 FTE by Month 24"
    unit: FTE
    source: "[BP milestones 12-24 months; BP strategicChoices.sequencingRationale] One engineer, one product/compliance hire, one GTM hire, and one ops hire are enough to support 6-8 customers without assuming a vanity org chart."
  - id: A13
    name: Year-3 hiring ramp
    value: "+3 FTE by Month 36"
    unit: FTE
    source: "[BP milestones 24-36 months] Two additional engineers and one additional GTM hire support expansion to 18 customers while staying lean in a still-narrow market."
  - id: A14
    name: Engineering fully loaded salary
    value: "165000"
    unit: USD/FTE/year
    source: "[Heuristic: seed-stage enterprise fintech compensation] Senior engineering hiring in regulated B2B software typically needs mid-$100Ks fully loaded."
  - id: A15
    name: Product and compliance fully loaded salary
    value: "155000"
    unit: USD/FTE/year
    source: "[Heuristic: seed-stage enterprise fintech compensation] Product/compliance talent is senior but leaner than engineering-heavy payroll."
  - id: A16
    name: Sales and GTM fully loaded salary
    value: "170000"
    unit: USD/FTE/year
    source: "[Heuristic: enterprise SaaS GTM compensation] Founder-led selling plus one to three quota-carrying or partnership roles support the base-case acquisition pace."
  - id: A17
    name: G&A and ops fully loaded salary
    value: "130000"
    unit: USD/FTE/year
    source: "[Heuristic: startup finance and ops compensation] One finance/ops generalist is sufficient through the seed stage."
  - id: A18
    name: Non-salary opex ramp
    value: "R&D tools $5k-$7k/month, S&M programs $5k-$12k/month, G&A baseline $10k-$14k/month"
    unit: USD/month
    source: "[Heuristic: seed-stage enterprise SaaS operating model] The model assumes controlled spending on software, legal, insurance, travel, and demand generation."
  - id: A19
    name: Seed cash raised at model start
    value: "3000000"
    unit: USD
    source: "[BP fundingAsk] Midpoint of the stated $2M-$4M seed target range."
  - id: A20
    name: Long-run monthly logo churn
    value: "1.0"
    unit: pct
    source: "[Heuristic: enterprise annual-contract churn] Base unit economics assume low logo churn because deployments are compliance-critical."
  - id: A21
    name: Customer acquisition cost
    value: "75000"
    unit: USD/customer
    source: "[Heuristic: founder-led enterprise SaaS CAC] High-touch pilots sold into CFO/compliance buyers usually cost well under first-year ACV but materially above SMB SaaS norms."
  - id: A22
    name: Realized logo churn in model horizon
    value: "0"
    unit: churn events in first 36 months
    source: "[BP businessModel.expansionLevers; Heuristic: first-wave design partners] Base case assumes the first 18 customers are managed tightly enough that no logo is lost before the next financing."

