scenarios:
  downside:
    description: "MiCA launches stay concentrated, bundling pressure rises, and the company exits Y3 with only 12 customers at roughly $135k effective ACV and 65% gross margin."
    y3RevenueK: 1360.0
    y3EbitdaK: -1260.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
      - "EOY3 customers fall from 18 to 12 versus A5."
      - "Effective ARPU drops from $150k to $135k as pilots convert more slowly than planned versus A2."
      - "Steady-state gross margin lands at 65% instead of the 70% target in A6 because service intensity stays high."
  base:
    description: "The business lands three design partners in Y1, grows to 8 customers by Y2 end, and reaches the researched 18-customer Y3 endpoint while staying lean on headcount."
    y3RevenueK: 1912.5
    y3EbitdaK: -760.4
    cashLowPointK: 417.3
    keyAssumptionChanges:
      - "All modeled assumptions A1-A22 hold as written."
  upside:
    description: "Referral channels click early, multi-program expansion shows up in Y3, and the company exits Y3 with 20 customers at roughly $165k effective ACV and slightly better margin."
    y3RevenueK: 2350.0
    y3EbitdaK: -420.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "EOY3 customers rise from 18 to 20 versus A5."
      - "Effective ARPU rises from $150k to $165k as more logos add a second program versus A2."
      - "Gross margin improves to 74% as integrations are reused more efficiently than in A6-A8."

