reportMemo:
  executiveTakeaways:
  - '[7][30][31] MiCA 叠加 EMI/PSD2 的重叠，让第一波稳定币上线先变成一项控制与证据工程，而不只是接个钱包。'
  - '[9][10][12][28] 买方池确实存在，但依旧偏窄：欧元区有 292 家 EMI 和 724 家支付机构，不过欧元稳定币仍然很小，采用也集中在数字化更活跃的一小部分机构。'
  - '[29][31][35][39][41][44][48] 竞争已经从基础设施厂商和平台端压过来，所以创业公司只有在保持供应商中立、同时吃下银行、钱包和 GL 数据的监管就绪对账时，才有机会赢。'
  marketDefinition: '[7][18][20][23][30][31] 相关市场应定义为：面向 EEA 的 EMI、支付机构和券商，在 MiCA 时代的控制要求下，把钱包活动、备付金和内部总账对起来的受监管稳定币运营软件。'
  customerAndBuyer: '[18][19][20][21][22][31] 核心用户是受监管 EMI 和数字资产运营方内部的财资运营、财务运营和合规团队。真正拍板付钱的一般是 CFO、COO 或首席合规官，他们要对上线就绪度和后续控制证据负责。'
  buyingTriggers:
  - point: MiCA、EMI 或董事会批准等节点，会把稳定币上线从“战略讨论”推成一套需要被监管盯着跑的运营流程。
    sourceRefs:
    - 7
    - 30
    - 31
    - 34
    - 46
    - 47
  - point: 在扩规模之前，银行合作方、审计方或监管会先要储备、备付、赎回和报告证据。
    sourceRefs:
    - 5
    - 6
    - 21
    - 23
    - 46
  - point: 一旦做跨境付款或商户结算上线，周末流动性、费用和对账痛点就会暴露，手工流程再也遮不住。
    sourceRefs:
    - 16
    - 18
    - 20
    - 22
    - 24
    - 52
  willingnessToPay:
    summary: 预算最可能来自财资数字化、上线准备和合规控制支出，而不是一条投机性的 加密 预算。ROI 叙事也很清楚：人工异常更少、月结更快、审计准备更轻，从牌照走到收入的路径也更短。
    sourceRefs:
    - 18
    - 19
    - 20
    - 21
    - 27
  competitiveLandscape: '[31][32][35][39][41][44][46][48][51] 竞争是战略层面的，不是一个纯粹品类：支付 API、托管/工作流厂商、发行方和卡组织平台都在向同一片企业稳定币工作流表面靠拢。最大的替代方案仍是内部表格加 ERP/TMS 导出，直到交易量或审计压力把这套运营方式打穿。'
  incumbentThesis:
  - incumbentClass: 稳定币通道
    point: Zerohash、BVNK 和 OpenPayd 能帮买家快速上线，但它们的经济模型和路线图都更围绕“在自己的栈里把流转跑起来”，而不是在多个供应商之间做一层中立控制平面。
    sourceRefs:
    - 31
    - 32
    - 41
    - 44
    - 45
  - incumbentClass: 托管与工作流平台
    point: Fireblocks 在钱包控制、策略和安全划转上很强，但财务团队仍然需要一套独立映射，把银行备付和内部总账对到链上活动。
    sourceRefs:
    - 29
    - 39
    - 40
  - incumbentClass: 发行方与银行支持网络
    point: Circle、Banking Circle 和 SG-FORGE 证明了这个品类存在，也可能抽象掉部分复杂度，但它们各自还是围着自己的代币或网络优化，而不是替受监管运营方做跨供应商异常管理。
    sourceRefs:
    - 34
    - 35
    - 37
    - 46
    - 47
  - incumbentClass: 财资套件
    point: TMS 和 ERP 栈本来就吃着治理预算，但它们并不是开箱即用地建来处理 gas、桥接在途状态、钱包策略或 MiCA 证据包。
    sourceRefs:
    - 19
    - 20
    - 22
    - 27
  regulatoryLandscape: '[1][4][5][6][7][8][12] MiCA 给欧洲带来了一套统一规则，但运营负担并不轻：发行方要有赎回计划、监管报送、投诉处理链路，而且从 2026 年 3 月开始，部分 EMT 支付流还要再走一层 PSD2 授权。这意味着监管就绪的证据不是事后补的合规模块，而是 第一天 要求。'
  technologyLandscape: '[32][35][37][39][40][41][44][48][51] 这套栈正在分裂成三层：发行方/网络、钱包与托管编排、以及法币/稳定币连接器。真正还缺的是一层 控制层级的软件，能同时盯住三层，并给财务和合规产出一份对得上的记录。'
  distributionChannels:
  - point: 在 MiCA/EMI 批准、试点签字或第一条稳定币通道启动后，直接外呼 CFO、COO 和首席合规官。
    sourceRefs:
    - 7
    - 18
    - 30
    - 31
  - point: 通过 MiCA 法律顾问、审计方和财资顾问走转介绍，因为报告、赎回和控制义务本来就已经被写进规则里。
    sourceRefs:
    - 5
    - 6
    - 19
    - 27
  - point: 与需要一层供应商中立证据系统来打通大客户的基础设施厂商联合销售。
    sourceRefs:
    - 35
    - 39
    - 41
    - 44
    - 45
  partnershipEcosystem:
  - point: Circle、Fireblocks、BVNK、OpenPayd 和 Banking Circle 这类钱包、托管与支付栈伙伴可以提供数据流，而创业公司保持执行中立。
    sourceRefs:
    - 35
    - 39
    - 41
    - 44
    - 46
  - point: 审计机构、会计政策顾问和 ERP/TMS 实施方天然适合做实施伙伴，因为上线准备既靠 API，也靠证据设计。
    sourceRefs:
    - 19
    - 21
    - 27
  - point: Visa、PayPal 和 Stripe/Bridge 所在的卡与付款生态，会在买家需要稳定币挂钩的收单或出款能力时扩大分发，而不必重搭控制层。
    sourceRefs:
    - 48
    - 51
    - 52
  dataMoats:
  - point: 把钱包事件、银行流转、gas 成本和分录结果串起来的可复用对账图谱，能不断累积成一份很难重建的运营数据集。
    sourceRefs:
    - 20
    - 22
    - 23
  - point: 围绕 EMT 特有的报告、赎回和 PSD2 重叠问题沉淀出的政策模板与异常历史，最终会变成专有的合规 操作手册。
    sourceRefs:
    - 4
    - 5
    - 6
    - 7
  - point: 跨供应商的储备偏移、异常率和证据周转基准数据，能让平台比任何单一基础设施厂商的仪表盘都更聪明。
    sourceRefs:
    - 29
    - 39
    - 41
    - 44
  geographicConsiderations:
  - point: 最好的早期中心在荷兰、法国和卢森堡，这些地方已经能看到 Zerohash、Circle、Banking Circle 和 SG-FORGE 的 MiCA+EMI 或 EMT 上线动作。
    sourceRefs:
    - 31
    - 34
    - 46
    - 47
  - point: 由于欧元稳定币相对美元稳定币仍然很小，产品从第一天起就该在 EEA 持牌实体里同时支持 EUR 和 USD 计价工作流。
    sourceRefs:
    - 12
    - 17
    - 37
  sensitivityCases:
  - case: PSD2 和 MiCA 的重叠在运营上仍然很乱
    impact: 销售周期会被拉长，买家会优先买能先降低审计与牌照风险的软件，而不是扩交易量。
    sourceRefs:
    - 7
    - 30
    - 31
  - case: 欧元稳定币需求依旧小众，而美元挂钩用例占主导
    impact: 滩头需求仍然存在，但产品必须支持多币种稳定币控制，而不是押注纯欧元叙事。
    sourceRefs:
    - 12
    - 17
    - 34
    - 46
    - 47
  - case: 基础设施厂商把更多合规与报表能力直接打包进产品
    impact: 如果创业公司不能明确吃下跨供应商对账、异常工作流和监管就绪证据，独立价值就会被压缩。
    sourceRefs:
    - 29
    - 35
    - 39
    - 41
    - 44
    - 48
    - 51
  validationPlan:
  - priority: 高
    question: 未来 12 个月内，欧元区到底有多少 EMI 和支付机构已经获得董事会批准去上线稳定币？
    evidenceToGather: 访谈 20 家荷兰、法国、爱尔兰和卢森堡的运营方，再叠加法律/顾问在真实 MiCA 项目上的 deal flow。
  - priority: 高
    question: 在第一波 EMT 或 MiCA 审查里，监管、银行合作方和审计实际会要哪些证据材料？
    evidenceToGather: 拿到 5-10 家共创客户的匿名审计资料清单、银行 onboarding 包和监管信息请求。
  - priority: 中
    question: 在 Zerohash、Fireblocks 或 OpenPayd 把功能打包到位之前，买家会不会先买一层独立控制层？
    evidenceToGather: 对这些平台的现有用户做付费意愿测试，再映射它们打包仪表盘与平台方案之间的功能缺口。
  - priority: 中
    question: 要让第一次部署真正可用，最低限度必须接哪些数据？
    evidenceToGather: 围绕备付银行、钱包供应商、ERP/TMS 系统和内部总账，做一张连接器优先级矩阵。
