  stage: 扩张期
  wedge: 面向银行、券商和 金融科技 的双牌照稳定币入金、结算与付款基础设施。
  pricing: 定制化企业定价 / 以演示驱动销售。
  strength: 在欧洲监管姿态很强，并且已经有一套用于出款和结算的执行栈。
  weaknessVsUs: 它更像一层以自身为中心的执行系统，而不是横跨外部银行、钱包和内部总账的独立对账层。
  sourceRefs:
  - 31
  - 32
- name: Fireblocks
  stage: 成熟厂商
  wedge: 覆盖托管、钱包、策略和稳定币基础设施，并带有财资控制与网络连接能力。
  pricing: 定制化企业定价。
  strength: 安全、工作流控制和生态连接都很深。
  weaknessVsUs: 它仍然最强在钱包侧编排；跨第三方栈的银行备付和财务级证据，客户还得自己补。
  sourceRefs:
  - 29
  - 39
  - 40
- name: BVNK
  stage: 扩张期
  wedge: 为企业提供托管式稳定币支付、命名账户、钱包，以及法币/稳定币兑换。
  pricing: 定制化企业定价。
  strength: 跨境支付姿态很强，而且向客户传递“你不必自己持有 加密资产”的信息。
  weaknessVsUs: 它擅长把钱动起来，但并不是跨多家供应商和多本总账的中立证据系统。
  sourceRefs:
  - 41
  - 42
- name: OpenPayd
  stage: 扩张期
  wedge: 在统一金融基础设施平台上提供法币通道、虚拟账户和稳定币服务。
  pricing: 定制化企业定价。
  strength: 把 EMI 风格的法币基础设施和数字资产服务、以及 Ripple 等伙伴关系接到了一起。
  weaknessVsUs: 它是一层很宽的基础设施，但在面向财务团队的 MiCA 专属对账与证据打包上，公开能力还不够清晰。
  sourceRefs:
  - 44
  - 45
- name: Banking Circle
  stage: 成熟厂商
  wedge: 由银行支持、符合 MiCA 的 EURI 稳定币及相关结算基础设施。
  pricing: 企业 / 伙伴定价。
  strength: 银行资产负债表背书、资金隔离和按面值赎回权都直接写进了产品故事。
  weaknessVsUs: 它更聚焦在自己的银行/代币栈，而不是在多发行方、多银行、多钱包之间做一层中立控制层。
  sourceRefs:
  - 46
  - 47
regulatoryTechnicalConstraints:
- point: 即便已经拿到 MiCA 授权，部分 EMT 转账和托管钱包活动在 2026 年 3 月 2 日之后仍可能需要 PSD2 授权。
  sourceRefs:
  - 7
- point: MiCA 要求 EMT 和 ART 发行方维护赎回计划，并按模板向监管报送。
  sourceRefs:
  - 5
  - 6
- point: 第 108 条下的投诉处理链路和面向监管的程序，又新增了一层证据管理要求。
  sourceRefs:
  - 8
- point: 想把运营做到审计就绪，除了支付数据，还得准备钱包清单、授权矩阵、密钥管理记录和站得住的估值方法。
  sourceRefs:
  - 21
  - 23
validationSignals:
- point: Zerohash 已经在荷兰把 MiCAR 和 EMI 许可叠在一起，这正是创业假设瞄准的那套牌照组合。
  sourceRefs:
  - 30
  - 31
- point: Circle 已经在法国 EMI 牌照下于欧洲发行 USDC 和 EURC，说明大型发行方把 MiCA 合规视为商业必需。
  sourceRefs:
  - 34
- point: Banking Circle 推出了 EURI——一款银行支持、符合 MiCA 的 EMT，并且带有资金隔离、审计和按面值赎回权。
  sourceRefs:
  - 46
- point: Fireblocks 报告称 90% 的受访者已经在对稳定币采取行动，且稳定币正成为现代支付通道的核心组成部分。
  sourceRefs:
  - 29
- point: Stripe/Bridge、Visa 和 PayPal 都在把稳定币基础设施嵌进主流支付产品，说明买方注意力和现有厂商压力都已经在了。
  sourceRefs:
  - 48
  - 51
  - 52
openQuestions:
- 欧元区的 EMI 和支付机构里，到底有多少家会在未来 12 个月内上线已经获董事会批准的稳定币项目，而不是只停在路线图阶段？
- 在第一波 MiCA/EMI 检查里，各国监管最常要求哪些储备、备付和对账材料？
- 早期买家会接受一层独立的中立控制层，还是会坚持用执行厂商打包出的仪表盘？
- 在不做双边定制集成或手工导出的前提下，生产环境里到底能多频繁地拉取备付银行数据？
