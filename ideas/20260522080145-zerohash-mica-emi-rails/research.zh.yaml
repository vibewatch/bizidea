  adoptionFrictionMatrix:
  - friction: EMT 支付活动的双重授权边界仍然模糊
    severity: 高
    affectedBuyer: 首席合规官 / 总法律顾问
    mitigation: 先从对账与证据层切入，先把审批和审计工作压短，再去碰支付执行范围。
    sourceRefs:
    - 4
    - 7
  - friction: 银行、链上和总账之间需要三方数据映射
    severity: 高
    affectedBuyer: 财资运营负责人 / Controller
    mitigation: 先做文件导入和异常队列，不急着追求深 API 覆盖；先把月结和日终 关账 跑通。
    sourceRefs:
    - 18
    - 20
    - 22
  - friction: 钱包控制、估值和审批的可审计性
    severity: 高
    affectedBuyer: CFO / 审计负责人
    mitigation: 把钱包清单、授权矩阵、证据留存和可回放交易历史产品化。
    sourceRefs:
    - 21
    - 23
  - friction: 基础设施厂商的打包压力
    severity: 中
    affectedBuyer: COO / 支付负责人
    mitigation: 保持供应商中立，并嵌进执行厂商不掌握的 ERP/TMS 工作流。
    sourceRefs:
    - 29
    - 31
    - 39
    - 41
    - 44
