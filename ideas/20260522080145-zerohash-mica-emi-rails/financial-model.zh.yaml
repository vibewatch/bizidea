slug: mica-stablecoin-ops-ledger
date: '2026-05-22'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: M1 起始客户数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 销售从 0 个已安装客户起步。'
- id: A2
  name: 每个付费客户落地后的月收入
  value: '12500'
  unit: USD/month
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer] $50k-$100k 的试点若跑约 6 个月，其中点就是 $75k，也就是 $12.5k/月；这也和 $120k-$200k ARR 的中点 $150k ARR 对得上。'
- id: A3
  name: 第 1 年客户爬坡
  value: M4 first customer, M7 second customer, M11 third customer
  unit: schedule
  source: '[BP experimentRoadmap; BP milestones 0-12 months] 90-180 天内拿下 2 个付费试点、12 个月内做到 3-5 家共创客户，支撑第 1 年末 3 个客户的假设。'
- id: A4
  name: 第 2 年客户目标
  value: '8'
  unit: customers at EOY2
  source: '[BP milestones 12-24 months] 到 6-8 个生产客户；基础情形取区间上限。'
- id: A5
  name: 第 3 年客户目标
  value: '18'
  unit: customers at EOY3
  source: '[BP market.som; BP milestones 24-36 months] 第 3 年 SOM 和里程碑都指向 15-18 个客户；基础情形取 18。'
- id: A6
  name: 稳态毛利率目标
  value: '70'
  unit: pct
  source: '[BP businessModel.targetGrossMarginPct] 明确目标毛利率是 70%。'
- id: A7
  name: 固定平台与合规 COGS 底座
  value: '14000'
  unit: USD/month
  source: '[Heuristic: regulated-fintech SaaS infra baseline] 云资源、审计日志、数据留存和对账任务在规模起来前就会产生一层不可忽略的固定成本。'
- id: A8
  name: 可变 COGS 比率
  value: '20'
  unit: pct of revenue
  source: '[Heuristic: integration-heavy enterprise SaaS COGS] 早期需要大量托管式集成和客户支持，可变交付成本会高于纯软件。'
- id: A9
  name: 模型启动时的创始团队规模
  value: '3'
  unit: FTE
  source: '[BP team] 创始工程师、产品与合规负责人，以及 CEO/创始人销售都从 Month 0 开始。'
- id: A10
  name: 解决方案工程师招聘时间
  value: Month 4
  unit: month
  source: '[BP team] 解决方案工程师在 Month 4 入职。'
- id: A11
  name: 企业客户经理招聘时间
  value: Month 12
  unit: month
  source: '[BP team] 企业客户经理在 Month 12 加入，前提是早期试点已经跑出证明。'
- id: A12
  name: 第 2 年招聘爬坡
  value: +4 FTE by Month 24
  unit: FTE
  source: '[BP milestones 12-24 months; BP strategicChoices.sequencingRationale] 新增 1 名工程、1 名产品/合规、1 名 GTM、1 名运营，就足以支撑 6-8 个客户，不需要假设一张虚胖组织图。'
- id: A13
  name: 第 3 年招聘爬坡
  value: +3 FTE by Month 36
  unit: FTE
  source: '[BP milestones 24-36 months] 再补 2 名工程师和 1 名 GTM，就能在仍然偏窄的市场里支撑扩到 18 个客户，同时保持精瘦。'
- id: A14
  name: 工程岗位 全包 年薪
  value: '165000'
  unit: USD/FTE/year
  source: '[Heuristic: seed-stage enterprise fintech compensation] 在受监管 B2B 软件里招资深工程，全包 成本通常要到 $100K 中段。'
- id: A15
  name: 产品与合规岗位 全包 年薪
  value: '155000'
  unit: USD/FTE/year
  source: '[Heuristic: seed-stage enterprise fintech compensation] 产品/合规人才同样偏资深，但整体薪酬会比重工程岗位略轻。'
- id: A16
  name: 销售与 GTM 岗位 全包 年薪
  value: '170000'
  unit: USD/FTE/year
  source: '[Heuristic: enterprise SaaS GTM compensation] 由创始人主导销售，再加 1 到 3 个背 销售指标 或做伙伴拓展的岗位，就足以支撑基础情形下的获客速度。'
- id: A17
  name: G&A 与运营岗位 全包 年薪
  value: '130000'
  unit: USD/FTE/year
  source: '[Heuristic: startup finance and ops compensation] 一名财务/运营通才就足够撑过 种子轮阶段。'
- id: A18
  name: 非薪酬 opex 爬坡
  value: R&D tools $5k-$7k/month, S&M programs $5k-$12k/month, G&A baseline $10k-$14k/month
  unit: USD/month
  source: '[Heuristic: seed-stage enterprise SaaS operating model] 模型假设软件、法务、保险、差旅和需求获取都控制在审慎区间内。'
- id: A19
  name: 模型启动时募集的 种子轮现金
  value: '3000000'
  unit: USD
  source: '[BP fundingAsk] 种子轮融资目标区间 $2M-$4M 的中点。'
- id: A20
  name: 长期月度 客户流失
  value: '1.0'
  unit: pct
  source: '[Heuristic: enterprise annual-contract churn] 单位经济模型默认 客户流失 很低，因为部署与合规紧密相关。'
- id: A21
  name: 客户获取成本
  value: '75000'
  unit: USD/customer
  source: '[Heuristic: founder-led enterprise SaaS CAC] 高触达试点卖给 CFO/合规买家时，CAC 通常明显高于 SMB SaaS，但仍低于首年 ACV。'
- id: A22
  name: 模型期内实际发生的 客户流失
  value: '0'
  unit: churn events in first 36 months
  source: '[BP businessModel.expansionLevers; Heuristic: first-wave design partners] 基础情形假设，前 18 个客户会被精细运营到下一轮融资前不丢单。'
