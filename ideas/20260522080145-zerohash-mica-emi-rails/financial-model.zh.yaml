modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Trigger[MiCA 批准或上线准备触发点] --> Pilot[付费试点 / 首个受控部署]
      Pilot --> Customers[付费的受监管实体]
      Customers --> Revenue[约 ~$150k ACV 的经常性收入]
      Revenue --> GrossProfit[稳态约 70% GM 的毛利润]
      GrossProfit --> Cash[用于招聘和跑道的现金]
      Customers --> Expansion[第二个实体 / 第二个项目扩张]
      Expansion --> Revenue
modelSanity:
- checkName: 收入引擎
  finding: 基础情形的收入由少量高 ACV 的受监管客户驱动：客户数从第 1 年末的 3 个，增长到第 3 年末的 18 个；每个 客户 的有效年收入约 $150k。
- checkName: 必须做对什么
  finding: 公司必须证明“上线准备试点”能足够快地转成年预算控制软件；只有这样，才能在现金跌到不舒服的融资缓冲区之前，于第 2 年末做到 8 个客户。
- checkName: 模型会在哪种情况下断裂
  finding: 如果打包式基础设施仪表盘把销售周期拖到接近 9 个月，又压低有效 ACV，那么 downside 情形显示，公司会在下一轮融资里程碑前把现金烧成负数。
- checkName: 下一轮融资证明点
  finding: 当公司能展示 8 个生产客户外加至少 3 次扩张时，下一轮融资才站得住——这说明产品是一层可复用的控制层，而不是一次性的服务项目。
sanityChecks:
  ruleOf40: 第 3 年收入增长 128%（(1912.5-837.5)/837.5），加上第 3 年 EBITDA 利润率 -40%（-760.4/1912.5），合计 88%。
  burnMultiple: 第 3 年净烧钱 $760.4K / 第 3 年新增 ARR 约 $1.5M（10 个净新增客户 x $150K ACV）= 0.51x。
  revenuePerFte: $159K 的第 3 年收入/FTE（按年末 12 名 FTE 算），低于典型 SaaS 的 $200K-$400K 基准，但对一家仍在验证品类契合、且合规负担很重的企业公司来说可以接受。
  flags:
  - 模型到第 3 年只依赖 18 个客户，所以只要有 1 单延迟或 1 次流失，收入就会明显波动。
  - 第 1 年毛利率几乎为零，因为固定的合规与对账基础设施成本先发生了，而客户基数还不够密。
  - 到第 3 年，收入/FTE 仍低于成熟 SaaS 水平；这对这条切口是诚实的，但也意味着公司在下一轮前必须要么拿到更多扩张收入，要么把招聘纪律收得更紧。
