scenarios:
  downside:
    description: MiCA 上线仍然集中在少数项目，打包压力上升，公司到第 3 年末只有 12 个客户，每个客户的有效 ACV 约 $135k，毛利率 65%。
    y3RevenueK: 1360.0
    y3EbitdaK: -1260.0
    cashLowPointK: -180.0
    keyAssumptionChanges:
    - 与 A5 相比，第 3 年末客户数从 18 个降到 12 个。
    - 与 A2 相比，由于试点转正慢于计划，有效 ARPU 从 $150k 降到 $135k。
    - 由于服务强度始终偏高，稳态毛利率没有达到 A6 的 70%，而是落在 65%。
  base:
    description: 业务在第 1 年拿下 3 家共创客户，第 2 年末增至 8 个客户，并在保持团队精瘦的前提下，于第 3 年走到研究假设的 18 个客户终点。
    y3RevenueK: 1912.5
    y3EbitdaK: -760.4
    cashLowPointK: 417.3
    keyAssumptionChanges:
    - A1-A22 的所有建模假设均按原文成立。
  upside:
    description: 转介绍渠道更早跑通，第 3 年出现多项目扩张，公司到第 3 年末有 20 个客户，每个客户的有效 ACV 约 $165k，毛利率也略好一些。
    y3RevenueK: 2350.0
    y3EbitdaK: -420.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 与 A5 相比，第 3 年末客户数从 18 个升到 20 个。
    - 与 A2 相比，更多 客户 追加第二个项目，有效 ARPU 从 $150k 提升到 $165k。
    - 随着集成复用效率高于 A6-A8 假设，毛利率改善到 74%。
