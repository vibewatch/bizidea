jobsToBeDone:
- job: 当我们获批上线稳定币项目时，帮财资和合规团队把链上余额对到备付金和内部总账，这样我们就能在不留下审计缺口的前提下上线。
  currentAlternative: 基于表格、钱包导出和银行导出的对账
  successMetric: 产出一版干净的日对账要花几天，以及仍未解决的上线异常有多少
- job: 当审计方、银行合作方或董事会问起项目到底怎么受控时，帮我们拿出每一笔余额变动和审批的证据，这样产品才能在整个 EEA 市场持续运行。
  currentAlternative: 从合规工单、截图和财务系统里人工收集证据
  successMetric: 准备一份证据包要花多少小时，以及未解决政策异常下降了多少
