problem: EEA 的金融科技公司和券商现在可以认真考虑面向客户的稳定币余额与结算，但难点不在接钱包。一旦公司同时落在 EMI 和 MiCA 牌照框架下，每一笔稳定币流转都得回勾到备付金、内部总账，以及一套财务和风控团队说得清的合规边界。今天这些证据往往散在链上数据、银行记录和手工对账里——上线更慢，运营失误也更容易出问题，偏偏这时公司正要证明自己能跑通受监管项目。
targetUser:
  primary: 在 EEA 持牌 EMI 和券商里，负责上线面向客户稳定币结算或余额产品的财资与合规运营负责人
  secondary: 服务欧洲持牌金融科技公司的 Banking-as-a-Service 平台中的产品和财务团队
  buyer: 在 EEA EMI 内推进稳定币产品的 COO、首席合规官或 CFO
startupThesis:
  nonObviousInsight: MiCA 不只是让稳定币合法化；它和 EMI 牌照叠在一起后，会带来一层新的运营负担：公司得持续证明链上余额、备付金、总账分录和政策控制始终对得上。因此，赢家不是再做一个托管或支付 API，而是给持牌机构做一层运营与证据底座。
  beachhead: 已经有法币总账、又想在未来 12 个月内推出品牌稳定币账户或跨境商户 B2B 结算的 EEA 持牌电子货币机构和数字券商；它们不想自己从头搭日常备付、对账和审计工作流。
  wedge: 一套 MiCA 运营总账：把钱包余额对到备付金法币账户和内部子账簿，按牌照政策标记异常，并给财资、合规、财务团队生成可直接交监管的证据包。
  whyNowCatalyst: Zerohash 在 MiCA 牌照之上又拿到 EMI 批准，说明稳定币项目现在可以直接装进 EEA 主流受监管机构里跑，运营控制软件因此一下子变得紧迫。
  ventureScalePath: 先从 EMI 级别的稳定币对账与证据切进去，公司就能卡在上线和日常运营里那层很难替代的位置；再往外扩，能长到交易监控流程、储备证明、合作方监督、多司法辖区牌照控制，以及更广的受监管数字资产资金流基础设施。
solution: 产品充当链上钱包、银行备付金账户、核心总账和合规政策之间的控制平面。它拉取余额和转账，把数据对到应有的储备头寸；只要资金、权限或交易对手不符合公司的获批 运营框架，就自动拉起异常工单。团队每天都能拿到可直接给监管看的证据包，清楚串起客户余额、财资头寸和内部审批，而不是等审计前再去拼截图和 CSV。第一条工作流足够窄，能在全面上线稳定币之前先部署；一旦交易量起来，又足够关键，能继续留在核心记录系统里。
goToMarketSeed:
  firstCustomer: 一家受荷兰或爱尔兰监管、已经发行 EUR 电子货币、运营团队有 10-50 人，并计划在未来 12 个月内跨多个 EEA 市场上线稳定币财资或商户结算的 EMI
  buyingTrigger: 牌照获批、董事会拍板稳定币上线，或银行合作方要求每天提供备付金与对账证据
  currentAlternative: 内部表格，加上从钱包供应商、银行门户、ERP 系统导出的零散数据，再靠人工做合规复核
  switchingReason: 这个切口让持牌机构不用把受监管证据交给通用加密基础设施，也能更快上线；同时把财务和合规拉回同一套对过账的运营记录里，不再被碎片化的人工流程拖着走。
  pricingHypothesis: 按受监管实体数量、活跃稳定币项目数和对账账户数收年费；总账映射另收上线费
