topRisks:
- name: 品类时机
  description: MiCA 框架下的稳定币上线节奏可能比预期更慢，短期内准备为独立运营软件买单的客户不够多。
  mitigation: 先卖给已经在跑牌照或上线规划的公司，把产品包装成“上线前就绪度 + 持续控制”，而不是只在规模起来后才需要的工具。
- name: 数据接入依赖
  description: 对账质量取决于银行、钱包和内部总账能否稳定供数，而这些在项目早期往往最难接。
  mitigation: 先从文件导入和最高风险账户切起，等控制模型证明 ROI 后，再往更深的系统集成扩。
- name: 现有平台打包
  description: 大型托管或银行基础设施供应商可能补上一层基础报表，试图把这部分能力打包进自己的平台。
  mitigation: 保持跨供应商中立，靠跨系统对账、异常工作流和可直接交监管的证据取胜——这些不是单一厂商自己就能给全的。
