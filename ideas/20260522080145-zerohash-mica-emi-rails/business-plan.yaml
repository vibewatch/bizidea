slug: mica-stablecoin-ops-ledger
date: "2026-05-22"
executiveSummary: >-
  Stablecoin launch inside Europe is becoming a finance-controls problem before it becomes a volume problem, because MiCA
  plus EMI permissions force operators to prove that wallet activity, safeguarded funds, and internal ledgers stay in
  sync. The beachhead customer is an EEA-licensed EMI or digital brokerage with an existing fiat ledger and a board-
  approved plan to launch stablecoin settlement or balances in the next 12 months. The product starts as a provider-
  neutral operations ledger that ingests bank, wallet, and subledger data, opens exceptions when policy or balance
  mismatches appear, and produces regulator-, auditor-, and banking-partner-ready evidence packs. The first sale is a
  launch-readiness pilot triggered by licence approval, board sign-off, or a partner requirement for daily safeguarding
  and reconciliation evidence. Research suggests an estimated $152.4M TAM, $30.0M three-year SAM, and $2.7M Year-3 SOM,
  but the true count of launch-ready buyers is still an open diligence question because euro stablecoin adoption remains
  early. Competition will come from execution vendors such as Zerohash, Fireblocks, BVNK, OpenPayd, Circle, and bank-
  backed networks, so the company must stay neutral and win on cross-provider reconciliation rather than payment
  execution. The deliberate sequencing is read-only reconciliation first, approval and reporting workflows second, and
  adjacent modules such as partner oversight or transaction monitoring only after the company proves that finance and
  compliance teams will buy a standalone control layer. The biggest disconfirming risk is that bundled vendor dashboards
  become good enough before enough MiCA launches reach production.
problem:
  - EEA EMIs and brokerages can now launch stablecoin products, but treasury, compliance, and finance teams still have to reconcile bank safeguarding balances, wallet activity, and internal ledgers across disconnected systems.
  - Manual spreadsheets and provider exports are too weak for daily evidence packs, audit trails, redemption and reporting workflows, and board-level sign-off under MiCA-era controls.
solution:
  - Provide a provider-neutral operations ledger that imports balances and transfers from safeguarding banks, wallets, and internal ledgers, then flags reserve, policy, and approval exceptions in one queue.
  - Generate daily evidence packs, wallet inventories, authorization records, and reconciliation outputs that finance and compliance teams can use before launch, during audits, and in ongoing supervisory reporting.
whyWeWin:
  - Incumbent rails and custody vendors optimize for moving funds on their own stack, while the buyer's hardest problem is proving control across multiple external providers and internal finance systems.
  - The product compounds proprietary reconciliation mappings, exception histories, and MiCA-plus-EMI control templates that become more valuable with each launch and each additional entity.
strategicChoices:
  beachhead: Dutch- and French-regulated EMIs and digital brokerages with existing EUR e-money operations and a board-approved stablecoin settlement or balance launch in the next 12 months.
  wedgeRationale: This slice has a live regulatory trigger, an existing finance stack to map against, and a narrow launch workflow where one product can shorten time to go-live and reduce audit-prep burden before broader stablecoin volumes exist.
  sequencingRationale: The company should prove read-only reconciliation and evidence generation first, because buyers will trust a control system that explains balances before they trust automation that influences money movement; only after pilot conversions should it deepen integrations, approval workflows, and expansion modules.
  notYet:
    - Stablecoin payment execution, custody, or principal liquidity provision
    - Broad treasury-management replacement for non-stablecoin cash operations
    - Consumer wallets, card issuance, or developer-first crypto APIs
market:
  tam: Estimated $152.4M TAM based on 1,016 euro-area EMIs and payment institutions at roughly $150k ARR for a high-touch stablecoin controls platform.
  sam: Estimated $30.0M SAM based on about 200 launch-ready institutions over the next three years in digitally active EEA hubs.
  som: Estimated $2.7M Year-3 SOM based on 18 customers at about $150k ARR after winning a focused set of design partners and adjacent regulated operators.
  segments:
    - EEA-licensed EMIs launching stablecoin balances or merchant settlement
    - Digital brokerages and banking-as-a-service platforms serving regulated European fintechs
  buyingProcess: Treasury or finance operations usually identifies the reconciliation gap first, then compliance and audit stakeholders define required evidence before the CFO, COO, or Chief Compliance Officer approves a corridor- or entity-limited pilot. The sale is design-heavy and usually starts around licence approval, board sign-off, or a bank or auditor demand for daily evidence.
product:
  mvp: >-
    MVP is a read-only reconciliation workspace for one safeguarding bank, one wallet or custody provider, one internal
    subledger or ERP export, and one stablecoin program. It produces daily balance matching, exception queues, wallet and
    approval inventories, and regulator-ready evidence packs without taking execution or custody risk.
  sixMonth: Ship design-partner product with file-based ingestion, daily reconciliation, evidence-pack generation, and workflow templates for safeguarding, redemption, and reporting reviews.
  twelveMonth: Add production-grade approval matrices, deeper API integrations for top bank and wallet systems, multi-entity support, and standardized reporting packs for finance, audit, and compliance teams.
  twentyFourMonth: Expand into the operating system for regulated stablecoin programs with partner oversight, reserve attestation workflows, cross-provider benchmarking, and adjacent controls for additional entities, currencies, and jurisdictions.
  keyBets:
    - Buyers will fund launch-readiness and control software before they fund broader stablecoin workflow automation.
    - File-based ingestion plus exception management is sufficient to prove value before full API coverage.
    - Provider-neutral evidence across bank, wallet, and GL data stays differentiated even as infrastructure vendors add more native reporting.
gtm:
  wedge: Sell a paid launch-readiness pilot that gives a licensed operator daily reconciliation and evidence packs before stablecoin go-live, then convert that pilot into the system of record for production operations.
  channels:
    - Direct outbound to CFOs, COOs, controllers, and Chief Compliance Officers immediately after MiCA or EMI approval, board sign-off, or first corridor launch planning
    - Referral-led sales through MiCA legal advisers, auditors, treasury consultants, and ERP or TMS implementation partners
    - Co-sell partnerships with wallet, custody, and stablecoin infrastructure vendors that need a neutral evidence layer to unblock regulated customers
  funnelTargets: "target account→qualified design conversation 25%+, qualified design conversation→paid pilot 20%+, paid pilot→production 60%+, first entity→second program expansion 50%+ within 12 months"
  pricing: Annual platform subscription priced by regulated entity, active stablecoin program, and reconciled account footprint, plus onboarding and ledger-mapping fees; expected landing motion is a $50k-$100k paid pilot that converts to roughly $120k-$200k ARR per entity once daily reconciliation and evidence workflows are live.
businessModel:
  revenueStreams:
    - Annual enterprise subscription for reconciliation, evidence, and exception workflows
    - Onboarding and integration fees for bank, wallet, and ledger mapping
    - Expansion fees for additional entities, programs, currencies, and reporting modules
  unitOfValue: Regulated entity and stablecoin program under daily reconciliation and evidence management
  targetGrossMarginPct: 70
  expansionLevers:
    - Add second and third stablecoin programs within the same customer
    - Add additional regulated entities, safeguarding accounts, and wallet providers
    - Sell adjacent modules for partner oversight, reserve attestations, and broader regulated digital-asset controls
strategyMap:
  northStarMetric: Monthly customer stablecoin balances and transfers reconciled to safeguarding funds and internal ledgers within SLA
  inputMetrics:
    - Paid pilots signed with launch-ready EMIs or brokerages
    - Percentage of daily balance variance resolved within 24 hours
    - Hours required to produce an audit or regulator evidence pack
    - Pilot-to-production conversion rate
    - Expansion from first entity to second program or entity
  moatsToBuild:
    - Reconciliation graph linking wallet events, bank movements, gas costs, and journal outcomes
    - MiCA-plus-EMI control templates for safeguarding, redemption, complaint handling, and reporting workflows
    - Benchmark dataset on exception rates, evidence turnaround time, and reserve drift across providers
  killCriteria:
    - Fewer than 10 of the first 20 target-customer interviews confirm a funded launch within 12 months and a separate need for daily evidence software
    - Fewer than 3 paid design partners sign within 12 months of focused selling
    - No pilot cuts evidence-pack preparation time by at least 50% or unresolved reconciliation exceptions by at least 30% within 90 days of deployment
  mermaid: |
    flowchart LR
      Wedge[MiCA launch-readiness pilot] --> MVP[Reconciliation and evidence MVP]
      MVP --> Proof[Audit and go-live proof points]
      Proof --> Expansion[Multi-entity control expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Real compliance pain and credible buyers exist, but conviction is capped by a still-narrow launch-ready market and high bundling risk from infrastructure vendors.
    whyBelieve: MiCA and EMI launches create a concrete, finance-owned workflow where provider-neutral reconciliation can remove manual work and accelerate regulated product launch.
    whyDoubt: The company may discover that too few buyers want a standalone control layer before execution vendors or treasury suites absorb enough of the workflow.
    nextDiligence: Validate with 5 to 10 launch-ready operators that a paid pilot tied to go-live evidence can convert into a six-figure annual control budget.
  firstCustomer:
    title: Treasury and compliance lead at a launch-ready EEA EMI
    profile: A 10-50 person operations team inside a Dutch, French, or Ireland-regulated EMI with existing EUR e-money workflows, at least one safeguarding bank relationship, and a board-approved stablecoin launch plan.
    trigger: Licence approval, board sign-off, or a banking partner or auditor demanding daily safeguarding and reconciliation evidence before launch.
    buyer: CFO, COO, or Chief Compliance Officer
    initialContract: $50k-$100k paid pilot for one entity, one stablecoin program, and core ledger mapping, converting to $120k-$200k ARR after daily reconciliation and evidence workflows become part of production operations.
  mustBeTrue:
    - At least one beachhead customer cannot get stablecoin launch sign-off without a repeatable reconciliation and evidence workflow.
    - Finance teams value provider-neutral control across bank, wallet, and GL systems more than a bundled dashboard from a single execution vendor.
    - One bank feed, one wallet provider, and one internal ledger cover enough of the first deployment to show ROI in under 90 days.
    - Buyers will fund the product from treasury digitization, launch-readiness, or compliance-control budgets rather than experimental crypto budgets.
    - The company can expand from one entity or program to multiple entities or programs inside the same customer before new-logo acquisition becomes the only growth path.
  diligenceQuestions:
    - How many EMIs in the Netherlands, France, Ireland, and Luxembourg have a board-approved stablecoin launch inside the next 12 months?
    - Which artifacts do auditors, banking partners, and supervisors request most often during first-wave MiCA launch reviews?
    - In live deals, how often is the customer already committed to Zerohash, Fireblocks, BVNK, or OpenPayd, and does neutrality still matter?
    - What minimum data integrations are mandatory for the first three production deployments?
    - Can the startup win budget before a production launch, or do customers only buy after operational pain becomes visible?
operatingAssumptions:
  - assumption: Board-approved stablecoin launches create a dedicated budget line for launch-readiness and control software.
    basis: research.yaml
    validationTest: Interview 20 target operators and confirm at least 10 have a named budget owner and pilot scope tied to launch readiness, audit, or safeguarding controls.
    decisionImpact: If false, the company should shift toward partner-led implementation revenue or a narrower compliance-reporting product rather than a standalone platform sale.
  - assumption: File-based ingestion from one safeguarding bank, one wallet system, and one internal ledger is enough to deliver a useful first deployment.
    basis: idea.yaml
    validationTest: Build three design-partner workflow maps and confirm the initial connector set covers at least 70% of required daily reconciliations and evidence artifacts.
    decisionImpact: If false, the roadmap becomes more services-heavy and the beachhead must narrow to buyers with a more standardized stack.
  - assumption: Provider-neutral evidence remains valuable even when execution vendors expand native reporting and workflow controls.
    basis: research.yaml
    validationTest: In at least 5 competitive evaluations, win on cross-provider reconciliation or audit workflows in half of cases against bundled alternatives.
    decisionImpact: If false, the company should align with one ecosystem partner or reposition as implementation software on top of a dominant rail vendor.
  - assumption: Supporting both EUR and USD stablecoin workflows inside EEA-regulated entities expands early demand without materially complicating the MVP.
    basis: research.yaml
    validationTest: Validate with 10 prospects that at least half need non-euro stablecoin support in the first 12 months and that the added workflow can reuse the same reconciliation core.
    decisionImpact: If false, focus the wedge on euro-denominated programs only and delay multi-currency expansion.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 EMIs, brokerages, legal advisers, and auditors involved in live MiCA launches.
    hypothesis: The most urgent buying trigger is board sign-off or partner review of launch controls, not post-launch reporting pain.
    successMetric: At least 10 target operators confirm a live launch in 12 months and identify the same 3 to 5 evidence artifacts as gating items.
    owner: CEO
  - horizon: 0–90 days
    experiment: Build a read-only reconciliation prototype using CSV or file exports from one bank account, one wallet, and one internal ledger.
    hypothesis: Buyers will see enough value in exception queues and evidence-pack output before demanding deep API integrations.
    successMetric: Two prospects agree the prototype is good enough to scope a paid pilot with fewer than 10 critical data gaps.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run two paid launch-readiness pilots for one entity and one stablecoin program each.
    hypothesis: A narrow pilot can shorten launch approval and replace spreadsheet evidence work quickly enough to justify conversion to annual software.
    successMetric: Two paid pilots signed and at least one converts to production within 6 months.
    owner: CEO
  - horizon: 90–180 days
    experiment: Test referral-led distribution with three MiCA legal or audit firms and two infrastructure vendors.
    hypothesis: Trust-heavy channels will produce higher-quality opportunities than generic fintech outbound in the first year.
    successMetric: One active referral partner produces at least three qualified opportunities and one paid pilot.
    owner: CEO
  - horizon: 180–360 days
    experiment: Ship approval matrices, wallet inventory, and reporting templates into the first production customer.
    hypothesis: Standardized control templates will reduce implementation time and improve pilot-to-production conversion.
    successMetric: Implementation time for the second customer is at least 30% shorter than the first.
    owner: Product and compliance lead
  - horizon: 180–360 days
    experiment: Expand the strongest customer from one program to a second entity, currency, or provider.
    hypothesis: Expansion inside an existing logo is the clearest proof that the wedge is a platform rather than a services project.
    successMetric: One customer expands within 12 months and generates at least 1.5x the initial ARR.
    owner: Solutions engineer
operations:
  - Run a daily close process that reconciles bank, wallet, and ledger balances and routes exceptions to finance and compliance owners.
  - Maintain evidence retention, wallet inventory, approval-matrix, and complaint-handling records that map directly to MiCA review workflows.
  - Use legal, audit, and ERP or TMS partners for implementation credibility while keeping the company neutral on payment execution.
  - Keep custody, conversion, and money movement with regulated partners and own only the control logic, mappings, and evidence layer.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the reconciliation engine, connector architecture, and evidence-pack workflows that define the wedge.
  - role: Product and compliance lead
    startTiming: Month 0
    rationale: Converts MiCA, EMI, and audit obligations into deployable templates and keeps roadmap choices grounded in customer controls.
  - role: CEO / founder-sales
    startTiming: Month 0
    rationale: Early selling depends on trust, design-partner recruitment, and partner development with advisers and infrastructure vendors.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Shortens enterprise onboarding, productizes ledger mapping, and turns custom launch workflows into repeatable deployment patterns.
  - role: Enterprise account executive
    startTiming: Month 12
    rationale: Added only after pilot-to-production conversion and partner channels show a repeatable path to new-logo acquisition.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 to 5 design partners across Dutch, French, and adjacent EEA launch-ready operators
      - Ship MVP covering one safeguarding bank workflow, one wallet provider, one internal ledger export, and daily evidence-pack generation
      - Convert 2 paid pilots into production customers
      - Establish one active referral or co-sell channel with a MiCA adviser or infrastructure vendor
  - horizon: 12–24 months
    items:
      - Reach 6 to 8 production customers and at least 3 customers with multi-entity or multi-program deployments
      - Standardize approval, reporting, and wallet-control templates so second deployments are materially faster than the first
      - Add deeper integrations for the highest-priority bank, wallet, and ERP or TMS systems
      - Launch first expansion modules for partner oversight or reserve attestation workflows
  - horizon: 24–36 months
    items:
      - Reach 15 to 18 customers, consistent with the researched Year-3 SOM
      - Expand beyond the initial EMI wedge into adjacent brokerages and regulated payment operators
      - Build benchmark data products around exception rates, evidence turnaround, and control performance across providers
      - Prove the company can be the finance-owned control layer above multiple stablecoin execution stacks
risks:
  - risk: MiCA launch activity may ramp more slowly than expected, leaving too few near-term customers for a standalone software category.
    likelihood: High
    impact: High
    mitigation: Target only firms already in launch planning, sell launch-readiness before post-scale automation, and keep headcount lean until paid pilots convert.
  - risk: Infrastructure vendors may bundle enough reporting and workflow controls to compress willingness to buy an independent layer.
    likelihood: High
    impact: High
    mitigation: Differentiate on cross-provider reconciliation, ERP and ledger mapping, and regulator-ready evidence that no single rail vendor can provide alone.
  - risk: Data access from safeguarding banks and internal ledgers may be inconsistent, making deployments too custom.
    likelihood: Medium
    impact: High
    mitigation: Start with file-based ingestion, productize mapping templates, and prioritize the highest-risk accounts before deeper API coverage.
  - risk: PSD2 and MiCA overlap or other supervisory changes could lengthen sales cycles and complicate product scope.
    likelihood: Medium
    impact: Medium
    mitigation: Stay out of execution scope, work with legal and audit partners, and keep the product focused on evidence and control rather than regulated payment activity.
  - risk: The market could be real but too narrow unless the company expands from launch controls into a broader regulated digital-money operations platform.
    likelihood: Medium
    impact: High
    mitigation: Use the beachhead to earn privileged workflow data, then expand into multi-entity controls, reserve attestations, and adjacent regulated-money operations use cases.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds a 4 to 5 person founding team, first bank and wallet integrations, 3 to 5 paid design-partner deployments, one durable referral channel, and enough production proof to determine whether provider-neutral stablecoin controls can outrun bundling pressure.
