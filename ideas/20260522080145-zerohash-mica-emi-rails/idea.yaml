problem: >-
  EEA fintechs and brokerages can now contemplate customer-facing stablecoin balances and settlement, but the hard part is
  not wallet connectivity. Once a firm operates under EMI and MiCA permissions, every movement of stablecoin has to map
  back to safeguarded funds, internal ledgers, and a defensible compliance perimeter that finance and risk teams can
  explain. Today that evidence is usually spread across on-chain data, banking records, and manual reconciliation work,
  which makes launch slower and operational mistakes more likely right when firms are trying to prove they can run a
  regulated program.
targetUser:
  primary: Treasury and compliance operations leaders at EEA-licensed EMIs and brokerages launching customer-facing stablecoin settlement or balances
  secondary: Product and finance teams at banking-as-a-service platforms serving regulated European fintechs
  buyer: COO, Chief Compliance Officer, or CFO at an EEA EMI adding stablecoin products
startupThesis:
  nonObviousInsight: >-
    MiCA does not just legalize stablecoins; paired with EMI permissions, it creates a new operating burden where firms
    need continuous proof that on-chain balances, safeguarded money, ledger entries, and policy controls all stay in sync.
    The winning product is therefore an operations and evidence layer for licensed firms, not another custody or payment
    API.
  beachhead: >-
    EEA-licensed electronic money institutions and digital brokerages with existing fiat ledgers that want to launch
    branded stablecoin accounts or B2B settlement for cross-border merchants without building daily safeguarding,
    reconciliation, and audit workflows in-house
  wedge: >-
    A MiCA operations ledger that reconciles wallet balances to safeguarded fiat accounts and internal subledgers, flags
    exceptions against license policy, and generates regulator-ready evidence packs for treasury, compliance, and finance
    teams
  whyNowCatalyst: >-
    Zerohash's EMI approval on top of MiCA licensing shows that stablecoin programs can now be run inside mainstream EEA
    regulated entities, which makes operational control software newly urgent.
  ventureScalePath: >-
    Starting with EMI-grade stablecoin reconciliation and evidence gives the company a hard-to-replace position in launch
    and ongoing operations; from there it can expand into transaction monitoring workflows, reserve attestations, partner
    oversight, multi-jurisdiction licensing controls, and broader money-movement infrastructure for regulated digital
    asset products.
solution: >-
  The product becomes the control plane between on-chain wallets, bank safeguarding accounts, core ledgers, and compliance
  policy. It imports balances and transfers, reconciles them to expected reserve positions, and opens exception cases when
  funds, permissions, or counterparties do not line up with the firm's approved operating model. Teams get daily
  regulator-ready evidence packs showing how customer balances, treasury positions, and internal approvals connect, rather
  than stitching screenshots and CSVs together before audits. The initial workflow is narrow enough to deploy before a
  full stablecoin launch, but valuable enough to remain system-of-record software once volumes scale.
goToMarketSeed:
  firstCustomer: >-
    A Netherlands- or Ireland-regulated EMI with existing EUR e-money issuance, 10-50 operations staff, and an active
    plan to launch stablecoin treasury or merchant settlement across multiple EEA markets in the next 12 months
  buyingTrigger: Licensing approval, board sign-off for a stablecoin launch, or a banking partner requirement for daily safeguarding and reconciliation evidence
  currentAlternative: Internal spreadsheets plus ad hoc exports from wallet providers, banking portals, ERP systems, and manual compliance review
  switchingReason: >-
    The wedge lets a licensed firm ship faster without trusting a generic crypto stack for regulated evidence, while
    keeping finance and compliance on one reconciled operating record instead of fragmented manual workflows.
  pricingHypothesis: Annual platform fee tied to number of regulated entities, active stablecoin programs, and reconciled accounts, with onboarding fees for ledger mapping
