topRisks:
  - name: Category timing
    description: Stablecoin launches under MiCA may ramp more slowly than expected, leaving too few buyers ready for dedicated operations software in the near term.
    mitigation: Sell first into firms already in licensing or launch planning, and package the product as pre-launch readiness plus ongoing controls rather than post-scale tooling.
  - name: Data access dependency
    description: Reconciliation quality depends on reliable feeds from banks, wallets, and internal ledgers that may be hard to integrate early in a launch.
    mitigation: Start with file-based ingestion and the highest-risk accounts, then expand into deeper integrations once the control model proves ROI.
  - name: Incumbent platform bundling
    description: Large custody or banking infrastructure vendors may add basic reporting and try to collapse this layer into their platform.
    mitigation: Stay neutral across providers and win on cross-system reconciliation, exception workflows, and regulator-ready evidence that single vendors cannot provide alone.
