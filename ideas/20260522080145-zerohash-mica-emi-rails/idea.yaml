jobsToBeDone:
  - job: >-
      When we get approval to launch a stablecoin program, help our treasury and compliance team reconcile on-chain
      balances to safeguarded funds and internal ledgers, so we can go live without creating audit gaps.
    currentAlternative: Spreadsheet-based reconciliation with wallet and bank exports
    successMetric: Days to produce a clean daily reconciliation and number of unresolved launch exceptions
  - job: >-
      When our auditors, banking partners, or board ask how the program is controlled, help us produce evidence of every
      balance movement and approval, so we can keep the product live across EEA markets.
    currentAlternative: Manual evidence collection from compliance tickets, screenshots, and finance systems
    successMetric: Hours to prepare an evidence pack and reduction in unresolved policy exceptions
