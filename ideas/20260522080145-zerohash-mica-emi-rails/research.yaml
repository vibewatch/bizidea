reportMemo:
  executiveTakeaways:
    - >-
      [7][30][31] MiCA plus EMI/PSD2 overlap turns the first stablecoin launch into a control-and-evidence project, not
      just a wallet integration.
    - >-
      [9][10][12][28] The buyer universe is real but still narrow: the euro area has 292 EMIs and 724 payment
      institutions, yet euro stablecoins remain small and adoption is concentrated in a digitally active subset.
    - >-
      [29][31][35][39][41][44][48] Competition is already coming from infrastructure vendors and platforms, so the
      startup only wins if it stays provider-neutral and owns regulator-ready reconciliation across bank, wallet, and GL
      data.
  marketDefinition: >-
    [7][18][20][23][30][31] The relevant market is regulated stablecoin-operations software for EEA EMIs, payment
    institutions, and brokerages that need to reconcile wallet activity, safeguarded funds, and internal ledgers under
    MiCA-era controls.
  customerAndBuyer: >-
    [18][19][20][21][22][31] Primary users are treasury operations, finance operations, and compliance teams inside
    regulated EMIs and digital-asset operators. The economic buyer is typically a CFO, COO, or Chief Compliance Officer
    signing off launch readiness and ongoing control evidence.
  buyingTriggers:
    - point: >-
        A MiCA, EMI, or board-approval milestone turns stablecoin launch from strategy into a supervised operating
        process.
      sourceRefs:
        - 7
        - 30
        - 31
        - 34
        - 46
        - 47
    - point: >-
        Banking partners, auditors, or regulators ask for reserve, safeguarding, redemption, and reporting evidence
        before scale-up.
      sourceRefs:
        - 5
        - 6
        - 21
        - 23
        - 46
    - point: >-
        Cross-border payout or merchant-settlement launches expose weekend liquidity, fee, and reconciliation pain that
        manual workflows cannot hide.
      sourceRefs:
        - 16
        - 18
        - 20
        - 22
        - 24
        - 52
  willingnessToPay:
    summary: >-
      Budget is most likely to come from treasury digitization, launch-readiness, and compliance-control spend rather
      than a speculative crypto line item. The ROI story is fewer manual exceptions, faster month-end close, less audit
      prep, and a shorter path from licence to revenue.
    sourceRefs:
      - 18
      - 19
      - 20
      - 21
      - 27
  competitiveLandscape: >-
    [31][32][35][39][41][44][46][48][51] Competition is strategic, not category-pure: payment APIs, custody/workflow
    vendors, issuers, and card platforms are all expanding toward the same surface area. The main substitute remains
    internal spreadsheets plus ERP/TMS exports until volumes or audits make that operating model fail.
  incumbentThesis:
    - incumbentClass: Stablecoin rails
      point: >-
        Zerohash, BVNK, and OpenPayd can help buyers launch quickly, but their economics and product roadmaps center on
        executing flow on their own stacks rather than acting as a neutral control plane across multiple providers.
      sourceRefs:
        - 31
        - 32
        - 41
        - 44
        - 45
    - incumbentClass: Custody and workflow platforms
      point: >-
        Fireblocks is strong on wallet control, policy, and secure movement, but finance teams still need an independent
        mapping from bank safeguarding and internal ledgers to onchain activity.
      sourceRefs:
        - 29
        - 39
        - 40
    - incumbentClass: Issuers and bank-backed networks
      point: >-
        Circle, Banking Circle, and SG-FORGE validate the category and may abstract some complexity, but each is still
        optimized around its own token or network rather than multi-provider exception management for a regulated
        operator.
      sourceRefs:
        - 34
        - 35
        - 37
        - 46
        - 47
    - incumbentClass: Treasury suites
      point: >-
        TMS and ERP stacks already own governance budgets, but they are not built to model gas, bridge-in-transit
        states, wallet policies, or MiCA evidence packs out of the box.
      sourceRefs:
        - 19
        - 20
        - 22
        - 27
  regulatoryLandscape: >-
    [1][4][5][6][7][8][12] MiCA gives Europe a unified rulebook for EMTs and CASPs, but the operational burden is heavy:
    issuers need redemption plans, supervisory reporting, complaint-handling links, and in some EMT payment flows a
    second PSD2 authorisation path from March 2026. That makes regulator-ready evidence a day-one requirement, not a
    later compliance add-on.
  technologyLandscape: >-
    [32][35][37][39][40][41][44][48][51] The stack is fragmenting into issuers/networks, wallet-custody orchestration,
    and fiat/stablecoin connectors. What is still missing is a controller-grade layer that watches all three at once and
    produces a reconciled record for finance and compliance.
  distributionChannels:
    - point: >-
        Direct outbound to CFOs, COOs, and Chief Compliance Officers immediately after MiCA/EMI approval, pilot
        sign-off, or first stablecoin corridor launch.
      sourceRefs:
        - 7
        - 18
        - 30
        - 31
    - point: >-
        Referral-led selling through MiCA legal advisers, auditors, and treasury consultants because reporting,
        redemption, and control obligations are already codified.
      sourceRefs:
        - 5
        - 6
        - 19
        - 27
    - point: >-
        Co-sell partnerships with infrastructure vendors that need a provider-neutral evidence layer to unblock larger
        regulated customers.
      sourceRefs:
        - 35
        - 39
        - 41
        - 44
        - 45
  partnershipEcosystem:
    - point: >-
        Wallet, custody, and payment-stack partners such as Circle, Fireblocks, BVNK, OpenPayd, and Banking Circle can
        provide data feeds while the startup stays neutral on execution.
      sourceRefs:
        - 35
        - 39
        - 41
        - 44
        - 46
    - point: >-
        Audit firms, accounting-policy advisers, and ERP/TMS implementers are natural implementation partners because
        launch-readiness depends on evidence design as much as on APIs.
      sourceRefs:
        - 19
        - 21
        - 27
    - point: >-
        Card and payouts ecosystems from Visa, PayPal, and Stripe/Bridge can widen distribution once buyers want
        stablecoin-linked acceptance or disbursement without rebuilding their controls.
      sourceRefs:
        - 48
        - 51
        - 52
  dataMoats:
    - point: >-
        A reusable reconciliation graph that links wallet events, bank movements, gas costs, and journal outcomes can
        compound into a hard-to-recreate operating dataset.
      sourceRefs:
        - 20
        - 22
        - 23
    - point: >-
        Policy templates and exception histories for EMT-specific reporting, redemption, and PSD2 overlap can become
        proprietary compliance playbooks.
      sourceRefs:
        - 4
        - 5
        - 6
        - 7
    - point: >-
        Cross-provider benchmark data on reserve drift, exception rates, and evidence turnaround can make the platform
        smarter than any single infrastructure vendor dashboard.
      sourceRefs:
        - 29
        - 39
        - 41
        - 44
  geographicConsiderations:
    - point: >-
        Best early hubs are the Netherlands, France, and Luxembourg, where visible MiCA-plus-EMI or EMT launches are
        already happening via Zerohash, Circle, Banking Circle, and SG-FORGE.
      sourceRefs:
        - 31
        - 34
        - 46
        - 47
    - point: >-
        Because euro stablecoins remain small relative to dollar stablecoins, the product should support both EUR and
        USD-denominated workflows inside EEA-regulated entities from day one.
      sourceRefs:
        - 12
        - 17
        - 37
  sensitivityCases:
    - case: PSD2 and MiCA overlap remains operationally messy
      impact: >-
        Sales cycles lengthen and buyers prefer software that reduces audit and licensing risk before they expand
        transaction volume.
      sourceRefs:
        - 7
        - 30
        - 31
    - case: Euro stablecoin demand stays niche while dollar-linked use cases dominate
      impact: >-
        Beachhead demand still exists, but the product must support multi-currency stablecoin controls rather than a
        euro-only thesis.
      sourceRefs:
        - 12
        - 17
        - 34
        - 46
        - 47
    - case: Infrastructure vendors bundle more compliance and reporting
      impact: >-
        Standalone value compresses unless the startup clearly owns cross-provider reconciliation, exception workflows,
        and regulator-ready evidence.
      sourceRefs:
        - 29
        - 35
        - 39
        - 41
        - 44
        - 48
        - 51
  validationPlan:
    - priority: high
      question: How many euro-area EMIs and payment institutions have a board-approved stablecoin launch in the next 12 months?
      evidenceToGather: >-
        Twenty interviews across Dutch, French, Irish, and Luxembourg operators plus legal/advisory deal flow on live
        MiCA projects.
    - priority: high
      question: >-
        Which evidence artifacts do supervisors, banking partners, and auditors actually request during first EMT or
        MiCA reviews?
      evidenceToGather: >-
        Anonymized audit request lists, bank onboarding packs, and regulator-information requests from 5-10 design
        partners.
    - priority: medium
      question: Will buyers buy a standalone control layer before Zerohash, Fireblocks, or OpenPayd bundle enough functionality?
      evidenceToGather: >-
        Willingness-to-pay tests with current users of those platforms plus feature-gap mapping against bundled
        dashboards.
    - priority: medium
      question: What minimum data integrations are required for the first deployment to work?
      evidenceToGather: Connector priority matrix across safeguarding banks, wallet providers, ERP/TMS systems, and internal ledgers.
