  fiveForces:
    supplierPower:
      score: 3
      rationale: >-
        Banks, issuers, wallet platforms, and data providers matter, but a multi-provider orchestration layer can avoid
        capture by any single supplier.
      sourceRefs:
        - 34
        - 39
        - 44
        - 46
        - 51
    buyerPower:
      score: 4
      rationale: >-
        The buyer set is concentrated, highly regulated, and able to demand custom workflows, so new vendors must prove
        launch acceleration and control value quickly.
      sourceRefs:
        - 18
        - 19
        - 27
        - 30
        - 31
    threatOfEntrants:
      score: 3
      rationale: >-
        APIs and data access lower technical barriers, but regulatory design, audit trust, and multi-ledger mapping
        still slow credible entrants.
      sourceRefs:
        - 4
        - 6
        - 21
        - 39
    threatOfSubstitutes:
      score: 4
      rationale: >-
        Spreadsheets, manual exports, and generic TMS/ERP controls remain acceptable substitutes until transaction
        volume or audit pressure makes them fail visibly.
      sourceRefs:
        - 19
        - 20
        - 22
        - 27
    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is already high because payment APIs, custody stacks, issuers, and card platforms are all converging on
        the same enterprise stablecoin workflow surface.
      sourceRefs:
        - 31
        - 35
        - 39
        - 41
        - 44
        - 48
        - 51
  pestle:
    - factor: political
      impact: negative
      point: >-
        ECB concern over dollar-dominant stablecoins means politically visible supervision and sovereignty debates will
        continue to shape the category.
      sourceRefs:
        - 12
        - 13
    - factor: economic
      impact: positive
      point: >-
        Cross-border settlement speed, reduced prefunding, and lower friction create an economic ROI narrative that
        treasury teams can understand.
      sourceRefs:
        - 16
        - 18
        - 24
        - 52
    - factor: social
      impact: positive
      point: >-
        Treasury leaders are already being pushed toward faster visibility, centralized control, and more digital
        operating models, making them more receptive to new tooling.
      sourceRefs:
        - 18
        - 19
    - factor: technological
      impact: positive
      point: >-
        Managed networks and stablecoin infrastructure from Circle, Fireblocks, Visa, and Stripe/Bridge reduce
        implementation cost but raise the bar for orchestration software.
      sourceRefs:
        - 35
        - 37
        - 39
        - 48
        - 51
    - factor: legal
      impact: negative
      point: >-
        MiCA clarified EMT issuance and reporting, but PSD2 overlap for EMT transactions keeps legal design work and
        compliance sign-off non-trivial.
      sourceRefs:
        - 4
        - 5
        - 6
        - 7
  adoptionFrictionMatrix:
    - friction: Dual-authorisation ambiguity for EMT payment activity
      severity: high
      affectedBuyer: Chief Compliance Officer / General Counsel
      mitigation: >-
        Start with a reconciliation-and-evidence layer that shortens approval and audit work before taking on payment
        execution scope.
      sourceRefs:
        - 4
        - 7
    - friction: Three-way data mapping across bank, chain, and general ledger
      severity: high
      affectedBuyer: Treasury operations lead / Controller
      mitigation: >-
        Prioritize file-based ingestion and exception queues before deep API coverage; prove the month-end and
        daily-close workflow first.
      sourceRefs:
        - 18
        - 20
        - 22
    - friction: Auditability of wallet control, valuation, and approvals
      severity: high
      affectedBuyer: CFO / Audit lead
      mitigation: Productize wallet inventory, authorization matrices, evidence retention, and replayable transaction histories.
      sourceRefs:
        - 21
        - 23
    - friction: Bundling pressure from infrastructure providers
      severity: medium
      affectedBuyer: COO / Head of Payments
      mitigation: Stay provider-neutral and integrate into ERP/TMS workflows that the execution vendors do not own.
      sourceRefs:
        - 29
        - 31
        - 39
        - 41
        - 44
market:
  tam:
    value: $152.4M
    rationale: >-
      Bottom-up: 1,016 euro-area regulated institutions (292 EMIs + 724 payment institutions) x assumed $150k ARR for a
      high-touch stablecoin controls platform = $152.4M.
    isEstimate: true
    sourceRefs:
      - 9
      - 10
      - 19
  sam:
    value: $30.0M
    rationale: >-
      Assume roughly 200 launch-ready institutions over the next three years (about one-fifth of the 1,016 total,
      concentrated in digitally active hubs and firms already exploring stablecoins) x $150k ARR = $30.0M.
    isEstimate: true
    sourceRefs:
      - 9
      - 10
      - 28
      - 30
      - 34
      - 46
      - 47
  som:
    value: $2.7M
    rationale: >-
      Reachable Year-3 share assumes 18 customers at ~$150k ARR each after winning a small number of design partners and
      expanding through regulated payment and treasury operators.
    isEstimate: true
    sourceRefs:
      - 19
      - 20
      - 31
      - 41
      - 44
