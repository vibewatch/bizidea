competitors:
  - name: zerohash
    stage: scale-up
    wedge: Dual-licensed stablecoin funding, settlement, and payout infrastructure for banks, brokerages, and fintechs.
    pricing: Custom enterprise pricing / demo-led.
    strength: Strong regulatory posture in Europe plus an execution stack for payouts and settlement.
    weaknessVsUs: >-
      Provider-centric execution layer rather than an independent reconciler across external banks, wallets, and
      internal ledgers.
    sourceRefs:
      - 31
      - 32
  - name: Fireblocks
    stage: incumbent
    wedge: Custody, wallet, policy, and stablecoin infrastructure with treasury controls and network connectivity.
    pricing: Custom enterprise pricing.
    strength: Deep security, workflow controls, and broad ecosystem connectivity.
    weaknessVsUs: >-
      Still strongest on wallet-side orchestration; bank safeguarding and finance-grade evidence across third-party
      stacks remain a customer problem.
    sourceRefs:
      - 29
      - 39
      - 40
  - name: BVNK
    stage: scale-up
    wedge: Managed stablecoin payments, named accounts, wallets, and fiat/stablecoin conversion for businesses.
    pricing: Custom enterprise pricing.
    strength: Strong cross-border payments posture and no-need-to-hold-crypto message for customers.
    weaknessVsUs: >-
      Optimized to move money, not to be the neutral system of record for evidence across multiple providers and
      ledgers.
    sourceRefs:
      - 41
      - 42
  - name: OpenPayd
    stage: scale-up
    wedge: Fiat rails, virtual accounts, and stablecoin services through a unified financial infrastructure platform.
    pricing: Custom enterprise pricing.
    strength: Bridges EMI-style fiat infrastructure with digital-asset services and partnerships like Ripple.
    weaknessVsUs: >-
      Broad infrastructure layer with less visible MiCA-specific reconciliation and evidence packaging for finance
      teams.
    sourceRefs:
      - 44
      - 45
  - name: Banking Circle
    stage: incumbent
    wedge: Bank-backed MiCA-compliant EURI stablecoin and related settlement infrastructure.
    pricing: Enterprise / partner pricing.
    strength: Bank balance-sheet credibility, segregation, and redemption-at-par rights built into the product story.
    weaknessVsUs: >-
      More focused on its own bank/token stack than on being a neutral control layer across multiple issuers, banks, and
      wallets.
    sourceRefs:
      - 46
      - 47
regulatoryTechnicalConstraints:
  - point: >-
      Some EMT transfer and custodial-wallet activities may still require PSD2 authorisation after 2 March 2026 even
      when MiCA authorisation is in place.
    sourceRefs:
      - 7
  - point: EMT and ART issuers must maintain redemption plans and submit supervisory reporting templates under MiCA.
    sourceRefs:
      - 5
      - 6
  - point: >-
      Complaint-handling pathways under Article 108 and regulator-facing procedures add another evidence-management
      requirement.
    sourceRefs:
      - 8
  - point: >-
      Audit-ready operations require wallet inventory, authorization matrices, key-management records, and defensible
      valuation methods in addition to payment data.
    sourceRefs:
      - 21
      - 23
validationSignals:
  - point: >-
      Zerohash has already combined MiCAR and EMI permissions in the Netherlands, showing the exact licence stack the
      startup thesis targets.
    sourceRefs:
      - 30
      - 31
  - point: >-
      Circle is issuing USDC and EURC in Europe under a French EMI licence, proving large issuers see MiCA compliance as
      commercially necessary.
    sourceRefs:
      - 34
  - point: Banking Circle launched EURI as a bank-backed MiCA EMT with segregation, audit, and redemption rights.
    sourceRefs:
      - 46
  - point: >-
      Fireblocks reports that 90% of respondents are taking action on stablecoins and that stablecoins are already
      central to modern payment rails.
    sourceRefs:
      - 29
  - point: >-
      Stripe/Bridge, Visa, and PayPal are all embedding stablecoin infrastructure into mainstream payments products,
      validating buyer attention and incumbent pressure.
    sourceRefs:
      - 48
      - 51
      - 52
openQuestions:
  - >-
    How many euro-area EMIs and payment institutions have a board-approved stablecoin program launching within the next
    12 months rather than a speculative roadmap?
  - >-
    Which specific reserve, safeguarding, and reconciliation artifacts do national competent authorities request in
    first-wave MiCA/EMI examinations?
  - >-
    Will early buyers tolerate a standalone neutral control layer, or will they insist on bundled dashboards from their
    execution vendor?
  - >-
    How frequently can safeguarding-bank data be pulled in production without bespoke bilateral integrations or manual
    exports?
