scenarios:
  downside:
    description: Pilot-to-production conversion and partner channels arrive about one quarter late, so the company exits Y3 with 32 paid deployments at a lower $110K deployment-year value and still-subscale delivery margin.
    y3RevenueK: 2062.5
    y3EbitdaK: -837.16
    cashLowPointK: -247.16
    keyAssumptionChanges:
      - Y2 quarter-end deployments move from 4, 6, 8, 10 to 4, 5, 7, 8 because fewer diagnostics convert on time.
      - Y3 quarter-end deployments move from 15, 23, 33, 45 to 12, 18, 25, 32 as partner-sourced pipeline forms later than planned.
      - Blended annual deployment value falls from $120K to $110K and steady-state gross margin reaches only 68% because more data cleanup and tax-ops work stays manual.
  base:
    description: The company exits Y2 with 10 active paid deployments, then scales to 45 by Y3 exit while holding steady-state deployment value near $120K and turning Q4Y3 EBITDA-positive.
    y3RevenueK: 2955.0
    y3EbitdaK: -144.18
    cashLowPointK: 320.77
    keyAssumptionChanges:
      - Y1 closes 3 paid deployments, Y2 quarter-end deployments reach 4, 6, 8, and 10, and Y3 quarter-end deployments reach 15, 23, 33, and 45.
      - Blended deployment-year value follows A8 at about $75K in Y1, $110K in Y2, and $120K in Y3 as recurring scope outweighs diagnostics.
      - Gross margin follows A10 and hiring follows A12, which is enough to make Q4Y3 EBITDA positive without pulling scale hires forward.
  upside:
    description: Partner referrals and entity expansions begin about one quarter earlier, so the company exits Y3 with 53 paid deployments at a higher $125K deployment-year value and stronger delivery leverage.
    y3RevenueK: 3718.76
    y3EbitdaK: 432.38
    cashLowPointK: 759.07
    keyAssumptionChanges:
      - Y1 exits with 4 paid deployments instead of 3 and Y2 quarter-end deployments rise to 6, 8, 11, and 13.
      - Y3 quarter-end deployments rise to 19, 28, 39, and 53 as partners and early customer expansions compound sooner.
      - Blended annual deployment value rises from $120K to $125K and steady-state gross margin reaches 72% because onboarding and exception playbooks standardize faster.
