    y3RevenueImpactK: 0.0
    cashImpactK: -101.25
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered ICP accounts] --> PaidDiagnostics[Paid diagnostics]
      PaidDiagnostics --> ProductionDeployments[Production deployments]
      ProductionDeployments --> Expansion[Entity and jurisdiction expansion]
      Expansion --> Revenue[Recurring and onboarding revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by moving from 3 active paid deployments at Y1 exit to 10 at Y2 exit and 45 at Y3 exit while holding steady-state deployment value near $120K.
  - checkName: Must go right
    finding: The model needs diagnostic-to-production conversion and partner-sourced expansion to hold, because 35 of the 45 end-state deployments are added after Q4Y2.
  - checkName: Model breaks if
    finding: If deployment timing slips about one quarter and blended value stays near the low end of the pricing band, cash turns negative before the business reaches the Q3Y3 breakeven turn.
  - checkName: Next-round proof
    finding: The next financing story is strongest once the company shows 8-10 production deployments, sub-4-week onboarding, and at least two partner-sourced conversions without margin erosion.
sanityChecks:
  ruleOf40: Y3 growth 338.6% + EBITDA margin -4.9% = 333.7% (directionally strong but flattered by the still-small Y2 base).
  burnMultiple: About 1.3x in Y2 on net new ARR; by Y3 burn multiple is near 0.0x because Q4 turns EBITDA-positive and net burn falls to about $144K on much higher ARR additions.
  revenuePerFte: $227K Y3 revenue per Q4Y3 FTE (benchmark roughly $200K-$400K SaaS).
  flags:
    - The base case still requires 35 net new paid deployments from Q4Y2 to Q4Y3, so partner-sourced pipeline and in-account expansion must become real rather than staying purely founder-led.
    - customersEop counts paid entity-group deployments consistent with the BP unit of value, so the 45-unit Y3 endpoint will represent fewer than 45 unique enterprise logos.
    - Gross margin only clears the 70% target in Y3, so if rules upkeep or data cleanup remains services-heavy the funding need moves closer to the top of the BP range.
    - Cash bottoms near $321K in the base case before Q3Y3, so one extra quarter of sales-cycle slippage or premature hiring would likely force an earlier raise.
