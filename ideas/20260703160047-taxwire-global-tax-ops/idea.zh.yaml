topRisks:
  - name: 规则覆盖蔓延
    description: 每新增一个辖区、每出现一种新产品模式，冒出的边缘案例都可能比一家年轻公司能编纂的速度更快。
    mitigation: 先从混合计费软件的美国州申报加英国、欧盟增值税做起，给规则层做好版本管理，只有在准确度基准可重复达标后才扩大覆盖。
  - name: 上游数据混乱
    description: 如果 CPQ、账单和 ERP 的映射不一致，账本可能要花太多时间清理输入数据，才能开始产生价值。
    mitigation: 先以只读的异常与证据层上线，配窄范围连接器，等源系统映射标准化之后再拓宽自动化范围。
  - name: 现有厂商的捆绑压力
    description: 一旦这个品类被证明有吸引力，税务引擎、申报外包商或四大会计师事务所都可能加上结账工作流。
    mitigation: 围绕混合计费的逐行证据、在现有系统上更快落地的实施速度，以及一张现有厂商不会自然积累的跨周期审计图谱来做差异化。
