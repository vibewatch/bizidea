problem: >-
  混合计费软件公司的财务团队，卖的是订阅、实施服务、用量超额、信用抵扣和分销交易，客户遍布美国几十个州和多套增值税体系，可结账时的间接税，靠的还是手工拼接
  CPQ 数据、账单导出、ERP 行项目和外部税务顾问。结账或开票环节的税务引擎能算出一个金额，但一旦信用抵扣、主体变更和辖区例外掺进来，它通常保不住每一条混合发票行的可申报级解释。当这些团队已经在按企业级数量的辖区报税时，一个小小的归类错误就会变成罚款、补税和结账延迟。
targetUser:
  primary: 多主体、订阅加服务加用量混合计费的 B2B 软件公司里的财务副总裁（Controller）或间接税总监
  secondary: 负责 CPQ、开票和 ERP 映射的营收运营或账单系统负责人
  buyer: 财务副总裁（Controller）、CFO 或税务负责人
startupThesis:
  nonObviousInsight: >-
    真正代价高昂的失败，早已不是在开票时算错税率，而是在结账时证明每一条混合 SaaS 发票行，在经历修改、信用抵扣和主体变更之后，仍然按辖区分类正确。一旦
    AI 能逐行学习发票并留下可追溯的判断依据，间接税就不再是一件靠人堆出来的申报苦差，而是一个可控的软件账本问题。
  beachhead: >-
    使用 Salesforce CPQ 加 NetSuite 或 Stripe 计费的 C 轮到上市 B2B 软件公司，拥有 5-20 个法律主体，向 25 个以上美国州加英国和欧盟增值税注册地开具订阅、实施服务和用量超额发票
  wedge: >-
    一本只读的税务结账账本：接入合同、发票、信用抵扣和退款行项目，按辖区给混合收入分类，产出可申报的异常队列和审计包
  whyNowCatalyst: >-
    中型市场公司已经在按企业级数量的辖区报税，素材显示买家现在要的是逐行、可审计追溯的自动化，而不是月底靠表格清理。
  ventureScalePath: >-
    先从混合计费软件公司切入，再把账本扩展到市场平台、云基础设施卖家和其他出海的中型市场企业，直到它成为间接税结账、审计证据和辖区拓展的系统记录（system
    of record）。
solution: >-
  产品卡在 CPQ、账单、ERP 和税务申报工作流之间，充当一本只读的间接税结账账本。它把每一条合同和发票行映射到对应辖区的处理方式，保存判断依据和支撑交易轨迹，申报前只标出需要人工复核的异常。财务和税务团队拿到的申报包，能把每一个申报数字都追溯回底层账单事件、信用抵扣和主体映射，不用再靠表格重建证据。同一套系统还会在月底变成审计抢救之前，提前追踪新产品、新主体或新国家上线会带来哪些注册工作或分类变化。久而久之，这本账本会成为财务副总裁、RevOps、外部税务机构和审计师共用的唯一真实来源。
goToMarketSeed:
  firstCustomer: >-
    总部在美国、ARR 在 $100M-$500M 之间的 B2B 软件公司，用 Salesforce CPQ 加 NetSuite 或 Stripe Billing 计费，有 5-10
    个法律主体，每月要在 25-40 个美国州加英国增值税申报
  buyingTrigger: >-
    年度审计发现问题、新国家上线，或转向用量与专业服务混合计费，把现有税务结账流程逼到极限
  currentAlternative: 用 Avalara 或 Vertex 算税，再靠表格对账、ERP 导出和外包间接税顾问来完成申报和审计支持
  switchingReason: >-
    这本账本靠在 CPQ、账单和 ERP 系统之间保留行级证据，补上了算税和申报之间的缺口，既压缩手工结账时间，也降低了单点工具和外包服务留下的审计风险。
  pricingHypothesis: 按法律主体数、账单渠道数和活跃辖区数定价的年费订阅，另加连接器搭建和历史数据回填的启动费
whyNow:
  - point: 中型市场卖家现在面对的是企业级的间接税复杂度，因为许多公司已经要在 40 多个州和十几个国家报税。
    signalRefs: ["中型市场的复杂度已经堪比企业级"]
    sourceRefs: [1]
  - point: 买家终于能信任税务结账里的自动化，因为跑赢的产品现在承诺的是逐行分类加可追溯审计证据，而不是一个黑箱输出。
    signalRefs: ["逐行可审计成为标配预期"]
