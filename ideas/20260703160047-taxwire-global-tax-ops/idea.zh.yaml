jobsToBeDone:
  - job: >-
      月末间接税结账一启动，就帮我们的财务和税务团队把 CPQ、账单和 ERP 系统里的混合发票行对上账，这样申报才能准确，而不用再靠手工重建证据。
    currentAlternative: "表格对账、税务引擎导出，再加外部顾问的复核周期"
    successMetric: 结账周期时长，以及每期未解决的申报异常数量
  - job: >-
      推出新产品组合、新主体或进入新国家时，帮我们的账单和税务负责人看清哪些行项目会带来新的注册或分类工作，这样扩张营收才不会引来补税意外。
    currentAlternative: "一次性的法务备忘录、手工关联关系清单，以及第一批发票开出去之后才做的补救清理"
    successMetric: 拿到有据可查的税务签批、批准一次新上线所需的时间，以及上线后的税务更正次数
