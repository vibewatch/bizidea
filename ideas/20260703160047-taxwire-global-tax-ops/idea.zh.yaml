  - point: 快速增长的软件公司一旦新辖区扩张速度超过财务团队的承受力，就会感到税务之痛；这笔融资信号说明覆盖范围扩张已经成为一个值得解决的瓶颈。
    signalRefs: ["覆盖范围扩张成为税务运营瓶颈"]
    sourceRefs: [2]
  - point: 美国销售税汇缴数千亿美元、全球增值税征收数万亿美元，哪怕只是适度降低出错率，也撑得起真实的软件预算和风投级的回报规模。
    signalRefs: ["体量数字撑得起专属基础设施"]
    sourceRefs: [2]
differentiator: >-
  现有税务引擎盯的是报价或开票那一刻算出一个金额，会计师事务所和外包商则是事后靠追讨文件和表格对账来完成申报。这家创业公司要拿下的，是账单系统和已申报报表之间缺失的那层控制层——为每一条混合发票行保留判断依据、证据和异常处理流程。它的护城河会随着一份标准化语料库不断加厚：混合计费税务决策、跨辖区异常处理结果，以及挂在源交易上的可申报级审计记录。
