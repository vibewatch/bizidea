scenarios:
  downside:
    description: 试点转生产的转化和伙伴渠道大约晚到一个季度，公司在第 3 年末只做到 32 个付费部署，单部署年值降到 $110K，交付利润率仍未达到规模效应。
    y3RevenueK: 2062.5
    y3EbitdaK: -837.16
    cashLowPointK: -247.16
    keyAssumptionChanges:
    - 第 2 年各季末部署数从 4、6、8、10 变成 4、5、7、8，因为按时转化的诊断变少了。
    - 第 3 年各季末部署数从 15、23、33、45 变成 12、18、25、32，因为伙伴来源的管道成型比计划晚。
    - 混合年化部署值从 $120K 降到 $110K，稳态毛利率只做到 68%，因为更多数据清理和税务运营工作仍靠人工完成。
  base:
    description: 公司在第 2 年末做到 10 个活跃付费部署，到第 3 年末扩到 45 个，稳态部署值维持在约 $120K，并在第 3 年第四季度实现 EBITDA 转正。
    y3RevenueK: 2955.0
    y3EbitdaK: -144.18
    cashLowPointK: 320.77
    keyAssumptionChanges:
    - 第 1 年拿下 3 个付费部署，第 2 年各季末部署数做到 4、6、8、10，第 3 年各季末部署数做到 15、23、33、45。
    - 混合部署年值按 A8 走：第 1 年约 $75K，第 2 年 $110K，第 3 年 $120K，因为经常性范围逐渐压过诊断收入。
    - 毛利率按 A10 走，招聘按 A12 走，这足以让第 3 年第四季度 EBITDA 转正，且不需要把规模化招聘提前。
  upside:
    description: 伙伴转介绍和主体扩张大约提前一个季度启动，公司在第 3 年末做到 53 个付费部署，单部署年值升到 $125K，交付杠杆更强。
    y3RevenueK: 3718.76
    y3EbitdaK: 432.38
    cashLowPointK: 759.07
    keyAssumptionChanges:
    - 第 1 年末做到 4 个付费部署而不是 3 个，第 2 年各季末部署数升到 6、8、11、13。
    - 第 3 年各季末部署数升到 19、28、39、53，因为伙伴和早期客户扩容更快叠加起来。
    - 混合年化部署值从 $120K 升到 $125K，稳态毛利率做到 72%，因为上线和异常处理手册标准化得更快。
