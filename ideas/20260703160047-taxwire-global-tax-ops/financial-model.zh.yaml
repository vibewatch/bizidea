modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered ICP accounts] --> PaidDiagnostics[Paid diagnostics]
      PaidDiagnostics --> ProductionDeployments[Production deployments]
      ProductionDeployments --> Expansion[Entity and jurisdiction expansion]
      Expansion --> Revenue[Recurring and onboarding revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入靠活跃付费部署数从第 1 年末的 3 个，涨到第 2 年末的 10 个、第 3 年末的 45 个来驱动，同时稳态部署值维持在约 $120K。
- checkName: 必须跑对的地方
  finding: 模型需要诊断转生产的转化率和伙伴来源扩张都站得住，因为 45 个终态部署里有 35 个是在第 2 年第四季度之后新增的。
- checkName: 模型会在什么情况下崩
  finding: 如果部署时间点延后大约一个季度，且混合部署值停留在定价区间低端，现金会在业务到达第 3 年第三季度盈亏平衡点之前转负。
- checkName: 下一轮融资的证明材料
  finding: 等公司做出 8-10 个生产部署、上线时间低于 4 周，且至少 2 个伙伴来源的转化又没有侵蚀毛利率之后，下一轮融资的故事才最有说服力。
sanityChecks:
  ruleOf40: 第 3 年增速 338.6% + EBITDA 利润率 -4.9% = 333.7%（方向上很强，但被仍然偏小的第 2 年基数拉高了）。
  burnMultiple: 第 2 年按净新增 ARR 计算约为 1.3x；到第 3 年烧钱倍数接近 0.0x，因为第四季度转为 EBITDA 转正，净烧钱降到约 $144K，而 ARR 新增量高得多。
  revenuePerFte: 第 3 年第四季度每 FTE 对应 $227K 营收（对标 SaaS 基准约 $200K-$400K）。
  flags:
  - 基准情形仍然需要从第 2 年第四季度到第 3 年第四季度净增 35 个付费部署，所以伙伴来源管道和账户内扩容必须真正落地，不能一直只靠创始人。
  - customersEop 统计的是符合 BP 价值单位定义的付费主体组部署，所以第 3 年末的 45 个单位，对应的独立企业客户数会少于 45 个。
  - 毛利率只有到第 3 年才越过 70% 的目标，如果规则维护或数据清理仍然依赖重服务，融资需求就会更靠近 BP 区间的上限。
  - 基准情形下，现金在第 3 年第三季度之前会跌到约 $321K 的低点，如果销售周期再多拖一个季度，或提前招聘，很可能会被迫提前融资。
