problem: >-
  Finance teams at hybrid-billing software companies often sell subscriptions, implementation work, usage overages,
  credits, and reseller deals into dozens of U.S. states and multiple VAT regimes, but they still close indirect tax by
  stitching together CPQ data, billing exports, ERP lines, and outside tax advisors. A checkout or invoicing tax engine
  may calculate an amount, yet it usually does not preserve a filing-grade explanation for every mixed invoice line once
  credits, entity changes, and jurisdiction overrides enter the picture. When those teams are already filing in
  enterprise-level numbers of jurisdictions, small classification mistakes turn into penalties, back taxes, and delayed
  closes.
targetUser:
  primary: VP Controller or director of indirect tax at a B2B software company with mixed subscription, services, and usage billing across multiple entities
  secondary: Revenue operations or billing-systems lead responsible for CPQ, invoicing, and ERP mappings
  buyer: VP Controller, CFO, or head of tax
startupThesis:
  nonObviousInsight: >-
    The expensive failure is no longer computing a tax rate at invoice creation; it is proving at close that every
    hybrid SaaS line item was classified correctly across jurisdictions after amendments, credits, and entity changes.
    Once AI can learn from invoices line by line and keep a traceable rationale, indirect tax stops being mostly a
    services-heavy filing exercise and becomes a controllable software ledger problem.
  beachhead: >-
    Series C to public B2B software companies using Salesforce CPQ plus NetSuite or Stripe-based billing, with 5-20
    legal entities that invoice subscriptions, implementation work, and usage overages into 25 or more U.S. states plus
    UK and EU VAT registrations
  wedge: >-
    A read-only tax-close ledger that ingests contract, invoice, credit, and refund lines, classifies mixed revenue by
    jurisdiction, and produces filing-ready exception queues plus audit packets
  whyNowCatalyst: >-
    Mid-market companies are already filing in enterprise-scale numbers of jurisdictions, and the source material shows
    buyers now expect line-item, audit-traceable automation instead of spreadsheet cleanup at month-end.
  ventureScalePath: >-
    Start with hybrid-billing software companies, then expand the ledger to marketplaces, cloud-infrastructure sellers,
    and other mid-market global businesses until it becomes the system of record for indirect-tax close, audit evidence,
    and jurisdiction rollout.
solution: >-
  The product sits between CPQ, billing, ERP, and tax-filing workflows as a read-only ledger for indirect-tax close. It
  maps each contract and invoice line to a jurisdiction-specific treatment, stores the rationale and supporting
  transaction trail, and flags only the exceptions that need human review before filing. Finance and tax teams get a
  filing pack that ties every return figure back to the underlying billing events, credits, and entity mappings instead
  of rebuilding evidence in spreadsheets. The same system tracks where a new product, entity, or country launch creates
  registration work or classification changes before month-end turns into an audit scramble. Over time, the ledger
  becomes the shared source of truth between controllers, RevOps, external tax firms, and auditors.
goToMarketSeed:
  firstCustomer: >-
    A U.S.-headquartered B2B software company with $100M-$500M ARR, Salesforce CPQ, NetSuite billing or Stripe Billing,
    5-10 legal entities, and monthly filings across 25-40 U.S. states plus UK VAT
  buyingTrigger: >-
    An annual audit finding, a new country launch, or a shift into mixed usage and professional-services billing that
    breaks the existing tax-close process
  currentAlternative: Avalara or Vertex for tax calculation, plus spreadsheet reconciliations, ERP exports, and outsourced indirect-tax advisers for filings and audit support
  switchingReason: >-
    The ledger closes the gap between tax calculation and filing by preserving line-level evidence across CPQ, billing,
    and ERP systems, which cuts manual close time and reduces audit exposure that point tools and services leave behind.
  pricingHypothesis: Annual subscription priced by legal entities, billing channels, and active jurisdictions, plus onboarding for connector setup and historical backfill
