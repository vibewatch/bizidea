differentiator: >-
  Existing tax engines focus on calculating an amount at quote or invoice time, while accounting firms and outsourcers
  do the filing work after the fact with document chases and spreadsheet reconciliations. This startup owns the missing
  control layer between billing systems and filed returns by preserving the rationale, evidence, and exception workflow
  for each mixed invoice line. Its moat compounds from a normalized corpus of hybrid-billing tax decisions,
  cross-jurisdiction exception outcomes, and filing-grade audit trails attached to the source transactions.
