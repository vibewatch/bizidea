jobsToBeDone:
  - job: >-
      When month-end indirect-tax close begins, help our finance and tax team reconcile mixed invoice lines across CPQ,
      billing, and ERP systems, so we can file accurately without rebuilding evidence by hand.
    currentAlternative: "Spreadsheet tie-outs, tax-engine exports, and review cycles with outside advisers"
    successMetric: Close cycle time and number of unresolved filing exceptions per period
  - job: >-
      When we launch a new product bundle, entity, or country, help our billing and tax leaders see which lines create
      new registration or classification work, so we can expand revenue without triggering back-tax surprises.
    currentAlternative: "One-off legal memos, manual nexus checklists, and reactive cleanup after the first invoices ship"
    successMetric: Time to approve a new launch with documented tax sign-off and number of post-launch tax corrections
