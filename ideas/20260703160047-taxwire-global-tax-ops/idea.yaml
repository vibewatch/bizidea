topRisks:
  - name: Rules coverage creep
    description: Each new jurisdiction and product pattern can add edge cases faster than a young company can codify them.
    mitigation: Start with U.S. state filings plus UK and EU VAT for hybrid-billing software, keep the rules layer versioned, and expand coverage only after repeatable accuracy benchmarks.
  - name: Messy upstream data
    description: If CPQ, billing, and ERP mappings are inconsistent, the ledger may spend too much time cleaning inputs before it delivers value.
    mitigation: Launch as a read-only exception and evidence layer with narrow connectors, then widen automation only after source-system mappings are normalized.
  - name: Incumbent bundling pressure
    description: Tax engines, filing outsourcers, or Big Four firms may add close workflows once the category proves attractive.
    mitigation: Differentiate around hybrid-billing line-item evidence, faster implementation on existing systems, and a cross-period audit graph that incumbents do not naturally accumulate.
