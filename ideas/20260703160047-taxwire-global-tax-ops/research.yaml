competitors:
- name: Anrok
  stage: scale-up
  wedge: SaaS-native automation for sales tax, VAT/GST, reconciliation, and multi-entity compliance.
  pricing: Starter plan listed at $100 per market per month; custom enterprise tiers.
  strength: Strong SaaS focus, transparent pricing, audit-ready reporting, and NetSuite connectivity.
  weaknessVsUs: Public positioning still centers on full compliance automation rather than a neutral tax-close evidence ledger across multiple upstream systems.
  sourceRefs:
  - 24
  - 25
  - 26
  - 27
- name: Avalara
  stage: incumbent
  wedge: Broad compliance suite spanning calculation, registration, e-invoicing, and software-industry tax coverage.
  pricing: Modular and contact-led; public page lists some services such as registrations from $403 per location.
  strength: Deep integration ecosystem and mature coverage for software and digital-product sellers.
  weaknessVsUs: General-purpose breadth can make it heavier and less focused on mixed-line close evidence for controllers.
  sourceRefs:
  - 28
  - 29
  - 30
- name: Vertex
  stage: incumbent
  wedge: Enterprise tax infrastructure with global e-invoicing and broader compliance orchestration.
  pricing: Custom enterprise quote.
  strength: Strong enterprise credibility, e-invoicing depth, and large-system integration posture.
  weaknessVsUs: More naturally sold as enterprise tax infrastructure than as a lightweight read-only controller overlay.
  sourceRefs:
  - 22
  - 31
- name: Stripe Tax
  stage: incumbent
  wedge: Native tax calculation and compliance inside the Stripe billing and payments stack.
  pricing: Tax Complete starts at $90 per month with calculation, registrations, and filings tiers.
  strength: Default distribution inside Stripe plus broad country and product-type coverage.
  weaknessVsUs: Best for Stripe-centric workflows; it does not naturally become the cross-system source of truth across CPQ, ERP, advisers, and multiple billing channels.
  sourceRefs:
  - 32
  - 33
- name: Zamp
  stage: scale-up
  wedge: Fully managed sales-tax operating system with threshold tracking, product taxability rules, filing, and partner-led rollout.
  pricing: Free nexus assessment, then contact-sales U.S. and U.S.+Canada plans.
  strength: Managed outcome orientation, accounting-firm channel credibility, and modern NetSuite integration story.
  weaknessVsUs: Leans toward fully managed filing outcomes rather than a controller-first evidence ledger for hybrid-billing close.
  sourceRefs:
  - 34
  - 35
  - 39
