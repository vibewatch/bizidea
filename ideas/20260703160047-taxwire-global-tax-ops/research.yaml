  validationPlan:
  - priority: high
    question: How many target accounts already own Avalara, Vertex, or Stripe Tax but still rebuild tax-close evidence manually?
    evidenceToGather: Interview 8-10 controllers or heads of tax at software companies and map where existing tools stop and spreadsheet work begins.
  - priority: high
    question: Which mixed-line invoice patterns create the highest exception load in the beachhead?
    evidenceToGather: Collect anonymized reconciliation extracts from at least five companies covering subscriptions, services, usage overages, credits, and entity changes.
  - priority: medium
    question: Will buyers accept a read-only overlay, or will they eventually require the ledger to own registrations and filings too?
    evidenceToGather: Run design-partner tests with one coexistence pitch and one end-to-end pitch; compare conversion, security objections, and implementation scope.
  - priority: low
    question: Do audit and advisory firms want a shared evidence workspace instead of email and spreadsheet back-and-forth?
    evidenceToGather: Interview three indirect-tax advisory teams and review one live audit-prep workflow for collaboration pain points.
