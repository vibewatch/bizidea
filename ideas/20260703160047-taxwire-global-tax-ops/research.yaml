openQuestions:
- How many target accounts already own Avalara, Vertex, or Stripe Tax but still rebuild tax-close evidence manually?
- Which mixed-line invoice patterns—usage true-ups, credits, bundled services, or intercompany re-bills—drive the highest exception load in the beachhead?
- Will buyers accept a read-only overlay, or will they eventually require the ledger to own registrations and filings too?
- Can a startup sustain sufficiently current state and country taxability content without becoming services-heavy?
- Which audit or advisory firms are willing to co-work inside a shared evidence ledger rather than off-platform spreadsheets?
