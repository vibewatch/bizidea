differentiator: >-
  MES vendors record what happened on the line, and QMS tools store documents
  after the fact. Package Passport OS wins by mapping those records into
  customer-specific qualification flows, export evidence, and requalification
  decisions for each chip program. Its moat compounds as it learns which
  evidence packages, deviation patterns, and approval sequences actually move
  new programs through overseas customers faster.
