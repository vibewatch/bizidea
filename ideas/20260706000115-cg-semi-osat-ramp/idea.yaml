topRisks:
  - name: Data integrity gap
    description: >-
      If line, tester, or QA records are incomplete, customers may not trust the
      package passport enough to base approvals on it.
    mitigation: >-
      Start read-only, score evidence completeness, and integrate the highest
      trust data sources before automating any approval workflow.
  - name: Beachhead concentration
    description: >-
      India's first wave of OSAT ramps may produce only a small number of
      near-term buyers, which could slow revenue before the category broadens.
    mitigation: >-
      Use Indian design partners as proof points, then expand to other new OSAT
      ramps and multi-site transfer workflows where the same qualification pain
      appears.
  - name: Incumbent system absorption
    description: >-
      MES or quality-suite vendors could add basic qualification document
      management and make the category look like a feature.
    mitigation: >-
      Own the cross-system customer-approval workflow, the approval-history
      graph, and export-specific requalification logic that plant systems do not
      capture well today.
