problem: >-
  New OSAT plants can start shipping chips before they have mature internal
  playbooks for qualification, deviation handling, and customer audit evidence.
  As one Sanand-class facility tries to serve automotive, consumer electronics,
  industrial equipment, telecom, EV, networking, and IoT programs, each new
  product-customer combination creates a new burden to prove lot genealogy,
  test outcomes, process stability, and export readiness. Today that proof
  lives across machine logs, QA spreadsheets, and PDF packs, so approval cycles
  drag and one bad batch can freeze margin-critical line capacity.
targetUser:
  primary: >-
    Head of quality or NPI at a 300-1,500 employee Indian OSAT plant ramping
    first export programs across automotive, industrial, telecom, or IoT chip
    lines
  secondary: >-
    Process and test engineering leads responsible for lot genealogy,
    requalification, and customer audit readiness on packaging and test lines
  buyer: Plant GM, VP Operations, or Head of Quality
startupThesis:
  nonObviousInsight: >-
    India's semiconductor opening is not mainly a fab-construction story; it is
    a packaging-and-test qualification story. Once OSAT output goes live, the
    scarce asset is not just machines or subsidies but the ability to turn line
    data, operator actions, and deviation history into customer-trusted
    evidence quickly enough to keep exports and new programs moving.
  beachhead: >-
    Indian OSAT plants launching first export programs to Japan or Malaysia
    while qualifying new chip lines across automotive, telecom, industrial, and
    IoT end markets with a lean quality and process team
  wedge: >-
    A package-passport workflow that ingests lot history, test results,
    deviation records, and operator signoffs, then auto-builds customer-specific
    qualification packs and requalification trails for each new chip program
  whyNowCatalyst: >-
    CG Semi has already started commercial output, shipped initial export
    batches, and begun scaling toward multi-billion capacity inside an OSAT-first
    national push, which makes manual qualification workflows an immediate
    bottleneck rather than a future one.
  ventureScalePath: >-
    Start with one plant's first-export qualification workflow, then expand into
    deviation control, multi-site transfer, supplier genealogy, and advanced
    packaging change management across new OSAT capacity in India and other
    emerging semiconductor hubs.
solution: >-
  Package Passport OS sits above existing tester, quality, and line records to
  create a live evidence graph for each chip program. It ingests lot history,
  test results, deviation records, operator signoffs, and customer-specific
  qualification requirements, then auto-builds the approval pack a Japanese or
  Malaysian buyer actually wants to review. When a yield excursion or returned
  lot appears, the product traces which process window, equipment, or shift
  changed and opens a controlled requalification workflow instead of sending
  teams back into email archaeology. The first deployment is one export program
  at one plant, measured on time-to-approval and number of rejected
  documentation loops. Over time, the same graph becomes the system of record
  for cross-line transfer, second-facility ramp, and multi-site customer
  audits.
goToMarketSeed:
  firstCustomer: >-
    Head of Quality at a Gujarat-based OSAT plant with active exports to Japan
    or Malaysia, 2-5 new chip-program qualifications queued, and no integrated
    system linking tester, lot, and operator-certification data into customer
    approval packs
  buyingTrigger: >-
    A first export customer requests a new qualification pack, or a second line
    and device program launches before the existing quality team can keep pace
    with manual evidence collection
  currentAlternative: >-
    MES reports, spreadsheet trackers, shared drives full of PDF qualification
    packs, equipment-vendor logs, and manual email coordination across quality,
    process, and test teams
  switchingReason: >-
    The product turns weeks of fragmented evidence gathering into a live package
    passport with lot genealogy and deviation history, helping the customer win
    approvals faster and defend rejected lots with facts instead of rework
  pricingHypothesis: >-
    Annual subscription per active plant plus a usage tier by qualified chip
    program, with paid onboarding to integrate tester, line, and QA data
