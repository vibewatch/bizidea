slug: osat-package-passport
date: "2026-07-06"
executiveSummary: >-
  Package Passport 应该以只读的认证与复验认证层身份，落地到已经开始出口出货、或
  即将进行出口认证的印度 OSAT 和 ATMP 工厂，而不是做成另一套 MES。首个客户是古
  吉拉特邦或阿萨姆邦的一位工厂质量负责人，他手上排着 2-5 个芯片项目待审批，出口
  客户在日本或马来西亚，证据却散落在测试机日志、MES 记录、QA 表格和 PDF 文件包
  里。产品的任务很窄：把批次谱系、测试结果、偏差历史和操作员签核，拼成一份客户
  专属认证资料包，外加一条复验认证轨迹，快到足以让稀缺的产线产能持续出货。研究
  支持这个痛点和时机——印度正在同时建设多个新建组装测试基地，汽车和工业项目仍
  要求正式的 PPAP 式文档，而先进封装需求上升，也让封装本身变得更具战略意义。近
  期市场是真实存在的，但比较集中：研究估算 TAM 约为 $120.0M，SAM 为 $6.8M，三年
  可触达 SOM 为 $1.8M（覆盖四家工厂），所以这是一个可信的工作流切口，但除非扩展
  到第二工厂转移、供应商谱系和相邻的亚洲封装中心，否则算不上独立的创业级机会。
  最好的早期验证不只是营收本身，而是一家共创客户工厂能否在不要求客户放弃 PDF 审
  批习惯的前提下，缩短认证资料包周转时间、减少被驳回的文档循环。研究中最大的缺
  口是：每家工厂实际的认证量、目前是哪套系统在拥有测试机和偏差记录，以及出口买
  家是否会信任 PDF 资料包背后的关联数字证据。这种不确定性让种子前融资计划显得合
  适：用 18 个月拿下 2-3 个共创客户，验证数据完整性和买家接受度，再判断公司到底
  是在成为一个品类级的记录系统，还是一个有用但受限的工作流功能。
problem:
  - 新建 OSAT 工厂常常在还没有形成可复用的认证记忆之前，就已经开始出货商业化产品，让质量团队不得不为每一个出口或新设备项目手工拼接批次谱系、测试数据、偏差历史和审批记录。
  - 一旦出现良率异常、封装变更或客户退货，复验认证流程就会退回邮件、表格和设备厂商日志，拖慢审批速度，占用利润攸关的产线时间。
solution:
  - 以只读模式摄入测试机、MES、QA 和操作员记录，为一个芯片项目建立实时封装护照，再自动生成客户专属认证资料包，以及工厂本就要发送的细化可追溯证据。
  - 把良率异常和工艺变更，转化为一套受控的复验认证工作流，带版本化证据、处置历史和兼容传统格式的 PDF 输出，让产品先适配当前买家习惯，再要求客户接受数字化优先的审阅方式。
whyWeWin:
  - 我们卖的是审批记录，不是执行系统。MES、良率和低代码工具擅长采集数据，但列出的竞品中没有一家真正围绕出口认证资料包、评审路由和异常关闭闭环本身来做产品。
  - 一套资料包模板库、审批人行为数据，加上批次谱系与结果关联的历史记录，会沉淀成一套工厂和现有厂商今天都没有的专有审批数据集。
  - 印度这波新建 OSAT 浪潮，让我们能在当地工艺习惯固化之前就落地；只要第一家工厂跑通，同一套工作流可以自然扩展到第二工厂转移，以及与日本/马来西亚相连的相邻封装中心。
strategicChoices:
  beachhead: >-
    古吉拉特邦或阿萨姆邦正在启动首批对日本或马来西亚出口项目的印度 OSAT 和 ATMP
    工厂，尤其是至少有一条汽车、工业或电信芯片产线正在用一支精简的质量和 NPI 团
    队进行认证的工厂。
  wedgeRationale: >-
    这个细分市场现在就切身感受到审批痛点，有清晰可见的经济买家，能在一个季度内
    就在一个排队项目上展示价值。如果一开始就做通用制造可追溯性、全面替换 MES，
    或覆盖所有半导体工厂，会在产品证明自己能缩短审批之前就拉长销售周期。
  sequencingRationale: >-
    产品先以只读证据层的形式落地，输出客户已接受的 PDF 资料包，因为研究显示数据
    完整性和数字证据信任是最大的采用风险。创始人主导销售，加上一套解决方案密集
    的共创客户打法，会先于扩大工程团队或渠道销售；跨厂区转移、供应商谱系和先进
    封装变更管控这类更深的模块，要等一家工厂证明审批更快、复验认证流程更干净之
    后才会推出。
  notYet:
    - 全面替代半导体 MES 或 QMS
    - 前端晶圆制造工作流，或封装测试之外的通用工厂可追溯性
    - 在首个出口项目切口得到验证之前，就做自主审批、多厂区转移和供应商谱系自动化
market:
  tam: "$120.0M（研究估算：全球约 180 家出口导向型 OSAT 或自营组装测试工厂，按每家约 $650k 混合 ARR 计算）"
  sam: "$6.8M（研究估算：约 15 家印度或相邻日本/马来西亚关联的爬产工厂，按每家约 $450k 计算首个出口认证工作流）"
  som: "$1.8M（研究估算：到第三年通过印度优先直销加一家相邻封装中心扩张，拿下 4 家工厂，每家混合 ARR 约 $450k）"
  segments:
    - 正在推进汽车、工业、电信或物联网设备首批出口项目的印度 OSAT 和 ATMP 工厂
    - 正在增设第二工厂，或在多个工厂间转移已认证项目的日本、马来西亚关联封装集团
  buyingProcess: >-
    业务层面的推动者通常是质量、NPI 或测试工程负责人，而经济买家是工厂总经理、
    运营副总裁或质量负责人。当新的出口认证资料包、第二条产线上线，或偏差驱动的
    复验认证威胁到出货或产能利用率时，预算就会被触发，运营 IT 部门也会被拉进集
    成评审。
product:
  mvp: >-
    面向一家工厂一个出口项目的只读封装护照工作流，摄入批次、测试机、偏差和操作
    员签核数据，为证据完整度打分，输出一份客户可用的认证资料包和复验认证轨迹。
    它必须在不替换工厂 MES 或 QMS 的前提下完成集成，并保留 PDF 交付方式以适配当
    前的审批流程。
  sixMonth: >-
    为一家工厂的 2-3 个在用芯片项目，加入证据完整度评分、异常路由和可下钻的谱系
    视图，并针对客户要求的网络边界，验证一套可复用的部署模式。
  twelveMonth: >-
    按终端市场和封装类型扩展成工厂级模板库，对各项目的审批周期瓶颈做基准评估，
    并在首个付费账户内支持第二条产线或第二工厂的交接。
  twentyFourMonth: >-
    推出跨厂区项目转移、供应商谱系和先进封装变更管控等相邻模块，并把产品卖进印
    度之外一个相邻的日本/马来西亚关联封装中心。
  keyBets:
    - 只读接入测试机、MES 和 QA 系统的集成速度足够快，能让试点在几周内启动，而不是变成一个定制 IT 项目。
    - 只要产品仍然输出客户专属的 PDF，出口买家就会接受由护照生成的资料包和关联证据。
    - 第一波工厂有足够多的经常性认证和复验认证工作量，足以支撑工厂级订阅定价。
    - 早期客户积累的审批历史数据，能够推广到其他封装类型和相邻的亚洲封装中心。
gtm:
  wedge: >-
    先落地为一套能比工厂手工操作更快拼出某个出口项目认证资料包和复验认证证据的
    系统，再从这个项目扩展到同一家工厂里每一条在用的认证队列。
  channels:
    - 创始人直接对接印度 OSAT 和 ATMP 爬产工厂的工厂总经理、质量负责人和运营副总裁
    - 通过 MES 集成商、半导体质量顾问和制造数据合作伙伴牵线的共创客户试点
    - 围绕 Renesas、Mitsui 或 AOI 相关网络的日本关联生态关系，以及能打开跨境出口项目的技能培训合作方
  funnelTargets: "线索→合格共创客户 20-30%；共创客户→付费试点 50%+；试点→工厂年度合同 60%+（前提是一个出口项目已上线，且另有 2-3 个项目在排队）"
  pricing: >-
    按在用工厂收取年度订阅费，再叠加按已认证芯片项目或出口工作流计费的用量档位，
    另收付费的实施与集成费用，以及面向第二工厂转移和变更管控的可选高级模块。这
    种定价把价格和工厂级审批痛点、项目量挂钩，避免了按坐席收费带来的稀释，也比
    全面 MES 项目更贴近买家现有的质量与运营工具预算。
businessModel:
  revenueStreams:
    - 按在用工厂收取的年度平台订阅费
    - 付费的实施、集成和认证模板搭建服务
    - 面向多厂区转移、供应商谱系和先进封装变更管控的扩展模块
  unitOfValue: 按纳入护照管理的在用工厂 / 已认证芯片项目计
  targetGrossMarginPct: 70
  expansionLevers:
    - 在首家工厂内增加更多已认证芯片项目和复验认证工作流
    - 一旦审批模板库得到验证，从第一家工厂扩展到第二工厂或姊妹厂区
    - 出售面向供应商谱系、转移管控和先进封装变更管理的相邻模块
strategyMap:
  northStarMetric: 从客户提出认证请求，到拿到客户可用审批资料包或复验认证处置结果的中位耗时
  inputMetrics:
    - 由在用封装护照管理的在用芯片项目数
    - 未经历被驳回文档循环即交付的认证资料包占比
    - 覆盖批次、测试机、偏差和操作员记录的证据完整度评分
    - 共创客户工厂的试点转年约转化率
  moatsToBuild:
    - 按终端市场、封装类型和评审人预期建立的客户可用认证模板库
    - 连接批次、偏差、工艺变更和最终审批结果的纵向图谱
    - 显示哪些证据缺口和复验认证路径最常在新建 OSAT 爬产中卡住审批的基准数据
  killCriteria:
    - 在创始人外联 9 个月内，首批 5 家目标工厂中同意付费试点的不足 2 家
    - 共创客户工厂无法开放足够权威的数据，让一个在用出口项目的证据完整度达到至少 90%
    - 护照生成的资料包，未能在前两个试点项目中把认证资料包周转时间或被驳回文档循环减少至少 30%
  mermaid: |
    flowchart LR
      Wedge[India first-export OSAT wedge] --> MVP[Read-only package passport MVP]
      MVP --> Proof[Faster approvals and fewer rejected packs]
      Proof --> Expansion[Multi-site transfer, change control, adjacent Asian hubs]
investorMemo:
  verdict:
    call: "观察"
    conviction: "客户痛点真实，工作流切口清晰，但印度优先的买家池有限，认证发生频率尚未验证，这让它更像一个需要大量尽调的观察名单项目，而不是可以立刻进会议室谈的交易。"
    whyBelieve: "创意和研究都指向新建 OSAT 爬产工厂存在真实的审批瓶颈，而且没有任何已点名的现有厂商是围绕面向买家的认证资料包本身来构建产品的。"
    whyDoubt: "三年期 SOM 只有 $1.8M（覆盖四家工厂），而认证量、谁将拥有记录系统、数字证据能否被接受这几个关键未知数，仍停留在客户验证之前的假设阶段。"
    nextDiligence: "从 4-6 家目标工厂拿到实时认证队列数据和一份样本出口资料包，验证事件频率、数据完整度和付费意愿，再考虑是否要为一轮种子前投资背书。"
  firstCustomer:
    title: 古吉拉特邦一家 OSAT 工厂的质量负责人
    profile: 一家 300-1500 人规模的印度 OSAT 或 ATMP 工厂，正在向日本或马来西亚出口，手上有 2-5 个待认证芯片项目，测试机、MES 和 QA 记录各自独立、需要手工拼进审批资料包。
    trigger: 新出口客户要求提供认证资料包，或一次偏差迫使复验认证，恰好赶上第二条产线或额外设备项目正在爬产。
    buyer: 工厂总经理、运营副总裁，或质量负责人
    initialContract: 假设为一个出口项目和付费实施设定 $75k-$125k 的共创客户试点合同，一旦平台内管理着 2-3 个在用项目和复验认证工作流，就转为 $250k-$450k 的工厂年度合同。
  mustBeTrue:
    - 目标工厂每季度至少发生 6-8 起新的认证或复验认证事件，痛点足以让手工拼资料包拖慢出货或产能利用率。
    - 一个在用出口项目能在 8 周内完成测试机、MES 和 QA 系统的只读集成，而不必推动一次推倒重来的 MES 项目。
    - 只要输出格式保留了当前的 PDF 审批格式，并在其背后附加可下钻证据，日本、马来西亚或汽车买家就会接受护照生成的资料包。
    - 一次试点能在一个季度内，把认证资料包周转时间或被驳回文档循环减少至少 30%。
    - 首批 5 家目标工厂中至少有 2 家把付费试点转为年度合同，并成为可信的参考客户，支撑相邻中心的扩张。
  diligenceQuestions:
    - 4-6 家指定目标工厂每季度实际的认证资料包、复验认证和文档返工量是多少？
    - 目前是哪套系统拥有测试机数据、偏差历史和客户文档资料包，这些记录有多不完整？
    - 首个买家会用质量或运营预算来支付，还是需要单独走一轮 IT 或 MES 审批流程？
    - 目标工厂在批准试点之前，要求什么样的网络边界——公有云、客户自管 VPC、本地部署，还是物理隔离？
    - 为什么这仍然应该是一个独立工作流，而不是 Critical Manufacturing、camLine、Siemens、PDF Solutions 或 Tulip 里的一个功能？
    - 有哪条具体的扩展路径，能在现有厂商把它打包进去之前，把一个 $6.8M 的 SAM 切口做成一家更大的公司？
operatingAssumptions:
  - assumption: 目标 OSAT 和 ATMP 工厂有足够多的经常性认证工作量，能撑起一个专属工作流层。
    basis: research.yaml
    validationTest: 从 4-6 家目标工厂收集队列日志和审批日历，确认至少 3 家工厂每季度有 6 起以上经常性认证或复验认证事件。
    decisionImpact: 如果事件频率更低，就把切口收窄到文档负担最重的汽车或工业项目，或者把产品重新定位为服务密集型的细分工具。
  - assumption: 现有的测试机、MES 和 QA 记录足够完整，不需要回写生产系统，就能建立一份可信的护照。
    basis: research.yaml
    validationTest: 在一条共创客户产线上做只读数据审计，要求在批次、测试机、偏差和操作员签核字段上完整度超过 90%，才能试点上线。
    decisionImpact: 如果数据太不完整，路线图就必须加入车间数据采集或更深的 MES/QMS 集成，这会增加服务负担，压低毛利潜力。
  - assumption: 出口客户会接受一种混合证据模式——传统 PDF 资料包，加上关联的数字谱系。
    basis: research.yaml
    validationTest: 和一位日本或马来西亚的客户质量联系人一起评审一份生成的资料包，看它能否在不需要人工重建的情况下，满足一次审批或复验认证环节。
    decisionImpact: 如果客户坚持要定制的手工资料包，产品就会退化成一个文档准备工具，而不是记录系统，定价能力也会随之下降。
  - assumption: 第一个经济买家会用工厂级订阅加实施费的定价方式，从工厂质量或运营预算中付费。
    basis: idea.yaml
    validationTest: 在 5 通探索性电话里梳理当前支出和签字角色，拿到一份不与更大 MES 采购捆绑的已签署试点 SOW。
    decisionImpact: 如果采购必须搭上一次全面的 MES 或 IT 转型，销售周期会拉长，公司就必须转向渠道驱动的成交方式，而不是创始人直销。
  - assumption: 印度共创客户的验证成果，能在 24 个月内复用到至少一个相邻的日本或马来西亚关联封装中心。
    basis: operator judgment
    validationTest: 用 2 个印度案例研究，在印度之外发起 8-10 次探索性对话，在第 18-24 个月拿到至少 1 个付费概念验证项目。
    decisionImpact: 如果扩张走不出去，公司就会被困在一个 $6.8M 的 SAM 里，很可能变成一个细分工具，而不是一个可融资的平台。
experimentRoadmap:
  - horizon: "0-90 天"
    experiment: 从 4-6 家目标印度 OSAT 和 ATMP 工厂收集认证队列、PPAP 或审批日历，以及复验认证日志。
    hypothesis: 至少 3 家工厂每季度有 6 起以上经常性认证或复验认证事件，造成可衡量的文档瓶颈。
    successMetric: 3 家以上工厂确认每季度 6 起以上事件，并提供一份匿名化的现状资料包或流程图。
    owner: 创始人 / GTM 负责人
  - horizon: "0-90 天"
    experiment: 梳理首 3 家共创客户候选工厂的测试机、MES、QA、偏差和文档工作流现有记录系统。
    hypothesis: 存在一条只读数据路径，能覆盖一个出口项目护照所需的最低限度证据。
    successMetric: 至少 2 家候选工厂展示出可行的只读集成方案，且不需要替换 MES。
    owner: 创始工程师 / 解决方案负责人
  - horizon: "3-6 个月"
    experiment: 在一家共创客户工厂的一个在用出口项目上部署 MVP，同步生成人工版本和护照版本的认证资料包做对比。
    hypothesis: 相比人工流程，护照拼装能缩短资料包周转时间、减少被驳回的文档循环。
    successMetric: 试点项目上周转时间加快 30% 以上，或被驳回文档循环减少 50% 以上。
    owner: 创始工程师
  - horizon: "3-6 个月"
    experiment: 用护照生成的 PDF 加可下钻证据，与日本、马来西亚或汽车客户的质量方相关人员开展买家评审会。
    hypothesis: 买家会接受这种混合输出格式，而不要求完全的人工重建。
    successMetric: 至少 1 位外部或代理评审人，在一次真实的认证或复验认证检查点上认可该格式。
    owner: 创始人 / 质量领域负责人
  - horizon: "6-12 个月"
    experiment: 把 2-3 个共创客户，从单项目试点转为覆盖多个在用芯片项目的工厂级年度合同。
    hypothesis: 一旦多个排队项目和复验认证工作流同时在线，工厂级订阅定价就站得住脚。
    successMetric: 签下 2 份年度合同，且至少 1 家工厂内的在用项目从 1 个扩展到 3 个以上。
    owner: 创始人 / GTM 负责人
  - horizon: "12-18 个月"
    experiment: 试点第二产线或第二工厂转移工作流，并在印度之外开设一个相邻封装中心账户。
    hypothesis: 审批历史数据集和模板库能推广到首个印度出口切口之外。
    successMetric: 第 18 个月前拿下 1 个付费扩展模块，或在印度之外拿下 1 个付费概念验证项目。
    owner: 解决方案负责人 / 创始人
operations:
  - 每次部署前都做只读集成和证据完整度审计，第一阶段不回写生产系统。
  - 客户专属 PDF 资料包模板和审批路由集中维护，但按工厂、封装类型和终端市场分版本。
  - 为不允许共享云数据处理的出口项目账户，准备好客户自管 VPC 或本地部署连接方案。
  - 把 MES、测试数据和半导体质量咨询合作伙伴当作推广盟友，而不是要被替换的对象。
team:
  - role: 创始工程师
    startTiming: "第 0 个月"
    rationale: 证据图谱、只读连接器和认证资料包拼装引擎，是 MVP 的技术核心，必须在任何共创客户试点跑起来之前就存在。
  - role: 创始人 / 半导体质量负责人
    startTiming: "第 0 个月"
    rationale: 在工厂总经理和质量负责人那里的可信度，取决于有人能用客户自己的运营语言，谈 PPAP 式证据、偏差管控和出口审批。
  - role: 解决方案与集成工程师
    startTiming: "第 2-3 个月"
    rationale: 如果没有专人负责各工厂现有系统的测试机、MES、QA 和部署映射，试点就会失败。
  - role: 创始销售 / 共创客户负责人
    startTiming: "第 4-6 个月"
    rationale: 买家池集中且靠关系驱动，需要专人同时推进创始人主导销售、合作渠道和试点扩展。
  - role: 第二位产品与数据工程师
    startTiming: "第 6-9 个月"
    rationale: 在第一个共创客户验证了核心护照之后，模板库、基准评估层和第二工厂转移工作流需要专人做产品化。
milestones:
  - horizon: "0-12 个月"
    items:
      - 签下 2-3 个共创客户，部署一个在用出口项目的 MVP。
      - 在一家工厂展示认证资料包周转时间加快 30% 以上，或被驳回文档循环减少 50% 以上。
      - 在 4-6 家目标工厂确认买家预算归属、部署边界和数据完整度。
      - 至少把 1 个试点转为工厂年度合同。
  - horizon: "12-24 个月"
    items:
      - 拿下 2-3 份工厂年度合同，每家混合 ARR 约 $250k-$450k。
      - 在至少 1 个客户账户内，支持 3 个以上在用芯片项目和复验认证工作流。
      - 交付第二产线或第二工厂转移支持，以及经过验证的客户自管 VPC 或本地部署方案。
      - 拿下印度之外首个相邻封装中心的概念验证项目。
  - horizon: "24-36 个月"
    items:
      - 达到研究中三年期 SOM 目标：4 家工厂，ARR 约 $1.8M。
      - 推出供应商谱系和先进封装变更管控模块。
      - 把审批模板和基准数据集，确立为扩展进相邻亚洲封装中心的能力层。
risks:
  - risk: 测试机、MES、QA 和操作员系统之间的数据完整性，可能参差不齐到无法支撑一份可信的封装护照。
    likelihood: High
    impact: High
    mitigation: 先做只读接入，在上线前为证据完整度打分，首个试点只覆盖可信度最高的系统和一个出口项目。
  - risk: 出口买家可能坚持要定制的手工资料包，或拒绝接受 PDF 背后的关联数字证据。
    likelihood: High
    impact: High
    mitigation: 先输出兼容传统格式的 PDF，保留人工审批环节，在扩大自动化之前，先用外部或代理评审人验证格式。
  - risk: 印度优先的买家池比较集中，爬产时间可能延后，导致近期可签约的账户太少。
    likelihood: Medium
    impact: High
    mitigation: 把烧钱节奏严格对齐种子前的共创客户计划，同时并行推进 Micron、Tata、Kaynes 和 CG 级别的账户，并及早测试向日本或马来西亚相邻中心扩张的可能性。
  - risk: 一旦这个切口被验证，MES、良率或低代码领域的现有厂商可能会打包出基础的认证资料包工作流。
    likelihood: Medium
    impact: Medium
    mitigation: 牢牢占住跨系统审批图谱、客户可用模板库和复验认证基准数据集，同时与现有数据层合作而不是替换它们。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月构建只读、客户认可的 MVP，在 2-3 家共创客户工厂验证数据完整度和买家接受度，至少把 2 个试点转为工厂年度合同，并测试第二工厂转移加相邻亚洲中心扩张，能否在种子轮之前把公司带出印度优先切口的局限。
