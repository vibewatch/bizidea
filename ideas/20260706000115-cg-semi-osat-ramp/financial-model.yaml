scenarios:
  downside:
    description: "Adjacent-hub expansion slips, plant-level expansion is slower, and customer-managed VPC or on-prem work keeps margin below target."
    y3RevenueK: 1280.0
    y3EbitdaK: -335.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
      - "The fourth paying plant shifts from Q1Y3 to Q4Y3."
      - "Steady-state plant ARR exits near $400K instead of $450K."
      - "Gross margin exits around 67 percent because deployment work stays semi-custom."
  base:
    description: "Three India plants convert to annual contracts by Q4Y2, an adjacent-hub paid proof of concept lands in Q1Y3, and steady-state plant ARR reaches the researched $450K level by year end."
    y3RevenueK: 1680.0
    y3EbitdaK: -103.5
    cashLowPointK: 765.8
    keyAssumptionChanges:
      - "3 paying plants are live by M12 and 3 annual plants are live by Q4Y2."
      - "A fourth paying plant is added in Q1Y3 via adjacent-hub expansion."
      - "Gross margin reaches the low-70s by late Y3 as connectors and PDF templates standardize."
  upside:
    description: "The fourth plant lands sooner, two accounts add transfer or change-control modules early, and reusable deployment patterns reduce services drag faster than planned."
    y3RevenueK: 1920.0
    y3EbitdaK: 95.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "Four paying plants are live for almost all of Y3 and a fifth paid module or proof point appears by Q4Y3."
      - "Two accounts attach second-facility transfer or change-control modules inside 12 months."
      - "Gross margin reaches the mid-70s as deployment boundary reviews become repeatable."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Plant expansion and premium modules settle about 10 percent below plan."
    baseCase: "Steady-state plant ARR exits near $450K."
    upsideCase: "Second-facility transfer and change-control modules lift plant ARR about 10 percent above plan."
    y3RevenueImpactK: -168.0
    cashImpactK: -118.0
  - variable: "CAC"
    downsideCase: "Partner-sourced introductions underperform and CAC rises toward $275K."
    baseCase: "CAC stays near $208.8K with concentrated founder-led selling and partner referrals."
    upsideCase: "MES and quality partners source more of the pipeline and CAC trends toward $170K."
    y3RevenueImpactK: -80.0
    cashImpactK: -180.0
  - variable: "churn"
    downsideCase: "Monthly churn rises toward 2.5 percent if the product is treated as a point workflow instead of a plant control layer."
    baseCase: "Monthly churn holds near 1.5 percent once the workflow is embedded in quality operations."
    upsideCase: "Monthly churn stays near 1.0 percent because export-program history and template libraries become sticky."
    y3RevenueImpactK: -95.0
    cashImpactK: -70.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-annual conversion stretches from about 6 months to about 9 months because buyer validation and deployment-boundary reviews take longer."
    baseCase: "Pilot-to-annual conversion stays near 6 months."
    upsideCase: "Reference accounts compress conversion toward 4-5 months."
    y3RevenueImpactK: -240.0
    cashImpactK: -190.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin stalls near 67 percent because deployments remain custom and support-heavy."
    baseCase: "Exit gross margin reaches about 72 percent and steady-state unit economics stay near 70 percent."
    upsideCase: "Exit gross margin reaches about 75 percent as read-only connectors and PDF templates become repeatable."
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: "hiring pace"
    downsideCase: "The final engineer is hired two quarters early before adjacent-hub demand is proven."
    baseCase: "Hiring follows the design-partner-first sequencing in the business plan."
    upsideCase: "The final engineering hire waits until after Q2Y3 without delaying customer delivery."
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetPlants[Target India and adjacent-hub plants] --> PaidPilots[Paid design-partner pilots]
      PaidPilots --> AnnualContracts[Annual plant contracts]
      AnnualContracts --> ExpansionModules[Transfer and change-control modules]
      ExpansionModules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue comes from converting 3 India design-partner plants into annual contracts by Q4Y2, then adding 1 adjacent-hub paid plant in Q1Y3 and expanding each plant toward roughly $450K ARR."
  - checkName: "Must go right"
    finding: "Read-only integrations and PDF-accepted output must standardize enough that 7 ending FTE can support 4 paying plants while gross margin still climbs into the low-70s."
  - checkName: "Model breaks if"
    finding: "If adjacent-hub expansion slips and plant ARR stalls closer to $400K, the downside case keeps EBITDA deeply negative and pushes cash toward the low-$400K range."
  - checkName: "Next-round proof"
    finding: "The seed story is 3 annual plant contracts plus 1 adjacent-hub paid proof of concept with a validated customer-managed VPC or on-prem deployment pattern and late-Y2 burn below about $35K per month."
sanityChecks:
  ruleOf40: "Y3 growth 59.2% + EBITDA margin -6.2% = 53.0%"
  burnMultiple: "Y2 burn multiple is about 0.5x using roughly $0.5M of EBITDA burn against about $0.9M of net new committed ARR as the company moves from 1 annual plant to 3."
  revenuePerFte: "$240K Y3 on 7 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "Y1 revenue includes onboarding-heavy design-partner pilots, so early revenue should not be read as fully recurring ARR."
    - "The base case still tops out at 4 paying plants by year 3, so a larger venture outcome requires adjacent-hub and second-facility expansion to work beyond India."
    - "Gross margin only reaches the target band if read-only connectors, PDF templates, and deployment-boundary reviews become repeatable; customer-specific VPC or on-prem requests can keep services drag high."
    - "The model uses EBITDA as a proxy for cash and ignores working-capital timing, which is reasonable at this scale but can understate cash needs if large deployments require upfront compliance or hosting work."
