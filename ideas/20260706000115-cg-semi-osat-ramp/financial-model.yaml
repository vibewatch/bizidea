slug: "osat-package-passport"
date: "2026-07-06"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-06] the operating model starts in the first full month after the dated business plan."
  - id: "A2"
    name: "Opening cash / pre-seed raise"
    value: "$2.0M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model burn curve] base case uses the low end of the stated range because the plan stays narrowly focused on 3 India plants plus 1 adjacent-hub paid proof of concept before seed."
  - id: "A3"
    name: "Starting paying plants"
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0-12 months] the company begins pre-revenue and must first sign design partners before recurring plant contracts exist."
  - id: "A4"
    name: "Paying plant definition"
    value: "A paid design-partner pilot, annual plant contract, or adjacent-hub paid proof of concept."
    unit: "definition"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams + BP milestones 12-24 months] customersEop counts any plant already paying for pilot, annual, or paid expansion scope."
  - id: "A5"
    name: "Design-partner pilot economics"
    value: "$90K over about 3 months (~$30K per month)"
    unit: "USD/plant"
    source: "[BP investorMemo.firstCustomer.initialContract $75k-$125k design-partner pilot plus onboarding] the model uses a midpoint pilot value for the first export-program deployments."
  - id: "A6"
    name: "Annual plant contract ARR ramp"
    value: "First converted plant starts near $300K ARR, Q4Y2 plants average about $400K ARR, and steady-state Y3 plants exit near $450K ARR."
    unit: "USD/plant/year"
    source: "[BP investorMemo.firstCustomer.initialContract $250k-$450k annual plant contract + Research market.som $1.8M across 4 plants] per-plant revenue grows as more qualified programs, requalification workflows, and transfer modules attach."
  - id: "A7"
    name: "Customer ramp"
    value: "3 paying plants by M12, 3 annual plants by Q4Y2, and 4 paying plants by Q1Y3 through Q4Y3."
    unit: "customersEop"
    source: "[BP experimentRoadmap 6-12 months and 12-18 months + BP milestones 0-12, 12-24, and 24-36 months + Research market.som] base case converts 3 India design partners and adds 1 adjacent-hub paid proof point in early Y3."
  - id: "A8"
    name: "Revenue recognition convention"
    value: "Period-end paying plants multiplied by the blended realized monthly revenue per paying plant for that period."
    unit: "formula"
    source: "[BP gtm.pricing + BP businessModel.unitOfValue] this keeps revenue directly traceable to customer count and the pilot-to-annual mix."
  - id: "A9"
    name: "Gross margin ramp"
    value: "45%-55% in Y1, 58%-68% in Y2, and 69%-72% in Y3."
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on data completeness and buyer acceptance + Research regulatoryTechnicalConstraints] early deployments stay services-heavy until read-only connectors and PDF templates become reusable."
  - id: "A10"
    name: "Hiring timeline"
    value: "M1 founder and founding engineer; M3 solutions/integration; M5 sales/design-partner lead; M8 second engineer; M18 ops; M28 third engineer."
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale] hiring stays solutions-heavy first and only adds a third engineer after the first adjacent-hub paid proof point is in sight."
  - id: "A11"
    name: "Founder / quality lead loaded compensation"
    value: "$150K"
    unit: "USD/year"
    source: "[BP team Founder / semiconductor quality lead + startup-finance heuristic] lean founder cash pay with payroll taxes and benefits."
  - id: "A12"
    name: "Engineering loaded compensation"
    value: "$160K"
    unit: "USD/year"
    source: "[BP team Founding eng and Second product/data engineer + startup-finance heuristic] reflects senior data-integration and workflow-product talent without late-stage cash levels."
  - id: "A13"
    name: "Solutions / integration loaded compensation"
    value: "$135K"
    unit: "USD/year"
    source: "[BP team Solutions and integration engineer + startup-finance heuristic] covers deployment ownership across tester, MES, QA, and network-boundary mapping."
  - id: "A14"
    name: "Sales / design-partner loaded compensation"
    value: "$155K"
    unit: "USD/year"
    source: "[BP team Founding sales / design-partner lead + BP gtm.channels + startup-finance heuristic] includes concentrated enterprise travel and variable compensation for founder-led selling."
  - id: "A15"
    name: "Ops / G&A loaded compensation"
    value: "$100K"
    unit: "USD/year"
    source: "[BP operations + startup-finance heuristic] covers basic finance, vendor management, and compliance support for customer-managed VPC or on-prem accounts."
  - id: "A16"
    name: "Payroll allocation to P&L lines"
    value: "Founder 50% S&M / 20% R&D / 30% G&A; engineering 100% R&D; solutions 50% S&M / 50% R&D; sales 100% S&M; ops 100% G&A."
    unit: "allocation"
    source: "[BP team role rationales + BP operations] functional allocation reflects founder-led sales, engineering-heavy delivery, and a small shared-services layer."
  - id: "A17"
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll S&M / R&D / G&A rises from $5K / $7K / $4K at launch to about $10K / $10K / $6K by late Y3."
    unit: "USD/month"
    source: "[BP operations + BP gtm.channels + startup-finance heuristic] covers travel, deployment support, cloud tools, legal, insurance, and customer-managed VPC or on-prem prep without assuming broad paid marketing."
  - id: "A18"
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA."
    unit: "formula"
    source: "[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: "A19"
    name: "Steady-state monthly churn"
    value: "1.5%"
    unit: "percent per month"
    source: "[startup-finance heuristic for sticky enterprise workflow SaaS + BP businessModel plant-level subscription] once a plant trusts the package-passport workflow, switching should be infrequent but not zero."
  - id: "A20"
    name: "Pilot-to-annual sales cycle"
    value: "About 6 months from first paid pilot month to annual plant contract."
    unit: "months"
    source: "[BP experimentRoadmap 3-6 months and 6-12 months + BP investorMemo.mustBeTrue] one quarter proves the workflow and a second quarter closes the annual plant commitment."
  - id: "A21"
    name: "CAC convention"
    value: "Y2-Y3 sales and marketing spend divided by 4 net new paying plants."
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led selling and partner-sourced introductions after the pre-product search phase."
  - id: "A22"
    name: "Next-round milestone for funding sizing"
    value: "By Q1Y3 the company should have 3 annual plant contracts, 1 adjacent-hub paid proof of concept, and a validated customer-managed VPC or on-prem deployment pattern."
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk runwayMonths 18 + model cash curve] the pre-seed raise is sized to reach a seed-ready proof point and still preserve more than 6 months of operating buffer."
  - id: "A23"
    name: "Quarterly salary-roll convention"
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only the year-end snapshots."
    unit: "convention"
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the monthly hiring ramp."
