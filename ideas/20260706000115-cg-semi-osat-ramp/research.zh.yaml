  validationPlan:
  - priority: high
    question: 按终端市场划分，一家目标印度 OSAT 每季度实际运行多少次新项目认证和复验认证？
    evidenceToGather: 来自 4-6 家目标工厂的现状认证队列、PPAP 日历和复验认证日志。
  - priority: high
    question: 目标工厂内部，目前是哪套系统拥有测试机数据、偏差记录和客户文档资料包？
    evidenceToGather: 在用 MES/QMS/测试机工作流的截图，加上来自一位共创客户的记录系统归属图。
  - priority: medium
    question: 日本、马来西亚和汽车买家会接受 PDF 资料包背后的数字化拼装证据图谱吗？
    evidenceToGather: 客户访谈，以及现有 PDF 资料包与关联数字证据包的并排评审。
  - priority: medium
    question: 在工厂愿意在出口项目上信任产品之前，需要什么样的最低限度本地或物理隔离部署方案？
    evidenceToGather: 来自目标账户的安全问卷、IT 架构评审和部署政策文档。
