  sensitivityCases:
  - case: MES 和质量领域的现有厂商，比预期更快打包出认证资料包工作流
    impact: 如果现有厂商套件加入了面向买家的审批资料包功能，初创公司必须靠跨系统证据图谱、出口模板和更快的复验认证闭环来做出差异化，而不是靠基础的文档拼装。
    sourceRefs:
    - 23
    - 25
    - 26
    - 27
    - 30
    - 31
  - case: 印度 OSAT 爬产进度放缓或整合
    impact: 如果已宣布的工厂爬产比计划更慢，只靠印度的买家池会持续更长时间地保持很小，公司就必须更早向相邻的亚洲工厂扩张。
