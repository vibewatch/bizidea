    - 4
    - 5
    - 7
    - 8
    - 11
  - point: AI 需求让先进封装产能持续紧张，抬高了可靠认证和变更管理的价值。
    sourceRefs:
    - 33
    - 34
    - 35
    - 36
  - point: 汽车和工业项目对文档、可追溯性和单元级证据的要求，比纯消费级流程更严格。
    sourceRefs:
    - 13
    - 16
    - 18
    - 20
    - 22
  headwinds:
  - point: 眼前的印度滩头市场集中在少数几家标杆工厂，早期管道的波动在所难免。
    sourceRefs:
    - 3
    - 4
    - 5
    - 7
    - 8
    - 11
  - point: 除了 AI 相关领域，2024 年 OSAT 需求恢复得比较温和，这可能拖慢部分供应商的非必要软件项目。
    sourceRefs:
    - 32
  - point: 客户可能会把现有的 PPAP、MES 和文档工作流再拖用一段时间，比初创公司希望的更久。
    sourceRefs:
    - 17
    - 20
    - 21
    - 23
    - 31
