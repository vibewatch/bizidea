slug: "osat-package-passport"
date: "2026-07-06"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "模型起始月份"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-06] 运营模型从商业计划书署期后的第一个完整月份开始。"
  - id: "A2"
    name: "启动现金 / 种子前融资额"
    value: "$2.0M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + 模型烧钱曲线] 基础情形取所述区间的下限，因为计划在种子轮之前，聚焦范围严格限定在 3 家印度工厂加 1 个相邻中心的付费概念验证项目。"
  - id: "A3"
    name: "起始付费工厂数"
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0-12 个月] 公司从零营收起步，必须先签下共创客户，才会出现经常性的工厂合同。"
  - id: "A4"
    name: "付费工厂定义"
    value: "一个付费的共创客户试点、一份年度工厂合同，或一个相邻中心的付费概念验证项目。"
    unit: "definition"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams + BP milestones 12-24 个月] customersEop 统计所有已经为试点、年度合同或付费扩展范围付费的工厂。"
  - id: "A5"
    name: "共创客户试点经济模型"
    value: "约 3 个月内 $90K（约每月 $30K）"
    unit: "USD/plant"
    source: "[BP investorMemo.firstCustomer.initialContract $75k-$125k 共创客户试点加实施费] 模型对首批出口项目部署采用一个居中的试点价值。"
  - id: "A6"
    name: "工厂年度合同 ARR 爬坡"
    value: "首个转化工厂起步 ARR 接近 $300K，Y2 第四季度工厂平均约 $400K ARR，Y3 稳态工厂退出时接近 $450K ARR。"
    unit: "USD/plant/year"
    source: "[BP investorMemo.firstCustomer.initialContract $250k-$450k 年度工厂合同 + 研究 market.som 覆盖 4 家工厂共 $1.8M] 随着更多已认证项目、复验认证工作流和转移模块接入，单厂营收会持续增长。"
  - id: "A7"
    name: "客户爬坡节奏"
    value: "第 12 个月前有 3 家付费工厂，Y2 第四季度前有 3 家年度合同工厂，Y3 第一季度到第四季度维持 4 家付费工厂。"
    unit: "customersEop"
    source: "[BP experimentRoadmap 6-12 个月及 12-18 个月 + BP milestones 0-12、12-24 及 24-36 个月 + 研究 market.som] 基础情形转化 3 家印度共创客户，并在 Y3 早期新增 1 个相邻中心的付费概念验证点。"
  - id: "A8"
    name: "收入确认口径"
    value: "期末付费工厂数，乘以该期每家付费工厂的混合已确认月度收入。"
    unit: "formula"
    source: "[BP gtm.pricing + BP businessModel.unitOfValue] 这让收入能直接追溯到客户数和试点转年约的构成比例。"
  - id: "A9"
    name: "毛利率爬坡"
    value: "Y1 为 45%-55%，Y2 为 58%-68%，Y3 为 69%-72%。"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions 关于数据完整性和买家接受度 + 研究 regulatoryTechnicalConstraints] 早期部署会一直偏服务密集，直到只读连接器和 PDF 模板变得可复用为止。"
  - id: "A10"
    name: "招聘时间线"
    value: "第 1 个月招创始人和创始工程师；第 3 个月招解决方案/集成；第 5 个月招销售/共创客户负责人；第 8 个月招第二位工程师；第 18 个月招运营；第 28 个月招第三位工程师。"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale] 招聘先偏解决方案密集，只有在第一个相邻中心付费概念验证点已现雏形之后，才会新增第三位工程师。"
  - id: "A11"
    name: "创始人 / 质量负责人全成本薪酬"
    value: "$150K"
    unit: "USD/year"
    source: "[BP team 创始人 / 半导体质量负责人 + 创业财务经验法则] 精简的创始人现金薪酬，含工资税和福利。"
  - id: "A12"
    name: "工程全成本薪酬"
    value: "$160K"
    unit: "USD/year"
    source: "[BP team 创始工程师及第二位产品/数据工程师 + 创业财务经验法则] 反映资深数据集成和工作流产品人才的薪酬水平，但不到后期阶段的现金水平。"
  - id: "A13"
    name: "解决方案 / 集成全成本薪酬"
    value: "$135K"
    unit: "USD/year"
    source: "[BP team 解决方案与集成工程师 + 创业财务经验法则] 覆盖测试机、MES、QA 和网络边界映射的部署工作。"
  - id: "A14"
    name: "销售 / 共创客户全成本薪酬"
    value: "$155K"
    unit: "USD/year"
    source: "[BP team 创始销售 / 共创客户负责人 + BP gtm.channels + 创业财务经验法则] 包含创始人主导销售所需的集中企业差旅和浮动薪酬。"
  - id: "A15"
    name: "运营 / G&A 全成本薪酬"
    value: "$100K"
    unit: "USD/year"
    source: "[BP operations + 创业财务经验法则] 覆盖基础财务、供应商管理，以及面向客户自管 VPC 或本地部署账户的合规支持。"
  - id: "A16"
    name: "薪酬向损益科目的分摊"
    value: "创始人 50% 销售与市场 / 20% 研发 / 30% 行政管理；工程 100% 研发；解决方案 50% 销售与市场 / 50% 研发；销售 100% 销售与市场；运营 100% 行政管理。"
    unit: "allocation"
    source: "[BP team 各角色说明 + BP operations] 职能分摊反映了创始人主导销售、工程密集型交付，以及一个小型共享服务层。"
  - id: "A17"
    name: "非薪酬运营支出爬坡"
    value: "月度非薪酬销售与市场 / 研发 / 行政管理支出，从起步时的 $5K / $7K / $4K，涨到 Y3 末期约 $10K / $10K / $6K。"
    unit: "USD/month"
    source: "[BP operations + BP gtm.channels + 创业财务经验法则] 覆盖差旅、部署支持、云工具、法务、保险，以及客户自管 VPC 或本地部署筹备，不含大规模付费营销投入。"
  - id: "A18"
    name: "现金转换口径"
    value: "现金变动等于 EBITDA。"
    unit: "formula"
    source: "[创业财务经验法则] 在种子前这个规模下，假设资本支出、税费、融资费用和营运资金时点的影响可以忽略。"
  - id: "A19"
    name: "稳态月度客户流失率"
    value: "1.5%"
    unit: "percent per month"
    source: "[针对粘性强的企业级工作流 SaaS 的创业财务经验法则 + BP businessModel 工厂级订阅] 一旦工厂信任了封装护照工作流，更换供应商应该很少见，但不会是零。"
  - id: "A20"
    name: "试点转年约销售周期"
    value: "从首个付费试点月份到工厂年度合同，约 6 个月。"
    unit: "months"
    source: "[BP experimentRoadmap 3-6 个月及 6-12 个月 + BP investorMemo.mustBeTrue] 一个季度证明工作流有效，第二个季度促成年度合同。"
  - id: "A21"
    name: "CAC 口径"
    value: "Y2-Y3 的销售与市场支出，除以 4 个净新增付费工厂。"
    unit: "formula"
    source: "[基于基础情形销售与市场支出的模型计算 + BP gtm.funnelTargets] 这反映了创始人主导销售以及产品搜索阶段之后的合作伙伴引荐。"
  - id: "A22"
    name: "下一轮融资规模的里程碑"
    value: "到 Y3 第一季度，公司应有 3 份工厂年度合同、1 个相邻中心付费概念验证项目，以及经过验证的客户自管 VPC 或本地部署方案。"
    unit: "milestone"
    source: "[BP milestones 12-24 个月 + BP fundingAsk runwayMonths 18 + 模型现金曲线] 这轮种子前融资的规模，是按能拿到种子轮就绪的验证点，再留出超过 6 个月运营缓冲来定的。"
  - id: "A23"
    name: "季度薪资滚动口径"
    value: "Y2-Y3 的薪资行，使用每个季度内实际的逐月招聘节奏，而不只是年末快照。"
    unit: "convention"
    source: "[Headcount 列口径 + BP team startTiming] 这让薪资支出与按月推进的招聘节奏内部保持一致。"
