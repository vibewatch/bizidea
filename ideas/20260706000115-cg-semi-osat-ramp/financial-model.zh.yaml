scenarios:
  downside:
    description: "相邻中心扩张延后，工厂级扩张放慢，客户自管 VPC 或本地部署工作让毛利率一直低于目标。"
    y3RevenueK: 1280.0
    y3EbitdaK: -335.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
      - "第四家付费工厂从 Y3 第一季度推迟到第四季度。"
      - "稳态工厂 ARR 退出时接近 $400K，而不是 $450K。"
      - "毛利率退出时约为 67%，因为部署工作仍然偏半定制。"
  base:
    description: "3 家印度工厂在 Y2 第四季度前转为年度合同，1 个相邻中心付费概念验证项目在 Y3 第一季度落地，稳态工厂 ARR 到年末达到研究测算的 $450K 水平。"
    y3RevenueK: 1680.0
    y3EbitdaK: -103.5
    cashLowPointK: 765.8
    keyAssumptionChanges:
      - "第 12 个月前有 3 家付费工厂在线，Y2 第四季度前有 3 家年度合同工厂在线。"
      - "Y3 第一季度通过相邻中心扩张新增第四家付费工厂。"
      - "随着连接器和 PDF 模板实现标准化，毛利率到 Y3 末期达到 70% 出头。"
  upside:
    description: "第四家工厂更早落地，两个账户提前接入转移或变更管控模块，可复用的部署方案比计划更快降低服务拖累。"
    y3RevenueK: 1920.0
    y3EbitdaK: 95.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "四家付费工厂在 Y3 几乎全年在线，第五个付费模块或验证点在 Y3 第四季度前出现。"
      - "两个账户在 12 个月内接入第二工厂转移或变更管控模块。"
      - "随着部署边界评审变得可复制，毛利率达到 70% 中段。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "工厂扩张和高级模块落在计划下方约 10%。"
    baseCase: "稳态工厂 ARR 退出时接近 $450K。"
    upsideCase: "第二工厂转移和变更管控模块，把工厂 ARR 拉高到计划上方约 10%。"
    y3RevenueImpactK: -168.0
    cashImpactK: -118.0
  - variable: "CAC"
    downsideCase: "合作伙伴引荐表现不及预期，CAC 升向 $275K。"
    baseCase: "在创始人主导销售和合作伙伴引荐集中发力下，CAC 保持在约 $208.8K。"
    upsideCase: "MES 和质量合作伙伴带来更多线索，CAC 趋向 $170K。"
    y3RevenueImpactK: -80.0
    cashImpactK: -180.0
  - variable: "客户流失率"
    downsideCase: "如果产品被当作单点工作流而不是工厂级管控层，月度流失率升向 2.5%。"
    baseCase: "一旦工作流嵌入质量运营，月度流失率维持在约 1.5%。"
    upsideCase: "由于出口项目历史和模板库带来粘性，月度流失率保持在约 1.0%。"
    y3RevenueImpactK: -95.0
    cashImpactK: -70.0
  - variable: "销售周期"
    downsideCase: "由于买家验证和部署边界评审耗时更长，试点转年约周期从约 6 个月拉长到约 9 个月。"
    baseCase: "试点转年约周期维持在约 6 个月。"
    upsideCase: "参考客户把转化周期压缩到 4-5 个月。"
    y3RevenueImpactK: -240.0
    cashImpactK: -190.0
  - variable: "毛利率"
    downsideCase: "退出毛利率停滞在约 67%，因为部署工作仍然定制且需要大量支持。"
    baseCase: "退出毛利率达到约 72%，稳态单位经济模型保持在约 70%。"
    upsideCase: "随着只读连接器和 PDF 模板变得可复制，退出毛利率达到约 75%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: "招聘节奏"
    downsideCase: "在相邻中心需求得到验证之前，提前两个季度招入最后一名工程师。"
    baseCase: "招聘遵循商业计划书中共创客户优先的排序节奏。"
    upsideCase: "最后一名工程师招聘推迟到 Y3 第二季度之后，且不影响客户交付。"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      TargetPlants[Target India and adjacent-hub plants] --> PaidPilots[Paid design-partner pilots]
      PaidPilots --> AnnualContracts[Annual plant contracts]
      AnnualContracts --> ExpansionModules[Transfer and change-control modules]
      ExpansionModules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "收入引擎"
    finding: "基础情形的收入来自把 3 家印度共创客户工厂在 Y2 第四季度前转为年度合同，再于 Y3 第一季度新增 1 家相邻中心付费工厂，并把每家工厂逐步扩展到约 $450K ARR。"
  - checkName: "必须成立的前提"
    finding: "只读集成和获 PDF 认可的输出必须足够标准化，让 7 名期末 FTE 能支撑 4 家付费工厂，同时毛利率仍能爬升到 70% 出头。"
  - checkName: "模型崩溃的条件"
    finding: "如果相邻中心扩张延后，工厂 ARR 停滞在接近 $400K，下行情形会让 EBITDA 长期深度为负，并把现金推向 $40 万区间低位。"
  - checkName: "下一轮融资的验证点"
    finding: "种子轮的故事是 3 份工厂年度合同，加 1 个相邻中心付费概念验证项目，配上经过验证的客户自管 VPC 或本地部署方案，且 Y2 末期月烧钱低于约 $35K。"
sanityChecks:
  ruleOf40: "Y3 增长率 59.2% + EBITDA 利润率 -6.2% = 53.0%（Rule of 40，即 40 法则）"
  burnMultiple: "Y2 烧钱倍数约为 0.5 倍：公司从 1 家年度工厂扩展到 3 家的过程中，约 $0.5M 的 EBITDA 烧钱对应约 $0.9M 的净新增已签约 ARR。"
  revenuePerFte: "Y3 人均营收 $240K（按期末 7 名 FTE 计），对标 SaaS 行业基准 $200-400K"
  flags:
    - "Y1 收入包含大量实施密集型的共创客户试点，因此早期收入不应被视为完全经常性的 ARR。"
    - "基础情形到第三年也只做到 4 家付费工厂，所以更大的创业级结果，取决于相邻中心和第二工厂扩张能否走出印度。"
    - "只有当只读连接器、PDF 模板和部署边界评审变得可复制时，毛利率才能达到目标区间；客户专属的 VPC 或本地部署需求，可能一直拖累服务成本。"
    - "模型用 EBITDA 作为现金的代理指标，忽略了营运资金时点的影响；在这个规模下这样处理是合理的，但如果大型部署需要预付合规或托管费用，可能会低估现金需求。"
