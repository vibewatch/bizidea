  validationPlan:
  - priority: high
    question: How many new program qualifications and requalifications does a target Indian OSAT run per quarter by end market?
    evidenceToGather: Current-state qualification queues, PPAP calendars, and requalification logs from 4-6 target sites.
  - priority: high
    question: Which system currently owns tester data, deviation records, and customer document packs inside a target plant?
    evidenceToGather: Screenshots of live MES/QMS/tester workflows plus a system-of-record map from a design partner.
  - priority: medium
    question: Will Japanese, Malaysian, and automotive buyers accept a digitally assembled evidence graph behind the PDF pack?
    evidenceToGather: Customer interviews and side-by-side reviews of existing PDF packs versus linked digital evidence bundles.
  - priority: medium
    question: What minimum on-prem or air-gapped deployment pattern is required before a plant will trust the product on export programs?
    evidenceToGather: Security questionnaires, IT architecture reviews, and deployment-policy documents from target accounts.
