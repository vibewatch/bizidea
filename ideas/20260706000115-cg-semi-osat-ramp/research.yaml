reportMemo:
  executiveTakeaways:
  - The wedge is real because India’s first greenfield OSAT and ATMP plants are shipping or qualifying output before their internal qualification memory is mature.
  - The product should land as a read-only evidence and approval layer above tester, MES, and QMS systems rather than as a rip-and-replace MES.
  - India-first is strategically attractive but commercially narrow; venture-scale outcomes require expansion into adjacent packaging hubs and broader change-control workflows.
  - Competition is strong in adjacent MES, quality, yield, and low-code workflow layers, but few incumbents own the customer-facing qualification pack itself.
  - Adoption risk is mostly about data integrity and customer acceptance of digitally assembled evidence, not about whether qualification work exists.
  marketDefinition: Software that turns OSAT and ATMP line, test, and quality records into customer-ready qualification and requalification evidence for semiconductor packaging programs.
  customerAndBuyer: Primary users are the quality, NPI, and test-engineering teams at ramping assembly and test sites. The economic buyer is usually the plant GM, operations head, or quality leader because approval speed affects shipments, utilization, and customer trust.
  buyingTriggers:
  - point: Pilot-line output or a new package program needs customer approval before mass production can scale.
    sourceRefs:
    - 3
    - 12
    - 20
  - point: A second line or fast capacity ramp overwhelms a lean quality team with PPAP, traceability, and deviation-evidence work.
    sourceRefs:
    - 5
    - 6
    - 7
    - 8
    - 37
  - point: Automotive or industrial buyers demand documented traceability, change control, and qualification packs after a process or package change.
    sourceRefs:
    - 13
    - 14
    - 18
    - 20
    - 21
    - 22
  willingnessToPay:
    summary: Willingness to pay is credible because these plants are already deploying enterprise manufacturing and quality systems alongside multibillion-dollar capacity ramps; shaving approval delay or requalification rework protects scarce line time and export credibility.
    sourceRefs:
    - 5
    - 6
    - 7
    - 17
    - 23
    - 26
    - 28
  competitiveLandscape: The field is crowded in adjacent layers—MES, quality, yield analytics, and configurable frontline apps—but the open space remains the buyer-facing approval record that assembles plant evidence into customer-specific qualification and requalification decisions.
  incumbentThesis:
  - incumbentClass: Semiconductor MES suites
    point: MES vendors capture execution and genealogy well, but they do not win by default because customer-facing qualification logic and export evidence packaging are not their core workflow.
    sourceRefs:
    - 23
    - 24
    - 25
    - 26
    - 27
  - incumbentClass: Yield and test-data platforms
    point: Yield platforms are strong at data capture and excursion analysis, but they stop short of owning the approval pack, reviewer routing, and exception-closure loop.
    sourceRefs:
    - 24
    - 28
    - 29
  - incumbentClass: Flexible frontline workflow platforms
    point: Low-code manufacturing tools can build traceability apps quickly, but semiconductor-specific qualification semantics and approval-history logic still require deeper domain modeling.
    sourceRefs:
    - 30
    - 31
  - incumbentClass: In-house quality stacks
    point: Plants can stitch together PPAP portals, spreadsheets, and document libraries themselves, but that leaves genealogy, deviations, and customer approvals fragmented across tools.
    sourceRefs:
    - 7
    - 17
    - 20
    - 21
  regulatoryLandscape: 'The product has to behave like controlled quality infrastructure: explicit approval trails, versioned change control, and durable traceability for automotive-grade and export programs.'
  technologyLandscape: The substrate already exists in tester logs, MES records, laser-marked traceability, and quality systems; the missing layer is the workflow that converts those records into approval-ready evidence.
