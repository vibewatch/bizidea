slug: osat-package-passport
date: "2026-07-06"
executiveSummary: >-
  Package Passport should launch as a read-only qualification and
  requalification layer for Indian OSAT and ATMP plants that have already
  started export shipments or are about to qualify them, not as another MES.
  The first customer is a Gujarat- or Assam-based plant quality leader
  juggling 2-5 queued chip-program approvals, export customers in Japan or
  Malaysia, and fragmented evidence across tester logs, MES records, QA
  spreadsheets, and PDF packs. The product's job is narrow: assemble lot
  genealogy, test results, deviation history, and operator signoffs into a
  customer-specific qualification pack plus a requalification trail fast enough
  to keep scarce line capacity shipping. Research supports the pain and the
  timing because India is standing up multiple greenfield assembly-test sites,
  automotive and industrial programs still require formal PPAP-style
  documentation, and packaging is becoming more strategic as advanced packaging
  demand rises. The near-term market is real but concentrated, with research
  sizing TAM at roughly $120.0M, SAM at $6.8M, and a reachable three-year SOM
  of $1.8M across four plants, so this is a credible workflow wedge but not a
  stand-alone venture outcome unless it expands into second-facility transfer,
  supplier genealogy, and adjacent Asian packaging hubs. The best early proof
  is not revenue alone; it is whether one design-partner plant can cut
  qualification-pack turnaround and rejected documentation loops without asking
  customers to abandon PDF-based approval habits. The biggest gaps in the
  research are actual qualification volume per plant, which system currently
  owns tester and deviation records, and whether export buyers will trust
  linked digital evidence behind a PDF pack. That uncertainty makes a
  pre-seed plan appropriate: fund 18 months to win 2-3 design partners, prove
  data completeness and buyer acceptance, and decide whether the company is
  becoming a category system of record or a useful but bounded workflow
  feature.
problem:
  - New OSAT plants can ship commercial output before they have repeatable qualification memory, leaving quality teams to manually stitch together lot genealogy, test data, deviation history, and approvals for each export or new-device program.
  - When a yield excursion, package change, or customer rejection occurs, the requalification loop falls back to email, spreadsheets, and vendor logs, slowing approvals and consuming margin-critical line time.
solution:
  - Ingest tester, MES, QA, and operator records in read-only mode to build a live package passport for one chip program, then auto-assemble the customer-specific qualification pack and drill-down traceability evidence the plant already has to send.
  - Turn excursions and process changes into a controlled requalification workflow with versioned evidence, disposition history, and legacy-ready PDF outputs so the product fits current buyer habits before asking customers to adopt digital-first review.
whyWeWin:
  - We sell the approval record, not the execution stack. MES, yield, and low-code tools capture data, but none of the named competitors is centered on the export qualification pack, reviewer routing, and exception-closure loop itself.
  - A library of pack templates, approver behaviors, and linked genealogy-to-outcome history compounds into a proprietary approval dataset that plants and incumbents do not have in one place today.
  - India's greenfield OSAT wave lets us land before local process habits harden, while the same workflow extends naturally to second-facility transfer and adjacent Japan/Malaysia-linked packaging hubs if the first plant works.
strategicChoices:
  beachhead: >-
    Indian OSAT and ATMP plants in Gujarat or Assam launching first Japan- or
    Malaysia-linked export programs, especially where at least one automotive,
    industrial, or telecom chip line is entering qualification with a lean
    quality and NPI team.
  wedgeRationale: >-
    This segment already feels approval pain now, has visible economic buyers,
    and can show value on one queued program within a quarter. Going broader
    into generic manufacturing traceability, full MES replacement, or all
    semiconductor sites would lengthen sales cycles before the product proves
    that it shortens approvals.
  sequencingRationale: >-
    The product lands first as a read-only evidence layer that outputs
    customer-accepted PDF packs because research shows data integrity and
    digital-evidence trust are the biggest adoption risks. Founder-led sales
    and one solutions-heavy design-partner motion come before scaling
    engineering or channel sales, and deeper modules such as cross-site
    transfer, supplier genealogy, and advanced-packaging change control wait
    until one plant proves faster approvals and cleaner requalification loops.
  notYet:
    - Full semiconductor MES or QMS replacement
    - Front-end wafer fab workflows or generic factory traceability outside packaging and test
    - Autonomous approval, multi-site transfer, and supplier genealogy automation before the first export-program wedge is proven
market:
  tam: "$120.0M (research estimate: ~180 export-oriented OSAT or captive assembly-test sites globally at ~$650k blended ARR per site)"
  sam: "$6.8M (research estimate: ~15 India or adjacent Japan/Malaysia-linked ramp sites at ~$450k per site for first-export qualification workflows)"
  som: "$1.8M (research estimate: 4 plants by year 3 at roughly $450k blended ARR through India-first direct sales plus one nearby packaging-hub expansion)"
  segments:
    - Indian OSAT and ATMP plants ramping first export programs across automotive, industrial, telecom, or IoT devices
    - Japan- and Malaysia-linked packaging groups adding second facilities or transferring qualified programs across plants
  buyingProcess: >-
    The operational champion is usually the head of quality, NPI, or test
    engineering, while the economic buyer is the plant GM, VP Operations, or
    Head of Quality. Budget is triggered when a new export qualification pack,
    second line launch, or deviation-driven requalification threatens shipments
    and pulls operations IT into the integration review.
product:
  mvp: >-
    A read-only package-passport workflow for one export program at one plant
    that ingests lot, tester, deviation, and operator-signoff data, scores
    evidence completeness, and outputs a customer-ready qualification pack plus
    requalification trail. It must integrate without replacing the plant's MES
    or QMS and preserve PDF delivery for current approval flows.
  sixMonth: >-
    Add evidence-completeness scoring, exception routing, and drill-down
    genealogy views for 2-3 active chip programs at one plant, plus a
    validated deployment pattern for the customer's required network boundary.
  twelveMonth: >-
    Expand to plant-wide template libraries by end market and package type,
    benchmark approval-cycle bottlenecks across programs, and support
    second-line or second-facility handoffs inside the first paying account.
  twentyFourMonth: >-
    Launch adjacent modules for cross-site program transfer, supplier
    genealogy, and advanced-packaging change control, and sell into one nearby
    Japan/Malaysia-linked packaging hub beyond India.
  keyBets:
    - Read-only integration into tester, MES, and QA systems can be completed fast enough that pilots start in weeks rather than turning into custom IT projects.
    - Export buyers will accept passport-generated packs and linked evidence so long as the product still emits customer-specific PDFs.
    - First-wave plants have enough recurring qualification and requalification volume to justify plant-level subscription pricing.
    - Approval-history data from early customers will generalize across package types and adjacent Asian packaging hubs.
gtm:
  wedge: >-
    Land as the system that assembles one export program's qualification pack
    and requalification evidence faster than the plant can do manually, then
    expand from that program to every active qualification queue inside the
    same plant.
  channels:
    - Founder-led direct sales to plant GMs, heads of quality, and VP operations at Indian OSAT and ATMP ramps
    - Design-partner pilots brokered through MES integrators, semiconductor quality consultants, and manufacturing-data partners
    - Japan-linked ecosystem relationships around Renesas, Mitsui or AOI-adjacent networks, and skilling partners that can open cross-border export programs
  funnelTargets: "lead→qualified design partner 20-30%; design partner→paid pilot 50%+; pilot→annual plant contract 60%+ once one export program is live and 2-3 additional programs are queued"
  pricing: >-
    Annual subscription per active plant plus a usage tier by qualified chip
    program or export workflow, with paid onboarding and integration plus
    optional premium modules for second-facility transfer and change control.
    This aligns price to plant-wide approval pain and program volume, avoids
    seat-count dilution, and fits the buyer's existing quality and operations
    tooling budget better than a full MES project.
businessModel:
  revenueStreams:
    - Annual platform subscription per active plant
    - Paid onboarding, integration, and qualification-template setup
    - Expansion modules for multi-site transfer, supplier genealogy, and advanced-packaging change control
  unitOfValue: Per active plant / qualified chip program under passport management
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more qualified chip programs and requalification workflows within the initial plant
    - Expand from the first plant to a second facility or sister site once the approval template library is proven
    - Sell adjacent modules for supplier genealogy, transfer control, and advanced-packaging change management
strategyMap:
  northStarMetric: Median time from customer qualification request to customer-ready approval pack or requalification disposition
  inputMetrics:
    - Number of active chip programs managed by live package passports
    - Percentage of qualification packs delivered without a rejected documentation loop
    - Evidence-completeness score across lot, tester, deviation, and operator records
    - Pilot-to-annual conversion rate at design-partner plants
  moatsToBuild:
    - Customer-ready qualification template library mapped by end market, package type, and reviewer expectation
    - Longitudinal graph linking lots, deviations, process changes, and final approval outcomes
    - Benchmark data showing which evidence gaps and requalification paths most often stall approvals at greenfield OSAT ramps
  killCriteria:
    - Fewer than 2 of the first 5 target plants agree to a paid pilot within 9 months of founder outreach
    - Design-partner plants cannot expose enough authoritative data to achieve at least 90% evidence completeness on one live export program
    - Passport-generated packs fail to reduce qualification-pack turnaround or rejected documentation loops by at least 30% in the first 2 pilots
  mermaid: |
    flowchart LR
      Wedge[India first-export OSAT wedge] --> MVP[Read-only package passport MVP]
      MVP --> Proof[Faster approvals and fewer rejected packs]
      Proof --> Expansion[Multi-site transfer, change control, adjacent Asian hubs]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Real customer pain and a crisp workflow wedge, but the India-first buyer pool and unvalidated qualification frequency make this a diligence-heavy watchlist item rather than an immediate partner-meeting deal."
    whyBelieve: "Idea and research both point to a live approval bottleneck at greenfield OSAT ramps, and no named incumbent is built around the buyer-facing qualification pack itself."
    whyDoubt: "The three-year SOM is only $1.8M across four plants, and the key unknowns—qualification volume, system-of-record ownership, and digital-evidence acceptance—are still pre-customer assumptions."
    nextDiligence: "Get live qualification-queue data and one sample export pack from 4-6 target plants to verify event frequency, data completeness, and willingness to pay before underwriting even a pre-seed motion."
  firstCustomer:
    title: Head of Quality at a Gujarat-based OSAT plant
    profile: 300-1,500 employee Indian OSAT or ATMP site with active exports to Japan or Malaysia, 2-5 queued chip-program qualifications, and separate tester, MES, and QA records that are manually assembled into approval packs.
    trigger: A new export customer requests a qualification pack or a deviation forces requalification just as a second line or additional device program is ramping.
    buyer: Plant GM, VP Operations, or Head of Quality
    initialContract: Assumed $75k-$125k design-partner pilot for one export program and paid onboarding, converting to a $250k-$450k annual plant contract once 2-3 active programs and requalification workflows are managed in the platform.
  mustBeTrue:
    - Target plants run at least 6-8 new qualification or requalification events per quarter with enough pain that manual pack assembly delays shipments or line utilization.
    - One live export program can be integrated read-only across tester, MES, and QA systems in under 8 weeks without forcing a rip-and-replace MES project.
    - Japanese, Malaysian, or automotive buyers will accept passport-generated packs when the output preserves their current PDF approval format and adds drill-down evidence behind it.
    - A pilot can cut qualification-pack turnaround or rejected documentation loops by at least 30% within one quarter.
    - At least 2 of the first 5 target plants convert paid pilots into annual contracts and create credible reference accounts for adjacent hub expansion.
  diligenceQuestions:
    - What is the actual quarterly volume of qualification packs, requalifications, and documentation rework at 4-6 named target plants?
    - Which system of record owns tester data, deviation history, and customer document packs today, and how incomplete are those records?
    - Will the first buyer fund this from quality or operations budget, or does it require a separate IT or MES approval cycle?
    - What network boundary—cloud, customer-managed VPC, on-prem, or air-gapped—does a target plant require before approving a pilot?
    - Why does this remain a standalone workflow instead of a feature inside Critical Manufacturing, camLine, Siemens, PDF Solutions, or Tulip?
    - What specific expansion path turns a $6.8M SAM wedge into a larger company before incumbents bundle it?
operatingAssumptions:
  - assumption: Target OSAT and ATMP plants generate enough recurring qualification work to justify a dedicated workflow layer.
    basis: research.yaml
    validationTest: Collect queue logs and approval calendars from 4-6 target plants and confirm at least 6 recurring qualification or requalification events per quarter at 3 or more plants.
    decisionImpact: If event frequency is lower, narrow the wedge to the most documentation-heavy automotive or industrial programs or reposition the product as a services-heavy niche tool.
  - assumption: Existing tester, MES, and QA records are complete enough to build a trusted passport without writing back into production systems.
    basis: research.yaml
    validationTest: Run a read-only data audit on one design-partner line and require more than 90% completeness across lot, tester, deviation, and operator-signoff fields before pilot go-live.
    decisionImpact: If data is too incomplete, the roadmap must add shop-floor data capture or deeper MES and QMS integration, increasing services burden and lowering gross-margin potential.
  - assumption: Export customers will accept a hybrid evidence model of a traditional PDF pack plus linked digital genealogy.
    basis: research.yaml
    validationTest: Review one generated pack with a Japanese or Malaysian customer-quality contact and capture whether it can satisfy an approval or requalification step without manual rebuilding.
    decisionImpact: If customers insist on bespoke manual packs, the product becomes a document-prep aid rather than a system of record and pricing power falls.
  - assumption: The first economic buyer will purchase from plant quality or operations budget using plant-level subscription plus onboarding pricing.
    basis: idea.yaml
    validationTest: Map current spend and signer roles across 5 discovery calls and secure one signed pilot SOW without bundling into a broader MES procurement.
    decisionImpact: If purchase must ride a full MES or IT transformation, sales cycles lengthen and the company must pursue channel-led deals instead of direct founder sales.
  - assumption: India design-partner proof can be reused in at least one adjacent Japan or Malaysia-linked packaging hub within 24 months.
    basis: operator judgment
    validationTest: Use 2 India case studies to open 8-10 discovery conversations outside India and secure at least 1 paid proof of concept in an adjacent hub by month 18-24.
    decisionImpact: If expansion does not travel, the company stays trapped in a $6.8M SAM and likely becomes a niche tool rather than a fundable platform.
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: Collect qualification-queue, PPAP or approval-calendar, and requalification logs from 4-6 target Indian OSAT and ATMP plants.
    hypothesis: At least 3 plants have 6 or more recurring qualification or requalification events per quarter that create measurable documentation bottlenecks.
    successMetric: 3 or more plants confirm 6 or more quarterly events and provide one anonymized current-state pack or process map.
    owner: Founder / Head of GTM
  - horizon: "0-90 days"
    experiment: Map current systems of record for tester, MES, QA, deviation, and document workflows at the first 3 design-partner candidates.
    hypothesis: A read-only data path exists that covers the minimum evidence needed for one export-program passport.
    successMetric: At least 2 candidate plants expose a viable read-only integration map without requiring MES replacement.
    owner: Founding engineer / solutions lead
  - horizon: "3-6 months"
    experiment: Deploy the MVP on one live export program at a design-partner plant and generate parallel manual versus passport qualification packs.
    hypothesis: Passport assembly cuts pack turnaround and rejected documentation loops versus the manual process.
    successMetric: 30% or more faster turnaround or 50% or more fewer rejected documentation loops on the pilot program.
    owner: Founding engineer
  - horizon: "3-6 months"
    experiment: Run buyer review sessions with Japanese, Malaysian, or automotive customer-quality stakeholders using the passport-generated PDF plus drill-down evidence.
    hypothesis: Buyers will accept the hybrid output without requiring full manual reconstruction.
    successMetric: At least 1 external or proxy reviewer approves the format for a real qualification or requalification checkpoint.
    owner: Founder / quality domain lead
  - horizon: "6-12 months"
    experiment: Convert 2-3 design partners from one-program pilots to plant-level annual contracts covering multiple active chip programs.
    hypothesis: Plant-level subscription pricing is justified once multiple queued programs and requalification workflows are live.
    successMetric: 2 signed annual contracts and expansion from 1 to 3 or more active programs inside at least 1 plant.
    owner: Founder / Head of GTM
  - horizon: "12-18 months"
    experiment: Pilot second-line or second-facility transfer workflows and open one adjacent packaging-hub account outside India.
    hypothesis: The approval-history dataset and template library travel beyond the first India export wedge.
    successMetric: 1 paid expansion module or 1 paid proof of concept outside India by month 18.
    owner: Solutions lead / founder
operations:
  - Read-only integration and evidence-completeness audit before every deployment, with no write-back into production systems in the first phase.
  - Customer-specific PDF pack templates and approval routing maintained centrally but versioned per plant, package type, and end market.
  - Customer-managed VPC or on-prem connector options prepared for export-program accounts that will not allow shared-cloud data handling.
  - MES, test-data, and semiconductor quality-consulting partners used as rollout allies rather than treated as system-replacement targets.
team:
  - role: Founding eng
    startTiming: "Month 0"
    rationale: The evidence graph, read-only connectors, and qualification-pack assembly engine are the technical core of the MVP and must exist before any design-partner pilot can run.
  - role: Founder / semiconductor quality lead
    startTiming: "Month 0"
    rationale: Credibility with plant GMs and quality leaders depends on someone who can speak PPAP-style evidence, deviation control, and export approvals in the customer's own operating language.
  - role: Solutions and integration engineer
    startTiming: "Month 2-3"
    rationale: Pilots will fail without a dedicated owner for tester, MES, QA, and deployment mapping across each plant's existing systems.
  - role: Founding sales / design-partner lead
    startTiming: "Month 4-6"
    rationale: The buyer pool is concentrated and relationship-driven, so a dedicated operator is needed to run founder-led sales, partner channels, and pilot expansion in parallel.
  - role: Second product and data engineer
    startTiming: "Month 6-9"
    rationale: The template library, benchmarking layer, and second-facility transfer workflows need dedicated productization after the first design partner validates the core passport.
milestones:
  - horizon: "0-12 months"
    items:
      - Sign 2-3 design partners and deploy one live export-program MVP.
      - Demonstrate 30% or more faster qualification-pack turnaround or 50% or more fewer rejected documentation loops at one plant.
      - Confirm buyer budget owner, deployment boundary, and data completeness across 4-6 target plants.
      - Convert at least 1 pilot into an annual plant contract.
  - horizon: "12-24 months"
    items:
      - Reach 2-3 annual plant contracts at roughly $250k-$450k blended ARR per plant.
      - Support 3 or more active chip programs and requalification workflows inside at least 1 customer account.
      - Ship second-line or second-facility transfer support and a validated customer-managed VPC or on-prem deployment pattern.
      - Win the first adjacent packaging-hub proof of concept outside India.
  - horizon: "24-36 months"
    items:
      - Reach the researched year-3 SOM target of 4 plants and roughly $1.8M ARR.
      - Launch supplier genealogy and advanced-packaging change-control modules.
      - Establish the approval-template and benchmark dataset as the expansion layer into adjacent Asian packaging hubs.
risks:
  - risk: Data integrity across tester, MES, QA, and operator systems may be too inconsistent for a trusted package passport.
    likelihood: High
    impact: High
    mitigation: Start read-only, score evidence completeness before go-live, and limit the first pilot to the highest-trust systems and one export program.
  - risk: Export buyers may insist on bespoke manual packs or reject linked digital evidence behind the PDF.
    likelihood: High
    impact: High
    mitigation: Output legacy-ready PDFs first, keep a human approval layer, and validate the format with an external or proxy reviewer before scaling automation.
  - risk: The India-first buyer pool is concentrated and ramp timing can slip, leaving too few near-term accounts.
    likelihood: Medium
    impact: High
    mitigation: Keep burn matched to a pre-seed design-partner plan, pursue Micron, Tata, Kaynes, and CG-class accounts in parallel, and test adjacent Japan or Malaysia-linked hub expansion early.
  - risk: MES, yield, or low-code incumbents can bundle basic qualification-pack workflow once the wedge is proven.
    likelihood: Medium
    impact: Medium
    mitigation: Own the cross-system approval graph, the customer-ready template library, and the requalification benchmark dataset, while partnering with incumbent data layers instead of replacing them.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months to build the read-only, customer-accepted MVP, prove data completeness and buyer acceptance at 2-3 design-partner plants, convert at least 2 pilots into annual plant contracts, and test whether second-facility transfer plus adjacent Asian hub expansion can grow beyond the India-first wedge before a seed round.
