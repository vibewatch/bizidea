problem: >-
  新建 OSAT 工厂常常在还没有成熟的内部认证、偏差处理和客户审计举证流程时，就已经
  开始出货芯片。桑纳德这类工厂要同时服务汽车、消费电子、工业设备、电信、电动车、
  网络和物联网项目，每一种新的产品-客户组合，都会带来新的举证负担——批次谱系、测
  试结果、工艺稳定性和出口就绪状态都要证明。如今这些证据分散在设备日志、QA 表格
  和 PDF 文件包里，审批周期因此被拖长，一批出问题的批次就可能冻结利润攸关的产线
  产能。
targetUser:
  primary: >-
    一家 300-1500 人规模的印度 OSAT 工厂的质量或 NPI 负责人，正在汽车、工业、电
    信或物联网芯片产线上推进首批出口项目
  secondary: >-
    负责批次谱系、复验认证和客户审计就绪状态的工艺与测试工程负责人
  buyer: 工厂总经理、运营副总裁，或质量负责人
startupThesis:
  nonObviousInsight: >-
    印度半导体的开局，主要不是一个建厂的故事，而是一个封装测试认证的故事。OSAT
    一旦投产，稀缺的资源就不只是设备或补贴，而是能否把产线数据、操作员动作和偏差
    历史，足够快地转化为客户信得过的证据，从而让出口和新项目不停下来。
  beachhead: >-
    印度 OSAT 工厂正用一支精简的质量和工艺团队，向日本或马来西亚推进首批出口项
    目，同时在汽车、电信、工业和物联网终端市场认证新的芯片产线
  wedge: >-
    一套封装护照工作流，摄入批次历史、测试结果、偏差记录和操作员签核，然后为每
    个新芯片项目自动生成客户专属认证资料包和复验认证轨迹
  whyNowCatalyst: >-
    CG Semi 已经开始商业化投产、出口了首批产品，并在一场以 OSAT 为核心的国家级
    推进中开始向数十亿级产能扩张，这让人工认证流程从一个未来问题变成了一个当下
    瓶颈。
  ventureScalePath: >-
    从一家工厂的首个出口项目认证工作流起步，随后扩展到偏差管控、多厂区转移、供
    应商谱系和先进封装变更管理，覆盖印度及其他新兴半导体产能中心。
solution: >-
  Package Passport OS 架设在现有测试机、质量和产线记录之上，为每个芯片项目建立
  一张实时证据图谱。它摄入批次历史、测试结果、偏差记录、操作员签核和客户专属认
  证要求，然后自动生成一份日本或马来西亚买家真正想看到的审批资料包。一旦出现良
  率异常或退货批次，产品会追溯是哪个工艺窗口、设备或班次发生了变化，并启动一套
  受控的复验认证流程，而不是让团队再回去翻邮件考古。首次部署只覆盖一家工厂的一
  个出口项目，以审批耗时和被驳回文档循环次数作为衡量指标。随着时间推移，同一张
  图谱会成为跨产线转移、第二工厂爬产和多厂区客户审计的记录系统。
