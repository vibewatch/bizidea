topRisks:
  - name: 数据完整性缺口
    description: >-
      如果产线、测试机或 QA 记录不完整，客户可能不足以信任封装护照，无法据此
      做出审批决定。
    mitigation: >-
      先做只读接入，为证据完整度打分，在自动化任何审批流程之前，先整合可信度
      最高的数据源。
  - name: 滩头市场集中度过高
    description: >-
      印度第一波 OSAT 产能爬坡可能只会带来少量近期买家，这可能在品类做大之前
      拖慢营收增长。
    mitigation: >-
      用印度的共创客户作为验证案例，再向其他新建 OSAT 产能和多厂区转移工作流
      扩展，那些地方存在同样的认证痛点。
  - name: 被现有系统吸收
    description: >-
      MES 或质量套件厂商可能加入基础的认证文档管理功能，让这个品类看起来只是
      个附加特性。
    mitigation: >-
      牢牢占住跨系统客户审批工作流、审批历史图谱，以及工厂系统目前没能很好覆
      盖的出口专属复验认证逻辑。
