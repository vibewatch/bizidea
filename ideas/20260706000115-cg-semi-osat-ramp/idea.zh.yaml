    跟不上人工证据收集节奏之前就已经启动
  currentAlternative: >-
    MES 报表、Excel 追踪表、堆满 PDF 认证资料包的共享盘、设备厂商日志，以及质
    量、工艺和测试团队之间的人工邮件协调
  switchingReason: >-
    产品把原本要花几周时间东拼西凑的证据收集，变成一份带批次谱系和偏差历史的实
    时封装护照，帮客户更快拿下审批，也能用事实而不是返工去为被拒批次辩护
  pricingHypothesis: >-
    按在用工厂收取年度订阅费，再叠加按已认证芯片项目数计费的用量档位，并对接入
    测试机、产线和 QA 数据收取一次性付费实施费用
