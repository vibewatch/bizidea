jobsToBeDone:
  - job: >-
      当首个出口客户为新芯片项目要求举证时，帮我们的质量团队快速拼出批次、测试
      和偏差证据，让他们不用花几周时间做表格和 PDF 就能拿下审批。
    currentAlternative: >-
      手工把 MES 导出数据、QA 文件和邮件审批拼凑成一次性认证资料包
    successMetric: >-
      从举证请求到出具客户可用认证资料包的耗时至少缩短 50%
  - job: >-
      当一个批次被质疑，或出现工艺异常时，帮我们的工艺团队快速追溯变化并启动复
      验认证，让他们能保住产线正常运转和后续出货。
    currentAlternative: >-
      依靠邮件在设备日志、QA 表格和经验知识里做根因排查
    successMetric: >-
      根因排查和复验认证周期从数天缩短到当班或次日解决
