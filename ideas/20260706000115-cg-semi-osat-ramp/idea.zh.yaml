  firstCustomer: >-
    一家总部在古吉拉特邦的 OSAT 工厂的质量负责人，正在向日本或马来西亚出口，手
    上排着 2-5 个待认证的新芯片项目，而且没有一套系统把测试机、批次和操作员资质
    数据整合进客户审批资料包
  buyingTrigger: >-
