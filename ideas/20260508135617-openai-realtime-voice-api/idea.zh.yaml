topRisks:
  - name: 平台吸收
    description: OpenAI 或 CCaaS 厂商可能会把基础评测和监控能力直接做进自家语音栈。
    mitigation: 往跨厂商证据、工作流级仿真和运营 QA 工具挖得更深，这些横向平台大概率不会优先做细。
  - name: 生产部署推进偏慢
    description: 很多客服中心可能会把 AI 语音长期停留在小规模试点，预算扩张因此被拖后。
    mitigation: 先卖给已经在跑试点、又被保障问题卡住上线的团队，并按节省的 QA 人力和客户错误成本来定价。
  - name: 多语言准确性基准很难打稳
    description: 如果产品不能在口音差异和语言切换场景里稳定衡量翻译质量与动作正确性，信任会很快掉下去。
    mitigation: 先从一个语言对和一小套意图库起步，用人工复核的 gold set 打底，只有在缺陷下降能量化证明后再扩覆盖面。
