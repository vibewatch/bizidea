jobsToBeDone:
  - job: 当我们把 AI 语音上线到多语言订票支持电话时，帮 QA 团队证明代理准确翻译了政策、也执行了正确的预订动作，这样我们才能把通话量从人工坐席转过去，又不把客户升级投诉一起抬高。
    currentAlternative: 对录音电话做人工抽样，再配合 Excel 测试场景
    successMetric: 每千次 AI 对话里的政策或翻译缺陷数下降
  - job: 当实时 AI 通话开始偏离批准话术或工作流规则时，帮主管在客户收到错误承诺前就发现问题，这样他们既能保住自动化，又能控住退款和返工。
    currentAlternative: 事后 QA 复盘加粗粒度的人工兜底规则
    successMetric: 在影响客户结果之前被拦截的高风险通话占比
