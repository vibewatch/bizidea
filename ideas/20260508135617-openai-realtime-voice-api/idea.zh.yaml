topRisks:
- name: "平台吸收"
  description: "OpenAI或CCaaS供应商可将基本评价和监测功能直接添加到其语音堆中。"
  mitigation: "更深入地研究跨供应商证据,工作流程特定模拟,以及操作性QA工具,横向平台不太可能优先排序."
- name: "正式上线推进缓慢"
  description: "许多联系中心可能会让AI在小试点中的声音比预期的要长,从而推迟了预算的扩展."
  mitigation: "将发射阻断的保证使用案例和价格首先出售给活跃的试点,以抵挡避免的质量保证劳工和客户-侵权成本。"
- name: "多语言准确性基准难建立"
  description: "如果产品不能可靠地测量翻译质量和跨口音和代码切换的动作正确性,信任就会被迅速侵蚀."
  mitigation: "以一对语言和狭义的意向书库为起步,使用人文审查过的金相套,并只在证明了可以衡量的缺陷减少后才能扩大覆盖范围."
