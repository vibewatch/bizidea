scenarios:
  downside:
    description: Slower security review and lower pricing keep the company at 9 production logos by Y3 exit instead of 12.
    y3RevenueK: 987.5
    y3EbitdaK: -895.7
    cashLowPointK: -355.9
    keyAssumptionChanges:
      - Production ACV falls from 170K to 150K as buyers frame the product as narrower monitoring.
      - New customer timing slips to 5 logos by M24 and 9 by M36 because pilot-to-production conversion slows.
      - The second AE still arrives in Y3, so spend stays similar while revenue lags.
  base:
    description: Founder-led pilots convert steadily, the travel wedge reaches 6 production logos by M24, and adjacent expansion lifts the company to 12 logos by Y3 exit.
    y3RevenueK: 1530.0
    y3EbitdaK: -515.9
    cashLowPointK: 173.7
    keyAssumptionChanges:
      - Production ACV holds at 170K inside the BP pricing range.
      - Customer ramp follows A10 to 6 logos by M24 and 12 by M36.
      - Hiring follows A20 with only one added engineer, one implementation manager, and one second AE beyond the BP core team.
  upside:
    description: Faster pilot conversion and slightly richer expansion pricing take the company to 14 production logos by Y3 exit with materially better cash retention.
    y3RevenueK: 2035.1
    y3EbitdaK: -162.4
    cashLowPointK: 739.6
    keyAssumptionChanges:
      - Production ACV rises from 170K to 185K as more queues and workflows attach.
      - Customer ramp reaches 8 production logos by M24 and 14 by M36.
      - Partner referrals shorten the sales cycle without requiring extra headcount beyond the base plan.
sensitivity:
  - variable: ARPU
    downsideCase: ACV settles at 150K because buyers treat the product as a narrow launch tool.
    baseCase: ACV holds at 170K, inside the stated BP production range.
    upsideCase: ACV reaches 185K as additional queues and benchmark reporting attach.
    y3RevenueImpactK: -180.0
    cashImpactK: -126.0
  - variable: CAC
    downsideCase: CAC rises to 70K because outbound meetings convert less efficiently than expected.
    baseCase: CAC is 55K with founder-led enterprise selling plus design-partner referrals.
    upsideCase: CAC drops to 45K once partner-led sourcing starts contributing meaningfully.
    y3RevenueImpactK: -141.7
    cashImpactK: -180.0
  - variable: churn
    downsideCase: Monthly churn rises to 2.5% because launch-blocking trust takes longer to earn.
    baseCase: Monthly churn is 1.5% for an integration-heavy enterprise workflow.
    upsideCase: Monthly churn falls to 1.0% once evidence and supervisor workflows are embedded.
    y3RevenueImpactK: -95.0
    cashImpactK: -82.0
  - variable: sales cycle
    downsideCase: Pilot-to-production stretches to 6-7 months because security and telephony review slow deals.
    baseCase: Pilot-to-production takes about 4-5 months including one paid pilot.
    upsideCase: Referrals and repeatable architecture reviews shorten the cycle to 3-4 months.
    y3RevenueImpactK: -212.5
    cashImpactK: -184.0
  - variable: gross margin
    downsideCase: Gross margin lands at 65% because model inference and support costs stay elevated.
    baseCase: Gross margin stays at the BP target of 70%.
    upsideCase: Gross margin reaches 75% after supported stacks and replay workflows become more efficient.
    y3RevenueImpactK: 0.0
    cashImpactK: -76.5
  - variable: hiring pace
    downsideCase: The second AE is hired two quarters early before repeatability is proven.
    baseCase: Hiring follows A20 and stays behind demand until customers convert.
    upsideCase: The second AE slips one quarter later with no material revenue loss because referrals carry pipeline.
    y3RevenueImpactK: 0.0
    cashImpactK: -78.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: The base case reaches 1.53M of Y3 revenue by converting travel voice pilots into 12 production logos at 170K ACV with expansion beginning only in Y3.
  - checkName: Must go right
    finding: The team must turn the first paid pilots into 6 production travel logos by M24 without security review or integrations becoming services-heavy.
  - checkName: Model breaks if
    finding: The downside case shows that slower pilot conversion plus 150K ACV drives Y3 cash to negative 355.9K, so pricing and sales-cycle discipline matter most.
  - checkName: Next-round proof
    finding: Seed readiness comes from 6 production travel logos, sub-45-day deployments, and referenceable expansion evidence before the 30-month funding window ends.
sanityChecks:
  ruleOf40: Y3 growth 140.0% + EBITDA margin -33.7% = 106.3%.
  burnMultiple: Y3 net burn 515.9K / net new ARR 1020.0K = 0.51x.
  revenuePerFte: 170.0K Y3 using 9 ending FTE (benchmark 200-400K SaaS).
  flags:
    - Base case remains EBITDA negative in Y3, so the company still needs to raise a seed round before year-end cash falls below roughly 200K.
    - Revenue per FTE is below mature SaaS benchmarks because the model keeps technical and implementation capacity ahead of scale to protect launch credibility.
    - The base case excludes paid pilot, usage, and services revenue even though the BP names those revenue streams, so early topline is conservative.
    - The travel beachhead is narrow, so adjacent vertical expansion must start in Y3 for the company to support venture-style post-seed growth.
