slug: multilingual-voice-assurance-layer
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: month
    source: '[BP fundingAsk runwayMonths 18] 假设 pre-seed 在计划日期后约 60 天完成交割。'
  - id: A2
    name: pre-seed 到账后的期初现金
    value: '2.3'
    unit: USDM
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情形按 $2.3M 融资建模，覆盖下一阶段里程碑并预留缓冲。'
  - id: A3
    name: 生产级 ACV
    value: '170.0'
    unit: USDK per customer per year
    source: '[BP gtm.pricing $150k-$250k production ARR] 基准情形采用偏保守的低中位 ACV，对应第一个狭窄切口。'
  - id: A4
    name: 收入确认政策
    value: 基准情形收入不计入付费试点、超额用量和高级仿真套餐
    unit: policy
    source: '[BP gtm.pricing; BP businessModel revenueStreams] 基准情形只把经常性生产订阅算进收入，这样 customers × ARPU 能干净对上。'
  - id: A5
    name: 目标毛利率
    value: '70'
    unit: percent
    source: '[BP businessModel targetGrossMarginPct]'
  - id: A6
    name: 月度流失率
    value: '1.5'
    unit: percent
    source: '[Startup-finance heuristic: early enterprise SaaS with sticky integrations but still-unproven category fit]'
  - id: A7
    name: 第一年末生产客户数
    value: '1'
    unit: count
    source: '[BP milestones 0-12 months] 锚定为在第一年内转出首个生产客户。'
  - id: A8
    name: 第二年末生产客户数
    value: '6'
    unit: count
    source: '[BP milestones 12-24 months; Research market.som] 采用计划里写明的 6 个旅游 logo 目标。'
  - id: A9
    name: 第三年末生产客户数
    value: '12'
    unit: count
    source: '[BP milestones 24-36 months] 采用 12-15 个生产 logo 目标的下限，覆盖旅游加一个相邻垂类。'
  - id: A10
    name: 生产客户爬坡时点
    value: M12, M14, M16, M18, M21, M23, M26, M28, M30, M32, M34, M36
    unit: timing
    source: '[BP milestones; BP gtm funnelTargets] 按创始人主导的企业试点销售节奏排布，前期转化更慢，Y3 扩张更稳。'
  - id: A11
    name: 创始人/CEO 全包现金薪酬
    value: '132.0'
    unit: USDK per year
    source: '[BP team Founder/CEO] 创业财务经验值，对应低于市场价的创始人工资加社保负担。'
  - id: A12
    name: 创始工程师全包现金薪酬
    value: '180.0'
    unit: USDK per year
    source: '[BP team Founding eng] 创业财务经验值，对应 pre-seed 阶段资深后端/平台工程师。'
  - id: A13
    name: 产品与集成工程师全包现金薪酬
    value: '168.0'
    unit: USDK per year
    source: '[BP team Product and integration engineer] 创业财务经验值，对应一名全栈集成工程师加社保负担。'
  - id: A14
    name: 双语 QA 与评测负责人全包现金薪酬
    value: '126.0'
    unit: USDK per year
    source: '[BP team Bilingual QA and eval lead] 创业财务经验值，对应专门做 QA/评测的负责人。'
  - id: A15
    name: 实施与安全负责人全包现金薪酬
    value: '144.0'
    unit: USDK per year
    source: '[BP team Implementation and security lead] 创业财务经验值，对应部署/安全专家。'
  - id: A16
    name: 客户经理或伙伴负责人全包现金薪酬
    value: '156.0'
    unit: USDK per year
    source: '[BP team Account executive or partner lead] 创业财务经验值，对应带浮动激励的企业销售/伙伴负责人。'
  - id: A17
    name: 额外工程招聘全包现金薪酬
    value: '168.0'
    unit: USDK per year
    source: '[BP product twelveMonth and twentyFourMonth] 创业财务经验值，在首个生产验证后追加一名工程师拓宽运行时覆盖。'
  - id: A18
    name: 客户实施经理全包现金薪酬
    value: '132.0'
    unit: USDK per year
    source: '[BP milestones 12-24 months deployment time under 45 days] 创业财务经验值，对应客户侧实施角色。'
  - id: A19
    name: 第二名销售全包现金薪酬
    value: '156.0'
    unit: USDK per year
    source: '[BP milestones 24-36 months partner-assisted deployment motion] 创业财务经验值，只在可重复性提升后增加第二名销售。'
  - id: A20
    name: 招聘节奏
    value: M1 founder+founding eng; M3 product/integration eng; M6 bilingual QA; M9 implementation/security; M11 AE1; M16 eng2; M20 implementation manager; M28 AE2
    unit: timing
    source: '[BP team startTiming] 招聘压在关键验证点之后，只额外增加两名计划外扩张岗位以支撑 Y2-Y3 执行。'
  - id: A21
    name: 非薪酬研发工具预算
    value: M1-M5 每月 4K；M6-M15 为 5K；M16-M27 为 6K；M28-M36 为 7K
    unit: USDK per month
    source: '[Startup-finance heuristic: lean AI/SaaS tooling budget with inference cost held in COGS]'
  - id: A22
    name: 非薪酬销售与市场预算
    value: AE1 到岗前每月 5K；AE1 到岗后 7K；AE2 到岗后 10K
    unit: USDK per month
    source: '[BP gtm founder-led outbound and partner referrals] 创业财务经验值，覆盖差旅、活动、销售工具和伙伴拓展。'
  - id: A23
    name: 非薪酬 G&A 预算
    value: Y1 每月 4K；Y2 每月 5K；Y3 每月 6K
    unit: USDK per month
    source: '[Startup-finance heuristic: lean legal, finance, insurance, and admin stack]'
  - id: A24
    name: 薪酬分摊政策
    value: 创始人和销售岗位 100% 计入 S&M；工程师和 QA 100% 计入 R&D；实施/安全 50% 计入 R&D、50% 计入 G&A；实施经理 100% 计入 G&A
    unit: allocation
    source: '[BP team rationales] 反映了创始人主导销售和早期客户部署很重的真实用时结构。'
  - id: A25
    name: 每个生产 logo 的 CAC
    value: '55.0'
    unit: USDK per customer
    source: '[BP gtm channels and funnelTargets] 创业财务经验值，对应狭窄垂类里创始人主导的企业 outbound 加 design-partner 转介绍。'
  - id: A26
    name: 融资缓冲
    value: '500.0'
    unit: USDK
    source: '[Modeling instruction + startup-finance heuristic] 在达到第二年 seed 就绪里程碑后，额外预留 6 个月 burn。'
  - id: A27
    name: 现金转换假设
    value: EBITDA 近似代表现金变动
    unit: policy
    source: '[Startup-finance heuristic] 模型不计债务、capex 或显著营运资本波动，因为这是一家 pre-seed 软件公司。'
