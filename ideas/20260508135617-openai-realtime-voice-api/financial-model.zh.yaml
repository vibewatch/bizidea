scenarios:
  downside:
    description: 安全评审更慢、定价更低，使公司在 Y3 结束时只能做到 9 个生产 logo，而不是 12 个。
    y3RevenueK: 987.5
    y3EbitdaK: -895.7
    cashLowPointK: -355.9
    keyAssumptionChanges:
      - 生产 ACV 从 170K 降到 150K，因为买家把产品视作更窄的监控工具。
      - 新客户时点拖慢，到 M24 只有 5 个 logo，M36 才到 9 个，因为试点转生产变慢。
      - 第二名 AE 仍在 Y3 到岗，所以支出基本不变，但收入落后更多。
  base:
    description: 创始人主导的试点稳定转化，旅游切口在 M24 达到 6 个生产 logo，而相邻场景扩张把公司在 Y3 末推到 12 个 logo。
    y3RevenueK: 1530.0
    y3EbitdaK: -515.9
    cashLowPointK: 173.7
    keyAssumptionChanges:
      - 生产 ACV 稳在 170K，处于 BP 设定的生产定价区间内。
      - 客户爬坡按 A10 执行，M24 达到 6 个 logo，M36 达到 12 个。
      - 招聘按 A20 推进，除 BP 核心团队外，只增加 1 名工程师、1 名实施经理和第 2 名 AE。
  upside:
    description: 试点转化更快，扩张定价也略高，使公司在 Y3 末做到 14 个生产 logo，现金留存明显更好。
    y3RevenueK: 2035.1
    y3EbitdaK: -162.4
    cashLowPointK: 739.6
    keyAssumptionChanges:
      - 生产 ACV 从 170K 提升到 185K，因为附加了更多队列和工作流。
      - 客户爬坡到 M24 达 8 个生产 logo，M36 达 14 个。
      - 伙伴转介绍缩短了销售周期，而不需要在基准计划之外再增人。
sensitivity:
  - variable: ARPU
    downsideCase: ACV 稳在 150K，因为买家把产品视为狭窄的上线工具。
    baseCase: ACV 稳在 170K，位于 BP 给出的生产定价区间内。
    upsideCase: 随着更多队列和基准报告被打包进来，ACV 升到 185K。
    y3RevenueImpactK: -180.0
    cashImpactK: -126.0
  - variable: CAC
    downsideCase: CAC 升到 70K，因为 outbound 会议的转化效率低于预期。
    baseCase: CAC 为 55K，依靠创始人主导的企业销售和 design-partner 转介绍。
    upsideCase: 一旦伙伴渠道开始稳定供给线索，CAC 降到 45K。
    y3RevenueImpactK: -141.7
    cashImpactK: -180.0
  - variable: churn
    downsideCase: 月流失率升到 2.5%，因为买家对“卡上线”的信任建立得更慢。
    baseCase: 月流失率为 1.5%，符合一个集成黏性强的企业工作流。
    upsideCase: 一旦证据链和主管工作流嵌进去，月流失率降到 1.0%。
    y3RevenueImpactK: -95.0
    cashImpactK: -82.0
  - variable: sales cycle
    downsideCase: 试点转生产被拉长到 6-7 个月，因为安全和电话系统评审拖慢了交易。
    baseCase: 试点转生产约需 4-5 个月，其中包含一个付费试点。
    upsideCase: 转介绍和可重复的架构评审把周期压缩到 3-4 个月。
    y3RevenueImpactK: -212.5
    cashImpactK: -184.0
  - variable: gross margin
    downsideCase: 毛利率落在 65%，因为模型推理和支持成本迟迟降不下来。
    baseCase: 毛利率维持在 BP 目标的 70%。
    upsideCase: 支持栈和回放工作流效率提升后，毛利率可达 75%。
    y3RevenueImpactK: 0.0
    cashImpactK: -76.5
  - variable: hiring pace
    downsideCase: 在可重复性还没证明前，就提前两个季度招第二名 AE。
    baseCase: 招聘按 A20 推进，需求没转成客户前不提前加人。
    upsideCase: 第二名 AE 晚一个季度入职，而转介绍足够托住漏斗，因此收入基本不受影响。
    y3RevenueImpactK: 0.0
    cashImpactK: -78.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形在 Y3 做到 $1.53M 收入，路径是把旅游语音试点转成 12 个生产 logo，且真正的扩张要到 Y3 才开始发力。
  - checkName: 必须跑对的地方
    finding: 团队必须在 M24 前，把首批付费试点转成 6 个生产级旅游 logo，而且不能让安全评审或集成工作滑成重服务模式。
  - checkName: 模型会在哪种情况下失效
    finding: 悲观情形显示，只要试点转化变慢且 ACV 掉到 150K，Y3 现金就会掉到 -355.9K，因此最关键的是守住定价和销售周期纪律。
  - checkName: 下一轮融资要证明什么
    finding: seed 就绪的核心证据，是 6 个生产级旅游 logo、45 天以内的支持栈部署能力，以及在 30 个月资金窗口结束前拿到可背书的扩张案例。
sanityChecks:
  ruleOf40: Y3 growth 140.0% + EBITDA margin -33.7% = 106.3%.
  burnMultiple: Y3 net burn 515.9K / net new ARR 1020.0K = 0.51x.
  revenuePerFte: 170.0K Y3 using 9 ending FTE (benchmark 200-400K SaaS).
  flags:
    - 基准情形到 Y3 仍然是 EBITDA 为负，因此公司必须在年末现金掉到约 200K 以下前完成 seed 融资。
    - 每名 FTE 对应收入低于成熟 SaaS 基准，因为模型刻意让技术与实施能力先行，先把上线可信度守住。
    - 尽管 BP 里列出了付费试点、用量和服务收入，这个基准模型并没有把它们算进来，因此早期收入是偏保守的。
    - 旅游滩头市场本身不大，所以如果公司想支撑 post-seed 的风险资本增长曲线，就必须在 Y3 启动相邻垂类扩张。
