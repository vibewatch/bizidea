    cashLowPointK: 173.7
    keyAssumptionChanges:
    - "生产ACV在BP定价范围内持有170K."
    - "客户坡道沿A10至6个标识由M24,12由M36."
    - "雇佣跟随A20,只增加了一名工程师,一名执行经理,以及超过BP核心团队的一秒AE."
  upside:
    description: "更快的试点转换和略为更丰富的扩展定价使公司在Y3退出前达到14个生产标志,并切实地更好地保留现金."
