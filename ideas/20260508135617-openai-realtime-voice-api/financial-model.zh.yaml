- variable: "销售周期"
  downsideCase: "由于安全和电话审查缓慢,试制至生产时间可长达6至7个月。"
  baseCase: "试制到生产大约需要4至5个月,其中包括一名付费的试点."
  upsideCase: "转诊和可重复的结构审查将周期缩短为3至4个月。"
  y3RevenueImpactK: -212.5
  cashImpactK: -184.0
- variable: "毛额差值"
  downsideCase: "总比值为65%,因为模型推论和支助费用仍然较高。"
  baseCase: "总比值保持在国际收支70%的目标。"
  upsideCase: "在支持的堆栈和重放工作流程效率提高后,总比值会达到75%."
  y3RevenueImpactK: 0.0
  cashImpactK: -76.5
- variable: "征聘速度"
  downsideCase: "在证明可重复性之前,第二批AE提前了2/4。"
  baseCase: "雇佣跟随A20,在需求后站到客户转换."
  upsideCase: "四分之一后,第二个共同经营公司滑倒,没有因转诊携带管道而造成物质收入损失。"
  y3RevenueImpactK: 0.0
  cashImpactK: -78.0
modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: "收入引擎"
  finding: "该基案通过将旅行语音试点转换为170KACV的12个生产标志而达到1.53M的Y3收入,扩展仅从Y3开始."
- checkName: "一定要向右转"
  finding: "团队必须把第一批付费的试点变成M24的6个生产出行标识,而无需安全审查或整合成为服务重."
- checkName: "模式中断,如果"
  finding: "下行案例显示,较慢的试点转换加150KACV将Y3现金推向负355.9K,因此定价和销售周期纪律最为重要."
- checkName: "下一轮证明"
  finding: "种子准备状态来自6个生产出行标识,45天后部署,以及30个月供资窗口结束前的可参考扩展证据."
sanityChecks:
  ruleOf40: "Y3增长140.0% + EBITDA比值 -33.7% = 106.3%."
  burnMultiple: "Y3净燃烧 515.9K/净新ARR 102.0K=0.51x."
  revenuePerFte: "170.0K Y3使用9个收尾FTE(基准为200-400K SaaS)."
  flags:
  - "基案在Y3中仍然为EBITDA负数,因此该公司仍然需要在年终现金跌出约200K之前筹集一轮种子."
  - "由于该模式将技术和实施能力置于保护发射可信度的首位,因此每架FTE的收入低于成熟的SaaS基准。"
  - "基准案例排除了已支付的试点收入、使用收入和服务收入,尽管英国石油公司列出了这些收入流,因此早期的上线是保守的。"
  - "出行海滩头是狭长的,所以相邻的垂直扩张必须在Y3开始,以便公司支持风险式的种子后增长."
