  amountM: 2.3
  runwayMonths: 30
  milestone: 拿下 6 个生产级旅游 logo，把支持栈上的部署周期压到 45 天以内，并把首批付费试点转成可拿来背书的生产账户，同时在 seed 前留出 6 个月缓冲。
