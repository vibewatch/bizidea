topRisks:
  - name: Platform absorption
    description: OpenAI or CCaaS vendors could add basic evaluation and monitoring features directly into their voice stacks.
    mitigation: Go deeper on cross-vendor evidence, workflow-specific simulation, and operational QA tooling that horizontal platforms are unlikely to prioritize.
  - name: Slow production rollout
    description: Many contact centers may keep AI voice in small pilots longer than expected, delaying budget expansion.
    mitigation: Sell first into active pilots with a launch-blocking assurance use case and price against avoided QA labor and customer-error cost.
  - name: Hard multilingual accuracy benchmark
    description: If the product cannot reliably measure translation quality and action correctness across accents and code-switching, trust will erode quickly.
    mitigation: Start with one language pair and a narrow intent library, use human-reviewed gold sets, and expand coverage only after proving measurable defect reduction.
