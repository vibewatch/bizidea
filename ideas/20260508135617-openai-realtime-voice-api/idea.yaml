jobsToBeDone:
  - job: When we launch AI voice for multilingual booking-support calls, help our QA team prove the agent translated policy correctly and took the right reservation action, so we can shift volume off human agents without increasing customer escalations.
    currentAlternative: Manual sampling of recorded calls plus spreadsheet-based test scenarios
    successMetric: Reduction in policy or translation defects per thousand AI conversations
  - job: When a live AI call starts drifting from approved scripts or workflow rules, help our supervisors catch it before the customer receives a wrong promise, so they can preserve automation while controlling refunds and rework.
    currentAlternative: Post-call QA review and broad human fallback rules
    successMetric: Percentage of risky calls intercepted before customer-impacting resolution
