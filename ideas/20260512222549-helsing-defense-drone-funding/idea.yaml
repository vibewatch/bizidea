jobsToBeDone:
  - job: >-
      When our ministry contract reaches an acceptance milestone, help our
      program team assemble every required software, simulation, hardware, and
      training artifact, so we can clear the review without delaying fielding.
    currentAlternative: >-
      Program managers collecting evidence manually across Jira, PLM, email, and
      shared drives
    successMetric: Days from release candidate to acceptance approval
  - job: >-
      When autonomy software changes late in the cycle, help our verification
      lead understand what evidence must be rerun or refreshed, so we avoid
      shipping a blocked or non-compliant fleet increment.
    currentAlternative: >-
      Engineer-by-engineer spreadsheet tracking and manual release meetings
    successMetric: Percentage of release blockers detected before the formal milestone review
