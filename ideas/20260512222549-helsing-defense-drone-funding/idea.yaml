topRisks:
  - name: Classified workflow barrier
    description: Sensitive programs may refuse a new vendor unless deployment fits strict air-gap and residency requirements.
    mitigation: Offer EU-hosted and on-prem deployments, start with unclassified acceptance workflows, and integrate with existing secure engineering systems.
  - name: Incumbent tool sprawl wins by default
    description: Program teams may prefer extending PLM or ALM tools instead of adding a new system of record.
    mitigation: Position the product above existing systems as the contract-milestone layer, with fast integrations and visible time-to-acceptance ROI.
  - name: Customer concentration
    description: A few large programs could dominate revenue before the company reaches enough vendor diversity.
    mitigation: Land on one program per customer, then expand across multiple vehicle families, subcontractors, and adjacent European vendors early.
