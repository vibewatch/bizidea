problem: >-
  European autonomy vendors can now win very large drone and unmanned-systems
  contracts, but getting from award to fieldable fleet is still run through
  spreadsheets, Jira tickets, test folders, and ministry-specific acceptance
  checklists. Software versions, simulation evidence, payload configurations,
  operator training, and subcontractor hardware readiness live in different
  systems, so one missing artifact can delay a milestone or deployment window.
  As companies like Helsing move from AI software into full vehicles, program
  delivery becomes the new bottleneck.
targetUser:
  primary: >-
    VP Programs or program delivery director at a 100-1,000 person European
    unmanned-systems OEM or integrator with an active national drone contract
  secondary: >-
    Autonomy verification lead or fleet operations manager responsible for
    release evidence and acceptance readiness
  buyer: >-
    COO, GM of unmanned systems, or VP Programs at a European defense autonomy
    vendor
startupThesis:
  nonObviousInsight: >-
    Europe's constraint is no longer whether autonomy vendors can raise capital
    or win contracts; it is whether they can convert fast-changing software and
    hardware into ministry-acceptable fleet increments without losing weeks in
    evidence chasing. Once autonomy moves from AI software into drones and other
    unmanned systems, program-readiness software becomes as valuable as the
    autonomy stack itself.
  beachhead: >-
    Post-award release, simulation, and acceptance management for European
    unmanned-aircraft vendors delivering their first 50-500 autonomous aircraft
    under a national ministry contract
  wedge: >-
    A contract-to-fielding readiness control plane that links software versions,
    simulation runs, hardware batches, operator training, and acceptance
    documents into one auditable delivery packet
  whyNowCatalyst: >-
    Helsing's financing surge, product expansion into drones and other unmanned
    systems, and a named German drone contract show Europe is shifting from
    autonomy experimentation to scaled fielding right now.
  ventureScalePath: >-
    Start with drone-program readiness for one ministry contract, then expand
    into submarines, ground robots, and multi-prime autonomous programs,
    becoming the operating layer for acceptance, upgrades, sustainment, and
    cross-allied fleet readiness.
solution: >-
  The product ingests contract milestones, subsystem BOM changes, simulation
  outputs, software release notes, pilot training status, and supplier delivery
  records into one program graph. Instead of asking PMs to manually chase each
  team before an acceptance event, it flags missing evidence, maps every artifact
  to a contract clause, and assembles a ministry-ready release packet. A secure
  workflow layer tracks what changed between releases so program leaders can
  explain why a fleet increment is ready, delayed, or blocked. The first use
  case is narrow: compress the time between internal release candidate and
  customer acceptance milestone for one autonomous aircraft program. Over time,
  the system becomes the system of record for readiness across upgrades,
  sustainment, subcontractors, and adjacent autonomous platforms.
goToMarketSeed:
  firstCustomer: >-
    A 200-800 person German or Baltic unmanned-aircraft OEM with one newly
    awarded ministry contract, recurring autonomy software drops, and an
    acceptance milestone due within 120 days
  buyingTrigger: >-
    Contract award, option exercise, or upcoming acceptance review that forces
    the program team to consolidate simulation, configuration, and training
    evidence quickly
  currentAlternative: >-
    Jira and PLM tools plus spreadsheets, shared drives, manual test reports,
    and program-manager heroics
  switchingReason: >-
    The wedge reduces milestone slippage without replacing core engineering
    systems by turning scattered evidence into one auditable release packet tied
    to the contract
  pricingHypothesis: >-
    Annual platform fee per active program plus usage-based pricing tied to
    vehicle families, release packages, or acceptance milestones managed
