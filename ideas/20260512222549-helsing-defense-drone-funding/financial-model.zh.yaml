scenarios:
  downside:
    description: 更长的安全审查、更多定制工作和更弱的定价能力，会让公司长期停留在重服务模式。
    y3RevenueK: 1580.0
    y3EbitdaK: -1035.0
    cashLowPointK: 205.0
    keyAssumptionChanges:
    - 每个活跃项目的混合年收入降到 $205K。
    - 月度流失率升到 1.3%。
    - 有 2 个项目启动时间各自延后 1-2 个季度。
    - 由于主权云和本地部署持续高度定制，毛利率停在约 68%。
  base:
    description: 创始人主导销售把里程碑痛点转成可复用的项目年合同，再进入规模化招聘。
    y3RevenueK: 2029.0
    y3EbitdaK: -720.1
    cashLowPointK: 727.9
    keyAssumptionChanges:
    - 每个活跃项目的混合年收入维持在 $225K。
    - 月度流失率维持 1.0%。
    - 项目启动数分别为 Y1 的 3 个、Y2 的 5 个、Y3 的 4 个。
    - 随着模板复用改善，毛利率进入 70%-72% 区间。
  upside:
    description: 模板复用和伙伴转介绍会缩短销售周期，并减轻定制导入的拖累。
    y3RevenueK: 2475.0
    y3EbitdaK: -395.0
    cashLowPointK: 1140.0
    keyAssumptionChanges:
    - 每个活跃项目的混合年收入升到 $240K。
    - 月度流失率改善到 0.8%。
    - Y2 和 Y3 各多落 1 个项目启动。
    - 随着标准化安全部署模式更快跑通，毛利率可到 74%。
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃项目的混合年收入为 $205K
  baseCase: 每个活跃项目的混合年收入为 $225K
  upsideCase: 每个活跃项目的混合年收入为 $240K
  y3RevenueImpactK: -181.0
  cashImpactK: -145.0
- variable: CAC
  downsideCase: CAC 为 $135K，因为创始人主导的外呼拓客始终没有拿到伙伴杠杆
  baseCase: CAC 为 $110K
  upsideCase: 在咨询公司和生态转介绍加持下，CAC 降到 $90K
  y3RevenueImpactK: -95.0
  cashImpactK: -170.0
- variable: churn
  downsideCase: 月度流失率 1.3%，因为试点没能转成稳定的项目年合同
  baseCase: 月度流失率 1.0%
  upsideCase: 模板复用和嵌入式工作流提高留存后，月度流失率改善到 0.8%
  y3RevenueImpactK: -135.0
  cashImpactK: -155.0
- variable: sales cycle
  downsideCase: 安全审查和买方审批让成交时间再多出 1-2 个季度
  baseCase: 围绕真实里程碑的交易能在一个预算周期内签下
  upsideCase: 参考客户和伙伴关系把销售周期再缩短 1 个季度
  y3RevenueImpactK: -240.0
  cashImpactK: -320.0
- variable: gross margin
  downsideCase: 稳定态毛利率为 68%，因为 on-prem 工作始终高度定制
  baseCase: 稳定态毛利率为 70%-72%
  upsideCase: 在标准化安全部署模式下，稳定态毛利率可达 74%
  y3RevenueImpactK: 0.0
  cashImpactK: -190.0
- variable: hiring pace
  downsideCase: 在可重复性被证明前，就把 2 个 GTM 和实施岗位提前了 2 个季度
  baseCase: 招聘跟着验证节点和模板复用里程碑走
  upsideCase: 等收入转化改善后，再延后 1 个非关键岗位招聘
  y3RevenueImpactK: 0.0
  cashImpactK: -230.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts --> ReadinessAudits
      ReadinessAudits --> ActivePrograms
      ActivePrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下，Y3 约 $2.0M 的收入，主要来自活跃项目数从大约 3 个长到 10 个、且每个项目的混合收入为 $225K，而不是来自激进提价。
- checkName: 必须跑通的前提
  finding: 前两个付费共创客户必须转成年项目合同，并在 Y2 前做出由伙伴带动的参考案例，否则基础情景里的启动节奏就会断。
- checkName: 模型会失灵的情况
  finding: 如果安全部署始终高度定制，导致毛利率卡在 68% 以下，同时流失率升到 1.3% 以上，现金会迅速压向 downside 情景里接近 $0.2M 的低点。
- checkName: 下一轮融资证明点
  finding: 当公司做到 7-8 个活跃项目、两组可复用国防部模板族，以及 1 个伙伴主导部署，且手里仍有 6 个月现金时，下一轮融资才算真正站住。
sanityChecks:
  ruleOf40: Y3 增长 75.0% + EBITDA 利润率 -35.5% = 39.5%
  burnMultiple: Y3 burn multiple 为 0.8x（-$720.1K EBITDA / $869.3K 净新增收入）
  revenuePerFte: 按 Q4Y3 的 12 名 FTE 计算，Y3 每名员工对应收入为 $169K（SaaS 基准为 $200-400K）
  flags:
  - 由于模型在 Y3 仍保留一支偏重 solutions 的交付团队，所以每名员工收入依旧低于典型 SaaS 基准。
  - 模型到 Y3 结束时仍是 EBITDA 亏损，因此下一轮融资能否成立，取决于公司能否在继续扩人前证明模板复用在加快。
  - 模型假设月度流失率为 1.0%，但目前还没有真实续约 cohort；如果预算始终按项目走，真实留存可能更差。
  - 毛利率能否成立，取决于安全部署模式是否能真正标准化，而不是每个客户都要求定制主权云或本地部署方案。
