jobsToBeDone:
- job: 当我们的国防部合同走到验收里程碑时，帮项目团队把软件、仿真、硬件和培训材料一次收齐，这样我们就能过审而不耽误列装。
  currentAlternative: 项目经理在 Jira、PLM、邮件和共享盘之间手工收材料。
  successMetric: 从候选发布版本到验收批准的天数
- job: 当自主化软件在周期后段发生变更时，帮验证负责人立刻看清哪些证据必须重跑或刷新，避免把被卡住或不合规的机队增量发出去。
  currentAlternative: 工程师逐个维护电子表格，再靠手工发布会对齐。
  successMetric: 正式里程碑评审前识别出的发布阻塞项占比
