topRisks:
- name: 涉密工作流门槛
  description: 敏感项目可能不会接受新供应商，除非部署方式满足严格的隔离网和数据驻留要求。
  mitigation: 提供 EU 托管和本地部署版本，先从非涉密验收工作流切入，并接入客户现有的安全工程系统。
- name: 现有工具蔓延会天然占上风
  description: 项目团队可能更愿意在 PLM 或 ALM 工具上加功能，而不是再引入一套新的系统。
  mitigation: 把产品定位在现有系统之上，做“合同里程碑层”，同时用快速集成和清晰的验收提速 ROI 说服客户。
- name: 客户集中度过高
  description: 在公司拿到足够多元的厂商客户之前，少数几个大项目就可能吃掉大部分收入。
  mitigation: 每个客户先落一个项目，再尽早横向扩到多个机型族、分包商和相邻欧洲厂商。
