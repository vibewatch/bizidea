problem: 欧洲自主化厂商现在已经能拿下金额很大的无人机和无人系统合同，但从中标走到机队真正列装，流程还卡在 电子表格、Jira 工单、测试文件夹和各国防部自定义的验收清单里。软件版本、仿真证据、载荷配置、操作员培训和分包商硬件就绪状态分散在不同系统里，少一份材料，就可能拖掉一个里程碑或部署窗口。像 Helsing 这样的公司一旦从 AI 软件走向整机，项目交付就成了新的瓶颈。
targetUser:
  primary: 欧洲 100-1,000 人规模的无人系统 OEM 或系统集成商里的 VP Programs 或项目交付负责人，且手上已有国家级无人机合同在执行。
  secondary: 负责发布证据和验收就绪度的自主化验证负责人或机队运营经理。
  buyer: 欧洲国防自主化厂商里的 COO、无人系统 GM 或 VP Programs。
startupThesis:
  nonObviousInsight: 欧洲现在的约束，已经不是自主化厂商能不能融到资、拿到合同，而是能不能把快速变化的软件和硬件，及时转成各国防部认可的机队增量，而不是把几周时间耗在追材料上。自主化一旦从 AI 软件走向无人机和其他无人系统，项目就绪度软件的价值就会接近自主化技术栈本身。
  beachhead: 面向欧洲无人机厂商，在国家级国防部合同下交付首批 50-500 架自主飞行器时的中标后发布、仿真和验收管理。
  wedge: 一套从合同到列装的就绪度控制平面，把软件版本、仿真运行、硬件批次、操作员培训和验收文件串成一份可审计的交付包。
  whyNowCatalyst: Helsing 融资猛增、产品扩到无人机和其他无人系统，再加上一份点名披露的德国无人机合同，说明欧洲此刻正从自主化试验阶段转向规模化列装。
  ventureScalePath: 先从一份国防部无人机合同的项目就绪度切入，再扩到潜艇、地面机器人和多主承包方的自主化项目，最后变成验收、升级、保障和跨盟友机队就绪度的操作层。
solution: 产品把合同里程碑、子系统 BOM 变更、仿真输出、软件发布说明、飞手培训状态和供应商交付记录拉进同一张项目图谱。它不再让 PM 在验收前手工追每个团队，而是直接标出缺失证据，把每份材料映射到具体合同条款，并拼出一份面向国防部的发布包。安全工作流层会持续跟踪每次发布到底改了什么，让项目负责人能解释清楚：这次机队增量为什么已经就绪、为什么延迟，或者到底卡在哪。第一步用例很窄——把一个自主飞行器项目把内部候选发布版本到客户验收里程碑之间的时间压短。随着时间推移，这套系统会变成升级、保障、分包协同和相邻自主平台上的就绪度主记录系统。
goToMarketSeed:
  firstCustomer: 一家 200-800 人规模的德国或波罗的海无人机 OEM，刚拿下一份国防部合同，自主化软件持续迭代，且 120 天内就有验收里程碑要交。
  buyingTrigger: 合同中标、选项被执行，或临近验收评审，迫使项目团队必须在很短时间里把仿真、配置和培训证据收拢起来。
  currentAlternative: Jira、PLM 工具，再加电子表格、共享盘、手工测试报告和项目经理硬扛。
  switchingReason: 这个切口不需要替换核心工程系统，只是把分散证据收成一份挂在合同上的可审计发布包，从而减少里程碑滑点。
  pricingHypothesis: 按活跃项目收年平台费，再叠加按机型族、发布包或所管理验收里程碑计费的 用量挂钩定价。
