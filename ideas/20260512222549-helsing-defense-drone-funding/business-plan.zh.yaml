slug: autonomy-program-readiness-os
date: '2026-05-12'
executiveSummary: 欧洲无人机和自主化厂商现在拿到的合同已经大到让发布与验收执行变成董事会级瓶颈，但大多数中标后的就绪度工作，依旧散落在 PLM、Jira、电子表格、共享盘和项目经理手工追进度里。首个客户应是一家 200-800 人规模的德国、波罗的海或北欧无人机 OEM 或系统集成商：120 天内就有验收里程碑，且软件或载荷持续变动，必须回溯到具体合同条款。产品应从一层很窄的就绪度控制平面起步，把软件版本、仿真证据、硬件批次、操作员培训状态和批准文件拼成一份可审计发布包，同时不替换核心工程系统。GTM、定价和实施都要围绕“救回一个正在发生的项目里程碑”来组织：创始人亲自打单，买方是 VP Programs 或 COO，首个部署带服务，年度合同价格直接锚定一次滑点的代价。最关键的战略选择，是在产品证明自己能稳定缩短验收到达时间之前，始终站在供应商一侧，并只盯无人机场景，而不是过早扩到通用国防工作流或买方侧采购软件。真正的护城河，如果能形成，来自可复用的验收模板、阻塞项历史数据，以及接入现有工程系统的深度。风险也很清楚：市场是否愿意为一层独立覆盖软件买单仍未被验证，且模型里的软件 TAM 并不大，所以往多项目、供应商协同和相邻自主平台工作流扩张不是可选项，而是必答题。研究还留下两个必须尽快补齐的缺口：各国防部之间究竟有多少验收材料可以共用，以及首轮部署在证明价值的同时，有多少内容能保持在非涉密范围内。
problem:
- 欧洲无人系统厂商现在经常面对这样的合同里程碑：软件发布、仿真运行、载荷变更、硬件就绪、操作员培训和供应商输入，都得按时对齐，但相关证据依旧散落在割裂的工具和共享盘里。
- 少一份材料，或者配置晚改一次，就可能拖掉验收、收入确认和国防部信任；而这些项目本身已经大到足以产生实质影响，但大多数团队仍靠电子表格跟踪和人肉硬扛，而不是一套可审计的就绪度系统。
- 现有的 PLM、ALM 和采购套件只管了工作流的一部分，却没有把“合同里程碑”当成工作单元来设计，所以项目负责人始终缺少一套从发布走到列装的清晰控制平面。
solution:
- 做一层从合同到列装的就绪度覆盖层，把合同条款和验收清单映射到现有 PLM、ALM、仿真、培训和文档系统里的证据上。
- MVP 先抓最小闭环：标出缺失或过期材料、展示候选构建之间的发布差异，并为一个正在执行的无人机项目自动生成一份面向国防部的验收包，而不是逼客户把工程基础设施整套重构。
- 首批部署应带服务、范围收窄到一个机型族和一个临近里程碑，让公司先证明能缩短周期，再扩到供应商协同、保障维护和相邻自主平台。
whyWeWin:
- 产品锚定的是验收里程碑，而不是泛化工作流；这正是价值、风险和买方紧迫感同时汇聚的时点。
- 覆盖层架构也更贴合国防团队的采购方式：它可以坐在 Jira、PLM、ALM 和仿真工具之上，而不是要求客户在项目执行中途替换已深度扎根的系统。
- 每次部署都会沉淀一层新的条款到证据映射、国防部附件模板和阻塞项历史，这些数据并不是通用现有厂商天然会收集的。
- 市场正从自主化试验转向大规模机队列装，所以厂商真正需要的，不只是把工程做得更好，而是让自己在交付阶段也看起来像主承包商一样能打。
strategicChoices:
  beachhead: 面向欧洲无人机 OEM 和系统集成商，在国家级国防部或联盟支持合同下交付首批 50-500 架自主飞行器时的中标后发布、仿真和验收就绪度。
  wedgeRationale: 这个切口的用户、触发时点和 ROI 闭环都很清楚：最先感到痛的是 VP Programs；采购事件往往发生在 90-120 天内的验收评审前；成功标准则是一个在执行项目上，阻塞更少、从发布到批准更快。更宽泛的工作流产品、买方侧采购工具或多域就绪度平台，只会在公司还没拿到扩张资格前就把验证做散。
  sequencingRationale: 产品第一步应只做一个项目的发包组装、阻塞检测和发布差异可视化，因为这几项正是拿下首个客户、并生成可复用模板数据的前提。GTM 也应坚持创始人主导、带服务交付，直到团队真正摸清哪些国防部之间有足够共性，能做出可重复打法。招聘顺序也要跟着这个节奏走：先补实施和安全，再放大销售，因为在前 18 个月里，部署可信度和参考客户密度，比漏斗顶端流量更重要。
  notYet:
  - 面向国防部或 NATO 机构的买方侧采购分析
  - 完整替换 PLM 或 ALM
  - 涉密任务规划或指挥控制工作流
  - 在拿下 3 家无人机客户之前，不做地面、海上或多域自主化项目
  - 在至少两个欧洲国防部场景证明模板可复用之前，不做美国国防扩张
market:
  tam: $39.0M 的自下而上 TAM：约 120 个欧洲无人机/自主化项目团队 × 每队 1.3 个在列装中的活跃项目 × 一层就绪度软件约 $250k 的年 ACV。
  sam: $8.8M 的初始 SAM：约 35 个可触达的无人机厂商或系统集成商项目，分布在德国、英国、法国、北欧、波罗的海和荷兰，并且各自都有一个急迫的在执行项目。
  som: $2.0M 的第 3 年 SOM：一批共创客户跑通后，按约 8 个付费项目、每个项目约 $250k ACV 计算，并已为国防导入拖慢节奏做了折扣。
  segments:
  - 欧洲无人机 OEM 和系统集成商：100-1,000 名员工，正在执行国防部支持的无人机项目，自主化软件持续迭代
  - 在无人机滩头市场证明模板可复用后，再扩到海上、地面或多主承包自主化项目里的相邻厂商
  buyingProcess: 第一步销售动作应是由创始人带着项目负责人和验证负责人做就绪度审计，前提是 120 天内就有验收事件。经济买方通常是 COO、无人系统 GM 或 VP Programs；他们会在安全审查后，为一个单项目部署拨款。如果首份发布包比现状更快获批，或阻塞更少，就转成年度合同。
product:
  mvp: 先做一个面向单个在执行无人机项目的安全就绪度工作区，把合同里程碑、发布说明、仿真输出、硬件批次状态、培训完成情况和批准文件拉进来，然后生成一份可审计的验收包和阻塞项看板。第一阶段应优先消费现有系统导出的数据或 API 数据，而不是要求深度替换源系统。
  sixMonth: 6 个月内交付两套国防部模式的“条款到证据”映射模板、发布差异分析、基于角色的审批，以及对 1 套 PLM 或 ALM 工作流和 1 套仿真/验证栈的首批连接器。
  twelveMonth: 12 个月内加上供应商证据收集、按国家区分的附件模板、飞手培训状态跟踪，以及基于首批项目沉淀出的“最常卡住批准的材料缺口”基准报告。
  twentyFourMonth: 24 个月内从单项目控制扩到多项目组合视图、跨机型复用、保障与升级工作流，以及能够由同一张验收图谱治理列装就绪度的相邻自主平台项目。
  keyBets:
  - 只要覆盖层搭在现有工具之上，而不是替换它们，团队就能在 6 周内拿到第一份可用验收包。
  - 首批两到三个目标国防部之间，至少 60% 的证据结构可以复用，这样模板经济学才成立。
  - 阻塞项历史和发布差异数据会沉淀成一套差异化数据资产，既能提高下一次部署效率，也会抬高切换成本。
gtm:
  wedge: 把一个正在发生的项目就绪度部署卖给 90-120 天内就要验收的无人机 OEM 或系统集成商，定位成“在不动客户核心工程栈的前提下，把分散证据最快拼成合同可交付包”的工具。
  channels:
  - 创始人直接触达欧洲无人机 OEM 和系统集成商里的 VP Programs、COO 和验证负责人
  - 能联合售卖实施服务的国防工程、仿真和安全部署咨询公司
  - PLM、ALM 和自主化测试生态伙伴——他们更容易从覆盖层销售中受益，而不是推动整套替换
  - 能提前发现新中标或新执行项目的国防创新网络和采购顾问
  funnelTargets: 目标客户触达 -> 合格就绪度审计 20-30%；就绪度审计 -> 付费共创客户 30-40%；付费共创客户 -> 年度正式合同 50%+
  pricing: 按活跃项目年收费，而不是按席位：针对一个在执行项目，平台年费目标是 $150k-$250k；首轮证据映射、安全或集成设置，再收 $25k-$75k；还可以按重大发布或验收里程碑加收用量费用。这一价格与研究里的 ACV 假设一致，也把销售锚定在“一次里程碑滑点的代价”，而不是泛泛的软件预算。
businessModel:
  revenueStreams:
  - 按活跃项目收年度平台订阅费
  - 首轮部署收一次性实施和证据映射费用
  - 面向供应商协作、基准报告以及主权云 / 本地部署的高级模块
  unitOfValue: 面向国防部项目的活跃项目年
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一家厂商内部扩到更多项目和机型族
  - 围绕分包商做供应商协作和外部证据交换
  - 从首轮列装扩到保障、升级和后续发布工作流
  - 在无人机场景验证模板库后，扩到相邻自主平台品类
strategyMap:
  northStarMetric: 通过就绪度控制平面管理的活跃生产项目数
  inputMetrics:
  - 每季度签下的付费共创客户数
  - 从候选发布版本到完整验收包的天数
  - 正式里程碑评审前识别出的阻塞项占比
  - 试点转年度合同的转化率
  - 跨国防部模板可复用的证据字段占比
  moatsToBuild:
  - 国防部条款到证据的模板库
  - 跨项目阻塞项历史与发布差异基准数据集
  - 接入 PLM、ALM、仿真、培训和供应商系统的集成层
  killCriteria:
  - 前 9 个月签下的付费共创客户少于 3 个
  - 完成 5 次部署后，付费共创客户转年度合同的转化率仍低于 40%
  - 第二次实施之后，中位数“拿到第一份可用发布包”的时间仍高于 8 周
  - 3 个目标国防部场景里，可复用的证据结构低于 60%
  mermaid: |
    flowchart LR
      Wedge[Drone program readiness wedge] --> MVP[Acceptance packet MVP]
      MVP --> Proof[Shorter release-to-approval cycle]
      Proof --> Expansion[More programs and adjacent workflows]
investorMemo:
  verdict:
    call: 观察
    conviction: 我对客户痛点和时间窗口有中等把握，但对一层独立覆盖软件能否在安全、集成和现有工具蔓延问题解决前拿到持续预算，信心偏低。
    whyBelieve: 如果公司能在不替换核心工程系统的情况下，切实缩短正在执行的无人机项目验收准备时间，它就卡在了收入确认和列装推进的路径上。
    whyDoubt: 模型里的软件市场本身不大，而且预算很可能先被现有的 PLM、仿真或服务供应商吃掉，轮不到一套新的主记录系统。
    nextDiligence: 先拿下两个分属不同国防部体系的付费共创客户，证明其中一个能转成年合同，并展示至少 20% 的“从发布到验收”周期缩短。
  firstCustomer:
    title: 欧洲无人机 OEM 的 VP Programs
    profile: 一家位于德国、波罗的海、北欧或邻近联盟项目中的 200-800 人无人机厂商或系统集成商，正在执行一个由国防部支持的飞行器项目，自主化软件持续迭代，且 120 天内就要做验收评审。
    trigger: 合同中标、选项执行，或临近验收里程碑，迫使团队必须在被压缩的时间里把仿真、配置、培训和供应商证据全部对齐。
    buyer: COO 或 VP Programs
    initialContract: 先签一个 6-10 周、只覆盖一个项目和一个里程碑的付费共创客户合同，通常为实施和证据映射收 $25k-$75k；若首份发布包获批，或内部就绪周期缩短 20%+，再转成 $150k-$250k 的年度平台合同。
  mustBeTrue:
  - 首批 10 个目标厂商里，至少有 3 家明确表示愿意把就绪度软件作为独立预算项采购，而不只是把它当项目服务。
  - 首个部署能在主要依赖非涉密或脱敏项目数据的前提下，于 6 周内拼出一份可用验收包。
  - 前三个目标国防部模式里，超过 60% 的证据模型可以复用。
  - 在首个正式生产客户上，产品能把从候选发布版本到验收包完成的时间至少缩短 20%。
  - 在公司做到 5 个在线项目之前，现有的 PLM、ALM 或自主化测试厂商不会通过捆绑式里程碑报告堵住集成，或提前抹平这个切口。
  diligenceQuestions:
  - 首轮部署到底从哪条预算科目出钱：VP Programs 的自主支出、IT 工具预算，还是服务预算？
  - 首个客户工作流里，有多少内容可以保持非涉密？哪些数据必须本地部署或使用主权云托管环境？
  - 哪两到三个国防部之间的条款和附件结构最容易复用？复用具体在哪些地方会断掉？
  - 今天在真实无人机项目里，一次验收里程碑滑点带来的人工和排期成本，实际有多大？
  - 产品能否在没有专门定制集成团队的情况下，于 6 周内接上一套 PLM 或 ALM 系统和一套仿真栈？
operatingAssumptions:
- assumption: 如果把产品卖给一个临近里程碑、且不要求替换现有工程系统的客户，买方愿意为一层独立就绪度覆盖软件付费。
  basis: research.yaml
  validationTest: 访谈 8-10 位 120 天内有验收事件的 VP Programs 或 COO，并拿到 2 个与明确预算负责人绑定的付费试点承诺。
  decisionImpact: 若不成立，就把产品重定位为通过实施伙伴销售的服务驱动模块，而不是独立软件。
- assumption: 首轮部署主要依靠非涉密或脱敏的发布数据，也能证明价值。
  basis: research.yaml
  validationTest: 用脱敏数据跑一轮共创客户试点，并逐项记录哪些材料必须本地或 sovereign 托管。
  decisionImpact: 若不成立，产品架构和种子轮预算都要向更重的安全投入、更慢的部署节奏和更少的目标客户倾斜。
- assumption: 相对于一次验收里程碑延误的成本，$150k-$250k 的年 ACV 是站得住的。
  basis: research.yaml
  validationTest: 用 3 个真实项目搭建客户 ROI 模型，并在试点谈判里用两个价格点测试提案接受度。
  decisionImpact: 若不成立，公司要么必须往更大项目上移，要么接受更偏服务、软件倍数更低的模型。
- assumption: 不同国防部之间有足够多可复用的证据结构，足以支撑模板库，而不是每次都从头定制工作流。
  basis: 运营判断
  validationTest: 拿 3 份真实 tender 或 acceptance 包做映射，测量共通字段、签字要求和必备材料。
  decisionImpact: 若不成立，就先收窄地理范围和买方细分，直到可重复性被证明。
- assumption: 接入 PLM、ALM 和仿真系统时，不需要大改数据模型，也能把覆盖层跑起来。
  basis: idea.yaml
  validationTest: 先原型化一个现有工程工作流连接器和一个自主化测试栈连接器，测量拿到“可出包数据”所需时间。
  decisionImpact: 若不成立，导入成本和价值实现时间都会上升，足以拖慢规模化 GTM 并压低毛利。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 在德国、波罗的海、北欧和英国，面向无人机项目负责人做 10 次结构化就绪度审计访谈。
  hypothesis: 当里程碑在 120 天内时，验收就绪度会成为 前三大运营痛点。
  successMetric: 至少 10 位买方中的 6 位，把发布证据协同列为足以推动试点或预算讨论的紧迫问题。
  owner: CEO / 创始人主导销售
- horizon: 0-90 天
  experiment: 基于一家友好共创客户导出的数据，做出一版 MVP 发包生成器。
  hypothesis: 不替换客户源系统，也能拼出一份有用的首版发布包。
  successMetric: 在 6 周内完成一份端到端发布包，且手工电子表格补丁少于 3 处。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 围绕一个机型族的真实验收里程碑，交付 1 个付费共创客户。
  hypothesis: 即便带服务实施，产品也能在正式评审前缩短内部就绪周期。
  successMetric: 相较客户原有流程，从候选发布版本到“发布包就绪”的天数至少缩短 20%。
  owner: 解决方案架构师
- horizon: 90-180 天
  experiment: 验证 EU 托管单租户和本地部署两种安全交付模式。
  hypothesis: 安全审查可以通过，而不必让每个首批客户都走一套完全定制的隔离网安装。
  successMetric: 有 2 个客户接受标准部署模式之一，且没有关键安全阻塞项。
  owner: 安全工程师
- horizon: 180-365 天
  experiment: 对比 3 个国防部的验收包结构，并把可复用核心产品化。
  hypothesis: 即便各国附件不同，一张通用证据图谱也能覆盖大部分必填字段。
  successMetric: 必填字段和签字要求的重合度达到 60%+，足以发布一版可复用模板。
  owner: 产品负责人
- horizon: 180-365 天
  experiment: 通过一家工程或仿真咨询公司，跑出 1 个伙伴主导部署。
  hypothesis: 一旦切口被验证，服务和集成伙伴拉来合格项目的速度，会快过冷启动外呼拓客。
  successMetric: 拿下 1 个由伙伴引荐的付费共创客户，且 CAC 低于创始人直接外呼拓客。
  owner: CEO / 伙伴合作
operations:
- 提供 EU 单租户托管部署，并为无法从共享云起步的项目准备 on-prem 安装包。
- 做一套带服务的证据映射 playbook，始终绑定一个里程碑、一个机型族和一个明确买方负责人。
- 每次部署前都先跑完安全审查清单，覆盖数据驻留、访问控制、审计日志和文档留存。
- 围绕共创客户的实际需求，排连接器优先级，覆盖 PLM、ALM、仿真、培训和供应商文档系统。
- 每季度做一次模板治理评审，决定哪些国防部附件该产品化，哪些继续保留为定制服务。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责验收图谱、系统集成和首版发包工作流。
- role: 产品与项目系统负责人
  startTiming: 第 0 个月
  rationale: 把国防部条款和项目工作流翻译成可复用模板和清晰实施范围。
- role: 解决方案架构师
  startTiming: 第 2 个月
  rationale: 主导带服务部署、梳理证据来源，并把 见效时间压在 6 周以内。
- role: 创始人销售
  startTiming: 第 0 个月
  rationale: 早期销售需要同时拿下 COO 和 VP Programs 的信任，并把客户反馈快速灌回产品范围。
- role: 安全与合规工程师
  startTiming: 第 4 个月
  rationale: 在安全审查成为瓶颈之前，先把主权云、单租户和本地部署路径标准化。
milestones:
- horizon: 0-12 个月
  items:
  - 签下 2 个面向欧洲真实无人机项目的付费共创客户
  - 交付 MVP 发包生成器、阻塞项看板，以及首个 PLM 或 ALM + 仿真连接器
  - 证明 1 种标准安全部署模式可行，并把首个客户转成年度合同
  - 在首个正式生产客户上记录到 20%+ 的“从发布到发包”周期改善
- horizon: 12-24 个月
  items:
  - 做到至少 3 个客户、5-8 个付费项目
  - 把 2-3 个国防部模板族产品化，并验证字段复用
  - 上线供应商协作与按国家区分的附件工作流
  - 通过工程或安全部署咨询伙伴拿下 1 个 伙伴主导部署
- horizon: 24-36 个月
  items:
  - 做到 10-15 个活跃项目，并提供多项目组合报告
  - 从无人机列装扩到保障与后续升级工作流
  - 只有在无人机模板经济学被证明之后，才进入 1 个相邻自主平台品类
  - 基于已装机客户的阻塞项历史和发布差异数据，做出基准报告
risks:
- risk: 买方可能把就绪度软件视为咨询服务，或视为现有 PLM / 服务预算里的扩展项，而不是独立产品。
  likelihood: High
  impact: High
  mitigation: 先围绕一个明确里程碑卖出第一单，拿到清晰 ROI；在纯软件预算还不真实的场景，用伙伴模式切入。
- risk: 安全、涉密或隔离网要求，可能把部署拖成缓慢而高度定制的项目。
  likelihood: Medium
  impact: High
  mitigation: 尽早标准化 EU 单租户托管和 on-prem 两种模式，并从可用脱敏数据运行的工作流切入。
- risk: 各国防部附件差异，可能大到压垮模板复用经济学。
  likelihood: High
  impact: Medium
  mitigation: 先把地域收窄到重合度最高的国防部模式，其余场景在复用被证明前都按付费定制处理。
- risk: 现有的 PLM、ALM 或自主化测试厂商，可能会捆绑出“够用”的里程碑报告，直接抹平这个切口。
  likelihood: Medium
  impact: High
  mitigation: 先赢下“最快拿到第一份发布包”、跨系统证据编排，以及现有厂商尚未真正覆盖的供应商侧工作流深度。
- risk: 公司可能会过度暴露在少数几个大项目和漫长采购周期之下。
  likelihood: High
  impact: Medium
  mitigation: 第一年限制客户集中度，在单个账户内按项目而不是全企业扩张，并把销售始终压在近端里程碑上。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道将用于打磨第一版可产品化发包工作流、做出两到三种安全部署模式、开发首批连接器、拿下 2 个付费共创客户，并在放大销售前证明模板复用确实成立。
