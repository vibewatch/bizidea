scenarios:
  downside:
    description: "Longer security reviews, more bespoke work, and weaker pricing keep the company services-heavy."
    y3RevenueK: 1580.0
    y3EbitdaK: -1035.0
    cashLowPointK: 205.0
    keyAssumptionChanges:
      - "Blended annual revenue per active program falls to $205K."
      - "Monthly churn rises to 1.3%."
      - "Two program launches slip by one to two quarters."
      - "Gross margin stalls near 68% because sovereign and on-prem deployments stay custom."
  base:
    description: "Founder-led sales convert milestone pain into repeatable program-year contracts before scaled hiring."
    y3RevenueK: 2029.0
    y3EbitdaK: -720.1
    cashLowPointK: 727.9
    keyAssumptionChanges:
      - "Blended annual revenue per active program stays at $225K."
      - "Monthly churn holds at 1.0%."
      - "Program launches land at 3 in Y1, 5 in Y2, and 4 in Y3."
      - "Gross margin reaches the 70%-72% range once template reuse improves."
  upside:
    description: "Template reuse and partner referrals shorten the sales cycle and reduce bespoke onboarding drag."
    y3RevenueK: 2475.0
    y3EbitdaK: -395.0
    cashLowPointK: 1140.0
    keyAssumptionChanges:
      - "Blended annual revenue per active program rises to $240K."
      - "Monthly churn improves to 0.8%."
      - "One additional program launch lands in both Y2 and Y3."
      - "Gross margin reaches 74% as standard deployment patterns clear faster."
sensitivity:
  - variable: ARPU
    downsideCase: "$205K blended annual revenue per active program"
    baseCase: "$225K blended annual revenue per active program"
    upsideCase: "$240K blended annual revenue per active program"
    y3RevenueImpactK: -181.0
    cashImpactK: -145.0
  - variable: CAC
    downsideCase: "$135K CAC because founder-led outbound never gets partner leverage"
    baseCase: "$110K CAC"
    upsideCase: "$90K CAC with consultancy and ecosystem referrals"
    y3RevenueImpactK: -95.0
    cashImpactK: -170.0
  - variable: churn
    downsideCase: "1.3% monthly churn when pilots fail to convert into sticky program-year contracts"
    baseCase: "1.0% monthly churn"
    upsideCase: "0.8% monthly churn after template reuse and embedded workflows improve retention"
    y3RevenueImpactK: -135.0
    cashImpactK: -155.0
  - variable: sales cycle
    downsideCase: "Security review and buyer approval add 1-2 quarters to close timing"
    baseCase: "Live-milestone deals close inside one budget cycle"
    upsideCase: "Reference accounts and partners shorten the cycle by one quarter"
    y3RevenueImpactK: -240.0
    cashImpactK: -320.0
  - variable: gross margin
    downsideCase: "68% steady-state gross margin because on-prem work stays custom"
    baseCase: "70%-72% steady-state gross margin"
    upsideCase: "74% steady-state gross margin with standard secure deployment patterns"
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
  - variable: hiring pace
    downsideCase: "Two GTM and implementation hires pulled forward by two quarters before repeatability is proven"
    baseCase: "Hiring follows proof points and template reuse milestones"
    upsideCase: "One non-critical hire delayed until revenue conversion improves"
    y3RevenueImpactK: 0.0
    cashImpactK: -230.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> ReadinessAudits
      ReadinessAudits --> ActivePrograms
      ActivePrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "The base case reaches about $2.0M Y3 revenue mainly by growing from roughly 3 to 10 active programs at $225K blended revenue per program, not from aggressive price expansion."
  - checkName: Must go right
    finding: "Two early paid design partners must convert into annual program-year contracts and create partner-led references by Y2 or the launch cadence in scenarios.base breaks."
  - checkName: Model breaks if
    finding: "If secure deployments stay bespoke enough that gross margin stalls below 68% while churn rises above 1.3%, cash compresses toward the downside low point near $0.2M."
  - checkName: Next-round proof
    finding: "The next financing is justified once the company reaches 7-8 active programs, two reusable ministry template families, and one partner-led deployment with six months of cash still on hand."
sanityChecks:
  ruleOf40: "Y3 growth 75.0% + EBITDA margin -35.5% = 39.5%"
  burnMultiple: "Y3 burn multiple 0.8x (-$720.1K EBITDA on $869.3K net new revenue)"
  revenuePerFte: "$169K Y3 using 12 Q4Y3 FTE (benchmark $200-400K SaaS)"
  flags:
    - "Revenue per FTE remains below typical SaaS benchmarks because the model keeps a solutions-heavy deployment team through Y3."
    - "The model still exits Y3 EBITDA negative, so the next round depends on proving faster template reuse before scaling headcount again."
    - "Monthly churn is assumed at 1.0% even though no renewal cohort exists yet; real retention could be worse if budgets stay project-based."
    - "Gross margin depends on secure deployment patterns becoming repeatable rather than every account requiring bespoke sovereign or on-prem work."
