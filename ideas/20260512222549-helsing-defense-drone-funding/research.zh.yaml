  validationPlan:
  - priority: 高
    question: VP Programs 会为一层独立就绪度软件买单，还是只愿意为围绕真实里程碑的项目服务付费？
    evidenceToGather: 访谈 8-10 位 120 天内有验收事件的欧洲无人机项目负责人，并量化他们当前在 PM 人力、顾问费用和延期成本上的支出。
  - priority: 高
    question: 哪两到三个国防部之间的附件和证据结构足以支撑 60%+ 的复用？
    evidenceToGather: 收集至少 3 家欧洲买方的真实 tender 与 acceptance 包，映射重合字段、签字要求和技术证明。
  - priority: 中
    question: 首轮部署有多少内容能保持非涉密，同时仍足以证明价值？
    evidenceToGather: 用脱敏发布数据跑一轮共创客户试点，并记录哪些内容必须本地部署或 sovereign 托管。
  - priority: 中
    question: 产品能否在 6 周内接上现有 PLM、ALM 和仿真工作流？
    evidenceToGather: 原型化一个 Siemens/IBM 风格工作流连接器和一个 Applied 风格仿真环境连接器，测量导入工作量与数据缺口。
