  sensitivityCases:
  - case: EU 和 NATO 的采购机制若比预期更快地统一互操作性与供应商准入标准
    impact: Positive：一份中立的就绪度发布包，会随着平台上架、试验和框架协议需要被重复使用，而变得更有价值。
