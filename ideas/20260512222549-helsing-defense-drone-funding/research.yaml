  validationPlan:
  - priority: high
    question: Will VP Programs fund a standalone readiness layer, or only project services around a live milestone?
    evidenceToGather: Interview 8-10 European drone-program leaders with an acceptance event inside 120 days and quantify current spend on PM labor, consultants, and delay costs.
  - priority: high
    question: Which two or three ministries share enough annex and evidence structure to support 60%+ reuse?
    evidenceToGather: Collect real tender and acceptance packs from at least three European buyers and map overlapping fields, signatures, and technical proofs.
  - priority: medium
    question: How much of the initial deployment can stay unclassified while still proving value?
    evidenceToGather: Run a design-partner pilot using sanitized release data and document what must remain on-prem or sovereign-hosted.
  - priority: medium
    question: Can the product attach to existing PLM, ALM, and simulation workflows in under six weeks?
    evidenceToGather: Prototype connectors into one Siemens/IBM-style workflow and one Applied-style simulation environment; measure onboarding effort and data gaps.
