slug: robotic-cost-book-indoor-farms
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] 模型从带日期的商业计划之后的第一个完整月份开始。'
- id: A2
  name: 期初现金／种子前轮融资
  value: $2.6M
  unit: USD
  source: '[BP fundingAsk round pre-seed + BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] 采用一笔精简融资，仍够跑到 12-24 个月里程碑，再留 6 个月缓冲。'
- id: A3
  name: 期初付费场地数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP investorMemo.verdict.nextDiligence] 公司从零收入起步，必须先拿下付费试点。'
- id: A4
  name: 客户定义
  value: 处于付费试点或年度生产合同中的一个活跃付费场地
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop 统计的是纳管场地数，而不是席位或个人操作者。'
- id: A5
  name: 付费试点单价
  value: $24K，为期 3 个月（约 $8K/月）
  unit: USD/site
  source: '[BP gtm.pricing $15k-$30k paid pilot + BP investorMemo.firstCustomer.initialContract] 取所述试点区间的中点。'
- id: A6
  name: 生产场地收入爬坡
  value: 第 4-5 月每月 $12K，第 6-12 月每月 $9K，第 13 月起每月 $10K（约 $120K 年化）
  unit: USD/site/month
  source: '[BP gtm.pricing $50k-$80k annual subscription + onboarding/report fees + BP investorMemo.firstCustomer.initialContract $100K+ possible after expansion] 收入来自订阅，加上实施费和材料包附加费。'
- id: A7
  name: 净活跃场地爬坡
  value: M12 时 3 个活跃付费场地，Q4Y2 时 10 个，Q4Y3 时 35 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + Research market.som 35 sites] 基准情景对齐所述的里程碑路径。'
- id: A8
  name: 第 3 年 SOM 的解读口径
  value: 研究里的 SOM 被当作退出规模的成熟度锚点，所以 Y3 当年收入偏低，因为许多场地是在 Y3 内才陆续落地
  unit: convention
  source: '[BP executiveSummary + BP market.som + Research market.som] 模型在 Q4Y3 做到 35 个活跃场地，但并不假设 $3.9M 全额在当年更早时点确认。'
- id: A9
  name: 毛利率爬坡
  value: Y1 早期 46%，Y1 后期 54%，Y2 全年 61%-66%，Y3 全年 69%-70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research reportMemo.technologyLandscape] 毛利率起步偏重服务，只有等连接器和报告 QA 可复用后才改善。'
- id: A10
  name: 招聘时间表
  value: M1 创始人/CEO 和创始工程师；M3 解决方案／集成；M6 产品／作物运营；M12 商务合作；M16 客户成功；M20 第二名工程师；M24 第二名集成；M28 运营；M31 第二名销售；M34 第三名工程师
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 只有在试点验证和可复用接入范式到位后，才增补 GTM 和支持岗位。'
- id: A11
  name: 创始人/CEO 全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic for pre-seed vertical SaaS] 创始人现金薪资从简，另加薪酬税费负担。'
- id: A12
  name: 工程全成本薪酬
  value: 每名 FTE $185K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 体现资深数据平台和台账工程的活儿，但不含后期阶段的现金薪酬。'
- id: A13
  name: 解决方案／集成全成本薪酬
  value: 每名 FTE $175K
  unit: USD/year
  source: '[BP team Solutions and integrations engineer + startup-finance heuristic] 覆盖连接器开发、数据 QA 和部署归属。'
- id: A14
  name: 产品／作物运营全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP team Product and crop operations lead + startup-finance heuristic] 这个岗位混合了种植商工作流、报告设计和产品运营。'
- id: A15
  name: 客户成功／实施全成本薪酬
  value: $145K
  unit: USD/year
  source: '[BP milestones keep onboarding inside 30 days + startup-finance heuristic] 假设配一位技术型实施负责人，而不是一支庞大的服务团队。'
- id: A16
  name: 销售／合作全成本薪酬
  value: 每名 FTE $195K
  unit: USD/year
  source: '[BP team Commercial partnerships lead + BP gtm.channels + startup-finance heuristic] 含浮动薪酬，以及创始人协同的企业级销售差旅。'
- id: A17
  name: G&A／运营全成本薪酬
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 精简的后台支持，覆盖法务、保险和伙伴／行政运营。'
- id: A18
  name: 薪酬在损益表各科目间的分摊
  value: 创始人 50% S&M／20% R&D／30% G&A；工程 100% R&D；解决方案 25% S&M／75% R&D；产品 15% S&M／75% R&D／10% G&A；客户成功 40% S&M／60% R&D；销售 100% S&M；运营 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 把薪资成本映射到各职能费用科目，同时让实施工作保持可见。'
- id: A19
  name: 非薪酬的销售与市场支出
  value: 36 个月内每月 $7K-$16K
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] 假设以创始人主导的差旅、伙伴赋能和精准活动为主，而非重投放式支出。'
- id: A20
  name: 非薪酬的研发支出
  value: 36 个月内每月 $9K-$18K
  unit: USD/month
  source: '[BP product + BP operations + startup-finance heuristic] 覆盖云、数据管道、QA 工具和安全／日志。'
- id: A21
  name: 非薪酬的 G&A 支出
  value: 36 个月内每月 $6K-$11K
  unit: USD/month
  source: '[BP operations + Research reportMemo.regulatoryLandscape + startup-finance heuristic] 覆盖法务、保险、财务运营和认证支持。'
- id: A22
  name: 现金转换口径
  value: 用 EBITDA 近似现金变动
  unit: modeling convention
  source: '[startup-finance heuristic] 在种子前轮规模下，假设税费、资本开支、债务偿付和营运资金时点都不重要。'
- id: A23
  name: 月度流失率
  value: 1.2%
  unit: percent/month
  source: '[startup-finance heuristic for sticky workflow SaaS + BP businessModel.expansionLevers + BP risks] 报告一旦嵌入，留存应该很强，但模型并不假设零流失。'
- id: A24
  name: CAC 口径
  value: $97.1K ＝ Y1-Y2 的 S&M 支出，除以 Q4Y2 时的 8 个年度生产场地
  unit: USD/site
  source: '[model calc + BP gtm.funnelTargets + BP milestones 12-24 months] 以首批可复制的生产客户群来衡量 CAC，而不是只看试点。'
- id: A25
  name: 用于种子前轮定额的融资里程碑
  value: 10 个活跃场地、8 个年度生产场地、1 个伙伴带来的试点、标准接入控制在 30 天内，并证明约 30% 的生产客户会扩张
  unit: milestone
  source: '[BP fundingAsk.useOfFundsSummary + BP milestones 12-24 months + BP investorMemo.mustBeTrue] 这就是本轮融资必须撑起的、面向下一轮的证明包。'
- id: A26
  name: 季度薪资口径
  value: Y2-Y3 的薪资行采用每个季度内按月的实际招聘，而不是只取季度末快照
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] 尽管人头快照是压缩的，仍让薪资成本与招聘爬坡保持一致。'
