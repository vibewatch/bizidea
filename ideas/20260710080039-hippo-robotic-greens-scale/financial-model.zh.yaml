modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Accounts[Qualified grower accounts] --> Pilots[Paid one-site pilots]\n  Pilots --> Production[Annual production sites]\n  Production --> Expansion[Second-site and dossier expansion]\n  Production --> Revenue[Subscription revenue]\n  Expansion --> Revenue\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash and runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的增长来自 Q4Y3 的 35 个活跃付费场地，各批客户在接入和附加扩展后，从 $24K 的试点爬到每场地约 $120K 的年化支出。
- checkName: 必须跑对的环节
  finding: 头三到四个集成必须足够可复用，把标准接入压在 30 天内，因为这正是同时解锁毛利率提升和伙伴带量的关键。
- checkName: 模型会在什么情况下失效
  finding: 如果试点转化慢约一个季度，或买方不看重材料包，那么即便招聘计划已经很精简，下行情景下的现金也会在下一轮里程碑前转负。
- checkName: 下一轮证明点
  finding: 一旦公司做到约 10 个活跃场地、8 个年度生产场地、1 个伙伴带来的试点，以及可见的 30% 账户内扩张，一个种子轮就绪的故事便成形了。
sanityChecks:
  ruleOf40: Y3 增长 281.5% ＋ EBITDA 利润率 -10.1% ＝ 271.4%（仅供方向参考，因为基数仍小）。
  burnMultiple: 用 Y2 约 $1.03M 的 burn，对约 $0.84M 的净新增 ARR（活跃场地从 3 个增到 10 个、成熟支出约 $120K），推得 burn multiple 约 1.2x。
  revenuePerFte: 按 Q4Y3 的 FTE 算，Y3 人均收入 $242K（11 名 FTE；垂直 SaaS 基准约 $200K-$400K）。
  flags:
  - 研究里 $3.9M 的 SOM，更像是退出时点的运行速率锚点，而非当年收入；本基准情景在 Q4Y3 做到 35 个场地，但 Y3 内只确认 $2.66M，因为许多场地都在年内偏晚才落地。
  - 毛利率要到 Y3 后期才碰到 70% 目标，所以连接器复用或数据就绪度质量一旦滑坡，很可能把下一轮融资往前逼。
  - 第 3 年 35 场地的目标，靠的是伙伴转介和第二工作流扩张，而不加一支庞大的现场销售团队；如果渠道杠杆在 Y2 没出现，这个爬坡就太陡了。
