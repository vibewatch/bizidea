scenarios:
  downside:
    description: 买方需求真实，但试点转化大约慢了一个季度，伙伴转介不及预期，交付也偏重服务。
    y3RevenueK: 1463.0
    y3EbitdaK: -1183.0
    cashLowPointK: -578.9
    keyAssumptionChanges:
    - Q4Y3 的活跃场地收在 24 个，而不是 35 个。
    - 成熟场地收入稳定在更接近每月 $9K，而非 $10K。
    - 期末毛利率最高只到约 65%，而非 70%。
  base:
    description: 三个付费试点跑成一套可复制的场地打法，伙伴引荐在 Y2 开始见效，公司做到所述的第 3 年 35 场地里程碑。
    y3RevenueK: 2663.0
    y3EbitdaK: -268.3
    cashLowPointK: 419.9
    keyAssumptionChanges:
    - M12 时有 3 个活跃付费场地，Q4Y2 时 10 个，Q4Y3 时 35 个。
    - 生产场地在接入和报告模块扩展后，年化支出趋向约 $120K。
    - 随着集成可复用，毛利率要到 Y3 后期才达到 70%。
  upside:
    description: 伙伴带来的单子更早到位，接入模板干净地复用，第二场地／第二工作流的扩张抬高了成熟场地的支出。
    y3RevenueK: 3303.5
    y3EbitdaK: 199.4
    cashLowPointK: 740.5
    keyAssumptionChanges:
    - Q4Y3 的活跃场地达到 42 个，而非 35 个。
    - 在更强的扩张下，成熟场地收入趋向每月约 $11K。
    - 由于服务负荷下降更快，期末毛利率约 72%。
