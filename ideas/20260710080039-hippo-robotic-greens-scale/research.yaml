  "willingnessToPay":
    "summary": "Budget should land in the operations-improvement bucket, not generic productivity SaaS. Labor is already a large cost line, growers are investing in efficiency technology, and the category now prizes measurable profitability and reliability. That supports meaningful annual software spend when the tool reduces manual reporting work, improves labor deployment, or helps secure buyer contracts."
