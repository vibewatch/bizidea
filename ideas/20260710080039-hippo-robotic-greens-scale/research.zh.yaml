  validationPlan:
  - priority: high
    question: 在 10-20 英亩的目标客户里，究竟哪些控制器、灌溉、作物视觉和机器人系统出现得最频繁？
    evidenceToGather: 一份来自头 15 场洽谈、按热度排序的集成清单，最好还有每套技术栈的样本导出数据或 API。
  - priority: high
    question: 零售和餐饮买手今天到底会不会要成本／资源材料包，还是可追溯加食品安全认证仍是真正的通关文件？
    evidenceToGather: 至少五家区域生鲜客户近期的买方评分表、续约清单和采购模板。
  - priority: medium
    question: 有多少滩头种植商的遥测质量，已经好到能算出一个站得住脚的每日每磅成本？
    evidenceToGather: 从三个试点设施拿两周的原始人工、气候、灌溉和采收数据，检验数据完整度和对账工作量。
