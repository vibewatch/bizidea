regulatoryTechnicalConstraints:
- point: 新鲜叶菜列在 FDA 食品可追溯清单上，所以受监管的运营商需要可追溯批次码、可追溯计划，以及围绕关键追踪事件的记录。
  sourceRefs:
  - 10
  - 11
- point: 受监管的农场在农产品处理和农业用水上仍有 Produce Safety Rule 的义务，这意味着软件产出必须对得上真实的农场记录。
  sourceRefs:
  - 9
- point: 面向买方的证明常常要与 GAP、GLOBALG.A.P. 或 PrimusGFS 的要求并列，所以记录格式必须可导出、便于审计。
