    - Q4Y3 active sites end at 24 instead of 35.
    - Mature site revenue settles closer to $9K/mo than $10K/mo.
    - Exit gross margin tops out near 65% instead of 70%.
  base:
    description: Three paid pilots turn into a repeatable site playbook, partner introductions start working in Y2, and the company reaches the stated 35-site year-three milestone.
    y3RevenueK: 2663.0
    y3EbitdaK: -268.3
    cashLowPointK: 419.9
    keyAssumptionChanges:
    - Three active paying sites exist by M12, 10 by Q4Y2, and 35 by Q4Y3.
    - Production sites move toward about $120K annualized spend after onboarding and report-module expansion.
    - Gross margin reaches 70% only in late Y3 as integrations repeat.
  upside:
    description: Partner-sourced deals arrive earlier, onboarding templates reuse cleanly, and second-site / second-workflow expansion raises mature site spend.
    y3RevenueK: 3303.5
    y3EbitdaK: 199.4
    cashLowPointK: 740.5
    keyAssumptionChanges:
    - Q4Y3 active sites reach 42 instead of 35.
    - Mature site revenue trends toward roughly $11K/mo with stronger expansion.
    - Gross margin exits at about 72% because services load falls faster.
