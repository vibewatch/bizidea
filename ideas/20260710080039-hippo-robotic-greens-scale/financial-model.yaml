slug: robotic-cost-book-indoor-farms
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] the model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.6M
  unit: USD
  source: '[BP fundingAsk round pre-seed + BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] uses a lean raise that still reaches the 12-24 month milestone plus a 6-month buffer.'
- id: A3
  name: Starting paying sites
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP investorMemo.verdict.nextDiligence] the company begins pre-revenue and must first close paid pilots.'
- id: A4
  name: Customer definition
  value: One active paying site in either a paid pilot or an annual production contract
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop counts covered sites, not seats or individual operators.'
- id: A5
  name: Paid pilot price
  value: $24K over 3 months (~$8K/mo)
  unit: USD/site
  source: '[BP gtm.pricing $15k-$30k paid pilot + BP investorMemo.firstCustomer.initialContract] uses the midpoint of the stated pilot range.'
- id: A6
  name: Production-site revenue ramp
  value: Months 4-5 at $12K/mo, months 6-12 at $9K/mo, and month 13+ at $10K/mo (~$120K annualized)
  unit: USD/site/month
  source: '[BP gtm.pricing $50k-$80k annual subscription + onboarding/report fees + BP investorMemo.firstCustomer.initialContract $100K+ possible after expansion] revenue rises from subscription plus implementation and dossier add-ons.'
- id: A7
  name: Net active-site ramp
  value: 3 active paying sites by M12, 10 by Q4Y2, and 35 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + Research market.som 35 sites] base case matches the stated milestone path.'
- id: A8
  name: Y3 SOM interpretation
  value: Research SOM is treated as an exit-scale maturity anchor, so in-year Y3 revenue is lower because many sites land during Y3
  unit: convention
  source: '[BP executiveSummary + BP market.som + Research market.som] the model reaches 35 active sites by Q4Y3 without assuming the full $3.9M is recognized earlier in the year.'
- id: A9
  name: Gross margin ramp
  value: 46% in early Y1, 54% in late Y1, 61%-66% through Y2, and 69%-70% through Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research reportMemo.technologyLandscape] margin starts services-heavy and improves only as connectors and report QA repeat.'
- id: A10
  name: Hiring timeline
  value: M1 founder CEO and founding engineer; M3 solutions/integrations; M6 product/crop ops; M12 commercial partnerships; M16 customer success; M20 second engineer; M24 second integrations; M28 ops; M31 second sales; M34 third engineer
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] adds GTM and support only after pilot proof and reusable onboarding patterns exist.'
- id: A11
  name: Founder CEO loaded compensation
  value: $160K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic for pre-seed vertical SaaS] modest founder cash pay plus payroll load.'
- id: A12
  name: Engineering loaded compensation
  value: $185K per FTE
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] reflects senior data-platform and ledger-engineering work without late-stage cash comp.'
- id: A13
  name: Solutions / integrations loaded compensation
  value: $175K per FTE
  unit: USD/year
  source: '[BP team Solutions and integrations engineer + startup-finance heuristic] covers connector development, data QA, and deployment ownership.'
- id: A14
  name: Product / crop ops loaded compensation
  value: $160K
  unit: USD/year
  source: '[BP team Product and crop operations lead + startup-finance heuristic] this role mixes grower workflow, report design, and product ops.'
- id: A15
  name: Customer success / implementation loaded compensation
  value: $145K
  unit: USD/year
  source: '[BP milestones keep onboarding inside 30 days + startup-finance heuristic] assumes a technical implementation lead rather than a large services team.'
- id: A16
  name: Sales / partnerships loaded compensation
  value: $195K per FTE
  unit: USD/year
  source: '[BP team Commercial partnerships lead + BP gtm.channels + startup-finance heuristic] includes variable comp and travel for founder-assisted enterprise selling.'
- id: A17
  name: G&A / ops loaded compensation
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] lean back-office support for legal, insurance, and partner/admin operations.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 50% S&M / 20% R&D / 30% G&A; engineering 100% R&D; solutions 25% S&M / 75% R&D; product 15% S&M / 75% R&D / 10% G&A; customer success 40% S&M / 60% R&D; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] maps salary cost into the functional expense lines while keeping implementation work visible.'
- id: A19
  name: Non-payroll sales and marketing spend
  value: $7K-$16K per month over 36 months
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] assumes founder-led travel, partner enablement, and targeted events rather than paid-demand-heavy spend.'
- id: A20
  name: Non-payroll R&D spend
  value: $9K-$18K per month over 36 months
  unit: USD/month
  source: '[BP product + BP operations + startup-finance heuristic] covers cloud, data pipelines, QA tooling, and security/logging.'
- id: A21
  name: Non-payroll G&A spend
  value: $6K-$11K per month over 36 months
  unit: USD/month
  source: '[BP operations + Research reportMemo.regulatoryLandscape + startup-finance heuristic] covers legal, insurance, finance ops, and certification support.'
- id: A22
  name: Cash conversion convention
  value: EBITDA approximates cash movement
  unit: modeling convention
  source: '[startup-finance heuristic] taxes, capex, debt service, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A23
  name: Monthly churn
  value: 1.2%
  unit: percent/month
  source: '[startup-finance heuristic for sticky workflow SaaS + BP businessModel.expansionLevers + BP risks] retention should be strong once reporting is embedded, but the model does not assume zero churn.'
- id: A24
  name: CAC convention
  value: $97.1K = Y1-Y2 S&M spend divided by 8 annual production sites at Q4Y2
  unit: USD/site
  source: '[model calc + BP gtm.funnelTargets + BP milestones 12-24 months] measures CAC on the first repeatable production cohort rather than on pilots alone.'
- id: A25
  name: Funding milestone for pre-seed sizing
  value: 10 active sites, 8 annual production sites, one partner-sourced pilot, standard onboarding under 30 days, and proof that ~30% of production customers expand
  unit: milestone
  source: '[BP fundingAsk.useOfFundsSummary + BP milestones 12-24 months + BP investorMemo.mustBeTrue] this is the next-round proof package the raise must finance.'
- id: A26
  name: Quarter salary convention
  value: Y2-Y3 salary rows use actual month-level hires inside each quarter, not only quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] keeps salary cost consistent with the hiring ramp despite compact headcount snapshots.'
