modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Qualified grower accounts] --> Pilots[Paid one-site pilots]
      Pilots --> Production[Annual production sites]
      Production --> Expansion[Second-site and dossier expansion]
      Production --> Revenue[Subscription revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case growth comes from 35 active paying sites by Q4Y3, with cohorts moving from $24K pilots to roughly $120K annualized site spend after onboarding and add-on expansion.
- checkName: Must go right
  finding: The first three to four integrations must stay reusable enough to keep standard onboarding under 30 days, because that is what unlocks both gross-margin lift and partner-led volume.
- checkName: Model breaks if
  finding: If pilots convert about a quarter slower or buyers do not value the dossier, downside cash turns negative before the next-round milestone despite the lean hiring plan.
- checkName: Next-round proof
  finding: A seed-ready story appears once the company reaches about 10 active sites, 8 annual production sites, one partner-sourced pilot, and visible 30% within-account expansion.
sanityChecks:
  ruleOf40: Y3 growth 281.5% + EBITDA margin -10.1% = 271.4% (directional only because the base is still small).
  burnMultiple: Using Y2 burn of $1.03M against roughly $0.84M of net new ARR (3 to 10 active sites at ~$120K mature spend) implies about a 1.2x burn multiple.
  revenuePerFte: $242K Y3 revenue per Q4Y3 FTE (11 FTE; benchmark roughly $200K-$400K for vertical SaaS).
  flags:
  - The research SOM of $3.9M behaves more like an exit-rate anchor than in-year revenue; this base case reaches 35 sites by Q4Y3 but recognizes $2.66M during Y3 because many sites land late in the year.
  - Gross margin does not touch the 70% target until late Y3, so any slip in connector reuse or data-readiness quality likely pulls the next round forward.
  - The 35-site Y3 target depends on partner referrals and second-workflow expansion without adding a large field-sales team; if channel leverage does not appear in Y2, the ramp is too steep.
