differentiator: >-
  Unlike Hippo Harvest and other vertically integrated robotic growers, this product does not sell hardware or grow
  produce; it sells the orchestration and cost-proof layer to the much larger population of growers who already own
  or are buying robotic tending equipment piecemeal. That makes it hardware-agnostic and faster to deploy than a
  full vertical rebuild, and it turns a cost-tracking necessity into the exact retail-facing document buyers are
  starting to demand, which incumbent farm-management software (built for field crops, not indoor robotics telemetry)
  does not offer today.
