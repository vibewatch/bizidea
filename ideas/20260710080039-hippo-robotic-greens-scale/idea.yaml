problem: >-
  Mid-size indoor and greenhouse growers (5-50 acres under cover) know robotics can get them to field-crop-competitive
  unit costs, but only well-funded operators like Hippo Harvest can afford to build a custom AMR fleet, control
  software, and agronomic tuning loop from scratch. Everyone else is stuck buying point-solution grow lights, climate
  controllers, and scouting drones that do not talk to each other, so they cannot prove a defensible cost-per-pound
  number to retail buyers who are increasingly demanding it after recent climate-driven field-crop volatility.
targetUser:
  primary: Operations director at a 5-50 acre indoor leafy-greens or berry grower supplying regional retail and foodservice accounts
  secondary: Retail produce category buyer who needs a verified cost-and-supply-reliability dossier before signing a year-round contract
  buyer: Head of operations or general manager who controls the capex and software budget for the growing facility
startupThesis:
  nonObviousInsight: >-
    The bottleneck for indoor-ag economics has shifted from grow-light and climate hardware (now commoditized) to the
    orchestration layer that schedules AMR tending, tracks per-plot cost, and turns that data into a retail-ready
    supply guarantee; well-funded players are vertically integrating that layer themselves, leaving mid-size growers
    with no equivalent off-the-shelf option.
  beachhead: Independently operated 5-50 acre indoor leafy-greens growers in North America already using at least one AMR or robotic tending unit but lacking unified cost-tracking software
  wedge: A cost-and-yield operating layer that ingests data from existing AMR/robotic tending hardware and climate systems, computes live cost-per-pound by plot, and auto-generates the supply-reliability reports retail buyers now request
  whyNowCatalyst: Hippo Harvest's $30M round earmarked specifically for a next-generation robotic system aimed at field-crop price parity shows investors and retailers now treat robotics-driven unit cost, not just yield, as the deciding metric for indoor-ag contracts.
  ventureScalePath: Start as the cost-and-compliance layer for independent growers, expand into a marketplace connecting verified low-cost indoor supply to retail buyers, then license the same orchestration core to new robotic-hardware entrants as an embedded OS.
solution: >-
  A software layer that plugs into existing AMR tending robots, climate controllers, and irrigation systems via their
  existing telemetry APIs, then normalizes that data into a per-plot cost-per-pound ledger updated daily. Growers get
  a dashboard that flags which plots or crop varieties are missing field-crop price parity and why (labor mix,
  fertilizer use, robot utilization). The same ledger auto-generates the resource-efficiency and supply-reliability
  reports retail and foodservice buyers are starting to require in contracts, turning a back-office cost exercise into
  a sales asset the grower's account managers can hand directly to buyers.
goToMarketSeed:
  firstCustomer: Independent 10-20 acre indoor leafy-greens grower in California or the Southeast that has already purchased AMR tending robots but has no unified cost-tracking software
  buyingTrigger: A retail or foodservice buyer requests a documented cost and resource-efficiency dossier before renewing or expanding a year-round supply contract
  currentAlternative: Manual spreadsheet reconciliation of separate hardware vendor dashboards (grow-light, climate, robot utilization logs) done monthly by an operations analyst
  switchingReason: The spreadsheet process takes days, cannot produce a real-time cost-per-pound number, and cannot generate the standardized efficiency report buyers now ask for; the wedge product does both automatically from data the grower already owns
  pricingHypothesis: Per-acre-under-management SaaS fee plus a usage-based add-on for each buyer-facing supply-reliability report generated
whyNow:
- point: Investors are now funding robotics specifically to close the unit-cost gap with field-grown produce, not just to add automation, which validates cost-per-pound as the metric that matters to buyers of this software.
