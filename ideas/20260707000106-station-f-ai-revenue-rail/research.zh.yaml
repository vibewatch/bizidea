competitors:
  - name: Vanta
    stage: incumbent
    wedge: "合规自动化、信任资料,以及 AI 辅助的问卷应答。"
    pricing: "销售辅助型定价;抓取到的定价页未公开自助式费率。"
    strength: "信任与合规覆盖面广,已经站在许多安全审核的上游。"
    weaknessVsUs: "不掌握跨市场上架工作流、训练营协调能力,或首张发票到账时间的编排。"
    sourceRefs:
      - 87
      - 88
      - 90
  - name: Conveyor
    stage: scale-up
    wedge: "客户安全审核自动化和信任中心工作流。"
    pricing: "定制企业定价;抓取到的材料中未见公开报价单。"
    strength: "专为在销售周期中加速买方安全审核而打造。"
    weaknessVsUs: "止步于合作伙伴市场提交、计费开通和加速器层面的组合管理之前。"
    sourceRefs:
      - 91
      - 92
  - name: HyperComply
    stage: scale-up
    wedge: "面向软件厂商的快速安全问卷应答自动化。"
    pricing: "定制企业定价;抓取到的材料中未见公开报价单。"
    strength: "非常适合被重复性安全问卷压得喘不过气的团队。"
    weaknessVsUs: "在生态分发、应用商店打包和训练营分析上覆盖更窄。"
    sourceRefs:
      - 93
      - 100
  - name: Tackle
    stage: scale-up
    wedge: "云市场 GTM、交易撮合和联合销售加速。"
    pricing: "从抓取到的报告和产品打法看,应为定制企业定价。"
    strength: "在云市场know-how和收入结构类目数据上有扎实积累。"
    weaknessVsUs: "面向的是更后期、已经在做市场收入运营的 SaaS 公司,而不是刚要搞定第一次企业导入的种子期加速器创业公司。"
    sourceRefs:
      - 96
  - name: WorkSpan
    stage: scale-up
    wedge: "市场管理和生态联合销售自动化。"
    pricing: "定制企业定价;抓取到的材料中未见自助式定价。"
    strength: "在合作伙伴管道、上架健康度和生态协作工作流上很强。"
    weaknessVsUs: "不生成安全答案、证据包,或创业公司专属的上架素材。"
    sourceRefs:
      - 77
      - 95
