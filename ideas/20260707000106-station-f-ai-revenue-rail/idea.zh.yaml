    - 按合作伙伴平台整理的市场上架格式库
    - 记录哪种包装方式转化最快的基准数据集
  keyActivities:
    - 为每家创业公司自动生成安全合规资料包
    - 按合作伙伴平台格式化并提交市场上架申请
    - 接入按用量计费,并跟踪首笔收入到账时间
  keyPartners:
    - 运行结构化企业合作伙伴训练营的加速器
    - HubSpot、GitHub、Rippling 等市场平台
    - 支付与计费基础设施提供商
  costStructure:
    - 面向各市场平台的专项集成研发
    - 合规与安全模板维护
    - 面向加速器和创业公司导入的客户成功团队
    - 面向加速器和企业风投项目的销售
jobsToBeDone:
  - job: >-
      当被投公司在收入考核制训练营期间拿到企业合作伙伴引荐时,帮创始人快速产出安全问卷答案和市场上架资料,让引荐能在训练营窗口关闭前变成签约试点。
    currentAlternative: 创始人自建表格、单独使用通用合规工具,以及手动提交市场申请
    successMetric: 从企业引荐到首份签约试点合同的天数
  - job: >-
      当签约试点需要开始产生收入时,帮创业公司立即开通按用量计费,让加速器的收入里程碑靠真实开票金额达成,而不只是一份签了字的意向书。
    currentAlternative: 试点已经开始后才手动开票或延迟搭建计费系统
    successMetric: 从签约试点到第一笔开票收入的天数
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      两篇同日抓取核验的信源,证实了具名训练营、明确的收入目标和具体的企业合作伙伴名单,但信号主要还是围绕一家加速器自报的项目设计。
  painIntensity:
    score: 4
    rationale: >-
      错过六个月收入里程碑,可能意味着丢掉后续融资的可信度和合作伙伴的好感,但这种痛点是项目层面的,不是一次急性的运营事故。
  wedgeClarity:
    score: 4
    rationale: >-
      第一版产品范围窄且具体:为一期训练营的被投公司生成安全资料包、格式化市场上架资料、开通计费。
  defensibility:
    score: 3
    rationale: >-
      打包这套工作流本身容易被复制,但哪种打包和定价方式在具体合作伙伴市场里转化最快——这份不断滚雪球积累的基准数据,是单一创业工具难以复制的。
  ventureScale:
    score: 4
    rationale: >-
      从一家加速器的一期训练营切入范围很窄,但同一套导入引擎可以扩展到所有结构化加速器和企业风投项目,再进一步覆盖任何直接瞄准企业市场的种子期创业公司。
topRisks:
  - name: 市场平台自己把这事做了
    description: >-
      HubSpot、GitHub 或 Rippling 都可能自己加一条给加速器来源创业公司的快速导入通道,这样第三方打包层就没必要存在了。
    mitigation: >-
      坚持做跨市场而非绑定单一平台,并深耕合规和训练营协调这类工作——单一市场平台没什么动力去为竞争对手的生态也做这些事。
  - name: 加速器把它当成可有可无的锦上添花
    description: >-
      如果项目总监认为企业客户导入本该是创始人在加速器体验里自己解决的一部分,他们可能压根不会为新工具编预算。
    mitigation: >-
      第一期训练营以免费或按成功付费的方式试运行,直接跟项目自己的收入里程碑挂钩,等首笔收入到账时间的改善可以量化后,再转为付费授权。
  - name: 合规自动化赛道拥挤
    description: >-
      Vanta、Drata、SafeBase 这类成熟的供应商风险和安全问卷工具,完全可能把市场上架和计费功能打包进去,凭资源优势压过这个更窄的新进入者。
    mitigation: >-
      选择跟这些工具集成而不是重建核心 GRC 功能,靠训练营整体协调、各市场专属上架格式,以及这些厂商不去经营的加速器关系来做出差异化。
