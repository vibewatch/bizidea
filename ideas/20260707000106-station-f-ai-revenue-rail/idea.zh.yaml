problem: >-
  欧洲结构化加速器训练营里的种子前/种子期 AI 创业公司,靠加速器牵线能拿到大企业的热情引荐,但引荐落地成签约、计费的合同依然要拖上几个月——公司答不出安全问卷、上不了应用市场、接不进按用量计费的钩子,内部也没人真正跑过企业采购。Station F 这类加速器现在把训练营的成败,直接系在六个月内做到 100 万欧元收入上;真正卡住进度的不是引荐不够多,而是创始人一边要打磨产品,一边根本没精力把产品包装成能被企业快速验收的形态。结果要么卡在采购队列里熬过了训练营窗口期,要么创始人把宝贵时间都耗在重复搭建每家训练营公司都要重新造一遍的合规和上架资料上。
targetUser:
  primary: >-
    参加结构化加速器训练营(如 Station F F/ai)、训练营列名企业合作伙伴的种子前到种子期 AI 创业公司创始人或 GTM 负责人
  secondary: >-
    加速器内负责训练营整体收入结果和企业合作伙伴满意度的合作伙伴关系或项目运营负责人
  buyer: >-
    采购训练营整体授权、压缩每家被投公司"首笔收入到账时间"的加速器项目总监或合作伙伴关系负责人
startupThesis:
  nonObviousInsight: >-
    加速器早就解决了"牵线"这个问题;没解决的,是把一次企业合作伙伴引荐变成一份付费、能在市场里跑交易的合同,这需要企业级的包装——安全问卷答案、上架资料、用量计费,而这些没有一个种子前团队有精力自己搭,也没有一家加速器能在不靠共享复用工具的情况下把这份成本摊到每期训练营头上。
  beachhead: >-
    有明确平台型企业合作伙伴、要求被投公司入营六个月内达成明确收入里程碑的欧洲结构化 AI 加速器训练营(Station F F/ai 式项目)
  wedge: >-
    一套按训练营整体授权的导入工具包——自动生成安全和供应商风险问卷答案,按特定合作伙伴市场(HubSpot App Marketplace、GitHub Marketplace、Rippling App Store)格式打包上架资料,并接好按用量计费的钩子,让创业公司能在一期训练营周期内,从拿到合作伙伴引荐走到开出第一张发票。
  whyNowCatalyst: >-
    Station F 第二期训练营明确把成功标准定为六个月内 100 万欧元收入,合作伙伴名单里又堆满了自带应用市场的平台(HubSpot、GitHub、Rippling),这就凑出了一批目标明确、有时间窗限制的客户——他们现在就需要一条更快的"采购到开票"路径。
  ventureScalePath: >-
    先拿下 Station F 这类训练营做试点,再扩展到其他欧美结构化 AI 加速器和企业风投项目,然后跳出训练营,把这套打包引擎直接卖给任何想上架主流 SaaS 市场的种子期 B2B AI 创业公司——同时沉淀一套关于哪些采购和上架方式真正能转化成交的专有数据。
solution: >-
  这款产品是一套共享的导入引擎,加速器按训练营购买授权,创业公司直接使用。它读入创业公司的产品、基础设施和数据处理方式,自动起草安全问卷答案和轻量供应商风险声明;生成按特定合作伙伴市场格式化好的上架资料——比如 HubSpot 的 App Marketplace、GitHub Marketplace、Rippling 的 App Store;再通过标准支付层接好按用量计费,让一份签约试点在几天内(而不是几个季度)变成一张计量发票。加速器的合作伙伴团队可以通过训练营看板,追踪每家被投公司的"首笔收入到账时间",标记出卡在采购环节的公司,好让合作伙伴在训练营窗口关闭前及时介入。随着越来越多期训练营跑过这套系统,产品会不断积累一份基准数据——哪些安全问卷答案、上架格式和定价结构,在每个合作伙伴市场里最快促成企业试点成交。
goToMarketSeed:
  firstCustomer: >-
    Station F 式欧洲 AI 加速器里,负责一期有明确六个月收入目标的企业合作伙伴训练营的合作伙伴关系或项目运营负责人
  buyingTrigger: >-
    新一期训练营启动,点名了平台合作伙伴、公开了收入里程碑,加速器需要在项目结束前,让每家被投公司都把合作伙伴引荐转化成计费合同。
  currentAlternative: >-
    创始人自己零散应付,单独使用 Vanta、SafeBase 这类通用安全问卷工具,再手动一次次提交市场上架申请,训练营层面完全没有协调。
  switchingReason: >-
    一份训练营整体授权,能省掉几十家创业公司各自重复造同一套采购和上架资料的功夫,在项目自己的收入窗口期内缩短首笔收入到账时间,还能给加速器一个看板,向企业赞助方证明合作伙伴项目的投资回报。
  pricingHypothesis: >-
    向加速器按每期训练营收取授权费,费用按被投公司数量计;另外对通过平台计费钩子开出的发票收入,收取一笔按用量计算的费用。
whyNow:
  - point: >-
      Station F 现在把训练营的成败直接系在六个月 100 万欧元收入上,这就催生了一个明确又紧迫的客户需求——谁能在同样的窗口期内压缩采购时间,谁就有市场。
    signalRefs: ["加速器现在看的是收入速度,而不是路演打磨得多漂亮"]
    sourceRefs: [1]
  - point: >-
      新一期训练营的企业合作伙伴本身就是运营应用市场的平台,这意味着一款做打包和上架的产品,能直接接入加速器已经打通的渠道。
    signalRefs: ["企业合作伙伴本身就是自带应用市场的平台公司"]
    sourceRefs: [1]
  - point: >-
      就算一期训练营 80% 的创始人都是连续创业者,依然需要加速器牵线才能拿到企业资源,这说明创始人经验本身解决不了企业客户导入这道瓶颈,专用工具还有加分空间。
    signalRefs: ["连续创业者也无法独自压缩商业化周期"]
    sourceRefs: [1]
  - point: >-
      创始人默认奔着被收购而不是独立做大,说明大多数训练营公司从未真正建起内部企业销售团队,这就给外包式导入服务留出了长期空间。
    signalRefs: ["欧洲创始人的默认结局是被收购,而非独立做大"]
    sourceRefs: [2]
differentiator: >-
  Vanta、Drata、SafeBase 这类通用合规自动化厂商,卖的是能给任何公司用的横向安全问卷工具;HubSpot、GitHub 这类平台市场,也只管自己的上架流程,不管创业公司从引荐到开票的完整路径。这款产品是专为训练营式加速器关系打造的:把安全包装、多市场上架格式化和计费开通,打包进加速器只需买一次、每家被投公司都能复用的一份授权里;再靠不断学习哪种包装方式在每个具体企业合作伙伴的市场里转化最快,滚出一份任何单一创业公司工具或单一市场平台都攒不出来的数据优势。
