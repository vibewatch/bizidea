scenarios:
  downside:
    description: "Accelerator budget ownership stays messy and one cohort slips an intake cycle, so the revenue mix remains more pilot-heavy for longer."
    y3RevenueK: 1885.0
    y3EbitdaK: -318.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
      - "Only one Y1 paid cohort closes before kickoff and the second renewal slips by one intake cycle."
      - "Q4Y3 active paid workflows end near 70 instead of 94."
      - "Y3 exit gross margin stalls near 69% because human review and implementation stay heavier."
  base:
    description: "Two paid Y1 cohorts compound into renewals plus alumni direct subscriptions, taking the business near breakeven on a 10-FTE team by Y3."
    y3RevenueK: 2771.6
    y3EbitdaK: 14.8
    cashLowPointK: 636.8
    keyAssumptionChanges:
      - "Two paid cohort pilots land in Y1 and yield 36 active paid workflows by M12."
      - "Active paid workflows rise to 60 by Q4Y2 and 94 by Q4Y3 as renewals and alumni subscriptions accumulate."
      - "Gross margin improves from the mid-40s in Y1 pilots to the mid-70s by Q4Y3."
  upside:
    description: "A third cohort plus faster alumni continuation creates a more software-like mix and pushes the company clearly EBITDA positive in Y3."
    y3RevenueK: 3440.0
    y3EbitdaK: 430.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - "A third paid cohort lands by early Y2 and direct alumni conversion beats the BP 60% expansion target."
      - "Q4Y3 active paid workflows exceed 105 with stronger direct subscriptions and usage-fee attach."
      - "Exit gross margin reaches 75%-76% one quarter earlier because template reuse is stronger."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Blended annual value per workflow holds closer to the researched $30K heuristic."
    baseCase: "Blended annual value per workflow rises toward roughly $34K in the base case."
    upsideCase: "Direct alumni and billing-fee mix push blended annual value toward roughly $38K."
    y3RevenueImpactK: -325.0
    cashImpactK: -250.0
  - variable: "CAC"
    downsideCase: "CAC rises toward $19K per active workflow because accelerator referrals underperform."
    baseCase: "CAC stays near $15K with founder-led selling and concentrated cohort outreach."
    upsideCase: "CAC falls toward $12K once referrals and repeat cohorts lower acquisition work."
    y3RevenueImpactK: -120.0
    cashImpactK: -220.0
  - variable: "churn"
    downsideCase: "Monthly churn drifts toward 4.0% if post-cohort value is weaker than promised."
    baseCase: "Monthly churn holds at 2.5% once the workflow is embedded."
    upsideCase: "Monthly churn improves toward 1.5% when renewals and alumni continuation are strong."
    y3RevenueImpactK: -210.0
    cashImpactK: -180.0
  - variable: "sales cycle"
    downsideCase: "One cohort intake slips and accelerator approval stretches by roughly one quarter."
    baseCase: "Paid cohorts close before kickoff and renewals are decided inside the next batch planning cycle."
    upsideCase: "Budget approval compresses by roughly one quarter through stronger proof and partner sponsorship."
    y3RevenueImpactK: -360.0
    cashImpactK: -300.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin reaches only 69% because review work stays bespoke."
    baseCase: "Y3 average gross margin is about 72% and exits at 74%."
    upsideCase: "Exit gross margin reaches 75%-76% as the top ecosystems become templated."
    y3RevenueImpactK: 0.0
    cashImpactK: -170.0
  - variable: "hiring pace"
    downsideCase: "One engineer and one GTM hire are pulled forward before renewal proof is established."
    baseCase: "Hiring remains milestone-gated and follows the BP sequencing."
    upsideCase: "The second GTM hire waits for clearer alumni pull without slowing revenue."
    y3RevenueImpactK: -60.0
    cashImpactK: -200.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      AcceleratorLeads[Accelerator leads] --> CohortPilots[Paid cohort pilots]
      CohortPilots --> ActiveWorkflows[Active paid workflows]
      ActiveWorkflows --> AlumniSubs[Alumni subscriptions]
      ActiveWorkflows --> UsageFees[Billing usage fees]
      CohortPilots --> Revenue[Revenue]
      AlumniSubs --> Revenue
      UsageFees --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by two paid Y1 cohorts that expand to 60 active workflows by Q4Y2 and 94 by Q4Y3 while revenue per workflow rises as alumni subscriptions and billing fees replace pilot pricing."
  - checkName: "Must go right"
    finding: "The first cohorts have to produce either renewals or paid alumni continuations by month 12, or the Y2 ARPU and gross-margin ramp does not hold."
  - checkName: "Model breaks if"
    finding: "If a cohort launch slips by one intake cycle or accelerator budget ownership never firms up, the downside case drives Y3 EBITDA back below -$300K and compresses cash toward roughly $0.2M."
  - checkName: "Next-round proof"
    finding: "The next round is justified by showing 2-3 paid cohorts, a 25% faster intro-to-first-invoice cycle, and repeat spend that sustains 40-60 active workflows by month 18."
sanityChecks:
  ruleOf40: "Y3 growth 123.2% + EBITDA margin 0.5% = 123.7%"
  burnMultiple: "Y2 burn multiple 0.6x (EBITDA burn $615K on $1103.4K of net new revenue); Y3 EBITDA turns slightly positive."
  revenuePerFte: "$277K Y3 using 10 year-end FTE (benchmark $200-400K SaaS)"
  flags:
    - "The model still depends on accelerator operators funding pilots before budget ownership is fully proven; if sponsor or founder budgets replace accelerator spend, CAC and conversion timing will change."
    - "Y3 blended revenue per workflow exits above the research $30K heuristic because the base case assumes alumni subscriptions and billing-fee attach become a meaningful share of mix."
    - "Rule-of-40 looks unusually strong only because Y2 starts from a very small base; renewal and alumni continuation are more informative than the headline percentage."
    - "Revenue lands in cohort-sized batches, so a single intake slip has more cash impact than a typical month-to-month SaaS miss."
