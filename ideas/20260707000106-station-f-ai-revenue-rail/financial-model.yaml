slug: ai-startup-enterprise-onramp
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-07] the model starts in the first full month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed raise"
    value: "$2.2M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a mid-range pre-seed that still leaves cash above the floor through the renewal proof point."
  - id: A3
    name: "Starting paid workflows"
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0-12 months] the company begins pre-revenue and must first close paid cohort pilots."
  - id: A4
    name: "Customer unit definition"
    value: "One active paid startup workflow counted net of churn"
    unit: "definition"
    source: "[BP businessModel.unitOfValue] customersEop tracks the active startup workflow moving from partner intro to first invoice, whether paid via cohort contract or post-cohort direct subscription."
  - id: A5
    name: "Initial paid cohort size"
    value: "15"
    unit: "startup workflows per cohort"
    source: "[BP strategicChoices.beachhead + BP investorMemo.firstCustomer.initialContract] the model uses the low end of the stated 15-20 startup batch size to stay conservative on early cohort activation."
  - id: A6
    name: "Paid cohort pilot price"
    value: "$60K over about 6 months"
    unit: "USD per cohort"
    source: "[BP investorMemo.firstCustomer.initialContract $40k-$80k paid cohort pilot] the base case uses the midpoint pilot value for the first paid cohort."
  - id: A7
    name: "Recurring accelerator license price"
    value: "$110K ARR"
    unit: "USD per accelerator"
    source: "[BP investorMemo.firstCustomer.initialContract $75k-$150k annual accelerator license] the base case uses a midpoint recurring accelerator price before sponsor or analytics upsell."
  - id: A8
    name: "Alumni direct subscription price"
    value: "$20K ARR"
    unit: "USD per startup"
    source: "[BP investorMemo.firstCustomer.initialContract optional $15k-$30k post-cohort startup subscriptions] the model uses the midpoint direct subscription for the startups that keep using the workflow after a cohort."
  - id: A9
    name: "Revenue recognition convention"
    value: "Period-end active workflows multiplied by blended realized revenue per workflow: Y1 about $0.7K-$1.1K per month, Y2 about $1.7K-$2.3K per month, and Y3 about $2.5K-$3.1K per month as the mix shifts from pilot seats toward renewals, direct subscriptions, and billing-fee attach."
    unit: "formula"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som $2.7M on ~90 workflows + Research bottomUpSizingDrivers ~$30K startup-year heuristic] the schedule ramps toward the researched blended spend as the revenue mix matures."
  - id: A10
    name: "Workflow ramp"
    value: "36 active paid workflows by M12, 60 by Q4Y2, and 94 by Q4Y3"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] the base case matches two early paid cohorts, the 40-60 workflow year-2 milestone, and a slightly above-90 year-3 exit for the researched SOM case."
  - id: A11
    name: "Post-cohort continuation / renewal mix"
    value: "First paid cohorts generate 6 alumni continuations by M12 and then trend toward the BP target of 60%+ renewal or alumni direct expansion during Y2."
    unit: "mix assumption"
    source: "[BP gtm.funnelTargets pilot cohort→renewal or alumni direct expansion 60%+] the model only partially credits that target in Y1 and lets the mix improve over Y2."
  - id: A12
    name: "Gross margin ramp"
    value: "45% in early pilots, 57%-68% across Y2, and 69%-74% across Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions human-reviewed AI drafts + BP operations] margins start below target because human review and onboarding are heavy, then rise above target once templates and integrations are reused."
  - id: A13
    name: "Hiring timeline"
    value: "M1 founder and founding engineer; M3 implementation/compliance; M8 engineer 2; M9 partnerships; M15 implementation 2; M19 engineer 3; M22 ops; M25 sales 2; M28 engineer 4"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays implementation-first through pilot proof and adds scale roles only after renewals and alumni continuation look real."
  - id: A14
    name: "Founder / CEO loaded compensation"
    value: "$180K"
    unit: "USD per year"
    source: "[startup-finance heuristic for a lean pre-seed founder salary plus payroll taxes and benefits] commercial risk is highest, but founder cash pay remains below later-stage market levels."
  - id: A15
    name: "Engineering loaded compensation"
    value: "$185K"
    unit: "USD per engineer per year"
    source: "[startup-finance heuristic for senior workflow and integration engineering talent] enough cash comp to recruit strong builders without modeling big-company packages."
  - id: A16
    name: "Implementation / compliance loaded compensation"
    value: "$150K"
    unit: "USD per hire per year"
    source: "[BP team implementation/compliance lead + startup-finance heuristic] reflects a technical delivery and evidence-quality owner without creating a large services bench."
  - id: A17
    name: "Partnerships / sales loaded compensation"
    value: "$165K"
    unit: "USD per hire per year"
    source: "[BP team partnerships lead + startup-finance heuristic] includes a lean enterprise GTM package and travel-heavy partner development."
  - id: A18
    name: "G&A / ops loaded compensation"
    value: "$120K"
    unit: "USD per hire per year"
    source: "[startup-finance heuristic] covers basic finance, vendor management, security admin, and company operations."
  - id: A19
    name: "Payroll allocation to P&L lines"
    value: "Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; implementation 40% S&M / 60% R&D; partnerships 100% S&M; ops 100% G&A"
    unit: "allocation"
    source: "[BP team rationales + BP operations] maps payroll into commercial, product, and back-office lines while keeping implementation partly product-building and partly customer-facing."
  - id: A20
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll S&M / R&D / G&A starts at $3K / $8K / $5K, then steps to $6K / $9K / $6K when the first ecosystem packs go live and settles near $10K / $12K / $8K by Y3."
    unit: "USD per month"
    source: "[BP operations + startup-finance heuristic] covers cloud tooling, travel, legal, insurance, and compliance overhead without assuming a large paid-demand engine."
  - id: A21
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] capex, financing fees, taxes, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: A22
    name: "Steady-state monthly churn"
    value: "2.5%"
    unit: "percent per month"
    source: "[startup-finance heuristic for early workflow SaaS + BP risk that renewals or direct continuations may not materialize] the product should be sticky once embedded, but renewal and post-cohort risk justify a conservative early churn assumption."
  - id: A23
    name: "CAC convention"
    value: "Total 36-month sales and marketing spend divided by 94 ending active paid workflows"
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led selling, accelerator partnerships, and alumni expansion across the full three-year buildout."
  - id: A24
    name: "Funding milestone for ask sizing"
    value: "By month 12 the company should show 2-3 paid cohorts, at least 25% faster intro-to-first-invoice, and either 1 accelerator renewal or 5 paid alumni continuations."
    unit: "milestone"
    source: "[BP milestones 0-12 months + BP fundingAsk runwayMonths 18 + BP experimentRoadmap] the pre-seed is sized to reach proof on buyer budget, cycle-time improvement, and post-cohort repeat revenue with six months of extra cushion."
  - id: A25
    name: "Quarterly salary roll convention"
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only the year-end snapshots."
    unit: "convention"
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the monthly hiring ramp even though Y2 and Y3 headcount snapshots only show year-end points."
