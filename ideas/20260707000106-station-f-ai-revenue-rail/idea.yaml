jobsToBeDone:
  - job: >-
      When a portfolio startup gets a corporate-partner intro during a revenue-graded cohort, help the founder produce security answers and a marketplace listing fast, so the intro converts to a signed pilot before the cohort window closes.
    currentAlternative: Founder-built spreadsheets, generic compliance tools used alone, and manual marketplace submissions
    successMetric: Days from corporate intro to first signed pilot contract
  - job: >-
      When a signed pilot needs to start generating revenue, help the startup activate usage-based billing immediately, so the accelerator's revenue milestone is met with real invoiced dollars, not just a signed letter of intent.
    currentAlternative: Manual invoicing or delayed billing setup after the pilot already started
    successMetric: Days from signed pilot to first invoiced dollar
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      Two same-day, fetch-verified sources confirm a named cohort, a specific revenue target, and a concrete corporate-partner roster, though the signal still centers on one accelerator's self-reported program design.
  painIntensity:
    score: 4
    rationale: >-
      Missing a six-month revenue milestone can mean losing follow-on funding credibility and partner goodwill, but the pain is programmatic rather than an acute operational failure.
  wedgeClarity:
    score: 4
    rationale: >-
      The first product is narrow and concrete: generate security packages, format marketplace listings, and activate billing for one cohort's portfolio companies.
  defensibility:
    score: 3
    rationale: >-
      The packaging workflow itself is replicable, but the compounding benchmark of which packaging and pricing patterns convert fastest inside specific partner marketplaces is harder for a single-startup tool to replicate.
  ventureScale:
    score: 4
    rationale: >-
      Starting inside one accelerator's cohort is narrow, but the same onboarding engine can expand to every structured accelerator and corporate-venture program, then to any seed-stage startup targeting enterprise marketplaces directly.
topRisks:
  - name: Marketplace partners build it themselves
    description: >-
      HubSpot, GitHub, or Rippling could add native fast-track onboarding for accelerator-sourced startups, removing the need for a third-party packaging layer.
    mitigation: >-
      Stay cross-marketplace rather than single-platform, and go deep on the compliance and cohort-coordination work that a single marketplace has little incentive to build for competitors' ecosystems too.
  - name: Accelerators treat it as a nice-to-have
    description: >-
      Program directors may not budget for a new tool if they believe founders should solve enterprise onboarding themselves as part of the accelerator experience.
    mitigation: >-
      Run the first cohort as a free or success-fee pilot tied directly to the program's own revenue milestone, then convert to a paid license once time-to-first-dollar improvement is measurable.
  - name: Crowded compliance-automation category
    description: >-
      Established vendor-risk and security-questionnaire tools like Vanta, Drata, and SafeBase could bundle marketplace listing and billing features and out-resource this narrower entrant.
    mitigation: >-
      Integrate with those tools rather than rebuild core GRC functionality, and differentiate on cohort-wide coordination, marketplace-specific listing formats, and the accelerator relationship those vendors do not pursue.
