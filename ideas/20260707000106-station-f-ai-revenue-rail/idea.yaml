problem: >-
  Pre-seed and seed-stage AI startups inside structured European accelerator cohorts get warm introductions to large corporate partners, but converting an intro into a signed, billed contract still takes months because the startup has no security questionnaire answers, no marketplace listing, no usage-based billing hooks, and no one internally who has run enterprise procurement before. Accelerators like Station F now grade cohorts on hitting €1 million in revenue within six months, but the bottleneck is not more intros, it is the founders' inability to package their product for fast enterprise vendor onboarding while also building the product. Startups either stall in procurement queues past the program's window or burn scarce founder time rebuilding the same compliance and listing assets that every other cohort company also needs.
targetUser:
  primary: >-
    Founder or founding GTM lead at a pre-seed to seed-stage AI startup enrolled in a structured accelerator cohort with named corporate partners (e.g., Station F F/ai)
  secondary: >-
    Partnerships or program-operations lead at the accelerator who is accountable for cohort-wide revenue outcomes and corporate-partner satisfaction
  buyer: >-
    Accelerator program director or head of partnerships who purchases a cohort-wide license to compress every portfolio company's time-to-first-dollar
startupThesis:
  nonObviousInsight: >-
    Accelerators have already solved the intro problem; the unsolved problem is that turning a corporate-partner intro into a paid, marketplace-transacting contract requires enterprise-grade packaging (security answers, listing assets, usage billing) that no pre-seed team has bandwidth to build, and that no single accelerator can amortize across cohorts without a shared, reusable tool.
  beachhead: >-
    Structured European AI accelerator cohorts with named platform corporate partners (Station F F/ai style programs) whose portfolio companies must hit a defined revenue milestone within six months of joining
  wedge: >-
    A cohort-licensed onboarding kit that auto-generates security and vendor-risk answers, marketplace listing packages formatted for specific partner marketplaces (HubSpot App Marketplace, GitHub Marketplace, Rippling App Store), and usage-based billing hooks so a startup can go from partner intro to first invoice inside one cohort cycle
  whyNowCatalyst: >-
    Station F's second cohort explicitly measures success by €1 million in six-month revenue and stacked its partner roster with marketplace-operating platforms (HubSpot, GitHub, Rippling), creating a defined, time-boxed customer segment that needs a faster procurement-to-invoice path right now.
  ventureScalePath: >-
    Win the Station F-style cohort as a pilot, expand to other structured European and U.S. AI accelerators and corporate-venture programs, then move beyond cohorts to sell the packaging engine directly to any seed-stage B2B AI startup trying to list on major SaaS marketplaces, building a proprietary dataset of which procurement and listing patterns actually convert.
solution: >-
  The product is a shared onboarding engine that accelerators license per cohort and startups use directly. It ingests a startup's product, infra stack, and data-handling practices, then auto-drafts security questionnaire responses and lightweight vendor-risk attestations, generates listing-ready assets formatted for specific partner marketplaces such as HubSpot's App Marketplace, GitHub Marketplace, and Rippling's App Store, and wires up usage-based billing through a standard payments layer so a signed pilot converts into a metered invoice within days instead of quarters. A cohort dashboard lets the accelerator's partnerships team track every portfolio company's time-to-first-dollar and flag which startups are stuck in procurement so partners can intervene before the cohort window closes. As more cohorts run through the system, the product accumulates a benchmark of which security answers, listing formats, and pricing structures actually close enterprise pilots fastest inside each partner marketplace.
goToMarketSeed:
  firstCustomer: >-
    Partnerships or program-operations lead at a Station F-style European AI accelerator running a corporate-partner cohort with a defined six-month revenue target for portfolio companies
  buyingTrigger: >-
    A new cohort launches with named platform partners and a public revenue milestone, and the accelerator needs every portfolio company to convert partner intros into billed contracts before the program ends.
  currentAlternative: >-
    Ad hoc founder effort, generic security-questionnaire tools like Vanta or SafeBase used in isolation, and manual one-off marketplace listing submissions with no cohort-wide coordination
  switchingReason: >-
    A cohort-wide license replaces dozens of startups independently reinventing the same procurement and listing packages, cuts time-to-first-dollar inside the program's own revenue window, and gives the accelerator a dashboard to prove partner-program ROI to its corporate sponsors.
  pricingHypothesis: >-
    Per-cohort license fee to the accelerator sized by portfolio-company count, plus a usage-based fee on invoiced revenue that flows through the platform's billing hooks.
