openQuestions:
  - How many accelerator corporate-partner introductions actually require a marketplace listing versus a direct procurement workflow?
  - Will accelerator operators buy a cohort-wide workflow, or will startups only pay individually once they feel enterprise pull?
  - 'Which two or three ecosystems recur most often in seed-stage AI pilots: GitHub, HubSpot, Rippling, Slack, Atlassian, or cloud marketplaces?'
  - What share of time-to-first-dollar sits in security review versus legal onboarding versus billing activation?
  - How much human editing do enterprise buyers or founders still require before trusting AI-generated questionnaire answers?
