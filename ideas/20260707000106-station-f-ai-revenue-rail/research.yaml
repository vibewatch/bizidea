  fiveForces:
    supplierPower:
      score: 4
      rationale: >-
        Marketplace owners and billing platforms control listing rules, review queues, webhook contracts, and transaction models, so upstream platform changes can materially shape the product.
      sourceRefs:
        - 4
        - 16
        - 26
        - 78
    buyerPower:
      score: 4
      rationale: >-
        The initial buyer universe is concentrated among a limited set of accelerators and structured programs, and each buyer can fall back to manual process or point tools.
      sourceRefs:
        - 63
        - 73
        - 74
    threatOfEntrants:
      score: 3
      rationale: >-
        AI drafting and workflow glue are increasingly commoditized, but the cross-marketplace playbook and conversion dataset still require repeated partner-specific execution.
      sourceRefs:
        - 4
        - 26
        - 88
    threatOfSubstitutes:
      score: 5
      rationale: >-
        Founders can approximate the workflow with trust/compliance tools, manual listing work, native marketplace processes, partner ops tools, and billing software.
      sourceRefs:
        - 26
        - 90
        - 92
        - 95
    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is high in adjacent layers because security-review automation, ecosystem ops, and marketplace GTM already have credible vendors, even if none owns the exact cohort-to-invoice wedge.
      sourceRefs:
        - 88
        - 92
        - 93
        - 96
  pestle:
    - factor: political
      impact: positive
      point: EU policy support now explicitly focuses on startup scale-up, ecosystem coordination, and AI commercialization rather than research alone.
      sourceRefs:
        - 69
        - 70
    - factor: economic
      impact: negative
      point: European AI funding is growing, but the late-stage capital base remains fragmented, which makes faster revenue proof more important for founders.
      sourceRefs:
        - 70
    - factor: social
      impact: positive
      point: Enterprise buyers increasingly expect vendors to prove security posture with artifacts and structured responses before purchasing.
      sourceRefs:
        - 98
        - 99
    - factor: technological
      impact: positive
      point: The API and workflow primitives for listing, subscriptions, and metering already exist, lowering technical feasibility risk.
      sourceRefs:
        - 10
        - 17
        - 26
    - factor: legal
      impact: negative
      point: AI Act, GDPR, NIS2, and DORA-adjacent expectations increase documentation, oversight, and evidence-handling requirements for any automation layer.
      sourceRefs:
        - 79
        - 81
        - 83
        - 85
  adoptionFrictionMatrix:
    - friction: Accelerator budget ownership is unclear
      severity: high
      affectedBuyer: Accelerator partnerships or program-operations lead
      mitigation: Land pilots tied to a cohort revenue target and quantify time-to-first-dollar improvement before pushing for annual procurement.
      sourceRefs:
        - 63
        - 73
    - friction: Marketplace-specific review rules vary by ecosystem
      severity: high
      affectedBuyer: Founder or founding GTM lead
      mitigation: Start with a small number of ecosystems and ship reusable templates rather than attempting universal marketplace coverage at launch.
      sourceRefs:
        - 4
        - 16
        - 46
        - 51
    - friction: AI-generated answers still require human approval
      severity: high
      affectedBuyer: Founder or security owner
      mitigation: Keep a review-and-approve workflow with linked evidence and version history rather than autonomous submission.
      sourceRefs:
        - 79
        - 86
        - 88
    - friction: Enterprise procurement can still take 55-90 days even with better documents
      severity: high
      affectedBuyer: Founder or procurement champion at the buyer
      mitigation: Pre-publish trust artifacts and create reusable evidence packs before partner introductions happen.
      sourceRefs:
        - 98
        - 99
        - 100
    - friction: Billing activation differs by ecosystem and pricing model
      severity: medium
      affectedBuyer: Founder or finance lead
      mitigation: Default to one billing substrate and add marketplace-native billing only where partner demand is proven.
      sourceRefs:
        - 14
        - 26
        - 78
market:
  tam:
    value: $84.0M
    rationale: Proxy 2,800 qualifying startup units/year = (35 leading European accelerators x 2 cohorts x 15 startups ≈ 1,050) + (20% of YC's 5,000+ companies ≈ 1,000) + (20% of Techstars' 3,700+ companies ≈ 740) x est. $30k startup-equivalent annual spend.
    isEstimate: true
    sourceRefs:
      - 63
      - 73
      - 74
      - 75
  sam:
    value: $18.0M
    rationale: Constrain TAM to ~600 startup units/year across the most accelerator-dense European AI and corporate-partner cohorts plus a small direct alumni tail x est. $30k startup-equivalent annual spend.
    isEstimate: true
    sourceRefs:
      - 63
      - 66
      - 73
  som:
    value: $2.7M
    rationale: Reachable year-3 case assumes ~90 startup-equivalent seats from 4-6 cohort licenses plus a direct alumni tail x est. $30k blended annual value.
    isEstimate: true
    sourceRefs:
      - 63
      - 68
      - 98
