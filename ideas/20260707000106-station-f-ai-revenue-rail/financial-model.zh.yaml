slug: ai-startup-enterprise-onramp
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-07] 模型从商业计划书标注日期之后的第一个完整月份开始。"
  - id: A2
    name: 期初现金 / 种子前融资额
    value: "$2.2M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + model cash curve] 基线情形取种子前融资区间的中段,确保现金在跑到续约验证节点前始终留有余量。"
  - id: A3
    name: 起始付费工作流数量
    value: "0"
    unit: "count"
    source: "[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步,必须先签下付费训练营试点。"
  - id: A4
    name: 客户单位定义
    value: "一个扣除流失后的活跃付费创业公司工作流"
    unit: "definition"
    source: "[BP businessModel.unitOfValue] customersEop 追踪的是从合作伙伴引荐推进到首张发票的活跃创业公司工作流,不论是通过训练营合同还是训练营后的直接订阅付费。"
  - id: A5
    name: 首期付费训练营规模
    value: "15"
    unit: "startup workflows per cohort"
    source: "[BP strategicChoices.beachhead + BP investorMemo.firstCustomer.initialContract] 模型取 15-20 家创业公司批次区间的下限,对早期训练营激活保持保守。"
  - id: A6
    name: 付费训练营试点定价
    value: "约 6 个月内收 $60K"
    unit: "USD per cohort"
    source: "[BP investorMemo.firstCustomer.initialContract $40k-$80k paid cohort pilot] 基线情形对第一期付费训练营,取试点报价区间的中位值。"
  - id: A7
    name: 加速器持续授权定价
    value: "$110K ARR"
    unit: "USD per accelerator"
    source: "[BP investorMemo.firstCustomer.initialContract $75k-$150k annual accelerator license] 基线情形在追加赞助方或分析模块升单前,取年度加速器授权价格区间的中位值。"
  - id: A8
    name: 校友直接订阅定价
    value: "$20K ARR"
    unit: "USD per startup"
    source: "[BP investorMemo.firstCustomer.initialContract optional $15k-$30k post-cohort startup subscriptions] 模型对训练营结束后继续使用该工作流的创业公司,取直接订阅价格区间的中位值。"
  - id: A9
    name: 收入确认惯例
    value: "期末活跃工作流数乘以每工作流的混合已实现收入:随着收入结构从试点席位逐步转向续约、直接订阅和计费抽成,Y1 约每月 $0.7K-$1.1K,Y2 约每月 $1.7K-$2.3K,Y3 约每月 $2.5K-$3.1K。"
    unit: "formula"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som $2.7M on ~90 workflows + Research bottomUpSizingDrivers ~$30K startup-year heuristic] 该节奏随着收入结构成熟,逐步向研究测算的混合支出水平靠拢。"
  - id: A10
    name: 工作流爬坡节奏
    value: "第 12 个月达到 36 个活跃付费工作流,Q4Y2 达到 60 个,Q4Y3 达到 94 个"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] 基线情形对应两期早期付费训练营、40-60 个工作流的第二年里程碑,以及略高于 90 的第三年退出值,契合研究测算的 SOM 情形。"
  - id: A11
    name: 训练营后续用 / 续约结构
    value: "首批付费训练营到第 12 个月带来 6 个校友继续使用案例,此后在 Y2 逐步向商业计划书 60%+ 续约或校友直接扩张的目标靠拢。"
    unit: "mix assumption"
    source: "[BP gtm.funnelTargets pilot cohort→renewal or alumni direct expansion 60%+] 模型在 Y1 只部分兑现该目标,让结构在 Y2 逐步改善。"
  - id: A12
    name: 毛利率爬坡
    value: "早期试点约 45%,Y2 全年 57%-68%,Y3 全年 69%-74%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions human-reviewed AI drafts + BP operations] 早期因为人工复核和导入工作量大,毛利率低于目标;等模板和集成被复用后,毛利率回升并超过目标。"
  - id: A13
    name: 招聘时间表
    value: "第 1 个月:创始人与创始工程师;第 3 个月:实施/合规;第 8 个月:工程师 2 号;第 9 个月:合作伙伴关系;第 15 个月:实施 2 号;第 19 个月:工程师 3 号;第 22 个月:运营;第 25 个月:销售 2 号;第 28 个月:工程师 4 号"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘在试点验证阶段保持以实施为先,只有在续约和校友继续使用看起来真实之后,才增加扩张型岗位。"
  - id: A14
    name: 创始人 / CEO 综合薪酬
    value: "$180K"
    unit: "USD per year"
    source: "[startup-finance heuristic for a lean pre-seed founder salary plus payroll taxes and benefits] 商业风险最高,但创始人的现金薪酬仍低于后期阶段的市场水平。"
  - id: A15
    name: 工程综合薪酬
    value: "$185K"
    unit: "USD per engineer per year"
    source: "[startup-finance heuristic for senior workflow and integration engineering talent] 现金薪酬足以招到资深的工作流和集成工程人才,但不按大厂薪酬包建模。"
  - id: A16
    name: 实施 / 合规综合薪酬
    value: "$150K"
    unit: "USD per hire per year"
    source: "[BP team implementation/compliance lead + startup-finance heuristic] 对应一位技术交付与证据质量负责人,而不是搭建一支庞大的服务团队。"
  - id: A17
    name: 合作伙伴关系 / 销售综合薪酬
    value: "$165K"
    unit: "USD per hire per year"
    source: "[BP team partnerships lead + startup-finance heuristic] 包含一套精简的企业 GTM 薪酬包和高频出差的合作伙伴拓展成本。"
  - id: A18
    name: 行政 / 运营综合薪酬
    value: "$120K"
    unit: "USD per hire per year"
    source: "[startup-finance heuristic] 覆盖基础财务、供应商管理、安全行政和公司运营。"
  - id: A19
    name: 薪酬在损益表科目间的分摊
    value: "创始人 60% 计入销售与市场 / 20% 计入研发 / 20% 计入行政;工程 100% 计入研发;实施 40% 计入销售与市场 / 60% 计入研发;合作伙伴关系 100% 计入销售与市场;运营 100% 计入行政"
    unit: "allocation"
    source: "[BP team rationales + BP operations] 把薪酬分摊到商业、产品和后台科目,同时把实施岗位一部分算作产品建设、一部分算作客户对接。"
  - id: A20
    name: 非薪酬运营开支爬坡
    value: "月度非薪酬销售与市场/研发/行政支出,起始为 $3K / $8K / $5K,首批生态资料包上线后升至 $6K / $9K / $6K,到 Y3 稳定在约 $10K / $12K / $8K。"
    unit: "USD per month"
    source: "[BP operations + startup-finance heuristic] 覆盖云工具、差旅、法务、保险和合规管理开支,不假设有大规模付费获客引擎。"
  - id: A21
    name: 现金转换惯例
    value: "现金变动等于 EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] 假设资本支出、融资费用、税项和营运资本时点差异在种子前阶段可忽略不计。"
  - id: A22
    name: 稳态月流失率
    value: "2.5%"
    unit: "percent per month"
    source: "[startup-finance heuristic for early workflow SaaS + BP risk that renewals or direct continuations may not materialize] 产品一旦嵌入使用应该有较高粘性,但续约和训练营后风险,决定了早期流失率假设应偏保守。"
  - id: A23
    name: CAC 计算惯例
    value: "36 个月销售与市场总支出,除以期末 94 个活跃付费工作流"
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] 这涵盖了创始人主导销售、加速器合作伙伴关系和校友拓展在整个三年建设期的全部投入。"
  - id: A24
    name: 融资规模对应的里程碑
    value: "到第 12 个月,公司应展示 2-3 期付费训练营、引荐到首张发票的周期至少加快 25%,以及 1 次加速器续约或 5 家付费校友继续使用案例。"
    unit: "milestone"
    source: "[BP milestones 0-12 months + BP fundingAsk runwayMonths 18 + BP experimentRoadmap] 这笔种子前融资的规模,是为了在留有六个月额外缓冲的情况下,证明买方预算、周期改善和训练营后持续收入。"
  - id: A25
    name: 季度薪酬滚动惯例
    value: "Y2-Y3 的薪酬行按每个季度内实际的月度招聘情况计算,而不只是取年末快照。"
    unit: "convention"
    source: "[Headcount column convention + BP team startTiming] 即便 Y2 和 Y3 的人头数快照只展示年末数字,这样处理也能让薪酬支出和月度招聘节奏保持内部一致。"
