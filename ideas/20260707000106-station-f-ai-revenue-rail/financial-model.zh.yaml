scenarios:
  downside:
    description: "加速器的预算归属依然混乱不清,有一期训练营的招募周期延后,导致收入结构在更长时间里偏向试点收入。"
    y3RevenueK: 1885.0
    y3EbitdaK: -318.0
    cashLowPointK: 210.0
    keyAssumptionChanges:
      - "Y1 只在启动前签下一期付费训练营,第二次续约延后一个招募周期。"
      - "Q4Y3 活跃付费工作流数收在约 70,而不是 94。"
      - "Y3 退出毛利率停滞在约 69%,因为人工复核和实施工作量一直偏重。"
  base:
    description: "Y1 两期付费训练营滚动出续约和校友直接订阅,到 Y3,10 人全职团队让公司接近盈亏平衡。"
    y3RevenueK: 2771.6
    y3EbitdaK: 14.8
    cashLowPointK: 636.8
    keyAssumptionChanges:
      - "Y1 拿下两期付费训练营试点,到第 12 个月带来 36 个活跃付费工作流。"
      - "随着续约和校友订阅不断积累,活跃付费工作流数到 Q4Y2 升至 60,到 Q4Y3 升至 94。"
      - "毛利率从 Y1 试点阶段的 40% 出头,提升到 Q4Y3 的 70% 出头。"
  upside:
    description: "第三期训练营叠加更快的校友继续使用,让收入结构更像软件公司,推动 Y3 EBITDA 明显转正。"
    y3RevenueK: 3440.0
    y3EbitdaK: 430.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - "第三期付费训练营在 Y2 早期落地,直接校友转化率超过商业计划书 60% 的扩张目标。"
      - "凭借更强的直接订阅和计费抽成,Q4Y3 活跃付费工作流数超过 105。"
      - "由于模板复用效果更强,退出毛利率提前一个季度达到 75%-76%。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "每个工作流的混合年值,更贴近研究测算的 $30K 经验值。"
    baseCase: "基线情形下,每个工作流的混合年值升至约 $34K。"
    upsideCase: "直接校友订阅和计费抽成的组合,把混合年值推高到约 $38K。"
    y3RevenueImpactK: -325.0
    cashImpactK: -250.0
  - variable: "CAC"
    downsideCase: "由于加速器引荐效果不及预期,CAC 升至每个活跃工作流约 $19K。"
    baseCase: "靠创始人主导销售和集中的训练营拓展,CAC 保持在约 $15K。"
    upsideCase: "一旦引荐和多期训练营降低了获客工作量,CAC 降至约 $12K。"
    y3RevenueImpactK: -120.0
    cashImpactK: -220.0
  - variable: "流失率"
    downsideCase: "如果训练营后的价值不及承诺,月流失率会漂移到 4.0%。"
    baseCase: "工作流一旦嵌入使用,月流失率保持在 2.5%。"
    upsideCase: "续约和校友继续使用表现强劲时,月流失率改善到 1.5%。"
    y3RevenueImpactK: -210.0
    cashImpactK: -180.0
  - variable: "销售周期"
    downsideCase: "一期训练营招募延后,加速器审批拉长约一个季度。"
    baseCase: "付费训练营在启动前签约,续约决策在下一期批次规划周期内完成。"
    upsideCase: "凭借更有力的验证和合作伙伴赞助,预算审批周期压缩约一个季度。"
    y3RevenueImpactK: -360.0
    cashImpactK: -300.0
  - variable: "毛利率"
    downsideCase: "由于复核工作始终偏定制化,退出毛利率只达到 69%。"
    baseCase: "Y3 平均毛利率约 72%,退出时达到 74%。"
    upsideCase: "随着主要生态实现模板化,退出毛利率达到 75%-76%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -170.0
  - variable: "招聘节奏"
    downsideCase: "在续约验证成立之前,提前招聘了一名工程师和一名 GTM 岗位。"
    baseCase: "招聘保持按里程碑推进,遵循商业计划书的节奏安排。"
    upsideCase: "第二个 GTM 岗位的招聘,等到校友拉力更明确后再启动,且不拖慢收入增长。"
    y3RevenueImpactK: -60.0
    cashImpactK: -200.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      AcceleratorLeads[Accelerator leads] --> CohortPilots[Paid cohort pilots]
      CohortPilots --> ActiveWorkflows[Active paid workflows]
      ActiveWorkflows --> AlumniSubs[Alumni subscriptions]
      ActiveWorkflows --> UsageFees[Billing usage fees]
      CohortPilots --> Revenue[Revenue]
      AlumniSubs --> Revenue
      UsageFees --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: "收入引擎"
    finding: "基线情形的收入,由 Y1 两期付费训练营驱动,活跃工作流数到 Q4Y2 扩大到 60 个、到 Q4Y3 扩大到 94 个;随着校友订阅和计费抽成逐步替代试点定价,单工作流收入也在上升。"
  - checkName: "必须成立的前提"
    finding: "首批训练营必须在第 12 个月前带来续约或付费校友继续使用,否则 Y2 的 ARPU 和毛利率爬坡假设就站不住。"
  - checkName: "模型失效的条件"
    finding: "如果训练营启动延后一个招募周期,或加速器的预算归属始终定不下来,下行情形会把 Y3 EBITDA 拉回 -$300K 以下,现金压缩到约 $0.2M。"
  - checkName: "下一轮融资的验证要点"
    finding: "下一轮融资的合理性,建立在展示 2-3 期付费训练营、引荐到首张发票周期加快 25%,以及能在第 18 个月支撑 40-60 个活跃工作流的持续性支出上。"
sanityChecks:
  ruleOf40: "Y3 增长率 123.2% + EBITDA 利润率 0.5% = 123.7%"
  burnMultiple: "Y2 燃烧倍数 0.6 倍(EBITDA 燃烧 $615K,对应 $1103.4K 净新增收入);Y3 EBITDA 转为小幅为正。"
  revenuePerFte: "Y3 人均收入 $277K,按年末 10 名全职员工计算(SaaS 基准区间为 $200-400K)"
  flags:
    - "模型仍然依赖加速器运营方在预算归属完全验证之前就为试点出资;如果赞助方或创始人预算取代了加速器支出,CAC 和转化时点会随之变化。"
    - "Y3 退出时单工作流混合收入高于研究测算的 $30K 经验值,因为基线情形假设校友订阅和计费抽成在收入结构中占到了可观比例。"
    - "Rule-of-40 看起来异常强劲,只是因为 Y2 的起始基数很小;续约率和校友继续使用情况,比这个百分比数字本身更能说明问题。"
    - "收入是按训练营批次落地的,所以一次招募延后对现金的冲击,比典型月度 SaaS 目标落空要大得多。"
