slug: stablecoin-exam-evidence-layer
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[商业计划日期 2026-07-04] 模型从商业计划成文之后的第一个完整月份开始。'
- id: A2
  name: 期初现金/种子前轮融资
  value: $2.2M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + 模型现金曲线] 基准情形采用所述区间的低值，因为在第一位 GTM 员工到岗后，招聘会保持不变，直到审查员认可度得到验证。'
- id: A3
  name: 起始付费客户数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP investorMemo.nextDiligence] 公司从零收入起步，必须先把具名审查试点转化为付费客户。'
- id: A4
  name: 客户定义
  value: 一个付费的稳定币发行方或处理商客户，无论处于试点阶段还是年度订阅阶段。
  unit: definition
  source: '[BP market.buyingProcess + BP businessModel.unitOfValue] 获客动作是绑定在一个稳定币项目及其审查材料包上的、客户层面的合规工作流。'
- id: A5
  name: 付费试点定价
  value: 约 4 个月内 5 万美元（约合每月 1.25 万美元）。
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract 4 万-7.5 万美元付费试点] 基准情形采用试点价格的中位数，避免过早假设完整的生产合同金额。'
- id: A6
  name: 生产定价锚点
  value: 15 万美元的年度订阅，加上稳态下约 2.5 万美元的经常性审查材料包生成费（混合 ARR 约 17.5 万美元）。
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract 12 万-20 万美元年度生产订阅加材料包费 + Research market.som 8 个客户、约 17.5 万美元混合 ARR] 模型采用研究支持的 SOM 合同金额。'
- id: A7
  name: 客户增长曲线
  value: 第 12 个月达到 3 个付费客户，第二年第四季度达到 5 个，第三年第四季度达到 8 个。
  unit: customersEop
  source: '[BP milestones 0-12、12-24、24-36 个月 + Research market.som] 基准情形匹配所述里程碑路径，而非假设一次全市场爆发。'
- id: A8
  name: 收入结构演变
  value: 第一年以试点为主；随着试点转化和经常性材料包生成费叠加到订阅之上，每个活跃客户的混合收入逐步提升到 17.5 万美元的稳态水平。
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] 模型把收入增长视为转化加材料包费叠加的结果，而不是按坐席扩张。'
- id: A9
  name: 毛利率曲线
  value: 第一年 45%-50%，第二年 58%-65%，第三年 67%-70%。
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryTechnicalConstraints] 早期的人工证据清理、连接器监控和留存工作，把毛利率达标时间推迟到第三年末。'
- id: A10
  name: 月流失率
  value: 1.5%
  unit: percent per month
  source: '[BP risks + Research openQuestions] 合规证据系统一旦嵌入客户流程应该会很粘性，但审查员信任和厂商数据摩擦仍能解释非零的客户流失率。'
- id: A11
  name: 招聘时间表
  value: 创始人和创始工程师从第 0 个月起到位；合规产品负责人第 1 个月到位；集成工程师第 3 个月到位；实施与合规成功负责人第 6 个月到位；第二年后期新增 1 名销售/合作伙伴关系岗位；在下一轮融资的证明达成之前不再新增全职岗位。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + 创业融资经验法则] 计划在 GTM 上保持创始人主导，在审查员认可度和可复现部署得到证明之前，刻意控制人头数上限。'
- id: A12
  name: 创始人现金薪酬全成本
  value: $120K
  unit: USD/FTE/year
  source: 精简种子前轮创始人薪资的创业融资经验法则，与商业计划中团队保持创始人主导销售和产品的设定一致。
- id: A13
  name: 工程岗位现金薪酬全成本
  value: $175K
  unit: USD/FTE/year
  source: 面向美国本土集成与产品工程师的创业融资经验法则，用于构建商业计划产品与团队部分描述的标准时间线、证据存储和连接器框架。
- id: A14
  name: 合规产品/实施岗位现金薪酬全成本
  value: $140K
  unit: USD/FTE/year
  source: 面向合规产品和入网人才的创业融资经验法则，与商业计划团队部分围绕材料包要求、质量保证和客户上线的角色设定一致。
- id: A15
  name: 销售/合作伙伴关系岗位现金薪酬全成本
  value: $170K
  unit: USD/FTE/year
  source: '[BP gtm.channels + BP team] 创业融资经验法则涵盖一名专注于具名审查试点和合作伙伴转介的企业销售人员的底薪、浮动薪酬和差旅费。'
- id: A16
  name: 薪酬在损益表科目间的分摊
  value: 创始人 60% 销售与市场 / 20% 研发 / 20% 一般及行政；工程 100% 研发；合规产品与实施岗位 30% 销售与市场 / 30% 研发 / 40% 一般及行政；销售 100% 销售与市场。
  unit: allocation
  source: '[BP team rationales + BP operations] 这一分摊比例遵循计划中谁负责销售、部署、产品化和审查员支持的分工。'
- id: A17
  name: 非薪酬运营预算曲线
  value: 第一年早期约每月 1.4 万美元，到第二年第四季度约每月 2.6 万美元，到第三年第四季度约每月 3.4 万美元。
  unit: USD/month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + 创业融资经验法则] 涵盖云服务、数据留存、安全审查、法务、保险、差旅和实施工具，且没有配备大规模的付费需求引擎。'
- id: A18
  name: 收入确认惯例
  value: 一个客户只要在当月或当季度存续期内保持在线，就在整个建模月份或季度中计为活跃客户。
  unit: formula
  source: 采用这一建模惯例，让收入在紧凑的月度和季度布局中与客户数量及混合客单价保持一致。
- id: A19
  name: 现金转换惯例
  value: 现金变动等于 EBITDA。
  unit: formula
  source: 面向一家轻资产软件公司的创业融资经验法则，在种子前轮规模下不单独建模资本支出、税务、债务偿还和营运资金时点。
- id: A20
  name: CAC 计算惯例
  value: 用第一到第三年销售与市场总支出除以第三年第四季度落地的 8 个付费客户，得出 118.7K 美元。
  unit: USD/customer
  source: '[模型计算 + BP gtm.funnelTargets + BP gtm.channels] 这个数字有意偏保守，因为它包含了创始人主导的销售、差旅和早期试点转化工作。'
- id: A21
  name: 下一轮融资定规模的里程碑
  value: 到第二年第四季度，达到 5 个生产客户、1 套可复用的第二家银行或卡组织模板，以及至少 2 个采用持续监控的客户，同时把约 6 个月的现金储备保留到第三年第二季度。
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + 模型现金曲线] 本轮融资的规模是为了在种子轮融资之前，达到可复现、获审查员认可的证明。'
