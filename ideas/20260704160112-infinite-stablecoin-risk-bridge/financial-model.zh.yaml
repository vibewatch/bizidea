scenarios:
  downside:
    description: 审查员认可度花的时间比计划更久，只有更小比例的试点能转化，材料包生成收入停留在偶发状态而非经常性收入。
    y3RevenueK: 820.0
    y3EbitdaK: -780.0
    cashLowPointK: -250.0
    keyAssumptionChanges:
    - 第二年第四季度只到 4 个付费客户，第三年第四季度只到 6 个而非 8 个。
    - 每个活跃客户的混合年收入停留在约 15 万美元附近，因为更少客户从一次具名审查转为持续监控。
    - 第三年毛利率封顶在约 66%，因为人工证据清理和厂商留存工作比计划中更繁重。
  base:
    description: 第一年的 3 个付费客户，到第二年第四季度转化为 5 个付费客户，到第三年第四季度转化为 8 个，同时随着年度订阅加经常性审查材料包费的叠加，每个客户的收入逐步提升。
    y3RevenueK: 1151.4
    y3EbitdaK: -503.1
    cashLowPointK: 201.7
    keyAssumptionChanges:
    - 第一年落地 3 个付费客户，随后来自银行和卡组织的验证把公司带到第二年第四季度的 5 个付费客户。
    - 一旦年度订阅和材料包费叠加起来，稳态经济模型采用每个客户约 17.5 万美元的混合年收入。
    - 人头数在第三年前始终控制在 6 个全职岗位，增长来自一个狭窄的切口，而不是过早扩张到完整的 AML、BaaS 或通用 GRC。
  upside:
    description: 一家担保银行或卡组织提早验证了生成的材料包，合作伙伴转介按计划启动，更多客户采用持续监控和多轮审查周期。
    y3RevenueK: 1475.0
    y3EbitdaK: -260.0
    cashLowPointK: 360.0
    keyAssumptionChanges:
    - 第二年第四季度达到 6 个付费客户，第三年第四季度达到 10 个，因为经审查员认可的客户案例缩短了后续的销售周期。
    - 每个活跃客户的混合年收入攀升到 18.5 万-19 万美元附近，因为更多客户购买持续监控和经常性材料包生成服务。
    - 随着连接器复用效率提升、人工证据清理速度快于基准情形，毛利率达到约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 由于客户购买的经常性审查材料包更少，混合年度 ARPU 稳定在约 16 万美元附近。
  baseCase: 稳态下每个付费客户的混合年度 ARPU 约为 17.5 万美元。
  upsideCase: 更多持续监控和材料包用量把混合年度 ARPU 推高到约 19 万美元。
  y3RevenueImpactK: -150.0
  cashImpactK: -115.0
- variable: CAC
  downsideCase: 如果创始人主导的外拓和审查员教育花的时间比计划更久，CAC 会升到 14 万美元以上。
  baseCase: 用第一到第三年销售与市场总支出除以落地的付费客户数，CAC 约为 118.7K 美元。
  upsideCase: 一旦合作伙伴引荐带来更大比例的成交，CAC 会降到约 9.5 万美元。
  y3RevenueImpactK: -40.0
  cashImpactK: -160.0
- variable: 流失率
  downsideCase: 如果产品始终只是一个审查周使用的工具，而不是一层常驻的管控系统，月流失率会升到 2.5%。
  baseCase: 一旦持续监控嵌入客户流程，月流失率维持在 1.5%。
  upsideCase: 审查员模板和留存证据在运营上形成粘性后，月流失率改善到约 1.0%。
  y3RevenueImpactK: -60.0
  cashImpactK: -70.0
- variable: 销售周期
  downsideCase: 试点审批和审查员签字延后一个季度，同时拖慢试点启动和年度转化。
  baseCase: 具名审查试点在计划的里程碑窗口内转化，一名 GTM 员工就足以支撑到第三年。
  upsideCase: 早期的审查员认可创造出案例，缩短后续从试点到生产的周期。
  y3RevenueImpactK: -190.0
  cashImpactK: -220.0
- variable: 毛利率
  downsideCase: 第三年毛利率停滞在约 66%，因为证据清理和留存归档工作仍然偏人工密集。
  baseCase: 第三年稳态毛利率在第四季度达到 70% 的目标。
  upsideCase: 随着连接器维护和模板生成标准化速度加快，第三年毛利率达到约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -110.0
- variable: 招聘节奏
  downsideCase: 在 5 个客户的验证达成之前，就提前招募了一名额外工程师和一名运营人员。
  baseCase: 公司在第一年之后只新增一名 GTM 员工，其余时间把人头数维持不变，直到第三年。
  upsideCase: 因为部署可复现性得到证明、不需要额外人手，后续招聘被推迟到种子轮。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 稳定币检查就绪收入循环
  mermaid: |
    flowchart LR
      SponsorBankReview --> PaidPilot
      PaidPilot --> ProductionLogo
      ProductionLogo --> ContinuousMonitoring
      ContinuousMonitoring --> ReviewPackages
      ReviewPackages --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入来自把第一年的 3 个付费客户，转化为第二年第四季度的 5 个和第三年第四季度的 8 个客户，退出时每个客户的 ARR 约为 17.5 万美元。
- checkName: 必须走对的一步
  finding: 担保银行或卡组织的审查员必须足够早地认可生成的材料包，让试点在唯一计划的那名 GTM 员工超负荷之前完成转化。
- checkName: 模型会在什么情况下失灵
  finding: 如果销售周期滑后一个季度，且因为人工证据清理持续存在而毛利率停留在 60% 出头，下行情形会在下一轮融资前耗尽现金。
- checkName: 下一轮融资需要的证明
  finding: 一旦公司展示出 5 个生产客户、1 套可复用的第二家银行或卡组织模板，以及至少 2 个采用持续监控的客户，种子轮的故事就最有说服力。
sanityChecks:
  ruleOf40: 第三年增长率 72% + EBITDA 利润率 -44% = 28%。
  burnMultiple: 净烧钱倍数从第二年的约 1.3 倍，改善到第三年在增量收入上约 1.0 倍。
  revenuePerFte: 用第三年第四季度 6 个全职人头计算，第三年每 FTE 收入为 19.2 万美元（垂直 SaaS 基准约为 20 万-40 万美元）。
  flags:
  - 基准情形在第三年结束时仍未实现盈亏平衡，所以种子轮融资取决于能否在新增人头之前，证明银行认可度和扩展收入。
  - 第三年每 FTE 收入只有约 19.2 万美元，略低于健康的垂直 SaaS 基准，留给招聘失误的容错空间有限。
  - 模型假设一名专职 GTM 员工就能支撑从 5 个到 8 个付费客户的路径；如果担保银行案例不能加速建立信任，销售产能会成为瓶颈。
  - 毛利率要到第三年第四季度才能达到 70% 的目标，所以持续存在的人工证据清理或厂商导出摩擦，会很快对现金跑道形成压力。
