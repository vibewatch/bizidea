problem: >-
  稳定币卡发行方和支付处理商很少只用一家厂商做合规：大多数公司会把一家 KYC/交易监控厂商，跟另一家账本或 BaaS 账户通道提供商搭配使用，
  常常还会叠加第二家风控厂商来补齐网络层信号。一旦担保银行或卡组织安排 BSA/AML 检查或定期审查，合规团队就得从每个互不相通的系统里手动导出
  决策日志、案件记录和监控预警，再手工拼成一份按时间排列的完整账户历史。这种拼接工作又慢又容易出错，而且只要运营方更换一家厂商，就会带来
  真实的审计连续性风险，因为新系统很少能继承旧系统的决策留痕。
targetUser:
  primary: 稳定币关联发卡机构或支付处理商的合规负责人或 BSA 官员
  secondary: 发行方担保银行的内控负责人或审计就绪负责人
  buyer: 稳定币发行方或处理商的合规/风控运营副总裁或负责人
startupThesis:
  nonObviousInsight: >-
    像 Infinite 和 Sardine 这样的风控加通道厂商正在抢着把入网、监控和支付打包进"单一技术栈"的叙事里，但大多数真实存在的稳定币运营方
    仍然在 KYC、交易监控和账户通道上跑着 2 到 4 家彼此独立的厂商。眼下没有人拿下担保银行或卡组织检查所要求的、覆盖这套异构技术栈的
    统一、按时间排列的审计叙事，而每一次新的双边厂商打包（比如 Infinite-Sardine）都会让这个缺口对所有不在这对组合里的人变得更宽。
  beachhead: >-
    已经在跑 2 家以上独立风控/合规厂商、同时搭配一家独立 BaaS 或账本通道提供商，并且在未来 90 天内已排定担保银行或卡组织合规检查的
    A 轮到 C 轮稳定币关联发卡机构和支付处理商
  wedge: >-
    一个只读的证据聚合层：通过 API 从运营方现有的任何风控、KYC 和通道厂商里拉取决策日志、案件历史和监控预警，把它们归一化成一条
    每个账户唯一、不可篡改的时间线，并自动生成每家担保银行或卡组织所要求的特定审计材料格式。
  whyNowCatalyst: >-
    Infinite-Sardine 的整合再一次证明，风控厂商和通道厂商正在打包成单一技术栈叙事，以消除人工审核摩擦——但这同时也让每个不在这对
    特定组合里的运营方，跨厂商的文档缺口变得更宽，恰逢 2025-26 年稳定币增长正把更多发行方拉进有排期的担保银行检查周期。
  ventureScalePath: >-
    先从稳定币卡发行方和处理商的审计证据层做起，扩展到持续的检查就绪监控（而不只是某个时间点的材料包），覆盖 BNPL 和嵌入式银行等
    相邻受监管金融科技细分领域，再成为银行和卡组织信赖、能为任何金融科技公司持续合规状况出具证明的中立记录系统。
solution: >-
  这款产品通过 API 连接稳定币运营方已经在用的合规和通道厂商（比如一家 KYC/风控厂商、一家交易监控厂商，和一家 BaaS 或账本提供商），
  按计划节奏拉取决策日志、预警处置结果和账户事件。它把这些异构记录归一化成每个客户账户唯一、带时间戳的标准时间线，在审查员发现之前
  先标记出厂商记录之间的缺口或矛盾，并按照特定担保银行或卡组织要求的格式自动生成审计材料包。仪表盘让合规团队全年都能查看和批注这条
  统一时间线，而不只是在检查冲刺周里才用；证据存储独立于任何单一厂商而持久留存，所以更换风控或通道提供商永远不会打断审计连续性。
goToMarketSeed:
  firstCustomer: >-
    A/B 轮稳定币关联借记卡发行方的合规负责人，该公司使用一家 KYC/风控厂商（例如 Sardine、Persona 或 Alloy）加一家独立的 BaaS
    或账本提供商来支撑账户通道，并且下个季度已排定担保银行 BSA/AML 检查
  buyingTrigger: >-
    担保银行或卡组织在排定检查或定期项目审查之前，正式提出需要一份整合的入网到监控审计材料包
  currentAlternative: 从每家厂商仪表盘手动导出并拼接电子表格的人工流程，或者由内部工程团队搭建一次性的审计日志管道
  switchingReason: >-
    把检查准备时间从数周的人工拼接压缩到几天，在审查员发现之前先揪出跨厂商的不一致，还消除了运营方一旦更换风控或通道厂商就丢失
    审计连续性的迁移风险
  pricingHypothesis: 按在审计账户数计费的月度平台费，外加按连接厂商数量而扩展的每次审计材料包生成费
whyNow:
  - point: 厂商正在主动把风控信号和账户通道打包进单一技术栈叙事，这加速了这对特定组合之外所有人的碎片化缺口。
    signalRefs: [风控与通道的拼接正在加速]
    sourceRefs: [1]
  - point: 厂商自己都证实，人工审核和入网摩擦是当下稳定币公司和金融机构一项真实存在、被点名的成本。
    signalRefs: [人工审核被明确点名为痛点]
    sourceRefs: [1]
  - point: 因为解法是一次双边整合而非行业标准，任何用了不同厂商组合的运营方都拿不出统一的审计轨迹。
    signalRefs: [解法是双边配对，不是行业标准]
    sourceRefs: [1]
  - point: 这个趋势还处于早期且证据单一，意味着一个中立的聚合方可以在现有厂商把打包范围扩展到这里之前，率先建立跨厂商审计证据这个品类。
    signalRefs: [单一来源，早期阶段的证据]
    sourceRefs: [1]
differentiator: >-
  Infinite-Sardine 或类似的打包组合（比如 Alloy 加一家账本提供商）只能统一自己两套系统内部产生的数据，这款产品从设计上就与厂商无关：
  它可以从运营方现有的任意风控、KYC 和通道提供商组合中摄取数据，所以更换或新增厂商永远不会打断审计连续性。证据存储是运营方自己
  持久拥有的资产，而不是任何单一厂商关系的副产品——这正是担保银行或审查员在质疑厂商集中度风险时最需要的属性。
