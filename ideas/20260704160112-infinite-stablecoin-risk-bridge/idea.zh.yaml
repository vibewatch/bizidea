jobsToBeDone:
  - job: 担保银行安排 BSA/AML 检查时，帮我们的合规团队在所用的每一家厂商之间拼出一条完整的入网到监控审计轨迹，让他们不用花几周手工拼接就能通过检查。
    currentAlternative: 从每家厂商仪表盘手动导出并拼接电子表格
    successMetric: 检查准备时间从数周压缩到几天，且没有审查员标记出任何文档缺口
ideaScorecard:
  signalStrength:
    score: 3
    rationale: 筛选信号对痛点（人工审核、入网摩擦）的描述具体而明确，但只依赖单一抓取来源，没有独立确认。
  painIntensity:
    score: 4
    rationale: 担保银行检查准备是合规团队一项反复出现、受截止日期驱动的成本中心，跨厂商拼接在金融科技合规领域是众所周知的运营难题。
  wedgeClarity:
    score: 4
    rationale: 滩头市场（面临已排期检查、且用了 2 家以上厂商的发行方）和触发点（正式的审计材料包请求）都很窄且易于识别，给出了清晰的首个客户画像。
  defensibility:
    score: 3
    rationale: 厂商无关的聚合方式在设计上就能对抗单一厂商的打包组合，但现有厂商最终可能自己加上第三方数据摄取，这个空间也可能商品化为一项合规运营功能。
  ventureScale:
    score: 3
    rationale: 稳定币发行方/处理商这个初始市场是真实存在的，但仍在成形；能否达到风险投资级别的规模，取决于能否从稳定币滩头市场扩展到更广的金融科技检查就绪领域。
topRisks:
  - name: 现有厂商扩大打包范围
    description: Infinite、Sardine 或对手组合（比如 Alloy 加一家账本提供商）可能把自己的打包范围扩展到包含第三方审计材料包生成，把中立的聚合方挤出局。
    mitigation: 靠严格的厂商中立性和对每一种主要厂商组合的快速集成来竞争，把自己定位为唯一能消除单一厂商锁定、而不是强化锁定的选项。
  - name: 厂商限制数据访问
    description: 风控、KYC 和通道厂商可能限制、限速或对决策与案件日志的 API 访问收费，堵住产品所依赖的核心数据摄取管道。
    mitigation: 优先集成提供开放、有文档的 API 的厂商，并与那些能从客户"通过检查就绪认证"中获益的厂商推进正式的数据共享合作。
  - name: 监管方不予认可
    description: 担保银行或审查员可能拒绝把第三方生成的审计材料包当作权威依据，仍然要求运营方自己的合规团队手动重新核实一切。
    mitigation: 与合规咨询伙伴或前审查员共同设计审计材料包格式，先在一家友好的担保银行做试点，在更大范围推广前拿到明确的认可。
