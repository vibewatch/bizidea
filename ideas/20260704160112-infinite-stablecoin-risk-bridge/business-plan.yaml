slug: stablecoin-exam-evidence-layer
date: '2026-07-04'
executiveSummary: >-
  Stablecoin-linked card issuers and payment processors now face a real control
  problem, not a speculative crypto tooling problem: sponsor banks and card
  networks increasingly expect one reviewer-friendly record from onboarding
  through ongoing monitoring, while most operators still run separate KYC,
  monitoring, card, and rails systems. This company sells a vendor-neutral,
  read-only evidence layer that turns those fragmented records into one
  immutable account timeline and one bank- or network-specific audit package.
  The beachhead is intentionally narrow: U.S. Series A-C stablecoin-linked card
  issuers and processors with 2 or more compliance vendors and a scheduled
  sponsor-bank or card-network review inside the next 90 days. Research
  supports a real timing catalyst, a concrete buyer, and an estimated $42.0M
  TAM, $14.7M initial SAM, and $1.4M year-3 SOM for that entry wedge, but it
  also shows the market is logo-constrained and substitute-heavy. Product,
  pricing, and hiring therefore need to stay aligned to one exam-readiness
  workflow rather than expand early into full AML, full BaaS, or generic
  fintech GRC. The strongest reason to believe is that incumbents validate the
  budget yet remain structurally biased toward their own stacks, leaving mixed
  vendor environments with no persistent chronology across migrations. The
  biggest unresolved gap is still external acceptance: the research does not
  show public proof that sponsor banks will treat a third-party-generated
  package as a primary review artifact, or what production ACV customers have
  already accepted for this category.
problem:
  - >-
    Stablecoin issuers and processors typically store onboarding decisions,
    alerts, case notes, card events, holds, and account activity in separate
    vendor systems, so compliance teams still assemble sponsor-bank or
    card-network review packages through exports, spreadsheets, and manual
    reconciliation.
  - >-
    That manual process is deadline-driven and fragile: vendor retention
    windows can be short, card and bank evidence lives on different cadences,
    and a vendor migration can break the continuity of historical decisions
    just when an examiner asks for them.
  - >-
    Bundled vendors, internal data pipelines, and monitoring tools can solve
    slices of the workflow, but they do not naturally create a neutral,
    cross-vendor chronology that survives mixed stacks and reviewer-specific
    package requests.
solution:
  - >-
    Ingest read-only decision logs, alert histories, card events, holds, and
    ledger or BaaS records from the systems a customer already runs, then
    normalize them into one immutable per-account timeline with source
    drill-through.
  - >-
    Detect missing links, contradictory timestamps, and retention gaps before a
    sponsor bank or network reviewer finds them, then generate a reviewer-ready
    audit package in the format that specific counterparty expects.
  - >-
    Persist evidence outside any single vendor relationship so the customer
    keeps audit continuity during vendor changes and can move from point-in-time
    exam prep into continuous readiness monitoring.
whyWeWin:
  - >-
    The company competes on neutrality, not on owning more of the compliance
    stack: it is valuable precisely when the customer uses 2-4 different
    vendors and cannot standardize on one bundled platform.
  - >-
    The first buying trigger is unusually concrete because budget is tied to a
    scheduled review, remediation effort, launch, or migration milestone rather
    than a discretionary innovation project.
  - >-
    Each deployment compounds proprietary value in connector coverage,
    retention-aware evidence capture, and bank- or network-specific package
    templates that generic case tools and services firms do not naturally
    retain.
strategicChoices:
  beachhead: >-
    U.S. Series A-C stablecoin-linked card issuers and payment processors that
    already run separate KYC, monitoring, and rails providers and have a
    sponsor-bank or card-network review scheduled within 90 days.
  wedgeRationale: >-
    This slice creates faster proof than selling to all fintech compliance
    teams because the pain is acute, the buyer is identifiable, and the output
    is concrete: one consolidated package for one near-dated review. Selling
    broader compliance automation first would add more workflows, more buyer
    types, and more integration scope before the company proves that reviewers
    trust the artifact.
  sequencingRationale: >-
    Start with read-only evidence capture, one canonical timeline, and a small
    set of high-frequency connectors because trust, retention, and traceability
    matter more than workflow breadth in year one. Keep GTM founder-led and
    hire integration plus implementation talent before a scaled sales team,
    because the first 3-5 logos must prove bank acceptance, deployment speed,
    and repeatable package generation. Add continuous monitoring, card-network
    templates, and adjacent regulated-fintech verticals only after one sponsor
    bank and several production customers validate the core exam-readiness
    motion.
  notYet:
    - "Full AML transaction monitoring or fraud detection products"
    - "Non-U.S. expansion before U.S. sponsor-bank proof exists"
    - "Embedded banking and BNPL expansion before 3-5 stablecoin logos are live"
    - "Replacing the customer’s existing KYC, monitoring, or rails vendors"
market:
  tam: "$42.0M estimated TAM based on 280 enterprise stablecoin platforms at roughly $150k annual spend for a compliance evidence layer."
  sam: "$14.7M estimated SAM based on about 98 stablecoin-linked card, processor, or bank-partner programs with mixed vendors and recurring exam pressure."
  som: "$1.4M year-3 SOM based on 8 production logos at roughly $175k blended ARR per logo."
  segments:
    - "U.S. stablecoin-linked card issuers and payment processors with mixed vendor stacks"
    - "Adjacent regulated fintech programs such as embedded banking and BNPL once sponsor-bank proof is established"
  buyingProcess: >-
    The daily champion is the Head of Compliance, BSA Officer, or risk
    operations lead, but the deal usually starts when a sponsor bank, network,
    or launch-review process asks for one consolidated record. The first
    contract is most credible as a paid exam-readiness pilot tied to one named
    review, then expands into an annual subscription once the package is
    accepted and the customer wants continuous evidence retention.
product:
  mvp: >-
    A read-only evidence layer covering one stablecoin program, one sponsor-bank
    package template, and the first 3-4 critical systems: KYC, monitoring,
    rails or BaaS, and card-event sources where applicable. The MVP should be
    human-reviewed and audit-ready rather than an autonomous compliance engine.
  sixMonth: >-
    Ship 2-3 paid pilots with six core connectors, immutable timeline views,
    gap detection, reviewer drill-through, and one sponsor-bank package format
    that can be regenerated on demand.
  twelveMonth: >-
    Add bank- and network-specific template libraries, connector monitoring,
    role-based review controls, and continuous readiness alerts so customers can
    use the system between formal exams instead of only during review weeks.
  twentyFourMonth: >-
    Expand inside existing accounts to more programs and adjacent workflows, and
    test the same evidence model in embedded banking or BNPL programs that face
    similar sponsor-bank oversight and mixed-vendor continuity problems.
  keyBets:
    - >-
      A small set of 8-10 connectors will cover most of the first target-logo
      pipeline well enough to keep implementation repeatable.
    - >-
      Sponsor banks and networks will trust a third-party package faster if
      every line item links back to raw source records and retained exports.
    - >-
      Customers will pay first for exam-readiness and retention continuity
      before they pay for broader policy automation.
    - >-
      The same canonical timeline can support adjacent regulated-fintech
      programs without turning the company into a bespoke services shop.
gtm:
  wedge: >-
    Sell a paid exam-readiness pilot into one upcoming sponsor-bank or
    card-network review for a mixed-vendor stablecoin program; the proof point
    is cutting manual package assembly from weeks to days while preserving
    reviewer drill-through.
  channels:
    - "Founder-led outbound to Heads of Compliance, BSA Officers, and risk-operations leaders at stablecoin issuers and processors"
    - "Referral and co-sell motions with sponsor banks, BaaS platforms, and compliance advisory firms already coordinating diligence or remediation"
    - "Integration-led introductions from stablecoin and card infrastructure providers that need a neutral continuity layer for regulated customers"
  funnelTargets: "Target account→qualified review-readiness call 25-35%, qualified call→paid pilot 20-30%, paid pilot→annual production 50%+, production logo→continuous monitoring or second program expansion 60%+."
  pricing: >-
    Start with a paid pilot priced around one named review, then convert to an
    annual subscription based on accounts under active monitoring and number of
    connected evidence systems, with an added fee for exam-package generation.
    This matches the buyer’s current budget reality: the spend competes against
    manual prep, remediation consulting, and one-off internal pipelines rather
    than against experimental crypto software budgets.
businessModel:
  revenueStreams:
    - "Annual subscription for continuous evidence retention and review-readiness monitoring"
    - "Paid onboarding and connector-configuration fees for the first program"
    - "Per review or package-generation fees for sponsor-bank and card-network requests"
    - "Expansion fees for additional programs, templates, and adjacent regulated-fintech workflows"
  unitOfValue: "Accounts under active audit-readiness monitoring plus review packages generated for one stablecoin program"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more connectors, programs, and reviewers within the same customer account"
    - "Convert point-in-time pilots into year-round readiness subscriptions"
    - "Reuse the evidence model in embedded banking or BNPL programs with the same sponsor-bank oversight pattern"
    - "Monetize bank- and network-specific template libraries and benchmark analytics over time"
strategyMap:
  northStarMetric: "Production customer review cycles completed with reviewer-accepted packages and no unresolved evidence gaps"
  inputMetrics:
    - "Qualified review-triggered opportunities created per quarter"
    - "Days from kickoff to first complete generated package"
    - "Percentage of customer evidence sources connected and retained before review date"
    - "Manual prep hours removed per pilot"
    - "Pilot-to-annual conversion rate"
    - "Production accounts using continuous monitoring between formal reviews"
  moatsToBuild:
    - "Cross-vendor evidence graph linking onboarding outcomes, alerts, holds, card events, and rails records"
    - "Reviewer-specific package templates, comments, and remediation history across exam cycles"
    - "Connector and retention intelligence showing which vendor combinations create the most evidence gaps"
  killCriteria:
    - "Fewer than 3 paid pilots by month 12 after 25 or more ICP conversations."
    - "No sponsor bank or card-network reviewer accepts a generated package as a starting review artifact in the first 3 pilots."
    - "The first 10 target accounts require more than 12 materially different connectors, making implementation too bespoke."
    - "Early pilots fail to cut manual prep time by at least 50% or fail to reduce reviewer follow-up requests."
  mermaid: |
    flowchart LR
      Wedge[Exam-readiness pilot] --> MVP[Read-only evidence timeline]
      MVP --> Proof[Reviewer-accepted package]
      Proof --> Expansion[Continuous monitoring and adjacent fintech workflows]
investorMemo:
  verdict:
    call: "Watch"
    conviction: >-
      Sharp wedge and real regulatory timing, but conviction stays moderate
      until bank acceptance, connector concentration, and repeatable ACV are
      proven.
    whyBelieve: >-
      Sponsor-bank scrutiny and mixed-vendor stacks create a concrete workflow
      that incumbents validate but do not solve neutrally.
    whyDoubt: >-
      The beachhead is narrow, substitutes are abundant, and the research does
      not yet prove that reviewers will trust a third-party-generated package in
      production.
    nextDiligence: >-
      Win one pilot that uses at least three live systems, gets explicit
      reviewer acceptance on the generated package, and converts into an annual
      subscription.
  firstCustomer:
    title: "Head of Compliance at a stablecoin-linked debit card issuer"
    profile: >-
      A U.S. Series A/B stablecoin-linked card issuer or processor using one
      KYC or risk vendor, one monitoring vendor, and a separate BaaS, ledger,
      or card platform, with a formal review already on the calendar.
    trigger: >-
      The sponsor bank or card network requests a consolidated
      onboarding-to-monitoring package ahead of a scheduled review or program
      remediation cycle.
    buyer: "VP or Head of Compliance / Risk Operations"
    initialContract: >-
      $40k-$75k paid pilot for one named review, credited toward a
      $120k-$200k annual production subscription plus package fees once the
      first reviewer-accepted cycle is completed.
  mustBeTrue:
    - "At least 8 of the first 15 ICP interviews must confirm they already reconcile 2 or more evidence systems manually before reviews."
    - "One sponsor bank or card-network reviewer must accept a generated package with drill-through as a usable primary review artifact."
    - "The first 8-10 connectors must cover at least 70% of the first 10 target logos."
    - "Early pilots must cut exam-prep time by 50% or more and reduce reviewer follow-up requests materially versus the manual baseline."
    - "Production customers must support roughly $120k-$200k annual software spend before adjacent-market expansion is needed."
  diligenceQuestions:
    - "Which sponsor-bank reviewers will explicitly sign off on a third-party-generated package versus treating it as only a convenience export?"
    - "Which exact vendor combinations dominate the first 10 target logos, and how much retention history is still recoverable from each?"
    - "Does the first buyer control budget directly, or does procurement sit with the sponsor bank, COO, or engineering organization?"
    - "How often do vendor migrations or new program launches create urgency beyond the scheduled exam cycle?"
    - "Can adjacent embedded-banking or BNPL programs reuse the same evidence model without a full rebuild?"
operatingAssumptions:
  - assumption: "A small connector set can cover most of the early pipeline."
    basis: research.yaml
    validationTest: "Build a prospect-by-prospect matrix for the first 10 target accounts and confirm that 8-10 connectors cover at least 70% of required evidence sources."
    decisionImpact: "If false, the product becomes too bespoke and hiring plus capital needs shift toward services-heavy implementation."
  - assumption: "Reviewers will accept a third-party-generated package if it preserves raw-source drill-through."
    basis: research.yaml
    validationTest: "Run one pilot with one fintech and one sponsor-bank or network reviewer, then document whether the reviewer treats the package as a primary artifact and what gaps remain."
    decisionImpact: "If false, the company must reposition as internal prep software with lower urgency and lower ACV."
  - assumption: "Read-only ingestion is enough to win the first budget."
    basis: idea.yaml
    validationTest: "Deliver the first 2 pilots without write access to any upstream systems and confirm that customers still measure meaningful prep-time reduction."
    decisionImpact: "If false, security review, implementation time, and burn all rise because the product must control more workflow directly."
  - assumption: "Exam-readiness and remediation budgets can fund the first contract."
    basis: research.yaml
    validationTest: "In the first 5 sales cycles, confirm at least 2 buyers approve a paid pilot without requiring a broader platform replacement decision."
    decisionImpact: "If false, the company may need a lower-priced tool sale, partner-led channel, or longer enterprise budget cycle."
  - assumption: "The evidence model can expand into adjacent regulated-fintech workflows after stablecoin proof."
    basis: idea.yaml
    validationTest: "Map one embedded-banking or BNPL workflow with 3 prospective buyers and confirm the same timeline plus package model solves a live sponsor-bank review problem."
    decisionImpact: "If false, investors should underwrite the company as a narrower niche business with limited venture upside."
experimentRoadmap:
  - horizon: 0–90 days
    experiment: "Interview 15 compliance leaders and 5 sponsor-bank or network reviewers in the beachhead segment."
    hypothesis: "Mixed-vendor exam prep is already a live manual workflow with executive urgency and not a theoretical future need."
    successMetric: "At least 8 issuers confirm manual multi-system reconciliation today and at least 3 reviewers describe a current package-format pain."
    owner: "Founder/CEO"
  - horizon: 0–90 days
    experiment: "Build a connector and retention-window matrix for the first 10 target accounts."
    hypothesis: "A concentrated connector roadmap can cover most early demand before long-tail integrations appear."
    successMetric: "One roadmap of 8-10 connectors covers at least 70% of identified systems and flags any retention deadlines for backfill."
    owner: "Founding eng"
  - horizon: 90–180 days
    experiment: "Run one concierge pilot using exports from at least three live systems to generate a sponsor-bank package."
    hypothesis: "Customers and reviewers will trust a generated package if each record links back to source evidence."
    successMetric: "One pilot package is used in a real review workflow and reviewer feedback identifies fewer than 5 critical missing evidence classes."
    owner: "Compliance product lead"
  - horizon: 90–180 days
    experiment: "Close 2 paid pilots tied to named review dates."
    hypothesis: "A dated review trigger is strong enough to convert discovery into paid work faster than a generic compliance software pitch."
    successMetric: "At least 2 paid pilots are signed and one converts to annual production within one review cycle."
    owner: "Founder/CEO"
  - horizon: 180–360 days
    experiment: "Ship six production connectors plus continuous evidence-gap alerts."
    hypothesis: "Customers will expand from point-in-time review prep into year-round readiness once the first package is accepted."
    successMetric: "At least 2 production customers keep the system live between reviews and expand scope beyond the initial package."
    owner: "Founding eng"
  - horizon: 180–540 days
    experiment: "Test one adjacent embedded-banking or BNPL design partner using the same evidence timeline."
    hypothesis: "The stablecoin wedge can generalize into a broader sponsor-bank oversight category without a full product rewrite."
    successMetric: "One adjacent design partner confirms a paid pilot path using at least 60% of the same connector and package logic."
    owner: "Product lead"
operations:
  - "Maintain an immutable evidence store with source retention metadata, audit logs, and reviewer drill-through for every generated package."
  - "Run onboarding around one connector checklist, one package template, and one gap-review process before expanding scope."
  - "Track vendor API, file, and retention changes continuously because upstream evidence windows are part of product quality."
  - "Package security review, data handling, and advisory-partner workflows early because trust and reviewer acceptance are the first adoption barriers."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, reviewer discovery, and pilot conversion because customer truth and budget ownership are still being learned."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the canonical timeline, evidence store, and first connector framework fast enough to support live pilots."
  - role: "Compliance product lead"
    startTiming: "Month 1"
    rationale: "Translate sponsor-bank package requirements, retention constraints, and reviewer feedback into product specs and QA."
  - role: "Integration engineer"
    startTiming: "Month 3"
    rationale: "Own the first concentrated connector roadmap and keep implementation from becoming bespoke customer work."
  - role: "Implementation and compliance success lead"
    startTiming: "Month 6"
    rationale: "Run pilot onboarding, evidence-gap reviews, and annual conversion once the first production customers are live."
milestones:
  - horizon: 0–12 months
    items:
      - "Validate 15 ICP interviews and 5 reviewer interviews against the exam-readiness wedge."
      - "Ship six core connectors and one sponsor-bank package template."
      - "Close 2-3 paid pilots tied to named review dates."
      - "Convert at least 1 pilot into an annual production subscription."
  - horizon: 12–24 months
    items:
      - "Reach 5 production logos and at least one reusable card-network or second-bank template."
      - "Move at least 2 customers from point-in-time review prep into continuous monitoring."
      - "Prove implementation repeatability with a concentrated connector set and documented deployment playbook."
  - horizon: 24–36 months
    items:
      - "Reach the research-backed 8-logo year-3 SOM case or invalidate the venture-scale thesis."
      - "Launch one adjacent regulated-fintech workflow using the same evidence model."
      - "Turn reviewer templates and benchmark data into a clear expansion moat inside existing accounts."
risks:
  - risk: "Upstream vendors restrict or price data access in ways that block reliable evidence ingestion."
    likelihood: Medium
    impact: High
    mitigation: "Prioritize export-friendly vendors first, archive evidence early, and negotiate partner data-sharing with systems that dominate the first connector roadmap."
  - risk: "Sponsor banks or card networks refuse to rely on a third-party-generated package."
    likelihood: Medium
    impact: High
    mitigation: "Pilot with explicit reviewer participation, preserve raw-source drill-through, and position the first product as reviewer-ready prep before claiming authoritative system-of-record status."
  - risk: "Bundled vendors add enough third-party ingestion to erase the standalone wedge."
    likelihood: Medium
    impact: Medium
    mitigation: "Compete on strict neutrality, migration continuity, and reviewer-specific packaging across mixed stacks rather than on owning more of the compliance workflow."
  - risk: "The beachhead remains too small to support venture returns even if the product works."
    likelihood: Medium
    impact: High
    mitigation: "Test adjacent sponsor-bank oversight workflows by month 18 and keep burn aligned to a niche-software outcome until expansion proof exists."
  - risk: "Sales cycles stretch because compliance, engineering, and sponsor-bank stakeholders all influence the deal."
    likelihood: High
    impact: Medium
    mitigation: "Sell against named review dates, keep the first scope read-only and narrow, and use paid pilots to shorten the path from discovery to proof."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of connector development, evidence-store and security
    hardening, 2-3 live pilots, one compliance product hire, one integration
    hire, and enough implementation capacity to prove reviewer acceptance and
    pilot-to-annual conversion before scaling sales.
