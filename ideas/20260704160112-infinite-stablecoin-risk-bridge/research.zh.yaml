competitors:
- name: Sardine + Infinite
  stage: scale-up
  wedge: 把反欺诈、AML、担保银行分析和稳定币账户通道打包进一套工作流。
  pricing: 定制报价，无公开价目表。
  strength: 如果买家统一到这套组合技术栈上，自带审计轨迹，交接摩擦也更少。
  weaknessVsUs: 跨厂商中立性有限；一旦运营方用了非 Sardine 或非 Infinite 的组件，连续性就会打折扣。
  sourceRefs:
  - 1
  - 2
  - 4
  - 5
- name: Alloy
  stage: scale-up
  wedge: 通过一个 API，把 KYC、KYB、AML、反欺诈和数据合作伙伴串联起来做身份与风控编排。
  pricing: 定制报价，无公开价目表。
  strength: 数据生态广，入网和策略编排环节的锁定程度也更低。
  weaknessVsUs: 止步于入网和决策这一层，做不到跨通道和监控、不可篡改的跨厂商检查时间线。
  sourceRefs:
  - 6
- name: Unit21
  stage: scale-up
  wedge: 担保银行操作系统，外加 AML 监控和案件管理工作流。
  pricing: 定制报价，无公开价目表。
  strength: 在预警、案件、申报和监控仪表盘上都有扎实的审计轨迹。
  weaknessVsUs: 客户用 Unit21 做监控时最强，但它不是一个中立的、能存放外部 KYC 和通道历史记录的存储层。
  sourceRefs:
  - 18
  - 19
- name: Increase
  stage: scale-up
  wedge: 银行 API 平台，配有定制合规能力和银行对客户自管管控措施的定期审查。
  pricing: 定制报价，无公开价目表。
  strength: 直接对接银行伙伴的治理机制，主体/账户模型也很清晰。
  weaknessVsUs: 主要局限在 Increase 自己的项目内部，不会统一平台之外第三方厂商的历史记录。
  sourceRefs:
  - 7
- name: TRM Labs
  stage: incumbent
  wedge: 面向稳定币风险的加密原生交易监控和案件管理。
  pricing: 定制报价，无公开价目表。
  strength: 链上风险检测能力深厚，也支持调查员工作流。
  weaknessVsUs: 专注在监控这一环，做不到从入网到通道的全套证据包，也编排不了担保银行要求的文档流程。
  sourceRefs:
  - 21
regulatoryTechnicalConstraints:
- point: 任何涉及担保银行数据的方案，都必须支持每日对账，以及银行对受益所有人和余额记录的访问权限。
  sourceRefs:
  - 22
- point: 银行与金融科技公司的存款安排，被定性为运营、合规、流动性、集中度和消费者保护风险都被抬高的领域。
  sourceRefs:
  - 23
  - 25
- point: 稳定币关联项目需要储备、赎回、证明和 AML/CFT 管控，这些要求会因司法辖区和合作伙伴而异。
  sourceRefs:
  - 28
  - 29
  - 38
- point: 有些厂商证据是短命的——Persona 的 API 日志只保留两周——所以客户需要独立的留存机制。
  sourceRefs:
  - 16
- point: 发卡证据天生就分散在 Webhook、网络数据、结算文件和银行报告里。
  sourceRefs:
  - 14
  - 15
validationSignals:
- point: 稳定币基础设施厂商现在都明确承诺端到端支付加合规能力，这证明这个工作流周围既有预算，也有紧迫感。
  sourceRefs:
