reportMemo:
  executiveTakeaways:
  - '稳定币的采用已经是一个运营问题，而不是投机问题：美联储数据显示，稳定币市值在 2025 年增长超过 50% 后达到 3170 亿美元；Stripe 数据显示，经调整的支付活动量从 2024 年 10 月到 2025 年 10 月达到 9 万亿美元；Circle、Stripe 和 Visa 都在推出面向银行和发卡机构的稳定币基础设施。[27][30][31][33][34][37]'
  - Synapse 事件之后，担保银行的审慎监管把对账和文档连续性变成了一个产品切口。FDIC 的提案强调每日对账和对受益所有人记录的直接访问权限；OCC/FDIC 的指引则把银行与金融科技公司的存款安排，定性为运营、合规、流动性和消费者保护风险都被抬高的领域。[22][23][24][25]
  - '当下的技术栈天生就是碎片化的：Synctera、Treasury Prime、Lithic 和 Persona 各自存放着不同的案件、文件、日志、事件和人工复核记录，合规团队仍然要靠跨系统拼接来组装检查材料包。[9][10][11][12][13][14][15][16][17]'
  - 现有厂商验证了这块预算的存在，却没能给出中立的解法。Sardine+Infinite、Alloy、Unit21、Increase 和 TRM 都各自覆盖了入网、监控或通道的一部分，但每一家都只在自己的地盘上最强，谁也没能做成一层能跨越迁移和混合技术栈、与厂商无关的连续性层。[1][2][4][6][7][18][21]
  marketDefinition: '这个市场是面向稳定币关联发卡和支付项目的厂商中立检查证据编排：一款只读软件，从多家厂商摄取入网、监控、通道和卡组织证据，把它们存放在任何单一提供商之外，再输出担保银行或卡组织可直接使用的审计材料包。[1][8][10][11][15][22]'
  customerAndBuyer: 日常使用者是稳定币关联发行方、处理商或发卡项目里的合规负责人、BSA 官员或风控运营负责人——这些公司已经在各自跑着独立的 KYC、监控和通道厂商。经济意义上的买家，是那个必须同时向担保银行和内部管控方交代的合规高管，而担保银行的项目经理和审查员则是极具影响力的次要利益方。[7][8][11][23][24][25]
  buyingTriggers:
  - point: 担保银行或卡组织在一次排定的审查之前，要求提供一份整合的入网到监控材料包。
    sourceRefs:
    - 11
    - 22
    - 23
    - 25
  - point: 新的稳定币发卡上线、新增支付通道，或链/资产扩张，都会带来更多合作伙伴和更多需要核对的证据流。
    sourceRefs:
    - 30
    - 31
    - 33
    - 34
    - 40
  - point: 厂商更换、整改工作或银行对账流程，会暴露出有多少合规历史被困在现有系统里出不来。
    sourceRefs:
    - 7
    - 8
    - 22
    - 23
  willingnessToPay:
    summary: 预算更可能来自上线就绪、担保银行监管和整改专项，而不是实验性的加密支出。Increase、Synctera、Treasury Prime 和 Unit21 都把银行审查、厂商尽调和持续的预警/案件证据，当作项目日常运营的一部分，所以投资回报的论证点在于：更少的人工检查准备周数、更少的对账工作，以及更低的厂商迁移风险。
    sourceRefs:
    - 7
    - 8
    - 11
    - 18
  competitiveLandscape: '竞争正从四个方向涌来：打包的稳定币通道加合规技术栈、入网/风控编排厂商、担保银行操作系统，以及加密监控套件。真正的空白不是再造一个检测器，而是一层能扛住厂商更换、把异构记录变成一条审查员友好的时间线的中立证据层。[1][2][4][6][7][18][20][21][30][31][40]'
  incumbentThesis:
  - incumbentClass: 捆绑通道 + 合规平台
    point: 客户如果统一到它们那一套技术栈上，摩擦确实能很快降低，但它们从结构上就偏向自家的通道、数据模型和工作流，而不是混合厂商环境下的中立连续性。
    sourceRefs:
    - 1
    - 2
    - 4
    - 5
    - 31
    - 40
  - incumbentClass: 身份与入网编排厂商
    point: 它们能把 KYC、KYB、AML 和案件创建集中起来，但止步于入网和政策编排这一层，做不到跨监控、通道和发卡事件、能直接交给银行用的时间线。
    sourceRefs:
    - 6
    - 17
  - incumbentClass: 监控与案件管理套件
    point: 它们把预警、案件和面向 SAR 的工作流做得很扎实，但并不会自动保留第三方入网证据，也不会跨外部系统留存担保银行的历史请求记录。
    sourceRefs:
    - 18
    - 19
    - 20
    - 21
  - incumbentClass: BaaS 与担保银行平台
    point: 它们已经在自己的项目内部管理尽调和监管，但对于需要跨多家外部厂商和多次迁移保持证据连续性的客户，它们并不能自动胜出。
    sourceRefs:
    - 7
    - 8
    - 11
    - 23
    - 25
  regulatoryLandscape: '稳定币关联项目现在同时落在两套相互重叠的管控体制里：担保银行的第三方监管，加上支付型稳定币的审慎监管预期。FDIC 因 Synapse 事件推出的记录保存提案，要求每日对账和对受益所有人记录的直接访问权；OCC/FDIC 的联合声明把银行与金融科技公司的存款安排，定性为运营、合规、流动性和消费者保护风险都被抬高的领域；NYDFS 要求受监管的美元稳定币做到全额储备、及时赎回并出具证明；BIS 和当下的合规评论都显示，AML/CFT 的监管预期正在向稳定币全生命周期扩展。[22][23][24][25][28][29][38]'
  technologyLandscape: 支撑这个市场的技术栈已经成熟，但很分裂。KYC 厂商各自留着案件、报告、事件和短期存活的 API 日志；BaaS 平台留着银行批准的 KYC 结果、人工冻结记录和发卡事件；发卡平台把结算 API、原始网络文件和银行报告分开存放；Circle、Stripe、Visa 和 Bridge 又各自通过独立产品，暴露出自己的稳定币和发卡基础设施。这意味着这款产品可以是增量式的——但前提是，它得把这么多套对象模型和留存窗口都归一化。[10][12][13][14][15][16][17][30][31][32][33][34][40]
  distributionChannels:
  - point: 当上线、迁移或排定审查，把文档工作逼上关键路径时，直接触达合规负责人。
    sourceRefs:
    - 8
    - 11
    - 22
    - 23
    - 25
  - point: 通过已经在协调尽调材料和整改项目的担保银行、BaaS 和合规咨询生态圈做联合销售。
    sourceRefs:
    - 8
    - 9
    - 23
    - 24
    - 25
  - point: 靠稳定币和发卡基础设施提供商做集成引流——它们需要一层中立的连续性能力，才能拿下更大的受监管客户。
    sourceRefs:
    - 30
    - 31
    - 33
    - 34
    - 40
  partnershipEcosystem:
  - point: 担保银行和 BaaS 平台是价值最高的共创伙伴，因为它们既是证据的索取方，也掌控着底层账本视图。
    sourceRefs:
    - 8
    - 10
    - 11
    - 23
    - 25
  - point: KYC/AML 厂商和区块链分析厂商很重要，因为产品要做的是摄取它们的决策，而不是取代它们。
    sourceRefs:
    - 4
    - 6
    - 12
    - 20
    - 21
  - point: Bridge、Circle、Stripe、Visa 这类发卡和稳定币基础设施伙伴，在输出材料模板、发卡事件关联和伙伴引流上都很关键。
    sourceRefs:
    - 14
    - 30
    - 31
    - 33
    - 34
    - 40
  dataMoats:
  - point: 一张可复用的跨厂商证据图谱——把 KYC 结果、监控预警、冻结记录、发卡事件和银行账本文件都关联起来——会随着每一轮检查周期变得更有价值。
    sourceRefs:
    - 10
    - 12
    - 13
    - 14
    - 15
    - 16
    - 17
  - point: 银行和卡组织专属的请求模板、审查员批注和整改历史会不断累积，形成一条通用案件工具做不到的材料包生成护城河。
    sourceRefs:
    - 8
    - 9
    - 11
    - 22
    - 23
    - 25
  - point: 关于哪些厂商组合最容易产生未对平项目或人工例外情况的基准数据，能随着时间推移引导客户走向更干净的运营技术栈。
    sourceRefs:
    - 10
    - 11
    - 15
    - 35
  geographicConsiderations:
  - point: 美国是最明确的首发市场，因为担保银行监管、托管账户记录保存和稳定币储备要求都很明确，而且还在收紧。
    sourceRefs:
    - 22
    - 23
    - 24
    - 25
    - 29
  - point: 下一步顺理成章的市场，是 Circle、Stripe、Bridge 和 Visa 已经在推进到几十个国家的跨境通道和发卡项目，但每一次扩张都会带来当地政策和支付通道的差异。
    sourceRefs:
    - 30
    - 31
    - 33
    - 34
    - 40
  sensitivityCases:
  - case: 打包厂商开放技术栈的速度快于预期
    impact: 如果 Sardine/Infinite、Bridge 或 Unit21 加上足够强的第三方数据摄取和银行专属材料包生成能力，独立切口就会变窄，差异化必须转向中立性、留存深度和审查员体验。
    sourceRefs:
    - 1
    - 2
    - 4
    - 5
    - 18
    - 40
  - case: 再发生一次平台事故后，担保银行的审慎监管进一步收紧
    impact: 需求会上升，但银行审批、法务复核和实施摩擦也会同步增加，拉长销售周期。
    sourceRefs:
    - 22
    - 23
    - 24
    - 25
    - 29
  - case: 稳定币需求更多流向资金结算，而非发卡或处理商项目
    impact: 公司依然能卖出去，但滩头市场会转向 PSP 和资金结算密集型平台，而不是发卡机构，这会改变连接器的优先级排序。
    sourceRefs:
    - 26
    - 30
    - 31
    - 33
    - 37
    - 39
  validationPlan:
  - priority: high
    question: 如果材料包里每一项都能追溯回原始厂商记录，担保银行是否会把第三方生成的材料包，当作主要的审查依据？
    evidenceToGather: 跟一家担保银行和一家金融科技公司一起，用至少三套厂商系统跑一次试点，记录审查员对完整性、溯源需求和信任缺口的反馈。
  - priority: high
    question: 哪 8 到 10 个连接器能覆盖第一批共创客户管线的大部分需求？
    evidenceToGather: 针对每个潜在客户，建立一份 KYC、监控、发卡/BaaS 和稳定币基础设施厂商的矩阵，并列出每家厂商的导出方式、Webhook 和留存规则。
  - priority: medium
    question: 在一次真实的检查周期里，这款产品能砍掉多少准备工时和多少次追加问询？
    evidenceToGather: 在一次检查或定期审查中，测量准备工时、未解决例外和审查员追问次数的前后对比。
