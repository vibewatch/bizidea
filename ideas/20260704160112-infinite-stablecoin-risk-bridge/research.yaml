competitors:
- name: Sardine + Infinite
  stage: scale-up
  wedge: Bundled fraud, AML, sponsor-bank analytics, and stablecoin account rails in one workflow.
  pricing: Custom quote; no public list pricing.
  strength: Built-in audit trails and less handoff friction if the buyer standardizes on the combined stack.
  weaknessVsUs: Cross-vendor neutrality is limited; continuity weakens when the operator uses non-Sardine or non-Infinite
    components.
  sourceRefs:
  - 1
  - 2
  - 4
  - 5
- name: Alloy
  stage: scale-up
  wedge: Identity and risk orchestration across KYC, KYB, AML, fraud, and data partners through one API.
  pricing: Custom quote; no public list pricing.
  strength: Broad data ecosystem and lower lock-in for onboarding and policy orchestration.
  weaknessVsUs: Stops closer to onboarding and decisioning than to an immutable cross-vendor exam timeline across rails and
    monitoring.
  sourceRefs:
  - 6
- name: Unit21
  stage: scale-up
  wedge: Sponsor-bank operating system plus AML monitoring and case-management workflows.
  pricing: Custom quote; no public list pricing.
  strength: Strong audit trails across alerts, cases, filings, and monitoring dashboards.
  weaknessVsUs: Strongest when the customer uses Unit21 for monitoring; it is not a neutral store for external KYC and rails
    histories.
  sourceRefs:
  - 18
  - 19
- name: Increase
  stage: scale-up
  wedge: Bank-API platform with customized compliance and periodic bank review of customer-managed controls.
  pricing: Custom quote; no public list pricing.
  strength: Direct bank-partner governance and a clear entity/account model.
  weaknessVsUs: Mostly applies inside Increase programs and does not unify third-party vendor histories outside the platform.
  sourceRefs:
  - 7
- name: TRM Labs
  stage: incumbent
  wedge: Crypto-native transaction monitoring and case management for stablecoin risk.
  pricing: Custom quote; no public list pricing.
  strength: Deep on-chain risk detection and investigator workflow support.
  weaknessVsUs: Focuses on monitoring, not the full onboarding-to-rails evidence pack or sponsor-bank document choreography.
  sourceRefs:
  - 21
