slug: stablecoin-exam-evidence-layer
date: '2026-07-04'
executiveSummary: >-
  稳定币关联发卡机构和支付处理商现在面对的是一个真实的内控问题，而不是一个投机性的加密工具问题：担保银行和卡组织越来越希望
  看到从客户入网到持续监控全程都可复核的一份记录，而大多数运营方仍然在跑各自独立的 KYC、监控、发卡和通道系统。这家公司卖的是
  一个厂商中立、只读的证据层，把这些碎片化记录变成一条不可篡改的账户时间线，以及一份针对具体银行或卡组织的审计材料包。滩头市场
  刻意收窄：拥有 2 家以上合规厂商、并在未来 90 天内已排定担保银行或卡组织审查的美国 A 到 C 轮稳定币关联发卡机构和处理商。研究
  支持一个真实的时机催化剂、一个具体的买家画像，以及针对这个切入点估算出的 4200 万美元 TAM、1470 万美元初始 SAM，和第三年
  140 万美元的 SOM——但研究同样显示，这个市场受限于客户数量，替代方案也很多。因此，产品、定价和招聘都需要紧扣这一条检查就绪
  工作流，而不是过早扩张到完整的 AML、完整的 BaaS 或通用金融科技 GRC。最值得相信的理由是：现有厂商验证了这块预算的存在，
  却在结构上偏向自家技术栈，让混用多家厂商的环境始终拿不出跨越迁移的持续记录。最大的未解缺口仍然是外部认可度：研究没有找到
  公开证据证明担保银行会把第三方生成的材料包当作主要审查依据，也不清楚这个品类目前已经被客户接受的正式合同金额是多少。
problem:
  - >-
    稳定币发行方和处理商通常把入网决策、预警、案件记录、发卡事件、冻结和账户活动分别存放在不同的厂商系统里，所以合规团队仍然
    要靠导出、电子表格和人工拼接来组装担保银行或卡组织的审查材料包。
  - >-
    这个人工流程受截止日期驱动、也很脆弱：厂商的数据保留窗口可能很短，发卡和银行证据的更新节奏也不一样，一次厂商迁移就可能
    在审查员索要历史决策记录的当口打断连续性。
  - >-
    打包厂商、内部数据管道和监控工具能解决工作流里的某些环节，但它们天然造不出一条能在混用技术栈和审查员特定材料包要求下
    存活下来的中立、跨厂商审计叙事。
solution:
  - >-
    从客户已经在用的系统里只读摄取决策日志、预警历史、发卡事件、冻结记录以及账本或 BaaS 记录，再把它们归一化成每个账户唯一、
    不可篡改、可溯源查证的时间线。
  - >-
    在担保银行或卡组织审查员发现之前，先检测出缺失的关联、矛盾的时间戳和数据留存缺口，再按对方要求的具体格式生成一份审查员
    可直接使用的审计材料包。
  - >-
    把证据独立存放在任何单一厂商关系之外，让客户在厂商更换时依然保持审计连续性，并能从某个时间点的检查准备，转向持续的
    检查就绪监控。
whyWeWin:
  - >-
    这家公司靠中立性取胜，而不是靠拿下更多合规栈份额：正是当客户同时用着 2 到 4 家不同厂商、无法统一到一个打包平台时，
    它才最有价值。
  - >-
    第一个购买触发点异乎寻常地具体，因为预算跟已排定的审查、整改工作、上线或迁移里程碑挂钩，而不是一个可有可无的创新项目。
  - >-
    每一次部署都会在连接器覆盖面、懂得留存规则的证据采集，以及银行或卡组织专属材料包模板上积累专有价值——这是通用案件工具
    和服务公司天然留不住的东西。
strategicChoices:
  beachhead: >-
    已经各自搭配独立 KYC、监控和通道提供商、并在 90 天内已排定担保银行或卡组织审查的美国 A 到 C 轮稳定币关联发卡机构和支付
    处理商。
  wedgeRationale: >-
    比起卖给所有金融科技合规团队，这一小片市场能更快拿出证明：痛点尖锐、买家可识别、产出也具体——就是为一次近期审查拼出一份
    整合材料包。如果先卖更宽泛的合规自动化，在公司还没证明审查员信任这份材料之前，就会背上更多工作流、更多买家类型和更大的
    集成范围。
  sequencingRationale: >-
    第一年先从只读证据采集、一条统一时间线和一小批高频连接器做起，因为信任、留存和可追溯性比工作流的广度更重要。GTM 保持
    创始人主导，先招集成和实施人才，再组建规模化销售团队，因为前 3 到 5 个客户必须证明银行认可度、部署速度和材料包生成的
    可复现性。等一家担保银行和若干生产客户验证了核心的检查就绪打法之后，再加上持续监控、卡组织模板和相邻的受监管金融科技
    细分领域。
  notYet:
    - "完整的 AML 交易监控或反欺诈产品"
    - "在美国担保银行认可度得到验证之前扩展海外市场"
    - "在 3-5 个稳定币客户跑起来之前扩展嵌入式银行和 BNPL 业务"
    - "替代客户现有的 KYC、监控或通道厂商"
market:
  tam: "基于约 280 家企业级稳定币平台、每家在合规证据层上年均花费约 15 万美元估算出的 4200 万美元 TAM。"
  sam: "基于约 98 个存在多厂商混用、且持续面临检查压力的稳定币关联发卡、处理或银行合作项目估算出的 1470 万美元 SAM。"
  som: "基于 8 个生产客户、每个客户约 17.5 万美元混合 ARR 估算出的第三年 140 万美元 SOM。"
  segments:
    - "使用混合厂商技术栈的美国稳定币关联发卡机构和支付处理商"
    - "一旦美国担保银行认可度得到验证，可延伸至嵌入式银行、BNPL 等相邻受监管金融科技项目"
  buyingProcess: >-
    日常的内部推动者是合规负责人、BSA 官员或风控运营负责人，但交易通常始于担保银行、卡组织或上线审查流程要求一份整合记录。
    第一份合同最可信的形式，是围绕一次具名审查的付费检查就绪试点，等材料包获得认可、客户希望持续保留证据之后，再扩展为
    年度订阅。
product:
  mvp: >-
    覆盖一个稳定币项目、一套担保银行材料包模板，以及最初 3 到 4 个关键系统（KYC、监控、通道或 BaaS，以及适用情况下的发卡
    事件来源）的只读证据层。MVP 应该是人工复核、审计就绪的，而不是一个自主运行的合规引擎。
  sixMonth: >-
    交付 2 到 3 个付费试点，配上六个核心连接器、不可篡改的时间线视图、缺口检测、审查员可追溯功能，以及一套可按需重新生成的
    担保银行材料包格式。
  twelveMonth: >-
    加上银行和卡组织专属的模板库、连接器监控、基于角色的复核权限管理，以及持续的就绪状态预警，让客户在正式检查之间的时段
    也能用上这套系统，而不只是在审查周里用。
  twentyFourMonth: >-
    在现有客户内部扩展到更多项目和相邻工作流，并在面临相似担保银行监管和混合厂商连续性问题的嵌入式银行或 BNPL 项目里，
    测试同一套证据模型。
  keyBets:
    - >-
      一小批 8 到 10 个连接器足以覆盖第一批目标客户管线的大部分需求，让实施保持可复现。
    - >-
      只要每一条记录都能追溯回原始记录和留存的导出文件，担保银行和卡组织就会更快信任第三方材料包。
    - >-
      客户会先为检查就绪和证据留存连续性付费，之后才会为更广泛的政策自动化付费。
    - >-
      同一条标准时间线能够支撑相邻的受监管金融科技项目，而不会把公司变成一家定制服务商。
gtm:
  wedge: >-
    把一次付费的检查就绪试点卖进一场即将到来的、针对混合厂商稳定币项目的担保银行或卡组织审查；验证点是把材料包组装时间
    从数周压缩到几天，同时保留审查员可追溯的能力。
  channels:
    - "创始人主导，直接触达稳定币发行方和处理商的合规负责人、BSA 官员和风控运营负责人"
    - "与已经在协调尽职调查或整改工作的担保银行、BaaS 平台和合规咨询公司建立转介与联合销售关系"
    - "来自需要中立连续性层来赢得受监管大客户的稳定币和发卡基础设施提供商的集成引荐"
  funnelTargets: "目标客户到合格的检查就绪通话转化率 25%-35%，合格通话到付费试点转化率 20%-30%，付费试点到年度生产合同转化率 50% 以上，生产客户到持续监控或第二个项目扩展转化率 60% 以上。"
  pricing: >-
    先按一次具名审查定价推出付费试点，再根据受监控账户数和已连接的证据系统数量，转为年度订阅，外加一笔审计材料包生成的
    附加费。这与买家当下的预算现实相符：这笔支出竞争的是人工准备、整改咨询和一次性内部管道的预算，而不是实验性的加密
    软件预算。
businessModel:
  revenueStreams:
    - "面向持续证据留存和检查就绪监控的年度订阅"
    - "首个项目的付费入网和连接器配置费"
    - "面向担保银行和卡组织请求的按次审查或材料包生成费"
    - "面向新增项目、模板和相邻受监管金融科技工作流的扩展费"
  unitOfValue: "处于持续审计就绪监控下的账户数，加上为一个稳定币项目生成的审查材料包数量"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一个客户账户内新增更多连接器、项目和审查方"
    - "把某个时间点的试点转化为全年的就绪订阅"
    - "把同一套证据模型复用到有着相同担保银行监管模式的嵌入式银行或 BNPL 项目"
    - "长期把银行和卡组织专属模板库以及基准分析变现"
strategyMap:
  northStarMetric: "生产客户完成的、材料包获审查员认可且没有未解决证据缺口的审查周期数"
  inputMetrics:
    - "每季度新增的、由审查触发的合格商机数"
    - "从启动到首份完整材料包生成之间的天数"
    - "审查日期前已连接并留存的客户证据来源占比"
    - "每次试点省下的人工准备工时"
    - "试点转年度合同的转化率"
    - "在正式审查之间使用持续监控的生产账户数"
  moatsToBuild:
    - "串联入网结果、预警、冻结、发卡事件和通道记录的跨厂商证据图谱"
    - "跨越多个检查周期积累的审查员专属材料包模板、批注和整改历史"
    - "能显示哪些厂商组合最容易产生证据缺口的连接器与留存情报"
  killCriteria:
    - "在与 25 个以上 ICP 客户交流后，第 12 个月付费试点仍不足 3 个。"
    - "前 3 个试点中，没有一家担保银行或卡组织审查员把生成的材料包当作可作为审查起点的依据。"
    - "前 10 个目标客户需要 12 个以上明显不同的连接器，导致实施变得过于定制化。"
    - "早期试点未能把人工准备时间削减至少 50%，也没能减少审查员的追问次数。"
  mermaid: |
    flowchart LR
      Wedge[Exam-readiness pilot] --> MVP[Read-only evidence timeline]
      MVP --> Proof[Reviewer-accepted package]
      Proof --> Expansion[Continuous monitoring and adjacent fintech workflows]
investorMemo:
  verdict:
    call: "观望"
    conviction: >-
      切口犀利，监管时机也真实存在，但在银行认可度、连接器集中度和可复现的合同金额得到验证之前，信心只能维持在中等水平。
    whyBelieve: >-
      担保银行的审慎监管和混合厂商技术栈制造出一个具体的工作流，现有厂商验证了这个需求，却没能中立地解决它。
    whyDoubt: >-
      滩头市场很窄，替代方案很多，而且研究还没能证明审查员会在生产环境中信任第三方生成的材料包。
    nextDiligence: >-
      拿下一个至少使用三套在用系统的试点，让生成的材料包获得审查员明确认可，并转化为年度订阅。
  firstCustomer:
    title: "稳定币关联借记卡发行方的合规负责人"
    profile: >-
      一家美国 A/B 轮稳定币关联发卡机构或处理商，使用一家 KYC 或风控厂商、一家监控厂商，以及一个独立的 BaaS、账本或发卡
      平台，且已经把一次正式审查排上了日程。
    trigger: >-
      担保银行或卡组织在一次排定的审查或项目整改周期之前，要求提供一份整合的入网到监控材料包。
    buyer: "合规/风控运营副总裁或负责人"
    initialContract: >-
      针对一次具名审查的 4 万到 7.5 万美元付费试点，第一个获得审查员认可的周期完成后，可抵扣一份 12 万到 20 万美元的年度
      生产订阅，外加材料包费用。
  mustBeTrue:
    - "前 15 场 ICP 访谈中，至少 8 场必须确认他们在审查前已经在手动核对 2 个以上的证据系统。"
    - "必须有一家担保银行或卡组织审查员，把带有溯源功能的生成材料包认可为可用的主要审查依据。"
    - "前 8 到 10 个连接器必须覆盖前 10 个目标客户至少 70% 的需求。"
    - "早期试点必须把检查准备时间削减 50% 以上，并相较人工基线明显减少审查员的追问。"
    - "生产客户必须能在需要拓展相邻市场之前，支撑起约 12 万到 20 万美元的年度软件支出。"
  diligenceQuestions:
    - "哪些担保银行审查员会明确认可第三方生成的材料包，而不是仅把它当成一份便利性的导出文件？"
    - "前 10 个目标客户主要用的是哪几种厂商组合，每种组合还能追回多少留存历史？"
    - "第一个买家是直接掌控预算，还是采购决策落在担保银行、COO 或工程部门手上？"
    - "厂商迁移或新项目上线，多大程度上会在排定的检查周期之外制造出额外的紧迫性？"
    - "相邻的嵌入式银行或 BNPL 项目能否不经过全面重建就复用同一套证据模型？"
operatingAssumptions:
  - assumption: "一小批连接器就能覆盖大部分早期客户管线。"
    basis: research.yaml
    validationTest: "为前 10 个目标客户逐一建立厂商矩阵，确认 8 到 10 个连接器能覆盖至少 70% 的所需证据来源。"
    decisionImpact: "如果不成立，产品就会变得过于定制化，招聘和资金需求就会向服务密集型实施倾斜。"
  - assumption: "只要保留原始来源的可追溯性，审查员就会认可第三方生成的材料包。"
    basis: research.yaml
    validationTest: "与一家金融科技公司和一位担保银行或卡组织审查员共同跑一个试点，记录审查员是否把材料包当作主要依据，以及还剩哪些缺口。"
    decisionImpact: "如果不成立，公司就必须重新定位为紧迫性更低、合同金额更低的内部准备软件。"
  - assumption: "只读数据摄取足以赢得第一笔预算。"
    basis: idea.yaml
    validationTest: "在不对任何上游系统写入数据的情况下交付前 2 个试点，确认客户依然能感受到实质性的准备时间缩减。"
    decisionImpact: "如果不成立，安全审查、实施时间和现金消耗都会上升，因为产品必须更直接地控制更多工作流。"
  - assumption: "检查就绪和整改预算能够支撑第一份合同。"
    basis: research.yaml
    validationTest: "在前 5 个销售周期中，确认至少 2 位买家批准了一次付费试点，且不需要一次更大范围的平台替换决策。"
    decisionImpact: "如果不成立，公司可能需要转向更低价的工具型销售、伙伴渠道，或更长的企业预算周期。"
  - assumption: "证据模型在稳定币验证成功后，能扩展到相邻的受监管金融科技工作流。"
    basis: idea.yaml
    validationTest: "梳理一个嵌入式银行或 BNPL 工作流，找 3 个潜在买家确认，同一套时间线加材料包模型能解决一个真实存在的担保银行审查问题。"
    decisionImpact: "如果不成立，投资人应该把这家公司当作一门天花板有限的窄众业务来估值，而不是有风险投资级别上行空间的公司。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "访谈滩头细分市场里的 15 位合规负责人和 5 位担保银行或卡组织审查员。"
    hypothesis: "混合厂商的检查准备已经是一个真实存在、带有高管紧迫感的人工工作流，而不是一个理论上的未来需求。"
    successMetric: "至少 8 家发行方确认当下存在跨系统人工核对，至少 3 位审查员描述出当前材料包格式方面的痛点。"
    owner: "创始人/CEO"
  - horizon: 0–90 天
    experiment: "为前 10 个目标客户建立连接器和留存窗口矩阵。"
    hypothesis: "一份集中的连接器路线图能在长尾集成出现之前，覆盖大部分早期需求。"
    successMetric: "一份 8 到 10 个连接器的路线图覆盖已识别系统的至少 70%，并标记出任何需要补录的留存截止日期。"
    owner: "创始工程师"
  - horizon: 90–180 天
    experiment: "用至少三套在用系统的导出数据，跑一个礼宾式试点，生成一份担保银行材料包。"
    hypothesis: "只要每条记录都能追溯回原始证据，客户和审查员就会信任生成出来的材料包。"
    successMetric: "一份试点材料包被用于真实的审查工作流，审查员反馈中缺失的关键证据类别少于 5 项。"
    owner: "合规产品负责人"
  - horizon: 90–180 天
    experiment: "签下 2 个与具名审查日期挂钩的付费试点。"
    hypothesis: "一个有明确日期的审查触发点，足以比通用的合规软件推销更快地把发现阶段转化为付费工作。"
    successMetric: "至少签下 2 个付费试点，且有一个在一个审查周期内转化为年度生产合同。"
    owner: "创始人/CEO"
  - horizon: 180–360 天
    experiment: "上线六个生产级连接器，加上持续的证据缺口预警。"
    hypothesis: "一旦第一份材料包获得认可，客户会从某个时间点的审查准备，扩展到全年的就绪状态。"
    successMetric: "至少 2 个生产客户在审查之间持续使用这套系统，并把使用范围扩展到最初材料包之外。"
    owner: "创始工程师"
  - horizon: 180–540 天
    experiment: "用同一套证据时间线，测试一个相邻的嵌入式银行或 BNPL 共创客户。"
    hypothesis: "稳定币这个切口能够泛化成一个更宽的担保银行监管品类，而不需要把产品推倒重来。"
    successMetric: "一个相邻的共创客户确认，用至少 60% 相同的连接器和材料包逻辑就能走出一条付费试点路径。"
    owner: "产品负责人"
operations:
  - "为每一份生成的材料包维护一个带有来源留存元数据、审计日志和审查员可追溯功能的不可篡改证据存储。"
  - "围绕一份连接器清单、一套材料包模板和一套缺口复核流程来运行客户入网，再扩展范围。"
  - "持续跟踪厂商 API、文件和留存策略的变化，因为上游证据窗口本身就是产品质量的一部分。"
  - "尽早打理好安全审查、数据处理和顾问伙伴的工作流，因为信任和审查员认可度是最早的采用门槛。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "亲自负责创始人主导的销售、审查员触达和试点转化，因为客户真相和预算归属还在摸索阶段。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "快速搭建出标准时间线、证据存储和第一版连接器框架，跟上试点上线的节奏。"
  - role: "合规产品负责人"
    startTiming: "第 1 个月"
    rationale: "把担保银行材料包要求、留存约束和审查员反馈转化成产品规格和质量验收标准。"
  - role: "集成工程师"
    startTiming: "第 3 个月"
    rationale: "负责第一版集中的连接器路线图，防止实施变成定制化的客户项目。"
  - role: "实施与合规成功负责人"
    startTiming: "第 6 个月"
    rationale: "在首批生产客户上线之后，负责试点入网、证据缺口复核和年度转化工作。"
milestones:
  - horizon: 0–12 个月
    items:
      - "用 15 场 ICP 访谈和 5 场审查员访谈验证检查就绪这一切口。"
      - "上线六个核心连接器和一套担保银行材料包模板。"
      - "签下 2 到 3 个与具名审查日期挂钩的付费试点。"
      - "把至少 1 个试点转化为年度生产订阅。"
  - horizon: 12–24 个月
    items:
      - "达到 5 个生产客户，并至少拥有一套可复用的卡组织或第二家银行模板。"
      - "把至少 2 个客户从某个时间点的审查准备，转移到持续监控上。"
      - "用一套集中的连接器和有文档记录的部署手册，证明实施的可复现性。"
  - horizon: 24–36 个月
    items:
      - "达到研究支持的第三年 8 个生产客户 SOM 目标，或证伪风险投资级别的规模化论点。"
      - "用同一套证据模型上线一个相邻的受监管金融科技工作流。"
      - "把审查员模板和基准数据变成现有客户内部一条清晰的扩展护城河。"
risks:
  - risk: "上游厂商以某种方式限制或对数据访问收费，阻断可靠的证据摄取。"
    likelihood: Medium
    impact: High
    mitigation: "优先接入对导出友好的厂商，尽早归档证据，并与主导第一版连接器路线图的系统协商伙伴数据共享。"
  - risk: "担保银行或卡组织拒绝依赖第三方生成的材料包。"
    likelihood: Medium
    impact: High
    mitigation: "让审查员明确参与试点，保留原始来源的可追溯性，先把第一版产品定位为'审查员就绪的准备材料'，而不是急于宣称自己是权威记录系统。"
  - risk: "打包厂商加上足够多的第三方数据摄取能力，抹平这个独立切口的存在价值。"
    likelihood: Medium
    impact: Medium
    mitigation: "靠严格的中立性、迁移连续性和跨混合技术栈的审查员专属打包能力来竞争，而不是去争夺更多合规工作流的所有权。"
  - risk: "即便产品行得通，滩头市场仍然太小，撑不起风险投资级别的回报。"
    likelihood: Medium
    impact: High
    mitigation: "在第 18 个月前测试相邻的担保银行监管工作流，在扩展证明出现之前，把现金消耗控制在符合小众软件公司的水平。"
  - risk: "合规、工程和担保银行相关方都会影响这笔交易，导致销售周期被拉长。"
    likelihood: High
    impact: Medium
    mitigation: "围绕具名审查日期来销售，把第一阶段的范围保持在只读且狭窄，并用付费试点缩短从发现到验证之间的路径。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    资助 18 个月的连接器开发、证据存储与安全加固、2 到 3 个在跑试点、1 个合规产品岗位、1 个集成岗位，以及足够的实施能力，
    以便在扩大销售规模之前证明审查员认可度和试点转年度合同的转化率。
