ideaScorecard:
  signalStrength:
    score: 3
    rationale: The triage signal is concrete and specific about the pain (manual review, onboarding friction) but rests on a single fetched source with no independent confirmation.
  painIntensity:
    score: 4
    rationale: Sponsor-bank exam prep is a recurring, deadline-driven cost center for compliance teams, and cross-vendor reconciliation is a well-known operational headache in fintech compliance.
  wedgeClarity:
    score: 4
    rationale: The beachhead (issuers with 2+ vendors facing a scheduled exam) and the trigger (formal audit-package request) are narrow and identifiable, giving a clear first-customer profile.
  defensibility:
    score: 3
