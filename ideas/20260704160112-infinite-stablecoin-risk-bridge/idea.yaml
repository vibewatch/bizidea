topRisks:
  - name: Incumbent bundle expansion
    description: Infinite, Sardine, or rival pairs (e.g. Alloy plus a ledger provider) could extend their own bundles to include third-party audit-package generation, cutting out a neutral aggregator.
    mitigation: Compete on strict vendor neutrality and fast integration with every major vendor combination, positioning as the only option that removes single-vendor lock-in rather than reinforcing it.
  - name: Vendor data-access restriction
    description: Risk, KYC, and rails vendors may restrict, rate-limit, or paywall API access to decision and case logs, blocking the core ingestion pipeline the product depends on.
    mitigation: Prioritize integrations with vendors offering open, documented APIs first, and pursue formal data-sharing partnerships with vendors who benefit from their customers being "exam-ready certified."
  - name: Regulatory non-acceptance
    description: Sponsor banks or examiners may decline to treat a third-party-generated audit package as authoritative, still requiring the operator's own compliance team to re-verify everything manually.
    mitigation: Co-design the audit package format with a compliance advisory partner or former examiner, and run an initial pilot with one friendly sponsor bank to secure explicit sign-off before broader go-to-market.
