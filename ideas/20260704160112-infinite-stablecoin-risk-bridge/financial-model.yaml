scenarios:
  downside:
    description: Reviewer acceptance takes longer than planned, only a smaller share of pilots convert, and package-generation revenue stays episodic instead of recurring.
    y3RevenueK: 820.0
    y3EbitdaK: -780.0
    cashLowPointK: -250.0
    keyAssumptionChanges:
    - Q4Y2 ends at 4 paying logos and Q4Y3 at 6 rather than 8.
    - Blended annual revenue per active logo stays near $150K because fewer customers move from one named review into continuous monitoring.
    - Y3 gross margin tops out near 66% because manual evidence cleanup and vendor-retention work remain heavier than planned.
  base:
    description: Three Y1 paying logos convert into 5 paying logos by Q4Y2 and 8 by Q4Y3 while per-logo revenue steps up through annual subscriptions plus recurring review-package fees.
    y3RevenueK: 1151.4
    y3EbitdaK: -503.1
    cashLowPointK: 201.7
    keyAssumptionChanges:
    - Year 1 lands 3 paying logos, then bank- and network-facing proof carries the company to 5 paying logos by Q4Y2.
    - Steady-state economics use about $175K of blended annual revenue per logo once annual subscriptions and package fees stack together.
    - Headcount stays capped at 6 FTE through Y3, so growth comes from a narrow wedge rather than early expansion into full AML, BaaS, or generic GRC.
  upside:
    description: A sponsor bank or network validates the generated package early, partner referrals start on schedule, and more customers adopt continuous monitoring plus multiple review cycles.
    y3RevenueK: 1475.0
    y3EbitdaK: -260.0
    cashLowPointK: 360.0
    keyAssumptionChanges:
    - Q4Y2 reaches 6 paying logos and Q4Y3 reaches 10 as reviewer-approved references shorten later sales cycles.
    - Blended annual revenue per active logo climbs toward $185K-$190K because more customers buy continuous monitoring and recurring package generation.
    - Gross margin reaches roughly 72% as connector reuse improves and human evidence cleanup falls faster than in the base case.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual ARPU settles near $160K because customers buy fewer recurring review packages.
  baseCase: Steady-state blended annual ARPU is about $175K per paying logo.
  upsideCase: More continuous-monitoring and package volume lifts blended annual ARPU toward $190K.
  y3RevenueImpactK: -150.0
  cashImpactK: -115.0
- variable: CAC
  downsideCase: CAC rises above $140K if founder-led outbound and reviewer education take longer than planned.
  baseCase: CAC is about $118.7K using total Y1-Y3 S&M spend per landed paying logo.
  upsideCase: CAC falls toward $95K once partner-led referrals contribute a larger share of wins.
  y3RevenueImpactK: -40.0
  cashImpactK: -160.0
- variable: churn
  downsideCase: Monthly churn reaches 2.5% if the product remains a review-week tool rather than an always-on control layer.
  baseCase: Monthly churn stays at 1.5% once continuous monitoring is embedded.
  upsideCase: Monthly churn improves toward 1.0% after reviewer templates and retained evidence become operationally sticky.
  y3RevenueImpactK: -60.0
  cashImpactK: -70.0
- variable: sales cycle
  downsideCase: Pilot approval and reviewer sign-off slip by one quarter, delaying both pilot starts and annual conversions.
  baseCase: Named-review pilots convert inside the planned milestone windows and one GTM hire is enough through Y3.
  upsideCase: Early reviewer acceptance creates references that shorten later pilot-to-production cycles.
  y3RevenueImpactK: -190.0
  cashImpactK: -220.0
- variable: gross margin
  downsideCase: Y3 gross margin stalls near 66% because evidence cleanup and retention-archive work stay service-heavy.
  baseCase: Y3 steady-state gross margin reaches the 70% target by Q4.
  upsideCase: Y3 gross margin reaches about 72% as connector maintenance and template generation standardize faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -110.0
- variable: hiring pace
  downsideCase: An extra engineer and ops hire are pulled forward before 5-logo proof is established.
  baseCase: The company adds only one GTM hire after Y1 and otherwise holds staffing flat through Y3.
  upsideCase: Later hires are delayed until the seed round because deployment repeatability is proven without extra staff.
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: stablecoin exam-readiness revenue loop
  mermaid: |
    flowchart LR
      SponsorBankReview --> PaidPilot
      PaidPilot --> ProductionLogo
      ProductionLogo --> ContinuousMonitoring
      ContinuousMonitoring --> ReviewPackages
      ReviewPackages --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from converting 3 Y1 paid logos into 5 paying logos by Q4Y2 and 8 by Q4Y3 at roughly $175K exit ARR per logo.
- checkName: Must go right
  finding: A sponsor-bank or network reviewer has to accept the generated package early enough that pilots convert before the single planned GTM hire is overloaded.
- checkName: Model breaks if
  finding: If sales cycles slip a quarter and gross margin stays in the mid-60s because manual evidence cleanup persists, the downside case runs out of cash before the next round.
- checkName: Next-round proof
  finding: The seed story is strongest once the company shows 5 production logos, one reusable second-bank or card-network template, and at least 2 customers on continuous monitoring.
sanityChecks:
  ruleOf40: Y3 growth 72% + EBITDA margin -44% = 28%.
  burnMultiple: Net burn multiple improves from about 1.3x in Y2 to about 1.0x in Y3 on incremental revenue.
  revenuePerFte: $192K Y3 using Q4Y3 headcount of 6 FTE (benchmark roughly $200–400K vertical SaaS).
  flags:
  - The base case still exits Y3 below breakeven, so the seed round depends on proving bank acceptance and expansion revenue before the company adds more headcount.
  - Revenue per FTE is only about $192K in Y3, slightly below a healthy vertical-SaaS benchmark and leaving limited room for hiring mistakes.
  - The model assumes one dedicated GTM hire can support the path from 5 to 8 paying logos; if sponsor-bank references do not accelerate trust, sales capacity becomes a bottleneck.
  - Gross margin only reaches the 70% target by Q4Y3, so persistent manual evidence cleanup or vendor export friction would pressure runway quickly.
