slug: stablecoin-exam-evidence-layer
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-04] the model starts in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed ask
  value: $2.2M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the stated range because hiring stays flat after the first GTM hire until reviewer acceptance is proven.'
- id: A3
  name: Starting paying customers
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP investorMemo.nextDiligence] the company starts pre-revenue and must first convert named-review pilots into paying logos.'
- id: A4
  name: Customer definition
  value: One paying stablecoin issuer or processor logo, whether in pilot or annual subscription.
  unit: definition
  source: '[BP market.buyingProcess + BP businessModel.unitOfValue] the land motion is a logo-level compliance workflow tied to one stablecoin program and its review packages.'
- id: A5
  name: Paid pilot pricing
  value: $50K over roughly 4 months (~$12.5K/month).
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract $40k-$75k paid pilot] the base case uses a midpoint pilot price to avoid assuming full production ACV too early.'
- id: A6
  name: Production pricing anchor
  value: $150K annual subscription plus roughly $25K of recurring review-package fees at steady state (~$175K blended ARR).
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract $120k-$200k annual production subscription plus package fees + Research market.som 8 logos at roughly $175k blended ARR] the model uses the research-backed SOM ACV.'
- id: A7
  name: Customer ramp
  value: 3 paying logos by M12, 5 by Q4Y2, and 8 by Q4Y3.
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] the base case matches the stated milestone path rather than assuming broad-market breakout.'
- id: A8
  name: Revenue mix ramp
  value: Year 1 is pilot-heavy; blended revenue per active logo rises toward the $175K steady-state level as pilots convert and recurring package-generation fees stack on top of subscriptions.
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] the model treats revenue growth as conversion plus package-fee layering, not seat-based expansion.'
- id: A9
  name: Gross margin ramp
  value: 45%-50% in Y1, 58%-65% in Y2, and 67%-70% in Y3.
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryTechnicalConstraints] early human evidence cleanup, connector monitoring, and retention work delay the full margin target until late Y3.'
- id: A10
  name: Monthly churn
  value: 1.5%
  unit: percent per month
  source: '[BP risks + Research openQuestions] compliance evidence systems should be sticky once embedded, but reviewer trust and vendor-data friction still justify non-zero logo churn.'
- id: A11
  name: Hiring timeline
  value: Founder and founding engineer at start; compliance product lead in M1; integration engineer in M3; implementation and compliance success lead in M6; one sales/partnerships hire in late Y2; no further full-time hiring before next-round proof.
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] the plan stays founder-led on GTM and intentionally caps headcount until reviewer acceptance and repeatable deployment proof exist.'
- id: A12
  name: Founder loaded cash compensation
  value: $120K
  unit: USD/FTE/year
  source: Startup-finance heuristic for a lean pre-seed founder salary, consistent with BP team keeping sales and product founder-led.
- id: A13
  name: Engineering loaded cash compensation
  value: $175K
  unit: USD/FTE/year
  source: Startup-finance heuristic for U.S.-based integration and product engineers building the canonical timeline, evidence store, and connector framework described in BP product and team.
- id: A14
  name: Compliance product / implementation loaded cash compensation
  value: $140K
  unit: USD/FTE/year
  source: Startup-finance heuristic for compliance-product and onboarding talent aligned to BP team roles around package requirements, QA, and customer rollout.
- id: A15
  name: Sales / partnerships loaded cash compensation
  value: $170K
  unit: USD/FTE/year
  source: '[BP gtm.channels + BP team] startup-finance heuristic includes base pay, variable compensation, and travel for a single enterprise seller focused on named-review pilots and partner referrals.'
- id: A16
  name: Payroll allocation to P&L lines
  value: Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; compliance-product and implementation roles 30% S&M / 30% R&D / 40% G&A; sales 100% S&M.
  unit: allocation
  source: '[BP team rationales + BP operations] the split follows who owns selling, deployment, productization, and reviewer support in the plan.'
- id: A17
  name: Non-payroll operating budget ramp
  value: About $14K/month in early Y1, about $26K/month by Q4Y2, and about $34K/month by Q4Y3.
  unit: USD/month
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] this covers cloud, data retention, security review, legal, insurance, travel, and implementation tooling without a large paid-demand engine.'
- id: A18
  name: Revenue recognition convention
  value: A logo counts as active for the full modeled month or quarter once live in that period.
  unit: formula
  source: Modeling convention used so revenue reconciles to customer count and blended per-logo pricing in a compact monthly and quarterly layout.
- id: A19
  name: Cash conversion convention
  value: Cash movement equals EBITDA.
  unit: formula
  source: Startup-finance heuristic for an asset-light software company where capex, taxes, debt service, and working-capital timing are not modeled separately at pre-seed scale.
- id: A20
  name: CAC convention
  value: $118.7K using total Y1-Y3 sales and marketing spend divided by 8 landed paying logos by Q4Y3.
  unit: USD/customer
  source: '[Model calc + BP gtm.funnelTargets + BP gtm.channels] this is intentionally conservative because it includes founder-led selling, travel, and early pilot-conversion work.'
- id: A21
  name: Funding milestone for next round sizing
  value: Reach 5 production logos, one reusable second-bank or card-network template, and at least 2 customers on continuous monitoring by Q4Y2 while preserving roughly 6 months of cash into Q2Y3.
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + model cash curve] the round is sized to reach repeatable reviewer-accepted proof before a seed raise.'
