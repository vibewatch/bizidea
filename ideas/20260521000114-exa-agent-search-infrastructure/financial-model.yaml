date: '2026-05-21'
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: Model start month
    value: 2026-06
    unit: YYYY-MM
    source: "[BP date 2026-05-21] the model starts the month after the business-plan date so the round closes before the hiring ramp."
  - id: A2
    name: Opening cash
    value: "3300.0"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M] base case uses a $3.3M pre-seed, inside the stated range and large enough to reach the next milestone plus six months of buffer."
  - id: A3
    name: Customer unit in the model
    value: active paying customer account
    unit: definition
    source: "[BP market.som 60 customers at about $90k blended ACV; BP businessModel.unitOfValue covered production workflow] customersEop tracks paying accounts, with expansion reflected through rising ARPU."
  - id: A4
    name: Starting customers (M1)
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months] the company starts pre-revenue before signing paid design partners."
  - id: A5
    name: Y1 new paying customers by month
    value: "[0, 0, 0, 0, 1, 0, 1, 0, 1, 0, 1, 0]"
    unit: count
    source: "[BP milestones sign 3-5 paid design partners and convert at least 2 pilots] base case closes four paid pilots across the back half of Y1."
  - id: A6
    name: Y2 new paying customers by quarter
    value: "[1, 1, 2, 2]"
    unit: count
    source: "[BP milestones 12-24 months] assumes a modest founder-led ramp from pilot conversions plus the first GTM support hire."
  - id: A7
    name: Y3 new paying customers by quarter
    value: "[3, 3, 4, 4]"
    unit: count
    source: "[BP market.som 60 customers at about $90k ACV] base case ends Y3 at 24 customers, deliberately below the SOM path to stay conservative for a founder-led infrastructure sale."
  - id: A8
    name: Annual price ladder
    value: Y1 36.0; Y2 80.0; Y3 110.0
    unit: annual USDK per customer
    source: "[BP investorMemo.initialContract $20k-$40k paid pilot; BP gtm.pricing $60k-$120k annual ACV plus usage fees] pilots start near the midpoint, then production pricing moves into the target range with usage and governance add-ons."
  - id: A9
    name: Revenue recognition policy
    value: average active customers in period multiplied by annualized contract value
    unit: formula
    source: "Startup-finance heuristic: new enterprise customers usually activate mid-period on average, so recognized revenue uses ((BoP + EoP) / 2) x annualized price."
  - id: A10
    name: Gross margin ramp
    value: Y1 50-60 on paid months; Y2 62, 65, 68, 70 by quarter; Y3 71, 72, 72, 72 by quarter
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 72; BP risks on browser fallback; Research sensitivityCases browser fallback] margin climbs only as routing and caching reduce expensive browser and provider overuse."
  - id: A11
    name: Loaded salary bands
    value: Founder 180; founding eng 180; applied ML/product eng 170; solutions eng 145; security/platform eng 170; GTM lead 170; customer success 130; AE 155; platform eng 160
    unit: annual USDK per FTE
    source: "[BP team roles] plus startup-finance heuristic for seed-stage U.S.-centric infrastructure startups including payroll tax and benefits load."
  - id: A12
    name: Hiring schedule
    value: founder and founding eng in M1; applied ML/product eng in M2; solutions eng in M6; security/platform eng in M9; GTM lead in M12; customer success/solutions architect in M15; AE in M18; platform engineer in M27
    unit: timing
    source: "[BP team startTiming through Month 12] plus startup-finance heuristic that later hires wait for pilot proof and partner-sourced pipeline."
  - id: A13
    name: Payroll allocation policy
    value: founder 70% S&M and 30% G&A; applied ML/product eng 80% R&D and 20% S&M; solutions eng 50% S&M, 30% R&D, 20% G&A; security/platform eng 85% R&D and 15% G&A; customer success 65% S&M, 20% R&D, 15% G&A; engineering fully R&D; GTM and AE fully S&M
    unit: policy
    source: "[BP team rationales; BP gtm; BP operations] reflects founder-led selling, implementation-heavy pilots, and an initially product-weighted org."
  - id: A14
    name: Non-payroll operating expense ramp
    value: S&M 5-20 monthly; R&D 10-22 monthly; G&A 7-15 monthly
    unit: USDK per month
    source: "[BP operations; BP fundingAsk.useOfFundsSummary] plus startup-finance heuristic for cloud spend, eval runs, travel, legal, and compliance tooling in a lean pre-seed plan."
  - id: A15
    name: Steady-state monthly churn
    value: "1.25"
    unit: percent
    source: "Startup-finance heuristic: annual infrastructure contracts with observable ROI should retain well, but the early category and provider bundling risk keep modeled churn above best-in-class infra retention."
  - id: A16
    name: Blended CAC per customer
    value: "76.32"
    unit: USDK
    source: "Calculated from modeled Y2-Y3 sales and marketing spend of $1.526M divided by 20 new customers; consistent with founder-led, technical enterprise sales."
  - id: A17
    name: Funding sizing rule
    value: reach the next fundable milestone and hold six months of buffer
    unit: policy
    source: "Developer instruction plus [BP fundingAsk runwayMonths 18] base case sizes the round to reach mid-Y3 proof points with H2Y3 buffer, not just to launch the first pilots."
  - id: A18
    name: Cash flow simplification
    value: ending cash equals opening cash plus cumulative EBITDA
    unit: formula
    source: "Startup-finance heuristic: the model assumes an asset-light software business with negligible capex, debt, and working-capital distortion."
