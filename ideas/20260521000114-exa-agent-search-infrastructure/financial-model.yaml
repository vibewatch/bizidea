scenarios:
  downside:
    description: Slower pilot conversion and weaker standalone budget proof keep the company below the intended production-customer ramp.
    y3RevenueK: 1250.0
    y3EbitdaK: -1188.58
    cashLowPointK: -155.88
    keyAssumptionChanges:
      - Y2 exits at 8 paying customers and Y3 exits at 18 instead of 24
      - Blended annual ACV reaches only $75K in Y2 and $100K in Y3
      - Gross margin tops out around 68% because browser fallback and provider costs stay elevated
  base:
    description: Four paid pilots in Y1 convert into a measured but repeatable production ramp, and revenue grows through higher ACV plus modest customer count expansion.
    y3RevenueK: 1815.0
    y3EbitdaK: -732.7
    cashLowPointK: 363.15
    keyAssumptionChanges:
      - Y2 exits at 10 paying customers and Y3 exits at 24
      - Blended annual ACV rises from $36K pilot pricing to $80K in Y2 and $110K in Y3
      - Gross margin reaches the 72% business-plan target once routing and caching mature
  upside:
    description: Design partners convert faster, partner channels contribute earlier, and production pricing expands with stronger usage and governance attach rates.
    y3RevenueK: 2460.0
    y3EbitdaK: -220.13
    cashLowPointK: 878.98
    keyAssumptionChanges:
      - Y2 exits at 12 paying customers and Y3 exits at 30
      - Blended annual ACV reaches $85K in Y2 and $120K in Y3
      - Gross margin improves to 74% as cache hit rates and query routing outperform plan
sensitivity:
  - variable: ARPU
    downsideCase: $100K blended annual ACV in Y3
    baseCase: $110K blended annual ACV in Y3
    upsideCase: $120K blended annual ACV in Y3
    y3RevenueImpactK: -165.0
    cashImpactK: -118.0
  - variable: CAC
    downsideCase: $95K CAC per new customer
    baseCase: $76.32K CAC per new customer
    upsideCase: $65K CAC per new customer
    y3RevenueImpactK: 0.0
    cashImpactK: -375.0
  - variable: churn
    downsideCase: 2.0% monthly churn after the first contract term
    baseCase: 1.25% monthly churn
    upsideCase: 1.0% monthly churn
    y3RevenueImpactK: -120.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: Pilot-to-production close slips by one quarter
    baseCase: Paid pilots convert inside two quarters
    upsideCase: Partner-sourced deals close in under two months after pilot proof
    y3RevenueImpactK: -385.0
    cashImpactK: -290.0
  - variable: gross margin
    downsideCase: 68%
    baseCase: 72%
    upsideCase: 74%
    y3RevenueImpactK: 0.0
    cashImpactK: -72.6
  - variable: hiring pace
    downsideCase: Pull the platform engineer and a second field-facing hire forward by two quarters
    baseCase: Add only one platform engineer in Y3 after Y2 production proof
    upsideCase: Delay the Y3 platform hire by one quarter and cover overflow with partners
    y3RevenueImpactK: -60.0
    cashImpactK: -140.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      QualifiedTeams[Qualified platform teams] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionAccounts[Production accounts]
      ProductionAccounts --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[Gross profit after provider and browser costs]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from growing from 4 paying accounts in Y1 to 24 by Q4Y3 while blended ACV rises from $36K pilot pricing to $110K production contracts.
  - checkName: Must go right
    finding: Founder-led pilots need to convert into production before the GTM team scales, because the sales-cycle sensitivity is the single biggest revenue and runway swing factor.
  - checkName: Model breaks if
    finding: The downside case turns cash negative if buyers will not support a $60K-$120K annual control-plane budget or if browser fallback keeps gross margin below about 68%.
  - checkName: Next-round proof
    finding: The strongest next financing story is 16 paying customers by Q2Y3, 72% gross margin, and 3 active ecosystem partners that show the motion is no longer purely founder-sourced.
sanityChecks:
  ruleOf40: Y3 growth 249% + EBITDA margin -40% = 209%
  burnMultiple: Improves from about 1.9x in Y2 to about 0.4x in Y3 as end-of-year ARR grows from $0.8M to $2.64M without a matching step-up in burn.
  revenuePerFte: $202K Y3 using Q4Y3 headcount of 9 FTE (benchmark $200-400K SaaS)
  flags:
    - The model still exits Y3 EBITDA-negative, so it assumes the company raises again off proof of efficient growth rather than self-funding.
    - Revenue per FTE only reaches the low end of software benchmarks, which leaves little room for extra services work or a faster support ramp.
    - Gross margin assumes browser fallback remains a minority path; if it stays above the business-plan risk threshold, the funding ask would need to move higher.
