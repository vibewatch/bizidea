    - 3
  headwinds:
  - point: 如果搜索厂商或云平台把治理能力自己补齐，独立编排层的价值会被压缩。
    sourceRefs:
    - 47
    - 39
  - point: 浏览器兜底在运维上依旧混乱，还会引入提示词注入、数据保留和安全评审负担，从而拉长销售周期。
    sourceRefs:
    - 20
    - 77
competitors:
- name: Exa
  stage: 成长期
  wedge: 面向代理的原生搜索引擎，支持可配置延迟、深度搜索、内容抽取和异步 agent 工作流。
  pricing: $7/1k 搜索请求；deep search $12；deep-reasoning $15；每次 agent run 为 $0.025-$2.00。
  strength: 语义检索强、搜索模式广，而且已经有公开证据表明头部 AI 公司在生产里使用。
  weaknessVsUs: 它优化的仍是 Exa 自己这套栈，而不是跨多家供应商的中立路由、支出策略或证据复用。
  sourceRefs:
  - 45
  - 48
  - 1
- name: Tavily
  stage: 成长期
  wedge: 面向 LLM 的搜索、抽取、抓取、映射和研究端点，围绕 agent 工作流做了轻量集成。
  pricing: 每月 1,000 个免费 API credits；按量为每 credit $0.008；企业版定制。
  strength: 开发者友好，围绕 agent 检索有清晰产品形态，也已经被大量框架采用。
  weaknessVsUs: 和 Exa 一样，Tavily 本质上仍是单一供应商表层，而不是在多家供应商和多条兜底路径之间做仲裁的控制平面。
  sourceRefs:
  - 61
  - 63
  - 3
- name: Google Agent Search
  stage: 在位者
  wedge: Google Cloud 栈内的企业搜索和 grounded answers，能直接利用 Google Search 做 grounding，并支持可配置搜索应用。
  pricing: $1.50/1,000 standard queries；$4.00/1,000 enterprise queries；高级生成式答案查询另加 $4.00/1,000。
  strength: 分发能力强、企业打包能力强，又能直接拿到 Google 搜索 grounding，因此对大公司买家很有说服力。
  weaknessVsUs: 它更适合 Google 原生部署和内部搜索场景，不适合做跨多家外部检索供应商的中立路由层。
  sourceRefs:
  - 36
  - 37
  - 39
- name: Browserbase
  stage: 成长期
  wedge: 浏览器 agent 基础设施，提供搜索、fetch、浏览器小时、验证码处理，以及用于浏览器兜底的企业安全控制。
  pricing: 开发者和 startup 套餐按浏览器小时计费，另加 $7/1k 搜索调用和 $0.5-$1/1k fetch 调用；企业版定制。
  strength: 当普通搜索失败时，它掌握着搜索供应商通常要交出去的带认证浏览器执行层。
  weaknessVsUs: 它是执行和抓取运行时，不是决定何时搜索、何时缓存、何时浏览的检索路由层。
  sourceRefs:
  - 22
  - 77
  - 83
regulatoryTechnicalConstraints:
- point: EU AI Act 提高了高风险部署对文档、日志、可追溯性和人工监督的要求。
  sourceRefs:
  - 12
  - 13
- point: NIST 用结构化风险管理来定义可信 AI 部署，这反而强化了“可审计检索策略”这件事的价值。
  sourceRefs:
  - 11
- point: Anthropic 明确提醒，能操纵浏览器的代理会遭遇提示词注入，因此需要域名限制、最小权限和高影响动作的人类确认。
  sourceRefs:
  - 20
- point: Google 文档写明 grounding with Google Search 每天有 100 万次查询上限，这凸显了上游供应商限制，也说明路由与兜底控制有必要。
  sourceRefs:
  - 36
- point: 如果工作流里包含浏览器兜底，企业买家一定会追问日志、录屏和存储产物的保留与安全控制。
  sourceRefs:
  - 77
  - 78
validationSignals:
- point: Exa 的融资和采用叙事说明，大型 AI 构建者已经把 Web 搜索当成核心基础设施。
  sourceRefs:
  - 1
  - 2
- point: Tavily 的融资和 LangChain 集成说明，agent 开发者会主动选择专用搜索 API，而不是默认回到通用 Web 搜索。
  sourceRefs:
  - 3
  - 21
- point: Exa、Google 和浏览器运行时的公开按查询定价，让“以成本优化为切口”变得足够具体。
  sourceRefs:
  - 45
  - 37
  - 22
- point: 越来越多的独立对比把供应商选择、延迟和响应结构当成 agent 团队的一等工程决策。
  sourceRefs:
  - 5
  - 7
  - 8
openQuestions:
- 有多少目标买家已经在外部搜索上花到足以单独立项一个控制平面？
- 生产查询里到底有多少比例真的需要浏览器兜底，而不是更好的搜索路由或缓存？
- 买家最看重的控制平面 KPI 到底是什么：省了多少钱、引用回放多快，还是错误答案更少？
- 搜索供应商和云平台会以多快速度把路由、评测和治理能力吸收到自己的原生产品里？
