reportMemo:
  executiveTakeaways:
  - 原生面向代理的检索已经明确变成基础设施：Exa 说代理的搜索量会比人类高出 1,000 倍，Tavily 也围绕同一判断完成融资，这说明这不是一个想象中的新功能，而是真实的工作负载迁移。[1, 3]
  - 真正的切口不是再做一个索引，而是把搜索深度、抽取、浏览器兜底、缓存和可追踪性编排起来。Exa、Tavily、Cloudflare 以及浏览器运行时厂商的公开文档都说明，买家今天已经在手工把这些原语拼到一起。[48, 63, 24, 22, 23]
  - 预算已经存在，因为供应商本来就在按查询或按运行收费：Exa、Tavily、Google Agent Search、Browserbase 和 Browserless 都公开了和用量挂钩的价格，这让搜索可靠性天然变成一条运营成本线。[45, 61, 37, 22, 23]
  - 真正空着的位置，是供应商无关的治理层。搜索 API 只会优化自己的表面，云平台只会优化自己的平台，浏览器运行时只会优化执行；它们都不会天然去优化什么时候不该搜、什么时候该复用证据，以及怎么让跨供应商策略保持一致。[47, 39, 28, 77]
  - 采用摩擦的核心不在 API 接入，而在企业控制。NIST、EU AI Act、Anthropic 的 computer-use 指南以及浏览器运行时安全文档都在强调：日志、监督、保留和提示词注入防护是入场门槛。[11, 12, 20, 78]
  - 这个品类会跟着代理采用一起增长，而且增速会快过传统企业搜索：Precedence 给出的 AI agents CAGR 是到 2035 年 43.57%，而 enterprise search 是 9.05%，说明真正系在实时外部检索上的那部分支出会长得更快。[10, 9]
  marketDefinition: 面向生产级 AI 代理检索的供应商无关控制软件。这个品类位于搜索 API、Google 搜索 grounding 服务、缓存和浏览器运行时之上，用来决定一条查询该走快速搜索、深度搜索、抽取、缓存证据还是浏览器兜底，同时保留引用、时效策略和成本遥测。
  customerAndBuyer: 核心使用者是运行重检索研究、销售情报或合规代理的 ML 基础设施工程师和代理平台工程师。真正拍板的通常是对毛利率、回答质量和企业信任负责的工程 VP、AI 平台负责人或平台 GM。
  buyingTriggers:
  - point: 产品正式 GA 或一次企业级上线，会把外部搜索支出瞬间拉高，也暴露出直接调供应商接口缺少成本护栏。
    sourceRefs:
    - 45
    - 61
    - 37
  - point: 过时或错误引用引发客户升级投诉后，买家会立刻发现，可回放能力和来源策略控制比“搜得更广”更急。
    sourceRefs:
    - 15
    - 16
    - 51
  - point: 团队为了救回失败的搜索，会叠加浏览器执行或多供应商兜底；运维复杂度随之上升，也给路由控制平面留下了明确插入点。
    sourceRefs:
    - 28
    - 22
    - 23
  willingnessToPay:
    summary: 公开定价已经在训练买家把检索当成按量计费的生产支出：Exa 按每 1,000 次搜索请求收 $7，Tavily 按 credit 收费，Google Agent Search 按每 1,000 次查询收费，浏览器运行时则按搜索、抓取、浏览器小时或单位计费。因此控制平面可以把 ROI 锚定在“少花了多少路由支出”和“少失败了多少任务”上，而不必去创造一个全新的预算类别。
    sourceRefs:
    - 45
    - 61
    - 37
    - 22
    - 23
  competitiveLandscape: 竞争来自四个方向：Exa、Tavily 这样的原生面向代理搜索 API；Google 领头的云 grounding 和企业搜索栈；Browserbase、Browserless 这样掌握执行兜底的浏览器运行时；以及平台团队自己写的胶水代码。创业公司只有在自己成为跨供应商的策略与支出层时才有机会，而不是沦为某一栈里的一块点状能力。
  incumbentThesis:
  - incumbentClass: 搜索 API 厂商
    point: Exa 和 Tavily 已经把搜索质量、抽取和研究深度做得很强，但它们本质上仍是单一供应商产品，默认不会替客户把多供应商路由、证据复用和中立的支出治理做到极致。
    sourceRefs:
    - 45
    - 48
    - 61
    - 63
  - incumbentClass: 云平台
    point: Google 把 grounding、enterprise search 和治理功能打包在一起，但它的经济和技术重心仍然是 Google 栈本身，而不是横跨多家检索供应商和浏览器兜底的中立控制平面。
    sourceRefs:
    - 36
    - 37
    - 39
  - incumbentClass: 浏览器运行时
    point: Browserbase 和 Browserless 在带认证的兜底和抽取上很有吸引力，但它们卖的是执行原语，而不是查询分类、证据准入或供应商无关的搜索治理。
    sourceRefs:
    - 22
    - 23
    - 77
    - 83
  - incumbentClass: 网关与可观测性厂商
    point: Cloudflare 证明团队确实需要分析、兜底、自定义成本记账和密钥管理，但它的范围仍是模型网关基础设施，而不是跨搜索、缓存和浏览器动作的检索编排层。
    sourceRefs:
    - 24
    - 27
    - 28
    - 29
  - incumbentClass: 自研方案
    point: 工具调用框架和供应商 SDK 让自研编排成为可能，但这会把路由策略、失效处理和可审计性工作重新压回平台团队自己身上。
    sourceRefs:
    - 19
    - 21
    - 48
  regulatoryLandscape: 真正的约束并不是某条专门针对搜索的法规，而是围绕可信 AI 的普遍义务正在上升。任何把检索自动接进面向客户答案的团队，都要准备好可追溯性、日志、人类监督、保留控制，以及对引用质量的可辩护说法，尤其是在 EU 部署和受监管买家场景里。
  technologyLandscape: 使这一切成立的技术栈已经成熟：搜索 API 暴露了结构化搜索和抽取，云平台暴露了 grounding 和 enterprise search，网关层暴露了兜底和成本遥测，浏览器运行时暴露了带认证的兜底和回放能力。正因为这些原语都在位，编排层才有商业可行性；也正因为如此，创业公司必须很快把多条接口接起来。
  distributionChannels:
  - point: 先从已经在用 Exa、Tavily 或 Google Agent Search 的团队切入，因为这些团队已经看见了按量计费的检索成本和可靠性取舍。
    sourceRefs:
    - 45
    - 61
    - 37
  - point: 借助 LangChain 等框架生态和供应商集成指南，在团队把某一套检索栈硬编码进去之前先触达 agent builders。
    sourceRefs:
    - 21
    - 48
    - 63
  - point: 与浏览器运行时厂商合作，把高价值的浏览器兜底交给伙伴，而不是从零重建带认证执行能力。
    sourceRefs:
    - 22
    - 23
    - 77
  partnershipEcosystem:
  - point: 搜索供应商合作很重要，因为产品必须先把 Exa、Tavily、Google 搜索 grounding，以及大概率还要包括 SERP API 做成一等集成。
    sourceRefs:
    - 48
    - 63
    - 36
  - point: 当查询需要带认证浏览、抓取或超出搜索 API 能力的抽取时，Browserbase 和 Browserless 是天然的兜底伙伴。
    sourceRefs:
    - 22
    - 23
    - 77
  - point: 如果客户已经通过网关层做标准化，gateway 或可观测性伙伴就能补上共享的成本与可靠性遥测。
    sourceRefs:
    - 27
    - 29
  dataMoats:
  - point: 最有价值的专有资产不是原始搜索索引，而是历史路由图谱：知道某类查询应该交给哪家供应商、搜多深、是否需要兜底。
    sourceRefs:
    - 27
    - 28
    - 48
  - point: 可回放证据链和会话产物会逐步沉淀成失效分析语料库，反过来提升路由、缓存和人工接管策略。
    sourceRefs:
    - 51
    - 83
    - 78
  - point: 一旦白名单域名、保留和地域处理策略嵌进企业工作流，就会天然变得很黏。
    sourceRefs:
    - 20
    - 12
    - 77
  geographicConsiderations:
  - point: 北美是近期最干净的市场，因为它已经领跑相邻的 AI agent 支出，而且企业买家正在主动把生产级代理栈标准化。
    sourceRefs:
    - 10
  - point: 扩到 EU 时，必须把可追溯性、透明度和监督打包做得更强，因为 AI Act 对高风险场景反复强调日志、文档和人工监督。
    sourceRefs:
    - 12
    - 13
  sensitivityCases:
  - case: 供应商把控制平面能力一起打包
    impact: 如果 Exa、Tavily 或 Google 原生补上更强的路由、基准测试和证据控制，创业公司就必须把差异化放在中立性、跨供应商策略和支出优化上，而不是单纯编排。
    sourceRefs:
    - 47
    - 67
    - 39
  - case: 浏览器兜底比预期更常见
    impact: 如果太多工作流最终都逃到搜索 API 之外，需要付费浏览器会话或高 captcha 自动化，那么毛利率和实施成本都会恶化。
    sourceRefs:
    - 22
    - 23
    - 20
  - case: 治理义务收紧速度快于采用
    impact: 如果安全与合规评审拉得太长，扩张会被拖慢；因此公司必须从第一天就把日志、保留和策略控制做强。
    sourceRefs:
    - 11
    - 12
    - 78
  validationPlan:
  - priority: high
    question: 什么样的查询量阈值，才足以让一层专用检索控制平面进预算？
    evidenceToGather: 访谈 10 家共创客户，拿到月度供应商账单，并建立单次成功代理任务成本的试点基线。
  - priority: high
    question: 团队到底多常需要浏览器兜底，而不是更深搜索或更好缓存？
    evidenceToGather: 在 3-5 家客户里按查询类型、失效模式和兜底路径切分生产轨迹。
  - priority: medium
    question: 采购最先看重的合规材料到底是哪一类：保留控制、审计日志，还是域名策略？
    evidenceToGather: 收集至少 5 家中型/企业级 AI 买家的安全问卷和采购反馈。
  - priority: medium
    question: 不同工作负载之间，供应商路由差异到底有多大？
    evidenceToGather: 在客户特定数据集上，对 Exa、Tavily、Google 搜索 grounding 和浏览器兜底跑正面对比评测。
