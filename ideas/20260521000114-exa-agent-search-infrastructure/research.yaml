competitors:
- name: Exa
  stage: scale-up
  wedge: Agent-native search engine with configurable latency, deep search, contents extraction, and async agent workflows.
  pricing: $7/1k search requests; $12 deep search; $15 deep-reasoning; $0.025-$2.00 per agent run.
  strength: Strong semantic retrieval, broad search modes, and public evidence that leading AI companies already use it.
  weaknessVsUs: Still optimizes the Exa stack itself rather than neutral routing, spend policy, or evidence reuse across several providers.
  sourceRefs:
  - 45
  - 48
  - 1
- name: Tavily
  stage: scale-up
  wedge: LLM-oriented search, extract, crawl, map, and research endpoints tuned for agent workflows with simple integration.
  pricing: 1,000 free API credits per month; pay-as-you-go at $0.008 per credit; enterprise custom.
  strength: Developer-friendly search surface with broad framework adoption and a clear product around agent retrieval.
  weaknessVsUs: Like Exa, Tavily is still a provider surface, not a control plane that arbitrates among providers and fallback modes.
  sourceRefs:
  - 61
  - 63
  - 3
- name: Google Agent Search
  stage: incumbent
  wedge: Enterprise search and grounded answers inside the Google Cloud stack, with grounding from Google Search and configurable search apps.
  pricing: $1.50/1,000 standard queries; $4.00/1,000 enterprise queries; +$4.00/1,000 advanced generative-answer queries.
  strength: Distribution, enterprise packaging, and direct access to Google search grounding make it credible for large-company buyers.
  weaknessVsUs: Best aligned with Google-native deployments and internal-search use cases, not neutral routing across several external retrieval providers.
  sourceRefs:
  - 36
  - 37
  - 39
- name: Browserbase
  stage: scale-up
  wedge: Browser agent infrastructure with search, fetch, browser hours, captcha solving, and enterprise security controls for browser fallback.
  pricing: Developer and startup plans meter browser hours plus $7/1k search calls and $0.5-$1/1k fetch calls, with enterprise custom.
  strength: Owns the authenticated browser-execution layer that search providers often hand off to when plain search fails.
  weaknessVsUs: It is a runtime for execution and capture, not a retrieval-routing layer that decides when to search, cache, or browse.
  sourceRefs:
  - 22
  - 77
  - 83
