openQuestions:
- How many target buyers already spend enough on external search for a standalone control-plane line item to clear procurement?
- What share of production queries truly require browser fallback instead of better search-provider routing or caching?
- 'Which control-plane KPI matters most to buyers: spend saved, citation replay speed, or reduction in bad answers?'
- How quickly will search providers and clouds absorb routing, eval, and governance features into their native products?
