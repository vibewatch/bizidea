reportMemo:
  executiveTakeaways:
  - 'Agent-native retrieval has clearly become infrastructure: Exa says agents will search 1,000x more than humans and Tavily has raised capital around the same thesis, which validates a real workload shift rather than a speculative feature add-on. [1, 3]'
  - The wedge is not another index alone; it is orchestration across search depth, extraction, browser fallback, caching, and traceability. Public docs from Exa, Tavily, Cloudflare, and browser-runtime vendors show buyers already assemble these primitives by hand. [48, 63, 24, 22, 23]
  - 'Budget exists because providers already charge on a visible per-query or per-run basis: Exa, Tavily, Google Agent Search, Browserbase, and Browserless all publish usage-linked pricing that turns search reliability into an operating-cost line item. [45, 61, 37, 22, 23]'
  - The strategic gap is provider-agnostic governance. Search APIs optimize their own surfaces, clouds optimize their own platforms, and browser runtimes optimize execution; none of them naturally optimize when not to search, when to reuse evidence, and how to keep multi-provider policy consistent. [47, 39, 28, 77]
  - Adoption friction will center on enterprise controls, not raw API access. NIST, the EU AI Act, Anthropic computer-use guidance, and browser-runtime security docs all point to logging, oversight, retention, and prompt-injection controls as table stakes. [11, 12, 20, 78]
  - 'The category should grow with agent adoption faster than classic enterprise search alone: Precedence pegs AI agents at 43.57% CAGR through 2035 versus 9.05% for enterprise search, implying outsized growth for the subset of spend tied to live external retrieval. [10, 9]'
  marketDefinition: Provider-agnostic control software for production AI-agent retrieval. The category sits above search APIs, grounding services, caches, and browser runtimes to decide whether a query should hit fast search, deep search, extraction, cached evidence, or browser fallback while preserving citations, freshness policies, and cost telemetry.
  customerAndBuyer: Primary users are ML infrastructure and agent-platform engineers running retrieval-heavy research, sales-intel, or compliance agents. The economic buyer is typically a VP Engineering, Head of AI Platform, or platform GM who owns margin, answer quality, and enterprise trust for agent products.
  buyingTriggers:
  - point: A product GA launch or enterprise rollout causes external-search spend to jump and exposes that direct provider calls lack cost guardrails.
    sourceRefs:
    - 45
    - 61
    - 37
  - point: Bad or stale citations trigger customer escalations, making replayability and source-policy controls more urgent than raw retrieval breadth.
    sourceRefs:
    - 15
    - 16
    - 51
  - point: Teams add browser execution or multi-provider fallbacks to recover failed searches, which raises operational complexity and creates a clear insertion point for a routing control plane.
    sourceRefs:
    - 28
    - 22
    - 23
  willingnessToPay:
    summary: 'Public pricing already trains buyers to pay for retrieval infrastructure as metered production spend: Exa charges $7 per 1,000 search requests, Tavily charges per credit, Google Agent Search charges per 1,000 queries, and browser runtimes bill for search, fetch, browser hours, or units. A control plane can therefore anchor ROI around reduced routed spend and fewer failed tasks rather than inventing a new budget category.'
    sourceRefs:
    - 45
    - 61
    - 37
    - 22
    - 23
  competitiveLandscape: 'Competition comes from four directions: agent-native search APIs such as Exa and Tavily; cloud grounding and enterprise-search stacks led by Google; browser runtimes such as Browserbase and Browserless that own execution fallback; and in-house glue code built on framework tools. The startup only wins if it becomes the cross-provider policy and spend layer rather than another point solution within one provider stack.'
  incumbentThesis:
  - incumbentClass: Search APIs
    point: Exa and Tavily already optimize search quality, extraction, and research depth, but they are single-provider products that do not maximize multi-provider routing, evidence reuse, or neutral spend governance by default.
    sourceRefs:
    - 45
    - 48
    - 61
    - 63
  - incumbentClass: Cloud platforms
    point: Google bundles grounding, enterprise search, and governance features, yet its economic and technical center of gravity is still the Google stack rather than a neutral control plane spanning several retrieval vendors and browser fallbacks.
    sourceRefs:
    - 36
    - 37
    - 39
  - incumbentClass: Browser runtimes
    point: Browserbase and Browserless are compelling for authenticated fallback and extraction, but they monetize execution primitives rather than query classification, evidence admissibility, or provider-agnostic search governance.
    sourceRefs:
    - 22
    - 23
    - 77
    - 83
  - incumbentClass: Gateway and observability vendors
    point: Cloudflare proves that teams want analytics, fallbacks, custom cost accounting, and key management, but its scope is model-gateway infrastructure rather than a retrieval-specific orchestration layer across search, cache, and browser actions.
    sourceRefs:
    - 24
    - 27
    - 28
    - 29
  - incumbentClass: In-house
    point: Tool-use frameworks and vendor SDKs make custom orchestration possible, but they push routing policy, failure handling, and auditability work back onto the platform team.
    sourceRefs:
    - 19
    - 21
    - 48
  regulatoryLandscape: The main constraint is not a search-specific statute but the broader shift toward trustworthy AI obligations. Teams that automate retrieval into customer-facing answers will need traceability, logging, human oversight for risky actions, retention controls, and defensible claims about citation quality, especially for EU deployments and regulated buyers.
  technologyLandscape: 'The enabling stack now exists: search APIs expose structured search and extraction, clouds expose grounding and enterprise search, gateways expose fallbacks and cost telemetry, and browser runtimes expose authenticated fallback and replay. That maturity makes orchestration commercially plausible, but it also means the startup must integrate fast across many surfaces.'
  distributionChannels:
  - point: Land through teams already running Exa, Tavily, or Google Agent Search because they already see metered retrieval costs and reliability tradeoffs.
