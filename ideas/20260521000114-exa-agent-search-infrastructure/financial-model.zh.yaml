scenarios:
  downside:
    description: 试点转正更慢，且独立预算的成立证据更弱，导致公司跑不到计划中的生产客户爬坡。
    y3RevenueK: 1250.0
    y3EbitdaK: -1188.58
    cashLowPointK: -155.88
    keyAssumptionChanges:
    - Y2 末只有 8 个付费客户，Y3 末只有 18 个，而不是 24 个
    - 混合年 ACV 在 Y2 只能到 $75K，Y3 只能到 $100K
    - 由于浏览器兜底和供应商成本居高不下，毛利率最高只能到约 68%
  base:
    description: Y1 的 4 个付费试点转成一条节奏克制但可重复的生产增长曲线，收入同时受益于 ACV 抬升和客户数温和扩张。
    y3RevenueK: 1815.0
    y3EbitdaK: -732.7
    cashLowPointK: 363.15
    keyAssumptionChanges:
    - Y2 末达到 10 个付费客户，Y3 末达到 24 个
    - 混合年 ACV 从 $36K 的试点定价抬升到 Y2 的 $80K 和 Y3 的 $110K
    - 随着路由和缓存成熟，毛利率达到 business-plan 设定的 72% 目标
  upside:
    description: 共创客户转化更快，伙伴渠道更早贡献线索，且生产定价因为更强的用量与治理附加率而继续上探。
    y3RevenueK: 2460.0
    y3EbitdaK: -220.13
    cashLowPointK: 878.98
    keyAssumptionChanges:
    - Y2 末达到 12 个付费客户，Y3 末达到 30 个
    - 混合年 ACV 在 Y2 达到 $85K，Y3 达到 $120K
    - 随着缓存命中率和查询路由优于计划，毛利率提升到 74%
