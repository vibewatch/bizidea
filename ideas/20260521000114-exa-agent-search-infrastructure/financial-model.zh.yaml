slug: agent-search-control-plane
date: '2026-05-21'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-21] 模型从 business-plan 日期后的第一个月启动，这样融资会先在招聘爬坡前完成。'
- id: A2
  name: 期初现金
  value: '3300.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 基准情形采用 $3.3M 的 pre-seed，位于给定区间内，也足以跑到下一轮里程碑并保留 6 个月缓冲。'
- id: A3
  name: 模型中的客户单位
  value: 活跃付费客户账户
  unit: definition
  source: '[BP market.som 60 customers at about $90k blended ACV; BP businessModel.unitOfValue covered production workflow] customersEop 跟踪的是付费账户数，扩张则通过 ARPU 上升体现。'
- id: A4
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司在签下付费共创客户前处于 pre-revenue 状态。'
- id: A5
  name: Y1 每月新增付费客户
  value: '[0, 0, 0, 0, 1, 0, 1, 0, 1, 0, 1, 0]'
  unit: count
  source: '[BP milestones sign 3-5 paid design partners and convert at least 2 pilots] 基准情形假设 Y1 下半年拿下 4 个付费试点。'
- id: A6
  name: Y2 每季度新增付费客户
  value: '[1, 1, 2, 2]'
  unit: count
  source: '[BP milestones 12-24 months] 假设通过试点转化叠加首位 GTM 支持岗位，跑出温和的创始人主导增长。'
- id: A7
  name: Y3 每季度新增付费客户
  value: '[3, 3, 4, 4]'
  unit: count
  source: '[BP market.som 60 customers at about $90k ACV] 基准情形在 Y3 末达到 24 个客户，刻意低于 SOM 路径，以便对创始人主导的基础设施销售保持保守。'
- id: A8
  name: 年度价格阶梯
  value: Y1 36.0；Y2 80.0；Y3 110.0
  unit: annual USDK per customer
  source: '[BP investorMemo.initialContract $20k-$40k paid pilot; BP gtm.pricing $60k-$120k annual ACV plus usage fees] 试点价格从区间中位附近起步，转生产后再靠用量费和治理增购抬到目标区间。'
- id: A9
  name: 收入确认规则
  value: 期间平均活跃客户数乘以年化合同价值
  unit: formula
  source: 创业财务经验法则：新企业客户平均会在期间中部激活，因此确认收入按 ((BoP + EoP) / 2) x 年化价格计算。
- id: A10
  name: 毛利率爬坡
  value: Y1 付费月份 50-60；Y2 各季度分别为 62、65、68、70；Y3 各季度分别为 71、72、72、72
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 72; BP risks on browser fallback; Research sensitivityCases browser fallback] 只有当路由和缓存压低昂贵的浏览器路径和供应商过度使用后，毛利率才会往上走。'
- id: A11
  name: 全成本薪资区间
  value: Founder 180；创始工程师 180；应用 ML/产品工程师 170；解决方案工程师 145；安全/平台工程师 170；GTM 负责人 170；客户成功 130；AE 155；平台工程师 160
  unit: annual USDK per FTE
  source: '[BP team roles] 再叠加面向美国 seed 阶段基础设施创业公司的创业财务经验法则，已包含薪资税和福利负担。'
- id: A12
  name: 招聘节奏
  value: Founder 和创始工程师在 M1 入职；应用 ML/产品工程师在 M2；解决方案工程师在 M6；安全/平台工程师在 M9；GTM 负责人在 M12；客户成功/解决方案架构师在 M15；AE 在 M18；平台工程师在 M27
  unit: timing
  source: '[BP team startTiming through Month 12] 再叠加创业财务经验法则：后续招聘要等试点证明和伙伴带来的商机管道更清楚后再开。'
- id: A13
  name: 薪资分摊规则
  value: Founder 70% 计入 S&M、30% 计入 G&A；应用 ML/产品工程师 80% 计入 R&D、20% 计入 S&M；解决方案工程师 50% 计入 S&M、30% 计入 R&D、20% 计入 G&A；安全/平台工程师 85% 计入 R&D、15% 计入 G&A；客户成功 65% 计入 S&M、20% 计入 R&D、15% 计入 G&A；工程团队全部计入 R&D；GTM 和 AE 全部计入 S&M
  unit: policy
  source: '[BP team rationales; BP gtm; BP operations] 反映的是创始人主导销售、实施占比较高的试点，以及早期偏产品的组织结构。'
- id: A14
  name: 非薪资运营费用爬坡
  value: S&M 每月 5-20；R&D 每月 10-22；G&A 每月 7-15
  unit: USDK per month
  source: '[BP operations; BP fundingAsk.useOfFundsSummary] 再叠加精简 pre-seed 计划下的创业财务经验法则，覆盖云支出、评测跑数、差旅、法务和合规工具。'
- id: A15
  name: 稳态月流失率
  value: '1.25'
  unit: percent
  source: 创业财务经验法则：只要 ROI 可观测，基础设施年约通常留存不错；但品类仍早、供应商打包风险仍在，所以模型中的流失率高于最优基础设施留存水平。
- id: A16
  name: 每客户混合 CAC
  value: '76.32'
  unit: USDK
  source: 按模型中的 Y2-Y3 销售与市场费用 $1.526M 除以 20 个新客户计算；与创始人主导、技术型企业销售的特征一致。
- id: A17
  name: 融资规模规则
  value: 打到下一轮可融资里程碑，并保留 6 个月缓冲
  unit: policy
  source: 根据开发者要求和 [BP fundingAsk runwayMonths 18]，基准情形把本轮融资规模定在能打到 Y3 中段验证点并留出 H2Y3 缓冲，而不只是把首批试点启动起来。
- id: A18
  name: 现金流简化规则
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: formula
  source: 创业财务经验法则：模型假设这是一门轻资产软件生意，capex、债务和营运资本扰动都可忽略。
