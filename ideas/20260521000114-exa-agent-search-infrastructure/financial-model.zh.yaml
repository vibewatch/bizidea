modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  QualifiedTeams[Qualified platform teams] --> PaidPilots[Paid pilots]\n  PaidPilots --> ProductionAccounts[Production accounts]\n  ProductionAccounts --> Revenue[Subscription and usage revenue]\n  Revenue --> GrossProfit[Gross profit after provider and browser costs]\n  GrossProfit --> Cash[Cash runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入来自这样一条路径：Y1 有 4 个付费账户，到 Q4Y3 增长到 24 个，同时混合 ACV 从 $36K 的试点定价抬升到 $110K 的生产合同。
- checkName: 必须跑通的环节
  finding: 在 GTM 团队扩张前，创始人主导的试点必须先转成生产合同，因为销售周期敏感性是影响收入和跑道的最大单一变量。
- checkName: 模型失效条件
  finding: 如果买家不愿支持每年 $60K-$120K 的控制平面预算，或者浏览器兜底把毛利率长期压在约 68% 以下，downside 情形就会把现金打成负数。
- checkName: 下一轮融资证明点
  finding: 下一轮最强的融资故事是：Q2Y3 前做到 16 个付费客户、72% 毛利率和 3 个活跃生态伙伴，证明增长不再只靠创始人亲自带单。
sanityChecks:
  ruleOf40: Y3 增长率 249% + EBITDA 利润率 -40% = 209%
  burnMultiple: burn multiple 从 Y2 的约 1.9x 改善到 Y3 的约 0.4x，因为年末 ARR 从 $0.8M 增长到 $2.64M，但 burn 并没有同步阶跃上升。
  revenuePerFte: 按 Q4Y3 的 9 名 FTE 计算，Y3 的人均收入为 $202K（SaaS 基准为 $200-400K）。
  flags:
  - 模型到 Y3 末仍然 EBITDA 为负，因此它假设公司会凭高效率增长的证明再融一轮，而不是靠自身现金流滚动。
  - 人均收入只摸到软件基准的低位，这意味着额外服务型工作或更快的支持团队扩张空间都不大。
  - 毛利率假设浏览器兜底始终是少数路径；如果它高于 business-plan 里的风险阈值，融资需求就必须上调。
