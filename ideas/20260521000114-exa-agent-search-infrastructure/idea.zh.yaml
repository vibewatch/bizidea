differentiator: Exa 已经证明，面向代理的搜索需求确实存在；但这家公司赢的方式，不是再做一个重索引的一体化产品，而是做供应商无关、策略优先的控制层。它的防守力来自跨客户工作流积累下来的查询路由数据、来源策略配置和可回放日志——尤其是“什么时候不该搜、什么时候该复用旧证据”这些决策。一旦买家更看重毛利、来源可追溯性和企业控制能力，而不是单纯的搜索端点，它就会变得很黏。
