problem: 一旦 AI 产品从试点走向生产，Web 检索就会变成隐藏的失效域：查询量暴涨、搜索账单失去可预测性，一条过时或低质量来源就可能把下游代理动作带偏。平台团队可以买搜索 API，但依旧缺一层控制逻辑，来决定什么时候用快速头部搜索、什么时候做深度长尾搜索、什么时候复用缓存证据、什么时候退到浏览器兜底。结果就是，团队上线的代理既缺乏来源可追溯性，也守不住时效性，还没法真正把成本和来源策略护栏落到系统里。
targetUser:
  primary: Series B-D 的原生 AI SaaS 公司里，负责研究、销售情报或合规代理的 ML 基础设施工程师和代理平台工程师；这些产品依赖实时 Web 检索。
  secondary: 对企业级回答质量和毛利率负责、且产品会引用外部 Web 来源的 AI copilot 产品负责人。
  buyer: 工程 VP 或 AI 平台负责人
startupThesis:
  nonObviousInsight: 下一层真正值钱的，不是再做一个搜索引擎，而是站在搜索引擎之上的控制平面：它来决定代理该不该搜、该买多深的检索、哪些来源能进系统、什么时候缓存证据已经足够。随着代理流量爆发，这些策略和路由决策，对客户的重要性会超过单纯拥有索引。
  beachhead: 20-150 名工程师规模的 Series B-D 原生 AI SaaS 厂商；它们的生产代理每天要为销售情报、市场研究或合规工作流发起 50 万次以上外部 Web 搜索。
  wedge: 做一个检索控制平面，给每条查询分类，再把它路由到快速搜索、深度搜索、缓存或浏览器兜底，并返回可回放的引用，同时把成本和时效策略一并执行。
  whyNowCatalyst: Exa 正在成为默认搜索基础设施，采用量已超过 40 万开发者，而且市场已经明确预期：代理的搜索量会比人类高出 1,000 倍。问题已经从“代理能不能搜索”切到“生产规模下怎么治理搜索”。
  ventureScalePath: 公司先从外部 Web 检索的路由与策略中间件切入，之后可以扩到检索评测、来源授权、基准数据、企业治理，以及所有依赖外部信息的代理工作流里的多供应商知识接入。
solution: 产品作为 API 代理和控制台，夹在代理框架与检索供应商之间。它会预测查询意图和业务价值，再选出一条既满足时效性和置信度目标、又最省钱的路径：缓存证据包、快速头部搜索、深度长尾搜索，或浏览器执行。每次结果都会被标准化成一张来源图谱，里面有来源元数据、时效校验和可回放日志，方便团队排查错误答案，也能回应企业客户对引用的要求。客户还可以配置白名单域名、地域限制、预算上限和工作流 SLA，并看到每次代理动作的成本和失效模式。
goToMarketSeed:
  firstCustomer: 第一批客户应是 50-200 人规模的原生 AI SaaS 公司中的平台工程负责人；他们已经在研究或销售情报产品里用了 Exa 或 SerpAPI，每月外部搜索支出超过 $25,000。
  buyingTrigger: 产品正式 GA 或一次大的企业级上线，会让搜索支出突然跳升，或者暴露出客户对过时、无引用、答案不一致的升级投诉。
  currentAlternative: 直接调用 Exa 或 SerpAPI，再叠加临时缓存、提示词启发式和内部看板。
  switchingReason: 这个切口能在不换模型、不重写整套代理的前提下，同时压低检索支出和回答失效率，还补上企业客户本来就在要的可审计性。
  pricingHypothesis: 平台订阅费叠加用量计费，按托管查询量、被路由的支出和保留的证据链收费。
