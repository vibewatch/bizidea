jobsToBeDone:
- job: 当我们的代理产品开始每分钟打出上千次外部查询时，帮平台团队把检索成本和可靠性控住，这样我们才能在不出现毛利惊吓和错误引用的前提下继续放大使用量。
  currentAlternative: 围绕单一搜索 API 自己手搓路由逻辑和看板
  successMetric: 单次成功代理任务的搜索成本下降 30% 以上
- job: 当企业客户质疑一条来自 Web 的答案时，帮团队把检索链路回放并审计清楚，这样既能为输出辩护，也能快速修掉失效点。
  currentAlternative: 人工翻查提示词、API 调用和应用遥测日志
  successMetric: 在 10 分钟内把错误答案追溯到对应查询、来源和路由决策
