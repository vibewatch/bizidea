topRisks:
- name: 供应商打包下沉
  description: 搜索供应商可能把自己的路由、缓存和可观测能力一起打包，压缩中间件层的空间。
  mitigation: 把重心放在多供应商治理、可回放能力和跨后端的来源策略控制上，而不是绑定某一家 API 的功能。
- name: 早期 ROI 不够硬
  description: 如果团队的查询量还没到一定规模，它们未必会觉得有必要单独买一层检索控制平面。
  mitigation: 只打已经每月花 $25,000 以上做搜索的客户，把试点卖成一个能快速兑现硬节省和引用可靠性的项目。
- name: 代理技术栈变化太快
  description: 框架频繁变动，会让深度嵌入式集成的维护成本很高。
  mitigation: 把集成点放在 API 代理和遥测层，这样模型、框架、搜索供应商换来换去，产品依旧有用。
