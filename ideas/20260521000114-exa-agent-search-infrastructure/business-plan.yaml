slug: agent-search-control-plane
date: '2026-05-21'
executiveSummary: >-
  This company should start as a provider-agnostic retrieval control plane for AI-native SaaS teams that already run production agents on live web data and feel search cost, answer-quality, and provenance pain at the same time. The first customer is a Series B-D AI-native SaaS company with 20-150 engineers, at least one retrieval-heavy research, sales-intel, or compliance workflow, and more than $25,000 per month of external search spend spread across Exa, Tavily, Google, or browser fallback. The initial product should sit as an API proxy and policy layer above those providers, deciding when to use fast search, deep search, cached evidence, or browser fallback while returning replayable citations and cost telemetry. The wedge is attractive because buyers already see retrieval as metered infrastructure spend, so a pilot can be sold around measurable savings per successful agent task and faster debugging of stale or uncited answers. Research supports a meaningful market with an estimated $0.9B TAM, $180.0M beachhead SAM, and $5.4M reachable year-three SOM if the company can land roughly 60 customers at about $90k blended ACV. The deliberate tradeoff is not to build another search engine, broad enterprise search suite, or autonomous browser stack; the company should first win one control point where multi-provider routing and governance are more valuable than raw index ownership. The biggest disconfirming risks are that providers bundle enough native governance to collapse the wedge, or that too few teams have enough routed-query spend to justify a standalone line item. The first 12 months should therefore focus on 3-5 paid design partners, proof of at least 25% retrieval-spend reduction on covered workflows, and evidence that browser fallback remains the exception rather than the margin-destroying default.
problem:
  - Retrieval-heavy agent products accumulate unpredictable search spend, stale or weak citations, and inconsistent failure handling once usage moves from pilot to production.
  - Platform teams can buy search APIs and browser runtimes, but they still lack a neutral control layer for routing, caching, provenance, budget caps, and source-policy enforcement across providers.
solution:
  - Provide an API proxy and dashboard that classifies each query and routes it to cached evidence, fast search, deep search, or constrained browser fallback based on freshness, confidence, and cost policy.
  - Normalize every retrieval step into replayable evidence traces with source metadata, policy logs, and per-task cost analytics so teams can debug bad answers and satisfy enterprise citation requirements.
whyWeWin:
  - The product is narrower than building another search engine and more neutral than any single provider stack, which makes the ROI case legible for buyers already juggling multiple retrieval vendors.
  - Defensibility compounds from routing-performance data, evidence-reuse patterns, and embedded source-policy configurations that improve with each covered workflow.
  - The first sale can be tied to a single painful workflow and a visible provider bill, which is faster to prove than a broader enterprise-search replacement motion.
strategicChoices:
  beachhead: Series B-D AI-native SaaS companies with 20-150 engineers, one or more production research, sales-intel, or compliance agents, and at least 500,000 external web searches per day across Exa, Tavily, Google, or similar providers.
  wedgeRationale: The narrow entry point is a retrieval-governance pilot for one live workflow where budget spikes and citation failures are already visible to the platform team; this creates faster proof than selling horizontal search governance to every enterprise app team at once.
  sequencingRationale: Start with a thin proxy, provider analytics, replayable citations, and policy controls for the existing search stack so deployment is low-friction and savings are measurable. Add deeper caching, evals, browser fallback orchestration, and partner-led distribution only after pilots show that customers trust the routing layer and will pay for it as infrastructure rather than custom services.
  notYet:
    - Building a proprietary web index or crawler network
    - Selling to low-volume teams that have not yet reached budget pain
    - Broad internal enterprise search across HR, support, and knowledge management
    - Full autonomous browser execution for sensitive workflows without approval gates
market:
  tam: "$0.9B estimated TAM based on roughly 15,000 global retrieval-heavy teams at about $60k annual control-plane spend per team."
  sam: "$180.0M estimated SAM based on about 3,000 Series B-D AI-native SaaS platform teams that fit the initial beachhead."
  som: "$5.4M modeled year-three SOM based on roughly 60 customers at about $90k blended annual contract value after pilots prove spend savings and citation reliability."
  segments:
    - "Primary segment: AI-native SaaS platform teams operating production research, sales-intel, or compliance agents on live web data"
    - "Secondary segment: enterprise internal AI platform teams standardizing retrieval governance across multiple external-information workflows"
  buyingProcess: >-
    The initial champion is usually the Head of AI Platform or senior platform engineering lead, while the economic buyer is typically a VP Engineering or platform GM who owns margin and answer quality. The first deal should begin as a paid pilot on one retrieval-heavy workflow, then convert to an annual platform contract after the buyer sees measured spend savings, replayable citation trails, and a manageable security review.
product:
  mvp: >-
    MVP is a provider-agnostic proxy for Exa, Tavily, Google grounding, and one browser-fallback partner with query classification, cost accounting, cache controls, approved-domain policies, and replayable evidence traces. It must show which path was taken for each task, why it was chosen, and whether freshness and citation policy were met.
  sixMonth: Ship production pilots with routing policies by query class, shared cache and evidence reuse, provider-level observability, and constrained browser fallback for the small subset of queries that cannot be resolved through search alone.
  twelveMonth: Add customer-specific eval harnesses, policy templates for regulated and customer-facing workflows, approval gates for risky fallback actions, and support for more provider mixes beyond the initial Exa-Tavily-Google stack.
  twentyFourMonth: Expand from one workflow wedge into a broader external-knowledge control plane with multi-team governance, benchmark data, enterprise retention controls, and adjacent products for retrieval evals and licensed-source orchestration.
  keyBets:
    - Most target buyers can realize meaningful savings through better routing and evidence reuse before demanding proprietary search quality improvements.
    - Browser fallback is necessary often enough to matter strategically, but not so often that it destroys gross margin in the first wedge.
    - Replayable evidence traces and domain policies are strong enough enterprise differentiators to beat hand-built orchestration.
    - A thin proxy integration is easier for early customers to adopt than a full agent-stack rewrite.
gtm:
  wedge: Sell a paid retrieval-governance pilot for one production workflow, then convert the pilot into an always-on control plane once the customer trusts the routing rules and sees lower cost per successful agent task.
  channels:
    - Founder-led outbound into teams already using Exa, Tavily, Google Agent Search, or browser-based fallbacks
    - Co-selling and integration partnerships with search providers, browser-runtime vendors, and AI observability platforms
    - Technical content and benchmark reports aimed at platform engineers building retrieval-heavy agents
  funnelTargets: lead→qualified pilot 15-25%, qualified pilot→paid pilot 40-50%, paid pilot→production 50%+, production→second workflow expansion 30%+ in year one
  pricing: >-
    Charge an annual platform subscription plus usage-based fees tied to managed query volume and retained evidence traces, because buyers already understand retrieval as metered infrastructure spend. Price the first paid pilot as a scoped savings and governance engagement, then convert to roughly $60k-$120k annual ACV for the first production workflow if the control plane reduces spend and improves citation replay speed.
businessModel:
  revenueStreams:
    - Annual subscription for the retrieval control plane
    - Usage-based overage on managed query volume, evidence retention, and advanced policy controls
    - Enterprise add-ons for private deployment, retention controls, audit packaging, and advanced evaluation modules
  unitOfValue: Covered production workflow with included routed-query volume and evidence retention
  targetGrossMarginPct: 72
  expansionLevers:
    - Add more retrieval-heavy workflows within the same customer after the first pilot converts
    - Expand provider coverage and policy depth across search, cache, and browser fallback paths
    - Sell higher-assurance governance, eval, and retention modules to larger enterprise deployments
strategyMap:
  northStarMetric: Percent of covered agent tasks that meet freshness and citation policy at or below target retrieval cost
  inputMetrics:
    - Paid pilot to production conversion rate
    - Retrieval spend reduction per successful agent task on covered workflows
    - Median time to replay the retrieval chain behind a bad answer
    - Cache-hit rate on repeated high-value queries
    - Share of routed queries requiring browser fallback
  moatsToBuild:
    - Historical routing graph showing which provider, depth, and fallback path works best by query class
    - Replayable evidence-trace corpus tied to customer outcomes and failure modes
    - Embedded domain, geography, and retention policies that become sticky inside customer workflows
  killCriteria:
    - Fewer than 3 paid design partners after 30 qualified platform-team conversations
    - Covered-workflow spend savings below 15% in the first 3 pilots
    - Paid pilot to production conversion below 40% after the first 5 pilots
    - Browser fallback required on more than 30% of covered queries without clear gross-margin offset
  mermaid: |
    flowchart LR
      Wedge[Retrieval-governance pilot] --> MVP[Provider-agnostic routing proxy]
      MVP --> Proof[Lower spend and replayable citations]
      Proof --> Expansion[More workflows and enterprise governance modules]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong wedge and market timing, but conviction depends on proving standalone budget thresholds and keeping browser-heavy workloads from eroding margins.
    whyBelieve: The plan targets a real production bottleneck where buyers already see metered retrieval costs and lack a neutral cross-provider governance layer.
    whyDoubt: Search providers, clouds, and browser vendors can all bundle adjacent controls, so the startup must prove that neutrality and workflow data create enough value before incumbents close the gap.
    nextDiligence: Confirm 3 paid pilots with customers already spending meaningfully on external retrieval and show at least 25% spend reduction plus sub-10-minute citation replay on one workflow.
  firstCustomer:
    title: Head of AI Platform at an AI-native SaaS company
    profile: A Series B-D software company with 50-200 employees, 20-150 engineers, and a production research, sales-intel, or compliance agent that already uses one or more external search providers.
    trigger: Product GA, enterprise rollout, or a customer escalation exposes rising retrieval bills and stale or weakly cited answers.
    buyer: VP Engineering or Head of AI Platform
    initialContract: "$20k-$40k paid pilot for one workflow and baseline measurement, converting to roughly $60k-$120k annual ACV once routing policies and evidence traces are trusted in production."
  mustBeTrue:
    - At least a meaningful subset of target buyers already spends enough on external retrieval to justify a standalone control-plane line item.
    - A thin proxy can cut covered-workflow retrieval spend by at least 25% without reducing answer acceptance or freshness.
    - Buyers care enough about replayable citations and policy controls to choose a neutral layer over deeper commitment to one provider.
    - Browser fallback remains a minority of routed queries in the first wedge so gross margin stays above software-infrastructure norms.
    - Provider and framework churn does not force so much integration work that the business becomes services-heavy.
  diligenceQuestions:
    - What monthly routed-query spend or failure rate actually unlocks budget for a dedicated control plane?
    - In the first ten real prospects, which KPI matters most: spend saved, citation replay speed, or lower bad-answer incidence?
    - How often do target teams need browser fallback after query routing and caching are improved?
    - Which provider combinations dominate the beachhead accounts and therefore determine MVP integration scope?
    - What native governance features are Exa, Tavily, Google, and gateway vendors already shipping into the same workflow?
operatingAssumptions:
  - assumption: The first repeatable buyer is the Head of AI Platform or VP Engineering, not an individual application team lead.
    basis: research.yaml
    validationTest: Close 10 buyer interviews and 3 paid pilots where the same function owns budget, deployment, and success metrics.
    decisionImpact: If false, GTM must shift toward workflow-specific application owners and the sale becomes more fragmented and lower ACV.
  - assumption: Customers already spending more than $25,000 per month on external search can support annual control-plane pricing in the $60k-$120k range.
    basis: idea.yaml
    validationTest: Collect provider bills or credible spend baselines from 5 target accounts and test written pilot proposals with conversion expectations in the target ACV range.
    decisionImpact: If false, the beachhead narrows further or pricing must move toward lower ACV self-serve infrastructure.
  - assumption: Browser fallback is required on fewer than 30% of covered queries after routing and caching policies are tuned.
    basis: research.yaml
    validationTest: Instrument production traces across 3-5 pilots and segment query outcomes by fast search, deep search, cache, and browser fallback.
    decisionImpact: If false, gross margin deteriorates and the roadmap must prioritize browser partnerships, premium pricing, or a different wedge.
  - assumption: Replayable evidence traces and policy controls are strong enough to clear security review without building a proprietary search index.
    basis: operator judgment
    validationTest: Run 5 security and procurement reviews and track whether retention controls, audit logs, and domain policies resolve the primary objections.
    decisionImpact: If false, product scope expands toward deeper infrastructure ownership and the funding need increases.
  - assumption: North America offers the fastest initial sales motion and EU-specific oversight packaging can wait until after early product-market proof.
    basis: research.yaml
    validationTest: Win the first 3 production customers in North America without losing more than 1 qualified deal primarily because of EU AI Act or retention requirements.
    decisionImpact: If false, compliance engineering moves ahead of expansion features and slows hiring for GTM.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: ICP and budget-threshold discovery
    hypothesis: Retrieval-heavy AI-native SaaS teams with visible provider bills and customer-facing citations will describe a funded platform problem rather than a nice-to-have optimization.
    successMetric: 15 discovery interviews completed, 8 matching the beachhead profile, and 5 sharing credible spend or failure baselines.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Concierge routing benchmark
    hypothesis: Manually tuned routing across cache, fast search, deep search, and browser fallback can reduce cost per successful task by at least 25% on one workflow.
    successMetric: 2 design partners benchmark at least 100 tasks each and both show 25%+ spend reduction without lower answer acceptance.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Thin-proxy pilot deployment
    hypothesis: Customers will deploy a provider-agnostic proxy faster than they would replace their retrieval stack outright.
    successMetric: 3 paid pilots launch with time to first routed production task under 30 days.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Pricing and packaging test
    hypothesis: Platform subscription plus managed-query overage pricing converts better than pure consumption pricing.
    successMetric: Preferred package wins in at least 4 of 6 budget-owner conversations and appears in 2 signed pilot scopes.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Evidence-trace procurement validation
    hypothesis: Audit logs, approved-domain policies, and retention controls are sufficient to unblock security review for customer-facing AI use cases.
    successMetric: At least 2 pilots complete security review without requiring customer-hosted deployment or custom one-off controls.
    owner: Security platform lead
  - horizon: 12–18 months
    experiment: Partner-sourced expansion motion
    hypothesis: Search-provider, browser-runtime, and observability partners can source qualified pilots with conversion comparable to founder-led outbound.
    successMetric: 25% of qualified pipeline comes from 3 active partners and pilot conversion is no worse than direct outbound.
    owner: GTM lead
operations:
  - Maintain least-privilege proxy deployment with configurable retention, domain allowlists, and customer-visible routing logs
  - Run weekly pilot reviews on spend saved, bad-answer incidents, and citation replay time for every design partner
  - Preserve provider-specific controls underneath a stable abstraction so API churn does not break customer workflows
  - Use browser-runtime partners for authenticated fallback instead of building a full browser stack in-house during the first 18 months
  - Track gross-margin exposure by query class so pricing and product scope stay aligned with real fallback behavior
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Founder-led sales is required because the buyer is senior, the category needs education, and early pricing depends on quantified ROI.
  - role: Founding eng
    startTiming: Month 0
    rationale: The company needs a strong technical lead to build the proxy, routing logic, telemetry, and early integrations.
  - role: Applied ML and product engineer
    startTiming: Month 2
    rationale: Query classification, cache strategy, and retrieval evaluation are core product risks and need dedicated ownership early.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Early enterprise pilots will hinge on fast integration, workflow mapping, and proving value from customer traces.
  - role: Security and platform engineer
    startTiming: Month 9
    rationale: Retention controls, policy logging, and deployment hardening become critical once pilots move into procurement.
  - role: GTM lead
    startTiming: Month 12
    rationale: Add repeatable pipeline ownership only after pilot packaging and conversion evidence are clear.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3-5 paid design partners in the AI-native SaaS beachhead
      - Show at least 25% retrieval-spend reduction on one covered workflow in the first 3 pilots
      - Launch a production-ready proxy with replayable evidence traces and approved-domain policies
      - Convert at least 2 paid pilots into annual production contracts
  - horizon: 12–24 months
    items:
      - Expand from the first workflow into at least 2 additional retrieval-heavy workflows per customer cohort
      - Add broader provider support, eval tooling, and higher-assurance governance modules
      - Establish 3 active ecosystem partners that source or accelerate pilots
      - Reach repeatable annual ACV in the modeled $60k-$120k range without services-heavy deployment
  - horizon: 24–36 months
    items:
      - Standardize as the external-knowledge control plane for multi-team agent deployments
      - Launch enterprise retention and regional-policy packaging for broader international sales
      - Build a routing and evidence dataset large enough to support benchmark products and expansion modules
      - Reach the modeled year-three SOM path of roughly $5.4M in annualized revenue
risks:
  - risk: Providers bundle routing, caching, or governance features fast enough to compress the standalone wedge.
    likelihood: High
    impact: High
    mitigation: Differentiate on multi-provider neutrality, workflow-specific policy controls, and evidence reuse across several backends rather than features tied to one provider.
  - risk: Too few target teams have enough routed-query spend to support a new infrastructure vendor.
    likelihood: Medium
    impact: High
    mitigation: Focus on accounts already spending materially on retrieval, require a measurable spend baseline before pilots, and avoid low-volume segments.
  - risk: Browser fallback becomes more common than expected and damages gross margin and deployment simplicity.
    likelihood: Medium
    impact: High
    mitigation: Partner for browser execution, meter fallback separately, and prioritize better routing and caching before expanding browser-heavy workflows.
  - risk: Security and compliance reviews slow deals because logs, artifacts, and fallback paths feel risky.
    likelihood: Medium
    impact: Medium
    mitigation: Ship retention controls, domain restrictions, approval gates, and auditable routing logs in the MVP rather than as later enterprise features.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund the founding product team, the first 3-5 paid pilots, core integrations across major retrieval providers, and the security and solutions capacity needed to turn pilots into repeatable production deployments.
