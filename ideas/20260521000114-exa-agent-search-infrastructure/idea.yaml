jobsToBeDone:
  - job: >-
      When our agent product starts generating thousands of external queries per
      minute, help our platform team control retrieval cost and reliability so
      they can scale usage without margin surprises or bad citations.
    currentAlternative: Hand-built routing logic and dashboarding around one search API
    successMetric: 30%+ reduction in search cost per successful agent task
  - job: >-
      When an enterprise customer questions an answer sourced from the web, help
      our team replay and audit the retrieval chain so they can defend the
      output and fix failures quickly.
    currentAlternative: Manual log inspection across prompts, API calls, and app telemetry
    successMetric: Under 10 minutes to trace a bad answer to query, source, and routing decision
