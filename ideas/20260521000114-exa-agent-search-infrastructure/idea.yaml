differentiator: >-
  Exa proves agent-native search demand exists, but this company wins by being
  provider-agnostic and policy-first rather than another monolithic index. Its
  defensibility comes from the query-routing data, source-policy configs, and
  replay logs it accumulates across customer workflows — especially the decision
  of when not to search and when to reuse prior evidence. That makes it sticky
  with buyers who care about margin, provenance, and enterprise controls more
  than raw search endpoints.
