problem: >-
  Once AI products move from pilot to production, web retrieval becomes a hidden
  failure domain: query volume spikes, search bills become unpredictable, and
  one stale or low-quality source can poison downstream agent actions. Platform
  teams can buy a search API, but they still lack a control layer that decides
  when to use fast head search, deep long-tail search, cached evidence, or a
  browser fallback. As a result, teams ship agents with weak provenance,
  inconsistent freshness, and no way to enforce cost or source-policy guardrails.
targetUser:
  primary: >-
    ML infrastructure and agent-platform engineers at Series B-D AI-native SaaS
    companies shipping research, sales-intel, or compliance agents that depend
    on live web retrieval
  secondary: >-
    Product leaders responsible for enterprise-grade answer quality and gross
    margin in AI copilots that cite external web sources
  buyer: VP Engineering or Head of AI Platform
startupThesis:
  nonObviousInsight: >-
    The next valuable layer is not another search engine; it is the control
    plane above search engines that decides when an agent should search, which
    retrieval depth to buy, which sources are admissible, and when cached
    evidence is good enough. As agent traffic explodes, those policy and routing
    decisions matter more to customers than raw index ownership alone.
  beachhead: >-
    Series B-D AI-native SaaS vendors with 20-150 engineers whose production
    agents perform 500,000+ external web searches per day for sales-intel,
    market-research, or compliance workflows
  wedge: >-
    A retrieval control plane that classifies each query, routes it across fast
    search, deep search, cache, or browser fallback, and returns replayable
    citations with cost and freshness policies enforced.
  whyNowCatalyst: >-
    Exa's rise to default search infrastructure, its 400,000+ developer
    adoption, and the explicit expectation that agents will search 1,000x more
    than humans have shifted the problem from "can agents search?" to "how do
    we govern search at production scale?"
  ventureScalePath: >-
    Starting as routing and policy middleware for external-web retrieval, the
    company can expand into retrieval evals, source licensing, benchmark data,
    enterprise governance, and multi-provider knowledge access across every
    agent workflow that touches external information.
solution: >-
  The product sits between agent frameworks and retrieval providers as an API
  proxy plus dashboard. It predicts query intent and business value, then
  chooses the cheapest path that still meets freshness and confidence targets:
  cached evidence packet, fast head search, deep long-tail search, or browser
  execution. Every result is normalized into a provenance graph with source
  metadata, recency checks, and replay logs so teams can debug bad answers and
  satisfy enterprise buyers asking for citations. Customers also get policy
  controls for approved domains, geo restrictions, budget caps, and workflow
  SLAs, plus observability on cost per agent action and failure mode.
goToMarketSeed:
  firstCustomer: >-
    Head of platform engineering at a 50-200 person AI-native SaaS company that
    already uses Exa or SerpAPI inside a research or sales-intel product and is
    spending more than $25,000 per month on external search
  buyingTrigger: >-
    A product GA launch or major enterprise rollout causes search spend to jump
    or surfaces a customer escalation about stale, uncited, or inconsistent
    answers
  currentAlternative: >-
    Direct calls to Exa or SerpAPI plus ad hoc caching, prompt heuristics, and
    internal dashboards
  switchingReason: >-
    The wedge reduces retrieval spend and answer failures without forcing a
    model swap or full agent rewrite, while adding auditability enterprise
    customers already ask for.
  pricingHypothesis: >-
    Platform subscription plus usage-based pricing tied to managed query volume,
    routed spend, and retained evidence traces
