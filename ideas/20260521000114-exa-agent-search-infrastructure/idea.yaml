topRisks:
  - name: Provider bundling
    description: Search providers could add their own routing, caching, and observability features and squeeze the middleware layer.
    mitigation: Focus on multi-provider governance, replayability, and source-policy controls that customers need across several backends, not just one API.
  - name: Weak early ROI
    description: Teams below meaningful query volume may not feel enough pain to buy a dedicated retrieval control plane.
    mitigation: Target customers already spending $25,000+ per month on search and sell a rapid pilot around hard dollar savings and citation reliability.
  - name: Fast-moving agent stacks
    description: Framework churn could make deeply embedded integrations expensive to maintain.
    mitigation: Integrate at the API proxy and telemetry layer so the product remains useful across changing models, frameworks, and search vendors.
