slug: agent-search-control-plane
date: '2026-05-21'
executiveSummary: 这家公司应该先做成一个供应商无关的检索控制平面，服务那些已经在真实 Web 数据上跑生产级代理、同时被搜索成本、回答质量和来源可追溯性卡住的原生 AI SaaS 团队。第一批客户应是 Series B-D 的原生 AI SaaS 公司：20-150 名工程师，至少有一个重检索的研究、销售情报或合规工作流，并且每月在 Exa、Tavily、Google 或浏览器兜底上合计花掉超过 $25,000 的外部搜索费用。首版产品应以 API 代理和策略层的形态压在这些供应商之上，决定什么时候走快速搜索、深度搜索、缓存证据或浏览器兜底，并把可回放引用和成本遥测一并返回。这个切口成立，是因为买家已经把检索看成按量计费的基础设施开支，所以试点可以围绕“每次成功代理任务能省多少钱”和“多快能排查过时或无引用答案”来卖。研究支撑了一个足够大的市场：估算 TAM 为 $0.9B、滩头 SAM 为 $180.0M；如果公司能拿下约 60 个客户、混合 ACV 约 $90k，第 3 年可触达的 SOM 大约是 $5.4M。刻意不做的，是再造一个搜索引擎、做一套泛企业搜索平台，或上来就做完整的自治浏览器栈。公司应先拿下一处控制点，让多供应商路由和治理的价值先超过“自己拥有索引”这件事。最主要的反证风险有两个：一是供应商把原生治理能力打包到足以压平这个切口，二是有足够路由查询支出的团队其实没那么多，不足以支撑一个独立预算科目。所以前 12 个月要盯住 3-5 家付费共创客户，证明覆盖工作流的检索支出至少能下降 25%，同时证明浏览器兜底只是少数例外，而不是吞掉毛利的默认路径。
problem:
- 重检索代理产品一旦从试点走向生产，就会同时积累失控的搜索支出、过时或薄弱的引用，以及不一致的失效处理。
- 平台团队可以买搜索 API 和浏览器运行时，但它们依旧缺一层中立控制层，来跨供应商做路由、缓存、来源追溯、预算上限和来源策略执行。
solution:
- 提供一个 API 代理和看板，给每条查询分类，再按时效性、置信度和成本策略，把它路由到缓存证据、快速搜索、深度搜索或受限的浏览器兜底。
- 把每一步检索都标准化成可回放的证据链，附带来源元数据、策略日志和单任务成本分析，方便团队排查错误答案，也能满足企业对引用的要求。
whyWeWin:
- 这个产品比“再做一个搜索引擎”更聚焦，也比任何单一供应商栈都更中立，所以对已经同时管理多个检索供应商的买家来说，ROI 更容易讲清楚。
- 防守力会随着每个被覆盖工作流的路由表现数据、证据复用模式和嵌入式来源策略配置不断累积。
- 第一单可以绑在一个已经很痛的工作流和一张看得见的供应商账单上，比去推整套企业搜索替换要更快证明。
strategicChoices:
  beachhead: 滩头市场是 Series B-D 的原生 AI SaaS 公司：20-150 名工程师，至少有一个生产级研究、销售情报或合规代理，并且每天通过 Exa、Tavily、Google 或类似供应商发起至少 50 万次外部 Web 搜索。
  wedgeRationale: 窄切口应该是一条在线工作流的检索治理试点：平台团队已经能看到预算飙升和引用失效。先在这里证明，远比一上来对所有企业应用团队卖横向搜索治理要快。
  sequencingRationale: 先用一层轻代理、供应商分析、可回放引用和策略控制去包住现有搜索栈，让部署摩擦低、节省效果可量化。等试点证明客户信任这套路由层，也愿意把它当基础设施而不是定制服务来付费，再加更深的缓存、评测、浏览器兜底编排和伙伴驱动分发。
  notYet:
  - 自建专有 Web 索引或抓取网络
  - 卖给还没到预算痛点的低查询量团队
  - 面向 HR、客服和知识管理的广义企业内部搜索
  - 在没有审批闸门的情况下，为敏感工作流提供全自治浏览器执行
market:
  tam: 估算 TAM 为 $0.9B：大约 15,000 个全球重检索团队，每个团队每年约有 $60k 的控制平面支出。
  sam: 估算 SAM 为 $180.0M：约 3,000 个符合初始滩头画像的 Series B-D 原生 AI SaaS 平台团队。
  som: 按第 3 年测算，SOM 约为 $5.4M：在试点证明节省支出和引用可靠性后，拿下约 60 个客户、混合年合同价值约 $90k。
  segments:
  - 核心客群：在实时 Web 数据上运行生产级研究、销售情报或合规代理的原生 AI SaaS 平台团队
  - 次级客群：希望把多条外部信息工作流的检索治理标准化的企业内部 AI 平台团队
  buyingProcess: 最初的牵头人往往是 AI 平台负责人或高级平台工程负责人；真正拍板的通常是对毛利率和回答质量负责的工程 VP 或平台 GM。第一单应从单个重检索工作流的付费试点开始，等买家看见可量化的支出节省、可回放的引用链和可控的安全评审后，再转成年度平台合同。
product:
  mvp: MVP 应该是一层供应商无关的代理，先接 Exa、Tavily、Google 搜索 grounding 和一家浏览器兜底伙伴；能力包括查询分类、成本记账、缓存控制、白名单域名策略和可回放证据链。它必须能说明每个任务走了哪条路径、为什么这么选，以及是否满足了时效性和引用策略。
  sixMonth: 6 个月内要把生产试点跑起来：按查询类型设置路由策略，支持共享缓存和证据复用，补齐供应商级可观测性，并对少量单靠搜索无法解决的查询提供受限浏览器兜底。
  twelveMonth: 12 个月内补上客户定制评测框架、适用于受监管和面向客户工作流的策略模板、风险兜底动作的审批闸门，以及超出初始 Exa-Tavily-Google 组合的更多供应商支持。
  twentyFourMonth: 24 个月内，从单一工作流切口扩成更广义的外部知识控制平面：支持多团队治理、基准数据、企业级保留控制，以及检索评测和授权来源编排等相邻产品。
  keyBets:
  - 大多数目标买家在要求专有搜索质量提升前，先能从更好的路由和证据复用里拿到可观节省。
  - 浏览器兜底出现得足够频繁，战略上值得做；但又不会频繁到把首个切口的毛利率打穿。
  - 可回放证据链和域名策略，对企业来说足够有辨识度，能赢过自己手搓的编排。
  - 轻代理式集成比重写整套代理栈更容易被早期客户接受。
gtm:
  wedge: 先卖一个面向单条生产工作流的付费检索治理试点；等客户信任路由规则并看到单次成功代理任务的成本下降后，再把试点转成常开的控制平面。
  channels:
  - 创始人主导外呼，直接找已经在用 Exa、Tavily、Google Agent Search 或浏览器兜底的团队
  - 与搜索供应商、浏览器运行时厂商和 AI 可观测性平台联合销售或做集成合作
  - 面向在构建重检索代理的平台工程师输出技术内容和基准报告
  funnelTargets: 线索→合格试点 15-25%；合格试点→付费试点 40-50%；付费试点→生产合同 50%+；生产合同→第 2 条工作流扩展在第 1 年达到 30%+。
  pricing: 应收年度平台订阅费，再叠加按托管查询量和保留证据链计费的用量费，因为买家已经习惯把检索看成按量计费的基础设施支出。第一批付费试点可以卖成一个范围明确的节省与治理项目；如果控制平面确实降低了支出、提升了引用回放效率，再转成单个生产工作流约 $60k-$120k 的年 ACV。
businessModel:
  revenueStreams:
  - 检索控制平面的年度订阅费
  - 按托管查询量、证据保留和高级策略控制收取的超额用量费
  - 私有化部署、保留控制、审计打包和高级评测模块等企业增值项
  unitOfValue: 被覆盖的生产工作流，内含一定路由查询量和证据保留额度
  targetGrossMarginPct: 72
  expansionLevers:
  - 首个试点转生产后，在同一客户内再覆盖更多重检索工作流
  - 把供应商覆盖面和策略深度扩展到搜索、缓存和浏览器兜底路径
  - 向更大的企业部署销售更高保障等级的治理、评测和保留模块
strategyMap:
  northStarMetric: 在目标检索成本之下，同时满足时效性和引用策略的被覆盖代理任务占比
  inputMetrics:
  - 付费试点转生产的转化率
  - 覆盖工作流上每次成功代理任务节省的检索支出
  - 回放一条错误答案背后检索链路的中位耗时
  - 重复高价值查询的缓存命中率
  - 需要浏览器兜底的路由查询占比
  moatsToBuild:
  - 按查询类别沉淀历史路由图谱，知道哪家供应商、哪种深度、哪条兜底路径效果最好
  - 与客户结果和失效模式绑定的可回放证据链语料库
  - 嵌入客户工作流后会变得很黏的域名、地域和保留策略
  killCriteria:
  - 与 30 个合格平台团队沟通后，付费共创客户仍少于 3 家
  - 前 3 个试点里，覆盖工作流的支出节省低于 15%
  - 前 5 个试点后，付费试点转生产的转化率低于 40%
  - 超过 30% 的覆盖查询都必须走浏览器兜底，且没有清晰的毛利补偿
  mermaid: "flowchart LR\n  Wedge[Retrieval-governance pilot] --> MVP[Provider-agnostic routing proxy]\n  MVP --> Proof[Lower spend and replayable citations]\n  Proof --> Expansion[More workflows and enterprise governance modules]\n"
investorMemo:
  verdict:
    call: 见面 / 继续尽调
    conviction: 切口和时点都很强，但最终判断取决于两件事：能否证明独立预算阈值真实存在，以及能否让重浏览器工作负载不把毛利率拖垮。
    whyBelieve: 计划瞄准的是一个真实的生产瓶颈：买家已经看得到按量计费的检索成本，却没有一层跨供应商、且中立的治理层。
    whyDoubt: 搜索供应商、云厂商和浏览器厂商都可能把相邻控制能力一起打包，所以创业公司必须先证明：中立性和工作流数据，确实能在现有厂商补齐缺口前创造足够价值。
    nextDiligence: 确认 3 个付费试点，客户本来就在外部检索上有真实支出；同时证明某一条工作流能把支出压低至少 25%，且引用回放时间低于 10 分钟。
  firstCustomer:
    title: 原生 AI SaaS 公司的 AI 平台负责人
    profile: 一家 Series B-D 软件公司，员工 50-200 人、工程师 20-150 人，已有一条生产级研究、销售情报或合规代理，并且已经在用一家或多家外部搜索供应商。
    trigger: 产品正式 GA、企业级上线，或一次客户升级投诉，会把检索账单和过时/弱引用答案的问题直接暴露出来。
    buyer: 工程 VP 或 AI 平台负责人
    initialContract: 首份合同可做成单条工作流的 $20k-$40k 付费试点和基线测量；等路由策略和证据链在生产里跑通并建立信任，再转成约 $60k-$120k 的年 ACV。
  mustBeTrue:
  - 目标买家里，至少有相当一部分已经在外部检索上花到足以支撑一个独立控制平面预算科目。
  - 轻代理层能在不牺牲回答接受率和时效性的前提下，把覆盖工作流的检索支出至少压低 25%。
  - 买家足够看重可回放引用和策略控制，愿意选择一层中立平台，而不是继续深度绑定单一供应商。
  - 首个切口里，浏览器兜底只占少数路由查询，因此毛利率还能维持在软件基础设施应有的区间。
  - 供应商和框架的变化，不会逼出过多集成工作，导致业务最后变成服务外包。
  diligenceQuestions:
  - 每月多少路由查询支出或多高的失败率，才足以让客户给一层专用控制平面批预算？
  - 在前十个真实线索里，哪个 KPI 最能打动买家：节省支出、引用回放速度，还是错误答案更少？
  - 在优化查询路由和缓存后，目标团队到底还有多高比例必须走浏览器兜底？
  - 滩头客户最常见的是哪几种供应商组合，因此 MVP 应先集成哪些栈？
  - Exa、Tavily、Google 和各类 gateway 厂商，已经在同一工作流里下放了哪些原生治理功能？
operatingAssumptions:
- assumption: 第一个可重复成交的买家会是 AI 平台负责人或工程 VP，而不是单个应用团队负责人。
  basis: research.yaml
  validationTest: 完成 10 次买家访谈和 3 个付费试点，验证是否由同一职能同时掌握预算、部署和成功指标。
  decisionImpact: 如果不成立，GTM 就得转向具体工作流的应用负责人，销售会更碎、ACV 也会更低。
- assumption: 每月在外部搜索上花费超过 $25,000 的客户，能接受年费 $60k-$120k 的控制平面定价。
  basis: idea.yaml
  validationTest: 从 5 个目标账户收集供应商账单或可信的支出基线，并测试位于目标 ACV 区间的书面试点方案。
  decisionImpact: 如果不成立，滩头市场还得继续收窄，或者定价必须下探成更低 ACV 的自助式基础设施。
- assumption: 在调优路由和缓存策略后，浏览器兜底在覆盖查询中的占比会低于 30%。
  basis: research.yaml
  validationTest: 在 3-5 个试点里埋点生产轨迹，按快速搜索、深度搜索、缓存和浏览器兜底来切分查询结果。
  decisionImpact: 如果不成立，毛利率会恶化，路线图就必须优先做浏览器伙伴、溢价定价，或者换切口。
- assumption: 只靠可回放证据链和策略控制，不自建搜索索引，也足以通过安全评审。
  basis: 主观判断
  validationTest: 跑 5 次安全和采购评审，观察数据保留控制、审计日志和域名策略能否化解主要异议。
  decisionImpact: 如果不成立，产品范围就得往更深的基础设施所有权扩，融资需求也会抬高。
- assumption: 北美会是最快的初始销售区域，EU 专属的监管打包可以等到早期产品市场验证后再做。
  basis: research.yaml
  validationTest: 先在北美拿下前 3 个生产客户，并确保不会因为 EU AI Act 或保留要求而主要丢掉超过 1 个合格交易。
  decisionImpact: 如果不成立，合规工程就要先于扩张功能排期，也会拖慢 GTM 招聘。
experimentRoadmap:
- horizon: 0–90 天
  experiment: ICP 与预算阈值发现
  hypothesis: 那些账单可见、且回答面向客户的原生 AI SaaS 重检索团队，会把这个问题描述成一个有预算的平台痛点，而不是“有更好，没有也行”的优化项。
  successMetric: 完成 15 次探索访谈，其中 8 家符合滩头画像，5 家愿意分享可信的支出或失败基线。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 礼宾式路由对比测试
  hypothesis: 在缓存、快速搜索、深度搜索和浏览器兜底之间手动调路由，至少能把某条工作流的单次成功任务成本压低 25%。
  successMetric: 2 家共创客户各完成至少 100 个任务的对比测试，且两家都在不降低回答接受率的前提下实现 25% 以上支出下降。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 轻代理试点部署
  hypothesis: 相比彻底替换检索栈，客户会更快接受一层供应商无关的轻代理。
  successMetric: 上线 3 个付费试点，且从部署到第一条生产级路由任务的时间低于 30 天。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 定价与打包测试
  hypothesis: 平台订阅费加托管查询超额收费，会比纯消耗式定价更容易成交。
  successMetric: 在 6 次预算负责人沟通里，首选方案至少赢下 4 次，并进入 2 份已签试点 scope。
  owner: 创始人/CEO
- horizon: 6–12 个月
  experiment: 证据链采购验证
  hypothesis: 审计日志、白名单域名策略和保留控制，足以帮面向客户的 AI 场景过安全评审。
  successMetric: 至少 2 个试点完成安全评审，且不要求客户自托管或额外开发一次性控制项。
  owner: 安全与平台负责人
- horizon: 12–18 个月
  experiment: 伙伴驱动扩张验证
  hypothesis: 搜索供应商、浏览器运行时和可观测性伙伴，能带来与创始人外呼相当的高质量试点。
  successMetric: 25% 的合格商机管道来自 3 个活跃伙伴，且试点转化率不低于直销。
  owner: GTM 负责人
operations:
- 保持最小权限的代理部署，支持可配置的数据保留、域名白名单和客户可见的路由日志。
- 对每一家共创客户，每周复盘节省的支出、错误答案事件和引用回放时间。
- 在稳定抽象层之下保留供应商特有控制项，避免 API 变动直接打断客户工作流。
- 前 18 个月借助浏览器运行时伙伴做需要认证的兜底，而不是自建完整浏览器栈。
- 按查询类型跟踪毛利暴露，确保定价和产品边界始终贴着真实的兜底行为走。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 早期必须由创始人亲自打单，因为买家职级高、品类需要教育，而且早期定价取决于能否量化 ROI。
- role: 创始工程师
  startTiming: Month 0
  rationale: 公司需要一个足够强的技术负责人，来把代理层、路由逻辑、遥测和早期集成先搭起来。
- role: 应用 ML 与产品工程师
  startTiming: Month 2
  rationale: 查询分类、缓存策略和检索评测是核心产品风险，必须尽早有人专门负责。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 早期企业试点成败，取决于能否快速接入、梳理工作流，并从客户轨迹里证明价值。
- role: 安全与平台工程师
  startTiming: Month 9
  rationale: 一旦试点进入采购，保留控制、策略日志和部署加固都会变成关键。
- role: GTM 负责人
  startTiming: Month 12
  rationale: 只有在试点打包方案和转化证据清楚后，才值得引入可重复的商机管道负责人。
milestones:
- horizon: 0–12 个月
  items:
  - 在原生 AI SaaS 滩头市场签下 3-5 家付费共创客户
  - 在前 3 个试点里，至少一条覆盖工作流实现 25% 的检索支出下降
  - 上线具备可回放证据链和白名单域名策略的生产可用代理层
  - 至少把 2 个付费试点转成年度生产合同
- horizon: 12–24 个月
  items:
  - 从首条工作流扩到每个客户群至少另外 2 条重检索工作流
  - 补齐更广的供应商支持、评测工具和更高保障等级的治理模块
  - 建立 3 个能带来或加速试点的活跃生态伙伴
  - 在不把部署做成重服务的前提下，把可重复 ACV 跑进模型中的 $60k-$120k 区间
- horizon: 24–36 个月
  items:
  - 把自己标准化成多团队代理部署里的外部知识控制平面
  - 推出企业级保留和区域策略打包，支撑更广的国际销售
  - 把路由与证据数据集做大到足以支撑基准产品和扩展模块
  - 沿着模型路径，把年化收入推进到约 $5.4M 的第 3 年 SOM
risks:
- risk: 供应商把路由、缓存或治理能力快速打包，压缩独立切口。
  likelihood: High
  impact: High
  mitigation: 把差异化放在多供应商中立、工作流级策略控制，以及跨后端的证据复用上，而不是绑定单一供应商的功能。
- risk: 真正有足够路由查询支出、能接受新增基础设施供应商的目标团队太少。
  likelihood: Medium
  impact: High
  mitigation: 只聚焦已经在检索上有显著支出的账户；试点前先拿到可量化支出基线，避免低查询量客群。
- risk: 浏览器兜底的使用频率高于预期，拖累毛利率，也让部署更复杂。
  likelihood: Medium
  impact: High
  mitigation: 浏览器执行优先走合作伙伴，单独计费兜底路径，并在扩展浏览器重场景前先把路由和缓存做到位。
- risk: 日志、产物和兜底路径让客户觉得风险高，导致安全与合规评审拖慢成交。
  likelihood: Medium
  impact: Medium
  mitigation: 在 MVP 里就把保留控制、域名限制、审批闸门和可审计路由日志做进去，而不是拖到后面的企业版。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道应覆盖创始产品团队、前 3-5 个付费试点、主流检索供应商的核心集成，以及把试点转成可重复生产部署所需的安全与解决方案能力。
