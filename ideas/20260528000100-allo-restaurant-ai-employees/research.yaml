    threatOfEntrants:
      score: 3
      rationale: >-
        AI building blocks are getting cheaper, but reliable multi-system integrations,
        workflow safety, and auditability still create execution barriers.
      sourceRefs: [11, 14, 15, 36, 37]
    threatOfSubstitutes:
      score: 5
      rationale: >-
        Manual coordination, incumbent POS modules, reservation systems, and delivery
        middleware already cover parts of the workflow, so substitutes are abundant.
      sourceRefs: [8, 13, 16, 18, 19]
    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is already meaningful because allO, Deliverect, Oracle, Lightspeed,
        and reservation platforms each attack adjacent parts of the same workflow surface.
      sourceRefs: [1, 10, 13, 16, 18]
  pestle:
    - factor: economic
      impact: positive
      point: >-
        Labor shortages and service-sector staffing pressure make automation ROI easier
        to justify than a few years ago.
      sourceRefs: [25, 26, 27]
    - factor: social
      impact: positive
      point: >-
        Guests increasingly expect fast digital ordering, direct web ordering, and
        always-available booking or call responses.
      sourceRefs: [15, 19, 21]
    - factor: technological
      impact: positive
      point: >-
        Open integrations, cloud POS, and voice-AI reservation links make action-oriented
        orchestration newly feasible.
      sourceRefs: [11, 14, 15, 37, 38]
    - factor: legal
      impact: negative
      point: >-
        Data, payment, food-information, and accessibility rules raise the product
        bar for any system that automates guest-facing workflows.
      sourceRefs: [28, 29, 30, 31, 34, 35]
    - factor: environmental
      impact: positive
      point: >-
        Waste-reduction pressure rewards software that improves forecasting,
        stock visibility, and food-use discipline.
      sourceRefs: [32, 33]
  adoptionFrictionMatrix:
    - friction: Integration mapping across legacy POS, delivery, and reservation tools
      severity: high
      affectedBuyer: head of operations or implementation lead
      mitigation: Start with a narrow supported stack and prove value on one recurring change workflow before expanding.
      sourceRefs: [11, 14, 16, 20]
    - friction: Trust in autonomous menu or availability changes
      severity: high
      affectedBuyer: founder-operator
      mitigation: Keep approvals, rollback, and audit trails in the loop until accuracy is proven.
      sourceRefs: [1, 3, 21]
    - friction: Staff and guest acceptance of AI phone handling
      severity: medium
      affectedBuyer: front-of-house manager
      mitigation: Start with after-hours and overflow calls, then expand to full reservation handling once quality is proven.
      sourceRefs: [7, 37, 38, 39]
    - friction: Supplier workflows are often semi-manual
      severity: medium
      affectedBuyer: procurement or back-office coordinator
      mitigation: Begin with reorder suggestions and exception alerts before pushing autonomous supplier orders.
      sourceRefs: [5, 9, 32]
market:
  tam:
    value: "$0.8B"
    rationale: >-
      Germany and Austria together show 199,796 food and beverage service enterprises
      in 2020; applying an assumed €300 per location per month for workflow software
      yields about €719 million annual revenue potential, or roughly $0.8 billion.
    isEstimate: true
    sourceRefs: [23, 24]
  sam:
    value: "$14.7M"
    rationale: >-
      Beachhead SAM assumes 6% of German and Austrian food-service employment sits in
      8-40 location groups that fit the target workflow profile; dividing 94,704
      implied target employees by an assumed 25 employees per location and applying
      €300 monthly ARR gives about €13.6 million, or roughly $14.7 million.
    isEstimate: true
    sourceRefs: [40, 41]
  som:
    value: "$1.8M"
    rationale: >-
      A realistic year-3 SOM is about 420 live locations at the same €300 monthly ARR,
      roughly 3% of modeled SAM locations, supported by the existence of 1,000-plus
      active allO locations and referenceable multi-location operators in the segment.
    isEstimate: true
    sourceRefs: [1, 8, 9, 40, 41]
