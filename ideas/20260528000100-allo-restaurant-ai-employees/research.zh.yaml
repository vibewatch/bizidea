categoryDynamics:
  growthRate: 19.4% CAGR
  growthRateSourceRefs: [36]
  tailwinds:
    - point: >-
        数字点单、工作流自动化和统一运营控制的需求，正在把餐饮软件预算往前拉。
      sourceRefs: [15, 36]
    - point: >-
        用工短缺和漏接电话导致的收入漏损，让自动化在餐厅最忙的时候反而更迫切。
      sourceRefs: [25, 26, 27, 39]
    - point: >-
        配送和订单枢纽基础设施已经被广泛采用，因此再往上一层做编排，行为迁移并不算大。
      sourceRefs: [10, 11, 20]
  headwinds:
    - point: >-
        集成重连和迁移风险会拖慢部署，尤其是那些叠了很多 legacy 栈的集团。
      sourceRefs: [13, 14, 16, 20]
    - point: >-
        语音、支付、过敏原和无障碍义务，会同时抬高合规和产品 QA 门槛。
      sourceRefs: [28, 29, 30, 31, 34, 35]
competitors:
  - name: allO
    stage: 成长期
    wedge: 面向服务不足的本地餐饮集团，把 POS、预订、配送、支付和后台拉在一起的 AI 原生餐厅操作系统。
    pricing: 当前以订阅加支付处理费收费，未来计划加入按使用量计费的 AI 收入。
    strength: 本地市场聚焦、多语言切口，以及覆盖 1,000 多家活跃门店的宽运营数据图谱。
    weaknessVsUs: 更偏全栈、也更以 POS 为中心，因此在中端滩头市场里，对菜单变更 ROI、供应商编排和带审批保护的自动化未必能保持聚焦。
    sourceRefs: [1, 3, 4, 5, 6]
  - name: Deliverect
    stage: 成长期
    wedge: 连接 POS、外卖 App 和自有渠道的在线订单与菜单枢纽。
    pricing: 定制化企业报价。
    strength: 装机量大、集成生态广，而且在平台订单流上有很强的可信度。
    weaknessVsUs: 它最强的是订单接入和菜单分发，不是电话溢出、供应商跟进或跨系统运营异常处理。
    sourceRefs: [10, 11, 12]
  - name: Oracle Simphony
    stage: 现有厂商
    wedge: 面向复杂连锁的企业级云 POS 与全渠道餐饮平台。
    pricing: 定制报价。
    strength: POS 核心深、开放 API、覆盖企业级库存和在线点单，并有广泛生态支持。
    weaknessVsUs: 它的企业级姿态更重、system-of-record 色彩更强，因此不太适合 8-40 家门店群体那种“切得窄、见效快”的 overlay 销售。
    sourceRefs: [13, 14, 15]
  - name: Lightspeed Restaurant
    stage: 现有厂商
    wedge: 带多门店管理、点单、洞察和付费附加模块的云餐饮 POS。
    pricing: 定制软件套餐，KDS 附加模块公开价为每屏每月 $30。
    strength: 餐饮覆盖面广、多门店支持成熟、运营栈可配置。
    weaknessVsUs: 它是一个带附加模块的宽 POS 平台，不是专门针对多语言菜单和库存异常的变更编排层。
    sourceRefs: [16, 17]
  - name: SevenRooms
    stage: 成长期
    wedge: 面向餐厅的预订、CRM、营销和顾客体验平台。
    pricing: 未公开披露。
    strength: 在预订和顾客关系上位置很强，全球已有 15,000 多家餐厅客户。
    weaknessVsUs: 预订自动化确实相邻，但它不解决配送同步、采购动作或菜单变更传播。
    sourceRefs: [18, 37]
regulatoryTechnicalConstraints:
  - point: 只要存储或复用顾客电话、转写内容和顾客数据，就会落进欧盟个人数据义务范围。
    sourceRefs: [28, 29]
  - point: 自动化数字菜单必须保证法律要求的食品信息准确，尤其是过敏原信息。
    sourceRefs: [30]
  - point: 任何采集或触及支付卡数据的工作流，都会继承 PCI DSS 范围与控制要求。
    sourceRefs: [31]
  - point: 面向公众的点单网站和自助点餐机，需要符合欧盟无障碍规则和与 WCAG 对齐的标准。
    sourceRefs: [34, 35]
validationSignals:
  - point: allO 已服务 1,000 多家德国活跃餐厅门店，并称 30% 的新客户来自转介绍。
    sourceRefs: [1]
  - point: King Loui 为了在人员有限的情况下承接增长，采用了在线预订、webshop 点单、配送集成、日报和 DATEV 相关支持。
    sourceRefs: [8]
  - point: Houtang Hotpot 用一套系统管理配送平台、财务报表和排班工作流。
    sourceRefs: [9]
  - point: Deliverect 已处理超过 10 亿笔订单、覆盖超过 96,000 个地点，证明菜单与订单控制枢纽确有真实需求。
    sourceRefs: [10]
openQuestions:
  - 德国和奥地利 8-40 家门店的餐饮集团里，还有多少仍主要靠电话处理预订和外带，而不是靠整合软件？
  - 目标客群里主导地位最高的 POS 栈到底是哪几套，它们的 API 在实操里到底有多开放？
  - 目标买方现在给供应商下单，到底多大比例已经数字化，又有多少还靠电话、WhatsApp 或邮件？
  - "在采购视角下，最能打动试点的 KPI 到底是哪一个：漏接电话更少、退款率更低、菜单更新更快，还是食物浪费更少？"
