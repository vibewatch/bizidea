topRisks:
  - name: Integration sprawl
    description: Restaurant groups often run messy combinations of POS, delivery, kiosk, and reservation software that can slow implementation.
    mitigation: Start with a narrow supported stack for German independent groups and prove ROI on one recurring workflow before broadening integrations.
  - name: Bad automation can break service
    description: Incorrect menu or availability updates could cause refunds, guest frustration, and immediate loss of trust.
    mitigation: Keep operators in the approval loop at launch, add channel-specific safeguards, and instrument rollback plus audit trails for every change.
  - name: Incumbents can copy surface features
    description: POS or restaurant OS vendors may add basic agent features once operators show willingness to pay for automation.
    mitigation: Own the cross-system orchestration layer and multilingual operations dataset that point vendors cannot easily recreate from a single product surface.
