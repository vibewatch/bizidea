differentiator: >-
  Most restaurant tools own one system of record, such as the POS, delivery
  channel, or reservation book, then leave operations teams to reconcile the
  gaps. This company owns the operational handoff itself: the moment when menu,
  stock, pricing, and guest communication must all change together. Its moat is a
  workflow dataset linking each operational change to resulting sales, refunds,
  call volume, supplier delays, and waste across multilingual restaurant groups,
  which is difficult for point solutions to reconstruct.
