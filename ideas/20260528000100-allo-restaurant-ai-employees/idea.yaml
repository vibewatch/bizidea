jobsToBeDone:
  - job: >-
      When a restaurant group changes menus, pricing, or item availability, help
      the central ops team push every required update across sales channels and
      suppliers, so they can avoid refunds and service confusion.
    currentAlternative: Manual edits across POS, delivery dashboards, kiosks, email, and phone calls
    successMetric: Time to complete menu changes, refund rate, and percentage of channels kept in sync
  - job: >-
      When front-of-house staffing is thin, help operators absorb reservation and
      ordering calls without losing context on live availability, so they can
      protect revenue during peak hours.
    currentAlternative: Hosts answering phones manually or letting calls go unanswered
    successMetric: Call answer rate, reservation conversion rate, and labor hours saved per location
