scenarios:
  downside:
    description: Pilot conversions slip, stack concentration is weaker than hoped, and the company reaches only about 300 live locations by Q4Y3.
    y3RevenueK: 892.5
    y3EbitdaK: -740.0
    cashLowPointK: -252.2
    keyAssumptionChanges:
    - Blended ARPU falls to about $4.2K per live location per year as higher-tier attach does not land.
    - Quarter-end live locations reach only 90 in Q4Y2 and 300 in Q4Y3 because sales cycles and partner ramps are slower.
    - Gross margin compresses to about 67% as telephony, support, and implementation overhead stay elevated.
  base:
    description: Paid pilots convert close to plan, one narrow connector set keeps deployment repeatable, and partner referrals start contributing in Y2H2.
    y3RevenueK: 1322.0
    y3EbitdaK: -412.7
    cashLowPointK: 159.4
    keyAssumptionChanges:
    - ARPU stays at roughly $4.5K per live location per year with a modest voice and managed-channel mix.
    - The live-location ramp reaches 125 by Q4Y2 and 420 by Q4Y3 without adding a services-heavy team.
    - Gross margin holds at the BP target of 70% while hiring stays flat through Y3.
  upside:
    description: The supported stack fits more of the beachhead than expected, referrals accelerate, and premium voice workflows lift average contract value.
    y3RevenueK: 1788.0
    y3EbitdaK: -50.6
    cashLowPointK: 485.4
    keyAssumptionChanges:
    - Blended ARPU rises to about $4.8K per live location per year as premium workflow attach lands sooner.
    - Quarter-end live locations reach 150 in Q4Y2 and 520 in Q4Y3 because referrals and same-account expansion work faster.
    - Gross margin improves to about 72% as deployment reuse and telephony efficiency improve.
