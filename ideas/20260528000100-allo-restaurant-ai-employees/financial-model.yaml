slug: restaurant-menuops-autopilot
date: '2026-05-28'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: Starts the first full month after the 2026-05-28 business-plan date.
- id: A2
  name: Customer unit
  value: Live location under management
  unit: location
  source: '[BP businessModel.unitOfValue] The BP defines the unit of value as a live location-month managed for menu, availability, and exception control.'
- id: A3
  name: Blended annual ARPU per live location
  value: $4,500 per year / $375 per month
  unit: USD_per_location_year
  source: '[BP gtm.pricing; BP businessModel.revenueStreams; research reportMemo.willingnessToPay] Base pricing uses the top end of the researched €250-€350 monthly band because the production rollout includes some managed-channel and voice-workflow attach.'
- id: A4
  name: Gross margin target
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] The business plan explicitly targets 70% gross margin.'
- id: A5
  name: Year-1 live-location ramp
  value: 'M1-M12: 0, 0, 0, 5, 8, 10, 12, 15, 18, 20, 22, 24'
  unit: live_locations
  source: '[BP product.sixMonth; BP milestones 0–12 months; BP investorMemo.firstCustomer.initialContract] The first year assumes two 5-10 location paid pilots, at least 15 live locations reached in-year, and modest expansion before year end.'
- id: A6
  name: Year-2 and Year-3 live-location ramp
  value: 'Y2 Q1-Q4: 45, 65, 95, 125; Y3 Q1-Q4: 175, 250, 330, 420'
  unit: live_locations
  source: '[BP milestones 12–24 months; BP milestones 24–36 months; research market.som] The base case lands at the BP midpoint of 125 live locations by Q4Y2 and reaches the researched ~420-location year-3 SOM by Q4Y3.'
- id: A7
  name: Pilot conversion and expansion gate
  value: Paid pilot to production 50%+; production to second brand or more locations 60%+ within 9 months
  unit: funnel_conversion
  source: '[BP gtm.funnelTargets] The growth curve assumes the funnel metrics written in the business plan are roughly met.'
- id: A8
  name: Hiring sequence
  value: Month 0 founder CEO, founding engineer, and founding product/ops; month 5 integration engineer; month 10 customer success and implementation lead; Q2Y2 platform/AI engineer; Q3Y2 GTM/partnerships lead; no additional Y3 hiring in the base case.
  unit: timing
  source: '[BP team; BP strategicChoices.sequencingRationale; BP gtm.channels] The plan staffs implementation only after lighthouse demand, then adds one platform hire and one GTM partner hire after repeatable rollout proof.'
- id: A9
  name: Payroll burden
  value: 18% on top of cash salary
  unit: percent
  source: Startup-finance heuristic for Germany/Austria seed-stage software teams, where employer taxes and benefits are usually lower than U.S. fully loaded norms but still material.
- id: A10
  name: Founder CEO compensation
  value: $108,000 fully loaded
  unit: USD_per_FTE_year
  source: Startup-finance heuristic for a modest pre-seed founder salary in Central Europe.
- id: A11
  name: Founding engineer compensation
  value: $132,000 fully loaded
  unit: USD_per_FTE_year
  source: Startup-finance heuristic for an early product engineer hired in Germany/Austria.
- id: A12
  name: Founding product/ops compensation
  value: $120,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP team] Startup-finance heuristic for a workflow-heavy product and pilot-operations lead in hospitality software.'
- id: A13
  name: Integration engineer compensation
  value: $108,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP team Integration engineer] Startup-finance heuristic for a connector-focused implementation engineer hired after lighthouse demand appears.'
- id: A14
  name: Customer success and implementation lead compensation
  value: $96,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP team Customer success and implementation lead] Startup-finance heuristic for a rollout, ROI review, and reference-building hire in Germany/Austria.'
- id: A15
  name: Platform / AI engineer compensation
  value: $132,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP strategicChoices.sequencingRationale] Startup-finance heuristic for adding one product-depth engineer only after the connector set and approval loop are proven.'
- id: A16
  name: GTM / partnerships lead compensation
  value: $132,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP gtm.channels; BP experimentRoadmap 12–18 months] Startup-finance heuristic for one partner-led seller hired after lighthouse proof, not before.'
- id: A17
  name: Non-payroll operating spend
  value: Y1 $266K, Y2 $372K, Y3 $510K across hosting, telephony, travel, compliance, legal, and software.
  unit: USDK
  source: '[BP operations; BP risks; BP fundingAsk.useOfFundsSummary] The model funds approval logs, integrations, pilot reviews, and compliance without assuming a large services bench.'
- id: A18
  name: Opening cash after pre-seed close
  value: $2.1M
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk runwayMonths 18] The model uses a near-floor pre-seed raise sized to reach the next milestone and still retain roughly six months of buffer.'
- id: A19
  name: Revenue recognition convention
  value: Revenue equals end-of-period live locations multiplied by $0.375K per month in Y1 and $1.125K per quarter in Y2-Y3.
  unit: modeling_rule
  source: Modeling rule anchored to A2 and A3 so every revenue line reconciles directly to live locations times ARPU.
- id: A20
  name: Monthly churn used in unit economics
  value: 1.4%
  unit: percent_per_month
  source: Startup-finance heuristic for sticky operational workflow software, tempered by BP risks around integration sprawl and operator trust.
- id: A21
  name: Blended CAC per live location
  value: $2,000
  unit: USD_per_location
  source: '[BP gtm.channels; research validationSignals] Heuristic based on roughly $24K blended customer acquisition cost per restaurant group divided by an initial 12 live locations, helped by reference and partner sourcing after the first wins.'
- id: A22
  name: Funding sizing rule
  value: Raise enough to reach 125 live locations, 3-5 restaurant groups, sub-90-day deployment on the narrow stack, and retain about 6 months of buffer.
  unit: policy
  source: '[BP milestones 12–24 months; BP strategyMap.killCriteria; BP fundingAsk] The funding ask is tied to the seed-readiness milestone rather than full self-sufficiency.'
- id: A23
  name: Year-3 hiring restraint
  value: Keep headcount flat at 7 FTE through Y3 unless procurement expansion and new-country demand are already proven.
  unit: policy
  source: '[BP strategicChoices.notYet; BP market.som] The beachhead SOM is modest, so the base case avoids adding headcount ahead of proof that expansion modules really lift net retention.'
- id: A24
  name: Cash flow simplification
  value: Ending cash equals opening cash plus cumulative EBITDA; working capital, capex, and debt are assumed immaterial.
  unit: formula
  source: Startup-finance heuristic for a software-first pre-seed model with light capex and no financing complexity beyond the equity round.
