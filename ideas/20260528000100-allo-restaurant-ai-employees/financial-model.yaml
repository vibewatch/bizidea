modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target restaurant groups] --> Pilots[Paid pilots]
      Pilots --> Locations[Live locations]
      Locations --> Revenue[Per-location subscription revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Runway and cash]
      Locations --> Expansion[Voice and procurement expansion]
      Expansion --> Revenue
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from converting two early pilot cohorts into 125 live locations by Q4Y2 and then expanding the same playbook to 420 locations by Q4Y3 at about $4.5K annual ARPU.
- checkName: Must go right
  finding: The model needs one narrow supported stack to keep deployments under 90 days, because the sales-cycle sensitivity shows cash goes negative if rollouts slip by even one quarter.
- checkName: Model breaks if
  finding: The downside case of weaker stack coverage, lower ARPU, and 67% gross margin pushes the cash low point to about -$252K before the company reaches efficient scale.
- checkName: Next-round proof
  finding: The seed story works once the company can show 125 live locations across 3-5 groups, one partner-sourced pilot, and a referenceable ROI case study with repeatable rollout timing.
sanityChecks:
  ruleOf40: Y3 growth 256.1% + EBITDA margin -31.2% = 224.9%.
  burnMultiple: Y2 burn multiple is about 1.9x on roughly $455K of net new ARR; Y3 burn multiple improves to about 0.3x on roughly $1.33M of net new ARR.
  revenuePerFte: $189K Y3 revenue per year-end FTE; about $270K exit ARR per FTE at 420 live locations (below pure-play SaaS benchmarks but reasonable for an implementation-aware vertical SaaS).
  flags:
  - The standalone beachhead only reaches about $1.9M exit ARR at the modeled 420-location SOM, so the venture case still depends on procurement expansion and new-geography repeatability after the seed raise.
  - The model assumes one narrow POS, delivery, and reservation stack covers most early wins; if integration reuse is weaker, margin and deployment speed deteriorate quickly.
  - Revenue is recognized off end-of-period live-location counts, so real invoicing could land modestly later if implementations bunch near month-end or quarter-end.
  - CAC and churn are measured per live location, but the actual sales motion happens at the restaurant-group level, so early contract-size variance will be wider than this model shows.
