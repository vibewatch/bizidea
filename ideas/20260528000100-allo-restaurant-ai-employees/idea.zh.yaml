jobsToBeDone:
  - job: >-
      当餐饮集团要调整菜单、价格或商品可售状态时，帮中央运营团队把所有必要更新推到各销售渠道和供应商端，
      这样他们才能少退款、少出服务混乱。
    currentAlternative: 在 POS、配送后台、自助点餐机、邮件和电话之间手工逐个修改
    successMetric: 完成一次菜单变更所需时间、退款率，以及保持同步的渠道占比
  - job: >-
      当前厅人手吃紧时，帮运营方接住预订和点单电话，同时保持实时可售状态上下文，
      这样高峰时段也能把收入守住。
    currentAlternative: 由前厅员工手工接电话，或者干脆漏接
    successMetric: 来电接通率、预订转化率，以及每家门店节省的人工小时数
