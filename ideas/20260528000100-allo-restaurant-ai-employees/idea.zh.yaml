topRisks:
  - name: 集成蔓延
    description: 餐饮集团常常同时跑着很乱的 POS、配送、自助点餐机和预订软件组合，实施很容易被拖慢。
    mitigation: 先把支持栈收窄到德国独立餐饮集团里最常见的一套，先在一个高频工作流上证明 ROI，再扩大集成面。
  - name: 错误自动化会直接砸服务
    description: 一旦菜单或可售状态更新错了，就会带来退款、顾客不满，并且立刻失去信任。
    mitigation: 上线初期让运营方留在审批环里，加上按渠道定制的保护措施，并为每次变更补上回滚和审计轨迹。
  - name: 现有厂商能抄表层功能
    description: 一旦运营方证明愿意为自动化付费，POS 或餐厅 OS 厂商就可能很快补上基础代理能力。
    mitigation: 牢牢占住跨系统编排层和多语言运营数据集，这是单一产品面的厂商不容易重建的。
