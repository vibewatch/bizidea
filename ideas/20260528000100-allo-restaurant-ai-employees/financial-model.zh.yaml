modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads[Target restaurant groups] --> Pilots[Paid pilots]
      Pilots --> Locations[Live locations]
      Locations --> Revenue[Per-location subscription revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Runway and cash]
      Locations --> Expansion[Voice and procurement expansion]
      Expansion --> Revenue
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入来自两批早期试点逐步转成正式生产账户，在 Y2 Q4 做到 125 家活跃门店，再把同一打法扩到 Y3 Q4 的 420 家门店，对应年 ARPU 约 $4.5K。
- checkName: 必须做对的事
  finding: 模型必须靠一套收窄支持栈把部署压到 90 天内；因为销售周期敏感性已经显示，只要 rollout 晚一个季度，现金就会转负。
- checkName: 模型失效条件
  finding: 如果支持栈覆盖不够、ARPU 更低、毛利率掉到 67%， downside 情景会把现金低点推到约 -$252K，公司在达到有效规模前就会先见底。
- checkName: 下一轮要证明什么
  finding: 只有当公司能证明在 3-5 个集团里做到 125 家活跃门店、拿下 1 个伙伴来源试点，并交出可复用 rollout 节奏下的 ROI 案例时，seed 故事才真正成立。
sanityChecks:
  ruleOf40: Y3 growth 256.1% + EBITDA margin -31.2% = 224.9%.
  burnMultiple: Y2 burn multiple is about 1.9x on roughly $455K of net new ARR; Y3 burn multiple improves to about 0.3x on roughly $1.33M of net new ARR.
  revenuePerFte: $189K Y3 revenue per year-end FTE; about $270K exit ARR per FTE at 420 live locations (below pure-play SaaS benchmarks but reasonable for an implementation-aware vertical SaaS).
  flags:
  - 单看滩头市场，在模型里的 420 家门店 SOM 也只做到约 $1.9M exit ARR，所以 venture 逻辑仍然依赖 seed 轮之后能把采购扩张和新地域复制跑通。
  - 模型假设一套收窄的 POS、配送和预订栈就能覆盖大多数早期胜利；如果集成复用不够强，毛利率和部署速度都会很快恶化。
  - 收入按期末活跃门店数确认，因此如果实施大量堆在月末或季末，真实开票时间可能会略晚。
  - CAC 和 churn 以单门店为单位衡量，但真实销售动作发生在餐饮集团层面，所以早期合同规模的波动会比这个模型看起来更大。
