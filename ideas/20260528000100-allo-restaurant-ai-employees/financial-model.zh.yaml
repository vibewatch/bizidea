slug: restaurant-menuops-autopilot
date: '2026-05-28'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: 从 2026-05-28 的 business-plan 日期往后推一个完整月份开始。
- id: A2
  name: 客户单位
  value: Live location under management
  unit: location
  source: '[BP businessModel.unitOfValue] BP 把价值单位定义为按月管理的活跃门店，覆盖菜单、可售状态和异常控制。'
- id: A3
  name: 每家活跃门店的混合年 ARPU
  value: $4,500 per year / $375 per month
  unit: USD_per_location_year
  source: '[BP gtm.pricing; BP businessModel.revenueStreams; research reportMemo.willingnessToPay] 基础定价取研究区间 €250-€350 月费的上沿，因为正式 rollout 假设会带上一部分托管渠道和语音工作流附着率。'
- id: A4
  name: 目标毛利率
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 商业计划明确写了 70% 的目标毛利率。'
- id: A5
  name: 第 1 年活跃门店爬坡
  value: 'M1-M12: 0, 0, 0, 5, 8, 10, 12, 15, 18, 20, 22, 24'
  unit: live_locations
  source: '[BP product.sixMonth; BP milestones 0–12 months; BP investorMemo.firstCustomer.initialContract] 第一年假设有两批 5-10 家门店的付费试点，在年内做到至少 15 家活跃门店，并在年末前有小幅扩张。'
- id: A6
  name: 第 2 年和第 3 年活跃门店爬坡
  value: 'Y2 Q1-Q4: 45, 65, 95, 125; Y3 Q1-Q4: 175, 250, 330, 420'
  unit: live_locations
  source: '[BP milestones 12–24 months; BP milestones 24–36 months; research market.som] 基准情景在 Y2 Q4 落到 BP 中位数的 125 家活跃门店，并在 Y3 Q4 到达研究里约 420 家门店的第 3 年 SOM。'
- id: A7
  name: 试点转化与扩张门槛
  value: Paid pilot to production 50%+; production to second brand or more locations 60%+ within 9 months
  unit: funnel_conversion
  source: '[BP gtm.funnelTargets] 这条增长曲线假设商业计划里写下的漏斗指标大致能达成。'
- id: A8
  name: 招聘顺序
  value: Month 0 founder CEO, founding engineer, and founding product/ops; month 5 integration engineer; month 10 customer success and implementation lead; Q2Y2 platform/AI engineer; Q3Y2 GTM/partnerships lead; no additional Y3 hiring in the base case.
  unit: timing
  source: '[BP team; BP strategicChoices.sequencingRationale; BP gtm.channels] 计划是在灯塔需求被验证后再补实施岗位，然后等 rollout 可复制被证明后，再补 1 名平台工程师和 1 名 GTM 伙伴岗位。'
- id: A9
  name: 薪酬附加负担
  value: 18% on top of cash salary
  unit: percent
  source: 适用于德国/奥地利 seed 阶段软件团队的创业财务经验值；雇主税费和福利一般低于美国 fully loaded 水平，但仍然不可忽略。
- id: A10
  name: 创始人/CEO 薪酬
  value: $108,000 fully loaded
  unit: USD_per_FTE_year
  source: 适用于中欧地区 pre-seed 创始人的保守薪酬经验值。
- id: A11
  name: 创始工程师薪酬
  value: $132,000 fully loaded
  unit: USD_per_FTE_year
  source: 适用于德国/奥地利早期产品工程师的创业财务经验值。
- id: A12
  name: 创始产品/运营负责人薪酬
  value: $120,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP team] 适用于餐饮软件里重工作流、重试点运营岗位的创业财务经验值。'
- id: A13
  name: 集成工程师薪酬
  value: $108,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP team Integration engineer] 适用于在灯塔需求出现后补上的、以连接器和实施为主的工程岗位经验值。'
- id: A14
  name: 客户成功与实施负责人薪酬
  value: $96,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP team Customer success and implementation lead] 适用于德国/奥地利 rollout、ROI 复盘和案例沉淀岗位的创业财务经验值。'
- id: A15
  name: 平台 / AI 工程师薪酬
  value: $132,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP strategicChoices.sequencingRationale] 只有在连接器集合和审批闭环被证明之后，才补一名更偏产品深度的平台工程师。'
- id: A16
  name: GTM / 合作负责人薪酬
  value: $132,000 fully loaded
  unit: USD_per_FTE_year
  source: '[BP gtm.channels; BP experimentRoadmap 12–18 months] 这是在灯塔验证后才会补的一名伙伴驱动销售岗位，而不是提前铺人。'
- id: A17
  name: 非薪酬运营支出
  value: Y1 $266K, Y2 $372K, Y3 $510K across hosting, telephony, travel, compliance, legal, and software.
  unit: USDK
  source: '[BP operations; BP risks; BP fundingAsk.useOfFundsSummary] 模型为审批日志、集成、试点复盘和合规预留了足够开支，但没有假设一支很大的服务团队。'
- id: A18
  name: pre-seed 交割后的期初现金
  value: $2.1M
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk runwayMonths 18] 模型采用接近区间下沿的一笔 pre-seed 融资，目标是撑到下一里程碑，同时保留约 6 个月缓冲。'
- id: A19
  name: 收入确认规则
  value: Revenue equals end-of-period live locations multiplied by $0.375K per month in Y1 and $1.125K per quarter in Y2-Y3.
  unit: modeling_rule
  source: 这是锚定 A2 和 A3 的建模规则，让每一行收入都能直接回到“活跃门店数 × ARPU”。
- id: A20
  name: 单位经济里使用的月流失率
  value: 1.4%
  unit: percent_per_month
  source: 适用于高黏性运营工作流软件的创业财务经验值，并按 BP 中对集成蔓延和运营方信任的风险做了折中。
- id: A21
  name: 每家活跃门店的混合 CAC
  value: $2,000
  unit: USD_per_location
  source: '[BP gtm.channels; research validationSignals] 经验值假设每个餐饮集团获客成本约 $24K，再除以初始 12 家活跃门店；在首批成功后，口碑和伙伴获客会帮 CAC 往下走。'
- id: A22
  name: 融资规模规则
  value: Raise enough to reach 125 live locations, 3-5 restaurant groups, sub-90-day deployment on the narrow stack, and retain about 6 months of buffer.
  unit: policy
  source: '[BP milestones 12–24 months; BP strategyMap.killCriteria; BP fundingAsk] 融资需求绑定的是 seed-ready 里程碑，而不是完全自给自足。'
- id: A23
  name: 第 3 年招聘克制原则
  value: Keep headcount flat at 7 FTE through Y3 unless procurement expansion and new-country demand are already proven.
  unit: policy
  source: '[BP strategicChoices.notYet; BP market.som] 滩头市场的 SOM 不算大，所以基准情景避免在采购扩张和跨国需求没被证明之前就继续加人。'
- id: A24
  name: 现金流简化规则
  value: Ending cash equals opening cash plus cumulative EBITDA; working capital, capex, and debt are assumed immaterial.
  unit: formula
  source: 适用于软件优先的 pre-seed 模型的创业财务经验值；资本开支很轻，也没有股权融资之外的复杂融资结构。
