scenarios:
  downside:
    description: 试点转化变慢、支持栈集中度低于预期，公司到 Y3 Q4 只能做到约 300 家活跃门店。
    y3RevenueK: 892.5
    y3EbitdaK: -740.0
    cashLowPointK: -252.2
    keyAssumptionChanges:
    - 当更高档位附着没有发生时，混合 ARPU 会降到每家活跃门店每年约 $4.2K。
    - 因为销售周期和伙伴爬坡更慢，季度末活跃门店只会在 Y2 Q4 到 90 家、Y3 Q4 到 300 家。
    - 由于电话、支持和实施开销居高不下，毛利率会压缩到约 67%。
  base:
    description: 付费试点大体按计划转正，一套收窄连接器让部署保持可复制，伙伴转介绍从 Y2H2 开始贡献线索。
    y3RevenueK: 1322.0
    y3EbitdaK: -412.7
    cashLowPointK: 159.4
    keyAssumptionChanges:
    - 在语音和托管渠道 mix 温和附着的前提下，ARPU 稳在每家活跃门店每年约 $4.5K。
    - 活跃门店曲线在 Y2 Q4 到 125 家、Y3 Q4 到 420 家，而且无需扩出一支重服务团队。
    - 毛利率守住 BP 写下的 70% 目标，同时招聘在整个 Y3 保持不变。
  upside:
    description: 支持栈对滩头市场的覆盖好于预期，转介绍加速，且高价语音工作流把平均合同额继续抬高。
    y3RevenueK: 1788.0
    y3EbitdaK: -50.6
    cashLowPointK: 485.4
    keyAssumptionChanges:
    - 随着高阶工作流附着更早落地，混合 ARPU 升到每家活跃门店每年约 $4.8K。
    - 因为转介绍和同一账户扩张更快，季度末活跃门店会在 Y2 Q4 到 150 家、Y3 Q4 到 520 家。
    - 随着部署复用和电话效率提高，毛利率改善到约 72%。
