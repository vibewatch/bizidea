scenarios:
  downside:
    description: pilot 转化整体慢约两个季度，而且现有厂商打包压价，导致高级模块增购始终有限。
    y3RevenueK: 1548.0
    y3EbitdaK: -742.0
    cashLowPointK: -95.0
    keyAssumptionChanges:
    - Q4Y3 的活跃客户数从 20 家降到 15 家。
    - 退出期混合 ACV 从 $120K 掉到约 $102K。
    - 毛利率停在约 75%，因为部署仍更偏服务密集。
  base:
    description: 审计优先的 pilot 按计划转化，早期客户内的席位逐步扩张，高级模块也缓慢挂上去。
    y3RevenueK: 2079.0
    y3EbitdaK: -421.8
    cashLowPointK: 290.1
    keyAssumptionChanges:
    - base 案例直接采用 A1-A20，不再额外加情景修正。
  upside:
    description: 共创客户转化更快，且凭证范围控制或 blocking 模块提前一个季度挂上去，同时不需要额外大幅扩招。
    y3RevenueK: 2556.0
    y3EbitdaK: -85.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
    - Q4Y3 的活跃客户数从 20 家升到 24 家。
    - 退出期混合 ACV 提升到约 $132K。
    - 由于部署 playbook 更早标准化，毛利率提升到约 82%。
sensitivity:
- variable: ARPU
  downsideCase: 退出期混合 ACV 掉到约 $102K，因为买方只停留在核心档。
  baseCase: 随着高级模块适度增购，退出期混合 ACV 达到 $120K。
  upsideCase: 在席位扩张更强、高级模块挂得更顺的情况下，退出期混合 ACV 达到约 $132K。
  y3RevenueImpactK: -312.0
  cashImpactK: -250.0
- variable: CAC
  downsideCase: 更多 pilot 需要创始人和工程团队深度介入，CAC 升到 $80K。
  baseCase: 每拿下一个新客户，平均 CAC 为 $65K。
  upsideCase: 如果事故驱动的定向获客和客户转介绍更有效，CAC 可降到约 $55K。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: 如果切口始终偏窄，月流失率会漂到 2.2%。
  baseCase: 月流失率维持在 1.6%。
  upsideCase: 一旦客户叠上 blocking 和凭证范围控制，月流失率有机会降到约 1.2%。
  y3RevenueImpactK: -228.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: 事故紧迫性消退后，转化周期会从约 6 个月拖到 9 个月。
  baseCase: pilot 到生产的时间，维持在第 1 年 funnel 目标假设内。
  upsideCase: 参考客户一旦形成，整体销售周期可大致缩短一个季度。
  y3RevenueImpactK: -255.0
  cashImpactK: -210.0
- variable: gross margin
  downsideCase: 如果部署仍需要更重的人力分析和支持，毛利率会停在约 75%。
  baseCase: 第 1 年之后，毛利率达到 80%。
  upsideCase: 如果 rollout 和证据工作流更早标准化，毛利率可升到 82%。
  y3RevenueImpactK: 0.0
  cashImpactK: -155.0
- variable: hiring pace
  downsideCase: 在收入重复性还没被证明前，就把 1 名工程和 1 名 GTM 招聘提前拉前。
  baseCase: 第 2 位 GTM 在 Q2Y2 入职，第 3 位工程师在 Q3Y2 入职，G&A 要等到 Q4Y3。
  upsideCase: 等扩张经济性跑顺后，再补那些非刚需岗位。
  y3RevenueImpactK: -40.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[Triggered target accounts] --> Pilots[Paid pilots]\n  Pilots --> Customers[Production customers]\n  Customers --> Revenue[Seat and module revenue]\n  Revenue --> GrossProfit[Gross profit after hosting and support]\n  GrossProfit --> Cash[Cash runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: base 案例的收入来自：Y1 落下 6 个活跃账户，Q4Y2 扩到 12 个活跃组织，再靠席位扩张和高级模块在 Y3 做到 $2.1M 收入。
- checkName: 必须跑顺的地方
  finding: 模型要求只审计 pilot 的禁用率低于 15%，这样转化才能发生，而公司也不用提前搭一支重实施服务团队。
- checkName: 模型会在哪儿断
  finding: 下行情景已经说明：即便没有明显的招聘失误，只要销售周期变慢、ARPU 再降一些，下一轮融资前现金就可能轻微跌破 0。
- checkName: 下一轮证明点
  finding: 只要公司做到 10–12 个生产客户、部署周期小于 30 天，并把 blocking 或凭证范围控制的增购跑成可复制动作，下一轮融资故事就会最强。
sanityChecks:
  ruleOf40: Y3 增速 100.3% + EBITDA 利润率 -20.3% = 80.0%。
  burnMultiple: Y3 burn multiple 为 0.4x（$421.8K burn / $1,041.0K 净新增收入）。
  revenuePerFte: 按期末 FTE 算，Y3 人均收入约 $260K（SaaS 基准约为 $200K-$400K）。
  flags:
  - base 案例到 Y3 仍是 EBITDA 亏损，因此公司大概率会在真正盈亏平衡前先做一轮后续融资。
  - 现金最低点只有 $290.1K；只要 pilot 转化再慢一点，或遇到一个实施特别重的大客户，跑道就会很快吃紧。
  - 模型默认现有厂商不会把价格压到每个活跃组织每月大致 $8.5K-$10K 以下；一旦切口更显眼，这个前提就可能失效。
