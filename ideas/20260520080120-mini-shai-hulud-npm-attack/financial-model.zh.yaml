slug: npm-ai-session-guard
date: '2026-05-20'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型启动月份
  value: 2026-06
  unit: YYYY-MM
  source: 在 2026-05-20 这版 business-plan 之后的第一个完整月份启动。
- id: A2
  name: 起始现金与本轮交割
  value: '2600'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk runwayMonths 18] base 案例假设模型启动时完成 $2.6M 的 pre-seed，以跑到 Y2 证明点并多留约 6 个月缓冲。'
- id: A3
  name: 起始客户数（M1）
  value: '0'
  unit: organizations
  source: '[BP executiveSummary; BP milestones 0-12 months] 公司从 0 收入起步，必须先拿到付费 pilot 才能转生产。'
- id: A4
  name: pilot 定价锚
  value: 15-30
  unit: USDK per 45-60 day pilot
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] 付费 pilot 必须卡在 $15k-$30k 预算带内，团队才能在年度规划前拍板。'
- id: A5
  name: 首批生产环境 ACV
  value: '72'
  unit: USDK per customer per year
  source: '[BP investorMemo.firstCustomer.initialContract $50k-$120k annual ACV] base 案例从给定量产区间的偏下中位数起步。'
- id: A6
  name: 退出期混合 ACV
  value: '120'
  unit: USDK per customer per year
  source: '[BP gtm.pricing $40-$60 premium tier; BP businessModel.expansionLevers] Y3 的 ACV 提升来自受保护席位增加，以及 blocking、SIEM、凭证范围控制的增购。'
- id: A7
  name: 收入确认规则
  value: 新 logo 在落地当月按半个月计收入；季度收入按活跃客户平均数乘混合月收入计算。
  unit: policy
  source: '[Startup-finance heuristic] 让收入和客户数能对得上，同时反映期中落单。'
- id: A8
  name: Y1 客户爬坡
  value: 第一个付费 pilot 在 M4 落地，到 M12 时共有 6 个活跃付费组织。
  unit: organizations
  source: '[BP milestones 0-12 months; BP experimentRoadmap audit-only managed-fleet pilot] 对应第 1 年 3–5 个付费 pilot，以及最早一批生产转化。'
- id: A9
  name: Y2 客户爬坡
  value: Q1Y2 为 8 家、Q2Y2 为 9 家、Q3Y2 为 11 家、Q4Y2 为 12 家活跃组织。
  unit: organizations
  source: '[BP milestones 12-24 months] 把“8–10 个生产客户”解释成约 10 个量产账户，外加少量重叠的 pilot 或扩张。'
- id: A10
  name: Y3 客户爬坡
  value: Q1Y3 为 14 家、Q2Y3 为 16 家、Q3Y3 为 18 家、Q4Y3 为 20 家活跃组织。
  unit: organizations
  source: '[BP milestones 24-36 months; research market.som] base 案例到 20 个账户，仍明显小于研究里的第 3 年 $9.6M SOM，假设的是专注扩张而不是赛道通吃。'
- id: A11
  name: 混合月收入阶梯
  value: Y1：M4-M6 为 $7K，M7-M9 为 $7.5K，M10-M12 为 $8K；Y2：按季度从 $8.5K 升到 $10K；Y3：按季度从 $10K 升到 $11.5K。
  unit: USDK per active customer per month
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract; research reportMemo.willingnessToPay] 把席位定价折算成组织级的混合收入曲线，并假设适度扩张。'
- id: A12
  name: 毛利率目标
  value: '80'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 模型在 Y1 用 79%，Y2 起用 80%，因为部署流程会更标准化。'
- id: A13
  name: 核心招聘顺序
  value: 模型启动时配创始人和创始工程师；M2 补检测工程师，M4 补解决方案工程师，M9 补 GTM 负责人。
  unit: timing
  source: '[BP team] 直接沿用 business-plan 第 1 年的招聘顺序。'
- id: A14
  name: 验证后再补的招聘
  value: Q2Y2 补第 2 位 GTM，Q3Y2 补第 3 位工程师，Q4Y3 再补第 1 位 G&A。
  unit: timing
  source: '[BP milestones 12-24 months; heuristic: add capacity only after the pilot motion is repeatable and keep post-Y1 hiring lean] 只有当 pilot 动作跑顺后才补产能，Y1 之后继续维持精简扩张。'
- id: A15
  name: fully loaded 月薪带宽
  value: Executive $18K; Engineering $17K; Solutions $14K; GTM $15K; G&A $11K
  unit: USDK per FTE per month
  source: '[BP team; startup-finance heuristic] 对应美国资深安全软件人才的现金薪酬 + 人力附加成本，但仍保持 pre-seed 的精简水位。'
- id: A16
  name: 非人力运营支出
  value: 研发工具和实验室支出起步约每月 $11K-$15K，销售市场从创始人主导的每月 $3K-$13K 起步，G&A 一直精简到 Y3 后段。
  unit: USDK
  source: '[BP operations; BP gtm.channels; heuristic: local-first security software with limited implementation services] 这是一种本地优先、安全软件、且实施服务占比有限的支出结构。'
- id: A17
  name: 稳态 CAC
  value: '65'
  unit: USDK per new customer
  source: '[BP gtm.funnelTargets; BP gtm.channels; research reportMemo.competitiveLandscape] 早期企业安全销售要靠付费 pilot 和创始人亲自打单，因此 CAC 偏高是合理的。'
- id: A18
  name: 用于单位经济模型的月流失率
  value: '1.6'
  unit: percent
  source: '[Startup-finance heuristic] 这种按年合同卖的早期安全基础设施，流失率应低于 SMB SaaS；但切口仍会受现有厂商打包和部署摩擦影响。'
- id: A19
  name: 现金转换简化假设
  value: 期末现金 = 期初现金 + 累计 EBITDA。
  unit: policy
  source: '[Startup-finance heuristic] 这里把营运资本波动、债务和 capex 视为对早期软件模型不重要。'
- id: A20
  name: 融资规模规则
  value: 融到的钱要足够把公司送到 10–12 个生产客户的证明点，并额外留出约 6 个月现金缓冲。
  unit: policy
  source: '[BP fundingAsk.runwayMonths 18; model requirement] base 案例的融资规模锚定的是下一轮可融资证明点，而不是一次性覆盖完整 3 年现金消耗。'
- id: A21
  name: 下行情景变量
  value: 生产转化整体晚两个季度，退出期 ACV 掉向 $102K，毛利率则落在约 75%。
  unit: scenario
  source: '[BP risks; research sensitivityCases] 反映价格承压、rollout 变慢，以及部署更像服务项目时的下行。'
- id: A22
  name: 上行情景变量
  value: 扩张提前一个季度落地，退出期 ACV 提到约 $132K，毛利率改善到 82%。
  unit: scenario
  source: '[BP businessModel.expansionLevers; BP experimentRoadmap credential-scope daemon attach test] 上行情景假设高级模块顺利增购，而且不用再额外大幅扩招。'
