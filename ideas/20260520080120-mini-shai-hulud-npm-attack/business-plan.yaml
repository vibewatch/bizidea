slug: npm-ai-session-guard
date: '2026-05-20'
executiveSummary: >-
  npm AI Session Guard should start as a workstation-first control for
  AI-triggered npm installs, not as a broad software supply-chain suite. The
  first customer is a Series B-D software, infrastructure, or developer-tools
  company with 100-500 engineers, a formal Claude Code or Cursor rollout, and a
  platform-security team that owns managed developer-laptop policy. The buying
  trigger is usually a fresh npm compromise, internal red-team finding, or AI
  rollout review that exposes .claude and .vscode persistence as a control gap
  their current Snyk, Semgrep, or Socket spend does not close. Research supports
  a large category with an estimated $6.4B TAM, $960M beachhead SAM, and a
  modeled $9.6M year-3 SOM, but the company should pursue only the narrow wedge
  of audit-first npm interception plus hook-file integrity before expanding into
  broader agent governance or multi-registry policy. Product sequencing should
  begin with Claude Code and VS Code surfaces, default to audit mode, and earn
  the right to add blocking and credential scoping only after pilots prove low
  false positives and fast deployment. The strongest strategic asset is a
  differentiated workstation telemetry set around publish bursts, Bun-backed
  payloads, and unauthorized hook-file writes that legacy SCA tools do not
  collect. The biggest disconfirming risks are rapid bundling by Endor or Socket
  and the possibility that local blocking creates enough friction that engineers
  disable the product. Exact enterprise seat counts for AI coding tools and the
  real enforcement limits of managed hooks versus filesystem-level controls are
  still gaps in the inputs, so the first year must resolve those unknowns.
problem:
  - AI-session-targeted npm attacks now persist by writing to .claude and .vscode files on developer machines, so one install can compromise every later coding session.
  - Existing SCA, proxy, and repo-security tools mostly scan dependencies, CI, or registries and do not reliably stop agent-initiated local installs or unauthorized hook-file mutations.
  - Security teams need a control they can deploy quickly across managed laptops without breaking legitimate package installs so often that developers bypass it.
solution:
  - Ship a local-first npm shim that intercepts agent-initiated installs, scores publish-velocity bursts, provenance gaps, and known campaign fingerprints, and defaults to audit mode before selective blocking.
  - Watch .claude and .vscode persistence surfaces for unauthorized writes, tie each mutation to the triggering package or process, and emit rollback plus SIEM-ready evidence.
  - Add a credential-scope daemon after pilot trust is earned so AI-agent processes receive short-lived scoped cloud and Git credentials instead of full developer secrets.
whyWeWin:
  - The product is aimed at the exact workstation blind spot validated by TanStack and AntV style incidents, where buyers now recognize .claude and .vscode as security-relevant surfaces.
  - A lightweight local shim plus managed deployment path gives faster proof than proxy-heavy or broader agent-governance platforms that require larger enterprise rollouts.
  - Telemetry from blocked install bursts, Bun bootstrap patterns, hook-file writes, and override decisions can compound into a proprietary detection and policy dataset.
strategicChoices:
  beachhead: >-
    Platform-security and DevSecOps teams at 100-500 engineer software,
    infrastructure, and developer-tools companies that have formally rolled out
    Claude Code or Cursor, run npm-heavy JavaScript or TypeScript workflows, and
    can enforce laptop policy through managed hooks or endpoint tooling.
  wedgeRationale: >-
    This wedge creates faster proof than broad AI-security because one paid pilot
    can protect a single engineering org's live npm install path and session
    files, show blocked or flagged incidents within weeks, and coexist with
    existing SCA budgets instead of demanding platform replacement.
  sequencingRationale: >-
    Start with audit-only npm interception and hook-file integrity on Claude Code
    and VS Code because those surfaces are directly validated by the incident and
    can deploy with the least product breadth. Add selective blocking only after
    false-positive tuning is credible, then layer credential scoping and broader
    package-manager coverage once buyers trust the workstation control plane.
  notYet:
    - Full multi-registry coverage across PyPI, Cargo, Go modules, and every CI environment in the first year
    - Broad agent-governance policy for all AI workflows outside package install and persistence control
    - Consumer or solo-developer monetization as the core business
    - Deep Windows-first endpoint coverage before Claude Code plus VS Code deployments are repeatable on the initial managed-fleet target
market:
  tam: "$6.4B estimated TAM based on global employed developers using AI tools and a conservative $15 per seat per month category price anchor."
  sam: "$960M estimated SAM for organizations with formal platform-security ownership and active AI-agent rollout that match the workstation-control beachhead."
  som: "$9.6M modeled year-3 SOM based on winning about 1% of SAM through a focused design-partner motion before incumbents fully bundle the wedge."
  segments:
    - "Primary segment: platform-security teams at 100-500 engineer software companies with formal Claude Code or Cursor rollout and managed developer laptops"
    - "Secondary segment: larger enterprise security teams that want workstation-level controls to complement existing SCA and proxy tooling"
  buyingProcess: >-
    The day-to-day champion is usually the security engineer or staff platform
    engineer responsible for AI-tool hardening, while the economic buyer is the
    head of platform security or VP engineering. Sales should begin as a paid
    pilot after an incident, advisory, or rollout review, then convert when the
    buyer sees meaningful detections or blocked events without unacceptable
    install friction.
product:
  mvp: >-
    The MVP should cover npm interception for Claude Code and VS Code driven
    sessions, publish-burst and package-fingerprint scoring, audit-first policy
    decisions, .claude and .vscode integrity monitoring, and Slack or SIEM
    alerts. It should not attempt full multi-registry or full endpoint
    governance; the goal is to stop or surface the exact persistence pattern
    shown in recent attacks.
  sixMonth: >-
    Launch 3-5 paid pilots with audit-only npm interception, package and
    hook-file evidence trails, red-team tested detection for TanStack and
    AntV-style payloads, and an exception workflow that security teams can tune
    without engineering support.
  twelveMonth: >-
    Convert the best pilots to production with selective blocking, managed policy
    rollout, SIEM integrations, and the first credential-scope daemon for
    GitHub and major cloud credential chains in supported environments.
  twentyFourMonth: >-
    Expand to additional AI coding surfaces and adjacent package managers only
    after npm retention and deployment speed are proven, then unify workstation
    policy, persistence monitoring, and credential scoping into a broader
    developer-machine trust boundary product.
  keyBets:
    - Audit-only mode will keep enough developer trust to collect the tuning data needed before blocking is enabled.
    - Claude Code plus VS Code coverage reaches enough early accounts to produce repeatable sales before wider agent fragmentation matters.
    - Recreated Bun-backed attack chains can be intercepted early enough in the local install path to prevent persistence in supported environments.
    - Buyers will fund a new workstation control instead of waiting for existing AppSec vendors to add the feature.
gtm:
  wedge: >-
    Sell a 45-60 day paid pilot that protects one engineering org's managed
    Claude Code and VS Code install path, starts in audit mode after an npm
    incident or rollout review, and converts once the team trusts the evidence,
    exceptions, and blocking accuracy.
  channels:
    - Direct founder-led outbound to platform-security and DevSecOps leaders after public AI-tool rollouts, supply-chain incidents, or internal hardening reviews
    - Free individual CLI tier that seeds bottom-up adoption and supplies early telemetry on real install workflows
    - Partnerships with managed-hook vendors, workstation-management tools, and artifact-management ecosystems that already touch enterprise developer fleets
  funnelTargets: "Target-account conversation→qualified paid pilot 20-30%, pilot→production 50%+, and production→second-team or broader rollout 60%+ within 9 months."
  pricing: >-
    Price the core product per protected AI-coding seat because adjacent buyers
    already accept contributor-based AppSec pricing and the value maps to managed
    developer rollout. A credible starting structure is $20-$30 per seat per
    month for the shim plus hook monitoring, with $40-$60 per seat per month for
    enterprise policy, SIEM integration, and credential scoping; pilots should
    fit in a $15k-$30k budget so teams can buy before annual security planning.
businessModel:
  revenueStreams:
    - Annual subscription for protected AI-coding seats with managed install-policy enforcement
    - Premium enterprise package for credential scoping, SIEM integrations, and centralized policy administration
    - Expansion revenue from additional package-manager surfaces, business units, and adjacent workstation trust controls
  unitOfValue: Protected AI-coding seat with covered install events and persistence-policy enforcement
  targetGrossMarginPct: 80
  expansionLevers:
    - Expand from audit mode to blocking and credential scoping inside existing accounts
    - Add pnpm, Yarn, and later non-JavaScript ecosystems after npm proof is repeatable
    - Grow from one engineering org to company-wide developer-laptop policy and incident evidence workflows
strategyMap:
  northStarMetric: Number of protected AI-coding seats running in production with blocking or audit policy enabled and zero unauthorized hook-file persistence events
  inputMetrics:
    - Paid pilot to production conversion rate
    - Percentage of flagged installs later confirmed as malicious or policy-violating
    - Developer override or disable rate on protected seats
    - Median time to deploy the first 100 managed seats
    - Percentage of simulated TanStack and AntV style payloads stopped before persistence
    - Net retention from expanded seat counts and add-on modules
  moatsToBuild:
    - Workstation telemetry corpus linking publish bursts, Bun bootstrap behavior, hook-file mutations, and final analyst verdicts
    - Policy tuning engine shaped by override and exception data from real enterprise developer fleets
    - Deployment playbooks across managed hooks, MDM, and artifact-management ecosystems that reduce time-to-value versus broader platforms
  killCriteria:
    - Fewer than 5 paid pilots after 40 target-account conversations in the beachhead
    - Pilot to production conversion below 50% after the first 6 paid pilots
    - More than 15% of protected seats disable, bypass, or require permanent exceptions within 30 days of rollout
    - Controlled recreations of TanStack or AntV style payloads still reach persistence in more than 20% of supported test environments after 6 months of product work
  mermaid: |
    flowchart LR
      Wedge[AI session npm wedge] --> MVP[Audit-first shim and hook monitor MVP]
      MVP --> Proof[Blocked payloads and trusted pilots]
      Proof --> Expansion[Credential scope and wider workstation policy]
investorMemo:
  verdict:
    call: Watch
    conviction: Severe pain and a disciplined wedge make this investable to track closely, but conviction stays capped until the company proves low-friction deployment and a window before Endor or Socket bundle it.
    whyBelieve: The startup targets a newly visible workstation control gap with a coherent first customer, buying trigger, deployment path, and measurable proof point.
    whyDoubt: The window may be short because incumbents already sell into the same buyer and false-positive friction could turn a real problem into an unacceptable daily annoyance.
    nextDiligence: Validate 3-5 paid pilots that recreate recent attack patterns, deploy across managed AI-tool fleets in under 30 days, and hold disablement below the planned threshold.
  firstCustomer:
    title: Platform-security lead at a 150-400 engineer AI-enabled software company
    profile: A Series B-D software, infrastructure, or developer-tools company with managed macOS or Linux developer laptops, a formal Claude Code or Cursor rollout, and npm-heavy internal workflows.
    trigger: A recent npm compromise, internal red-team finding, or AI-rollout security review reveals that .claude and .vscode persistence is outside current controls.
    buyer: Head of Platform Security or VP Engineering
    initialContract: "$15k-$30k paid pilot for 100-250 protected engineers over 45-60 days, converting to roughly $50k-$120k annual ACV once managed policy, blocking, and SIEM workflows expand org-wide."
  mustBeTrue:
    - At least one-third of qualified beachhead accounts must treat workstation-level AI-session persistence as a funded control gap now rather than a future roadmap request.
    - Audit-first pilots must produce actionable detections or blocked red-team payloads within 30 days without more than 15% of seats disabling or bypassing the product.
    - The shim and hook monitor must stop recreated TanStack and AntV style payloads before persistence on supported environments.
    - Customers must pay effective pricing above $20 per protected seat per month or above $50k annual ACV for production deployments of meaningful size.
    - Endor, Socket, Snyk, and Semgrep must fail to neutralize the wedge before the startup establishes at least 10 production customers and a differentiated telemetry set.
  diligenceQuestions:
    - How many centrally managed Claude Code, Cursor, and Codex seats already exist in 100-500 engineer target accounts?
    - Is managed-hook or MDM rollout enough to enforce the product before lifecycle scripts run, or is deeper endpoint control required?
    - What false-positive and added-latency thresholds cause engineering teams to disable or bypass workstation controls?
    - In a real bake-off, which detections are uniquely better than Endor, Socket, Snyk, or internal scripts?
    - Can the company gather enough install and hook telemetry to improve detection while preserving the local-first privacy posture buyers expect?
operatingAssumptions:
  - assumption: Audit-only launch mode will keep developer trust long enough to gather tuning data for selective blocking.
    basis: research.yaml
    validationTest: Run 5 design-partner pilots and measure seat disablement, exception volume, and weekly override rates during the first 30 days.
    decisionImpact: If false, the company must narrow policy scope further or remain an evidence-only monitoring product for longer.
  - assumption: Claude Code and VS Code coverage are enough to win the first 5 production customers before adding more agent surfaces.
    basis: idea.yaml
    validationTest: Track agent and editor mix across the first 20 qualified opportunities and confirm at least 70% can deploy meaningful coverage without new surface work.
    decisionImpact: If false, roadmap and hiring must shift earlier toward broader agent adapters, slowing wedge focus.
  - assumption: Platform-security teams will fund a standalone workstation control if it fits existing contributor-priced AppSec budgets.
    basis: research.yaml
    validationTest: Test three pilot and annual package structures in 15 budget-owner conversations and secure at least 2 paid pilots at the target range.
    decisionImpact: If false, the company must repackage as an add-on sold through partners or broaden into a larger control plane.
  - assumption: Managed hooks, endpoint tooling, or MDM provide a workable deployment path for the initial fleet without custom services in every deal.
    basis: research.yaml
    validationTest: Deploy the first 3 pilots using a standard rollout playbook and keep security-engineering setup under 2 weeks per customer.
    decisionImpact: If false, implementation cost rises and the company must add services capacity or rethink the product architecture.
  - assumption: Early workstation telemetry creates a meaningful detection moat before incumbents add equivalent hook-file monitoring.
    basis: operator judgment
    validationTest: Compare false-positive precision and unique detection signals across the first 6 pilots against incumbent evaluations and published feature launches.
    decisionImpact: If false, long-term differentiation weakens and fundraising should assume a narrower outcome window.
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: ICP and buyer-trigger interviews
    hypothesis: Recently activated AI-tool rollouts and fresh npm incidents create enough urgency for a paid workstation-control pilot.
    successMetric: 20 target-account interviews completed with at least 8 qualified prospects confirming an active trigger and 5 requesting pilot follow-up.
    owner: Security product founder
  - horizon: "0-90 days"
    experiment: Recreate TanStack and AntV style payloads in a controlled lab
    hypothesis: A local shim plus hook-file watcher can stop persistence before unauthorized writes land on supported developer environments.
    successMetric: At least 80% of supported test cases are blocked or fully surfaced before persistence with less than 200 ms median verdict latency.
    owner: Founding eng
  - horizon: "90-180 days"
    experiment: Audit-only managed-fleet pilot
    hypothesis: Buyers will tolerate an audit-first deployment if alerts are explainable and exception handling fits platform-security workflows.
    successMetric: Launch 3 paid pilots with median rollout under 30 days and fewer than 15% of seats disabled or bypassed in the first month.
    owner: Solutions engineer
  - horizon: "90-180 days"
    experiment: Pricing and packaging test
    hypothesis: Seat-based pricing with an enterprise add-on converts better than pure volume or proxy-style pricing because buyers budget around managed developer seats.
    successMetric: Preferred package wins in at least 6 of 10 pricing conversations and appears in 2 signed pilot scopes.
    owner: Security product founder
  - horizon: "6-12 months"
    experiment: Selective blocking and SIEM workflow rollout
    hypothesis: Customers will move from audit mode to blocking if exception handling stays precise and alerts fit existing incident pipelines.
    successMetric: At least 2 pilots enable blocking in production with confirmed malicious or policy-violating events and less than 10% manual override volume.
    owner: Detection engineer
  - horizon: "12-18 months"
    experiment: Credential-scope daemon attach test
    hypothesis: Adding short-lived scoped GitHub and cloud credentials materially improves pilot-to-production conversion and account expansion.
    successMetric: 3 production customers enable the daemon and show either higher conversion, higher seat expansion, or lower secret-exposure findings than shim-only deployments.
    owner: Detection engineer
operations:
  - Maintain a red-team regression corpus for recent npm campaigns and run it before each policy release.
  - Operate a local-first decision pipeline that stores only the minimum telemetry needed for policy tuning, alerts, and audit evidence.
  - Review false positives, overrides, and disablement weekly with each pilot before broadening enforcement scope.
  - Standardize deployment through managed hooks, endpoint tooling, SIEM connectors, and artifact-management partners rather than custom one-off services.
team:
  - role: Security product founder
    startTiming: Month 0
    rationale: Own design-partner sales, buyer discovery, pricing, and product scope so the company stays focused on one urgent workstation control gap.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the npm shim, hook monitor, lab harness, and first policy engine fast enough to support paid pilots.
  - role: Detection engineer
    startTiming: Month 2
    rationale: Own attack-signal tuning, false-positive reduction, and later credential-scope daemon work once pilots begin generating telemetry.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Turn design partners into repeatable deployments, manage managed-fleet rollout, and codify exception-handling playbooks.
  - role: GTM lead
    startTiming: Month 9
    rationale: Add pipeline capacity only after the first pilots convert and the incident-led sales motion shows repeatability.
milestones:
  - horizon: "0-12 months"
    items:
      - Close 3-5 paid pilots in the initial AI-tool rollout beachhead.
      - Convert at least 2 pilots into annual production deployments.
      - Prove controlled TanStack and AntV style payload blocking on supported environments while keeping first-month seat disablement below 15%.
  - horizon: "12-24 months"
    items:
      - Reach 8-10 production customers with repeatable managed-fleet deployment under 30 days.
      - Launch credential scoping and selective blocking as attachable production modules.
      - Expand successfully from one engineering org into broader seat counts or second-team deployments inside existing customers.
  - horizon: "24-36 months"
    items:
      - Add adjacent package-manager or agent surfaces only after npm retention and expansion are proven.
      - Build a differentiated workstation threat-intelligence and policy dataset that improves precision versus incumbent alternatives.
      - Establish evidence-based readiness for a larger platform expansion or a seed-to-series A financing step.
risks:
  - risk: Endor, Socket, or another incumbent bundles hook-file monitoring and local package controls before the startup earns market credibility.
    likelihood: High
    impact: High
    mitigation: Win the first 10 production customers quickly, bias toward the fastest deployment path, and build differentiated workstation telemetry rather than a generic scanning feature set.
  - risk: False positives or install latency create enough engineering friction that customers disable enforcement.
    likelihood: High
    impact: High
    mitigation: Start in audit mode, tune against a red-team corpus and pilot data, and gate blocking behind explicit precision thresholds and customer review workflows.
  - risk: Managed hooks or wrapper-level controls fail to stop some attack chains before persistence or exfiltration begins.
    likelihood: Medium
    impact: High
    mitigation: Keep supported environments narrow, validate against recreated Bun-backed payloads, and add deeper endpoint measures only after the first path is proven.
  - risk: Actual AI-coding seat counts or central policy control in the 100-500 engineer segment are lower than modeled.
    likelihood: Medium
    impact: Medium
    mitigation: Verify seat counts and deployment authority early, and shift the beachhead upward toward larger centrally managed teams if mid-market rollout proves too immature.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to prove the workstation wedge with 3-5 paid pilots, ship the
    audit-first shim plus hook monitoring stack, validate selective blocking and
    credential scoping in production, and establish enough differentiated
    telemetry and deployment evidence to justify the next financing step.
