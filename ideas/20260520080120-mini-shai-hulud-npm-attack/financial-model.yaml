slug: npm-ai-session-guard
date: '2026-05-20'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: Starts in the first full month after the 2026-05-20 business-plan date.
- id: A2
  name: Opening cash and round close
  value: '2600'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M; BP fundingAsk runwayMonths 18] Base case assumes a $2.6M pre-seed closes at model start to reach the Y2 proof point plus about six months of buffer.'
- id: A3
  name: Starting customers (M1)
  value: '0'
  unit: organizations
  source: '[BP executiveSummary; BP milestones 0-12 months] The company starts pre-revenue and must earn paid pilots before production.'
- id: A4
  name: Pilot pricing anchor
  value: 15-30
  unit: USDK per 45-60 day pilot
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] Paid pilots must fit inside a $15k-$30k budget to move before annual planning.'
- id: A5
  name: Initial production ACV
  value: '72'
  unit: USDK per customer per year
  source: '[BP investorMemo.firstCustomer.initialContract $50k-$120k annual ACV] Base case starts near the lower-middle of the stated production range.'
- id: A6
  name: Exit blended ACV
  value: '120'
  unit: USDK per customer per year
  source: '[BP gtm.pricing $40-$60 premium tier; BP businessModel.expansionLevers] Year-3 ACV rises with more protected seats plus blocking, SIEM, and credential-scoping attach.'
- id: A7
  name: Revenue recognition convention
  value: New logos contribute half a month in landing month and quarterly revenue uses average active customers times blended monthly revenue
  unit: policy
  source: '[Startup-finance heuristic] Keeps revenue reconciled to customer counts while reflecting mid-period landings.'
- id: A8
  name: Y1 customer ramp
  value: First paid pilot in M4 and 6 active paying organizations by M12
  unit: organizations
  source: '[BP milestones 0-12 months; BP experimentRoadmap audit-only managed-fleet pilot] Matches 3-5 paid pilots and the first production conversions in year one.'
- id: A9
  name: Y2 customer ramp
  value: Q1Y2 8, Q2Y2 9, Q3Y2 11, Q4Y2 12 active organizations
  unit: organizations
  source: '[BP milestones 12-24 months] Interprets the 8-10 production-customer milestone as roughly 10 production accounts plus a small number of overlapping pilots or expansions.'
- id: A10
  name: Y3 customer ramp
  value: Q1Y3 14, Q2Y3 16, Q3Y3 18, Q4Y3 20 active organizations
  unit: organizations
  source: '[BP milestones 24-36 months; research market.som] A 20-account base case stays small versus the researched $9.6M year-3 SOM and assumes focused expansion, not category domination.'
- id: A11
  name: Blended monthly revenue ladder
  value: Y1 M4-M6 $7K, M7-M9 $7.5K, M10-M12 $8K; Y2 $8.5K to $10K by quarter; Y3 $10K to $11.5K by quarter
  unit: USDK per active customer per month
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract; research reportMemo.willingnessToPay] Converts seat-based pricing into a blended org-level revenue curve with moderate expansion.'
- id: A12
  name: Gross margin target
  value: '80'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] Model uses 79% in Y1 and 80% from Y2 onward as deployment becomes more standardized.'
- id: A13
  name: Core hiring sequence
  value: Founder and founding engineer at start; detection engineer by M2; solutions engineer by M4; GTM lead by M9
  unit: timing
  source: '[BP team] Directly follows the business-plan hiring sequence for the first year.'
- id: A14
  name: Scale hires after proof
  value: Second GTM hire in Q2Y2, third engineer in Q3Y2, first G&A hire in Q4Y3
  unit: timing
  source: '[BP milestones 12-24 months; heuristic: add capacity only after the pilot motion is repeatable and keep post-Y1 hiring lean]'
- id: A15
  name: Loaded monthly payroll bands
  value: Executive $18K; Engineering $17K; Solutions $14K; GTM $15K; G&A $11K
  unit: USDK per FTE per month
  source: '[BP team; startup-finance heuristic] Reflects senior US security-software talent with payroll burden but still lean pre-seed cash comp.'
- id: A16
  name: Non-payroll operating spend
  value: R&D tooling and lab spend starts near $11K-$15K per month, S&M starts founder-led at $3K-$13K per month, and G&A stays lean until late Y3
  unit: USDK
  source: '[BP operations; BP gtm.channels; heuristic: local-first security software with limited implementation services]'
- id: A17
  name: Steady-state CAC
  value: '65'
  unit: USDK per new customer
  source: '[BP gtm.funnelTargets; BP gtm.channels; research reportMemo.competitiveLandscape] Early enterprise security selling with paid pilots and founder-led outbound warrants a high-touch CAC.'
- id: A18
  name: Monthly logo churn for unit economics
  value: '1.6'
  unit: percent
  source: '[Startup-finance heuristic] Early security infrastructure sold on annual contracts should churn below SMB SaaS, but the wedge is still vulnerable to incumbent bundling and deployment friction.'
- id: A19
  name: Cash conversion simplification
  value: Ending cash equals opening cash plus cumulative EBITDA
  unit: policy
  source: '[Startup-finance heuristic] Working-capital swings, debt, and capex are treated as immaterial for this early software model.'
- id: A20
  name: Funding sizing rule
  value: Raise enough to reach the 10-12 production-customer proof point with about six months of cash buffer
  unit: policy
  source: '[BP fundingAsk.runwayMonths 18; model requirement] Base-case sizing is anchored to the next financable milestone, not a full three-year cash-out.'
- id: A21
  name: Downside scenario deltas
  value: Production conversion slips by two quarters, exit ACV falls toward $102K, and gross margin settles near 75%
  unit: scenario
  source: '[BP risks; research sensitivityCases] Captures price compression, slower rollout, and a more services-heavy deployment path.'
- id: A22
  name: Upside scenario deltas
  value: Expansion lands one quarter earlier, exit ACV reaches about $132K, and gross margin improves to 82%
  unit: scenario
  source: '[BP businessModel.expansionLevers; BP experimentRoadmap credential-scope daemon attach test] Upside assumes premium modules attach cleanly without a large extra hiring step.'
