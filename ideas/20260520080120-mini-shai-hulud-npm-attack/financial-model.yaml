scenarios:
  downside:
    description: Pilot conversion slows by roughly two quarters and premium attach stays limited as incumbent bundles compress price.
    y3RevenueK: 1548.0
    y3EbitdaK: -742.0
    cashLowPointK: -95.0
    keyAssumptionChanges:
    - Q4Y3 active customers fall from 20 to 15
    - Exit blended ACV drops from $120K to about $102K
    - Gross margin settles near 75% because deployment stays more services-heavy
  base:
    description: Audit-first pilots convert on plan, seat counts expand inside early customers, and premium modules attach gradually.
    y3RevenueK: 2079.0
    y3EbitdaK: -421.8
    cashLowPointK: 290.1
    keyAssumptionChanges:
    - Base case uses assumptions A1-A20 without additional scenario adjustments
  upside:
    description: Design partners convert faster and credential-scoping or blocking modules attach one quarter earlier without a large hiring step.
    y3RevenueK: 2556.0
    y3EbitdaK: -85.0
    cashLowPointK: 430.0
    keyAssumptionChanges:
    - Q4Y3 active customers rise from 20 to 24
    - Exit blended ACV lifts toward $132K
    - Gross margin improves to about 82% as deployment playbooks standardize earlier
sensitivity:
- variable: ARPU
  downsideCase: Exit blended ACV falls to about $102K as buyers stay on the core tier
  baseCase: Exit blended ACV reaches $120K with moderate premium attach
  upsideCase: Exit blended ACV reaches about $132K with stronger seat expansion and premium modules
  y3RevenueImpactK: -312.0
  cashImpactK: -250.0
- variable: CAC
  downsideCase: CAC rises to $80K because more pilots require founder and engineer time
  baseCase: CAC averages $65K per new customer
  upsideCase: CAC falls toward $55K with tighter incident-led targeting and references
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: Monthly churn drifts to 2.2% as the wedge stays narrow
  baseCase: Monthly churn stays at 1.6%
  upsideCase: Monthly churn improves toward 1.2% once customers add blocking and credential scope
  y3RevenueImpactK: -228.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: Incident urgency fades and conversion stretches from roughly 6 months to 9 months
  baseCase: Pilot-to-production timing remains consistent with the first-year funnel targets
  upsideCase: Reference customers compress the cycle by about one quarter
  y3RevenueImpactK: -255.0
  cashImpactK: -210.0
- variable: gross margin
  downsideCase: Margin sticks near 75% because deployment requires heavier analyst and support work
  baseCase: Margin reaches 80% after the first year
  upsideCase: Margin reaches 82% as rollout and evidence workflows standardize
  y3RevenueImpactK: 0.0
  cashImpactK: -155.0
- variable: hiring pace
  downsideCase: An extra engineer and GTM hire are pulled forward before revenue repeatability is proven
  baseCase: Second GTM hire arrives in Q2Y2, third engineer in Q3Y2, and G&A waits until Q4Y3
  upsideCase: Nonessential hires wait until expansion economics are proven
  y3RevenueImpactK: -40.0
  cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Triggered target accounts] --> Pilots[Paid pilots]
      Pilots --> Customers[Production customers]
      Customers --> Revenue[Seat and module revenue]
      Revenue --> GrossProfit[Gross profit after hosting and support]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from landing 6 active accounts in Y1, converting that base into 12 active organizations by Q4Y2, and then expanding seats and premium modules to reach $2.1M of Y3 revenue.
- checkName: Must go right
  finding: The model needs audit-first pilots to stay below the 15% disablement threshold so conversions happen without building an implementation-heavy services bench.
- checkName: Model breaks if
  finding: The downside case shows that slower sales cycles plus lower ARPU can push cash slightly below zero before the next round even without a major hiring mistake.
- checkName: Next-round proof
  finding: The next financing case is strongest once the company shows 10-12 production customers, sub-30-day deployment, and repeatable attach of blocking or credential-scoping modules.
sanityChecks:
  ruleOf40: Y3 growth 100.3% + EBITDA margin -20.3% = 80.0%
  burnMultiple: Y3 burn multiple 0.4x (burn $421.8K divided by $1,041.0K of net new revenue).
  revenuePerFte: $260K Y3 revenue per ending FTE (benchmark roughly $200K-$400K for SaaS).
  flags:
  - Base case is still EBITDA-negative in Y3, so the company likely needs a follow-on round before true breakeven.
  - Cash bottoms at only $290.1K, so a slower pilot-conversion curve or one large implementation-heavy customer would tighten runway quickly.
  - The model assumes incumbents do not compress pricing below roughly $8.5K-$10K monthly revenue per active organization once the wedge becomes more visible.
