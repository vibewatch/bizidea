differentiator: 现有 SCA 工具看的还是依赖图和已知漏洞库；没有产品把 AI 编码代理当成“行为主体”，也没有工具去盯这些代理真正使用的会话 hook 文件。这个产品的核心 IP，是把实时发布速度异常检测（抓住 22 分钟 637 个版本这种爆发模式）和专门为 Claude Code、Codex、VS Code AI 扩展配置打造的 hook 文件完整性监控绑在一起。凭证范围守护进程也有防守性，因为它要求深度接入开发者本地 keychain 和云 SDK 的凭证链；部署越深，切换成本越高，时间越久越黏。
