    - 持久化层会通过 systemd 用户服务和 macOS LaunchAgent 每小时轮询 GitHub commit 搜索，获取 RSA 签名指令；三周前 SAP 遭攻陷时，用的也是同一套 Mini Shai-Hulud 工具链。
