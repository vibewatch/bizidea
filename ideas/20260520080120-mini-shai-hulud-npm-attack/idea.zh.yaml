topRisks:
- name: 现有厂商快速补功能
  description: 一旦这个方向公开，Socket.dev 或 Snyk 可能在 6–12 个月内就把 AI 会话 hook 监控和发布速度检测补成现有产品的一项功能。
  mitigation: 尽快签下 10+ 家付费企业客户，在现有厂商反应过来前先把凭证范围守护进程做出来；同时争取和 npm、AI 工具厂商签排他性数据共享协议。
- name: 误报摩擦
  description: 如果把正常 npm 包也拦得太狠，开发者信任会立刻崩；只要一次误报拖慢生产部署，平台安全团队就可能把工具直接关掉。
  mitigation: 默认以只审计模式上线，先跑 30 天校准期；把误报率作为核心产品指标重点投入，并公开放到准确率仪表盘上。
- name: AI 工具 API 碎片化
  description: Claude Code、Codex、Cursor 以及未来更多 AI 编码工具，各自的会话 hook schema 和配置文件路径都不同；市场一旦碎片化，维护负担会持续抬升。
  mitigation: 把 hook schema 库开源，吸引厂商共同维护；前 12 个月优先把 Claude Code 和 VS Code 做透，再有节奏地扩到其他工具。
