jobsToBeDone:
- job: 当公司把 AI 编码工具全员铺开时，帮平台安全团队把软件包安全策略管起来，避免一次供应链攻陷直接变成整套云凭证外泄。
  currentAlternative: 在 CI 里用 Snyk 或 Socket.dev 设策略闸门，再靠开发者自觉遵守本地安装规范。
  successMetric: 部署后 30 天内，AI 会话 hook 文件零次未授权改写，AI 代理进程零次能拿到长期云凭证。
- job: 当 npm 出现新的批量发布异常时，帮 DevSecOps 工程师在受感染包装进开发者机器前先发现并控住，避免演变成凭证窃取事故。
  currentAlternative: 手工盯 npm 安全公告和社区披露后的 Slack 告警，通常要晚 24–48 小时。
  successMetric: 发布异常发生后 5 分钟内通知 DevSecOps，并在安装时自动拦住受影响的软件包版本。
