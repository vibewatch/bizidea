problem: Claude Code、Codex、VS Code 这类 AI 编码工具，已经成了 npm 供应链攻击的头号目标：恶意包会把 hook 写进 AI 会话启动文件，之后每次新会话都会重新执行载荷。现有软件成分分析工具只看依赖图和已知 CVE，对 AI 会话配置文件、SessionStart hook，或“22 分钟内发布 637 个版本”这种发布时间异常几乎没有可见性。更麻烦的是，一旦开发者机器上的包被攻陷，环境里的整套云凭证都能被拿走，AI 编码代理本身还会反过来变成持久化机制。
targetUser:
  primary: 已在工程团队里落地 Claude Code、GitHub Copilot 或 OpenAI Codex 的中大型软件公司里的平台安全工程师或 DevSecOps 负责人
  secondary: 在重视安全的团队里，自行管理 AI 编码环境的高级软件工程师
  buyer: 拥有 50+ 名使用 AI 编码助手工程师公司的平台安全负责人或工程副总裁
startupThesis:
  nonObviousInsight: AI 编码代理正变成新的浏览器扩展——它们拿着开发者级权限按需吃进不可信的 npm 包，还会改写能跨会话持久化的配置文件；但现有安全工具从来没按这个威胁模型设计，这个盲区已经被攻击者武器化。
  beachhead: 滩头市场是 Series B–D、工程师规模 100–500 人、已经正式推行 Claude Code 或 Codex，并且由团队统一制定开发者笔记本安全策略的 DevSecOps 团队。
  wedge: 先上一个轻量 CLI shim：凡是 AI 编码代理触发的 npm install，都先拦截，再实时校验软件包溯源和发布速度异常；只要它想改写 Claude Code hook 或 VS Code tasks.json 这类 AI 会话 hook 文件，就直接阻断或隔离。
  whyNowCatalyst: 2026 年 5 月的 Mini Shai-Hulud 攻击已经证明：AI 编码会话完全可以通过 npm 被植入后门，而且载荷会在此后的每次 AI 会话里反复执行——这等于出现了一类全新的开发者机器持久化攻陷，而现有 SCA 工具根本抓不到。
  ventureScalePath: 先从面向 AI 代理会话的 npm shim 切入；等 AI 代理开始大量使用 PyPI、Cargo、Go modules 等其他包管理器后，再扩到多生态；接着把凭证范围控制补上，给 AI 代理进程发临时、最小权限的 token；最后做成面向全公司的开发者机器信任边界平台。
solution: 产品分三层：（1）一个可直接替换的 CLI shim，包住 npm，专门拦 AI 编码代理发起的安装，在放行前先检查发布速度、账号接管信号和 hook 文件改动；（2）一个会话配置监控器，盯住 AI 会话启动文件，一旦出现未授权改写就告警或回滚；（3）一个凭证范围守护进程，只给 AI 代理进程发短期、进程级的云 token，这样即便软件包彻底失守，也拿不到长期 AWS、GCP 或 GitHub 凭证。整个平台要求在 200 ms 内给出判定，不打断 AI 编码工作流，并能接入现有 SIEM 和 Slack 告警链路。
goToMarketSeed:
  firstCustomer: 第一批客户应该是 Series C 的金融科技或 dev-tools 公司：工程师 150–400 人，已经把 Claude Code 作为公司标准，并且有 2–5 人的平台安全团队专门负责开发者笔记本策略。
  buyingTrigger: 平台安全团队读到 Mini Shai-Hulud 事故报告后，会意识到：自己推动的 Claude Code rollout，已经打开了一块现有 Snyk 或 Socket.dev 许可证根本看不见的凭证窃取攻击面。
  currentAlternative: 今天的替代方案通常是用 Snyk 或 Socket.dev 做 SCA，再靠手工政策文件提醒工程师别装不可信的软件包——没有工具会专门盯 AI 会话 hook 文件，或盯 AI 代理发起的安装。
  switchingReason: Snyk 和 Socket.dev 都不会在安装时监控 AI 会话配置文件，也抓不到发布速度异常；这个产品正好补上这块空白，而且 10 分钟装好 CLI shim 就能用，现有 npm 工作流不用改。
  pricingHypothesis: 按席位收 SaaS 费：每位工程师每月 $15–25；个人开发者有免费档，但限 1 个席位。企业合同如果加上 SSO、SIEM 集成和凭证范围守护进程，价格可到每位每月 $40–60。
