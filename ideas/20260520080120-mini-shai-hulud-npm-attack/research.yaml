categoryDynamics:
  growthRate: 13.6x increase in open-source malware advisories since January 2024
  growthRateSourceRefs: [43]
  tailwinds:
    - point: AI-tool adoption is already broad among developers, expanding the surface area for agent-aware security controls.
      sourceRefs: [44, 48]
    - point: Security leaders report widespread AI-agent production usage but immature AI-security tooling.
      sourceRefs: [45]
    - point: Buyers are prioritizing malicious open-source defense and many expect security budgets to rise.
      sourceRefs: [43]
  headwinds:
    - point: Developers remain skeptical of AI output and avoid AI for some higher-responsibility workflows, which may slow security-control standardization around agents.
      sourceRefs: [44]
    - point: Adjacent incumbents can bundle this wedge into broader platforms faster than a startup can build full-suite breadth.
      sourceRefs: [28, 29, 32]
    - point: Aggressive blocking of lifecycle scripts risks user backlash if detection quality is not clearly better than manual policy.
      sourceRefs: [17, 21]
competitors:
  - name: Endor Labs
    stage: scale-up
    wedge: Hook-based agent governance plus package firewall deployed through enterprise policy and endpoint channels.
    pricing: Free developer tier; broader platform sold via Core and Pro enterprise packages.
    strength: Closest product adjacency, strong category framing, and enterprise-ready governance story.
    weaknessVsUs: Heavier deployment model and broader platform scope leave room for a faster, lighter workstation-first product.
    sourceRefs: [28, 29, 30, 41]
  - name: Socket Security
    stage: scale-up
    wedge: Registry intelligence, GitHub integration, and enterprise firewall proxy across package ecosystems.
    pricing: Custom startup and enterprise pricing; open-source usage is free.
    strength: Strongest npm-specific incident research and existing buyer trust at the package-security layer.
    weaknessVsUs: Current products focus on proxy, repo, or advisory workflows rather than direct monitoring of .claude and .vscode persistence.
    sourceRefs: [32, 35]
  - name: Snyk
    stage: incumbent
    wedge: Broad developer-first AppSec suite anchored in SCA, SAST, IaC, and platform integrations.
    pricing: Team and enterprise tiers sold per contributing developer, with free entry for individuals and small teams.
    strength: Existing budget line and broad deployment footprint make it a default substitute in procurement.
    weaknessVsUs: Scanning is centered on repos and CI rather than in-line blocking of agent-initiated local installs.
    sourceRefs: [37, 38]
  - name: Semgrep
    stage: incumbent
    wedge: Code, secrets, and supply-chain scanning with contributor-based pricing and strong developer workflow integration.
    pricing: Supply Chain Teams starts at $30 per contributor per month; enterprise pricing is custom.
    strength: Clear price anchor and broad security workflow fit for engineering teams.
    weaknessVsUs: Supply-chain coverage remains scan-centric and does not specialize in AI-session persistence files.
    sourceRefs: [39]
  - name: Chainguard
    stage: scale-up
    wedge: Trusted, rebuilt package catalog with SLSA-oriented provenance and zero-known-vuln positioning.
    pricing: Custom enterprise pricing.
    strength: Strong prevention story for organizations willing to standardize on hardened artifacts.
    weaknessVsUs: It changes the artifact source rather than policing what an AI agent does on a developer workstation in real time.
    sourceRefs: [40]
regulatoryTechnicalConstraints:
  - point: Valid provenance statements and trusted publishing reduce some risks but do not prove code safety when attacker-controlled workflows are still trusted.
    sourceRefs: [3, 14, 15]
  - point: Native Claude Code hooks are valuable but some exploit chains can begin before hook execution, so wrapper-level hardening is required.
    sourceRefs: [21, 26, 27]
  - point: npm access tokens now enforce expiry and scoping, but CI and workflow tokens still create valuable install-time secrets on developer and build machines.
    sourceRefs: [16, 24]
  - point: VS Code tasks.json remains a separate persistence surface, so protecting Claude hooks alone is insufficient.
    sourceRefs: [2, 23]
validationSignals:
  - point: TanStack explicitly told users to audit .claude and .vscode after compromise, proving the buyer already accepts this surface as security-relevant.
    sourceRefs: [47]
  - point: The TanStack and AntV waves show malware persisting through hook and task-file writes rather than only through dependency trees.
    sourceRefs: [1, 2]
  - point: Endor and Socket both launched adjacent controls in the same market window, validating budget and urgency.
    sourceRefs: [29, 30, 32]
  - point: Endor's malware report shows buyers now rank malicious OSS as a top 2026 priority and expect higher spend.
    sourceRefs: [43]
openQuestions:
  - What is the real enterprise seat count for Claude Code, Cursor, and other AI coding agents in the target 100-500-engineer segment?
  - Can allowManagedHooksOnly prevent policy bypass at the filesystem level, or only at the Claude runtime level?
  - How early in the npm lifecycle can a wrapper reliably stop Bun-backed payloads across npm, pnpm, and future agent-run package managers?
  - How quickly will Endor or Socket add workstation-level hook-file monitoring once demand is visible?
