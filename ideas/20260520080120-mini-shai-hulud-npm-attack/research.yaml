    supplierPower:
      score: 3
      rationale: The product depends on hook surfaces, package-manager behavior, and cloud credential chains controlled by platform vendors, but those surfaces are documented and already used by third parties.
      sourceRefs: [14, 21, 23]
    buyerPower:
      score: 4
      rationale: Buyers already spend on adjacent AppSec seats and can compare a new product against bundled SCA, proxy, and agent-governance options.
      sourceRefs: [37, 39, 41]
    threatOfEntrants:
      score: 4
      rationale: The problem is newly visible and the initial control is technically buildable, so category validation also lowers the barrier for fast followers.
      sourceRefs: [29, 32, 43]
    threatOfSubstitutes:
      score: 4
      rationale: Teams can respond with existing SCA tools, proxy firewalls, managed hooks, internal scripts, or hardened package catalogs, even if none fully cover the same surface.
      sourceRefs: [17, 28, 32, 40]
    competitiveRivalry:
      score: 5
      rationale: Endor already launched a direct hook-governance offer and Socket already owns mindshare at the npm security layer, making rivalry intense from day one.
      sourceRefs: [28, 30, 32]
  pestle:
    - factor: political
      impact: neutral
      point: Supply-chain hardening is a durable policy priority, but fetched guidance remains broad rather than specifically focused on AI-agent hook files.
      sourceRefs: [18, 19, 42]
    - factor: economic
      impact: positive
      point: Malware exposure is driving budget expansion, and buyers are already conditioned to per-contributor AppSec pricing.
      sourceRefs: [39, 43]
    - factor: social
      impact: positive
      point: AI-tool use is widespread, but trust in AI output is weak, which increases willingness to adopt guardrails around higher-risk workflows.
      sourceRefs: [44]
    - factor: technological
      impact: positive
      point: Malware now abuses .claude and .vscode persistence while vendor hooks expose a control point on the same surface.
      sourceRefs: [2, 21, 23]
    - factor: legal
      impact: neutral
      point: Provenance and trusted publishing reduce some token risks but do not remove liability from shipping malicious code through trusted workflows.
      sourceRefs: [3, 14, 15]
  adoptionFrictionMatrix:
    - friction: False positives on legitimate lifecycle scripts
      severity: high
      affectedBuyer: Platform security lead
      mitigation: Start in audit-only mode, add per-package exceptions, and distinguish trusted build-tool patterns from burst-publish anomalies.
      sourceRefs: [1, 17]
    - friction: Fragmented agent and editor surfaces
      severity: high
      affectedBuyer: Security engineering team
      mitigation: Support Claude Code and VS Code first, then extend policy adapters to other agent surfaces once telemetry proves demand.
      sourceRefs: [21, 23, 27]
    - friction: Native hooks may initialize too late for some attack chains
      severity: high
      affectedBuyer: Security architect
      mitigation: Combine hook policies with wrapper-level environment hardening and local process monitoring.
      sourceRefs: [26, 27]
    - friction: Privacy concerns about sending developer activity to a cloud service
      severity: medium
      affectedBuyer: Engineering leadership
      mitigation: Offer local-first decisions and minimal telemetry, using cloud sync only for policy distribution and aggregated alerts.
      sourceRefs: [28, 32]
