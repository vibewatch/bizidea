    rationale: Conservative bottom-up ARR proxy using GitHub's 100M-developer lower bound, multiplied by Stack Overflow's 70% employed share and 51% daily AI-tool usage among professionals, then priced at half of Semgrep Supply Chain's $30 contributor benchmark (100M x 0.70 x 0.51 x $15 x 12).
    isEstimate: true
    sourceRefs: [39, 44, 48, 49]
  sam:
    value: "$960M"
    rationale: Beachhead slice assumes roughly 15% of the TAM maps to organizations with formal platform-security ownership and active AI-agent rollout, supported by the gap between 71% AI-agent production usage and only 11% mature tooling.
    isEstimate: true
    sourceRefs: [39, 45, 48, 49]
  som:
    value: "$9.6M"
    rationale: Year-3 reachable share modeled as 1% of SAM, consistent with a focused entrant winning a small number of mid-market and enterprise design partners before incumbents fully bundle the control.
    isEstimate: true
    sourceRefs: [28, 29, 32, 45]
