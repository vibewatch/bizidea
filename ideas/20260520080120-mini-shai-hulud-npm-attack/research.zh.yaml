    - 17
    - 21
competitors:
- name: Endor Labs
  stage: scale-up
  wedge: 通过企业策略和端点渠道部署的 hook 治理 + package firewall。
  pricing: 开发者免费档；更完整的平台通过 Core 和 Pro 企业套餐出售。
  strength: 产品邻接性最强，类目 framing 很清楚，而且有企业级治理叙事。
  weaknessVsUs: 部署更重、平台更宽，给了更快、更轻的工作站优先产品留空间。
  sourceRefs:
  - 28
  - 29
  - 30
  - 41
- name: Socket Security
  stage: scale-up
  wedge: 围绕 registry intelligence、GitHub 集成和跨包生态的企业级 firewall proxy。
  pricing: 面向创业公司和企业的定制定价；开源使用免费。
  strength: 在 npm 包安全层的买方信任和心智最强，而且有很深的 npm 专业积累。
  weaknessVsUs: 现有产品更偏代理、代码仓库或建议式流程，而不是直接盯 .claude 和 .vscode 的持久化。
  sourceRefs:
  - 32
  - 35
- name: Snyk
  stage: incumbent
  wedge: 面向开发者的一体化 AppSec 套件，核心覆盖 SCA、SAST、IaC 和平台集成。
  pricing: 团队版和企业版按贡献开发者收费，个人和小团队有免费入口。
  strength: 它本来就在预算线上，而且部署面广，是采购时最自然的替代项。
  weaknessVsUs: 它仍以代码仓库和 CI 扫描为中心，不会在本地安装发生时对 agent 发起的动作做内联拦截。
  sourceRefs:
  - 37
  - 38
- name: Semgrep
  stage: incumbent
  wedge: 代码、secret 和供应链扫描结合的产品，按 contributor 定价，并深度嵌进开发者工作流。
  pricing: Supply Chain Teams 起价是每位 contributor 每月 $30；企业版定制定价。
  strength: 价格锚清楚，而且非常贴工程团队的安全工作流。
  weaknessVsUs: 供应链能力仍以扫描为主，没有专门覆盖 AI 会话持久化文件。
  sourceRefs:
  - 39
- name: Chainguard
  stage: scale-up
  wedge: 以 SLSA 为导向、重建后的可信软件包目录，主打 zero-known-vuln 和 provenance。
  pricing: 企业定制定价。
  strength: 对愿意统一切到加固制品的组织来说，预防叙事非常强。
  weaknessVsUs: 它改变的是制品来源，不是在开发者工作站上实时约束 AI 代理做了什么。
  sourceRefs:
  - 40
regulatoryTechnicalConstraints:
- point: 有 provenance 声明和 trusted publishing 只能降低一部分风险；只要攻击者控制的工作流还在信任边界内，它就证明不了代码安全。
  sourceRefs:
  - 3
  - 14
  - 15
- point: Claude Code 的原生 hook 很有价值，但有些利用链会早于 hook 执行启动，所以还得有 wrapper 层加固。
  sourceRefs:
  - 21
  - 26
  - 27
- point: npm access token 现在虽然有过期和作用域限制，但 CI 和工作流 token 依旧让开发者机和构建机在安装时握着高价值 secret。
  sourceRefs:
  - 16
  - 24
- point: VS Code 的 tasks.json 本身就是另一条持久化表面；只守 Claude hook 远远不够。
  sourceRefs:
  - 2
  - 23
validationSignals:
- point: TanStack 明确要求用户在受攻击后检查 .claude 和 .vscode，这说明买方已经把这块表面视为安全相关。
  sourceRefs:
  - 47
- point: TanStack 和 AntV 两波事件都说明，恶意软件是通过 hook 和 task 文件写入实现持久化，不只是藏在依赖树里。
  sourceRefs:
  - 1
  - 2
- point: Endor 和 Socket 在同一个时间窗口里都推出了相邻控制，进一步证明预算和紧迫性确实存在。
  sourceRefs:
  - 29
  - 30
  - 32
- point: Endor 的恶意软件报告显示，买方已经把恶意 OSS 列为 2026 年的头号优先级之一，而且预期投入更高。
  sourceRefs:
  - 43
openQuestions:
- 在目标的 100–500 人工程团队里，Claude Code、Cursor 以及其他 AI 编码代理到底已经有多少企业席位？
- allowManagedHooksOnly 到底能防的是 Claude 运行时层面的绕过，还是也能压住文件系统层面的策略规避？
- 面对 npm、pnpm 以及未来 agent 驱动的包管理器，wrapper 最早能在生命周期的哪个点稳定拦住基于 Bun 的载荷？
- 一旦需求被看见，Endor 或 Socket 会在多快的时间里补上工作站级 hook 文件监控？
