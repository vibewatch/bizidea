ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      The Mini Shai-Hulud incident is a breaking, high-severity, well-documented event with a primary-source
      investigation confirming a novel attack vector against AI coding tools with millions of exposed developer machines.
  painIntensity:
    score: 5
    rationale: >-
      A single infected npm install on a developer laptop sweeps every cloud credential in the environment and
      backdoors every subsequent AI coding session — an existential risk for a startup and a career-ending event for
      the security lead who missed it.
  wedgeClarity:
    score: 4
    rationale: >-
      The CLI shim approach is a clear, deployable 10-minute integration with a specific technical wedge of AI session
      hook monitoring plus publish-velocity detection; the main risk is that Socket.dev or Snyk adds this as a feature.
  defensibility:
    score: 3
    rationale: >-
      The core detection logic is replicable by well-resourced incumbents, but the AI session hook-schema library and
      credential-scope daemon create integration moats; first-mover advantage in a new attack category provides
      additional time before incumbents react.
  ventureScale:
    score: 4
    rationale: >-
      Developer security tooling is a proven billion-dollar market; AI coding assistant adoption is rapidly expanding
      the addressable TAM as every engineering team becomes a potential supply-chain attack target.
topRisks:
  - name: Incumbent feature addition
    description: Socket.dev or Snyk could add AI-session hook monitoring and publish-velocity detection as a feature within 6–12 months of this idea becoming public.
    mitigation: Move fast to sign 10+ paying enterprise customers and build the credential-scope daemon before incumbents react; pursue exclusive data-sharing agreements with npm and AI tool vendors.
  - name: False positive friction
    description: Overly aggressive blocking of legitimate npm packages would destroy developer trust and cause platform security teams to disable the tool after a single false positive disrupts a production deploy.
    mitigation: Launch in audit-only mode by default with a 30-day calibration period and invest heavily in false-positive rate as a key product metric published on a public accuracy dashboard.
  - name: AI tool API fragmentation
    description: Claude Code, Codex, Cursor, and future AI coding tools each have different session hook schemas and config file locations, creating ongoing maintenance burden as the market fragments.
    mitigation: Open-source the hook-schema library to invite vendor contributions and prioritise Claude Code and VS Code for the first 12 months before expanding methodically to other tools.
