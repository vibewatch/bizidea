problem: >-
  AI coding tools like Claude Code, Codex, and VS Code are now primary attack targets in npm supply-chain campaigns:
  malicious packages inject hooks into AI session startup files so the payload re-executes on every new coding session.
  Existing software composition analysis tools check dependency graphs and known CVEs but have no visibility into AI
  session configuration files, SessionStart hooks, or the timing anomaly of 637 versions published in 22 minutes.
  Meanwhile, compromised packages on developer machines have access to every cloud credential in the environment, and
  the AI coding agent itself becomes the persistence mechanism.
targetUser:
  primary: Platform security engineer or DevSecOps lead at a mid-to-large software company that has adopted Claude Code, GitHub Copilot, or OpenAI Codex for its engineering team
  secondary: Senior software engineer on a security-conscious team who manages their own AI coding environment
  buyer: Head of Platform Security or VP Engineering at a company with 50+ engineers using AI coding assistants
startupThesis:
  nonObviousInsight: >-
    AI coding agents are the new browser extension — they run with developer-level privileges, consume untrusted npm
    packages on demand, and write to config files that persist across sessions — but no security tooling was built with
    this threat model in mind, leaving a blind spot that attackers have already weaponised.
  beachhead: >-
    DevSecOps teams at Series B–D software companies with 100–500 engineers that have formally rolled out Claude Code
    or Codex and own the developer-laptop security policy
  wedge: >-
    A lightweight CLI shim that intercepts every npm install triggered by an AI coding agent, validates package
    provenance and publish-velocity anomalies in real time, and blocks or quarantines any package that attempts to
    modify AI session hook files such as Claude Code hooks or VS Code tasks.json.
  whyNowCatalyst: >-
    The May 2026 Mini Shai-Hulud attack proved that AI coding sessions can be backdoored via npm and that the attack
    re-executes on every subsequent AI session — creating a new category of persistent developer-machine compromise that
    existing SCA tools cannot detect.
  ventureScalePath: >-
    Start with an npm shim for AI agent sessions, expand to all package managers (PyPI, Cargo, Go modules) when AI
    agents use them, add credential-scope enforcement (ephemeral scoped tokens for AI agent processes), and ultimately
    build a developer-machine trust-boundary platform sold enterprise-wide.
solution: >-
  An AI-agent-aware package security platform with three layers: (1) a drop-in CLI shim that wraps npm and intercepts
  installs initiated by AI coding agents, checking publish velocity, account-takeover signals, and hook-file mutations
  before allowing installation; (2) a session-config monitor that watches AI session startup files for unauthorized
  modifications and alerts or rolls back changes; (3) a credential-scope daemon that issues short-lived, process-scoped
  cloud tokens to AI agent processes so even a fully compromised package cannot harvest long-lived AWS, GCP, or GitHub
  credentials. The platform returns verdicts in under 200 ms to avoid disrupting the AI coding workflow and integrates
  with existing SIEM and Slack alerting pipelines.
goToMarketSeed:
  firstCustomer: >-
    A Series C fintech or dev-tools company with 150–400 engineers that has mandated Claude Code company-wide and has a
    dedicated platform-security team of 2–5 engineers responsible for developer-laptop policy
  buyingTrigger: >-
    The platform security team reads the Mini Shai-Hulud incident report and recognises that their Claude Code rollout
    created a credential-harvesting attack surface invisible to their existing Snyk or Socket.dev licenses
  currentAlternative: >-
    Snyk or Socket.dev for SCA plus manual policy documents telling engineers not to install untrusted packages — no
    tool specifically monitors AI session hook files or AI-agent-initiated installs
  switchingReason: >-
    Neither Snyk nor Socket.dev monitors AI session configuration files or publish-velocity anomalies at install time;
    this product fills the gap with a 10-minute CLI shim install and zero changes to the existing npm workflow
  pricingHypothesis: >-
    Per-seat SaaS at $15–25 per engineer per month with a free tier for individual developers capped at one seat;
    enterprise contracts with SSO, SIEM integration, and the credential-scope daemon add-on at $40–60 per seat per month
