scenarios:
  downside:
    description: 试点转正式生产大约晚一个季度，定价更贴近早期生产水平，且政策差异让部署更偏服务。
    y3RevenueK: 1512.0
    y3EbitdaK: -387.6
    cashLowPointK: 292.9
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 只有 6 家而不是 8 家，因为计划中的两家银行转正延后。
    - 每家银行的混合月收入停在约 $24K，而不是 $25K，因为使用费和实施费挂上得更慢。
    - 期末毛利率停在约 66%，因为政策映射和文件标准化仍然太依赖人工。
  base:
    description: 第 1 年拿下 2 个付费试点，Q4Y2 时有 5 家银行在付费，期末每家银行年化收入达到研究中的约 $300K，因为使用费和重复案例复用开始显现。
    y3RevenueK: 2000.0
    y3EbitdaK: 2.9
    cashLowPointK: 741.6
    keyAssumptionChanges:
    - M12 时 2 家付费银行，Q4Y2 时 5 家，Q4Y3 时 8 家。
    - 每家银行已实现月收入从第 1 年以试点为主的 $18K-$24K，逐步提升到第 3 年约 $25K。
    - 只有在模板化和重复案例复用压低服务工作后，毛利率才在期末达到 BP 目标的 70%。
  upside:
    description: 公司注册伙伴进件通道更早启动，第 3 年多转正一家银行，可复用模板也比计划更早拉高单价和毛利。
    y3RevenueK: 2444.0
    y3EbitdaK: 353.9
    cashLowPointK: 1053.9
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 达到 9 家而不是 8 家，因为有一家伙伴导流银行更早转正。
    - 每家银行的混合月收入更早逼近 $26K，因为开户费用和案件量附加更早落地。
    - 随着走廊模板和重复案例复用更快压低人工，期末毛利率可达约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 每家银行的混合年价值停在约 $270K。
  baseCase: 基准情景在期末接近研究里的每家银行 $300K 年化收入。
  upsideCase: 公司注册伙伴和重复案例附加把年化价值抬向每家银行约 $320K。
  y3RevenueImpactK: -200.0
  cashImpactK: -150.0
- variable: CAC
  downsideCase: 以直接面向银行销售为主，CAC 升到约 $150K。
  baseCase: 在创始人亲自打单和一条伙伴渠道帮助下，CAC 保持在约 $123K。
  upsideCase: 伙伴转介把 CAC 压到约 $105K。
  y3RevenueImpactK: -60.0
  cashImpactK: -180.0
- variable: churn
  downsideCase: 由于切口太窄，月度 churn 升到 3.0%。
  baseCase: 一旦案例数据和政策模板嵌入工作流，月度 churn 稳在 2.0%。
  upsideCase: 由于证据图谱嵌入银行工作流，月度 churn 稳在约 1.2%。
  y3RevenueImpactK: -120.0
  cashImpactK: -100.0
- variable: sales cycle
  downsideCase: 试点转生产拉长到约 150 天。
  baseCase: 付费试点大约在 90-120 天内转正。
  upsideCase: 高管背书 能把转正周期压到约 75 天。
  y3RevenueImpactK: -320.0
  cashImpactK: -250.0
- variable: gross margin
  downsideCase: 由于实施持续高度定制，期末毛利率停在约 65%。
  baseCase: 随着模板和复用放大，期末毛利率达到 BP 目标 70%。
  upsideCase: 如果伙伴导流案例更干净、模板成熟更快，期末毛利率可达约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -140.0
- variable: hiring pace
  downsideCase: 在可重复性被证明前，公司提前多招了一位偏服务型员工。
  baseCase: 招聘严格按里程碑解锁，到 Q4Y3 达到 8 个 FTE。
  upsideCase: 有一个支持岗位被推迟到第 6 家生产银行上线之后再招。
  y3RevenueImpactK: -40.0
  cashImpactK: -170.0
modelDiagram:
  title: 银行开户准入单位经济流
  mermaid: "flowchart LR\n  Leads[Bank discovery + formation referrals] --> Pilots[Paid pilots]\n  Pilots --> Production[Production banks]\n  Production --> Volume[Foreign-founder applications]\n  Volume --> Revenue[Platform + usage + implementation revenue]\n  Production --> Reuse[Repeat-case reuse]\n  Reuse --> Revenue\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash and runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入来自这样一条爬坡：第 1 年 2 个付费试点，Q4Y3 时 8 家付费银行，同时每家银行的混合价值保持在研究中约 $300K 年化收入附近。
- checkName: 必须跑对的环节
  finding: 试点转正式生产必须维持在 BP 里 50%+ 的目标附近，因为模型成立的前提，就是不靠庞大销售团队，也能在 Q4Y2 让 5 家银行付费。
- checkName: 模型会在什么情况下失效
  finding: 如果销售周期拖过约 150 天，或毛利率因为部署过度定制而停在 60% 中段， downside 情景下现金低点会在下一轮融资前压到几十万美元量级。
- checkName: 下一轮证明点
  finding: 当 4-5 家银行已进入生产、重复案例复用显著压低分析师介入时长，且一条公司注册伙伴进件通道已经上线时，公司就具备了 种子轮融资依据。
sanityChecks:
  ruleOf40: Y3 增长 92.5% + EBITDA 利润率 0.1% = 92.6%
  burnMultiple: Y2 burn multiple 约为 0.6x：约 $0.59M 的 EBITDA burn 对应约 $0.92M 的净新增 ARR；基准情景在 Q2Y3 转正 EBITDA。
  revenuePerFte: Y3 在 8 名期末 FTE 上实现 $250K/FTE（对标 SaaS 基准 $200-400K）。
  flags:
  - 第 3 年基准情景只靠一条走廊就跑到研究里的 8 家银行 SOM，因此只要少掉几个试点转正，集中买方池里的收入就会很快被压缩。
  - 毛利率只有在政策模板、文件标准化和重复案例复用真正阻止产品滑向服务型实施店时，才有机会达到 70% 目标。
  - 模型默认财务和合规后台大多外包；如果更早把更多控制工作收回内部，融资需求会继续抬高。
  - customersEop 在 Y1 和 Y2 早期把付费试点也算进来了，因此真正完全经常性的生产客户数，会滞后于 名义客户数。
  - 现金按 EBITDA 建模；实际中的年付预收、实施回款节奏或赞助银行尽调成本，都可能让真实现金点位比这里更早或更晚。
