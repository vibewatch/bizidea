slug: foreign-founder-diligence-api
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-08] 模型从带日期的 商业计划 之后的第一个完整运营月开始。'
- id: A2
  name: 期初现金 / 种子前轮融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景采用 BP 区间下限，因为招聘保持克制，但仍给种子轮就绪里程碑留出超过 6 个月缓冲。'
- id: A3
  name: 起始付费银行数（M1）
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先拿下付费试点。'
- id: A4
  name: 付费银行定义
  value: 处于活跃计费状态的付费试点或生产合同
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计的是所有已经为试点、实施或正式生产范围付费的银行。'
- id: A5
  name: 付费试点单价
  value: 约 3 个月 $55K（约 $18K/月）
  unit: USD/bank
  source: '[BP investorMemo.firstCustomer.initialContract $40k-$75k pilot] 模型采用首批印度走廊试点的中位试点价值。'
- id: A6
  name: 正式生产合同单价
  value: 早期生产约 $180K-$220K 年价值，到 Q4Y3 随使用费和实施费挂上后，每家银行年化收入约 $300K。
  unit: USD/bank/year
  source: '[BP investorMemo.firstCustomer.initialContract $150k-$250k annual platform value + Research market.som $2.4M with 8 customers] 模型从 BP 区间起步，并在期末对齐研究中每家银行约 $300K 的 SOM 算式。'
- id: A7
  name: 客户爬坡
  value: M12 时 2 家付费银行，Q4Y2 时 5 家，Q4Y3 时 8 家
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] 基准情景对应第 1 年 2 个付费试点、第 2 年 3-5 家生产银行，以及研究里的第 3 年 8 家银行 SOM。'
- id: A8
  name: 收入确认规则
  value: 期末付费银行数 × 每家银行当期已实现月收入：第 1 年以试点为主，每月 $18K-$24K；第 2 年约 $23K-$25K；第 3 年约 $25K。
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som] 这样能让收入直接对齐客户数和“平台费 + 使用费”模型。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 42%-50%，Y2 为 55%-63%，Y3 为 65%-70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + BP risks] 早期试点服务占比较高，直到走廊模板和重复案例复用把毛利抬向 BP 目标。'
- id: A10
  name: 招聘节奏
  value: M1 创始人/CEO 与创始工程师；M4 合规产品负责人；M7 解决方案/集成；M10 客户运营；M15 GTM/伙伴；M17 第二位工程师；M33 第三位工程师
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 只有在付费试点和政策模板证明可重复后，才逐步扩招。'
- id: A11
  name: 创始人 / CEO 全成本薪酬
  value: $140K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] 采用精简创始人现金薪酬，并计入福利和薪资税。'
- id: A12
  name: 工程全成本薪酬
  value: $175K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 对应种子前轮阶段的高级金融科技/集成人才现金薪酬，股权承担部分总包。'
- id: A13
  name: 合规产品全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP team Compliance product lead + startup-finance heuristic] 对应兼具政策、工作流和产品能力的复合型岗位。'
- id: A14
  name: 解决方案 / 集成全成本薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Solutions and integration engineer + startup-finance heuristic] 既覆盖银行/伙伴集成负责人，又不提前搭一大支服务团队。'
- id: A15
  name: 客户运营全成本薪酬
  value: $125K
  unit: USD/year
  source: '[BP team Customer operations lead + startup-finance heuristic] 更接近高语境的客户成功与质量岗位，而不是人工审核团队。'
- id: A16
  name: GTM / 伙伴全成本薪酬
  value: $170K
  unit: USD/year
  source: '[BP gtm.channels + startup-finance heuristic] 含差旅和浮动薪酬，对应高度集中的企业银行拓展。'
- id: A17
  name: 薪酬分摊到损益表
  value: 创始人 60% 计入 S&M / 20% 计入 R&D / 20% 计入 G&A；工程 100% 计入 R&D；合规产品 70% 计入 R&D / 30% 计入 G&A；解决方案 30% 计入 S&M / 70% 计入 R&D；客户运营 50% 计入 S&M / 20% 计入 R&D / 30% 计入 G&A；GTM 100% 计入 S&M
  unit: allocation
  source: '[BP team role rationales + BP operations] 这样能把创始人主导销售和实施密集型开户准入的成本结构显出来。'
- id: A18
  name: 非薪酬 Opex 爬坡
  value: Y1 早期每月约 $12K，到 Q4Y3 提升到约 $18K/月
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 覆盖云、数据供应商、差旅、法务、保险和审计就绪工具，不假设重型付费获客引擎。'
- id: A19
  name: 现金转换规则
  value: 现金变动 = EBITDA
  unit: formula
  source: '[startup-finance heuristic] 假设在种子前轮阶段，CapEx、税费、融资费用和营运资金时差都不构成实质影响。'
- id: A20
  name: 稳态月度客户流失
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets] 银行工作流一旦上线通常较黏，但模型对这个窄切口仍保持保守。'
- id: A21
  name: CAC 口径
  value: 36 个月总销售与市场费用 ÷ 8 家净新增付费银行
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 这个口径把创始人直销和伙伴导流下的银行获客成本都算进去。'
- id: A22
  name: 用于定融资规模的下一轮里程碑
  value: 4-5 家生产银行、一条公司注册伙伴进件通道、以及至少 2 个客户内部的重复案例复用证明
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap 12-18 months] 这笔种子前轮融资的目标，是在保留约 6 个月缓冲的前提下，跑到种子轮就绪所需的预算、转正与复用证明。'
- id: A23
  name: 季度薪酬滚算规则
  value: Y2-Y3 的薪酬行，按季度内实际月度入职节奏计算，而不是只看季度末快照
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 这样即便公开 headcount 只展示 Y2 和 Y3 的年末点位，工资费用也仍与月度招聘爬坡保持一致。'
