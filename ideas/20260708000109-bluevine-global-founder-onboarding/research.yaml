openQuestions:
- What share of India-linked U.S. incorporations actually apply for a business bank account within the first 90 days?
- How much analyst time does a typical foreign-founder case consume today versus a domestic SMB application?
- 'Which sponsor-bank policies are the binding constraint: physical-address evidence, source-of-funds evidence, beneficial-owner verification, or country restrictions?'
- Can India-origin identity and business documents be operationalized in a way that meaningfully reduces manual review without creating new privacy or consent issues?
