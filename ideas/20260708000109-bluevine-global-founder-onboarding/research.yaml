    value: $7.5M
    rationale: Estimate = 25,000 India-corridor applications/year × $300 modeled value, using Bluevine's estimate that 25% of 100,000 annual India-related U.S. incorporations are already generating revenue and constraining the beachhead to digital-bank-friendly SaaS, AI, and IT-services firms.
