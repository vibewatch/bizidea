competitors:
- name: Middesk
  stage: scale-up
  wedge: U.S. business identity and KYB automation for banks, lenders, and platforms
  pricing: Custom enterprise pricing (not public).
  strength: Strong domestic business-verification depth plus visible banking references.
  weaknessVsUs: Starts from entity verification, not a corridor-specific foreign-founder case packet and reusable founder-company graph.
  sourceRefs:
  - 25
  - 26
- name: Alloy
  stage: scale-up
  wedge: Identity-risk orchestration for consumer and business onboarding
  pricing: Custom enterprise pricing (not public).
  strength: Large bank/fintech install base and broad KYC/KYB/fraud orchestration capability.
  weaknessVsUs: Foreign-founder onboarding appears to be one use case inside a broad platform rather than the product's primary narrative.
  sourceRefs:
  - 27
  - 28
- name: Sardine
  stage: scale-up
  wedge: Real-time KYB, UBO visibility, and ongoing business-risk monitoring
  pricing: Custom enterprise pricing (not public).
  strength: Strong monitoring and AI-assisted entity-risk positioning.
  weaknessVsUs: More oriented to real-time risk scoring than sponsor-bank-ready founder-company narratives for one corridor.
  sourceRefs:
  - 29
- name: Sumsub
  stage: scale-up
  wedge: Global business verification with document-light onboarding angles
  pricing: Custom enterprise pricing (not public).
  strength: Fast registry and UBO workflows plus explicit focus on emerging-market identity rails.
  weaknessVsUs: Less obviously centered on U.S.-bank policy mapping and reuse across multiple entities or products.
  sourceRefs:
  - 30
  - 31
- name: Airwallex
  stage: incumbent
  wedge: Global accounts and cross-border money movement for international businesses
  pricing: Usage- and FX-fee based product pricing; enterprise terms vary by service.
  strength: Large installed base and strong international account/payment infrastructure.
  weaknessVsUs: A substitute product rather than a licensable diligence layer for peer banks expanding into foreign-founder onboarding.
  sourceRefs:
  - 8
  - 24
  - 34
