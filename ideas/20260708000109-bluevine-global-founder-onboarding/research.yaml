  - Find direct URLs from Mercury, Relay, Brex, and Airwallex about non-U.S. founders or non-U.S. residents opening U.S. business accounts, including eligibility, support articles, and product pages.
  - Find direct URLs with evidence about India-resident founders or Indian startups forming U.S. companies or expanding to the U.S., especially reputable news, primary sources, or industry reports.
