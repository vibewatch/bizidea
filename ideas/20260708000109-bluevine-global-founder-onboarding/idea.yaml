jobsToBeDone:
  - job: >-
      When a U.S. business bank expands to India-resident owners, help onboarding analysts collect
      and verify the right foreign-founder evidence, so they can approve good accounts in one review
      cycle.
    currentAlternative: Manual document chasing across email, spreadsheets, and generic KYC checks
    successMetric: Median time to approve a qualified foreign-owned business account
  - job: >-
      When a foreign-owned U.S. business adds another entity or product, help risk teams reuse prior
      diligence instead of restarting KYC from scratch, so they can scale volume without adding
      headcount.
    currentAlternative: Re-reviewing the same founder and entity evidence in separate queues
    successMetric: Share of repeat applications approved without full rework
