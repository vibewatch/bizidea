topRisks:
  - name: Bank-policy fragmentation
    description: Each bank and sponsor-bank stack may define foreign-owner risk differently, making a single workflow hard to standardize.
    mitigation: Start with one corridor and deep policy mapping for a design partner, then export evidence in each bank's preferred review format.
  - name: Document variability
    description: Non-U.S. identity and business-activity documents vary widely, which can create false positives or long-tail manual exceptions.
    mitigation: Limit the launch to India-resident software businesses, support deterministic fallback paths, and keep analysts in the loop on edge cases.
  - name: Incumbent bundling
    description: Generic KYC vendors or banks could add foreign-founder onboarding modules once demand becomes obvious.
    mitigation: Differentiate on reusable founder-entity graphs, corridor-specific acceptance analytics, and embedded partnerships with banking and formation channels.
