scenarios:
  downside:
    description: Pilot-to-production conversion slips roughly one quarter, pricing stays closer to early-production levels, and policy variance keeps deployments more services-heavy.
    y3RevenueK: 1512.0
    y3EbitdaK: -387.6
    cashLowPointK: 292.9
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 6 instead of 8 because two planned bank conversions slip.
      - Blended realized revenue per bank stays near $24K monthly instead of $25K as usage and implementation attach lag.
      - Exit gross margin stalls near 66% because policy mapping and document normalization remain labor-intensive.
  base:
    description: Two paid pilots land in Y1, five banks are paying by Q4Y2, and exit annualized revenue reaches the researched $300K per bank as usage and repeat-case reuse show up.
    y3RevenueK: 2000.0
    y3EbitdaK: 2.9
    cashLowPointK: 741.6
    keyAssumptionChanges:
      - 2 paying banks by M12, 5 by Q4Y2, and 8 by Q4Y3.
      - Blended realized revenue per bank steps from pilot-heavy $18K-$24K monthly in Y1 to about $25K monthly in Y3.
      - Gross margin exits at the BP target 70% only after templates and repeat-case reuse reduce services work.
  upside:
    description: A formation-partner intake path starts earlier, one additional bank converts by year 3, and reusable templates improve both value capture and margins ahead of plan.
    y3RevenueK: 2444.0
    y3EbitdaK: 353.9
    cashLowPointK: 1053.9
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 9 instead of 8 because one partner-fed bank converts earlier.
      - Blended realized revenue per bank rises toward $26K monthly as onboarding fees and case volume attach sooner.
      - Exit gross margin reaches about 72% as corridor templates and repeat-case reuse reduce manual case work faster.
sensitivity:
  - variable: ARPU
    downsideCase: Blended annual value stalls near $270K per bank.
    baseCase: Base case exits near the researched $300K annualized revenue per bank.
    upsideCase: Formation and repeat-case attach lift annualized value toward $320K per bank.
    y3RevenueImpactK: -200.0
    cashImpactK: -150.0
  - variable: CAC
    downsideCase: Bank-direct selling dominates and CAC rises toward $150K.
    baseCase: CAC stays near $123K with founder-led selling and one partner channel.
    upsideCase: Partner referrals hold CAC closer to $105K.
    y3RevenueImpactK: -60.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.0% as the wedge feels too narrow for some banks.
    baseCase: Monthly churn holds at 2.0% once case data and policy templates are embedded.
    upsideCase: Monthly churn stays near 1.2% because the evidence graph becomes part of the bank workflow.
    y3RevenueImpactK: -120.0
    cashImpactK: -100.0
  - variable: sales cycle
    downsideCase: Pilot-to-production conversion stretches to roughly 150 days.
    baseCase: Paid pilots convert in roughly 90-120 days.
    upsideCase: Executive sponsorship compresses conversion toward about 75 days.
    y3RevenueImpactK: -320.0
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: Exit gross margin stalls near 65% because implementations stay bespoke.
    baseCase: Exit gross margin reaches the BP target 70% as templates and reuse scale.
    upsideCase: Exit gross margin reaches about 72% if partner-fed cases are cleaner and templates mature faster.
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: hiring pace
    downsideCase: The company adds an extra service-heavy hire before repeatability is proven.
    baseCase: Hiring stays milestone-gated and reaches 8 FTE by Q4Y3.
    upsideCase: One support hire is delayed until after the sixth production bank goes live.
    y3RevenueImpactK: -40.0
    cashImpactK: -170.0
modelDiagram:
  title: bank onboarding unit economics flow
  mermaid: |
    flowchart LR
      Leads[Bank discovery + formation referrals] --> Pilots[Paid pilots]
      Pilots --> Production[Production banks]
      Production --> Volume[Foreign-founder applications]
      Volume --> Revenue[Platform + usage + implementation revenue]
      Production --> Reuse[Repeat-case reuse]
      Reuse --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from moving from 2 paid pilots in Y1 to 8 paying banks by Q4Y3 while holding blended value near the researched $300K annualized revenue per bank.
  - checkName: Must go right
    finding: Pilot-to-production conversion has to stay near the BP 50%+ target because the model only works if 5 banks are paying by Q4Y2 without building a large sales team.
  - checkName: Model breaks if
    finding: If sales cycles push past about 150 days or gross margin stalls in the mid-60s because deployments stay bespoke, downside cash falls toward the low hundreds of thousands before the next round.
  - checkName: Next-round proof
    finding: A seed round is justified once 4-5 banks are in production, repeat-case reuse shows materially lower analyst touch time, and one formation-partner intake path is live.
sanityChecks:
  ruleOf40: Y3 growth 92.5% + EBITDA margin 0.1% = 92.6%
  burnMultiple: Y2 burn multiple is about 0.6x using roughly $0.59M of EBITDA burn against about $0.92M of net new ARR; Q2Y3 turns EBITDA positive in the base case.
  revenuePerFte: $250K Y3 on 8 ending FTE (benchmark $200-400K SaaS)
  flags:
    - The year-3 base case reaches the researched 8-bank SOM with only one corridor, so a few missed pilot conversions would compress revenue quickly inside a concentrated buyer pool.
    - Gross margin reaches the 70% target only if policy templates, document normalization, and repeat-case reuse prevent the product from becoming a services-heavy implementation shop.
    - The model assumes finance and compliance overhead stay mostly outsourced; bringing more control work in-house earlier would increase the funding need.
    - CustomersEop includes paid pilots in Y1 and early Y2, so fully recurring production logos trail the headline customer count until the pilot cohort converts.
    - Cash is modeled as EBITDA; annual prepayments, implementation billing timing, or sponsor-bank diligence costs could move actual cash earlier or later than shown.
