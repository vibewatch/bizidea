slug: foreign-founder-diligence-api
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: YYYY-MM
    source: '[BP date 2026-07-08] the model begins with the first full operating month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.0M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the BP range because hiring stays lean, but still preserves more than six months of buffer past the seed-readiness milestone.'
  - id: A3
    name: Starting paying banks (M1)
    value: '0'
    unit: count
    source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid pilots.'
  - id: A4
    name: Paying bank definition
    value: A paid pilot or production contract under active billing
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any bank already paying for pilot, implementation, or production scope.'
  - id: A5
    name: Paid pilot economics
    value: $55K over about 3 months (~$18K/mo)
    unit: USD/bank
    source: '[BP investorMemo.firstCustomer.initialContract $40k-$75k pilot] the model uses a midpoint pilot value for the first India-corridor deployments.'
  - id: A6
    name: Production contract economics
    value: Early production lands around $180K-$220K annual value and reaches roughly $300K annualized revenue per bank by Q4Y3 as usage and implementation fees attach.
    unit: USD/bank/year
    source: '[BP investorMemo.firstCustomer.initialContract $150k-$250k annual platform value + Research market.som $2.4M with 8 customers] the model starts near the BP range and exits at the researched SOM math of about $300K per bank.'
  - id: A7
    name: Customer ramp
    value: 2 paying banks by M12, 5 by Q4Y2, and 8 by Q4Y3
    unit: customersEop
    source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] the base case matches two paid pilots in year 1, 3-5 production banks in year 2, and the researched 8-bank SOM by year 3.'
  - id: A8
    name: Revenue recognition convention
    value: 'Period-end paying banks multiplied by blended realized monthly revenue per bank: $18K-$24K in pilot-heavy Y1, about $23K-$25K in Y2, and about $25K in Y3.'
    unit: formula
    source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som] this keeps revenue directly traceable to customers and the platform-plus-usage model.'
  - id: A9
    name: Gross margin ramp
    value: 42%-50% in Y1, 55%-63% in Y2, and 65%-70% in Y3
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + BP risks] early pilots are services-heavy before corridor templates and repeat-case reuse lift margin toward the BP target.'
  - id: A10
    name: Hiring timeline
    value: M1 founder/CEO and founding engineer; M4 compliance product lead; M7 solutions/integrations; M10 customer operations; M15 GTM/partnerships; M17 second engineer; M33 third engineer
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays light until paid pilots and policy templates prove repeatable.'
  - id: A11
    name: Founder / CEO loaded compensation
    value: $140K
    unit: USD/year
    source: '[BP team Founder/CEO + startup-finance heuristic] lean founder cash compensation with benefits and payroll taxes included.'
  - id: A12
    name: Engineering loaded compensation
    value: $175K
    unit: USD/year
    source: '[BP team Founding eng + startup-finance heuristic] pre-seed cash pay for senior fintech/integration engineering talent, with equity carrying part of total compensation.'
  - id: A13
    name: Compliance product loaded compensation
    value: $160K
    unit: USD/year
    source: '[BP team Compliance product lead + startup-finance heuristic] reflects the hybrid policy, workflow, and product skill set required for bank onboarding.'
  - id: A14
    name: Solutions / integrations loaded compensation
    value: $150K
    unit: USD/year
    source: '[BP team Solutions and integration engineer + startup-finance heuristic] covers bank/partner integration ownership without building a large services bench.'
  - id: A15
    name: Customer operations loaded compensation
    value: $125K
    unit: USD/year
    source: '[BP team Customer operations lead + startup-finance heuristic] reflects a high-context customer-success and quality role rather than a manual review team.'
  - id: A16
    name: GTM / partnerships loaded compensation
    value: $170K
    unit: USD/year
    source: '[BP gtm.channels + startup-finance heuristic] includes travel and variable compensation for concentrated enterprise bank outreach.'
  - id: A17
    name: Payroll allocation to P&L lines
    value: Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; compliance product 70% R&D / 30% G&A; solutions 30% S&M / 70% R&D; customer operations 50% S&M / 20% R&D / 30% G&A; GTM 100% S&M
    unit: allocation
    source: '[BP team role rationales + BP operations] this maps payroll into functional spend while keeping founder-led sales and implementation-heavy onboarding visible.'
  - id: A18
    name: Non-payroll opex ramp
    value: Monthly non-payroll spend rises from about $12K in early Y1 to about $18K by Q4Y3.
    unit: USD/month
    source: '[BP operations + startup-finance heuristic] covers cloud, data vendors, travel, legal, insurance, and audit-readiness tooling without assuming a heavy paid-demand engine.'
  - id: A19
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: formula
    source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale.'
  - id: A20
    name: Steady-state monthly logo churn
    value: 2.0%
    unit: percent per month
    source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets] bank workflows should be sticky once live, but the model stays conservative for a narrow wedge.'
  - id: A21
    name: CAC convention
    value: Total 36-month sales and marketing spend divided by 8 net new paying banks
    unit: formula
    source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led and partner-led bank acquisition across the full buildout period.'
  - id: A22
    name: Next-round milestone for funding sizing
    value: 4-5 production banks, one formation-partner intake path, and repeat-case reuse proof inside at least 2 customers
    unit: milestone
    source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap 12-18 months] the pre-seed is sized to reach seed-ready proof on buyer budget, production conversion, and reuse economics with six months of buffer.'
  - id: A23
    name: Quarterly salary-roll convention
    value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than just quarter-end snapshots
    unit: convention
    source: '[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent even though the public headcount table only shows year-end snapshots for Y2 and Y3.'
