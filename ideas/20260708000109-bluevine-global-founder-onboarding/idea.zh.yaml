problem: 海外创始人开立美国企业账户时，银行仍要跨错配文件和多重法域，核验非美国身份、受益所有权、经营活动和美国业务关联，因此常常卡在不透明的人工审核。Bluevine 现在能把前门数字化，但每家金融科技银行或支付平台，仍靠 PDF、邮件追问和分析师判断拼证据。这会拖慢批准、抬高误拒率，也让每新增一个国家的上线成本都很高。
targetUser:
  primary: 服务海外持有、美国注册的软件和 IT 服务企业的美国数字企业银行中的 SMB 开户准入与风险管理团队
  secondary: null
  buyer: 美国数字企业银行中负责 SMB 开户准入、风险或合规的负责人
startupThesis:
  nonObviousInsight: Bluevine 和 Wise 证明，海外创始人所需的前端账户与跨境支付通道已经具备。现在真正稀缺的资产，是一张可复用的证据图谱：把非美国创始人、美国注册实体和企业经营证明映射成各家银行都能信任的 CIP 与增强尽调材料包。
  beachhead: 帮助正在扩大跨境 SMB 获客的美国数字企业银行，为居住在印度、运营美国注册 SaaS、AI 和 IT 服务企业的所有者完成开户准入
  wedge: 一套 API 加分析师控制台，采集按法域拆分的创始人身份、UBO、实体和经营活动证明，生成可直接交付银行的 CIP 与 EDD 材料包，以及可复用的创始人—公司图谱
  whyNowCatalyst: Bluevine 的多国上线和印度本地化版本，把海外创始人银行服务从零散例外推成可重复漏斗，逼着银行现在就把跨境尽调自动化。
  ventureScalePath: 先从海外持有的美国企业账户开户证据切入，再扩到持续监控、支付限额控制、外汇与资金管理权限、信贷承保，以及可被银行、支付处理商、薪资服务商和公司注册平台共同接受的企业身份通行证。
solution: 产品接入创始人身份证件、公司注册记录、受益所有权披露、税号和经营活动证明，再按走廊映射到银行政策。第一步聚焦居住在印度、面向美国市场销售的 SaaS、AI 和 IT 服务公司，自动生成补件请求、分析师摘要，以及可审计的 CIP 和增强尽调证据包。银行拿到的是一张可复用的创始人—实体图谱，所以同一所有者以后再开一家美国公司，或追加支付、信贷产品时，审核可以直接站在已验证事实之上，而不是从空白队列重新开始。分析师控制台会把边缘案例留在人手里处理，同时让每次请求、每条来源和每个决策都可追溯，方便内部审计和赞助银行审查。
goToMarketSeed:
  firstCustomer: 一家已为印度居民开放开户准入、服务美国注册 SaaS 与 IT 服务 SMB 的美国数字企业银行，但仍把海外所有者的边缘案例丢回人工审核。
  buyingTrigger: 银行上线印度或其他新的海外创始人走廊时，开户团队不得不重写政策，并吸收激增的例外案例。
  currentAlternative: 在通用 KYC 供应商、邮件收集文件和内部案件管理队列之上叠加的人工流程
  switchingReason: 这套产品把原本要追几天的证据流程，压成可复用、可直接提交银行的 CIP 与 EDD 材料包，在保留可审计审批依据的同时，缩短分析师处理时间。
  pricingHypothesis: 按年收平台费，再叠加每个海外所有者申请的处理费，定价低于一次完整人工审核轮次的成本。
