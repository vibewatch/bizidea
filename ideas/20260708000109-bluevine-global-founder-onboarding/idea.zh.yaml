topRisks:
- name: 银行政策碎片化
  description: 每家银行和赞助银行技术栈对海外所有者风险的定义都可能不同，单一工作流很难标准化。
  mitigation: 先在一条走廊和一个共创客户里把政策映射做深，再按各家银行偏好的审核格式导出证据。
- name: 文件差异太大
  description: 非美国身份与经营活动文件差异很大，容易带来误报，或让长尾案例继续卡在人工处理。
  mitigation: 首发只覆盖居住在印度的软件企业，设计确定性的兜底路径，并让分析师继续处理边缘案例。
- name: 现有厂商打包跟进
  description: 通用 KYC 供应商或银行一旦看清需求，可能很快补上海外创始人开户模块。
  mitigation: 围绕可复用的创始人—实体图谱、走廊接受度分析，以及嵌入银行与注册渠道的合作关系建立差异化。
