jobsToBeDone:
- job: 当一家美国企业银行把服务扩到印度居民所有者时，帮助开户分析师收集并核验正确的海外创始人证据，让合格账户在一轮审核内通过。
  currentAlternative: 靠邮件、表格和通用 KYC 检查追文件
  successMetric: 合格的海外持有企业账户从申请到批准的中位时长
- job: 当一家海外持有的美国企业新增实体或追加产品时，帮助风险团队复用既有尽调，而不是从头重跑 KYC，从而在不增加编制的情况下承接更多量。
  currentAlternative: 在不同队列里重复审核同一套创始人与实体证据
  successMetric: 无需完整返工就获批的重复申请占比
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 一次明确的多国上线，再叠加印度本地支持，是很强也很具体的信号：这个品类现在正在打开。
  painIntensity:
    score: 4
    rationale: 跨境开户准入确实运营负担重，审批速度也重要，但现有证据还没有量化放弃率或流失率。
  wedgeClarity:
    score: 5
    rationale: 首个产品切得很窄，就是为单一高密度走廊打包海外创始人的 CIP 与 EDD 证据。
  defensibility:
    score: 4
    rationale: 可复用证据图谱、走廊剧本和审批结果数据都能越积越厚，不过通用 KYC 现有厂商也会很快跟进。
