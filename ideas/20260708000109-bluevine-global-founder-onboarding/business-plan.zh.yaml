slug: foreign-founder-diligence-api
date: '2026-07-08'
executiveSummary: Bluevine 在 2026 年 7 月的上线，把海外创始人的远程开户准入从少见的例外流程，推成了美国企业银行真实的获客漏斗。眼下最直接的买方，是开户准入、风险或合规负责人——他们现在得在没有网点面签的情况下，批准居住在印度、运营美国注册 SaaS、AI 和 IT 服务企业的所有者。产品应从一套按走廊拆分的尽调 API 和分析师控制台起步，把创始人身份、UBO、实体和经营活动证据，压成附带完整审计链路的银行可用 CIP 与 EDD 材料包。这个切口成立，是因为通用 KYC/KYB 工具、公司注册平台和人工队列虽然都能收集部分证据，却做不出可复用的创始人—公司图谱，也给不出贴合银行政策的审批说明。研究支持一个真实但偏窄的滩头市场：估算 SAM 约为 $7.5M，如果公司拿下 8 家首发客户，第 3 年 SOM 约为 $2.4M；若无法证明跨产品、跨走廊复用，单靠印度切口本身并撑不起风投级规模。GTM 应聚焦那些刚开或正在放量印度走廊的银行，卖一笔与“更快在一轮审核内批准”绑定的付费试点，并用低于反复人工审核成本的年度平台费加按申请收费来定价。产品节奏必须克制：一条走廊、人工在环审核、材料包导出、同一家银行内的重复申请复用；在这套闭环跑通前，不要急着加新走廊或信贷工作流。最大的不利证伪风险是，银行政策差异和文件波动最终让公司更像服务，而不是软件；同时公开资料还没有量化分析师时长、审批提升或误拒率，所以前 90 天必须先拿到案件级数据，投资判断才能继续抬高。
problem:
- 正在拓展到印度居民创始人的银行，仍靠 PDF、邮件补件和分析师判断拼 CIP 与 EDD 证据，这会拖慢本来合规的美国注册企业审批，也会抬高误拒率。
- 通用 KYC/KYB 工具只能孤立验证文件或实体，却做不出一份能被银行接受、可复用的案件档案，把非美国创始人、美国实体和真实经营活动串起来，供后续产品或更多实体继续使用。
solution:
- 提供一套 API 和分析师控制台，按走廊收集身份、受益所有权、注册、税务和经营活动证据，再转成附带追溯补件记录与审计日志的银行可用 CIP 与 EDD 材料包。
- 维护一张可复用的创始人—公司图谱，让后续重复开户、开通支付和信贷审核都从既有已验证事实与政策差异出发，而不是从头重启尽调。
whyWeWin:
- 现有替代方案——通用 KYC/KYB 厂商、公司注册平台和内部分析师队列——都只验证案件的一部分，没有人真正掌握按走廊拆分的审批材料组装，以及跨后续产品复用证据的能力。
- 每次部署都会沉淀更多银行政策模板、印度文件标准化经验和审批结果数据，复用性会越来越强，也会让相邻供应商和内部团队越来越难追上。
strategicChoices:
  beachhead: 为居住在印度、运营美国注册 SaaS、AI 和 IT 服务企业的所有者开户的美国数字企业银行和金融科技账户提供商。
  wedgeRationale: 研究里最密集、最看得见的走廊就是印度：创始人需求明确，银行支持已经本地化，身份与文件通道也相对具体。先卖一套单走廊、银行可直接使用的材料包工作流，比一上来做全球 KYB 平台或面向创始人的直接开户 App 更容易证明价值，因为买方、触发点和政策问题都已经很具体。
  sequencingRationale: 第一个产品必须先证明：单一走廊足够标准化，既能压缩分析师时长，又能把人工留在审批环里。因此产品先做材料组装和导出，而不是自治决策。GTM 也应由创始人亲自打单，只进入少数几家正在开走廊的银行；在政策模板和集成模式还没可重复前，团队编制保持克制。只有试点转正后，公司才该补公司注册渠道合作与更广走廊覆盖。
  notYet:
  - 直接面向创始人的银行或交件产品
  - 超出印度走廊的全国家覆盖
  - 不经分析师审核的全自动审批
  - 在重复账户复用没跑通前就切入信贷承保、支付风控或资金权限
market:
  tam: $45.0M 的估算 TAM：按印度及相邻、类似 Bluevine 支持走廊合计约 150,000 份海外创始人美国企业账户申请计算，每份申请按约 $300 的软件价值建模。
  sam: $7.5M 的估算 SAM：按印度走廊中面向美国销售、已产生收入的 SaaS、AI 和 IT 服务企业约 25,000 份年申请计算，每份约 $300 建模。
  som: $2.4M 的第 3 年估算 SOM：按 8 家首发客户、每家处理约 1,200 份印度走廊申请、每案捕获价值约 $250 计算。
  segments:
  - 主要：为居住在印度、运营美国注册软件与 IT 服务企业的所有者扩张开户准入的美国数字企业银行
  - 次要：服务海外持有美国 SMB、需要银行级远程尽调的支付与企业账户平台
  buyingProcess: 最先感到痛的是开户运营和风险团队，但真正拍预算的通常是开户准入、风险、合规或企业银行运营负责人，因为对赞助银行的可辩护性和转化率同样重要。最容易起单的时点，是银行刚开印度走廊、公司注册伙伴突然导入一波海外创始人申请，或赞助银行审核方要求把受益所有者控制做得更严的时候。
product:
  mvp: MVP 应该只支持一家银行的印度走廊：接入创始人身份、注册、UBO、税务和经营活动证据，映射到该行的 CIP 与 EDD 政策，再产出材料包、分析师队列、审计日志和补件请求。它不该尝试全球覆盖、自动审批，或完整替换银行现有 KYC 栈。
  sixMonth: 落地 2-3 个共创客户试点，交付印度专属进件流程、政策规则、分析师摘要、材料包导出，以及围绕审核时长、补件量和审批结果的基础分析。
  twelveMonth: 把首批试点转成正式生产，先在同一家银行里加入重复申请复用，打磨一个核心开户系统集成，再上线一条可预填案件数据的公司注册伙伴进件通道。
  twentyFourMonth: 再扩展到 2-3 条相邻海外创始人走廊；只有当印度走廊结果数据证明创始人—公司图谱能复用到初始开户之外，才继续加持续监控或支付限额审核模块。
  keyBets:
  - 银行会先为“可直接审批的材料组装”买单，再为更宽泛的跨境身份基础设施买单。
  - 只要把人工留在环里，单走廊流程就有机会被标准化到软件毛利，而不是沦为定制服务。
  - 在公司扩到新产品或新走廊前，同一家银行内部的重复申请就能先体现出可衡量的复用价值。
  - 公司注册与验证伙伴能提升数据完整性，但不会亲自掌握审批说明。
gtm:
  wedge: 向正在启动或放量海外创始人开户准入的银行，卖一笔付费的印度走廊试点，用更快的可审批材料包和审计证据，替代原本的海外所有者例外人工队列。
  channels:
  - 在走廊规划期，由创始人直接向美国数字企业银行的开户准入、风险与合规负责人销售
  - 与已经在帮印度居民创始人完成美国公司注册和早期银行设置的公司注册平台建立转介合作
  - 和有数据覆盖、却没有按走廊审批工作流的 KYB 与验证厂商做联合销售
  funnelTargets: 目标漏斗为：银行→有效发现 20-30%，有效发现→付费试点 30-40%，试点→生产 50%+，生产→ 12 个月内的重复申请扩展 40%+。
  pricing: 先为单走廊、单银行流程收一笔范围明确的付费试点费，再转成年平台费加每个海外所有者申请的处理费。定价要低于反复人工审核成本，并用更快审批、更低分析师介入时长和重复案例复用来证明。
businessModel:
  revenueStreams:
  - 按走廊政策映射、分析师工作流和材料包生成收年度 SaaS 订阅费
  - 按处理的海外所有者案件收使用费
  - 按政策配置、集成和控制映射收实施费
  unitOfValue: 在特定银行走廊政策下处理的海外所有者申请
  targetGrossMarginPct: 70
  expansionLevers:
  - 在现有银行内增加重复申请和多实体复用
  - 印度剧本稳定后，新增更多海外创始人走廊
  - 基于同一张创始人—公司图谱，向上销售持续监控、支付限额审核和后续承保输入
  - 把进件嵌入公司注册、注册或验证伙伴——这些环节本来就位于银行开户上游
strategyMap:
  northStarMetric: 在一轮审核内获批、且带完整审计链路的合格印度走廊申请数
  inputMetrics:
  - 每个合格印度走廊案件的分析师中位处理分钟数
  - 首次提交后无需二次追文件的案件占比
  - 试点转生产转化率
  - 复用既有创始人—公司数据的重复申请占比
  - 从资料齐备到批准或拒绝的中位天数
  moatsToBuild:
  - 映射到可复用证据字段和补件逻辑的银行专属走廊政策库
  - 把身份、所有权、实体与经营证明串起来、可跨重复申请复用的创始人—公司图谱
  - 按文件组合、业务模式和走廊沉淀的批准/拒绝结果数据集
  - 通过公司注册与验证伙伴拿到的渠道入口，可在案件进入银行队列前先把结构理顺
  killCriteria:
  - 前 20 次 ICP 访谈里，若不足 8 家银行表示一个合格印度走廊案件今天仍要花超过 90 分钟分析师时长，或要走两轮以上审核，就说明痛点不够硬。
  - 前 4 个付费试点里，若不足 2 个能在试点完成后 6 个月内转成年合同，就说明转正机制不成立。
  - 如果超过 40% 的试点案件在产品组好初始材料后，仍要走定制化人工处理，就说明这个工作流太偏服务，难以规模化。
  mermaid: "flowchart LR\n  Wedge[India corridor bank onboarding wedge] --> MVP[Human in the loop diligence packet MVP]\n  MVP --> Proof[Faster one cycle approvals and audit ready evidence]\n  Proof --> Expansion[Repeat case reuse then multi corridor expansion]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 时点和买方痛点都可信，但整体信念仍属中等，因为滩头市场偏窄，公司还要证明在不同银行政策下也能像软件一样可重复。
    whyBelieve: Bluevine 的上线、公司注册平台的需求，以及既有 KYB 预算，合起来足以支撑一层按走廊拆分的尽调软件。
    whyDoubt: 眼下的市场证据还没证明分析师时长能节省多少、审批能提升多少，也还不足以排除它只是一个偏服务的细分生意，或会被现有厂商打包带走。
    nextDiligence: 先从 2-3 家共创银行拿到案件级数据，看当前分析师时长、升级率，以及印度走廊申请的试点转化经济性。
  firstCustomer:
    title: 一家正在上线印度居民创始人账户的美国数字企业银行的 SMB 开户准入负责人
    profile: 一家有赞助银行背书的数字企业银行，服务美国注册的 SaaS、AI 和 IT 服务 SMB，且正在收到越来越多印度居民所有者的申请；这些申请会把原本的本土开户剧本直接打穿。
    trigger: 银行启动或放量印度走廊后，海外所有者例外案件激增，现有 KYC 栈和分析师队列吃不下。
    buyer: SMB 开户准入、风险或合规负责人
    initialContract: 围绕单走廊、单审批流程做一笔 8-12 周、约 $40k-$75k 的付费试点；只要银行看到更快的一轮审核通过和可复用的重复案例数据，再转成约 $150k-$250k 的年平台价值加使用费。
  mustBeTrue:
  - 被访目标银行里，至少一半今天处理合格印度走廊案件仍要花超过 90 分钟分析师时间，或要走两轮以上审核。
  - 至少 2 家共创银行愿意在映射进本行政策后，接受 PAN 加 DigiLocker 或 Aadhaar 衍生证据，作为有效试点输入。
  - 前 4 个付费试点里，至少 2 个能在 6 个月内以年平台价值 $150k+ 转成正式生产。
  - 同一家银行内部的重复申请，在复用既有创始人—公司证据后，分析师介入时长至少下降 30%。
  - 正面对比试点时，这套产品必须在一轮审核通过率或分析师工作量上，明显优于可配置的通用 KYB 工作流。
  diligenceQuestions:
  - 每家目标银行每月实际会收到多少印度走廊申请？其中有多少会升级到人工审核？
  - 在两家点名的共创银行里，究竟是哪些文件或信号决定了批准还是升级？
  - 预算最先由谁拍板：开户准入、风险、合规，还是企业银行总经理？
  - 不同赞助银行技术栈之间到底有多大政策差异？哪些能模板化，哪些必须为单个客户硬编码？
  - 公司注册伙伴能否持续提供足够的合格量并预填数据，从而拉低 CAC，还是销售最终仍只能直接打银行？
operatingAssumptions:
- assumption: 印度是密度最高的首条走廊，足以支撑聚焦式销售。
  basis: research.yaml
  validationTest: 访谈 10 家目标银行和 3 家公司注册伙伴；确认至少 5 家银行每月都能见到 50+ 份印度居民创始人申请，或已有明确上线计划。
  decisionImpact: 如果不成立，滩头市场就得收缩到更小、但量更清楚的银行群体，或改切到需求更密的其他走廊。
- assumption: 不同银行政策差异可以靠一套通用证据结构加可配置模板处理，而不是每拿一个客户都要重写定制代码。
  basis: idea.yaml
  validationTest: 收集至少 3 家银行的政策矩阵，证明一套核心证据结构能覆盖 80% 的必填字段和补件逻辑。
  decisionImpact: 如果不成立，实施成本会一直太高，公司只能转成高触达托管服务，或需要募更多钱。
- assumption: 买方愿意为独立试点拨预算，而不是继续拉伸通用 KYB 工具和人工审核。
  basis: research.yaml
  validationTest: 跑完 6 轮从发现到提案的销售周期，拿下至少 2 个有明确高管背书和既有预算的付费试点。
  decisionImpact: 如果不成立，定价与包装就得往嵌入式伙伴分发或托管运营靠，而不是独立 SaaS。
- assumption: 印度数字身份与税务证据，能在不触发重大隐私、同意或政策阻碍的前提下，被翻译成银行可接受的属性。
  basis: research.yaml
  validationTest: 与 2 家共创银行完成合规评审，并用可选的 PAN、DigiLocker 或 Aadhaar 衍生证据跑完 10 个样本案件。
  decisionImpact: 如果不成立，产品就得退回更慢的文件工作流，自动化优势会被削弱。
- assumption: 可复用的创始人—公司数据，能在同一家银行内部显著降低重复实体或新产品审核的工作量。
  basis: 运营判断
  validationTest: 对至少 20 个重复或扩展案例做基准对比，证明相较首次申请，分析师介入时长至少下降 30%。
  decisionImpact: 如果不成立，向支付、监控和承保扩展的故事会变弱，公司会停留在一个窄的开户工具上。
- assumption: 公司注册与验证伙伴愿意共享足够的上游数据，提升资料完整性，但不会反过来成为系统记录源。
  basis: research.yaml
  validationTest: 拿下 2 个伙伴集成或转介协议，并衡量伙伴来源申请是否能把首轮补件请求压低至少 25%。
  decisionImpact: 如果不成立，CAC 只能维持直接打银行，路线图也该优先做深银行工作流，而不是押伙伴分发。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 和 3 个开户团队一起，给当前印度走廊案例做 工时拆解研究。
  hypothesis: 合格案件今天已经吃掉足够多的分析师时长和补件成本，足以支撑软件预算。
  successMetric: 至少 3 家银行愿意共享日志，且合格案件的中位分析师时长超过 90 分钟，或要两轮以上审核。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 把 50 个历史印度创始人案例，对照 2-3 家银行的政策矩阵重新映射。
  hypothesis: 一套通用证据结构足以覆盖早期客户的大多数必填字段和补件逻辑。
  successMetric: 样本银行里，一套证据结构覆盖至少 80% 的必填字段和补件类型。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 围绕 PAN、DigiLocker 和 Aadhaar 衍生证据模块，与 2 家潜在银行做合规设计评审。
  hypothesis: 可选的印度专属证据输入，能被纳入银行认可的试点工作流。
  successMetric: 至少 2 家银行批准至少 2 个印度来源证据模块进入试点。
  owner: 创始人/CEO
- horizon: 90-180 天
  experiment: 为一家银行上线第一个付费的印度走廊试点。
  hypothesis: MVP 能在不替换核心 KYC 栈的情况下，做出真正能拿去审批的材料包，并显著缩短审核时间。
  successMetric: 前 25 个真实案例把中位审核时长较基线压低至少 25%，同时保留完整审计链路。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 在 6 份合格提案里，测试试点包装和“平台费 + 使用费”定价。
  hypothesis: 买方愿意签独立试点，也能接受围绕走廊工作流价值而不是 席位数量的定价。
  successMetric: 至少签下 2 个付费试点，且 6 个机会里有 4 个认可“平台费 + 使用费”定价逻辑。
  owner: 创始人/CEO
- horizon: 180-360 天
  experiment: 把一条公司注册伙伴预填数据流接进试点或生产银行。
  hypothesis: 上游伙伴数据能提升申请完整性，并压低追文件成本。
  successMetric: 伙伴来源案件把首轮补件请求压低至少 25%，并每月贡献至少 20 个合格申请。
  owner: 创始人/CEO
- horizon: 12-18 个月
  experiment: 在首个生产客户里，把重复申请或第二实体案例做成可复用的创始人—公司图谱工作流。
  hypothesis: 在同一家银行里做复用，是从窄开户切口走向更宽身份层的最快路径。
  successMetric: 重复案例的分析师介入时长至少下降 30%，且至少 1 个客户因为复用而扩大合同范围。
  owner: 客户运营负责人
operations:
- 为每家银行和赞助银行环境维护带版本的走廊政策图谱和材料包模板库。
- 把每次补件请求、证据来源、分析师改动和决策理由都记成不可变日志，让试点结果能扛住内部审计和合作银行复核。
- 同时支持 API、文件和人工上传路径，让试点在银行、公司注册伙伴或验证供应商尚未开放干净集成前也能推进。
- 每周复盘一次例外案例，把重复出现的文件缺口和升级模式沉淀成确定性的补件规则与更干净的 进件模板。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 亲自拿下共创客户销售、走廊选择、定价和伙伴拓展，因为最大的风险就是这个工作流到底够不够急、够不够值得买。
- role: 创始工程师
  startTiming: Month 0
  rationale: 搭建证据图谱、材料组装引擎、分析师工作流，以及付费试点所需的第一个开户系统集成。
- role: 合规产品负责人
  startTiming: Month 3-6
  rationale: 把银行政策、文件规则和审计输出编码进产品，避免它滑回定制分析师服务。
- role: 解决方案与集成工程师
  startTiming: Month 6-9
  rationale: 把跨银行和伙伴重复出现的数据接入模式产品化，缩短从项目启动到试点上线的时间。
- role: 客户运营负责人
  startTiming: Month 9-12
  rationale: 负责人工在环质量、试点转生产，以及把反复出现的边缘案例翻成可复用规则。
milestones:
- horizon: 0-12 个月
  items:
  - 拿下 2-3 个共创客户，并完成至少 2 个付费的印度走廊试点。
  - 在合格案件上，证明完整可审计材料包输出能把审核时长压低至少 25%。
  - 上线一个核心开户系统集成，并与共创客户验证至少一个可选的印度证据模块。
- horizon: 12-24 个月
  items:
  - 把 3-5 家银行转成年合同，并在至少 2 个客户里证明重复案例复用。
  - 上线一条公司注册伙伴进件渠道，以及一条仍符合共享证据结构 的相邻走廊。
  - 把实施剧本打磨到稳定状态，让大多数常见案例都通过可配置模板处理，而不是定制代码。
- horizon: 24-36 个月
  items:
  - 做到约 8 家生产客户，与研究中的第 3 年 SOM 场景一致。
  - 从开户准入扩到持续监控或支付限额审核，在这些环节里，既有创始人—公司证据能明显缩短下游决策。
  - 按走廊和文件组合建立审批基准数据集，提高胜率，也提高对通用厂商的防御力。
risks:
- risk: 银行与赞助银行的政策碎片化，让每次部署都过于定制化，难以高效规模化。
  likelihood: High
  impact: High
  mitigation: 先守住一条走廊和少数几个共创客户，证明共享证据结构成立，同时让导出格式足够灵活，能贴合各家银行的审核模板。
- risk: 来自印度的文件或数字身份信号差异太大，或接受度不足，无法明显减少人工审核。
  likelihood: Medium
  impact: High
  mitigation: 让分析师持续在环，把 PAN、DigiLocker 和 Aadhaar 衍生数据当作可选模块，并在承诺自动化前先验证银行是否接受。
- risk: 真正产生收入的海外创始人申请量，低于模型假设的滩头规模。
  likelihood: Medium
  impact: High
  mitigation: 只筛选那些已经上线印度走廊或有明确申请流量的银行，并用公司注册伙伴数据先验证管道，再扩招。
- risk: 通用 KYB 厂商补上走廊剧本，或打包足够多的工作流能力，抹平独立产品差异。
  likelihood: Medium
  impact: Medium
  mitigation: 差异化不放在底层验证覆盖，而放在可直接审批的材料组装、可复用的创始人—公司图谱，以及可量化的结果改善。
- risk: 监管或赞助银行审查收紧，拉长销售周期，或缩小可服务客户范围。
  likelihood: Medium
  impact: High
  mitigation: 优先拿下已经决定做远程海外创始人开户的银行，尽早把审计控制打包好，并让第一个产品只聚焦在人审、可辩护的工作流。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用这笔钱支撑 18 个月的印度走廊产品研发、2-3 个付费银行试点、一条核心集成路径、早期政策与实施招聘，并在更广走廊扩张前，先证明试点客户能靠重复案例复用转成正式生产。
