slug: foreign-founder-diligence-api
date: '2026-07-08'
researchCoverage:
  sourceTarget: 100
  sourcesFound: 138
  sourcesFetched: 117
  sourcesRetained: 100
  duplicatesRemoved: 5
  memoSourcesUsed: 35
  reputablePublisherCount: 23
  searchedQueries:
  - 找出 Bluevine 在 2026 年 7 月推出面向海外创始人与印度居民企业所有者的美国企业银行服务时，对应的直接 URL 和关键事实。
  - 查找 Mercury 官方当前关于国际创始人、资格要求或非美国创始人如何开立 Mercury 企业账户的直接 URL。
  - 查找 FFIEC、FinCEN、FATF、OCC 等监管机构关于 CIP、CDD、受益所有权以及面向美国银行远程核验非美国企业所有者的直接官方 URL。
  - 查找来自印度政府、UIDAI、DigiLocker 或 Income Tax 的直接官方 URL，内容涉及 Aadhaar offline e-KYC、DigiLocker 身份共享、PAN 服务或其他有助于远程核验印度居民创始人的身份/文件工具。
  - 查找 Stripe Atlas 或 Stripe 当前关于非美国创始人设立美国公司、申请 EIN 或开立美国企业银行账户的直接页面。
  - 查找 Firstbase 或 Doola 官方关于非美国创始人开立美国企业银行账户或设立美国公司的直接页面。
  - 查找美国 Census 或 SBA 关于美国企业注册统计的直接官方 URL，用来支撑新美国企业申请量。
  - 查找 Middesk、Alloy、Sardine 和 Sumsub 关于 KYB、企业验证、开户或企业身份产品的直接页面，要求与银行的海外创始人开户准入相关。
  - 查找 Mercury、Relay、Brex 和 Airwallex 关于非美国创始人或非美国居民开立美国企业账户的直接页面，包括资格说明、帮助文档和产品页。
  - 查找关于居住在印度的创始人或印度创业公司设立美国公司、进入美国市场的直接证据，优先可信新闻、一级来源或行业报告。
