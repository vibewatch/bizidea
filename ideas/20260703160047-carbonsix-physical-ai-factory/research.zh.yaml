competitors:
  - name: CarbonSix
    stage: scale-up
    wedge: 面向制造业的即部署物理 AI，以远程操控示教、任务级数据飞轮和 SigmaKit 工具为核心。
    pricing: 企业/定制部署；无公开标价。
    strength: 最直接验证品类：远程操控捕获数据、不到一天的部署声明，以及在实际工厂产线上的商业合同。
    weaknessVsUs: 广域制造业定位留下了空白——在家电/暖通空调特定质量放行工作流、缺陷代码和姐妹工厂复用方面，仍缺乏原生工作流的异常单元 OS。
    sourceRefs:
      - 1
      - 2
  - name: Dexterity
    stage: scale-up
    wedge: 配备世界模型、力感知控制和大规模自主动作数据的生产级物理 AI。
    pricing: 企业/定制；无公开标价。
    strength: 深厚的生产可信度，以及围绕真实世界鲁棒性积累的物理 AI 硬功夫。
    weaknessVsUs: 重心是广域机器人能力，而非针对耐用品最终装配、范围收窄且质量审批就绪的异常工作流。
    sourceRefs:
      - 20
      - 21
      - 22
  - name: Wandelbots
    stage: scale-up
    wedge: 机器人无关的软件定义自动化和物理 AI 开发工作流，尤其通过仿真和 NOVA 实现。
    pricing: 企业/定制加合作伙伴主导；无公开标价。
    strength: 在供应商中立机器人控制、仿真优先开发和 AI 原生自动化上有强叙事。
    weaknessVsUs: 更像是一个赋能 OS 和开发层，而非内嵌质量审批逻辑的专用异常通道产品。
    sourceRefs:
      - 23
      - 24
  - name: Vention
    stage: scale-up
    wedge: 集模块化硬件、控制器和物理 AI 应用于一体的云自动化平台，面向高变体制造任务。
    pricing: 混合：模块化机器人硬件实时在线定价，但 AI 应用和完整单元仍需报价。
    strength: 从设计到部署的快速动作、广泛的制造业适用性，以及模块化机器人硬件中罕见的透明定价姿态。
    weaknessVsUs: 广域平台范围让其在异常分类、放行门控和跨工厂复利方面缺乏主见——而这些正是该创业公司要占据的。
    sourceRefs:
      - 25
      - 26
      - 27
  - name: Universal Robots
    stage: incumbent
    wedge: 协作机器人平台和合作伙伴生态，现已延伸至物理 AI 工具和检验/装配应用。
    pricing: 通过合作伙伴生态进行报价式应用部署；无公开的单元级异常通道定价。
    strength: 巨大的生态系统优势、强劲的安全品牌，以及通过合作伙伴直达检验和装配用例的直接路径。
    weaknessVsUs: UR 提供平台和生态，但不提供垂直化的异常单元运营模型或围绕经审批返工的数据护城河。
    sourceRefs:
      - 28
      - 29
      - 30
