        Proposed startup: [0.92, 0.86]
  fiveForces:
    supplierPower:
      score: 3
      rationale: 创业公司依赖机器人硬件、控制器、仿真工具和车间软件接口，但若产品保持硬件感知而非硬件独占，没有单一供应商能完全掌控这一品类。
      sourceRefs:
        - 25
        - 27
        - 29
        - 32
        - 33
    buyerPower:
      score: 4
      rationale: 目标客户是相对集中、技术精通的制造商，在更大范围推广前会要求提供人工、质量和产量 ROI 的证明。
      sourceRefs:
        - 9
        - 10
        - 11
        - 12
        - 34
        - 35
    threatOfEntrants:
      score: 3
      rationale: 基础模型和机器人工具降低了实验门槛，但一个可信的进入者仍需要安全纪律、工厂集成和生产级数据循环。
      sourceRefs:
        - 6
        - 20
        - 21
        - 22
        - 24
        - 25
    threatOfSubstitutes:
      score: 4
      rationale: 人工返工台、加班和专项集成商项目仍是可接受的替代方案，因为它们熟悉、灵活，且可按任务逐一论证。
      sourceRefs:
        - 19
        - 31
        - 32
        - 37
    competitiveRivalry:
      score: 4
      rationale: 竞争已经实质性存在，因为物理 AI 创业公司、模块化自动化平台和 OEM 生态都从不同角度攻击"多变任务"问题。
      sourceRefs:
        - 1
        - 2
        - 20
        - 23
        - 25
        - 28
        - 37
  pestle:
    - factor: political
      impact: positive
      point: 国内制造业再投资和回流压力，为向美国工厂销售范围收窄的自动化方案创造了更友好的大环境。
      sourceRefs:
        - 34
        - 35
        - 36
    - factor: economic
      impact: positive
      point: 劳动力稀缺和运营压力上升，让能从 ROI 角度论证的节省人工、稳定质量的自动化更易获批。
      sourceRefs:
        - 4
        - 5
        - 9
        - 11
        - 12
    - factor: social
      impact: neutral
      point: 工厂对承担重复或危险工作的机器人持开放态度，但人员接受度仍取决于可预期的岗位安排、安全保障，以及系统是辅助而非替代一线专业技能。
      sourceRefs:
        - 6
        - 13
        - 18
    - factor: technological
      impact: positive
      point: 远程操控捕获、仿真、数字孪生、AI 加速器和世界模型已实质性缩小了工厂物理 AI 的可信度差距。
      sourceRefs:
        - 3
        - 21
        - 24
        - 25
        - 29
        - 33
    - factor: legal
      impact: negative
      point: 机器人单元必须满足防护、上锁和风险评估要求，而 AI 辅助决策进一步增加了可追溯性和可辩护监督的需求。
      sourceRefs:
        - 14
        - 15
        - 16
        - 17
        - 18
    - factor: environmental
      impact: positive
      point: 减少检验浪费、反复返工和报废，与工厂更广泛的可持续发展目标和"充分利用现有工厂"的要求一致。
      sourceRefs:
        - 31
        - 35
        - 36
  adoptionFrictionMatrix:
    - friction: 安全审批和风险评估可能主导试点时间线。
      severity: high
      affectedBuyer: 工厂厂长和质量审批人
      mitigation: 交付一套标准化单元架构，预先记录风险管控，并强制每个新技能通过明确的验证工作流。
      sourceRefs:
        - 13
        - 14
        - 15
        - 17
        - 18
    - friction: 许多异常任务可能过于异质，难以快速产品化。
      severity: high
      affectedBuyer: 制造工程总监
      mitigation: 仅从最高频的缺陷代码起步，拒绝长尾定制需求，直到首批分类得到验证。
      sourceRefs:
        - 19
        - 24
    - friction: MES/QMS 和可追溯集成可能在成功试点后拖累扩张。
      severity: medium
      affectedBuyer: 质量系统负责人
      mitigation: 将产品定位为接入现有离散制造执行和质量系统的写回层，而非全面替换的软件栈。
      sourceRefs:
        - 31
        - 32
    - friction: 买家可能将产品视为定制集成商项目而非可重复的操作层。
      severity: medium
      affectedBuyer: 工厂厂长
      mitigation: 在扩展至相邻异常类别之前，先以单通道 ROI、单技能系列和固定部署边界打头阵。
      sourceRefs:
        - 11
        - 12
        - 34
        - 35
market:
  tam:
    value: $367.1M
    rationale: 保守美国代理 TAM = （814 家暖通空调/制冷设备制造商 + 319 家大型家用电器制造商）× 1.8 个建模异常单元/公司 × $180K 建模年度每在线单元价值。
    isEstimate: true
    sourceRefs:
      - 11
      - 12
  sam:
    value: $48.9M
    rationale: 滩头市场 SAM 假设 1,133 家美国企业中 15% 符合多工厂、高变体首客画像，每家可支撑 1.6 个在线异常单元，年度价值 $180K。
    isEstimate: true
    sourceRefs:
      - 11
      - 12
      - 34
      - 35
      - 36
  som:
    value: $4.7M
    rationale: 第 3 年可触达情景 = 20 家已签约制造商 × 每账户 1.3 个在线单元 × 每单元年价值 $180K。
    isEstimate: true
    sourceRefs:
      - 25
      - 28
      - 34
