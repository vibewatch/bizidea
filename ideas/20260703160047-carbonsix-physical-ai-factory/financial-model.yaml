slug: "exception-cell-flywheel"
date: "2026-07-03"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-03] the model begins with the first full operating month after the dated business plan."
  - id: A2
    name: "Opening cash / seed raise"
    value: "$4.0M"
    unit: "USDM"
    source: "[BP fundingAsk.round seed + BP fundingAsk.targetFundingRangeUsd $4-6M + BP fundingAsk.runwayMonths 18] the model uses the low end of the stated range because the base case assumes strong partner leverage and still reaches late-Y2 proof with an additional six-month buffer."
  - id: A3
    name: "Customer unit definition"
    value: "One active revenue-generating exception cell program, including paid pilots early and converging toward live production cells by Y3."
    unit: "definition"
    source: "[BP gtm.pricing + BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract] the value unit is the live exception cell, but early revenue appears first as paid pilot programs."
  - id: A4
    name: "Paid pilot price"
    value: "$80K over an 8-12 week pilot"
    unit: "USDK_per_program"
    source: "[BP investorMemo.firstCustomer.initialContract $60k-$100k paid pilot] the model uses the midpoint of the stated pilot range."
  - id: A5
    name: "First-year production program value"
    value: "$180K per live cell-year"
    unit: "USDK_per_cell_year"
    source: "[BP investorMemo.firstCustomer.initialContract $150k-$220k first-year production contract + Research market.som rationale $180k annual value per live cell] the base case uses the midpoint shared by the business plan and research."
  - id: A6
    name: "Steady-state recurring software and support value"
    value: "$110K ARR per live cell-year"
    unit: "USDK_per_cell_year"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] startup-finance heuristic splits the $180K first-year value into roughly $110K recurring software and support plus about $70K of one-time deployment and onboarding."
  - id: A7
    name: "Y1 active program ramp"
    value: "M1-M12 customersEop = 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3, 4"
    unit: "programs"
    source: "[BP milestones 0-12 months + BP experimentRoadmap] this reflects 2-3 paid pilots in year 1 and one additional converted or follow-on live cell by year-end."
  - id: A8
    name: "Y2 active program ramp"
    value: "Q1Y2-Q4Y2 customersEop = 5, 6, 7, 8"
    unit: "programs"
    source: "[BP milestones 12-24 months] the year-2 exit sits slightly above the 5-7 production-cell target because one extra pilot or expansion program can coexist with the production base."
  - id: A9
    name: "Y3 active program ramp"
    value: "Q1Y3-Q4Y3 customersEop = 11, 15, 20, 26"
    unit: "programs"
    source: "[BP market.som + BP milestones 24-36 months] 26 active programs matches the researched year-3 SOM path of about 20 manufacturers under contract with roughly 1.3 live cells per account."
  - id: A10
    name: "Blended realized revenue per active program"
    value: "Revenue-bearing Y1 months M4-M12 = $18K, $18K, $18K, $17K, $17K, $17K, $16K, $16K, $16K; Q1Y2-Q4Y3 = $15.5K, $15.5K, $15.2K, $15.0K, $14.5K, $14.8K, $15.2K, $15.5K per month."
    unit: "USDK_per_active_program_month"
    source: "[A4-A6 + BP gtm.pricing] early periods are pilot and deployment fee heavy, then the mix shifts toward recurring software while expansion cells preserve blended value per active program."
  - id: A11
    name: "Gross margin ramp"
    value: "Revenue-bearing Y1 months M4-M12 = 45%, 45%, 45%, 50%, 50%, 50%, 55%, 55%, 55%; Q1Y2-Q4Y3 = 58%, 60%, 62%, 64%, 66%, 67%, 68%, 70%."
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions + Research regulatoryTechnicalConstraints] early pilots are services and validation heavy, but repeatable cell architecture should move standard deployments toward the 70% target by Q4Y3."
  - id: A12
    name: "Hiring schedule"
    value: "M1 founder plus founding software/control engineer; M2 robotics application engineer; M4 quality/MES integration lead; M7 deployment lead; M13 first sales/partnerships hire; M16 second software/control engineer; M25 second deployment/customer success hire; M28 second robotics application engineer; M31 second sales hire; M33 ops/finance hire."
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale] BP Month 0 maps to model M1 because the model starts in the first full month after the business-plan date; later hires are lean startup-finance additions only after repeatability proof begins to form."
  - id: A13
    name: "Founder loaded compensation"
    value: "$130K"
    unit: "USDK_per_year"
    source: "[BP team Founder/CEO] startup-finance heuristic for modest founder cash pay plus payroll taxes and benefits at seed stage."
  - id: A14
    name: "Software and controls loaded compensation"
    value: "$190K"
    unit: "USDK_per_FTE_year"
    source: "[BP team Founding eng] startup-finance heuristic for senior U.S. robotics-software and controls talent below large-company cash levels."
  - id: A15
    name: "Robotics application engineering loaded compensation"
    value: "$175K"
    unit: "USDK_per_FTE_year"
    source: "[BP team Robotics application engineer] startup-finance heuristic for hands-on factory robotics deployment talent."
  - id: A16
    name: "Quality and MES integration loaded compensation"
    value: "$165K"
    unit: "USDK_per_FTE_year"
    source: "[BP team Quality/MES integration lead] startup-finance heuristic for an early integration lead who spans manufacturing systems and release controls."
  - id: A17
    name: "Deployment and customer success loaded compensation"
    value: "$150K"
    unit: "USDK_per_FTE_year"
    source: "[BP team Deployment lead] startup-finance heuristic for a field-oriented deployment owner with travel and support load."
  - id: A18
    name: "Sales and partnerships loaded compensation"
    value: "$160K"
    unit: "USDK_per_FTE_year"
    source: "[BP team Account executive or partnerships lead + BP gtm.channels] startup-finance heuristic for enterprise industrial selling with travel and modest variable comp."
  - id: A19
    name: "Ops and finance loaded compensation"
    value: "$120K"
    unit: "USDK_per_FTE_year"
    source: "Startup-finance heuristic for a late-added operations and finance generalist once deployments become repeatable."
  - id: A20
    name: "Payroll allocation policy"
    value: "Founder 50% S&M / 25% R&D / 25% G&A; software and controls 100% R&D; robotics application 90% R&D / 10% G&A; quality/MES 75% R&D / 25% G&A; deployment 30% S&M / 20% R&D / 50% G&A; sales 100% S&M; ops 100% G&A."
    unit: "allocation"
    source: "[BP team rationales + BP operations] this maps loaded payroll into functional P&L lines while reflecting founder-led sales and field-heavy delivery."
  - id: A21
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll S&M/R&D/G&A starts at $7K/$15K/$8K, rises through Y1 to $9K/$22K/$14K, reaches $14K/$30K/$21K by Q4Y2, and exits Y3 at $20K/$38K/$27K."
    unit: "USDK_per_month"
    source: "[BP operations + BP fundingAsk.useOfFundsSummary + Research regulatoryTechnicalConstraints] startup-finance heuristic for travel, safety packets, cloud and simulation tooling, legal, insurance, demo hardware logistics, and integration overhead."
  - id: A22
    name: "Quarterly salary roll convention"
    value: "Y2-Y3 salary rows are the sum of actual monthly hires inside each quarter rather than a simple quarter-end snapshot."
    unit: "convention"
    source: "[Headcount column convention + A12] this keeps quarterly salary expense consistent with the staged hire schedule."
  - id: A23
    name: "Cash conversion convention"
    value: "Ending cash equals opening cash plus EBITDA."
    unit: "formula"
    source: "Startup-finance heuristic; debt, taxes, working-capital swings, and capex are not separately modeled and are surfaced again in sanityChecks.flags."
  - id: A24
    name: "Steady-state monthly churn"
    value: "1.5%"
    unit: "percent_per_month"
    source: "[BP businessModel.expansionLevers + BP investorMemo.mustBeTrue] startup-finance heuristic for sticky industrial workflow software after quality and MES write-back are embedded, but before the category is fully proven."
  - id: A25
    name: "CAC convention"
    value: "$46.5K per active program"
    unit: "USDK_per_program"
    source: "[Model calc using base-case sales and marketing spend + A9] fully loaded CAC equals total 36-month S&M spend divided by 26 net new active programs because same-account expansion is central to the wedge."
  - id: A26
    name: "Funding milestone sizing"
    value: "The raise is sized to reach 6-8 live programs across 3-5 manufacturers, prove one sister-plant transfer, and preserve roughly six months of cash beyond that proof point."
    unit: "milestone"
    source: "[BP fundingAsk.runwayMonths 18 + BP milestones 12-24 months + BP investorMemo.mustBeTrue] the model funds repeatability proof, not a broad national rollout."
  - id: A27
    name: "Downside scenario deltas"
    value: "Q4Y3 active programs fall to 18, exit gross margin to 66%, monthly churn rises to 2.5%, and pilot-to-production conversion stretches to about 9 months."
    unit: "scenario_inputs"
    source: "[BP risks + Research sensitivityCases] this downside maps directly to sparse exception classes, slower approvals, and weaker partner leverage."
  - id: A28
    name: "Upside scenario deltas"
    value: "Q4Y3 active programs rise to 30, exit gross margin reaches 72%, monthly churn improves to 1.0%, and partner-led referrals shorten conversion by about 2 months."
    unit: "scenario_inputs"
    source: "[BP milestones 24-36 months + BP businessModel.expansionLevers + Research validationSignals] the upside assumes sister-plant reuse proves out early and partner channels become productive."
