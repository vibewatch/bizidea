scenarios:
  downside:
    description: "Exception reuse proves weaker than planned, approvals stay slower, and the company exits Y3 with fewer active programs and lower margins."
    y3RevenueK: 2109.8
    y3EbitdaK: -1172.8
    cashLowPointK: 601.1
    keyAssumptionChanges:
      - "Q4Y3 active programs reach 18 instead of 26."
      - "Exit gross margin reaches 66% instead of 70%."
      - "Monthly churn rises to 2.5%."
      - "Pilot-to-production conversion stretches to about 9 months."
  base:
    description: "Founder-led pilots convert into production cells, one sister-plant transfer works in Y2, and partner referrals carry the company to 26 active programs by Q4Y3."
    y3RevenueK: 2827.9
    y3EbitdaK: -560.7
    cashLowPointK: 1233.5
    keyAssumptionChanges:
      - "Q4Y3 active programs reach 26 across roughly 20 manufacturers."
      - "First-year live-cell value stays near $180K, with $110K of steady-state recurring software and support."
      - "Exit gross margin reaches the 70% business-plan target."
      - "Headcount reaches 11 FTE by Q4Y3 with partners carrying much of the field-install burden."
  upside:
    description: "Sister-plant reuse works early, partner channels source faster follow-on work, and the company reaches materially more active programs without a step-change in opex."
    y3RevenueK: 3383.9
    y3EbitdaK: -112.6
    cashLowPointK: 1483.3
    keyAssumptionChanges:
      - "Q4Y3 active programs reach 30 instead of 26."
      - "Exit gross margin improves to 72%."
      - "Monthly churn improves to 1.0%."
      - "Partner-led referrals shorten conversion by about two months."
sensitivity:
  - variable: ARPU
    downsideCase: "$100K recurring ARR and roughly $165K first-year value per live cell"
    baseCase: "$110K recurring ARR and roughly $180K first-year value per live cell"
    upsideCase: "$120K recurring ARR and roughly $195K first-year value per live cell"
    y3RevenueImpactK: 280.0
