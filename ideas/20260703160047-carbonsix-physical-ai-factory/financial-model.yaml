modelDiagram:
  title: "Exception cell revenue flow"
  mermaid: |
    flowchart LR
      QualifiedPlants --> PaidPilots
      PaidPilots --> ProductionCells
      ProductionCells --> SisterPlantReuse
      ProductionCells --> Revenue
      SisterPlantReuse --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "The base case is driven by 26 active programs by Q4Y3 across roughly 20 manufacturers, with about $180K of first-year value per live cell and reuse into second cells or sister plants."
  - checkName: "Must go right"
    finding: "The company must keep deployments inside one supported cell architecture so gross margin can rise from 45-55% in Y1 toward 70% by Q4Y3 instead of stalling as custom robotics work."
  - checkName: "Model breaks if"
    finding: "If pilot-to-production conversion drifts toward nine months and active programs stop near 18, the downside case cuts Y3 revenue to about $2.1M and pushes cash toward a roughly $0.6M low point."
  - checkName: "Next-round proof"
    finding: "The next round is justified once 6-8 live programs across 3-5 manufacturers, one sister-plant transfer, and a partner-sourced pilot prove repeatable expansion before the seed buffer compresses."
sanityChecks:
  ruleOf40: "Y3 growth 172.5% + EBITDA margin -19.8% = 152.7%."
  burnMultiple: "Y2 burn multiple is about 1.5x and improves to about 0.3x in Y3 as revenue scales faster than burn."
  revenuePerFte: "Y3 revenue per FTE is about $257K using 11 Q4Y3 FTE, which is acceptable for a deployment-heavy industrial workflow model."
  flags:
    - "Cash is modeled as EBITDA, so demo-cell capex, receivables, and hardware deposits could pull actual cash several hundred thousand dollars below the displayed curve."
    - "The base case assumes robot OEMs, integrators, and field partners absorb much of the install and service burden; if that leverage fails, deployment hiring and burn both need to rise."
    - "CAC is measured per active program rather than per manufacturing logo, so logo-level acquisition efficiency will look worse until sister-plant expansion is proven."
    - "Y3 annual revenue stays below the researched $4.7M SOM because the model reaches SOM-like exit run rate late in the year rather than carrying that run rate for all 12 months."
