openQuestions:
- What percentage of the top 10 exception codes in target appliance and HVAC plants is repeatable enough to justify one-shift teleop teaching rather than manual work forever?
- How often do EOAT, fixture, or material-handling changes dominate the economics versus software retraining alone?
- Which defect-code, MES, and QMS systems dominate the first 50 target accounts, and how fragmented are approval workflows in practice?
- Will early buyers prefer a managed cell with bundled hardware, or a software-first layer that runs on their existing robot standard?
