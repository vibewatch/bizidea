competitors:
- name: CarbonSix
  stage: scale-up
  wedge: Deploy-ready physical AI for manufacturing, centered on teleop teaching, task-specific data flywheels, and SigmaKit tooling.
  pricing: Enterprise/custom deployment; no public list price disclosed.
  strength: "Most directly validates the category: teleop-captured data, less-than-a-day deployment claims, and commercial contracts on live factory lines."
  weaknessVsUs: Broad manufacturing positioning leaves whitespace for a workflow-native exception-cell OS tied to release rules, defect codes, and sister-plant reuse in appliance/HVAC.
  sourceRefs:
  - 1
  - 2
- name: Dexterity
  stage: scale-up
  wedge: Production-grade physical AI with world models, force-aware control, and large-scale autonomous action data.
  pricing: Enterprise/custom; no public list price disclosed.
  strength: Deep production credibility and hard-earned physical-AI know-how around real-world robustness.
  weaknessVsUs: Center of gravity is broad robotic capability rather than narrow, quality-approved exception workflows for durable-goods final assembly.
  sourceRefs:
  - 20
  - 21
  - 22
- name: Wandelbots
  stage: scale-up
  wedge: Robot-agnostic software-defined automation and physical-AI development workflows, especially via simulation and NOVA.
  pricing: Enterprise/custom and partner-led; no public list price disclosed.
  strength: Strong story on vendor-neutral robot control, simulation-first development, and AI-native automation.
  weaknessVsUs: More of an enabling OS and development layer than a purpose-built exception-lane product with embedded quality approval logic.
  sourceRefs:
  - 23
  - 24
- name: Vention
  stage: scale-up
  wedge: Cloud automation platform that combines modular hardware, controllers, and physical-AI applications for high-variability manufacturing tasks.
  pricing: "Mixed: real-time hardware pricing online, but AI applications and complete cells remain quote-based."
  strength: Fast design-to-deployment motion, broad manufacturing applicability, and unusually transparent pricing posture for modular robot hardware.
  weaknessVsUs: Broad platform scope makes it less opinionated about the exception taxonomy, release gates, and cross-plant compounding that this startup would own.
  sourceRefs:
  - 25
  - 26
  - 27
- name: Universal Robots
  stage: incumbent
  wedge: Cobot platform and partner ecosystem now extending into physical-AI tooling and inspection/assembly applications.
  pricing: Quote-based application deployment through the partner ecosystem; no public cell-level exception-lane pricing.
  strength: Massive ecosystem advantage, strong safety brand, and a direct path into inspection and assembly use cases through partners.
  weaknessVsUs: UR provides the platform and ecosystem, but not a verticalized exception-cell operating model or data moat around approved rework.
  sourceRefs:
  - 28
  - 29
  - 30
