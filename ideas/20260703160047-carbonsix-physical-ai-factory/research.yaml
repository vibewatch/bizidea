  adoptionFrictionMatrix:
  - friction: Safety approval and risk assessment can dominate the pilot timeline.
    severity: high
    affectedBuyer: Plant manager and quality approver
    mitigation: Ship one standardized cell architecture, pre-document risk controls, and force every new skill through an explicit validation workflow.
