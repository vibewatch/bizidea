    sourceRefs:
    - 25
    - 29
    - 33
  - case: Macro conditions freeze automation budgets despite labor pain
    impact: Sales cycles lengthen and the startup must prove ROI through one-lane pilots before multi-plant expansion becomes budgetable.
    sourceRefs:
    - 9
    - 37
  validationPlan:
  - priority: high
    question: Do the top 10 exception codes in one target plant account for enough recurring hours to support a reusable skill library?
    evidenceToGather: Plant-level defect-code histograms, weekly rework hours by exception class, and release-delay counts for one launch-heavy line.
  - priority: high
    question: Can one-shift teleop teaching plus validation reduce median time from recurring exception discovery to approved robotic handling?
    evidenceToGather: Pilot timestamps from first observed issue to approved skill deployment, plus edit counts and quality overrides per skill.
  - priority: medium
    question: Which combination of EOAT changes, fixture changes, and software retraining determines whether a new exception class is economically viable?
    evidenceToGather: Per-exception implementation logs, hardware bill-of-material deltas, and retraining effort across 20-30 real corrections.
  - priority: medium
    question: Which plant systems and approval artifacts must the product integrate with to clear quality sign-off without parallel paperwork?
    evidenceToGather: Current-state process maps for defect tracking, MES/QMS release, traceability, and audit requirements across 3-5 target accounts.
