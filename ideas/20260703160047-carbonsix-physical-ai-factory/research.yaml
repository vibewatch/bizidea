  sensitivityCases:
  - case: Top exception codes are too sparse or too plant-specific
    impact: If the top recurring fixes do not repeat enough across shifts or plants, the business drifts toward custom engineering instead of a compounding skill library.
    sourceRefs:
    - 19
    - 24
  - case: Safety, validation, and sign-off remain human-heavy
