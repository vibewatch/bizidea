differentiator: >-
  Generic robot OEM software optimizes the happy path inside one cell, while
  system integrators monetize bespoke fixes outside the core line. This company
  owns the forgotten layer between nonconformance and shipment release:
  recurring exception work that is too variable for hard-coded automation but
  too common to leave manual forever. Its defensibility comes from
  exception-taxonomy data, teleop-to-skill conversion history, and
  quality-approved outcome traces that compound across plants and product
  variants.
