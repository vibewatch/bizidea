problem: >-
  End-of-line exception lanes in appliance and HVAC assembly plants absorb the
  ugly work that traditional automation never touches: late label changes,
  accessory-kit completion, fit corrections, and other low-frequency but
  recurring fixes that block shipment. Plants staff these benches with overtime
  labor because every new exception looks too variable to justify a custom
  robot program. As product variants and supplier changes pile up, the hidden
  cost is not just labor; it is the inability to convert repeated exceptions
  into reusable automation that survives the next model change.
targetUser:
  primary: Manufacturing engineering leaders at North American appliance and HVAC equipment assembly plants running one or more manual end-of-line exception lanes for high-variant SKUs
  secondary: Plant quality managers responsible for rework approval and shipment release
  buyer: Director of Manufacturing Engineering or Plant Manager
startupThesis:
  nonObviousInsight: >-
    The first scalable beachhead for factory physical AI is not the core
    takt-time station that already has bespoke automation engineering behind
    it. It is the exception lane, where tasks recur often enough to create a
    data flywheel but stay variable enough that legacy robots and integrators
    never productized them. Once operators can teach a correction in less than
    a day and every intervention feeds the next model, rework stops being
    permanent manual labor and becomes a compounding skill library.
  beachhead: End-of-line exception and rework cells for North American appliance and HVAC equipment assembly plants shipping 20-200 model or option variants through manual correction lanes
  wedge: A teleop-taught exception-cell operating layer that turns recurring fixes such as label swaps, accessory-kit completion, and fit corrections into approved robot skills within one shift
  whyNowCatalyst: >-
    CarbonSix's less-than-a-day teleoperated teaching, live task-data
    flywheel, and existing commercial contracts make variable factory exception
    work newly practical to automate now rather than after a long integration
    cycle.
  ventureScalePath: >-
    Start with one rework lane in durable-goods plants, then expand into
    outbound configuration fixes, returns refurbishment, spare-parts kitting,
    and eventually a cross-factory library of variable physical-AI workflows
    for discrete manufacturing.
solution: >-
  The startup deploys a compact exception cell at the end of line or in a
  quarantine lane and connects it to the plant's defect codes, work
  instructions, and release rules. When a recurring correction appears, a lead
  operator teleoperates the fix once or twice; the software records motion,
  part context, images, and pass-fail outcome, then promotes the sequence into
  an approved robot skill for that exception class. The cell starts with
  simple, high-repeat corrections such as label replacement, bracket or clip
  reseating, accessory-kit insertion, and outbound configuration verification
  rather than full assembly. Every manual takeover becomes new task data, so
  the most common exception classes automate first and the plant can see
  exactly which skills are safe, stable, and worth rolling across shifts or
  sister plants. Over time the company builds the deepest workflow dataset on
  factory exception handling, a category that OEM robot stacks mostly ignore
  because it sits outside normal cycle-time optimization.
goToMarketSeed:
  firstCustomer: A $300M-$2B North American appliance or HVAC equipment manufacturer with 2-6 plants, 20 plus active SKU variants, and one second-shift manual exception lane absorbing shipment-blocking fixes
  buyingTrigger: A new product launch, supplier change, or label and configuration update pushes exception-lane overtime high enough that plant leadership needs automation without waiting for a bespoke integrator project
  currentAlternative: Manual rework benches staffed by overtime labor, supported by supervisor work instructions and occasional systems-integrator automation projects
  switchingReason: The wedge beats manual benches by converting the plant's own best operators into one-shift robot teachers and beats custom automation by reusing the same skill library as new exception classes recur
  pricingHypothesis: Upfront deployment fee per exception cell plus annual subscription priced by active exception skills or cleared exception volume
