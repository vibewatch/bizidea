topRisks:
  - name: Exception spread too thin
    description: If each correction is too rare or too plant-specific, the company may never accumulate enough repeatable volume to productize a skill library.
    mitigation: Start with plants where the top ten exception codes already drive meaningful weekly hours and target only recurring correction classes in the first year.
  - name: Quality liability
    description: Automating rework can create hidden defects or audit disputes if corrected units are not traced and approved rigorously.
    mitigation: Ship with before-and-after capture, force or image evidence, and human quality sign-off gates before any new skill runs unattended.
  - name: Services drag
    description: Customers may ask for bespoke exception handling across too many product families, turning the business into an integrator.
    mitigation: Standardize one supported cell architecture, narrow the first workflows to a small exception taxonomy, and charge separately for out-of-scope custom work.
