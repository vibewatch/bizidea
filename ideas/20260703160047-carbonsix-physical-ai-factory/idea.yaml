jobsToBeDone:
  - job: When a recurring end-of-line fix starts consuming overtime on a live assembly line, help a manufacturing engineering lead teach the correction once and reuse it safely, so they can clear blocked units without opening more manual benches.
    currentAlternative: Manual rework by trained operators using supervisor work instructions and ad hoc fixture tweaks
    successMetric: Hours from first recurring exception to approved robotic handling plus percentage of exception units auto-cleared
  - job: When a new product or supplier change creates a fresh exception class, help a plant quality manager promote that fix into a documented robot skill, so they can preserve throughput without a new integrator project.
    currentAlternative: Temporary labor, manual containment, and one-off automation engineering
    successMetric: Exception-lane overtime hours per week and first-pass release rate for corrected units
