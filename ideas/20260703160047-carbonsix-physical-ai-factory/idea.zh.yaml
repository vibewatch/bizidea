differentiator: >-
  通用机器人 OEM 软件优化单元内的顺畅路径，系统集成商则在核心产线之外把不合格处置货币化。
  这家公司占据的是两者之间被遗忘的一层——不合格品到出货放行之间的反复异常工作，太多变不适合硬编码自动化，
  却又太普遍不能永远靠手工。其防御性来自异常分类数据、远程操控转技能的历史记录，以及跨工厂和产品变体 持续积累的质量审批结果追溯。
