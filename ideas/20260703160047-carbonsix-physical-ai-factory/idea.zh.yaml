jobsToBeDone:
  - job: 当一条在产装配线上反复出现的产线末端修复开始消耗加班时，帮制造工程负责人一次示教该修复动作并安全复用，从而无需增开更多人工工位即可清除被卡住的产品。
    currentAlternative: 由训练有素的操作员依照主管作业指导和临时夹具调整进行人工返工
    successMetric: 从首次出现反复性异常到完成机器人处理审批的小时数，以及被自动清除的异常产品比例
  - job: 当新产品或供应商变更带来全新异常类别时，帮工厂质量经理将该修复动作提升为有据可查的机器人技能，从而在无需新集成商项目的前提下保住产量。
    currentAlternative: 临时劳动力、人工隔离管控和一次性自动化工程
    successMetric: 每周异常通道加班小时数及被纠正产品的一次性放行率
