topRisks:
  - name: 异常情况过于分散
    description: 若每类修复出现频率太低或过于工厂专属，公司可能始终无法积累足够的可重复量来产品化技能库。
    mitigation: 优先选择前十类异常代码已占据显著每周工时的工厂，第一年仅锁定反复出现的修复类别。
  - name: 质量责任风险
    description: 若返工产品未经严格追溯和审批，自动化返工可能带来隐性缺陷或审计纠纷。
    mitigation: 随产品交付前后影像捕获、施力或图像留证，并在任何新技能无人值守运行前强制人工质量签发。
  - name: 服务化拖累
    description: 客户可能要求跨越多产品系列的定制异常处理，把业务拖入集成商模式。
    mitigation: 标准化为一套受支持的单元架构，将首批工作流收窄至少数异常分类，并对超出范围的定制工作单独收费。
