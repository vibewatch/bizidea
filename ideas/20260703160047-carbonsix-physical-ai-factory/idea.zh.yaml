problem: >-
  家电与暖通空调装配工厂的产线末端异常通道承接着传统自动化从未触碰的脏活：临时标签变更、配件套件补齐、装配纠偏，
  以及其他低频但反复出现、卡住出货的修复工作。工厂靠加班人工维持这些工位，因为每一个新异常看起来都太多变，
  难以为其定制机器人程序。随着产品变体和供应商变更不断叠加，隐性成本不只是人工——更是无法把反复出现的异常 转化为能在下一次换型后继续复用的自动化资产。
targetUser:
  primary: 北美家电与暖通空调装配工厂的制造工程负责人，管理一条或多条针对高变体 SKU 的产线末端人工异常通道
  secondary: 负责返工审批与出货放行的工厂质量经理
  buyer: 制造工程总监或工厂厂长
startupThesis:
  nonObviousInsight: >-
    工厂物理 AI 真正可规模化的滩头市场，不是核心节拍工位——那里已有大量专项自动化工程投入。 切口在于异常通道：任务出现频率足以形成数据飞轮，变化程度又让传统机器人和集成商从未将其产品化。
    一旦操作员能在一班内教会一个修复动作，每次干预都能喂给下一个模型，返工就不再是永久性人工活， 而是不断复利的技能库。
  beachhead: 北美家电与暖通空调装配工厂的产线末端异常与返工单元，出货涵盖 20—200 个型号或配置变体、仍靠人工纠偏通道处理
  wedge: 一个通过远程操控示教的异常单元操作层，把标签替换、配件套件补齐、装配纠偏等反复出现的修复工作，在一个班次内转化为经审批的机器人技能
  whyNowCatalyst: CarbonSix 不到一天的远程操控示教、在线任务数据飞轮，以及现有商业合同， 让多变工厂异常任务的自动化现在就切实可行，而无需等待漫长的集成周期。
  ventureScalePath: 从耐用品工厂的一条返工通道起步，依次扩展至出库配置纠偏、退货翻新、备件配套， 最终打造离散制造业跨工厂的多变物理 AI 工作流库。
solution: >-
  这家创业公司在产线末端或隔离通道部署一个紧凑型异常单元，接入工厂的缺陷代码、作业指导和放行规则。
  当某类反复出现的修复动作出现时，主操作员进行一至两次远程操控示范；软件记录动作轨迹、零件上下文、图像及
  合格/不合格结果，再将该流程提升为该类异常对应的经审批机器人技能。单元先从标签替换、卡扣或夹子复位、配件
  套件插入、出库配置核验等简单高频修复起步，而非完整装配。每一次人工介入都产生新的任务数据，最常见的异常
  类别因此率先自动化，工厂也能清楚看到哪些技能稳定可靠、值得推广到多个班次或姐妹工厂。随着时间推移，公司 积累起工厂异常处理领域最深的工作流数据集——这一类别大多数 OEM
  机器人软件栈都因其超出常规节拍时间优化 范围而视而不见。
goToMarketSeed:
  firstCustomer: 营收 3 亿至 20 亿美元的北美家电或暖通空调设备制造商，拥有 2—6 个工厂、20 个以上在产 SKU 变体，且有一条第二班人工异常通道在承接卡住出货的修复工作
  buyingTrigger: 新品发布、供应商变更，或标签与配置更新使异常通道加班成本飙升，迫使工厂管理层在不等待专项集成商项目的前提下寻求自动化方案
  currentAlternative: 靠加班人工维持的返工台，配以主管作业指导和偶发的系统集成商自动化项目
  switchingReason: 相较人工返工台，切口能把工厂最优秀的操作员转化为一班机器人示教老师；相较定制自动化，同类异常再次出现时可复用同一套技能库
  pricingHypothesis: 每个异常单元的前期部署费，加上按激活的异常技能数或已清除异常量收取的年度订阅费
