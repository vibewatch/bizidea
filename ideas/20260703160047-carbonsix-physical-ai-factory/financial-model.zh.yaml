slug: exception-cell-flywheel
date: "2026-07-03"
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-08
    unit: YYYY-MM
    source: "[BP 日期 2026-07-03] 模型从已定业务计划日期之后第一个完整运营月开始。"
  - id: A2
    name: 期初现金 / 种子轮融资
    value: $4.0M
    unit: USDM
    source: >-
      [BP fundingAsk.round seed + BP fundingAsk.targetFundingRangeUsd $4-6M + BP
      fundingAsk.runwayMonths 18] 模型取区间低端，因为基准情景假设有强合作伙伴杠杆，且在额外六个月缓冲下仍能完成 Y2 末期验证。
  - id: A3
    name: 客户单元定义
    value: 一个活跃的产生营收的异常单元项目，早期含付费试点，Y3 逐步收敛至在线生产单元。
    unit: definition
    source: >-
      [BP gtm.pricing + BP businessModel.unitOfValue + BP
      investorMemo.firstCustomer.initialContract] 价值单元是在线异常单元，但早期营收先以付费试点项目形式体现。
  - id: A4
    name: 付费试点定价
    value: $80K，8—12 周试点
    unit: USDK_per_program
    source: "[BP investorMemo.firstCustomer.initialContract $60k-$100k 付费试点] 模型取所述试点区间中值。"
  - id: A5
    name: 首年生产项目价值
    value: 每个在线单元年 $180K
    unit: USDK_per_cell_year
    source: >-
      [BP investorMemo.firstCustomer.initialContract $150k-$220k 首年生产合同 + 研究 market.som 测算 $180k
      每在线单元年价值] 基准情景取业务计划与研究共同支持的中值。
  - id: A6
    name: 稳定期经常性软件与支持价值
    value: 每个在线单元年 $110K ARR
    unit: USDK_per_cell_year
    source: >-
      [BP gtm.pricing + BP businessModel.revenueStreams] 创业财务启发式：将 $180K 首年价值拆分为约 $110K 经常性软件与支持，加约
      $70K 一次性部署与引导费。
  - id: A7
    name: Y1 活跃项目爬坡
    value: M1-M12 期末客户数 = 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3, 4
    unit: programs
    source: "[BP milestones 0-12 months + BP experimentRoadmap] 反映 Y1 内 2—3 个付费试点，加上年末一个额外转化或跟进在线单元。"
  - id: A8
    name: Y2 活跃项目爬坡
    value: Q1Y2-Q4Y2 期末客户数 = 5, 6, 7, 8
    unit: programs
    source: "[BP milestones 12-24 months] Y2 出口略高于 5—7 个生产单元目标，因为一个额外试点或扩张项目可与生产基础共存。"
  - id: A9
    name: Y3 活跃项目爬坡
    value: Q1Y3-Q4Y3 期末客户数 = 11, 15, 20, 26
    unit: programs
    source: >-
      [BP market.som + BP milestones 24-36 months] 26 个活跃项目对应研究支持的第 3 年 SOM 路径——约 20 家制造商签约、每账户约 1.3
      个在线单元。
  - id: A10
    name: 每活跃项目混合已实现营收
    value: >-
      产生营收的 Y1 月份 M4-M12 = $18K, $18K, $18K, $17K, $17K, $17K, $16K, $16K, $16K；Q1Y2-Q4Y3 = $15.5K,
      $15.5K, $15.2K, $15.0K, $14.5K, $14.8K, $15.2K, $15.5K（每月）。
    unit: USDK_per_active_program_month
    source: "[A4-A6 + BP gtm.pricing] 早期以试点和部署费为主，之后混合向经常性软件倾斜，同时扩张单元维持每活跃项目混合价值。"
  - id: A11
    name: 毛利率爬坡
    value: >-
      产生营收的 Y1 月份 M4-M12 = 45%, 45%, 45%, 50%, 50%, 50%, 55%, 55%, 55%；Q1Y2-Q4Y3 = 58%, 60%, 62%,
      64%, 66%, 67%, 68%, 70%。
    unit: percent
    source: >-
      [BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions + 研究
      regulatoryTechnicalConstraints] 早期试点服务和验证负担重，但可复用的单元架构应推动标准部署在 Q4Y3 前向 70% 目标靠拢。
  - id: A12
    name: 招聘时间表
    value: >-
      M1 创始人加联合创始软件/控制工程师；M2 机器人应用工程师；M4 质量/MES 集成负责人；M7 交付负责人；M13 第一个销售/合作伙伴人员；M16 第二个软件/控制工程师；M25
      第二个交付/客户成功人员；M28 第二个机器人应用工程师；M31 第二个销售人员；M33 运营/财务人员。
    unit: timeline
    source: >-
      [BP team + BP strategicChoices.sequencingRationale] BP 第 0 个月对应模型
      M1，因为模型从业务计划日期后第一个完整月开始；后续招聘是在可重复性验证开始成形后的精益创业财务补充。
  - id: A13
    name: 创始人综合薪酬
    value: $130K
    unit: USDK_per_year
    source: "[BP team 创始人/CEO] 种子期创始人适度现金薪酬加薪资税与福利的创业财务启发式。"
  - id: A14
    name: 软件与控制综合薪酬
    value: $190K
    unit: USDK_per_FTE_year
    source: "[BP team 联合创始工程师] 低于大公司现金水平的美国高级机器人软件与控制人才创业财务启发式。"
  - id: A15
    name: 机器人应用工程综合薪酬
    value: $175K
    unit: USDK_per_FTE_year
    source: "[BP team 机器人应用工程师] 现场工厂机器人部署人才的创业财务启发式。"
  - id: A16
    name: 质量与 MES 集成综合薪酬
    value: $165K
    unit: USDK_per_FTE_year
    source: "[BP team 质量/MES 集成负责人] 横跨制造系统和放行管控的早期集成负责人创业财务启发式。"
  - id: A17
    name: 交付与客户成功综合薪酬
    value: $150K
    unit: USDK_per_FTE_year
    source: "[BP team 交付负责人] 含出差和支持负荷的现场导向型交付负责人创业财务启发式。"
  - id: A18
    name: 销售与合作伙伴综合薪酬
    value: $160K
    unit: USDK_per_FTE_year
    source: "[BP team 客户经理或合作伙伴负责人 + BP gtm.channels] 含出差和适度浮动薪酬的工业企业销售创业财务启发式。"
  - id: A19
    name: 运营与财务综合薪酬
    value: $120K
    unit: USDK_per_FTE_year
    source: 部署可重复后期加入的运营与财务通才创业财务启发式。
  - id: A20
    name: 薪资分配方式
    value: >-
      创始人 50% S&M / 25% R&D / 25% G&A；软件与控制 100% R&D；机器人应用 90% R&D / 10% G&A；质量/MES 75% R&D / 25%
      G&A；交付 30% S&M / 20% R&D / 50% G&A；销售 100% S&M；运营 100% G&A。
    unit: allocation
    source: "[BP team rationales + BP operations] 将综合薪资分配到各职能损益科目，同时体现创始人主导销售和现场交付重的特点。"
  - id: A21
    name: 非薪资运营支出爬坡
    value: >-
      月度非薪资 S&M/R&D/G&A 从 $7K/$15K/$8K 起步，Y1 末升至 $9K/$22K/$14K，Q4Y2 达到 $14K/$30K/$21K，Y3 末
      $20K/$38K/$27K。
    unit: USDK_per_month
    source: >-
      [BP operations + BP fundingAsk.useOfFundsSummary + 研究 regulatoryTechnicalConstraints]
      出差、安全资料包、云端与仿真工具、法务、保险、演示硬件物流和集成开销的创业财务启发式。
  - id: A22
    name: 季度薪资汇总惯例
    value: Y2-Y3 薪资行为各季度内实际月度入职的总和，而非简单的季末快照。
    unit: convention
    source: "[人员列惯例 + A12] 确保季度薪资支出与分阶段招聘时间表保持一致。"
  - id: A23
    name: 现金转换惯例
    value: 期末现金 = 期初现金 + EBITDA。
    unit: formula
    source: 创业财务启发式；债务、税务、营运资本波动和资本支出未单独建模，详见 sanityChecks.flags。
  - id: A24
    name: 稳定期月度流失率
    value: 1.5%
    unit: percent_per_month
    source: >-
      [BP businessModel.expansionLevers + BP investorMemo.mustBeTrue] 质量和 MES
      写回嵌入后、品类完全验证前，工业工作流软件粘性的创业财务启发式。
  - id: A25
    name: CAC 惯例
    value: 每活跃项目 $46.5K
    unit: USDK_per_program
    source: "[模型计算使用基准情景销售与市场投入 + A9] 完全加载 CAC = 36 个月 S&M 总支出 / 26 个净新增活跃项目，因为账户内扩张是切口的核心。"
  - id: A26
    name: 融资里程碑规模测算
    value: 融资规模以实现 3—5 家制造商的 6—8 个在线项目、验证一次姐妹工厂转移、并在该验证点之后保留约六个月现金为准。
    unit: milestone
    source: >-
      [BP fundingAsk.runwayMonths 18 + BP milestones 12-24 months + BP investorMemo.mustBeTrue]
      模型为可重复性验证提供资金，而非全国规模推广。
  - id: A27
    name: 悲观情景差异
    value: Q4Y3 活跃项目降至 18 个，出口毛利率 66%，月度流失率升至 2.5%，试点转生产周期拉长至约 9 个月。
    unit: scenario_inputs
    source: "[BP risks + 研究 sensitivityCases] 该悲观情景直接映射至异常类别稀少、审批更慢和合作伙伴杠杆偏弱。"
  - id: A28
    name: 乐观情景差异
    value: Q4Y3 活跃项目升至 30 个，出口毛利率 72%，月度流失率改善至 1.0%，合作伙伴转介缩短转化周期约 2 个月。
    unit: scenario_inputs
    source: >-
      [BP milestones 24-36 months + BP businessModel.expansionLevers + 研究 validationSignals]
      乐观情景假设姐妹工厂复用早期验证、合作伙伴渠道逐步有效。
