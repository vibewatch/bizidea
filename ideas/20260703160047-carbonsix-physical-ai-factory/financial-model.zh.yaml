modelDiagram:
  title: 异常单元营收流
  mermaid: |
    flowchart LR
      QualifiedPlants --> PaidPilots
      PaidPilots --> ProductionCells
      ProductionCells --> SisterPlantReuse
      ProductionCells --> Revenue
      SisterPlantReuse --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 营收引擎
    finding: 基准情景由 Q4Y3 末的 26 个活跃项目驱动，跨约 20 家制造商，每个在线单元首年价值约 $180K，并向第二单元或姐妹工厂复用。
  - checkName: 必须做对的事
    finding: 公司必须把部署保持在一套受支持的单元架构之内，这样毛利率才能从 Y1 的 45—55% 爬升至 Q4Y3 的 70%，而不是卡在定制机器人工作上。
  - checkName: 模型失效条件
    finding: 若试点转生产转化拖到九个月、活跃项目停在约 18 个附近，悲观情景将 Y3 营收削至约 $2.1M，并把现金推向约 $0.6M 的低点。
  - checkName: 下一轮融资验证点
    finding: 下一轮融资应在 3—5 家制造商的 6—8 个在线项目、一次姐妹工厂转移和一个合作伙伴带来的试点证明可重复扩张，且种子缓冲尚未压缩之后启动。
sanityChecks:
  ruleOf40: Y3 增长率 172.5% + EBITDA 利润率 -19.8% = 152.7%。
  burnMultiple: Y2 消耗倍数约 1.5x，Y3 随营收增速超过消耗改善至约 0.3x。
  revenuePerFte: 以 11 名 Q4Y3 全职计，Y3 每全职营收约 $257K，对于部署密集的工业工作流模型而言属可接受水平。
  flags:
    - 现金按 EBITDA 建模，演示单元资本支出、应收账款和硬件押金可能将实际现金拉至显示曲线以下数十万美元。
    - 基准情景假设机器人 OEM、集成商和现场合作伙伴承担大部分安装和服务负担；若该杠杆失效，部署招聘和消耗均需上调。
    - CAC 按活跃项目而非制造客户计量，因此在姐妹工厂扩张得到验证之前，客户级获客效率会看起来更差。
    - Y3 全年营收低于研究支持的 $4.7M SOM，因为模型在年末才达到 SOM 量级的出口运行率，而非全年维持该水平。
