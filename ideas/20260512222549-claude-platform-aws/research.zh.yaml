competitors:
- name: Amazon Bedrock
  stage: incumbent
  wedge: AWS 原生 agent 平台，在安全边界内提供 logging、guardrails 和模型接入。
  pricing: 按模型和层级按量计费；部分模型的 batch inference 价格可比按需低 50%。
  strength: 默认占据 AWS 控制平面、安全边界和相邻 agent 能力。
  weaknessVsUs: 解决不了原生 Claude Platform 的工作区代理，也拿不到 Anthropic 托管 beta 能力的同日访问。
  sourceRefs:
  - 26
  - 27
  - 28
  - 29
  - 39
- name: Portkey
  stage: scale-up
  wedge: LLM 网关，提供路由、guardrails、可观测性和访问控制。
  pricing: 以定制 / enterprise 方案为主，并已进入 AWS Marketplace。
  strength: 跨模型控制面和路由层足够宽。
  weaknessVsUs: 不是围绕 AWS 组织原生的 Claude 工作区生命周期、CloudTrail 映射或内部成本分摊交接来设计的。
  sourceRefs:
  - 30
- name: Helicone
  stage: scale-up
  wedge: 可观测性加 AI 网关，覆盖限速、告警、路由和回退。
  pricing: 免费、$79/月 Pro、$799/月 Team，enterprise 定制。
  strength: 代理层部署很快，成本和限速控制都比较具体。
  weaknessVsUs: 核心仍是请求流量，而不是 AWS 账户治理、租户开通或财务归属模型。
  sourceRefs:
  - 31
  - 32
- name: Langfuse
  stage: scale-up
  wedge: 开源 tracing、评估、prompt 管理和 LLM 应用安全监控。
  pricing: 免费、$29/月 Core、$199/月 Pro、$2,499/月 Enterprise，另有可选 team add-on。
  strength: 可观测性、eval 和企业安全姿态都很强。
  weaknessVsUs: 更偏事后可观测与评估，而不是在 AWS 里预先把租户治理做好。
  sourceRefs:
  - 33
  - 34
  - 35
- name: LiteLLM
  stage: open-source
  wedge: 统一的自托管网关，提供虚拟 key、成本跟踪和会话预算上限。
  pricing: 开源 / 自托管。
  strength: 给愿意自建网关层的团队提供了灵活的 DIY 基线。
  weaknessVsUs: 企业仍得自己把 IAM 范围、工作区生命周期、CloudTrail 对齐和 rollout 审批拼起来。
  sourceRefs:
  - 36
  - 37
regulatoryTechnicalConstraints:
- point: Claude Platform on AWS 由 Anthropic 运营，推理可能发生在 AWS 安全边界之外，因此对驻留敏感场景形成约束。
  sourceRefs:
  - 1
  - 5
  - 39
- point: 如果想完整看到 Claude Platform on AWS 的 CloudTrail 数据面动作，需要显式开启 data-event logging，而且会增加成本。
  sourceRefs:
  - 7
  - 21
- point: IAM 控制细到 action 和 workspace 级别，所以自动化开通必须正确处理 SigV4、workspace ARN 和最小权限策略模板。
  sourceRefs:
  - 6
  - 8
  - 17
  - 22
validationSignals:
- point: AWS 是首个通过现有 AWS 账户，把 IAM、计费和 CloudTrail 一起带给原生 Claude Platform 的云厂商。
  sourceRefs:
  - 1
  - 2
  - 5
- point: 44% 的受访组织已把 GenAI 从实验推进到生产，这会把压力集中推向中央平台团队。
  sourceRefs:
  - 10
- point: Capgemini 发现 82% 的组织计划在 1–3 年内接入 AI agents，这会继续放大权限控制和审计控制需求。
  sourceRefs:
  - 40
openQuestions:
- 当采购摩擦下降后，有多少大型 AWS 企业会坚持选择原生 Claude Platform on AWS，而不是直接退回 Bedrock？
- 安全团队会接受用于内部 copilots 和 agents 的 Anthropic 边界外处理吗，还是 ZDR 会变成硬要求？
- 第一笔预算更可能挂在云平台工程、中央 AI 办公室，还是 FinOps 下面？
- 最先触发采购的控制点到底是哪一个：工作区开通、成本分摊、IAM 策略模板，还是审计报表？
