    - 16
  validationPlan:
  - priority: high
    question: 有多少大型 AWS 企业在新的内部 agent 工作负载上，会主动选原生 Claude Platform on AWS 而不是 Bedrock？
    evidenceToGather: 做 20 次买家访谈，并拿到 AWS 或 Anthropic 客户团队提供的 5 份真实 rollout 项目图。
  - priority: high
    question: 最先痛到足以触发采购的控制点，到底是哪一个：工作区开通、预算上限、IAM 模板，还是成本分摊？
    evidenceToGather: 与云平台、FinOps 和安全负责人做问题排序访谈，并向每家潜在客户拿到一份被修改过的内部 rollout 清单。
  - priority: medium
    question: 买家会接受在 AWS 安全边界之外处理数据，用于内部 copilots 和 agents 吗？
    evidenceToGather: 收集低、中、高敏感度场景下的安全评审结果，以及是否要求 ZDR。
  - priority: medium
    question: 企业从第一天开始，更想要一层 Claude 专用代理，还是更想直接买一套跨模型 AI 控制平面？
    evidenceToGather: 做功能取舍访谈，对比“只做 Claude”与“多模型路线图”对采购意愿的影响。
