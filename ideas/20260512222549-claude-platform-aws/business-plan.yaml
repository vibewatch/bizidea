slug: claude-aws-tenant-broker
date: '2026-05-12'
executiveSummary: >-
  Claude AWS Tenant Broker is a control plane for large AWS enterprises that
  need to provision native Claude Platform access for multiple internal teams
  without losing budget control, IAM discipline, or auditability. The first
  customer is a Fortune 2000 company with a central cloud platform team, an AWS
  enterprise agreement, and 5 or more internal teams requesting production
  Claude access after security has approved the new AWS buying path. The launch
  of Claude Platform on AWS matters because procurement is no longer the main
  blocker; tenanting, spend ownership, CloudTrail setup, and approval workflow
  now become the operational bottleneck. The MVP should focus narrowly on
  self-service tenant requests, mandatory metadata, IAM role templates, budget
  caps, tool-permission approvals, and chargeback exports tied to AWS account
  structure. Go-to-market should be founder-led into Directors of Cloud Platform
  Engineering and VP Infrastructure buyers, starting with a paid rollout pilot
  for 2 to 3 internal teams and converting to an annual subscription priced by
  active tenants and managed spend. Research supports a real but modest initial
  market, modeled at about $151.6M TAM, $37.9M SAM, and $3.2M year-3 SOM, so
  the company has to prove a tight wedge before expanding into multi-model or
  multi-cloud control. The best reason to believe is that Bedrock, gateways, and
  internal scripts all miss the exact workflow of AWS-org-native Claude tenant
  lifecycle plus finance-grade ownership mapping. The biggest disconfirming
  risks are AWS or Anthropic shipping enough first-party admin controls,
  security teams rejecting Anthropic-operated processing outside the AWS
  boundary, and buyers deciding spreadsheets and internal scripts are good
  enough. A key evidence gap remains which control triggers budget first across
  real buyers, so the first 12 months must prove that provisioning pain converts
  into paid pilots and then into production contracts.
problem:
  - Cloud platform teams become the bottleneck once native Claude can be bought through AWS, because each new internal team needs isolated access, IAM scope, audit logging, and budget ownership before rollout.
  - The current alternative is a brittle mix of shared accounts, manual IAM setup, spreadsheets for chargeback, and one-off approval workflows that break when managed agents, code execution, and tool use spread across teams.
solution:
  - Provide an AWS-native tenant broker that provisions Claude workspaces per internal team with approved IAM templates, mandatory tags, budget caps, and default CloudTrail mappings.
  - Give platform, FinOps, and security teams a shared approval and chargeback layer so they can say yes to more Claude deployments without forcing every team into a shared platform account or a Bedrock fallback.
whyWeWin:
  - The wedge is tied to one newly urgent workflow, provisioning native Claude Platform on AWS inside existing AWS governance models, rather than a generic AI observability or routing story.
  - The product fits how large enterprises already operate with AWS Organizations, Control Tower, Budgets, and cost-allocation tags, which lowers behavior change versus introducing a new platform standard.
  - Tenant-policy history, IAM templates, approved tool configurations, and spend-to-owner mappings can compound into a sticky implementation and data moat that horizontal gateways do not collect at tenant-creation time.
strategicChoices:
  beachhead: Fortune 2000 AWS enterprises with centralized cloud platform teams, 50 or more AWS accounts, and at least 5 internal teams requesting production Claude agents or tool-using applications.
  wedgeRationale: This slice feels pain immediately after security approval and AWS commitment pressure, has a clear economic buyer, and can measure success in faster tenant launch and cleaner spend attribution. Going broader into all LLM governance, SMB buyers, or non-AWS clouds would dilute the one workflow where urgency is strongest and proof is fastest.
  sequencingRationale: Start with provisioning, IAM templates, budget enforcement, and audit defaults because those unblock the first production rollout. Add analytics, migration tooling, partner-led deployment, and only later cross-model or multi-cloud policy once the company has reference accounts and repeatable AWS-org mappings.
  notYet:
    - Cross-cloud AI control plane for Azure and GCP
    - Horizontal LLM gateway and model routing product
    - End-user copilot interfaces or agent-building IDE features
    - Highly regulated residency-sensitive workloads that will default to Bedrock first
market:
  tam: Modeled TAM of about $151.6M from U.S. firms with 500 or more employees filtered by AWS usage, GenAI-in-production adoption, and an estimated $90k ACV.
  sam: Modeled SAM of about $37.9M for large enterprises with centralized AWS platform teams and enough internal Claude demand to justify tenant brokering.
  som: Modeled year-3 SOM of about $3.2M assuming roughly 35 customers at a blended $90k ACV.
  segments:
    - Central cloud platform and internal AI platform teams at large AWS enterprises standardizing native Claude rollout
    - FinOps and security engineering stakeholders that need spend attribution, approval workflow, and audit evidence for internal AI deployments
  buyingProcess: The first deal is likely led by a Director of Cloud Platform Engineering or VP Infrastructure after Claude Platform on AWS is approved and several business teams request production access at once. A practical buying path is a paid pilot covering 2 to 3 internal teams, with FinOps and security as required stakeholders, followed by an annual contract only if tenant launch time drops and spend attribution is clean enough for chargeback.
product:
  mvp: The MVP is a control plane that lets a platform team approve a tenant request, apply IAM and tool-permission templates, enforce mandatory metadata and budget caps, and export chargeback records linked to CloudTrail and AWS cost tags. It must work as a read-only and provisioning overlay on existing AWS org structure rather than requiring a full platform rebuild.
  sixMonth: Ship tenant request workflows, AWS org mapping, IAM role templates, budget and tag policies, CloudTrail setup guidance, and 2 to 3 paid design-partner pilots on live internal Claude rollouts.
  twelveMonth: Add approval policy packs, spend and exception dashboards, migration tooling for teams moving from direct Anthropic or Bedrock setups, and one repeatable implementation playbook through an AWS consultancy partner.
  twentyFourMonth: Expand into a broader enterprise AI control plane by adding cross-model policy normalization, deeper FinOps exports, and support for additional clouds only after the Claude-on-AWS wedge shows repeatable production retention.
  keyBets:
    - Buyers will fund a Claude-specific tenant broker before they fund a broad AI governance platform.
    - Mandatory metadata and tenant creation controls solve a more urgent pain than post-hoc observability for the initial buyer.
    - Read-only integration with AWS org structure is sufficient to launch pilots without heavy professional services.
    - Early customers that standardize Claude on AWS will later buy adjacent policy and cross-model controls from the same vendor.
gtm:
  wedge: Sell rollout acceleration for native Claude on AWS to cloud platform leaders who need to approve multiple internal teams quickly without losing budget ownership or auditability.
  channels:
    - Founder-led direct sales to Directors of Cloud Platform Engineering, VP Infrastructure, and heads of internal AI platforms
    - AWS Control Tower and multi-account consultancies that already run landing-zone and governance projects
    - FinOps and cloud-governance communities where AI chargeback and tagging discipline are active problems
  funnelTargets: "Target account to qualified discovery 25%+, qualified discovery to paid pilot 20%+, paid pilot to annual production 50%+, production account to second-team expansion 60%+ within 9 months"
  pricing: Quote-based annual platform subscription priced on active Claude tenants and managed Claude spend, with a paid pilot or onboarding package credited toward production. This matches the buyer's value equation because the purchase replaces internal setup work and enables finance-grade ownership mapping rather than selling another developer tool seat.
businessModel:
  revenueStreams:
    - Annual SaaS subscription for tenant provisioning, approval workflow, and chargeback controls
    - Onboarding and policy-mapping fees for AWS org setup and initial rollout
    - Premium modules for advanced approvals, cross-model policy, and expanded spend analytics
  unitOfValue: Active Claude tenants under management with managed Claude spend as the main expansion basis
  targetGrossMarginPct: 70
  expansionLevers:
    - More internal teams, environments, and business units per enterprise account
    - Additional approval, audit, and analytics modules sold to FinOps and security stakeholders
    - Expansion from Claude-on-AWS into broader multi-model governance after the initial control plane is embedded
strategyMap:
  northStarMetric: Number of production Claude tenants launched with approved policies and 95% or better spend attribution to a named team or business unit
  inputMetrics:
    - Median days from tenant request to approved production launch
    - Percentage of Claude spend mapped to required ownership metadata
    - Paid pilot to annual production conversion rate
    - Number of internal teams live per production customer
    - Percentage of new tenant requests using standard policy templates without manual rewrite
  moatsToBuild:
    - Library of reusable IAM, budget, and tool-permission templates mapped to real AWS org topologies
    - Historical dataset linking tenant structure, policy choices, and spend ownership outcomes across enterprises
    - Embedded approval workflow and chargeback exports that become part of internal cloud operating cadence
  killCriteria:
    - Fewer than 5 of the first 20 target enterprises say native Claude on AWS rollout is urgent enough to fund in the current budget cycle.
    - Fewer than 2 of the first 4 paid pilots convert into annual contracts above $90k ACV within 6 months of pilot completion.
    - More than 25% of pilot tenant launches still require bespoke IAM or billing work that the product cannot templatize.
    - AWS or Anthropic releases first-party tenant admin and chargeback features that remove the need for a separate broker before reference accounts are won.
  mermaid: |
    flowchart LR
      Wedge[Claude on AWS rollout bottleneck] --> MVP[Tenant provisioning and chargeback MVP]
      MVP --> Proof[Paid pilots with faster launches and clean ownership mapping]
      Proof --> Expansion[Broader AI governance and cross-model control]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear buyer pain and disciplined wedge, but conviction stays limited until real enterprises prove they will pay for a Claude-specific layer before AWS closes the gap.
    whyBelieve: The startup targets a concrete operating problem created by a new AWS buying path, where native Claude parity, IAM complexity, and internal chargeback create a credible workflow beachhead.
    whyDoubt: The initial market is modest and vulnerable to Bedrock substitution, in-house scripts, and fast first-party feature catch-up from AWS or Anthropic.
    nextDiligence: Confirm with 10 to 15 target buyers that provisioning and ownership mapping, not general governance, is the first budget-worthy pain and that at least 3 will fund a paid pilot this year.
  firstCustomer:
    title: Director of Cloud Platform Engineering at a Fortune 2000 AWS enterprise
    profile: A large enterprise with centralized AWS governance, an existing AWS commitment, and multiple internal product teams asking for production Claude agents or tool-enabled applications.
    trigger: Security approves Claude Platform on AWS and leadership asks the platform team to move AI usage under AWS commitments with named cost ownership by team or business unit.
    buyer: Director of Cloud Platform Engineering or VP Infrastructure
    initialContract: $40k-$60k paid pilot covering 2 to 3 internal teams, credited toward a $90k-$150k annual subscription if tenant launch time and chargeback accuracy improve enough for broader rollout.
  mustBeTrue:
    - At least 5 of the first 15 target enterprises are actively choosing native Claude Platform on AWS over Bedrock for some production workloads.
    - Cloud platform leaders view tenant provisioning and spend ownership as a budgetable problem, not an internal scripting task.
    - Security review for lower-sensitivity internal workloads can pass despite Anthropic-operated processing outside the AWS security boundary.
    - A read-only and provisioning overlay can launch live pilots in less than 30 days without bespoke integration work dominating margin.
    - Early customers show credible willingness to expand from Claude-on-AWS controls into broader multi-model or cross-business-unit governance.
  diligenceQuestions:
    - Which control actually triggers purchase first in live accounts, tenant provisioning, IAM templates, chargeback, or audit reporting?
    - Who owns the first budget in practice, cloud platform, central AI, FinOps, or security?
    - How often do buyers reject native Claude on AWS because inference happens outside the AWS security boundary?
    - How quickly can AWS or Anthropic add first-party tenant admin and spend controls that erase the wedge?
    - What pilot evidence convinces a platform leader to replace internal scripts with an annual software contract?
operatingAssumptions:
  - assumption: The first economic buyer will sit in cloud platform or infrastructure leadership rather than FinOps or security because rollout velocity is the immediate pain point.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots where the commercial sponsor is a Director of Cloud Platform Engineering, VP Infrastructure, or equivalent platform leader.
    decisionImpact: If false, the company must repackage the product for FinOps or security buyers, which would change messaging, roadmap priority, and likely sales cycle length.
  - assumption: Lower-sensitivity internal agent workloads will pass security review even though Claude Platform on AWS is Anthropic-operated and may process inference outside the AWS security boundary.
    basis: research.yaml
    validationTest: Document at least 2 successful security reviews or approved pilot launches in target accounts without a mandatory Bedrock fallback.
    decisionImpact: If false, the reachable market narrows sharply and the beachhead must shift toward less regulated customers or a Bedrock-adjacent product.
  - assumption: Enterprises will pay at least $90k annualized for a Claude-specific tenant broker if it materially reduces rollout time and improves chargeback accuracy.
    basis: research.yaml
    validationTest: Convert 2 paid pilots into annual contracts at or above $90k ACV with buyers citing setup time and ownership mapping as the reason.
    decisionImpact: If false, the wedge may not support venture-scale economics without a much broader product or lower-touch distribution model.
  - assumption: AWS and Anthropic will not ship enough native tenant admin and chargeback functionality to eliminate the standalone wedge before the company lands reference accounts.
    basis: operator judgment
    validationTest: Track feature releases quarterly and verify that pilot customers still require external approval workflow, chargeback exports, or cross-team policy templating the native platforms do not provide.
    decisionImpact: If false, the company must pivot quickly toward cross-model governance, partner distribution, or a services-led implementation layer.
  - assumption: AWS org mapping, IAM templates, and chargeback exports can be templatized across enterprises well enough to keep implementation repeatable.
    basis: idea.yaml
    validationTest: Launch 3 pilots with no more than one customer-specific policy exception set per account and less than 20 hours of custom engineering each.
    decisionImpact: If false, services burden rises and the company should narrow ICP further or price implementation much more aggressively.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 cloud platform, FinOps, and security leaders at target AWS enterprises and rank the first budget-worthy pain across provisioning, IAM, chargeback, and audit controls.
    hypothesis: Provisioning and ownership mapping will outrank post-hoc analytics as the first problem buyers will fund.
    successMetric: At least 8 qualified buyers rank tenant launch or spend ownership as a top-two pain and at least 3 agree to scope a pilot.
    owner: Founder / CEO
  - horizon: 0–90 days
    experiment: Run a concierge design exercise that maps one prospect's AWS org, required metadata, and approval flow into a standard tenant policy template.
    hypothesis: A templated onboarding workflow can fit real multi-account enterprise setups without bespoke architecture each time.
    successMetric: One design partner accepts a standard template with fewer than 3 custom policy exceptions.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch an MVP pilot for 2 to 3 internal teams with live tenant requests, IAM templates, budget caps, and chargeback export.
    hypothesis: The product can cut tenant launch time and produce finance-usable ownership mapping before broader observability features are built.
    successMetric: Median launch time falls below 7 days and at least 90% of Claude spend is mapped to the right owner during the pilot.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test pilot pricing and annual packaging across proposals tied to tenant count and managed spend.
    hypothesis: Buyers will accept a paid pilot and annual subscription structure if the value is framed as rollout acceleration plus chargeback readiness.
    successMetric: Close 3 paid pilots with less than 20% discount from target pricing and at least 2 proposals including a pre-agreed production path.
    owner: Founder / CEO
  - horizon: 180–365 days
    experiment: Formalize one AWS consultancy implementation partner and one reference architecture for Control Tower-aligned deployments.
    hypothesis: Partner-led implementation can shorten enterprise trust cycles and reduce customer-specific setup work.
    successMetric: One partner generates 2 qualified opportunities and one pilot deploys using the reference architecture with no custom engineering beyond agreed templates.
    owner: Solutions architect
operations:
  - Standardized AWS Organizations and Control Tower onboarding checklist for tenant creation, tagging, and logging defaults
  - Security review package covering IAM scope, CloudTrail configuration, data-boundary explanation, and optional ZDR workflow guidance
  - Chargeback export process that maps tenant metadata into existing FinOps showback or cost-allocation tooling
  - Weekly implementation cadence with platform, FinOps, and security stakeholders during each pilot
  - Referral and delivery playbook for AWS governance consultancies that already run landing-zone projects
team:
  - role: Founder / CEO
    startTiming: Month 0
    rationale: Founder-led selling is required because the first deals depend on buyer discovery, packaging, and partner trust more than scaled demand generation.
  - role: Founding eng
    startTiming: Month 0
    rationale: The core technical risk is correct AWS org mapping, IAM templating, and repeatable tenant provisioning, which requires senior infrastructure engineering from day one.
  - role: Solutions architect
    startTiming: Month 4
    rationale: Enterprise pilots will stall without someone who can translate customer AWS governance patterns into standard templates and implementation plans.
  - role: Product engineer
    startTiming: Month 7
    rationale: After the first pilots, the roadmap needs dedicated product velocity on approval workflow, dashboards, and self-serve admin features rather than only custom deployment work.
  - role: Account executive
    startTiming: Month 12
    rationale: Add a first seller only after the founder has a repeatable message, two reference accounts, and a clear pilot-to-production motion.
milestones:
  - horizon: 0–12 months
    items:
      - Close 3 to 5 paid design-partner pilots in the core Fortune 2000 AWS segment
      - Launch a production-ready tenant provisioning and chargeback MVP
      - Convert at least 2 pilots into annual contracts above the modeled ACV floor
      - Secure one AWS governance consultancy partner and one reference customer
  - horizon: 12–24 months
    items:
      - Standardize implementation playbooks for common AWS org topologies
      - Expand within existing accounts to additional teams, environments, and business units
      - Add migration tooling and premium approval or analytics modules to lift net revenue retention
  - horizon: 24–36 months
    items:
      - Prove repeatable multi-account deployment economics with limited custom engineering
      - Launch broader multi-model governance features from the embedded Claude-on-AWS base
      - Build a reference set of enterprise accounts large enough to defend against first-party feature catch-up
risks:
  - risk: AWS or Anthropic ships first-party tenant admin, spend controls, or approval workflow fast enough to compress the wedge.
    likelihood: High
    impact: High
    mitigation: Win on deployment speed, cross-team chargeback detail, and workflow depth before native platforms expand, then move upmarket into broader governance.
  - risk: Security teams reject Anthropic-operated processing outside the AWS boundary for the target use cases.
    likelihood: Medium
    impact: High
    mitigation: Target lower-sensitivity internal workloads first, package clear data-boundary documentation, and keep a narrow ICP that can pass security review quickly.
  - risk: Buyers treat the problem as internal tooling work and will not budget a standalone product.
    likelihood: Medium
    impact: High
    mitigation: Lead with measurable rollout acceleration and ownership mapping outcomes, not generic governance claims, and require paid pilots that prove economic value.
  - risk: Implementation becomes too services-heavy because each enterprise has unique IAM, tagging, and approval patterns.
    likelihood: Medium
    impact: Medium
    mitigation: Constrain the first segment to centralized AWS platform teams, templatize common org patterns, and delay broad segment expansion until repeatability is proven.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: Build the AWS and Claude provisioning control plane, complete 3 to 5 paid pilots, pass the first enterprise security reviews, and convert at least 2 customers into production with one repeatable partner-led implementation motion.
