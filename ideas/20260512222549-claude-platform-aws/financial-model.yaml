modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionTenants
      ProductionTenants --> ExpandedTenants
      ExpandedTenants --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from 3 paid pilots at Y1 exit to 18 paying tenant bundles at Y3 exit while accounts step from $60K pilots into $144K-$168K recurring deployments.
- checkName: Must go right
  finding: The company must templatize AWS org mapping and security review work quickly enough that each new rollout behaves like software revenue rather than services revenue.
- checkName: Model breaks if
  finding: If Bedrock substitution or security objections push sales cycles toward nine months, the downside case compresses the cash buffer before repeatable implementation proof exists.
- checkName: Next-round proof
  finding: The next round is justified by reaching 8 paying customers, 2-plus production conversions, and one partner-led implementation motion with margins moving toward the 70% target.
sanityChecks:
  ruleOf40: Y3 growth 149.3% + EBITDA margin -14.3% = 135.0%
  burnMultiple: Approx. Y2 burn multiple 0.9x using ARR growth from $0.53M at Y1 exit to $1.44M at Y2 exit; Y3 improves to roughly 0.2x on ARR growth to $3.12M even before full profitability.
  revenuePerFte: $284K Y3 (benchmark $200–400K SaaS)
  flags:
  - The base case assumes consultancy partners start contributing qualified pipeline in Y2; if that channel slips, Y3 customer count is likely too high.
  - No realized churn is modeled in the 36-month P&L, so the customer count path is more optimistic than the separate LTV math.
  - Gross margin reaching 70%+ depends on reusable IAM, tagging, and chargeback templates; bespoke security exceptions would push the model toward the downside case.
  - The model turns Q4Y3 EBITDA-positive but remains full-year EBITDA negative in Y3, so another round is still likely unless pricing or conversion improves faster than planned.
