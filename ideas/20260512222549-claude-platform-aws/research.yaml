openQuestions:
- How many large AWS enterprises will insist on native Claude Platform on AWS rather than Bedrock once procurement friction falls away?
- Will security teams accept Anthropic-operated processing outside the AWS boundary for internal copilots and agents, or will ZDR become mandatory?
- Is the first budget better attached to cloud platform engineering, a central AI office, or FinOps?
- 'Which control actually triggers purchase first: workspace provisioning, chargeback, IAM policy templates, or audit reporting?'
