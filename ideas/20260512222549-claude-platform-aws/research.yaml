competitors:
- name: Amazon Bedrock
  stage: incumbent
  wedge: Native AWS agent platform with in-boundary logging, guardrails, and model access.
  pricing: Usage-based by model and tier; batch inference for select models can be 50% cheaper than on-demand.
  strength: Owns the default AWS control plane, security boundary, and adjacent agent features.
  weaknessVsUs: Does not solve native Claude Platform workspace brokering or same-day access to Anthropic-managed beta features.
  sourceRefs:
  - 26
  - 27
  - 28
  - 29
  - 39
- name: Portkey
  stage: scale-up
  wedge: LLM gateway for routing, guardrails, observability, and access control.
  pricing: Custom / enterprise-oriented; AWS Marketplace channel present.
  strength: Broad cross-model control surface and routing layer.
  weaknessVsUs: Not purpose-built for AWS-org-native Claude workspace lifecycle, CloudTrail mapping, or internal chargeback handoffs.
  sourceRefs:
  - 30
- name: Helicone
  stage: scale-up
  wedge: Observability plus AI gateway with rate limits, alerts, routing, and fallbacks.
  pricing: Free, $79/month Pro, $799/month Team, enterprise custom.
  strength: Fast-to-deploy proxy with concrete cost and rate controls.
  weaknessVsUs: Centers on request traffic, not AWS account governance, tenant provisioning, or finance ownership models.
  sourceRefs:
  - 31
  - 32
- name: Langfuse
  stage: scale-up
  wedge: Open-source tracing, evaluation, prompt management, and security monitoring for LLM apps.
  pricing: Free, $29/month Core, $199/month Pro, $2,499/month Enterprise plus optional team add-on.
  strength: Strong observability, evals, and enterprise security posture.
  weaknessVsUs: Primarily post-hoc observability and evaluation rather than pre-provisioned AWS tenant governance.
  sourceRefs:
  - 33
  - 34
  - 35
- name: LiteLLM
  stage: open-source
  wedge: Unified self-hosted gateway with virtual keys, cost tracking, and session budget caps.
  pricing: Open-source / self-hosted.
  strength: Flexible DIY baseline for teams willing to build their own gateway layer.
  weaknessVsUs: Leaves enterprises to stitch together IAM scopes, workspace lifecycle, CloudTrail alignment, and rollout approvals themselves.
  sourceRefs:
  - 36
  - 37
regulatoryTechnicalConstraints:
- point: Claude Platform on AWS is operated by Anthropic and may process inference outside the AWS security boundary, which constrains residency-sensitive deployments.
  sourceRefs:
  - 1
  - 5
  - 39
- point: Full CloudTrail visibility for Claude Platform on AWS data-plane actions requires explicit data-event logging configuration and can add cost.
  sourceRefs:
  - 7
  - 21
- point: IAM enforcement is action- and workspace-specific, so provisioning automation must handle SigV4, workspace ARNs, and least-privilege policy templates correctly.
  sourceRefs:
  - 6
  - 8
  - 17
  - 22
