modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionTenants
      ProductionTenants --> ExpandedTenants
      ExpandedTenants --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自这样一条路径：Y1 期末有 3 个付费试点，到 Y3 期末扩到 18 个付费租户包；单个账户再从 $60K 试点升级到 $144K-$168K 的经常性部署。
- checkName: 必须跑顺的事
  finding: 公司必须尽快把 AWS 组织映射和安全评审模板化，否则每次 rollout 都更像服务收入，而不是软件收入。
- checkName: 模型会在哪断
  finding: 如果 Bedrock 替代或安全异议把销售周期拖向 9 个月，下行情景会在可复制实施尚未被证明前，先把现金缓冲压扁。
- checkName: 下一轮融资的证明点
  finding: 只要做到 8 个付费客户、2 个以上生产转化和 1 条伙伴实施路径，并把毛利率推向 70% 目标，下一轮融资就有依据。
sanityChecks:
  ruleOf40: Y3 增长 149.3% + EBITDA 利润率 -14.3% = 135.0%
  burnMultiple: 约看，Y2 的 burn multiple 为 0.9x：ARR 从 Y1 期末的 $0.53M 涨到 Y2 期末的 $1.44M；到 Y3，ARR 涨到 $3.12M 后，burn multiple 进一步改善到约 0.2x，即便公司尚未完全盈利。
  revenuePerFte: Y3 为 $284K（SaaS 基准 $200–400K）
  flags:
  - 基础情景假设咨询伙伴会在 Y2 开始贡献合格 pipeline；如果这条渠道起不来，Y3 客户数大概率偏高。
  - 36 个月 P&L 没有计入真实流失，因此客户数曲线比单独的 LTV 计算更乐观。
  - 毛利率能否上到 70%+，取决于 IAM、标签和成本分摊模板能否复用；一旦安全例外过多，模型就会向下行情景滑。
  - 模型在 Q4Y3 转成 EBITDA 为正，但 Y3 全年仍为负，因此若定价或转化没有快于计划，再融一轮的概率依然很高。
