slug: claude-aws-tenant-broker
date: '2026-05-12'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-12] 按商业计划日期后的首个完整月份建模'
- id: A2
  name: 客户计量单位
  value: 纳管中的付费 Claude 租户包
  unit: definition
  source: '[BP businessModel.unitOfValue] 以纳管中的活跃 Claude 租户为单位价值，扩张主要跟随托管支出'
- id: A3
  name: 新客户收入确认
  value: 完整试点月份从客户起始月开始确认
  unit: heuristic
  source: 初创财务启发式，命名来源：Financial Modeler 月初 onboarding 约定，用于规划中的企业部署
- id: A4
  name: 付费试点套餐
  value: '60.0'
  unit: USDk over 3 months
  source: '[BP investorMemo.firstCustomer.initialContract $40k-$60k] 因为打包了安全和 IAM 配置，按试点区间上沿建模'
- id: A5
  name: 基础生产订阅
  value: '144.0'
  unit: USDk annual ACV
  source: '[BP investorMemo.firstCustomer $90k-$150k annual subscription] 因成本分摊导出和预算控制是核心价值，按区间偏上沿建模'
- id: A6
  name: 扩展部署 ACV
  value: '168.0'
  unit: USDk annual ACV
  source: '[BP businessModel.expansionLevers] 和 [BP milestones 12–24 months] 在首轮 rollout 后，增加审批与分析模块抬升合同价值'
- id: A7
  name: 扩展发生时间
  value: 客户上线 9 个月后
  unit: timing
  source: '[BP milestones 12–24 months] 只有第一批租户稳定运行一段时间后，才按新增团队或高级控制建模扩容'
- id: A8
  name: Y1 新增客户
  value: M5 1, M8 1, M11 1
  unit: new customers
  source: '[BP milestones 0–12 months] 目标是拿下 3–5 个付费 design-partner 试点；基础情景按 3 个建模'
- id: A9
  name: Y2 客户期末数
  value: Q1Y2 4, Q2Y2 5, Q3Y2 6, Q4Y2 8
  unit: customers EOP
  source: '[BP milestones 12–24 months] 先把实施标准化并在现有账户内扩张，再做更激进的新 logo 拓展'
- id: A10
  name: Y3 客户期末数
  value: Q1Y3 10, Q2Y3 12, Q3Y3 15, Q4Y3 18
  unit: customers EOP
  source: '[RS market.som about 35 customers at year 3] 基础情景只取 research SOM 的大约一半，避免在窄切口上过度乐观'
- id: A11
  name: 毛利率爬坡
  value: Y1 45%-60%; Y2 62%-68%; Y3 69%-71%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70] 早期爬坡较慢，因为 IAM 映射、安全打包和 onboarding 仍有较重服务成分'
- id: A12
  name: 期初现金
  value: '2500.0'
  unit: USDk
  source: '[BP fundingAsk.targetFundingRangeUsd $2-3M] 按 $2.5M pre-seed 建模，对齐已给出的区间和 24 个月跑道目标'
- id: A13
  name: 全成本薪酬系数
  value: '20'
  unit: percent burden
  source: 初创财务启发式，命名来源：早期企业 SaaS 全成本薪酬基准
- id: A14
  name: 各岗位年薪（含负担）
  value: Founder 160; Founding eng 200; Solutions 165; Product eng 175; AE 180; CS 145; Security/FinOps 160
  unit: USDk per FTE per year
  source: '[BP team] 加上初创财务启发式：美国 pre-seed 企业基础设施软件团队的招聘薪酬'
- id: A15
  name: 招聘顺序
  value: 第 0 月创始人和创始工程师；第 4 月解决方案架构师；第 7 月产品工程师；第 12 月 AE；第 18 月 CS；第 24 月 Security/FinOps；第 31 月第二位产品工程师
  unit: timing
  source: '[BP team] 和 [BP strategicChoices.sequencingRationale]；只有在试点可复制、成本分摊工作流跑顺后，才补后续岗位'
- id: A16
  name: 非人力运营开支阶梯
  value: Y1 月度 opex 从 20K 升到 30K；Y2 季度 opex 为 96、108、120、132；Y3 季度 opex 为 144、156、168、180
  unit: USDk
  source: '[BP operations] 加上初创财务启发式：创始人主导的企业销售里，差旅、云成本、安全评审材料和伙伴赋能会逐步上升'
- id: A17
  name: 36 个月 P&L 实际流失率
  value: '0.0'
  unit: percent monthly
  source: '[BP investorMemo.mustBeTrue] 加上初创财务启发式：在切口仍在验证阶段，早期企业客户按 36 个月全部留存建模'
- id: A18
  name: 单位经济模型流失率
  value: '1.5'
  unit: percent monthly
  source: 针对高黏性但仍处早期的企业基础设施工作流的财务启发式，并参考 [BP risks] 中 Bedrock 替代和退回内部脚本的风险
- id: A19
  name: 单客户 CAC
  value: '120.0'
  unit: USDk
  source: '[BP gtm founder-led direct sales and consultancy partners] 采用 Fortune 2000 基础设施软件的长销售周期启发式'
- id: A20
  name: 融资里程碑与现金缓冲
  value: 在 24 个月内跑到 8 个付费客户、至少 2 个生产转化、1 条伙伴实施路径，并保留 6 个月现金缓冲
  unit: milestone
  source: '[BP fundingAsk.runwayMonths 18] 加上 Financial Modeler 阶段规则：必须显式留出 6 个月 buffer'
- id: A21
  name: 现金流简化
  value: 模型未计债务、capex 或营运资本波动，因此现金近似等于 EBITDA
  unit: heuristic
  source: 初创财务启发式，命名来源：早期 SaaS 规划模型的现金简化约定
