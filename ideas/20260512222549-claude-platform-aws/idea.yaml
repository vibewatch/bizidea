problem: >-
  Large AWS enterprises already have dozens of teams asking for production LLM
  access, but each new model endpoint creates a messy mix of IAM setup, budget
  ownership, tool permissions, and audit requirements. Claude Platform on AWS
  removes vendor-procurement friction, which means internal platform teams now
  become the bottleneck for approving and operating native Claude agents at
  scale. Without a purpose-built tenanting layer, companies fall back to shared
  accounts, spreadsheet chargeback, and one-off IAM policies that break as soon
  as multiple teams want managed agents, code execution, or external tools.
targetUser:
  primary: "Cloud platform and internal AI platform teams at large AWS enterprises"
  secondary: "FinOps and security engineering teams responsible for AI spend and access control"
  buyer: "Director of Cloud Platform Engineering or VP of Infrastructure"
startupThesis:
  nonObviousInsight: "The AWS launch does not just widen Anthropic distribution; it shifts the buying center to internal cloud-platform teams. Once native Claude can be bought inside AWS with full feature parity, the hard problem becomes tenanting, chargeback, and approval workflow for many internal teams, not raw model access."
  beachhead: "Provisioning and governing Claude workspaces for Fortune 2000 AWS enterprises with 50+ accounts and 3-10 internal teams moving agentic applications into production"
  wedge: "A tenant broker that provisions approved Claude-on-AWS environments per team with budget caps, IAM role templates, tool-permission guardrails, and CloudTrail-linked chargeback"
  whyNowCatalyst: "Claude Platform on AWS made native Anthropic agents, skills, and tool use available through existing AWS accounts, creating immediate rollout demand from enterprises that need AWS-native controls before they can standardize on Claude."
  ventureScalePath: "Start with Claude-on-AWS tenancy for internal teams, then expand into cross-model AI procurement, policy enforcement, cost attribution, and deployment workflows across AWS, Azure, and GCP for every enterprise agent stack."
solution: >-
  Build a control plane that sits between enterprise AWS organizations and
  Claude Platform on AWS. The product gives platform teams a self-service
  catalog where internal application teams request a Claude tenant, pick
  approved capabilities such as managed agents or code execution, and inherit
  prebuilt IAM, logging, and budget policies automatically. It tags and meters
  usage by team, project, environment, and business unit so finance can charge
  back spend without forcing every team onto a shared account. The system also
  provides rollout workflows for approving new tools, monitoring agent activity
  from CloudTrail, and migrating pilot apps from direct Anthropic or Bedrock
  setups into a standardized AWS-native operating model.
goToMarketSeed:
  firstCustomer: "A Fortune 2000 company with a central cloud platform team, an AWS enterprise agreement, and at least five internal product teams requesting production Claude access"
  buyingTrigger: "Security approval of Claude Platform on AWS followed by a mandate to move AI spend under AWS commitments and assign cost ownership by business unit"
  currentAlternative: "Manual IAM and account setup, shared platform accounts, Bedrock fallbacks, and internal scripts or spreadsheets for budget tracking"
  switchingReason: "The broker lets the platform team say yes to more Claude deployments without losing budget control or auditability, while preserving native Anthropic features that Bedrock and ad hoc internal tooling may not expose cleanly."
  pricingHypothesis: "Annual platform subscription priced by number of active Claude tenants and monthly managed spend, with premium modules for approval workflows and cross-model routing"
