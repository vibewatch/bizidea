topRisks:
  - name: "AWS feature catch-up"
    description: "AWS or Anthropic could add enough native tenanting and spend controls to compress the initial wedge."
    mitigation: "Own the cross-account approval workflow, chargeback detail, and cross-model expansion path that hyperscaler features are less likely to prioritize."
  - name: "Platform-team sales drag"
    description: "Cloud platform buyers move carefully, so pilots may stall if the value proposition sounds like governance overhead."
    mitigation: "Lead with migration projects that unlock AWS commitment drawdown and measurable reduction in platform-engineering setup time."
  - name: "Demand concentrates in a small cohort"
    description: "If only a limited number of enterprises insist on native Claude features over Bedrock or direct APIs, the wedge may stay narrow."
    mitigation: "Start with Claude-on-AWS where urgency is highest, then broaden the product to cover other frontier-model channels and multi-cloud AI tenancy."
