topRisks:
- name: AWS 功能追赶
  description: AWS 或 Anthropic 可能很快补齐足够多的原生租户与支出控制能力，把最初的切口压窄。
  mitigation: 先把跨账户审批流、更细的成本分摊和跨模型扩展路径做深，这些通常不是超大云厂商优先补的部分。
- name: 平台团队销售拖慢
  description: 云平台买家决策很谨慎，如果价值主张听起来像额外治理负担，试点很容易卡住。
  mitigation: 先用迁移项目切进去：既能吃掉 AWS 承诺额度，又能把平台工程团队的搭建时间实打实降下来。
- name: 需求只集中在小圈层
  description: 如果只有少数企业坚持要原生 Claude 功能，而不是 Bedrock 或直连 API，这个切口可能一直偏窄。
  mitigation: 先吃下 Claude-on-AWS 里最着急的一批客户，随后把产品扩到其他前沿模型通道和多云 AI 租户治理。
