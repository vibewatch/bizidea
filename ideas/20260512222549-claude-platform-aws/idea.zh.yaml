problem: 大型 AWS 企业里，往往已经有十几支团队在申请生产级 LLM 访问。每多开一个模型端点，IAM 配置、预算归属、工具权限和审计要求就会缠成一团。Claude Platform on AWS 把供应商采购这道坎拿掉后，内部平台团队反而成了大规模批准和运营原生 Claude 智能体的瓶颈。没有专门的租户层，企业最后只能退回共享账户、表格做成本分摊，再配一堆一次性的 IAM 策略；一旦多支团队都想上 managed agents、code execution 或外部工具，这套东西立刻撑不住。
targetUser:
  primary: 大型 AWS 企业里的云平台团队和内部 AI 平台团队
  secondary: 负责 AI 支出与访问控制的 FinOps 与安全工程团队
  buyer: 云平台工程总监或基础设施 VP
startupThesis:
  nonObviousInsight: 这次 AWS 发布不只是拓宽了 Anthropic 的分发渠道，更把采购中心转移到了企业内部的云平台团队。原生 Claude 一旦能在 AWS 里直接采购且功能完全对齐，真正难的就不再是模型接入，而是如何给很多内部团队做租户隔离、成本分摊和审批流。
  beachhead: 先切入 Fortune 2000 的 AWS 企业：这类公司通常有 50+ 个账户，且已有 3–10 支内部团队在把 agentic 应用推向生产，需要统一开通和治理 Claude-on-AWS。
  wedge: 做一层租户代理：按团队开通经过审批的 Claude-on-AWS 环境，并附带预算上限、IAM 角色模板、工具权限护栏和关联 CloudTrail 的成本分摊。
  whyNowCatalyst: Claude Platform on AWS 让原生 Anthropic agents、skills 和 tool use 能直接通过现有 AWS 账户上线，企业在标准化 Claude 之前，立刻就需要一套 AWS 原生控制层。
  ventureScalePath: 先从内部团队的 Claude-on-AWS 租户治理切进去，随后扩到跨模型 AI 采购、策略执行、成本归因，以及覆盖 AWS、Azure、GCP 的企业级部署工作流。
solution: 产品是一套夹在企业 AWS Organizations 和 Claude Platform on AWS 之间的控制平面。平台团队可以给内部应用团队开放一个自助目录：团队提交 Claude 租户申请、勾选获批能力（例如 managed agents 或 code execution），系统就会自动继承预置的 IAM、日志和预算策略。平台会按团队、项目、环境和业务单元打标签并计量用量，让财务可以做成本分摊，而不用逼所有团队共用一个账户。系统还会提供新工具审批流程、基于 CloudTrail 的 agent 活动监控，以及把直连 Anthropic 或 Bedrock 的试点应用迁回统一 AWS 原生运营模式的迁移流程。
goToMarketSeed:
  firstCustomer: 首个客户应是 Fortune 2000 的大企业：它有中央云平台团队、AWS 企业协议，且至少 5 支内部产品团队在申请生产级 Claude 访问。
  buyingTrigger: 当安全团队批准 Claude Platform on AWS 后，管理层要求把 AI 支出纳入 AWS 承诺额度，并按业务单元明确成本归属。
  currentAlternative: 手工做 IAM 和账户配置、共享平台账户、退回 Bedrock，以及用内部脚本或表格追预算。
  switchingReason: 这层代理让平台团队能在不丢预算控制和可审计性的前提下，同意更多 Claude 部署；同时又保住 Bedrock 或临时内部工具未必能完整暴露的原生 Anthropic 能力。
  pricingHypothesis: 按活跃 Claude 租户数和月度托管支出收年费；审批流与跨模型路由等高级模块再单独加价。
