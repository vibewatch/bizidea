slug: humanoid-safety-case-os
date: '2026-05-03'
executiveSummary: 人形机器人仓库部署正从技术试点走向董事会层面的扩展决策，但美国 3PL 仍缺少一个中立系统，能把试点证据转化为可辩护的放行/不放行依据。本计划面向在一两个仓库运行首个人形机器人或相邻移动操作试点、并需要在一个季度内决定是否扩展到另外三到五个站点的多站点 3PL。产品切入口是一个供应商中立的安全论证 OS，先接入运营方自有的事件证据，再在可用时接入更深层 OEM 遥测，为运营、安全和风险相关方生成任务级就绪度评分、缓解方案和扩展审批包。市场真实存在，但当前仍然狭窄：研究支持其近期 SAM 约为 $7.9M，并表明主要风险在于时机，因为公开能证明大量 3PL 正在付费运行人形机器人项目的证据仍有限。因此，市场进入应从面向美国 3PL 自动化负责人的高接触式设计合作伙伴销售开始，而非广泛的自助软件模式。定价应锚定于避免试点延误和节省外部安全咨询支出，而不是与 OEM 软件席位对比，因为独立保障预算尚未被验证。公司只有在坚持买方侧和中立定位、同时建立关于哪些干预、站点条件和控制措施真正能预测安全多站点扩展的专有数据集时，才能胜出。一个有意识的取舍是，在公司证明单一仓库审批工作流能够把试点转化为生产部署之前，暂缓拓展到更广泛的工厂、零售和保险工作流。当前最大证据缺口仍是 2026 年活跃且付费的 3PL 人形机器人试点的真实数量，因此在验证 3PL 是否愿意购买经常性软件之前，早期融资与招聘都应保持克制。
problem:
- 试点人形机器人的 3PL 运营方，无法仅凭供应商仪表盘、零散事件记录和人工 EHS 评审，为多站点扩展决策提供有力支撑。
- 安全、风险和运营相关方需要同一套证据被转化为一个可审计的扩展审批包，但当前工具分散且并非供应商中立。
solution:
- 在可用时接入机器人日志，并将运营方自有的视频、干预记录、事件工单和 SOP 变更纳入仓库工作流的任务级证据模型。
- 为试点评审与扩展委员会生成持续演进的安全论证、就绪度评分、所需缓解措施和站点扩展审批包。
whyWeWin:
- 产品围绕买方侧审批工作流设计，而不是围绕 OEM 性能管理，因此当运营方比较供应商或在内部为扩展辩护时，它具备中立性。
- 围绕干预、控制措施和站点条件的跨供应商基准，可以复利为 RobOps 仪表盘和顾问天然难以积累的专有保障数据集。
strategicChoices:
  beachhead: 拥有 5-50 个仓库、在 1-2 个设施中运行首个人形机器人或相邻移动操作试点、任务包括料箱搬运、托盘侧处理或拖车卸货的美国 3PL。
  wedgeRationale: 该工作流具备即时购买触发因素、利益相关者数量较少且结果是二元的——扩展、暂停或增加控制措施——因此比试图成为通用机器人合规平台更快产出验证。
  sequencingRationale: 公司应先证明可以基于运营方自有证据生成有用的扩展审批包，再加入 OEM 集成和基准评分，待输出格式获得信任后，再叠加与保险方和安全顾问的渠道合作。
  notYet:
  - 正式认证或保险承保授权
  - 医院、零售后场或消费级人形机器人等非仓库垂直领域
  - 已属于 RobOps 与 WMS 平台的广义机器人车队编排或仓库执行功能
market:
  tam: $52.5M 的自下而上滩头 TAM：基于美国 6,997 个拥有 20+ 名员工的仓储机构、估算其中 25% 与 3PL 相关，以及每个活跃站点每年 $30k 的建模保障支出。
  sam: $7.9M 的近期 SAM：假设 3PL 相关站点基数中只有 15% 已具备试点准备度，因为公开的人形机器人部署仍集中在少数重复性工作流。
  som: $900k 的示意性第 3 年 SOM：基于约 30 个活跃站点，或 8-12 个企业项目，按每个活跃站点当量约 $30k 计算。
  segments:
  - 拥有活跃人形机器人试点的美国多站点 3PL 仓库运营方
  - 支持相邻移动操作部署的仓库安全、风险与自动化相关方
  buyingProcess: 购买流程由委员会主导，通常始于首次站点试点评审、未遂事件或保险方问题迫使企业做出扩展决定之时。经济买方通常是运营或自动化副总裁/负责人，而站点安全、EHS 和风险团队会共同定义需求并参与签字。
product:
  mvp: 围绕一个仓库任务族构建工作流专用的证据接入与评审产品，将事件、干预、SOP 变更和有限的机器人遥测转化为适用于委员会审阅的扩展审批包。MVP 应端到端支持一个设计合作伙伴工作流，而不是做一个通用机器人平台。
  sixMonth: 拿下 2-3 个设计合作伙伴，上线来自运营方自有系统的证据接入，交付人工审核的就绪度报告，并证明该审批包至少改变一次真实扩展决策。
  twelveMonth: 为两到三类仓库任务原型加入可重复评分，深化至少一个 OEM 集成，并将设计合作伙伴报告转化为具有审计轨迹和缓解跟踪能力的订阅产品。
  twentyFourMonth: 从单站点试点评审扩展到多站点项目治理，用匿名同行模式为客户做基准对比，并开放面向保险方和渠道伙伴的报告，同时保持“决策支持”而非“认证”。
  keyBets:
  - 在尚未获得完整 OEM 数据访问之前，运营方自有证据足以支撑一个初步有用的产品。
  - 买方会为更快的扩展决策购买经常性软件，而不只是一次性咨询。
  - 狭窄的仓库任务本体，比按站点定制的评分更能在多个 3PL 客户之间泛化。
gtm:
  wedge: 向一家全国性 3PL 销售付费的试点评审与扩展审批包工作流；该客户已拥有高管授权，需要在一个季度内决定是否将人形机器人项目扩展到更多站点。
  channels:
  - 由创始人直接销售给美国 3PL 的自动化与运营创新负责人
  - 在合同中保护中立性和数据访问条款的 OEM 转介与联合销售
  - 作为后期信誉与分销伙伴的安全顾问、仓库咨询机构和保险方
  funnelTargets: 每季度 10-15 次合格 ICP 会议，20-30% 会议→付费设计合作伙伴，50%+ 设计合作伙伴→年度订阅，60%+ 首站点订阅→12 个月内多站点扩展模块
  pricing: 年度项目费加按站点收取的扩展模块费用，初期打包为 $40k-$80k 的设计合作伙伴合同；随着客户从单一工作流和 1-2 个站点扩展到 3-5 个站点，再转化为约 $90k-$180k 的年度项目。定价逻辑是避免试点延误并降低外部评审成本。
businessModel:
  revenueStreams:
  - 活跃机器人部署项目的年度软件订阅
  - 按站点收取的扩展与就绪度评审模块
  - 高级基准分析、保险方可读报告和合作伙伴支持的评审包
  unitOfValue: 带有按站点扩展模块的活跃机器人部署项目
  targetGrossMarginPct: 75
  expansionLevers:
  - 每个企业项目覆盖更多站点
  - 每个客户覆盖更多仓库任务原型
  - 面向保险公司、经纪商和安全伙伴的跨供应商基准与报告模块
strategyMap:
  northStarMetric: 在未发生重大部署回退的情况下，借助平台获批扩展的新增仓库站点数
  inputMetrics:
  - 从试点评审到扩展决策的时间
  - 被证据图谱捕获的事件与干预占比
  - 设计合作伙伴转年度订阅的转化率
  - 首站点到多站点的扩展率
  - 活跃项目中的 OEM 集成覆盖率
  moatsToBuild:
  - 将干预、控制措施和站点条件与扩展结果关联起来的跨供应商数据集
  - 被买方信任、可跨运营/安全/风险委员会使用的任务本体与扩展审批包格式
  - 让公司成为扩展评审默认证据层的工作流集成与渠道关系
  killCriteria:
  - 前 9 个月内付费设计合作伙伴少于 2 个
  - 接受访谈的 ICP 中，不到 30% 认为扩展审批痛点足以支撑经常性软件
  - 没有设计合作伙伴在完成一个试点评审周期后转化为订阅
  mermaid: "flowchart LR\n  Wedge[3PL 试点评审切入口] --> MVP[证据接入 + 扩展审批包 MVP]\n  MVP --> Proof[付费设计合作伙伴与首批扩展决策]\n  Proof --> Expansion[多站点治理与基准模块]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 切入口清晰、工作流痛点真实，但品类时机和买方预算验证仍不足，尚不适合以高确信度进行种子轮承保。
    whyBelieve: 公司瞄准的是一个具体的运营审批瓶颈，而相邻的 RobOps 和 OEM 工具今天并未明确解决这一问题。
    whyDoubt: 公开证据仍不足以证明有大量 3PL 在为人形机器人项目和经常性保障预算买单，因此市场时机可能落后于产品成熟度。
    nextDiligence: 确认 3PL 设计合作伙伴在经历一次真实试点评审周期后，愿意为经常性软件付费，而不只是为重服务的初期支持付费。
  firstCustomer:
    title: 一家全国性 3PL 的自动化负责人，且其仓库已有活跃的人形机器人试点
    profile: 一家拥有 5-50 个仓库、在重复性室内工作流中有一个真实试点、并承受高管快速做出扩展决策压力的美国 3PL。
    trigger: 首次地面事件、操作员干预或保险方问题，迫使公司进行正式的“扩展还是暂停”委员会评审。
    buyer: 运营副总裁或自动化负责人
    initialContract: 针对一个工作流和 1-2 个站点的 $40k-$80k 设计合作伙伴合同；当范围扩展到 3-5 个站点并进入持续评审后，转化为 $90k-$180k 的年度经常性项目收入。
  mustBeTrue:
  - 前 10 次 ICP 访谈中，至少 5 次确认扩展审批是可重复的软件问题，而不只是偶发性咨询。
  - 至少 2 个设计合作伙伴同意共享足够的运营方自有证据，使团队在完整 OEM 集成之前就能生成有用的首版就绪度评分。
  - 至少 1 家保险公司、经纪商或安全顾问认为该扩展审批包格式可作为可信的扩展评审决策支持。
  - 至少 50% 的付费设计合作伙伴在完成首个评审周期后转化为年度订阅。
  - 即使通过 OEM 转介获客，产品在合同结构和数据呈现上也保持供应商中立。
  diligenceQuestions:
  - 目前究竟有多少美国 3PL 在运行付费的人形机器人或相邻移动操作试点？
  - 在独立保障品类尚未形成之前，产品将由哪条预算科目支付？
  - 在缺少深度 OEM 遥测时，什么样的最小数据集足以生成可辩护的就绪度评分？
  - 一旦这一工作流被证明有价值，为什么 Formant、InOrbit 或 OEM 软件不会将其吸收？
  - 哪些免责声明、合作伙伴角色和产品边界，可以防止客户把软件视为正式认证？
  riskHeatmap:
  - risk: 品类采用速度慢于计划假设。
    likelihood: 高
    impact: 高
    leadingIndicator: 前 6 个月内，可识别并触达的合格美国 3PL 人形机器人或相邻试点项目少于 10 个。
    mitigation: 先从设计合作伙伴切入；如果纯人形机器人需求过薄，则支持紧邻的移动操作工作流。
  - risk: OEM 限制获取高质量评分所需的遥测数据。
    likelihood: 中
    impact: 高
    leadingIndicator: 设计合作伙伴无法提供事件级遥测，MVP 的价值完全依赖人工报告。
    mitigation: 首版产品建立在运营方自有视频、工单和 SOP 证据之上，然后借助买方需求推动更深层集成。
  - risk: 买方将产品视为咨询，而非经常性软件。
    likelihood: 中
    impact: 高
    leadingIndicator: 付费试点会要求定制报告，但在首轮评审后拒绝签署年度合同。
    mitigation: 尽早将评审工作流产品化，把定价绑定到重复委员会使用，仅在导入阶段保留定制服务。
  - risk: 若客户将其理解为正式认证，法律与责任风险会上升。
    likelihood: 中
    impact: 高
    leadingIndicator: 潜在客户要求公司对安全合规签字，或替代保险方和顾问评审。
    mitigation: 将平台定位为带可审计证据的决策支持，加入明确免责声明，并与正式专家合作满足接近认证的需求。
  - risk: 相邻 RobOps 平台向上游进入审批工作流。
    likelihood: 中
    impact: 中
    leadingIndicator: 竞争对手开始宣传面向保险方的扩展审批或买方侧安全论证输出。
    mitigation: 在相邻平台重新定位之前，先占据委员会工作流、基准数据集和中立输出格式。
operatingAssumptions:
- assumption: 首个可重复买方是已经运行一个真实人形机器人或相邻移动操作试点的美国多站点 3PL。
  basis: research.yaml
  validationTest: 访谈 15 个目标账户，并验证至少 5 个账户在两个季度内拥有真实或即将开始的试点，以及明确的扩展决策节点。
  decisionImpact: 如果不成立，则应进一步收窄到单一 OEM 生态，或更早扩展到相邻仓库机器人类型。
- assumption: 在缺乏深度 OEM 集成前，运营方自有证据足以构建有用的 MVP。
  basis: idea.yaml
  validationTest: 使用视频、事件工单、干预次数和 SOP 变化运行一次设计合作伙伴评审，并比较审批包前后客户信心变化。
  decisionImpact: 如果不成立，路线图必须优先建设 OEM 集成，销售周期也会拉长。
- assumption: 客户会从自动化项目预算中为该产品买单，而不是等到出现独立安全软件预算。
  basis: research.yaml
  validationTest: 在付费试点提案中确认由谁签字，以及审批是否以避免延误或节省咨询支出为衡量基准。
  decisionImpact: 如果不成立，定价与包装应转向伙伴主导服务或 OEM/渠道捆绑销售。
- assumption: 对买方而言，供应商中立定位比更紧密但单一 OEM 的工作流更有价值。
  basis: operator judgment
  validationTest: 比较买方直销交易与带中立性条款的 OEM 转介交易在转化速度和留存上的差异。
  decisionImpact: 如果不成立，公司可能需要选择一个主导 OEM 生态，而不是打造跨供应商品牌。
- assumption: 只有当产品从人形机器人扩展到更广泛的仓库部署保障时，市场才足以支撑风投式增长。
  basis: research.yaml
  validationTest: 衡量有多少合格机会不属于严格意义上的人形机器人项目，但共享相同审批工作流。
  decisionImpact: 如果不成立，公司应保持聚焦型细分软件业务，并降低融资预期。
experimentRoadmap:
- horizon: 0–90天
  experiment: 访谈 15 家美国多站点 3PL 的自动化、EHS 与站点运营负责人。
  hypothesis: 至少三分之一正在面对真实的试点评审瓶颈，并且在未来两个季度内具有预算紧迫性。
  successMetric: 5+ 次访谈确认存在真实或即将发生的扩展决策，并愿意评估付费软件。
  owner: CEO/创始人
- horizon: 0–90天
  experiment: 仅使用运营方自有证据，为一个设计合作伙伴手工构建首个扩展审批包。
  hypothesis: 无需完整 OEM 遥测，也能生成有用的审批建议。
  successMetric: 客户认为该审批包对决策有用，并要求第二轮评审或生产范围。
  owner: 创始产品负责人
- horizon: 90–180天
  experiment: 围绕一个任务原型，与 2-3 家 3PL 试行付费设计合作伙伴合同。
  hypothesis: 当评审工作流与季度末扩展决策绑定时，客户愿意为经常性评审付费。
  successMetric: 签下 2+ 份付费合同，且至少 1 份转化为年度订阅。
  owner: CEO/创始人
- horizon: 90–180天
  experiment: 测试一个 OEM 集成，以及一位保险方或安全顾问对审批包格式的评审。
  hypothesis: 更深的遥测可提升评分质量，而外部相关方会认可该输出可作为可信的决策支持。
  successMetric: 完成一项真实数据集成，且一位合作伙伴同意在客户流程中使用或背书该审批包格式。
  owner: 创始工程负责人
- horizon: 180–365天
  experiment: 在两到三类仓库任务原型上推出基准评分。
  hypothesis: 跨相似任务的可重复评分，相比定制报告更能提高转化和扩展率。
  successMetric: 订阅客户在至少 70% 的评审周期中使用标准化评分。
  owner: 产品 + 工程
- horizon: 180–365天
  experiment: 与一家 OEM 及一家安全或系统集成伙伴进行渠道测试。
  hypothesis: 伙伴来源的销售线索能在不破坏中立性或利润率的前提下加速获客。
  successMetric: 至少 2 个合格机会来自伙伴，且不要求白标或弱化审批叙事主导权。
  owner: CEO/创始人
operations:
- 为视频、事件工单、SOP 变更和机器人事件日志建立标准化证据接入流程。
- 维护明确的产品免责声明、评审工作流和审批记录，使平台保持在决策支持边界内。
- 与运营、安全和风险相关方建立共享的客户评审节奏，而不是单用户部署。
- 仅在中立性、数据权利和客户归属被界定之后，再建立与 OEM、保险方和安全顾问的伙伴运营机制。
team:
- role: 创始工程负责人
  startTiming: Month 0
  rationale: 需要立即搭建证据接入、审计轨迹和首个工作流专用产品，避免将核心数据架构外包。
- role: 创始人主导销售 / CEO
  startTiming: Month 0
  rationale: 早期交易需要问题发现、设计合作伙伴销售，以及在买方和 OEM 之间谨慎维护中立定位。
- role: 机器人领域专家 / 安全工作流负责人
  startTiming: Month 3
  rationale: 将原始遥测和事件证据转化为可信的任务分类、缓解逻辑和面向客户的扩展审批包。
- role: 产品工程师
  startTiming: Month 6
  rationale: 当首个设计合作伙伴验证工作流后，公司需要将可重复评分和评审体验产品化。
- role: 客户成功 / 解决方案负责人
  startTiming: Month 9
  rationale: 支持导入、委员会评审和多站点扩展，同时避免公司沦为纯服务型业务。
milestones:
- horizon: 0–12个月
  items:
  - 在美国 3PL 滩头市场签下 2-3 个付费设计合作伙伴。
  - 上线面向一类仓库任务原型的 MVP 证据接入、审计轨迹和委员会可审阅的扩展审批包。
  - 完成至少一个 OEM 集成，以及一次保险方或安全伙伴对审批包格式的评审。
  - 至少将一个设计合作伙伴转化为年度订阅收入。
- horizon: 12–24个月
  items:
  - 支持 8-12 个企业项目或约 30 个活跃站点，与研究中的 SOM 情景一致。
  - 在多个仓库任务原型上推出基准评分，并建立首个可重复的多站点扩展模块。
  - 建立一个小型伙伴生态，涵盖 OEM、安全和保险关系，同时不放弃买方主导权。
- horizon: 24–36个月
  items:
  - 从人形机器人专用定位扩展到更广泛的仓库部署保障，只要适用同一审批工作流即可。
  - 提供面向保险方可读和跨项目基准模块，作为更高价值的扩展产品。
  - 只有在仓库委员会工作流可重复且有利润之后，才测试进入第二个地区或相邻垂直领域。
risks:
- risk: 如果人形机器人部署仍然过于稀疏，品类时机会落后于公司的烧钱速度。
  likelihood: 高
  impact: 高
  mitigation: 先卖给活跃设计合作伙伴；必要时拓展到相邻移动操作工作流。
- risk: OEM 数据访问可能弱于产品路线图的假设。
  likelihood: 中
  impact: 高
  mitigation: 从运营方自有证据开始，并在验证需求后再优先做集成。
- risk: 买方可能把产品视为偶发性咨询，而不是经常性软件。
  likelihood: 中
  impact: 高
  mitigation: 尽早产品化经常性评审周期、基准模块和多站点治理。
- risk: 如果公司被误认为认证机构，信任与责任问题可能出现。
  likelihood: 中
  impact: 高
  mitigation: 在定位、合同和伙伴模式上都牢牢保持决策支持边界。
- risk: 一旦品类变得显性，相邻 RobOps 与 OEM 工具可能复制审批工作流。
  likelihood: 中
  impact: 中
  mitigation: 在竞争对手将可观测性工具重新打包之前，先建立中立数据集、委员会工作流和保险方可读的审批包格式。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的资金将支持一支由创始人主导的小团队，用于验证 3PL 滩头市场、上线首个工作流专用产品、拿下 2-3 个付费设计合作伙伴、证明至少一次订阅转化，并建立用于基准驱动扩张的证据与数据权利基础。
