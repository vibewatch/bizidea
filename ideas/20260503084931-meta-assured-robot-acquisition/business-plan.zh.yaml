slug: humanoid-safety-case-os
date: '2026-05-03'
executiveSummary: >-
  人形机器人在仓储场景中的部署，正在从技术试点走向董事会层面的扩张决策；但美国 3PL 仍缺少一套中立系统，能把试点证据转换成可辩护的 go/no-go 判断。这个计划瞄准的，是那些在 1-2 个仓库里跑第一批人形机器人或相邻移动操作机器人试点、并且需要在一个季度内决定是否扩到 3-5 个站点的多站点 3PL。产品切口是一套厂商中立的安全案例 OS：先接入运营方自有的事故证据，再在条件允许时补上更深的 OEM 遥测，输出任务级 readiness 评分、缓解方案以及面向运营、安全和风险相关方的 rollout 材料包。市场今天真实存在，但仍然狭窄：研究支持约 $7.9M 的近期 SAM，同时也表明最大风险是时机，因为公开可见、真正付费的人形机器人 3PL 项目仍不多。GTM 因而必须从高触达的 design-partner 销售开始，直接卖给美国 3PL 的自动化负责人，而不是铺一个宽泛的 self-serve 软件动作。定价应锚定可避免的试点拖延和外部安全咨询费用，而不是去对标 OEM 软件 seat，因为独立 assurance 预算还没有被验证。公司只有在始终站在买方一侧、保持中立，并持续沉淀“哪些干预、站点条件和控制措施真正能预测安全的多站点扩张”的专有数据集时，才可能赢。这个策略刻意做出的取舍，是先不碰更广的工厂、零售和保险工作流，直到公司证明：仅靠一个仓库审批工作流，就足以把试点转成生产部署。当前仍有一个重要证据缺口：2026 年到底有多少活跃且付费的 3PL 人形机器人试点，因此在验证 3PL 对 recurring software 的购买意愿前，融资和招聘都应保持克制。
problem:
  - 试点人形机器人的 3PL 运营商，无法仅凭厂商仪表盘、零散事故记录和人工 EHS 审查，为多站点扩张决策提供足够可辩护的依据。
  - 安全、风险与运营团队需要看到同一套证据被翻译成一份可审计的 rollout 材料包，但现有工具零散分裂，而且不具备厂商中立性。
solution:
  - 在条件允许时接入机器人日志，同时把运营方自有的视频、干预记录、事故工单和 SOP 变更统一进一个面向仓储 workflow 的任务级证据模型。
  - 为试点评审与扩张委员会生成持续更新的安全案例、readiness 评分、必要缓解措施和站点 rollout 材料包。
whyWeWin:
  - 产品围绕买方侧的审批 workflow 设计，而不是围绕 OEM 性能管理，因此当运营商需要比较不同厂商，或在内部为扩张辩护时，它天然更中立。
  - 跨厂商的干预、控制措施和站点条件 benchmark 能沉淀成专有 assurance 数据集，这是 RobOps 仪表盘和顾问服务很难自然积累出来的。
strategicChoices:
  beachhead: 在 1-2 个设施里运行首个人形机器人或相邻移动操作试点、且拥有 5-50 个仓库的美国 3PL，用于料箱搬运、托盘侧处理或拖车卸货。
  wedgeRationale: 这个 workflow 有即时购买触发点、相关方数量有限，结果又很二元——扩张、暂停或加控制——因此比试图做成通用机器人合规平台更快形成证据闭环。
  sequencingRationale: 公司应先证明：仅凭运营方自有证据就能生成有用的 rollout 材料包；随后再补 OEM 集成和 benchmark 评分；最后在输出格式被信任后，再叠加与保险方及安全顾问的渠道合作。
  notYet:
    - Formal certification or insurer underwriting authority
    - 非仓库垂直场景，例如医院、零售后场或消费级人形机器人
    - 本就属于 RobOps 与 WMS 平台的广义机器人车队编排或仓储执行功能
market:
  tam: 基于 6,997 个拥有 20+ 员工的美国仓储机构、估算 25% 与 3PL 相关的占比，以及每个活跃站点 $30k 的年化 assurance 支出，得出 $52.5M 的自下而上滩头 TAM。
  sam: 假设只有 15% 的 3PL 相关站点在近期具备试点条件，且公开的人形机器人部署仍集中在少数重复性 workflow 上，则近期 SAM 为 $7.9M。
  som: 以约 30 个活跃站点或 8-12 个企业项目、每个活跃站点等价约 $30k 为基础，得到示意性的第 3 年 SOM $900k。
  segments:
    - 有活跃人形机器人试点的美国多站点 3PL 仓储运营商
    - 为相邻移动操作机器人 rollout 提供支持的仓储安全、风险与自动化团队
  buyingProcess: 购买流程以委员会驱动，通常始于第一次站点试点评审、near-miss 或保险方问题迫使团队做出扩张决策的时候。经济买家通常是 VP 或 Head of Operations / Automation，而站点安全、EHS 与风险团队会共同影响需求和签字。
product:
  mvp: 为一个仓储任务家族做一套 workflow-specific 的证据接入与审阅产品，把事故、干预、SOP 变化和有限的机器人遥测转成可提交委员会的 rollout 材料包。MVP 应先把一个 design-partner workflow 从头跑通，而不是做成通用机器人平台。
  sixMonth: 拿下 2-3 个 design partner，打通来自运营方自有系统的证据接入，交付人工审核的 readiness 报告，并证明这些材料至少改变一次真实扩张决策。
  twelveMonth: 为 2-3 个仓储任务 archetype 加入可重复的评分，引入至少一个 OEM 深度集成，并把 design-partner 报告产品化成带审计轨迹和缓解措施跟踪的订阅产品。
  twentyFourMonth: 从单站点试点评审扩展到多站点项目治理，用匿名同类模式为客户做 benchmark，并在继续坚持 decision-support 而非 certification 的前提下，开放面向保险方和渠道伙伴的报告。
  keyBets:
    - 在尚未拿到完整 OEM 数据前，运营方自有证据已经足以做出首个有用产品。
    - 买家会愿意为更快的扩张决策购买 recurring software，而不只是一次性的咨询服务。
    - 相对窄的仓储任务 ontology，比逐站点定制评分更容易跨多个 3PL 客户泛化。
gtm:
  wedge: 向一家全国性 3PL 销售付费的试点评审与 rollout 材料包 workflow；这家客户已经被高层要求在一个季度内决定，是否把人形机器人项目扩展到更多站点。
  channels:
    - 由创始人直接销售给美国 3PL 的自动化负责人和运营创新负责人
    - 在合同中明确保护中立性和数据接入条款的前提下，与 OEM 做转介和联合销售
    - 后续再引入安全顾问、仓储咨询方和保险方，作为信誉与分销伙伴
  funnelTargets: 每季度 10-15 场合格 ICP 会议，20-30% 从 meeting 转成付费 design partner，50%+ 的 design partner 转成年度订阅，60%+ 的首站点订阅在 12 个月内扩到多站点模块
  pricing: 年度项目费加按站点 rollout 模块收费，前期打包成 $40k-$80k 的 design-partner 合同；当客户从一个 workflow、1-2 个站点扩到 3-5 个站点后，转成约 $90k-$180k 的年度项目。定价逻辑锚定的是可避免的试点拖延和更低的外部评审成本。
businessModel:
  revenueStreams:
    - 面向活跃机器人部署项目的年度软件订阅
    - 按站点收取的 rollout 与 readiness-review 模块费用
    - 高级 benchmark、保险可读报告与合作伙伴驱动的评审包
  unitOfValue: 带站点扩张模块的活跃机器人部署项目
  targetGrossMarginPct: 75
  expansionLevers:
    - 单个企业项目覆盖更多站点
    - 每个客户增加更多仓储任务 archetype
    - 面向保险方、经纪人和安全伙伴的跨厂商 benchmark 与报告模块
strategyMap:
  northStarMetric: 在没有重大部署回滚的前提下，通过该平台获批扩张的额外仓储站点数量
  inputMetrics:
    - 从试点评审到扩张决策的时间
    - 被纳入 evidence graph 的事故与干预占比
    - design partner 转年度订阅的转化率
    - 从首站点到多站点的扩张率
    - 活跃项目中的 OEM 集成覆盖率
  moatsToBuild:
    - 把干预、控制措施和站点条件与扩张结果关联起来的跨厂商数据集
    - 能同时服务运营、安全与风险委员会、且被买方信任的任务 ontology 与 rollout 材料包格式
    - 让公司成为扩张评审默认证据层的 workflow 集成与渠道关系
  killCriteria:
    - 前 9 个月内少于 2 个付费 design partner
    - 少于 30% 的受访 ICP 认为 rollout 审批痛到值得购买 recurring software
    - 没有任何 design partner 在完成一次试点评审周期后转成订阅
  mermaid: |
    flowchart LR
      Wedge[3PL 试点评审切口] --> MVP[证据接入加 rollout 材料包 MVP]
      MVP --> Proof[付费 design partner 与首批扩张决策]
      Proof --> Expansion[多站点治理与 benchmark 模块]
investorMemo:
  verdict:
    call: Watch
    conviction: 品类切口清晰、workflow 痛点真实，但赛道时机和买方预算证据仍偏薄，不足以支撑高确信度的种子轮承保。
    whyBelieve: 公司瞄准的是一个非常具体的运营审批瓶颈，而相邻的 RobOps 与 OEM 工具今天并没有真正把它解决掉。
    whyDoubt: 公开证据仍不足以证明有很多正在付费的人形机器人 3PL 项目和持续性的 assurance 预算，因此市场时机可能落后于产品成熟度。
    nextDiligence: 先确认 3PL 的 design partner 会在完成一轮真实试点评审后，为 recurring software 买单，而不只是为一次性、服务密集的初始支持付费。
  firstCustomer:
    title: 正在运行人形机器人仓储试点的全国性 3PL 的自动化负责人
    profile: 一家拥有 5-50 个仓库、在重复性室内 workflow 中已有一个真实试点，并被高层施压要求尽快决定是否扩张的美国 3PL。
    trigger: 第一次地面事故、操作员干预或保险方问题，迫使团队正式召开“扩张还是暂停”的委员会评审。
    buyer: VP of Operations 或 Head of Automation
    initialContract: 针对一个 workflow 和 1-2 个站点签约 $40k-$80k 的 design-partner 项目；当范围扩展到 3-5 个站点并纳入持续评审后，转成 $90k-$180k 的年度 recurring program revenue。
  mustBeTrue:
    - 前 10 次 ICP 访谈中，至少有 5 家确认 rollout 审批是一个可重复的软件问题，而不只是偶发性的咨询任务。
    - 至少有 2 个 design partner 同意共享足够多的运营方自有证据，使产品在完整 OEM 集成前也能生成有用的首版 readiness 评分。
    - 至少有 1 家保险方、经纪人或安全顾问认可这种 rollout 材料包格式，认为它可作为扩张评审中的可信 decision support。
    - 至少 50% 的付费 design partner 会在完成第一轮评审周期后转成年度订阅。
    - 即使通过 OEM 转介获客，产品在合同结构和数据呈现上依然保持厂商中立。
  diligenceQuestions:
    - 现在美国到底有多少 3PL 正在运行活跃且付费的人形机器人或相邻移动操作试点？
    - 在专门的 assurance 品类尚未形成前，产品会由哪条预算线买单？
    - 在没有深度 OEM 遥测的情况下，形成一份可辩护的 readiness 评分，最低需要哪些数据？
    - 一旦这个 workflow 被证明有价值，为什么 Formant、InOrbit 或 OEM 自有软件不会把它吃掉？
    - 哪些免责声明、合作方角色和产品边界，能防止客户把软件误当成正式认证？
  riskHeatmap:
    - risk: Category adoption is slower than the plan assumes.
      likelihood: High
      impact: High
      leadingIndicator: 前 6 个月里能识别并触达的美国 3PL 人形机器人或相邻试点项目少于 10 个。
      mitigation: 先从 design partner 做起；如果纯人形机器人需求太薄，就支持紧邻的人机操作 workflow。
    - risk: OEMs restrict access to the telemetry needed for strong scoring.
      likelihood: Medium
      impact: High
      leadingIndicator: design partner 无法提供事件级遥测，导致 MVP 的实用性完全依赖人工汇报。
      mitigation: 首个产品建立在运营方自有视频、工单和 SOP 证据之上，再借助买方需求去推动更深集成。
    - risk: Buyers view the product as consulting rather than recurring software.
      likelihood: Medium
      impact: High
      leadingIndicator: 付费试点会要定制报告，但在完成第一轮评审后拒绝签年度合同。
      mitigation: 尽早把评审 workflow 产品化，把定价绑到重复的委员会使用场景，并把定制服务限制在 onboarding 阶段。
    - risk: Legal and liability exposure rises if customers infer formal certification.
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户要求公司为安全合规签字，或直接替代保险方与顾问评审。
      mitigation: 把平台明确定位成可审计的 decision support，加上清晰免责声明，并与正式专家合作承接认证相邻需求。
    - risk: Adjacent RobOps platforms move upstream into approval workflows.
      likelihood: Medium
      impact: Medium
      leadingIndicator: 竞品开始宣传“面向保险方的 rollout 审批”或买方侧安全案例输出。
      mitigation: 在相邻平台转身之前，先占住委员会 workflow、benchmark 数据集和中立输出格式。
operatingAssumptions:
  - assumption: 第一个可重复买家，是已经在运行一个真实人形机器人或相邻移动操作试点的多站点美国 3PL。
    basis: research.yaml
    validationTest: 访谈 15 个目标账户，并验证其中至少 5 个拥有活跃或即将启动的试点，以及未来两个季度内明确的扩张决策节点。
    decisionImpact: 如果不成立，就要进一步聚焦单一 OEM 生态，或更早拓宽到相邻仓储机器人类型。
  - assumption: 在没有深度 OEM 集成前，运营方自有证据也足以做出有用的 MVP。
    basis: idea.yaml
    validationTest: 用视频、事故工单、干预次数和 SOP 变更做一轮 design-partner 评审，再比较材料包前后客户的决策信心。
    decisionImpact: 如果不成立，路线图就必须先把 OEM 集成前置，销售周期也会拉长。
  - assumption: 客户会用自动化项目预算为产品买单，而不是等独立的安全软件预算出现。
    basis: research.yaml
    validationTest: 在付费试点方案里确认由谁签预算，以及审批依据究竟是避免延误，还是节省咨询费。
    decisionImpact: 如果不成立，定价与打包方式应更偏向合作伙伴驱动的服务，或与 OEM / 渠道捆绑销售。
  - assumption: 对买家来说，厂商中立的定位比更紧但单一 OEM 的 workflow 更值钱。
    basis: operator judgment
    validationTest: 对比买方直签交易与带中立条款的 OEM 转介交易，在转化速度与留存上的差异。
    decisionImpact: 如果不成立，公司可能需要选择一个主导 OEM 生态，而不是继续打造跨厂商品牌。
  - assumption: 只有把产品从 humanoids 扩展到更广的仓储部署保障，市场才足以支撑 venture-style growth。
    basis: research.yaml
    validationTest: 衡量有多少合格机会不属于严格意义上的人形机器人，但共享同一套审批 workflow。
    decisionImpact: 如果不成立，公司应接受自己是一个聚焦的小众软件业务，并降低融资预期。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15 家美国多站点 3PL 的自动化、EHS 与站点运营负责人。
    hypothesis: 至少三分之一会在未来两个季度内，面临真实且带预算紧迫感的试点评审瓶颈。
    successMetric: 5+ 次访谈确认有真实或即将到来的扩张决策，并愿意评估付费软件。
    owner: CEO/创始人
  - horizon: 0–90 天
    experiment: 仅凭运营方自有证据，为一个 design partner 手工做出第一版 rollout 材料包。
    hypothesis: 即使没有完整 OEM 遥测，也能产出有用的审批建议。
    successMetric: 客户认为材料包足以支持决策，并要求进行第二轮评审或进入生产范围。
    owner: 创始产品负责人
  - horizon: 90–180 天
    experiment: 围绕一个任务 archetype，与 2-3 家 3PL 试行付费 design-partner 合同。
    hypothesis: 当产品直接绑定季度末扩张决策时，客户会愿意为 recurring review workflow 付费。
    successMetric: 签下 2+ 份付费合同，且至少 1 份转为年度订阅。
    owner: CEO/创始人
  - horizon: 90–180 天
    experiment: 测试一个 OEM 集成，以及让一家保险方或安全顾问审阅材料包格式。
    hypothesis: 更深的遥测会提升评分质量，而外部相关方会认可这套输出是可信的 decision support。
    successMetric: 完成一个真实数据集成，并有一家合作方同意在客户流程中使用或背书该材料包格式。
    owner: 创始工程负责人
  - horizon: 180–365 天
    experiment: 在 2-3 个仓储任务 archetype 上推出 benchmark 评分。
    hypothesis: 针对相似任务的可重复评分，会比定制报告更能提升转化和扩张率。
    successMetric: 订阅客户在至少 70% 的评审周期中使用标准化评分。
    owner: 产品 + 工程
  - horizon: 180–365 天
    experiment: 与一个 OEM 以及一个安全或系统集成伙伴做渠道测试。
    hypothesis: 由合作伙伴带来的 pipeline 能加快触达速度，同时不牺牲中立性或毛利。
    successMetric: 至少拿到 2 个由合作伙伴带来的合格机会，且不被要求白标或让出审批叙事主导权。
    owner: CEO/创始人
operations:
  - 建立针对视频、事故工单、SOP 变更和机器人事件日志的标准化证据接入流程。
  - 维护清晰的产品免责声明、评审 workflow 与审批记录，让平台始终停留在 decision-support 边界内。
  - 以运营、安全和风险相关方的联合评审节奏来推动客户使用，而不是单用户部署。
  - 只有在中立性、数据权利和客户归属被明确后，才去建立 OEM、保险方和安全顾问的合作动作。
team:
  - role: 创始工程
    startTiming: Month 0
    rationale: 需要立即搭出证据接入、审计轨迹和首个 workflow-specific 产品，不能把核心数据架构外包出去。
  - role: 创始人主导销售 / CEO
    startTiming: Month 0
    rationale: 早期交易需要问题发现、design-partner 销售，以及在买方与 OEM 之间小心维护中立定位。
  - role: 机器人领域专家 / 安全 workflow 负责人
    startTiming: Month 3
    rationale: 负责把原始遥测和事故证据转成可信的任务 taxonomy、缓解逻辑和面向客户的 rollout 材料包。
  - role: 产品工程师
    startTiming: Month 6
    rationale: 当第一个 design partner 证明 workflow 成立后，需要有人把可重复评分与评审 UX 真正产品化。
  - role: 客户成功 / 解决方案负责人
    startTiming: Month 9
    rationale: 支持 onboarding、委员会评审和多站点 rollout，同时避免公司滑成纯服务外包。
milestones:
  - horizon: 0–12 个月
    items:
      - 在美国 3PL 滩头市场签下 2-3 个付费 design partner。
      - 为一个仓储任务 archetype 上线 MVP 版 evidence intake、audit trail 和委员会可读的 rollout 材料包。
      - 完成至少一个 OEM 集成，以及一次来自保险方或安全伙伴对材料包格式的审阅。
      - 至少把一个 design partner 转成年度订阅收入。
  - horizon: 12–24 个月
    items:
      - 支持 8-12 个企业项目或约 30 个活跃站点，与研究中的 SOM 情景一致。
      - 在多个仓储任务 archetype 上推出 benchmark 评分，并建立首个可重复的多站点扩张模块。
      - 建立一个小型 OEM、安全与保险伙伴生态，同时不放弃买方主导权。
  - horizon: 24–36 个月
    items:
      - 从 humanoid-specific 定位扩展到更广的仓储部署保障，只要底层审批 workflow 相同就能覆盖。
      - 推出面向保险方可读、并支持跨项目 benchmark 的高价值扩展产品。
      - 只有当仓库委员会 workflow 已经可重复且赚钱后，才测试第二个地理市场或相邻垂直领域。
risks:
  - risk: 公司烧钱速度可能跑在人形机器人部署密度前面，导致品类时机滞后。
    likelihood: High
    impact: High
    mitigation: 先卖给活跃的 design partner；必要时拓宽到相邻的移动操作 workflow。
  - risk: OEM 数据接入可能弱于产品路线图的预期。
    likelihood: Medium
    impact: High
    mitigation: 先用运营方自有证据证明需求，再决定把更深集成排到什么优先级。
  - risk: 买家可能把产品当成一次性咨询，而不是 recurring software。
    likelihood: Medium
    impact: High
    mitigation: 尽早把 recurring review cycle、benchmark 模块和多站点治理产品化。
  - risk: 如果公司被误认为认证机构，信任和责任问题会迅速冒出来。
    likelihood: Medium
    impact: High
    mitigation: 在定位、合同和合作模式上都牢牢守住 decision-support 边界。
  - risk: 一旦品类变得可见，相邻 RobOps 与 OEM 工具可能复制这套审批 workflow。
    likelihood: Medium
    impact: Medium
    mitigation: 在竞品把 observability 工具重新打包前，先建立中立数据集、委员会 workflow 和保险可读的材料包格式。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金将支持一个小而由创始人主导的团队，验证 3PL 滩头市场、交付首个 workflow-specific 产品、签下 2-3 个付费 design partner、证明至少一个订阅转化，并为后续依靠 benchmark 扩张打下证据与数据权利基础。