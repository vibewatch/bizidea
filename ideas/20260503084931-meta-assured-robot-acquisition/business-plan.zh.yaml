slug: humanoid-safety-case-os
date: '2026-05-03'
executiveSummary: >-
  仓储人形机器人的问题，正在从“技术试点跑没跑通”转向“董事会敢不敢批量铺开”，但美国 3PL 眼下仍缺一套中立系统，能把试点证据翻成站得住脚的放行/暂停依据。这份方案瞄准的是多站点 3PL：它们已经在 1-2 个仓里跑起首个人形机器人或相邻的移动操作试点，并且要在一个季度内决定是否扩到 3-5 个站点。产品切口是一套与供应商无关的安全论证 OS：先吃运营方自己掌握的事故证据，再在条件允许时接更深的 OEM 遥测，最后产出任务级就绪度评分、控制项清单和给运营、安全、风险团队一起审的 rollout 资料包。市场不是假需求，但今天仍偏窄：研究支持近端 SAM 约为 $7.9M，也显示最大风险并不是想象力不够，而是时机——公开可见的付费 3PL 人形机器人项目还不多。所以 GTM 不能一上来就铺大网，而要从美国 3PL 自动化负责人的高触达共创销售起步，而不是走大而泛的自助式软件路径。定价也不该锚定 OEM 软件 seat，而应对准试点拖期成本和外部安全咨询费用，因为独立的“保障软件预算”尚未被市场证明。公司只有守住采购方视角和中立身份，同时积累出哪些介入、场地条件与控制措施最能预测安全扩仓的数据资产，才有机会赢。这里刻意做了取舍：先不碰更大的工厂、零售和保险工作流，先证明一个仓储审批流程，真能把试点推成生产部署。眼下最大的证据缺口仍是 2026 年到底有多少个活跃且付费的 3PL 人形机器人试点，因此融资和招聘都必须克制，先验证 3PL 是否愿意为持续性软件买单。
problem:
  - 试点人形机器人的 3PL，没法靠供应商仪表盘、零散事故记录和人工 EHS 审查，为多站点扩张决策背书。
  - 安全、风险和运营团队都需要看同一套证据，也都要能在同一份可审计资料包上签字；可今天的工具既割裂，又站不到中立位置。
solution:
  - 把机器人日志、运营方掌握的视频、介入记录、事故工单和 SOP 变更吃进来，落到按仓储任务拆分的证据模型里。
  - 生成持续更新的安全论证、就绪度评分、必补控制项，以及给试点评审和扩点委员会使用的站点 rollout 资料包。
whyWeWin:
  - 产品围绕采购方审批流程设计，而不是围绕 OEM 的性能管理设计；一旦运营商要比供应商、要对内解释为什么能扩点，这种中立位置就有价值。
  - 跨供应商的介入、控制项和场地条件基准，会逐步沉淀成专有保障数据集；RobOps 仪表盘和顾问服务天然攒不出这层资产。
strategicChoices:
  beachhead: 在 5-50 个仓之间运营、已在 1-2 个设施里启动首个人形机器人或相邻移动操作试点的美国 3PL；试点任务包括料箱搬运、托盘侧处理和拖车卸货。
  wedgeRationale: 这个工作流的购买触发很直接、涉及的利益相关方不多，而且结果是二元的——扩、停或补控制项——所以比一上来做通用机器人合规平台更容易更快拿到证据。
  sequencingRationale: 先证明只靠运营方掌握的证据也能产出有用的 rollout 资料包，再补 OEM 集成和基准评分，最后等输出格式真正被信任后，再叠加保险方和安全顾问渠道。
  notYet:
    - 正式认证或保险承保权
    - 医院、零售后仓、消费级人形机器人等非仓储垂直场景
    - 广义机器人车队编排或仓储执行功能——这些本就更该属于 RobOps 与 WMS 平台
market:
  tam: 基于 6,997 个拥有 20+ 员工的美国仓储机构、估算 25% 与 3PL 相关的占比，以及每个活跃站点每年 $30k 的保障软件支出，得到底层测算的 beachhead TAM 约为 $52.5M。
  sam: 进一步假设只有 15% 与 3PL 相关的站点在近期具备试点准备度，而公开的人形机器人部署仍集中在少数重复性流程里，对应近端 SAM 约为 $7.9M。
  som: 示意性的第 3 年 SOM 为 $900k，对应大约 30 个活跃站点，或 8-12 个企业项目，每个活跃站点折算约 $30k。
  segments:
    - 有活跃人形机器人试点的美国多站点 3PL 仓储运营商
    - 正在支持相邻移动操作 rollout 的仓储安全、风险与自动化团队
  buyingProcess: 采购流程由委员会驱动，通常从首站点试点评审、险情或保险方提问开始，逼着团队必须做扩点决策。经济采购方一般是运营或自动化副总裁/负责人，站点安全、EHS 和风险团队则负责定义要求并决定是否签字。
product:
  mvp: 为一个具体仓储任务族做一套按工作流设计的证据录入和复盘产品，把事故、人工介入、SOP 变更和有限遥测整理成可供委员会审阅的 rollout 资料包。MVP 要打穿一个共创客户的端到端流程，而不是做一个空泛的机器人平台。
  sixMonth: 拿下 2-3 个共创客户，打通来自运营方系统的证据接入，交付带人工复核的就绪度报告，并证明这套资料包至少改变过一次真实的扩点决策。
  twelveMonth: 为 2-3 类仓储任务做出可重复评分，打深至少一个 OEM 集成，再把共创客户报告产品化成带审计轨迹和控制项跟踪的订阅产品。
  twentyFourMonth: 从单站点试点评审扩到多站点项目治理，让客户能和匿名同行模式做基准比较，并在继续保持“决策支持而非认证”的前提下，开放给保险方和渠道伙伴使用的报告能力。
  keyBets:
    - 在还拿不到完整 OEM 数据前，运营方自有证据已经足够撑起第一版有用的产品。
    - 采购方愿意为更快的扩点决策支付持续性软件费用，而不只是为一次性咨询买单。
    - 窄而深的仓储任务本体，比按站点各自定制的评分方式，更能跨多个 3PL 客户复用。
gtm:
  wedge: 先把“付费试点评审 + rollout 资料包”卖给一家全国性 3PL；它已经在跑一个人形机器人仓储项目，而且高层要求在一个季度内决定是否扩到更多站点。
  channels:
    - 创始人直销给美国 3PL 的自动化负责人和运营创新负责人
    - 在合同里先锁死中立性和数据访问条款后，再接受 OEM 转介与联合销售
    - 后续把安全顾问、仓储顾问和保险方拉进来，作为增信和分发渠道
  funnelTargets: 每季度 10-15 个合格 ICP 会议，会议到付费共创客户的转化率 20-30%，共创客户到年度订阅的转化率 50%+，首站点订阅到多站点扩张模块的转化率在 12 个月内达到 60%+
  pricing: 年度项目费加按站点收费的 rollout 模块；初期以 $40k-$80k 的共创合同打入，再随着客户从一个流程、1-2 个站点扩到 3-5 个站点，转成约 $90k-$180k 的年度项目。定价逻辑是少拖试点、少花外部审查钱。
businessModel:
  revenueStreams:
    - 面向活跃机器人部署项目的年度软件订阅
    - 按站点收取的 rollout 与就绪度复审模块费用
    - 高级基准分析、给保险方看的报告，以及伙伴协同复审包
  unitOfValue: 带站点扩张模块的活跃机器人部署项目
  targetGrossMarginPct: 75
  expansionLevers:
    - 同一企业项目覆盖更多站点
    - 单个客户新增更多仓储任务类型
    - 面向保险方、经纪人和安全伙伴的跨供应商基准与报告模块
strategyMap:
  northStarMetric: 借助平台完成扩点审批、且未发生重大部署回滚的新增仓储站点数
  inputMetrics:
    - 从试点评审到扩点决策所用的时间
    - 证据图谱里被捕获的事故与人工介入占比
    - 共创客户到年度订阅的转化率
    - 首站点到多站点扩张的转化率
    - 活跃项目中的 OEM 集成覆盖率
  moatsToBuild:
    - 把介入、控制项与场地条件和扩点结果连起来的跨供应商数据集
    - 同时被运营、安全和风险委员会信任的任务本体与 rollout 资料包格式
    - 让公司成为扩点评审默认证据层的工作流集成与渠道关系
  killCriteria:
    - 前 9 个月拿不到 2 个以上付费共创客户
    - 受访 ICP 中，不到 30% 认为 rollout 审批痛到值得买持续性软件
    - 没有任何共创客户在完成一轮试点评审后转成订阅
  mermaid: |
    flowchart LR
      Wedge[3PL 试点评审切口] --> MVP[证据接入加 rollout 材料包 MVP]
      MVP --> Proof[付费共创客户与首批扩张决策]
      Proof --> Expansion[多站点治理与 benchmark 模块]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口够明确、工作流痛点也是真问题，但赛道时机和采购方预算的公开证据仍然太薄，不足以支持高确信度的种子轮承保。
    whyBelieve: 公司打的是一个很具体的运营审批瓶颈，而相邻的 RobOps 和 OEM 工具今天并没有把这件事真正解决掉。
    whyDoubt: 公开可见的付费 3PL 人形机器人项目和持续性保障预算都还不多，时机可能比产品成熟度来得更慢。
    nextDiligence: 先确认 3PL 共创客户在跑完一轮真实试点评审后，愿不愿意继续为持续性软件付费，而不是只接受重服务的首次支持。
  firstCustomer:
    title: 正在跑人形机器人仓储试点的全国性 3PL 自动化负责人
    profile: 一家美国 3PL，拥有 5-50 个仓，在一个重复性室内流程里跑着一个真实试点，而且管理层催着它尽快决定是否扩点。
    trigger: 首次现场事故、人工介入或保险方提问冒出来，迫使团队召开正式的“扩还是停”评审会。
    buyer: VP of Operations or Head of Automation
    initialContract: 面向一个流程、1-2 个站点的 $40k-$80k 共创合同；一旦扩到 3-5 个站点并进入持续复审，便转为 $90k-$180k 的年度经常性项目收入。
  mustBeTrue:
    - 前 10 次 ICP 访谈里，至少有 5 家确认 rollout 审批是可重复的软件问题，而不只是偶发咨询需求。
    - 至少有 2 个共创客户愿意共享足够多的运营方证据，让团队在拿到完整 OEM 集成前先生成有用的首版就绪度评分。
    - 至少有 1 家保险方、经纪人或安全顾问认可这套 rollout 资料包，认为它能作为扩点评审的可信决策支持。
    - 至少 50% 的付费共创客户会在首轮评审完成后转成年度订阅。
    - 即使线索来自 OEM 转介，产品在合同结构和数据展示上也必须继续保持中立。
  diligenceQuestions:
    - 眼下美国到底有多少家 3PL 正在跑付费的人形机器人或相邻移动操作试点？
    - 在独立保障品类还没形成之前，这个产品会走哪条预算线？
    - 在拿不到深度 OEM 遥测时，支持可辩护就绪度评分的最小数据集到底是什么？
    - 一旦这个工作流被证明有价值，为什么 Formant、InOrbit 或 OEM 自带软件不会立刻吃掉它？
    - 需要哪些免责声明、伙伴分工和产品边界，才能防止客户把软件误当成正式认证？
  riskHeatmap:
    - risk: 赛道采用速度比计划慢。
      likelihood: High
      impact: High
      leadingIndicator: 前 6 个月里，能被识别并触达的美国 3PL 人形机器人或相邻试点项目不到 10 个。
      mitigation: 先拿活跃共创客户，再在纯人形机器人需求过薄时同时支持相邻的移动操作工作流。
    - risk: OEM 限制遥测访问，导致强评分所需的数据拿不到。
      likelihood: Medium
      impact: High
      leadingIndicator: 共创客户提供不了事件级遥测，MVP 的可用性几乎完全取决于人工汇报。
      mitigation: 第一版先立在运营方自有视频、工单和 SOP 证据上，再借采购方需求去谈更深集成。
    - risk: 采购方把产品看成咨询，而不是持续性软件。
      likelihood: Medium
      impact: High
      leadingIndicator: 付费试点愿意要定制报告，却在第一轮评审后拒绝年度合同。
      mitigation: 尽早把复审流程做成产品，把定价绑到重复性委员会使用上，定制服务只留给导入阶段。
    - risk: 一旦客户把它理解成正式认证，法律和责任风险就会抬升。
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户要求公司直接为安全合规背书，或替代保险方和顾问完成审查。
      mitigation: 坚持把平台定位成可审计的决策支持，写清免责声明，并与正式专家合作承接接近认证的需求。
    - risk: 相邻 RobOps 平台会上探，切进审批工作流。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 竞争对手开始宣传面向保险方的 rollout 批准能力或采购方安全论证输出。
      mitigation: 在相邻平台改口之前，先把委员会工作流、基准数据集和中立输出格式占住。
operatingAssumptions:
  - assumption: 第一批可重复成交的买家，是已经跑起一个人形机器人或相邻移动操作试点的美国多站点 3PL。
    basis: research.yaml
    validationTest: 访谈 15 个目标账户，确认至少 5 家有真实或即将启动的试点，并且在未来两个季度内要做明确扩点决策。
    decisionImpact: 如果不成立，要么更进一步缩到单一 OEM 生态，要么更早扩到相邻仓储机器人品类。
  - assumption: 在深度 OEM 集成尚未可得时，运营方掌握的证据就足以做出有用的 MVP。
    basis: idea.yaml
    validationTest: 用视频、事故工单、介入次数和 SOP 变更做一轮共创客户评审，再比较客户在收到资料包前后的决策信心变化。
    decisionImpact: 如果不成立，路线图就得把 OEM 集成提到最前，销售周期也会被拉长。
  - assumption: 客户会从自动化项目预算里支付，而不会等专门的“安全软件预算”出现后再买。
    basis: research.yaml
    validationTest: 在付费试点提案里确认谁是预算 owner，以及审批是拿“少拖期”还是“少花咨询费”做比较基准。
    decisionImpact: 如果不成立，定价和打包方式就该转向伙伴带单服务，或与 OEM/渠道捆绑销售。
  - assumption: 对采购方来说，中立身份比更紧但单一 OEM 的工作流更值钱。
    basis: operator judgment
    validationTest: 对比采购方直接主导的成交，与带中立条款的 OEM 转介成交，在转化速度和留存上的差异。
    decisionImpact: 如果不成立，公司可能必须选边站进某个主导 OEM 生态，而不是继续做跨供应商品牌。
  - assumption: 只有把人形机器人扩成更广义的仓储部署保障，市场才撑得起风险投资式增长。
    basis: research.yaml
    validationTest: 统计严格意义上不是人形机器人、但审批工作流完全相同的合格机会有多少。
    decisionImpact: 如果不成立，公司更适合做聚焦的小而美软件生意，同时降低融资预期。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15 家美国多站点 3PL 的自动化、EHS 和站点运营负责人。
    hypothesis: 至少三分之一正在面对真实的试点评审瓶颈，而且预算紧迫度落在未来两个季度内。
    successMetric: 5 次以上访谈确认存在真实或即将到来的扩点决策，并愿意评估付费软件。
    owner: CEO/founder
  - horizon: 0–90 天
    experiment: 只用运营方自有证据，为 1 个共创客户手工做出第一版 rollout 资料包。
    hypothesis: 即便没有完整 OEM 遥测，也能给出有用的审批建议。
    successMetric: 客户认可资料包对决策有帮助，并愿意再跑第二轮复审或扩大到生产范围。
    owner: Founding product lead
  - horizon: 90–180 天
    experiment: 围绕一个任务原型，与 2-3 家 3PL 跑付费共创合同。
    hypothesis: 只要和季度末扩点决策绑在一起，客户会为持续复审工作流付费。
    successMetric: 签下 2 份以上付费合同，且至少 1 份转成年度订阅。
    owner: CEO/founder
  - horizon: 90–180 天
    experiment: 同时测试 1 个 OEM 集成，以及 1 次保险方或安全顾问对资料包格式的复审。
    hypothesis: 更深的遥测能显著提升评分质量，而外部利益相关方会认可输出是可信的决策支持。
    successMetric: 完成 1 个真实数据集成，并有 1 个伙伴同意在客户流程里使用或背书这套资料包格式。
    owner: Founding eng
  - horizon: 180–365 天
    experiment: 在 2-3 类仓储任务上推出基准评分。
    hypothesis: 与定制报告相比，可重复评分会进一步拉高转化和扩点率。
    successMetric: 订阅客户在至少 70% 的复审周期里使用标准化评分。
    owner: Product + engineering
  - horizon: 180–365 天
    experiment: 与 1 家 OEM、1 家安全或系统集成伙伴跑渠道测试。
    hypothesis: 伙伴带来的线索能加快切入速度，同时不伤害中立性和毛利。
    successMetric: 伙伴渠道带来至少 2 个合格机会，且没有要求白标，也没有要求把审批叙事降格为附属能力。
    owner: CEO/founder
operations:
  - 建立标准化的证据接入流程，覆盖视频、事故工单、SOP 变更和机器人事件日志。
  - 把产品免责声明、复审流程和审批记录做扎实，确保平台始终停留在决策支持边界内。
  - 与其围着单个用户转，不如固定与运营、安全和风险团队共用一套客户复审节奏。
  - 只有在中立性、数据权利和客户归属都先定义清楚后，才和 OEM、保险方及安全顾问建立伙伴动作。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 从第一天就要有人把证据接入、审计轨迹和首个按工作流设计的产品做出来，核心数据架构不能外包。
  - role: 创始人销售 / CEO
    startTiming: Month 0
    rationale: 早期成交要靠深度问题发现、共创销售，以及对采购方和 OEM 都讲得清的中立定位。
  - role: 机器人领域专家 / 安全工作流负责人
    startTiming: Month 3
    rationale: 这个角色负责把原始遥测和事故证据翻成可信的任务分类、控制逻辑和对外 rollout 资料包。
  - role: 产品工程师
    startTiming: Month 6
    rationale: 第一批共创客户一旦验证工作流成立，就必须有人把可重复评分和复审体验真正产品化。
  - role: 客户成功 / 解决方案负责人
    startTiming: Month 9
    rationale: 这个岗位要承接导入、委员会复审和多站点 rollout，同时避免公司滑成纯服务外包店。
milestones:
  - horizon: 0–12 个月
    items:
      - 在美国 3PL beachhead 签下 2-3 个付费共创客户。
      - 为 1 类仓储任务交付 MVP 级证据录入、审计轨迹和委员会可审的 rollout 资料包。
      - 完成至少 1 个 OEM 集成，以及 1 次保险方或安全伙伴对资料包格式的复审。
      - 至少让 1 个共创客户转成年度订阅收入。
  - horizon: 12–24 个月
    items:
      - 支持 8-12 个企业项目，或约 30 个活跃站点，与研究里的 SOM 场景保持一致。
      - 在多类仓储任务上推出基准评分，并建立第一版可重复的多站点扩张模块。
      - 建起一个小而能用的 OEM、安全和保险伙伴网络，同时不放弃采购方主导权。
  - horizon: 24–36 个月
    items:
      - 从“人形机器人专用”扩到更广义的仓储部署保障，只要审批工作流相同就能承接。
      - 推出给保险方看的报告和跨项目基准模块，作为更高价值的扩展产品。
      - 只有在仓储委员会工作流已经可重复且能赚钱之后，才测试第二个地理市场或相邻垂直行业。
risks:
  - risk: 如果人形机器人部署仍然稀疏，赛道时机会慢过公司的烧钱速度。
    likelihood: High
    impact: High
    mitigation: 先卖给正在跑试点的共创客户；必要时扩到相邻的移动操作工作流。
  - risk: OEM 数据接入可能比产品路线图假设得更弱。
    likelihood: Medium
    impact: High
    mitigation: 先靠运营方自有证据证明需求，再决定集成优先级。
  - risk: 采购方可能把产品当成一次性咨询，而不是持续性软件。
    likelihood: Medium
    impact: High
    mitigation: 提前把周期性复审、基准模块和多站点治理产品化。
  - risk: 一旦公司被误当成认证机构，信任和责任问题会同时冒头。
    likelihood: Medium
    impact: High
    mitigation: 在定位、合同和伙伴模型上始终守住“决策支持，不做认证”。
  - risk: 一旦机会被看见，相邻 RobOps 和 OEM 工具会迅速复制审批工作流。
    likelihood: Medium
    impact: Medium
    mitigation: 趁对手还在包装观测工具时，先把中立数据集、委员会工作流和保险可读资料包做深。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月资金支持一个小而精、创始人主导的团队，验证 3PL beachhead、交付首个按工作流设计的产品、拿下 2-3 个付费共创客户、证明至少一次订阅转化，并打好后续做基准扩张所需的证据和数据权利基础。
