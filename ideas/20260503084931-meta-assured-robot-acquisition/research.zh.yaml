  som:
    value: $900,000
    rationale: 示意性的第 3 年 SOM 假设有 30 个活跃站点（约 8-12 个企业项目），按每个活跃站点当量 $30k 计算；这一目标足够激进，需要可重复的扩展胜利，但相对建模 SAM 仍属保守。
    isEstimate: true
    sourceRefs:
    - 6
    - 13
    - 17
bottomUpSizingDrivers:
- driver: 美国拥有 20+ 名员工的仓储机构
  value: '6997'
  source: '[2]'
- driver: 大型仓储站点中估算与 3PL 相关的占比
  value: 25%
  source: 估算（来自市场定义的滩头约束）
- driver: 3PL 相关站点中近期具备试点准备度的估算占比
  value: 15%
  source: 基于 [6]、[8]、[9]、[13] 的计算
- driver: 每个活跃站点建模的年度保障软件支出
  value: $30k
  source: 估算，基于工作流软件 + 避免延误/咨询支出的逻辑
categoryDynamics:
  growthRate: 15.56% CAGR（第三方分析师对 2026-2035 年仓库自动化市场的估计）
  growthRateSourceRefs:
  - 5
  tailwinds:
  - point: 战略资本和金融资本正流向具身 AI 和仓库人形机器人，从而增加未来需要部署治理的软件项目数量。
    sourceRefs:
    - 1
    - 12
    - 15
    - 16
  - point: 公开的仓库与制造里程碑表明，技术争论正从“能否实现”转向“能否重复并规模化”。
    sourceRefs:
    - 8
    - 9
    - 10
    - 11
    - 24
  - point: 仓库自动化已经是一个熟悉的预算领域，因此相较于全新品类，保障层更容易被解释。
    sourceRefs:
    - 5
    - 21
    - 22
  headwinds:
  - point: 人形机器人规模化落地仍处早期，在市场扩张前，这家初创公司可能面临稀薄的买方基础。
    sourceRefs:
    - 6
    - 13
    - 21
  - point: 安全、责任和治理预期可能拖慢采购，并要求产品在定位上远离正式认证主张。
    sourceRefs:
    - 3
    - 4
    - 7
    - 23
  - point: 一旦机会变得显性，相邻 RobOps 厂商和 OEM 可能会向上游进入审批工作流。
    sourceRefs:
    - 17
    - 18
    - 19
    - 20
competitors:
- name: Formant
  stage: scale-up
  wedge: 面向物理 AI 车队的机器人运营、可观测性与事件智能
  pricing: 定制企业定价；无公开标价
  strength: 在遥测、事件工作流和面向运营的工具上具备强势能力
  weaknessVsUs: 其公开定位聚焦于更好地运营机器人，而不是中立的买方侧安全论证或面向保险方的扩展审批包
  sourceRefs:
  - 19
  - 20
- name: InOrbit
  stage: scale-up
  wedge: 仓库 RobOps、编排与设施级自动化软件
  pricing: 定制企业定价；无公开标价
  strength: 互操作性和仓库运营导向使其成为可信的相邻 incumbents
  weaknessVsUs: 比起委员会/审批导向，更偏操作员/编排导向；对抗 OEM 说法的中立性并非其核心价值主张
  sourceRefs:
  - 17
  - 18
- name: Agility
  stage: scale-up
  wedge: 以 Digit 为核心、由 OEM 主导的人形机器人部署，以及相关部署/安全内容
  pricing: 定制机器人项目定价
  strength: 直接获取机器人数据，并在 GXO 展示了可见的早期仓库牵引力
  weaknessVsUs: 单一供应商视角限制了其作为中立跨供应商审批层的信任度
  sourceRefs:
  - 6
  - 7
  - 8
- name: Apptronik
  stage: scale-up
  wedge: Apollo 人形机器人，以及在物流和制造领域的商业合作
  pricing: 定制机器人项目定价
  strength: 资本基础强，并在 GXO 和 Mercedes-Benz 拿下可信的设计订单
  weaknessVsUs: 规模化部署仍然较早，且结构上并非供应商中立
  sourceRefs:
  - 13
  - 14
  - 15
  - 16
- name: Boston Dynamics Stretch
  stage: incumbent
  wedge: 已被验证的仓库自动化替代方案，聚焦集装箱卸货和箱件搬运
  pricing: 定制企业定价
  strength: 在仓库工作流中具备运营验证，并拥有被认可的安全/运营品牌
  weaknessVsUs: 对于部分场景是替代方案，但不是中立保障层，也不是人形机器人平台
  sourceRefs:
  - 21
  - 22
  - 23
regulatoryTechnicalConstraints:
- point: 产品应被定位为带可审计证据的决策支持，而不是正式认证，因为 AI 治理和安全预期正在上升，但仍然碎片化。
  sourceRefs:
  - 3
  - 4
  - 23
- point: 数据访问是真实的集成风险：评分质量会随着 OEM 遥测接入而提升，但买方可能必须先从运营方自有的视频、事件日志和 SOP 证据开始。
  sourceRefs:
  - 6
  - 13
  - 18
- point: 任务和站点层面的上下文非常重要；同一台机器人会因工作流、布局和人工监督假设不同，而呈现不同的部署准备度。
  sourceRefs:
  - 7
  - 8
  - 9
  - 21
- point: 即便品类尚未成熟，企业采购也很可能要求该产品达到与其他运营软件相当的安全性、可用性和事件可追溯标准。
  sourceRefs:
  - 17
  - 18
  - 19
  - 20
validationSignals:
- point: Meta 收购 Assured Robot Intelligence，说明具身 AI 资产对平台型玩家而言正变得更具战略稀缺性。
  sourceRefs:
  - 1
- point: Agility 公开表示，Digit 在商业部署中已搬运超过 100,000 个料箱，表明这已是重复性仓库作业，而非一次性演示。
  sourceRefs:
  - 8
- point: Figure 在发布物流专用模型和产能里程碑的同时，也披露了 BMW 制造产出，说明品类进展迅速。
  sourceRefs:
  - 9
  - 10
  - 11
  - 24
- point: Apptronik 同时具备运营层面的设计订单和大额融资，说明多个 OEM 都预期企业级扩展需求将会出现。
  sourceRefs:
  - 13
  - 14
  - 15
  - 16
- point: 相邻 RobOps 平台正从仪表盘走向编排和事件智能，表明运营复杂性本身正在成为一个软件品类。
  sourceRefs:
  - 17
  - 18
  - 19
  - 20
- point: Boston Dynamics 的 Stretch 及其与 Gap 的案例研究表明，只要能清晰消除运营瓶颈，买方即便在非人形机器人场景下也愿意为仓库自动化付费。
  sourceRefs:
  - 21
  - 22
openQuestions:
- 2026 年究竟有多少美国 3PL 正在运行付费的人形机器人或可比的移动操作试点？
- 买方会为部署保障提供经常性软件预算，还是把它视为捆绑在试点评审中的阶段性咨询？
- 在 OEM 遥测不完整时，什么样的最小数据集足以让运营、安全和保险方相关方觉得可信？
- 如果要获取让就绪度评分具备可辩护性的关键数据，这家初创公司能否在与 OEM 紧密合作的同时保持中立？
