      - 6
      - 13
      - 17
      - 19
      - 20
  pestle:
  - factor: 政治
    impact: neutral
    point: 美国今天还没有单一的联邦 humanoid 规则，但公共部门对 AI 治理的强调，已经在抬高文档化要求。
    sourceRefs:
    - 3
  - factor: 经济
    impact: positive
    point: 仓储自动化支出在增长，这给 assurance 层创造了相邻预算，即使直接品类目前还不大。
    sourceRefs:
    - 5
  - factor: 社会
    impact: positive
    point: 买家能否接受，取决于员工是否信任安全控制、干预流程和人工监督假设是否清晰可见。
    sourceRefs:
    - 7
    - 23
  - factor: 技术
    impact: positive
    point: 人形机器人在物流场景中的表现提升足够快，以至于审批 workflow 正在变成立刻可感的运营瓶颈。
    sourceRefs:
    - 8
    - 9
    - 10
    - 24
  - factor: 法律
    impact: negative
    point: 如果客户把产品当成认证机构，而不是 decision support，责任暴露和客户预期都会急剧上升。
    sourceRefs:
    - 3
    - 4
    - 23
  adoptionFrictionMatrix:
  - friction: 早期试点里缺少稀疏而完整的多厂商部署数据
    severity: high
    affectedBuyer: VP Operations / Head of Automation
    mitigation: 先从运营方自有证据起步，把干预、事故和 SOP 变化先标准化，再去争取更深的 OEM 集成。
    sourceRefs:
    - 6
    - 13
    - 18
  - friction: 运营、EHS 和风险之间的归属边界模糊
    severity: high
    affectedBuyer: 经济买家与安全相关方
    mitigation: 输出要面向委员会评审，而不是只给机器人操作员看；责任归属和签字节点都要写清楚。
    sourceRefs:
    - 3
    - 7
    - 23
  - friction: 这个品类没有标准的公开定价 benchmark
    severity: medium
    affectedBuyer: 采购 / 财务
    mitigation: 定价锚定在避免试点拖延和减少咨询负担，而不是去和 OEM 软件 seat 对比。
    sourceRefs:
    - 6
    - 13
    - 17
  - friction: 仓库之间的站点差异很大
    severity: medium
    affectedBuyer: 站点经理
    mitigation: 评分要锚定任务 archetype 和所需控制措施，而不是默认同一台机器人在每个设施里 readiness 都一样。
    sourceRefs:
    - 8
    - 9
    - 21
  - friction: 客户可能误以为产品提供正式认证
    severity: high
    affectedBuyer: 法务 / 保险方 / 安全经理
    mitigation: 明确把产品界定为可审计的 decision support，并在需要时与正式专家合作。
    sourceRefs:
    - 3
    - 4
    - 23
market:
  tam:
    value: $52.5M
    rationale: '自下而上的滩头 TAM：6,997 个拥有 20+ 员工的美国仓储机构 [2] × 估算 25% 与 3PL 相关的占比 × 每个活跃站点估算 $30k 的年度 assurance 软件支出 = 约 $52.5M。'
    isEstimate: true
    sourceRefs:
    - 2
    - 5
  sam:
    value: $7.9M
    rationale: SAM 在 3PL 相关站点基础上，再施加 15% 的近期试点就绪过滤，反映出公开的人形机器人部署仍集中在少数重复性物流 workflow 中 [6][8][9][13]；1749 × 15% × $30k ≈ $7.9M。
    isEstimate: true
    sourceRefs:
    - 2
    - 6
    - 8
    - 9
    - 13
  som:
    value: $900,000
    rationale: 示意性的第 3 年 SOM 假设覆盖 30 个活跃站点（约 8-12 个企业项目），按每个活跃站点等价 $30k 计算；这个目标既需要可重复的扩张胜利，又相对整个建模 SAM 仍算保守。
    isEstimate: true
    sourceRefs:
    - 6
    - 13
    - 17
bottomUpSizingDrivers:
- driver: 拥有 20+ 员工的美国仓储机构数量
  value: '6997'
  source: '[2]'
- driver: 大型仓储站点中与 3PL 相关的估算占比
  value: 25%
  source: est. (beachhead constraint from market definition)
- driver: 3PL 相关站点中近期具备试点条件的估算占比
  value: 15%
  source: calc using [6], [8], [9], [13]
- driver: 每个活跃站点建模的年度 assurance 软件支出
  value: $30k
  source: est. based on workflow-software + avoided delay/consulting logic
categoryDynamics:
  growthRate: 15.56% CAGR (third-party analyst estimate for warehouse automation, 2026-2035)
  growthRateSourceRefs:
  - 5
  tailwinds:
  - point: 战略资本和财务资本正持续流向具身 AI 与仓储 humanoids，这会增加需要部署治理的软件项目数量。
    sourceRefs:
    - 1
    - 12
    - 15
    - 16
  - point: 公开的仓储与制造里程碑说明，技术争论正从“能不能做”转向“能不能重复、能不能放量”。
    sourceRefs:
    - 8
    - 9
    - 10
    - 11
    - 24
  - point: 仓储自动化本来就是熟悉的预算领域，因此 assurance 层比起全新品类更容易被解释清楚。
    sourceRefs:
    - 5
    - 21
    - 22
  headwinds:
  - point: humanoid rollout 仍处早期，市场在真正变宽之前，创业公司可能会撞上很薄的买家基数。
    sourceRefs:
    - 6
    - 13
    - 21
  - point: 安全、责任和治理预期会拖慢采购，并迫使产品明确避开正式认证定位。
    sourceRefs:
    - 3
    - 4
    - 7
    - 23
  - point: 一旦机会更明显，相邻的 RobOps 厂商和 OEM 可能向上游扩进审批 workflow。
    sourceRefs:
    - 17
    - 18
    - 19
    - 20
competitors:
- name: Formant
  stage: scale-up
  wedge: 面向 physical AI 车队的机器人运营、可观测性与事故 intelligence
  pricing: 定制企业定价；没有公开列表价
  strength: 在遥测、事故 workflow 和面向运营团队的工具上很强
  weaknessVsUs: 公开定位仍然围绕“把机器人运营得更好”，而不是中立的买方侧安全案例或保险可读的 rollout 材料包
  sourceRefs:
  - 19
  - 20
- name: InOrbit
  stage: scale-up
  wedge: 面向仓储的 RobOps、编排与设施级自动化软件
  pricing: 定制企业定价；没有公开列表价
  strength: 互操作性和仓储运营聚焦，让它成为一个可信的相邻 incumbent
  weaknessVsUs: 更偏操作员 / 编排视角，而不是委员会 / 审批视角；对抗 OEM 口径的中立性也不是其核心价值主张
  sourceRefs:
  - 17
  - 18
- name: Agility
  stage: scale-up
  wedge: 以 OEM 为主导的人形机器人部署，围绕 Digit 及相关部署 / 安全内容展开
  pricing: 定制的机器人项目定价
  strength: 直接掌握机器人数据，并且已经在 GXO 拿到可见的早期仓储 traction
  weaknessVsUs: 单一厂商视角限制了它作为跨厂商中立审批层的信任度
  sourceRefs:
  - 6
  - 7
  - 8
- name: Apptronik
  stage: scale-up
  wedge: Apollo humanoid 加上物流与制造领域的商业合作
  pricing: 定制的机器人项目定价
  strength: 资本基础强，且已在 GXO 和 Mercedes-Benz 拿到可信 design win
  weaknessVsUs: 大规模部署仍处早期，而且结构上不可能保持厂商中立
  sourceRefs:
  - 13
  - 14
  - 15
  - 16
- name: Boston Dynamics Stretch
  stage: incumbent
  wedge: 聚焦集装箱卸货和箱件处理的成熟仓储自动化替代方案
  pricing: 定制企业定价
  strength: 在仓储 workflow 中已有运营验证，也具备成熟的安全 / 运营品牌认知
  weaknessVsUs: 对部分 use case 是替代方案，但它不是中立 assurance 层，也不是 humanoid 平台
  sourceRefs:
  - 21
  - 22
  - 23
regulatoryTechnicalConstraints:
- point: 产品应被定位为带可审计证据的 decision support，而不是正式认证，因为 AI 治理与安全预期虽然在上升，但仍然碎片化。
  sourceRefs:
  - 3
  - 4
  - 23
- point: '数据接入是真实的集成风险：有了 OEM 遥测，评分才会更强；但现实里，买家可能必须先从运营方自有视频、事故日志和 SOP 证据起步。'
  sourceRefs:
  - 6
  - 13
  - 18
- point: 任务级与站点级上下文很关键；同一台机器人会因为 workflow、布局和人工监管假设不同，而呈现完全不同的部署 readiness。
  sourceRefs:
  - 7
  - 8
  - 9
  - 21
- point: 即使这个品类还不成熟，企业采购大概率也会要求它具备与其他运营软件相当的安全、稳定性和事故可追溯标准。
  sourceRefs:
  - 17
  - 18
  - 19
  - 20
validationSignals:
- point: Meta 收购 Assured Robot Intelligence，说明对平台玩家而言，具身 AI 资产正在变得战略稀缺。
  sourceRefs:
  - 1
- point: Agility 公开宣称 Digit 在商业部署中搬运了 100,000+ 个料箱，这意味着它已进入真实仓储重复场景，而不只是一次性 demo。
  sourceRefs:
  - 8
- point: Figure 正在同时公布物流特定模型进展、生产里程碑和 BMW 产线成果，说明赛道进展很快。
  sourceRefs:
  - 9
  - 10
  - 11
  - 24
- point: Apptronik 既拿到了运营层面的 design win，也拿到了大额融资，说明不止一家 OEM 预期企业 rollout 需求会真实发生。
  sourceRefs:
  - 13
  - 14
  - 15
  - 16
- point: 相邻的 RobOps 平台正在从仪表盘走向编排和事故 intelligence，说明“运营复杂度本身”正在成长为一个软件品类。
  sourceRefs:
  - 17
  - 18
  - 19
  - 20
- point: Boston Dynamics 的 Stretch 以及 Gap 案例表明：只要仓储自动化能清楚移除运营瓶颈，买家就会付费，即使它不是 humanoid。
  sourceRefs:
  - 21
  - 22
openQuestions:
- 2026 年美国到底有多少 3PL 正在运行付费的人形机器人或可比的移动操作试点？
- 买家会为部署 assurance 拿出 recurring software 预算，还是会把它继续视作捆绑在试点评审里的偶发咨询？
- 在 OEM 遥测不完整时，什么样的最小数据集才足以让运营、安全和保险方相关人相信？
- 如果公司要与 OEM 紧密合作才能拿到关键数据，它又能否继续保持中立，让 readiness 评分站得住脚？
