  adoptionFrictionMatrix:
  - friction: 早期试点缺乏稀疏而统一的多供应商部署数据
    severity: high
    affectedBuyer: 运营副总裁 / 自动化负责人
    mitigation: 先从运营方自有证据入手，在要求深度 OEM 集成之前，先标准化干预、事件和 SOP 变化。
    sourceRefs:
    - 6
    - 13
    - 18
  - friction: 运营、EHS 与风险之间的归属权模糊
    severity: high
    affectedBuyer: 经济买方及安全相关方
    mitigation: 将输出打包为委员会评审材料，而不是只服务机器人操作员；明确责任与签字。
    sourceRefs:
    - 3
    - 7
    - 23
  - friction: 该品类没有标准化的公开定价基准
    severity: medium
    affectedBuyer: 采购 / 财务
    mitigation: 把定价定位在避免试点延误和减少咨询开销上，而不是与 OEM 软件席位对标。
    sourceRefs:
    - 6
    - 13
    - 17
  - friction: 不同仓库站点之间差异性很大
    severity: medium
    affectedBuyer: 站点经理
    mitigation: 将评分锚定于任务原型及所需控制措施，而不是假设同一机器人在每个设施都同样就绪。
    sourceRefs:
    - 8
    - 9
    - 21
  - friction: 客户可能期待正式认证
    severity: high
    affectedBuyer: 法务 / 保险方 / 安全经理
    mitigation: 明确把产品定位为可审计的决策支持，并在必要处与正式专家合作。
    sourceRefs:
    - 3
    - 4
    - 23
