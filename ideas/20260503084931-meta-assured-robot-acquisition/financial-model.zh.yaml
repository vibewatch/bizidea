currency: USD
modelStartMonth: "2026-06"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-06"
    unit: month
    source: "[BP date 2026-05-03] 计划日期之后的第一个完整运营月份。"
  - id: A2
    name: 期初现金
    value: "2400"
    unit: USDK
    source: "[BP fundingAsk $2-3M] 以 pre-seed 融资中位数作为期初现金。"
  - id: A3
    name: 第 1 年签下的付费 design partner 数量
    value: "3"
    unit: customers
    source: "[BP product sixMonth and milestones] 前 12 个月签下 2-3 个 design partner。"
  - id: A4
    name: 第 2 年第 4 季末的活跃付费项目数
    value: "7"
    unit: customers
    source: "[BP milestones 12-24 months] 通过里程碑驱动的招聘，向 8-12 个企业项目爬坡。"
  - id: A5
    name: 第 3 年第 4 季末的活跃付费项目数
    value: "11"
    unit: customers
    source: "[BP market SOM] 第 3 年达到 8-12 个企业项目；模型取这个区间的偏上中位。"
  - id: A6
    name: 第 1 年每个活跃项目的混合月收入
    value: "7.0"
    unit: USDK per month
    source: "[BP pricing $40k-$80k design partner] 针对错峰签约的 design-partner 合同，采用混合摊销确认。"
  - id: A7
    name: 第 2 年每个活跃项目的混合月收入
    value: "9.0"
    unit: USDK per month
    source: "[BP pricing $90k-$180k annual programs] 基准情形假设早期订阅落在计划区间的偏低到中段。"
  - id: A8
    name: 第 3 年每个活跃项目的混合月收入
    value: "10.0"
    unit: USDK per month
    source: "[BP pricing plus per-site modules] 假设在既定 $90k-$180k 年度区间内，站点模块带来温和扩张。"
  - id: A9
    name: 毛利率曲线
    value: "Y1 为 70%，Y2 为 74%，Y3 为 75%"
    unit: percent
    source: "[BP targetGrossMarginPct 75] 叠加创业公司财务启发：第 1 年的 design-partner 交付服务占比更高。"
  - id: A10
    name: 销售速度
    value: "M4 之后大致每季度新增 1 个付费项目"
    unit: customers
    source: "[BP funnelTargets] 按每季度 10-15 个 ICP meeting、20-30% meeting 转 design-partner、50%+ 转年度订阅的中位解读。"
  - id: A11
    name: Founder / CEO 完全成本薪酬
    value: "160"
    unit: USDK per year
    source: "[Startup finance heuristic: pre-seed founder cash comp, fully loaded.]"
  - id: A12
    name: 产品 / 软件工程师完全成本薪酬
    value: "170"
    unit: USDK per year
    source: "[Startup finance heuristic: seed-stage full-stack/data engineer, fully loaded.]"
  - id: A13
    name: 机器人领域与安全负责人完全成本薪酬
    value: "160"
    unit: USDK per year
    source: "[Startup finance heuristic: domain specialist hire, fully loaded.]"
  - id: A14
    name: 客户成功 / 解决方案负责人完全成本薪酬
    value: "120"
    unit: USDK per year
    source: "[Startup finance heuristic: early CS/solutions lead, fully loaded.]"
  - id: A15
    name: 销售完全成本薪酬
    value: "140"
    unit: USDK per year
    source: "[Startup finance heuristic: early enterprise AE/BD role, fully loaded.]"
  - id: A16
    name: 运营 / G&A 完全成本薪酬
    value: "110"
    unit: USDK per year
    source: "[Startup finance heuristic: lean operations role, fully loaded.]"
  - id: A17
    name: 非人力运营开销
    value: "从 Y1 Q1 的约 $9.5K/月，上升到 Y3 Q4 的约 $20.5K/月"
    unit: USDK per month
    source: "[Startup finance heuristic] 开发工具、差旅、法务、保险和行政支出会随团队规模逐步上升。"
  - id: A18
    name: 月度流失率
    value: "2.5"
    unit: percent
    source: "[Startup finance heuristic: early niche enterprise SaaS] 由于买家池狭窄、续费证据不足，因此采用保守假设。"
  - id: A19
    name: 混合 CAC
    value: "72"
    unit: USDK
    source: "[Research willingnessToPay plus BP founder-led sales motion] 面向狭窄委员会的销售意味着高触达 CAC。"
  - id: A20
    name: 融资轮规模
    value: "2.4"
    unit: USDM
    source: "[BP fundingAsk $2-3M] 模型取中位数，以支撑 design-partner、订阅转化和早期多站点验证。"
