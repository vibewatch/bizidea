slug: humanoid-safety-case-os
date: '2026-05-03'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: month
    source: '[BP date 2026-05-03] 以方案日期后的首个完整运营月为起点。'
  - id: A2
    name: 期初现金
    value: '2400'
    unit: USDK
    source: '[BP fundingAsk $2-3M] 以 pre-seed 融资区间中位数作为期初现金。'
  - id: A3
    name: 第 1 年签下的付费共创客户数
    value: '3'
    unit: customers
    source: '[BP product sixMonth and milestones] 前 12 个月拿下 2-3 个共创客户。'
  - id: A4
    name: 第 2 年第 4 季末的活跃付费项目数
    value: '7'
    unit: customers
    source: '[BP milestones 12-24 months] 在按里程碑招聘的前提下，朝 8-12 个企业项目爬坡。'
  - id: A5
    name: 第 3 年第 4 季末的活跃付费项目数
    value: '11'
    unit: customers
    source: '[BP market SOM] 第 3 年达到 8-12 个企业项目，模型取区间中上部。'
  - id: A6
    name: 第 1 年每个活跃项目的混合月收入
    value: '7.0'
    unit: USDK per month
    source: '[BP pricing $40k-$80k 共创客户合同] 按错峰签约的共创合同做平滑确认。'
  - id: A7
    name: 第 2 年每个活跃项目的混合月收入
    value: '9.0'
    unit: USDK per month
    source: '[BP pricing $90k-$180k annual programs] 基准情形取方案区间偏下到中部。'
  - id: A8
    name: 第 3 年每个活跃项目的混合月收入
    value: '10.0'
    unit: USDK per month
    source: '[BP pricing plus per-site modules] 假设在 $90k-$180k 年度区间内，随模块扩张实现温和提升。'
  - id: A9
    name: 毛利率曲线
    value: 'Y1 为 70%，Y2 为 74%，Y3 为 75%'
    unit: percent
    source: '[BP targetGrossMarginPct 75] 再叠加创业公司财务常识：第 1 年共创交付更重服务，毛利更低。'
  - id: A10
    name: 销售速度
    value: M4 之后大约每个季度新增 1 个付费项目
    unit: customers
    source: '[BP funnelTargets] 取每季度 10-15 个 ICP 会议、20-30% 会议到共创客户转化、50%+ 转订阅的中位理解。'
  - id: A11
    name: 创始人 / CEO 全成本薪酬
    value: '160'
    unit: USDK per year
    source: '[Startup finance heuristic: pre-seed founder cash comp, fully loaded.]'
  - id: A12
    name: 产品 / 软件工程师全成本薪酬
    value: '170'
    unit: USDK per year
    source: '[Startup finance heuristic: seed-stage full-stack/data engineer, fully loaded.]'
  - id: A13
    name: 机器人领域与安全负责人全成本薪酬
    value: '160'
    unit: USDK per year
    source: '[Startup finance heuristic: domain specialist hire, fully loaded.]'
  - id: A14
    name: 客户成功 / 解决方案负责人全成本薪酬
    value: '120'
    unit: USDK per year
    source: '[Startup finance heuristic: early CS/solutions lead, fully loaded.]'
  - id: A15
    name: 销售全成本薪酬
    value: '140'
    unit: USDK per year
    source: '[Startup finance heuristic: early enterprise AE/BD role, fully loaded.]'
  - id: A16
    name: 运营 / G&A 全成本薪酬
    value: '110'
    unit: USDK per year
    source: '[Startup finance heuristic: lean operations role, fully loaded.]'
  - id: A17
    name: 非人力运营开销
    value: 从 Y1 Q1 的约 $9.5K/月，逐步升到 Y3 Q4 的约 $20.5K/月
    unit: USDK per month
    source: '[Startup finance heuristic] 随团队规模上升，开发工具、差旅、法务、保险和行政费用同步抬升。'
  - id: A18
    name: 月度流失率
    value: '2.5'
    unit: percent
    source: '[Startup finance heuristic: early niche enterprise SaaS] 因买方池子窄、续费证据有限，所以取偏保守值。'
  - id: A19
    name: 混合 CAC
    value: '72'
    unit: USDK
    source: '[Research willingnessToPay plus BP founder-led sales motion] 委员会式窄客群销售，天然对应高触达 CAC。'
  - id: A20
    name: 融资轮规模
    value: '2.4'
    unit: USDM
    source: '[BP fundingAsk $2-3M] 模型取中位数，以覆盖共创客户、订阅转化和早期多站点验证。'
