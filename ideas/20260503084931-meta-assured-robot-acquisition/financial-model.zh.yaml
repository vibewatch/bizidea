scenarios:
  downside:
    description: 销售周期慢一个季度、多站点扩张也偏弱，到 Q4Y3 时公司只能做到 8 个项目。
    y3RevenueK: 780.0
    y3EbitdaK: -820.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - Y2 和 Y3 的新客获取整体往后拖一个季度。
      - Y3 的混合 ARPU 停在每月 $9K，而不是 $10K。
      - 因为人工复审仍然很重，毛利率只能到 72%。
  base:
    description: 招聘继续按里程碑推进，再叠加稳定的季度新增客户，到 Q4Y3 时公司有 11 个活跃项目，Y3 收入 $1.08M。
    y3RevenueK: 1080.0
    y3EbitdaK: -688.2
    cashLowPointK: 395.4
    keyAssumptionChanges:
      - Y1 能签下 3 个付费共创客户。
      - 公司在 Y2 末做到 7 个活跃项目，并在 Q4Y3 达到 11 个。
      - 随站点模块扩张，混合 ARPU 从 Y1 的每月 $7K 升到 Y3 的每月 $10K。
  upside:
    description: 转订阅更快、模块渗透更强，到 Q4Y3 时公司能做到 12 个项目，单项目支出也更高。
    y3RevenueK: 1320.0
    y3EbitdaK: -520.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - 共创客户转订阅的表现高于基准情形 50% 的目标。
      - Y3 的混合 ARPU 随更多多站点模块提升到每月 $11K。
      - 随导入标准化，毛利率提升到 77%。
sensitivity:
  - variable: ARPU
    downsideCase: Y3 每个活跃项目的混合月收入只有 $9K。
    baseCase: Y3 每个活跃项目的混合月收入为 $10K。
    upsideCase: Y3 每个活跃项目的混合月收入达到 $11K。
    y3RevenueImpactK: -108.0
    cashImpactK: -81.0
  - variable: CAC
    downsideCase: 混合 CAC 升到 $90K，因为所有交易都还得靠创始人重度推动，且缺少口碑飞轮。
    baseCase: 混合 CAC 为 $72K。
    upsideCase: 一旦有口碑和 OEM 转介，混合 CAC 降到 $55K。
    y3RevenueImpactK: -54.0
    cashImpactK: -140.0
  - variable: churn
    downsideCase: 如果买方把产品当成一次性咨询，月流失率会上到 4.0%。
    baseCase: 月流失率为 2.5%。
    upsideCase: 如果治理工作流够黏，月流失率可降到 1.5%。
    y3RevenueImpactK: -85.0
    cashImpactK: -110.0
  - variable: sales cycle
    downsideCase: 保险、法务和 OEM 相关方拖慢审批，成交周期拉长到两个季度。
    baseCase: 成交周期大致为一个季度。
    upsideCase: 对转介绍或高紧迫项目，成交周期可缩短到不足一个季度。
    y3RevenueImpactK: -135.0
    cashImpactK: -180.0
  - variable: gross margin
    downsideCase: 因为人工复审和实施仍偏定制化，毛利率只有 72%。
    baseCase: 毛利率为 75%。
    upsideCase: 随资料包模板和接入自动化成熟，毛利率可升至 78%。
    y3RevenueImpactK: 0.0
    cashImpactK: -32.0
  - variable: hiring pace
    downsideCase: 在收入尚未被验证前，销售和工程招聘被提前拉前。
    baseCase: 招聘到 Y3 都保持里程碑驱动。
    upsideCase: 其中 1 个工程岗位推迟到 Q4Y3 之后再招。
    y3RevenueImpactK: -20.0
    cashImpactK: -170.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Meetings[Qualified ICP meetings] --> DesignPartners[付费共创客户]
      DesignPartners --> Subscriptions[Annual subscriptions]
      Subscriptions --> Modules[Per-site rollout modules]
      Modules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，收入来自 Y1 的 3 个付费共创客户，逐步转成 Q4Y3 的 11 个活跃企业项目，对应约 $120K 的年度 ARPU。
  - checkName: 必须跑对的事
    finding: 公司必须证明客户会续成持续性治理软件，而不是一次性复审服务，否则 churn 和 CAC 都会迅速恶化。
  - checkName: 模型失效的条件
    finding: 如果销售周期慢一个季度、模块渗透也偏弱，即便拿到 $2.4M pre-seed， downside 情形的现金低点仍会跌破 0。
  - checkName: 下一轮融资凭证
    finding: 只有在 Y2 末做到 7 个活跃项目、1 个在线 OEM 集成，以及可重复的订阅转化证据，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 增长 100.0% + EBITDA 利润率 -63.7% = 36.3%。
  burnMultiple: 'Y3 burn multiple 为 1.3x = $688.2K burn / $540.0K net new revenue。'
  revenuePerFte: 以平均 8.5 FTE 计算，Y3 每名员工对应约 $127K 收入，低于成熟 SaaS 常见的 $200-400K，因为交付仍然高度高触达。
  flags:
    - 模型到 Y3 仍然 EBITDA 为负，因此下一轮融资成败取决于公司能否在现金吃紧前，先证明续费与多站点扩张。
    - 每名员工收入偏低，不是因为价格太弱，而是 Y1 和 Y2 仍包含大量人工证据复审和客户定制导入。
    - 最大风险仍是市场时机：如果活跃 3PL 人形机器人试点比预期更少，公司就必须更早扩到相邻的仓储部署保障。
