scenarios:
  downside:
    description: 销售周期慢一个季度，且多站点扩展更弱，使公司在 Q4Y3 仅达到 8 个项目。
    y3RevenueK: 780.0
    y3EbitdaK: -820.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
    - Y2 和 Y3 的新客户增加均推迟一个季度。
    - Y3 综合 ARPU 保持在每月 $9K，而不是 $10K。
    - 由于人工评审仍然较重，毛利率仅达到 72%。
  base:
    description: 按里程碑控制招聘，并保持稳定的季度客户增长，可在 Y3 实现 11 个活跃项目和 $1.08M 收入。
    y3RevenueK: 1080.0
    y3EbitdaK: -688.2
    cashLowPointK: 395.4
    keyAssumptionChanges:
    - Y1 签下 3 个付费设计合作伙伴。
    - 公司在 Y2 末达到 7 个活跃项目，并在 Q4Y3 达到 11 个。
    - 随着站点模块扩展，综合 ARPU 从 Y1 每月 $7K 提升到 Y3 每月 $10K。
  upside:
    description: 更快的转化和更强的模块渗透，使公司在 Q4Y3 达到 12 个项目，并提升单项目支出。
    y3RevenueK: 1320.0
    y3EbitdaK: -520.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 设计合作伙伴转订阅的转化率高于 50% 的基准目标。
    - 随着更多多站点模块上线，Y3 综合 ARPU 达到每月 $11K。
    - 随着导入变得更加标准化，毛利率提升到 77%。
sensitivity:
- variable: ARPU
  downsideCase: Y3 每个活跃项目的综合月收入为 $9K。
  baseCase: Y3 每个活跃项目的综合月收入为 $10K。
  upsideCase: Y3 每个活跃项目的综合月收入为 $11K。
  y3RevenueImpactK: -108.0
  cashImpactK: -81.0
- variable: CAC
  downsideCase: 综合 CAC 为 $90K，因为每笔交易都高度依赖创始人且缺少参考案例。
  baseCase: 综合 CAC 为 $72K。
  upsideCase: 当参考案例和 OEM 转介改善准入后，综合 CAC 降至 $55K。
  y3RevenueImpactK: -54.0
  cashImpactK: -140.0
- variable: churn
  downsideCase: 若买方把产品视为阶段性咨询，月流失率为 4.0%。
  baseCase: 月流失率为 2.5%。
  upsideCase: 在粘性治理工作流下，月流失率为 1.5%。
  y3RevenueImpactK: -85.0
  cashImpactK: -110.0
- variable: sales cycle
  downsideCase: 由于保险方、法务和 OEM 相关方拖慢审批，成交周期为两个季度。
  baseCase: 成交周期约为一个季度。
  upsideCase: 对于转介绍或紧急扩展决策，成交周期短于一个季度。
  y3RevenueImpactK: -135.0
  cashImpactK: -180.0
- variable: gross margin
  downsideCase: 由于人工评审和实施仍高度定制化，毛利率为 72%。
  baseCase: 毛利率为 75%。
  upsideCase: 在可重复审批包模板和接入自动化落地后，毛利率为 78%。
  y3RevenueImpactK: 0.0
  cashImpactK: -32.0
- variable: hiring pace
  downsideCase: 在收入验证前提前招聘销售和工程人员。
  baseCase: 招聘在 Y3 期间继续按里程碑推进。
  upsideCase: 一个工程岗位推迟到 Q4Y3 之后再招聘。
  y3RevenueImpactK: -20.0
  cashImpactK: -170.0
modelDiagram:
  title: 单位经济流程
  mermaid: "flowchart LR\n  Meetings[合格 ICP 会议] --> DesignPartners[付费设计合作伙伴]\n  DesignPartners --> Subscriptions[年度订阅]\n  Subscriptions --> Modules[按站点扩展模块]\n  Modules --> Revenue[收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金跑道]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自 Y1 的 3 个付费设计合作伙伴，这些伙伴到 Q4Y3 逐步转化为 11 个活跃企业项目，年度 ARPU 约为 $120K。
- checkName: 必须成立的前提
  finding: 公司必须证明买方会续约为经常性的治理软件，而不是一次性评审服务，否则流失率和 CAC 都会迅速恶化。
- checkName: 模型失效条件
  finding: 若销售周期延迟一个季度且模块渗透更低，即便有 $2.4M 的 pre-seed 资金，下行情景的现金低点也会跌破零。
- checkName: 下一轮融资证明点
  finding: 如果团队在 Y2 末做到 7 个活跃项目、1 个真实 OEM 集成，并拿出可重复的订阅转化证据，那么下一轮融资才具备正当性。
sanityChecks:
  ruleOf40: Y3 增长率 100.0% + EBITDA 利润率 -63.7% = 36.3%。
  burnMultiple: Y3 burn multiple 为 1.3x = $688.2K 烧钱 / $540.0K 净新增收入。
  revenuePerFte: Y3 在平均 8.5 FTE 下的人均收入为 $127K，低于成熟 SaaS 的 $200-400K 基准，因为交付仍然高度依赖人工。
  flags:
  - 模型到 Y3 仍保持 EBITDA 为负，因此下一轮融资取决于在现金趋紧前证明续约和多站点扩展。
  - 由于第 1 年和第 2 年的产品仍包含人工证据评审和按客户定制导入，软件的人均收入偏低。
  - 市场时机仍是最大风险：如果活跃的 3PL 人形机器人试点少于预期，公司必须扩展到相邻的仓库部署保障场景。
