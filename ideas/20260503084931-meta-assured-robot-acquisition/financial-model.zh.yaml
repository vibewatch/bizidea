scenarios:
  downside:
    description: "销售周期再慢一个季度，且多站点扩张更弱，会让公司在 Q4Y3 仅达到 8 个项目。"
    y3RevenueK: 780.0
    y3EbitdaK: -820.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - "Y2 和 Y3 的新增 logo 各自延后一个季度。"
      - "Y3 的混合 ARPU 停留在每月 $9K，而不是 $10K。"
      - "由于人工评审仍然偏重，毛利率最高只能到 72%。"
  base:
    description: "按里程碑控制招聘，并保持稳定的季度新增客户，到 Q4Y3 达到 11 个活跃项目、Y3 收入 $1.08M。"
    y3RevenueK: 1080.0
    y3EbitdaK: -688.2
    cashLowPointK: 395.4
    keyAssumptionChanges:
      - "Y1 签下 3 个付费 design partner。"
      - "公司在 Y2 结束时有 7 个活跃项目，并在 Q4Y3 达到 11 个。"
      - "随着站点模块扩张，混合 ARPU 从 Y1 的每月 $7K 提升到 Y3 的每月 $10K。"
  upside:
    description: "转化更快、模块渗透更强，到 Q4Y3 可把公司推到 12 个项目和更高的单项目支出。"
    y3RevenueK: 1320.0
    y3EbitdaK: -520.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "design-partner 向订阅的转化率高于基准情形 50% 的目标。"
      - "Y3 的混合 ARPU 随着更多多站点模块提升到每月 $11K。"
      - "随着 onboarding 标准化，毛利率改善到 77%。"
sensitivity:
  - variable: ARPU
    downsideCase: "$9K monthly blended revenue per active program in Y3."
    baseCase: "$10K monthly blended revenue per active program in Y3."
    upsideCase: "$11K monthly blended revenue per active program in Y3."
    y3RevenueImpactK: -108.0
    cashImpactK: -81.0
  - variable: CAC
    downsideCase: "$90K blended CAC because every deal stays founder-heavy and reference-light."
    baseCase: "$72K blended CAC."
    upsideCase: "$55K blended CAC once references and OEM referrals improve access."
    y3RevenueImpactK: -54.0
    cashImpactK: -140.0
  - variable: churn
    downsideCase: "4.0% monthly churn if buyers treat the product as episodic consulting."
    baseCase: "2.5% monthly churn."
    upsideCase: "1.5% monthly churn with sticky governance workflows."
    y3RevenueImpactK: -85.0
    cashImpactK: -110.0
  - variable: sales cycle
    downsideCase: "Two-quarter close cycle because insurer, legal, and OEM stakeholders slow approval."
    baseCase: "Roughly one-quarter close cycle."
    upsideCase: "Sub-quarter close cycle for referred or urgent expansion decisions."
    y3RevenueImpactK: -135.0
    cashImpactK: -180.0
  - variable: gross margin
    downsideCase: "72% gross margin because human review and implementation stay custom."
    baseCase: "75% gross margin."
    upsideCase: "78% gross margin after repeatable packet templates and ingest automation."
    y3RevenueImpactK: 0.0
    cashImpactK: -32.0
  - variable: hiring pace
    downsideCase: "Sales and engineering hires are pulled forward before revenue proof."
    baseCase: "Hiring remains milestone-gated through Y3."
    upsideCase: "One engineering hire slips until after Q4Y3."
    y3RevenueImpactK: -20.0
    cashImpactK: -170.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Meetings[合格 ICP 会议] --> DesignPartners[付费 design partner]
      DesignPartners --> Subscriptions[年度订阅]
      Subscriptions --> Modules[按站点 rollout 模块]
      Modules --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: "基准情形的收入来自 Y1 的 3 个付费 design partner，并在 Q4Y3 转成 11 个活跃企业项目，每个项目年化 ARPU 约 $120K。"
  - checkName: 必须成立的前提
    finding: "公司必须证明买家会续费为 recurring governance software，而不是一次性评审服务，否则 churn 和 CAC 都会迅速恶化。"
  - checkName: 模型失效条件
    finding: "若销售周期晚一个季度、同时模块渗透更低，即使拿到 $2.4M pre-seed，downside 情形的现金低点仍会跌到 0 以下。"
  - checkName: 下一轮融资证明点
    finding: "如果团队能在 Y2 结束时拥有 7 个活跃项目、1 个已上线 OEM 集成，以及可重复的订阅转化证据，那么下一轮融资才站得住。"
sanityChecks:
  ruleOf40: "Y3 growth 100.0% + EBITDA margin -63.7% = 36.3%."
  burnMultiple: "Y3 burn multiple 1.3x = $688.2K burn / $540.0K net new revenue."
  revenuePerFte: "$127K Y3 on average 8.5 FTE, below the $200-400K mature SaaS benchmark because delivery is still high touch."
  flags:
    - "模型到 Y3 仍然 EBITDA 为负，因此下一轮融资能否成立，取决于公司能否在现金吃紧前证明续费与多站点扩张。"
    - "软件的人均收入偏低，因为 Y1 和 Y2 的产品仍包含大量人工证据审阅和客户定制 onboarding。"
    - "市场时机仍是最大风险：如果活跃的 3PL 人形机器人试点少于预期，公司就必须拓宽到相邻的仓储部署保障。"