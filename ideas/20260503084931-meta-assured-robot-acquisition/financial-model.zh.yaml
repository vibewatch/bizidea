slug: humanoid-safety-case-os
date: '2026-05-03'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-03] 计划日期之后的第一个完整运营月。'
- id: A2
  name: 期初现金
  value: '2400'
  unit: USDK
  source: '[BP fundingAsk $2-3M] 以 pre-seed 轮中点作为期初现金建模。'
- id: A3
  name: 第 1 年签约的付费设计合作伙伴
  value: '3'
  unit: customers
  source: '[BP product sixMonth and milestones] 前 12 个月签下 2-3 个设计合作伙伴。'
- id: A4
  name: Y2 第 4 季度末的付费活跃项目数
  value: '7'
  unit: customers
  source: '[BP milestones 12-24 months] 在按里程碑控制招聘的前提下，逐步提升至 8-12 个企业项目。'
- id: A5
  name: Y3 第 4 季度末的付费活跃项目数
  value: '11'
  unit: customers
  source: '[BP market SOM] 第 3 年达到 8-12 个企业项目；模型取该区间的偏上中值。'
- id: A6
  name: 第 1 年每个活跃项目的综合收入
  value: '7.0'
  unit: USDK per month
  source: '[BP pricing $40k-$80k design partner] 对错峰签约的设计合作伙伴合同采用综合按期确认启发式。'
- id: A7
  name: 第 2 年每个活跃项目的综合收入
  value: '9.0'
  unit: USDK per month
  source: '[BP pricing $90k-$180k annual programs] 基准情景假设早期订阅位于计划区间的偏低中段。'
- id: A8
  name: 第 3 年每个活跃项目的综合收入
  value: '10.0'
  unit: USDK per month
  source: '[BP pricing plus per-site modules] 假设在 $90k-$180k 年度区间内实现适度模块扩张。'
- id: A9
  name: 毛利率曲线
  value: Y1 为 70%，Y2 为 74%，Y3 为 75%
  unit: percent
  source: '[BP targetGrossMarginPct 75] 再叠加创业财务启发式：第 1 年设计合作伙伴交付更偏服务化。'
- id: A10
  name: 销售速度
  value: M4 之后大致每个季度新增 1 个付费项目
  unit: customers
  source: '[BP funnelTargets] 对“每季度 10-15 次 ICP 会议、20-30% 会议转设计合作伙伴、50%+ 转年度订阅”的中点解读。'
- id: A11
  name: 创始人 / CEO 全包成本薪酬
  value: '160'
  unit: USDK per year
  source: '[创业财务启发式：pre-seed 阶段创始人现金薪酬，按全包成本计。]'
- id: A12
  name: 产品 / 软件工程师全包成本薪酬
  value: '170'
  unit: USDK per year
  source: '[创业财务启发式：种子阶段全栈/数据工程师，按全包成本计。]'
- id: A13
  name: 机器人领域与安全负责人全包成本薪酬
  value: '160'
  unit: USDK per year
  source: '[创业财务启发式：领域专家招聘，按全包成本计。]'
- id: A14
  name: 客户成功 / 解决方案全包成本薪酬
  value: '120'
  unit: USDK per year
  source: '[创业财务启发式：早期客户成功/解决方案负责人，按全包成本计。]'
- id: A15
  name: 销售全包成本薪酬
  value: '140'
  unit: USDK per year
  source: '[创业财务启发式：早期企业 AE/BD 角色，按全包成本计。]'
- id: A16
  name: 运营 / G&A 全包成本薪酬
  value: '110'
  unit: USDK per year
  source: '[创业财务启发式：精简运营角色，按全包成本计。]'
- id: A17
  name: 非薪酬运营开支
  value: 从 Q1Y1 每月约 ~$9.5K 上升到 Q4Y3 每月约 ~$20.5K
  unit: USDK per month
  source: '[创业财务启发式] 开发工具、差旅、法务、保险和行政支出会随团队规模逐步增加。'
- id: A18
  name: 月流失率
  value: '2.5'
  unit: percent
  source: '[创业财务启发式：早期细分企业 SaaS] 由于买方群体较薄、续约验证有限，因此取保守值。'
- id: A19
  name: 综合 CAC
  value: '72'
  unit: USDK
  source: '[Research willingnessToPay plus BP founder-led sales motion] 面向狭窄委员会的销售意味着高接触式 CAC。'
- id: A20
  name: 融资轮规模
  value: '2.4'
  unit: USDM
  source: '[BP fundingAsk $2-3M] 模型采用中点，以支撑设计合作伙伴、订阅转化和早期多站点验证。'
