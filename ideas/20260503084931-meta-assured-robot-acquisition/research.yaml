openQuestions:
- How many U.S. 3PLs actually have paid humanoid or comparable mobile-manipulation pilots active in 2026?
- Will buyers fund a recurring software budget for deployment assurance, or treat it as episodic consulting bundled into pilot reviews?
- What minimum dataset is credible enough for ops, safety, and insurer stakeholders when OEM telemetry is incomplete?
- Can the startup remain neutral while partnering closely enough with OEMs to access the data that make readiness scores defensible?
