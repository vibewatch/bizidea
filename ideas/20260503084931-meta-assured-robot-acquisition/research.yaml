    value: $52.5M
    rationale: 'Bottom-up beachhead TAM: 6,997 U.S. warehousing establishments with 20+ employees [2] × estimated 25% 3PL-relevant share × estimated $30k annual assurance software spend per active site = about $52.5M.'
    isEstimate: true
