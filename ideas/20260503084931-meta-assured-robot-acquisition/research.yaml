  validationPlan:
  - priority: high
    question: Do 3PL operators view rollout approval as a painful enough workflow to buy software, or only as an occasional consulting task?
    evidenceToGather: 10-15 interviews with heads of automation/EHS at multi-site 3PLs currently piloting robots; quantify time to expansion decision, stakeholders involved, and spend on external safety/process review.
  - priority: high
    question: What minimum data exhaust is required to generate a credible readiness score if OEM logs are incomplete?
    evidenceToGather: Design-partner pilot using operator-owned video, incident tickets, SOP updates, and intervention counts; compare usefulness before and after OEM telemetry integration.
  - priority: medium
    question: Will insurers, brokers, or consultants endorse a vendor-neutral deployment packet as decision support?
    evidenceToGather: Structured feedback from 3-5 warehouse risk/insurance stakeholders on draft packet format, disclaimers, and required fields.
  - priority: medium
    question: Can the startup land via OEM/channel referrals without losing neutrality?
    evidenceToGather: Pilot co-sell experiments with one OEM and one safety/integration partner; measure conversion speed, data access, and conflict over ownership of the approval narrative.
