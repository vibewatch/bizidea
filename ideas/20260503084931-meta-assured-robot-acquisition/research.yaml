  sam:
    value: $7.9M
    rationale: SAM applies an additional 15% near-term pilot-readiness filter to the 3PL-relevant site base, reflecting that public humanoid deployments are still concentrated in a small set of repetitive logistics workflows [6][8][9][13]; 1749 × 15% × $30k ≈ $7.9M.
    isEstimate: true
    sourceRefs:
    - 2
    - 6
    - 8
    - 9
    - 13
  som:
    value: $900,000
    rationale: Illustrative year-3 SOM assumes 30 live sites (roughly 8-12 enterprise programs) at $30k per active site equivalent, which is aggressive enough to require repeatable expansion wins but conservative relative to the total modeled SAM.
    isEstimate: true
    sourceRefs:
    - 6
    - 13
    - 17
