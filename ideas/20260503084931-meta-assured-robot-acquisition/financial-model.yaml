scenarios:
  downside:
    description: "One-quarter slower sales cycle and weaker multi-site expansion keep the company at 8 programs by Q4Y3."
    y3RevenueK: 780.0
    y3EbitdaK: -820.0
    cashLowPointK: -120.0
    keyAssumptionChanges:
      - "Y2 and Y3 new-logo adds slip by one quarter."
      - "Y3 blended ARPU stays at $9K per month instead of $10K."
      - "Gross margin reaches only 72% because manual review remains heavy."
  base:
    description: "Milestone-gated hiring and steady quarterly customer adds produce 11 active programs and $1.08M revenue in Y3."
    y3RevenueK: 1080.0
    y3EbitdaK: -688.2
    cashLowPointK: 395.4
    keyAssumptionChanges:
      - "Three paid design partners sign in Y1."
      - "The company exits Y2 with 7 active programs and reaches 11 by Q4Y3."
      - "Blended ARPU rises from $7K monthly in Y1 to $10K monthly in Y3 as site modules expand."
  upside:
    description: "Faster conversion and stronger module uptake lift the company to 12 programs and higher per-program spend by Q4Y3."
    y3RevenueK: 1320.0
    y3EbitdaK: -520.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "Design-partner to subscription conversion runs above the 50% base target."
      - "Y3 blended ARPU reaches $11K per month with more multi-site modules."
      - "Gross margin improves to 77% as onboarding becomes more standardized."
sensitivity:
  - variable: ARPU
    downsideCase: "$9K monthly blended revenue per active program in Y3."
    baseCase: "$10K monthly blended revenue per active program in Y3."
    upsideCase: "$11K monthly blended revenue per active program in Y3."
    y3RevenueImpactK: -108.0
    cashImpactK: -81.0
  - variable: CAC
    downsideCase: "$90K blended CAC because every deal stays founder-heavy and reference-light."
    baseCase: "$72K blended CAC."
    upsideCase: "$55K blended CAC once references and OEM referrals improve access."
    y3RevenueImpactK: -54.0
    cashImpactK: -140.0
  - variable: churn
    downsideCase: "4.0% monthly churn if buyers treat the product as episodic consulting."
    baseCase: "2.5% monthly churn."
    upsideCase: "1.5% monthly churn with sticky governance workflows."
    y3RevenueImpactK: -85.0
    cashImpactK: -110.0
  - variable: sales cycle
    downsideCase: "Two-quarter close cycle because insurer, legal, and OEM stakeholders slow approval."
    baseCase: "Roughly one-quarter close cycle."
    upsideCase: "Sub-quarter close cycle for referred or urgent expansion decisions."
    y3RevenueImpactK: -135.0
    cashImpactK: -180.0
  - variable: gross margin
    downsideCase: "72% gross margin because human review and implementation stay custom."
    baseCase: "75% gross margin."
    upsideCase: "78% gross margin after repeatable packet templates and ingest automation."
    y3RevenueImpactK: 0.0
    cashImpactK: -32.0
  - variable: hiring pace
    downsideCase: "Sales and engineering hires are pulled forward before revenue proof."
    baseCase: "Hiring remains milestone-gated through Y3."
    upsideCase: "One engineering hire slips until after Q4Y3."
    y3RevenueImpactK: -20.0
    cashImpactK: -170.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Meetings[Qualified ICP meetings] --> DesignPartners[Paid design partners]
      DesignPartners --> Subscriptions[Annual subscriptions]
      Subscriptions --> Modules[Per-site rollout modules]
      Modules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue comes from 3 paid design partners in Y1 converting into 11 active enterprise programs by Q4Y3 at roughly $120K annual ARPU."
  - checkName: Must go right
    finding: "The company must prove buyers renew into recurring governance software rather than one-off review services, or churn and CAC both worsen quickly."
  - checkName: Model breaks if
    finding: "A one-quarter slip in sales cycle plus lower module uptake pushes the downside case cash low point below zero despite a $2.4M pre-seed."
  - checkName: Next-round proof
    finding: "The next financing is justified if the team exits Y2 with 7 active programs, one live OEM integration, and repeatable subscription conversion evidence."
sanityChecks:
  ruleOf40: "Y3 growth 100.0% + EBITDA margin -63.7% = 36.3%."
  burnMultiple: "Y3 burn multiple 1.3x = $688.2K burn / $540.0K net new revenue."
  revenuePerFte: "$127K Y3 on average 8.5 FTE, below the $200-400K mature SaaS benchmark because delivery is still high touch."
  flags:
    - "The model stays EBITDA-negative through Y3, so the next round depends on proving renewal and multi-site expansion before cash gets tight."
    - "Revenue per FTE is low for software because the Year 1 and Year 2 product still includes manual evidence review and customer-specific onboarding."
    - "Market timing remains the biggest risk: if active 3PL humanoid pilots are fewer than expected, the company must broaden into adjacent warehouse deployment assurance."
