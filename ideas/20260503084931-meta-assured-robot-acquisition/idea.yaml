topRisks:
  - name: Category timing
    description: Humanoid deployments may still be too early for enough 3PLs to buy dedicated software today.
    mitigation: Start with paid design partners already running pilots and support adjacent mobile-manipulation systems if humanoids ramp slower than expected.
  - name: Data access
    description: Robot vendors may resist exposing logs and incident data needed for a neutral safety case.
    mitigation: Ingest from operator-owned video, ticketing, and SOP systems first, then use buyer pressure to negotiate deeper OEM integrations.
  - name: Trust liability
    description: If customers treat the product as a formal safety certification, a failure event could damage credibility or create legal exposure.
    mitigation: Position the system as decision-support with auditable evidence trails, and partner with insurers and safety experts for formal signoff layers.
