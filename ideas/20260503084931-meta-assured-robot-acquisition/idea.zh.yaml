topRisks:
  - name: 品类时机
    description: 人形机器人部署可能仍然太早，今天真正会为专用软件买单的 3PL 数量还不够。
    mitigation: 从已经在跑试点的付费共创客户切入；如果 humanoid 放量慢于预期，就同时支持相邻的移动操作系统。
  - name: 数据接入
    description: 机器人厂商可能不愿开放构建中立安全案例所需的日志和事故数据。
    mitigation: 先从运营方自有的视频、工单和 SOP 系统接入，再借助买方压力推进更深的 OEM 集成。
  - name: 信任与责任风险
    description: 如果客户把产品当成正式安全认证，一次失败事件就可能打击信誉，甚至带来法律风险。
    mitigation: 把系统定位为带可审计证据链的 decision-support，并与保险方和安全专家合作补上正式签字层。