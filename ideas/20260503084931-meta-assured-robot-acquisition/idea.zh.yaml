jobsToBeDone:
  - job: 当人形机器人试点在真实仓面跑满第一个月后，帮 3PL 自动化负责人判断该扩、该停，还是该先补控制项，这样他们才能在不裸奔承担安全风险的前提下放大劳动力自动化。
    currentAlternative: 分散在幻灯片、供应商仪表盘和 EHS 清单里的人工试点评审
    successMetric: 从试点复盘到扩点决策所花的天数，以及在未发生重大事故的前提下获批的站点数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这一簇里出现了明确的战略收购，而且被定义为首次大举进入人形机器人。
  painIntensity:
    score: 4
    rationale: 企业 rollout 延迟本身就很贵，而且高度敏感于安全，哪怕源头材料没有直接把代价量化。
  wedgeClarity:
    score: 5
    rationale: 首个工作流是 3PL 人形机器人试点的审批流程，而不是一个泛化过度的机器人平台。
  defensibility:
    score: 4
    rationale: 跨供应商部署证据和 rollout 基准会不断复利，最终沉淀成很难复制的数据资产。
  ventureScale:
    score: 4
    rationale: 先从仓储切入，后面还能延展到更广义的 physical-AI 保障和保险基础设施。
topRisks:
  - name: 赛道时机
    description: 人形机器人部署也许仍然太早，今天愿意为专门软件掏钱的 3PL 还不够多。
    mitigation: 先从已经在跑试点的付费共创客户做起；如果人形机器人爬坡慢，就同时支持相邻的移动操作系统。
  - name: 数据接入
    description: 机器人供应商可能不愿开放中立安全论证所需的日志和事故数据。
    mitigation: 先从运营方自己掌握的视频、工单和 SOP 系统吃数据，再借采购方压力去谈更深的 OEM 集成。
  - name: 信任与责任
    description: 如果客户把产品当成正式安全认证来用，一次失败事件就可能同时打击公信力并引出法律责任。
    mitigation: 把系统明确定位成带审计轨迹的决策支持层，并与保险方和安全专家合作承接正式签批。