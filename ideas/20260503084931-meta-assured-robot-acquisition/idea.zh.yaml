problem: >-
  正在评估人形机器人的 3PL 仓储运营商，没法有把握地判断一个试点到底什么时候安全到可以从单仓扩到多仓。眼下他们拿到的往往只是供应商仪表盘、零散事故记录和人工风险审查，却没有一套中立系统，能把机器人表现沉淀成按任务拆分的安全论证，让运营负责人、保险方和站点经理都愿意签字。随着大厂入场推高试点密度，真正卡住收入级规模部署的，不再是机器人会不会动，而是审批这一关过不过得去。
targetUser:
  primary: 在美国 3PL 里负责运营创新的团队，正在仓内为料箱搬运、托盘侧处理或拖车卸货等流程跑第一批人形机器人试点。
  secondary: 需要在真实仓面批准新自动化上线的站点安全经理和风险团队。
  buyer: 多站点 3PL 的运营副总裁或自动化负责人。
startupThesis:
  nonObviousInsight: Meta 这一步说明，难点已经从“证明人形机器人能完成任务”转到“能不能一遍又一遍、声音足够响亮地证明某个具体部署已经安全到可以在企业里铺开”。真正值钱的控制点不在机器人“大脑”，而在那套把杂乱试点证据翻成扩点审批结论的记录系统。
  beachhead: 在 5-50 个仓之间运营、刚刚在 1-2 个仓启动首个人形机器人试点的美国 3PL；它们在继续扩到更多站点前，需要一套可重复的放行/暂停流程。
  wedge: 一套与供应商无关的安全论证 OS，吃进机器人日志、视频片段、操作员介入记录和事故报告，产出任务级就绪度评分、必补控制项和站点扩张资料包。
  whyNowCatalyst: Meta 的收购是个非常具体的信号——人形机器人部署会加速，于是企业审批和风险签批不再是以后再说的加分项，而成了当下必须打通的卡口流程。
  ventureScalePath: 先从仓储人形机器人的部署审批切入，再扩到工厂、零售后仓等场景里的跨供应商部署保障，最终进入保险公司与经纪人给 physical-AI 运营定价和承保的工作流。
solution: >-
  产品先从不同机器人供应商的试点运行里收集证据，再把这些证据映射到结构化任务模型里，比如举升、搬运、交接和故障恢复。系统会持续生成一份“活的”安全论证，里面包含失效模式、所需人工监督、SOP 更新，以及按站点拆开的 rollout 检查清单，方便运营和安全团队一起审。客户不用再照单全收供应商说法，而是能看到每个流程、每个仓的中立就绪度分数。时间一长，公司还能积累出业内最完整的跨部署基准数据：到底什么条件会让人形机器人试点卡住，什么条件会让它顺利放量。这套数据会变成对保险方、企业买家和机器人 OEM 合作都很关键的护城河。
goToMarketSeed:
  firstCustomer: 一家全国性 3PL，已经在高流动率仓储流程里跑了一个付费人形机器人试点，并且高层要求它在一个季度内决定是否扩到另外 3-5 个站点。
  buyingTrigger: 试点复盘会或扩点评审会——通常是在首次现场事故、人工介入或保险方提问冒出来之后。
  currentAlternative: 电子表格、供应商自带仪表盘、人工 EHS 审查，以及“再等等，等大家心里更踏实一点再上线”的老办法。
  switchingReason: 这个切口能把真实试点证据打包成更快、也更中立的审批材料，让运营商更早做出扩点决定，同时把感知到的安全风险和运营风险压下来。
  pricingHypothesis: 以每个活跃机器人项目收年平台费，再按站点 rollout 模块收费；定价锚点不是软件 seat，而是省下的试点拖延成本和外部安全咨询费用。
whyNow:
  - point: Meta 下场做人形机器人 AI，会把更多供应商和企业试点一起卷进市场，也就更需要独立部署审批，而不是继续依赖供应商自报成绩。
    signalRefs: [超大平台开始下场做人形机器人]
    sourceRefs: [1]
  - point: 一家年轻具身 AI 公司这么快就被收购，说明赛道变化速度已经很高，采购方必须现在就把运营基础设施补上，不能等供应商格局再次洗牌。
    signalRefs: [具身 AI 正在变成并购级资产]
    sourceRefs: [1]
  - point: 既然资本早已流向具身 AI，接下来会有更多创业公司争夺企业试点，于是跨供应商对比和 rollout 治理就突然有了价值。
    signalRefs: [并购前，资本已经先为这层技术栈背书]
    sourceRefs: [1]
  - point: 竞争前线正在从模型转向物理部署，站点级可靠性证据会因此同时变成董事会和采购方都盯着的问题。
    signalRefs: [物理 AI 成了新的平台前线]
    sourceRefs: [1]
differentiator: >-
  大多数机器人软件从供应商一侧出发，优化的是模型表现或车队运营；这家公司反过来从采购方风险委员会出发，先把跨站点、跨供应商扩张审批所需的中立记录系统做出来。只要位置站稳，它就能持续积累专有 rollout 基准，最后变成机器人 OEM、运营方、保险方和审计方之间的信任层。
