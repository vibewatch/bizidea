jobsToBeDone:
  - job: 当人形机器人试点在真实仓库地面运行满第一个月时，帮助 3PL 自动化负责人判断应该扩张、暂停还是增加控制措施，从而在不承担失控安全风险的前提下扩大用工自动化。
    currentAlternative: 分散在演示文稿、厂商仪表盘和 EHS 清单里的人工试点评审
    successMetric: 从试点评审到扩张决策所需天数，以及在无重大事故前提下获批的站点数量
