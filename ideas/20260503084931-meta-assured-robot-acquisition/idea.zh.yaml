jobsToBeDone:
- job: 当一个人形机器人试点在真实仓库地面完成首月运行后，帮助 3PL 自动化负责人决定是扩展、暂停还是增加控制措施，以便他们在不承担失控安全风险的前提下扩大劳动力自动化。
  currentAlternative: 分散在演示文稿、供应商仪表盘和 EHS 清单中的人工试点评审
  successMetric: 从试点评审到扩展决策所需天数，以及在无重大事件情况下获批的站点数量
