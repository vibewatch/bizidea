topRisks:
- name: 品类时机
  description: 人形机器人部署可能仍过早，导致今天购买专用软件的 3PL 数量不足。
  mitigation: 从已在运行试点的付费设计合作伙伴切入；若人形机器人起量慢于预期，则支持相邻的移动操作系统。
- name: 数据获取
  description: 机器人供应商可能不愿开放构建中立安全论证所需的日志和事件数据。
  mitigation: 先从运营方自有的视频、工单和 SOP 系统接入，再利用买方压力谈判更深层的 OEM 集成。
- name: 信任与责任风险
  description: 如果客户把产品当作正式安全认证，一旦发生失效事件，可能损害信誉或带来法律风险。
  mitigation: 将系统定位为带可审计证据链的决策支持，并与保险方和安全专家合作提供正式签字层。
