slug: humanoid-safety-case-os
date: '2026-05-03'
executiveSummary: >-
  Humanoid warehouse deployments are moving from technical pilots to board-level expansion decisions, but U.S. 3PLs still lack a neutral system that converts pilot evidence into a defendable go/no-go case. This plan targets multi-site 3PLs running their first humanoid or closely adjacent mobile-manipulation pilot in one or two warehouses and needing a decision within one quarter on whether to expand to three to five more sites. The product wedge is a vendor-neutral safety-case OS that ingests operator-owned incident evidence first, then deeper OEM telemetry where available, to produce task-level readiness scores, mitigation plans, and rollout packets for operations, safety, and risk stakeholders. The market is real but narrow today: research supports a roughly $7.9M near-term SAM and shows that the main risk is timing, because public proof of many paying 3PL humanoid programs is still limited. Go-to-market therefore starts with high-touch design-partner sales into automation leaders at U.S. 3PLs rather than a broad self-serve software motion. Pricing is positioned against avoided pilot delay and external safety-consulting spend, not against OEM software seats, because a standalone assurance budget is not yet proven. The company wins only if it stays buyer-side and neutral while building a proprietary dataset of which interventions, site conditions, and controls actually predict safe multi-site expansion. The deliberate tradeoff is to defer broader factory, retail, and insurer workflows until the company proves that one warehouse approval workflow converts pilots into production rollouts. A major evidence gap remains the actual count of active paying 3PL humanoid pilots in 2026, so early fundraising and hiring should stay disciplined until 3PL willingness to buy recurring software is validated.
problem:
  - 3PL operators piloting humanoid robots cannot defend multi-site expansion decisions with vendor dashboards, anecdotal incident notes, and manual EHS reviews.
  - Safety, risk, and operations stakeholders need the same evidence translated into one auditable rollout packet, but current tools are fragmented and not vendor-neutral.
solution:
  - Ingest robot logs where available plus operator-owned video, intervention records, incident tickets, and SOP changes into a task-level evidence model for warehouse workflows.
  - Generate living safety cases, readiness scores, required mitigations, and site rollout packets for pilot-review and expansion committees.
whyWeWin:
  - The product is designed around the buyer-side approval workflow rather than OEM performance management, which creates neutrality when operators compare vendors or defend expansion internally.
  - Cross-vendor benchmarks on interventions, controls, and site conditions can compound into a proprietary assurance dataset that RobOps dashboards and consultants do not naturally accumulate.
strategicChoices:
  beachhead: U.S. 3PLs with 5-50 warehouses running a first humanoid or closely adjacent mobile-manipulation pilot in one or two facilities for tote moving, pallet-side handling, or trailer unloading.
  wedgeRationale: This workflow has an immediate buying trigger, a small stakeholder set, and a binary outcome—expand, pause, or add controls—so it can produce proof faster than trying to be a general robotics compliance platform.
  sequencingRationale: The company should first prove it can create useful rollout packets from operator-owned evidence, then add OEM integrations and benchmark scoring, then layer channel partnerships with insurers and safety advisors once the output format is trusted.
  notYet:
    - Formal certification or insurer underwriting authority
    - Non-warehouse verticals such as hospitals, retail backrooms, or consumer humanoids
    - Broad robot fleet orchestration or warehouse execution features that already belong to RobOps and WMS platforms
market:
  tam: $52.5M bottom-up beachhead TAM based on 6,997 U.S. warehousing establishments with 20+ employees, an estimated 25% 3PL-relevant share, and modeled annual assurance spend of $30k per active site.
  sam: $7.9M near-term SAM assuming only 15% of the 3PL-relevant site base is pilot-ready while public humanoid deployments remain concentrated in a small set of repetitive workflows.
  som: $900k illustrative year-3 SOM based on roughly 30 live sites, or 8-12 enterprise programs, at about $30k per active site equivalent.
  segments:
    - Multi-site U.S. 3PL warehouse operators with active humanoid pilots
    - Warehouse safety, risk, and automation stakeholders supporting adjacent mobile-manipulation rollouts
  buyingProcess: The buying process is committee-driven and usually starts when a first-site pilot review, near-miss, or insurer question forces an expansion decision. The economic buyer is typically the VP or Head of Operations or Automation, with site safety, EHS, and risk teams shaping requirements and signoff.
product:
  mvp: Build a workflow-specific evidence intake and review product for one warehouse task family that can turn incidents, interventions, SOP changes, and limited robot telemetry into a committee-ready rollout packet. The MVP should support one design-partner workflow end to end rather than a generic robotics platform.
  sixMonth: Land 2-3 design partners, ship evidence ingestion from operator-owned systems, deliver human-reviewed readiness reports, and prove the packet changes at least one real expansion decision.
  twelveMonth: Add repeatable scoring for two to three warehouse task archetypes, deepen at least one OEM integration, and convert design-partner reporting into a subscription product with audit trails and mitigation tracking.
  twentyFourMonth: Expand from one-site pilot reviews to multi-site program governance, benchmark customers against anonymized peer patterns, and open insurer- and channel-ready reporting while remaining decision-support, not certification.
  keyBets:
    - Operator-owned evidence is sufficient to create an initial useful product before full OEM data access is available.
    - Buyers will pay for faster expansion decisions as recurring software rather than only one-off consulting.
    - A narrow warehouse-task ontology will generalize across multiple 3PL customers better than bespoke site-by-site scoring.
gtm:
  wedge: Sell a paid pilot-review and rollout-packet workflow to one national 3PL that already has an executive mandate to decide within a quarter whether to expand a humanoid program to additional sites.
  channels:
    - Direct founder-led sales to heads of automation and operations innovation at U.S. 3PLs
    - OEM referral and co-sell where neutrality and data access terms are contractually protected
    - Safety advisors, warehouse consultants, and insurers as later credibility and distribution partners
  funnelTargets: 10-15 qualified ICP meetings per quarter, 20-30% meeting→paid design partner, 50%+ design partner→annual subscription, 60%+ first-site subscription→multi-site expansion module within 12 months
  pricing: Annual program fee plus per-site rollout modules, initially packaged as $40k-$80k design-partner contracts that convert into roughly $90k-$180k annual programs as customers move from one workflow and 1-2 sites to 3-5 sites; rationale is avoided pilot delay and lower external review cost.
businessModel:
  revenueStreams:
    - Annual software subscription for active robot deployment programs
    - Per-site rollout and readiness-review modules
    - Premium benchmarking, insurer-readable reporting, and partner-enabled review packages
  unitOfValue: Active robot deployment program with site-based expansion modules
  targetGrossMarginPct: 75
  expansionLevers:
    - More sites per enterprise program
    - Additional warehouse task archetypes per customer
    - Cross-vendor benchmark and reporting modules for insurers, brokers, and safety partners
strategyMap:
  northStarMetric: Number of additional warehouse sites approved for expansion using the platform without a major deployment rollback
  inputMetrics:
    - Time from pilot review to expansion decision
    - Percentage of incidents and interventions captured in the evidence graph
    - Design partner to annual subscription conversion rate
    - First-site to multi-site expansion rate
    - OEM integration coverage across active programs
  moatsToBuild:
    - Cross-vendor dataset linking interventions, controls, and site conditions to expansion outcomes
    - Buyer-trusted task ontology and rollout packet format used across operations, safety, and risk committees
    - Workflow integrations and channel relationships that make the company the default evidence layer for expansion reviews
  killCriteria:
    - Fewer than 2 paid design partners in the first 9 months
    - Less than 30% of interviewed ICPs say rollout approval is painful enough for recurring software
    - No design partner converts to subscription after one completed pilot-review cycle
  mermaid: |
    flowchart LR
      Wedge[3PL pilot review wedge] --> MVP[Evidence intake plus rollout packet MVP]
      MVP --> Proof[Paid design partners and first expansion decisions]
      Proof --> Expansion[Multi-site governance and benchmark modules]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong wedge clarity and real workflow pain, but category timing and buyer-budget proof are still too thin for high-conviction seed underwriting.
    whyBelieve: The company targets a specific operational approval bottleneck that adjacent RobOps and OEM tools do not clearly solve today.
    whyDoubt: Public evidence of many paying 3PL humanoid programs and recurring assurance budgets remains limited, so timing could lag product readiness.
    nextDiligence: Confirm that 3PL design partners will pay for recurring software after one live pilot-review cycle, not just for services-heavy initial support.
  firstCustomer:
    title: Head of Automation at a national 3PL with an active humanoid warehouse pilot
    profile: A U.S. 3PL with 5-50 warehouses, one live pilot in a repetitive indoor workflow, and executive pressure to decide quickly on expansion.
    trigger: First on-floor incidents, operator interventions, or insurer questions force a formal expand-versus-pause committee review.
    buyer: VP of Operations or Head of Automation
    initialContract: $40k-$80k design-partner engagement for one workflow and 1-2 sites, converting to $90k-$180k annual recurring program revenue once 3-5 sites and ongoing reviews are in scope.
  mustBeTrue:
    - At least 5 of the first 10 ICP interviews confirm rollout approval is a repeatable software problem, not just episodic consulting.
    - At least 2 design partners agree to share enough operator-owned evidence to generate a useful first readiness score before full OEM integration.
    - At least 1 insurer, broker, or safety advisor says the rollout packet format is credible decision support for expansion review.
    - At least 50% of paid design partners convert to annual subscriptions after the first completed review cycle.
    - The product remains vendor-neutral in contract structure and data presentation even when sourced through OEM referrals.
  diligenceQuestions:
    - How many U.S. 3PLs have active paid humanoid or adjacent mobile-manipulation pilots right now?
    - What budget line will fund the product before a dedicated assurance category exists?
    - What minimum data set is sufficient to produce a defensible readiness score without deep OEM telemetry?
    - Why will Formant, InOrbit, or OEM software not absorb this workflow once it proves valuable?
    - What disclaimers, partner roles, and product boundaries prevent customers from treating the software as formal certification?
  riskHeatmap:
    - risk: Category adoption is slower than the plan assumes.
      likelihood: High
      impact: High
      leadingIndicator: Fewer than 10 qualified U.S. 3PL humanoid or adjacent pilot programs can be identified and reached in the first 6 months.
      mitigation: Start with design partners and support closely adjacent mobile-manipulation workflows if pure humanoid demand is too thin.
    - risk: OEMs restrict access to the telemetry needed for strong scoring.
      likelihood: Medium
      impact: High
      leadingIndicator: Design partners cannot provide event-level telemetry and MVP usefulness depends entirely on manual reporting.
      mitigation: Build the first product on operator-owned video, tickets, and SOP evidence, then use buyer demand to negotiate deeper integrations.
    - risk: Buyers view the product as consulting rather than recurring software.
      likelihood: Medium
      impact: High
      leadingIndicator: Paid pilots request custom reports but decline annual contracts after the first review cycle.
      mitigation: Productize the review workflow early, tie pricing to repeated committee use, and reserve bespoke services for onboarding only.
    - risk: Legal and liability exposure rises if customers infer formal certification.
      likelihood: Medium
      impact: High
      leadingIndicator: Prospects ask the company to sign off on safety compliance or replace insurer and consultant review.
      mitigation: Position the platform as auditable decision support, add explicit disclaimers, and partner with formal experts for certification-adjacent needs.
    - risk: Adjacent RobOps platforms move upstream into approval workflows.
      likelihood: Medium
      impact: Medium
      leadingIndicator: Competitors begin marketing insurer-ready rollout approvals or buyer-side safety-case outputs.
      mitigation: Own the committee workflow, benchmark dataset, and neutral output format before adjacent platforms reposition.
operatingAssumptions:
  - assumption: The first repeatable buyer is a multi-site U.S. 3PL already running one live humanoid or adjacent mobile-manipulation pilot.
    basis: research.yaml
    validationTest: Interview 15 target accounts and verify at least 5 have a live or imminent pilot plus a defined expansion decision within two quarters.
    decisionImpact: If false, narrow further to one OEM ecosystem or broaden earlier into adjacent warehouse robot types.
  - assumption: Operator-owned evidence can create a useful MVP before deep OEM integrations are available.
    basis: idea.yaml
    validationTest: Run one design-partner review using video, incident tickets, intervention counts, and SOP deltas, then compare customer confidence before and after the packet.
    decisionImpact: If false, the roadmap must prioritize OEM integrations first and sales cycles will lengthen.
  - assumption: Customers will fund the product from automation-program budgets rather than waiting for a standalone safety-software budget.
    basis: research.yaml
    validationTest: In paid pilot proposals, confirm which budget owner signs and whether approval is benchmarked against avoided delay or consulting spend.
    decisionImpact: If false, pricing and packaging should shift toward partner-led services or bundled OEM/channel sales.
  - assumption: A vendor-neutral position is more valuable to buyers than a tighter but single-OEM workflow.
    basis: operator judgment
    validationTest: Compare conversion speed and retention between direct buyer-led deals and OEM-referred deals with neutrality clauses.
    decisionImpact: If false, the company may need to choose a dominant OEM ecosystem instead of building a cross-vendor brand.
  - assumption: The market can support venture-style growth only if the product expands from humanoids into broader warehouse deployment assurance.
    basis: research.yaml
    validationTest: Measure how many qualified opportunities fall outside strict humanoid programs but share the same approval workflow.
    decisionImpact: If false, the company should remain a focused niche software business and reduce funding expectations.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview heads of automation, EHS, and site operations at 15 multi-site U.S. 3PLs.
    hypothesis: At least one-third are facing a real pilot-review bottleneck with budget urgency inside the next two quarters.
    successMetric: 5+ interviews confirm a live or imminent expansion decision and willingness to evaluate paid software.
    owner: CEO/founder
  - horizon: 0–90 days
    experiment: Build a manual first rollout packet from one design partner using operator-owned evidence only.
    hypothesis: A useful approval recommendation can be produced without full OEM telemetry.
    successMetric: Customer rates the packet as decision-useful and requests a second review cycle or production scope.
    owner: Founding product lead
  - horizon: 90–180 days
    experiment: Pilot paid design-partner contracts with 2-3 3PLs around one task archetype.
    hypothesis: Customers will pay for recurring review workflows when tied to quarter-end expansion decisions.
    successMetric: 2+ paid contracts signed and at least 1 converted to annual subscription.
    owner: CEO/founder
  - horizon: 90–180 days
    experiment: Test one OEM integration and one insurer or safety-advisor review of the packet format.
    hypothesis: Deeper telemetry improves scoring quality while external stakeholders validate the output as credible decision support.
    successMetric: One live data integration completed and one partner agrees to use or endorse the packet format in a customer process.
    owner: Founding eng
  - horizon: 180–365 days
    experiment: Launch benchmark scoring across two to three warehouse task archetypes.
    hypothesis: Repeatable scoring across similar tasks raises conversion and expansion rates versus bespoke reporting.
    successMetric: Subscription customers use standardized scoring in at least 70% of review cycles.
    owner: Product + engineering
  - horizon: 180–365 days
    experiment: Run a channel test with one OEM and one safety or systems-integration partner.
    hypothesis: Partner-sourced pipeline can speed access without destroying neutrality or margin.
    successMetric: At least 2 qualified opportunities sourced through partners and no requirement to white-label or subordinate the approval narrative.
    owner: CEO/founder
operations:
  - Secure a standard evidence-ingestion process for video, incident tickets, SOP changes, and robot event logs.
  - Maintain explicit product disclaimers, review workflows, and approval records to keep the platform in decision-support territory.
  - Use a shared customer review cadence with operations, safety, and risk stakeholders rather than single-user deployment.
  - Build partner operating motions with OEMs, insurers, and safety advisors only after neutrality, data rights, and customer ownership are defined.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Needed immediately to build evidence ingestion, audit trails, and the first workflow-specific product without outsourcing core data architecture.
  - role: Founder-led sales / CEO
    startTiming: Month 0
    rationale: Early deals require problem discovery, design-partner selling, and careful neutrality positioning with buyers and OEMs.
  - role: Robotics domain expert / safety workflow lead
    startTiming: Month 3
    rationale: Converts raw telemetry and incident evidence into credible task taxonomies, mitigation logic, and customer-facing rollout packets.
  - role: Product engineer
    startTiming: Month 6
    rationale: Required once the first design partner proves the workflow and the company must productize repeatable scoring and review UX.
  - role: Customer success / solutions lead
    startTiming: Month 9
    rationale: Supports onboarding, committee reviews, and multi-site rollouts without turning the company into a pure services shop.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2-3 paid design partners in the U.S. 3PL beachhead.
      - Ship MVP evidence intake, audit trail, and committee-ready rollout packet for one warehouse task archetype.
      - Complete at least one OEM integration and one insurer or safety-partner review of the packet format.
      - Convert at least one design partner to annual subscription revenue.
  - horizon: 12–24 months
    items:
      - Support 8-12 enterprise programs or about 30 live sites, consistent with the researched SOM scenario.
      - Launch benchmark scoring across multiple warehouse task archetypes and establish first repeatable multi-site expansion module.
      - Build a small partner ecosystem of OEM, safety, and insurer relationships without giving up buyer ownership.
  - horizon: 24–36 months
    items:
      - Expand from humanoid-specific positioning to broader warehouse deployment assurance where the same approval workflow applies.
      - Offer insurer-readable and cross-program benchmark modules as higher-value expansion products.
      - Test entry into a second geography or adjacent vertical only after the warehouse committee workflow is repeatable and profitable.
risks:
  - risk: Category timing may lag the company's burn if humanoid deployments remain too sparse.
    likelihood: High
    impact: High
    mitigation: Sell into active design partners first and broaden to adjacent mobile-manipulation workflows if needed.
  - risk: OEM data access may be weaker than the product roadmap assumes.
    likelihood: Medium
    impact: High
    mitigation: Start with operator-owned evidence and prioritize integrations only after proving demand.
  - risk: Buyers may treat the product as episodic consulting instead of recurring software.
    likelihood: Medium
    impact: High
    mitigation: Productize recurring review cycles, benchmark modules, and multi-site governance early.
  - risk: Trust and liability issues may emerge if the company is mistaken for a certification authority.
    likelihood: Medium
    impact: High
    mitigation: Keep positioning, contracts, and partner model firmly in decision-support territory.
  - risk: Adjacent RobOps and OEM tools may copy the approval workflow once the category becomes visible.
    likelihood: Medium
    impact: Medium
    mitigation: Build the neutral dataset, committee workflow, and insurer-readable packet format before competitors repackage observability tools.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds a small founder-led team to validate the 3PL beachhead, ship the first workflow-specific product, close 2-3 paid design partners, prove at least one subscription conversion, and establish the evidence and data-rights foundation for benchmark-driven expansion.
