scenarios:
  downside:
    description: 安全审查和数据就绪摩擦把销售周期拉长，到 Q4Y3 只做到 15 家账户，毛利也一直没爬上规模线。
    y3RevenueK: 1511
    y3EbitdaK: -510.77
    cashLowPointK: 278.69
    keyAssumptionChanges:
      - 第 1 年末只做到 4 个付费账户，Q4Y3 只做到 15 个，因为 Y2 少了 2 个 logo、Y3 又有 3 个 logo 滑出周期。
      - 基础 ACV 软到约 $105K，扩展 ACV 软到约 $129K，因为买家要求更多白标打包。
      - 毛利率会比基准低约 2 个点，因为人工审核和部署工作始终偏服务化。
  base:
    description: 基准情景里，第 1 年 5 个付费试点一路转成 Q4Y3 的 20 家付费业务线或 CoE；虽然 Y3 全年 EBITDA 还略为负，但 Q4Y3 已经转正。
    y3RevenueK: 2073.25
    y3EbitdaK: -71.69
    cashLowPointK: 895.75
    keyAssumptionChanges:
      - 公司在第 1 年拿下 5 个付费账户、Q4Y2 跑到 11 个、Q4Y3 跑到 20 个，而且在很晚之前都不用补 quota-carrying 销售。
      - 年订阅价格基本守在约 $117K ACV，且约 40% 的留存账户会在 12 个月内向 $138K 扩张。
      - 毛利率会从试点期的 40% 多一路爬到 Q4Y3 的 74%，前提是连接器、审核工作流和部署 playbook 都变得可复用。
  upside:
    description: 靠转介绍拉新、模块挂载更快，公司会在 Y3 做到 23 家账户，并实现全年 EBITDA 转正。
    y3RevenueK: 2528
    y3EbitdaK: 283.81
    cashLowPointK: 1161.95
    keyAssumptionChanges:
      - 共创客户转介绍和更快的安全放行，会让 Y2 多 1 个 logo、Y3 再多 1 个，Q4Y3 最终做到 23 家账户。
      - 基础 ACV 抬到约 $123K，扩展 ACV 抬到约 $144K，因为基准和白标模块更早挂上去。
      - 毛利率会比基准再高约 1 个点，因为可复用部署模板比计划里更快压低服务工作。
sensitivity:
  - variable: ARPU
    downsideCase: $105K 基础 ACV 和 $129K 扩展 ACV
    baseCase: $117K 基础 ACV 和 $138K 扩展 ACV
    upsideCase: $123K 基础 ACV 和 $144K 扩展 ACV
    y3RevenueImpactK: -207.3
    cashImpactK: -149
  - variable: CAC
    downsideCase: 每个新账户 $95K，因为转化更慢、解决方案工程时间更重
    baseCase: 每个新账户 $82K
    upsideCase: 通过转介绍和更干净的试点，把每个新账户的 CAC 压到 $70K
    y3RevenueImpactK: 0
    cashImpactK: -195
  - variable: 流失率
    downsideCase: 如果试点 proof 没法变成长期业务线采用，月度流失率 1.8%
    baseCase: 月度流失率 1.2%
    upsideCase: 如果工作流变成重复定范围的系统记录层，月度流失率 0.8%
    y3RevenueImpactK: -124
    cashImpactK: -96
  - variable: 销售周期
    downsideCase: 因为安全评审和脏 ECC 数据拖慢年合同转化，销售周期拉到 8 个月
    baseCase: 6 个月
    upsideCase: 可复用部署 playbook 跑通后，销售周期压到 4.5 个月
    y3RevenueImpactK: -260
    cashImpactK: -210
  - variable: 毛利率
    downsideCase: 如果人工审核和部署工作一直偏重，稳态毛利只有 70%
    baseCase: Y3 混合毛利率 72.6%
    upsideCase: Y3 混合毛利率 74%
    y3RevenueImpactK: 0
    cashImpactK: -70
  - variable: 招聘节奏
    downsideCase: 比计划提前一个季度补 GTM 和客户成功岗位
    baseCase: 按模型里的 M16 / M19 / M27 节奏招聘
    upsideCase: 把一个非关键售后岗位再往后推，等第 10 个账户之后再招
    y3RevenueImpactK: 0
    cashImpactK: -180
modelDiagram:
  title: 单位经济模型流
  mermaid: |
    flowchart LR
      TargetAccounts[目标账户] --> PaidPilots[付费试点]
      PaidPilots --> AnnualSubscriptions[年度订阅]
      AnnualSubscriptions --> ExpansionModules[扩展模块]
      AnnualSubscriptions --> GrossProfit[毛利]
      ExpansionModules --> GrossProfit
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入，靠的是账户数从 Q4Y3 的 20 家一路长出来，同时把留存账户从 $117K 的落地 ACV 慢慢推向 $138K 的扩展 ACV。
  - checkName: 必须做对的地方
    finding: 公司必须把试点转年订阅的转化率稳在 50% 以上，还得让 M16 招进来的 GTM 岗位真正起效，同时不把这种高度依赖信任的实施动作做散。
  - checkName: 模型会失效的情况
    finding: 如果安全评审或数据质量把销售周期一路拖向 8 个月，下行情景里的现金低点会压到约 $279K，Y3 全年 EBITDA 也会继续深度为负。
  - checkName: 下一轮融资的证明点
    finding: 只要公司能在 Y2 退出时做到约 11 家付费账户、让基准看板跑进生产环境，再拿下一个企业 CoE rollout，下一轮融资就讲得通。
sanityChecks:
  ruleOf40: Y3 增长 87.5% + EBITDA 利润率 -3.5% = 84.0%
  burnMultiple: Y2 burn multiple 为 0.6x，按约 $807K 的净新增 ARR 计算；到 Q4Y3 EBITDA 转正。
  revenuePerFte: Y3 年末 8 名 FTE 对应 $259K / FTE（SaaS 基准约 $200–400K）。
  flags:
    - 虽然 Q4Y3 已经转正，但 Y3 全年 EBITDA 仍略为负，公司在更大规模扩张前还得继续控好运营纪律。
    - 基准情景假设公司在很晚之前都靠创始人和伙伴带销售，把账户做到 20 家后才招专职 AE；如果转介绍不及预期，这个假设会偏乐观。
    - 年末 ARR 略高于研究里 $2.5M 的 SOM 简写，因为模型假设 40% 的第二业务线扩张，加上少数仍处于高价试点期的月份。
    - 现金近似 EBITDA，没有计营运资金节奏、VAT / 税项时点或 capex，所以库务精度低于董事会模型。
