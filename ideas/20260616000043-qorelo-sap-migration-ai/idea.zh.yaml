problem: 很多 SAP S/4HANA 项目还没真正开工交付，前面就先跑偏了，因为范围判断、定制代码取舍和 workshop 决策都锁在资深架构师脑子里，也散在各种表格里。区域型系统集成商和企业内部 SAP CoE 面对成千上万的定制对象、流程变体和 fit-gap 笔记，根本来不及有把握地报价和立项。结果就是 SOW 报低、变更单连环冒、初级团队接手时没有上下文，而这个市场本来就只有 8% 的项目能按时完成。
targetUser:
  primary: DACH 和英国、专做 SAP 的系统集成商里，负责汽车零部件和工业制造客户 brownfield ECC 到 S/4HANA 迁移的业务负责人和交付总监
  secondary: 负责 fit-gap 分析、定制代码退役和 RICEFW backlog 建立的首席 SAP 解决方案架构师，以及企业 SAP CoE 负责人
  buyer: SAP 转型业务线的交付副总裁或管理合伙人
startupThesis:
  nonObviousInsight: 2027 这波迁移里，真正稀缺的不是通用开发工时，而是发现阶段的资深架构师判断。现在 LLM 已经能把 ECC 使用数据、定制代码清单、transport 历史和 workshop 纪要读到足以先起草可审计的范围决策，所以公司可以把架构师判断产品化，而不是每个项目都去抢同一小撮专家。
  beachhead: 德国和英国的区域型 SAP 系统集成商，团队有 20-150 名顾问，服务汽车零部件和工业制造客户，做的都是必须在未来两个季度完成定范围的 brownfield ECC 到 S/4HANA 项目
  wedge: 一台迁移范围编译器，吃进 ECC 使用报告、定制代码清单、transport 历史和 workshop 纪要，自动生成 fit-gap 决策、RICEFW backlog、工作量估算、排人假设，以及知识交接包
  whyNowCatalyst: Qorelo 的种子轮、汽车行业早期落地，再加上公开数据表明 35,000 家 SAP 客户要赶 2027 年，而按时完成率只有 8%，都说明发现阶段产能已经开始直接驱动采购。
  ventureScalePath: 先从 SAP discovery 和项目启动切进去，再往变更影响分析、测试覆盖生成、交付 QA、hypercare 基准扩，最后长成反复推进 ERP 转型项目的操作系统，覆盖 SAP、Oracle 和相邻企业软件栈。
solution: 产品会在迁移报价或项目启动那一刻，接上 SAP ECC 使用报告、定制代码清单、transport 历史和 workshop 纪要，然后吐出一份可审计的范围包：涉及哪些流程、哪些定制对象该退役或重建、fit-gap 决策怎么落、RICEFW backlog 长什么样、工作量怎么估、该怎么排人。资深架构师逐条审和改；初级顾问接手时，拿到的不再是散落会议纪要里的口口相传，而是带来龙去脉的判断链。系统还会持续跟踪已定范围与真实交付的偏差，让模型慢慢学会：哪些行业、工厂和流程区最容易引爆变更单。时间一长，公司就会变成 SAP 迁移 discovery 的系统记录层，也会握住一套关于 SAP 转型究竟怎么展开的基准数据集。
goToMarketSeed:
  firstCustomer: 德国一家 50-200 人的 SAP 精品集成商，手里同时有多个汽车零部件客户的 S/4HANA RFP，卖固定价 discovery 包，但能拍板范围的首席架构师不到 5 个
  buyingTrigger: 固定价迁移 RFP 突然增多，或者一次交付复盘暴露出：赶 2027 年截止期时，首席架构师已经卡住 discovery workshop 和首版 SOW。
  currentAlternative: 资深 SAP 架构师配 offshore 分析师，手工把 ECC 使用报告、定制代码导出、Excel 范围表和 workshop 笔记拼在一起
  switchingReason: 有了这条切口，一个首席架构师只要审机器先起的 backlog 和估算依据，不用从零搭一遍；投标命中率、交付毛利和新人上手速度都能一起改善。
  pricingHypothesis: 按每个已定范围的迁移项目收费，再叠加年度业务线订阅；价格可以绑到分析过的流程对象数或定制对象数，首单先落在每次 discovery €25k-€75k，高量合作伙伴再转六位数欧元的年度业务线合同。
