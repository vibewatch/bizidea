      Pain --> Product[迁移范围编译器]
      Product --> Outcome[报价更快，交付更干净]
businessModelCanvas:
  customerSegments:
    - 服务汽车和工业中端客户的区域型 SAP 系统集成商
    - 在多个子公司反复推进 brownfield S/4HANA 迁移的企业 SAP CoE
  valuePropositions:
    - 把原始 ECC 证据和 workshop 笔记在几天内变成可审计的范围包，不再拖上几周
    - 让稀缺的首席架构师改成审核机器起草的决策，而不是手工写完每一份 discovery 产物
    - 降低低价误报、变更单风险和项目交接时的知识流失
  channels:
    - 直接卖给 SAP 业务负责人和交付负责人
    - 与区域型集成商一起做高触达试点
    - 靠独立 SAP 架构师和迁移顾问精品机构转介绍
  customerRelationships:
    - 先在一个真实 discovery 包里做架构师在环试点
    - 定期一起复盘范围偏差和毛利流失
    - 再按年扩到更多业务线和企业 CoE 团队
  revenueStreams:
    - 按迁移项目收 discovery 费用
    - 面向集成商业务线的年度订阅
    - 范围偏差基准和知识复用高级模块
  keyResources:
    - 已定范围与真实交付结果对照的 SAP 迁移语料
    - ECC 使用、定制代码、transport 和 workshop 数据的连接器
    - 架构师签字和知识交接的审核工作流
  keyActivities:
    - 把 SAP 产物解析成范围建议
    - 按流程和行业做范围偏差基准
    - 跑 discovery 试点并打磨迁移 playbook
  keyPartners:
    - 区域型 SAP 系统集成商
    - 独立 SAP 解决方案架构师
    - 迁移 QA 和测试专家
  costStructure:
    - 产品与集成工程
    - 解决方案架构师与交付支持
    - 企业销售与伙伴赋能
jobsToBeDone:
  - job: 当一个新的 ECC 到 S/4HANA 机会进入 discovery 时，帮 SAP 业务负责人把原始系统证据和 workshop 笔记收束成站得住脚的范围，这样他们既能更快启动，也能把报价做得有利润。
    currentAlternative: 由资深架构师主导的电子表格定范围，加上 workshop 回顾 deck
    successMetric: 从 discovery kickoff 到 SOW 获批的天数
  - job: 当一个首席架构师同时被几条迁移项目拉扯时，帮初级顾问接住 fit-gap 决策和 backlog 背后的理由，这样他们执行时不用重复开 workshop，也不会把上下文丢掉。
    currentAlternative: 沉在 slide deck、邮件和会议纪要里的口口相传
    successMetric: 交付前 90 天里的范围偏差和返工工时
