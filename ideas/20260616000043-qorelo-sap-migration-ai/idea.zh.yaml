differentiator: 多数 ERP 迁移创业公司切的是 cutover、testing，或者 SOW 已经定完之后的泛项目管理。这家公司卡得更早：就在定范围那一刻拿下，因为毛利、排人和进度都在那时定，而人才瓶颈也最尖。它一旦把决策依据和真实范围偏差在多次迁移里积起来，就会沉淀出一套专有语料：特定流程模式究竟会对应多少工作量。泛 copilot 和靠人海的集成商都没有这层数据。
