topRisks:
  - name: 渠道冲突
    description: 大型集成商或 SAP 生态伙伴，可能会抗拒一款会暴露定范围纪律薄弱、又压缩可计费 discovery 工时的产品。
    mitigation: 先从那些毛利更依赖更快 discovery 的区域型集成商切入，并把输出做成可白标，让伙伴能直接塞回自己的交付动作里。
  - name: 估算信任
    description: 买家不会拿一套黑盒 AI 建议，去签数百万美元的 SOW。
    mitigation: 每条建议都要能回溯到原始产物，必须经过架构师审批，并持续展示预测与真实结果的偏差。
  - name: 源数据太乱
    description: 老 SAP 环境里的使用数据、定制代码或 workshop 资料，可能脏到不符合模型预期。
    mitigation: 先把最常见的 ECC 产物接得足够稳，再配上引导式 workshop 采集，把缺失的上下文补回来。
