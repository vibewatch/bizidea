slug: sap-scope-compiler
date: '2026-06-16'
executiveSummary: >-
  SAP Scope Compiler sells to 20- to 150-person SAP integrators in DACH and the
  UK that are being squeezed by the S/4HANA migration backlog and a shortage of
  principal architects. The product ingests ECC usage reports, custom-code
  inventories, transport history, and workshop transcripts to generate an
  auditable scope pack before the statement of work is signed. The immediate
  buyer is the SAP practice leader or VP Delivery whose margin is exposed when
  fixed-fee bids are under-scoped and junior teams inherit incomplete workshop
  context. The beachhead is brownfield ECC-to-S/4HANA programs for automotive
  suppliers and industrial manufacturers because those programs combine deadline
  pressure, heavy customization, and expensive architect day rates. Go to
  market starts with paid design-partner pilots priced per scoped migration and
  converts successful pilots into annual practice subscriptions tied to analyzed
  program volume. The company wins if it can prove faster discovery cycles,
  lower architect hours, and lower scoped-versus-delivered variance while
  keeping every recommendation traceable and human approved. The main
  disconfirming risks are that regional SIs may prefer white-labeled services to
  direct software spend, that early project data is too messy to support
  accurate estimates, and that security review slows pre-SOW adoption. Market
  sizing in the inputs is estimate-based rather than disclosed by buyers, so
  the first 12 months must validate direct budget ownership, deployment
  posture, and pilot-to-production conversion before the company scales hiring.
problem:
  - Fixed-fee SAP discovery is bottlenecked by scarce principal architects, which stretches scoping cycles, weakens statement-of-work accuracy, and traps project rationale in spreadsheets and workshop notes.
  - Existing SAP tooling addresses code analysis, data transition, testing, or process mining separately, but regional integrators still lack one workflow that turns cross-artifact evidence into a defensible fit-gap backlog, estimate, and handoff pack.
solution:
  - Ingest common ECC usage, custom-code, transport, and workshop artifacts and generate auditable fit-gap decisions, a RICEFW backlog, effort estimates, and staffing assumptions for architect review.
  - Track scoped-versus-delivered variance across projects so integrators can benchmark risk, improve estimates, and let junior consultants execute from linked rationale instead of tribal knowledge.
whyWeWin:
  - The wedge sits at the pre-SOW scoping moment where margin is set, architect scarcity is most painful, and adjacent incumbents have the weakest end-to-end workflow coverage.
  - Each production scope pack creates proprietary data on accepted decisions and downstream variance, improving estimate quality and making repeat migration practices harder to switch away from.
strategicChoices:
  beachhead: >-
    50- to 200-person DACH SAP boutiques serving automotive suppliers and
    industrial manufacturers on brownfield ECC-to-S/4HANA migrations entering
    discovery in the next two quarters.
  wedgeRationale: >-
    Regional boutiques feel architect bottlenecks and fixed-fee margin pressure
    more directly than global SIs or enterprise CIO programs, so one live
    discovery pilot can prove value faster than a broader enterprise
    transformation platform sale.
  sequencingRationale: >-
    The company must first earn trust on artifact ingestion, traceability, and
    architect review inside one live discovery pack; only after that proof
    should it add variance benchmarking, white-label partner workflows, and
    downstream delivery modules. Hiring and partnerships therefore start with
    SAP domain depth and deployment credibility before scaling sales coverage.
  notYet:
    - Large global SI rollouts that require heavy procurement and custom services before the product is proven.
    - Greenfield S/4HANA programs where brownfield code and process evidence is less central to the value proposition.
    - Oracle or non-SAP ERP support before the company has a reusable SAP variance dataset.
    - Fully autonomous scope sign-off without named architect approval.
market:
  tam: "$0.48B estimated TAM based on 13,650 remaining ECC customers times roughly $35k discovery-software spend per program."
  sam: "$24.5M estimated SAM based on roughly 546 DACH or UK industrial and automotive brownfield programs over the next 24 months at about $45k per program."
  som: "$2.5M estimated year-3 SOM based on 20 landed SI or CoE accounts at roughly $125k blended annual contract value."
  segments:
    - Regional SAP system integrators serving automotive and industrial mid-market brownfield migrations.
    - Enterprise SAP CoEs running repeated brownfield rollouts across subsidiaries after the integrator wedge is proven.
  buyingProcess: >-
    A practice lead or VP Delivery sponsors a pilot when RFP backlog, consulting
    overrun, or a postmortem makes architect bottlenecks visible. Security and
    deployment review must clear before customer artifacts are shared, then a
    successful live discovery converts into an annual practice subscription or a
    broader CoE rollout.
product:
  mvp: >-
    The MVP ingests the most common ECC usage reports, custom-code inventories,
    transport history exports, and workshop transcripts, then drafts an
    auditable scope pack with fit-gap decisions, RICEFW backlog items, effort
    estimates, and staffing assumptions. Every recommendation is linked back to
    source artifacts and routed through architect review, redlining, and export
    into the integrator's delivery templates.
  sixMonth: >-
    Pilot-ready product with opinionated ECC connectors, guided workshop capture,
    traceable recommendation cards, and private-cloud deployment for three
    design partners.
  twelveMonth: >-
    Production release with forecast-versus-actual variance tracking, benchmark
    dashboards, white-label deliverables, and five to eight paying practice
    accounts.
  twentyFourMonth: >-
    Expansion into change-impact analysis, reusable migration playbooks, and
    delivery-QA modules, plus first enterprise CoE rollouts and early
    evaluation of adjacent ERP categories.
  keyBets:
    - Trust improves when architects review traceable first drafts instead of receiving black-box scores.
    - A narrow set of common ECC and workshop inputs is sufficient to create usable first-pass scope packs.
    - Regional SIs will fund software directly if it protects fixed-fee margin and speeds discovery throughput.
    - Scoped-versus-delivered variance data compounds into a benchmark model that adjacent code or testing tools do not own.
gtm:
  wedge: >-
    Land with one paid fixed-fee brownfield discovery pack inside a regional SI
    practice and prove that one principal architect can review rather than build
    the first-pass scope pack.
  channels:
    - Direct account selling to SAP practice leads and delivery heads at DACH and UK boutiques.
    - White-glove design-partner pilots on one live migration discovery package.
    - Referrals and co-sell from independent SAP architects and SAP-adjacent tooling or hosting partners once trust is established.
  funnelTargets: "Target account -> qualified pilot 20-30%, pilot -> annual subscription 50%+, annual account -> second practice or CoE expansion within 12 months 40%+."
  pricing: >-
    Land at €25k-€75k per live discovery pack, then convert to €100k-€250k
    annual practice subscriptions priced by scoped program volume, analyzed
    process or custom-object volume, and number of reviewing architects; this
    pricing maps directly to replaced architect weeks and reduced underbidding
    risk.
businessModel:
  revenueStreams:
    - Paid per-migration discovery packs for live brownfield scopes.
    - Annual practice subscriptions for repeat integrator use across multiple programs.
    - Premium variance benchmarking and knowledge-reuse modules for mature accounts.
  unitOfValue: One scoped migration program priced by analyzed scope complexity and repeat practice usage.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one discovery pack to all brownfield programs inside the same SI practice.
    - Add benchmark and forecast-versus-actual modules once the customer has enough completed projects.
    - Move from integrator practices into enterprise SAP CoEs running repeat rollouts.
    - Attach downstream change-impact and delivery-QA modules after trust is earned upstream.
strategyMap:
  northStarMetric: Architect-approved production scope packs delivered per quarter.
  inputMetrics:
    - Days from discovery kickoff to first draft scope pack.
    - Percentage of recommendations accepted with minor edits.
    - Principal architect hours saved per scoped program.
    - Pilot-to-annual conversion rate.
    - Ninety-day scoped-versus-delivered variance reduction.
  moatsToBuild:
    - A proprietary dataset linking source artifacts, architect edits, and delivered variance by industry and process tower.
    - Trusted connectors, audit trails, and deployment patterns for sensitive SAP data.
    - White-label partner workflows that embed the product inside repeat SI discovery motions.
  killCriteria:
    - Fewer than 3 of the first 10 target boutiques agree to a paid pilot at €25k or more despite active brownfield demand.
    - Across the first 3 live pilots, principal architects accept fewer than 60% of recommendations with only minor edits.
    - No paid pilot converts to an annual subscription within 6 months or measured scope variance fails to improve by at least 15% versus the customer's baseline.
  mermaid: |
    flowchart LR
      Wedge[Brownfield SI wedge] --> MVP[Auditable scope compiler]
      MVP --> Proof[Faster scope and lower variance]
      Proof --> Expansion[Annual practice licenses and CoE rollout]
      Expansion --> Moat[Benchmark dataset and partner distribution]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Medium conviction because the wedge is clear and time-bound, but budget ownership and trust still need live pilot proof.
    whyBelieve: This attacks the highest-value bottleneck in SAP migrations, where deadline pressure, architect scarcity, and incomplete incumbent coverage all align.
    whyDoubt: If regional SIs only want white-labeled services or if architects reject model-generated scope decisions, the business risks becoming a services enhancer rather than a durable software platform.
    nextDiligence: Underwrite three live brownfield discovery pilots and inspect acceptance rates, pilot pricing, security-review time, and 90-day scope variance before scaling capital.
  firstCustomer:
    title: DACH SAP boutique delivery leader
    profile: >-
      A 50- to 200-person SAP integrator with multiple automotive or industrial
      brownfield RFPs, fewer than five principal architects, and a fixed-fee
      discovery motion.
    trigger: A spike in fixed-fee migration RFPs or a delivery review that shows discovery is bottlenecked on principal-architect availability.
    buyer: VP Delivery or managing partner of the SAP transformation practice
    initialContract: >-
      €25k-€75k paid pilot on one live discovery package, converting within 90
      to 180 days to a €100k-€250k annual practice subscription after two
      successful scope packs and security sign-off.
  mustBeTrue:
    - At least 5 of 10 target DACH or UK boutiques will sponsor a paid pilot from delivery-margin or practice budget instead of demanding bundled consulting first.
    - In live pilots, more than 70% of generated fit-gap and backlog recommendations will be accepted with only minor architect edits.
    - The product will cut discovery cycle time by at least 30% and principal-architect hours by at least 25% without increasing first-90-day delivery variance.
    - Private-cloud, BTP, or on-prem deployment plus DPA review will clear customer security review within 8 weeks for automotive or industrial buyers.
    - At least half of paid pilots will convert into annual subscriptions because the tool proves margin protection and knowledge retention, not just faster document creation.
  diligenceQuestions:
    - Who actually owns budget for pre-SOW discovery tooling inside a 50- to 200-person SAP boutique?
    - Which artifact types drive architect trust most strongly in the first scope pack?
    - How often is enough ECC evidence available before the statement of work is finalized?
    - Which deployment posture clears security review fastest in DACH automotive and industrial accounts?
    - Will design partners accept direct software pricing, or insist on white-label packaging inside billable services?
operatingAssumptions:
  - assumption: Regional SAP boutiques will buy software directly if it protects fixed-fee margin and increases architect throughput.
    basis: research.yaml
    validationTest: Interview 10 target boutiques and secure at least 3 paid-pilot commitments with explicit software line items rather than bundled day-rate services.
    decisionImpact: If false, shift to a white-label partner model with services-wrapped pricing and slower direct-sales hiring.
  - assumption: A narrow set of common ECC artifacts plus guided workshop transcripts is enough to generate a useful first-pass scope pack.
    basis: operator judgment
    validationTest: Backtest three historical projects and require more than 70% of scope recommendations to be accepted or lightly edited by principal architects.
    decisionImpact: If false, narrow the MVP to code and fit-gap triage only, or add more services-heavy data preparation.
  - assumption: Customer-controlled deployment can clear security review early enough to be used before or during discovery.
    basis: research.yaml
    validationTest: Complete DPA and architecture review with one regional SI and one automotive supplier in under 8 weeks across private-cloud and BTP options.
    decisionImpact: If false, reposition first deployments to post-SOW enterprise CoE workflows where security review can run longer.
  - assumption: Scoped-versus-delivered variance data will compound into a proprietary benchmark and pricing model within the first 20 accounts.
    basis: idea.yaml
    validationTest: Capture complete source artifacts, architect edits, and downstream delivery outcomes on at least 15 production scope packs and show measurable prediction lift versus rule-only baselines.
    decisionImpact: If false, differentiation remains workflow UX and domain implementation rather than a compounding data moat.
  - assumption: Practical deadline pressure remains strong enough through 2027 to keep discovery urgency high in the beachhead.
    basis: research.yaml
    validationTest: Track quarterly pipeline creation and interview losses to confirm that schedule pressure, not generic transformation interest, remains the dominant buying trigger.
    decisionImpact: If false, shift messaging and roadmap toward margin protection, knowledge capture, and repeat-program governance rather than deadline compression alone.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Paid-pilot discovery interviews
    hypothesis: Target boutiques will reveal a software budget owner and accept paid design-partner pricing if margin leakage is quantified.
    successMetric: 10 qualified interviews, 5 active opportunities, and 3 signed paid pilots at €25k or more.
    owner: Founder/CEO
  - horizon: 0-90 days
    experiment: Historical artifact ingestion backtest
    hypothesis: Common ECC usage, custom-code, transport, and workshop artifacts can support a useful first-pass scope draft without bespoke integration work.
    successMetric: More than 80% artifact-ingestion completeness and more than 70% architect acceptance or light edits on three historical projects.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Live brownfield discovery pilot
    hypothesis: On a real project, the product can reduce discovery cycle time and architect hours while preserving scope quality.
    successMetric: At least 30% faster discovery cycle, at least 25% fewer principal-architect hours, and paid pilot NPS above 8 of 10.
    owner: SAP solutions architect
  - horizon: 90-180 days
    experiment: Security and deployment clearance
    hypothesis: Private-cloud or BTP deployment can pass pre-SOW data handling review fast enough for production use.
    successMetric: Security approval in under 8 weeks for 2 design partners with signed DPA and approved reference architecture.
    owner: Partner solutions lead
  - horizon: 6-12 months
    experiment: Pilot-to-annual conversion
    hypothesis: Customers will expand from one discovery pack to a practice-wide subscription when variance and knowledge-retention value is demonstrated.
    successMetric: At least 50% of paid pilots convert to annual subscriptions worth €100k or more within 6 months.
    owner: Founder/CEO
  - horizon: 12-18 months
    experiment: Variance benchmark upsell
    hypothesis: Benchmark dashboards tied to scoped-versus-delivered outcomes will create expansion revenue beyond initial scope-pack automation.
    successMetric: At least 3 production accounts adopt the benchmark module and report at least one changed staffing or estimate decision because of it.
    owner: Applied ML lead
operations:
  - Standardize a secure onboarding playbook covering artifact checklist, DPA, deployment choice, and retention policy before any pilot starts.
  - Run an architect-review workflow with mandatory traceability, redlining, and approval logs for every recommendation that touches scope, controls, or staffing assumptions.
  - Maintain industry-specific discovery templates for automotive and industrial brownfield programs so pilots start from repeatable process towers and RICEFW categories.
  - Build a forecast-versus-actual feedback loop that compares scoped backlog, effort assumptions, and delivered variance after the first 90 days of execution.
  - Enable white-label output templates and partner training so regional boutiques can package the product inside their existing discovery deliverables.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the ingestion pipeline, evaluation harness, architect-review layer, and initial deployment options without outsourcing core product learning.
  - role: SAP solutions architect
    startTiming: Month 0
    rationale: Encode fit-gap logic, shape the first scope templates, and provide the domain credibility required for architect trust in live pilots.
  - role: Founder/CEO
    startTiming: Month 0
    rationale: Sell into boutique practices, own pricing and packaging, and translate pilot outcomes into a repeatable partner motion.
  - role: Applied ML lead
    startTiming: Month 4
    rationale: Improve extraction quality, track recommendation acceptance, and turn scoped-versus-delivered outcomes into a benchmark model.
  - role: Partner solutions lead
    startTiming: Month 6
    rationale: Own deployment reviews, white-label enablement, and rollout playbooks as pilots convert to production accounts.
milestones:
  - horizon: 0-12 months
    items:
      - Ship the MVP with traceable scope recommendations and architect approval logs.
      - Sign 3 paid design partners in DACH and run at least 5 live brownfield discovery pilots.
      - Clear security and deployment review for private-cloud or BTP rollout with the first production customer.
      - Convert at least 3 pilots into annual practice subscriptions.
      - Capture the first 10 production scope packs with downstream variance data.
  - horizon: 12-24 months
    items:
      - Reach 10 to 12 paying SI or CoE accounts and establish automotive and industrial playbooks.
      - Launch benchmark and forecast-versus-actual dashboards tied to delivered outcomes.
      - Formalize at least 2 ecosystem partnerships for hosting, code analysis, or process-intelligence enrichment.
      - Win the first enterprise SAP CoE rollout beyond the original SI wedge.
  - horizon: 24-36 months
    items:
      - Reach 20 landed accounts and roughly the researched $2.5M year-3 SOM target.
      - Expand the product into change-impact analysis, reusable migration playbooks, and delivery-QA modules.
      - Prove multi-practice expansion inside at least 5 integrator customers.
      - Decide whether adjacent ERP support is warranted based on retained-margin and data-moat evidence.
risks:
  - risk: Regional integrators may prefer software wrapped inside billable services instead of direct subscription spend.
    likelihood: Medium
    impact: High
    mitigation: Start with paid pilots inside the delivery P&L, support white-label outputs, and hire GTM talent only after direct-budget ownership is proven.
  - risk: Architects may not trust machine-generated fit-gap and estimate recommendations for multi-million statements of work.
    likelihood: Medium
    impact: High
    mitigation: Keep humans in the approval loop, link every recommendation to source artifacts, and publish forecast-versus-actual accuracy over time.
  - risk: Early customer data may be incomplete or too messy to support reliable scope generation before discovery decisions are due.
    likelihood: High
    impact: Medium
    mitigation: Begin with opinionated connectors for common ECC artifacts, guided workshop capture, and minimum-data checklists before promising full automation.
  - risk: Security, GDPR, or deployment review may delay use on real project data.
    likelihood: Medium
    impact: High
    mitigation: Offer private-cloud, BTP, and on-prem patterns with standard DPA templates and start pilots with SI-controlled project data where possible.
  - risk: Deadline urgency may soften if customers rely on extended transition options.
    likelihood: Medium
    impact: Medium
    mitigation: Position the ROI around margin protection, knowledge capture, and reduced change-order risk, then broaden into repeat-program governance rather than deadline-only messaging.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months of runway funds the core product and SAP domain team,
    design-partner pilots, secure deployment options, and the first benchmark
    data loop needed to convert paid pilots into 8 to 10 annual production
    accounts.
