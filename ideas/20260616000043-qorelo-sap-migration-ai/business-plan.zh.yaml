slug: sap-scope-compiler
date: '2026-06-16'
executiveSummary: SAP 范围编译器最该先卖给 DACH 和英国那些 20-150 人的 SAP 集成商：他们一边被 S/4HANA 迁移积压挤压，一边又缺首席架构师。产品吃进 ECC 使用报告、定制代码清单、transport 历史和 workshop 纪要，在 SOW 签字前就先吐出一份可审计的范围包。眼前真正掏钱的买方，是 SAP 业务负责人或交付副总裁——只要固定价投标定错范围，或者初级团队接到的 workshop 上下文不完整，最后亏掉的就是他们的毛利。滩头市场锁在汽车零部件和工业制造客户的 brownfield ECC 到 S/4HANA 项目：截止期压力大、定制又重，架构师日费还贵。GTM 先从按单次已定范围迁移收费的付费共创试点起步，试点跑通后再转成按分析项目量计价的年度业务线订阅。公司要赢，得证明三件事：discovery 周期更快、架构师工时更低、已定范围与真实交付的偏差更小，同时每条建议都可追溯、都有人审批。最主要的反证风险也很明确：区域型 SI 也许更想买白标服务，而不是直接付软件费；早期项目数据可能太乱，估算做不准；安全审查也可能拖慢 pre-SOW 采用。输入里的市场规模仍主要是估算，不是买家公开披露，所以前 12 个月必须先把预算归属、部署姿态，以及试点转量产这三件事验证清楚，再扩大招聘。
problem:
  - 固定价 SAP discovery 被稀缺的首席架构师卡住，结果就是定范围周期被拉长、SOW 准确度变差，项目判断又散落在表格和 workshop 笔记里。
  - 现有 SAP 工具各管一段——代码分析、数据迁移、测试、流程挖掘——但区域型集成商仍缺一条工作流，能把跨产物证据直接拼成站得住脚的 fit-gap backlog、估算和交接包。
solution:
  - 接入常见的 ECC 使用、定制代码、transport 和 workshop 产物，生成可审计的 fit-gap 决策、RICEFW backlog、工作量估算和排人假设，再交给架构师审。
  - 持续跟踪已定范围与真实交付的偏差，让集成商能做风险基准、修正估算，也让初级顾问接手时拿到成体系的依据，而不是口口相传的知识。
whyWeWin:
  - 这条切口卡在 pre-SOW 定范围那一刻：毛利在这里定、架构师稀缺在这里最痛，而相邻现有厂商在端到端工作流上恰好最薄。
  - 每做完一个生产级范围包，公司就多一批专有数据：哪些判断被接受、后面真实偏差是多少。数据一旦滚起来，估算会更准，重复迁移业务也更难迁走。
strategicChoices:
  beachhead: 50-200 人的 DACH SAP 精品集成商，服务汽车零部件和工业制造客户，做的都是将在未来两个季度进入 discovery 的 brownfield ECC 到 S/4HANA 迁移。
  wedgeRationale: 区域型 boutique 比全球 SI 或企业 CIO 项目更直接地感受到架构师瓶颈和 fixed-fee 毛利压力，所以先在一个真实 discovery 试点里证明价值，会比一上来卖更广的企业转型平台快得多。
  sequencingRationale: 公司必须先在一个真实 discovery 包里，把产物摄取、可追溯性和架构师审阅这三件事跑出信任；只有这层证明站住后，才该往范围偏差基准、白标伙伴工作流和下游交付模块继续长。招聘和伙伴策略也一样：先把 SAP 领域深度和部署可信度做扎实，再放大销售覆盖。
  notYet:
    - 产品还没跑通前，不要去推需要重采购、重定制服务的大型全球 SI rollout。
    - 先不要碰 greenfield S/4HANA 项目；那种场景里，brownfield 代码和流程证据不是核心价值。
    - 在 SAP 的范围偏差数据还没积够之前，别急着做 Oracle 或非 SAP ERP。
    - 没有点名架构师审批，就别谈全自动签发范围。
market:
  tam: 约 $0.48B 的估算 TAM：剩余 13,650 家 ECC 客户 × 每个项目约 $35k 的 discovery 软件支出。
  sam: 约 $24.5M 的估算 SAM：未来 24 个月里，DACH 和英国大约 546 个工业与汽车 brownfield 项目 × 每个项目约 $45k。
  som: 约 $2.5M 的估算第 3 年 SOM：拿下 20 家 SI 或 CoE 账户 × 约 $125k 的混合年 ACV。
  segments:
    - 服务汽车和工业中端客户、专做 brownfield 迁移的区域型 SAP 系统集成商。
    - 等集成商切口跑通后，再接那些反复 rollout brownfield 项目的企业 SAP CoE。
  buyingProcess: 一旦 RFP 积压、顾问超支或一次 postmortem 把架构师瓶颈摆上台面，业务负责人或交付 VP 就会赞助一轮试点。真正共享客户产物之前，安全和部署评审必须先过；一旦真实 discovery 跑通，合同再转成年订阅，或者扩成更广的 CoE rollout。
product:
  mvp: MVP 先吃进最常见的 ECC 使用报告、定制代码清单、transport 历史导出和 workshop 纪要，然后起草一份可审计的范围包：fit-gap 决策、RICEFW backlog 项、工作量估算和排人假设都在里面。每条建议都回链到源产物，再走架构师审阅、红线修改和导出到集成商现有交付模板的流程。
  sixMonth: 给 3 家共创客户准备好可用试点：做出有取舍的 ECC 连接器、引导式 workshop 采集、可追溯的建议卡片和私有云部署。
  twelveMonth: 发布生产版：有 forecast-versus-actual 偏差跟踪、基准看板、白标交付物，以及 5-8 个付费业务线账户。
  twentyFourMonth: 往变更影响分析、可复用迁移 playbook 和 delivery-QA 模块扩，同时拿下第一批企业 CoE rollout，并开始试探相邻 ERP 类别。
  keyBets:
    - 只要架构师看到的是可追溯的一稿，而不是黑盒分数，信任就更容易建立。
    - 一小组常见的 ECC 和 workshop 输入，就足够先做出可用的一版范围包。
    - 只要能守住 fixed-fee 毛利、抬高 discovery 吞吐，区域型 SI 就会直接给软件预算。
    - 已定范围与真实交付的偏差数据，会慢慢滚成一套基准模型，而这层数据并不掌握在相邻的代码或测试工具手里。
gtm:
  wedge: 先在一家区域型 SI 业务线里落一个付费的 fixed-fee brownfield discovery 包，证明一个首席架构师可以从“亲手搭首稿”，变成“审核首稿”。
  channels:
    - 由销售直接打到 DACH 和英国 boutique 集成商里的 SAP 业务负责人和交付负责人。
    - 围绕一个真实迁移 discovery 包做高触达共创试点。
    - 等信任立住后，再接独立 SAP 架构师，以及 SAP 周边工具或托管伙伴的转介绍和联合销售。
  funnelTargets: 目标账户 -> 合格试点 20-30%，试点 -> 年度订阅 50%+，年度账户 -> 12 个月内扩到第二个业务线或 CoE 40%+。
  pricing: 先以每个真实 discovery 包 €25k-€75k 落地，再转成每年 €100k-€250k 的业务线订阅；定价锚点看已定范围的项目量、分析过的流程或定制对象体量，以及参与审核的架构师数量。买家真正买单的，是少掉的架构师周数和被压下去的低价误报风险。
businessModel:
  revenueStreams:
    - 围绕真实 brownfield 定范围项目收付费 discovery 包费用。
    - 面向集成商业务线的年度订阅，覆盖多项目复用。
    - 给成熟账户加卖范围偏差基准和知识复用模块。
  unitOfValue: 以一个已定范围的迁移项目为计价单位，价格看分析范围复杂度和业务线复用深度。
  targetGrossMarginPct: 70
  expansionLevers:
    - 先从同一家 SI 业务线里的一个 discovery 包，扩到所有 brownfield 项目。
    - 当客户积累够已完成项目后，再加卖基准和 forecast-versus-actual 模块。
    - 从集成商业务线继续切进反复 rollout 的企业 SAP CoE。
    - 只要上游信任站住，再往下游挂变更影响和 delivery-QA 模块。
strategyMap:
  northStarMetric: 每季度交付、且拿到架构师批准的生产级范围包数量。
  inputMetrics:
    - 从 discovery kickoff 到首版范围包的天数。
    - 只做小改就被接受的建议占比。
    - 每个已定范围项目里省下的首席架构师工时。
    - 试点转成年订阅的转化率。
    - 前 90 天里，已定范围与真实交付偏差的下降幅度。
  moatsToBuild:
    - 把源产物、架构师修改和真实交付偏差连起来、并按行业和流程塔分层的专有数据集。
    - 适用于敏感 SAP 数据的可信连接器、审计轨迹和部署模式。
    - 能把产品嵌进重复 SI discovery 动作里的白标伙伴工作流。
  killCriteria:
    - 前 10 家目标 boutique 里，如果在 brownfield 需求明明活跃的情况下，付费试点价做到 €25k 以上还拿不到 3 家点头，就该停。
    - 前 3 个真实试点里，如果首席架构师对建议的接受率（只做小改）低于 60%，说明产品信任没过线。
    - 如果 6 个月内没有任何付费试点转成年订阅，或者测到的范围偏差没有比客户基线至少改善 15%，就说明价值没立住。
  mermaid: |
    flowchart LR
      Wedge[Brownfield SI 切口] --> MVP[可审计的范围编译器]
      MVP --> Proof[定范围更快，范围偏差更小]
      Proof --> Expansion[年度业务线许可与 CoE rollout]
      Expansion --> Moat[基准数据集与伙伴分发]
investorMemo:
  verdict:
    call: 见面 / 继续尽调
    conviction: 把握中等，因为切口够清楚、时间窗口也明确，但预算归属和信任还得靠真实试点来证明。
    whyBelieve: 它盯上的是 SAP 迁移里最值钱的瓶颈：截止期压力、架构师稀缺和现有厂商覆盖不完整，三件事在这里同时对齐。
    whyDoubt: 如果区域型 SI 只愿意买白标服务，或者架构师不接受模型起草的范围决策，这门生意就可能停留在服务增强层，长不成耐久的软件平台。
    nextDiligence: 先承保 3 个真实 brownfield discovery 试点，盯四个指标：接受率、试点定价、安全评审时间，以及 90 天范围偏差。
  firstCustomer:
    title: DACH SAP 精品集成商交付负责人
    profile: 一家 50-200 人的 SAP 集成商，手里有多个汽车或工业 brownfield RFP，首席架构师不到 5 个，而且已经在卖 fixed-fee discovery。
    trigger: 固定价迁移 RFP 突然增多，或者一次交付复盘暴露出：discovery 已经被首席架构师可用时间卡住。
    buyer: SAP 转型业务线的交付副总裁或管理合伙人
    initialContract: 首单先签一个 €25k-€75k 的真实 discovery 付费试点；在两个范围包跑通、且安全评审过关后，于 90-180 天内转成 €100k-€250k 的年度业务线订阅。
  mustBeTrue:
    - 10 家目标 DACH / 英国 boutique 里，至少 5 家愿意从交付毛利或业务线预算里赞助付费试点，而不是先要求把软件裹进顾问包。
    - 真实试点里，生成的 fit-gap 和 backlog 建议，有超过 70% 只需架构师做小改就能过。
    - 产品能把 discovery 周期至少压快 30%，把首席架构师工时至少降 25%，同时不把前 90 天交付偏差拉高。
    - 私有云、BTP 或本地部署，加上 DPA 审查，能在 8 周内过掉汽车或工业买家的安全评审。
    - 至少一半付费试点会转成年订阅，因为买家认可的不只是更快出文档，而是守住毛利和知识留存。
  diligenceQuestions:
    - 在一家 50-200 人的 SAP boutique 里，pre-SOW discovery 工具预算到底归谁管？
    - 第一版范围包里，哪类产物最能建立架构师信任？
    - 在 SOW 定稿前，客户通常能提供多完整的 ECC 证据？
    - 面对 DACH 的汽车和工业账户，哪种部署姿态最容易过安全评审：BTP、私有云，还是本地部署？
    - 共创客户会接受直接软件定价，还是坚持要把它白标塞进可计费服务里？
operatingAssumptions:
  - assumption: 只要能守住 fixed-fee 毛利、抬高架构师吞吐，区域型 SAP boutique 就会直接买软件。
    basis: research.yaml
    validationTest: 访谈 10 家目标 boutique，至少拿到 3 份明确把软件单列出来的付费试点承诺，而不是把费用打包进人天服务。
    decisionImpact: 如果不成立，就转向白标伙伴模式，用服务包裹定价，同时放慢直销团队招聘。
  - assumption: 一小组常见的 ECC 产物，再加上引导式 workshop 纪要，就足够起出一版有用的范围包。
    basis: 操盘判断
    validationTest: 回测 3 个历史项目，要求范围建议里超过 70% 被首席架构师接受，或只做轻微修改。
    decisionImpact: 如果不成立，就把 MVP 收窄到代码和 fit-gap 分诊，或者补更多偏服务化的数据准备。
  - assumption: 由客户控制的部署方式，能足够早过安全评审，让产品在 discovery 前后就用起来。
    basis: research.yaml
    validationTest: 分别和一家区域型 SI、一家汽车零部件客户跑 DPA 与架构评审，在私有云和 BTP 两个方案下都争取 8 周内过关。
    decisionImpact: 如果不成立，首批部署就改去 post-SOW 的企业 CoE 工作流，让安全评审有更长缓冲。
  - assumption: 已定范围与真实交付的偏差数据，会在前 20 家账户里慢慢滚成一套专有基准和定价模型。
    basis: idea.yaml
    validationTest: 至少在 15 份生产级范围包上，把源产物、架构师修改和下游交付结果都采全，并证明它的预测效果优于纯规则基线。
    decisionImpact: 如果不成立，差异化就会停在工作流 UX 和领域实施上，数据护城河讲不深。
  - assumption: 到 2027 年前，实际截止期压力仍足够强，会继续把滩头市场的 discovery 紧迫性顶在高位。
    basis: research.yaml
    validationTest: 按季度跟踪 pipeline 新建量，并复盘丢单，确认买单触发器里，排期压力仍然压过泛转型兴趣。
    decisionImpact: 如果不成立，就把话术和路线图从“赶截止期”转向“守毛利、留知识、降变更单风险”，而不是只讲时间压缩。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 付费试点 discovery 访谈
    hypothesis: 只要把毛利流失讲透，目标 boutique 就会暴露软件预算 owner，也会接受付费共创定价。
    successMetric: 10 次合格访谈、5 个活跃机会，以及 3 个 €25k 以上的签约付费试点。
    owner: 创始人/CEO
  - horizon: 0-90 天
    experiment: 历史产物摄取回测
    hypothesis: 常见的 ECC 使用、定制代码、transport 和 workshop 产物，不靠重定制集成，也能支撑一版可用的范围草稿。
    successMetric: 在 3 个历史项目里，产物摄取完整度超过 80%，且架构师接受或轻改的建议占比超过 70%。
    owner: 创始工程师
  - horizon: 90-180 天
    experiment: 真实 brownfield discovery 试点
    hypothesis: 到了真实项目里，产品依然能把 discovery 周期和架构师工时压下来，同时不牺牲范围质量。
    successMetric: discovery 周期至少快 30%，首席架构师工时至少少 25%，而且付费试点 NPS 高于 8/10。
    owner: SAP 解决方案架构师
  - horizon: 90-180 天
    experiment: 安全与部署放行
    hypothesis: 私有云或 BTP 部署，能快到足以在 pre-SOW 阶段通过数据处理评审。
    successMetric: 2 家共创客户在 8 周内过掉安全审批，并签好 DPA、批准参考架构。
    owner: 伙伴解决方案负责人
  - horizon: 6-12 个月
    experiment: 试点转年订阅
    hypothesis: 只要客户看见范围偏差和知识留存的价值，就会从单个 discovery 包扩到业务线级订阅。
    successMetric: 至少 50% 的付费试点在 6 个月内转成年订阅，合同价值达到 €100k 以上。
    owner: 创始人/CEO
  - horizon: 12-18 个月
    experiment: 范围偏差基准 upsell
    hypothesis: 把基准看板绑到已定范围与真实交付结果上，会在初始范围自动化之外再拉出扩展收入。
    successMetric: 至少 3 个生产账户启用基准模块，并明确因为它改过一次排人或估算决策。
    owner: 应用 ML 负责人
operations:
  - 在任何试点开始前，都先把安全导入手册标准化：产物清单、DPA、部署选项和保留策略都要一步到位。
  - 所有会碰到范围、控制项或排人假设的建议，都必须经过带可追溯性、红线修改和审批日志的架构师审阅流程。
  - 给汽车和工业 brownfield 项目维护行业模板，让试点一开始就站在可复用的流程塔和 RICEFW 分类上。
  - 建一条 forecast-versus-actual 反馈环，把已定 backlog、工作量假设和交付前 90 天偏差一项项对回去。
  - 配好白标输出模板和伙伴培训，让区域型 boutique 可以把产品直接塞回自己现有的 discovery 交付物里。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 先把摄取管线、评估 harness、架构师审阅层和初版部署选项做出来，核心产品学习不能外包。
  - role: SAP 解决方案架构师
    startTiming: Month 0
    rationale: 把 fit-gap 逻辑和首批范围模板编码进系统，也把架构师在真实试点里需要的领域可信度带进来。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 打进 boutique 业务线，亲自管定价和打包，再把试点结果翻成可重复的伙伴打法。
  - role: 应用 ML 负责人
    startTiming: Month 4
    rationale: 把抽取质量、建议接受率和范围偏差结果连起来，慢慢长出基准模型。
  - role: 伙伴解决方案负责人
    startTiming: Month 6
    rationale: 等试点开始转生产账户后，由这个角色来吃部署评审、白标赋能和 rollout playbook。
milestones:
  - horizon: 0-12 个月
    items:
      - 交付 MVP：范围建议可追溯，架构师审批日志完整。
      - 在 DACH 签下 3 家付费共创客户，并至少跑 5 个真实 brownfield discovery 试点。
      - 让首个生产客户在私有云或 BTP 方案下过掉安全和部署评审。
      - 至少把 3 个试点转成年业务线订阅。
      - 采下首批 10 份生产级范围包及其下游偏差数据。
  - horizon: 12-24 个月
    items:
      - 做到 10-12 家付费 SI 或 CoE 账户，并沉淀汽车与工业 playbook。
      - 上线与真实交付结果绑定的基准和 forecast-versus-actual 看板。
      - 至少建立 2 个生态合作，覆盖托管、代码分析或流程智能增强。
      - 拿下首个超出原始 SI 切口的企业 SAP CoE rollout。
  - horizon: 24-36 个月
    items:
      - 做到 20 家落地账户，并大致打到研究里的第 3 年 $2.5M SOM 目标。
      - 把产品扩到变更影响分析、可复用迁移 playbook 和 delivery-QA 模块。
      - 在至少 5 家集成商客户里证明多业务线扩张。
      - 基于留住的毛利和数据护城河证据，判断要不要扩到相邻 ERP 支持。
risks:
  - risk: 区域型集成商可能更愿意把软件包进可计费服务里，而不是直接买订阅。
    likelihood: Medium
    impact: High
    mitigation: 先把付费试点塞进交付 P&L，支持白标输出，只有在直接预算归属被证明后，才继续补 GTM 团队。
  - risk: 架构师可能不会信任机器起草的 fit-gap 和估算建议，不敢拿去支撑数百万美元的 SOW。
    likelihood: Medium
    impact: High
    mitigation: 所有高影响建议都保留人工审批门，逐条回链到源产物，并持续公开 forecast-versus-actual 的准确度。
  - risk: 早期客户数据可能不完整、也可能太乱，赶不上 discovery 决策所需的时点。
    likelihood: High
    impact: Medium
    mitigation: 先把最常见的 ECC 产物做成有取舍的连接器，再配引导式 workshop 采集和最低数据清单，不抢着承诺全自动化。
  - risk: 安全、GDPR 或部署评审，可能让真实项目数据迟迟上不了系统。
    likelihood: Medium
    impact: High
    mitigation: 提供私有云、BTP 和本地部署三套模式，配好标准 DPA 模板，并尽量从 SI 可控的项目数据开始试点。
  - risk: 如果客户越来越依赖延期过渡选项，截止期带来的紧迫性可能会松掉。
    likelihood: Medium
    impact: Medium
    mitigation: 把 ROI 话术重心放在守毛利、留知识和压低变更单风险上，再继续往重复项目治理去扩，而不是只讲截止期。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月现金跑道，用在核心产品和 SAP 领域团队、共创客户试点、安全部署选项，以及把付费试点转成 8-10 个年度生产账户所必需的第一圈基准数据闭环。
