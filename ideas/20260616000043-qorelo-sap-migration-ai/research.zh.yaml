categoryDynamics:
  growthRate: 到 2026 年，59% 的公司已经全部或部分上线 S/4HANA，较 2024 年高出 13 个百分点。
  growthRateSourceRefs:
    - 8
  tailwinds:
    - point: 硬截止时间叠加密集的 6 到 24 个月上线窗口，会把 discovery 紧迫性一直顶在高位。
      sourceRefs:
        - 7
        - 8
        - 9
        - 12
        - 32
    - point: 定制代码、流程复杂度和需求定义缺口，让自动化 discovery 这笔账更容易算通。
      sourceRefs:
        - 8
        - 16
        - 17
        - 18
        - 23
    - point: 制造业占比较高、再叠加 GenAI 兴趣上升，让这条垂直切口更容易成立。
      sourceRefs:
        - 11
  headwinds:
    - point: 延长维护和过渡选项的叙事，会让一部分慢客户对截止期没那么紧。
      sourceRefs:
        - 9
        - 12
        - 32
    - point: 信任、前置分析纪律和企业安全评审，仍然是采用路上的硬摩擦。
      sourceRefs:
        - 4
        - 23
        - 33
        - 35
    - point: 相邻现有厂商已经靠代码、数据、测试和流程智能工具吃住了部分预算。
      sourceRefs:
        - 17
        - 21
        - 25
        - 27
        - 30
        - 31
competitors:
  - name: Qorelo
    stage: 种子期
    wedge: 面向 SAP 团队的 AI 交付系统，覆盖 fit-gap 分析、范围映射、文档和迁移指导。
    pricing: 未披露 / 企业询价
    strength: 公开市场上最像这条 thesis 的产品，已经拿到 DACH 汽车客户的早期牵引，定位也直接卡在顾问密集型迁移工作上。
    weaknessVsUs: 现在的公开定位同时覆盖咨询公司和企业，新进入者仍可以通过死磕区域型 SI 的 fixed-fee 范围包和透明估算依据，把差异拉开。
    sourceRefs:
      - 1
      - 2
      - 3
      - 5
      - 6
  - name: smartShift
    stage: 扩张期
    wedge: 围绕 SAP 定制代码生命周期管理、Clean Core 和 S/4HANA 整改的受控自动化。
    pricing: 企业询价 / 走 SAP Store 采购
    strength: ABAP 自动化的可信度很深，fixed-price、fixed-timeline 话术也站得住，还验证了 SAP 买家愿意为窄现代化层买单。
    weaknessVsUs: 它是代码中心，不是把 fit-gap、backlog、workshop 和排人假设一起收进系统记录层。
    sourceRefs:
      - 17
      - 18
      - 19
  - name: Natuvion
    stage: 扩张期
    wedge: 面向 SAP 项目的转型准备、数据与系统分析，以及选择性数据迁移。
    pricing: 定制报价
    strength: 前置分析和迁移工厂能力都很强，对数据质量和停机风险的叙事也成熟。
    weaknessVsUs: 更偏转型路径和数据转换，不是给区域型 SI 用的 AI-first discovery copilot。
    sourceRefs:
      - 21
      - 22
      - 23
      - 24
  - name: SNP
    stage: 现有厂商
    wedge: 通过 CrystalBridge 和伙伴驱动的 BLUEFIELD 交付，自动规划 S/4HANA 迁移路径，并追求近零停机执行。
    pricing: 定制报价
    strength: 大企业可信度高，路径仿真和伙伴训练动作也成熟，能顺着 SI 放大。
    weaknessVsUs: 核心仍在迁移执行路径和数据移动，而不是结构化的 workshop 推理和 pre-SOW 知识沉淀。
    sourceRefs:
      - 25
      - 26
  - name: Tricentis
    stage: 现有厂商
    wedge: 接进 SAP Cloud ALM 的影响分析、测试自动化和 go / no-go 放行。
    pricing: 定制报价 / 演示驱动
    strength: SAP QA 和发布保障分发都很强，还有 SAP 官方背书的 Cloud ALM 集成。
    weaknessVsUs: 它的切口出现在生命周期更后段，很多 fit-gap 和范围决策那时已经锁死。
    sourceRefs:
      - 27
      - 28
      - 29
regulatoryTechnicalConstraints:
  - point: 凡是会影响流程适配、控制项或排人假设的 AI 建议，都必须带日志、文档、人工监督和审计轨迹。
    sourceRefs:
      - 34
      - 35
      - 36
  - point: ERP 抽取和 workshop 纪要里可能带个人数据或受监管的运营数据，所以买家会偏好客户可控部署和清晰的 GDPR 立场。
    sourceRefs:
      - 4
      - 33
      - 35
  - point: 范围质量高度依赖深度代码、依赖和上下文摄取；没有系统分析输入、只靠浅层 copilot，效果一定不够。
    sourceRefs:
      - 3
      - 16
      - 18
      - 22
      - 25
      - 27
validationSignals:
  - point: Qorelo 上线 5 个月就融到种子轮，还说 Mercedes-Benz 或一家德国头部汽车企业已经真实在用，这说明这条切口确实能打动要求很高的买家。
    sourceRefs:
      - 5
      - 6
  - point: smartShift 说 95% 的受访 SAP 用户都跑定制 ABAP，又有 SAP Store 分发、3,300 套已改造系统和 35 亿行代码，说明相邻预算是真存在的。
    sourceRefs:
      - 18
  - point: SNP 与 Wipro、再加上 SAP 与 Tricentis，都说明生态玩家已经愿意把第三方现代化工具接进主流交付动作。
    sourceRefs:
      - 26
      - 28
  - point: Natuvion 发现 32% 的公司下次会更早引入外部顾问，这几乎就是在直接指向前置分析工具和准备纪律的需求。
    sourceRefs:
      - 23
openQuestions:
  - 区域型 SAP boutique 会从交付毛利预算里掏钱，还是只有软件能白标塞进 discovery 服务时才愿意买？
  - 在客户系统访问仍然受限的阶段，真正足够早、足够完整的 ECC 证据到底能拿到多少？
  - 产品第一次落地时，能不能在定范围准确度上赢过资深架构师，而不只是更快把文档生成出来？
  - 面对汽车和工业客户，SAP BTP、私有云和本地部署到底哪种模式最容易过安全评审？
