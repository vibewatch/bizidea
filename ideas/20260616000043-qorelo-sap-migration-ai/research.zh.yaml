reportMemo:
  executiveTakeaways:
    - 近两年的窗口是真的在收缩：ASUG 说 30% 的受访者预计会在未来 6 到 24 个月上线 S/4HANA，Precisely 说 59% 已经全部或部分上线，DSAG 相关报道则说，德语区用户里只有 27% 预计能在 2027 年前做完 [7, 8, 12]。
    - 利润最容易漏在 discovery：ASUG 说顾问费是迁移里最常见的意外成本，Precisely 说业务流程变化、定制化和需求定义仍是主要障碍，Natuvion 则发现 30% 的公司直接跳过分析，35% 直到转型过程中才发现知识断层 [7, 8, 23]。
    - 竞品确实多，但很碎。smartShift 最强在定制代码分析，SNP 和 Natuvion 强在迁移路径与数据过渡，Tricentis 强在影响分析和测试，Celonis 强在流程智能。还没有哪家现有厂商，能把面向集成商的 fit-gap、backlog、估算和知识交接自动化收进同一条工作流 [17, 18, 21, 24, 25, 27, 30, 31]。
    - 付费意愿是有的，因为高级 SAP 人才既贵又缺：英国 lead S/4HANA 架构师日费大多落在 £900 到 £1,150，德国则在 €800 到 €1,200；只要每个 fixed-fee discovery 少烧几周架构师时间，或者少踩一次范围不准的坑，中五位数的软件预算就说得过去 [13, 14, 15]。
    - 最终能不能落地，卡的不在模型分数，而在信任和部署姿态。GDPR、EU AI Act 和英国 ICO 指南都会把买家推向人类监督、可追溯和受控数据处理；而 Qorelo 已经在卖私有云、BTP 和本地部署，并强调德国数据驻留 [4, 33, 34, 35, 36]。
  marketDefinition: 这类软件把 ECC 使用情况、定制代码、fit-gap workshop 输入和 SAP Best Practices 映射，收束成面向集成商和企业 CoE 的可审计 S/4HANA 范围包。它夹在定制代码分析、选择性数据迁移工厂、测试与影响分析套件，以及流程挖掘之间——位置在 build、test、cutover 之前，但又比通用 AI 助手更贴近真实交付 [2, 3, 17, 21, 22, 24, 25, 27, 30, 31]。
  customerAndBuyer: 核心用户是跑 brownfield discovery 的 SAP 业务负责人、首席架构师，以及 PMO 或 CoE 团队。Qorelo 公开就把咨询公司和企业都列为目标，还点名解决方案架构师、流程负责人、职能负责人、PMO 和 SAP CoE 团队是用户；ASUG 和 Precisely 的数据也说明，随着更多客户逼近上线，顾问和伙伴产能正变得更紧 [5, 6, 7, 8]。真正掏钱的，通常是管投标毛利、排人和进度风险的 SAP 业务负责人、交付副总裁或 CIO [5, 6]。
  buyingTriggers:
    - point: 未来 6 到 24 个月里，RFP 积压或上线窗口集中压过来，discovery 吞吐就会变成卡点资源。
      sourceRefs:
        - 7
        - 8
        - 9
        - 12
    - point: 顾问费、流程复杂度或定制化，把 discovery 和迁移预算推高到计划之外。
      sourceRefs:
        - 7
        - 8
        - 10
        - 23
    - point: 定制代码和 fit-gap 的不确定性迟迟没解，因为只有 38% 的组织说自己有详细的定制代码迁移策略。
      sourceRefs:
        - 16
        - 18
        - 19
  willingnessToPay:
    summary: 预算科目不是 AI 试验，而是放大架构师产能、躲开超支。ASUG 说顾问费是迁移里最常见的意外成本，公开费率又显示英德两地资深 S/4HANA 负责人日费都在高三位到低四位。只要一个范围编译器能在固定价 discovery 里省下几周架构师时间，或者少掉一条范围不准的工作流，中五位数的单项目软件费就很好解释。
    sourceRefs:
      - 7
      - 13
      - 14
      - 15
  competitiveLandscape: 竞争大致分层。Qorelo 是最接近这条 thesis 的公开对照物，已经在承诺给 SAP 团队做 fit-gap、文档和迁移指导 [1, 2, 3, 5, 6]。smartShift 证明买家愿意为围绕定制代码和 Clean Core 的受控自动化买单，但它的重心仍然是代码生命周期管理 [17, 18, 19]。SNP 和 Natuvion 主打的是迁移路径、数据迁移和近零停机工厂，而不是给集成商用的范围包生成 [21, 22, 24, 25, 26]。Tricentis 在生命周期后段拿着影响分析和测试信心，Celonis 则掌握跨系统的流程智能和现代化可视性 [27, 28, 29, 30, 31]。最大的替代品仍然是人：资深架构师、离岸分析师、Excel 范围表，以及 SI discovery workshop [6, 7, 13, 23]。
  incumbentThesis:
    - incumbentClass: SAP 生态基础设施
      point: SAP 周边基础设施会通过 SAP Store、Cloud ALM、BTP 和私有云托管影响采购和部署，但它们默认并不解决面向顾问的范围综合，也不解决 fixed-fee discovery 的单位经济。
      sourceRefs:
        - 4
        - 18
        - 28
    - incumbentClass: 定制代码自动化厂商
      point: smartShift 在 ABAP 分析和 Clean Core 整改这类瓶颈上很可信，但这家创业公司只有在自己从代码扩到 workshop 判断、流程定范围、排人假设和交接知识时，才有机会赢。
      sourceRefs:
        - 17
        - 18
        - 19
    - incumbentClass: 转型工厂
      point: 买家如果要的是成熟迁移路径、选择性数据迁移，或伙伴工厂模式，Natuvion 和 SNP 很强；但两者的中心都在转型执行路径和数据移动，不是 AI-first 的 pre-SOW 范围起草。
      sourceRefs:
        - 21
        - 22
        - 24
        - 25
        - 26
    - incumbentClass: 测试与影响分析套件
      point: Tricentis 在 SAP 发布保障和 SAP 背书发行上很强，但那个优势出现在更后面：等关键 fit-gap 和 backlog 决策都已经定完之后。
      sourceRefs:
        - 27
        - 28
        - 29
    - incumbentClass: 流程智能平台
      point: Celonis 可以替代人工流程映射 workshop，也能给出数字孪生，但默认不会把 discovery 产物直接变成可审计的 RICEFW backlog 和商业估算。
      sourceRefs:
        - 30
        - 31
  regulatoryLandscape: 这个直接市场本身监管不算重，但产品会碰到 ERP 抽取和 workshop 纪要里的敏感运营数据，甚至个人数据。GDPR 规定了合法处理、目的限制和数据主体权利；EU AI Act 把日志、文档、人类监督和稳健性门槛抬高了；英国买家则会按 ICO 的 AI 指南来对照。落到执行上，企业供应商必须把 DPA、可追踪性和让数据始终留在客户控制下的部署选项做清楚 [4, 33, 34, 35, 36]。
  technologyLandscape: 底层栈正在收敛：ABAP 仓库完整分析、系统与依赖映射、选择性数据迁移、影响分析、流程挖掘和私有云部署，这些组件今天都已经存在。Qorelo、smartShift、Natuvion、SNP、Tricentis 和 Celonis 各自证明了其中一段；空白处在于，还没人把这些输入统一成一条给 SI 用的工作流，直接产出 fit-gap 决策、范围假设和知识交接 [2, 3, 17, 18, 21, 22, 24, 25, 27, 30, 31]。
  distributionChannels:
    - point: 直接卖进 fixed-fee brownfield discovery 压力大、架构师瓶颈也最明显的区域型 SI 业务线。
      sourceRefs:
        - 5
        - 6
        - 7
    - point: 借 SAP 周边生态基础设施做联合销售或缩短采购，比如已经在 SAP Store 或 Cloud ALM 体系里建立信任的关系。
      sourceRefs:
        - 18
        - 26
        - 28
    - point: 围绕一个真实 discovery 包或流程塔做共创试点，先证明需求到 best-practice 映射更快、前置分析更扎实，再扩。
      sourceRefs:
        - 20
        - 21
        - 23
  partnershipEcosystem:
    - point: SAP 周边采购通道很重要：smartShift 通过 SAP Store 卖货，Tricentis 又接进了 SAP Cloud ALM，这都说明生态信任确实能压缩企业采购摩擦。
      sourceRefs:
        - 18
        - 28
    - point: 大型 SI 赋能也很关键：SNP 和 Wipro 一起建了转型能力中心，去培训和认证顾问如何使用迁移平台；这套 playbook 创业公司完全可以复制到区域型 boutique 身上。
      sourceRefs:
        - 26
    - point: 流程智能、代码分析和测试伙伴，不一定是正面对手。它们已经能抓到 event log、依赖和质量信号，完全可以反过来给范围编译器喂 discovery 输入。
      sourceRefs:
        - 18
        - 22
        - 27
        - 30
        - 31
  dataMoats:
    - point: fit-gap 决策、定制代码保留/退役判断，以及已定范围与真实交付偏差，只要跨项目积起来，就能滚成一套专有定价和风险模型。
      sourceRefs:
        - 2
        - 3
        - 7
        - 23
    - point: 把仓库级代码分析、系统依赖和流程挖掘 event log 连到一起，训练数据会比泛 copilot 或纯人工 workshop 丰富得多。
      sourceRefs:
        - 18
        - 22
        - 27
        - 30
    - point: 私有云和本地部署让客户始终掌控敏感 SAP 数据，这既提高了采用概率，也能让企业专属反馈闭环滚得更久。
      sourceRefs:
        - 4
  geographicConsiderations:
    - point: DACH 是最清楚的起步地带，因为 Qorelo 已经说自己在德国汽车行业拿到了早期牵引，而 DSAG 相关报道又表明，德语区有一半客户预计会错过 2027 年节点。
      sourceRefs:
        - 5
        - 6
        - 12
    - point: 制造业是更强的第一垂直，因为 Avasant 说制造、零售和公用事业占掉了过半的 S/4HANA 服务需求；Natuvion 也把汽车和工业点成受冲击最重的转型群体。
      sourceRefs:
        - 11
        - 23
    - point: 英国也很适合做伙伴驱动的 discovery，因为公开 contractor 基准说明 SAP 架构师市场依旧活跃，而且日费足够高，放大架构师产能这笔账很好算。
      sourceRefs:
        - 13
        - 14
        - 15
  sensitivityCases:
    - case: 如果 SAP 在实际执行上把截止期明显放宽到 2030 或 2033
      impact: 紧迫性会松掉，话术也会从“压缩截止期”转向“守毛利、留知识、压低低价误报风险”。
      sourceRefs:
        - 9
        - 12
        - 32
    - case: 如果买家满足于点工具加 SI 人力，而不愿上新的范围编译器
      impact: 创业公司就必须证明，自己卖的是跨产物综合和 fixed-fee discovery ROI，而不是一层泛 productivity。
      sourceRefs:
        - 17
        - 21
        - 25
        - 27
        - 30
        - 31
    - case: 如果高级 SAP 人才更好招，或者明显变便宜
      impact: 付费意愿会被压缩，因为“放大架构师产能”这笔账本身变弱了。
      sourceRefs:
        - 13
        - 14
        - 15
  validationPlan:
    - priority: 高
      question: 区域型 SI 会直接掏钱，还是坚持把软件裹进可计费 discovery 服务里？
      evidenceToGather: 访谈 10 家 DACH 或英国 SAP boutique，聊清楚毛利流失、打包方式、转售意愿，以及 fixed-fee discovery 包对白标的要求。
    - priority: 高
      question: 第一版范围包里，到底哪类输入最能建立信任：原始 ECC 使用情况、定制代码分析、workshop 纪要，还是带基准的历史项目？
      evidenceToGather: 跑 3 个试点范围包，量一量架构师在 fit-gap 决策、RICEFW backlog 项和排人假设上，究竟改了什么、拒了什么、接受了什么。
    - priority: 中
      question: 部署方式和数据驻留，能不能快到足以支撑 pre-SOW 使用？
      evidenceToGather: 拿私有云、BTP 和本地部署三种方案，分别配 DPA 评审，和一家汽车零部件客户、一家区域型 SI 共创客户做测试。
analysisModels:
  marketMapDiagram:
    title: SAP discovery 市场图谱
    mermaid: |
      quadrantChart
        title SAP migration discovery market map
        x-axis 交付后段执行 --> Pre-SOW discovery
        y-axis 人力服务重 --> 产品化自动化
        Tricentis: [0.28, 0.56]
        Natuvion: [0.52, 0.42]
        SNP: [0.56, 0.58]
        smartShift: [0.70, 0.74]
