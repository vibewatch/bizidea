  fiveForces:
    supplierPower:
      score: 3
      rationale: 产品确实依赖 SAP 数据访问、云基础设施和伙伴渠道，但私有云、BTP 和本地部署三种姿态，再加上多家互补供应商，足以避免任何一个点卡死全局。
      sourceRefs:
        - 4
        - 18
        - 26
    buyerPower:
      score: 4
      rationale: 买家完全可以把 discovery 继续塞进服务里，也可以把代码、数据、测试和流程工具拼着用，甚至靠延长支持把迁移往后拖，所以软件必须证明 ROI 足够硬。
      sourceRefs:
        - 7
        - 13
        - 25
        - 32
    threatOfEntrants:
      score: 3
      rationale: LLM 基础设施把搭产品的门槛压低了，但企业信任、SAP 产物访问权和渠道可信度，依然是很现实的壁垒。
      sourceRefs:
        - 1
        - 4
        - 17
        - 26
    threatOfSubstitutes:
      score: 5
      rationale: 对大多数买家来说，默认替代品仍然是人工架构师主导的 discovery、offshore 分析师、Excel 表，以及相邻点工具。
      sourceRefs:
        - 6
        - 7
        - 16
        - 23
    competitiveRivalry:
      score: 4
      rationale: 竞争不轻，因为强势相邻现有厂商已经吃下了代码分析、数据迁移、测试和流程智能预算；只是“discovery 指挥层”这条精确切口还空着。
      sourceRefs:
        - 17
        - 21
        - 25
        - 27
        - 30
        - 31
  pestle:
    - factor: 政治
      impact: neutral
      point: 政策压力是间接的，主要通过 AI 治理预期传导，而不是 SAP 专项监管。
      sourceRefs:
        - 34
        - 35
        - 36
    - factor: 经济
      impact: positive
      point: 截止期压力叠加高价架构师人力，让能压缩 discovery 工作量的软件 ROI 非常直观。
      sourceRefs:
        - 7
        - 13
        - 14
        - 15
    - factor: 社会
      impact: positive
      point: 顾问稀缺、组织知识又断层，让“把专家判断结构化留住”这件事变得更值钱。
      sourceRefs:
        - 8
        - 19
        - 23
    - factor: 技术
      impact: positive
      point: 流程挖掘、代码分析、选择性数据迁移和影响分析这几层都成熟得多了，自动化 discovery 比几年前现实得多。
      sourceRefs:
        - 2
        - 18
        - 22
        - 27
        - 30
        - 31
    - factor: 法律
      impact: negative
      point: 只要 AI 建议开始影响流程适配、控制项或排人假设，就必须把可审计性、数据保护和人工监督做全。
      sourceRefs:
        - 4
        - 33
        - 34
        - 35
        - 36
    - factor: 环境
      impact: neutral
      point: 环保叙事不是主驱动；基础设施现代化也许能当陪衬，但并不会直接触发 SAP discovery 软件采购。
      sourceRefs:
        - 4
        - 11
  adoptionFrictionMatrix:
    - friction: 黑盒估算不被信任
      severity: 高
      affectedBuyer: 交付副总裁或首席架构师
      mitigation: 所有关键建议都保留人工审批门，逐条连回源产物，再用 forecast-versus-actual 记分卡把后验结果摊开。
      sourceRefs:
        - 4
        - 34
        - 35
        - 36
    - friction: 旧数据太脏，定制代码熵太高
      severity: 高
      affectedBuyer: 解决方案架构师
      mitigation: 先从代码分析、依赖映射和只读系统证据切进去，别一开始就承诺全自动定范围。
      sourceRefs:
        - 3
        - 16
        - 18
        - 22
    - friction: 和系统集成商的渠道冲突
      severity: 中
      affectedBuyer: 管理合伙人或业务负责人
      mitigation: 把产品讲成产能放大器和白标 discovery 引擎，而不是“替代服务”的故事。
      sourceRefs:
        - 5
        - 6
        - 26
    - friction: 安全与数据驻留评审
      severity: 高
      affectedBuyer: CIO 或安全负责人
      mitigation: 提供私有云、BTP 和本地部署，再把 GDPR 和 AI 治理控制项文档化。
      sourceRefs:
        - 4
        - 33
        - 35
    - friction: 变更管理和知识断层
      severity: 中
      affectedBuyer: 初级顾问和 PMO
      mitigation: 首个部署只咬住一个真实 discovery 包，用它把判断依据编码下来，让新人可以直接接班。
      sourceRefs:
        - 19
        - 23
