topRisks:
  - name: Channel conflict
    description: Large integrators or SAP ecosystem partners may resist a product that exposes weak scoping discipline or compresses billable discovery work.
    mitigation: Start with regional integrators whose margins depend on faster discovery, and package outputs so partners can white-label them into their own delivery motions.
  - name: Estimate trust
    description: Buyers will not sign multi-million SOWs from black-box AI recommendations.
    mitigation: Make every recommendation traceable to source artifacts, require architect approval, and show forecast-versus-actual variance over time.
  - name: Messy source data
    description: Legacy SAP estates may not provide clean usage, custom-code, or workshop data in the format the model expects.
    mitigation: Begin with opinionated ingestion for the most common ECC artifacts and pair the product with guided workshop capture to fill missing context.
