differentiator: >-
  Most ERP migration startups attack cutover, testing, or broad program
  management after the statement of work is already set. This company wins
  earlier, at the scoping moment where margin, staffing, and schedule are
  determined and where the talent bottleneck is most acute. By capturing
  decision rationale and actual variance across many migrations, it builds a
  proprietary corpus of how specific process patterns translate into effort,
  which generic copilots and labor-heavy integrators do not own.
