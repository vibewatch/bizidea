jobsToBeDone:
  - job: >-
      When a new ECC-to-S/4HANA opportunity enters discovery, help a SAP
      practice lead turn raw system evidence and workshop notes into a
      defensible scope, so they can quote profitably and start faster.
    currentAlternative: Senior-architect-led spreadsheet scoping and workshop recap decks
    successMetric: Days from discovery kickoff to approved statement of work
  - job: >-
      When a principal architect is stretched across several migrations, help
      junior consultants inherit fit-gap decisions and backlog rationale, so
      they can execute without repeating workshops or losing context.
    currentAlternative: Tribal knowledge in slide decks, emails, and meeting notes
    successMetric: Scope variance and rework hours during the first 90 days of delivery
