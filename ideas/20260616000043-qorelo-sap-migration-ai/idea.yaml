problem: >-
  SAP S/4HANA programs often go off the rails before delivery even starts
  because scope, custom-code triage, and workshop decisions live in senior
  architects' heads and scattered spreadsheets. Regional integrators and
  internal SAP CoEs cannot inspect thousands of custom objects, process
  variants, and fit-gap notes fast enough to price and launch projects with
  confidence. That leads to underbid statements of work, surprise change
  orders, junior teams that lack context, and more programs missing a deadline
  that only 8% already hit on time.
targetUser:
  primary: Practice leads and delivery directors at DACH and UK SAP-focused system integrators running brownfield ECC-to-S/4HANA migrations for automotive suppliers and industrial manufacturers
  secondary: Principal SAP solution architects and enterprise SAP CoE leads who own fit-gap analysis, custom code retirement, and RICEFW backlog creation
  buyer: VP Delivery or managing partner of the SAP transformation practice
startupThesis:
  nonObviousInsight: >-
    The true scarcity in the 2027 migration wave is not generic developer time;
    it is senior-architect judgment during discovery. LLMs can now read ECC
    usage data, custom-code inventories, transport history, and workshop
    transcripts well enough to draft auditable scope decisions, so firms can
    productize architect judgment instead of staffing every project with the
    same few experts.
  beachhead: >-
    Regional SAP system integrators in Germany and the UK with 20-150
    consultants serving automotive suppliers and industrial manufacturers on
    brownfield ECC-to-S/4HANA programs that must be scoped in the next two
    quarters
  wedge: >-
    A migration scope compiler that ingests ECC usage reports, custom-code
    inventories, transport history, and workshop transcripts to auto-generate
    fit-gap decisions, RICEFW backlogs, effort estimates, staffing assumptions,
    and knowledge handoff packs
  whyNowCatalyst: >-
    Qorelo's seed round, early automotive traction, and explicit data that
    35,000 SAP customers face 2027 while only 8% finish on time show that
    discovery capacity is becoming a purchase driver now.
  ventureScalePath: >-
    Start with SAP discovery and project kickoff, then expand into change-impact
    analysis, test coverage generation, delivery QA, hypercare benchmarking, and
    eventually the operating system for repeated ERP transformation programs
    across SAP, Oracle, and adjacent enterprise stacks.
solution: >-
  The product plugs into SAP ECC usage reports, custom-code inventories,
  transport histories, and workshop transcripts the moment a migration is being
  quoted or kicked off. It produces an auditable scope pack: processes touched,
  custom objects to retire versus rebuild, fit-gap decisions, a RICEFW backlog,
  effort estimates, and staffing assumptions. Senior architects review and edit
  each recommendation, while junior consultants inherit linked rationale rather
  than tribal knowledge trapped in meeting notes. Integrators also get variance
  tracking between scoped and delivered work, so the model learns which
  industries, plants, and process areas create change-order risk. Over time the
  company becomes the system of record for migration discovery and the benchmark
  dataset on how SAP transformations actually unfold.
goToMarketSeed:
  firstCustomer: >-
    A 50- to 200-person SAP boutique integrator in Germany with multiple
    automotive-supplier S/4HANA RFPs, fixed-fee discovery packages, and fewer
    than five principal architects able to sign off scope
  buyingTrigger: >-
    A spike in fixed-fee migration RFPs or a delivery review showing that
    principal architects are bottlenecking discovery workshops and initial SOWs
    ahead of the 2027 deadline
  currentAlternative: >-
    Senior SAP architects and offshore analysts manually stitching together ECC
    usage reports, custom-code exports, Excel scope sheets, and workshop notes
  switchingReason: >-
    The wedge lets one principal architect review machine-generated backlog and
    estimate rationales instead of building them from scratch, improving bid hit
    rate and delivery margin while onboarding junior consultants faster.
  pricingHypothesis: >-
    Per scoped migration plus annual practice subscriptions, with pricing tied
    to analyzed process objects or custom objects; initial land at €25k-€75k
    per discovery and six-figure annual practice deals for high-volume partners
