    - 29
  - incumbentClass: Process intelligence platforms
    point: Celonis can replace manual process-mapping workshops and provide a digital twin, but it stops short of turning discovery artifacts into an auditable RICEFW backlog and commercial estimate by default.
    sourceRefs:
