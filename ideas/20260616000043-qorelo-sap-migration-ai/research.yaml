  regulatoryLandscape: The direct market is not heavily sector-regulated, but the product touches sensitive operational and potentially personal data inside ERP extracts and workshop transcripts. GDPR sets baseline obligations for lawful processing, purpose limitation, and data subject rights; the EU AI Act raises the bar on logging, documentation, human oversight, and robustness for higher-risk deployments; UK buyers will map similar expectations through ICO AI guidance. In practice, enterprise vendors need clear DPAs, traceability, and deployment options that keep data under customer control [4, 33, 34, 35, 36].
  technologyLandscape: The enabling stack is converging around complete ABAP repository analysis, system and dependency mapping, selective data transition, impact analysis, process mining, and private-cloud deployment. Qorelo, smartShift, Natuvion, SNP, Tricentis, and Celonis each prove part of the stack exists today; the whitespace is a single workflow that unifies those inputs into fit-gap decisions, scope assumptions, and knowledge handoff for SIs [2, 3, 17, 18, 21, 22, 24, 25, 27, 30, 31].
