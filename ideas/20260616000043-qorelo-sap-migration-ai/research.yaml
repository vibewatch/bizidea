competitors:
- name: Qorelo
  stage: seed
  wedge: AI delivery system for SAP teams spanning fit-gap analysis, scope mapping, documentation, and migration guidance.
  pricing: Undisclosed / enterprise quote
  strength: Closest public analogue to the thesis, with early DACH automotive traction and explicit positioning around consultant-heavy migration work.
  weaknessVsUs: Public positioning still spans consultancies and enterprises broadly; a new entrant can differentiate by obsessing over regional-SI fixed-fee scoping packs and transparent estimate rationale.
  sourceRefs:
  - 1
  - 2
  - 3
  - 5
  - 6
- name: smartShift
  stage: scale-up
  wedge: Governed automation for SAP custom-code lifecycle management, Clean Core, and S/4HANA remediation.
  pricing: Enterprise quote / SAP Store-led purchase
  strength: Deep ABAP automation credibility, fixed-price and fixed-timeline execution language, and proof that SAP buyers pay for narrow modernization layers.
  weaknessVsUs: Code-centric rather than a full fit-gap, backlog, workshop, and staffing-assumption system of record.
  sourceRefs:
  - 17
  - 18
  - 19
- name: Natuvion
  stage: scale-up
  wedge: Transformation preparation, data and system analysis, and selective data transition for SAP programs.
  pricing: Custom quote
  strength: Strong prep-analysis and migration-factory pedigree with credible data-quality and downtime framing.
  weaknessVsUs: More transformation-path and data-conversion oriented than AI-first discovery copilot for regional SIs.
  sourceRefs:
  - 21
  - 22
  - 23
  - 24
- name: SNP
  stage: incumbent
  wedge: Automated S/4HANA migration pathing and near-zero-downtime execution via CrystalBridge and partner-enabled BLUEFIELD delivery.
  pricing: Custom quote
  strength: Large-enterprise credibility, scenario simulation, and partner-training motions that scale through SIs.
  weaknessVsUs: Centers on migration execution path and data movement more than structured workshop reasoning and pre-SOW knowledge capture.
  sourceRefs:
  - 25
  - 26
- name: Tricentis
  stage: incumbent
  wedge: SAP impact analysis, testing automation, and go or no-go assurance integrated with SAP Cloud ALM.
  pricing: Custom quote / demo-led
  strength: Strong SAP QA and release-assurance distribution, including SAP-backed Cloud ALM integration.
  weaknessVsUs: Lives later in the lifecycle, after many fit-gap and scope decisions are already locked.
  sourceRefs:
  - 27
  - 28
  - 29
