  validationPlan:
  - priority: high
    question: Will regional SIs pay directly, or expect the software to be wrapped inside billable discovery services?
    evidenceToGather: Interview 10 DACH or UK SAP boutiques on margin leakage, packaging, reseller appetite, and white-label requirements for fixed-fee discovery packs.
  - priority: high
