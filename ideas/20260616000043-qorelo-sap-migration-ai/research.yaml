reportMemo:
  executiveTakeaways:
  - 'The near-term window is real: ASUG says 30% of respondents expect S/4HANA go-live in the next six to 24 months, Precisely says 59% are fully or partially live, and DSAG-linked reporting says only 27% of German-speaking users expect to finish by 2027 [7, 8, 12].'
  - 'Discovery is where margin leaks: ASUG says consulting fees are the main unexpected migration cost, Precisely says business process change, customizations, and defining requirements remain major barriers, and Natuvion found 30% of companies skipped analysis and 35% only discovered knowledge gaps during transformation [7, 8, 23].'
  - The competitive set is real but fragmented. smartShift is strongest on custom-code analysis, SNP and Natuvion on transformation path and data transition, Tricentis on impact analysis and testing, and Celonis on process intelligence. No incumbent clearly owns integrator-first fit-gap, backlog, estimate, and knowledge-handoff automation in one workflow [17, 18, 21, 24, 25, 27, 30, 31].
  - 'Willingness to pay exists because senior SAP talent is expensive and scarce: lead S/4HANA rates cluster around £900 to £1,150 per day in the UK and €800 to €1,200 per day in Germany, while overrun and schedule pressure make even modest discovery productivity gains financially meaningful [13, 14, 15].'
  - Adoption will hinge on trust and deployment posture, not raw model quality. GDPR, the EU AI Act, and UK ICO guidance all push toward human oversight, traceability, and controlled data handling, while Qorelo already markets private-cloud, BTP, and on-prem deployment with German data residency [4, 33, 34, 35, 36].
  marketDefinition: 'Software that turns ECC usage, custom code, fit-gap workshop inputs, and SAP Best Practices mapping into auditable S/4HANA scope packs for integrators and enterprise CoEs. It sits between custom-code analysis, selective-data-transition factories, testing and impact-analysis suites, and process mining: upstream of build, test, and cutover, but downstream of generic AI assistants [2, 3, 17, 21, 22, 24, 25, 27, 30, 31].'
  customerAndBuyer: Primary users are practice leads, principal architects, and PMO or CoE teams running brownfield discovery. Qorelo explicitly targets consultancies and enterprises, naming solution architects, process owners, functional leads, PMO, and SAP CoE teams as users, while ASUG and Precisely show consultant and partner capacity tightening as more customers move toward go-live [5, 6, 7, 8]. The economic buyer is usually the SAP practice leader, VP Delivery, or CIO who owns bid margin, staffing, and schedule risk [5, 6].
  buyingTriggers:
  - point: A backlog of RFPs or go-lives lands inside the next six to 24 months, so discovery throughput becomes the gating resource.
    sourceRefs:
    - 7
    - 8
    - 9
    - 12
  - point: Consulting fees, process complexity, or customizations push discovery and migration budgets beyond plan.
    sourceRefs:
    - 7
    - 8
    - 10
    - 23
  - point: Custom code and fit-gap ambiguity remain unresolved because only 38% of organizations report a detailed custom-code migration strategy.
    sourceRefs:
    - 16
    - 18
    - 19
  willingnessToPay:
    summary: The budget line is not AI experimentation; it is architect leverage and overrun avoidance. ASUG says consulting fees are the main source of unexpected migration cost, while public rate data puts senior S/4HANA leads in the high hundreds per day in both the UK and Germany. If a scope compiler saves even a few architect-weeks per fixed-fee discovery or prevents one under-scoped workstream, mid-five-figure per-project software spend is easy to justify.
    sourceRefs:
    - 7
    - 13
    - 14
    - 15
  competitiveLandscape: 'Competition clusters by layer. Qorelo is the closest direct analogue, already promising fit-gap, documentation, and migration guidance for SAP teams [1, 2, 3, 5, 6]. smartShift proves buyers will pay for governed automation around custom code and Clean Core, but its center of gravity is code lifecycle management [17, 18, 19]. SNP and Natuvion lead with migration-path, data-transition, and near-zero-downtime factories rather than integrator-first scope-pack generation [21, 22, 24, 25, 26]. Tricentis owns impact analysis and testing confidence later in the lifecycle, while Celonis owns process intelligence and modernization visibility across systems [27, 28, 29, 30, 31]. The biggest substitute remains human: senior architects, offshore analysts, Excel scope sheets, and SI discovery workshops [6, 7, 13, 23].'
  incumbentThesis:
  - incumbentClass: SAP ecosystem rails
    point: SAP-adjacent rails shape procurement and deployment through SAP Store, Cloud ALM, BTP, and private-cloud hosting, but they do not solve consultant-specific scope synthesis or fixed-fee discovery economics by default.
    sourceRefs:
    - 4
    - 18
    - 28
  - incumbentClass: Custom code automation vendors
    point: smartShift is credible where the bottleneck is ABAP analysis and Clean Core remediation, but the proposed startup wins only if it expands beyond code to workshop reasoning, process scoping, staffing assumptions, and handoff knowledge.
    sourceRefs:
    - 17
    - 18
    - 19
  - incumbentClass: Transformation factories
    point: Natuvion and SNP are strong when buyers want a proven migration path, selective data transition, or partner-enabled factory model, yet both center on transformation execution path and data movement rather than AI-first pre-SOW scope authoring.
    sourceRefs:
    - 21
    - 22
    - 24
    - 25
    - 26
  - incumbentClass: Testing and impact-analysis suites
    point: Tricentis has powerful SAP release assurance and SAP-backed distribution, but that advantage sits later, after key fit-gap and backlog decisions are already made.
    sourceRefs:
