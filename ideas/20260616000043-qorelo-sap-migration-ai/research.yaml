openQuestions:
- Will regional SAP boutiques pay from delivery-margin budgets, or only if the software can be white-labeled inside their discovery services?
- How much of the required ECC evidence is realistically available early enough to shape bids when customer system access is still restricted?
- Can the product prove better scoping accuracy than senior architects on first deployment, not just faster artifact generation?
- Which deployment model — SAP BTP, private cloud, or on-prem — clears automotive and industrial security review fastest?
