  - variable: "ARPU"
    downsideCase: "$105K base ACV and $129K expansion ACV"
    baseCase: "$117K base ACV and $138K expansion ACV"
    upsideCase: "$123K base ACV and $144K expansion ACV"
    y3RevenueImpactK: -207.3
    cashImpactK: -149.0
  - variable: "CAC"
    downsideCase: "$95K per new account from slower conversion and more solution-engineering time"
    baseCase: "$82K per new account"
    upsideCase: "$70K per new account via referrals and cleaner pilots"
    y3RevenueImpactK: 0.0
    cashImpactK: -195.0
  - variable: "churn"
    downsideCase: "1.8% monthly churn if pilot proof does not translate into durable practice adoption"
    baseCase: "1.2% monthly churn"
    upsideCase: "0.8% monthly churn if the workflow becomes the system of record for repeat scopes"
    y3RevenueImpactK: -124.0
    cashImpactK: -96.0
  - variable: "sales cycle"
    downsideCase: "8 months because security review and messy ECC data delay annual conversion"
    baseCase: "6 months"
    upsideCase: "4.5 months after repeatable deployment playbooks are proven"
    y3RevenueImpactK: -260.0
    cashImpactK: -210.0
  - variable: "gross margin"
    downsideCase: "70% steady-state margin if human review and deployment work stay heavy"
    baseCase: "72.6% blended Y3 margin"
    upsideCase: "74% blended Y3 margin"
    y3RevenueImpactK: 0.0
    cashImpactK: -70.0
  - variable: "hiring pace"
    downsideCase: "Add GTM and customer-success hires one quarter earlier than plan"
    baseCase: "Hire on the modeled M16/M19/M27 schedule"
    upsideCase: "Delay one non-critical post-sale hire until after the 10th account"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> AnnualSubscriptions
      AnnualSubscriptions --> ExpansionModules
      AnnualSubscriptions --> GrossProfit
      ExpansionModules --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from reaching 20 paying practices or CoEs by Q4Y3 while moving retained accounts from $117K land ACV toward $138K expanded ACV."
  - checkName: "Must go right"
    finding: "The company has to keep pilot-to-annual conversion above 50% and make the M16 GTM hire productive without breaking the trust-heavy implementation motion."
  - checkName: "Model breaks if"
    finding: "If security review or data quality pushes the sales cycle toward 8 months, downside cash falls to about $279K and full-year Y3 EBITDA stays deeply negative."
  - checkName: "Next-round proof"
    finding: "A credible next round is earned by exiting Y2 with about 11 paying accounts, production benchmark dashboards, and one enterprise CoE rollout proving the wedge expands beyond design partners."
sanityChecks:
  ruleOf40: "Y3 growth 87.5% + EBITDA margin -3.5% = 84.0%"
  burnMultiple: "Y2 burn multiple 0.6x on roughly $807K of net new ARR; Q4Y3 EBITDA turns positive."
  revenuePerFte: "$259K Y3 on 8 year-end FTE (benchmark $200–400K SaaS)"
  flags:
    - "Full-year Y3 EBITDA remains slightly negative even though Q4Y3 turns positive, so the business still needs operating discipline before a larger scale-up."
    - "The base case assumes founder-led and partner-led selling can carry the company to 20 accounts before adding a dedicated AE, which may prove optimistic if referrals underperform."
    - "Year-end ARR runs modestly above the researched $2.5M SOM shorthand because the model assumes 40% second-practice expansion and a few premium pilot months still in the mix."
    - "Cash approximates EBITDA and excludes working-capital timing, VAT or tax timing, and capex, so treasury precision is lower than a board model."
