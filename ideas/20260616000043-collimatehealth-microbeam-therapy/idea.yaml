problem: >-
  Shrinking microbeam radiotherapy from a synchrotron installation to a sub-10-square-metre system does not make a cancer
  center clinically ready. Early adopter sites still need to translate a novel beam modality into commissioning plans,
  patient-selection rules, tumor-board decisions, combination-therapy timing, and regulator-ready evidence, yet today's
  tooling is split across generic treatment-planning software, physicist spreadsheets, CTMS systems, and vendor
  documents. That fragmentation will slow first clinical programs, create inconsistent evidence packages, and make it
  harder for radiation oncology teams to prove where microbeam belongs in care.
targetUser:
  primary: Chief medical physicist or translational radiation oncology program manager at an academic cancer center preparing one of the first compact microbeam therapy programs
  secondary: Radiation oncologists and clinical trial coordinators designing microbeam plus immunotherapy protocols for refractory solid-tumor patients
  buyer: Chair of radiation oncology, cancer center COO, or director of oncology service-line innovation
startupThesis:
  nonObviousInsight: >-
    Once the machine fits inside a hospital, the scarce asset is no longer exotic beam access; it is the operating system
    that lets physicists, radiation oncologists, and medical oncologists commission the modality and run first-in-human
    cases without reinventing the workflow each time. Most observers see a hardware moonshot, but the nearer-term wedge is
    the program-launch layer that turns microbeam from a prototype into a repeatable clinical service.
  beachhead: >-
    Academic cancer centers in Europe and North America with proton or other advanced-radiotherapy programs, an in-house
    medical physics team, and plans to evaluate one of the first compact microbeam installations for refractory
    solid-tumor studies before 2028
  wedge: >-
    A microbeam launch OS that manages site commissioning, patient-fit review, combo-therapy scheduling, QA sign-offs, and
    regulator-ready evidence capture for each early case
  whyNowCatalyst: >-
    CollimateHealth's funded clinical prototype, sub-10-square-metre footprint goal, and end-2028 first-patient target
    make site-readiness and first-case orchestration immediate bottlenecks.
  ventureScalePath: >-
    Start with microbeam launch programs, then expand into FLASH, spatially fractionated proton therapy, and other novel
    radiation modalities, becoming the control plane for advanced radiotherapy deployment, registry evidence, and
    multi-site referral operations.
solution: >-
  The product gives an early-adopter center a dedicated workspace for taking microbeam from feasibility to first patient.
  It links commissioning tasks, dosimetry and QA checklists, protocol milestones, tumor-board eligibility decisions, and
  systemic-therapy scheduling in one timeline that both physics and clinical teams can use. For each candidate, it
  produces a structured treatment packet with site-readiness status, patient-fit criteria, beam-plan checkpoints, and
  immune-monitoring tasks instead of scattering that information across email and spreadsheets. For leadership, it shows
  launch-critical metrics such as time to commissioning, protocol bottlenecks, and case-conversion rates. Over time, the
  company builds a proprietary dataset on how novel radiotherapy programs move from prototype to clinical routine across
  centers and indications.
goToMarketSeed:
  firstCustomer: >-
    A DACH or Swiss academic cancer center with a proton or experimental radiotherapy program, a strong in-house medical
    physics group, and a signed evaluation project for a compact microbeam system or related translational study
  buyingTrigger: >-
    A decision to host a first clinical prototype, open a preclinical-to-clinical microbeam program, or design a
    radiation-plus-immunotherapy pilot that crosses physics and medical oncology teams
  currentAlternative: Generic treatment-planning software, physicist spreadsheets, paper QA binders, CTMS tools, and vendor professional services
  switchingReason: >-
    The launch OS gives one cross-functional system for commissioning, patient selection, and evidence capture that
    incumbents split across disconnected tools, reducing launch delay and audit risk.
  pricingHypothesis: >-
    Annual enterprise subscription per cancer center plus a one-time modality-launch fee and optional evidence or
    benchmarking modules by active protocol
