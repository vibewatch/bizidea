differentiator: >-
  Generic radiotherapy planning systems handle beam calculations, CTMS vendors handle study administration, and device
  OEMs provide fragmented commissioning support, but none of them owns the cross-functional launch workflow for a brand-new
  radiation modality. This company sits in the narrow but strategic layer between machine readiness and patient treatment,
  where physics QA, oncology coordination, and regulator-grade evidence must converge. Defensibility comes from a
  multi-center dataset on launch timelines, early-case workflows, combination-protocol patterns, and operational outcomes
  that single-site tools and single-vendor stacks cannot easily replicate.
