topRisks:
  - name: Category timing risk
    description: If compact microbeam systems reach clinical sites later than the stated timeline, the beachhead market may mature more slowly than expected.
    mitigation: Start with centers and OEMs already funding translational launch work, and design the workflow to support adjacent novel-radiotherapy programs before microbeam volume arrives.
  - name: Heterogeneous clinical evidence
    description: Immune-response and combination-therapy benefits may vary by tumor type and protocol, which can make one-size-fits-all workflow assumptions dangerous.
    mitigation: Keep the product configurable around protocol design and evidence capture, and position it as an execution layer rather than a source of clinical efficacy claims.
  - name: Incumbent stack squeeze
    description: Treatment-planning vendors or device OEMs could bundle lightweight commissioning tools to defend the account.
    mitigation: Integrate into incumbent systems while owning the cross-functional orchestration, benchmarking, and multi-center evidence layer that single-vendor tools do not provide.
