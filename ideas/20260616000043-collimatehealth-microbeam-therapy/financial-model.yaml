date: 2026-06-16
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: "[BP date 2026-06-16]; model starts the first full month after the plan date."
  - id: A2
    name: Starting cash after pre-seed close
    value: "2000"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M]; base case uses the low end because the modeled plan reaches the late-Y2 proof point plus a 6-month buffer."
  - id: A3
    name: Year-1 paying pilot sites at end of period
    value: "3"
    unit: sites
    source: "[BP milestones 0-12 months] and [BP investorMemo.firstCustomer]; base case uses 3 paid pilots by M12."
  - id: A4
    name: Year-2 annual-production sites at end of period
    value: "4"
    unit: sites
    source: "[BP milestones 12-24 months]; base case uses the midpoint of the 3-5 converted launch-program target by Q4Y2."
  - id: A5
    name: Year-3 live programs at end of period
    value: "8"
    unit: programs
    source: "[BP milestones 24-36 months] and [Research market.som rationale]."
  - id: A6
    name: Customer acquisition ramp
    value: "M5 first paid pilot, M8 second, M11 third, Q3Y2 fourth, Q2Y3 sixth active program, and Q4Y3 eighth active program."
    unit: timing
    source: "[BP gtm.funnelTargets], [BP milestones], and [Research reportMemo.validationPlan]."
  - id: A7
    name: Blended monthly revenue per active program ramp
    value: "$24K pilot months in Y1, $29-34K across Y2, and $35-39K across Y3."
    unit: USDK per active site per month
    source: "[BP investorMemo.firstCustomer.initialContract], [BP businessModel.revenueStreams], and [Research market.som rationale]."
  - id: A8
    name: COGS and gross-margin ramp
    value: "35% COGS in Y1, 32% in H1Y2, 30% in H2Y2, 29% in H1Y3, and 28% in H2Y3."
    unit: percent of revenue
    source: "[BP businessModel.targetGrossMarginPct 70] plus startup-finance heuristic that launch workflows become less services-heavy after templates and integrations are reused."
  - id: A9
    name: Founder/CEO loaded cash compensation
    value: "180"
    unit: USDK annualized per FTE
    source: "Startup-finance heuristic for a Europe-based pre-seed B2B health-tech founder taking below-market cash pay."
  - id: A10
    name: Engineering loaded cash compensation
    value: "170"
    unit: USDK annualized per FTE
    source: "Startup-finance heuristic for early workflow and integration engineers with payroll tax and benefits."
  - id: A11
    name: Medical physics implementation loaded cash compensation
    value: "160"
    unit: USDK annualized per FTE
    source: "[BP team medical physics implementation lead] plus startup-finance heuristic for a domain expert carrying delivery and template work."
  - id: A12
    name: Product and regulatory ops loaded cash compensation
    value: "150"
    unit: USDK annualized per FTE
    source: "[BP team product and regulatory ops lead] plus startup-finance heuristic for an early compliance and product-ops operator."
  - id: A13
    name: OEM and GTM loaded cash compensation
    value: "165"
    unit: USDK annualized per FTE
    source: "[BP team OEM partnerships lead] plus startup-finance heuristic for a pre-seed partnerships and enterprise-sales hire."
  - id: A14
    name: G&A and ops loaded cash compensation
    value: "125"
    unit: USDK annualized per FTE
    source: "Startup-finance heuristic for finance, legal, and operations support in a lean pre-seed company."
  - id: A15
    name: Hiring ramp
    value: "Implementation lead starts M2, product/reg ops M4, second engineer M7, OEM/GTM M10, third engineer M14, second implementation FTE M16, ops M19, second GTM FTE M26, and fourth engineer M31."
    unit: timing
    source: "[BP team startTiming] plus a conservative staffing heuristic tied to pilot delivery and adjacent-modality expansion."
  - id: A16
    name: Non-payroll sales and marketing spend ramp
    value: "$5-8K per month in Y1, $10-14K in Y2, and $16-18K in Y3."
    unit: USDK per month
    source: "[BP gtm.channels] plus startup-finance heuristic for travel-heavy founder-led enterprise selling."
  - id: A17
    name: Non-payroll R&D and compliance tooling spend ramp
    value: "$8-11K per month in Y1, $12-14K in Y2, and $15-16K in Y3."
    unit: USDK per month
    source: "[BP operations], [Research regulatoryTechnicalConstraints], and startup-finance heuristic for cloud, security, and integration tooling."
  - id: A18
    name: Non-payroll G&A spend ramp
    value: "$4-6K per month in Y1, $6-8K in Y2, and $9-10K in Y3."
    unit: USDK per month
    source: "Startup-finance heuristic for legal, accounting, insurance, and data-privacy overhead."
  - id: A19
    name: Steady-state blended annual revenue per live center
    value: "390"
    unit: USDK per year
    source: "[BP investorMemo.firstCustomer.initialContract] and [Research market.som rationale]; base case sits below the $450K first-year SOM figure to reflect a mix of renewals and module expansion."
  - id: A20
    name: Steady-state CAC
    value: "120"
    unit: USDK per live center
    source: "[BP gtm.funnelTargets] and narrow founder-led enterprise-sales heuristic."
  - id: A21
    name: Steady-state monthly churn
    value: "2.5"
    unit: percent
    source: "Startup-finance heuristic; launch programs are sticky once embedded, but renewal risk is higher than horizontal SaaS because centers may treat each modality launch as episodic."
  - id: A22
    name: Cash conversion assumption
    value: "EBITDA is used as a proxy for cash movement."
    unit: policy
    source: "Startup-finance heuristic; the model assumes no debt and limited capex, with working-capital swings netting out."
  - id: A23
    name: Next-round proof point
    value: "By late Y2 the company needs 4 annualized production centers, one adjacent-modality template, benchmark reporting, and an 8-12 week deployment playbook."
    unit: milestone
    source: "[BP milestones 12-24 months], [BP strategicChoices.sequencingRationale], and [Research reportMemo.executiveTakeaways]."
