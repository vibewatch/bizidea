scenarios:
  downside:
    description: >-
      Microbeam launch timing slips, adjacent-modality reuse lands later, and
      launch programs stay more services-heavy than planned.
    y3RevenueK: 1900.0
    y3EbitdaK: -867.8
    cashLowPointK: -660.5
    keyAssumptionChanges:
      - End-Y2 annual-production sites fall from 4 to 3.
      - End-Y3 live programs fall from 8 to 6.
      - Blended annual revenue per live center tops out near $350K instead of $390K.
      - Gross margin only reaches 70% by late Y3 because implementation work stays bespoke.
  base:
    description: >-
      Three paid pilots in Y1 become 4 production centers by late Y2 and 8
      live launch programs by Q4Y3 as adjacent-modality reuse begins.
    y3RevenueK: 2692.0
    y3EbitdaK: -262.4
    cashLowPointK: 98.6
    keyAssumptionChanges:
      - No change from A1-A23 base assumptions.
  upside:
    description: >-
      OEM and consortium channels open sooner, adjacent-modality templates
      convert faster, and modules lift blended site revenue.
    y3RevenueK: 3410.0
    y3EbitdaK: 319.3
    cashLowPointK: 549.1
    keyAssumptionChanges:
      - End-Y2 annual-production sites rise from 4 to 5.
      - End-Y3 live programs rise from 8 to 9.
      - Blended annual revenue per live center reaches about $430K.
      - Gross margin reaches 74% as read-only launch templates become reusable earlier.
