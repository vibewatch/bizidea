modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetCenters --> PaidPilots
      PaidPilots --> LivePrograms
      LivePrograms --> LicenseRevenue
      LivePrograms --> LaunchFees
      LivePrograms --> ModuleExpansion
      LicenseRevenue --> Revenue
      LaunchFees --> Revenue
      ModuleExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Salary
      GrossProfit --> Opex
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base revenue comes from moving from 3 paid pilots in Y1 to 8 live launch
      programs by Q4Y3 while blended site revenue rises toward the researched
      $450K first-year spend range.
  - checkName: Must go right
    finding: >-
      Adjacent-modality reuse has to begin by month 18 so the company can grow
      from 4 production centers in late Y2 to 8 live programs in Y3 without a
      ground-up rebuild.
  - checkName: Model breaks if
    finding: >-
      The base case only bottoms at about $0.1M of cash, so a 12-month sales
      cycle or sub-68% gross margin likely forces a bridge before Q4Y3.
  - checkName: Next-round proof
    finding: >-
      A seed-ready story is 4 annualized production centers, one adjacent
      modality template, benchmark reporting, and an 8-12 week deployment
      playbook by late Y2.
sanityChecks:
  ruleOf40: "Y3 growth 103.5% + EBITDA margin -9.7% = 93.8%."
  burnMultiple: "Y2 burn multiple 0.9x and Y3 burn multiple 0.2x using net burn divided by net new revenue."
  revenuePerFte: "$245K Y3 (benchmark $200-400K workflow SaaS)."
  flags:
    - Base case cash bottoms near $0.1M in Q3Y3, so even a 1-2 quarter sales slip likely needs a bridge or a larger seed.
    - The model assumes adjacent-modality reuse works by month 18; if not, the microbeam-only wedge is too narrow for the Y3 revenue path.
    - Eight live programs inside a roughly 30-center SAM means revenue concentration stays high and the first 2-3 references matter disproportionately.
    - Gross margin has to improve from 65% in Y1 to roughly 72% in Y3; slower template reuse would pressure both runway and next-round readiness.
