  pricing: 定制化企业定价（不公开）。
  strength: 装机量庞大，与治疗投照、记录和自适应工作流深度耦合。
  weaknessVsUs: 在自身生态内最具竞争力，但作为跨供应商首次启动工作流和转化证据的中立控制层，天然契合度较弱。
