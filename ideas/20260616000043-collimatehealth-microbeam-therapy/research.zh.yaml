reportMemo:
  executiveTakeaways:
  - 可信的近期市场不是宽泛的放射治疗 IT，而是一小批先进中心在调试新型放射模式、积累首批病例证据时所需的窄口启动层。
  - 切入点具有战略吸引力，因为现有厂商将工作流程分散于治疗计划、肿瘤信息系统、CTMS 和手工 QA 流程之间，没有任何一家真正掌控跨职能的启动编排。
  - 品类时机是首要风险：紧凑型微束硬件正向临床迈进，但临床适应证与操作规范尚未成形。
  - 唯有产品从微束延伸至 FLASH、紧凑型质子、MR 引导等其他新型放射治疗项目，风险投资价值才会实质性提升。
  marketDefinition: 一个用于调试新型放射治疗项目、将早期患者案例转化为可复制、可审计运营流程的控制层软件。
  customerAndBuyer: 主要用户为首席医学物理师和转化项目经理；经济买家为科室主任、癌症中心运营负责人及资助新模式上市的创新主管。
  buyingTriggers:
  - point: 某中心决定接待或评估紧凑型微束系统，将模式就绪工作从纯物理项目升级为跨职能启动项目。
    sourceRefs:
    - 1
    - 2
    - 3
    - 4
  - point: 某转化研究站点开设或扩展 MR-linac、质子或注册表驱动的先进放射治疗项目，需要可复制的实施方案。
    sourceRefs:
    - 17
    - 18
    - 19
    - 20
  - point: 管理层需要满足监管要求的 QA、协议和病例评审证据，而非临时拼凑的活页夹、表格和孤立系统。
    sourceRefs:
    - 21
    - 22
    - 23
  willingnessToPay:
    summary: 各中心在启动先进放射模式时已承担可观的人员与协调成本，因此能够压缩图表审查、协议协调和 QA 交接周期的工作流层，有望从项目启动或临床创新预算中争取资金，且无需替换现有 TPS 或 EHR 系统。
    sourceRefs:
    - 19
    - 20
    - 21
    - 30
    - 31
  competitiveLandscape: 竞争格局呈碎片化而非直接对抗：规划与记录系统主导治疗工作流程，CTMS 和 EHR 工具主导协议管理，OEM 或内部团队主导首站启动核查清单，没有任何一家掌控跨职能的新项目启动编排。
  incumbentThesis:
  - incumbentClass: 治疗计划与肿瘤信息系统
    point: Varian、Elekta 和 RaySearch 主导计划与治疗记录，但它们并不能自然胜出，因为首期项目调试、联合治疗时序和跨团队证据采集都在其核心工作流之外。
    sourceRefs:
    - 24
    - 25
    - 26
    - 27
    - 28
    - 29
  - incumbentClass: CTMS 与 EHR 供应商
    point: OnCore 和 Epic 可以管理协议和记录，但并非为运行设备就绪、剂量 QA 及物理师签核依赖关系而设计。
    sourceRefs:
    - 30
    - 31
  - incumbentClass: OEM 专业服务
    point: 硬件供应商可协助首次安装成功，但其服务通常局限于单一供应商、高度依赖人工，且在跨中心基准评估和启动绩效标准化方面能力薄弱。
    sourceRefs:
    - 1
    - 3
    - 4
  - incumbentClass: 内部 QA 与项目工具
    point: 电子表格、活页夹和自研脚本对先行者而言灵活实用，但在审计追踪、多站点学习和多学科同行评审的扩展性上存在明显短板。
    sourceRefs:
    - 21
    - 22
    - 23
    - 37
  regulatoryLandscape: 将产品定位为工作流、QA 和证据基础设施，在战略上最为稳健；一旦开始为患者进行排序或提出治疗行动建议，软件监管和隐私合规的范围将大幅扩展。
  technologyLandscape: 微束放射治疗仍是新兴模式，软件赢家更可能与现有计划、记录和研究系统深度集成，而非全面替代。
  distributionChannels:
  - point: 与新型模式 OEM 及转化安装团队联合销售，帮助站点按计划实现临床就绪。
    sourceRefs:
    - 1
    - 3
    - 4
  - point: 直接向首席物理师和启动负责人销售，借助 PTCOG、AAPM 和 MR-linac 社区——这些场合已在讨论先进模式工作流程。
    sourceRefs:
    - 9
    - 17
    - 22
  - point: 将 CTMS 和 EHR 集成合作伙伴作为力量倍增器，而非试图取代协议管理系统。
    sourceRefs:
    - 18
    - 30
    - 31
  partnershipEcosystem:
  - point: 与设备商的合作至关重要，因为安装时序、站点培训和原型机里程碑均由此发起。
    sourceRefs:
    - 1
    - 3
    - 4
  - point: 联盟和注册库不可或缺，因为先进模式站点已习惯协作式实施与成果共享。
    sourceRefs:
    - 17
    - 18
  - point: TPS 和 OIS 供应商既是竞争者，也是任何启动控制工作流不可或缺的集成伙伴。
    sourceRefs:
    - 24
    - 25
    - 26
    - 27
    - 28
    - 29
  dataMoats:
  - point: 跨站点启动周期、QA 完成模式和首批病例转化率的基准数据，可成为新型放射治疗就绪度评估的独特数据集，形成护城河。
    sourceRefs:
    - 9
    - 10
    - 16
  - point: 在单一记录中整合物理 QA、协议里程碑和肿瘤委员会决策，形成 CTMS 和 TPS 系统通常无法单独保存的运营证据。
    sourceRefs:
    - 18
    - 19
    - 20
    - 21
    - 30
  - point: 跨 RaySearch、Siemens/Varian 和 Elekta 技术栈的多供应商集成遥测数据，可逐步积累成工作流切换成本护城河。
    sourceRefs:
    - 24
    - 25
    - 26
    - 27
    - 28
    - 29
  geographicConsiderations:
  - point: DACH 及更广泛的欧洲地区是天然的滩头市场，因为硬件故事、学术转化努力和综合癌症中心协调基础在此最为成熟。
    sourceRefs:
    - 1
    - 4
    - 13
    - 14
  - point: 北美是合理的第二波市场，NCI 认证中心和 MR 引导放射治疗项目聚集了大量转化买家，但对隐私保护和系统集成的要求较高。
    sourceRefs:
    - 12
    - 19
    - 20
    - 33
  - point: 各国放射治疗容量和人员配置压力差异显著，初期销售应聚焦科研导向型中心——这些中心在常规报销机制建立之前，更有能力为工作流软件背书。
    sourceRefs:
    - 15
    - 16
  sensitivityCases:
  - case: 紧凑型微束首例患者时间线推迟至 2028 年以后
    impact: 微束专属 SAM 收缩，公司须提前变现 MR-linac、FLASH 或紧凑型质子等邻近模式的启动工作流。
