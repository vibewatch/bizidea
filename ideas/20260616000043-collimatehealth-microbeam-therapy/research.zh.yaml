  validationPlan:
  - priority: high
    question: 2028 年前，欧洲和北美哪些中心已签署或正在推进紧凑型微束评估项目？
    evidenceToGather: 命名启动站点、项目发起人、时间节点及当前工作流技术栈。
  - priority: high
    question: 在患者量尚未形成之前，买家是否愿意为独立的启动操作系统付费？
    evidenceToGather: 试点预算责任人、实施服务支出情况，以及通过 OEM 捆绑还是直接软件合同购买的付费意愿。
  - priority: medium
    question: 同一工作流能否在微束量形成之前，提前销售给 MR-linac、紧凑型质子或 FLASH 启动项目？
    evidenceToGather: 客户访谈及邻近新型模式项目的试点需求情况。
