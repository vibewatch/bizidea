regulatoryTechnicalConstraints:
- point: 若启动操作系统开始提出患者特异性临床建议，根据欧盟法规，医疗器械合规负担将大幅上升。
  sourceRefs:
  - 34
- point: 跨站点患者和工作流数据共享必须符合健康数据隐私管控要求，尤其当美国和欧盟中心进行比较或基准评估时。
  sourceRefs:
  - 33
  - 35
- point: 早期模式启动很可能处于正式研究或注册库框架内，因此协议版本管理、审计追踪和研究者级别的证据采集是强制要求。
  sourceRefs:
  - 18
  - 34
- point: 软件必须与现有 TPS、OIS 和 QA 系统互操作，而非强迫中心淘汰已深度嵌入的临床系统。
  sourceRefs:
  - 21
  - 24
  - 26
  - 28
validationSignals:
- point: CollimateHealth 已完成种子融资，用于构建临床原型机并推进监管/临床前工作。
  sourceRefs:
  - 1
  - 2
  - 3
- point: PTCOG 数据显示粒子治疗中心在运营基础庞大和在建管线可观两方面依然成立。
  sourceRefs:
  - 9
  - 10
- point: MR-Linac Consortium 和 MOMENTUM 研究表明，先进模式站点愿意接受共享实施注册库和统一工作流。
  sourceRefs:
  - 17
  - 18
- point: 各中心在供应商系统无法覆盖启动需求时，已自建 QA 工作流基础设施（如 QATrack+）。
  sourceRefs:
  - 21
openQuestions:
- CollimateHealth 直接网络以外，哪些命名中心在 2028 年前已签署或正在推进紧凑型微束评估项目？
- 微束首批用例将以完整器械研究协议、注册库式证据采集还是中心特定的慈悲使用途径启动？
- 实际上谁掌控预算：科室主任、创新办公室、首席物理师，还是 OEM 主导的实施包？
- 若产品协助资格审查和联合治疗时序但不涉及剂量或治疗建议，多大程度上可以规避医疗器械分类？
