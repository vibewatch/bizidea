slug: microbeam-program-launch-os
date: "2026-06-16"
executiveSummary: >-
  这家公司应先从一个买方群体极小、但痛感很急的场景切入：正准备开展紧凑型微束评估和首批免疫联合治疗方案的学术癌症中心。客户的痛点不在剂量学，而在运营协同：硬件一旦就位，中心仍需要一套经得起审计的统一工作流，把启用前验收、肿瘤委员会适应证审核、联合治疗排期、QA 签字和方案证据留存串到同一条线上。第一单应是面向 DACH 或瑞士某中心的付费启动部署；这类中心要么已有质子或实验性放疗项目，要么已经签下微束评估项目；销售对象应同时覆盖首席医学物理师，以及放射肿瘤科主任或 COO。这个切口有吸引力，因为现有厂商把这项工作拆散在 TPS 和 OIS 系统、CTMS 工具、OEM 服务和表格里，没有哪家默认供应商真正拥有“首个项目启动编排”这一环。公司也应刻意回避临床决策支持、宽泛的放疗 IT，以及社区医院铺开，至少在用只读集成证明自己确实能缩短启动周期、产出更干净的首例证据前不碰这些方向。单看微束市场，规模太小、时间窗口也太敏感，撑不起一个独立的风险投资故事，所以前 12 个月必须验证：同一套工作流能否卖进 MR-linac、紧凑型质子或 FLASH 式项目启动。市场规模、定价和 SOM 目前都建立在类比而非交易数据上，眼下最大的缺口，是缺少 2028 年前具名启动站点，以及独立预算归属的直接证据。投资人现阶段更应把它看成一个值得紧盯的种子前阶段工作流切口，而不是已经足以进合伙人会的完整案子；只有等共创客户承诺和相邻模态复用都被验证后，判断才应升级。
problem:
  - "早期微束站点至今还把启用前验收、病例评审、QA 和方案证据分散在 TPS、OIS、CTMS、OEM 以及表格这些彼此割裂的工作流里。"
  - "这种碎片化会拖慢首位患者就绪时间，造成治疗资料包不完整，也削弱研究、登记和监管工作所需的审计链条。"
solution:
  - "提供一个中立于厂商的工作空间，把启用前验收任务、物理 QA 签字、方案里程碑、肿瘤委员会适应证审核和全身治疗协同放进同一条启动时间线。"
  - "生成结构化首例病例包、可导出的证据包和就绪度仪表盘，让站点在更少人工交接的情况下接诊早期患者，同时把启动指标看得更清楚。"
whyWeWin:
  - "公司卡位在设备就绪和患者治疗之间的跨职能边界上，而现有厂商和 OEM 服务都没有把这整条工作流真正接住。"
  - "每做完一个启动项目，公司都会沉淀可复用的打法和基准数据，覆盖周期、QA 依赖、病例转化和多供应商协同；这些积累不是单站点工具短时间内能复制出来的。"
strategicChoices:
  beachhead: "DACH 和瑞士具备质子或实验性放疗项目、正准备开展紧凑型微束评估，并且需要一套统一工作流来处理启用前验收、肿瘤委员会评审和方案证据留存的学术癌症中心。"
  wedgeRationale: >-
    与其卖通用型放疗工作流软件，不如从这个入口切入，因为买方手上本来就有一个边界清晰的启动事件、一个跨学科协同难题，以及一个明确的首位患者截止日期。聚焦而窄的启动
    OS，可以先在就绪速度、资料包完整度和审计质量上证明价值，再去尝试更宽的模态管理或常规诊疗工作流替换。
  sequencingRationale: >-
    公司应先做只读编排、病例包、方案版本管理和证据导出，因为这些功能足以解决首个项目启动问题，又不用逼中心替换既有临床系统，也不会把产品直接推入医疗器械监管范围。只有在
    2-3 个付费启动项目跑出 ROI 之后，路线图才该加深度集成、基准化产品、OEM 打包，以及相邻模态模板。
  notYet:
    - "替换 TPS、OIS、CTMS 或 EHR 系统"
    - "给患者适应证打分，或推荐治疗动作"
    - "在没有转化医学物理团队的情况下卖给社区医院"
    - "在启动工作流价值尚未证明前，先做宽泛的肿瘤登记或转诊网络"
market:
  tam: "$75.0M 的估算 TAM，基于全球约 250 个先进放疗项目启动站点、每站每年平台支出约 $300K。"
  sam: "$9.0M 的估算 SAM，基于欧洲和北美 30 家滩头市场中心；这些中心大概率会在 2028 年前评估紧凑型微束。"
  som: "$3.6M 的估算第 3 年 SOM，基于 8 个可触达共创客户站点、每站首年支出约 $450K。"
  segments:
    - "启动紧凑型微束项目的学术癌症中心"
    - "在滩头市场验证后，MR-linac、紧凑型质子和其他新型放疗项目将成为第一批相邻市场"
  buyingProcess: >-
    业务推动者通常是首席医学物理师或转化项目经理，而真正拍板预算的人则是放射肿瘤科主任、癌症中心 COO 或创新负责人。交易应先以付费启动部署切入，并与硬件安装或方案启动绑定；如果站点能更快达成就绪、也能拿出更干净的审计证据，再转成按中心计费的年度许可。
product:
  mvp: >-
    MVP 是一个中立于厂商的启动工作空间，覆盖启用前验收工作计划、QA 清单、方案版本管理、多学科病例包和可导出的证据日志。它要证明：即便不替换现有计划、记录或研究系统，单个站点也能把微束启动工作真正协同起来。
  sixMonth: >-
    上线 2-3 个共创客户试点，配齐只读集成、启用前验收时间线、首例病例包生成，以及就绪状态、未完成任务和方案证据缺口的仪表盘。
  twelveMonth: >-
    把首批试点转成正式生产部署，发布覆盖启动周期和病例包质量的基准报告，并证明至少一个相邻模态模板可用于 MR-linac 或紧凑型质子项目启动。
  twentyFourMonth: >-
    在微束及表现最好的相邻项目之间，提供一个与模态无关的启动 OS，并配套可复用的集成打法、联盟报告和高级证据模块。
  keyBets:
    - "即便常规患者量尚未形成，只要产品能缩短就绪周期、把审计证据整理干净，买方也会愿意为一套独立启动工作流买单。"
    - "只读集成就足以拿下前 2-3 个站点，不需要一个跨多个季度的系统替换项目。"
    - "相邻的先进模态项目会复用这套工作流模型的大部分能力，因此真实市场会比单一微束更大。"
    - "相较于单纯清单自动化，启动表现和病例转化的基准数据会形成更牢的护城河。"
gtm:
  wedge: "卖的是一套面向首个项目就绪和首例证据留存的付费启动 OS，而不是通用 AI 助手，也不是整套放疗技术栈替换。"
  channels:
    - "由创始人主导直销，面向放射肿瘤科主任、首席医学物理师和转化启动负责人"
    - "与需要站点按时具备临床就绪度的新模态 OEM 和安装团队联合销售"
    - "在拿到首个启动案例后，借助 PTCOG、AAPM、MR-linac 和转化联盟关系扩展"
  funnelTargets: "线索→合格共创客户 15-25%，合格共创客户→付费试点 25-35%，付费试点→正式生产 50%+，转正站点→在 12 个月内扩展到第二个方案或模态的比例在已转化账户中达到 40%+。"
  pricing: >-
    采用按中心计费的年度订阅，加一次性模态启动费，以及可选的方案模块或证据模块。这个定价贴合买方行为：站点会先为一个边界清晰的启动项目出预算；只有软件确实压缩了就绪时间、并且比
    OEM 服务或人工协同更能支撑审计，它们才会续费。
businessModel:
  revenueStreams:
    - "癌症中心年度订阅"
    - "一次性模态启动实施费"
    - "按活跃启动项目计价的方案与证据模块"
    - "基准分析与联盟报告模块"
  unitOfValue: "单个癌症中心中的一个活跃新型放疗启动项目，后续再通过更多方案和模态扩张。"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一家癌症中心内增加更多方案和启动团队"
    - "从微束扩展到 MR-linac、紧凑型质子、FLASH 或其他新模态启动项目"
    - "向多站点联盟或 OEM 渠道伙伴销售基准分析和证据产品"
    - "把多中心实施打法标准化，缩短后续客户的部署时间"
strategyMap:
  northStarMetric: "从签下启动项目到产出首份经得起审计的患者资料包的中位天数。"
  inputMetrics:
    - "按计划完成的启用前验收任务占比"
    - "候选病例转成完整治疗资料包的占比"
    - "从硬件或方案启动到达到验收就绪状态的中位天数"
    - "付费试点转年度正式生产的转化率"
    - "首个相邻模态部署中被复用的启动工作流占比"
  moatsToBuild:
    - "跨站点的启动周期、QA 完成模式和首例病例转化基准数据"
    - "把物理 QA、方案里程碑和多学科评审串进同一记录的可复用工作流模板"
    - "覆盖 TPS、OIS、CTMS 和 OEM 服务环境的厂商中立集成遥测"
  killCriteria:
    - "如果 12 个月内，欧洲或北美具名启动站点里承诺付费试点或共创合作的少于 3 家，说明“微束优先”这个切口还太早。"
    - "如果前 2 个付费试点没能把达到验收就绪状态的时间至少缩短 25%，或没能把不完整首例病例包压到 10% 以下，说明产品相比人工协同并没有形成实质性优势。"
    - "如果到第 18 个月，某个相邻模态仍无法在只增加少量自定义字段的前提下复用至少 80% 的核心工作流，说明按当前 TAM 建模，这个风险投资故事还是太窄。"
  mermaid: |
    flowchart LR
      Wedge[Microbeam launch wedge] --> MVP[Commissioning and case-packet MVP]
      MVP --> Proof[Faster readiness and audit-ready first cases]
      Proof --> Expansion[Adjacent modality expansion and benchmarks]
investorMemo:
  verdict:
    call: "观察"
    conviction: "工作流痛点很强，切口也顺，但在拿到具名启动站点和相邻模态复用证据之前，判断仍应保持克制。"
    whyBelieve: "公司瞄准的是一个真实存在的“首个项目”瓶颈，而现有厂商把这件事拆散在计划、记录、方案系统和人工 QA 工作里。"
    whyDoubt: "紧凑型微束的已装机基础、预算归属和落地时间今天都太不确定，单做微束软件公司还过不了风险投资的门槛。"
    nextDiligence: "先拿下 2-3 个付费共创客户或 OEM 背书试点，并证明同一套工作流也适用于至少一个相邻先进模态启动项目。"
  firstCustomer:
    title: "正在评估紧凑型微束的 DACH 学术癌症中心首席医学物理师或转化启动负责人"
    profile: "拥有院内医学物理团队、做过先进放疗项目，并已签署紧凑型微束或高度相关转化项目评估/研究计划的综合癌症中心。"
    trigger: "中心决定承接原型设备、启动首个人体试验方案，或开展放疗联合免疫治疗试点，于是物理、肿瘤和研究团队被迫进入同一条共享时间线。"
    buyer: "放射肿瘤科主任或癌症中心 COO"
    initialContract: "$200K-$450K 首年合同，包含启动费和年度软件订阅；项目正式上线后，再转成约 $150K-$300K ARR，外加方案或证据模块。"
  mustBeTrue:
    - "在这个类别进入常规患者量之前，欧洲或北美至少要有 3 家拥有明确微束评估计划的中心愿意承诺付费启动试点。"
    - "在形成稳定患者流量之前，买方必须愿意从启动或创新预算里拿出 $200K-$450K 的首年支出。"
    - "相较于表格或 OEM 服务基线，产品必须把启动周期至少缩短 25%，或把不完整首例病例包控制在 10% 以下。"
    - "像 MR-linac 或紧凑型质子这样的相邻模态，必须能够在不推倒重来的前提下复用这套工作流的大部分能力。"
    - "产品必须始终停留在工作流和证据基础设施层，而不是滑向面向患者的临床决策支持。"
  diligenceQuestions:
    - "哪些具名中心已经签下紧凑型微束评估项目？它们今天使用的工作流技术栈是什么？"
    - "预算归属到底在放射肿瘤科主任、创新办公室、首席物理师，还是 OEM 实施打包方案里？"
    - "站点在首个启动年度结束后，达到什么 KPI 门槛才会续费，而不是退回 OEM 服务和表格？"
    - "在 MR-linac 或紧凑型质子的启用前验收里，这套工作流到底有多少能直接复用，而不用额外做定制产品开发？"
    - "如果产品协助适应证审核或联合治疗时机安排，法务顾问和买方合规团队会采取什么监管立场？"
operatingAssumptions:
  - assumption: "欧洲或北美至少会有 3 家具名中心在 2028 年前跑微束或高度类似的启动项目，并愿意签付费共创合作。"
    basis: research.yaml
    validationTest: "在 12 个月内，和首席物理师、OEM 安装团队或转化负责人完成 10 通探索电话，并把其中至少 3 家转成已签署的 LOI 或付费试点范围。"
    decisionImpact: "如果不成立，公司必须立刻把滩头市场转向相邻模态，并把微束当成参考客户，而不是第一市场。"
  - assumption: "即便常规患者量尚未形成，只要以边界清晰的启动项目来卖，买方也会为独立启动 OS 付费。"
    basis: idea.yaml
    validationTest: "向 5 家合格中心或带有 OEM 背书的机会展示定价，并拿下至少 2 份首年价值高于 $200K 的付费启动合同。"
    decisionImpact: "如果不成立，公司就必须通过 OEM 或服务伙伴打包销售，这会削弱软件杠杆，也会拖慢独立销售节奏。"
  - assumption: "对 TPS、OIS、CTMS 和 QA 系统的只读集成，足以支撑第一年的部署。"
    basis: 团队判断
    validationTest: "让前 2 个试点在 8-12 周内上线，且不需要写回能力，也不被要求替换现有厂商系统。"
    decisionImpact: "如果不成立，集成成本和实施时间都会明显上升，公司将被迫收窄供应商覆盖范围，并需要更多资本。"
  - assumption: "同一套核心工作流在只做有限配置变更的情况下，也能服务 MR-linac 或紧凑型质子启动项目。"
    basis: research.yaml
    validationTest: "在第 18 个月前配置一个相邻模态试点，至少 80% 工作流对象共享，净新增功能请求低于 20%。"
    decisionImpact: "如果不成立，这个风险投资故事就会收缩成一个小众微束工具，TAM 更弱，融资天花板也更低。"
  - assumption: "只要避开面向患者的具体建议，产品就能绕开重型医疗器械监管范围，同时仍足够有用、值得购买。"
    basis: research.yaml
    validationTest: "在测试版上线前，拿到外部监管法律顾问评审，以及 2 个试点站点给出的书面合规反馈。"
    decisionImpact: "如果不成立，路线图就必须进一步收窄到审计和工作流工具，或者为受监管软件开发预留更多时间和资金。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "访谈滩头市场里的 15 位首席医学物理师、转化项目经理和 OEM 安装负责人。"
    hypothesis: "买方会反复提到同一种紧迫痛点：启用前验收依赖、首例病例包，以及经得起审计的证据留存。"
    successMetric: "至少 10 场访谈确认存在共同触发因素，且有 5 家愿意提供现状工作流图或启动样例材料。"
    owner: "创始人/CEO"
  - horizon: "0–90 天"
    experiment: "在完整软件部署前，先基于单个中心或 OEM 工作流跑 2 个礼宾式启动映射项目。"
    hypothesis: "即便只是半人工的工作流层，也能暴露出足够明确的启动延迟和资料包质量缺口，让客户愿意为修复它们付费。"
    successMetric: "两家潜在客户拿到基线评分卡，且至少一家签下付费试点范围。"
    owner: "医学物理实施负责人"
  - horizon: "90–180 天"
    experiment: "交付首个 MVP，包含启用前验收任务图、病例包、方案版本管理、证据导出和只读集成。"
    hypothesis: "站点无需替换 TPS、OIS 或 CTMS 系统，也能把启动工作协同得明显更好。"
    successMetric: "首个试点在 12 周内上线，并按周汇报就绪状态、未完成任务和病例包完整度。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "在 3 个合格机会中测试“启动费 + 年度订阅”的定价。"
    hypothesis: "相比开放式服务合作，买方更偏好一个边界明确、带续费标准的启动打包方案。"
    successMetric: "至少签下 2 个付费试点，并有 1 位买方在 KPI 达标的前提下预先认可年度定价。"
    owner: "创始人/CEO"
  - horizon: "180–360 天"
    experiment: "把这套工作流部署到一个相邻模态项目中，例如 MR-linac 或紧凑型质子。"
    hypothesis: "产品可以跳出微束，服务其他买方痛点相近的新模态项目，而且大多数工作流对象都能共用。"
    successMetric: "启动 1 个相邻试点，工作流复用率至少 80%，并形成一个可信的第二条管线机会。"
    owner: "产品与合规运营负责人"
  - horizon: "180–540 天"
    experiment: "在首个正式生产案例出来后，启动一条 OEM 或联盟联合销售路径。"
    hypothesis: "一旦公司已经证明自己能改善启动周期，渠道伙伴就能缩短建立信任的时间，并加快管线增长。"
    successMetric: "来自合作伙伴的机会占合格销售管线至少 20%，并产出 1 个已签试点。"
    owner: "OEM 合作负责人"
operations:
  - "每个部署都按周召开启动评审会，拉上物理、肿瘤和试验运营负责人，直到站点达到首位患者就绪状态。"
  - "产品必须保持厂商中立，通过只读集成和结构化导出接入现有 TPS、OIS、CTMS 和 QA 系统。"
  - "从第一天起就把方案版本管理、QA 签字审计链和隐私控制做好，因为早期启动项目往往落在研究或登记体系内。"
  - "把每次实施都沉淀成可复用打法，让部署知识累积成产品 IP，而不是只留在创始人脑子里。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: "在这个类别仍处于定义阶段时，由他负责创始人主导销售、买方发现、定价，以及 OEM 或联盟关系拓展。"
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: "负责搭建工作流引擎、证据导出、审计日志，以及决定部署速度的首批只读集成。"
  - role: "医学物理实施负责人"
    startTiming: "第 1 个月"
    rationale: "负责把启用前验收和 QA 工作流编码进产品、跑礼宾式启动项目，并把站点特有步骤沉淀成可重复模板。"
  - role: "产品与合规运营负责人"
    startTiming: "第 3 个月"
    rationale: "负责守住“工作流”与“临床决策支持”的边界、管理方案版本要求，并缩短客户上线流程。"
  - role: "OEM 合作负责人"
    startTiming: "第 9 个月"
    rationale: "只有在公司已有案例、也有可重复实施打法后，才补这一渠道能力，让合作伙伴能更有把握地卖。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "完成 15-20 场买方与伙伴访谈，并签下 2-3 个付费共创客户或试点部署。"
      - "交付只读版 MVP，覆盖启用前验收工作计划、病例包、方案版本管理、QA 签字和证据导出。"
      - "证明至少一个站点级 KPI 在启动速度或资料包完整度上显著改善，足以支撑年度续费。"
  - horizon: "12–24 个月"
    items:
      - "把 3-5 个启动项目转成年度订阅，并发布覆盖启动周期和病例质量的基准报告。"
      - "验证一个相邻模态模板，以及一条 OEM 或联盟联合销售路径。"
      - "在不跨入面向患者治疗建议的前提下，把 8-12 周实施打法标准化。"
  - horizon: "24–36 个月"
    items:
      - "达到研究建模中的第 3 年 SOM 路径：约 8 个在运行的启动项目，每个首年支出约 $450K，或形成等价的 ARR 组合。"
      - "只有在工作流复用和续费数据依然强劲时，才扩张到表现最好的相邻新模态品类。"
      - "判断基准数据密度是否足以支撑更广的网络化产品，还是公司更应该继续做聚焦型启动 OS。"
risks:
  - risk: "紧凑型微束的首位患者时间表滑到 2028 年之后，滩头市场随之延后。"
    likelihood: High
    impact: High
    mitigation: "在真正依赖微束患者量之前，先把同一套工作流卖进 MR-linac、紧凑型质子或其他新模态启动项目。"
  - risk: "买方更偏向 OEM 服务或打包的现有厂商功能，而不是新的独立工作流层。"
    likelihood: High
    impact: Medium
    mitigation: "把差异化放在厂商中立编排、跨站点基准数据，以及单一厂商工具做不出来的证据导出上。"
  - risk: "集成和变更管理负担过重，导致小团队把试点推进得太慢。"
    likelihood: Medium
    impact: High
    mitigation: "先从只读集成做起，把第一版工作流收窄到最关键的启动步骤，并把上线时长列为董事会级 KPI。"
  - risk: "产品逐步滑向面向患者的具体建议，触发更重的软件监管。"
    likelihood: Medium
    impact: High
    mitigation: "坚持让人留在回路中，避免给出治疗建议，并让每一项路线图新增功能都先过监管评审。"
  - risk: "独立预算归属始终说不清，到底在主任、COO、创新办公室，还是 OEM 打包方案里。"
    likelihood: Medium
    impact: Medium
    mitigation: "把产品卖成边界清晰的启动项目，配上明确 KPI 评分卡，并尽早同时测试直销和 OEM 辅助签约两条路径。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "搭建厂商中立的启动 OS，支持 2-3 个付费共创客户部署，补齐医学物理和实施深度，打牢合规与集成基础，并在微束市场完全成熟前验证相邻模态扩张。"
