slug: microbeam-program-launch-os
date: "2026-06-16"
executiveSummary: >-
  This company should start as a launch OS for a very small but urgent buyer set: academic cancer centers preparing compact
  microbeam evaluations and first immune-combination protocols. The customer pain is operational, not dosimetric: once
  hardware exists, sites still need one audit-ready workflow for commissioning, tumor-board eligibility review,
  combination-therapy scheduling, QA sign-offs, and protocol evidence capture. The first sale should be a paid launch
  deployment to a DACH or Swiss center with a proton or experimental radiotherapy program and a signed microbeam
  evaluation project, sold jointly to the chief medical physicist and the radiation-oncology chair or COO. The wedge is
  attractive because incumbents split the work across TPS and OIS systems, CTMS tools, OEM services, and spreadsheets, so
  no default vendor owns first-program orchestration. The plan deliberately avoids clinical decision support, broad
  radiotherapy IT, and community-hospital rollout until the company proves it can shorten launch timelines and produce
  cleaner first-case evidence with read-only integrations. The microbeam-only market is too small and too timing-sensitive
  to justify a venture case on its own, so the first 12 months must test whether the same workflow sells into MR-linac,
  compact proton, or FLASH-style rollout programs. Market size, pricing, and SOM are modeled from analogs rather than
  transaction data, and the biggest current gap is the lack of named pre-2028 launch sites and direct proof of standalone
  budget ownership. Investors should treat this as a pre-seed workflow wedge worth watching closely, not yet a full
  partner-meeting case, until design-partner commitments and adjacent-modality reuse are verified.
problem:
  - Early microbeam sites still manage commissioning, case review, QA, and protocol evidence across disconnected TPS, OIS, CTMS, OEM, and spreadsheet workflows.
  - That fragmentation slows first-patient readiness, creates incomplete treatment packets, and weakens the audit trail needed for study, registry, and regulatory work.
solution:
  - Provide a vendor-neutral workspace that links commissioning tasks, physics QA sign-offs, protocol milestones, tumor-board eligibility review, and systemic-therapy coordination on one launch timeline.
  - Generate structured first-case packets, exportable evidence binders, and readiness dashboards so sites can treat early patients with fewer manual handoffs and clearer launch metrics.
whyWeWin:
  - The company sits at the cross-functional boundary between machine readiness and patient treatment where incumbents and OEM services do not own a complete workflow.
  - Every launch compounds reusable playbooks and benchmark data on timelines, QA dependencies, case conversion, and multi-vendor coordination that single-site tools cannot replicate quickly.
strategicChoices:
  beachhead: DACH and Swiss academic cancer centers with proton or experimental radiotherapy programs that are preparing compact microbeam evaluations and need one workflow for commissioning, tumor-board review, and protocol evidence capture.
  wedgeRationale: >-
    This entry point creates faster proof than selling generic radiotherapy workflow software because the buyer already has a
    bounded launch event, a cross-disciplinary coordination problem, and a visible first-patient deadline. A narrow launch OS
    can show value on time to readiness, packet completeness, and audit quality before the company attempts broader modality
    management or routine-care workflow replacement.
  sequencingRationale: >-
    The company should start with read-only orchestration, case packets, protocol versioning, and evidence exports because
    those features solve the first-program problem without forcing centers to replace entrenched clinical systems or pushing
    the product into medical-device territory. Only after 2-3 paid launch programs prove ROI should the roadmap add deeper
    integrations, benchmark products, OEM bundles, and adjacent-modality templates.
  notYet:
    - Replacing TPS, OIS, CTMS, or EHR systems
    - Scoring patient eligibility or recommending treatment actions
    - Selling to community hospitals without translational physics teams
    - Building a broad oncology registry or referral network before launch-workflow proof exists
market:
  tam: "$75.0M estimated TAM from roughly 250 global advanced-radiotherapy launch sites at about $300K annual platform spend."
  sam: "$9.0M estimated SAM from 30 Europe and North America beachhead centers likely to evaluate compact microbeam before 2028."
  som: "$3.6M estimated year-3 SOM from 8 reachable design-partner sites at roughly $450K first-year spend per site."
  segments:
    - Academic cancer centers launching compact microbeam programs
    - MR-linac, compact proton, and other novel-radiotherapy programs as the first adjacency after beachhead proof
  buyingProcess: >-
    The champion is usually the chief medical physicist or translational program manager, while the economic buyer is the
    radiation-oncology chair, cancer-center COO, or innovation lead. Deals should begin as paid launch deployments tied to a
    hardware install or protocol kickoff, then convert to annual center licenses if the site reaches readiness faster and
    produces cleaner audit evidence.
product:
  mvp: >-
    MVP is a vendor-neutral launch workspace with commissioning workplans, QA checklists, protocol versioning,
    multidisciplinary case packets, and exportable evidence logs. It should prove one site can coordinate microbeam launch
    work without replacing its planning, record, or study systems.
  sixMonth: >-
    Launch 2-3 design-partner pilots with read-only integrations, commissioning timelines, first-case packet generation, and
    dashboards for readiness status, incomplete tasks, and protocol evidence gaps.
  twelveMonth: >-
    Convert the first pilots to production, release benchmark reporting across launch timelines and case-packet quality, and
    prove one adjacent-modality template for MR-linac or compact proton rollout.
  twentyFourMonth: >-
    Offer a modality-agnostic launch OS across microbeam and the best-performing adjacent programs, with reusable integration
    playbooks, consortium reporting, and premium evidence modules.
  keyBets:
    - Buyers will fund a standalone launch workflow before routine patient volume exists if the product shortens readiness timelines and cleans up audit evidence.
    - Read-only integrations are enough to win the first 2-3 sites without a multi-quarter replacement project.
    - Adjacent advanced-modality programs will reuse most of the same workflow model, making the market larger than microbeam alone.
    - Benchmark data on launch performance and case conversion will become more defensible than checklist automation by itself.
gtm:
  wedge: Sell a paid launch OS for first-program readiness and first-case evidence capture rather than a generic AI assistant or a replacement radiotherapy stack.
  channels:
    - Founder-led direct sales to radiation-oncology chairs, chief medical physicists, and translational launch leads
    - Co-selling with novel-modality OEMs and installation teams that need sites clinically ready on schedule
    - PTCOG, AAPM, MR-linac, and translational-consortium relationships once the first launch case study exists
  funnelTargets: "Lead→qualified design partner 15-25%, qualified design partner→paid pilot 25-35%, paid pilot→production 50%+, production site→second protocol or modality expansion within 12 months in 40%+ of converted accounts."
  pricing: >-
    Charge a center-level annual subscription plus a one-time modality-launch fee and optional protocol or evidence modules.
    This matches buyer behavior because sites fund a bounded launch program first and renew only if the software compresses
    time to readiness and supports audits better than OEM services or manual coordination.
businessModel:
  revenueStreams:
    - Annual cancer-center subscription
    - One-time modality-launch implementation fee
    - Protocol and evidence modules priced by active launch program
    - Benchmarking and consortium reporting modules
  unitOfValue: One active novel-radiotherapy launch program at a cancer center, with expansion by additional protocols and modalities.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more protocols and launch teams within the same cancer center
    - Expand from microbeam into MR-linac, compact proton, FLASH, or other novel-modality rollouts
    - Sell benchmarking and evidence products to multi-site consortia or OEM channel partners
    - Standardize multi-center implementation playbooks that reduce deployment time on later accounts
strategyMap:
  northStarMetric: Median days from signed launch project to first audit-ready patient packet.
  inputMetrics:
    - Percent of commissioning tasks completed on schedule
    - Percent of candidate cases converted into complete treatment packets
    - Median days from hardware or protocol kickoff to commission-ready status
    - Paid pilot to annual production conversion rate
    - Percent of launch workflow reused in the first adjacent modality deployment
  moatsToBuild:
    - Cross-site benchmark data on launch timelines, QA completion patterns, and first-case conversion
    - Reusable workflow templates that link physics QA, protocol milestones, and multidisciplinary review in one record
    - Vendor-neutral integration telemetry across TPS, OIS, CTMS, and OEM service environments
  killCriteria:
    - If fewer than 3 named Europe or North America launch sites commit to paid pilots or design-partner work within 12 months, the microbeam-first wedge is too early.
    - If the first 2 paid pilots do not reduce time to commission-ready status by at least 25% or keep incomplete first-case packets below 10%, the product is not materially better than manual coordination.
    - If one adjacent modality cannot reuse at least 80% of the core workflow with limited custom fields by month 18, the venture case is too narrow for the modeled TAM.
  mermaid: |
    flowchart LR
      Wedge[Microbeam launch wedge] --> MVP[Commissioning and case-packet MVP]
      MVP --> Proof[Faster readiness and audit-ready first cases]
      Proof --> Expansion[Adjacent modality expansion and benchmarks]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow pain and a coherent wedge, but conviction should stay low until named launch sites and adjacent-modality reuse are proven.
    whyBelieve: The company targets a real first-program bottleneck that incumbents fragment across planning, records, protocol systems, and manual QA work.
    whyDoubt: The installed base, budget authority, and timing for compact microbeam are all too uncertain today for a microbeam-only software company to clear a venture bar.
    nextDiligence: Secure 2-3 paid design partners or OEM-backed pilots and prove the same workflow also fits at least one adjacent advanced-modality launch.
  firstCustomer:
    title: Chief medical physicist or translational launch lead at a DACH academic cancer center evaluating compact microbeam
    profile: Comprehensive cancer center with an in-house medical physics team, prior advanced-radiotherapy experience, and a signed evaluation or study plan for compact microbeam or a closely related translational program.
    trigger: A decision to host a prototype, open a first-in-human protocol, or launch a radiation-plus-immunotherapy pilot that forces physics, oncology, and study teams onto one shared timeline.
    buyer: Chair of radiation oncology or cancer center COO
    initialContract: "$200K-$450K first-year contract combining a launch fee and annual software subscription, converting to roughly $150K-$300K ARR plus protocol or evidence modules once the program is live."
  mustBeTrue:
    - At least 3 Europe or North America centers with active microbeam evaluation plans must commit to paid launch pilots before the category reaches routine patient volume.
    - Buyers must fund $200K-$450K of first-year spend from launch or innovation budgets before recurring patient throughput exists.
    - The product must cut launch timelines by at least 25% or keep incomplete first-case packets below 10% versus spreadsheet or OEM-service baselines.
    - An adjacent modality such as MR-linac or compact proton must reuse most of the workflow without a ground-up rebuild.
    - The product must remain workflow and evidence infrastructure rather than patient-specific clinical decision support.
  diligenceQuestions:
    - Which named centers already have signed compact microbeam evaluation projects and what workflow stack do they use today?
    - Does budget ownership sit with the radiation-oncology chair, the innovation office, the chief physicist, or inside an OEM implementation package?
    - What KPI threshold would make a site renew after the first launch year instead of reverting to OEM services and spreadsheets?
    - How much of the workflow can be reused across MR-linac or compact proton commissioning without custom product work?
    - What regulatory position will counsel and buyer compliance teams take if the product assists eligibility review or combination-therapy timing?
operatingAssumptions:
  - assumption: At least 3 named Europe or North America centers will run pre-2028 microbeam or closely analogous launch programs and agree to paid design-partner work.
    basis: research.yaml
    validationTest: Secure 10 discovery calls with chief physicists, OEM install teams, or translational leads and convert at least 3 into signed LOIs or paid pilot scopes within 12 months.
    decisionImpact: If false, the company must shift the beachhead immediately toward adjacent modalities and treat microbeam as a reference account rather than the first market.
  - assumption: Buyers will pay for a standalone launch OS before routine patient volume exists if it is sold as a bounded launch program.
    basis: idea.yaml
    validationTest: Present pricing to 5 qualified centers or OEM-backed opportunities and secure at least 2 paid launch contracts above $200K first-year value.
    decisionImpact: If false, the company must bundle through OEMs or services partners, which lowers software leverage and slows independent sales motion.
  - assumption: Read-only integrations into TPS, OIS, CTMS, and QA systems are sufficient for the first year of deployments.
    basis: operator judgment
    validationTest: Put the first 2 pilots live in 8-12 weeks without write-back requirements or requests to replace incumbent systems.
    decisionImpact: If false, integration cost and implementation time rise sharply, forcing a narrower vendor focus and higher capital needs.
  - assumption: The same core workflow can serve MR-linac or compact proton launch programs with limited configuration changes.
    basis: research.yaml
    validationTest: Configure one adjacent-modality pilot with at least 80% shared workflow objects and fewer than 20% net-new feature requests by month 18.
    decisionImpact: If false, the venture case compresses toward a niche microbeam tool with a weaker TAM and a lower funding ceiling.
  - assumption: The product can stay outside heavy medical-device scope by avoiding patient-specific recommendations while still being useful enough to buy.
    basis: research.yaml
    validationTest: Obtain external regulatory counsel review plus written compliance feedback from 2 pilot sites before beta launch.
    decisionImpact: If false, the roadmap must narrow to audit and workflow tooling only or budget more time and capital for regulated software development.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 chief medical physicists, translational program managers, and OEM install leads in the beachhead segment.
    hypothesis: Buyers will describe the same urgent pain around commissioning dependencies, first-case packets, and audit-ready evidence capture.
    successMetric: At least 10 interviews confirm a shared trigger and 5 provide current-state workflow maps or sample launch artifacts.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run 2 concierge launch-mapping projects using one center or OEM workflow each before full software deployment.
    hypothesis: Even a semi-manual workflow layer can expose measurable launch delays and packet-quality gaps worth paying to fix.
    successMetric: Two prospects receive baseline scorecards and at least one signs a paid pilot scope.
    owner: Medical physics implementation lead
  - horizon: 90–180 days
    experiment: Ship the first MVP with commissioning task graphs, case packets, protocol versioning, evidence exports, and read-only integrations.
    hypothesis: A center can go live without replacing TPS, OIS, or CTMS systems and still coordinate launch work materially better.
    successMetric: First pilot live within 12 weeks and reporting weekly on readiness status, incomplete tasks, and case-packet completeness.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test pricing as a launch fee plus annual subscription across 3 qualified opportunities.
    hypothesis: Buyers prefer a defined launch package with renewal criteria over an open-ended services engagement.
    successMetric: At least 2 paid pilots signed and one buyer pre-approves annual pricing pending KPI success.
    owner: CEO founder
  - horizon: 180–360 days
    experiment: Deploy the workflow into one adjacent modality program such as MR-linac or compact proton.
    hypothesis: The product can expand beyond microbeam with mostly shared workflow objects and comparable buyer pain.
    successMetric: One adjacent pilot launched with at least 80% workflow reuse and a credible second pipeline opportunity.
    owner: Product and regulatory ops lead
  - horizon: 180–540 days
    experiment: Launch one OEM or consortium co-sell motion after the first production case study.
    hypothesis: Channel partners can shorten trust-building and accelerate pipeline once the company has evidence of launch-timeline improvement.
    successMetric: Partner-sourced opportunities reach at least 20% of qualified pipeline and produce one signed pilot.
    owner: OEM partnerships lead
operations:
  - Run each deployment as a weekly launch review across physics, oncology, and trial-operations owners until the site reaches first-patient readiness.
  - Keep the product vendor-neutral with read-only integrations and structured exports into incumbent TPS, OIS, CTMS, and QA systems.
  - Maintain protocol versioning, QA sign-off audit trails, and privacy controls from day one because early launches will sit inside studies or registries.
  - Turn every implementation into a reusable playbook so deployment knowledge compounds into product IP rather than remaining founder memory.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Owns founder-led sales, buyer discovery, pricing, and OEM or consortium relationship development while the category is still being defined.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the workflow engine, evidence exports, audit logs, and the first read-only integrations that determine deployment speed.
  - role: Medical physics implementation lead
    startTiming: Month 1
    rationale: Encodes commissioning and QA workflows, runs concierge launches, and turns site-specific launch steps into repeatable templates.
  - role: Product and regulatory ops lead
    startTiming: Month 3
    rationale: Keeps roadmap discipline around workflow versus clinical decision support, manages protocol-versioning requirements, and shortens onboarding.
  - role: OEM partnerships lead
    startTiming: Month 9
    rationale: Adds channel capacity only after the company has a case study and a repeatable implementation playbook that partners can sell with confidence.
milestones:
  - horizon: 0–12 months
    items:
      - Complete 15-20 buyer and partner interviews and sign 2-3 paid design-partner or pilot deployments.
      - Ship a read-only MVP covering commissioning workplans, case packets, protocol versioning, QA sign-offs, and evidence exports.
      - Prove at least one site-level KPI win on launch speed or packet completeness that supports annual renewal.
  - horizon: 12–24 months
    items:
      - Convert 3-5 launch programs to annual subscriptions and publish benchmark reporting across launch timelines and case quality.
      - Validate one adjacent-modality template and one OEM or consortium co-sell motion.
      - Standardize an 8-12 week implementation playbook without crossing into patient-specific treatment recommendations.
  - horizon: 24–36 months
    items:
      - Reach the researched year-3 SOM path of roughly 8 live launch programs at about $450K first-year spend or equivalent ARR mix.
      - Expand into the best-performing adjacent novel-modality category only if workflow reuse and renewal data remain strong.
      - Decide whether benchmark density justifies broader network products or whether the company should remain a focused launch OS.
risks:
  - risk: Compact microbeam first-patient timelines slip beyond 2028 and delay the beachhead market.
    likelihood: High
    impact: High
    mitigation: Sell the same workflow into MR-linac, compact proton, or other novel-modality launches before relying on microbeam volume.
  - risk: Buyers prefer OEM services or bundled incumbent features over a new standalone workflow layer.
    likelihood: High
    impact: Medium
    mitigation: Differentiate on vendor-neutral orchestration, cross-site benchmarks, and evidence exports that single-vendor tools do not provide.
  - risk: Integration and change-management burden makes pilots too slow for a small team.
    likelihood: Medium
    impact: High
    mitigation: Start with read-only integrations, narrow the first workflow to launch-critical steps, and measure time-to-live as a board-level KPI.
  - risk: The product drifts into patient-specific recommendations and triggers heavier software regulation.
    likelihood: Medium
    impact: High
    mitigation: Keep humans in the loop, avoid treatment recommendations, and gate every roadmap addition through regulatory review.
  - risk: Standalone budget ownership remains ambiguous between the chair, COO, innovation office, and OEM package.
    likelihood: Medium
    impact: Medium
    mitigation: Sell bounded launch programs with explicit KPI scorecards and test both direct and OEM-assisted contracting paths early.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: Build the vendor-neutral launch OS, fund 2-3 paid design-partner deployments, hire medical-physics and implementation depth, harden compliance and integration foundations, and validate adjacent-modality expansion before the microbeam market fully matures.
