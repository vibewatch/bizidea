jobsToBeDone:
  - job: >-
      当我们中心承诺推进紧凑型微束项目时，帮助我们调试系统并对齐物理、肿瘤学及治理里程碑，从而在无工作流混乱的情况下完成首例患者治疗。
    currentAlternative: 供应商文档、电子表格、邮件线程及通用项目管理工具
    successMetric: 从项目启动到调试就绪状态及首例患者治疗所需天数
  - job: >-
      当我们评估一位难治性实体瘤患者是否适合微束联合全身治疗时，帮助我们汇集正确的证据、审批和排期计划，从而安全治疗符合条件的患者并从每例中学习。
    currentAlternative: 肿瘤委员会记录、CTMS 记录、手工 QA 核查表及临时协调电话
    successMetric: 候选患者转化为完整且按时治疗包的比例
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 集群涵盖官方同日发布的新闻、印证报道、已资助原型里程碑及明确的首例患者时间线。
  painIntensity:
    score: 4
    rationale: 早期中心面临真实的运营和监管痛点，碎片化的启动工作流可能延迟首例治疗并削弱证据质量。
  wedgeClarity:
    score: 5
    rationale: 面向学术癌症中心的微束项目启动OS是切口明确的入门产品，买家、触发场景和首批工作流清晰。
  defensibility:
    score: 4
    rationale: 跨中心调试数据、工作流模板及早期结果证据可逐步形成转换成本，这是通用计划工具所不具备的。
  ventureScale:
    score: 4
    rationale: 首个切入点较为垂直，但可扩展至多种新型放射治疗模式、研究网络及证据产品。
topRisks:
  - name: 品类时机风险
    description: 若紧凑型微束系统到达临床站点的时间晚于既定时间线，滩头市场的成熟速度可能慢于预期。
    mitigation: 从已资助转化启动工作的中心和OEM起步，并将工作流设计为在微束量到来之前就能支持邻近新型放射治疗项目。
  - name: 临床证据异质性
    description: 免疫反应和联合疗法获益可能因肿瘤类型和方案而异，这会使一刀切的工作流假设变得危险。
    mitigation: 保持产品在方案设计和证据采集方面的可配置性，并将其定位为执行层而非临床疗效声明的来源。
  - name: 在位企业体系挤压
    description: 治疗计划供应商或设备OEM可能捆绑轻量级调试工具来保护客户账户。
    mitigation: 集成到现有厂商系统中，同时掌控跨职能编排、基准评测和多中心证据层——这是单供应商工具所无法提供的。
