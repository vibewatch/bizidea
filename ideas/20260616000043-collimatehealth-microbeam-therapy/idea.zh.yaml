problem: >-
  将微束放射治疗从同步辐射装置压缩至10平方米以内，并不意味着癌症中心已做好临床准备。早期采用者仍需将新型束流模式转化为调试方案、患者筛选规则、肿瘤委员会决策、联合疗法时间安排及监管级证据，而现有工具却分散在通用治疗计划软件、物理师电子表格、CTMS 系统和供应商文档中。这种碎片化将延缓首批临床方案落地、产生不一致的证据包，并让放射肿瘤学团队难以证明微束在诊疗路径中的定位。
targetUser:
  primary: 学术癌症中心负责筹备首批紧凑型微束疗法项目的首席医学物理师或转化放射肿瘤学项目经理
  secondary: 为难治性实体瘤患者设计微束加免疫疗法方案的放射肿瘤医生及临床试验协调员
  buyer: 放射肿瘤科主任、癌症中心COO或肿瘤服务线创新总监
startupThesis:
  nonObviousInsight: >-
    一旦设备能装入医院，稀缺资源不再是束流获取，而是让物理师、放射肿瘤医生和肿瘤科医生能够调试该模式并在不每次重新发明工作流的情况下运行首例人体试验的操作系统。大多数观察者看到的是一项硬件登月计划，但更近期的切入点是将微束从原型转化为可复制临床服务的项目启动层。
  beachhead: >-
    欧洲和北美拥有质子或其他先进放射治疗项目、配备内部医学物理团队并计划在2028年前评估首批紧凑型微束装置用于难治性实体瘤研究的学术癌症中心
  wedge: >-
    一套微束启动OS，管理站点调试、患者适配审查、联合疗法排期、QA 签发，并为每个早期病例提供监管级证据采集
  whyNowCatalyst: >-
    CollimateHealth 已完成资金注入的临床原型、10平方米以内的占地目标及2028年底首例患者目标，使站点就绪与首例病例协调成为即时瓶颈。
  ventureScalePath: >-
    从微束启动项目切入，扩展至 FLASH、空间分割质子治疗及其他新型放射模式，成为先进放射治疗部署、注册证据和多站点转诊运营的控制平面。
solution: >-
  产品为早期采用中心提供专属工作空间，从可行性评估到首例患者全程覆盖。它将调试任务、剂量学与 QA 核查表、方案里程碑、肿瘤委员会资格决策和全身治疗排期整合进一条物理与临床团队共用的时间线。针对每位候选患者，产品生成结构化治疗包，含站点就绪状态、患者适配标准、束流计划检查点及免疫监测任务，而非将信息散落在邮件和电子表格中。对管理层而言，产品呈现调试周期、方案瓶颈和病例转化率等关键启动指标。随着时间推移，公司将在各中心和适应症间积累一套关于新型放射疗法从原型走向临床常规的专有数据集。
goToMarketSeed:
  firstCustomer: >-
    DACH 地区或瑞士的学术癌症中心，拥有质子或实验性放射治疗项目及强大的内部医学物理团队，并已签署对紧凑型微束系统或相关转化研究的评估项目
  buyingTrigger: >-
    决定托管首个临床原型、启动临床前到临床的微束项目，或设计跨越物理与肿瘤内科的放射加免疫疗法试点方案
  currentAlternative: 通用治疗计划软件、物理师电子表格、纸质 QA 活页夹、CTMS 工具及供应商专业服务
  switchingReason: >-
    启动OS提供一套跨职能系统，统一调试、患者筛选和证据采集，而现有厂商将这些功能分散在各自工具中，减少启动延误和审计风险。
  pricingHypothesis: >-
    按癌症中心收取年度企业订阅费，外加一次性模式启动费及按活跃方案可选的证据或基准模块
whyNow:
  - point: 超额认购的种子轮资助首个临床原型，意味着微束正从纯实验室阶段进入医院启动规划。
    signalRefs: ["原型资金已到位"]
    sourceRefs: [1]
  - point: 2028年底首例患者的明确目标，给早期中心一个有限窗口来部署调试、治理及首例病例工作流。
    signalRefs: ["首例患者倒计时已启动"]
    sourceRefs: [1, 2, 3]
  - point: 若微束旨在提升化疗与免疫疗法疗效，放射肿瘤学便不能再将其作为独立硬件项目部署。
    signalRefs: ["微束疗法正被定位为联合疗法放大器"]
    sourceRefs: [2, 3]
  - point: 将同步辐射级束线压缩至10平方米以内，将瓶颈从庞大基础设施转移到真实癌症中心内的临床执行。
    signalRefs: ["医院级部署正变得可行"]
    sourceRefs: [3]
  - point: 额外的临床前与监管工作使结构化 QA 和证据采集成为每个早期站点与方案的即时需求。
    signalRefs: ["监管证据已成为产品需求"]
    sourceRefs: [1, 2]
differentiator: >-
  通用放射治疗计划系统负责束流计算，CTMS 供应商负责研究管理，设备OEM提供碎片化的调试支持，但没有任何一方掌控全新放射模式的跨职能启动工作流。本公司占据设备就绪与患者治疗之间那个狭窄却关键的层级，在这里物理 QA、肿瘤协调与监管级证据必须汇聚。护城河来自于多中心在启动时间线、早期病例工作流、联合方案模式及运营结果方面的数据集——这是单站点工具和单供应商体系难以复制的。
