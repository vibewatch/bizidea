modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetCenters --> PaidPilots
      PaidPilots --> LivePrograms
      LivePrograms --> LicenseRevenue
      LivePrograms --> LaunchFees
      LivePrograms --> ModuleExpansion
      LicenseRevenue --> Revenue
      LaunchFees --> Revenue
      ModuleExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Salary
      GrossProfit --> Opex
      GrossProfit --> Cash
modelSanity:
  - checkName: 营收引擎
    finding: >-
      基准营收路径：从 Y1 三个付费试点增长至 Q4Y3 八个在线上线项目，站点混合营收逐步向研究所示 $450K 首年支出水平靠拢。
  - checkName: 必须做对的事
    finding: >-
      相邻适应症复用须在第 18 个月前启动，才能在无需从头重建的情况下，从 Y2 末 4 个生产中心扩展至 Y3 的 8 个在线项目。
  - checkName: 模型失效条件
    finding: >-
      基准情景现金最低点约为 $0.1M，销售周期延长 12 个月或毛利率低于 68% 均可能在 Q4Y3 前触发过桥融资。
  - checkName: 下一轮融资证明
    finding: >-
