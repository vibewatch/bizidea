scenarios:
  downside:
    description: >-
      微束上线时间延迟，相邻适应症复用落地晚于预期，上线项目服务密度高于计划。
    y3RevenueK: 1900.0
    y3EbitdaK: -867.8
    cashLowPointK: -660.5
    keyAssumptionChanges:
      - Y2 末年化生产站点从 4 降至 3。
      - Y3 末在线项目从 8 降至 6。
      - 每在线中心年均混合营收上限约 $350K，低于基准的 $390K。
      - 因实施工作仍高度定制化，Y3 末毛利率仅达 70%。
  base:
    description: >-
      Y1 三个付费试点在 Y2 末转化为 4 个生产中心，Q4Y3 达到 8 个在线上线项目，相邻适应症复用开始落地。
    y3RevenueK: 2692.0
    y3EbitdaK: -262.4
    cashLowPointK: 98.6
    keyAssumptionChanges:
      - A1-A23 基准假设不变。
  upside:
    description: >-
      OEM 与联盟渠道提前开放，相邻适应症模板转化加速，模块扩展拉高站点混合营收。
    y3RevenueK: 3410.0
    y3EbitdaK: 319.3
    cashLowPointK: 549.1
    keyAssumptionChanges:
      - Y2 末年化生产站点从 4 升至 5。
      - Y3 末在线项目从 8 升至 9。
      - 每在线中心年均混合营收约达 $430K。
      - 只读上线模板提前实现复用，毛利率达 74%。
