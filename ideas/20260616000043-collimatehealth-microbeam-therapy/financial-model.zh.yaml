slug: microbeam-program-launch-os
date: 2026-06-16
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-07"
    unit: month
    source: "[BP date 2026-06-16]；模型从计划日期后的第一个完整月份开始。"
  - id: A2
    name: pre-seed 轮关闭后的期初现金
    value: "2000"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M]；基准情景取区间低端，因为该计划在 Y2 末达到关键证明节点并保留 6 个月缓冲。"
  - id: A3
    name: Y1 末付费试点站点数
    value: "3"
    unit: sites
    source: "[BP milestones 0-12 months] 及 [BP investorMemo.firstCustomer]；基准情景为 M12 前 3 个付费试点。"
  - id: A4
    name: Y2 末进入年度生产的站点数
    value: "4"
    unit: sites
    source: "[BP milestones 12-24 months]；基准情景取 Q4Y2 目标 3-5 个转化站点的中位值。"
  - id: A5
    name: Y3 末在线项目数
    value: "8"
    unit: programs
    source: "[BP milestones 24-36 months] 及 [Research market.som rationale]。"
  - id: A6
    name: 客户获取节奏
    value: "M5 第一个付费试点，M8 第二个，M11 第三个，Q3Y2 第四个，Q2Y3 第六个在线项目，Q4Y3 第八个在线项目。"
    unit: timing
    source: "[BP gtm.funnelTargets]、[BP milestones] 及 [Research reportMemo.validationPlan]。"
  - id: A7
    name: 每在线项目月均混合营收爬坡
    value: "Y1 试点月 $24K，Y2 $29-34K，Y3 $35-39K。"
    unit: USDK per active site per month
    source: "[BP investorMemo.firstCustomer.initialContract]、[BP businessModel.revenueStreams] 及 [Research market.som rationale]。"
  - id: A8
    name: 主营成本与毛利率爬坡
    value: "Y1 COGS 35%，H1Y2 32%，H2Y2 30%，H1Y3 29%，H2Y3 28%。"
    unit: percent of revenue
    source: "[BP businessModel.targetGrossMarginPct 70]；模板与集成复用后，上线工作流服务密度下降。"
  - id: A9
    name: 创始人/CEO 含税现金薪酬
    value: "180"
    unit: USDK annualized per FTE
    source: "欧洲 pre-seed B2B 健康科技创始人低于市场水准的现金薪酬启发式估算。"
  - id: A10
    name: 工程师含税现金薪酬
    value: "170"
    unit: USDK annualized per FTE
    source: "含薪资税和福利的早期工作流与集成工程师启发式估算。"
  - id: A11
    name: 医学物理实施负责人含税现金薪酬
    value: "160"
    unit: USDK annualized per FTE
    source: "[BP team medical physics implementation lead]；承担交付与模板工作的领域专家启发式估算。"
  - id: A12
    name: 产品与法规运营负责人含税现金薪酬
    value: "150"
    unit: USDK annualized per FTE
    source: "[BP team product and regulatory ops lead]；早期合规与产品运营岗位启发式估算。"
  - id: A13
    name: OEM 与 GTM 负责人含税现金薪酬
    value: "165"
    unit: USDK annualized per FTE
    source: "[BP team OEM partnerships lead]；pre-seed 合作伙伴与企业销售岗位启发式估算。"
  - id: A14
    name: G&A 与运营含税现金薪酬
    value: "125"
    unit: USDK annualized per FTE
    source: "精简 pre-seed 公司财务、法务及运营支持岗位启发式估算。"
  - id: A15
    name: 招聘节奏
    value: "实施负责人 M2 入职，产品/法规运营 M4，第二工程师 M7，OEM/GTM M10，第三工程师 M14，第二实施 FTE M16，运营 M19，第二 GTM FTE M26，第四工程师 M31。"
    unit: timing
    source: "[BP team startTiming]；与试点交付及相邻适应症拓展节点挂钩的保守招聘节奏。"
  - id: A16
    name: 非薪酬销售与市场费用爬坡
    value: "Y1 月均 $5-8K，Y2 $10-14K，Y3 $16-18K。"
    unit: USDK per month
    source: "[BP gtm.channels]；创始人主导、差旅密集型企业销售启发式估算。"
  - id: A17
    name: 非薪酬研发与合规工具费用爬坡
    value: "Y1 月均 $8-11K，Y2 $12-14K，Y3 $15-16K。"
    unit: USDK per month
    source: "[BP operations]、[Research regulatoryTechnicalConstraints]；云端、安全与集成工具启发式估算。"
  - id: A18
    name: 非薪酬 G&A 费用爬坡
    value: "Y1 月均 $4-6K，Y2 $6-8K，Y3 $9-10K。"
    unit: USDK per month
    source: "法务、审计、保险及数据隐私管理费用启发式估算。"
  - id: A19
    name: 稳态每在线中心年均营收
    value: "390"
    unit: USDK per year
    source: "[BP investorMemo.firstCustomer.initialContract] 及 [Research market.som rationale]；基准值低于 SOM $450K 以反映续约与模块扩展的混合效应。"
  - id: A20
    name: 稳态客户获取成本（CAC）
    value: "120"
    unit: USDK per live center
    source: "[BP gtm.funnelTargets]；创始人主导窄渠道企业销售启发式估算。"
  - id: A21
    name: 稳态月流失率
    value: "2.5"
    unit: percent
    source: "启发式估算；上线项目嵌入后黏性较强，但各中心可能将每次适应症上线视为阶段性项目，续约风险高于横向 SaaS。"
  - id: A22
    name: 现金转化假设
    value: "以 EBITDA 代理现金变动。"
    unit: policy
    source: "启发式估算；模型假设无债务、极低资本开支，营运资金波动相互抵消。"
  - id: A23
    name: 下一轮融资证明节点
    value: "Y2 末需达成：4 个年化生产中心、一个相邻适应症模板、基准报告，以及 8-12 周部署手册。"
    unit: milestone
    source: "[BP milestones 12-24 months]、[BP strategicChoices.sequencingRationale] 及 [Research reportMemo.executiveTakeaways]。"
