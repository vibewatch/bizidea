competitors:
- name: RaySearch
  stage: incumbent
  wedge: Integrated TPS plus modern OIS for advanced radiotherapy workflows.
  pricing: Custom enterprise pricing (not public).
  strength: Deep credibility in advanced planning and digital workflow inside radiation oncology.
  weaknessVsUs: Not purpose-built for first-program commissioning, multidisciplinary launch operations, or modality-agnostic evidence capture.
  sourceRefs:
  - 24
  - 25
- name: Siemens Healthineers / Varian
  stage: incumbent
  wedge: Dominant oncology information, planning, and adaptive-treatment stack across the treatment journey.
  pricing: Custom enterprise pricing (not public).
  strength: Large installed base and tight connection to treatment delivery, records, and adaptive workflows.
  weaknessVsUs: Strongest inside its own ecosystem, but less natural as a neutral control plane for cross-vendor, first-launch workflow and translational evidence.
  sourceRefs:
  - 26
  - 27
  - 32
- name: Elekta
  stage: incumbent
  wedge: Broad oncology-software platform linking workflow, interoperability, and planning.
  pricing: Custom enterprise pricing (not public).
  strength: Established enterprise relationship and workflow touchpoints in radiation oncology.
  weaknessVsUs: General-purpose platform breadth can dilute focus on niche modality-launch tasks and multi-disciplinary commissioning sequences.
  sourceRefs:
  - 28
  - 29
- name: Advarra OnCore
  stage: incumbent
  wedge: Clinical-trial and protocol operations management for research sites.
  pricing: Custom enterprise pricing (not public).
  strength: Strong fit for protocol and study administration inside academic centers.
  weaknessVsUs: Does not own machine commissioning, dosimetry QA, or radiation-physics sign-off workflows.
  sourceRefs:
  - 30
