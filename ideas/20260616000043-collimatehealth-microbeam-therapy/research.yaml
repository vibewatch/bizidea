openQuestions:
- Which named centers beyond CollimateHealth’s immediate network have signed or active compact microbeam evaluation projects before 2028?
- Will first microbeam use cases launch under full device-study protocols, registry-style evidence collection, or center-specific compassionate-use pathways?
- 'What buyer owns the budget in practice: the department chair, the innovation office, the chief physicist, or the OEM-led implementation package?'
- How much of the launch workflow can stay outside medical-device classification if the product assists eligibility review and combo-therapy timing but avoids dose or treatment recommendations?
