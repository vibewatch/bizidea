reportMemo:
  executiveTakeaways:
  - The credible near-term market is not broad radiotherapy IT; it is the narrow launch layer for a small set of advanced centers commissioning novel modalities and collecting first-case evidence.
  - The wedge is strategically attractive because incumbents split the workflow across treatment planning, oncology information systems, CTMS, and manual QA practices rather than owning cross-functional launch orchestration.
  - 'Category timing is the dominant risk: compact microbeam hardware is moving toward the clinic, but clinical indication fit and operating norms are still being formed.'
  - The venture case improves materially only if the product expands from microbeam into FLASH, compact proton, MR-guided, and other novel-radiotherapy rollout programs once the first workflow templates are proven.
  marketDefinition: A control-plane software layer for commissioning novel radiotherapy programs and converting early patient cases into repeatable, audit-ready operations.
  customerAndBuyer: Primary users are chief medical physicists and translational program managers; economic buyers are department chairs, cancer-center operators, and innovation leaders funding new modality launches.
  buyingTriggers:
  - point: A center decides to host or evaluate a compact microbeam system, turning modality readiness into a cross-functional launch program instead of a physics-only project.
    sourceRefs:
    - 1
    - 2
    - 3
    - 4
  - point: A translational site opens or expands an MR-linac, proton, or registry-heavy advanced-radiotherapy program and needs repeatable implementation playbooks.
    sourceRefs:
    - 17
    - 18
    - 19
    - 20
  - point: Leadership needs regulator-ready QA, protocol, and case-review evidence rather than ad hoc binders, spreadsheets, and siloed systems.
    sourceRefs:
    - 21
    - 22
    - 23
  willingnessToPay:
    summary: Centers already absorb meaningful staffing and coordination burden to launch advanced modalities, so a workflow layer that compresses chart review, protocol coordination, and QA handoffs can plausibly win budget from program-launch or clinical-innovation spend even without replacing incumbent TPS or EHR systems.
    sourceRefs:
    - 19
    - 20
    - 21
    - 30
    - 31
  competitiveLandscape: 'Competition is fragmented rather than direct: planning and record systems own treatment workflows, CTMS and EHR tools own protocol administration, and OEM or in-house teams own the first-site launch checklist.'
  incumbentThesis:
  - incumbentClass: Treatment planning and oncology information systems
    point: Varian, Elekta, and RaySearch own planning and treatment records, but they do not win by default because first-program commissioning, combo-therapy timing, and cross-team evidence capture sit outside their core workflow.
    sourceRefs:
    - 24
    - 25
    - 26
    - 27
    - 28
    - 29
  - incumbentClass: CTMS and EHR vendors
    point: OnCore and Epic can manage protocols and records, but they are not designed to run machine-readiness, dosimetry QA, and physics sign-off dependencies.
    sourceRefs:
    - 30
    - 31
  - incumbentClass: OEM professional services
    point: Hardware vendors can help the first install succeed, but their services are usually single-vendor, high-touch, and weak at benchmarking or standardizing launch performance across centers.
    sourceRefs:
    - 1
    - 3
    - 4
  - incumbentClass: In-house QA and project stack
    point: Spreadsheets, binders, and home-grown scripts are flexible for pioneers, but they do not scale well for audit trails, multi-site learning, or multidisciplinary peer review.
    sourceRefs:
    - 21
    - 22
    - 23
    - 37
  regulatoryLandscape: The product is strategically safest when positioned as workflow, QA, and evidence infrastructure; the moment it starts ranking patients or recommending treatment actions, software-regulation and privacy scope become materially heavier.
  technologyLandscape: Microbeam remains an emerging modality, so the software winner is more likely to integrate with existing planning, record, and study systems than to replace them outright.
  distributionChannels:
  - point: Co-sell with novel-modality OEMs and translational install teams that need sites to become clinically ready on schedule.
    sourceRefs:
    - 1
    - 3
    - 4
  - point: Sell directly into chief physicists and launch leads through PTCOG, AAPM, and MR-linac communities where advanced-modality workflows are already discussed.
    sourceRefs:
    - 9
