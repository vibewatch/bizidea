jobsToBeDone:
- job: 当编码 agent 开始跨多支团队生成 PR 时，帮平台负责人把每次 build 和集成测试都放进已批准的 sandbox 里跑完，这样他们就能在不炸掉 CI 可靠性和安全审查的前提下，把 agent 扩到更多生产工作流。
  currentAlternative: 自建 runner，以及人工维护的 sandbox 环境
  successMetric: agent 生成任务的排队时间降低 50%，同时做到完整审计覆盖
- job: 当发布周把 agent runtime 需求推到高峰时，帮开发者效率团队把工作负载路由到多个已批准的 provider 上，这样他们就能在不囤闲置峰值容量的情况下，把延迟守在可预测范围内。
  currentAlternative: 单云过度扩容，再加上人工故障切换
  successMetric: 在目标延迟和策略合规前提下，把突发算力成本压低 30%
