problem: 当编码 agent 不再只是补全代码，而是开始直接写 PR，它们就必须进到真实执行环境里跑 build、集成测试、浏览器检查，以及生成代码的实际执行。多数企业现在是把自建 CI runner、单一 runtime 供应商和脆弱的安全审查硬拼在一起，结果就是队列高峰更频繁、环境不一致，也没人敢放心让不受信任的 agent 代码碰到高权限系统。最后形成的瓶颈很直接：团队不是为了少数高峰提前买一堆闲置容量，就是在 agent 真正进入生产工作流前先把采用速度压下来。
targetUser:
  primary: 一家拥有 500-2,000 名工程师的 B2B 软件公司里，负责推动内部编码 agent 落地的平台主管工程副总裁或 AI 平台负责人
  secondary: 负责 CI、预览环境和策略执行的资深开发者效率工程师
  buyer: 平台主管工程副总裁，或由 CIO 主导的内部 AI 平台 owner
startupThesis:
  nonObviousInsight: AI 编码里真正稀缺的资产，不只是 GPU 时间，而是那些已经过策略审批、又能复现的不受信任 agent 代码执行槽位。Modal 证明了市场正在爆发，也证明 sandbox 这类安全原语很关键，因此给一个中立 runtime broker 留出了空间：它能把割裂的云容量真正变成企业可用的编码工作负载。
  beachhead: 先打 500-2,000 名工程师规模的 Series C+ B2B SaaS 公司：它们已经批准后端团队使用内部编码 agent，现在需要让每个 agent 生成的 PR，都在合规网络边界内跑完集成测试、浏览器检查和临时预览环境。
  wedge: 做一个具备策略感知的 runtime broker：把每个 agent 任务都封进带签名的临时 sandbox，在多家已批准的云之间调度 CPU 和 GPU 步骤，并返回可审计的执行轨迹与 warm-cache 复用。
  whyNowCatalyst: 正是这波把 Modal 从 $60M ARR 推到 $300M ARR、并逼着它接 13 家基础设施伙伴的企业 AI 编码浪潮，也在逼买方立刻补上“多 provider、策略安全”的执行层；否则单一供应商很快就会成为瓶颈。
  ventureScalePath: 先从编码 agent 的 build 与测试执行切入，再往外扩成通用执行层，覆盖支持 agent、数据 agent、模型评测任务，以及需要隔离式突发算力、策略控制和审计能力的受监管内部自动化流程。
solution: 产品夹在编码 agent 与基础设施 provider 之间，既是控制平面，也是执行层。开发者或平台团队先定义好批准过的基础镜像、secret 边界、网络策略和成本上限；随后 broker 会按延迟、合规和实时容量，把每个任务拉起到最合适的 provider 上，并放进带签名的 sandbox 里执行。它还能把 build layer 和测试产物的缓存跨 provider 复用，所以面对突发高峰时，成本和速度都比简单做云容灾更好。每次运行都会留下可回放的轨迹，说明执行了哪段代码、调用了哪些工具、暴露了哪些 secret、以及最终跑在哪个 provider 上。这让产品同时能打动两类人：一类想把 agent 扩到更多团队的平台团队，另一类是不愿盲信 agent 的安全团队。
goToMarketSeed:
  firstCustomer: 首个客户会是垂直 SaaS 公司里负责平台工程的 VP，团队规模约 700-1,500 名工程师，已经正式把 Claude Code 或类似内部编码 agent 推给后端团队，并开始看到 agent 生成的 PR 把 CI 队列打满。
  buyingTrigger: 一次内部 agent 推广从 pilot 扩到多支团队后，测试队列延迟、安全审查摩擦，或发布周的突发算力超支突然集中爆发。
  currentAlternative: 自建 GitHub Actions runner、单云 sandbox 供应商，以及套在现有 CI 流程外面的人工策略审查。
  switchingReason: 这个 broker 能同时给他们爆发容量、可审计的隔离能力和 provider 冗余，而不必提前囤 GPU，也不必自己重造一套 CI 与 sandbox 栈。
  pricingHypothesis: 按 sandbox 分钟和缓存产物收费；对大型企业再叠加预留容量包和合规策略包。
