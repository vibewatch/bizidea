differentiator: 传统 CI 厂商管的是可信开发者工作流和固定 runner；serverless GPU 云卖的是裸执行容量。这家公司要解的是另一个控制问题：如何为不受信任的 AI 生成代码，同时做好策略执行、可复现的 sandbox 打包，以及实时容量 brokerage。时间一长，它还能沉淀出跨 provider 的可靠性与价格地图，知道什么工作负载该往哪儿路由，这层路由智能会越来越难替代。
