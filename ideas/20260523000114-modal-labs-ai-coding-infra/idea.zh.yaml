topRisks:
- name: 在位厂商打包
  description: 云 runtime 供应商或 hyperscaler 可能补上足够多的策略与路由能力，缩小差异化空间。
  mitigation: 把重点放在中立的多 provider 治理、跨厂商审计，以及单一 provider 结构上难以提供的工作负载可移植性上。
- name: 采用节奏偏慢
  description: 如果企业始终把编码 agent 关在有限 pilot 里，工作负载规模可能来不及支撑一层新的 runtime 产品。
  mitigation: 先挑已经看到 CI 饱和的客户，把定价锚在立刻可见的排队时间与容量节省上，而不是远期转型承诺。
- name: 安全证明负担
  description: 买方可能不愿把不受信任代码执行和敏感 build 上下文交给一个新的中间层。
  mitigation: 从第一批共创客户开始，就提供带签名的 sandbox 模板、严格的 secret 范围控制、可回放轨迹，以及第三方安全证明。
