problem: >-
  As coding agents move from autocomplete to writing pull requests, they must run builds, integration tests, browser checks, and generated code inside real execution environments. Most enterprises piece this together with self-hosted CI runners, one runtime vendor, and brittle security reviews, which creates queue spikes, inconsistent environments, and real concern about letting untrusted agent-written code touch privileged systems. The result is a rollout bottleneck: either teams overbuy capacity for rare bursts or they throttle agent adoption before it reaches production workflows.
targetUser:
  primary: VP Platform Engineering or Head of AI Platform at a 500-2,000 engineer B2B software company rolling out internal coding agents
  secondary: Staff-level developer productivity engineers responsible for CI, preview environments, and policy enforcement
  buyer: VP Platform Engineering or CIO-led internal AI platform owner
startupThesis:
  nonObviousInsight: >-
    The scarce asset in AI coding is not just GPU time; it is policy-approved, reproducible execution slots for untrusted agent-generated code. Modal proves the market is exploding and that safety primitives like sandboxes matter, which opens room for a neutral runtime broker that makes fragmented cloud capacity actually usable for enterprise coding workloads.
  beachhead: >-
    Series C+ B2B SaaS companies with 500-2,000 engineers that have approved internal coding agents for backend teams and now need every agent-generated pull request to run integration tests, browser checks, and ephemeral previews inside approved network boundaries
  wedge: >-
    A policy-aware runtime broker that packages each agent task into a signed ephemeral sandbox, routes CPU and GPU steps across multiple approved clouds, and returns auditable execution traces with warm-cache reuse
  whyNowCatalyst: >-
    The same enterprise AI coding adoption that pushed Modal from $60M to $300M ARR and forced it to assemble 13 infrastructure partners is creating immediate pressure for buyers to add multi-provider, policy-safe execution before one vendor becomes a bottleneck.
  ventureScalePath: >-
    Start with coding-agent builds and test execution, then expand into a general execution fabric for support agents, data agents, model-evaluation jobs, and regulated internal automations that all need isolated burst compute with policy and audit.
solution: >-
  The product sits between coding agents and infrastructure providers as a control plane plus execution fabric. Developers or platform teams define approved base images, secrets boundaries, network policies, and cost ceilings, then the broker spins up each task in a signed sandbox on the best-fit provider based on latency, compliance, and live capacity. It caches build layers and test artifacts across providers so bursts are cheaper and faster than raw cloud failover. Every run produces a replayable trace showing what code executed, what tools it called, what secrets were exposed, and which provider hosted the workload. That makes the wedge valuable to both platform teams trying to scale agents and security teams trying to trust them.
goToMarketSeed:
  firstCustomer: >-
    VP Platform Engineering at a 700-1,500 engineer vertical SaaS company that has formally rolled out Claude Code or similar internal coding agents to backend teams and is seeing agent-generated pull requests saturate CI queues
  buyingTrigger: >-
    An internal agent rollout moves from pilot to multiple teams and suddenly creates test-queue delays, security-review friction, or burst compute overruns during release weeks
  currentAlternative: Self-hosted GitHub Actions runners, single-cloud sandbox vendors, and manual policy reviews wrapped around status-quo CI pipelines
  switchingReason: >-
    The broker gives them burst capacity, auditable isolation, and provider redundancy without buying spare GPUs or rebuilding their CI and sandbox stack in-house.
  pricingHypothesis: Usage-based pricing per sandbox minute and per cached artifact, with premium reserved-capacity and compliance-policy packages for large enterprises
