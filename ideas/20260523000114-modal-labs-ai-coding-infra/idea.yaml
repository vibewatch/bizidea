topRisks:
  - name: Incumbent bundling
    description: A cloud runtime vendor or hyperscaler could add enough policy and routing features to narrow the differentiation gap.
    mitigation: Focus on neutral multi-provider governance, cross-vendor audit, and workload portability that single providers are structurally weak at offering.
  - name: Adoption pacing
    description: If enterprises keep coding agents in limited pilots, workload volume may not justify a new runtime layer soon enough.
    mitigation: Start with customers already seeing CI saturation and price around immediate queue-time and capacity savings instead of long-term transformation promises.
  - name: Security proof burden
    description: Buyers may hesitate to trust a new intermediary with untrusted code execution and sensitive build contexts.
    mitigation: Offer signed sandbox templates, strict secret-scoping, replayable traces, and third-party security attestations from the first design-partner deployments.
