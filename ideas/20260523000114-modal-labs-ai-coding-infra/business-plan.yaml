slug: "agent-runtime-burst-broker"
date: "2026-05-23"
executiveSummary: >-
  Agent Runtime Burst Broker should start as a policy-governed overflow execution layer for 500-2,000 engineer B2B software
  companies that have already rolled out internal coding agents and are now seeing agent-generated pull requests saturate CI
  queues. The first product should not try to replace GitHub Actions, cloud build services, or a sandbox vendor; it should
  intercept agent-triggered builds, integration tests, browser checks, and selected generated-code tasks, package them into
  signed ephemeral sandboxes, and route them across approved providers with replayable audit traces. This beachhead is narrow
  on purpose because the buyer, trigger, and ROI are clearest when one platform team is already absorbing queue spikes,
  security-review friction, and burst-capacity overruns during release weeks. Research-backed sizing supports an estimated
  $1.1B TAM, $264.6M initial SAM, and $7.9M year-3 SOM if the company stays focused on mid-to-large software teams before
  expanding into broader agent-runtime workloads. The go-to-market should sell security throughput and burst reliability,
  not cheaper compute, using paid BYOC pilots that prove lower queue time, complete execution traces, and easier procurement.
  The company can win if it becomes the neutral governance and routing layer that incumbents do not naturally offer across
  existing CI estates and multiple clouds. The biggest disconfirming risks are that overflow-only deployment may not be enough
  to justify budget, that incumbents may bundle similar policy features, and that early buyers may demand GPU, browser, or
  VPC capabilities beyond the initial workload mix. The first 12 months therefore need to prove that buyers will pay for an
  agent-only execution pool, that BYOC meaningfully shortens security review, and that cross-provider routing beats a
  single-vendor baseline on latency, cost, or approval time.
problem:
  - "As internal coding agents move from suggestion to pull-request creation, agent-generated builds, integration tests, and browser checks collide with human CI workloads and create queue spikes that existing runner pools were not designed to absorb."
  - "Security and compliance teams are reluctant to let untrusted agent-written code run against privileged systems unless execution is isolated, auditable, and bound to explicit network, secret, and provenance controls."
solution:
  - "Insert a policy-aware control plane between coding agents and execution infrastructure so each agent task runs inside a signed ephemeral sandbox with approved base images, short-lived credentials, explicit egress rules, and replayable traces."
  - "Route CPU, browser, and later GPU workloads across multiple approved providers with cache reuse and policy checks, landing first as an agent-only overflow pool that coexists with the customer's current CI workflow."
whyWeWin:
  - "GitHub Actions, cloud build services, and sandbox vendors each solve part of the workflow, but none naturally own neutral cross-provider governance, provenance, and routing across the customer's existing CI estate."
  - "Every production run compounds differentiated data on workload shape, cold starts, failure modes, cache behavior, and policy outcomes across providers, which can make routing quality and audit posture improve faster than a single-provider runtime."
strategicChoices:
  beachhead: "North American and European B2B software companies with 500-2,000 engineers, GitHub-centric CI, and a formal internal coding-agent rollout for backend teams that now generates enough PR and test volume to saturate runner capacity."
  wedgeRationale: "An agent-only overflow execution pool creates faster proof than a full CI replacement because the buyer already feels a new burst problem, the deployment can sit beside existing workflows, and the security story is strongest when the workload is explicitly untrusted agent code rather than all software delivery."
  sequencingRationale: "Start with BYOC, signed sandboxes, audit traces, and policy enforcement for CPU-heavy build and integration-test overflow because those controls answer procurement first and require less supply complexity than a broad multi-runtime platform. Add browser automation, limited GPU routing, and deeper provider optimization only after paid pilots prove that routing plus governance can clear security review and convert into recurring annual contracts."
  notYet:
    - "Full CI/CD replacement for all developer jobs before the agent-only wedge converts repeatedly"
    - "General-purpose support-agent, data-agent, or back-office automation workloads before coding-agent execution is referenceable"
    - "Autonomous execution against production systems without explicit human and policy approval gates"
    - "A GPU-first product motion before pilot traces show that GPU-heavy workloads are material in the beachhead"
market:
  tam: "$1.1B estimated TAM based on roughly 10,000 mid-to-large software teams globally, modeled AI-coding penetration of 70%, and about $210 annual governed runtime spend per active engineer."
  sam: "$264.6M estimated initial SAM based on roughly 2,000 North American and European B2B software companies in the 500-2,000 engineer band with agent-rollout conditions similar to the beachhead."
  som: "$7.9M estimated year-3 SOM based on about 45 reachable production customers at roughly $176k average annual spend after landing through one agent-overflow workflow and expanding usage."
  segments:
    - "Primary: Platform engineering and developer productivity teams at 500-2,000 engineer B2B software companies rolling out internal coding agents"
    - "Secondary: Security-sensitive AI-native software companies that need BYOC, private networking, and provenance for agent-generated execution"
  buyingProcess: >-
    The operational champion is usually the developer productivity or AI platform lead who owns CI reliability, while the
    economic buyer is the VP Platform Engineering or internal AI platform owner. Deals are typically triggered by a visible
    queueing or security bottleneck, then move through security, cloud, and procurement review because the product executes
    untrusted code and touches credentials, networking, and audit controls.
product:
  mvp: >-
    The MVP should support agent-triggered builds, integration tests, and selected browser checks as an overflow execution pool
    that plugs into an existing GitHub-centric workflow. It should include signed sandbox templates, policy configuration,
    short-lived credentialing, replayable execution traces, and routing across at least two approved CPU-oriented providers,
    while leaving human-authored CI and most production release logic untouched.
  sixMonth: "Ship 2-3 paid BYOC pilots with GitHub-triggered agent-job interception, signed sandbox templates, audit logs, provider routing for CPU workloads, and cache reuse metrics that show queue-time and procurement value."
  twelveMonth: "Add browser automation support, VPC and static-egress options, policy templates for common enterprise controls, and limited GPU routing only for pilot accounts that show real demand, then convert at least 2 pilots into annual production contracts."
  twentyFourMonth: "Expand from agent-overflow execution into a broader governed runtime fabric for coding, evaluation, and adjacent internal agent workloads, with deeper routing intelligence, cross-provider benchmarking, and policy packs for regulated environments."
  keyBets:
    - "Overflow-only deployment converts faster than a rip-and-replace CI migration."
    - "BYOC plus short-lived credentials is enough to clear early enterprise security review without a fully customer-hosted control plane."
    - "Most early customer demand is CPU and browser heavy, allowing GPU support to follow after proof rather than drive the initial product."
    - "Cross-provider routing and cache reuse can produce measurable queue-time or cost improvement over a single-provider baseline."
gtm:
  wedge: "Sell an agent-only, policy-governed overflow pool that lets platform teams scale coding-agent adoption without rebuilding CI or asking security to trust a black-box sandbox vendor."
  channels:
    - "Founder-led direct sales to VP Platform Engineering, head of AI platform, and developer productivity leaders at triggered target accounts"
    - "Design-partner pilots sourced through coding-agent adopters, platform-engineering networks, and reference-heavy outbound tied to CI saturation events"
    - "Integration and co-sell motions with coding-agent vendors, cloud marketplace listings, and selected security or DevOps consultancies once pilot proof exists"
  funnelTargets: "Target account→qualified discovery 15-25%, qualified discovery→paid pilot 20-30%, paid pilot→annual production 50%+, production→second workflow or team expansion 40%+ within 12 months."
  pricing: "Start with an 8-12 week paid pilot around $25k-$50k, then convert to an annual platform commitment plus usage-based billing on sandbox minutes and cache/storage, typically targeting $80k-$180k ARR in the beachhead because buyers are paying for governed throughput, auditability, and avoided spare-capacity spend rather than seats."
businessModel:
  revenueStreams:
    - "Annual platform subscription for policy engine, routing control plane, audit exports, and provider governance"
    - "Usage revenue on sandbox minutes, cache consumption, and premium burst capacity"
    - "Premium packages for BYOC deployment, compliance controls, and later private-network or regulated-environment features"
  unitOfValue: "Policy-governed agent execution runs and sandbox minutes under management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "More teams, repositories, and agent workflows inside the same customer"
    - "Premium controls for VPC attachment, static egress, provenance exports, and regulated deployment patterns"
    - "Expansion from coding-agent overflow into evaluation jobs, browser-heavy QA, and adjacent governed internal agent workloads"
strategyMap:
  northStarMetric: "Monthly agent-generated jobs executed in policy-approved sandboxes at production SLA"
  inputMetrics:
    - "Median queue-time reduction for agent-generated jobs"
    - "Pilot-to-production conversion rate"
    - "Percent of runs with complete provenance and policy evidence"
    - "Cache hit rate across routed workloads"
    - "Percent of production accounts using more than one approved provider"
    - "Expansion from first workflow to second workflow within 12 months"
  moatsToBuild:
    - "Cross-provider telemetry graph covering cost, latency, failure rates, and cold-start behavior by workload class"
    - "Execution-trace dataset linking policy decisions, identity, provider choice, and audit outcomes"
    - "Reusable enterprise policy templates and onboarding patterns for agent-safe execution inside existing CI estates"
  killCriteria:
    - "If fewer than 3 of the first 10 qualified ICP accounts agree to a paid pilot for an overflow-only deployment, revisit the wedge or stop."
    - "If the first 3 paid pilots fail to reduce agent-job queue time by at least 30% or cannot show a procurement advantage from BYOC and audit controls, pause expansion."
    - "If more than half of pilot workloads require unsupported GPU, browser, or network features that materially change the architecture, narrow the ICP or re-sequence the roadmap."
  mermaid: |
    flowchart LR
      Wedge[Agent-only overflow wedge] --> MVP[Signed sandbox MVP]
      MVP --> Proof[Queue and audit proof]
      Proof --> Expansion[Broader governed runtime]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Strong why-now and a coherent enterprise wedge, but conviction depends on proving that buyers fund overflow governance before incumbents bundle it."
    whyBelieve: "AI coding adoption is creating a real execution bottleneck, and the proposed product targets the specific gap between embedded CI, point sandboxes, and multi-provider governance."
    whyDoubt: "The company still has to show that a neutral broker can win budget and trust in a crowded category before GitHub, Modal, or hyperscalers close enough of the feature gap."
    nextDiligence: "Verify with paid BYOC pilots that overflow-only deployment shortens queue time, clears procurement, and converts into six-figure annual contracts."
  firstCustomer:
    title: "VP Platform Engineering at a 900-engineer vertical SaaS company"
    profile: "A GitHub-centric B2B software company that has rolled out Claude Code or a similar internal coding agent to backend teams and now sees agent-generated PR checks and integration tests saturate release-week runner capacity."
    trigger: "An agent rollout expands from pilot to multiple teams and causes CI backlogs, cloud overages, or a security review over how generated code is executed."
    buyer: "VP Platform Engineering"
    initialContract: "An 8-12 week paid BYOC pilot for one agent-generated workflow at about $25k-$50k, creditable toward an $80k-$180k annual production contract with usage-based overage once queue-time and audit targets are met."
  mustBeTrue:
    - "At least 30% of qualified beachhead accounts are willing to buy an agent-only overflow execution layer without replacing their existing CI stack."
    - "The first 3 paid pilots can reduce median queue time for agent-generated jobs by at least 30% while maintaining complete execution traceability."
    - "Security and procurement teams accept BYOC, short-lived credentials, and audit exports as sufficient control boundaries for third-party routing."
    - "Most early workloads can be served by CPU and browser-oriented execution so the company can defer GPU-heavy architecture without missing the buying trigger."
    - "At least half of paid pilots convert into annual contracts above $80k ARR because the product is seen as a control layer, not a commodity runner pool."
  diligenceQuestions:
    - "How often does the first buyer want overflow-only deployment versus a broader CI and sandbox migration?"
    - "What proof artifact most often unlocks procurement: attestation, network trace, secret-access log, or customer-cloud deployment?"
    - "Which workload classes dominate the first 90 days of usage: integration tests, browser checks, generated-code execution, or GPU jobs?"
    - "How much of the incumbent alternative is GitHub Actions optimization, a point sandbox vendor, or internal platform engineering?"
    - "Does the budget come from developer productivity, AI platform, cloud infrastructure, or security tooling in the first deal?"
operatingAssumptions:
  - assumption: "An overflow-only deployment is the fastest path to the first paid enterprise contract."
    basis: "research.yaml"
    validationTest: "Run at least 10 design-partner conversations and secure 3 paid pilots where the initial scope is agent-only overflow rather than a full CI migration."
    decisionImpact: "If false, the company must either broaden into a full-stack CI replacement earlier or narrow to a higher-control niche with larger ACVs."
  - assumption: "BYOC plus short-lived credentials can clear security review without requiring a fully customer-hosted control plane."
    basis: "research.yaml"
    validationTest: "Track security questionnaires across the first 5 pilot prospects and confirm that at least 3 approve a BYOC deployment without demanding customer-hosted control-plane components."
    decisionImpact: "If false, implementation cost and sales cycle length increase, requiring a more infrastructure-heavy product and a larger initial funding plan."
  - assumption: "The first production contracts can land in the $80k-$180k ARR range while keeping usage-based pricing credible."
    basis: "idea.yaml"
    validationTest: "Convert at least 2 paid pilots into annual subscriptions within that band and document the buyer's pricing rationale."
    decisionImpact: "If false, the company may need a lighter-weight self-serve offering, more usage dependence, or a narrower enterprise ICP."
  - assumption: "Early workload traces will show that CPU and browser jobs dominate enough to defer GPU-intensive architecture."
    basis: "operator judgment"
    validationTest: "Instrument pilot workloads and confirm that less than 20% of execution minutes or customer-critical jobs require GPU in the first 6 months."
    decisionImpact: "If false, the roadmap must accelerate GPU supply partnerships and the capital plan must fund deeper infrastructure commitments."
  - assumption: "Cross-provider routing plus cache reuse can create measurable performance or cost improvement over a single-provider baseline."
    basis: "research.yaml"
    validationTest: "In the first 3 pilots, benchmark routed runs against the customer's current baseline and show at least a 20% improvement in queue time or burst-compute efficiency."
    decisionImpact: "If false, differentiation compresses toward policy tooling alone and the product may need to reposition around governance rather than brokerage."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Interview 15 target platform leaders and 5 security stakeholders at companies already rolling out coding agents."
    hypothesis: "The first budget opens when agent-generated workloads create queueing and procurement friction, not when teams merely experiment with AI coding."
    successMetric: "At least 10 target accounts describe an active trigger and at least 5 agree to share runner, queue, or security-review data."
    owner: "Founder/CEO"
  - horizon: "0–90 days"
    experiment: "Run a concierge pilot simulation that packages one customer's agent-generated jobs into signed sandboxes and measures baseline-versus-routed queue time."
    hypothesis: "An overflow-only deployment can produce visible throughput improvement without forcing workflow replacement."
    successMetric: "One design partner validates the workflow and shows at least a 20% queue-time improvement in simulation or controlled production traffic."
    owner: "Founding eng"
  - horizon: "0–90 days"
    experiment: "Test three procurement packages combining BYOC, audit exports, and short-lived credentialing with early design partners."
    hypothesis: "Procurement will move fastest when the product is framed as a governed execution layer inside the customer's cloud boundaries."
    successMetric: "At least 3 prospects identify a preferred security package and none require unmanaged long-lived secrets."
    owner: "Founder/CEO"
  - horizon: "90–180 days"
    experiment: "Convert 2-3 design partners into paid BYOC pilots on one live agent-generated workflow."
    hypothesis: "Platform teams will pay for one overflow workflow before they fund broader runtime standardization."
    successMetric: "At least 2 paid pilots signed at $25k+ each and at least 1 hits a 30% queue-time reduction target in live use."
    owner: "Founder/CEO"
  - horizon: "90–180 days"
    experiment: "Instrument workload traces by CPU, browser, GPU, network, and residency requirements across pilot accounts."
    hypothesis: "The initial roadmap can stay focused if CPU and browser jobs represent the majority of high-value demand."
    successMetric: "A pilot dataset covering at least 1,000 jobs shows the dominant workload mix and informs whether GPU support remains deferred."
    owner: "Product/eng lead"
  - horizon: "180–360 days"
    experiment: "Launch production routing across at least two approved providers with shared cache policy and provider scorecards."
    hypothesis: "Cross-provider telemetry and cache placement improve reliability and burst efficiency enough to drive conversion and expansion."
    successMetric: "At least 2 production customers use two providers and report a measurable performance, resilience, or cost benefit over their prior single-provider setup."
    owner: "Product/eng lead"
  - horizon: "180–360 days"
    experiment: "Test one integration or co-sell channel with a coding-agent vendor, security consultancy, or cloud marketplace."
    hypothesis: "A partner motion can generate higher-intent pipeline after the first referenceable pilot proof exists."
    successMetric: "At least 3 qualified opportunities sourced through one repeatable partner motion."
    owner: "GTM lead"
operations:
  - "Maintain a weekly provider scorecard covering cold starts, failures, policy exceptions, queue time, and cache-hit performance by workload class."
  - "Review every pilot run for trace completeness, secret exposure, network behavior, and customer-requested procurement artifacts before expanding scope."
  - "Treat sandbox templates, policy packs, and BYOC deployment patterns as versioned product assets so onboarding becomes repeatable rather than services-led."
  - "Build formal escalation paths with infrastructure partners for capacity shortages because burst reliability is a product promise, not a hidden dependency."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own design-partner sales, pricing, procurement navigation, and partner development because the primary risk is ICP and budget validation."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the control plane, provider adapters, signed sandbox templates, and audit-trace pipeline required for pilots."
  - role: "Security / platform engineer"
    startTiming: "Month 3-6"
    rationale: "Productize OIDC, policy controls, provenance exports, and BYOC deployment patterns so security review does not stay founder-custom."
  - role: "Product / solutions engineer"
    startTiming: "Month 6-9"
    rationale: "Turn pilot integrations, workload instrumentation, and customer onboarding into repeatable deployment templates."
  - role: "GTM lead"
    startTiming: "Month 9-12"
    rationale: "Scale outbound and partner motions only after the company has referenceable paid pilots and a credible conversion story."
milestones:
  - horizon: "0–12 months"
    items:
      - "Complete 20 ICP and security interviews, secure 5-8 design partners, and narrow the first workflow to agent-generated build, integration-test, and browser-check overflow."
      - "Ship a signed-sandbox MVP with BYOC deployment, policy controls, audit exports, and routing across at least two approved providers."
      - "Close at least 2 paid pilots and convert at least 1 to an annual production contract."
      - "Establish a documented provider scorecard and workload taxonomy that informs the CPU versus browser versus GPU roadmap."
  - horizon: "12–24 months"
    items:
      - "Reach 8-12 production customers in the beachhead with deployment under 45 days and at least two referenceable security reviews."
      - "Launch browser support, selective GPU routing where required, and repeatable policy packs for private-network and provenance-sensitive buyers."
      - "Prove account expansion into second workflows, teams, or provider configurations inside existing customers."
  - horizon: "24–36 months"
    items:
      - "Expand from coding-agent overflow into a broader governed runtime fabric for adjacent internal agent workloads."
      - "Build a defensible routing and audit dataset that improves win rate, gross margin, and provider bargaining power."
      - "Establish a category position as the neutral governance layer for enterprise agent execution rather than a point sandbox or runner vendor."
risks:
  - risk: "GitHub, Modal, Depot, or a hyperscaler bundles enough policy and burst-routing capability into existing products to shrink the broker wedge."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Focus on neutral cross-provider governance, existing-CI coexistence, and audit portability that single-provider offerings are structurally weaker at providing."
  - risk: "Security teams reject a third-party routing layer even in BYOC mode because provenance, secrets, or network controls are seen as insufficient."
    likelihood: "High"
    impact: "High"
    mitigation: "Lead with BYOC, short-lived credentials, explicit egress policy, replayable traces, and customer-requested proof artifacts from the first pilot cohort."
  - risk: "The real early workload mix is too GPU-heavy, browser-heavy, or network-constrained for the planned MVP architecture."
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Instrument pilot traces early, keep the ICP narrow, and defer broad promises until the workload taxonomy is measured rather than assumed."
  - risk: "Platform teams optimize current GitHub or self-hosted runner setups instead of buying a new control layer."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Sell only into triggered accounts with visible queue and procurement pain, require paid pilots, and quantify ROI against both runner spend and security-review effort."
fundingAsk:
  round: "seed"
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to prove the beachhead: ship a production-grade BYOC control plane, complete security and provider integrations, convert early paid pilots into annual contracts, and build the first repeatable enterprise sales motion."
