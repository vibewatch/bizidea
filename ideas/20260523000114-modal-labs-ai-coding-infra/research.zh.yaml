reportMemo:
  executiveTakeaways:
  - AI 编码正在把基础设施需求从静态 CI 容量，推向可治理的执行环境——后者专门承接不受信任的 agent 生成代码。
  - 买方缺的并不只是裸算力，而是已过策略审批的爆发容量、可溯源能力，以及跨多家 provider 的网络安全执行层。
  - 现有厂商分散在 CI 在位者、点状 sandbox runtime 和 CI 加速层三类里，给一个中立的治理与路由 broker 留出了空白。
  - 创业公司只有把“安全吞吐”和“多云可靠性”卖出去，而不是沦为更便宜的 runner 池，才有机会赢。
  marketDefinition: 面向 AI 编码与 agent 工作流的受治理执行基础设施：它负责把编码 agent 触发的 build、测试、浏览器检查和生成代码任务打包、调度、隔离，并拿出可证明的执行结果。
  customerAndBuyer: 最核心的使用者，是负责 CI、runner 策略、网络边界和 secret 管理的平台团队或 AI 基础设施团队。经济买方通常是平台主管工程 VP 或相近的内部 AI 平台 owner；因为工作负载里包含不受信任的 agent 生成代码，所以安全与合规团队会共同审批。
  buyingTriggers:
  - point: 当 agent 生成的 PR 开始与人工编写的 CI 共享同一批 runner 池时，平台团队会明显感到排队、编排和清理工作正在拖累可靠性。
    sourceRefs:
    - 20
    - 21
    - 22
    - 26
    - 31
  - point: 一旦工作负载里包含不受信任的 agent 代码，安全审查就会陡然升级，因为 secret、出网和宿主复用都会变成采购卡点。
    sourceRefs:
    - 25
    - 28
    - 39
    - 43
    - 48
  - point: 发布周、评测批处理和多分支 rollout 会制造爆发需求，而单一 runner 池或单一云都不适合吃这种尖峰。
    sourceRefs:
    - 1
    - 2
    - 31
    - 35
  willingnessToPay:
    summary: 直接替代方案已经把“按用量为受治理执行付费”这件事正常化了：E2B 和 Daytona 都公开了约 $0.000028/秒的 2-vCPU sandbox 定价，Depot 公布 2-vCPU GitHub Actions runner 为 $0.004/分钟，Modal 则按秒收 core 和 GiB 费用。只要 broker 能在这条基线之上，把排队、闲置峰值容量和安全审查人力明显降下来，它的付费逻辑就站得住。
    sourceRefs:
    - 3
    - 11
    - 14
    - 15
  competitiveLandscape: 竞争大体分成三堆：Git 为中心的 CI 在位厂商、专门做 sandbox 的 runtime，以及 CI 加速厂商。真正的白地带，是一层中立治理层，能跨这些栈去做路由，而不是强迫客户整套替换。
  incumbentThesis:
  - incumbentClass: 云构建服务
    point: hyperscaler 的构建服务能减少 runner 运维，但它们天然绑定单一 provider；默认并不能解决跨多云的中立路由，也做不到在既有 CI 体系上统一策略。
    sourceRefs:
    - 31
    - 33
    - 35
    - 36
    - 38
  - incumbentClass: Git 型 CI 平台
    point: GitHub 一类的 CI 已经深度嵌进开发流程，但面对爆发式 agent 流量，团队仍得在受限的托管容量、付费大 runner 和自建 ARC 复杂度之间做取舍。
    sourceRefs:
    - 20
    - 21
    - 22
    - 23
    - 24
    - 26
  - incumbentClass: Sandbox 专业厂商
    point: 点状 sandbox 厂商把安全执行这件事做得不错，但它们大多仍是单一 runtime，而不是能跨已批准云、企业网络和既有 CI 控制层做中立 brokerage 的平台。
    sourceRefs:
    - 3
    - 10
    - 13
  - incumbentClass: CI 加速厂商
    point: CI 加速厂商证明了买方愿意为更快执行付费，但它们优化的是自己托管的 runner 栈，而不是在异构 execution provider 之间做受策略治理的路由。
    sourceRefs:
    - 15
    - 16
    - 17
  regulatoryLandscape: 这类产品通常会以“安全软件交付基础设施”被采购，而不是独立的 AI 合规产品。因此采购压力会集中在安全开发实践、溯源、短时凭证，以及可审计的 build/runtime 边界上。
  technologyLandscape: 可胜出的架构，大概率是把快速临时 sandbox、强隔离、可移植镜像、分布式缓存和策略感知路由拼在一起。真正需要回答的，不是抽象层面的“容器还是 microVM”，而是不同工作负载到底该配多深的隔离。
  distributionChannels:
  - point: 最直接的分发路径，是卖给已经标准化 GitHub Actions 或类似工作流引擎的平台工程与开发者效率团队。
    sourceRefs:
    - 20
    - 21
    - 26
  - point: 第二条渠道是与编码 agent 和 IDE 厂商做集成和联合分发，因为这些产品本来就需要把任务落到受边界约束的执行面上。
    sourceRefs:
    - 29
    - 51
    - 52
  - point: 对需要私有网络和合规控制的买方，可以通过云账户、云市场和安全导向的 BYOC 部署来推进成交。
    sourceRefs:
    - 16
    - 31
    - 37
  partnershipEcosystem:
  - point: GitHub 与 OpenAI/Codex 集成值得重视，因为第三方和内嵌编码 agent 已经天然需要执行后端。
    sourceRefs:
    - 29
    - 52
  - point: Anthropic Claude Code 一类 agent 厂商也是合理的首发伙伴，因为它们本来就会跑测试、改代码和创建 PR。
    sourceRefs:
    - 51
  - point: 云和安全伙伴同样关键，因为买方更想要 provider 原生的身份、溯源和构建服务集成，而不是长期 secret。
    sourceRefs:
    - 25
    - 28
    - 31
    - 37
    - 43
  dataMoats:
  - point: 跨 provider 的冷启动、失败率、缓存命中率和按工作负载类型划分的成本遥测，会让路由质量比任何单一 provider runtime 都更快进化。
    sourceRefs:
    - 1
    - 3
    - 16
    - 17
  - point: 把执行轨迹与溯源、身份和策略结果绑定在一起，会形成一套跨云的审计数据集，点状 runtime 很难复制。
    sourceRefs:
    - 25
    - 28
    - 39
    - 43
  - point: 如果 broker 掌握了缓存摆放逻辑，它就能把 CI 与 agent 工作流共享出来的 build 和测试产物，继续滚成速度与成本上的护城河。
    sourceRefs:
    - 16
    - 17
  geographicConsiderations:
  - point: 对需要 allowlist 和私有网络的企业买方来说，产品必须支持静态出网、VPC 接入或 customer-cloud 部署等形态。
    sourceRefs:
    - 23
    - 31
  - point: 地域覆盖同样重要，因为托管构建服务已经把广泛地域支持变成基础预期，买方默认会要求延迟和数据驻留可控。
    sourceRefs:
    - 35
    - 36
  - point: 高度受监管的团队希望跨地域也能拿到同样的溯源与安全构建控制，因此扩张路径应优先追随合规就绪的执行模式，而不是盲目追逐原始容量。
    sourceRefs:
    - 37
    - 39
    - 41
    - 43
  sensitivityCases:
  - case: AI 编码采用低于当前调查预期
    impact: 工作负载增长会放缓，产品就得先靠安全/合规 ROI 取胜，而不是等规模效应自然出现。
    sourceRefs:
    - 54
    - 58
    - 59
  - case: GitHub、AWS 或 Google 把足够多的策略与爆发能力打包进现有 CI 栈
    impact: 创业公司会被迫收缩到跨 provider 治理层，或转向更高合规要求的细分市场，而不是大范围替代 CI。
    sourceRefs:
    - 20
    - 31
    - 35
    - 36
  - case: runtime 定价向通用 runner 经济性压缩
    impact: 毛利率的抓手会从算力差价，转向策略、路由、溯源和缓存智能。
    sourceRefs:
    - 15
    - 24
    - 33
    - 35
  - case: 一次安全事故重置了买方对第三方执行层的信任
    impact: 销售周期会被拉长，BYOC 与可证明的控制边界也会更早变成硬性要求。
    sourceRefs:
    - 27
    - 28
    - 39
    - 45
  validationPlan:
  - priority: high
    question: 700-1,500 人规模的平台团队，会先买 overflow 执行层，还是要求完整的 CI+sandbox 迁移？
    evidenceToGather: 做 10 次共创客户访谈，并至少跑出 3 个付费 pilot，对比 overflow-only 与全路径部署的接受度。
  - priority: high
    question: 初始工作负载里，到底有多少必须依赖 GPU、浏览器自动化或严格 VPC 接入？
    evidenceToGather: 从 pilot 客户收集工作负载轨迹，并按 CPU、GPU、浏览器、网络和数据驻留要求拆分。
  - priority: medium
    question: 采购里哪些证明材料是不能谈判的：SBOM、attestation、network trace，还是 secret-access log？
    evidenceToGather: 收集目标企业买方的安全问卷与采购 redline。
analysisModels:
  marketMapDiagram:
    title: Agent runtime 执行版图
    mermaid: "quadrantChart\n  title Agent runtime execution market\n  x-axis Generic CI --> Purpose-built agent runtime\n  y-axis Single-provider execution --> Neutral governed brokerage\n  GitHub Actions: [0.18, 0.28]\n  Depot: [0.38, 0.42]\n  Modal: [0.72, 0.44]\n  E2B: [0.80, 0.50]\n  Daytona: [0.84, 0.56]\n  Proposed startup: [0.93, 0.86]\n"
