      - 21
      - 31
      - 35
      - 38
    competitiveRivalry:
      score: 5
      rationale: 这个品类已经挤满了 CI 在位者、sandbox 专业厂商和加速玩家；同时相邻的 DevOps 与 AI 代码工具市场又增长很快，意味着还会不断吸引新玩家进来。
      sourceRefs:
      - 3
      - 10
      - 13
      - 16
      - 61
      - 62
