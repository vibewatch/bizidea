    impact: negative
    point: 公共部门和关键基础设施相关的 AI 指南，正在抬高哪怕只是内部开发工具也必须满足的保证要求。
    sourceRefs:
    - 41
  - factor: 经济
    impact: positive
    point: 企业仍愿意为能减少工具链碎片化、降低持续性 DevOps 税的软件交付工具买单。
    sourceRefs:
