  - factor: 社会
    impact: positive
    point: 开发者使用 AI 已逐步主流化，只要还能保留人工与策略控制，团队对 agent 辅助工作流的接受度就会继续上升。
    sourceRefs:
    - 54
    - 58
    - 59
  - factor: 技术
    impact: positive
    point: microVM、sandbox 容器 runtime 和 agent 原生执行面都已经足够成熟，足以支撑一层专门的 broker。
    sourceRefs:
