      - 31
      - 33
    threatOfEntrants:
      score: 3
      rationale: 新包装层当然可以基于开放 runtime 快速搭出来，但要把企业级隔离、溯源和跨 provider 运维真正做好，平台深度仍然不低。
      sourceRefs:
