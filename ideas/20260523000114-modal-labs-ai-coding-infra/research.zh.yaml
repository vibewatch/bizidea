    impact: neutral
    point: 临时构建环境虽然能减少闲置扩容，但产品本身仍依赖会推高总基础设施使用量的突发算力。
    sourceRefs:
    - 31
    - 37
  adoptionFrictionMatrix:
  - friction: 安全团队会怀疑新的中间层
    severity: high
    affectedBuyer: 安全与平台负责人
    mitigation: 先做 BYOC、短时凭证、attestation 和明确的出网策略，而不是推黑盒托管平面。
    sourceRefs:
    - 25
    - 28
    - 39
    - 43
  - friction: 从现有 GitHub Actions 与自建 runner 工作流迁移
    severity: medium
    affectedBuyer: 开发者效率负责人
    mitigation: 先以 overflow 或 agent 专用执行池切入，再去争取完整 CI 替换。
    sourceRefs:
    - 20
    - 21
    - 22
  - friction: 跨云打通网络与 secret 集成
    severity: high
    affectedBuyer: 平台工程团队
    mitigation: 优先走 provider 原生 OIDC 和最小权限信任关系，而不是静态凭证。
    sourceRefs:
    - 28
    - 31
    - 37
  - friction: 相对更便宜基线 runner 的 ROI 证明
    severity: medium
    affectedBuyer: 平台主管工程副总裁
    mitigation: 把节省下来的排队时间、闲置容量和安全审查人力，逐项与现有 runner 开销对比。
    sourceRefs:
    - 15
    - 24
    - 31
