competitors:
- name: GitHub Actions
  stage: incumbent
  wedge: 通用 CI/CD，提供 hosted、larger 和 self-hosted runner。
  pricing: 托管用量计费并额外收存储费；self-hosted runner 软件本身免费，但基础设施和运维都由买方承担。
  strength: 工作流嵌入深、与 GitHub 原生集成，且开发者认知最强。
  weaknessVsUs: 它仍让买方在受限 hosted 容量、付费大 runner 和自建 ARC 复杂度之间二选一；默认也不给中立的多云 brokerage。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
  - 24
  - 26
- name: Modal Sandboxes
  stage: scale-up
  wedge: 面向 agent 与强化学习工作负载的 serverless GPU 与 sandbox runtime。
  pricing: 按秒收 CPU 和内存费用，并提供每月免费算力额度。
  strength: 在 agent 场景里可信度高，sandbox 执行规模大，AI 基础设施能力也深。
  weaknessVsUs: 它仍是单一 provider runtime，而不是跨已批准云和既有 CI 体系的中立 broker。
  sourceRefs:
  - 1
  - 3
- name: E2B
  stage: scale-up
  wedge: 基于 Firecracker 的 AI sandbox，通过 SDK 和开源交付。
  pricing: 有免费层；Pro 为 $150/月 加用量费，默认 2-vCPU 单价按秒公开。
  strength: 接入路径快，在 agent 开发者里品牌强。
  weaknessVsUs: 它更适合嵌一个 sandbox 进去，而不是在企业场景里编排策略、做多 provider 路由或跨云审计控制。
  sourceRefs:
  - 10
  - 11
- name: Daytona
  stage: scale-up
  wedge: 给 AI agent 提供有状态 sandbox 与 computer-use 基础设施。
  pricing: 按秒公开计算与内存价格，并附带较大免费额度。
  strength: 启动很快，且 workspace/computer-use 故事比纯代码执行更宽。
  weaknessVsUs: 它的重点仍是 runtime/workspace，而不是中立执行 brokerage、溯源和异构云容量优化。
  sourceRefs:
  - 13
  - 14
- name: Depot
  stage: scale-up
  wedge: 在托管基础设施上提供更快的 GitHub Actions runner、远程构建和 agent 友好的 CI。
  pricing: 订阅加用量计费；GitHub Actions runner 起价 $0.004/分钟，agent sandbox 另行计费。
  strength: CI 提速 ROI 清楚，从 GitHub Actions 迁过去的摩擦也低。
  weaknessVsUs: 它优化的是自家托管 runner 栈，而不是在统一策略层下跨多家 execution provider 做套利和路由。
  sourceRefs:
  - 15
  - 16
  - 17
regulatoryTechnicalConstraints:
- point: 只要生成代码会碰到云资源或内部系统，短时凭证与最小权限访问就是入场券。
  sourceRefs:
  - 27
  - 28
  - 31
- point: 溯源与签名 attestation 正在成为构建产物和 SBOM 的默认控制面。
  sourceRefs:
  - 25
  - 37
  - 43
- point: 在多租户环境里执行不受信任代码时，共享企业环境往往需要比默认容器更强的隔离。
  sourceRefs:
  - 46
  - 48
- point: 为了降低污染与可复现性风险，临时构建环境正越来越取代可复用宿主机。
  sourceRefs:
  - 31
  - 37
  - 39
validationSignals:
- point: Modal 表示 sandboxes 已贡献超过三分之一收入，平台累计启动超过 10 亿个 sandbox，说明 runtime 需求不是 demo 级别，而是实打实的线上需求。
  sourceRefs:
  - 1
- point: Claude Code 明确宣传自己能读代码、跑测试和开 PR，这意味着执行基础设施已成为 agent 产品表面的一部分。
  sourceRefs:
  - 51
- point: Codex 也把 git、包管理器和测试 runner 等子命令放进同一层 sandbox 边界里，说明执行控制本来就是 agent 编码产品的核心组件。
  sourceRefs:
  - 52
- point: JetBrains 2026 AI Pulse 显示，90% 的开发者在工作中至少使用一种 AI 工具，74% 使用专门的 AI 开发工具，未来需求底盘会继续扩大。
  sourceRefs:
  - 59
openQuestions:
- 有多少平台团队会先买一层 overflow 执行层，而不是坚持把整套 CI 与 sandbox 一起迁掉？
- 首批客户工作负载里，从第一天起就必须支持 GPU、浏览器自动化或严格 VPC 接入的比例到底有多高？
- 采购里真正不可谈判的证明材料是什么：SBOM、attestation、network trace，还是 secret-access log？
- 第一个最强购买切口，到底是安全治理、排队时间下降，还是多 provider 冗余？
