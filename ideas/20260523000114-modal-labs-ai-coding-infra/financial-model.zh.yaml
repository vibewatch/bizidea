modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[Triggered platform teams] --> Pilots[Paid BYOC pilots]\n  Pilots --> Customers[Production customers]\n  Customers --> Revenue[Subscription plus usage revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash runway]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下的收入，来自付费账户数从 Y1 结束时的 4 个增至 Q4Y3 的 30 个，同时综合年化 ARPU 随合同转化与扩张，从相当于 pilot 的 $36K 抬到 $165K。
- checkName: 必须成立的前提
  finding: BYOC 和短时凭证必须按时过安全审查，因为在所有敏感项里，销售周期对 Y3 收入和现金风险的影响最大。
- checkName: 模型失真条件
  finding: 如果采购再拖一个季度、同时毛利率卡在 65-68%，模型就会明显承压，现金低点会在下一轮融资前逼近零。
- checkName: 下一轮融资证明
  finding: 一旦公司做到大约 8-12 个生产客户，部署流程可重复、安全审查可引用，并能看到第二条工作流扩张，下一轮融资就有了充分依据。
sanityChecks:
  ruleOf40: Y3 增长 249% + EBITDA 利润率 -9% = 240%；方向上很强，但也被偏小的 Y2 基数放大了。
  burnMultiple: Y2 burn multiple 为 1.4x，到 Y3 改善到 0.1x，因为生产合同开始摊薄团队成本。
  revenuePerFte: Y3 为 $302K（基础设施 / SaaS 参考区间为 $200-400K）
  flags:
  - Y1 收入只有 $65.5K，但 EBITDA burn 达 $919.5K，因此在年度生产合同开始复利前，公司必须严控纪律。
  - Rule of 40 看起来异常高，主要是因为 Y3 增长是拿不到 $1M 的 Y2 基数来算，而不是成熟规模。
  - 模型默认 BYOC 能过安全审查，且不用被迫改成 customer-hosted 控制平面；若这一点不成立，销售周期和服务负担都会明显变差。
