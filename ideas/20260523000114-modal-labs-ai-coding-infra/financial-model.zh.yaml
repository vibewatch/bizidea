scenarios:
  downside:
    description: 采购流程拖慢一个季度，且早期工作负载扩张偏弱，导致公司到 Q4Y3 只能做到 22 个客户。
    y3RevenueK: 2100.0
    y3EbitdaK: -830.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - 由于安全审查与采购各自推迟了大约一个季度，Y2 结束只有 9 个客户，Y3 结束只有 22 个，而不是 30 个。
    - 退出 ARPU 只能到 $145K，而不是 $165K，因为较少客户会扩到第二条工作流。
    - 浏览器任务与高支持负载先行进入，导致路由效率成熟前，毛利率最高只能到约 68%。
  base:
    description: 基准情形下，公司按验证节点推进招聘，到 Q4Y2 做到 12 个客户，并在 Y3 结束时达到 30 个客户、退出 ARPU 为 $165K。
    y3RevenueK: 3018.76
    y3EbitdaK: -282.73
    cashLowPointK: 761.66
    keyAssumptionChanges:
    - 客户数按模型中的 4 -> 12 -> 30 节奏，从 Y1 一路爬升到 Y3。
    - 随着年度合同和用量收入逐步落地，ARPU 从 pilot 水平一路抬到每客户 $165K 的退出 ARR。
    - Y3 毛利率到 70%，而团队到 Q4Y3 也只扩到 10 名 FTE。
  upside:
    description: 如果排队时间 ROI 更强、合作方导流更顺，客户扩张会加速到 Q4Y3 的 36 个。
    y3RevenueK: 3940.0
    y3EbitdaK: 180.0
    cashLowPointK: 1050.0
    keyAssumptionChanges:
    - Y2 结束做到 14 个客户，Y3 结束做到 36 个；驱动因素是付费 pilot 转化更快，且合作伙伴转介绍提高了赢单率。
    - 更多客户扩到第二条工作流并购买高级控制后，退出 ARPU 可到 $175K。
    - 毛利率能到 72%，且最后一位 GTM 招聘推迟到收入基础更清晰之后。
