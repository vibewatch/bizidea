openQuestions:
- How many platform teams will buy an overflow execution layer first versus insisting on a full CI and sandbox migration?
- What share of early customer workloads actually require GPU, browser automation, or strict VPC attachment from day one?
- 'Which proof artifacts become non-negotiable in procurement: SBOM, attestation, network trace, or secret-access log?'
- Is the first strong buying wedge security governance, queue-time reduction, or multi-provider redundancy?
