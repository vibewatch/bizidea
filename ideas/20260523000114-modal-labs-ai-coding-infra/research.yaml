reportMemo:
  executiveTakeaways:
  - AI coding is shifting infrastructure demand from static CI capacity toward governed execution environments for untrusted agent-written code.
  - The buyer gap is not raw compute alone; it is policy-approved burst capacity, provenance, and network-safe execution across multiple providers.
  - Existing vendors split across CI incumbents, point sandbox runtimes, and CI acceleration layers, leaving room for a neutral governance and routing broker.
  - The startup wins only if it sells security throughput and multi-cloud reliability, not a cheaper undifferentiated runner pool.
  marketDefinition: 'Governed execution infrastructure for AI coding and agent workflows: the layer that packages, schedules, isolates, and proves builds, tests, browser checks, and generated-code tasks triggered by coding agents.'
  customerAndBuyer: Primary user is the platform or AI infrastructure team that owns CI, runner policies, network boundaries, and secrets handling. The economic buyer is the VP Platform Engineering or equivalent internal AI platform owner, with security and compliance as co-approvers because the workload includes untrusted agent-generated code.
  buyingTriggers:
  - point: When agent-generated pull requests start sharing runner pools with human-authored CI, platform teams feel queueing, orchestration, and cleanup become a reliability issue.
    sourceRefs:
    - 20
    - 21
    - 22
    - 26
    - 31
  - point: Security reviews intensify once the workload involves untrusted agent-written code, because secrets, outbound networking, and host reuse become procurement blockers.
    sourceRefs:
    - 25
    - 28
    - 39
    - 43
    - 48
  - point: Release weeks, eval batches, and multi-branch rollouts create burst demand that a single runner pool or single cloud is poorly suited to absorb.
    sourceRefs:
    - 1
    - 2
    - 31
    - 35
  willingnessToPay:
    summary: 'Direct substitutes already normalize usage-based spend for governed execution: E2B and Daytona publish about $0.000028 per second for a 2-vCPU sandbox, Depot publishes $0.004 per minute for a 2-vCPU GitHub Actions runner, and Modal bills per core and per GiB by the second. A broker is credible if it measurably cuts queueing, spare-capacity waste, and security-review labor on top of that baseline.'
    sourceRefs:
    - 3
    - 11
    - 14
    - 15
  competitiveLandscape: 'Competition clusters into three camps: Git-centric CI incumbents, purpose-built sandbox runtimes, and CI acceleration vendors. The white space is a neutral governance layer that routes across those stacks instead of forcing a full rip-and-replace.'
  incumbentThesis:
  - incumbentClass: Cloud build services
    point: Hyperscaler build services reduce runner operations but remain provider-specific; they do not solve neutral multi-cloud routing or unified policy across existing CI estates by default.
    sourceRefs:
    - 31
    - 33
    - 35
    - 36
    - 38
  - incumbentClass: Git-based CI platforms
    point: GitHub-style CI is deeply embedded, but its runner model still leaves teams to choose between limited hosted capacity, larger paid runners, or self-hosted ARC complexity for bursty agent traffic.
    sourceRefs:
    - 20
    - 21
    - 22
    - 23
    - 24
    - 26
  - incumbentClass: Sandbox specialists
    point: Point sandbox vendors solve secure execution well, but they are mostly provider-specific runtimes rather than neutral brokers across approved clouds, corporate networks, and existing CI controls.
    sourceRefs:
    - 3
    - 10
    - 13
  - incumbentClass: CI acceleration vendors
    point: Runner acceleration vendors show buyers will pay for faster execution, but they optimize a managed runner stack rather than policy-governed routing across heterogeneous execution providers.
    sourceRefs:
    - 15
    - 16
    - 17
  regulatoryLandscape: The product will usually be bought as secure software delivery infrastructure rather than as a standalone AI compliance product. Procurement pressure will therefore center on secure development practice, provenance, short-lived credentials, and auditable build/runtime boundaries.
  technologyLandscape: Winning architecture likely combines fast ephemeral sandboxes, strong isolation, portable images, distributed cache, and policy-aware routing. The practical choice is not containers versus microVMs in the abstract, but which isolation depth is appropriate per workload class.
  distributionChannels:
  - point: Direct sale into platform engineering and developer productivity teams already standardizing on GitHub Actions or similar workflow engines.
    sourceRefs:
    - 20
    - 21
    - 26
  - point: Co-sell and integration distribution with coding-agent and IDE vendors that already route work to bounded execution surfaces.
    sourceRefs:
    - 29
    - 51
    - 52
  - point: Security-led BYOC deployments via cloud accounts and marketplaces for buyers that need private networking and compliance controls.
    sourceRefs:
    - 16
    - 31
    - 37
  partnershipEcosystem:
  - point: GitHub and OpenAI/Codex integrations are potential workload sources because third-party and embedded coding agents already expect execution backends.
    sourceRefs:
    - 29
    - 52
  - point: Anthropic Claude Code and similar agent vendors are logical launch partners because they explicitly run tests, edit code, and create pull requests.
    sourceRefs:
    - 51
  - point: Cloud and security partners matter because buyers want provider-native identity, provenance, and build-service integration rather than long-lived secrets.
    sourceRefs:
    - 25
    - 28
    - 31
    - 37
    - 43
  dataMoats:
  - point: Cross-provider telemetry on cold starts, failure rates, cache hit rates, and cost by workload type can improve routing quality faster than any single-provider runtime.
    sourceRefs:
    - 1
    - 3
    - 16
    - 17
  - point: Execution traces tied to provenance, identity, and policy outcomes create an audit dataset that point runtimes cannot easily reproduce across clouds.
    sourceRefs:
    - 25
    - 28
    - 39
    - 43
  - point: Shared build and test artifacts across CI and agent workflows can compound into a speed-and-cost moat if the broker owns cache-placement logic.
    sourceRefs:
    - 16
    - 17
  geographicConsiderations:
  - point: Enterprise buyers with allowlists and private-network requirements will prefer designs that support static egress, VPC attachment, or customer-cloud deployment options.
    sourceRefs:
    - 23
    - 31
  - point: Regional footprint matters because managed build services already expose wide geography, setting a baseline expectation for latency and residency control.
    sourceRefs:
    - 35
    - 36
  - point: Highly regulated teams will expect the same provenance and secure-build controls across regions, so expansion should follow compliance-ready execution patterns rather than raw capacity first.
    sourceRefs:
    - 37
    - 39
    - 41
    - 43
  sensitivityCases:
  - case: AI coding adoption plateaus below current survey expectations
    impact: Workload growth slows and the product has to win on security/compliance ROI before scale economics fully appear.
    sourceRefs:
