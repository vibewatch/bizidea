competitors:
- name: GitHub Actions
  stage: incumbent
  wedge: General-purpose CI/CD with hosted, larger, and self-hosted runners.
  pricing: Hosted usage billing plus storage; self-hosted runner software is free but infrastructure and ops are buyer-owned.
  strength: Deep workflow embed, native GitHub integration, and broad developer familiarity.
  weaknessVsUs: Still leaves buyers choosing between limited hosted capacity, paid larger runners, or self-hosted ARC complexity; no neutral multi-cloud brokerage by default.
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
  - 24
  - 26
- name: Modal Sandboxes
  stage: scale-up
  wedge: Serverless GPU and sandbox runtime for agent and reinforcement-learning workloads.
  pricing: Per-second CPU and memory billing with free monthly compute credits.
  strength: Strong agent credibility, high-scale sandbox execution, and deep AI infrastructure depth.
  weaknessVsUs: Provider-specific runtime rather than a neutral broker across approved clouds and incumbent CI estates.
  sourceRefs:
  - 1
  - 3
- name: E2B
  stage: scale-up
  wedge: Firecracker-based AI sandboxes delivered through SDKs and open source.
  pricing: Free tier; Pro at $150/month plus usage, with default 2-vCPU pricing published per second.
  strength: Fast integration path and strong brand with agent builders.
  weaknessVsUs: Best for embedding a sandbox, not for enterprise policy orchestration, multi-provider routing, or cross-cloud audit controls at scale.
  sourceRefs:
  - 10
  - 11
- name: Daytona
  stage: scale-up
  wedge: Stateful sandboxes and computer-use infrastructure for AI agents.
  pricing: Usage-based compute and memory pricing published per second, with large free credits.
  strength: Very fast startup and a broader workspace/computer-use story than pure code execution.
  weaknessVsUs: Focuses on runtime/workspace rather than neutral execution brokerage, provenance, and heterogeneous cloud capacity optimization.
  sourceRefs:
  - 13
  - 14
- name: Depot
  stage: scale-up
  wedge: Faster GitHub Actions runners, remote builds, and agent-friendly CI on managed infrastructure.
  pricing: Subscription plans plus usage; GitHub Actions runners start at $0.004/min and agent sandboxes are separately metered.
  strength: Clear CI speed ROI and low-friction migration from GitHub Actions.
  weaknessVsUs: Optimizes a managed runner stack rather than arbitraging multiple execution providers under a unified policy layer.
  sourceRefs:
  - 15
  - 16
  - 17
