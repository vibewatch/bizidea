  validationPlan:
  - priority: high
    question: Will 700-1,500 engineer platform teams buy overflow execution first, or demand a full CI-and-sandbox migration?
    evidenceToGather: Ten design-partner discovery calls and at least three paid pilots comparing overflow-only versus full-path deployments.
  - priority: high
    question: How much of the initial workload mix actually requires GPU, browser automation, or strict VPC attachment?
    evidenceToGather: Workload traces from pilot customers broken down by CPU, GPU, browser, network, and data residency requirements.
  - priority: medium
    question: 'Which proof artifacts are non-negotiable in procurement: SBOM, attestation, network trace, or secret-access log?'
    evidenceToGather: Security questionnaire reviews and procurement redlines from target enterprise buyers.
