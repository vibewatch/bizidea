  adoptionFrictionMatrix:
  - friction: Security-team skepticism of a new intermediary
    severity: high
    affectedBuyer: Security and platform leadership
    mitigation: Start with BYOC, short-lived credentials, attestations, and explicit egress policy rather than a black-box managed plane.
