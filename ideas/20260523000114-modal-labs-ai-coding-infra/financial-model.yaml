modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Triggered platform teams] --> Pilots[Paid BYOC pilots]
      Pilots --> Customers[Production customers]
      Customers --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing from 4 paying accounts at Y1 exit to 30 by Q4Y3 while blended annual ARPU rises from pilot-equivalent $36K to $165K as contracts convert and expand.
- checkName: Must go right
  finding: BYOC plus short-lived credentials must clear security review on time, because the sales-cycle sensitivity is the largest driver of both Y3 revenue and cash risk.
- checkName: Model breaks if
  finding: The model gets stressed if procurement slips by a quarter and gross margin stalls near 65-68%, which pushes the cash low point toward zero before the next raise.
- checkName: Next-round proof
  finding: The next financing is justified once the company reaches roughly 8-12 production customers with repeatable deployments, referenceable security reviews, and visible second-workflow expansion.
sanityChecks:
  ruleOf40: Y3 growth 249% + EBITDA margin -9% = 240%; directionally strong, though flattered by the small Y2 base.
  burnMultiple: Y2 burn multiple 1.4x improves to Y3 burn multiple 0.1x as production contracts absorb the hiring base.
  revenuePerFte: $302K Y3 (benchmark $200-400K infrastructure / SaaS)
  flags:
  - Y1 revenue is only $65.5K against $919.5K of EBITDA burn, so the company must stay disciplined until annual production contracts start compounding.
  - The rule-of-40 output looks exceptionally high because Y3 growth is measured off a sub-$1M Y2 base rather than mature scale.
  - The model assumes BYOC clears security review without forcing a customer-hosted control plane; if that fails, both sales cycle and services burden worsen materially.
