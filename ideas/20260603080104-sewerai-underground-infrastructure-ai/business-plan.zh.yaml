slug: sewer-rehab-prioritization-os
date: '2026-06-03'
executiveSummary: Sewer Rehab Prioritization OS 最适合先作为覆盖层切入美国大型污水公用事业单位：它们每年都在跑 PACP/NASSCO 巡检，但修复计划依旧靠表格、GIS 导出和顾问研讨来拼。真正急的不是找缺陷，而是在同意令、减溢和年度 CIP 约束下，讲清楚到底哪些管段该先修。第一版产品应先吃进导出的巡检、GIS 和历史工单数据，然后生成可解释的修复包、预算情景和审计轨迹，而不是逼客户把 Cityworks、OpenGov、Esri 或现有 CCTV 工作流整套替换掉。首个买方应是前 50 大公用事业单位里的污水助理总监或资本规划负责人，工程合作方通常会深度影响范围界定与部署。定价应锚定在管污水英里数和当前资本规划周期；先卖付费试点，只要规划周期时间和报送质量改善，再转成年度合同。最难的战略选择，是先把大型下水道公用事业单位里一个足够窄的规划工作流打透，再考虑扩去雨水、输水主管更新，或更广义的资产管理替换。市场对痛点、买方和预算化工作流的证据已经很强，但一个全新决策层究竟能单独卖出多少钱、最快的采购路径是哪条，仍要验证。考虑到强势现有厂商已经在往上游移动，公司前 12–18 个月更该把重点放在验证差异化和渠道适配，而不是预设自己能迅速吃下整个品类。
problem:
- 大型污水公用事业单位已经收集了大量 PACP/NASSCO 和 CCTV 证据，但还是没法把这些数据直接变成一份监管方看得懂、也站得住脚的优先修复清单。
- 资本规划团队、工程公司和承包商同时跨表格、GIS 图层、顾问研究和 EAM 系统协作，风险、成本和准备度口径经常打架，采购因此变慢，误排修复优先级的概率也更高。
solution:
- 先做一层修复优先级覆盖层，吃进巡检导出、GIS 背景、历史工单和预算约束，对下一批要拿预算的下水道修复包做打分、打包和解释。
- 直接生成可审计的依据、预算 what-if 情景和可招标的项目包导出，让公用事业单位和工程合作方能更快从巡检证据走到采购，而且不必替换原有记录系统。
whyWeWin:
- 公司不是从巡检切入，而是先站在资本项目办公室，这正好对应研究里最明显的空档：缺陷识别工具和面向董事会、监管方、预算方的决策工作流之间那一层。
- 如果公司能把一次次年度修复周期里的项目包结果沉淀下来，就能形成一套把状况信号、后果因子、预算规则和后续修复结果串起来的专有数据集——这是顾问和泛化 EAM 套件今天都没真正拥有的。
strategicChoices:
  beachhead: 美国大型污水公用事业单位：管网超过 500 英里、每年跑 NASSCO 调查，而且正处在同意令、减溢计划或 CIP 重排周期里。
  wedgeRationale: 这个细分场景的购买触发最清楚、延误成本最高，而且资本规划本来就有预算，所以先卖一个窄的排修优先级覆盖层，比同时横跨多个工作流去卖“地下资产智能”更容易更快证明价值。
  sequencingRationale: 起步先做导出式数据接入、可解释打分和单项目包生成，因为眼下最重要的是信任、可审计和速度，而不是深度回写集成；一旦一个公用事业客户和一个工程合作方转正，再补下游连接器和伙伴分销，之后才考虑相邻资产类别。
  notYet:
  - 雨水和输水主管优先级排序
  - 完整替换 GIS、EAM 或巡检系统
  - 不经人工审核和签字的自动项目审批
  - 数据质量弱、且没有持续修复周期的中小市政单位
market:
  tam: 估算 TAM 为 $300.0M：大致对应北美约 1,500 个已数字化 CCTV/NASSCO 工作流的污水项目，每个项目按约 $200K 混合年软件价值计算。
  sam: 估算 SAM 为 $60.0M：大致对应美国约 250 个大型公用事业或工程方主导项目，管网超过 500 英里或具备类似的合规复杂度，每个合同按约 $240K 年 ACV 计算。
  som: 估算第 3 年 SOM 为 $4.8M：如果公司能拿下 20 个企业客户、每个约 $240K ACV，并同时沿着公用事业客户与其工程合作方扩张，就能达到这一规模。
  segments:
  - 存在持续修复积压且面临合规压力的美国大型市政污水公用事业单位
  - 为这些公用事业客户管理下水道修复规划与交付的工程公司
  buyingProcess: 这套销售动作通常开始于资本规划负责人必须在新一轮巡检、溢流事件或同意令节点之后，向监管方、董事会或债券规划方解释为什么某些修复项目该先推进。经济决策权大概率在污水助理总监或资本规划负责人手里，工程合作方负责验证工作流是否可用，IT 则要确认这个覆盖层能否与 Esri、Cityworks、OpenGov 及现有巡检导出并存。
product:
  mvp: MVP 是面向单个公用事业项目或单一区域的“导出优先”排修工作流。它吃进 PACP/NASSCO 巡检输出、GIS 图层、历史维修记录和预算规则，然后给出可解释的管段评分、打包后的修复项目、延期情景，以及带人工审批节点的采购就绪导出。
  sixMonth: 在 6 个月内拿下 2–3 个共创客户，交付 PACP/GIS 接入、可审计打分和项目包生成，并在一个真实资本周期里证明这套流程能把“巡检证据到董事会可审阅修复包”的时间明显缩短。
  twelveMonth: 在 12 个月内补齐最常见的下游导出，接入 Cityworks、OpenGov 或工程合作方工作流，把成功试点转成年合同，并把 QA 规则标准化，让部署更像软件交付，而不是定制咨询。
  twentyFourMonth: 在 24 个月内成为大型公用事业单位的下水道资本规划控制层：补上项目组合基准、承包商与顾问协作功能，以及跨周期结果学习能力，再往相邻地下资产类别扩。
  keyBets:
  - 只靠导出的 PACP、GIS 和历史工单数据，就足以在需要深度集成前给出客户信得过的项目包建议。
  - 如果这层独立决策层能显著减少规划周期、顾问投入和 QA 或报送失败，买方就愿意单独为它付费。
  - 工程公司和承包商不只会替代产品，也能成为实施与分销渠道。
  - 带人工覆盖的、可解释项目包建议，会比黑箱式管段排序更快赢得信任。
gtm:
  wedge: 先卖一个付费试点：把一个真实巡检积压直接转成下一轮资本周期可用、监管方能接受的修复包清单。卖点不是笼统的 AI 提效，而是更快生成项目包、更少 QA 失败，以及更清楚的预算取舍。
  channels:
  - 由创始人主导，直销前 50 大公用事业单位里的污水资本规划负责人和助理总监
  - 与已经负责下水道修复范围界定和交付的工程公司、修复项目经理合作
  - 和 Esri、Cityworks、OpenGov 及相邻巡检工作流厂商做集成合作
  - 围绕同意令与减溢项目做定向会议获客和基准试点销售
  funnelTargets: 目标漏斗是：intro→qualified discovery 35%+，discovery→付费试点 20–30%，付费试点→年度生产合同 50%+；在成功客户里，首个公用事业客户在 12 个月内扩到跨区域或伙伴主导增长的比例达到 40%+。
  pricing: 按纳管污水英里数和活跃资本规划模块收年度订阅费，另收上线与校准费用。这样既符合公用事业单位对持续性规划工作的预算方式，也让定价与积压规模而非席位数挂钩，并能从 $75K–$150K 试点自然走到约 $180K–$300K 的年度生产 ACV。
businessModel:
  revenueStreams:
  - 按在管英里数和规划模块收费的下水道修复优先级年度软件订阅
  - 首期部署的数据映射与评分校准服务费
  - 情景规划、伙伴协作和跨周期基准分析的高级模块
  unitOfValue: 平台管理的年度污水管网英里数与资本规划周期。
  targetGrossMarginPct: 70
  expansionLevers:
  - Expand from one district or rehab cycle to portfolio-wide annual planning inside the same utility
  - Add engineering-partner workspaces and contractor package collaboration after the first utility deployment
  - Introduce benchmarking and cross-cycle outcome learning once enough utility-specific package history accumulates
strategyMap:
  northStarMetric: 通过平台完成规划、并被纳入有预算公用事业资本计划的年度修复项目金额。
  inputMetrics:
  - 从编码后的巡检证据到获批修复包的天数
  - 推荐项目包无需顾问整包重做就被接受的比例
  - 试点转生产的转化率
  - 生成修复包的 QA 或报送失败率
  - 数据接入后到第一条可信建议的时间
  moatsToBuild:
  - 把 PACP 观察、GIS 与后果因子、预算约束和后续修复结果串起来的项目包级决策图谱
  - 会随着年度资本周期和人工覆盖模式不断进化的公用事业专属优先级配方
  - 嵌入工程与交付合作方的分销能力——这些合作方本来就身处市政下水道项目里
  killCriteria:
  - 聚焦滩头市场销售 12 个月后，付费试点少于 3 个
  - 没有任何试点在一个资本周期内把项目包生成时间缩短至少 50%，或明显降低 QA / 报送失败
  - 不到一半的付费试点能转成年合同，因为买方坚持保留完整的并行人工顾问流程
  mermaid: |-
    flowchart LR
      Wedge[同意令下水道规划切口] --> MVP[导出优先的优先级 MVP]
      MVP --> Proof[更快、可审计的修复包]
      Proof --> Expansion[公用事业与合作伙伴扩张]
investorMemo:
  verdict:
    call: 观察
    conviction: 客户痛点强、预算触发也清楚，但在公司证明自己能和巡检 AI 现有厂商拉开差异，并拿下一条可复制的首条采购路径前，判断仍需克制。
    whyBelieve: 大型公用事业单位本来就在为这条修复工作流花钱，而且还没有哪家现有厂商真正拿下了“可解释的下水道资本优先级决策层”。
    whyDoubt: SewerAI、Vapar、顾问团队和现有 EAM 堆栈都可能往这个切口移动；如果这家创业公司不能用更轻的服务负担证明自己规划更快，它就会失手。
    nextDiligence: 先验证一个前 50 大公用事业客户或工程方主导项目的付费试点，证明它能更快生成董事会可审阅的修复包，并且存在可信的年度生产转化路径。
  firstCustomer:
    title: 同意令下的污水资本规划团队
    profile: 美国前 50 大公用事业单位之一，管理 500–5,000 英里污水管网，手上有年度 PACP 巡检积压，并由工程团队支持一个每个预算周期都要重排优先级的资本计划。
    trigger: 新的巡检周期、溢流事故、债券规划动作或同意令节点，会逼着公用事业单位解释为什么某些修复项目要排在前面。
    buyer: 污水助理总监或资本规划负责人
    initialContract: $75K–$150K 的付费试点，覆盖一个区域或一个资本规划周期；如果项目包周转时间和 QA 指标改善，再转成约 $180K–$300K 的年度订阅加上线费。
  mustBeTrue:
  - 至少 5 家目标公用事业单位确认：修复优先级排序本身就是值得单独预算的痛点，且不同于巡检编码和通用资产管理软件。
  - 有一个试点能把“巡检证据到董事会可审阅修复包”的时间，相比现有表格加顾问流程缩短至少 50%。
  - 只靠 PACP、GIS 和历史工单导出，就能给出让工程审核人至少 80% 时间都愿意通过的建议。
  - 至少一半的成功试点能转成年合同，而且不需要把现有 GIS 或 EAM 系统整套替换。
  - 在第一篇案例研究出来后，工程公司或承包商渠道能比纯直销公共部门更快带来合格试点。
  diligenceQuestions:
  - 实际最先能关单的预算，来自公用事业资本规划、收集系统运营、工程合作方工作流，还是创新预算条目？
  - 要在真实公用事业数据上给出可信项目包建议，最低需要什么数据包？
  - 没有并行顾问打分流程时，公用事业单位会多大程度接受软件生成的修复包？
  - 真正推动生产转化的 KPI 是什么——周期缩短、顾问工时节省、QA 失败减少，还是资本计划的可辩护性？
  - 在前 10 个目标客户里，把历史 PACP 与 GIS 数据整理到可用状态，究竟要多少实施工作量？
operatingAssumptions:
- assumption: 只要能显著改善一条本来就有预算的修复规划工作流，公用事业单位就愿意为一层独立优先级系统买单。
  basis: research.yaml
  validationTest: 拿下至少 3 个付费试点；这些客户已经在用巡检和 EAM 工具，但仍愿意单独签一份合同，并定义当前基线与目标 KPI。
  decisionImpact: 如果这一点不成立，公司就该重新定位成现有厂商或合作方工作流里的服务增强模块，而不是独立平台。
- assumption: 第一版只靠 PACP、GIS 和历史维修导出，就足以生成可信的项目包建议。
  basis: idea.yaml
  validationTest: 在 3 个共创客户里做数据审计，确认在不做深度集成的前提下，历史项目包建议能获得至少 80% 的工程审核通过率。
  decisionImpact: 如果不成立，滩头市场就必须进一步收窄到数据更干净的环境，实施成本和销售摩擦都会明显上升。
- assumption: 工程公司能成为高杠杆渠道，而不只是替代品。
  basis: research.yaml
  validationTest: 在第一个公用事业案例出来后的 6 个月内，靠伙伴转介绍带来至少 3 个合格试点机会和 1 个付费试点。
  decisionImpact: 如果不成立，公司就该更长时间坚持创始人主导销售，并推迟那些依赖伙伴渠道的招聘。
- assumption: 带人工审批的可解释项目包评分，足以通过监管方和董事会的审视。
  basis: research.yaml
  validationTest: 在试点中收集审核人反馈，确认客户在不为每个决策额外再跑一套完整人工评分模型的前提下，也愿意认可项目包依据。
  decisionImpact: 如果不成立，产品就必须转向服务顾问的决策支持工具，而不是直接给资本项目办公室做建议软件。
- assumption: 一旦上线、QA 和导出模板标准化，业务就能走到接近软件型的毛利水平。
  basis: operator judgment
  validationTest: 到第 5 个生产部署时，把单客户实施工时相对前 2 个试点压低至少 30%，同时不牺牲客户结果指标。
  decisionImpact: 如果不成立，公司就该提高实施定价、继续收窄滩头市场，或接受一个毛利更低、服务更重的模式。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位前 50 大公用事业环境里的污水资本规划负责人、助理总监和工程项目经理。
  hypothesis: 最强的购买触发不是泛化的巡检提效，而是面向监管方、董事会或债券方的修复重排事件。
  successMetric: 10 次访谈明确说出一个具名触发点、当前预算归属和试点成功 KPI。
  owner: CEO
- horizon: 0–90 天
  experiment: 审计 3 家公用事业单位或工程合作方的历史导出数据，并做出一套项目包评分原型工作流。
  hypothesis: 在做深度集成前，只靠导出的 PACP、GIS 和历史工单数据，就足以给出工程审核人信得过的项目包建议。
  successMetric: 至少 2 套数据里，历史建议获得 80%+ 的工程审核通过率。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 跑 2 个付费试点，为下一轮资本周期生成 1 份真实修复优先级清单和 1 组预算情景。
  hypothesis: 聚焦式试点能把项目包产出时间缩短至少 50%，并在一个真实项目中减少顾问或 QA 返工。
  successMetric: 签下 2 个付费试点，且至少 1 个试点达到时间缩短目标，并带来可量化的 QA 改善。
  owner: CEO
- horizon: 90–180 天
  experiment: 对比两种试点打包方式：直接卖给公用事业单位，和通过工程合作方主导的项目来卖。
  hypothesis: 相比纯直销公共部门，伙伴主导的打法能更快建立信任、也更能缩短采购拖期。
  successMetric: 有 1 个渠道主导试点比直销快至少 25% 成交，或用更少创始人时间拿到同等成交率。
  owner: GTM 负责人
- horizon: 6–12 个月
  experiment: 把标准化导出接进 1 个现有下游系统和 1 条工程合作方工作流。
  hypothesis: 只要能和现有记录系统并存，就足以拿下生产合同，不需要先拿到工单管理的回写控制权。
  successMetric: 2 个生产客户在真实下游流程里用上导出的项目包，且没有任何“必须替换平台”的阻断需求。
  owner: 解决方案架构师
- horizon: 12–18 个月
  experiment: 用早期修复周期的结果数据推出一个基准分析模块。
  hypothesis: 把结果挂钩的基准能力，会比单纯生成项目包更能提升续约率，也更能形成护城河。
  successMetric: 前 3 个生产客户在季度规划复盘或续约谈判里采用这套基准输出。
  owner: 产品负责人
operations:
- 每个试点上线前，都先量化项目包生成时间、顾问工时、QA 失败率和有预算项目接受率。
- 保持与 NASSCO 兼容的接入、QA 和审计日志，让每条建议都能追溯到源观察和假设。
- 在早期部署里坚持“覆盖层优先、只读优先”，只有当客户信任和集成需求足够强时，才往深度回写工作流走。
- 每周和公用事业及工程团队做治理复盘，把人工覆盖、缺失数据和采购阻碍逐条记清。
- 为 Esri、Cityworks、OpenGov 以及顾问交付物做标准导出模板，让实施保持可复制。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责决策图谱、评分引擎和导出优先工作流，这些正是切口的核心。
- role: 产品与污水行业负责人
  startTiming: 第 0 个月
  rationale: 把 PACP、修复规划和同意令工作流翻成可审计的产品逻辑和试点成功标准。
- role: 创始人/销售
  startTiming: 第 0 个月
  rationale: 负责滩头市场验证、签下付费试点，并把 KPI 证明变成可复制的公用事业与伙伴扩张。
- role: 解决方案架构师
  startTiming: 第 3 个月
  rationale: 把数据映射、QA 规则和下游导出标准化，避免早期部署滑成定制咨询。
- role: 合作负责人
  startTiming: 第 9 个月
  rationale: 在直接证明跑通后，把早期案例转成工程公司、承包商和平台渠道关系。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2–3 个共创客户，并在前 50 大公用事业或工程方主导项目里完成 2 个付费试点。
  - 证明至少有 1 个试点能把项目包产出时间缩短 50% 或更多，并减少 QA 或报送失败。
  - 交付标准化 PACP/GIS 接入，并至少为 1 条现有工作流上线首批下游导出模板。
  - 发布 1 个案例研究，证明付费试点能走向年度生产合同。
- horizon: 12–24 个月
  items:
  - 把早期试点转成 3–5 个年度生产客户，并拿下至少 2 个伙伴来源部署。
  - 在初始项目包生成工作流之上，补上项目组合情景规划、基准报告和伙伴协作功能。
  - 把单个新客户的实施时间，相比前 2 个试点压低至少 30%。
  - 在合格商机里，把最常见下游系统的集成做成可重复方案。
- horizon: 24–36 个月
  items:
  - 直接与伙伴主导合计拿下约 20 个企业客户，对齐研究里第 3 年 SOM 情形。
  - 在旗舰公用事业客户里证明年度续约和跨区域扩张。
  - 积累足够的结果历史，支撑一个站得住脚的基准产品，并为相邻地下资产扩张做准备。
risks:
- risk: 公共部门采购周期拖慢直销，即便买方痛点已经很明显。
  likelihood: High
  impact: High
  mitigation: 先围绕单个资本周期、伙伴主导入口和狭窄区域部署去卖付费试点，之后再谈企业级铺开。
- risk: 巡检 AI 现有厂商继续向修复优先级延伸，靠客户案例和数据规模把新进入者压住。
  likelihood: High
  impact: High
  mitigation: 把差异化压在资本项目办公室工作流、可审计性、项目包级预算逻辑，以及对伙伴友好的覆盖层打法上，而不是泛化缺陷自动化。
- risk: 历史数据质量太差，把早期部署拖成定制化数据清洗项目。
  likelihood: Medium
  impact: High
  mitigation: 先筛选出最低 PACP 与 GIS 就绪度，先从导出数据起步，再把 QA 模板和人工审核节点标准化，之后才做深度集成。
- risk: 公用事业单位在没有并行顾问评分流程的情况下，不愿依赖软件建议。
  likelihood: Medium
  impact: High
  mitigation: 先把产品定位成带人工覆盖控制的可解释决策支持，先证明复核时间下降，而不是一上来就卖全自动优先级。
- risk: 工程公司更想守住可计费的规划工作，而不是帮产品分发。
  likelihood: Medium
  impact: Medium
  mitigation: 给合作方提供更快的工作流、可复用的项目包模板和联合交付选项，让他们靠这套产品赢更多修复项目、做更多交付。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 这轮资金要覆盖 18 个月跑道：把导出优先的优先级产品做出来，招齐最初的行业与解决方案团队，拿下 2–3 个共创客户，跑通 2 个付费试点，并把第一批公用事业与合作伙伴工作流转成可复制的年度生产部署。
