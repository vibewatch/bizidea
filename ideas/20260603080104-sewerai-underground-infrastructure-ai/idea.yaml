problem: >-
  Large wastewater utilities already collect huge volumes of CCTV and NASSCO inspection data, but they still struggle to
  convert that evidence into an auditable, fundable list of which pipe segments to rehabilitate first. Capital planning
  teams juggle spreadsheets, GIS layers, consultant memos, consent-decree milestones, and asset-management systems that do
  not agree on risk, cost, or readiness, so the worst assets are often addressed too slowly and procurement starts too
  late. The result is avoidable overflows, missed compliance deadlines, and capital programs that cannot explain why one
  project should move ahead of another.
targetUser:
  primary: Deputy directors of wastewater collections and capital planning at large U.S. sewer utilities managing renewal backlogs across hundreds of miles of pipe
  secondary: Program managers at engineering firms running rehabilitation planning and delivery for municipal sewer utilities
  buyer: Assistant director of wastewater or chief of collection-system capital planning at a large municipal utility
startupThesis:
  nonObviousInsight: >-
    The bottleneck in underground infrastructure is no longer collecting defect evidence; it is packaging that evidence
    into defendable capital decisions fast enough for regulators, boards, and procurement teams to act. What changed is
    that inspection data is now large-scale and machine-readable, while the condition curve is worsening quickly enough
    that utilities need an operating layer for rehab sequencing, not another inspection viewer.
  beachhead: >-
    U.S. municipal wastewater utilities with 500-plus miles of collection pipe, annual NASSCO survey programs, and active
    EPA consent-decree or overflow-reduction capital plans that must prioritize rehab packages every budget cycle
  wedge: >-
    A rehab-prioritization layer that ingests inspection outputs, GIS context, prior repair history, and capital
    constraints, then recommends pipe-segment packages with explainable scores, budget scenarios, and bid-ready rehab
    scopes
  whyNowCatalyst: >-
    SewerAI's funding and product expansion show the market has moved beyond AI-assisted inspection toward rehabilitation
    planning just as the NLC data says utility asset condition is deteriorating at its fastest pace in years.
  ventureScalePath: >-
    Start with sewer rehab prioritization for large utilities, expand into stormwater and water-main renewal, then become
    the cross-asset capital planning system for underground infrastructure programs, engineering partners, and
    performance-based contractors.
solution: >-
  The product sits between inspection systems and the capital-program office. It pulls defect codes, historical work
  orders, GIS layers, overflow hotspots, and budget rules into one decision graph, then proposes the highest-leverage
  rehab bundles by district, pipe type, risk profile, and budget envelope. Utilities get an explainable ranking for each
  recommendation, plus scenario tools that show what slips if a project is deferred and what can be advanced when funding
  appears. Engineering partners can turn approved bundles into scoped rehab packages without rebuilding the analysis in
  spreadsheets or consultant slide decks. The first deployment can start as an overlay on exported inspection and asset
  data, so utilities do not need to replace their existing asset-management or CCTV workflows.
goToMarketSeed:
  firstCustomer: >-
    A top-50 U.S. wastewater utility with 500-5,000 miles of sewer pipe, an annual CCTV/NASSCO inspection backlog, and a
    twelve-month deadline to update its consent-decree or overflow-mitigation capital program
  buyingTrigger: >-
    A new inspection cycle, overflow incident, consent-decree milestone, or bond-planning process forces the utility to
    defend which rehab projects move first and why
  currentAlternative: >-
    NASSCO scoring tools, GIS and EAM exports, spreadsheet prioritization models, engineering consultants, and manual
    capital-planning workshops
  switchingReason: >-
    This wedge gives utilities an explainable and procurement-ready prioritization output in weeks instead of months,
    reducing consultant dependence while fitting above existing inspection and asset systems
  pricingHypothesis: >-
    Annual platform subscription priced by miles of managed pipe and capital-program module, with paid onboarding for data
    mapping and scenario calibration
