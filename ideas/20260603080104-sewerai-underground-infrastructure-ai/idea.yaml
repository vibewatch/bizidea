jobsToBeDone:
  - job: >-
      When our annual inspection cycle reveals more deteriorated pipe than we can fund, help the capital planning team
      rank and bundle the right rehab projects first, so we can defend the plan to regulators, boards, and ratepayers.
    currentAlternative: Consultant studies, spreadsheet scoring models, and manual workshops across GIS, CCTV, and asset teams
    successMetric: Days to publish a defendable capital-priority list and percentage of approved projects delivered on schedule
  - job: >-
      When a consent-decree milestone or overflow event raises urgency, help our engineering partners turn the highest-risk
      pipe segments into procurement-ready scopes quickly, so rehab work can start before the next failure cycle.
    currentAlternative: Rebuilding analysis in consultant memos, PDFs, and engineering scoping spreadsheets
    successMetric: Time from inspection evidence to bid-ready rehab package and reduction in emergency versus planned repairs
ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster combines independent condition evidence, named customers, workflow expansion, and growth capital, which is unusually strong validation for an infrastructure software wedge.
  painIntensity:
    score: 5
    rationale: Sewer rehab prioritization affects compliance, public health, overflow risk, and millions of dollars of capital allocation.
  wedgeClarity:
    score: 5
    rationale: Rehab sequencing for large wastewater utilities is a narrow workflow with a visible buyer, clear trigger, and measurable time-to-plan ROI.
  defensibility:
    score: 4
    rationale: Explainable prioritization models and repeated capital-cycle data can create sticky planning logic, though incumbents and consultants remain credible competitors.
  ventureScale:
    score: 5
    rationale: The beachhead can expand from sewer utilities into adjacent underground assets, engineering channels, and portfolio-wide infrastructure capital planning.
topRisks:
  - name: Public-sector sales drag
    description: Utility procurement cycles can be slow and budget timing may delay software adoption even when the pain is obvious.
    mitigation: Land through one district, one consent-decree milestone, or an engineering-partner-led pilot that proves planning speed before a full enterprise rollout.
  - name: Black-box skepticism
    description: Capital planners and regulators may reject recommendations they cannot audit, especially when project sequencing affects public spending and compliance.
    mitigation: Make every recommendation explainable with source defects, budget assumptions, and human approval gates instead of opaque model outputs.
  - name: Services-heavy implementations
    description: Messy inspection histories and fragmented GIS or EAM setups could turn the first deployments into custom consulting projects.
    mitigation: Start with exported datasets, standard NASSCO inputs, and a narrow prioritization workflow before expanding into deeper integrations and broader asset classes.
