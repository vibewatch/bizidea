differentiator: >-
  Sewer inspection AI vendors tell utilities what defects exist, while asset-management systems store records after a
  decision has already been made. This company would own the decision layer in between: which segments become funded rehab
  projects, in what sequence, under which budget and compliance constraints. That creates a stronger moat than a generic
  AI copilot because the product compounds utility-specific priors on failure progression, cost-of-delay, contractor
  performance, and project bundling logic across repeated capital cycles. Over time, it can become the trusted planning
  spine for underground infrastructure renewal, not just another analytics dashboard.
