slug: sewer-rehab-prioritization-os
date: '2026-06-03'
executiveSummary: >-
  Sewer Rehab Prioritization OS should start as an overlay for large U.S.
  wastewater utilities that already run annual PACP/NASSCO inspection programs
  but still build rehab plans through spreadsheets, GIS exports, and consultant
  workshops. The urgent pain is not finding defects; it is defending which pipe
  segments move first under consent-decree, overflow-reduction, and annual CIP
  constraints. The first product should ingest exported inspection, GIS, and
  work-history data, then generate explainable rehab bundles, budget scenarios,
  and audit trails without forcing a rip-and-replace of Cityworks, OpenGov,
  Esri, or existing CCTV workflows. The first buyer should be the assistant
  director of wastewater or capital-planning chief at a top-50 utility, with an
  engineering partner often influencing scope and deployment. Pricing should be
  anchored to managed sewer miles and the active capital-program planning cycle,
  with a paid pilot that converts into an annual contract if planning-cycle time
  and submittal quality improve. The hard strategic choice is to win one narrow
  planning workflow for large sewer utilities before expanding into stormwater,
  water-main renewal, or broader asset-management replacement. Market evidence
  is strong on pain, buyer visibility, and budgeted workflows, but exact
  standalone willingness to pay for a new decision layer and the fastest
  procurement path are still assumptions that need validation. Given strong
  incumbents already moving up-stack, the company should treat the first 12-18
  months as proof of differentiation and channel fit rather than assume rapid
  category capture.
problem:
  - Large wastewater utilities already collect PACP/NASSCO and CCTV evidence, but they still cannot turn that data into a defendable, regulator-ready ranking of which pipe segments to rehabilitate first.
  - Capital planners, engineering firms, and contractors work across spreadsheets, GIS layers, consultant studies, and EAM systems that do not agree on risk, cost, or readiness, which slows procurement and raises the odds of mis-prioritized repairs.
solution:
  - Build a rehab-prioritization overlay that ingests inspection exports, GIS context, work history, and budget constraints to score, bundle, and explain the next funded sewer rehab packages.
  - Generate audit-ready rationale, what-if budget scenarios, and bid-ready package exports so utilities and engineering partners can move from inspection evidence to procurement faster without replacing their systems of record.
whyWeWin:
  - The company is capital-program-office first rather than inspection-first, which matches the researched gap between defect detection tools and the board-, regulator-, and budget-facing decision workflow.
  - If it captures package-level outcomes across repeated annual rehab cycles, it can build a proprietary dataset linking condition signals, consequence factors, budget rules, and downstream repair results that consultants and broad EAM suites do not own today.
strategicChoices:
  beachhead: Large U.S. wastewater utilities with 500+ miles of collection pipe, annual NASSCO survey programs, and an active consent-decree, overflow-reduction, or CIP reprioritization cycle.
  wedgeRationale: This segment has the clearest buying trigger, the most expensive cost of delay, and already-budgeted capital-planning work, so a narrow rehab-prioritization overlay can prove value faster than selling broad underground asset intelligence across many workflows.
  sequencingRationale: Start with export-based data ingest, explainable scoring, and one-program package generation because trust, auditability, and speed matter more than deep write-back integrations at first; once one utility and one engineering partner convert, add downstream connectors and partner-led distribution before attempting adjacent asset classes.
  notYet:
    - Stormwater and water-main prioritization
    - Full replacement of GIS, EAM, or inspection systems
    - Autonomous project approval without human review and sign-off
    - SMB municipalities with weak data quality or no recurring rehab cycle
market:
  tam: "$300.0M estimated TAM based on roughly 1,500 North American wastewater programs with digitized CCTV/NASSCO workflows at about $200K blended annual software value."
  sam: "$60.0M estimated SAM based on roughly 250 large U.S. utility or engineer-led programs with 500+ mile networks or similar compliance complexity at about $240K annual ACV."
  som: "$4.8M estimated year-three SOM based on 20 enterprise accounts at about $240K ACV if the company lands one annual rehab cycle and expands through both the utility and its engineering partner."
  segments:
    - Large U.S. municipal wastewater utilities with recurring rehab backlog and compliance pressure
    - Engineering firms managing sewer rehabilitation planning and delivery for those utilities
  buyingProcess: >-
    The motion starts when a capital-planning leader must defend a rehab list to
    regulators, boards, or bond planners after a new inspection cycle, overflow
    event, or consent-decree milestone. Economic approval likely sits with the
    wastewater assistant director or capital-planning chief, while engineering
    partners validate the workflow and IT checks that the overlay can coexist
    with Esri, Cityworks, OpenGov, and existing inspection exports.
product:
  mvp: >-
    MVP is an export-first rehab-prioritization workflow for one utility program
    or district. It ingests PACP/NASSCO inspection outputs, GIS layers, prior
    repair history, and budget rules, then produces explainable segment scores,
    bundled rehab packages, deferral scenarios, and procurement-ready exports
    with human approval gates.
  sixMonth: Land 2-3 design partners, ship PACP/GIS ingest with auditable scoring and package generation, and prove one repeatable workflow that cuts time from inspection evidence to board-ready rehab package on a live capital cycle.
  twelveMonth: Add the most common downstream exports into Cityworks, OpenGov, or engineering-partner workflows, convert successful pilots into annual production contracts, and standardize QA rules so deployments stay software-like rather than custom consulting.
  twentyFourMonth: Become the sewer capital-planning control layer for large utilities by adding portfolio benchmarking, contractor and consultant collaboration features, and multi-cycle outcome learning before expanding into adjacent underground asset classes.
  keyBets:
    - Exported PACP, GIS, and work-history data are sufficient to produce trusted package recommendations before deep system integrations are required.
    - Buyers will pay for a separate decision layer if it materially reduces planning-cycle time, consultant effort, and QA or submittal failure.
    - Engineering firms and contractors can act as implementation and distribution partners instead of only as substitutes.
    - Explainable package-level recommendations with human override will be trusted faster than black-box segment rankings.
gtm:
  wedge: Sell a paid pilot that turns one live inspection backlog into an explainable, regulator-defensible rehab package list for the next capital cycle, framed around faster package creation, fewer QA failures, and clearer budget tradeoffs rather than generic AI productivity.
  channels:
    - Founder-led direct sales to wastewater capital-planning chiefs and assistant directors at top-50 utilities
    - Engineering-firm and rehab-program-manager partnerships that already scope and deliver sewer rehabilitation work
    - Integration-led partnerships with Esri, Cityworks, OpenGov, and adjacent inspection workflow vendors
    - Targeted conference and benchmark-pilot selling around consent-decree and overflow-reduction programs
  funnelTargets: "Target intro→qualified discovery 35%+, discovery→paid pilot 20-30%, paid pilot→annual production 50%+, and first utility→cross-district or partner-led expansion within 12 months in 40%+ of successful accounts."
  pricing: Annual subscription priced by managed sewer miles and active capital-program module, with a paid onboarding and calibration fee; this matches how utilities budget recurring planning work, keeps pricing aligned to backlog size rather than user seats, and supports a credible path from a $75K-$150K pilot to roughly $180K-$300K annual production ACV.
businessModel:
  revenueStreams:
    - Annual software subscription for sewer rehab prioritization by managed miles and planning module
    - Paid onboarding, data mapping, and scoring-calibration services for initial deployment
    - Premium modules for scenario planning, partner collaboration, and cross-cycle benchmarking
  unitOfValue: Annual sewer miles and capital-planning cycles governed through the platform.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one district or rehab cycle to portfolio-wide annual planning inside the same utility
    - Add engineering-partner workspaces and contractor package collaboration after the first utility deployment
    - Introduce benchmarking and cross-cycle outcome learning once enough utility-specific package history accumulates
strategyMap:
  northStarMetric: Annual rehab-package dollars planned through the platform and accepted into a funded utility capital program.
  inputMetrics:
    - Days from coded inspection evidence to approved rehab package
    - Percentage of recommended packages accepted without full consultant rework
    - Pilot-to-production conversion rate
    - QA or submittal failure rate on generated rehab packages
    - Time to first trusted recommendation after data ingest
  moatsToBuild:
    - A package-level decision graph linking PACP observations, GIS and consequence factors, budget constraints, and downstream rehab outcomes
    - Utility-specific prioritization recipes that improve with each annual capital cycle and human override pattern
    - Embedded distribution through engineering and delivery partners already inside municipal sewer programs
  killCriteria:
    - Fewer than 3 paid pilots signed within 12 months of focused selling into the beachhead
    - No pilot shows at least 50% faster package-creation time or a measurable reduction in QA or submittal failure within one capital cycle
    - Fewer than 50% of paid pilots convert to annual production because buyers insist on a full parallel manual consultant process
  mermaid: |
    flowchart LR
      Wedge[Consent-decree sewer planning wedge] --> MVP[Export-first prioritization MVP]
      MVP --> Proof[Faster auditable rehab packages]
      Proof --> Expansion[Utility and partner expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong customer pain and visible budget triggers, but conviction stays limited until the company proves it can differentiate from inspection-AI incumbents and close a repeatable first procurement path.
    whyBelieve: Large utilities already fund the underlying rehab workflow, and no incumbent has clearly won the explainable capital-prioritization layer for sewer renewal.
    whyDoubt: SewerAI, Vapar, consultants, and incumbent EAM stacks can all move into this wedge, so the startup fails if it cannot show faster planning proof with less services load than those alternatives.
    nextDiligence: Validate one paid pilot with a top-50 utility or engineer-led program that shows a materially faster board-ready rehab package and a credible conversion path to annual production.
  firstCustomer:
    title: Consent-decree wastewater capital-planning team
    profile: A top-50 U.S. utility managing 500-5,000 miles of sewer pipe, annual PACP inspection backlog, and an engineering-supported capital program that must reprioritize work every budget cycle.
    trigger: A new inspection cycle, overflow incident, bond-planning exercise, or consent-decree milestone forces the utility to defend why specific rehab projects move first.
    buyer: Assistant director of wastewater or chief of capital planning
    initialContract: "$75K-$150K paid pilot on one district or capital-planning cycle, converting to roughly $180K-$300K annual subscription plus onboarding if package turnaround time and QA metrics improve."
  mustBeTrue:
    - At least 5 target utilities confirm that rehab prioritization is a budget-worthy pain distinct from inspection coding and general asset-management software.
    - One pilot can cut time from inspection evidence to board-ready rehab package by at least 50% versus the current spreadsheet and consultant workflow.
    - Export-only ingest from PACP, GIS, and work-history sources is enough to produce recommendations that engineering reviewers approve at least 80% of the time.
    - At least half of successful pilots convert to annual production without requiring a full rip-and-replace of incumbent GIS or EAM systems.
    - Engineering-firm or contractor channels can generate qualified pilots faster than direct public-sector selling alone after the first case study.
  diligenceQuestions:
    - Which budget closes first in practice: utility capital planning, collections operations, an engineering-partner workflow, or an innovation line item?
    - What minimum data package is required to produce trusted package recommendations on real utility data?
    - How often will utilities accept software-shaped rehab packages without a parallel consultant scoring exercise?
    - Which KPI actually unlocks production conversion: cycle-time reduction, consultant-hour savings, fewer QA failures, or capital-plan defensibility?
    - How much implementation work is required to normalize legacy PACP and GIS data in the first 10 target accounts?
operatingAssumptions:
  - assumption: Utilities will fund a separate prioritization layer if it clearly improves an already-budgeted rehab planning workflow.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots where the customer already licenses inspection and EAM tools but still agrees to a separate contract with baseline and target KPI definitions.
    decisionImpact: If false, the company should reposition as a services-enabled module inside an incumbent or partner workflow instead of a standalone platform.
  - assumption: PACP, GIS, and prior repair exports are sufficient for the first version to generate trusted package recommendations.
    basis: idea.yaml
    validationTest: Run 3 design-partner data audits and confirm at least 80% engineering reviewer approval on historical package recommendations before deep integration work.
    decisionImpact: If false, the beachhead must narrow to cleaner data environments and implementation cost and sales friction will rise materially.
  - assumption: Engineering firms can be high-leverage channels rather than only substitutes.
    basis: research.yaml
    validationTest: Generate at least 3 qualified pilot opportunities and 1 paid pilot from partner referrals within 6 months of the first utility case study.
    decisionImpact: If false, the company should keep sales founder-led for longer and delay partnership-dependent hiring.
  - assumption: Explainable package scoring with human approval is sufficient to satisfy regulatory and board scrutiny.
    basis: research.yaml
    validationTest: During pilots, collect reviewer feedback and confirm that customers approve package rationale without requiring a separate full manual scoring model for every decision.
    decisionImpact: If false, the product must shift toward decision support for consultants rather than direct capital-program recommendation software.
  - assumption: The business can reach software-like margins once onboarding, QA, and export templates are standardized.
    basis: operator judgment
    validationTest: By the fifth production deployment, reduce implementation hours per account by at least 30% versus the first two pilots while holding customer outcome metrics constant.
    decisionImpact: If false, the company should raise implementation pricing, narrow the beachhead further, or accept a lower-margin services-heavy model.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Interview 15 wastewater capital planners, assistant directors, and engineering-program managers in top-50 utility environments.
    hypothesis: The strongest buying trigger is a regulator-, board-, or bond-facing rehab reprioritization event rather than a generic inspection-efficiency problem.
    successMetric: 10 interviews confirm a named trigger, current budget owner, and pilot success KPI.
    owner: CEO
  - horizon: "0–90 days"
    experiment: Audit historical exports from 3 utilities or engineering partners and build a prototype package-scoring workflow.
    hypothesis: Exported PACP, GIS, and work-history data are enough to generate reviewer-trusted package recommendations before deep integration.
    successMetric: 80%+ engineering reviewer approval on historical recommendations in at least 2 datasets.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Run 2 paid pilots that generate one live rehab-priority package list and one budget scenario set for the next capital cycle.
    hypothesis: A focused pilot can cut package-production time by at least 50% and reduce consultant or QA rework on one real program.
    successMetric: 2 signed paid pilots and at least 1 pilot achieves the time-reduction target plus a measurable QA improvement.
    owner: CEO
  - horizon: "90–180 days"
    experiment: Test pilot packaging sold direct to the utility versus sold through an engineering-partner-led engagement.
    hypothesis: Partner-led motions reduce trust-building time and procurement drag versus direct public-sector selling alone.
    successMetric: One channel-led pilot closes at least 25% faster than the direct motion or reaches equivalent close rate with lower founder time.
    owner: GTM lead
  - horizon: "6–12 months"
    experiment: Ship standardized exports into one incumbent downstream system and one engineering-partner workflow.
    hypothesis: Coexistence with systems of record is enough to unlock production contracts without write-back control of work management.
    successMetric: 2 production customers use the exported packages in their live downstream workflow with no blocker request for platform replacement.
    owner: Solutions architect
  - horizon: "12–18 months"
    experiment: Launch a benchmarking module using outcomes from early rehab cycles across initial customers.
    hypothesis: Outcome-linked benchmarks increase renewal odds and create a stronger moat than package generation alone.
    successMetric: First 3 production accounts adopt the benchmark output in quarterly planning reviews or renewal negotiations.
    owner: Product lead
operations:
  - Baseline each pilot on package-creation time, consultant hours, QA failure rate, and funded-project acceptance before rollout.
  - Maintain NASSCO-compatible ingest, QA, and audit logs so every recommendation can be traced back to source observations and assumptions.
  - Keep the product overlay-first and read-only in early deployments until customer trust and integration needs justify deeper write-back workflows.
  - Run weekly governance reviews with utility and engineering teams to document overrides, missing data, and procurement blockers.
  - Build standard export templates for Esri, Cityworks, OpenGov, and consultant deliverables to keep implementations repeatable.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the decision graph, scoring engine, and export-first workflow that define the wedge.
  - role: Product and wastewater domain lead
    startTiming: Month 0
    rationale: Translates PACP, rehab planning, and consent-decree workflows into auditable product logic and pilot success criteria.
  - role: Founder seller
    startTiming: Month 0
    rationale: Owns beachhead discovery, closes paid pilots, and turns KPI proof into repeatable utility and partner expansion.
  - role: Solutions architect
    startTiming: Month 3
    rationale: Standardizes data mapping, QA rules, and downstream exports so early deployments do not become bespoke consulting projects.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Converts early case studies into engineering-firm, contractor, and platform-channel relationships once direct proof exists.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 2-3 design partners and complete 2 paid pilots in top-50 utility or engineer-led programs.
      - Prove at least one pilot can cut package-production time by 50% or more and reduce QA or submittal failure.
      - Ship standardized PACP/GIS ingest plus first downstream export templates for at least one incumbent workflow.
      - Publish one case study that shows a credible path from paid pilot to annual production contract.
  - horizon: "12–24 months"
    items:
      - Convert early pilots into 3-5 annual production customers and secure at least 2 partner-sourced deployments.
      - Add portfolio scenario planning, benchmark reporting, and partner collaboration features on top of the initial package-generation workflow.
      - Reduce implementation time per new account by at least 30% versus the first two pilots.
      - Establish repeatable integrations with the most common downstream systems in qualified deals.
  - horizon: "24–36 months"
    items:
      - Reach roughly 20 combined direct and partner-led enterprise accounts, consistent with the researched year-three SOM case.
      - Demonstrate annual renewals and cross-district expansion inside flagship utility accounts.
      - Build enough outcome history to support a defensible benchmark product and prepare for adjacent underground asset expansion.
risks:
  - risk: Public-sector procurement cycles delay direct utility sales even when buyer pain is obvious.
    likelihood: High
    impact: High
    mitigation: Use paid pilots tied to one capital cycle, partner-led entry points, and narrow district-level deployments before asking for enterprise rollout.
  - risk: Inspection-AI incumbents move further into rehab prioritization and outcompete a new entrant on references and data scale.
    likelihood: High
    impact: High
    mitigation: Differentiate on capital-program-office workflow, auditability, package-level budgeting logic, and partner-friendly overlays rather than generic defect automation.
  - risk: Poor historical data quality turns early deployments into custom data-cleaning projects.
    likelihood: Medium
    impact: High
    mitigation: Qualify for minimum PACP and GIS readiness, start with exports, and codify QA templates and human review gates before deeper integrations.
  - risk: Utilities refuse to rely on software recommendations without a full parallel consultant scoring process.
    likelihood: Medium
    impact: High
    mitigation: Position the product first as explainable decision support with override controls, and prove reduced review time rather than fully autonomous prioritization.
  - risk: Engineering firms prefer to protect billable planning work rather than distribute the product.
    likelihood: Medium
    impact: Medium
    mitigation: Give partners workflow acceleration, reusable package templates, and co-branded delivery options that help them win and execute more rehab work.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of runway to build the export-first prioritization product, hire the initial domain and solutions team, land 2-3 design partners, prove 2 paid pilots, and convert the first utility and partner workflows into repeatable annual production deployments.
