slug: sewer-rehab-prioritization-os
date: '2026-06-03'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: Starts the first full month after the 2026-06-03 business-plan date.
- id: A2
  name: Starting paying accounts (M1)
  value: '0'
  unit: count
  source: '[BP milestones] The plan starts before any paid pilot is signed, so M1 begins with zero paying accounts.'
- id: A3
  name: Blended annualized customer value
  value: $240.0K ARR per paying account
  unit: usdK_per_year
  source: '[BP gtm.pricing; BP market.som; research.market.sam] The BP and research anchor production ACV around $180K-$300K, with year-three SOM explicitly modeled at about $240K ACV.'
- id: A4
  name: Paid pilot revenue treatment
  value: $20.0K per month for roughly 5 months
  unit: usdK_per_customer_month
  source: '[BP investorMemo.firstCustomer.initialContract] The midpoint of the BP''s $75K-$150K pilot range is about $100K, which the model spreads over a five-month pilot/calibration window to keep revenue consistent with the $240K annualized production value.'
- id: A5
  name: Customer ramp
  value: 3 paying accounts by M12, 9 by Q4Y2, and 20 by Q4Y3
  unit: customers
  source: '[BP milestones; BP market.som] This pace matches the BP''s 2 paid pilots in year 1, 3-5 production customers across months 12-24, and roughly 20 enterprise accounts by months 24-36.'
- id: A6
  name: Gross margin ramp
  value: 45%-65% in Y1, 62%-68% in Y2, and 68%-70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP operatingAssumptions] Early deployments carry heavier onboarding and QA load, then converge to the BP''s 70% software-like gross-margin target as exports and templates standardize.'
- id: A7
  name: Monthly churn
  value: 1.0%
  unit: percent
  source: Startup-finance heuristic for sticky public-sector enterprise workflow software with annual planning cycles and high switching costs, moderated by early-product and procurement risk.
- id: A8
  name: Fully loaded CAC
  value: $140.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP risks] Large-utility selling requires founder time, engineering proof, conference travel, procurement support, and partner enablement, so CAC is modeled materially above mid-market SaaS norms.'
- id: A9
  name: Loaded salary bands
  value: Engineering $190K; product/domain $180K; sales $170K; solutions/implementation $160K; partnerships/CS $150K; G&A $130K
  unit: usdK_per_fte_year
  source: Startup-finance heuristic for U.S. seed-stage enterprise software hiring, anchored to [BP team] and the domain-heavy workflow described in the business plan.
- id: A10
  name: Headcount ramp snapshots
  value: Engineering 1/1/2/2/3/4; product/domain 1/1/1/1/1/1; sales 1/1/1/1/2/3; solutions/implementation 0/1/1/2/2/2; partnerships/CS 0/0/0/1/1/2; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale; BP operatingAssumptions] The model follows the BP hiring order: build the overlay and QA/export layer first, then add partner and scaled GTM coverage once pilot proof exists.'
- id: A11
  name: Starting cash after seed close
  value: $4.0M
  unit: usdM
  source: '[BP fundingAsk] The BP asks for a $3M-$5M seed; the model uses $4.0M because it funds the planned hiring ramp, supports public-sector sales cycles, and still leaves a 6-month cash buffer.'
- id: A12
  name: Functional opex budgets
  value: Y1 non-salary opex of $35K-$65K per month; Y2 non-salary opex of $155K-$190K per quarter; Y3 non-salary opex of $130K-$163K per quarter
  unit: usdK
  source: Startup-finance heuristic for an enterprise infra-software company with travel, conference selling, insurance, cloud tooling, legal, and data-QA overhead layered on top of the BP headcount plan.
- id: A13
  name: Quarterly payroll smoothing
  value: Y2 and Y3 salary lines ramp between snapshot headcount points instead of stepping only at year-end
  unit: method
  source: '[Financial Modeler instructions] Quarterly salary expense is smoothed between snapshot columns so payroll reflects the BP sequencing without hiding hiring step-ups.'
- id: A14
  name: Partner-sourced wins by Y3
  value: About 30% of closed-won accounts by Y3
  unit: percent_of_new_customers
  source: '[BP operatingAssumptions; BP milestones; BP gtm.channels] The BP expects engineering firms to become a leverage channel after early proof, so the base case assumes partners drive roughly one-third of later wins.'
- id: A15
  name: Cash conversion simplification
  value: Ending cash rolls from EBITDA with no debt, tax, or capex line items
  unit: method
  source: Startup-finance heuristic for an asset-light seed-stage software company where working-capital swings are small relative to operating burn.
- id: A16
  name: Downside scenario deltas
  value: $220K ACV, 65% gross margin, 12-month sales cycle, and 15 accounts by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.categoryDynamics.headwinds] The downside reflects procurement drag, incumbent overlap, and services-heavy onboarding persisting longer than planned.'
- id: A17
  name: Upside scenario deltas
  value: $260K ACV, 72% gross margin, 7-month sales cycle, and 24 accounts by Q4Y3
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones] The upside assumes early case studies unlock partner-led distribution and premium scenario/benchmark modules lift ACV.'
