modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder + partner pipeline] --> Pilots[Paid pilots]
      Pilots --> Accounts[Production accounts]
      Accounts --> Revenue[Annualized ACV]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by 20 public-sector enterprise accounts by Q4Y3 at roughly $240K ACV, with partner-sourced wins accelerating the second-half ramp.
- checkName: Must go right
  finding: Implementation and QA have to standardize quickly enough for gross margin to reach 70% while utilities still trust the audit trail.
- checkName: Model breaks if
  finding: The model deteriorates fastest if procurement stretches toward 12 months because the sales-cycle sensitivity has the biggest combined impact on Y3 revenue and cash.
- checkName: Next-round proof
  finding: A credible next round is supported if the company reaches 5 production customers, 2 partner-sourced deployments, and materially faster implementation before raising again.
sanityChecks:
  ruleOf40: Y3 growth 156.8% + EBITDA margin -0.5% = 156.3%.
  burnMultiple: Y2 burn multiple is about 0.8x on roughly $1.44M of net new ARR; Y3 improves to about 0.0x on roughly $2.64M of net new ARR.
  revenuePerFte: $261K Y3 using $3.39M revenue and 13 year-end FTE (benchmark $200–400K SaaS).
  flags:
  - Revenue concentration stays high because 20 accounts still means a small number of large municipal buyers drive most of year-three revenue.
  - The base case assumes engineering partners source about 30% of later wins; if that channel underperforms, CAC and the sales cycle likely drift toward the downside case.
  - Y1 and Y2 burn are intentionally heavy because data QA, auditability, and procurement support keep the business services-influenced before templates fully standardize.
