modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Leads[创始人 + 伙伴线索池] --> Pilots[付费试点]
      Pilots --> Accounts[生产账户]
      Accounts --> Revenue[年化 ACV]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[扣除 opex 后的期末现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入由 Q4Y3 的 20 个公共部门企业账户驱动，单账户 ACV 约 $240K，且伙伴来源赢单推动了后半程爬坡。
- checkName: 必须做对的事
  finding: 实施和 QA 必须足够快地标准化，毛利率才能爬到 70%，同时还不能丢掉公用事业客户对审计轨迹的信任。
- checkName: 模型何时会断裂
  finding: 如果采购周期拖到 12 个月，模型恶化最快，因为销售周期敏感性对 Y3 收入和现金的合并影响最大。
- checkName: 下一轮融资证明点
  finding: 若公司在再次融资前拿下 5 个生产客户、2 个伙伴来源部署，并把实施速度明显提起来，就足以支撑一轮可信的下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长 156.8% + EBITDA 利润率 -0.5% = 156.3%。
  burnMultiple: Y2 的 burn multiple 约为 0.8x，对应约 $1.44M 净新增 ARR；Y3 提升到约 0.0x，对应约 $2.64M 净新增 ARR。
  revenuePerFte: $3.39M 收入 / 13 名年末 FTE，对应 Y3 每名员工约 $261K（SaaS 基准区间为 $200–400K）。
  flags:
  - 收入集中度依然很高，因为 20 个账户仍意味着第 3 年的大部分收入压在少数大型市政买方身上。
  - 基准情形假设工程合作方能带来约 30% 的后期赢单；如果这条渠道不达预期，CAC 和销售周期大概率都会往下行情形漂。
  - Y1 和 Y2 的 burn 故意做得偏重，因为数据 QA、可审计性和采购支持，会让业务在模板完全标准化前一直带着较重的服务属性。
