scenarios:
  downside:
    description: 采购周期拉长、服务工作比预期更重，公司在第 3 年结束时的账户数更少、ACV 也低于计划。
    y3RevenueK: 2330.0
    y3EbitdaK: -640.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
    - ACV 从 $240K 降到 $220K。
    - 稳态毛利率从 70% 降到 65%。
    - 销售周期从约 9 个月拉长到 12 个月。
    - Q4Y3 账户数从 20 个降到 15 个。
  base:
    description: 基准情形是：第 1 年做到 3 个付费账户，Q4Y2 到 9 个，Q4Y3 到 20 个，同时毛利率逐步收敛到 BP 目标。
    y3RevenueK: 3390.0
    y3EbitdaK: -16.5
    cashLowPointK: 1499.1
    keyAssumptionChanges:
    - ACV 维持在约 $240K，与 BP 和 research 对 SOM 的框架一致。
    - 毛利率到 Y3 达到 BP 设定的 70% 目标，因为上线流程逐渐标准化。
    - 销售周期维持在约 9 个月，且工程合作方贡献逐步提升。
    - Q4Y3 账户数达到 20 个，与 BP 第 3 年 SOM 情形一致。
  upside:
    description: 案例研究和伙伴杠杆把赢单前置，提升扩展定价，并让公司在第 3 年的客户爬坡高于基准情形。
    y3RevenueK: 4410.0
    y3EbitdaK: 620.0
    cashLowPointK: 1680.0
    keyAssumptionChanges:
    - 随着公用事业单位加购协作与基准模块，ACV 从 $240K 升到 $260K。
    - 毛利率从 70% 提升到 72%。
    - 销售周期从约 9 个月压缩到 7 个月。
    - Q4Y3 账户数从 20 个升到 24 个。
