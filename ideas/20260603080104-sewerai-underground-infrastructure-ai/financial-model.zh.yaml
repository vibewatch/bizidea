slug: sewer-rehab-prioritization-os
date: '2026-06-03'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: 从 2026-06-03 的 business-plan 日期往后，取第一个完整月份作为模型起点。
- id: A2
  name: 起始付费账户数（M1）
  value: '0'
  unit: count
  source: '[BP milestones] 计划启动时还没有签下任何付费试点，所以 M1 从 0 个付费账户开始。'
- id: A3
  name: 混合年化客户价值
  value: $240.0K ARR per paying account
  unit: usdK_per_year
  source: '[BP gtm.pricing; BP market.som; research.market.sam] business plan 和 research 都把成熟 ACV 锚在 $180K–$300K 区间，而第 3 年 SOM 明确按约 $240K ACV 建模。'
- id: A4
  name: 付费试点收入处理方式
  value: $20.0K per month for roughly 5 months
  unit: usdK_per_customer_month
  source: '[BP investorMemo.firstCustomer.initialContract] BP 给出的试点价格区间是 $75K–$150K，中位数约 $100K；模型把它摊到约 5 个月的试点/校准窗口里，以便和 $240K 的年化生产价值保持一致。'
- id: A5
  name: 客户爬坡节奏
  value: 3 paying accounts by M12, 9 by Q4Y2, and 20 by Q4Y3
  unit: customers
  source: '[BP milestones; BP market.som] 这个节奏对应 BP：第 1 年 2 个付费试点，12–24 个月拿下 3–5 个生产客户，24–36 个月做到约 20 个企业账户。'
- id: A6
  name: 毛利率爬坡
  value: 45%-65% in Y1, 62%-68% in Y2, and 68%-70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP operatingAssumptions] 早期部署的上线与 QA 负担更重，之后随着导出与模板标准化，逐步收敛到 BP 设定的 70% 软件型毛利目标。'
- id: A7
  name: 月度流失率
  value: 1.0%
  unit: percent
  source: 面向高黏性、年规划周期、切换成本高的公共部门企业工作流软件的创业财务经验值，并考虑了早期产品与采购风险。
- id: A8
  name: 全负载 CAC
  value: $140.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP risks] 向大型公用事业卖单需要创始人时间、工程验证、会务差旅、采购支持和伙伴赋能，所以 CAC 明显高于中端 SaaS 常见水平。'
- id: A9
  name: 全负载薪酬带
  value: Engineering $190K; product/domain $180K; sales $170K; solutions/implementation $160K; partnerships/CS $150K; G&A $130K
  unit: usdK_per_fte_year
  source: 面向美国 seed 阶段企业软件招聘的创业财务经验值，并结合 [BP team] 和 business plan 里偏重领域知识的工作流要求。
- id: A10
  name: 人员爬坡快照
  value: Engineering 1/1/2/2/3/4; product/domain 1/1/1/1/1/1; sales 1/1/1/1/2/3; solutions/implementation 0/1/1/2/2/2; partnerships/CS 0/0/0/1/1/2; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale; BP operatingAssumptions] 模型按 BP 的招聘顺序展开：先把覆盖层和 QA/导出层做出来，等试点证明成立后，再补伙伴与规模化 GTM 覆盖。'
- id: A11
  name: seed 轮到账后的起始现金
  value: $4.0M
  unit: usdM
  source: '[BP fundingAsk] BP 的 seed 融资诉求是 $3M–$5M；模型取 $4.0M，因为这足以覆盖计划中的招聘爬坡、公共部门销售周期，并仍留出 6 个月现金缓冲。'
- id: A12
  name: 职能性运营费用预算
  value: Y1 non-salary opex of $35K-$65K per month; Y2 non-salary opex of $155K-$190K per quarter; Y3 non-salary opex of $130K-$163K per quarter
  unit: usdK
  source: 面向企业级基础设施软件公司的创业财务经验值：需要覆盖差旅、会务销售、保险、云工具、法务和数据 QA 开销，并叠加在 BP 的人员计划之上。
- id: A13
  name: 季度薪资平滑
  value: Y2 and Y3 salary lines ramp between snapshot headcount points instead of stepping only at year-end
  unit: method
  source: '[Financial Modeler instructions] Q2/Y2 和 Y3 的薪资费用在快照人员点之间做平滑，而不是只在年末跳变，这样既符合 BP 的排兵顺序，也不会掩盖招聘台阶。'
- id: A14
  name: 到 Y3 的伙伴来源赢单占比
  value: About 30% of closed-won accounts by Y3
  unit: percent_of_new_customers
  source: '[BP operatingAssumptions; BP milestones; BP gtm.channels] BP 预计工程公司会在早期证明出来后变成杠杆渠道，所以基准情形假设它们在后期贡献约三分之一新增客户。'
- id: A15
  name: 现金转换简化假设
  value: Ending cash rolls from EBITDA with no debt, tax, or capex line items
  unit: method
  source: 面向轻资产 seed 阶段软件公司的创业财务经验值：业务没有债务、税项或 capex 行，经营 burn 远大于营运资金波动。
- id: A16
  name: 下行情景调整项
  value: $220K ACV, 65% gross margin, 12-month sales cycle, and 15 accounts by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.categoryDynamics.headwinds] 下行情形反映的是：采购拖延、与现有厂商重叠，以及重服务式上线持续时间都比计划更长。'
- id: A17
  name: 上行情景调整项
  value: $260K ACV, 72% gross margin, 7-month sales cycle, and 24 accounts by Q4Y3
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones] 上行情形假设早期案例解锁伙伴分销，情景/基准高级模块抬高 ACV。'
