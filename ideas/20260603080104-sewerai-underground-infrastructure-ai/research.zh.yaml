categoryDynamics:
  growthRate: 数字化工具采用率在上升；ASCE 指出，2023 年 450+ 家公用事业单位里有 65% 已在用数字工具，但仍有 54% 认为自己的数据没有被有效利用。
  growthRateSourceRefs:
  - 3
  tailwinds:
  - point: 污水资本需求和资金缺口持续拉大，这会抬高“更聪明地分配有限修复预算”的需求。
    sourceRefs:
    - 1
    - 2
    - 3
    - 4
  - point: NASSCO 让巡检数据越来越标准化，AI 编码工作流又让它越来越机器可读。
    sourceRefs:
    - 7
    - 8
    - 12
    - 13
  - point: 大型公用事业单位已经在跑多年期减溢和同意令项目，这条规划工作流既有预算、也够紧迫。
    sourceRefs:
    - 30
    - 31
    - 33
    - 34
    - 37
    - 47
  headwinds:
  - point: 公共部门采购很慢，而且很多公用事业单位完全可以继续靠顾问或内部表格，把软件决策往后拖。
    sourceRefs:
    - 34
    - 39
    - 43
  - point: 现有平台已经占住了巡检、GIS、工单和资本管理这些相邻系统记录层。
    sourceRefs:
    - 22
    - 23
    - 24
    - 25
    - 26
  - point: 巡检 QA 差、历史数据碎片化，会把部署拖成重服务、重变更管理项目。
    sourceRefs:
    - 9
    - 15
    - 17
    - 18
competitors:
- name: SewerAI
  stage: 扩张期
  wedge: 端到端下水道巡检、AI 编码、质量保障、风险评分，以及正在延伸中的资本规划工作流。
  pricing: 定制企业版 / 联系销售
  strength: 行业专用数据集深、公用事业案例强，而且已经明显从巡检往修复规划移动。
  weaknessVsUs: 它的产品重心仍在巡检工作流；新进入者可以更明确地把自己做成“资本项目办公室优先、项目包可解释优先”的产品。
  sourceRefs:
  - 11
  - 12
  - 15
  - 16
- name: VAPAR
  stage: 扩张期
  wedge: AI 驱动的 CCTV 复核，并明确主打预算优化和资本工程优先级。
  pricing: 定制企业版 / 联系销售
  strength: 围绕最高风险资产的表达清楚，也有工程团队和地方议会案例。
  weaknessVsUs: 在美国大型同意令环境里的公开验证较少，下游资本项目包工作流的证据也更弱。
  sourceRefs:
  - 20
  - 21
- name: WinCan
  stage: 现有厂商
  wedge: 面向下水道项目的巡检、报告、协作和基础设施管理系统。
  pricing: 定制企业版 / 联系销售
  strength: 老牌巡检平台，覆盖标准深，角色适配面广。
  weaknessVsUs: 它更像巡检系统记录层，而不是一个能为排修提供预算情景的可解释引擎。
  sourceRefs:
  - 22
- name: Trimble Cityworks
  stage: 现有厂商
  wedge: 以 GIS 为中心的企业资产管理平台，覆盖巡检、风险评估、工单管理和资本项目工具。
  pricing: 定制企业版 / 联系销售
  strength: 在政府资产管理里装机强，而且明确占着下游工作流。
  weaknessVsUs: 它是跨资产的广平台，下水道排修只是一个 use case，不是产品定义工作流。
  sourceRefs:
  - 23
  - 44
- name: OpenGov Cartegraph
  stage: 现有厂商
  wedge: 面向政府的企业资产管理与资本规划平台，覆盖污水及其他公共资产。
  pricing: 定制企业版 / 联系销售
  strength: 在公共部门可信度高，覆盖 2,000+ 机构，且深嵌市政运营。
  weaknessVsUs: 跨资产的广度会稀释下水道专属的状况科学和 NASSCO 原生项目包生成能力。
  sourceRefs:
  - 24
  - 44
regulatoryTechnicalConstraints:
- point: 产品必须能吃进和导出兼容 NASSCO PACP/LACP/MACP 的数据，并符合认证工作流要求。
  sourceRefs:
  - 7
  - 9
- point: 处在同意令或 SSMP 义务下的公用事业单位，需要审计轨迹说明：用了什么数据、改了什么、为什么会得出这条建议。
  sourceRefs:
  - 12
  - 15
  - 30
  - 38
- point: 创业公司必须和 Esri、Cityworks、OpenGov 这类 GIS / EAM 系统共存，不能预设自己能很快把它们替掉。
  sourceRefs:
  - 23
  - 24
  - 26
  - 44
- point: 仅有状况分级还不够；公用事业单位需要把后果、位置和服务等级背景一起纳入，才能把巡检数据变成修复优先级。
  sourceRefs:
  - 8
  - 17
  - 42
validationSignals:
- point: 休斯敦报告称，借助 SewerAI 的工作流改造，承包商报送失败率下降 55.1%，人员扩编成本每年大约省下 $1M。
  sourceRefs:
  - 15
- point: Phoenix 已经在一个成熟的 $33M 年度修复项目里使用 AI 评估，这说明买方和预算条目本身都已经存在。
  sourceRefs:
  - 16
  - 47
- point: DELCORA 的评估尺数几乎翻倍，且单位巡检英尺成本下降 38%，说明只要软件能直接改 throughput 和经济性，公用事业单位就会为它付费。
  sourceRefs:
  - 17
- point: Macomb County 的重新评估少花了超过 $1M 的错误优先级修复支出，说明更可靠的状况智能有直接财务价值。
  sourceRefs:
  - 18
openQuestions:
- 大型公用事业单位在没有并行顾问打分流程时，究竟会多大程度让软件生成的项目包排名影响有预算的 CIP 决策？
- 哪条入口在现实里关单最快：直接卖 SaaS 给公用事业单位、走工程合作方主导工作流，还是走同意令创新预算？
- 做出可信建议所需的最小数据包到底是什么：只要 CCTV + PACP，还是必须加上 GIS、工单和后果层？
- 在降雨、土壤、地形和溢流监管不同的地区之间，优先级配方到底有多强的可迁移性？
