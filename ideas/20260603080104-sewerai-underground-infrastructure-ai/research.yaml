    sourceRefs:
    - 12
    - 23
    - 24
    - 44
  validationPlan:
  - priority: high
    question: Can the product cut time from coded inspection evidence to a board-ready rehab package by more than
      50% on one live capital cycle?
    evidenceToGather: Run a pilot against one district or quarter-section planning cycle and compare package-production
      time, consultant hours, and number of review rounds versus the legacy process.
  - priority: high
    question: 'Which buyer controls the first budget: utility capital planning, collections operations, or the engineering
      partner?'
    evidenceToGather: Interview one top-50 utility, one mid-sized consent-decree utility, and two engineering firms
      to map budget ownership and approval paths.
  - priority: medium
    question: How much of the model needs GIS, work-order history, and consequence layers beyond CCTV/NASSCO to
      produce trusted rehab bundles?
    evidenceToGather: 'Benchmark output quality on three data packages: CCTV only, CCTV plus GIS, and full CCTV/GIS/work-order
      history.'
  - priority: medium
    question: Will utilities accept software-generated package recommendations without a separate manual consultant
      scoring exercise?
    evidenceToGather: Collect reviewer comments from pilot utilities and identify what level of explanation, confidence
      scoring, and human override is required for adoption.
