competitors:
- name: SewerAI
  stage: scale-up
  wedge: End-to-end sewer inspection, AI coding, quality assurance, risk scoring, and emerging capital-planning
    workflows.
  pricing: Custom enterprise / contact sales
  strength: Deep wastewater-specific dataset, strong utility references, and visible movement from inspection into
    rehab planning.
  weaknessVsUs: Its product center of gravity is still the inspection workflow; a new entrant can be more explicitly
    capital-program-office first and package-level explainability first.
  sourceRefs:
  - 11
  - 12
  - 15
  - 16
- name: VAPAR
  stage: scale-up
  wedge: AI-powered CCTV review with explicit positioning around budget optimization and capital works prioritization.
  pricing: Custom enterprise / contact sales
  strength: Clear message around highest-risk assets and documented use by councils and engineering teams.
  weaknessVsUs: Less visible proof in large U.S. consent-decree environments and less evidence of deep downstream
    capital-package workflows.
  sourceRefs:
  - 20
  - 21
- name: WinCan
  stage: incumbent
  wedge: Inspection, reporting, collaboration, and infrastructure-management system for sewer programs.
  pricing: Custom enterprise / contact sales
  strength: Well-known inspection platform with established standards coverage and broad role-based fit.
  weaknessVsUs: Better as an inspection system of record than an explainable budget-scenario engine for rehab sequencing.
  sourceRefs:
  - 22
- name: Trimble Cityworks
  stage: incumbent
  wedge: GIS-centric enterprise asset management with inspections, risk assessment, work management, and capital-program
    tooling.
  pricing: Custom enterprise / contact sales
  strength: Strong installed base in government asset management and clear downstream workflow ownership.
  weaknessVsUs: Broad cross-asset EAM positioning means sewer rehab prioritization is a use case, not the product’s
    defining workflow.
  sourceRefs:
  - 23
  - 44
- name: OpenGov Cartegraph
  stage: incumbent
  wedge: Government enterprise asset management and capital planning across wastewater and other public assets.
  pricing: Custom enterprise / contact sales
  strength: Public-sector credibility, 2,000+ agency footprint, and integration into municipal operations.
  weaknessVsUs: Cross-asset breadth dilutes sewer-specific condition science and NASSCO-native rehab package generation.
  sourceRefs:
  - 24
  - 44
