openQuestions:
- How often will large utilities allow software-generated package rankings to shape funded CIP decisions without
  a parallel consultant scoring exercise?
- 'Which entry point closes fastest in practice: direct SaaS sale to the utility, an engineering-partner-led workflow,
  or a consent-decree innovation budget?'
- 'What is the minimum data package required for trustworthy recommendations: CCTV plus PACP only, or CCTV plus
  GIS, work orders, and consequence layers?'
- How portable are prioritization recipes across geographies with different rainfall patterns, soils, topography,
  and overflow regulations?
