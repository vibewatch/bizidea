problem: 大型污水公用事业单位已经积累了海量 CCTV 和 NASSCO 巡检数据，但还是很难把这些证据整理成一份既经得起审计、又能拿到预算的优先修复清单。资本规划团队要在表格、GIS 图层、顾问备忘录、同意令节点和彼此口径不一致的资产管理系统之间来回切换，风险、成本和准备度常常对不上，结果最糟糕的资产修得不够快，采购启动也总是偏晚。最后就是本可避免的溢流、错过的合规节点，以及说不清为什么这个项目该排在另一个项目之前的资本计划。
targetUser:
  primary: 美国大型下水道公用事业单位里，负责污水收集与资本规划的副总监；他们要管理覆盖数百英里管网的更新积压。
  secondary: 工程公司里负责为市政污水公用事业客户做修复规划和交付的项目经理。
  buyer: 大型市政公用事业单位的污水助理总监，或收集系统资本规划负责人。
startupThesis:
  nonObviousInsight: 地下基础设施真正卡住的，已经不是怎么收集缺陷证据，而是怎么把这些证据足够快地包装成站得住脚的资本决策，让监管方、董事会和采购团队都能动起来。变化在于：巡检数据已经大规模、机器可读，而资产状况恶化得越来越快，公用事业单位需要的是一层排修操作系统，而不是再来一个巡检查看器。
  beachhead: 首个滩头市场应是美国市政污水公用事业单位：管网长度超过 500 英里、每年都做 NASSCO 调查，而且有正在执行的 EPA 同意令或减溢资本计划，每个预算周期都得给修复包排优先级。
  wedge: 先做一层修复优先级引擎，吃进巡检输出、GIS 背景、历史维修记录和资本约束，然后给出带可解释评分、预算情景和可直接招标修复范围的管段组合建议。
  whyNowCatalyst: SewerAI 的融资和产品扩张说明，市场已经从 AI 辅助巡检走向修复规划；而 NLC 数据又同时表明，公用事业资产状况正以多年来最快的速度恶化。
  ventureScalePath: 先拿下大型公用事业单位的下水道修复优先级场景，再扩到雨水管网和输水主管更新，最后变成地下基础设施项目、工程合作方和绩效承包商共用的跨资产资本规划系统。
solution: 这个产品夹在巡检系统和资本项目办公室之间。它把缺陷代码、历史工单、GIS 图层、溢流热点和预算规则拉进同一张决策图谱里，再按区域、管型、风险画像和预算边界，吐出杠杆效应最高的修复包。每条建议都给出可解释排序，还配情景工具：项目如果延后，会漏掉什么；一旦资金到位，又能提前推进什么。工程合作方拿到批准后的组合，不用再在表格和顾问 PPT 里重做一遍分析，就能直接生成带范围的修复包。第一次部署也可以先覆盖在导出的巡检和资产数据之上，公用事业单位不必替换现有资产管理或 CCTV 工作流。
goToMarketSeed:
  firstCustomer: 首个客户应该是美国前 50 大污水公用事业单位之一：拥有 500–5,000 英里污水管网，存在年度 CCTV/NASSCO 巡检积压，并且要在 12 个月内更新同意令或减溢资本计划。
  buyingTrigger: 新的巡检周期、溢流事故、同意令节点或债券规划流程，会逼着公用事业单位说明到底哪些修复项目该先上、为什么。
  currentAlternative: 现有替代方案包括 NASSCO 评分工具、GIS 和 EAM 导出、表格优先级模型、工程顾问，以及人工资本规划研讨。
  switchingReason: 这个切口能把原本按月算的优先级输出压到按周交付，而且结果既可解释又能直接拿去走采购，同时又不需要替换现有巡检和资产系统，从而减少对顾问的依赖。
  pricingHypothesis: 按纳管英里数和资本规划模块收费的年度订阅，再叠加数据映射和情景校准的付费上线服务。
