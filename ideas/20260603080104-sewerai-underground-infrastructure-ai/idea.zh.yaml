jobsToBeDone:
- job: 当年度巡检周期暴露出的劣化管段，已经多到我们根本没法全部出资修时，帮资本规划团队先把该做的修复项目排出来、打包好，这样我们才能把方案讲清楚给监管方、董事会和缴费人。
  currentAlternative: 顾问研究、表格打分模型，以及 GIS、CCTV 和资产团队之间的人工研讨。
  successMetric: 发布一份站得住脚的资本优先级清单所需天数，以及获批项目按计划交付的比例。
- job: 当同意令节点或溢流事件把紧迫度一下子拉高时，帮我们的工程合作方尽快把最高风险的管段变成可采购的工作范围，让修复能在下一轮故障来临前启动。
  currentAlternative: 在顾问备忘录、PDF 和工程范围表里把分析重做一遍。
  successMetric: 从巡检证据到可招标修复包的时间，以及应急维修相对计划维修的下降幅度。
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这个机会同时具备独立状况证据、点名客户、工作流上移和成长资金，对基础设施软件切口来说，这样的验证强度并不多见。
  painIntensity:
    score: 5
    rationale: 下水道修复优先级直接影响合规、公共健康、溢流风险，以及数百万美元级的资本配置。
  wedgeClarity:
    score: 5
    rationale: 大型污水公用事业单位的排修排序是个非常具体的工作流：买方清楚、触发点明确、把规划时间缩短所带来的 ROI 也可量化。
  defensibility:
    score: 4
    rationale: 可解释的优先级模型加上一轮轮资本周期沉淀的数据，有机会形成很黏的规划逻辑，不过现有厂商和顾问仍是可信对手。
  ventureScale:
    score: 5
    rationale: 这个滩头市场可以从下水道公用事业单位一路扩到相邻地下资产、工程渠道，以及整个基础设施资本规划。
topRisks:
- name: 公共部门销售拖慢
  description: 公用事业采购周期可能很长，哪怕痛点已经摆在眼前，预算时点也可能把软件采用往后拖。
  mitigation: 先从一个区域、一个同意令节点，或一个由工程合作方主导的试点切入，先把规划提速证明出来，再谈全企业推广。
- name: 黑箱质疑
  description: 如果建议结果无法审计，资本规划团队和监管方可能不会买账，尤其当排序会影响公共支出和合规时。
  mitigation: 每条建议都要能追溯到源缺陷、预算假设和人工审批节点，不给不透明模型输出留黑箱空间。
- name: 实施过于重服务
  description: 凌乱的巡检历史和割裂的 GIS 或 EAM 配置，可能把首批部署拖成定制化咨询项目。
  mitigation: 先用导出数据、标准 NASSCO 输入和狭窄的优先级工作流起步，之后再往更深的集成和更广的资产类别扩。
