scenarios:
  downside:
    description: 数据准备度筛查比预期更严苛，渠道助力来得更晚，公司需要比计划投入更多的人工实施支持。
    y3RevenueK: 2407.8
    y3EbitdaK: -630.8
    cashLowPointK: 54.6
    keyAssumptionChanges:
    - Q4Y3 活跃付费账户只到 15 个而不是 20 个，因为数据审计和审批把销售周期拉长到 7 到 8 个月。
    - 稳态 ARPU 停留在约 18 万美元附近，因为扩展到 50 栋在用楼宇或加装报告模块的账户变少了。
    - 毛利率退出时接近 69%，因为验证和实施环节比计划中更偏服务化。
  base:
    description: 基准情景沿着商业计划的路径走：第一年三个付费试点，Q4Y2 达到种子轮就绪的十账户基础，Q4Y3 达到研究测算的 20 客户 SOM。
    y3RevenueK: 2994.6
    y3EbitdaK: 1.7
    cashLowPointK: 671.7
    keyAssumptionChanges:
    - 活跃付费账户从 M12 的 3 个，增长到 Q4Y2 的 10 个、Q4Y3 的 20 个，与商业计划里程碑和研究测算的 SOM 一致。
    - 随着每个账户平均在用楼宇数逼近 50 栋并加装少量验证报告，稳态 ARPU 达到每账户约 19 万美元。
    - 随着可复用连接器减少人工搭建和支持负担，毛利率从第一年的约 48% 提升到第三年的约 72%。
  upside:
    description: 共创客户的验证成果和渠道推荐把成交往前拉，同时上线体验保持足够像软件产品，能支撑更快扩张而不需要扩大交付团队。
    y3RevenueK: 4049.4
    y3EbitdaK: 813.0
    cashLowPointK: 1329.5
    keyAssumptionChanges:
    - Q4Y3 活跃付费账户达到 23 个而不是 20 个，因为参考案例试点和两个渠道合作方加快了新账户的启动速度。
    - 稳态 ARPU 达到约 20.4 万美元，因为更多账户扩展到超过 50 栋在用楼宇，并更早加装续保报告模块。
    - 毛利率退出时接近 74%，因为上线时间保持在 30 天以内，分析师复核负担的下降速度也快于计划。
sensitivity:
- variable: ARPU
  downsideCase: 平均账户稳定在约 45 栋在用楼宇、约 18 万美元 ARR。
  baseCase: 平均账户达到约 50 栋在用楼宇、约 19 万美元 ARR。
  upsideCase: 平均账户达到约 55 栋在用楼宇、约 20.5 万美元 ARR。
  y3RevenueImpactK: -310.0
  cashImpactK: -280.0
- variable: CAC
  downsideCase: 因为保险公司和经纪商的推荐渠道疲软，CAC 升到约 14 万美元。
  baseCase: 靠创始人主导的对外拓展加两个渠道合作方，CAC 约 11 万美元。
  upsideCase: 一旦推荐渠道能带来三分之一的合格试点，CAC 降到约 9 万美元。
  y3RevenueImpactK: -80.0
  cashImpactK: -260.0
- variable: churn
  downsideCase: 因为试点没能顺利扩张，月度流失率升到 2.5%。
  baseCase: 月度流失率保持在约 1.5% 附近。
  upsideCase: 续保准备度报告嵌入工作流后，月度流失率改善到 1.0%。
  y3RevenueImpactK: -210.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: 因为数据审计和采购委员会拖慢审批，中位销售周期拉长到 7 到 8 个月。
  baseCase: 从合格评审到付费试点的中位周期约 5 到 6 个月。
  upsideCase: 共创客户验证和渠道信任建立起来后，中位周期压缩到 4 到 5 个月。
  y3RevenueImpactK: -370.0
  cashImpactK: -400.0
- variable: gross margin
  downsideCase: 退出毛利率只能到约 69%。
  baseCase: 第三年毛利率均值约 72%，退出时接近 73%。
  upsideCase: 退出毛利率达到约 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -220.0
- variable: hiring pace
  downsideCase: 需要比计划提前一年招到第三名实施人员和一名额外的 GTM 人员。
  baseCase: 招聘按里程碑节奏推进，实施团队在整个第三年维持两个 FTE。
  upsideCase: 一个非客户对接岗位的招聘推迟到种子轮之后再进行。
  y3RevenueImpactK: -60.0
  cashImpactK: -190.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Qualified portfolio reviews] --> Pilots[Paid 90-day pilots]
      Pilots --> Production[Annual production accounts]
      Production --> Expansion[More buildings per managing agent]
      Expansion --> Revenue[Subscription and verification revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入靠 Q4Y3 时 20 个付费物业管理机构账户驱动，每个账户逐步扩展到约 50 栋在用楼宇、约 19 万美元的稳态 ARR。
- checkName: 必须跑对的环节
  finding: 首批连接器必须让上线足够可复用，两个实施 FTE 加一位水务运营负责人才能支撑账户爬坡，同时不破坏 70% 的毛利率目标。
- checkName: 模型会在什么情况下失效
  finding: 如果数据准备度审计拉长销售周期、毛利率停滞在约 69% 以下，下行情景会把现金推到接近零，撑不到下一轮融资。
- checkName: 下一轮融资的证明标准
  finding: 种子轮叙事是到 Q4Y2 时拿下十个付费账户、约 450 栋在用楼宇、68% 以上毛利率，以及可作为参考案例的验证节水报告。
sanityChecks:
  ruleOf40: 第三年增长率 153% + EBITDA 利润率 0% = 153%
  burnMultiple: 第二年 burn multiple 约 0.6 倍（从 Q4Y1 到 Q4Y2，84.66 万美元的现金消耗对应约 135 万美元的净新增 ARR）。
  revenuePerFte: 第三年用 300 万美元收入除以 10 个 Q4Y3 期末 FTE，得到每 FTE 30 万美元（对标 SaaS 基准的 20 万到 40 万美元）。
  flags:
  - 模型假设了一个 AMR 数据充分的严格 ICP；如果符合装表条件的目标资产组合太少，客户爬坡和 CAC 都会迅速恶化。
  - 整个第三年只预算了两个专职实施 FTE，所以这份计划依赖连接器复用和 30 天上线，而不是定制化的部署工作。
  - 第三年也只是勉强接近盈亏平衡，如果人工分析师复核验证的负担持续偏重，很可能需要放慢增长或再融一轮。
