slug: occupancy-water-fix-os
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] 模型从商业计划日期之后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / 种子前轮融资
  value: $2.5M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2.5-3.5M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景采用所述区间的下限，因为招聘保持克制，公司到达种子轮里程碑时账上仍留有超过 6 个月的现金。'
- id: A3
  name: 起始付费账户数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先卖出付费试点。'
- id: A4
  name: 客户定义
  value: 一个处于试点或正式生产合同状态下的付费物业管理机构账户
  unit: definition
  source: '[BP market.som + BP investorMemo.firstCustomer + BP gtm.pricing] customersEop 统计的是付费的物业管理机构账户数量，不是单栋楼宇数量。'
- id: A5
  name: 转化漏斗基准
  value: 合格评审到付费试点约 20%，试点到正式上线约 55%，35% 的正式上线账户会在 12 个月内扩大楼宇数量或新增第二个资产组合
  unit: conversion
  source: '[BP gtm.funnelTargets] 模型取所述试点和扩张转化目标的中位数。'
- id: A6
  name: 付费试点经济模型
  value: 90 天总价 4.8 万美元（约每月 1.6 万美元），对应一个覆盖 20 到 40 栋楼的资产组合
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract 覆盖 20 到 40 栋楼的 2.5 万到 5 万英镑付费试点 + BP gtm.wedge] 模型取试点价格区间的中位数，并按 BP/研究隐含的英镑兑美元汇率换算。'
- id: A7
  name: 稳态正式生产 ARPU
  value: 每个账户约 50 栋在用楼宇时，年化 ARR 约 19 万美元
  unit: USD/account/year
  source: '[Research market.som 20 家物业管理机构客户 × 每家 50 栋在用楼宇 = 380 万美元 + Research bottomUpSizingDrivers 每建筑等价单元年支出 3000 英镑] 稳态 ARPU 按研究里的 SOM 算法设定。'
- id: A8
  name: 客户爬坡
  value: 到 M12 时 3 个活跃付费账户，Q4Y2 时 10 个，Q4Y3 时 20 个
  unit: customersEop
  source: '[BP milestones 0-12、12-24、24-36 months + Research market.som] 基准情景对应第一年三个试点、Q4Y2 达到种子轮就绪的十账户基础，以及研究里第三年的 SOM 目标。'
- id: A9
  name: 收入确认惯例
  value: 活跃付费账户数乘以混合已确认收入，试点期和早期生产阶段约每月 1.5 万美元，随着账户逼近 50 栋在用楼宇并附带少量验证报告收入，到 Y3 后期升至每月 1.64 万美元
  unit: formula
  source: '[BP businessModel.revenueStreams + BP gtm.pricing + Research market.som] 这让收入直接挂钩账户数量和按楼计价的定价逻辑。'
- id: A10
  name: 基准销售周期
  value: 从合格组合评审到付费试点启动约 5 到 6 个月，随后是 90 天的试点期
  unit: months
  source: '[BP buyingProcess + BP gtm.wedge + BP gtm.funnelTargets + startup-finance heuristic] 这个周期假设了真实的痛点触发事件，但仍需要数据审计和多方相关人批准。'
- id: A11
  name: 毛利率爬坡
  value: 第一年约 48%，第二年约 63%，第三年约 72%，Q4Y3 退出时约 73%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations 人工分析师持续复核 + Research adoptionFrictionMatrix] 毛利率起步阶段偏服务化，只有在连接器复用和可重复部署打法成型之后才会正常化。'
- id: A12
  name: 招聘时间线
  value: M1 创始人 CEO、工程师和水务运营负责人；M4 解决方案工程师；M9 合作拓展负责人；M13 工程师 2 号；M16 实施分析师；M18 财务运营；M22 客户经理；M25 工程师 3 号
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale + startup-finance heuristic] 团队只在共创客户证明产品有效之后才增加交付和 GTM 人力，并在种子轮里程碑之前把组织规模控制在十人以下。'
- id: A13
  name: 创始人 CEO 全成本薪酬
  value: $150.0K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] 精简的创始人现金薪酬，含薪资税和福利负担。'
- id: A14
  name: 工程全成本薪酬
  value: 每 FTE $180.0K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 需要资深的集成和数据平台人才，但薪酬水平仍低于大型科技公司标准。'
- id: A15
  name: 水务运营 / 产品全成本薪酬
  value: $145.0K
  unit: USD/year
  source: '[BP team Water operations lead + startup-finance heuristic] 这个角色融合了领域运营知识、客户工作流设计和产品反馈。'
- id: A16
  name: 解决方案 / 实施全成本薪酬
  value: 每 FTE $150.0K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] 假设招到技术能力强的上线和集成人才，且不带企业咨询式的高额开销。'
- id: A17
  name: 合作拓展 / 销售全成本薪酬
  value: 每 FTE $170.0K
  unit: USD/year
  source: '[BP team Partnerships lead + startup-finance heuristic] 包含浮动薪酬和创始人协同的企业销售出差费用。'
- id: A18
  name: 综合管理 / 财务运营全成本薪酬
  value: $110.0K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 覆盖精简的财务、供应商和合规运营工作。'
- id: A19
  name: 人力成本在利润表科目间的分摊
  value: 创始人 45% 销售与市场 / 15% 研发 / 40% 综合管理；工程 100% 研发；水务运营 15% 销售与市场 / 75% 研发 / 10% 综合管理；解决方案 40% 销售与市场 / 60% 研发；合作拓展与销售 100% 销售与市场；财务运营 100% 综合管理
  unit: allocation
  source: '[BP team role rationales + BP operations] 这把人力成本映射进对应的职能科目，同时让创始人主导的 GTM 和实施工作保持可见。'
- id: A20
  name: 非人力运营支出爬坡
  value: 36 个月内销售与市场费用约每月 5500 到 22000 美元，研发约每月 7500 到 17500 美元，综合管理约每月 5500 到 13000 美元
  unit: USD/month
  source: '[BP operations + BP gtm.channels + BP experimentRoadmap + startup-finance heuristic] 覆盖云服务、出差、保险、法务和轻量合规支出，未假设大规模付费营销投放。'
- id: A21
  name: 实施生产力假设
  value: 模型让实施团队在整个第三年都维持在两个 FTE，因为可复用的水表、入住率和设施管理连接器应该能把首批技术栈组合的上线时间压到 30 天以内
  unit: capacity assumption
  source: '[BP experimentRoadmap 首次每周评审的中位时间低于 30 天 + BP businessModel.targetGrossMarginPct 70 + startup-finance heuristic] 这是精简人力计划背后最关键的运营效率假设。'
- id: A22
  name: 月度流失率
  value: 1.5%
  unit: percent/month
  source: '[startup-finance heuristic for sticky but still-early enterprise workflow SaaS + BP expansionLevers] 产品一旦嵌入设施管理工作流应该会有较强粘性，但早期账户风险依然真实存在。'
- id: A23
  name: CAC 口径
  value: 每个正式生产账户 $110K
  unit: USD/account
  source: '[model calc：Y1-Y2 销售与市场支出约 84.87 万美元，除以 Q4Y2 时约八个正式生产账户 + BP gtm.funnelTargets] 模型向上取整以保持保守。'
- id: A24
  name: 下一轮融资的里程碑口径
  value: 到 Q4Y2 时 10 个活跃付费账户、约 450 栋在用楼宇、68% 以上毛利率、两个渠道合作方，以及多份验证节水案例
  unit: milestone
  source: '[BP milestones 12-24 months + BP experimentRoadmap + BP fundingAsk.useOfFundsSummary] 这是种子前轮资金必须支撑到的、种子轮就绪的证明包。'
- id: A25
  name: 季度薪资口径
  value: 第二年和第三年的薪资行，按每个季度内实际逐月的招聘情况汇总，而不是只取季末快照
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] 这让薪资行与逐月的招聘爬坡保持一致。'
