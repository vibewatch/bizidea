slug: occupancy-water-fix-os
date: "2026-07-10"
executiveSummary: >-
  这家公司应该定位成英国多租户写字楼和综合用途资产组合里隐藏水损耗的物业管理机构行动层，不该做成又一个传感器厂商或通用 ESG 仪表盘。滩头市场是伦敦和东南部的物业管理机构，管理着 20 到 100 栋水费由业主支付、有 AMR 或分表覆盖、设施管理外包、并在未来 12 个月内面临保险续保或用水削减指标的老旧楼宇。MVP 应该接入现有的水表、入住率和 BMS 数据，按可能的成本和损坏风险给异常排序，开出可派工的工单，并在每周组合评审里验证修后节水效果。GTM 应该围绕一个真实的购买触发事件，卖一份覆盖 20 到 40 栋楼的付费试点，因为一个运营方就能在几十个站点上证明 ROI，比逐栋安装快得多。研究支撑了这套痛点和 ROI 框架：渗漏损失金额可观，买家已经在为漏水防范系统付费，WEL1 也验证了入住率关联的组合级试点这条路。最强的优势不是报警本身，而是那份把异常类型、入住率背景、派工供应商和验证节水量连在一起、覆盖整个受管组合的数据集。最大的证伪风险是数据准备度和归因问题——目标楼宇里可能没有足够多具备干净数据源，而如果修后证据噪音太大，买家也可能拒绝节水说辞。因此公司应该先排好 AMR 数据充分的共创客户、人工分析师复核验证和直接向物业管理机构销售这几步，再去押注保险公司分销或更广泛的地产垂直领域。
problem:
  - 商业房东和物业管理机构通常要等到月度账单飙升、租户投诉或渗漏损坏事件发生之后才发现水损耗，而不是在浪费开始的那一刻。
  - 现有的 BMS 报警、水表仪表盘和水管工上门服务，分不清真实入住和浪费，团队因此要么忽视异常，要么过度派工。
  - 维修和节水全靠人工记录，运营负责人很难据此守住预算、证明 ROI，也难以影响保险公司和业主的续保谈判。
solution:
  - 接入现有的 AMR、分表、入住率和 BMS 信号，为每栋楼宇和每个区域建一条经入住率校正的基线，而不是靠原始阈值报警。
  - 按可能的水损成本和损坏风险给异常排序，再把一份简短的可派工工单清单，推进设施团队每周的工作节奏里。
  - 对照基线验证修前修后用水量，让业主、COO 和风险团队看清哪些维修真正减少了浪费，哪些供应商动作没有效果。
whyWeWin:
  - 产品卖的是一套可派工的运营工作流，不是又一个被动仪表盘，这正对上了买家想要优先维修清单和每周设施行动的真实需求。
  - 一份把异常模式、入住率背景、派工工种和验证过的修后结果连起来的跨楼宇数据集，能不断滚雪球，比硬件主导的竞争对手天然收集到的数据更有复合价值，更利于优先级排序和供应商基准评估。
  - 公司可以作为现有计量和设施管理系统之上的叠加层落地，这比要求英国物业管理机构替换基础设施或先买一整套硬件更容易让人信服。
strategicChoices:
  beachhead: >-
    伦敦和英国东南部的物业管理机构，管理着 30 到 80 栋 2010 年前建成的多租户写字楼和综合用途楼宇，水费由业主支付，有 AMR 或分表覆盖，设施管理外包，并在未来 12 个月内面临保险续保或用水削减指标。
  wedgeRationale: >-
    这个切口比更宽泛的地产销售或硬件销售更快出成果，因为一个买家就掌控着几十个站点，本来就在承受业主付费浪费的成本，还能在一个季度内比较不同楼宇之间的工单质量和验证节水量。老旧的写字楼和综合用途存量也把通用监测工具留给设施团队自己处理的协调痛点，集中体现了出来。
  sequencingRationale: >-
    先从 AMR 数据充分的资产组合、每周人工复核的分类处理，以及直接向物业管理机构销售入手，因为数据可信度和维修归因才是真正的限制因素。只有等试点证明了可部署的集成能力、值得派工的异常比例，以及修后节水效果之后，公司才应该加上保险公司或经纪商渠道、基于效果的定价，以及邻近资产类别。
  notYet:
    - 住宅和多户住宅漏水防范——那里的理赔经济性很有吸引力，但工作流、单元级权限和现有产品都和写字楼滩头市场不同。
    - 专有传感器硬件、自动关阀设备和大型改造项目——这些会拖慢证明速度，还会稀释软件毛利率目标。
    - 零售、酒店、医疗和物流资产组合——要等写字楼和综合用途模板做到可重复部署和转化之后才考虑。
market:
  tam: 估算约 3.287 亿美元的年化 ARR，来自英格兰和威尔士约 430100 个写字楼计税单元，假设 20% 的滩头适配率、每建筑等价单元年支出约 3000 英镑。
  sam: 估算约 7630 万美元的年化 ARR，来自伦敦和东南部的写字楼存量，假设 20% 的滩头适配率、60% 已装表或可改造份额、每建筑等价单元年支出约 3000 英镑。
  som: 估算第三年 ARR 约 380 万美元，来自 20 家物业管理机构客户，平均每家约 50 栋在用楼宇。
  segments:
    - 管理着 20 到 100 栋多租户写字楼和综合用途楼宇的英国物业管理机构，水费由业主支付，设施管理外包。
    - 想要验证过的水损防范证据和续保凭据的商业物业业主和风险团队，前提是物业管理机构这条工作流已经跑通。
  buyingProcess: >-
    发现过程往往始于一次水费账单飙升、渗漏理赔、保险公司的工程评估，或董事会用水目标，暴露出月度账单核查和人工派工的局限。物业运营总监通常发起试点，而 COO、资产管理、风险和设施管理相关方，会等数据准备度和修复证明报告可信之后再批准正式上线。
product:
  mvp: >-
    MVP 接入现有的 AMR 或分表数据源，加上可用的入住率、排班或 BMS 信号，学习出一条经入住率校正的基线，给可能的浪费事件排序，再把可派工的工单推进每周设施评审。它有意不卖专有传感器、自动关阀硬件和保险公司原生的承保产品，直到这套行动闭环和节水验证得到信任为止。
  sixMonth: 运行 3 到 5 个共创客户资产组合，配合人工分析师复核异常、可派工工单，以及每个组合覆盖 20 到 40 栋楼的修前修后节水报告。
  twelveMonth: 为首批水表、入住率和 CMMS 技术栈添加可复用的连接器，对异常类别和供应商结果做基准评估，支持正式上线，并促成首批经纪商或保险公司支持的试点。
  twentyFourMonth: 从写字楼和综合用途资产组合扩展到一个邻近的商业资产类别，加上续保准备度和供应商基准报告，并在验证节水数据足够扎实之后引入基于效果的定价选项。
  keyBets:
    - 足够多的目标资产组合已经具备够用的水表和入住率数据，能支撑一次软件优先的试点，不需要先做硬件项目。
    - 入住率归一化能去掉足够多的噪音，让每周评审只需要聚焦一份简短的、值得派工的异常清单。
    - 买家会在被要求上完整保险工作流或自动关阀产品之前，先为验证过的维修和续保证据付费。
    - 供应商和故障模式基准会在早期资产组合上快速改善，足以形成通用漏水报警竞争对手比不了的真实数据优势。
gtm:
  wedge: 卖一份 90 天、覆盖 20 到 40 栋楼的付费组合试点，把一次真实的痛点事件，转成每周的维修工单和验证过的节水证据。
  channels:
    - 创始人主导的对外拓展，直接联系英国物业管理机构里承担业主付费用水风险的物业运营负责人、COO 和资产经理。
    - 经纪商、保险公司和风险工程支持的试点——等直接试点先证明了节水和理赔规避的报告闭环之后再启动。
    - 与分表、BMS、入住率、水务零售商和设施管理服务商的合作——这些伙伴本身就能接触到数据准备充分的资产组合。
  funnelTargets: "合格组合评审到付费试点转化率 15%-25%，付费试点到正式上线转化率 50% 以上，35% 以上的正式上线物业管理机构会在 12 个月内扩展第二个组合或增加 25% 以上的楼宇数量。"
  pricing: >-
    先卖一份覆盖 20 到 40 栋楼的付费准备度加试点套餐，再转成按在用楼宇数量和数据源复杂度定价的年度软件订阅，附带上线费和一个可选的节水验证或分成模块。这套定价对应的是掌握业主付费用水支出和理赔风险的买家，同时保证年度成本低于一次严重渗漏事件可能造成的浪费或损坏支出。
businessModel:
  revenueStreams:
    - 按在用楼宇数量或组合档位定价的年度订阅，覆盖更丰富入住率和工作流数据的客户对应更高档位。
    - 面向水表、BMS、入住率和设施管理系统的一次性数据准备、上线和连接器搭建费。
    - 一旦证据站得住脚，向业主、经纪商或保险公司收取的节水验证、基准报告和可选分成模块费用。
  unitOfValue: 一栋接入了用水数据、并跑着一套异常到维修工作流的在用楼宇。
  targetGrossMarginPct: 70
  expansionLevers:
    - 从一个物业管理机构的一个资产组合，扩展到同一运营方名下所有楼宇和地区。
    - 只有部署模板可复制之后，才从写字楼和综合用途扩展到邻近的商业资产类别。
    - 加上复用同一工作流里验证过的维修和基准数据的业主、经纪商、保险公司报告产品。
    - 一旦验证节水数据足够扎实，引入供应商表现基准和基于效果的定价。
strategyMap:
  northStarMetric: 每栋在用楼宇年化验证节水金额。
  inputMetrics:
    - 合格组合评审到付费试点的转化率。
    - 从获得数据接入权限到首次每周异常评审所经历的天数中位数。
    - 优先异常在 7 天内被分配给承包商或设施负责人的比例。
    - 已派工的工单在 60 天内出现验证过的修后减少效果的比例。
    - 试点到正式上线的转化率，以及每个物业管理机构账户内的楼宇扩展数量。
  moatsToBuild:
    - 把异常类型、入住率背景、派工工种、结案记录和修后差值按资产类型连起来的跨楼宇数据集。
    - 能在综合用途楼宇里把入住率波动和常规行为跟真实浪费区分开来的基线和验证模型。
    - 显示哪些供应商、故障模式和响应时间真正减少了损耗的续保准备度基准报告。
  killCriteria:
    - 首批 15 个合格物业管理机构目标里，能在 45 天内提供每日用水数据和可用入住率代理指标的不到 8 个。
    - 在前 3 个共创客户试点里，转化为有明确结案证据的可派工工单的优先异常，不到 25%。
    - 已派工的优先工单里，在 60 天内对照经入住率校正的基线，出现可测量修后减少效果的不到 50%。
    - 首批 4 个付费试点里，转化为年度合同、且合同价值超过 6 万英镑等值 ARR 的不到 2 个，或每个新账户的部署仍需超过 80 小时的定制工程时间。
  mermaid: |
    flowchart LR
      Wedge[物业管理机构用水损耗切口] --> MVP[入住率归一化行动层]
      MVP --> Proof[验证过的维修与组合 ROI]
      Proof --> Expansion[业主与保险公司扩展]
investorMemo:
  verdict:
    call: "观察"
    conviction: 痛点明确、首批买家清晰，但在数据准备度和验证过的修后节水效果证明优于现有厂商和内部替代方案之前，信心只能维持在中等水平。
    whyBelieve: 物业管理机构本来就掌握着工作流和预算压力，而这款产品能把被动监测变成一套可派工的运营闭环，既能省水费，也能支持理赔规避。
    whyDoubt: Quensus 和邻近厂商已经覆盖了漏水防范，创业公司必须证明自己能提供明显更干净的派工决策和比另一个仪表盘或传感器方案更可信的证据。
    nextDiligence: 拿下 3 个 AMR 数据充分的共创客户，在一个完整续保周期里测量值得派工的异常和验证节水效果，看看有没有至少一家经纪商或保险公司会用上这份报告。
  firstCustomer:
    title: 英国物业管理机构的物业运营总监
    profile: 一家伦敦或东南部的物业管理机构，管理着 30 到 80 栋 2010 年前建成的写字楼和综合用途楼宇，水费由业主支付，设施管理外包，大多数站点有 AMR 或分表覆盖。
    trigger: 一次渗漏理赔、突发的水费飙升、保险公司的工程评估，或董事会效率目标，逼着运营方证明可避免的水损耗正被发现并修复。
    buyer: 物业运营总监或 COO
    initialContract: >-
      覆盖 20 到 40 栋楼、90 天期限的付费试点，价格 2.5 万到 5 万英镑，等每周设施评审显示优先工单结案且修后有可测量的减少效果后，转成约 6 万到 12 万英镑的年度软件费，外加上线费和可选的验证费。
  mustBeTrue:
    - 至少一半符合条件的物业管理机构目标，已经有 AMR 或分表数据，加上足够的入住率或排班背景信息，不需要硬件项目就能启动试点。
    - 入住率归一化评分能去掉足够的噪音，让试点资产组合里至少 25% 的优先异常值得派工处理。
    - 已派工的优先工单里，至少 50% 能在 60 天内对照基线产生可验证的用水减少效果。
    - 首批 4 个付费试点里，至少 2 个能转化为超过 6 万英镑等值 ARR 的正式合同，且实施工作量不超过第一年合同价值的 25%。
    - 经纪商或保险公司相关方，在首批 5 次续保或风险工程对话里，至少有 1 次明确用到验证过的维修报告，否则保险公司这条渠道就算不上真正的护城河。
  diligenceQuestions:
    - 目前有多大比例的目标物业管理机构资产组合，能提供每日用水数据和足够的入住率或排班背景信息？
    - 归一化之后，每栋楼每月还剩多少高价值异常，其中又有多少真正值得出车维修？
    - 现在这笔预算最常被谁抢走：Quensus、Wint、某个分表厂商，还是内部设施管理流程？
    - 业主、COO 和风险团队会接受什么样的证明标准来认定修后节水归因？
    - 拿到验证过的维修报告后，经纪商或保险公司会真的改变续保谈判，还是只停留在推荐良好做法层面？
operatingAssumptions:
  - assumption: 足够多的第一批滩头资产组合已经有 AMR 或分表数据，加上可用的入住率或排班背景信息，不需要硬件项目就能启动。
    basis: research.yaml
    validationTest: 审计 15 个目标资产组合，确认其中至少 8 个能在 45 天内提供每日用水数据和可用的入住率代理指标。
    decisionImpact: 如果不成立，就进一步收窄 ICP，或先卖一套准备度和改造工作流，而不是急着扩大软件端的 GTM。
  - assumption: 每周异常评审和可派工工单，能契合物业管理机构和外包设施团队现有的工作方式。
    basis: idea.yaml
    validationTest: 跑 3 个真实的每周评审周期，证明至少 80% 的优先异常能拿到指定负责人和下一步动作，且不需要引入全新的现场工作流。
    decisionImpact: 如果不成立，就更深地嵌入现有的 CMMS 或 BMS 工具，少提“替代现有工作流”这类说法。
  - assumption: 经入住率校正的基线，足够在嘈杂的综合用途楼宇里归因修后节水效果。
    basis: research.yaml
    validationTest: 对比前 25 个已结案工单的修前修后用水量，证明其中至少 50% 能在 60 天内对照基线产生统计上明确的减少效果。
    decisionImpact: 如果不成立，就放弃分成和保险报告方面的承诺，把定位改成分类处理速度，而不是验证过的 ROI。
  - assumption: 只要产品能防止浪费并支持续保谈判，买家会接受每栋在用楼宇每年 2000 到 3000 英镑左右的定价。
    basis: idea.yaml
    validationTest: 向 10 个合格买家展示目标定价，拿到至少 3 个落在该价位区间内的付费试点或意向书。
    decisionImpact: 如果不成立，就改成按资产组合收取固定费用，或在扩充销售团队之前先缩减实施范围。
  - assumption: 保险公司、经纪商和水务零售商渠道，只有在直接向物业管理机构销售的 ROI 得到证明之后，才能真正降低 CAC。
    basis: research.yaml
    validationTest: 拿下 2 个渠道合作方，证明到第 12 个月时，至少有 2 个受合作方影响的试点比创始人主导的对外拓展更快成交。
    decisionImpact: 如果不成立，就继续走直销，把面向保险公司的产品和相关招聘计划往后推。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 访谈目标物业管理机构里的 20 位物业运营、设施管理和风险负责人，收集楼宇数量、水表准备度、续保时间点和当前响应工作流的数据。
    hypothesis: 这个滩头市场有可重复的触发模式，数据准备度也足以支撑一次聚焦的对外拓展行动。
    successMetric: 拿到 10 个合格 ICP 账户、5 个活跃的试点洽谈，以及一份按常见程度排序的三大数据栈组合清单。
    owner: 创始人/CEO
  - horizon: 0-90 天
    experiment: 回测 3 个候选资产组合 90 天的用水和入住率数据，量化归一化后还剩多少异常，其中又有多少能对应到已知的设施管理动作。
    hypothesis: 入住率背景能去掉足够的噪音，让每周评审只需要聚焦真正值得派工的异常。
    successMetric: 至少 25% 的优先异常能对应到合理的维修动作，误报率相比纯水表报警有所下降。
    owner: 创始工程师和水务运营负责人
  - horizon: 0-90 天
    experiment: 与一个共创客户一起跑一套真实的每周异常评审工作流，创建可派工工单，并为每个动作留存结案证据。
    hypothesis: 客户更看重一份可派工的任务队列，而不是又一个仪表盘；只要队列简短且排好优先级，他们就会每周投入。
    successMetric: 一次每周评审内，80% 的优先异常拿到指定负责人；试点期内至少 5 个工单留下结案证据。
    owner: 水务运营负责人
  - horizon: 3-6 个月
    experiment: 启动 3 个付费试点，每个覆盖 20 到 40 栋楼，配有明确的上线时间、工单结案和验证修后节水效果记分卡。
    hypothesis: 只要能减少浪费排查的工作量，并在真实楼宇上证明节水效果，物业管理机构就会为这套聚焦的行动层付费。
    successMetric: 签下 3 个付费试点，其中 2 个在至少一半已派工的优先工单上显示验证过的减少效果，至少 1 个转为正式上线。
    owner: 创始人/CEO
  - horizon: 6-12 个月
    experiment: 与一家经纪商或保险公司合作方，为 2 个试点账户产出续保准备度报告，测量这些报告是否改变了风险工程或续保对话。
    hypothesis: 理赔和续保这套叙事，能比单纯的水费节省更大幅度地改善扩张和渠道信誉。
    successMetric: 拿到 1 个合作方带来的试点、完成 2 份报告，并获得经纪商或保险公司明确反馈，说明报告影响了下一步建议。
    owner: 合作拓展负责人
  - horizon: 6-12 个月
    experiment: 为首批三种水表、入住率和 CMMS 组合搭建可复用的集成方案，并对比各账户之间的部署时间。
    hypothesis: 公司能在扩大 GTM 之前，把上线时间压缩到足以保住类软件的毛利率水平。
    successMetric: 从签约试点到首次每周评审的中位时间低于 30 天，每个新账户的定制工程时间低于 80 小时。
    owner: 创始工程师和解决方案工程师
operations:
  - 在每次完整试点开始前，先跑一份付费的数据准备度审计，盘点水表、分表、入住率数据源、隔离点和设施管理工单路由路径。
  - 在按资产类型给误报率和归因阈值建立基准之前，让人工分析师持续复核高价值异常。
  - 把工单推进客户现有的 CMMS 或设施管理工作流，而不是在 v1 阶段要求承包商采用一款新的现场应用。
  - 要求承包商提供包括维修类型、完成日期和证据的结案数据，让验证模型能按故障模式学习供应商表现。
  - 每季度发布业主和续保准备度报告，对比已标记异常、已采取动作、验证节水效果和尚未解决的组合风险。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 负责共创客户销售、续保事件挖掘和董事会层面的 ROI 叙事，因为早期成交靠的是物业运营领域的信誉和快速学习能力。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 搭建水表、入住率和 CMMS 连接器，以及决定这套工作流能不能被信任的异常评分与证据管道。
  - role: 水务运营负责人
    startTiming: Month 0
    rationale: 把设施管理和物业管理机构的流程，转译成一份简短的每周工作队列，监督人工分析师复核验证，防止产品退化成又一个通用仪表盘。
  - role: 解决方案工程师
    startTiming: Month 4
    rationale: 缩短上线时间，负责数据准备度审计，避免每次部署都变成定制集成项目。
  - role: 合作拓展负责人
    startTiming: Month 9
    rationale: 只在首批正式上线的客户案例出现之后，再把经纪商、保险公司、水务零售商和计量厂商的关系，转化成能降低 CAC 的分销渠道。
milestones:
  - horizon: 0-12 个月
    items:
      - 在伦敦和东南部签下 3 到 5 个 AMR 数据充分的共创客户，并完成每个资产组合的数据准备度审计。
      - 启动 3 个覆盖 20 到 40 栋楼的付费试点，至少 2 个转化为正式合同。
      - 证明至少 25% 的优先异常值得派工，且已派工工单里至少 50% 在 60 天内显示验证过的修后减少效果。
      - 为首批水表、入住率和设施管理工作流技术栈建立可复用的集成方案，并交付首批续保准备度组合报告。
  - horizon: 12-24 个月
    items:
      - 把早期客户从一个资产组合扩展到同一物业管理机构名下更多楼宇和地区。
      - 推出复用验证过维修数据的供应商基准和续保准备度报告，而不是另建一套独立的保险产品。
      - 在直接试点证明了独立的运营支出和理赔价值之后，拿下 2 到 3 个经纪商、保险公司或水务零售商渠道合作方。
  - horizon: 24-36 个月
    items:
      - 达到约 20 家物业管理机构客户、约 1000 栋在用楼宇、大约 380 万美元 ARR，与研究测算的第三年 SOM 一致。
      - 只有在写字楼和综合用途部署模板可复制之后，才进入一个邻近的商业资产类别。
      - 只有在验证过的结果数据足够扎实、能有把握定价时，才引入基于效果的定价和基准产品。
risks:
  - risk: 太少目标楼宇拥有可靠的 AMR、分表或入住率数据，导致每一笔销售都变成一次改造或数据清理项目。
    likelihood: High
    impact: High
    mitigation: 先从已装表的资产组合入手，卖准备度审计服务，并与计量厂商合作，而不是承诺能全面部署。
  - risk: 因为租户行为、清洁排期和综合用途入住率会让修前修后对比变得噪音很大，买家可能不信任节水归因。
    likelihood: High
    impact: High
    mitigation: 早期让分析师持续参与复核，使用明确的结案证据，在基线可信度得到证明之前不做分成承诺。
  - risk: Quensus 或邻近的漏水检测和分表厂商，在创业公司建起护城河之前，进一步向工单和报告环节延伸。
    likelihood: Medium
    impact: High
    mitigation: 在物业管理机构工作流深度、验证过的修后证据和供应商基准评估上做出差异化，而不是靠报警或硬件功能取胜。
  - risk: 保险公司和经纪商的兴趣可能只停留在建议层面，无法转化成真正的续保信用或可规模化的分销。
    likelihood: Medium
    impact: Medium
    mitigation: 先直接卖运营支出节省和防损 ROI，把面向保险公司的报告当成一条扩张路径，而不是核心依赖。
  - risk: 各承包商之间的设施管理执行质量差异太大，导致公司变成一个服务繁重的协调方，而不是一家软件公司。
    likelihood: Medium
    impact: High
    mitigation: 统一结案要求，衡量供应商表现，对那些响应流程混乱到无法产生可学习数据的账户予以拒绝。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的资金能养起一个 5 人团队，搭建可复用的水表和入住率集成方案，拿下 3 到 5 个 AMR 数据充分的共创客户，跑 3 个付费组合试点、2 到 3 个正式上线客户，并积累足够的验证维修和续保证据，从而判断这到底是一家软件公司，还是一层服务繁重的集成层。
