slug: occupancy-water-fix-os
date: "2026-07-10"
executiveSummary: >-
  This company should launch as a managing-agent action layer for hidden water
  loss in UK multi-tenant office and mixed-use portfolios, not as another
  sensor vendor or generic ESG dashboard. The beachhead is London and South
  East managing agents overseeing 20-100 older buildings with landlord-paid
  water bills, AMR or submeter coverage, outsourced FM, and an insurance
  renewal or water-reduction mandate inside 12 months. The MVP should connect
  to existing meter, occupancy, and BMS data, rank anomalies by probable cost
  and damage risk, open contractor-ready tickets, and verify post-fix savings
  in a weekly portfolio review. GTM should sell a paid 20-40 building pilot
  tied to a live buying trigger because one operator can prove ROI across
  dozens of sites faster than through single-building installs. Research
  supports the pain and ROI framing because escape-of-water losses are
  material, buyers already fund leak-prevention systems, and WEL1 validates
  occupancy-linked portfolio trials. The strongest edge is not the alert itself
  but the dataset linking anomaly type, occupancy context, dispatched vendor,
  and verified savings across a managed portfolio. The biggest disconfirming
  risks are data readiness and attribution because too few target buildings may
  have clean enough feeds and buyers may reject savings claims if post-fix
  proof is noisy. The company should therefore sequence AMR-rich design
  partners, analyst-in-the-loop verification, and direct managing-agent sales
  before betting on insurer distribution or broader real-estate verticals.
problem:
  - Commercial landlords and managing agents usually discover water waste after a monthly bill spike, tenant complaint, or leak-related damage event rather than at the moment the loss starts.
  - Existing BMS alerts, meter dashboards, and plumber callouts do not separate real occupancy from waste, so teams either ignore anomalies or over-dispatch contractors.
  - Repairs and savings are tracked manually, which makes it hard for operations leaders to defend budgets, prove ROI, or influence insurer and owner renewal conversations.
solution:
  - Connect existing AMR, submeter, occupancy, and BMS signals to create an occupancy-adjusted baseline for each building and zone instead of relying on raw threshold alerts.
  - Rank anomalies by likely water cost and damage risk, then push a short list of contractor-ready tickets into the facilities team's weekly operating cadence.
  - Verify pre- and post-repair usage against the baseline so owners, COOs, and risk teams can see which fixes reduced waste and which vendor actions did not.
whyWeWin:
  - The product sells a dispatchable operations workflow, not another passive dashboard, which fits the researched buyer need for prioritized fix lists and weekly FM action.
  - A cross-building dataset linking anomaly patterns, occupancy context, dispatched trade, and verified post-fix outcomes can compound into better prioritization and vendor benchmarking than hardware-led competitors naturally collect.
  - The company can land as an overlay on existing metering and FM systems, which is more credible for UK managing agents than asking them to replace infrastructure or buy a standalone hardware estate first.
strategicChoices:
  beachhead: >-
    London and South East UK managing agents overseeing 30-80 pre-2010
    multi-tenant office and mixed-use buildings with landlord-paid water bills,
    AMR or submeter coverage, outsourced FM vendors, and an insurance renewal
    or water-reduction mandate inside 12 months.
  wedgeRationale: >-
    This wedge creates faster proof than a broader real-estate or hardware sale
    because one buyer controls dozens of sites, already feels the cost of
    landlord-paid waste, and can compare ticket quality and verified savings
    across a portfolio in one quarter. Older office and mixed-use stock also
    concentrates the coordination pain that generic monitoring tools leave to FM
    teams.
  sequencingRationale: >-
    Start with AMR-rich portfolios, weekly human-reviewed triage, and direct
    sales to managing agents because data trust and repair attribution are the
    gating factors. Only after pilots prove deployable integrations,
    dispatch-worthy anomaly rates, and post-fix savings should the company add
    insurer or broker channels, performance-based pricing, and adjacent asset
    classes.
  notYet:
    - Residential and multifamily leak prevention where claims economics are attractive but workflow, unit-level permissions, and incumbent products differ from the office beachhead.
    - Proprietary sensor hardware, automatic shutoff devices, and large retrofit projects that would slow proof and dilute software gross-margin targets.
    - Retail, hospitality, healthcare, and logistics portfolios before the office and mixed-use template reaches repeatable deployment and conversion.
market:
  tam: Estimated $328.7M ARR equivalent from about 430,100 England and Wales office hereditaments, assuming 20% beachhead fit and roughly £3k annual spend per building-equivalent.
  sam: Estimated $76.3M ARR from London and South East office stock, assuming 20% beachhead fit, 60% meter-ready or retrofit-ready share, and roughly £3k annual spend per building-equivalent.
  som: Estimated $3.8M year-3 ARR from 20 managing-agent customers with about 50 live buildings each.
  segments:
    - UK managing agents with 20-100 multi-tenant office and mixed-use buildings, landlord-paid water bills, and outsourced FM teams.
    - Commercial property owners and risk teams that want verified water-loss prevention and renewal evidence once the managing-agent workflow is proven.
  buyingProcess: >-
    Discovery starts after a water-bill spike, leak claim, insurer engineering
    review, or board water target exposes the limits of monthly invoice review
    and manual callouts. The Director of Property Operations usually sponsors
    the pilot, while COO, asset-management, risk, and FM stakeholders approve
    production once data readiness and proof-of-fix reporting are credible.
product:
  mvp: >-
    MVP connects to existing AMR or submeter feeds plus available occupancy,
    schedule, or BMS signals, learns an occupancy-adjusted baseline, ranks
    probable waste events, and pushes contractor-ready tickets into the weekly
    FM review. It deliberately excludes selling proprietary sensors, automatic
    shutoff hardware, and insurer-native underwriting products until the action
    loop and savings verification are trusted.
  sixMonth: Run 3-5 design-partner portfolios with analyst-in-the-loop anomaly review, contractor-ready tickets, and before-and-after savings reports across 20-40 buildings each.
  twelveMonth: Add repeatable connectors for the first meter, occupancy, and CMMS stacks, benchmark anomaly classes and vendor outcomes, and support production rollouts plus the first broker or insurer-supported pilots.
  twentyFourMonth: Expand from office and mixed-use portfolios into one adjacent commercial asset class, add renewal-readiness and vendor-benchmark reporting, and introduce performance-based pricing options once verified savings data is robust.
  keyBets:
    - Enough target portfolios already have meter and occupancy data good enough to support a software-first pilot without a hardware project.
    - Occupancy normalization removes enough noise that weekly reviews can focus on a short list of dispatch-worthy anomalies.
    - Buyers will pay for verified repair and renewal evidence before they demand a full insurer workflow or automatic shutoff product.
    - Vendor and failure-mode benchmarks will improve fast enough across early portfolios to create a real data advantage over generic leak-alert competitors.
gtm:
  wedge: Sell a paid 90-day portfolio pilot for 20-40 buildings that turns one active pain event into weekly fix tickets and verified savings evidence.
  channels:
    - Founder-led outbound to property-operations leaders, COOs, and asset managers at UK managing agents with landlord-paid water exposure.
    - Broker, insurer, and risk-engineering sponsored pilots once direct pilots prove the savings and claims-avoidance reporting loop.
    - Partnerships with submetering, BMS, occupancy, water-retailer, and FM-service providers that already touch data-ready portfolios.
  funnelTargets: "Qualified portfolio review->paid pilot 15-25%, paid pilot->production 50%+, production managing agent->second portfolio or 25%+ more buildings within 12 months in 35%+ of accounts."
  pricing: >-
    Start with a paid readiness-and-pilot package for 20-40 buildings, then
    convert to annual software priced per live building and data-source
    complexity, with onboarding fees and an optional savings-verification or
    shared-savings module. This pricing matches a buyer who owns landlord-paid
    water spend and claims exposure, while keeping annual cost below the
    avoided spend or damage from a meaningful leak event.
businessModel:
  revenueStreams:
    - Annual subscription priced per live building or portfolio band, with higher tiers for richer occupancy and workflow coverage.
    - One-time data-readiness, onboarding, and connector-setup fees for meters, BMS, occupancy, and FM systems.
    - Savings-verification, benchmark reporting, and optional shared-savings modules for owners, brokers, or insurers once proof is established.
  unitOfValue: Live building with connected water data and an active anomaly-to-fix workflow.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one managing-agent portfolio to all buildings and regions under the same operator.
    - Move from office and mixed-use into adjacent commercial asset classes only after deployment templates are repeatable.
    - Add owner, broker, and insurer reporting products that reuse verified-fix and benchmark data from the same workflow.
    - Introduce vendor-performance benchmarks and performance-based pricing once verified savings data is robust enough to price risk.
strategyMap:
  northStarMetric: Annualized verified water-cost reduction per live building.
  inputMetrics:
    - Qualified portfolio review to paid-pilot conversion rate.
    - Median days from data access to first weekly anomaly review.
    - Share of priority anomalies assigned to a contractor or FM owner within 7 days.
    - Share of dispatched tickets with verified post-fix reduction within 60 days.
    - Pilot-to-production conversion rate and building expansion inside each managing-agent account.
  moatsToBuild:
    - Cross-building dataset linking anomaly type, occupancy context, dispatched trade, repair close-out, and post-fix delta by asset type.
    - Baseline and verification models that separate occupancy shifts and routine behavior from true waste in mixed-use buildings.
    - Renewal-ready benchmark reporting that shows which vendors, failure modes, and response times actually reduce loss.
  killCriteria:
    - Fewer than 8 of the first 15 qualified managing-agent targets can deliver daily water data and a usable occupancy proxy within 45 days.
    - In the first 3 design-partner pilots, fewer than 25% of priority anomalies convert into dispatch-worthy tickets with clear close-out evidence.
    - Fewer than 50% of dispatched priority tickets show measurable post-fix reduction against the occupancy-adjusted baseline within 60 days.
    - Fewer than 2 of the first 4 paid pilots convert to annual contracts above £60k ARR equivalent or deployments still require more than 80 custom-engineering hours per new account.
  mermaid: |
    flowchart LR
      Wedge[Managing-agent water-loss wedge] --> MVP[Occupancy-normalized action layer]
      MVP --> Proof[Verified fixes and portfolio ROI]
      Proof --> Expansion[Owner and insurer expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: Compelling pain and a coherent first buyer, but conviction stays moderate until data readiness and verified post-fix savings beat incumbent and internal alternatives.
    whyBelieve: Managing agents already own the workflow and budget pressure, and the product turns passive monitoring into a dispatchable operating loop that can save water spend and support claims avoidance.
    whyDoubt: Quensus and adjacent vendors already cover leak prevention, so the startup must prove it delivers materially cleaner dispatch decisions and more trusted proof than another dashboard or sensor stack.
    nextDiligence: Win 3 AMR-rich design partners, measure dispatch-worthy anomalies and verified savings over one renewal cycle, and see whether at least one broker or insurer uses the resulting report.
  firstCustomer:
    title: Director of Property Operations at a UK managing agent
    profile: A London or South East managing agent overseeing 30-80 pre-2010 office and mixed-use buildings with landlord-paid water bills, outsourced FM, and AMR or submeter coverage across most sites.
    trigger: A leak claim, sudden water-spend spike, insurer engineering review, or board efficiency target forces the operator to prove preventable water loss is being found and fixed.
    buyer: Director of Property Operations or COO
    initialContract: >-
      £25k-£50k paid pilot over 20-40 buildings for 90 days, converting to about
      £60k-£120k annual software plus onboarding and optional verification fees
      once weekly FM reviews show priority tickets closing with measurable
      post-repair reduction.
  mustBeTrue:
    - At least half of qualified managing-agent targets already have AMR or submeter data plus enough occupancy or schedule context to launch a pilot without a hardware project.
    - Occupancy-normalized scoring cuts noise enough that at least 25% of priority anomalies in pilot portfolios are worth dispatching.
    - At least 50% of dispatched priority tickets produce verifiable water reduction within 60 days against the baseline.
    - At least 2 of the first 4 paid pilots convert to production above £60k ARR equivalent without implementation work exceeding 25% of first-year contract value.
    - Broker or insurer stakeholders explicitly use verified-fix reports in at least 1 of the first 5 renewal or risk-engineering conversations, or the insurer channel is not a real moat.
  diligenceQuestions:
    - What share of target managing-agent portfolios expose daily water data and enough occupancy or schedule context today?
    - How many high-value anomalies per building per month remain after normalization, and what fraction truly warrant a truck roll?
    - Which incumbent most often wins this budget today: Quensus, Wint, a submetering vendor, or internal FM process?
    - What proof standard will owners, COOs, and risk teams accept for post-repair savings attribution?
    - Do brokers or insurers change renewal conversations when given verified-fix reports, or only recommend good practice?
operatingAssumptions:
  - assumption: Enough first-beachhead portfolios already have AMR or submeter data plus usable occupancy or schedule context to launch without a hardware project.
    basis: research.yaml
    validationTest: Audit 15 target portfolios and confirm at least 8 can deliver daily water data and a usable occupancy proxy within 45 days.
    decisionImpact: If false, narrow ICP further or sell a readiness and retrofit workflow first instead of scaling software GTM.
  - assumption: Weekly anomaly reviews and contractor-ready tickets fit how managing agents and outsourced FM teams already work.
    basis: idea.yaml
    validationTest: Run 3 live weekly review cycles and show at least 80% of priority anomalies receive a named owner and next action without requiring a new field workflow.
    decisionImpact: If false, integrate more deeply into existing CMMS or BMS tools and reduce claims of workflow replacement.
  - assumption: Occupancy-adjusted baselines are good enough to attribute savings after repairs in noisy mixed-use buildings.
    basis: research.yaml
    validationTest: Compare pre- and post-fix usage on the first 25 closed tickets and show at least 50% produce statistically clear reduction against the baseline within 60 days.
    decisionImpact: If false, drop shared-savings and insurer-reporting promises and reposition around triage speed rather than verified ROI.
  - assumption: Buyers will accept pricing around £2k-£3k per live building annually if the product prevents waste and supports renewal conversations.
    basis: idea.yaml
    validationTest: Present target pricing to 10 qualified buyers and secure at least 3 paid pilots or LOIs within the proposed band.
    decisionImpact: If false, reprice by portfolio flat fee or reduce implementation scope before hiring sales capacity.
  - assumption: Insurer, broker, and water-retailer channels lower CAC only after direct managing-agent ROI is proven.
    basis: research.yaml
    validationTest: Secure 2 channel partners and show at least 2 partner-influenced pilots reach close faster than founder-led outbound by month 12.
    decisionImpact: If false, keep distribution direct and delay insurer-facing product and hiring plans.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview 20 property-operations, FM, and risk leaders at target managing agents and collect building-count, meter-readiness, renewal-timing, and current-response workflow data.
    hypothesis: The beachhead has a repeatable trigger pattern and enough data readiness to support a focused outbound motion.
    successMetric: 10 qualified ICP accounts, 5 active pilot discussions, and a ranked list of the three most common data-stack combinations.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Backtest 90 days of water and occupancy data from 3 candidate portfolios to quantify how many anomalies remain after normalization and how many map to known FM actions.
    hypothesis: Occupancy context removes enough noise that a weekly review can focus only on dispatch-worthy anomalies.
    successMetric: At least 25% of priority anomalies map to plausible repair actions and false positives fall versus meter-only alerting.
    owner: Founding eng and Water operations lead
  - horizon: 0-90 days
    experiment: Run one live weekly anomaly-review workflow with a design partner, create contractor-ready tickets, and capture close-out evidence for each action.
    hypothesis: The customer values a dispatchable work queue more than another dashboard and will engage weekly if the queue is short and prioritized.
    successMetric: 80% of priority anomalies get a named owner within one weekly review and at least 5 tickets reach close-out evidence within the pilot window.
    owner: Water operations lead
  - horizon: 3-6 months
    experiment: Launch 3 paid pilots across 20-40 buildings each with explicit scorecards for onboarding time, ticket closure, and verified post-fix savings.
    hypothesis: Managing agents will pay for a narrow action layer if it reduces waste investigation effort and proves savings on real buildings.
    successMetric: 3 paid pilots signed, 2 showing verified reduction on at least half of dispatched priority tickets, and at least 1 converted to production.
    owner: Founder CEO
  - horizon: 6-12 months
    experiment: Produce renewal-ready reports with one broker or insurer partner on 2 pilot accounts and measure whether they change risk-engineering or renewal discussions.
    hypothesis: Claims and renewal framing materially improves expansion and channel credibility beyond water-bill savings alone.
    successMetric: 1 partner-sourced pilot, 2 completed reports, and explicit broker or insurer feedback that the reports influenced next-step recommendations.
    owner: Partnerships lead
  - horizon: 6-12 months
    experiment: Build repeatable integrations for the first three meter, occupancy, and CMMS combinations and compare deployment time across accounts.
    hypothesis: The company can shrink onboarding enough to preserve software-like margins before scaling GTM.
    successMetric: Median time from signed pilot to first weekly review below 30 days and custom engineering below 80 hours per new account.
    owner: Founding eng and Solutions engineer
operations:
  - Run a paid data-readiness audit before every full pilot to inventory meters, submeters, occupancy feeds, isolation points, and FM ticket-routing paths.
  - Keep a human analyst in the loop on high-value anomalies until false-positive rates and attribution thresholds are benchmarked by asset type.
  - Push tickets into the customer's existing CMMS or FM workflow instead of asking contractors to adopt a new field app in v1.
  - Require contractor close-out data including repair type, completion date, and evidence so verification models can learn vendor performance by failure mode.
  - Publish quarterly owner and renewal-readiness reports that compare flagged anomalies, actions taken, verified savings, and open portfolio risks.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, renewal-event discovery, and board-level ROI framing because early deals depend on property-operations credibility and fast learning.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build meter, occupancy, and CMMS connectors plus the anomaly-scoring and evidence pipeline that determine whether the workflow is trusted.
  - role: Water operations lead
    startTiming: Month 0
    rationale: Translate FM and managing-agent processes into a short weekly work queue, oversee analyst-in-the-loop verification, and keep the product from becoming a generic dashboard.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Shorten onboarding, own data-readiness audits, and stop each deployment from turning into bespoke integration work.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Convert broker, insurer, water-retailer, and metering relationships into lower-CAC distribution only after the first production references exist.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 3-5 AMR-rich design partners in London and the South East and complete data-readiness audits on each portfolio.
      - Launch 3 paid pilots across 20-40 buildings each and convert at least 2 to production contracts.
      - Prove that at least 25% of priority anomalies are dispatch-worthy and at least 50% of dispatched tickets show verified post-fix reduction within 60 days.
      - Establish repeatable integrations for the first meter, occupancy, and FM workflow stacks and ship the first renewal-ready portfolio reports.
  - horizon: 12-24 months
    items:
      - Expand early customers from one portfolio into additional buildings and regions under the same managing agent.
      - Launch vendor-benchmark and renewal-readiness reporting that reuses verified-fix data rather than building a separate insurance product.
      - Secure 2-3 broker, insurer, or water-retailer channel partners after direct pilots prove standalone opex and claims value.
  - horizon: 24-36 months
    items:
      - Reach roughly 20 managing-agent customers, about 1,000 live buildings, and approximately $3.8M ARR, consistent with the researched year-3 SOM.
      - Enter one adjacent commercial asset class only after the office and mixed-use deployment template is repeatable.
      - Introduce performance-based pricing and benchmark products only if verified outcome data is strong enough to price them confidently.
risks:
  - risk: Too few target buildings have reliable AMR, submeter, or occupancy data, which turns every sale into a retrofit or cleanup project.
    likelihood: High
    impact: High
    mitigation: Start with meter-ready portfolios, sell readiness audits, and partner with metering vendors rather than promising universal deployment.
  - risk: Buyers may not trust savings attribution because tenant behavior, cleaning schedules, and mixed-use occupancy make before-and-after comparisons noisy.
    likelihood: High
    impact: High
    mitigation: Keep analyst review in the loop early, use explicit close-out evidence, and avoid shared-savings claims until baseline confidence is demonstrated.
  - risk: Quensus or adjacent leak-detection and submetering vendors move further into ticketing and reporting before the startup builds a moat.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on managing-agent workflow depth, verified post-fix evidence, and vendor benchmarking rather than on alerting or hardware features.
  - risk: Insurer and broker interest may remain advisory and fail to translate into real renewal credits or scalable distribution.
    likelihood: Medium
    impact: Medium
    mitigation: Sell direct opex and loss-prevention ROI first, then treat insurer-facing reporting as an expansion path rather than a core dependency.
  - risk: FM execution quality varies so much across contractors that the company becomes a services-heavy coordinator instead of a software business.
    likelihood: Medium
    impact: High
    mitigation: Standardize close-out requirements, measure vendor performance, and refuse accounts where the response process is too uncontrolled to generate learnable data.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-3.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months buys a 5-person team, repeatable meter and occupancy integrations,
    3-5 AMR-rich design partners, 3 paid portfolio pilots, 2-3 production
    customers, and enough verified-fix plus renewal evidence to know whether
    this is a software company or a services-heavy integration layer.
