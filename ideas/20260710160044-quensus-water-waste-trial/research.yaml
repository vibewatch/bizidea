  validationPlan:
  - priority: high
    question: What percentage of anomalies in a 30-80 building portfolio are genuinely dispatch-worthy after occupancy normalization?
    evidenceToGather: Ninety-day anomaly logs, FM triage notes, and contractor close-out outcomes across at least five design-partner portfolios.
  - priority: high
    question: How much onboarding effort is data plumbing versus workflow change management?
    evidenceToGather: Meter inventories, AMR/BMS connector work, occupancy-system access, and implementation timelines from first pilots.
  - priority: medium
    question: Do insurers or brokers actually change renewal conversations when given verified-fix reports?
    evidenceToGather: Renewal questionnaires, engineering recommendations, and broker feedback before and after pilot-generated reports.
