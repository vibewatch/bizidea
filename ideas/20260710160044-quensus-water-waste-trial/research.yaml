competitors:
- name: Quensus
  stage: seed
  wedge: UK leak prevention and smart water management with insurer, compliance, and built-environment positioning; now extending into occupancy-linked action workflows.
  pricing: Quote-led / request-a-quote.
  strength: Local ecosystem fit with Aviva, Waterwise, and WEL-backed trial credibility.
  weaknessVsUs: Still broad leak-prevention and hardware-forward today; the startup can be more opinionated about managing-agent ticketing and verified post-fix economics.
  sourceRefs:
  - 1
  - 18
  - 19
  - 20
- name: Wint
  stage: scale-up
  wedge: Enterprise water-damage prevention for commercial real estate using monitoring, AI analytics, and operational support.
  pricing: Quote-led / enterprise sales.
  strength: Strong portfolio-scale ROI proof and credibility with large commercial operators.
  weaknessVsUs: More global enterprise incident-prevention platform than UK managing-agent workflow with occupancy-normalized repair verification.
  sourceRefs:
  - 21
  - 22
  - 23
- name: Alert Labs / AlertAQ
  stage: scale-up
  wedge: Fast-deploy wireless water-intelligence platform for commercial buildings, property managers, and insurers.
  pricing: Quote-led / get-a-quote.
  strength: Simple sensor-led deployment and explicit positioning for property managers and insurers.
  weaknessVsUs: Centred on alerts and platform visibility rather than occupancy-based triage and post-repair proof.
  sourceRefs:
  - 24
  - 25
- name: Eddy Solutions
  stage: scale-up
  wedge: Managed water leak detection with 24/7 monitoring and insurance-oriented messaging for commercial and multifamily assets.
  pricing: Quote-led / advisor-led.
  strength: Strong service layer and claims-oriented story.
  weaknessVsUs: North America-centric and monitoring-heavy rather than UK water-waste workflow and insurer-reporting specific.
  sourceRefs:
  - 26
- name: Metron
  stage: incumbent
  wedge: Water submetering, tenant billing, and portfolio monitoring for commercial properties.
  pricing: Quote-led / get-a-quote.
  strength: Deep infrastructure for tenant-level visibility, billing, and data plumbing.
  weaknessVsUs: A substitute visibility stack, not a purpose-built anomaly-to-ticket-to-verification layer for managing agents.
  sourceRefs:
  - 28
  - 29
