problem: >-
  Commercial landlords and managing agents usually discover water waste only
  after a monthly bill spikes or a tenant reports damage. Existing BMS alerts
  and plumber callouts do not tell them whether abnormal usage came from real
  occupancy, cleaning routines, a hidden leak, or simple data noise, so teams
  either ignore small anomalies or over-dispatch. Because repairs are tracked
  manually and savings are rarely verified, water efficiency stays trapped in
  sustainability reporting instead of becoming a budgeted risk-reduction
  workflow that owners and insurers will reward.
targetUser:
  primary: >-
    Heads of facilities or property operations at UK managing agents overseeing
    20-100 multi-tenant office and mixed-use buildings with landlord-paid water
    bills
  secondary: >-
    Risk, sustainability, and insurance managers at commercial property owners
    trying to reduce preventable water loss across their portfolios
  buyer: Director of Property Operations or COO at a UK managing agent
startupThesis:
  nonObviousInsight: >-
    The breakthrough is not another leak sensor network; it is an action layer
    that turns occupancy-adjusted water data into a credible operating baseline
    and proof-of-fix record. Once a managing agent can show which anomalies were
    preventable, what was repaired, and how consumption changed afterward, water
    waste moves from utilities reporting into an underwritable maintenance and
    renewal problem. That unlocks a budget owner, a switching event, and
    eventually insurer distribution that generic IoT dashboards cannot access.
  beachhead: >-
    UK managing agents overseeing 20-100 multi-tenant office and mixed-use
    buildings built before 2010, with landlord-paid water bills, AMR meters or
    submeter retrofits, and outsourced FM vendors
  wedge: >-
    An occupancy-normalized water-loss action layer that ranks anomalies by
    probable cost and damage risk, opens contractor-ready fix tickets, and
    verifies post-repair savings for insurer and owner reporting
  whyNowCatalyst: >-
    Quensus's WEL1-backed 30-building trial and the parallel exploration of an
    insurance-backed efficiency standard show that commercial water monitoring
    is shifting from passive dashboards to an operational and underwriting
    workflow.
  ventureScalePath: >-
    Start with UK office and mixed-use portfolios where one managing agent
    controls dozens of buildings, then expand to retail, hospitality,
    healthcare, and logistics real estate; add insurer, broker, and
    water-retailer channels; and become the system of record for water-loss
    prevention, verified savings, and renewal benchmarking across the built
    environment.
solution: >-
  The product connects to existing smart meters, submeters, occupancy systems,
  and BMS feeds to learn an occupancy-adjusted water baseline for each building
  and zone. It flags anomalies by likely waste cost and damage risk, then
  converts the best opportunities into prioritized fix tickets with recommended
  vendor type, urgency, and expected savings. After a repair, it measures pre-
  and post-intervention consumption to verify whether the fix actually reduced
  waste, creating an audit trail that owners, FM leaders, and insurers can
  trust. The first deployment is a portfolio-level pilot across 20-40 buildings
  with weekly facilities reviews, not a one-building science experiment. Over
  time, the company builds a benchmark dataset on which building types, vendors,
  and failure modes produce the fastest water savings, making it easier to
  underwrite performance-based contracts and renewal credits.
