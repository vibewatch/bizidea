differentiator: >-
  Most water-tech tools for buildings stop at leak alerts, ESG dashboards, or
  hardware sales, while insurers only engage after a claim. This company would
  own the messy middle: occupancy-normalized anomaly scoring, repair
  orchestration, and post-fix verification across a portfolio. The moat is the
  cross-building dataset linking anomaly patterns, vendor actions, verified
  savings, and loss-prevention outcomes by asset type, which lets the company
  benchmark vendors, guarantee response economics, and eventually support
  insurer-facing standards that commodity sensors cannot replicate.
