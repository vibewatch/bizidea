topRisks:
  - name: Data-readiness gap
    description: >-
      Many buildings still lack reliable submeter or occupancy feeds, which
      could make anomaly scoring too noisy for trusted dispatch decisions.
    mitigation: >-
      Start with portfolios that already have AMR or submeter coverage, sell a
      sensor-readiness audit, and partner with meter vendors for fast retrofits.
  - name: Weak savings attribution
    description: >-
      Water use varies with tenant behavior, cleaning schedules, and weather, so
      buyers may doubt whether a repair truly caused the measured savings.
    mitigation: >-
      Focus on landlord-paid portfolios, compare pre- and post-consumption
      against occupancy-adjusted baselines, and keep a human analyst in the loop
      on high-value anomalies during early deployments.
  - name: Insurance adoption lag
    description: >-
      Insurers may support pilots yet take years to translate verified
      water-loss prevention into renewal credits or formal standards.
    mitigation: >-
      Sell standalone opex savings first, treat insurer-ready reporting as
      upside, and co-design pilots with brokers or risk engineers rather than
      relying on carrier product changes.
