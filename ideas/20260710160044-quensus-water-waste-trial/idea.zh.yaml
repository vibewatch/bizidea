  signalRefs: ['入住率基线能把真实用水和浪费区分开']
  sourceRefs: [1, 2]
- point: >-
    设施预算现在就能采纳这套产品，因为买家想要的产出是一份优先维修清单，不是又一个公用事业仪表盘。
  signalRefs: ['设施团队正在拿到维修清单']
  sourceRefs: [1]
- point: >-
    正在探索的保险支持标准，意味着验证过的维修可能影响续保和风险工程评估，这给了创业公司一套超越 ESG 报告的分销和 ROI 叙事。
  signalRefs: ['保险支持的标准正在成型']
  sourceRefs: [1]
- point: >-
    Ofwat 支持的年度 WEL 资金一直延续到 2030 年，给商业用水效率产品创造了可重复的采购窗口和生态关注度。
  signalRefs: ['Ofwat 在资助可复制的部署周期']
  sourceRefs: [2]
differentiator: >-
  多数楼宇用水科技工具只做到漏水报警、ESG 仪表盘或卖硬件就停下了，保险公司也只在出险之后才介入。这家公司要吃下这段混乱的中间地带——入住率归一化的异常评分、维修调度，以及跨组合的修后验证。它的护城河是那份把异常模式、供应商动作、验证节水量和防损结果按资产类型连起来的跨楼宇数据集——靠这份数据集，公司可以给供应商做基准评估、为响应经济性做出保证，最终还能支撑起商品化传感器复制不了的保险公司标准。
