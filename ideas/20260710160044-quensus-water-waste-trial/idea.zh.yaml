jobsToBeDone:
- job: >-
    组合水费飙升却没人知道哪个站点在浪费水时，帮设施负责人锁定最值得处理的维修点，让他们只派一次供应商就能停止为看不见的浪费买单。
  currentAlternative: 账单核查、现场巡检和水管工上门
  successMetric: 从发现异常到验证完成维修的天数，以及每栋楼年化的水费削减额
- job: >-
    业主或保险公司问起为削减可避免的水损耗风险做了什么时，帮物业管理机构拿出经过验证的前后对比证据，让他们能守住预算、改善续保谈判。
  currentAlternative: 电子表格维护记录和供应商口头汇报
  successMetric: 已标记异常里，验证节水并获得续保建议采纳的比例
