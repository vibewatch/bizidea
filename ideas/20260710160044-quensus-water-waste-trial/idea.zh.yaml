problem: >-
  商业房东和物业管理机构通常要等到月度账单飙升或租户报告损坏才发现水损耗。现有的 BMS 报警和水管工上门服务，说不清异常用水是来自真实的入住行为、清洁作业、隐藏漏水还是单纯的数据噪音，团队因此要么忽视小异常，要么过度派工。因为维修全靠人工记录、节水效果也很少被验证，用水效率就一直困在可持续发展报告里，没能变成一项业主和保险公司愿意买单的、预算内的风险削减工作流。
targetUser:
  primary: 英国物业管理机构里负责设施或物业运营的负责人，管理着 20 到 100 栋多租户写字楼和综合用途楼宇，水费由业主支付
  secondary: 商业物业业主那边的风险、可持续发展和保险经理，他们想在整个资产组合里减少可避免的水损耗
  buyer: 英国物业管理机构的物业运营总监或 COO
startupThesis:
  nonObviousInsight: >-
    真正的突破不是再造一套漏水传感器网络，而是一层行动系统——把经入住率校正的用水数据，变成一条可信的运营基线和修复证明记录。物业管理机构一旦能说清哪些异常是可以避免的、修了什么、修完之后用水量怎么变化，用水浪费就会从公用事业报告里跳出来，变成一个可承保的维修和续保问题。这会解锁一个预算负责人、一次换供应商的契机，最终还能打通保险公司这条通用 IoT 仪表盘够不到的分销渠道。
  beachhead: 英国的物业管理机构，管理着 2010 年前建成的 20 到 100 栋多租户写字楼和综合用途楼宇，水费由业主支付，配有 AMR 水表或分表改造，并外包了设施管理供应商
  wedge: 一套经入住率归一化的用水损耗行动层，按可能造成的损失和损坏风险给异常排序，开出可直接派给承包商的维修工单，再验证修后节水效果，供保险公司和业主报告使用
  whyNowCatalyst: >-
    Quensus 拿到 WEL1 资助、在 30 栋楼宇开展试点，同时探索保险支持的用水效率标准，这说明商业用水监测正在从被动仪表盘转向运营和承保工作流。
  ventureScalePath: >-
    先从英国的写字楼和综合用途资产组合切入——这里一家物业管理机构就能掌控几十栋楼宇——再扩展到零售、酒店、医疗和物流地产；接入保险公司、经纪商和水务零售商这些渠道；最终成为整个建筑行业里用水损耗防范、节水验证和续保基准评估的系统记录方。
solution: >-
  产品接入现有的智能水表、分表、入住率系统和 BMS 数据源，为每栋楼宇和每个区域学习出一条经入住率校正的用水基线。它按可能的浪费成本和损坏风险给异常排序，再把最值得处理的机会转成优先维修工单，附带推荐的供应商类型、紧急程度和预期节水量。维修完成后，它会比对修前修后的用水量，验证这次维修到底有没有真正减少浪费，从而留下一条业主、设施负责人和保险公司都能信任的审计记录。第一次部署是覆盖 20 到 40 栋楼宇的组合级试点，配合每周设施评审，不是那种只在一栋楼里做的科学实验。随着时间推移，公司会积累一份基准数据集，说清哪些楼宇类型、供应商和故障模式能最快省下水费，这也让基于效果的合同和续保信用更容易承保。
goToMarketSeed:
  firstCustomer: >-
    一家管理着 30 到 80 栋写字楼和综合用途楼宇的英国物业管理机构，水费账户由业主承担，设施管理外包，并且在未来 12 个月内面临物业保险续保或用水削减指标
  buyingTrigger: >-
    水费突然飙升、漏水引发的理赔、保险公司的工程评估，或者董事会层面的效率目标，逼着运营方证明自己在找出并修复可避免的水损耗。
  currentAlternative: 月度账单核查、通用 BMS 报警、人工现场巡检，以及记在电子表格里的被动水管工派工
  switchingReason: >-
    这个切口能告诉团队哪些异常值得出车维修，证明维修到底有没有效果，再把这些证据打包给业主和保险公司，而不是再添一个被动仪表盘。
  pricingHypothesis: >-
    按楼宇数量和传感器覆盖率定价的按楼订阅，外加一个节水验证模块，或按验证后水费节省额收取的分成费
