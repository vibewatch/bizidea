topRisks:
- name: 数据准备度缺口
  description: >-
    很多楼宇仍然缺少可靠的分表或入住率数据源，这可能让异常评分噪音太大，无法支撑可信的派工决策。
  mitigation: >-
    先从已经具备 AMR 或分表覆盖的资产组合入手，出售一份传感器准备度审计服务，并与水表供应商合作实现快速改造。
- name: 节水归因薄弱
  description: >-
    用水量会随租户行为、清洁排期和天气波动，买家可能会怀疑一次维修是否真的带来了测得的节水效果。
  mitigation: >-
    专注在业主承担水费的资产组合，把修前修后用水量和经入住率校正的基线做比对，并在早期部署阶段让人工分析师持续复核高价值异常。
- name: 保险采纳滞后
  description: >-
    保险公司可能会支持试点，但要花上好几年才能把验证过的水损耗防范转化为续保信用或正式标准。
  mitigation: >-
    先卖独立的运营支出节省价值，把面向保险公司的报告当成额外收益，并与经纪商或风险工程师共同设计试点，而不是依赖保险公司自己去改产品。
