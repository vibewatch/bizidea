scenarios:
  downside:
    description: Data-readiness filters bite harder, channel help arrives late, and the company needs more manual implementation support than planned.
    y3RevenueK: 2407.8
    y3EbitdaK: -630.8
    cashLowPointK: 54.6
    keyAssumptionChanges:
    - Q4Y3 active paying accounts reach 15 instead of 20 because data audits and approvals stretch the sales cycle toward 7-8 months.
    - Steady-state ARPU stays closer to about $180K because fewer accounts expand to 50 live buildings or attach reporting modules.
    - Gross margin exits near 69% because verification and implementation remain more services-heavy than planned.
  base:
    description: Base case follows the BP path of three paid pilots in year 1, a seed-ready ten-account base by Q4Y2, and the researched 20-customer SOM by Q4Y3.
    y3RevenueK: 2994.6
    y3EbitdaK: 1.7
    cashLowPointK: 671.7
    keyAssumptionChanges:
    - Active paying accounts grow from 3 at M12 to 10 at Q4Y2 and 20 at Q4Y3, matching the business-plan milestones and researched SOM.
    - Steady-state ARPU reaches roughly $190K per account as average live buildings per account approach 50 and modest verification reporting attaches.
    - Gross margin improves from roughly 48% in Y1 to roughly 72% in Y3 as repeatable connectors reduce manual setup and support load.
  upside:
    description: Design-partner proof and channel referrals pull deals forward while onboarding stays product-like enough to support faster expansion without a larger delivery team.
    y3RevenueK: 4049.4
    y3EbitdaK: 813.0
    cashLowPointK: 1329.5
    keyAssumptionChanges:
    - Q4Y3 active paying accounts reach 23 instead of 20 because reference pilots and two channel partners accelerate new account starts.
    - Steady-state ARPU reaches roughly $204K as more accounts expand beyond 50 live buildings and attach renewal-reporting modules earlier.
    - Gross margin exits near 74% because onboarding stays under 30 days and analyst review load falls faster than planned.
sensitivity:
- variable: ARPU
  downsideCase: Average account settles nearer 45 live buildings and about $180K ARR.
  baseCase: Average account reaches about 50 live buildings and about $190K ARR.
  upsideCase: Average account reaches about 55 live buildings and about $205K ARR.
  y3RevenueImpactK: -310.0
  cashImpactK: -280.0
- variable: CAC
  downsideCase: CAC rises to about $140K because insurer and broker referrals stay weak.
  baseCase: CAC is about $110K on founder-led outbound plus two channel partners.
  upsideCase: CAC falls to about $90K once referrals generate a third of qualified pilots.
  y3RevenueImpactK: -80.0
  cashImpactK: -260.0
- variable: churn
  downsideCase: Monthly churn drifts to 2.5% as pilots fail to expand cleanly.
  baseCase: Monthly churn holds near 1.5%.
  upsideCase: Monthly churn improves to 1.0% with renewal-readiness reporting embedded in workflow.
  y3RevenueImpactK: -210.0
  cashImpactK: -170.0
- variable: sales cycle
  downsideCase: Median cycle stretches to 7-8 months because data audits and buying committees slow approvals.
  baseCase: Median cycle is about 5-6 months from qualified review to paid pilot.
  upsideCase: Median cycle compresses to 4-5 months when design-partner proof and channel trust land.
  y3RevenueImpactK: -370.0
  cashImpactK: -400.0
- variable: gross margin
  downsideCase: Exit gross margin reaches only about 69%.
  baseCase: Y3 gross margin averages about 72% and exits near 73%.
  upsideCase: Exit gross margin reaches about 74%.
  y3RevenueImpactK: 0.0
  cashImpactK: -220.0
- variable: hiring pace
  downsideCase: A third implementation hire and an extra GTM hire are needed a year earlier than planned.
  baseCase: Hiring stays milestone-gated and the implementation pod holds at two FTE through Y3.
  upsideCase: One non-customer-facing hire slips until after the seed round.
  y3RevenueImpactK: -60.0
  cashImpactK: -190.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified portfolio reviews] --> Pilots[Paid 90-day pilots]
      Pilots --> Production[Annual production accounts]
      Production --> Expansion[More buildings per managing agent]
      Expansion --> Revenue[Subscription and verification revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by 20 paying managing-agent accounts by Q4Y3, each scaling toward roughly 50 live buildings and about $190K steady-state ARR.
- checkName: Must go right
  finding: The first connector set has to make onboarding repeatable enough that two implementation FTE plus one water-ops lead can support the account ramp without breaking the 70% gross-margin target.
- checkName: Model breaks if
  finding: If data-readiness audits lengthen the sales cycle and gross margin stalls below roughly 69%, the downside case pushes cash close to zero before the next round.
- checkName: Next-round proof
  finding: The seed story is ten paying accounts, roughly 450 live buildings, 68%+ gross margin, and referenceable verified-savings reports by Q4Y2.
sanityChecks:
  ruleOf40: Y3 growth 153% + EBITDA margin 0% = 153%
  burnMultiple: Y2 burn multiple about 0.6x ($846.6K burn on roughly $1.35M net-new ARR from Q4Y1 to Q4Y2).
  revenuePerFte: $300K Y3 using $3.0M revenue / 10 Q4Y3 FTE (benchmark $200-400K SaaS).
  flags:
  - The model assumes a tight AMR-rich ICP; if too few target portfolios are meter-ready, both the customer ramp and CAC worsen quickly.
  - Only two dedicated implementation FTE are budgeted through Y3, so the plan depends on connector reuse and 30-day onboarding rather than bespoke deployment work.
  - Y3 reaches only near-breakeven, so a prolonged analyst-in-the-loop verification burden would likely require either lower growth or another raise.
