slug: occupancy-water-fix-os
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] the model starts in the first full month after the business plan date.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.5M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2.5-3.5M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the stated range because hiring stays disciplined and the company reaches the seed milestone with more than six months of cash left.'
- id: A3
  name: Starting paying accounts
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first sell paid pilots.'
- id: A4
  name: Customer definition
  value: One paying managing-agent account in a pilot or production contract
  unit: definition
  source: '[BP market.som + BP investorMemo.firstCustomer + BP gtm.pricing] customersEop counts paying managing-agent accounts, not individual buildings.'
- id: A5
  name: Funnel conversion baseline
  value: Qualified review to paid pilot ~20%, pilot to production ~55%, and 35% of production accounts expand building count or a second portfolio within 12 months
  unit: conversion
  source: '[BP gtm.funnelTargets] the model centers on the midpoint of the stated pilot and expansion conversion goals.'
- id: A6
  name: Paid pilot economics
  value: $48K total over 90 days (~$16K/month) for a 20-40 building portfolio
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract £25k-£50k paid pilot over 20-40 buildings + BP gtm.wedge] the model uses the midpoint of the pilot band, translated with the BP/research implied GBP-USD range.'
- id: A7
  name: Steady-state production ARPU
  value: $190K ARR per account at about 50 live buildings
  unit: USD/account/year
  source: '[Research market.som $3.8M from 20 managing-agent customers × 50 live buildings each + Research bottomUpSizingDrivers £3,000 annual spend per live building-equivalent] steady-state ARPU is set to the researched SOM math.'
- id: A8
  name: Customer ramp
  value: 3 active paying accounts by M12, 10 by Q4Y2, and 20 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + Research market.som] the base case matches three year-one pilots, a seed-ready ten-account base by Q4Y2, and the researched year-three SOM target.'
- id: A9
  name: Revenue recognition convention
  value: Active paying accounts multiplied by blended realized revenue of roughly $15.0K/month in pilots and early production, rising to $16.4K/month by late Y3 as accounts approach 50 live buildings and attach modest verification reporting
  unit: formula
  source: '[BP businessModel.revenueStreams + BP gtm.pricing + Research market.som] this keeps revenue directly tied to account count and the per-building pricing logic.'
- id: A10
  name: Base sales cycle
  value: About 5-6 months from qualified portfolio review to paid pilot start, followed by a 90-day pilot
  unit: months
  source: '[BP buyingProcess + BP gtm.wedge + BP gtm.funnelTargets + startup-finance heuristic] the cycle assumes live pain triggers but still requires data audits and multi-stakeholder approval.'
- id: A11
  name: Gross margin ramp
  value: About 48% in Y1, 63% in Y2, and 72% in Y3 with a 73% Q4Y3 exit
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations human analyst in the loop + Research adoptionFrictionMatrix] margins start services-heavy and normalize only after connector reuse and repeatable deployment playbooks.'
- id: A12
  name: Hiring timeline
  value: M1 founder CEO, engineer, and water-ops lead; M4 solutions; M9 partnerships; M13 engineer 2; M16 implementation analyst; M18 finance ops; M22 account executive; M25 engineer 3
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale + startup-finance heuristic] the team adds delivery and GTM only after design-partner proof and keeps the org under ten FTE through the seed milestone.'
- id: A13
  name: Founder CEO loaded compensation
  value: $150.0K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] lean founder cash compensation with payroll tax and benefits load.'
- id: A14
  name: Engineering loaded compensation
  value: $180.0K per FTE
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] senior integration and data-platform talent is required, but the model stays below big-tech comp levels.'
- id: A15
  name: Water operations / product loaded compensation
  value: $145.0K
  unit: USD/year
  source: '[BP team Water operations lead + startup-finance heuristic] this role blends domain operations knowledge, customer workflow design, and product feedback.'
- id: A16
  name: Solutions / implementation loaded compensation
  value: $150.0K per FTE
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] assumes technically strong onboarding and integration hires without enterprise-consulting overhead.'
- id: A17
  name: Partnerships / sales loaded compensation
  value: $170.0K per FTE
  unit: USD/year
  source: '[BP team Partnerships lead + startup-finance heuristic] includes variable compensation and travel for founder-assisted enterprise sales.'
- id: A18
  name: G&A / finance ops loaded compensation
  value: $110.0K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers lean finance, vendor, and compliance operations.'
- id: A19
  name: Payroll allocation to P&L lines
  value: Founder 45% S&M / 15% R&D / 40% G&A; engineering 100% R&D; water ops 15% S&M / 75% R&D / 10% G&A; solutions 40% S&M / 60% R&D; partnerships and sales 100% S&M; finance ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] this maps headcount cost into functional lines while keeping founder-led GTM and implementation work visible.'
- id: A20
  name: Non-payroll opex ramp
  value: S&M about $5.5K-$22.0K/month, R&D about $7.5K-$17.5K/month, and G&A about $5.5K-$13.0K/month over 36 months
  unit: USD/month
  source: '[BP operations + BP gtm.channels + BP experimentRoadmap + startup-finance heuristic] covers cloud, travel, insurance, legal, and light compliance spend without assuming a large paid-marketing motion.'
- id: A21
  name: Implementation productivity assumption
  value: The model holds the implementation pod at two FTE through Y3 because repeatable meter, occupancy, and FM connectors should reduce onboarding below 30 days for the first stack combinations
  unit: capacity assumption
  source: '[BP experimentRoadmap median time to first weekly review below 30 days + BP businessModel.targetGrossMarginPct 70 + startup-finance heuristic] this is the key operating efficiency assumption behind the lean headcount plan.'
- id: A22
  name: Monthly churn
  value: 1.5%
  unit: percent/month
  source: '[startup-finance heuristic for sticky but still-early enterprise workflow SaaS + BP expansionLevers] the product should be embedded once tied into FM workflow, but early account risk remains real.'
- id: A23
  name: CAC convention
  value: $110K per production account
  unit: USD/account
  source: '[model calc using Y1-Y2 sales and marketing spend of about $848.7K divided by roughly eight production accounts by Q4Y2 + BP gtm.funnelTargets] the model rounds up to stay conservative.'
- id: A24
  name: Next-round milestone for funding sizing
  value: 10 active paying accounts, roughly 450 live buildings, 68%+ gross margin, two channel partners, and multiple verified-savings references by Q4Y2
  unit: milestone
  source: '[BP milestones 12-24 months + BP experimentRoadmap + BP fundingAsk.useOfFundsSummary] this is the seed-ready proof package the pre-seed round must finance.'
- id: A25
  name: Quarterly salary convention
  value: Y2-Y3 salary rows sum actual monthly hiring inside each quarter rather than only using quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] this keeps the salary line consistent with the month-by-month hiring ramp.'
