openQuestions:
- 英国物业管理机构的资产组合里，有多大比例已经能提供逐日甚至更细粒度的用水数据，加上可用的入住率背景信息？
- 保险公司或经纪商会不会把验证过的水损防范正式纳入续保信用体系，还是未来几年仍只停留在建议层面？
- 在综合用途资产里，经入住率校正后，每栋楼每月真正值得派工的异常有多少，行为噪音又占多少？
- 设施管理供应商能不能稳定地结案，稳定到足以按资产类型和维修工种建立起一份站得住脚的节水验证数据集？
