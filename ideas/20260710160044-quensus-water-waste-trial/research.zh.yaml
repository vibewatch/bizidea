competitors:
- name: Quensus
  stage: 种子期
  wedge: 英国漏水防范和智能用水管理，定位保险、合规和建筑环境场景；目前正在拓展入住率关联的行动工作流。
  pricing: 需询价定制。
  strength: 与 Aviva、Waterwise 的本地生态契合度好，且拥有 WEL 支持的试点信誉。
  weaknessVsUs: 目前仍以广义漏水防范和硬件为主；创业公司可以在物业管理机构工单和验证过的修后经济性上做得更彻底。
  sourceRefs:
  - 1
  - 18
  - 19
  - 20
- name: Wint
  stage: 成长期
  wedge: 面向商业地产的企业级水损防范，靠监测、AI 分析和运营支持来实现。
  pricing: 需询价 / 企业销售。
  strength: 有强力的组合规模 ROI 证据，在大型商业运营方中口碑良好。
  weaknessVsUs: 更像一个全球性的企业事故防范平台，而不是带入住率归一化修复验证的英国物业管理机构工作流。
  sourceRefs:
  - 21
  - 22
  - 23
- name: Alert Labs / AlertAQ
  stage: 成长期
  wedge: 面向商业楼宇、物业经理和保险公司的快速部署无线水智能平台。
  pricing: 需询价定制。
  strength: 传感器主导的部署简单，且明确定位物业经理和保险公司。
  weaknessVsUs: 重心在报警和平台可视化，而不是基于入住率的分类处理和修后证明。
  sourceRefs:
  - 24
  - 25
- name: Eddy Solutions
  stage: 成长期
  wedge: 为商业和多户住宅资产提供 24/7 监测的托管式漏水检测，以保险为导向进行宣传。
  pricing: 需询价 / 顾问主导。
  strength: 服务层扎实，理赔叙事有说服力。
  weaknessVsUs: 以北美市场为中心、偏重监测，而不是专门针对英国用水浪费工作流和保险公司报告。
  sourceRefs:
  - 26
- name: Metron
  stage: 现有厂商
  wedge: 面向商业物业的用水分表、租户计费和组合级监测。
  pricing: 需询价定制。
  strength: 在租户级可视化、计费和数据接入上有深厚的基础设施积累。
  weaknessVsUs: 是一套替代性的可视化系统，不是专为物业管理机构打造的异常到工单到验证的行动层。
  sourceRefs:
  - 28
  - 29
