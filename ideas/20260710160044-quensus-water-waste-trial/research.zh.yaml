  validationPlan:
  - priority: high
    question: 在一个 30 到 80 栋楼的资产组合里，经过入住率归一化后，有多大比例的异常真正值得派工处理？
    evidenceToGather: 至少五个共创客户资产组合的 90 天异常日志、设施管理分类处理记录和承包商结案结果。
  - priority: high
    question: 上线工作里有多少精力花在数据接入上，又有多少花在工作流变革管理上？
    evidenceToGather: 水表清单、AMR/BMS 连接器开发工作、入住率系统访问权限，以及首批试点的实施时间线。
  - priority: medium
    question: 保险公司或经纪商拿到验证过的维修报告后，真的会改变续保谈判吗？
    evidenceToGather: 续保问卷、工程建议，以及试点报告发出前后的经纪商反馈。
