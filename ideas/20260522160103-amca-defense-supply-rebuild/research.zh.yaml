competitors:
- name: Net-Inspect
  stage: 成长期
  wedge: 面向航天供应商质量、FAI 和偏差/让步工作流。
  pricing: 定制报价。
  strength: 非常贴近日常痛点，因为它本来就围绕供应商偏差请求和航空质量流转定位。
  weaknessVsUs: 看起来更偏门户和工作流，而不是一张可跨工厂复用的资质记忆图谱。
  sourceRefs:
  - 12
  - 16
- name: Octave Reliance (ETQ)
  stage: 成熟厂商
  wedge: 企业级质量事件、CAPA 和偏差管理。
  pricing: 企业报价；公开价格通常不可得。
  strength: 成熟的质量事件系统，调查和 CAPA 关联能力强。
  weaknessVsUs: 广覆盖的质量事件，并不等于多工厂场景下、面向国防备选来源的专用资质逻辑。
  sourceRefs:
  - 17
  - 29
- name: Arena by PTC
  stage: 成长期
  wedge: 面向航天国防的 GovCloud PLM/QMS 与变更控制协作。
  pricing: 打包的 GovCloud 档位加附加费用；最终价格按报价。
  strength: 在受控产品记录、合规、变更管理和供应商协作上能力很强。
  weaknessVsUs: 它以产品实现和记录控制为中心，不擅长跨独立工厂做中立的合格来源推荐与报批复用。
  sourceRefs:
  - 18
  - 19
- name: iBase-t
  stage: 成熟厂商
  wedge: 航天国防 MES、EQMS、供应商质量和数字线程。
  pricing: 企业报价。
  strength: 在航天运营端信誉深，as-built / as-maintained 可追溯性也很强。
  weaknessVsUs: 更适合重企业级、自有运营场景；而拟议创业公司可以聚焦更快的跨工厂资质决策。
  sourceRefs:
  - 20
  - 21
- name: Amca / RAPID
  stage: 成长期
  wedge: 收购工厂网络内部的一体化“从工程到合格生产”栈。
  pricing: 并不作为公开的独立软件出售。
  strength: 把软件、工厂所有权和关键零部件制造能力捆在同一个运营体里。
  weaknessVsUs: 它大概率是在优化自有网络，而不是服务独立供应商和 OEM 供应商开发团队的中立系统。
  sourceRefs:
  - 23
  - 24
  - 25
regulatoryTechnicalConstraints:
- point: 资质要求可能在授标前就要求审批，迫使供应商走正式的合格来源路径。
  sourceRefs:
  - 5
  - 14
- point: 不合格产品不能随便放行；接收必须有技术和合同层面的充分理由。
  sourceRefs:
  - 6
- point: DFARS 关于电子元件的规则，会把防伪、授权采购和承包商批准供应商逻辑一路压到各层级。
  sourceRefs:
  - 7
  - 15
- point: 处理受控数据的国防供应商，越来越需要达到 NIST/CMMC 成熟度，买家才愿意展开深协作。
  sourceRefs:
  - 8
  - 13
  - 34
- point: 主承包商专属的质量手册和 FAI 要求，仍然决定着买家期待的报批结构。
  sourceRefs:
  - 9
  - 10
  - 11
  - 12
  - 36
validationSignals:
- point: GAO 指出，DOD 依赖超过 200,000 家供应商，但对大多数原材料和零部件供应商仍缺乏可视化。
  sourceRefs:
  - 1
- point: Net-Inspect 直接把自己定位为替代航空供应链里“邮件混乱”的供应商偏差管理工具。
  sourceRefs:
  - 16
- point: 面向国防的 QMS 和 MES 买家指南已经把市场分门别类，并给出价格锚点，说明软件预算和品类成熟度都真实存在。
  sourceRefs:
  - 29
  - 30
- point: Amca 的融资轮和对外叙事，都把“更快资质认定”和“关键零部件制造现代化”放在正中央。
  sourceRefs:
  - 24
  - 25
openQuestions:
- 美国中型 AS9100 持证站点里，到底有多少真正落在国防机电滩头市场，而不是商用航空、MRO 或分销场景？
- 主承包商稳定接受数字化提交的报批段落有哪些，哪些地方仍然几乎必然要手工重写？
- 在提产或来源短缺场景里，第一笔软件预算到底归谁：工厂总经理、VP Quality，还是集团整合团队？
- 一家中立厂商最多能持有多少受控技术数据，之后 ITAR/CUI 义务才会反过来吃掉效率收益？
