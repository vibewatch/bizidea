slug: defense-subtier-qualification-graph
date: '2026-05-22'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: 月
  source: '[BP date 2026-05-22; startup-finance heuristic to start the model in the first full month after the business-plan date]'
- id: A2
  name: M1 的期初融资流入
  value: '3.9'
  unit: USDM
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M] base case uses a $3.9M pre-seed so the company can cover the 18-month operating plan plus a 6-month buffer.'
- id: A3
  name: 模型中的客户单位
  value: 活跃工厂站点
  unit: 定义
  source: '[BP businessModel.unitOfValue] and [research.market.som] both define value around a factory site using the qualification workflow.'
- id: A4
  name: Y1 每个活跃工厂站点的混合年收入
  value: '60.0'
  unit: USDK
  source: '[BP investorMemo.firstCustomer.initialContract $60k-$120k paid pilot for up to two factories] and [BP gtm.pricing] imply a pilot-heavy first year, so the model uses a lower annualized blended value while sites are still proving ROI.'
- id: A5
  name: Y2 每个活跃工厂站点的混合年收入
  value: '90.0'
  unit: USDK
  source: '[BP operatingAssumptions suppliers will pay roughly $75k-$100k per factory annually] and [research.market.sam rationale uses $90k ACV] support a base Y2 site value of $90K after initial pilot conversions.'
- id: A6
  name: Y3 每个活跃工厂站点的稳态年收入
  value: '100.0'
  unit: USDK
  source: '[BP operatingAssumptions $75k-$100k per factory annually] and [research.market.som rationale 24 factory sites at roughly $100k each] anchor the mature site ARPU at $100K.'
- id: A7
  name: 客户爬坡节奏
  value: M12 达到 4 个活跃工厂站点，Y2 第四季度达到 8 个，Y3 第四季度达到 24 个
  unit: 数量
  source: '[BP milestones 0-12 months] target 2 design partners and one annual conversion, [BP milestones 12-24 months] target 6-8 live factory sites, and [BP milestones 24-36 months plus research.market.som] point to 20-24 sites by year 3.'
- id: A8
  name: 毛利率爬坡
  value: Y1 为 50%-58%，Y2 为 62%-68%，Y3 为 69%-70%
  unit: 毛利率
  source: '[BP businessModel.targetGrossMarginPct 70] with early deployment, data mapping, and security overhead depressing gross margin before the implementation playbook standardizes.'
- id: A9
  name: 稳态月流失率
  value: '1.2'
  unit: 百分比
  source: '[BP operatingAssumptions first customer expands within 12 months] plus startup-finance heuristic for sticky, high-compliance workflow software with meaningful onboarding effort.'
- id: A10
  name: 每个新增工厂站点的全成本 CAC
  value: '55.0'
  unit: USDK
  source: '[BP gtm wedge and funnelTargets] describe founder-led, event-driven enterprise selling with plant visits and technical validation; startup-finance heuristic puts CAC above mid-market SaaS but below large-field-enterprise motions.'
- id: A11
  name: 按角色组划分的全成本年薪
  value: 创始人/CEO 170；工程 175；前线交付 150；国防质量与合规专家 160；安全负责人 190；销售与合作 170；客户成功 135；综合管理 110
  unit: 每 FTE 每年 USDK
  source: '[BP team] plus startup-finance heuristic for lean U.S. pre-seed defense workflow software cash compensation including payroll burden.'
- id: A12
  name: 招聘顺序
  value: M1 招创始人/CEO 和首位工程师；M3 招前线交付；M4 招质量与合规专家；M7 招安全负责人；M10 招首位销售；M12 招第二位工程师；M18 招客户成功；M31 招第二位销售；M34 招综合管理
  unit: 时点
  source: '[BP team] sets the first five hires and timing; later hires extend [BP strategicChoices.sequencingRationale] and [BP milestones] with a conservative GTM and support ramp only after pilots convert.'
- id: A13
  name: 非薪资销售与营销支出
  value: Y1 每月 $4K-$14K，Y2 每季度 $36K-$50K，Y3 每季度 $54K-$72K
  unit: USDK
  source: '[BP gtm channels] and startup-finance heuristic for founder-led account targeting, defense travel, trade events, and reference-building before scaled demand generation.'
- id: A14
  name: 非薪资研发支出
  value: Y1 每月 $7K-$16K，Y2 每季度 $39K-$48K，Y3 每季度 $48K-$57K
  unit: USDK
  source: '[BP product roadmap] and [BP operations] require cloud tooling, template libraries, integration work, and secure deployment hardening.'
- id: A15
  name: 非薪资综合管理支出
  value: Y1 每月 $5K-$9K，Y2 每季度 $21K-$30K，Y3 每季度 $33K-$42K
  unit: USDK
  source: '[BP operations] plus startup-finance heuristic for legal, insurance, compliance, finance, and contracting overhead in defense workflows.'
- id: A16
  name: 收入确认口径
  value: 月均活跃工厂站点数 × 年度 ARPU
  unit: 公式
  source: '[derived from A3-A7] monthly revenue equals average active sites in the month times annual ARPU divided by 12; quarterly revenue equals average active sites in the quarter times annual ARPU divided by 4.'
- id: A17
  name: 现金转换简化假设
  value: 用 EBITDA 近似经营现金流
  unit: 口径
  source: '[startup-finance heuristic for an early-stage planning model] assumes no debt, taxes, capex, or material working-capital timing differences beyond the operating P&L.'
- id: A18
  name: 融资规模规则
  value: 融资至少要覆盖 18 个月计划，并额外留出约 6 个月现金缓冲
  unit: 口径
  source: '[BP fundingAsk runwayMonths 18] combined with the financial-modeler instruction to size the round to the next milestone plus a 6-month buffer.'
