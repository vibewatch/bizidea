scenarios:
  downside:
    description: 如果安全审查更久、报批映射更定制化，落地后扩张节奏就会放慢，公司也难以跑到下一轮融资所需的站点数。
    y3RevenueK: 1105.0
    y3EbitdaK: -1331.25
    cashLowPointK: 195.0
    keyAssumptionChanges:
    - 稳态站点 ARPU 从 $100K 降到 $85K，因为更多客户停留在“试点态”。
    - 毛利率稳定在 65% 而不是 70%，因为部署仍偏服务化。
    - 销售周期从约 6 个月拉长到约 9 个月。
    - Y3 第四季度活跃工厂站点数只有 18 个，而不是 24 个。
  base:
    description: 基准情形假设，两家共创客户会被转成可复制的供应商侧工作流，活跃工厂站点从 Y1 的 4 个扩到 Y3 第四季度的 24 个。
    y3RevenueK: 1600.0
    y3EbitdaK: -935.51
    cashLowPointK: 591.0
    keyAssumptionChanges:
    - 稳态站点 ARPU 达到 $100K，对齐 BP 价格带上沿和研究里的 SOM 测算。
    - 毛利率到 Y3 才达到 BP 里的 70% 目标，因为实施工作要逐步标准化。
    - 销售周期保持事件驱动，在合格机会里大约 6 个月成交。
    - Y3 第四季度活跃工厂站点达到 24 个，对齐研究中的第三年 SOM 情形。
  upside:
    description: 如果模板复用和客户转介绍跑得更快，公司能在不明显增加固定支出的情况下，拿下更多多站点扩张订单。
    y3RevenueK: 1980.0
    y3EbitdaK: -623.91
    cashLowPointK: 902.6
    keyAssumptionChanges:
    - 稳态站点 ARPU 从 $100K 升到 $110K，来自高级报批自动化和分析模块。
    - 毛利率从 70% 提高到 72%，因为部署模板和安全数据边界更可复用。
    - 随着标杆客户和 OEM 介绍增加，销售周期压向 5 个月。
    - Y3 第四季度活跃工厂站点达到 28 个，而不是 24 个。
sensitivity:
- variable: ARPU
  downsideCase: $85K 稳态站点 ARPU
  baseCase: $100K 稳态站点 ARPU
  upsideCase: $110K 站点 ARPU，含高级工作流模块
  y3RevenueImpactK: -240.0
  cashImpactK: -168.0
- variable: CAC
