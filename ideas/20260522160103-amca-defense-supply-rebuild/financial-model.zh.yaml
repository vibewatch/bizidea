  baseCase: $55K 全成本 CAC
  upsideCase: 若伙伴渠道贡献更好，CAC 降到 $45K
  y3RevenueImpactK: 0.0
  cashImpactK: -300.0
- variable: 流失率
  downsideCase: 如果客户始终停留在单次事件，月流失率为 2.0%
  baseCase: 月流失率 1.2%
  upsideCase: 若第二工厂扩张成为常态，月流失率为 0.8%
  y3RevenueImpactK: -140.0
  cashImpactK: -110.0
- variable: 销售周期
  downsideCase: 受安全和模板审查拖累，销售周期变成 9 个月
  baseCase: 约 6 个月
  upsideCase: 参考客户更强时约 5 个月
  y3RevenueImpactK: -300.0
  cashImpactK: -255.0
- variable: 毛利率
  downsideCase: 若部署持续定制化，毛利率只有 65%
  baseCase: 目标毛利率 70%
  upsideCase: 部署手册更可复用时可达 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -80.0
- variable: 招聘节奏
  downsideCase: 第二位销售和综合管理岗位都提前两个季度招聘
  baseCase: 按 A12 中 BP 驱动的招聘顺序执行
  upsideCase: 若转介绍能覆盖管道，第二位销售延后到 Y3 第四季度再招
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[紧急资质事件] --> Pilots[付费试点站点]
      Pilots --> Sites[活跃工厂站点]
      Sites --> Revenue[订阅与项目收入]
      Revenue --> GrossProfit[扣除部署成本后的毛利润]
      GrossProfit --> Cash[现金跑道]
      Sites --> Expansion[第二工厂扩张]
      Expansion --> Revenue
modelSanity:
- checkName: 收入引擎
  finding: 基准收入不是靠激进的 seat 收费，而是把活跃工厂站点从 M12 的 4 个扩到 Y3 第四季度的 24 个，每站点稳态 ACV 约 $100K。
- checkName: 必须成立
  finding: 首批客户必须能扩到第二家工厂，并接受 6 周内完成的安全导出数据部署；只有这样，Y2 的 8 个站点才能合理跳到 Y3 的 24 个。
- checkName: 模型失效条件
  finding: 如果安全审查和报批模板一直让部署保持定制化，downside 情形下现金会被压到约 $195K，业务也会滑向重服务经济模型。
- checkName: 下一轮融资证明
  finding: 公司只有在证明 6-8 个活跃工厂站点、至少 1 次第二工厂扩张，以及 1 个 OEM 或 roll-up 试点都能跑在可复制的部署手册上时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 growth 196.3% + EBITDA margin -58.5% = 137.8%
  burnMultiple: 0.9x in Y3 (~$936K EBITDA burn on ~$1.06M net-new revenue versus Y2)
  revenuePerFte: $160K Y3 using Q4Y3 headcount of 10 FTE (below the $200-400K SaaS benchmark because the wedge is still deployment-heavy)
  flags:
  - 基准情形到 Y3 仍然 EBITDA 为负，因此下一轮融资看的不是短期盈利，而是扩张路径是否可复制。
  - 按 Y3 的收入与 10 人团队计算，Revenue per FTE 仍低于经典 SaaS 基准，因为前线交付、安全和模板工作仍是交付的重要部分。
  - 毛利率到 Y3 才碰到 70% 目标；如果安全部署始终保持定制化，模型会吃掉原本预留的缓冲。
  - 直接卖给供应商的滩头市场只有 $57.5M SAM，因此投资回报上限仍取决于能否扩到 OEM、roll-up 或更多工作流。
