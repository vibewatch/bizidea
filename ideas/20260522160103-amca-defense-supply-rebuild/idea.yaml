topRisks:
  - name: Data capture friction
    description: Legacy factories may not have clean digital records, making the first implementation slower than buyers expect.
    mitigation: Start with one qualification workflow, combine software with guided evidence mapping, and prove time savings before broad rollout.
  - name: Incumbent system overlap
    description: Buyers may assume ERP, QMS, or homegrown trackers already cover the problem well enough.
    mitigation: Position around cross-factory qualification reuse and approval generation, which incumbent systems store but do not automate.
  - name: Slow defense sales cycles
    description: Even painful factory problems can move slowly if budget authority sits with conservative operators or prime customers.
    mitigation: Sell first into acquisition integrations and urgent source-expansion events where delay has visible program and revenue consequences.
