problem: >-
  U.S. defense readiness often stalls in small, certified component factories where qualification evidence, machine limits, and exception history live in tribal memory, emails, and local files. When a program needs a new source, a drawing revision, or a rate increase, these shops rebuild proof packages by hand and lose weeks or months before a part can ship. The result is not just slower manufacturing; it is fragile supply capacity in the exact sub-tier components that major programs depend on.
targetUser:
  primary: VP Quality, head of operations, or GM at a 50-250 person U.S. ITAR-compliant electromechanical component supplier serving fighter, missile, or avionics programs.
  secondary: Supplier-development managers at defense OEMs trying to expand qualified capacity across fragile sub-tier component networks.
  buyer: VP Quality or site GM at a certified defense component manufacturer.
startupThesis:
  nonObviousInsight: >-
    The real defense supply bottleneck is not a lack of factories; it is the lack of reusable qualification memory inside fragmented, certified sub-tier shops. Amca’s acquisitions and workflow claims suggest the winning layer is the software graph that knows which process, material, test result, and exception history can justify a new source or faster release across a network.
  beachhead: Alternate-source qualification and deviation-control workflow for U.S. certified suppliers making low-volume, high-criticality power, sensor, and flight-control assemblies for active defense programs.
  wedge: A qualification graph that turns prior build records, test evidence, and process constraints into ready-to-submit approval packets for new parts, backup suppliers, and engineering changes.
  whyNowCatalyst: Amca’s funding, supplier roll-up, and claim of a 67% qualification-time reduction show that compressing approval cycles in sub-tier defense manufacturing has become urgent and budget-worthy.
  ventureScalePath: >-
    Start as the system of record for qualification and alternate-source decisions inside certified component shops, then expand upstream to primes, supplier-development teams, and defense lenders or insurers as the cross-factory readiness graph for who can build what, under which constraints, and how fast.
solution: >-
  The product ingests drawings, process plans, prior build history, test artifacts, and quality exceptions from each factory, then maps them into a capability graph by part family, machine, material, and supplier. When a customer asks for a second source, faster release, or design change, the system shows which evidence can be reused, what gaps remain, and which internal or external shop is most likely to qualify. It then generates the approval packet, routes required signoffs, and keeps a traceable record of why a source or deviation was approved. Over time, the graph becomes the fastest way for a supplier or prime to see latent capacity inside a fragmented certified network without waiting for months of manual discovery.
goToMarketSeed:
  firstCustomer: A 100-person U.S. electromechanical defense supplier with one legacy factory and one newly acquired shop that both build power-conversion or actuator assemblies for a fighter sustainment or missile program.
  buyingTrigger: A new rate increase, acquisition integration, or prime request to qualify a backup source after a component shortage or engineering change.
  currentAlternative: Email, spreadsheets, shared drives, ERP/QMS records, and tribal engineer knowledge stitched together for each qualification event.
  switchingReason: The first customer switches because the product reuses past evidence across factories and cuts weeks of manual packet assembly, helping them win more approved work without adding scarce quality engineers.
  pricingHypothesis: Annual software subscription per factory plus onboarding and premium fees tied to active qualification programs or alternate-source packages.
