jobsToBeDone:
  - job: When a prime asks us to approve a backup source or absorb more volume, help our quality team reuse prior evidence quickly, so they can win the work without months of manual packet assembly.
    currentAlternative: Manual evidence gathering across email, spreadsheets, and local file shares.
    successMetric: Days from qualification request to approved source package.
  - job: When we acquire or add a second certified shop, help operations map what that factory can credibly build, so they can shift constrained parts without guessing.
    currentAlternative: Site visits, expert interviews, and ad hoc spreadsheet comparisons.
    successMetric: Time to first approved cross-site transfer or release.
