problem: 美国国防备战能力，常常卡在那些规模不大但拿着认证的零部件工厂里：资质证据、设备约束、例外历史散在老师傅脑子里、邮件里和本地文件里。项目一旦要新增来源、改图纸或提产能，这些工厂就得手工把证明材料再拼一遍，零件能出货前往往要白白耗掉几周甚至几个月。问题不只是制造更慢，而是主项目最依赖的那批次级关键部件，整体供应能力都变得很脆。
targetUser:
  primary: 美国一家 50-250 人、符合 ITAR 的机电零部件供应商里的 VP Quality、运营负责人或总经理，服务对象是战斗机、导弹或航电项目。
  secondary: 国防 OEM 里的供应商开发负责人，他们想在脆弱的次级零部件网络里扩充合格产能。
  buyer: 持证国防零部件制造商的 VP Quality 或工厂总经理。
startupThesis:
  nonObviousInsight: 真正的国防供应瓶颈，不是工厂不够，而是分散的持证次级工厂里没有可复用的资质记忆。Amca 的收购动作和工作流打法说明，最值得做的一层，是一张软件图谱：它知道哪道工艺、哪种材料、哪份测试结果和哪段例外历史，足以在整个网络里为新增来源或更快放行背书。
  beachhead: 面向美国持证供应商的备选来源资质认定与偏差控制工作流，先切低产量、高关键性的电源、传感器和飞控组件，服务仍在执行中的国防项目。
  wedge: 一张资质图谱，把过往生产记录、测试证据和工艺约束转成可直接提交的新零件、备援供应商和工程变更报批包。
  whyNowCatalyst: Amca 的融资、供应商整合，以及其 67% 资质时间缩短的宣称，都说明：在国防次级制造里压缩审批周期，已经变成紧迫且有预算承接的问题。
  ventureScalePath: 先在持证零部件工厂内部，做成资质和备选来源决策的记录中枢；随后向上扩到主承包商、供应商开发团队，以及国防贷款方或保险方，成为一张跨工厂的备战图谱——谁能造什么、受哪些约束、多久能放量，一眼能看清。
solution: 产品会吃进各工厂的图纸、工艺计划、过往生产历史、测试资料和质量例外，再按零件族、设备、材料和供应商映射成一张能力图谱。客户一旦提出第二来源、更快放行或设计变更，系统就能直接指出哪些证据可复用、还缺什么、内部或外部哪家工厂最有希望通过资质。接着它自动生成报批包、流转所需签核，并留下可追溯记录，说明某个来源或偏差为什么被批准。时间越久，这张图谱越像一条最快通道：供应商或主承包商不用再花几个月手工摸底，也能看见分散持证网络里的潜在产能。
goToMarketSeed:
  firstCustomer: 一家 100 人规模的美国机电类国防供应商，手里有一座老厂和一座新收购工厂，两边都在为战斗机维保或导弹项目生产电源转换或执行器总成。
  buyingTrigger: 新的提产要求、并购整合，或主承包商在零部件短缺或工程变更后要求他们尽快认证一个备援来源。
  currentAlternative: 邮件、表格、共享盘、ERP/QMS 记录，再加上工程师脑子里的经验知识，每次资质事件都临时缝一遍。
  switchingReason: 首批客户会切换，是因为这套产品能跨工厂复用历史证据，把手工拼包的几周工作压下来，让他们不增加稀缺质量工程师，也能拿下更多已批准订单。
  pricingHypothesis: 按工厂收年费的软件订阅，再叠加入驻费，以及与活跃资质项目或备选来源报批包挂钩的高级费用。
