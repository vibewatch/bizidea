topRisks:
- name: 数据采集阻力
  description: 老工厂未必有干净的数字记录，首轮实施可能比买家预期更慢。
  mitigation: 先盯住一个资质工作流，软件搭配引导式证据映射，先把时间节省跑出来，再扩大范围。
- name: 现有系统重叠
  description: 买家可能会觉得 ERP、QMS 或自建跟踪器已经把问题覆盖得差不多。
  mitigation: 定位成跨工厂的资质复用和审批生成层——这些事现有系统只会存，不会自动干。
- name: 国防销售周期慢
  description: 就算工厂问题很疼，只要预算权掌握在保守运营方或主承包客户手里，推进还是可能很慢。
  mitigation: 先卖给并购整合和紧急扩源场景，因为这些场景里，延误会直接打到项目和收入。
