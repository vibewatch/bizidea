jobsToBeDone:
- job: 当主承包商要求我们尽快批准备援来源或承接更多量时，帮质量团队快速复用历史证据，这样他们不用花几个月手工拼包，也能把订单拿下来。
  currentAlternative: 在邮件、表格和本地共享盘之间手工搜证据。
  successMetric: 从收到资质请求到完成来源报批包的天数。
- job: 当我们收购或新增第二家持证工厂时，帮运营团队看清这家厂到底能可靠生产什么，这样他们调拨受限零件时不用靠猜。
  currentAlternative: 去现场、访谈专家，再临时拉表比来比去。
  successMetric: 第一次跨厂转移或放行获批所需时间。
