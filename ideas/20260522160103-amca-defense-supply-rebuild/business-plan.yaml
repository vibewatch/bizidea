slug: defense-subtier-qualification-graph
date: '2026-05-22'
executiveSummary: >-
  Defense Subtier Qualification Graph is a workflow and data layer for U.S.
  AS9100 and ITAR-compliant component suppliers that need to qualify alternate
  sources, approve deviations, and transfer work between certified shops without
  rebuilding evidence from scratch. The first sale is to a 50-250 person
  electromechanical supplier facing a rate increase, shortage, engineering
  change, or post-acquisition site transfer. Instead of replacing ERP, QMS, or
  PLM, the product ingests exported records, identifies reusable proof, and
  generates ready-to-submit approval packets with auditable signoffs. Research
  supports a $57.5M SAM and a plausible $2.4M year-three SOM for this narrow
  beachhead, so the venture case depends on later expansion into OEM
  supplier-development teams, roll-up operators, and broader multi-factory
  readiness workflows. The go-to-market system is event-driven: founder-led
  sales into urgent qualification events, paid pilots scoped to one packet type
  and one program, and conversion to annual per-factory subscriptions once cycle
  time improvement is proven. Defensibility comes from accumulating reusable
  approval logic across parts, processes, materials, machines, and exception
  histories that incumbent systems currently store but do not operationalize.
  The main investor risk is that data mapping, security controls, and
  customer-specific templates could make the business too services-heavy before
  recurring software value is obvious. Key diligence gaps remain around real
  budget ownership, acceptable levels of digital packet automation, and how many
  packet sections primes will accept without manual rewriting.
problem:
  - Qualification evidence for alternate sources, deviations, and site transfers is fragmented across email, spreadsheets, ERP or QMS records, PDFs, and veteran engineer memory, so each event restarts packet assembly from scratch.
  - In mission-critical power, sensor, avionics, and flight-control assemblies, a delayed approval packet blocks revenue, shipment, and readiness at exactly the factories primes need to expand qualified capacity.
solution:
  - A qualification graph normalizes drawings, process plans, prior build history, test artifacts, machine and material constraints, and exception history into reusable evidence objects by part family and factory.
  - The workflow engine identifies which proof can be reused, flags missing evidence, generates buyer-ready approval packets, routes required signoffs, and creates a traceable record for future qualification events.
whyWeWin:
  - QMS, PLM, MES, and prime portals store records but do not answer the supplier-side question of whether an alternate source, deviation, or cross-site transfer is approvable now with evidence already on hand.
  - Once the system captures which packets were accepted, by whom, and under what process constraints, it becomes a sticky approval-memory layer that is harder to replicate than generic workflow software.
strategicChoices:
  beachhead: Alternate-source qualification and deviation control for U.S. mid-sized defense electromechanical suppliers running low-volume, high-criticality power, sensor, actuator, and flight-control assemblies across one or two certified factories.
  wedgeRationale: The fastest proof point is one painful qualification packet tied to a live shortage, rate increase, engineering change, or acquisition integration, because that event has a visible deadline, a measurable current process, and an economic buyer who feels the cost of delay immediately.
  sequencingRationale: Start as a supplier-side overlay using exported data so the company can prove a 30%+ cycle-time reduction before taking on deeper secure integrations; then expand inside the same account to more factories and packet types; only after that pursue OEM supplier-development and network-wide capacity mapping, because selling the broad readiness vision before proving one workflow would stretch product, security, and go-to-market all at once.
  notYet:
    - Broad factory operating-system claims across scheduling, MES, or procurement
    - Full replacement of incumbent ERP, QMS, or PLM systems
    - International deployments outside the U.S. controlled-data perimeter
    - Generic commercial aerospace or non-defense manufacturing workflows
market:
  tam: $240.0M
  sam: $57.5M
  som: $2.4M
  segments:
    - U.S. 50-250 employee AS9100 and ITAR-compliant electromechanical component suppliers serving active defense programs
    - OEM supplier-development teams and manufacturing roll-up operators trying to move qualified work across fragile sub-tier networks
  buyingProcess: >-
    The economic sponsor is likely a VP Quality or site GM when a live
    qualification event threatens revenue or delivery, but operations, IT,
    security, and customer program stakeholders all influence adoption because
    the workflow touches controlled data and incumbent systems. The practical
    first deal is a paid pilot around one urgent packet type, not a top-down
    digital-transformation purchase.
product:
  mvp: >-
    MVP covers one packet family: alternate-source qualification and deviation
    control for one part family across up to two factories. It ingests exports
    from document systems, ERP, and QMS records, recommends reusable evidence,
    and assembles a buyer-ready packet with signoff routing and audit trail.
  sixMonth: Ship the qualification graph, packet builder, evidence-gap checklist, user permissions, and first connectors for exported ERP, QMS, and document-system data at one lighthouse customer.
  twelveMonth: Prove production use on at least three live qualification events, add cross-factory capability comparison, and support prime-specific output templates for the first two OEM customer families.
  twentyFourMonth: Expand from one packet workflow into a multi-factory approval system covering alternate-source, deviation, engineering-change, and site-transfer events with benchmarking across customer sites.
  keyBets:
    - Exported-data workflows can prove value before deep system integration or full controlled-data ingestion is required.
    - One workflow that cuts days-to-packet by at least 30% is enough to overcome incumbent-overlap objections and convert pilots into annual contracts.
    - Accepted packet history compounds into a differentiated approval-memory graph that improves recommendations and reuse over time.
    - Multi-factory suppliers and roll-up operators will expand from one site to additional factories faster than the company can win greenfield logos.
gtm:
  wedge: Founder-led sale into one multi-site or backup-source qualification event where a supplier must win approved capacity quickly and cannot hire enough experienced quality engineers to brute-force the packet.
  channels:
    - Direct founder-led sales to VP Quality, site GMs, and heads of operations at defense component suppliers
    - Warm introductions through defense manufacturing investors, consolidators, and roll-up operators
    - Program-specific pilots with OEM supplier-development or portal teams after the supplier-side workflow is proven
    - Integration referrals from ERP, QMS, and PLM implementation partners already inside the account
  funnelTargets: "Target account→qualified pilot 20-30%, qualified pilot→paid pilot 50%+, paid pilot→annual contract 60%+, first factory→second factory expansion 35%+ within 12 months"
  pricing: >-
    Charge a paid pilot for one live qualification program, then convert to an
    annual subscription priced per factory plus onboarding and fees for active
    qualification programs that need premium packet automation. The pricing
    basis is avoided quality-engineer labor and faster approved capacity, not
    seat count alone.
businessModel:
  revenueStreams:
    - Annual software subscription per factory site using the qualification workflow
    - Paid onboarding, data mapping, and template configuration services
    - Premium fees for active qualification programs, cross-factory analytics, and OEM collaboration modules
  unitOfValue: Factory site using the platform for qualification and deviation workflows
  targetGrossMarginPct: 70
  expansionLevers:
    - Additional factories at the same customer
    - Additional packet types such as engineering changes, site transfers, and recurring deviation workflows
    - OEM supplier-development deployments that standardize packet intake across multiple suppliers
    - Benchmarking and readiness analytics once enough approved events have been captured
strategyMap:
  northStarMetric: Approved qualification events completed through the platform
  inputMetrics:
    - Days from qualification request to submitted packet
    - Percentage of packet sections reused from prior approved evidence
    - Pilot-to-annual-contract conversion rate
    - Time from deployment start to first live packet
    - Average number of factories expanded per customer within 12 months
  moatsToBuild:
    - Historical graph linking part families, process constraints, test evidence, deviations, and approval outcomes
    - Prime-specific packet templates and routing logic grounded in real accepted submissions
    - Security, deployment, and integration playbooks that fit ITAR, CUI, and supplier cybersecurity constraints
  killCriteria:
    - Fewer than 3 of 12 target buyers confirm that a typical qualification event consumes at least 80 engineer-hours and merits a paid pilot.
    - No pilot achieves a 30%+ reduction in days-to-packet or a 50%+ evidence-reuse rate within the first 6 months of live use.
    - The first 2 deployments require more than 8 weeks of custom data mapping before a live packet can be generated.
  mermaid: |
    flowchart LR
      Wedge[Alternate-source and deviation wedge] --> MVP[Qualification graph MVP]
      MVP --> Proof[Accepted packets and shorter cycle time]
      Proof --> Expansion[Multi-factory and OEM network expansion]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong wedge and regulated pain signal, but conviction depends on proving budget ownership and low-friction deployment in the first two pilots.
    whyBelieve: Qualification delay is already an explicit readiness bottleneck and incumbents do not appear to provide reusable cross-factory approval memory.
    whyDoubt: The beachhead is not large enough on its own, and the company could collapse into bespoke services if data security and packet templating stay too customer-specific.
    nextDiligence: Win one paid pilot at a two-factory supplier and show a 30%+ reduction in days to an accepted alternate-source or deviation packet.
  firstCustomer:
    title: VP Quality at a dual-site electromechanical defense supplier
    profile: 50-250 employee U.S. ITAR-compliant manufacturer with one legacy plant and one backup or newly acquired site building power-conversion, actuator, or sensor assemblies for a live fighter, missile, or avionics program.
    trigger: A rate increase, shortage, acquisition integration, or engineering change forces the company to qualify a backup source or transfer work faster than its current manual packet process allows.
    buyer: VP Quality or site GM
    initialContract: $60k-$120k paid pilot for one program and up to two factories, converting to a $150k-$250k annual subscription plus onboarding once the workflow becomes the default qualification system
  mustBeTrue:
    - Target buyers spend more than 80 quality or engineering hours and more than 30 elapsed days on a typical alternate-source or site-transfer packet.
    - The first customer can realize a 30%+ cycle-time reduction using exported data before full secure-system integration is required.
    - A VP Quality or site GM controls enough discretionary budget to fund a pilot during a shortage, rate increase, or acquisition integration event.
    - Prime and government packet requirements are reusable enough across events for accepted-history data to compound into product advantage.
    - At least 30% of initial customers have a second-factory or adjacent-program expansion path within 12 months of the first annual contract.
  diligenceQuestions:
    - What were the last five alternate-source, deviation, or site-transfer packets at target accounts, and how long did each take?
    - Which executive actually signs the software budget when a qualification delay threatens shipments or revenue?
    - Which packet sections can be auto-populated from existing records in pilot one, and which sections still require manual rewriting?
    - What level of controlled technical data can the vendor host without triggering unacceptable ITAR or CUI friction for smaller suppliers?
    - How often does the first customer face a qualifying event severe enough to justify annual subscription rather than project-by-project services?
operatingAssumptions:
  - assumption: Buyers will approve a paid pilot when it is tied to a named live qualification event rather than a general software modernization project.
    basis: research.yaml
    validationTest: Interview 10 VP Quality, GM, or operations leaders and secure at least 2 pilot LOIs tied to named alternate-source, deviation, or site-transfer events.
    decisionImpact: If false, the company must sell through OEM, integrator, or services-led channels instead of direct supplier sales.
  - assumption: Exported ERP, QMS, and document-system data is sufficient to generate a useful first packet without deep system replacement.
    basis: operator judgment
    validationTest: Build one prototype on a historical customer packet and confirm that at least 70% of required packet fields can be assembled from exported records.
    decisionImpact: If false, implementation time and burn increase materially, forcing a narrower ICP and a larger services-heavy funding plan.
  - assumption: Suppliers will pay roughly $75k-$100k per factory annually once the product proves time savings and packet acceptance.
    basis: idea.yaml
    validationTest: Measure labor saved and delay avoided in the first two pilots, then obtain one signed annual contract within the modeled price band.
    decisionImpact: If false, the company must either lower pricing, bundle more workflows, or move upmarket, each of which changes the hiring and capital plan.
  - assumption: System-generated packets and digital audit trails will be accepted by at least some prime or government-facing workflows without substantial manual reformatting.
    basis: research.yaml
    validationTest: Map one output to an existing prime template and have two quality leaders review whether the packet is acceptable with minor edits only.
    decisionImpact: If false, the product becomes a workflow assistant rather than a packet system of record, weakening moat and expansion value.
  - assumption: The first lighthouse customer will expand to an additional factory, packet type, or OEM-facing workflow within 12 months.
    basis: research.yaml
    validationTest: Ensure the first two customers each have at least one identified adjacent use case at contract signature and close one expansion sale within a year.
    decisionImpact: If false, the researched SOM case is harder to reach and the company may not support venture-scale returns.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Quantify current packet effort at beachhead suppliers
    hypothesis: Target buyers will show repeatable packet delays and labor costs large enough to justify a paid pilot.
    successMetric: 10 buyer interviews completed, 3 recent packets benchmarked, and 2 pilot LOIs signed
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build historical packet reconstruction prototype
    hypothesis: Exported records can populate most of a real alternate-source or deviation packet without replacing incumbent systems.
    successMetric: One historical packet reconstructed with at least 70% of fields auto-populated and validated by a customer champion
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run first live qualification-event pilot
    hypothesis: The product can cut days-to-packet by at least 30% on a live event at the first design partner.
    successMetric: 30%+ reduction in elapsed time and customer approval to use the platform on a second live event
    owner: Forward deployment engineer
  - horizon: 90–180 days
    experiment: Validate controlled-data deployment boundary
    hypothesis: A U.S.-only controlled deployment can go live in under 6 weeks without bespoke security architecture.
    successMetric: Time from signed pilot to first live packet under 6 weeks for pilot two
    owner: Security lead
  - horizon: 6–12 months
    experiment: Test prime-template acceptance
    hypothesis: Buyer-specific packet outputs can be standardized enough to avoid manual rewrite of most sections.
    successMetric: Two template families supported and at least 80% of packet sections accepted with minor edits only
    owner: Product lead
  - horizon: 6–12 months
    experiment: Prove second-factory expansion motion
    hypothesis: The easiest revenue expansion is a second factory or adjacent packet type at the first customer, not a net-new logo.
    successMetric: One expansion order signed within 12 months of the first annual contract
    owner: Founder CEO
operations:
  - U.S.-only deployment model with clear ITAR and CUI data boundaries, role-based approvals, and auditable access logs
  - White-glove onboarding playbook that maps one packet family first before expanding to broader site coverage
  - Integration toolkit for exported ERP, QMS, document-repository, and quality-event data so pilots can launch without full rip-and-replace
  - Template library for major prime and OEM packet formats treated as delivery endpoints rather than systems to replace
  - Customer-success cadence centered on each live qualification event, with before-and-after cycle-time measurement built into delivery
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, design-partner recruiting, and pricing because the first market is concentrated, trust-heavy, and event-driven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the graph model, packet engine, and first integrations fast enough to support a live pilot in the first two quarters.
  - role: Forward deployment engineer
    startTiming: Month 2
    rationale: Compress customer-specific data mapping and turn pilots into repeatable implementation playbooks.
  - role: Defense quality and compliance SME
    startTiming: Month 3
    rationale: Encode real qualification, deviation, FAI, and audit logic so the product reflects how suppliers and primes actually approve packets.
  - role: Security lead
    startTiming: Month 6
    rationale: Secure deployment and controlled-data handling are gating requirements for broader rollout and OEM-facing expansion.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 design partners with live alternate-source, deviation, or site-transfer events
      - Ship MVP covering one packet family and one two-factory workflow
      - Complete 3 live qualification events and convert at least 1 customer to an annual contract
      - Demonstrate a 30%+ reduction in days-to-packet at the first production customer
  - horizon: 12–24 months
    items:
      - Reach 6-8 live factory sites across supplier customers
      - Launch cross-factory capability comparison and second packet-family support
      - Close the first second-factory expansion sale and first OEM or roll-up pilot
      - Standardize controlled deployment with time to first live packet under 6 weeks
  - horizon: 24–36 months
    items:
      - Reach 20-24 live factory sites, consistent with the researched year-three SOM case
      - Convert the best customer into a multi-factory reference account with at least 3 active workflows
      - Launch benchmark reporting on qualification cycle time and packet reuse across anonymized customer data
      - Prove at least one repeatable channel through OEM supplier-development teams or manufacturing roll-up operators
risks:
  - risk: Legacy records are too fragmented for the first customer to produce a clean historical packet baseline.
    likelihood: High
    impact: High
    mitigation: Start with one recent packet, provide guided evidence mapping, and use forward deployment resources before promising broad system coverage.
  - risk: Buyers decide existing QMS, PLM, or prime-portal workflows are good enough and will not fund a new layer.
    likelihood: High
    impact: High
    mitigation: Sell against measured cycle-time reduction on one live event and position the product as the missing evidence-reuse layer above incumbent systems.
  - risk: ITAR, CUI, and cybersecurity requirements stretch deployment time and increase services burden.
    likelihood: High
    impact: High
    mitigation: Keep the beachhead U.S.-only, constrain hosted data domains, and prove value with exported-data workflows before deeper integrations.
  - risk: Packet requirements vary too much by buyer for accepted-history data to compound into a reusable product moat.
    likelihood: Medium
    impact: High
    mitigation: Prioritize customers concentrated around a small number of prime template families and measure reuse at the section level from the first pilot onward.
  - risk: Expansion beyond the initial supplier-side wedge fails, leaving the company in a subscale niche.
    likelihood: Medium
    impact: High
    mitigation: Treat second-factory expansion and one OEM or roll-up pilot as required milestones before raising the next round.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-4M
  runwayMonths: 18
  useOfFundsSummary: Build the MVP, complete secure deployment and first integrations, win 2 design partners, convert at least 1 live pilot into annual software revenue, and prove second-factory expansion plus one OEM or roll-up pilot within 18 months.
