    cashImpactK: -80.0
  - variable: hiring pace
    downsideCase: "Pull forward the second sales hire and G&A hire by two quarters"
    baseCase: "Hire on the BP-driven sequence in A12"
    upsideCase: "Delay the second sales hire until Q4Y3 if referrals cover the pipeline"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Urgent qualification events] --> Pilots[Paid pilot sites]
      Pilots --> Sites[Active factory sites]
      Sites --> Revenue[Subscription and program revenue]
      Revenue --> GrossProfit[Gross profit after deployment COGS]
      GrossProfit --> Cash[Cash runway]
      Sites --> Expansion[Second-factory expansions]
      Expansion --> Revenue
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by expanding active factory sites from 4 at M12 to 24 at Q4Y3 at roughly $100K steady-state site ACV, not by aggressive seat-based monetization.
  - checkName: Must go right
    finding: The first customers must expand to second factories and accept secure exported-data deployment in under 6 weeks, because that is what makes the jump from 8 sites in Y2 to 24 in Y3 believable.
  - checkName: Model breaks if
    finding: If security review and packet templating keep deployments bespoke, the downside case compresses cash toward roughly $195K and the business drifts into services-heavy economics.
  - checkName: Next-round proof
    finding: The next financing is justified once the company shows 6-8 live factory sites, at least one second-factory expansion, and one OEM or roll-up pilot on a repeatable deployment playbook.
sanityChecks:
  ruleOf40: "Y3 growth 196.3% + EBITDA margin -58.5% = 137.8%"
  burnMultiple: "0.9x in Y3 (~$936K EBITDA burn on ~$1.06M net-new revenue versus Y2)"
  revenuePerFte: "$160K Y3 using Q4Y3 headcount of 10 FTE (below the $200-400K SaaS benchmark because the wedge is still deployment-heavy)"
  flags:
    - "The base case is still EBITDA-negative in Y3, so the next round depends on proof of repeatable expansion rather than near-term profitability."
    - "Revenue per FTE remains below classic SaaS benchmarks because forward deployment, security, and template work are still meaningful parts of delivery."
    - "Gross margin only reaches the 70% target by Y3; if secure deployments stay bespoke, the model will miss the planned buffer."
    - "The direct supplier beachhead is only a $57.5M SAM, so investor upside still requires OEM, roll-up, or multi-workflow expansion beyond the first wedge."
