    baseCase: "1.2% monthly churn"
    upsideCase: "0.8% monthly churn with second-factory expansion as the norm"
    y3RevenueImpactK: -140.0
    cashImpactK: -110.0
  - variable: sales cycle
    downsideCase: "9 months because security and template review drag"
    baseCase: "About 6 months"
