slug: defense-subtier-qualification-graph
date: '2026-05-22'
executiveSummary: Defense Subtier Qualification Graph 是一层工作流和数据系统，服务美国 AS9100 与 ITAR 合规的零部件供应商，帮助它们在不用从头重建证据的前提下，完成备选来源资质认定、偏差审批和持证工厂之间的任务转移。第一单先卖给 50-250 人的机电类供应商——他们正面临提产、短缺、工程变更，或并购后的站点切换。产品不去替换 ERP、QMS 或 PLM，而是吃进导出记录，找出可复用证明，并生成带可审计签核的可提交报批包。研究给出的滩头市场 SAM 为 $57.5M，第三年 SOM 做到 $2.4M 也算说得通，因此这门生意要成立，后续必须扩到 OEM 供应商开发团队、整合平台和更广义的多工厂备战工作流。GTM 是事件驱动：创始人亲自卖进紧急资质事件，把试点范围收窄到一种报批包和一个项目；一旦证明能缩短周期，再转成按工厂收取的年费订阅。护城河来自跨零件、工艺、材料、设备和例外历史不断累积的可复用审批逻辑——这些东西现有系统在存，但没有真正用起来。投资人最该担心的是：数据映射、安全控制和客户特定模板，会不会在软件价值跑通前，就把业务拖成重服务模式。当前仍有几处关键尽调空白：预算到底归谁、数字化报批包能被接受到什么程度，以及主承包商到底有多少报批包段落愿意不经手工重写就直接收。
problem:
- 备选来源、偏差和跨厂转移所需的资质证据，散在邮件、表格、ERP 或 QMS 记录、PDF 以及老工程师的经验里，所以每次事件发生，都得从零再拼一次报批包。
- 在电源、传感器、航电和飞控这类任务关键总成里，一份审批包拖住，就会同时卡住收入、出货和备战能力——偏偏主承包商最想扩产的，就是这些工厂。
solution:
- 资质图谱把图纸、工艺计划、过往生产历史、测试资料、设备与材料约束、例外记录，按零件族和工厂标准化为可复用证据对象。
- 工作流引擎会判断哪些证明可以复用、哪些证据还缺、自动生成面向买家的报批包、流转所需签核，并为后续资质事件留下可追溯记录。
whyWeWin:
- QMS、PLM、MES 和主承包商门户会存记录，但它们回答不了供应商最关心的问题：眼下这次备选来源、偏差或跨厂转移，靠手头已有证据到底能不能批。
- 系统一旦积累起哪些报批包被谁接受、在什么工艺约束下通过，它就会变成一层黏性很强的审批记忆，比泛工作流软件更难复制。
strategicChoices:
  beachhead: 先切美国中型国防机电供应商的备选来源资质认定和偏差控制场景：这些公司通常有一到两家持证工厂，生产低产量、高关键性的电源、传感器、执行器和飞控总成。
  wedgeRationale: 最快能跑出证明的，不是宏大数字化愿景，而是一个正在发生、且足够疼的资质报批包：短缺、提产、工程变更或并购整合都会触发。因为这类事件有明确截止日、有现成流程可量化，也有真正在为延误买单的经济买家。
  sequencingRationale: 第一步先做供应商侧叠加层，只吃导出数据，这样能先证明周期缩短 30%+，再去碰更深的安全集成；第二步在同一客户里扩到更多工厂和更多报批包类型；只有前两步跑通后，才去打 OEM 供应商开发和网络级产能映射。否则产品、安全和 GTM 会被同时拉爆。
  notYet:
  - 不做横跨排产、MES 或采购的广义工厂操作系统叙事
  - 不做对现有 ERP、QMS 或 PLM 的全面替换
  - 不碰美国受控数据边界之外的国际部署
  - 不做通用商用航空或非国防制造工作流
market:
  tam: $240.0M
  sam: $57.5M
  som: $2.4M
  segments:
  - 美国 50-250 人、符合 AS9100 与 ITAR 的机电零部件供应商，服务仍在执行中的国防项目
  - 想在脆弱次级网络里更快转移合格工作量的 OEM 供应商开发团队和制造整合平台
  buyingProcess: 真正出钱的人，大概率是 VP Quality 或工厂总经理——前提是眼前有一件正在威胁收入或交付的资质事件。与此同时，运营、IT、安全和客户项目方都会影响采购，因为这套工作流会碰到受控数据和现有系统。现实里的第一单，更像围绕一个紧急报批包的付费试点，而不是自上而下的数字化转型采购。
product:
  mvp: MVP 只覆盖一类报批包：围绕一个零件族、最多两家工厂的备选来源资质认定与偏差控制。系统吃进文档系统导出、ERP 和 QMS 记录，推荐可复用证据，并把它们拼成面向买家的报批包，带上签核流和审计轨迹。
  sixMonth: 6 个月内交付资质图谱、报批包构建器、证据缺口清单、用户权限，以及面向一位灯塔客户的首批 ERP、QMS 和文档系统导出连接器。
  twelveMonth: 12 个月内至少在 3 个真实资质事件里跑到生产使用，补上跨工厂能力对比，并支持前两类 OEM 客户常见的专用输出模板。
  twentyFourMonth: 24 个月内从单一报批包工作流扩成多工厂审批系统，覆盖备选来源、偏差、工程变更和跨厂转移，并能在客户站点之间做基准比较。
  keyBets:
  - 只靠导出数据工作流，也能在不做深度系统集成、不直接吃全量受控数据之前先证明价值。
  - 只要有一个工作流能把 days-to-packet 至少压缩 30%，就足以顶住“和现有系统重叠”的质疑，并把试点转成年约。
  - 一旦接受过的报批包历史不断沉淀，它就会长成一张差异化的审批记忆图谱，推荐和复用会越来越强。
  - 多工厂供应商和整合平台，更可能从一个站点迅速扩到更多工厂，而不是公司先持续拿下全新的 logo。
gtm:
  wedge: 由创始人亲自卖进一个多站点或备援来源资质事件：供应商必须尽快拿下已批准产能，但又招不到足够有经验的质量工程师去硬拼报批包。
  channels:
  - 创始人直接卖给国防零部件供应商的 VP Quality、工厂总经理和运营负责人
  - 通过国防制造投资人、整合者和 roll-up 运营方拿温启动介绍
  - 在供应商侧工作流跑通后，再和 OEM 供应商开发或门户团队做项目型试点
  - 借助已进场的 ERP、QMS、PLM 实施伙伴做集成转介绍
  funnelTargets: 目标客户→合格试点 20-30%；合格试点→付费试点 50%+；付费试点→年度合同 60%+；首家工厂→第二家工厂扩张 12 个月内 35%+
  pricing: 先对一个真实资质项目收取付费试点费用，随后转成年费订阅：按工厂定价，再叠加入驻费，以及对活跃资质项目的高级报批包自动化收费。定价锚点不是 seat 数，而是节省下来的质量工程师人力和更快到手的已批准产能。
businessModel:
  revenueStreams:
  - 按使用资质工作流的工厂站点收取年度软件订阅
  - 收费的导入、数据映射与模板配置服务
  - 面向活跃资质项目、跨工厂分析和 OEM 协作模块的高级费用
  unitOfValue: 使用该平台处理资质与偏差工作流的工厂站点
  targetGrossMarginPct: 70
  expansionLevers:
  - 同一客户下新增更多工厂
  - 新增工程变更、跨厂转移和高频偏差工作流等更多报批包类型
  - 面向 OEM 供应商开发团队的部署，把多家供应商的报批入口标准化
  - 等已批准事件积累到一定规模后，推出基准和备战分析能力
strategyMap:
  northStarMetric: 通过平台完成的已批准资质事件数
  inputMetrics:
  - 从收到资质请求到提交报批包的天数
  - 报批包中复用过往已批准证据的段落占比
  - 试点转年度合同的转化率
  - 从部署启动到首个真实报批包上线的时间
  - 每位客户在 12 个月内扩到的平均工厂数
  moatsToBuild:
  - 连接零件族、工艺约束、测试证据、偏差和审批结果的历史图谱
  - 建立在真实通过记录之上的主承包商专用报批包模板与流转逻辑
  - 适配 ITAR、CUI 和供应商网络安全约束的安全、部署与集成手册
  killCriteria:
  - 12 个目标买家里，若确认一次典型资质事件至少要消耗 80 工程师小时、值得付费试点的人少于 3 个，就该停。
  - 前 6 个月真实使用里，如果没有任何试点把 days-to-packet 压缩 30%+，或把证据复用率做到 50%+，就该停。
  - 前 2 次部署如果都要花 8 周以上做定制数据映射，才能生成第一个真实报批包，就该停。
  mermaid: |
    flowchart LR
      Wedge[备选来源与偏差切口] --> MVP[资质图谱 MVP]
      MVP --> Proof[已接受报批包与更短周期]
      Proof --> Expansion[多工厂与 OEM 网络扩张]
investorMemo:
  verdict:
    call: 值得会面 / 继续尽调
    conviction: 切口很强、监管痛点也明确，但要真正提高把握，前两次试点必须证明预算归属清晰，而且部署摩擦足够低。
    whyBelieve: 资质延误已经是明确的备战瓶颈，而现有厂商看起来并没有提供可复用的跨工厂审批记忆。
    whyDoubt: 单靠这个滩头市场还不够大；如果数据安全和报批模板始终高度客户化，公司很可能滑向定制服务。
    nextDiligence: 先在一家两工厂供应商拿下一单付费试点，并证明可把备选来源或偏差报批包到被接受的时间压缩 30%+。
  firstCustomer:
    title: 双站点机电国防供应商里的 VP Quality
    profile: 美国一家 50-250 人、符合 ITAR 的制造商，拥有一座老厂和一座备援或新收购站点，为真实在产的战斗机、导弹或航电项目生产电源转换、执行器或传感器总成。
    trigger: 提产、短缺、并购整合或工程变更，迫使公司必须比现有手工拼包流程更快地认证备援来源或完成任务转移。
    buyer: VP Quality 或工厂总经理
    initialContract: $60k-$120k 的付费试点，覆盖一个项目、最多两家工厂；一旦该工作流成为默认资质系统，再转成 $150k-$250k 年费订阅加导入费。
  mustBeTrue:
  - 目标买家在一次典型备选来源或跨厂转移报批上，确实要花 80+ 小时质量/工程时间，以及 30+ 天历时。
  - 第一位客户在不做完整安全系统集成前，只靠导出数据也能把周期压缩 30%+。
  - 在短缺、提产或并购整合事件里，VP Quality 或工厂总经理手里确实有足够的自主预算来批试点。
  - 主承包商和政府方的报批要求在不同事件之间有足够复用度，能让“被接受历史”沉淀成产品优势。
  - 至少 30% 的首批客户能在第一份年度合同后 12 个月内，扩到第二家工厂或相邻项目。
  diligenceQuestions:
  - 目标客户最近五次备选来源、偏差或跨厂转移报批分别是什么，耗时多久？
  - 当资质延误威胁到出货或收入时，真正拍板软件预算的高管是谁？
  - 在第一轮试点里，哪些报批段落能从现有记录自动填充，哪些仍然必须手工重写？
  - 对规模较小的供应商来说，厂商可以托管到什么程度的受控技术数据，而不触发不可接受的 ITAR 或 CUI 摩擦？
  - 首个客户多久才会遇到一次足够严重、值得买年费订阅而不是项目制服务的资质事件？
operatingAssumptions:
- assumption: 只要试点绑定的是一个具名、正在发生的资质事件，而不是泛化的软件升级项目，买家就愿意批付费试点。
  basis: research.yaml
  validationTest: 访谈 10 位 VP Quality、总经理或运营负责人，并拿到至少 2 份绑定具体备选来源、偏差或跨厂转移事件的试点 LOI。
  decisionImpact: 如果不成立，公司就得改成通过 OEM、集成商或服务驱动渠道卖，而不是直接卖给供应商。
- assumption: 只靠导出的 ERP、QMS 和文档系统数据，就足以在不替换底层系统的前提下生成第一份有用的报批包。
  basis: operator judgment
  validationTest: 拿一份历史客户报批包做原型，确认至少 70% 的必填字段能由导出记录拼出来。
  decisionImpact: 如果不成立，实施时间和 burn 会明显上升，ICP 只能进一步收窄，融资也会更偏重服务交付。
- assumption: 一旦产品证明能节省时间并提高报批接受率，供应商愿意按每家工厂每年约 $75k-$100k 付费。
  basis: idea.yaml
  validationTest: 在前两次试点里量化节省的人力和避免的延误，并在模型价格区间内签下一份年度合同。
  decisionImpact: 如果不成立，公司要么降价、要么打包更多工作流、要么上探更高端客户，三种选择都会改写招聘和融资计划。
- assumption: 系统生成的报批包和数字审计轨迹，至少能被部分主承包商或面向政府的工作流接受，而不需要大规模手工重排。
  basis: research.yaml
  validationTest: 把一份输出映射到现有主承包商模板，请两位质量负责人判断：是否只做少量修改就能提交。
  decisionImpact: 如果不成立，产品就只是工作流助手，而不是报批系统记录中枢，护城河和扩张价值都会变弱。
- assumption: 第一位灯塔客户会在 12 个月内扩到另一家工厂、另一种报批包类型，或一个面向 OEM 的工作流。
  basis: research.yaml
  validationTest: 确保前两位客户在签约时都明确一项相邻使用场景，并在一年内完成至少一单扩张销售。
  decisionImpact: 如果不成立，研究里的 SOM 路径就更难实现，公司也未必能支撑风投级回报。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 量化滩头客户当前拼包成本
  hypothesis: 目标买家会表现出可重复、且足以支撑付费试点的报批延误和人工成本。
  successMetric: 完成 10 次买家访谈、基准化 3 份近期报批包，并签下 2 份试点 LOI
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 搭建历史报批包重建原型
  hypothesis: 不替换现有系统，只靠导出记录也能填满一份真实备选来源或偏差报批包的大部分内容。
  successMetric: 成功重建 1 份历史报批包，至少 70% 字段自动填充，并由客户 champion 验证
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 跑通第一次真实资质事件试点
  hypothesis: 在第一位共创客户的真实事件里，产品能把 days-to-packet 至少压缩 30%。
  successMetric: 历时缩短 30%+，且客户同意把平台用于第二次真实事件
  owner: 前线交付工程师
- horizon: 90–180 天
  experiment: 验证受控数据部署边界
  hypothesis: 只在美国境内部署、处理受控数据的版本，无需定制安全架构也能在 6 周内上线。
  successMetric: 第二个试点从签约到第一个真实报批包上线，时间控制在 6 周内
  owner: 安全负责人
- horizon: 6–12 个月
  experiment: 测试主承包商模板接受度
  hypothesis: 买家专用报批输出可以标准化到足够高，避免大部分段落仍需手工重写。
  successMetric: 支持两类模板族，且至少 80% 的报批段落只做轻微修改即可被接受
  owner: 产品负责人
- horizon: 6–12 个月
  experiment: 证明第二家工厂扩张路径
  hypothesis: 最容易拿到的增量收入，不是新 logo，而是首个客户的第二家工厂或相邻报批包类型。
  successMetric: 首份年度合同签下后 12 个月内，完成 1 单扩张订单
  owner: 创始人/CEO
operations:
- 只在美国部署，明确划清 ITAR 与 CUI 数据边界，支持基于角色的审批和可审计访问日志
- 高触达导入手册先只映射一种报批包，再逐步扩到更广的站点覆盖
- 提供导出式 ERP、QMS、文档仓库和质量事件数据接入工具包，让试点不必先做全面替换就能启动
- 为主要主承包商和 OEM 的报批格式建立模板库，把它们当成交付终点，而不是要被替换的系统
- 客户成功节奏围绕每一次真实资质事件展开，把前后周期对比直接做进交付里
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 首批市场集中、信任门槛高、又是事件驱动，所以创始人必须亲自抓销售、共创客户招募和定价。
- role: 创始工程师
  startTiming: Month 0
  rationale: 要足够快把图谱模型、报批引擎和首批集成做出来，才能在前两个季度撑住真实试点。
- role: 前线交付工程师
  startTiming: Month 2
  rationale: 把客户特定的数据映射压缩下来，尽快把试点沉淀成可复制的实施手册。
- role: 国防质量与合规专家
  startTiming: Month 3
  rationale: 把真实的资质认定、偏差、FAI 和审计逻辑写进产品里，让它符合供应商和主承包商真正的审批方式。
- role: 安全负责人
  startTiming: Month 6
  rationale: 安全部署和受控数据处理是扩大铺开的门槛，没有这一层，就很难走到更广的 OEM 场景。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 家带真实备选来源、偏差或跨厂转移事件的共创客户
  - 交付覆盖一类报批包和一条双工厂工作流的 MVP
  - 完成 3 次真实资质事件，并至少把 1 位客户转成年度合同
  - 在首位生产客户处证明 days-to-packet 缩短 30%+
- horizon: 12–24 个月
  items:
  - 供应商客户覆盖 6-8 个真实活跃工厂站点
  - 上线跨工厂能力对比和第二类报批包支持
  - 拿下第一单第二工厂扩张，以及第一单 OEM 或 roll-up 试点
  - 把受控部署标准化，将首个真实报批包上线时间压到 6 周内
- horizon: 24–36 个月
  items:
  - 活跃工厂站点达到 20-24 个，对齐研究里的第三年 SOM 路径
  - 把最佳客户做成多工厂标杆账户，至少跑 3 条活跃工作流
  - 基于匿名客户数据上线资质周期和报批复用的基准报告
  - 证明至少一条可复制渠道：来自 OEM 供应商开发团队或制造整合平台
risks:
- risk: 老旧记录过于分散，第一位客户很难拿出干净的历史报批包基线。
  likelihood: High
  impact: High
  mitigation: 先从一份近期报批包切入，配合引导式证据映射和前线交付资源，再逐步扩大系统覆盖。
- risk: 买家认定现有 QMS、PLM 或主承包商门户已经“够用了”，不愿为新的一层再掏钱。
  likelihood: High
  impact: High
  mitigation: 围绕一次真实事件里的周期缩短结果来卖，并把产品定位成现有系统之上的证据复用层。
- risk: ITAR、CUI 和网络安全要求把部署周期拉长，也抬高了服务负担。
  likelihood: High
  impact: High
  mitigation: 滩头阶段只做美国市场，严格限制托管数据域，先用导出数据工作流证明价值，再逐步做深集成。
- risk: 不同买家的报批要求差异太大，导致“被接受历史”难以沉淀成可复用的产品护城河。
  likelihood: Medium
  impact: High
  mitigation: 优先服务模板族较集中的客户，并从第一轮试点开始按段落级别量化复用率。
- risk: 如果起步阶段的供应商侧切口扩不出去，公司就会被困在一个规模不够大的细分市场。
  likelihood: Medium
  impact: High
  mitigation: 在下一轮融资前，把第二家工厂扩张和至少一单 OEM 或 roll-up 试点设成硬性里程碑。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-4M
  runwayMonths: 18
  useOfFundsSummary: 把 MVP 做出来，完成安全部署和首批集成，签下 2 家共创客户，把至少 1 个真实试点转成年费软件收入，并在 18 个月内证明第二家工厂扩张和 1 个 OEM 或 roll-up 试点。
