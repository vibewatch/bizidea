  adoptionFrictionMatrix:
  - friction: Legacy records are fragmented across PDFs, shared drives, ERP notes, and veteran engineer memory.
    severity: high
    affectedBuyer: VP Quality / quality engineering lead
    mitigation: Start with one recurring packet type and ingest only the systems needed for that event before expanding to full-site coverage.
    sourceRefs:
    - 20
    - 21
    - 31
  - friction: Controlled-data and cybersecurity concerns slow integration and external collaboration.
    severity: high
    affectedBuyer: Site GM / IT / compliance owner
    mitigation: Offer GovCloud-style deployment options, strict data-domain scoping, and a documented NIST/CMMC readiness path.
    sourceRefs:
