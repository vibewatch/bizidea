openQuestions:
- What share of mid-sized U.S. AS9100-certified sites truly fit the defense electromechanical beachhead versus commercial aerospace, MRO, or distribution use cases?
- Which packet sections do primes consistently accept in digital form, and where do buyer-specific manual rewrites still dominate?
- 'Who owns the first software budget in practice during a rate-increase or source-shortage event: the plant GM, VP Quality, or a corporate integration team?'
- How much controlled technical data can a neutral vendor hold before ITAR/CUI obligations outweigh the speed gains for smaller suppliers?
