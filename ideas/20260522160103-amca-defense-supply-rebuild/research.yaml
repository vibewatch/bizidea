    - 19
    - 21
  validationPlan:
  - priority: high
    question: How many engineer or quality hours does a typical alternate-source, deviation, or site-transfer packet consume today?
    evidenceToGather: Collect 10 recent packet examples from two suppliers and measure elapsed days, contributors, buyer touchpoints, and rework loops.
  - priority: high
    question: Which packet elements are most reusable across programs and which always remain buyer-specific?
    evidenceToGather: Interview supplier quality leaders plus one prime supplier-development manager and compare FAI, concession, and PPAP packet sections side by side.
  - priority: medium
    question: Will buyers accept system-generated packets and digital audit trails without manual reformatting?
    evidenceToGather: Prototype one workflow mapped to an existing prime template and test acceptance with quality representatives from two OEMs.
