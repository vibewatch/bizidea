  geographicConsiderations:
  - point: Initial deployment is easiest as a U.S.-only product because ITAR registration, CUI handling, and defense-customer expectations already shape the workflow.
    sourceRefs:
    - 8
    - 13
    - 35
  - point: Beachhead demand likely clusters in aerospace-defense regions with dense certified supplier networks and active roll-ups, such as Southern California and the factory footprints surfaced in Amca coverage.
    sourceRefs:
    - 24
    - 25
  - point: GovCloud or equivalent controlled deployment options matter for suppliers and startups trying to collaborate without tripping federal security requirements.
    sourceRefs:
    - 13
    - 18
    - 19
  sensitivityCases:
  - case: Prime portals standardize more of the deviation and FAI workflow
    impact: The standalone wedge narrows unless the startup becomes the reusable supplier-side memory layer behind those portals.
    sourceRefs:
    - 12
    - 16
  - case: Acquisition integration and shortage-driven source transfers accelerate
    impact: Cross-factory capability mapping becomes more urgent and the startup’s value rises faster than generic QMS budgets.
    sourceRefs:
    - 24
