problem: >-
  Secondhand source warehouses still decide the fate of each garment through
  human sorters who must guess category, condition, and likely buyer value in a
  few seconds. As resale demand grows faster than traditional apparel, those
  manual calls become a throughput and margin bottleneck: good pieces get
  under-graded into bulk lots, buyer quality varies by shift, and operators
  need ever more labor just to keep up. The opacity between intake, grading,
  and downstream sale makes it hard to promise lot quality or know which
  channel will maximize yield.
targetUser:
  primary: >-
    General managers and heads of operations at secondhand source warehouses
    and wholesale exporters
  secondary: >-
    Commercial and quality leaders responsible for lot yield, grading
    consistency, and repeat-buyer fill rates
  buyer: >-
    COO, general manager, or head of supply chain at a scaled secondhand
    wholesaler
startupThesis:
  nonObviousInsight: >-
    The next valuable company in secondhand fashion is not another resale
    storefront; it is the yield-routing layer inside source warehouses. Once
    intake images can be mapped to downstream transaction outcomes, the winner
    is the system that decides whether each garment should become a curated
    piece, a marketplace listing, a wholesale-lot item, or recycling feedstock
    before anyone else touches it.
  beachhead: >-
    UK secondhand source warehouses processing 200,000-plus garments per month
    and selling mixed apparel to global wholesale buyers plus online resale
    marketplaces, with 20 or more manual sort stations and recurring
    grade-consistency disputes
  wedge: >-
    A camera-line yield-routing system that grades each garment at intake,
    recommends price bands, and routes it into the highest-margin channel with
    a digital lot passport for downstream buyers
  whyNowCatalyst: >-
    Fleek's financing, the cited three-times-faster demand growth, and a
    vision-language model trained on millions of resale transactions mean
    warehouses face more volume exactly when software can finally turn grading
    into a data advantage.
  ventureScalePath: >-
    Start with intake routing for source warehouses, then expand into
    buyer-facing digital manifests, working-capital products against graded
    lots, brand-resale intake, and textile-recycling allocation across the
    broader circular-fashion supply chain.
solution: >-
  Install lightweight camera stations and operator tablets on existing sort
  lines so each garment gets a structured intake record before it is binned.
  The system predicts category, brand tier, condition, style attributes, and
  expected yield by channel, then recommends whether the item should go to
  curated vintage, an online listing queue, a wholesale lot, export, or
  recycling. Supervisors can override edge cases, while every decision rolls
  into a digital lot passport that buyers can inspect before purchase.
  Warehouse managers get dashboards on throughput, realized yield per garment,
  grader variance, and buyer rejection patterns. Over time the product becomes
  the operating system for intake, routing, and quality assurance across
  secondhand inventory.
goToMarketSeed:
  firstCustomer: >-
    A UK secondhand wholesaler processing 250,000-plus garments per month,
    supplying global wholesale buyers and marketplace sellers, and still
    relying on 20-50 human sorters to grade intake
  buyingTrigger: >-
    Opening a new source warehouse, onboarding a major supply contract, or
    missing grade-consistency and buyer-yield targets during peak intake volume
    creates budget for a better routing layer
  currentAlternative: >-
    Manual sorting and pricing by experienced line workers, spreadsheet or
    paper lot manifests, and generic warehouse software with no channel-level
    yield intelligence
  switchingReason: >-
    This wedge lifts gross yield per garment and makes lots more trustworthy
    without asking the warehouse to hire another shift of graders or build its
    own marketplace-grade model stack.
  pricingHypothesis: >-
    Annual SaaS subscription priced per active warehouse and sort line, plus
    usage-based pricing per garment processed and premium analytics for
    buyer-quality benchmarking
