jobsToBeDone:
  - job: >-
      When a mixed garment intake arrives, help the warehouse ops lead route
      each piece to the highest-yield channel in seconds, so they can raise
      margin without adding more sorters.
    currentAlternative: >-
      Experienced human sorters using memory, paper rules, and spreadsheet
      price lists
    successMetric: >-
      Improvement in realized gross yield per garment without slowing line
      throughput
  - job: >-
      When a buyer questions lot quality, help the commercial team show what
      was graded into the lot and why, so they can close repeat orders with
      fewer disputes.
    currentAlternative: >-
      Manual bale notes, photos in messaging apps, and buyer trust built
      through personal relationships
    successMetric: >-
      Faster lot sell-through and lower buyer rejection or dispute rates
ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      Two same-day verified reports point to the same structural bottleneck:
      fast-growing secondhand demand running through a manual warehouse
      pipeline.
  painIntensity:
    score: 5
    rationale: >-
      A bad grading decision destroys margin at garment level, while
      labor-intensive sorting constrains throughput across entire warehouses.
  wedgeClarity:
    score: 5
    rationale: >-
      Intake yield routing for source warehouses is a narrow workflow with a
      clear buyer, measurable ROI, and a concrete first deployment surface.
  defensibility:
    score: 4
    rationale: >-
      Defensibility should build through closed-loop yield data, buyer
      feedback, and workflow embedding, even if baseline vision models become
      cheaper.
  ventureScale:
    score: 5
    rationale: >-
      The beachhead can expand into the control layer for global secondhand
      trade, brand recommerce intake, recycling allocation, and finance against
      graded inventory.
topRisks:
  - name: Heterogeneous inventory hurts accuracy
    description: >-
      Differences in lighting, garment mix, and local grading norms across
      warehouses could make early model recommendations unreliable.
    mitigation: >-
      Start with one facility, keep supervisors in the loop, and retrain on
      realized buyer outcomes before expanding to new warehouse environments.
  - name: Sort-line change management fails
    description: >-
      If supervisors and graders do not trust the routing recommendations, the
      product could become an ignored dashboard instead of a line-of-business
      system.
    mitigation: >-
      Deploy on one lane first, prove yield uplift and lower buyer rejections
      station by station, and design workflows that speed human decisions
      instead of replacing them on day one.
  - name: Downstream feedback is too sparse
    description: >-
      The moat depends on learning which route produced the best realized
      yield, but many wholesalers may not track buyer outcomes cleanly enough
      at first.
    mitigation: >-
      Start with customers that already sell through repeat channels, require
      structured outcome capture in the digital manifest, and price the first
      pilot on measurable yield improvement rather than full automation.
