differentiator: >-
  This is not a generic warehouse management system, a camera-classification
  demo, or another secondhand marketplace. The moat is the closed loop between
  intake recommendations and realized downstream yield: the product learns
  which channel actually monetizes each garment best and uses that feedback to
  improve future routing. Pairing that routing layer with buyer-facing lot
  passports also makes the software harder to displace with a point model or an
  incumbent listing tool.
