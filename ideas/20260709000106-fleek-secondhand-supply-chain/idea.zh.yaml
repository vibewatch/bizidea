topRisks:
- name: 异构库存拖累准确率
  description: 不同仓库的灯光、货品结构和本地判级习惯差异太大，可能会让早期模型建议不够可靠。
  mitigation: 先从一个仓做起，让主管始终在环里，先用真实买家结果把模型训稳，再扩到新的仓库环境。
- name: 分拣线变革管理跑不通
  description: 如果主管和分拣员不信这套路由建议，产品就会变成一块没人理的看板，而不是产线业务系统。
  mitigation: 先上一条线，逐工位证明收益提升和买家拒收下降，再把工作流设计成“让人工决策更快”，而不是第一天就取代人。
- name: 下游反馈太稀疏
  description: 护城河建立在“知道哪条路最终卖得最好”这件事上，但很多批发商一开始未必能把买家结果追得足够干净。
  mitigation: 先挑那些本来就走复购渠道的客户，把结构化结果回传写进数字清单，并把首个试点定价绑在可量化的收益提升上，而不是绑在“全自动”故事上。
