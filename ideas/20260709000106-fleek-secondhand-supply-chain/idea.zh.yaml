problem: 二手服装货源仓里，每件衣服最后去哪儿，今天仍由人工分拣员在几秒钟里凭经验拍板：品类、成色、能卖给谁、值多少钱，全靠猜。二手需求增长速度已经跑赢传统服装，这种人工判断就同时卡住吞吐和毛利：好货被低估后扔进低收益大批货，批次质量随班次波动，仓库为了跟上量只能不断加人。入仓、判级、下游销售之间又缺少透明链路，运营方既没法稳定承诺批次质量，也不知道哪条渠道能把单件收益做高。
targetUser:
  primary: 二手服装货源仓和批发出口商的总经理与运营负责人
  secondary: 对批次收益、分级一致性和复购买家满足率负责的商业与质检负责人
  buyer: 规模化二手服装批发商的 COO、总经理或供应链负责人
startupThesis:
  nonObviousInsight: 二手时尚里下一个值钱的公司，不会是又一个转售前台，而是藏在货源仓里的收益路由层。只要入仓图像能和下游交易结果连起来，赢家就会是那个最先替每件衣服决定去向的系统：它该进精选古着、线上上架队列、批发批次，还是直接进回收料流，在任何人再碰它之前就先拍板。
  beachhead: 英国二手服装货源仓：月处理量超过 200,000 件，既卖给全球批发买家，也供给线上转售平台；人工分拣工位在 20 个以上，且经常因分级一致性引发争议。
  wedge: 在分拣线上装一套相机收益路由系统：衣服一入仓就判级、给出价格带建议，并配一份下游买家可查的数字批次护照，把它送进毛利最高的渠道。
  whyNowCatalyst: Fleek 融资到位、二手需求被证实增速是传统服装的 3 倍，再加上一套用数百万笔转售交易训练出来的视觉语言模型，意味着仓库一边正被更大的处理量压着跑，一边软件终于能把判级变成数据优势。
  ventureScalePath: 先拿下货源仓入仓路由，再往外扩：面向买家的数字清单、以已判级批次做底层的营运资金产品、品牌转售入仓，以及更广泛循环时尚供应链里的纺织回收分配。
solution: 在现有分拣线上装上轻量相机工位和操作员平板，让每件衣服在进桶前先生成一条结构化入仓记录。系统会预测品类、品牌档位、成色、风格属性和各渠道预期收益，再建议它该去精选古着、线上上架队列、批发批次、出口还是回收。主管可以对边缘案例手动改判，而每一次决策都会滚进数字批次护照，供买家在下单前查看。仓库经理还能看到吞吐、单件实际收益、分拣员差异，以及买家拒收和争议模式。时间一长，这个产品就会变成二手库存入仓、路由和质量控制的操作系统。
goToMarketSeed:
  firstCustomer: 一家英国二手服装批发商：月处理量超过 250,000 件，服务全球批发买家和平台卖家，但入仓判级仍依赖 20-50 名人工分拣员。
  buyingTrigger: 新开货源仓、接入大供应合同，或在入仓高峰期连续打不中分级一致性和买家收益目标，都会逼出一笔预算去买更好的路由层。
  currentAlternative: 靠有经验的一线工人手动分拣和定价，再配 Excel 或纸质批次清单，以及没有渠道级收益智能的通用仓储软件。
  switchingReason: 这个切口能把单件毛收益拉起来、让批次更值得信任，而且不用仓库再去招一整个班次的判级员，也不用自己搭一套市场级模型栈。
  pricingHypothesis: 按活跃仓库和分拣线收年费 SaaS 订阅，再叠加按处理件数计费，以及面向买家质量基准分析的高级模块。
