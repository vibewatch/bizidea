jobsToBeDone:
- job: 当一批混装衣物进仓时，帮仓库运营负责人在几秒钟内把每件衣服送去收益最高的渠道，这样既能把毛利拉起来，也不用再加分拣员。
  currentAlternative: 靠有经验的人工分拣员记经验、看纸质规则和 Excel 价格表。
  successMetric: 在不拖慢产线吞吐的前提下，把单件实际毛收益拉高。
- job: 当买家质疑某个批次的质量时，帮商业团队把“这批货为什么这样分级、为什么进了这个批次”讲清楚，好让复购更容易成交、争议更少。
  currentAlternative: 靠人工打包备注、聊天软件里的照片，以及长期关系积累出来的买家信任。
  successMetric: 批次卖得更快，买家拒收率和争议率更低。
