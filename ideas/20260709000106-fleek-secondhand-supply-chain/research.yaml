  validationPlan:
  - priority: high
    question: How many UK warehouses actually exceed the beachhead threshold and own the grading workflow instead of outsourcing it?
    evidenceToGather: A top-30 target-account map with monthly volume, number of sort stations, export destinations, and whether the warehouse controls pricing and QA decisions.
  - priority: high
    question: What measurable gross-yield uplift per garment can camera-line routing deliver versus expert human graders on mixed, mid-quality stock?
    evidenceToGather: One-lane pilot data comparing baseline and assisted routing on realized yield, throughput, dispute rate, and override frequency.
  - priority: medium
    question: Will wholesalers share downstream buyer outcomes and dispute data cleanly enough to train a closed-loop model?
    evidenceToGather: Three data-sharing workshops with prospective design partners and two repeat buyers to map available sell-through, return, and rejection signals.
