openQuestions:
- How many UK secondhand warehouses actually exceed 200,000 garments per month and control their own grading workflow rather than outsourcing it?
- What yield uplift can a routing model deliver on mixed, non-luxury apparel once overrides, cleaning cost, and buyer rejections are included?
- Will wholesalers and repeat buyers share enough structured downstream outcome data to sustain a closed-loop moat?
- Can buyer-facing lot passports improve realized prices or dispute rates enough to matter beyond internal warehouse productivity gains?
