competitors:
- name: Fleek
  stage: scale-up
  wedge: AI-native wholesale marketplace plus Fleek Sort for grading, pricing, and merchandising secondhand garments.
  pricing: Marketplace-driven and custom B2B economics; no public enterprise software list price on fetched pages.
  strength: Closest overlap on transaction-trained routing logic and upstream secondhand supply-chain digitization.
  weaknessVsUs: Tightly coupled to its marketplace and supplier network instead of a neutral warehouse-first operating layer any sorter can adopt.
  sourceRefs:
  - 1
  - 2
  - 3
- name: Archive
  stage: scale-up
  wedge: Brand-owned resale OS with AI, WMS, dynamic pricing, and trade-in workflows.
  pricing: Custom enterprise pricing; no public list price on fetched pages.
  strength: Strong workflow depth around intake, grading, repair, pricing, and resale operations.
  weaknessVsUs: Built for branded recommerce and returns rather than mixed-bale source warehouses or wholesale export lots.
  sourceRefs:
  - 17
  - 18
  - 19
  - 33
- name: Trove
  stage: scale-up
  wedge: Returns, resale, and recommerce operations with AI-driven pricing and routing.
  pricing: Custom enterprise pricing; no public list price on fetched pages.
  strength: Clear operational focus on route-to-value decisions, recommerce logistics, and returns economics.
  weaknessVsUs: Centred on brand and 3PL returns programs, not the first-sort decision layer inside secondhand source warehouses.
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: Refiberd
  stage: seed
  wedge: AI-enabled hyperspectral material detection for textile sorting and recycling applications.
  pricing: Custom commercial arrangements; no public list price on fetched pages.
  strength: Technically strong on composition detection where fiber-level certainty matters.
  weaknessVsUs: Optimized for material identification, not commercial grading, channel routing, or buyer-trust manifests for reusable apparel.
  sourceRefs:
  - 24
- name: PICVISA
  stage: incumbent
  wedge: Optical textile-sorting systems using NIR, vision, deep learning, and related automation for recycling plants.
  pricing: Custom equipment and project pricing; no public list price on fetched pages.
  strength: Real plant deployments and strong automation credibility in textile classification by composition and color.
  weaknessVsUs: Better suited to industrial textile sorting and recycling than to resale-first grading, price banding, and wholesale lot passports.
  sourceRefs:
  - 25
  - 26
  - 27
