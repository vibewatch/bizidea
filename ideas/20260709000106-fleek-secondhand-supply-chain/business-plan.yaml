slug: garment-yield-routing-os
date: '2026-07-09'
executiveSummary: >-
  This company sells a yield-routing operating system to UK secondhand apparel
  warehouses that still grade mixed intake manually. The first customer is a
  wholesaler or charity sorter processing more than 200,000 garments per month
  across 20 or more sort stations, where inconsistent grading already creates
  buyer disputes and under-monetized lots. The MVP is a camera-line workflow
  that captures each garment at intake, predicts category, condition, and route,
  and issues a digital lot passport that supervisors and buyers can inspect. The
  commercial promise is specific: raise realized recovery per garment and reduce
  grading variance without slowing line throughput or forcing a warehouse-system
  replacement. Research supports the pain, buying trigger, adjacent budgets, and
  regulatory tailwinds, but two core gaps remain: the true count of UK accounts
  that control their own grading economics and the willingness of customers to
  share downstream outcome data. The beachhead is intentionally narrow because
  brand-owned recommerce, full robotics, and financing products are attractive
  adjacencies but would delay proof of ROI. If one-line pilots show at least 5%
  net recovery improvement with flat throughput and lower dispute rates, the
  company can expand from lane software to site contracts, then into benchmark
  analytics and buyer-trust infrastructure. If that proof does not appear
  quickly, the business should be treated as a workflow or compliance tool
  rather than a venture-scale routing platform.
problem:
  - Manual sorters must decide category, condition, and likely buyer value in
    seconds, so good garments are routinely under-graded into lower-yield
    channels.
  - Warehouse margin and buyer trust vary by shift because grading standards,
    lot manifests, and quality evidence are inconsistent.
  - Export and reuse operators must document sorted loads and quality
    assessment, but spreadsheets, paper rules, and messaging-app photos do not
    create reusable audit trails or learning loops.
solution:
  - Lightweight camera stations and operator tablets capture each garment before
    binning and recommend the highest-yield downstream channel plus a price or
    grade band.
  - Supervisor overrides keep the human in the loop while generating structured
    data on exceptions, grader variance, and route performance.
  - Digital lot passports and operating dashboards connect intake decisions to
    buyer acceptance, disputes, and realized recovery by channel.
whyWeWin:
  - The beachhead is narrow enough to prove ROI on one sort line with one buyer
    workflow and one economic metric, net recovery per garment.
  - Closed-loop data linking intake image, supervisor override, route, and
    realized outcome is harder to copy than a standalone garment-classification
    model.
  - Buyer-facing passports turn an internal ops tool into a trust layer that
    generic WMS tools, manual wholesalers, and recycling-sort systems do not
    provide today.
strategicChoices:
  beachhead: >-
    UK secondhand source warehouses and wholesalers processing 200,000+ garments
    per month across 20+ manual sort stations and selling into both wholesale
    export lots and higher-yield resale channels.
  wedgeRationale: >-
    These operators feel grading pain every day, have enough concentrated volume
    for a one-line pilot to matter, and can measure ROI in yield, throughput,
    and dispute rates within weeks. Selling brands, consumer marketplaces, or
    recycling plants first would require broader integrations and make the proof
    point less falsifiable.
  sequencingRationale: >-
    Start with capture, routing recommendations, and digital passports on one
    lane; only after proving margin lift should the company add full-site
    rollout, benchmark analytics, and deeper WMS or marketplace integrations.
    Hiring follows the same order: product and ML plus field implementation
    first, then broader commercial coverage once deployment and ROI are
    repeatable.
  notYet:
    - Consumer resale marketplace
    - Brand-owned returns or trade-in workflows
    - Fully autonomous robotic sorting or hyperspectral hardware
    - Working-capital or financing products against graded inventory
market:
  tam: >-
    $101.0M modeled TAM across ~280 high-throughput secondhand
    sorting/wholesale sites globally at roughly $360k annual contract value per
    site.
  sam: >-
    $13.2M modeled UK beachhead SAM across ~40 warehouses or exporters at
    roughly $330k annual contract value per site.
  som: >-
    $4.0M modeled year-3 SOM from 10 live sites at roughly $400k blended ARR
    after pilot-to-site expansion.
  segments:
    - UK secondhand source warehouses and wholesalers with in-house grading
    - Large charity sorting centers and cross-border exporters with centralized
      intake operations
  buyingProcess: >-
    Daily users are supervisors, graders, QA leads, and commercial teams, but
    the deal closes only when the GM or COO sees a credible margin-recovery
    case plus lower compliance and dispute risk. Procurement should begin with
    a one-line paid pilot and expand to a site contract after 8-12 weeks of
    yield, throughput, and buyer-feedback evidence.
product:
  mvp: >-
    The MVP installs lightweight camera capture on one sort line, predicts
    category, condition, and brand tier, recommends the best downstream
    channel, records supervisor overrides, and exports a digital lot passport.
    It sits beside the customer's existing bins, tablets, and manifests rather
    than replacing the system of record on day one.
  sixMonth: >-
    One-line production pilot with supervisor override workflow, route
    recommendation confidence scores, lot-passport export, and weekly
    yield-versus-baseline reporting.
  twelveMonth: >-
    Full-site rollout for 2-3 design partners with multi-line calibration,
    buyer-feedback capture, dispute analytics, and CSV or API handoff into
    incumbent warehouse or manifest systems.
  twentyFourMonth: >-
    Network benchmarking across sites, route-performance models by customer and
    channel, compliance-grade audit logs, and partner integrations for
    downstream resale marketplaces and recycling allocation.
  keyBets:
    - Net recovery uplift of at least 5% is achievable on mixed non-luxury
      apparel without reducing throughput.
    - Supervisors will trust a human-in-the-loop routing workflow once override
      rates fall below roughly 30% on stable categories.
    - Digital lot passports will improve buyer acceptance and repeat-order
      confidence enough to support module expansion.
gtm:
  wedge: >-
    Sell a paid one-line pilot to a high-volume UK wholesaler or sorter opening
    capacity or missing grade-consistency targets, then convert that pilot into
    a full-site contract once the tool proves higher recovery per garment and
    fewer buyer disputes.
  channels:
    - Founder-led outbound to a top-30 UK target-account list of wholesalers,
      exporters, and charity sorters
    - Warm introductions through repeat wholesale buyers, resale marketplaces,
      and circular-fashion operators already touching secondhand supply
    - Selective partnerships with warehouse software or compliance programs once
      the pilot playbook is repeatable
  funnelTargets: "target-account intro→discovery 40%+, discovery→paid pilot 20-30%, paid pilot→full-site contract 50%+, first-site→second-site expansion 60%+ within 12 months"
  pricing: >-
    Charge an 8-12 week paid pilot per lane, then convert to annual software
    priced by active warehouse and sort lines plus per-garment usage. That
    matches the customer's throughput economics and can ladder toward the
    researched ~$330k-$400k full-site ACV range without forcing a large upfront
    rip-and-replace.
businessModel:
  revenueStreams:
    - Annual platform subscription per warehouse or facility
    - Usage-based fees per garment processed or active sort line
    - Premium analytics and buyer-passport modules for dispute benchmarking and
      compliance reporting
  unitOfValue: processed garment on an active sort line within a per-site contract
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one pilot lane to all lines in the same facility
    - Roll out from one warehouse to the customer's broader network
    - Add buyer passport, benchmark analytics, and compliance reporting modules
    - Add downstream marketplace and recycling-partner integrations once routing
      data is established
strategyMap:
  northStarMetric: net recovery uplift per processed garment versus pre-deployment baseline
  inputMetrics:
    - Percentage of intake garments captured before binning
    - Supervisor override rate by category and channel
    - Throughput per sort line versus baseline
    - Share of routed garments matched to downstream sale or dispute outcomes
    - Pilot-to-production conversion rate
    - Buyer rejection or dispute rate on passported lots
  moatsToBuild:
    - Proprietary route-outcome dataset linking intake image, override, channel,
      and realized recovery
    - Buyer-trust passport and audit-log corpus that generic WMS tools do not
      collect
    - Cross-site benchmarks on grader variance, route performance, and dispute
      patterns
  killCriteria:
    - Two paid pilots fail to show at least 5% net recovery improvement while
      keeping throughput within 2% of baseline.
    - Less than 60% of pilot volume can be matched to downstream outcome data
      within 90 days.
    - Fewer than 2 of the first 4 paid pilots convert to full-site contracts.
  mermaid: |
    flowchart LR
      Wedge["One-line UK warehouse pilot"] --> MVP["Camera capture + routing + passport"]
      MVP --> Proof["5%+ recovery uplift, flat throughput, fewer disputes"]
      Proof --> Expansion["Full-site rollout, then multi-site benchmarks and integrations"]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong wedge and pain, but conviction stays conditional until one-line pilots prove recovery uplift on messy mixed inventory.
    whyBelieve: The company attacks a measurable warehouse bottleneck with a narrow first workflow, credible regulatory tailwinds, and a data loop that could become defensible if customers share outcomes.
    whyDoubt: The researched software TAM is modest at the beachhead and the moat breaks if route-level uplift or downstream data capture do not materialize.
    nextDiligence: Run diligence around the first paid pilot design, especially target-account count, baseline yield metrics, and contractual access to buyer acceptance and dispute data.
  firstCustomer:
    title: UK mixed-apparel wholesaler with centralized grading
    profile: >-
      A 250,000+ garments/month operator running 20-50 manual sorters,
      exporting mixed lots while also feeding higher-yield marketplace or
      curated channels.
    trigger: >-
      A new facility, new supply contract, or peak-season backlog exposes
      inconsistent grading, buyer disputes, and the cost of hiring another
      shift.
    buyer: COO or warehouse GM
    initialContract: >-
      Start with a paid 8-12 week one-line pilot in the $25k-$50k range, then
      convert to a $250k-$400k annual full-site contract if the pilot proves
      recovery uplift, stable throughput, and lower dispute rates.
  mustBeTrue:
    - At least 10 UK target accounts match the beachhead profile and control
      their own grading and routing decisions.
    - A one-line pilot can improve net recovery per garment by at least 5% on
      mixed apparel.
    - Assisted routing does not reduce line throughput by more than 2% after
      onboarding.
    - Customers will contractually share enough downstream sale, rejection, and
      dispute data to close the learning loop.
    - At least half of paid pilots convert to $250k+ annual site contracts
      within six months.
  diligenceQuestions:
    - How many UK operators actually exceed 200,000 garments per month and own
      grading P&L?
    - What baseline yield, dispute, and throughput metrics can the first design
      partner share today?
    - How much manual services effort is required to calibrate each site and
      keep gross margin above 70%?
    - Why will a neutral warehouse OS beat Fleek, Archive, Trove, or a generic
      WMS vendor in this budget cycle?
    - What data rights and buyer-consent terms are required to use downstream
      outcomes for model improvement?
operatingAssumptions:
  - assumption: Enough UK accounts meet the beachhead threshold and control
      their own grading economics.
    basis: research.yaml
    validationTest: Complete a top-30 account map plus 15 interviews confirming
      monthly volume, line count, and ownership of routing decisions.
    decisionImpact: If false, expand geography earlier or narrow the ICP to
      charity sorters with concentrated volume.
  - assumption: One-line assisted routing can deliver at least 5% net recovery
      uplift on mixed apparel.
    basis: idea.yaml
    validationTest: Run an A/B pilot comparing baseline and assisted routing on
      realized recovery, throughput, dispute rate, and override frequency.
    decisionImpact: If false, reposition around QA or compliance workflows or
      stop the thesis.
  - assumption: Customers will share downstream outcome and dispute data.
    basis: research.yaml
    validationTest: Secure two pilot agreements that require lot-level outcome
      capture within 90 days of shipment.
    decisionImpact: If false, de-prioritize learning-based optimization and do
      not underwrite a data moat.
  - assumption: Supervisors will adopt a human-in-the-loop workflow after short
      onboarding.
    basis: operator judgment
    validationTest: Track weekly active usage and override rates, targeting
      override below 30% on stable categories by week 6.
    decisionImpact: If false, increase service and UX investment and delay any
      automation-led sales motion.
  - assumption: Full-site pricing can reach the researched ~$330k+ ACV range
      without heavy custom services.
    basis: research.yaml
    validationTest: Test pricing with six buyers and keep services below 25% of
      first-year contract value in the first two pilots.
    decisionImpact: If false, lower ACV expectations and productize deployment
      before scaling sales.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Top-30 UK account map and ICP interviews
    hypothesis: Enough warehouses meet the beachhead profile and will admit to
      measurable yield and dispute pain.
    successMetric: 15 interviews completed; 10 accounts confirmed above 200,000
      garments/month with in-house grading and an active buying trigger.
    owner: CEO
  - horizon: 0-90 days
    experiment: Data-sharing design-partner LOI
    hypothesis: At least two prospects will grant access to route-level outcome,
      rejection, and dispute data in exchange for pilot pricing.
    successMetric: 2 signed pilot LOIs with agreed KPI schema and 90-day outcome
      access.
    owner: CEO and operations lead
  - horizon: 0-90 days
    experiment: Shadow-mode capture workflow on one lane
    hypothesis: Camera capture and operator tablets can fit the line without
      slowing intake before recommendations are turned on.
    successMetric: 90%+ capture rate with throughput degradation under 2% during
      shadow mode.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Assisted-routing pilot
    hypothesis: Routing recommendations plus supervisor overrides will produce at
      least 5% higher net recovery per garment than baseline.
    successMetric: '>=5% net recovery uplift, override rate <40% by week 4, and
      no increase in dispute rate.'
    owner: ML/data lead
  - horizon: 90-180 days
    experiment: Buyer passport trial with repeat buyers
    hypothesis: Digital lot passports reduce inspection cycles and dispute rates
      enough to support module pricing.
    successMetric: 20% faster lot approval or 25% lower dispute rate on pilot
      lots.
    owner: Product and commercial lead
  - horizon: 6-12 months
    experiment: Full-site expansion and referenceability
    hypothesis: A successful one-line pilot will convert to a facility-wide
      contract and create a repeatable sales reference.
    successMetric: 1 facility-wide contract signed, 1 reference customer, and 1
      second-site expansion in pipeline.
    owner: CEO and customer success lead
operations:
  - Site-readiness checklist for lighting, camera placement, network
    reliability, and bin taxonomy before deployment
  - Daily exception review comparing model recommendations, supervisor
    overrides, and final route decisions
  - Weekly yield and buyer-dispute operating review with the customer's GM, QA
    lead, and commercial owner
  - CSV or API export into existing manifest or warehouse tools before any
    system-of-record replacement
  - Per-lot audit logs retained for export, quality, and buyer-passport
    evidence
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns capture workflow, tablet UX, and the first WMS or manifest
      integrations needed to deploy on a live line.
  - role: ML/data lead
    startTiming: Month 0-3
    rationale: Builds route recommendation models, confidence thresholds, and
      the feedback loop from overrides and downstream outcomes.
  - role: Implementation / customer success
    startTiming: Month 3
    rationale: Runs site calibration, operator training, and weekly ROI reviews
      so pilots do not stall on change management.
  - role: Commercial founder or first sales engineer
    startTiming: Month 6
    rationale: Turns pilot proof into a repeatable expansion motion across a
      small number of high-value UK accounts.
  - role: Compliance / integrations lead
    startTiming: Month 9-12
    rationale: Owns export-documentation workflows, audit logs, and deeper
      integrations once customers request production rollout.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 2 design partners and run at least 1 paid one-line pilot
      - Demonstrate at least 5% net recovery uplift with throughput within 2%
        of baseline
      - Ship digital lot passports and downstream outcome capture for pilot lots
      - Convert the first pilot into a full-site contract
  - horizon: 12-24 months
    items:
      - Deploy in 3-5 live sites and establish a referenceable UK expansion
        playbook
      - Reach repeatable pilot-to-production conversion with standard
        implementation under 6 weeks
      - Launch benchmark analytics and buyer-dispute reporting across sites
      - Complete the first marketplace or recycling-partner integration
  - horizon: 24-36 months
    items:
      - Expand beyond the UK beachhead into additional European or offshore
        sorting hubs
      - Operate 10 live sites consistent with the researched SOM case
      - Use cross-site data to improve routing accuracy and category-specific
        confidence thresholds
      - Decide whether adjacent compliance, buyer-network, or financing products
        are justified by data depth and account pull
risks:
  - risk: Heterogeneous inventory, lighting, and local grading norms make early
      recommendations unreliable.
    likelihood: High
    impact: High
    mitigation: Start with one facility and one lane, keep supervisors in the
      loop, and calibrate site-specific models before multi-site rollout.
  - risk: Customers will not share enough downstream sale, rejection, and
      dispute data to build a closed-loop moat.
    likelihood: Medium
    impact: High
    mitigation: Require structured outcome capture in pilot contracts and price
      early deals on measurable uplift rather than full automation claims.
  - risk: Graders and supervisors ignore recommendations, turning the product
      into a dashboard instead of an operating system.
    likelihood: Medium
    impact: High
    mitigation: Design for override visibility, prove ROI on one lane, and
      review results weekly with line managers.
  - risk: Adjacent vendors such as Fleek, Archive, Trove, or warehouse-system
      incumbents move upstream into neutral routing.
    likelihood: Medium
    impact: Medium
    mitigation: Win on site-level workflow fit, faster deployment, and
      proprietary route-outcome plus passport data before broader players commit.
  - risk: Implementation and field-support effort stays too high for software
      gross margins.
    likelihood: Medium
    impact: Medium
    mitigation: Standardize capture hardware, deployment SOPs, and integration
      templates before scaling outbound sales.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway funds the MVP, 2-3 paid pilots, the first full-site
    deployment, core product or ML or implementation hires, and the evidence
    needed to decide whether the wedge supports a repeatable seed-scale
    expansion.
