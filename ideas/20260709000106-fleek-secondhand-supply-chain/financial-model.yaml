date: '2026-07-09'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-09]; model starts in the same month because the pre-seed raise and pilot roadmap begin immediately.'
- id: A2
  name: Opening cash after pre-seed close
  value: '2200'
  unit: usdK
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M and runwayMonths 18]; model uses a $2.2M raise to reach the Q4Y2 proof point plus a 6-month buffer.'
- id: A3
  name: Revenue unit in operating rows
  value: active paying logo (pilot or production site)
  unit: customer unit
  source: '[BP gtm.wedge paid pilot then site contract]; rows count paying logos while liveSitesEop separately shows production sites.'
- id: A4
  name: Starting paying customers (M1)
  value: '0'
  unit: count
  source: '[BP fundingAsk is pre-seed and experimentRoadmap begins with account mapping and design-partner LOIs before commercial pilots].'
- id: A5
  name: Paid pilot fee
  value: '45'
  unit: usdK per pilot
  source: '[BP investorMemo.firstCustomer.initialContract $25k-$50k for an 8-12 week pilot]; model uses the midpoint-high case because the wedge is explicitly paid, not free.'
- id: A6
  name: Pilot duration
  value: '3'
  unit: months
  source: '[BP buyingProcess and investorMemo.initialContract 8-12 weeks].'
- id: A7
  name: Initial live-site ARR
  value: '360'
  unit: usdK per year
  source: '[BP pricing ladders toward researched ~$330k-$400k ACV]; [Research market.tam and sam use ~$330k-$360k/site]; base case enters production near the top of that researched range.'
- id: A8
  name: Mature live-site ARR after module and line expansion
  value: '400'
  unit: usdK per year
  source: '[BP market.som 10 live sites at roughly $400k blended ARR after pilot-to-site expansion]; [BP businessModel.expansionLevers add lines, modules, and network rollout].'
- id: A9
  name: Base pilot start cadence
  value: M6, M10, M14, M17, M20, M23, M26, M29, M31, M33
  unit: month index
  source: '[BP milestones call for 1 paid pilot and first live site in Y1, 3-5 live sites in months 12-24, and 10 live sites in months 24-36]; [BP gtm.funnelTargets founder-led, high-conviction account selling].'
- id: A10
  name: Expansion timing from initial to mature ARR
  value: '12'
  unit: months after production go-live
  source: '[BP gtm.funnelTargets first-site to second-site expansion 60%+ within 12 months]; [BP businessModel.expansionLevers add lines and modules inside the same facility].'
- id: A11
  name: Gross margin by stage
  value: pilot 35%, initial production 70%, mature production 76%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70]; [BP operatingAssumptions services should stay below ~25% of first-year contract value]; startup-finance heuristic that pilots are more implementation-heavy before playbooks standardize.'
- id: A12
  name: Steady-state monthly churn for unit economics
  value: '2.0'
  unit: percent
  source: Startup-finance heuristic for sticky but operationally intensive vertical software where contracts are valuable yet account concentration still creates real logo risk.
- id: A13
  name: Loaded founder salary
  value: '150'
  unit: usdK annual
  source: Startup-finance heuristic for below-market pre-seed founder cash compensation plus payroll taxes and benefits.
- id: A14
  name: Loaded engineering or ML salary
  value: '165'
  unit: usdK annual
  source: Startup-finance heuristic for a UK/EU applied-ML or computer-vision hire with benefits.
- id: A15
  name: Loaded implementation or customer success salary
  value: '110'
  unit: usdK annual
  source: Startup-finance heuristic for a field implementation operator who can run calibration, training, and ROI reviews.
- id: A16
  name: Loaded sales or commercial salary
  value: '130'
  unit: usdK annual
  source: Startup-finance heuristic for a sales-engineering style enterprise GTM hire; variable commissions are reflected through CAC and S&M spend instead of payroll.
- id: A17
  name: Loaded compliance or integrations salary
  value: '125'
  unit: usdK annual
  source: '[BP team compliance or integrations lead Month 9-12]; startup-finance heuristic for a workflow and integration operator with benefits.'
- id: A18
  name: Loaded G&A or operations salary
  value: '95'
  unit: usdK annual
  source: Startup-finance heuristic for a lean finance or ops hire added only after the first wave of live sites is established.
- id: A19
  name: Hiring sequence
  value: M1 founder plus founding eng, M2 ML lead, M4 implementation, M7 commercial, M10 compliance, M15 eng2, M18 implementation2, M21 sales2, M24 ops, M30 eng3
  unit: month index
  source: '[BP team.startTiming and strategicChoices.sequencingRationale]; product, ML, and field delivery arrive before broader commercial scale.'
- id: A20
  name: Non-salary operating spend ramp
  value: Y1 monthly 14/18/22/26 by quarter, Y2 monthly 28/30/32/34, Y3 monthly 36/38/40/42 by 3-month block
  unit: usdK per month
  source: '[BP fundingAsk.useOfFundsSummary funds MVP, pilots, first full-site deployment, and core hires]; startup-finance heuristic for cloud, hardware, travel, insurance, and legal spend.'
- id: A21
  name: Opex functional mix
  value: S&M rises from 15% to 33%, R&D falls from 60% to 40%, G&A stays 25-27%
  unit: percent of opex
  source: '[BP strategicChoices.sequencingRationale]; early spend is product and deployment-heavy, then shifts toward repeatable commercial coverage once references exist.'
- id: A22
  name: Blended CAC per live site
  value: '123'
  unit: usdK
  source: Model-derived from roughly $615K of Y1-Y2 sales and marketing spend over 5 live-site wins by Q4Y2, consistent with founder-led enterprise sales into a small buyer universe.
- id: A23
  name: Base sales cycle
  value: 6 months to pilot plus 3 months from pilot start to site contract
  unit: months
  source: '[BP buyingProcess paid pilot expands after 8-12 weeks of evidence]; [BP investorMemo first site converts after proving uplift, throughput, and dispute improvement].'
- id: A24
  name: Funding milestone for the next round
  value: 5 live sites by month 24 plus 6 months of cash buffer
  unit: milestone
  source: '[BP milestones 12-24 months deploy in 3-5 live sites and standardize implementation under 6 weeks]; [BP fundingAsk.runwayMonths 18]; model adds a 6-month buffer to avoid a forced raise.'
- id: A25
  name: Cash conversion assumption
  value: '0'
  unit: working-capital or capex adjustment in usdK
  source: Startup-finance heuristic that this stage is dominated by payroll and operating spend; the planning model approximates cash movement with EBITDA and assumes no material debt, tax, or capex offsets.
