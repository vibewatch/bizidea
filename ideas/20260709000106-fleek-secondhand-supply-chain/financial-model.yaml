scenarios:
  downside:
    description: Later pilots slip, pricing lands near the lower researched ACV range, and implementation stays more manual.
    y3RevenueK: 2379.0
    y3EbitdaK: -381.8
    cashLowPointK: 291.4
    keyAssumptionChanges:
    - Pilot starts after month 17 move back by one quarter.
    - Initial live-site ARR lands near $336K and mature ARR near $372K instead of the SOM case.
    - Gross margin by stage falls to roughly 30% / 66% / 72%.
  base:
    description: Ten live sites are reached by Q4Y3, with early pilots converting into site contracts and a few mature accounts expanding toward the SOM pricing case.
    y3RevenueK: 2963.7
    y3EbitdaK: 175.3
    cashLowPointK: 799.4
    keyAssumptionChanges:
    - Pilot starts follow M6, M10, M14, M17, M20, M23, M26, M29, M31, and M33.
    - Sites enter production around $360K ARR and mature toward $400K ARR after roughly 12 months.
    - Gross margin crosses the 70% target only after pilot delivery becomes repeatable.
  upside:
    description: Reference customers pull later pilots forward and mature accounts adopt more lines and modules earlier.
    y3RevenueK: 3344.0
    y3EbitdaK: 574.0
    cashLowPointK: 1022.1
    keyAssumptionChanges:
    - Later pilot starts pull forward by about 2 months after the first reference site goes live.
    - Initial live-site ARR rises toward $372K and mature ARR toward $420K.
    - Gross margin by stage improves to roughly 38% / 72% / 78% as implementations standardize faster.
sensitivity:
- variable: ARPU
  downsideCase: Initial live-site ARR $336K and mature ARR $372K.
  baseCase: Initial live-site ARR $360K and mature ARR $400K.
  upsideCase: Initial live-site ARR $378K and mature ARR $420K.
  y3RevenueImpactK: -200.7
  cashImpactK: -209.8
- variable: CAC
  downsideCase: CAC rises toward ~$155K because travel, pilot support, and proof-building stay manual.
  baseCase: CAC holds near $123K with founder-led qualification and a short target-account list.
  upsideCase: CAC falls toward ~$100K once references and buyer introductions drive more of the funnel.
  y3RevenueImpactK: 0.0
  cashImpactK: -309.1
- variable: churn
  downsideCase: One early live site churns around month 28 instead of renewing into expansion ARR.
  baseCase: No explicit early churn in the operating build and 2.0% steady-state churn in unit economics.
  upsideCase: Monthly churn trends toward 1.0% as lot passports and ROI dashboards become embedded workflows.
  y3RevenueImpactK: -299.7
  cashImpactK: -227.7
- variable: sales cycle
  downsideCase: Later pilots slip by one quarter because proof and procurement take longer.
  baseCase: About 6 months from intro to paid pilot and about 3 months from pilot start to site contract.
  upsideCase: Reference customers pull later pilot starts forward by about 2 months.
  y3RevenueImpactK: -411.6
  cashImpactK: -355.2
- variable: gross margin
  downsideCase: Pilot / initial / mature GM lands at 30% / 66% / 72%.
  baseCase: Pilot / initial / mature GM is 35% / 70% / 76%.
  upsideCase: Pilot / initial / mature GM reaches 38% / 72% / 78%.
  y3RevenueImpactK: 0.0
  cashImpactK: -186.1
- variable: hiring pace
  downsideCase: An extra engineer and implementation hire are pulled forward before repeatability is proven.
  baseCase: The team adds only one extra engineer in Y3 after the Q4Y2 proof point is hit.
  upsideCase: The final engineer hire waits until after the seed proof point and partner backlog justifies it.
  y3RevenueImpactK: 0.0
  cashImpactK: -202.1
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[Target accounts] --> Pilots[Paid lane pilots]
      Pilots --> Sites[Live site contracts]
      Sites --> Expansion[Line and module expansion]
      Expansion --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from 10 warehouse logos moving from a roughly $45K paid pilot into about $360K live-site ARR and then maturing toward the $400K SOM case.
- checkName: Must go right
  finding: Implementation has to standardize enough to keep gross margin at or above 70% while still launching later pilots every 3-4 months.
- checkName: Model breaks if
  finding: A one-quarter slip in later pilot starts or one early site churn pulls cash toward the downside case before the business is clearly self-funding.
- checkName: Next-round proof
  finding: The seed-ready proof point is 5 live sites by Q4Y2, deployments under 6 weeks, and at least one account already expanding toward multi-line or module ARR.
sanityChecks:
  ruleOf40: Y3 growth 120% + EBITDA margin 6% = 126%
  burnMultiple: Y2 burn $575.5K / net new revenue $1138.2K = 0.5x; Y3 EBITDA turns positive.
  revenuePerFte: $269K Y3 on 11 FTE (benchmark ~$200-400K for vertical SaaS with light services).
  flags:
  - Base case effectively assumes all 10 planned pilots convert into live sites by month 36, which is materially stronger than the BP floor of 50%+ pilot-to-site conversion.
