slug: garment-yield-routing-os
date: '2026-07-09'
executiveSummary: 这家公司卖给英国二手服装仓库的是一套收益路由操作系统，而这些仓库今天对混装来货的判级仍主要靠人工。首个客户画像很具体：月处理量超过 200,000 件、分拣工位在 20 个以上的批发商或慈善分拣中心，那里分级不一致已经在制造买家争议和低价出货。MVP 是一套分拣线相机工作流：衣服入仓时先采集图像，预测品类、成色和去向，并生成一份主管和买家都能查看的数字批次护照。商业承诺也很具体：在不拖慢产线吞吐、也不要求客户替换整套仓储系统的前提下，把单件实际回收收益拉高、把分级波动压低。研究已经验证了痛点、采购触发点、相邻预算和监管顺风，但还有两个核心空白必须补上：英国到底有多少账户真正掌握自己的判级经济账，以及客户愿不愿意共享下游结果数据。滩头市场之所以刻意收窄，是因为品牌自营二手、全自动机器人和融资产品都很诱人，但都会拖慢 ROI 证明。一条分拣线的试点只要能跑出至少 5% 的净回收收益提升、吞吐不掉、争议率下降，公司就能从单线软件扩到整站合同，再往上做基准分析和买家信任基础设施。要是这组证据迟迟跑不出来，这门生意就该被当成工作流或合规工具，而不是一条能做成风投回报的路由平台。
problem:
- 人工分拣员必须在几秒钟里判断品类、成色和大致买家价值，所以好货经常被低估，掉进更低收益的渠道。
- 仓库毛利和买家信任会随班次波动，因为判级标准、批次清单和质量证据都不一致。
- 出口和再利用运营方必须把分拣载荷和质量评估记录清楚，但 Excel、纸质规则和聊天软件照片既留不下可复用的审计链，也跑不出学习闭环。
solution:
- 用轻量相机工位和操作员平板，在衣服进桶前先采集每件衣服，再推荐收益最高的下游渠道和价格带或等级带。
- 主管改判会把人留在环里，同时沉淀例外情况、分拣员差异和路由效果的结构化数据。
- 数字批次护照和运营看板，把入仓决策直接连到买家验收、争议和各渠道实际回收收益。
whyWeWin:
- 这个滩头市场窄得足够好：一条分拣线、一个买家流程、一个经济指标——单件净回收收益——就能把 ROI 验出来。
- 把入仓图像、主管改判、路由选择和实际结果连成闭环的数据，比单独一套服装分类模型更难抄。
- 面向买家的批次护照，让内部运营工具变成一层信任基础设施；通用 WMS、人工批发商和回收分拣系统今天都还没给出这层东西。
strategicChoices:
  beachhead: 英国二手服装货源仓与批发商：月处理量超过 200,000 件，人工分拣工位在 20 个以上，同时把货卖向批发出口批次和更高收益的转售渠道。
  wedgeRationale: 这批运营方每天都在被判级问题折磨，体量又足够集中，一条线的试点就能看出变化，而且几周内就能从收益、吞吐和争议率上算出 ROI。要是先卖给品牌、消费者平台或回收工厂，就得先做更重的集成，证明点也会变得不够可证伪。
  sequencingRationale: 第一步只做单线的采集、路由建议和数字护照；只有把毛利提升跑出来之后，才往全站部署、基准分析以及更深的 WMS 或市场平台集成上加。招人顺序也一样：先上产品、ML 和现场实施，再等部署和 ROI 能复用之后，才扩商业团队。
  notYet:
  - 面向消费者的转售市场
  - 品牌自营退货或以旧换新流程
  - 全自动机器人分拣或高光谱硬件
  - 以已判级库存为基础的营运资金或融资产品
market:
  tam: $101.0M：按全球约 280 个高吞吐二手分拣/批发站点测算，每站年合同价值约为 $360k。
  sam: $13.2M：英国滩头市场约 40 个仓库或出口商，每站年合同价值约为 $330k。
  som: $4.0M：第 3 年拿下 10 个正式站点，并把单线试点扩成整站合同后，混合 ARR 约为每站 $400k。
  segments:
  - 自有判级能力的英国二手服装货源仓和批发商
  - 拥有集中式入仓运营的大型慈善分拣中心和跨境出口商
  buyingProcess: 日常使用者是主管、分拣员、质检负责人和商业团队，但只有当 GM 或 COO 看见一笔可信的毛利回收收益账，再加上更低的合规和争议风险，这单才会真正签下来。采购最好从一条分拣线的付费试点开始，拿 8-12 周的收益、吞吐和买家反馈证据，再扩成整站合同。
product:
  mvp: MVP 会在一条分拣线上加轻量相机采集，预测品类、成色和品牌档位，推荐最优下游渠道，记录主管改判，并导出数字批次护照。第一天它先贴着客户现有的货桶、平板和清单跑，而不是直接替换系统主记录。
  sixMonth: 一条线的正式生产试点：带主管改判工作流、路由建议置信度、批次护照导出，以及每周对照基线的收益报告。
  twelveMonth: 为 2-3 家共创客户做全站部署：支持多线校准、买家反馈回传、争议分析，并通过 CSV 或 API 接进现有仓储或清单系统。
  twentyFourMonth: 跨站点基准分析、按客户和渠道建路由效果模型、合规级审计日志，以及面向下游转售平台和回收分配的合作方集成。
  keyBets:
  - 在不牺牲吞吐的前提下，混装非奢侈服装至少能跑出 5% 的净回收收益提升。
  - 一旦稳定品类的改判率降到大约 30% 以下，主管就会信任这套人机协同的路由工作流。
  - 数字批次护照能显著提升买家验收和复购信心，从而撑起后续模块扩张。
gtm:
  wedge: 先把一条付费分拣线试点卖给高吞吐的英国批发商或分拣商：他们要么正在扩产，要么分级一致性目标没打到；一旦工具证明单件回收收益更高、买家争议更少，再把试点转成整站合同。
  channels:
  - 创始人主导外呼，打英国前 30 个目标账户：批发商、出口商和慈善分拣中心
  - 通过高复购批发买家、转售平台和已参与二手供应链的循环时尚运营方做暖介绍
  - 等试点打法能复制后，再有选择地和仓储软件或合规项目合作
  funnelTargets: 目标账户引荐→需求发现 40%+，需求发现→付费试点 20-30%，付费试点→整站合同 50%+，首站→第二站扩张在 12 个月内达到 60%+。
  pricing: 先按分拣线收一笔 8-12 周的付费试点费用，再转成年费软件：按活跃仓库、分拣线和处理件数一起收费。这样既贴着客户的吞吐经济模型，也能逐步爬到研究里约 $330k-$400k 的整站 ACV 区间，不用第一天就逼客户整套换系统。
businessModel:
  revenueStreams:
  - 按仓库或站点收年度平台订阅费
  - 按处理件数或活跃分拣线收使用费
  - 针对争议基准分析和合规报告，卖高级分析与买家护照模块
  unitOfValue: 单站合同下，活跃分拣线上被处理的单件衣物
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一条试点线扩到同一仓里的所有分拣线
  - 从一座仓扩到客户更大的仓网
  - 继续加买家护照、基准分析和合规报告模块
  - 等路由数据沉淀后，再接下游市场平台和回收合作方
strategyMap:
  northStarMetric: 相对部署前基线，每件处理衣物的净回收收益提升
  inputMetrics:
  - 进桶前被采集的入仓衣物占比
  - 按品类和渠道拆分的主管改判率
  - 相对基线的每条分拣线吞吐
  - 能匹配到下游成交或争议结果的路由衣物占比
  - 试点转正式生产的转化率
  - 带护照批次的买家拒收或争议率
  moatsToBuild:
  - 把入仓图像、改判、渠道和实际回收收益串起来的专有路由结果数据集
  - 通用 WMS 不会采集的买家信任护照和审计日志语料
  - 跨站点的分拣员差异、路由效果和争议模式基准
  killCriteria:
  - 连续两次付费试点都没能在把吞吐控制在基线 ±2% 内的同时，跑出至少 5% 的净回收收益提升。
  - 90 天内，试点量里不到 60% 能和下游结果数据对上。
  - 前 4 个付费试点里，转成整站合同的不到 2 个。
  mermaid: |
    flowchart LR
      Wedge["One-line UK warehouse pilot"] --> MVP["Camera capture + routing + passport"]
      MVP --> Proof["5%+ recovery uplift, flat throughput, fewer disputes"]
      Proof --> Expansion["Full-site rollout, then multi-site benchmarks and integrations"]
investorMemo:
  verdict:
    call: 值得见面 / 继续深挖
    conviction: 切口和痛点都很强，但在一条分拣线的试点证明混装库存也能把回收收益拉起来之前，判断只能保持有条件乐观。
    whyBelieve: 这家公司盯上的，是一个可量化的仓库瓶颈：第一步流程很窄，监管顺风清楚；只要客户愿意共享结果数据，这个闭环就有机会长成护城河。
    whyDoubt: 滩头市场的软件 TAM 本身不算大；如果路由层面的收益提升跑不出来，或者下游数据采不上来，护城河也就立不住。
    nextDiligence: 下一步尽调重点要盯住首个付费试点的设计：目标账户数量、基线收益指标，以及合同里能否拿到买家验收和争议数据。
  firstCustomer:
    title: 集中式判级的英国混装服装批发商
    profile: 月处理量 250,000 件以上，靠 20-50 名人工分拣员跑货；一边出口混装批次，一边把更好的货送去平台或精选渠道。
    trigger: 新建仓、新供应合同，或者旺季积压，会把分级不一致、买家争议和再加一个班次的人力成本一起暴露出来。
    buyer: COO 或仓库 GM
    initialContract: 先从 $25k-$50k 的 8-12 周单线付费试点开始；如果试点能证明回收收益提升、吞吐稳定、争议率下降，再转成 $250k-$400k 的整站年合同。
  mustBeTrue:
  - 至少有 10 个英国目标账户符合滩头市场画像，而且掌握自己的判级和路由决策权。
  - 一条分拣线的试点，能在混装服装上把单件净回收收益拉高至少 5%。
  - 辅助路由在完成上线磨合后，不会让产线吞吐下降超过 2%。
  - 客户愿意在合同里共享足够多的下游成交、拒收和争议数据，形成学习闭环。
  - 至少一半的付费试点，能在 6 个月内转成 $250k+ 的年度站点合同。
  diligenceQuestions:
  - 英国到底有多少家运营方真的能做到月处理 200,000 件以上，并且自负判级 P&L？
  - 首批共创客户今天能拿出的基线收益、争议率和吞吐数据到底有多少？
  - 每个站点要校准到可用，需要多少人工服务；这样还能不能把毛利率守在 70% 以上？
  - 在这一轮预算周期里，为什么中立的仓库 OS 能打赢 Fleek、Archive、Trove，或者通用 WMS 供应商？
  - 要用下游结果继续训练模型，必须拿到哪些数据权利和买家同意条款？
operatingAssumptions:
- assumption: 英国有足够多账户符合滩头市场门槛，而且掌握自己的判级经济账。
  basis: research.yaml
  validationTest: 做出一张前 30 个账户地图，再跑 15 场访谈，确认月处理量、分拣线数量，以及路由决策由谁拍板。
  decisionImpact: 如果不成立，就要更早扩地理范围，或把 ICP 收窄到体量更集中的慈善分拣中心。
- assumption: 单线辅助路由能在混装服装上带来至少 5% 的净回收收益提升。
  basis: idea.yaml
  validationTest: 做 A/B 试点，对比基线与辅助路由在实际回收收益、吞吐、争议率和改判频率上的差异。
  decisionImpact: 如果不成立，就把产品改定位成 QA 或合规工作流，或者直接停止这条假设。
- assumption: 客户愿意共享下游结果和争议数据。
  basis: research.yaml
  validationTest: 拿下两份试点协议，要求出货后 90 天内按批次回传结果数据。
  decisionImpact: 如果不成立，就别再押学习型优化，也不要给数据护城河估值。
- assumption: 主管在短期培训后，会接受这套人机协同工作流。
  basis: 运营判断
  validationTest: 按周追踪活跃使用率和改判率，目标是在第 6 周把稳定品类的改判率压到 30% 以下。
  decisionImpact: 如果不成立，就要继续加服务和 UX 投入，并推迟任何以自动化为卖点的销售动作。
- assumption: 整站定价能摸到研究里的约 $330k+ ACV 区间，而且不需要重度定制服务。
  basis: research.yaml
  validationTest: 拿 6 位买家测试价格，并在前两个试点里把服务成本压到首年合同价值的 25% 以下。
  decisionImpact: 如果不成立，就下修 ACV 预期，先把部署产品化，再去扩销售。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 英国前 30 个目标账户地图与 ICP 访谈
  hypothesis: 符合滩头市场画像的仓库足够多，而且会承认自己确实存在可量化的收益和争议痛点。
  successMetric: 完成 15 场访谈；确认 10 个账户月处理量超过 200,000 件、具备自有判级能力，且存在明确采购触发点。
  owner: CEO
- horizon: 0-90 天
  experiment: 带数据共享条款的共创客户 LOI
  hypothesis: 至少两家潜在客户会为了试点价格，开放路由级结果、拒收和争议数据。
  successMetric: 签下 2 份试点 LOI，KPI 数据结构谈妥，并获得 90 天结果访问权。
  owner: CEO 与运营负责人
- horizon: 0-90 天
  experiment: 单线影子模式采集工作流
  hypothesis: 在先不开启建议的前提下，相机采集和操作员平板可以嵌进产线，而不拖慢入仓。
  successMetric: 影子模式下采集率达到 90%+，吞吐降幅控制在 2% 以内。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 辅助路由试点
  hypothesis: 路由建议加主管改判，相比基线能把单件净回收收益至少拉高 5%。
  successMetric: 净回收收益提升 >= 5%，第 4 周改判率 < 40%，争议率不上升。
  owner: ML / 数据负责人
- horizon: 90-180 天
  experiment: 面向复购买家的批次护照试验
  hypothesis: 数字批次护照能把验货周期和争议率压到足以支撑模块定价。
  successMetric: 试点批次的审批速度提升 20%，或争议率下降 25%。
  owner: 产品与商业化负责人
- horizon: 6-12 个月
  experiment: 全站扩张与客户背书
  hypothesis: 只要单线试点成功，就能转成整站合同，并形成可复用的销售案例。
  successMetric: 签下 1 个整站合同、拿到 1 个可公开背书客户，并让第 2 个站点扩张进入销售管线。
  owner: CEO 与客户成功负责人
operations:
- 部署前先做站点就绪清单：灯光、相机机位、网络稳定性和货桶分类体系都要过一遍。
- 每天复盘例外情况，把模型建议、主管改判和最终路由决策逐条对上。
- 每周和客户的 GM、质检负责人、商业负责人一起开一次收益与买家争议运营会。
- 在替换系统主记录之前，先通过 CSV 或 API 把数据送进现有清单或仓储工具。
- 按批次保留审计日志，给出口、质检和买家护照提供证据。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责采集工作流、平板 UX，以及上线真实产线所需的首批 WMS / 清单集成。
- role: ML / 数据负责人
  startTiming: 第 0-3 个月
  rationale: 负责路由推荐模型、置信度阈值，以及从改判和下游结果里拉起反馈闭环。
- role: 实施 / 客户成功
  startTiming: 第 3 个月
  rationale: 负责站点校准、操作员培训和每周 ROI 复盘，避免试点卡死在变革管理上。
- role: 商业化创始人或首位销售工程师
  startTiming: 第 6 个月
  rationale: 把试点证据变成可复制的扩张动作，去吃下少量高价值英国账户。
- role: 合规 / 集成负责人
  startTiming: 第 9-12 个月
  rationale: 等客户开始要正式量产部署后，负责出口文档工作流、审计日志和更深的系统集成。
milestones:
- horizon: 0-12 个月
  items:
  - 签下 2 家共创客户，并至少跑 1 个付费单线试点
  - 证明净回收收益至少提升 5%，同时把吞吐波动控制在基线 ±2% 内
  - 上线数字批次护照和试点批次的下游结果回传
  - 把首个试点转成整站合同
- horizon: 12-24 个月
  items:
  - 在 3-5 个正式站点部署，并沉淀出可对外复用的英国扩张打法
  - 把试点转正式生产做成可复制动作，标准实施周期压到 6 周以内
  - 上线跨站点的基准分析和买家争议报告
  - 完成首个市场平台或回收合作方集成
- horizon: 24-36 个月
  items:
  - 从英国滩头市场继续扩到更多欧洲或离岸分拣枢纽
  - 把正式站点做到 10 个，与研究里的 SOM 案例对齐
  - 用跨站点数据继续提高路由准确率和各品类的置信度阈值
  - 判断相邻的合规、买家网络或融资产品，是否已被数据深度和账户拉力支撑起来
risks:
- risk: 异构库存、灯光环境和本地判级习惯，会让早期建议不够可靠。
  likelihood: High
  impact: High
  mitigation: 先从一个仓、一条线起步，让主管留在环里，先把站点特定模型校准好，再扩多站点。
- risk: 客户不会共享足够多的下游成交、拒收和争议数据，闭环护城河就搭不起来。
  likelihood: Medium
  impact: High
  mitigation: 把结构化结果回传写进试点合同，并把前几单的定价绑在可量化的收益提升上，而不是绑在“全自动”叙事上。
- risk: 分拣员和主管会无视建议，让产品退化成一块看板，而不是操作系统。
  likelihood: Medium
  impact: High
  mitigation: 把改判可视化，先在一条线把 ROI 跑出来，再和线长每周复盘结果。
- risk: Fleek、Archive、Trove 或仓储系统现有厂商等相邻玩家，可能会继续上游切进中立路由。
  likelihood: Medium
  impact: Medium
  mitigation: 先靠站点级工作流贴合度、更快部署，以及专有的路由结果和批次护照数据抢下窗口期。
- risk: 实施和现场支持工作量降不下来，软件毛利率就守不住。
  likelihood: Medium
  impact: Medium
  mitigation: 在放大外呼销售之前，先把采集硬件、部署 SOP 和集成模板标准化。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的跑道会用在做出 MVP、跑 2-3 个付费试点、完成首个整站部署、补齐核心产品 / ML / 实施岗位，并拿到足够证据去判断这个切口能不能支撑一条可复制的 seed 级扩张路径。
