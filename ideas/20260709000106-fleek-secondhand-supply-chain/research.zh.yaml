competitors:
- name: Fleek
  stage: 成长期
  wedge: AI 原生批发市场，加上 Fleek Sort，用来给二手服装做判级、定价和商品化。
  pricing: 以市场平台抽成和定制化 B2B 经济模式为主；抓到的页面里没有公开企业软件标价。
  strength: 在用交易数据训练路由逻辑、把二手供应链上游数字化这件事上，和我们的重叠度最高。
  weaknessVsUs: 它和自家市场平台及供应商网络绑得太紧，不是任何分拣仓都能直接接入的中立仓库优先操作层。
  sourceRefs:
  - 1
  - 2
  - 3
- name: Archive
  stage: 成长期
  wedge: 面向品牌自营二手转售的 OS，覆盖 AI、WMS、动态定价和以旧换新工作流。
  pricing: 定制化企业定价；抓到的页面里没有公开价目表。
  strength: 在入仓、判级、修复、定价和转售运营上的工作流深度很强。
  weaknessVsUs: 它是为品牌二手转售和退货打造的，不是为混装货源仓或批发出口批次打造的。
  sourceRefs:
  - 17
  - 18
  - 19
  - 33
- name: Trove
  stage: 成长期
  wedge: 覆盖退货、转售和品牌二手转售运营，并用 AI 做定价和路由。
  pricing: 定制化企业定价；抓到的页面里没有公开价目表。
  strength: 在去向价值决策、二手转售物流和退货经济学上，有非常明确的运营导向。
  weaknessVsUs: 它的核心仍是品牌和 3PL 的退货项目，而不是二手货源仓里的首轮判级决策层。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: Refiberd
  stage: 种子期
  wedge: 用 AI 和高光谱检测去服务纺织分拣与回收的材质识别。
  pricing: 定制化商业合作；抓到的页面里没有公开价目表。
  strength: 一旦需要纤维级确定性，它在材质识别上的技术能力很强。
  weaknessVsUs: 它优化的是材质识别，不是可再穿服装的商业判级、渠道路由或面向买家的批次清单。
  sourceRefs:
  - 24
- name: PICVISA
  stage: 现有厂商
  wedge: 面向回收工厂的光学纺织分拣系统，使用 NIR、视觉、深度学习等自动化能力。
  pricing: 按设备和项目做定制报价；抓到的页面里没有公开价目表。
  strength: 已经有真实工厂落地，在按成分和颜色做纺织分类方面具备很强的自动化可信度。
  weaknessVsUs: 它更适合工业纺织分拣和回收，而不是转售优先的判级、价格带划分和批发批次护照。
  sourceRefs:
  - 25
  - 26
  - 27
regulatoryTechnicalConstraints:
- point: 出口商必须先把纺织品分拣干净、去掉污染、按统一规格组织载荷，并保留质量评估和合同合规证据。
  sourceRefs:
  - 11
  - 32
- point: 哪怕公司第一步先从英国起跑，EU 的纺织战略、生态设计规则和数字产品护照落地，都会持续抬高追溯要求。
  sourceRefs:
