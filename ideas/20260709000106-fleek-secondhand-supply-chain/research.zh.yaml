openQuestions:
- 英国到底有多少二手仓库真的能做到月处理 200,000 件以上，而且判级流程是自己掌握，不是外包？
- 一套路由模型在混装、非奢侈服装上，到底能带来多少收益提升；把改判、清洗成本和买家拒收都算进去后，账还能不能成立？
- 批发商和复购买家到底会不会共享足够结构化的下游结果数据，让闭环护城河能持续成立？
- 面向买家的批次护照，除了提升内部仓库效率外，能不能把实际售价或争议率改善到足够有感？
