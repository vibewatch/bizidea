    rationale: TAM 按约 280 个高吞吐二手分拣 / 批发站点等价体测算，覆盖欧洲、北美和主要出口枢纽；站点数参考了 EU 与英国纺织物流量基准，以及大型设施吞吐数据；280 个站点 × 每站约 $360k 的混合年合同价值，约等于 $101.0M。
    isEstimate: true
    sourceRefs:
    - 8
    - 9
    - 15
    - 29
    - 36
  sam:
    value: $13.2M
    rationale: SAM 只算英国滩头市场：大约 40 个仓库或出口商，规模上大致符合这条假设；站点数来自英国再利用 / 回收流量和 Oxfam 级别的吞吐参考；40 个站点 × 每站约 $330k，约等于 $13.2M。
    isEstimate: true
    sourceRefs:
    - 8
    - 9
    - 10
  som:
    value: $4.0M
    rationale: SOM 取第 3 年可够到的情景：10 个正式站点，先从单线试点做起，再扩成整仓合同，每站混合 ARR 约为 $400k。
    isEstimate: true
    sourceRefs:
    - 8
    - 9
    - 20
    - 21
