  searchedQueries:
  - 找关于二手服装转售市场的权威且近期来源，最好是能量化英国、欧洲或全球二手服装增长，以及分拣或供应链运营瓶颈的报告或一手资料。
  - 找关于英国或欧洲旧衣分拣、判级和批发仓运营的一手或可信来源，包括慈善分拣中心、纺织回收商或二手服装出口商；最好能描述人工分拣流程、吞吐或劳动强度。
  - 找二手服装运营、品牌二手转售、纺织分拣或转售基础设施中的 AI / 软件竞品和相邻产品资料，尤其是 Fleek、Archive、Trove、Recurate、Refiberd、TOMRA、PICVISA 等公司的官方产品页、案例、定价页或融资新闻。
  - 找 ThredUp 2025 或 2026 官方 Resale Report 页面，以及关于转售市场增长的可信近期报道。
  - 找 Oxfam Wastesaver、Traid 或其他英国二手服装分拣设施的官方或一手资料，最好能说明吞吐、吨位或仓库运营。
  - 找欧洲或英国关于纺织品单独收集、纺织品废运规则，以及纺织品数字产品护照或生态设计的官方监管资料。
  - 找 Archive 转售平台、Trove，以及 Trove 收购 Recurate 的可信近期融资或交易新闻，最好来自 TechCrunch、WWD、Vogue Business 或官方新闻稿。
  - 找 BCG 或 McKinsey 关于全球转售市场规模、增速，或时尚转售运营挑战的官方或可信资料。
  - 找英国或欧洲协会 / 政府关于纺织品收集或再利用规模、运营方数量、慈善零售分流吨位，或大规模二手纺织品分拣能力的官方资料。
  - 找 Fleek、Trove、Archive、Recurate、Refiberd、TOMRA textiles 和 PICVISA 的官方产品页，要求和二手服装运营或纺织品分拣直接相关。
  - 找 Oxfam 关于流程、分拣、判级、再利用、出口仓库与旧衣处理的官方资料。
