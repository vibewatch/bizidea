slug: garment-yield-routing-os
date: '2026-07-09'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-09]；模型从同月起算，因为 pre-seed 融资和试点路线图都会立刻启动。'
- id: A2
  name: pre-seed 交割后的期初现金
  value: '2200'
  unit: usdK
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M 和 runwayMonths 18]；模型按 $2.2M 融资额来算，这样可以跑到 Q4Y2 的验证点，并额外留出 6 个月缓冲。'
- id: A3
  name: 经营行里的收入单位
  value: 活跃付费客户标识（试点或正式站点）
  unit: customer unit
  source: '[BP gtm.wedge 先付费试点、再转站点合同]；经营行统计的是付费客户标识，liveSitesEop 则单独展示正式投产站点数。'
- id: A4
  name: 起始付费客户数（M1）
  value: '0'
  unit: count
  source: '[BP fundingAsk 处于 pre-seed 阶段，experimentRoadmap 也显示商业试点之前要先做账户映射和共创客户 LOI]。'
- id: A5
  name: 付费试点费用
  value: '45'
  unit: usdK per pilot
  source: '[BP investorMemo.firstCustomer.initialContract 为 $25k-$50k 的 8-12 周试点]；模型取中高位，因为这个切口明确是付费试点，不是免费试用。'
- id: A6
  name: 试点时长
  value: '3'
  unit: months
  source: '[BP buyingProcess 和 investorMemo.initialContract 都写的是 8-12 周]。'
- id: A7
  name: 首个正式站点 ARR
  value: '360'
  unit: usdK per year
  source: '[BP pricing 目标会爬到研究里的 ~$330k-$400k ACV 区间]；[Research market.tam 和 sam 采用的是 ~$330k-$360k / 站点]；基础情景按接近该区间上沿的价格进入正式生产。'
- id: A8
  name: 模块和产线扩张后的成熟站点 ARR
  value: '400'
  unit: usdK per year
  source: '[BP market.som 假设 10 个正式站点在试点转站点后做到约 $400k 的混合 ARR]；[BP businessModel.expansionLevers 还会继续加产线、模块和网络扩张]。'
- id: A9
  name: 基础试点启动节奏
  value: M6、M10、M14、M17、M20、M23、M26、M29、M31、M33
  unit: month index
  source: '[BP milestones 要求 Y1 跑出 1 个付费试点和首个正式站点，12-24 个月做到 3-5 个正式站点，24-36 个月做到 10 个]；[BP gtm.funnelTargets 也是创始人主导、强判断的账户销售]。'
- id: A10
  name: 从初始 ARR 扩到成熟 ARR 的时间
  value: '12'
  unit: months after production go-live
  source: '[BP gtm.funnelTargets 要求首站到第二站扩张在 12 个月内达到 60%+]；[BP businessModel.expansionLevers 也包含同一仓里的产线和模块扩张]。'
- id: A11
  name: 分阶段毛利率
  value: 试点 35%，初始正式部署 70%，成熟正式部署 76%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 为 70]；[BP operatingAssumptions 认为服务成本应低于首年合同价值的大约 25%]；再结合创业财务经验值：在打法标准化之前，试点本来就会更吃实施。'
- id: A12
  name: 单位经济模型里的稳态月流失率
  value: '2.0'
  unit: percent
  source: 创业财务经验值：这是粘性强但实施不轻的垂直软件，合同价值高，但客户集中度仍然会带来真实的大客户流失风险。
- id: A13
  name: 创始人全成本薪酬
  value: '150'
  unit: usdK annual
  source: 创业财务经验值：pre-seed 阶段创始人现金薪酬低于市场价，再加上工资税和福利。
- id: A14
  name: 工程 / ML 全成本薪酬
  value: '165'
  unit: usdK annual
  source: 创业财务经验值：这是英国 / 欧洲一名应用 ML 或计算机视觉岗位的全成本薪酬，已含福利。
- id: A15
  name: 实施 / 客户成功全成本薪酬
  value: '110'
  unit: usdK annual
  source: 创业财务经验值：这是能够负责校准、培训和 ROI 复盘的现场实施岗位全成本。
- id: A16
  name: 销售 / 商业化全成本薪酬
  value: '130'
  unit: usdK annual
  source: 创业财务经验值：这是偏销售工程师风格的企业 GTM 岗位；浮动佣金不放在工资里，而是体现在 CAC 和 S&M 支出中。
- id: A17
  name: 合规 / 集成全成本薪酬
  value: '125'
  unit: usdK annual
  source: '[BP team 里的合规 / 集成负责人在第 9-12 个月入场]；对应的是一名带福利的工作流与集成岗位全成本。'
- id: A18
  name: G&A / 运营全成本薪酬
  value: '95'
  unit: usdK annual
  source: 创业财务经验值：这是在首批正式站点立住之后，才补上的精简财务 / 运营岗位。
- id: A19
  name: 招聘顺序
  value: M1 创始人 + 创始工程师，M2 ML 负责人，M4 实施，M7 商业化，M10 合规，M15 第 2 位工程师，M18 第 2 位实施，M21 第 2 位销售，M24 运营，M30 第 3 位工程师
  unit: month index
  source: '[BP team.startTiming 和 strategicChoices.sequencingRationale]；先补产品、ML 和现场交付，再扩更大范围的商业化。'
- id: A20
  name: 非薪酬运营支出爬坡
  value: Y1 每月 14/18/22/26，按季度爬坡；Y2 每月 28/30/32/34；Y3 每 3 个月一档，分别为每月 36/38/40/42
  unit: usdK per month
  source: '[BP fundingAsk.useOfFundsSummary 会覆盖 MVP、试点、首个整站部署和核心招聘]；再结合创业财务经验值，纳入云、硬件、差旅、保险和法务支出。'
- id: A21
  name: Opex 职能配比
  value: S&M 从 15% 升到 33%，R&D 从 60% 降到 40%，G&A 保持在 25-27%
  unit: percent of opex
  source: '[BP strategicChoices.sequencingRationale]；前期支出会更偏产品和部署，等客户背书出来后，再逐步转向可复制的商业覆盖。'
- id: A22
  name: 每个正式站点的混合 CAC
  value: '123'
  unit: usdK
  source: 模型推导得出：Y1-Y2 大约投了 $615K 的销售与市场费用，在 Q4Y2 前拿下 5 个正式站点；这和面向小买家宇宙的创始人主导企业销售是匹配的。
- id: A23
  name: 基础销售周期
  value: 6 个月拿下试点，再用 3 个月把试点转成站点合同
  unit: months
  source: '[BP buyingProcess 说付费试点要在拿到 8-12 周证据后再扩]；[BP investorMemo 也要求先证明收益提升、吞吐稳定和争议下降，再把首站转正式合同]。'
- id: A24
  name: 下一轮融资的里程碑
  value: 第 24 个月做到 5 个正式站点，并留出 6 个月现金缓冲
  unit: milestone
  source: '[BP milestones 要求在 12-24 个月里部署 3-5 个正式站点，并把实施标准化到 6 周以内]；[BP fundingAsk.runwayMonths 为 18]；模型再额外加 6 个月缓冲，避免被迫融资。'
- id: A25
  name: 现金转换假设
  value: '0'
  unit: working-capital or capex adjustment in usdK
  source: 创业财务经验值：这个阶段的现金流主要由工资和运营支出决定，因此规划模型用 EBITDA 近似现金变动，并假设没有显著的债务、税项或 capex 抵消。
