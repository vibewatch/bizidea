    - 首个正式站点 ARR 落在约 $336K，成熟 ARR 落在约 $372K，而不是按 SOM 情景走。
    - 分阶段毛利率降到约 30% / 66% / 72%。
  base:
    description: 到 Q4Y3 做到 10 个正式站点，早期试点顺利转成站点合同，少数成熟账户也开始往 SOM 定价案例扩张。
    y3RevenueK: 2963.7
    y3EbitdaK: 175.3
    cashLowPointK: 799.4
    keyAssumptionChanges:
    - 试点按 M6、M10、M14、M17、M20、M23、M26、M29、M31、M33 依次启动。
    - 站点进入正式生产时 ARR 约为 $360K，并在约 12 个月后爬到 $400K ARR。
    - 只有当试点交付变得可复制后，毛利率才能越过 70% 目标。
  upside:
    description: 有背书客户之后，后续试点会被提前拉动，成熟账户也会更早多上产线和模块。
    y3RevenueK: 3344.0
    y3EbitdaK: 574.0
    cashLowPointK: 1022.1
    keyAssumptionChanges:
    - 首个背书站点上线后，后续试点启动时间大约能提前 2 个月。
    - 首个正式站点 ARR 提升到约 $372K，成熟 ARR 提升到约 $420K。
    - 随着实施更快标准化，分阶段毛利率可改善到约 38% / 72% / 78%。
sensitivity:
- variable: ARPU
  downsideCase: 首个正式站点 ARR 为 $336K，成熟 ARR 为 $372K。
  baseCase: 首个正式站点 ARR 为 $360K，成熟 ARR 为 $400K。
  upsideCase: 首个正式站点 ARR 为 $378K，成熟 ARR 为 $420K。
  y3RevenueImpactK: -200.7
  cashImpactK: -209.8
- variable: CAC
  downsideCase: 如果差旅、试点支持和证明过程一直偏手工，CAC 会爬到约 $155K。
  baseCase: 在创始人主导筛选、目标账户清单很短的前提下，CAC 可维持在约 $123K。
  upsideCase: 只要客户背书和买家引荐开始推动漏斗，CAC 就有机会降到约 $100K。
  y3RevenueImpactK: 0.0
  cashImpactK: -309.1
- variable: 流失率
  downsideCase: 一个早期正式站点在第 28 个月左右流失，而不是续约并扩张 ARR。
  baseCase: 经营模型里不额外假设早期流失；单位经济模型按 2.0% 稳态流失率计算。
  upsideCase: 随着批次护照和 ROI 看板真正嵌进工作流，月流失率有机会降到 1.0%。
  y3RevenueImpactK: -299.7
  cashImpactK: -227.7
- variable: 销售周期
  downsideCase: 如果证明过程和采购流程更长，后续试点就会整体晚一个季度。
  baseCase: 从建立联系到拿下付费试点大约 6 个月，再用约 3 个月把试点转成站点合同。
  upsideCase: 客户背书能把后续试点启动时间提前约 2 个月。
  y3RevenueImpactK: -411.6
  cashImpactK: -355.2
- variable: 毛利率
  downsideCase: 试点 / 初始 / 成熟毛利率分别落在 30% / 66% / 72%。
  baseCase: 试点 / 初始 / 成熟毛利率分别为 35% / 70% / 76%。
  upsideCase: 试点 / 初始 / 成熟毛利率分别提升到 38% / 72% / 78%。
  y3RevenueImpactK: 0.0
  cashImpactK: -186.1
- variable: 招聘节奏
  downsideCase: 在可复制性还没被证实前，就被迫提前招入一名额外工程师和一名实施。
  baseCase: 团队只会在 Q4Y2 验证点打到后，于 Y3 再加 1 名工程师。
  upsideCase: 最后一名工程师要等到 seed 级验证点打到，且合作方积压需求足够明显后才会入场。
  y3RevenueImpactK: 0.0
  cashImpactK: -202.1
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Accounts[Target accounts] --> Pilots[Paid lane pilots]
      Pilots --> Sites[Live site contracts]
      Sites --> Expansion[Line and module expansion]
      Expansion --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: 收入引擎
  finding: 基础情景下的收入，来自 10 个仓库客户：它们先从约 $45K 的付费试点起步，再爬到约 $360K 的正式站点 ARR，最后逐步逼近 $400K 的 SOM 情景。
- checkName: 必须跑通的前提
  finding: 实施必须尽快标准化，才能在把毛利率守在 70% 以上的同时，仍以每 3-4 个月一个的节奏继续开后续试点。
- checkName: 模型会失效的情形
  finding: 只要后续试点整体晚一个季度，或早期有一个站点流失，现金水位就会在公司明确自我造血前掉向下行情景。
- checkName: 下一轮融资验证点
  finding: 能支撑下一轮 seed 融资的验证点是：到 Q4Y2 做到 5 个正式站点，部署周期压到 6 周以内，并且至少有 1 个账户已经开始向多线或多模块 ARR 扩张。
sanityChecks:
  ruleOf40: Y3 增长 120% + EBITDA 利润率 6% = 126%
  burnMultiple: Y2 烧钱倍数为 $575.5K / 新增净收入 $1138.2K = 0.5x；Y3 开始 EBITDA 转正。
  revenuePerFte: Y3 每名 FTE 对应 $269K 收入，团队规模 11 人（轻服务型垂直 SaaS 的基准约为 $200-400K）。
  flags:
  - 基础情景实际上假设到第 36 个月，计划中的 10 个试点都会转成正式站点；这个假设明显强于 BP 里“试点转站点 50%+”的底线。
  - 英国滩头市场大约只有 40 个测算站点，前几家样板账户里只要错过一家，客户增长和定价信心都会一起放慢。
  - 只有当实施成本快速压缩、服务成本保持在首年合同价值约四分之一以下时，毛利率才能越过 70%。
  - 到 Q4Y2 为止，收入仍集中在少数几个客户上，所以哪怕只有一次流失或续约失手，跑道都会更接近下行情景。
