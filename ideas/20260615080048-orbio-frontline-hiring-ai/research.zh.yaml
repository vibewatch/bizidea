  adoptionFrictionMatrix:
  - friction: ATS、HRIS 和筛查技术栈集成
    severity: high
    affectedBuyer: 人才运营/HRIT
    mitigation: 以叠加方式推出，附带预构建连接器、导出和窄口首个工作流，而非以一体化平台进行替换定位。
    sourceRefs:
    - 31
    - 35
    - 43
    - 46
    - 48
  - friction: 候选人在个人手机上的信任度和响应率
    severity: high
    affectedBuyer: 招聘/候选人体验
    mitigation: 使用带品牌的短信和语音、快速回拨、语言感知模板，以及敏感案例的人工升级。
    sourceRefs:
    - 28
    - 39
    - 61
    - 64
  - friction: 按岗位-州分类的执照和就绪差异
    severity: high
    affectedBuyer: 资质认证/合规
    mitigation: 从窄口岗位-州矩阵起步，固化可复用模板，仅在结果基准可信后才扩展。
    sourceRefs:
    - 53
    - 54
    - 55
    - 56
  - friction: 法律对受监管招聘中自动化的接受度
    severity: medium
    affectedBuyer: HR/法务
    mitigation: 在不利处置和异常工作流中保留人工环节，同时维护审计日志和规则透明度。
    sourceRefs:
    - 49
    - 50
    - 51
