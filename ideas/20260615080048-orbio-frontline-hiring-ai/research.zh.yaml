competitors:
- name: Orbio
  stage: scale-up
  wedge: 覆盖面试、入职、日常跟进和留用工作流的全周期一线 AI 智能体。
  pricing: 未公开披露；企业销售模式。
  strength: 最接近证明企业买家愿意为 AI 管理的一线转化工作流买单的公开案例。
  weaknessVsUs: 更宽泛的生命周期范围可能稀释针对行为健康和学校服务入职的深度岗位-州就绪模板。
  sourceRefs:
  - 26
- name: Paradox
  stage: incumbent
  wedge: 面向大规模招聘的对话式 ATS 和移动优先申请、筛查与排班。
  pricing: 未公开披露；企业销售模式。
  strength: 候选人体验自动化强劲，一线招聘时效压缩经过验证。
  weaknessVsUs: 重心仍在漏斗前期招聘，而非接受录用后的多州就绪编排。
  sourceRefs:
  - 30
  - 31
  - 35
  - 74
- name: Fountain
  stage: scale-up
  wedge: 横向一线招聘平台，移动优先设计，具备候选人缺席感知工作流。
  pricing: 未公开披露；企业销售模式。
  strength: 对一线速度、候选人缺席和大规模招聘运营有深刻理解。
  weaknessVsUs: 横向行业聚焦使其对临床资质认证、学校审查和首日就绪异常缺乏针对性。
  sourceRefs:
  - 38
  - 39
- name: WorkJam
  stage: scale-up
  wedge: 跨沟通、任务、培训和 AI 工作流的一线劳动力编排。
  pricing: 未公开披露；企业销售模式。
  strength: 员工一旦进入一线系统后，运营沟通和行动路由功能强大。
  weaknessVsUs: 更偏向入职后而非录用后，对确保受监管候选人在首日前完全获得许可的重视程度较低。
  sourceRefs:
  - 40
  - 41
  - 42
- name: WorkBright
  stage: scale-up
  wedge: 合规为中心的远程入职和 I-9 工作流。
  pricing: 未公开披露；企业销售模式。
  strength: 在入职节点的远程 I-9、文件和可审计性定位强劲。
  weaknessVsUs: 表单和验证的单点工具，而非横跨完整入职前序列的双向就绪智能体。
  sourceRefs:
  - 43
  - 44
