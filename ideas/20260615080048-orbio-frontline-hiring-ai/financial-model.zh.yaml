scenarios:
  downside:
    description: "审计到试点和试点到生产的转化率均落在商业计划漏斗范围的低端，实施滑坡持续一个季度，附加扩展收入附着时间推迟。"
    y3RevenueK: 2105.0
    y3EbitdaK: -1098.0
    cashLowPointK: -245.0
    keyAssumptionChanges:
      - "第三年以 12 个客户结束，而非 15 个。"
      - "混合年度 ARPU 因工作流包扩展推迟而维持在约 $190k。"
      - "毛利率因实施仍然偏定制而停滞在约 65%。"
  base:
    description: "试点以声明的 50%+ 阈值转化，可复用工作流包抑制服务蔓延，适度附加费将成熟 ARPU 提升至 $200k 核心候选人费之上。"
    y3RevenueK: 3011.0
    y3EbitdaK: -528.2
    cashLowPointK: 330.1
    keyAssumptionChanges:
      - "第三年以 15 个客户结束，与 SOM 一致。"
      - "成熟生产账户含可选工作流和集成费年均约 $220k 收入。"
      - "毛利率在第三年接近商业计划目标约 70%。"
  upside:
