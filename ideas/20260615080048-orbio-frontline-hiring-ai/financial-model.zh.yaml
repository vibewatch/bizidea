modelSanity:
  - checkName: 营收引擎
    finding: "基准情景将 1–2 个付费试点增长至 15 个付费账户，并以有限工作流包扩展将成熟 ARPU 提升至 $200k 核心合同之上，在第三年达到约 $3.0M 收入。"
  - checkName: 必须成立的假设
    finding: "试点到生产转化率必须维持在 50% 以上，同时可复用的岗位-州工作流包须防止实施工作淹没小型交付团队。"
  - checkName: 模型失效条件
    finding: "如果实施持续偏定制或漏斗转化率落至计划低端，收入将滑向 $2.1M 的下行情景，现金在下一轮融资前转负。"
  - checkName: 下轮融资证明
    finding: "如果公司在 Q4Y2 实现 8 个生产客户、打包集成和基准报告，且仍有充足缓冲现金，则种子轮故事最具说服力。"
sanityChecks:
  ruleOf40: "第三年增长率 154.7% + EBITDA 利润率 -17.5% = 137.2%。"
  burnMultiple: "以年度净烧钱额除以净新增收入衡量，烧钱倍数从第二年约 0.9x 改善至第三年约 0.3x。"
  revenuePerFte: "$215K（第三年）（SaaS 基准 $200–400K）"
  flags:
    - "公司在第三年仍略处于 EBITDA 亏损状态，因此下一轮融资可能需要在完全盈亏平衡前关闭。"
    - "第一至二年毛利率低于 70% 目标，因为实施和合规工作仍在吸收固定支持成本。"
    - "第三年计划仅依赖 15 个客户，收入集中度仍高——任何单一客户延迟都可能对现金产生实质影响。"
