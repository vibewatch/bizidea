slug: day-one-readiness-os
date: '2026-06-15'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: 模型起始月
    value: '2026-07'
    unit: month
    source: "[BP date 2026-06-15]；财务建模惯例：模型起始月取计划日期后的下一个完整月份。"
  - id: A2
    name: 种子前轮开盘现金
    value: '2500'
    unit: USD K
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18]；基准情景使用 $2.5M 种子前轮，使融资额保持在声明范围内，同时覆盖 Q4Y2 验证里程碑并留有 6 个月缓冲。"
  - id: A3
    name: 客户单元
    value: paying employer account
    unit: unit
    source: "[BP businessModel.unitOfValue active post-offer candidate under readiness orchestration]；收入在雇主账户层面建模，因为合同以试点或年度企业账户形式销售。"
  - id: A4
    name: 成熟客户核心年度收入
    value: '200'
    unit: USD K/customer/year
    source: "[BP market.som and Research market.som] 第三年 SOM 定义为 15 家客户 × 2,000 名候选人 × $100 每名候选人 = 每名成熟客户 $200k 年度核心收入。"
  - id: A5
    name: 试点合同金额
    value: '60'
    unit: USD K/pilot
    source: "[BP investorMemo.firstCustomer.initialContract $40k-$80k paid pilot]；基准情景取中间值。"
  - id: A6
    name: 生产账户平均扩展及附加收入
    value: '20'
    unit: USD K/customer/year
    source: "[BP gtm.pricing optional integration and workflow fees + BP milestones 24-36 months adjacent workflows]；基准情景假设成熟客户在核心候选人费之上平均附加 $20k。"
  - id: A7
    name: 第一年付费客户增长节奏
    value: '0,0,0,1,1,1,2,2,2,3,3,4'
    unit: customers EOP by month
    source: "[BP milestones 0-12 months] 第一年支持 1–2 个付费试点和至少一个年度生产合同，因此模型以 4 个付费客户结束第一年。"
  - id: A8
    name: 第二年付费客户增长节奏
    value: '5,6,7,8'
    unit: customers EOP by quarter
    source: "[BP milestones 12-24 months] 商业计划目标是在第 12–24 个月达到 5–8 个生产客户，因此基准情景以 8 个客户结束第二年。"
  - id: A9
    name: 第三年付费客户增长节奏
    value: '10,12,14,15'
    unit: customers EOP by quarter
    source: "[BP market.som and Research market.som] 第三年 SOM 明确假设在第三年末达到 15 个客户。"
  - id: A10
    name: 按阶段划分的收入确认节奏
    value: "第一年试点阶段每个活跃客户每月 $10k–$12k；第二年混合每平均客户每季度 $45.0k–$52.5k；第三年混合每平均客户每季度 $60.0k–$66.0k。"
    unit: pricing ramp
    source: "[A4-A6 + BP investorMemo.firstCustomer.initialContract + BP gtm.pricing] 早期收入以试点为主，随后转向附带适度附加费的 $200k+ 年度生产合同。"
  - id: A11
    name: 规模化目标毛利率
    value: '70'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 明确目标毛利率为 70%。"
  - id: A12
    name: 固定平台及合规支持 COGS
    value: '第一年每月 6；第二年每季度 18；第三年每季度 21'
    unit: USD K
    source: "[Research regulatoryTechnicalConstraints + startup-finance heuristic] 早期交付在可变量规模化之前，需要基础消息推送、主机托管、监控和合规支持。"
  - id: A13
    name: 可变 COGS 比率
    value: '25'
    unit: percent of revenue
    source: "[BP businessModel.targetGrossMarginPct 70 + Research implementation/customization risk] 25% 可变交付负担使固定支持成本后的成熟毛利率接近 70%。"
  - id: A14
    name: 创始人/CEO 全包年度成本
    value: '150'
    unit: USD K/FTE/year
    source: "[BP team Founder CEO startTiming Month 0]；种子前轮阶段适度现金薪酬加社保和福利的财务建模惯例。"
  - id: A15
    name: 工程师全包年度成本
    value: '175'
    unit: USD K/FTE/year
    source: "[BP team Founding eng startTiming Month 0]；高级全栈或工作流平台工程师的财务建模惯例。"
  - id: A16
    name: 方案/实施工程师全包年度成本
    value: '140'
    unit: USD K/FTE/year
    source: "[BP team Solutions / implementation engineer startTiming Month 3]；重实施型 B2B SaaS 的财务建模惯例。"
  - id: A17
    name: 产品/工作流负责人全包年度成本
    value: '150'
    unit: USD K/FTE/year
    source: "[BP team Product / workflow lead startTiming Month 6]；工作流设计和产品运营领导力的财务建模惯例。"
  - id: A18
    name: 客户成功/合规项目经理全包年度成本
    value: '130'
    unit: USD K/FTE/year
    source: "[BP team Customer success / compliance program manager startTiming Month 9]；客户治理和合规运营的财务建模惯例。"
  - id: A19
    name: 销售/GTM 全包年度成本
    value: '160'
    unit: USD K/FTE/year
    source: "[BP sequencingRationale founder-led sales first + BP milestones 12-24 partner-led distribution]；附适度浮动薪酬的企业 GTM 招聘的财务建模惯例。"
  - id: A20
    name: G&A 全包年度成本
    value: '110'
    unit: USD K/FTE/year
    source: "[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 精简财务和运营支持仅在多个企业账户上线后才加入。"
  - id: A21
    name: 第二年招聘计划
    value: "第 16 个月新增首位销售，第 17 个月新增第二位工程师，第 18 个月新增第二位方案工程师，第 19 个月新增第二位客户成功，第 20 个月新增第二位销售，第 21 个月新增首位 G&A。"
    unit: hires
    source: "[BP milestones 12-24 months + BP team sequencing] 仅在试点上线且可复用集成开始成形后才扩大人员规模。"
  - id: A22
    name: 第三年招聘计划
    value: "第 25 个月新增第三位工程师，第 28 个月新增第二位产品/工作流，第 31 个月新增第三位销售。"
    unit: hires
    source: "[BP milestones 24-36 months + BP sequencingRationale] 第三年招聘放缓，聚焦产品复用和有节制的 GTM 规模化。"
  - id: A23
    name: 非薪资运营支出节奏
    value: "第一年每月 $18k–$33k；第二年每季度 $90k/$105k/$125k/$145k；第三年每季度 $155k/$170k/$185k/$205k。"
    unit: USD K
    source: "[BP operations + Research regulatoryTechnicalConstraints + startup-finance heuristic] 出差、法律、合规、QA、消息推送和轻度需求生成随试点和多账户支持增长，但保持精简。"
  - id: A24
    name: 每个新生产客户的 CAC
    value: '70'
    unit: USD K/customer
    source: "[BP gtm funnelTargets + startup-finance heuristic] 含工作流审计、试点和合作伙伴支持的创始人主导企业销售，按保守的每个转化生产客户 $70k CAC 建模。"
  - id: A25
    name: 月度客户流失率
    value: '2.0'
    unit: percent/month
    source: "[Research willingnessToPay sticky ROI thesis + startup-finance heuristic] 嵌入后合同应具有粘性，但集中的早期客户基础决定使用保守的 2.0% 月度流失率进行单位经济测算。"
  - id: A26
    name: EBITDA 到现金的转换比率
    value: '1.0'
    unit: cash conversion ratio
    source: "[Startup-finance heuristic] 模型假设无债务、税务或资本支出足以扭曲早期阶段现金流动，因此以 EBITDA 作为现金过渡桥梁。"
  - id: A27
    name: 下一轮融资里程碑
    value: "在 Q4Y2 前达到 8 个生产客户，打包首批主要集成，并推出基准报告。"
    unit: milestone
    source: "[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] 这是种子前轮必须资助的运营验证节点，之后才能启动下一轮融资。"
