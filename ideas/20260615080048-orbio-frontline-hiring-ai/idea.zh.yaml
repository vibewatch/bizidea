problem: >-
  多地点的行为健康和学校治疗服务提供商通常在候选人通过筛选后便将其流失——资质认证包、背景调查、培训、文件收集和班次确认，至今仍由招聘人员、电子表格、电话和通用 HRIS 任务来协调。对于没有企业邮箱的一线工作者，从接受录用到正式上班之间每次交接失误，都会拉高空缺率并耗尽招聘产能。代价不仅是招聘变慢：还有丧失可计费产能、延误患者或学生服务覆盖，以及从未做好上班准备的员工早早流失。
targetUser:
  primary: >-
    美国行为健康、ABA 治疗和学校治疗服务雇主中的人才运营负责人，每年招聘数百至数千名一线临床医生、治疗师、辅助专业人员和支持人员
  secondary: >-
    负责将候选人从接受录用推进到第一个排班的招聘人员、资质认证协调员和分支机构经理
  buyer: COO 或人才运营副总裁
startupThesis:
  nonObviousInsight: >-
    一线招聘的难点不再只是候选人来源；真正卡住的是面试通过到第一个班次之间那段混乱的、游离于系统之外的转化窗口——面向不依赖邮箱、往往需要繁琐合规入职的工作者。变化在于：买家如今愿意信任智能体工作流来管理多步骤候选人互动，首批生产落地案例也证明转化提升幅度足以为此划拨预算。
  beachhead: >-
    在美国多州运营的行为健康和学校服务人力外包商，每年招聘超过 1,000 名一线工作者，且因资质认证和入职摩擦，在候选人接受录用后到第一个可计费班次之间大量流失
  wedge: >-
    一个短信/语音「首日就位」智能体——收集缺失文件、追进培训、确认班次偏好、将阻塞问题升级给人工，并精确告知运营方哪些候选人真正做好了上班准备
  whyNowCatalyst: >-
    Orbio 的融资和在行为健康客户处报告的 20% 录用转化提升，证明一线雇主已将 AI 管理的候选人转化视为紧迫、可纳入预算的基础设施。
  ventureScalePath: >-
    从行为健康领域的合规性首日就位切口起步，随后拓展到毗邻的医疗人力外包、居家护理、零售、物流和酒店业，逐步叠加排班、出勤干预、留用工作流，最终构建一线劳动力操作系统。
solution: >-
  产品接入 ATS、HRIS、电子签名、背景调查和培训技术栈，成为从接受录用到第一班次的候选人端控制平面。通过短信和语音而非邮件优先门户进行沟通，收集缺失表单，用通俗语言解释下一步骤，推动候选人完成各州特定要求，仅在必要时将边缘情况升级给招聘人员。运营方拥有一个实时就绪看板，显示哪些候选人被卡在文件、执照、筛查、培训或排班上，并按地点和岗位预测预计可上班产能。初期产品刻意保持窄范围：提高合规繁琐的一线招聘中录用到首日的转化率。随着时间推移，公司积累关于流失模式、就绪瓶颈和入职前参与信号的专有数据集，延伸到留用和劳动力规划领域。
goToMarketSeed:
  firstCustomer: >-
    美国行为健康或学校治疗服务提供商，每年一线入职候选人 2,000 人以上、跨 10 个以上州运营，且招聘团队仍通过电子表格、电话和各自分离的供应商门户协调录用后入职事宜
  buyingTrigger: >-
    新学年招聘高峰、多州扩张，或高管要求减少未填补案例量和招聘人员工作量——因为太多候选人接受了录用却始终无法做好上班准备
  currentAlternative: >-
    招聘人员和资质认证团队通过电子表格、电话、短信、电子签名包、人力外包机构以及通用 ATS 或 HRIS 入职模块进行协调
  switchingReason: >-
    切口不要求雇主更换 ATS 或 HRIS；它直接提升可上班转化率和招聘人员效率，作用于现有厂商最薄弱的高摩擦窗口
  pricingHypothesis: >-
    按录用后管道中的活跃候选人收费的 SaaS 模式，附企业最低消费，并针对合规工作流模板或高级集成收取附加费
whyNow:
  - point: 风险投资机构正在将一线招聘自动化作为独立赛道加注，为买家制造了紧迫感，也为新进入者创造了机会。
    signalRefs: ["前沿资本正式押注一线 HR 自动化"]
    sourceRefs: [1]
  - point: 买家正从单一招聘机器人转向能够跨员工生命周期管理多步骤运营工作流的智能体系统。
    signalRefs: ["全周期 AI 智能体工作流已落地投产"]
    sourceRefs: [1, 2]
  - point: 候选人通过率提升 20% 的已报数据证明，筛选后的转化是值得优先解决的高价值瓶颈。
    signalRefs: ["候选人到录用的转化率可量化、有实质价值"]
    sourceRefs: [1]
  - point: 一线雇主仍依赖电子表格和电话服务无企业邮箱的工作者，留下了通用 HR 软件尚未填补的大片流程空白。
    signalRefs: ["无企业邮箱的一线劳动力仍被数字工具遗漏"]
    sourceRefs: [2]
  - point: 市场正在奖励覆盖招聘到留用的平台，因此「首日就位」切口有充分理由拓展为更宽泛的一线劳动力平台。
    signalRefs: ["企业需要全周期覆盖，而非单点自动化"]
    sourceRefs: [2]
differentiator: >-
  现有 ATS 和 HRIS 工具将入职视为核心工作完成后的待办清单，而招聘自动化厂商则聚焦于更早期的漏斗阶段。这家公司独占针对无企业邮箱、合规繁琐一线工作者的录用后转化窗口——运营痛点强烈，ROI 在填满的班次中清晰可见。其护城河来自工作流特定数据：哪些候选人群体、文件、州份和沟通模式能预测首日成功或流失，让它比通用工作流工具更快优化就绪编排。
conceptDiagram:
  title: 首日就绪循环
  mermaid: |
    flowchart LR
      Buyer[VP Talent Ops at behavioral health provider] --> Pain[Candidates accept offers but stall before first shift]
      Pain --> Product[SMS and voice day one readiness agent]
      Product --> Outcome[More shift ready hires with less recruiter work]
