    - 从录用后工作流拓展到留用和出勤干预
  revenueStreams:
    - 按活跃候选人收费的 SaaS 费
    - 企业平台最低消费
    - 实施和集成费
  keyResources:
    - 候选人沟通与编排引擎
    - 按州和岗位定制的入职工作流模板
    - 跨岗位、地点和供应商的就绪基准数据集
  keyActivities:
    - 编排候选人文件和培训完成
    - 监控阻塞状态和升级路径
    - 集成 ATS、HRIS、筛查和培训系统
    - 衡量转化率、首日到岗时间和招聘效率结果
  keyPartners:
    - ATS 和 HRIS 供应商
    - 背景调查和资质认证提供商
    - 培训和 LMS 平台
    - 医疗人力咨询顾问
  costStructure:
    - 集成和实施人工成本
    - 短信、电话和编排基础设施
    - 工作流运营和客户成功
    - 企业医疗销售和合规支持
jobsToBeDone:
  - job: >-
      当行为健康服务提供商有已接受录用的候选人时，帮助招聘团队推动每个人完成文件、审查、培训和排班，使其在无需持续手工跟进的情况下达到可上班状态。
    currentAlternative: 招聘人员通过电子表格、电话、短信和供应商门户手工跟催候选人
    successMetric: 录用到首日到岗转化率，及从接受录用到首班次的中位天数
  - job: >-
      当区域负责人在为即将到来的案例量或新学年规划人员覆盖时，帮助他们了解哪些员工真正做好了上班准备、哪些阻塞因素将造成排班缺口，以便在收入和服务交付受损前及时干预。
    currentAlternative: 静态入职报告加上招聘人员的临时更新
    successMetric: 填班率，及按地点预测的可上班人数准确性
