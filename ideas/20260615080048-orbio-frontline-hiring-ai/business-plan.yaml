slug: day-one-readiness-os
date: '2026-06-15'
executiveSummary: >-
  Day-one Readiness OS should start as an SMS-and-voice post-offer readiness
  layer for U.S. multi-state behavioral health and ABA employers that lose
  candidates between accepted offer and first billable shift. The urgent pain is
  not top-of-funnel sourcing; it is the off-system window where recruiters and
  credentialing teams still chase documents, screenings, trainings, and shift
  confirmation through spreadsheets, phone calls, and disconnected vendor
  portals. The initial product should sit on top of the existing ATS, HRIS,
  background-check, and training stack rather than replacing them, because the
  budget case depends on faster deployment and measurable recovered starts. This
  beachhead is narrower and faster to prove than a general frontline hiring
  platform because compliance-heavy readiness work is where generic ATS and
  onboarding tools fail most visibly for no-email workers. The first customer
  should be a VP Talent Operations or COO at a provider hiring 2,000 or more
  frontline workers per year across multiple states and entering a school-year
  ramp, regional expansion, or vacancy-reduction push. Research supports an
  estimated "$37.5M" TAM, "$12.0M" SAM, and "$3.0M" year-3 SOM for this
  narrow wedge, so the venture case depends on later expansion into adjacent
  healthcare staffing and workforce operations rather than the beachhead alone.
  The most important evidence gap is causality: the inputs do not show how much
  lost-start volume comes from process friction versus pay, schedule, or
  location mismatch. The first 12 months therefore need to prove that a narrow
  role-state template set, branded SMS and voice outreach, and blocker
  visibility can materially improve start-readiness without turning the company
  into an implementation-heavy services business.
problem:
  - "Recruiters and credentialing teams at multi-state behavioral health employers still coordinate post-offer document collection, screenings, trainings, and schedule confirmation through spreadsheets, calls, and fragmented vendor portals, so accepted candidates stall before day one."
  - "For no-email frontline workers in regulated care settings, every missed post-offer handoff reduces filled shifts, delays billable coverage, and forces operators to carry high recruiter workload without a reliable readiness forecast."
solution:
  - "Provide an SMS-and-voice readiness agent that becomes the candidate-facing control plane from accepted offer to first shift, collecting missing items, explaining next steps, and escalating exceptions to humans only when needed."
  - "Give talent operations and branch leaders a live readiness board that shows which candidates are blocked on documents, background checks, training, licensure, or scheduling and forecasts who is actually safe to start by role and location."
whyWeWin:
  - "The wedge is narrower than a generic recruiting bot and more outcome-linked than a checklist onboarding tool: improve offer-to-start conversion in compliance-heavy workflows where buyers already feel lost revenue and labor pain."
  - "Incumbents split the workflow across ATS, onboarding, and workforce-ops products, while this company is designed to own the post-offer conversion window without demanding system replacement."
  - "A defensible data asset can compound around blocker patterns by role, state, vendor, and communication channel, which is more specific and harder to copy than generic onboarding analytics."
strategicChoices:
  beachhead: "U.S. multi-state behavioral health and ABA providers hiring therapists, paraprofessionals, and support staff at 2,000+ annual-hire scale, where post-offer readiness failures directly reduce billable coverage."
  wedgeRationale: "Behavioral health providers create faster proof than a broad frontline market because vacancies are economically urgent, compliance tasks are material, and the buyer can measure ROI in recovered starts and recruiter-capacity relief. This is a better first wedge than direct school-district sales because providers have clearer software budgets and more year-round operating urgency, while still benefiting from back-to-school ramps."
  sequencingRationale: "Start with one narrow promise: convert more accepted offers into shift-ready starts through mobile-first orchestration and blocker visibility. Keep founder-led sales, a limited role-state matrix, and overlay integrations until the company proves conversion lift in 2-3 lighthouse accounts; only then add deeper forecasting, more professions, and adjacent workforce workflows. Hiring and partnerships should follow that sequence, because scaling implementation before proof would erase the software-margin story."
  notYet:
    - "Direct school-district sales as the primary motion"
    - "Rip-and-replace ATS or HRIS positioning"
    - "Full-lifecycle retention, attendance, or scheduling products before the post-offer wedge converts reliably"
    - "Long-tail healthcare subsegments with unique credentialing logic before the first role-state packs are repeatable"
market:
  tam: "$37.5M estimated TAM based on roughly 150 U.S. multistate behavioral-health and school-services employers, about 2,500 post-offer candidates per year, and about $100 per active post-offer candidate managed."
  sam: "$12.0M estimated SAM based on about 60 highest-friction U.S. behavioral-health and school-services accounts at roughly 2,000 managed post-offer candidates each."
  som: "$3.0M modeled year-3 SOM based on 15 customers averaging roughly 2,000 managed post-offer candidates annually at about $100 per candidate."
  segments:
    - "Primary: multi-state behavioral health and ABA providers with centralized talent operations and credentialing teams"
    - "Secondary: school-services and therapy staffing providers that face back-to-school hiring ramps and multi-state clearance complexity"
  buyingProcess: >-
    The operational champion is usually the talent-operations leader,
    credentialing head, or regional operator who owns post-offer throughput,
    while the economic buyer is typically the COO or VP Talent Operations
    because the value shows up in filled caseloads and recruiter productivity.
    Deals should start around a concrete trigger such as seasonal ramp, regional
    expansion, or a vacancy-reduction mandate, then move through HRIT and
    compliance review because the product touches candidate communications,
    screenings, and audit trails.
product:
  mvp: >-
    The MVP should ingest post-offer candidate status from the ATS or flat-file
    export, orchestrate SMS and voice outreach for missing documents,
    screenings, trainings, and scheduling, and present a readiness board with
    blocker categories and human-escalation queues. Human review should remain
    mandatory for compliance exceptions and adverse workflows, because the first
    win is reliable execution and visibility rather than full autonomy.
  sixMonth: "Launch one design-partner workflow for one provider group and a narrow role-state pack, prove usable readiness tracking against the current manual process, and support at least one repeatable ATS or screening integration pattern."
  twelveMonth: "Convert 2-3 paid pilots, ship packaged integrations for the dominant stack combinations seen in those accounts, and prove a measurable lift in offer-to-start conversion or reduction in median days to readiness."
  twentyFourMonth: "Expand from readiness orchestration into forecasting, benchmark reporting, and adjacent provider segments such as home health or broader healthcare staffing while keeping post-offer conversion as the control point."
  keyBets:
    - "A material share of lost starts in the ICP is caused by process and compliance friction rather than compensation or schedule mismatch."
    - "Candidates without corporate email will respond to branded SMS and voice outreach at a rate high enough to change outcomes."
    - "A narrow initial role-state template set can cover enough hiring volume to avoid custom workflow work for every account."
    - "Providers will buy an overlay product before replacing their ATS, onboarding, or workforce-management stack."
gtm:
  wedge: "Sell one paid pilot to a multi-state behavioral health provider where post-offer candidate volume, compliance complexity, and vacancy pressure are already visible, starting with one region or role family and expanding only after conversion lift is proven."
  channels:
    - "Founder-led direct sales to COOs, VP Talent Operations leaders, and credentialing owners at scaled behavioral health and ABA providers"
    - "Integration and referral partnerships with ATS, background-check, credentialing, and training vendors that benefit from a post-offer overlay rather than system replacement"
    - "Warm introductions from healthcare staffing consultants, PE operating partners, and frontline-workforce advisors already involved in scale-up hiring programs"
  funnelTargets: "Target account→qualified workflow audit 20-30%, workflow audit→paid pilot 25-35%, paid pilot→annual production contract 50%+, production→second region or service-line expansion 60%+ within 12 months."
  pricing: "Annual SaaS priced per active post-offer candidate with an enterprise minimum, plus optional fees for regulated workflow packs and premium integrations. This aligns pricing to the queue the product actually manages and lets buyers justify spend against recovered starts and recruiter-capacity relief rather than seat count."
businessModel:
  revenueStreams:
    - "Annual platform subscription with an enterprise minimum"
    - "Per-active-post-offer-candidate usage fees"
    - "Implementation and integration fees for enterprise rollout"
    - "Premium workflow packs for additional roles, states, or compliance-heavy processes"
  unitOfValue: "Active post-offer candidate under readiness orchestration"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one region or role family to provider-wide post-offer coverage"
    - "Add new role-state workflow packs and adjacent healthcare staffing segments after the first template set is repeatable"
    - "Layer forecasting, benchmark analytics, and eventually first-week attendance or retention workflows on top of the readiness dataset"
strategyMap:
  northStarMetric: "Percentage of accepted offers converted to start-ready hires within target SLA"
  inputMetrics:
    - "Qualified opportunities with a current ramp, expansion, or vacancy trigger"
    - "Share of pilot candidates mapped to a supported role-state workflow pack"
    - "Candidate response rate to branded SMS and voice outreach"
    - "Median days from accepted offer to readiness clearance"
    - "Recruiter or credentialing touches per candidate before and after rollout"
    - "Pilot accounts converting to annual contracts and second-region expansion"
  moatsToBuild:
    - "Role-state workflow graph linking blockers, required steps, and start outcomes"
    - "Communication-performance dataset by role, state, language, and channel"
    - "Benchmark dataset tying readiness friction to filled-start outcomes across multistate providers"
  killCriteria:
    - "If post-offer funnel audits show that fewer than 40% of lost starts in the first 5 design-partner accounts are caused by workflow friction the product can influence, narrow the wedge or stop."
    - "If the first 2 pilots fail to improve offer-to-start conversion by at least 15% or reduce median days to readiness by at least 30%, the ROI case is too weak."
    - "If the first 10 qualified prospects mostly demand custom implementation or ATS replacement before buying, the overlay software thesis is false."
  mermaid: |
    flowchart LR
      Wedge[Regulated post-offer wedge] --> MVP[SMS and voice readiness MVP]
      MVP --> Proof[Higher start-ready conversion]
      Proof --> Expansion[Adjacent staffing and workforce workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: "Strong pain and credible adjacent proof, but current wedge economics and category compression make this a monitor-until-pilot-proof opportunity."
    whyBelieve: "The company targets a measurable failure point between accepted offer and first shift where incumbents are fragmented and a mobile-first overlay can plausibly recover starts without replacing core HR systems."
    whyDoubt: "The narrow beachhead is not yet large enough on its own for venture scale, and the inputs do not prove that onboarding friction rather than compensation or scheduling is the dominant cause of lost starts."
    nextDiligence: "Validate one paid lighthouse pilot that isolates post-offer friction, proves conversion lift with limited implementation, and shows a credible path to $150k+ annual software spend."
  firstCustomer:
    title: "VP Talent Operations at a multi-state behavioral health provider"
    profile: "A provider hiring 2,000+ frontline workers per year across 10+ states, with recruiters and credentialing coordinators still using spreadsheets, calls, and multiple vendor portals after offer acceptance."
    trigger: "A seasonal ramp, multi-state expansion, or executive push to reduce unfilled caseloads after too many accepted candidates fail to become shift-ready."
    buyer: "COO or VP Talent Operations"
    initialContract: "$40k-$80k paid pilot for one region or role family covering roughly 500-1,500 post-offer candidates, converting to about $150k-$300k annual software spend if readiness and recruiter-efficiency targets are met."
  mustBeTrue:
    - "At least 40-50% of lost starts in the first design-partner accounts come from process or compliance friction the product can affect."
    - "At least 3 of the first 10 qualified ICP accounts will buy a paid pilot without requiring ATS or HRIS replacement."
    - "The first 2 pilots will improve offer-to-start conversion by at least 15% or reduce median days to readiness by at least 30%."
    - "One narrow role-state template set will cover at least 60% of pilot post-offer volume without heavy custom services."
    - "At least one pilot customer will convert to $150k+ annual software spend based on recovered starts and recruiter-capacity relief rather than project labor."
  diligenceQuestions:
    - "What percentage of lost starts in target accounts is actually caused by credentialing and onboarding friction versus pay, location, or schedule mismatch?"
    - "Which ATS, HRIS, background-check, and training-stack combinations dominate the first 20 target accounts?"
    - "What completion or response lift is achievable with branded SMS and voice outreach relative to the buyer's current manual process?"
    - "How much human review do compliance teams require before they trust automation in regulated post-offer workflows?"
    - "Can the company reach six-figure ACV without becoming a services-heavy integration shop?"
operatingAssumptions:
  - assumption: "A large enough share of lost starts in the ICP is caused by workflow and compliance friction rather than compensation or scheduling problems."
    basis: research.yaml
    validationTest: "Run post-offer funnel audits in at least 5 design-partner accounts and confirm at least 40% of lost starts fall into blocker categories the product can influence."
    decisionImpact: "If false, narrow the ICP to roles or employers where compliance friction is dominant or abandon the wedge."
  - assumption: "Buyers will adopt an overlay orchestration product faster than they would a rip-and-replace ATS or onboarding system."
    basis: idea.yaml
    validationTest: "In the first 10 qualified opportunities, confirm at least 3 agree to a paid pilot using existing systems of record and no core-system replacement."
    decisionImpact: "If false, the company must partner earlier, OEM into incumbent platforms, or accept slower enterprise sales cycles."
  - assumption: "Candidates in the target workflows will respond to branded SMS and voice outreach enough to materially improve readiness completion."
    basis: research.yaml
    validationTest: "Measure response and completion rates during the first 1,000 candidate journeys and confirm at least a 20% higher completion rate than the buyer's manual baseline on supported steps."
    decisionImpact: "If false, the product must shift toward operator visibility and task routing rather than candidate-facing automation."
  - assumption: "A limited initial role-state pack can serve most pilot volume without high custom implementation cost."
    basis: operator judgment
    validationTest: "Track the first 3 pilots and confirm at least 60% of candidate volume fits within the initial role-state templates with no account-specific workflow rebuild."
    decisionImpact: "If false, implementation margins collapse and the company must narrow the beachhead further or reprice for services."
  - assumption: "Recovered starts and recruiter-capacity relief are enough to justify six-figure annual spend from the economic buyer."
    basis: research.yaml
    validationTest: "For the first 2 pilots, quantify recovered starts, days-to-readiness reduction, and manual-touch savings, then confirm at least one buyer signs an annual contract at or above $150k."
    decisionImpact: "If false, pricing must fall, the product must add adjacent value modules, or the company should target a different buyer segment."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Run post-offer funnel audits with 5 design-partner accounts and classify every lost-start reason."
    hypothesis: "Workflow and compliance friction, not top-of-funnel sourcing, is the dominant fixable cause of lost starts in the beachhead."
    successMetric: "At least 40% of lost starts fall into categories the product can influence."
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: "Build a concierge readiness board for one provider using existing exports and manual status updates."
    hypothesis: "Operators will actively use blocker visibility before full integration exists."
    successMetric: "At least 3 operating users review the board weekly and use it to prioritize interventions on live candidates."
    owner: Founding eng
  - horizon: "0–90 days"
    experiment: "Test branded SMS sequences with human voice fallback on a limited candidate cohort inside one design-partner workflow."
    hypothesis: "Mobile-first outreach outperforms the current mix of email, phone tag, and recruiter reminders."
    successMetric: "Supported workflow-step completion improves by at least 20% versus the account baseline."
    owner: Product lead
  - horizon: "90–180 days"
    experiment: "Launch one paid pilot for a single region or role family and measure offer-to-start conversion, days to readiness, and manual touches."
    hypothesis: "A narrow post-offer wedge can deliver ROI visible to the COO or VP Talent Operations within one pilot cycle."
    successMetric: "At least 15% higher offer-to-start conversion or at least 30% faster median readiness clearance versus baseline."
    owner: Founder CEO
  - horizon: "90–180 days"
    experiment: "Productize the first two repeatable integration patterns and one role-state workflow pack seen in pilot accounts."
    hypothesis: "The implementation model can become software-led rather than bespoke after the first lighthouse deployment."
    successMetric: "At least 60% of pilot workflow steps are covered by reusable connectors and templates in the second deployment."
    owner: Founding eng
  - horizon: "6–12 months"
    experiment: "Test one partner-led pipeline motion through an ATS, screening, or healthcare-ops referral source."
    hypothesis: "A referenceable pilot outcome will unlock warmer and cheaper distribution than pure outbound alone."
    successMetric: "At least 2 qualified opportunities are sourced from one repeatable partner channel."
    owner: Partnerships lead
operations:
  - "Run a baseline measurement process for offer-to-start conversion, days to readiness, and recruiter touches before every pilot."
  - "Maintain role-state workflow packs covering document, screening, training, and escalation logic for the initial professions served."
  - "Operate branded and compliant candidate communications with deliverability monitoring, opt-out handling, and escalation routing."
  - "Package repeatable integrations for the dominant ATS, screening, and training stacks in early accounts."
  - "Review readiness-blocker data weekly with customers so pilot outcomes stay tied to recovered starts and recruiter-capacity savings."
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: "Own founder-led sales, design-partner discovery, and pilot ROI packaging because the first budget case depends on tight customer feedback loops."
  - role: Founding eng
    startTiming: Month 0
    rationale: "Build the orchestration engine, readiness board, and first integration patterns while keeping the product overlay-first."
  - role: Solutions / implementation engineer
    startTiming: Month 3
    rationale: "Shorten pilot launch time, map customer stacks, and prevent the founding engineer from getting trapped in one-off integrations."
  - role: Product / workflow lead
    startTiming: Month 6
    rationale: "Codify role-state templates, communication journeys, and blocker taxonomy once the first design-partner patterns are visible."
  - role: Customer success / compliance program manager
    startTiming: Month 9
    rationale: "Support pilot governance, weekly readiness reviews, and audit-trail discipline before scaling to multiple enterprise accounts."
milestones:
  - horizon: "0–12 months"
    items:
      - "Validate that workflow friction is a material cause of lost starts in at least 5 design-partner accounts."
      - "Launch 1-2 paid pilots with one repeatable role-state workflow pack and one repeatable integration pattern."
      - "Show at least 15% conversion lift or 30% faster readiness clearance in one lighthouse account."
      - "Convert at least one pilot into an annual production contract."
  - horizon: "12–24 months"
    items:
      - "Reach 5-8 production customers concentrated in behavioral health and adjacent provider segments."
      - "Package the dominant ATS, screening, and training integrations used in early accounts."
      - "Expand from one role-state pack into a broader set of behavioral health and school-services workflows without major services creep."
      - "Launch benchmark reporting and readiness forecasting as paid expansion modules."
  - horizon: "24–36 months"
    items:
      - "Expand into adjacent healthcare staffing or home-health workflows that share post-offer readiness complexity."
      - "Use the readiness dataset to add first-week attendance or early-retention interventions where customers already trust the system."
      - "Establish partner-led distribution as a meaningful source of qualified pipeline alongside direct sales."
risks:
  - risk: "Horizontal ATS, onboarding, or workforce vendors make post-offer automation good enough and collapse the category into bundled features."
    likelihood: High
    impact: High
    mitigation: "Stay focused on regulated multistate readiness workflows, prove conversion outcomes buyers can measure, and integrate into incumbent systems instead of competing head-on as a full suite."
  - risk: "Role-by-state compliance variance makes implementations slower and more custom than the software model can support."
    likelihood: Medium
    impact: High
    mitigation: "Constrain the first 12 months to a narrow profession and state set, productize templates aggressively, and refuse edge-case expansion before core packs are repeatable."
  - risk: "Candidate behavior is driven more by pay, shift, or commute mismatch than by post-offer process friction."
    likelihood: Medium
    impact: High
    mitigation: "Audit lost-start reasons before scaling, qualify prospects where workflow friction is already visible, and stop selling where economics are outside the product's control."
  - risk: "SMS deliverability, opt-outs, or low trust reduce engagement enough to blunt outcome gains."
    likelihood: Medium
    impact: Medium
    mitigation: "Use branded messaging, voice fallback, language-aware templates, and employer-backed escalation paths, and monitor completion by channel from day one."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months to prove 2-3 lighthouse pilots, convert at least one to six-figure annual software revenue, build the first reusable integrations and role-state workflow packs, and hire the small implementation and customer-success team needed to keep the model software-led."
