  adoptionFrictionMatrix:
  - friction: ATS, HRIS, and screening-stack integration
    severity: high
    affectedBuyer: Talent Operations / HRIT
    mitigation: Launch as an overlay with prebuilt connectors, exports, and a narrow first workflow instead of a rip-and-replace platform.
    sourceRefs:
    - 31
    - 35
    - 43
    - 46
    - 48
  - friction: Candidate trust and responsiveness on personal phones
    severity: high
    affectedBuyer: Recruiting / Candidate Experience
    mitigation: Use branded SMS and voice, fast callbacks, language-aware templates, and human escalation for sensitive cases.
    sourceRefs:
    - 28
    - 39
    - 61
    - 64
  - friction: Role-by-state licensure and readiness variance
    severity: high
    affectedBuyer: Credentialing / Compliance
    mitigation: Start with a narrow role-state matrix, codify reusable templates, and expand only after outcome benchmarks are trustworthy.
    sourceRefs:
    - 53
    - 54
    - 55
    - 56
  - friction: Legal comfort with automation in regulated hiring
    severity: medium
    affectedBuyer: HR / Legal
    mitigation: Keep humans in the loop for adverse-action and exception workflows, while preserving audit logs and rules transparency.
    sourceRefs:
    - 49
    - 50
    - 51
