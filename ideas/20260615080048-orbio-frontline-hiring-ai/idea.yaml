      and scheduling, so they can become shift-ready without constant manual
      follow-up.
    currentAlternative: Recruiters manually chasing candidates across spreadsheets, calls, texts, and vendor portals
    successMetric: Offer-to-start conversion rate and median days from accepted offer to first shift
  - job: >-
