problem: >-
  Multi-site behavioral health and school-based therapy providers often get
  candidates through screening, then lose them before the first shift because
  licensing packets, background checks, training, document collection, and shift
  confirmation are still coordinated through recruiters, spreadsheets, phone
  calls, and generic HRIS tasks. For no-email frontline workers, every missed
  handoff between offer acceptance and day one compounds vacancy rates and burns
  recruiter capacity. The cost is not just slower hiring; it is lost billable
  capacity, delayed patient or student coverage, and early churn from workers who
  never become fully ready to start.
targetUser:
  primary: >-
    Talent operations leaders at U.S. behavioral health, ABA therapy, and
    school-based therapy employers hiring hundreds to thousands of frontline
    clinicians, therapists, paraprofessionals, and support staff annually
  secondary: >-
    Recruiters, credentialing coordinators, and branch managers responsible for
    getting candidates from offer accepted to first scheduled shift
  buyer: COO or VP of Talent Operations
startupThesis:
  nonObviousInsight: >-
    The hard part of frontline hiring is no longer sourcing alone; it is the
    messy, off-system conversion window between interview pass and first shift
    for workers who do not live in email and often need compliance-heavy
    onboarding. What changed is that buyers now trust agentic workflows to own
    multi-step candidate interactions, and the first production proof points
    show conversion uplift is measurable enough to justify budget.
  beachhead: >-
    U.S. behavioral health and school-services staffing providers operating
    across multiple states, hiring more than 1,000 frontline workers per year,
    and losing candidates between offer acceptance and first billable shift due
    to credentialing and onboarding friction
  wedge: >-
    An SMS-and-voice day-one readiness agent that collects missing documents,
    chases trainings, confirms shift preferences, escalates blockers to humans,
    and tells operators exactly which candidates are truly ready to start
  whyNowCatalyst: >-
    Orbio's funding and reported 20% hire-conversion gain at a behavioral health
    customer show that frontline employers now see AI-managed candidate
    conversion as urgent, budgetable infrastructure.
  ventureScalePath: >-
    Start with regulated day-one readiness in behavioral health, then expand into
    adjacent healthcare staffing, home health, retail, logistics, and
    hospitality, adding scheduling, attendance interventions, retention
    workflows, and eventually a frontline workforce operating system.
solution: >-
  The product plugs into the ATS, HRIS, e-sign, background-check, and training
  stack, then becomes the candidate-facing control plane from offer accepted to
  first shift. It communicates by SMS and voice, not email-first portals, to
  collect missing forms, explain next steps in plain language, nudge candidates
  through state-specific requirements, and escalate edge cases to recruiters only
  when needed. Operators get a live readiness board showing who is blocked on
  documents, licensure, screening, training, or scheduling, plus forecasts for
  expected ready-to-start capacity by location and role. The initial product is
  deliberately narrow: improve offer-to-day-one conversion in compliance-heavy
  frontline hiring. Over time, the company builds a proprietary dataset on
  dropout patterns, readiness bottlenecks, and pre-start engagement signals that
  can extend into retention and workforce planning.
goToMarketSeed:
  firstCustomer: >-
    A U.S. behavioral health or school-based therapy provider with 2,000 or more
    annual frontline hires, operations in 10 or more states, and a recruiting
    team still coordinating post-offer onboarding through spreadsheets, calls,
    and disconnected vendor portals
  buyingTrigger: >-
    A new school year ramp, multi-state expansion, or an executive mandate to
    reduce unfilled caseloads and recruiter workload after too many candidates
    accept offers but never become shift-ready
  currentAlternative: >-
    Recruiters and credentialing teams coordinating via spreadsheets, phone
    calls, text messages, e-sign packets, staffing agencies, and generic ATS or
    HRIS onboarding modules
  switchingReason: >-
    The wedge does not ask employers to replace their ATS or HRIS; it directly
    lifts ready-to-start conversion and recruiter productivity in the highest
    friction window where incumbents still break down
  pricingHypothesis: >-
    SaaS priced per active candidate in the post-offer pipeline, with enterprise
    minimums based on annual hire volume and add-on fees for regulated workflow
    templates or premium integrations
