topRisks:
  - name: Workflow overlap
    description: ATS, HRIS, and recruiting-automation vendors may claim they already handle onboarding and try to bundle basic features into existing contracts.
    mitigation: Start where incumbents are weakest by proving conversion lift in compliance-heavy, no-email post-offer workflows and integrate rather than replace core systems.
  - name: Compliance complexity
    description: State-specific credentialing, privacy, and training requirements in behavioral health may make standardized automation difficult.
    mitigation: Launch with a narrow set of roles and states, build templated workflow packs with human escalation, and expand coverage only after referenceable outcomes.
  - name: Candidate engagement fatigue
    description: Candidates may ignore automated messages if outreach feels repetitive or untrustworthy during a stressful onboarding process.
    mitigation: Use branded employer messaging, mix SMS with voice follow-up, keep humans in the loop for sensitive steps, and optimize journeys against measured completion rates.
