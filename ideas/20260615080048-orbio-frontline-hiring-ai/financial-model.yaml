scenarios:
  downside:
    description: "Audit-to-pilot and pilot-to-production conversion both land at the low end of the BP funnel range, one quarter of implementation slippage persists, and add-on expansion attaches later."
    y3RevenueK: 2105.0
    y3EbitdaK: -1098.0
    cashLowPointK: -245.0
    keyAssumptionChanges:
      - "Y3 exits at 12 customers instead of 15."
      - "Blended annual ARPU stays closer to $190k because workflow-pack expansion is delayed."
      - "Gross margin stalls near 65% because implementation remains more bespoke."
  base:
    description: "Pilots convert at the stated 50%+ threshold, reusable workflow packs cap services creep, and modest add-on fees lift mature ARPU above the $200k core candidate fee."
    y3RevenueK: 3011.0
    y3EbitdaK: -528.2
    cashLowPointK: 330.1
    keyAssumptionChanges:
      - "Y3 exits at 15 customers in line with SOM."
      - "Mature production accounts average about $220k annual revenue including optional workflow and integration fees."
      - "Gross margin approaches the BP target at roughly 70% by Y3."
  upside:
    description: "Referenceable lighthouse pilots shorten the sales cycle, expansion lands faster inside existing groups, and implementation reuse keeps gross margin above target."
    y3RevenueK: 3810.0
    y3EbitdaK: 115.0
    cashLowPointK: 710.0
    keyAssumptionChanges:
      - "Y3 exits at 17 customers with stronger same-logo expansion."
      - "Blended annual ARPU reaches roughly $240k as adjacent workflow packs attach earlier."
      - "Gross margin improves to about 73% as reusable integrations absorb more delivery work."
