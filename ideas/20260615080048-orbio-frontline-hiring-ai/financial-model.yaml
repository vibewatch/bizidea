slug: day-one-readiness-os
date: '2026-06-15'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-07'
    unit: month
    source: "[BP date 2026-06-15]; startup-finance heuristic: start the model on the next full month after the plan date."
  - id: A2
    name: Opening cash from pre-seed round
    value: '2500'
    unit: USD K
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M and runwayMonths 18]; base case uses a $2.5M pre-seed so the raise stays inside the stated range while funding the Q4Y2 proof milestone plus a 6-month buffer."
  - id: A3
    name: Customer unit
    value: paying employer account
    unit: unit
    source: "[BP businessModel.unitOfValue active post-offer candidate under readiness orchestration]; revenue is modeled at the employer-account level because contracts are sold as pilots or annual enterprise accounts."
  - id: A4
    name: Core production annual revenue per mature customer
    value: '200'
    unit: USD K/customer/year
    source: "[BP market.som and Research market.som] Year-3 SOM is defined as 15 customers x 2,000 candidates x $100 per candidate = $200k annual core revenue per mature customer."
  - id: A5
    name: Pilot contract value
    value: '60'
    unit: USD K/pilot
    source: "[BP investorMemo.firstCustomer.initialContract $40k-$80k paid pilot]; base case uses the midpoint."
  - id: A6
    name: Average expansion and add-on revenue on production accounts
    value: '20'
    unit: USD K/customer/year
    source: "[BP gtm.pricing optional integration and workflow fees + BP milestones 24-36 months adjacent workflows]; base case assumes mature customers carry a modest $20k average attach above the core candidate fee."
  - id: A7
    name: Y1 paying-customer ramp
    value: '0,0,0,1,1,1,2,2,2,3,3,4'
    unit: customers EOP by month
    source: "[BP milestones 0-12 months] The first year supports 1-2 paid pilots and at least one annual production contract, so the model exits Y1 with 4 paying logos."
  - id: A8
    name: Y2 paying-customer ramp
    value: '5,6,7,8'
    unit: customers EOP by quarter
    source: "[BP milestones 12-24 months] The business plan targets 5-8 production customers in months 12-24, so base case exits Y2 at 8 customers."
  - id: A9
    name: Y3 paying-customer ramp
    value: '10,12,14,15'
    unit: customers EOP by quarter
    source: "[BP market.som and Research market.som] Year-3 SOM explicitly assumes 15 customers by the end of year 3."
  - id: A10
    name: Revenue recognition cadence by stage
    value: "Y1 pilots at $10k-$12k monthly per active logo; Y2 blended $45.0k-$52.5k quarterly per average customer; Y3 blended $60.0k-$66.0k quarterly per average customer."
    unit: pricing ramp
    source: "[A4-A6 + BP investorMemo.firstCustomer.initialContract + BP gtm.pricing] Early revenue is pilot-heavy, then shifts toward $200k+ annual production contracts with modest add-on fees."
  - id: A11
    name: Target gross margin at scale
    value: '70'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] Explicit target gross margin is 70%."
  - id: A12
    name: Fixed platform and compliance support COGS
    value: '6 per month in Y1; 18 per quarter in Y2; 21 per quarter in Y3'
    unit: USD K
    source: "[Research regulatoryTechnicalConstraints + startup-finance heuristic] Early delivery needs baseline messaging, hosting, monitoring, and compliance support even before variable volume scales."
  - id: A13
    name: Variable COGS rate
    value: '25'
    unit: percent of revenue
    source: "[BP businessModel.targetGrossMarginPct 70 + Research implementation/customization risk] A 25% variable delivery burden keeps mature gross margin near 70% after fixed support costs."
  - id: A14
    name: Loaded annual cost per founder CEO
    value: '150'
    unit: USD K/FTE/year
    source: "[BP team Founder CEO startTiming Month 0]; startup-finance heuristic for modest cash compensation plus payroll taxes and benefits at pre-seed."
  - id: A15
    name: Loaded annual cost per engineering FTE
    value: '175'
    unit: USD K/FTE/year
    source: "[BP team Founding eng startTiming Month 0]; startup-finance heuristic for a senior full-stack or workflow-platform engineer."
  - id: A16
    name: Loaded annual cost per solutions / implementation FTE
    value: '140'
    unit: USD K/FTE/year
    source: "[BP team Solutions / implementation engineer startTiming Month 3]; startup-finance heuristic for implementation-heavy B2B SaaS."
  - id: A17
    name: Loaded annual cost per product / workflow FTE
    value: '150'
    unit: USD K/FTE/year
    source: "[BP team Product / workflow lead startTiming Month 6]; startup-finance heuristic for workflow design and product operations leadership."
  - id: A18
    name: Loaded annual cost per customer success / compliance FTE
    value: '130'
    unit: USD K/FTE/year
    source: "[BP team Customer success / compliance program manager startTiming Month 9]; startup-finance heuristic for customer governance and compliance operations."
  - id: A19
    name: Loaded annual cost per sales / GTM FTE
    value: '160'
    unit: USD K/FTE/year
    source: "[BP sequencingRationale founder-led sales first + BP milestones 12-24 partner-led distribution]; startup-finance heuristic for enterprise GTM hires with modest variable comp."
  - id: A20
    name: Loaded annual cost per G&A FTE
    value: '110'
    unit: USD K/FTE/year
    source: "[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] Lean finance and operations support is added only once multiple enterprise accounts are live."
  - id: A21
    name: Y2 hiring schedule
    value: "Add first sales hire in M16, second engineer in M17, second solutions hire in M18, second customer-success hire in M19, second sales hire in M20, and first G&A hire in M21."
    unit: hires
    source: "[BP milestones 12-24 months + BP team sequencing] Headcount expands only after pilots are live and reusable integrations start to form."
  - id: A22
    name: Y3 hiring schedule
    value: "Add third engineer in M25, second product/workflow hire in M28, and third sales hire in M31."
    unit: hires
    source: "[BP milestones 24-36 months + BP sequencingRationale] Hiring slows in Y3 and stays focused on product reuse plus measured GTM scale."
  - id: A23
    name: Non-salary operating spend ramp
    value: "Y1 $18k-$33k per month; Y2 $90k/$105k/$125k/$145k per quarter; Y3 $155k/$170k/$185k/$205k per quarter."
    unit: USD K
    source: "[BP operations + Research regulatoryTechnicalConstraints + startup-finance heuristic] Travel, legal, compliance, QA, messaging, and light demand-gen grow with pilots and multi-account support but stay lean."
  - id: A24
    name: CAC per new production customer
    value: '70'
    unit: USD K/customer
    source: "[BP gtm funnelTargets + startup-finance heuristic] Founder-led enterprise sales with workflow audits, pilots, and partner support is modeled at a conservative $70k CAC per converted production customer."
  - id: A25
    name: Monthly customer churn
    value: '2.0'
    unit: percent/month
    source: "[Research willingnessToPay sticky ROI thesis + startup-finance heuristic] Contracts should be sticky once embedded, but a concentrated early customer base justifies using a conservative 2.0% monthly churn for unit economics."
  - id: A26
    name: EBITDA to cash conversion
    value: '1.0'
    unit: cash conversion ratio
    source: "[Startup-finance heuristic] The model assumes no debt, taxes, or capex material enough to distort early-stage cash movement, so EBITDA is used as the cash bridge."
  - id: A27
    name: Funding milestone for the next round
    value: "Reach 8 production customers, package the first dominant integrations, and launch benchmark reporting by Q4Y2."
    unit: milestone
    source: "[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] This is the operational proof point the pre-seed must finance before the next raise."
