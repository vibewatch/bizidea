    baseCase: "Current measured ramp"
    upsideCase: "Defer one non-customer-facing hire until after Q2Y3"
    y3RevenueImpactK: 0.0
    cashImpactK: -260.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> WorkflowAudits
      WorkflowAudits --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> CandidateVolume
      CandidateVolume --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "The base case reaches about $3.0M Y3 revenue by turning 1-2 paid pilots into 15 paying accounts and lifting mature ARPU above the $200k core contract with limited workflow-pack expansion."
  - checkName: Must go right
    finding: "Pilot-to-production conversion must stay above 50% while reusable role-state packs keep implementation work from overwhelming the small delivery team."
  - checkName: Model breaks if
    finding: "If implementation stays bespoke or funnel conversion falls to the low end of plan, revenue slips toward the $2.1M downside case and cash turns negative before the next raise."
  - checkName: Next-round proof
    finding: "The seed story is strongest if the company hits 8 production customers plus packaged integrations and benchmark reporting by Q4Y2 with buffer cash still intact."
sanityChecks:
  ruleOf40: "Y3 growth 154.7% + EBITDA margin -17.5% = 137.2%."
  burnMultiple: "Burn multiple improves from roughly 0.9x in Y2 to roughly 0.3x in Y3 when measured as annual net burn over net new revenue."
  revenuePerFte: "$215K Y3 (benchmark $200-400K SaaS)"
  flags:
    - "The company is still slightly EBITDA-negative in Y3, so the next round likely needs to close before full breakeven."
    - "Gross margin is below the 70% target in Y1-Y2 because implementation and compliance work are still absorbing fixed support cost."
    - "Only 15 customers support the Y3 plan, so revenue concentration remains high and any single logo delay can move cash meaningfully."
