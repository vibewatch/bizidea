slug: orbital-mobility-certification-os
date: "2026-06-20"
executiveSummary: >-
  欧洲主权及军民两用小卫星项目现已能采购工业化化学推进系统——GATE Space 赢得 €6.3M EIC Accelerator 资助、BeaconSat 完成集成均已证实这一点——但瓶颈已从硬件供货转向任务就绪证明。任务团队今天组装机动预算、拼搭合规包和部委审批材料，靠的是 STK 或 GMAT 分析、供应商 PDF 和电子表格通过电子邮件协调，这延长了评审周期，并在拼搭日期固定时制造了发射延期风险。Orbital Mobility Certification OS 是这套流程的档案系统：输入推进供应商性能数据、任务约束和 SST 信息，生成可审计的机动计划、核实证据与审批文件包，让主权买家能够向上级答辩。即时滩头市场是欧洲国防航天主承包商与主权小卫星研制方中正在准备首颗拼搭发射 ISR 或军用验证卫星、且集成了第三方化学推进系统的那批机构——有超过 €3B 可见主权承诺支撑的数十个在役项目。产品的数据护城河会自我强化：每个接入的任务都新增机动结果、评审反馈和异常模式，使未来项目更快、数据集更难复制。首 90 天内必须厘清两个证据缺口：买家采购时间表，以及部委评审方对软件生成文件包的具体接受标准尚未直接确认；结构化推进供应商数据共享也有待核实。

problem:
  - "欧洲主权小卫星现已具备机动能力，但任务团队没有可重复的工作流来生成部委和主承包商在发射前所要求的可审计就绪证据。"
  - "STK 或 GMAT 分析、推进供应商 PDF 和手工评审材料按项目拼凑，把评审周期拉长数周，在时间表固定时放大拼搭发射延期风险。"
  - "密集轨道合规与 EU SST 义务提高了举证门槛：团队现在必须在推进能力、计划机动和监管态势之间建立可追溯性——而不只是提供技术上正确的仿真结果。"
  - "RPO 和近距操作正进入规模更小的主权项目，但没有专门的工作流来打包这类机动所需的审批证据。"

solution:
  - "一款任务就绪操作系统，输入结构化推进供应商性能包络、任务设计参数、发射约束（SpaceX 拼搭指南、ECSS-E-ST-35C）和 EU SST 数据，生成机动预算、合规记录和面向评审方的审批文件包。"
  - "拼搭入轨、轨道转移、RPO 和离轨的发射前假设场景，任务参数变更时即时重跑，彻底消除每次都需从头重建评审材料的需要。"
  - "将 CDM 响应、推进测试结果和操作员覆盖操作与已批准机动计划挂钩的不可篡改决策链——构建主权客户所需的审计记录，并随每个接入任务积累跨项目基准数据集。"

whyWeWin:
  - "产品占据推进供应商、主承包商与主权客户之间被忽视的审批层——现有厂商（STK、FreeFlyer、GMV）因其核心在于物理建模或安全运营而非多方利益相关者就绪编排，均未集中处理这一层。"
  - "通过早期占据档案系统地位，公司积累出跨任务的推进包络、评审结果和异常模式数据集——复制成本高，且随每个接入任务变得更准确。"
  - "欧洲主权紧迫性现在就创造了有预算支撑的需求：超过 €3B 的可见项目承诺（德国 SAR 星座、英国国防航天战略 £1.4B、ICEYE Series F >€1B）意味着客户已有资金和进度压力，愿意采用专门的就绪工作流。"
  - "分发通过推进供应商和发射集成商渠道进入，他们在机动能力成为强制要求时已接触客户，降低了相比纯直销的冷开拓 CAC。"

strategicChoices:
  beachhead: "50–300 人规模的欧洲国防航天主承包商与主权小卫星研制方，正准备首颗拼搭发射 ISR 或军用技术验证卫星，集成了第三方化学推进系统且面临固定的部委评审节点。"
  wedgeRationale: >-
    这一细分群体痛点最集中——固定拼搭槽和新部委合规要求在同一个拐点汇聚——因此能最快证明价值。向已有成熟星座运营商推销宽泛的航天运营平台，将面临根深蒂固的 STK 或 FreeFlyer 装机和更长的采购周期，把首个生产参考客户延迟 12–18 个月，并将资金跑道需求拉高到种子轮无法覆盖的水平。
  sequencingRationale: >-
    先产品，后渠道：MVP 必须在一个真实任务上生成审批文件包，推进供应商才会可信地转介，部委评审方才会接受培训。招聘顺序（轨道动力学工程师先于销售人员）反映了这一逻辑；BD 人员在第 6 个月入职，只有在一次影子试点产出证据之后才合理。与 GATE Space 或 ThrustMe 建立上游数据提供商合作是结构化输入的前提条件，因此这些对话从第 0 个月就与试点并行推进。
  notYet:
    - "商业星座运营商（Planet、Spire），他们不面临部委审批工作流。"
    - "在役星座的飞行中异常管理——对初期任务就绪范围而言太宽泛。"
    - "美国或非欧洲主权市场——须等欧洲参考客户验证文件包格式后再进入。"
    - "加注和在轨服务任务规划（Orbit Fab、Astroscale 工作流）——须等核心轨道转移就绪模块经过验证后再启动。"

market:
  tam: "$96M 估算：全球 300 个机动密集型小卫星任务项目 × ~$320k 年度软件价值；300 个单位相对于 Novaspace 2026–2035 年 16,900 颗卫星预测偏保守，因为只有少数需要主权级机动保障。"
  sam: "$19.2M 估算：60 个欧洲或盟友主权/军民两用项目 × ~$320k ACV；约占 400+ 个已接入 EU SST 服务组织的 15%，与欧洲主权 ISR 和发射项目的可见推进节奏相符。"
  som: "$3.2M 第三年估算：10 个生产账户 × ~$320k ACV，通过创始人主导销售进入 3–5 家各运营 1–3 个任务的欧洲主承包商可实现。"
  segments:
    - "欧洲国防航天主承包商与主权小卫星研制方，拥有在役拼搭发射 ISR、安全或军用技术验证项目，且集成了第三方化学推进系统。"
    - "采用拼搭发射方案的军民两用卫星任务团队，同时需要技术就绪证据和持续演进的 EU SST 或 ECSS 合规记录。"
  buyingProcess: >-
    经济买家是总工程师、卫星项目经理或任务运营副总裁，承担发射就绪和进度风险；日常用户是任务运营负责人、飞行动力学工程师和推进集成团队。预期销售周期 3–6 个月，固定发射日期触发因素会压缩最紧迫账户的评估时间。

product:
  mvp: >-
    一套推进就绪工作流，输入结构化推进供应商数据（初期手动上传）、任务参数和 SpaceX 拼搭或 ECSS 约束，为一个主权拼搭任务生成机动预算、核实清单和可导出的审批文件包。
  sixMonth: >-
    同时支持两个在役任务；新增自动 ECSS-E-ST-35C 合规交叉验证、参数变更后的即时重跑场景，以及支持 CDM 关联机动证据的 EU SST 数据订阅集成。
  twelveMonth: >-
    上线 RPO 规划与证据模块；扩展至发射后审计记录，捕捉已执行机动、偏差和异常日志；将首家推进供应商作为结构化数据合作伙伴接入，实现 API 或文件交换集成。
  twentyFourMonth: >-
    为运营 2–5 颗卫星的账户提供多任务仪表盘；上线对齐拟议欧盟空间法案义务的离轨与处置证据模块；开始向客户提供跨项目基准分析，作为高级订阅层。
  keyBets:
    - "审批文件包格式将在首 12 个月内被至少一个主权部委或主承包商保证团队接受。"
    - "至少一家推进供应商（GATE Space 或 ThrustMe）将在协议达成后 6 个月内共享结构化性能数据。"
    - "跨项目机动数据集将在客户第二个任务时产生可量化的转换成本。"

gtm:
  wedge: "在一个进入推进集成、有固定拼搭日期和在役部委评审节点的欧洲主权或军民两用小卫星项目上着陆；在签合同前以影子模式交付首个审批文件包作为价值证明。"
  channels:
    - "创始人主导直销——面向奥地利、德国、英国、西班牙、法国 5–10 家目标主承包商的总工程师和任务运营负责人。"
    - "推进供应商转介：GATE Space、ThrustMe、Dawn Aerospace 和 Bradford Space 在机动能力成为强制要求时已接触账户，可转介就绪工作流。"
    - "集成叠加层定位：消费现有 STK 或 FreeFlyer 输出并导出审批文件，而非替换核心求解器，降低采用摩擦。"
  funnelTargets: "线索转合格试点 20–30%（鉴于 ICP 窄）；合格试点转生产 50–60%（文件包一经验证，固定发射日期制造紧迫性）。"
  pricing: >-
    按任务年度订阅，ACV $250–400k，参照 GATE Space Jetpack S 推进系统 €450k 基础售价定价；每个新推进模块设置与入驻费 $30–60k；RPO 规划、飞行后异常留存和多任务仪表盘作为附加模块溢价定价。定价逻辑：从已资助的任务基础设施预算中捕获小比例，同时保持低于一名额外飞行动力学工程师的成本。

businessModel:
  revenueStreams:
    - "按任务年度软件订阅（约 $250–400k ACV）。"
    - "推进模型入驻与设置费（每个新供应商集成 $30–60k）。"
    - "高级模块：RPO 规划、异常分析留存、多任务基准仪表盘。"
  unitOfValue: "需要推进机动证据和审批文件包的在役卫星任务项目。"
  targetGrossMarginPct: 72
  expansionLevers:
    - "同一主承包商账户内随后续卫星发射进行多任务追加销售。"
    - "发射后留存模块，将一次性审批客户转化为持续审计记录订阅方。"
    - "数据集达到临界规模后，向保险公司、发射供应商或监管机构授权推进基准数据。"

strategyMap:
  northStarMetric: "平台生成签署飞行就绪文件包的主权卫星任务数量。"
  inputMetrics:
    - "从推进集成启动到签署审批文件包所需天数（目标：30 天，对比 60–90 天基线）。"
    - "完成结构化数据交换的推进供应商集成数量。"
    - "试点转生产转化率（目标超过 50%）。"
    - "每个主承包商账户的净收入留存率（目标通过多任务扩张超过 120%）。"
  moatsToBuild:
    - "跨项目推进与机动基准数据集，关联包络、任务结果和评审决策。"
    - "被至少一个欧洲部委或主承包商保证团队预先接受的审批文件包模板。"
    - "与推进供应商达成的数据交换协议，形成结构化、可重复的输入流。"
  killCriteria:
    - "18 个月销售努力后付费生产客户少于 2 个。"
    - "12 个月内没有推进供应商愿意共享结构化性能数据。"
    - "3 次完成试点后试点转生产转化率低于 25%。"
    - "完成的试点中相比 STK 加 PDF 基线的评审周期缩短幅度低于 15%。"
  mermaid: |
    flowchart LR
      Wedge[First sovereign mission pilot] --> MVP[Approval packet MVP]
      MVP --> Proof[Signed readiness packet and cycle-time evidence]
      Proof --> PropPartner[Propulsion vendor data partnership]
      PropPartner --> Expansion[Multi-mission accounts and RPO module]
      Expansion --> Dataset[Cross-program benchmark dataset]
      Dataset --> Moat[Switching-cost moat and upsell tiers]

investorMemo:
  verdict:
    call: "值得约见 / 进一步调查"
    conviction: "切口清晰度强、时机有预算支撑，前提是确认部委评审方接受软件生成文件包以及买家池深度。"
    whyBelieve: "欧洲主权国防航天预算（超过 €3B 可见承诺）和 GATE Space 获 EIC 支持的工业化进程，催生了一批资金充足、时间紧迫的任务——恰好需要这套审批文件包工作流，且没有任何现有厂商明确占据推进供应商、主承包商与主权客户之间的就绪编排层。"
    whyDoubt: "初始买家池只有数十个项目，买家议价能力强（技术精湛的内部团队已在运行 STK 或 FreeFlyer），替代方案集宽——产品必须证明自己是工作流闭环，而非又一个轨道传播器。"
    nextDiligence: "影子跟踪一个任务的推进集成评审，测量实际周期时间，确认部委评审方接受软件生成文件包，并验证至少一家推进供应商愿意共享机器可读性能数据。"
  firstCustomer:
    title: "主权小卫星任务运营负责人"
    profile: "50–300 人规模的欧洲国防航天主承包商或主权卫星研制方，正准备首颗集成第三方化学推进系统的拼搭发射 ISR 或军用技术验证卫星，有在役的部委评审节点和固定的拼搭发射日期。"
    trigger: "项目进入推进集成评审，固定拼搭槽制造了硬截止日期——用现有电子表格加 PDF 工作流在不冒发射延期风险的情况下根本无法按时生成合规就绪文件包。"
    buyer: "总工程师或任务运营副总裁"
    initialContract: "覆盖一个任务就绪工作流交付的付费试点，金额 $60–120k；客户的主承包商或部委评审方接受文件包后，转为年度订阅，ACV $250–400k。"
  mustBeTrue:
    - "2027–2029 年有至少 15 个欧洲主权或军民两用小卫星任务集成第三方化学推进系统、有资金并计划发射，构成可触达的初始客户池。"
    - "任务团队愿意为能够可量化减少审批周期时间和发射延期风险超过一名额外飞行动力学工程师成本的就绪工作流支付每年 $250–400k。"
    - "至少一家推进供应商（GATE Space、ThrustMe 或同类）愿意以机器可读格式共享结构化性能数据，支持自动化文件包生成。"
    - "部委或主承包商保证评审方将在首次生产使用后 12–18 个月内接受软件生成的就绪文件包作为主要评审文件。"
    - "跨项目机动数据集在每个账户第二个任务时产生可量化的转换成本，支撑净收入留存率超过 120%。"
  diligenceQuestions:
    - "创始团队能否点名 5 个 2026–2027 年进入推进集成的欧洲主权项目，并确认其飞行就绪评审时间表和评审方要求？"
    - "GATE Space、ThrustMe 或 Bradford 是否愿意在数据共享协议下提供机器可读的推进性能和鉴定数据，条款如何？"
    - "部委或主承包商保证评审方在就绪文件包中实际要求什么——检查清单、不可篡改日志还是第三方认证——软件生成文件今天能满足该要求吗？"
    - "典型目标主承包商目前为一个任务的就绪工作流投入多少名飞行动力学工程师，其全加载年度成本与拟议 ACV 相比如何？"
    - "哪家现有厂商（STK 经销商、GMV 或内部 Orekit 团队）最可能扩展到就绪文件包层，时间表如何？"
    - "创始团队的轨道动力学和主权采购可信度，是否足以在没有知名领域专家顾问加持的情况下赢得首个试点？"

operatingAssumptions:
  - assumption: "每个在役任务约 $320k 的 ACV 可实现，参照 GATE Space Jetpack S 硬件 €450k 基础售价定价。"
    basis: research.yaml
    validationTest: "向 3 个目标项目提供 $60–120k 付费试点，测量付费意愿与内部工程成本的对比。"
    decisionImpact: "若付费意愿低于 $150k，单位经济模型所需的规模在欧洲主权细分市场单独无法实现；需扩大 TAM 定义或更早进入更大规模项目。"
  - assumption: "至少一家推进供应商将在首次接触后 6 个月内与平台共享结构化性能和鉴定数据。"
    basis: research.yaml
    validationTest: "第 1–3 个月内与 GATE Space 和 ThrustMe 开展数据共享调研；在锁定 MVP 范围前确认格式、保密要求和 API 可行性。"
    decisionImpact: "若无供应商共享数据，手动入驻成为唯一摄入路径，压缩毛利率和可扩展性；产品重新定位为工作流工具，而非自动化数据摄入平台。"
  - assumption: "部委和主承包商保证评审方将接受软件生成的就绪文件包作为有效的主要评审文件，而非仅作为内部工程辅助工具。"
    basis: operator judgment
    validationTest: "在影子试点中，将完成的文件包提交给一位主承包商保证负责人和一位部委技术评审员，记录其接受或反对标准。"
    decisionImpact: "若评审方仅将输出视为工程辅助，定位必须转向内部加速，ACV 估计下降 30–40%，价值证明时间线延长。"
  - assumption: "初始滩头买家池包含至少 15 个 2027–2029 年集成第三方化学推进系统发射的欧洲主权或军民两用任务。"
    basis: research.yaml
    validationTest: "将 2026 年 ESA、国家航天局和主承包商管线公告与发射清单比对，确认推进装备项目；在承诺种子轮增长计划前锁定 15 个以上。"
    decisionImpact: "若项目池少于 10 个，更早拓展至军民两用商业和盟友主权市场（英国、波兰、西班牙）以建立可持续管线。"
  - assumption: "产品可定位为现有 STK、FreeFlyer 或 Orekit 技术栈的工作流闭环叠加层，而非替换性任务分析平台。"
    basis: idea.yaml
    validationTest: "在首个试点中，测量飞行动力学工程师是否接受从其现有传播器导入产品输出，还是要求原生求解器。"
    decisionImpact: "若团队坚持要求原生轨道动力学引擎，集成范围和工程成本大幅提升；考虑嵌入 Orekit 或 PATRIUS 作为传播层。"

experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "与 5–8 位欧洲主权任务运营负责人开展客户调研"
    hypothesis: "8 位受访者中至少 3 位确认推进集成评审是消耗 4 周以上和多轮评审的痛点。"
    successMetric: "3 位以上同意影子模式试点；至少 1 位点名具体发射日期和部委评审节点。"
    owner: "创始人/CEO"
  - horizon: "0–90 天"
    experiment: "与 GATE Space 和 ThrustMe 开展推进供应商数据共享调研"
    hypothesis: "至少一家供应商愿意在 NDA 下以结构化格式共享推进性能数据。"
    successMetric: "第 90 天前与至少一家推进供应商签署 NDA 并获得样本数据集。"
    owner: "创始人/CTO"
  - horizon: "90–180 天"
    experiment: "对一个推进集成评审中的任务开展影子模式试点"
    hypothesis: "平台可在 5 个工作日内使用手动上传的推进数据为一个任务生成完整审批文件包。"
    successMetric: "文件包在 5 天内交付给客户总工程师；评审方未记录任何格式方面的阻断性反对意见。"
    owner: "创始人/CTO 与首席轨道动力学工程师"
  - horizon: "90–180 天"
    experiment: "与一位主承包商保证或部委评审员开展文件包接受测试"
    hypothesis: "软件生成的就绪文件包将被接受为主要评审输入，而非仅作为工程辅助工具。"
    successMetric: "评审员认可文件包满足其评审节点要求，无需要求第三方工程认证。"
    owner: "创始人/CEO"
  - horizon: "180–360 天"
    experiment: "首个付费试点转化与 RPO 规划模块原型"
    hypothesis: "至少一位影子试点客户转化为 ACV $200k 以上的年度付费订阅。"
    successMetric: "一份 ACV $200k 以上的签约生产合同；另一位客户开始洽谈 RPO 试点模块。"
    owner: "创始人/CEO 与 BD 招聘"
  - horizon: "360–540 天"
    experiment: "推进供应商转介渠道测试"
    hypothesis: "与一家推进供应商的正式转介安排每季度产生至少 2 个合格入站线索。"
    successMetric: "供应商渠道每季度 2 个以上合格线索；至少 1 个在 6 个月内转化为付费试点。"
    owner: "BD 招聘"

operations:
  - "通过嵌入 Orekit 或 PATRIUS 作为传播引擎实现轨道动力学计算，避免对 STK 的授权依赖，并与欧洲主权团队已信任的工具对齐。"
  - "数据摄入管线：第一阶段支持手动上传，第二阶段支持供应商 API 或文件交换，用于推进性能和鉴定数据。"
  - "不可篡改审计日志基础设施（仅追加事件存储），确保评审决策、参数变更和异常覆盖操作完全可追溯。"
  - "ECSS-E-ST-35C Rev.1 和 SpaceX 拼搭指南合规模板作为版本化配置维护，无需代码变更即可更新。"
  - "v2 版本集成 EU SST API 获取 CDM 数据，在审批文件包中支持碰撞规避可追溯性。"
  - "面向主权客户的欧盟 GDPR 和国防数据处理协议，包括满足数据驻留要求的本地或欧盟托管部署选项。"

team:
  - role: "创始人/CEO（领域销售与主权航天 BD）"
    startTiming: "第 0 个月"
    rationale: "须在欧洲主承包商的总工程师和任务运营负责人中建立可信度；负责前 3–5 次客户对话和与推进供应商的合作谈判。"
  - role: "创始人/CTO（轨道动力学与软件架构）"
    startTiming: "第 0 个月"
    rationale: "深厚的飞行动力学专业知识是核心产品可信度信号；负责 MVP 推进数据摄入、机动预算引擎和审批文件包生成器。"
  - role: "高级轨道动力学工程师"
    startTiming: "第 2 个月"
    rationale: "需要协助 CTO 承担影子试点工作量；须熟悉 Orekit 或 PATRIUS 及 ECSS 核实标准。"
  - role: "BD 与企业销售（欧洲国防航天）"
    startTiming: "第 6 个月"
    rationale: "仅在一次影子试点产出证据后招聘；负责在第 18 个月前将目标账户从 1 个扩展至 5 个。"
  - role: "推进数据集成工程师"
    startTiming: "第 9 个月"
    rationale: "构建供应商 API 和文件交换适配器；首份推进供应商数据共享协议执行后方可入职。"

milestones:
  - horizon: "0–12 个月"
    items:
      - "完成 5–8 次客户调研访谈；确认 3 个以上项目已进入推进集成且有固定拼搭发射日期。"
      - "与至少一家推进供应商签署 NDA 和样本数据共享协议。"
      - "在一个任务上交付影子模式审批文件包；评审方未记录任何阻断性反对意见。"
      - "签署首个付费试点合同，金额 $100k 以上，覆盖一个任务就绪工作流。"
      - "招聘创始轨道动力学工程师，将 MVP 范围锁定为单任务审批文件包。"
  - horizon: "12–24 个月"
    items:
      - "3 个付费生产客户签署年度订阅。"
      - "RPO 规划与证据模块上线；至少一个客户已上线使用。"
      - "与一家推进供应商的结构化数据交换集成在生产环境运行。"
      - "EU SST CDM 数据订阅集成进审批文件包。"
      - "软件订阅收入毛利率超过 70%。"
  - horizon: "24–36 个月"
    items:
      - "10 个生产账户实现 $3M 以上 ARR。"
      - "多任务仪表盘和离轨/处置证据模块上线。"
      - "跨项目基准分析作为高级订阅层向客户开放。"
      - "在初始核心账户以外至少一个盟友主权市场开始资质对话。"
      - "根据 ARR 轨迹做出 A 轮融资或盈亏平衡决策。"

risks:
  - risk: "滩头买家池过小——2027–2029 年有资金且计划发射的欧洲主权项目中，配备第三方化学推进的项目少于 10 个。"
    likelihood: Medium
    impact: High
    mitigation: "在第 1 个月锁定纯欧洲国防 GTM 之前，梳理 ESA 和国家航天局完整管线；若确认项目少于 15 个，将 ICP 扩展至军民两用商业和盟友主权项目。"
  - risk: "替代方案进一步巩固——STK、FreeFlyer 或 GMV 在初创公司获取足够账户前将审批文件包导出作为功能添加。"
    likelihood: Medium
    impact: High
    mitigation: "加速推进供应商数据合作和跨项目数据集积累；多任务审计记录难以复制，即便现有厂商增加文件包导出功能。"
  - risk: "部委或主承包商保证评审方拒绝软件生成文件包，将产品视为工程辅助而非评审主要文件。"
    likelihood: Medium
    impact: Medium
    mitigation: "在第 4–6 个月将首个影子文件包提交给真实评审方；若遭拒，将定位转向内部加速工具，并将 ACV 预期下调 30–40%。"
  - risk: "推进供应商拒绝共享结构化性能数据，迫使手动入驻，压缩毛利率和可扩展性。"
    likelihood: Medium
    impact: Medium
    mitigation: "第 1 个月接触 3–4 家供应商；若结构化交换不可行，构建标准化手动导入模板并收取更高的入驻费以覆盖成本。"
  - risk: "若任务机动失败后平台审批文件包被用作证据，造成信任和责任风险。"
    likelihood: Low
    impact: High
    mitigation: "明确将产品定位为可审计的决策支持层；要求客户签署条款，声明合格工程师保留最终工程权威；与任务保证顾问合作进行正式认证签署。"
  - risk: "漫长的销售周期和国防采购时间表侵蚀种子轮现金跑道。"
    likelihood: Medium
    impact: Medium
    mitigation: "筹集 20 个月而非 18 个月的跑道；用无偿影子试点压缩签约前的价值证明时间；分阶段招聘以保留现金，直到首个付费试点转化。"

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 20
  useOfFundsSummary: >-
    资助 3–4 名工程招聘（轨道动力学、软件、集成），一名 BD 负责人（第 6 个月），以及 2–3 次影子试点和一次付费试点转化；构建 MVP 审批文件包工作流；执行推进供应商数据共享协议；覆盖欧盟托管基础设施、ECSS 合规工具和国防数据处理认证。
