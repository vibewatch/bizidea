problem: >-
  欧洲主权及军民两用小卫星项目现已能够采购推进系统，但仍缺乏一套可重复的流程，用以证明特定任务在发射前能够安全完成轨道转移、近距机动及合规核查。任务团队依靠轨道动力学工具、供应商 PDF、电子表格和评审文件拼凑就绪证据，拖慢了主管部委的审批进程，也提高了错过拼搭发射窗口的风险。随着推进系统走向工业化，瓶颈正从推力器供货转向机动就绪性证明。
targetUser:
  primary: "欧洲主权或军民两用小卫星项目中负责任务运营与系统工程的技术负责人——这些项目正准备发射首颗搭载车载化学推进系统的拼搭卫星。"
  secondary: "负责向主管部委提交评审文件包及飞行就绪审批的项目保证团队与推进集成工程师。"
  buyer: "任务运营副总裁、总工程师或卫星项目经理"
startupThesis:
  nonObviousInsight: >-
    稀缺层不再只是推进硬件本身。一旦主权小卫星携带机动能力入轨，真正的痛点就变成了软件系统——它必须把推进数据转化为可获得认证的任务就绪证明，尤其是针对拼搭转移、近距机动和轨道治理审查。
  beachhead: >-
    欧洲国防航天主承包商与主权小卫星研制方——这些机构有 1–3 颗即将拼搭发射的 ISR、安全或军用技术验证卫星，且首次集成了第三方化学推进系统。
  wedge: >-
    一款任务就绪操作系统，输入推进包络、任务约束与轨道目标，自动生成机动计划、测试证据、审批文件包及异常处置手册，专为主权卫星项目设计。
  whyNowCatalyst: >-
    GATE Space 获 EIC 支持的工业化进程、BeaconSat 集成，以及拼搭转移、RPO 和密集轨道监管的明确需求信号，共同表明主权任务现在就需要机动保障软件——无需等到星座规模化之后。
  ventureScalePath: >-
    从欧洲主权小卫星起步，逐步拓展至商业在轨物流、在轨检测、卫星服务、发射保险工作流，最终成为连接推进供应商、监管机构、主承包商与卫星运营商的任务机动保障操作系统。
solution: >-
  该产品充当推进驱动型任务就绪的档案系统。它将推进供应商性能数据、任务设计与客户或监管约束整合进单一工作流，输出机动预算、所需地面测试清单、异常日志及审批文件包。团队可针对拼搭入轨、轨道转移和近距操作运行发射前假设场景，无需每次从头重建评审文件。入轨后，软件成为已执行机动、偏差及经验教训的审计记录，并积累为未来主权任务的专有基准数据集。
goToMarketSeed:
  firstCustomer: >-
    50–300 人规模的欧洲国防航天主承包商或主权小卫星研制方，正准备发射首颗搭载第三方化学推进模块的拼搭 ISR 或军用验证任务卫星，且面临主管部委审查节点。
  buyingTrigger: >-
    项目进入推进集成与飞行就绪评审阶段，同时面临固定的拼搭发射日期、新增机动需求或部委要求提供更清晰合规证据的压力。
  currentAlternative: >-
    STK 或 GMAT 分析、电子表格、推进供应商文件、定制轨道动力学脚本，以及通过电子邮件协调的手工 PDF 评审文件包。
  switchingReason: >-
    这一切口将碎片化的技术分析转化为单一可审计的就绪工作流——工程团队和主权客户都能信任——从而缩短评审周期、降低任务延期风险。
  pricingHypothesis: >-
    按在役卫星任务数量收取年度订阅费，附加推进模型入驻设置费，以及 RPO 规划、异常评审和飞行后证据留存等高级模块的溢价。
