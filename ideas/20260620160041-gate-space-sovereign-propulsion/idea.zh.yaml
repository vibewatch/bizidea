topRisks:
  - name: "利基市场时机"
    description: "短期内欧洲主权小卫星项目数量可能仍不足以支撑一家大型独立企业。"
    mitigation: "从推进需求重的主权任务起步，再利用相同的就绪工作流向相邻的军民两用及商业在轨机动项目扩张。"
  - name: "集成负担"
    description: "如果产品无法融入现有的轨道动力学、保证及文档评审工具，任务团队可能抗拒引入另一套系统。"
    mitigation: "优先与团队已在使用的工具集成，并将审批文件包导出为现有部委和主承包商评审格式。"
  - name: "信任与责任风险"
