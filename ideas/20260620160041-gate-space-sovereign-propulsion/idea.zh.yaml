jobsToBeDone:
  - job: "当一颗主权拼搭卫星进入飞行就绪评审时，帮助任务团队证明其推进机动安全、合规、可执行，从而在不延误发射的情况下获得批准。"
    currentAlternative: "由轨道动力学工具、电子表格、供应商文件和评审会议拼凑而成的手工分析文件包"
    successMetric: "从推进集成到签署飞行就绪审批所需天数，以及所需评审轮次数"
  - job: "当发射预订后任务假设发生变化时，帮助推进集成负责人快速重跑转移和近距操作场景，在不重启审批流程的情况下更新证据。"
    currentAlternative: "为每次场景变更重新编写的定制脚本和工程幻灯片"
    successMetric: "任务参数变更后发出更新版机动文件包所需小时数"
