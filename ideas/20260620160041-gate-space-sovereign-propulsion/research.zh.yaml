  validationPlan:
  - priority: 高
    question: 2027–2029 年飞行的欧洲主权或军民两用小卫星任务中，有多少将首次集成第三方推进系统？
    evidenceToGather: 奥地利、德国、西班牙、法国和英国的已资助项目管线、发射清单数据及主承包商级访谈。
  - priority: 高
    question: 一次试点能否将推进就绪性评审时间比当前 STK/FreeFlyer 加 PDF 流程缩短至少 30%？
    evidenceToGather: 在一个任务上开展影子模式试点，记录基线周期时间、评审轮次和工程师工时。
  - priority: 中
    question: '主权签署文件包中哪些外部文件是真正必须的：推进测试、SST 报告、发射文件，还是以上全部？'
    evidenceToGather: 来自一家发射商、一个主承包商保证团队和一家部委或政府客户的评审清单。
  - priority: 中
    question: 推进和 SST 合作伙伴能否提供机器可读输入，还是初创公司需要先构建手动入驻服务？
    evidenceToGather: 与一家推进供应商、一家 STM 服务商和一家发射集成商开展 API 和数据共享尽职调查。
