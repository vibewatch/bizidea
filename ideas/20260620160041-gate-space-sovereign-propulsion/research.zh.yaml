  partnershipEcosystem:
  - point: GATE Space、ThrustMe、Dawn Aerospace 和 Bradford 等推进供应商是天然的上游合作伙伴——初创公司需要从他们那里获取结构化的性能和鉴定输入。
    sourceRefs:
