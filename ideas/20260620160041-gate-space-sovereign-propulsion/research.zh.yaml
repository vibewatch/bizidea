reportMemo:
  executiveTakeaways:
  - 真正的切口不是通用轨道动力学；而是把推进、拼搭发射和 SST 输入转化为主权评审方能够签字的可审计就绪文件包。
  - 欧洲主权支出让痛点有了预算支撑，但初始买家池仍只有数十个项目，而非数百个。
  - 替代方案众多——STK、FreeFlyer、内部 Orekit/PATRIUS 技术栈和 STM 平台已在向同一批团队销售——因此产品必须看起来像工作流闭环，而非另一个求解器。
  - 若公司从早期 RPO、加注和主权 ISR 任务中积累数据，就能从发射前就绪扩展至飞行中机动、异常和合规基础设施。
  marketDefinition: 推进驱动型小卫星项目的任务就绪软件，位于飞行动力学工具、推进供应商、发射供应商和 SST/合规系统之间，用于生成机动计划、核实证据和审批文件包。
  customerAndBuyer: 日常用户是欧洲主权或军民两用小卫星项目中的任务运营负责人、飞行动力学工程师和推进集成团队。经济买家通常是总工程师、任务运营副总裁或卫星项目经理，他们承担发射就绪、部委审批和进度风险。
  buyingTriggers:
  - point: 拼搭或机构发射槽已固定，团队必须在不延误发射清单的情况下证明压力系统、机动和集成就绪性。
    sourceRefs:
    - 15
    - 16
    - 17
  - point: 主权 ISR 或国防任务新增机动性、近距操作或快速重定向要求，而传统发射/就绪文件包并非为此设计。
    sourceRefs:
    - 1
    - 7
    - 8
    - 18
    - 19
    - 20
    - 21
  - point: 碰撞规避、离轨或碎片治理预期迫使运营商展示推进能力、计划机动和合规态势之间更清晰的可追溯性。
    sourceRefs:
    - 9
    - 10
    - 11
    - 13
    - 14
  willingnessToPay:
    summary: 付费意愿依托于已资助的任务基础设施预算，而非实验性软件预算。GATE Space 的 Jetpack S 基础售价 €450k，德国承诺了 $1.9B 的主权 SAR 星座，英国新增 £1.4B 国防航天投资，ICEYE 销售可在 12 个月内投入运营的主权系统。能够降低发射延期或审批风险的工作流层，可信地从这些任务预算中捕获一小比例。
    sourceRefs:
    - 1
    - 2
    - 7
    - 8
    - 20
    - 21
  competitiveLandscape: '现有厂商各自覆盖工作流的部分环节：任务设计套件计算轨迹，开源技术栈让工程师可以自定义脚本，STM 供应商分类处理交会风险。空白地带是系统档案层——能把推进数据、发射约束、SSA 输入和面向评审方的证据为一个主权任务打包在一起。'
  incumbentThesis:
  - incumbentClass: 任务分析套件
    point: STK 和 FreeFlyer 是强大的物理与运营环境，但其公开定位聚焦于建模与执行，而非能统一推进、发射和合规证据的主权审批文件包。
    sourceRefs:
    - 24
    - 25
    - 26
  - incumbentClass: 开源 / 自研飞行动力学
    point: Orekit、PATRIUS 和 Basilisk 赋予技术团队灵活性和低授权成本，但将验证、工作流设计和可审计性的责任推回给了客户。
    sourceRefs:
    - 27
    - 28
    - 29
  - incumbentClass: 空间安全 / STM 平台
    point: GMV、Neuraspace、OKAPI:Orbits 和 Slingshot 减轻了交会与轨道感知负担，但其核心在于告警和安全运营，而非发射前的推进就绪编排。
    sourceRefs:
    - 22
    - 23
    - 30
    - 31
    - 32
  - incumbentClass: 服务与机动运营商
    point: ClearSpace、Astroscale 和 Orbit Fab 正在创造让机动保障有价值的任务，但他们首先是硬件和任务运营商，这为跨多个供应商和主承包商的中立软件层留出了空间。
    sourceRefs:
    - 33
    - 34
    - 35
  regulatoryLandscape: 合规要求正在收紧。欧洲推进项目今天已受 ECSS 核实规则约束，依赖 SST 和碰撞规避基础设施，现在又面临拟议中的欧盟空间法案——将在欧盟范围内统一许可、碎片、韧性和网络安全义务。
  technologyLandscape: '使能要素已单独存在：标准化推进子系统、拼搭发射手册、开源和商业飞行动力学库，以及不断增长的 STM 数据服务。难点在于把它们拼成一套能通过主权评审的可重复工作流，而不仅仅是产出技术上正确的仿真结果。'
  distributionChannels:
  - point: 当一个主承包商或主权运营商的任务在固定拼搭时间表下进入推进集成或飞行就绪评审时，直接落地。
    sourceRefs:
    - 1
    - 15
    - 16
    - 17
    - 18
  - point: 将推进和机动供应商作为渠道合作伙伴——因为在机动能力成为强制要求时，他们已经接触了客户。
    sourceRefs:
