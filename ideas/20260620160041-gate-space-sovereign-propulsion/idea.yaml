problem: >-
  European sovereign and dual-use smallsat programs can now buy propulsion, but
  they still lack a repeatable way to prove that a specific mission can execute
  orbit transfers, proximity maneuvers, and compliance checks safely before
  launch. Mission teams stitch together astrodynamics tools, vendor PDFs,
  spreadsheets, and review decks, which slows ministry signoff and increases the
  risk of slipping a rideshare launch window. As propulsion industrializes, the
  bottleneck shifts from thruster availability to maneuver-readiness evidence.
targetUser:
  primary: "Mission-operations and systems-engineering leads at European sovereign or dual-use smallsat programs preparing first rideshare-launched satellites with onboard chemical propulsion."
  secondary: "Program assurance teams and propulsion integration engineers responsible for ministry review packets and flight-readiness approvals."
  buyer: "VP Mission Operations, Chief Engineer, or satellite program manager"
startupThesis:
  nonObviousInsight: >-
    The new scarce layer is not propulsion hardware alone. Once sovereign
    smallsats start launching with maneuver capability, the painful gap becomes
    the software system that translates propulsion data into certifiable
    mission-readiness, especially for rideshare transfers, proximity maneuvers,
    and orbit-governance reviews.
  beachhead: >-
    European defense-space primes and sovereign smallsat builders with 1-3
    upcoming rideshare-launched ISR, security, or military technology-
    demonstration satellites that integrate third-party chemical propulsion for
    the first time
  wedge: >-
    A mission-readiness OS that ingests propulsion envelopes, mission
    constraints, and orbital targets to generate maneuver plans, test evidence,
    approval packets, and anomaly playbooks for sovereign satellite programs
  whyNowCatalyst: >-
    GATE Space's EIC-backed industrialization, BeaconSat integration, and cited
    demand from rideshare transfer, RPO, and crowded-orbit regulation show that
    sovereign missions need maneuver-assurance software now, not after fleets
    scale.
  ventureScalePath: >-
    Start with European sovereign smallsats, then expand into commercial in-
    orbit logistics, inspection, servicing, launch-insurance workflows, and
    eventually the operating system that connects propulsion vendors, regulators,
    primes, and satellite operators around mission mobility assurance.
solution: >-
  The product acts as the system of record for propulsion-enabled mission
  readiness. It combines propulsion-vendor performance data, mission design, and
  customer or regulatory constraints into a single workflow that outputs
  maneuver budgets, required ground tests, exception logs, and approval packets.
  Teams can run pre-launch what-if scenarios for rideshare insertion, orbit
  transfer, and proximity operations without rebuilding the review deck from
  scratch each time. Once in flight, the software becomes the audit trail for
  executed maneuvers, deviations, and lessons learned, which compounds into a
  proprietary benchmark set for future sovereign missions.
goToMarketSeed:
  firstCustomer: >-
    A 50-300 person European defense-space prime or sovereign smallsat builder
    preparing its first rideshare-launched ISR or military demonstration mission
    with a third-party chemical propulsion module and ministry review gates
  buyingTrigger: >-
    The program enters propulsion integration and flight-readiness review with a
    fixed rideshare launch date, new maneuver requirements, or ministry demands
    for clearer compliance evidence
  currentAlternative: >-
    STK or GMAT analyses, spreadsheets, propulsion-vendor documents, custom
    astrodynamics scripts, and manual PDF review packets coordinated over email
  switchingReason: >-
    This wedge shortens review cycles and reduces mission-slip risk by turning
    fragmented technical analysis into one auditable readiness workflow that
    both engineering teams and sovereign customers can trust
  pricingHypothesis: >-
    Annual program subscription priced per active satellite mission, with setup
    fees for propulsion-model onboarding and premium modules for anomaly review,
    RPO planning, and post-flight evidence retention
