topRisks:
  - name: "Niche market timing"
    description: "European sovereign smallsat programs may still be too few in the near term to support a large standalone business."
    mitigation: "Start with propulsion-heavy sovereign missions, then expand into adjacent dual-use and commercial in-orbit mobility programs using the same readiness workflow."
  - name: "Integration burden"
    description: "Mission teams may resist adopting another system if it cannot fit existing astrodynamics, assurance, and document-review tools."
    mitigation: "Integrate first with the tools teams already use and export approval packets into existing ministry and prime review formats."
  - name: "Trust and liability"
    description: "If customers treat the software as a formal certification authority, any maneuver failure could create legal and reputational exposure."
    mitigation: "Position the product as an auditable decision-support and evidence layer while partnering with mission-assurance experts for final signoff."
