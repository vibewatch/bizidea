    upsideCase: "$360K blended ACV"
    y3RevenueImpactK: -210.0
    cashImpactK: -212.4
  - variable: CAC
    downsideCase: "20% higher GTM cash per win from slower referral conversion"
    baseCase: "$168.7K fully loaded CAC"
    upsideCase: "15% lower GTM cash per win from stronger vendor referrals"
    y3RevenueImpactK: 0.0
    cashImpactK: -160.8
  - variable: churn
    downsideCase: "3.0% monthly churn if the product is treated as a tactical tool"
    baseCase: "2.0% monthly churn"
    upsideCase: "1.5% monthly churn with multi-mission stickiness"
    y3RevenueImpactK: -110.0
    cashImpactK: -120.0
  - variable: sales cycle
    downsideCase: "One-quarter slower pilot-to-production conversion cadence"
    baseCase: "First production conversion in M11 and 10 accounts by Y3 end"
    upsideCase: "One-quarter faster cadence with earlier packet acceptance"
    y3RevenueImpactK: -220.0
    cashImpactK: -237.6
  - variable: gross margin
    downsideCase: "68% because manual onboarding and reviewer support stay high"
    baseCase: "72%"
    upsideCase: "75% with cleaner data integrations"
    y3RevenueImpactK: 0.0
    cashImpactK: -129.8
  - variable: hiring pace
    downsideCase: "Pull forward one seller and one ops hire before repeatable conversion"
    baseCase: "Milestone-gated ramp to 9 FTE by Q4Y3"
    upsideCase: "Delay non-core hiring until after Q4Y2 proof point"
    y3RevenueImpactK: 0.0
    cashImpactK: -288.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      PropulsionData --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "The base case is driven by one Y1 production conversion, 4 production customers by Y2 end, and 10 by Y3 end at a blended $330K annual ARPU."
  - checkName: Must go right
    finding: "At least one propulsion vendor must share structured data and reviewers must accept the generated packet so the company keeps 72% gross margin instead of falling into services-heavy delivery."
  - checkName: Model breaks if
    finding: "If sales cycles slip by about one quarter and Y3 exits with 8 accounts instead of 10, the model gives up roughly $220K of Y3 revenue and about $238K of ending cash."
  - checkName: Next-round proof
    finding: "The seed round is justified if the company reaches 4 production accounts and one live vendor integration by Q4Y2, which is the bridge to the Y3 10-account and $3M+ ARR Series A narrative."
sanityChecks:
  ruleOf40: "Y3 growth 162.5% + EBITDA margin -6.0% = 156.5%"
  burnMultiple: "Y2 burn multiple 0.8x; Y3 burn multiple 0.1x as ARR growth outpaces opex growth."
  revenuePerFte: "$257K Y3 revenue per FTE (benchmark $200-400K vertical SaaS)"
  flags:
    - "Base case requires 10 paying accounts by Y3 in a SAM measured in dozens of programs, so concentrated-account execution risk remains high."
    - "The model excludes pilot and onboarding revenue for conservatism; if those services become mandatory to win deals, gross margin and hiring assumptions need to be revisited."
    - "If reviewers accept the product only as an internal engineering aid, BP operating assumptions imply ACV could compress by 30-40%, which would make the current hiring ramp too heavy."
