scenarios:
  downside:
    description: "Reviewer acceptance slips, manual onboarding persists, and the company exits Y3 with 8 production accounts instead of 10."
    y3RevenueK: 1750.0
    y3EbitdaK: -702.3
    cashLowPointK: 700.7
    keyAssumptionChanges:
      - "Blended annual ARPU falls to $300K."
      - "Gross margin falls to 68% because services-heavy onboarding persists."
      - "Customer ramp ends Y3 at 8 accounts as procurement stretches by roughly one quarter."
      - "Operating spend runs about 5% above base because extra manual support is required."
  base:
    description: "One production conversion lands in Y1, the company reaches 4 production accounts by Y2 end, and exits Y3 with 10 accounts at $3.3M ARR."
    y3RevenueK: 2310.0
    y3EbitdaK: -139.1
    cashLowPointK: 1533.6
    keyAssumptionChanges:
      - "Blended annual ARPU holds at $330K."
      - "Gross margin stays at the BP target of 72%."
      - "Hiring remains milestone-gated and reaches 9 FTE by Q4Y3."
  upside:
    description: "A reviewer-friendly packet becomes repeatable sooner, premium modules attach earlier, and the company exits Y3 with 12 production accounts."
    y3RevenueK: 3150.0
    y3EbitdaK: 564.7
    cashLowPointK: 2204.8
    keyAssumptionChanges:
      - "Blended annual ARPU rises to $350K as RPO and retention modules attach earlier."
      - "Gross margin improves to 74% with more structured vendor integrations."
      - "Customer ramp reaches 12 production accounts by Y3 end."
      - "Operating spend runs about 2% below base because the workflow standardizes faster."
sensitivity:
  - variable: ARPU
    downsideCase: "$300K blended ACV"
