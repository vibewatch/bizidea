competitors:
- name: Ansys STK
  stage: incumbent
  wedge: Physics-based digital mission engineering and mission modeling environment for platforms and payloads
  pricing: Custom enterprise licensing; public pricing not listed in fetched docs
  strength: Deep mission-modeling credibility and broad installed base
  weaknessVsUs: Does not present itself as a sovereign approval-packet workflow spanning propulsion, SST, and reviewer collaboration
  sourceRefs:
  - 24
- name: FreeFlyer
  stage: incumbent
  wedge: Commercial astrodynamics software for mission design, analysis, operations, RPO, and SSA workflows
  pricing: Node-locked or network licensing with custom quote
  strength: Operational heritage, API access, and explicit CA/RPO capabilities
  weaknessVsUs: Still centers on analysis and operations rather than multi-stakeholder readiness evidence and signoff
  sourceRefs:
  - 25
  - 26
- name: GMV Focusoc / Ecosstm
  stage: incumbent
  wedge: Institutional and commercial collision-avoidance, SST, and STM operations software
  pricing: Custom institutional or service-contract pricing
  strength: Deep European SST position and real collision-avoidance operations credibility
  weaknessVsUs: Primary focus is safety-of-flight and catalog/data services, not propulsion integration or launch-readiness workflows
  sourceRefs:
