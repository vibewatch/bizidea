reportMemo:
  executiveTakeaways:
  - The real wedge is not generic astrodynamics; it is turning propulsion, rideshare, and SST inputs into an auditable readiness packet a sovereign reviewer can sign.
  - European sovereignty spending makes the pain budget-backed, but the initial buyer pool is still measured in dozens of programs rather than hundreds.
  - Substitutes are abundant—STK, FreeFlyer, in-house Orekit/PATRIUS stacks, and STM platforms already sell into the same teams—so the product must look like workflow closure, not another solver.
  - If the company captures data from early RPO, refueling, and sovereign ISR missions, it can expand from pre-launch readiness into in-flight maneuver, anomaly, and compliance infrastructure.
  marketDefinition: Mission-readiness software for propulsion-enabled smallsat programs that sits between flight-dynamics tools, propulsion vendors, launch providers, and SST/compliance systems to generate maneuver plans, verification evidence, and approval packets.
  customerAndBuyer: Day-to-day users are mission-operations leads, flight-dynamics engineers, and propulsion integration teams at European sovereign or dual-use smallsat programs. The economic buyer is usually the chief engineer, mission-operations VP, or satellite program manager who owns launch readiness, ministry signoff, and schedule risk.
  buyingTriggers:
  - point: A rideshare or institutional launch slot is fixed, and the team must prove pressure-system, maneuver, and integration readiness without slipping the manifest.
    sourceRefs:
    - 15
    - 16
    - 17
  - point: A sovereign ISR or defense mission adds maneuverability, proximity-operations, or rapid-retasking requirements that legacy launch/readiness packets were not built for.
    sourceRefs:
    - 1
    - 7
    - 8
    - 18
    - 19
    - 20
    - 21
  - point: Collision-avoidance, deorbit, or debris-governance expectations force operators to show clearer traceability between propulsion capability, planned maneuvers, and compliance posture.
    sourceRefs:
    - 9
    - 10
    - 11
    - 13
    - 14
  willingnessToPay:
    summary: Willingness to pay is tied to already-funded mission infrastructure, not experimental software budgets. Gate's Jetpack S alone lists a €450k base price, Germany committed $1.9B to a sovereign SAR constellation, the UK is adding £1.4B of defence-space investment, and ICEYE markets sovereign systems that can be operational within 12 months. A workflow layer that reduces launch-slip or approval risk can credibly capture a small fraction of those mission budgets.
    sourceRefs:
    - 1
    - 2
    - 7
    - 8
    - 20
    - 21
  competitiveLandscape: 'Incumbents cover pieces of the workflow: mission-design suites calculate trajectories, open-source stacks let engineers script anything, and STM vendors triage conjunction risk. The white space is the system-of-record layer that packages propulsion data, launch constraints, SSA inputs, and reviewer-facing evidence for one sovereign mission.'
  incumbentThesis:
  - incumbentClass: Mission-analysis suites
    point: STK and FreeFlyer are powerful physics and operations environments, but their public positioning centers on modeling and execution, not a sovereign approval packet that unifies propulsion, launch, and compliance evidence.
    sourceRefs:
    - 24
    - 25
    - 26
  - incumbentClass: Open-source / in-house flight dynamics
    point: Orekit, PATRIUS, and Basilisk give technical teams flexibility and low license cost, but they push validation, workflow design, and auditability back onto the customer.
    sourceRefs:
    - 27
    - 28
    - 29
  - incumbentClass: Space safety / STM platforms
    point: GMV, Neuraspace, OKAPI:Orbits, and Slingshot reduce conjunction and orbital-awareness burden, yet their center of gravity is on alerting and safety operations rather than pre-launch propulsion-readiness orchestration.
    sourceRefs:
    - 22
    - 23
    - 30
    - 31
    - 32
  - incumbentClass: Servicing and mobility operators
    point: ClearSpace, Astroscale, and Orbit Fab are creating the missions that make mobility assurance valuable, but they are hardware and mission operators first, which leaves room for a neutral software layer across multiple vendors and primes.
    sourceRefs:
    - 33
    - 34
    - 35
  regulatoryLandscape: The compliance stack is tightening. European propulsion programs sit under ECSS verification rules today, already depend on SST and collision-avoidance infrastructure, and now face a proposed EU Space Act that would harmonize licensing, debris, resilience, and cybersecurity obligations across the EU.
  technologyLandscape: 'The enabling ingredients already exist separately: standardized propulsion subsystems, rideshare launch playbooks, open-source and commercial flight-dynamics libraries, and growing STM data services. The hard part is stitching them into a repeatable workflow that survives sovereign review rather than just producing technically correct simulations.'
