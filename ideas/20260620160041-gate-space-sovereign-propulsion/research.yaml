  validationPlan:
  - priority: high
    question: How many European sovereign or dual-use smallsat missions flying in 2027-2029 will integrate third-party propulsion for the first time?
    evidenceToGather: Pipeline of funded programs, manifest data, and prime-level interviews across Austria, Germany, Spain, France, and the UK.
  - priority: high
    question: Can one pilot cut propulsion-readiness review time by at least 30% versus today's STK/FreeFlyer-plus-PDF process?
    evidenceToGather: A shadow-mode pilot on one mission with baseline cycle time, review rounds, and engineer hours.
  - priority: medium
