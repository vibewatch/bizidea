slug: orbital-mobility-certification-os
date: "2026-06-20"
executiveSummary: >-
  European sovereign and dual-use smallsat programs can now buy industrialized
  chemical propulsion—GATE Space's €6.3M EIC Accelerator win and BeaconSat
  integration confirm this—but the bottleneck has shifted from hardware
  availability to mission-readiness evidence. Mission teams assembling maneuver
  budgets, rideshare compliance packs, and ministry approval decks today rely on
  STK or GMAT analyses, vendor PDFs, and spreadsheets coordinated over email,
  which extends review cycles and creates launch-slip risk when rideshare dates
  are fixed. Orbital Mobility Certification OS is the system of record that
  ingests propulsion-vendor performance data, mission constraints, and SST inputs
  to generate auditable maneuver plans, verification evidence, and approval
  packets sovereign buyers can defend. The immediate beachhead is European
  defense-space primes and sovereign smallsat builders preparing first
  rideshare-launched ISR or military demonstration satellites with third-party
  chemical propulsion—a pool of dozens of active programs backed by more than
  €3B in visible sovereign commitments. The product's data moat compounds: every
  mission ingested adds maneuver outcomes, reviewer feedback, and anomaly patterns
  that make future programs faster and the dataset harder to replicate. Two
  evidence gaps remain that must be resolved in the first 90 days: buyer
  procurement timelines and exact ministry reviewer acceptance criteria for
  software-generated packets have not been directly confirmed, and structured
  propulsion-vendor data sharing is unverified.

problem:
  - "European sovereign smallsats can now fly with maneuver capability, but mission teams have no repeatable workflow to generate the auditable readiness evidence ministries and primes require before flight."
  - "STK or GMAT analyses, propulsion-vendor PDFs, and manual review decks are stitched together per program, extending review cycles by weeks and increasing rideshare launch-slip risk when timelines are fixed."
  - "Crowded-orbit and EU SST compliance obligations raise the proof burden: teams must now produce traceability between propulsion capability, planned maneuvers, and regulatory posture—not just technically correct simulations."
  - "RPO and proximity operations are entering smaller sovereign programs, but no purpose-built workflow packages the evidence those maneuver classes require for approval."

solution:
  - "A mission-readiness OS that ingests structured propulsion-vendor performance envelopes, mission design parameters, launch constraints (SpaceX rideshare guide, ECSS-E-ST-35C), and EU SST feeds to produce maneuver budgets, compliance records, and reviewer-facing approval packets."
  - "Pre-launch what-if scenarios for rideshare insertion, orbit transfer, RPO, and deorbit that re-run instantly when mission parameters change, eliminating the need to rebuild the review deck from scratch each time."
  - "Immutable decision lineage tying CDM responses, propulsion-test results, and operator overrides to approved maneuver plans—creating the audit trail sovereign customers need and accumulating a cross-program benchmark dataset with each mission ingested."

whyWeWin:
  - "The product occupies the neglected approval layer between propulsion vendors, primes, and sovereign customers—a gap incumbents (STK, FreeFlyer, GMV) do not centrally address because their center of gravity is physics modeling or safety operations, not multi-stakeholder readiness orchestration."
  - "By owning the system-of-record role early, the company builds a cross-mission dataset of propulsion envelopes, reviewer outcomes, and anomaly patterns that is costly to replicate and grows more accurate with each program ingested."
  - "European sovereignty urgency creates budget-backed demand now: more than €3B in visible program commitments (Germany SAR constellation, UK Defence Space Strategy £1.4B, ICEYE Series F >€1B) means customers already have funding and schedule pressure to adopt a purpose-built readiness workflow."
  - "Distribution enters through propulsion vendors and launch integrators who already access the customer at the moment maneuverability requirements become mandatory, reducing cold-outreach CAC versus direct-only sales."

strategicChoices:
  beachhead: "50-300 person European defense-space primes and sovereign smallsat builders preparing a first rideshare-launched ISR or military technology-demonstration satellite that integrates third-party chemical propulsion and faces a fixed ministry review gate."
  wedgeRationale: >-
    This segment feels pain most acutely—a fixed rideshare slot and new ministry
    compliance requirements converge at a single inflection point—so it creates
    the fastest proof of value. A broad space-ops platform sale into established
    constellation operators would face entrenched STK or FreeFlyer installations
    and longer procurement cycles, delaying time to first production reference by
    12-18 months and extending runway requirements past what a seed raise can cover.
  sequencingRationale: >-
    Product first, then channel: the MVP must produce a real approval packet on one
    mission before propulsion vendors will credibly refer it and before ministry
    reviewers can be trained to accept it. The hiring sequence (astrodynamics
    engineers before sales) reflects this; a BD hire at Month 6 makes sense only
    after one shadow pilot has produced evidence. Partnership with GATE Space or
    ThrustMe as upstream data providers is a pre-condition for structured input,
    so those conversations run in parallel with the pilot from Month 0.
  notYet:
    - "Commercial constellation operators (Planet, Spire) who are not facing ministry approval workflows."
    - "In-flight anomaly management for operational constellations—too broad for the initial mission-readiness scope."
    - "US or non-European sovereign markets before a European reference customer demonstrates the packet format."
    - "Refueling and servicing mission planning (Orbit Fab, Astroscale workflows) until the core orbit-transfer readiness module is proven."

market:
  tam: "$96M est.: 300 maneuver-intensive smallsat mission programs globally at ~$320k annual software value; conservative relative to Novaspace's 16,900-satellite 2026-2035 forecast because only a minority require sovereignty-grade mobility assurance."
  sam: "$19.2M est.: 60 European or allied sovereign/dual-use programs at ~$320k ACV; roughly 15% of the 400+ organizations already receiving EU SST services."
  som: "$3.2M year-3 est.: 10 production accounts at ~$320k ACV, achievable through founder-led sales into 3-5 European primes running 1-3 missions each."
  segments:
    - "European defense-space primes and sovereign smallsat builders with active rideshare-launched ISR, security, or military technology-demonstration programs integrating third-party chemical propulsion."
    - "Dual-use satellite mission teams with rideshare launch profiles requiring both technical readiness evidence and evolving EU SST or ECSS compliance records."
  buyingProcess: >-
    The economic buyer is the chief engineer, satellite program manager, or VP
    Mission Operations, who owns launch readiness and schedule risk; day-to-day
    users are mission-operations leads, flight-dynamics engineers, and propulsion
    integration teams. Sales cycles are expected to run 3-6 months, with a
    fixed-launch-date trigger compressing evaluation time for the most urgent accounts.

product:
  mvp: >-
    A propulsion-readiness workflow that ingests structured propulsion-vendor data
    (initially manual upload), mission parameters, and SpaceX rideshare or ECSS
    constraints to generate a maneuver budget, a verification checklist, and an
    exportable approval packet for one sovereign rideshare mission.
  sixMonth: >-
    Support two active missions in parallel; add automated ECSS-E-ST-35C
    compliance cross-referencing, re-run scenario capability for parameter changes,
    and EU SST feed integration for CDM-linked maneuver evidence.
  twelveMonth: >-
    Ship RPO planning and evidence module; extend to post-launch audit trail
    capturing executed maneuvers, deviations, and anomaly logs; onboard first
    propulsion vendor as a structured data partner with API or file-exchange
    integration.
  twentyFourMonth: >-
    Multi-mission dashboard for accounts running 2-5 satellites; deorbit and
    disposal evidence module aligned to proposed EU Space Act obligations; begin
    cross-program benchmark analytics available to customers as a premium
    subscription tier.
  keyBets:
    - "Approval-packet format will be accepted by at least one sovereign ministry or prime assurance team within the first 12 months."
    - "At least one propulsion vendor (GATE Space or ThrustMe) will share structured performance data within 6 months of agreement."
    - "The cross-program maneuver dataset will create measurable switching costs for customers by their second mission."

gtm:
  wedge: "Land on one European sovereign or dual-use smallsat program entering propulsion integration with a fixed rideshare date and an active ministry review gate; deliver the first approval packet as a shadow-mode proof-of-value before contracting."
  channels:
    - "Founder-led direct sales to chief engineers and mission-ops leads at 5-10 target primes in Austria, Germany, the UK, Spain, and France."
    - "Propulsion-vendor referrals: GATE Space, ThrustMe, Dawn Aerospace, and Bradford Space each enter the account when maneuverability becomes a requirement and can refer the readiness workflow."
    - "Integration overlay positioning: consume existing STK or FreeFlyer outputs and export approval artifacts rather than replacing the core solver, lowering adoption friction."
  funnelTargets: "Lead-to-qualified-pilot 20-30% given the narrow ICP; qualified-pilot-to-production 50-60% given fixed-launch-date urgency once the packet is demonstrated."
  pricing: >-
    Annual per-mission subscription at $250-400k ACV, calibrated against the €450k
    base price of GATE Space's Jetpack S propulsion system; setup and onboarding fee
    of $30-60k per new propulsion module; premium modules for RPO planning,
    post-flight anomaly retention, and multi-mission dashboard priced as add-ons.
    Rationale: captures a small fraction of already-funded mission infrastructure
    budgets while remaining below the cost of one additional flight-dynamics
    engineer.

businessModel:
  revenueStreams:
    - "Annual per-mission software subscriptions (~$250-400k ACV)."
    - "Propulsion-model onboarding and setup fees ($30-60k per new vendor integration)."
    - "Premium modules: RPO planning, anomaly-analysis retention, multi-mission benchmark dashboard."
  unitOfValue: "Active satellite mission program requiring propulsion maneuver evidence and approval packets."
  targetGrossMarginPct: 72
  expansionLevers:
    - "Multi-mission upsell within the same prime account as they launch successive satellites."
    - "Post-launch retention module converting one-time approval customers to ongoing audit-trail subscribers."
    - "Propulsion benchmark data licensing to insurers, launch providers, or regulators after the dataset reaches critical mass."

strategyMap:
  northStarMetric: "Number of sovereign satellite missions with a signed flight-readiness packet generated by the platform."
  inputMetrics:
    - "Days from propulsion integration kick-off to signed approval packet (target: 30 days vs. 60-90 days baseline)."
    - "Number of propulsion vendor integrations with structured data exchange."
    - "Pilot-to-production conversion rate (target above 50%)."
    - "Net revenue retention per prime account (target above 120% through multi-mission expansion)."
  moatsToBuild:
    - "Cross-program propulsion-and-maneuver benchmark dataset linking envelopes, mission outcomes, and reviewer decisions."
    - "Approval-packet templates pre-accepted by one or more European ministry or prime assurance teams."
    - "Data-exchange agreements with propulsion vendors that create structured, recurring input flows."
  killCriteria:
    - "Fewer than 2 paying production customers after 18 months of sales effort."
    - "No propulsion vendor willing to share structured performance data within 12 months."
    - "Pilot-to-production conversion rate below 25% after 3 completed pilots."
    - "Average review-cycle reduction below 15% versus the STK plus PDF baseline in completed pilots."
  mermaid: |
    flowchart LR
      Wedge[First sovereign mission pilot] --> MVP[Approval packet MVP]
      MVP --> Proof[Signed readiness packet and cycle-time evidence]
      Proof --> PropPartner[Propulsion vendor data partnership]
      PropPartner --> Expansion[Multi-mission accounts and RPO module]
      Expansion --> Dataset[Cross-program benchmark dataset]
      Dataset --> Moat[Switching-cost moat and upsell tiers]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Strong wedge clarity and budget-backed timing, contingent on confirming ministry-reviewer acceptance of software-generated packets and buyer pool depth."
    whyBelieve: "European sovereign defense-space budgets (more than €3B in visible commitments) and GATE Space's EIC-backed industrialization create a funded, near-term cohort of missions that need exactly this approval-packet workflow, and no incumbent squarely owns the readiness-orchestration layer between propulsion vendors, primes, and sovereign customers."
    whyDoubt: "The initial buyer pool is measured in dozens of programs rather than hundreds, buyer power is high (sophisticated in-house teams already running STK or FreeFlyer), and the substitute set is wide—the product must prove it looks like workflow closure, not another propagator."
    nextDiligence: "Shadow one mission in propulsion integration review to measure actual cycle time, confirm ministry reviewer acceptance of a software-generated packet, and validate that at least one propulsion vendor will share machine-readable performance data."
  firstCustomer:
    title: "Sovereign smallsat mission-operations lead"
    profile: "50-300 person European defense-space prime or sovereign satellite builder preparing its first rideshare-launched ISR or military technology-demonstration satellite integrating third-party chemical propulsion, with an active ministry review gate and a fixed rideshare launch date."
    trigger: "The program enters propulsion integration review with a fixed rideshare slot, creating a hard deadline for generating a compliant readiness packet that cannot be met with existing spreadsheet-and-PDF workflows without risking launch slip."
    buyer: "Chief Engineer or VP Mission Operations"
    initialContract: "Paid pilot at $60-120k covering one mission's readiness workflow delivery; conversion to annual subscription at $250-400k ACV upon packet acceptance by the customer's prime or ministry reviewer."
  mustBeTrue:
    - "At least 15 European sovereign or dual-use smallsat missions integrating third-party chemical propulsion are fundable and scheduled to launch in 2027-2029, providing a reachable initial customer pool."
    - "Mission teams will pay $250-400k per year for a readiness workflow that demonstrably reduces approval cycle time and launch-slip risk by more than the cost of one additional flight-dynamics engineer."
    - "At least one propulsion vendor (GATE Space, ThrustMe, or equivalent) will share structured performance data in a machine-readable format that enables automated packet generation."
    - "Ministry or prime assurance reviewers will accept software-generated readiness packets as a primary review document within 12-18 months of first production use."
    - "The cross-program maneuver dataset creates measurable switching costs by the second mission per account, enabling net revenue retention above 120%."
  diligenceQuestions:
    - "Can the founding team name 5 European sovereign programs entering propulsion integration in 2026-2027 and confirm their flight-readiness review timelines and reviewer requirements?"
    - "Will GATE Space, ThrustMe, or Bradford share machine-readable propulsion performance and qualification data under a data-sharing agreement, and on what terms?"
    - "What does a ministry or prime assurance reviewer actually require in a readiness packet—checklist, immutable log, third-party certification—and would a software-generated document satisfy that requirement today?"
    - "How many flight-dynamics engineers does a typical target prime currently dedicate to one mission's readiness workflow, and what is the fully loaded annual cost versus the proposed ACV?"
    - "Which incumbent (STK reseller, GMV, or in-house Orekit team) is most likely to expand into the readiness-packet layer, and on what timeline?"
    - "Is the founding team's astrodynamics and sovereign-procurement credibility sufficient to win a first pilot without a recognized domain-expert advisor on the cap table?"

operatingAssumptions:
  - assumption: "ACV of ~$320k per active mission is achievable, benchmarked against the €450k base hardware price of GATE Space's Jetpack S."
    basis: research.yaml
    validationTest: "Offer a paid pilot at $60-120k to 3 target programs and measure willingness-to-pay versus internal engineering cost."
    decisionImpact: "If WTP is below $150k, unit economics require volume that cannot be achieved in the European sovereign segment alone; expand TAM definition or move upmarket to larger programs earlier."
  - assumption: "At least one propulsion vendor will share structured performance and qualification data with the platform within 6 months of first approach."
    basis: research.yaml
    validationTest: "Conduct data-sharing discovery with GATE Space and ThrustMe in Months 1-3; confirm format, confidentiality requirements, and API feasibility before committing to MVP scope."
    decisionImpact: "If no vendor shares data, manual onboarding becomes the sole ingestion path, reducing margin and scalability; the product repositions as a workflow tool rather than an automated data-ingestion platform."
  - assumption: "Ministry and prime assurance reviewers will accept software-generated readiness packets as a valid primary review document, not only as an internal engineering aid."
    basis: operator judgment
    validationTest: "In a shadow pilot, submit a completed packet to one prime assurance lead and one ministry technical reviewer and record their acceptance or objection criteria."
    decisionImpact: "If reviewers treat the output as an engineering aid only, positioning must shift to internal acceleration, reducing ACV by an estimated 30-40% and slowing proof-of-value timelines."
  - assumption: "The initial beachhead buyer pool contains at least 15 European sovereign or dual-use missions launching 2027-2029 with third-party chemical propulsion."
    basis: research.yaml
    validationTest: "Map 2026 ESA, national-agency, and prime pipeline announcements against launch manifests to confirm propulsion-equipped programs; target 15+ before committing to the seed-funded growth plan."
    decisionImpact: "If the pool is fewer than 10 programs, expand earlier into dual-use commercial and allied sovereign markets (UK, Poland, Spain) to build a sustainable pipeline."
  - assumption: "The product can be positioned as a workflow-closure overlay on existing STK, FreeFlyer, or Orekit stacks, not a rip-and-replace mission-analysis platform."
    basis: idea.yaml
    validationTest: "In the first pilot, measure whether flight-dynamics engineers accept importing the product's outputs from their existing propagators versus demanding a native solver."
    decisionImpact: "If teams insist on a native astrodynamics engine, integration scope and engineering cost increase materially; consider embedding Orekit or PATRIUS as the propagation layer."

experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Customer discovery with 5-8 European sovereign mission-ops leads"
    hypothesis: "At least 3 of 8 leads confirm propulsion-integration review is a pain point consuming 4+ weeks and multiple review cycles."
    successMetric: "3+ leads agree to a shadow-mode pilot; at least one names a specific launch date and ministry review gate."
    owner: "Founding CEO"
  - horizon: "0-90 days"
    experiment: "Propulsion vendor data-sharing discovery with GATE Space and ThrustMe"
    hypothesis: "At least one vendor will share propulsion performance data in a structured format under NDA."
    successMetric: "One executed NDA with a sample dataset from at least one propulsion vendor by Day 90."
    owner: "Founding CTO"
  - horizon: "90-180 days"
    experiment: "Shadow-mode pilot on one mission in propulsion integration review"
    hypothesis: "The platform can generate a complete approval packet for one mission in under 5 business days using manually uploaded propulsion data."
    successMetric: "Packet delivered to the customer's chief engineer in 5 days or fewer; reviewer records no blocking objection to the format."
    owner: "Founding CTO and lead astrodynamics engineer"
  - horizon: "90-180 days"
    experiment: "Packet acceptance test with one prime assurance or ministry reviewer"
    hypothesis: "A software-generated readiness packet will be accepted as a primary review input, not solely an engineering aid."
    successMetric: "Reviewer endorses the packet as meeting their review-gate requirements without demanding third-party engineering certification."
    owner: "Founding CEO"
  - horizon: "180-360 days"
    experiment: "First paid pilot conversion and RPO planning module prototype"
    hypothesis: "At least one shadow-pilot customer converts to a paid annual subscription at $200k+ ACV."
    successMetric: "One signed production contract at $200k+ ACV; one additional customer engaged on the RPO pilot module."
    owner: "Founding CEO and BD hire"
  - horizon: "360-540 days"
    experiment: "Propulsion vendor referral channel test"
    hypothesis: "A formal referral arrangement with one propulsion vendor generates at least 2 qualified inbound leads per quarter."
    successMetric: "2+ qualified leads per quarter from the vendor channel; at least 1 converts to a paid pilot within 6 months."
    owner: "BD hire"

operations:
  - "Astrodynamics computation via Orekit or PATRIUS embedded as the propagation engine, avoiding license dependency on STK and matching the tools European sovereign teams already trust."
  - "Data ingestion pipeline supporting manual upload in Phase 1 and vendor API or file-exchange in Phase 2 for propulsion performance and qualification data."
  - "Immutable audit-log infrastructure (append-only event store) ensuring reviewer decisions, parameter changes, and anomaly overrides are fully traceable."
  - "ECSS-E-ST-35C Rev.1 and SpaceX rideshare guide compliance templates maintained as versioned configuration, updatable without code changes."
  - "EU SST API integration for CDM data in the v2 release, enabling collision-avoidance traceability within approval packets."
  - "EU GDPR and defense-data handling protocols for sovereign customers, including on-premise or EU-hosted deployment option to satisfy data-residency requirements."

team:
  - role: "Founding CEO (domain sales and sovereign-space BD)"
    startTiming: "Month 0"
    rationale: "Must hold credibility with chief engineers and mission-operations leads at European primes; responsible for the first 3-5 customer conversations and partnership negotiations with propulsion vendors."
  - role: "Founding CTO (astrodynamics and software architecture)"
    startTiming: "Month 0"
    rationale: "Deep flight-dynamics expertise is the core product credibility signal; responsible for MVP propulsion-data ingestion, maneuver-budget engine, and approval-packet generator."
  - role: "Senior astrodynamics engineer"
    startTiming: "Month 2"
    rationale: "Needed to handle shadow pilot workload alongside the CTO; must be familiar with Orekit or PATRIUS and ECSS verification standards."
  - role: "BD and enterprise sales (European defense-space)"
    startTiming: "Month 6"
    rationale: "Hired only after one shadow pilot produces evidence; responsible for scaling from 1 to 5 target accounts before Month 18."
  - role: "Propulsion-data integrations engineer"
    startTiming: "Month 9"
    rationale: "Builds vendor API and file-exchange adapters; required once the first propulsion vendor data-sharing agreement is executed."

milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 5-8 customer discovery interviews; confirm 3+ programs entering propulsion integration with fixed rideshare dates."
      - "Execute NDA and sample data-sharing agreement with at least one propulsion vendor."
      - "Deliver shadow-mode approval packet on one mission; reviewer records no blocking objection."
      - "Sign first paid pilot contract at $100k+ covering one mission readiness workflow."
      - "Hire founding astrodynamics engineer and lock MVP scope to single-mission approval packet."
  - horizon: "12-24 months"
    items:
      - "3 paying production customers with signed annual subscriptions."
      - "RPO planning and evidence module shipped; at least one customer live on it."
      - "Structured data-exchange integration with one propulsion vendor operational in production."
      - "EU SST CDM feed integrated into approval packets."
      - "Gross margin above 70% on software subscription revenue."
  - horizon: "24-36 months"
    items:
      - "10 production accounts delivering $3M+ ARR."
      - "Multi-mission dashboard and deorbit/disposal evidence module shipped."
      - "Cross-program benchmark analytics available as a premium subscription tier."
      - "Qualification conversations underway in at least one allied sovereign market beyond the initial core accounts."
      - "Series A fundraise or path-to-profitability decision made based on ARR trajectory."

risks:
  - risk: "Beachhead buyer pool too small—fewer than 10 European sovereign programs with third-party chemical propulsion are fundable and scheduled in 2027-2029."
    likelihood: Medium
    impact: High
    mitigation: "Map the full ESA and national-agency pipeline in Month 1 before committing to a narrow European-defense-only GTM; expand ICP to dual-use commercial and allied sovereign programs if fewer than 15 programs are confirmed."
  - risk: "Substitutes entrench further—STK, FreeFlyer, or GMV adds approval-packet export as a feature before the startup captures sufficient accounts."
    likelihood: Medium
    impact: High
    mitigation: "Accelerate propulsion-vendor data partnerships and cross-program dataset accumulation; the multi-mission audit trail is difficult to replicate even if incumbents add packet-export features."
  - risk: "Ministry or prime assurance reviewers reject software-generated packets, treating the product as an engineering aid rather than a review-primary document."
    likelihood: Medium
    impact: Medium
    mitigation: "Submit the first shadow packet to an actual reviewer in Month 4-6; if rejected, pivot positioning to internal acceleration tool and reduce ACV expectations by 30-40%."
  - risk: "Propulsion vendors withhold structured performance data, forcing manual onboarding that limits margin and scalability."
    likelihood: Medium
    impact: Medium
    mitigation: "Approach 3-4 vendors in Month 1; if structured exchange is unavailable, build a standardized manual-import template and charge a higher onboarding fee to cover the cost."
  - risk: "Trust and liability exposure if a mission maneuver fails after using the platform's approval packet as evidence."
    likelihood: Low
    impact: High
    mitigation: "Position the product explicitly as an auditable decision-support layer; require customers to sign terms stating that qualified engineers retain final engineering authority; partner with mission-assurance consultants for formal certification sign-off."
  - risk: "Long sales cycles and defense procurement timelines slip seed runway."
    likelihood: Medium
    impact: Medium
    mitigation: "Raise 20 months of runway rather than 18; use unpaid shadow pilots to compress proof timelines before contracting; stage hiring to preserve cash until the first paid pilot converts."

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 20
  useOfFundsSummary: >-
    Fund 3-4 engineering hires (astrodynamics, software, integrations), one BD
    lead (Month 6), and 2-3 shadow pilots followed by one paid pilot conversion;
    build the MVP approval-packet workflow; execute propulsion-vendor data-sharing
    agreements; cover EU-hosted infrastructure, ECSS compliance tooling, and
    defense-data handling certification.
