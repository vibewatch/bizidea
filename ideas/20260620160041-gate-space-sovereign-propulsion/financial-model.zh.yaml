scenarios:
  downside:
    description: "评审方接受进度滞后，手动入驻持续，Y3 末生产账户 8 个而非 10 个。"
    y3RevenueK: 1750.0
    y3EbitdaK: -702.3
    cashLowPointK: 700.7
    keyAssumptionChanges:
      - "混合年度 ARPU 降至 $300K。"
      - "因服务密集型入驻持续，毛利率降至 68%。"
      - "采购拖延约一个季度，Y3 末客户爬坡结束于 8 个账户。"
      - "因需要额外手动支持，运营支出高于基准约 5%。"
  base:
    description: "Y1 实现一次生产转化，Y2 末达到 4 个生产账户，Y3 末以 10 个账户和 $3.3M ARR 退出。"
    y3RevenueK: 2310.0
    y3EbitdaK: -139.1
    cashLowPointK: 1533.6
    keyAssumptionChanges:
      - "混合年度 ARPU 维持 $330K。"
      - "毛利率保持在商业计划目标 72%。"
      - "招聘与里程碑挂钩，Q4Y3 达到 9 名全职员工。"
  upside:
    description: "审评友好型文件包更早实现可重复，高级模块更早附加，Y3 末生产账户 12 个。"
    y3RevenueK: 3150.0
    y3EbitdaK: 564.7
    cashLowPointK: 2204.8
    keyAssumptionChanges:
      - "RPO 和留存模块更早附加，混合年度 ARPU 升至 $350K。"
      - "供应商集成更规范，毛利率提升至 74%。"
      - "Y3 末客户爬坡达到 12 个生产账户。"
      - "工作流标准化更快，运营支出低于基准约 2%。"
sensitivity:
  - variable: ARPU
    downsideCase: "$300K 混合 ACV"
    baseCase: "$330K 混合 ACV"
    upsideCase: "$360K 混合 ACV"
    y3RevenueImpactK: -210.0
    cashImpactK: -212.4
  - variable: CAC
    downsideCase: "转介转化放缓导致每次赢单 GTM 现金高出 20%"
    baseCase: "$168.7K 全加载 CAC"
    upsideCase: "供应商转介更强，每次赢单 GTM 现金低 15%"
    y3RevenueImpactK: 0.0
    cashImpactK: -160.8
  - variable: churn
    downsideCase: "产品被视为战术工具时月度流失率 3.0%"
    baseCase: "月度流失率 2.0%"
    upsideCase: "多任务粘性下月度流失率 1.5%"
    y3RevenueImpactK: -110.0
    cashImpactK: -120.0
  - variable: sales cycle
    downsideCase: "试点转生产转化节奏慢约一个季度"
    baseCase: "M11 实现首次生产转化，Y3 末达到 10 个账户"
    upsideCase: "文件包更早获接受，节奏快约一个季度"
    y3RevenueImpactK: -220.0
    cashImpactK: -237.6
  - variable: gross margin
    downsideCase: "手动入驻和评审支持持续居高，毛利率 68%"
    baseCase: "72%"
    upsideCase: "数据集成更规范，毛利率 75%"
    y3RevenueImpactK: 0.0
    cashImpactK: -129.8
  - variable: hiring pace
    downsideCase: "可重复转化前提前一名销售和一名运营招聘"
    baseCase: "里程碑挂钩爬坡至 Q4Y3 的 9 名全职员工"
    upsideCase: "Q4Y2 证明点后再延迟非核心招聘"
    y3RevenueImpactK: 0.0
    cashImpactK: -288.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      PropulsionData --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景由 Y1 一次生产转化驱动，Y2 末 4 个生产客户，Y3 末 10 个，混合年度 ARPU $330K。"
  - checkName: 必须走对的假设
    finding: "至少一家推进供应商必须共享结构化数据，评审方必须接受生成的文件包，这样公司才能维持 72% 毛利率，而非陷入服务密集型交付。"
  - checkName: 模型失效条件
