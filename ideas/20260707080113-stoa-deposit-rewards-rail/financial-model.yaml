slug: "sme-reserve-rewards-rail"
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Opening cash after pre-seed close"
    value: "2400"
    unit: "usdK"
    source: "[BP fundingAsk.targetFundingRangeUsd $2-4M; model uses a $2.4M close to reach Q4Y2 proof points plus six months of buffer.]"
  - id: A2
    name: "Paid pilot price per bank"
    value: "25"
    unit: "usdK per month"
    source: "[BP investorMemo.firstCustomer.initialContract £40k-£75k paid pilot; modeled as roughly $75K total over three months.]"
  - id: A3
    name: "Pilot duration"
    value: "3"
    unit: "months"
    source: "[BP experimentRoadmap 90-180 day pilot motion; model uses a three-month paid pilot before a production decision.]"
  - id: A4
    name: "Implementation fee on production conversion"
    value: "40"
    unit: "usdK per bank"
    source: "[BP businessModel.revenueStreams includes implementation and onboarding fees; model keeps the one-time fee modest because banks resist large upfront services bills.]"
  - id: A5
    name: "Initial production revenue per live bank"
    value: "55"
    unit: "usdK per month"
    source: "[BP gtm.pricing annual SaaS plus 10-15 bps on retained balances; model assumes about $660K annualized while the first reserve product ramps.]"
  - id: A6
    name: "Mature production revenue per live bank"
    value: "85"
    unit: "usdK per month"
    source: "[Research market.som implies about $1.17M revenue per mature bank at year-3 SOM; model uses a more conservative $1.02M annualized run rate.]"
  - id: A7
    name: "Months to mature production run rate after conversion"
    value: "6"
    unit: "months"
    source: "[BP product.twelveMonth and sequencingRationale: one reserve-product workflow proves out before wider cohort expansion, so variable fees ramp over the first six production months.]"
  - id: A8
    name: "Paying bank start schedule"
    value: "M7, M13, M21, M31"
    unit: "month index"
    source: "[BP milestones and experimentRoadmap: one paid pilot in year 1, two production contracts by months 12-24, and a fourth bank entering pilot in year 3.]"
  - id: A9
    name: "Gross margin ramp by stage"
    value: "45 / 65 / 72"
    unit: "percent for pilot / initial production / mature production"
    source: "[BP businessModel.targetGrossMarginPct = 70; model stays below target in pilots, crosses it only once connectors and settlement templates are reused.]"
  - id: A10
    name: "Monthly logo churn"
    value: "1.0"
    unit: "percent"
    source: "[Heuristic: early enterprise fintech infrastructure can be sticky after deployment, but a concentrated four-logo base still warrants a 1.0% long-run monthly churn assumption.]"
  - id: A11
    name: "Blended CAC per production bank"
    value: "300"
    unit: "usdK"
    source: "[BP founder-led bank sales plus partner co-sell; heuristic includes travel, compliance diligence, and long pilot-to-production procurement cycles.]"
  - id: A12
    name: "Base cycle from discovery to paid pilot"
    value: "6"
    unit: "months"
    source: "[BP buyingProcess and experimentRoadmap imply roughly six months of discovery, compliance review, and contracting before a paid pilot starts.]"
  - id: A13
    name: "Leadership loaded salary"
    value: "200"
    unit: "usdK annual"
    source: "[Heuristic: fintech founder/CEO cash comp plus payroll taxes and benefits while still staying lean at pre-seed stage.]"
  - id: A14
    name: "Engineering loaded salary"
    value: "200"
    unit: "usdK annual"
    source: "[Heuristic: senior bank-integration engineer plus benefits and payroll load.]"
  - id: A15
    name: "Compliance or product loaded salary"
    value: "180"
    unit: "usdK annual"
    source: "[Heuristic: product/compliance lead with savings-product and consent expertise.]"
  - id: A16
    name: "Solutions or integrations loaded salary"
    value: "170"
    unit: "usdK annual"
    source: "[Heuristic: implementation engineer for bank-core and merchant workflow deployment.]"
  - id: A17
    name: "GTM or merchant partnerships loaded salary"
    value: "180"
    unit: "usdK annual"
    source: "[Heuristic: enterprise partnerships lead with bank and merchant sourcing responsibilities.]"
  - id: A18
    name: "G&A or ops loaded salary"
    value: "150"
    unit: "usdK annual"
    source: "[Heuristic: lean finance and operations manager added only after the first repeatable deployments.]"
  - id: A19
    name: "Non-payroll R&D stack"
    value: "10 / 12 / 14"
    unit: "usdK per month in Y1 / Y2 / Y3"
    source: "[Heuristic: cloud, security tooling, event ledger, payout operations, and analytics stack for a bank-grade product.]"
  - id: A20
    name: "Non-payroll sales and marketing spend"
    value: "8 / 14 / 18"
    unit: "usdK per month in Y1 / Y2 / Y3"
    source: "[Heuristic: founder travel, bank events, merchant sourcing, and partner enablement stay targeted because the ICP is small.]"
  - id: A21
    name: "Non-payroll G&A spend"
    value: "18 / 25 / 30"
    unit: "usdK per month in Y1 / Y2 / Y3"
    source: "[Heuristic: legal, insurance, audit prep, compliance review, and vendor-risk documentation rise as the bank customer base matures.]"
  - id: A22
    name: "Hiring schedule"
    value: "Compliance M5, Solutions M7, GTM M10, Eng2 M16, Product2 M19, Solutions2 M22, Eng3 M28, GTM2 M31, G&A/Ops M33"
    unit: "month index"
    source: "[BP team.startTiming plus strategicChoices.sequencingRationale; hiring follows proof of pilots and connector reuse rather than front-loading sales.]"
