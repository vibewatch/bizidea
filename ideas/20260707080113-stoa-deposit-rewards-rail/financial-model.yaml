      percentage: 20
scenarios:
  downside:
    description: "Each bank start slips by about one month and mature balance-fee monetization settles below plan, leaving the company close to cash-out by late Y3."
    y3RevenueK: 2926.0
    y3EbitdaK: -553.9
    cashLowPointK: 26.6
    keyAssumptionChanges:
      - "Pilot starts move to M8, M14, M22, and M33 as compliance review adds delay."
      - "Initial and mature production MRR fall to $53K and $80K as merchant attach and retained-balance lift come in light."
      - "Exit gross margin reaches about 69% instead of 72% because implementation remains more bespoke."
  base:
    description: "Three production banks plus one late pilot are live by Y3 end, and balance-based fees do more work than new hiring."
    y3RevenueK: 3190.0
    y3EbitdaK: -277.8
    cashLowPointK: 574.6
    keyAssumptionChanges:
      - "Bank starts follow M7, M13, M21, and M31."
      - "Per-bank production revenue ramps from $55K monthly after go-live to $85K monthly once the first reserve product matures."
      - "Gross margin improves from pilot-heavy 45% to 72% on mature production banks by late Y3."
  upside:
    description: "One partner-sourced bank arrives earlier and mature balance-fee revenue lands above plan, pushing the model roughly to breakeven in Y3."
    y3RevenueK: 3581.0
    y3EbitdaK: 40.5
    cashLowPointK: 1012.5
    keyAssumptionChanges:
      - "Pilot starts move to M7, M12, M20, and M29 because one channel referral closes faster."
      - "Initial and mature production MRR rise to $58K and $92K as retained-balance lift and merchant funding prove out faster."
      - "Exit gross margin reaches about 73% as connector reuse cuts custom settlement work."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Initial and mature production MRR land at $52K and $80K because banks cap the balance-based take rate."
    baseCase: "Initial and mature production MRR are $55K and $85K."
    upsideCase: "Initial and mature production MRR reach $58K and $92K after stronger merchant-funded balance lift."
    y3RevenueImpactK: -179.0
    cashImpactK: -195.1
  - variable: "CAC"
    downsideCase: "CAC rises to about $360K as founder travel and partner enablement stay high per closed bank."
    baseCase: "CAC is about $300K per production bank."
    upsideCase: "CAC falls to about $240K once one-third of opportunities come from partner referrals."
    y3RevenueImpactK: 0.0
    cashImpactK: -147.0
  - variable: "churn"
    downsideCase: "Monthly churn drifts to 1.5% and one early bank does not expand to a second reserve cohort."
    baseCase: "Monthly churn is 1.0% with no logo loss in the first contract cycle."
    upsideCase: "Monthly churn improves to 0.6% as the product becomes embedded in savings and renewal workflows."
    y3RevenueImpactK: -150.0
    cashImpactK: -120.0
  - variable: "sales cycle"
    downsideCase: "Pilot starts slip about one month per bank because savings-core and compliance approvals drag."
    baseCase: "Discovery to paid pilot takes about 6 months."
    upsideCase: "A partner-referred bank closes one month faster and the fourth pilot starts in M29 instead of M31."
    y3RevenueImpactK: -100.0
    cashImpactK: -255.0
  - variable: "gross margin"
    downsideCase: "Pilot and early production work stay bespoke, so mature gross margin tops out near 69%."
    baseCase: "Mature gross margin reaches 72% after connector reuse."
    upsideCase: "Mature gross margin reaches 73-74% once settlement and disclosures are templated."
    y3RevenueImpactK: 0.0
    cashImpactK: -141.2
  - variable: "hiring pace"
    downsideCase: "Two Y2 hires are pulled forward by one quarter before the first repeatable connector is proven."
    baseCase: "Hiring stays milestone-gated through Q4Y2 and only the second GTM hire arrives in Q3Y3."
    upsideCase: "Late hires wait until partner-sourced pipeline is real, preserving cash."
    y3RevenueImpactK: 0.0
    cashImpactK: -224.1
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      TargetBanks[Qualified bank opportunities] --> Pilots[Paid reserve-product pilots]
      Pilots --> ProductionBanks[Production banks]
      ProductionBanks --> PlatformFee[Annual platform fee]
      ProductionBanks --> BalanceFee[Balance-based fee]
      PlatformFee --> Revenue[Revenue]
      BalanceFee --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by three production banks reaching about $85K monthly revenue plus one late paid pilot by Y3 end, not by broad SMB volume."
  - checkName: "Must go right"
    finding: "The first two pilots must prove lower cost per retained pound and launch inside about 120 days so the M13 and M21 bank starts stay on plan."
  - checkName: "Model breaks if"
    finding: "If bank starts slip by even a month each and mature per-bank revenue stalls near $80K monthly, downside cash falls toward $0 by late Y3."
  - checkName: "Next-round proof"
    finding: "A seed-quality milestone is two production banks, a second connector, one customer expansion, and partner-sourced pipeline by Q4Y2, which is exactly what the funding ask is built to reach."
sanityChecks:
  ruleOf40: "Y3 growth 77% + EBITDA margin -9% = 68%"
  burnMultiple: "Y3 net burn $278K / net new ARR added in Y3 about $1,020K = 0.27x"
  revenuePerFte: "$290K Y3 (benchmark $200-400K SaaS)"
  flags:
    - "Only four paying banks are active by Y3 end, so one logo slip or churn event still moves annualized revenue materially."
    - "Base case assumes each production bank ramps from about $55K to $85K monthly within six months; that depends on merchant attach and retained-balance attribution proving out quickly."
    - "Portfolio-level gross margin is still below the 70% target for most of the model because pilots and implementation-heavy quarters remain in the mix until late Y3."
    - "The model delays a second GTM hire until Q3Y3; pulling sales hiring forward hurts runway faster than it helps bookings in this narrow bank ICP."
