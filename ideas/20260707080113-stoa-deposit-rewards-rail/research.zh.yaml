market:
  tam:
    value: $36.0M
    rationale: 自下而上的英国滩头 TAM 假设：15 家目标 challenger 或嵌入式中小企业银行 × 40k 个合格中小企业账户 × 25% 储备金产品渗透率 × 平均 £110k 入金余额 × 15 bps 可变抽成，再加每家银行 £250k SaaS；合计约 £28.5M（约 $36.0M），而这只用到了 Stoa 提到的英国超 £250B 中小企业储备现金池的一小部分。
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 10
    - 15
  sam:
    value: $12.0M
    rationale: SAM 收窄到大约 5 家最匹配滩头画像的英国机构，账户、余额和定价假设不变；对应约 £9.5M，也就是大约 $12.0M。
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 5
    - 10
  som:
    value: $3.5M
    rationale: 第 3 年 SOM 假设有 3 家机构上线、每家 25k 个合格中小企业、20% 渗透率、平均 £90k 入金余额、15 bps 抽成，加同样的固定费用结构，合计约 £2.8M，也就是约 $3.5M。
    isEstimate: true
    sourceRefs:
    - 4
    - 18
    - 19
    - 21
