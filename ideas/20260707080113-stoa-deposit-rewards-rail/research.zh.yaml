competitors:
- name: Stoa
  stage: seed
  wedge: 以品牌化定期资金罐，用前置权益和订阅替代传统利息。
  pricing: 未公开。
  strength: 这是目前最清晰的在线证明：银行、商户和持有现金的用户，可以被串进同一套奖励命题里。
  weaknessVsUs: 它更像一个品牌化产品的运营方，而不是可跨银行复用的中立归因与清算通道。
  sourceRefs:
  - 10
  - 11
  - 12
  - 13
  - 14
- name: Flagstone
  stage: scale-up
  wedge: 跨多家合作银行的企业现金市场平台和储蓄平台。
  pricing: 不收管理费；从利差中分成，并接受 GBP10k 起的企业客户。
  strength: 非常适合 CFO 做储备现金管理、FSCS 分散配置和收益优化。
  weaknessVsUs: 它优化的是收益和分散度，不是银行的商户出资留存，也不做存款提升归因。
  sourceRefs:
  - 24
  - 25
  - 26
- name: Reward
  stage: scale-up
  wedge: 面向银行渠道的激活和零售优惠基础设施，用于定向客户运营。
  pricing: 企业定制报价，未公开。
  strength: 懂得怎么把商户优惠塞进银行渠道里，并把活跃结果做成可量化输出。
  weaknessVsUs: 它的重心是零售优惠激活，不是定期存款行为或储备金产品经济模型。
  sourceRefs:
  - 29
  - 30
- name: Fidel API
  stage: scale-up
  wedge: 以开发者为先的交易关联与奖励归因基础设施。
  pricing: API 定制报价，未公开。
  strength: 有快速、token 化的交易事件，以及很强的奖励类技术工具。
  weaknessVsUs: 它是服务卡联动行为的基础设施，不是面向银行、围绕存款期限、商户出资和续存分析的产品层。
  sourceRefs:
  - 31
  - 32
- name: Monzo Business
  stage: incumbent
  wedge: 把企业银行、活期储蓄和会计功能打成一体的中小企业账户套餐。
  pricing: 有免费层；Pro 和 Team 从 GBP9/月起；企业储蓄最高 3.25% AER 浮动。
  strength: 已经掌握客户关系，能把储蓄和软件能力打包进同一套中小企业银行体验。
  weaknessVsUs: 它是自营银行套餐，不是一家其他银行也能拿去用、把商户预算转成存款留存的中立通道。
  sourceRefs:
  - 18
  - 19
  - 20
regulatoryTechnicalConstraints:
- point: 储蓄账户促销及相关广告必须做到公平、清晰且不误导。
  sourceRefs:
  - 7
- point: 企业存款通常按每家合格公司、每家持牌银行最高 GBP120,000 受保护；而个体工商户的企业和个人余额要合并计算。
  sourceRefs:
  - 6
  - 26
- point: 企业账户数据访问和支付发起，取决于客户 consent 以及开放银行实施方案的具体选择。
  sourceRefs:
  - 8
  - 9
  - 32
  - 33
  - 34
- point: 一些中小企业银行方案依赖合作银行或电子货币结构，所以产品设计必须把披露和保护责任对齐。
  sourceRefs:
  - 21
  - 22
validationSignals:
- point: Stoa 表示其英国服务已经同时面向个人和企业上线，说明这类行为已经越过纯概念阶段。
  sourceRefs:
  - 10
  - 13
- point: 英国 challenger 和专业型银行在 2025 年仍然实现了存款增长，说明哪怕市场转慢，存款留存依然有明确经济意义。
  sourceRefs:
  - 4
- point: Capital on Tap 和 Reward 已经在向中小企业或银行渠道用户销售明确的优惠计划，证明只要归因足够简单，商户就愿意为行为挂钩分发买单。
  sourceRefs:
  - 27
  - 29
- point: Flagstone 这类储蓄平台已经在教育 CFO 把储备现金分到活期、通知和定期账户里——这正是这条通道可以顺手借力的相邻行为。
  sourceRefs:
  - 24
  - 25
  - 26
openQuestions:
- 银行要看到多大的入金余额或续存提升，才愿意放弃更简单的利率促销，转向商户出资权益模型？
- 对持有 GBP50k-GBP500k 储备现金的中小企业来说，哪些商户类目会稳定地影响决策，而不只是带来点击？
- challenger 银行到底有多少储蓄 core 集成必须定制化去做，又有多少能放进一层更轻的编排层里？
- 银行会先偏好开箱即用的商户网络，还是会坚持从第一天起就自己定义合作方和经济模型？
