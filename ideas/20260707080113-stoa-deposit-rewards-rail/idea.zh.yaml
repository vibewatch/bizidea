jobsToBeDone:
- job: >-
    当我们上线或保卫一款企业储备金产品时，帮团队把客户的闲置现金变成一个足够有吸引力的 90 天承诺理由，这样我们不用跟着每个竞争对手拼利率，也能把余额留下来。
  currentAlternative: "更高利率促销、客户经理触达和通用型储蓄营销"
  successMetric: "入金储备金余额、续存率，以及相对利率促销的留存成本"
- job: >-
    当商户在我们的储备金产品上出资权益时，帮产品和合作团队看清到底哪些优惠真的让余额变深、让续存变高，这样我们就不用再靠表格去管银行—商户的经济关系。
  currentAlternative: "手工合作方报表、表格清算和彼此割裂的权益看板"
  successMetric: "按优惠拆分的留存平均余额、续存提升，以及商户返款对账准确率"
ideaScorecard:
