    rationale: "这个主题同时具备英国在线产品、中小企业现金池量化数据，以及两家已核实同日报道里明确的银行加商户集成表述。"
  painIntensity:
    score: 4
    rationale: "对银行来说，企业余额留存确实有经济意义；但它不像欺诈或合规事故那样紧迫，因为有些机构暂时还能靠加息买存款。"
  wedgeClarity:
    score: 5
    rationale: "把商户出资奖励挂到定期中小企业储备金账户上，是一条边界清楚的工作流：买家明确、触发点明确、余额结果也能量化。"
  defensibility:
    score: 4
    rationale: "余额挂钩的权益归因、商户 ROI 数据和银行专属的续存行为，会逐步堆出一张专有的清算与定价图谱；不过大型银行最终也可能复制部分表层功能。"
  ventureScale:
    score: 5
    rationale: "滩头市场从英国中小企业储蓄产品起步，但同一条通道还能扩到美国中小企业现金、资金归集、供应商优惠以及更广的营运资本分发。"
topRisks:
- name: "商户供给太薄"
  description: "如果早期商户目录不够有吸引力，中小企业不会为了拿到几项泛泛的权益就把现金锁进去。"
  mitigation: "先从高 LTV 的 B2B 商户类目切入，先证明哪些优惠真的会改变入金行为，再把市场做宽。"
- name: "合规复杂度高"
  description: "银行可能担心，和存款挂钩的权益会碰上受监管激励边界，或者在不同产品期限下把披露做得很乱。"
  mitigation: "先从简单的定期产品、非现金商户权益、明确披露和经过合规审查的优惠模板开始。"
- name: "流动性诉求错配"
  description: "很多中小企业可能更看重灵活性而不是权益；如果储备金期限太死或太长，采用率就会受限。"
  mitigation: "优先盯住本来就持有真实储备现金的企业，先支持更短期限，再用余额和持有期数据只把优惠推给最可能愿意锁仓的人。"
