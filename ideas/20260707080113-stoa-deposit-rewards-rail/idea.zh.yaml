differentiator: >-
  这不是一个面向消费者的储蓄 App，也不是卡联动优惠网络，更不是通用银行奖励目录。真正有防守力的资产，是把储备金余额事件、商户出资权益的经济模型，以及存款留存归因连在一起——能看清每一笔余额是因为哪项优惠、哪种期限结构而新增、续存还是流失。这套余额感知数据集会越积越厚，最后在权益选择、定价和商户 ROI 基准上，比单个银行或单个商户更强。
