problem: >-
  做中小企业银行业务的机构都知道，很多企业客户账上长期趴着一笔不小的经营现金。但想把这笔余额留住，通常只能加息，或者靠客户经理去推定期产品。等一个财务负责人决定把 £100k 闲置现金放 90 天时，通用型企业卡返现和临时拼凑的权益几乎起不了作用。另一边，商户为了获客已经花了不少钱，但大多数人还没有一个渠道，能把这笔预算直接绑到企业银行里的资产负债表留存上。
targetUser:
  primary: >-
    面向中小企业、提供定期储备金或储蓄账户的英国 challenger 银行及嵌入式企业银行服务商中的产品与存款负责人
  secondary: >-
    负责商户出资权益、储备金产品经济模型和留存报表的合作及资金产品经理
  buyer: "企业银行业务负责人、存款业务负责人，或中小企业储蓄业务总经理"
startupThesis:
  nonObviousInsight: >-
    真正的突破不是再做一个现金管理前端，而是搭一条中立通道，让银行把纯利息成本换成商户出资的价值，再看清到底哪些权益真的能把经营余额做大、把续存率拉上来。只要英国的在线产品已经证明企业愿意为了前置奖励把现金锁进去，开放银行集成又让商户能直接接入，存款留存就不再只是利率问题，而会变成银行和 B2B 商户之间一个可以量化的交易市场。
  beachhead: >-
    拥有 20,000-150,000 个活跃中小企业账户、已上线 30-180 天储备金产品，且客户经常留存 £50k-£500k 闲置经营现金的英国 challenger 银行和嵌入式企业银行服务商
  wedge: >-
    一层 API 加清算能力，把商户出资权益挂到定期中小企业储备金账户上，归因哪些优惠真正做深了余额，并在不靠定制化合作运营的情况下把银行—商户经济关系结算清楚。
  whyNowCatalyst: >-
    Stoa 已在英国上线企业资金产品，英国和美国的闲置现金池也有量化数据，再加上“银行和商户已经能接到同一套开放银行架构里”这一点，说明存款挂钩奖励已经从想法跨到了集成窗口。
  ventureScalePath: >-
    先做英国企业银行里商户出资中小企业储备金产品的运行层，再扩到资金归集、美国中小企业现金产品、供应商出资的采购优惠，最终把存款、消费激励和营运资金融资产品都路由到同一条余额感知通道上。
solution: >-
  产品接到银行的企业储蓄系统上，先定义哪类储备余额、期限和客户分层该看到哪些商户出资权益。中小企业一旦把闲置现金存进定期账户，这条通道就立即发放权益，跟踪这次优惠到底带来了新增入金还是续存，并把返款清算回商户，不用银行自己再拉一支定制化忠诚度团队。存款负责人能看到按客户分层拆开的入金余额、续存提升、相对加息促销的留存成本，以及合作方表现。商户合作方拿到的，则是一个和真实现金承诺直接挂钩的获客渠道，而不是靠曝光买量。时间拉长后，公司会变成企业银行和嵌入式资金产品里所有余额挂钩奖励的归因与清算层。
goToMarketSeed:
  firstCustomer: >-
    一家英国 challenger 银行：有 30,000-120,000 个活跃中小企业账户、现成的 90 天企业储备金账户，而且竞争对手一推更高收益储蓄产品，余额就明显流失。
  buyingTrigger: >-
    新上中小企业定期储蓄产品、季度内需要在不重定价整本存款簿的前提下守住企业存款，或被要求提升闲置现金余额的活跃度。
  currentAlternative: >-
    更高利率的存款促销、客户经理加卖活动、通用型企业卡返现，以及靠表格管理的一次性商户合作。
  switchingReason: >-
    首个客户愿意切换，是因为这条切口给了它一个不靠利率的留存杠杆、商户出资的经济模型，以及对“到底哪些优惠真的带来或保住了余额”的清晰归因——这些今天的储蓄产品栈里都没有。
  pricingHypothesis: >-
    按机构收年费的 SaaS 订阅，加上对留存平均余额或入金储备金额抽取基点费用；商户活动费和接入费另算。
