competitors:
- name: Stoa
  stage: seed
  wedge: Branded fixed-term pots that swap traditional interest for upfront perks and subscriptions.
  pricing: Not public.
  strength: It is the clearest live proof that banks, merchants, and cash-holding users can be linked in one rewards proposition.
  weaknessVsUs: It looks more like an operator of a branded product than a neutral cross-bank attribution and settlement rail.
  sourceRefs:
  - 10
  - 11
  - 12
  - 13
  - 14
- name: Flagstone
  stage: scale-up
  wedge: Business cash marketplace and savings platform across multiple partner banks.
  pricing: No admin or management fee; receives a share of interest and accepts business customers from GBP10k.
  strength: Strong fit for CFO reserve management, FSCS diversification, and yield optimization.
  weaknessVsUs: It optimizes yield and diversification, not merchant-funded retention or deposit-lift attribution for banks.
  sourceRefs:
  - 24
  - 25
  - 26
- name: Reward
  stage: scale-up
  wedge: Bank-channel activation and retail-offer infrastructure for targeted customer engagement.
  pricing: Custom enterprise pricing; not public.
  strength: Understands how to place merchant offers inside banking channels and drive measurable engagement.
  weaknessVsUs: Its center of gravity is retail offer activation, not fixed-term deposit behavior or reserve-product economics.
  sourceRefs:
  - 29
  - 30
- name: Fidel API
  stage: scale-up
  wedge: Developer-first transaction-linking and reward-attribution infrastructure.
  pricing: Custom API pricing; not public.
  strength: Fast, tokenized transaction events and strong technical tooling for rewards use cases.
  weaknessVsUs: It is infrastructure for card-linked behavior, not a bank-ready product layer for deposit tenure, merchant funding, and renewal analytics.
  sourceRefs:
  - 31
  - 32
- name: Monzo Business
  stage: incumbent
  wedge: SME account bundle combining business banking, instant-access savings, and accounting features.
  pricing: Free tier; Pro and Team plans start from GBP9/month; business savings up to 3.25% AER variable.
  strength: Already owns the customer relationship and can package savings plus software inside one SME banking experience.
  weaknessVsUs: It is an on-us banking bundle rather than a neutral rail another bank can license to turn merchant budgets into deposit retention.
  sourceRefs:
  - 18
  - 19
  - 20
