- point: Savings-account promotions and related adverts must be fair, clear and not misleading.
  sourceRefs:
  - 7
- point: Business deposits are generally protected up to GBP120,000 per eligible company per authorised bank, while sole traders aggregate business and personal balances.
  sourceRefs:
  - 6
  - 26
- point: Business-account data access and payment initiation depend on customer consent and open-banking implementation choices.
  sourceRefs:
  - 8
  - 9
  - 32
  - 33
  - 34
- point: Some SME-bank propositions rely on partner-bank or e-money structures, so product design must align disclosure and protection responsibilities.
  sourceRefs:
  - 21
  - 22
validationSignals:
- point: Stoa says its UK service is already live for both individual and business users, showing the behavior is past pure concept stage.
  sourceRefs:
  - 10
  - 13
- point: UK challenger and specialist banks still grew deposits in 2025, confirming deposit retention remains economically meaningful even in a slower market.
  sourceRefs:
  - 4
- point: Capital on Tap and Reward already merchandize explicit offer programs to SME or bank-channel users, proving merchants will fund behavior-linked distribution when attribution is simple enough.
  sourceRefs:
  - 27
  - 29
- point: Savings platforms such as Flagstone already teach CFOs to segment reserves across instant, notice, and fixed accounts, which is adjacent behavior the rail can piggyback.
  sourceRefs:
  - 24
  - 25
  - 26
openQuestions:
- What uplift in funded balances or renewals do banks need before they will trade off a simpler rate promotion for a merchant-funded perk model?
- Which merchant categories consistently matter to SMEs holding GBP50k-GBP500k in reserve cash, rather than merely generating clicks?
- How much custom savings-core integration is required at challenger banks versus what can sit in a lighter orchestration layer?
- Will banks prefer off-the-shelf merchant networks first, or will they insist on curating their own partners and economics from day one?
