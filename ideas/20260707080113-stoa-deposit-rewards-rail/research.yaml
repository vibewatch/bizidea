market:
  tam:
    value: $36.0M
    rationale: Bottom-up UK beachhead TAM assumes 15 target challenger or embedded SME banks x 40k eligible SME accounts x 25% reserve-product uptake x GBP110k average funded balance x 15 bps variable take, plus GBP250k SaaS per bank; that yields about GBP28.5M (about $36.0M) and uses only a small fraction of the >GBP250B UK SME reserve pool cited by Stoa.
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 10
    - 15
  sam:
    value: $12.0M
    rationale: SAM narrows to roughly five best-fit UK institutions matching the beachhead profile, using the same account, balance, and pricing assumptions; that implies about GBP9.5M or roughly $12.0M.
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 5
    - 10
  som:
    value: $3.5M
    rationale: Year-3 SOM assumes three institutions live, 25k eligible SMEs each, 20% uptake, GBP90k average funded balance, 15 bps take, and the same fixed-fee structure, yielding roughly GBP2.8M or about $3.5M.
    isEstimate: true
    sourceRefs:
    - 4
    - 18
    - 19
    - 21
