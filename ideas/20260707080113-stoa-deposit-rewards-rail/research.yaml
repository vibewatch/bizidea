    - 30
  geographicConsiderations:
  - point: UK is a strong starting point because open banking already has over 7 million active users and a roadmap for additional services.
    sourceRefs:
    - 8
    - 9
  - point: UK deposit-protection and disclosure rules still need careful entity-level design, especially where fintechs rely on partner-bank structures.
    sourceRefs:
    - 6
    - 7
    - 21
    - 22
  - point: The US opportunity may be larger, but the evidence supports UK proof first and US expansion second.
    sourceRefs:
    - 10
  sensitivityCases:
  - case: Rate competition eases faster than expected
    impact: If business savings rates fall and deposit pressure relaxes, banks may defer a new retention rail and accept simpler product optimization.
    sourceRefs:
    - 4
    - 5
  - case: Merchant inventory feels generic
    impact: If offers resemble ordinary cashback or shallow perks, SMEs may prefer straightforward interest and banks may struggle to prove incremental funding.
    sourceRefs:
    - 27
    - 29
    - 30
  - case: Compliance or consent workflows get heavy
    impact: Longer reviews on disclosures, deposit protection, and data permissions can stretch enterprise sales cycles and narrow initial product scope.
    sourceRefs:
    - 6
    - 7
    - 8
    - 9
  validationPlan:
  - priority: high
    question: Do heads of SME deposits believe perks can outperform a 25-50bp rate promotion for 90-day reserve cash?
    evidenceToGather: Ten interviews plus historical runoff and promo data from at least three challenger banks.
  - priority: high
    question: Which merchant categories actually change reserve-funding behavior for SMEs?
    evidenceToGather: Pilot one bank with accounting-software, travel, and insurance offers; compare funded balances and renewals against holdouts.
  - priority: medium
    question: What minimum data and consent package will bank compliance teams approve?
    evidenceToGather: Redline review from two UK bank legal/compliance teams plus one open-banking vendor.
