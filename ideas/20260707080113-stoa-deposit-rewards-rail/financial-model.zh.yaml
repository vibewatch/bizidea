slug: "sme-reserve-rewards-rail"
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-08"
assumptions:
- id: A1
  name: "pre-seed 到账后的期初现金"
  value: "2400"
  unit: "usdK"
  source: "[BP fundingAsk.targetFundingRangeUsd $2-4M；模型取 $2.4M，是为了把资金撑到 Q4Y2 的关键验证点外加 6 个月缓冲。]"
- id: A2
  name: "每家银行的付费 pilot 单价"
  value: "25"
  unit: "usdK per month"
  source: "[BP investorMemo.firstCustomer.initialContract £40k-£75k 的付费 pilot；模型按 3 个月合计约 $75K 处理。]"
- id: A3
  name: "pilot 时长"
  value: "3"
  unit: "months"
  source: "[BP experimentRoadmap 的 90-180 天 pilot 节奏；模型假设付费 pilot 跑 3 个月后再决定是否转生产。]"
- id: A4
  name: "转生产时的一次性实施费"
  value: "40"
  unit: "usdK per bank"
  source: "[BP businessModel.revenueStreams 包含实施和 onboarding 费用；模型把一次性费用压得较低，因为银行通常不愿为前期服务账单付太多。]"
- id: A5
  name: "每家上线银行的初始生产收入"
  value: "55"
  unit: "usdK per month"
  source: "[BP gtm.pricing 为年费 SaaS + 10-15 bps 的留存余额抽成；模型假设首个储备金产品爬坡期的年化收入约 $660K。]"
- id: A6
  name: "每家上线银行的成熟期生产收入"
  value: "85"
  unit: "usdK per month"
  source: "[Research market.som 对应的第 3 年成熟单行收入约为 $1.17M；模型采用更保守的 $1.02M 年化 run rate。]"
- id: A7
  name: "转生产后达到成熟 run rate 的月份数"
  value: "6"
  unit: "months"
  source: "[BP product.twelveMonth 和 sequencingRationale：先把一条储备金产品工作流跑通，再往更广的客户分层扩，所以可变费用在前 6 个生产月内逐步爬坡。]"
- id: A8
  name: "付费银行启动节奏"
  value: "M7, M13, M21, M31"
  unit: "month index"
  source: "[BP milestones 和 experimentRoadmap：第 1 年 1 个付费 pilot，12-24 个月内 2 个生产合同，第 3 年第 4 家银行进入 pilot。]"
- id: A9
  name: "分阶段毛利率爬坡"
  value: "45 / 65 / 72"
  unit: "percent for pilot / initial production / mature production"
  source: "[BP businessModel.targetGrossMarginPct = 70；模型在 pilot 阶段低于目标，只有连接器和清算模板开始复用后才越过目标。]"
- id: A10
  name: "月度 logo 流失率"
  value: "1.0"
  unit: "percent"
  source: "[经验假设：早期企业 fintech 基础设施一旦部署往往有黏性，但客户基数只有 4 个 logo，长期月流失仍按 1.0% 假设。]"
- id: A11
  name: "每家生产银行的混合 CAC"
  value: "300"
  unit: "usdK"
  source: "[BP 以创始人主导银行销售 + 合作渠道联卖为主；经验假设里计入差旅、合规尽调和从 pilot 到生产较长的采购周期。]"
- id: A12
  name: "从 discovery 到付费 pilot 的基础销售周期"
  value: "6"
  unit: "months"
  source: "[BP buyingProcess 和 experimentRoadmap 隐含：discovery、合规审查和签约合起来，大约要 6 个月才会启动付费 pilot。]"
- id: A13
  name: "管理层全包薪酬"
  value: "200"
  unit: "usdK annual"
  source: "[经验假设：fintech 创始人/CEO 的现金薪酬、薪资税和福利，在 pre-seed 阶段仍保持精简。]"
- id: A14
  name: "工程全包薪酬"
  value: "200"
  unit: "usdK annual"
  source: "[经验假设：高级银行集成工程师的薪酬、福利和 payroll load。]"
- id: A15
  name: "合规或产品全包薪酬"
  value: "180"
  unit: "usdK annual"
  source: "[经验假设：具备储蓄产品和 consent 经验的产品/合规负责人。]"
- id: A16
  name: "解决方案或集成全包薪酬"
  value: "170"
  unit: "usdK annual"
  source: "[经验假设：负责银行 core 和商户工作流部署的实施工程师。]"
- id: A17
  name: "GTM 或商户合作全包薪酬"
  value: "180"
  unit: "usdK annual"
  source: "[经验假设：同时负责银行与商户 sourcing 的企业合作负责人。]"
- id: A18
  name: "G&A 或运营全包薪酬"
  value: "150"
  unit: "usdK annual"
  source: "[经验假设：只有在部署开始可复制后，才补一名精简的财务与运营经理。]"
- id: A19
  name: "非薪酬研发栈"
  value: "10 / 12 / 14"
  unit: "usdK per month in Y1 / Y2 / Y3"
  source: "[经验假设：银行级产品所需的云、安全工具、事件总账、返款运营和分析栈。]"
- id: A20
  name: "非薪酬销售与市场费用"
  value: "8 / 14 / 18"
  unit: "usdK per month in Y1 / Y2 / Y3"
  source: "[经验假设：创始人差旅、银行活动、商户 sourcing 和合作方赋能都保持精准投放，因为 ICP 很小。]"
- id: A21
  name: "非薪酬 G&A 费用"
  value: "18 / 25 / 30"
  unit: "usdK per month in Y1 / Y2 / Y3"
  source: "[经验假设：随着银行客户基础变成熟，法务、保险、审计准备、合规复核和供应商风险文档费用会抬升。]"
- id: A22
  name: "招聘节奏"
  value: "合规 M5，解决方案 M7，GTM M10，工程师 2 号 M16，产品 2 号 M19，解决方案 2 号 M22，工程师 3 号 M28，GTM 2 号 M31，G&A/运营 M33"
  unit: "month index"
  source: "[BP team.startTiming 和 strategicChoices.sequencingRationale；招聘跟着 pilot 证明和连接器复用走，不会在前期就把销售队伍堆满。]"
