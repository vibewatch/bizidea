fundingAsk:
  round: pre-seed
  amountM: 2.4
  runwayMonths: 24
  milestone: "到 Q4Y2，做到 2 家生产银行、发出第 2 个连接器、拿下一次客户扩单，并建起一条由合作方带来的商机管道，同时还留 6 个月现金缓冲。"
  useOfFunds:
  - bucket: "工程"
    amountUsd: 960000
    percentage: 40
  - bucket: "GTM"
    amountUsd: 600000
    percentage: 25
  - bucket: "G&A"
    amountUsd: 360000
    percentage: 15
  - bucket: "缓冲（6 个月）"
    amountUsd: 480000
    percentage: 20
scenarios:
  downside:
    description: "每家银行的启动都大约晚 1 个月，成熟期余额抽成也低于计划，公司在 Y3 末会逼近烧完现金的边缘。"
    y3RevenueK: 2926.0
    y3EbitdaK: -553.9
    cashLowPointK: 26.6
    keyAssumptionChanges:
    - 由于合规复核拖慢节奏，pilot 启动顺序推到 M8、M14、M22 和 M33。
    - 商户领取率和留存余额提升偏弱，导致初始和成熟生产 MRR 分别降到 $53K 和 $80K。
    - 因为实施仍然偏定制化，退出期毛利率只能到约 69%，而不是 72%。
  base:
    description: "到 Y3 末，3 家生产银行加 1 个较晚启动的 pilot 已经在线，余额挂钩收费贡献的增量大于新增招聘带来的成本。"
    y3RevenueK: 3190.0
    y3EbitdaK: -277.8
    cashLowPointK: 574.6
    keyAssumptionChanges:
    - 银行启动节奏按 M7、M13、M21 和 M31 走。
    - 每家银行的生产收入，会在上线后从每月 $55K 爬到首个储备金产品成熟后的每月 $85K。
    - 随着成熟生产银行增多，毛利率会从 pilot 阶段的 45% 提升到 Y3 后段的 72%。
  upside:
    description: "有一家合作方带来的银行更早进来，成熟期余额抽成也高于计划，模型在 Y3 大致能摸到 breakeven。"
    y3RevenueK: 3581.0
    y3EbitdaK: 40.5
    cashLowPointK: 1012.5
    keyAssumptionChanges:
    - 因为有一条渠道转介绍更快成交，pilot 启动顺序提前到 M7、M12、M20 和 M29。
    - 随着留存余额提升和商户出资效果更快被证明，初始和成熟生产 MRR 提升到 $58K 和 $92K。
    - 由于连接器复用压缩了定制化清算工作，退出期毛利率可到约 73%。
sensitivity:
- variable: "ARPU"
  downsideCase: "如果银行把余额挂钩抽成上限卡得更死，初始和成熟生产 MRR 会落在 $52K 和 $80K。"
  baseCase: "初始和成熟生产 MRR 分别是 $55K 和 $85K。"
  upsideCase: "如果商户出资带来的余额提升更强，初始和成熟生产 MRR 可达 $58K 和 $92K。"
  y3RevenueImpactK: -179.0
  cashImpactK: -195.1
- variable: "CAC"
  downsideCase: "如果每关一家银行都要维持高强度的创始人差旅和合作方赋能，CAC 会升到约 $360K。"
  baseCase: "每家生产银行的 CAC 约 $300K。"
  upsideCase: "一旦三分之一机会来自合作方转介绍，CAC 可降到约 $240K。"
  y3RevenueImpactK: 0.0
  cashImpactK: -147.0
- variable: "流失率"
  downsideCase: "月流失率走高到 1.5%，而且有一家早期银行没有扩到第二个储备金分层。"
  baseCase: "月流失率 1.0%，首个合同周期内没有 logo 流失。"
  upsideCase: "随着产品嵌入储蓄和续存工作流，月流失率改善到 0.6%。"
  y3RevenueImpactK: -150.0
  cashImpactK: -120.0
- variable: "销售周期"
  downsideCase: "由于储蓄 core 和合规审批拖慢节奏，每家银行的 pilot 启动大约都晚 1 个月。"
  baseCase: "从 discovery 到付费 pilot 约 6 个月。"
  upsideCase: "有一家合作方转介的银行快 1 个月成交，第 4 个 pilot 在 M29 而不是 M31 启动。"
  y3RevenueImpactK: -100.0
  cashImpactK: -255.0
- variable: "毛利率"
  downsideCase: "pilot 和早期生产工作依旧偏定制，所以成熟毛利率只能到约 69%。"
  baseCase: "连接器复用后，成熟毛利率达到 72%。"
  upsideCase: "清算和披露模板化后，成熟毛利率达到 73-74%。"
  y3RevenueImpactK: 0.0
  cashImpactK: -141.2
- variable: "招聘节奏"
  downsideCase: "在第一个可复用连接器被证明之前，就把 2 个 Y2 招聘往前提了一个季度。"
  baseCase: "招聘节奏在 Q4Y2 前都由里程碑控制，第二个 GTM 岗只在 Q3Y3 入场。"
  upsideCase: "后续招聘等到合作方带来的商机管道真正成型后再启动，从而保住现金。"
  y3RevenueImpactK: 0.0
  cashImpactK: -224.1
modelDiagram:
  title: "单位经济模型流转"
  mermaid: |
    flowchart LR
      TargetBanks[Qualified bank opportunities] --> Pilots[Paid reserve-product pilots]
      Pilots --> ProductionBanks[Production banks]
      ProductionBanks --> PlatformFee[Annual platform fee]
      ProductionBanks --> BalanceFee[Balance-based fee]
      PlatformFee --> Revenue[Revenue]
      BalanceFee --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: "营收引擎"
  finding: "基本情景的收入，不是靠大规模 SMB 体量冲出来的，而是靠 3 家生产银行把月收入推到约 $85K，再加 1 个较晚的付费 pilot，在 Y3 末合起来贡献。"
- checkName: "必须做对的事"
  finding: "前两个 pilot 必须证明每留存 1 英镑成本更低，而且要在约 120 天内上线，这样 M13 和 M21 的银行启动节奏才能不掉出计划。"
- checkName: "模型崩掉的条件"
  finding: "如果每家银行的启动都只慢 1 个月，而成熟期单行收入又停在每月约 $80K，下行情景的现金会在 Y3 后段逼近 $0。"
- checkName: "下一轮融资的证明包"
  finding: "能支撑 seed 轮故事的里程碑是：到 Q4Y2 有 2 家生产银行、第 2 个连接器、1 次客户扩单，以及一条合作方来源的商机管道——这也正是本轮融资要买到的结果。"
sanityChecks:
  ruleOf40: "Y3 growth 77% + EBITDA margin -9% = 68%"
  burnMultiple: "Y3 net burn $278K / net new ARR added in Y3 about $1,020K = 0.27x"
  revenuePerFte: "$290K Y3 (benchmark $200-400K SaaS)"
  flags:
  - 到 Y3 末，实际在付费的银行只有 4 家，所以只要掉 1 个 logo 或出 1 次流失，年化收入就会明显波动。
  - 基本情景假设每家生产银行能在 6 个月内把月收入从约 $55K 拉到 $85K；这取决于商户领取率和留存余额归因能否很快跑通。
  - 因为直到 Y3 后段，组合里仍混着 pilot 和实施占比较高的季度，所以模型大部分时间的组合毛利率都低于 70% 目标。
  - 模型把第二个 GTM 招聘推迟到 Q3Y3；对这个狭窄的银行 ICP 来说，提前加销售人头会比它带来的签单更快伤到跑道。
