jobsToBeDone:
  - job: >-
      When we launch or defend a business reserve product, help our team turn idle customer cash into a compelling
      reason to commit for 90 days, so we can keep balances without matching every competitor rate.
    currentAlternative: "Higher-rate promotions, RM outreach, and generic savings marketing"
    successMetric: "Funded reserve balances, renewal rate, and retention cost versus rate promos"
  - job: >-
      When merchants fund perks across our reserve products, help our product and partnerships teams see which offers
      actually deepen and renew balances, so we do not manage bank-merchant economics in spreadsheets.
    currentAlternative: "Manual partner reports, spreadsheet settlement, and disconnected offer dashboards"
    successMetric: "Retained average balance per offer, renewal lift, and merchant payout reconciliation accuracy"
ideaScorecard:
  signalStrength:
    score: 5
    rationale: "The cluster includes a live UK product, quantified SME cash pools, and explicit bank-plus-merchant integration language across two verified same-day sources."
  painIntensity:
    score: 4
    rationale: "Business-balance retention is economically meaningful for banks, but the pain is less acute than fraud or compliance emergencies because some institutions can still buy deposits with rates."
  wedgeClarity:
    score: 5
    rationale: "Merchant-funded rewards attached to fixed-term SME reserve accounts is a narrow workflow with a clear buyer, trigger, and measurable balance outcome."
  defensibility:
    score: 4
    rationale: "Balance-linked offer attribution, merchant ROI data, and bank-specific renewal behavior can compound into a proprietary settlement and pricing graph, though large banks could eventually imitate parts of the surface feature set."
  ventureScale:
    score: 5
    rationale: "The beachhead starts with UK SME savings products, but the same rail can expand into U.S. SMB cash, treasury sweeps, supplier offers, and broader working-capital distribution."
topRisks:
  - name: "Thin merchant inventory"
    description: "If the early merchant catalog is not compelling enough, SMEs will not lock cash just to access generic perks."
    mitigation: "Start with high-LTV B2B merchant categories and prove which offers change funding behavior before broadening the marketplace."
  - name: "Compliance complexity"
    description: "Banks may worry deposit-linked perks blur into regulated inducements or create messy disclosures across different product terms."
    mitigation: "Begin with simple fixed-term products, non-cash merchant benefits, explicit disclosures, and compliance-reviewed offer templates."
  - name: "Liquidity mismatch"
    description: "Many SMEs may value optionality more than perks, limiting adoption if reserve terms are too rigid or too long."
    mitigation: "Target businesses already holding true reserve cash, support shorter tenors first, and use balance and tenure data to only surface offers to likely lockers."
