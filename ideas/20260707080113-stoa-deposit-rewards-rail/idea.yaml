differentiator: >-
  This is not a consumer savings app, a card-linked offer network, or a generic bank rewards catalog. The defensible
  asset is the linkage between reserve-balance events, merchant-funded perk economics, and deposit-retention
  attribution—showing which balances arrived, renewed, or churned because of each offer and each term structure. That
  balance-aware dataset can compound into better offer selection, pricing, and merchant ROI benchmarks than a bank or
  merchant could build alone.
