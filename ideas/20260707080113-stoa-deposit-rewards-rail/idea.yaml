problem: >-
  SME-focused banks know many business customers keep meaningful operating-cash buffers, but retaining those balances
  usually means paying up on rates or leaning on relationship managers to push term products. Generic business-card
  cashback and ad hoc perks do little when a finance lead is deciding where to park £100k of idle cash for 90 days.
  Merchants meanwhile spend heavily to acquire SMBs, yet most have no channel that ties their budget directly to
  balance-sheet retention inside business banking.
targetUser:
  primary: >-
    Product and deposit leaders at UK challenger banks and embedded business-banking providers serving SMEs with
    fixed-term reserve or savings accounts
  secondary: >-
    Partnerships and treasury product managers responsible for merchant-funded offers, reserve-product economics, and
    retention reporting
  buyer: "Head of Business Banking, Chief Deposits Officer, or GM of SME savings"
startupThesis:
  nonObviousInsight: >-
    The breakthrough is not another cash-management front end; it is the neutral rail that lets a bank swap pure yield
    expense for merchant-funded value and then prove which perks actually deepen and renew operating balances. Once a
    live UK product shows businesses will lock cash for upfront rewards and open-banking integrations let merchants plug
    in, deposit retention stops being only an interest-rate problem and becomes a measurable marketplace between banks
    and B2B merchants.
  beachhead: >-
    UK challenger banks and embedded business-banking providers with 20,000-150,000 active SME accounts, live 30-180
    day reserve products, and customers that regularly keep £50k-£500k in idle operating cash
  wedge: >-
    An API and settlement layer that attaches merchant-funded perks to fixed-term SME reserve accounts, attributes which
    offers actually deepen balances, and clears bank-merchant economics without custom partnership ops
  whyNowCatalyst: >-
    Stoa's live UK business pots, quantified UK and U.S. idle-cash pools, and claim that banks and merchants can
    already plug into one open-banking architecture show deposit-linked rewards have crossed from idea into integration
    moment.
  ventureScalePath: >-
    Start as the operating layer for merchant-funded SME reserve products in UK business banking, then expand into
    treasury sweeps, U.S. SMB cash products, supplier-funded procurement offers, and eventually a broader marketplace
    where deposits, spend incentives, and working-capital products are routed through one balance-aware rail.
solution: >-
  The product plugs into a bank's business savings stack and creates rules for which reserve balances, tenors, and
  customer segments should see which merchant-funded offers. When an SME commits idle cash into a fixed-term pot, the
  rail delivers immediate perks, tracks whether the offer caused new funding or renewal, and clears payouts back to the
  merchant without the bank standing up a custom loyalty team. Deposit leaders get dashboards on funded balances,
  renewal lift, cost of retention versus rate promotions, and partner performance by customer cohort. Merchant partners
  get an acquisition channel tied to verified cash commitments rather than impression-based ads. Over time, the company
  becomes the attribution and settlement layer for balance-linked rewards across business banking and embedded treasury
  products.
goToMarketSeed:
  firstCustomer: >-
    A UK challenger bank with 30,000-120,000 active SME accounts, an existing 90-day business reserve pot, and visible
    balance runoff whenever competitors launch higher-yield savings offers
  buyingTrigger: >-
    Launch of a new SME fixed-term savings product, quarterly pressure to defend business deposits without repricing the
    whole book, or a mandate to improve engagement on idle-cash balances
  currentAlternative: >-
    Higher-rate deposit promotions, relationship-manager upsell campaigns, generic business-card cashback, and one-off
    merchant partnerships managed in spreadsheets
  switchingReason: >-
    The first customer switches because this wedge gives it a non-rate retention lever, merchant-funded economics, and
    clear attribution on which offers actually create or preserve balances, none of which exist in today's savings
    product stack
  pricingHypothesis: >-
    Annual SaaS fee per institution plus basis points on retained average balances or funded reserve volume, with
    separate merchant campaign and onboarding fees
