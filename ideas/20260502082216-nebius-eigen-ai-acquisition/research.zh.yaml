      sourceRefs:
        - 27
        - 28
        - 32
  adoptionFrictionMatrix:
    - friction: 向第三方共享生产 trace
      severity: high
      affectedBuyer: 安全与法务相关方
      mitigation: 先上 VPC / 自托管选项，再配合脱敏、哈希和分区域存储控制。
