    - 21
  - point: 一旦平台成为轨迹、通过/失败阈值和迁移报告的历史记录系统，它带来的工作流锁定就不只来自原始评测分数。
    sourceRefs:
    - 22
    - 23
  geographicConsiderations:
  - point: 面向欧盟销售必须具备更强的数据驻留与治理能力，因为 AI Act 和 EDPB 指引都提高了 deployer 义务和个人数据审查强度。
    sourceRefs:
    - 27
    - 28
    - 32
  - point: 欧洲云多元化是一股小幅顺风，因为 Nebius 正明确把基础设施和优化能力打包成前沿推理平台。
    sourceRefs:
    - 1
  sensitivityCases:
  - case: 保守的买家转化
    impact: 如果 Langfuse 40,000+ builder 群体中，只有 10% 真正对应到独立采购团队，且平均 ACV 更接近 $20k，那么模型里的 TAM 会落到大约 $80M。
