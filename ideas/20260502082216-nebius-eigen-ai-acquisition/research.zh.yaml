    - 14
    - 15
    - 17
    - 18
  - case: 基准情形
    impact: 若构建者到团队的转化率为 20%，且混合 ACV 为 $30k（以当前可观测性/eval 定价带为锚），则建模 TAM 约为 $240M。
    sourceRefs:
    - 16
    - 14
    - 15
    - 17
    - 18
  - case: 供应商打包压力
    impact: 如果云厂商把迁移报告打包进服务平台，可触达的 SAM 将收缩到那些最需要独立多提供商证明的高敏感团队。
    sourceRefs:
