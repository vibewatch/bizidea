        - 28
        - 32
    - friction: 成熟平台团队的 build-vs-buy 偏见
      severity: high
      affectedBuyer: AI Platform 负责人
      mitigation: 证明你能比内部 harness 更快给出有效信号，并把输出包装成管理层级的上线决策，而不只是原始 dashboard。
