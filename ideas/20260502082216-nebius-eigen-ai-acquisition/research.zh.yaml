    value: $80.0M
    rationale: 滩头市场 SAM 假设，在模型中的 TAM 团队里，只有约 25% 今天就同时具备迫切需求、六位数月度推理经济性和面向客户的工作负载（约 2,000 个团队），且由于安全 / 发布要求更高，ACV 提高到 $40k；2,000 × $40k ≈ $80M。
