  validationPlan:
  - priority: high
    question: AI 平台负责人会把提供商切换验证视为独立预算科目，还是期望它只是现有可观测性/eval 工具中的一个功能？
    evidenceToGather: 与 AI 平台负责人 / VP Eng 进行 10-15 次发现访谈，并收集 LangSmith/Braintrust/Langfuse 类工具的红线预算或过往采购文件。
  - priority: high
    question: 高支出团队究竟多久会重新审视一次提供商决策：按季度、模型发布时，还是只在事故之后？
    evidenceToGather: 收集续约周期、基准评审节奏，以及与推理支出或质量回归相关的事后复盘中的日历证据。
  - priority: medium
    question: 如果默认方案是 VPC / 仅脱敏重放，买家是否愿意共享生产追踪？
    evidenceToGather: 安全评审通话、DPA 异议样本，以及来自欧盟或受监管潜在客户的试点意愿反馈。
  - priority: medium
    question: 离线重放能否为有状态 Agent 和工具调用系统捕获足够信号？
    evidenceToGather: 在 3-5 个 Agent 工作负载上进行试点基准，对比通过/失败阈值与实时金丝雀结果。
  - priority: low
    question: 哪条渠道最能缩短销售周期：云合作伙伴、AI 基础设施顾问，还是创始人直销？
    evidenceToGather: 进行合作伙伴访谈，并与 AI 基础设施顾问或云 GTM 联系人至少开展两次联合销售实验。
