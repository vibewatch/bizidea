market:
  tam:
    value: $0.24B
    rationale: 自下而上的估算：以 Langfuse 的 40,000+ 构建者作为可见的活动下界，假设其中 20% 映射为独立的生产级 AI 采购团队（按每队 5 名构建者计，约 8,000 个团队），再套用以当前 eval/可观测性价格带为锚的 $30k 混合年合同价值；8,000 × $30k ≈ $240M。
    isEstimate: true
    sourceRefs:
    - 16
    - 14
    - 15
    - 17
    - 18
  sam:
    value: $80.0M
    rationale: 滩头市场的 SAM 假设：目前只有建模 TAM 团队中的约 25% 拥有紧迫的、六位数月度推理经济性以及面向客户的工作负载（约 2,000 个团队），并因安全 / 上线要求而对应更高的 $40k ACV；2,000 × $40k ≈ $80M。
