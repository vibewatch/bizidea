  validationPlan:
  - priority: high
    question: AI 平台负责人会把供应商切换验证视作独立预算项，还是把它当成现有 observability / eval 工具里理应自带的功能？
    evidenceToGather: 与 Head of AI Platform / VP Eng 做 10–15 场 discovery，并拿到 LangSmith / Braintrust / Langfuse 这类工具的预算红线版本或历史采购文档。
  - priority: high
    question: 高推理开支团队到底多久会重审一次供应商决策：按季度、在模型发布时，还是只有出事故后才会动？
    evidenceToGather: 收集续约周期、榜单评审节奏，以及与推理开支或质量回归相关的事故复盘时间线证据。
  - priority: medium
    question: 如果默认方案是 VPC / 仅脱敏回放，买家是否愿意共享生产轨迹？
    evidenceToGather: 安全评审通话、DPA 异议样本，以及来自欧盟或受监管潜在客户的试点意愿反馈。
  - priority: medium
    question: 对有状态 agent 和工具调用系统来说，离线回放能否捕获足够信号？
    evidenceToGather: 在 3–5 个 agentic 工作负载上做试点基准，对比通过/失败阈值与真实金丝雀结果。
  - priority: low
    question: 哪条渠道最能缩短销售周期：云合作伙伴、AI 基础设施顾问，还是创始人直接外呼？
    evidenceToGather: 合作伙伴访谈，以及至少 2 次与 AI 基础设施顾问或云 GTM 联系人的联合销售实验。
