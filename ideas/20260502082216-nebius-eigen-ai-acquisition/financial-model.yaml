scenarios:
  downside:
    description: "Security review friction slows pilots, conversion falls below the BP target, and partner channels ramp later than planned."
    y3RevenueK: 2550.0
    y3EbitdaK: -420.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - Pilot-to-production conversion falls to 45%.
      - Average sales cycle extends from 4 months to 6 months.
      - Gross margin stalls at 70% because VPC becomes table stakes.
  base:
    description: "Founder-led pilots convert above 50%, the first AE and partner channels become productive in Y2, and gross margin expands modestly with scale."
    y3RevenueK: 3570.5
    y3EbitdaK: 355.5
    cashLowPointK: 494.1
    keyAssumptionChanges:
      - Pilot-to-production conversion holds at 55%.
      - Sales cycle averages 4 months including security review.
      - Gross margin ramps from 70% in Y1 to 74% in Y3.
  upside:
    description: "The migration wedge wins quickly with consultants and cloud co-sell, letting the company reach SOM-like logo count without adding much more headcount."
    y3RevenueK: 4480.0
    y3EbitdaK: 820.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - Pilot-to-production conversion rises to 60%.
      - Replay-volume expansion lifts mature ACV to roughly $96k.
      - Partner channels pull forward paid pilot creation by 1 to 2 quarters.
