modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      OutboundAndPartners[Founder outbound + partners]
      OutboundAndPartners --> PaidPilots[Paid migration pilots]
      PaidPilots --> Conversions[Production conversions]
      Conversions --> Revenue[Subscription + replay-fee revenue]
      Revenue --> GrossProfit[Gross profit at 70 to 74 percent]
      GrossProfit --> Cash[Runway and cash generation]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by 5 paid pilots in Y1, 17 in Y2, and 39 in Y3 converting at 55% into $78k to $90k annual contracts, reaching 57 active paying logos by M36."
  - checkName: Must go right
    finding: "Time-to-value has to stay near the BP goal of under 14 days so pilot conversion remains above 50% and partner referrals start compounding in Y2."
  - checkName: Model breaks if
    finding: "If security reviews push the sales cycle to 6 months and conversion drops to 45%, the downside case drives the cash trough close to zero before the next round."
  - checkName: Next-round proof
    finding: "The next financing is justified once the company reaches 10 to 15 production customers with VPC deployment, one trace integration, and early partner-led repeatability by Q4Y2."
sanityChecks:
  ruleOf40: "Y3 growth 190.6% + EBITDA margin 10.0% = 200.6%; very strong on paper, but still early-stage and helped by a small cost base."
  burnMultiple: "Y2 burn multiple is about 0.5x using EBITDA burn versus net new exit ARR (~$736K burn / ~$1.40M net new ARR), and the company turns EBITDA-positive in Y3."
  revenuePerFte: "$325K Y3 using 11 exit FTE (benchmark $200–400K SaaS)."
  flags:
    - "The base case counts active paying logos, so customer totals include both pilots and annual production contracts."
    - "Recognized Y3 revenue is below the research SOM of $4.5M because many late-Y3 wins contribute mostly to exit ARR rather than full-year revenue."
    - "Cash flow assumes EBITDA approximates cash movement; real enterprise billing and collections could add 1 to 2 months of working-capital pressure."
    - "Gross-margin improvement depends on VPC and security-heavy deployments remaining premium upsells rather than the default for most customers."
