assumptions:
  - id: A1
    name: Starting cash at model start
    value: "2000"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M]; modeled as a $2.0M pre-seed close at M1."
  - id: A2
    name: Average paid pilot price
    value: "30000"
    unit: USD
    source: "[BP gtm pricing $20k to $40k paid pilot]; midpoint used."
  - id: A3
    name: Pilot revenue recognition period
    value: "2"
    unit: months
    source: "[BP gtm wedge 2 to 4 weeks] plus startup-finance heuristic to recognize setup/report work across 2 months."
  - id: A4
    name: Initial production contract value
    value: "78000"
    unit: USD per year
    source: "[BP pricing $60k to $120k annual platform subscription]; conservative low-midpoint used for first-year production contracts."
  - id: A5
    name: Mature production ACV including replay-volume fees
    value: "90000"
    unit: USD per year
    source: "[BP revenue streams include usage-based replay fees] and [BP market SOM assumes $75k average contract]; mature base-case customer expands above initial subscription."
  - id: A6
    name: Year 1 paid pilot starts
    value: "5"
    unit: logos
    source: "[BP milestones 0–12 months close 3 to 5 paid migration pilots]; high end of milestone range used."
  - id: A7
    name: Year 2 paid pilot starts
    value: "17"
    unit: logos
    source: "[BP milestones 12–24 months reach 10 to 15 production customers]; derived using A9 conversion and founder plus first AE capacity."
  - id: A8
    name: Year 3 paid pilot starts
    value: "39"
    unit: logos
    source: "[BP channels add consultants and selective cloud co-sell after first wins] plus [research SOM 60 logos by year 3]; modeled as partner-assisted scale, not pure outbound."
  - id: A9
    name: Pilot-to-production conversion
    value: "55"
    unit: percent
    source: "[BP funnelTargets pilot→annual production 50%+]; base case uses 55%."
  - id: A10
    name: Production churn
    value: "1.2"
    unit: percent per month
    source: "Startup-finance heuristic for sticky enterprise infrastructure sold on annual contracts; modeled as 3 logo losses across 36 months."
  - id: A11
    name: Gross margin ramp
    value: "70% Y1, 72% Y2, 74% Y3"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct 70]; modest scale benefit added as replay infrastructure utilization improves."
  - id: A12
    name: Hiring plan
    value: "M1 founder+core eng; M4 ML; M7 product eng; M10 security/solutions; M13 AE; M16 platform eng; M19 customer success; M25 AE2; M28 platform eng2; M31 security/solutions2"
    unit: timing
    source: "[BP team Month 0, Month 3, Month 6, Month 9 roles] plus startup-finance heuristic extension after first production conversions."
  - id: A13
    name: Loaded technical compensation bands
    value: "$180k to $210k"
    unit: USD per FTE per year
    source: "Startup-finance heuristic for US-based early-stage AI infrastructure hiring."
  - id: A14
    name: Loaded founder and GTM compensation bands
    value: "Founder $150k; AE $190k OTE; customer success $150k"
    unit: USD per FTE per year
    source: "Startup-finance heuristic for pre-seed to seed enterprise software teams."
  - id: A15
    name: Non-payroll operating spend
    value: "R&D tools $4k/$6k/$8k per month; S&M programs $2k-$3k/$8k/$14k; G&A $7k-$8k/$10k/$12k"
    unit: USDK per month
    source: "Startup-finance heuristic anchored to lean pre-seed operating spend and enterprise legal/security overhead."
  - id: A16
    name: Customer-count convention
    value: "Active paying logos including pilots and production; newCustomers equals new paid pilot starts"
    unit: definition
    source: "Model convention required because Y1 revenue mixes paid pilots and annual subscriptions."
  - id: A17
    name: CAC for a converted production customer
    value: "55"
    unit: USDK
    source: "Startup-finance heuristic for founder-led enterprise AI infrastructure sales with security review and pilot delivery."
  - id: A18
    name: Base sales cycle
    value: "4"
    unit: months
    source: "[BP gtm discovery→pilot→production motion] plus [research security/governance requirements lengthen enterprise approvals]."
  - id: A19
    name: Funding milestone for the next round
    value: "10 to 15 production customers, VPC-capable deployment, one trace integration, and two repeatable partner channels by Q4Y2 plus 6 months of buffer"
    unit: milestone
    source: "[BP milestones 12–24 months] and [BP fundingAsk runwayMonths 18]."
  - id: A20
    name: Cash conversion
    value: "EBITDA approximates cash movement"
    unit: modeling heuristic
    source: "Startup-finance heuristic; model excludes debt, capex, taxes, and material working-capital timing swings."
