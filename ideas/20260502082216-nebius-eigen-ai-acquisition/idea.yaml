topRisks:
  - name: Internal build temptation
    description: Sophisticated AI teams may try to extend their own eval harness instead of buying a new platform.
    mitigation: Win with faster setup, provider adapters, finance-ready scorecards, and release gating that spans engineering, security, and procurement rather than just raw evals.
  - name: Provider feature encroachment
    description: Major inference clouds could add native benchmarking and migration tooling that narrows the wedge.
    mitigation: Stay strictly provider-neutral, support multi-cloud comparisons from day one, and become the independent system of record customers use across competing vendors.
  - name: Sensitive prompt access
    description: Customers may hesitate to share production traces because prompts and tool outputs can contain proprietary or regulated data.
    mitigation: Offer VPC deployment, default redaction and hashing, and policy controls that let customers replay only approved trace subsets.
