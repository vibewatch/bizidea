jobsToBeDone:
  - job: When my team is asked to cut inference spend, help me compare new endpoints on our real workload so I can switch providers without breaking customer-facing AI features.
    currentAlternative: Internal eval harness plus manual canary rollout
    successMetric: Reduced cost per thousand tokens with no material drop in task success rate or latency SLO attainment
  - job: When finance or leadership asks why we are not moving to a cheaper inference vendor yet, help me generate credible rollout evidence so I can approve or reject the migration quickly.
    currentAlternative: Vendor benchmarks and spreadsheet analysis
    successMetric: Time to migration decision and percentage of migrations completed without incident
