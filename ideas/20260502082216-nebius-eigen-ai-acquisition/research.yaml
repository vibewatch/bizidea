- name: Helicone
  stage: scale-up
  wedge: LLM gateway and observability layer with experiments and usage-based monitoring.
  pricing: Pro $79/month; Team $799/month plus usage-based pricing.
  strength: Close to traffic flow, easy proxy insertion, and good fit for monitoring plus gateway controls.
  weaknessVsUs: More gateway/observability oriented than deep offline replay and rollout sign-off.
