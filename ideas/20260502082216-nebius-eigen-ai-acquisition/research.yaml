  validationPlan:
  - priority: high
    question: Do AI-platform leaders treat provider-switch validation as a standalone budget line or as a feature they expect inside existing observability/eval tools?
    evidenceToGather: 10-15 discovery calls with Heads of AI Platform / VP Eng plus redlined budgets or prior procurement docs from LangSmith/Braintrust/Langfuse-class tools.
  - priority: high
    question: 'How often do high-spend teams actually revisit provider decisions: quarterly, at model release, or only after incidents?'
    evidenceToGather: Calendar evidence from renewal cycles, benchmark review rituals, and post-incident retros tied to inference spend or quality regressions.
  - priority: medium
    question: Will buyers share production traces if default offering is VPC / redacted replay only?
    evidenceToGather: Security review calls, sample DPA objections, and willingness-to-run-pilot feedback from EU or regulated prospects.
  - priority: medium
    question: Can offline replay capture enough signal for stateful agent and tool-calling systems?
    evidenceToGather: Pilot benchmarks on 3-5 agentic workloads with pass/fail thresholds versus live canary outcomes.
  - priority: low
    question: 'Which channel shortens sales cycles most: cloud partners, AI infra consultants, or direct founder-led outbound?'
    evidenceToGather: Partner interviews and at least two co-sell experiments with AI infra consultants or cloud GTM contacts.
