competitors:
- name: Braintrust
  stage: scale-up
  wedge: Production AI observability and evaluation infrastructure with strong trace/eval workflows.
  pricing: Free tier; Pro $249/month plus usage; enterprise custom.
  strength: Strong enterprise proof and explicit production-regression workflows, including Dropbox case evidence.
