openQuestions:
- Will buyers approve a standalone rollout-control category, or insist this live inside an existing eval / observability vendor?
- How often do Series B+ AI product teams run provider-migration decisions with enough urgency to justify annual spend?
- Can the product capture enough signal for agentic, stateful, tool-heavy workflows without requiring overly invasive instrumentation?
- What minimum deployment model (SaaS, VPC, self-host) is required to unlock regulated or EU-based customers?
