- name: Langfuse
  stage: scale-up
  wedge: Open-source LLM engineering platform spanning tracing, prompts, evals, and self-hosting.
  pricing: Hobby free with 50k units; Core $29/month; enterprise/self-host options.
  strength: Open-source adoption, cross-cloud posture, and strong security/data-region story.
  weaknessVsUs: Instrumentation and experimentation are strong, but migration approval workflows still need assembly by the customer.
