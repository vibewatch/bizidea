modelDiagram:
  title: 单位经济性流转
  mermaid: "flowchart LR\n  OutboundAndPartners[创始人外呼 + 合作伙伴]\n  OutboundAndPartners --> PaidPilots[付费迁移试点]\n  PaidPilots --> Conversions[正式生产转化]\n  Conversions --> Revenue[订阅 + 重放费用收入]\n  Revenue --> GrossProfit[70% 到 74% 的毛利润]\n  GrossProfit --> Cash[跑道与现金生成]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情形收入由 Y1 的 5 个付费试点、Y2 的 17 个和 Y3 的 39 个驱动，这些试点以 55% 的转化率转为 $78k 到 $90k 的年度合同，并在 M36 达到 57 个活跃付费 logo。
- checkName: 必须做对
  finding: 价值实现时间必须接近 BP 中低于 14 天的目标，才能让试点转化率保持在 50% 以上，并让合作伙伴推荐在 Y2 开始形成复利。
- checkName: 模型会失效如果
  finding: 如果安全评审把销售周期推到 6 个月、转化率又降至 45%，下行情形中的现金低点将在下一轮融资前逼近归零。
- checkName: 下一轮证明
  finding: 一旦公司在 Q4Y2 前达到 10 到 15 个正式生产客户、支持 VPC 的部署、一个追踪集成，以及早期合作伙伴主导的可复用性，下一轮融资就具备了充分依据。
sanityChecks:
  ruleOf40: Y3 增长 190.6% + EBITDA 利润率 10.0% = 200.6%；纸面上非常强，但仍属早期阶段，且受益于较小的成本基数。
  burnMultiple: Y2 的 burn multiple 约为 0.5x，以 EBITDA burn 对比净新增退出 ARR 计算（~$736K burn / ~$1.40M 净新增 ARR），且公司在 Y3 转为 EBITDA 为正。
  revenuePerFte: 按退出时 11 名 FTE 计算，Y3 为 $325K（SaaS 基准为 $200–400K）。
  flags:
  - 基准情形按活跃付费 logo 计数，因此客户总数同时包含试点和年度正式生产合同。
  - 已确认的 Y3 收入低于研究中的 $4.5M SOM，因为许多 Y3 后期赢单主要贡献的是退出 ARR，而不是全年收入。
  - 现金流假设 EBITDA 近似等于现金变动；真实的企业计费与回款可能带来 1 到 2 个月的营运资金压力。
  - 毛利率改善取决于 VPC 和安全要求更高的部署继续作为高级加价项存在，而不是对大多数客户都变成默认项。
