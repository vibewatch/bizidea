scenarios:
  downside:
    description: 安全评审摩擦拖慢试点，转化率低于 BP 目标，伙伴渠道起量也比计划更晚。
    y3RevenueK: 2550.0
    y3EbitdaK: -420.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - 试点转生产转化率降到 45%。
      - 销售周期从 4 个月拉长到 6 个月。
      - 由于 VPC 变成标配，毛利率卡在 70%。
  base:
    description: 创始人主导的试点转化率稳定高于 50%，首位 AE 和伙伴渠道在 Y2 开始起作用，毛利率也会随着规模小幅改善。
    y3RevenueK: 3570.5
    y3EbitdaK: 355.5
    cashLowPointK: 494.1
    keyAssumptionChanges:
      - 试点转生产转化率维持在 55%。
      - 包含安全评审在内的销售周期平均为 4 个月。
      - 毛利率从 Y1 的 70% 提升到 Y3 的 74%。
  upside:
    description: 这个迁移切口通过顾问和云联合销售迅速打开，logo 数接近 SOM 节奏，但几乎不用再明显加人。
    y3RevenueK: 4480.0
    y3EbitdaK: 820.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - 试点转生产转化率升到 60%。
      - 重放量扩张把成熟 ACV 抬到约 $96k。
      - 伙伴渠道会把付费试点的生成时间提前 1 到 2 个季度。
