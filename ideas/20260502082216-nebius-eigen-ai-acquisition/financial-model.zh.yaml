assumptions:
  - id: A1
    name: 模型起始时点的初始现金
    value: "2000"
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M]；模型按 M1 完成一笔 $2.0M pre-seed 融资处理。"
  - id: A2
    name: 平均付费试点价格
    value: "30000"
    unit: USD
    source: "[BP gtm pricing $20k to $40k paid pilot]；取中位数。"
  - id: A3
    name: 试点收入确认周期
    value: "2"
    unit: months
    source: "[BP gtm wedge 2 to 4 weeks]，再结合初创财务常用做法，把交付与报告工作分 2 个月确认。"
  - id: A4
    name: 初始生产合同价值
    value: "78000"
    unit: USD per year
    source: "[BP pricing $60k to $120k annual platform subscription]；首年生产合同按偏保守的低中位数处理。"
  - id: A5
    name: 含回放用量费的成熟生产 ACV
    value: "90000"
    unit: USD per year
    source: "[BP revenue streams include usage-based replay fees]，以及 [BP market SOM assumes $75k average contract]；成熟客户在基础订阅之外会有扩容。"
  - id: A6
    name: 第 1 年付费试点启动数
    value: "5"
    unit: logos
    source: "[BP milestones 0–12 months close 3 to 5 paid migration pilots]；采用区间上沿。"
  - id: A7
    name: 第 2 年付费试点启动数
    value: "17"
    unit: logos
    source: "[BP milestones 12–24 months reach 10 to 15 production customers]；结合 A9 转化率和创始人 + 首位 AE 的产能推导。"
  - id: A8
    name: 第 3 年付费试点启动数
    value: "39"
    unit: logos
    source: "[BP channels add consultants and selective cloud co-sell after first wins]，以及 [research SOM 60 logos by year 3]；按合作伙伴助推规模化建模，而非纯外呼。"
  - id: A9
    name: 试点转生产转化率
    value: "55"
    unit: percent
    source: "[BP funnelTargets pilot→annual production 50%+]；基准情形采用 55%。"
  - id: A10
    name: 生产客户流失率
    value: "1.2"
    unit: percent per month
    source: "面向黏性较强的企业基础设施年合同，按常见初创财务假设建模；36 个月内约流失 3 个 logo。"
  - id: A11
    name: 毛利率爬坡
    value: "70% Y1, 72% Y2, 74% Y3"
    unit: percent
    source: "[BP businessModel targetGrossMarginPct 70]；随着回放基础设施利用率提升，加入适度规模效应。"
  - id: A12
    name: 招聘计划
    value: "M1 founder+core eng; M4 ML; M7 product eng; M10 security/solutions; M13 AE; M16 platform eng; M19 customer success; M25 AE2; M28 platform eng2; M31 security/solutions2"
    unit: timing
    source: "[BP team Month 0, Month 3, Month 6, Month 9 roles]，并在首批生产转化后按常见初创财务方法延展。"
  - id: A13
    name: 技术岗位总成本薪酬区间
    value: "$180k to $210k"
    unit: USD per FTE per year
    source: "基于美国早期 AI 基础设施公司招聘的常见初创财务假设。"
  - id: A14
    name: 创始人与 GTM 岗位总成本薪酬区间
    value: "Founder $150k; AE $190k OTE; customer success $150k"
    unit: USD per FTE per year
    source: "适用于 pre-seed 到 seed 阶段企业软件团队的常见初创财务假设。"
  - id: A15
    name: 非薪酬运营支出
    value: "R&D tools $4k/$6k/$8k per month; S&M programs $2k-$3k/$8k/$14k; G&A $7k-$8k/$10k/$12k"
    unit: USDK per month
    source: "基于精简 pre-seed 运营和企业法务/安全成本的常见初创财务假设。"
  - id: A16
    name: 客户数口径
    value: "Active paying logos including pilots and production; newCustomers equals new paid pilot starts"
    unit: definition
    source: "模型约定，因为第 1 年收入同时包含付费试点和年度订阅。"
  - id: A17
    name: 每个已转化生产客户的 CAC
    value: "55"
    unit: USDK
    source: "创始人主导的企业 AI 基础设施销售，叠加安全评审与试点交付，按常见初创财务假设建模。"
  - id: A18
    name: 基础销售周期
    value: "4"
    unit: months
    source: "[BP gtm discovery→pilot→production motion]，以及 [research security/governance requirements lengthen enterprise approvals]。"
  - id: A19
    name: 下一轮融资的里程碑
    value: "10 to 15 production customers, VPC-capable deployment, one trace integration, and two repeatable partner channels by Q4Y2 plus 6 months of buffer"
    unit: milestone
    source: "[BP milestones 12–24 months] 和 [BP fundingAsk runwayMonths 18]。"
  - id: A20
    name: 现金转换假设
    value: "EBITDA approximates cash movement"
    unit: modeling heuristic
    source: "常见初创财务假设；模型不纳入债务、资本开支、税项和显著营运资金波动。"
