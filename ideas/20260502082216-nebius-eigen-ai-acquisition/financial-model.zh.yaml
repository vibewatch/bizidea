scenarios:
  downside:
    description: 安全评审摩擦拖慢试点，转化率低于 BP 目标，且合作渠道爬坡晚于计划。
    y3RevenueK: 2550.0
    y3EbitdaK: -420.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - 试点到正式生产的转化率下降至 45%。
    - 平均销售周期从 4 个月拉长到 6 个月。
    - 由于 VPC 成为标配，毛利率停滞在 70%。
  base:
    description: 创始人主导的试点转化率高于 50%，首位 AE 与合作渠道在 Y2 开始产生生产力，毛利率随规模温和扩张。
    y3RevenueK: 3570.5
    y3EbitdaK: 355.5
    cashLowPointK: 494.1
    keyAssumptionChanges:
    - 试点到正式生产的转化率维持在 55%。
    - 销售周期平均为 4 个月，包含安全评审。
    - 毛利率从 Y1 的 70% 提升到 Y3 的 74%。
  upside:
    description: 借助顾问和云联合销售，迁移切入口快速获胜，使公司无需大幅增加人手就能达到接近 SOM 的 logo 数量。
    y3RevenueK: 4480.0
    y3EbitdaK: 820.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 试点到正式生产的转化率上升至 60%。
    - 重放量扩张将成熟 ACV 提升到约 $96k。
    - 合作渠道把付费试点的产生时间提前了 1 到 2 个季度。
