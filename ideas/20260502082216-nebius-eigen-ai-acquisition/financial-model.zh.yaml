    upsideCase: AE2 starts 1 quarter earlier after Q4Y2 proof
    y3RevenueImpactK: -320.0
    cashImpactK: -110.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      OutboundAndPartners[创始人外呼 + 伙伴渠道]
      OutboundAndPartners --> PaidPilots[付费迁移试点]
      PaidPilots --> Conversions[转为生产客户]
      Conversions --> Revenue[订阅 + 重放量收入]
      Revenue --> GrossProfit[70% 到 74% 的毛利]
      GrossProfit --> Cash[跑道与现金生成]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入，来自 Y1 的 5 个付费试点、Y2 的 17 个、Y3 的 39 个；这些试点按 55% 的转化率变成年合同，到 M36 时形成 57 个活跃付费 logo。
  - checkName: 必须跑顺的地方
    finding: time-to-value 必须接近 BP 里“14 天内出结果”的目标，这样试点转化率才能维持在 50% 以上，伙伴推荐也才能在 Y2 开始滚起来。
  - checkName: 模型会在哪儿断
    finding: 如果安全评审把销售周期拖到 6 个月，同时转化率掉到 45%，下行情景下的现金低点就会在下一轮融资前逼近归零。
  - checkName: 下一轮融资证明点
    finding: 只要公司在 Q4Y2 前做到 10 到 15 个生产客户、支持 VPC、接入一个 trace 来源，并证明伙伴渠道开始可重复，下一轮融资叙事就站得住。
sanityChecks:
  ruleOf40: Y3 增长 190.6% + EBITDA 利润率 10.0% = 200.6%；纸面上非常强，但仍属于早期公司，且成本基数较小。
  burnMultiple: Y2 的 burn multiple 约 0.5x，按 EBITDA burn 与净新增 exit ARR 粗算（约 $736K burn / 约 $1.40M net new ARR）；公司在 Y3 转为 EBITDA 为正。
  revenuePerFte: Y3 以 11 个期末 FTE 计，单 FTE 收入约 $325K（处于 SaaS 常见的 $200–400K 区间）。
  flags:
    - 基准情景按活跃付费 logo 口径计算，因此客户数同时包含试点客户和年合同客户。
    - 已确认的 Y3 收入低于研究里的 $4.5M SOM，因为很多 Y3 后期拿下的单子主要贡献的是 exit ARR，而不是完整年度收入。
    - 现金流假设 EBITDA 近似等于现金变动；现实里企业软件的开票和回款仍可能额外带来 1 到 2 个月的营运资金压力。
    - 毛利率改善的前提，是 VPC 和重安全部署仍然是高级增购，而不是大多数客户的默认配置。
