assumptions:
- id: A1
  name: 模型起始时现金余额
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M]；建模为 M1 完成一笔 $2.0M 的 pre-seed 交割。'
- id: A2
  name: 平均付费试点价格
  value: '30000'
  unit: USD
  source: '[BP gtm pricing $20k to $40k paid pilot]；采用中位数。'
- id: A3
  name: 试点收入确认周期
  value: '2'
  unit: months
  source: '[BP gtm wedge 2 to 4 weeks]，再叠加创业财务启发式，将部署/报告工作在 2 个月内确认。'
- id: A4
  name: 初始正式生产合同价值
  value: '78000'
  unit: USD per year
  source: '[BP pricing $60k to $120k annual platform subscription]；对首年正式生产合同采用保守的低中位值。'
- id: A5
  name: 包含重放量费用的成熟生产 ACV
  value: '90000'
  unit: USD per year
  source: '[BP revenue streams include usage-based replay fees] 与 [BP market SOM assumes $75k average contract]；成熟基准情形客户会在初始订阅之上继续扩容。'
- id: A6
  name: 第 1 年付费试点启动数
  value: '5'
  unit: logos
  source: '[BP milestones 0–12 months close 3 to 5 paid migration pilots]；采用里程碑区间上限。'
- id: A7
  name: 第 2 年付费试点启动数
  value: '17'
  unit: logos
  source: '[BP milestones 12–24 months reach 10 to 15 production customers]；结合 A9 转化率和创始人 + 首位 AE 产能推导。'
- id: A8
  name: 第 3 年付费试点启动数
  value: '39'
  unit: logos
  source: '[BP channels add consultants and selective cloud co-sell after first wins] 与 [research SOM 60 logos by year 3]；建模为合作伙伴辅助放量，而非纯外呼。'
- id: A9
  name: 试点到正式生产的转化率
  value: '55'
  unit: percent
  source: '[BP funnelTargets pilot→annual production 50%+]；基准情形采用 55%。'
- id: A10
  name: 正式生产流失率
  value: '1.2'
  unit: percent per month
  source: 基于年度合同销售的高粘性企业基础设施的创业财务启发式；建模为 36 个月内流失 3 个 logo。
- id: A11
  name: 毛利率爬坡
  value: 70% Y1, 72% Y2, 74% Y3
  unit: percent
  source: '[BP businessModel targetGrossMarginPct 70]；随着重放基础设施利用率提升，加入了温和的规模收益。'
- id: A12
  name: 招聘计划
  value: M1 创始人+核心工程; M4 ML; M7 产品工程; M10 安全/解决方案; M13 AE; M16 平台工程; M19 客户成功; M25 AE2; M28 平台工程2; M31 安全/解决方案2
  unit: timing
  source: '[BP team Month 0, Month 3, Month 6, Month 9 roles]，并在首次正式生产转化后按创业财务启发式向后延展。'
- id: A13
  name: 完全计入后的技术岗位薪酬区间
  value: $180k to $210k
  unit: USD per FTE per year
  source: 适用于美国早期 AI 基础设施招聘的创业财务启发式。
- id: A14
  name: 完全计入后的创始人与 GTM 薪酬区间
  value: Founder $150k; AE $190k OTE; customer success $150k
  unit: USD per FTE per year
  source: 适用于 pre-seed 到 seed 阶段企业软件团队的创业财务启发式。
- id: A15
  name: 非薪资运营支出
  value: R&D tools $4k/$6k/$8k per month; S&M programs $2k-$3k/$8k/$14k; G&A $7k-$8k/$10k/$12k
  unit: USDK per month
  source: 以精益 pre-seed 运营支出和企业法务/安全开销为锚的创业财务启发式。
- id: A16
  name: 客户数量口径
  value: 活跃付费 logo，包括试点和正式生产；newCustomers 等于新启动的付费试点数
  unit: definition
  source: 由于 Y1 收入混合了付费试点和年度订阅，因此需要明确这一建模口径。
- id: A17
  name: 单个转化后正式生产客户的 CAC
  value: '55'
  unit: USDK
  source: 适用于创始人主导的企业 AI 基础设施销售的创业财务启发式，包含安全评审与试点交付。
- id: A18
  name: 基础销售周期
  value: '4'
  unit: months
  source: '[BP gtm discovery→pilot→production motion] 与 [research security/governance requirements lengthen enterprise approvals]。'
- id: A19
  name: 下一轮融资的里程碑
  value: 到 Q4Y2 达到 10 to 15 production customers、支持 VPC 的部署、一个 trace integration，以及两条可复用合作渠道，并额外保留 6 个月缓冲
  unit: milestone
  source: '[BP milestones 12–24 months] 与 [BP fundingAsk runwayMonths 18]。'
- id: A20
  name: 现金转化
  value: EBITDA 近似等于现金变动
  unit: modeling heuristic
  source: 创业财务启发式；模型不包含债务、资本开支、税项以及显著的营运资金时序波动。
