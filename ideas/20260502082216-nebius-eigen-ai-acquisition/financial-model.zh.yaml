scenarios:
  downside:
    description: "安全审查摩擦拖慢试点，转化率低于 BP 目标，合作伙伴渠道也比计划更晚起量。"
    y3RevenueK: 2550.0
    y3EbitdaK: -420.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - 试点转生产转化率降到 45%。
      - 平均销售周期从 4 个月拉长到 6 个月。
      - 因为 VPC 成为标配，毛利率停在 70%。
  base:
    description: "创始人主导的试点保持 50% 以上转化率，首位 AE 和合作伙伴渠道在 Y2 开始见效，毛利率随规模小幅提升。"
    y3RevenueK: 3570.5
    y3EbitdaK: 355.5
    cashLowPointK: 494.1
    keyAssumptionChanges:
      - 试点转生产转化率稳定在 55%。
      - 包含安全评审在内的销售周期平均为 4 个月。
      - 毛利率从 Y1 的 70% 提升到 Y3 的 74%。
  upside:
    description: "借助顾问和云联合销售，迁移切口更快胜出，让公司在几乎不显著增加人手的情况下触达接近 SOM 的 logo 数。"
    y3RevenueK: 4480.0
    y3EbitdaK: 820.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - 试点转生产转化率提升到 60%。
      - 回放用量扩张把成熟 ACV 推升到约 $96k。
      - 合作伙伴渠道将付费试点创建提前 1 到 2 个季度。
sensitivity:
  - variable: ARPU
    downsideCase: "$72k initial ACV and $84k mature ACV"
    baseCase: "$78k initial ACV and $90k mature ACV"
    upsideCase: "$84k initial ACV and $96k mature ACV"
    y3RevenueImpactK: -510.0
    cashImpactK: -390.0
  - variable: CAC
    downsideCase: "$70k CAC because pilots require more founder and solutions time"
    baseCase: "$55k CAC"
    upsideCase: "$45k CAC after references and partner sourcing"
    y3RevenueImpactK: -260.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "2.0% monthly churn after first contract year"
    baseCase: "1.2% monthly churn"
    upsideCase: "0.8% monthly churn"
    y3RevenueImpactK: -280.0
    cashImpactK: -220.0
  - variable: sales cycle
    downsideCase: "6 months because security and procurement reviews drag"
    baseCase: "4 months"
    upsideCase: "3 months for consultant-led provider migrations"
    y3RevenueImpactK: -390.0
    cashImpactK: -300.0
  - variable: gross margin
    downsideCase: "70% because VPC becomes default"
    baseCase: "74%"
    upsideCase: "76%"
    y3RevenueImpactK: 0.0
    cashImpactK: -143.0
  - variable: hiring pace
    downsideCase: "AE2 and late-year engineering hires arrive 2 quarters late"
    baseCase: "Current staged hiring plan"
    upsideCase: "AE2 starts 1 quarter earlier after Q4Y2 proof"
    y3RevenueImpactK: -320.0
    cashImpactK: -110.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      OutboundAndPartners[创始人外呼 + 合作伙伴]
      OutboundAndPartners --> PaidPilots[付费迁移试点]
      PaidPilots --> Conversions[转化为生产合同]
      Conversions --> Revenue[订阅 + 回放费收入]
      Revenue --> GrossProfit[70% 到 74% 的毛利润]
      GrossProfit --> Cash[现金跑道与现金生成]
modelSanity:
  - checkName: 收入引擎
    finding: "基准情形的收入由 Y1 的 5 个付费试点、Y2 的 17 个和 Y3 的 39 个试点驱动；这些试点按 55% 转化率转为 $78k 到 $90k 的年度合同，并在 M36 达到 57 个活跃付费 logo。"
  - checkName: 必须成立的前提
    finding: "time-to-value 必须接近 BP 里低于 14 天的目标，这样试点转化率才能维持在 50% 以上，合作伙伴推荐也才能在 Y2 开始累积。"
  - checkName: 模型会在哪种情况下失效
    finding: "如果安全审查把销售周期拉长到 6 个月、转化率降到 45%，下行情形下的现金低点会在下一轮融资前逼近归零。"
  - checkName: 下一轮融资证明点
    finding: "一旦公司在 Q4Y2 前做到 10 到 15 个生产客户、支持 VPC 部署、完成一个轨迹集成，并建立早期合作伙伴复用能力，就足以支撑下一轮融资。"
sanityChecks:
  ruleOf40: "Y3 增长率 190.6% + EBITDA 利润率 10.0% = 200.6%；纸面上很强，但毕竟仍处于早期阶段，而且受益于较小的成本基数。"
  burnMultiple: "按 EBITDA burn 对比净新增 exit ARR 计算，Y2 burn multiple 约为 0.5x（~$736K burn / ~$1.40M net new ARR），公司在 Y3 转为 EBITDA 为正。"
  revenuePerFte: "按 11 个期末 FTE 计算，Y3 每名员工对应收入约 $325K（处在 SaaS 常见的 $200–400K 区间）。"
  flags:
    - "基准情形使用的是活跃付费 logo 口径，因此客户总数同时包含试点和年度生产客户。"
    - "由于很多 Y3 后半段赢下的新客户主要贡献的是 exit ARR 而不是完整年度收入，已确认的 Y3 收入低于研究中的 $4.5M SOM。"
    - "现金流假设 EBITDA 近似等于现金变动；现实中的企业账期和回款，可能再带来 1 到 2 个月的营运资金压力。"
    - "毛利率改善的前提是：VPC 与安全敏感部署仍然是高级增购项，而不是多数客户的默认要求。"
