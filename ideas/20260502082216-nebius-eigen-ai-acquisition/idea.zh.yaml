differentiator: 这不是一个通用 LLM eval 工具包，也不是另一个模型路由器。这个切入口是围绕真实生产追踪、业务任务阈值和迁移证据构建的提供商中立发布防火墙，工程、财务和安全团队都可以据此行动。其防御性来自不断增长的跨提供商数据集：不同工作负载类别在不同推理栈下如何回归，以及与客户上线工作流的深度集成。
