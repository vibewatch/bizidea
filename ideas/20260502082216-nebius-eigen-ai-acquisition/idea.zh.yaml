problem: AI 产品团队一直被要求把每 token 的推理成本压下来，但每次更换端点、量化栈或云厂商，都可能悄悄改变延迟、输出质量、工具调用行为和可用性。大多数团队至今仍依赖厂商基准测试、表格对比和脆弱的内部评测脚本，而这些东西都不会回放真实生产流量。结果就是：顺利时迁移也很慢，出问题时又很危险，毛利被悄悄侵蚀，客户侧回归问题却直接暴露出来。
targetUser:
  primary: 在 Series B+ B2B SaaS 公司负责客户侧 LLM 工作流、且每月推理开销可观的 AI 平台负责人
  secondary: 负责评测、上线安全和供应商对比的 ML 平台工程师
  buyer: VP Engineering 或 Head of AI Platform
startupThesis:
  nonObviousInsight: 随着推理云把优化人才与硬件供给垂直整合，端点性能会提升得更快，但变化也会更频繁，因此稀缺资产不再是原始算力接入，而是“切换供应商不会把生产打坏”的可信证据。
  beachhead: 目标切入的滩头市场，是拥有客服、销售辅助或文档代理类产品、每月 LLM 推理支出超过 $100k、且正积极测试替代型托管端点以提升毛利的 Series B+ B2B SaaS 团队
  wedge: 一个生产轨迹回放与发布闸门层，在流量切换前，按每个客户的真实提示词、工具调用、延迟预算和成本目标，对候选推理端点做基准对比
  whyNowCatalyst: Nebius 花 $643M 收购 Eigen AI，说明推理优化已成为战略控制点，因此买家需要独立的迁移证据，而不是继续相信静态的厂商说法。
  ventureScalePath: 先做端点变更前的上线防火墙，再扩展到持续路由策略、采购分析，以及跨供应商性能数据集，最终成为企业推理运维的事实记录系统。
solution: 产品会摄取抽样后的生产轨迹，对敏感数据做脱敏处理，再在影子环境中跨获批供应商或模型变体回放这些轨迹。系统按业务任务通过率、延迟、单位成本，以及工具调用损坏、格式漂移等失败模式给每个选项打分；未达到阈值前，发布就不能放行。团队会拿到一份签名迁移报告，供工程、财务和安全团队在把预算从一个推理供应商迁到另一个时使用。随着数据积累，平台还能在上线后监测实时回归，并根据观察到的工作负载匹配情况建议何时重新路由流量。
goToMarketSeed:
  firstCustomer: 第一位客户应是某家客服自动化 SaaS 公司的 AI 平台负责人；该公司每月运行数百万条支持辅助类提示词，并正在评估 Nebius、Together 或 Fireworks，以降低当前 API 成本
  buyingTrigger: 季度毛利复盘或供应商续约周期迫使团队测试更便宜或更快的推理端点，但又不能冒着让客户看见回归问题的风险
  currentAlternative: 内部评测框架，加上厂商基准表和手工金丝雀发布
  switchingReason: 这个切口基于买家自己的生产轨迹和发布阈值，因此比内部自建更快给出可信结论，也比供应商提供的基准更少偏见
  pricingHypothesis: 年度平台费，加上按回放 token 数或已评估端点迁移次数计费的用量收费
whyNow:
  - point: 推理服务商现在直接收购优化团队，这会加快端点迭代频率，也会让独立迁移测试更有价值。
    signalRefs: [推理优化已成为战略级并购方向]
    sourceRefs: [1, 2, 3]
  - point: 买家越来越多地采购“算力 + 服务软件”的一体化技术栈，因此随着云厂商垂直整合，性能特征也会更快变化。
    signalRefs: [云算力正在与服务软件打包出售]
    sourceRefs: [1, 4]
  - point: 公开基准榜单正成为销售动作的一部分，市场因此需要一层中立能力，在真实工作负载上验证这些说法。
    signalRefs: [基准榜单正在影响端点采购决策]
    sourceRefs: [1]
  - point: 就连被收购方都在强调现有客户连续性，这直接说明切换和整合风险已经进入高管视野。
    signalRefs: [技术栈切换期的连续性风险已经摆上台面]
    sourceRefs: [4]
differentiator: 这不是通用的 LLM 评测工具包，也不是又一个模型路由器。这个切口是一道供应商中立的发布防火墙，围绕真实生产轨迹、业务任务阈值，以及工程、财务和安全团队都能据此行动的迁移证据来设计。它的防御性来自不断增长的跨供应商数据集：不同类型工作负载在不同推理栈下会如何回归；再叠加对客户发布流程的深度嵌入，就不只是一个工具，而是流程基础设施。
conceptDiagram:
  title: 推理迁移防火墙
  mermaid: |
    flowchart LR
      Buyer[Head of AI Platform] --> Pain[端点切换会带来质量 延迟与成本回归风险]
      Pain --> Product[跨候选推理供应商回放生产轨迹]
      Product --> Outcome[在可证明提升毛利和 SLO 的前提下安全完成供应商迁移]
businessModelCanvas:
  customerSegments: [拥有客户侧 LLM 功能的 Series B+ B2B SaaS 公司, 运行六位数月度推理预算的 AI 产品团队]
  valuePropositions: [防止供应商切换时出现隐蔽回归, 在发布前基于真实工作负载证明成本和延迟收益, 为工程财务与安全审批建立可审计轨迹]
  channels: [创始人主导销售, AI 基础设施顾问与兼职平台负责人, 云迁移与 FinOps 合作伙伴]
  customerRelationships: [高触达式 onboarding, 联合迁移评审, 用于调优发布策略的技术成功管理]
  revenueStreams: [年度 SaaS 合同, 按回放量计费的费用, 高级 VPC 或本地部署]
  keyResources: [回放引擎, 评估策略库, 跨供应商性能数据集, 安全的轨迹脱敏流水线]
  keyActivities: [摄取轨迹, 运行基准回放, 维护供应商适配器, 产出迁移评分卡]
  keyPartners: [推理服务商, 可观测性平台, AI 平台咨询公司, 安全与合规集成商]
  costStructure: [回放所需云算力, 供应商适配器维护, 工程与 ML 评测人才, 客户成功]
jobsToBeDone:
  - job: 当团队被要求削减推理开支时，帮我在真实工作负载上比较新端点，让我能切换供应商而不把面向客户的 AI 功能搞坏。
    currentAlternative: 内部评测框架加手工金丝雀发布
    successMetric: 每千 token 成本下降，同时任务成功率或延迟 SLO 达成率没有明显下滑
  - job: 当财务或管理层追问我们为什么还没迁到更便宜的推理供应商时，帮我生成可信的上线证据，让我能快速批准或否决这次迁移。
    currentAlternative: 厂商基准和表格分析
    successMetric: 迁移决策耗时，以及无事故完成的迁移占比
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这个信号簇里既有大额战略收购，也有多家已验证来源，并且清楚显示推理性能已是现实的预算优先级。
  painIntensity:
    score: 4
    rationale: 毛利压力和宕机风险都是真实存在的，只是这类痛点最强烈地集中在已有显著生产推理规模的团队，而不是整个市场。
  wedgeClarity:
    score: 5
    rationale: 面向端点变更的生产轨迹回放与发布闸门，是一个边界清晰、触发条件明确、买家明确的第一款产品。
  defensibility:
    score: 4
    rationale: 专有的工作负载级回归数据和流程嵌入会持续累积优势，但前提是必须顶住平台方竞争，保持供应商中立。
  ventureScale:
    score: 4
    rationale: 这个滩头市场可以继续扩展到持续推理运维、路由、采购和基准分析，覆盖更广泛的 AI 产品公司。
topRisks:
  - name: 内部自建诱惑
    description: 能力成熟的 AI 团队可能会优先扩展自己的评测框架，而不是购买新平台。
    mitigation: 用更快的部署速度、现成的供应商适配器、可给财务看的评分卡，以及横跨工程、安全和采购的发布闸门能力取胜，而不只是比谁评测原始能力更强。
  - name: 供应商功能侵蚀
    description: 大型推理云可能会加入原生基准与迁移工具，压缩这个切口的空间。
    mitigation: 严格保持供应商中立，从第一天起支持多云对比，并成为客户横跨竞争供应商时使用的独立事实记录系统。
  - name: 敏感提示词访问
    description: 由于提示词和工具输出中可能含有专有或受监管数据，客户可能不愿共享生产轨迹。
    mitigation: 提供 VPC 部署、默认脱敏与哈希处理，以及策略控制，让客户只回放获批准的轨迹子集。
