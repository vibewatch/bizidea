problem: AI 产品团队都被逼着把每 token 推理成本打下来，但每换一个端点、量化栈或云厂商，都可能悄悄改掉延迟、输出质量、工具调用表现和可用性。大多数团队现在还是靠厂商 benchmark、表格对比和脆弱的内部 eval 脚本，这些东西根本不会重放真实生产流量。结果就是，顺利时迁移也很慢，出问题时又格外危险，最后毛利被一点点漏掉，客户侧回归也跟着冒出来。
targetUser:
  primary: Series B+、已经把面向客户的 LLM 工作流跑上线且月度推理支出可观的 B2B SaaS 公司里的 AI Platform 负责人
  secondary: 负责 eval、上线安全和供应商基准测试的 ML 平台工程师
  buyer: VP Engineering 或 AI Platform 负责人
startupThesis:
  nonObviousInsight: 随着推理云把优化人才和硬件供给一起垂直整合，端点性能会提升得更快，但变化也会更频繁。稀缺资产不再是原始算力接入，而是“换供应商也不会把生产打崩”的可信证据。
  beachhead: 已经有客服辅助、销售辅助或文档代理产品上线、每月在 LLM 推理上花费超过 $100k、并正积极测试其他托管端点以改善毛利的 Series B+ B2B SaaS 团队
  wedge: 一层生产 trace 重放与发布闸门，按每个客户自己的真实提示词、工具调用、延迟预算和成本目标去 benchmark 候选推理端点，再决定是否切流量
  whyNowCatalyst: Nebius 花 $643M 收购 Eigen AI，说明推理优化已经成了战略控制点，买方不能再只信厂商的静态说法，而需要独立的迁移证据。
  ventureScalePath: 先做端点变更前的上线防火墙，再扩到持续路由策略、采购分析，以及跨供应商性能数据集，最后成为企业推理运营的系统记录层。
solution: 产品会接入抽样后的生产 trace，先脱敏，再在影子环境里把这些请求重放到获批的供应商或模型变体上。系统按业务任务通过率、延迟、单位成本，以及工具调用失效、格式漂移等失败模式给每个方案打分；只要没过阈值，就直接拦住上线。团队还能拿到一份签名过的迁移报告，给工程、财务和安全团队一起做决策，决定是否把支出从一个推理供应商迁到另一个。时间一长，平台还可以在上线后继续盯回归，并根据实际工作负载的匹配度建议何时重新路由流量。
goToMarketSeed:
  firstCustomer: 一家客服自动化 SaaS 公司的 AI Platform 负责人；公司每月跑数百万条 support-assist 提示词，正在评估 Nebius、Together 或 Fireworks，以压低当前 API 开销
  buyingTrigger: 季度毛利复盘或供应商续约周期，逼着团队在不冒客户可见回归风险的前提下测试更便宜或更快的推理端点
  currentAlternative: 内部 eval harness，加上厂商 benchmark 表和手工 canary 发布
  switchingReason: 这套切口直接用买方自己的生产 trace 和上线阈值来做判断，因此比内部自建更快产出可信结论，也比厂商提供的 benchmark 偏差更小
  pricingHypothesis: 年度平台费，再叠加按重放 token 数或评估过的端点迁移次数计费
whyNow:
  - point: 推理服务商已经开始直接收购优化团队，这会加快端点更替，也会让独立迁移测试更值钱。
    signalRefs: [推理优化已成战略并购标的]
    sourceRefs: [1, 2, 3]
  - point: 买方越来越倾向采购“算力加服务软件”的一体化栈，随着云厂商垂直整合，性能特征也会更快变化。
    signalRefs: [云算力正与服务软件打包出售]
    sourceRefs: [1, 4]
  - point: 公开 benchmark 榜单已经成了销售动作的一部分，市场因此需要一层中立工具，用真实工作负载去验证这些说法。
    signalRefs: [基准榜单正在左右端点选型]
    sourceRefs: [1]
  - point: 连被收购方都在强调现有客户的连续性，这本身就说明切换和整合风险已经上升到了管理层视野。
    signalRefs: [技术栈切换时连续性风险已摆上台面]
    sourceRefs: [4]
differentiator: 这不是通用 LLM eval 工具包，也不是另一个模型路由器。真正的切口，是一层围绕真实生产 trace、业务阈值和迁移证据搭起来的中立发布防火墙，让工程、财务和安全团队都能据此行动。真正的防守力来自不断积累的跨供应商数据：不同工作负载在不同推理栈下会怎样退化；再加上深度嵌进客户自己的上线流程里。
conceptDiagram:
  title: 推理迁移防火墙
  mermaid: |
    flowchart LR
      Buyer[AI Platform 负责人] --> Pain[切换端点会带来质量、延迟和成本回归风险]
      Pain --> Product[把生产轨迹在候选推理服务商之间重放]
      Product --> Outcome[安全迁移供应商，并能证明毛利和 SLO 改善]
