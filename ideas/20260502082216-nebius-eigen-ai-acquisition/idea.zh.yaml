  customerSegments: [拥有面向客户 LLM 功能的 Series B+ B2B SaaS 公司, 每月推理预算达到六位数的 AI 产品团队]
  valuePropositions: [防止供应商切换时出现隐性回归, 在上线前用真实工作负载证明成本和延迟改善, 为工程、财务与安全审批留下一条可审计记录]
  channels: [创始人主导销售, AI infra 顾问与兼职平台负责人, 云迁移与 FinOps 合作伙伴]
  customerRelationships: [高触达导入, 共同复盘迁移方案, 针对上线策略调优的技术成功服务]
  revenueStreams: [年度 SaaS 合同, 按重放量计费, 高级 VPC 或本地部署]
  keyResources: [重放引擎, 评估策略库, 跨供应商性能数据集, 安全的 trace 脱敏流水线]
  keyActivities: [接入 trace, 运行 benchmark 重放, 维护供应商适配器, 产出迁移评分卡]
  keyPartners: [推理服务商, 可观测性平台, AI 平台咨询公司, 安全与合规集成商]
  costStructure: [重放所需云算力, 供应商适配器维护, 工程与 ML eval 人才, 客户成功]
jobsToBeDone:
  - job: 当团队被要求压低推理开销时，帮我在真实工作负载上比较新端点，好让我在不影响面向客户的 AI 功能时安全切换供应商。
    currentAlternative: 内部 eval harness 加手工 canary 发布
    successMetric: 每千 token 成本下降，同时任务成功率或延迟 SLO 达成率没有实质下滑
  - job: 当财务或管理层问我们为什么还没迁到更便宜的推理供应商时，帮我拿出可信的上线证据，让我能更快批准或否决这次迁移。
    currentAlternative: 厂商 benchmark 和表格分析
    successMetric: 迁移决策所需时间，以及无事故完成的迁移占比
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这一簇里既有大额战略收购，也有多家已验证来源，还明确显示推理性能已经成了活生生的预算优先级。
  painIntensity:
    score: 4
    rationale: 毛利压力和故障风险都是真的，但痛点最强的仍是那些已经有明显生产推理量的团队，而不是整个市场。
  wedgeClarity:
    score: 5
    rationale: 围绕端点变更做生产 trace 重放和发布闸门，是一个很窄但很清楚的首款产品，也对应了明确触发点和买方。
  defensibility:
    score: 4
    rationale: 专有的工作负载级回归数据和流程集成会越滚越厚，但要守住与平台方竞争时的中立性并不轻松。
  ventureScale:
    score: 4
    rationale: 从这个滩头市场出发，可以继续扩到持续性的推理运营、路由、采购和 benchmark，覆盖更广泛的 AI 产品公司。
topRisks:
  - name: 内部自建诱惑
    description: 成熟的 AI 团队可能会选择扩展自家的 eval harness，而不是再买一层新平台。
    mitigation: 用更快的接入速度、现成的供应商适配器、能给财务直接看的评分卡，以及横跨工程、安全和采购的发布闸门取胜，而不是只卖原始 eval 能力。
  - name: 供应商功能挤压
    description: 大型推理云可能会补上原生 benchmark 和迁移工具，把这个切口挤窄。
    mitigation: 从第一天就坚持多云和中立，对比多家供应商，并成为客户跨厂商使用的独立系统记录层。
  - name: 敏感提示词访问
    description: 客户可能不愿共享生产 trace，因为提示词和工具输出里往往有专有或受监管数据。
    mitigation: 提供 VPC 部署、默认脱敏与哈希，以及策略控制，让客户只重放获批的 trace 子集。
