  defensibility:
    score: 4
    rationale: 专有的工作负载级回归数据与工作流集成能够形成复利，但必须在平台竞争中保持提供商中立性。
  ventureScale:
    score: 4
    rationale: 滩头市场可以扩展为持续推理运营、路由、采购与基准评测，覆盖更广泛的 AI 产品公司。
topRisks:
- name: 自建诱惑
  description: 成熟的 AI 团队可能会选择扩展自己的 eval 工具链，而不是购买新平台。
  mitigation: 以更快的部署、提供商适配器、面向财务的评分卡，以及覆盖工程、安全和采购的发布闸门取胜，而不是只提供原始 eval。
- name: 提供商功能蚕食
  description: 大型推理云可能会加入原生基准和迁移工具，从而压缩切入口。
  mitigation: 严格保持提供商中立，从第一天支持多云对比，并成为客户跨竞争供应商使用的独立记录系统。
- name: 敏感提示词访问
  description: 客户可能不愿共享生产追踪，因为提示词和工具输出中可能包含专有或受监管数据。
  mitigation: 提供 VPC 部署、默认脱敏与哈希，以及策略控制，让客户仅重放已批准的追踪子集。
