jobsToBeDone:
- job: 当团队被要求削减推理支出时，帮助我基于真实工作负载比较新端点，这样我就能在不破坏面向客户 AI 功能的前提下切换提供商。
  currentAlternative: 内部 eval 工具链 + 手工金丝雀发布
  successMetric: 每千 token 成本下降，同时任务成功率或延迟 SLO 达成率没有明显下滑
- job: 当财务或管理层质疑我们为何还未迁移到更便宜的推理供应商时，帮助我生成可信的上线证据，以便我能快速批准或否决迁移。
  currentAlternative: 供应商基准与电子表格分析
  successMetric: 完成迁移决策所需时间，以及无事故完成的迁移占比
