slug: inference-regression-firewall
date: '2026-05-02'
executiveSummary: >-
  Inference Regression Firewall 是一款面向 Series B+ B2B SaaS 团队的中立上线控制产品。这些团队已经把面向客户的 LLM 工作负载跑上线，每月推理开支超过 $100k，同时又被迫在不牺牲质量和延迟的前提下压低成本。首版产品会把抽样后的生产 trace 在候选端点之间重放，按客户自定义的任务、延迟、工具调用和成本阈值判断通过或失败，只要没过线就拦住上线。第一单卖的是一项付费迁移准备度试点，通常挂在一次真实的供应商评估或毛利压力事件上，由 AI Platform 负责人牵头、VP Engineering 批预算。这个切口比通用 observability 更窄，因为买方并不是想再买一个 dashboard；他们要的是一份能拿去说服工程、财务、安全和采购团队的决定依据，之后才会把 spend 挪走。现在最强的成立理由，是云厂商正在把优化能力和硬件一起垂直整合，这会同时推高供应商切换频率和买方对独立证据的需求。最大的战略风险在于，成熟团队可能直接扩展现有 eval 栈，或者转头去买 Braintrust、LangSmith、Langfuse、Helicone、云厂商乃至内部平台团队的同类功能，而不是接受一个新类别。因此，这份计划在产品全面扩张之前只优先做三件事：从现有 trace 里快速起步、产出财务和安全团队都能签字的迁移报告、并且接入现有 tracing 工具，而不是逼客户整体替换流程。研究里的市场测算也支持这个聚焦切口：滩头 SAM 约 $80.0M，3 年 SOM 约 $4.5M。输入里没有给出创始人的不公平优势或现成 pipeline，因此下面的招聘节奏、漏斗目标和融资需求都只能算运营假设，必须在前 90 天里验证。
problem:
  - AI 产品团队的确可以靠更换供应商、模型变体、缓存策略或吞吐设置来压低推理成本，但这些改动也会悄悄拖垮任务成功率、延迟、工具调用表现和可用性。
  - 现在的替代方案——包括厂商 benchmark、表格和内部 eval harness——几乎都做不到把真实生产 trace 以工程、财务和安全都信服的方式重放出来，供上线决策使用。
solution:
  - 在流量切走之前，接入抽样后的生产 trace，对敏感字段做脱敏或哈希，再把获批工作负载在影子环境里重放到候选端点上。
  - 按客户自定义的业务任务成功率、延迟、成本、结构化输出和工具调用正确性阈值打出通过或失败结论，再生成签名过的迁移报告和发布闸门。
whyWeWin:
  - 产品围绕的是一个具体购买事件——供应商切换或续约决策——而不是去抢一整笔泛 observability 预算。
  - 在客户自己的 trace 上做中立重放，比厂商 benchmark 更可信；对大多数团队来说，也比内部自建更快落地。
  - 一旦积累起足够多、按工作负载切分的迁移结果，平台就能沉淀成专有的“哪类端点会在什么工作流里翻车”的知识库。
  - 脱敏、VPC 部署、审计日志和区域控制等安全能力，直接对准核心采纳障碍，而不是把合规当成以后再补的企业功能。
strategicChoices:
  beachhead: 已经把客服辅助、销售辅助或文档代理工作流跑上线、每月推理开支达到六位数、并正积极评估替代托管端点的 Series B+ B2B SaaS 公司。
  wedgeRationale: 只要眼前有一场待决的供应商切换，预算、紧迫感和可衡量的成功条件几周内就会同时出现；反过来，如果先卖泛 observability 或路由，就得先顶着 incumbent 工具去换栈，而且要在更长周期里证明价值。
  sequencingRationale: 公司必须先拿下“上线前决策”这一关，因为这里最需要独立证据；一旦客户开始拿它做迁移签字，后面就能沿着同一套 trace 语料和审批流程，顺势扩到上线后监控、路由策略和采购分析。
  notYet:
    - 通用 LLM observability dashboard。
    - 覆盖所有工作负载的持续跨供应商流量路由。
    - 面向低开支团队的 SMB 自助模式。
    - 训练或微调优化产品。
market:
  tam: 基于大约 8,000 个生产级 AI 采购团队、按 $30k 混合 ACV 估算，TAM 约为 $0.24B。
  sam: 面向大约 2,000 个高紧迫度、高开支且需要上线与安全控制的团队，SAM 约为 $80.0M。
  som: 按 60 个 logo、平均合同额 $75k 估算，第 3 年 SOM 约为 $4.5M。
  segments:
    - 主要客群：拥有面向客户 LLM 工作流、月度推理支出超过 $100k 的 Series B+ B2B SaaS AI 产品团队。
    - 次级客群：位于欧盟、受监管，或对安全高度敏感，需要 VPC 部署、脱敏和可审计迁移证据的 AI 产品团队。
  buyingProcess: 日常使用者通常是 ML 或平台工程师，但真正的经济买方多半是 VP Engineering 或 AI Platform 负责人，触发点可能是毛利复盘、供应商续约、新模型发布，或最近一次回归事故。由于生产 trace 里可能含有个人数据或受监管数据，安全与法务会很早介入，因此部署方式和数据处理方式会直接左右成交周期。
product:
  mvp: Version 1 需要支持安全的 trace 接入、脱敏、在少数高意向托管端点之间重放、通过/失败策略模板，以及一份能在 CI 或发布评审里直接卡闸的签名迁移报告。MVP 必须一次只把一个工作流做透，而不是一上来就想做全能型 agent observability 平台。
  sixMonth: 推出付费试点产品，先覆盖客服和文档代理工作负载的重放，提供延迟、任务成功率、结构化输出和工具调用阈值策略，并为安全敏感的共创客户提供可进 VPC 的部署形态。
  twelveMonth: 增加上线后回归监控，更深接入 incumbent tracing 与 eval 工具，并推出可复用的 benchmark 视图，用来比较不同工作负载类别的迁移结果，同时不暴露客户数据。
  twentyFourMonth: 从上线前防火墙扩成持续性的推理控制平面，提供路由建议、采购分析，以及一套沉淀供应商切换记录的历史系统。
  keyBets:
    - 在抽样 trace 上做离线重放，能足够准确地预测真实迁移结果，替代掉大部分手工 canary 工作。
    - 对高价值工作负载，客户愿意接受脱敏后的 SaaS 重放或 VPC 重放。
    - 从现有 trace 来源接入，会比要求客户从零重做埋点更快起量。
    - 第一年里，聚焦少数供应商和固定工作流模板，比追求全量端点覆盖更容易赢单。
gtm:
  wedge: 围绕一场正在发生的供应商决策，卖一项付费迁移准备度试点；用客户自己的 trace，在 2 到 4 周内给出一份 go or no-go 上线报告。
  channels:
    - 面向 100 到 150 家高开支 SaaS 目标客户，由创始人直接 outbound 给 AI Platform 负责人和 VP Engineering。
    - 已经在帮助客户压推理成本的 AI infra 顾问和兼职平台负责人。
    - 在拿到前 3 到 5 个成功的生产转化后，再谨慎开启云渠道和 marketplace 联合销售。
  funnelTargets: target account→discovery 8–12%，discovery→paid pilot 25–35%，pilot→annual production 50%+，production→12 个月内扩单 30%+
  pricing: 先卖一单 $20k 到 $40k 的付费试点，绑定一次真实迁移决策；随后转成 $60k 到 $120k 的年度平台订阅，再加按重放量计费。这个价位既贴着周边 AI 平台预算带，也能把“避免上线事故”和“量化后的迁移节省”一起锚进价值叙事里。
businessModel:
  revenueStreams:
    - 面向迁移防火墙工作流的年度平台订阅。
    - 按重放的生产 token 数或评估过的迁移次数计费。
    - 高级 VPC、私有区域或自托管部署与支持服务。
  unitOfValue: 绑定在一次获批迁移决策上的重放生产 token 数。
  targetGrossMarginPct: 70
  expansionLevers:
    - 让单个客户从一个客服或文档流程，扩到更多工作流。
    - 从上线前评估扩到持续性回归监控。
    - 出售更高安全级别的部署方案和区域控制。
    - 把跨供应商采购分析和路由建议变成增量收入。
strategyMap:
  northStarMetric: 在供应商切换真正上线前，由平台纳管的年化生产支出规模。
  inputMetrics:
    - 从接入 trace 到产出第一份迁移报告所需天数。
    - 付费试点转年度合同的转化率。
    - 报告成功拦下失败上线，或批准低成本迁移的比例。
    - 每个客户被覆盖到的生产工作流数量。
    - 采用 VPC 或脱敏 SaaS 部署启动的试点占比。
  moatsToBuild:
    - 基于真实迁移结果沉淀出来的跨供应商工作负载匹配数据集。
    - 把工程、财务和安全签字串在一起的嵌入式审批流程。
    - 针对工具调用和结构化输出边角问题的供应商适配器与策略模板。
    - 能显著降低 trace 共享阻力的安全与数据驻留能力。
  killCriteria:
    - 前 6 个月里，30 次合格 discovery 只换来不到 3 个付费试点。
    - 做完 6 个付费试点后，试点转生产的比例仍低于 40%。
    - 在至少 80% 的已测试迁移里，重放结果都无法预测 live canary 结果。
    - 超过一半的合格潜在客户拒绝任何 SaaS 或 VPC 的 trace 共享模式。
  mermaid: |
    flowchart LR
      Wedge[迁移准备度试点] --> MVP[Trace 重放与发布闸门]
      MVP --> Proof[签名上线报告与试点转化]
      Proof --> Expansion[监控、路由与采购分析]
investorMemo:
  verdict:
    call: 见面 / 继续深挖
    conviction: 切口很有希望，也确实踩在真实预算上，但能否成立，取决于它能否尽快证明自己能拿到独立预算，并在 build-vs-buy 上跑赢。
    whyBelieve: 这份计划盯住了一个非常具体的买方触发点——在这里，中立证据比泛 observability 更值钱；研究也表明，成本和性能波动都在加剧。
    whyDoubt: 赛道已经很挤，技术能力强的买方也可能更愿意继续用内部工具或相邻平台，除非产品能明显缩短决策时间、提高上线把握。
    nextDiligence: 至少验证出 3 个付费试点，而且这些客户都确实在做供应商切换，并能拿出可引用的证据：要么帮客户转成了一次迁移，要么拦住了一次糟糕上线。
  firstCustomer:
    title: Series B+ 客服自动化 SaaS 公司的 AI Platform 负责人
    profile: 公司每月跑数百万条 support-assist 提示词，毛利压力明显，且正在评估 Nebius、Together、Fireworks 或类似的托管推理端点。
    trigger: 季度毛利复盘、供应商续约，或一次新模型发布，逼着团队在不让客户感知到回归的前提下做切换。
    buyer: VP Engineering 或 AI Platform 负责人
    initialContract: 一次 $20k 到 $40k 的付费试点，绑定一项迁移决策；如果团队决定把这套发布闸门用到生产环境，就抵扣进一份 $60k 到 $120k 的年合同。
  mustBeTrue:
    - 至少有一半合格目标客户每年都会重新评估一次供应商选择。
    - AI Platform 负责人愿意为付费迁移试点批预算，而不是坚持把这个流程塞进现有 eval 或 observability 厂商里。
    - 对抽样后的生产 trace，大多数滩头客户都能接受脱敏 SaaS 或 VPC 部署。
    - 基于重放得出的通过/失败结论，和 live canary 的结果高度相关，足以成为可信的发布闸门。
    - 相比内部自建，这个产品能用 2 到 4 周的时间优势拿下第一批单子。
  diligenceQuestions:
    - 未来 2 个季度里，目标客户中到底有多少家正在做供应商切换、续约或推理成本复盘？
    - 客户到底因为什么安全顾虑不愿共享抽样后的生产 trace，VPC 部署是否足以化解这些阻碍？
    - 在目标客户里，哪一个 incumbent 工具已经掌握了 trace，创业公司能不能在不重做埋点的情况下接进去？
    - 试点有多大比例能揪出内部 eval 或厂商 benchmark 漏掉、并真正改变决策的问题？
    - 有多少试点涉及工具调用或高状态性的工作流，以至于离线重放可能低估失败？
  riskHeatmap:
    - risk: 买方拿不出独立预算，最终还是扩展内部或 incumbent eval 工具。
      likelihood: High
      impact: High
      leadingIndicator: Discovery 里大家都想看集成路线图，但转付费试点的比例始终低于 25%。
      mitigation: 把销售包装成一次真实的迁移决策，交付一份管理层能签字的报告，并接入现有 trace 系统，而不是逼客户整体换栈。
    - risk: 安全与隐私顾虑拦住了生产 trace 的访问。
      likelihood: Medium
      impact: High
      leadingIndicator: 超过一半的合格潜在客户必须要求自托管才能批准试点，或者在数据处理问题上卡死安全评审。
      mitigation: 从第一版开始就把脱敏、哈希、VPC 部署、区域控制、审计日志和删除工作流做齐。
    - risk: 对工具密集型或高状态 agent 工作流来说，重放结果不够可靠，闸门就没人信。
      likelihood: Medium
      impact: High
      leadingIndicator: 试点里的重放结果与 live canary 结果在超过 20% 的迁移上出现分歧。
      mitigation: 先从更窄的工作流模板起步，补足显式的工具调用和结构化输出检查；在没验证清楚之前，不要夸口说自己能覆盖全量多步 agent。
    - risk: 云平台和 observability 厂商把类似迁移功能打包进来。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 竞品评估里，客户越来越常把公司拿去和某个云厂商或 incumbent eval 套件内置的迁移报告做对比。
      mitigation: 守住中立立场，优先做多云证明，把自己做成审批流程的系统记录层，而不只是基准测试页面。
operatingAssumptions:
  - assumption: AI 平台或工程预算里，确实存在一位能为迁移准备度工具签字的预算 owner。
    basis: research.yaml
    validationTest: 做 10 到 15 次 discovery，并且在不把产品降级成别的平台附属功能的前提下，至少签下 3 个付费试点。
    decisionImpact: 如果这个假设不成立，公司就该改成集成层或 incumbent observability 栈里的模块，而不是独立产品。
  - assumption: 大多数滩头客户会接受“脱敏 SaaS 重放”或“VPC 部署”，而不是一上来就要求完整本地部署。
    basis: research.yaml
    validationTest: 跟踪前 8 个合格潜在客户的安全评审结果，测清默认部署方案能被多少家接受。
    decisionImpact: 如果不成立，路线图和招聘都要更早往自托管、企业安全和更长销售周期倾斜。
  - assumption: 第一条可重复跑通的工作流，是 support-assist 或文档代理迁移，而不是高度状态化的自治 agent。
    basis: idea.yaml
    validationTest: 在扩模板之前，先比较至少 5 次支持/文档工作流迁移测试里，重放结果与 live 结果的一致度。
    decisionImpact: 如果不成立，切口还得继续收窄，或者推迟更广泛的工作流主张，等在线评估能力补齐。
  - assumption: 接入现有 tracing 工具，能把 time-to-value 压到足以跑赢内部自建。
    basis: operator judgment
    validationTest: 统计前 5 个客户里，从签下试点到产出第一份可用迁移报告的中位时间，并把它压到 14 天以内。
    decisionImpact: 如果不成立，公司就得进一步收缩范围、补更多原生接入方式，或者接受成熟团队转化率下滑。
  - assumption: 在端点覆盖没铺全之前，先聚焦一小组供应商也能赢下早期单子。
    basis: operator judgment
    validationTest: 跟踪前 20 次销售沟通里，有多少合格客户是因为不支持目标供应商而被挡在门外。
    decisionImpact: 如果不成立，工程资源就得优先投向适配器覆盖，而不是监控、路由等扩张功能。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 围绕正在发生的供应商切换项目，做 15 次客户访谈。
    hypothesis: AI Platform 负责人会把供应商迁移描述成一个关系到毛利和稳定性的管理层问题，而不只是工程琐事。
    successMetric: 15 次访谈里，至少 8 次确认过去 12 个月做过供应商评估，且至少 5 家同意评估付费试点。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 用客户导出的 trace 和手工重放，先做 concierge 式迁移报告。
    hypothesis: 即便完整自助产品还没搭完，高触达报告服务也足够先拿下第一批试点。
    successMetric: 签下 2 个付费试点，并在 4 周内交付报告。
    owner: 创始人/CEO 与创始工程师
  - horizon: 0–90 天
    experiment: 针对 5 个目标客户，做一次关于脱敏、VPC 和审计日志要求的安全设计评审。
    hypothesis: 只要架构支持 VPC，且 trace 流默认脱敏，就足以通过多数滩头客户的首轮安全筛查。
    successMetric: 5 家里至少 3 家认为这些控制足够启动试点。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 把一个 incumbent trace 来源和一个 CI 或发布工作流做成产品化集成。
    hypothesis: 只要把接入时间压到 2 周以内，试点成交率和试点转生产率都会明显改善。
    successMetric: 3 个试点里的“从签约到第一份迁移报告”中位时间低于 14 天。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 在工具调用工作负载上，把重放结果和 live canary 结果做对照验证。
    hypothesis: 对目标工作流来说，重放在大多数情况下都能正确预测迁移通过或失败。
    successMetric: 10 次迁移测试里，重放结论与 live canary 结果的一致率至少 80%。
    owner: ML 工程师
  - horizon: 6–12 个月
    experiment: 和 AI infra 顾问或云 GTM 联系人一起跑 2 个联合销售试点。
    hypothesis: 只要公司已经有可引用的成功案例，伙伴渠道就能缩短销售周期。
    successMetric: 至少拿到 1 个伙伴带来的付费试点，而且转化率不低于创始人直销。
    owner: 创始人/CEO
  - horizon: 6–12 个月
    experiment: 对从试点转成年合同的客户，上线发布后监控功能。
    hypothesis: 只要客户已经在上线前用过这套产品，他们就愿意继续把它留在栈里做回归监控，并扩到更多工作流。
    successMetric: 至少 2 个转化客户在 6 个月内开启上线后监控，并扩大合同范围。
    owner: 产品工程师
operations:
  - 建立安全的 trace 接入流水线，默认支持字段级脱敏、哈希、删除控制和客户自定义保留策略。
  - 建立供应商适配器维护流程，每周对已支持端点做回归测试。
  - 为不同工作流准备延迟、成本、任务成功率、结构化输出和工具调用检查策略库。
  - 准备一套安全评审作战手册，覆盖 DPA、区域选择、VPC 部署和审计日志导出。
  - 与共创客户保持固定节奏，定期做迁移复盘并记录上线结果。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 必须亲自负责 discovery、试点销售、迁移报告交付，以及跨工程、财务和安全三方的买方叙事。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责搭建 trace 接入、重放编排、供应商适配器和首批发布闸门集成。
  - role: ML 工程师
    startTiming: Month 3
    rationale: 负责评估方法、按工作负载定制的通过/失败逻辑，以及工具密集型工作流上的重放与 live 对照验证。
  - role: 产品工程师
    startTiming: Month 6
    rationale: 把高触达 onboarding 变成可重复的集成、报告流程和管理控制台能力。
  - role: 安全与解决方案工程师
    startTiming: Month 9
    rationale: 通过处理 VPC 部署、安全评审和客户定制数据要求，缩短企业试点周期。
milestones:
  - horizon: 0–12 个月
    items:
      - 在滩头市场里签下 3 到 5 个付费迁移试点。
      - 至少把 2 个试点转成年度生产合同。
      - 支持一组聚焦的供应商，以及一个 incumbent trace 集成。
      - 证明目标工作流上的重放与 live 一致率超过 80%。
      - 交付支持 VPC 的部署形态和可审计的迁移报告。
  - horizon: 12–24 个月
    items:
      - 达到 10 到 15 个生产客户，并在早期客户里实现多工作流扩张。
      - 推出上线后回归监控和 benchmark 视图。
      - 至少建立 2 条可重复的伙伴渠道，来自顾问或云联合销售。
      - 基于迁移结果沉淀一套可复用、匿名化的工作负载匹配数据集。
  - horizon: 24–36 个月
    items:
      - 达到约 60 个 logo，并触及研究里测算的 $4.5M SOM 目标。
      - 从迁移防火墙扩到路由建议和采购分析。
      - 在目标客户里成为供应商切换审批的系统记录层。
risks:
  - risk: build-vs-buy 仍比预期更强，买方继续偏向 incumbent 或内部工具。
    likelihood: High
    impact: High
    mitigation: 把销售牢牢钉在正在发生的供应商决策上，交付 incumbent 没有的报告，并接入现有 trace 系统，而不是正面硬碰硬做全功能 observability 套件。
  - risk: 安全、隐私和数据驻留要求拖慢或直接卡死试点。
    likelihood: Medium
    impact: High
    mitigation: 在大规模 outbound 之前，先把脱敏、VPC 部署、区域控制、审计日志和删除工作流做出来。
  - risk: 对 agentic 或工具密集型工作负载来说，重放信号不够，闸门可信度下降。
    likelihood: Medium
    impact: High
    mitigation: 先从更窄的工作流模板起步，和 live canary 对齐验证，证据够了再扩。
  - risk: 云平台和 AI observability 厂商会把类似迁移功能直接打包进去。
    likelihood: Medium
    impact: Medium
    mitigation: 用中立立场、审批工作流和跨供应商历史证据去拉开差异，而不是拼通用 dashboard 或单一供应商 benchmark。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 用这笔钱养一支 4 到 5 人团队，拿下前 3 到 5 个付费试点，做出安全重放和发布闸门的核心能力，交付支持 VPC 的部署形态，并把早期迁移项目转成可重复的年合同。
