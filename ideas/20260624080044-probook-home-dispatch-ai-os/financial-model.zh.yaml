scenarios:
  downside:
    description: "试点转化率停滞于约 40%，第二枢纽扩张滑期两个季度，实际定价压缩至每月约 $55/技师。"
    y3RevenueK: 1550.0
    y3EbitdaK: -890.0
    cashLowPointK: -80.0
    keyAssumptionChanges:
      - "前 3 个付费试点中仅 1 个按时转化，Y2 Logo 新增推迟。"
      - "退出 ARPU 稳定在每运营商约 $110K 年化，而非 $120K。"
      - "毛利率退出约 70%，因部署持续偏服务密集型。"
  base:
    description: "前 3 个试点中 2 个在第 12 个月前转化，生产运营商 Y2 Q4 达到 12 家、Y3 Q4 达到 24 家，退出定价维持在约 $60/技师基准。"
    y3RevenueK: 2263.0
    y3EbitdaK: -312.6
    cashLowPointK: 513.4
    keyAssumptionChanges:
      - "Y1 签署 3 个付费试点，2 个在第 12 个月前转为正式生产。"
      - "Y2 Q4 跨两套现有现场服务环境达到 10–12 家生产运营商。"
      - "退出定价达到每运营商约 $120K 年化，即第 3 年约 $60/技师。"
  upside:
    description: "试点转化率约达 70%，一半生产账户在九个月内增加第二枢纽，自动化套餐将定价提升至约 $65/技师。"
    y3RevenueK: 2730.0
    y3EbitdaK: 70.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
      - "合作伙伴来源的合同提前到来，Y3 Q4 末付费运营商约 27 家，而非 24 家。"
      - "现有客户内扩张加快，混合年化 ARPU 超过 $125K。"
      - "更清洁的门店数据使毛利率退出超过 75%，无需大幅增加人手。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "退出定价稳定在约 $55/技师/月（每运营商约 $110K 年化）。"
    baseCase: "退出定价达到约 $60/技师/月（每运营商约 $120K 年化）。"
    upsideCase: "自动化套餐将退出定价提升至约 $65/技师/月（每运营商约 $130K 年化）。"
    y3RevenueImpactK: -190.0
    cashImpactK: -150.0
  - variable: "CAC"
    downsideCase: "完全加载的 CAC 升至约 $69K，因为创始人主导外拓和推荐转化低于计划。"
    baseCase: "CAC 为 $55.1K，基于 Y2–Y3 S&M 支出除以 21 家净新增运营商。"
    upsideCase: "合作伙伴效能将 CAC 降至约 $45K。"
    y3RevenueImpactK: -120.0
    cashImpactK: -290.0
  - variable: "churn"
    downsideCase: "随着运营商等待现有厂商模块，月度 Logo 流失率升至 4.0%。"
    baseCase: "月度 Logo 流失率维持在 2.0%。"
    upsideCase: "工作流嵌入后月度 Logo 流失率改善至 1.5%。"
    y3RevenueImpactK: -110.0
    cashImpactK: -90.0
  - variable: "sales cycle"
    downsideCase: "试点转为正式生产约需 6 个月，扩张滑期一个季度。"
    baseCase: "首枢纽到第二枢纽铺开在 40%+ 的生产账户中于约 9 个月内完成。"
    upsideCase: "试点一个季度内转化，一半账户 9 个月内增加第二枢纽。"
    y3RevenueImpactK: -280.0
    cashImpactK: -320.0
  - variable: "gross margin"
    downsideCase: "Y3 混合毛利率停滞在约 68%，因部署持续偏服务密集型。"
    baseCase: "Y3 混合毛利率达到 73.5%，稳态单位经济约 72%。"
    upsideCase: "随着数据规范化变得可重复，Y3 混合毛利率超过 75%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: "hiring pace"
    downsideCase: "第二位销售和第四位工程师在收入支撑之前提前两个季度入职。"
    baseCase: "基准招聘计划遵循 M11/M16/M20/M27/M29/M31 时间表。"
    upsideCase: "后续招聘仅在 Y2 Q3 和 Y3 Q2 转化检查点达成后增加。"
    y3RevenueImpactK: 0.0
    cashImpactK: -230.0
modelDiagram:
  title: "集中调度收入循环"
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionOperators
      ProductionOperators --> TechniciansCovered
      TechniciansCovered --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景收入来自将 3 个 Y1 付费试点转化为 Y2 Q4 12 家、Y3 Q4 24 家付费运营商，稳态年化 ARPU 约 $120K。"
  - checkName: "必须做对的事"
    finding: "部署必须足够产品化，使解决方案工作不会将毛利率拖低至 70% 以下，同时试点转化率保持在 60% 以上。"
  - checkName: "模型崩溃条件"
    finding: "若定价压缩至每月约 $55/技师或扩张滑期一个季度，悲观情景将在 Y3 结束前耗尽现金。"
  - checkName: "下轮融资证明"
    finding: "种子轮案例最强的节点是两套现有 FSM 环境支持 10–12 家生产运营商，且首枢纽到第二枢纽铺开可重复。"
sanityChecks:
  ruleOf40: "Y3 增长率 150% + EBITDA 利润率 -14% = 136%（因收入基数仍小而偏高）。"
  burnMultiple: "净烧钱倍数从 Y2 约 0.8x 改善至 Y3 约 0.2x（基于退出 ARR 增长）。"
  revenuePerFte: "$206K Y3——以 Y3 Q4 11 名全职员工测算（SaaS 基准约 $200–400K）。"
  flags:
    - "基准情景仍依赖运营商在 Probook、ServiceTitan 或其他在位企业填补功能差距之前选择供应商中立的覆盖层。"
    - "毛利率直到 Y2 末才完全达到计划目标，偏服务密集型的入驻模式将增加融资需求。"
    - "仅靠两名 GTM 招聘在 Y3 Q4 达到 24 家付费运营商，需要合作伙伴渠道和落地扩张按计划运转。"
    - "Y2 期间客户集中度依然显著，因为当只有 10–12 家运营商上线时，延迟的企业铺开会实质性地影响季度收入。"
