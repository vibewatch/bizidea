slug: "service-board-recovery-os"
date: "2026-06-24"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-06-24] 运营模型从商业计划书日期后的第一个完整月份开始。"
  - id: A2
    name: "初始现金 / Pre-seed 融资额"
    value: "$2.4M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] 模型采用偏低中值的 pre-seed 融资额，因为 Y1 GTM 仍由创始人主导，产品保持纯覆盖层形态。"
  - id: A3
    name: "起始付费客户数"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months + BP experimentRoadmap] 公司从零收入起步，需先将共创客户转为付费试点。"
  - id: A4
    name: "客户定义"
    value: "一个活跃付费运营商账户，无论仍处于付费试点阶段还是已在集中调度枢纽上正式生产。"
    unit: "definition"
    source: "[BP gtm.wedge + BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract] 落地动作是一个付费运营商账户，首先绑定一个枢纽，之后跨门店扩张。"
  - id: A5
    name: "付费试点定价"
    value: "约 3 个月 $20K（每月确认约 $6.5K–$7.0K）。"
    unit: "USD/account"
    source: "[BP gtm.pricing $15k-$30k pilot + BP investorMemo.firstCustomer.initialContract] 模型采用保守低中值试点费，避免高估 Y1 收入。"
  - id: A6
    name: "正式生产定价基准"
    value: "每月每技师 $60 基准定价。"
    unit: "USD/tech/month"
    source: "[BP gtm.pricing $50-$60 per tech/month + Research market.som and bottomUpSizingDrivers annual price proxy] 生产定价沿用研究的市场基准，而非假设高于在位企业的溢价。"
  - id: A7
    name: "退出技师覆盖数"
    value: "Y3 Q4 约 24 家运营商覆盖约 4,000 名技师，每家约 167 名技师。"
    unit: "techs and operators"
    source: "[BP milestones 24-36 months + BP market.som + Research market.som] 基准情景落在 20–30 家运营商、4,000 名技师的第 3 年 SOM 目标内。"
  - id: A8
    name: "客户爬坡节奏"
    value: "第 12 个月 3 家付费运营商，Y2 Q4 12 家，Y3 Q4 24 家，前 3 个试点中 2 个在第 12 个月前转为正式生产。"
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets] 爬坡遵循计划目标：Y1 3 个付费试点，Y2 10–15 家生产运营商，Y3 20–30 家。"
  - id: A9
    name: "每付费运营商月均混合收入爬坡"
    value: "试点密集月份约 $6.5K，Y1 末约 $7.6K，Y2 末约 $9.4K，Y3 末约 $10.0K。"
    unit: "USD/customer/month"
    source: "[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing + Research willingnessToPay] ARPU 随试点转化、第二枢纽铺开和自动化套餐在现有运营商内附加而提升。"
  - id: A10
    name: "毛利率爬坡"
    value: "Y1 混合约 60%，Y2 68%，Y3 73%–74%。"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on data normalization and compliance] 早期试点因入驻和支持拖累，在连接路径和门店操作手册可重复之前毛利承压。"
  - id: A11
    name: "招聘时间线"
    value: "M1 创始人和创始工程师；M4 解决方案工程师；M7 应用运营负责人；M10 合作伙伴负责人；M11 第二位工程师；M16 第三位工程师；M20 G&A；M27 第二位解决方案工程师；M29 第二位 GTM；M31 第四位工程师。"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘在 Y2 前以集成为优先，仅在试点转化得到证明后才增加更广泛的 GTM 产能。"
  - id: A12
    name: "创始人含税现金薪酬"
    value: "$150K"
    unit: "USD/FTE/year"
    source: "初创财务经验值，适用于 pre-seed 精简创始人薪资，与商业计划书团队从第一天起由创始人主导销售和共创客户工作保持一致。"
  - id: A13
    name: "工程含税现金薪酬"
    value: "$185K"
    unit: "USD/FTE/year"
    source: "初创财务经验值，适用于构建商业计划书产品和团队章节所要求的实时工单摄取、排序和回写控制的美国集成与应用 AI 工程师。"
  - id: A14
    name: "解决方案工程含税现金薪酬"
    value: "$145K"
    unit: "USD/FTE/year"
    source: "初创财务经验值，适用于部署密集型解决方案人才，与商业计划书将该角色定位为数据规范化和铺开压缩保持一致。"
  - id: A15
    name: "应用运营含税现金薪酬"
    value: "$140K"
    unit: "USD/FTE/year"
    source: "初创财务经验值，适用于将覆盖转化为门店策略和信任指标的运营产品混合角色，如商业计划书团队所述。"
  - id: A16
    name: "销售/合作伙伴含税现金薪酬"
    value: "$170K"
    unit: "USD/FTE/year"
    source: "[BP gtm.channels + BP team Partnerships lead] 初创财务经验值，包含企业和渠道销售的底薪、浮动薪酬和差旅费。"
  - id: A17
    name: "G&A 含税现金薪酬"
    value: "$110K"
    unit: "USD/FTE/year"
    source: "初创财务经验值，适用于客户数量上升后精简的财务、供应商管理、法务协调和保险支持。"
  - id: A18
    name: "薪酬分配至损益科目"
    value: "创始人 70% S&M、30% G&A；解决方案 50% S&M、50% R&D；工程 100% R&D；应用运营 70% R&D、30% G&A；销售 100% S&M；G&A 100% G&A。"
    unit: "allocation"
    source: "[BP team rationales + BP operations] 职能拆分遵循计划中对销售、部署、产品化和后台支持责任的划定。"
  - id: A19
    name: "非薪酬运营预算爬坡"
    value: "月度非薪酬支出从 Y1 早期 S&M/R&D/G&A 各 $5K/$4K/$5K，增长至 Y3 末 $15K/$10K/$9K。"
    unit: "USD/month"
    source: "[BP operations + BP fundingAsk useOfFundsSummary + startup-finance heuristic] 覆盖云服务、法务、合规工具、差旅、保险和市场/集成支持，不含大型付费需求引擎。"
  - id: A20
    name: "现金转换约定"
    value: "现金变动等于 EBITDA。"
    unit: "formula"
    source: "初创财务经验值，适用于资产轻型软件公司，pre-seed 阶段不单独建模资本支出、税款、债务偿还和营运资金时序。"
  - id: A21
    name: "稳态客户流失率（单位经济模型用）"
    value: "月度 Logo 流失率 2.0%。"
    unit: "percent per month"
    source: "[BP risks + Research sensitivityCases and openQuestions] 工作流嵌入后合同应具黏性，但现有厂商捆绑和信任风险支持保守的早期阶段流失假设。"
  - id: A22
    name: "CAC 约定"
    value: "$55.1K，基于 Y2–Y3 销售及营销支出除以 21 家净新增付费运营商。"
    unit: "USD/customer"
    source: "[Model calc + BP gtm.funnelTargets + BP channels] 创始人主导的外拓、合作伙伴推荐和试点差旅是早期获客成本的主要构成，直到渠道效能提升。"
  - id: A23
    name: "下轮融资里程碑"
    value: "在 Y2 Q4 前跨两套现有 FSM 环境达到 10–12 家生产运营商，并在 Y3 Q2 前保留约 6 个月现金。"
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk useOfFundsSummary + model cash curve] pre-seed 规模旨在达到可重复部署证明，并在不立即需要过桥的情况下进入种子轮融资。"
