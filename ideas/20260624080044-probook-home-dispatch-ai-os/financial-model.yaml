slug: "service-board-recovery-os"
date: "2026-06-24"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-06-24] the operating model starts in the first full month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed ask"
    value: "$2.4M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] the model uses a lower-midpoint pre-seed raise because GTM remains founder-led through Y1 and the product stays overlay-only."
  - id: A3
    name: "Starting paying customers"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months + BP experimentRoadmap] the company starts pre-revenue and must first convert design partners into paid pilots."
  - id: A4
    name: "Customer definition"
    value: "One active paying operator account, whether still in paid pilot or already in production on a centralized dispatch hub."
    unit: "definition"
    source: "[BP gtm.wedge + BP businessModel.unitOfValue + BP investorMemo.firstCustomer.initialContract] the land motion is a paying operator account tied first to one hub and later expanded across branches."
  - id: A5
    name: "Paid pilot pricing"
    value: "$20K over roughly 3 months (~$6.5K-$7.0K recognized per month)."
    unit: "USD/account"
    source: "[BP gtm.pricing $15k-$30k pilot + BP investorMemo.firstCustomer.initialContract] the model uses a conservative low-midpoint pilot fee to avoid overstating Y1 revenue."
  - id: A6
    name: "Production pricing anchor"
    value: "$60 per technician per month benchmark."
    unit: "USD/tech/month"
    source: "[BP gtm.pricing $50-$60 per tech/month + Research market.som and bottomUpSizingDrivers annual price proxy] production pricing stays at the researched market benchmark rather than assuming a premium over incumbents."
  - id: A7
    name: "Exit technician coverage"
    value: "~4,000 technicians across 24 operators by Q4Y3, or ~167 technicians per operator."
    unit: "techs and operators"
    source: "[BP milestones 24-36 months + BP market.som + Research market.som] the base case lands inside the stated 20-30 operator / 4,000 technician year-3 SOM path."
  - id: A8
    name: "Customer ramp"
    value: "3 paying operators by M12, 12 by Q4Y2, and 24 by Q4Y3, with 2 of the first 3 pilots converted to production by M12."
    unit: "customersEop"
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets] the ramp follows the plan target of 3 paid pilots in Y1, 10-15 production operators by Y2, and 20-30 operators by Y3."
  - id: A9
    name: "Blended monthly revenue per paying operator ramp"
    value: "Pilot-heavy months at ~$6.5K, exiting Y1 at ~$7.6K, exiting Y2 at ~$9.4K, and exiting Y3 at ~$10.0K."
    unit: "USD/customer/month"
    source: "[BP investorMemo.firstCustomer.initialContract + BP gtm.pricing + Research willingnessToPay] ARPU rises as pilots convert, second hubs roll out, and the automation tier attaches inside existing operators."
  - id: A10
    name: "Gross margin ramp"
    value: "About 60% blended in Y1, 68% in Y2, and 73%-74% in Y3."
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on data normalization and compliance] early pilots carry onboarding and support drag before connector paths and branch playbooks become repeatable."
  - id: A11
    name: "Hiring timeline"
    value: "M1 founder and founding engineer; M4 solutions engineer; M7 applied ops lead; M10 partnerships lead; M11 second engineer; M16 third engineer; M20 G&A hire; M27 second solutions engineer; M29 second GTM hire; M31 fourth engineer."
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays integration-first through Y2 and only adds broader GTM capacity after pilot-to-production proof exists."
  - id: A12
    name: "Founder loaded cash compensation"
    value: "$150K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for a lean pre-seed founder salary, consistent with BP team showing founder-led sales and design-partner work from day one."
  - id: A13
    name: "Engineering loaded cash compensation"
    value: "$185K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for U.S. integration and applied-AI engineers building live-board ingest, ranking, and write-back controls called for in BP product and team sections."
  - id: A14
    name: "Solutions engineering loaded cash compensation"
    value: "$145K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for deployment-heavy solutions talent, consistent with BP team assigning this role to data normalization and rollout compression."
  - id: A15
    name: "Applied ops loaded cash compensation"
    value: "$140K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for an operator-product hybrid who turns overrides into branch policies and trust metrics, as described in BP team."
  - id: A16
    name: "Sales / partnerships loaded cash compensation"
    value: "$170K"
    unit: "USD/FTE/year"
    source: "[BP gtm.channels + BP team Partnerships lead] startup-finance heuristic includes base pay, variable compensation, and travel for enterprise and channel selling."
  - id: A17
    name: "G&A loaded cash compensation"
    value: "$110K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for lean finance, vendor management, legal coordination, and insurance support once customer count rises."
  - id: A18
    name: "Payroll allocation to P&L lines"
    value: "Founder 70% S&M and 30% G&A; solutions 50% S&M and 50% R&D; engineering 100% R&D; applied ops 70% R&D and 30% G&A; sales 100% S&M; G&A 100% G&A."
    unit: "allocation"
    source: "[BP team rationales + BP operations] the functional split follows who owns selling, deployment, productization, and back-office support in the plan."
  - id: A19
    name: "Non-payroll operating budget ramp"
    value: "Monthly non-payroll spend rises from S&M/R&D/G&A of $5K/$4K/$5K in early Y1 to $15K/$10K/$9K by late Y3."
    unit: "USD/month"
    source: "[BP operations + BP fundingAsk useOfFundsSummary + startup-finance heuristic] this covers cloud, legal, compliance tooling, travel, insurance, and marketplace/integration support without a large paid-demand engine."
  - id: A20
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA."
    unit: "formula"
    source: "Startup-finance heuristic for an asset-light software company where capex, taxes, debt service, and working-capital timing are not modeled separately at pre-seed scale."
  - id: A21
    name: "Steady-state churn for unit economics"
    value: "2.0% monthly logo churn."
    unit: "percent per month"
    source: "[BP risks + Research sensitivityCases and openQuestions] contracts should be sticky once workflows are embedded, but incumbent bundling and trust risk justify a conservative early-stage churn assumption."
  - id: A22
    name: "CAC convention"
    value: "$55.1K using Y2-Y3 sales and marketing spend divided by 21 net new paying operators."
    unit: "USD/customer"
    source: "[Model calc + BP gtm.funnelTargets + BP channels] founder-led outbound, partner referrals, and pilot travel dominate early acquisition cost until channel leverage improves."
  - id: A23
    name: "Funding milestone for next round sizing"
    value: "Reach 10-12 production operators across two incumbent FSM environments by Q4Y2 and preserve about 6 months of cash through Q2Y3."
    unit: "milestone"
    source: "[BP milestones 12-24 months + BP fundingAsk useOfFundsSummary + model cash curve] the pre-seed is sized to reach repeatable deployment proof and enter the seed raise without an immediate bridge."
