scenarios:
  downside:
    description: "Pilot conversion stalls near 40%, second-hub expansions slip by two quarters, and realized pricing compresses toward $55 per technician per month."
    y3RevenueK: 1550.0
    y3EbitdaK: -890.0
    cashLowPointK: -80.0
    keyAssumptionChanges:
      - "Only 1 of the first 3 paid pilots converts on time, so Y2 logo additions land later."
      - "Exit ARPU settles near $110K annual per operator instead of $120K."
      - "Gross margin exits near 70% because deployments stay more service-heavy."
  base:
    description: "Two of the first three pilots convert by M12, production operators reach 12 by Q4Y2 and 24 by Q4Y3, and exit pricing stays near the $60 per tech benchmark."
    y3RevenueK: 2263.0
    y3EbitdaK: -312.6
    cashLowPointK: 513.4
    keyAssumptionChanges:
      - "Three paid pilots are signed in Y1 and two convert to production by M12."
      - "Q4Y2 reaches 10-12 production operators across two incumbent field-service environments."
      - "Exit pricing reaches roughly $120K annual per operator, or about $60 per technician per month on the year-3 footprint."
  upside:
    description: "Pilot conversion reaches about 70%, half of production accounts add a second hub within nine months, and the automation tier lifts pricing toward $65 per technician per month."
    y3RevenueK: 2730.0
    y3EbitdaK: 70.0
    cashLowPointK: 650.0
    keyAssumptionChanges:
      - "Partner-sourced deals arrive earlier, so Q4Y3 ends around 27 paying operators instead of 24."
      - "Expansion inside existing logos is faster, which raises blended annual ARPU above $125K."
      - "Cleaner branch data lets gross margin exit above 75% with little extra headcount."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Exit pricing settles near $55 per tech/month (~$110K annual per operator)."
    baseCase: "Exit pricing reaches roughly $60 per tech/month (~$120K annual per operator)."
    upsideCase: "Automation tier lifts exit pricing near $65 per tech/month (~$130K annual per operator)."
    y3RevenueImpactK: -190.0
    cashImpactK: -150.0
  - variable: "CAC"
    downsideCase: "Fully loaded CAC rises to about $69K because founder-led outbound and referrals convert worse than plan."
    baseCase: "CAC is $55.1K using Y2-Y3 S&M spend per 21 net new operators."
    upsideCase: "Partner leverage lowers CAC toward $45K."
    y3RevenueImpactK: -120.0
    cashImpactK: -290.0
  - variable: "churn"
    downsideCase: "Monthly logo churn reaches 4.0% as operators wait for incumbent modules."
    baseCase: "Monthly logo churn stays at 2.0%."
    upsideCase: "Monthly logo churn improves to 1.5% once workflows are embedded."
    y3RevenueImpactK: -110.0
    cashImpactK: -90.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production conversion takes about 6 months and expansion slips one quarter."
    baseCase: "First-hub-to-second-hub rollout occurs within about 9 months in 40%+ of production accounts."
    upsideCase: "Pilots convert in one quarter and half of accounts add a second hub inside 9 months."
    y3RevenueImpactK: -280.0
    cashImpactK: -320.0
  - variable: "gross margin"
    downsideCase: "Y3 blended gross margin stalls near 68% because deployments stay service-heavy."
    baseCase: "Y3 blended gross margin reaches 73.5% and steady-state unit economics sit near 72%."
    upsideCase: "Y3 blended gross margin clears 75% as data normalization becomes repeatable."
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: "hiring pace"
    downsideCase: "A second seller and the fourth engineer are hired two quarters early before revenue supports them."
    baseCase: "The base hire plan follows the M11/M16/M20/M27/M29/M31 schedule."
    upsideCase: "Later hires are added only after Q3Y2 and Q2Y3 conversion checkpoints are met."
    y3RevenueImpactK: 0.0
    cashImpactK: -230.0
modelDiagram:
  title: "centralized dispatch revenue loop"
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionOperators
      ProductionOperators --> TechniciansCovered
      TechniciansCovered --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from turning 3 Y1 paid pilots into 12 paying operators by Q4Y2 and 24 by Q4Y3 at roughly $120K steady-state annual ARPU."
  - checkName: "Must go right"
    finding: "Deployments must stay productized enough that solutions work does not drag gross margin below 70% while pilot-to-production conversion stays above 60%."
  - checkName: "Model breaks if"
    finding: "If pricing compresses toward $55 per tech per month or expansion slips by a quarter, the downside case runs out of cash before Y3 ends."
  - checkName: "Next-round proof"
    finding: "The seed case is strongest once two incumbent FSM environments support 10-12 production operators and first-hub-to-second-hub rollouts are repeatable."
sanityChecks:
  ruleOf40: "Y3 growth 150% + EBITDA margin -14% = 136% (inflated by a still-small revenue base)."
  burnMultiple: "Net burn multiple improves from about 0.8x in Y2 to about 0.2x in Y3 on exit-ARR growth."
  revenuePerFte: "$206K Y3 using Q4Y3 headcount of 11 FTE (benchmark roughly $200–400K SaaS)."
  flags:
    - "The base case still depends on operators choosing a vendor-neutral overlay before Probook, ServiceTitan, or other incumbents close the feature gap."
    - "Gross margin does not fully clear the plan target until late Y2, so a services-heavy onboarding motion would increase the funding need."
    - "Reaching 24 paying operators by Q4Y3 with only two GTM hires requires partner channels and land-and-expand execution to work on schedule."
    - "Customer concentration remains meaningful through Y2 because a delayed enterprise rollout can move quarterly revenue materially when only 10-12 operators are live."
