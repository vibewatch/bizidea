slug: service-board-recovery-os
date: "2026-06-24"
executiveSummary: >-
  Service-board recovery OS targets regional HVAC, plumbing, and electrical
  consolidators whose centralized dispatch teams lose same-day capacity when
  installs overrun, technicians call out, or urgent jobs land midday. The
  beachhead is 8-20 branch operators in the Southeast and Sun Belt with
  80-300 technicians and both service and install calendars, because they have
  enough density and exception volume to prove ROI quickly. The initial product
  is an overlay on incumbent field-service software, not a rip-and-replace
  suite: it watches the live board, ranks recovery moves, and sends compliant
  customer updates after dispatcher approval. The GTM system starts with
  founder-led sales to a VP Service Operations or COO during peak season,
  branch centralization, or post-roll-up standardization, using a paid pilot
  that converts to per-technician annual software once recovered appointments
  and dispatcher leverage are proven. Research supports the pain, buyer
  readiness, and budget benchmarks, but it does not yet prove the key
  assumption that large operators will buy a vendor-neutral recovery layer
  instead of waiting for ServiceTitan, Probook, or other incumbents to extend
  native modules. The first proof point is straightforward: show on 60-90 days
  of board data that the product recovers same-day revenue and earns dispatcher
  trust faster than manual reshuffling. The plan deliberately avoids full
  dispatch replacement, single-shop SMBs, and adjacent trades until one
  centralized dispatch hub can deploy in weeks, convert to production, and
  expand across brands. If the company cannot show reliable write-back, more
  than 50% pilot-to-production conversion, and measurable recovered jobs
  without custom-services sprawl, the venture case weakens materially.
problem:
  - Centralized dispatch teams at 8-20 branch HVAC, plumbing, and electrical operators lose same-day revenue when installs overrun, technicians call out, or emergency jobs land and incumbent boards do not recover the schedule automatically.
  - Operators still solve exceptions with spreadsheets, phone trees, and branch tribal knowledge, which drives missed appointments, inconsistent customer communication, and pressure to add dispatcher headcount.
solution:
  - Overlay the incumbent field-service stack, ingest live jobs, technician skills, routes, customer threads, and branch rules, and rank recovery moves by recovered revenue, SLA risk, and customer impact.
  - Start with dispatcher-approved recommendations and templated customer updates, then auto-execute low-risk reassignments only after each branch's overrides and compliance rules are learned.
whyWeWin:
  - We attack a narrow, budget-linked trigger—same-day board recovery—so buyers can pilot without ripping out their system of record or funding a full dispatch replacement.
  - Branch-specific override data, technician-fit learning, communication-response history, and cross-stack write-back reliability create a workflow moat that generic routing or contact-center AI tools do not.
strategicChoices:
  beachhead: Southeastern and Sun Belt HVAC, plumbing, and electrical consolidators with 8-20 branches, 80-300 technicians, centralized dispatch, and mixed service plus install calendars.
  wedgeRationale: This slice has dense route networks, frequent same-day breakage, and executive owners for margin and dispatcher leverage, so a recovery overlay can prove value faster than selling a broad home-services OS.
  sequencingRationale: Start with assist-mode recovery on one centralized dispatch hub because trust, data cleanup, and write-back safety matter more than full automation; once one hub shows recovered appointments and clean deployment, expand across brands, then add deeper orchestration and adjacent scheduling modules.
  notYet:
    - Single-shop contractors and very small fleets where exception volume is too low to justify an overlay.
    - Full field-service management replacement, payroll, and lead-generation workflows that dilute the recovery wedge.
    - Adjacent trades such as garage doors, pest control, roofing, and restoration before residential HVAC, plumbing, and electrical hubs expand repeatably.
market:
  tam: Estimated $0.4B ARR equivalent from roughly 618K dispatch-relevant HVAC, plumbing, and electrical technicians at about $60 per technician per month.
  sam: Estimated $62.2M ARR equivalent from roughly 86.4K technicians inside about 7.2K multi-branch beachhead branches.
  som: Estimated $2.9M year-3 ARR from about 4,000 technicians across 20-30 regional operators before channel scale.
  segments:
    - 8-20 branch residential and light-commercial HVAC, plumbing, and electrical operators with centralized dispatch.
    - PE-backed regional home-service platforms standardizing dispatch across acquired branches and brands.
  buyingProcess: >-
    The business case is usually built by the dispatch director or VP Service
    Operations using recovered appointments and technician-to-dispatcher
    leverage, then reviewed by the COO or operations-systems owner because
    write-back reliability and customer messaging risk matter. Deals should
    close around a peak-season pilot on one centralized hub with an agreed
    scorecard for recovered jobs, acceptance rate, and deployment speed.
product:
  mvp: >-
    MVP covers one incumbent board plus one browser-overlay path, detects
    overruns, callouts, and emergency inserts, and recommends reassignments,
    slot recovery, and customer updates using technician skill, route, branch
    rules, and live context. It deliberately excludes full schedule creation,
    payroll, inventory, and pure lead-gen automation.
  sixMonth: Ship peak-season assist mode with override logging, ROI reporting, and compliant customer-message templates for one incumbent field-service stack.
  twelveMonth: Add reliable write-back into two major field-service environments, low-risk auto-execution thresholds, and cross-branch capacity views for multi-market operators.
  twentyFourMonth: Expand from same-day recovery into broader dispatch orchestration, install scheduling, and maintenance-plan routing within the same residential trades footprint.
  keyBets:
    - Same-day disruptions contain enough recoverable revenue to justify new software budget.
    - A vendor-neutral overlay deploys faster than waiting for incumbent modules or running a rip-and-replace project.
    - Dispatcher override data improves recommendation quality branch by branch and creates reusable playbooks.
    - Compliance guardrails can be embedded without reducing automation to a read-only dashboard.
gtm:
  wedge: Sell a paid recovery pilot for one centralized dispatch hub during peak season or immediately after branch centralization, then expand only after the hub shows recovered same-day appointments and cleaner dispatcher span of control.
  channels:
    - Founder-led outbound to VP Service Operations, COO, and dispatch directors at PE-backed or regional multi-branch operators.
    - Referrals from PE operating partners and home-services consultants already driving branch standardization programs.
    - Marketplace and integration-led entry through incumbent field-service software ecosystems for buyers that refuse rip-and-replace projects.
  funnelTargets: "Lead->qualified pilot 20-30%, qualified pilot->paid pilot 40-50%, paid pilot->production 60%+, first hub->second hub rollout within 9 months in 40%+ of production accounts."
  pricing: >-
    Start with a $15k-$30k paid pilot for one dispatch hub, then convert to an
    annual subscription priced per active technician with a branch minimum and
    optional automation tier; the working assumption is roughly $50-$60 per
    technician per month because buyers already budget adjacent software that
    way, but the exact level must be validated against recovered same-day
    revenue and dispatcher leverage.
businessModel:
  revenueStreams:
    - Annual subscription priced per active technician with a centralized-dispatch minimum.
    - One-time rollout and data-normalization fee for new branches or acquired brands.
    - Premium automation and customer-communication module for compliant low-risk auto-execution.
  unitOfValue: Active technician under a centralized dispatch board, sold with a minimum per dispatch hub.
  targetGrossMarginPct: 70
  expansionLevers:
    - Roll from one dispatch hub to all branches, brands, or acquired tuck-ins inside the same platform.
    - Expand from assist mode into low-risk auto-execution and customer-communication automation.
    - Add install scheduling, maintenance-plan routing, and adjacent residential service trades after the beachhead is proven.
strategyMap:
  northStarMetric: Recovered same-day appointments per live centralized dispatch hub without added dispatcher headcount.
  inputMetrics:
    - Qualified pilot to paid pilot conversion rate.
    - Paid pilot to production conversion rate.
    - Dispatcher acceptance rate for recommended recovery moves.
    - Median time from disruption detection to approved board update.
    - Net expansion from first hub to additional branches within each account.
  moatsToBuild:
    - Branch-specific exception-policy library covering skills, overtime, customer promises, and routing thresholds.
    - Override and outcome dataset linking suggested moves, dispatcher edits, ticket results, and customer responses.
    - Reliable cross-stack write-back and rollback controls that operators trust during peak season.
  killCriteria:
    - If the first 3 backtests do not show enough recoverable same-day appointments to create a credible pilot ROI case, narrow the market or abandon the wedge.
    - If dispatcher acceptance stays below 60% after 30 days in assist mode across 2 pilots, the trust model is too weak for automation.
    - If fewer than 2 of the first 4 paid pilots convert to production above $75k annualized value within 6 months, buyers do not value the overlay enough versus native tools.
    - If board write-back or automated customer-message failure exceeds 1% in production trials, the integration and compliance burden is too high.
  mermaid: |
    flowchart LR
      Wedge[Centralized dispatch recovery wedge] --> MVP[Assist-mode recovery overlay]
      MVP --> Proof[Recovered appointments and dispatcher trust]
      Proof --> Expansion[Multi-branch rollout plus broader orchestration]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong problem timing and a clear first buyer make this investable to diligence, but conviction depends on proving vendor-neutral demand before incumbents close the gap.
    whyBelieve: Multi-branch operators already reorganize around AI dispatch, and same-day exception recovery is a measurable pain tied directly to revenue, utilization, and dispatcher leverage.
    whyDoubt: Probook and ServiceTitan already sit close to the board, so a standalone overlay wins only if it deploys faster and produces better day-of outcomes than native modules.
    nextDiligence: Get 8-10 target operators to share board data or enter a paid pilot and verify that one centralized hub can show recovered appointments, recommendation acceptance, and production-grade write-back inside one peak season.
  firstCustomer:
    title: VP Service Operations at a 10-branch Southeastern HVAC, plumbing, and electrical consolidator
    profile: A residential home-services platform with 120-250 technicians, centralized dispatch, mixed service and install calendars, and an incumbent field-service system that still relies on manual exception handling.
    trigger: Peak-season volume, new branch tuck-ins, or a recent dispatch centralization creates daily overruns, callouts, and emergency inserts that swamp the board.
    buyer: VP Service Operations
    initialContract: $15k-$30k paid pilot for one centralized dispatch hub converting to roughly $75k-$150k annual software once the hub proves recovered same-day jobs and reduced dispatcher load, then expanding by branch and brand.
  mustBeTrue:
    - Multi-branch home-service operators experience enough daily board breakage that recovered same-day capacity is a funded KPI, not just a dispatcher annoyance.
    - Buyers running ServiceTitan, FieldEdge, or mixed stacks will still trial a vendor-neutral overlay instead of waiting for native modules.
    - One dispatch hub can deploy in under 30 days with limited data cleanup and show measurable recovered appointments within a single peak season.
    - Dispatcher acceptance and override learning improve quickly enough to support low-risk automation after assist mode.
    - Early accounts expand from one hub to multi-branch rollouts before suites or AI-first incumbents compress pricing.
  diligenceQuestions:
    - What percentage of daily overruns, callouts, and emergency inserts create recoverable same-day revenue rather than unavoidable deferrals?
    - How often do large ServiceTitan or Probook customers reject third-party write-back into the live board?
    - Which KPI actually releases budget first: recovered appointments, technician-to-dispatcher ratio, or ticket quality?
    - What minimum data cleanliness for technician skills, status codes, and durations is needed to beat senior dispatchers?
    - Can the first pilot deploy during peak season in under 30 days without turning into a custom integration project?
operatingAssumptions:
  - assumption: Large operators will buy a vendor-neutral recovery overlay before incumbent suites deliver equivalent native exception handling.
    basis: research.yaml
    validationTest: Win at least 4 paid pilots from operators already running an incumbent FSM system and confirm they did not choose a native module instead.
    decisionImpact: If false, partner deeply with one incumbent ecosystem or abandon the standalone overlay thesis.
  - assumption: Same-day disruptions create enough recoverable appointments and revenue to support per-technician pricing at the proposed operator scale.
    basis: research.yaml
    validationTest: Backtest 60-90 days of board events across 3 design partners and show a repeatable ROI case tied to recovered jobs or avoided idle time.
    decisionImpact: If false, reposition toward communication-first slot recovery or narrow to a higher-chaos ICP.
  - assumption: Branch data can be normalized quickly enough that the first deployment is a product rollout, not a services project.
    basis: operator judgment
    validationTest: Complete the first 3 deployments with less than 2 engineer-weeks of custom mapping each and more than 90% usable coverage on skill tags and status codes.
    decisionImpact: If false, tighten the ICP to cleaner operators or price implementation as a deliberate services line.
  - assumption: Dispatchers will trust assist-mode recommendations before the company asks them to permit automation.
    basis: idea.yaml
    validationTest: Achieve at least 60% recommendation acceptance within 30 days in 2 pilots and log declining override rates over time.
    decisionImpact: If false, the product remains analytics-only and loses the leverage needed for premium pricing.
  - assumption: Compliance constraints can be embedded in the workflow without eliminating the value of automated customer messaging or reassignment.
    basis: research.yaml
    validationTest: Pass legal and operator review in the first pilot for consent handling, opt-out enforcement, overtime rules, and certification-aware assignment logic.
    decisionImpact: If false, keep customer messaging and final reassignment as human-triggered steps and narrow the automation claim.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview 25 centralized dispatch leaders and collect board exports from 3 design-partner operators in the Southeast or Sun Belt.
    hypothesis: The target ICP sees enough same-day breakage that one hub can justify a recovery pilot without changing its system of record.
    successMetric: 10+ qualified prospects and 3 signed data-sharing design partners with named buying trigger.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Backtest 60-90 days of overruns, callouts, and emergency inserts to quantify recovered appointments, idle time saved, and dispatcher overrides.
    hypothesis: Recoverable opportunities are frequent enough to support per-technician pricing and a paid pilot.
    successMetric: 3 backtests showing a credible ROI case and a pilot scorecard accepted by the buyer.
    owner: Founder CEO and Founding eng
  - horizon: 0-90 days
    experiment: Build a read-first board overlay for one incumbent FSM environment plus compliant message templates.
    hypothesis: The first deployment can surface ranked recovery actions inside 30 days without fragile direct write-back.
    successMetric: One design partner using live assist mode on a centralized hub within 30 days of kickoff.
    owner: Founding eng
  - horizon: 3-6 months
    experiment: Run 3 paid pilots in assist mode during peak season or immediately after dispatch centralization.
    hypothesis: Dispatchers will accept more than half of recommended recovery moves when the system explains revenue, SLA, and customer tradeoffs.
    successMetric: 3 paid pilots signed and more than 60% recommendation acceptance in at least 2 of them.
    owner: Founder CEO
  - horizon: 6-12 months
    experiment: Launch low-risk auto-execution and reliable write-back for approved move types on the first 2 production accounts.
    hypothesis: Automation can operate safely on tightly bounded cases without causing compliance or customer-communication failures.
    successMetric: 2 production accounts with less than 1% write-back or message failure on auto-executed moves.
    owner: Founding eng
  - horizon: 6-12 months
    experiment: Recruit incumbent-marketplace, PE-ops, and home-services advisor partners that can source or accelerate rollouts.
    hypothesis: Partner channels reduce sales friction and speed multi-branch expansion after the first hub is proven.
    successMetric: 3 signed partners and 2 partner-influenced pilots by month 12.
    owner: Partnerships lead
operations:
  - Standardize onboarding on a small set of fields first, including status codes, technician skills, route data, branch rules, and customer-consent flags.
  - Keep the first product vendor-neutral with read-first monitoring, explicit approval thresholds, and rollback for every board write-back action.
  - Run weekly ROI and override reviews with the dispatch director and VP Service Operations to turn pilot outcomes into reusable branch playbooks.
  - Use incumbent marketplaces, integration partners, and communications-compliance tooling instead of rebuilding every adjacent workflow in-house.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own design-partner sales, ROI packaging, and PE or operator relationships because the first deals require founder credibility and fast learning loops.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build live-board ingest, recovery ranking, dispatcher workflow, and safe write-back controls for the first pilots.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Normalize branch data, shorten deployment time, and protect core engineering from services sprawl.
  - role: Applied ops lead
    startTiming: Month 6
    rationale: Turn overrides and outcomes into branch-specific policies, trust metrics, and rollout templates.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Convert PE-ops, consultant, and incumbent-ecosystem relationships into repeatable pilot flow once the first hub is proven.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 6-8 design partners in the Southeast or Sun Belt and complete 3 backtests on real board data.
      - Launch 3 paid pilots on centralized dispatch hubs and convert at least 2 to production.
      - Prove one repeatable deployment path into an incumbent field-service system plus a safe overlay workflow that reaches first value in 30 days.
      - Show more than 60% recommendation acceptance and a credible recovered-appointments ROI case without adding dispatcher headcount.
  - horizon: 12-24 months
    items:
      - Support two major field-service environments with bounded auto-execution and compliant customer messaging.
      - Expand inside early accounts across brands, branches, or tuck-ins and reach 10-15 production operators.
      - Establish PE-ops, consultant, and marketplace channels as a meaningful source of qualified pilots.
      - Add install scheduling and cross-branch capacity views only after the recovery wedge remains the primary sales story.
  - horizon: 24-36 months
    items:
      - Reach roughly 4,000 technicians across 20-30 operators, consistent with the researched year-3 SOM.
      - Expand from same-day recovery into broader dispatch orchestration and maintenance-plan routing for the same trades.
      - Enter adjacent residential service verticals only after multi-branch rollout economics and pilot-to-production conversion remain strong in HVAC, plumbing, and electrical.
risks:
  - risk: ServiceTitan, Probook, or another incumbent bundles equivalent exception recovery before the company earns distribution and data advantage.
    likelihood: High
    impact: High
    mitigation: Win on vendor-neutral deployment speed, cross-stack coverage, and branch-specific recovery playbooks before broader suites close the gap.
  - risk: Dirty branch data, weak technician tags, or inconsistent status codes delay time-to-value.
    likelihood: High
    impact: High
    mitigation: Constrain the first workflow, standardize a small required field set, and reject accounts that turn onboarding into a data-cleanup project.
  - risk: Dispatchers do not trust the recommendations enough to change live boards during stressful periods.
    likelihood: Medium
    impact: High
    mitigation: Start in assist mode with explanations, approval thresholds, and weekly override review before enabling automation.
  - risk: A large share of disruptions are solved mainly by faster customer communication rather than true board re-optimization.
    likelihood: Medium
    impact: Medium
    mitigation: Measure whether value comes from reassignments, slot recovery, or messaging containment and lean the roadmap toward the highest-signal workflow.
  - risk: Compliance or write-back errors create customer harm or operational liability.
    likelihood: Medium
    impact: High
    mitigation: Encode certification, overtime, consent, and opt-out rules in the workflow and keep rollback plus audit logging on every automated action.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months buys the first repeatable recovery overlay on one incumbent stack, 6-8 design partners, 3 paid pilots, 2 production hubs, and the solutions plus partnership capacity needed to prove pilot-to-platform expansion without becoming a services business.
