competitors:
- name: Probook
  stage: scale-up
  wedge: 以派单、客户消息和前台自动化为核心构建的家居服务 AI 操作系统。
  pricing: 定制报价，无公开定价披露。
  strength: 最有力地证明运营商会信任 AI 掌管工单板，拥有具名多市场案例研究和深度现场部署支持。
  weaknessVsUs: 更广泛的前台范围可能看起来比窄型供应商中立异常恢复覆盖层需要更大承诺。
  sourceRefs:
  - 2
  - 5
  - 12
- name: ServiceTitan
  stage: incumbent
  wedge: 按技师数量打包的行业特定系统记录，附带 Dispatch Pro、Scheduling Pro 和 Contact Center Pro。
  pricing: 定制按技师套餐。
  strength: 安装基础、丰富的工作流广度、市场生态系统，以及跨预约、派单和呼叫中心工作流的持续 AI 投入。
  weaknessVsUs: 最适合深入 ServiceTitan 软件栈的买家；对于希望跨混合系统的供应商中立恢复层的买家定位较弱。
  sourceRefs:
  - 30
  - 32
  - 35
- name: Housecall Pro
  stage: scale-up
  wedge: 含派单、客户通信、GPS 追踪和 AI CSR 接听的家居服务运营套件。
  pricing: 起步 $59/月，额外用户和附加包叠加。
  strength: 采用简单、定价透明，对较小运营商的派单相邻工作流覆盖强。
  weaknessVsUs: 对 8–20 家门店组织的集中式跨门店异常治理明显优化不足。
  sourceRefs:
  - 41
  - 46
  - 48
- name: Workiz
  stage: scale-up
  wedge: 以电话为核心的 FSM，含路线规划、Genius Answering 和 AI 辅助排班。
  pricing: 分层方案含席位经济和 AI/通信附加包；官方页面显示年付方案额外成员约 $55–$65/月。
  strength: 漏接电话捕获、快速预约和路线感知排班的强力故事，以及可见的 AI 变现。
  weaknessVsUs: 更面向成长型服务门店和通信覆盖，而非复杂扰乱后的多门店工单恢复。
  sourceRefs:
  - 49
  - 53
  - 54
- name: FieldEdge
  stage: incumbent
  wedge: 以 HVAC/管道为主的多车辆管理套件，含分层派单和排班功能。
  pricing: 报价制 Select、Premier 和 Elite 套餐。
  strength: 行业专属性和对多车辆服务运营的明确聚焦。
  weaknessVsUs: 擅长协调工单板，但在 AI 驱动的同日恢复逻辑上的证据基础薄于标准派单管理。
  sourceRefs:
  - 59
  - 60
regulatoryTechnicalConstraints:
- point: HVAC 派单不能将所有产能视为可互换，因为制冷剂相关作业需要 EPA 第 608 条合规技师。
  sourceRefs:
  - 72
- point: 自动化电话和短信需要在美国电话法规下进行同意感知的工作流设计。
  sourceRefs:
  - 73
- point: 激进的同日恢复会改变劳动经济学，因为一旦技师工时超过正常班次，加班规则仍然适用。
  sourceRefs:
  - 74
- point: 集成和对外编排需要退出和系统治理控制，而不仅仅是更好的排序模型。
  sourceRefs:
  - 12
  - 52
  - 77
validationSignals:
- point: Peterman Brothers 已在 11 个市场为 200 名技师集中派单，约 95% 的派单决策由 Probook 完成。
  sourceRefs:
  - 6
- point: Del-Air 将跨八个地点的调度员从 22 人整合到 10 人，证明一旦建立信任，大型运营商愿意围绕软件重组架构。
  sourceRefs:
  - 9
- point: ServiceTitan 和 Workiz 均发布了客户证据，证明 AI 支持的预约和派单工具能推动预约量或收入增长，确认买家对工单边界自动化的食欲。
  sourceRefs:
  - 37
  - 38
  - 58
openQuestions:
- 大型 ServiceTitan 或 Probook 客户会购买供应商中立的覆盖层，还是坚持使用现有软件栈的原生模块？
- 在推荐稳定胜过资深调度员的同日毛利恢复之前，需要多少历史排班、工单和技师技能标签数据？
- 每日扰乱中有多大比例最好靠重新分配来解决，而非靠更快的客户通信和自助改期？
- "买家最快接受哪种集成模式：市场应用、浏览器覆盖还是直接 API 回写实时工单板？"
