    - 49
bottomUpSizingDrivers:
- driver: 总可触达技师池
  value: 176 万工人，涵盖 HVAC 机械师/安装员、管道工/管道安装工和电工
  source: '[27][28][29]'
- driver: 派单相关服务份额过滤
  value: 假设约 35% 的劳动力处于集中派单有价值的居家或轻商业服务工作流中 = 约 618K 名技师
  source: '[14][15] + calc'
- driver: 滩头分支过滤
  value: 约 7,200 个分支（对约 18 万家行业企业应用 4% 多门店过滤），每个分支约 12 名可派遣技师 = 约 86.4K 名技师
  source: '[14][15][21][22][6][9] + calc'
- driver: 年化定价代理
  value: 每月每技师约 $60 估算，参考现有厂商产品包装和相邻公开方案三角验证
  source: '[30][41][49][59] + calc'
