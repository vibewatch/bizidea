problem: >-
  区域家居服务整合商的生死取决于日常服务工单表，但工单表不断崩溃——安装超时、技师临时请假、零件延误、紧急工单中途插入。出现这些情况时，集中调度团队只能靠电话树、电子表格和各门店的经验积累来决定哪些预约需要调整、哪些车辆闲置。结果是收入损失、客户更不满、还要不断补招调度员来应对排班混乱。
targetUser:
  primary: >-
    区域 HVAC、管道和电气整合商的集中调度经理和服务运营负责人
  secondary: >-
    多店家居服务平台的门店总经理和呼叫中心负责人
  buyer: >-
    多门店家居服务运营商的服务运营副总裁、COO 或调度总监
startupThesis:
  nonObviousInsight: >-
    一旦 AI 接管受理和基础排班，最高价值的未解难题不是承接更多工作，而是当现实偏离计划时恢复当日运营；来源所描述的共享上下文线程让异常处理的自动化首次具备了可行性。
  beachhead: >-
    跨 8–20 家门店集中调度、拥有 80–300 名技师、因安装超时或技师临时请假而损失当日产能的区域 HVAC、管道和电气整合商。
  wedge: >-
    一个异常恢复层——持续监控实时工单板、标记排班崩溃，并自动提出重新分配方案、客户通知和恢复的当日空档。
  whyNowCatalyst: >-
    AI 派单平台已在数百家门店证明了百比一的调度效能，因此多店运营商的下一个紧迫瓶颈是工单板崩溃时的当日恢复。
  ventureScalePath: >-
    从居家行业同日异常恢复起步，逐步扩展至全面调度编排、安装排班、保养计划路由，以及车库门、除虫、屋顶和修复等相邻现场服务垂直赛道。
solution: >-
  产品叠加在运营商现有现场服务软件之上，接入开放工单、技师技能标签、行驶时间、客户消息线程和门店规则。当工单超时、技师爽约或紧急呼叫到来时，系统实时重新优化当日排班，按恢复收入、SLA 风险和客户影响对最佳方案排序。调度员可一键批准方案，或让低风险调整附带预写的客户通知和内部交接自动执行。随着时间推移，系统学习各门店特定的工时规律和技师匹配情况，将部落式调度经验转化为可复用的运营手册。
goToMarketSeed:
  firstCustomer: >-
    一家位于东南部、拥有 10 家门店的 HVAC、管道和电气整合商，技师 120–250 人，设有集中调度组，兼有服务和安装两套日历
  buyingTrigger: >-
    旺季工单量激增、刚完成调度集中化，或近期门店并购导致每日排班崩溃超出调度员掌控范围。
  currentAlternative: >-
    在现有现场服务软件内手工重排，辅以电子表格、调度员与门店和技师之间的电话和短信往来。
  switchingReason: >-
    切入点能在数分钟内恢复当日预约和车辆利用率，且无需运营商替换核心系统或增聘调度员。
  pricingHypothesis: >-
    按活跃技师每月计费的 SaaS，企业套餐与已恢复预约量或当日收入提升挂钩。
whyNow:
  - point: >-
      单一共享上下文线程现已贯穿受理、数据清洗、消息和排班，异常恢复因此可以自动完成，而非手工拼接。
