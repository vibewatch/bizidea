differentiator: >-
  大多数家居服务 AI 产品追求漏斗顶端的线索转化，或承诺全面替换派单套件。这家公司从最窄、最高价值、但仍靠人工处理的工作流起步：工单已排好之后的同日异常恢复。因为它从各门店的临时请假、超时和紧急插入等结果中积累学习，能在不要求运营商第一天就替换现有现场服务软件的前提下，成为日常调度的行动系统。
conceptDiagram:
  title: 同日排班恢复循环
  mermaid: |
    flowchart LR
      Ops[Central dispatch team] --> Breakage[Overruns, callouts, and urgent jobs]
      Breakage --> RecoveryAI[Exception recovery AI]
      RecoveryAI --> Rebook[Reassigned jobs and customer updates]
      Rebook --> Outcome[Higher utilization and fewer missed appointments]
businessModelCanvas:
  customerSegments:
    - 区域 HVAC、管道和电气整合商
    - 集中调度的 PE 支持多门店家居服务运营商
  valuePropositions:
    - 排班崩溃时恢复当日收入
    - 无需增聘调度员即可提升技师利用率
    - 跨门店统一调度操作手册
  channels:
    - 直接向服务运营副总裁和调度总监外拓
    - 家居服务顾问和 PE 运营合伙人推荐
    - 多门店平台内以案例驱动的扩张
  customerRelationships:
    - 在一个调度组内高触达入驻
    - 与已恢复预约量挂钩的每周 ROI 复盘
    - 从单一区域或品牌扩展到整个平台
  revenueStreams:
    - 按活跃技师数量计费的订阅
    - 门店铺开的企业实施费
    - 自动客户通知的可选高级套餐
  keyResources:
    - 排班崩溃检测和重新优化模型
    - 历史工单时长和技师匹配数据
    - 与现场服务系统和消息工具的集成
  keyActivities:
    - 规范化门店数据和调度规则
    - 从历史结果训练异常处理策略
    - 衡量已恢复收入和利用率提升
  keyPartners:
    - 现场服务软件供应商和实施合作伙伴
    - 家居服务顾问和 PE 运营团队
    - 消息和远程信息处理供应商
  costStructure:
    - 模型推理和工作流编排
    - 客户成功和调度入驻
    - 集成维护和支持
jobsToBeDone:
  - job: >-
      当安装超时或技师请假导致当日排班开始崩溃时，帮助集中调度负责人优先恢复最重要的工单，让车辆保持高产并避免错失预约。
    currentAlternative: 跨现场服务软件、电子表格、电话和短信手工重排
    successMetric: 每个调度员恢复的当日预约数和技师利用率
  - job: >-
      当区域家居服务整合商将多家门店合并到一个调度组时，帮助服务运营副总裁标准化异常处理，使其无需增聘调度员即可扩规模。
    currentAlternative: 各门店的经验积累和临时升级处理手册
    successMetric: 技师与调度员比例和错失预约率
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      信号结合了大额融资、一线投资人、命名客户，以及多方来源反复强调调度是运营瓶颈。
  painIntensity:
    score: 4
    rationale: >-
      调度失败时，运营商立即损失当日收入和客户信任，在目标的 80–300 技师规模下尤为明显。
  wedgeClarity:
    score: 5
    rationale: >-
      同日异常恢复是一个窄且可量化的工作流，买家无需替换完整派单栈即可试点。
  defensibility:
    score: 4
    rationale: >-
      护城河来自门店特定异常数据、恢复操作手册和工作流嵌入，尽管现有厂商最终可能跟进。
  ventureScale:
    score: 5
    rationale: >-
      居家行业规模庞大且分散，产品可从单一工作流扩展为现场服务的整体操作系统。
topRisks:
  - name: 调度员信任缺口
    description: >-
      调度负责人在高压时刻可能不愿让软件移动工单或向客户发送消息。
    mitigation: >-
      从人工介入的可解释推荐起步，设置批准阈值，在已恢复预约上积累证明，再自动执行低风险操作。
  - name: 现有套件跟进
    description: >-
      一旦这一类别被证明有价值，现有现场服务平台或 AI 派单供应商可能会增加异常处理工作流。
    mitigation: >-
      作为跨现有软件栈的覆盖层入场，深耕跨门店恢复逻辑，建立排班崩溃结果的专属数据集。
  - name: 门店数据质量差
    description: >-
      多门店运营商往往存在不一致的状态码、技师标签和工单时长数据，可能导致推荐质量下降。
    mitigation: >-
      使用入驻模板、AI 数据清洗，并从依赖少量高信号输入的窄首工作流起步，再逐步扩展自动化。
