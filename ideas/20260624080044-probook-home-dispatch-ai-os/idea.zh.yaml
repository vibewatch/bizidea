  - point: >-
      品类采用已从试点门店扩展到数百家独立门店和 PE 支持平台，形成了大量准备好接受专属恢复层的安装基础。
    signalRefs:
      - 品类采用已跨出试点阶段
    sourceRefs:
      - 2
  - point: >-
      投资人和运营商都在表明，运营执行——而非仅仅获客——才是家居服务 AI 中最有价值的白地。
    signalRefs:
      - 获客 AI 留下了执行层白地
