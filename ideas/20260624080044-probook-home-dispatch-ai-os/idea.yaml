problem: >-
  Regional home-service consolidators live or die by the daily service board, but the
  board breaks constantly when installs overrun, technicians call out, parts are delayed,
  or urgent jobs land midday. Once that happens, centralized dispatch teams fall back to
  phone trees, spreadsheets, and branch-specific tribal knowledge to decide which
  appointments to move and which trucks sit idle. The result is missed revenue, angrier
  customers, and pressure to add dispatcher headcount just to keep up with schedule chaos.
targetUser:
  primary: >-
    Centralized dispatch managers and service operations leaders at regional HVAC,
    plumbing, and electrical consolidators
  secondary: >-
    Branch general managers and call center leaders at multi-location home-service
    platforms
  buyer: >-
    VP Service Operations, COO, or director of dispatch at a multi-branch home-service
    operator
startupThesis:
  nonObviousInsight: >-
    Once AI handles intake and baseline scheduling, the highest-value unsolved problem
    is not booking more work but recovering the day when reality diverges from plan;
    the shared context thread described in the sources makes exception handling newly
    automatable.
  beachhead: >-
    Regional HVAC, plumbing, and electrical consolidators that centralize dispatch
    across 8-20 branches, run 80-300 technicians, and lose same-day capacity when
    installs overrun or technicians call out.
  wedge: >-
    An exception-recovery layer that watches the live service board, flags schedule
    breakage, and automatically proposes reassignments, customer messages, and
    recovered same-day slots.
  whyNowCatalyst: >-
    AI dispatch platforms have already proven 100-to-1 dispatcher leverage and
    adoption across hundreds of shops, so the next urgent bottleneck for
    multi-location operators is day-of-service recovery when the board breaks.
  ventureScalePath: >-
    Start with same-day exception recovery for residential trades, then expand into
    full dispatch orchestration, install scheduling, maintenance-plan routing, and
    adjacent field-service verticals such as garage doors, pest control, roofing,
    and restoration.
solution: >-
  The product sits on top of the operator's existing field-service stack and ingests
  open jobs, technician skill tags, travel times, customer message threads, and
  branch rules. When a job runs long, a technician no-shows, or an emergency call
  arrives, it re-optimizes the day in real time and ranks the best moves by recovered
  revenue, SLA risk, and customer impact. Dispatchers can approve a plan with one
  click, or let low-risk moves auto-execute with prewritten customer updates and
  internal handoffs. Over time, the system learns branch-specific duration patterns
  and technician fit, turning tribal dispatch knowledge into reusable operating playbooks.
goToMarketSeed:
  firstCustomer: >-
    A 10-branch Southeastern HVAC, plumbing, and electrical consolidator with
    120-250 technicians, a centralized dispatch pod, and both service and install
    calendars
  buyingTrigger: >-
    Peak-season volume, a newly centralized dispatch team, or a recent branch
    roll-up causes daily schedule breakage to outgrow dispatcher span of control.
  currentAlternative: >-
    Manual reshuffling inside incumbent field-service software plus spreadsheets,
    phone calls, and text threads between dispatchers, branches, and technicians.
  switchingReason: >-
    The wedge recovers same-day appointments and truck utilization in minutes
    without forcing the operator to rip out its core system or hire more dispatchers.
  pricingHypothesis: >-
    SaaS priced per active technician per month, with enterprise tiers tied to
    recovered appointments or same-day revenue lift.
