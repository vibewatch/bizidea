jobsToBeDone:
  - job: >-
      When the day starts to fall apart because installs run long or technicians
      call out, help a centralized dispatch lead recover the best jobs first, so
      they can keep trucks productive and avoid missed appointments.
    currentAlternative: >-
      Manual reshuffling across field-service software, spreadsheets, calls, and texts
    successMetric: Recovered same-day appointments per dispatcher and technician utilization rate
  - job: >-
      When a regional home-service consolidator centralizes multiple branches onto
      one dispatch pod, help the VP of Service Operations standardize exception
      handling, so they can scale without adding dispatcher headcount.
    currentAlternative: Branch-specific tribal knowledge and ad hoc escalation playbooks
    successMetric: Technician-to-dispatcher ratio and missed-appointment rate
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      The signal combines a large round, tier-one investors, named customers, and
      repeated source emphasis that dispatch is the operational bottleneck.
  painIntensity:
    score: 4
    rationale: >-
      When dispatch fails, operators lose same-day revenue and customer trust
      immediately, especially at the 80-300 technician scale targeted here.
  wedgeClarity:
    score: 5
    rationale: >-
      Same-day exception recovery is a narrow, measurable workflow that buyers can
      pilot without replacing their full dispatch stack.
  defensibility:
    score: 4
    rationale: >-
      The moat comes from branch-specific exception data, recovery playbooks, and
      workflow embedding, though incumbents could eventually respond.
  ventureScale:
    score: 5
    rationale: >-
      Residential trades are a large, fragmented market, and the product can
      expand from one workflow into the broader operating system for field service.
topRisks:
  - name: Dispatcher trust gap
    description: >-
      Dispatch leaders may resist letting software move jobs or message customers
      during high-stress moments.
    mitigation: >-
      Start human-in-the-loop with explainable recommendations, approval thresholds,
      and proof on recovered appointments before automating low-risk moves.
  - name: Incumbent suite response
    description: >-
      Existing field-service platforms or AI dispatch vendors could add exception
      workflows once the category proves valuable.
    mitigation: >-
      Launch as an overlay that works across incumbent stacks, go deep on
      cross-branch recovery logic, and build a proprietary dataset on
      schedule-break outcomes.
  - name: Messy branch data
    description: >-
      Multi-location operators often have inconsistent status codes, technician
      tags, and job-duration data, which can degrade recommendations.
    mitigation: >-
      Use onboarding templates, AI data cleaning, and a narrow first workflow that
      relies on a small set of high-signal inputs before expanding automation.
