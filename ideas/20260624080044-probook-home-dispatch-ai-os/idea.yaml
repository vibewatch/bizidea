differentiator: >-
  Most home-service AI products chase top-of-funnel lead conversion or promise a
  full rip-and-replace dispatch suite. This company starts with the narrowest,
  highest-value workflow that still breaks manually: same-day exception recovery
  after the schedule is already built. Because it learns from branch-specific
  outcomes across callouts, overruns, and emergency inserts, it can become the
  system of action for daily dispatch without requiring operators to replace their
  incumbent field-service software on day one.
conceptDiagram:
  title: Same-day schedule recovery loop
  mermaid: |
