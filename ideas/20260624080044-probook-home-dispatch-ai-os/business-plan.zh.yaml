slug: service-board-recovery-os
date: "2026-06-24"
executiveSummary: >-
  服务工单恢复系统面向区域 HVAC、管道和电气整合商——集中调度团队因安装超时、技师临时请假或紧急工单插入而损失当日产能。滩头市场是东南部和阳光地带拥有 8–20 家门店、80–300 名技师、兼有服务和安装两套日历的运营商，因为其密度和异常量足以快速验证 ROI。初期产品是叠加在现有现场服务软件之上的覆盖层，而非替换套件——监控实时工单板、对恢复方案排序，并在调度员批准后发送合规的客户通知。GTM 打法从创始人主导销售起步，瞄准旺季、门店集中化或并购整合后的服务运营副总裁或 COO，通过付费试点转化为按技师计费的年度订阅，待已恢复预约量和调度员效能得到验证之后再扩规模。研究支撑了痛点、买家准备度和预算基准，但尚未证明大型运营商会购买一个供应商中立的恢复层，而不是等待 ServiceTitan、Probook 或其他在位企业扩展原生模块。首个证明点很明确：在 60–90 天的工单数据上证明产品能恢复当日收入，并比手工重排更快赢得调度员信任。计划刻意回避全面派单替换、单店中小企业和相邻行业，直到一个集中调度枢纽能在数周内完成部署、转为正式生产并跨品牌扩张。若公司无法展示可靠的回写能力、超过 50% 的试点转化率，以及不借助定制服务即可量化已恢复工单，创投价值主张将大幅削弱。
problem:
  - 拥有 8–20 家门店的 HVAC、管道和电气运营商，其集中调度团队因安装超时、技师临时请假或紧急工单插入而损失当日收入——现有工单板不会自动恢复排班。
  - 运营商仍靠电子表格、电话树和各门店的经验积累来处理异常，导致错失预约、客户通知不一致，以及不断增补调度员的压力。
solution:
  - 覆盖现有现场服务栈，接入实时工单、技师技能、路线、客户消息线程和门店规则，按恢复收入、SLA 风险和客户影响对恢复方案排序。
  - 从调度员批准推荐和模板化客户通知起步，仅在学习各门店的覆盖规则和合规约束之后，才对低风险重新分配实施自动执行。
whyWeWin:
  - 切入点窄且与预算挂钩——同日工单恢复——买家无需替换系统记录或为全面派单替换项目埋单即可试点。
  - 门店特定的覆盖数据、技师匹配学习、沟通响应历史和跨栈回写可靠性，构筑起通用路由或呼叫中心 AI 工具无法复制的工作流护城河。
strategicChoices:
  beachhead: 东南部和阳光地带的 HVAC、管道和电气整合商，拥有 8–20 家门店、80–300 名技师、集中调度，兼有服务和安装两套日历。
  wedgeRationale: 这一切片拥有密集的路线网络、频繁的当日崩溃，以及对毛利和调度员效能负责的决策层，恢复覆盖层能比销售大型家居服务 OS 更快证明价值。
  sequencingRationale: 从一个集中调度枢纽的辅助模式恢复起步，因为信任、数据清洗和回写安全性比全面自动化更重要；一旦一个枢纽展示了已恢复预约量和干净的部署，再跨品牌扩张，随后增加更深层的编排和相邻排班模块。
  notYet:
    - 单店承包商和极小规模车队——异常量太低，不足以支撑覆盖层。
    - 全面现场服务管理替换、薪资和获客工作流——这些会稀释恢复切口。
    - 车库门、除虫、屋顶和修复等相邻行业——等居家 HVAC、管道和电气枢纽可重复扩展之后再进入。
market:
  tam: 约 $0.4B ARR 当量——约 618K 派单相关 HVAC、管道和电气技师，按每月约 $60/技师测算。
  sam: 约 $62.2M ARR 当量——约 86.4K 技师分布于约 7,200 个多门店滩头分支。
  som: 约 $2.9M 第 3 年 ARR——约 4,000 名技师分布于 20–30 家区域运营商，渠道规模化之前的测算。
  segments:
    - 拥有集中调度的 8–20 家门店居家及轻商业 HVAC、管道和电气运营商。
    - 跨收购门店和品牌统一调度的 PE 支持区域家居服务平台。
  buyingProcess: >-
    商业案例通常由调度总监或服务运营副总裁用已恢复预约量和技师与调度员效能比来构建，再由 COO 或运营系统负责人审核——因为回写可靠性和客户消息风险是关键。合同应围绕一个集中枢纽的旺季试点达成，并商定已恢复工单量、接受率和部署速度的评分卡。
product:
  mvp: >-
    MVP 覆盖一套现有工单板加一条浏览器覆盖路径，检测超时、临时请假和紧急插入，使用技师技能、路线、门店规则和实时上下文，推荐重新分配、空档恢复和客户更新方案。刻意排除完整排班创建、薪资、库存和纯获客自动化。
  sixMonth: 为一套现有现场服务栈交付旺季辅助模式，包含覆盖日志、ROI 报告和合规客户消息模板。
  twelveMonth: 为两套主要现场服务环境增加可靠回写、低风险自动执行阈值和多市场运营商的跨门店产能视图。
  twentyFourMonth: 在同一居家行业足迹内，从同日恢复扩展至更广泛的调度编排、安装排班和保养计划路由。
  keyBets:
    - 同日扰乱中包含足够多的可恢复收入，足以支撑新增软件预算。
    - 供应商中立的覆盖层部署速度快于等待现有厂商模块或推进替换项目。
    - 调度员覆盖数据逐门店提升推荐质量，形成可复用的操作手册。
    - 合规护栏可嵌入工作流，而不会将自动化降级为只读仪表盘。
gtm:
  wedge: 在旺季或门店集中化后立即为一个集中调度枢纽销售付费恢复试点，仅在该枢纽展示了已恢复的当日预约量和更清晰的调度员掌控范围之后再扩展。
  channels:
    - 创始人主导向 PE 支持或区域多门店运营商的服务运营副总裁、COO 和调度总监外拓。
    - PE 运营合伙人和家居服务顾问推荐——他们已在推动门店标准化项目。
    - 通过现有现场服务软件生态的市场和集成渠道入场，面向拒绝替换项目的买家。
  funnelTargets: "线索→合格试点 20–30%，合格试点→付费试点 40–50%，付费试点→正式生产 60%+，首个枢纽→第二枢纽铺开在 40%+ 的生产账户中于 9 个月内完成。"
  pricing: >-
    以 $15k–$30k 的付费试点切入一个调度枢纽，再转为按活跃技师计费的年度订阅，设置门店最低消费和可选自动化套餐；工作假设约为每月 $50–$60/技师，因为买家已按这一逻辑为相邻软件编列预算，但确切定价需与已恢复当日收入和调度员效能比对齐验证。
businessModel:
  revenueStreams:
    - 按活跃技师计费的年度订阅，设置集中调度最低消费。
    - 新门店或收购品牌上线的一次性铺开和数据规范化费用。
    - 合规低风险自动执行的高级自动化和客户通知模块。
  unitOfValue: 集中调度工单板下的活跃技师，按调度枢纽设最低消费。
  targetGrossMarginPct: 70
  expansionLevers:
    - 从一个调度枢纽铺开至同一平台内的所有门店、品牌或收购门店。
    - 从辅助模式扩展至低风险自动执行和客户通信自动化。
    - 在滩头市场得到验证之后，增加安装排班、保养计划路由和相邻居家服务行业。
strategyMap:
  northStarMetric: 每个实时集中调度枢纽在不增加调度员人手的情况下恢复的当日预约量。
  inputMetrics:
    - 合格试点到付费试点的转化率。
    - 付费试点到正式生产的转化率。
    - 调度员对推荐恢复方案的接受率。
    - 从扰乱检测到批准工单更新的中位耗时。
    - 首个枢纽到各账户内额外门店的净扩张。
  moatsToBuild:
    - 覆盖技能、加班、客户承诺和路由阈值的门店特定异常策略库。
    - 关联建议方案、调度员编辑、工单结果和客户响应的覆盖与结果数据集。
    - 运营商在旺季信任的可靠跨栈回写和回滚控制。
  killCriteria:
    - 若前 3 次回溯测试未能展示足够多的可恢复当日预约量以构建可信试点 ROI，则收窄市场或放弃切口。
    - 若在辅助模式下跨 2 个试点 30 天后调度员接受率仍低于 60%，则信任模型太弱，无法支撑自动化。
    - 若前 4 个付费试点中不足 2 个在 6 个月内以超过 $75k 年化价值转为正式生产，则买家对覆盖层相对于原生工具的价值评估不足。
    - 若生产试点中工单回写或自动客户消息失败率超过 1%，则集成和合规负担过高。
  mermaid: |
    flowchart LR
      Wedge[Centralized dispatch recovery wedge] --> MVP[Assist-mode recovery overlay]
      MVP --> Proof[Recovered appointments and dispatcher trust]
      Proof --> Expansion[Multi-branch rollout plus broader orchestration]
investorMemo:
  verdict:
    call: "观望/深入调研"
    conviction: 问题时机强、首个买家清晰，值得进行尽调，但说服力取决于在现有厂商填补差距之前证明供应商中立需求。
    whyBelieve: 多门店运营商已围绕 AI 调度重新组织架构，同日异常恢复是一个可量化的痛点，直接关联收入、利用率和调度员效能。
    whyDoubt: Probook 和 ServiceTitan 已非常接近工单板，因此独立覆盖层只有在部署速度和当日恢复效果上优于原生模块才能胜出。
    nextDiligence: 让 8–10 家目标运营商共享工单数据或进入付费试点，在一个旺季内验证一个集中枢纽能否展示已恢复预约量、推荐接受率和生产级回写。
  firstCustomer:
    title: 一家拥有 10 家门店的东南部 HVAC、管道和电气整合商的服务运营副总裁
    profile: 一家拥有 120–250 名技师的居家服务平台，设有集中调度、混合服务和安装两套日历，以及仍依赖人工异常处理的现有现场服务系统。
    trigger: 旺季工单量、新门店并购或近期调度集中化导致每日超时、临时请假和紧急插入冲垮工单板。
    buyer: 服务运营副总裁
    initialContract: $15k–$30k 付费试点覆盖一个集中调度枢纽，验证已恢复当日工单量和减轻调度员负担后，转为约 $75k–$150k 的年度软件订阅，再按门店和品牌扩张。
  mustBeTrue:
    - 多门店家居服务运营商每天遭遇足够多的工单崩溃，使已恢复当日产能成为有预算支撑的 KPI，而非仅是调度员的烦恼。
    - 使用 ServiceTitan、FieldEdge 或混合软件栈的买家会试用供应商中立的覆盖层，而不是等待原生模块。
    - 一个调度枢纽能在 30 天内以有限的数据清洗完成部署，并在单一旺季内展示可量化的已恢复预约量。
    - 调度员接受率和覆盖学习提升足够快，可在辅助模式之后支撑低风险自动化。
    - 早期账户在套件或 AI 原生在位企业压缩定价之前，从单枢纽扩张至多门店铺开。
  diligenceQuestions:
    - 每日超时、临时请假和紧急插入中，有多大比例创造了可恢复的当日收入，而非不可避免的延期？
    - 大型 ServiceTitan 或 Probook 客户拒绝第三方回写实时工单板的频率有多高？
    - 哪个 KPI 最先触发预算：已恢复预约量、技师与调度员比例，还是工单质量？
    - 要在推荐上超越资深调度员，技师技能、状态码和工单时长的数据最低清洁度要求是什么？
    - 首个试点能否在旺季 30 天内完成部署，而不演变成定制集成项目？
operatingAssumptions:
  - assumption: 大型运营商会在现有套件提供等效原生异常处理之前购买供应商中立的恢复覆盖层。
    basis: research.yaml
    validationTest: 从已使用现有 FSM 系统的运营商中赢得至少 4 个付费试点，并确认他们没有改选原生模块。
    decisionImpact: 若为假，则深度绑定一家现有生态系统或放弃独立覆盖层的论点。
  - assumption: 同日扰乱创造了足够多的可恢复预约量和收入，以支撑目标运营商规模的按技师定价。
    basis: research.yaml
    validationTest: 对 3 家共创客户的 60–90 天工单事件进行回溯测试，展示与已恢复工单量或避免闲置时间挂钩的可重复 ROI 案例。
    decisionImpact: 若为假，则重新定位为通信优先的空档恢复，或收窄至异常频率更高的理想客户画像。
  - assumption: 门店数据可以足够快速地规范化，使首次部署成为产品铺开而非服务项目。
    basis: operator judgment
    validationTest: 前 3 次部署每次使用不超过 2 个工程师周的定制映射，且技师技能标签和状态码的可用覆盖率超过 90%。
    decisionImpact: 若为假，则将理想客户画像收窄至数据更清洁的运营商，或将实施费作为独立服务线进行定价。
  - assumption: 调度员在公司要求允许自动化之前，会信任辅助模式的推荐。
    basis: idea.yaml
    validationTest: 在 2 个试点的 30 天内实现至少 60% 的推荐接受率，并记录随时间下降的覆盖率。
    decisionImpact: 若为假，则产品停留在纯分析层，无法获得高级定价所需的效能。
  - assumption: 合规约束可以嵌入工作流，而不会消除自动客户消息或重新分配的价值。
    basis: research.yaml
    validationTest: 在首个试点中通过法务和运营商对同意处理、退出强制、加班规则和认证感知分配逻辑的审核。
    decisionImpact: 若为假，则将客户消息和最终重新分配保留为人工触发步骤，并收窄自动化主张。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 25 位集中调度负责人，并从东南部或阳光地带 3 家共创客户运营商收集工单导出数据。
    hypothesis: 目标理想客户每天遭遇足够多的崩溃，无需更换系统记录即可证明一个恢复试点的合理性。
    successMetric: 10 个以上合格潜在客户，以及 3 家签署数据共享协议的共创客户——附具名购买触发点。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 对 60–90 天的超时、临时请假和紧急插入进行回溯测试，量化已恢复预约量、节省的闲置时间和调度员覆盖。
    hypothesis: 可恢复机会频繁到足以支撑按技师定价和付费试点。
    successMetric: 3 次回溯测试展示可信 ROI 案例，以及买家接受的试点评分卡。
    owner: 创始人/CEO 和创始工程师
  - horizon: 0–90 天
    experiment: 为一套现有 FSM 环境构建只读工单覆盖层，加上合规消息模板。
    hypothesis: 首次部署可在 30 天内在不依赖脆弱直接回写的情况下，在工单板内展示排序恢复方案。
    successMetric: 一家共创客户在启动后 30 天内在集中枢纽上使用实时辅助模式。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 在旺季或门店集中化后立即以辅助模式运行 3 个付费试点。
    hypothesis: 当系统解释收入、SLA 和客户权衡时，调度员会接受超过一半的推荐恢复方案。
    successMetric: 签署 3 个付费试点，其中至少 2 个的推荐接受率超过 60%。
    owner: 创始人/CEO
  - horizon: 6–12 个月
    experiment: 在前 2 个生产账户上为已批准的方案类型推出低风险自动执行和可靠回写。
    hypothesis: 自动化可以在严格限定的场景下安全运行，不会引发合规或客户通信故障。
    successMetric: 2 个生产账户的自动执行方案中回写或消息失败率低于 1%。
    owner: 创始工程师
  - horizon: 6–12 个月
    experiment: 招募现有软件市场、PE 运营和家居服务顾问合作伙伴，帮助引流或加速铺开。
    hypothesis: 合作渠道在首个枢纽得到验证后降低销售阻力、加速多门店扩张。
    successMetric: 第 12 个月前签署 3 家合作伙伴，并实现 2 个合作伙伴影响的试点。
    owner: 合作伙伴负责人
operations:
  - 首先在一套小字段集上标准化入驻，包括状态码、技师技能、路线数据、门店规则和客户同意标志。
  - 首版产品保持供应商中立，采用只读监控、明确的批准阈值和对每个工单回写操作的回滚。
  - 每周与调度总监和服务运营副总裁进行 ROI 和覆盖复盘，将试点结果转化为可复用的门店操作手册。
  - 使用现有软件市场、集成合作伙伴和通信合规工具，而非内部重建每个相邻工作流。
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 主导共创客户销售、ROI 包装以及 PE 或运营商关系，因为首批合同需要创始人公信力和快速学习循环。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 为首批试点构建实时工单摄取、恢复排序、调度员工作流和安全回写控制。
  - role: 解决方案工程师
    startTiming: 第 3 个月
    rationale: 规范化门店数据、缩短部署时间，并保护核心工程团队免受服务蔓延。
  - role: 应用运营负责人
    startTiming: 第 6 个月
    rationale: 将覆盖和结果转化为门店特定策略、信任指标和铺开模板。
  - role: 合作伙伴负责人
    startTiming: 第 9 个月
    rationale: 在首个枢纽得到验证后，将 PE 运营、顾问和现有生态系统关系转化为可重复的试点流。
milestones:
  - horizon: 0–12 个月
    items:
      - 在东南部或阳光地带签署 6–8 家共创客户，完成 3 次真实工单数据的回溯测试。
      - 在集中调度枢纽上启动 3 个付费试点，并将至少 2 个转为正式生产。
      - 证明进入一套现有现场服务系统的可重复部署路径，以及 30 天内实现首个价值的安全覆盖工作流。
      - 展示超过 60% 的推荐接受率，以及不增加调度员人手的可信已恢复预约量 ROI 案例。
  - horizon: 12–24 个月
    items:
      - 支持两套主要现场服务环境，具备有限自动执行和合规客户消息功能。
      - 在早期账户内跨品牌、门店或并购门店扩张，达到 10–15 家生产运营商。
      - 将 PE 运营、顾问和市场渠道确立为合格试点的重要来源。
      - 仅在恢复切口仍是主要销售故事的前提下，增加安装排班和跨门店产能视图。
  - horizon: 24–36 个月
    items:
      - 达到约 4,000 名技师覆盖 20–30 家运营商，与研究支撑的第 3 年 SOM 一致。
      - 从同日恢复扩展至同一行业内的更广泛调度编排和保养计划路由。
      - 仅在 HVAC、管道和电气的多门店铺开经济学和试点转化率保持强劲后，进入相邻居家服务垂直赛道。
risks:
  - risk: ServiceTitan、Probook 或其他在位企业在公司赢得渠道和数据优势之前，捆绑了等效的异常恢复能力。
    likelihood: High
    impact: High
    mitigation: 在更广泛套件填补差距之前，在供应商中立的部署速度、跨栈覆盖和门店特定恢复操作手册上取胜。
  - risk: 脏门店数据、弱技师标签或不一致的状态码拖延价值实现时间。
    likelihood: High
    impact: High
    mitigation: 约束首个工作流，标准化一套小型必填字段集，并拒绝将入驻演变为数据清洗项目的账户。
  - risk: 调度员在压力时刻对推荐的信任不足，不愿更改实时工单板。
    likelihood: Medium
    impact: High
    mitigation: 从带解释的辅助模式起步，设置批准阈值和每周覆盖复盘，再开放自动化。
  - risk: 大部分扰乱主要靠更快的客户通知而非真正的工单重新优化来解决。
    likelihood: Medium
    impact: Medium
    mitigation: 衡量价值来自重新分配、空档恢复还是消息遏制，并将路线图向最高信号工作流倾斜。
  - risk: 合规或回写错误造成客户伤害或运营责任。
    likelihood: Medium
    impact: High
    mitigation: 在工作流中嵌入认证、加班、同意和退出规则，并对每个自动化操作保留回滚和审计日志。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 个月资金用于在一套现有软件栈上构建首个可重复恢复覆盖层，覆盖 6–8 家共创客户、3 个付费试点、2 个生产枢纽，以及验证试点到平台扩张所需的解决方案和合作伙伴产能——同时避免演变成服务型业务。
