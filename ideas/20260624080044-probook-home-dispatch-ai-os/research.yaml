  sensitivityCases:
  - case: Probook or ServiceTitan bundles equivalent exception recovery into a broader suite faster than expected
    impact: Standalone pricing power compresses, so the startup would need to win on vendor-neutral deployment speed and better cross-stack recovery outcomes rather than on feature novelty alone.
    sourceRefs:
    - 2
    - 32
    - 35
  - case: Branch data and technician skill tags are dirtier than expected
    impact: Recommendation quality falls, dispatcher trust erodes, and onboarding expands into a data-normalization project before the product can automate meaningfully.
    sourceRefs:
    - 7
    - 9
    - 46
    - 68
  - case: Most schedule disruptions are solved by customer communication rather than true board re-optimization
    impact: The product still matters, but it starts to look more like a communications and slot-management layer than a defensible dispatch intelligence system.
    sourceRefs:
    - 35
    - 48
    - 54
  validationPlan:
  - priority: high
    question: What percentage of same-day disruptions create recoverable revenue versus just forcing lower-value reschedules?
    evidenceToGather: Backtest 60-90 days of branch-level overruns, technician callouts, and emergency inserts; label each event by recovered ticket value, margin, and customer save rate.
  - priority: high
    question: Can the product write back into incumbent boards with enough reliability to run during peak season?
    evidenceToGather: Prototype read/write workflows into one incumbent platform and one browser-overlay path, then measure update latency, failure handling, and dispatcher override rates.
  - priority: medium
    question: How much dispatcher trust can be won before full automation is offered?
    evidenceToGather: Pilot assist-only mode with explanation logging; track acceptance rate of recommendations, manual overrides, and reasons for rejection over 30 days.
  - priority: medium
    question: 'Which KPI unlocks expansion fastest: recovered same-day jobs, ticket quality, or tech-to-dispatcher ratio?'
    evidenceToGather: Design pilot scorecards with one COO and one dispatch leader, then compare which metric actually triggers broader branch rollout and budget release.
