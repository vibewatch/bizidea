competitors:
- name: Probook
  stage: scale-up
  wedge: AI operating system for home services built around dispatch, customer messaging, and front-office automation.
  pricing: Custom quote; no public pricing disclosed.
  strength: Strongest live proof that operators will trust AI at the board, with named multi-market case studies and deep in-person deployment support.
  weaknessVsUs: Broader front-office scope can look like a bigger commitment than a narrow, vendor-neutral exception-recovery overlay.
  sourceRefs:
  - 2
  - 5
  - 12
- name: ServiceTitan
  stage: incumbent
  wedge: Trade-specific system of record with per-technician packaging plus Dispatch Pro, Scheduling Pro, and Contact Center Pro.
  pricing: Custom per-technician package.
  strength: Installed base, rich workflow breadth, marketplace ecosystem, and active AI investment across booking, dispatch, and contact-center workflows.
  weaknessVsUs: Best when buyers go deeper into the ServiceTitan stack; less naturally positioned as a vendor-neutral recovery layer across mixed systems.
  sourceRefs:
  - 30
  - 32
  - 35
- name: Housecall Pro
  stage: scale-up
  wedge: Home-service operating suite with dispatching, customer communication, GPS tracking, and AI CSR coverage.
  pricing: Starts at $59/month, with extra users and add-ons layered on top.
  strength: Simple adoption, transparent entry pricing, and strong coverage of dispatch-adjacent workflows for smaller operators.
  weaknessVsUs: Less obviously optimized for centralized, cross-branch exception governance in 8-20 branch organizations.
  sourceRefs:
  - 41
  - 46
  - 48
- name: Workiz
  stage: scale-up
  wedge: Phone-forward FSM with route planning, Genius Answering, and AI-assisted scheduling for service businesses.
  pricing: Tiered plans with seat economics and AI/communications add-ons; official page highlights $55-$65 monthly extra-member pricing on annual plans.
  strength: Strong story around missed-call capture, fast booking, and route-aware scheduling with visible AI monetization.
  weaknessVsUs: More oriented to growth-stage service shops and communications coverage than to multi-branch board recovery after complex disruptions.
  sourceRefs:
  - 49
  - 53
  - 54
- name: FieldEdge
  stage: incumbent
  wedge: HVAC/plumbing-focused multi-truck management suite with tiered dispatch and scheduling capabilities.
  pricing: Quote-based Select, Premier, and Elite tiers.
  strength: Trade specificity and explicit focus on multi-truck service operations.
  weaknessVsUs: Good at coordinating the board, but the evidence base is thinner on AI-driven same-day recovery logic than on standard dispatch management.
  sourceRefs:
  - 59
  - 60
