openQuestions:
- Will large ServiceTitan or Probook customers buy a vendor-neutral overlay, or will they insist on native modules from the incumbent stack?
- How much historical schedule, ticket, and skill-tag data is required before recommendations consistently beat senior dispatchers on same-day gross-profit recovery?
- What share of daily disruptions are best solved by re-assignment versus faster customer communication and self-service rescheduling?
- 'Which integration pattern buyers will accept fastest: marketplace app, browser overlay, or direct API write-back into the live board?'
