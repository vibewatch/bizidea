  geographicConsiderations:
  - point: The best first wedge is the Sun Belt and Southeast, where large regional service platforms and weather-driven HVAC urgency already show up in the footprints of Southern Home Services and Del-Air.
    sourceRefs:
    - 17
    - 21
    - 37
