modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Deals[Event-driven deals] --> Customers[Paying customers]
      Customers --> Scope[Scoping + implementation fees]
      Customers --> Recurring[Recurring platform + add-on ARR]
      Scope --> Revenue[Recognized revenue]
      Recurring --> Revenue
      Revenue --> GrossProfit[Gross profit after delivery / cloud costs]
      GrossProfit --> Opex[Payroll + operating spend]
      Opex --> Cash[Ending cash]
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches $3.35M of Year 3 revenue by landing 12 event-driven enterprise accounts and converting mature accounts from migration fees into recurring renewal-QA and exception-workflow spend.
- checkName: Must go right
  finding: At least half of mature customers need to buy recurring post-migration modules so the mix can shift toward 70% gross-margin revenue instead of staying implementation heavy.
- checkName: Model breaks if
  finding: If sales cycles slip by about two months or module attach stalls, downside cash turns negative before the next financing window.
- checkName: Next-round proof
  finding: A seed-ready proof point is roughly 5-6 production customers by Month 24 with two AMS connectors, ten carriers, and recurring attach already visible.
sanityChecks:
  ruleOf40: Y3 growth 111.7% + EBITDA margin -8.2% = 103.5%
  burnMultiple: Y2 burn multiple 1.1x (about $916.5K EBITDA burn on $854.0K net new revenue), improving to 0.2x in Y3 as Q4 turns EBITDA-positive.
  revenuePerFte: $304.9K Y3 (11 Y3 exit FTE; benchmark roughly $200-400K for vertical SaaS)
  flags:
  - 'Year 3 is only modestly past cash trough: full-year EBITDA remains negative even though Q4 turns slightly positive.'
  - The model depends on a small number of large enterprise events; missing two logos is enough to push the downside case below zero cash.
  - Recurring durability is still assumed rather than proven because the first renewal-QA conversion only happens near the end of Year 1.
  - Gross margin improvement assumes carrier-state exception handling becomes reusable; if implementations stay bespoke, delivery margins will disappoint.
