jobsToBeDone:
  - job: When we acquire a personal-lines policy book, help our servicing organization migrate every household into our stack without breaking active coverage, so we can keep revenue and trust intact through the first renewal cycle.
    currentAlternative: Spreadsheet-driven migration plans combined with agency-management exports, carrier portals, and temporary service teams.
    successMetric: Percent of policies migrated without lapse, open service tickets per 1,000 policies, and renewal retention in the first 120 days.
  - job: When partner-owned policy books are reassigned after an acquisition, help us preserve attribution and commission logic, so we can avoid channel conflict and prove economics to carriers and distributors.
    currentAlternative: Manual reconciliation across CRM records, policy admin files, and finance spreadsheets.
    successMetric: Commission leakage avoided, partner disputes prevented, and days to finalize post-migration reconciliation.
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The cluster is backed by a disclosed acquisition, named capital, and clear scale signals rather than speculative trend commentary.
  painIntensity:
    score: 5
    rationale: Failed migrations can cause coverage lapses, customer-service spikes, revenue leakage, and partner fallout in a regulated category.
  wedgeClarity:
    score: 5
    rationale: The first product is a narrow rollover command center tied to one concrete trigger instead of a broad insurance-ops platform.
  defensibility:
    score: 4
    rationale: Defensibility comes from carrier workflow rules, migration data, and embedded partner integrations, though incumbents could respond over time.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow, but expansion into recurring servicing, renewals, analytics, and additional broker rollups supports a large vertical SaaS outcome.
topRisks:
  - name: Narrow event frequency
    description: Book transfers may happen too infrequently at any one broker to support standalone budget.
    mitigation: Sell into repeat acquirers first and expand the product into ongoing renewal-servicing workflows immediately after migration.
  - name: Incumbent workflow lock-in
    description: Brokers may try to stretch their agency-management systems and internal ops teams instead of adding a new layer.
    mitigation: Position as a temporary-to-permanent orchestration layer that integrates with the existing AMS and proves ROI on one live migration.
  - name: Carrier exception complexity
    description: Carrier-specific servicing rules may vary enough to make implementations services-heavy.
    mitigation: Start with home and auto carriers common in embedded channels, codify the highest-volume exceptions, and price implementation separately until the rule library matures.
