problem: >-
  When an embedded insurance distributor acquires an external personal-lines book, it has to preserve in-force coverage,
  map policy data into its own servicing stack, re-establish carrier and customer permissions, and decide which accounts
  to remarket at renewal. Most brokers still do this with agency-management exports, carrier portals, spreadsheets, and
  temporary service teams, which makes lapse risk, commission leakage, and customer confusion uncomfortably high.
targetUser:
  primary: Operations and servicing leaders at U.S. embedded personal-lines distributors that acquire or absorb outside policy books.
  secondary: Carrier partnership managers and licensed customer-service teams supporting mortgage and banking distribution channels.
  buyer: COO or GM of insurance operations at a digital broker or embedded insurance platform.
startupThesis:
  nonObviousInsight: >-
    The valuable asset in embedded insurance M&A is not just the policy book or lead flow; it is the ability to
    re-platform thousands of in-force policies without breaking carrier servicing, partner attribution, or renewal
    economics. As embedded distributors consolidate, book rollover becomes a recurring systems problem that legacy agency
    software was never designed to solve.
  beachhead: >-
    U.S. embedded home-and-auto insurance distributors with 20,000 to 100,000 in-force policies, 10 or more mortgage or
    banking partners, and a newly acquired external book that must be migrated into a multi-carrier servicing workflow
    within 180 days.
  wedge: >-
    A policy-book rollover command center that ingests acquired policy files, normalizes carrier and partner data,
    orchestrates broker-of-record and consent workflows, and sequences renewal remarketing without interrupting active
    coverage.
  whyNowCatalyst: >-
    Matic's acquisition shows that personal-lines books are now being folded into embedded, multi-carrier platforms at
    acquisition scale, creating urgent demand for migration infrastructure instead of more lead-generation software.
  ventureScalePath: >-
    Start with one-time rollover programs, then expand into ongoing servicing QA, renewal remarketing orchestration,
    carrier performance analytics, partner attribution, and a system of record for embedded personal-lines operations
    across brokers, banks, and mortgage channels.
solution: >-
  The product is a migration and servicing layer that sits between acquired policy data, carrier portals, partner CRMs,
  and the broker's service team. It creates a canonical policy record, flags missing fields by carrier workflow, assigns
  outreach tasks to licensed agents, and tracks whether each household should simply continue coverage or be remarketed at
  renewal. It also preserves partner attribution and commission logic so the distributor can prove which mortgage lender,
  bank, or marketplace relationship owns the customer. Over time, the same platform becomes the operating system for all
  post-bind servicing inside embedded personal-lines distribution.
goToMarketSeed:
  firstCustomer: >-
    A U.S. embedded personal-lines broker with a recently acquired 25,000- to 75,000-policy home and auto book, 15 or
    more distribution partners, and a deadline to migrate servicing before the next major renewal wave.
  buyingTrigger: Acquisition of a policy book, broker-of-record transfer, or a large partner portfolio migration that must go live inside one renewal season.
  currentAlternative: Internal operations teams stitching together agency-management-system exports, carrier portals, BPO support, spreadsheets, and manual outreach.
  switchingReason: >-
    The wedge reduces lapse risk and service backlog during a high-stakes migration while giving leadership one place to
    track policy status, carrier exceptions, and renewal conversion economics.
  pricingHypothesis: Annual platform fee plus per-migrated-policy pricing, with premium modules for renewal remarketing and carrier exception handling.
