problem: 嵌入式保险分发商收购外部个人险保单簿后，必须维持在保保障有效、将保单数据映射进自有服务系统、重新建立承保商与客户授权关系，并决定哪些账户在续保时进行再营销。大多数经纪商至今仍依赖代理管理系统导出、承保商门户、电子表格及临时服务团队来完成这一流程——保障断档风险、佣金漏损及客户困惑居高不下。
targetUser:
  primary: 美国嵌入式个人险分发商中负责运营与服务的高管，尤其是需要收购或承接外部保单簿的团队。
  secondary: 承保商合作伙伴经理，以及支持抵押贷款和银行分发渠道的持牌客服团队。
  buyer: 数字经纪商或嵌入式保险平台保险运营部门的 COO 或总经理。
startupThesis:
  nonObviousInsight: 嵌入式保险并购中真正有价值的资产，不只是保单簿或线索流量——而是将数千张在保保单无缝迁移至新平台的能力，同时不破坏承保商服务关系、合作伙伴归因或续保收益。随着嵌入式分发商加速整合，保单迁移正变成一个反复出现的系统性问题，而传统代理软件从未为此设计。
  beachhead: 美国拥有 2 万至 10 万张在保保单、10 家以上抵押贷款或银行合作伙伴、且刚收购了须在 180 天内完成迁移的外部保单簿的嵌入式房险与车险分发商。
  wedge: 一个保单簿迁移指挥中心——摄取被收购保单文件、规范化承保商与合作伙伴数据、编排经纪商授权及同意工作流，并在不中断现有保障的前提下有序安排续保再营销。
  whyNowCatalyst: Matic 的收购案表明，个人险保单簿正在以并购规模被纳入嵌入式多承保商平台，催生了对迁移基础设施的迫切需求——而非更多的获客软件。
  ventureScalePath: 从一次性迁移项目起步，逐步扩展至持续服务 QA、续保再营销编排、承保商绩效分析、合作伙伴归因，并最终成为经纪商、银行及抵押贷款渠道嵌入式个人险运营的系统记录平台。
solution: 产品是一个迁移与服务层，连接被收购保单数据、承保商门户、合作伙伴 CRM 及经纪商服务团队。它创建标准化保单记录，按承保商工作流标记缺失字段，向持牌代理人分配外呼任务，并追踪每个客户家庭是续保还是在续保时进行再营销。系统同时保留合作伙伴归因与佣金逻辑，让分发商能够证明哪家抵押贷款机构、银行或市场合作关系拥有该客户。长期来看，同一平台将成为嵌入式个人险分发中所有承保后服务的操作系统。
goToMarketSeed:
  firstCustomer: 美国嵌入式个人险经纪商，拥有近期收购的 2.5 万至 7.5 万张房险及车险保单、15 家以上分发合作伙伴，且必须在下一波大规模续保前完成服务迁移。
  buyingTrigger: 收购保单簿、经纪商授权转移，或须在一个续保季内上线的大型合作伙伴组合迁移。
  currentAlternative: 内部运营团队拼凑代理管理系统导出、承保商门户、BPO 支持、电子表格及人工外呼。
  switchingReason: 切入点能在高风险迁移期间降低保障断档风险、压缩服务积压，同时为管理层提供追踪保单状态、承保商异常及续保转化经济效益的统一视图。
  pricingHypothesis: 年度平台订阅费加按迁移保单计费，续保再营销与承保商异常处理作为高级模块额外收费。
