topRisks:
- name: 触发事件频率偏低
  description: 单个经纪商发生保单转移的频率可能过低，难以支撑独立软件预算。
  mitigation: 优先切入重复收购方，并在迁移完成后立即将产品扩展至持续续保服务工作流。
- name: 在位厂商工作流锁定
  description: 经纪商可能选择拉伸现有代理管理系统和内部运营团队，而非引入新的工作层。
  mitigation: 定位为与现有 AMS 集成的临时转常设编排层，通过一次实际迁移证明 ROI。
- name: 承保商异常处理复杂度
  description: 承保商特定服务规则差异极大，可能使实施变得服务密集。
  mitigation: 从嵌入式渠道常见的房险与车险承保商起步，将高频异常编码入库，待规则库成熟前分开定价实施费用。
