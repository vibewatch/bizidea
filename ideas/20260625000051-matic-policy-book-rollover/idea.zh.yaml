jobsToBeDone:
- job: 收购个人险保单簿后，帮助我们的服务团队把每个客户家庭迁入我们的系统，且不破坏现有保障——让我们在第一个续保周期内守住收入与客户信任。
  currentAlternative: 电子表格驱动的迁移方案，结合代理管理系统导出、承保商门户及临时服务团队。
  successMetric: 无断档迁移保单比例、每千张保单开放服务工单数，以及前 120 天内的续保留存率。
- job: 并购后重新分配合作伙伴拥有的保单簿时，帮助我们保留归因与佣金逻辑——避免渠道冲突，向承保商和分发商证明经济合理性。
  currentAlternative: 跨 CRM 记录、保单管理文件及财务电子表格的人工对账。
  successMetric: 避免的佣金漏损、阻止的合作伙伴纠纷，以及完成迁移后对账所需天数。
