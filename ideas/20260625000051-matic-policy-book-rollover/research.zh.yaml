    - 48
    - 49
  - point: 将客户家庭、合作伙伴、佣金和服务状态串联在一起的跨系统血缘记录，随着保单簿在贷款机构、银行和代理商之间流转而愈发珍贵。
    sourceRefs:
    - 5
