  validationPlan:
  - priority: high
    question: 重复收购方和嵌入式分发商是在收购完成前购买专用迁移层，还是只在迁移已经进行中时才购买？
    evidenceToGather: 与平台 COO 和服务主管进行十次买家访谈，以及两次针对在手或即将发生转移的付费共创范围确认。
  - priority: high
    question: 产品能否在不引发服务爆炸的情况下摄取前 10 家目标承保商的顶级 AMS 导出格式、承保商下载及合作伙伴元数据？
    evidenceToGather: 跨 Applied Epic、AMS360、ACORD 或 AL3 文件及至少一个贷款平台集成的技术概念验证。
  - priority: medium
    question: 有多少合作伙伴归因和佣金逻辑存在于贷款、银行或金融系统的 AMS 之外？
    evidenceToGather: 与一个嵌入式分发商财务团队和一名承保商合作伙伴经理的探索工作坊，包含样本对账工件。
