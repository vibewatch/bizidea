  - point: 抵押贷款关联的嵌入式保险在美国已相当成熟；Matic 表示其 100 余家合作伙伴占美国抵押贷款市场的 20%，Blend 和 nCino 表明软件生态系统已就位。
    sourceRefs:
    - 7
