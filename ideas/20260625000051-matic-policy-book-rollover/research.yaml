competitors:
- name: Applied Epic
  stage: incumbent
  wedge: Agency management system spanning quoting, policy lifecycle, accounting, and reporting.
  pricing: Custom enterprise quote / demo-led sale
  strength: Deep system-of-record footprint across independent agencies and broad lifecycle coverage.
  weaknessVsUs: Optimized for steady-state servicing, not a migration-specific command center for acquired books and partner attribution.
  sourceRefs:
  - 49
  - 48
- name: Vertafore AMS360
  stage: incumbent
  wedge: Full-agency management and carrier workflow support from bind through renewal.
  pricing: Custom enterprise quote / demo-led sale
  strength: Strong day-to-day servicing workflows and direct carrier connectivity inside a familiar AMS.
  weaknessVsUs: Built to run the agency, not to orchestrate a one-time multi-carrier rollover event across embedded channels.
  sourceRefs:
  - 36
  - 35
- name: Novidea
  stage: scale-up
  wedge: Cloud-native insurance management platform for agencies, brokers, MGAs, and wholesalers.
  pricing: Custom enterprise quote
  strength: Modern, data-driven platform with a broad digital distribution lifecycle view.
  weaknessVsUs: Broad platform sale risks becoming too general compared with a sharp rollover-event wedge.
  sourceRefs:
  - 39
- name: AgentSync
  stage: scale-up
  wedge: Producer licensing, appointments, and compliance data infrastructure.
  pricing: Custom enterprise quote
  strength: Strong fit for appointment, licensing, and regulatory workflow pain.
  weaknessVsUs: Manages producer records rather than household policy migration, renewal sequencing, or partner attribution.
  sourceRefs:
  - 55
  - 31
- name: Patra
  stage: incumbent
  wedge: Technology-enabled insurance outsourcing for servicing and endorsements.
  pricing: Services contract / custom quote
  strength: Elastic labor capacity for endorsement, renewal, and servicing backlogs.
  weaknessVsUs: Services-heavy substitute without a canonical migration data model or software-first control plane.
  sourceRefs:
  - 44
  - 56
