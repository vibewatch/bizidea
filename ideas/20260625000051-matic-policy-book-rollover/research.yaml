openQuestions:
- How many U.S. embedded personal-lines distributors experience at least one qualifying book-transfer event per year versus once-a-decade migrations?
- Which carrier and AMS combinations dominate the first ten design-partner opportunities, and how reusable are the data mappings across them?
- Will buyers fund the product before an acquisition closes, or only once a live migration and renewal deadline are visible?
- How much partner-attribution and commission logic sits outside the AMS in lender, banking, or finance systems that the startup would also need to ingest?
