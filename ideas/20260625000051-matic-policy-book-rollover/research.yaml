  validationPlan:
  - priority: high
    question: Do repeat acquirers and embedded distributors buy a dedicated rollover layer before an acquisition closes, or only once a live migration is under way?
    evidenceToGather: Ten buyer interviews with platform COOs and servicing heads plus two paid design-partner scoping exercises on live or imminent transfers.
  - priority: high
    question: Can the product ingest the top AMS export formats, carrier downloads, and partner metadata for the first 10 target carriers without a services explosion?
    evidenceToGather: A technical proof of concept across Applied Epic, AMS360, ACORD or AL3 files, and at least one lender-platform integration.
  - priority: medium
    question: How much of partner attribution and commission logic lives outside the AMS in lender, banking, or finance systems?
    evidenceToGather: Discovery workshops with one embedded distributor finance team and one carrier-partnership manager, including sample reconciliation artifacts.
