modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Deals[Event-driven deals] --> Customers[Paying customers]\n  Customers --> Scope[Scoping + implementation fees]\n  Customers --> Recurring[Recurring platform + add-on ARR]\n  Scope --> Revenue[Recognized revenue]\n  Recurring --> Revenue\n  Revenue --> GrossProfit[Gross profit after delivery / cloud costs]\n  GrossProfit --> Opex[Payroll + operating spend]\n  Opex --> Cash[Ending cash]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景通过拿下 12 个事件驱动企业账户、并将成熟账户从迁移费转化为周期性续保 QA 及异常工作流支出，在第三年实现 $3.35M 收入。
- checkName: 必须做到
  finding: 至少一半成熟客户需购买迁移后周期性模块，收入结构才能向 70% 毛利率转移，而非停留在实施密集型。
- checkName: 模型崩溃条件
  finding: 若销售周期滑后约两个月或模块采购停滞，悲观情景现金在下次融资窗口前转负。
- checkName: 下一轮验证点
  finding: seed 轮就绪的验证点约为 Month 24 拥有 5–6 个生产客户、两个 AMS 连接器、十家承保商，且周期性采购已可见。
sanityChecks:
  ruleOf40: Y3 growth 111.7% + EBITDA margin -8.2% = 103.5%
  burnMultiple: Y2 烧钱倍数 1.1x（约 $91.65 万 EBITDA 亏损对应 $85.4 万净新增收入），Y3 随 Q4 EBITDA 转正改善至 0.2x。
  revenuePerFte: $304.9K Y3（11 名 Y3 期末员工；垂直 SaaS 基准约 $20–40 万）
  flags:
  - 第三年仅勉强度过现金低谷：全年 EBITDA 仍为负，尽管 Q4 略微转正。
  - 模型依赖少量大型企业事件；缺少两个客户就足以将悲观情景推入现金转负。
  - 周期性耐久性仍是假设而非已验证——因为第一次续保 QA 转化要到第一年末才发生。
  - 毛利率改善假设承保商状态异常处理变得可复用；若实施持续定制化，交付利润将令人失望。
