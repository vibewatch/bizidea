  downside:
    description: 两个较大客户滑期约一个季度，实施定价落在区间低端，附加模块采购未达目标。
    y3RevenueK: 2444.0
    y3EbitdaK: -878.5
    cashLowPointK: -474.7
    keyAssumptionChanges:
    - Month 36 累计客户激活至 11 个而非 12 个。
    - 周期性平台收入降至 $18K/客户-月，附加模块降至 $5K。
    - 第三年仅 4 个客户采购周期性附加模块。
  base:
    description: 创始人主导销售在 Month 36 拿下 12 个客户，实施复用逐步改善，周期性附加模块在大多数成熟账户落地。
    y3RevenueK: 3354.0
    y3EbitdaK: -276.1
    cashLowPointK: 482.8
    keyAssumptionChanges:
    - 客户在 M2、M3、M12、M15、M20、M24、M26、M28、M30、M31、M34、M35 激活。
    - 周期性平台收入 $20K/客户-月，约 60% 成熟账户附加 $7K 模块。
    - 毛利率从交付阶段 50–60% 逐步提升至周期性收入阶段 70%。
  upside:
    description: 事件时机配合，定价落在初始区间高端，模块采购在第二个续保周期前显著更强。
    y3RevenueK: 4043.0
    y3EbitdaK: 144.7
    cashLowPointK: 947.3
    keyAssumptionChanges:
    - Month 36 累计客户激活达 13 个，多笔交易提前约一个季度成交。
    - 实施定价平均 $55K/客户-月，周期性收入升至 $21K 加 $8K 附加模块。
    - 第三年 8 个成熟客户采购周期性模块。
