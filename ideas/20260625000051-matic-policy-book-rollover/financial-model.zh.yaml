slug: embedded-book-rollover-os
date: '2026-06-25'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date] 模型从计划日期后一个月启动。'
- id: A2
  name: 融资前初始现金
  value: '0'
  unit: USDK
  source: 初创金融启发式假设：模型假定融资轮提供初始运营现金。
- id: A3
  name: Pre-seed 轮于 M1 完成
  value: '2300'
  unit: USDK
  source: '[BP fundingAsk] 取声明 $2–4M 区间低端，规模足以达到 Month 24 里程碑并保留六个月缓冲。'
- id: A4
  name: Month 12 付费客户目标
  value: '3'
  unit: customers
  source: '[BP milestones] 基准情景：Month 3 两个付费范围确认，Month 12 再增一个上线迁移客户。'
- id: A5
  name: Month 24 付费客户目标
  value: '6'
  unit: customers
  source: '[BP milestones] Month 24 达到 4–6 个生产客户；基准情景取区间高端。'
- id: A6
  name: Month 36 付费客户目标
  value: '12'
  unit: customers
  source: '[BP market.som; Research market.som] 第三年基准情景与声明的 12 客户 SOM 一致。'
- id: A7
  name: 范围确认收入
  value: '30'
  unit: USDK per customer-month for first 2 months
  source: '[BP experimentRoadmap; BP investorMemo.firstCustomer] 付费范围确认加试点经济学锚定在 $15–30 万实施区间以下。'
- id: A8
  name: 实施收入
  value: '50'
  unit: USDK per customer-month for months 3-6
  source: '[BP investorMemo.firstCustomer] 四个月 $5 万/月产生 $20 万实施费，处于声明六位数区间内。'
- id: A9
  name: 基础周期性平台收入
  value: '20'
  unit: USDK per customer-month after implementation
  source: '[BP investorMemo.firstCustomer] 折算 $24 万 ARR，处于声明 $12–25 万 ARR 区间内（不含使用量和附加模块）。'
- id: A10
  name: 续保 QA 及异常模块附加收入
  value: '7'
  unit: USDK per customer-month
  source: '[BP product.twelveMonth; BP gtm.pricing] 高级工作流模块为迁移收入之外的扩展提供资金。'
- id: A11
  name: 成熟客户附加模块采购率
  value: '60'
  unit: percent
  source: '[BP gtm.funnelTargets] 基准情景将 50% 以上采购目标上调至 60%，适用于上线满 12 个月以上的客户。'
- id: A12
  name: 客户激活节奏
  value: M2,M3,M12,M15,M20,M24,M26,M28,M30,M31,M34,M35
  unit: months
  source: '[BP milestones; BP strategicChoices.sequencingRationale] 创始人主导的企业销售节奏保持零散且事件驱动。'
- id: A13
  name: 范围确认毛利率
  value: '60'
  unit: percent
  source: 适度服务投入的交付辅助型企业试点的初创金融启发式假设。
- id: A14
  name: 实施毛利率
  value: '50'
  unit: percent
  source: '[BP risks] 早期迁移服务密集，待承保商与 AMS 复用改善前如此。'
- id: A15
  name: 稳态周期性毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 成熟周期性软件目标毛利率 70%。'
- id: A16
  name: 工程师全成本现金支出
  value: '17'
  unit: USDK per FTE-month
  source: 含工资税和福利的高级垂直 SaaS 工程人才的初创金融启发式假设。
- id: A17
  name: 保险运营全成本现金支出
  value: '13'
  unit: USDK per FTE-month
  source: 含福利的有经验保险实施/运营人才的初创金融启发式假设。
- id: A18
  name: 销售全成本现金支出
  value: '16'
  unit: USDK per FTE-month
  source: '[BP team] 先由创始人主导销售，再引入精简的企业 GTM；金额为有负担的早期阶段企业销售启发式假设。'
- id: A19
  name: G&A 及合规全成本现金支出
  value: '15'
  unit: USDK per FTE-month
  source: '[BP operations; BP team] 反映一名合规导向运营者加基础财务/行政支持。'
- id: A20
  name: 招聘顺序
  value: M1 起步 3 名员工；M5 增 1 名工程师；M10 增 1 名工程师、1 名运营负责人、1 名合规/G&A；M15 增 1 名销售；M18 增 1 名工程师；M28 增 1 名销售；M32 增 1 名工程师。
  unit: plan
  source: '[BP team; BP strategicChoices.sequencingRationale] 交付质量先于规模化 GTM。'
- id: A21
  name: 非薪酬运营爬坡
  value: 研发工具/云费用从 $5K 爬升至 $15K/月，GTM 项目从 $2K 爬升至 $13K，G&A 间接费用从 $5K 爬升至 $15K（至 Month 36）。
  unit: USDK per month
  source: '[BP operations] 加上精简合规重型 SaaS 构建的初创金融启发式假设。'
- id: A22
  name: 混合成熟年度 ARPU
  value: '275'
  unit: USDK per customer-year
  source: '[Research market.som] 接近研究假设的每客户约 $25 万，高级模块带来上行空间。'
- id: A23
  name: 混合 CAC
  value: '110'
  unit: USDK per new customer
  source: '[BP gtm.funnelTargets; BP investorMemo] 早期企业事件驱动销售以高触达创始人主导 CAC 建模。'
- id: A24
  name: 单位经济模型月度客户流失率
  value: '1.5'
  unit: percent
  source: 黏性但尚未验证的企业工作流软件的初创金融启发式假设。
