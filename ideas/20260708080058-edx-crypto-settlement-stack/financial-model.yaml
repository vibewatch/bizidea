scenarios:
  downside:
    description: Crypto-launch timelines slip, fewer paid deployments convert to annual control-plane contracts, and onboarding stays more services-heavy than planned.
    y3RevenueK: 3280.0
    y3EbitdaK: -420.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - Q4Y3 paying logos reach roughly 21 instead of 28 because launch triggers and channel intros are slower.
    - Steady-state annual value lands near $240K instead of $270K because second-endpoint and weekend expansions attach later.
    - Gross margin exits around 65% because data normalization and audit-pack setup remain more bespoke than A12 assumes.
  base:
    description: Three paid deployments land in Y1, pilot conversion clears the BP threshold, and partner-sourced demand starts to matter in Y2 without requiring a large sales bench.
    y3RevenueK: 4391.5
    y3EbitdaK: 315.2
    cashLowPointK: 534.5
    keyAssumptionChanges:
    - Paying logos reach 3 by M12, 9 by Q4Y2, and 28 by Q4Y3.
    - Annual customer value exits near $270K as second-endpoint and weekend-workflow expansion gradually layers onto the base contract.
    - Gross margin reaches the BP target 70% only by Q4Y3 after one venue-custodian pattern becomes repeatable.
  upside:
    description: Channel partners source more launch opportunities earlier, onboarding time drops toward the low end of the BP target, and expansions attach faster without much extra headcount.
    y3RevenueK: 5200.0
    y3EbitdaK: 780.0
    cashLowPointK: 700.0
    keyAssumptionChanges:
    - Q4Y3 paying logos reach about 30 instead of 28 because channel partner introductions convert faster.
    - Annual customer value trends toward $295K as second endpoints, reporting, and weekend modules attach earlier.
    - Gross margin reaches about 72% because implementation templates and audit-pack workflows reuse faster than expected.
