slug: crypto-posttrade-break-engine
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-07-08] the model starts in the same month because the funding ask and experiment roadmap begin immediately.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.5M
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2.5-4M + BP fundingAsk.runwayMonths 18] the base case uses the low end of the stated range because the plan stays lean and does not assume full SOM capture by Y3.'
- id: A3
  name: Paying-logo definition
  value: A paying logo is either a paid launch deployment or an annual production contract.
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] this lets early pilot revenue reconcile cleanly before every logo converts to annual software.'
- id: A4
  name: Paid launch deployment value
  value: $90K over about 3 months (~$30K per month)
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract $75k-$150k paid launch deployment] the model uses a conservative lower-midpoint for the initial paid wedge.'
- id: A5
  name: Initial annual production contract value
  value: $240K ARR
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract $200k-$300k annual contract] the model begins slightly below the midpoint while the company is still proving same-day close and audit-evidence value.'
- id: A6
  name: Steady-state annual customer value by Y3 exit
  value: $270K ARR
  unit: USD/logo/year
  source: '[BP market.som 30 customers at about $280k ARR + BP businessModel.expansionLevers] the base case discounts the research SOM slightly because second-endpoint and weekend-workflow expansion attaches gradually.'
- id: A7
  name: Y1 paying-logo ramp
  value: 0,0,0,0,1,1,2,2,2,3,3,3
  unit: customersEop by month
  source: '[BP milestones 0-12 months sign 3 paid launch deployments and convert at least 2 to annual production] the model reaches 3 paying logos by year-end without assuming a broader go-to-market engine yet.'
- id: A8
  name: Y2 paying-logo ramp
  value: Q1-Q4 = 4,5,7,9
  unit: customersEop
  source: '[BP milestones 12-24 months reach 8-10 production logos + BP strategicChoices.sequencingRationale] the model exits month 24 at 9 paying logos, consistent with 8 production logos plus one in-flight paid expansion or pilot.'
- id: A9
  name: Y3 paying-logo ramp
  value: Q1-Q4 = 12,16,21,28
  unit: customersEop
  source: '[BP milestones 24-36 months roughly 30 customers + Research market.som] the base case gets close to the researched SOM but still leaves room between plan and upside.'
- id: A10
  name: Revenue recognition convention and blended ARPU schedule
  value: Revenue equals average paying logos × blended monthly ARPU; Y1 M1-M12 = 0,0,0,0,28,28,26,24,22,21,21,21; Y2 Q1-Q4 = 17,18,19,20; Y3 Q1-Q4 = 20.5,21,21.8,22.5.
  unit: USD K per average logo-month
  source: '[A3-A6 + BP gtm.pricing + Research market.sam/som] early periods are pilot-heavy and later periods shift toward annual contracts plus modest endpoint expansion.'
- id: A11
  name: Base sales cycle and pilot conversion
  value: About 4-5 months from launch trigger to paid pilot and 50%+ pilot-to-annual conversion, yielding 2 annual conversions by Y1 exit.
  unit: timing
  source: '[BP gtm.funnelTargets qualified opportunity to paid pilot 25-40%, paid pilot to annual production 50%+ + BP experimentRoadmap 90-180 days] the customer ramp assumes conversion only after the first daily-close proof point.'
- id: A12
  name: Gross margin ramp
  value: Y1 28-55%, Y2 56-66%, Y3 67-70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions onboarding in 60 days or less + startup-finance heuristic] launch deployments are services-heavy until provider-pattern onboarding becomes reusable.'
- id: A13
  name: Hiring timeline
  value: M1 founder and founding engineer; M4 solutions hire; M7 product lead; M10 partnerships/sales lead; M14 second engineer; M18 G&A/compliance; M20 second solutions hire; M24 third engineer; M27 second GTM hire; M29 fourth engineer; M31 third solutions hire.
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale + startup-finance heuristic] the ramp stays implementation-heavy before adding broader GTM scale.'
- id: A14
  name: Founder loaded cash compensation
  value: $160K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] below-market founder pay is consistent with a lean pre-seed.'
- id: A15
  name: Engineering loaded cash compensation
  value: $210K
  unit: USD/engineer/year
  source: '[BP team Founding eng + product scope across reconciliation, mapping, and audit workflows + startup-finance heuristic] assumes senior technical talent but not late-stage cash comp.'
- id: A16
  name: Solutions / implementation loaded compensation
  value: $180K
  unit: USD/employee/year
  source: '[BP team Solutions and implementation engineer + startup-finance heuristic] reflects enterprise onboarding and books-mapping work needed to hold gross margin near software levels over time.'
- id: A17
  name: Product / operations loaded compensation
  value: $190K
  unit: USD/employee/year
  source: '[BP team Product lead (post-trade operations) + startup-finance heuristic] this role blends product management with domain operations expertise.'
- id: A18
  name: GTM / partnerships loaded compensation
  value: $200K
  unit: USD/employee/year
  source: '[BP team Partnerships / enterprise sales lead + BP gtm.channels + startup-finance heuristic] includes enterprise selling and partner-development capacity once the first reference story exists.'
- id: A19
  name: G&A / compliance loaded compensation
  value: $140K
  unit: USD/employee/year
  source: '[BP regulatoryTechnicalConstraints + startup-finance heuristic] covers finance, vendor management, and compliance-process support for broker-dealer customers.'
- id: A20
  name: Payroll allocation to P&L lines
  value: Founder 60% S&M / 20% R&D / 20% G&A; engineering 100% R&D; solutions 35% S&M / 65% R&D; product 80% R&D / 20% G&A; GTM 100% S&M; G&A 100% G&A.
  unit: allocation
  source: '[BP team role rationales + BP operations] functional allocation follows founder-led enterprise selling, onboarding-heavy delivery, and engineering-first productization.'
- id: A21
  name: Non-payroll operating spend
  value: Y1 monthly $20K-$30K; Y2 quarterly monthly equivalent $34K-$42K; Y3 $46K-$60K
  unit: USD K
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers cloud, audit tooling, travel, legal, insurance, and partner enablement without assuming brand-led marketing.'
- id: A22
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A23
  name: Steady-state monthly logo churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP businessModel.unitOfValue] churn should be low once post-trade close workflow is embedded, but not mature-SaaS perfect.'
- id: A24
  name: CAC convention
  value: $92K CAC = about $0.83M of Y1-Y2 S&M spend divided by 9 end-of-Y2 paying logos
  unit: formula
  source: '[model calc + BP gtm.funnelTargets + BP milestones 12-24 months] this treats founder-led selling, partner sourcing, and implementation-heavy pre-sales as the real acquisition cost to reach seed proof.'
- id: A25
  name: Funding milestone for round sizing
  value: Reach 8-9 production logos, 2 channel partners, and median onboarding at or below 60 days by month 24, then hold 6 months of buffer.
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.runwayMonths 18] the ask is sized to hit the next financing proof point rather than to fund the full 36-month plan.'
- id: A26
  name: Quarterly salary-line convention
  value: Y2-Y3 salary rows use the actual monthly hires inside each quarter rather than only the year-end snapshots.
  unit: convention
  source: '[Headcount column convention + A13] this keeps salary expense internally consistent even though the schema only exposes Q4Y2 and Q4Y3 snapshots for later years.'
