  y3RevenueImpactK: 90.0
  cashImpactK: -300.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts[Target launch-stage accounts] --> PaidDeployments[Paid launch deployments]
      PaidDeployments --> ProductionLogos[Annual production logos]
      ProductionLogos --> EndpointExpansion[Second endpoints and workflow expansion]
      EndpointExpansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue is driven by moving from 3 paying logos at Y1 exit to 28 by Q4Y3 while blended annual value rises from pilot-heavy pricing to about $270K per mature production logo.
- checkName: Must go right
  finding: The model only works if one venue-custodian pattern really onboards in 60 days or less so gross margin can rise toward 70% before the company adds a broad sales bench.
- checkName: Model breaks if
  finding: The downside case and sales-cycle sensitivity show that slower launch triggers or services-heavy onboarding can push cash close to $0.1M before the seed-ready proof point is secure.
- checkName: Next-round proof
