scenarios:
  downside:
    description: 加密上线时间线继续后移，更少的付费部署能转成年化控制层合同，而且接入仍比计划更偏服务化。
    y3RevenueK: 3280.0
    y3EbitdaK: -420.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - 到 Q4Y3，付费客户只到约 21 个，而不是 28 个，因为上线触发点和渠道引荐都更慢。
    - 稳态年度客户价值停在约 $240K，而不是 $270K，因为第二端点和周末扩展挂载得更晚。
    - 毛利率只到约 65%，因为数据归一和审计材料包配置仍比 A12 假设更定制。
  base:
    description: Y1 落下 3 个付费部署，试点转化达到商业计划阈值，Y2 开始合作伙伴带来的需求真正起作用，但还不需要一大张销售团队。
    y3RevenueK: 4391.5
    y3EbitdaK: 315.2
    cashLowPointK: 534.5
    keyAssumptionChanges:
    - 付费客户到 M12 为 3 个、Q4Y2 为 9 个、Q4Y3 为 28 个。
    - 随着第二端点和周末工作流扩展逐步叠加到基础合同上，年度客户价值在退出时接近 $270K。
    - 只有到 Q4Y3，一种交易场所/托管模式真正可复用之后，毛利率才摸到商业计划的 70% 目标。
  upside:
    description: 渠道合作伙伴更早带来更多上线机会，上线时间压到商业计划目标区间低端附近，而扩展模块挂载更快，额外团队却不用加太多。
    y3RevenueK: 5200.0
    y3EbitdaK: 780.0
    cashLowPointK: 700.0
    keyAssumptionChanges:
    - 到 Q4Y3，付费客户能到约 30 个，而不是 28 个，因为渠道引荐转化更快。
    - 随着第二端点、报告和周末模块更早挂载，年度客户价值会往 $295K 走。
    - 毛利率能到约 72%，因为实施模板和审计材料工作流的复用速度快于预期。
