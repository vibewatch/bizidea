modelDiagram:
  title: 单位经济流
  mermaid: |
    flowchart LR
      TargetAccounts[Target launch-stage accounts] --> PaidDeployments[Paid launch deployments]
      PaidDeployments --> ProductionLogos[Annual production logos]
      ProductionLogos --> EndpointExpansion[Second endpoints and workflow expansion]
      EndpointExpansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎的核心，是从 Y1 期末 3 个付费客户，走到 Q4Y3 的 28 个；同时混合年化价值也会从偏试点定价，抬到每个成熟正式生产客户约 $270K。
- checkName: 必须跑通的地方
  finding: 这个模型只有在“一种交易场所 + 一种托管模式”真能在 60 天或更短时间内接入时才站得住；只有这样，毛利率才能在公司扩销售前往 70% 靠。
- checkName: 模型会失灵，如果
  finding: 下行情景和销售周期敏感性都说明，只要上线触发点来得更慢，或接入继续偏服务化，现金就可能在拿到下一轮融资证明点前掉到接近 $0.1M。
- checkName: 下一轮融资证明点
  finding: 下一轮融资要讲得通，必须在第 24 个月前做到 8-9 个正式生产客户、2 个活跃渠道合作伙伴，以及可重复的 60 天内上线——而这正是 $2.5M 融资需求配上缓冲后要买到的证明点。
sanityChecks:
  ruleOf40: Y3 增长 253.2% + EBITDA 利润率 7.2% = 260.4%
  burnMultiple: Y2 burn multiple 约 0.8x：约 $0.98M 的 EBITDA burn，对应约 $1.16M 的净新增 ARR（按 Q4 年化收入口径）；H2Y3 开始 EBITDA 转正。
  revenuePerFte: Y3 期末 12 名 FTE 对应 $366.0K 收入/FTE（垂直 SaaS 基准为 $200-400K）
  flags:
  - 基准情景仍假设公司能在 Q4Y3 走到 28 个付费客户，而滩头市场又是一个以美国为主、相对狭窄的细分；因此，渠道合作伙伴执行是模型最容易失手的地方。
  - “期末客户数”这列既包含付费上线部署，也包含年度正式生产合同，所以在 Y1 大部分时间，甚至到第 24 个月附近，真正纯经常性的正式生产客户数都低于表面计数。
  - 只有当数据归一、审计材料配置和周末异常手册被模板化，而不是继续停留在定制服务层，毛利率才有机会摸到 70%。
  - 研究里的 SOM 指向的是约 30 家客户、每家约 $280K ARR；而基准情景只承保 28 个客户、每家约 $270K，以便始终低于完整 aspiration。
  - 现金直接按 EBITDA 建模，所以企业采购时点、试点预付款或客户定制实施成本，都可能让真实现金相对这条简化滚动表前后偏几百 K。
