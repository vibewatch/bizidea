slug: crypto-posttrade-break-engine
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-07-08] 因为融资需求和实验路线图都从同月立刻启动，模型也从同一个月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $2.5M
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2.5-4M + BP fundingAsk.runwayMonths 18] 基准情景取区间下限，因为计划本身偏精简，也没有假设到 Y3 就吃满 SOM。'
- id: A3
  name: 付费客户定义
  value: 付费客户既可以是付费上线部署，也可以是年度正式生产合同。
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] 这样可以在每个客户都转成年度软件之前，把早期试点收入先对齐清楚。'
- id: A4
  name: 付费上线部署金额
  value: 约 3 个月合计 $90K（约每月 $30K）
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract $75k-$150k paid launch deployment] 模型在最初付费切口上取了偏保守的中低位。'
- id: A5
  name: 首份年度正式生产合同金额
  value: $240K ARR
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract $200k-$300k annual contract] 公司还在证明当日关账和审计证据价值，所以模型起点放在区间中点略下。'
- id: A6
  name: 到 Y3 结束时的稳态年度客户价值
  value: $270K ARR
  unit: USD/logo/year
  source: '[BP market.som 30 customers at about $280k ARR + BP businessModel.expansionLevers] 基准情景把研究里的 SOM 略微打折，因为第二端点和周末工作流扩展会逐步附加，不会一步到位。'
- id: A7
  name: Y1 付费客户爬坡
  value: 0,0,0,0,1,1,2,2,2,3,3,3
  unit: customersEop by month
  source: '[BP milestones 0-12 months sign 3 paid launch deployments and convert at least 2 to annual production] 模型在年末走到 3 个付费客户，但还没有提前假设更强的 GTM 引擎。'
- id: A8
  name: Y2 付费客户爬坡
  value: Q1-Q4 = 4,5,7,9
  unit: customersEop
  source: '[BP milestones 12-24 months reach 8-10 production logos + BP strategicChoices.sequencingRationale] 模型让第 24 个月期末达到 9 个付费客户，对应 8 个正式生产客户外加 1 个仍在推进的付费扩展或试点。'
- id: A9
  name: Y3 付费客户爬坡
  value: Q1-Q4 = 12,16,21,28
  unit: customersEop
  source: '[BP milestones 24-36 months roughly 30 customers + Research market.som] 基准情景接近研究里的 SOM，但仍给计划与上行情景之间留出空间。'
- id: A10
  name: 收入确认口径与混合 ARPU 节奏
  value: 收入 = 平均付费客户数 × 混合月 ARPU；Y1 M1-M12 = 0,0,0,0,28,28,26,24,22,21,21,21；Y2 Q1-Q4 = 17,18,19,20；Y3 Q1-Q4 = 20.5,21,21.8,22.5。
  unit: USD K per average logo-month
  source: '[A3-A6 + BP gtm.pricing + Research market.sam/som] 早期阶段以试点收入为主，后期才逐步切到年度合同加适度端点扩展。'
- id: A11
  name: 基准销售周期与试点转化
  value: 从上线触发点到付费试点约 4-5 个月，试点转年约 50%+，到 Y1 结束时形成 2 个年度转化。
  unit: timing
  source: '[BP gtm.funnelTargets qualified opportunity to paid pilot 25-40%, paid pilot to annual production 50%+ + BP experimentRoadmap 90-180 days] 客户爬坡只在出现第一次日常关账证明点之后才开始转化。'
- id: A12
  name: 毛利率爬坡
  value: Y1 28-55%，Y2 56-66%，Y3 67-70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions onboarding in 60 days or less + startup-finance heuristic] 上线部署在早期更像服务，只有当服务商组合的接入开始可复用之后，毛利率才会往软件水平爬。'
- id: A13
  name: 招聘时间线
  value: M1 创始人和创始工程师；M4 解决方案岗位；M7 产品负责人；M10 合作伙伴/销售负责人；M14 第二名工程师；M18 G&A/合规；M20 第二名解决方案岗位；M24 第三名工程师；M27 第二名 GTM 岗位；M29 第四名工程师；M31 第三名解决方案岗位。
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在更广的 GTM 扩张之前，团队爬坡会优先补实施能力。'
- id: A14
  name: 创始人总现金薪酬
  value: $160K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] 低于市场价的创始人现金薪酬，符合精简的 pre-seed 配置。'
- id: A15
  name: 工程团队总现金薪酬
  value: $210K
  unit: USD/engineer/year
  source: '[BP team Founding eng + product scope across reconciliation, mapping, and audit workflows + startup-finance heuristic] 假设公司要吸引资深技术人才，但现金薪酬还没到后期公司的水平。'
- id: A16
  name: 解决方案 / 实施团队总薪酬
  value: $180K
  unit: USD/employee/year
  source: '[BP team Solutions and implementation engineer + startup-finance heuristic] 这个数字反映了企业接入和账簿映射工作；只有把这部分压下来，毛利率才守得住软件级别。'
- id: A17
  name: 产品 / 运营团队总薪酬
  value: $190K
  unit: USD/employee/year
  source: '[BP team Product lead (post-trade operations) + startup-finance heuristic] 这个岗位同时承担产品管理和领域运营能力。'
- id: A18
  name: GTM / 合作团队总薪酬
  value: $200K
  unit: USD/employee/year
  source: '[BP team Partnerships / enterprise sales lead + BP gtm.channels + startup-finance heuristic] 一旦有了第一段可引用的客户案例，这个岗位就需要同时承担企业销售和合作伙伴拓展。'
- id: A19
  name: G&A / 合规团队总薪酬
  value: $140K
  unit: USD/employee/year
  source: '[BP regulatoryTechnicalConstraints + startup-finance heuristic] 这笔预算覆盖财务、供应商管理以及面向券商客户的合规流程支持。'
- id: A20
  name: 薪酬在损益表科目的分摊
  value: 创始人 60% 计入 S&M / 20% 计入 R&D / 20% 计入 G&A；工程 100% 计入 R&D；解决方案 35% 计入 S&M / 65% 计入 R&D；产品 80% 计入 R&D / 20% 计入 G&A；GTM 100% 计入 S&M；G&A 100% 计入 G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 职能分摊围绕创始人主导企业销售、实施较重的交付，以及工程优先的产品化节奏来做。'
- id: A21
  name: 非薪酬运营支出
  value: Y1 月度 $20K-$30K；Y2 按季度折算的月度水平 $34K-$42K；Y3 $46K-$60K
  unit: USD K
  source: '[BP operations + BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 这里覆盖云资源、审计工具、差旅、法律、保险和合作伙伴赋能，不预设品牌驱动营销。'
- id: A22
  name: 现金转化口径
  value: 现金变动 = EBITDA
  unit: formula
  source: '[startup-finance heuristic] 在 pre-seed 规模下，资本开支、税、融资费用和营运资金时点都假设影响不大。'
- id: A23
  name: 稳态月度客户流失率
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP businessModel.unitOfValue] 一旦交易后关账工作流嵌入客户日常，流失率理应很低，但也不能假设成成熟 SaaS 那样完美。'
- id: A24
  name: CAC 口径
  value: $92K CAC = 约 $0.83M 的 Y1-Y2 S&M 支出 ÷ Y2 期末 9 个付费客户
  unit: formula
  source: '[model calc + BP gtm.funnelTargets + BP milestones 12-24 months] 这里把创始人主导销售、合作伙伴引荐和实施前销售，都算进拿到 seed 证明点之前的真实获客成本。'
- id: A25
  name: 融资规模对应里程碑
  value: 到第 24 个月做到 8-9 个正式生产客户、2 个渠道合作伙伴，以及 60 天或更短的中位上线时间，并额外留出 6 个月缓冲。
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.runwayMonths 18] 融资额是按下一个融资证明点来定，不是按完整 36 个月计划去配。'
- id: A26
  name: 季度薪酬口径
  value: Y2-Y3 的薪资行按季度内真实入职月份计算，而不是只看年末快照。
  unit: convention
  source: '[Headcount column convention + A13] 虽然后两年结构只展示 Q4Y2 和 Q4Y3 快照，但薪资行还是按季度内真实入职月份计算，确保费用自洽。'
