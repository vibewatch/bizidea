slug: crypto-posttrade-break-engine
date: "2026-07-08"
executiveSummary: >-
  Crypto Posttrade Break Engine should be built as a U.S.-first post-trade
  control plane for broker-dealers and private-bank brokerage platforms that are
  turning on institutional spot crypto through outsourced venues and qualified
  custodians. The first credible customer is a regional broker-dealer or
  private-bank brokerage platform that has already chosen one venue and one
  custodian, is moving from pilot trades to live client allocations, and cannot
  close the books cleanly with spreadsheets and portal exports. The immediate
  pain is not exchange access; it is allocating fills to the right client
  sub-accounts, matching venue, settlement, custody, and internal-book records,
  and producing audit-ready evidence before close in a 24/7 market. The product
  should therefore start as a paid launch deployment for one provider pattern
  and then convert into annual software once the customer relies on it for
  daily exceptions, same-day close, and books-and-records support. Research
  suggests a real but still early software category, with an estimated $315.0M
  TAM, $112.5M beachhead SAM, and $8.4M year-3 SOM, plus a plausible expansion
  path into confirmations, financing, margin, reporting, and eventually
  tokenized-securities middle office. Why believe: infrastructure providers are
  accelerating institutional crypto launch readiness, while no named competitor
  clearly owns neutral client allocation, cross-book reconciliation, and audit
  evidence for broker-dealers. Why doubt: the current corpus does not quantify
  actual break frequency, median time to close, or direct willingness to pay
  for a standalone neutral layer before venues and custodians bundle enough
  baseline workflow. The first 90 days should therefore be spent collecting
  live exception logs, proving onboarding time for one venue and custodian
  pattern, and converting at least one paid launch deployment into annual
  production.
problem:
  - "Launch-stage broker-dealers and private-bank brokerage platforms can now buy crypto execution, clearing, and custody through outsourced providers, but they still have to allocate each fill to the right client sleeve and reconcile venue, clearer, custodian, and internal books before close."
  - "The default workflow is spreadsheets, CSV exports, adapted equities tools, and email escalation, which creates books-and-records risk, slows same-day close, and forces operations headcount growth exactly when firms want to scale institutional crypto programs."
solution:
  - "Deliver a neutral post-trade control plane for one venue, one settlement or clearing leg, one qualified custodian, and one internal books export that normalizes identifiers, maps fills to client sub-accounts, and surfaces quantity, fee, price, or settlement-instruction breaks before books are finalized."
  - "Package the first deployment as a launch-readiness implementation plus exception workflow with audit-ready evidence, then expand inside the account to more entities, endpoints, asset classes, and adjacent post-trade workflows."
whyWeWin:
  - "Venue, custody, wallet, and trading vendors optimize their own leg of the workflow, while generic post-trade stacks are not designed for 24/7 crypto settlement and custody-state complexity; the neutral reconciliation layer is the gap between them."
  - "Each customer deployment creates reusable mapping tables, exception playbooks, and benchmark data on break types and settlement timing that improve onboarding speed and make the product harder to replace than a point integration."
strategicChoices:
  beachhead: "U.S. regional broker-dealers and private-bank brokerage platforms launching agency BTC and ETH trading for 25-200 institutional or advised accounts through one institution-only venue and one qualified custodian."
  wedgeRationale: >-
    This segment already has budgeted launch work, acute books-and-records
    exposure, and enough workflow complexity to justify a $200k-plus annual
    contract, but it is still narrow enough that a one-venue, one-custodian
    product can show proof within a quarter. Selling first to crypto-native
    hedge funds or universal banks would either reduce urgency around
    broker-dealer controls or expand implementation scope beyond what an early
    company can absorb.
  sequencingRationale: >-
    Start with read-only ingestion, same-day allocation, exception routing, and
    audit evidence for one provider pattern because research shows identifier
    mismatch and recordkeeping are the first blockers. Only after 2-3
    production logos prove deployment speed should the company add deeper
    ledger write-backs, second-provider patterns, and a partner-led channel,
    since scaling sales or product breadth before onboarding is repeatable
    would turn the business into expensive custom services.
  notYet:
    - "Crypto-native exchanges, hedge funds, or omnibus-only workflows that do not require broker-dealer client-account allocation"
    - "Front-office execution, best-execution analytics, or wallet-governance products already served by Talos, Fireblocks, and custody providers"
    - "Multi-jurisdiction or tokenized-securities support before the U.S. spot-crypto beachhead reaches repeatable onboarding and referenceable production closes"
market:
  tam: "$315.0M estimated TAM based on roughly 900 buyer platforms at about $350k blended annual value for enterprise post-trade control software."
  sam: "$112.5M estimated initial SAM based on about 450 U.S. regional broker-dealers and private-bank brokerage platforms at roughly $250k ARR for one venue and custodian pattern."
  som: "$8.4M estimated year-3 SOM based on 30 reachable customers at about $280k ARR if onboarding and pilot conversion assumptions hold."
  segments:
    - "Primary: U.S. regional broker-dealers and private-bank brokerage platforms launching outsourced institutional spot crypto"
    - "Secondary: agency execution desks and brokerage platforms expanding from spot into financing, margin, or tokenized-securities workflows after launch"
  buyingProcess: >-
    The day-to-day champion is usually the Head of Digital-Asset Operations or
    Head of Brokerage Technology, but the deal closes only when the COO or
    compliance owner sees go-live blocked by manual allocation, close, or
    audit-readiness work. The first contract should attach to a dated launch or
    pilot-to-production milestone for one venue and custodian stack, then
    convert to annual software once the customer trusts the daily close and
    evidence model.
product:
  mvp: >-
    Ingest fills and end-of-day files for one venue, one settlement or clearing
    leg, one qualified custodian, and one internal books export; auto-map fills
    to client sub-accounts, detect exceptions, route them to named operators,
    and generate a searchable audit pack for same-day close. Keep the MVP
    read-only and human-reviewed rather than attempting autonomous settlement or
    front-office workflows.
  sixMonth: "Ship a production workflow for one provider pattern with CSV and API ingestion, canonical asset and account mapping, weekend and next-business-day exception routing, finance-ready close files, and role-based case history for 2-3 design partners."
  twelveMonth: "Add second venue and custody patterns, configurable rules for fees and settlement instructions, immutable audit logs, and limited write-backs into the customer's ticketing or ledger workflow so 4-6 customers can run the system as their post-trade source of truth."
  twentyFourMonth: "Expand from spot allocation and reconciliation into confirmations, financing and margin support, regulatory reporting outputs, and benchmark analytics on break rates and settlement windows, while keeping the product provider-neutral across multiple venues and custodians."
  keyBets:
    - "The first painful workflow is client-level allocation and exception handling at launch, not broad crypto OMS replacement."
    - "A read-only control plane can prove value and win budget before customers demand deep write-backs into core broker systems."
    - "One venue and one custodian implementations can be productized fast enough to keep gross margin software-like rather than services-like."
    - "The same data model can extend from spot post-trade into higher-value middle-office workflows without losing provider neutrality."
gtm:
  wedge: "Sell a paid launch-readiness deployment for one venue and custodian pair during the gap between connectivity sign-off and live client allocations, then convert that workflow into an annual post-trade control subscription once the customer relies on it for daily close and audit evidence."
  channels:
    - "Founder-led direct sales to COOs, heads of digital-asset operations, and brokerage-technology leaders at firms that have already selected an external venue or custodian"
    - "Co-sell with institution-only venues, prime or clearing providers, custodians, and their implementation partners that can win larger institutions if post-trade controls are in place"
    - "Referrals from middle-office consultants, FIS-style brokerage modernization teams, and digital-asset launch advisers already mapping books-and-records workflows"
  funnelTargets: "target account→qualified launch opportunity 20-30%, qualified opportunity→paid pilot 25-40%, paid pilot→annual production 50%+, production logo→second endpoint or workflow expansion 40%+ within 12 months"
  pricing: >-
    Start with a paid 8-12 week launch deployment, then price annual software
    by active legal entities, average daily allocated volume, and connected
    venue and custodian endpoints, with onboarding fees for rule mapping and
    source normalization. This matches how buyers budget the problem today:
    brokerage-technology modernization, custody and compliance readiness, and
    headcount avoidance rather than discretionary crypto experimentation.
businessModel:
  revenueStreams:
    - "Annual subscription for the post-trade control plane, exception workflow, and audit-evidence retention"
    - "Onboarding and integration fees for the first venue and custodian pattern and books mapping"
    - "Expansion modules for additional venues, custodians, asset classes, reporting outputs, and financing or margin workflows"
  unitOfValue: "Active legal entities and connected venue and custodian patterns under daily post-trade control"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more client entities, advisors, or broker programs within the same customer once the first launch is stable"
    - "Add second venues, custodians, or prime and clearing relationships that force cross-provider reconciliation"
    - "Upsell adjacent workflows such as confirmations, regulatory reporting outputs, financing, margin, and treasury controls"
    - "Use benchmark data and partner integrations to become the default neutral middle-office layer for new crypto launches"
strategyMap:
  northStarMetric: "Daily client-allocation closes completed with no unresolved venue, clearer, custodian, or internal-book breaks"
  inputMetrics:
    - "Days from kickoff to first same-day close for a new provider pattern"
    - "Percentage of trades auto-matched before manual intervention"
    - "Median exception resolution time by break type"
    - "Paid pilot to annual production conversion rate"
    - "Average number of connected endpoints and legal entities per production customer"
  moatsToBuild:
    - "Cross-system mapping tables linking venue fills, client sub-accounts, custody instructions, and internal books"
    - "Exception histories and operator-resolution playbooks tied to actual break outcomes"
    - "Benchmark data on weekend break patterns, settlement windows, and counterparty behavior across provider combinations"
    - "An audit-evidence model accepted by compliance and finance teams as the durable record of post-trade truth"
  killCriteria:
    - "Fewer than 6 of the first 15 qualified ICP interviews confirm live spreadsheet-based client allocation or daily reconciliation pain at crypto launch."
    - "Fewer than 2 of the first 4 paid pilots convert into annual contracts above $200k ARR within 6 months of go-live."
    - "Median time to onboard one venue and custodian pattern exceeds 60 days across the first 3 deployments because data normalization is too bespoke."
    - "More than half of the first 6 competitive deals are lost to bundled venue, custody, or wallet tooling despite provider-neutral positioning."
  mermaid: |
    flowchart LR
      Wedge[Launch-stage broker-dealer crypto post-trade wedge] --> MVP[One venue plus one custodian allocation and break engine]
      MVP --> Proof[Same-day close and audit-ready evidence]
      Proof --> Expansion[Provider-neutral digital-asset middle-office OS]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "High-pain, well-defined wedge with credible ACV and category tailwinds, but conviction depends on proving real break volume and standalone willingness to pay before bundling closes the gap."
    whyBelieve: "Research shows infrastructure providers are accelerating institutional crypto launch readiness, while no named competitor cleanly owns neutral client allocation, cross-book reconciliation, and audit evidence for broker-dealers."
    whyDoubt: "The thesis still lacks direct evidence on exception frequency, deployment speed, and whether buyers will pay a separate vendor before venues or custodians bundle enough controls."
    nextDiligence: "Get anonymized exception logs and one paid design-partner deployment that proves a broker-dealer will replace spreadsheets with a $200k-plus annual neutral control layer."
  firstCustomer:
    title: "Head of Digital-Asset Operations at a U.S. regional broker-dealer"
    profile: "A 50-300 advisor or institutional relationship manager platform launching outsourced BTC and ETH trading for 25-200 client accounts through one institution-only venue and one qualified custodian."
    trigger: "The firm moves from pilot connectivity to live client allocations and realizes daily close, books-and-records, and weekend exception handling cannot be sustained in spreadsheets."
    buyer: "COO, Head of Digital-Asset Operations, or Head of Brokerage Technology"
    initialContract: "$75k-$150k paid launch deployment for one provider pattern, credited toward a $200k-$300k annual contract once the customer completes a production close cycle and keeps the system live for daily exceptions."
  mustBeTrue:
    - "Launch-stage broker-dealers must experience enough recurring allocation and reconciliation pain that a neutral control layer beats adding one or two operations hires."
    - "At least half of early paid pilots must convert to annual contracts above $200k ARR because the workflow repeats every trading day and during every audit."
    - "One venue plus one custodian plus one internal-book pattern must cover enough of the day-one pain that onboarding stays under roughly 60 days."
    - "Provider-neutral exception handling must remain meaningfully better than bundled venue, custody, or wallet modules for multi-provider customers."
    - "The product must expand from spot post-trade into adjacent middle-office workflows before the initial launch beachhead saturates."
  diligenceQuestions:
    - "What do anonymized exception logs from 3-5 launch-stage broker-dealers show about break frequency, break types, and time to close?"
    - "Which budget owner actually signs first: COO, brokerage technology, operations, or compliance?"
    - "How often do target customers run one provider pair versus multiple venue, prime, and custody relationships, and how soon does that complexity appear?"
    - "What exact features would make Talos, Fireblocks, BitGo, or Paxos good-enough substitutes in the first year?"
    - "Can the company land through CSV and read-only workflows first, or do buyers require deeper ledger and ticketing integrations before paying?"
operatingAssumptions:
  - assumption: "Buyers will pay for a standalone neutral post-trade layer before their venue, custodian, or wallet vendor bundles a sufficient alternative."
    basis: research.yaml
    validationTest: "Run 10 buyer interviews and 4 proposal cycles with EDX-, Prometheum-, Fireblocks-, BitGo-, or Copper-linked operators and confirm at least 2 paid pilots at the target price band."
    decisionImpact: "If false, the company must shift from standalone SaaS to partner-embedded distribution or a narrower service-led launch product."
  - assumption: "A one-venue and one-custodian canonical schema can onboard the first three customers in 60 days or less."
    basis: idea.yaml
    validationTest: "Instrument the first 3 deployments from kickoff to first same-day close and confirm median onboarding time stays at or below 60 days with limited custom code."
    decisionImpact: "If false, implementation economics break and hiring must tilt toward services rather than software engineering."
  - assumption: "Client-level allocation and audit evidence are higher-priority pains than deeper trading, wallet, or treasury features for the first customer."
    basis: idea.yaml
    validationTest: "In 15 ICP interviews, at least 8 buyers rank allocation, close, or audit readiness above front-office analytics or wallet-governance enhancements."
    decisionImpact: "If false, the wedge must move closer to existing trading or custody systems, increasing competitive pressure and roadmap breadth."
  - assumption: "The beachhead contains enough near-term launchers to support 8-10 production customers by month 24 without moving upmarket prematurely."
    basis: research.yaml
    validationTest: "Build a named-account list of 50 SAM prospects and confirm at least 15 have chosen or are choosing a venue and custodian stack within 12 months."
    decisionImpact: "If false, the company must concentrate on fewer higher-ACV enterprise logos or expand sooner into adjacent digital-asset workflows."
  - assumption: "An immutable case history and audit pack can satisfy compliance and finance teams without the product becoming the system of record for every downstream ledger on day one."
    basis: research.yaml
    validationTest: "Run one mock audit walkthrough and one month-end close review with design partners and confirm they accept the platform's evidence outputs as operationally sufficient."
    decisionImpact: "If false, the roadmap must pull forward ledger write-backs and control attestations, increasing product scope and capital needs."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 15 U.S. broker-dealer and private-bank operations leaders and collect anonymized workflow maps for launch-stage crypto programs."
    hypothesis: "The go-live window between venue and custody sign-off and live client allocations is the highest-urgency buying moment."
    successMetric: "At least 10 interviews confirm a dated launch milestone and at least 6 share spreadsheet-based allocation or reconciliation workflows."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Run a concierge reconciliation prototype on one historical day of data from one venue, one custodian, and one internal books export."
    hypothesis: "A canonical schema can surface most real breaks without deep write-backs into core systems."
    successMetric: "Prototype correctly classifies 80% or more of known breaks and produces a usable same-day close file for one design partner."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Close 2 paid launch deployments tied to one venue and custodian go-live."
    hypothesis: "Operations and brokerage-technology buyers will fund a paid pilot before a full annual contract if it reduces launch risk."
    successMetric: "2 signed paid pilots at $75k or more and at least 1 converts to annual production within 6 months."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Pilot one co-sell motion with a venue, custodian, or post-trade implementation partner."
    hypothesis: "Partners can surface qualified deals faster than pure outbound once the product is positioned as launch-enablement infrastructure."
    successMetric: "One partner sources at least 3 qualified introductions and 1 paid pilot."
    owner: "Partnerships lead"
  - horizon: "180-360 days"
    experiment: "Productize second-provider patterns and weekend exception routing inside the first production accounts."
    hypothesis: "Expansion to a second endpoint or weekend workflow increases ACV without materially slowing support."
    successMetric: "At least 2 production customers add a second endpoint or weekend module and expand ACV by 25% or more."
    owner: "Product lead"
  - horizon: "180-540 days"
    experiment: "Add audit-pack and limited ticket or ledger write-back integrations for the first month-end close reviews."
    hypothesis: "Compliance and finance teams will treat the platform as the operational record of post-trade exceptions once evidence and downstream handoffs are integrated."
    successMetric: "Two customers use the system in a real close or audit cycle with no fallback to manual spreadsheet master files."
    owner: "Solutions and implementation engineer"
operations:
  - "Maintain a canonical asset, account, and custody-instruction schema for each supported venue and custodian pattern and version every mapping change."
  - "Run human-in-the-loop exception routing with weekend and next-business-day close playbooks instead of promising straight-through processing before data quality is proven."
  - "Produce immutable case histories, searchable audit packs, and finance-ready close files for every production customer."
  - "Package onboarding around a fixed implementation playbook with venue, custodian, and internal-books checkpoints so deployments do not become open-ended consulting."
  - "Build co-sell and referral motions with venues, custodians, and brokerage modernization partners only after the first referenceable production close."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own buyer discovery, founder-led enterprise sales, and partner positioning because the core risk is whether operations pain wins a standalone budget."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the canonical data model, reconciliation engine, and case-management workflow that determine onboarding speed and product credibility."
  - role: "Solutions and implementation engineer"
    startTiming: "Month 3-6"
    rationale: "Shorten venue and custodian onboarding, translate customer books into the schema, and keep gross margin from collapsing into services work."
  - role: "Product lead (post-trade operations)"
    startTiming: "Month 6-9"
    rationale: "Codify exception taxonomies, audit-pack requirements, and roadmap tradeoffs from the first production customers into repeatable product choices."
  - role: "Partnerships / enterprise sales lead"
    startTiming: "Month 9-12"
    rationale: "Scale co-sell motions with venues, custodians, and modernization partners only after the company has one repeatable deployment story."
milestones:
  - horizon: "0-12 months"
    items:
      - "Validate break frequency, budget owner, and onboarding time with 15 design-partner interviews and 3 live data exercises."
      - "Sign 3 paid launch deployments for one venue and custodian pattern."
      - "Convert at least 2 deployments into annual production contracts and complete one referenceable daily close cycle."
      - "Ship immutable case history, audit pack, and weekend exception routing for the first provider pattern."
  - horizon: "12-24 months"
    items:
      - "Support at least 2 venue patterns and 2 custody or prime patterns with repeatable onboarding."
      - "Reach 8-10 production logos and land 2 channel partners that source qualified launch deals."
      - "Add second-endpoint, confirmations, and reporting expansions inside at least 3 customer accounts."
      - "Prove median onboarding time at or below 60 days across the production cohort."
  - horizon: "24-36 months"
    items:
      - "Reach the researched year-3 SOM of roughly 30 customers and about $8.4M ARR if ACV assumptions hold."
      - "Expand into financing, margin, or regulatory-reporting workflows without losing provider-neutral positioning."
      - "Benchmark break types, settlement windows, and exception-resolution performance across the installed base."
      - "Decide whether to move upmarket into larger bank and tokenized-securities programs or stay focused on regional brokerage launches."
risks:
  - risk: "Actual launch-stage exception volume may be too low or episodic to justify a standalone $200k-plus software category."
    likelihood: High
    impact: High
    mitigation: "Collect live exception logs before scaling headcount, target buyers at the exact pilot-to-production inflection, and sell paid launch deployments before annual SaaS."
  - risk: "Venue, custody, wallet, or trading vendors may bundle enough reconciliation and workflow to compress the wedge."
    likelihood: Medium
    impact: High
    mitigation: "Differentiate on cross-provider client allocation, neutral audit evidence, and faster onboarding across mixed stacks, then use providers as channels where possible."
  - risk: "Identifier mismatch and data quality could make deployments slower and more services-heavy than planned."
    likelihood: High
    impact: High
    mitigation: "Limit v1 to one provider pattern, instrument onboarding time aggressively, and hire implementation talent before scaling sales."
  - risk: "Regulatory or market-adoption shifts could delay broker-dealer crypto launches even if infrastructure vendors keep expanding."
    likelihood: Medium
    impact: High
    mitigation: "Focus on firms that have already chosen a venue and custodian stack and position the product as control software needed for audit and close, not as a bet on speculative trading volume."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5-4M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months should fund the first provider-pattern product, 2-3 paid launch deployments, 2 annual production customers, productized onboarding, and the initial channel partnerships needed to test whether a neutral post-trade layer can scale into a broader digital-asset middle-office platform."
