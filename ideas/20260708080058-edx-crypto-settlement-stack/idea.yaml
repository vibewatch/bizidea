jobsToBeDone:
  - job: >-
      When we launch outsourced institutional crypto trading, help our operations team allocate each fill and reconcile every record before close, so we can scale client volume without hiring a separate crypto middle office.
    currentAlternative: Spreadsheet allocations and manual reconciliation across venue, custodian, and internal books
    successMetric: Same-day close rate and post-trade breaks per 1,000 trades
  - job: >-
      When finance or compliance sees a mismatch between the venue, clearer, and custodian, help us isolate the exact break and produce evidence fast, so unresolved exceptions do not stall client trading or month-end close.
    currentAlternative: Email escalations, CSV comparisons, and one-off engineering queries
    successMetric: Time to resolve a settlement or custody break and percentage of exceptions with complete audit evidence
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Two same-day sources and a large round explicitly center clearing, settlement, FlowConnect, and trust-charter buildout, giving a concrete infrastructure shift even if the startup wedge sits one layer above EDX itself.
  painIntensity:
    score: 4
    rationale: Post-trade breaks create books-and-records risk and can stall new institutional programs, even though the sources do not publish the operational error rates directly.
  wedgeClarity:
    score: 5
    rationale: Same-day allocation and reconciliation across venue, clearer, and custodian records is a narrow workflow with a clear operator buyer, trigger, and manual alternative.
  defensibility:
    score: 4
    rationale: Neutral integrations, reconciliation logic, client-allocation rules, and historical exception data create compounding workflow depth that a single venue or custodian will struggle to match across the market.
  ventureScale:
    score: 4
    rationale: The beachhead is narrow, but the same control plane can expand into digital-asset financing, reporting, treasury, and eventually tokenized-securities middle-office workflows.
topRisks:
  - name: Adoption pace lags the signal
    description: Institutional distributors may still move slower than the funding headlines suggest, delaying the first wave of customers.
    mitigation: Start with firms that have already chosen one venue and one custodian, then sell into the mandatory launch window between pilot connectivity and live client allocations.
  - name: Venue or custodian bundling
    description: EDX, a qualified custodian, or a brokerage-platform vendor could add a basic reconciliation module and compress the initial wedge.
    mitigation: Stay neutral across venues and custodians, focus on client-level allocation and exception workflows, and win where customers need one system across multiple providers.
  - name: Integration and data-model complexity
    description: Heterogeneous APIs, exports, and asset identifiers could make deployments slow and expensive if the product tries to cover too many stacks at once.
    mitigation: Launch with a narrow read-write workflow for one venue/custodian pattern, standardize a canonical schema, and productize implementation playbooks before broadening coverage.
