problem: >-
  FlowConnect-style crypto-as-a-service rails let broker-dealers and bank platforms turn on institutional digital-asset trading without owning the full venue, clearing, or custody stack. But the hardest work still lands in their middle office: mapping fills to client sub-accounts, matching venue, clearer, and custodian records, and producing books-and-records evidence from systems that were never designed for 24/7 crypto settlement. Teams end up stitching CSVs, email approvals, and adapted equities workflows together, so every new client or asset increases break risk and slows rollout.
targetUser:
  primary: Digital-asset operations and middle-office leaders at U.S. regional broker-dealers and private-bank brokerage platforms using outsourced institutional crypto venue and custody stacks
  secondary: Product, finance, and compliance leaders standing up digital-asset agency execution programs
  buyer: COO, Head of Digital-Asset Operations, or Head of Brokerage Technology
startupThesis:
  nonObviousInsight: >-
    As institution-only venues add clearing, settlement, custody, and crypto-as-a-service, exchange connectivity stops being the scarcest problem. The new bottleneck is the neutral middle-office layer that can translate one outsourced crypto fill into correct client allocation, settlement, and audit evidence across venue, clearer, and custodian systems.
  beachhead: >-
    U.S. regional broker-dealers and private-bank brokerage platforms launching agency BTC and ETH trading for 25-200 RIA, family-office, or hedge-fund accounts through an external institution-only venue plus qualified custodian, with 3-15 digital-asset operations staff and daily spreadsheet reconciliations
  wedge: >-
    A post-trade break and allocation engine that ingests fills from the venue, maps them to client sub-accounts and custody instructions, reconciles venue, clearer, and custodian records, and opens exception workflows before books are finalized
  whyNowCatalyst: >-
    EDX is simultaneously funding trading, clearing, settlement, FlowConnect, and an OCC-trust custody footprint, so institutions can add crypto access faster than they can build a matching post-trade operating layer.
  ventureScalePath: >-
    Start with outsourced institutional crypto brokerage post-trade, then expand into financing, margin, confirmations, regulatory reporting, treasury, and eventually the middle-office operating system for digital-asset brokers, banks, and tokenized-securities desks.
solution: >-
  Build a post-trade control plane that ingests execution fills from institution-only venues, normalizes asset and account identifiers, and applies allocation rules for each client sleeve or legal entity. The platform matches those records against central-clearing and qualified-custody data, flags quantity, price, or settlement-instruction breaks, and opens role-based exception workflows before books are finalized. It also generates client confirms, finance-ready end-of-day files, and audit evidence showing how each fill moved from execution through custody. The first product is intentionally narrow—same-day allocation and reconciliation for outsourced spot crypto—but the same data model can extend into financing, margin, and cross-venue treasury workflows.
goToMarketSeed:
  firstCustomer: >-
    COO or digital-asset operations lead at a U.S. regional broker-dealer or private-bank brokerage platform with 50-300 advisors or institutional relationship managers, launching outsourced BTC/ETH execution for 25-200 family-office, hedge-fund, or advisor-managed accounts through one institution-only venue and one qualified custodian
  buyingTrigger: >-
    The firm signs its first external venue and custody integration or moves from pilot trades to live client allocations, forcing operations to support daily reconciliation without adding headcount
  currentAlternative: Spreadsheet allocations, CSV exports from venue and custodian portals, adapted equities middle-office systems, and manual exception handling over email and chat
  switchingReason: >-
    It gives tradfi-style post-trade control without replacing the execution or custody provider, catching breaks before they hit books and letting a small operations team support a larger crypto client base
  pricingHypothesis: >-
    Annual subscription priced by active legal entities, daily trade-volume bands, and connected venue/custodian endpoints, with onboarding fees for rule mapping and data integrations
