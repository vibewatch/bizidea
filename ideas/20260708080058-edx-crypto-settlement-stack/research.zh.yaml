openQuestions:
- 有多少处在上线早期的券商，已经在按客户层级每天做加密资产分配，而不是只做总账户级别的交易？
- 落到实操里，第一套事实来源系统到底是谁：OMS/EMS、总账、托管门户，还是交易场所导出文件？
- 早期差错里，有多少是数量、费用、结算指令或钱包状态不匹配，而不是纯粹的价格问题？
- 交易场所和托管方会不会开放足够的 API 与事件细节来支撑自动化，还是说很多第一批部署仍得从 CSV 和门户导出起步？
