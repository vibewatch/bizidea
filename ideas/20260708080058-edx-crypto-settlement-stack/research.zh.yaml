competitors:
- name: Talos
  stage: 成长期
  wedge: 面向数字资产的机构交易、投资组合、资金管理和结算软件。
  pricing: 企业定制报价；已抓取页面没有公开价目表。
  strength: 前中后台一体化交易姿态强，能在一套栈里覆盖投资组合管理、对账和结算能力。
  weaknessVsUs: 它的重心是广义交易平台，不是站在第三方交易场所、清算方、托管方和内部账本之上的中立券商差错引擎。
