  pestle:
  - factor: 政治
    impact: positive
    point: 政策方向已经从一刀切的不确定，转向为券商和更广泛的加密市场框架提供更具体的操作路径。
    sourceRefs:
    - 3
    - 11
    - 12
  - factor: 经济
    impact: positive
    point: 资本效率、对手方风险下降和随时可用的市场接入，正在一起把更好的交易后基础设施推成刚需。
    sourceRefs:
    - 10
    - 24
    - 32
    - 60
  - factor: 社会
    impact: neutral
    point: 机构买家想通过熟悉的经纪、托管和报告工作流拿到加密敞口，而不是切换到原生加密的运营方式。
    sourceRefs:
    - 4
    - 13
    - 31
  - factor: 技术
    impact: positive
    point: 中央清算、场外结算、钱包治理和 API 驱动的资金操作等核心原语，已经足够成熟，可以在上面搭产品。
    sourceRefs:
    - 8
    - 18
    - 19
    - 26
  - factor: 法律
    impact: negative
    point: 能参与加密市场，并不等于券商就不用再扛占有或控制、证券记录、审计和留痕义务。
    sourceRefs:
    - 1
    - 2
    - 11
    - 12
  adoptionFrictionMatrix:
  - friction: 交易场所、清算方、托管方和内部账本的标识符对不齐
    severity: high
    affectedBuyer: 数字资产运营负责人
    mitigation: 先把一个交易场所/托管组合的标准数据模型跑通，再加更多端点。
    sourceRefs:
    - 8
    - 19
    - 26
  - friction: 扩规模前就得先拿出可供审计的控制证据
    severity: high
    affectedBuyer: COO 或首席合规官
    mitigation: 从第一天起就设计不可变事件日志、可检索案例历史和可导出的审计材料包。
    sourceRefs:
    - 1
    - 2
    - 11
    - 12
  - friction: 加密交易 24/7 跑，而大多数券商运营团队和关账流程并不是
    severity: high
    affectedBuyer: 经纪运营经理
    mitigation: 先用可配置的异常路由、周末告警和下一工作日关账逻辑，不要一开始就承诺全自动直通处理。
    sourceRefs:
    - 24
    - 32
    - 60
  - friction: 来自交易、托管和钱包厂商的打包压力，会拖慢独立采购决策
    severity: medium
    affectedBuyer: 经纪技术负责人
    mitigation: 坚持中立，证明跨服务商的差错解决就是比任何单一厂商模块更强。
    sourceRefs:
    - 15
    - 17
    - 21
    - 24
