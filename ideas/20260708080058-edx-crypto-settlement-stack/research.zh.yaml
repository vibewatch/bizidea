  pricing: 企业定制报价；已抓取页面没有公开价目表。
  strength: 牌照深、基础设施导向强，同时具备即时结算和 SEC 清算资质背书。
  weaknessVsUs: Paxos 优化的是自家的受监管基础设施，不是独立站在多家外部交易场所和托管方之上的控制器。
