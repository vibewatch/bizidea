  strength: 托管、结算和抵押品能力都很强，结构受监管，且适配 24/7 工作流。
  weaknessVsUs: BitGo 吃住了托管与结算的一大段，但并不掌握券商内部中立的客户分配逻辑和跨账异常工作流。
