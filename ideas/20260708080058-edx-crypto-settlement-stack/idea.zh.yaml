jobsToBeDone:
- job: 当我们上线外包机构级加密交易时，帮运营团队在收盘前把每笔成交分到正确账户，并把所有记录对齐，这样我们就能在不单独再养一支加密中台团队的前提下，支撑更大的客户规模。
  currentAlternative: 在交易场所、托管方和内部账本之间，用表格做分配并手工对账
  successMetric: 当日关账率，以及每 1,000 笔交易的交易后差错数
- job: 当财务或合规发现交易场所、清算方和托管方数据对不上时，帮我们快速定位具体差错并拿出证据，这样未解决的异常就不会拖住客户交易或月末关账。
  currentAlternative: 靠邮件升级、CSV 对比和一次性的工程查询来排查
  successMetric: 解决结算或托管差错所需时间，以及具备完整审计证据的异常占比
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两家同日来源，加上一轮大额融资，明确把清算、结算、FlowConnect 和信托牌照建设摆到台前；即便创业切口站在 EDX 上一层，这仍是一轮很具体的基础设施位移。
  painIntensity:
    score: 4
    rationale: 交易后差错会带来账簿与记录风险，还可能拖住新的机构项目上线；虽然来源没有直接公布运营差错率，但痛点足够真。
  wedgeClarity:
    score: 5
    rationale: 围绕交易场所、清算方和托管方记录做当日分配与对账，是一条足够窄的工作流；操作员买家、触发点和手工替代方案都很清楚。
  defensibility:
    score: 4
    rationale: 中立集成、对账逻辑、客户分配规则和历史异常数据，会形成不断复利的工作流深度；单一交易场所或托管方很难在全市场复制。
  ventureScale:
    score: 4
    rationale: 滩头市场虽然窄，但同一控制层可以继续长到数字资产融资、报告、资金管理，最终延伸到代币化证券的中台工作流。
topRisks:
- name: 采用节奏跟不上信号
  description: 机构分发方的推进速度，可能仍比融资新闻标题所暗示的慢，导致首波客户来得更晚。
  mitigation: 先盯住已经选好一个交易场所和一个托管方的公司，在试点连通到真实客户分配之间那个必须上线的窗口里切进去。
- name: 交易场所或托管方打包压缩切口
  description: EDX、合格托管方或券商平台供应商，可能补上一层基础对账模块，压缩最初切口。
  mitigation: 继续保持跨交易场所和跨托管方的中立，主打客户级分配和异常工作流，专门赢在“客户需要一套系统横跨多个提供商”的场景。
- name: 集成与数据模型复杂度过高
  description: 如果产品一开始就想覆盖太多栈，异构 API、导出格式和资产标识符会让部署变慢、成本变高。
  mitigation: v1 先收窄到单一交易场所/托管模式的读写工作流，先把标准数据模型和实施手册产品化，再往外扩。
