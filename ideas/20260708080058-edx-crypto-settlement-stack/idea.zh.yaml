differentiator: 交易场所提供商、清算所和托管方各自只拥有自己那一段流程，也都没有动力去做横跨三方的中立事实来源系统。传统券商后台厂商默认的是批量结算、熟悉的证券标识，以及没有钱包状态复杂度的世界；而原生加密交易工具通常也不服务券商级控制要求。只要这家公司卡在执行、清算和托管交界处，就能不断积累专有的映射规则、客户分配逻辑和异常历史；客户账户、交易场所和资产类型越多，这些积累就越值钱。
