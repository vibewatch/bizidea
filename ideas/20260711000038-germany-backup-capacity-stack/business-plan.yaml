slug: "battery-capacity-bid-os"
date: "2026-07-11"
executiveSummary: >-
  Battery Capacity Bid OS should start as a tender-readiness workspace for
  Germany-focused storage developers entering the May 2027 storage-eligible
  backup-capacity round. The pain is not generic project management; it is
  deciding which 20-100 MW sites can clear the tender and still survive lender
  diligence before teams overspend on EPC, legal, and grid work. The first
  sale is a paid readiness sprint for a developer with 2-5 live sites and no
  in-house capacity-market desk when a site-option, interconnection, or lender
  milestone forces a bid or no-bid decision. The MVP should unify rule
  versioning, site triage, bid-cap economics, battery-duration assumptions, and
  exportable bid or lender packets in one workspace. Research supports a
  concentrated but real market: about 40 German near-term accounts and a $6.0M
  initial SAM, with willingness to pay highest when the product improves
  debtability or avoids dead-end spend. The company should not start as an
  optimizer, VPP, or generic development OS; it wins by becoming the neutral
  layer connecting German tender logic, site facts, financing assumptions, and
  collaborative documents. The biggest disconfirming risk is not demand in the
  abstract; it is whether final 2027 rules and lender behavior leave a
  sufficiently large, software-buying beachhead once real projects are filtered
  for grid access and site control. Because that risk is unresolved, the plan
  assumes a pre-seed build with 18 months of runway and treats adjacent EU
  markets, hydrogen-ready peakers, and post-award compliance as sequential
  expansions rather than day-one scope.
problem:
  - >-
    Developers pursuing Germany's new storage-eligible backup-capacity tender
    still stitch together regulatory counsel, consultant models, EPC inputs,
    and internal spreadsheets just to decide whether one site is worth taking
    to debt and bid preparation.
  - >-
    By the time interconnection, site-option, or lender milestones arrive, a
    wrong assumption on duration, flexibility, guarantees, or cap economics can
    strand months of development spend on sites that will not clear or finance.
solution:
  - >-
    A versioned workspace ingests the current tender rules, site attributes,
    interconnection status, duration assumptions, EPC inputs, and tolling or
    merchant cases to produce a bid or no-bid decision for each active site.
  - >-
    The product exports lender-ready packets, bid-room artifacts, and
    compliance assumptions so the same project thesis survives internal
    investment review, external advisors, and financing diligence without being
    rebuilt in separate decks and spreadsheets.
whyWeWin:
  - >-
    Market modelers, benchmark vendors, optimizers, and advisors each solve one
    slice of the job, but none is the neutral system of record that links
    German tender logic, site triage, financing assumptions, and collaborative
    documents for one portfolio.
  - >-
    A buyer-controlled workspace is more credible than OEM or optimizer
    software in the pre-bid phase because developers with mixed vendors still
    need to compare design and financing choices before locking delivery
    partners.
  - >-
    Each project compounds proprietary data on which site profiles, battery
    durations, bid levels, and downside-protection structures actually clear
    and finance, creating a dataset that consultants and single-vendor tools do
    not naturally accumulate.
strategicChoices:
  beachhead: >-
    Germany-focused storage developers and IPP origination teams with 2-5
    standalone 20-100 MW battery sites, limited in-house capacity-market depth,
    and a live plan to pursue the May 2027 storage-eligible round.
  wedgeRationale: >-
    This slice has an immediate budget trigger because one portfolio decision
    can redirect EPC, legal, grid, and lender spend within weeks; success is
    measurable with one fast proof point: identify which sites deserve further
    spend and produce one lender-credible packet before the team commits more
    capital.
  sequencingRationale: >-
    Start with rule versioning, site triage, cap-based bid modeling, and
    lender-room exports for one German workflow because those are the minimum
    features required to kill dead-end sites and win debt confidence. Add
    compliance tracking after the first submissions, then adjacent German peaker
    workflows and only later a second EU market; hire regulatory-modeling and
    solutions talent before quota sales, and add benchmark or lender
    partnerships only after the first two pilots show the packet is reused
    rather than rewritten.
  notYet:
    - "Large utilities and sponsors with established in-house capacity desks"
    - "Trading optimization, VPP dispatch, or merchant-revenue maximization after connection"
    - "Hydrogen-ready peakers, hybrid assets, or other EU capacity markets before at least 3 storage references are live"
    - "Generic renewable project-management software outside tender and lender workflows"
market:
  tam: >-
    $40.0M estimated TAM across roughly 250 Europe-wide buyers of
    flexible-capacity development and financing workflow software at about $160k
    annual spend.
  sam: >-
    $6.0M estimated initial SAM from about 40 Germany-focused near-term
    accounts spending about $150k annually after filtering the visible battery
    pipeline for real tender readiness.
  som: >-
    $1.8M researched year-3 SOM from about 10 developer accounts at roughly
    $150k ACV plus 3 advisor or lender accounts at roughly $100k ACV.
  segments:
    - "Primary: Germany-focused standalone battery developers preparing 20-200 MW projects for the 2027 storage-eligible backup-capacity tender"
    - "Secondary: IPP origination, project-finance, and advisor teams packaging battery-led flexible-capacity portfolios for the same process"
  buyingProcess: >-
    The day-to-day champion is usually the Head of Development or
    market-analytics lead when a site option, interconnection milestone, or
    lender conversation forces a bid or no-bid decision. Budget approval
    typically sits with the Chief Development Officer, Head of Origination, or
    CEO, while finance, EPC, legal, and lenders influence the purchase because
    the platform must stand up in diligence.
product:
  mvp: >-
    The MVP should support one German tender workflow with rule-versioned
    eligibility logic, site intake, duration and cap-based bid scenarios,
    investment-committee memos, and exportable lender and advisor packets for a
    2-5 site portfolio. It is intentionally not a dispatch optimizer, trading
    engine, or generic project tracker.
  sixMonth: >-
    Ship 2 paid design-partner pilots, version the current law and tender
    assumptions, and prove that one live portfolio can move from site intake to
    lender-ready package in under 10 business days.
  twelveMonth: >-
    Convert at least 2 pilots into annual subscriptions, add collaborative
    redlines and audit trails for lenders and advisors, and launch pre-built
    templates for guarantees, prequalification, EPC, LTSA, warranty, and
    compliance assumptions.
  twentyFourMonth: >-
    Expand into post-award compliance monitoring and one adjacent
    capacity-development workflow—either hydrogen-ready peakers in Germany or
    one additional EU capacity market—only after Germany storage customers are
    referenceable and the core model remains software-led.
  keyBets:
    - "Standard 2-4 hour Li-ion projects remain eligible enough in the final 2027 rules to sustain a meaningful first buyer pool"
    - "Developers will pay before tender submission if the product prevents dead-end EPC, legal, and lender work"
    - "A standardized lender room can survive first-pass bank and advisor review with limited rewrite"
    - "One narrow German workflow produces reusable templates fast enough to keep implementation cost below ACV"
gtm:
  wedge: >-
    Sell a paid tender-readiness sprint for one Germany portfolio when a
    developer must choose which sites to shape for the May 2027 round and brief
    lenders, then convert the workspace into an annual subscription once the
    bid thesis becomes the system of record.
  channels:
    - "Founder-led direct sales to Heads of Development, Heads of Origination, and CEOs at Germany-focused storage developers with live sites"
    - "Referrals from lenders, tolling counterparties, benchmark vendors, and project-finance advisors already shaping bankability decisions"
    - "Selective partnerships with OEMs, optimizers, and grid or regulatory advisors after the lender packet proves reusable across mixed-vendor portfolios"
  funnelTargets: "Triggered account→qualified discovery 30-40%, qualified discovery→paid readiness sprint 20-30%, paid sprint→annual production 60%+, production→multi-site or advisor expansion 40%+ within 12 months."
  pricing: >-
    Charge a €30k-€50k portfolio-readiness sprint for 2-5 live sites,
    creditable toward a €120k-€180k annual subscription priced by active
    tender-eligible sites plus premium lender-room or submitted-bid modules.
    This fits the researched roughly $150k annual spend envelope and aligns
    price to avoided dead-end spend and faster debt readiness.
businessModel:
  revenueStreams:
    - "Annual subscription for rule-versioned tender workspaces, scenario models, and collaborative bid rooms"
    - "Premium modules for submitted bid rooms, lender diligence packets, and advisor collaboration"
    - "Post-award compliance monitoring and milestone-tracking subscriptions once a customer wins or stays active across tender cycles"
  unitOfValue: "Active tender-eligible site under collaborative bid management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more sites within the same developer once the first portfolio is modeled"
    - "Sell advisor and lender seats on the same underlying workspace"
    - "Expand from Germany storage into adjacent capacity workflows that reuse the same rule and diligence engine"
    - "Layer benchmark datasets on clearing outcomes, duration choices, and downside-protection structures on top of the core workspace"
strategyMap:
  northStarMetric: "Active sites advanced from intake to lender-ready bid status through the platform"
  inputMetrics:
    - "Paid readiness sprint win rate among triggered accounts"
    - "Median days from site intake to bid or no-bid package"
    - "Pilot-to-annual conversion rate"
    - "Average number of lender or advisor redline cycles per packet"
    - "Production accounts expanding to a second site or second workflow"
  moatsToBuild:
    - "Dataset linking site characteristics, battery duration, bid levels, and financing outcomes across German tender cycles"
    - "Reusable diligence graph for guarantees, prequalification, EPC, LTSA, warranty, and regulatory evidence"
    - "Benchmark library of how developers, lenders, and offtakers underwrite downside protection and bankability"
  killCriteria:
    - "Fewer than 3 of the first 12 triggered ICP accounts buy a paid readiness sprint at €30k or more"
    - "The first 3 pilots fail to cut site-intake-to-lender-ready output below 10 business days"
    - "Banks or advisors reject the standardized packet as insufficient in 2 of the first 3 live diligence processes"
    - "Final 2027 rules leave fewer than 15 credible beachhead accounts or make standard 2-4 hour batteries noncompetitive for the target round"
  mermaid: |
    flowchart LR
      Wedge[Germany storage tender wedge] --> MVP[Rule-versioned bid workspace]
      MVP --> Proof[Paid pilots and lender-accepted bid rooms]
      Proof --> Expansion[More sites, advisors, and adjacent capacity markets]
investorMemo:
  verdict:
    call: "Watch"
    conviction: >-
      Strong pain and a disciplined wedge, but conviction stays limited until
      final tender rules and lender behavior prove that Germany contains a large
      enough software-buying beachhead.
    whyBelieve: >-
      Germany has moved from policy debate to a named procurement calendar with
      a storage lane, a visible bid cap, and financing complexity that manual
      spreadsheets handle poorly.
    whyDoubt: >-
      The first market is concentrated, substitutes are credible, and adjacent
      incumbents or consultants may absorb budget before a standalone workflow
      layer becomes indispensable.
    nextDiligence: >-
      Secure 2-3 paid design partners and validate one lender-accepted
      standardized bid room on a live portfolio before underwriting broader
      European expansion.
  firstCustomer:
    title: "Head of Development at a Germany-focused standalone BESS developer"
    profile: >-
      A developer with 2-5 standalone 20-100 MW sites under option, limited
      in-house capacity-market modeling depth, and an immediate need to decide
      which site deserves EPC, legal, and lender spend.
    trigger: >-
      Passage of the law plus a site-option, interconnection, or
      lender-outreach milestone forces the team to lock duration, revenue
      assumptions, and bid strategy before incurring more development cost.
    buyer: "Chief Development Officer or CEO"
    initialContract: >-
      A €30k-€50k readiness sprint for one 2-5 site portfolio that converts
      into a €120k-€180k annual subscription plus lender-room or submitted-bid
      modules once one site advances to formal debt and bid preparation.
  mustBeTrue:
    - "At least 25% of triggered German storage developers choose a paid readiness sprint over consultants plus internal spreadsheets"
    - "The first 3 pilots reduce site-intake-to-lender-ready output to 10 business days or less from a multi-week manual baseline"
    - "At least 2 banks or project-finance advisors accept the exported packet with only minor redlines and no full rewrite"
    - "After filtering for grid access, site control, and sponsor readiness, Germany still offers at least 15 reachable beachhead accounts before EU expansion"
    - "At least half of paid readiness sprints convert into annual software contracts above €120k or multi-site expansions"
  diligenceQuestions:
    - "How many of the visible German battery projects are controlled by subscale developers versus utilities with strong internal desks?"
    - "What final de-rating, availability, and penalty rules will the 2027 storage-eligible round impose on standard 2-4 hour batteries?"
    - "How much current consultant, modeling, and advisor spend is actually replaceable rather than merely documented by the software?"
    - "Will lenders and tolling counterparties treat a software-generated bid room as a first-class diligence artifact?"
    - "Which adjacent workflow expands cleanly next: hydrogen-ready peakers in Germany or a second EU capacity market with similar evidence requirements?"
operatingAssumptions:
  - assumption: >-
      Germany still contains at least 15-20 credible beachhead accounts after
      filtering the visible pipeline for real grid access, site control, and
      financing readiness.
    basis: "research.yaml"
    validationTest: >-
      Build an account-by-account map of the top 40 apparent prospects and
      proceed only if at least 15 meet minimum site-control, connection, and
      sponsor-readiness thresholds.
    decisionImpact: >-
      If false, tighten the ICP further, reduce the hiring plan, and delay
      venture-style expansion claims until a second market is identified.
  - assumption: >-
      Triggered buyers will pay software-style pricing before tender submission
      because the product avoids dead-end development spend and shortens lender
      preparation.
    basis: "idea.yaml"
    validationTest: >-
      Interview 12 triggered developers and close at least 2 paid readiness
      sprints at €30k or more tied to live site or lender milestones.
    decisionImpact: >-
      If false, the company must reprice as lighter software, bundle more
      services, or treat the wedge as advisor-enablement rather than direct
      SaaS.
  - assumption: >-
      Standard 2-4 hour Li-ion projects remain competitive enough under the
      final 2027 storage rules to support the initial storage-only wedge.
    basis: "research.yaml"
    validationTest: >-
      Review final tender documents with 3 developers or counsel memos and
      confirm that at least one common 2-4 hour configuration still clears
      modeled qualification and economics.
    decisionImpact: >-
      If false, narrow the product to longer-duration or hybrid assets, or
      postpone the market entry until a broader workflow is justified.
  - assumption: >-
      Lenders and advisors will accept a standardized bid room if it exposes
      tolling, EPC, LTSA, warranty, and regulatory assumptions transparently.
    basis: "research.yaml"
    validationTest: >-
      Run 3 live packet reviews with banks, debt advisors, or tolling
      counterparties and count the work as validated only if at least 2 accept
      the structure with limited redlines.
    decisionImpact: >-
      If false, the roadmap shifts toward advisor tooling or managed services
      and gross-margin expectations should be reset.
  - assumption: >-
      A small regulatory-modeling team can keep rule versions and templates
      current without turning the company into a consulting shop.
    basis: "operator judgment"
    validationTest: >-
      Track time spent on rule updates across the first 2 tender revisions and
      3 customer pilots; the assumption holds only if monthly maintenance stays
      below one full-time equivalent.
    decisionImpact: >-
      If false, the company needs either higher pricing, narrower scope, or
      more capital before scaling sales.
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Map the top 40 German storage prospects and run 15 interviews across developers, advisors, and lenders."
    hypothesis: "The visible project pipeline still yields at least 15 credible near-term accounts with a shared tender-readiness problem."
    successMetric: "At least 15 accounts meet the beachhead screen and at least 6 interviews confirm a named budget owner and live trigger."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Recreate one live portfolio decision in software using current tender rules, 3 sample sites, and lender-room exports."
    hypothesis: "A narrow rule engine and document workflow can replace multi-sheet manual modeling for the first use case."
    successMetric: "The prototype produces a site ranking, bid range, and lender packet for 3 sites in under 10 business days."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Convert 2 design partners into paid readiness sprints on real 2-5 site portfolios."
    hypothesis: "Triggered teams will pay before bid submission if the product changes where they spend EPC, legal, and debt time."
    successMetric: "At least 2 pilots close at €30k or more and each delivers a formal bid or no-bid decision."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Run lender and advisor packet reviews on the first pilot outputs."
    hypothesis: "A standardized bid room can survive first-pass diligence with limited bespoke rework."
    successMetric: "At least 2 external reviewers accept the packet structure with minor redlines only."
    owner: "Solutions / finance lead"
  - horizon: "180-365 days"
    experiment: "Add structured benchmark and tolling inputs through 2 partner workflows."
    hypothesis: "Partner data and referral channels improve win rate and reduce manual scenario work without compromising product neutrality."
    successMetric: "At least 25% of qualified pipeline is partner-sourced or partner-assisted and pilot preparation time falls by 30%."
    owner: "Founder/CEO"
  - horizon: "180-365 days"
    experiment: "Launch post-award compliance beta with the first annual customer."
    hypothesis: "Customers will expand after submission or award because the original bid assumptions become the compliance baseline."
    successMetric: "The first production customer buys or pilots the compliance module and keeps the workspace active beyond the initial bid cycle."
    owner: "Solutions / finance lead"
operations:
  - "Maintain an auditable rule-version library so every workspace is tied to a specific law, tender document, and technical template set."
  - "Run a structured assumption review covering site data, EPC, LTSA, warranty, grid, and tolling inputs before any lender packet is exported."
  - "Keep standard templates for guarantees, prequalification, and lender-room evidence that can be updated centrally as TSOs or advisors change requirements."
  - "Use external regulatory counsel and benchmark partners for edge-case interpretations instead of embedding bespoke advice in core product scope."
  - "Reject work that requires the company to become the trading optimizer, EPC advisor, or regulated financial intermediary."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: >-
      Own founder-led sales, account qualification, and lender or partner
      conversations because the first contracts are tied to live project
      triggers and narrow market credibility.
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: >-
      Build the core rule engine, scenario model, workspace data model, and
      export layer required for the first paid pilots.
  - role: "Energy-market / regulatory product lead"
    startTiming: "Month 1-3"
    rationale: >-
      Translate moving German tender and grid rules into maintainable templates
      so product velocity does not depend on ad hoc consultant interpretation.
  - role: "Solutions / finance lead"
    startTiming: "Month 4-6"
    rationale: >-
      Own pilot onboarding, lender-room quality, and the translation between
      product outputs and project-finance diligence.
  - role: "Partnerships / account executive"
    startTiming: "Month 9-12"
    rationale: >-
      Add dedicated selling capacity only after the first packets are
      referenceable and partner channels show repeatable lead flow.
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 15 ICP interviews, map the top 40 apparent accounts, and confirm at least 15 credible beachhead prospects."
      - "Close 2-3 paid readiness sprints and ship the first rule-versioned German tender workspace."
      - "Produce at least 1 lender-accepted standardized bid room and convert at least 2 pilots into annual subscriptions."
  - horizon: "12-24 months"
    items:
      - "Reach 5-7 production customers across Germany-focused storage developers and first advisor or lender accounts."
      - "Launch collaborative redlines, template libraries, and post-award compliance tracking for active customers."
      - "Prove at least 1 repeatable referral channel with lenders, benchmark vendors, or project-finance advisors."
  - horizon: "24-36 months"
    items:
      - "Reach the researched year-3 SOM path of about 10 developer accounts plus 3 advisor or lender accounts."
      - "Enter 1 adjacent workflow—either hydrogen-ready peakers in Germany or a second EU capacity market—without breaking software-led delivery."
      - "Establish benchmark datasets on bid outcomes, duration choices, and bankability patterns that customers use beyond one tender cycle."
risks:
  - risk: "Final 2027 rules or de-rating assumptions make standard storage projects less competitive than expected."
    likelihood: High
    impact: High
    mitigation: "Version every model to specific rule sets, run scenario ranges rather than single-point outputs, and narrow the ICP immediately if only longer-duration or hybrid projects remain viable."
  - risk: "The real software-buying buyer pool is smaller than the visible German pipeline suggests."
    likelihood: High
    impact: High
    mitigation: "Qualify accounts ruthlessly on site control, grid access, and sponsor maturity, then expand only after the first narrow beachhead is proven."
  - risk: "Lenders or advisors treat software-generated packets as draft inputs and still require bespoke memo rewrites."
    likelihood: Medium
    impact: High
    mitigation: "Design exports with advisor-friendly structure, capture redlines from early workstreams, and sell collaboration plus audit trails rather than raw automation alone."
  - risk: "Consultants, benchmark vendors, or OEM software vendors bundle enough adjacent workflow to freeze independent adoption."
    likelihood: Medium
    impact: High
    mitigation: "Stay neutral across vendors, win mixed-portfolio developers first, and compound a cross-project dataset that partner-tied tools cannot see."
  - risk: "Implementation and rule maintenance become too bespoke to sustain 70%+ gross margins."
    likelihood: Medium
    impact: Medium
    mitigation: "Limit initial scope to one German tender workflow, measure template reuse from the first three customers, and reject edge cases that force custom consulting."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months to build the German tender rule engine and lender-room product, hire regulatory and solutions talent, close 2-3 paid pilots and 5-7 production customers, and prove that the business can expand from one storage tender workflow into a repeatable flexible-capacity software platform."
