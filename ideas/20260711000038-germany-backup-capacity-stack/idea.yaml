topRisks:
  - name: "Policy drift"
    description: "Tender rules could change before the storage round, which would break static assumptions and reduce buyer trust."
    mitigation: "Version every model to the latest rule set, sell scenario planning as part of the core product, and update customers continuously as implementing details move."
  - name: "Narrow initial market"
    description: "Germany's first storage-eligible tender may attract a limited set of active developers, slowing early ARR growth."
    mitigation: "Start with the most active storage developers and advisors, then quickly expand the same workflow into hydrogen-ready peakers and adjacent EU capacity markets."
  - name: "Consultant and utility inertia"
    description: "Large utilities and mature developers may prefer in-house desks or incumbent consultants over new software during the first auction cycle."
    mitigation: "Win subscale developers first with a collaborative bid-room product that saves real project time, then use outcome data and advisor partnerships to move upmarket."
