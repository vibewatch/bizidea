    developer pursuing backup-capacity tender bids
  secondary: >-
    Origination and project-finance teams at independent power producers or
    municipal utilities evaluating battery-led entry into the same tenders
  buyer: "Chief Development Officer, Head of Origination, or CEO"
startupThesis:
  nonObviousInsight: >-
    The scarce asset is no longer battery hardware; it is bankable eligibility
    for a newly codified revenue stream. Once Germany published auction sizes,
    a storage carve-in, a higher bid cap, and operating-flexibility rules, the
    winning developers became the ones who can translate regulation into site
    selection, asset design, and financeable bid packages faster than incumbent
    utilities and consultants.
  beachhead: >-
    Germany-focused storage developers with 20-200 MW standalone battery
    projects that want to enter the May 2027 2 GW storage-eligible backup-
    capacity tender
  wedge: >-
    A tender-readiness OS that models auction revenue under the EUR 244,000 per
    MW cap, translates storage operating rules into asset-design assumptions,
    and auto-generates bid, diligence, and financing artifacts for one project
    portfolio
  whyNowCatalyst: >-
    Germany's law now names the tender calendar, storage participation window,
    higher bid cap, and operating-flexibility changes, so developers can
    justify spending on bid preparation before sites and financing windows are
    spoken for.
  ventureScalePath: >-
    Start with Germany's storage-eligible backup-capacity tender, then expand
    into hydrogen-ready peaker workflows, other EU capacity markets, and the
    lender and advisor tooling used to finance flexible-capacity portfolios.
solution: >-
  Build a workflow system that ingests tender rules, site attributes,
  interconnection timelines, battery duration assumptions, EPC inputs, and
  merchant-price scenarios into one capacity-bid workspace. The product tells a
  developer which sites are likely worth shaping for the tender, what bid range
  can clear while preserving project returns, and which design choices break
  eligibility or debtability. It auto-builds a bid room for internal investment
  committees, lenders, and external advisors so the team stops rewriting the
  same memo in different spreadsheets and slide decks. After award, the same
  system tracks compliance obligations, milestone deadlines, and operating
  assumptions against the original bid thesis. Over time the company becomes
  the benchmark dataset for how battery duration, site profile, and bid
  strategy perform in European capacity tenders.
goToMarketSeed:
  firstCustomer: >-
