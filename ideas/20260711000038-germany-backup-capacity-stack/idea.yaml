    to decide which site should be shaped for the 2027 tender and taken to
    lenders
  buyingTrigger: >-
    Passage of the law plus a site-option, interconnection, or lender-outreach
    milestone forces the team to lock battery duration, revenue assumptions, and
    bid strategy before spending more on EPC and legal work
  currentAlternative: >-
    Regulatory counsel, power-market consultants, EPC spreadsheets, and manual
    internal Excel models
  switchingReason: >-
    The wedge collapses weeks of rule interpretation and model rewrites into a
    tender-ready asset package, helping subscale developers avoid dead-end sites
    and approach lenders with a more credible bid thesis
  pricingHypothesis: >-
    Annual subscription priced by active tender-eligible site portfolio, plus
    premium modules for submitted bid rooms and lender-diligence packages
