problem: >-
  Standalone battery developers now know Germany will run a dedicated storage-
  eligible backup-capacity tender, but most still lack a repeatable way to turn
  the new rulebook into project design, bid economics, and lender-ready
  documentation. Today teams bounce between regulatory counsel, consultant Excel
  models, EPC assumptions, and internal merchant-revenue spreadsheets to decide
  whether a site can clear the tender and still finance. That fragmentation is
  dangerous because site-control, interconnection, and debt conversations must
  begin well before the auction window, and one wrong assumption on flexibility
  or cap pricing can strand months of development work.
targetUser:
  primary: >-
