    value: $6.0M
    rationale: 估算约 40 个德国本土的近期买家账户，每个账户年均支出约 15 万美元；这一数字来自一个庞大但经过严格筛选的项目储备：规划中超过 1 MW 的项目 460 个，到 2029 年较为确定新增的大型储能 15 GWh，不确定的还有 58 GWh，其中只有一部分足够成熟，能赶上第一轮储能准入的备用容量招标。
