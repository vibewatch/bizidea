slug: battery-capacity-bid-os
date: '2026-07-11'
currency: USD
modelStartMonth: '2026-08'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-08'
    unit: YYYY-MM
    source: "[BP date 2026-07-11] the model starts with the first full operating month after the dated business plan."
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.0M
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the BP range because the Germany-only wedge and milestone-gated hiring keep burn controlled while still funding the next proof point with buffer."
  - id: A3
    name: Starting paying accounts (M1)
    value: '0'
    unit: count
    source: "[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid readiness sprints."
  - id: A4
    name: Paying account definition
    value: A paid readiness sprint, annual production workspace, or paid lender/advisor module under active billing
    unit: definition
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop counts any account already paying for tender-readiness, production workflow, or lender-room scope."
  - id: A5
    name: Customer ramp
    value: 3 paying accounts by M12, 7 by Q4Y2, and 13 by Q4Y3
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets paid sprint to annual production 60%+ + Research market.som] the base case assumes three paid starts in Y1 with two converting into production, then follows the researched year-3 SOM path of 10 developer accounts plus 3 advisor or lender accounts."
  - id: A6
    name: Realized revenue per active account
    value: Y1 $13K-$14K per account-month, Y2 $32K-$35K per account-quarter, Y3 exit run-rate about $140K per account-year
    unit: USD/account
    source: "[BP gtm.pricing €30K-€50K readiness sprint credited toward €120K-€180K annual subscription + Research market.som $1.8M across 13 accounts] the model starts sprint-heavy, then exits near the researched blended year-3 ACV."
  - id: A7
    name: Gross margin ramp
    value: 45%-52% in Y1, 58%-65% in Y2, and 67%-70% in Y3
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + BP risks] early readiness sprints are services-heavy, but reusable German rule templates and lender-room exports lift margin toward the BP target by Q4Y3."
  - id: A8
    name: Hiring timeline
    value: M1 founder and founding engineer, M3 regulatory product lead, M6 solutions / finance lead, M10 GTM / partnerships, M18 second engineer, M30 customer success / ops
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays product-first until the first reusable lender packets and production conversions are proven."
  - id: A9
    name: Founder / CEO loaded compensation
    value: $120K
    unit: USD/year
    source: "[BP team Founder/CEO + startup-finance heuristic] lean founder cash compensation with payroll taxes and benefits included."
  - id: A10
    name: Engineering loaded compensation
    value: $160K
    unit: USD/year
    source: "[BP team Founding eng + startup-finance heuristic] reflects European energy-software engineering talent with equity carrying part of total compensation."
  - id: A11
    name: Regulatory product loaded compensation
    value: $140K
    unit: USD/year
    source: "[BP team Energy-market / regulatory product lead + startup-finance heuristic] reflects the rule-translation and template-ownership work needed for Germany tender versioning."
  - id: A12
    name: Solutions / finance loaded compensation
    value: $145K
    unit: USD/year
    source: "[BP team Solutions / finance lead + startup-finance heuristic] covers pilot onboarding, lender-room quality, and project-finance translation without building a large services bench."
  - id: A13
    name: GTM / partnerships loaded compensation
    value: $150K
    unit: USD/year
    source: "[BP team Partnerships / account executive + BP gtm.channels + startup-finance heuristic] concentrated enterprise selling and partner development do not justify a larger quota team before product proof."
  - id: A14
    name: Customer success / ops loaded compensation
    value: $110K
    unit: USD/year
    source: "[BP operations + startup-finance heuristic] a late hire supports customer quality and account operations once the Germany workflow is already repeatable."
  - id: A15
    name: Payroll allocation to P&L lines
    value: Founder 60% S&M / 20% R&D / 20% G&A, engineering 100% R&D, regulatory product 70% R&D / 30% G&A, solutions 25% S&M / 50% R&D / 25% G&A, GTM 100% S&M, ops 50% S&M / 20% R&D / 30% G&A
    unit: allocation
    source: "[BP team role rationales + BP operations] this maps each hire into the operating lines used in the P&L while keeping founder-led sales visible."
  - id: A16
    name: Non-payroll sales and marketing spend
    value: $6K per month in M1-M6, $7K in M7-M12, $8K in M13-M18, $10K in M19-M24, $12K in M25-M30, and $14K in M31-M36
    unit: USD/month
    source: "[BP gtm.channels + startup-finance heuristic] concentrated outbound, travel, conferences, and partner enablement replace broad paid demand generation."
  - id: A17
    name: Non-payroll R&D spend
    value: $8K per month in Y1, $9K per month in Y2, and $10K per month in Y3
    unit: USD/month
    source: "[BP product + BP operations + startup-finance heuristic] covers cloud, data ingestion, rule versioning, and export infrastructure for a narrow Germany-first product."
  - id: A18
    name: Non-payroll G&A spend
    value: $5K per month in Y1, $6K per month in Y2, and $7K per month in Y3
    unit: USD/month
    source: "[BP operations + startup-finance heuristic] covers legal, insurance, accounting, and external counsel without assuming a full in-house back office."
  - id: A19
    name: Cash conversion convention
    value: Cash movement equals EBITDA
    unit: formula
    source: "[startup-finance heuristic] capex, debt service, taxes, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: A20
    name: Monthly logo churn
    value: 1.5%
    unit: percent per month
    source: "[startup-finance heuristic for narrow enterprise workflow SaaS + BP gtm.funnelTargets] annual contracts should be sticky once embedded, but the model stays conservative because the first market is concentrated."
  - id: A21
    name: CAC convention
    value: Total 36-month sales and marketing spend divided by 13 net new paying accounts
    unit: formula
    source: "[Model calc using base-case S&M spend + BP gtm.funnelTargets + Research market.som] this captures founder-led, direct, and partner-led account acquisition across the full three-year buildout."
  - id: A22
    name: Funding ask sizing
    value: $2.0M pre-seed
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP milestones 12-24 months + model cash trough] the round is sized to reach 7 paying accounts, one lender-accepted reusable bid room, and one referral channel, then still hold about six months of buffer."
  - id: A23
    name: Next-round milestone
    value: 7 paying accounts, one lender-accepted reusable bid room, and one partner-led referral path before expansion beyond Germany
    unit: milestone
    source: "[BP milestones 12-24 months + BP investorMemo.verdict.nextDiligence + Research validationPlan] this is the minimum seed-ready proof set for a larger European expansion case."
  - id: A24
    name: Quarterly salary roll convention
    value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots
    unit: convention
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent even though the public headcount table shows only year-end snapshots for Y2 and Y3."
