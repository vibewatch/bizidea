scenarios:
  downside:
    description: Final 2027 rules narrow the reachable storage pool, sprint-to-annual conversion slips, and lender-room work stays more bespoke.
    y3RevenueK: 1111.0
    y3EbitdaK: -595.1
    cashLowPointK: 2.8
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 10 instead of 13 because the true Germany beachhead is smaller than the visible pipeline suggests.
      - Blended realized value stays closer to about $132K annualized per account instead of about $140K as fewer premium lender modules attach.
      - Exit gross margin stalls near 64% because exported packets still require more bespoke finance and advisor work.
  base:
    description: Three paying accounts land in Y1, seven are paying by Q4Y2, and the business exits Y3 on the researched $1.8M ARR path with 13 active accounts.
    y3RevenueK: 1526.0
    y3EbitdaK: -251.2
    cashLowPointK: 461.0
    keyAssumptionChanges:
      - 3 paying accounts by M12, 7 by Q4Y2, and 13 by Q4Y3.
      - Realized revenue per account exits near about $140K annualized, consistent with the BP subscription range and researched SOM math.
      - Gross margin reaches the BP target 70% only by Q4Y3 after German rule templates and lender-room exports are reused across customers.
  upside:
    description: Referral-led growth starts earlier, premium lender-room modules attach sooner, and reusable templates lift gross margin into the low 70s.
    y3RevenueK: 1862.0
    y3EbitdaK: 30.2
    cashLowPointK: 696.2
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches 15 instead of 13 because one lender or advisor channel accelerates account starts.
      - Blended realized value rises toward about $145K-$150K annualized per account as lender-room and advisor modules attach faster.
      - Exit gross margin reaches about 72% because German diligence exports become more standardized than planned.
sensitivity:
  - variable: ARPU
    downsideCase: Exit annualized value stalls near $130K per paying account.
    baseCase: Base case exits near $140K annualized value per paying account.
    upsideCase: Premium modules lift exit annualized value toward $150K per paying account.
    y3RevenueImpactK: -140.0
    cashImpactK: -100.0
  - variable: CAC
    downsideCase: Direct selling dominates and CAC rises toward about $95K per account.
    baseCase: CAC stays near $78.6K with founder-led sales and one partner path.
    upsideCase: Referral leverage keeps CAC closer to about $65K per account.
    y3RevenueImpactK: -40.0
    cashImpactK: -160.0
  - variable: churn
    downsideCase: Monthly churn rises to 2.5% as some accounts treat the tool as pre-tender only.
    baseCase: Monthly churn holds at 1.5% once the workflow becomes the system of record.
    upsideCase: Monthly churn stays near 1.0% because templates and benchmark data make the product sticky.
    y3RevenueImpactK: -80.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: Paid sprint to annual conversion slips by roughly one quarter.
    baseCase: Triggered accounts convert from sprint to annual production in about 90-120 days.
    upsideCase: Lender urgency and partner referrals compress conversion toward about 75 days.
    y3RevenueImpactK: -250.0
    cashImpactK: -220.0
  - variable: gross margin
    downsideCase: Exit gross margin stalls near 64% because lender packets remain bespoke.
    baseCase: Exit gross margin reaches the BP target 70% as templates and exports mature.
    upsideCase: Exit gross margin reaches about 72% if repeatability arrives earlier.
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: hiring pace
    downsideCase: An extra service-heavy hire is added before lender-packet reuse is proven.
    baseCase: Hiring stays milestone-gated and reaches 7 FTE by Q4Y3.
    upsideCase: The ops hire moves later because customers self-serve more of the document workflow.
    y3RevenueImpactK: -20.0
    cashImpactK: -150.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered German storage developers] --> Sprints[Paid readiness sprints]
      Sprints --> Production[Annual tender workspaces]
      Production --> Modules[Lender-room and advisor modules]
      Production --> Referrals[Bank and advisor referrals]
      Referrals --> Production
      Modules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from moving from 3 paying accounts by M12 to 13 by Q4Y3 while exiting near the researched $1.8M ARR path at about $140K annualized value per account.
  - checkName: Must go right
    finding: Paid readiness sprints have to keep converting above the BP 60%+ target because the model does not add a large services or quota-sales bench before Q4Y3.
  - checkName: Model breaks if
    finding: If final tender rules shrink the reachable pool to about 10 accounts or gross margin stalls near 64%, downside cash falls to almost zero by late Y3.
  - checkName: Next-round proof
    finding: A seed round is justified once 7 paying accounts, one lender-accepted reusable bid room, and one partner-led referral path are live before Germany-plus-one expansion.
sanityChecks:
  ruleOf40: Y3 growth 105.7% + EBITDA margin -16.5% = 89.2%
  burnMultiple: Y3 burn multiple is about 0.3x using roughly $0.25M of EBITDA burn against about $0.84M of net new ARR from Q4Y2 to Q4Y3.
  revenuePerFte: $218K Y3 on 7 ending FTE (benchmark $200-400K SaaS)
  flags:
    - The base case assumes Germany alone can support 13 paying accounts by Q4Y3, so a smaller true beachhead would force either earlier EU expansion or slower hiring.
    - Gross margin reaches 70% only if rule versioning and lender-room exports are reused across customers; if packets stay bespoke, the model behaves more like services than software.
    - customersEop includes paid readiness sprints as well as annual subscriptions, so fully recurring production logos lag the reported customer count during Y1 and early Y2.
    - Revenue per ending FTE is only at the low end of SaaS norms, which leaves limited room for premature hiring before Germany workflow reuse is proven.
    - Cash is modeled as EBITDA; customer prepayments, tender-guarantee timing, or external-counsel costs could move real cash earlier or later than shown.
