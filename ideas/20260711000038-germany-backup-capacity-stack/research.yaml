openQuestions:
- Will the final 2027 storage-eligible tender rules leave standard 2–4 hour Li-ion batteries competitive after de-rating and availability requirements are published?
- What exact bid-cap, penalty and guarantee mechanics will appear in the secondary auction documents?
- How much of the visible German battery pipeline is controlled by subscale developers versus utilities and sponsors with strong in-house desks?
- Will lenders and tolling counterparties accept software-generated bid rooms as first-class diligence artifacts, or still insist on bespoke advisor memos?
