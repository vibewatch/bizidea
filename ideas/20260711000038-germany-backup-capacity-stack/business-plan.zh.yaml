slug: "battery-capacity-bid-os"
date: "2026-07-11"
executiveSummary: >-
  Battery Capacity Bid OS 应该先从一个投标就绪工作台起步，服务准备冲 2027 年 5 月储能专属备用容量招标的德国储能开发商。这里的痛点不是通用的项目管理，而是要判断哪些 20-100 MW 场址能中标又能扛住放贷方尽调——在团队为
  EPC、法务和电网工作超支之前就做出判断。第一单是卖给一个手上有 2-5 个活跃场址、没有自建容量市场团队的开发商一次付费的就绪冲刺；触发点是场址期权、并网或放贷方里程碑逼着团队做出投标或弃标的决定。MVP
  应该把规则版本管理、场址筛选、投标价格上限经济模型、电池时长假设，以及可导出的投标或放贷方文件包，统一到一个工作台里。研究支持一个集中但真实存在的市场：约 40 个德国近期账户，初始 SAM 为 $6.0M，产品能提升融资能力或避免死胡同投入时，付费意愿最高。这家公司不应该从优化器、VPP
  或通用开发操作系统起步；它靠成为连接德国招标逻辑、场址事实、融资假设和协同文件的中立层来取胜。最大的反证风险不是抽象意义上有没有需求，而是最终的 2027 年规则和放贷方行为，能否在真实项目经过电网准入和场址控制筛选之后，留出一个足够大、愿意买软件的滩头市场。因为这个风险还没有解答，本计划按
  pre-seed 阶段、18 个月现金跑道来搭建，并把邻近欧盟市场、氢能改造调峰机组和中标后合规服务，当作按顺序展开的扩张，而不是第一天就要做的范围。
problem:
  - >-
    追逐德国这轮新的储能专属备用容量招标的开发商，仍然要在监管顾问、咨询公司模型、EPC 输入和内部表格之间来回拼接，才能判断一个场址是否值得拿去谈债务、准备投标。
  - >-
    等到并网、场址期权或放贷方里程碑真正逼近时，一个在时长、灵活性、担保或价格上限经济性上的错误假设，就能让几个月的开发投入砸在中不了标、融不到资的场址上。
solution:
  - >-
    一个带版本管理的工作台，吃进当前的招标规则、场址属性、并网状态、时长假设、EPC 输入以及托管或商业化电价情景，为每个活跃场址给出投标或弃标的决定。
  - >-
    产品导出放贷方可用的文件包、投标资料室内容和合规假设，让同一套项目论证能经受内部投委会评审、外部顾问和融资尽调的考验，而不需要在不同的幻灯片和表格里重新搭建一遍。
whyWeWin:
  - >-
    市场建模商、基准数据供应商、优化器和顾问各自解决工作流的一小块，但没有一家是那种把德国招标逻辑、场址筛选、融资假设和协同文件为一个项目组合串在一起的中立系统。
  - >-
    在投标前阶段，一个由买方主导的工作台比 OEM 或优化器软件更可信，因为混用多家供应商的开发商在锁定交付伙伴之前，仍然需要比较设计和融资方案。
  - >-
    每个项目都会沉淀出关于哪些场址特征、电池时长、投标水平和下行保护结构真正能中标、能融资的专有数据，这是咨询顾问和单一供应商工具天然积累不起来的数据集。
strategicChoices:
  beachhead: >-
    专注德国市场的储能开发商和 IPP 孵化团队，手上有 2-5 个 20-100 MW 的独立电池场址，自建容量市场能力有限，并且有明确计划冲 2027 年 5 月这轮储能专属招标。
  wedgeRationale: >-
    这个细分市场有立即的预算触发点：一个项目组合决策就能在几周内重新分配 EPC、法务、电网和放贷方的支出；成功与否用一个快速的验证点就能衡量——识别出哪些场址值得继续投入，并在团队再砸更多资本之前，做出一份放贷方能信的文件包。
  sequencingRationale: >-
    先做规则版本管理、场址筛选、基于价格上限的投标建模，以及针对一个德国工作流的放贷方资料室导出功能，因为这些是砍掉死胡同场址、赢得债务信心所需的最小功能集。第一批提交之后再加合规追踪，接着是邻近的德国调峰机组工作流，最后才考虑第二个欧盟市场；在按配额招销售之前先招监管建模和实施人才，只有前两个试点证明文件包被重复使用而不是重新写之后，才加入基准数据或放贷方合作。
  notYet:
    - "已有自建容量团队的大型公用事业公司和大型资助方"
    - "并网之后的交易优化、VPP 调度或商业化收入最大化"
    - "至少 3 个储能参考案例落地之前的氢能改造调峰机组、混合资产，或其他欧盟容量市场"
    - "招标和放贷方工作流之外的通用可再生能源项目管理软件"
market:
  tam: >-
    估算 TAM 为 $40.0M，来自全欧洲约 250 名从事灵活容量开发和融资工作流软件的买家，人均年支出约 16 万美元。
  sam: >-
    估算初始 SAM 为 $6.0M，来自约 40 个专注德国市场的近期买方账户，人均年支出约 15 万美元，这是在对可见的电池项目储备做了真实招标就绪度筛选后得出的。
  som: >-
    研究测算第三年 SOM 为 $1.8M，来自约 10 个开发商账户(每户约 15 万美元 ACV)加 3 个顾问或放贷方账户(每户约 10 万美元 ACV)。
  segments:
    - "主力客户：专注德国市场的独立电池开发商，正为 2027 年储能专属备用容量招标筹备 20-200 MW 项目"
    - "次要客户：为同一流程打包电池主导灵活容量组合的 IPP 孵化、项目融资和顾问团队"
  buyingProcess: >-
    日常的推动者通常是开发负责人或市场分析负责人，当场址期权、并网里程碑或放贷方对话逼出投标或弃标决定时启动；预算审批通常落在首席开发官、孵化负责人或 CEO 手里，而财务、EPC、法务和放贷方也会影响采购，因为这套平台必须扛得住尽调的考验。
product:
  mvp: >-
    MVP 应该支持一个德国招标工作流，包含带规则版本管理的资质判定逻辑、场址接入、基于时长和价格上限的投标情景、投委会备忘录，以及面向 2-5 个场址组合的可导出放贷方和顾问文件包。它明确不是调度优化器、交易引擎或通用项目跟踪工具。
  sixMonth: >-
    交付 2 个付费共创客户试点，把当前法律和招标假设做成版本化模型，并证明一个活跃项目组合能在 10 个工作日内，从场址接入走到放贷方可用的文件包。
  twelveMonth: >-
    把至少 2 个试点转化为年度订阅，为放贷方和顾问加上协同修改和审计记录，并上线担保、资质预审、EPC、LTSA、质保和合规假设的预建模板。
  twentyFourMonth: >-
    只有在德国储能客户已经可作为参考案例、核心模式仍以软件为主导之后，才扩展到中标后合规监控，以及一个邻近的容量开发工作流——德国氢能改造调峰机组或另一个欧盟容量市场。
  keyBets:
    - "标准的 2-4 小时锂电池项目在最终的 2027 年规则下仍有足够的资质，能撑起有意义的第一批买家池"
    - "只要产品能防止死胡同的 EPC、法务和放贷方投入，开发商就会在投标提交前付费"
    - "一个标准化的放贷方资料室能在银行和顾问的第一轮审查中过关，只需有限的重写"
    - "一个范围很窄的德国工作流，能足够快地产出可复用模板，让实施成本压在 ACV 以下"
gtm:
  wedge: >-
    在开发商必须决定为 2027 年 5 月这轮招标塑造哪些场址、并向放贷方做汇报时，卖一次针对一个德国项目组合的付费投标就绪冲刺；一旦投标论证成为系统记录，就把工作台转化为年度订阅。
  channels:
    - "创始人主导的直接销售，对接专注德国市场且有活跃场址的储能开发商的开发负责人、孵化负责人和 CEO"
    - "来自放贷方、托管交易对手、基准数据供应商和项目融资顾问的转介，他们本就在塑造融资可行性决策"
    - "在放贷方文件包证明可在混合供应商组合中复用之后，再有选择性地与 OEM、优化器以及电网或监管顾问建立伙伴关系"
  funnelTargets: "触发账户→合格线索发现转化率 30%-40%，合格线索发现→付费就绪冲刺转化率 20%-30%，付费冲刺→年度生产环境转化率 60% 以上，生产环境→12 个月内多场址或顾问扩展转化率 40% 以上。"
  pricing: >-
    向 2-5 个活跃场址收取 3 万至 5 万欧元的组合就绪冲刺费用，可抵扣进按活跃可投标场址计费的 12 万至 18 万欧元年度订阅，再加上放贷方资料室或已提交投标的增值模块。这符合研究测算的约 15 万美元年度支出区间，定价对应的是避免死胡同投入和更快达到债务就绪状态。
businessModel:
  revenueStreams:
    - "面向带规则版本管理的招标工作台、情景模型和协同投标资料室的年度订阅"
    - "已提交投标资料室、放贷方尽调文件包和顾问协作的增值模块"
    - "客户中标或在多个招标周期中保持活跃后，提供中标后合规监控和里程碑追踪订阅"
  unitOfValue: "处于协同投标管理下的可投标活跃场址"
  targetGrossMarginPct: 70
  expansionLevers:
    - "第一个项目组合建模完成后，在同一开发商内追加更多场址"
    - "在同一底层工作台上向顾问和放贷方出售席位"
    - "从德国储能扩展到复用同一套规则和尽调引擎的邻近容量工作流"
    - "在核心工作台之上叠加中标结果、时长选择和下行保护结构的基准数据集"
strategyMap:
  northStarMetric: "通过平台从接入推进到放贷方可用投标状态的活跃场址数量"
  inputMetrics:
    - "触发账户中付费就绪冲刺的成单率"
    - "从场址接入到投标或弃标文件包的中位天数"
    - "试点转年度订阅的转化率"
    - "每份文件包平均经历的放贷方或顾问修改轮次"
    - "扩展到第二个场址或第二个工作流的生产环境账户数"
  moatsToBuild:
    - "跨德国招标周期，关联场址特征、电池时长、投标水平和融资结果的数据集"
    - "覆盖担保、资质预审、EPC、LTSA、质保和监管证据的可复用尽调图谱"
    - "记录开发商、放贷方和购电方如何为下行保护和融资可行性定价的基准库"
  killCriteria:
    - "首批 12 个触发的 ICP 账户中，买下 3 万欧元以上付费就绪冲刺的少于 3 个"
    - "前 3 个试点未能把场址接入到放贷方就绪的产出周期压到 10 个工作日以内"
    - "在前 3 次真实尽调流程中，有 2 次银行或顾问拒绝了标准化文件包，认为其不够充分"
    - "最终 2027 年规则导致可信滩头账户少于 15 个，或让标准 2-4 小时电池在目标招标中失去竞争力"
  mermaid: |
    flowchart LR
      Wedge[Germany storage tender wedge] --> MVP[Rule-versioned bid workspace]
      MVP --> Proof[Paid pilots and lender-accepted bid rooms]
      Proof --> Expansion[More sites, advisors, and adjacent capacity markets]
investorMemo:
  verdict:
    call: "观察"
    conviction: >-
      痛点强烈，切口清晰，但要等到最终招标规则和放贷方行为证明德国确实存在一个足够大、愿意买软件的滩头市场之前，信心程度仍然有限。
    whyBelieve: >-
      德国已经从政策辩论走向一份具名的采购日程，配上储能专属通道、可见的投标价格上限，以及手工表格处理不好的融资复杂度。
    whyDoubt: >-
      第一批市场规模集中，替代方案可信度高，邻近的现有厂商或咨询顾问可能在一个独立工作流层变得不可或缺之前，先把预算收入囊中。
    nextDiligence: >-
      在为更广泛的欧洲扩张下注之前，先锁定 2-3 个付费共创客户，并在一个真实项目组合上验证出一个放贷方接受的标准化投标资料室。
  firstCustomer:
    title: "专注德国市场的独立 BESS 开发商的开发负责人"
    profile: >-
      一家开发商，手上有 2-5 个处于期权阶段的 20-100 MW 独立场址，自建容量市场建模能力有限，迫切需要判断哪个场址值得投入 EPC、法务和放贷方预算。
    trigger: >-
      法律通过，加上场址期权、并网或放贷方接触的里程碑，迫使团队在再增加开发成本之前先锁定时长、收入假设和投标策略。
    buyer: "首席开发官或 CEO"
    initialContract: >-
      针对一个 2-5 场址组合的 3 万至 5 万欧元就绪冲刺，一旦有场址推进到正式债务和投标准备阶段，就转化为 12 万至 18 万欧元的年度订阅，外加放贷方资料室或已提交投标模块。
  mustBeTrue:
    - "至少 25% 被触发的德国储能开发商，会选择付费就绪冲刺，而不是咨询顾问加内部表格"
    - "前 3 个试点能把场址接入到放贷方就绪的产出周期，从多周的手工基线压缩到 10 个工作日以内"
    - "至少 2 家银行或项目融资顾问接受导出的文件包，只需小幅修改而不用彻底重写"
    - "在筛掉电网准入、场址控制和资助方成熟度不足的项目之后，德国在进入欧盟扩张之前仍能提供至少 15 个可触达的滩头账户"
    - "至少一半的付费就绪冲刺，能转化为超过 12 万欧元的年度软件合同或多场址扩展"
  diligenceQuestions:
    - "可见的德国电池项目里，有多少掌握在小规模开发商手中，又有多少掌握在拥有强大内部团队的公用事业公司手中？"
    - "2027 年储能专属这轮招标，最终会对标准 2-4 小时电池施加什么样的降容、可用性和罚则规则？"
    - "目前咨询、建模和顾问方面的支出，有多少是真的能被软件取代，而不只是被软件记录下来？"
    - "放贷方和托管交易对手会不会把软件生成的投标资料室当作一等尽调材料？"
    - "下一个能干净扩展的邻近工作流是什么：德国的氢能改造调峰机组，还是证据要求相近的第二个欧盟容量市场？"
operatingAssumptions:
  - assumption: >-
      在对可见的项目储备做完电网准入、场址控制和融资就绪度筛选之后，德国仍然存在至少 15-20 个可信的滩头账户。
    basis: "research.yaml"
    validationTest: >-
      对排名前 40 的潜在客户逐一建立账户地图，只有当至少 15 个满足最低的场址控制、并网和资助方就绪门槛时，才继续推进。
    decisionImpact: >-
      如果不成立，就进一步收紧 ICP、缩减招聘计划，并推迟风险级扩张的说法，直到找到第二个市场。
  - assumption: >-
      被触发的买家会在投标提交前，按软件式定价付费，因为产品能避免死胡同的开发投入，并缩短放贷方准备周期。
    basis: "idea.yaml"
    validationTest: >-
      访谈 12 个被触发的开发商，并围绕真实的场址或放贷方里程碑，成功签下至少 2 个 3 万欧元以上的付费就绪冲刺。
    decisionImpact: >-
      如果不成立，公司就必须改成更轻量的软件定价、捆绑更多服务，或者把这个切口当作顾问赋能而不是直接 SaaS 来对待。
  - assumption: >-
      在最终的 2027 年储能规则下，标准 2-4 小时锂电池项目仍有足够竞争力，能撑住最初这个纯储能切口。
    basis: "research.yaml"
    validationTest: >-
      和 3 家开发商或法律顾问一起复核最终招标文件，确认至少一种常见的 2-4 小时配置仍能通过建模出的资质和经济性测试。
    decisionImpact: >-
      如果不成立，就把产品收窄到更长时长或混合资产，或推迟市场进入，直到有理由支撑更宽的工作流。
  - assumption: >-
      放贷方和顾问会接受一份标准化的投标资料室，前提是它透明地披露托管、EPC、LTSA、质保和监管假设。
    basis: "research.yaml"
    validationTest: >-
      与银行、债务顾问或托管交易对手一起做 3 次真实文件包评审，只有当至少 2 次以有限修改被接受时，才算验证通过。
    decisionImpact: >-
      如果不成立，产品路线图就要转向顾问工具或托管服务，毛利预期也需要重新设定。
  - assumption: >-
      一个小型监管建模团队能持续维护规则版本和模板，而不会把公司拖成一家咨询公司。
    basis: "operator judgment"
    validationTest: >-
      追踪前 2 次招标修订和 3 个客户试点中，花在规则更新上的时间；只有当月度维护工作量保持在一个全职人力以下时，这个假设才成立。
    decisionImpact: >-
      如果不成立，公司就需要更高的定价、更窄的范围，或在扩大销售前先补充更多资本。
experimentRoadmap:
  - horizon: "0-90 天"
    experiment: "对排名前 40 的德国储能潜在客户建立地图，并对开发商、顾问和放贷方做 15 次访谈。"
    hypothesis: "可见的项目储备仍能筛出至少 15 个有共同投标就绪痛点的可信账户。"
    successMetric: "至少 15 个账户通过滩头筛选，至少 6 次访谈确认了明确的预算负责人和真实触发点。"
    owner: "创始人/CEO"
  - horizon: "0-90 天"
    experiment: "用软件复现一次真实的项目组合决策，基于当前招标规则、3 个样例场址和放贷方资料室导出。"
    hypothesis: "一个范围很窄的规则引擎加文件工作流，能替代第一个使用场景里的多表格手工建模。"
    successMetric: "原型能在 10 个工作日内，为 3 个场址产出场址排序、投标区间和放贷方文件包。"
    owner: "创始工程师"
  - horizon: "90-180 天"
    experiment: "把 2 个共创客户转化为针对真实 2-5 场址组合的付费就绪冲刺。"
    hypothesis: "只要产品改变了团队在 EPC、法务和债务上花时间的方式，被触发的团队就会在投标提交前付费。"
    successMetric: "至少 2 个试点以 3 万欧元以上成交，每个都产出一份正式的投标或弃标决定。"
    owner: "创始人/CEO"
  - horizon: "90-180 天"
    experiment: "对第一批试点产出做放贷方和顾问的文件包评审。"
    hypothesis: "一个标准化的投标资料室，能在第一轮尽调中过关，只需有限的定制化返工。"
    successMetric: "至少 2 名外部评审方以小幅修改接受了文件包结构。"
    owner: "实施 / 财务负责人"
  - horizon: "180-365 天"
    experiment: "通过 2 个合作伙伴工作流，接入结构化的基准和托管数据输入。"
    hypothesis: "合作伙伴的数据和转介渠道能提高成单率、减少手工情景建模工作量，同时不损害产品的中立性。"
    successMetric: "至少 25% 的合格线索来自合作伙伴或经合作伙伴协助获得，试点准备时间下降 30%。"
    owner: "创始人/CEO"
  - horizon: "180-365 天"
    experiment: "与第一个年度客户一起上线中标后合规测试版。"
    hypothesis: "客户会在提交或中标后继续扩展，因为最初的投标假设会变成合规基线。"
    successMetric: "第一个生产环境客户购买或试用合规模块，并让工作台在初始投标周期之后持续保持活跃。"
    owner: "实施 / 财务负责人"
operations:
  - "维护一套可审计的规则版本库，让每个工作台都绑定到具体的法律条文、招标文件和技术模板集。"
  - "在导出任何放贷方文件包之前，对场址数据、EPC、LTSA、质保、电网和托管输入做一次结构化的假设审查。"
  - "为担保、资质预审和放贷方资料室证据保留标准模板，并能在 TSO 或顾问变更要求时集中更新。"
  - "对边缘案例的解读交给外部监管顾问和基准数据合作方处理，而不是把定制化建议塞进核心产品范围。"
  - "拒绝会让公司变成交易优化商、EPC 顾问或受监管金融中介的业务。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 个月"
    rationale: >-
      主导创始人式销售、账户资质判断，以及放贷方或合作伙伴的沟通，因为第一批合同都绑定在真实项目触发点和有限的市场可信度上。
  - role: "创始工程师"
    startTiming: "第 0 个月"
    rationale: >-
      搭建核心规则引擎、情景模型、工作台数据模型，以及第一批付费试点所需的导出层。
  - role: "能源市场 / 监管产品负责人"
    startTiming: "第 1-3 个月"
    rationale: >-
      把不断变动的德国招标和电网规则翻译成可维护的模板，让产品迭代速度不再依赖临时的顾问解读。
  - role: "实施 / 财务负责人"
    startTiming: "第 4-6 个月"
    rationale: >-
      负责试点上手、放贷方资料室质量，以及产品产出和项目融资尽调之间的转译工作。
  - role: "合作伙伴 / 客户经理"
    startTiming: "第 9-12 个月"
    rationale: >-
      只有当第一批文件包已经可作参考案例、合作伙伴渠道展现出可重复的线索流之后，才增加专职销售能力。
milestones:
  - horizon: "0-12 个月"
    items:
      - "完成 15 次 ICP 访谈，给排名前 40 的潜在账户建立地图，确认至少 15 个可信的滩头潜在客户。"
      - "签下 2-3 个付费就绪冲刺，交付第一个带规则版本管理的德国招标工作台。"
      - "产出至少 1 份放贷方接受的标准化投标资料室，并把至少 2 个试点转化为年度订阅。"
  - horizon: "12-24 个月"
    items:
      - "在专注德国市场的储能开发商中达到 5-7 个生产环境客户，拿下第一批顾问或放贷方账户。"
      - "为活跃客户上线协同修改、模板库和中标后合规追踪。"
      - "验证至少 1 条可重复的转介渠道，来自放贷方、基准数据供应商或项目融资顾问。"
  - horizon: "24-36 个月"
    items:
      - "达到研究测算的第三年 SOM 路径：约 10 个开发商账户加 3 个顾问或放贷方账户。"
      - "在不打破以软件为主导交付模式的前提下，进入 1 个邻近工作流——德国氢能改造调峰机组，或第二个欧盟容量市场。"
      - "建立中标结果、时长选择和融资可行性模式的基准数据集，供客户在一轮招标周期之外持续使用。"
risks:
  - risk: "最终的 2027 年规则或降容假设，让标准储能项目的竞争力低于预期。"
    likelihood: High
    impact: High
    mitigation: "把每个模型都绑定到具体规则版本，输出情景区间而不是单点结果，一旦只有更长时长或混合项目仍可行，就立即收窄 ICP。"
  - risk: "真正愿意买软件的买家池，比可见的德国项目储备所暗示的规模要小。"
    likelihood: High
    impact: High
    mitigation: "严格按场址控制、电网准入和资助方成熟度筛选账户，只有在第一个狭窄的滩头市场得到验证之后才扩张。"
  - risk: "放贷方或顾问把软件生成的文件包当作草稿输入，仍然要求定制化重写备忘录。"
    likelihood: Medium
    impact: High
    mitigation: "按顾问友好的结构设计导出内容，从早期工作流中收集修改意见，主打协作和审计记录，而不是单纯的自动化。"
  - risk: "咨询顾问、基准数据供应商或 OEM 软件供应商捆绑了足够多的邻近工作流，冻结了独立产品的采用空间。"
    likelihood: Medium
    impact: High
    mitigation: "在不同供应商之间保持中立，先拿下混合供应商组合的开发商，沉淀出合作伙伴绑定型工具看不到的跨项目数据集。"
  - risk: "实施和规则维护变得太定制化，撑不起 70% 以上的毛利率。"
    likelihood: Medium
    impact: Medium
    mitigation: "把初期范围限定在一个德国招标工作流，从前三个客户开始衡量模板复用率，拒绝逼出定制咨询的边缘案例。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "用 18 个月资金搭建德国招标规则引擎和放贷方资料室产品，招募监管和实施人才，签下 2-3 个付费试点和 5-7 个生产环境客户，并证明这家公司能从一个储能招标工作流，扩展成一个可复制的灵活容量软件平台。"
