scenarios:
  downside:
    description: 最终 2027 年规则收窄了可触达的储能买家池，冲刺转年度订阅的转化率下滑，放贷方资料室的工作仍然更定制化。
    y3RevenueK: 1111.0
    y3EbitdaK: -595.1
    cashLowPointK: 2.8
    keyAssumptionChanges:
      - 第三年第 4 季度 customersEop 只到 10，而不是 13，因为真实的德国滩头市场比可见的项目储备暗示的规模更小。
      - 混合已实现价值更接近每账户年化约 13.2 万美元，而不是约 14 万美元，因为附加的高级放贷方模块更少。
      - 退出毛利率停滞在约 64%，因为导出的文件包仍需要更多定制化的财务和顾问工作。
  base:
    description: 第一年落地 3 个付费账户，第 2 年第 4 季度达到 7 个付费账户，公司在第三年末沿研究测算的 180 万美元 ARR 路径退出，拥有 13 个活跃账户。
    y3RevenueK: 1526.0
    y3EbitdaK: -251.2
    cashLowPointK: 461.0
    keyAssumptionChanges:
      - 第 12 个月达到 3 个付费账户，第 2 年第 4 季度达到 7 个，第 3 年第 4 季度达到 13 个。
      - 每账户已实现收入退出时接近年化约 14 万美元，与 BP 订阅区间和研究测算的 SOM 数字一致。
      - 只有在德国规则模板和放贷方资料室导出功能在客户间复用之后，毛利率才在第 3 年第 4 季度达到 BP 目标的 70%。
  upside:
    description: 转介带动的增长更早启动，高级放贷方资料室模块更早被采用，可复用模板把毛利率拉进 70% 出头区间。
    y3RevenueK: 1862.0
    y3EbitdaK: 30.2
    cashLowPointK: 696.2
    keyAssumptionChanges:
      - 第三年第 4 季度 customersEop 达到 15，而不是 13，因为一条放贷方或顾问渠道加快了账户起步速度。
      - 混合已实现价值升向每账户年化约 14.5 万至 15 万美元，因为放贷方资料室和顾问模块附加得更快。
      - 退出毛利率达到约 72%，因为德国的尽调导出比计划中更早实现标准化。
sensitivity:
  - variable: ARPU
    downsideCase: 退出年化价值停滞在每付费账户约 13 万美元。
    baseCase: 基准情形退出时，每付费账户年化价值接近 14 万美元。
    upsideCase: 增值模块把退出年化价值拉向每付费账户 15 万美元。
    y3RevenueImpactK: -140.0
    cashImpactK: -100.0
  - variable: CAC
    downsideCase: 直接销售占主导，CAC 升向每账户约 9.5 万美元。
    baseCase: 依靠创始人主导销售加一条合作伙伴渠道，CAC 保持在约 7.86 万美元。
    upsideCase: 转介杠杆让 CAC 更接近每账户 6.5 万美元。
    y3RevenueImpactK: -40.0
    cashImpactK: -160.0
  - variable: churn
    downsideCase: 月度客户流失率升至 2.5%，因为部分账户只把这个工具当作投标前的临时工具。
    baseCase: 一旦这套工作流成为系统记录，月度客户流失率保持在 1.5%。
    upsideCase: 因为模板和基准数据让产品更有粘性，月度客户流失率保持在约 1.0%。
    y3RevenueImpactK: -80.0
    cashImpactK: -90.0
  - variable: sales cycle
    downsideCase: 付费冲刺转年度订阅的转化滞后约一个季度。
    baseCase: 被触发的账户在约 90-120 天内从冲刺转化为年度生产环境。
    upsideCase: 放贷方的紧迫性和合作伙伴转介，把转化周期压缩到约 75 天。
    y3RevenueImpactK: -250.0
    cashImpactK: -220.0
  - variable: gross margin
    downsideCase: 退出毛利率停滞在约 64%，因为放贷方文件包仍然是定制化的。
    baseCase: 随着模板和导出功能成熟，退出毛利率达到 BP 目标 70%。
    upsideCase: 如果可复用性更早实现，退出毛利率能达到约 72%。
    y3RevenueImpactK: 0.0
    cashImpactK: -140.0
  - variable: hiring pace
    downsideCase: 在放贷方文件包的可复用性得到验证之前，就多招了一个服务成分重的岗位。
    baseCase: 招聘保持按里程碑分批，到第三年第 4 季度达到 7 名全职员工。
    upsideCase: 因为客户能自助完成更多文件工作流，运营岗的招聘往后延。
    y3RevenueImpactK: -20.0
    cashImpactK: -150.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TriggeredAccounts[Triggered German storage developers] --> Sprints[Paid readiness sprints]
      Sprints --> Production[Annual tender workspaces]
      Production --> Modules[Lender-room and advisor modules]
      Production --> Referrals[Bank and advisor referrals]
      Referrals --> Production
      Modules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形的收入来自账户数从第 12 个月的 3 个，增长到第三年第 4 季度的 13 个，退出时接近研究测算的 180 万美元 ARR 路径，每账户年化价值约 14 万美元。
  - checkName: 必须成立的前提
    finding: 付费就绪冲刺的转化率必须持续高于 BP 设定的 60% 以上目标，因为模型在第三年第 4 季度之前都没有配置大型服务团队或配额销售团队。
  - checkName: 模型会失效的情形
    finding: 如果最终招标规则把可触达账户池收窄到约 10 个，或毛利率停滞在约 64%，下行情形的现金会在第三年末跌到几乎为零。
  - checkName: 下一轮融资的证明点
    finding: 在扩展到德国以外市场之前，一旦达到 7 个付费账户、1 个放贷方接受的可复用投标资料室，以及 1 条合作伙伴主导的转介渠道，种子轮融资就有了正当性。
sanityChecks:
  ruleOf40: 第三年增长率 105.7% + EBITDA 利润率 -16.5% = 89.2%
  burnMultiple: 第三年烧钱倍数约为 0.3 倍，即用约 25 万美元的 EBITDA 消耗，对应第 2 年第 4 季度到第 3 年第 4 季度约 84 万美元的净新增 ARR。
  revenuePerFte: 第三年每名全职员工创收 21.8 万美元（SaaS 基准为 20 万至 40 万美元）
  flags:
    - 基准情形假设单靠德国就能在第三年第 4 季度支撑起 13 个付费账户，如果真实滩头市场更小，就要么提前进入欧盟扩张，要么放慢招聘节奏。
    - 只有当规则版本管理和放贷方资料室导出功能能在客户间复用时，毛利率才会达到 70%；如果文件包仍然定制化，模型的表现会更像服务业务而不是软件业务。
    - customersEop 既包含付费就绪冲刺，也包含年度订阅，所以在第一年和第二年初期，完全经常性的生产环境客户数会落后于报告的客户数。
    - 每名全职员工的创收只处于 SaaS 常规区间的低端，这意味着在德国工作流的可复用性得到验证之前，提前招聘的空间有限。
    - 现金按 EBITDA 建模；客户预付款、招标担保的时点，或外部顾问费用，都可能让实际现金比模型展示的更早或更晚到位。
