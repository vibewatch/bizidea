slug: battery-capacity-bid-os
date: '2026-07-11'
currency: USD
modelStartMonth: '2026-08'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-08'
    unit: YYYY-MM
    source: "[BP date 2026-07-11] 模型从商业计划书署期之后的第一个完整运营月开始。"
  - id: A2
    name: 起始现金 / pre-seed 融资额
    value: $2.0M
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + 模型现金曲线] 基准情形取 BP 区间的下限，因为只做德国这一个切口、按里程碑分批招聘能把烧钱速度控制住，同时仍留有缓冲资金去验证下一个证明点。"
  - id: A3
    name: 起始付费账户数（第 1 个月）
    value: '0'
    unit: count
    source: "[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先赢得付费就绪冲刺。"
  - id: A4
    name: 付费账户定义
    value: 处于活跃计费状态的付费就绪冲刺、年度生产工作台，或付费的放贷方/顾问模块
    unit: definition
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 统计任何已经在为投标就绪、生产工作流或放贷方资料室范围付费的账户。"
  - id: A5
    name: 客户增长节奏
    value: 第 12 个月达到 3 个付费账户，第 2 年第 4 季度达到 7 个，第 3 年第 4 季度达到 13 个
    unit: customersEop
    source: "[BP milestones 0-12、12-24 和 24-36 months + BP gtm.funnelTargets 付费冲刺转年度生产转化率 60% 以上 + Research market.som] 基准情形假设第一年有三次付费起步、其中两个转化为生产环境，随后沿研究测算的第三年 SOM 路径走：10 个开发商账户加 3 个顾问或放贷方账户。"
  - id: A6
    name: 每活跃账户的已实现收入
    value: 第一年每账户月 1.3 万至 1.4 万美元，第二年每账户季度 3.2 万至 3.5 万美元，第三年退出期年化约 14 万美元
    unit: USD/account
    source: "[BP gtm.pricing 3 万至 5 万欧元就绪冲刺可抵扣 12 万至 18 万欧元年度订阅 + Research market.som $1.8M 分摊到 13 个账户] 模型初期以冲刺收入为主，随后逼近研究测算的第三年混合 ACV。"
  - id: A7
    name: 毛利率爬升曲线
    value: 第一年 45%-52%，第二年 58%-65%，第三年 67%-70%
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + BP risks] 早期的就绪冲刺服务成分重，但可复用的德国规则模板和放贷方资料室导出功能，会在第三年第 4 季度前把毛利率拉向 BP 目标。"
  - id: A8
    name: 招聘时间表
    value: 第 1 个月招创始人和创始工程师，第 3 个月招监管产品负责人，第 6 个月招实施/财务负责人，第 10 个月招 GTM/合作伙伴岗，第 18 个月招第二名工程师，第 30 个月招客户成功/运营岗
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在第一批可复用的放贷方文件包和生产环境转化得到验证之前，招聘始终以产品优先。"
  - id: A9
    name: 创始人/CEO 全成本薪酬
    value: $120K
    unit: USD/year
    source: "[BP team Founder/CEO + startup-finance heuristic] 精简的创始人现金薪酬，含工资税和福利。"
  - id: A10
    name: 工程全成本薪酬
    value: $160K
    unit: USD/year
    source: "[BP team Founding eng + startup-finance heuristic] 反映欧洲能源软件工程人才的行情，期权承担部分总薪酬。"
  - id: A11
    name: 监管产品全成本薪酬
    value: $140K
    unit: USD/year
    source: "[BP team Energy-market / regulatory product lead + startup-finance heuristic] 反映德国招标规则版本管理所需的规则翻译和模板维护工作。"
  - id: A12
    name: 实施/财务全成本薪酬
    value: $145K
    unit: USD/year
    source: "[BP team Solutions / finance lead + startup-finance heuristic] 覆盖试点上手、放贷方资料室质量，以及项目融资转译工作，而不需要搭建一支庞大的服务团队。"
  - id: A13
    name: GTM/合作伙伴全成本薪酬
    value: $150K
    unit: USD/year
    source: "[BP team Partnerships / account executive + BP gtm.channels + startup-finance heuristic] 集中式的企业销售和合作伙伴拓展，在产品得到验证之前不值得配置更大的配额销售团队。"
  - id: A14
    name: 客户成功/运营全成本薪酬
    value: $110K
    unit: USD/year
    source: "[BP operations + startup-finance heuristic] 一个较晚才加入的岗位，在德国工作流已经可复制之后，支撑客户质量和账户运营。"
  - id: A15
    name: 薪酬在损益表科目间的分摊
    value: 创始人 60% 销售市场 / 20% 研发 / 20% 行政管理，工程 100% 研发，监管产品 70% 研发 / 30% 行政管理，实施 25% 销售市场 / 50% 研发 / 25% 行政管理，GTM 100% 销售市场，运营 50% 销售市场 / 20% 研发 / 30% 行政管理
    unit: allocation
    source: "[BP team role rationales + BP operations] 把每个岗位映射到损益表使用的运营科目，同时保持创始人主导销售的可见度。"
  - id: A16
    name: 非薪酬销售与市场支出
    value: 第 1-6 个月每月 6 千美元，第 7-12 个月每月 7 千美元，第 13-18 个月每月 8 千美元，第 19-24 个月每月 1 万美元，第 25-30 个月每月 1.2 万美元，第 31-36 个月每月 1.4 万美元
    unit: USD/month
    source: "[BP gtm.channels + startup-finance heuristic] 集中式的主动触达、出差、会议和合作伙伴赋能，取代了大范围的付费获客投放。"
  - id: A17
    name: 非薪酬研发支出
    value: 第一年每月 8 千美元，第二年每月 9 千美元，第三年每月 1 万美元
    unit: USD/month
    source: "[BP product + BP operations + startup-finance heuristic] 覆盖一款以德国为先的窄范围产品所需的云、数据接入、规则版本管理和导出基础设施。"
  - id: A18
    name: 非薪酬行政管理支出
    value: 第一年每月 5 千美元，第二年每月 6 千美元，第三年每月 7 千美元
    unit: USD/month
    source: "[BP operations + startup-finance heuristic] 覆盖法务、保险、会计和外部顾问支出，不假设建立完整的内部后台团队。"
  - id: A19
    name: 现金转换惯例
    value: 现金变动等于 EBITDA
    unit: formula
    source: "[startup-finance heuristic] 在 pre-seed 阶段，资本支出、债务偿付、税费和营运资金时点差异被假设为不重要。"
  - id: A20
    name: 月度客户流失率
    value: 1.5%
    unit: percent per month
    source: "[startup-finance heuristic for narrow enterprise workflow SaaS + BP gtm.funnelTargets] 年度合同一旦嵌入使用流程应该会有较高粘性，但模型保持保守，因为第一个市场规模集中。"
  - id: A21
    name: CAC 计算惯例
    value: 36 个月销售与市场总支出除以 13 个净新增付费账户
    unit: formula
    source: "[Model calc using base-case S&M spend + BP gtm.funnelTargets + Research market.som] 这体现了整个三年建设期内创始人主导、直接销售和合作伙伴带来的账户获取。"
  - id: A22
    name: 融资规模测算
    value: $2.0M pre-seed
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP milestones 12-24 months + 模型现金低点] 这一轮融资的规模，是为了达到 7 个付费账户、1 个放贷方接受的可复用投标资料室和 1 条转介渠道，同时仍保留约六个月的缓冲资金。"
  - id: A23
    name: 下一轮融资里程碑
    value: 在扩展到德国以外市场之前，达到 7 个付费账户、1 个放贷方接受的可复用投标资料室，以及 1 条合作伙伴主导的转介渠道
    unit: milestone
    source: "[BP milestones 12-24 months + BP investorMemo.verdict.nextDiligence + Research validationPlan] 这是支撑更大规模欧洲扩张论证所需的最低种子轮就绪证明集合。"
  - id: A24
    name: 季度工资滚算惯例
    value: 第二、三年的工资行按每个季度内实际发生的月度招聘计算，而不只是季末快照
    unit: convention
    source: "[Headcount column convention + BP team startTiming] 即便公开的人员编制表只展示第二、三年的年末快照，这样处理仍能让工资支出保持内部一致。"
