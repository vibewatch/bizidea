problem: >-
  独立电池开发商已经知道德国将开出一轮储能可参与的备用容量招标专场，但大多数团队仍缺少一套可重复的方法，把新规则转化为项目设计、投标经济模型和放贷方可接受的文件包。今天团队还在监管顾问、咨询公司的 Excel
  模型、EPC 假设和内部商业化收入表格之间来回折腾，才能判断一个场址能否中标又能融到资。这种碎片化很危险：场址控制权、并网和债务谈判必须在拍卖窗口开启之前就启动，只要在灵活性或价格上限上算错一步，就可能让几个月的开发工作打水漂。
targetUser:
  primary: >-
    专注德国市场的储能开发商中负责开发或市场分析的负责人，正在准备备用容量招标的投标
  secondary: >-
    独立发电商(IPP)或市政公用事业公司中的项目孵化和项目融资团队，正评估以电池为主力进入同一批招标
  buyer: "首席开发官(CDO)、孵化负责人或 CEO"
startupThesis:
  nonObviousInsight: >-
    稀缺的不再是电池硬件，而是一份新规下可融资的投标资格。德国一旦公布拍卖规模、储能专属通道、更高的投标价格上限和运营灵活性规则，能把监管条文比现有公用事业公司和咨询顾问更快转化为选址、资产设计和可融资投标包的开发商，就赢了。
  beachhead: >-
    专注德国市场、拥有 20-200 MW 独立电池项目、想进入 2027 年 5 月这轮 2 GW 储能专属备用容量招标的开发商
  wedge: >-
    一套投标就绪操作系统：按每 MW 24.4 万欧元的价格上限建模拍卖收入，把储能运营规则翻译成资产设计假设，并为一个项目组合自动生成投标、尽调和融资文件
  whyNowCatalyst: >-
    德国的法律已经把招标日程、储能参与窗口、更高的投标价格上限和运营灵活性变化都写明了，开发商在场址和融资窗口被人抢走之前，就有理由为投标准备花钱。
  ventureScalePath: >-
    先啃下德国这一轮储能专属备用容量招标，再扩展到氢能改造调峰机组的工作流、其他欧盟容量市场，以及为灵活容量组合融资服务的放贷方和顾问工具。
solution: >-
  搭建一套工作流系统，把招标规则、场址属性、并网时间表、电池时长假设、EPC 输入和商业化电价情景，统统喂进一个投标工作台。产品告诉开发商哪些场址值得为招标做进一步打磨、什么投标区间既能中标又能保住项目收益，以及哪些设计选择会破坏资质或融资能力。它会自动为内部投委会、放贷方和外部顾问搭出一个投标资料室，让团队不必在不同表格和幻灯片里反复重写同一份备忘录。中标后，同一系统会对照最初的投标假设，持续追踪合规义务、里程碑截止日期和运营假设。随着时间推移，这家公司会沉淀为一份基准数据集，记录电池时长、场址特征和投标策略在欧洲容量招标中的实际表现。
goToMarketSeed:
  firstCustomer: >-
    一家专注德国市场的电池开发商，手上有两到五个 20-100 MW 的独立储能场址处于期权阶段，没有自建容量市场团队，正要决定哪个场址该为 2027 年招标做准备并拿去找放贷方
  buyingTrigger: >-
    法律通过，再加上场址期权、并网或放贷方接触的里程碑逼近，迫使团队在多花 EPC 和法务预算之前，先锁定电池时长、收入假设和投标策略
  currentAlternative: >-
    监管顾问、电力市场咨询公司、EPC 表格，以及手工搭建的内部 Excel 模型
  switchingReason: >-
    这个切口把几周的规则解读和模型重写，压缩成一份投标就绪的资产包，帮小规模开发商避开死胡同场址，带着更可信的投标论证去找放贷方
  pricingHypothesis: >-
    按可投标场址组合数量收取年度订阅费，再加上已提交投标资料室和放贷方尽调包的增值模块
