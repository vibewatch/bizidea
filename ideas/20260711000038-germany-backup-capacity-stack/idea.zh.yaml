jobsToBeDone:
  - job: >-
      当我手上有几个德国储能场址处于期权阶段时，帮我判断哪一个能中标备用容量招标又能融到资，这样我才只把 EPC 和法务预算花在真正可行的项目上。
    currentAlternative: "咨询公司备忘录加内部 Excel 收入模型"
    successMetric: "从场址纳入到批准投标/弃标决策所用的周数"
  - job: >-
      当我为储能项目启动放贷方接触时，帮我做出一份投标就绪的证据包，这样我才能融到债务、提交可信的投标，而不用为每个顾问都重写一遍论证。
    currentAlternative: "手工幻灯片、表格，以及分散的法务和技术工作流"
    successMetric: "投标提交前放贷方和顾问的修改轮次减少"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      这组信号给出了具体的拍卖规模、日期、储能专属通道和投标价格上限，即便没拿到法规原文，也是买方动作的有力证据。
  painIntensity:
    score: 4
    rationale: >-
      一个错误的招标判断会把场址控制权、工程和融资投入全部套牢，这给手上有活跃项目的开发商带来了实实在在的紧迫感。
  wedgeClarity:
    score: 5
    rationale: >-
      为一个储能项目组合做投标就绪，是一个范围很窄的工作流，买方、触发点、数据集和投资回报都很清楚。
  defensibility:
    score: 4
    rationale: >-
      中标结果基准、规则逻辑和放贷方级别的工作流历史可以复合成一份有差异化的数据集，不过咨询顾问在早期会来抢食。
  ventureScale:
    score: 5
    rationale: >-
      这个平台可以从德国一场招标，扩展到欧洲更广泛的灵活容量开发、融资和合规工作流。
topRisks:
  - name: "政策漂移"
    description: "招标规则可能在储能专场之前发生变化，这会打破静态假设，削弱买方信任。"
    mitigation: "把每个模型都绑定到最新规则版本，把情景规划作为核心产品的一部分来卖，并随着实施细则的变动持续更新客户。"
  - name: "初始市场狭窄"
    description: "德国第一轮储能专属招标可能只吸引到有限的活跃开发商，拖慢早期 ARR 增长。"
    mitigation: "先拿下最活跃的储能开发商和顾问，再迅速把同一套工作流扩展到氢能改造调峰机组和邻近的欧盟容量市场。"
  - name: "咨询顾问和公用事业公司的惯性"
    description: "大型公用事业公司和成熟开发商在第一轮拍卖周期里，可能更愿意依赖自建团队或现有咨询顾问，而不是新软件。"
    mitigation: "先用一款能省下真实项目时间的协同投标资料室产品，拿下小规模开发商，再靠结果数据和顾问合作关系向上打入大客户市场。"
