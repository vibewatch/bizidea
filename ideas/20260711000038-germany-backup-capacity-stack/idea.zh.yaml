    signalRefs: ["脱碳要求从第一天就决定投标方向"]
    sourceRefs: [2]
  - point: >-
      德国正明确采购灵活替代容量以支撑煤电退出，能快速拼出可信备用资产方案的开发商，面对的是真实需求信号，而不是政策相关的一厢情愿。
    signalRefs: ["煤电退出正在催生真实的替代需求"]
    sourceRefs: [1]
differentiator: >-
  咨询顾问能写一份备忘录，交易团队能搭一个投标模型，但两者都做不出一套把法规变化、资产设计、投标曲线和放贷方尽调串联在一个工作流里的活系统。通用的项目开发软件只追踪里程碑，不懂市场规则的逻辑。这家公司的赢法是把每一轮招标都变成基准数据——记录哪些场址特征、电池时长、投标水平和合规方案真正能中标、能融资。
