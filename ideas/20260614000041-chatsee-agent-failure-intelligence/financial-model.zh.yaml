scenarios:
  downside:
    description: 采购和模型风险审查将多个启动时间延迟一个季度，定价略低于计划，流失率上升因为较少试点能干净地转化为扩展。
    y3RevenueK: 5271.0
    y3EbitdaK: -333.2
    cashLowPointK: -252.9
    keyAssumptionChanges:
    - 36 个月模型中付费标志客户启动从 14 个降至 12 个。
    - 第一工作流 ARR 从 $480K 降至 $456K，成熟 ARR 从 $1.50M 降至 $1.416M。
    - 月度流失率从 1.0% 升至 1.5%，毛利率从 70% 降至 68%。
  base:
    description: 基准案例假设 36 个月内 14 个付费启动，Y3 末约 12.3 个活跃标志客户，退出 ARR 略低于研究中 $9M SOM 案例。
    y3RevenueK: 6363.8
    y3EbitdaK: 537.2
    cashLowPointK: 365.8
    keyAssumptionChanges:
    - 启动按建模的 M4 至 M36 节奏进行，共 14 个付费标志客户。
    - 合同从 $100K 试点逐步升至 $480K 第一工作流 ARR，再随标志客户扩展升至 $1.02M 和 $1.50M。
    - 月度流失率保持 1.0%，毛利率维持计划中的 70%。
  upside:
    description: 乐观案例假设第一批共创客户参考效应良好，启动提前，成熟标志客户更快达到多工作流支出上限。
    y3RevenueK: 8427.4
    y3EbitdaK: 2150.3
    cashLowPointK: 1095.1
    keyAssumptionChanges:
    - 启动提前至 M4、M6、M8、M10，并在 Y3 内以更稳定的节奏继续。
    - 第一工作流 ARR 升至 $504K，扩展 ARR 升至 $1.08M，成熟 ARR 升至 $1.56M。
    - 月度流失率改善至 0.7%，毛利率扩展至 72%。
sensitivity:
- variable: ARPU
  downsideCase: 第一工作流 ARR 降至 $432K，成熟 ARR 降至 $1.35M。
  baseCase: 第一工作流 ARR 为 $480K，成熟 ARR 为 $1.50M。
  upsideCase: 第一工作流 ARR 升至 $528K，成熟 ARR 升至 $1.65M。
  y3RevenueImpactK: -570.4
  cashImpactK: -274.6
- variable: CAC
  downsideCase: 由于后期启动延迟且 Y3 有 1-2 个标志客户未能关单，CAC 升至 $400K 以上。
  baseCase: CAC 按 18 个月混合基础建模约为 $318K。
  upsideCase: 若合作伙伴转介和参考效应提前启动，CAC 降至 $280K 以下。
  y3RevenueImpactK: -533.7
  cashImpactK: -140.6
- variable: churn
  downsideCase: 月度流失率升至 1.5%。
  baseCase: 月度流失率维持 1.0%。
  upsideCase: 月度流失率改善至 0.7%。
  y3RevenueImpactK: -483.5
  cashImpactK: -152.6
- variable: sales cycle
  downsideCase: 试点加安全审查在生产 ARR 启动前拉长至约 5 个月。
  baseCase: 付费试点持续 3 个月后转为生产。
  upsideCase: 随着安全包和连接器手册趋于成熟，试点压缩至约 2 个月。
  y3RevenueImpactK: -494.1
  cashImpactK: -248.7
- variable: gross margin
  downsideCase: 由于部署服务重度持续时间更长，毛利率落至 65%。
  baseCase: 毛利率为 70%。
  upsideCase: 随着实施标准化和支持负担下降，毛利率达到 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -229.1
- variable: hiring pace
  downsideCase: Q4Y2 和 Q4Y3 的招聘在收入证明到来之前提前两个季度。
  baseCase: 招聘按建模的证明后节奏进行。
  upsideCase: 晚期招募等到扩展证明和更强现金产生后再进行。
  y3RevenueImpactK: 0.0
  cashImpactK: -502.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Accounts[Target accounts] --> Pilots[Paid pilots]
      Pilots --> Workflows[Production workflows]
      Workflows --> Expansion[Expanded multi-workflow logos]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: 收入引擎
  finding: 基准案例收入来自 14 个付费启动，从约 $100K 试点复利增长至约 $480K 第一工作流 ARR，再进入约 $1.0M-$1.5M 的扩展标志客户。
- checkName: 必须做对的事
  finding: 公司必须在 Y1 完成 3 个付费试点，并在 Y2 前达到 5 个及以上生产标志客户，这样商业计划中描述的高 ACV 扩展逻辑才能启动。
- checkName: 模型崩溃条件
  finding: 若启动延迟约一个季度且流失率升至 1.5%，悲观案例的现金谷底比基准低约 $619K，Y3 EBITDA 转负。
- checkName: 下一轮融资证明
  finding: 最清晰的种子叙事是五个生产标志客户、一个第二工作流扩展，以及尽管基准案例能保持现金正向至 Y3，但 Y2 末 CAC 回收约 11 个月的成绩。
sanityChecks:
  ruleOf40: Y3 增长率 145.2% + EBITDA 利润率 8.4% = 153.6%
  burnMultiple: Y2 烧钱倍数约 0.35x（$683.6K 烧钱 / $196 万净新增收入）；Y3 随 EBITDA 转正而转为正值。
  revenuePerFte: 使用 Y3 Q4 14 人头计算约 $455K（高于典型 SaaS 的 $200-400K 区间，但对高 ACV fintech 管控软件而言合理）。
  flags:
  - 尽管买家采购流程繁重，模型仍需要在 36 个月内完成 14 个付费启动，因此销售执行风险仍是最大的非技术依赖。
  - 收入集中度较高，约十几个活跃标志客户驱动 Y3 结果；一个扩展延迟会明显拖累 ARR。
  - 若客户数据映射变得服务重度而非叠加层轻量，计划中的 70% 毛利率将被证明过于乐观。
