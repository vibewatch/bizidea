slug: merchant-classification-memory-os
date: '2026-06-14'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-14] 模型在计划日期的下个月启动。'
- id: A2
  name: M1 期初现金
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd] 使用声明的种子前融资区间下限作为期初现金余额。'
- id: A3
  name: 付费试点收入
  value: $100K over 90 days
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract] $75K-$125K 试点区间的中点。'
- id: A4
  name: 第一个生产工作流 ARR
  value: $480K
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract + research bottomUpSizingDrivers] 略低于研究中 $500K 工作流支出锚点。'
- id: A5
  name: 第二工作流扩展后的标志客户 ARR
  value: $1.02M
  unit: USD/logo/year
  source: '[BP milestones + research market.som] 反映一次工作流扩展和在达到成熟多工作流支出前增加的管控项目。'
- id: A6
  name: 成熟多工作流 ARR
  value: $1.50M
  unit: USD/logo/year
  source: '[research bottomUpSizingDrivers] 与研究中扩展后每机构多工作流年度支出相符。'
- id: A7
  name: 收入阶段时序
  value: 3-month pilot, then 12 months at first-workflow ARR, then 12 months at expanded ARR, then mature ARR
  unit: timeline
  source: '[BP product sixMonth/twelveMonth/twentyFourMonth] 与从试点到扩展的路线图一致。'
- id: A8
  name: 付费标志客户起始节奏
  value: M4, M7, M10, M13, M16, M20, M24, M26, M28, M30, M32, M34, M35, M36
  unit: start months
  source: '[BP milestones + GTM funnelTargets] 支持 Y1 完成 3 个付费试点、Y2 前 5+ 个生产标志客户、Y3 约 12 个活跃标志客户。'
- id: A9
  name: 月度标志客户流失率
  value: 1.0%
  unit: pct/month
  source: '[startup-finance heuristic] 基准案例和单位经济模型中使用的保守企业软件留存假设。'
- id: A10
  name: 目标毛利率
  value: 70%
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct] 按 30% COGS 建模。'
- id: A11
  name: 创始人/CEO 全成本薪酬
  value: $180K
  unit: USD/year
  source: '[BP team] 创始人适度现金底薪加薪资税和福利的估算值。'
- id: A12
  name: 创始工程师全成本薪酬
  value: $240K
  unit: USD/year
  source: '[BP team] 高级 fintech 工程人才加 20% 负担率的估算值。'
- id: A13
  name: 产品负责人全成本薪酬
  value: $210K
  unit: USD/year
  source: '[BP team] 在受监管环境中负责工作流设计和审批的产品负责人的估算值。'
- id: A14
  name: 支付解决方案工程师全成本薪酬
  value: $195K
  unit: USD/year
  source: '[BP team] 面向客户的 fintech 实施人才加 20% 负担率的估算值。'
- id: A15
  name: 企业客户主管全成本薪酬
  value: $275K
  unit: USD/year
  source: '[BP team + BP gtm.channels] 含 OTE 的首位银行企业销售人员估算值。'
- id: A16
  name: 新增工程师全成本薪酬
  value: $210K
  unit: USD/year
  source: '[BP strategicChoices.sequencingRationale] 试点转生产部署后保守的后续工程师招聘成本。'
- id: A17
  name: 行政/运营全成本薪酬
  value: $165K
  unit: USD/year
  source: '[BP operations] 财务、供应商管理和合规运营支持的估算值。'
- id: A18
  name: 招聘时间线
  value: M1 founder and founding engineer; M4 solutions; M7 product lead; M10 AE; M15 engineer; M18 solutions; M20 G&A; M24 AE; M27 engineer; M29 solutions; M31 AE; M33 G&A; M35 engineer
  unit: timeline
  source: '[BP team] 前五名员工直接按计划招募；后续招募在生产证明后按相同顺序延续。'
- id: A19
  name: 非薪资销售与市场营销支出爬坡
  value: $12K/mo in M1-M6, $18K/mo in M7-M12, $30K/mo in M13-M18, $40K/mo in M19-M24, $50K/mo in M25-M30, $60K/mo in M31-M36
  unit: USD/month
  source: '[BP gtm.channels] 创始人主导外呼、合作伙伴差旅和集中企业销售的估算值，不包含大规模付费获客。'
- id: A20
  name: 非薪资研发支出爬坡
  value: $15K/mo in Y1, $25K/mo in Y2, $35K/mo in Y3
  unit: USD/month
  source: '[BP product + operations] 云、安全、回放和评估工具的估算值。'
- id: A21
  name: 非薪资行政管理支出爬坡
  value: $20K/mo in Y1, $25K/mo in Y2, $30K/mo in Y3
  unit: USD/month
  source: '[BP operations] 法务、会计、保险和供应商审查开销的估算值。'
- id: A22
  name: 薪资分配至 P&L 科目
  value: Founder 70% S&M / 30% G&A; solutions 40% S&M / 60% R&D; engineering and product 100% R&D; AEs 100% S&M; G&A hires 100% G&A
  unit: allocation
  source: '[BP team rationales] 将岗位职责映射至 P&L 中使用的运营科目。'
- id: A23
  name: CAC 计算约定
  value: $318K
  unit: USD/new production logo
  source: '[model calc] 第 19-36 个月销售与市场营销支出除以 7 个生产转化客户。'
- id: A24
  name: 现金转换约定
  value: Cash movement equals EBITDA in this model
  unit: modeling convention
  source: '[startup-finance heuristic] 假设该阶段资本支出、税款、债务偿还和营运资金波动均不重要。'
- id: A25
  name: 融资需求规模
  value: $2.0M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + model cash trough] 最大提款约 $1.63M，四舍五入以保留约六个月的采购滑点缓冲。'
