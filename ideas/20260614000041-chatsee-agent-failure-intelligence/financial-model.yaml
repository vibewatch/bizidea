  unit: USD/year
  source: '[BP team] heuristic for a product leader handling workflow design and approvals in a regulated setting.'
- id: A14
  name: Payments solutions engineer loaded compensation
  value: $195K
  unit: USD/year
  source: '[BP team] heuristic for customer-facing fintech implementation talent plus 20% load.'
- id: A15
  name: Enterprise account executive loaded compensation
  value: $275K
  unit: USD/year
  source: '[BP team + BP gtm.channels] heuristic for a first bank-enterprise seller with OTE included.'
- id: A16
  name: Additional engineering hire loaded compensation
  value: $210K
  unit: USD/year
  source: '[BP strategicChoices.sequencingRationale] conservative follow-on engineering hire cost once pilots turn into production deployments.'
- id: A17
  name: G&A / ops loaded compensation
  value: $165K
  unit: USD/year
  source: '[BP operations] heuristic for finance, vendor-management, and compliance operations support.'
- id: A18
  name: Hiring timeline
  value: M1 founder and founding engineer; M4 solutions; M7 product lead; M10 AE; M15 engineer; M18 solutions; M20 G&A; M24 AE; M27 engineer; M29 solutions; M31 AE; M33 G&A; M35 engineer
  unit: timeline
  source: '[BP team] first five hires follow the plan directly; later hires extend the same sequencing after production proof.'
- id: A19
  name: Non-payroll sales & marketing spend ramp
  value: $12K/mo in M1-M6, $18K/mo in M7-M12, $30K/mo in M13-M18, $40K/mo in M19-M24, $50K/mo in M25-M30, $60K/mo in M31-M36
  unit: USD/month
  source: '[BP gtm.channels] heuristic for founder-led outbound, partner travel, and concentrated enterprise selling without broad paid demand gen.'
- id: A20
  name: Non-payroll R&D spend ramp
  value: $15K/mo in Y1, $25K/mo in Y2, $35K/mo in Y3
  unit: USD/month
  source: '[BP product + operations] heuristic for cloud, security, replay, and evaluation tooling.'
- id: A21
  name: Non-payroll G&A spend ramp
  value: $20K/mo in Y1, $25K/mo in Y2, $30K/mo in Y3
  unit: USD/month
  source: '[BP operations] heuristic for legal, accounting, insurance, and vendor-review overhead.'
- id: A22
  name: Payroll allocation to P&L lines
  value: Founder 70% S&M / 30% G&A; solutions 40% S&M / 60% R&D; engineering and product 100% R&D; AEs 100% S&M; G&A hires 100% G&A
  unit: allocation
  source: '[BP team rationales] maps role responsibilities into the operating lines used in the P&L.'
- id: A23
  name: CAC calculation convention
  value: $318K
  unit: USD/new production logo
  source: '[model calc] months 19-36 S&M spend divided by 7 production conversions.'
- id: A24
  name: Cash conversion convention
  value: Cash movement equals EBITDA in this model
  unit: modeling convention
  source: '[startup-finance heuristic] assumes capex, taxes, debt service, and working-capital swings are immaterial at this stage.'
- id: A25
  name: Funding ask sizing
  value: $2.0M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + model cash trough] max draw is about $1.63M, so the ask is rounded to preserve roughly six months of procurement-slippage buffer.'
