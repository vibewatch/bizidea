  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-14] model starts the month after the plan date.'
- id: A2
  name: Starting cash at M1
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd] uses the low end of the stated pre-seed range as the opening cash balance.'
- id: A3
  name: Paid pilot revenue
  value: $100K over 90 days
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract] midpoint of the $75K-$125K pilot range.'
- id: A4
  name: First production workflow ARR
  value: $480K
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract + research bottomUpSizingDrivers] slightly below the $500K workflow-spend research anchor.'
- id: A5
  name: Expanded logo ARR after second workflow
  value: $1.02M
  unit: USD/logo/year
  source: '[BP milestones + research market.som] reflects one workflow expansion and added controls before fully mature multi-workflow spend.'
- id: A6
  name: Mature multi-workflow ARR
  value: $1.50M
  unit: USD/logo/year
  source: '[research bottomUpSizingDrivers] matches the researched expanded multi-workflow annual spend per institution.'
- id: A7
  name: Revenue stage timing
  value: 3-month pilot, then 12 months at first-workflow ARR, then 12 months at expanded ARR, then mature ARR
  unit: timeline
  source: '[BP product sixMonth/twelveMonth/twentyFourMonth] mirrors the roadmap from pilot to expansion.'
- id: A8
  name: Paying-logo start cadence
  value: M4, M7, M10, M13, M16, M20, M24, M26, M28, M30, M32, M34, M35, M36
  unit: start months
  source: '[BP milestones + GTM funnelTargets] supports 3 paid pilots in Y1, 5+ production logos by Y2, and ~12 active logos by Y3.'
- id: A9
  name: Monthly logo churn
  value: 1.0%
  unit: pct/month
  source: '[startup-finance heuristic] conservative enterprise-software retention assumption used in the base case and unit economics.'
- id: A10
  name: Target gross margin
  value: 70%
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct] modeled as 30% COGS.'
