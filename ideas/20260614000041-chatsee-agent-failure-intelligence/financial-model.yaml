scenarios:
  downside:
    description: Procurement and model-risk review stretch several starts by one quarter, pricing lands a bit below plan, and churn rises as fewer pilots convert cleanly into expansions.
    y3RevenueK: 5271.0
    y3EbitdaK: -333.2
    cashLowPointK: -252.9
    keyAssumptionChanges:
    - Paying-logo starts fall from 14 to 12 over the 36-month model.
    - First-workflow ARR slips from $480K to $456K and mature ARR from $1.50M to $1.416M.
    - Monthly churn rises from 1.0% to 1.5% and gross margin from 70% to 68%.
  base:
    description: Base case assumes 14 paid starts across 36 months, roughly 12.3 active logos by Y3 exit, and exit ARR just under the researched $9M SOM case.
    y3RevenueK: 6363.8
    y3EbitdaK: 537.2
    cashLowPointK: 365.8
    keyAssumptionChanges:
    - Starts follow the modeled M4 through M36 cadence with 14 total paid logos.
    - Contracts step from a $100K pilot to $480K first-workflow ARR, then to $1.02M and $1.50M as logos expand.
    - Monthly churn holds at 1.0% and gross margin stays at the planned 70%.
  upside:
    description: Upside assumes the first design partners reference the product well, starts pull forward, and mature logos reach the high end of multi-workflow spend sooner.
    y3RevenueK: 8427.4
    y3EbitdaK: 2150.3
    cashLowPointK: 1095.1
    keyAssumptionChanges:
    - Starts pull forward into M4, M6, M8, M10 and continue at a steadier clip through Y3.
    - First-workflow ARR rises to $504K, expanded ARR to $1.08M, and mature ARR to $1.56M.
    - Monthly churn improves to 0.7% and gross margin expands to 72%.
sensitivity:
- variable: ARPU
  downsideCase: First-workflow ARR falls to $432K and mature ARR to $1.35M.
  baseCase: First-workflow ARR is $480K and mature ARR is $1.50M.
  upsideCase: First-workflow ARR rises to $528K and mature ARR to $1.65M.
  y3RevenueImpactK: -570.4
  cashImpactK: -274.6
- variable: CAC
  downsideCase: CAC rises toward $400K+ because later-stage starts slip and one to two Y3 logos do not close.
  baseCase: CAC is modeled at about $318K on an 18-month blended basis.
  upsideCase: CAC falls below $280K if partner referrals and references pull starts forward.
  y3RevenueImpactK: -533.7
  cashImpactK: -140.6
- variable: churn
  downsideCase: Monthly churn rises to 1.5%.
  baseCase: Monthly churn holds at 1.0%.
  upsideCase: Monthly churn improves to 0.7%.
  y3RevenueImpactK: -483.5
  cashImpactK: -152.6
- variable: sales cycle
  downsideCase: Pilot plus security review stretches to roughly 5 months before production ARR starts.
  baseCase: Paid pilot lasts 3 months before production conversion.
  upsideCase: Pilot compresses to roughly 2 months as the security pack and connector playbook harden.
  y3RevenueImpactK: -494.1
  cashImpactK: -248.7
- variable: gross margin
  downsideCase: Gross margin lands at 65% because deployments stay services-heavy longer.
  baseCase: Gross margin is 70%.
  upsideCase: Gross margin reaches 75% as implementations standardize and support load falls.
  y3RevenueImpactK: 0.0
  cashImpactK: -229.1
- variable: hiring pace
  downsideCase: The Q4Y2 and Q4Y3 hires are pulled forward by two quarters before revenue proof arrives.
  baseCase: Hiring follows the modeled post-proof cadence.
  upsideCase: Late hires wait until after expansion proof and stronger cash generation.
  y3RevenueImpactK: 0.0
  cashImpactK: -502.5
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Accounts[Target accounts] --> Pilots[Paid pilots]
      Pilots --> Workflows[Production workflows]
      Workflows --> Expansion[Expanded multi-workflow logos]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from 14 paid starts compounding from a ~$100K pilot to ~$480K first-workflow ARR and then into ~$1.0M-$1.5M expanded logos.
- checkName: Must go right
  finding: The company has to clear three paid pilots in Y1 and reach five or more production logos by Y2 so the high-ACV expansion motion described in the business plan can begin.
- checkName: Model breaks if
  finding: If starts slip by roughly a quarter and churn rises to 1.5%, downside cash trough drops about $619K below base and Y3 EBITDA flips negative.
- checkName: Next-round proof
  finding: The cleanest seed narrative is five production logos, one second-workflow expansion, and ~11-month CAC payback by late Y2 even though the base case can remain cash-positive into Y3.
sanityChecks:
  ruleOf40: Y3 growth 145.2% + EBITDA margin 8.4% = 153.6%
  burnMultiple: Y2 burn multiple ~0.35x (($683.6K burn) / $1.96M net new revenue); it turns positive in Y3 as EBITDA becomes positive.
  revenuePerFte: About $455K using Q4 Y3 headcount of 14 (above the typical $200-400K SaaS range, but plausible for high-ACV fintech control software).
  flags:
  - The model still needs 14 paid starts in 36 months despite procurement-heavy buyers, so sales execution risk remains the largest non-technical dependency.
  - Revenue concentration is high because roughly a dozen active logos drive the Y3 outcome; one delayed expansion meaningfully dents ARR.
  - If customer data mapping becomes services-heavy instead of overlay-light, the planned 70% gross margin will prove optimistic.
