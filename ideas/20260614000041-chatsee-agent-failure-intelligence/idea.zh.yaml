problem: >-
  发卡机构和收单机构正在将 AI 智能体引入商户码分类和交易标记，但在此之前，他们尚未建立安全的机制来记住哪些边缘案例曾经出过问题。一个错误标签就可能在数百万笔交易中引发连锁反应——交换费泄漏、积分奖励错配、争议噪声或合规报告错误。现有的监控和 QA 工具能发现错误，却无法把人工审核确认过的修复方案存成可复用的形式，防止同一商户描述符或规律在模型、提示词或规则变更后再次触发故障。
targetUser:
  primary: 北美发卡机构或收单机构的支付运营副总裁或商户数据负责人，负责使用 AI 智能体开展商户码分类和交易标记
  secondary: AI/ML 平台负责人或商户运营经理，分管分析师审核队列和分类质量
  buyer: COO、支付运营负责人或信用卡业务总经理
startupThesis:
  nonObviousInsight: >-
    智能体可靠性的最佳切口不是通用可观测性，而是高频金融分类工作流中的异常记忆——在这类场景里，每一个错误标签已经触发了人工覆盖、产生了下游损失信号，并为下一次决策留下了可复用规律。
  beachhead: >-
    北美发卡处理机构和收单机构中的商户类别码重分配与交易标记工作流，这些机构每月通过 Snowflake、Databricks 或内部 AI 分类管道处理数百万笔卡交易
  wedge: >-
    一层异常记忆——捕获每一次分析师覆盖、争议处理结果和下游对 AI 生成商户标签的纠正，然后在错误触达结算、积分或合规报告之前，用这些规律拦截或重新路由重复错误
  whyNowCatalyst: >-
    Agentic 工作流已在企业数据平台中运行，运行时保障正成为明确需求——支付团队再也无法把分类故障当作孤立的试点 bug 来对待。
  ventureScalePath: >-
    从商户分类和交易标记出发，逐步扩展至争议编码、拒付原因路由、AML 警报分类、承保文件分类，最终成为后台金融智能体的管控平台。
solution: >-
  产品嵌入支付团队的 AI 分类器与消费商户标签的系统之间。它从 Snowflake、Databricks 或内部审核队列摄取商户描述符、模型输出、分析师覆盖、争议处理结果和下游财务调整。一旦发生故障，平台将错误决策与实际修复方案关联起来，以带有人类可读策略注释的可复用记忆形式存储。新模型、提示词或规则上线前，系统会用客户自有的故障语料进行回放，阻止重引入已知错误的发布。生产中，只把真正的新型边缘案例路由给人工，并为每一条升级的分类附上可解释证据。
goToMarketSeed:
  firstCustomer: >-
    美国发卡处理机构、收单机构或绑卡 fintech，每月处理超过 500 万笔卡交易，且已在内部 AI 工作流中用于商户描述符规范化、MCC 分配或交易标记
  buyingTrigger: >-
    一次因重复商户误分类引发的积分、交换费或合规审查，或将 AI 标记从单一组合扩展至全部卡项目
  currentAlternative: 规则引擎、分析师审核队列、离岸运营团队以及通用 LLM 可观测性仪表盘
  switchingReason: >-
    第一个客户切换的原因是：这个切口把每一个已解决的异常转化为可复用护栏，在不替换现有数据管道或分类器的情况下削减重复错误和人工审核量。
  pricingHypothesis: 按年订阅，基于分类交易量和受管智能体工作流数量设定使用分级
