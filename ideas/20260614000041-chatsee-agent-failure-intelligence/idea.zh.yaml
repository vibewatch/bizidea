  - point: 157 个分类中超过 10,000 个故障构成的结构化语料，表明可重复的错误分类体系确实存在——这让异常记忆工作流可以产品化，而非服务重度化。
    signalRefs:
      - Agent 故障具有重复性且可分类
    sourceRefs:
      - 1
  - point: 商户码分类和交易标记已被明确列为目标工作流，支付团队因此是可信的第一批买家，而非推测性的相邻市场。
    signalRefs:
