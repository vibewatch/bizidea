jobsToBeDone:
  - job: >-
      当我们把 AI 商户分类推广至实时卡组合时，帮助我们的支付运营团队记住每一个经批准的异常并自动复用，这样才能在不扩充分析师人手的情况下提升处理量。
    currentAlternative: 规则调优和人工分析师覆盖队列
    successMetric: 每 10,000 笔交易的重复误分类率和分析师审核量
  - job: >-
      当提出新模型、提示词或供应商智能体时，帮助我们的商户数据团队用历史边缘案例测试它，这样才能在不重引入积分、交换费或合规错误的情况下批准变更。
    currentAlternative: 小型离线样本测试和基于电子表格的质量保证
    successMetric: 批准分类变更的时间，以及生产中重引入已知故障模式的数量
