topRisks:
  - name: 数据反馈链稀缺
    description: 部分发卡机构可能没有将 AI 标签与分析师修正或下游财务结果关联起来的干净反馈环。
    mitigation: 优先从审核队列和仓库表中已捕获覆盖记录的客户入手，在进行更宽泛的自动化销售前先将最小连接器产品化。
  - name: 内部自建惯性
    description: 支付团队可能认为可以扩展现有规则引擎或数据科学 notebook，而无需采购专属的独立管控层。
    mitigation: 作为叠加层销售，与现有分类器对接，并在一个工作流内以减少重复覆盖次数、缩短审计准备时间和降低利润泄漏来证明 ROI。
  - name: 规模化前紧迫感不足
    description: 仍处于试点阶段的买家在 AI 标记未达到一定交易量之前，可能感受不到足够的痛苦来为故障记忆买单。
    mitigation: 只瞄准已有 AI 分类在产部署、可见的分析师积压或近期出现积分、交换费或合规升级的发卡机构、收单机构和 fintech 项目。
