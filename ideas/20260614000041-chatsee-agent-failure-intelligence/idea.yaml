topRisks:
  - name: Data exhaust scarcity
    description: Some issuers may not have clean feedback loops linking AI labels to analyst corrections or downstream financial outcomes.
    mitigation: Start with customers whose review queues and warehouse tables already capture overrides, then productize minimal connectors before selling broader automation.
  - name: Internal-build inertia
    description: Payments teams may assume they can extend existing rules engines or data-science notebooks instead of buying a dedicated layer.
    mitigation: Sell as an overlay that plugs into current classifiers and prove ROI on reduced repeat overrides, audit prep time, and margin leakage within one workflow.
  - name: Limited urgency before scale
    description: Buyers still in pilot mode may not feel enough pain to fund failure memory until AI labeling is handling meaningful transaction volume.
    mitigation: Target only issuer, acquirer, and fintech programs with live AI classification, visible analyst backlogs, or recent rewards, interchange, or compliance escalations.
