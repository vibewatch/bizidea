- id: 64
  publisher: Arize AI
  title: 'Overview: Prompts <Frame caption="Use the playground to engineer the optimal prompt for your task"> <img src="https://storage.googleapis.com/arize-phoenix-assets/assets/gifs/playground_3.gif" /> </Frame> Prompt management allows you to create, store, and modify prompts for interacting with LLMs. By managing prompts systematically, you can improve reuse, consistency, and experiment with variations across different models and inputs. Unlike traditional software, AI applications are non-deterministic and depend on natural language to provide context and guide model output. The pieces of natural language and associated model parameters embedded in your program are known as “prompts.” Optimizing your prompts is typically the highest-leverage way to improve the behavior of your application, but “prompt engineering” comes with its own set of challenges. You want to be confident that changes to your prompts have the intended effect and don’t introduce regressions. To get started, jump
    to [Get Started: Prompts](/docs/phoenix/get-started/get-started-prompt-playground). ## Prompt Engineering Features Phoenix offers a comprehensive suite of features to streamline your prompt engineering workflow. * [Prompt Management](/docs/phoenix/prompt-engineering/overview-prompts/prompt-management) - Create, store, modify, and deploy prompts for interacting with LLMs * [Prompt Playground](/docs/phoenix/prompt-engineering/overview-prompts/prompt-playground) - Play with prompts, models, invocation parameters and track your progress via tracing and experiments * [Span Replay](/docs/phoenix/prompt-engineering/overview-prompts/span-replay) - Replay the invocation of an LLM. Whether it''s an LLM step in an LLM workflow or a router query, you can step into the LLM invocation and see if any modifications to the invocation would have yielded a better outcome. * [Prompts in Code](/docs/phoenix/prompt-engineering/overview-prompts/prompts-in-code) - Phoenix offers client SDKs to keep your prompts
    in sync across different applications and environments. ## Explore Demo Prompts <Card title="Arize Phoenix" href="https://phoenix-demo.arize.com/prompts" target="_blank" icon="https://mintlify.s3.us-west-1.amazonaws.com/arizeai-433a7140/favicon.png"> Explore example prompts in the Phoenix demo environment </Card> ## Learn More <CardGroup cols={2}> <Card title="Prompt Concepts" icon="lightbulb" href="/docs/phoenix/prompt-engineering/concepts-prompts/prompts-concepts"> Understand prompt engineering fundamentals and best practices </Card> <Card title="Using the Playground" icon="play" href="/docs/phoenix/prompt-engineering/how-to-prompts/using-the-playground"> Deep dive into playground features and workflows </Card> <Card title="Test Prompts at Scale" icon="flask" href="/docs/phoenix/prompt-engineering/tutorial/test-prompts-at-scale"> Run prompts over datasets to evaluate performance </Card> <Card title="Prompts in Code" icon="code" href="/docs/phoenix/prompt-engineering/overview-prompts/prompts-in-code">
    Use prompts programmatically in your applications </Card> </CardGroup>'
