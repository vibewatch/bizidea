  adoptionFrictionMatrix:
  - friction: Disconnected feedback loops between classification errors and downstream financial outcomes
    severity: high
    affectedBuyer: VP Payments Operations
    mitigation: Start with customers whose warehouse and review queues already capture overrides, disputes, and rewards exceptions in one place.
    sourceRefs:
