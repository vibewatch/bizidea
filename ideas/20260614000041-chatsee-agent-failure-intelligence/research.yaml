    - 4
    - 41
  - friction: Security and vendor diligence for AI controls in regulated environments
    severity: high
    affectedBuyer: CISO / Model Risk
    mitigation: Package the product around NIST and FS AI RMF-aligned evidence, audit logs, and human-approval controls.
    sourceRefs:
    - 20
    - 22
    - 28
  - friction: Budget ownership split across payments ops and AI platform teams
    severity: medium
    affectedBuyer: COO / Head of Cards
    mitigation: Sell a narrow initial KPI—repeat override rate or release-gate defect prevention—before expanding the footprint.
