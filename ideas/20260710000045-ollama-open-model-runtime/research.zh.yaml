competitors:
- name: Ollama
  stage: scale-up
  wedge: 本地到云的一体化开放模型运行时，尽量在不同环境里保持同一开发者工作流
  pricing: 本地运行时免费；托管层公开从免费到 $100/月
  strength: 开发者采用度巨大，本地优先体验很强。
  weaknessVsUs: 还没有把中立审批包、跨团队策略工作流或多集群发布证据做成产品。
  sourceRefs:
  - 1
  - 5
  - 7
- name: TrueFoundry
  stage: scale-up
  wedge: 覆盖网关、部署与治理流程的企业 AI control plane
  pricing: $499/月 Pro；$2,999/月 Pro Plus；Enterprise 定制定价
  strength: 企业平台故事完整，而且在本地部署和 VPC 场景里可信度高。
  weaknessVsUs: 它是从中心化平台运维出发，而不是先抓住工作站上那个精确原型上下文。
  sourceRefs:
  - 99
- name: Portkey
  stage: scale-up
  wedge: 面向生产流量的 AI 网关，覆盖审计日志、路由和 guardrail
  pricing: $49/月 Production；Enterprise 定制定价
  strength: 请求时治理和多模型控制能力很清楚。
  weaknessVsUs: 它治理的是模型已经选定之后的推理流量，不是把本地实验变成获批发布包。
  sourceRefs:
  - 105
  - 106
- name: LangSmith
  stage: scale-up
  wedge: 面向开发团队的 agent tracing、评估和部署工具
  pricing: $39/seat/月 Plus；Enterprise 定制定价
  strength: 开发者工作流很强，traces、sandbox 和评估做得顺手。
  weaknessVsUs: 它不会把硬件、运行时和策略上下文打成一个集群提级工件。
  sourceRefs:
  - 103
- name: KServe
  stage: incumbent
  wedge: Kubernetes 原生的 LLM serving，带 LLMInferenceService 和 canary rollout 原语
  pricing: 开源；只承担基础设施成本
  strength: 它是企业私有集群和预发布滚动上线里很可信的目标运行时。
  weaknessVsUs: 它只是部署框架，没有笔记本侧清单捕获，也没有审批工作流。
  sourceRefs:
  - 74
  - 78
regulatoryTechnicalConstraints:
- point: 面向保险公司的部署，需要拿出和 SR 11-7 风格模型风险要求兼容的模型文档、独立审查和变更控制证据。
  sourceRefs:
  - 47
  - 54
- point: 保险 AI 治理现在已经明确要求数据治理、留痕、公平性、网络安全、可解释性和人类监督。
  sourceRefs:
  - 48
  - 49
- point: 如果发布目标落在云端，还要满足保险行业云外包规则下的外包尽调、审计权和退出预案。
  sourceRefs:
  - 51
- point: 集群提级必须保住 RBAC、secret 处理、硬件约束和 serving 运行时兼容性，而不是只复制 prompt。
  sourceRefs:
  - 10
  - 11
  - 56
  - 57
  - 62
  - 74
validationSignals:
- point: Ollama 已经披露大规模企业覆盖和数百万月活开发者，说明可供原型化的表面积本身就已经存在。
  sourceRefs:
  - 1
  - 2
- point: Databricks 报告生产 AI 模型数量增长 11x，且开放模型偏好明显抬升，说明控制问题正在快速放大。
  sourceRefs:
  - 23
- point: Kubernetes 和私有集群 serving 已经是常见生产目标，所以从笔记本到集群的交接会变成一类重复出现的痛点。
  sourceRefs:
  - 27
  - 62
  - 74
- point: 面向保险业的指南，已经把生成式 AI 描述成“要带着治理、审计轨迹和人类监督一起上线”，而不只是实验。
  sourceRefs:
  - 128
  - 129
- point: Agent 治理研究依然反复提到缺少 purpose limit 和 kill switch，说明市场确实在寻找上线时的控制层。
  sourceRefs:
  - 95
openQuestions:
- 头部保险公司里，到底有多少已经把 Ollama 作为标准，而不是 Ollama、Continue、vLLM 和云原生开发工具混用？
- 保险公司的模型风险团队，在批准内部 copilot 进私有集群前，究竟会要求哪些精确工件？
- 买方会接受脱敏后的本地 eval 轨迹，还是从第一天就要求完全客户自管或本地部署捕获？
- 第一条付费扩张路径到底是哪一种：新增受管开发者、更多受治理工作流，还是相邻的网关策略模块？
