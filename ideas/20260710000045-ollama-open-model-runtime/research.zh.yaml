  adoptionFrictionMatrix:
  - friction: 怎么在不违反隐私或策略的前提下，抓住本地 prompt、eval 轨迹和工具使用记录。
    severity: high
    affectedBuyer: 安全架构师 / 模型风险审核人
    mitigation: 默认做脱敏、选择性抓轨迹，并支持客户自管部署。
    sourceRefs:
    - 47
    - 49
    - 51
  - friction: 笔记本硬件和集群 serving 基础设施之间的运行时漂移。
    severity: high
    affectedBuyer: AI 平台工程师
    mitigation: 把 Modelfile 和硬件画像一起抓下来，再在目标 vLLM 或 KServe 基础设施上回放验证后再送审。
