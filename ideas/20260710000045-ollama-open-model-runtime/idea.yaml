problem: >-
  Enterprise developers can now get an internal copilot working on a laptop with open models and the same runtime later used in cloud, but the handoff from prototype to production is still tribal. Model versions, quantization settings, prompts, tool permissions, and hardware assumptions live in local configs and chat threads, so platform and security teams cannot reproduce exactly what should be approved or deployed. In regulated companies, promising Ollama pilots stall or get rebuilt from scratch before they ever reach a private cluster.
targetUser:
  primary: AI platform engineers and developer platform teams at Fortune 500 insurers standardizing on Ollama for internal copilot prototyping
  secondary: Security architects and MLOps leads responsible for approved model catalogs, tool permissions, and audit evidence
  buyer: Head of AI Platform or VP Developer Platform
startupThesis:
  nonObviousInsight: >-
    The bottleneck in enterprise open-model adoption is no longer getting a model to run on a developer machine. The newly scarce layer is promotion governance: capturing the exact model, prompt, tool, and hardware context behind a successful local prototype and turning it into a reproducible, policy-approved production release.
  beachhead: >-
    Central AI platform teams at Fortune 500 insurers using Ollama on managed developer laptops to prototype internal claims and underwriting copilots, then promoting approved workflows into a private Kubernetes cluster.
  wedge: >-
    A laptop-to-cluster promotion gate that records local Ollama runtime manifests and eval traces, checks them against approved model and tool policies, and emits reproducible release bundles for private cloud or on-prem inference.
  whyNowCatalyst: >-
    Ollama's same-workflow local-to-cloud runtime, 8.9 million monthly developers, Fortune 500 reach, and regulated-sector usage make local open-model prototypes too common to govern with tickets and screenshots.
  ventureScalePath: >-
    Start with regulated internal copilots, then expand into the system of record for enterprise open-model promotion: model catalogs, tool-permission policies, hardware compatibility, release approvals, and post-deploy evidence across every team using local-first AI tooling.
solution: >-
  The product hooks into Ollama on developer machines and CI so teams can mark a local prototype for promotion instead of rebuilding it from scratch. It captures the model SHA, quantization, prompt/template settings, tool schemas, sample eval traces, and hardware profile, then redacts sensitive data and reruns staging evals on an approved cluster. Platform teams get a signed promotion manifest, policy check results, and a reproducible deployment bundle for private cloud or on-prem inference. Security and model-risk reviewers can see exactly which model, tools, and data-handling assumptions changed between local and staged versions. Over time, the company becomes the release system of record for open-model applications born on laptops and shipped into enterprise infrastructure.
goToMarketSeed:
  firstCustomer: >-
    Head of AI Platform at a Fortune 500 insurer rolling out an internal claims-adjuster copilot, where 20-50 developers already prototype with Ollama locally but production must run in a private Kubernetes cluster reviewed by security and model-risk teams.
  buyingTrigger: >-
    A business-backed pilot works on developer laptops, but production launch stalls because security, model-risk, or infrastructure teams cannot reproduce or approve the exact model-and-tool stack.
  currentAlternative: Manual workflow plus internal build using local README files, copied configs, CI scripts, and ticket-based approvals
  switchingReason: >-
    The promotion gate cuts weeks of back-and-forth by preserving what actually worked locally, proving policy compliance before cluster deployment, and eliminating one-off rebuilds by platform engineers.
  pricingHypothesis: >-
    Annual enterprise subscription priced by managed developers and promoted model workflows, with premium on-prem deployment and policy-pack modules.
