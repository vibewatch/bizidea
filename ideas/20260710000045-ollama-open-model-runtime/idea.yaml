jobsToBeDone:
  - job: >-
      When a developer team's Ollama prototype wins a business sponsor, help the AI platform lead capture and promote the exact local workflow, so they can ship it into a private cluster without a manual rebuild.
    currentAlternative: README files, copied config snippets, and bespoke platform rebuilds
    successMetric: Days from prototype approval to staging deployment with reproducible behavior
  - job: >-
      When security or model-risk asks what model, prompt, and tools an internal copilot uses, help the compliance-facing platform team produce a reviewable approval packet, so they can clear production launch without weeks of back-and-forth.
    currentAlternative: Ticket threads, screenshots, and ad hoc spreadsheet inventories
    successMetric: Hours to produce a complete approval packet for one promoted workflow
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Three same-day sources align on funding, adoption, regulated-sector usage, integrations, and the local-to-cloud workflow shift.
  painIntensity:
    score: 4
    rationale: The pain is acute once a regulated enterprise wants to move a successful local prototype into production, even if not every Ollama user feels it yet.
  wedgeClarity:
    score: 5
    rationale: A laptop-to-cluster promotion gate is a narrow, workflow-specific first product with a clear owner and buying trigger.
  defensibility:
    score: 4
    rationale: Promotion manifests, approval history, policy templates, and runtime-compatibility data compound over time, though adjacent MLOps vendors could move toward the space.
  ventureScale:
    score: 5
    rationale: As local-first open-model tooling spreads across enterprises, the same system can expand into the release, governance, and operations layer for a broad open-model stack.
topRisks:
  - name: Runtime vendor catch-up
    description: Ollama or adjacent MLOps vendors could add native promotion workflows and narrow the initial wedge.
    mitigation: Stay runtime-agnostic above the developer layer and own policy, approval, and audit workflows across multiple local-first runtimes.
  - name: Trace privacy resistance
    description: Regulated buyers may resist letting a startup capture prompts or eval traces from developer machines.
    mitigation: Ship default local redaction, customer-managed keys, and on-prem or VPC deployment where only signed manifests leave the laptop.
  - name: Cross-functional sales drag
    description: The purchase sits across AI platform, security, and model-risk teams, which can slow initial deals.
    mitigation: Land with one blocked internal-copilot promotion, prove cycle-time reduction on the first approved release, and expand after that success.
