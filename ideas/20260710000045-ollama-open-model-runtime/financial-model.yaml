modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> PayingLogos
      PayingLogos --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: "Revenue engine"
  finding: "Base-case revenue is driven by three paid design partners converting in year 1 and eight more logos landing through partner and adjacent-FSI channels to reach 15 active paying logos by Q4Y3."
- checkName: "Must go right"
  finding: "Security and model-risk teams must accept redacted or customer-managed capture early, because the 75% Y3 gross-margin target assumes deployments stop being bespoke after the first few pilots."
- checkName: "Model breaks if"
  finding: "If two late-stage logos slip and gross margin stalls near 72%, downside cash falls to about $238K and the company likely raises sooner than planned."
- checkName: "Next-round proof"
  finding: "A credible seed case is seven paying logos, three referenceable release approvals, repeatable customer-managed deployment, and partner-sourced pipeline evidence that the wedge scales beyond founder-led selling."
sanityChecks:
  ruleOf40: "Y3 growth 125.4% + EBITDA margin -4.4% = 121.0%"
  burnMultiple: "Y2 burn multiple is about 0.9x on roughly $780K of net new ARR and improves toward 0.1x in Y3 as the same core platform supports more logos."
  revenuePerFte: "$266K Y3 (within the roughly $200–400K vertical SaaS benchmark)"
  flags:
  - "The base case reaches the full researched 15-logo SOM by Q4Y3, so it depends on partner-sourced distribution and adjacent financial-services demand, not just cold outbound into the ~80-account insurer beachhead."
  - "Security acceptance of redacted or customer-managed capture is foundational; if prospects insist on fully on-prem capture from day one, margin expansion and deployment velocity both worsen."
  - "The model is only slightly EBITDA-positive in Q4Y3, so one quarter of sales-cycle slippage or one lost reference customer can pull the next round forward materially."
  - "Paid pilots start in M5; if buyers demand unpaid proofs of concept instead, CAC rises and the funding ask moves above the low end of the BP range."
