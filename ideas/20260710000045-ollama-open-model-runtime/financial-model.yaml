scenarios:
  downside:
    description: "Security review and deployment work stay more bespoke, so two late logos slip and margin expansion stalls below plan."
    y3RevenueK: 1835.0
    y3EbitdaK: -370.7
    cashLowPointK: 237.9
    keyAssumptionChanges:
    - "Year-3 exit logo count falls to 13 instead of 15 because two partner-sourced wins slip beyond the model horizon."
    - "Gross margin reaches only 64% in Y2 and 72% in Y3 because customer-managed deployments remain services-heavy."
    - "The logo ramp pauses after M24, with later lands spread through M27, M29, M31, M33, M35, and M36 rather than the base-case cadence."
  base:
    description: "Base case follows the business-plan milestones: three paid design partners in year 1, seven paying logos in year 2, and the researched 15-logo SOM by year 3 on the low-end $180K ARR benchmark."
    y3RevenueK: 2130.0
    y3EbitdaK: -94.7
    cashLowPointK: 469.2
    keyAssumptionChanges:
    - "Logos land in M5, M8, M11, M15, M18, M21, M24, M26, M27, M29, M30, M32, M33, M35, and M36, giving 3 / 7 / 15 active paying logos at the end of Y1 / Y2 / Y3."
    - "Each new logo starts as a paid $80K pilot recognized over 4 months and then converts into a $180K ARR subscription with no base-case premium upsell assumed."
    - "Gross margin improves from 50% to 75% as KServe/vLLM deployment templates, redaction controls, and policy packs become repeatable."
  upside:
    description: "Referenceable releases and partner warm intros pull one extra logo into the plan and allow a modest pricing uplift on mature accounts."
    y3RevenueK: 2394.0
    y3EbitdaK: 151.5
    cashLowPointK: 776.0
    keyAssumptionChanges:
    - "An extra partner-sourced logo lands by late Y3, lifting year-end active paying logos to 16."
    - "Mature subscriptions realize about $192K ARR per logo and paid pilots price at roughly $88K as customer-managed deployment and policy-pack premiums attach."
    - "Gross margin reaches 68% in Y2 and 77% in Y3 because deployment packaging standardizes faster than planned."
