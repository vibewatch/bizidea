slug: laptop-to-cluster-model-gate
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: "2026-08"
  unit: YYYY-MM
  source: '[BP date 2026-07-10] the model starts in the first full month after the business-plan date.'
- id: A2
  name: Opening cash and pre-seed round size
  value: "$2.0M"
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M] base case uses the low end because the team stays lean, pilots are paid, and revenue begins in month 5.'
- id: A3
  name: Starting active paying logos (M1)
  value: "0"
  unit: count
  source: '[BP executiveSummary + BP milestones] the company starts pre-revenue and must first land paid insurer design partners.'
- id: A4
  name: Customer definition
  value: "One paying insurer or adjacent regulated-enterprise workflow in either paid pilot or annual subscription"
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.unitOfValue] customersEop tracks active paying workflow logos rather than individual reviewers or developers.'
- id: A5
  name: Net logo ramp
  value: "3 active paying logos by Q4Y1, 7 by Q4Y2, and 15 by Q4Y3"
  unit: count
  source: '[BP milestones 0-12/12-24/24-36 + Research market.som 15 reachable logos] the schedule lands logos in M5, M8, M11, M15, M18, M21, M24, M26, M27, M29, M30, M32, M33, M35, and M36.'
- id: A6
  name: Channel mix after first reference release
  value: "Partner referrals and adjacent financial-services accounts drive roughly half of post-Y1 new logos"
  unit: mix
  source: '[BP gtm.channels + BP milestones 24-36 + Research reportMemo.distributionChannels] the year-3 ramp requires warm intros and adjacent-account expansion, not a large outbound team.'
- id: A7
  name: Commercial package per logo
  value: "$80K paid pilot recognized over 4 months ($20K/mo), then $180K ARR subscription ($15K/mo)"
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract $60-100K pilot and $180-250K annual contract + Research market.som $180K ARR/logo] the base case stays at the low end of recurring pricing and does not assume premium upsells in the core plan.'
- id: A8
  name: Gross margin ramp
  value: "50% in Y1, 65% in Y2, and 75% in Y3"
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 75 + BP product.sixMonth + BP operations] early delivery is deployment-heavy, then reusable KServe/vLLM packaging and policy packs lift the model to the planned steady-state margin.'
- id: A9
  name: Loaded compensation by role
  value: "Founder $160K; founding engineer $190K; solutions/platform engineer $170K; GTM lead $170K; senior platform engineer $185K; customer success $140K; account executive $160K; product/risk analyst $150K"
  unit: USD/year
  source: '[BP team + startup-finance heuristic] uses lean remote enterprise-software salary bands with payroll tax and benefits included.'
- id: A10
  name: Hiring timeline
  value: "M1 founder and founding engineer; M5 solutions/platform engineer; M8 GTM lead; M15 senior platform engineer; M18 customer success; M27 account executive; M32 product/risk analyst"
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale + BP milestones] product and deployment hires precede commercial scale, with later hires added only after reference releases and expanding logo count.'
- id: A11
  name: Functional payroll allocation
  value: "Founder 60% S&M / 40% G&A; founding and senior engineers 100% R&D; solutions/platform engineer 70% R&D / 30% G&A; GTM lead and account executive 100% S&M; customer success 60% S&M / 40% G&A; product/risk analyst 60% R&D / 40% G&A"
  unit: allocation
  source: '[BP team rationales + BP operations] rolls headcount cost into the P&L by operating function.'
- id: A12
  name: Non-payroll sales and marketing spend
  value: "$7K/mo M1-M6, $9K/mo M7-M12, $11K/mo M13-M18, $13K/mo M19-M24, $15K/mo M25-M30, and $17K/mo M31-M36"
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] covers founder travel, partner enablement, insurer events, and targeted enterprise outreach rather than broad paid demand gen.'
- id: A13
  name: Non-payroll R&D spend
  value: "$10K/mo in Y1, $12K/mo in Y2, and $14K/mo in Y3"
  unit: USD/month
  source: '[BP product + BP operations] covers secure replay infrastructure, logging, eval compute, hosting, and testing for customer-managed cluster releases.'
- id: A14
  name: Non-payroll G&A spend
  value: "$6K/mo in Y1, $8K/mo in Y2, and $10K/mo in Y3"
  unit: USD/month
  source: '[BP operations + Research reportMemo.regulatoryLandscape] covers counsel, audit, insurance, and enterprise security/compliance administration.'
- id: A15
  name: Cash conversion policy
  value: "EBITDA approximates cash movement"
  unit: modeling convention
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital swings are assumed immaterial at pre-seed scale.'
- id: A16
  name: CAC convention
  value: "$93.2K cumulative S&M per landed logo over the 36-month base case"
  unit: USD/logo
  source: '[BP gtm founder-led direct sales + partner referrals + model calc] uses total modeled sales and marketing spend divided by 15 active paying logos landed in the base case.'
- id: A17
  name: Monthly churn for unit economics
  value: "1.7%"
  unit: percent/month
  source: '[startup-finance heuristic + BP investorMemo.mustBeTrue + Research fiveForces.buyerPower/threatOfSubstitutes] deployed governance software should be sticky, but concentrated insurers and bundling risk make zero churn unrealistic.'
- id: A18
  name: Funding milestone
  value: "7 paying logos, 3 referenceable release approvals, repeatable customer-managed deployment, and a partner-sourced pipeline while still holding roughly 6 months of cash"
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] this is the proof package that makes a seed raise credible before the company spends against the full 15-logo SOM target.'
