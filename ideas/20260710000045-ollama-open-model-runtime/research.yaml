  adoptionFrictionMatrix:
  - friction: Capturing local prompts, eval traces, and tool use without violating privacy or policy
    severity: high
    affectedBuyer: Security architect / model-risk reviewer
    mitigation: Default redaction, selective trace capture, and customer-managed deployment options.
    sourceRefs:
