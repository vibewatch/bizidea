    - 49
    - 51
  - friction: Runtime drift between laptop hardware and cluster serving infrastructure
    severity: high
    affectedBuyer: AI platform engineer
    mitigation: Capture the Modelfile and hardware profile, then replay on target vLLM or KServe infrastructure before approval.
