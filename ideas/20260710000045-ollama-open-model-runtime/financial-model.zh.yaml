scenarios:
  downside:
    description: 安全审查和部署工作维持更强的定制化，两笔后段 logo 延期，毛利扩张也低于计划。
    y3RevenueK: 1835.0
    y3EbitdaK: -370.7
    cashLowPointK: 237.9
    keyAssumptionChanges:
    - 第 3 年末的活跃付费 logo 从 15 个降到 13 个，因为两笔由伙伴带来的签约滑出了模型期。
    - Y2 / Y3 毛利率只能到 64% / 72%，因为客户自管部署仍然偏重服务交付。
    - M24 之后的 logo 爬坡暂停，后续成交分散到 M27、M29、M31、M33、M35 和 M36，而不是按基准节奏落下。
  base:
    description: 基准情景沿用 business-plan 的里程碑：第 1 年 3 个付费共创客户，第 2 年 7 个付费 logo，第 3 年按研究里的低位 $180K ARR 基准做到 15 个 logo 的 SOM。
    y3RevenueK: 2130.0
    y3EbitdaK: -94.7
    cashLowPointK: 469.2
    keyAssumptionChanges:
    - Logo 在 M5、M8、M11、M15、M18、M21、M24、M26、M27、M29、M30、M32、M33、M35 和 M36 落地，因此 Y1 / Y2 / Y3 期末分别有 3 / 7 / 15 个活跃付费 logo。
    - 每个新 logo 先从一个 $80K 的付费试点起步，在 4 个月内确认收入，随后转成 $180K ARR 的订阅；基准情景不预设高级 upsell。
    - 随着 KServe / vLLM 部署模板、脱敏控制和策略包变得可复用，毛利率从 50% 提升到 75%。
  upside:
    description: 可引用的发布案例和伙伴暖启动引荐，让计划里多拉进一个 logo，并在成熟账户上拿到温和提价。
    y3RevenueK: 2394.0
    y3EbitdaK: 151.5
    cashLowPointK: 776.0
    keyAssumptionChanges:
    - 到 Y3 末额外落下 1 个由伙伴带来的 logo，使期末活跃付费 logo 升到 16 个。
    - 成熟订阅每个 logo 可做到约 $192K ARR，付费试点约为 $88K，因为客户自管部署和策略包高级模块开始挂上去。
    - Y2 / Y3 毛利率可到 68% / 77%，因为部署打包标准化的速度快于原计划。
sensitivity:
- variable: ARPU
  downsideCase: $168K ARR + $72K 试点
  baseCase: $180K ARR + $80K 试点
  upsideCase: $192K ARR + $88K 试点
  y3RevenueImpactK: -162.0
  cashImpactK: -146.5
- variable: CAC
  downsideCase: 如果伙伴转介绍不达预期，S&M 现金支出会比计划高出 20%。
  baseCase: 创始人主导销售 + 伙伴协同销售，让每个 logo 的 CAC 保持在约 $93K。
  upsideCase: 在不改变 logo 计划的情况下，暖启动引荐把非薪酬 S&M 再压低约 10%。
  y3RevenueImpactK: 0.0
  cashImpactK: -72.8
- variable: 流失
  downsideCase: Q2Y3 之后流失 1 个成熟 logo，因此 Q4Y3 只剩 14 个活跃 logo。
  baseCase: 在公司仍以获客为主的阶段，模型把数量视为净活跃 logo。
  upsideCase: 所有已落地 logo 都完成续约，第 3 年 cohort 保持完整。
  y3RevenueImpactK: -90.0
  cashImpactK: -36.7
- variable: 销售周期
  downsideCase: 后段 logo 因为安全和数据映射评审拉长，大约整体晚一个季度。
  baseCase: 交易按 M5、M8、M11、M15、M18、M21、M24、M26、M27、M29、M30、M32、M33、M35 和 M36 落地。
  upsideCase: 标杆客户能把后续 logo 的成交时间提前 1-2 个月。
  y3RevenueImpactK: -105.0
  cashImpactK: -110.7
- variable: 毛利率
  downsideCase: Y2 / Y3 毛利率最高只能到 64% / 72%。
  baseCase: Y2 / Y3 毛利率达到 65% / 75%。
  upsideCase: Y2 / Y3 毛利率达到 68% / 77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -50.7
- variable: 招聘节奏
  downsideCase: 增长型招聘会比收入 proof 提前约一个季度。
  baseCase: 高级工程师、客户成功、AE 和分析师分别在 M15、M18、M27、M32 入职。
  upsideCase: 后续岗位等到同样的 proof 出现后再招，时间点顺延为 M17、M20、M29 和 M34。
  y3RevenueImpactK: 0.0
  cashImpactK: -118.3
modelDiagram:
  title: 单位经济流程
  mermaid: |
    flowchart LR
      TargetAccounts[目标账户] --> PaidPilots[付费试点]
      PaidPilots --> PayingLogos[付费 logo]
      PayingLogos --> SubscriptionRevenue[订阅收入]
      SubscriptionRevenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎来自第 1 年 3 个付费共创客户转化，再叠加 8 个通过伙伴与相邻金融服务渠道落下的新增 logo，到 Q4Y3 时做到 15 个活跃付费 logo。
- checkName: 必须成立的前提
  finding: 安全和模型风险团队必须尽早接受脱敏后的、或客户自管的捕获模式，因为第 3 年 75% 毛利率的目标，建立在前几个试点之后部署不再是重定制服务的前提上。
- checkName: 模型会在何时失效
  finding: 如果两笔后段 logo 延期，且毛利率卡在约 72%， downside 现金低点会掉到约 $238K，公司大概率得比计划更早融资。
- checkName: 下一轮融资所需 proof
  finding: 可信的 seed 故事，要拿出 7 个付费 logo、3 个可引用的发布审批案例、可重复的客户自管部署，以及能证明切口不只靠创始人销售的伙伴管道证据。
sanityChecks:
  ruleOf40: Y3 增长率 125.4% + EBITDA 利润率 -4.4% = 121.0%
  burnMultiple: Y2 的 burn multiple 约为 0.9x，对应约 $780K 的净新增 ARR；进入 Y3 后，同一核心平台支撑更多 logo，指标改善到约 0.1x。
  revenuePerFte: $266K（Y3；落在垂直 SaaS 约 $200–400K 的基准区间内）
  flags:
  - 基准情景在 Q4Y3 就打满了研究给出的 15 个 logo SOM，因此它依赖伙伴带来的分发和相邻金融服务需求，而不只是对约 80 个保险滩头账户做冷启动外呼。
  - 安全团队是否接受脱敏后的、或客户自管的捕获，是整个模型的地基；如果 prospect 从第一天就要求全本地部署捕获，毛利扩张和部署速度都会更差。
  - 模型到 Q4Y3 也只是略微 EBITDA 转正，所以哪怕只晚一个季度，或丢掉一个标杆客户，下一轮融资时间点都会明显提前。
  - 付费试点从 M5 开始；如果买方要求先做免费 POC，CAC 会抬升，融资需求也会高于 BP 区间下限。
