slug: laptop-to-cluster-model-gate
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型启动月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10]；模型从 business-plan 日期后的第一个完整月份开始。'
- id: A2
  name: 期初现金与 pre-seed 融资规模
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M]；基准情景取区间下限，因为团队保持精简、试点可收费，而且第 5 个月开始有收入。'
- id: A3
  name: 起始付费活跃 logo（M1）
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones]；公司从零收入起步，得先拿下付费保险共创客户。'
- id: A4
  name: 客户定义
  value: 一个付费的保险公司或相邻受监管企业工作流，形态可以是付费试点，也可以是年度订阅
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.unitOfValue]；customersEop 统计的是活跃付费工作流 logo，不是单个审核人或开发者。'
- id: A5
  name: 净新增 logo 爬坡
  value: Y1 Q4 达到 3 个活跃付费 logo，Y2 Q4 达到 7 个，Y3 Q4 达到 15 个
  unit: count
  source: '[BP milestones 0-12/12-24/24-36 + Research market.som 15 reachable logos]；对应落单月份为 M5、M8、M11、M15、M18、M21、M24、M26、M27、M29、M30、M32、M33、M35 和 M36。'
- id: A6
  name: 首个可引用发布之后的渠道结构
  value: Y1 之后新增 logo 里，大约一半来自伙伴转介绍和相邻金融服务账户
  unit: mix
  source: '[BP gtm.channels + BP milestones 24-36 + Research reportMemo.distributionChannels]；第 3 年的爬坡靠的是暖启动引荐和相邻账户扩张，不是大规模外呼团队。'
- id: A7
  name: 单个 logo 的商业包
  value: $80K 的付费试点在 4 个月内确认收入（$20K/mo），之后转为 $180K ARR 的订阅（$15K/mo）
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract $60-100K pilot and $180-250K annual contract + Research market.som $180K ARR/logo]；核心计划按经常性定价的低位来建模，不预设高级 upsell。'
- id: A8
  name: 毛利率爬坡
  value: Y1 为 50%，Y2 为 65%，Y3 为 75%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 75 + BP product.sixMonth + BP operations]；前期交付部署较重，后期靠可复用的 KServe / vLLM 打包与策略包把模型抬到计划中的稳态毛利。'
- id: A9
  name: 各角色全成本薪酬
  value: 创始人 $160K；创始工程师 $190K；解决方案 / 平台工程师 $170K；GTM 负责人 $170K；高级平台工程师 $185K；客户成功 $140K；客户合伙人 / AE $160K；产品 / 风险分析师 $150K
  unit: USD/year
  source: '[BP team + startup-finance heuristic]；采用精简型远程企业软件薪酬带，已包含税费和福利。'
- id: A10
  name: 招聘时间表
  value: M1 招创始人和创始工程师；M5 招解决方案 / 平台工程师；M8 招 GTM 负责人；M15 招高级平台工程师；M18 招客户成功；M27 招 AE；M32 招产品 / 风险分析师
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale + BP milestones]；产品与部署岗位先于商业扩张，后续招聘要等标杆发布和 logo 数增长后再加。'
- id: A11
  name: 按职能分摊薪酬
  value: 创始人 60% 记入 S&M / 40% 记入 G&A；创始工程师和高级工程师 100% 记入 R&D；解决方案 / 平台工程师 70% 记入 R&D / 30% 记入 G&A；GTM 负责人和 AE 100% 记入 S&M；客户成功 60% 记入 S&M / 40% 记入 G&A；产品 / 风险分析师 60% 记入 R&D / 40% 记入 G&A
  unit: allocation
  source: '[BP team rationales + BP operations]；把 headcount 成本分摊进 P&L 各个经营职能。'
- id: A12
  name: 非薪酬销售与市场支出
  value: $7K/mo（M1-M6）、$9K/mo（M7-M12）、$11K/mo（M13-M18）、$13K/mo（M19-M24）、$15K/mo（M25-M30）、$17K/mo（M31-M36）
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic]；覆盖创始人差旅、伙伴 enablement、保险行业活动和定向企业拓客，而不是广撒网的付费获客。'
- id: A13
  name: 非薪酬 R&D 支出
  value: Y1 每月 $10K，Y2 每月 $12K，Y3 每月 $14K
  unit: USD/month
  source: '[BP product + BP operations]；覆盖安全回放基础设施、日志、eval 算力、托管和客户自管集群发布测试。'
- id: A14
  name: 非薪酬 G&A 支出
  value: Y1 每月 $6K，Y2 每月 $8K，Y3 每月 $10K
  unit: USD/month
  source: '[BP operations + Research reportMemo.regulatoryLandscape]；覆盖法务、审计、保险和企业安全 / 合规管理。'
- id: A15
  name: 现金转换规则
  value: EBITDA 近似代表现金变动
  unit: modeling convention
  source: '[startup-finance heuristic]；在 pre-seed 阶段，capex、税费、融资成本和营运资本波动都视为影响不大。'
- id: A16
  name: CAC 口径
  value: 36 个月基准情景下，每个落地 logo 对应累计 $93.2K 的 S&M 支出
  unit: USD/logo
  source: '[BP gtm founder-led direct sales + partner referrals + model calc]；用模型里的总销售与市场费用除以 15 个活跃付费 logo。'
- id: A17
  name: 单位经济模型的月流失率
  value: 1.7%
  unit: percent/month
  source: '[startup-finance heuristic + BP investorMemo.mustBeTrue + Research fiveForces.buyerPower/threatOfSubstitutes]；已上线的治理软件会比较粘，但买方集中且存在打包风险，所以不能假设零流失。'
- id: A18
  name: 下一轮融资里程碑
  value: 做到 7 个付费 logo、3 个可引用的发布审批案例、可重复的客户自管部署能力，以及由伙伴带来的 pipeline，同时手里还保留约 6 个月现金
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary]；这套 proof 能让 seed 融资更可信，不必等公司把 15 个 logo 的 SOM 全打满。'
