slug: laptop-to-cluster-model-gate
date: '2026-07-10'
executiveSummary: Ollama 打通了本地到云的工作流，又已经进到大量企业团队里，真正新冒出来的瓶颈不再是模型能不能拿到，而是开发者笔记本和受监管私有集群之间的提级治理。第一个切口，是给大型保险公司的内部理赔与核保 copilot 做一套从笔记本到集群的提级闸门：20-50 名开发者先在本地做原型，安全、模型风险和平台团队再共同决定能不能上线。产品要抓住让原型真正跑通的那套 Ollama 运行时上下文——model SHA、Modelfile 设置、量化方式、prompt、工具、eval 轨迹和硬件画像——再把它变成可复现的审批包和集群发布包，而不是让平台团队手工重建。研究支持这个时点：开放模型在企业里已经很普遍，Kubernetes 是常见的生产目标，保险公司的治理框架也早就要求文档化审查和变更控制。近端市场真实存在，但很窄；研究给出的保险滩头 SAM 约为 $14.4M，第 3 年 SOM 约为 $2.7M，所以风险投资逻辑成立的前提，是公司能从保险提级工作流继续扩成受监管企业开放模型发布的记录系统。最强的 proof 不是泛 adoption，而是抓住一个已经卡住的 copilot 上线，让它明显更快过审，而且不用平台团队重建。现在最大的未解问题有两个：上线延误到底有多大比例真是因为可复现性，而不是数据权限清理；以及安全团队会不会接受脱敏后的、或由客户自管的笔记本轨迹捕获。因此，这份计划优先押注共创客户证据、客户自管部署选项，以及先把一个目标运行时路径跑通，而不是过早扩成网关、注册表或多运行时大平台。
problem:
- AI 平台团队接手的本地 Ollama copilot 往往已经能跑，但一旦理赔或核保工作流要上私有集群，精确的模型、量化、prompt、工具和硬件假设就散落在各台笔记本、README 和工单里。
- 安全、模型风险和基础设施审核人既没法复现，也没法批准最终发布物，于是平台工程师只能手工重建整套栈，生产上线常常一拖就是几周。
solution:
- 给 Ollama 加一层受管笔记本和 CI 捕获：当团队把某个工作流标记为待提级时，系统记录下提级清单——model SHA、Modelfile、量化方式、prompt template、工具 schema、eval 轨迹摘要和硬件画像。
- 再把这份清单回放到已批准的预发集群上，跑策略与兼容性检查，最后为私有 Kubernetes 目标产出已签名审批包和可部署发布包，而不是一次性的手工重建。
whyWeWin:
- 这个切口抓住的是现有厂商最常忽略的时刻：工作站上已经跑通，但还没过受监管发布审批。运行时、注册表、网关和 serving 栈各自覆盖的是更靠后的某一段，却没有哪家把能放行上线的审批包真正做出来。
- 每一次通过或被打回的提级，都会沉淀出模型、工具、集群之间的运行时兼容性、策略例外和审核结果数据；这些数据在受监管保险工作流里会比通用 devtools 产品积得更快。
strategicChoices:
  beachhead: 滩头市场是北美和欧洲的大型保险公司：他们在受管的 Ollama 笔记本上跑内部理赔或核保 copilot，再把它提级到带正式安全与模型风险审核的私有 Kubernetes 集群。
  wedgeRationale: 这个滩头市场已经有明确的经济买方、有管理层看得见的上线阻塞点，也有反复出现的审批步骤，所以只要一套提级闸门，就能在一个季度内在一条卡住的 copilot 上证明价值；如果一开始就做更宽的 LLMOps、网关或多运行时治理，不但集成更多、买方更多，前后对比的 proof 也会弱很多。
  sequencingRationale: 公司第一步先交付 Ollama 捕获 + 一条受治理的集群导出路径，因为今天缺的 proof 是“能不能可复现地过审”，不是泛化的流量控制。创始人直销和共创客户 onboarding 要先于更大的 GTM 团队，这样首批客户会先帮公司定义：审核人到底最低需要哪些工件。等到一个保险工作流能在不重建的情况下进生产，再追加客户自管部署、更多运行时导出和伙伴分发。
  notYet:
  - 部署完成后、面向请求时的 AI 网关路由、可观测性与 guardrails
  - 提级之前的训练、微调或通用模型注册表工作流
  - 面向外部用户或外部分发的 AI 系统——这类系统的安全和监管范围都比内部保险 copilot 更大
market:
  tam: $0.4B（研究估算：约 2,000 家 Global 2000 企业 × 假设每家 200 名受治理 AI 用户 × 相邻工具约 $75/用户/月 的基准）
  sam: $14.4M（研究估算：约 80 家北美和欧洲大型保险公司 / 承保机构，每家约 200 名受治理用户，且都有私有集群 AI 治理需求）
  som: $2.7M（研究估算：第 3 年可触达约 15 个 logo，按每个账户约 $180k ARR 计算）
  segments:
  - 在私有 AI 基础设施上，把内部理赔 / 核保 copilot 做成标准化流程的大型保险公司与承保机构
  - 相邻的银行和其他受监管金融机构：它们也在把本地优先的开放模型 copilot 提级到受治理的私有集群里
  buyingProcess: 通常要先有一位 AI 平台负责人或 MLOps 负责人证明：某个具名 copilot 的上线就是卡在审批摩擦上，Head of AI Platform 或 VP Developer Platform 才会出面主导这笔交易。安全、模型风险和基础设施审核人会深度影响决策，因为第一笔预算释放，发生在某个工作流真要提交一份可审阅的生产审批包时，而不是团队还在本地试验的时候。
product:
  mvp: MVP 先聚焦一条保险 copilot 工作流：从受管的 Ollama 笔记本和 CI 抓取提级清单，在 KServe 支撑的私有集群路径上重跑预发 eval，并生成已签名审批包和可部署发布包。MVP 故意收得很窄：只支持一个本地运行时家族、一个目标集群模式、人审在环，不取代网关，也不替代可观测性。
  sixMonth: 6 个月内补齐客户自管 VPC / 本地部署、脱敏控制、面向平台 / 安全 / 模型风险团队的角色化审核视图，以及给未标准化到 KServe 的保险集群提供直接 vLLM 导出。
  twelveMonth: 12 个月内交付可复用的策略包、审批差异历史、接入目标 serving 栈的 canary / rollback hook，以及 benchmarking 视图，告诉客户哪些提级模式在不同保险团队里过审最快。
  twentyFourMonth: 24 个月内，从 Ollama 专属捕获扩成面向其他本地优先开放模型工具的运行时中立提级目录，再把同一套审批与发布系统卖进相邻的受监管金融机构，以及同样受私有集群约束的医疗 / 政府团队。
  keyBets:
  - 只要产品给出的审批包比手工工单更扎实，保险审核人就会接受脱敏后的、或客户自管的轨迹捕获。
  - 在需要多运行时广度之前，先支持一到两种目标 serving 栈导出，就足以拿下前 3-5 个客户。
  - 在运行时厂商或网关厂商把工作流深度补上之前，提级周期数据和审批历史会先沉淀成可防守的数据资产。
gtm:
  wedge: 先盯住保险公司 AI 平台团队里一条已经卡住的理赔或核保 copilot 提级流程：在那 20-50 名已经用 Ollama 做本地原型的开发者机器上装好捕获层，帮他们在不靠平台工程重建的前提下，放行一次私有集群发布；等审核人开始信这份审批包，再扩席位和工作流覆盖。
  channels:
  - 创始人直销目标保险公司的 Head of AI Platform、VP Developer Platform 和 MLOps 负责人
  - 通过已在做保险 AI 项目的模型风险、AI 治理和安全咨询机构转介绍共创客户
  - 面向客户自管环境部署 KServe 或 vLLM 的私有 AI 基础设施集成商
  funnelTargets: 目标账户→合格试点 20-25%；合格试点→上线中的共创客户部署 60%+；共创客户→年度合同 50-60%，前提是完成一次已获批的集群发布
  pricing: 按受治理开发者数量和活跃提级工作流数量收取年度企业订阅费，前置再收一笔付费的共创客户试点费用；客户自管 VPC / 本地部署和保险策略包模块另行加价。这和买方的预算逻辑一致：他们花钱是为了打通受治理发布，不是为了买更便宜的推理，或一块通用可观测性面板。
businessModel:
  revenueStreams:
  - 按受治理开发者席位和已提级工作流计费的年度订阅
  - 策略映射与集群集成的付费共创客户试点 / onboarding 费用
  - 客户自管部署和保险策略包的高级模块收入
  unitOfValue: 受提级策略约束的开发者席位；再靠新增已提级工作流做扩张
  targetGrossMarginPct: 75
  expansionLevers:
  - 从一条卡住的 copilot 工作流，扩到同一平台团队里的多条内部保险 copilot
  - 在现有客户里增加更多受治理开发者、审核人和集群环境
  - 向上销售客户自管部署、策略包，以及后续的运行时中立覆盖
strategyMap:
  northStarMetric: 从业务已认可的本地 copilot 原型，到策略已批准的私有集群发布，中位数要花多少天
  inputMetrics:
  - 活跃保险工作流里已捕获的提级清单数量
  - 无需平台团队手工重建、就能到达预发环境的提级工作流占比
  - 拼出一份模型风险与安全审批包所需的小时数
  - 试点转年度合同的转化率
  moatsToBuild:
  - 跨模型、工具、硬件画像与保险控制环境的“通过 / 驳回”提级清单数据集
  - 把本地 Ollama 运行时设置映射到 KServe / vLLM 集群发布包的兼容性地图
  - 贴着保险审核人真实审批方式沉淀下来的可复用策略包和例外模式
  killCriteria:
  - 前 8 个目标保险账户里，如果少于 3 家确认“可复现性和审批包缺口”是前两大上线阻塞点之一，而不是更广义的数据权限清理问题。
  - 前 3 个上线试点没能把“原型到集群发布”的时间至少缩短 30%，或仍然需要平台团队手工重建才能进预发。
  - 连续 3 个共创客户里，安全团队都拒绝脱敏后的、或客户自管的笔记本捕获模式，导致交付经济学始终偏服务化。
  mermaid: |
    flowchart LR
      Wedge[卡住的保险 copilot 提级] --> MVP[Ollama 捕获 + 受治理的 KServe 发布]
      MVP --> Proof[审批包更快、且不用手工重建]
      Proof --> Expansion[vLLM 导出、策略包、运行时中立提级系统]
investorMemo:
  verdict:
    call: Watch
    conviction: 切口清楚、时点也对，但短期保险市场偏小，公司还得证明：审批摩擦确实足够频繁，而且主要由可复现性问题驱动，才能撑起一个独立品类。
    whyBelieve: Ollama 在企业里的覆盖、基于 Kubernetes 的生产常态，以及保险行业现有的治理要求，确实让“发布审批成为瓶颈”这件事在今天很成立；而竞争格局也仍然是分散的，还没有谁把整条工作流吃掉。
    whyDoubt: 研究还没有量化：到底有多少保险公司上线延误，核心原因真是提级治理，而不是数据访问和身份治理；如果这个差别不够大，业务就很容易被运行时厂商或网关厂商打包进去。
    nextDiligence: 下一步要拿到 8-10 家保险 prospect 的脱敏上线审查材料，以及试点前后时间线，确认阻塞频率、必需审批字段和付费意愿。
  firstCustomer:
    title: Fortune 500 保险公司的 Head of AI Platform
    profile: 他负责一条理赔或核保 copilot 计划：20-50 名开发者先在本地用 Ollama 做原型，但生产必须跑在经过安全与模型风险团队审核的私有 Kubernetes 集群上。
    trigger: 一个有业务背书的内部 copilot 已经能在笔记本上跑通，但因为审核人无法复现生产里要审批的那套精确模型、prompt、工具和硬件栈，发布一拖再拖。
    buyer: Head of AI Platform 或 VP Developer Platform
    initialContract: 先签一笔 $60k-$100k 的共创客户试点：覆盖一条卡住的工作流和一个私有集群目标；随后随着 150-200 名受治理用户和更多工作流通过闸门，转成约 $180k-$250k 的年度订阅。
  mustBeTrue:
  - 前 10 个目标保险账户里，至少一半当前或近期确实有 copilot 上线主要卡在可复现性和审批包缺口。
  - 前 5 个试点里，至少 3 个的安全和模型风险团队能接受脱敏后的、或客户自管的清单 / 轨迹捕获。
  - 产品能在首个真实工作流里，把“原型到集群发布”的时间缩短 30%+，并干掉至少一次手工重建。
  - 买方愿意为受治理提级支付约 $180k+ ARR，而不是默认这项能力应该由运行时、网关或平台栈免费附送。
  - 运行时和 serving 栈的异构程度仍足够可控，使得 Ollama 捕获 + KServe / vLLM 覆盖就能拿下前 5-10 个 logo。
  diligenceQuestions:
  - 被卡住的保险 AI 上线里，有多少比例真是因为提级治理缺口，而不是数据访问或 secrets 管理问题还没解决？
  - 保险公司的模型风险、安全和平台审核人，在批准一个私有集群 copilot 发布前，究竟要看哪些精确字段和工件？
  - 共创客户会接受带脱敏和客户自管密钥的笔记本侧捕获，还是从第一天起就要求全本地部署捕获？
  - 首单实际由谁签：Head of AI Platform、VP Developer Platform，还是安全 / 模型风险共同 owner？预算又来自哪一条现有科目？
  - Ollama、Portkey、TrueFoundry 或 KServe 周边厂商，要多快才能补出足够多的提级工作流，把这个品类挤没？
operatingAssumptions:
- assumption: 上线延误里，可复现性和审批包缺口足够常见，不只是数据授权或身份治理清理问题，因此值得做成一个独立的提级产品。
  basis: research.yaml
  validationTest: 从 8-10 家保险共创客户处拿到脱敏后的发布工单和复盘材料，按阻塞类型标注根因与周期延误。
  decisionImpact: 如果不成立，切口就要么扩到 entitlement / RBAC / secrets 检查，要么收窄到确实由提级证据主导的那类工作流。
- assumption: 安全和模型风险团队会允许脱敏后的、或客户自管的本地清单与 eval 轨迹捕获。
  basis: research.yaml
  validationTest: 在至少 3 家保险试点里，拿到针对拟议捕获与脱敏模型的书面安全批准或沙盒部署许可。
  decisionImpact: 如果不成立，产品就必须转向完全客户自管 / 本地部署的捕获模式，这会拖慢交付，也会压缩毛利。
- assumption: 先做 Ollama 捕获 + KServe，第二步补 vLLM，就足以拿下前 3-5 个客户。
  basis: idea.yaml
  validationTest: 在发现阶段收集当前本地运行时和集群架构图，统计有多少 prospect 不额外做导出器也能直接采用 MVP。
  decisionImpact: 如果不成立，工程团队就得提前把运行时中立捕获或更多导出目标往前拉，在 seed 效率还没被证明前先加码。
- assumption: 首个经济买方能从现有 AI 平台、开发者平台或治理预算里拿钱。
  basis: research.yaml
  validationTest: 在前 5 次定价沟通里，画清预算 owner 和当前支出替代路径，并确认至少 3 家 prospect 有清晰签约路径。
  decisionImpact: 如果不成立，定价就得先退回更小的、服务辅助型试点或伙伴打包方案，而不是直接卖年度订阅。
- assumption: 一条工作流获批，就足以给试点转年约提供可量化 ROI。
  basis: operator judgment
  validationTest: 在首个真实试点里，测量发布周期前后变化、手工重建工时，以及准备审批包所需时间。
  decisionImpact: 如果不成立，产品大概率需要先做多工作流广度，或补上相邻控制层，才有资格卖独立年约。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 访谈 8-10 个保险 AI 平台团队，并收集近期理赔或核保 copilot 上线受阻的材料。
  hypothesis: 在至少一半合格账户里，可复现性和审批包缺口是前两大阻塞点之一。
  successMetric: 至少 5 个账户提供证据，表明当前或近期确实有发布被卡住，而且提级治理是主导性延误。
  owner: 创始人 / 领域负责人
- horizon: 0-90 天
  experiment: 和 3 个潜在共创客户一起做一次脱敏与客户自管密钥捕获方案的安全评审。
  hypothesis: 只要离开受管设备的是已签名清单和脱敏轨迹，潜在客户就会允许在笔记本侧抓取清单。
  successMetric: 3 个潜在客户批准这套捕获模型进入试点。
  owner: 创始人 / 安全负责人
- horizon: 3-6 个月
  experiment: 把 MVP 部署到一家保险客户的一条 copilot 工作流上，直接从现有 Ollama 原型生成完整审批包和 KServe 发布包。
  hypothesis: MVP 能在第一条要进生产的工作流上，替代手工重建清单。
  successMetric: 有一条工作流在零平台团队手工重建的前提下进入预发。
  owner: 创始工程师
- horizon: 3-6 个月
  experiment: 把同一条待提级工作流的本地 eval 轨迹，与预发集群回放结果做对比。
  hypothesis: 捕获到的运行时和硬件上下文足以把本地到集群的行为漂移压在双方约定阈值内。
  successMetric: 90%+ 的预发 eval 用例，相对本地基线都能落在客户的 pass / fail 阈值内。
  owner: 创始工程师
- horizon: 6-12 个月
  experiment: 把 2-3 个共创客户转成付费保险合同，并测试“席位 + 工作流”定价的价格弹性。
  hypothesis: 只要有一次已获批发布和更快的审核周期，客户就愿意接受 $180k-$250k 区间的年度合同。
  successMetric: 至少 2 个付费客户在目标价格带内签下年约，或达到等效 run-rate。
  owner: 创始人 / GTM 负责人
- horizon: 9-15 个月
  experiment: 和一家私有 AI 基础设施集成商或保险治理咨询伙伴，共同推进一个 co-sell 试点。
  hypothesis: 伙伴渠道能更快建立信任，也能在高度集中的保险账户名单里放大触达面。
  successMetric: 落地 1 个 co-sell 试点，或拿到 3 个由伙伴带来的高质量后期引荐。
  owner: GTM 负责人
operations:
- 客户自管部署、加密和脱敏控制，是 onboarding 的核心动作，不是后期才加的企业功能。
- 每个试点都从一条具名 copilot 工作流、一份成文审批清单和一个映射好的私有集群目标开始，这样价值衡量会对着真实发布事件，而不是抽象承诺。
- 保险策略包、审批字段和例外模板要做成中央可复用库，并在每个试点后持续更新。
- 通过 KServe / vLLM 集成商和保险 AI 治理顾问来补足集群部署与审核人信任这两个缺口。
team:
- role: 创始人 / AI 平台或模型风险领域负责人
  startTiming: 第 0 个月
  rationale: 在任何软件 proof 出现之前，首单成交就要求团队先拿到保险平台、安全和模型风险审核人的信任。
- role: 创始工程师（Ollama 捕获与提级清单）
  startTiming: 第 0 个月
  rationale: 核心技术风险，是不是能把工作站上下文完整抓住，并把它变成可复现的发布工件。
- role: 解决方案 / 平台工程师（KServe、vLLM、客户自管部署）
  startTiming: 第 4-6 个月
  rationale: 拿下首个共创客户后，部署打包、预发回放和安全的 VPC / 本地上线就会变成付费试点的真正卡点。
- role: 企业 GTM / 共创客户负责人
  startTiming: 第 6-9 个月
  rationale: 约 80 个账户的高度集中滩头市场，足以支持一个聚焦型企业销售，但前提是已经有标杆客户和可量化 ROI 故事。
milestones:
- horizon: 0-12 个月
  items:
  - 签下 2-3 家保险共创客户，每家先围绕一条理赔或核保 copilot 工作流推进。
  - 至少把一个 Ollama 原型发进私有 Kubernetes 集群，而且不需要平台团队手工重建。
  - 和安全 / 模型风险审核人一起验证捕获与脱敏模型，并上线客户自管部署。
  - 把第一个试点转成付费年约，并沉淀出 30%+ 的发布周期改进。
- horizon: 12-24 个月
  items:
  - 做到 5-8 个付费的保险或相邻金融服务 logo。
  - 交付直接 vLLM 导出、可复用的保险策略包，以及跨发布的审批差异历史。
  - 建立起由至少 1 家基础设施集成商和 1 家治理咨询机构带来的伙伴管道。
  - 证明同一账户里可以从一条工作流扩到多条受治理 copilot。
- horizon: 24-36 个月
  items:
  - 达到研究给出的第 3 年 SOM 目标：约 15 个 logo 和约 $2.7M ARR。
  - 从只抓 Ollama，扩到覆盖相邻本地优先模型工具的运行时中立提级体系。
  - 进入相邻的受监管垂直行业或银行账户，承接同样的私有集群审批约束。
  - 推出围绕审批周期、兼容性失败和重复策略例外的 benchmarking 产品。
risks:
- risk: Ollama 或相邻 AI control-plane 厂商，在公司把跨运行时能力和审批数据集做深之前，就先补上原生提级工作流。
  likelihood: Medium
  impact: High
  mitigation: 把差异点放在中立审批包、客户自管部署，以及跨集群兼容性 / 审批数据集上，而不是某个运行时专属 UI。
- risk: 潜在客户拒绝在笔记本侧抓取工件，因为 prompt、轨迹或工具使用记录过于敏感。
  likelihood: High
  impact: High
  mitigation: 默认支持脱敏、客户自管密钥和完全客户自管部署，让离开设备的只有已签名清单或获批摘要。
- risk: 很多项目真正卡住的是数据授权、身份治理或 secrets 问题，而不是提级证据，导致 ROI 低于预期。
  likelihood: Medium
  impact: High
  mitigation: 围绕具名的卡住发布来筛选试点，并逐步把 RBAC / secrets 检查加进清单，同时避免第一天就把自己包装成全栈 AI 治理套件。
- risk: 跨团队的保险采购周期，再叠加只有约 80 个账户的集中 SAM，会让 pipeline 速度非常脆弱。
  likelihood: High
  impact: Medium
  mitigation: 先围绕一条管理层看得见的卡住工作流落地，再借顾问 / 集成商做暖启动引荐；首个保险标杆跑通后，立刻向相邻金融服务账户扩张。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月做出 Ollama 到私有集群的 MVP，验证安全的客户自管捕获，把 2-3 家保险共创客户转成付费合同，交付 KServe + vLLM 覆盖，并在更大一轮 seed 融资前证明：提级治理确实是可重复出现的上线阻塞点。
