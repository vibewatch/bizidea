jobsToBeDone:
- job: 当一个开发团队的 Ollama 原型拿到业务赞助后，帮 AI 平台负责人把那套精确的本地工作流抓下来并提级，这样他们就能在不手工重建的情况下把它发进私有集群。
  currentAlternative: README、复制的配置片段，以及平台团队定制重建
  successMetric: 从原型获批到预发部署、且行为可复现所需的天数
- job: 当安全团队或模型风险团队追问一个内部 copilot 用了什么模型、prompt 和工具时，帮面向合规的平台团队快速给出一套可审阅的审批包，这样生产上线就不用再拉扯数周。
  currentAlternative: 工单线程、截图和临时拼出来的表格清单
  successMetric: 为一个待提级工作流产出完整审批包所需的小时数
