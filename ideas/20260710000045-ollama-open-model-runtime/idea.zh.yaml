topRisks:
- name: 运行时厂商补位
  description: Ollama 或相邻的 MLOps 厂商可能会补上原生提级工作流，把最初切口挤窄。
  mitigation: 在开发者层之上保持运行时中立，并把策略、审批和审计工作流做成跨多种本地优先运行时的共用层。
- name: 轨迹隐私阻力
  description: 受监管买家可能不愿让一家创业公司从开发者机器上抓 prompt 或 eval 轨迹。
  mitigation: 默认提供本地脱敏、客户自管密钥，以及本地部署或 VPC 部署，让离开笔记本的只有已签名清单。
- name: 跨团队销售拖慢
  description: 采购要横跨 AI 平台、安全和模型风险团队，首单推进速度可能会偏慢。
  mitigation: 先围绕一个已经卡住的内部 copilot 提级场景落地，在首个获批发布上证明周期缩短，再顺势扩张。
