problem: 企业开发者现在已经能在笔记本上用开放模型跑出一个内部 copilot，而且后续上云还能沿用同一套运行时。但从原型到生产的交接仍然非常原始。模型版本、量化设置、prompt、工具权限和硬件假设散落在本地配置和聊天线程里，平台团队和安全团队没法精确复现到底该审批、该部署什么。在受监管企业里，很多有前景的 Ollama 试点还没进私有集群，就先卡住，甚至被迫从零重建。
targetUser:
  primary: 在 Fortune 500 保险公司里，负责把 Ollama 标准化为内部 copilot 原型平台的 AI 平台工程师和开发者平台团队
  secondary: 负责已批准模型目录、工具权限和审计证据的安全架构师与 MLOps 负责人
  buyer: Head of AI Platform 或 VP Developer Platform
startupThesis:
  nonObviousInsight: 企业采用开放模型的瓶颈，已经不是让模型跑在开发者机器上。现在真正稀缺的是提级治理：把一个本地原型背后的模型、prompt、工具和硬件上下文完整留下来，再把它变成可复现、能过策略审批的生产发布。
  beachhead: 滩头市场是 Fortune 500 保险公司的中央 AI 平台团队：他们在受管开发者笔记本上用 Ollama 原型化内部理赔和核保 copilot，再把获批工作流提级到私有 Kubernetes 集群。
  wedge: 第一个切口，是一套从笔记本到集群的提级闸门：记录本地 Ollama 运行时清单和 eval 轨迹，对照已批准的模型与工具策略做校验，再产出可复现的发布包，供私有云或本地推理使用。
  whyNowCatalyst: Ollama 已把本地到云的同工作流跑通，又有 8.9 million 月活开发者、Fortune 500 覆盖率和受监管行业落地，开放模型原型已经多到不能再靠工单和截图来管。
  ventureScalePath: 先从受监管的内部 copilot 切入，再向外扩成企业开放模型提级的记录系统：模型目录、工具权限策略、硬件兼容性、发布审批，以及所有本地优先 AI 团队的部署后证据，最后都沉到这一层。
solution: 产品接入开发者机器上的 Ollama 和 CI。团队不必重建一遍，直接把本地原型标记为待提级即可。系统会抓取 model SHA、量化方式、prompt / template 设置、工具 schema、样例 eval 轨迹和硬件画像，再先做敏感信息脱敏，并在已批准的集群上重跑预发 eval。平台团队拿到的是已签名的提级清单、策略校验结果，以及可部署到私有云或本地推理环境的可复现发布包。安全团队和模型风险审核人也能清楚看到：本地版本和预发版本之间，到底是哪个模型、哪些工具、哪些数据处理假设变了。时间一长，公司会变成开放模型应用的发布记录系统——这些应用诞生在笔记本上，最终发到企业基础设施里。
goToMarketSeed:
  firstCustomer: 首个客户画像，是一家 Fortune 500 保险公司的 Head of AI Platform：他正在推进内部理赔 copilot，上线前已有 20-50 名开发者在本地用 Ollama 做原型，但生产必须跑在经过安全与模型风险团队审核的私有 Kubernetes 集群里。
  buyingTrigger: 业务背书的试点已经在开发者笔记本上跑通，但一到生产上线，安全、模型风险或基础设施团队就因为无法复现、也无法批准那套精确的模型 + 工具栈而把项目卡住。
  currentAlternative: 人工流程加内部自建：README、复制出来的配置、CI 脚本，以及靠工单推进的审批
  switchingReason: 这道提级闸门能把来回扯皮的几周时间直接砍掉：它保住本地真正跑通的那套上下文，在集群部署前先证明符合策略要求，也让平台工程师不用再为每个项目单独重建一遍。
  pricingHypothesis: 按受管开发者数量和已提级模型工作流数量收取年度企业订阅费；本地部署和策略包模块额外收费。
