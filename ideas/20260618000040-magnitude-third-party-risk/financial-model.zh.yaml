scenarios:
  downside:
    description: 银行购买偏重证据的产品，部署信任建立缓慢，公司以较低混合价值在 Y3 末退出时只有 8 家生产银行。
    y3RevenueK: 1350.0
    y3EbitdaK: -911.0
    cashLowPointK: 45.5
    keyAssumptionChanges:
      - 季末客户数从 2、3、4、5 / 6、8、9、10 调整为 2、2、3、4 / 5、6、7、8。
      - 混合客户年收入从 $250K 降至 $225K，因买家止步于更窄的证据和工作流范围。
      - 毛利率从 70% 降至 68%，因接入和证据清洗工作比计划更多地保留手工操作。
  base:
    description: 公司转化早期试点，在 33 家银行 SAM 内稳步增加客户，在研究所得 $250K 混合客户年价值下以 10 家生产银行退出 Y3。
    y3RevenueK: 1906.4
    y3EbitdaK: -494.5
    cashLowPointK: 717.8
    keyAssumptionChanges:
      - 客户数遵循 A9、A10 和 A11。
      - 毛利率维持商业计划目标 70%。
      - 招聘遵循 A20，在前 5 家生产银行上线前保持精简。
  upside:
    description: 合作伙伴介绍提前贡献，有选择地由策略批准的动作提升价值，公司以较高混合价值在 Y3 末退出时有 12 家生产银行。
    y3RevenueK: 2430.1
    y3EbitdaK: -79.4
    cashLowPointK: 1372.6
    keyAssumptionChanges:
      - 季末客户数增至 3、4、5、6 / 7、9、11、12，创始人主导和合作伙伴来源销售管道同步转化。
      - 混合客户年收入从 $250K 提升至 $270K，因工作流深度和扩展附加提前落地。
      - 毛利率从 70% 提升至 72%，一旦集成和处置预案复用标准化。
sensitivity:
  - variable: ARPU
    downsideCase: 混合客户年价值稳定在约 $225K，因银行将范围限定在证据收集加审批路由。
    baseCase: 混合客户年价值维持建模的 $250K。
    upsideCase: 混合客户年价值达到 $270K，一旦有选择地由策略批准的动作和更宽泛的工作流覆盖提前附加。
    y3RevenueImpactK: -190.6
    cashImpactK: -133.4
  - variable: CAC
    downsideCase: CAC 升至约 $110K，因创始人主导外拓承担大部分工作，安全审查拖延。
    baseCase: 通过有针对性的触发驱动销售，CAC 维持约 $90K。
    upsideCase: 合作伙伴转介持续导入合格银行项目后，CAC 降至约 $75K。
    y3RevenueImpactK: 0.0
    cashImpactK: -200.0
  - variable: churn
    downsideCase: 若客户将产品视为围绕一次续约或事件的项目，月度流失率漂移至 3.0%。
    baseCase: 月度流失率维持建模的 2.0%。
    upsideCase: 一旦遏制层成为持续策略运营的一部分，月度流失率改善至 1.5%。
    y3RevenueImpactK: -125.0
    cashImpactK: -87.5
  - variable: sales cycle
    downsideCase: 集成审批和采购流程拖延，生产转化约推迟一个季度。
    baseCase: 银行按商业计划里程碑隐含的时间节点从合格项目推进到付费试点再到生产。
    upsideCase: 触发型交易和合作伙伴信誉压缩周期，提前拉入部分转化。
    y3RevenueImpactK: -281.3
    cashImpactK: -196.9
  - variable: gross margin
    downsideCase: 服务和证据清洗工作比计划更重，毛利率约维持在 67%。
    baseCase: 毛利率维持商业计划目标 70%。
    upsideCase: 接入模式可重复后，毛利率达到 72%。
    y3RevenueImpactK: 0.0
    cashImpactK: -57.2
  - variable: hiring pace
    downsideCase: 首位客户主管和第二位工程师在可重复性得到验证之前提前入职。
    baseCase: 招聘遵循 A20，与里程碑证明挂钩。
    upsideCase: 第二位工程师因初始产品范围保持更长时间的精简而推迟入职。
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TriggerProjects[AI rollout or renewal trigger] --> PaidPilots
      PaidPilots --> ProductionBanks
      ProductionBanks --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景 Y3 收入来自从 5 家增长到 10 家生产银行，并以研究所得 $250K 混合客户年价值进行货币化。
  - checkName: 必须做对的事
    finding: 公司必须在银行动作被证明可重复之前，持续将付费试点转化为生产合同，而不大幅扩充现场团队。
  - checkName: 模型失效条件
    finding: 若范围压缩至每家银行每年 $225K，且标杆增速跌至 Y3 末仅 8 个退出客户，下行情景下现金将跌至约 $46K。
  - checkName: 下轮融资证明
    finding: 公司在 Q2Y3 前达到约 8 家生产银行、一个合作伙伴来源的生产标杆，以及可重复的周期时间改善，届时可信的种子轮故事就会出现。
sanityChecks:
  ruleOf40: Y3 增长率 144.0% + EBITDA 利润率 -25.9% = 118.1%（方向性强劲，但仍因 Y2 基数偏小而虚高）。
  burnMultiple: Y2 净新 ARR 约 1.1 倍，Y3 改善至约 0.4 倍——同一产品和交付团队支撑了更多银行。
  revenuePerFte: Y3 年末每 FTE 收入 $211.8K（对比成熟 SaaS 基准约 $200K–$400K）。
  flags:
    - 模型仍假设银行会为独立遏制层支付约每客户年 $250K；若产品被视为仅是监控附加模块，ARPU 和转化率都会压缩。
    - 下行情景现金几乎平衡，仅约 $46K，因此若试点到生产的时间拖延，团队不能提前招聘。
    - 客户数是里程碑驱动的净增，流失率主要用于 LTV 计算；一旦首批续约到来，应以基于群组的留存视图替代经验性流失率输入。
    - Y3 每 FTE 收入约 $212K，对于服务辅助的受监管切入口而言可接受，但仍低于顶级软件效率水平。
