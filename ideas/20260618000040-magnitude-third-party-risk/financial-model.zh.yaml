slug: vendor-containment-autopilot
date: '2026-06-18'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-07'
    unit: month
    source: '[BP date] 基准情景从商业计划日期后的第一个完整月份开始。'
  - id: A2
    name: 种子前轮关闭后初始现金
    value: '2.7'
    unit: USDM
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] 采用中点偏低的融资额，仍可将公司支撑到下一个种子证明里程碑，并保留 6 个月缓冲。'
  - id: A3
    name: 收入确认规则
    value: Average active paying banks in period x blended customer-year value
    unit: formula
    source: '[Startup-finance heuristic] 用期初和期末付费客户数计算收入、增长和客户总数，无需建模递延收入。'
  - id: A4
    name: 每家活跃付费银行的混合年度收入
    value: '250.0'
    unit: USDK per customer-year
    source: '[BP market.sam; BP market.som; BP gtm pricing; Research market.sam] 锚定于研究所得 $250K 建模初始 ACV 和第 3 年 SOM。'
  - id: A5
    name: 毛利率
    value: '70'
    unit: percent
    source: '[BP businessModel targetGrossMarginPct] 将证据规范化、实施支持和持续服务负载控制在 30% 的 COGS 包络内。'
  - id: A6
    name: 月度流失率
    value: '2.0'
    unit: percent
    source: '[Startup-finance heuristic] 集成后银行工作流应具有粘性，但品类足够早期，模型不应假设成熟的企业续约率。'
  - id: A7
    name: 混合 CAC
    value: '90.0'
    unit: USDK per customer
    source: '[BP gtm channels and funnelTargets; Research reportMemo distributionChannels] 创始人主导、高触达的银行销售加上漫长的安全审查周期，合理化了高但仍可信的 CAC。'
  - id: A8
    name: 初始付费客户数
    value: '0'
    unit: count
    source: '[BP product sixMonth] 模型从收入前期开始，假设首个付费试点在 Y1 内落地。'
  - id: A9
    name: Y1 客户落地模式
    value: Month-end customers 0,0,0,1,1,2,2,2,2,2,2,2
    unit: count
    source: '[BP product sixMonth; BP milestones 0-12 months] 第 6 个月达到 2 个付费试点，Y1 结束时有 2 家付费银行，与首个试点里程碑一致。'
  - id: A10
    name: Y2 季末客户数
    value: Q1Y2 2; Q2Y2 3; Q3Y2 4; Q4Y2 5
    unit: count
    source: '[BP milestones 12-24 months] 明确匹配商业计划第 2 年末 5 个生产标杆的目标。'
  - id: A11
    name: Y3 季末客户数
    value: Q1Y3 6; Q2Y3 8; Q3Y3 9; Q4Y3 10
    unit: count
    source: '[BP milestones 24-36 months; Research market.som] Y3 末退出时有 10 个生产标杆，与研究所得第 3 年 SOM 框架一致。'
  - id: A12
    name: 创始人/CEO 含税现金薪酬
    value: '96.0'
    unit: USDK per year
    source: '[BP team Founder/CEO] 低于市场水平的创始人薪资加薪资税的创业财务经验值。'
  - id: A13
    name: 创始工程师含税现金薪酬
    value: '180.0'
    unit: USDK per year
    source: '[BP team Founding eng] 构建受监管集成和工作流基础设施的资深工程师的创业财务经验值。'
  - id: A14
    name: TPRM 产品/风险负责人含税现金薪酬
    value: '150.0'
    unit: USDK per year
    source: '[BP team TPRM product / risk lead] 将策略转化为产品化工作流的领域专家的创业财务经验值。'
  - id: A15
    name: 解决方案/集成工程师含税现金薪酬
    value: '150.0'
    unit: USDK per year
    source: '[BP team Solutions / integration engineer] 企业接入密集型人才的创业财务经验值。'
  - id: A16
    name: 合作伙伴与客户成功负责人含税现金薪酬
    value: '130.0'
    unit: USDK per year
    source: '[BP team Partnerships and customer success lead] 售后与合作伙伴赋能混合角色运营者的创业财务经验值。'
  - id: A17
    name: GTM 客户主管含税现金薪酬
    value: '160.0'
    unit: USDK per year
    source: '[BP gtm channels; BP milestones 12-24 months] 仅在生产证明开始出现后才增加的首位专职销售的创业财务经验值。'
  - id: A18
    name: 客户成功/实施经理含税现金薪酬
    value: '120.0'
    unit: USDK per year
    source: '[BP operations; BP milestones 12-24 months] 公司达到多个在线标杆后负责部署和持续银行支持的创业财务经验值。'
  - id: A19
    name: 资深工程师（追加）含税现金薪酬
    value: '180.0'
    unit: USDK per year
    source: '[BP sequencingRationale; BP milestones 24-36 months] 公司达到 10 个标杆前所需追加产品和集成产能的创业财务经验值。'
  - id: A20
    name: 招聘节奏
    value: Founder, founding engineer, and risk lead in M1; solutions engineer M4; partnerships/customer success lead M10; senior engineer M16; account executive M19; customer success/implementation manager M22; second senior engineer M28
    unit: timing
    source: '[BP team startTiming; BP sequencingRationale; BP milestones] 早期保持精简，仅在试点和首次转化可见后才增加交付和 GTM 产能。'
  - id: A21
    name: 非薪资销售与市场费用
    value: 6K M1-M6; 8K M7-M12; 10K M13-M18; 12K M19-M24; 15K M25-M30; 17K M31-M36
    unit: USDK per month
    source: '[Startup-finance heuristic] 涵盖创始人主导企业销售动作的差旅、安全审查支持、合作伙伴拓展和销售工具。'
  - id: A22
    name: 非薪资研发费用
    value: 10K M1-M6; 12K M7-M12; 14K M13-M24; 16K M25-M36
    unit: USDK per month
    source: '[Startup-finance heuristic] 涵盖云服务、信任门户摄入、工程工具和集成测试环境。'
  - id: A23
    name: 非薪资管理费用
    value: 7K M1-M6; 9K M7-M18; 11K M19-M30; 13K M31-M36
    unit: USDK per month
    source: '[Startup-finance heuristic] 反映受监管软件供应商的法律、保险、审计准备和基础行政管理成本。'
  - id: A24
    name: 资金用途分配
    value: Engineering 45%; GTM 23%; G&A 10%; Buffer 22%
    unit: percent
    source: '[BP fundingAsk useOfFundsSummary; A20-A23] 在银行动作可重复之前，产品和集成工作主导支出结构。'
  - id: A25
    name: 现金转化策略
    value: EBITDA approximates cash movement
    unit: policy
    source: '[Startup-finance heuristic] 本早期阶段软件公司不建模债务、资本支出、税收或实质性营运资金变动。'
  - id: A26
    name: 下轮里程碑
    value: By Q2Y3 reach 8 production banks, a repeatable integration pack, at least one partner-sourced production logo, and documented cycle-time improvement while retaining 6 months of cash buffer
    unit: milestone
    source: '[BP milestones 12-24 months; BP milestones 24-36 months; BP fundingAsk runwayMonths] 用于将种子前轮融资额估算至下一个种子证明点加储备。'
