jobsToBeDone:
  - job: "当高风险供应商新增 AI 功能、分包处理方或集成权限时，帮助 TPRM 团队看清内部波及半径并触发正确的补偿性控制措施，从而快速审批或阻止该变更。"
    currentAlternative: "跨 TPRM、安全和采购团队手工审查证据，通过电子表格、邮件和 ServiceNow 工单协调。"
    successMetric: "从供应商变更通知到获批遏制决策的时间，从数周压缩到五个工作日以内。"
  - job: "当供应商续约或事件迫使我们为持续访问权限作出说明时，帮助我们证明哪些控制措施已到位、哪些仍需整改，从而向风险、审计和监管方提供答复依据。"
    currentAlternative: "手工汇集的问卷导出数据、截图证据和临时例外项备忘录。"
    successMetric: "高风险供应商续约或升级备忘录的准备时间减少至少 70%。"
