topRisks:
  - name: "现有厂商套件捆绑"
    description: "一旦自主供应商风险运营成为可见品类，大型 GRC 和 TPRM 厂商可能会增加轻量级整改工作流。"
    mitigation: "凭借深度波及半径映射和系统级遏制动作取胜——这些是现有厂商单靠问卷记录无法提供的能力。"
  - name: "数据访问摩擦"
    description: "银行可能不愿授予足够的身份管理、工单和采购访问权限，导致平台无法准确绘制内部风险敞口图。"
    mitigation: "从只读连接器入手，缩窄试点范围，采用证据优先的工作流，在开启更深层遏制自动化之前先证明价值。"
  - name: "触发事件外市场时机滞后"
    description: "潜在客户可能要等到 AI 供应商上线、续约或事件制造出高管层截止期限后才会购买。"
    mitigation: "聚焦已有预算、紧迫性和高管关注的在建上线和续约项目，再从第一个遏制工作流向外扩展。"
