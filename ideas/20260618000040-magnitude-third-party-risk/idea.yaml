topRisks:
  - name: "Incumbent suite bundling"
    description: "Large GRC and TPRM vendors may add lighter-weight remediation workflows once autonomous vendor-risk operations become a visible category."
    mitigation: "Win on deep blast-radius mapping and system-level containment actions that incumbents cannot deliver from questionnaire records alone."
  - name: "Data access friction"
    description: "Banks may resist granting enough identity, ticketing, and procurement access for the platform to map internal exposure accurately."
    mitigation: "Start with read-only connectors, narrow pilot scopes, and evidence-first workflows that prove value before deeper containment automation is turned on."
  - name: "Slow market timing outside trigger events"
    description: "Prospects may not buy until an AI-vendor rollout, renewal, or incident creates an executive deadline."
    mitigation: "Target live rollout and renewal projects where budget, urgency, and executive attention already exist, then expand from the first containment workflow."
