jobsToBeDone:
  - job: "When a high-risk vendor adds a new AI feature, subprocessor, or integration scope, help our TPRM team see the internal blast radius and launch the right compensating controls, so we can approve or block the change quickly."
    currentAlternative: "Manual evidence review plus spreadsheets, email, and ServiceNow tickets coordinated across TPRM, security, and procurement."
    successMetric: "Time from vendor change notice to approved containment decision drops from multiple weeks to under five business days."
  - job: "When a vendor renewal or incident forces us to justify continued access, help us prove which controls are already in place and what still needs remediation, so we can defend the decision to risk, audit, and regulators."
    currentAlternative: "Questionnaire exports, screenshot evidence, and ad hoc exception memos assembled by hand."
    successMetric: "Preparation time for a high-risk vendor renewal or escalation memo falls by at least 70%."
