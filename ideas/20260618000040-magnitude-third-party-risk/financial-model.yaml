slug: vendor-containment-autopilot
date: '2026-06-18'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-07'
    unit: month
    source: '[BP date] Base case starts in the first full month after the business plan date.'
  - id: A2
    name: Starting cash after pre-seed close
    value: '2.7'
    unit: USDM
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M] Uses a midpoint-low raise that still carries the company to the next seed-proof milestone plus a 6-month buffer.'
  - id: A3
    name: Revenue recognition rule
    value: Average active paying banks in period x blended customer-year value
    unit: formula
    source: '[Startup-finance heuristic] Uses beginning and ending paying-customer counts to keep revenue, growth, and customer totals reconciled without deferred-revenue modeling.'
  - id: A4
    name: Blended annual revenue per active paying bank
    value: '250.0'
    unit: USDK per customer-year
    source: '[BP market.sam; BP market.som; BP gtm pricing; Research market.sam] Anchored to the researched $250K modeled initial ACV and year-3 SOM.'
  - id: A5
    name: Gross margin
    value: '70'
    unit: percent
    source: '[BP businessModel targetGrossMarginPct] Keeps evidence normalization, implementation support, and ongoing service load inside a 30% COGS envelope.'
  - id: A6
    name: Monthly churn
    value: '2.0'
    unit: percent
    source: '[Startup-finance heuristic] Bank workflows should be sticky after integration, but the category is early enough that the model should not assume mature enterprise retention.'
  - id: A7
    name: Blended CAC
    value: '90.0'
    unit: USDK per customer
    source: '[BP gtm channels and funnelTargets; Research reportMemo distributionChannels] Founder-led, high-touch bank sales with long security review cycles justify a high but still plausible CAC.'
  - id: A8
    name: Starting paying customers
    value: '0'
    unit: count
    source: '[BP product sixMonth] The model starts pre-revenue and assumes the first paid pilot lands during Y1.'
  - id: A9
    name: Y1 customer landing pattern
    value: Month-end customers 0,0,0,1,1,2,2,2,2,2,2,2
    unit: count
    source: '[BP product sixMonth; BP milestones 0-12 months] Reaches 2 paid pilots by month 6 and exits Y1 with 2 paying banks, consistent with the first pilot milestone.'
  - id: A10
    name: Y2 quarter-end customers
    value: Q1Y2 2; Q2Y2 3; Q3Y2 4; Q4Y2 5
    unit: count
    source: '[BP milestones 12-24 months] Explicitly matches the plan target of 5 production logos by the end of year 2.'
  - id: A11
    name: Y3 quarter-end customers
    value: Q1Y3 6; Q2Y3 8; Q3Y3 9; Q4Y3 10
    unit: count
    source: '[BP milestones 24-36 months; Research market.som] Exits Y3 at 10 production logos, which matches the researched year-3 SOM framing.'
  - id: A12
    name: Founder/CEO loaded cash compensation
    value: '96.0'
    unit: USDK per year
    source: '[BP team Founder/CEO] Startup-finance heuristic for a below-market founder salary plus payroll burden.'
  - id: A13
    name: Founding engineer loaded cash compensation
    value: '180.0'
    unit: USDK per year
    source: '[BP team Founding eng] Startup-finance heuristic for a senior engineer building regulated integrations and workflow infrastructure.'
  - id: A14
    name: TPRM product/risk lead loaded cash compensation
    value: '150.0'
    unit: USDK per year
    source: '[BP team TPRM product / risk lead] Startup-finance heuristic for a domain expert translating policy into productized workflows.'
  - id: A15
    name: Solutions / integration engineer loaded cash compensation
    value: '150.0'
    unit: USDK per year
    source: '[BP team Solutions / integration engineer] Startup-finance heuristic for implementation-heavy enterprise onboarding talent.'
  - id: A16
    name: Partnerships and customer success lead loaded cash compensation
    value: '130.0'
    unit: USDK per year
    source: '[BP team Partnerships and customer success lead] Startup-finance heuristic for a mixed post-sale and partner-enablement operator.'
  - id: A17
    name: GTM account executive loaded cash compensation
    value: '160.0'
    unit: USDK per year
    source: '[BP gtm channels; BP milestones 12-24 months] Startup-finance heuristic for the first dedicated sales hire added only after production proof starts to emerge.'
  - id: A18
    name: Customer success / implementation manager loaded cash compensation
    value: '120.0'
    unit: USDK per year
    source: '[BP operations; BP milestones 12-24 months] Startup-finance heuristic for deployment and ongoing bank support once the company reaches multiple live logos.'
  - id: A19
    name: Additional senior engineer loaded cash compensation
    value: '180.0'
    unit: USDK per year
    source: '[BP sequencingRationale; BP milestones 24-36 months] Startup-finance heuristic for the extra product and integration capacity needed before the company reaches 10 logos.'
  - id: A20
    name: Hiring cadence
    value: Founder, founding engineer, and risk lead in M1; solutions engineer M4; partnerships/customer success lead M10; senior engineer M16; account executive M19; customer success/implementation manager M22; second senior engineer M28
    unit: timing
    source: '[BP team startTiming; BP sequencingRationale; BP milestones] Keeps the ramp lean early, then adds delivery and GTM capacity only after pilots and the first conversions are visible.'
  - id: A21
    name: Non-payroll sales and marketing spend
    value: 6K M1-M6; 8K M7-M12; 10K M13-M18; 12K M19-M24; 15K M25-M30; 17K M31-M36
    unit: USDK per month
    source: '[Startup-finance heuristic] Covers travel, security-review support, partner development, and sales tooling for a founder-led enterprise motion.'
  - id: A22
    name: Non-payroll research and development spend
    value: 10K M1-M6; 12K M7-M12; 14K M13-M24; 16K M25-M36
    unit: USDK per month
    source: '[Startup-finance heuristic] Covers cloud, trust-center ingestion, engineering tooling, and integration test environments.'
  - id: A23
    name: Non-payroll general and administrative spend
    value: 7K M1-M6; 9K M7-M18; 11K M19-M30; 13K M31-M36
    unit: USDK per month
    source: '[Startup-finance heuristic] Reflects legal, insurance, audit readiness, and baseline admin overhead for a regulated software vendor.'
  - id: A24
    name: Use-of-funds allocation
    value: Engineering 45%; GTM 23%; G&A 10%; Buffer 22%
    unit: percent
    source: '[BP fundingAsk useOfFundsSummary; A20-A23] Product and integration work dominate the spend profile until the bank motion is repeatable.'
  - id: A25
    name: Cash conversion policy
    value: EBITDA approximates cash movement
    unit: policy
    source: '[Startup-finance heuristic] No debt, capex, taxes, or material working-capital swings are modeled for this early-stage software company.'
  - id: A26
    name: Next-round milestone
    value: By Q2Y3 reach 8 production banks, a repeatable integration pack, at least one partner-sourced production logo, and documented cycle-time improvement while retaining 6 months of cash buffer
    unit: milestone
    source: '[BP milestones 12-24 months; BP milestones 24-36 months; BP fundingAsk runwayMonths] Used to size the pre-seed ask to the next seed-proof point plus reserve.'
