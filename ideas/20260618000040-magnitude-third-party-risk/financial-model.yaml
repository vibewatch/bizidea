scenarios:
  downside:
    description: Banks buy an evidence-heavier product, deployment trust grows slowly, and the company exits Y3 with only 8 production banks at a lower blended value.
    y3RevenueK: 1350.0
    y3EbitdaK: -911.0
    cashLowPointK: 45.5
    keyAssumptionChanges:
      - Quarter-end customers move from 2,3,4,5 / 6,8,9,10 to 2,2,3,4 / 5,6,7,8.
      - Blended customer-year revenue falls from $250K to $225K because buyers stop at narrower evidence and workflow scope.
      - Gross margin slips from 70% to 68% because onboarding and evidence normalization stay more manual.
  base:
    description: The company converts early pilots, adds customers steadily inside the 33-bank SAM, and exits Y3 with 10 production banks at the researched $250K blended customer-year value.
    y3RevenueK: 1906.4
    y3EbitdaK: -494.5
    cashLowPointK: 717.8
    keyAssumptionChanges:
      - Customer counts follow A9, A10, and A11.
      - Gross margin stays at the BP target of 70%.
      - Hiring follows A20 and stays lean until the first 5 production banks are live.
  upside:
    description: Partner introductions begin contributing earlier, selective policy-approved actions lift value, and the company exits Y3 with 12 production banks at a higher blended value.
    y3RevenueK: 2430.1
    y3EbitdaK: -79.4
    cashLowPointK: 1372.6
    keyAssumptionChanges:
      - Quarter-end customers rise to 3,4,5,6 / 7,9,11,12 as founder-led and partner-sourced pipeline both convert.
      - Blended customer-year revenue increases from $250K to $270K as workflow depth and expansion attach earlier.
      - Gross margin improves from 70% to 72% once integration and playbook reuse standardize.
sensitivity:
  - variable: ARPU
    downsideCase: Blended customer-year value settles near $225K because banks cap scope at evidence collection plus approval routing.
    baseCase: Blended customer-year value holds at $250K as modeled.
    upsideCase: Blended customer-year value reaches $270K once selective policy-approved actions and broader workflow coverage attach.
    y3RevenueImpactK: -190.6
    cashImpactK: -133.4
  - variable: CAC
    downsideCase: CAC rises toward $110K because founder-led outbound does most of the work and security review drags on.
    baseCase: CAC stays near $90K with targeted trigger-based selling.
    upsideCase: CAC falls toward $75K once partner referrals consistently source qualified bank projects.
    y3RevenueImpactK: 0.0
    cashImpactK: -200.0
  - variable: churn
    downsideCase: Monthly churn drifts toward 3.0% if customers treat the product as a project around one renewal or incident.
    baseCase: Monthly churn stays at 2.0% as modeled.
    upsideCase: Monthly churn improves toward 1.5% once the containment layer becomes part of ongoing policy operations.
    y3RevenueImpactK: -125.0
    cashImpactK: -87.5
  - variable: sales cycle
    downsideCase: Production conversion slips by about one quarter because integration approvals and procurement take longer.
    baseCase: Banks move from qualified project to paid pilot to production on the BP timing implied by the milestones.
    upsideCase: Trigger-based deals and partner credibility compress the cycle enough to pull some conversions forward.
    y3RevenueImpactK: -281.3
    cashImpactK: -196.9
  - variable: gross margin
    downsideCase: Gross margin holds near 67% because services and evidence-cleanup work remain heavier than planned.
    baseCase: Gross margin stays at the BP target of 70%.
    upsideCase: Gross margin reaches 72% once onboarding patterns repeat.
    y3RevenueImpactK: 0.0
    cashImpactK: -57.2
  - variable: hiring pace
    downsideCase: The first AE and the second engineer are pulled forward before repeatability is proven.
    baseCase: Hiring follows A20 and stays tied to milestone proof.
    upsideCase: The second engineer slips slightly because the initial product scope remains narrow for longer.
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TriggerProjects[AI rollout or renewal trigger] --> PaidPilots
      PaidPilots --> ProductionBanks
      ProductionBanks --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case Y3 revenue comes from growing from 5 to 10 production banks and monetizing each at the researched $250K blended customer-year value.
  - checkName: Must go right
    finding: The company must keep converting paid pilots into production contracts without hiring a much larger field team before the bank motion is proven.
  - checkName: Model breaks if
    finding: If scope compresses toward $225K per bank-year and the logo ramp slips to only 8 Y3 exit customers, cash falls to roughly $46K in the downside case.
  - checkName: Next-round proof
    finding: A credible seed story appears once the company reaches about 8 production banks, one partner-sourced production logo, and repeatable cycle-time improvement by Q2Y3.
sanityChecks:
  ruleOf40: Y3 growth 144.0% + EBITDA margin -25.9% = 118.1% (directionally strong, but still inflated by the small Y2 base).
  burnMultiple: About 1.1x in Y2 on net new ARR, improving to about 0.4x in Y3 as the same product and delivery team supports more banks.
  revenuePerFte: $211.8K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K mature SaaS benchmark).
  flags:
    - The model still assumes banks will fund a distinct containment layer at about $250K per customer-year; if the product is treated as only a monitoring add-on, both ARPU and conversion rates will compress.
    - The downside case is nearly cash-flat at only about $46K, so the team cannot pull hires forward if pilot-to-production timing slips.
    - Customer counts are milestone-driven net adds while churn is used mainly for LTV math; once the first renewals arrive, a cohort-based retention view should replace the heuristic churn input.
    - Revenue per FTE reaches only about $212K in Y3, which is acceptable for a services-assisted regulated wedge but still below elite software-efficiency levels.
