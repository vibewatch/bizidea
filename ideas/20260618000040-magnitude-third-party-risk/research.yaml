competitors:
- name: Magnitude
  stage: seed
  wedge: Autonomous AI workforce for third-party risk teams.
  pricing: Custom / not public
  strength: Strong category narrative around continuous evidence gathering, AI-era spread, and remediation prioritization.
  weaknessVsUs: Unproven in regional-bank containment workflows and not yet differentiated on bank-specific internal control actions.
  sourceRefs:
  - 1
  - 2
- name: OneTrust
  stage: incumbent
  wedge: End-to-end third-party lifecycle management across onboarding, assessment, treatment, monitoring, and offboarding.
  pricing: Custom / enterprise quote
  strength: Entrenched workflow footprint and broad governance adjacency.
  weaknessVsUs: Better at lifecycle administration than real-time blast-radius mapping and approval-gated control launches.
  sourceRefs:
  - 17
- name: SecurityScorecard
  stage: scale-up
  wedge: Threat-informed continuous intelligence and AI-assisted TPRM modernization.
  pricing: Custom / enterprise quote
  strength: Strong outside-in telemetry, supply-chain messaging, and clear ROI story on faster onboarding.
  weaknessVsUs: Outside-in monitoring alone does not tell a bank which internal access or rollout should change next.
  sourceRefs:
  - 18
- name: Black Kite
  stage: scale-up
  wedge: Continuous vendor cyber monitoring with supply-chain and concentration-risk framing.
  pricing: Custom / enterprise quote
  strength: Clear positioning on emerging threats, financial-services supply-chain impact, and vendor monitoring after onboarding.
  weaknessVsUs: Cyber exposure visibility is strong, but the internal response queue and bank-specific compensating-control layer are thinner.
  sourceRefs:
  - 19
  - 20
