  adoptionFrictionMatrix:
  - friction: Integrating IAM, ticketing, and GRC context
    severity: high
    affectedBuyer: CISO / TPRM lead
    mitigation: Start with read-only connectors and a narrow set of high-risk vendors before proposing active controls.
    sourceRefs:
    - 17
    - 23
    - 24
  - friction: Trusting automated containment actions
    severity: high
    affectedBuyer: CRO / COO
    mitigation: Use approval-gated playbooks and make every recommendation traceable to source evidence and policy logic.
    sourceRefs:
    - 3
    - 5
    - 16
  - friction: Maintaining evidence freshness across heterogeneous trust artifacts
    severity: medium
    affectedBuyer: TPRM analyst
    mitigation: Prioritize top vendors first and normalize subprocessor, trust-center, and security-document ingestion.
    sourceRefs:
    - 28
    - 29
    - 30
    - 31
  - friction: Cross-functional ownership of remediation
    severity: medium
    affectedBuyer: TPRM / security engineering / procurement
    mitigation: Anchor the motion around one response queue with named owners and SLA-style workflow routing.
    sourceRefs:
    - 12
    - 17
    - 21
