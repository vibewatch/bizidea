openQuestions:
- What ACV can a $30B-$80B regional bank support for evidence-only mode versus active-containment mode?
- 'Which integration wins the first pilot most often: Microsoft/Entra, Okta, ServiceNow, or the existing GRC/TPrM stack?'
- Will banks allow policy-gated automated actions in production, or only recommendations and queued approvals in the first 12 months?
- Which vendor evidence formats are stable enough to normalize reliably across trust centers, subprocessor lists, and security documents?
