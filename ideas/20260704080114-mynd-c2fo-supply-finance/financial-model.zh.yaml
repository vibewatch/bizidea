slug: supplier-liquidity-cockpit
date: "2026-07-04"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-04] 运营模型从该日期商业计划之后的第一个完整月份开始。"
  - id: A2
    name: INR 定价的汇率换算
    value: "₹83/$1"
    unit: FX
    source: "[Research market.tam rationale] TAM、SAM 和 SOM 已经按约 ₹83/$1 将 INR 折算为 USD，因此 BP 定价也使用同一汇率。"
  - id: A3
    name: 期初现金/建模的种子前轮融资
    value: "$1.6M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model spend to Q2Y3] 模型采用精简、印度本土、纯软件计划，并把现金规模设在略低于 BP 区间，以覆盖下一里程碑外加 6 个月缓冲。"
  - id: A4
    name: 起始活跃付费供应商数
    value: "0"
    unit: 数量
    source: "[BP milestones 0-12 months + BP experimentRoadmap] 公司从收入前阶段开始，必须先把访谈和设计伙伴转化为付费试点。"
  - id: A5
    name: 活跃付费供应商定义
    value: "合同下的付费试点或生产供应商实体"
    unit: 定义
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop 包含任何已经为试点或生产范围付费的供应商。"
  - id: A6
    name: 付费试点经济模型
    value: "$7.2K，总计约 90 天（~$2.4K/月）"
    unit: 每家供应商 USD
    source: "[BP gtm.pricing ₹4-8 lakh pilot + BP investorMemo.firstCustomer.initialContract] 基准情形使用试点区间的中点。"
  - id: A7
    name: 成熟生产收入爬坡
    value: "每个活跃供应商的混合实现 ARR，从进入 Y2 时约 $22.2K 上升到 Q4Y2 约 $27.6K，并在 Q4Y3 达到约 $30.0K"
    unit: 每家供应商每年 USD
    source: "[BP gtm.pricing annual software ₹6-24 lakh + usage fee 5-15 bps + BP businessModel.expansionLevers + BP investorMemo.mustBeTrue 30% ARR from expansion by month 18] 一旦第二项目和使用费附加，成熟账户会落在所述软件区间的上半部分。"
  - id: A8
    name: 客户爬坡
    value: "M12 达到 4 家付费供应商，Q4Y2 达到 18 家，Q4Y3 达到 55 家"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets + Research market.som] 基准情形与计划中第 2 年 10-20 家付费供应商和第 3 年 40-60 家生产客户相匹配。"
  - id: A9
    name: 收入确认惯例
    value: "期末活跃付费供应商数乘以每个活跃供应商的混合实现月收入"
    unit: 公式
    source: "[BP businessModel.unitOfValue + BP gtm.pricing] 这让收入能直接追溯到客户数量和打包假设。"
  - id: A10
    name: 毛利率爬坡
    value: "Y1 为 52%-60%，Y2 为 63%-69%，Y3 为 70%-72%"
    unit: 毛利率百分比
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on repeatable ingestion + BP operations] 在打包路径达到目标毛利率区间前，早期部署会吸收更多对账和合作伙伴支持成本。"
  - id: A11
    name: 招聘时间线
    value: "M1 创始人和创始工程师；M4 实施负责人；M7 资金运营/产品负责人；M10 合作伙伴；Q2Y2 第二名工程师；Q3Y2 第二名实施人员；Q4Y2 财务运营；Q2Y3 第二名销售"
    unit: 时间线
    source: "[BP team + BP strategicChoices.sequencingRationale] 计划会先补实施能力，再放大 GTM，Y3 团队仍保持精简。"
  - id: A12
    name: 创始人全成本薪酬
    value: "$80K"
    unit: 每年 USD
    source: "[BP team 创始人/首席执行官 + startup-finance heuristic for India B2B SaaS] 精简的创始人现金薪酬加上薪资税和福利。"
  - id: A13
    name: 工程全成本薪酬
    value: "$100K"
    unit: 每年 USD
    source: "[BP team Founding eng + startup-finance heuristic for India B2B SaaS] 反映一名资深、集成密集型创始工程师以及后续产品工程师。"
  - id: A14
    name: 实施与集成全成本薪酬
    value: "$55K"
    unit: 每年 USD
    source: "[BP team Implementation and integration lead + startup-finance heuristic for India B2B SaaS] 部署负责人至关重要，但仍低于完全规模化企业服务基准。"
  - id: A15
    name: 资金运营/产品全成本薪酬
    value: "$65K"
    unit: 每年 USD
    source: "[BP team Treasury operations product lead + startup-finance heuristic for India B2B SaaS] 假设是一名能把财务控制员和资金管理例程产品化的资深工作流运营者。"
  - id: A16
    name: 销售/合作伙伴全成本薪酬
    value: "$75K"
    unit: 每年 USD
    source: "[BP team Partnerships or account executive + BP gtm.channels + startup-finance heuristic for India B2B SaaS] 包含创始人辅助企业销售所需差旅和可变现金薪酬。"
  - id: A17
    name: 行政管理/财务运营全成本薪酬
    value: "$40K"
    unit: 每年 USD
    source: "[BP operations + startup-finance heuristic for India B2B SaaS] 覆盖精简财务、合规和供应商运营支持。"
  - id: A18
    name: 薪酬在损益表科目间的分摊
    value: "创始人 65% 销售与营销、35% 行政管理；工程 100% 研发；实施 45% 销售与营销、55% 研发；资金产品 80% 研发、20% 行政管理；销售 100% 销售与营销；行政管理 100% 行政管理"
    unit: 分摊
    source: "[BP team role rationales + BP operations] 将薪酬映射到运营模型使用的职能科目。"
  - id: A19
    name: 非薪酬运营支出爬坡
    value: "每月非薪酬销售与营销/研发/行政管理支出从 $4K/$4K/$3K 起步，到 Q4Y3 按季度约达到 $14K/$15K/$10K"
    unit: USD
    source: "[BP operations + startup-finance heuristic] 覆盖云工具、前往制造业集群的差旅、法律/合规和合作伙伴支持成本，同时不假设重度付费获客项目。"
  - id: A20
    name: 现金转换惯例
    value: "现金变动等于 EBITDA"
    unit: 公式
    source: "[startup-finance heuristic] 在种子前轮规模下，资本开支、税费、债务服务和营运资金时点被假设为不重大。"
  - id: A21
    name: 稳态月度流失率
    value: "2.0%"
    unit: 每月百分比
    source: "[startup-finance heuristic for early workflow SaaS] 年度合同和嵌入式运营工作流支持低流失，但模型相对成熟记录系统仍保持保守。"
  - id: A22
    name: CAC 计算惯例
    value: "Y2-Y3 销售与营销支出除以 51 家净新增付费供应商"
    unit: 公式
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] 捕捉前四家付费供应商之后，由创始人主导和合作伙伴主导共同带来的客户获取。"
  - id: A23
    name: 用于确定融资规模的下一轮里程碑
    value: "到 Q2Y3 达到 32 家付费供应商，上手低于 30 天，30%+ 的 ARR 来自扩展或使用，且 H2Y3 EBITDA 转正"
    unit: 里程碑
    source: "[BP milestones 12-24 months + BP investorMemo.mustBeTrue + model cash curve] 融资规模旨在达到可进行种子轮的证明点，并保留六个月缓冲。"
