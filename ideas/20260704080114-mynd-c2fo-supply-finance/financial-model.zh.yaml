scenarios:
  downside:
    description: "合作伙伴数据访问仍更偏人工，试点转化延后，扩展或使用费比计划更晚附加。"
    y3RevenueK: 694.8
    y3EbitdaK: -288.4
    cashLowPointK: 466.2
    keyAssumptionChanges:
      - "Q4Y3 customersEop 接近 38，而不是 55。"
      - "每个活跃供应商的混合实现收入比基准低约 8-10%，因为第二项目和使用费滞后。"
      - "由于上手仍更偏人工，Q4Y3 毛利率仅达到约 69%。"
  base:
    description: "纯软件、印度优先计划把早期试点转化为可重复生产安装，并在不增加大型外勤团队的情况下获得适度路由量费用。"
    y3RevenueK: 1095.3
    y3EbitdaK: 19.1
    cashLowPointK: 708.5
    keyAssumptionChanges:
      - "M12 达到 4 家付费供应商，Q4Y2 达到 18 家，Q4Y3 达到 55 家。"
      - "每个活跃供应商的混合月收入从 Y1 试点占比较高的水平，上升到 Q4Y3 约 $2.5K。"
      - "随着上手模板和合作伙伴文件馈送标准化，毛利率在 Y3 跨过 70%。"
  upside:
    description: "ERP 集成商引荐和合作伙伴数据馈送比计划更快压缩上手时间，让团队在增加太多人数之前扩大收入。"
    y3RevenueK: 1329.5
    y3EbitdaK: 213.5
    cashLowPointK: 807.3
    keyAssumptionChanges:
      - "借助更早的合作伙伴来源管道，Q4Y3 customersEop 达到约 65。"
      - "随着第二项目扩展更早附加，每家供应商的混合实现收入比基准高约 5-6%。"
      - "由于实施保持模板化，Q4Y3 毛利率达到约 74%。"
sensitivity:
  - variable: ARPU
    downsideCase: "使用费和第二项目扩展更晚落地，把成熟 ARR 拉回到接近研究支出代理值。"
    baseCase: "成熟账户在 Y3 达到约 $28K 年化收入。"
    upsideCase: "扩展和基于节省的费用把成熟 ARR 提升到 $30K 以上。"
    y3RevenueImpactK: -109.5
    cashImpactK: -78.0
  - variable: CAC
    downsideCase: "合作伙伴引荐表现不佳，更多交易需要创始人主导直销。"
    baseCase: "Y2-Y3 CAC 保持在约 $9.5K，因为引荐和创始人销售分担负荷。"
    upsideCase: "ERP 和财务渠道合作伙伴带来更多合格管道。"
    y3RevenueImpactK: -45.0
    cashImpactK: -160.0
  - variable: 流失率
    downsideCase: "如果客户把产品当作试点工作流而非记录系统，月流失率会漂移到 3.0%。"
    baseCase: "一旦账户进入生产例程，月流失率保持在约 2.0%。"
    upsideCase: "随着基准和多项目可见性变得有黏性，月流失率更接近 1.2%。"
    y3RevenueImpactK: -82.0
    cashImpactK: -70.0
  - variable: 销售周期
    downsideCase: "由于预算签批和数据访问审批耗时更长，试点到生产周期拉长。"
    baseCase: "触发事件销售让试点到生产转化接近商业计划中的排序计划。"
    upsideCase: "合作伙伴访问路径压缩审批，并把交易提前一个季度。"
    y3RevenueImpactK: -180.0
    cashImpactK: -130.0
  - variable: 毛利率
    downsideCase: "更多人工对账和客户特定文件处理使毛利率保持在 70% 以下。"
    baseCase: "一旦上手模板化，Y3 毛利率平均处于 70% 出头。"
    upsideCase: "合作伙伴数据馈送和异常工具把毛利率推到 70% 中段。"
    y3RevenueImpactK: 0.0
    cashImpactK: -55.0
  - variable: 招聘节奏
    downsideCase: "在合作伙伴渠道完全可重复之前，提前招聘两名规模化岗位。"
    baseCase: "团队期末保持 9 名 FTE，并且只在 Q2Y3 增加第二名销售。"
    upsideCase: "由于合作伙伴杠杆吸收更多需求，公司将一名增长岗位延后到 Q4Y3 之后。"
    y3RevenueImpactK: 35.0
    cashImpactK: -120.0
modelDiagram:
  title: 单位经济模型流
  mermaid: |
    flowchart LR
      Pipeline[创始人 + 合作伙伴管道] --> PaidPilots[付费试点]
      PaidPilots --> Production[生产供应商]
      Production --> Expansion[第二项目 + 使用费]
      Expansion --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
  - checkName: 收入引擎
    finding: "基准收入主要由客户数量驱动：M12 达到 4 家付费供应商，Q4Y2 达到 18 家，Q4Y3 达到 55 家；随着使用和扩展附加，成熟 ARPU 向 BP 定价区间上半部分移动。"
  - checkName: 必须做对的事项
    finding: "公司必须通过合作伙伴数据馈送和模板把上手保持在 30 天以下，使 9 名 FTE 基准情形能消化 Q4Y2 到 Q4Y3 的爬坡而不压垮毛利率。"
  - checkName: 模型失效条件
    finding: "如果销售周期拉长、混合 ARPU 回落到接近研究中的 ₹1.5M 支出假设，下行情形在 Y3 结束时现金约 $0.47M，且 EBITDA 仍为负。"
  - checkName: 下一轮证明
    finding: "下一轮融资故事是到 Q2Y3 拥有 32 家付费供应商，30%+ 的 ARR 来自扩展或使用，合作伙伴来源管道奏效，并且 H2Y3 EBITDA 为正。"
sanityChecks:
  ruleOf40: "Y3 增长 249.5% + EBITDA 利润率 1.7% = 251.2%"
  burnMultiple: "Y2 燃烧倍数约 0.9x，使用约 $0.38M EBITDA 消耗对比约 $0.41M 净新增 ARR；Q3Y3 EBITDA 转正。"
  revenuePerFte: "Y3 每名 FTE 收入 $121.7K，期末 9 名 FTE（低于 $150-250K 的印度垂直 SaaS 经验值）"
  flags:
    - "基准情形假设成熟客户落在 BP 年度软件区间上半部分并叠加使用费，高于研究中的每供应商每年 ₹1.5M 规模代理值。"
    - "由于该切口 ACV 较低且上手较重，软件的人均收入仍较温和；合作伙伴主导上手必须防止业务看起来像服务。"
    - "毛利率取决于可重复的文件或 API 访问；如果门户和融资方数据仍然定制化，COGS 或人数就需要上升。"
    - "customersEop 在 Y1 包含付费试点，因此在 Y2 后期之前，真实生产客户数会略低于标题中的付费客户数。"
