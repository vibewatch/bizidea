slug: supplier-liquidity-cockpit
date: "2026-07-04"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-04] the operating model starts in the first full month after the dated business plan."
  - id: A2
    name: FX conversion for INR pricing
    value: "₹83 per $1"
    unit: FX
    source: "[Research market.tam rationale] TAM, SAM, and SOM already translate INR to USD at roughly ₹83 per dollar, so the same rate is used for BP pricing."
  - id: A3
    name: Opening cash / modeled pre-seed raise
    value: "$1.6M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model spend to Q2Y3] the model uses a lean, India-based, software-only plan and sizes cash slightly below the BP range to cover the next milestone plus a 6-month buffer."
  - id: A4
    name: Starting active paying suppliers
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months + BP experimentRoadmap] the company begins pre-revenue and must first convert interviews and design partners into paid pilots."
  - id: A5
    name: Active paying supplier definition
    value: "A paid pilot or production supplier entity under contract"
    unit: definition
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] customersEop includes any supplier already paying for pilot or production scope."
  - id: A6
    name: Paid pilot economics
    value: "$7.2K total over about 90 days (~$2.4K per month)"
    unit: USD per supplier
    source: "[BP gtm.pricing ₹4-8 lakh pilot + BP investorMemo.firstCustomer.initialContract] the base case uses the midpoint of the pilot range."
  - id: A7
    name: Mature production revenue ramp
    value: "Blended realized ARR per active supplier rises from about $22.2K entering Y2 to about $27.6K by Q4Y2 and about $30.0K by Q4Y3"
    unit: USD per supplier per year
    source: "[BP gtm.pricing annual software ₹6-24 lakh + usage fee 5-15 bps + BP businessModel.expansionLevers + BP investorMemo.mustBeTrue 30% ARR from expansion by month 18] mature accounts land in the upper half of the stated software range once second-program and usage fees attach."
  - id: A8
    name: Customer ramp
    value: "4 paying suppliers by M12, 18 by Q4Y2, and 55 by Q4Y3"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + BP gtm.funnelTargets + Research market.som] the base case matches the plan's 10-20 paying suppliers by year 2 and 40-60 production customers by year 3."
  - id: A9
    name: Revenue recognition convention
    value: "Period-end active paying suppliers multiplied by blended realized monthly revenue per active supplier"
    unit: formula
    source: "[BP businessModel.unitOfValue + BP gtm.pricing] this keeps revenue directly traceable to customer count and packaging assumptions."
  - id: A10
    name: Gross margin ramp
    value: "52%-60% in Y1, 63%-69% in Y2, and 70%-72% in Y3"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on repeatable ingestion + BP operations] early deployments absorb more reconciliation and partner-support cost before the packaged path reaches the targeted margin band."
  - id: A11
    name: Hiring timeline
    value: "M1 founder and founding engineer; M4 implementation lead; M7 treasury ops / product lead; M10 partnerships; Q2Y2 second engineer; Q3Y2 second implementation hire; Q4Y2 finance ops; Q2Y3 second sales hire"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale] the plan hires implementation capacity before scaling GTM and keeps the Y3 team lean."
  - id: A12
    name: Founder loaded compensation
    value: "$80K"
    unit: USD per year
    source: "[BP team Founder/CEO + startup-finance heuristic for India B2B SaaS] lean founder cash pay plus payroll taxes and benefits."
  - id: A13
    name: Engineering loaded compensation
    value: "$100K"
    unit: USD per year
    source: "[BP team Founding eng + startup-finance heuristic for India B2B SaaS] reflects a senior integration-heavy founding engineer and later product engineers."
  - id: A14
    name: Implementation and integration loaded compensation
    value: "$55K"
    unit: USD per year
    source: "[BP team Implementation and integration lead + startup-finance heuristic for India B2B SaaS] deployment ownership is critical but still below fully scaled enterprise services benchmarks."
  - id: A15
    name: Treasury ops / product loaded compensation
    value: "$65K"
    unit: USD per year
    source: "[BP team Treasury operations product lead + startup-finance heuristic for India B2B SaaS] assumes a senior workflow operator who can productize controller and treasury routines."
  - id: A16
    name: Sales / partnerships loaded compensation
    value: "$75K"
    unit: USD per year
    source: "[BP team Partnerships or account executive + BP gtm.channels + startup-finance heuristic for India B2B SaaS] includes travel and variable cash comp for founder-assisted enterprise selling."
  - id: A17
    name: G&A / finance ops loaded compensation
    value: "$40K"
    unit: USD per year
    source: "[BP operations + startup-finance heuristic for India B2B SaaS] covers lean finance, compliance, and vendor operations support."
  - id: A18
    name: Payroll allocation to P&L lines
    value: "Founder 65% S&M and 35% G&A; engineering 100% R&D; implementation 45% S&M and 55% R&D; treasury product 80% R&D and 20% G&A; sales 100% S&M; G&A 100% G&A"
    unit: allocation
    source: "[BP team role rationales + BP operations] maps payroll into the functional lines used in the operating model."
  - id: A19
    name: Non-payroll opex ramp
    value: "Monthly non-payroll S&M/R&D/G&A starts at $4K/$4K/$3K and reaches roughly $14K/$15K/$10K per quarter by Q4Y3"
    unit: USD
    source: "[BP operations + startup-finance heuristic] covers cloud tooling, travel to manufacturing clusters, legal/compliance, and partner-support costs without assuming heavy paid-demand programs."
  - id: A20
    name: Cash conversion convention
    value: "Cash movement equals EBITDA"
    unit: formula
    source: "[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at pre-seed scale."
  - id: A21
    name: Steady-state monthly churn
    value: "2.0%"
    unit: percent per month
    source: "[startup-finance heuristic for early workflow SaaS] annual contracts and embedded operating workflows support low churn, but the model remains conservative versus a mature system-of-record."
  - id: A22
    name: CAC convention
    value: "Y2-Y3 sales and marketing spend divided by 51 net new paying suppliers"
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] captures founder-led plus partner-led customer acquisition after the first four paying suppliers."
  - id: A23
    name: Next-round milestone for funding sizing
    value: "32 paying suppliers by Q2Y3, onboarding below 30 days, 30%+ of ARR from expansion or usage, and H2Y3 EBITDA turning positive"
    unit: milestone
    source: "[BP milestones 12-24 months + BP investorMemo.mustBeTrue + model cash curve] the raise is sized to reach a seed-ready proof point with six months of buffer."
