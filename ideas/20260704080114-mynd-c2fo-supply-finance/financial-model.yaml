scenarios:
  downside:
    description: "Partner data access stays more manual, pilot conversions slip, and expansion or usage fees attach later than planned."
    y3RevenueK: 694.8
    y3EbitdaK: -288.4
    cashLowPointK: 466.2
    keyAssumptionChanges:
      - "Q4Y3 customersEop lands near 38 instead of 55."
      - "Blended realized revenue per active supplier runs about 8-10% below base because second-program and usage fees lag."
      - "Gross margin reaches only about 69% by Q4Y3 because onboarding remains more manual."
  base:
    description: "The software-only, India-first plan converts early pilots into repeatable production installs and modest routed-volume fees without adding a large field org."
    y3RevenueK: 1095.3
    y3EbitdaK: 19.1
    cashLowPointK: 708.5
    keyAssumptionChanges:
      - "4 paying suppliers by M12, 18 by Q4Y2, and 55 by Q4Y3."
      - "Blended monthly revenue per active supplier rises from pilot-heavy levels in Y1 to about $2.5K by Q4Y3."
      - "Gross margin crosses 70% in Y3 as onboarding templates and partner file feeds standardize."
  upside:
    description: "ERP-integrator referrals and partner data feeds compress onboarding faster than planned, letting the team scale revenue before adding much more headcount."
    y3RevenueK: 1329.5
    y3EbitdaK: 213.5
    cashLowPointK: 807.3
    keyAssumptionChanges:
      - "Q4Y3 customersEop reaches about 65 with earlier partner-sourced pipeline."
      - "Blended realized revenue per supplier runs about 5-6% above base as second-program expansion attaches earlier."
      - "Gross margin reaches roughly 74% by Q4Y3 because implementation stays templated."
sensitivity:
  - variable: ARPU
    downsideCase: "Usage fees and second-program expansion land later, pulling mature ARR back toward the research spend proxy."
    baseCase: "Mature accounts reach roughly $28K annualized revenue in Y3."
    upsideCase: "Expansion and savings-based fees lift mature ARR above $30K."
    y3RevenueImpactK: -109.5
    cashImpactK: -78.0
  - variable: CAC
    downsideCase: "Partner referrals underperform and more deals require founder-led direct selling."
    baseCase: "Y2-Y3 CAC stays near $9.5K because referrals and founder sales share load."
    upsideCase: "ERP and finance-channel partners source more of the qualified pipeline."
    y3RevenueImpactK: -45.0
    cashImpactK: -160.0
  - variable: churn
    downsideCase: "Monthly churn drifts toward 3.0% if customers treat the product as a pilot workflow instead of a system of record."
    baseCase: "Monthly churn holds near 2.0% once accounts move into production routines."
    upsideCase: "Monthly churn stays closer to 1.2% as benchmarking and multi-program visibility become sticky."
    y3RevenueImpactK: -82.0
    cashImpactK: -70.0
  - variable: sales cycle
    downsideCase: "Pilot-to-production cycles stretch because budget sign-off and data-access approvals take longer."
    baseCase: "Trigger-event selling keeps pilot-to-production conversion close to the BP sequencing plan."
    upsideCase: "Partner access paths compress approvals and bring deals forward by one quarter."
    y3RevenueImpactK: -180.0
    cashImpactK: -130.0
  - variable: gross margin
    downsideCase: "More manual reconciliation and customer-specific file handling keep margin below 70%."
    baseCase: "Y3 gross margin averages in the low 70s once onboarding is templated."
    upsideCase: "Partner data feeds and exception tooling push gross margin into the mid-70s."
    y3RevenueImpactK: 0.0
    cashImpactK: -55.0
  - variable: hiring pace
    downsideCase: "Two scale hires are pulled forward before partner channels are fully repeatable."
    baseCase: "The team holds at 9 ending FTE and adds the second sales hire only in Q2Y3."
    upsideCase: "The company delays one growth hire until after Q4Y3 because partner leverage absorbs more demand."
    y3RevenueImpactK: 35.0
    cashImpactK: -120.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pipeline[Founder + partner pipeline] --> PaidPilots[Paid pilots]
      PaidPilots --> Production[Production suppliers]
      Production --> Expansion[Second programs + usage fees]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: "Base revenue is mostly a customer-count story: 4 paying suppliers by M12, 18 by Q4Y2, and 55 by Q4Y3, with mature ARPU moving toward the top half of the BP pricing band as usage and expansion attach."
  - checkName: Must go right
    finding: "The company must keep onboarding below 30 days through partner data feeds and templates so the 9-FTE base case can absorb the Q4Y2-to-Q4Y3 ramp without crushing gross margin."
  - checkName: Model breaks if
    finding: "If sales cycles stretch and blended ARPU falls back toward the research ₹1.5M spend assumption, the downside case ends Y3 at about $0.47M cash and still negative EBITDA."
  - checkName: Next-round proof
    finding: "The next financing story is 32 paying suppliers by Q2Y3 with 30%+ of ARR from expansion or usage, partner-sourced pipeline working, and positive EBITDA in H2Y3."
sanityChecks:
  ruleOf40: "Y3 growth 249.5% + EBITDA margin 1.7% = 251.2%"
  burnMultiple: "Y2 burn multiple is about 0.9x using roughly $0.38M of EBITDA burn against about $0.41M of net new ARR; Q3Y3 turns EBITDA positive."
  revenuePerFte: "$121.7K Y3 on 9 ending FTE (below a $150-250K India vertical SaaS heuristic)"
  flags:
    - "The base case assumes mature customers land near the upper half of the BP annual software range plus usage fees, which is above the research ₹1.5M per supplier-year sizing proxy."
    - "Revenue per FTE remains modest for software because the wedge is low-ACV and onboarding-heavy; partner-led onboarding must keep the business from looking services-like."
    - "Gross margin depends on repeatable file or API access; if portal and financier data stay bespoke, either COGS or headcount will need to rise."
    - "customersEop includes paid pilots in Y1, so true production customer count is slightly lower than the headline paying-customer count until later Y2."
