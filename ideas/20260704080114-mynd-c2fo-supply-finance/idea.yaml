jobsToBeDone:
  - job: >-
      When we sell to several large buyers with separate SCF portals, help our finance controller know which approved
      invoices to finance today, so they can cover raw-material purchases and payroll without emergency borrowing.
    currentAlternative: "Spreadsheet cash planning plus multiple portal logins and bank relationship-manager calls"
    successMetric: "Reduction in missed financing windows, overdraft usage, and weekly cash surprises"
  - job: >-
      When a buyer extends payment terms or adds a new financing program, help our CFO model the cash impact and pick
      the lowest-friction funding route, so they can accept enterprise growth without breaking working capital.
    currentAlternative: "Manual ERP exports and one-off invoice discounting or overdraft decisions"
    successMetric: "Accuracy of 13-week cash forecast and time to onboard a new buyer program"
