problem: >-
  Indian mid-market suppliers selling into multiple large buyers increasingly have access to buyer-led early-payment
  and invoice-finance programs, but each program lives in a separate portal with its own eligibility timing, pricing,
  and drawdown rules. Finance teams still forecast cash in spreadsheets, miss approved-invoice windows, and plug
  raw-material or payroll gaps with expensive overdrafts because they cannot see all available liquidity in one place.
  As digital supply-chain-finance rails consolidate, the missing product shifts from capital origination to supplier-side
  cash orchestration.
targetUser:
  primary: >-
    CFOs and finance controllers at ₹50-250 crore Indian auto-component and industrial-input suppliers serving multiple
    listed enterprise buyers and managing 45-75 day payment terms.
  secondary: >-
    Receivables and treasury operations managers who log into buyer finance portals, reconcile approved invoices, and
    decide when to draw early payment.
  buyer: "CFO or Head of Treasury at the supplier"
startupThesis:
  nonObviousInsight: >-
    Mynd's acquisition of C2FO India suggests the buyer-side rail is consolidating faster than the supplier-side
    workflow. Once one network touches 140 enterprise clients, nearly half of Nifty50 companies, and around 200,000
    suppliers, the new opportunity is not another lender but the neutral software layer that helps suppliers use
    multiple approved-invoice programs as one working-capital system.
  beachhead: >-
    ₹50-250 crore Indian auto-component and industrial-input suppliers serving 3-5 listed OEM or manufacturing buyers,
    running 45-75 day terms, and juggling at least two buyer-led supply-chain-finance or invoice-discounting programs.
  wedge: >-
    An approved-invoice liquidity cockpit that syncs supplier ERP data with buyer finance portals to forecast
    eligibility, compare early-payment costs, and trigger the best drawdown from one workflow.
  whyNowCatalyst: >-
    Mynd's takeover of C2FO India concentrates 140 enterprise clients, about 200,000 suppliers, and roughly ₹60,000
    crore of annual financing flow onto scaled digital rails, making a supplier-side orchestration layer newly
    integrable and urgent.
  ventureScalePath: >-
    Start with Indian suppliers that serve multiple blue-chip buyers, then expand into broader Asia supplier networks,
    add dynamic-discount routing, PO and receivables financing, insurance and FX attachments, and become the
    working-capital operating system for supplier ecosystems.
solution: >-
  Supplier Liquidity Cockpit ingests ERP or accounting invoice data, buyer portal approvals, and lender statements to
  build one cash-eligibility ledger across programs. It shows which approved invoices can be financed today, when
  future receivables will become eligible, what each option costs, and whether drawing now reduces or worsens the next
  13 weeks of liquidity. Finance teams can launch a draw, defer, or split utilization across buyers from one workflow
  instead of checking multiple portals and calling relationship managers. The first release stays balance-sheet-light:
  software plus orchestration, not a lender. Over time the company can add automated collections planning, dynamic
  discount routing, lender routing, and supplier health benchmarks built from cross-program usage data.
goToMarketSeed:
  firstCustomer: >-
    A ₹75-200 crore Indian auto-component supplier in Pune or Chennai with 3-5 large OEM or listed industrial buyers,
    60-day terms, and finance staff juggling Mynd or C2FO-style programs plus at least one bank-led
    invoice-discounting line.
  buyingTrigger: >-
    Winning a new large-buyer contract or accepting a payment-term extension forces the supplier to juggle another
    financing portal and exposes weekly cash gaps for raw materials and payroll.
  currentAlternative: >-
    Spreadsheet cash planning across Tally or SAP exports, multiple buyer portals, relationship-manager calls, and
    overdrafts or ad hoc invoice discounting.
  switchingReason: >-
    One cockpit reveals all approved-invoice liquidity, makes financing costs comparable, and turns missed drawdown
    windows into predictable cash without asking the supplier to change lenders or buyers.
  pricingHypothesis: >-
    Charge ₹50,000-₹200,000 per month based on connected buyer programs and financed invoice volume, plus 5-15 basis
    points on orchestrated early-payment volume or verified savings.
