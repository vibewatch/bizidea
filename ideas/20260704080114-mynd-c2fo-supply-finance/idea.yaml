topRisks:
  - name: "Portal access risk"
    description: "If buyer-led SCF platforms or banks do not expose reliable approval and pricing data, the product could collapse into a glorified spreadsheet."
    mitigation: "Start with ERP plus statement or file ingestion, secure one design-partner platform and bank API, and prove ROI before broadening integrations."
  - name: "Incumbent channel squeeze"
    description: "Mynd, C2FO-style platforms, banks, or ERP vendors could copy basic cockpit features or discourage integrations once the category proves attractive."
    mitigation: "Own the neutral multi-buyer cash workflow, launch across several funding partners, and build sticky forecast and benchmarking features beyond raw drawdown."
  - name: "Weak supplier budget ownership"
    description: "Suppliers may admit the pain but still expect banks to solve it for free, slowing standalone SaaS adoption."
    mitigation: "Price against financed volume or interest savings, target suppliers already juggling multiple programs, and sell around new-contract or term-extension events with hard cash ROI."
