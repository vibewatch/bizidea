      - 15
      - 20
      - 29
      - 30
    competitiveRivalry:
      score: 4
      rationale: 买方主导 SCF、TReDS、营运资金基础设施和财资软件都在同场竞争；如果切口扩得太快，邻近赛道的挤压会一直存在。
      sourceRefs:
      - 13
      - 15
      - 18
      - 20
      - 22
  pestle:
  - factor: 政治
    impact: positive
    point: 印度政策仍在通过 TReDS 改革和接入扩容，继续推动 MSME 应收账款融资。
    sourceRefs:
    - 4
    - 15
    - 17
  - factor: 经济
    impact: positive
    point: 巨量延迟应收和有限的正式营运资金渗透率，让更好的流动性工具具备了真实紧迫性。
    sourceRefs:
    - 7
    - 9
    - 10
  - factor: 社会
    impact: positive
    point: 财务团队一边面对更频繁、更精准的现金可视性要求，一边还得处理不断上升的银行与账户复杂度。
    sourceRefs:
    - 23
    - 30
  - factor: 技术
    impact: positive
    point: GST 电子发票、账户聚合器、OCEN 和 ERP 开发者工具，正在拉低构建供应商流动性编排层的成本。
    sourceRefs:
    - 25
    - 26
    - 27
    - 28
  - factor: 法律
    impact: negative
    point: 一旦工作流从编排层滑向贷款中介，数字借贷合规和资金流限制就会急剧收紧。
    sourceRefs:
    - 5
  - factor: 环境
    impact: negative
    point: 运力扰动和供应链冲击会推高汽车零部件供应商的库存缓冲，也会加重其营运资金压力。
    sourceRefs:
    - 11
