slug: supplier-liquidity-cockpit
date: '2026-07-04'
executiveSummary: >-
  Supplier Liquidity Cockpit should launch as India-first orchestration software
  for ₹50-250 crore auto-component and industrial-input suppliers that already
  sell into several listed buyers and juggle multiple approved-invoice
  financing programs. Mynd's acquisition of C2FO India, the combined reach of
  140 enterprise clients and about 200,000 suppliers, and TReDS financed value
  of ₹329.2 billion in May 2026 show that the financing rails are scaling even
  as supplier-side workflow remains fragmented. The first customer is a
  ₹75-200 crore supplier in Pune or Chennai that adds a new OEM contract or
  accepts longer payment terms and suddenly has one more portal to manage
  against weekly payroll and raw-material needs. The product should start as a
  read-heavy cockpit that unifies ERP, statement, and portal data into one
  eligibility ledger, 13-week liquidity forecast, and best-action
  recommendation, not as a lender or TReDS operator. Go-to-market should begin
  with founder-led sales and ERP-integrator referrals around trigger events,
  with pricing tied to connected programs, financed volume, and measurable
  savings versus overdrafts or missed discount windows. The beachhead is
  intentionally narrow because auto-component suppliers offer concentrated buyer
  networks, repeatable Tally/SAP workflows, and enough working-capital stress
  to prove ROI quickly. Research models the India-only TAM at about $223M and
  the initial SAM at $14.6M, so the company must earn the right to expand into
  adjacent sectors and working-capital products rather than overbuild on day
  one. The main strategic risk is that buyer portals, banks, or suppliers may
  not support reliable data access or standalone budget ownership, which would
  turn the product into services or a partner-bundled feature rather than a
  software category. The missing diligence item is direct proof that enough
  target suppliers use two or more rails concurrently and will pay a neutral
  vendor for orchestration, which keeps the opportunity in Watch territory
  until pilots prove multi-rail prevalence, data access, and paid conversion.
problem:
  - "Approved-invoice liquidity is fragmented across buyer-led SCF portals, TReDS venues, and bank lines, so supplier finance teams cannot see what cash is available this week without manual reconciliation."
  - "Missed drawdown windows force suppliers back to overdrafts or ad hoc discounting exactly when new buyer contracts, longer payment terms, and raw-material purchases increase working-capital strain."
solution:
  - "A neutral liquidity cockpit ingests ERP, bank-statement, GST, and partner file-feed data to build one eligibility ledger, compare financing options across programs, and forecast the next 13 weeks of cash."
  - "The first release stays read-heavy and operator-assisted, so customers can act on the best drawdown recommendation without the startup becoming a lender, moving funds, or depending on full portal write access."
whyWeWin:
  - "Incumbents such as Mynd/C2FO, M1xchange, CredAble, and Taulia optimize one buyer program, marketplace, or lender stack at a time, not the supplier's neutral decision layer across several rails."
  - "The beachhead shares a concrete workflow and data spine: Tally or SAP invoice exports, bank statements, and recurring approved-invoice decisions tied to a small number of large buyers."
  - "Each deployment compounds a proprietary dataset on eligibility timing, discount rates, drawdown behavior, and approval-to-cash performance that no single platform or bank sees in full."
strategicChoices:
  beachhead: "₹50-250 crore Indian auto-component suppliers serving 3-5 listed OEM or manufacturing buyers, operating on 45-75 day terms, and already juggling at least two approved-invoice financing rails."
  wedgeRationale: "This slice creates faster proof than selling broadly into all Indian MSMEs because buyer concentration, working-capital pressure, and ERP overlap are high enough to make missed drawdown windows frequent and measurable. It also lets the company sell into a CFO with clear cash pain rather than into a generic finance-tech budget."
  sequencingRationale: "Start with read-only reconciliation, cash forecasting, and best-action recommendations because those prove savings without crossing regulatory lines or requiring brittle write access. Sell around new-buyer and term-extension trigger events before hiring quota-carrying sales, hire integration and implementation talent before broad GTM scale, and add platform or bank partnerships only after two referenceable pilots show clear savings and repeatable onboarding."
  notYet:
    - "Acting as a lender, TReDS operator, or lending service provider"
    - "Generic treasury software for single-buyer or micro-SMB suppliers"
    - "Dynamic discounting, PO finance, FX, and insurance attachments before the core multi-rail cockpit is trusted"
market:
  tam: "$223M estimated India TAM based on 246,292 TReDS sellers, 5% fit for the multi-buyer supplier profile, and ₹1.5M modeled annual spend per supplier."
  sam: "$14.6M estimated initial SAM based on roughly 808 ACMA-member auto-component suppliers that match the beachhead profile at ₹1.5M annual spend."
  som: "$2.2M modeled year-3 SOM based on 120 reachable customers at ₹1.5M annual spend, which requires partner-led distribution and repeatable integrations."
  segments:
    - "Primary: ₹50-250 crore Indian auto-component suppliers with 3-5 listed buyers and at least two approved-invoice finance rails"
    - "Secondary: Indian industrial-input suppliers with similar buyer concentration, 45-75 day terms, and multi-program receivables workflows"
  buyingProcess: >-
    The daily user is usually the controller, receivables manager, or treasury
    operator, but budget approval sits with the CFO or Head of Treasury once a
    new buyer contract, term extension, or weekly cash gap makes the cost of
    missed drawdowns visible. ERP implementers, finance ops staff, and bank or
    platform partners influence the deal because the buyer must trust both the
    reconciliation logic and the recommendation output.
product:
  mvp: >-
    The MVP should connect one supplier entity to Tally or SAP exports, bank
    statements, and 2-3 approved-invoice program file feeds, then produce a
    clean eligibility ledger, 13-week liquidity forecast, and ranked financing
    recommendation for each week. It should remain read-only and operator-led at
    launch, with reconciliation workflows and audit logs before deeper
    automation.
  sixMonth: "Ship paid pilots with Tally and SAP connectors, one eligibility ledger, a 13-week cash forecast, exception handling for mismatched invoice data, and operator-assisted routing across 2-3 buyer programs plus one bank line."
  twelveMonth: "Add reusable integrations for two major SCF or TReDS rails, approval-to-cash benchmarks, alerting for missed-window risk, and partner-facing onboarding templates that cut deployment time below 30 days."
  twentyFourMonth: "Expand from visibility and routing into dynamic-discount optimization, broader industrial sectors, and adjacent working-capital modules such as receivables financing, FX, or insurance only after the core supplier control plane is trusted."
  keyBets:
    - "Enough target suppliers already use two or more rails concurrently that the cockpit solves a daily workflow, not an occasional exception."
    - "ERP, statement, and file-feed ingestion is sufficient to build a reliable first product before full platform APIs exist."
    - "Quantified savings from captured discount windows and avoided overdraft use are strong enough to fund standalone software."
    - "The first five customers share enough systems and buyer patterns that onboarding becomes template-driven rather than bespoke."
gtm:
  wedge: "Sell a paid liquidity-baseline and first-program-onboarding pilot to auto-component supplier CFOs when a new buyer contract or payment-term extension adds another financing workflow, then convert that workflow into annual orchestration software once weekly recommendations and savings are live."
  channels:
    - "Founder-led outbound to CFOs, controllers, and Heads of Treasury at target suppliers in Pune, Chennai, and similar manufacturing clusters"
    - "Referral partnerships with Tally/SAP implementers and treasury consultants already mapping invoice and cash workflows"
    - "Co-sell or referral motions with TReDS operators, SCF platforms, banks, and NBFC partners that already finance the supplier"
    - "Treasury and finance communities where cash-visibility and receivables pain already surfaces"
  funnelTargets: "Target account→qualified discovery 25-35%, qualified discovery→paid pilot 20-30%, paid pilot→annual production 50%+, and production→second-program or second-entity expansion 40%+ within 12 months."
  pricing: >-
    Start with a paid 90-day pilot at roughly ₹4-8 lakh for one supplier entity
    connecting 2-3 buyer programs and one bank line, then convert to ₹6-24 lakh
    annual software priced by connected programs and financed volume, plus 5-15
    basis points on routed early-payment volume or verified savings. This keeps
    the pricing basis tied to the buyer's actual decision system: number of
    programs to manage, liquidity under orchestration, and measurable cash
    improvement versus overdrafts or missed discount windows.
businessModel:
  revenueStreams:
    - "Annual subscription priced by connected buyer-finance programs and approved-invoice volume under management"
    - "Paid onboarding and reconciliation design for the first entity, ERP, and partner-file setup"
    - "Usage or savings-based fee on routed early-payment volume once recommendations are live"
  unitOfValue: "Connected buyer-finance programs and monthly approved-invoice volume decisioned through the cockpit."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more buyer programs, plants, and legal entities inside the same supplier group"
    - "Sell benchmark reporting on approval-to-cash timing, missed-window frequency, and financing mix"
    - "Introduce dynamic-discount routing and adjacent working-capital modules after the core cockpit proves repeatable"
    - "Expand from auto components into industrial inputs and other India-first sectors with similar buyer concentration"
strategyMap:
  northStarMetric: "Percentage of each customer's finance-eligible invoice volume that is visible and decisioned in the cockpit each week."
  inputMetrics:
    - "Qualified discovery to paid pilot conversion"
    - "Median days from kickoff to a clean eligibility ledger"
    - "Percent of finance-eligible invoices reconciled automatically"
    - "Missed financing windows avoided per customer-month"
    - "Paid pilot to annual production conversion rate"
    - "Second-program or second-entity expansion rate within 12 months"
  moatsToBuild:
    - "Normalized multi-rail pricing and eligibility dataset across buyers, TReDS venues, and bank lines"
    - "Reusable Tally, SAP, statement, and partner file-feed connector library for the beachhead"
    - "Benchmark data on approval-to-cash timing, program utilization, and drawdown behavior across suppliers"
  killCriteria:
    - "Fewer than 5 of the first 12 qualified ICP accounts use two or more approved-invoice rails concurrently."
    - "The first 3 design partners cannot reconcile at least 80% of eligible invoices from ERP, statement, and file feeds within 5 business days."
    - "Fewer than 2 of the first 4 paid pilots convert to annual production within 6 months."
    - "Measured customer savings or avoided overdraft cost stays below 3x subscription price after 90 days in production."
  mermaid: |
    flowchart LR
      Wedge[Auto-component multi-rail wedge] --> MVP[Read-only liquidity cockpit MVP]
      MVP --> Proof[Paid pilots with captured savings]
      Proof --> Expansion[Partner-led working-capital operating system]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Sharp wedge and good timing, but conviction stays moderate until concurrent multi-rail usage, stable data access, and paid budget are proven in pilots."
    whyBelieve: "Rails are scaling, pain is close to cash, and incumbents still optimize one buyer or lender workflow at a time rather than the supplier's neutral decision layer."
    whyDoubt: "The initial SAM is narrow, data access may stay brittle, and research does not yet prove that enough target suppliers both use multiple rails and will pay standalone SaaS."
    nextDiligence: "Win two paid pilots plus one signed partner data-access path and show a 50%+ pilot-to-annual conversion on quantified cash savings."
  firstCustomer:
    title: "CFO at a ₹75-200 crore Indian auto-component supplier with 3-5 OEM buyers and multiple invoice-finance rails"
    profile: "A Pune or Chennai supplier using Tally or SAP, running 60-day terms, and already juggling Mynd or C2FO-style programs alongside at least one bank-led invoice-discounting line."
    trigger: "A new buyer contract, payment-term extension, or weekly raw-material and payroll squeeze makes another financing portal impossible to manage in spreadsheets."
    buyer: "CFO or Head of Treasury"
    initialContract: "A 90-day paid pilot at roughly ₹4-8 lakh to connect 2-3 buyer programs and one bank line, converting to ₹6-24 lakh annual software plus 5-15 basis points on routed volume once weekly recommendations are trusted."
  mustBeTrue:
    - "At least 40% of qualified ICP suppliers already use two or more approved-invoice rails concurrently."
    - "The first 3 deployments reconcile at least 80% of eligible invoices without scraping or manual rekeying."
    - "At least 2 banks or platforms permit stable file or API access that keeps onboarding below 30 days."
    - "Paid pilot to annual production conversion reaches 50%+ because avoided overdraft or captured discounts exceed 3x software cost."
    - "By month 18, at least 30% of ARR comes from second-program, second-entity, or benchmark-module expansion rather than one-time setup."
  diligenceQuestions:
    - "How common is concurrent use of two or more approved-invoice rails inside the ₹50-250 crore supplier base?"
    - "Which buyer-led platforms and banks will share approval, pricing, and repayment data without brittle scraping?"
    - "Who actually owns budget when the controller uses the tool daily but the CFO signs the contract?"
    - "How much reconciliation work remains after Tally or SAP, GST, and bank-statement ingestion goes live?"
    - "Does auto components convert faster than industrial, pharma, or construction-adjacent suppliers with similar buyer concentration?"
operatingAssumptions:
  - assumption: "Enough target suppliers already juggle two or more approved-invoice rails to support a dedicated software category."
    basis: research.yaml
    validationTest: "Interview 12 qualified accounts, inspect 90 days of invoice-flow data, and confirm that at least 5 are actively using two or more rails at the same time."
    decisionImpact: "If false, the wedge narrows to single-platform optimization or the business loses its category-level urgency."
  - assumption: "ERP, statement, and file-feed ingestion can deliver a reliable eligibility ledger before direct portal APIs exist."
    basis: research.yaml
    validationTest: "Run technical proofs with the first 3 design partners and show at least 80% coverage of eligible invoices within 5 business days without scraping."
    decisionImpact: "If false, implementation becomes too manual, gross margin falls, and the product must narrow to analytics or partner-bundled services."
  - assumption: "CFOs will approve standalone software when spend is benchmarked against avoided overdraft interest and captured discount savings."
    basis: research.yaml
    validationTest: "Run 4 proposal cycles and close at least 2 paid pilots plus 1 annual conversion using quantified ROI in the buyer's own cash data."
    decisionImpact: "If false, the company must shift toward white-label, bank-bundled, or lower-priced workflow software."
  - assumption: "Auto-component suppliers share enough systems and buyer workflows that deployment playbooks become repeatable within the first 5 customers."
    basis: idea.yaml
    validationTest: "Map integrations across the first 5 signed accounts and confirm that at least 60% of required workflows are handled by the same connector and onboarding templates."
    decisionImpact: "If false, the ICP must tighten further or pricing must move toward high-touch implementation rather than software economics."
  - assumption: "Neutral supplier-side orchestration stays differentiated from Mynd/C2FO, TReDS venues, and treasury suites long enough to build a data moat."
    basis: research.yaml
    validationTest: "Track 10 qualified opportunities and verify that at least 70% still cite multi-rail neutrality or cross-program benchmarking as unserved by incumbents."
    decisionImpact: "If false, the startup must reposition as a partner-integrated module or a narrower analytics layer."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Interview 12 CFOs, controllers, and treasury operators at target auto-component suppliers and inspect recent invoice-flow exports."
    hypothesis: "Concurrent multi-rail usage and weekly cash-gap decisions are common enough to support a dedicated cockpit."
    successMetric: "At least 6 interviews confirm weekly multi-rail reconciliation pain and at least 2 accounts agree to a paid pilot."
    owner: "Founder/CEO"
  - horizon: "0-90 days"
    experiment: "Build a prototype that combines Tally or SAP exports, bank statements, and partner file feeds into one eligibility ledger."
    hypothesis: "A read-only data model can surface enough approved-invoice visibility to make recommendations without full portal APIs."
    successMetric: "Three sample accounts achieve at least 80% eligible-invoice reconciliation and a first 13-week forecast within 5 business days."
    owner: "Founding eng"
  - horizon: "90-180 days"
    experiment: "Run 2 paid pilots tied to a new buyer-program launch or payment-term extension event."
    hypothesis: "The trigger event creates enough urgency for buyers to fund the workflow and act on the recommendations."
    successMetric: "At least 1 pilot converts to annual production and each pilot shows either 25% fewer missed financing windows or quantified savings above the pilot fee."
    owner: "Founder/CEO"
  - horizon: "90-180 days"
    experiment: "Secure one platform or bank data-access pilot and one ERP-integrator referral partnership."
    hypothesis: "Partnerships can shorten onboarding and produce warmer pipeline once the first product proof exists."
    successMetric: "Two signed partner pilots reduce expected onboarding below 30 days for the next customer and generate at least 3 qualified introductions."
    owner: "Founder/CEO"
  - horizon: "180-365 days"
    experiment: "Launch approval-to-cash benchmarking and missed-window alerts across the first production customers."
    hypothesis: "Benchmarking turns the product from a one-time integration into a recurring operating system with expansion value."
    successMetric: "At least 3 production customers use the benchmark workflow weekly and 1 expands to a second program or entity."
    owner: "Treasury operations product lead"
  - horizon: "180-540 days"
    experiment: "Test one adjacent industrial-input segment after the auto-component playbook is stable."
    hypothesis: "The same control-plane workflow transfers to a second sector with limited product rewrite."
    successMetric: "Two adjacent-sector design partners reach pilot stage while implementation effort stays within 20% of the auto-component baseline."
    owner: "Partnerships or account executive"
operations:
  - "Maintain invoice-to-recommendation audit logs and a reconciliation queue for mismatched ERP, GST, bank, and portal data."
  - "Standardize onboarding around Tally or SAP exports, bank statements, and partner file feeds before attempting direct portal write-back."
  - "Document partner responsibilities so banks, TReDS venues, and SCF platforms own funding, complaints, and funds flow while the startup remains software-only."
  - "Run monthly value reviews that quantify missed-window reduction, captured discount savings, and approval-to-cash timing for every production account."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, pricing, and design-partner selection because budget ownership, trigger timing, and partner trust are still the main unknowns."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the data model, reconciliation engine, recommendation logic, and first Tally or SAP plus statement integrations required for paid pilots."
  - role: "Implementation and integration lead"
    startTiming: "Month 2-4"
    rationale: "Turn customer-specific mapping work into repeatable onboarding templates and keep deployments from consuming core engineering bandwidth."
  - role: "Treasury operations product lead"
    startTiming: "Month 4-6"
    rationale: "Translate controller and treasury workflows into benchmarks, alerts, and weekly operating routines that make the product sticky."
  - role: "Partnerships or account executive"
    startTiming: "Month 9-12"
    rationale: "Add dedicated channel and sales capacity only after the company has referenceable pilots, repeatable onboarding, and a clear ROI story."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 12-15 ICP interviews and secure at least 2 paid design-partner pilots."
      - "Ship MVP with Tally or SAP, statement, and partner-file ingestion plus a 13-week liquidity forecast and recommendation engine."
      - "Convert at least 2 pilots to annual production and sign 2 referral or data-access partnerships."
      - "Produce one referenceable case study showing savings or avoided overdraft cost above 3x software spend."
  - horizon: "12-24 months"
    items:
      - "Reach 10-20 paying suppliers across auto components and adjacent industrial inputs with median onboarding below 30 days."
      - "Launch approval-to-cash benchmarks, missed-window alerts, and second-program expansion playbooks."
      - "Generate at least 30% of ARR from expansions or usage fees rather than implementation alone."
  - horizon: "24-36 months"
    items:
      - "Reach 40-60 production customers in the India-first wedge, a meaningful step toward the modeled 120-customer SOM."
      - "Add dynamic-discount routing and one adjacent working-capital module without crossing into lending or funds movement."
      - "Prove that partner channels source a majority of new qualified opportunities and identify the next sector or regional expansion path."
risks:
  - risk: "Buyer portals and financiers do not provide stable approval and pricing data access."
    likelihood: High
    impact: High
    mitigation: "Launch with ERP, statement, and file-feed ingestion, secure one design-partner platform and one bank path early, and avoid a roadmap that depends on portal scraping."
  - risk: "Suppliers expect the bank or platform to provide orchestration support for free instead of funding standalone software."
    likelihood: Medium
    impact: High
    mitigation: "Price against avoided overdraft cost and captured discounts, sell around trigger events, and prove ROI in the buyer's own weekly cash narrative."
  - risk: "Invoice, GST, ERP, and portal data do not reconcile cleanly enough for trusted recommendations."
    likelihood: Medium
    impact: High
    mitigation: "Limit the first release to a narrow connector set, build reconciliation and exception handling before automation, and keep a human-reviewed recommendation step at launch."
  - risk: "Incumbents copy basic cockpit features or discourage integrations once the wedge becomes visible."
    likelihood: Medium
    impact: Medium
    mitigation: "Own the cross-rail supplier workflow, ship benchmarking and decision data that are hard to replicate, and partner across several funding sources rather than one anchor."
  - risk: "The product drifts into regulated lending or TReDS-operator behavior."
    likelihood: Low
    impact: High
    mitigation: "Keep the company software-only, do not move funds or intermediate credit decisions, and review partnership and complaint workflows against RBI digital-lending constraints."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund a 5-6 person product, implementation, and founder-led GTM team; build the read-heavy liquidity cockpit and core integrations; secure 2-4 paid design partners plus initial bank or platform access paths; and prove a repeatable pilot-to-annual motion without taking lending risk."
