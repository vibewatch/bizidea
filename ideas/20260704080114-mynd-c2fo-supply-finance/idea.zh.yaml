jobsToBeDone:
- job: 当我们同时给几家大买家供货、又要登录不同供应链金融门户时，帮财务控制负责人看清今天该融哪些已审批发票，这样原材料采购和工资就不用靠应急借款来顶。
  currentAlternative: 电子表格现金规划 + 多个门户登录 + 给银行客户经理打电话
  successMetric: 错过融资窗口、透支使用和每周现金意外的下降幅度
- job: 当买家拉长账期或新加一个融资项目时，帮 CFO 算清现金影响并选出摩擦最小的资金路径，这样企业能接住增长，不把营运资金拖垮。
  currentAlternative: 手工导出 ERP 数据，再临时决定做发票贴现还是走透支
  successMetric: 13 周现金预测准确度，以及新买方项目上手所需时间
