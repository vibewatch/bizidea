problem: 给多家大买家供货的印度中型供应商，越来越常能接触到买方主导的提前付款和发票融资项目，但每个项目都在单独的门户里，资格生效时间、价格和提款规则各不相同。财务团队还在用电子表格做现金预测，错过已审批发票窗口；一旦原材料或工资出现缺口，就只能靠高成本透支补洞，因为他们看不到所有可用流动性到底散在哪。随着数字化供应链金融通道继续整合，缺的已经不是新资金来源，而是站在供应商一侧的现金编排产品。
targetUser:
  primary: 服务多家上市企业买家的 ₹50-250 crore 印度汽车零部件供应商和工业投入品供应商中的 CFO 与财务控制负责人，账期通常在 45-75 天。
  secondary: 日常登录买方融资门户、核对已审批发票，并决定何时提早回款的应收账款和财资运营经理。
  buyer: 供应商一侧的 CFO 或财资负责人
startupThesis:
  nonObviousInsight: Mynd 收购 C2FO India 说明，买方侧通道的整合速度快过供应商侧工作流。一个网络一旦触达 140 家企业客户、近一半 Nifty50 公司和约 200,000 家供应商，新机会就不再是再做一家放款方，而是做一层中立软件，把多个已审批发票项目当成一套营运资金系统来用。
  beachhead: 服务 3-5 家上市 OEM 或制造业买家、账期 45-75 天、同时要兼顾至少两套买方主导供应链金融或发票贴现项目的 ₹50-250 crore 印度汽车零部件供应商和工业投入品供应商。
  wedge: 一个已审批发票流动性驾驶舱，把供应商 ERP 数据与买方融资门户打通，提前预测资格、比较提前回款成本，并在一个工作流里触发最优提款。
  whyNowCatalyst: Mynd 接手 C2FO India 后，140 家企业客户、约 200,000 家供应商和约 ₹60,000 crore 的年融资流量，都被压到规模化数字通道上，供应商侧编排层因此第一次既能接得上，也变得紧迫。
  ventureScalePath: 先拿下服务多家头部买家的印度供应商，再扩到更广的亚洲供应商网络，加入动态贴现路由、PO 与应收账款融资、保险和 FX 附加服务，最终做成供应商生态的营运资金操作系统。
solution: 供应商流动性驾驶舱接入 ERP 或会计系统里的发票数据、买方门户审批记录和资金方对账单，在不同项目之间建出一套统一的现金资格台账。它能告诉团队：今天哪些已审批发票可以融资、未来哪些应收何时会具备资格、每个选项成本多少，以及现在提款会让接下来 13 周的流动性变好还是更紧。财务团队不用来回查多个门户、再给客户经理打电话，在一个工作流里就能发起提款、选择延后，或把额度拆给不同买方。第一版刻意不碰资产负债表：做软件和编排，不做放款方。后续再加入自动催收计划、动态贴现路由、资金方路由，以及基于跨项目使用数据的供应商健康基准。
goToMarketSeed:
  firstCustomer: Pune 或 Chennai 的一家 ₹75-200 crore 印度汽车零部件供应商，服务 3-5 家大型 OEM 或上市工业企业买家，账期 60 天，财务团队同时在折腾 Mynd 或 C2FO 风格的项目外加至少一条银行主导的发票贴现额度。
  buyingTrigger: 一旦拿下新的大买家合同，或被迫接受更长账期，供应商就得再接一个融资门户；原材料和工资的周度现金缺口也会立刻暴露出来。
  currentAlternative: 围绕 Tally 或 SAP 导出的电子表格现金规划、多个买方门户、给客户经理打电话，以及透支或临时发票贴现。
  switchingReason: 一个驾驶舱把所有已审批发票流动性摊开，让融资成本可以横向比较，也把原本容易错过的提款窗口变成可预测的现金来源，而且不用供应商更换资金方或买家。
  pricingHypothesis: 按已连接的买方项目数和已融资发票量，每月收费 ₹50,000-₹200,000；另对经编排的提前付款量或已验证节省收取 5-15 个基点。
