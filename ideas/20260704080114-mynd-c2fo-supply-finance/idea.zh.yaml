topRisks:
- name: 门户接入风险
  description: 如果买方主导的供应链金融平台或银行拿不出稳定的审批和定价数据，产品很可能退化成一张更花哨的电子表格。
  mitigation: 先从 ERP 加对账单或文件导入做起，拿下一家共创客户平台和一家银行 API，先把 ROI 跑通，再逐步扩集成。
- name: 现有厂商渠道挤压
  description: 一旦这个品类被证明有吸引力，Mynd、C2FO 风格平台、银行或 ERP 厂商都可能把基础驾驶舱功能抄过去，或者直接卡掉集成。
  mitigation: 守住跨多买方的中立现金工作流，一开始就覆盖多家资金合作方，并把预测和基准能力做得比原始提款更黏。
- name: 供应商预算归属薄弱
  description: 供应商也许承认痛点，但仍觉得这本该由银行免费解决，独立 SaaS 的采用速度就会慢下来。
  mitigation: 把定价锚在融资量或利息节省上，优先打那些已经同时折腾多个项目的供应商，并围绕新合同或账期延长事件销售，直接讲清现金 ROI。
