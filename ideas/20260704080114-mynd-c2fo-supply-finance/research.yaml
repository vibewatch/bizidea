openQuestions:
- How many ₹50-250 crore suppliers already use two or more approved-invoice financing rails at the same time, versus only one program plus overdrafts?
- Which buyer-led platforms and banks will expose approval, pricing, and repayment data via API, file feed, or partner access without brittle scraping?
- Will suppliers fund the product from treasury software budgets, or will they insist that lenders/platforms bundle it into financing relationships?
- Is auto components the sharpest beachhead, or do other sectors with similar buyer concentration and worse payment behavior convert faster?
