competitors:
- name: Mynd Fintech / C2FO India
  stage: incumbent
  wedge: Buyer-led supply-chain-finance and early-payment network with local financing partners and anchor-enterprise distribution.
  pricing: Custom enterprise pricing / not publicly posted.
  strength: Already sits on large-buyer programs and, post-acquisition, combines 140 clients with broad supplier reach.
  weaknessVsUs: Optimizes buyer programs and financing flow, not the supplier’s neutral decision layer across several buyer and lender rails.
  sourceRefs:
  - 1
  - 13
  - 14
- name: M1xchange
  stage: incumbent
  wedge: RBI-regulated TReDS marketplace for digital invoice discounting and rate discovery.
  pricing: Transaction-led marketplace economics / no public SaaS pricing posted.
  strength: Large installed base of sellers, buyers, and financiers plus policy alignment with TReDS expansion.
  weaknessVsUs: Solves the financing transaction on its own venue, not cross-platform cash planning or supplier workflow across non-M1 rails.
  sourceRefs:
  - 2
  - 15
  - 24
- name: CredAble
  stage: scale-up
  wedge: Working-capital infrastructure and embedded-finance rails for banks, corporates, and SMEs.
  pricing: Custom platform pricing / not publicly posted.
  strength: Strong bank and corporate distribution, 250,000+ SMB borrowers, and product breadth across payables/receivables.
  weaknessVsUs: More lender- and corporate-oriented than supplier-CFO oriented, which leaves room for a daily orchestration layer.
  sourceRefs:
  - 18
  - 19
- name: SAP Taulia
  stage: incumbent
  wedge: Global working-capital suite for supply-chain finance and dynamic discounting with ERP adjacency.
  pricing: Custom enterprise pricing / not publicly posted.
  strength: Deep enterprise credibility, supplier-enrollment machinery, and broad working-capital feature coverage.
  weaknessVsUs: More buyer-enterprise centric and less India-rail specific than a local supplier-liquidity cockpit must be.
  sourceRefs:
  - 20
  - 21
- name: Veefin
  stage: scale-up
  wedge: Supply-chain-finance, transaction-banking, and digital-lending software for financial institutions and enterprises.
  pricing: Custom B2B software pricing / not publicly posted.
  strength: API-first infrastructure and broad lending-workflow coverage attractive to banks and large institutions.
  weaknessVsUs: Bank-platform orientation can leave the supplier-side multi-buyer operating workflow underserved.
  sourceRefs:
  - 22
