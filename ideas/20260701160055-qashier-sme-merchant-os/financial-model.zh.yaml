modelSanity:
- checkName: 收入引擎
  finding: 基准情形靠运营门店数从 100 增长到 600 家驱动，同时把混合收入维持在基于研究测算的每门店 $3.225K 附近。
- checkName: 必须跑通的环节
  finding: 试点转生产合同的转化必须维持在 45 到 90 天的部署窗口附近，这样一支 10 人规模的第二年团队才能在不沦为服务型公司的前提下做到 300 家门店。
- checkName: 模型崩溃的条件
  finding: 如果销售周期拉长到六个月左右，或附加费退回到纯订阅定价，下行情形会在第三年结束前把现金推到零以下。
- checkName: 下一轮的验证依据
  finding: 一旦公司在第 24 个月达到约 300 家运营门店、5 到 8 个生产环境集团、第二套技术栈的验证，以及至少一次融资模块的验证，下一轮融资就站得住脚。
sanityChecks:
  ruleOf40: 第三年增长率 127.5% + EBITDA 利润率 -30.0% = 97.5%（因为第二年基数仍然偏小而被拉高）。
  burnMultiple: 第二年燃烧倍数约为 1.1 倍，随着门店密度上升、固定合规支出被摊薄，第三年改善到约 0.5 倍。
  revenuePerFte: 第三年每 FTE（按第三年第四季度末计）收入 $122.3K（对标 SaaS 基准 $200 到 400K）。
  flags:
  - 第三年报告毛利率仍低于 70% 的目标，因为实施和合规成本还没有摊薄到足够多的运营门店上。
  - 每 FTE 收入仍低于成熟 SaaS 的基准水平，只有当公司持续复用同一套启动技术栈模板、而不是为每个连锁做定制项目时，这才是可以接受的。
  - 基准情形结束时现金只剩约 $185K，一个季度的试点转化延误就可能迫使公司增资或放慢招聘节奏。
  - 模型仍然依赖第三年集中在 20 到 25 个多门店集团身上，少数几个部署延迟或流失的连锁就会明显拖动 EBITDA。
