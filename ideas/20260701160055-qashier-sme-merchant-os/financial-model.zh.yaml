slug: franchise-cashflow-waterfall
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] 商业计划日期为 2026-07-01，因此财务模型从同一个首个运营月份开始。'
- id: A2
  name: pre-seed 关闭后的期初现金
  value: '1900'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 按所述 $2-3M 区间的下限，测算一笔 $2.0M 的 pre-seed 融资，扣除约 $100K 的 M1 之前法务、设立和合规费用。'
- id: A3
  name: 收入单位
  value: 受管理的每日现金瀑布流上的活跃运营门店
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue] 计划按每个运营中的门店而非泛泛的中小商户 logo 来变现。'
- id: A4
  name: 每个运营门店的基础订阅费
  value: '225'
  unit: USD/outlet-month
  source: '[business-plan.yaml gtm.pricing] 使用所述每门店每月 $150 到 $300 定价区间的中位数。'
- id: A5
  name: 每个运营门店的年度用量费附加
  value: '525'
  unit: USD/outlet-year
  source: '[research.yaml market.tam rationale] 采用研究模型中对约 $350K 年度结算门店流水收取 15 个基点的测算。'
- id: A6
  name: 每个运营门店的混合年收入
  value: '3225'
  unit: USD/outlet-year
  source: '[基于 A4 和 A5 推导；research.yaml market.bottomUpSizingDrivers] $2,700 订阅费加 $525 用量收入，与市场测算模型吻合。'
- id: A7
  name: 第一年月末运营门店数路径
  value: 'M1-M4: 0; M5: 25; M6: 50; M7: 50; M8: 75; M9: 75; M10-M12: 100'
  unit: outlets
  source: '[business-plan.yaml product.sixMonth；milestones 0-12 months；investorMemo.firstCustomer.initialContract] 从一个 20 到 30 家门店的试点，逐步爬升到第 12 个月约 100 家运营门店。'
- id: A8
  name: 第二年季末运营门店数路径
  value: Q1Y2 150; Q2Y2 200; Q3Y2 250; Q4Y2 300
  unit: outlets
  source: '[business-plan.yaml milestones 12-24 months] 与第 24 个月约 300 家运营门店的既定目标一致。'
- id: A9
  name: 第三年季末运营门店数路径
  value: Q1Y3 380; Q2Y3 460; Q3Y3 530; Q4Y3 600
  unit: outlets
  source: '[business-plan.yaml milestones 24-36 months；market.som；research.yaml market.som] 与研究测算的第三年 600 家门店 SOM 情形一致。'
- id: A10
  name: 收入确认时点
  value: 按每个月或每个季度中点的运营门店数确认
  unit: policy
  source: '[创业财务经验法则] 假设新门店上线分布在整个周期内，而不是全部集中在第一天。'
- id: A11
  name: 长期目标毛利率
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 商业计划明确以 70% 的软件毛利率为目标。'
- id: A12
  name: 直接服务成本政策
  value: 收入的 19% 加固定交付/合规成本；试点上线后每月从 $5K 起，第二到第三年升至 $6K
  unit: policy
  source: '[锚定 business-plan.yaml operations 和 research.yaml regulatoryTechnicalConstraints 的创业财务经验法则] 涵盖伙伴支持、审计日志基础设施、对账运营和打款控制合规开销；按收入的 19% 加固定交付/合规成本计算，试点上线后从每月 $5K 起步，第二到第三年升至 $6K。'
- id: A13
  name: 实施类薪酬分摊
  value: 50% COGS / 20% S&M / 30% G&A
  unit: allocation
  source: '[business-plan.yaml team Implementation and finance ops lead；operations] 交付团队既运营实时工作流，也支持续约和财务报表工作，按 50% COGS / 20% 销售与市场 / 30% 管理费用分摊。'
- id: A14
  name: 每月门店流失率
  value: '1.5'
  unit: percent
  source: '[创业财务经验法则] 一套带审批和审计留痕的财务主管工作流，上线后应该有较强的粘性，但伙伴依赖和早期产品风险仍然让非零流失率合理，取 1.5%。'
- id: A15
  name: 创始人 CEO 满载薪酬
  value: '110'
  unit: USDK/year
  source: '[business-plan.yaml team Founding CEO / merchant fintech GTM] 采用低于市场行情的新加坡金融科技创始人薪资，含薪资相关负担。'
- id: A16
  name: 工程满载薪酬
  value: '125'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Founding eng；Integrations engineer] 新马两地资深产品与集成工程师的创业财务经验法则。'
- id: A17
  name: 实施与财务运营满载薪酬
  value: '80'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Implementation and finance ops lead] 部署和运营密集型商户金融科技人才的创业财务经验法则。'
- id: A18
  name: 合作伙伴关系与风险满载薪酬
  value: '100'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Partnerships and risk lead] 新加坡地区伙伴管理和合规边界负责人的经验法则。'
- id: A19
  name: 销售满载薪酬
  value: '110'
  unit: USDK/year/FTE
  source: '[business-plan.yaml strategicChoices.sequencingRationale] 第一批背负配额的 GTM 招聘只在试点证明 ROI 之后才到岗，按精简型企业级 AE 目标年薪计算。'
- id: A20
  name: 行政与运营满载薪酬
  value: '70'
  unit: USDK/year/FTE
  source: '[锚定 business-plan.yaml operations 的创业财务经验法则] 只有当运营账户覆盖新马两地工作流之后，才会加入精简的合规与财务支持人手。'
- id: A21
  name: 招聘节奏
  value: M1 CEO 和创始工程师；M2 实施负责人；M4 集成工程师；M8 合作伙伴关系与风险负责人；M11 第二位实施人员；M15 第三位工程师；M16 第一位销售；M18 运营/合规；M20 第三位实施人员；M26 第二位销售；M28 第四位工程师
  unit: timing
  source: '[business-plan.yaml team；strategicChoices.sequencingRationale；milestones] 遵循明确的第一年团队计划，之后的招聘继续按里程碑门槛推进，而不是提前堆人。第 1 个月 CEO 和创始工程师，第 2 个月实施负责人，第 4 个月集成工程师，第 8 个月合作伙伴关系与风险负责人，第 11 个月第二位实施人员，第 15 个月第三位工程师，第 16 个月第一位销售，第 18 个月运营/合规，第 20 个月第三位实施人员，第 26 个月第二位销售，第 28 个月第四位工程师。'
- id: A22
  name: 职能薪酬分摊
  value: CEO 75% 销售与市场 / 25% G&A；工程 100% 研发；实施 50% COGS / 20% 销售与市场 / 30% G&A；合作伙伴关系 60% 销售与市场 / 40% G&A；销售 100% 销售与市场；运营 100% G&A
  unit: allocation
  source: '[business-plan.yaml team rationales；operations] 把每个角色映射到其在交付、GTM 或行政管理中直接承担的工作：CEO 75% 销售与市场 / 25% 管理费用；工程 100% 研发；实施 50% COGS / 20% 销售与市场 / 30% 管理费用；合作伙伴关系 60% 销售与市场 / 40% 管理费用；销售 100% 销售与市场；运营 100% 管理费用。'
- id: A23
  name: 非薪酬运营支出政策
  value: Y1 销售与市场 $6K/mo + 5% 收入，研发 $4.5K/mo，G&A $6K/mo；Y2 销售与市场 $7K/mo + 5% 收入，研发 $5.5K/mo，G&A $7K/mo；Y3 销售与市场 $9K/mo + 5.5% 收入，研发 $6K/mo，G&A $8K/mo
  unit: USDK/month
  source: '[锚定 business-plan.yaml operations、risks 和 fundingAsk.useOfFundsSummary 的创业财务经验法则] 涵盖差旅、云服务、沙箱工具、法务和税务/合规开销。第一年销售与市场每月 $6K 加收入的 5%，研发每月 $4.5K，管理费用每月 $6K；第二年销售与市场每月 $7K 加收入的 5%，研发每月 $5.5K，管理费用每月 $7K；第三年销售与市场每月 $9K 加收入的 5.5%，研发每月 $6K，管理费用每月 $8K。'
- id: A24
  name: 现金转化政策
  value: 扣除 A2 所述 M1 之前设立支出后，EBITDA 近似代表经营性现金变动
  unit: policy
  source: '[创业财务经验法则] 在 A2 所述的 M1 之前设立支出之后，EBITDA 近似等同于经营性现金变动；本阶段模型不考虑债务、资本支出、税项和重大营运资金波动。'
- id: A25
  name: 融资现金跑道目标
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths] 计划要求 18 个月的执行期，本阶段再加上所需的六个月缓冲。'
- id: A26
  name: 下一轮里程碑
  value: 到第 24 个月达到约 300 家运营门店、5 到 8 个生产环境集团、第二套商户技术栈或打款伙伴，以及一个融资模块验证
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months；fundingAsk.useOfFundsSummary] 这是本轮 pre-seed 资金要打出的验证包：第 24 个月达到约 300 家运营门店、5 到 8 个生产环境集团、第二套商户技术栈或打款伙伴，以及一个融资模块的验证。'
- id: A27
  name: 每个成熟连锁的平均运营门店数
  value: '30'
  unit: outlets/chain
  source: '[business-plan.yaml beachhead 20-50 outlets；research.yaml market.som] 第三年 600 家门店、约 20 到 25 个集团的规模，意味着每个集团约 24 到 30 家门店，模型在换算 CAC 时取 30。'
- id: A28
  name: 每个落地连锁的混合 CAC
  value: '33'
  unit: USDK/chain
  source: '[business-plan.yaml gtm.channels；market.buyingProcess] 创始人主导的企业级销售辅以部分伙伴转介，仍然需要一次实质性的诊断和上线动作。'
- id: A29
  name: 每个运营门店的混合 CAC
  value: '1.1'
  unit: USDK/outlet
  source: '[基于 A27 和 A28 推导] 每个连锁 $33K 除以 30 家运营门店，得出每门店约 $1.1K 的 CAC。'
- id: A30
  name: 第二年账户规模结构
  value: 早期生产环境集团平均约 37 到 40 家门店，到第三年结构才逐步扩宽到 30 家
  unit: outlets/chain
  source: '[business-plan.yaml milestones 12-24 months 和 beachhead 定义] 让第二年 300 家门店的里程碑与所述 5 到 8 个生产环境集团的目标相互印证，早期生产环境集团平均约 37 到 40 家门店，之后到第三年结构才拓宽向 30 家。'
