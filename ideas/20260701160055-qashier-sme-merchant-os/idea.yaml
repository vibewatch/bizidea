topRisks:
  - name: "Platform dependency"
    description: "If merchant OS or payment-provider integrations are shallow, the product may not automate enough of the cash workflow to become mission-critical."
    mitigation: "Start with one deeply integrated launch stack, prove value with read-write settlement automation there, and add read-only fallbacks for adjacent systems."
  - name: "Credit-loss blowup"
    description: "If the company takes direct balance-sheet risk too early, a few bad merchants could erase software margins."
    mitigation: "Keep early financing partner-led, restrict use cases to short-duration supplier or working-capital advances, and repay from daily settlement flows."
  - name: "SME change management"
    description: "Franchise operators may tolerate manual finance processes longer than expected, slowing adoption even when pain is real."
    mitigation: "Sell into expansion or finance-centralization moments and anchor ROI on faster close, fewer cash gaps, and measurable supplier-payment reliability."
