problem: >-
  Multi-outlet merchants in Southeast Asia can now run sales, CRM, and payments through unified stacks, but the cash that arrives after each day of trading is still allocated manually. Finance teams juggle supplier bills, franchise fees, and short-term shortfalls outlet by outlet, so they discover problems at month-end instead of at settlement time. As chains expand across markets, generic merchant suites remain systems of record rather than systems of cash control.
targetUser:
  primary: >-
    Finance controllers or COOs at 15-80 outlet quick-service restaurant and beverage franchise groups in Singapore and Malaysia that run one merchant stack across every store.
  secondary: >-
    Regional operations managers who own outlet profitability, procurement continuity, and daily cash discipline across the store network.
  buyer: "CFO or COO of the merchant group"
startupThesis:
  nonObviousInsight: >-
    The next moat in merchant software is not another POS or CRM module. Once payments, CRM, and business workflows sit in one merchant OS, daily settlement becomes programmable collateral and workflow state, enabling a specialist layer to automate supplier pay, HQ remittance, and short-duration credit in ways banks and generic software cannot.
  beachhead: >-
    Quick-service restaurant and bubble-tea franchise groups with 15-80 outlets across Singapore and Malaysia, one unified POS and payment stack, and centralized finance teams that still route supplier and HQ cash manually.
  wedge: >-
    A settlement-waterfall control layer that turns each day's store sales into automated cash splits for supplier payables, royalty remittance, reserve accounts, and optional short-duration credit repayment, with exceptions flagged before month-end.
  whyNowCatalyst: >-
    Qashier's proof that 20,000 merchants will run payments, CRM, and finance in one stack, plus evidence that the same data already underwrites US$10M-plus of SME lending, means the raw data and distribution for programmable merchant cashflow now exist.
  ventureScalePath: >-
    Start with franchise merchants on one merchant OS, then expand into regional retail and service chains, embed with lenders and payment processors, and become the treasury and financing control plane for Southeast Asian SMB commerce.
solution: >-
  Franchise Cashflow Waterfall plugs into the merchant OS, settlement feed, and accounting stack to create a daily outlet-level cash ledger. The product applies configurable rules to split receipts into supplier payments, HQ fees, payroll or rent reserves, and optional financing repayment before cash disappears into manual transfers. When forecast sales and bill schedules imply a shortfall, it can trigger a pre-approved supplier or working-capital draw based on verified transaction history instead of a fresh application cycle. The initial product starts as a reconciliation and cash-routing layer for chains on one merchant stack, then expands into treasury analytics, supplier financing, and multi-country merchant controls.
goToMarketSeed:
  firstCustomer: >-
    A Singapore-based beverage or quick-service franchise operator with 20-50 outlets across Singapore and Malaysia, centralized finance, daily ingredient purchasing, and one merchant OS deployed in every store.
  buyingTrigger: >-
    Opening new outlets or centralizing finance makes daily payout reconciliation, supplier payment timing, and franchise-fee remittance too manual to manage in spreadsheets.
  currentAlternative: >-
    Spreadsheet-based cash planning across bank portals, accounting exports, and ad hoc store-by-store short-term financing.
  switchingReason: >-
    The wedge uses existing merchant-OS transaction data to automate money movement and expose shortfalls daily instead of after monthly close, while creating a cleaner basis for supplier or lender financing.
  pricingHypothesis: >-
    Charge a per-outlet SaaS fee of roughly US$150 to US$300 per month plus 10 to 30 basis points on financed or automatically orchestrated cash volume.
