jobsToBeDone:
  - job: >-
      When daily settlements from dozens of stores hit different accounts, help a franchise finance controller auto-allocate cash to suppliers, HQ fees, and reserves, so they can keep stores stocked without guessing.
    currentAlternative: "Manual spreadsheet cash planning across bank portals and accounting exports"
    successMetric: "Days to close the books, on-time supplier payments, and fewer outlet cash shortfalls"
  - job: >-
      When a fast-growing chain opens new outlets and cash gaps widen between card receipts and supplier bills, help the COO unlock short-duration working capital against verified sales, so they can expand without emergency borrowing.
    currentAlternative: "Bank overdrafts, founder cash injections, or supplier-term negotiations handled store by store"
    successMetric: "Time to approve liquidity support and percentage of outlets avoiding stockout-causing cash gaps"
