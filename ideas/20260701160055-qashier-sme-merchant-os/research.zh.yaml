    - 5
    - 21
    - 23
  - friction: 财务团队本来就已经在应付杂乱的多工具工作流
    severity: 高
    affectedBuyer: 财务主管
    mitigation: 卖点围绕加快结账、提升供应商付款可靠性、减少异常，而不是空谈抽象的“自动化”。
    sourceRefs:
    - 17
    - 18
    - 19
    - 16
