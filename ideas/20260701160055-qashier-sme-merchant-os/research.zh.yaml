  adoptionFrictionMatrix:
  - friction: 自动打款周围的权限与伙伴信任问题
    severity: 高
    affectedBuyer: CFO / COO
    mitigation: 先靠伙伴主导执行结算，把第一套技术栈范围收得很窄，再逐步扩展到更广的编排能力。
