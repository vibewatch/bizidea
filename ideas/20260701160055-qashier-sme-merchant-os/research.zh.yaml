competitors:
- name: Qashier
  stage: 成长期
  wedge: 统一的商户操作系统，把 POS、支付、CRM 和基于营收的放贷整合到一起，面向东南亚中小商户。
  pricing: 亲民的 POS 套餐，从每天 S$2 到 S$4；QashierLoans 最高可放款 S$200,000，按日销售额自动还款。
  strength: 自有端到端支付技术栈，在新加坡持有 MPI 牌照，并已经通过放贷把商户数据变现。
  weaknessVsUs: 优化的是 Qashier 自己的技术栈，而不是作为跨系统、跨交易对手的中立加盟总部结算控制方。
  sourceRefs:
  - 1
  - 3
  - 4
  - 5
- name: StoreHub
  stage: 成长期
  wedge: 马来西亚起家的一体化 POS 和运营技术栈，面向餐饮、零售和服务型商户，支持多门店管理。
  pricing: 入门版 RM122/月，进阶版 RM235/月，专业版 RM471/月，企业版定制报价。
  strength: 本地分销能力强，明确面向加盟商定位，具备电子发票就绪能力和次日结算报表。
  weaknessVsUs: 目前的多门店能力大多停留在运营报表和看板层面，并不是可编程的特许权使用费、储备金或放贷方瀑布流。
  sourceRefs:
  - 6
  - 7
  - 8
- name: Stripe Connect
  stage: 在位企业
  wedge: 面向平台的可编程多方收款、转账和打款时机控制。
  pricing: 按使用量计价的基础设施定价，而非商户 SaaS 报价表。
  strength: 在新加坡和马来西亚都已验证支持独立收款与转账，且打款计划可配置。
  weaknessVsUs: 管道能力强大，但没有加盟专属的财务主管工作流、供应商日历逻辑，也没有商户操作系统原生的体验。
  sourceRefs:
  - 21
  - 22
- name: Adyen for Platforms
  stage: 在位企业
  wedge: 企业级余额平台，具备自动分账规则、结算批处理和对账工具。
  pricing: 企业级/定制报价。
  strength: 业内最强的基于规则的分账配置能力，以及贴合门店结账和净结算逻辑的按销售日结算。
  weaknessVsUs: 偏企业级和基础设施主导，没有为新加坡/马来西亚的加盟财务主管做成自助式产品。
  sourceRefs:
  - 23
  - 24
- name: Airwallex
  stage: 成长期
  wedge: 面向财务团队的跨境财资、收款和应付账款自动化。
  pricing: 定制化的财资与支付报价，而非按门店计费的运营软件。
  strength: 与 CFO 需求契合度高，具备多主体应付账款自动化能力和本地新加坡支付轨道。
  weaknessVsUs: 在资金到达总部之后才介入，而不是在门店级收款本该被拆分给供应商、特许权使用费和储备金的那个节点介入。
  sourceRefs:
  - 29
regulatoryTechnicalConstraints:
- point: 只要在设计上避免让自己变成主要资金流转方，风险就比直接持有或归集商户资金低得多。
