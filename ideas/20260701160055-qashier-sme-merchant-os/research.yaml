      sourceRefs:
        - 8
        - 19
  adoptionFrictionMatrix:
    - friction: Permissioning and partner trust around automated payouts
      severity: high
      affectedBuyer: CFO / COO
      mitigation: >-
        Launch with partner-led settlement execution and a tightly scoped first stack before
        expanding into broader orchestration.
      sourceRefs:
        - 5
        - 21
        - 23
    - friction: Finance teams already cope with messy multi-tool workflows
      severity: high
      affectedBuyer: Finance controller
      mitigation: >-
        Sell around close acceleration, supplier-payment reliability, and fewer exceptions rather
        than abstract “automation”.
      sourceRefs:
        - 17
        - 18
        - 19
        - 16
    - friction: GST and e-invoicing compliance can make every payout workflow feel risky
      severity: high
      affectedBuyer: CFO / head of finance operations
      mitigation: >-
        Ship invoice-ready event logs and standard mappings into IRAS / MyInvois processes from day
        one.
      sourceRefs:
        - 25
        - 26
        - 27
    - friction: Cross-border and multi-outlet data quality differs by platform and country
      severity: medium
      affectedBuyer: Regional operations lead
      mitigation: >-
        Narrow the beachhead to one stack, one outlet archetype, and one lender/acquirer
        configuration before widening coverage.
      sourceRefs:
