competitors:
  - name: Qashier
    stage: scale-up
    wedge: >-
      Unified merchant OS combining POS, payments, CRM, and revenue-based lending for Southeast
      Asian SMEs.
    pricing: >-
      Accessible POS plans from S$2/day to S$4/day; QashierLoans up to S$200,000 with daily
      sales-based repayment.
    strength: >-
      Owns an end-to-end payments stack, has MPI licensing in Singapore, and already monetizes
      merchant data through lending.
    weaknessVsUs: >-
      Optimizes the Qashier stack itself rather than acting as a neutral franchise-HQ settlement
      controller across systems and counterparties.
    sourceRefs:
      - 1
      - 3
      - 4
      - 5
  - name: StoreHub
    stage: scale-up
    wedge: >-
      Malaysia-first all-in-one POS and operations stack for F&B, retail, and service businesses
      with multi-location management.
    pricing: RM122/month Starter, RM235/month Advanced, RM471/month Pro, custom Enterprise.
    strength: >-
      Strong local distribution, explicit franchise positioning, e-invoice readiness, and next-day
      settlement reporting.
    weaknessVsUs: >-
      Multi-location today mostly means operational reporting and dashboarding, not programmable
      royalty, reserve, or lender waterfalls.
    sourceRefs:
      - 6
      - 7
      - 8
  - name: Stripe Connect
    stage: incumbent
    wedge: Programmable multi-party charges, transfers, and payout timing for platforms.
    pricing: Usage-based infrastructure pricing rather than merchant SaaS list pricing.
    strength: >-
      Verified support for separate charges and transfers plus configurable payout schedules in
      Singapore and Malaysia.
    weaknessVsUs: >-
      Powerful plumbing, but no franchise-specific controller workflow, supplier calendar logic, or
      merchant-OS-native UX.
    sourceRefs:
      - 21
      - 22
  - name: Adyen for Platforms
    stage: incumbent
    wedge: >-
      Enterprise balance platform with automatic split rules, settlement batching, and
      reconciliation tooling.
    pricing: Enterprise / custom.
    strength: >-
      Best-in-class rules-based split configuration and sales-day settlement aligned to store close
      and net settlement logic.
    weaknessVsUs: >-
      Enterprise-heavy and infrastructure-led; not packaged for self-serve SG/MY franchise
      controllers.
    sourceRefs:
      - 23
      - 24
  - name: Airwallex
    stage: scale-up
    wedge: Cross-border treasury, collections, and AP automation for finance teams.
    pricing: Custom treasury and payments economics rather than per-outlet operating software.
    strength: Strong CFO fit, multi-entity AP automation, and local Singapore payment rails.
    weaknessVsUs: >-
      Acts after funds reach HQ, not at the point where outlet-level receipts should be split across
      suppliers, royalties, and reserves.
    sourceRefs:
      - 29
