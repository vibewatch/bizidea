        - 8
        - 22
        - 13
    - friction: Embedded financing can distract from the software ROI if introduced too early
      severity: medium
      affectedBuyer: Founder / CFO
      mitigation: >-
        Keep capital partner-led at first and use the software to prove repayment and
        cash-allocation quality.
      sourceRefs:
        - 4
        - 20
        - 30
