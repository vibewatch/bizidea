    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is high at the edges because merchant OS vendors, payout platforms, and treasury
        tools all touch the same wallet, even if few sell the exact franchise-waterfall workflow
        today.
      sourceRefs:
        - 1
        - 6
        - 21
        - 23
        - 29
  pestle:
    - factor: political
      impact: positive
      point: >-
        Both markets continue to push digital rails and formalization, which expands the share of
        merchant cash that is software-addressable.
      sourceRefs:
        - 13
        - 14
        - 28
    - factor: economic
      impact: positive
      point: >-
        Late payments, thin reserves, and supplier strain make daily cash control economically
        salient rather than optional.
      sourceRefs:
        - 15
        - 16
        - 17
    - factor: social
      impact: positive
      point: >-
        Franchise and QSR chains are expanding across Southeast Asia while consumers keep shifting
        to digital ordering and payments.
      sourceRefs:
        - 9
        - 12
        - 34
    - factor: technological
      impact: positive
      point: >-
        Programmable split payouts, sales-day settlement, and multi-entity AP tooling already exist,
        lowering the technical barrier to a focused orchestration layer.
      sourceRefs:
        - 21
        - 22
        - 23
        - 24
        - 29
    - factor: legal
