topRisks:
- name: 平台依赖风险
  description: 如果商户操作系统或支付服务商的集成做得不够深，产品可能没法自动化足够多的现金工作流，无法成为客户离不开的核心系统。
  mitigation: 先从一套深度集成的启动技术栈开始，用可读写的结算自动化在那里证明价值，再为相邻系统补充只读兜底方案。
- name: 信贷坏账风险
  description: 如果公司过早自己承担资产负债表上的直接信用风险，几个坏账商户就可能吃掉软件业务的利润。
  mitigation: 早期融资保持由伙伴主导，把使用场景限制在短期供应商或营运资金预支，并从每日结算流水中还款。
- name: 中小企业变革管理风险
  description: 加盟商可能比预期更长时间容忍手工财务流程，即便痛点是真实的，采用速度也会因此放缓。
  mitigation: 在门店扩张或财务集中化的节点上销售，把 ROI 锚定在更快的结账速度、更少的现金缺口和可衡量的供应商付款可靠性上。
