jobsToBeDone:
- job: 当几十家门店的每日结算款打到不同账户时，帮加盟连锁的财务主管自动把现金分配给供应商、总部费用和储备金，让他们不用靠猜就能保证门店有货。
  currentAlternative: 在银行网银和记账导出之间靠 Excel 做手工现金规划
  successMetric: 结账所需天数、供应商按时付款率，以及门店现金缺口的减少幅度
- job: 当一家高速扩张的连锁开新店、刷卡收款和供应商账单之间的现金缺口越拉越大时，帮 COO 基于已验证的销售数据解锁短期营运资金，让他们不用靠紧急借款也能扩张。
  currentAlternative: 银行透支、创始人自掏腰包，或者一家一家门店去谈供应商账期
  successMetric: 审批流动性支持所需时间，以及避免因现金缺口导致缺货的门店占比
