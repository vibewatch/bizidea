problem: 东南亚的多门店商户现在已经能用统一技术栈跑通销售、CRM 和支付，但每天交易结束后到账的现金，仍然是手工分配的。财务团队要一家门店一家门店地处理供应商账单、加盟费和短期缺口，结果问题总是到月末才被发现，而不是在结算的那一刻。连锁品牌跨市场扩张时，通用商户套件仍然只是记录系统，而不是现金控制系统。
targetUser:
  primary: 新加坡和马来西亚拥有 15 到 80 家门店、在每家门店都跑同一套商户技术栈的快餐（QSR）和饮品加盟集团的财务主管或 COO。
  secondary: 负责门店盈利、采购连续性和跨门店每日现金纪律的区域运营经理。
  buyer: 商户集团的 CFO 或 COO
startupThesis:
  nonObviousInsight: 商户软件的下一个护城河，不会是又一个 POS 或 CRM 模块。一旦支付、CRM 和业务流程都汇聚到同一个商户操作系统里，每日结算就变成了可编程的抵押物和工作流状态，这就给了一个专业层机会去自动化供应商付款、总部汇款和短期信贷——而这是银行和通用软件都做不到的。
  beachhead: 新加坡和马来西亚拥有 15 到 80 家门店的快餐和奶茶加盟集团，用同一套 POS 加支付技术栈，财务集中管理，但供应商和总部的资金流转仍然靠手工处理。
  wedge: 一个结算瀑布流控制层，把每天的门店销售额自动拆分成供应商应付款、特许权使用费汇款、储备金账户，以及可选的短期信贷还款，异常情况在月末结账之前就会被标记出来。
  whyNowCatalyst: Qashier 证明了 2 万家商户愿意把支付、CRM 和财务都跑在同一套技术栈上，而且同样的数据已经在为超过 US$10M 的中小企业贷款做授信——这说明可编程商户现金流所需的原始数据和分销渠道现在都已经具备。
  ventureScalePath: 先从跑在同一套商户操作系统上的加盟商户切入，再扩展到区域零售和服务连锁，与放贷方和支付处理商深度绑定，最终成为东南亚中小商户的财资与融资控制层。
solution: Franchise Cashflow Waterfall 接入商户操作系统、结算数据流和记账系统，生成一份门店级的每日现金台账。产品会用可配置规则，把收款拆分给供应商付款、总部费用、工资或租金储备金，以及可选的融资还款——在现金消失进手工转账之前完成分配。当预测销售额和账单排期显示会出现缺口时，系统可以基于已验证的交易历史，触发一笔预先批准的供应商或营运资金支用，而不用走一遍全新的申请流程。产品最初是面向单一商户技术栈连锁品牌的对账和现金路由层，之后再扩展到财资分析、供应商融资和多国商户控制。
goToMarketSeed:
  firstCustomer: 一家总部在新加坡、在新马两地拥有 20 到 50 家门店的饮品或快餐加盟商，财务集中管理，每天都要采购食材，且每家门店都部署了同一套商户操作系统。
  buyingTrigger: 新开门店或财务集中化，让每日打款对账、供应商付款时机和加盟费汇款靠 Excel 已经管不过来了。
  currentAlternative: 在银行网银、记账导出和各门店零散的短期融资之间，靠 Excel 做现金规划。
  switchingReason: 这个切口用商户操作系统已有的交易数据自动完成资金调度，每天而不是月末结账后就能看到缺口，同时也为供应商或放贷方融资打下更干净的数据基础。
  pricingHypothesis: 按门店收取约 US$150 到 US$300 的月度 SaaS 费用，再对经过融资或自动编排的现金流水收取 10 到 30 个基点。
