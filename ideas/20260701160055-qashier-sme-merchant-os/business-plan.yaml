slug: franchise-cashflow-waterfall
date: '2026-07-01'
executiveSummary: >-
  Franchise Cashflow Waterfall targets Singapore-headquartered beverage and
  quick-service franchise groups with 15-80 outlets across Singapore and
  Malaysia that already run a unified merchant stack but still allocate cash
  manually after each day of trade. The acute pain is control rather than
  reporting: finance teams still use spreadsheets, bank portals, and ad hoc
  transfers to decide which supplier, royalty, reserve, and short-term
  obligations get paid first, so cash problems surface after stockouts,
  supplier escalation, or month-end close. The product plugs into one merchant
  OS, one payout partner, and the accounting stack to create an outlet-level
  daily cash ledger plus approval-based waterfall rules for supplier payables,
  HQ remittance, reserve accounts, and optional partner-led financing
  repayment. This wedge is credible now because Qashier and StoreHub already
  show dense multi-outlet distribution, programmable payout rails exist in both
  launch markets, and transaction-data-based SME lending is already live. The
  first commercial system should be a paid pilot sold to a CFO or COO during
  outlet expansion, finance centralization, or e-invoicing rollout, with
  pricing anchored to per-outlet SaaS plus optional basis-point fees on
  orchestrated or financed volume. The strategic choice is to start as a
  software-led control plane, not a principal lender or POS replacement,
  because speed to proof and regulatory simplicity matter more than capturing
  balance-sheet economics in year one. The biggest unresolved questions are how
  many target chains can expose write-accessible payout controls through their
  existing stack and whether daily waterfall automation is urgent enough versus
  weekly batch control for the first buyers. If the company can prove faster
  close, 95%+ on-time priority payments, and paid renewals on one launch stack,
  it can expand into adjacent retail and service chains and later become a
  broader treasury and financing orchestration layer for Southeast Asian SMB
  commerce.
problem:
  - Multi-outlet franchise groups still decide daily supplier pay, royalty remittance, and cash reserves in spreadsheets after settlement lands, so outlet shortfalls surface after stockouts or month-end close.
  - Existing merchant OS, payout infrastructure, and accounting tools each own part of the data, but none acts as the controller's cash policy layer across outlets, counterparties, and obligations.
  - Generic SME lending can fill occasional liquidity gaps, but it does not solve the daily sequencing problem that determines which obligations get paid and when.
solution:
  - Create an outlet-level daily cash ledger from merchant OS sales and settlement data, then apply configurable waterfall rules for supplier payables, HQ fees, rent or payroll reserves, and lender repayment.
  - Start with approval-based execution, exception queues, and audit logs on one merchant stack so finance teams can control money movement without replacing POS, payouts, or banking systems.
  - Escalate predicted shortfalls to partner lenders or suppliers only when the rule engine and verified sales data show a gap, keeping financing attached to operational context rather than standalone applications.
whyWeWin:
  - The company sits between merchant OS record systems and payout rails, packaging existing primitives into a finance-controller workflow that Qashier, Stripe, Adyen, and Airwallex do not currently sell as a complete product.
  - Reusable beverage and QSR waterfall templates plus outlet-level exception data create process switching costs and a better underwriting signal than generic AP or cash-advance tools.
  - A software-led launch with licensed partners keeps regulatory scope narrow while still letting the product become the default control surface for supplier, royalty, reserve, and financing decisions.
strategicChoices:
  beachhead: >-
    Singapore-headquartered beverage and quick-service franchise groups with 20
    to 50 outlets across Singapore and Malaysia, centralized finance, one
    merchant stack, and recurring supplier plus royalty obligations.
  wedgeRationale: >-
    Beverage and QSR chains produce frequent transactions, daily ingredient
    purchasing, and recurring HQ remittances, so one workflow can prove time
    savings and cash-discipline ROI faster than a broader SME treasury product.
    Starting here also creates repeatable rule templates before the company
    tackles more heterogeneous retail or services merchants.
  sequencingRationale: >-
    Start with one merchant stack, one payout partner, human approval, and no
    balance-sheet risk. Product must first prove finance-team time savings and
    payment reliability; GTM should stay founder-led around expansion and
    compliance triggers; early hires should be integrations and implementation,
    not a broad sales team; and payout or lender partnerships should deepen
    only after the first stack shows repeatable ROI.
  notYet:
    - Direct lending or holding merchant funds on the company's own balance sheet.
    - Single-store SMEs and the heterogeneous long tail of merchants.
    - Full treasury or ERP replacement beyond the cash-allocation workflow.
    - Non-franchise vertical expansion before the beverage and QSR template is repeatable.
market:
  tam: US$58.4M estimated annual SG/MY spend across about 18,100 relevant multi-outlet merchant locations at the modeled US$3,225 revenue per outlet.
  sam: US$13.5M estimated beachhead spend across about 4,200 beverage and QSR outlets in 15-80 outlet groups with centralized finance and one merchant stack.
  som: US$1.9M reachable year-3 revenue at about 600 live outlets across roughly 20-25 groups on the modeled pricing.
  segments:
    - Singapore-headquartered beverage and QSR franchise groups with 15-80 outlets across Singapore and Malaysia, centralized finance, and one merchant stack.
    - Adjacent specialty retail and service chains with centralized settlement workflows once the franchise template is repeatable.
  buyingProcess: >-
    The sale usually starts when outlet expansion, finance centralization, or
    invoice-compliance work makes spreadsheet routing break. The finance
    controller maps the workflow, but the CFO or COO, merchant-stack
    implementer, payout partner, and accounting owner must approve connector
    access, control rules, and audit logging before the first pilot goes live.
product:
  mvp: >-
    The MVP is a launch-stack waterfall engine that connects one merchant OS,
    one payout rail, and one accounting export to produce an outlet-level cash
    ledger, configurable allocation rules, an approval queue, and audit logs
    for supplier pay, HQ fees, and reserve funding. It should not hold funds or
    underwrite credit directly in v1; financing stays partner-led and is
    triggered only after shortfall detection.
  sixMonth: >-
    Sign 3 design partners, ship one launch stack with approval-based payout
    orchestration, and run live daily waterfall workflows across the first 50
    to 100 outlets.
  twelveMonth: >-
    Convert the first 2 to 3 pilots into production contracts, add SG and MY
    tax-ready event logs for InvoiceNow and MyInvois workflows, and launch one
    lender-triggered shortfall workflow on the same accounts.
  twentyFourMonth: >-
    Support a second merchant stack and second payout partner, expand into
    adjacent specialty retail or service chains, and add multi-entity cash
    forecasting plus partner-led supplier-finance workflows.
  keyBets:
    - Enough target chains already run one merchant stack and can expose the settlement data needed for repeatable deployment.
    - Approval-based waterfall control reduces finance workload and payment failures enough to justify US$150-$300 per outlet per month.
    - The company can stay software-led with licensed payout and lending partners instead of taking principal regulatory risk early.
    - Exception and repayment data improve partner-lender or supplier confidence enough to unlock expansion economics beyond core SaaS.
gtm:
  wedge: >-
    Win the first account through a paid finance-diagnostic pilot sold to a CFO
    or COO at a 20 to 50 outlet beverage or QSR group during outlet expansion,
    finance centralization, or e-invoicing rollout. Connect one merchant OS,
    map supplier and HQ rules for 20 to 30 outlets, run approval-based daily
    waterfalls for 60 to 90 days, and convert if the pilot reduces finance
    hours and missed priority payments.
  channels:
    - Founder-led direct outbound to CFOs, COOs, and finance controllers of multi-outlet chains.
    - Merchant OS implementation partners, app-ecosystem referrals, and POS resellers already serving franchise operators.
    - Acquirer, payout-platform, and SME lender referrals into merchants with reconciliation or working-capital pain.
  funnelTargets: "Target account→qualified finance diagnostic 15-25%, diagnostic→paid pilot 20-30%, pilot→production 50%+, and production group→second country or financing-module expansion 40%+ within 12 months."
  pricing: >-
    Charge US$150-$300 per outlet per month plus a setup fee and 10-30 basis
    points only on optional financed or fully orchestrated cash volume, because
    buyers already spend on POS, payment operations, and finance staff and will
    buy faster when price scales with outlet count rather than GMV alone.
businessModel:
  revenueStreams:
    - Per-outlet platform subscription for active waterfall workflows.
    - One-time onboarding and workflow-configuration fees.
    - Basis-point fees on optional financed or fully orchestrated cash volume.
    - Revenue share or data-service fees from lender or supplier-finance partners.
  unitOfValue: Active outlet on a managed daily cash waterfall.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one country entity to additional outlets, countries, and legal entities within the same chain.
    - Add supplier-finance or shortfall-management modules once the core waterfall is trusted.
    - Reuse the same rule engine across a second merchant stack and adjacent chain verticals.
strategyMap:
  northStarMetric: Active outlet-days with supplier, royalty, and reserve allocations completed on time under live waterfall rules.
  inputMetrics:
    - Days from signed pilot to first live outlet.
    - Percentage of daily settlements auto-matched to outlet-level obligations.
    - Percentage of priority obligations paid on or before due date.
    - Weekly finance hours saved per 20 managed outlets.
    - Pilot-to-production conversion rate.
    - Exception rate per 100 outlet-days.
  moatsToBuild:
    - Reusable waterfall templates and connector playbooks for beverage and QSR chains on the most common SG/MY merchant stacks.
    - Outlet-level allocation, exception, and repayment dataset that generic AP, POS, or lender tools do not naturally capture.
    - Embedded distribution with merchant OS, payout, and lender partners that benefit from better merchant cash discipline.
  killCriteria:
    - Fewer than 3 of the first 10 serious target chains will share settlement workflows and permit a paid diagnostic.
    - The first 3 pilots fail to reduce weekly cash-allocation work by at least 30% or fail to keep priority payments above 95% on time.
    - No launch-stack partner can support approval-based payout execution without forcing principal money-mover licensing or more than 90 days of custom implementation.
  mermaid: |
    flowchart LR
      Wedge[20-50 outlet franchise pilot] --> MVP[One-stack waterfall engine]
      MVP --> Proof[Less manual close time and 95% plus on-time priority payments]
      Proof --> Expansion[More chains then more stacks and partner-led financing]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Moderate conviction if one launch stack can deliver approval-based payouts and pilots renew above US$50k ARR without balance-sheet risk.
    whyBelieve: The buyer pain is operational, the underlying merchant and payout infrastructure already exists, and current tools still leave a controller-workflow gap.
    whyDoubt: The initial market is narrow and heavily dependent on partner data access, so the wedge can stall if single-stack chains are rarer or less controllable than the research implies.
    nextDiligence: Confirm 2 design-partner chains, 1 technical partner path for payout control, and a pilot KPI baseline on supplier timeliness and close time before treating this as venture-backable.
  firstCustomer:
    title: CFO of a 20-50 outlet beverage or QSR franchise group on one merchant stack.
    profile: >-
      A Singapore-headquartered chain operating across Singapore and Malaysia
      with centralized finance, daily ingredient purchasing, recurring royalty
      deductions, and visible cash-allocation friction during expansion.
    trigger: Opening new outlets, centralizing finance, or preparing for e-invoicing makes manual supplier and HQ routing too risky to keep in spreadsheets.
    buyer: CFO
    initialContract: 60-90 day paid pilot for 20-30 outlets worth roughly US$15k-$30k upfront, converting to about US$50k-$90k annual software plus optional 10-20 basis points on financed volume after ROI proof.
  mustBeTrue:
    - At least 6 of the first 20 target SG/MY chains fit the single-stack, centralized-finance profile and will share outlet-level settlement workflows.
    - One launch-stack partner combination can support approval-based payout execution without the startup becoming the principal money mover.
    - The first 3 pilots reduce weekly cash-allocation work by at least 30% and keep on-time supplier or royalty payments above 95%.
    - At least 2 pilot customers convert to annual contracts worth US$50k-$90k before optional financing fees.
    - A second merchant stack or adjacent chain vertical can reuse most of the template within 18 months, proving the wedge is not a one-off services business.
  diligenceQuestions:
    - How many 15-80 outlet SG/MY chains actually run one merchant stack end to end and expose daily settlement files?
    - Which merchant OS plus payout-partner combination gives the fastest path to live approval-based waterfalls?
    - Are supplier, royalty, and reserve obligations frequent enough that daily control beats weekly batch workflows for the first buyers?
    - What KPI threshold causes a CFO to renew at the proposed per-outlet price?
    - Why will Qashier, StoreHub, Stripe, Adyen, or Airwallex not absorb this feature once demand is proven?
operatingAssumptions:
  - assumption: A meaningful share of the target beverage and QSR chains already run one merchant stack and can expose settlement data without a full rip-and-replace.
    basis: research.yaml
    validationTest: Complete 20 ICP interviews and collect 6 actual stack or settlement workflow maps from qualified chains.
    decisionImpact: If false, narrow to one merchant-OS ecosystem or shift upmarket to chains with stronger finance systems.
  - assumption: One launch-stack partner path can support approval-based payout execution without the company taking principal money-mover or lending risk.
    basis: research.yaml
    validationTest: Secure 1 partner term sheet, complete 1 sandbox payout-control test, and document the legal operating boundary before the first pilot.
    decisionImpact: If false, launch read-only analytics first or embed inside a licensed partner instead of selling a standalone control plane.
  - assumption: Buyers will pay the proposed per-outlet pricing from existing software or finance-operations budgets if operational ROI is visible inside one quarter.
    basis: idea.yaml
    validationTest: Run 10 pricing conversations and close 2 paid pilots at or above US$150 per outlet per month equivalent.
    decisionImpact: If false, lower initial ACV, simplify scope to one use case, or rely more heavily on partner-led distribution.
  - assumption: Supplier, royalty, and reserve obligations are frequent enough that daily or near-daily waterfall control matters more than month-end reporting for the first buyers.
    basis: operator judgment
    validationTest: Map payment cadence and exception history across 5 target chains and confirm that at least 3 manage priority obligations multiple times per week.
    decisionImpact: If false, reposition around weekly cash-batch orchestration and accept a weaker urgency narrative.
  - assumption: Waterfall exception and repayment data will be valuable enough for at least one lender or supplier-finance partner to co-sell or share economics.
    basis: research.yaml
    validationTest: Sign 2 partner LOIs and complete 1 back-test showing better approval or delinquency prediction than bank-statement-only inputs.
    decisionImpact: If false, the business remains software-only and the expansion path into financing becomes narrower.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Quantify launch-stack-ready ICP density.
    hypothesis: At least 30% of the first 20 target beverage and QSR chains match the single-stack, centralized-finance profile.
    successMetric: 20 buyer interviews, 6 qualified accounts, and 4 documented workflow maps.
    owner: Founding CEO / GTM
  - horizon: 0-90 days
    experiment: Validate the partner and regulatory path.
    hypothesis: One merchant OS plus one payout partner can support approval-based execution without new licensing.
    successMetric: 1 signed technical pilot agreement, 1 working sandbox flow, and a documented legal boundary.
    owner: Founding CEO / partnerships
  - horizon: 90-180 days
    experiment: Ship the first repeatable waterfall template.
    hypothesis: A beverage or QSR chain can go live on one template in 45 days or less with limited custom rule work.
    successMetric: First 20 live outlets within 45 days and at least 80% of required rules served from the core template.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Close the first paid pilot.
    hypothesis: CFO buyers will fund a finance-control pilot from existing software or finance-ops budget.
    successMetric: 1 signed pilot above US$15k and a mutually agreed ROI scorecard before go-live.
    owner: Founding CEO / GTM
  - horizon: 6-12 months
    experiment: Prove operational ROI and renewal.
    hypothesis: Live waterfalls materially reduce manual work and missed priority payments.
    successMetric: First 2 pilots show 30%+ less weekly cash-allocation time, 95%+ on-time priority payments, and at least 1 production conversion.
    owner: Implementation lead
  - horizon: 12-18 months
    experiment: Test financing and partner-led expansion.
    hypothesis: Exception data improves lender confidence enough to create an attach motion without direct balance-sheet risk.
    successMetric: 1 lender or supplier-finance partner launches a data-sharing pilot and 10%+ of qualified shortfall events receive a partner offer.
    owner: Partnerships lead
operations:
  - Daily settlement ingestion, reconciliation, and rule-run monitoring across each live merchant group.
  - Approval workflows and exception queues for supplier, royalty, and reserve allocations with named finance approvers.
  - InvoiceNow and MyInvois event logging, entity mapping, and audit-trail retention for SG and MY compliance workflows.
  - Standard implementation playbooks across merchant OS, payout partner, accounting export, and finance-team onboarding.
  - Partner operations with acquirers and lenders for shortfall escalation, consent capture, and repayment ordering.
team:
  - role: Founding CEO / merchant fintech GTM
    startTiming: Month 0
    rationale: The first sale depends on mapping a real finance workflow, winning trust with CFO or COO buyers, and structuring launch partnerships.
  - role: Founding eng
    startTiming: Month 0
    rationale: The company needs immediate product ownership over the rules engine, ledger model, permissions, and integration architecture.
  - role: Implementation and finance ops lead
    startTiming: Month 2
    rationale: Early pilots will succeed or fail on workflow mapping, exception handling, and buyer-visible ROI measurement rather than on feature breadth.
  - role: Integrations engineer
    startTiming: Month 4
    rationale: Repeatable merchant-stack and payout-partner connectors are the main determinant of deployment speed and gross margin.
  - role: Partnerships and risk lead
    startTiming: Month 8
    rationale: Once the first pilot is live, the company needs a dedicated owner for payout-partner terms, lender data-sharing, and compliance boundary management.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 3-5 design partners and 2 paid pilots in beverage or QSR chains.
      - Launch one merchant OS plus one payout-partner stack across at least 100 live outlets.
      - Show 30%+ lower weekly cash-allocation effort and 95%+ on-time priority payments in the first live accounts.
      - Secure 1 acquirer or lender referral partner and SG or MY audit-ready event logs.
  - horizon: 12-24 months
    items:
      - Reach 5-8 production merchant groups and about 300 live outlets.
      - Add a second merchant stack or payout partner and standardize Malaysia tax or invoice workflows.
      - Launch the first partner-led financing or supplier-pay module inside production accounts.
      - Publish internal benchmarks for payment cadence, exception rates, and close-time improvement by chain archetype.
  - horizon: 24-36 months
    items:
      - Reach about 600 live outlets across roughly 20-25 groups, matching the researched year-3 SOM case.
      - Expand into adjacent specialty retail or service chains using the same core rule engine.
      - Become the default cash-policy layer inside at least 2 merchant or payout ecosystems.
risks:
  - risk: Merchant-stack or payout partners may not provide enough write access to make the workflow operationally critical.
    likelihood: Medium
    impact: High
    mitigation: Lock one launch-stack partner path before scaling GTM and preserve a human-approved fallback so the pilot still proves visibility and process value.
  - risk: Buyers may delay adoption until a severe cash or supplier incident creates urgency.
    likelihood: High
    impact: Medium
    mitigation: Sell into outlet expansion, finance centralization, and e-invoicing projects where workflow redesign already has budget and executive attention.
  - risk: Incumbents can add a basic waterfall feature once demand is proven.
    likelihood: Medium
    impact: High
    mitigation: Go deeper than plumbing into finance-controller rules, audit logs, exception handling, and cross-system neutrality before broadening the product surface.
  - risk: Financing attachments could add compliance complexity or weak partner economics before the core software wedge is proven.
    likelihood: Medium
    impact: Medium
    mitigation: Keep financing off balance sheet, require explicit merchant consent, and treat lender workflows as optional after the base product reaches repeatable renewal.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund the launch stack, complete 3-5 design partners and 2-3 paid pilots,
    hire the core integration and implementation team, ship SG and MY audit
    logging, and prove one payout or lender partner motion without taking
    direct balance-sheet risk.
