slug: franchise-cashflow-waterfall
date: '2026-07-01'
executiveSummary: Franchise Cashflow Waterfall 瞄准的是总部在新加坡、在新马两地拥有 15 到 80 家门店的饮品和快餐加盟集团——他们已经跑在同一套商户技术栈上，但每天交易结束后的现金分配仍然靠手工完成。这个痛点的核心是控制力不足，而不是缺报表：财务团队仍然靠
  Excel、银行网银和临时转账，来决定供应商、特许权使用费、储备金和短期负债谁先拿到钱，结果现金问题总是在缺货、供应商施压或月末结账之后才浮出水面。产品接入一套商户操作系统、一个打款伙伴和记账系统，生成门店级的每日现金台账，并配上供应商应付款、总部汇款、储备金账户和可选伙伴主导融资还款的审批式瀑布流规则。这个切口现在可信，是因为
  Qashier 和 StoreHub 已经证明了密集的多门店分销存在，两个目标市场都有可编程打款轨道，而基于交易数据的中小企业放贷也已经在生产环境上线。第一套商用系统应该是卖给 CFO 或 COO 的付费试点，落地时机选在门店扩张、财务集中化或电子发票上线的窗口，定价锚定在按门店收费的
  SaaS 加上对编排或融资现金流水的可选基点费用。战略上的选择是先做一个软件主导的控制层，而不是自己下场放贷或替代 POS，因为在第一年，证明速度和监管简洁性比抢占资产负债表经济利益更重要。最大的悬而未决的问题是：到底有多少目标连锁品牌能在现有技术栈上开放可写入的打款控制权，以及对第一批买家来说，每日瀑布流自动化是否真的比每周批量控制更急迫。如果公司能在第一套启动技术栈上证明更快的结账速度、95%
  以上的优先付款准时率和续约率，就可以扩展到相邻的零售和服务连锁，之后再成长为东南亚中小商户更广泛的财资与融资编排层。
problem:
- 多门店加盟集团结算到账后，仍然在 Excel 里手工决定每天的供应商付款、特许权使用费汇款和现金储备，导致门店缺口总是在缺货或月末结账之后才被发现。
- 现有的商户操作系统、打款基础设施和记账工具各自掌握一部分数据，但没有一个真正扮演跨门店、跨交易对手、跨义务的财务主管现金政策层。
- 通用的中小企业放贷能填补偶发的流动性缺口，但解决不了决定哪笔义务先付、什么时候付的每日排序问题。
solution:
- 用商户操作系统的销售和结算数据，生成门店级的每日现金台账，再套用可配置的瀑布流规则来分配供应商应付款、总部费用、租金或工资储备金和放贷方还款。
- 先从审批式执行、异常队列和审计日志入手，在一套商户技术栈上落地，让财务团队能控制资金流转，而不用替换 POS、打款或银行系统。
- 只有当规则引擎和已验证的销售数据显示确实存在缺口时，才把预测到的短缺上报给合作放贷方或供应商，让融资始终绑定在真实运营场景上，而不是变成孤立的申请。
whyWeWin:
- 这家公司卡在商户操作系统记录系统和打款轨道之间，把已有的原语打包成一个财务主管工作流产品——而 Qashier、Stripe、Adyen 和 Airwallex 目前都没有把这个完整产品卖出来。
- 可复用的饮品和 QSR 瀑布流模板，加上门店级异常数据，既能形成流程层面的切换成本，也能提供比通用应付账款或现金预支工具更好的授信信号。
- 与持牌伙伴合作、软件主导的方式让监管范围保持收窄，同时仍然有机会让产品成为供应商、特许权使用费、储备金和融资决策的默认控制面。
strategicChoices:
  beachhead: 总部在新加坡、在新马两地拥有 20 到 50 家门店的饮品和快餐加盟集团，财务集中管理，跑同一套商户技术栈，且有持续的供应商和特许权使用费义务。
  wedgeRationale: 饮品和 QSR 连锁交易频繁、每天都要采购食材、总部汇款也是常态，所以一个工作流就能比更宽泛的中小企业财资产品更快证明省时和现金纪律带来的 ROI。从这里切入，也能在公司应对更参差不齐的零售或服务商户之前，先沉淀出可复用的规则模板。
  sequencingRationale: 先从一套商户技术栈、一个打款伙伴、人工审批、零资产负债表风险做起。产品必须先证明能省下财务团队的时间、提升付款可靠性；GTM 应该继续由创始人围绕扩张和合规触发点主导；早期招聘应该是集成和实施岗，而不是一支庞大的销售团队；打款或放贷方合作关系应该等第一套技术栈证明可复制的
    ROI 之后再加深。
  notYet:
  - 在公司自己的资产负债表上直接放贷或托管商户资金。
  - 单店中小商户和长尾里参差不齐的商户群体。
  - 超出现金分配工作流范围的完整财资或 ERP 替代。
  - 在饮品和 QSR 模板可复制之前就扩展到非加盟垂直品类。
market:
  tam: 估算新加坡/马来西亚约 18,100 个相关多门店商户网点，按模型测算的每门店 US$3,225 年收入计算，年度支出规模约 US$58.4M。
  sam: 估算滩头市场约 4,200 家饮品和 QSR 门店，属于财务集中管理、跑同一套商户技术栈的 15 到 80 家门店集团，支出规模约 US$13.5M。
  som: 第三年可触达收入约 US$1.9M，基于约 600 家门店、约 20 到 25 个集团，按模型定价计算。
  segments:
  - 总部在新加坡、在新马两地拥有 15 到 80 家门店的饮品和 QSR 加盟集团，财务集中管理，跑同一套商户技术栈。
  - 一旦加盟模板可复制，扩展到财务集中结算的相邻专业零售和服务连锁。
  buyingProcess: 销售通常始于门店扩张、财务集中化或发票合规工作，让 Excel 路由的方式撑不住的那一刻。财务主管负责梳理工作流，但 CFO 或 COO、商户技术栈实施方、打款伙伴和记账负责人必须都批准连接器权限、控制规则和审计日志，第一个试点才能上线。
product:
  mvp: MVP 是一个启动技术栈的瀑布流引擎，接入一套商户操作系统、一条打款轨道和一份记账导出，生成门店级现金台账、可配置分配规则、审批队列，以及供应商付款、总部费用和储备金投入的审计日志。v1 版本不应该直接持有资金或做信贷承销；融资环节保持伙伴主导，且只在检测到缺口之后才触发。
  sixMonth: 签下 3 个共创客户，上线一套配备审批式打款编排的启动技术栈，在最初的 50 到 100 家门店跑通实时每日瀑布流工作流。
  twelveMonth: 把最初的 2 到 3 个试点转化为生产合同，为 InvoiceNow 和 MyInvois 工作流添加新马两地的税务就绪事件日志，并在同一批账户上上线第一个由放贷方触发的缺口工作流。
  twentyFourMonth: 支持第二套商户技术栈和第二个打款伙伴，扩展到相邻的专业零售或服务连锁，并加入多主体现金预测和伙伴主导的供应商融资工作流。
  keyBets:
  - 已经有足够多的目标连锁品牌跑在同一套商户技术栈上，能开放可复制部署所需的结算数据。
  - 审批式瀑布流控制能大幅减少财务工作量和付款失败，足以支撑每门店每月 US$150 到 300 的定价。
  - 公司能靠持牌打款和放贷伙伴保持软件主导，而不是过早自己承担主体监管风险。
  - 异常和还款数据能让伙伴放贷方或供应商足够信任，从而在核心 SaaS 之外解锁扩张型经济效益。
gtm:
  wedge: 通过一次付费的财务诊断试点拿下第一个客户，卖给一个拥有 20 到 50 家门店的饮品或 QSR 集团的 CFO 或 COO，落地时机选在门店扩张、财务集中化或电子发票上线的窗口。接入一套商户操作系统，为
    20 到 30 家门店梳理供应商和总部规则，跑 60 到 90 天的审批式每日瀑布流，如果试点减少了财务工时和优先付款遗漏，就转化为正式合同。
  channels:
  - 创始人主导，直接对接多门店连锁的 CFO、COO 和财务主管。
  - 商户操作系统的实施伙伴、应用生态转介，以及已经服务加盟商的 POS 经销商。
  - 收单机构、支付平台和打款平台的转介，对接那些有对账或营运资金痛点的商户。
  funnelTargets: 目标客户→合格财务诊断转化率 15%-25%，诊断→付费试点转化率 20%-30%，试点→生产合同转化率 50% 以上，生产客户→12 个月内拓展第二个国家或融资模块转化率
    40% 以上。
  pricing: 按每门店每月收取 US$150 到 US$300，外加开通费，以及只针对可选的融资或全额编排现金流水收取 10 到 30 个基点——因为买家本来就在 POS、支付运营和财务人员上花钱，价格如果按门店数量而不是单纯按
    GMV 走，他们会更快买单。
businessModel:
  revenueStreams:
  - 针对活跃瀑布流工作流的按门店平台订阅费。
  - 一次性的上线和工作流配置费。
  - 对可选的融资或全额编排现金流水收取的基点费用。
  - 来自放贷方或供应商融资伙伴的分成或数据服务费。
  unitOfValue: 跑在受管理每日现金瀑布流上的一个活跃门店。
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一个国家主体扩展到同一连锁品牌下更多门店、更多国家和法律主体。
  - 在核心瀑布流赢得信任之后，加入供应商融资或缺口管理模块。
  - 把同一套规则引擎复用到第二套商户技术栈和相邻连锁垂直品类。
strategyMap:
  northStarMetric: 在实时瀑布流规则下，供应商、特许权使用费和储备金分配按时完成的活跃门店天数。
  inputMetrics:
  - 从签约试点到第一家门店上线的天数。
  - 每日结算自动匹配到门店级义务的比例。
  - 优先义务按时或提前付款的比例。
  - 每管理 20 家门店每周节省的财务工时。
  - 试点转生产合同的转化率。
  - 每 100 个门店天的异常率。
  moatsToBuild:
  - 针对新马两地最常见商户技术栈的、可复用的饮品和 QSR 瀑布流模板与连接器操作手册。
  - 通用应付账款、POS 或放贷工具天然拿不到的门店级分配、异常和还款数据集。
  - 与商户操作系统、打款和放贷伙伴的嵌入式分销，这些伙伴自身也受益于更好的商户现金纪律。
  killCriteria:
  - 前 10 个认真接触的目标连锁品牌里，不到 3 家愿意共享结算工作流并允许一次付费诊断。
  - 前 3 个试点没能把每周现金分配工作量减少至少 30%，或没能把优先付款准时率维持在 95% 以上。
  - 没有任何一家启动技术栈伙伴能在不强制要求主体资金流转牌照或超过 90 天定制实施的前提下，支持审批式打款执行。
  mermaid: "flowchart LR\n  Wedge[20-50 家门店的加盟试点] --> MVP[单一技术栈瀑布流引擎]\n  MVP --> Proof[更少手工结账时间, 95%以上优先付款准时率]\n\
    \  Proof --> Expansion[更多连锁, 再到更多技术栈和伙伴主导融资]\n"
investorMemo:
  verdict:
    call: 值得会面 / 进一步调查
    conviction: 如果一套启动技术栈能交付审批式打款、且试点续约金额能不靠资产负债表风险做到 US$50k ARR 以上，信心中等偏上。
    whyBelieve: 买家的痛点是运营层面的，底层的商户和打款基础设施已经存在，而现有工具仍然留下一个财务主管工作流的空白。
    whyDoubt: 初始市场偏窄，而且高度依赖伙伴的数据开放程度，如果单技术栈连锁比研究预期的更稀少或更难获得控制权，这个切口就可能卡住。
    nextDiligence: 在把这当作值得风险投资之前，先确认 2 个共创客户连锁品牌、1 条打款控制的技术伙伴路径，以及供应商准时率和结账时间的试点 KPI 基线。
  firstCustomer:
    title: 在一套商户技术栈上运营的、拥有 20 到 50 家门店的饮品或 QSR 加盟集团的 CFO。
    profile: 总部在新加坡、在新马两地运营的连锁品牌，财务集中管理，每天采购食材，有持续的特许权使用费扣款，且在扩张期现金分配摩擦明显。
    trigger: 开新店、财务集中化，或为电子发票做准备，让手工的供应商和总部路由方式风险大到不能再留在 Excel 里。
    buyer: CFO
    initialContract: 针对 20 到 30 家门店的 60 到 90 天付费试点，前期约 US$15k 到 30k，验证 ROI 后转为约 US$50k 到 90k 的年度软件费，外加可选的对融资流水收取
      10 到 20 个基点。
  mustBeTrue:
  - 在最初 20 个新马目标连锁品牌里，至少 6 个符合单技术栈、财务集中管理的画像，并愿意共享门店级结算工作流。
  - 有一套启动技术栈的伙伴组合能支撑审批式打款执行，而不需要这家创业公司变成主体资金流转方。
  - 前 3 个试点能把每周现金分配工作量减少至少 30%，并把供应商或特许权使用费的准时付款率维持在 95% 以上。
  - 至少 2 个试点客户在扣除可选融资费用前，转化为价值 US$50k 到 90k 的年度合同。
  - 第二套商户技术栈或相邻连锁垂直品类能在 18 个月内复用大部分模板，证明这个切口不是一次性的服务生意。
  diligenceQuestions:
  - 到底有多少家 15 到 80 家门店的新马连锁真正端到端跑在一套商户技术栈上，并能开放每日结算文件？
  - 哪种商户操作系统加打款伙伴的组合，能最快跑通实时审批式瀑布流？
  - 对第一批买家来说，供应商、特许权使用费和储备金义务是否频繁到让每日控制比每周批量工作流更划算？
  - 什么样的 KPI 门槛会让 CFO 按提议的每门店价格续约？
  - 一旦需求得到证明，Qashier、StoreHub、Stripe、Adyen 或 Airwallex 为什么不会自己把这个功能吸收进去？
operatingAssumptions:
- assumption: 目标饮品和 QSR 连锁里有相当一部分已经跑在一套商户技术栈上，能在不用推倒重来的前提下开放结算数据。
  basis: research.yaml
  validationTest: 完成 20 次 ICP 访谈，从合格连锁里收集 6 份真实的技术栈或结算工作流地图。
  decisionImpact: 如果不成立，就收窄到一个商户操作系统生态，或转向财务系统更强的中上游连锁。
- assumption: 有一条启动技术栈的伙伴路径能支撑审批式打款执行，而公司不用承担主体资金流转或放贷风险。
  basis: research.yaml
  validationTest: 拿到 1 份伙伴条款清单，完成 1 次沙箱打款控制测试，并在第一个试点之前记录清楚法律层面的运营边界。
  decisionImpact: 如果不成立，就先只上线只读分析功能，或者嵌入持牌伙伴内部，而不是单独卖一套控制层。
- assumption: 如果运营 ROI 能在一个季度内看得见，买家会愿意从现有的软件或财务运营预算里，按提议的每门店价格付费。
  basis: idea.yaml
  validationTest: 跑 10 次定价对话，谈成 2 个按每门店每月 US$150 或以上等值定价的付费试点。
  decisionImpact: 如果不成立，就降低初始 ACV、把范围简化到一个使用场景，或更多依赖伙伴主导的分销。
- assumption: 对第一批买家来说，供应商、特许权使用费和储备金义务频繁到每日或近乎每日的瀑布流控制，比月末报表更重要。
  basis: 运营者判断
  validationTest: 梳理 5 个目标连锁的付款节奏和异常历史，确认至少 3 个每周多次处理优先义务。
  decisionImpact: 如果不成立，就把定位改为每周现金批量编排，接受一个相对较弱的紧迫性叙事。
- assumption: 瀑布流异常和还款数据要足够有价值，才能让至少一个放贷方或供应商融资伙伴愿意联合销售或分享经济利益。
  basis: research.yaml
  validationTest: 签下 2 份伙伴意向书，完成 1 次回测，证明比只用银行流水更能预测审批或违约情况。
  decisionImpact: 如果不成立，业务就只能保持纯软件形态，融资这条扩展路径会变窄。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 量化启动技术栈就绪的 ICP 密度。
  hypothesis: 在最初 20 个目标饮品和 QSR 连锁里，至少 30% 符合单技术栈、财务集中管理的画像。
  successMetric: 20 次买家访谈、6 个合格账户、4 份有文档记录的工作流地图。
  owner: 创始人 CEO / GTM
- horizon: 0–90 天
  experiment: 验证伙伴和监管路径。
  hypothesis: 一个商户操作系统加一个打款伙伴，能在不需要新牌照的前提下支撑审批式执行。
  successMetric: 1 份已签署的技术试点协议、1 条可用的沙箱流程,以及一份有记录的法律边界。
  owner: 创始人 CEO / 合作伙伴关系
- horizon: 90–180 天
  experiment: 上线第一套可复制的瀑布流模板。
  hypothesis: 一个饮品或 QSR 连锁能在 45 天或更短时间内基于一套模板上线，且只需有限的定制规则工作。
  successMetric: 45 天内上线首批 20 家门店，且至少 80% 的所需规则来自核心模板。
  owner: 创始工程负责人
- horizon: 90–180 天
  experiment: 签下第一个付费试点。
  hypothesis: CFO 买家愿意从现有的软件或财务运营预算里出资做一个财务控制试点。
  successMetric: 1 份签约金额超过 US$15k 的试点，并在上线前双方就 ROI 记分卡达成一致。
  owner: 创始人 CEO / GTM
- horizon: 6–12 个月
  experiment: 证明运营 ROI 和续约意愿。
  hypothesis: 实时瀑布流能显著减少手工工作量和优先付款遗漏。
  successMetric: 最初 2 个试点显示每周现金分配时间减少 30% 以上、优先付款准时率 95% 以上，且至少 1 例转为生产合同。
  owner: 实施负责人
- horizon: 12–18 个月
  experiment: 测试融资和伙伴主导的扩张。
  hypothesis: 异常数据能提升放贷方信心，足以形成一条获客动线，而不用直接承担资产负债表风险。
  successMetric: 1 个放贷方或供应商融资伙伴上线数据共享试点，且 10% 以上的合格缺口事件收到伙伴报价。
  owner: 合作伙伴关系负责人
operations:
- 每天在每个正在运营的商户集团里完成结算数据接入、对账和规则运行监控。
- 由指定财务审批人负责的供应商、特许权使用费和储备金分配的审批工作流与异常队列。
- 为新马两地合规工作流做 InvoiceNow 和 MyInvois 事件记录、主体映射和审计留痕保存。
- 覆盖商户操作系统、打款伙伴、记账导出和财务团队上线的标准实施操作手册。
- 与收单机构和放贷方在缺口上报、同意留痕和还款排序上的伙伴运营协作。
team:
- role: 创始人 CEO / 商户金融科技 GTM
  startTiming: 第 0 个月
  rationale: 第一笔销售要靠梳理真实的财务工作流、赢得 CFO 或 COO 买家的信任，并搭建启动阶段的合作关系。
- role: 创始工程负责人
  startTiming: 第 0 个月
  rationale: 公司需要立刻有人对规则引擎、台账模型、权限体系和集成架构负全责。
- role: 实施与财务运营负责人
  startTiming: 第 2 个月
  rationale: 早期试点的成败取决于工作流梳理、异常处理和买家能看见的 ROI 度量，而不是功能广度。
- role: 集成工程师
  startTiming: 第 4 个月
  rationale: 可复用的商户技术栈和打款伙伴连接器，是决定部署速度和毛利率的主要因素。
- role: 合作伙伴关系与风险负责人
  startTiming: 第 8 个月
  rationale: 第一个试点上线之后，公司需要专人负责打款伙伴条款、放贷方数据共享和合规边界管理。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 3 到 5 个共创客户和 2 个饮品或 QSR 连锁的付费试点。
  - 在至少 100 家运营门店上线一套商户操作系统加一个打款伙伴的技术栈。
  - 在首批正式账户上展示每周现金分配工作量降低 30% 以上、优先付款准时率 95% 以上。
  - 拿下 1 个收单机构或放贷方转介伙伴，以及新马两地审计就绪的事件日志。
- horizon: 12–24 个月
  items:
  - 达到 5 到 8 个生产环境商户集团，约 300 家运营门店。
  - 新增第二套商户技术栈或打款伙伴，并把马来西亚税务或发票工作流标准化。
  - 在生产环境账户里上线第一个伙伴主导的融资或供应商付款模块。
  - 按连锁类型发布付款节奏、异常率和结账时间改善的内部基准数据。
- horizon: 24–36 个月
  items:
  - 达到约 600 家运营门店，覆盖大约 20 到 25 个集团，对应研究测算的第三年 SOM 情形。
  - 用同一套核心规则引擎扩展到相邻的专业零售或服务连锁。
  - 成为至少 2 个商户或打款生态里默认的现金政策层。
risks:
- risk: 商户技术栈或打款伙伴可能不会开放足够的写入权限,让这套工作流真正成为运营关键。
  likelihood: Medium
  impact: High
  mitigation: 在扩大 GTM 之前先锁定一条启动技术栈的伙伴路径，并保留人工审批的兜底方案，让试点至少能证明可见性和流程价值。
- risk: 买家可能会拖到发生严重的现金或供应商事故之后才愿意采用。
  likelihood: High
  impact: Medium
  mitigation: 把销售嵌入到门店扩张、财务集中化和电子发票项目里——这些场景本来就有预算和高管关注的工作流重建需求。
- risk: 需求一旦得到验证，现有厂商可以自己加一个基础的瀑布流功能。
  likelihood: Medium
  impact: High
  mitigation: 在拓宽产品面之前，先把财务主管规则、审计日志、异常处理和跨系统中立性做深，而不是停留在管道层面。
- risk: 在核心软件切口得到验证之前，融资附加功能可能带来合规复杂度或较弱的伙伴经济效益。
  likelihood: Medium
  impact: Medium
  mitigation: 让融资保持表外，要求商户明确同意，并且只在基础产品达到可复制续约之后，才把放贷方工作流当作可选项。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 为启动技术栈提供资金，完成 3 到 5 个共创客户和 2 到 3 个付费试点，招聘核心集成和实施团队，上线新马两地的审计日志，并在不承担直接资产负债表风险的前提下，证明一条打款或放贷伙伴动线。
