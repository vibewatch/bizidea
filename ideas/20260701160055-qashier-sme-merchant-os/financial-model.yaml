slug: franchise-cashflow-waterfall
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[business-plan.yaml date] the business plan is dated 2026-07-01, so the financial model starts in the same first operating month.'
- id: A2
  name: Opening cash after pre-seed close
  value: '1900'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] underwrites a $2.0M pre-seed at the low end of the stated $2-3M range, net of roughly $100K of pre-M1 legal, setup, and compliance work.'
- id: A3
  name: Revenue unit
  value: Active live outlet on a managed daily cash waterfall
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue] the plan monetizes each active outlet rather than a generic SMB logo.'
- id: A4
  name: Base subscription per live outlet
  value: '225'
  unit: USD/outlet-month
  source: '[business-plan.yaml gtm.pricing] uses the midpoint of the stated $150-$300 per-outlet monthly price band.'
- id: A5
  name: Annual volume-fee attach per live outlet
  value: '525'
  unit: USD/outlet-year
  source: '[research.yaml market.tam rationale] uses the research model of 15 bps on about $350K of settled annual outlet volume.'
- id: A6
  name: Blended annual revenue per live outlet
  value: '3225'
  unit: USD/outlet-year
  source: '[Derived from A4 and A5; research.yaml market.bottomUpSizingDrivers] $2,700 subscription plus $525 usage revenue matches the market-sizing model.'
- id: A7
  name: Y1 month-end live-outlet path
  value: 'M1-M4: 0; M5: 25; M6: 50; M7: 50; M8: 75; M9: 75; M10-M12: 100'
  unit: outlets
  source: '[business-plan.yaml product.sixMonth; milestones 0-12 months; investorMemo.firstCustomer.initialContract] ramps from one 20-30 outlet pilot to about 100 live outlets by month 12.'
- id: A8
  name: Y2 quarter-end live-outlet path
  value: Q1Y2 150; Q2Y2 200; Q3Y2 250; Q4Y2 300
  unit: outlets
  source: '[business-plan.yaml milestones 12-24 months] matches the stated target of about 300 live outlets by month 24.'
- id: A9
  name: Y3 quarter-end live-outlet path
  value: Q1Y3 380; Q2Y3 460; Q3Y3 530; Q4Y3 600
  unit: outlets
  source: '[business-plan.yaml milestones 24-36 months; market.som; research.yaml market.som] matches the researched 600-outlet year-3 SOM case.'
- id: A10
  name: Revenue recognition timing
  value: Midpoint live-outlet count within each month or quarter
  unit: policy
  source: '[startup-finance heuristic] assumes new outlet go-lives land through the period rather than all on day one.'
- id: A11
  name: Long-term target gross margin
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] the business plan explicitly targets a 70% gross margin software model.'
- id: A12
  name: Direct service-cost policy
  value: 19% of revenue plus fixed delivery/compliance cost that starts at $5K monthly once pilots go live and rises to $6K in Y2-Y3
  unit: policy
  source: '[startup-finance heuristic anchored to business-plan.yaml operations and research.yaml regulatoryTechnicalConstraints] covers partner support, audit-log infrastructure, reconciliation ops, and payout-control compliance overhead.'
- id: A13
  name: Implementation payroll allocation
  value: 50% COGS / 20% S&M / 30% G&A
  unit: allocation
  source: '[business-plan.yaml team Implementation and finance ops lead; operations] delivery staff both operate live workflows and support renewals and finance reporting.'
- id: A14
  name: Monthly outlet churn
  value: '1.5'
  unit: percent
  source: '[startup-finance heuristic] a controller workflow with approvals and audit trails should be sticky after go-live, but partner dependence and early-stage product risk still justify non-zero churn.'
- id: A15
  name: Founding CEO loaded compensation
  value: '110'
  unit: USDK/year
  source: '[business-plan.yaml team Founding CEO / merchant fintech GTM] uses a founder-below-market Singapore fintech salary with payroll burden.'
- id: A16
  name: Engineering loaded compensation
  value: '125'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Founding eng; Integrations engineer] startup-finance heuristic for senior SG/MY product and integrations engineers.'
- id: A17
  name: Implementation and finance ops loaded compensation
  value: '80'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Implementation and finance ops lead] startup-finance heuristic for deployment and operations-heavy merchant-fintech talent.'
- id: A18
  name: Partnerships and risk loaded compensation
  value: '100'
  unit: USDK/year/FTE
  source: '[business-plan.yaml team Partnerships and risk lead] heuristic for partner-management and compliance-boundary ownership in Singapore.'
- id: A19
  name: Sales loaded compensation
  value: '110'
  unit: USDK/year/FTE
  source: '[business-plan.yaml strategicChoices.sequencingRationale] first quota-carrying GTM hires arrive only after pilots prove ROI, at a lean enterprise-AE OTE.'
- id: A20
  name: G&A and operations loaded compensation
  value: '70'
  unit: USDK/year/FTE
  source: '[startup-finance heuristic anchored to business-plan.yaml operations] lean compliance and finance support is added only once live accounts span SG and MY workflows.'
- id: A21
  name: Hiring cadence
  value: M1 CEO and founding eng; M2 implementation lead; M4 integrations eng; M8 partnerships and risk; M11 second implementation hire; M15 third eng; M16 first sales hire; M18 ops/compliance; M20 third implementation hire; M26 second sales hire; M28 fourth eng
  unit: timing
  source: '[business-plan.yaml team; strategicChoices.sequencingRationale; milestones] follows the explicit first-year team plan and keeps later hiring milestone-gated rather than vanity-loaded.'
- id: A22
  name: Functional payroll allocation
  value: CEO 75% S&M / 25% G&A; engineering 100% R&D; implementation 50% COGS / 20% S&M / 30% G&A; partnerships 60% S&M / 40% G&A; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] maps each role to the work it directly performs in delivery, GTM, or administration.'
- id: A23
  name: Non-payroll operating-spend policy
  value: Y1 S&M $6K/mo + 5% revenue, R&D $4.5K/mo, G&A $6K/mo; Y2 S&M $7K/mo + 5% revenue, R&D $5.5K/mo, G&A $7K/mo; Y3 S&M $9K/mo + 5.5% revenue, R&D $6K/mo, G&A $8K/mo
  unit: USDK/month
  source: '[startup-finance heuristic anchored to business-plan.yaml operations, risks, and fundingAsk.useOfFundsSummary] covers travel, cloud, sandbox tooling, legal, and tax/compliance overhead.'
- id: A24
  name: Cash conversion policy
  value: EBITDA approximates operating cash movement after the pre-M1 setup spend in A2
  unit: policy
  source: '[startup-finance heuristic] the model excludes debt, capex, taxes, and material working-capital swings at this stage.'
- id: A25
  name: Funding runway target
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths] the plan asks for 18 months of execution, and this stage adds the required six-month buffer.'
- id: A26
  name: Next-round milestone
  value: By month 24 reach about 300 live outlets, 5-8 production groups, a second merchant stack or payout partner, and one financing-module proof
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] this is the proof package sized into the pre-seed round.'
- id: A27
  name: Average live outlets per mature chain
  value: '30'
  unit: outlets/chain
  source: '[business-plan.yaml beachhead 20-50 outlets; research.yaml market.som] year-3 scale of 600 outlets across roughly 20-25 groups implies about 24-30 outlets per group, so the model uses 30 for CAC translation.'
- id: A28
  name: Blended CAC per landed chain
  value: '33'
  unit: USDK/chain
  source: '[business-plan.yaml gtm.channels; market.buyingProcess] founder-led enterprise selling with some partner referrals still requires a meaningful diagnostic and onboarding motion.'
- id: A29
  name: Blended CAC per live outlet
  value: '1.1'
  unit: USDK/outlet
  source: '[Derived from A27 and A28] $33K per chain divided by 30 live outlets yields roughly $1.1K CAC per outlet.'
- id: A30
  name: Y2 account-size mix
  value: Early production groups average roughly 37-40 outlets before the mix broadens toward 30 by Y3
  unit: outlets/chain
  source: '[business-plan.yaml milestones 12-24 months and beachhead definition] reconciles the 300-outlet Y2 milestone with the stated 5-8 production-group target.'
