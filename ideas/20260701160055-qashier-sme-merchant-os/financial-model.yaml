modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DirectOutreach --> PaidPilots
      PaidPilots --> LiveOutlets
      PartnerReferrals --> LiveOutlets
      LiveOutlets --> SubscriptionRevenue
      LiveOutlets --> VolumeFees
      SubscriptionRevenue --> GrossProfit
      VolumeFees --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by growing from 100 to 600 live outlets while holding blended revenue near the research-based $3.225K per outlet.
- checkName: Must go right
  finding: Pilot-to-production conversion has to stay near the 45-day-to-90-day deployment window so a 10-person Y2 team can reach 300 outlets without turning into a services business.
- checkName: Model breaks if
  finding: If sales cycles stretch toward six months or attach fees fall back toward subscription-only pricing, the downside case takes cash below zero before Y3 ends.
- checkName: Next-round proof
  finding: The next round is justified once the company reaches about 300 live outlets, 5-8 production groups, second-stack proof, and at least one financing-module validation by month 24.
sanityChecks:
  ruleOf40: Y3 growth 127.5% + EBITDA margin -30.0% = 97.5% (inflated by a still-small Y2 base).
  burnMultiple: Y2 burn multiple is about 1.1x, improving to about 0.5x in Y3 as outlet density rises and fixed compliance spend is amortized.
  revenuePerFte: $122.3K Y3 revenue per Q4Y3 FTE (benchmark $200-400K SaaS).
  flags:
  - Reported gross margin is still below the 70% target in Y3 because implementation and compliance costs are not yet spread across enough live outlets.
  - Revenue per FTE remains below mature SaaS benchmarks, which is acceptable only if the company keeps reusing the same launch-stack template rather than custom-projecting every chain.
  - The base case finishes with only about $185K of cash, so one quarter of delayed pilot conversion would likely force a top-up or a slower hiring plan.
  - The model still depends on a concentrated set of 20-25 multi-outlet groups by Y3, so a handful of delayed rollouts or churned chains would move EBITDA materially.
