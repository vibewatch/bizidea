scenarios:
  downside:
    description: Pilot conversion slips by about one quarter, attach fees stay closer to subscription-only pricing, and the company exits Y3 below the full 600-outlet SOM case.
    y3RevenueK: 1200.0
    y3EbitdaK: -650.0
    cashLowPointK: -110.0
    keyAssumptionChanges:
    - Q4Y3 exits at about 500 live outlets instead of 600.
    - Blended annual revenue per outlet falls toward about $3.0K because basis-point attach is weaker.
    - Sales cycles remain closer to six months, delaying pilot-to-production conversion.
  base:
    description: Milestone-gated hiring, one launch stack, and modest usage-fee attach carry the model to the researched 600-outlet SOM case by Q4Y3 while remaining just shy of breakeven.
    y3RevenueK: 1467.3
    y3EbitdaK: -440.8
    cashLowPointK: 184.6
    keyAssumptionChanges:
    - Blended annual revenue per outlet holds at the research-based $3.225K level.
    - The company reaches 300 live outlets by month 24 and 600 by month 36.
    - Hiring stays milestone-gated rather than adding a broad sales or product layer early.
  upside:
    description: Partner referrals begin helping in Y2, more merchants adopt the volume-fee module, and outlet expansion reaches the upper end of the beachhead faster than planned.
    y3RevenueK: 1700.0
    y3EbitdaK: -180.0
    cashLowPointK: 320.0
    keyAssumptionChanges:
    - Q4Y3 exits at about 680 live outlets instead of 600.
    - Blended annual revenue per outlet rises toward about $3.4K as attach rates improve.
    - Partner-sourced opportunities shorten the effective sales cycle and keep implementation utilization higher.
