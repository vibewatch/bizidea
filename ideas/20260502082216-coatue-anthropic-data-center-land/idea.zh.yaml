jobsToBeDone:
  - job: 当开发团队在筛选靠近电力资源的地块时，帮他们快速淘汰弱场址，这样期权预算只会花在真正能撑起锚定 AI 租户的地块上。
    currentAlternative: 顾问主导的研究和基于电子表格的筛选
    successMetric: 沉淀出投资备忘录所需天数，以及在 LOI 前淘汰坏地块的比例
  - job: 当基础设施投资人需要证实某个场址可信时，帮团队把尽调打包成一份共享的就绪记录，这样他们就能更快拿到内部批准，并推进与公用事业公司和租户的沟通。
    currentAlternative: 邮件线程、经纪商材料包和定制备忘录撰写
    successMetric: 从识别地块到场址期权获批的时间
