problem: >-
  AI
  园区开发商如今必须在算力租户尚未完全落定之前，就先控制住靠近稳定电力的土地。不过地块筛选仍主要依赖经纪商、顾问和电子表格备忘录，团队往往会把数月时间和大量期权预算浪费在那些后来才发现无法满足电力接入、分区、水资源或租户适配要求的地块上。随着投资人向上游土地储备推进，一个错误地块就可能拖住整轮建设周期。
targetUser:
  primary: AI 数据中心开发商和土地整合载体中的开发与投资团队
  secondary: 推进大负载园区项目的电力开发商
  buyer: 开发副总裁或基础设施投资负责人
startupThesis:
  nonObviousInsight: 稀缺资产已不再是泛化的数据中心容量，而是那些已完成前置承保、靠近电力资源，并具备通向兆瓦容量、审批许可和锚定 AI 租户可信路径的土地。
  beachhead: 为单租户 AI 园区承保 100-500 英亩、靠近大型电力资源地块的基础设施基金和 AI 数据中心开发商
  wedge: 把原始地块转成投资级场址就绪备忘录的流程，并输出电力、水资源、分区、环保和租户适配等维度的置信评分。
  whyNowCatalyst: Coatue 启动土地收购载体，以及与 Anthropic 相关的建设计划，都说明在 AI 基础设施开发起点，场址控制已成了一个紧迫且有预算支持的流程。
  ventureScalePath: 先成为场址承保的系统记录层，再沿着 AI 园区生命周期扩展到期权管理、公用事业协同、许可协调、贷款方尽调和租户引入。
solution: >-
  产品会导入候选地块，并把全部尽调步骤围绕一个问题组织起来：这个场址能否在锚定租户需要的时间表上，现实地撑起大规模 AI 负载。它结合地块级证据采集、标准化的 kill-go
  检查清单，以及围绕电力邻近性、水资源、分区、环境约束和园区适配度的置信评分。团队会得到一份共享备忘录，既能用于内部投资委员会决策，也能用于与顾问、公用事业公司、贷款方和潜在租户的外部协作。随着时间推移，这个平台会沉淀成一套专有数据集，记录真正推动
  AI 园区场址成交和建设落地的关键因素。
