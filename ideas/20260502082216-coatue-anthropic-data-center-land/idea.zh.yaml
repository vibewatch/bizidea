jobsToBeDone:
- job: 当开发团队筛选邻近电力的地块时，帮助其快速淘汰薄弱场址，从而只把期权预算花在能够承接锚定AI租户的地块上。
  currentAlternative: 顾问主导的研究和基于电子表格的筛选
  successMetric: 形成投资备忘录所需天数，以及在LOI之前被淘汰的不良场址比例
- job: 当基础设施投资人需要证明一个场址可信时，帮助团队将尽调打包成共享的就绪记录，从而获得内部批准，并更快推进与公用事业公司和租户的沟通。
  currentAlternative: 邮件往来、经纪材料包和定制备忘录撰写
  successMetric: 从识别地块到场址期权获批所需时间
