topRisks:
  - name: 顾问渠道阻力
    description: 工程和尽调顾问可能把产品视为对其可计费研究工作的威胁。
    mitigation: 把平台定位成前置筛选入口，并把顾问纳入流程，承接后续需要盖章的深入工作。
  - name: 公用事业数据不透明
    description: 如果电力和并网数据不完整或彼此矛盾，开发商可能不会信任自动化结论。
    mitigation: 先把产品做成证据与流程系统，并保留人工证实；只有在底层数据够明确的地方再叠加置信评分。
  - name: 买方集中度过高
    description: 初始客户群体较小且高度项目驱动，可能拖慢收入增长。
    mitigation: 先以按场址收费切入土地载体和中型开发商，再扩展到贷款方、租户和更广泛的园区流程。
