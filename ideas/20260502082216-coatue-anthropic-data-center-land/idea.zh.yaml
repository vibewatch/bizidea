problem: AI园区开发商如今必须在算力租户完全承诺之前，就先控制靠近可靠电力的土地。但地块筛选仍主要依赖经纪人、顾问和电子表格备忘录，导致团队在后续因电力接入、分区、水资源或租户匹配问题失败的场址上浪费数月时间和期权成本。随着投资人向上游的土地储备环节推进，一个错误地块就可能拖慢整个建设周期。
targetUser:
  primary: AI数据中心开发商及土地整合载体的开发与投资团队
  secondary: 推进大负荷园区项目的电力开发商
  buyer: 开发副总裁或基础设施投资负责人
startupThesis:
  nonObviousInsight: 稀缺资产已不再是通用型数据中心容量，而是那些已完成前期尽调、邻近电力、并且拥有通向兆瓦级供电、许可审批和锚定AI租户可信路径的土地。
  beachhead: 为单租户AI园区评估靠近大型电源的100-500英亩地块的基础设施基金和AI数据中心开发商
  wedge: 一套将原始地块转化为投资级场址就绪备忘录的工作流，并给出电力、水资源、分区、环境和租户匹配度的置信评分。
  whyNowCatalyst: Coatue推出土地收购载体以及与Anthropic相关的建设计划表明，在AI基础设施开发起点，场址控制已经成为一个紧迫且有资金支持的工作流。
  ventureScalePath: 先从场址尽调的记录系统切入，再沿AI园区全生命周期扩展到期权管理、公用事业沟通、许可协调、贷款方尽调和租户获取。
solution: 该产品导入候选地块，并将每一个尽调步骤围绕一个问题来组织：这个场址能否在锚定租户所需的时间表内，现实可行地支撑大规模AI负载。它结合地块级证据采集、标准化的淘汰/继续清单，以及围绕电力邻近性、水资源、分区、环境约束和园区适配度的置信评分。团队将获得一份共享备忘录，可在内部用于投资委员会决策，也可在外部与顾问、公用事业公司、贷款方和潜在租户协同使用。随着时间推移，平台会沉淀为一套专有数据集，记录真正决定AI园区场址是否能成交并建成的因素。
