openQuestions:
- How many parcels does a typical 100MW+ AI-campus buyer screen per closed site, and how much of that funnel is repeatable enough for software?
- Which utility and zoning data can be gathered pre-application with enough consistency to support credible confidence scores?
- Will consultants and brokers distribute this product if it shortens their work, or will they defend billable diligence as the default substitute?
- Is the beachhead large enough on a standalone basis, or does the company need early expansion into utility engagement, permitting coordination, or lender diligence to reach venture scale?
