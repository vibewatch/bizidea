  validationPlan:
  - priority: high
    question: How many 100MW+ parcels does a typical buyer screen before it signs one option or LOI?
    evidenceToGather: Interview 10 development/origination teams and audit their last three site funnels, including abandoned sites and consultant spend.
  - priority: high
    question: Which utility and county data can be collected reliably enough to automate confidence scores before formal studies?
    evidenceToGather: Run pilot diligence on 20 recent sites in Northern Virginia and Texas with utility, zoning, and environmental specialists.
  - priority: medium
    question: Will consultants and brokers act as channel partners or view the product as billable-work displacement?
    evidenceToGather: Test paid pilots with two advisory firms and measure whether exportable memos increase consultant throughput or trigger resistance.
  - priority: medium
    question: Does the buyer prefer annual seat contracts, per-parcel fees, or a hybrid tied to active site funnels?
    evidenceToGather: Price-test three packaging models during pilot sales and compare close rates versus project scope.
