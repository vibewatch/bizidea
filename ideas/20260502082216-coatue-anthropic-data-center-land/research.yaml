reportMemo:
  executiveTakeaways:
  - Capital is moving upstream from GPUs into powered land; Coatue's launch makes pre-option site control a funded workflow, not just a brokering exercise [1][19][21][27].
  - The bottleneck is power certainty and utility/process timing, not simply parcel discovery; load-queue, transmission, and large-load intake evidence shows why spreadsheets are too brittle [8][9][15][16].
  - 'This is a narrow but valuable buyer set: dozens of developer, operator, and land-vehicle teams can justify high ACVs because one bad parcel can waste months of diligence and option spend [6][10][15][19][22].'
  - Adjacent tools cover parcel data, power overlays, or advisory services, but the market still lacks a memo-first system of record that unifies kill/go evidence for AI-campus land [3][5][7][10][13][14][28].
  - Northern Virginia is the best proving ground because county standards and Dominion's explicit data-center workflow create repeatable, observable pain; Texas and Midwest corridors are the next logical expansion [15][16][17][18][19][20][27].
  - Biggest risk is not demand; it is adoption friction from utility opacity, consultant channel resistance, and the fact that this sells like infrastructure diligence, not lightweight proptech SaaS [12][15][16][17][28].
  marketDefinition: 'This market is pre-development software for large-load AI/data-center site underwriting: parcel intake, power/load feasibility, zoning and environmental gating, and investment-memo creation for 100MW+ campuses in U.S.-led markets [1][2][3][15][17][19]. It excludes generic CRE CRM, colocation leasing marketplaces, and downstream EPC/construction execution systems [4][5][24][26].'
  customerAndBuyer: Core ICP is the development/origination team inside data-center developers, land aggregation vehicles, and infrastructure investors pursuing powered campuses; the economic buyer is typically the VP/Head of Development or infrastructure investments, while the daily user is a site origination or development manager [3][5][10][15]. Budget likely comes from land origination, preconstruction diligence, or development operations rather than IT, and procurement friction is high because utilities, counties, and consultants still own parts of the truth set [6][15][16][17][28].
  buyingTriggers:
  - point: A new site-option budget or named tenant/AI-lab inquiry forces fast first-pass kill/go screening before exclusivity is granted.
    sourceRefs:
    - 1
    - 10
  - point: Utility intake for a large-load or data-center request creates a deadline to package credible power and timeline assumptions.
    sourceRefs:
    - 15
    - 16
  - point: County standards updates or expansion into a new market make reusable site-readiness checklists suddenly valuable.
    sourceRefs:
    - 17
    - 18
    - 29
  willingnessToPay:
    summary: No public SaaS price points surfaced, but buyers already pay for consultant-led site selection, utility coordination, and large campus/JV commitments; that supports willingness to pay for software that reduces false-positive site options and creates reusable diligence packs.
    sourceRefs:
    - 5
    - 6
    - 15
    - 19
    - 20
    - 26
    - 27
    - 28
  competitiveLandscape: The competitive set is fragmented across parcel-data platforms, power-intelligence layers, renewable siting tools, and incumbent advisors. Acres handles parcel/ownership/reporting workflows; LandGate layers power, fiber, and energy-market intelligence; Paces is closest to a power-development operating workflow; CBRE and Colliers sell services-heavy site-selection and capital-markets advisory [3][5][7][10][13][14][28]. The gap is a neutral, memo-first system of record built specifically for AI-campus kill/go decisions before full engineering spend [8][9][11][12][15][18].
  incumbentThesis:
  - incumbentClass: Brokerage and advisory firms
    point: CBRE/Colliers win relationships but not by default as software owners; their deliverables are services-heavy, project-specific, and less likely to compound into a reusable underwriting dataset.
    sourceRefs:
    - 3
    - 5
    - 28
  - incumbentClass: Horizontal land intelligence platforms
    point: Acres and similar parcel-data products solve ownership and mapping, but they stop short of integrating utility timing, zoning nuance, and tenant-fit into one investment memo.
    sourceRefs:
    - 7
    - 13
    - 14
  - incumbentClass: Renewable siting tools
    point: Paces is strong on power-development workflow, yet AI-campus buyers also need land committee memos, water/zoning evidence, and anchor-tenant fit rather than generation siting alone.
    sourceRefs:
    - 10
    - 11
    - 12
  - incumbentClass: Operators and cloud platforms
    point: Equinix, Digital Realty, Crusoe, and CoreWeave sell capacity or campuses, not a neutral pre-option underwriting layer for third-party buyers comparing raw parcels.
    sourceRefs:
    - 21
    - 24
    - 25
    - 26
    - 27
  regulatoryLandscape: There is no single federal permission set for AI-campus land. Friction sits in utility intake, local zoning and land-development approvals, and growing energy-efficiency expectations [15][16][17][18][28][29]. In hot markets like Northern Virginia, county-level standards are explicit enough to structure product workflow around them [15][16][17][18].
  technologyLandscape: Operator evidence shows the technical bar shifting toward AI-ready, high-density campuses with specialized power, cooling, and build-to-suit configurations rather than generic colo shells [19][20][21][22][23][24][25][26][27]. That favors software that can translate raw land into tenant-specific readiness instead of generic parcel lookup [8][10][11].
  distributionChannels:
  - point: Direct founder-led selling into developer, operator, and land-vehicle teams via data-center advisory and capital-markets networks is the clearest initial channel.
    sourceRefs:
