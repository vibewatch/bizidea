reportMemo:
  executiveTakeaways:
  - 资本正在从GPU向上游的具备电力条件土地转移；Coatue的动作使签订期权前的场址控制成为一个有预算支持的工作流，而不再只是经纪业务 [1][19][21][27]。
  - 瓶颈不在于找到地块，而在于电力确定性以及公用事业/流程时序；负荷排队、输电和大负荷受理流程的证据说明，电子表格过于脆弱 [8][9][15][16]。
  - 这是一个狭窄但高价值的买方群体：数十个开发商、运营商和土地载体团队都能为高ACV买单，因为一个错误地块就可能浪费数月尽调和期权支出 [6][10][15][19][22]。
  - 相邻工具覆盖了地块数据、电力叠图或顾问服务，但市场仍缺少一套以备忘录为核心、能统一AI园区土地淘汰/继续证据的记录系统 [3][5][7][10][13][14][28]。
  - 北弗吉尼亚是最好的验证场，因为县级标准和Dominion明确的数据中心流程带来了可重复、可观察的痛点；德州和中西部走廊则是下一步合乎逻辑的扩展方向 [15][16][17][18][19][20][27]。
  - 最大的风险不在需求，而在于公用事业不透明、顾问渠道阻力，以及该产品的销售方式更像基础设施尽调，而不是轻量级地产科技SaaS [12][15][16][17][28]。
  marketDefinition: 这个市场指的是面向大负荷AI/数据中心场址尽调的前期开发软件：包括地块导入、电力/负荷可行性、分区与环境卡点，以及为美国主导市场中100MW以上园区生成投资备忘录 [1][2][3][15][17][19]。它不包括通用CRE CRM、托管租赁市场和下游EPC/施工执行系统 [4][5][24][26]。
  customerAndBuyer: 核心ICP是数据中心开发商、土地整合载体和推进具备电力条件园区的基础设施投资人内部的开发/选址团队；经济买方通常是开发副总裁/负责人或基础设施投资负责人，而日常用户则是场址拓展或开发经理 [3][5][10][15]。预算更可能来自土地拓展、施工前尽调或开发运营，而非IT；同时，由于公用事业公司、县政府和顾问仍掌握部分真实信息，采购摩擦较高 [6][15][16][17][28]。
  buyingTriggers:
  - point: 新的场址期权预算或具名租户/AI实验室询盘，会迫使团队在授予排他权前快速完成首轮淘汰/继续筛查。
    sourceRefs:
    - 1
    - 10
  - point: 针对大负荷或数据中心项目的公用事业受理流程，会形成一个必须打包可信电力与时间假设的截止节点。
    sourceRefs:
    - 15
    - 16
  - point: 县级标准更新或进入新市场，会让可复用的场址就绪清单突然变得非常有价值。
    sourceRefs:
    - 17
    - 18
    - 29
  willingnessToPay:
    summary: 虽然没有公开的SaaS定价样本，但买方已经在为顾问主导的选址、公用事业协调以及大型园区/合资承诺付费；这说明他们愿意为能减少误判场址期权并生成可复用尽调材料包的软件买单。
    sourceRefs:
    - 5
    - 6
    - 15
    - 19
    - 20
    - 26
    - 27
    - 28
  competitiveLandscape: 竞争格局分散在地块数据平台、电力情报层、可再生能源选址工具以及传统顾问之间。Acres覆盖地块/产权/报告工作流；LandGate叠加电力、光纤和能源市场情报；Paces最接近电力开发操作工作流；CBRE和Colliers则出售服务密集型的选址与资本市场顾问服务 [3][5][7][10][13][14][28]。市场缺口在于一套中立、以备忘录为核心、专门服务于全面工程投入前AI园区淘汰/继续决策的记录系统 [8][9][11][12][15][18]。
  incumbentThesis:
  - incumbentClass: 经纪与顾问机构
    point: CBRE/Colliers擅长经营客户关系，但并不会天然成为软件所有者；它们的交付物服务属性强、项目属性重，也更难沉淀为可复用的尽调数据集。
    sourceRefs:
    - 3
    - 5
    - 28
  - incumbentClass: 横向土地情报平台
    point: Acres及类似地块数据产品解决的是产权和制图问题，但尚未把公用事业时序、分区细节和租户匹配整合进同一份投资备忘录。
    sourceRefs:
    - 7
    - 13
    - 14
  - incumbentClass: 可再生能源选址工具
    point: Paces在电力开发工作流上很强，但AI园区买方除了发电选址之外，还需要土地委员会备忘录、水资源/分区证据以及锚定租户匹配。
    sourceRefs:
    - 10
    - 11
    - 12
  - incumbentClass: 运营商与云平台
    point: Equinix、Digital Realty、Crusoe和CoreWeave销售的是容量或园区，而不是供第三方买方比较原始地块时使用的中立、签订期权前的尽调层。
    sourceRefs:
    - 21
    - 24
    - 25
    - 26
    - 27
  regulatoryLandscape: AI园区土地并不存在统一的联邦许可体系。摩擦主要出现在公用事业受理、本地分区和土地开发审批，以及不断提高的能效要求上 [15][16][17][18][28][29]。在北弗吉尼亚这样的热点市场，县级标准已经足够明确，可以据此构建产品工作流 [15][16][17][18]。
  technologyLandscape: 运营商证据显示，技术门槛正从通用托管机房外壳转向AI就绪、高密度园区，这类园区具备专门的电力、冷却和定制建设配置 [19][20][21][22][23][24][25][26][27]。这更有利于能够把原始土地转化为租户特定就绪度的软件，而不是通用的地块查询工具 [8][10][11]。
  distributionChannels:
  - point: 通过数据中心顾问与资本市场网络，直接向开发商、运营商和土地载体团队开展创始人主导销售，是最明确的初始渠道。
    sourceRefs:
    - 5
    - 6
    - 28
  - point: 与公用事业公司、经济发展团队和工程顾问联合销售能够缩短信任建立周期，因为这些参与方本就处于尽调闭环之中。
    sourceRefs:
    - 15
    - 16
    - 27
  - point: 扩张应沿着那些单个团队会筛选大量地块的市场集群推进，而不是面向一次性乡村土地买家。
    sourceRefs:
    - 17
    - 19
    - 22
    - 29
  partnershipEcosystem:
  - point: 公用事业和并网顾问是天然合作伙伴，因为他们的数据和流程检查点本就是淘汰/继续决策的核心。
    sourceRefs:
    - 15
    - 16
  - point: 县级分区和环境专家仍然不可或缺，因为各地市场的地方法规和标准差异很大。
    sourceRefs:
    - 17
    - 18
  - point: 土地数据合作伙伴可以增强地块、产权和报告生成层，而创业公司则掌握尽调工作流。
    sourceRefs:
    - 7
    - 13
    - 14
  dataMoats:
  - point: 最强的护城河是一套不断增长的候选场址失败原因数据库：包括电力时序不足、分区不匹配、环境红旗或租户不匹配。
    sourceRefs:
