competitors:
- name: Paces
  stage: scale-up
  wedge: 正在争取数据中心开发商的电力开发操作系统。
  pricing: 定制化 / 销售驱动；抓取页面中未找到公开定价。
  strength: 在选址、政策、并网和电力开发工作流方面实力强。
  weaknessVsUs: 相比中立的、以备忘录为核心的AI园区土地尽调，更偏向服务电力开发商。
  sourceRefs:
  - 10
  - 11
  - 12
- name: LandGate
  stage: scale-up
  wedge: 面向数据中心开发商的地理空间土地、电力、光纤和消纳情报。
  pricing: 定制化 / 产品模块驱动；抓取页面中未找到公开定价。
  strength: 提供与能源基础设施相关的丰富电力与场址情报内容。
  weaknessVsUs: 在数据层能力上更强，但在协作式IC备忘录、工作流控制和顾问协调方面较弱。
  sourceRefs:
  - 7
  - 8
  - 9
- name: Acres
  stage: scale-up
  wedge: 地块、产权、制图与物业报告工作流。
  pricing: 定制化 / 企业级；抓取页面中未找到公开定价。
  strength: 提供广泛的地块与产权人情报，并具备报告生成功能。
  weaknessVsUs: 缺乏明确的公用事业、并网以及AI园区就绪度逻辑。
  sourceRefs:
  - 13
  - 14
- name: CBRE Data Center + Site Selection
  stage: incumbent
  wedge: 以顾问服务驱动的选址、资本市场和数据中心服务。
  pricing: 定制顾问服务 / 按报价收费。
  strength: 拥有深厚客户关系、交易经验和资本市场公信力。
  weaknessVsUs: 服务驱动的工作流较难快速标准化为可复用、由客户掌控的尽调系统。
  sourceRefs:
  - 2
  - 3
  - 4
  - 28
regulatoryTechnicalConstraints:
- point: 公用事业针对大负荷和数据中心的申请流程已经足够明确，任何产品都必须支持正式证据打包，而不仅仅是轻量评分。
  sourceRefs:
  - 15
  - 16
- point: 各地县级分区和数据中心标准差异显著，因此模板化但市场专属的工作流至关重要。
  sourceRefs:
  - 17
  - 18
- point: 具备电力条件并不等于具备开工条件；在缺乏来源证据的情况下过度自动化场址置信判断，会损害公信力。
  sourceRefs:
  - 9
  - 12
- point: AI园区的技术需求在密度、冷却和时序上都高度租户特定，因此地块评分必须保持可配置。
  sourceRefs:
  - 19
  - 20
  - 21
  - 22
  - 23
  - 24
  - 26
- point: 该产品将面向基础设施预算和尽调流程销售，这意味着企业级采购周期和安全要求。
  sourceRefs:
  - 5
  - 6
  - 28
validationSignals:
- point: Coatue推出了与AI数据中心需求相关的电力型土地项目，验证了上游土地这一工作流具备投资价值。
  sourceRefs:
  - 1
- point: Dominion设有专门的数据中心申请流程，这是专门化大负荷需求在运营层面真实存在的强烈信号。
  sourceRefs:
  - 15
- point: Loudoun公开发布面向数据中心的专属标准和选址资料，表明在美国最大市场中，本地流程复杂度很高。
  sourceRefs:
  - 17
  - 18
- point: Applied Digital表示其已在Ellendale上线首个50 MW项目，凸显了AI园区开发的规模和资本密集度。
  sourceRefs:
  - 20
- point: Crusoe正在公开展示Abilene AI数据中心，进一步印证了基础设施正朝着定制化AI园区发展。
  sourceRefs:
  - 22
- point: Digital Realty新增了DGX-H100就绪容量，并成立了定制建设合资项目，说明传统玩家仍在积极投资AI就绪形态。
  sourceRefs:
  - 26
  - 27
openQuestions:
- 一个典型的100MW以上AI园区买方每拿下一个场址，会筛选多少个地块？其中有多少漏斗流程足够可重复，适合软件化？
- 在正式申请前，哪些公用事业和分区数据能以足够一致的方式获取，从而支撑可信的置信评分？
- 如果该产品缩短他们的工作，顾问和经纪商会愿意分销它，还是会坚持把收费尽调作为默认替代方案？
- 这个滩头市场单独来看是否足够大，还是公司需要尽早扩展到公用事业沟通、许可协调或贷款方尽调，才能达到创业规模？
