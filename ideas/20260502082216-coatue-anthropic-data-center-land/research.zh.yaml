categoryDynamics:
  growthRate: 快速扩张；AI 园区需求增长速度快于公用事业和审批能力，不过比起单一 CAGR，运营商和顾问活动集更能支持决策。
  growthRateSourceRefs:
    - 6
    - 19
    - 20
    - 26
    - 27
  tailwinds:
    - point: 投资人正明确向通电土地和 build-to-suit 基础设施的上游迁移。
      sourceRefs:
        - 1
        - 19
        - 25
        - 27
    - point: 运营商正在营销 AI 专用园区和 AI-ready 设施，而不再只是泛化容量。
      sourceRefs:
        - 20
        - 21
        - 22
        - 23
        - 24
        - 26
    - point: 公用事业公司和经济发展团队越来越围绕“大负载机会捕捉”来组织资源。
      sourceRefs:
        - 15
        - 27
  headwinds:
    - point: 负载排队和并网时序可能在流程后段重新定价，甚至直接让地块失效。
      sourceRefs:
        - 9
        - 12
        - 15
        - 16
    - point: 县级标准和分区变化会显著压缩可服务库存。
      sourceRefs:
        - 17
        - 18
    - point: 传统顾问已掌握大量买方关系，并能把“像软件一样的输出”打包进服务里。
      sourceRefs:
        - 3
        - 5
        - 28
competitors:
  - name: Paces
    stage: scale-up
    wedge: 面向电力开发的操作系统，现正吸引数据中心开发商。
    pricing: 定制 / 销售驱动；已抓取页面未发现公开定价。
    strength: 在选址、政策、并网和电力开发流程方面能力很强。
    weaknessVsUs: 相比我们的中立型、以备忘录为先的 AI 园区土地承保，它更偏向电力开发商情境。
    sourceRefs:
      - 10
      - 11
      - 12
  - name: LandGate
    stage: scale-up
    wedge: 面向数据中心开发商的地理空间土地、电力、光纤和包销情报平台。
    pricing: 定制 / 产品模块化；已抓取页面未发现公开定价。
    strength: 拥有和能源基础设施强绑定的电力与场址情报内容。
    weaknessVsUs: 更强的是数据图层，而不是协同式 IC 备忘录、流程控制和顾问协同。
    sourceRefs:
      - 7
      - 8
      - 9
  - name: Acres
    stage: scale-up
    wedge: 地块、所有权、地图和物业报告流程。
    pricing: 定制 / 企业版；已抓取页面未发现公开定价。
    strength: 拥有广泛的地块与业主情报，以及报告生成能力。
    weaknessVsUs: 缺少明确的公用事业、并网和 AI 园区就绪逻辑。
    sourceRefs:
      - 13
      - 14
  - name: CBRE Data Center + Site Selection
    stage: incumbent
    wedge: 以顾问为主的数据中心选址、资本市场和服务方案。
    pricing: 定制咨询 / 报价制。
    strength: 关系深、交易经验足、资本市场可信度高。
    weaknessVsUs: 服务主导的流程更难标准化成一套可复用、且由客户自己拥有的承保系统。
    sourceRefs:
      - 2
      - 3
      - 4
      - 28
regulatoryTechnicalConstraints:
  - point: 公用事业对大负载和数据中心的受理流程已够明确，因此任何产品都必须支持正式证据打包，而不止是轻量评分。
    sourceRefs:
      - 15
      - 16
  - point: 不同地方的县级分区和数据中心标准差异很大，因此模板化但按市场本地化的流程至关重要。
    sourceRefs:
      - 17
      - 18
  - point: “电力就绪”不等于“可开工”；如果没有来源证据就过度自动化场址置信判断，很容易损失可信度。
    sourceRefs:
      - 9
      - 12
  - point: AI 园区的技术需求会因租户而异，尤其体现在密度、制冷和上线时序，因此地块评分必须保持可配置。
    sourceRefs:
      - 19
      - 20
      - 21
      - 22
      - 23
      - 24
      - 26
  - point: 产品将卖给基础设施预算和尽调流程，也就是说企业级采购周期和安全要求不可回避。
    sourceRefs:
      - 5
      - 6
      - 28
validationSignals:
  - point: Coatue 推出了与 AI 数据中心需求绑定的通电土地项目，证实了上游土地已是一个可投资流程。
    sourceRefs:
      - 1
  - point: Dominion 维护着专门的数据中心申请流程，这强烈说明专业化大负载需求在运营层面是真实存在的。
    sourceRefs:
      - 15
  - point: Loudoun 会发布面向数据中心的专项标准和选址材料，说明在美国最大市场里，本地流程复杂度已够高。
    sourceRefs:
      - 17
      - 18
  - point: Applied Digital 表示已在 Ellendale AI 工厂上线首个 50 MW，凸显了 AI 园区开发的规模和资本强度。
    sourceRefs:
      - 20
  - point: Crusoe 正公开展示 Abilene AI 数据中心，进一步强化了基础设施正向定制化 AI 园区迁移的判断。
    sourceRefs:
      - 22
  - point: Digital Realty 新增了 DGX-H100-ready 容量，并成立 build-to-suit JV，说明传统玩家仍在重金押注 AI-ready 形态。
    sourceRefs:
      - 26
      - 27
openQuestions:
  - 一个典型的 100MW+ AI 园区买方，为了成交 1 个场址通常要筛多少块地？其中又有多大比例够可重复，值得软件化？
  - 哪些公用事业和分区数据能在正式申请前稳定取得，并够撑起可信赖的置信评分？
  - 如果产品能缩短工作时长，顾问和经纪商会愿意分发它，还是会继续把可计费尽调当成默认替代方案来捍卫？
  - 单看滩头市场，它到底够不够大？还是公司必须尽早扩展到公用事业协同、许可协调或贷款方尽调，才能达到风险投资规模？
