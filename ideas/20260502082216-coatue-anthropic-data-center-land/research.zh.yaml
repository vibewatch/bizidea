  sensitivityCases:
  - case: 公用事业周期变长
    impact: 产品价值会上升，因为买方更需要前期筛选，但随着项目更难以做出有把握的尽调判断，销售周期也会拉长。
    sourceRefs:
    - 9
    - 15
    - 16
  - case: AI园区建设节奏恢复常态
    impact: 由于买方基础过于集中，滩头市场会收缩；此时上行空间取决于能否扩展到更广泛的园区开发工作流。
    sourceRefs:
    - 1
    - 6
    - 19
    - 21
    - 27
  - case: 传统顾问更快实现产品化
    impact: 独立席位定价会被压缩，从而使合作伙伴主导分发和专有结果数据变得更重要。
    sourceRefs:
