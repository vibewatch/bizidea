    - 5
    - 7
    - 28
  validationPlan:
  - priority: high
    question: 一个典型买方在签下一份期权或LOI之前，通常会筛选多少个100MW以上地块？
    evidenceToGather: 访谈10个开发/选址团队，并审计他们最近三次场址漏斗，包括被放弃的场址和顾问支出。
  - priority: high
    question: 在正式研究之前，哪些公用事业和县级数据可以被稳定采集到足以自动化置信评分？
    evidenceToGather: 联合公用事业、分区和环境专家，对北弗吉尼亚和德州最近的20个场址开展试点尽调。
  - priority: medium
    question: 顾问和经纪商会成为渠道合作伙伴，还是会把该产品视为对其收费工作的替代？
    evidenceToGather: 与两家咨询公司测试付费试点，并衡量可导出备忘录是提高顾问吞吐效率还是引发阻力。
  - priority: medium
    question: 买方更偏好年度席位合同、按地块收费，还是与活跃场址漏斗绑定的混合模式？
    evidenceToGather: 在试点销售期间对三种打包模型进行价格测试，并比较成交率与项目范围。
