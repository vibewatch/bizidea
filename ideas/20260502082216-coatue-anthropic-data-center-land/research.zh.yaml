reportMemo:
  executiveTakeaways:
    - 资本正从 GPU 上游迁移到通电土地；Coatue 的动作让“先锁定场址再谈开发”变成了一个有预算支持的流程，而不止是经纪业务的延伸 [1][19][21][27]。
    - 真正卡住的地方是电力确定性和公用事业流程时序，而不止是找到地块；负载排队、输电和大负载受理相关证据都说明，电子表格太脆弱，扛不住这类决策 [8][9][15][16]。
    - 这是一批买方数量不多、但单价很高的客户：几十个开发商、运营商和土地载体团队，就够撑起高 ACV，由于只要选错一块地，就会白白浪费数月尽调和期权成本 [6][10][15][19][22]。
    - 周边工具已覆盖了地块数据、电力图层或咨询服务，不过市场仍缺一套“以备忘录为先”的系统记录层，把 AI 园区土地的 kill/go 证据统一起来 [3][5][7][10][13][14][28]。
    - >-
      北弗吉尼亚是最佳试验场，由于县级标准和 Dominion 明确的数据中心流程，把痛点变成了可重复、可观察的问题；Texas 和中西部电力走廊是下一步最自然的扩展方向
      [15][16][17][18][19][20][27]。
    - 最大风险不是需求，而是采用摩擦：公用事业数据不透明、顾问渠道阻力，以及这门生意卖起来更像基础设施尽调，而不是轻量 proptech SaaS [12][15][16][17][28]。
  marketDefinition: >-
    这个市场能定义为面向大负载 AI/数据中心场址承保的前开发软件：包括地块导入、电力/负载可行性、分区与环保卡点，以及为 100MW+ 园区生成投资备忘录，重点集中以美国为先的市场
    [1][2][3][15][17][19]。它不包括泛用 CRE CRM、托管机房租赁市场，也不包括下游 EPC/施工执行系统 [4][5][24][26]。
  customerAndBuyer: >-
    核心 ICP 是数据中心开发商、土地整合载体和基础设施投资人内部负责通电园区的开发/源头拓展团队；经济买方通常是开发副总裁、开发负责人或基础设施投资负责人，而日常使用者更可能是场址源头拓展经理或开发经理
    [3][5][10][15]。预算大概率来自土地拓展、前期施工尽调或开发运营，而不是 IT；同时采购摩擦会很高，由于公用事业公司、县政府和顾问仍掌握着事实集合中的关键部分 [6][15][16][17][28]。
  buyingTriggers:
    - point: 新一轮场址期权预算，或来自具名租户/AI 实验室的询盘，会逼着团队在拿排他权之前先做快速的首轮 kill/go 筛选。
      sourceRefs:
        - 1
        - 10
    - point: 面向大负载或数据中心的公用事业受理流程一旦启动，就会产生打包电力与时序假设的明确截止时间。
      sourceRefs:
        - 15
        - 16
    - point: 县级标准更新，或团队进入一个新市场时，可复用的场址就绪检查清单会突然变得非常有价值。
      sourceRefs:
        - 17
        - 18
        - 29
  willingnessToPay:
    summary: 公开渠道没有发现 SaaS 定价，不过买方本来就在为顾问主导的场址选择、公用事业协调和大型园区/JV 投入付费；这够撑起一款软件，只要它能减少“假阳性”地块期权，并产出可复用的尽调材料包。
    sourceRefs:
      - 5
      - 6
      - 15
      - 19
      - 20
      - 26
      - 27
      - 28
  competitiveLandscape: >-
    竞争格局是碎片化的，分散在地块数据平台、电力情报图层、可再生能源选址工具以及传统顾问之间。Acres 处理地块/所有权/报告流程；LandGate 叠加电力、光纤和能源市场情报；Paces
    最接近电力开发流程；CBRE 和 Colliers 则售卖服务占比较重的选址与资本市场顾问方案 [3][5][7][10][13][14][28]。真正的空白，是一套中立、以备忘录为先、专为 AI
    园区在完整工程投入前做 kill/go 决策而建的系统记录层 [8][9][11][12][15][18]。
  incumbentThesis:
    - incumbentClass: 经纪与咨询机构
      point: CBRE/Colliers 拿得下客户关系，不过它们默认不会成为软件所有者；其交付物高度依赖服务、项目属性很重，也不太会自然积累成可复用的承保数据集。
      sourceRefs:
        - 3
        - 5
        - 28
    - incumbentClass: 横向土地情报平台
      point: Acres 及类似地块数据产品擅长处理所有权和地图，不过还没有把公用事业时序、分区细节和租户适配统一进一份投资备忘录。
      sourceRefs:
        - 7
        - 13
        - 14
    - incumbentClass: 可再生能源选址工具
      point: Paces 在电力开发流程上很强，不过 AI 园区买方还需要土地委员会备忘录、水资源/分区证据，以及锚定租户适配，而不仅仅是发电选址。
      sourceRefs:
        - 10
        - 11
        - 12
    - incumbentClass: 运营商与云平台
      point: Equinix、Digital Realty、Crusoe 和 CoreWeave 卖的是容量或园区，而不是面向第三方买方、用于比较原始地块的中立型前期承保层。
      sourceRefs:
        - 21
        - 24
        - 25
        - 26
        - 27
  regulatoryLandscape: >-
    AI 园区用地并不存在统一的联邦审批包。真正的摩擦集中在公用事业受理、本地分区和土地开发审批，以及日益增强的能效要求
    [15][16][17][18][28][29]。在北弗吉尼亚这类热点市场，县级标准已清晰到够围绕其搭建产品流程 [15][16][17][18]。
  technologyLandscape: >-
    运营商层面的证据说明，技术门槛正在从泛用 colo 外壳转向面向 AI 的高密度园区，并需要更专门化的供电、制冷和 build-to-suit 配置
    [19][20][21][22][23][24][25][26][27]。这更偏向那些能把原始土地翻译成“租户特定就绪度”的软件，而不是简单做地块查询的产品 [8][10][11]。
  distributionChannels:
    - point: 通过数据中心顾问和资本市场网络，由创始人主导直销给开发商、运营商和土地载体团队，是最清晰的起始渠道。
      sourceRefs:
        - 5
        - 6
        - 28
    - point: 与公用事业公司、经济发展团队和工程顾问联合销售，能缩短信任建立周期，由于这些参与方本来就在尽调闭环里。
      sourceRefs:
        - 15
        - 16
        - 27
    - point: 扩张应沿着“一个团队会反复筛很多地块”的市场集群推进，而不是追逐一次性农村土地买家。
      sourceRefs:
        - 17
        - 19
        - 22
        - 29
  partnershipEcosystem:
    - point: 公用事业与并网顾问是天然合作伙伴，由于它们的数据和流程检查点本来就是 kill/go 决策的核心。
      sourceRefs:
        - 15
        - 16
    - point: 县级分区与环保专家仍不可或缺，由于地方条例和标准在不同市场之间差异很大。
      sourceRefs:
        - 17
        - 18
    - point: 土地数据合作伙伴能补充地块、所有权和报告生成层，而创业公司自己掌握承保流程。
      sourceRefs:
        - 7
        - 13
        - 14
  dataMoats:
    - point: 最强的护城河是一套不断增长的失败数据库：候选场址为什么会由于电力时序不足、分区不匹配、环保红旗或租户不适配而被淘汰。
      sourceRefs:
        - 8
        - 9
        - 10
        - 12
    - point: 地块级证据包和报告模板会随着时间积累，产出更快、也更值得信任的投资委员会输出。
      sourceRefs:
        - 13
        - 14
        - 17
        - 18
    - point: 随着 AI 园区运营商披露更多供电/制冷配置，平台能把土地就绪度与真实已部署设施做基准对照。
      sourceRefs:
        - 19
        - 20
        - 21
        - 22
        - 23
        - 24
        - 26
  geographicConsiderations:
    - point: 北弗吉尼亚是最适合切入的市场，由于明确的县级标准和 Dominion 的大负载流程，能制造高密度、可重复的尽调痛点。
      sourceRefs:
        - 15
        - 16
        - 17
        - 18
    - point: Texas 和中西部电力走廊是下一步最合适的扩展方向，由于 AI 园区公告和“以电力为先”的选址逻辑正在当地加速。
      sourceRefs:
        - 19
        - 20
        - 22
        - 27
        - 27
    - point: 一旦通电土地的重要性超过历史上的光纤密度，更多新兴市场也会变得关键。
      sourceRefs:
        - 6
        - 8
        - 9
        - 29
  sensitivityCases:
    - case: 公用事业周期进一步拉长
      impact: 产品价值会上升，由于买方更需要前置过滤，不过销售周期也会延长，由于项目更难在前期做出高置信承保。
      sourceRefs:
        - 9
        - 15
        - 16
    - case: AI 园区建设节奏趋于常态
      impact: 滩头市场会收缩，由于买方基数高度集中；此时上行空间就取决于能否向更广的园区开发流程扩展。
      sourceRefs:
        - 1
        - 6
        - 19
        - 21
        - 27
    - case: 既有顾问更快完成产品化
      impact: 独立席位定价会被压缩，因此伙伴驱动分发和专有结果数据会变得更重要。
      sourceRefs:
        - 3
        - 5
        - 7
        - 28
  validationPlan:
    - priority: high
      question: 一个典型买方在签下 1 个场址期权或 LOI 之前，通常会筛多少个 100MW+ 地块？
      evidenceToGather: 访谈 10 个开发/源头拓展团队，并审计他们最近 3 条选址漏斗，包括放弃的场址和顾问支出。
    - priority: high
      question: 在正式研究前，哪些公用事业和县级数据能稳定到够支持自动化置信评分？
      evidenceToGather: 与公用事业、分区和环保专家合作，在北弗吉尼亚和 Texas 的 20 个近期场址上跑试点尽调。
    - priority: medium
      question: 顾问和经纪商会把产品当成渠道伙伴，还是会把它看作挤占可计费工作的替代品？
      evidenceToGather: 与两家咨询机构测试付费试点，观察可导出的备忘录是否拉升顾问吞吐，还是触发阻力。
    - priority: medium
      question: 买方更偏好年度席位合同、按地块收费，还是和活跃场址漏斗绑定的混合方案？
      evidenceToGather: 在试点销售中测试 3 套打包方式，并比较成交率与项目范围之间的差异。
analysisModels:
  marketMapDiagram:
    title: 通电土地承保市场图谱
    mermaid: |-
      quadrantChart
        title 通电土地承保市场图谱
        x-axis 低专业化 --> 高专业化
