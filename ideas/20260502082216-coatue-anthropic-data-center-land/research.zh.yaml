  fiveForces:
    supplierPower:
      score: 4
      rationale: 公用事业公司、并网流程和地方审批机构掌控了软件无法替代的关键输入，因此上游数据与流程供应方拥有很高议价权。
      sourceRefs:
        - 15
        - 16
        - 17
        - 18
        - 28
        - 29
    buyerPower:
      score: 4
      rationale: 买方群体相对较小、专业度高且强项目驱动，因此每个账户都有较强谈判能力，并会要求流程高度贴合自身流程。
      sourceRefs:
        - 6
        - 10
        - 15
        - 19
    threatOfEntrants:
      score: 3
      rationale: 软件本身并不难做，不过信任、本地流程数据和可复用承保模板更难积累。
      sourceRefs:
        - 7
        - 10
        - 13
        - 15
    threatOfSubstitutes:
      score: 5
      rationale: 顾问、电子表格、地块数据工具和传统咨询机构已解决了流程中的部分问题，在很多交易里仍会是默认替代方案。
      sourceRefs:
        - 3
        - 5
        - 7
        - 10
        - 13
        - 28
    competitiveRivalry:
      score: 4
      rationale: 尽管今天还没有一家厂商真正掌握完整的 AI 园区承保流程，不过相邻品类之间的竞争已很激烈。
      sourceRefs:
        - 3
        - 5
        - 7
        - 10
        - 13
        - 28
  pestle:
    - factor: 政治
      impact: negative
      point: 县级标准和分区决策会大幅限制哪些场址可行，以及它们能以多快速度获批。
      sourceRefs:
        - 17
        - 18
    - factor: 经济
      impact: positive
      point: 投资人和运营商的资金仍在持续流向 AI 园区和 build-to-suit 扩张，这为更好的土地承保工具交付了预算空间。
      sourceRefs:
        - 1
        - 19
        - 20
        - 26
        - 27
    - factor: 社会
      impact: negative
      point: 随着数据中心在本地规划流程中越来越显眼，土地使用审查也在升温，这进一步提高了对可审计场址备忘录的需求。
      sourceRefs:
        - 17
        - 18
    - factor: 技术
      impact: positive
      point: 面向 AI 的园区设计正越来越围绕电力密度、制冷和租户适配展开专业化，这会抬高专用承保软件的价值。
      sourceRefs:
        - 19
        - 20
        - 21
        - 22
        - 23
        - 24
        - 26
    - factor: 法律
      impact: negative
      point: 正式的公用事业申请和并网流程意味着，如果缺少文档证据，或者过度依赖自动化评分，风险会很高。
      sourceRefs:
        - 15
        - 16
    - factor: 环境
      impact: negative
      point: 功耗和能效审查在土地与许可之外，又叠加出了一层新的尽调要求。
      sourceRefs:
        - 24
        - 26
        - 28
        - 29
  adoptionFrictionMatrix:
    - friction: 正式研究前的公用事业数据不透明
      severity: high
      affectedBuyer: 开发负责人
      mitigation: 先从证据采集和人工复核做起，不要过早宣称能完全自动判断并网确定性。
      sourceRefs:
        - 15
        - 16
    - friction: 不同县的本地分区和标准差异很大
      severity: high
      affectedBuyer: 源头拓展经理
      mitigation: 在首批滩头市场中，先建立按县定制的模板和条例库。
      sourceRefs:
        - 17
        - 18
    - friction: 顾问和经纪商流程惯性强
      severity: medium
      affectedBuyer: 开发负责人
      mitigation: 导出对顾问友好的备忘录材料包，并把产品定位成前端漏斗优化器。
      sourceRefs:
        - 3
        - 5
        - 28
    - friction: 买方集中度较高
      severity: medium
      affectedBuyer: Founder/CEO
      mitigation: 先锁定多项目土地载体和运营商，再扩展到贷款方、公用事业和许可流程。
      sourceRefs:
        - 1
        - 6
        - 27
market:
  tam:
    value: $96.0M
    rationale: >-
      估算方式 = 300 个活跃全球买方团队 × 平均 $180k 年度授权（$54.0M）+ 每年 1,500 次大型场址筛选 × $28k
      承保费用（$42.0M）；这一规模受限于眼下从顾问、运营商和公用事业证据中可见的、仍相对集中的买方群体。
