topRisks:
  - name: Consultant channel resistance
    description: Engineering and diligence consultants may see the product as a threat to billable study work.
    mitigation: Position the platform as the front door for earlier screening and package consultants into the workflow for stamped follow-on work.
  - name: Utility data opacity
    description: Developers may not trust automated conclusions if power and interconnection data are incomplete or inconsistent.
    mitigation: Start as an evidence and workflow system with human verification, then layer confidence scoring only where the supporting data are explicit.
  - name: Narrow buyer concentration
    description: The initial customer set is small and deal-driven, which can slow revenue growth.
    mitigation: Start with land vehicles and mid-market developers on per-site pricing, then expand into lenders, tenants, and broader campus workflows.
