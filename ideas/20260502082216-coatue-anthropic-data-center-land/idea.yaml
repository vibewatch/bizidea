problem: AI campus developers now need control of land near dependable power before a compute tenant is fully committed. Yet parcel selection is still driven by brokers, consultants, and spreadsheet memos, so teams waste months and option dollars on sites that later fail on power access, zoning, water, or tenant fit. As investors move upstream into land banking, one bad parcel can stall a whole build cycle.
targetUser:
  primary: Development and investment teams at AI data-center developers and land aggregation vehicles
  secondary: Power developers pursuing large-load campus projects
  buyer: VP of Development or Head of Infrastructure Investments
startupThesis:
  nonObviousInsight: The scarce asset is no longer generic data-center capacity; it is pre-underwritten, power-adjacent land with a credible path to megawatts, permits, and an anchor AI tenant.
  beachhead: Infra funds and AI data-center developers underwriting 100-500 acre parcels near large power sources for single-tenant AI campuses
  wedge: A workflow that turns raw parcels into an investment-grade site readiness memo with power, water, zoning, environmental, and tenant-fit confidence scores.
  whyNowCatalyst: Coatue's launch of a land-buying vehicle and the Anthropic-linked buildout signal that site control has become an urgent, funded workflow at the start of AI infrastructure development.
  ventureScalePath: Start as the system of record for site underwriting, then expand into option management, utility engagement, permitting coordination, lender diligence, and tenant procurement across the AI campus lifecycle.
solution: "The product ingests candidate parcels and structures every diligence step around one question: can this site realistically support a large AI load on the timeline an anchor tenant needs. It combines parcel-level evidence capture, standardized kill-go checklists, and confidence scoring across power proximity, water, zoning, environmental constraints, and campus fit. Teams get a shared memo they can use internally for investment committee decisions and externally with consultants, utilities, lenders, and prospective tenants. Over time, the platform becomes a proprietary dataset of what actually makes AI campus sites transact and get built."
goToMarketSeed:
  firstCustomer: Origination team at a private land-aggregation vehicle buying 100MW-plus AI campus sites near large power sources for Anthropic-adjacent demand
  buyingTrigger: Approval of a new site-option budget or an inquiry from an AI lab, cloud provider, or developer seeking a powered campus
  currentAlternative: Brokers, local counsel, utility consultants, and spreadsheet-based investment memos
  switchingReason: It compresses first-pass diligence from weeks to days and creates one reusable proof package for investment committees, utilities, lenders, and anchor tenants.
  pricingHypothesis: Annual seat license for active development teams plus per-parcel underwriting fees and portfolio monitoring tiers
