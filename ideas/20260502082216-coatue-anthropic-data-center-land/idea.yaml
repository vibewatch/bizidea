jobsToBeDone:
  - job: When a development team is screening power-adjacent parcels, help it reject weak sites quickly, so they can spend option dollars only on parcels that can support an anchor AI tenant.
    currentAlternative: Consultant-led studies and spreadsheet-based screening
    successMetric: Days to investment memo and percentage of bad sites rejected before LOI
  - job: When an infra investor needs to prove a site is credible, help the team package diligence into a shared readiness record, so they can win internal approval and move faster with utilities and tenants.
    currentAlternative: Email threads, broker packages, and custom memo writing
    successMetric: Time from parcel identification to approved site option
