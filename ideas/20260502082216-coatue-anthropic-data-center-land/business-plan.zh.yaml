slug: power-site-underwriting-os
date: 2026-05-02
executiveSummary: >-
  Power-site Underwriting OS 瞄准的是 AI 园区开发前期的关键流程：开发商和土地载体要先判断一块 100MW+
  地块值不值得拿下期权。研究说明，市场对通电土地的需求既急迫又有预算支持，不过眼下流程仍被经纪商、 顾问、公用事业邮件和电子表格备忘录割裂开来。首个滩头市场应是北弗吉尼亚的源头拓展团队，由于 Dominion
  专门的数据中心受理流程和 Loudoun 明确的标准，让痛点既可观察、可重复，也可产品化。MVP 应是一个以备忘录为先、 人工校验的证据系统，把原始地块转成围绕电力、分区、水资源、环保与租户适配的 kill/go
  决策。GTM 从付费试点开始， 触发点是新场址期权预算获批或具名租户询盘；一旦证实成功，再把团队转成年度平台合同并叠加按地块收费。按研究估算， 初始以美国为先的 SAM 约为 $31.0M，三年 SOM 约为
  $6.0M，因此想做出风险投资回报，关键不止是承保本身， 还得向期权管理、公用事业协同、许可协调和贷款方尽调继续扩展。战略上要刻意避开泛用 CRE 软件、全自动并网预测和下游 EPC 工具，
  至少在公司拿到重复证据、证实自己的备忘录流程确实能减少死路地块并加速 IC 审批之前都不该贸然扩张。最大的不确定性不是市场需求，
  而是团队能否够早地把公用事业和县级证据标准化，进而在接近软件毛利的前提下赢得买方信任；这一点必须在试点中证实，而不能先假设成立。
problem:
  - 团队在拿 AI 园区土地期权时；仍主要依赖经纪商、顾问和电子表格备忘录，导致首轮尽调既慢、又不一致，也很难在 IC、公用事业、贷款方和租户之间复用。
  - 只要误判一块“假阳性”地块，就可能浪费数月期权窗口和顾问成本，由于电力时序、分区、水资源、环保和租户适配等问题，往往是在拿到排他权之后才暴露出来。
solution:
  - 交付一个以备忘录为先的承保工作区，用来收集地块证据、套用标准化的 kill/go 检查清单，并输出适用于 100MW+ AI 园区场址的投资级就绪备忘录。
  - 先从带人工校验的电力、分区、水资源、环保和租户适配置信评分启动，再逐步沉淀成一套关于场址为何失败或推进的专有数据集。
whyWeWin:
  - 产品围绕真实购买决策所需的核心产物——投资与尽调备忘录——设计，而不是围绕泛用地块搜索或地图功能设计。
  - 北弗吉尼亚交付了一个高密度证实场：公用事业和县级流程都很明确，公司能比全国铺开更快做出可复用模板。
  - 每一次筛地都会产出结构化失败数据，而经纪商、顾问和横向地块工具都不会在客户自有流程中系统性保留这些数据。
strategicChoices:
  beachhead: 北弗吉尼亚 AI 数据中心开发商和土地载体中的开发与源头拓展团队，负责筛选 100-500 英亩、面向 100MW+ 单租户园区的地块。
  wedgeRationale: 这个切口比全国性的 CRE 切入更容易先跑出结果，由于客户范围、流程和决策产物都更窄，预算又直接绑定在正在发生的期权决策上， 同时 Loudoun 与 Dominion 还交付了产品能直接编码的明确本地流程步骤。
  sequencingRationale: >-
    公司第一步应该靠“人机协同”的证据系统和真实地块上的付费试点拿到信任，然后再加可复用模板、组合流程和新地域，
    只有在那之后才扩展到期权管理以及公用事业或许可协调。这个顺序符合现实：前期买方真正担心的是数据可信度，不是少几个仪表盘。
  notYet:
    - 100MW+ AI 园区之外的泛用商业地产选址
    - 没有来源证据撑起的全自动并网确定性或公用事业预测
    - 下游 EPC、施工管理或设施运营软件
market:
  tam: 依据研究，对活跃买方团队和按地块承保流程做自下而上估算，全球 TAM 约为 $96.0M。
  sam: 依据研究，集中电力和分区复杂度最高市场中的滩头团队，美国优先 SAM 约为 $31.0M。
  som: 依据研究，三年 SOM 约为 $6.0M，建立在约 15 个付费客户和约 60 个地块项目的关系驱动销售模型之上。
  segments:
    - 推进通电园区的 AI 数据中心开发商和土地整合载体
    - 评估大负载园区项目的电力开发商和基础设施投资人
  buyingProcess: >-
    日常使用者大概率是场址源头拓展经理或开发经理，而经济买方通常是开发副总裁、开发负责人或基础设施投资负责人。
    预算一般会在新一轮场址期权计划、具名租户询盘或公用事业受理截止时间出现时被触发，而真正采购还需要顾问、公用事业公司和内部投资委员会共同建立对流程的信任。
product:
  mvp: >-
    MVP 要能导入候选地块，把尽调证据围绕电力、分区、水资源、环保和租户适配组织起来，并导出一份适用于北弗吉尼亚 100MW+ 场址决策的共享 kill/go 备忘录。
    它应包含文档采集、检查清单模板、带人工复核的置信评分，以及每一条承保结论对应的审计轨迹。
  sixMonth: 为付费试点客户交付北弗吉尼亚模板库、地块导入、协作、备忘录导出和组合追踪功能。
  twelveMonth: 扩展到 Texas 和一个中西部走廊，补上期权管线管理、基于角色的审批，以及基于试点结果沉淀出的基准评分。
  twentyFourMonth: 扩展到公用事业沟通追踪、许可协调、贷款方尽调材料包，以及跨活跃场址组合的租户就绪度基准能力。
  keyBets:
    - 目标客户每年会筛够多的高价值地块，因此值得反复使用软件，而不是只做一次性的顾问项目。
    - 在买方相信自动化电力确定性判断之前，他们会先相信带人工校验的证据打包能力。
    - 可导出的备忘录结果会让顾问更高效，而不是逼他们阻拦采用。
    - 试点沉淀的场址结果数据，会够快地拉升评分精度，从而在现有厂商把类似能力打包进来之前沉淀出防御性数据资产。
gtm:
  wedge: 在北弗吉尼亚，围绕 2-3 个真实在跑的地块做付费试点，目标客户是土地载体或 AI 园区开发商；触发点是新期权预算获批或具名租户询盘。一旦团队把该流程复用到更广的场址漏斗中，就转成年度平台合同。
  channels:
    - 通过数据中心顾问、资本市场和基础设施投资人网络进行创始人主导直销
    - 与已参与大负载尽调的公用事业或并网顾问联合销售
    - 与需要可复用备忘录输出的分区、环保和工程顾问建立选择性合作
  funnelTargets: 从初次接触到合格试点 20-30%，从合格试点到付费试点 40%+，从付费试点到年度平台 50%+，从年度平台到扩展模块 60%+
  pricing: >-
    面向真实场址漏斗，采用“付费试点或按地块承保收费 + 年度平台授权”的混合定价：先通过真实项目收取费用，之后转为 $150k-$250k 的年度团队授权，并对每个新增地块流程收取
    $25k-$40k。这个定价与研究结论一致：买方早就接受高成本顾问尽调，他们更在意避开错误地块，而不是单纯压低席位价格。
businessModel:
  revenueStreams:
    - 面向活跃开发与源头拓展团队的年度平台订阅
    - 针对真实地块筛选和试点项目的按地块承保收费
    - 期权管理、公用事业沟通追踪和贷款方尽调等扩展模块
  unitOfValue: 每个团队每年处理的活跃 100MW+ 地块承保决策数
  targetGrossMarginPct: 70
  expansionLevers:
    - 土地载体从单一市场扩展到多市场组合
    - 单个账户中增加更多流程，例如期权管理和公用事业协同
    - 让贷款方、租户和开发合作伙伴等新买方角色复用同一套证据底座
strategyMap:
  northStarMetric: 通过平台流程推进并最终进入场址期权或获得 IC 批准的地块数量
  inputMetrics:
    - 从地块导入到首份投资备忘录的天数
    - 在 LOI 或排他期前被淘汰的地块占比
    - 付费试点转年度平台的转化率
    - 县级与公用事业模板在新地块上的复用率
    - 置信评分与真实场址结果之间的校准程度
  moatsToBuild:
    - AI 园区地块为何失败或推进的专有数据集
    - 与真实买方流程绑定的县级和公用事业专属承保模板
    - 横跨开发商、顾问和投资委员会的嵌入式协作历史
  killCriteria:
    - 15 个目标客户访谈中，少于 8 个表示每个成交场址或期权项目至少会筛 10 个相关地块
    - 前 4 个付费试点中，少于 2 个转为 ACV 高于 $150k 的年度合同
    - 试点客户没能证实其首轮备忘录周转时间比原流程快至少 50%
  mermaid: |
    flowchart LR
      Wedge[Northern Virginia 100MW+ site underwriting] --> MVP[Memo first underwriting OS]
      MVP --> Proof[Paid pilots and faster kill go decisions]
      Proof --> Expansion[Option management utility and lender workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点明确、切口克制，不过市场规模和渠道摩擦意味着，投资逻辑是否成立，取决于公司能否向相邻流程扩展。
    whyBelieve: Coatue 的土地动作，以及研究中关于公用事业和县级流程的证据，都说明“通电土地承保”已成为一个有预算支持、且失误代价高昂的流程。
    whyDoubt: 滩头买方群体高度集中，而研究给出的 TAM 也不大；除非公司能成功从承保延伸到更广的园区开发流程，否则上行空间有限。
    nextDiligence: 先通过真实试点确认：北弗吉尼亚团队愿意为“以备忘录为先”的软件付费，而不止是继续买顾问服务，并至少有一半能转成年度平台使用。
  firstCustomer:
    title: 北弗吉尼亚土地整合载体或 AI 园区开发商的源头拓展团队
    profile: 一个小型开发团队，正在筛选 100-500 英亩地块来建设 100MW+ 单租户园区，并在时间压力下协调经纪商、顾问和公用事业沟通。
    trigger: 新的场址期权预算获批，或收到具名租户询盘，需要在拿排他权前先完成可信赖的通电土地筛选。
    buyer: 开发副总裁
    initialContract: 涵盖 2-3 个真实地块的 $30k-$75k 付费试点；一旦团队把流程复用到更大的场址漏斗中，再转为 $150k-$250k 的年度团队合同，并叠加按地块超额收费。
  mustBeTrue:
    - 目标客户每年会筛够多的 100MW+ 地块，使承保软件成为重复流程，而不是一次性项目。
    - 如果产品能显著减少“假阳性”地块，VP 级开发买方会在完整工程启动前就批准预算。
    - 北弗吉尼亚试点能在不牺牲决策质量的前提下，把首轮尽调时间至少砍掉 50%。
    - 顾问和咨询机构愿意接受导出的备忘录流程，而不是把自己塑造成唯一可信赖的尽调来源。
    - 在承保切口被证实之后，期权管理、公用事业协同和贷款方尽调等扩展模块，至少能把账户价值再翻一倍。
  diligenceQuestions:
    - 每个目标账户在最近两轮选址计划里，分别筛了多少真实地块、拿了多少期权、又放弃了多少
    - 投资委员会在批准土地支出前，究竟要求什么样的备忘录或证据包
    - 哪些公用事业和县级数据字段能在正式申请前稳定取得，并够撑起置信评分
    - 在这些团队里，预算、信息安全审核和采购链路到底归谁管
    - 顾问是把产品当成拉升吞吐的基础设施，还是当成威胁其可计费尽调收入的工具
  riskHeatmap:
    - risk: 公用事业数据不透明，限制了买方对自动化结论的信任
      likelihood: High
      impact: High
      leadingIndicator: 试点客户始终关闭置信评分，或几乎每一次电力评估都要求人工复核
      mitigation: 先从证据采集和人工校验做起，只在有来源数据撑起的字段上做自动化。
    - risk: 顾问和经纪商的阻力拖慢采用
      likelihood: Medium
      impact: High
      leadingIndicator: 顾问伙伴拒绝使用导出的备忘录材料包，或阻止试点进入真实地块流程
      mitigation: 把产品定位成前端漏斗优化器，并共享不会侵蚀顾问后续计费工作的输出格式。
    - risk: 买方群体过窄，压住增长上限
      likelihood: High
      impact: High
      leadingIndicator: 在北弗吉尼亚外联和转介绍之后，合格管线仍低于 25 个目标账户
      mitigation: 先集中多项目土地载体和开发商，再扩展到相邻买方角色和流程。
    - risk: 销售周期更像基础设施尽调，而不是普通 SaaS
      likelihood: Medium
      impact: Medium
      leadingIndicator: 从首次会面到付费试点的时间持续超过 180 天
      mitigation: 围绕真实地块截止时间销售付费试点，用 design-partner 合同切入，而不是等广泛的企业级 rollout。
operatingAssumptions:
  - assumption: 买方会接受“付费地块试点 + 年度团队合同”的混合定价。
    basis: research.yaml
    validationTest: 在前 6 个试点中测试 3 套定价，并比较纯按地块收费与混合打包在成交率、扩展率和采购摩擦上的差异。
    decisionImpact: 如果不成立，公司应更偏向重服务项目收费或嵌入式顾问服务，而不是纯软件合同。
  - assumption: 北弗吉尼亚账户具备够高的地块漏斗密度，使这个滩头市场能重复复制。
    basis: research.yaml
    validationTest: 审计至少 10 个目标团队最近 3 轮选址漏斗，统计每轮计划中筛选、淘汰和拿期权的地块数。
    decisionImpact: 如果不成立，就要更早扩展到 Texas 或中西部走廊，或更早切向更宽的开发流程。
  - assumption: 在更深层自动化尚未成熟之前，带人工校验的证据评分已够赢得信任。
    basis: idea.yaml
    validationTest: 在试点中观察买方是否会把平台输出真正用于 IC 或公用事业沟通，而不是另起一套完整备忘录。
    decisionImpact: 如果不成立，产品应重定位为系统记录层和协作层，而不是评分产品。
  - assumption: 如果软件能拉升吞吐和备忘录复用率，顾问就会愿意合作。
    basis: operator judgment
    validationTest: 拿下 2 个渠道或联合交付试点协议，并追踪它们在 6 个月内是否各自引入至少 1 个付费流程。
    decisionImpact: 如果不成立，就全面直销、补更多内部领域能力，并下调收入计划里的渠道假设。
  - assumption: 一旦承保切口成立，相邻流程就能显著抬升账户价值。
    basis: research.yaml
    validationTest: 在试点后的客户访谈中，至少让 5 个客户对期权管理、公用事业追踪或贷款方尽调模块给出优先级排序，并承诺 design-partner 兴趣。
    decisionImpact: 如果不成立，这就会变成一个细分承保工具，难以撑起风险投资规模，融资和团队配置都应按此收缩。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 访谈并审计 10 个北弗吉尼亚开发或源头拓展团队最近 3 轮地块漏斗。
    hypothesis: 目标团队筛的高价值地块够多，同时会反复踩到“假阳性”痛点，因此值得持续为软件付费。
    successMetric: 10 个团队里至少有 8 个确认存在重复的地块筛选痛点，并在期权获批前有明确的备忘录流程。
    owner: Founder CEO
  - horizon: 0-90 天
    experiment: 用 Dominion 和 Loudoun 的证据模板，在原型备忘录流程里手工重建 5 个近期地块决策。
    hypothesis: 一套结构化证据包能在更短时间内复现真实的 kill/go 决策，而不是继续依赖电子表格和邮件。
    successMetric: 试点 design partner 认为 5 份复建备忘录里至少有 4 份达到可决策水平，且组装时间至少快 50%。
    owner: Founding eng
  - horizon: 90-180 天
    experiment: 与北弗吉尼亚的土地载体或 AI 园区开发商跑 2 个付费真实地块试点。
    hypothesis: 只要真实期权决策在眼前，买方会在产品完全做完前先掏钱。
    successMetric: 拿下 2 个付费试点，且至少有 1 个真的被用于 IC、公用事业或顾问流程。
    owner: Founder CEO
  - horizon: 90-180 天
    experiment: 与 2 家分区、环保或工程顾问公司测试渠道合作打包方案。
    hypothesis: 可导出的备忘录输出能提高顾问吞吐，从而减轻渠道阻力。
    successMetric: 至少带来 1 个伙伴来源试点，并从至少 1 家顾问公司拿到正向 NPS 反馈。
    owner: GTM lead
  - horizon: 6-12 个月
    experiment: 在 10 个历史和真实地块案例上推出 Texas 模板库。
    hypothesis: 只要本地化县级与公用事业模板，产品就能从北弗吉尼亚迁移，而不必完全重做。
    successMetric: Texas 流程在客户 onboarding 后 30 天内达到可决策水平，且备忘录周转时间维持在北弗吉尼亚试点的 120% 以内。
    owner: Infrastructure domain lead
  - horizon: 12-18 个月
    experiment: 与 3 个现有客户试点 1 个相邻模块，例如期权管理或公用事业沟通追踪。
    hypothesis: 扩展模块能显著抬升账户价值，同时不需要重置买方或销售动作。
    successMetric: 至少有 2 个客户承诺为扩展付费，且 blended ACV 拉升超过 50%。
    owner: Product lead
operations:
  - 先建立一套按县和公用事业划分的尽调资料库，从 Loudoun 与 Dominion 的材料开始。
  - 每个试点都按周复盘地块进展，并明确记录改造前后的周转指标。
  - 使用文档导入加人工 QA，确保每个置信评分都能回链到来源证据。
  - 建立一个常驻的分区、环保和并网专家池，用来处理边缘案例。
  - 尽早准备信息安全和审计文档，由于买方采购它时会把它当作基础设施尽调软件，而不是轻量 proptech。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 前 12 个月成败取决于创始人主导的客户发现、试点销售，以及在开发和资本市场买方面前建立可信度。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 需要尽快做出核心证据模型、备忘录流程和试点产品，才能撑起真实地块决策。
  - role: GIS 与数据工程师
    startTiming: Month 2
    rationale: 负责接入地块、地图和公用事业数据源，并把手工研究沉淀成可复用的承保输入。
  - role: 基础设施领域负责人
    startTiming: Month 3
    rationale: 需要把县级、公用事业和顾问流程编码进买方愿意信任的模板里。
  - role: GTM 负责人
    startTiming: Month 6
    rationale: 初始试点完成后，需要有人系统管理销售漏斗、design-partner 转化和选择性渠道合作。
milestones:
  - horizon: 0-12 个月
    items:
      - 交付北弗吉尼亚 MVP，支持备忘录导出和证据关联的承保模板
      - 拿下至少 2 个付费试点，并至少把 1 个转成年度平台合同
      - 在真实地块流程上证实首轮备忘录周转时间至少拉升 50%
      - 建立 2 个顾问或咨询伙伴关系，并各自带来至少 1 个活跃机会
  - horizon: 12-24 个月
    items:
      - 扩展到 Texas 和一个中西部走廊，并完成本地化公用事业与县级模板
      - 为现有客户上线期权管理或公用事业沟通追踪
      - 在多个账户上跑通可复制的“试点转平台”转化路径
      - 基于地块结果建立基准数据集，拉升场址就绪评分
  - horizon: 24-36 个月
    items:
      - 在承保记录之上增加贷款方尽调和租户就绪流程
      - 通过可复用模板服务跨多个电力走廊的多市场客户群
      - 证实扩展模块能显著抬升账户价值，而不止是守着最初的承保切口
risks:
  - risk: 公用事业数据不透明，使自动化就绪评分难以获得信任
    likelihood: High
    impact: High
    mitigation: 保持人工参与、暴露来源证据，并把自动化限制在正式研究前就能证实的字段上。
  - risk: 顾问和经纪商会抵触可能压缩其可计费尽调工作的产品
    likelihood: Medium
    impact: High
    mitigation: 卖点应是流程提速和可复用输出，而不是宣称替代专家服务。
  - risk: 滩头买方池过窄，前期收入增长不够强劲
    likelihood: High
    impact: High
    mitigation: 先优先服务多项目土地载体和开发商，再扩展到相邻流程和买方角色。
  - risk: 企业级基础设施采购会拉长试点和续约周期
    likelihood: Medium
    impact: Medium
    mitigation: 把前期销售绑在真实地块截止时间、试点范围和可量化周转拉升上，而不是宽泛的企业数字化转型叙事。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道将用于支持创始产品团队、领域模板建设、创始人主导销售，以及够多的付费试点，以证实客户信任、试点转化和首个相邻流程扩展。
