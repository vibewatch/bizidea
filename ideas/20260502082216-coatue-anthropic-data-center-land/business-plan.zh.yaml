slug: power-site-underwriting-os
date: '2026-05-02'
executiveSummary: 电力场址尽调操作系统瞄准的是前期开发工作流：AI园区开发商和土地载体需要判断一个100MW以上的地块是否值得签下期权。研究显示，市场对具备电力条件的土地存在紧迫且有资金支持的需求，但这一工作流仍分散在经纪人、顾问、公用事业邮件往来和电子表格备忘录之间。初始滩头市场选择北弗吉尼亚的选址团队，因为Dominion专门的数据中心受理流程以及Loudoun明确的标准，使这一痛点可观察、可复现、可产品化。MVP是一套以备忘录为核心、由人工核验的证据系统，可围绕电力、分区、水资源、环境和租户匹配标准，将原始地块转化为淘汰/继续决策。市场切入从付费试点开始，触发点是新的场址期权预算或具名租户询盘，随后将成功团队转化为年度平台合同并附加按地块收费。按研究估算，初始美国优先SAM约为$31.0M，三年SOM约为$6.0M，因此创业回报空间取决于能否从尽调扩展到期权管理、公用事业沟通、许可协调和贷款方尽调。刻意做出的战略选择是：在公司反复证明其备忘录工作流能够减少死胡同地块并加快IC审批之前，不碰通用CRE软件、全自动并网确定性判断，以及下游EPC工具。最大的缺口不在于市场需求，而在于是否能足够早地把公用事业和县级证据标准化，以在接近软件的毛利水平下赢得买方信任；这必须通过试点验证，而不能想当然。
problem:
- 为AI园区土地签订期权的团队仍依赖经纪人、顾问和电子表格备忘录，导致首轮尽调缓慢、不一致，且难以在IC、公用事业公司、贷款方和租户之间复用。
- 一个误判为可行的地块就可能浪费数月期权时间和顾问费用，因为电力时序、分区、水资源、环境以及租户匹配问题往往在排他期开始后才暴露。
solution:
- 提供一个以备忘录为核心的尽调工作空间，用于采集地块证据、应用标准化淘汰/继续清单，并输出适用于100MW以上AI园区场址的投资级就绪备忘录。
- 从对电力、分区、水资源、环境和租户匹配就绪度进行人工核验的置信评分开始，再逐步积累成一套关于场址为何失败或推进的专有数据集。
whyWeWin:
- 该产品围绕真实的采购产物——投资与尽调备忘录——而设计，而不是通用的地块搜索或制图工具。
- 北弗吉尼亚提供了一个高密度验证场景，拥有明确的公用事业和县级工作流，使公司相比全国范围铺开能更快建立可复用模板。
- 每一个被筛选的地块都会产出结构化失败数据，而这些数据是经纪人、顾问和横向地块工具无法在客户自有工作流中系统保留的。
strategicChoices:
  beachhead: 位于北弗吉尼亚的开发与选址团队，隶属于AI数据中心开发商和土地载体，正在筛选100-500英亩、适用于100MW以上单租户园区的地块。
  wedgeRationale: 这一切入点比全国性CRE产品上线更容易更快获得验证，因为客户、工作流和决策产物都很聚焦，预算与真实期权决策直接相关，而且Loudoun与Dominion都提供了产品可编码的明确本地流程步骤。
  sequencingRationale: 公司应先通过有人参与的证据系统和真实地块上的付费试点赢得信任，然后再加入可复用模板、组合工作流和新区域，之后才扩展到期权管理以及公用事业或许可协调。这一顺序符合早期买方的核心疑虑：他们担心的是数据可信度，而不是缺少仪表盘。
  notYet:
  - 100MW以上AI园区之外的通用商业地产选址
  - 在缺乏来源证据情况下提供全自动并网确定性或公用事业预测
  - 下游EPC、施工管理或设施运营软件
market:
  tam: 根据研究估算，全球TAM约为$96.0M，来自活跃买方团队以及在具备电力条件土地筛选中按地块计费的尽调工作流。
  sam: 根据研究估算，美国优先SAM约为$31.0M，聚焦于电力和分区复杂度最高市场中的滩头团队。
  som: 根据研究估算，三年SOM约为$6.0M，基于大约15家付费客户和约60个地块项目，销售方式以关系驱动为主。
  segments:
  - 推进具备电力条件园区项目的AI数据中心开发商和土地整合载体
  - 评估大负荷园区项目的电力开发商和基础设施投资人
  buyingProcess: 日常使用者很可能是场址拓展或开发经理，而经济买方通常是开发副总裁、开发负责人或基础设施投资负责人。预算通常由新的场址期权项目、具名租户询盘或公用事业受理截止日期触发，采购则需要获得顾问、公用事业公司和内部投资委员会对工作流的信任。
product:
  mvp: MVP导入候选地块，围绕电力、分区、水资源、环境和租户匹配标准组织尽调证据，并输出一份面向北弗吉尼亚100MW以上场址决策的共享淘汰/继续备忘录。它应包含文档采集、清单模板、带人工复核的置信评分，以及每项尽调判断的审计轨迹。
  sixMonth: 为付费试点客户交付北弗吉尼亚模板库、地块导入、协作、备忘录导出和组合追踪功能。
  twelveMonth: 扩展到德州和一条中西部走廊，新增期权管线管理、基于角色的审批，以及基于试点结果的基准评分。
  twentyFourMonth: 扩展到公用事业沟通追踪、许可协调、贷款方尽调材料包，以及活跃场址组合中的租户就绪度基准评估。
  keyBets:
  - 目标客户每年筛选的高价值地块数量足够多，足以支撑重复使用软件，而不是一次性顾问服务。
  - 在信任自动化电力确定性判断之前，买方会先信任经过人工核验的证据打包。
  - 可导出的备忘录输出会提升顾问效率，而不是逼迫他们阻碍产品采纳。
  - 试点产生的场址结果数据将足够快地提升评分准确度，从而在现有厂商打包类似功能之前形成可防御的数据集。
gtm:
  wedge: 在新的期权预算获批或具名租户询盘出现后，立即与北弗吉尼亚土地载体或AI园区开发商围绕2-3个真实地块开展付费试点；一旦团队在更广泛的场址漏斗中复用该工作流，再转化为年度平台合同。
  channels:
  - 通过数据中心顾问、资本市场和基础设施投资人网络开展创始人主导的直销
  - 与已参与大负荷尽调的公用事业或并网顾问联合销售
  - 与需要可复用备忘录输出的分区、环境和工程顾问建立选择性合作
  funnelTargets: 初次接触到合格试点 20-30%，合格试点到付费试点 40%+，付费试点到年度平台 50%+，年度平台到扩展模块 60%+
  pricing: 采用混合定价：针对真实场址漏斗收取付费试点费或按地块尽调费，之后转为$150k-$250k的年度团队许可，并对每增加一个地块工作流收取$25k-$40k；这与研究估计一致，即买方本就承担高成本的顾问尽调，并且更在意避免错误期权，而非单纯的席位数量。
businessModel:
  revenueStreams:
  - 面向活跃开发与选址团队的年度平台订阅
  - 针对真实场址筛选与试点项目的按地块尽调费
  - 用于期权管理、公用事业沟通追踪和贷款方尽调的扩展模块
  unitOfValue: 每个团队每年进行的100MW以上活跃地块尽调决策数
  targetGrossMarginPct: 70
  expansionLevers:
  - 从单一市场扩展到多市场组合的土地载体
  - 每个客户增加更多工作流，例如期权管理和公用事业沟通
  - 使用同一证据底座的新买方角色，如贷款方、租户和开发伙伴
strategyMap:
  northStarMetric: 通过平台工作流推进的场址期权或获得IC批准的地块数量
  inputMetrics:
  - 从地块导入到首份投资备忘录的天数
  - 在LOI或排他期前被淘汰的筛选地块比例
  - 付费试点转化为年度平台合同的比例
  - 县级与公用事业模板在新地块中的复用率
  - 置信评分与真实场址结果的校准程度
  moatsToBuild:
  - 关于AI园区地块为何失败或推进的专有数据集
  - 与真实买方工作流绑定的县级和公用事业专属尽调模板
  - 嵌入开发商、顾问和投资委员会之间的协作历史
  killCriteria:
  - 在15位目标客户访谈中，少于8位表示每个成交场址或期权项目至少筛选了10个相关地块
  - 前4个付费试点中，转化为高于$150k ACV年度合同的少于2个
  - 试点客户未能证明其首轮备忘录产出速度比原流程至少快50%
  mermaid: "flowchart LR\n  Wedge[北弗吉尼亚100MW+场址尽调] --> MVP[备忘录优先的尽调操作系统]\n  MVP --> Proof[付费试点与更快的淘汰/继续决策]\n  Proof --> Expansion[期权管理、公用事业和贷款方工作流]\n"
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点明确、切入纪律性强，但当前市场规模和渠道摩擦使得投资逻辑取决于能否扩展到相邻工作流。
    whyBelieve: Coatue的土地动作以及研究中的公用事业和县级证据表明，具备电力条件土地的尽调如今已成为一个有预算支持、且失败代价高昂的工作流。
    whyDoubt: 除非公司能成功从尽调扩展到更广泛的园区开发工作流，否则滩头买方群体过于集中，且研究估算的TAM规模有限。
    nextDiligence: 通过真实试点确认：北弗吉尼亚团队愿意为备忘录优先的软件付费，而不仅仅是顾问服务，并且至少有一半能转化为年度平台使用。
  firstCustomer:
    title: 北弗吉尼亚一家土地整合载体或AI园区开发商的选址团队
    profile: 一个小型开发团队，正在为100MW以上单租户园区筛选100-500英亩地块，并在时间压力下协调经纪人、顾问和公用事业沟通。
    trigger: 新的场址期权预算获批，或具名租户提出询盘，需要在排他期前完成可信的电力型土地筛查。
    buyer: 开发副总裁
    initialContract: $30k-$75k的付费试点覆盖2-3个真实地块；当该工作流在场址漏斗中得到复用后，转化为$150k-$250k的年度团队合同，并对超出部分按地块额外收费。
  mustBeTrue:
  - 目标客户每年筛选足够多的100MW以上地块，使尽调软件成为可重复的工作流，而非一次性项目。
  - 如果产品能显著降低误判为可行的场址期权，VP级开发买方会在全面工程启动前批准预算。
  - 北弗吉尼亚试点能够在不损害决策质量的前提下，将首轮尽调时间缩短至少50%。
  - 顾问和咨询方会接受导出的备忘录工作流，而不是把自己定位成唯一可信的尽调来源。
  - 扩展到期权管理、公用事业沟通和贷款方尽调后，单个客户价值至少可以在初始尽调切入点之上翻倍。
  diligenceQuestions:
  - 每个目标客户在最近两个场址项目中筛选、签下期权并放弃了多少真实地块
  - 投资委员会在批准土地支出前究竟需要什么样的备忘录或证据包
  - 在正式申请前，哪些公用事业和县级数据字段足够可靠，能够支撑置信评分
  - 这些团队中，前期开发软件的预算、安全审查和采购由谁负责
  - 顾问会把这个产品视为提升吞吐的基础设施，还是视为对其可收费尽调的威胁
  riskHeatmap:
  - risk: 公用事业数据不透明限制了对自动化结论的信任
    likelihood: High
    impact: High
    leadingIndicator: 试点客户持续关闭置信评分，或几乎对每一项电力评估都要求人工复核
    mitigation: 从证据采集和人工核验开始，只对有来源支撑、可靠性明确的字段做自动化。
  - risk: 顾问和经纪商的阻力拖慢采纳
    likelihood: Medium
    impact: High
    leadingIndicator: 咨询合作方拒绝使用导出的备忘录包，或阻止试点接触真实地块工作流
    mitigation: 将产品定位为前端漏斗优化器，并提供能保留顾问后续可收费工作的输出格式。
  - risk: 买方过于集中限制增长
    likelihood: High
    impact: High
    leadingIndicator: 在北弗吉尼亚的外呼和转介绍之后，合格销售管道仍低于25个目标客户
    mitigation: 先聚焦多项目土地载体和开发商，再扩展到相邻买方角色和工作流。
  - risk: 销售周期更像基础设施尽调，而不是常规SaaS
    likelihood: Medium
    impact: Medium
    leadingIndicator: 从首次会面到付费试点的时间持续超过180天
    mitigation: 销售与真实地块时限绑定的付费试点，并使用设计合作伙伴合同，而不是等待大范围企业部署。
operatingAssumptions:
- assumption: 买方会接受将按地块付费试点与年度团队合同结合的混合定价。
  basis: research.yaml
  validationTest: 在前六个试点中运行三组定价测试，比较纯按地块计费与混合打包方案在成交率、扩展率和采购摩擦上的差异。
  decisionImpact: 如果该假设不成立，公司应更偏向高服务度的项目定价或嵌入式顾问服务，而不是纯软件合同。
- assumption: 北弗吉尼亚客户拥有足够高的地块漏斗密度，使滩头市场可以重复复制。
  basis: research.yaml
  validationTest: 审计至少10个目标团队最近三次场址漏斗，衡量每个项目筛选、淘汰和签约期权的地块数量。
  decisionImpact: 如果该假设不成立，应更早扩展到德州或中西部走廊，或更早瞄准更广泛的开发工作流。
- assumption: 在更深层自动化出现之前，人工核验的证据评分足以赢得信任。
  basis: idea.yaml
  validationTest: 在试点中衡量买方是否会在真实IC或公用事业讨论中直接使用平台输出，而不再另外委托一份完全独立的备忘录。
  decisionImpact: 如果该假设不成立，应将产品重新定位为记录系统和协作层，而不是评分产品。
- assumption: 当软件提升吞吐效率和备忘录复用时，顾问会愿意合作。
  basis: operator judgment
  validationTest: 拿下两个渠道或联合交付试点协议，并跟踪每个合作是否能在六个月内引入至少一个付费工作流。
  decisionImpact: 如果该假设不成立，就应全面转向直销、增加内部领域专家，并下调收入计划中的渠道假设。
- assumption: 在尽调切入点得到验证后，相邻工作流能够显著提升客户价值。
  basis: research.yaml
  validationTest: 在试点后调研中，让至少五位客户对期权管理、公用事业追踪或贷款方尽调模块进行优先级排序，并承诺设计合作伙伴兴趣。
  decisionImpact: 如果该假设不成立，这将成为一个细分尽调工具，创业规模上限有限，融资与团队配置也应据此调整。
experimentRoadmap:
- horizon: 0-90天
  experiment: 访谈并审计10个北弗吉尼亚开发或选址团队最近三次地块漏斗。
  hypothesis: 目标团队筛选的高价值地块足够多，且误判为可行的情况足够多，足以支撑重复的软件支出。
  successMetric: 10个团队中至少有8个表示存在反复的地块筛选痛点，并在期权批准前有成文的备忘录流程。
  owner: 创始人兼CEO
- horizon: 0-90天
  experiment: 利用Dominion和Loudoun证据模板，在原型备忘录工作流中手动重建最近五个地块决策。
  hypothesis: 结构化证据包能够用比当前电子表格和邮件流程更短的周转时间复现真实的淘汰/继续决策。
  successMetric: 试点设计合作伙伴认为5份重建备忘录中至少有4份达到可决策标准，且制作速度至少快50%。
  owner: 创始工程师
- horizon: 90-180天
  experiment: 与北弗吉尼亚的土地载体或AI园区开发商开展两个付费真实地块试点。
  hypothesis: 当真实期权决策悬而未决时，买方会在产品完全成型前就付费。
  successMetric: 完成两个付费试点，并且至少有一个被用于真实的IC、公用事业或顾问工作流。
  owner: 创始人兼CEO
- horizon: 90-180天
  experiment: 与两家分区、环境或工程公司测试顾问渠道打包方案。
  hypothesis: 可导出的备忘录输出能充分提升顾问吞吐效率，从而降低渠道阻力。
  successMetric: 获得一个由合作伙伴带来的试点，并从至少一家咨询公司获得关于工作流适配度的正向NPS。
  owner: GTM负责人
- horizon: 6-12个月
  experiment: 在10个回溯案例和真实地块案例上推出德州模板库。
  hypothesis: 如果县级和公用事业模板通过本地化而不是完全重建来适配，产品就能从北弗吉尼亚推广出去。
  successMetric: 德州工作流在客户导入30天内达到可用于决策的水平，并将备忘录周转时间控制在北弗吉尼亚试点的20%差距之内。
  owner: 基础设施领域负责人
- horizon: 12-18个月
  experiment: 与三位现有客户试点一个相邻模块，用于期权管理或公用事业沟通追踪。
  hypothesis: 扩展模块能够在不重置买方或销售动作的情况下显著提高客户价值。
  successMetric: 至少两位客户承诺付费扩展，且混合ACV提升超过50%。
  owner: 产品负责人
operations:
- 维护一套县级与公用事业专属的尽调资料库，从Loudoun和Dominion相关材料开始。
- 对每个试点都采用每周地块复盘节奏，并明确记录改造前后的周转指标。
- 采用带人工质检的文档导入流程，使每个置信评分都能追溯到来源证据。
- 建立一支常备的分区、环境和并网专家名册，用于验证边缘案例。
- 提前准备安全与审计文档，因为买方采购这类产品的方式更像采购基础设施尽调软件，而不是轻量级地产科技工具。
team:
- role: 创始人兼CEO
  startTiming: Month 0
  rationale: 前12个月依赖创始人主导的客户发现、试点销售，以及在开发与资本市场买方中的可信度建立。
- role: 创始工程师
  startTiming: Month 0
  rationale: 需要尽快搭建核心证据模型、备忘录工作流和试点产品，以支撑真实地块决策。
- role: GIS与数据工程师
  startTiming: Month 2
  rationale: 需要整合地块、地图和公用事业数据源，并将手工研究转化为可复用的尽调输入。
- role: 基础设施领域负责人
  startTiming: Month 3
  rationale: 需要将县级、公用事业和顾问工作流编码为买方会信任的模板。
- role: GTM负责人
  startTiming: Month 6
  rationale: 在初始试点后需要该角色来管理销售管道、设计合作伙伴转化和选择性渠道合作。
milestones:
- horizon: 0-12个月
  items:
  - 交付北弗吉尼亚MVP，包含备忘录导出与证据关联尽调模板
  - 完成至少两个付费试点，并至少将其中一个转化为年度平台合同
  - 在真实地块工作流中证明首轮备忘录产出速度至少提升50%
  - 建立两个顾问或咨询合作关系，并至少带来一个活跃机会
- horizon: 12-24个月
  items:
  - 利用本地化的公用事业和县级模板扩展到德州及一条中西部走廊
  - 为现有客户推出期权管理或公用事业沟通追踪功能
  - 在多个客户中实现可重复的试点到平台转化
  - 根据地块结果建立基准数据集，以提升就绪度评分
- horizon: 24-36个月
  items:
  - 在尽调记录之上增加贷款方尽调和租户就绪工作流
  - 利用跨多个电力走廊的可复用模板服务多市场客户群
  - 证明扩展模块能在初始尽调切入点之外显著提升客户价值
risks:
- risk: 公用事业数据不透明，使自动化就绪评分难以被信任
  likelihood: High
  impact: High
  mitigation: 让人工持续参与、展示来源证据，并把自动化限制在正式研究前即可验证的字段上。
- risk: 顾问和经纪商会抵制可能压缩其可收费尽调工作的产品
  likelihood: Medium
  impact: High
  mitigation: 向顾问销售工作流加速和可复用输出，而不是宣称取代专家服务。
- risk: 滩头买方群体过于狭窄，难以支撑强劲的早期收入增长
  likelihood: High
  impact: High
  mitigation: 优先面向多项目土地载体和开发商，再扩展到相邻工作流和买方角色。
- risk: 企业式基础设施采购拖慢试点与续约周期
  likelihood: Medium
  impact: Medium
  mitigation: 将早期销售与真实地块时限、试点范围和可量化的周转改进绑定，而不是泛泛宣称企业级转型。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18个月跑道将为创始产品团队、领域模板建设、创始人主导销售，以及足够数量的付费试点提供资金，以验证客户信任、试点转化和首个相邻工作流扩展。
