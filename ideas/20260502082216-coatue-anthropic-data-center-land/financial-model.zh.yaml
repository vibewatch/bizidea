    baseCase: 招聘节奏与里程碑验证绑定，保持精简
    upsideCase: 一个 GTM 或 G&A 招聘推迟到 Q4Y3 之后
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: power-site underwriting 单位经济模型
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> ExpandedAccounts
      ExpandedAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情境收入建立在 Q4Y3 达到 15 个付费账户之上，早期试点转成 $210K 平台合同，而较早签下的客户会逐步扩展到 $300K ARR。
  - checkName: 必须成立的前提
    finding: 试点转平台的转化率必须接近 BP 里 50%+ 的目标，公司才能在不提前扩编的情况下支撑后续扩展。
  - checkName: 模型何时会失效
    finding: 最大风险是关系驱动销售周期延后一个季度；敏感性分析显示，这会抹掉约 $403K 的 Y3 收入，并把 downside 情境的现金推到负值。
  - checkName: 下一轮融资证明点
    finding: 当团队做到 7 个客户、上线 Texas 模板，并在核心承保工作流之上拿到首笔付费扩展模块收入时，下一轮 seed 就有了更扎实的依据。
sanityChecks:
  ruleOf40: Y3 增长 133.0% + EBITDA margin -12.6% = 120.4%
  burnMultiple: 从 Y2 约 1.0x（$912.2K burn / $905.0K net new revenue）改善到 Y3 约 0.2x（$346.9K burn / $1,572.5K net new revenue）。
  revenuePerFte: Y3 约为 $262K，按平均 ~10.5 名 FTE 计算（垂直 SaaS 基准大致为 $200-400K）。
  flags:
    - 毛利率假设成立的前提是：带人工校验的证据工作流能被标准化到 70%；如果服务成分迟迟降不下来，模型对现金的判断就偏乐观。
    - 客户计划要在一个相对狭窄的买方池中做到 15 个账户，因此只要有几个 logo 延迟，结果就会明显走样。
    - 模型没有纳入第二轮融资；公司之所以能在 Y3 保持现金为正，前提是招聘始终克制，且 Q4Y3 刚好略微转为 EBITDA 为正。
