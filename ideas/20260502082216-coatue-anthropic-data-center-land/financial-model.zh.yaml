slug: power-site-underwriting-os
date: '2026-05-02'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: month
    source: 报告日期为 2026-05-02；模型从下一个完整月份开始。
  - id: A2
    name: pre-seed 完成后的期初现金
    value: '2500'
    unit: USDK
    source: '[BP fundingAsk] 目标融资区间为 $2-4M；模型采用 $2.5M pre-seed，与精简招聘计划和 6 个月缓冲相匹配。'
  - id: A3
    name: 试点合同金额
    value: '45'
    unit: USDK per customer
    source: '[BP investorMemo.firstCustomer] 付费试点为 $30K-$75K，覆盖 2-3 个真实地块；模型取中位数 $45K，并按 3 个月确认。'
  - id: A4
    name: 基础年度平台合同
    value: '210'
    unit: USDK ARR per customer
    source: '[BP gtm.pricing] 年度团队授权为 $150K-$250K；模型采用 $210K ARR（$17.5K MRR）。'
  - id: A5
    name: 扩展后的年度账户价值
    value: '300'
    unit: USDK ARR per mature customer
    source: '[Research market.som] 假设约 15 个付费客户，混合年价值约 $250K，另加 [BP pricing] 每个额外地块工作流 $25K-$40K；模型对成熟扩展账户采用 $300K ARR。'
  - id: A6
    name: 毛利率目标
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] 目标毛利率为 70%；因此模型将 COGS 固定为收入的 30%。'
  - id: A7
    name: 客户爬坡
    value: 3 by M12, 7 by Q4Y2, 15 by Q4Y3
    unit: paying customers
    source: '[BP milestones] 第一年要求 2 个付费试点，且至少 1 个转年度合同；[Research market.som] 将 3 年 SOM 设在约 15 个付费客户。'
  - id: A8
    name: 收入成熟时序
    value: 3-month pilot, then platform MRR; expansion uplift after month 12
    unit: timing
    source: '[BP gtm.funnelTargets] 付费试点转年度平台目标为 50%+，年度平台转扩展模块目标为 60%+；[BP product] 扩展模块落在 12-24 个月窗口。'
  - id: A9
    name: 用于 LTV 计算的月度 logo churn
    value: '2.0'
    unit: percent
    source: 启动公司财务经验法则：买方集中、服务较重的垂直企业工作流，其流失率通常高于横向 SaaS；这里只用于单位经济学，不用于显式客户排期。
  - id: A10
    name: 每个新付费账户的 CAC
    value: '120'
    unit: USDK
    source: 根据模型第 2 年约 $486K 的销售与营销支出除以 4 个新增账户推导，符合 BP 中关系驱动、创始人主导的企业销售模式。
  - id: A11
    name: 全负担年薪
    value: CEO 150; Eng 185; Data 170; Domain 170; GTM 180; CS/Ops 130; G&A 110
    unit: USDK per FTE
    source: 适用于美国种子期垂直 SaaS 的启动公司财务经验法则，已包含工资税和福利。
  - id: A12
    name: 来自商业计划的初始招聘
    value: CEO and founding engineer at start; Data/GIS M2; domain lead M3; GTM lead M6
    unit: timing
    source: '[BP team] startTiming 分别为 Month 0、Month 2、Month 3 和 Month 6。'
  - id: A13
    name: 初步验证后的扩编招聘
    value: Eng+CS/Ops M13; second GTM M16; second domain expert M25; third engineer plus G&A M28
    unit: timing
    source: '[BP milestones] Texas/中西部扩展与相邻工作流验证需要额外交付和 GTM 能力；为延长跑道，招聘仍按启动公司财务经验法则保持克制。'
  - id: A14
    name: 非人力研发支出
    value: 10 in Y1, 12 in Y2, 15 in Y3
    unit: USDK per month
    source: 面向 pre-seed 垂直软件公司的启动公司财务经验法则，覆盖云资源、数据导入、地图和安全工具。
  - id: A15
    name: 非人力销售与营销支出
    value: 6 pre-GTM, 10 in late Y1, 12-18 through Y2-Y3
    unit: USDK per month
    source: 面向创始人主导企业销售的启动公司财务经验法则，覆盖差旅、客户发现、试点和选择性合作营销。
  - id: A16
    name: 非人力 G&A 支出
    value: 8 in Y1, 10 through M27, 12 after M28
    unit: USDK per month
    source: 适用于企业采购准备的启动公司财务经验法则，覆盖法务、财务、保险与安全合规准备。
  - id: A17
    name: 现金流处理方式
    value: EBITDA approximates cash movement
    unit: policy
    source: 针对低资本开支、无债务建模的早期软件公司的启动公司财务经验法则；模型未单独列示融资、资本开支或营运资金项目。
  - id: A18
    name: 本轮融资的关键里程碑
    value: 7 paying customers, Texas launch, and first paid expansion-module revenue by Q4Y2
    unit: milestone
    source: '[BP milestones 12-24 months] 扩展到 Texas 和一个中西部走廊，跑通可复制的试点转平台，并推出首个期权管理或公用事业协同收费模块。'
