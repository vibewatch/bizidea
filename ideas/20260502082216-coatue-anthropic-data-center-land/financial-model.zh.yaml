modelDiagram:
  title: 电力场址尽调单位经济模型
  mermaid: "flowchart LR\n  Leads[线索] --> PaidPilots[付费试点]\n  PaidPilots --> AnnualContracts[年度合同]\n  AnnualContracts --> ExpandedAccounts[扩展客户]\n  ExpandedAccounts --> Revenue[收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自在Q4Y3达到15个付费客户，其中早期试点转化为$210K平台合同，老客户逐步扩展至$300K ARR。
- checkName: 必须顺利实现的事项
  finding: 试点到平台的转化率必须保持在BP设定的50%+附近，公司才能在不过度前置招聘的情况下为扩张提供资金。
- checkName: 模型失效条件
  finding: 最大的风险是关系驱动销售周期延后一个季度；敏感性表显示，这会抹去约$403K的Y3收入，并使下行情景现金转负。
- checkName: 下一轮融资验证点
  finding: 一旦团队达到7家客户、推出德州模板，并在核心尽调工作流之上证明首笔付费扩展模块收入，下一轮seed融资就具备合理性。
sanityChecks:
  ruleOf40: Y3增长率 133.0% + EBITDA利润率 -12.6% = 120.4%
  burnMultiple: 从Y2约1.0x（$912.2K burn / $905.0K净新增收入）改善到Y3约0.2x（$346.9K burn / $1,572.5K净新增收入）。
  revenuePerFte: 按约10.5名平均FTE计算，Y3约为$262K（垂直SaaS基准大致为$200-400K）。
  flags:
  - 毛利率假设建立在人工核验的证据工作流可以标准化到70%之上；如果服务强度持续过高，模型在现金表现上就过于乐观。
  - 客户计划需要在狭窄的买方群体中做到15个账户，因此少数客户延后就会显著改变结果。
  - 模型未纳入第二轮融资；业务之所以能在Y3维持现金为正，只是因为招聘被刻意保持精简，且Q4Y3略微转为EBITDA为正。
