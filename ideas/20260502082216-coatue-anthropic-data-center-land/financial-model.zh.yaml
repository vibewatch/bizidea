scenarios:
  downside:
    description: 销售周期延后约一个季度，扩展模块挂载推迟，而且人工复核让毛利率始终低于目标。
    y3RevenueK: 1950.0
    y3EbitdaK: -790.0
    cashLowPointK: -220.0
    keyAssumptionChanges:
      - 到 Y3 末客户数只有 11 个，而不是 15 个。
      - 扩展后的账户价值只能达到 $260K ARR，而不是 $300K。
      - 毛利率停留在 65%，而不是 70%。
  base:
    description: 公司达成 BP 中的试点里程碑，把试点客户转成年合同，并在不明显提前招聘的情况下叠加扩展收入。
    y3RevenueK: 2755.0
    y3EbitdaK: -346.9
    cashLowPointK: 351.9
    keyAssumptionChanges:
      - Y1 有 3 个付费账户，Q4Y2 达到 7 个，Q4Y3 达到 15 个。
      - 基础平台 ARR 为 $210K，成熟扩展 ARR 为 $300K。
      - 招聘在 Y2 后段和 Y3 初之前都保持克制。
  upside:
    description: 北弗吉尼亚口碑带动 Texas 成交提速，扩展模块更快挂载，且公司在毛利率上拿到适度经营杠杆。
    y3RevenueK: 3350.0
    y3EbitdaK: -40.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - 到 Q4Y3 客户数达到 17 个。
      - 随着期权管理工作流更早挂载，扩展账户价值提升到 $340K ARR。
      - 模板复用降低人工校验负担，使毛利率提升到 72%。
