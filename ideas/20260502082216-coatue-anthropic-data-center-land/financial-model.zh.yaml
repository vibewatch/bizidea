scenarios:
  downside:
    description: 销售周期延后约一个季度，扩展模块挂载推迟，且人工审核使毛利率低于目标。
    y3RevenueK: 1950.0
    y3EbitdaK: -790.0
    cashLowPointK: -220.0
    keyAssumptionChanges:
    - Y3末客户增长停留在11个账户，而非15个。
    - 扩展后的客户价值仅达到$260K ARR，而非$300K。
    - 毛利率维持在65%，而非70%。
  base:
    description: 公司达成BP中的试点里程碑，将客户转化为年度合同，并在不明显前置招聘的情况下增加扩展收入。
    y3RevenueK: 2755.0
    y3EbitdaK: -346.9
    cashLowPointK: 351.9
    keyAssumptionChanges:
    - Y1达到3个付费客户，Q4Y2达到7个，Q4Y3达到15个。
    - 基础平台ARR为$210K，成熟扩展ARR为$300K。
    - 招聘在Y2后期和Y3前期之前保持精简。
  upside:
    description: 北弗吉尼亚案例加速了德州成交，扩展模块挂载更快，公司在毛利率上获得适度经营杠杆。
    y3RevenueK: 3350.0
    y3EbitdaK: -40.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 客户增长到Q4Y3达到17个账户。
    - 随着期权管理工作流更早挂载，扩展客户价值达到$340K ARR。
    - 随着可复用模板降低人工核验负担，毛利率提升至72%。
