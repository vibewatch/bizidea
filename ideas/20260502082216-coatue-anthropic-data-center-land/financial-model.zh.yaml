slug: power-site-underwriting-os
date: '2026-05-02'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: 报告日期为2026-05-02；模型从下一个完整月份开始。
- id: A2
  name: pre-seed交割后的期初现金
  value: '2500'
  unit: USDK
  source: '[BP fundingAsk] 目标融资区间为$2-4M；模型采用$2.5M的pre-seed规模，与精简招聘计划和六个月缓冲相匹配。'
- id: A3
  name: 试点合同价值
  value: '45'
  unit: USDK per customer
  source: '[BP investorMemo.firstCustomer] 付费试点针对2-3个真实地块收费$30K-$75K；模型采用3个月$45K的中位数。'
- id: A4
  name: 基础年度平台合同
  value: '210'
  unit: USDK ARR per customer
  source: '[BP gtm.pricing] 年度团队许可费为$150K-$250K；模型采用$210K ARR（$17.5K MRR）。'
- id: A5
  name: 扩展后的年度客户价值
  value: '300'
  unit: USDK ARR per mature customer
  source: '[Research market.som] 假设约15家付费客户、混合年价值约$250K，另加 [BP pricing] 每个额外地块工作流$25K-$40K；模型对成熟扩展客户采用$300K ARR。'
- id: A6
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 目标毛利率为70%；因此模型将COGS固定为收入的30%。'
- id: A7
  name: 客户增长节奏
  value: 3 by M12, 7 by Q4Y2, 15 by Q4Y3
  unit: paying customers
  source: '[BP milestones] 要求第一年完成2个付费试点并至少转化1个年度合同；[Research market.som] 将3年SOM设定为约15家付费客户。'
- id: A8
  name: 收入成熟时点
  value: 3-month pilot, then platform MRR; expansion uplift after month 12
  unit: timing
  source: '[BP gtm.funnelTargets] 付费试点到年度平台转化率为50%+，年度平台到扩展模块为60%+；[BP product] 扩展模块在12-24个月窗口推出。'
- id: A9
  name: 用于LTV测算的月度客户流失率
  value: '2.0'
  unit: percent
  source: 初创财务经验法则：范围狭窄、服务深度高、预算与项目绑定的垂直企业工作流，通常比横向SaaS呈现更高流失率；该参数用于单位经济模型，不用于显式客户排期。
- id: A10
  name: 每个新增付费客户的CAC
  value: '120'
  unit: USDK
  source: 由模型第二年约$486K的销售与营销支出除以4个新增客户得出；与BP中关系驱动、创始人主导的企业销售模式一致。
- id: A11
  name: 含附加成本的年薪
  value: CEO 150; Eng 185; Data 170; Domain 170; GTM 180; CS/Ops 130; G&A 110
  unit: USDK per FTE
  source: 适用于美国种子阶段垂直SaaS的初创财务经验法则，包含工资税和福利在内的现金薪酬。
- id: A12
  name: 来自商业计划的初始招聘
  value: CEO and founding engineer at start; Data/GIS M2; domain lead M3; GTM lead M6
  unit: timing
  source: '[BP team] startTiming 分别为 Month 0、Month 2、Month 3 和 Month 6。'
- id: A13
  name: 初步验证后的扩编招聘
  value: Eng+CS/Ops M13; second GTM M16; second domain expert M25; third engineer plus G&A M28
  unit: timing
  source: '[BP milestones] 德州/中西部扩张及相邻工作流验证需要逐步增加交付与GTM能力；为保留跑道，招聘按初创财务经验法则保持精简。'
- id: A14
  name: 非薪酬研发支出
  value: 10 in Y1, 12 in Y2, 15 in Y3
  unit: USDK per month
  source: 适用于pre-seed垂直软件公司的初创财务经验法则，覆盖云资源、数据导入、制图和安全工具支出。
- id: A15
  name: 非薪酬销售与营销支出
  value: 6 pre-GTM, 10 in late Y1, 12-18 through Y2-Y3
  unit: USDK per month
  source: 适用于创始人主导企业销售的初创财务经验法则，覆盖差旅、客户开发、试点和选择性伙伴营销。
- id: A16
  name: 非薪酬G&A支出
  value: 8 in Y1, 10 through M27, 12 after M28
  unit: USDK per month
  source: 适用于企业采购准备阶段的初创财务经验法则，覆盖法务、会计、保险和安全/合规准备。
- id: A17
  name: 现金流处理口径
  value: EBITDA approximates cash movement
  unit: policy
  source: 适用于资本开支较低且未纳入债务模型的早期软件公司的初创财务经验法则；未单独纳入融资、资本开支或营运资金项目。
- id: A18
  name: 本轮里程碑
  value: 7 paying customers, Texas launch, and first paid expansion-module revenue by Q4Y2
  unit: milestone
  source: '[BP milestones 12-24 months] 扩展到德州和一条中西部走廊，实现可重复的试点到平台转化，并推出期权管理或公用事业沟通工作流。'
