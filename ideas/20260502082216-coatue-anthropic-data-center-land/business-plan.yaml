slug: power-site-underwriting-os
date: '2026-05-02'
executiveSummary: >-
  Power-site Underwriting OS targets the pre-development workflow where AI campus
  developers and land vehicles decide whether a 100MW+ parcel is worth optioning.
  The researched market shows urgent, funded demand for powered land, but the
  workflow is still fragmented across brokers, consultants, utility emails, and
  spreadsheet memos. The initial beachhead is Northern Virginia origination teams
  because Dominion's dedicated data-center intake and Loudoun's explicit standards
  make the pain observable, repeatable, and productizable. The MVP is a memo-first,
  human-verified evidence system that turns raw parcels into kill/go decisions across
  power, zoning, water, environmental, and tenant-fit criteria. Go-to-market starts
  with paid pilots triggered by new site-option budgets or named tenant inquiries,
  then converts successful teams to annual platform contracts plus per-parcel fees.
  Based on research estimates, the initial U.S.-first SAM is about $31.0M and the
  three-year SOM is about $6.0M, so venture upside depends on expanding from
  underwriting into option management, utility engagement, permitting coordination,
  and lender diligence. The deliberate choice is to avoid generic CRE software,
  full interconnection automation, and downstream EPC tools until the company has
  repeated proof that its memo workflow reduces dead-end parcels and speeds IC
  approval. The biggest gap is not market demand but whether enough utility and
  county evidence can be standardized early enough to earn buyer trust at software-like
  margins; that must be proved in pilots rather than assumed.
problem:
  - Teams optioning AI campus land still rely on brokers, consultants, and spreadsheet memos, which makes first-pass diligence slow, inconsistent, and hard to reuse across IC, utilities, lenders, and tenants.
  - One false-positive parcel can waste months of option time and consultant spend because power timing, zoning, water, environmental, and tenant-fit failures often surface after exclusivity begins.
solution:
  - Provide a memo-first underwriting workspace that captures parcel evidence, applies standardized kill/go checklists, and outputs an investment-grade readiness memo for 100MW+ AI campus sites.
  - Start with human-verified confidence scoring for power, zoning, water, environmental, and tenant-fit readiness, then compound learning into a proprietary dataset of why sites fail or advance.
whyWeWin:
  - The product is designed around the actual buying artifact, an investment and diligence memo, rather than generic parcel search or mapping.
  - Northern Virginia offers a dense proving ground with explicit utility and county workflows, which lets the company build repeatable templates faster than a broad national launch.
  - Each screened parcel produces structured failure data that brokers, consultants, and horizontal parcel tools do not systematically retain in a customer-owned workflow.
strategicChoices:
  beachhead: Northern Virginia development and origination teams at AI data-center developers and land vehicles screening 100-500 acre parcels for 100MW+ single-tenant campuses.
  wedgeRationale: >-
    This wedge creates faster proof than a national CRE launch because the customer,
    workflow, and decision artifact are narrow, budgets are tied to live option
    decisions, and Loudoun plus Dominion provide explicit local process steps the
    product can encode.
  sequencingRationale: >-
    The company should first win trust with a human-in-the-loop evidence system and
    paid pilots on live parcels, then add reusable templates, portfolio workflow,
    and new geographies, and only after that expand into option management and
    utility or permitting coordination. This order matches the fact that early buyer
    skepticism is about data credibility, not missing dashboards.
  notYet:
    - Generic commercial real estate site selection outside 100MW+ AI campuses
    - Fully automated interconnection certainty or utility forecasting without source evidence
    - Downstream EPC, construction management, or facility operations software
market:
  tam: $96.0M estimated global TAM from research for active buyer teams plus per-parcel underwriting workflows in powered-land screening.
  sam: $31.0M estimated U.S.-first SAM from research focused on beachhead teams in markets where power and zoning complexity are highest.
  som: $6.0M estimated three-year SOM from research based on roughly 15 paying customers and about 60 parcel projects in a relationship-driven sales motion.
  segments:
    - AI data-center developers and land aggregation vehicles pursuing powered campuses
    - Power developers and infrastructure investors evaluating large-load campus projects
  buyingProcess: >-
    The daily user is likely a site origination or development manager, while the
    economic buyer is typically a VP or Head of Development or infrastructure
    investments. Budget is usually triggered by a new site-option program, named
    tenant inquiry, or utility intake deadline, and purchase requires workflow trust
    from consultants, utilities, and internal investment committees.
product:
  mvp: >-
    The MVP ingests candidate parcels, structures diligence evidence around power,
    zoning, water, environmental, and tenant-fit criteria, and exports a shared
    kill/go memo for Northern Virginia 100MW+ site decisions. It should include
    document capture, checklist templates, confidence scoring with human review, and
    an audit trail for each underwriting claim.
  sixMonth: Deliver Northern Virginia template library, parcel intake, collaboration, memo export, and portfolio tracking for paid pilot customers.
  twelveMonth: Expand to Texas and one Midwest corridor, add option-pipeline management, role-based approvals, and benchmark scoring from pilot outcomes.
  twentyFourMonth: Expand into utility engagement tracking, permitting coordination, lender diligence packages, and tenant-readiness benchmarking across active site portfolios.
  keyBets:
    - Target accounts screen enough high-value parcels each year to justify repeated software use rather than one-off advisory work.
    - Buyers will trust human-verified evidence packaging before they trust automated power certainty claims.
    - Exportable memo outputs will make consultants more productive instead of pushing them to block adoption.
    - Site outcome data from pilots will improve scoring accuracy fast enough to create a defensible dataset before incumbents bundle similar features.
gtm:
  wedge: Paid pilots for 2-3 live parcels with Northern Virginia land vehicles or AI-campus developers right after a new option budget or named tenant inquiry, converting to annual platform contracts once the team reuses the workflow across its broader site funnel.
  channels:
    - Founder-led direct sales through data-center advisory, capital-markets, and infrastructure investor networks
    - Co-selling with utility or interconnection advisors already involved in large-load diligence
    - Selective partnerships with zoning, environmental, and engineering consultants who need reusable memo outputs
  funnelTargets: "Intro to qualified pilot 20-30%, qualified pilot to paid pilot 40%+, paid pilot to annual platform 50%+, annual platform to expansion module 60%+"
  pricing: Hybrid pricing with a paid pilot or per-parcel underwriting fee for live site funnels, then a $150k-$250k annual team license with $25k-$40k per additional parcel workflow; this matches the research estimate that buyers already absorb expensive consultant-led diligence and care about avoided bad options more than seat count alone.
businessModel:
  revenueStreams:
    - Annual team platform subscriptions for active development and origination groups
    - Per-parcel underwriting fees for live site screens and pilot engagements
    - Expansion modules for option management, utility engagement tracking, and lender diligence
  unitOfValue: Active 100MW+ parcel underwriting decisions per team per year
  targetGrossMarginPct: 70
  expansionLevers:
    - Land vehicles expanding from one market to multi-market portfolios
    - More workflows per account such as option management and utility engagement
    - New buyer personas such as lenders, tenants, and development partners using the same evidence base
strategyMap:
  northStarMetric: Number of site options or IC-approved parcels advanced from workflows run in the platform
  inputMetrics:
    - Days from parcel intake to first investment memo
    - Percentage of screened parcels killed before LOI or exclusivity
    - Paid pilot to annual platform conversion rate
    - Reuse rate of county and utility templates across new parcels
    - Confidence score calibration against actual site outcomes
  moatsToBuild:
    - Proprietary dataset of why AI-campus parcels fail or advance
    - County- and utility-specific underwriting templates tied to real buyer workflows
    - Embedded collaboration history across developers, consultants, and investment committees
  killCriteria:
    - Fewer than 8 of 15 target customer interviews report screening at least 10 relevant parcels per closed site or option program
    - Fewer than 2 of the first 4 paid pilots convert to annual contracts above $150k ACV
    - Pilot customers fail to show at least 50% faster first-pass memo turnaround versus their prior process
  mermaid: |
    flowchart LR
      Wedge[Northern Virginia 100MW+ site underwriting] --> MVP[Memo first underwriting OS]
      MVP --> Proof[Paid pilots and faster kill go decisions]
      Proof --> Expansion[Option management utility and lender workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear pain and a disciplined wedge, but current market size and channel friction make the investment case depend on adjacent workflow expansion.
    whyBelieve: Coatue's land move and the researched utility and county evidence show that powered-land underwriting is now a funded workflow with costly failure modes.
    whyDoubt: The beachhead buyer set is concentrated and the research-sized TAM is modest unless the company successfully expands beyond underwriting into broader campus development workflows.
    nextDiligence: Confirm with live pilots that Northern Virginia teams pay for memo-first software, not just consultants, and that at least half convert to annual platform usage.
  firstCustomer:
    title: Northern Virginia origination team at a land aggregation vehicle or AI campus developer
    profile: A small development team screening 100-500 acre parcels for a 100MW+ single-tenant campus and coordinating brokers, consultants, and utility conversations under time pressure.
    trigger: Approval of a new site-option budget or a named tenant inquiry that requires a credible powered-land screen before exclusivity.
    buyer: VP of Development
    initialContract: $30k-$75k paid pilot covering 2-3 live parcels, converting to a $150k-$250k annual team contract plus per-parcel overages after the workflow is reused across the site funnel.
  mustBeTrue:
    - Target customers screen enough 100MW+ parcels per year for underwriting software to be a repeated workflow rather than a one-off project.
    - VP-level development buyers will approve budget before full engineering if the product materially reduces false-positive site options.
    - Northern Virginia pilots can cut first-pass diligence time by at least 50% without hurting decision quality.
    - Consultants and advisors will accept exported memo workflows instead of positioning themselves as the only trusted source of diligence.
    - Expansion into option management, utility engagement, and lender diligence can at least double account value beyond the initial underwriting wedge.
  diligenceQuestions:
    - How many live parcels did each target account screen, option, and abandon in its last two site programs
    - What exact memo or evidence package does the investment committee require before approving land spend
    - Which utility and county data fields are reliable enough pre-application to support confidence scoring
    - Who owns budget, security review, and procurement for pre-development software in these teams
    - Do consultants treat the product as throughput infrastructure or as a threat to billable diligence
  riskHeatmap:
    - risk: Utility data opacity limits trust in automated conclusions
      likelihood: High
      impact: High
      leadingIndicator: Pilot customers keep confidence scores turned off or demand manual review for nearly every power assessment
      mitigation: Start with evidence capture and human verification, and only automate fields with source-backed reliability.
    - risk: Consultant and broker resistance slows adoption
      likelihood: Medium
      impact: High
      leadingIndicator: Advisory partners refuse to use exported memo packs or block pilot access to live parcel workflows
      mitigation: Position the product as a front-end funnel optimizer and share output formats that preserve consultant billable follow-on work.
    - risk: Narrow buyer concentration caps growth
      likelihood: High
      impact: High
      leadingIndicator: Qualified pipeline stays below 25 target accounts after Northern Virginia outreach and referrals
      mitigation: Focus first on multi-project land vehicles and developers, then expand into adjacent buyer roles and workflows.
    - risk: Sales cycles resemble infrastructure diligence rather than normal SaaS
      likelihood: Medium
      impact: Medium
      leadingIndicator: Time from first meeting to paid pilot consistently exceeds 180 days
      mitigation: Sell paid pilots tied to live parcel deadlines and use design-partner contracts instead of waiting for broad enterprise rollouts.
operatingAssumptions:
  - assumption: Buyers will accept hybrid pricing that combines paid parcel pilots with annual team contracts.
    basis: research.yaml
    validationTest: Run three pricing tests in the first six pilots and compare close rate, expansion rate, and procurement friction for per-parcel only versus hybrid packaging.
    decisionImpact: If false, the company should bias toward higher-touch project pricing or embedded advisory instead of pure software contracts.
  - assumption: Northern Virginia accounts have enough parcel funnel density to make the beachhead repeatable.
    basis: research.yaml
    validationTest: Audit the last three site funnels for at least 10 target teams and measure parcels screened, rejected, and optioned per program.
    decisionImpact: If false, expand earlier into Texas or Midwest corridors or target broader development workflows sooner.
  - assumption: Human-verified evidence scoring is sufficient to win trust before deeper automation exists.
    basis: idea.yaml
    validationTest: In pilots, measure whether buyers use the platform output in real IC or utility discussions without commissioning a completely separate memo.
    decisionImpact: If false, reposition the product as a system of record and collaboration layer rather than a scoring product.
  - assumption: Consultants will partner when the software improves throughput and memo reuse.
    basis: operator judgment
    validationTest: Secure two channel or co-delivery pilot agreements and track whether each introduces at least one paid workflow within six months.
    decisionImpact: If false, go fully direct, hire more internal domain expertise, and reduce channel assumptions in the revenue plan.
  - assumption: Adjacent workflows can materially expand account value after the underwriting wedge is proven.
    basis: research.yaml
    validationTest: During post-pilot discovery, get at least five customers to rank and commit design-partner interest for option management, utility tracking, or lender diligence modules.
    decisionImpact: If false, this becomes a niche underwriting tool with limited venture-scale upside and should be funded and staffed accordingly.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Interview and audit 10 Northern Virginia development or origination teams on their last three parcel funnels.
    hypothesis: Target teams screen enough high-value parcels and suffer enough false positives to justify repeat software spend.
    successMetric: At least 8 of 10 teams report repeated parcel screening pain and a documented memo process before option approval.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Rebuild five recent parcel decisions manually inside a prototype memo workflow with Dominion and Loudoun evidence templates.
    hypothesis: A structured evidence pack can reproduce real kill/go decisions with less turnaround time than the current spreadsheet and email process.
    successMetric: Pilot design partners judge 4 of 5 recreated memos as decision-ready and at least 50% faster to assemble.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Run two paid live-parcel pilots with land vehicles or AI campus developers in Northern Virginia.
    hypothesis: Buyers will pay before full product completion when a live option decision is at stake.
    successMetric: Two paid pilots closed and at least one used in an actual IC, utility, or consultant workflow.
    owner: Founder CEO
  - horizon: 90-180 days
    experiment: Test consultant channel packaging with two zoning, environmental, or engineering firms.
    hypothesis: Exportable memo outputs increase consultant throughput enough to reduce channel resistance.
    successMetric: One partner-sourced pilot and positive NPS from at least one advisory firm on workflow fit.
    owner: GTM lead
  - horizon: 6-12 months
    experiment: Launch Texas template library on 10 retrospective and live parcel cases.
    hypothesis: The product can generalize from Northern Virginia if county and utility templates are localized rather than fully rebuilt.
    successMetric: Texas workflows reach decision usefulness within 30 days of onboarding and maintain memo turnaround within 20% of Northern Virginia pilots.
    owner: Infrastructure domain lead
  - horizon: 12-18 months
    experiment: Pilot one adjacent module for option management or utility engagement tracking with three existing customers.
    hypothesis: Expansion modules can materially increase account value without resetting the buyer or sales motion.
    successMetric: At least two customers commit paid expansion and blended ACV increases by more than 50%.
    owner: Product lead
operations:
  - Maintain a county- and utility-specific diligence library starting with Loudoun and Dominion artifacts.
  - Run every pilot with a weekly parcel review cadence and explicit before-versus-after turnaround metrics.
  - Use document ingestion with human QA so every confidence score links back to source evidence.
  - Build a standing roster of zoning, environmental, and interconnection specialists who can validate edge cases.
  - Prepare security and audit documentation early because buyers procure this like infrastructure diligence software, not lightweight proptech.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: The first 12 months depend on founder-led customer discovery, pilot sales, and credibility with development and capital-markets buyers.
  - role: Founding eng
    startTiming: Month 0
    rationale: Needed to build the core evidence model, memo workflow, and pilot product fast enough to support live parcel decisions.
  - role: GIS and data engineer
    startTiming: Month 2
    rationale: Needed to integrate parcel, map, and utility data sources and turn manual research into reusable underwriting inputs.
  - role: Infrastructure domain lead
    startTiming: Month 3
    rationale: Needed to encode county, utility, and consultant workflows into templates buyers will trust.
  - role: GTM lead
    startTiming: Month 6
    rationale: Needed after initial pilots to manage pipeline, design-partner conversions, and selective channel partnerships.
milestones:
  - horizon: 0-12 months
    items:
      - Ship Northern Virginia MVP with memo export and evidence-linked underwriting templates
      - Close at least two paid pilots and convert at least one to an annual platform contract
      - Prove at least 50% faster first-pass memo turnaround on live parcel workflows
      - Establish two consultant or advisor partnerships that deliver at least one active opportunity
  - horizon: 12-24 months
    items:
      - Expand into Texas and one Midwest corridor with localized utility and county templates
      - Launch option management or utility engagement tracking for existing customers
      - Reach repeatable pilot-to-platform conversion across multiple accounts
      - Build benchmark dataset from parcel outcomes to improve readiness scoring
  - horizon: 24-36 months
    items:
      - Add lender diligence and tenant-readiness workflows on top of the underwriting record
      - Serve a multi-market customer base with reusable templates across several power corridors
      - Demonstrate that expansion modules materially raise account value beyond the initial underwriting wedge
risks:
  - risk: Utility data opacity makes automated readiness scores hard to trust
    likelihood: High
    impact: High
    mitigation: Keep humans in the loop, expose source evidence, and limit automation to fields that can be verified before formal studies.
  - risk: Consultants and brokers resist a product that could shrink billable diligence work
    likelihood: Medium
    impact: High
    mitigation: Sell workflow acceleration and reusable outputs for consultants rather than claiming to replace expert services.
  - risk: The beachhead buyer universe is too narrow for strong early revenue growth
    likelihood: High
    impact: High
    mitigation: Prioritize multi-project land vehicles and developers first, then expand into adjacent workflows and buyer roles.
  - risk: Enterprise-style infrastructure procurement slows pilots and renewal cycles
    likelihood: Medium
    impact: Medium
    mitigation: Tie early sales to live parcel deadlines, pilot scopes, and measurable turnaround gains rather than broad enterprise transformation claims.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway funds the founding product team, domain template buildout, founder-led sales, and enough paid pilots to prove customer trust, pilot conversion, and the first adjacent workflow expansion.
