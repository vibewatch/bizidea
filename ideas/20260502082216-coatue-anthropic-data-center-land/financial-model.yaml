    baseCase: $120K CAC
    upsideCase: CAC falls to $95K through references and partner intros
    y3RevenueImpactK: -175.0
    cashImpactK: -120.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.5%
    baseCase: 2.0% monthly churn
    upsideCase: Monthly churn falls to 1.0%
    y3RevenueImpactK: -220.0
    cashImpactK: -160.0
  - variable: sales cycle
    downsideCase: Average pilot-to-close cycle stretches from ~6 to ~9 months
    baseCase: ~6-month enterprise pilot motion
    upsideCase: Live-parcel urgency keeps closes near ~4.5 months
    y3RevenueImpactK: -402.5
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: 65% because manual review remains heavier
    baseCase: 70% gross margin
    upsideCase: 72% as template reuse improves
    y3RevenueImpactK: 0.0
    cashImpactK: -137.8
  - variable: hiring pace
    downsideCase: Key Y3 hires are pulled forward by two quarters
    baseCase: Lean hiring tied to milestone proof
    upsideCase: One GTM or G&A hire delayed until after Q4Y3
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: power-site underwriting unit economics
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> AnnualContracts
      AnnualContracts --> ExpandedAccounts
      ExpandedAccounts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from reaching 15 paying accounts by Q4Y3, with early pilots converting into $210K platform contracts and older accounts expanding toward $300K ARR.
  - checkName: Must go right
    finding: The pilot-to-platform conversion rate has to stay near the BP's 50%+ target so the company can fund expansion without hiring ahead of proof.
  - checkName: Model breaks if
    finding: The biggest risk is a one-quarter slip in the relationship-driven sales cycle, which the sensitivity table shows can erase about $403K of Y3 revenue and push downside cash negative.
  - checkName: Next-round proof
    finding: The next seed round is justified once the team reaches 7 customers, launches Texas templates, and shows the first paid expansion-module revenue on top of the core underwriting workflow.
sanityChecks:
  ruleOf40: Y3 growth 133.0% + EBITDA margin -12.6% = 120.4%
  burnMultiple: Improves from about 1.0x in Y2 ($912.2K burn / $905.0K net new revenue) to about 0.2x in Y3 ($346.9K burn / $1,572.5K net new revenue).
  revenuePerFte: About $262K Y3 using ~10.5 average FTEs (benchmark roughly $200-400K vertical SaaS).
  flags:
    - Gross margin assumes the human-verified evidence workflow can be standardized to 70%; if services intensity persists, the model is too optimistic on cash.
    - The customer plan reaches 15 accounts in a narrow buyer universe, so a few slipped logos materially change the outcome.
    - No second financing round is modeled; the business stays cash-positive through Y3 only because hiring remains deliberately lean and Q4Y3 turns slightly EBITDA-positive.
