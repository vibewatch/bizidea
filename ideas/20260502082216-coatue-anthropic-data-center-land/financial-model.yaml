assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: month
    source: Report date is 2026-05-02; model starts the next full month.
  - id: A2
    name: Opening cash from pre-seed close
    value: '2500'
    unit: USDK
    source: '[BP fundingAsk] target funding range is $2-4M; model uses a $2.5M pre-seed consistent with the lean hiring plan and six-month buffer.'
  - id: A3
    name: Pilot contract value
    value: '45'
    unit: USDK per customer
    source: '[BP investorMemo.firstCustomer] paid pilot is $30K-$75K for 2-3 live parcels; model uses midpoint $45K over 3 months.'
  - id: A4
    name: Base annual platform contract
    value: '210'
    unit: USDK ARR per customer
    source: '[BP gtm.pricing] annual team license is $150K-$250K; model uses $210K ARR ($17.5K MRR).'
  - id: A5
    name: Expanded annual account value
    value: '300'
    unit: USDK ARR per mature customer
    source: '[Research market.som] assumes roughly 15 paying customers at about $250K blended annual value, plus [BP pricing] $25K-$40K per extra parcel workflow; model uses $300K ARR for mature expanded accounts.'
  - id: A6
    name: Gross margin target
    value: '70'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] 70% target gross margin; model therefore holds COGS at 30% of revenue.'
  - id: A7
    name: Customer ramp
    value: 3 by M12, 7 by Q4Y2, 15 by Q4Y3
    unit: paying customers
    source: '[BP milestones] requires 2 paid pilots and at least 1 annual conversion in Year 1; [Research market.som] sizes 3-year SOM around 15 paying customers.'
  - id: A8
    name: Revenue maturation timing
    value: 3-month pilot, then platform MRR; expansion uplift after month 12
    unit: timing
    source: '[BP gtm.funnelTargets] paid pilot to annual platform 50%+ and annual platform to expansion module 60%+; [BP product] expansion modules arrive in the 12-24 month window.'
  - id: A9
    name: Monthly logo churn for LTV math
    value: '2.0'
    unit: percent
    source: 'Startup-finance heuristic: narrow, high-touch vertical enterprise workflows with project-tied budgets typically model higher churn than horizontal SaaS; used for unit economics, not explicit logo scheduling.'
  - id: A10
    name: CAC per new paying account
    value: '120'
    unit: USDK
    source: 'Derived from model Year 2 sales and marketing spend of about $486K divided by 4 new accounts; consistent with the BP''s relationship-driven, founder-led enterprise motion.'
  - id: A11
    name: Loaded annual salaries
    value: CEO 150; Eng 185; Data 170; Domain 170; GTM 180; CS/Ops 130; G&A 110
    unit: USDK per FTE
    source: Startup-finance heuristic for U.S. seed-stage vertical SaaS cash compensation including payroll taxes and benefits.
  - id: A12
    name: Initial hires from business plan
    value: CEO and founding engineer at start; Data/GIS M2; domain lead M3; GTM lead M6
    unit: timing
    source: '[BP team] startTiming values Month 0, Month 2, Month 3, and Month 6.'
  - id: A13
    name: Scale hires after initial proof
    value: Eng+CS/Ops M13; second GTM M16; second domain expert M25; third engineer plus G&A M28
    unit: timing
    source: '[BP milestones] Texas/Midwest expansion and adjacent workflow proof require incremental delivery and GTM capacity; hiring is kept lean as a startup-finance heuristic to preserve runway.'
  - id: A14
    name: Non-payroll R&D spend
    value: 10 in Y1, 12 in Y2, 15 in Y3
    unit: USDK per month
    source: Startup-finance heuristic for cloud, data ingestion, mapping, and security tooling for a pre-seed vertical software company.
  - id: A15
    name: Non-payroll S&M spend
    value: 6 pre-GTM, 10 in late Y1, 12-18 through Y2-Y3
    unit: USDK per month
    source: Startup-finance heuristic for travel, customer development, pilots, and selective partner marketing in founder-led enterprise sales.
  - id: A16
    name: Non-payroll G&A spend
    value: 8 in Y1, 10 through M27, 12 after M28
    unit: USDK per month
    source: Startup-finance heuristic for legal, accounting, insurance, and security/compliance prep for enterprise procurement.
  - id: A17
    name: Cash flow treatment
    value: EBITDA approximates cash movement
    unit: policy
    source: Startup-finance heuristic for an early software company with low capex and no debt modeled; no separate financing, capex, or working-capital lines are included.
  - id: A18
    name: Current round milestone
    value: 7 paying customers, Texas launch, and first paid expansion-module revenue by Q4Y2
    unit: milestone
    source: '[BP milestones 12-24 months] expand to Texas and one Midwest corridor, reach repeatable pilot-to-platform conversion, and launch option-management or utility-engagement workflows.'
