scenarios:
  downside:
    description: Sales cycles slip by about one quarter, expansion attach is delayed, and manual review keeps gross margin below target.
    y3RevenueK: 1950.0
    y3EbitdaK: -790.0
    cashLowPointK: -220.0
    keyAssumptionChanges:
      - Customer ramp ends Y3 at 11 accounts instead of 15.
      - Expanded account value reaches only $260K ARR instead of $300K.
      - Gross margin holds at 65% instead of 70%.
  base:
    description: The company hits the BP pilot milestones, converts accounts into annual contracts, and adds expansion revenue without pulling hiring too far forward.
    y3RevenueK: 2755.0
    y3EbitdaK: -346.9
    cashLowPointK: 351.9
    keyAssumptionChanges:
      - 3 paying accounts in Y1, 7 by Q4Y2, and 15 by Q4Y3.
      - Base platform ARR is $210K and mature expanded ARR is $300K.
      - Hiring stays lean until late Y2 and early Y3.
  upside:
    description: Northern Virginia references accelerate Texas wins, expansion modules attach faster, and the company gets modest operating leverage on gross margin.
    y3RevenueK: 3350.0
    y3EbitdaK: -40.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
      - Customer ramp reaches 17 accounts by Q4Y3.
      - Expanded account value reaches $340K ARR as option-management workflows attach earlier.
      - Gross margin improves to 72% as repeatable templates reduce manual verification load.
