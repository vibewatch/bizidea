  costStructure: [工程, 实施, 合规专长, 云基础设施, 客户成功]
jobsToBeDone:
  - job: 当我们要推出或扩大 margin trade funding 时，帮助券商风险团队批出合适账户、拦住危险敞口，让我们既能扩大活跃交易者规模，又不会承受不可接受的损失。
    currentAlternative: 内部规则表、电子表格和人工审核
    successMetric: MTF 上线所需时间，以及逾期率和集中度损失率
  - job: 当市场波动突然加剧时，帮助产品和合规团队快速解释为什么某位客户被允许、被限制或被提示，这样他们就能迅速响应，而不用把产品路线图按下暂停键。
    currentAlternative: 在多个内部系统里手动翻查日志
    successMetric: 事件调查时长，以及具备可审计理由的决策占比
