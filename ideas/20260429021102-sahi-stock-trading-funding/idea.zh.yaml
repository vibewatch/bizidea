problem: >-
  印度券商想赢下活跃交易者，就得在不引爆授信、集中度和合规风险的前提下，推出杠杆产品和更聪明的引导能力。多数中型券商在增加 margin trade funding 或交易者提示时，仍依赖内部规则、割裂的后台数据和人工审核。这让产品上线变慢、在波动市况下更脆弱，也让风险团队在追问“为什么这个客户能获批或收到提示”时，很难拿出站得住脚的内部解释。
targetUser:
  primary: 在已注册 SEBI 的印度券商中，负责风险或产品的负责人，服务对象约为 50,000-500,000 个活跃 demat 账户
  secondary: 负责保证金产品的券商运营与合规负责人
  buyer: 首席风险官或产品副总裁
startupThesis:
  nonObviousInsight: 稀缺资产早已不再是低费率券商 App，而是一层可解释的实时风控与适配性基础设施，让券商在散户参与持续扩大的情况下，仍能安全增加杠杆与 AI 辅助工作流。
  beachhead: 正在推出或扩大 margin trade funding、面向活跃股票与 F&O 交易者的 SEBI 注册中型印度券商
  wedge: 一套 API 和运营控制台，用来评估 MTF 准入、抵押品健康度、集中度上限，以及下一步动作提示；每次决策都附带可审计记录
  whyNowCatalyst: Sahi 的融资、规模和其明确提出的 margin trade funding 与 AI 功能扩张，说明券商现在既看到了需求，也感受到了升级风险决策层的紧迫性，不再能把它只当后台管线。
  ventureScalePath: 先从 MTF 上线护栏切入，再扩展到监控、面向大宗商品和共同基金的交叉销售编排、券商专属 AI 政策护栏，以及面向券商、财富 App 和金融分销伙伴的嵌入式风险基础设施。
solution: >-
  产品接入券商的订单流、持仓账本、抵押品数据与客户画像系统，实时计算账户层面的杠杆准入资格。它为风险和产品团队提供可配置的敞口、集中度、冷静期规则以及分客群提示策略，而不要求团队重建整套内部系统。每一次批准、拦截或面向客户的提示，都会连同可解释理由和策略版本一起存档，方便事后复盘并更快迭代规则。首版产品刻意不生成开放式交易建议，而是聚焦于边界清晰、便于治理的策略约束型准入判断与工作流建议。随着使用深入，同一套控制平面还能支撑更安全的交叉销售与活跃投资者留存流程。
goToMarketSeed:
  firstCustomer: 一家拥有 100,000-300,000 个 demat 账户、正准备首次大规模推出 MTF 的 SEBI 注册券商的产品与风险团队
  buyingTrigger: 推出 margin trade funding 或大宗商品业务，或在市场剧烈波动后暴露出人工审批与监控的缺口
  currentAlternative: 内部规则引擎、电子表格和人工合规审核
  switchingReason: 这套切口方案能让券商带着自身护栏和审计轨迹更快上线，同时避免漫长的内部风险工程项目
  pricingHypothesis: 年平台费加使用费，按被监控或被授信的活跃杠杆账户计费
whyNow:
  - point: 散户交易量已经足够大，券商有理由建设专门的风险基础设施，而不再依赖人工运营。
    signalRefs: [零售交易已达到平台级规模]
    sourceRefs: [1]
  - point: 新融资正被投入 margin trade funding 和 AI 功能，产品路线图因此立刻需要更安全的决策层。
    signalRefs: [券商正向杠杆化相邻业务延伸]
    sourceRefs: [1]
  - point: 与 Dhan、Groww 和 Zerodha 的竞争，迫使平台更快推出差异化的活跃交易者产品，同时不能犯运营错误。
    signalRefs: [印度折扣券商竞争正在收紧]
    sourceRefs: [2]
  - point: 活跃投资者平台正围绕执行工作流与即时体验竞争，这进一步抬高了低延迟后端决策引擎的价值。
    signalRefs: [执行速度已成核心战场]
    sourceRefs: [3, 4]
differentiator: >-
  这不是又一个散户交易 App，也不是通用 AI 副驾，而是一层专门面向券商从低摩擦经纪业务迈向杠杆化与 AI 辅助产品时刻的基础设施。在这个阶段，可解释性与策略控制比花哨的前端更关键。真正可防守的部分，来自券商专属策略模板、对交易和抵押品系统的集成深度，以及真实批准、拦截和提示结果所沉淀出的反馈数据。
