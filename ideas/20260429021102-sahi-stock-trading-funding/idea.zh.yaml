jobsToBeDone:
- job: 当我们推出或扩展保证金融资时，帮助券商风控团队批准合适的账户并拦截危险敞口，从而在不造成不可接受损失的前提下扩大活跃交易者规模。
  currentAlternative: 内部规则表、电子表格和人工审核
  successMetric: MTF 上线时间，以及逾期率和集中度损失率
- job: 当波动飙升时，帮助我们的产品和合规团队解释为何某位客户被允许、受限或收到提示，从而在不冻结产品路线图的情况下快速响应。
  currentAlternative: 跨多个内部系统的人工日志审查
  successMetric: 事件调查耗时，以及具备可审计依据的决策占比
