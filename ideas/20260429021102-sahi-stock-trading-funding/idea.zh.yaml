topRisks:
- name: 监管边界风险
  description: 如果提示过于具体，该产品可能会被视为从风控工具跨入投资建议范畴。
  mitigation: 先从受策略约束的资格判定和护栏工作流做起，保持推荐逻辑可由券商配置，并维护清晰的审计日志。
- name: 现有玩家内部自建
  description: 一旦需求变得明确，更大的券商可能更倾向于自建风控栈。
  mitigation: 优先瞄准中型券商，尽量缩短部署时间，并构建难以快速复制的可复用集成和策略模板。
- name: 集成拖累
  description: 券商数据通常分散在订单、账本、抵押品和合规系统中，拖慢价值实现速度。
  mitigation: 先从高价值 MTF 决策的只读集成开始，优先支持有限的供应商集合，并将实施服务打包标准化。
