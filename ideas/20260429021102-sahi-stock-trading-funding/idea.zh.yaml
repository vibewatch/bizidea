problem: 印度券商只有在推出杠杆产品和更智能引导的同时，不引发信用、集中度或合规风险失控，才能赢得活跃交易者。多数中型券商在增加保证金融资或交易者提示功能时，仍依赖内部规则、割裂的后台数据和人工审核。这使得产品上线缓慢、在波动时期脆弱不稳，而且当风控团队追问为何批准某位客户或向其发出提示时，也难以在内部自圆其说。
targetUser:
  primary: 拥有 50,000-500,000 个活跃 demat 账户的 SEBI 注册印度券商中的风控负责人或产品副总裁
  secondary: 负责保证金产品的券商运营与合规负责人
  buyer: 首席风险官或产品副总裁
startupThesis:
  nonObviousInsight: 稀缺资产已不再是低费率券商应用，而是一个可解释的实时风险与适当性层，使券商能够在零售参与扩大时安全地增加杠杆和 AI 辅助工作流。
  beachhead: 面向活跃股票和 F&O 交易者推出或扩展保证金融资的 SEBI 注册印度中型券商
  wedge: 用于评估 MTF 资格、抵押品健康度、集中度限制和经批准的下一最佳行动提示的 API 与运营控制台，并为每次决策保留审计轨迹
  whyNowCatalyst: Sahi 的融资、规模以及其明确推进保证金融资和 AI 功能，表明券商如今既有需求也有紧迫性去升级风险决策，而不再把它仅视作后台管道。
  ventureScalePath: 先从 MTF 上线护栏切入，再扩展到监控、商品与共同基金的交叉销售编排、券商专属 AI 政策护栏，以及面向券商、财富应用和金融科技分销伙伴的嵌入式风控基础设施。
solution: 该产品接入券商的订单流、持仓账本、抵押品数据和客户画像系统，实时计算账户层面的杠杆资格。它为风控和产品团队提供可配置的敞口、集中度、冷静期规则以及分层提示策略，而无需进行完整内部重构。每一次批准、拦截或面向客户的提示，都会连同可解释的依据和策略版本一并存档，使团队能够更快复盘事件并调整规则。初始产品避免生成开放式交易建议，而是专注于更易治理的、受策略约束的资格判定和工作流建议。随着时间推移，同一套控制平面还可支持活跃投资者产品中更安全的交叉销售和留存路径。
goToMarketSeed:
  firstCustomer: 一家拥有 100,000-300,000 个 demat 账户、正准备首次大规模推出 MTF 的 SEBI 注册券商的产品与风控团队
  buyingTrigger: 推出保证金融资或商品业务，或因市场波动暴露出人工审批和监控缺口
  currentAlternative: 内部规则引擎加电子表格和人工合规审核
  switchingReason: 该切入点让券商能够凭借专属护栏和审计轨迹更快上线，同时避免冗长的内部风险工程项目。
  pricingHypothesis: 按受监控或融资的活跃杠杆账户计价的年度平台费加使用费
