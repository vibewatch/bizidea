topRisks:
  - name: 监管边界风险
    description: 如果提示内容过于具体，产品可能会被视为从风险工具越界到了投资建议。
    mitigation: 先从策略约束型准入与护栏工作流做起，由券商自行配置推荐逻辑，并保留明确审计日志。
  - name: 现有厂商内部自建
    description: 更大的券商一旦意识到需求，可能更倾向于自己搭建整套风险栈。
    mitigation: 先拿下中型券商，尽量压缩部署周期，并打造难以被快速复制的可复用集成和策略模板。
  - name: 集成拖累
    description: 券商数据通常分散在订单、账本、抵押品和合规系统里，拖慢见效速度。
    mitigation: 先从只读集成切入最有价值的 MTF 决策，优先支持少量供应商组合，并把实施服务打包得足够紧凑。
