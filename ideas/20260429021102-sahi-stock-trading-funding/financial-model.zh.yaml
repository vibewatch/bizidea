scenarios:
  downside:
    description: 一个试点延后 2 个季度，混合 ACV 下降 15%，模块扩张也晚 1 年才出现。
    y3RevenueK: 876.0
    y3EbitdaK: -470.0
    cashLowPointK: 560.0
    keyAssumptionChanges:
      - 销售周期从 6 个月拉长到 9 个月。
      - 稳态 ACV 从 $288K 降到约 $245K。
      - Q4Y3 的 customer equivalents 只有约 3.6，而不是 4.8。
  base:
    description: 第 1 年拿下两个付费试点；到第 2 年转成 2-3 个生产券商；到 Q4Y3 达到 4 个生产客户并叠加相邻模块提升。
    y3RevenueK: 1195.2
    y3EbitdaK: -253.36
    cashLowPointK: 852.32
    keyAssumptionChanges:
      - 生产等效 ACV 维持在 $288K。
      - 试点转生产转化率保持在 50% 或以上。
      - 招聘保持精瘦，到 Q4Y3 为 8 FTE。
  upside:
    description: 试点转化更快，第 3 年多签下一家券商，而且首两个账户内的相邻模块使用也更早扩张。
    y3RevenueK: 1497.6
    y3EbitdaK: -60.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
      - Q4Y3 的 customer equivalents 达到约 5.8。
      - 扩张收入在生产后 6 个月内附着，而不是 12 个月。
      - 随着集成更可复用，毛利率维持在 72%。
sensitivity:
  - variable: ARPU
    downsideCase: 混合生产等效 ACV 下降 15%，至约 $245K。
    baseCase: 混合生产等效 ACV 为 $288K。
    upsideCase: 在更高使用费带动下，混合生产等效 ACV 上升 10%，至约 $317K。
    y3RevenueImpactK: -179.28
    cashImpactK: -125.5
  - variable: CAC
    downsideCase: 由于采购和安全审查范围扩大，CAC 上升 20% 至 $168K。
    baseCase: CAC 为 $140K。
    upsideCase: 在伙伴带来的管道支持下，CAC 下降 15% 至 $119K。
    y3RevenueImpactK: 0.0
    cashImpactK: -112.0
  - variable: churn
    downsideCase: 若产品始终只停留在 MTF，月流失率升至 2.0%。
    baseCase: 月流失率为 1.5%。
    upsideCase: 若工作流嵌入更深，月流失率降至 1.0%。
    y3RevenueImpactK: -57.6
    cashImpactK: -40.3
  - variable: sales cycle
    downsideCase: 新 logo 从调研到生产需要 9 个月。
    baseCase: 新 logo 从调研到生产需要 6 个月。
    upsideCase: 可复用连接器包把周期压缩到 5 个月。
    y3RevenueImpactK: -158.4
    cashImpactK: -110.0
  - variable: gross margin
    downsideCase: 如果部署一直偏定制化，毛利率降到 62%。
    baseCase: 毛利率为 70%。
    upsideCase: 随着连接器标准化，毛利率升到 74%。
    y3RevenueImpactK: 0.0
    cashImpactK: -95.62
  - variable: hiring pace
    downsideCase: 在尚未形成可复用生产转化前，就提前拉进两名额外员工。
    baseCase: 招聘节奏维持到 Q4Y3 为 8 FTE。
    upsideCase: 一名 solutions 岗位延后到明确出现模块拉力时再招聘。
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> ExpansionModules
      ProductionLogos --> Revenue
      ExpansionModules --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景由第 1 年两个付费试点、第 2 年 Q4 前达到 2-3 个生产券商，以及 Q4Y3 达到 4.8 个生产等效客户共同驱动。
  - checkName: 必须做对的事
    finding: 试点转生产转化率必须维持在商业计划设定的 50%+，公司才有机会在现金缓冲变得关键前，跑出可复用的券商部署。
  - checkName: 模型会在何时失灵
    finding: 如果销售周期拖到 9 个月，或 ARPU 下砍 15%，第 3 年收入会少掉约 $160-180K，现金也会逼近 downside 情景低点。
  - checkName: 下一轮融资证明点
    finding: 只有在拿到 2-3 个生产客户、1 个渠道伙伴，以及至少 1 笔相邻模块销售后，下一轮融资才有理由建立在“公司能扩到 MTF 之外”的论点上。
sanityChecks:
  ruleOf40: "Y3 growth 67.7% + EBITDA margin -21.2% = 46.5%"
  burnMultiple: "Y2 burn multiple 0.9x (-$451K EBITDA / $523K net new revenue); Y3 improves to 0.5x."
  revenuePerFte: "$149K Y3 (benchmark $200–400K SaaS)"
  flags:
    - 到第 3 年底，收入仍集中在不到 5 家券商关系上。
    - 每名 FTE 对应收入低于典型 SaaS 基准，因此模型要么需要更高 ACV，要么需要更强的交付产品化。
    - 滩头市场偏窄，因此第 2 年就必须看到相邻模块拉力，才能支撑风险投资级叙事。
    - 基准情景到第 3 年仍是 EBITDA 为负，因此一旦试点转化延迟，下一轮融资就会被提前。
