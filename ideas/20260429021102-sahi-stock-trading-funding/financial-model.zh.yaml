scenarios:
  downside:
    description: One pilot slips by 2 quarters, blended ACV is 15% lower, and module pull starts a year late.
    y3RevenueK: 876.0
    y3EbitdaK: -470.0
    cashLowPointK: 560.0
    keyAssumptionChanges:
    - Sales cycle stretches from 6 months to 9 months.
    - Steady-state ACV falls from $288K to about $245K.
    - Q4Y3 customer equivalents end at about 3.6 instead of 4.8.
  base:
    description: Two paid pilots in Y1 turn into 2-3 production brokers by Y2 and 4 production logos plus adjacency uplift by Q4Y3.
    y3RevenueK: 1195.2
    y3EbitdaK: -253.36
    cashLowPointK: 852.32
    keyAssumptionChanges:
    - Production-equivalent ACV stays at $288K.
    - Pilot-to-production conversion remains at or above 50%.
    - Hiring stays lean at 8 FTE by Q4Y3.
  upside:
    description: Pilot conversion is faster, one extra broker closes in Y3, and adjacency usage expands earlier inside the first two accounts.
    y3RevenueK: 1497.6
    y3EbitdaK: -60.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - Q4Y3 customer equivalents reach about 5.8.
    - Expansion revenue attaches within 6 months of production instead of 12 months.
    - Gross margin holds at 72% as integrations become repeatable.
sensitivity:
- variable: ARPU
  downsideCase: Blended production-equivalent ACV falls 15% to ~$245K.
  baseCase: Blended production-equivalent ACV is $288K.
  upsideCase: Blended production-equivalent ACV rises 10% to ~$317K with higher usage.
  y3RevenueImpactK: -179.28
  cashImpactK: -125.5
- variable: CAC
  downsideCase: CAC rises 20% to $168K because procurement and security reviews expand.
  baseCase: CAC is $140K.
  upsideCase: CAC falls 15% to $119K with a partner-led pipeline.
  y3RevenueImpactK: 0.0
  cashImpactK: -112.0
- variable: churn
  downsideCase: Monthly churn rises to 2.0% as the product stays narrow to MTF only.
  baseCase: Monthly churn is 1.5%.
  upsideCase: Monthly churn falls to 1.0% after deeper workflow embedding.
  y3RevenueImpactK: -57.6
  cashImpactK: -40.3
- variable: sales cycle
  downsideCase: New logos take 9 months from discovery to production.
  baseCase: New logos take 6 months from discovery to production.
  upsideCase: A repeatable connector pack cuts the cycle to 5 months.
  y3RevenueImpactK: -158.4
  cashImpactK: -110.0
- variable: gross margin
  downsideCase: Gross margin drops to 62% because deployments stay custom.
  baseCase: Gross margin is 70%.
  upsideCase: Gross margin rises to 74% as connectors standardize.
  y3RevenueImpactK: 0.0
  cashImpactK: -95.62
- variable: hiring pace
  downsideCase: Two extra hires are pulled forward before repeatable production conversions.
  baseCase: Hiring stays at 8 FTE by Q4Y3.
  upsideCase: Hiring of one solutions role is delayed until clear module pull appears.
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单元经济流转
  mermaid: "flowchart LR\n  TargetAccounts --> PaidPilots\n  PaidPilots --> ProductionLogos\n  ProductionLogos --> ExpansionModules\n  ProductionLogos --> Revenue\n  ExpansionModules --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n"
modelSanity:
- checkName: 收入引擎
  finding: The base case is driven by two paid pilots in Y1, 2-3 production brokers by Q4Y2, and 4.8 production-equivalent customers by Q4Y3.
- checkName: 必须顺利发生的事项
  finding: Pilot-to-production conversion has to stay at or above the business plan's 50%+ target so the company reaches repeatable broker deployments before cash buffer becomes strategic.
- checkName: 模型失效条件
  finding: A 9-month sales cycle or a 15% ARPU cut removes roughly $160-180K of Y3 revenue and pushes cash toward the downside-case low point.
- checkName: 下一轮融资证明
  finding: The next financing is justified only after 2-3 production logos, one channel partner, and at least one adjacent-module sale prove the company can expand beyond a narrow MTF wedge.
sanityChecks:
  ruleOf40: Y3 增长 67.7% + EBITDA 利润率 -21.2% = 46.5%
  burnMultiple: Y2 burn multiple 为 0.9x（-$451K EBITDA / $523K 净新增收入）；Y3 改善至 0.5x。
  revenuePerFte: Y3 为 $149K（基准为 $200–400K SaaS）
  flags:
  - 到 Y3 末，收入仍集中在不足 5 个券商关系中。
  - 每名 FTE 的收入低于典型 SaaS 基准，因此模型需要更高 ACV 或更产品化的交付。
  - 滩头市场较窄，因此要形成风险投资级叙事，必须在 Y2 出现相邻模块拉动。
  - 基础情景到 Y3 仍为 EBITDA 负值，因此试点转化延迟会把下一轮融资时间点提前。
