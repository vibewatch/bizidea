slug: margin-risk-broker-os
date: 2026-04-29
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-05"
    unit: month
    source: "[BP date 2026-04-29] 模型从计划日期后的下一个月开始。"
  - id: A2
    name: INR 兑 USD 汇率
    value: "₹83/USD"
    unit: fx
    source: "[research.market.tam rationale] 使用约 ₹83/USD。"
  - id: A3
    name: 稳态生产等效 ACV
    value: "$288K"
    unit: annual revenue per customer equivalent
    source: "[BP gtm pricing] 年平台费为 ₹60 lakh-₹1.5 crore 外加使用费，这里按约 ₹2.4 crore 的混合值建模，并低于 [research.bottomUpSizingDrivers] 中 ₹3.0 crore 的示意性支出。"
  - id: A4
    name: 付费试点合同金额
    value: "$28.8K over 4 months"
    unit: revenue per pilot
    source: "[BP gtm pricing] 付费试点约为 ₹15-30 lakh，周期 3-4 个月；模型按中位数处理，相当于 0.3 个生产等效客户。"
  - id: A5
    name: 客户指标归一化
    value: "1.0 customer = 一个生产等效券商 logo；试点按 0.3 计，早期模块扩张已并入 customer equivalents。"
    unit: definition
    source: "创业财务启发式，用来让试点、平台、使用费和模块收入都能对齐同一套 ARPU 驱动的 P&L。"
  - id: A6
    name: 第 1 年 logo 增长节奏
    value: "到 M6 拿下 2 个付费试点；到 M9 有 1 个试点转成生产。"
    unit: customers
    source: "[BP milestones 0-12 months] + [BP investorMemo next diligence]."
  - id: A7
    name: 第 2-3 年 logo 增长节奏
    value: "到 Q4Y2 达到 2-3 个生产客户；到 Q4Y3 达到 4 个生产客户并叠加相邻模块提升（4.8 个 customer equivalents）。"
    unit: customers
    source: "[BP milestones 12-24 months and 24-36 months] + [research.market.som] 第 3 年 4 个 logo。"
  - id: A8
    name: 目标毛利率
    value: "70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]."
  - id: A9
    name: 销售周期与转化
    value: "从创始人主导销售到生产上线约 6 个月，试点转生产转化率 50%+。"
    unit: time and conversion
    source: "[BP gtm funnelTargets] + 面向券商采购流程的创业财务启发式。"
  - id: A10
    name: 每个生产 logo 的全负载 CAC
    value: "$140K"
    unit: USD per customer
    source: "面向金融科技企业销售、合规审查较长且试点交付较重的创业财务启发式。"
  - id: A11
    name: 月度客户流失率
    value: "1.5%"
    unit: percent
    source: "适用于黏性较强但客户集中的券商工作流软件的创业财务启发式。"
  - id: A12
    name: 全负载年薪
    value: "CEO $90K；Engineering $85K；Risk product $80K；Solutions $70K；Sales $110K；G&A $55K。"
    unit: annual USD per FTE
    source: "适用于印度 B2B 金融科技、偏资深创业人才招聘的创业财务启发式。"
  - id: A13
    name: 非人力运营支出
    value: "$28-30K per month"
    unit: monthly USD
    source: "[BP team security/compliance advisor] + [research regulatoryTechnicalConstraints] + 适用于法务、审计、保险、差旅和企业软件的创业财务启发式。"
  - id: A14
    name: 人员扩张节奏
    value: "到 Q4Y1 为 5 FTE，到 Q4Y2 为 7 FTE，到 Q4Y3 为 8 FTE。"
    unit: FTE
    source: "[BP team] + [BP milestones] 转化成的保守招聘计划。"
  - id: A15
    name: pre-seed 融资到账
    value: "$2.1M closes before M1"
    unit: USD
    source: "[BP fundingAsk] pre-seed 目标区间为 $2-3M。"
  - id: A16
    name: 下一轮融资里程碑
    value: "到 Q4Y2 达到 2-3 个生产级券商客户、1 个集成 / 渠道伙伴，以及首个相邻模块验证，同时保留约 6 个月缓冲。"
    unit: milestone
    source: "[BP milestones 12-24 months] + 面向下一轮融资准备度的创业财务启发式。"
