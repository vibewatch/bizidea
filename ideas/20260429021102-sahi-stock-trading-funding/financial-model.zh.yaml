assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: month
  source: '[BP date 2026-04-29] 模型从计划日期之后的下一个月份开始。'
- id: A2
  name: INR 兑 USD 汇率
  value: ₹83/USD
  unit: fx
  source: '[research.market.tam rationale] 使用约 ₹83/USD。'
- id: A3
  name: 稳态生产等价 ACV
  value: $288K
  unit: annual revenue per customer equivalent
  source: '[BP gtm pricing] 年平台费为 ₹60 lakh-₹1.5 crore，另加使用费；混合后约为 ₹2.4 crore，并保持低于 [research.bottomUpSizingDrivers] 中示意性的 ₹3.0 crore 支出。'
- id: A4
  name: 付费试点合同价值
  value: $28.8K over 4 months
  unit: revenue per pilot
  source: '[BP gtm pricing] 付费试点约为 ₹15-30 lakh，周期 3-4 个月；模型中值按 0.3 个生产等价客户计。'
- id: A5
  name: 客户指标标准化
  value: 1.0 customer = one production-equivalent broker logo; pilots count as 0.3 and early module expansion is embedded in customer equivalents.
  unit: definition
  source: 创业财务经验法则，用于让试点、平台、使用费和模块收入统一到一个由 ARPU 驱动的损益模型中。
- id: A6
  name: 第 1 年 logo 爬坡
  value: 2 paid pilots by M6; 1 pilot converts to production by M9.
  unit: customers
  source: '[BP milestones 0-12 months] + [BP investorMemo next diligence]。'
- id: A7
  name: 第 2 年和第 3 年 logo 爬坡
  value: 2-3 production logos by Q4Y2; 4 production logos plus adjacent-module uplift by Q4Y3 (4.8 customer equivalents).
  unit: customers
  source: '[BP milestones 12-24 months and 24-36 months] + [research.market.som] 第 3 年达到 4 个 logo。'
- id: A8
  name: 目标毛利率
  value: 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]。'
- id: A9
  name: 销售周期与转化
  value: 6-month founder-led cycle to production with 50%+ pilot-to-production conversion.
  unit: time and conversion
  source: '[BP gtm funnelTargets] + 适用于券商采购的创业财务经验法则。'
- id: A10
  name: 每个生产级 logo 的完全摊销 CAC
  value: $140K
  unit: USD per customer
  source: 适用于创始人主导、合规审查长且需交付试点的企业金融科技销售的创业财务经验法则。
- id: A11
  name: 月度客户流失率
  value: 1.5%
  unit: percent
  source: 适用于高粘性但客户集中的券商工作流软件的创业财务经验法则。
- id: A12
  name: 完全摊销年薪
  value: CEO $90K; Engineering $85K; Risk product $80K; Solutions $70K; Sales $110K; G&A $55K.
  unit: annual USD per FTE
  source: 适用于印度本地、雇用资深创业人才的 B2B 金融科技招聘的创业财务经验法则。
- id: A13
  name: 非薪资运营支出
  value: $28-30K per month
  unit: monthly USD
  source: '[BP team security/compliance advisor] + [research regulatoryTechnicalConstraints] + 适用于法务、审计、保险、差旅和企业软件的创业财务经验法则。'
- id: A14
  name: 人员爬坡
  value: 5 FTE by Q4Y1, 7 FTE by Q4Y2, 8 FTE by Q4Y3.
  unit: FTE
  source: '[BP team] + [BP milestones] 转化为保守招聘计划。'
- id: A15
  name: Pre-seed 融资完成
  value: $2.1M closes before M1
  unit: USD
  source: '[BP fundingAsk] pre-seed 目标区间为 $2-3M。'
- id: A16
  name: 融资里程碑
  value: Reach 2-3 production logos, one integration/channel partner, and first adjacency proof by Q4Y2 with about 6 months of buffer.
  unit: milestone
  source: '[BP milestones 12-24 months] + 适用于下一轮融资准备度的创业财务经验法则。'
