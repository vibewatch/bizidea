  adoptionFrictionMatrix:
  - friction: 券商系统中的订单、抵押品和账本数据高度碎片化
    severity: high
    affectedBuyer: 风控 / 产品 / 工程
    mitigation: 先落地只读监控，待数据映射稳定后再扩展到策略动作。
    sourceRefs:
    - 11
    - 17
    - 19
  - friction: 担心提示会被解读为建议或不安全的算法能力开放
    severity: high
    affectedBuyer: 合规 / CRO
    mitigation: 将输出限制在受策略约束的资格、限额和预批准工作流提示内。
