    value: $1.4M
    rationale: 第 3 年 SOM 假设通过叠加层打法拿下 4 个 logo × 预计 ₹3.0 crore ACV，这更符合聚焦的创始人主导企业 GTM，而非广泛市场渗透。
    isEstimate: true
    sourceRefs:
    - 11
    - 12
    - 17
