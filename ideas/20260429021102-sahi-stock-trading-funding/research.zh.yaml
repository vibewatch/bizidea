  adoptionFrictionMatrix:
  - friction: 券商系统中的订单、抵押品与账本数据高度割裂
    severity: high
    affectedBuyer: Risk / product / engineering
    mitigation: 先落地只读监控，等数据映射稳定后，再扩展到策略动作。
    sourceRefs:
    - 11
    - 17
    - 19
  - friction: 担心提示会被解读为建议或不安全的算法引导
    severity: high
    affectedBuyer: Compliance / CRO
    mitigation: 把输出限制在策略约束型准入、额度和预审批工作流提示上。
    sourceRefs:
    - 4
    - 6
  - friction: 触碰交易与客户数据系统时，必须经历网络与供应商风险审查
    severity: high
    affectedBuyer: CTO / CISO / procurement
    mitigation: 从第一天起就按最小权限访问、审计日志和清晰的 CSCRF 对齐来设计。
    sourceRefs:
    - 5
  - friction: 现有厂商锁定与续约周期
    severity: medium
    affectedBuyer: COO / CTO
    mitigation: 把自己定位成无需替换 OMS、按周而不是按季度上线的覆盖层。
    sourceRefs:
    - 17
    - 20
    - 18
market:
  tam:
    value: $14.5M
    rationale: >-
      自下而上的估算：约 40 家可触达的印度券商 / 财富平台 × 每家估算 ₹3.0 crore 年支出，用于 MTF 决策与审计工具 = ₹120 crore（按 ₹83/USD 约合 $14.5M）。客户数量之所以被压住，是因为已有证据表明，活跃客户超过 1 lakh 的券商只有约 20 家，而再往外扩一圈相邻平台后，总量才会到这个数量级。
    isEstimate: true
    sourceRefs:
    - 13
    - 2
    - 11
  sam:
    value: $6.5M
    rationale: 滩头 SAM 假设近期最可能上线或扩张 MTF 的中型印度券商约 18 家，客群位于 0.1m-0.5m 的活跃 / demat 区间，每家年支出约 ₹3.0 crore。
    isEstimate: true
    sourceRefs:
    - 13
    - 1
    - 2
  som:
    value: $1.4M
    rationale: 第 3 年 SOM 假设通过覆盖层打法拿下 4 个 logo，每家 ACV 约 ₹3.0 crore；这更符合聚焦型创始人主导 GTM，而不是大范围市场渗透。
    isEstimate: true
    sourceRefs:
    - 11
    - 12
    - 17
