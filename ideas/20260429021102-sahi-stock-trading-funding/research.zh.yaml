    - 18
  - factor: legal
    impact: positive
    point: SEBI 更严格的网络、MTF 和零售算法交易规则提高了合规复杂度，也让可审计性成为产品特性。
    sourceRefs:
    - 5
    - 4
    - 8
  - factor: environmental
    impact: neutral
    point: 与监管、集成和行为风险相比，环境因素对这一品类并非关键决策因素。
