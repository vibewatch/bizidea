  - point: 大型券商可能更倾向内部自建，或在平台续约时一并解决，而不是采购专门点状产品。
    sourceRefs:
    - 17
    - 20
competitors:
- name: Symphony Fintech
  stage: incumbent
  wedge: 面向印度券商的端到端多资产 OMS / 执行 / RMS。
  pricing: 定制企业定价
  strength: 对券商技术栈渗透深，且具备低延迟交易基础设施。
  weaknessVsUs: 更宽的平台范围，往往意味着在可解释 MTF 策略工作流上更慢、更不够定制。
  sourceRefs:
  - 17
- name: Devexperts / DXtrade
  stage: scale-up
  wedge: 面向券商的多资产交易平台，并持续扩展实时风险工具。
  pricing: 定制企业定价
  strength: 工程能力很强，也有面向券商与自营平台的风险提醒能力。
  weaknessVsUs: 在 SEBI / 存管 / MTF 流程上并非印度原生，对中型券商覆盖层场景来说可能过重。
  sourceRefs:
  - 18
- name: FYNXT
  stage: scale-up
  wedge: 模块化的券商运营、CRM、开户和多资产工作流平台。
  pricing: 定制企业定价
  strength: 模块弹性强，工作流自动化能力好。
  weaknessVsUs: 它更像广义券商运营平台，而不是面向印度券商、聚焦实时 MTF 决策的产品。
  sourceRefs:
  - 19
- name: ODIN / Synapsewave legacy stack
  stage: incumbent
  wedge: 深度嵌入印度券商生态的订单管理基础设施。
  pricing: Custom / legacy enterprise pricing
  strength: 安装基础深、组织熟悉度高。
  weaknessVsUs: 传统架构和广义 OMS 导向，为一层现代化的 MTF 策略 / 审计层留出了空间。
  sourceRefs:
  - 20
regulatoryTechnicalConstraints:
- point: MTF 抵押品必须遵循 SEBI 的 pledge / re-pledge 框架，因此产品必须和存管侧抵押品状态干净对接，而不能另造一套平行记录。
  sourceRefs:
  - 7
  - 9
- point: 提供 MTF 的券商要满足交易所审批与净资产证明要求，因此任何 rollout 都会把合规团队拉进来。
  sourceRefs:
  - 8
  - 9
- point: SEBI 对散户算法交易的防护要求，使得产品一旦滑向开放式推荐，就会立刻变得危险。
  sourceRefs:
  - 4
- point: CSCRF 抬高了日志、访问控制、韧性与事件流程的基线要求，凡是触碰受监管实体的软件都绕不过去。
  sourceRefs:
  - 5
- point: 延迟与稳定性都很关键，因为底层券商体验越来越围绕执行速度和即时决策来卖。
  sourceRefs:
  - 1
  - 17
validationSignals:
- point: Sahi 融资 $33M，并明确表示将扩展 margin trade funding 与 AI 驱动功能。
  sourceRefs:
  - 1
- point: CDSL 投资者账户已超过 15.29+ crore，并在 FY25 新增约 3.73 crore demat 账户。
  sourceRefs:
  - 3
- point: NSE 活跃客户在 FY25 增长了 21%，Groww、Zerodha 和 Angel One 都已达到数百万活跃客户规模。
  sourceRefs:
  - 2
- point: HDFC Securities 表示其自有 MTF 资产组合在 FY25 同比增长 50%，并提到全行业 MTF 余额峰值约为 ₹85,000 crore。
  sourceRefs:
  - 11
- point: Angel One 在 FY25 明确强调了独立 MTF 板块与持续扩张的 client funding 账簿。
  sourceRefs:
  - 12
openQuestions:
- 目前有多少中型印度券商在 MTF 审批和抵押品监控上仍依赖电子表格 / 人工异常处理？
- 一家券商愿意为覆盖层产品支付怎样的 ACV，超过哪个阈值后它就会转而扩展现有 OMS/RMS 合同？
- 哪 2-3 组 OMS / 后台 / 存管集成组合，能覆盖首批 10 个目标 logo 中的大多数？
- 在 SEBI 审视下，什么样的提示设计能明确留在风险 / 适配性工具范围内，而不落入投资建议边界？
