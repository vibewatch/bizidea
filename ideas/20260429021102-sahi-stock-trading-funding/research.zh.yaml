  wedge: 面向印度券商的端到端多资产 OMS / 执行 / RMS。
  pricing: Custom enterprise pricing
  strength: 深厚的券商技术栈覆盖和低延迟交易基础设施。
  weaknessVsUs: 更广的平台范围可能使其更慢，也更难贴合可解释的 MTF 策略工作流。
  sourceRefs:
  - 17
- name: Devexperts / DXtrade
  stage: scale-up
  wedge: 面向多类券商的多资产交易平台，并不断扩展实时风控工具。
  pricing: Custom enterprise pricing
  strength: 为券商和自营平台提供强大的工程深度和风险预警能力。
  weaknessVsUs: 在 SEBI / 存管 / MTF 工作流上并非印度原生，对于中型叠加层场景可能过重。
  sourceRefs:
  - 18
- name: FYNXT
  stage: scale-up
  wedge: 模块化的券商运营、CRM、开户和多资产工作流栈。
  pricing: Custom enterprise pricing
  strength: 灵活的模块化与工作流自动化。
  weaknessVsUs: 相比专注印度券商实时 MTF 决策，它更像一个通用券商运营平台。
  sourceRefs:
  - 19
- name: ODIN / Synapsewave legacy stack
  stage: incumbent
  wedge: 广泛嵌入印度券商生态的订单管理基础设施。
  pricing: Custom / legacy enterprise pricing
  strength: 装机基础带来的熟悉度与机构知识。
  weaknessVsUs: 遗留架构和宽泛的 OMS 导向，为聚焦 MTF 的现代策略/审计层留下空间。
  sourceRefs:
  - 20
regulatoryTechnicalConstraints:
- point: MTF 抵押品必须运行在 SEBI 的质押 / 再质押框架内，因此产品必须与存管关联的抵押状态干净集成，而不是另起一套并行记录。
  sourceRefs:
  - 7
  - 9
- point: 提供 MTF 的券商面临交易所审批和净资产证明要求，这会提高任何上线过程中的合规参与度。
  sourceRefs:
  - 8
  - 9
- point: SEBI 对零售算法交易的保护措施，使创业公司若滑向开放式推荐行为将面临风险。
  sourceRefs:
  - 4
- point: CSCRF 提高了面向受监管实体的软件在日志、访问控制、韧性和事件流程方面的基线要求。
  sourceRefs:
  - 5
- point: 延迟和可靠性很重要，因为底层券商体验正越来越以执行速度和即时决策来售卖。
  sourceRefs:
  - 1
  - 17
validationSignals:
- point: Sahi 融资 $33M，并明确计划扩展到保证金融资和 AI 驱动功能。
  sourceRefs:
  - 1
- point: CDSL 的投资者账户突破 15.29+ crore，并在 FY25 新增约 3.73 crore 个 demat 账户。
  sourceRefs:
  - 3
- point: NSE 活跃客户在 FY25 增长 21%，Groww、Zerodha 和 Angel One 均达到数百万活跃客户规模。
  sourceRefs:
  - 2
- point: HDFC Securities 报告称其自身 MTF 组合在 FY25 同比增长 50%，并提到全行业 MTF 余额峰值约为 ₹85,000 crore。
  sourceRefs:
  - 11
- point: Angel One 在 FY25 强调了专门的 MTF 业务板块和增长中的客户融资本。
  sourceRefs:
  - 12
openQuestions:
- 目前有多少印度中型券商仍依赖电子表格 / 人工异常处理来完成 MTF 审批和抵押品监控？
- 在更倾向于扩展现有 OMS/RMS 合同之前，券商能为叠加层产品接受多高的 ACV？
- 哪 2-3 组 OMS/后台/存管集成组合能够覆盖前 10 个目标 logo 中的大多数？
- 在 SEBI 审查下，哪些具体提示设计能够明确停留在风控 / 适当性工具范围内，而不越过投资建议边界？
