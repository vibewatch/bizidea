      - 17
      - 18
      - 19
      - 20
  pestle:
  - factor: political
    impact: neutral
    point: 没有单一政治催化因素占主导，但印度市场基础设施政策持续倾向于更强的监控、保证金完整性和投资者保护。
    sourceRefs:
    - 7
    - 4
  - factor: economic
    impact: positive
    point: 零售参与和活跃客户增长仍在扩张，这支撑了券商对可货币化杠杆产品的投入。
    sourceRefs:
    - 2
    - 3
  - factor: social
    impact: negative
    point: 零售交易亏损带来声誉和行为风险，提高了市场对提示和适当性问题的敏感度。
    sourceRefs:
    - 6
  - factor: technological
    impact: positive
    point: 低延迟券商技术和 AI 辅助工作流，为可解释策略引擎创造了机会，而不再只是静态规则表。
    sourceRefs:
    - 1
