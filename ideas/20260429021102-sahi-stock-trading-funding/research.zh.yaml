  - friction: 现有供应商锁定与续约周期
    severity: medium
    affectedBuyer: COO / CTO
    mitigation: 定位为避免替换 OMS、能在数周而非数季度内部署的叠加层。
    sourceRefs:
    - 17
    - 20
    - 18
market:
