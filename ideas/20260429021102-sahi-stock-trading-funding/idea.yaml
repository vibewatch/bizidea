topRisks:
  - name: Regulatory boundary risk
    description: The product could be viewed as crossing from risk tooling into investment advice if prompts become too prescriptive.
    mitigation: Start with policy-bound eligibility and guardrail workflows, keep recommendation logic configurable by the broker, and maintain explicit audit logs.
  - name: Incumbent internal build
    description: Larger brokers may prefer to build their own risk stack once the need is obvious.
    mitigation: Target mid-market brokers first, minimize deployment time, and build reusable integrations and policy templates that are hard to match quickly.
  - name: Integration drag
    description: Broker data is often fragmented across order, ledger, collateral, and compliance systems, slowing time to value.
    mitigation: Begin with read-only integrations for the highest-value MTF decisions, support a narrow vendor set first, and package implementation services tightly.
