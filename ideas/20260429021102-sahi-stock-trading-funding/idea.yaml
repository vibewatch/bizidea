problem: Indian brokers can win active traders only if they launch leveraged products and smarter guidance without blowing up credit, concentration, or compliance risk. Most mid-market brokers still rely on in-house rules, fragmented back-office data, and manual reviews when adding margin trade funding or trader nudges. That makes launches slow, brittle during volatility, and hard to defend internally when risk teams ask why a customer was approved or prompted.
targetUser:
  primary: Head of Risk or VP Product at a SEBI-registered Indian broker with 50,000-500,000 active demat accounts
  secondary: Brokerage operations and compliance leads responsible for margin products
  buyer: Chief Risk Officer or VP Product
startupThesis:
  nonObviousInsight: The scarce asset is no longer a low-fee brokerage app; it is an explainable real-time risk and suitability layer that lets brokers safely add leverage and AI-assisted workflows as retail participation scales.
  beachhead: SEBI-registered mid-market Indian brokers launching or expanding margin trade funding for active equity and F&O traders
  wedge: API and operator console that scores MTF eligibility, collateral health, concentration limits, and approved next-best-action prompts with an audit trail for every decision
  whyNowCatalyst: Sahi’s funding, scale, and stated push into margin trade funding and AI features suggest brokers now have both the demand and urgency to modernize risk decisioning instead of treating it as back-office plumbing.
  ventureScalePath: Start with MTF launch guardrails, then expand into surveillance, cross-sell orchestration for commodities and mutual funds, broker-specific AI policy rails, and embedded risk infrastructure for brokers, wealth apps, and fintech distribution partners.
solution: The product plugs into a broker’s order stream, positions ledger, collateral data, and customer profile systems to calculate account-level leverage eligibility in real time. It gives risk and product teams configurable policies for exposure, concentration, cooling-off rules, and segment-specific prompts without forcing a full internal rebuild. Every approval, block, or customer-facing nudge is stored with an explainable rationale and policy version so teams can review incidents and tune rules faster. The initial product avoids generating open-ended trade advice; it focuses on policy-bound eligibility and workflow recommendations that are easier to govern. Over time, the same control plane can power safer cross-sell and retention journeys across active-investor products.
goToMarketSeed:
  firstCustomer: Product and risk team at a SEBI-registered broker with 100,000-300,000 demat accounts preparing its first major MTF rollout
  buyingTrigger: Launch of margin trade funding or commodities, or a volatility episode that exposes manual approval and monitoring gaps
  currentAlternative: In-house rules engines plus spreadsheets and manual compliance review
  switchingReason: The wedge lets a broker launch faster with broker-specific guardrails and audit trails while avoiding a long internal risk-engineering project
  pricingHypothesis: Annual platform fee plus usage priced by active leveraged accounts monitored or funded
