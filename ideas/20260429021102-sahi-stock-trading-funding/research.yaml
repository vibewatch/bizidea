competitors:
- name: Symphony Fintech
  stage: incumbent
  wedge: End-to-end multi-asset OMS / execution / RMS for brokerages in India.
  pricing: Custom enterprise pricing
  strength: Deep broker-stack footprint and low-latency trading infrastructure.
  weaknessVsUs: Broader platform scope can make it slower and less tailored to explainable MTF policy workflows.
  sourceRefs:
  - 17
- name: Devexperts / DXtrade
  stage: scale-up
  wedge: Broker-agnostic multi-asset trading platform with expanding real-time risk tooling.
  pricing: Custom enterprise pricing
  strength: Strong engineering depth and risk-alert capabilities for broker and prop platforms.
  weaknessVsUs: Not India-native on SEBI / depository / MTF workflows and may be overkill for a mid-market overlay use case.
  sourceRefs:
  - 18
- name: FYNXT
  stage: scale-up
  wedge: Modular broker operations, CRM, onboarding, and multi-asset workflow stack.
  pricing: Custom enterprise pricing
  strength: Flexible modularity and workflow automation.
  weaknessVsUs: More generalized brokerage operations platform than focused real-time MTF decisioning for Indian brokers.
  sourceRefs:
  - 19
- name: ODIN / Synapsewave legacy stack
  stage: incumbent
  wedge: Entrenched order-management infrastructure used across Indian broker ecosystems.
  pricing: Custom / legacy enterprise pricing
  strength: Installed-base familiarity and institutional knowledge.
  weaknessVsUs: Legacy architecture and broad OMS orientation leave room for a modern policy/audit layer focused on MTF.
  sourceRefs:
  - 20
