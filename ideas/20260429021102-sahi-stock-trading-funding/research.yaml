market:
  tam:
    value: $14.5M
    rationale: 'Bottom-up estimate: ~40 addressable Indian brokers / wealth platforms x est. ₹3.0 crore annual spend for MTF decisioning + audit tooling = ₹120 crore (~$14.5M at ₹83/USD). Unit count is constrained by evidence that only 20 brokers already exceed 1 lakh active clients, while broader adjacent platforms expand the count beyond that core.'
    isEstimate: true
    sourceRefs:
    - 13
    - 2
    - 11
  sam:
    value: $6.5M
    rationale: Beachhead SAM assumes ~18 mid-market Indian brokers in the 0.1m-0.5m active / demat band likely to launch or expand MTF in the near term x est. ₹3.0 crore annual spend.
    isEstimate: true
    sourceRefs:
    - 13
