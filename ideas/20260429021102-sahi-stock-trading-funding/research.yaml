openQuestions:
- How many mid-market Indian brokers currently rely on spreadsheet/manual exception handling for MTF approvals and collateral monitoring?
- What ACV can a broker justify for an overlay product before it prefers to expand an incumbent OMS/RMS contract instead?
- Which 2-3 OMS/back-office/depository integration combinations cover the majority of the first 10 target logos?
- What exact prompt designs stay clearly inside risk / suitability tooling and outside the investment-advice boundary under SEBI scrutiny?
