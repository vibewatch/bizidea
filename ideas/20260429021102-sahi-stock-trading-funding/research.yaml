  validationPlan:
  - priority: high
    question: Will 100k-500k-active-client brokers buy an overlay, or only a full-stack broker-tech refresh?
    evidenceToGather: 10+ discovery calls with CRO / product heads at mid-market brokers plus one OMS/back-office implementation partner interview.
  - priority: high
    question: How manual are current MTF approval, collateral monitoring, and exception-review workflows?
    evidenceToGather: Process maps, screenshots, and incident-review examples from at least 3 brokers actively offering or launching MTF.
  - priority: medium
