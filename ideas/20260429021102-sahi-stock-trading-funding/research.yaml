    - 19
  dataMoats:
  - point: 'A durable moat would come from broker-specific decision histories: collateral snapshots, policy versions, exception handling, and downstream repayment / concentration outcomes.'
    sourceRefs:
    - 11
    - 12
  - point: Auditability itself can compound because SEBI's tightening around algo participation and cyber controls favors systems that preserve explainable state and review trails.
    sourceRefs:
