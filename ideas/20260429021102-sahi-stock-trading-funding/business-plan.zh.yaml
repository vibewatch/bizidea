slug: margin-risk-broker-os
date: '2026-04-29'
executiveSummary: >-
  这家公司卖的是一层可解释的保证金融资风险决策基础设施，客户是正在推出或扩张 Margin Trading Facility 及相邻杠杆工作流的 SEBI 注册印度券商。眼前最明确的客户，是一家拥有约 100,000-300,000 个 demat 账户的中型券商；它的产品和风险团队想发布 MTF，但又不想重建整套实时风控栈。首个产品是一层以只读为主的覆盖层，接入订单、持仓、抵押品和客户画像数据，用来评估 MTF 准入资格、监控集中度与抵押品健康度，并为每次批准、拦截和预先审批过的提示记录策略版本。GTM 以创始人亲自打单为主，切入 CRO / COO / VP Product；触发点通常是 MTF 发布、一次波动事件，或“同行更快推出杠杆功能”带来的竞争压力。研究支持需求存在：印度散户交易规模已够大，行业 MTF 余额到 2025 年 2 月约为 ₹75,000 crore，券商也在用两位数 MTF 利率直接变现杠杆业务。方案刻意避开消费级交易体验、开放式交易建议和整套 OMS 替换；真正的切口，是一层比内部规则加电子表格更快部署、也更容易审计的覆盖层。最主要的下行风险，在于近期滩头偏小、若提示像建议会触碰监管边界，以及券商可能更愿意续签既有平台或内部自建。基于当前研究，近期市场真实存在，但仍然偏窄（估算 TAM 为 $14.5M、SAM 为 $6.5M、SOM 为 $1.4M）；真正值得下注的问题是：这层 MTF 控制能力能否够快地扩展成更广的券商决策基础设施。
problem:
- 中型印度券商想竞争，就得推出 MTF 和相邻杠杆产品，但很多团队仍依赖割裂的数据、电子表格式异常处理和内部规则表。
- 这些流程会让波动市况下的审批变慢，也让“为什么这位客户被批准或被挡下”变得说不清，进而放大授信、集中度、合规和事件复盘风险。
- 完整替换 OMS/RMS 是个重项目，而现行替代方案要么太宽、要么太人工，都不适合快速发布 MTF。
solution:
- 一层券商覆盖系统，连接订单、持仓、抵押品和客户画像系统，实时计算 MTF 准入、抵押品健康度与集中度上限。
- 配备运营控制台，支持可灵活配置策略、案例复核、不可篡改的决策日志和策略版本管理，让每次批准、拦截或预审批提示都能过审计。
- 初期范围牢牢待在基础设施层：做策略约束型准入与工作流提示，不碰开放式投资建议，也不做散户交易前端体验。
whyWeWin:
- 产品以覆盖层切入，券商无需更换既有 OMS/RMS，就能升级风险决策能力。
- 可解释性和策略控制本身就是核心产品特性，比通用规则引擎或 AI 副驾更贴合 SEBI 驱动的审计与行为监管要求。
- 券商专属策略模板、能复用连接器与决策结果历史，一旦发布就会形成切换成本。
strategicChoices:
  beachhead: 面向大约拥有 100,000-500,000 个活跃或 demat 账户、正在推出或扩张 Margin Trading Facility、服务活跃股票与 F&O 交易者的 SEBI 注册印度券商。
  wedgeRationale: MTF 发布是一个狭窄但明确的采购时刻：买方清楚、风险结果能量化、预算也存在，因为券商本来就在靠杠杆业务赚钱。如果一上来卖“券商 AI 平台”或监控大平台，验证会变慢、监管边界会更模糊，实施焦点也会被稀释。
  sequencingRationale: 先从只读准入和审计工作流切入，缩短实施周期并通过合规审查；等生产信任建立后，再加入自动化动作和预审批提示。销售先由创始人亲自打单，在 2-3 个连接器能持续缩短部署周期之后，再引入渠道分发。
  notYet:
  - 完整替换 OMS/RMS
  - 面向消费者的交易建议或开放式 AI 推荐
  - 更可能偏好内部自建的大型 tier-1 券商
  - 在印度模板尚未跑顺前，先做非印度市场
market:
  tam: 基于自下而上的估算，约 40 家可触达的印度券商 / 财富平台，每家年度支出约 ₹3.0 crore，对应 TAM 约 $14.5M。
  sam: 近期滩头 SAM 约为 $6.5M，假设近期开启或扩张 MTF 的中型印度券商约有 18 家。
  som: 第 3 年 SOM 约为 $1.4M，假设以覆盖层打法赢下 4 个生产客户，每家 ACV 约 ₹3.0 crore。
  segments:
  - 推出或扩张 MTF 的 SEBI 注册中型印度券商
  - 增加融资交易、大宗商品或相邻杠杆工作流的活跃投资者财富平台
  buyingProcess: 交易大多由 CRO、COO 或 VP Product 主导，风险运营、合规、CTO/CISO，有时还包括实施伙伴都会参与。预算最可能在 MTF 发布计划、一次波动事件，或董事会要求“更快推出杠杆功能且不能在审计或安全上出事”时被释放出来。
product:
  mvp: >-
    Version 1 是一层以只读为主的 MTF 准入与监控覆盖层：接入券商数据、计算账户级上限和风险标记、提供分析师复核工作流，并为每次决策保留一条可解释的审计轨迹。第一步应先支持 shadow mode，可选加入预审批工作流提示，但不生成开放式推荐。
  sixMonth: 让 1-2 家共创伙伴在 shadow mode 发布，沉淀首批优先券商技术栈的能复用连接器、券商可灵活配置的策略模板，以及能缩短调查时间的事件复盘看板。
  twelveMonth: 为 2 家券商提供生产级 MTF 决策，对已批准规则开启自动执行，补齐对齐 CSCRF 的日志与访问控制，并发布一套通过合规审核的提示模板库。
  twentyFourMonth: 从 MTF 扩展到相邻券商决策工作流，如大宗商品融资护栏、交叉销售准入控制，以及基于累计决策历史生成的对标报告。
  keyBets:
  - 只读与 shadow mode 集成就能覆盖大多数早期买方价值，无需一开始就拿到深度写入权限。
  - 第一单里，策略透明度和事件复盘速度，比模型复杂度更重要。
  - 一套经过合规审核的提示模板库，可以在不越界到建议的情况下，提高工作流完成率。
  - 两到三个连接器包，就能覆盖前十家目标券商中的大多数。
gtm:
  wedge: 把“可审计的 MTF 发布覆盖层”卖给准备首次大规模推出 MTF，或在波动后想摆脱人工异常处理的券商。
  channels:
  - 创始人主导的定向触达与关系销售，直接面向 CRO / COO / VP Product
  - 已嵌入券商技术栈的 OMS / 后台 / 实施合作伙伴
  - 能帮助验证监管适配性的合规顾问与券商行业网络
  funnelTargets: 目标账户→有效访谈 25-35%，有效访谈→付费试点 20-30%，试点→生产 50%+，生产→12 个月内扩张到相邻模块 50%+
  pricing: 按 3-4 个月付费试点收费，价格约 ₹15-30 lakh；之后转成年平台费约 ₹60 lakh-₹1.5 crore，并叠加按受监控活跃杠杆账户计费的使用费。这样定价直接锚定 MTF 发布速度、资金簿风险和持续监控量，而不是按座席数这种通用软件逻辑收费。
businessModel:
  revenueStreams:
  - MTF 决策平台的年度软件订阅
  - 按受监控或受资助的活跃杠杆账户收取使用费
  - 实施与高级集成收费
  - 后续扩张到相邻券商决策工作流的模块收入
  unitOfValue: 每月受监控的活跃杠杆账户，底层锚点仍是券商级年度平台合同
  targetGrossMarginPct: 70
  expansionLevers:
  - 自动化额度执行与异常路由
  - 面向大宗商品和其他杠杆产品的相邻模块
  - 面向券商自有产品的交叉销售与留存准入护栏
  - 基于累计决策历史提供对标报告与策略调优
strategyMap:
  northStarMetric: 在生产环境下被完整决策审计覆盖治理的 MTF 账户数
  inputMetrics:
  - 每季度合格券商对话数
  - 从 kickoff 到 shadow mode 部署的中位时间
  - 被策略引擎覆盖的 MTF 决策占比
  - 试点转生产转化率
  - 相对基线的事件复盘时间缩短幅度
  moatsToBuild:
  - 券商专属策略模板库
  - 接入 OMS、抵押品与账本系统的能复用连接器
  - 连接批准、异常与后链路表现的决策结果数据集
  - 被券商风险团队信任的合规级审计与安全能力
  killCriteria:
  - 前 12 个月完成 15+ 次合格券商对话后，付费试点仍少于 2 个
  - 第三个部署完成后，中位实施时间依旧高于 12 周
  - 外部法律顾问或客户合规团队认为连策略约束型提示都像投资建议
  - 任一试点在发布后 6 个月内，都未转成至少 ₹60 lakh 年化的生产定价
  mermaid: |-
    flowchart LR
      Wedge[可审计的 MTF 覆盖层] --> MVP[shadow mode 准入与审计轨迹]
      MVP --> Proof[付费试点与更快的券商上线]
      Proof --> Expansion[自动控制与相邻券商工作流]
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点和时机都清楚，但初始市场偏窄，覆盖层级产品的付费意愿仍未被验证。
    whyBelieve: 券商已在 MTF 上直接赚钱、面对更严的 SEBI 约束，而且看起来仍在用割裂的审批与监控流程，这很适合一层可审计覆盖产品切入。
    whyDoubt: 目标客户数量集中，大采购方在新点状方案做大之前，就可能优先选择内部自建或续签更大的 OMS/RMS 平台。
    nextDiligence: 下一个关键证明点，是拿到 2 份来自 100k-500k 账户级券商的付费共创承诺，以及 1 份支持产品边界的外部合规意见。
  firstCustomer:
    title: 正在推出 MTF 的中型印度券商 VP Product 与 CRO
    profile: 一家拥有 100,000-300,000 个 demat 账户、已有 OMS/后台系统，并在风险、资金与合规流程中仍存在人工异常处理的 SEBI 注册券商。
    trigger: 董事会批准 MTF 发布、扩大可融资股票池，或某一周市场波动暴露出人工复核慢、审计轨迹弱的问题。
    buyer: 首席风险官或产品副总裁
    initialContract: 3-4 个月付费试点，价格约 ₹15-30 lakh；若把 MTF 监控带入生产，则转为约 ₹60 lakh-₹1.5 crore 年软件费外加使用费。
  mustBeTrue:
  - 前 10 家目标券商里，至少有 3 家明确表示 MTF 审批或抵押品监控是其前三大发布卡点项。
  - 至少有 2 家券商在部署周期低于 8 周时，会优先选择覆盖层而不是更换 OMS。
  - 只读数据流加人工兜底的 MVP，能在 shadow mode 下覆盖超过 80% 的 MTF 审批决策。
  - 外部合规审查确认，策略约束型提示与审计日志不会落入投资建议边界。
  - 至少有 1 个试点能在发布后 6 个月内，以不低于 ₹60 lakh 年化软件支出的价格转成生产。
  diligenceQuestions:
  - 哪些 OMS、后台与存管组合覆盖了前 10 家目标券商？
  - 在目标券商内部，谁真正拥有 MTF 的 P&L，并签字批准软件预算？
  - 目标券商当前有多少比例的 MTF 审批与异常复核仍靠人工？
  - 既有 OMS/RMS 的变更请求通常要多久，和覆盖层部署相比差距有多大？
  - 哪类提示会被客户合规团队批准、限制或直接禁止？
  riskHeatmap:
  - risk: 覆盖层难以被采用，因为券商更偏好既有平台套件或内部自建
    likelihood: High
    impact: High
    leadingIndicator: 合格采购方把所有对话都推向完整平台 RFP，或根本不愿为独立覆盖层留预算。
    mitigation: 先瞄准中型券商，主卖发布速度与审计能力，并证明部署周期按周算而不是按季度算。
  - risk: 监管边界滑向“像建议一样”的行为
    likelihood: Medium
    impact: High
    leadingIndicator: 客户合规团队或外部律师否决拟议提示模板，或要求其接受类似投资建议的审查流程。
    mitigation: 把输出牢牢限制在策略约束内，要求由券商配置模板，并在拿到合规签字后才逐步开放面向客户的提示。
  - risk: 集成拖累见效速度
    likelihood: High
    impact: High
    leadingIndicator: 前两家券商部署超过 10-12 周，或每个账户决策都需要一次性数据工程处理。
    mitigation: 先从 shadow mode 起步，优先做小而精的连接器集合，并围绕最常见券商技术栈把实施手册产品化。
  - risk: 安全与采购审查拖慢企业成单
    likelihood: Medium
    impact: Medium
    leadingIndicator: CTO/CISO 审查周期超过 90 天，或反复要求 MVP 尚未支持的控制能力。
    mitigation: 提前准备一套对齐 CSCRF 的安全资料包，采用最小权限数据访问，并在首个试点前就把审计控制文档化。
  - risk: 滩头太小，撑不起风险投资结果
    likelihood: Medium
    impact: High
    leadingIndicator: 调研发现，短期内真正有 MTF 发布紧迫感且预算高于试点级别的券商少于 10 家。
    mitigation: 在第 12 个月前后就用早期客户测试相邻决策模块；如果扩张需求不足，就及时收紧融资姿态。
operatingAssumptions:
- assumption: 如果它能显著缩短发布时间并缓解审计压力，中型券商愿意为专门的覆盖层支付约 ₹60 lakh-₹1.5 crore 的年费预算。
  basis: research.yaml
  validationTest: 访谈 10+ 位 CRO / VP Product，并在目标价格带上拿到至少 2 份预算级 LOI 或付费试点承诺。
  decisionImpact: 如果不成立，定价就得下调、服务收入占比会上升，市场也可能撑不起风险投资级软件经济性。
- assumption: 两到三种 OMS / 后台 / 存管集成模式，就能覆盖前 10 家目标券商中的大多数。
  basis: operator judgment
  validationTest: 画出目标账户技术栈地图，确认前 10 个潜在线索确实集中在少量系统组合上。
  decisionImpact: 如果不成立，实施成本和周期都会上升，产品化速度与拿单节奏都会变慢。
- assumption: 只读 shadow mode 就足以带来首个试点所需价值，无需先拿到深度写权限。
  basis: operator judgment
  validationTest: 影子运行真实券商决策 30-60 天，证明在没有自动动作的情况下，也能覆盖超过 80% 的决策并缩短复盘时间。
  decisionImpact: 如果不成立，MVP 就得更早接入深度控制能力，工程范围和安全负担都会增加。
- assumption: 策略约束型提示可以清晰停留在 SEBI 监管下的“基础设施侧”。
  basis: idea.yaml
  validationTest: 在发布前为首批提示模板拿到外部法律审查与客户合规书面批准。
  decisionImpact: 如果不成立，就要从路线图里移除面向客户的提示，转而专注内部风控工具。
- assumption: 早期 MTF 客户还会购买相邻决策模块，从而把公司做大到超过初始滩头。
  basis: operator judgment
  validationTest: 到第 12 个月前后，至少向试点客户测试 3 个相邻模块概念，并记录其付费意愿或明确的路线图拉力。
  decisionImpact: 如果不成立，公司就应维持更精瘦的组织、更窄的销售聚焦，并避免按“大平台故事”融资。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 与 15 家目标券商和 2 家实施伙伴开展结构化调研。
  hypothesis: MTF 发布与异常复盘的痛点够急，足以让客户为覆盖层买单，而不是继续等内部排期。
  successMetric: 至少拿到 10 场有效会议、3 份工作流地图，以及 2 个愿意接受付费试点条款的潜在客户。
  owner: CEO / founder-sales
- horizon: 0-90 天
  experiment: 用合成券商场景原型化运营控制台与策略模拟器。
  hypothesis: 买方会更看重可解释决策日志与策略版本，而不是一个黑箱分数。
  successMetric: 至少 5 位目标用户表示该控制台能替代其当前部分复核流程，并要求进入共创跟进。
  owner: Founding eng
- horizon: 90-180 天
  experiment: 与一位共创伙伴完成一套 shadow mode 集成，并将平台输出与实际券商决策对比。
  hypothesis: 只读数据流足以覆盖大多数 MTF 决策，并识别高风险异常。
  successMetric: 决策覆盖率超过 80%、无法解释的不一致低于 10%，且调查时间出现能量化下降。
  owner: Founding eng + solutions engineer
- horizon: 90-180 天
  experiment: 完成对提示模板、策略输出和日志模型的外部合规审查。
  hypothesis: 一套受约束的提示模板库可以被批准为工作流支持，而不是投资建议。
  successMetric: 拿到外部律师和首家共创伙伴合规负责人的书面批准，或一份可接受的修订清单。
  owner: Risk product lead
- horizon: 180-360 天
  experiment: 将首个试点转成生产定价，并就正式 rollout 达成一致计划。
  hypothesis: 一旦券商看见审计和效率收益，运营价值就足以支撑年度软件定价。
  successMetric: 签下 1 份年化软件支出不低于 ₹60 lakh 的生产合同。
  owner: CEO / founder-sales
- horizon: 180-540 天
  experiment: 测试 1 条由 OMS 或实施伙伴驱动的渠道分发路径。
  hypothesis: 在核心连接器被验证后，渠道伙伴可以降低集成摩擦并扩大获客入口。
  successMetric: 至少拿到 3 个由伙伴带来的合格机会，以及 1 份联合部署计划。
  owner: CEO / founder-sales
operations:
- 与共创伙伴保持每周实施节奏，并在券商工程、风险和合规之间共享行动日志。
- 为每次准入、异常与提示事件维护版本化策略注册表和不可篡改的决策日志存储。
- 在首个生产发布前，准备好对齐 CSCRF 的供应商安全资料包、最小权限访问模型和事件响应手册。
- 按潜在线索覆盖率、实施成本和伙伴杠杆，对连接器路线图排序，而不是被单个客户请求牵着走。
- 每新增一种提示模板或自动控制动作，都设置外部法律与合规复核闸门。
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 亲自负责券商调研、企业销售和合作伙伴拓展，因为首批交易需要创始人级可信度和跨职能买方对齐。
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责核心策略引擎、审计日志架构以及首批券商数据系统集成。
- role: 风险产品负责人
  startTiming: Month 1-2
  rationale: 把券商工作流和 SEBI 约束转成客户愿意信任的策略模板、复核工具与提示边界。
- role: 解决方案工程师
  startTiming: Month 4-6
  rationale: 在首个共创伙伴签约后，缩短部署周期，并把连接器和实施模式做成标准化能力。
- role: 安全 / 合规顾问
  startTiming: Month 0-3
  rationale: 提前准备能过采购的安全文档，并对照 CSCRF 与“建议边界”风险审查产品范围。
milestones:
- horizon: 0-12 个月
  items:
  - 在目标券商客群中签下 2 个付费共创伙伴。
  - 为第一套券商技术栈交付 shadow mode 的 MTF 准入、抵押品监控与审计日志。
  - 完成对提示与策略模板的外部合规审查。
  - 至少把 1 个试点转成生产定价。
- horizon: 12-24 个月
  items:
  - 达到 2-3 个生产级券商客户，并形成能复用的实施手册。
  - 为已批准工作流发布自动化策略动作和券商专属策略模板库。
  - 建立 1 个与券商技术栈集成相关、可信的渠道伙伴。
  - 证明既有客户对至少一个相邻模块有明确拉力。
- horizon: 24-36 个月
  items:
  - 达到 4 个生产客户，与初始 SOM 假设一致。
  - 至少 2 个客户购买相邻决策模块，形成扩张收入。
  - 基于累计决策和事件数据发布对标报告。
  - 根据相邻模块拉力证据，决定是继续按平台故事融资，还是维持窄而盈利的公司形态。
risks:
- risk: 覆盖层难以被采用，因为券商更偏好既有平台套件或内部自建。
  likelihood: High
  impact: High
  mitigation: 作为面向中型券商的快速覆盖层来卖，证明部署速度，并展示全栈厂商短期内给不出的审计优势。
- risk: 监管边界滑向“像建议一样”的行为。
  likelihood: Medium
  impact: High
  mitigation: 把输出限制在策略边界内，要求客户自定义规则，并移除或推迟任何过不了合规审查的提示。
- risk: 集成拖累拉长实施周期，并消耗过多服务资源。
  likelihood: High
  impact: High
  mitigation: 优先做窄连接器集合，从 shadow mode 起步，并把数据映射与部署流程标准化。
- risk: 安全与采购审查拖慢或阻断生产发布。
  likelihood: Medium
  impact: Medium
  mitigation: 及早投入对齐 CSCRF 的控制、审计日志和最小权限架构，缩短供应商审查时间。
- risk: 初始 MTF 滩头太小，撑不起风险投资规模结果。
  likelihood: Medium
  impact: High
  mitigation: 到第 12 个月就测试相邻决策模块；若扩张拉力不足，就调整融资、招聘和市场叙事。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月搭出可审计的 MTF MVP、完成前 3-4 个核心集成、赢下 2 个付费试点、把 1-2 家券商转成生产，并补齐足以通过券商采购的安全与合规基础。
