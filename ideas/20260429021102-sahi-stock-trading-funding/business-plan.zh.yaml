slug: margin-risk-broker-os
date: '2026-04-29'
executiveSummary: 这家公司向正在推出或扩展 Margin Trading Facility 及相邻杠杆工作流的 SEBI 注册印度券商，销售一层可解释的保证金风险决策层。其直接客户是拥有约 100,000-300,000 个 demat 账户的中型券商；这些券商的产品和风控团队希望在无需重建完整实时风控栈的前提下推出 MTF。首款产品是一个以读取为主的叠加层，接入订单、持仓、抵押品和客户画像数据，用于评估 MTF 资格、监控集中度与抵押品健康状况，并通过策略版本管理记录每次批准、拦截和预批准提示。其 GTM 体系由创始人主导，面向 CRO / COO / 产品副总裁进行销售，触发因素包括 MTF 推出、市场波动事件，或为了追赶同业更快推出杠杆功能而产生的竞争压力。研究表明需求信号明确：印度零售交易规模庞大，行业 MTF 余额到 2025 年 2 月已达约 ₹75,000 crore，而且券商正以两位数 MTF 利率公开实现杠杆货币化。该计划有意避开面向消费者的交易 UX、开放式交易建议以及完整 OMS 替换；其切入点是一个比“内部规则 + 电子表格”更易审计、且部署更快的叠加层。最强的下行风险包括短期滩头市场较小、若提示看起来像建议则会触发监管敏感性，以及券商可能更偏好现有平台续约或内部自建。基于当前研究，短期市场真实存在但相对狭窄（估算 TAM $14.5M、SAM $6.5M、SOM $1.4M），因此真正值得投资的问题在于：MTF 控制能否足够快地扩展成更广泛的券商决策基础设施。
problem:
- 印度中型券商要参与竞争，就需要 MTF 和相邻杠杆产品，但其中许多仍依赖碎片化数据、电子表格异常处理和内部规则表。
- 这些工作流会在波动时期拖慢审批速度，模糊客户为何被批准或拦截的原因，并增加信用、集中度、合规和事件复盘风险。
- 完整替换 OMS/RMS 是重型项目，而现有替代方案又过于宽泛或过于依赖人工，不适合快速推出 MTF。
solution:
- 一个接入订单、持仓、抵押品和客户画像系统的券商叠加层，用于实时计算 MTF 资格、抵押品健康度和集中度限制。
- 带有可配置策略、案件复核、不可变决策日志和策略版本管理的操作控制台，使每一次批准、拦截或预批准提示都具备审计就绪能力。
- 初始范围严格停留在基础设施层：受策略约束的资格判定和工作流提示，而非开放式投资建议或零售交易 UX。
whyWeWin:
- 产品以叠加层方式落地，因此券商无需替换 OMS/RMS 栈就能升级风险决策。
- 可解释性和策略控制是核心产品特性，相比通用规则引擎或 AI 副驾，它更符合 SEBI 驱动的审计与行为要求。
- 一旦系统上线，券商专属策略模板、可复用连接器和决策结果历史就会形成转换成本。
strategicChoices:
  beachhead: 面向约有 100,000-500,000 个活跃或 demat 账户、正在为活跃股票和 F&O 交易者推出或扩展 Margin Trading Facility 的 SEBI 注册印度券商。
  wedgeRationale: MTF 推出是一个范围明确的采购时点：买方清晰、风险结果可衡量，而且由于券商已在杠杆上实现货币化，相关预算本就存在。更宽泛的“broker AI”或监控类叙事会拖慢验证、增加监管模糊性，并削弱实施聚焦。
  sequencingRationale: 先从只读资格判定和审计工作流入手，以缩短实施周期并通过合规审查；待生产环境建立信任后，再加入自动化动作和预批准提示。在招聘销售之前由创始人主导销售，只有在 2-3 个券商栈连接器反复证明能缩短部署后，才引入合作伙伴分销。
  notYet:
  - 完整 OMS/RMS 替换
  - 面向消费者的交易建议或开放式 AI 推荐
  - 大型一级券商可能更偏好内部自建
  - 在印度模板可复用之前，不进入非印度市场
market:
  tam: 基于约 40 家可触达印度券商 / 财富平台、每家约 ₹3.0 crore 年支出的自下而上估算，TAM 为 $14.5M。
  sam: 基于约 18 家短期内可能推出或扩展 MTF 的印度中型券商估算，滩头市场 SAM 为 $6.5M。
  som: 基于叠加层打法下 4 个生产客户、每个约 ₹3.0 crore ACV 的假设，估算第 3 年 SOM 为 $1.4M。
  segments:
  - 正在推出或扩展 MTF 的 SEBI 注册印度中型券商
  - 增加融资交易、商品或相邻杠杆工作流的活跃投资者财富平台
  buyingProcess: 交易很可能由 CRO、COO 或产品副总裁主导，风控运营、合规、CTO/CISO，有时还包括实施合作伙伴共同参与。预算最可能由 MTF 上线计划、市场波动事件，或董事会层面要求更快推出杠杆功能且不在审计或安全审查中失误的压力所释放。
product:
  mvp: 版本 1 是一个以读取为主的 MTF 资格与监控叠加层：接入券商数据、计算账户级限额和标记、开放分析师复核工作流，并为每次决策保存可解释的审计轨迹。它应首先支持影子模式，可选提供预批准工作流提示，但不生成开放式推荐。
  sixMonth: 与 1-2 家设计合作伙伴实现影子模式实部署，为首个优先券商栈提供可复用连接器、券商可配置的策略模板，以及可缩短调查时间的事件复盘仪表盘。
  twelveMonth: 为 2 家券商提供生产级 MTF 决策，对已批准规则实施自动化策略执行，建立与 CSCRF 对齐的日志和访问控制，并提供有限的、经过合规审查的提示模板库。
  twentyFourMonth: 从 MTF 扩展到相邻的券商决策工作流，例如商品融资护栏、交叉销售资格控制，以及基于累积决策历史构建的基准报告。
  keyBets:
  - 只读和影子模式集成无需深度写权限，就能覆盖大多数早期买方价值。
  - 在首笔销售中，策略透明度和事件复盘速度比模型复杂度更重要。
  - 经过合规审查的提示库可以在不越界为建议的前提下提升工作流完成率。
  - 两到三个连接器包将覆盖前十个目标券商中的大多数。
gtm:
  wedge: 向正准备首次大规模推出 MTF 或在波动之后清理人工异常处理的券商，销售一套具备审计就绪能力的 MTF 上线叠加层。
  channels:
  - 由创始人主导、面向 CRO / COO / 产品副总裁的外呼与关系网络销售
  - 已嵌入券商技术栈的 OMS / 后台 / 实施合作伙伴
  - 能够验证监管适配性的合规顾问和券商行业网络
  funnelTargets: 目标账户→合格商机探索 25-35%，合格探索→付费试点 20-30%，试点→生产 50%+，生产→相邻模块扩展在 12 个月内达到 50%+
  pricing: 收取约 ₹15-30 lakh、周期为 3-4 个月的付费试点费用，随后转为约 ₹60 lakh-₹1.5 crore 的年度平台费，并按受监控的活跃杠杆账户计收使用费。这种定价将买方价值与 MTF 上线速度、融资账簿风险和持续监控量相匹配，而非通用席位数。
businessModel:
  revenueStreams:
  - MTF 决策平台的年度软件订阅
  - 基于受监控或融资的活跃杠杆账户收取使用费
  - 实施和高级集成费用
  - 后续扩展到相邻券商决策工作流的模块
  unitOfValue: 以券商级年度平台合同为锚，按每月受监控的活跃杠杆账户计量
  targetGrossMarginPct: 70
  expansionLevers:
  - 自动化限额执行与异常路由
  - 面向商品及其他杠杆产品的相邻模块
  - 面向券商自有产品的交叉销售与留存资格护栏
  - 由累积决策历史驱动的基准报告和策略调优
strategyMap:
  northStarMetric: 在完整决策审计覆盖下被治理的生产级 MTF 账户数量
  inputMetrics:
  - 每季度合格券商对话数量
  - 从项目启动到影子模式部署的中位时间
  - 由策略引擎覆盖的 MTF 决策占比
  - 试点转生产转化率
  - 相对基线的事件复盘时间缩减
  moatsToBuild:
  - 券商专属策略模板库
  - 面向 OMS、抵押品和账本系统的可复用连接器
  - 连接批准、异常与后续表现的决策结果数据集
  - 让券商风控团队信任的、合规就绪的审计与安全能力
  killCriteria:
  - 前 12 个月完成 15+ 次合格券商对话后，付费试点少于 2 个
  - 在第三次部署后，中位实施周期仍高于 12 周
  - 外部法律顾问或客户合规团队连受策略约束的提示也认定为类似建议
  - 上线后 6 个月内，没有任何试点转为至少 ₹60 lakh 年化的生产定价
  mermaid: "flowchart LR\n  Wedge[具备审计就绪能力的 MTF 叠加层] --> MVP[影子模式资格判定与审计轨迹]\n  MVP --> Proof[付费试点与更快的券商上线]\n  Proof --> Expansion[自动化控制与相邻券商工作流]"
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点和时机都很明确，但初始市场较窄，而且市场尚未证明愿意为叠加层付费。
    whyBelieve: 券商已经通过 MTF 变现，正面临更严格的 SEBI 管控，而且看起来仍在运行碎片化的审批和监控工作流，这正适合可审计的叠加层。
    whyDoubt: 可触达的 logo 集中度较高，而更大的买方可能会在新点状方案形成规模前，优先选择内部自建或更广泛的 OMS/RMS 续约。
    nextDiligence: 下一个关键验证点，是获得两家拥有 100k-500k 账户的券商的付费设计合作承诺，以及一份支持产品边界界定的外部合规意见。
  firstCustomer:
    title: VP Product and CRO at a mid-market Indian broker rolling out MTF
    profile: A SEBI-registered broker with 100,000-300,000 demat accounts, an existing OMS/back-office stack, and manual exception handling across risk, treasury, and compliance.
    trigger: A board-approved MTF launch, funded-stock expansion, or a volatility week that exposes slow manual reviews and weak audit trails.
    buyer: Chief Risk Officer or VP Product
    initialContract: 3-4 month paid pilot at roughly ₹15-30 lakh, converting to roughly ₹60 lakh-₹1.5 crore annual software plus usage if the broker takes MTF monitoring into production.
  mustBeTrue:
  - At least 3 of the first 10 target brokers say MTF approval or collateral monitoring is a top-3 launch blocker.
  - At least 2 brokers prefer an overlay to an OMS replacement if deployment is under 8 weeks.
  - The MVP can cover more than 80% of MTF approval decisions in shadow mode with read-only feeds and manual fallback.
  - External compliance review confirms policy-bound prompts and audit logs stay outside the investment-advice boundary.
  - At least 1 pilot converts to production at or above ₹60 lakh annualized software spend within 6 months of go-live.
  diligenceQuestions:
  - Which OMS, back-office, and depository combinations cover the first 10 target logos?
  - Who owns the MTF P&L and signs the software budget inside a target broker?
  - What percentage of current MTF approvals and exception reviews are still manual at target brokers?
  - How long do incumbent OMS/RMS change requests take compared with an overlay deployment?
  - Which prompt types will customer compliance teams approve, restrict, or ban?
  riskHeatmap:
  - risk: Overlay adoption fails because brokers prefer incumbent suites or internal builds
    likelihood: High
    impact: High
    leadingIndicator: Qualified buyers push every conversation into a full-stack RFP or refuse budget for a standalone overlay.
    mitigation: Target mid-market brokers first, sell time-to-launch and auditability, and prove deployment in weeks rather than quarters.
  - risk: Regulatory boundary drifts into advice-like behavior
    likelihood: Medium
    impact: High
    leadingIndicator: Customer compliance teams or outside counsel reject proposed prompt templates or require an advice-style review process.
    mitigation: Keep outputs policy-bound, require broker-configured templates, and stage customer-facing prompts only after compliance sign-off.
  - risk: Integration drag slows time to value
    likelihood: High
    impact: High
    leadingIndicator: The first two broker deployments exceed 10-12 weeks or require one-off data engineering for every account decision.
    mitigation: Start in shadow mode, prioritize a small connector set, and productize implementation playbooks around the most common broker stacks.
  - risk: Security and procurement reviews stall enterprise deals
    likelihood: Medium
    impact: Medium
    leadingIndicator: CTO/CISO review cycles exceed 90 days or repeatedly request controls the MVP does not yet support.
    mitigation: Build a CSCRF-aligned security pack early, use least-privilege data access, and document audit controls before first pilot.
  - risk: Beachhead remains too small for venture outcomes
    likelihood: Medium
    impact: High
    leadingIndicator: Discovery shows fewer than 10 brokers with near-term MTF launch urgency or budget above pilot level.
    mitigation: Test adjacent decision modules with early customers by month 12 and tighten fundraising posture if expansion demand is weak.
operatingAssumptions:
- assumption: Mid-market brokers will fund a dedicated overlay budget at roughly ₹60 lakh-₹1.5 crore annual pricing if it reduces launch time and audit pain.
  basis: research.yaml
  validationTest: Run 10+ CRO / VP Product interviews and secure at least 2 budgetary LOIs or paid pilot commitments at the target price band.
  decisionImpact: If false, pricing drops, services weight rises, and the market may not support venture-backed software economics.
- assumption: Two to three OMS/back-office/depository integration patterns will cover most of the first 10 target brokers.
  basis: operator judgment
  validationTest: Build a target-account stack map and confirm that the first 10 prospects cluster around a small set of systems.
  decisionImpact: If false, implementation cost and time increase, slowing productization and logo velocity.
- assumption: Read-only shadow mode delivers enough value to win the first pilot before deep write access is approved.
  basis: operator judgment
  validationTest: Shadow real broker decisions for 30-60 days and show more than 80% decision coverage plus faster incident review without automated actions.
  decisionImpact: If false, the MVP must include deeper system control earlier, increasing engineering scope and security burden.
- assumption: Policy-bound prompts can remain clearly on the infrastructure side of SEBI scrutiny.
  basis: idea.yaml
  validationTest: Obtain external legal review and written customer compliance approval for the first prompt library before launch.
  decisionImpact: If false, remove customer-facing prompts from roadmap and focus the company on internal risk tooling only.
- assumption: Early MTF customers will also buy adjacent decision modules, making the company larger than the initial MTF beachhead.
  basis: operator judgment
  validationTest: By month 12, test at least 3 adjacent module concepts with pilot customers and record willingness to pay or roadmap pull.
  decisionImpact: If false, the company should run leaner, narrow sales focus, and avoid raising on a broad platform narrative.
experimentRoadmap:
- horizon: 0-90 days
  experiment: Run structured discovery with 15 target brokers and 2 implementation partners.
  hypothesis: MTF launch and exception-review pain is urgent enough to fund an overlay rather than wait for internal roadmap capacity.
  successMetric: At least 10 qualified meetings, 3 workflow maps, and 2 prospects agreeing to paid pilot terms.
  owner: CEO / founder-sales
- horizon: 0-90 days
  experiment: Prototype the operator console and policy simulator using synthetic broker scenarios.
  hypothesis: Buyers will value explainable decision logs and policy versioning more than a black-box score.
  successMetric: At least 5 target users say the console would replace part of their current review workflow and request a design-partner follow-up.
  owner: Founding eng
- horizon: 90-180 days
  experiment: Deploy one shadow-mode integration with a design partner and compare platform outputs with live broker decisions.
  hypothesis: Read-only feeds are sufficient to cover most MTF decisions and surface high-risk exceptions.
  successMetric: More than 80% decision coverage, fewer than 10% unexplained mismatches, and a measurable reduction in investigation time.
  owner: Founding eng + solutions engineer
- horizon: 90-180 days
  experiment: Complete external compliance review of prompt templates, policy outputs, and logging model.
  hypothesis: A constrained prompt library can be approved as workflow support rather than investment advice.
  successMetric: Written approval or acceptable revision list from external counsel and the first design-partner compliance lead.
  owner: Risk product lead
- horizon: 180-360 days
  experiment: Convert the first pilot to production pricing with an agreed rollout plan.
  hypothesis: Operational value is strong enough to support annual software pricing once the broker sees audit and speed benefits.
  successMetric: One signed production contract at or above ₹60 lakh annualized software spend.
  owner: CEO / founder-sales
- horizon: 180-540 days
  experiment: Test one partner-led distribution motion with an OMS or implementation partner.
  hypothesis: A channel partner can reduce integration friction and expand access after core connectors are proven.
  successMetric: At least 3 partner-sourced qualified opportunities and 1 joint deployment plan.
  owner: CEO / founder-sales
operations:
- Weekly design-partner implementation cadence with shared action logs across broker engineering, risk, and compliance.
- Versioned policy registry and immutable decision-log store for every eligibility, exception, and prompt event.
- CSCRF-aligned vendor security package, least-privilege access model, and incident-response runbook before first production launch.
- Connector roadmap ranked by prospect coverage, implementation effort, and partner leverage rather than one-off customer requests.
- External legal and compliance review gate for each new prompt template or automated control action.
team:
- role: Founder / CEO
  startTiming: Month 0
  rationale: Own broker discovery, enterprise sales, and partner development because the first deals require founder credibility and cross-functional buyer alignment.
- role: Founding eng
  startTiming: Month 0
  rationale: Build the core policy engine, audit log architecture, and first integrations with broker data systems.
- role: Risk product lead
  startTiming: Month 1-2
  rationale: Translate broker workflows and SEBI constraints into policy templates, review tooling, and prompt boundaries customers will trust.
- role: Solutions engineer
  startTiming: Month 4-6
  rationale: Shorten deployment cycles and productize connector and implementation patterns after the first design partner is signed.
- role: Security / compliance advisor
  startTiming: Month 0-3
  rationale: Prepare procurement-ready security documentation and review product scope against CSCRF and advice-boundary concerns.
milestones:
- horizon: 0-12 months
  items:
  - Sign 2 paid design partners in the target broker segment.
  - Ship shadow-mode MTF eligibility, collateral monitoring, and audit logging for the first broker stack.
  - Complete external compliance review for prompt and policy templates.
  - Convert at least 1 pilot into production pricing.
- horizon: 12-24 months
  items:
  - Reach 2-3 production broker logos with repeatable implementation playbooks.
  - Launch automated policy actions for approved workflows and a broker-specific policy template library.
  - Establish 1 credible channel partner tied to broker-stack integrations.
  - Demonstrate one adjacent module pull from existing customers.
- horizon: 24-36 months
  items:
  - Reach 4 production logos, consistent with the initial SOM case.
  - Generate expansion revenue from at least 2 customers buying adjacent decision modules.
  - Publish benchmark reporting from accumulated decision and incident data.
  - Decide whether to scale fundraising on evidence of adjacency pull or keep the company narrow and profitable.
risks:
- risk: Overlay adoption fails because brokers prefer incumbent suites or internal builds.
  likelihood: High
  impact: High
  mitigation: Sell as a fast overlay into mid-market brokers, prove deployment speed, and show audit advantages that full-stack vendors do not deliver quickly.
- risk: Regulatory boundary drifts into advice-like behavior.
  likelihood: Medium
  impact: High
  mitigation: Keep outputs policy-bound, require customer-configured rules, and remove or delay prompts that cannot clear compliance review.
- risk: Integration drag extends implementation cycles and burns services effort.
  likelihood: High
  impact: High
  mitigation: Prioritize a narrow connector set, start with shadow mode, and standardize data-mapping and deployment playbooks.
- risk: Security and procurement reviews slow or block production rollout.
  likelihood: Medium
  impact: Medium
  mitigation: Invest early in CSCRF-aligned controls, audit logs, and least-privilege architecture to shorten vendor reviews.
- risk: The initial MTF beachhead proves too small to support venture-scale outcomes.
  likelihood: Medium
  impact: High
  mitigation: Test adjacent decision modules by month 12 and adjust fundraising, hiring, and market claims if expansion pull is weak.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to build the audit-ready MTF MVP, complete the first 3-4 core integrations, land 2 paid pilots, convert 1-2 brokers to production, and stand up security and compliance foundations that can survive broker procurement.
