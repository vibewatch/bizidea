assumptions:
  - id: A1
    name: Model start month
    value: "2026-05"
    unit: month
    source: "[BP date 2026-04-29] model begins the month after the plan date."
  - id: A2
    name: FX rate for INR to USD conversion
    value: "₹83/USD"
    unit: fx
    source: "[research.market.tam rationale] uses ~₹83/USD."
  - id: A3
    name: Steady-state production-equivalent ACV
    value: "$288K"
    unit: annual revenue per customer equivalent
    source: "[BP gtm pricing] annual platform fee ₹60 lakh-₹1.5 crore plus usage, blended to ~₹2.4 crore and kept below [research.bottomUpSizingDrivers] ₹3.0 crore illustrative spend."
  - id: A4
    name: Paid pilot contract value
    value: "$28.8K over 4 months"
    unit: revenue per pilot
    source: "[BP gtm pricing] paid pilot of roughly ₹15-30 lakh for 3-4 months; midpoint modeled as 0.3 production-equivalent customers."
  - id: A5
    name: Customer metric normalization
    value: "1.0 customer = one production-equivalent broker logo; pilots count as 0.3 and early module expansion is embedded in customer equivalents."
    unit: definition
    source: "Startup-finance heuristic so pilot, platform, usage, and module revenue reconcile to one ARPU-driven P&L."
  - id: A6
    name: Year-1 logo ramp
    value: "2 paid pilots by M6; 1 pilot converts to production by M9."
    unit: customers
    source: "[BP milestones 0-12 months] + [BP investorMemo next diligence]."
  - id: A7
    name: Year-2 and Year-3 logo ramp
    value: "2-3 production logos by Q4Y2; 4 production logos plus adjacent-module uplift by Q4Y3 (4.8 customer equivalents)."
    unit: customers
    source: "[BP milestones 12-24 months and 24-36 months] + [research.market.som] 4 logos by year 3."
  - id: A8
    name: Target gross margin
    value: "70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct]."
  - id: A9
    name: Sales cycle and conversion
    value: "6-month founder-led cycle to production with 50%+ pilot-to-production conversion."
    unit: time and conversion
    source: "[BP gtm funnelTargets] + startup-finance heuristic for broker procurement."
  - id: A10
    name: Fully loaded CAC per production logo
    value: "$140K"
    unit: USD per customer
    source: "Startup-finance heuristic for founder-led enterprise fintech sales with long compliance review and pilot delivery."
  - id: A11
    name: Monthly customer churn
    value: "1.5%"
    unit: percent
    source: "Startup-finance heuristic for sticky but concentrated broker workflow software."
  - id: A12
    name: Fully loaded annual salaries
    value: "CEO $90K; Engineering $85K; Risk product $80K; Solutions $70K; Sales $110K; G&A $55K."
    unit: annual USD per FTE
    source: "Startup-finance heuristic for India-based B2B fintech hiring with senior startup talent."
  - id: A13
    name: Non-payroll operating spend
    value: "$28-30K per month"
    unit: monthly USD
    source: "[BP team security/compliance advisor] + [research regulatoryTechnicalConstraints] + startup-finance heuristic for legal, audit, insurance, travel, and enterprise software."
  - id: A14
    name: Headcount ramp
    value: "5 FTE by Q4Y1, 7 FTE by Q4Y2, 8 FTE by Q4Y3."
    unit: FTE
    source: "[BP team] + [BP milestones] translated into a conservative hiring plan."
  - id: A15
    name: Pre-seed financing close
    value: "$2.1M closes before M1"
    unit: USD
    source: "[BP fundingAsk] pre-seed target range $2-3M."
  - id: A16
    name: Financing milestone
    value: "Reach 2-3 production logos, one integration/channel partner, and first adjacency proof by Q4Y2 with about 6 months of buffer."
    unit: milestone
    source: "[BP milestones 12-24 months] + startup-finance heuristic for next-round readiness."
