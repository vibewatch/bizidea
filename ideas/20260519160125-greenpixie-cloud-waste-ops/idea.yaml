jobsToBeDone:
  - job: When AI cloud spend spikes after a new wave of internal experiments, help the FinOps lead identify which resources can be shut down safely, so they can recover budget without starting a political fight with engineering.
    currentAlternative: Dashboards, spreadsheet reviews, and manual outreach to app owners
    successMetric: Verified monthly spend reclaimed and percentage of recommendations turned into completed actions
  - job: When a platform team wants to enforce TTL and cleanup policies across AI environments, help the team route approvals and execute changes cleanly, so they can reduce waste without causing outages or compliance issues.
    currentAlternative: Ad hoc scripts, Jira tickets, and one-off policy exceptions
    successMetric: Time from waste detection to completed remediation and number of incidents caused by cleanup actions
