topRisks:
  - name: Customer fear of shutdown mistakes
    description: Enterprises may hesitate to automate remediation because one bad cleanup action could break a production workflow or trigger internal backlash.
    mitigation: Start with approval-first recommendations, require human sign-off on early actions, and build blast-radius evidence and rollback paths before pushing deeper automation.
  - name: Incumbent tool bundling
    description: FinOps suites, hyperscalers, or cloud-management platforms may add lightweight remediation features and compress standalone pricing.
    mitigation: Own the action layer across multi-cloud and AI-specific resources, integrate with incumbent dashboards, and differentiate on verified execution outcomes rather than visibility.
  - name: Incomplete telemetry and owner mapping
    description: Large enterprises often have messy tagging, fragmented IAM, and inconsistent AI workload metadata that make precise remediation harder than the pitch suggests.
    mitigation: Begin with high-signal environments, enrich ownership through ticketing and identity integrations, and sell an initial data-hardening deployment before promising full automation.
