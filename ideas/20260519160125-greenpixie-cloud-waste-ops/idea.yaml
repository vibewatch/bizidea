problem: >-
  Large enterprises are launching internal AI tooling faster than their cloud-governance processes can keep up. Teams can
  see overspend in dashboards, but they still cannot prove which idle GPU notebooks, abandoned inference endpoints,
  duplicate dev environments, and zombie services can be shut down without breaking a team or violating an internal
  control. The result is persistent waste, month-end blame loops between infrastructure and finance, and no trusted way
  to turn cleanup actions into auditable cost, carbon, and water reductions.
targetUser:
  primary: Head of FinOps or Director of AI Platform at a Fortune 1000 financial-services enterprise running multi-cloud internal AI programs
  secondary: Cloud governance lead or sustainability analytics manager responsible for monthly cloud optimization actions
  buyer: VP Infrastructure or Head of FinOps with CIO sponsorship
startupThesis:
  nonObviousInsight: >-
    The hard part is no longer detecting waste; it is proving ownership, blast radius, and finance-bookable impact before
    anyone will turn resources off. AI experimentation created many more short-lived but expensive resources, while the
    cited Mastercard and GOV.UK One Login signals show this has moved from sustainability reporting into a core
    IT-finance operating cadence.
  beachhead: >-
    Fortune 1000 banks, insurers, and payments companies with central FinOps teams and 100+ internal AI workspaces,
    fine-tuning jobs, and inference endpoints spread across AWS and Azure
  wedge: >-
    A remediation OS that maps idle AI and cloud resources to owners, simulates blast radius, routes shutdown approvals,
    and executes TTL, quarantine, or termination actions with savings, carbon, and water evidence attached
  whyNowCatalyst: >-
    Greenpixie's funding, the cited 29% waste rate, and its work on AI efficiency and the GOV.UK One Login footprint show
    that cloud waste has become an urgent operating-control problem rather than a nice-to-have sustainability dashboard.
  ventureScalePath: >-
    Start with shutdown orchestration for AI sprawl, then expand into commitment planning, carbon-aware workload routing,
    chargeback, procurement policy, and the system of record for enterprise GreenOps across cloud, AI, and eventually
    on-prem infrastructure.
solution: >-
  Build a control plane for reclaiming idle AI and cloud resources inside large enterprises. The product ingests billing,
  cloud asset graphs, identity context, and AI workload telemetry to surface remediation opportunities that are grouped by
  owner, environment, and likely blast radius. It then opens the right approval flow for platform, security, and finance
  stakeholders instead of dumping another alert into a dashboard. Once approved, it executes shutdown, schedule, region,
  or TTL policies through cloud APIs and infrastructure-as-code hooks while keeping a complete audit trail. Over time, the
  company builds the best dataset on which resource patterns are safe to reclaim, how much cost and footprint they remove,
  and which teams actually convert recommendations into action.
goToMarketSeed:
  firstCustomer: >-
    A Fortune 1000 payments or banking company with a central FinOps team, a newly formed internal AI platform group, and
    a quarterly cloud review showing double-digit overspend from experimental GPU and inference resources
  buyingTrigger: >-
    The first board-level or CFO-level review where AI cloud spend misses plan and leadership asks for immediate,
    measurable savings without slowing production launches
  currentAlternative: >-
    Hyperscaler cost dashboards, Apptio or CloudHealth-style FinOps tooling, manual Jira and Slack cleanup campaigns, and
    internal scripts run by platform engineers
  switchingReason: >-
    This wedge does what dashboards cannot: it ties each waste finding to an owner, proves likely blast radius, moves the
    action through approvals, and executes cleanup with finance-grade evidence that can survive executive review
  pricingHypothesis: >-
    Annual platform fee based on governed cloud spend or number of AI resources under policy, plus optional shared-savings
    pricing for verified reclaimed spend
