slug: ai-sprawl-remediation-os
date: '2026-05-19'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 种子轮关闭后模型启动
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date + fundingAsk] 模型从计划日期的次月启动，确保种子资金在运营支出开始前到位。'
- id: A2
  name: 期初现金
  value: '3000.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M] 基准情景采用区间低端的 $3.0M 种子轮，因为在试点-生产转化得到验证之前招聘保持精简。'
- id: A3
  name: 起始客户数（第 1 个月）
  value: '0'
  unit: count
  source: '[BP product MVP + milestones] 公司以零收入启动，仅在 AWS/Azure 审批优先工作流准备好用于实时超支审查后，才签下第一个付费试点。'
- id: A4
  name: 第 1 年客户增长节奏
  value: 第 12 个月达 3 个付费客户，付费试点分别在第 5、8、11 个月开始
  unit: count
  source: '[BP milestones 0-12 months + experimentRoadmap] 锚定第一年 2–3 个付费试点和一次试点-年度合同转化；月份时间点为初创财务插值。'
- id: A5
  name: 第 2 年客户增长节奏
  value: Y2Q1 4、Y2Q2 6、Y2Q3 8、Y2Q4 10 个客户
  unit: count
  source: '[BP milestones 12-24 months] 直接锚定第 24 个月支持 8–12 个生产客户的计划，采用平滑季度增长。'
- id: A6
  name: 第 3 年客户增长节奏
  value: Y3Q1 13、Y3Q2 15、Y3Q3 17、Y3Q4 20 个客户
  unit: count
  source: '[BP market.som + Research market.som] 达到第 3 年约 20 个企业客户的明确 SOM 目标。'
- id: A7
  name: 定价阶梯
  value: 付费试点年化 $100K；首次生产部署 ACV $220K；第 3 年退出 ACV $250K
  unit: 每客户年度 K 美元
  source: '[BP investorMemo.initialContract + BP gtm.pricing + Research bottomUpSizingDrivers] 使用 $75K–$125K 试点区间中值、研究 SAM ACV，以及约 $250K ACV 的研究 SOM 端点。'
- id: A8
  name: 基准情景收入范围
  value: 仅计入周期性试点和平台订阅收入；实施费和共享节省上行空间不计入
  unit: policy
  source: '[BP businessModel.revenueStreams] 计划提及实施费和共享节省费，但基准情景将其排除，使收入可与客户数 × ARPU 干净对应。'
- id: A9
  name: 收入确认方法
  value: 当期平均活跃客户数 × 试点/生产混合结构的混合实现价格
  unit: formula
  source: '[BP gtm pricing] 使收入与客户数对应，无需单独的分群计费表。'
- id: A10
  name: 第 1 年毛利率
  value: '58.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] + 初创财务经验法则：早期企业试点在工作流可复制之前，入职、云和支持成本更重。'
- id: A11
  name: 第 2 年毛利率
  value: '66.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 随着集成、回滚剧本和节省核实在前 8–12 个客户间标准化，利润率提升。'
- id: A12
  name: 第 3 年毛利率
  value: '70.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 基准情景在部署产品化、服务强度下降后达到计划目标。'
- id: A13
  name: 单位经济月度客户流失率
  value: '1.8'
  unit: percent
  source: '[初创财务经验法则] 种子阶段有年度合同但切口较窄的企业基础设施软件，在多工作流拓展得到验证之前，月度客户流失率通常在 1.5%–2.0% 之间。'
- id: A14
  name: 稳态 CAC
  value: '70.0'
  unit: 每客户千美元
  source: '[BP gtm.funnelTargets + BP buyingProcess + 初创财务经验法则] 假设创始人主导直销切入急性超支事件，尽管有采购阻力，仍可在低七位数管道/中五位数 CAC 段获取每个企业客户。'
- id: A15
  name: 全员薪酬档位
  value: 创始人 190；工程 210；产品 200；解决方案/FinOps 180；销售 240；行政 150
  unit: 每 FTE 年度千美元
  source: '[BP team + 初创财务经验法则] 使用精简的美国企业软件现金薪酬加薪资税和福利。'
- id: A16
  name: 招聘时间表
  value: 解决方案 M4；产品负责人 M7；首位 AE M10；第二工程师 M15；行政 M18；第二解决方案 M20；第二销售 M22；第三工程师 M25；第二产品 M28；第三销售 M31；第四工程师 M34
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale] 客户实施和信任建立岗位优先于大规模 GTM；后续增员是可复制性可见后的平滑增长启发式。'
- id: A17
  name: 人员端点
  value: Y1Q4 5 FTE，Y2Q4 9 FTE，Y3Q4 13 FTE
  unit: FTE
  source: '[BP team + BP milestones] 在转化验证期保持组织精简，仅在 8–12 个客户里程碑可见后增加工程和 GTM 产能。'
- id: A18
  name: 部门费用负载
  value: 部门费用线在 Y1 约为薪资的 1.6 倍，Y2 约 1.2–1.3 倍，Y3 约 1.0–1.1 倍，随法务、差旅和入职费用标准化而下降
  unit: policy
  source: '[BP operations + 初创财务经验法则] 反映一家仍需早期解决方案支持、安全审查和企业差旅的软件公司，随时间推进交付产品化。'
- id: A19
  name: 融资规模规则
  value: 融资额足以达到 Y2Q4 里程碑，并在 Y3 保留 6 个月缓冲现金
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] 模型明确策略将计划中的 18 个月种子轮延伸至里程碑加缓冲的融资规模。'
- id: A20
  name: 现金流简化
  value: 期末现金 = 期初现金 + 累计 EBITDA
  unit: formula
  source: '[初创财务经验法则] 假设资产轻型企业软件公司的资本支出、债务和营运资金扭曲极小。'
