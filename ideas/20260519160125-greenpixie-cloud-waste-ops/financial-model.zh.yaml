scenarios:
  downside:
    description: 审批链拉长，建议转化为已执行动作的比例下降，生产合同更晚落地且稳态 ACV 更低。
    y3RevenueK: 2720.0
    y3EbitdaK: -500.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
    - Y3Q4 客户数达 14，而非 20。
    - 生产 ACV 退出值约 $230K，而非 $250K。
    - 稳态毛利率因部署仍偏服务密集而停滞在 66%。
  base:
    description: 3 个 Y1 试点转化为可复制的创始人主导打法，随后合作伙伴和可复用集成帮助在 Y3Q4 前扩展至 20 个客户。
    y3RevenueK: 3600.1
    y3EbitdaK: 95.1
    cashLowPointK: 1049.2
    keyAssumptionChanges:
    - 与 A4–A20 吻合：第 12 个月 3 个付费客户，Y2Q4 10 个，Y3Q4 20 个。
    - 使用 $100K 试点 / $220K 生产 / $250K Y3 退出定价阶梯。
    - 毛利率随部署可复制化从 58% 提升至 66%，再到 70%。
  upside:
    description: 基准证明缩短了销售周期，合作伙伴来源交易更早出现，账户扩展定价随更广的整治范围提升。
    y3RevenueK: 4325.0
    y3EbitdaK: 650.0
    cashLowPointK: 1200.0
    keyAssumptionChanges:
    - Y3Q4 客户数达 24，而非 20。
    - 混合 Y3 ARPU 因更快的多工作流拓展而接近 $260K。
    - 毛利率达 72%，入职保持产品化，合作伙伴主导推进。
