modelDiagram:
  title: 单位经济流
  mermaid: |-
    flowchart LR
      OverspendReview[Overspend review] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionLogos[Production logos]
      ProductionLogos --> Expansion[More workflows and governed spend]
      Expansion --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自第 12 个月 3 个付费客户、Y2Q4 10 个、Y3Q4 20 个，定价阶梯从 $100K 试点到 $250K 生产，产生约 $5.0M 的退出 ARR 和 $3.6M 的 Y3 确认收入。
- checkName: 必须成立的条件
  finding: 试点-生产转化必须在一个季度支出周期内完成，建议-行动转化率必须达到业务计划 25% 的门槛，才能让年度合同以软件而非一次性清退的形式入预算。
- checkName: 模型崩溃条件
  finding: 若审批链将销售周期拉长至 120 天以上，或转化率低于计划，模型将崩溃——悲观情景下 Y3 收入降至约 $2.7M，现金压缩至约 $0.4M。
- checkName: 下轮融资证明
  finding: 下轮融资的依据：Y2Q4 前达到 8–12 个生产客户，形成可复制的 AWS/Azure 加 ITSM/IAM/CMDB 部署，以及客户拓展至更广 GreenOps 工作流的证据。
sanityChecks:
  ruleOf40: Y3 增长率 188.4% + EBITDA 利润率 2.6% = 191.0%；方向性强劲，但因 Y2 基数小而被放大。
  burnMultiple: Y2 消耗倍数约 0.5x（$0.9M EBITDA 消耗 / 约 $1.8M 净新增 ARR，从约 $0.43M 到 $2.2M 退出 ARR）；若招聘与转化验证挂钩则效率良好。
  revenuePerFte: Y3 每 FTE 收入 $277K（企业 SaaS 基准 $200–400K）。
  flags:
  - 模型最大依赖是审批安全的建议-行动转化率；若已执行动作低于业务计划 25% 的测试门槛，ACV 和转化假设会同步弱化。
  - 模型排除实施费和共享节省上行以保守，但也忽略了可能的企业付款延迟，因此实际现金可能低于基于 EBITDA 的现金滚动预测。
  - 每 FTE 收入健康但并不突出，因此在合作伙伴来源需求可见之前提前招募会在消耗倍数上产生损耗而近期 ARR 提升有限。
