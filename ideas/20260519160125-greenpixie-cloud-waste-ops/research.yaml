openQuestions:
- What share of identified AI and cloud waste can be reclaimed without human approval in large regulated enterprises versus approval-first execution?
- How much of enterprise AI waste now sits outside Kubernetes—in notebooks, inference endpoints, vector stores, and experimental environments—and how fast is that mix changing?
- Will buyers consistently budget sustainability-linked remediation separately, or will the category be forced into broader FinOps platform procurement?
- Which integrations (ServiceNow, Jira, IAM, CMDB, cloud APIs) are non-negotiable to make owner mapping and blast-radius confidence acceptable for Fortune 1000 rollouts?
