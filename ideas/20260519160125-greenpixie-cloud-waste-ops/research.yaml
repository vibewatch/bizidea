  validationPlan:
  - priority: high
    question: What percentage of detected AI and cloud waste opportunities convert into executed remediation inside regulated enterprises?
    evidenceToGather: Pilot data showing recommendation-to-action conversion, median approval time, and incident rate for shutdown or TTL actions.
  - priority: high
    question: How much spend sits in AI-specific waste classes such as idle notebooks, forgotten GPUs, and zombie inference endpoints versus classic VM/storage waste?
    evidenceToGather: Customer telemetry slices by workload type and post-remediation savings attribution from at least five design partners.
  - priority: medium
    question: Will buyers accept carbon and water evidence as part of the buying case, or is cost alone sufficient for procurement?
    evidenceToGather: Procurement notes from EU and UK enterprise deals plus win/loss analysis on sustainability-led messaging.
