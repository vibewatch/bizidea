jobsToBeDone:
  - job: 当新一轮内部实验引发 AI 云支出飙升时，帮助 FinOps 负责人识别哪些资源可以安全关停，从而在不引发与工程团队政治摩擦的情况下收回预算。
    currentAlternative: 仪表盘、电子表格审查和手动联系应用责任人
    successMetric: 每月已核实回收支出，以及建议转化为已完成动作的比例
  - job: 当平台团队希望在 AI 环境中推行 TTL 和清退策略时，帮助团队路由审批并干净地执行变更，从而在不造成故障或合规问题的前提下减少浪费。
    currentAlternative: 临时脚本、Jira 工单和一次性策略例外
    successMetric: 从浪费检测到完成整治的时间，以及清退动作引发的事故数量
