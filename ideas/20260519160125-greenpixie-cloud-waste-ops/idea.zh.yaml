topRisks:
  - name: 客户担忧误关机操作
    description: 企业可能因顾虑某次错误清退会破坏生产工作流或引发内部反弹，而对自动化整治持观望态度。
    mitigation: 从审批优先的建议开始，早期动作要求人工签字，在推进深度自动化之前先建立影响范围证据和回滚路径。
  - name: 现有厂商工具捆绑
    description: FinOps 套件、超大规模云服务商或云管理平台可能加入轻量整治功能，压低独立产品定价空间。
    mitigation: 掌控跨多云和 AI 特定资源的动作层，与现有仪表盘集成，以已执行节省成果（而非可视性）建立差异化。
  - name: 遥测不完整与资源归属映射缺失
    description: 大型企业往往标签混乱、IAM 碎片化、AI 工作负载元数据参差不齐，让精准整治比预期更难。
    mitigation: 从高信号环境入手，通过工单和身份集成丰富归属信息，在承诺全自动化之前先卖一个初始数据强化部署。
