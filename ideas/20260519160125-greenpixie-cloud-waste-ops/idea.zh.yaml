problem: >-
  大型企业上线内部 AI 工具的速度，远超云治理流程的跟进能力。团队能在仪表盘里看到超支，却仍无法证明哪些闲置 GPU 笔记本、废弃推理端点、重复开发环境和僵尸服务可以安全关停，不会波及团队或违反内控规定。结果是浪费长期存在，基础设施和财务团队在月末陷入相互甩锅，也找不到可信的方式把清退动作转化成可审计的成本、碳排放和用水量削减。
targetUser:
  primary: 运行多云内部 AI 项目的财富 1000 强金融服务企业 FinOps 负责人或 AI 平台总监
  secondary: 负责每月云优化行动的云治理负责人或可持续性分析经理
  buyer: 基础设施 VP 或 FinOps 负责人（CIO 背书）
startupThesis:
  nonObviousInsight: >-
    难题不再是发现浪费，而是在任何人愿意关掉资源之前，先证明归属权、影响范围，以及可入账财务的实际节省。AI 实验催生了大量短命但昂贵的资源，而 Mastercard 和 GOV.UK One Login 的信号表明，这已从可持续性报表演变为核心 IT 财务运营节奏。
  beachhead: >-
    拥有中央 FinOps 团队、100 个以上内部 AI 工作空间、微调任务和推理端点分布在 AWS 与 Azure 上的财富 1000 强银行、保险公司和支付公司
  wedge: >-
    一套整治系统——把闲置 AI 和云资源映射到责任人、模拟影响范围、路由关机审批，并执行 TTL、隔离或终止动作，同时附上节省金额、碳排放和用水量的证据
  whyNowCatalyst: >-
    Greenpixie 的融资、29% 的浪费率，以及其在 AI 效率和 GOV.UK One Login 碳足迹方面的实践，表明云浪费已从"锦上添花"的可持续性仪表盘，演变为紧迫的运营管控问题。
  ventureScalePath: >-
    从 AI 蔓延的关机编排切入，逐步扩展到承诺规划、碳感知工作负载路由、费用分摊、采购策略，最终成为覆盖云、AI 乃至本地基础设施的企业 GreenOps 系统记录。
solution: >-
  为大型企业内部的闲置 AI 和云资源回收打造一套控制平面。产品摄入计费数据、云资产图谱、身份上下文和 AI 工作负载遥测，按责任人、环境和影响范围对整治机会分组呈现。随后，它向平台、安全和财务利益相关方开启正确的审批流程，而不是把又一条告警推进仪表盘。审批通过后，通过云 API 和基础设施即代码钩子执行关机、调度、区域或 TTL 策略，同时保留完整的审计轨迹。随时间积累，公司建起最佳数据集——记录哪些资源模式可以安全回收、每次动作能削减多少成本和碳足迹，以及哪些团队真正将建议转化为行动。
goToMarketSeed:
  firstCustomer: >-
    一家财富 1000 强支付或银行企业，拥有中央 FinOps 团队和新成立的内部 AI 平台团队，季度云审查显示实验性 GPU 和推理资源带来两位数超支
  buyingTrigger: >-
    首次董事会级或 CFO 级审查发现 AI 云支出偏离计划，高层要求立即拿出可量化的节省方案，同时不能拖慢生产发布
  currentAlternative: >-
    超大规模云服务商成本仪表盘、Apptio 或 CloudHealth 类 FinOps 工具、手动 Jira 和 Slack 清退活动，以及平台工程师跑的内部脚本
  switchingReason: >-
    这套切口能做到仪表盘做不到的事：把每条浪费发现绑定到责任人、证明影响范围、通过审批流推动动作，并以财务级证据执行清退——能经受住高管审查
  pricingHypothesis: >-
    按受治理云支出或纳入策略的 AI 资源数量收取年度平台费，另加针对已核实回收支出的可选共享节省定价
