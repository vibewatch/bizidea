modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      OverspendReview[Overspend review] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionLogos[Production logos]
      ProductionLogos --> Expansion[More workflows and governed spend]
      Expansion --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from 3 paying logos by M12, 10 by Q4Y2, and 20 by Q4Y3 on a $100K pilot-to-$250K production pricing ladder, which yields about $5.0M of exit ARR on $3.6M of recognized Y3 revenue.
- checkName: Must go right
  finding: Pilot-to-production conversion has to stay inside one quarterly spend cycle and recommendation-to-action rates must clear the BP's 25% threshold so annual contracts are budgeted as software rather than one-off cleanup.
- checkName: Model breaks if
  finding: The model breaks if approval chains push sales cycles past 120 days or conversion falls below plan, because the downside case drops Y3 revenue to about $2.7M and squeezes cash toward roughly $0.4M.
- checkName: Next-round proof
  finding: The next financing is justified by reaching 8-12 production logos by Q4Y2, repeatable AWS/Azure plus ITSM/IAM/CMDB deployments, and evidence that customers expand into broader GreenOps workflows.
sanityChecks:
  ruleOf40: Y3 growth 188.4% + EBITDA margin 2.6% = 191.0%; directionally strong but inflated by the small Y2 base.
  burnMultiple: Y2 burn multiple is about 0.5x ($0.9M EBITDA burn / roughly $1.8M net new ARR from about $0.43M to $2.2M exit ARR); efficient if hiring stays tied to conversion proof.
  revenuePerFte: $277K Y3 revenue per Q4Y3 FTE (benchmark $200-400K enterprise SaaS).
  flags:
  - The biggest model dependency is approval-safe recommendation-to-action conversion; if executed actions fall below the BP's 25% test threshold, both ACV and conversion assumptions weaken quickly.
  - The model excludes implementation and shared-savings upside to stay conservative, but it also ignores possible enterprise payment delays, so real cash could land below EBITDA-based cash roll-forward.
  - Revenue per FTE is healthy but not exceptional, so hiring ahead of partner-sourced demand would deteriorate burn multiple without much near-term ARR lift.
