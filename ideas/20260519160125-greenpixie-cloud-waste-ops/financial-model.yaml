assumptions:
- id: A1
  name: Model start after seed close
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date + fundingAsk] Model starts the month after the dated plan so seed cash is available before operating spend begins.'
- id: A2
  name: Opening cash
  value: '3000.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M] Base case uses a disciplined $3.0M seed at the low end of the stated range because hiring stays lean until pilot-to-production conversion is proven.'
- id: A3
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP product MVP + milestones] The company starts pre-revenue and signs its first paid pilot only after the approval-first AWS/Azure workflow is ready for live overspend reviews.'
- id: A4
  name: Y1 customer ramp
  value: 3 paying logos by M12 with paid pilots beginning in M5, M8, and M11
  unit: count
  source: '[BP milestones 0-12 months + experimentRoadmap] Anchored to 2-3 paid pilots in year one and one pilot-to-annual conversion; month timing is a startup-finance interpolation.'
- id: A5
  name: Y2 customer ramp
  value: Q1Y2 4, Q2Y2 6, Q3Y2 8, Q4Y2 10 customers
  unit: count
  source: '[BP milestones 12-24 months] Directly anchored to the plan to support 8-12 production logos by month 24, using a smooth quarterly ramp.'
- id: A6
  name: Y3 customer ramp
  value: Q1Y3 13, Q2Y3 15, Q3Y3 17, Q4Y3 20 customers
  unit: count
  source: '[BP market.som + Research market.som] Reaches the explicit year-3 SOM endpoint of about 20 enterprise logos.'
- id: A7
  name: Pricing ladder
  value: Paid pilot $100K annualized; first production deployment $220K ACV; Y3 exit ACV $250K
  unit: annualK per customer
  source: '[BP investorMemo.initialContract + BP gtm.pricing + Research bottomUpSizingDrivers] Uses the midpoint of the $75K-$125K pilot range, the research SAM ACV, and the research SOM endpoint of roughly $250K ACV.'
- id: A8
  name: Base-case revenue scope
  value: Recurring pilot and platform subscription revenue only; implementation and shared-savings upside excluded
  unit: policy
  source: '[BP businessModel.revenueStreams] The plan mentions implementation and shared-savings fees, but the base case omits them so revenue cleanly reconciles to customers × ARPU.'
- id: A9
  name: Revenue recognition method
  value: Average active customers in period × blended realized price for the pilot/production mix
  unit: formula
  source: '[BP gtm pricing] Used so revenue reconciles to customer counts without a separate cohort billing table.'
- id: A10
  name: Y1 gross margin
  value: '58.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] + startup-finance heuristic: early enterprise pilots carry heavier onboarding, cloud, and support drag before workflows are repeatable.'
- id: A11
  name: Y2 gross margin
  value: '66.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] Margin improves as integrations, rollback playbooks, and savings verification become standardized across the first 8-12 logos.'
- id: A12
  name: Y3 gross margin
  value: '70.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] Base case reaches the plan target once deployments are productized and services intensity falls.'
- id: A13
  name: Monthly logo churn for unit economics
  value: '1.8'
  unit: percent
  source: '[Startup-finance heuristic] Seed-stage enterprise infrastructure software with annual contracts but a narrow wedge commonly underwrites roughly 1.5%-2.0% monthly logo churn until multi-workflow expansion is proven.'
- id: A14
  name: Steady-state CAC
  value: '70.0'
  unit: USDK per customer
  source: '[BP gtm.funnelTargets + BP buyingProcess + startup-finance heuristic] Assumes founder-led direct sales into acute overspend events can acquire each enterprise logo in the low-seven-figure pipeline / mid-five-figure CAC band despite procurement drag.'
- id: A15
  name: Loaded salary bands
  value: Founder 190; Eng 210; Product 200; Solutions/FinOps 180; Sales 240; G&A 150
  unit: annualK per FTE
  source: '[BP team + startup-finance heuristic] Uses lean US enterprise-software cash comp plus payroll taxes and benefits.'
- id: A16
  name: Hiring schedule
  value: Solutions M4; product lead M7; first AE M10; second eng M15; G&A M18; second solutions M20; second seller M22; third eng M25; second product M28; third seller M31; fourth eng M34
  unit: timing
  source: '[BP team + BP strategicChoices.sequencingRationale] Customer implementation and trust-building hires come before broad GTM scale; later additions are smooth-ramp heuristics once repeatability is visible.'
- id: A17
  name: Headcount endpoint
  value: 5 FTE by Q4Y1, 9 FTE by Q4Y2, 13 FTE by Q4Y3
  unit: FTE
  source: '[BP team + BP milestones] Keeps the org lean through proof-of-conversion, then adds engineering and GTM capacity only after the 8-12 logo milestone is in sight.'
- id: A18
  name: Department expense load
  value: Department lines run about 1.6x payroll in Y1, 1.2-1.3x in Y2, and 1.0-1.1x in Y3 as legal, travel, and onboarding overhead normalize
  unit: policy
  source: '[BP operations + startup-finance heuristic] Reflects a software company that still needs solutions support, security review, and enterprise travel early on but productizes delivery over time.'
- id: A19
  name: Funding sizing rule
  value: Raise enough to reach the Q4Y2 milestone and still carry 6 months of buffer into Y3
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] The explicit model policy extends the plan from a bare 18-month seed to a milestone-plus-buffer raise.'
- id: A20
  name: Cash flow simplification
  value: Ending cash = opening cash + cumulative EBITDA
  unit: formula
  source: '[Startup-finance heuristic] Assumes minimal capex, debt, and working-capital distortion for an asset-light enterprise software company.'
