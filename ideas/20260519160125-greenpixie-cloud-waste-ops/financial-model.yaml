scenarios:
  downside:
    description: Approval chains lengthen, fewer recommendations convert into executed actions, and production contracts land later with lower steady-state ACV.
    y3RevenueK: 2720.0
    y3EbitdaK: -500.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
    - Q4Y3 customers reach 14 instead of 20.
    - Production ACV exits near $230K instead of $250K.
    - Steady-state gross margin stalls at 66% because deployments remain more services-heavy.
  base:
    description: Three Y1 pilots convert into a repeatable founder-led motion, then partners and reusable integrations help expand to 20 logos by Q4Y3.
    y3RevenueK: 3600.1
    y3EbitdaK: 95.1
    cashLowPointK: 1049.2
    keyAssumptionChanges:
    - Matches A4-A20 with 3 paying logos by M12, 10 by Q4Y2, and 20 by Q4Y3.
    - Uses the $100K pilot / $220K production / $250K Y3 exit pricing ladder.
    - Gross margin ramps from 58% to 66% to 70% as deployments become repeatable.
  upside:
    description: Benchmark proof shortens the sales cycle, partner-sourced deals appear earlier, and expansion pricing lands on broader remediation scope per account.
    y3RevenueK: 4325.0
    y3EbitdaK: 650.0
    cashLowPointK: 1200.0
    keyAssumptionChanges:
    - Q4Y3 customers reach 24 instead of 20.
    - Blended Y3 ARPU rises toward $260K on faster multi-workflow expansion.
    - Gross margin reaches 72% as onboarding stays productized and partner-led.
