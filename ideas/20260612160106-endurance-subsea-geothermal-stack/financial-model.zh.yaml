scenarios:
  downside:
    description: 试点时间继续后移，第三个站点来得更晚，基准模块挂接速度也更慢，导致 Y3 低于完整 3 站点 SOM 情形。
    y3RevenueK: 1800.0
    y3EbitdaK: -210.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
    - 第二个付费项目晚一个季度才转化，第三个付费站点也无法贡献完整的 Y3。
    - 成熟站点的经济性更接近 $650K–$700K，而不是完整的 $800K 混合 ACV。
    - 因为证据打包仍然更偏定制，毛利率从 70% 滑到 65%。
  base:
    description: 2 个 design partner 顺利转化，第 3 个站点在 Y2 后期上线，Y3 以约 $0.8M 的混合 ACV 实现研究里的 3 站点 SOM。
    y3RevenueK: 2400.0
    y3EbitdaK: 171.0
    cashLowPointK: 999.0
    keyAssumptionChanges:
    - 客户数量遵循 A6、A7 和 A8。
    - 每个付费站点的收入，会从 A3 的早期结构，逐步切换到 A4 的成熟 Y3 结构。
    - 招聘按照 A18 执行，不提前增加额外的商业或服务岗位。
  upside:
    description: 两个 design partner 都顺利扩张，伙伴渠道又拿下一个额外项目组合，基准模块也比计划更早变现。
    y3RevenueK: 3200.0
    y3EbitdaK: 640.0
    cashLowPointK: 1030.0
    keyAssumptionChanges:
    - Y3 期间新增第 4 个等效站点或项目组合模块。
    - 随着基准和贷款方工作流更快挂接，Y3 的混合 ACV 升到 $800K 以上。
    - 由于模板复用跑赢招聘扩张，毛利率从 70% 提升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 成熟站点经济性卡在年化 $650K 左右，因为买家只为核心证据室付费。
  baseCase: 成熟站点经济性按模型达到年化 $800K。
  upsideCase: 随着基准和贷款方工作流挂接，成熟站点经济性升向年化 $900K。
  y3RevenueImpactK: -450.0
  cashImpactK: -315.0
- variable: CAC
  downsideCase: CAC 升向 $250K，因为公用事业销售几乎完全靠创始人推进，伙伴转介绍也没转出来。
  baseCase: 在 1 条可复用的伙伴协同路径下，CAC 保持在约 $180K。
  upsideCase: 一旦顾问和开发商转介绍开始预热管道，CAC 可降向 $140K。
  y3RevenueImpactK: -200.0
  cashImpactK: -210.0
- variable: 流失率
  downsideCase: 月度流失率升到 4%，因为试点在提交里程碑后暂停，或无法续订到实时监测阶段。
  baseCase: 月度流失率按模型维持在 2%。
  upsideCase: 如果跨许可、保险和调试阶段的多年工作流能稳稳挂住，月度流失率可降向 1%。
  y3RevenueImpactK: -300.0
  cashImpactK: -210.0
- variable: 销售周期
  downsideCase: 公共公用事业采购和保险尽调会让收入启动时间再多拖约 6 个月。
  baseCase: 首个付费站点在第 8 个月落地，第二个在第 11 个月。
  upsideCase: 具名试点预算和伙伴联合销售会把首单提前到第 6 个月。
  y3RevenueImpactK: -350.0
  cashImpactK: -250.0
- variable: 毛利率
  downsideCase: 由于太多证据拼装仍靠人工，毛利率只能维持在约 65%。
  baseCase: 毛利率维持在 BP 目标的 70%。
  upsideCase: 随着模板和遥测接入更可复用，毛利率提升到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: 招聘节奏
  downsideCase: 解决方案和基准岗位提前两个季度招聘，并在第三站点经济性被验证前就增加外包支持。
  baseCase: 招聘按照 A18 执行，直到 Y3 都保持精益。
  upsideCase: 非关键岗位继续按当前计划推进，因为模板吸收了更多导入工作。
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      SponsorBudget --> PaidEngagement
      PaidEngagement --> ActiveSite
      ActiveSite --> BenchmarkModule
      ActiveSite --> Revenue
      BenchmarkModule --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: Y3 收入的核心驱动，是 2 个 Y1 design partner 完成转化、第 3 个站点在 Y2 上线之后，维持 3 个付费站点等效，并实现研究中的 $0.8M 混合 ACV。
- checkName: 必须跑通的事
  finding: 团队必须把许可、保险方和贷款方证据工作标准化到足够程度，才能在 Y2 之前仅新增 1 个实施岗位的情况下，守住 BP 里的 70% 毛利率。
- checkName: 模型会在哪儿断掉
  finding: 如果第三个站点时点后移，或者成熟 ACV 只能停在 $650K 左右，下行情形会砍掉约 $600K 的 Y3 收入，并把现金缓冲压到约 $620K。
- checkName: 下一轮证明点
  finding: 只要拿下 3 个付费站点、可复用基准权，以及首批贷款方或承保工作流，seed 故事就会开始可信，因为这说明切口已经能超出定制证据室而复用。
sanityChecks:
  ruleOf40: Y3 增长率 71.4% + EBITDA 利润率 7.1% = 78.5%。
  burnMultiple: Y2 burn multiple 约为 0.6x，对应约 $0.6M 的新增 ARR（从约 $1.2M 到 $1.8M）；到 Y3 EBITDA 转正后，模型开始自我供血。
  revenuePerFte: 按年末 FTE 计算，Y3 每人对应收入约 $300K（对比企业软件大致 $200K–$400K 的基准区间）。
  flags:
  - 基准情形高度集中：Y3 全部收入只靠 3 个付费站点等效支撑，因此任何一个试点延后，都会明显改写现金曲线。
  - 每站点年收入从 $600K 跨到 $800K，取决于基准和贷款方模块能否按时挂接；这一变现能力尚未被证明。
  - 如果华盛顿州和俄勒冈州的工作流比 BP 假设的更定制，毛利率会很快低于预期。
  - CAC 回本看起来很强，是因为 ACV 异常高；但公共公用事业的长采购周期，仍然会拖慢回款和 seed 时点。
