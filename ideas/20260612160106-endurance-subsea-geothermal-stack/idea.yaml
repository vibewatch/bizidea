topRisks:
  - name: Slow category formation
    description: Subsea geothermal deployments may take longer than claimed, limiting near-term software demand.
    mitigation: Start with paid feasibility, diligence, and evidence workflows that monetize before large fleets exist.
  - name: Data access bottleneck
    description: Early developers may treat prototype telemetry and seabed data as proprietary, reducing the startup's ability to build a benchmark moat.
    mitigation: Offer secure customer-controlled data rooms and benchmarking programs that let participants share selectively while still getting value.
  - name: Regulatory fragmentation
    description: Marine permitting and environmental review differ across jurisdictions, which can turn the product into a consulting-heavy service.
    mitigation: Focus the first product and templates on Washington and Oregon pilot pathways before expanding to additional coastal markets.
