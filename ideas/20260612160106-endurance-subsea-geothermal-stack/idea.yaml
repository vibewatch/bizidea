  - point: If ocean-floor sites really bypass land siting constraints, the winning platform is the one that standardizes proof for many coastal projects early.
    signalRefs: ["Siting constraint release"]
    sourceRefs: [3]
differentiator: >-
  This is not another geothermal developer and not generic project-management software. It is purpose-built around subsea
  geothermal's novel failure modes: marine permitting, reservoir uncertainty, export-cable risk, and remote asset assurance.
  The moat comes from proprietary cross-project benchmarks on what evidence regulators, insurers, and utilities actually need
  to approve and finance these first systems.
