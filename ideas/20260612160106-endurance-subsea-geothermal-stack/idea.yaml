problem: >-
  Coastal utilities and port-linked industrial loads increasingly need firm clean power, but first-of-a-kind subsea
  geothermal projects are hard to permit, insure, and finance with land-geothermal tooling. Each pilot requires a custom mix
  of marine consultants, spreadsheet models, environmental studies, and offshore monitoring vendors just to answer the same
  questions: will the site perform, will the cable and seabed systems stay reliable, and will regulators sign off.
targetUser:
  primary: >-
    New-energy development and resource-planning teams at Pacific Northwest public utilities and port-adjacent municipal
    utilities evaluating their first 1-10 MW subsea geothermal pilot.
  secondary: Subsea geothermal developers and marine EPC teams packaging pilots for utility and industrial customers.
  buyer: VP Resource Planning or Director of New Energy Development
startupThesis:
  nonObviousInsight: >-
    The scarce asset is not just access to undersea heat; it is a standardized evidence layer that makes subsea geothermal
    bankable by proving reservoir performance, environmental compliance, and export-cable reliability in one workflow.
    As named pilot sites emerge, the system of record for that evidence can become the default control plane for the whole
    category.
  beachhead: >-
    Pacific Northwest public utility districts and municipal utilities assessing a first 1-10 MW Juan de Fuca-style subsea
    geothermal pilot to serve coastal load growth near ports, EV corridors, or new industrial demand.
  wedge: >-
    A marine geothermal bankability OS that combines site diligence, permit evidence, insurer-ready risk reporting, and live
    subsea performance monitoring for first pilots.
  whyNowCatalyst: >-
    Endurance's funded push, named Juan de Fuca deployment, and two-year grid timeline create immediate pressure for coastal
    buyers to evaluate subsea geothermal before internal teams or regulators have repeatable diligence playbooks.
  ventureScalePath: >-
    Start with first-pilot diligence and monitoring, then expand into fleet benchmarking, performance-guarantee underwriting,
    O&M optimization, and the insurer/lender data backbone for subsea geothermal projects across Ring of Fire coastal markets.
solution: >-
  The product starts as a project-development and assurance platform for first subsea geothermal sites. It ingests seabed
  survey results, prototype telemetry, cable and mooring data, environmental measurements, and interconnection milestones into
  one digital project record. The platform generates regulator, insurer, and board-ready evidence packs instead of forcing
  each pilot team to rebuild diligence from scratch. Once a project is live, it tracks predicted versus actual output,
  equipment health, and environmental thresholds so operators can intervene before a novel pilot turns into a public failure.
  Over time, the company builds the best comparative dataset on subsea geothermal performance and development risk.
goToMarketSeed:
  firstCustomer: >-
    A Pacific Northwest public utility district or municipal utility co-developing a 1-10 MW subsea geothermal demonstration
    off Washington or Oregon with a marine energy developer.
  buyingTrigger: >-
    A board-approved feasibility study or pilot budget created by rising coastal load forecasts from data centers, EV demand,
    or heavy industry.
  currentAlternative: A mix of marine engineering consultants, land-geothermal models, spreadsheets, and offshore oil-and-gas monitoring tools.
  switchingReason: >-
    The wedge cuts months of custom diligence by turning prototype and site data into regulator, insurer, and financing-ready
    evidence while also covering live pilot monitoring after approval.
  pricingHypothesis: Annual platform fee per active site plus milestone-based fees for completed permit, insurance, or financing packages.
