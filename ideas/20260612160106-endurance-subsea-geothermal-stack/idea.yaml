  - job: When a coastal utility is asked to evaluate a first subsea geothermal site, help the development lead assemble a financeable decision memo, so they can win board approval for a pilot.
    currentAlternative: Custom consultant studies and spreadsheet-based diligence
    successMetric: Pilot approval secured in months instead of quarters
  - job: When a subsea geothermal pilot is nearing permit and insurance review, help the project team prove reliability and environmental control, so they can reach commissioning without repeated evidence requests.
    currentAlternative: Separate monitoring vendors, static reports, and email-driven document collection
    successMetric: Fewer diligence cycles and on-time permit or insurance sign-off
