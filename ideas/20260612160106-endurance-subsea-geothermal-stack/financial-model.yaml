scenarios:
  downside:
    description: "Pilot timing slips, the third site arrives later, and benchmark modules attach more slowly, leaving Y3 below the full 3-site SOM case."
    y3RevenueK: 1800.0
    y3EbitdaK: -210.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "Second paid engagement converts one quarter later and the third paying site does not contribute a full Y3."
      - "Mature site economics settle closer to $650K-$700K rather than the full $800K blended ACV."
      - "Gross margin slips from 70% to 65% because evidence packaging remains more bespoke."
  base:
    description: "Two design partners convert, a third site is live by late Y2, and Y3 realizes the researched 3-site SOM at roughly $0.8M blended ACV."
    y3RevenueK: 2400.0
    y3EbitdaK: 171.0
    cashLowPointK: 999.0
    keyAssumptionChanges:
      - "Customer counts follow A6, A7, and A8."
      - "Revenue per paying site steps from the A3 early-stage mix to the A4 mature Y3 mix."
      - "Hiring follows A18 without pulling forward additional commercial or services hires."
  upside:
    description: "Both design partners expand cleanly, the partner channel lands an extra portfolio win, and benchmark modules monetize earlier than planned."
    y3RevenueK: 3200.0
    y3EbitdaK: 640.0
    cashLowPointK: 1030.0
    keyAssumptionChanges:
      - "A fourth site-equivalent or portfolio module is added during Y3."
      - "Blended Y3 ACV rises above $800K as benchmark and lender workflows attach faster."
      - "Gross margin improves from 70% to 72% because template reuse outpaces headcount growth."
sensitivity:
  - variable: ARPU
    downsideCase: "Mature site economics stall near $650K annualized because buyers only fund the core evidence room."
    baseCase: "Mature site economics reach $800K annualized as modeled."
    upsideCase: "Mature site economics rise toward $900K with benchmark and lender-workflow attach."
    y3RevenueImpactK: -450.0
    cashImpactK: -315.0
  - variable: CAC
    downsideCase: "CAC rises toward $250K because utility sales stay almost fully founder-led and partner referrals do not convert."
    baseCase: "CAC stays near $180K with one repeatable partner-assisted path."
    upsideCase: "CAC falls toward $140K once advisor and developer referrals warm the pipeline."
    y3RevenueImpactK: -200.0
    cashImpactK: -210.0
  - variable: churn
    downsideCase: "Monthly churn reaches 4% because pilots pause after milestone submissions or fail to renew into live monitoring."
    baseCase: "Monthly churn stays at 2% as modeled."
    upsideCase: "Monthly churn falls toward 1% if multi-year workflows stick across permit, insurance, and commissioning stages."
    y3RevenueImpactK: -300.0
    cashImpactK: -210.0
  - variable: sales cycle
    downsideCase: "Public-utility procurement and insurer diligence add roughly 6 more months before revenue starts."
    baseCase: "The first paid site lands in month 8 and the second in month 11."
    upsideCase: "A named pilot budget and partner co-sell motion pull the first close into month 6."
    y3RevenueImpactK: -350.0
    cashImpactK: -250.0
  - variable: gross margin
    downsideCase: "Gross margin holds near 65% because too much evidence assembly stays manual."
    baseCase: "Gross margin stays at the 70% BP target."
    upsideCase: "Gross margin reaches 72% as templates and telemetry ingestion become more repeatable."
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: hiring pace
    downsideCase: "Solutions and benchmark hires are pulled forward by two quarters and contractor support is added before third-site economics are proven."
    baseCase: "Hiring follows A18 and remains lean through Y3."
    upsideCase: "Noncritical hiring stays on the current plan because templates absorb more onboarding work."
    y3RevenueImpactK: 0.0
    cashImpactK: -170.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      SponsorBudget --> PaidEngagement
      PaidEngagement --> ActiveSite
      ActiveSite --> BenchmarkModule
      ActiveSite --> Revenue
      BenchmarkModule --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Y3 revenue is driven by holding 3 paying site-equivalents at the researched $0.8M blended ACV after two Y1 design partners convert and a third site goes live in Y2.
  - checkName: Must go right
    finding: The team must standardize enough of permitting, insurer, and lender evidence work that the model keeps the BP's 70% gross margin with only one added implementation hire through Y2.
  - checkName: Model breaks if
    finding: If third-site timing slips or mature ACV stays closer to $650K, the downside case cuts about $600K of Y3 revenue and pushes the cash cushion toward roughly $620K.
  - checkName: Next-round proof
    finding: The seed story becomes credible once 3 paying sites, reusable benchmark rights, and first lender or underwriting workflows prove the wedge is repeatable beyond bespoke evidence rooms.
sanityChecks:
  ruleOf40: "Y3 growth 71.4% + EBITDA margin 7.1% = 78.5%."
  burnMultiple: "About 0.6x in Y2 on roughly $0.6M of net new ARR (from about $1.2M to $1.8M), turning self-funding in Y3 as EBITDA becomes positive."
  revenuePerFte: "$300K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K enterprise-software benchmark)."
  flags:
    - "The base case is highly concentrated: only 3 paying site-equivalents generate all Y3 revenue, so one delayed pilot can move the cash profile materially."
    - "The step-up from $600K to $800K per site-year depends on benchmark and lender modules attaching on schedule; that monetization is not yet proven."
    - "Gross margin can undershoot quickly if Washington and Oregon workflows remain more bespoke than the BP assumes."
    - "CAC payback looks strong because ACV is unusually high, but long public-utility procurement cycles can still delay collections and seed timing."
