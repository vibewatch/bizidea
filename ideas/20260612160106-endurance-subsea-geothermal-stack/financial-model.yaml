    unit: USDK per year
    source: "[BP operations and milestones] Startup-finance heuristic for a high-touch implementation and retention operator added after repeatability improves."
  - id: A17
    name: Benchmark and underwriting analyst loaded cash compensation
    value: '144.0'
    unit: USDK per year
    source: "[BP product twentyFourMonth; BP milestones 24-36 months] Startup-finance heuristic for the first benchmark and lender-workflow specialist added only after multi-site data exists."
  - id: A18
    name: Hiring cadence
    value: "CEO founder, founding engineer, and permitting lead in M1; product and implementation lead in M3; platform and data engineer in M7; strategic partnerships lead in M10; solutions lead in M16; benchmark analyst in M28"
    unit: timing
    source: "[BP team startTiming; BP strategicChoices sequencingRationale] Adds only two post-plan hires beyond the named team, and both are delayed until customer proof exists."
  - id: A19
    name: Functional payroll allocation
    value: "CEO 50% S&M / 50% G&A; founding and platform engineers 100% R&D; permitting lead 80% R&D / 20% G&A; product lead 70% R&D / 30% G&A; partnerships lead 100% S&M; solutions lead 50% S&M / 50% G&A; benchmark analyst 70% R&D / 30% G&A"
    unit: allocation
    source: "[BP team rationales] Allocation follows each role's stated ownership across sales, domain codification, productization, and admin work."
  - id: A20
    name: Non-payroll operating spend
    value: "M1-M6 S&M 6K, R&D 5K, G&A 6K monthly; M7-M9 R&D tools rise to 7K; M10-M12 S&M rises to 10K; M13-M27 S&M 12K, R&D 9K, G&A 8K monthly; M28-M36 S&M 14K, R&D 10K, G&A 10K monthly"
    unit: USDK per month
    source: "[Startup-finance heuristic] Lean spend for cloud, security, travel, legal, and partner support in a niche enterprise-software startup."
  - id: A21
    name: Customer acquisition cost
    value: '180.0'
    unit: USDK per customer
    source: "[BP gtm founder-led direct sales and co-sell motion; Research reportMemo distributionChannels] Heuristic for a concentrated utility and infrastructure sale with long diligence cycles but very high ACV."
  - id: A22
    name: Monthly churn
    value: '2.0'
    unit: percent
    source: "[BP mustBeTrue active-site subscription attach; Research sensitivityCases pilot timeline risk] Heuristic assumes multi-year projects but meaningful renewal risk if pilots slip or stop after milestones."
  - id: A23
    name: Cash conversion policy
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] No debt, taxes, hardware capex, or material working-capital swings are modeled in this software-first base case."
