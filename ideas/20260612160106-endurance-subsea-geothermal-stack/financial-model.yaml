    name: Next-round milestone
    value: "Reach 3 paying sites, secure reusable benchmark rights, and launch lender or underwriting support with at least 6 months of cash still on hand"
    unit: milestone
    source: "[BP milestones 24-36 months; BP fundingAsk] Used to size the pre-seed ask."
