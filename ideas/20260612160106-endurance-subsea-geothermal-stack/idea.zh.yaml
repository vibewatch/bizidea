  defensibility:
    score: 4
    rationale: 跨项目的证据与性能数据集有机会累积成监管和承保护城河，但早期客户集中度仍是风险。
  ventureScale:
    score: 4
    rationale: 如果海底地热能在火环带沿海市场扩展开来，平台就能从项目工作流长成融资和运营的关键基础设施。
topRisks:
- name: 品类成形缓慢
  description: 海底地热部署落地可能比公司宣称的更慢，短期内会压制软件需求。
  mitigation: 先卖付费的可研、尽调和证据工作流，在大规模站点出现前先把钱赚到。
- name: 数据获取卡口
  description: 早期开发商可能把原型遥测和海床数据视为专有资产，削弱创业公司建立基准护城河的能力。
  mitigation: 提供由客户掌控的安全数据室和基准计划，让参与方可以按选择共享，同时仍能拿到价值。
- name: 监管碎片化
  description: 海洋许可和环境审查在不同司法辖区差异很大，产品容易被拖成顾问服务密集型业务。
  mitigation: 先把首版产品和模板聚焦在华盛顿州与俄勒冈州的试点路径，再向更多沿海市场扩张。
