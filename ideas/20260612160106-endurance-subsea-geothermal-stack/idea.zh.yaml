differentiator: 这不是又一家地热开发商，也不是泛化的项目管理软件。它围绕海底地热特有的失效模式来设计：海洋许可、储层不确定性、送出电缆风险，以及远程资产保障。真正的护城河来自跨项目的专有基准：监管方、保险方和公用事业公司到底要看到什么证据，才会批准并融资这些首批系统。
