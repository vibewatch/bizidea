jobsToBeDone:
- job: 当沿海公用事业公司被要求评估首个海底地热站点时，帮助开发负责人拼出一份能过融资审核的决策备忘录，好让项目顺利拿到董事会对试点的批准。
  currentAlternative: 定制顾问研究和基于表格的尽调
  successMetric: 以“月”而不是“季度”拿下试点批准
- job: 当海底地热试点临近许可和保险审查时，帮助项目团队证明系统可靠、环境可控，好让项目在不反复补材料的情况下进入投运。
  currentAlternative: 分散的监测供应商、静态报告和靠邮件流转的文档收集
  successMetric: 更少的尽调往返轮次，并按时拿到许可或保险签字
