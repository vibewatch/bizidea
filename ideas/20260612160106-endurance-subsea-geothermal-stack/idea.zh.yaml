problem: 沿海公用事业公司和港口相关工业负荷越来越需要稳定的清洁电力，但首批海底地热项目很难用陆上地热那套工具完成许可、保险和融资。每个试点都得临时拼一套海洋顾问、表格模型、环境研究和海上监测供应商，只为回答同样几件事：场址能不能跑出来，电缆和海床系统能不能长期可靠，监管部门会不会放行。
targetUser:
  primary: 太平洋西北地区公共电力机构和港口周边市政公用事业公司的新能源开发与资源规划团队，正在评估自己的首个 1–10 MW 海底地热试点。
  secondary: 为公用事业和工业客户打包试点项目的海底地热开发商，以及海洋 EPC 团队。
  buyer: 资源规划副总裁或新能源开发总监
startupThesis:
  nonObviousInsight: 真正稀缺的资产不只是海底热源接入权，而是一层标准化证据层：把储层表现、环境合规和送出电缆可靠性放进同一套流程里证明出来，海底地热才有可融资性。随着具名试点站点出现，承载这层证据的系统记录有机会变成整个赛道默认的控制平面。
  beachhead: 首批滩头市场是太平洋西北地区的公共电力区和市政公用事业公司。它们正在评估类似 Juan de Fuca 的 1–10 MW 海底地热试点，用来承接港口附近、EV 走廊或新增工业负荷带来的沿海用电增长。
  wedge: 首批试点用的海洋地热可融资性 OS，把场址尽调、许可证据、面向保险方的风险报告和实时海底性能监测放进一套系统。
  whyNowCatalyst: Endurance 拿到资金、点名 Juan de Fuca 部署点，又给出两年并网时间表，沿海买家现在就得评估海底地热，而此时内部团队和监管机构都还没有可重复的尽调手册。
  ventureScalePath: 先从首批试点的尽调和监测切入，再扩展到多项目基准对比、性能保证承保、O&M 优化，以及覆盖火环带沿海市场海底地热项目的保险方/贷款方数据底座。
solution: 产品一开始是一套面向首批海底地热站点的项目开发与保障平台。它把海床勘测结果、原型遥测、电缆和系泊数据、环境测量以及并网里程碑汇成一份数字化项目记录。平台直接生成能交给监管方、保险方和董事会的证据包，不用每个试点团队都从零重建尽调。项目上线后，系统会持续跟踪预测与实际出力、设备健康和环境阈值，让运营方在一个新型试点演变成公共失败案例之前就能介入。时间拉长后，公司还能沉淀出业内最好的海底地热性能与开发风险对比数据集。
goToMarketSeed:
  firstCustomer: 首个客户应是太平洋西北地区的公共电力区或市政公用事业公司，正与海洋能源开发商共同推进华盛顿州或俄勒冈州外海 1–10 MW 的海底地热示范项目。
  buyingTrigger: 由数据中心、EV 需求或重工业带来的沿海负荷预测上升，会催生经董事会批准的可研预算或试点预算。
  currentAlternative: 海洋工程顾问、陆上地热模型、电子表格和海上油气监测工具的拼装组合。
  switchingReason: 这个切口能把原型和场址数据变成监管、保险和融资都能直接使用的证据，把定制尽调周期砍掉几个月；获批后，它还继续覆盖实时试点监测。
  pricingHypothesis: 按活跃站点收取年度平台费，再按许可、保险或融资资料包的完成节点收取里程碑费用。
