slug: subsea-geothermal-bankability
date: '2026-06-12'
executiveSummary: >-
  This company should start as a neutral bankability and evidence platform for first-of-a-kind subsea geothermal pilots rather
  than as a developer or a generic offshore monitoring tool. The best first customer is a Pacific Northwest public utility
  district or municipal utility evaluating a 1-10 MW pilot off Washington or Oregon with a subsea geothermal developer or marine
  EPC partner. The buying trigger is a funded feasibility study or pilot budget created by rising regional load, resource
  adequacy pressure, or a resilience demonstration mandate that forces a board-level decision on a new clean-firm option. The
  initial product wedge should stay narrow: one project record that combines marine permitting evidence, insurer and lender risk
  packets, technical diligence, and live subsea telemetry after approval. That scope is attractive now because Endurance's funded
  Juan de Fuca plan compresses the diligence window while utilities, advisors, and regulators still lack a repeatable workflow.
  The strategic advantage is not a novel sensor stack; it is becoming the neutral system of record for what evidence actually
  clears first pilots through approval gates. Sequencing must stay disciplined by monetizing paid evidence-room engagements before
  assuming a multi-site monitoring market, then adding benchmark and underwriting products only after 2-3 active sites exist.
  Near-term market size appears investable but narrow, with a researched SAM of roughly $14.4M and meaningful dependence on a
  small number of developers, sponsors, and jurisdictions. Direct evidence on utility budget ownership and exact permitting
  posture remains limited, so the first 12 months must prove willingness to pay, repeatable evidence requirements, and data
  access rights before the venture-scale case is fully underwritten.
problem:
  - Coastal utilities and public sponsors need new clean-firm capacity, but first subsea geothermal pilots stall because each project must rebuild marine permitting, reliability, insurance, and financing evidence from scratch.
  - Existing alternatives split the workflow across consultants, spreadsheets, offshore integrity tools, and developer-specific data rooms, which slows board decisions and creates repeated evidence requests at every approval gate.
solution:
  - Provide a neutral project evidence platform that ingests seabed surveys, prototype telemetry, cable and structural data, environmental measurements, and project milestones into one auditable record.
  - Generate regulator-, insurer-, lender-, and board-ready evidence packs, then extend into live pilot monitoring so predicted versus actual output, asset health, and environmental thresholds stay in the same workflow after approval.
whyWeWin:
  - No incumbent owns the full cross-stakeholder workflow across utility sponsor, developer, regulator, insurer, lender, and telemetry vendor, so a neutral system of record can become the default coordination layer before the category standardizes.
  - Each deployment compounds proprietary templates for evidence requests, review cycles, and pilot performance benchmarks across cable, reservoir, environmental, and output behavior that fragmented services firms do not retain in software form.
strategicChoices:
  beachhead: Pacific Northwest public utility districts and municipal utilities evaluating their first 1-10 MW subsea geothermal pilot in Washington or Oregon territorial waters or adjacent offshore development pathways.
  wedgeRationale: >-
    This beachhead creates faster proof than selling broad offshore-energy software because the buyer already has a live board,
    permit, and insurance problem tied to one named pilot geography. A narrow evidence-room and monitoring wedge can show value
    on approval cycle time, evidence completeness, and reduced rework without asking the customer to replace its engineering,
    SCADA, or document systems.
  sequencingRationale: >-
    Product, GTM, hiring, and partnerships should start with paid diligence and evidence packaging because that is where the
    budget exists before generation is proven. Once one site reaches live permitting or commissioning, the company can layer in
    telemetry monitoring and benchmark reporting; only after multiple active sites exist should it expand into underwriting,
    fleet optimization, or new geographies, because those motions require shared data and a larger category than exists today.
  notYet:
    - Selling into land-geothermal or generic offshore-wind workflows before the subsea geothermal evidence model is repeatable
    - Building performance-guarantee underwriting products before the company has multi-site benchmark data
    - Expanding to Ring-of-Fire markets outside the Pacific Northwest before Washington and Oregon templates are proven
    - Pursuing direct sales to data centers or industrial offtakers before utility-side approval workflows are won
market:
  tam: "$96.0M estimated TAM based on roughly 80 global coastal pilot or early-commercial sponsor programs at about $1.2M blended annual revenue per active site."
  sam: "$14.4M estimated SAM based on 12 near-term North America, Pacific Northwest, and defense-linked sponsor programs at about $1.2M blended annual revenue per site."
  som: "$2.4M estimated year-3 SOM based on 3 paying sites or portfolios at roughly $0.8M blended annual contract value."
  segments:
    - Pacific Northwest public utilities and municipal utilities sponsoring first subsea geothermal pilots
    - Subsea geothermal developers, marine EPC teams, and defense or resilience demonstration sponsors as secondary expansion buyers
  buyingProcess: >-
    The champion is typically a VP Resource Planning or Director of New Energy Development, with engineering, permitting, finance,
    and outside technical or insurance advisors shaping requirements. Deals should start when a feasibility budget, demonstration
    mandate, or pilot approval cycle creates a paid evidence-room need, then convert to an annual active-site subscription once
    the project enters live permit, insurance, financing, or commissioning workflows.
product:
  mvp: >-
    MVP is a high-trust evidence room for one live pilot that captures document intake, requirement checklists, role-based data
    access, audit trails, permit and insurer reporting templates, and basic telemetry ingestion for prototype or early field
    data. It should prove that one sponsor can move from bespoke diligence to a repeatable approval workflow without waiting for
    a full fleet analytics product.
  sixMonth: >-
    Launch 1-2 paid design-partner engagements with Washington and Oregon evidence templates, checklist workflows, secure data
    rooms, and board-ready reporting tied to one active feasibility or pilot process.
  twelveMonth: >-
    Convert at least one engagement into a live active-site subscription with telemetry ingestion, insurer and lender reporting,
    and reusable approval templates co-developed with advisors and partners.
  twentyFourMonth: >-
    Add anonymized benchmark reporting, second-jurisdiction template packs, and financing or underwriting workflow modules after
    2-3 active sites produce enough comparable evidence and operating data.
  keyBets:
    - Buyers will pay from live project-development and risk-mitigation budgets before commercial subsea generation is proven.
    - A neutral evidence layer is more credible to utilities, insurers, and regulators than a developer-owned workflow.
    - Washington and Oregon permit and evidence templates can be standardized enough to avoid collapsing into bespoke consulting.
    - Developer and telemetry partners will share enough structured data under controlled access to create reusable benchmarks.
gtm:
  wedge: Sell a bankability control plane for first subsea geothermal pilots rather than generic monitoring software or a developer replacement stack.
  channels:
    - Founder-led direct sales to Pacific Northwest public utilities, municipal utilities, and public pilot sponsors
    - Co-sell with subsea geothermal developers and marine EPC partners that need a neutral diligence record to win approvals
    - Referral and delivery partnerships with technical advisors, certifiers, insurers, and publicly funded demonstration programs
  funnelTargets: "Lead→qualified pilot 15-25%, qualified pilot→paid evidence engagement 40%+, paid evidence engagement→active-site subscription 50%+, first active site→second site or portfolio expansion within 18 months 30%+."
  pricing: >-
    Start with a paid evidence-room engagement tied to a real feasibility, permit, insurance, or financing milestone, then
    convert to an annual subscription per active site plus milestone-based fees for major submissions and approvals. This pricing
    fits the buyer's budget reality because value comes from shortening live project-development cycles and reducing approval risk,
    not from selling user seats.
businessModel:
  revenueStreams:
    - Paid evidence-room and diligence engagements for live pilot evaluations
    - Annual active-site software subscriptions
    - Milestone fees for permit, insurance, and financing evidence packages
    - Premium benchmark, lender-reporting, and underwriting-support modules
  unitOfValue: Active subsea geothermal site progressing through diligence, approval, and monitored operations
  targetGrossMarginPct: 70
  expansionLevers:
    - Add additional sites or portfolios within the same developer or utility sponsor
    - Expand from utility pilots into defense, island, or resilience-driven coastal sponsors
    - Layer benchmark analytics and underwriting workflows on top of monitored sites
    - Reuse proven evidence templates in adjacent coastal jurisdictions after Pacific Northwest proof
strategyMap:
  northStarMetric: Share of active sites that clear planned permit, insurance, or financing gates on first submission and on schedule
  inputMetrics:
    - Median days from project kickoff to first complete evidence pack
    - Number of material evidence re-open requests per approval gate
    - Percent of required telemetry and environmental data feeds live before submission deadlines
    - Paid evidence engagement to annual active-site conversion rate
    - Number of reusable evidence templates accepted across customers and advisors
  moatsToBuild:
    - Library of regulator, insurer, lender, and board evidence requirements for first-of-a-kind subsea geothermal projects
    - Longitudinal benchmark data on cable health, environmental thresholds, and predicted versus actual output across pilots
    - Embedded workflow integrations with technical advisors, certifiers, and telemetry providers
    - Customer-trusted audit trails and permissioning that make the platform the neutral record across counterparties
  killCriteria:
    - If no Pacific Northwest utility, municipal utility, or public sponsor will pay at least $150K for a live evidence-room engagement within 9 months, the budget signal is too weak.
    - If the first 2 design partners cannot converge on a repeatable minimum evidence pack that covers at least 60% of required workflows without heavy custom services, the product does not scale.
    - If the first 3 developer or telemetry relationships do not grant enough structured data access for anonymized benchmarking rights, the moat thesis collapses into low-value workflow software.
  mermaid: |
    flowchart LR
      Wedge[Bankability wedge] --> MVP[Evidence room MVP]
      MVP --> Proof[Paid approvals and first live site]
      Proof --> Expansion[Benchmark and underwriting expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong wedge logic and real buyer pain, but conviction stays limited until one sponsor pays for the workflow before commercial generation is proven.
    whyBelieve: Utilities, developers, advisors, insurers, and regulators already need a neutral evidence layer for Juan de Fuca-style pilots, and no incumbent owns the full approval stack.
    whyDoubt: If pilot timelines slip or buyers keep stitching together consultants and offshore monitoring vendors, the market stays too small and too bespoke for venture returns.
    nextDiligence: Secure one paid Pacific Northwest evidence-room engagement and confirm it can expand into recurring active-site monitoring spend.
  firstCustomer:
    title: VP Resource Planning at a Pacific Northwest public utility district
    profile: Leads evaluation of a first 1-10 MW subsea geothermal pilot near a coastal load pocket, works with external marine and insurance advisors, and must defend the project to a board or commission.
    trigger: A funded feasibility study, resilience demonstration, or pilot budget forces a board-level decision on whether to advance a named site through permit and insurance gates.
    buyer: VP Resource Planning or Director of New Energy Development
    initialContract: "$150K-$300K paid evidence-room engagement that converts to roughly $400K-$800K annual recurring site revenue once the project enters live permitting, financing, and monitoring."
  mustBeTrue:
    - At least one Pacific Northwest utility or public sponsor must fund pre-permit evidence operations before there is a proven commercial subsea geothermal reference plant.
    - A neutral third-party platform must be preferred over a developer-owned data room for at least one live pilot approval process.
    - The first 2-3 deployments must share enough common permit, insurance, and diligence requirements to support reusable templates.
    - Developers and telemetry vendors must share enough structured data under controlled rights to create benchmark value beyond document management.
    - Active-site subscriptions must attach after the initial diligence phase often enough to support roughly $0.8M blended annual contract value by year 3.
  diligenceQuestions:
    - Which Pacific Northwest utilities or public sponsors have real 2026-2027 budget authority for a subsea geothermal feasibility or pilot workflow?
    - What exact minimum evidence pack do insurers, technical advisors, and lenders require before they treat a first pilot as financeable?
    - How much of the approval process can be templated across Washington, Oregon, and federal offshore pathways before custom consulting dominates?
    - Will developers allow a neutral vendor to hold telemetry, cable-health, and seabed data with enough reuse rights to build benchmarks?
    - What KPI threshold turns a paid evidence-room engagement into an annual active-site software budget?
operatingAssumptions:
  - assumption: A Pacific Northwest utility, municipal utility, or public sponsor will pay for evidence workflow software before subsea geothermal has a commercial operating track record.
    basis: research.yaml
    validationTest: Close at least one paid design-partner engagement tied to a live feasibility, permit, or insurance milestone within 9 months.
    decisionImpact: If false, the company must sell upstream to developers and advisors first and reduce near-term ACV expectations.
  - assumption: Developers and telemetry partners will share enough site and prototype data through customer-controlled permissions to support benchmarks.
    basis: research.yaml
    validationTest: Sign 2 data-sharing agreements that allow anonymized benchmarking rights and live ingestion of at least cable, environmental, and output data fields.
    decisionImpact: If false, the moat becomes weaker and the roadmap should emphasize workflow productivity rather than data-network effects.
  - assumption: Washington and Oregon permit and evidence workflows are similar enough to standardize a majority of the MVP.
    basis: research.yaml
    validationTest: Map the first 2 design-partner projects and confirm at least 60% of evidence requirements can be served from a common template library.
    decisionImpact: If false, services intensity rises and the company should narrow to one jurisdiction or one approval gate first.
  - assumption: A paid evidence-room engagement can convert into recurring active-site software once the project reaches live permit, financing, or commissioning stages.
    basis: idea.yaml
    validationTest: Convert at least 1 of the first 2 paid engagements into an annual subscription within 12 months of project kickoff.
    decisionImpact: If false, revenue becomes too project-based and the venture case shifts toward services or advisory software.
  - assumption: Technical and insurance advisors will accept startup-generated workflows and reports if they are co-designed with them.
    basis: operator judgment
    validationTest: Co-develop one red-line checklist with an insurer or broker, one technical advisor, and one certification or verification partner and secure written willingness to use the outputs in a live process.
    decisionImpact: If false, the platform cannot become the system of record and must reposition as an internal project tool only.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12-15 Pacific Northwest utility, municipal utility, and public-sponsor resource planning leads plus 4-6 external advisors.
    hypothesis: Buyers and advisors will describe a shared urgency around first-pilot evidence operations rather than a generic interest in offshore monitoring.
    successMetric: At least 8 sponsor-side interviews confirm a live buying trigger and 3 share current diligence artifacts or requirement lists.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Build a mock evidence checklist and red-line workshop with one insurer or broker, one technical advisor, and one certification partner.
    hypothesis: A repeatable minimum evidence pack can be defined before writing deep product integrations.
    successMetric: Partners align on a checklist that covers at least 60% of a first pilot approval workflow and agree to test it on a live opportunity.
    owner: Permitting and risk lead
  - horizon: 90–180 days
    experiment: Run the first concierge evidence-room engagement on a live feasibility or pilot study using secure data rooms, audit trails, and manual template support.
    hypothesis: Buyers will pay for a high-touch workflow before the telemetry product is fully automated.
    successMetric: One paid engagement signed at $150K+ and used in at least one board, permit, insurance, or financing submission.
    owner: CEO founder
  - horizon: 90–180 days
    experiment: Ship telemetry ingestion for prototype or pilot data covering output, cable-health, and environmental thresholds.
    hypothesis: The product can connect evidence packaging and live monitoring in one workflow without becoming a generic SCADA replacement.
    successMetric: One design partner streams at least 3 live or historical data feeds into the platform and uses them in an approval or review artifact.
    owner: Founding eng
  - horizon: 180–360 days
    experiment: Convert the first paid evidence-room customer into an annual active-site subscription.
    hypothesis: Approval-stage workflow ownership will create a natural path into recurring permit, insurance, financing, and monitoring spend.
    successMetric: One annual contract signed at $400K+ ARR with defined recurring usage across approval and operating milestones.
    owner: Product and implementation lead
  - horizon: 180–540 days
    experiment: Launch one co-sell motion with a subsea developer or defense or resilience demonstration sponsor after the first case study.
    hypothesis: A partner-led distribution channel can produce qualified opportunities faster than pure founder-led outbound once proof exists.
    successMetric: Partner-sourced opportunities represent at least 25% of qualified pipeline and produce one additional paid engagement.
    owner: Strategic partnerships lead
operations:
  - Standardize every deployment around an evidence taxonomy, role-based permissions, and approval-gate audit trails before adding bespoke analytics.
  - Use advisor-reviewed templates for Washington and Oregon permitting, insurance, and financing workflows so the company sells repeatable process instead of open-ended consulting.
  - Treat data-sharing agreements and anonymized benchmark rights as a first-class operating process because moat formation depends on structured reuse, not just software adoption.
team:
  - role: CEO founder
    startTiming: Month 0
    rationale: Owns founder-led sales, sponsor discovery, pricing, and partner negotiation while the market and buying trigger are still being proven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the evidence room, audit trail, permissioning, and first telemetry ingestion paths that determine trust and deployment speed.
  - role: Permitting and risk lead
    startTiming: Month 1
    rationale: Translates marine regulatory, insurance, and diligence requirements into reusable templates and keeps the wedge from collapsing into ad hoc services.
  - role: Product and implementation lead
    startTiming: Month 3
    rationale: Encodes customer workflows, shortens onboarding, and turns the first high-touch engagements into repeatable product deployments.
  - role: Strategic partnerships lead
    startTiming: Month 9
    rationale: Adds leverage only after the first case study exists by converting advisor, developer, and public-program relationships into qualified pipeline.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid design-partner evidence-room engagements in Washington or Oregon
      - Deliver repeatable permit, insurance, and board evidence templates for first pilot workflows
      - Secure one developer data-sharing agreement and one advisor or insurer workflow partner
      - Convert one live project into an annual active-site subscription
  - horizon: 12–24 months
    items:
      - Support 2-3 active sites or portfolios with recurring approval and monitoring workflows
      - Launch anonymized benchmark reporting across cable, environmental, and output data
      - Add one secondary sponsor segment such as defense, island, or resilience demonstration programs
      - Prove at least one partner-sourced deal path through a developer, advisor, or public program
  - horizon: 24–36 months
    items:
      - Reach 3 paying sites or portfolios consistent with the researched year-3 SOM case
      - Expand the template library into one adjacent coastal jurisdiction beyond Washington and Oregon
      - Launch lender and underwriting support modules informed by multi-site evidence history
      - Establish the platform as the default neutral record for at least one repeat developer or sponsor ecosystem
risks:
  - risk: Pilot timelines slip beyond the expected commercialization window, delaying the shift from paid diligence into recurring monitoring revenue.
    likelihood: High
    impact: High
    mitigation: Monetize pre-permit evidence operations first, keep burn aligned to a small number of live projects, and defer hiring for expansion motions until recurring subscriptions appear.
  - risk: Developers resist sharing telemetry, seabed, or cable-health data with a neutral vendor, weakening the benchmark moat.
    likelihood: High
    impact: High
    mitigation: Offer customer-controlled permissions, narrow reuse rights, and clear benchmark value so data sharing is optional at first but economically attractive.
  - risk: Washington, Oregon, and federal offshore workflows prove too fragmented to template economically.
    likelihood: Medium
    impact: High
    mitigation: Narrow the MVP to the common evidence layer across one or two approval gates and add jurisdiction-specific packs only after reuse is proven.
  - risk: Advisors, insurers, and utilities decide consultants and adjacent offshore tools are good enough for the first few pilots.
    likelihood: Medium
    impact: Medium
    mitigation: Prove measurable cycle-time reduction, fewer evidence re-open requests, and auditability that fragmented workflows cannot match.
  - risk: The near-term buyer set remains too small and procurement-heavy to support venture-speed growth.
    likelihood: High
    impact: High
    mitigation: Concentrate on the few highest-probability sponsors, use partner-led distribution to lower CAC, and revisit the funding plan if paid pipeline does not materialize quickly.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: Build the evidence-room MVP, hire domain and implementation talent, win 2 paid design partners, convert 1 site to recurring subscription, and establish the first advisor and data-sharing integrations needed to validate a repeatable Pacific Northwest wedge.
