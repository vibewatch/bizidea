  pestle:
  - factor: 政治
    impact: positive
    point: DoD 在多个设施上支持地热，给 24/7 韧性电力和去风险化示范带来明显的公共部门拉力。
    sourceRefs:
    - 30
  - factor: 经济
    impact: positive
    point: 太平洋西北地区的负荷增长和建模出的资源充足性缺口，提高了任何可信清洁稳定电力选项的价值。
    sourceRefs:
    - 4
    - 6
  - factor: 社会
    impact: negative
    point: 沿海项目会面对社区、部落、环保和渔业各方审视，因此透明处理证据的价值更高。
    sourceRefs:
    - 8
    - 9
    - 10
  - factor: 技术
    impact: positive
    point: 更广泛的地热研发正在持续降低钻井和储层不确定性，让可融资性软件更赶时候。
    sourceRefs:
    - 20
    - 21
    - 29
  - factor: 法律
    impact: negative
    point: 联邦 OCS 规则和州级沿海审批带来跨机构合规负担，既会拖慢试点，也会抬高交易成本。
