    - 12
    - 25
    - 26
  adoptionFrictionMatrix:
  - friction: 海底地热在沿海水域的许可路径尚未定义清楚
    severity: 高
    affectedBuyer: 公用事业开发负责人
    mitigation: 不要为每个站点从零发明工作流，而是先从映射到 BOEM、州领海和既有海洋能源先例的证据模板开始。
    sourceRefs:
    - 7
    - 8
    - 9
    - 10
  - friction: 开发商可能不愿把遥测和海床数据共享给中立软件供应商
    severity: 高
    affectedBuyer: 开发商 / EPC 伙伴
    mitigation: 提供由客户掌控的数据室、基于角色的访问权限，以及匿名基准权。
    sourceRefs:
    - 3
    - 23
    - 24
  - friction: 短期买家池非常小，容易把部署拖向定制化
    severity: 高
    affectedBuyer: 创始人 / 商业负责人
    mitigation: 先瞄准公共示范项目、国防站点和锚定开发商，再去扩张更广泛的公用事业市场。
    sourceRefs:
    - 6
    - 30
  - friction: 买家可能觉得前 1–2 个试点用顾问和表格就够了
    severity: 中
