- name: Marsh
  stage: 在位企业
  wedge: 面向可再生能源项目的风险融资、保险尽调和项目审查。
  pricing: 未公开
  strength: 直接切进可保性、保障结构和交易风险框架。
  weaknessVsUs: 只覆盖保险这一层，没有承接底下的技术、许可和遥测记录。
  sourceRefs:
  - 15
- name: Endurance in-house stack
  stage: 成长期
  wedge: 围绕一手海底地热设计和遥测构建的垂直开发商工作流。
