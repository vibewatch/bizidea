competitors:
- name: DNV
  stage: 在位企业
  wedge: 面向海底系统的验证、标准、可研审查和完整性管理。
  pricing: 未公开
  strength: 它已经能把海底风险翻译成可认证的工作成果，因此在运营方和决策关卡里公信力很高。
  weaknessVsUs: 更偏服务驱动，而不是实时、多方共享的证据 OS；在持续性的许可 / 保险 / 监测工作流编排上偏弱。
  sourceRefs:
  - 22
- name: 4Subsea
  stage: 成长期
  wedge: 以传感器驱动的海底资产完整性和预测性维护。
  pricing: 未公开
  strength: 实时海底可靠性和延长生命周期的工具能力很强。
  weaknessVsUs: 没有面向地热的贷款方、保险方或监管方证据层。
  sourceRefs:
  - 23
- name: OWC
  stage: 在位企业
  wedge: 面向海上可再生能源融资和交易的独立技术尽调。
