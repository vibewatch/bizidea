slug: subsea-geothermal-bankability
date: '2026-06-12'
executiveSummary: 这家公司应该先做成一套中立的可融资性与证据平台，服务首批海底地热试点，而不是自己下场做开发商，也不是去做通用海上监测工具。最合适的首个客户，是太平洋西北地区的公共电力区或市政公用事业公司，它们正与海底地热开发商或海洋 EPC 伙伴一起评估华盛顿州或俄勒冈州外海 1–10 MW 的试点。真正的购买触发点，是区域负荷上升、资源充足性压力或韧性示范任务催生出一笔已经到位的可研预算或试点预算，迫使董事会去决定要不要推进一种新的清洁稳定电力选项。最初的产品切口必须收窄：用一份项目记录把海洋许可证据、保险方和贷款方风险资料包、技术尽调以及获批后的实时海底遥测放进同一套流程。这个范围现在有吸引力，是因为 Endurance 已出资推进的 Juan de Fuca 方案压缩了尽调窗口，而公用事业公司、顾问和监管方都还没有可重复使用的工作流。战略优势不在于发明新传感器堆栈，而在于成为“哪些证据真的能让首批试点过审批”的中立系统记录。节奏上必须克制：先把付费证据室项目变现，再去假设一个多站点监测市场；只有当 2–3 个活跃站点出现后，才加上基准对比和承保产品。短期市场规模看上去可投，但也偏窄：研究得出的 SAM 约为 $14.4M，而且高度依赖少数开发商、赞助方和司法辖区。关于公用事业预算归属和具体许可姿态的直接证据仍然有限，因此前 12 个月必须先证明付费意愿、可复用的证据需求和数据访问权，之后才能把 venture-scale 的逻辑真正坐实。
problem:
- 沿海公用事业公司和公共赞助方需要新的清洁稳定电力容量，但首批海底地热试点总是卡住，因为每个项目都得从零重建海洋许可、可靠性、保险和融资证据。
- 现有替代方案把流程拆散在顾问、表格、海上完整性工具和开发商自建数据室之间，导致董事会决策变慢，而且每过一道审批关卡都要反复补证据。
solution:
- 提供一套中立的项目证据平台，把海床勘测、原型遥测、电缆与结构数据、环境测量和项目里程碑汇成一份可审计的记录。
- 先生成监管方、保险方、贷款方和董事会可直接使用的证据包，再延伸到实时试点监测，让预测与实际出力、资产健康和环境阈值在获批后仍留在同一套流程里。
whyWeWin:
- 目前没有任何现有厂商同时掌控公用事业赞助方、开发商、监管方、保险方、贷款方和遥测供应商之间的跨方工作流，因此一套中立的系统记录有机会在赛道标准形成前就变成默认协同层。
- 每落一个项目，平台都会沉淀更多专有模板：证据请求、审查轮次，以及横跨电缆、储层、环境和出力行为的试点性能基准；而碎片化的服务公司并不会把这些东西保留成软件资产。
strategicChoices:
  beachhead: 首批滩头市场是太平洋西北地区的公共电力区和市政公用事业公司，它们正在评估自己在华盛顿州或俄勒冈州领海，或邻近海上开发路径中的首个 1–10 MW 海底地热试点。
  wedgeRationale: 这个滩头市场比去卖泛海上能源软件更容易更快拿到验证，因为买家手上已经有一个跟具名试点地理绑定的董事会、许可和保险问题。把切口收窄成“证据室 + 监测”，就能在审批周期、证据完整度和返工减少上证明价值，而不用逼客户替换自己的工程、SCADA 或文档系统。
  sequencingRationale: 产品、GTM、招聘和合作都应该从付费尽调和证据打包开始，因为在发电能力还没被证明前，预算就先在这里。等第一个站点进入实时许可或调试阶段，公司再叠加遥测监测和基准报告；只有当多个活跃站点出现后，才适合扩展到承保、车队优化或新地理市场，因为这些动作都需要共享数据，也需要一个比今天更大的品类。
  notYet:
  - 在海底地热证据模型还不能复用前，就去卖陆上地热或通用海上风电工作流
  - 在公司还没有多站点基准数据前，就去做性能保证承保产品
  - 在华盛顿州和俄勒冈州模板还没跑通前，就扩张到太平洋西北以外的火环带市场
  - 在公用事业侧审批工作流还没拿下前，就直接向数据中心或工业承购方销售
market:
  tam: 估算 TAM 为 $96.0M：全球大约 80 个沿海试点或早期商业化赞助项目，每个活跃站点对应约 $1.2M 的混合年收入。
  sam: 估算 SAM 为 $14.4M：北美、太平洋西北地区及国防相关的近端赞助项目约 12 个，每站点混合年收入约 $1.2M。
  som: 估算第 3 年 SOM 为 $2.4M：假设拿下 3 个付费站点或项目组合，每个合同年价值约 $0.8M。
  segments:
  - 赞助首批海底地热试点的太平洋西北地区公共公用事业公司和市政公用事业公司
  - 海底地热开发商、海洋 EPC 团队，以及作为二级扩张买家的国防或韧性示范项目赞助方
  buyingProcess: 业务发起人通常是资源规划副总裁或新能源开发总监，工程、许可、财务以及外部技术或保险顾问会一起定义需求。交易应在可研预算、示范任务或试点审批周期催生“付费证据室”需求时启动；等项目进入实时许可、保险、融资或调试流程后，再转成按活跃站点收费的年度订阅。
product:
  mvp: MVP 是为一个实时试点服务的高信任证据室，覆盖文档接入、需求清单、基于角色的数据访问、审计轨迹、面向许可和保险方的报告模板，以及原型或早期现场数据的基础遥测接入。它要先证明：即便还没有完整的车队分析产品，一个赞助方也能从定制尽调切到可复用的审批工作流。
  sixMonth: 在 6 个月内上线 1–2 个付费 design partner 项目，交付华盛顿州和俄勒冈州模板、清单工作流、安全数据室，以及围绕一个在跑的可研或试点流程生成的董事会级报告。
  twelveMonth: 在 12 个月内，至少把 1 个项目转成实时活跃站点订阅，接入遥测、保险方和贷款方报告，并与顾问和合作伙伴共创可复用的审批模板。
  twentyFourMonth: 在 24 个月内，等 2–3 个活跃站点积累出足够的可比证据和运行数据后，再加上匿名基准报告、第二司法辖区模板包，以及融资或承保工作流模块。
  keyBets:
  - 在海底地热商业化发电被证明之前，买家就愿意从实时项目开发和风险缓释预算里为产品付费。
  - 对公用事业公司、保险方和监管方而言，中立的证据层比开发商自有工作流更可信。
  - 华盛顿州和俄勒冈州的许可与证据流程足够相似，足以标准化 MVP 的大部分能力，而不是坍塌成定制顾问业务。
  - 开发商和遥测伙伴愿意在受控访问前提下共享足够结构化的数据，帮助平台建立可复用的基准。
gtm:
  wedge: 卖的是首批海底地热试点的可融资性控制平面，而不是通用监测软件，也不是开发商替代方案。
  channels:
  - 由创始人主导，直销给太平洋西北地区公共公用事业公司、市政公用事业公司和公共试点赞助方
  - 与需要一套中立尽调记录来拿下审批的海底地热开发商和海洋 EPC 伙伴联合销售
  - 与技术顾问、认证方、保险方以及公共资助示范项目建立转介绍和交付合作
  funnelTargets: 线索→合格试点 15–25%；合格试点→付费证据项目 40%+；付费证据项目→活跃站点订阅 50%+；首个活跃站点→18 个月内拿下第二个站点或项目组合扩张 30%+。
  pricing: 先围绕真实的可研、许可、保险或融资里程碑卖一个付费证据室项目，随后转成按活跃站点收取的年度订阅，并在重大申报和获批节点收取里程碑费用。这样的定价更贴合买家预算现实，因为价值来自缩短实时项目开发周期、降低审批风险，而不是卖用户席位。
businessModel:
  revenueStreams:
  - 围绕实时试点评估的付费证据室与尽调项目
  - 按活跃站点收取的年度软件订阅费
  - 围绕许可、保险和融资证据包的里程碑费用
  - 高级基准、贷款方报告和承保支持模块
  unitOfValue: 一个正在经历尽调、审批和监测运营的活跃海底地热站点
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一开发商或公用事业赞助方内部扩到更多站点或项目组合
  - 从公用事业试点扩到国防、岛屿或以韧性为目标的沿海赞助方
  - 在监测站点之上叠加基准分析和承保工作流
  - 在太平洋西北地区验证后，把成熟证据模板复制到邻近沿海司法辖区
strategyMap:
  northStarMetric: 按计划、且首轮提交即通过许可、保险或融资关卡的活跃站点占比
  inputMetrics:
  - 从项目启动到产出第一版完整证据包的中位天数
  - 每个审批关卡触发的重大补证据请求次数
  - 在提交截止前已接通的必需遥测和环境数据流占比
  - 付费证据项目向年度活跃站点的转化率
  - 被客户和顾问接受的可复用证据模板数量
  moatsToBuild:
  - 首批海底地热项目所需的监管方、保险方、贷款方和董事会证据要求库
  - 跨试点沉淀的电缆健康、环境阈值以及预测与实际出力的纵向基准数据
  - 与技术顾问、认证方和遥测提供商深度嵌入的工作流集成
  - 让平台成为多方中立记录的、被客户信任的审计轨迹与权限体系
  killCriteria:
  - 如果 9 个月内没有任何太平洋西北地区公用事业公司、市政公用事业公司或公共赞助方愿意为一个实时证据室项目支付至少 $150K，预算信号就太弱。
  - 如果前 2 个 design partner 无法收敛出一套可复用的最小证据包，且不能在重服务定制之外覆盖至少 60% 的必需工作流，产品就不具备扩张性。
  - 如果前 3 个开发商或遥测合作关系都不给足够的结构化数据访问权，无法换来匿名基准权，护城河逻辑就会退化成低价值工作流软件。
  mermaid: |
    flowchart LR
      Wedge[Bankability wedge] --> MVP[Evidence room MVP]
      MVP --> Proof[Paid approvals and first live site]
      Proof --> Expansion[Benchmark and underwriting expansion]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口逻辑很强，买家痛点也真实，但在商业化发电被证明之前，至少要先有一个赞助方愿意为这套工作流付费，判断才能真正提高。
    whyBelieve: 对于 Juan de Fuca 这类试点，公用事业公司、开发商、顾问、保险方和监管方现在就需要一层中立证据层，而且没有任何现有厂商占据完整审批栈。
    whyDoubt: 如果试点时间线继续后移，或者买家仍然靠顾问和海上监测供应商拼方案，市场就会太小、太定制，撑不起风险投资回报。
    nextDiligence: 先拿下一个付费的太平洋西北证据室项目，并确认它能顺势扩成经常性活跃站点监测预算。
  firstCustomer:
    title: 太平洋西北地区公共电力区的资源规划副总裁
    profile: 负责评估沿海负荷节点附近首个 1–10 MW 海底地热试点，与外部海洋和保险顾问协同，并且必须向董事会或委员会为该项目辩护。
    trigger: 一笔已到位的可研预算、韧性示范项目或试点预算，会迫使董事会去决定是否推动一个具名站点穿过许可和保险关卡。
    buyer: 资源规划副总裁或新能源开发总监
    initialContract: 先签一个 $150K–$300K 的付费证据室项目；等项目进入实时许可、融资和监测阶段后，再转成大约 $400K–$800K 的年度经常性站点收入。
  mustBeTrue:
  - 在商业化海底地热参考电站出现之前，至少要有一个太平洋西北地区公用事业公司或公共赞助方愿意为许可前证据运营付费。
  - 至少在一个实时试点审批流程里，中立第三方平台必须比开发商自建数据室更受欢迎。
  - 前 2–3 个部署必须共享足够多的许可、保险和尽调要求，平台才有机会沉淀出可复用模板。
  - 开发商和遥测供应商必须愿意在受控权限下共享足够结构化的数据，才能让平台在文档管理之外形成基准价值。
  - 初始尽调阶段之后，活跃站点订阅必须有足够高的挂接率，才能在第 3 年支撑约 $0.8M 的混合年合同价值。
  diligenceQuestions:
  - 哪些太平洋西北地区公用事业公司或公共赞助方，真的握有 2026–2027 年海底地热可研或试点工作流预算权？
  - 保险方、技术顾问和贷款方到底要求一套什么样的最小证据包，才会把首个试点视为可融资？
  - 在定制顾问工作压过来之前，华盛顿州、俄勒冈州和联邦近海路径里，到底有多少审批流程能模板化？
  - 开发商会不会允许一家中立供应商持有遥测、电缆健康和海床数据，并授予足够的复用权来建立基准？
  - 什么 KPI 阈值能把一次付费证据室项目，顺利转成年预算里的活跃站点软件开支？
operatingAssumptions:
- assumption: 太平洋西北地区的公用事业公司、市政公用事业公司或公共赞助方，会在海底地热还没有商业运营记录之前，就为证据工作流软件付费。
  basis: research.yaml
  validationTest: 在 9 个月内，围绕一个实时可研、许可或保险里程碑拿下至少 1 个付费 design partner 项目。
  decisionImpact: 如果不成立，公司就得先往上游卖给开发商和顾问，并下调短期 ACV 预期。
- assumption: 开发商和遥测合作伙伴会通过客户控制的权限体系共享足够的场址和原型数据，支持建立基准。
  basis: research.yaml
  validationTest: 签下 2 份数据共享协议，允许匿名基准权，并至少实时接入电缆、环境和出力数据字段。
  decisionImpact: 如果不成立，护城河会变弱，路线图也该更偏向工作流效率，而不是数据网络效应。
- assumption: 华盛顿州和俄勒冈州的许可与证据流程足够相似，能把 MVP 的大部分能力标准化。
  basis: research.yaml
  validationTest: 把前 2 个 design partner 项目逐项映射，确认至少 60% 的证据需求可由同一套模板库覆盖。
  decisionImpact: 如果不成立，服务强度会上升，公司应先收窄到一个司法辖区或一个审批关卡。
- assumption: 一旦项目进入实时许可、融资或调试阶段，付费证据室项目就能转成经常性的活跃站点软件订阅。
  basis: idea.yaml
  validationTest: 在项目启动后的 12 个月内，把前 2 个付费项目中的至少 1 个转成年度订阅。
  decisionImpact: 如果不成立，收入会过于项目制，venture 逻辑也会转向服务或顾问软件。
- assumption: 只要工作流和报告与技术顾问、保险方共同设计，这些外部方就会接受创业公司生成的输出。
  basis: operator judgment
  validationTest: 与 1 家保险方或经纪商、1 家技术顾问和 1 家认证/验证伙伴共创一份红线清单，并拿到其愿意在真实流程中使用这些输出的书面确认。
  decisionImpact: 如果不成立，平台就无法成为系统记录，只能退回内部项目工具定位。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 采访 12–15 位太平洋西北地区公用事业、市政公用事业和公共赞助方的资源规划负责人，再加上 4–6 位外部顾问。
  hypothesis: 买家和顾问描述出来的会是围绕首批试点证据运营的共同紧迫感，而不是泛泛的海上监测兴趣。
  successMetric: 至少 8 次赞助方侧访谈确认存在实时购买触发点，其中 3 家愿意分享当前尽调材料或需求清单。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 和 1 家保险方或经纪商、1 家技术顾问、1 家认证伙伴一起做一套模拟证据清单和红线工作坊。
  hypothesis: 在写深度产品集成前，就能定义出一套可复用的最小证据包。
  successMetric: 合作方就一份覆盖首批试点审批流程至少 60% 的清单达成一致，并同意在真实机会里测试。
  owner: 许可与风险负责人
- horizon: 90–180 天
  experiment: 用安全数据室、审计轨迹和人工模板支持，在一个真实可研或试点研究上跑通首个 concierge 式证据室项目。
  hypothesis: 即便遥测产品还没完全自动化，买家也愿意为高触达工作流付费。
  successMetric: 签下 1 个金额至少 $150K 的付费项目，并把它用进至少 1 次董事会、许可、保险或融资材料提交。
  owner: 创始人 / CEO
- horizon: 90–180 天
  experiment: 交付原型或试点数据的遥测接入，覆盖出力、电缆健康和环境阈值。
  hypothesis: 产品能把证据打包和实时监测放进同一套流程，而不会滑向通用 SCADA 替代品。
  successMetric: 至少 1 个 design partner 把 3 条实时或历史数据流接入平台，并把这些数据用于审批或审查材料。
  owner: 创始工程师
- horizon: 180–360 天
  experiment: 把首个付费证据室客户转成按年付费的活跃站点订阅。
  hypothesis: 在审批阶段掌控工作流，会自然延伸到经常性的许可、保险、融资和监测预算。
  successMetric: 签下 1 份 ARR 至少 $400K 的年度合同，并明确在审批和运营里程碑上的持续使用场景。
  owner: 产品与实施负责人
- horizon: 180–540 天
  experiment: 在首个案例研究之后，与 1 家海底开发商或国防/韧性示范赞助方跑通联合销售。
  hypothesis: 一旦有了验证，伙伴主导的分销能比纯创始人外呼更快带来合格机会。
  successMetric: 伙伴来源机会至少占合格管道的 25%，并再带来 1 个新的付费项目。
  owner: 战略合作负责人
operations:
- 在加任何定制分析前，先把每次部署标准化到统一证据分类、基于角色的权限体系和审批关卡审计轨迹上。
- 用经顾问审阅的华盛顿州和俄勒冈州许可、保险和融资模板来交付产品，这样卖的是可复用流程，不是无限延展的顾问工时。
- 把数据共享协议和匿名基准权当成一级运营流程来抓，因为护城河形成靠的是结构化复用，而不只是软件被采用。
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 在市场和购买触发点尚未被验证时，亲自负责销售、赞助方发现、定价和伙伴谈判。
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责搭建证据室、审计轨迹、权限系统和首批遥测接入路径，这些能力决定信任和部署速度。
- role: 许可与风险负责人
  startTiming: Month 1
  rationale: 把海洋监管、保险和尽调要求编码成可复用模板，避免切口滑向临时顾问服务。
- role: 产品与实施负责人
  startTiming: Month 3
  rationale: 把客户工作流产品化、缩短上线周期，并把最初的高触达项目变成可重复部署。
- role: 战略合作负责人
  startTiming: Month 9
  rationale: 等首个案例跑出来后，再把顾问、开发商和公共项目关系转成合格销售管道。
milestones:
- horizon: 0–12 个月
  items:
  - 在华盛顿州或俄勒冈州签下 2 个付费 design partner 证据室项目
  - 交付适用于首批试点工作流的、可复用的许可、保险和董事会证据模板
  - 拿下 1 份开发商数据共享协议，以及 1 家顾问或保险工作流合作伙伴
  - 把 1 个实时项目转成年度活跃站点订阅
- horizon: 12–24 个月
  items:
  - 用经常性审批与监测工作流支持 2–3 个活跃站点或项目组合
  - 围绕电缆、环境和出力数据上线匿名基准报告
  - 新增 1 个次级赞助方细分市场，如国防、岛屿或韧性示范项目
  - 通过开发商、顾问或公共项目，验证至少 1 条伙伴来源交易路径
- horizon: 24–36 个月
  items:
  - 拿下 3 个付费站点或项目组合，对齐研究里的第 3 年 SOM 情形
  - 把模板库扩到华盛顿州和俄勒冈州之外的 1 个邻近沿海司法辖区
  - 基于多站点证据历史，上线贷款方和承保支持模块
  - 让平台在至少 1 个重复出现的开发商或赞助方生态里，成为默认的中立记录
risks:
- risk: 试点时间线比预期的商业化窗口更晚，导致收入从付费尽调向经常性监测迁移的节奏被拖后。
  likelihood: High
  impact: High
  mitigation: 先把许可前证据运营变现，围绕少数实时项目控制 burn，并在经常性订阅真正出现前推迟扩张性招聘。
- risk: 开发商抗拒向中立供应商共享遥测、海床或电缆健康数据，削弱基准护城河。
  likelihood: High
  impact: High
  mitigation: 提供由客户掌控的权限、收窄复用权范围，并把基准价值讲清楚，让数据共享先变成可选项，再变成经济上有吸引力的选项。
- risk: 华盛顿州、俄勒冈州和联邦近海工作流过于碎片化，无法经济地模板化。
  likelihood: Medium
  impact: High
  mitigation: 先把 MVP 收窄到 1–2 道审批关卡共有的证据层上，只有复用被证明之后再加各司法辖区专属模板包。
- risk: 顾问、保险方和公用事业公司认为，前几个试点用顾问和相邻海上工具就够了。
  likelihood: Medium
  impact: Medium
  mitigation: 证明平台能切实缩短周期、减少补证据请求，并提供碎片化工作流做不到的可审计性。
- risk: 短期买家池太小、采购流程又太重，撑不起风险投资要求的增长速度。
  likelihood: High
  impact: High
  mitigation: 把资源集中在最高概率的少数赞助方上，借助伙伴分销压低 CAC；如果付费销售管道迟迟不出现，就回头调整融资计划。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 把证据室 MVP 做出来，补齐领域专家和实施人才，拿下 2 个付费 design partner，把 1 个站点转成经常性订阅，并建立验证太平洋西北可复用切口所需的首批顾问与数据共享集成。
