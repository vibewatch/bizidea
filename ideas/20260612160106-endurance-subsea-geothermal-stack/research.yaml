openQuestions:
- Will federal and state regulators treat a subsea geothermal pilot mostly like offshore renewables, mostly like submarine infrastructure, or as a novel hybrid requiring extra process steps?
- Can developers share enough prototype telemetry, cable-health data, and seabed survey information with a neutral software vendor to create a reusable benchmark moat?
- How many Pacific Northwest utilities will fund a 1-10 MW subsea pilot before there is one successful multi-season operating reference site?
- What exact minimum evidence pack would an insurer, lender, and utility board require before approving a first commercial-scale subsea geothermal project?
