competitors:
- name: DNV
  stage: incumbent
  wedge: Verification, standards, feasibility review, and integrity management for subsea systems.
  pricing: Not publicly listed
  strength: High credibility with operators and decision gates because it already translates subsea risk into certifiable work products.
  weaknessVsUs: Services-led rather than a live cross-stakeholder evidence OS; weak at ongoing permit/insurance/monitoring workflow orchestration.
  sourceRefs:
  - 22
- name: 4Subsea
  stage: scale-up
  wedge: Sensor-driven subsea asset integrity and predictive maintenance.
  pricing: Not publicly listed
  strength: Strong real-time subsea reliability and lifecycle extension tooling.
  weaknessVsUs: No geothermal-specific lender, insurer, or regulator evidence layer.
  sourceRefs:
  - 23
- name: OWC
  stage: incumbent
  wedge: Independent technical due diligence for offshore renewables financing and transactions.
  pricing: Not publicly listed
  strength: Trusted by owners and financial institutions for objective technical review.
  weaknessVsUs: Human-services model with limited persistent data capture and weak post-approval monitoring continuity.
  sourceRefs:
  - 16
- name: Marsh
  stage: incumbent
  wedge: Risk financing, insurance due diligence, and program review for renewable energy projects.
  pricing: Not publicly listed
  strength: Direct line into insurability, coverage structure, and transaction risk framing.
  weaknessVsUs: Owns only the insurance layer, not the technical, permitting, and telemetry record underneath it.
  sourceRefs:
  - 15
- name: Endurance in-house stack
  stage: scale-up
  wedge: Vertical developer workflow built around first-party subsea geothermal design and telemetry.
  pricing: Internal / unavailable
  strength: Native access to the earliest subsea geothermal data and decisions.
  weaknessVsUs: Not neutral across developers or automatically trusted as a system of record by utilities, insurers, and regulators.
