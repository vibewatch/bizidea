reportMemo:
  executiveTakeaways:
  - 'The buyer pain is real now, not hypothetical: Pacific Northwest utilities face sharp load growth and emerging resource-adequacy gaps just as Endurance is forcing the first concrete Juan de Fuca-style diligence cycle.'
  - The best near-term product is not generic asset monitoring; it is an evidence workflow that bundles marine permitting, insurer-ready risk framing, technical due diligence, and live subsea telemetry into one project record.
  - 'This is strategically attractive but commercially narrow in the next 2-3 years: the market is likely a low-double-digit millions SAM until more than one developer and more than one jurisdiction are actively piloting subsea geothermal.'
  - A neutral cross-project evidence layer is the defensible wedge because developers, advisors, and offshore monitoring vendors each own only one slice of the bankability stack.
  marketDefinition: 'Software-plus-workflow infrastructure for first-of-a-kind subsea geothermal project bankability: site diligence, permit evidence, insurer/lender reporting, and post-approval performance monitoring for coastal pilot projects.'
  customerAndBuyer: Primary user is the utility or public-sector development team running a first pilot evaluation; the economic buyer is the VP/Director of Resource Planning or New Energy Development, often working with outside technical, insurance, and permitting advisors. Secondary users are developers and marine EPC teams that need a neutral evidence room acceptable to utilities, regulators, insurers, and lenders.
  buyingTriggers:
  - point: A feasibility or pilot budget becomes urgent once regional load growth and adequacy studies force utilities to hunt for new clean-firm resources.
    sourceRefs:
    - 4
    - 5
    - 6
  - point: A named clean-firm procurement pathway or large-load offtake opportunity makes geothermal diligence financeable rather than experimental.
    sourceRefs:
    - 17
    - 27
    - 28
  - point: A resilience or demonstration mandate from public programs or defense sites creates a concrete sponsor and a hard evidence deadline.
    sourceRefs:
    - 10
    - 12
    - 30
  willingnessToPay:
    summary: Budget is most likely unlocked inside live project-development spend, not standalone software line items. Clean-firm geothermal PPAs and insurer/advisor workflows show buyers will pay to reduce development risk and protect ratepayers, but the product must be tied to a real pilot, financing decision, or permit milestone.
    sourceRefs:
    - 15
    - 16
    - 27
    - 28
  competitiveLandscape: 'There is no obvious pure-play subsea geothermal bankability software incumbent yet. Competition comes from adjacent classes: technical verifiers like DNV, subsea monitoring vendors like 4Subsea and Sonardyne, geothermal and offshore diligence advisors, and developer-specific in-house stacks. The opportunity is to unify these fragmented inputs into a regulator/insurer/lender-ready system of record.'
  incumbentThesis:
  - incumbentClass: Geothermal developers
    point: Developers can own telemetry and engineering decisions, but utilities, insurers, and regulators often prefer a neutral evidence layer that is not tied to one project sponsor.
    sourceRefs:
    - 1
    - 2
    - 3
  - incumbentClass: Offshore integrity vendors
    point: Subsea integrity platforms monitor assets well, but they do not solve lender diligence, permit packaging, or cross-stakeholder approval workflows by default.
    sourceRefs:
    - 22
    - 23
    - 24
  - incumbentClass: Risk advisors and brokers
    point: Insurance and technical advisors remain essential, but their work is still episodic and document-heavy, leaving room for a repeatable software control plane.
    sourceRefs:
    - 13
    - 14
    - 15
    - 16
  - incumbentClass: Internal utility toolchains
    point: Generic spreadsheets and document rooms struggle with marine-specific compliance, cable-health evidence, and live subsea telemetry over a multi-year pilot lifecycle.
    sourceRefs:
    - 10
    - 12
    - 25
    - 26
  regulatoryLandscape: Regulatory complexity is one of the wedge’s strongest supports. Federal offshore approvals run through BOEM’s phased framework, while state territorial-sea projects can require easements, removal-fill permits, coastal-zone consistency, and extended public and interagency review. Even closely related marine-energy sectors needed DOE-backed toolkits and Sandia cost studies to make permitting more navigable, which is a strong signal that subsea geothermal will also need structured evidence operations rather than ad hoc consulting bundles.
  technologyLandscape: Subsea geothermal still inherits substantial first-of-a-kind technical risk, but adjacent geothermal technology curves are improving. DOE’s GeoVision and FORGE work show the broader geothermal ecosystem is reducing drilling and reservoir uncertainty, while offshore energy vendors already offer mature telemetry, cable, and integrity tooling that can be adapted to subsea geothermal. The startup’s technical job is therefore orchestration and evidence normalization more than inventing every underlying sensor or physics model.
  distributionChannels:
  - point: Co-sell with subsea geothermal developers that need to persuade utilities and boards to approve first pilots.
    sourceRefs:
    - 1
    - 2
    - 3
  - point: Enter through technical, insurance, and certification advisors already embedded in financing and diligence workstreams.
    sourceRefs:
