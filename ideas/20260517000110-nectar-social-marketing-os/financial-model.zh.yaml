scenarios:
  downside:
    description: pilot 转化更慢、第二条 workflow 扩展更弱、人工审核更多，都会把公司继续锁在重服务的姿态里。
    y3RevenueK: 1080
    y3EbitdaK: -690
    cashLowPointK: -60
    keyAssumptionChanges:
    - Y3 混合 ARPU 下滑到 $72K
    - Q4Y3 付费 workflow 期末只有 20 条，而不是 25 条
    - 毛利率停在 65%
  base:
    description: 创始人主导的 pilot 按计划转化，现有客户加上第二条 workflow，毛利率也在 Y3 达到 70% 目标。
    y3RevenueK: 1382.5
    y3EbitdaK: -479.11
    cashLowPointK: 471.5
    keyAssumptionChanges:
    - Y3 混合 ARPU 达到 $84K
    - Q4Y3 付费 workflow 达到 25 条
    - 毛利率提升到 70%
  upside:
    description: 伙伴转介绍和创作者工作流扩张在不显著放大团队规模的前提下，加快了采用速度。
    y3RevenueK: 1765
    y3EbitdaK: -180
    cashLowPointK: 700
    keyAssumptionChanges:
    - Y3 混合 ARPU 达到 $90K
    - Q4Y3 付费 workflow 达到 30 条
    - 毛利率提升到 72%
