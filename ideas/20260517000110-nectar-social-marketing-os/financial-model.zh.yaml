modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  LaunchTrigger[Launch or creator spike] --> Leads[Qualified pilot opportunities]\n  Leads --> Workflows[Paid workflows]\n  Workflows --> Revenue[Subscription + usage revenue]\n  Revenue --> GrossProfit[Gross profit after onboarding and support COGS]\n  GrossProfit --> Cash[Cash runway]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入的核心驱动，是到 Q4Y3 拿到 25 条付费 workflow，其中大部分增量来自早期美妆客户扩到第二条 workflow，而不是靠一支很大的 SDR 团队。
- checkName: 必须成立的条件
  finding: pilot 转年合同的转化率必须守在商业计划中 50%+ 的目标上方，这样创始人主导销售才能在 GTM 团队扩张前先做出样板账户。
- checkName: 模型会失效，如果
  finding: 如果审批阈值始终过严、毛利率又卡在 65% 左右，下行情景会让现金在下一轮融资就绪前跌破 0。
- checkName: 下一轮融资验证点
  finding: 下一轮融资能不能讲得动，取决于公司能否在 Y2 结束时拿出 4-6 个 production logo、10 条付费 workflow、伙伴来源 pipeline，以及能证明软件经济性正在成形的毛利率改善。
sanityChecks:
  ruleOf40: Y3 growth 298% + EBITDA margin -35% = 263%
  burnMultiple: burn multiple 从 Y2 的约 2.8x 改善到 Y3 的约 0.5x，因为扩张收入开始吃掉固定成本。
  revenuePerFte: $154K（按 Y3、Q4Y3 的 9 名 FTE 计算），低于垂直 SaaS 常见的 $200K-$400K 基准，所以还需要更多 workflow 扩张。
  flags:
  - 模型依赖现有美妆客户内部的第二条 workflow 扩张；如果只靠新 logo 销售，很难打到 Y3 收入线。
  - 由于实施、策略调优和客户支持仍然受人工影响，Y3 的人效收入仍低于成熟 SaaS 基准。
  - 毛利率到 Y3 才爬到 70% 目标；如果人工审核或定制 onboarding 长时间降不下来，就得更早再融一轮。
