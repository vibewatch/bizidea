openQuestions:
  - >-
    How many U.S. beauty brands in the $50M-$300M DTC band would buy a dedicated revenue-desk layer
    as a new budget line rather than treat it as a feature request for Gorgias, Sprinklr, or Nectar?
  - >-
    Which beauty subcategories (color cosmetics, skincare, haircare, wellness-adjacent) have the
    highest ratio of high-intent social messages to compliance burden?
  - >-
    What percentage of launch-spike comment volume can be auto-resolved safely before brand/legal
    teams insist on manual review?
  - >-
    How much of the ROI case depends on Instagram-specific workflows versus TikTok, Reddit, or
    creator-led surfaces where official data access may differ?
