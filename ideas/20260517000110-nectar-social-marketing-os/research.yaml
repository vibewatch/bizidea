competitors:
  - name: Nectar Social
    stage: scale-up
    wedge: >-
      Agentic social operating system spanning community, intelligence, creator workflows, and
      commerce conversations.
    pricing: Custom / enterprise quote not public.
    strength: >-
      Closest proof point for cross-platform social revenue operations, with official platform
      partnerships, large weekly conversation volume, and named beauty customers.
    weaknessVsUs: >-
      Broad horizontal scope may leave room for a narrower beauty-first product with deeper
      claims-safe launch workflows and tighter Shopify action loops.
    sourceRefs:
      - 1
      - 2
      - 3
      - 4
  - name: BrandBastion
    stage: scale-up
    wedge: Brand-specific AI moderation and engagement at social scale.
    pricing: Custom / not public.
    strength: Strong moderation, multilingual context handling, and brand-specific rule configuration.
    weaknessVsUs: >-
      Less evidence of end-to-end commerce attribution or action orchestration from product-intent
      conversations into merchant workflows.
    sourceRefs:
      - 19
      - 21
  - name: Sprinklr
    stage: incumbent
    wedge: Unified enterprise social, service, marketing, and CX platform.
    pricing: Custom / enterprise quote not public.
    strength: >-
      Deep governance, 30+ channel coverage, and broad workflow customizability for large
      enterprises.
    weaknessVsUs: >-
      Heavyweight horizontal suite that is harder to position as a beauty-specific revenue desk for
      mid-market launch spikes.
    sourceRefs:
      - 13
      - 14
  - name: Khoros
    stage: incumbent
    wedge: AI-native community plus social listening and publishing platform.
    pricing: Custom / enterprise quote not public.
    strength: >-
      Long conversation history, strong community DNA, and large-brand social intelligence
      positioning.
    weaknessVsUs: >-
      Less clearly centered on direct commerce capture from beauty comments and DMs than on
      community and knowledge orchestration.
    sourceRefs:
      - 15
  - name: Emplifi
    stage: scale-up
    wedge: Unified social marketing, social care, and social commerce suite.
    pricing: Social starts at $1,249/month, Advanced at $2,499/month; higher tiers custom.
    strength: >-
      Public pricing, combined social-care plus commerce modules, and benchmark data make it
      credible for mid-market buyers.
    weaknessVsUs: >-
      Suite breadth still outweighs a tight beauty launch-workflow wedge, and the commerce layer is
      broader than comment-to-conversion operations.
    sourceRefs:
      - 17
      - 18
