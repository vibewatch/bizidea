jobsToBeDone:
  - job: When a launch or creator post drives a flood of product questions, help our social commerce team answer the high-intent ones fast, so we can convert demand before shoppers bounce.
    currentAlternative: Manual triage in social inboxes and agency-managed replies
    successMetric: Reply time on purchase-intent conversations and attributed conversion rate from answered threads
  - job: When shoppers repeatedly ask about shades, routines, or restocks on social, help our brand team turn those signals into approved offers and merchandising actions, so we can capture revenue and improve inventory decisions.
    currentAlternative: Weekly spreadsheet reviews and disconnected listening dashboards
    successMetric: Waitlist capture rate, restock revenue recovered, and number of launch issues detected from conversation patterns
