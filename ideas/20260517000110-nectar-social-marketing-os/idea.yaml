topRisks:
  - name: API dependency
    description: Changes in social-platform access rules or partner terms could weaken workflow reliability or margin.
    mitigation: Diversify across multiple official platform integrations, store first-party workflow metadata, and design the core product around channel-agnostic orchestration rather than one network.
  - name: Incumbent expansion
    description: Nectar or legacy social-suite vendors could move downmarket into the same revenue-ops wedge.
    mitigation: Go deeper on beauty-specific product knowledge, launch workflows, and conversion analytics instead of competing as a broad horizontal inbox.
  - name: Brand-risk replies
    description: Bad recommendations or claims-sensitive responses could hurt trust, trigger returns, or create legal issues.
    mitigation: Start with tightly scoped answer libraries, human approval on risky intents, and policy rules that block unapproved claims or promotions.
