differentiator: >-
  This is not a generic social media management suite and not another broad AI
  marketing copilot. It is purpose-built for product-intent conversations in
  beauty, where catalog complexity, claims sensitivity, and creator-led demand
  spikes make response speed economically meaningful. The moat comes from
  combining brand-approved product knowledge, conversion outcomes, and workflow
  policies into a feedback loop that gets better with every launch, question
  pattern, and approved action.
