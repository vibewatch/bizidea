scenarios:
  downside:
    description: >-
      Slower pilot conversion, less second-workflow expansion, and more manual review keep the company in a
      services-heavy posture.
    y3RevenueK: 1080
    y3EbitdaK: -690
    cashLowPointK: -60
    keyAssumptionChanges:
      - Y3 blended ARPU falls to $72K
      - Q4Y3 paid workflows end at 20 instead of 25
      - Gross margin stalls at 65%
  base:
    description: >-
      Founder-led pilots convert on schedule, existing logos add second workflows, and margin reaches the 70% target by
      Y3.
    y3RevenueK: 1382.5
    y3EbitdaK: -479.11
    cashLowPointK: 471.5
    keyAssumptionChanges:
      - Y3 blended ARPU reaches $84K
      - Q4Y3 paid workflows reach 25
      - Gross margin improves to 70%
  upside:
    description: Partner referrals and creator-workflow expansion accelerate adoption without forcing a much larger team.
    y3RevenueK: 1765
    y3EbitdaK: -180
    cashLowPointK: 700
    keyAssumptionChanges:
      - Y3 blended ARPU reaches $90K
      - Q4Y3 paid workflows reach 30
      - Gross margin improves to 72%
sensitivity:
  - variable: ARPU
    downsideCase: $72K blended annual workflow ARPU
    baseCase: $84K blended annual workflow ARPU
    upsideCase: $96K blended annual workflow ARPU
    y3RevenueImpactK: -197.5
    cashImpactK: -138
  - variable: CAC
    downsideCase: $60K CAC
    baseCase: $47K CAC
    upsideCase: $38K CAC
    y3RevenueImpactK: 0
    cashImpactK: -286
  - variable: churn
    downsideCase: 3.0% monthly churn
    baseCase: 1.8% monthly churn
    upsideCase: 1.0% monthly churn
    y3RevenueImpactK: -140
    cashImpactK: -120
  - variable: sales cycle
    downsideCase: Pilot close slips by one quarter
    baseCase: Launch-triggered sales close inside one quarter
    upsideCase: Partner-sourced opportunities close in under two months
    y3RevenueImpactK: -250
    cashImpactK: -190
  - variable: gross margin
    downsideCase: 65%
    baseCase: 70%
    upsideCase: 73%
    y3RevenueImpactK: 0
    cashImpactK: -69
  - variable: hiring pace
    downsideCase: Hire second GTM and second implementation six months earlier
    baseCase: Hold hires until production proof points appear
    upsideCase: Delay one backfill by a quarter
    y3RevenueImpactK: -60
    cashImpactK: -150
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      LaunchTrigger[Launch or creator spike] --> Leads[Qualified pilot opportunities]
      Leads --> Workflows[Paid workflows]
      Workflows --> Revenue[Subscription + usage revenue]
      Revenue --> GrossProfit[Gross profit after onboarding and support COGS]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue is driven by 25 paid workflows by Q4Y3, with most of the lift coming from converting early
      beauty logos into second workflows rather than from a large SDR team.
  - checkName: Must go right
    finding: >-
      Pilot-to-annual conversion must stay at or above the 50%+ business-plan target so founder-led selling creates
      reference accounts before GTM headcount scales.
  - checkName: Model breaks if
    finding: >-
      If approval thresholds stay too strict and gross margin stalls near 65%, the downside case drives cash below zero
      before the next round is ready.
  - checkName: Next-round proof
    finding: >-
      The next financing case depends on exiting Y2 with 4-6 production logos, 10 paid workflows, partner-sourced
      pipeline, and margin improvement that shows software economics are emerging.
sanityChecks:
  ruleOf40: Y3 growth 298% + EBITDA margin -35% = 263%
  burnMultiple: Improves from about 2.8x in Y2 to about 0.5x in Y3 as expansion revenue absorbs fixed cost.
  revenuePerFte: >-
    $154K Y3 using Q4Y3 headcount of 9 FTE (below the $200-400K vertical SaaS benchmark, so more workflow expansion is
    still needed).
  flags:
    - >-
      The model depends on second-workflow expansion inside existing beauty accounts; pure new-logo sales alone would
      miss the Y3 revenue line.
    - >-
      Revenue per FTE is still below mature SaaS benchmarks in Y3 because implementation, policy tuning, and customer
      support remain labor-influenced.
    - >-
      Gross margin only reaches the 70% target in Y3; if manual review or bespoke onboarding stays elevated, another
      raise would be needed sooner.
