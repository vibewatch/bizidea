differentiator: 这不是通用社媒管理套件，也不是又一个宽泛的 AI 营销 copilot。它就是为美妆里的商品意图对话而生：商品目录复杂、宣称敏感、创作者带来的需求波动又大，所以回复速度本身就有经济价值。它的护城河来自把品牌已审批的商品知识、转化结果和工作流策略拼成一个反馈闭环；每一次发布、每一种问题模式、每一个获批动作，都会让系统更强。
