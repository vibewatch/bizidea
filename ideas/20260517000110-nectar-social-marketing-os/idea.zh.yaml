problem: 高增长美妆品牌如今会在 Instagram、TikTok、Reddit 等渠道收到成千上万条产品提问、创作者提及、补货请求和投诉串帖，但社媒、电商和 CX 团队依然各用各的工具。结果就是，那些购买意图最强的对话——比如色号匹配、护肤方案建议、套装诉求和创作者带来的流量峰值——要么没人回，要么只能靠社区经理和代理商手工处理，而他们又看不到商品目录、库存和转化上下文。随着社媒变成可以直接归因的收入渠道，这种割裂就会把漏回的消息变成漏掉的 GMV、被浪费的创作者投放和迟钝的商品反馈闭环。
targetUser:
  primary: 美国彩妆或护肤品牌中，负责 Shopify Plus DTC 业务的电商副总裁或社媒电商负责人
  secondary: 同一品牌内负责社区运营或客户体验运营的总监
  buyer: 品牌的 DTC 总经理或首席数字官
startupThesis:
  nonObviousInsight: 下一层真正值钱的社媒软件，不会是又一个发布台或监听面板，而是能把高意图商品对话转成经审批的电商动作、同时又把功效宣称、促销和品牌口径控制权留在人手里的工作流引擎。
  beachhead: 年 DTC 收入在 $50 million 到 $300 million 的美国美妆品牌；它们每周要处理 10,000+ 条和色号、护肤流程、缺货、创作者推荐相关的 Instagram 与 TikTok 评论和私信。
  wedge: 一个带审批治理的社媒收入工作台：回答高购买意图问题、收集候补名单、触发试用寄样或创作者种草，并且只把高风险回复交给人工。
  whyNowCatalyst: Nectar 的融资、官方平台合作、agent 发布和收入归因数据说明，基础设施和买方紧迫性都已到位，市场开始需要把社媒回复当成转化工作流，而不是营销边角料的软件。
  ventureScalePath: 先从美妆切入，再把同一套收入工作台扩到服饰尺码、营养补充剂、消费电子等高决策门槛品类——这些行业里，社媒对话都会直接影响购买决策和留存。
solution: 做一层给美妆品牌用的垂直运营系统，接入社媒收件箱、Shopify 商品目录、CRM 记录、已审批的宣称话术和库存数据流。产品识别高购买意图对话——比如色号匹配、护肤方案、缺货抱怨和创作者帖子互动——再生成合规回复、个性化商品组合、候补名单收集或试用寄样方案，并明确哪些场景必须人工审批。它还会把反复出现的对话模式转成商品和生命周期动作，为色号缺口、补货需求和创作者跟进自动开单。它不是替代社媒团队，而是做成一个收入工作台，让小型品牌运营团队也能按平台节奏响应，同时守住合规敏感的宣称和语气。
goToMarketSeed:
  firstCustomer: 一家使用 Shopify Plus 的美妆品牌，有专门的社媒团队、活跃的创作者项目，并且每周都会积压大量和新品发布或补货相关的高购买意图评论与私信。
  buyingTrigger: 新品发布、创作者爆红提及或付费社媒投放，都会让涌入的问题快到社媒团队来不及回复，而管理层又在逼着社媒交出可归因收入。
  currentAlternative: 在 Sprinklr、Khoros 或平台原生收件箱里做手工社区运营，再配合代理商和临时表格。
  switchingReason: 这个切口能把现有评论和私信量直接转成可量化的购物车与线索，同时保住审批控制权；通用社媒套件和代理商默认做不到。
  pricingHypothesis: 平台订阅加 usage 收费，按管理的高购买意图对话量或归因收入计费；单个品牌团队起步价是一份年合同，金额在五位数美元中段。
