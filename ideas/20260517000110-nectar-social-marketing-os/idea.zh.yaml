topRisks:
- name: API 依赖
  description: 社媒平台接入规则或合作条款一旦变化，工作流稳定性和利润率都可能受伤。
  mitigation: 在多个官方平台集成之间分散风险，沉淀一方工作流元数据，并把核心产品做成渠道无关的编排层，而不是押注单一网络。
- name: 现有厂商下沉
  description: Nectar 或传统社媒套件厂商可能往下走，切进同一条 revenue-ops 切口。
  mitigation: 别去跟它们拼宽度，而是把美妆商品知识、发布工作流和转化分析做得更深。
- name: 品牌风险回复
  description: 一旦推荐失准，或在宣称敏感问题上回错，品牌信任、退货率和法律风险都会被放大。
  mitigation: 先从边界清楚的答案库起步，对高风险意图强制人工审批，并用策略规则拦住未审批的宣称和促销。
