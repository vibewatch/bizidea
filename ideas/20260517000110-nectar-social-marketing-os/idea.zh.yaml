jobsToBeDone:
- job: 当新品发布或创作者帖子带来一波商品提问时，帮社媒电商团队先把高购买意图的问题快速接住，这样消费者还没流失前，我们就能把需求转成订单。
  currentAlternative: 在社媒收件箱里手工分拣，再交给代理商代回复。
  successMetric: 高购买意图对话的回复时效，以及已回复串帖带来的可归因转化率。
- job: 当用户反复在社媒上追问色号、护肤流程或补货时，帮品牌团队把这些信号转成经审批的优惠和商品动作，这样既能多收收入，也能把库存决策做准。
  currentAlternative: 每周拉表复盘，再看彼此割裂的监听面板。
  successMetric: 候补名单收集率、补货找回的收入，以及从对话模式中发现的发布问题数量。
