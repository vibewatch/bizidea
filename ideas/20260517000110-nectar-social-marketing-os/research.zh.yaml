competitors:
- name: Nectar Social
  stage: scale-up
  wedge: 跨社区、情报、创作者工作流和电商对话的 agentic 社媒操作系统。
  pricing: 定制 / 企业级报价，未公开。
  strength: 它是跨平台社媒收入运营最接近真实成立的验证点，既有官方平台合作，也有高周对话量和具名美妆客户。
  weaknessVsUs: 横向范围太宽，反而给更聚焦美妆、宣称更安全、Shopify 动作闭环更紧的产品留下了空间。
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: BrandBastion
  stage: scale-up
  wedge: 面向社媒规模化场景的品牌专属 AI 审核与互动。
  pricing: 定制 / 未公开。
  strength: 审核能力强，支持多语言上下文处理，也能按品牌定制规则。
  weaknessVsUs: 缺少把商品意图对话一路打到商家工作流、并做端到端电商归因的证据。
  sourceRefs:
  - 19
  - 21
- name: Sprinklr
  stage: incumbent
  wedge: 统一的企业级社媒、客服、营销与 CX 平台。
  pricing: 定制 / 企业级报价，未公开。
  strength: 治理能力深、覆盖 30+ 渠道，而且对大型企业来说工作流可定制性强。
  weaknessVsUs: 这是个重型横向套件，很难被讲成中端品牌在发布高峰期需要的“美妆收入工作台”。
  sourceRefs:
  - 13
  - 14
- name: Khoros
  stage: incumbent
  wedge: AI-native 社区平台，叠加社媒监听与发布能力。
  pricing: 定制 / 企业级报价，未公开。
  strength: 对话历史长、社区基因强，在大品牌社媒情报场景里位置稳。
  weaknessVsUs: 它更像社区与知识编排平台，而不是直接围绕美妆评论和私信承接成交。
  sourceRefs:
  - 15
- name: Emplifi
  stage: scale-up
  wedge: 把社媒营销、社媒客服和社媒电商揉在一起的统一套件。
  pricing: 社媒模块起价 $1,249/month，Advanced 为 $2,499/month；更高层级需定制。
  strength: 有公开价格、社媒客服与电商模块组合，以及一套中端买方能理解的基准数据。
  weaknessVsUs: 它的套件面仍大于紧凑的美妆发布工作流切口，电商层也比“评论到转化”运营更宽。
  sourceRefs:
  - 17
  - 18
regulatoryTechnicalConstraints:
- point: 只要存在利益关系，影响者与代言披露就必须清晰显眼，这会限制无人监管的创作者侧自动化。
  sourceRefs:
  - 26
  - 27
- point: 评价征集与口碑管理流程不能操纵或选择性压制真实差评，因此自动升级与审核逻辑都要受约束。
  sourceRefs:
  - 28
- point: 护肤和泛健康相关功效宣称必须有充分且可靠的科学证据，因此答案库必须被严格策略控制。
  sourceRefs:
  - 29
- point: Instagram 自动化依赖特定权限、应用审核以及评论转私信的时效限制，因此部分工作流会长期受渠道约束。
  sourceRefs:
  - 30
  - 32
validationSignals:
- point: Nectar 称其每周处理 10M+ 条对话、已把 $100M 收入归因回社媒，并签下了多笔六位数企业合同。
  sourceRefs:
  - 4
- point: e.l.f. Beauty 表示，Nectar 把回复率提升了 60%，并把社媒对话和收入清楚连了起来，说明买方 ROI 是可以量出来的。
  sourceRefs:
  - 4
- point: NIQ 表示，超过半数消费者会通过社交平台购买，而 TikTok Shop 已是美国头部美妆零售渠道之一，说明这个渠道早已不只是试验。
  sourceRefs:
  - 5
  - 6
  - 7
- point: Emplifi 和 Gorgias 的公开定价说明，品牌今天已经在为社媒客服、自动化和电商相邻软件付费。
  sourceRefs:
  - 17
  - 23
openQuestions:
- 在美国、DTC 收入 $50M-$300M 的美妆品牌里，到底有多少家会把收入工作台当成一笔新预算，而不是把它看成对 Gorgias、Sprinklr 或 Nectar 的功能诉求？
- 彩妆、护肤、护发和泛健康等美妆子品类里，哪一类“高购买意图社媒消息 / 合规负担”的比值最高？
- 在品牌和法务坚持人工复核前，发布高峰期的评论量里，到底有多大比例能被安全自动解决？
- 这个 ROI 逻辑有多大程度依赖 Instagram 专属工作流，而不是 TikTok、Reddit 或创作者带动的其他触点？
