    affectedBuyer: 社媒/社区负责人
    mitigation: 先从“起草 + 审批”工作流开始，透明展示置信阈值，并按意图收窄自动驾驶模式。
    sourceRefs:
    - 2
    - 19
    - 21
  - friction: 渠道与数据接入质量决定了价值交付速度
    severity: 中
    affectedBuyer: 运营 / CX 系统负责人
    mitigation: 先把 Instagram + Shopify 做透，等窄工作流证明 ROI 后，再补相邻系统。
    sourceRefs:
    - 11
    - 24
    - 25
    - 30
    - 32
