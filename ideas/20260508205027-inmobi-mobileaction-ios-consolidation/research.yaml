  adoptionFrictionMatrix:
  - friction: Apple privacy and data-use review
    severity: high
    affectedBuyer: Growth leader with security or legal stakeholders
    mitigation: Start read-only, document every connector, and keep clear evidence trails for what data is imported and how it is used.
    sourceRefs:
    - 10
    - 11
    - 12
  - friction: Incrementality distrust between paid and organic changes
    severity: high
    affectedBuyer: VP Growth and finance partner
    mitigation: Anchor early product value on controlled experiment windows, decision logs, and simple before-and-after payback reporting.
    sourceRefs:
    - 22
    - 26
    - 31
  - friction: Cross-functional ownership ambiguity
    severity: medium
    affectedBuyer: Head of Growth sponsoring a mixed team of UA, ASO, and product operators
    mitigation: Make weekly queues owner-specific and tie each experiment to an accountable metric and due date.
    sourceRefs:
    - 14
    - 20
    - 29
  - friction: Localization and creative production bottlenecks
    severity: high
    affectedBuyer: UA or ASO lead managing multiple storefronts
    mitigation: Start with the few highest-spend markets and use CPP or PPO templates instead of full-country bespoke workflows.
    sourceRefs:
    - 6
    - 8
    - 23
  - friction: Agency inertia
    severity: medium
    affectedBuyer: Mid-market app publisher with incumbent agency support
    mitigation: Position as the neutral planning and governance layer that agencies can execute against before replacing them outright.
    sourceRefs:
    - 18
    - 20
    - 30
