topRisks:
  - name: Platform dependency
    description: Apple can change APIs, ad surfaces, or App Store experimentation rules in ways that weaken the product's workflow.
    mitigation: Start with systems of record and decision workflows that remain valuable even if one data feed degrades, and diversify into adjacent monetization and analytics inputs early.
  - name: Incumbent bundling
    description: InMobi, Apple Ads partners, or other growth suites could package basic planning and experimentation features into existing products.
    mitigation: Focus on neutrality, incrementality accounting, and cross-functional workflow ownership rather than commodity reporting or bid automation.
  - name: Attribution skepticism
    description: Customers may not trust the product if it cannot separate true lift from noisy channel movement across small experiment windows.
    mitigation: Launch with conservative measurement claims, standardized test design, and finance-friendly reporting tied to payback and repeatable experiment templates.
