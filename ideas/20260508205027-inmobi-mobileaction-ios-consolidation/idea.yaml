jobsToBeDone:
  - job: When CAC rises before a product launch or geo expansion, help growth leaders decide which Apple Ads and App Store changes to run first, so they can recover efficient iOS growth without adding headcount.
    currentAlternative: Agency recommendations, spreadsheet planning, and ad-hoc ASO tests
    successMetric: Lower blended CAC or faster payback within one experiment cycle
  - job: When finance asks why iOS acquisition efficiency changed, help UA teams tie keyword, creative, and store-listing changes to downstream revenue, so they can defend or reallocate spend confidently.
    currentAlternative: Channel dashboards stitched together manually in slides and spreadsheets
    successMetric: Time to produce an explainable growth review and the share of spend tied to measured experiments
