problem: >-
  Growth teams at consumer subscription apps still run Apple Ads bidding, App Store Optimization, creative analysis, and launch planning as separate
  workflows across point tools, spreadsheets, and agency decks. As iOS growth tooling consolidates inside larger ad platforms, mid-market publishers risk
  getting a black-box bundle when what they actually need is a neutral system that tells them which keyword, creative, and store-listing changes will move
  installs efficiently. Without that operating layer, teams overspend on branded terms, miss fast feedback loops between ads and store conversion, and struggle
  to explain CAC swings to finance and product leadership.
targetUser:
  primary: Heads of Growth at Series A-C consumer subscription apps spending heavily on Apple Search Ads with lean in-house UA teams
  secondary: UA managers and ASO leads at mobile app publishers expanding across multiple iOS markets
  buyer: VP Growth or Head of Performance Marketing at a consumer app publisher
startupThesis:
  nonObviousInsight: The opportunity is not another optimization point tool; it is a neutral decision layer for app publishers as Apple Ads and ASO intelligence
    gets absorbed into larger ad networks. Once the market's best iOS growth data becomes strategically controlled by full-stack platforms, mid-market apps will
    pay for transparent experiment prioritization and spend governance that is not tied to media-selling incentives.
  beachhead: Consumer subscription apps in gaming-adjacent, wellness, language learning, and utility categories spending $50k-$300k per month on Apple Search Ads across 3-10 countries
  wedge: A weekly iOS growth control plane that ingests Apple Ads, ASO metadata, creative libraries, and paywall conversion data, then turns them into ranked experiment queues with budget guardrails and accountable owners
  whyNowCatalyst: InMobi buying MobileAction shows Apple Ads and ASO intelligence is becoming part of larger ad-platform bundles, creating urgency for independent app publishers to adopt a neutral operating layer before their workflow gets locked into black-box suites.
  ventureScalePath: Start as the control system for Apple Ads and ASO decisioning in mid-market apps, then expand into broader mobile growth orchestration across creative production, geo launches, retention experiments, agency management, and benchmark data products for publishers and investors.
solution: >-
  Build a neutral iOS growth operating system for subscription app publishers. The product connects Apple Search Ads accounts, App Store listing metadata,
  creative histories, paywall analytics, and basic revenue outcomes, then generates a ranked queue of actions each week: keyword expansion, negative keyword
  cuts, custom product page tests, title or subtitle refreshes, and creative swaps tied to specific geographies. Instead of merely recommending optimizations,
  it assigns owners, enforces experiment windows, and shows whether lift came from incremental demand or from cannibalizing branded installs. Teams get one
  place to see the connection between search-query intent, creative positioning, store conversion, and downstream subscription payback. Over time the company
  builds a cross-app benchmark graph for which keyword themes and creative motifs work by app category and market.
goToMarketSeed:
  firstCustomer: Series A-C subscription app publishers with 5-20 person growth teams, $100k+ monthly Apple Search Ads spend, and expansion into at least three English-speaking or GCC markets
  buyingTrigger: A major launch or geo expansion that forces the team to rebalance Apple Ads spend and App Store messaging without hiring another agency or analyst
  currentAlternative: Agency-managed Apple Ads, standalone ASO tools, spreadsheet planning, and manual experiment reviews across growth, product, and finance
  switchingReason: The product gives a neutral, governed workflow that links spend decisions to store-conversion changes and payback, which bundled ad-platform tools and agencies rarely show transparently
  pricingHypothesis: Annual SaaS contract priced by number of app properties and monthly Apple Ads spend under management, with premium benchmarking modules for larger publishers
