  upsideCase: 第 3 年的支持岗后移，等基准附加率跑出来再招
  y3RevenueImpactK: -40.0
  cashImpactK: -160.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  OutboundAndPartners[外呼与伙伴渠道] --> Pilots[试点]\n  Pilots --> AnnualCustomers[年付客户]\n  AnnualCustomers --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> OperatingCash[经营现金]\n  AnnualCustomers --> BenchmarkUpsell[基准 upsell]\n  BenchmarkUpsell --> Revenue\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入来自客户数从第 1 年末 6 个，爬到第 3 年末 55 个，配上温和的 $29K 混合 ACV，而不是激进的大客户定价。
- checkName: 必须跑对的事
  finding: 模型成立的前提是 4-8 周试点打法和伙伴转介绍能撑住新增客户节奏，否则在 Q4Y2 前就不能维持精益销售团队。
- checkName: 模型会失效如果
  finding: 如果销售周期拉长、混合 ACV 又掉向 $26K，下行情景会在第 3 年结束前把现金低点打到约 -$193K。
- checkName: 下一轮融资证明点
  finding: 如果公司在 Q4Y2 前把期末 ARR 做到约 $725K、拿下 10+ 个可做基准的账户并验证伙伴渠道，下一轮融资就更讲得通。
sanityChecks:
  ruleOf40: 第 3 年增长率 169.9% + EBITDA 利润率 -38.0% = 131.9%。
  burnMultiple: 第 2 年 burn multiple 约 1.3x，基于净新增 ARR；到第 3 年约改善到 0.5x，因为收入增长快于招聘。
  revenuePerFte: 第 3 年按 7 个期末 FTE 计算，人均收入约 $162.6K（成熟 SaaS 基准为 $200-400K）。
  flags:
  - 基础情景在第 3 年末做到 55 个客户，而 research 里的 SOM 约对应 60 个客户，因此在首发地域内几乎已经吃满，后续必须依赖 Android 或相邻扩张。
  - 第 3 年 EBITDA 仍为负，因此公司下一轮融资故事仍要靠基准附加率、伙伴效率和扩张收入，而不是短期盈利。
  - 人均收入仍低于成熟 SaaS 的 $200K-$400K 基准，说明商业计划假设的是高触达 onboarding 和每周陪跑工作流。
  - 模型默认 seed 轮在起点已经到账，因为当前 schema 没有单独的融资流水字段，只能并入经营现金滚动。
