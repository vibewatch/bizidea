slug: ios-growth-control-plane
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 种子轮到账后的期初现金
  value: '2000'
  unit: $K
  source: '[BP fundingAsk.targetFundingRangeUsd $2M-$4M]；基准情景按区间下沿，假设模型起始时已完成 $2.0M 种子轮交割。'
- id: A2
  name: 综合年 ARPU
  value: '29'
  unit: $K per customer per year
  source: '[BP gtm.pricing entry tier $18K-$24K ACV, growth tier $36K-$60K, premium benchmark module $6K-$12K; Research market bottom-up uses ~$24K ACV]；基准情景假设有温和 upsell，因此高于 research 中的 ACV。'
- id: A3
  name: 收入确认节奏
  value: 1/12 of annual contract per active month
  unit: policy
  source: '[SaaS 财务常识：年度合同按服务期逐月确认收入。]'
- id: A4
  name: 目标毛利率
  value: '72'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct].'
- id: A5
  name: 第 1 年期末客户数
  value: '6'
  unit: customers
  source: '[BP milestones 0-12 months: close 5-8 total paying customers and $90K-$160K ARR by month 12]；基准情景按 6 家客户、约 $174K 期末 ARR。'
- id: A6
  name: 第 2 年期末客户数
  value: '25'
  unit: customers
  source: '[BP milestones 12-24 months: reach 20-30 paying customers]；基准情景取中位附近，并叠加适度 benchmark/module upsell，支撑约 $725K 期末 ARR。'
- id: A7
  name: 第 3 年期末客户数
  value: '55'
  unit: customers
  source: '[BP milestones 24-36 months: reach 50-70 paying customers]；基准情景略低于 research 中约 60 家客户的 SOM 框架。'
- id: A8
  name: 月度 logo churn
  value: '1.4'
  unit: percent
  source: '[早期垂直工作流 SaaS 财务经验值：周度使用频繁，但 PMF 仍在形成中。]'
- id: A9
  name: 单个新客户 CAC
  value: '16'
  unit: $K
  source: '[BP gtm 中的创始人主导外呼、代理商/顾问伙伴，以及 30 天试点动作]；按中型市场、4-8 周销售周期的早期 SaaS 精益 CAC 假设建模。'
- id: A10
  name: 平均销售周期
  value: '1.5'
  unit: months
  source: '[BP market.buyingProcess says 4-8 weeks with a 30-day pilot]；基准情景取中位数。'
- id: A11
  name: 招聘计划
  value: CEO and founding engineer in M1; customer success/growth analyst in M4; second engineer in M8; first sales hire in M13; third engineer in M21; second customer success hire in M31
  unit: plan
  source: '[BP team startTiming plus lean startup-finance extension]；后续岗位延后到客户和 benchmark 里程碑足以支撑时再补。'
- id: A12
  name: 现金薪资带宽
  value: Founder $120K; engineers $150K-$165K; customer success $108K-$114K; first sales hire $120K
  unit: annual salary
  source: '[美国种子阶段软件创业公司常见区间]；福利和非薪资开支在 opex 里单独建模。'
- id: A13
  name: 非薪资 opex 爬坡
  value: R&D tools/cloud $4K-$8K monthly; S&M programs $3K-$14K monthly; G&A/legal/compliance $5K-$7K monthly
  unit: $K per month
  source: '[BP operations 中的只读集成、隐私/合规工作、CRM 与客户导入流程]；并叠加早期 SaaS 常见运营开销假设。'
- id: A14
  name: 现金流简化假设
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[种子阶段简化：不单独建模债务、capex、税和营运资金时点，因此 EBITDA 近似运营现金变动。]'
- id: A15
  name: 目标 runway
  value: '24'
  unit: months
  source: '[BP fundingAsk.runwayMonths 18] 加上财务模型指引要求的 6 个月缓冲。'
