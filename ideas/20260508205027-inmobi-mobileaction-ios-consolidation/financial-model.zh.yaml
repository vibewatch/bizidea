scenarios:
  downside:
    description: 试点转化偏慢、混合定价停留在入门档附近，公司到第 3 年末仍明显低于 research 里的 SOM。
    y3RevenueK: 655.41
    y3EbitdaK: -780.06
    cashLowPointK: -192.74
    keyAssumptionChanges:
    - 由于基准 upsell 采纳弱，混合 ACV 降到 $26K。
    - 客户爬坡放缓，到 Q4Y2 只有 15 个客户，Q4Y3 只有 36 个。
    - 核心招聘基本没收缩，因此经营杠杆来得太晚。
  base:
    description: 创始人销售加 1 条伙伴渠道稳定转化，基准模块适度抬升混合 ACV，团队规模始终保持克制。
    y3RevenueK: 1138.24
    y3EbitdaK: -432.42
    cashLowPointK: 295.15
    keyAssumptionChanges:
    - 混合 ACV 稳在 $29K，带一点基准 / 模块附加率。
    - 客户数从第 1 年末 6 个，爬到第 2 年末 25 个、第 3 年末 55 个。
    - 毛利率守住 72% 目标，而团队到第 3 年末只有 7 FTE。
  upside:
    description: 伙伴渠道变成可复制的试点来源，基准数据明显带动 upsell，同样精益的团队能承接更大体量。
    y3RevenueK: 1568.04
    y3EbitdaK: -123.0
    cashLowPointK: 740.26
    keyAssumptionChanges:
    - 随着更多账户购买基准和多应用套餐，混合 ACV 升到 $32K。
    - 客户爬坡在 Q4Y2 达到 31 个、Q4Y3 达到 67 个。
    - 在真正验证前不额外扩销售团队，因此新增收入能更高效地下落到利润。
