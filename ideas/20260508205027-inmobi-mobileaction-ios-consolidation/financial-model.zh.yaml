slug: ios-growth-control-plane
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 种子轮到账后的起始现金
  value: '2000'
  unit: $K
  source: '[BP fundingAsk.targetFundingRangeUsd $2M-$4M]；基础情景按模型起始时完成一笔 $2.0M seed 交割，对齐区间下限。'
- id: A2
  name: 混合年化 ARPU
  value: '29'
  unit: $K per customer per year
  source: '[BP gtm.pricing 中的 entry tier $18K-$24K ACV、growth tier $36K-$60K，以及 premium benchmark module $6K-$12K；Research 的自下而上测算约为 $24K ACV]；基础情景采用略高于研究 ACV 的温和 upsell 混合值。'
- id: A3
  name: 收入确认节奏
  value: 按活跃月份每月确认年度合同的 1/12
  unit: policy
  source: '[创业财务经验值：annual SaaS 合同按服务期线性确认收入]。'
- id: A4
  name: 毛利率目标
  value: '72'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]。'
- id: A5
  name: 第 1 年末客户数
  value: '6'
  unit: customers
  source: '[BP milestones 0-12 months：到第 12 个月拿下 5-8 个付费客户、ARR 达到 $90K-$160K]；基础情景按 6 个客户、约 $174K ARR 收尾。'
- id: A6
  name: 第 2 年末客户数
  value: '25'
  unit: customers
  source: '[BP milestones 12-24 months：付费客户达到 20-30 个]；基础情景落在中位附近，并用温和的基准 / 模块 upsell 支撑约 $725K 的期末 ARR。'
- id: A7
  name: 第 3 年末客户数
  value: '55'
  unit: customers
  source: '[BP milestones 24-36 months：付费客户达到 50-70 个]；基础情景略低于 research 里约 60 个客户的 SOM 描述。'
- id: A8
  name: 月度 logo churn
  value: '1.4'
  unit: percent
  source: '[面向早期垂直工作流 SaaS 的创业财务经验值：产品每周都会用，但 PMF 仍在形成]。'
- id: A9
  name: 单个新客户 CAC
  value: '16'
  unit: $K
  source: '[BP gtm 里的创始人主导外呼、代理商 / 顾问伙伴和 30 天试点打法]；模型按精益早期 SaaS、4-8 周中端销售周期的 CAC 经验值处理。'
- id: A10
  name: 平均销售周期
  value: '1.5'
  unit: months
  source: '[BP market.buyingProcess 写的是 4-8 周并带 30 天试点]；基础情景按中位值处理。'
- id: A11
  name: 招聘计划
  value: M1 配 CEO 和创始工程师；M4 配客户成功 / 增长分析师；M8 配第二名工程师；M13 配首位销售；M21 配第三名工程师；M31 配第二位客户成功
  unit: plan
  source: '[BP team startTiming] 加精益创业财务延展；后续招聘都延后到客户和基准里程碑足够支撑之后。'
- id: A12
  name: 现金薪资带
  value: 创始人 $120K；工程师 $150K-$165K；客户成功 $108K-$114K；首位销售 $120K
  unit: annual salary
  source: '[美国 seed 阶段软件创业公司的创业财务经验值]；非薪酬项目和福利成本在 opex 中单列。'
- id: A13
  name: 非薪酬经营支出爬坡
  value: R&D 工具 / 云服务每月 $4K-$8K；S&M 项目每月 $3K-$14K；G&A / 法务 / 合规每月 $5K-$7K
  unit: $K per month
  source: '[BP operations 中的只读集成、隐私 / 合规工作、CRM 与 onboarding playbook]；并加入早期 SaaS 经营开销的创业财务经验值。'
- id: A14
  name: 现金流简化
  value: EBITDA 近似代表经营现金变动
  unit: policy
  source: '[创业财务经验值：seed 阶段通常不单独建债务、capex、税务或营运资金时点模型]。'
- id: A15
  name: 资金跑道目标
  value: '24'
  unit: months
  source: '[BP fundingAsk.runwayMonths 18] 再加财务模型说明要求的 6 个月缓冲。'
