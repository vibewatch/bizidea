modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      OutboundAndPartners --> Pilots
      Pilots --> AnnualCustomers
      AnnualCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingCash
      AnnualCustomers --> BenchmarkUpsell
      BenchmarkUpsell --> Revenue
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入主要来自客户数爬坡——Y1 期末 6 家、Y3 期末 55 家，综合 ACV 为温和的 $29K，而不是建立在激进的大客户定价之上。
- checkName: 必须顺利发生的事
  finding: 模型要求 4-8 周 pilot 动作和合作渠道推荐真正跑顺，否则在 Q4Y2 前不扩大量销售团队的前提下，客户增速跟不上。
- checkName: 模型会在哪种情况下失效
  finding: 如果销售周期拉长，同时综合 ACV 掉到 $26K 左右，下行情景会在 Y3 结束前把现金打到约 -$193K。
- checkName: 下一轮融资证明点
  finding: 只有当公司在 Q4Y2 打到约 $725K 期末 ARR、拥有 10+ 个 benchmark-ready 账户，并跑通一条合作渠道时，下一轮融资故事才够扎实。
sanityChecks:
  ruleOf40: Y3 growth 169.9% + EBITDA margin -38.0% = 131.9%.
  burnMultiple: Y2 burn multiple is about 1.3x on net new ARR and improves to about 0.5x in Y3 as headcount grows slower than revenue.
  revenuePerFte: $162.6K Y3 using 7 exit FTE (benchmark $200-400K SaaS).
  flags:
  - 基准情景下，Y3 期末客户数达到 55 家，而 research 中的 SOM 框架约为 60 家；这意味着在初始地理市场里，Android 或相邻扩张很快就会变得重要，留给 iOS-only 的余量不大。
  - Y3 仍然 EBITDA 为负，因此公司下一轮融资不能只讲增长，还必须讲清 benchmark attach、合作效率和扩张收入，而不是近期盈利。
  - Revenue per FTE 仍低于成熟 SaaS 常见的 $200K-$400K 区间，反映出商业计划默认了高触达客户导入和高频每周工作流。
  - 由于 schema 没有单独的融资流水字段，模型默认种子轮在起始时已经到账，并直接进入现金滚动表。
