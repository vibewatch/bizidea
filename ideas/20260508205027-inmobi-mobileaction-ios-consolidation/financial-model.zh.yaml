scenarios:
  downside:
    description: pilot 转化偏慢、综合定价停留在入门档附近，公司到 Y3 结束时明显低于 research 中对 SOM 的预期。
    y3RevenueK: 655.41
    y3EbitdaK: -780.06
    cashLowPointK: -192.74
    keyAssumptionChanges:
    - 综合 ACV 降到 $26K，因为 benchmark upsell 采纳偏弱。
    - 客户爬坡放缓，到 Q4Y2 只有 15 家客户，到 Q4Y3 只有 36 家。
    - 核心招聘基本照旧，导致经营杠杆释放得太晚。
  base:
    description: 创始人主导销售叠加 1 条合作渠道，转化节奏稳定；benchmark 加购带来适度 ACV 提升；招聘保持克制。
    y3RevenueK: 1138.24
    y3EbitdaK: -432.42
    cashLowPointK: 295.15
    keyAssumptionChanges:
    - 综合 ACV 稳定在 $29K，benchmark/module 有温和 attach。
    - 客户数从 Y1 期末 6 家增长到 Y2 期末 25 家、Y3 期末 55 家。
    - 毛利率维持在 72% 目标，Y3 末团队规模控制在 7 FTE。
  upside:
    description: 合作伙伴成为稳定 pilot 来源，benchmark 数据形成明显 upsell，同样精简的团队能承接更多收入。
    y3RevenueK: 1568.04
    y3EbitdaK: -123.0
    cashLowPointK: 740.26
    keyAssumptionChanges:
    - 综合 ACV 升到 $32K，因为更多账户购买 benchmark 与多 app 打包。
    - 客户增长提速，到 Q4Y2 达 31 家，到 Q4Y3 达 67 家。
    - 在验证前不提前扩销售编制，因此新增收入更有效地下沉到利润端。
