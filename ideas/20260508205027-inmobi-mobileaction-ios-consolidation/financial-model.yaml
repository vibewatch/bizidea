scenarios:
  downside:
    description: Pilot conversion lags, blended pricing stays near entry tier, and
      the company exits Y3 well short of the research SOM.
    y3RevenueK: 655.41
    y3EbitdaK: -780.06
    cashLowPointK: -192.74
    keyAssumptionChanges:
    - Blended ACV falls to $26K because benchmark upsell adoption is weak.
    - Customer ramp slows to 15 customers by Q4Y2 and 36 by Q4Y3.
    - Core hiring stays largely intact, so operating leverage arrives too late.
  base:
    description: Founder-led sales plus one partner channel convert steadily, benchmark
      add-ons lift blended ACV modestly, and hiring remains intentionally lean.
    y3RevenueK: 1138.24
    y3EbitdaK: -432.42
    cashLowPointK: 295.15
    keyAssumptionChanges:
    - Blended ACV holds at $29K with modest benchmark/module attach.
    - Customer count rises from 6 at Y1 exit to 25 at Y2 exit and 55 at Y3 exit.
    - Gross margin stays at the 72% target while the team exits Y3 at 7 FTE.
  upside:
    description: Partners become a repeatable source of pilots, benchmark data converts
      into a clear upsell, and the same lean team carries more volume.
    y3RevenueK: 1568.04
    y3EbitdaK: -123.0
    cashLowPointK: 740.26
    keyAssumptionChanges:
    - Blended ACV rises to $32K as more accounts buy benchmark and multi-property
      packages.
    - Customer ramp reaches 31 customers by Q4Y2 and 67 by Q4Y3.
    - No extra sales headcount is added ahead of proof, so incremental revenue drops
      through efficiently.
