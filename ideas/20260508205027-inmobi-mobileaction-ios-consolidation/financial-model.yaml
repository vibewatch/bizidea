modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      OutboundAndPartners --> Pilots
      Pilots --> AnnualCustomers
      AnnualCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingCash
      AnnualCustomers --> BenchmarkUpsell
      BenchmarkUpsell --> Revenue
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by a logo ramp from 6 customers at Y1 exit
    to 55 at Y3 exit on a modest $29K blended ACV, not by aggressive enterprise pricing.
- checkName: Must go right
  finding: The model needs the 4-8 week pilot motion and partner referrals to keep
    customer adds on pace without hiring a large sales team before Q4Y2.
- checkName: Model breaks if
  finding: If sales cycles stretch and blended ACV falls toward $26K, the downside
    case bottoms around -$193K cash before Y3 ends.
- checkName: Next-round proof
  finding: The next financing is justified if the company reaches roughly $725K exit
    ARR by Q4Y2 with 10+ benchmark-ready accounts and a proven partner channel.
sanityChecks:
  ruleOf40: Y3 growth 169.9% + EBITDA margin -38.0% = 131.9%.
  burnMultiple: Y2 burn multiple is about 1.3x on net new ARR and improves to about
    0.5x in Y3 as headcount grows slower than revenue.
  revenuePerFte: $162.6K Y3 using 7 exit FTE (benchmark $200-400K SaaS).
  flags:
  - Base case reaches 55 customers by Y3 exit against a research SOM framed around
    roughly 60 customers, so the model leaves limited headroom in the initial geography
    before Android or adjacent expansion matters.
  - Y3 remains EBITDA-negative, so the company still needs a credible next-round story
    around benchmark attach, partner efficiency, and expansion revenue rather than
    near-term profitability.
  - Revenue per FTE stays below the $200K-$400K benchmark for mature SaaS, reflecting
    the intentionally high-touch onboarding and weekly workflow the business plan
    assumes.
  - The model starts with the seed round already closed because the schema has no
    explicit financing line separate from the operating cash roll-forward.
