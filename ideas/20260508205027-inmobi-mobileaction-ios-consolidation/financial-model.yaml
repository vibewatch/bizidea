assumptions:
- id: A1
  name: Starting cash after seed close
  value: '2000'
  unit: $K
  source: '[BP fundingAsk.targetFundingRangeUsd $2M-$4M]; base case uses a $2.0M seed
    close at model start to match the low end of the stated range.'
- id: A2
  name: Blended annual ARPU
  value: '29'
  unit: $K per customer per year
  source: '[BP gtm.pricing entry tier $18K-$24K ACV, growth tier $36K-$60K, premium
    benchmark module $6K-$12K; Research market bottom-up uses ~$24K ACV]; base case
    uses a modest upsell blend above the research ACV.'
- id: A3
  name: Revenue recognition cadence
  value: 1/12 of annual contract per active month
  unit: policy
  source: '[Startup-finance heuristic: annual SaaS contracts are recognized ratably
    over the active service period].'
- id: A4
  name: Gross margin target
  value: '72'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct].'
- id: A5
  name: Year-1 customer exit
  value: '6'
  unit: customers
  source: '[BP milestones 0-12 months: close 5-8 total paying customers and $90K-$160K
    ARR by month 12]; base case exits with 6 customers and ~$174K ARR.'
- id: A6
  name: Year-2 customer exit
  value: '25'
  unit: customers
  source: '[BP milestones 12-24 months: reach 20-30 paying customers]; base case lands
    near the midpoint and uses modest benchmark/module upsell to support ~$725K exit
    ARR.'
- id: A7
  name: Year-3 customer exit
  value: '55'
  unit: customers
  source: '[BP milestones 24-36 months: reach 50-70 paying customers]; base case stays
    below the research SOM framing of ~60 customers.'
- id: A8
  name: Monthly logo churn
  value: '1.4'
  unit: percent
  source: '[Startup-finance heuristic for early vertical workflow SaaS with recurring
    weekly use but still-forming product-market fit].'
- id: A9
  name: CAC per new customer
  value: '16'
  unit: $K
  source: '[BP gtm founder-led outbound, agency/consultant partners, and a 30-day
    pilot motion]; modeled as a lean early-stage SaaS CAC heuristic for a 4-8 week
    mid-market sale.'
- id: A10
  name: Average sales cycle
  value: '1.5'
  unit: months
  source: '[BP market.buyingProcess says 4-8 weeks with a 30-day pilot]; base case
    uses the midpoint.'
- id: A11
  name: Hiring plan
  value: CEO and founding engineer in M1; customer success/growth analyst in M4; second
    engineer in M8; first sales hire in M13; third engineer in M21; second customer
    success hire in M31
  unit: plan
  source: '[BP team startTiming plus lean startup-finance extension]; later hires
    are delayed until customer and benchmark milestones justify them.'
- id: A12
  name: Cash salary bands
  value: Founder $120K; engineers $150K-$165K; customer success $108K-$114K; first
    sales hire $120K
  unit: annual salary
  source: '[Startup-finance heuristic for U.S. seed-stage software startups]; non-payroll
    program spend and benefits are modeled separately in opex.'
- id: A13
  name: Non-payroll opex ramp
  value: R&D tools/cloud $4K-$8K monthly; S&M programs $3K-$14K monthly; G&A/legal/compliance
    $5K-$7K monthly
  unit: $K per month
  source: '[BP operations read-only integrations, privacy/compliance work, CRM, and
    onboarding playbook]; extended with startup-finance heuristic for early SaaS operating
    overhead.'
- id: A14
  name: Cash flow simplification
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[Startup-finance heuristic: no debt, capex, taxes, or working-capital timing
    is separately modeled at seed stage].'
- id: A15
  name: Funding runway target
  value: '24'
  unit: months
  source: '[BP fundingAsk.runwayMonths 18] plus the required 6-month buffer in the
    financial-model instructions.'
