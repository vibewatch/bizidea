slug: ios-growth-control-plane
date: '2026-05-08'
executiveSummary: >-
  InMobi's acquisition of MobileAction confirms that Apple Ads and ASO intelligence is consolidating
  inside full-stack ad platforms, leaving mid-market consumer subscription app publishers without a
  neutral operating layer for spend governance. The proposed company builds that neutral layer: a weekly
  iOS growth control plane that ingests Apple Search Ads data, App Store listing metadata, creative
  histories, and paywall conversion outcomes, then produces a ranked experiment queue with explicit
  owners, budget guardrails, and incrementality accounting. The initial buyer is a Head of Growth or VP
  Performance Marketing at a Series A–C subscription app spending $100k+ per month on Apple Search Ads
  with a lean in-house UA team and active geo-expansion plans. These teams currently stitch together
  agency spreadsheets, ASO dashboards, and manual finance reviews — a workflow that breaks under rising
  CAC and multi-market launches. The startup wins not by selling more data but by owning the weekly
  decision cadence between keyword spend, custom product page changes, store messaging, and payback
  accountability in a way that bundled ad-network tools and agencies are structurally unable to do.
  Bottom-up sizing from the researched corpus yields a SAM of approximately $28.8M in English-speaking
  and GCC markets at a $24k ACV, with a Year 3 SOM of roughly $1.4M across 60 customers; TAM and market
  size figures are model estimates, not audited data, and the financial model will refine them. The
  biggest disconfirming risk is that growth leaders prefer adding services to existing Apple Ads partner
  suites rather than adopting a standalone governance layer.

problem:
  - "Apple Ads bidding, ASO, custom product page testing, and creative analysis run as separate workflows across point tools, agency decks, and spreadsheets — teams have no unified cadence to decide what to test, how much to spend, and whether results were incremental."
  - "As iOS tooling consolidates inside full-stack ad platforms (e.g., InMobi+MobileAction), mid-market publishers face black-box bundles with media-selling incentives, not a neutral operating layer that can recommend spend reductions or agency accountability."
  - "Growth leaders struggle to explain CAC and payback swings to finance because spend decisions and store-listing changes are never logged in one place with measured outcomes."

solution:
  - "Weekly iOS growth control plane: ingests Apple Search Ads campaigns, App Store Connect metadata, creative libraries, and paywall analytics; outputs a ranked experiment queue with assigned owners, budget guardrails, and explicit test windows."
  - "Incrementality accounting layer: separates true lift from branded-keyword cannibalization and paid-organic overlap across every experiment, giving finance a defensible story for CAC swings."
  - "Cross-app benchmark graph: accumulates anonymized keyword intent, custom product page performance, creative motifs, and subscription payback by app category and market — a data asset that compounds with each customer added."
  - "Neutral governance positioning: because the product earns revenue from SaaS contracts rather than media margin, it can recommend cutting spend, overruling agency campaign choices, or deprioritizing branded keywords without conflicting incentives."

whyWeWin:
  - "Neutrality as structural advantage: unlike MobileAction (now InMobi), AppTweak, or SplitMetrics, the product does not sell media or manage campaigns, so it can surface spend-reduction recommendations that ad-network tools are incentivized to suppress."
  - "Workflow depth over data breadth: competitors sell intelligence dashboards; this product owns the weekly operating cadence — who approved the experiment, what budget was risked, and whether the result was incremental — which creates switching cost through embedded process, not raw data."
  - "Incrementality accounting is technically hard and left undone by incumbents: AppTweak, SplitMetrics, and App Radar stop at optimization recommendations; none log experiment design, ownership, and payback in a single auditable system."
  - "Cross-account benchmark moat builds with scale: each new customer adds anonymized keyword/CPP/payback signal to the graph; incumbents do not accumulate this data in an experiment-outcome format because they are not sitting inside the approval workflow."
  - "Buying trigger is acute and recurring: geo launches and CAC spikes are predictable quarterly events for subscription apps, giving the startup a repeatable hook with a clear budget owner and a measurable success condition."

strategicChoices:
  beachhead: >-
    Consumer subscription apps in gaming-adjacent, wellness, language learning, and utility categories
    spending $50k–$300k per month on Apple Search Ads across 3–10 countries, with 5–20 person growth
    teams based in the US, UK, or GCC markets.
  wedgeRationale: >-
    This customer slice has proven Apple Ads budget, a lean team that cannot afford more analysts, and a
    recurring pain trigger (geo launches and CAC reviews) that maps directly to the product's weekly
    experiment queue. Winning here produces measurable ROI claims and cross-app benchmark data faster
    than targeting enterprise publishers (longer sales cycles, more IT gatekeeping) or casual game studios
    (different growth motion, lower ASO complexity).
  sequencingRationale: >-
    Build integrations (Apple Ads, App Store Connect, one MMP) before expanding to paywall analytics and
    review-management connectors; this gets the experiment queue to usable quality for early design
    partners without over-engineering breadth. Hire customer success before a large sales team so the
    product adoption loop is proven before scaling CAC. Add benchmarking as a module only after enough
    cross-account experiment data exists to make benchmarks credible — credibility requires at least
    10–15 customers running experiments for 90+ days.
  notYet:
    - "Android and Google Play ASO — different tooling ecosystem and buyer; defer until iOS playbook is proven and repeatable."
    - "Creative production services (design, video) — keeps the product neutral and avoids agency-economics conflicts at the start."
    - "Programmatic or non-Apple ad channel management — broadening too early blurs the iOS-neutral governance pitch."
    - "Consumer-facing or review-reply automation — useful later but expands scope before the experiment queue has product-market fit."
    - "Investor or benchmark data products sold to VCs — a later expansion once the cross-app graph has sufficient depth."

market:
  tam: "$144M (bottom-up: 500k MobileAction advertiser universe × 1.2% fit × $24k ACV; model estimate)"
  sam: "$28.8M (English-speaking and GCC launch markets at 20% of TAM unit base × $24k ACV; model estimate)"
  som: "$1.4M Year 3 (60 customers × ~$24k ACV through founder-led and partner-led sales; model estimate)"
  segments:
    - "Series A–C consumer subscription apps spending $50k–$300k/month on Apple Search Ads with lean in-house UA teams"
    - "UA managers and ASO leads at mid-market mobile publishers managing 3–10 iOS storefronts across multiple geographies"
  buyingProcess: >-
    The economic buyer is the VP Growth or Head of Performance Marketing; the technical evaluator is the
    UA manager or ASO lead. Sales cycle is 4–8 weeks with a 30-day pilot replacing the team's current
    weekly review process, converting to an annual SaaS contract on proof of reduced CAC or faster
    experiment turnaround.

product:
  mvp: >-
    Apple Search Ads + App Store Connect read-only integrations feeding a weekly ranked experiment queue
    with owner assignment, budget guardrails, and a simple before/after install and trial payback view;
    covers one app property and up to five iOS markets.
  sixMonth: >-
    Add one MMP integration (e.g., Adjust or AppsFlyer) for downstream trial and subscription payback;
    launch custom product page experiment tracking; ship a decision-log module so every approved or
    rejected experiment is auditable; onboard 5–8 design-partner accounts.
  twelveMonth: >-
    Launch cross-app benchmark graph (minimum 10 accounts, 90-day experiment history); add multi-app
    property support; introduce a finance-facing CAC and payback review dashboard; begin agency-overlay
    workflow where agencies execute approved experiment changes logged in the product.
  twentyFourMonth: >-
    Expand to paywall analytics integration (RevenueCat or Superwall) for cohort-level subscription
    payback; launch premium benchmark module as an upsell; add a review-signal feed to surface store-listing
    experiment ideas from user feedback; support 50+ active accounts across US, UK, and GCC.
  keyBets:
    - "Ranked weekly experiment queue is more valuable than another analytics dashboard — buyers act on priorities, not more charts."
    - "Incrementality accounting (separating paid lift from branded cannibalization) is technically achievable with controlled experiment windows and Apple Ads search-term reports."
    - "Cross-app benchmark graph becomes the durable moat if captured before incumbents bundle a similar governance layer."
    - "Agency-overlay motion (product governs, agency executes) is a feasible landing pattern that avoids agency displacement at the start."

gtm:
  wedge: >-
    Founder-led direct outbound to Heads of Growth at Series A–C subscription apps already running
    Apple Search Ads across 3+ markets and currently using at least one ASO tool or agency — targeting
    teams inside a CAC pressure or geo-launch event.
  channels:
    - "Founder-led outbound to VP Growth and UA leaders in English-speaking and GCC markets (primary in months 0–12)"
    - "Apple Ads specialist consultants and boutique app-growth agencies as referral and co-sell partners"
    - "iOS growth communities (Mobile Growth Association, AppGrowthNetwork events, Slack groups)"
    - "Content distribution: weekly iOS growth benchmark data and experiment-outcome case studies published to build domain authority"
  funnelTargets: "Outbound contact → qualified discovery call 15–25%; discovery → 30-day pilot 40–50%; pilot → annual contract 55–65%"
  pricing: >-
    Annual SaaS contract priced by number of app properties and monthly Apple Ads spend under management.
    Entry tier: 1 app, up to $150k monthly spend, ~$18k–$24k ACV. Growth tier: up to 3 apps or $500k
    monthly spend, ~$36k–$60k ACV. Premium benchmark module as a $6k–$12k add-on. Rationale: pricing
    sits above point-tool stacks ($3k–$10k/year for ASO + reporting tools) but below a fractional UA
    analyst or agency retainer ($5k–$15k/month), which the product is designed to partially replace.

businessModel:
  revenueStreams:
    - "Annual SaaS subscription (tiered by app properties and Apple Ads spend under management)"
    - "Premium cross-app benchmark module (add-on for larger publishers)"
    - "Onboarding services fee for accounts migrating from agency or spreadsheet workflows (time-boxed, not recurring)"
  unitOfValue: "App property + monthly Apple Ads spend under governance"
  targetGrossMarginPct: 72
  expansionLevers:
    - "Add app properties per customer as publishers launch new titles or markets"
    - "Upsell benchmark module once cross-account graph reaches credible depth (10+ accounts, 90+ days)"
    - "Expand into Android / Google Play growth governance as a second platform offering"
    - "Sell anonymized benchmark data to investors and app-industry analysts (later stage)"

strategyMap:
  northStarMetric: "Number of customer app properties running at least one governed experiment per month"
  inputMetrics:
    - "Weekly experiments approved per active customer account"
    - "Share of Apple Ads spend decisions logged with an experiment outcome (vs. unlogged changes)"
    - "Time from experiment hypothesis to first result within the product"
    - "Pilot-to-annual-contract conversion rate"
    - "Net revenue retention (upsell via additional app properties or benchmark add-on)"
  moatsToBuild:
    - "Cross-app experiment outcome graph: keyword intent → CPP performance → subscription payback, by category and market"
    - "Workflow embeddedness: weekly cadence means the product becomes the team's operating rhythm, not a reference tool"
    - "Incrementality methodology IP: standardized experiment templates and controlled window designs that finance teams trust"
    - "Agency integration network: as agencies log execution in the product, they become a distribution channel rather than a blocker"
  killCriteria:
    - "Fewer than 30% of pilot customers convert to annual contracts after 90 days"
    - "Zero customers rate incrementality accounting as a primary reason for purchase after 6 design-partner interviews"
    - "Two or more of AppTweak, SplitMetrics, or Apple Ads native tooling ship a governed experiment queue with owner assignment within 12 months of launch"
    - "Median CAC payback for the startup's own customer acquisition exceeds 24 months at seed stage"
  mermaid: |
    flowchart LR
      Beachhead[Series A-C subscription apps\nApple Ads + geo launch pain] --> MVP[Weekly experiment queue\nApple Ads + ASO integrations]
      MVP --> Proof[5-8 design partners\nCAC and payback improvement]
      Proof --> Moat[Cross-app benchmark graph\nagency-overlay workflow]
      Moat --> Expansion[Multi-app properties\npremium benchmark module\nAndroid expansion]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Moderate conviction — wedge is specific and timing is good, but market size is modest and competitive crowding is real; warrants design-partner validation before committing."
    whyBelieve: "The InMobi–MobileAction deal creates an identifiable gap for a neutral governance layer precisely when Apple Ads budgets are growing, multi-market launches are multiplying, and no incumbent is structurally positioned to recommend spend cuts."
    whyDoubt: "The SAM is only ~$29M in initial markets and growth leaders may extend existing Apple Ads partner suite contracts rather than adopt another SaaS layer, keeping the total addressable paying universe small for years."
    nextDiligence: "Conduct five paid-ICP design-partner conversations to confirm that governance and incrementality accountability — not better recommendations — is the primary willingness-to-pay driver."
  firstCustomer:
    title: "Head of Growth at a Series A–C consumer subscription app"
    profile: "15–40 person company with a 3–8 person growth function, $100k–$250k monthly Apple Search Ads budget, actively expanding into 3–6 new iOS markets, using one ASO tool and an agency for Apple Ads management."
    trigger: "A geo launch or a quarterly CAC review where the growth leader cannot explain to finance why installs grew but subscription payback worsened across markets."
    buyer: "VP Growth or Head of Performance Marketing"
    initialContract: "$18k–$24k annual pilot contract covering one app property and up to five markets; conversion path is a 30-day experiment-queue pilot that replaces the team's current weekly agency or spreadsheet review."
  mustBeTrue:
    - "At least 30% of target ICPs will pay $18k–$24k/year for a neutral experiment governance layer rather than expanding an existing Apple Ads partner suite contract."
    - "Incrementality accounting (separating branded-keyword cannibalization from true iOS demand) is technically achievable within Apple Ads search-term reporting and controlled experiment windows, not just a marketing claim."
    - "Cross-app experiment outcome data from 10+ customers compounds into a benchmark asset that AppTweak, MobileAction, or SplitMetrics cannot replicate without restructuring their data model around experiment approvals."
    - "Agency-overlay motion is viable: growth teams will let a third-party tool govern experiment priority and budget guardrails while their incumbent agency executes campaign changes, at least during the pilot period."
    - "Apple does not ship a native cross-functional experiment queue with owner assignment, budget governance, and third-party paywall integration in the 18-month product window."
  diligenceQuestions:
    - "Of the five most recent geo launches or CAC review cycles at target ICPs, what fraction produced a documented experiment log linking spend changes to payback outcomes — and what tool was used?"
    - "What is the actual annual spend on Apple Ads management agencies and ASO tools across the target ICP, and what share of that budget is discretionary versus locked into existing contracts?"
    - "Has AppTweak, SplitMetrics, or MobileAction/InMobi announced or shipped a governed experiment queue with explicit owner assignment and incrementality accounting in the last six months?"
    - "What is the minimum experiment-outcome dataset size (number of accounts, experiment cycles) before the cross-app benchmark graph is credible enough to command a premium add-on price?"
    - "How does the agency-overlay workflow affect agency relationships — do agencies see the product as a complement or a threat to their retainer scope?"
    - "What does Apple's App Store Connect roadmap for product page optimization and native experimentation look like, and how quickly could Apple commoditize the experiment-queue primitive?"
  riskHeatmap:
    - risk: "Apple platform dependency — API or policy change degrades data quality or experiment workflow"
      likelihood: Medium
      impact: High
      leadingIndicator: "Apple announces new App Store Connect automation or restricts third-party search-term data access in a developer beta"
      mitigation: "Start with read-only connectors and decision-workflow value so the product survives data degradation; diversify early into MMP and paywall analytics inputs not controlled by Apple."
    - risk: "Incumbent bundling — AppTweak, SplitMetrics, or post-acquisition MobileAction ships a governed experiment queue"
      likelihood: Medium
      impact: High
      leadingIndicator: "Any of the three named competitors releases a feature with owner assignment, experiment approval workflow, or incrementality accounting in public changelog or conference keynote"
      mitigation: "Move faster on incrementality accounting and agency-overlay workflow, which require operating model changes incumbents are slow to make; build switching cost through embedded weekly cadence before incumbents ship."
    - risk: "Attribution skepticism — buyers distrust incrementality claims and revert to existing tools"
      likelihood: Medium
      impact: Medium
      leadingIndicator: "Pilot customers disengage after first experiment cycle and cite lack of confidence in lift measurement as the primary reason"
      mitigation: "Launch with conservative, finance-facing experiment templates, standardized control windows, and simple before/after payback views rather than claiming causal lift from the first week."
    - risk: "Small initial SAM constrains venture returns without expansion"
      likelihood: High
      impact: Medium
      leadingIndicator: "Year 2 pipeline shows fewer than 80 qualified accounts in the English-speaking and GCC beachhead, limiting ARR growth below $2M without a second segment"
      mitigation: "Plan Android/Google Play expansion and benchmark data products as explicit Year 2–3 milestones; do not optimize too long for iOS-only before validating expansion willingness."
    - risk: "Agency inertia blocks adoption — incumbent agencies resist governance-layer oversight"
      likelihood: Medium
      impact: Medium
      leadingIndicator: "More than 40% of pilot churns cite agency pushback rather than product value as the primary reason for non-renewal"
      mitigation: "Position the product as the planning and governance layer that agencies execute against, reducing their coordination overhead; develop an agency-partner tier to align incentives."

operatingAssumptions:
  - assumption: "Target ICPs will pay $18k–$24k/year (above point-tool pricing but below an agency retainer increment) for a neutral experiment governance layer."
    basis: research.yaml
    validationTest: "Five design-partner interviews with current tool stack cost and agency retainer disclosed; at least three of five confirm willingness to allocate $18k–$24k if the pilot replaces weekly agency reporting."
    decisionImpact: "If false, pricing must drop to $10k–$14k range (closer to AppTweak/SplitMetrics enterprise tiers), which lowers initial ARR trajectory and extends time to SOM by 6–9 months."
  - assumption: "A 30-day experiment-queue pilot replacing the team's weekly review process is sufficient to demonstrate value and convert to annual contract."
    basis: operator judgment
    validationTest: "Track pilot-to-contract conversion rate in first five pilots; if below 40%, extend pilot design or identify missing integration needed for value realization."
    decisionImpact: "If false, the sales cycle extends to 60–90 days, increasing CAC and reducing the number of customers reachable in the first 12 months with seed funding."
  - assumption: "Cross-app benchmark graph becomes credible and licensable after 10–15 active accounts with 90+ days of experiment history."
    basis: operator judgment
    validationTest: "At month 12, survey benchmark-module prospects on perceived data credibility and compare anonymous benchmark samples against customer's own account data quality."
    decisionImpact: "If the threshold is higher (e.g., 30+ accounts), benchmark module revenue is deferred to Year 3+, removing an upsell revenue stream from the Year 2 financial model."
  - assumption: "Agency-overlay motion is viable: agencies will execute experiment changes approved in the product without requiring control of the governance workflow."
    basis: research.yaml
    validationTest: "Run one structured pilot where the startup sets experiment priority and the agency executes approved changes; measure whether agency compliance rate exceeds 80% of approved items per cycle."
    decisionImpact: "If false, the product must develop a self-serve Apple Ads execution layer, significantly expanding engineering scope and competing more directly with SplitMetrics Acquire."
  - assumption: "Apple does not ship a native cross-functional experiment queue with third-party paywall integration and owner assignment within 18 months of launch."
    basis: research.yaml
    validationTest: "Monitor Apple WWDC announcements, App Store Connect release notes, and Apple Ads partner briefings each quarter for native governance features."
    decisionImpact: "If false, the startup's core differentiation narrows to benchmark data and incrementality methodology, requiring a pivot to a data-product or consulting model."

experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "ICP pain validation — five paid design-partner conversations with growth leaders at target ICPs"
    hypothesis: "Heads of Growth will rank experiment prioritization and payback accountability above better keyword recommendations as primary willingness-to-pay drivers"
    successMetric: "At least 3 of 5 interviewees confirm governance and incrementality (not more data) is the primary gap; at least 2 agree to a paid pilot"
    owner: "Founder / CEO"
  - horizon: "0–90 days"
    experiment: "MVP experiment queue prototype — build read-only Apple Ads + App Store Connect ingestion feeding a ranked weekly action list for one design-partner account"
    hypothesis: "A ranked experiment queue with owner assignment replaces the team's current spreadsheet review and is used without prompting within the first two weeks"
    successMetric: "Design partner runs weekly planning session inside the product for 4 consecutive weeks without reverting to prior spreadsheet or dashboard"
    owner: "Founding engineer"
  - horizon: "90–180 days"
    experiment: "Incrementality accounting pilot — run controlled experiment window with one customer comparing Apple Ads search-term report baseline to observed payback delta"
    hypothesis: "Controlled experiment windows within Apple Ads search-term data can reliably isolate incremental installs from branded cannibalization for teams spending $100k+/month"
    successMetric: "Finance partner at pilot account accepts the incrementality output as the primary explanation for a CAC or payback shift in a quarterly review"
    owner: "Founding engineer + Head of Growth (customer)"
  - horizon: "90–180 days"
    experiment: "Agency-overlay pilot — one account where the startup governs experiment priority and an incumbent agency executes approved changes"
    hypothesis: "Agencies will follow governance-layer instructions for approved experiments when framed as reducing their coordination overhead rather than replacing their judgment"
    successMetric: "Agency executes ≥80% of approved experiment changes within agreed timelines; customer does not revert to direct agency-driven prioritization after 60 days"
    owner: "Founder / CEO + customer success"
  - horizon: "180–270 days"
    experiment: "Pilot-to-contract conversion test — convert first three design partners to annual contracts at target ACV"
    hypothesis: "A 30-day pilot demonstrating measurable experiment throughput increase and at least one payback-linked outcome will convert at ≥50% to annual contracts at $18k–$24k ACV"
    successMetric: "2 of 3 design partners sign annual contracts within 30 days of pilot completion without a price reduction below $16k ACV"
    owner: "Founder / CEO"
  - horizon: "270–360 days"
    experiment: "Partner-channel test — co-sell or referral agreement with one Apple Ads specialist consultant or boutique app-growth agency"
    hypothesis: "A referral arrangement where the agency retains governance-layer visibility for their clients will generate at least 2 qualified introductions per quarter without displacing agency relationships"
    successMetric: "Partner generates 2+ qualified introductions in first quarter; at least 1 converts to a paid pilot"
    owner: "Founder / CEO"
  - horizon: "270–360 days"
    experiment: "Benchmark module demand test — soft-launch benchmark data module to 5 existing customers at $6k add-on price"
    hypothesis: "Customers with 90+ days of experiment history will pay for anonymized cross-app benchmarks if shown a sample output tied to a specific keyword category or market"
    successMetric: "At least 3 of 5 customers purchase the add-on within 30 days of seeing the sample; no customer cancels the core subscription citing benchmark availability elsewhere"
    owner: "Founder / CEO + founding engineer"

operations:
  - "Apple Ads API and App Store Connect API integrations managed with read-only OAuth; all data-use policies documented for privacy review by customers with legal gatekeepers"
  - "Mobile measurement platform (MMP) integration via Adjust or AppsFlyer API for downstream trial and subscription payback data"
  - "Weekly experiment queue generated by a rules-based prioritization engine (day 1); evolve to ML-ranked queue after 10+ customers and 90+ days of outcome data"
  - "Customer onboarding playbook: 2-week integration setup, 1 experiment plan delivered in week 3, weekly cadence review in week 4–8 to prove adoption before contract renewal risk"
  - "Data security and compliance: read-only connectors, no ad execution rights in v1, clear data-use documentation to pass security reviews at enterprise-leaning customers"
  - "CRM (HubSpot or equivalent) for pipeline management and pilot conversion tracking from day one"

team:
  - role: "Founding CEO / GTM lead"
    startTiming: "Month 0"
    rationale: "Must have direct experience running growth at a consumer subscription app or leading Apple Ads / ASO tooling; owns ICP outreach, design-partner pipeline, and early customer success."
  - role: "Founding engineer (full-stack + data integrations)"
    startTiming: "Month 0"
    rationale: "Builds Apple Ads API and App Store Connect integrations, experiment queue engine, and the data normalization layer; must be comfortable with Apple's API constraints and rate limits."
  - role: "Customer success / growth analyst"
    startTiming: "Month 4"
    rationale: "Supports pilot onboarding, weekly experiment plan delivery, and payback reporting; deep iOS growth domain knowledge preferred; hired before scaling sales to ensure the adoption loop is proven."
  - role: "Second engineer (data pipeline + benchmark graph)"
    startTiming: "Month 8"
    rationale: "Needed once 6+ customers are live to build cross-app data normalization, incrementality model, and the benchmark graph infrastructure before Series A."

milestones:
  - horizon: "0–12 months"
    items:
      - "Complete 5 ICP design-partner interviews confirming governance and incrementality as primary willingness-to-pay drivers (month 1–2)"
      - "Ship MVP experiment queue with Apple Ads + App Store Connect integrations for first design-partner account (month 2–3)"
      - "Onboard 3 paid pilot accounts at $18k–$24k ACV (month 4–6)"
      - "Deliver incrementality accounting for at least 2 pilot accounts, accepted by finance stakeholders (month 6–8)"
      - "Convert 2 of 3 pilots to annual contracts; reach $48k–$72k ARR (month 8–10)"
      - "Close 5–8 total paying customers; reach $90k–$160k ARR by month 12"
      - "Launch one partner-channel referral arrangement with Apple Ads specialist or boutique app-growth agency"
  - horizon: "12–24 months"
    items:
      - "Reach 20–30 paying customers; ARR $400k–$700k"
      - "Ship cross-app benchmark graph with 10+ account, 90+ day experiment history; launch benchmark add-on at $6k–$12k"
      - "Add second engineer; begin multi-app property support and agency-overlay workflow"
      - "Close first agency-partnership agreement giving partner accounts access to governance layer"
      - "Expand into UK and GCC markets with localized onboarding playbook"
      - "Raise seed round ($2M–$4M) to fund 18-month runway to Series A metrics"
  - horizon: "24–36 months"
    items:
      - "Reach 50–70 paying customers; ARR $1.2M–$1.8M approaching researched SOM of $1.4M"
      - "Launch paywall analytics integration (RevenueCat or Superwall) for cohort-level subscription payback"
      - "Ship Android / Google Play governance module as a second platform offering"
      - "Achieve net revenue retention ≥115% through app-property expansion and benchmark add-on upsells"
      - "Build pipeline for Series A with documented CAC payback, NRR, and cross-app benchmark differentiation"

risks:
  - risk: "Apple platform dependency — API or policy change degrades core data or experiment workflow"
    likelihood: Medium
    impact: High
    mitigation: "Build read-only connectors with documented data-use policies; diversify into MMP and paywall analytics inputs from month 6 so the product survives partial Apple data degradation."
  - risk: "Incumbent bundling — AppTweak, SplitMetrics, or MobileAction/InMobi ships governed experiment queue"
    likelihood: Medium
    impact: High
    mitigation: "Prioritize incrementality accounting and agency-overlay workflow, which require operating model changes incumbents are structurally slow to make; build switching cost through embedded weekly cadence before incumbents ship."
  - risk: "Attribution and incrementality skepticism — buyers distrust lift claims and revert to existing tools"
    likelihood: Medium
    impact: Medium
    mitigation: "Use conservative experiment templates, standardized control windows, and simple before/after payback views; anchor first value on experiment throughput and ownership clarity before incrementality claims."
  - risk: "Small SAM limits venture return without expansion"
    likelihood: High
    impact: Medium
    mitigation: "Plan Android expansion and benchmark data products as explicit Year 2–3 milestones; validate expansion willingness with existing customers before Year 2 fundraising."
  - risk: "Agency inertia — incumbent agencies resist governance-layer oversight"
    likelihood: Medium
    impact: Medium
    mitigation: "Frame product as reducing agency coordination overhead; develop an agency-partner tier with visibility tools so agencies see the product as a complement before the competitive threat becomes visible."

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$2M–$4M"
  runwayMonths: 18
  useOfFundsSummary: "18 months of runway buys: founding team salaries (CEO + 1–2 engineers), Apple Ads and MMP integration build-out, 5–8 design-partner pilots converted to annual contracts, customer success hire at month 4, second engineer at month 8, and initial partner-channel agreements — targeting $400k–$700k ARR and 20–30 paying customers as Series A entry metrics."
