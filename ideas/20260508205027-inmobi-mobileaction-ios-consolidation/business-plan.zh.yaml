slug: ios-growth-control-plane
date: '2026-05-08'
executiveSummary: InMobi 收购 MobileAction，确认 Apple Ads 与 ASO 情报正在被整合进全栈广告平台，这会让中端消费型订阅应用发行商缺少一层中立的投放治理系统。拟议中的公司就做这层系统：一套每周运行的 iOS 增长控制平面，接入 Apple Search Ads 数据、App Store 列表元数据、素材历史和付费墙转化结果，再产出带明确负责人、预算护栏和增量核算的实验优先队列。首个买方是 Series A–C 订阅应用里的 Head of Growth 或 VP Performance Marketing：Apple Search Ads 月花费 $100k+、内部 UA 团队精简、且正在积极做区域扩张。这类团队现在还得把代理商表格、ASO 仪表盘和人工财务复盘拼在一起；一旦 CAC 上升、又要多市场上线，这套流程就会崩。公司赢法不在于卖更多数据，而在于占住关键词投放、Custom Product Page 改动、商店话术和回本问责之间的每周决策节奏——而这恰恰是广告网络套件和代理商在结构上做不好的。按研究里的自下而上测算，英语市场和 GCC 的 SAM 约为 $28.8M，按 $24k ACV 估算，第 3 年 SOM 约 $1.4M、对应 60 个客户；TAM 和市场规模都只是模型估算，后续会由财务模型继续细化。当前最可能推翻判断的风险，是增长负责人更愿意在现有 Apple Ads 合作伙伴套件上叠加服务，而不是再买一层独立治理产品。
problem:
- Apple Ads 出价、ASO、Custom Product Page 测试和素材分析，分散在点工具、代理商 deck 与表格里；团队没有统一节奏去决定先测什么、花多少钱，以及结果是不是增量。
- 随着 iOS 工具被整合进全栈广告平台（例如 InMobi + MobileAction），中端发行商更容易拿到带媒体销售激励的黑箱式打包方案，而不是一套能建议减投或要求代理商负责的中立运营层。
- 增长负责人很难向财务解释 CAC 和回本为什么波动，因为投放决策和商店页改动从来没有在同一个地方被记录并和结果绑定。
solution:
- 每周运行的 iOS 增长控制平面：接入 Apple Search Ads 活动、App Store Connect 元数据、素材库和付费墙分析，再输出一份排好优先级的实验队列，写清负责人、预算护栏和测试窗口。
- 增量核算层：把真实增量和品牌词蚕食、以及付费与自然量重叠拆开，让财务能对 CAC 波动有一套站得住脚的解释。
- 跨应用基准图谱：按应用品类和市场累积匿名化的关键词意图、Custom Product Page 表现、素材母题和订阅回收数据；客户越多，这个数据资产越值钱。
- 中立治理定位：公司收入来自 SaaS 合同而不是媒体返点，因此它可以在没有利益冲突的情况下建议减投、否掉代理商活动方案，或降低品牌词优先级。
whyWeWin:
- 中立性本身就是结构性优势：不同于 MobileAction（现已归入 InMobi）、AppTweak 或 SplitMetrics，这个产品不卖媒体也不代管活动，因此能提出广告网络工具不愿给出的减投建议。
- 工作流深度比数据广度更重要：竞品卖的是情报仪表盘；这个产品占住的是每周运营节奏——谁批准实验、预算冒了多大风险、结果是不是增量——因此切换成本来自流程嵌入，而不是裸数据。
- 增量核算在技术上更难，也正是现有厂商没补上的空白：AppTweak、SplitMetrics 和 App Radar 都停在优化建议层，没有谁把实验设计、责任归属和回本放进同一套可审计系统。
- 跨账户基准护城河会随着规模变厚：每个新客户都会把匿名的关键词、CPP 和回本信号加进图谱；现有厂商拿不到这种“实验结果格式”的数据，因为它们不在审批工作流里。
- 购买触发既尖锐又反复出现：区域上线和 CAC 激增，对订阅应用来说是可预测的季度事件，因此这是一个有明确预算负责人和衡量结果的可复制切口。
strategicChoices:
  beachhead: 游戏相邻、健康、语言学习和工具类的消费型订阅应用：Apple Search Ads 月花费 $50k–$300k，覆盖 3–10 个国家，增长团队 5–20 人，主要位于 US、UK 或 GCC。
  wedgeRationale: 这批客户已经有明确的 Apple Ads 预算，团队又精简，负担不起再招更多分析师；而“区域上线 + CAC 复盘”这种反复出现的痛点，正好对应产品的每周实验队列。先赢下这批客户，比一开始去打大企业发行商（销售周期更长、IT 门槛更高）或休闲游戏工作室（增长动作不同、ASO 复杂度更低）更容易拿到可量化 ROI 和跨应用基准数据。
  sequencingRationale: 先把 Apple Ads、App Store Connect 和 1 个 MMP 的集成做出来，再扩到付费墙分析和评论管理接口；这样共创客户在早期就能拿到足够好用的实验队列，不至于为了功能广度过度工程化。客户成功要先于大规模销售团队到位，先把采用闭环跑通，再去放大 CAC。基准模块也必须等到跨账户实验数据足够厚之后再卖——至少要有 10–15 个客户、连续跑 90+ 天实验，基准才有公信力。
  notYet:
  - 暂不做 Android 和 Google Play ASO——工具生态和买方都不一样，等 iOS 剧本跑通且可复制后再扩。
  - 暂不做素材生产服务（设计、视频）——先保持产品中立，避免一开始就卷入代理商经济学。
  - 暂不做 programmatic 或非 Apple 渠道代管——过早铺开会模糊“中立 iOS 治理层”的主张。
  - 暂不做面向消费者的评论回复自动化——后续有用，但在实验队列还没跑出 PMF 前会分散焦点。
  - 暂不把投资人或基准数据产品卖给 VC——等跨应用图谱足够深之后再扩。
market:
  tam: $144M（自下而上估算：500k MobileAction 覆盖广告主 × 1.2% 的目标匹配率 × $24k ACV；模型估算）
  sam: $28.8M（英语市场与 GCC 首发市场，按 TAM 单位数的 20% 可触达范围 × $24k ACV；模型估算）
  som: 第 3 年 $1.4M（通过创始人销售和伙伴分销拿下 60 个客户 × 约 $24k ACV；模型估算）
  segments:
  - Series A–C 的消费型订阅应用：Apple Search Ads 月花费 $50k–$300k，内部 UA 团队精简。
  - 管理 3–10 个 iOS 商店页、跨多个地域扩张的中端移动发行商里的 UA 经理和 ASO 负责人。
  buyingProcess: 经济买方是 VP Growth 或 Head of Performance Marketing；技术评估人是 UA 经理或 ASO 负责人。销售周期约 4–8 周，先用一个 30 天试点替换团队现有的每周复盘流程；只要能证明 CAC 降低或实验周转更快，就转成 annual SaaS 合同。
product:
  mvp: 先做 Apple Search Ads + App Store Connect 的只读集成，产出每周排好优先级的实验队列，并写清负责人、预算护栏，以及一个简单的前后安装与试用回本视图；首版覆盖 1 个应用资产和最多 5 个 iOS 市场。
  sixMonth: 接入 1 个 MMP（如 Adjust 或 AppsFlyer），把试用和订阅回本接到后链路；上线 Custom Product Page 实验跟踪；补一套决策日志模块，让每个通过或否决的实验都能审计；拉起 5–8 个共创客户账户。
  twelveMonth: 上线跨应用基准图谱（至少 10 个账户、90 天实验历史）；支持多应用资产；补一块面向财务的 CAC 与回本复盘面板；并启动“代理商执行、产品治理”的 agency-overlay 工作流。
  twentyFourMonth: 把产品扩到付费墙分析集成（RevenueCat 或 Superwall），拿到 cohort 级订阅回本；上线高级基准模块做 upsell；增加评论信号流，把用户反馈转成商店页实验想法；支持 US、UK 和 GCC 的 50+ 个活跃账户。
  keyBets:
  - 相比再做一个分析仪表盘，每周排好优先级的实验队列更值钱——买方缺的不是图表，而是明确优先级。
  - 只要控制好实验窗口，并结合 Apple Ads 搜索词报表，就有机会把真实增量和品牌蚕食拆出来。
  - 只要能在现有厂商补齐治理层之前先拿到数据，跨应用基准图谱就能成为长期护城河。
  - agency-overlay 这套打法能成立：由产品治理、代理商执行，可以在不一开始替代代理商的情况下落地。
gtm:
  wedge: 创始人亲自外呼，锁定已经在 3+ 个市场投 Apple Search Ads、且至少在用 1 个 ASO 工具或代理商的 Series A–C 订阅应用增长负责人——优先挑 CAC 承压或正在做区域上线的团队。
  channels:
  - 创始人主导外呼，触达英语市场与 GCC 的 VP Growth 和 UA 负责人（0–12 个月是主渠道）。
  - Apple Ads 专家顾问和精品应用增长代理商，作为转介绍和联合销售伙伴。
  - iOS 增长社群（如 Mobile Growth Association、AppGrowthNetwork 活动、Slack 群）。
  - 内容分发：持续发布每周 iOS 增长基准数据和实验结果案例，建立领域权威。
  funnelTargets: 外呼触达 → 合格 discovery call 15–25%；discovery → 30 天试点 40–50%；试点 → annual contract 55–65%
  pricing: 按应用资产数量和托管中的 Apple Ads 月花费来定 annual SaaS 合同。入门档：1 个应用、月花费最多 $150k，ACV 约 $18k–$24k。成长档：最多 3 个应用或 $500k 月花费，ACV 约 $36k–$60k。高级基准模块另外加 $6k–$12k。这个价格带高于点工具组合（ASO + 报表工具每年 $3k–$10k），但低于一名兼职 UA 分析师或代理商 retainer（每月 $5k–$15k），也正是产品想替代掉的一部分支出。
businessModel:
  revenueStreams:
  - Annual SaaS 订阅（按应用资产和 Apple Ads 托管花费分层）。
  - 高级跨应用基准模块（面向更大发行商的附加模块）。
  - 从代理商或表格工作流迁移时收取 onboarding 服务费（一次性，不做经常性收入）。
  unitOfValue: 被治理的应用资产 + Apple Ads 月花费
  targetGrossMarginPct: 72
  expansionLevers:
  - 随着发行商上线新标题或新市场，在单个客户内增加更多应用资产。
  - 当跨账户图谱达到可信厚度后，向现有客户 upsell 基准模块（10+ 个账户、90+ 天历史）。
  - 把治理层扩到 Android / Google Play，做第二个平台产品。
  - 后期把匿名化基准数据卖给投资人和应用行业分析师。
strategyMap:
  northStarMetric: 每月运行至少 1 个受治理实验的客户应用资产数
  inputMetrics:
  - 每个活跃客户账户每周批准的实验数。
  - Apple Ads 投放决策里，有结果记录的实验占比（相对未留痕改动）。
  - 从实验假设提出到在产品里看到首个结果的时间。
  - 试点转 annual contract 的转化率。
  - 净收入留存（通过新增应用资产或基准模块 upsell）。
  moatsToBuild:
  - 跨应用实验结果图谱：按品类和市场，把关键词意图 → CPP 表现 → 订阅回本串起来。
  - 工作流嵌入：每周节奏一旦形成，产品就会变成团队的运行节拍，而不只是参考工具。
  - 增量方法论 IP：一套让财务团队信得过的标准化实验模板和控制窗口设计。
  - 代理商集成网络：当代理商在产品里登记执行动作时，它们会变成分销渠道，而不是阻力。
  killCriteria:
  - 90 天后，试点客户转 annual contract 的比例低于 30%。
  - 做完 6 次共创客户访谈后，没有任何客户把“增量核算”列为购买主因。
  - 产品上线 12 个月内，AppTweak、SplitMetrics 或 Apple Ads 原生工具中已有两家及以上上线带负责人分配的治理式实验队列。
  - 公司自己的获客 CAC 回本中位数在种子阶段仍超过 24 个月。
  mermaid: "flowchart LR\n  Beachhead[Series A-C 订阅应用\nApple Ads + 区域上线痛点] --> MVP[每周实验队列\nApple Ads + ASO 集成]\n  MVP --> Proof[5-8 个共创客户\nCAC 与回本改善]\n  Proof --> Moat[跨应用基准图谱\nagency-overlay 工作流]\n  Moat --> Expansion[多应用资产\n高级基准模块\nAndroid 扩张]\n"
investorMemo:
  verdict:
    call: 值得约见 / 继续尽调
    conviction: 中等确信——切口够具体、时点也对，但市场规模偏小、竞争又很拥挤，值得先做共创客户验证，再决定是否投入。
    whyBelieve: InMobi–MobileAction 这笔交易，刚好在 Apple Ads 预算持续增长、多市场上线变多的节点上，打开了一个“中立治理层”的明确缺口，而现有厂商在结构上又不适合给出减投建议。
    whyDoubt: 初始市场的 SAM 只有约 $29M，增长负责人也可能选择在现有 Apple Ads 合作伙伴套件上加服务，而不是再买一层 SaaS，这会让可付费客户池多年都偏小。
    nextDiligence: 先做 5 次付费 ICP 共创客户访谈，确认客户真正愿意为“治理与增量问责”买单，而不是为了拿到更好的优化建议。
  firstCustomer:
    title: Series A–C 消费型订阅应用里的增长负责人
    profile: 公司规模 15–40 人，增长职能 3–8 人，Apple Search Ads 月预算 $100k–$250k，正在扩到 3–6 个新的 iOS 市场，同时在用 1 个 ASO 工具和 1 家 Apple Ads 代理商。
    trigger: 一次区域上线或季度 CAC 复盘里，增长负责人解释不清：为什么安装增长了，但不同市场上的订阅回本却变差。
    buyer: VP Growth 或 Head of Performance Marketing
    initialContract: 一份 $18k–$24k 的年度试点合同，覆盖 1 个应用资产和最多 5 个市场；成交路径是用 30 天实验队列试点，替掉团队现有的每周代理商或表格复盘。
  mustBeTrue:
  - 至少 30% 的目标 ICP，愿意每年花 $18k–$24k 买一层中立实验治理产品，而不是继续扩现有 Apple Ads 套件合同。
  - 增量核算（把品牌词蚕食和真实 iOS 需求拆开）在 Apple Ads 搜索词报表和受控实验窗口内，技术上确实能成立，而不只是营销话术。
  - 来自 10+ 个客户的跨应用实验结果数据，会逐步复利成基准资产，而 AppTweak、MobileAction 或 SplitMetrics 如果不重做数据模型，就很难复制。
  - agency-overlay 这套打法可行：增长团队愿意让第三方工具来定实验优先级和预算护栏，同时继续由现有代理商执行改动，至少在试点阶段如此。
  - Apple 不会在 18 个月产品窗口内，自己上线一套带负责人分配、预算治理和第三方付费墙集成的原生跨职能实验队列。
  diligenceQuestions:
  - 目标 ICP 最近 5 次区域上线或 CAC 复盘里，有多少次真的留下了把投放改动和回本结果连起来的实验日志？当时用的是什么工具？
  - 目标 ICP 目前每年在 Apple Ads 代理商和 ASO 工具上到底花多少钱？其中多少预算可自由调整，多少已经锁在合同里？
  - 过去 6 个月里，AppTweak、SplitMetrics 或 MobileAction/InMobi 是否已经宣布或上线带明确负责人分配和增量核算的治理式实验队列？
  - 跨应用基准图谱最少要积累到多大规模（账户数、实验周期数），客户才会觉得可信，愿意为高级模块额外付费？
  - agency-overlay 这套工作流会如何影响代理商关系——代理商会把产品当补充，还是当威胁？
  - Apple 在 App Store Connect 的产品页优化和原生实验路线图长什么样？它多快会把“实验队列”这层能力做成标品？
  riskHeatmap:
  - risk: Apple 平台依赖——API 或政策变化削弱数据质量或实验工作流
    likelihood: Medium
    impact: High
    leadingIndicator: Apple 在开发者测试版里宣布新的 App Store Connect 自动化，或限制第三方搜索词数据访问。
    mitigation: 先从只读连接器和决策工作流价值做起，让产品在数据部分退化时也能活；同时尽早接入不由 Apple 控制的 MMP 和付费墙分析数据。
  - risk: 现有厂商打包——AppTweak、SplitMetrics 或并购后的 MobileAction 上线治理式实验队列
    likelihood: Medium
    impact: High
    leadingIndicator: 上述三家竞争对手中任何一家，在公开更新日志或大会主题演讲里发布带负责人分配、实验审批或增量核算的功能。
    mitigation: 在增量核算和 agency-overlay 工作流上跑得更快，因为这两项都要求经营模式变化，现有厂商通常慢；在它们补齐之前先用每周节奏嵌入建立切换成本。
  - risk: 归因怀疑——买方不信增量判断，回到旧工具
    likelihood: Medium
    impact: Medium
    leadingIndicator: 试点客户在首轮实验后开始失去参与度，并把“不相信增量测量结果”列为首要原因。
    mitigation: 先用保守、面向财务的实验模板、标准化控制窗口和简单的前后回本视图切入，不在第一周就夸大因果结论。
  - risk: 初始 SAM 太小，不扩张就撑不起 venture 回报
    likelihood: High
    impact: Medium
    leadingIndicator: 第 2 年管线里，英语市场与 GCC 滩头的合格账户少于 80 个；如果没有第二细分，ARR 增长就会卡在 $2M 以下。
    mitigation: 把 Android / Google Play 扩张和基准数据产品写成明确的第 2–3 年里程碑；在验证扩张意愿前，不要在 iOS-only 上停留太久。
  - risk: 代理商惯性阻碍采用——现有代理商排斥治理层监督
    likelihood: Medium
    impact: Medium
    leadingIndicator: 超过 40% 的试点流失把“代理商反对”列为不续约的主因，而不是产品价值不足。
    mitigation: 把产品定位成代理商执行前的规划与治理层，先降低它们的协同成本；同时设计 agency-partner 层级，对齐激励。
operatingAssumptions:
- assumption: 目标 ICP 愿意每年支付 $18k–$24k，买一层中立实验治理产品；价格高于点工具、低于额外代理商 retainer。
  basis: research.yaml
  validationTest: 五次共创客户访谈里，要让对方披露当前工具栈成本和代理商 retainer；至少有三家确认，如果试点能替掉每周代理商报表，他们愿意拨出 $18k–$24k。
  decisionImpact: 如果不成立，价格就必须降到 $10k–$14k 区间，更接近 AppTweak / SplitMetrics 的企业档；这会压低初始 ARR，并让到达 SOM 的时间再拉长 6–9 个月。
- assumption: 一个 30 天的实验队列试点，只要替掉团队现有的每周复盘流程，就足以证明价值并转成年度合同。
  basis: operator judgment
  validationTest: 跟踪前五个试点的 pilot-to-contract 转化率；如果低于 40%，就要延长试点设计，或找出缺失的关键集成。
  decisionImpact: 如果不成立，销售周期会拉长到 60–90 天，CAC 上升，而种子资金支持下前 12 个月可触达的客户数会下降。
- assumption: 跨应用基准图谱在 10–15 个活跃账户、90+ 天实验历史后，就能具备可信度并开始收费。
  basis: operator judgment
  validationTest: 到第 12 个月，对基准模块潜在客户做调研，测试他们对数据可信度的感知，并把匿名样本与客户自有账户数据质量做比较。
  decisionImpact: 如果阈值更高（例如 30+ 个账户），基准模块收入就会推迟到第 3 年以后，第 2 年财务模型里的 upsell 收入也要拿掉。
- assumption: agency-overlay 模式可行：代理商愿意执行产品里已批准的实验改动，而不要求自己掌控治理流程。
  basis: research.yaml
  validationTest: 跑一个结构化试点：由创业公司设定实验优先级，代理商只负责执行获批改动；看每个周期里代理商对获批事项的执行率能否超过 80%。
  decisionImpact: 如果不成立，产品就必须自建 Apple Ads 执行层，工程范围会明显变大，也会更直接地和 SplitMetrics Acquire 正面竞争。
- assumption: Apple 不会在产品上线后 18 个月内，自己推出带第三方付费墙集成和负责人分配的原生跨职能实验队列。
  basis: research.yaml
  validationTest: 每个季度跟踪 Apple WWDC 发布、App Store Connect 更新说明和 Apple Ads 伙伴通报，留意原生治理功能。
  decisionImpact: 如果不成立，核心差异化就会收缩到基准数据和增量方法论，公司可能需要转向数据产品或咨询模式。
experimentRoadmap:
- horizon: 0–90 天
  experiment: ICP 痛点验证——与目标 ICP 的增长负责人做 5 次付费共创客户访谈
  hypothesis: 相比“更好的关键词建议”，Head of Growth 更愿意为实验优先级排序和回本问责买单。
  successMetric: 5 位受访者里至少 3 位确认，核心缺口是治理与增量，而不是更多数据；至少 2 位同意付费试点。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: MVP 实验队列原型——做出只读的 Apple Ads + App Store Connect 接入，并为 1 个共创客户生成每周动作优先级列表
  hypothesis: 只要把负责人分配清楚，排好优先级的实验队列就能替掉团队现在的表格复盘，并在前两周内被自然使用。
  successMetric: 共创客户连续 4 周都在产品里做每周规划，没有退回原来的表格或仪表盘。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 增量核算试点——与 1 个客户跑受控实验窗口，把 Apple Ads 搜索词报表基线和实际回本变化做对照
  hypothesis: 对月花费 $100k+ 的团队来说，只要控制好实验窗口，Apple Ads 搜索词数据就足以把真实新增安装和品牌蚕食拆开。
  successMetric: 试点账户里的财务伙伴，在季度复盘里把这套增量结果当作解释 CAC 或回本变化的主依据。
  owner: 创始工程师 + 客户增长负责人
- horizon: 90–180 天
  experiment: agency-overlay 试点——由产品决定实验优先级，现有代理商执行获批改动
  hypothesis: 只要把产品表述成减少协同成本，而不是取代代理商判断，代理商就愿意执行治理层下发的实验。
  successMetric: 代理商在约定时间内执行 ≥80% 的获批实验改动；60 天后，客户没有退回由代理商单独主导的优先级安排。
  owner: 创始人 / CEO + 客户成功
- horizon: 180–270 天
  experiment: 试点转合同测试——把前 3 个共创客户转成年付合同，并达到目标 ACV
  hypothesis: 只要 30 天试点能明确提升实验吞吐，并至少产出 1 个和回本挂钩的结果，就能以 $18k–$24k ACV、≥50% 的比例转成年付合同。
  successMetric: 3 个共创客户里有 2 个在试点结束后 30 天内签下年度合同，且无需把价格降到 $16k ACV 以下。
  owner: 创始人 / CEO
- horizon: 270–360 天
  experiment: 伙伴渠道测试——与 1 位 Apple Ads 专家顾问或精品应用增长代理商达成联合销售 / 转介绍协议
  hypothesis: 只要代理商还能看到治理层视图，这种转介绍安排就能每季度稳定带来至少 2 个合格线索，而不破坏现有代理关系。
  successMetric: 伙伴在首个季度带来 2+ 个合格介绍，且至少 1 个转成付费试点。
  owner: 创始人 / CEO
- horizon: 270–360 天
  experiment: 基准模块需求测试——向 5 个现有客户软启动 $6k 附加价的基准数据模块
  hypothesis: 只要给出和具体关键词品类或市场相关的样例输出，拥有 90+ 天实验历史的客户就愿意为匿名化跨应用基准付费。
  successMetric: 5 个客户里至少有 3 个在看到样例 30 天内买单；没有客户因为“别处也有基准”而取消核心订阅。
  owner: 创始人 / CEO + 创始工程师
operations:
- 用只读 OAuth 管理 Apple Ads API 与 App Store Connect API 集成；所有数据使用政策都文档化，方便法务型客户做隐私审查。
- 通过 Adjust 或 AppsFlyer API 接入移动归因平台（MMP），拿到后链路的试用和订阅回本数据。
- 第 1 天先用规则引擎生成每周实验队列；等有了 10+ 个客户、90+ 天结果数据后，再演进成 ML 排序。
- 客户 onboarding 手册：前 2 周接好集成，第 3 周交付首份实验计划，第 4–8 周做每周节奏复盘，在续约风险出现前先把采用跑通。
- 数据安全与合规：v1 只给只读连接器，不提供广告执行权限；同时把数据使用说明写清楚，方便更偏企业的客户过安全审查。
- 从第 1 天就用 CRM（HubSpot 或同类工具）管理管线和试点转化。
team:
- role: 创始人 / CEO（GTM 负责人）
  startTiming: Month 0
  rationale: 需要有直接操盘消费型订阅应用增长，或主导 Apple Ads / ASO 工具的经验；负责 ICP 外呼、共创客户管线和早期客户成功。
- role: 创始工程师（全栈 + 数据集成）
  startTiming: Month 0
  rationale: 负责搭 Apple Ads API、App Store Connect 集成、实验队列引擎和数据标准化层；必须熟悉 Apple API 的约束和限流。
- role: 客户成功 / 增长分析师
  startTiming: Month 4
  rationale: 负责试点 onboarding、每周实验计划交付和回本报告；最好有深度 iOS 增长经验；在销售扩张前先把采用闭环跑通。
- role: 第二名工程师（数据管道 + 基准图谱）
  startTiming: Month 8
  rationale: 当 6+ 个客户上线后，需要他来搭跨应用数据标准化、增量模型和基准图谱基础设施，为 Series A 做准备。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 5 次 ICP 共创客户访谈，确认治理和增量是首要付费驱动（第 1–2 个月）。
  - 为首个共创客户上线带 Apple Ads + App Store Connect 集成的 MVP 实验队列（第 2–3 个月）。
  - 拿下 3 个付费试点账户，ACV 达到 $18k–$24k（第 4–6 个月）。
  - 至少为 2 个试点账户交付增量核算，并得到财务方认可（第 6–8 个月）。
  - 3 个试点里有 2 个转成年付合同；ARR 达到 $48k–$72k（第 8–10 个月）。
  - 总付费客户数达到 5–8 个；到第 12 个月 ARR 达到 $90k–$160k。
  - 上线 1 个伙伴渠道转介绍安排，合作对象为 Apple Ads 专家或精品应用增长代理商。
- horizon: 12–24 个月
  items:
  - 付费客户数达到 20–30 个；ARR 达到 $400k–$700k。
  - 上线跨应用基准图谱：10+ 个账户、90+ 天实验历史；并推出 $6k–$12k 的基准附加模块。
  - 加入第二名工程师；开始支持多应用资产和 agency-overlay 工作流。
  - 签下首个代理商合作协议，让伙伴账户可以接入治理层。
  - 用本地化 onboarding 手册扩到 UK 和 GCC 市场。
  - 募集 seed 轮（$2M–$4M），支撑 18 个月跑向 Series A 指标。
- horizon: 24–36 个月
  items:
  - 付费客户数达到 50–70 个；ARR 达到 $1.2M–$1.8M，逼近研究里的 $1.4M SOM。
  - 上线付费墙分析集成（RevenueCat 或 Superwall），拿到 cohort 级订阅回本。
  - 上线 Android / Google Play 治理模块，做第二个平台产品。
  - 通过应用资产扩张和基准模块 upsell，把净收入留存做到 ≥115%。
  - 围绕 CAC 回本、NRR 和跨应用基准差异化，搭好 Series A 融资管线。
risks:
- risk: Apple 平台依赖——API 或政策变化削弱核心数据或实验工作流
  likelihood: Medium
  impact: High
  mitigation: 用只读连接器和清晰的数据使用政策起步；从第 6 个月开始接入 MMP 和付费墙分析，让产品即便 Apple 数据部分退化也能继续提供价值。
- risk: 现有厂商打包——AppTweak、SplitMetrics 或 MobileAction/InMobi 上线治理式实验队列
  likelihood: Medium
  impact: High
  mitigation: 优先把增量核算和 agency-overlay 工作流做深，因为这两项要求经营模式变更，现有厂商结构上更慢；在它们跟进前先靠每周节奏建立切换成本。
- risk: 归因与增量怀疑——买方不信效果判断，回到旧工具
  likelihood: Medium
  impact: Medium
  mitigation: 用保守的实验模板、标准化控制窗口和简单的前后回本视图切入；在增量结论之前，先把实验吞吐和责任清晰度做出价值。
- risk: SAM 太小，不扩张就撑不起 venture 回报
  likelihood: High
  impact: Medium
  mitigation: 把 Android 扩张和基准数据产品写成明确的第 2–3 年里程碑；并在第 2 年融资前，先用现有客户验证扩张意愿。
- risk: 代理商惯性——现有代理商排斥治理层监督
  likelihood: Medium
  impact: Medium
  mitigation: 把产品定位成降低代理商协同成本，而不是替代代理商；同时给代理商做一个可见性工具层，让他们在竞争威胁显性化前先把产品当补充。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2M–$4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道将用于：支付创始团队薪酬（CEO + 1–2 名工程师）、完成 Apple Ads 和 MMP 集成、把 5–8 个共创客户试点转成年付合同、在第 4 个月招客户成功、第 8 个月招第二名工程师，并建立初步伙伴渠道协议——目标是把 ARR 做到 $400k–$700k、付费客户数做到 20–30 个，作为 Series A 入场指标。
