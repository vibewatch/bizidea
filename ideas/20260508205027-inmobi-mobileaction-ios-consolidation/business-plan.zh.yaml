slug: ios-growth-control-plane
date: 2026-05-08
executiveSummary: >-
  InMobi 收购 MobileAction，基本坐实了一件事：Apple Ads 和 ASO 情报能力正在并入更大的全栈广告平台。对中型消费类订阅应用发行商来说，
  真正缺的不是再多一套工具，而是一层中立的运营系统，帮他们把投放治理管起来。拟议中的公司要做的就是这层系统：一套每周运行的 iOS 增长控制台， 接入 Apple Search Ads 数据、App Store
  页面元数据、历史创意和付费墙转化结果，再产出一份排好优先级的实验队列，明确负责人、预算护栏和增量归因。 第一批理想买家，是 Series A-C 阶段订阅应用里的 Head of Growth 或 VP
  Performance Marketing——他们每月在 Apple Search Ads 上花 $100k+，内部 UA 团队精简， 同时还在积极做区域扩张。今天这类团队往往靠代理商表格、ASO
  仪表盘和人工财务复盘硬拼流程；一旦 CAC 上升、又要多市场上线，这套做法就会失灵。公司要赢，不靠再卖更多数据， 而是要把关键词预算、custom product page
  调整、商店页文案变化和回本责任之间那条每周决策链真正拿在手里——这是打包式广告网络工具和代理商在结构上都很难做到的事。 研究底稿的自下而上测算说明，在英语市场和 GCC 市场，这个机会对应的 SAM 约为
  $28.8M，按 $24k ACV 估算，第 3 年 SOM 约为 $1.4M、约 60 家客户；TAM
  和市场规模数字均为模型估算，不是审计数据，后续还会由财务模型继续细化。最大的反证风险在于：增长负责人也许更愿意在现有 Apple Ads 伙伴套件上加服务，而不是再采纳一层独立治理软件。
problem:
  - >-
    Apple Ads 出价、ASO、custom product page 测试和创意分析分散在不同流程里——点工具、代理商
    deck、表格各管一段；团队没有统一节奏去决定先测什么、花多少钱，以及结果到底是不是新增。
  - 当 iOS 工具并入全栈广告平台后（例如 InMobi+MobileAction）；中型发行商更容易拿到带媒体销售激励的黑箱套装，而不是一层能建议减少投放、也能要求代理商负责的中立运营系统。
  - 增长负责人很难向财务解释 CAC 和 payback 为什么波动，由于投放决策和商店页改动从未在一个地方被完整记录，也没有和结果一起回看。
solution:
  - 每周运行的 iOS 增长控制台：接入 Apple Search Ads 活动、App Store Connect 元数据、创意素材库和付费墙分析，输出一份排好优先级的实验清单，附带负责人、预算护栏和明确测试窗口。
  - 增量归因层：把真实拉升、品牌词蚕食和付费/自然重叠拆开看，让财务在面对 CAC 波动时有一套讲得清、站得住的解释。
  - 跨应用基准图谱：持续积累匿名化的关键词意图、custom product page 表现、创意母题和订阅 payback 数据；客户越多，这张图越有价值。
  - 中立治理定位：产品收入来自 SaaS 合同，不吃媒体返点，因此它能建议砍预算、推翻代理商的 campaign 选择，或下调品牌词优先级，而不会和自身激励冲突。
whyWeWin:
  - 中立性本身就是结构优势：和 MobileAction（现归入 InMobi）、AppTweak、SplitMetrics 不同，产品不卖媒体，也不代管投放，因此能提出广告网络工具往往不愿意给出的“少花钱”建议。
  - 比起数据广度，更更关键的是流程深度：竞争对手卖的是情报和仪表盘；这款产品抓住的是每周运营节奏——谁批准了实验、冒了多少预算风险、结果是不是新增——切换成本来自流程嵌入，而不是单纯数据堆积。
  - 增量归因难做，而现有厂商大多没真正补上：AppTweak、SplitMetrics、App Radar 走到的是优化建议，并没有把实验设计、责任人和 payback 放进同一套可审计系统。
  - 跨账户基准护城河会随规模变深：每多一个客户，就会多一批匿名化的关键词/CPP/payback 信号；现有厂商之所以攒不出同样的数据形态，是由于它们并不处在审批流程里。
  - 购买触发又尖又频繁：区域上线和 CAC 飙升，是订阅应用季度里反复出现的痛点，这给了创业公司一个可重复的切入点——预算负责人清楚，成功条件也能量化。
strategicChoices:
  beachhead: 游戏相邻、健康、语言学习和工具类订阅应用；每月在 Apple Search Ads 上花 $50k–$300k，覆盖 3–10 个国家， 增长团队规模 5–20 人，主要分布在美国、英国或 GCC 市场。
  wedgeRationale: >-
    这批客户已证实自己愿意为 Apple Ads 花钱，团队又不够大，养不起更多分析师；同时他们又反复被区域上线和 CAC 复盘这类情境击中，
    和产品的每周实验队列天然对上。先打这批客户，能比直接做企业级发行商（销售周期更长、IT 审批更重）或休闲游戏工作室（增长逻辑不同、ASO 复杂度更低） 更快打出 ROI 证实和跨应用基准数据。
  sequencingRationale: >-
    先把 Apple Ads、App Store Connect 和一个 MMP 接好，再慢慢往 paywall analytics 和 review-management connector 扩，
    这样前期设计伙伴就能先跑起来，而不会为了追求“全能”把产品做得过宽。销售团队也别急着堆，先补 customer success，证实 adoption loop 跑顺之后再加速获客。 Benchmark
    模块也别太早卖——至少要有 10–15 个客户、持续 90+ 天实验历史，数据够厚，基准才有说服力。
  notYet:
    - Android 和 Google Play ASO——工具生态和买家画像都不同；等 iOS 剧本跑通后再说。
    - 创意制作服务（设计、视频）——一上来就做服务，会把产品拖进代理商经济学，丢掉中立性。
    - Programmatic 或非 Apple 广告渠道管理——太早扩张，会把“iOS 中立治理层”这个叙事做散。
    - 面向消费者的功能，或 review reply 自动化——以后可能有用，不过现在会在实验队列还没 PMF 前把范围拉太大。
    - 卖给 VC 的投资基准数据产品——要等跨应用图谱够深之后才成立。
market:
  tam: $144M（自下而上：500k MobileAction 广告主覆盖 × 1.2% 目标拟合度 × $24k ACV；模型估算）
  sam: $28.8M（英语市场和 GCC 首发市场，占 TAM 单位基数的 20%，按 $24k ACV 估算；模型估算）
  som: $1.4M 第 3 年（60 家客户 × 约 $24k ACV，通过创始人主导销售和合作渠道获取；模型估算）
  segments:
    - 每月在 Apple Search Ads 上花 $50k–$300k、内部 UA 团队精简的 Series A–C 消费类订阅应用
    - 在多个地区管理 3–10 个 iOS storefront 的中型移动发行商中的 UA 经理和 ASO 负责人
  buyingProcess: >-
    经济买家是 VP Growth 或 Head of Performance Marketing；技术评估者则通常是 UA 经理或 ASO 负责人。 标准销售周期约 4–8 周，先用一个 30 天 pilot
    替换团队现有的每周复盘流程，跑出 CAC 下降或实验周转更快的证据后，再转为年度 SaaS 合同。
product:
  mvp: >-
    Apple Search Ads + App Store Connect 的只读集成，产出每周排好优先级的实验队列，附带负责人、预算护栏，以及简单的前后对比安装与 trial payback 视图； 覆盖 1 个
    app property、最多 5 个 iOS 市场。
  sixMonth: |-
    新增一个 MMP 集成（如 Adjust 或 AppsFlyer），把后续 trial 与订阅 payback 接进来；上线 custom product page 实验跟踪；推出决策日志模块，
     让每次批准和否决都能审计；落地 5–8 家共创客户账户。
  twelveMonth: >-
    上线跨应用 benchmark 图谱（至少 10 个账户、90 天实验历史）；支持多 app property；加上面向财务的 CAC 与 payback 复盘看板； 开始试 agency-overlay
    模式，让代理商在产品里执行已批准的实验变更。
  twentyFourMonth: >-
    接入 paywall analytics（RevenueCat 或 Superwall），把 cohort 级订阅 payback 拉进来；推出高级 benchmark 模块做 upsell；加入 review
    signal feed， 把用户反馈转成商店页实验 backlog；撑起美国、英国和 GCC 超过 50 个活跃账户。
  keyBets:
    - 每周排好优先级的实验队列，比再多一个分析看板更值钱——买家最终是靠优先级推进，而不是靠更多图表行动。
    - 在受控实验窗口和 Apple Ads search-term report 的配合下，把付费拉升和品牌词蚕食分开看，在技术上是可行的。
    - 只要赶在现有厂商打包类似治理层之前先把跨应用实验结果图谱攒起来，它就会成为长期护城河。
    - agency-overlay 模式是个可行落地路径——产品负责治理，代理商负责执行，启动阶段先别和代理商正面冲突。
gtm:
  wedge: >-
    由创始人主导外呼，直接找那些已在 3 个以上市场投 Apple Search Ads、并至少已用了一个 ASO 工具或代理商的 Series A–C 订阅应用增长负责人； 最好卡在 CAC
    压力或区域上线事件发生时切入。
  channels:
    - 创始人直销 VP Growth 和 UA 负责人，重点先打英语市场与 GCC 市场（0–12 个月主渠道）
    - Apple Ads 专家顾问和精品应用增长代理商，做 referral 与 co-sell 合作
    - iOS 增长社群（Mobile Growth Association、AppGrowthNetwork 活动、Slack 群组）
    - 内容分发：持续发布每周 iOS 增长 benchmark 数据与实验案例，建立行业心智
  funnelTargets: 外呼触达 → 合格需求发现通话 15–25%；需求发现通话 → 30 天试点 40–50%；试点 → 年度合同 55–65%
  pricing: >-
    按 app property 数量和 Apple Ads 受管月度花费定价。入门档：1 个 app、每月投放不超过 $150k，ACV 约 $18k–$24k； Growth 档：最多 3 个 app 或每月投放
    $500k，ACV 约 $36k–$60k；高级 benchmark 模块另加 $6k–$12k。 这个定价高于点工具组合（ASO + 报表工具一年 $3k–$10k），不过低于一名兼职 UA 分析师或代理商
    retainer（每月 $5k–$15k）；产品本来就是冲着替代其中一部分成本去的。
businessModel:
  revenueStreams:
    - 年度 SaaS 订阅（按 app property 数量和 Apple Ads 受管花费分层）
    - 高级跨应用 benchmark 模块（给更大发行商做加购）
    - 从代理商或表格流程迁移过来的客户导入服务费（有时限，不做经常性收入）
  unitOfValue: 受治理的 app property + 每月 Apple Ads 花费
  targetGrossMarginPct: 72
  expansionLevers:
    - 客户上线新应用或进入新市场时，追加 app property
    - 当跨账户图谱深度够（10+ 账户、90+ 天）后，向现有客户 upsell benchmark 模块
    - 向 Android / Google Play 增长治理扩展，做第二个平台产品
    - 在后期把匿名 benchmark 数据卖给投资人和应用行业分析方
strategyMap:
  northStarMetric: 每月至少跑一个受治理实验的客户 app property 数量
  inputMetrics:
    - 每个活跃客户账户每周批准的实验数
    - 记录了实验结果的 Apple Ads 预算决策占比（相对未记录变更）
    - 从提出实验假设到在产品里看到首轮结果的时间
    - pilot 转年度合同的转化率
    - 净收入留存率（通过新增 app property 或 benchmark 模块 upsell 拉升）
  moatsToBuild:
    - 跨应用实验结果图谱：关键词意图 → CPP 表现 → 订阅 payback，按品类和市场沉淀
    - 流程嵌入：每周节奏一旦建立，产品就会变成团队的操作习惯，而不是查一眼就走的参考工具
    - 增量归因方法论 IP：做出财务团队愿意信的标准化实验模板和受控窗口设计
    - 代理商集成网络：一旦代理商也在产品中记录执行动作，它们会从阻力变成渠道
  killCriteria:
    - 90 天后，pilot 客户转年度合同比例低于 30%
    - 做完 6 次共创客户访谈后，没有任何客户把增量归因视为主要购买原因
    - 上线后 12 个月内，AppTweak、SplitMetrics 或 Apple Ads 原生工具中，有两家以上推出带负责人分配的治理型实验队列
    - 种子阶段，公司自身获客的中位 CAC 回本周期超过 24 个月
  mermaid: |
    flowchart LR
      Beachhead[Series A-C subscription apps\nApple Ads + geo launch pain] --> MVP[Weekly experiment queue\nApple Ads + ASO integrations]
      MVP --> Proof[5-8 家共创客户\nCAC 与回本改善]
      Proof --> Moat[Cross-app benchmark graph\nagency-overlay workflow]
      Moat --> Expansion[Multi-app properties\npremium benchmark module\nAndroid expansion]
investorMemo:
  verdict:
    call: 值得会面并继续调查
    conviction: 中等把握——切口具体、时机也对，不过市场规模偏小、竞争拥挤，需要先通过共创客户证实再决定是否重注。
    whyBelieve: InMobi–MobileAction 交易恰好在 Apple Ads 预算持续增长、多市场上线变多、而现有厂商又不太可能主动建议客户少花钱的节点上，打开了一个中立治理层的空档。
    whyDoubt: 初始市场的 SAM 只有约 $29M，同时增长负责人可能更愿意延展现有 Apple Ads 伙伴套件合同，而不是再上一层新的 SaaS，这会让真实可付费市场在几年内都偏小。
    nextDiligence: 先做 5 次付费 ICP 共创客户访谈，确认客户真正愿意付费的点，到底是治理与增量归因责任，还是只是“推荐更好”。
  firstCustomer:
    title: Series A–C 消费类订阅应用的 Head of Growth
    profile: >-
      15–40 人团队，增长职能 3–8 人，每月 Apple Search Ads 预算 $100k–$250k，正在进入 3–6 个新 iOS 市场，手上已有一个 ASO 工具和一家 Apple Ads
      代理商。
    trigger: 一次区域上线或季度 CAC 复盘里，增长负责人解释不清为什么安装涨了、但多个市场的订阅 payback 反而变差。
    buyer: VP Growth 或 Head of Performance Marketing
    initialContract: 覆盖 1 个 app property、最多 5 个市场的年度 pilot 合同，价格 $18k–$24k；落地路径是一个 30 天实验队列 pilot，替换团队现有每周代理商或表格复盘。
  mustBeTrue:
    - 至少 30% 的目标 ICP 愿意为一层中立实验治理系统付费 $18k–$24k/年，而不是把预算继续加到现有 Apple Ads 伙伴套件合同里。
    - 增量归因这件事——把品牌词蚕食和真实 iOS 需求拆开——在 Apple Ads search-term report 和受控实验窗口里能做成产品能力，而不止是营销口号。
    - 10+ 客户的跨应用实验结果数据，能慢慢积累成 AppTweak、MobileAction 或 SplitMetrics 不容易复制的 benchmark 资产，除非它们重做自己的数据模型。
    - agency-overlay 模式可行：至少在 pilot 期，增长团队愿意让第三方工具来管实验优先级和预算护栏，再由原代理商执行具体 campaign 变更。
    - 在 18 个月产品窗口里，Apple 不会自己推出一套带负责人分配、预算治理和第三方 paywall 集成的原生跨职能实验队列。
  diligenceQuestions:
    - 在目标 ICP 最近 5 次区域上线或 CAC 复盘里，有多少次留下了把投放改动和 payback 结果连起来的实验日志？当时用的是什么工具？
    - 目标 ICP 目前在 Apple Ads 管理代理商和 ASO 工具上的年支出到底是多少？其中多少是可自由调整的，多少已被合同锁死？
    - 过去 6 个月里，AppTweak、SplitMetrics 或 MobileAction/InMobi 有没有公开宣布或上线带负责人分配和增量归因的治理型实验队列？
    - 跨应用 benchmark 图谱至少要积累多少账户、多少轮实验，客户才会觉得够可信，并愿意为此加价？
    - agency-overlay 会怎样影响代理商关系——代理商把这类产品看成补充，还是直接威胁自己 retainer 的范围？
    - Apple 在 App Store Connect 的 product page optimization 与原生实验方向上，推进节奏走到哪了？它把“实验队列”这个原语做成原生功能的速度会有多快？
  riskHeatmap:
    - risk: Apple 平台依赖——API 或政策变化削弱核心数据或实验流程
      likelihood: Medium
      impact: High
      leadingIndicator: Apple 在开发者 beta 中宣布新的 App Store Connect 自动化能力，或限制第三方 search-term 数据访问
      mitigation: 先从只读 connector 和决策流程价值做起，哪怕部分数据质量下降，产品仍有价值；同时尽早接入 MMP 和 paywall analytics，压低对 Apple 单一来源的依赖。
    - risk: 现有厂商打包——AppTweak、SplitMetrics 或并购后的 MobileAction 推出治理型实验队列
      likelihood: Medium
      impact: High
      leadingIndicator: 这三家中任意一家在公开 changelog 或大会 keynote 中发布带负责人分配、实验审批流程或增量归因的新功能
      mitigation: 更快把增量归因和 agency-overlay 流程做深——这些都需要运营模式变化，现有厂商通常推进较慢；要趁它们出手前，先把每周节奏嵌进客户团队里。
    - risk: 归因与增量归因可信度不足——买家不信拉升结果，回到旧工具
      likelihood: Medium
      impact: Medium
      leadingIndicator: pilot 客户在第一轮实验后显著降温，并把“不相信拉升测量”作为主要原因
      mitigation: 先用保守、财务导向的实验模板、标准控制窗口和简单的前后 payback 视图建立信任，不急着在第一周就宣称因果拉升。
    - risk: 初始 SAM 太小，不扩张就很难撑起风险投资回报
      likelihood: High
      impact: Medium
      leadingIndicator: 到第 2 年，英语市场和 GCC 滩头里合格 pipeline 少于 80 个账户，ARR 不扩第二市场就很难突破 $2M
      mitigation: 把 Android/Google Play 扩展和基准数据产品明确列为第 2–3 年里程碑；不要在 iOS 单点上停太久才开始证实扩张。
    - risk: 代理商惯性阻碍采纳——现有代理商抵触治理层监督
      likelihood: Medium
      impact: Medium
      leadingIndicator: 超过 40% 的 pilot 流失把代理商阻力，而不是产品价值不足，列为首要不续约原因
      mitigation: 把产品定位成代理商执行前的规划与治理层，帮其减少协同开销；同时做出 agency-partner 档位，把激励对齐。
operatingAssumptions:
  - assumption: 目标 ICP 愿意为中立实验治理层付费 $18k–$24k/年——高于点工具、低于多请一层代理商服务。
    basis: research.yaml
    validationTest: 做 5 次共创客户访谈，拿到客户现有工具栈成本和代理商 retainer；至少 3 位确认，只要试点能替代每周代理商报表，就愿意拿出 $18k–$24k 预算。
    decisionImpact: 如果不成立，价格就得降到 $10k–$14k，贴近 AppTweak/SplitMetrics 的企业档；这样会压低前期 ARR 曲线，把打到 SOM 的时间再往后拖 6–9 个月。
  - assumption: 用 30 天实验队列 pilot 替代团队每周复盘流程，够证实价值并转成年度合同。
    basis: operator judgment
    validationTest: 跟踪前 5 个 pilot 的转合同率；如果低于 40%，就要重做 pilot 设计，或找出实现价值前还缺哪一个集成。
    decisionImpact: 如果不成立，销售周期会拖到 60–90 天，CAC 上升，种子轮 12 个月内能打下来的客户数也会跟着缩水。
  - assumption: 跨应用 benchmark 图谱在 10–15 个活跃账户、90+ 天实验历史后，就够可信，也能单独收费。
    basis: operator judgment
    validationTest: 到第 12 个月，向 benchmark 模块潜在买家展示匿名样本，并对照他们自己的数据质量，判断他们是否认可其可信度。
    decisionImpact: 如果真实门槛更高（例如 30+ 账户），benchmark 模块收入就会推迟到第 3 年之后，Year 2 财务模型里少掉一条 upsell 收入线。
  - assumption: agency-overlay 模式成立——代理商愿意执行产品中已批准的实验，而不一定要掌控治理流程本身。
    basis: research.yaml
    validationTest: 跑一个结构化 pilot，由创业公司确定实验优先级，代理商只负责执行；观察其执行率是否超过每轮批准事项的 80%。
    decisionImpact: 如果不成立，产品就得自己补一层 Apple Ads 执行能力，工程范围会立刻膨胀，也会更直接撞上 SplitMetrics Acquire。
  - assumption: Apple 在上线后 18 个月内，不会推出带第三方 paywall 集成与负责人分配的原生跨职能实验队列。
    basis: research.yaml
    validationTest: 每季度跟踪 Apple WWDC 发布、App Store Connect 更新说明和 Apple Ads partner briefing，看是否出现原生治理能力。
    decisionImpact: 如果不成立，核心差异就会缩窄到 benchmark 数据和增量归因方法论，届时可能得往数据产品或咨询模式调整。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: ICP 痛点证实——与目标 ICP 的增长负责人进行 5 次付费共创客户访谈
    hypothesis: 相比“给更好的关键词建议”，Head of Growth 更愿意为实验优先级和 payback 责任归因付费
    successMetric: 至少 5 人中的 3 人明确表示，治理与增量归因才是核心缺口；至少 2 人愿意进入付费 pilot
    owner: 创始人 / CEO
  - horizon: 0–90 天
    experiment: MVP 实验队列原型——做出只读的 Apple Ads + App Store Connect 接入，给 1 家共创客户产出每周动作清单
    hypothesis: 带负责人分配的实验队列能替代团队现有的表格复盘，并在前两周内被主动使用
    successMetric: 共创客户连续 4 周在产品里开每周规划会，不回退到原来的表格或仪表盘
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 增量归因 pilot——在 1 个客户上跑受控实验窗口，用 Apple Ads search-term report 基线对照实际 payback 变化
    hypothesis: 对于每月花费 $100k+ 的团队，基于 Apple Ads search-term 数据的受控实验窗口，够把新增安装和品牌词蚕食拆开
    successMetric: pilot 客户中的财务合作方，在季度复盘里愿意把这份增量归因输出当成解释 CAC 或 payback 变化的主依据
    owner: 创始工程师 + 客户侧 Head of Growth
  - horizon: 90–180 天
    experiment: agency-overlay pilot——由创业公司管实验优先级、现有代理商执行已批准动作
    hypothesis: 只要把产品说成“减少协同开销”而不是“取代代理商判断”，代理商会配合执行治理层指令
    successMetric: 代理商在约定时限内执行 ≥80% 的已批准实验变更；60 天后客户没有回退到完全由代理商主导优先级
    owner: 创始人 / CEO + customer success
  - horizon: 180–270 天
    experiment: 试点转合同测试——把前 3 家共创客户以目标 ACV 转成年合同
    hypothesis: 只要 30 天 pilot 能证实实验吞吐拉升，并至少跑出 1 个与 payback 相关的结果，就能以 $18k–$24k ACV 达到 ≥50% 年度转化
    successMetric: 3 家里至少 2 家在 pilot 结束后 30 天内签年合同，且不把价格压到 $16k ACV 以下
    owner: 创始人 / CEO
  - horizon: 270–360 天
    experiment: 合作渠道测试——与 1 家 Apple Ads 专家顾问或精品应用增长代理商签 co-sell/referral 协议
    hypothesis: 只要代理商还能保有治理层可见性，这种 referral 安排每季度至少能带来 2 个合格介绍，而不会伤害现有代理商关系
    successMetric: 首个季度拿到 2 个以上合格介绍，且至少 1 个转为付费 pilot
    owner: 创始人 / CEO
  - horizon: 270–360 天
    experiment: benchmark 模块需求测试——面向 5 个现有客户软上线 benchmark 数据模块，定价 $6k 附加费
    hypothesis: 对已积累 90+ 天实验历史的客户来说，只要看到和特定关键词品类或市场绑定的样例输出，就会愿意为匿名跨应用 benchmark 付费
    successMetric: 5 个客户里至少 3 个在看到样例后 30 天内购买加购；没有客户因“市场上其他地方也能拿到 benchmark”而取消核心订阅
    owner: 创始人 / CEO + 创始工程师
operations:
  - Apple Ads API 和 App Store Connect API 通过只读 OAuth 接入；所有数据使用策略都沉淀出文档，方便客户法务和隐私审核
  - 通过 Adjust 或 AppsFlyer API 接入移动归因平台，把后续 trial 和订阅 payback 一起拉进来
  - 第一天先用规则引擎生成每周实验队列；等到 10+ 客户、90+ 天结果数据后，再逐步演进成 ML 排序
  - 客户导入手册：前 2 周完成集成，第 3 周交第一版实验计划，第 4–8 周跑每周节奏复盘，先证实采用，再担心续约
  - 数据安全与合规：v1 只有只读 connector，没有广告执行权限；同时把数据用途写清楚，帮偏企业化客户过安全审查
  - 从 Day 1 开始用 CRM（HubSpot 或同类工具）管理 pipeline、pilot 和转化
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 必须真的做过消费类订阅应用增长，或带过 Apple Ads / ASO 工具；负责 ICP 外呼、共创客户 pipeline 和前期客户成功。
  - role: 创始工程师（全栈 + 数据集成）
    startTiming: Month 0
    rationale: 负责 Apple Ads API 与 App Store Connect 集成、实验队列引擎和数据标准化层；需要熟悉 Apple API 的约束和 rate limit。
  - role: 客户成功 / 增长分析师
    startTiming: Month 4
    rationale: 支持试点导入、每周实验计划交付和 payback 报告；最好有深度 iOS 增长经验；在扩大销售前先把采用闭环跑顺。
  - role: 第二位工程师（数据管道 + benchmark 图谱）
    startTiming: Month 8
    rationale: 当 6+ 客户上线后，需要有人把跨应用数据标准化、增量归因模型和 benchmark 图谱基础设施搭起来，为 Series A 做准备。
milestones:
  - horizon: 0–12 个月
    items:
      - 完成 5 次 ICP 共创客户访谈，确认治理与增量归因是核心付费驱动（第 1–2 个月）
      - 为第一家共创客户账户上线 Apple Ads + App Store Connect 的 MVP 实验队列（第 2–3 个月）
      - 上线 3 家付费 pilot，ACV 为 $18k–$24k（第 4–6 个月）
      - 至少 2 家 pilot 客户交付增量归因结果，并获得财务利益相关方认可（第 6–8 个月）
      - 把 3 家 pilot 中的 2 家转为年合同；ARR 到达 $48k–$72k（第 8–10 个月）
      - 累计 5–8 家付费客户；第 12 个月 ARR 达到 $90k–$160k
      - 与 Apple Ads 专家顾问或精品应用增长代理商达成 1 个合作转介绍安排
  - horizon: 12–24 个月
    items:
      - 付费客户达到 20–30 家；ARR 达到 $400k–$700k
      - 上线跨应用 benchmark 图谱，覆盖 10+ 账户、90+ 天实验历史；推出 $6k–$12k benchmark 加购模块
      - 招入第二位工程师；开始支持多 app property 和 agency-overlay 流程
      - 签下第一份代理商合作协议，让合作方客户也能使用治理层
      - 用本地化客户导入手册扩展英国和 GCC 市场
      - 完成种子轮融资（$2M–$4M），撑起 18 个月 runway，冲击 Series A 指标
  - horizon: 24–36 个月
    items:
      - 付费客户达到 50–70 家；ARR 达到 $1.2M–$1.8M，接近研究里约 $1.4M 的 SOM
      - 上线 paywall analytics 集成（RevenueCat 或 Superwall），支持 cohort 级订阅 payback
      - 推出 Android / Google Play 治理模块，成为第二个平台产品
      - 通过 app property 扩张和 benchmark 模块 upsell，实现净收入留存 ≥115%
      - 建立 Series A 融资 pipeline，拿出 CAC payback、NRR 和跨应用 benchmark 差异化的完整证实
risks:
  - risk: Apple 平台依赖——API 或政策变化削弱核心数据或实验流程
    likelihood: Medium
    impact: High
    mitigation: 用只读 connector 和明确的数据使用文档启动；从第 6 个月开始逐步接入 MMP 和 paywall analytics，即便 Apple 部分数据退化，产品也还能站住。
  - risk: 现有厂商打包——AppTweak、SplitMetrics 或 MobileAction/InMobi 推出治理型实验队列
    likelihood: Medium
    impact: High
    mitigation: 先把增量归因和 agency-overlay 流程做深——这些都需要现有厂商去改运营模型，推进通常更慢；同时尽快用每周节奏建立切换成本。
  - risk: 归因与增量归因可信度不足——买家不信拉升结果，回到旧工具
    likelihood: Medium
    impact: Medium
    mitigation: 用保守实验模板、标准控制窗口和简单的前后 payback 视图启动；第一阶段先证实实验吞吐和责任清晰，再慢慢强化增量归因叙事。
  - risk: SAM 太小，不扩张就撑不起风险投资回报
    likelihood: High
    impact: Medium
    mitigation: 把 Android 扩张和 benchmark 数据产品明确做成第 2–3 年里程碑；在第 2 年募资前，就先和现有客户证实扩张意愿。
  - risk: 代理商惯性——现有代理商抵触治理层监督
    likelihood: Medium
    impact: Medium
    mitigation: 把产品包装成“压低代理商协同开销”的工具；推出 agency-partner 档位和可见性工具，让代理商先把它当补充而不是威胁。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2M–$4M
  runwayMonths: 18
  useOfFundsSummary: >-
    这 18 个月 runway 主要买到几件事：创始团队薪资（CEO + 1–2 位工程师）、Apple Ads 与 MMP 集成开发、把 5–8 个共创客户试点转成年度合同、在第 4 个月招 customer
    success、第 8 个月招第二位工程师，并建立初步合作渠道——目标是打到 $400k–$700k ARR、20–30 个付费客户，作为 Series A 的入场门槛。
