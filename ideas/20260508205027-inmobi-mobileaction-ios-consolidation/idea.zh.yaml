topRisks:
- name: 平台依赖
  description: Apple 可能改变 API、广告位或 App Store 实验规则，从而削弱产品工作流。
  mitigation: 先从系统记录层和决策工作流做起，即便某一路数据源变差，价值也还能保留；同时尽早接入相邻的变现和分析数据。
- name: 现有厂商打包
  description: InMobi、Apple Ads 合作伙伴或其他增长套件，可能把基础规划和实验功能直接打进现有产品。
  mitigation: 把重点放在中立性、增量核算和跨团队工作流归属上，而不是做同质化报表或出价自动化。
- name: 归因怀疑
  description: 如果产品无法把真实增量与短窗口里的渠道噪音区分开，客户可能不会信。
  mitigation: 先用保守的测量承诺、标准化测试设计，以及围绕回本和可复用实验模板的财务友好型报表切入。
