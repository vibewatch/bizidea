problem: >-
  消费类订阅应用的增长团队，至今还把 Apple Ads 出价、App Store Optimization、创意分析和版本上线规划拆在不同工作流里做——有的在点工具里，
  有的在表格里，还有的躺在代理商汇报 deck 里。随着 iOS 增长工具被更大的广告平台收编，中型发行商越来越可能拿到一套黑箱式打包产品；可他们真正
  需要的，其实是一套中立系统，明确告诉团队：该改哪个关键词、哪套创意、哪段商店页文案，才能更高效地拉动安装。没有这样一层操作系统，团队就会在品牌词上过度花钱，
  错过广告信号与商店页转化之间的快速反馈回路，也很难向财务和产品管理层解释 CAC 为什么会突然波动。
targetUser:
  primary: Series A-C 阶段、重投 Apple Search Ads、内部 UA 团队精简的消费类订阅应用增长负责人
  secondary: 正在多个 iOS 市场扩张的移动应用发行商中的 UA 经理和 ASO 负责人
  buyer: 消费类应用发行商中的 VP Growth 或 Head of Performance Marketing
startupThesis:
  nonObviousInsight: 机会不在于再做一个优化点工具，而在于当 Apple Ads 与 ASO 情报能力被更大的广告网络吸收后，给应用发行商补上一层中立的决策系统。一旦市场里最好的 iOS 增长数据被全栈平台战略性掌控，中型应用就会愿意为透明的实验优先级、投放治理，以及不受卖量激励绑架的决策层付费。
  beachhead: 在游戏相邻、健康、语言学习和工具类赛道里，每月 Apple Search Ads 花费 $50k-$300k、覆盖 3-10 个国家的消费类订阅应用
  wedge: 一套每周运行的 iOS 增长控制台，接入 Apple Ads、ASO 元数据、创意素材库和付费墙转化数据，再把这些输入整理成有预算护栏、有负责人、排好优先级的实验队列
  whyNowCatalyst: InMobi 收购 MobileAction，说明 Apple Ads 与 ASO 情报正在并入更大的广告平台套装，这会逼着独立应用发行商尽快上一层中立操作系统，避免自己的工作流被锁进黑箱工具套件里。
  ventureScalePath: 先做中型应用里 Apple Ads 与 ASO 决策的控制系统，再向更广的移动增长编排扩张，覆盖创意生产、区域上线、留存实验、代理商管理，以及面向发行商和投资人的基准数据产品。
solution: >-
  打造一套面向订阅应用发行商的中立 iOS 增长操作系统。产品接入 Apple Search Ads 账户、App Store 页面元数据、历史创意、付费墙分析和基础收入结果，
  然后每周产出一份排好优先级的动作清单：扩词、砍否定词、做 custom product page 测试、刷新标题或副标题、按特定地区替换创意。它不只是给出优化建议，
  还会把动作分配给具体负责人、锁定实验窗口，并标清楚增长到底来自新增需求，还是只是蚕食了品牌安装。团队能在一个地方把搜索词意图、创意定位、商店页转化和后续订阅回本串起来看。随着客户增多，公司还能慢慢建起一张跨应用基准图谱，回答不同应用品类、不同市场里，哪些关键词主题和创意母题真的有效。
goToMarketSeed:
  firstCustomer: Series A-C 阶段的订阅制应用发行商，增长团队规模 5-20 人、每月 Apple Search Ads 花费超过 $100k，且至少在三个英语市场或 GCC 市场扩张
  buyingTrigger: 团队面临一次重要版本发布或区域扩张，不想再额外请一家代理商或再招一名分析师，却必须同时重配 Apple Ads 预算与 App Store 文案
  currentAlternative: 代理商代管 Apple Ads、独立 ASO 工具、电子表格规划，以及增长、产品、财务之间靠人工开的实验复盘会
  switchingReason: 这套产品给的是中立、可治理的工作流，能把投放决策和商店页转化变化、回本周期连在一起；而打包式广告平台工具和代理商通常做不到这种透明度
  pricingHypothesis: 按应用资产数量和 Apple Ads 受管月度花费定价的年度 SaaS 合同；更大客户再叠加高级基准模块
whyNow:
  - point: 市场整合说明 Apple Ads 与 ASO 已经不再是边缘工具，而是在变成全栈广告平台中的战略层。
    signalRefs: ["iOS 增长工具正在整合"]
    sourceRefs: [1, 2, 3]
  - point: MobileAction 在创意、关键词、应用与广告主上的规模，证明 iOS 增长如今已经建立在大型专有数据集之上，而小团队最缺的是把这些数据落到日常运营里的能力。
    signalRefs: ["数据规模正在变成核心护城河"]
    sourceRefs: [1]
  - point: InMobi 明确把美国、APAC 和 MENA 列为重点投资方向，说明大平台会优先优化广泛的区域覆盖，这给人手精简的应用团队留下了一层更有观点的操作系统空间。
    signalRefs: ["大平台正优先覆盖全球企业客户"]
    sourceRefs: [3]
  - point: MobileAction 继续作为 InMobi 内部独立平台存在，意味着它的打包方式和路线图会越来越受套装经济学驱动；因此，对发行商而言，掌握独立工作流控制权会更有价值。
    signalRefs: ["垂直点工具可能会沦为套装功能"]
    sourceRefs: [2]
differentiator: >-
  大多数移动增长产品不是卖数据，就是做自动出价，或者给一堆 ASO 仪表盘。这家公司卡住的是“洞察到动作”之间那段真正的运营节奏：本周先测什么、谁来做、预算能冒多大风险、结果到底是不是新增。因为它既不卖媒体，
  也不是大集团里的套装产品，所以它在建议削减投放、调整元数据，或要求代理商承担责任时，比网络系工具更有公信力。
conceptDiagram:
  title: iOS 增长控制回路
  mermaid: |
    flowchart LR
      BuyerNode[增长副总裁] --> PainNode[Apple Ads 与 ASO 分散割裂且不透明]
      PainNode --> ProductNode[中立的 iOS 增长控制台]
      ProductNode --> OutcomeNode[用更清晰的 CAC 与回本周期跑出更快实验]
businessModelCanvas:
  customerSegments:
    - 在 Apple Search Ads 上有一定预算的消费类订阅应用发行商
    - 正在多个 iOS 市场扩张的人手精简型移动增长团队
  valuePropositions:
    - 把 Apple Ads 和 ASO 数据变成每周可追责的实验
    - 说明增长成果到底是新增，还是只是蚕食品牌词
    - 在广告平台打包激励之外，给应用发行商一层中立控制层
  channels:
    - 面向 VP Growth 和 UA 负责人直销
    - 移动增长代理商与 ASO 顾问
    - iOS 增长社群和应用增长活动
  customerRelationships:
    - 高触达客户导入，并附带首轮实验计划
    - 按季度做基准复盘和投放治理回顾
  revenueStreams:
    - 年度 SaaS 订阅
    - 高级基准数据附加模块
    - 从代理商或表格工作流迁移过来的服务费
  keyResources:
    - 跨应用关键词与创意基准图谱
    - Apple Ads、App Store 与变现系统集成
    - 实验编排与分析引擎
  keyActivities:
    - 把 iOS 增长数据标准化为实验计划
    - 构建基准模型与增量归因模型
    - 支持客户上线和工作流落地
  keyPartners:
    - 移动归因与付费墙分析厂商
    - 专注应用增长的代理商
    - 应用分析与订阅基础设施提供商
  costStructure:
    - 产品与数据工程
    - 面向增长团队客户导入的客户成功
    - 应用增长生态里的销售与合作
jobsToBeDone:
  - job: 当产品上线前夕或区域扩张期间 CAC 上升时，帮助增长负责人决定该先动哪些 Apple Ads 和 App Store 改动，让团队在不增员的情况下把 iOS 增长效率拉回来。
    currentAlternative: 代理商建议、表格规划，以及临时拼出来的 ASO 测试
    successMetric: 在一个实验周期内把综合 CAC 压低，或更快收回投入
  - job: 当财务追问 iOS 获客效率为什么变化时，帮助 UA 团队把关键词、创意和商店页改动与下游收入挂上钩，让他们能更有底气地为预算辩护或重配预算。
    currentAlternative: 把多个渠道仪表盘手工拼成幻灯片和表格
    successMetric: 产出一份可解释增长复盘所需的时间，以及能对应到已测实验的预算占比
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 收购事件、数据规模披露和明确的 iOS 聚焦，共同说明市场结构正在变化，即便客户痛点仍需要做一些推演。
  painIntensity:
    score: 4
    rationale: 移动增长效率偏低，会直接打到订阅应用的 CAC、回本周期和招聘压力。
  wedgeClarity:
    score: 5
    rationale: 面向 Apple Ads 与 ASO 的每周实验控制台，是一个具体工作流，买家和触发场景都很清楚。
  defensibility:
    score: 4
    rationale: 基准数据、工作流嵌入和有衡量结果的实验输出，能在基础自动出价之外继续叠起一层实用护城河。
  ventureScale:
    score: 4
    rationale: 滩头市场本身不大，但公司可以把自己扩成移动增长预算、创意和变现决策的更大控制平面。
topRisks:
  - name: 平台依赖
    description: Apple 可能调整 API、广告位或 App Store 实验规则，从而削弱产品工作流的核心价值。
    mitigation: 先从系统记录层和决策工作流做起，即便某一路数据衰减也依然有价值；同时尽早接入相邻的变现和分析输入，分散风险。
  - name: 现有厂商打包
    description: InMobi、Apple Ads 生态伙伴，或其他增长套件都可能把基础规划与实验功能打包进现有产品。
    mitigation: 把重点放在中立性、增量归因和跨职能工作流所有权上，而不是做同质化报表或自动出价。
  - name: 归因可信度存疑
    description: 如果产品没法在小实验窗口里把真实提升和渠道噪音区分开，客户可能不会信任它。
    mitigation: 先用保守的测量口径、标准化实验设计，以及财务能看懂的 payback 报告上线，再逐步放大归因主张。
