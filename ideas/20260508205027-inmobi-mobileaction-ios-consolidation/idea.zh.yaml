jobsToBeDone:
- job: 当产品上线或区域扩张前 CAC 上升时，帮助增长负责人决定该先改哪些 Apple Ads 和 App Store 项目，让团队在不扩编的情况下，尽快把 iOS 增长效率拉回来。
  currentAlternative: 代理商建议、表格规划和零散的 ASO 测试。
  successMetric: 一个实验周期内的混合 CAC 下降，或回本速度提升。
- job: 当财务追问 iOS 获客效率为什么变化时，帮助 UA 团队把关键词、素材和商店页改动与后续收入连起来，让团队能更有把握地为预算辩护或重分配。
  currentAlternative: 把各渠道仪表盘手工拼成幻灯片和表格。
  successMetric: 产出一份可解释的增长复盘所需时间，以及已被实验测量覆盖的投放占比。
