    - 42
    - 43
    - 45
    - 49
  partnershipEcosystem:
  - point: Warehouse, surveyor, and collateral-management partners are essential because CMA/SMA style control still matters where legal enforcement is weak.
    sourceRefs:
    - 16
    - 17
    - 18
  - point: eBL and digital-original platforms are natural partners because they reduce title-document fraud and can feed verified document events into the risk score.
    sourceRefs:
