    - 33
    - 34
  sensitivityCases:
  - case: EUDR implementation softens or slips again
    impact: Traceability urgency in cocoa stays real but the budget clock slows, pushing buyers back toward manual compliance workarounds.
    sourceRefs:
    - 29
    - 30
    - 31
  - case: eBL interoperability becomes good enough faster than expected
    impact: Document authenticity commoditizes, so differentiation must shift decisively to physical collateral state, surveyor integrity, and claims-linked scoring.
    sourceRefs:
    - 23
