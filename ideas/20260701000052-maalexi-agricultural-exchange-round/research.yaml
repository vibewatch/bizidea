  - 25
openQuestions:
- What share of cocoa and cashew export volume in the target corridors is actually insured or bank-intermediated today, rather than handled on open-account terms?
- Which 4-5 West African or Gulf insurers face the most repeat losses from misdelivery, substitution, or document fraud in cocoa and cashew books?
- Can local surveyor and collateral partners meet anti-corruption, SLA, and data-quality standards without destroying unit economics?
- How much of EUDR and digital-trade evidence is available before policy bind versus only after customs or shipment processing begins?
