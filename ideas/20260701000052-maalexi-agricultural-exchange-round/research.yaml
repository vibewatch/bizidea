  sourceRefs:
  - 1
  - 2
  - 3
- point: 'The IFC/WTO West Africa study shows banks already pay with time and margin for poor visibility: LC pricing is 2–4% and extra collateral is common.'
  sourceRefs:
  - 14
- point: Ghana’s warehouse-receipt rollout showed zero defaults in the cited pilot and 32 rural/community banks connected to the e-WRS system, suggesting structured collateral evidence can change lender behavior on the ground.
  sourceRefs:
  - 17
- point: eBL adoption reached 49.2% in the 2024 ICC/FIT survey and interoperable, IGP&I-approved cross-platform exchange is now live, reducing one major document-side objection.
