    - 26
    - 27
  - case: Cocoa supply and prices normalize sharply
    impact: Fraud incentives and exception rates may cool from 2024 highs, reducing urgency unless the startup also proves underwriting-cycle speed and recovery benefits.
    sourceRefs:
    - 20
    - 32
    - 36
  validationPlan:
  - priority: high
    question: Which 4-5 West African or Gulf insurers currently write enough cocoa or cashew export volume to anchor the first corridor pilot?
    evidenceToGather: Broker and insurer interviews, portfolio volume estimates, and recent claims or fraud-loss reviews by corridor.
  - priority: high
    question: Can one pilot measurably improve quote turnaround, advance rates, or claim-prevention outcomes compared with manual underwriting?
    evidenceToGather: Shipment-level pilot data across one corridor with before/after underwriting and claims metrics.
  - priority: medium
    question: Which warehouse, surveyor, and collateral partners can meet anti-corruption, uptime, and API-ingestion requirements?
    evidenceToGather: Partner diligence, SLA templates, and sample data feeds from local operators.
  - priority: medium
    question: How much of EUDR and digital-trade evidence is available pre-bind rather than only after shipment processing starts?
    evidenceToGather: Operator workflow maps, sample due-diligence statement timing, and customs/document event timestamps.
