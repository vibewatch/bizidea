topRisks:
  - name: "Exchange platforms vertically integrate underwriting"
    description: "Maalexi or similar exchanges could build their own insurer-facing risk-scoring layer, cutting out a standalone verification provider."
    mitigation: "Sell directly to insurers as an exchange-agnostic layer with contractual data portability, keeping the insurer relationship primary rather than routing through any single exchange partnership."
  - name: "Physical verification can still be gamed"
    description: "Bribed surveyors, spoofed sensors, or falsified custody records could undermine the risk score insurers rely on, causing a trust-destroying failure."
    mitigation: "Require multi-source corroboration (IoT telemetry, customs/satellite data, and independent surveyor sign-off) with cryptographic anomaly detection before a score is issued."
  - name: "Regulatory and corridor fragmentation slows expansion"
    description: "Insurance and trade-finance rules differ sharply between West Africa, the Gulf, and the EU, lengthening sales cycles and complicating a single compliance playbook."
    mitigation: "Launch with one insurer in one corridor, build a documented compliance and integration playbook, then replicate corridor-by-corridor with local reinsurance or ECA partners."
