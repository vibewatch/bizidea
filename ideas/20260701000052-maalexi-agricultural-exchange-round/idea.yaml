problem: >-
  Trade-credit insurers and regional export credit agencies that underwrite cross-border agricultural
  export finance still price risk off paper certificates of origin, bills of lading, and periodic surveyor
  visits. These documents are slow, forgeable, and disconnected from what is actually happening to the
  physical cargo between farm, port, and buyer. When a shipment is diverted, substituted, or misgraded,
  insurers and lenders discover it only after a claim or default, so they either decline coverage in
  higher-risk corridors, overprice premiums, or cap exposure well below real demand from exporters.
targetUser:
  primary: "Underwriting teams at regional trade-credit insurers and export credit agencies financing agricultural export shipments"
  secondary: "Trade-finance banks and commodity trading desks that co-lend against the same insured shipments"
  buyer: "Head of underwriting or chief risk officer at a regional trade-credit insurer"
startupThesis:
  nonObviousInsight: "Most agri-fintech attention goes to building the exchange or marketplace itself, but Tawuniya, an insurer, choosing to lead Maalexi's round shows the real near-term budget holder is the underwriter who prices risk, not the exchange operator who matches trades — a standalone, exchange-agnostic risk-verification layer sold straight to insurers can win budget faster than building a competing exchange."
  beachhead: "Underwriting desks at mid-size West African and Gulf-based trade-credit insurers writing policies for cocoa and cashew export shipments moving to EU and US buyers"
  wedge: "A collateral-verification API that fuses IoT custody telemetry, customs and logistics data, and independent surveyor attestations into a single real-time risk score insurers plug into existing underwriting workflows for one export corridor"
  whyNowCatalyst: "An insurer publicly leading a tokenized agri-verification funding round signals that underwriters are now actively budgeting for this category rather than waiting for exchanges to mature around them."
  ventureScalePath: "Start with one insurer and one high-fraud cocoa/cashew corridor, prove loss-ratio improvement, then expand corridor-by-corridor and commodity-by-commodity across West Africa, Latin America, and Southeast Asia, layering in a reinsurance-grade risk-data marketplace that any insurer, bank, or exchange (including Maalexi-like platforms) can subscribe to."
solution: >-
  Deploy a lightweight verification stack at origin (IoT container/custody sensors, satellite and customs
  data feeds, and a network of vetted independent surveyors) that continuously attests to a shipment's
  quality, custody chain, and location from warehouse to vessel. This data feeds a risk-scoring API that
  insurers call directly from their underwriting systems to price a policy or approve a credit line before
  goods leave port, and again at key custody transfer points to catch diversion or substitution before a
  claim event. The scoring model and verification records are portable, so an insurer or lender is not
  locked into any single exchange or marketplace to benefit from the data.
goToMarketSeed:
  firstCustomer: "Underwriting lead at a mid-size trade-credit insurer or export credit agency currently writing policies for West African cocoa or cashew exporters shipping to EU or US buyers"
  buyingTrigger: "Renewal season loss-ratio review after a costly fraud or default event in the cocoa/cashew export book, combined with visible insurer appetite for tokenized verification signaled by Tawuniya leading Maalexi's round"
  currentAlternative: "Manual review of paper certificates of origin, bills of lading, and periodic third-party surveyor inspection reports, supplemented by broker attestations"
  switchingReason: "A drop-in API cuts claim investigation time and loss ratio without hiring more surveyors, and because verification records are portable rather than locked into one exchange, the insurer keeps optionality over which trading platforms and lenders it works with"
  pricingHypothesis: "Per-shipment verification fee plus a basis-point risk-data subscription tied to insured export volume"
