    - 19
    - 20
  - factor: 经济
    impact: positive
    point: 高昂的贸易融资摩擦和保障缺口，让任何能降低不确定性或抵押品折扣的工具都拥有清晰的投资回报。
    sourceRefs:
    - 9
    - 14
  - factor: 社会
    impact: positive
    point: 欧洲买家和消费者越来越期待可持续、可溯源的可可供应链，这提高了可审计证据的价值。
