    - 17
    - 29
    - 31
  adoptionFrictionMatrix:
  - friction: 数字物权单据在原产地、中转地和目的地各法域的法律认可度参差不齐
    severity: high
    affectedBuyer: 承保和合规负责人
    mitigation: 先在纸质单据仍可作为备用方案的走廊起步，同时采用符合 MLETR 或 ETDA 的平台和经批准的规则手册，为工作流做好面向未来的准备。
    sourceRefs:
    - 21
    - 22
    - 26
    - 38
  - friction: 对仓库、验货机构和放货管控在现场层面的信任度
    severity: high
    affectedBuyer: 风险运营和理赔团队
    mitigation: 在正式承保前，采用 CMA 或 SMA 式的合作方，并对收据、检验记录和遥测数据做多源核对。
    sourceRefs:
    - 16
    - 17
    - 18
  - friction: 接入信用证、保函和保单出具流程的系统对接
    severity: medium
    affectedBuyer: 承保运营和财务系统负责人
    mitigation: 通过现有的贸易融资和单据工具对接，而不是要求买家更换整套系统。
    sourceRefs:
    - 14
    - 39
