categoryDynamics:
  growthRate: 2022 至 2024 年电子提单(eBL)用户采用率从 33.0% 升至 49.2%(年化约 22%)
  growthRateSourceRefs:
  - 23
  tailwinds:
  - point: 电子提单的采用正在快速上升，大多数仍在使用纯纸质单据的用户都表示计划转型，这提高了数字抵押品证据的就绪度。
    sourceRefs:
    - 23
  - point: 经 IGP&I 批准的跨平台互操作性，削弱了过去逼各方退回纸质单据的封闭网络壁垒。
    sourceRefs:
    - 24
    - 25
  - point: EUDR 和欧洲买家的要求，让可可相关承保业务中的溯源和可审计货运证据变得更有价值。
