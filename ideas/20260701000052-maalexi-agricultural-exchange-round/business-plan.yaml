slug: agri-export-collateral-risk-oracle
date: "2026-07-01"
executiveSummary: >-
  Agri Export Collateral Risk Oracle is a pre-seed underwriting API that helps
  trade-credit insurers and export credit agencies price West African
  agricultural export risk using verified custody, quality, and traceability
  data instead of paper certificates and episodic surveys. The beachhead is
  mid-size Gulf and West African insurers underwriting West African cocoa and
  cashew export books, starting with EU-bound cocoa from Ghana and Côte
  d’Ivoire because EUDR and recurring fraud pressure create the sharpest buying
  trigger there. The first product is not an exchange, lender, or workflow
  suite; it is a corridor-specific pre-bind risk score and handoff-alert layer
  that plugs into existing policy issuance and credit-approval flows. Research
  supports the timing: West African trade finance still carries high friction
  and extra collateral demands, eBL adoption has risen, and an insurer led
  Maalexi’s funding round, showing that underwriting-adjacent buyers will fund
  verified agri-trade infrastructure. Go-to-market should pair founder-led
  sales to heads of underwriting and CROs with corridor partners such as
  surveyors, collateral managers, and document platforms so the first pilot can
  be sold during renewal or post-loss review without asking customers to
  replatform. The modeled beachhead market is real but still modest at an
  estimated $14.1M SAM and $2.0M year-3 SOM, so this only becomes a venture
  outcome if the company earns the right to expand corridor-by-corridor into
  adjacent commodities, lenders, and reinsurer data products. The biggest
  execution risk is not software quality alone but whether local data partners
  can deliver trustworthy pre-bind evidence with enough coverage and low enough
  corruption risk to change underwriting decisions. Research also leaves two
  critical gaps unresolved: which specific 4-5 insurers control enough relevant
  volume to anchor the first pilots, and what share of target corridor
  shipments is actually insured rather than handled on open-account terms.
problem:
  - "Underwriters still price cocoa and cashew export books from paper certificates, bills of lading, broker attestations, and periodic surveys, so diversion, substitution, or misgrading is often discovered only after a claim."
  - "Weak collateral enforceability and rising traceability requirements push insurers and lenders to overprice risk, demand extra collateral, or cap exposure in corridors where exporters still need financing."
solution:
  - "Aggregate surveyor attestations, eBL or customs document events, and custody telemetry into a corridor-specific pre-bind risk score and audit trail that fits existing underwriting workflows."
  - "Monitor the same shipment at warehouse and port handoffs, push exception alerts into underwriting or claims operations, and keep the evidence portable across banks, brokers, and exchanges."
whyWeWin:
  - "The product gives insurers a neutral API they can buy without betting on one exchange, unlike Maalexi-style venue strategies."
  - "The wedge sits exactly where budget and urgency already appear: renewal reviews, loss-ratio reviews, and EU cocoa programs that now need more auditable evidence."
  - "Claims-linked corridor data, partner performance history, and document-to-telemetry graphs can compound into a more defensible underwriting model than point document or IoT vendors provide."
strategicChoices:
  beachhead: "Mid-size Gulf and West African trade-credit insurers and ECAs underwriting West African cocoa and cashew export books for EU and US buyers, starting with EU-bound cocoa from Ghana and Côte d’Ivoire."
  wedgeRationale: "This slice combines concentrated pain, a named buyer, existing documentary workflows, and a near-term regulatory catalyst, so it should produce proof faster than selling horizontally across all agri commodities, trying to build another exchange, or starting with banks as the primary customer."
  sequencingRationale: "Build pre-bind scoring and custody alerts for one corridor before broader claims, compliance, or marketplace products because the first proof point must be measurable underwriting lift; sell directly to insurers before banks or exporters because insurers own the trigger and budget; hire integration and risk-model talent before scaled sales because partner data quality will determine whether pilots work."
  notYet:
    - "Operating a commodity exchange or marketplace."
    - "Selling directly to exporters or pursuing a bank-first workflow before insurer proof exists."
    - "Adding new commodity families or non-West African corridors before the cocoa playbook is repeatable."
market:
  tam: >-
    Estimated $56.4M TAM based on modeled West African cocoa and cashew export
    shipments, a 65% covered-shipment share assumption, and about $400 blended
    annual revenue per covered shipment.
  sam: >-
    Estimated $14.1M SAM for the initial beachhead of Gulf and West African
    underwriters covering West African cocoa and cashew exports to EU or US
    buyers.
  som: >-
    Estimated $2.0M year-3 SOM based on roughly 5,000 covered shipments after
    landing 4-5 insurer or ECA logos in one corridor each.
  segments:
    - "Trade-credit insurers and ECAs underwriting West African cocoa and cashew export books."
    - "Trade-finance banks and commodity lenders relying on the same insured shipments."
  buyingProcess: >-
    Evaluation usually starts after a fraud event, claims review, or renewal
    cycle when the underwriting team wants better evidence without adding more
    field staff. Budget is typically approved by the head of underwriting or CRO
    once legal, compliance, and operations are satisfied that the product fits
    existing policy issuance and trade-document processes.
product:
  mvp: >-
    The MVP covers one insurer, one corridor, and one commodity program:
    ingest surveyor reports, customs or eBL events, and telemetry for pre-bind
    scoring, then monitor custody handoffs and issue exception alerts with a
    portable audit trail. It deliberately excludes exchange matching, funds
    flow, and a broad claims platform.
  sixMonth: "Ship the first production-grade Ghana or Côte d’Ivoire cocoa corridor integration with insurer dashboard, API output into underwriting workflow, partner SLA monitoring, and manual-override rules for contested scores."
  twelveMonth: "Add EUDR evidence packaging, claims-feedback loops, and a second corridor or commodity template so the company can sell repeatable insurer deployments rather than one-off integrations."
  twentyFourMonth: "Expand the neutral risk layer into additional West African commodities and selected Latin American or Southeast Asian corridors, with reinsurer and lender access to benchmark and exception data."
  keyBets:
    - "Underwriters will change pricing, bind, or monitoring decisions based on third-party digital evidence instead of treating the score as informational only."
    - "One corridor playbook can be deployed with repeatable partner integrations rather than bespoke field operations each time."
    - "Claims and exception data from early pilots will create a better loss model than exchange, document, or IoT vendors can build alone."
gtm:
  wedge: "Sell a paid corridor pilot to one insurer writing West African cocoa or cashew cover, triggered by renewal-season loss-ratio review and designed to prove pre-bind quote speed plus pre-claim anomaly detection on one export book."
  channels:
    - "Founder-led direct sales to heads of underwriting and CROs at Gulf and West African insurers and ECAs."
    - "Introductions from reinsurers, brokers, and trade-finance advisors already reviewing corridor loss experience."
    - "Deployment partnerships with surveyors, collateral managers, and document or eBL platforms that already touch release control and trade-document workflows."
  funnelTargets: "Lead→qualified pilot 15-25%, qualified pilot→paid pilot 40%+, paid pilot→production 50%+, first corridor→second corridor expansion within 12 months in 50%+ of production accounts."
  pricing: >-
    Use a paid corridor pilot followed by a production contract that combines a
    minimum annual platform commitment, per-shipment verification fees, and a
    basis-point subscription tied to insured export volume. This matches how
    insurers budget by book performance and covered cargo rather than seats,
    while keeping ROI legible against loss ratio, quote turnaround, and
    claim-investigation cost.
businessModel:
  revenueStreams:
    - "Per-shipment verification and monitoring fees."
    - "Annual corridor subscription tied to insured export volume and API access."
    - "Benchmark and claims-analytics subscriptions for lenders, ECAs, or reinsurers once the loss corpus exists."
  unitOfValue: "Verified insured shipment monitored from pre-bind through custody handoffs."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more commodities and corridors inside the same insurer’s export book."
    - "Sell read-only access and benchmark data to co-lending banks, ECAs, and reinsurers."
    - "Layer EUDR evidence packs and claims analytics onto existing monitored shipments."
strategyMap:
  northStarMetric: "Number of insured export shipments priced or actively monitored with a verified corridor score in production."
  inputMetrics:
    - "Qualified pilot count in the target corridor."
    - "Pre-bind data completeness across required evidence fields."
    - "Quote-turnaround reduction versus manual underwriting."
    - "Anomalies detected before claim or payout release."
    - "Paid pilot→production conversion rate."
    - "Second-corridor or second-commodity expansion rate."
  moatsToBuild:
    - "Claims-linked corridor risk model joining document anomalies, custody events, and eventual outcomes."
    - "Partner performance graph covering surveyors, warehouses, and document networks by corridor."
    - "Portable audit trail and EUDR-ready evidence history that sits above any single exchange or workflow vendor."
  killCriteria:
    - "Fewer than 2 paid insurer pilots from the first 10 qualified target accounts by month 9."
    - "Pre-bind data completeness stays below 70% or exception false positives exceed 20% on pilot shipments."
    - "No pilot shows at least 30% faster quote turnaround or a referenceable prevented-loss or early-intervention case by month 12."
  mermaid: |
    flowchart LR
      Wedge[EU cocoa insurer wedge] --> MVP[Pre-bind score plus custody alerts]
      MVP --> Proof[Pilot loss and quote-speed proof]
      Proof --> Expansion[More corridors commodities and data buyers]
investorMemo:
  verdict:
    call: Watch
    conviction: "Strong wedge and timing signal, but conviction stays limited until the company proves a concentrated buyer set will fund a standalone API and local data partners can support software-like margins."
    whyBelieve: "The startup targets a real underwriting pain point with a neutral product shape that fits visible category momentum, rising digital-trade infrastructure, and corridor-specific compliance pressure."
    whyDoubt: "The initial market is narrow, customer concentration is still unproven, and execution depends on trustworthy field data and partner integrity in fragmented trade corridors."
    nextDiligence: "Secure one paid insurer pilot and a named map of 4-5 anchor logos with documented shipment volume, claims pain, and pre-bind data availability."
  firstCustomer:
    title: "Head of underwriting at a Gulf or West African trade-credit insurer covering EU-bound cocoa exports."
    profile: "A mid-size insurer or ECA that already writes cocoa or cashew shipment cover, relies on external surveyors and paper trade documents, and wants to grow corridor volume without taking more opaque fraud risk."
    trigger: "A renewal-season loss review, fraud incident, or EU buyer traceability escalation exposes weak confidence in paper collateral evidence."
    buyer: "Head of underwriting or CRO"
    initialContract: "A $50k-$100k paid corridor pilot for one insured cocoa book, converting to a $200k-$400k annual production contract once the insurer uses the score in live pricing and custody alerts across the corridor."
  mustBeTrue:
    - "Four to five insurers or ECAs in the beachhead control enough West African cocoa or cashew volume to support a concentrated first-logo strategy."
    - "Pre-bind evidence from surveyors, customs, documents, and telemetry is available on most pilot shipments early enough to change underwriting decisions."
    - "One corridor pilot can improve quote turnaround or manual-review load by at least 30% and surface exceptions manual processes miss."
    - "Local partner SLAs can hit data-completeness and anti-corruption thresholds without collapsing gross margin into a services business."
    - "Insurers value exchange-neutral portability enough to buy a standalone API instead of waiting for exchange or document vendors to bundle similar features."
  diligenceQuestions:
    - "Which named Gulf and West African insurers or ECAs have the highest cocoa or cashew insured volume and recent fraud or claims pain?"
    - "How much decision-useful data is actually available before bind versus only after a shipment is already moving?"
    - "Which KPI matters most to the buyer in practice: loss ratio, quote turnaround, advance rate, or claim-investigation time?"
    - "Can surveyor, warehouse, and document partners meet anti-corruption and uptime SLAs across Ghana and Côte d’Ivoire at acceptable unit economics?"
    - "Will reinsurers and brokers introduce this as a loss-control tool, or view it as added operational friction?"
operatingAssumptions:
  - assumption: "At least 4 beachhead insurers or ECAs have funded digital-risk budgets now rather than only generic innovation interest."
    basis: research.yaml
    validationTest: "Interview 12 target insurers, ECAs, brokers, and reinsurers and secure at least 2 paid pilot commitments or signed LOIs within 6 months."
    decisionImpact: "If false, narrow to one sovereign corridor, reposition toward ECAs, or defer the standalone underwriting thesis."
  - assumption: "Decision-useful evidence is available before bind for most target shipments."
    basis: research.yaml
    validationTest: "Show that more than 70% of required fields for the first corridor are available before policy issuance across 50 historical or live shipments."
    decisionImpact: "If false, pivot from underwriting-time scoring toward post-bind monitoring and claims-prevention workflows."
  - assumption: "Exchange-agnostic positioning is a true buying reason rather than just a feature preference."
    basis: idea.yaml
    validationTest: "In discovery and win-loss reviews, confirm that more than 60% of qualified prospects cite portability across banks, brokers, or exchanges as a reason to engage, and that the first 2 pilots run in mixed-vendor environments."
    decisionImpact: "If false, partner or white-label with one venue or workflow platform instead of building an independent category."
  - assumption: "Local surveyor, warehouse, and document partners can meet data-quality and anti-corruption thresholds without breaking margin."
    basis: research.yaml
    validationTest: "Run 3 partner pilots with SLA targets above 95% event completeness and no more than one unresolved audit exception per 100 monitored shipments."
    decisionImpact: "If false, tighten the corridor scope further, add higher-touch operations deliberately, or abandon the market."
  - assumption: "The first corridor playbook can still support software-like economics after partner and data-feed costs."
    basis: operator judgment
    validationTest: "By the third pilot, keep partner and data costs below 30% of annualized production revenue for monitored shipments."
    decisionImpact: "If false, raise pricing, narrow the monitored workflow, or stop investing before the company becomes a services-heavy operator."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Interview 12 target insurers, ECAs, brokers, and reinsurers focused on Ghana and Côte d’Ivoire cocoa and cashew corridors."
    hypothesis: "The first market is concentrated enough that 4-5 logos control most reachable volume and have active loss-ratio pain."
    successMetric: "At least 3 qualified insurer prospects with a named buyer, corridor volume, and budget trigger."
    owner: "Founder CEO"
  - horizon: "0–90 days"
    experiment: "Map the first corridor data stack with one surveyor network, one collateral manager or warehouse operator, and one document or eBL source."
    hypothesis: "Required pre-bind evidence can be assembled before policy issuance on most shipments."
    successMetric: "70%+ of required fields available before bind across 50 historical or in-flight shipment records."
    owner: "Founding eng"
  - horizon: "0–90 days"
    experiment: "Back-test a prototype risk score on historical shipment files with one design partner."
    hypothesis: "Multi-source evidence identifies exception patterns that manual paper review misses."
    successMetric: "The model flags a meaningful subset of known exception cases with underwriter-accepted false positives below 20%."
    owner: "Risk product lead"
  - horizon: "3–6 months"
    experiment: "Run the first paid corridor pilot on EU-bound cocoa shipments."
    hypothesis: "An underwriting desk will pay for a neutral scoring layer before full claims proof exists if it improves speed and visibility."
    successMetric: "One paid pilot signed and live on at least 100 shipments with baseline-versus-pilot underwriting metrics tracked."
    owner: "Founder CEO"
  - horizon: "6–12 months"
    experiment: "Convert the pilot into production and add claims and exception feedback loops."
    hypothesis: "Pilot results are strong enough to make the score part of live bind or monitoring workflows."
    successMetric: "One production contract and one referenceable case showing 30%+ faster quote turnaround or a prevented-loss or early-intervention outcome."
    owner: "Solutions lead"
  - horizon: "9–18 months"
    experiment: "Replicate the playbook into a second corridor or adjacent commodity through partner-led deployment."
    hypothesis: "The first corridor playbook is reusable enough to support efficient expansion."
    successMetric: "Second paying logo launched with at least 50% reuse of the first partner and integration playbook."
    owner: "Partnerships lead"
operations:
  - "Maintain corridor onboarding playbooks covering surveyor vetting, warehouse release controls, document rulebooks, and insurer override policies."
  - "Reconcile at least two independent evidence sources before issuing a production risk score, and route contested shipments to manual underwriting."
  - "Run quarterly loss-ratio and claims reviews with each insurer to retrain thresholds and prove ROI."
  - "Integrate through existing policy issuance, LC, and claims workflows rather than asking customers to replatform."
  - "Keep corridor-specific compliance maps for MLETR or ETDA-style document validity and EUDR evidence requirements."
team:
  - role: "Founder CEO"
    startTiming: "Month 0"
    rationale: "Own insurer sales, broker and reinsurer introductions, and corridor selection while the buyer problem and trigger timing are still being validated."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the ingestion pipeline, score API, and audit trail needed for the first corridor pilot."
  - role: "Risk product lead"
    startTiming: "Month 2-4"
    rationale: "Calibrate the scoring logic against historical shipment, exception, and claims data so pilots are decision-useful."
  - role: "Solutions and partner operations lead"
    startTiming: "Month 4-6"
    rationale: "Standardize surveyor, warehouse, and document-partner onboarding and reduce custom deployment work."
  - role: "Partnerships lead"
    startTiming: "Month 9-12"
    rationale: "Scale broker, reinsurer, and corridor-partner distribution only after the first proof point exists."
milestones:
  - horizon: "0–12 months"
    items:
      - "Complete 12-15 ICP interviews and identify the 4-5 insurers or ECAs with the highest corridor exposure."
      - "Ship the first Ghana or Côte d’Ivoire cocoa corridor MVP with surveyor, document, and telemetry integrations."
      - "Sign 1-2 paid pilots and convert at least 1 to production with measured quote-speed or exception-detection improvement."
      - "Establish repeatable partner SLAs and the first corridor compliance playbook."
  - horizon: "12–24 months"
    items:
      - "Reach 4-5 insurer or ECA logos across cocoa and adjacent cashew corridors."
      - "Add claims feedback, EUDR evidence packaging, and lender or reinsurer read-only data access."
      - "Prove second-corridor deployment reuses at least half of the first implementation playbook."
  - horizon: "24–36 months"
    items:
      - "Expand into one new geography or commodity family only after corridor unit economics and data quality are proven."
      - "Launch benchmark and claims-analytics products for reinsurers, banks, or exchanges."
      - "Become the neutral risk layer used across multiple document and workflow venues rather than tied to one exchange."
risks:
  - risk: "Named insurers do not control enough insured volume or budget to support a concentrated sales motion."
    likelihood: High
    impact: High
    mitigation: "Qualify corridor exposure and budget triggers before building custom integrations, and pivot to ECAs or a narrower corridor if volume clusters differently."
  - risk: "Local surveyor, warehouse, or telemetry data is unreliable or corruptible enough to undermine trust in the score."
    likelihood: High
    impact: High
    mitigation: "Require multi-source corroboration, partner audits, and manual review on contested shipments before binding coverage."
  - risk: "Exchange, workflow, or document platforms bundle similar insurer-facing scoring features."
    likelihood: Medium
    impact: High
    mitigation: "Differentiate on exchange-neutral portability, claims-linked model performance, and insurer-owned audit history."
  - risk: "Regulatory or EUDR timing shifts slow urgency or complicate deployment."
    likelihood: Medium
    impact: Medium
    mitigation: "Sell on loss-ratio and quote-speed improvement first, and choose corridors where paper fallback and digital evidence can coexist."
  - risk: "Pilot deployments become too bespoke to reach software margins."
    likelihood: Medium
    impact: High
    mitigation: "Standardize one corridor playbook, reuse the same partner stack where possible, and reject edge-case deals that break repeatability."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of corridor MVP build-out, partner integration and compliance work, 4-5 core hires, and 1-2 paid insurer pilots leading to at least one production deployment and a repeatable first-corridor playbook."
