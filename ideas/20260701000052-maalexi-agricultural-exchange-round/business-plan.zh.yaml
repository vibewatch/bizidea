slug: agri-export-collateral-risk-oracle
date: "2026-07-01"
executiveSummary: >-
  农产品出口抵押品风险预言机(Agri Export Collateral Risk Oracle)是一个预种子期的承保 API，帮助贸易信用保险公司和出口信用机构靠已验证的保管、质量和溯源数据，而非纸质证书和零星巡检，为西非农产品出口风险定价。滩头市场是承保西非可可、腰果出口业务的中型海湾和西非保险公司，起点是从加纳和科特迪瓦发往欧盟的可可，因为欧盟《零毁林法规》(EUDR)和持续的欺诈压力在这里催生出最尖锐的购买触发点。第一款产品不是交易所，也不是放贷方或工作流套件，而是一层针对特定走廊、可接入现有出单和授信流程的承保前风险评分与交接预警层。研究支持这个时机判断：西非贸易融资摩擦成本仍然很高、附加抵押要求普遍，电子提单采用率持续上升，而且一家保险公司亲自领投了 Maalexi 的融资，说明承保相关的买家愿意为已验证的农产品贸易基础设施掏钱。市场打法应把创始人主导销售(面向承保负责人和首席风险官)与走廊伙伴(验货机构、货物监管方、单据平台)结合起来，让第一个试点能借续保或事故复盘的窗口卖出去，而不必要求客户更换整套系统。目前测算的滩头市场规模依然有限——SAM 约 1,410 万美元，第 3 年 SOM 约 200 万美元——所以只有公司真正挣得逐条走廊向相邻品类、放贷方和再保险数据产品扩张的资格，这门生意才谈得上是风险投资级别的机会。最大的执行风险不只是软件质量，而是当地数据合作方能否以足够的覆盖面和足够低的腐败风险，交付经得起信任的承保前证据，进而改变承保决策。研究还留下两个尚未解决的关键缺口：究竟是哪 4 到 5 家保险公司掌握了足够的相关业务量，可以撑起第一批试点；以及目标走廊里到底有多大比例的货物是真正投保或经银行中介的，而不是走公开账户条款。
problem:
- "承保方给可可和腰果出口业务定价时，依然靠纸质证书、提单、经纪人证明和零星巡检，货物改道、掉包或评级造假往往要等到理赔发生后才被发现。"
- "抵押品可执行性弱、溯源要求又在收紧，这逼得保险公司和放贷方要么把风险定价定得偏高，要么额外索要抵押，要么在出口商仍需融资的走廊里压低敞口。"
solution:
- "把验货机构证明、电子提单或海关单据事件、保管遥测数据汇总成一个针对特定走廊、可接入现有承保流程的承保前风险评分和审计轨迹。"
- "在仓库和港口的交接节点持续监控同一批货物，把异常预警推送到承保或理赔环节，并让证据在银行、经纪商和交易所之间保持可移植。"
whyWeWin:
- "这款产品给保险公司的是一个中立的 API，买它不必押注某一家交易所，这一点和 Maalexi 式的场馆策略不同。"
- "切入点恰好卡在预算和紧迫感已经存在的地方：续保复核、赔付率复核，以及现在需要更多可审计证据的欧盟可可项目。"
- "与理赔挂钩的走廊数据、合作方履约历史、单据与遥测数据交叉图谱，能沉淀出比单一单据或 IoT 厂商更有防御力的承保模型。"
strategicChoices:
  beachhead: "承保西非可可、腰果出口业务(发往欧美买家)的中型海湾和西非贸易信用保险公司及出口信用机构，起点是从加纳和科特迪瓦发往欧盟的可可。"
  wedgeRationale: "这个切片同时具备集中的痛点、明确的买家、既有的单据工作流，以及近期的监管催化剂，比起横向覆盖所有农产品品类、再造一个交易所，或以银行作为首要客户，更能快速拿出验证结果。"
  sequencingRationale: "先为一条走廊搭好承保前评分和保管预警，再考虑更广的理赔、合规或撮合类产品，因为第一个验证点必须是可衡量的承保效果提升；先卖给保险公司，再考虑银行或出口商，因为触发点和预算都握在保险公司手里；先招聘系统对接和风险建模人才，再扩大销售规模，因为合作方数据质量决定试点能不能跑通。"
  notYet:
  - "运营大宗商品交易所或撮合平台。"
  - "在保险公司端验证结果出来之前，直接卖给出口商或走银行优先的工作流路线。"
  - "在可可打法尚未跑通、可复制之前，新增品类或非西非走廊。"
market:
  tam: >-
    测算 TAM 约 5,640 万美元，依据是西非可可、腰果出口货物的建模量、65% 的覆盖货物份额假设，以及每份已覆盖货物约 400 美元的年化混合收入。
  sam: >-
    测算 SAM 约 1,410 万美元，对应的是初始滩头市场——承保发往欧美买家的西非可可、腰果出口货物的海湾和西非保险公司。
  som: >-
    测算第 3 年 SOM 约 200 万美元，依据是在一条走廊拿下 4-5 个保险公司或出口信用机构客户之后，约 5,000 批已覆盖货物的规模。
  segments:
  - "承保西非可可、腰果出口业务的贸易信用保险公司和出口信用机构。"
  - "依赖同一批已投保货物的贸易融资银行和大宗商品放贷方。"
  buyingProcess: >-
    评估通常在欺诈事件、理赔复核或续保周期之后启动，此时承保团队想要更好的证据，但又不想增聘外勤人员。预算通常由承保负责人或首席风险官批准，前提是法务、合规和运营团队确认产品能嵌入现有的出单和贸易单据流程。
product:
  mvp: >-
    MVP 只覆盖一家保险公司、一条走廊、一个品类项目：接入验货报告、海关或电子提单事件和遥测数据完成承保前评分，再监控保管交接并出具带可移植审计轨迹的异常预警。它刻意不涉及交易撮合、资金流转和大而全的理赔平台。
  sixMonth: "上线第一个生产级的加纳或科特迪瓦可可走廊对接，包含保险公司仪表盘、接入承保流程的 API 输出、合作方 SLA 监控，以及针对有争议评分的人工复核规则。"
  twelveMonth: "加入 EUDR 证据打包、理赔反馈闭环，以及第二条走廊或第二个品类模板，让公司能销售可复制的保险公司部署方案，而不是一次性的定制对接。"
  twentyFourMonth: "把这层中立的风险层扩展到更多西非品类以及部分拉美或东南亚走廊，并向再保险公司和放贷方开放基准数据和异常数据的访问权限。"
  keyBets:
  - "承保方会依据第三方数字证据改变定价、出单或监控决策，而不是把这个评分只当作参考信息。"
  - "一条走廊的打法可以靠可复制的合作方对接来部署，而不必每次都靠定制化的现场作业。"
  - "早期试点积累的理赔和异常数据，能沉淀出比交易所、单据平台或 IoT 厂商单打独斗更好的损失模型。"
gtm:
  wedge: "向一家承保西非可可或腰果险种的保险公司卖一个付费走廊试点，由续保季的赔付率复核触发，目标是证明承保前报价速度和理赔前异常检测在一本出口保单上都能跑通。"
  channels:
  - "创始人亲自向海湾和西非保险公司、出口信用机构的承保负责人和首席风险官销售。"
  - "来自再保险公司、经纪商和贸易融资顾问的引荐，这些人本就在复核走廊损失情况。"
  - "与验货机构、货物监管方、单据或电子提单平台的部署合作，他们本就接触着放货管控和贸易单据流程。"
  funnelTargets: "线索转合格试点 15%-25%，合格试点转付费试点 40%以上，付费试点转正式生产 50%以上，首条走廊在 12 个月内扩展到第二条走廊的比例，在正式生产客户中达到 50%以上。"
  pricing: >-
    先卖一个付费走廊试点，再签订正式生产合同，合同结构为年度平台最低承诺费、按批次收取的验证费，加上与承保出口量挂钩的基点制订阅费。这符合保险公司按保单表现和承保货量而非按坐席数编列预算的习惯，同时让投资回报能清晰对照赔付率、报价速度和理赔调查成本来衡量。
businessModel:
  revenueStreams:
  - "按批次收取的验证和监控费用。"
  - "与承保出口量和 API 访问权限挂钩的年度走廊订阅费。"
  - "一旦损失数据库建立起来，向放贷方、出口信用机构或再保险公司提供的基准和理赔分析订阅服务。"
  unitOfValue: "从承保前到保管交接全程被监控的一批已投保货物。"
  targetGrossMarginPct: 70
  expansionLevers:
  - "在同一家保险公司的出口业务里追加更多品类和走廊。"
  - "向联合放贷银行、出口信用机构和再保险公司出售只读访问权限和基准数据。"
  - "在已监控货物之上叠加 EUDR 证据包和理赔分析。"
strategyMap:
  northStarMetric: "在生产环境中，已定价或正被验证走廊评分实时监控的已投保出口货物数量。"
  inputMetrics:
  - "目标走廊内的合格试点数量。"
  - "承保前数据在所需证据字段上的完整度。"
  - "相对人工承保的报价速度提升幅度。"
  - "在理赔或放款前检测到的异常数量。"
  - "付费试点转正式生产的转化率。"
  - "第二条走廊或第二个品类的扩张速度。"
  moatsToBuild:
  - "把单据异常、保管事件和最终理赔结果拼接起来的、与理赔挂钩的走廊风险模型。"
  - "覆盖验货机构、仓库和单据网络、按走廊分类的合作方履约图谱。"
  - "凌驾于任何单一交易所或工作流厂商之上的可移植审计轨迹和 EUDR 就绪证据历史。"
  killCriteria:
  - "到第 9 个月，首批 10 个合格目标客户中付费试点少于 2 个。"
  - "试点货物的承保前数据完整度低于 70%，或异常检测的误报率超过 20%。"
  - "到第 12 个月，没有任何一个试点展现出至少 30% 的报价提速，也没有一个可对外引用的止损或提前干预案例。"
  mermaid: |
    flowchart LR
      Wedge[EU cocoa insurer wedge] --> MVP[Pre-bind score plus custody alerts]
      MVP --> Proof[Pilot loss and quote-speed proof]
      Proof --> Expansion[More corridors commodities and data buyers]
investorMemo:
  verdict:
    call: 观察
    conviction: "切入点和时机信号都很强，但在公司证明一个集中的买家群体愿意为一款独立 API 付费、且当地数据合作方能撑起软件级别的利润率之前，信心仍然有限。"
    whyBelieve: "这家初创公司瞄准的是一个真实的承保痛点，产品形态中立，又踩在明显的品类热度、快速发展的数字贸易基础设施和走廊层面合规压力的节点上。"
    whyDoubt: "初始市场狭窄，客户集中度尚未得到验证，执行成败还取决于分散贸易走廊里现场数据的可信度和合作方的操守。"
    nextDiligence: "拿下一个付费保险公司试点，并列出 4-5 家锚点客户的具名清单，附上有据可查的货运量、理赔痛点和承保前数据可得性。"
  firstCustomer:
    title: "一家承保发往欧盟可可出口业务的海湾或西非贸易信用保险公司的承保负责人。"
    profile: "一家已经在承保可可或腰果货运险的中型保险公司或出口信用机构，依赖外部验货机构和纸质贸易单据，希望在不承担更多不透明欺诈风险的前提下扩大走廊业务量。"
    trigger: "续保季的损失复核、一起欺诈事件，或欧盟买家的溯源要求升级，暴露出对纸质抵押品证据信心不足的问题。"
    buyer: "承保负责人或首席风险官"
    initialContract: "先签一份 5 万到 10 万美元的付费走廊试点合同，覆盖一本已投保的可可业务，一旦保险公司在整条走廊的实时定价和保管预警中用上这个评分，再转为 20 万到 40 万美元的年度生产合同。"
  mustBeTrue:
  - "滩头市场里的四到五家保险公司或出口信用机构掌握了足够的西非可可或腰果业务量，能支撑一套集中打首批客户的策略。"
  - "来自验货机构、海关、单据和遥测数据的承保前证据，能在大多数试点货物上足够早地拿到，从而改变承保决策。"
  - "一条走廊的试点能把报价速度或人工复核工作量至少提升 30%，并发现人工流程漏掉的异常。"
  - "当地合作方的 SLA 能达到数据完整度和反腐门槛，而不会把毛利率拖垮成一门服务型生意。"
  - "保险公司足够看重交易所中立的可移植性，愿意买一个独立 API，而不是等交易所或单据厂商把类似功能捆绑进来。"
  diligenceQuestions:
  - "哪些具名的海湾和西非保险公司或出口信用机构，拥有最高的可可或腰果承保量，以及近期的欺诈或理赔痛点？"
  - "在承保前实际能拿到多少有决策价值的数据，相对于货物已经在途之后才能拿到的数据？"
  - "对买家来说，实践中最看重的 KPI 是赔付率、报价速度、放款成数，还是理赔调查时间？"
  - "验货机构、仓库和单据合作方能否在加纳和科特迪瓦以可接受的单位经济模型，满足反腐和正常运行时间的 SLA？"
  - "再保险公司和经纪商会把这个产品当作损失控制工具引入，还是视为额外的运营摩擦？"
operatingAssumptions:
- assumption: "滩头市场里至少有 4 家保险公司或出口信用机构，眼下已经编列了数字风险预算，而不只是泛泛地对创新感兴趣。"
  basis: research.yaml
  validationTest: "访谈 12 家目标保险公司、出口信用机构、经纪商和再保险公司，在 6 个月内拿到至少 2 份付费试点承诺或签署的意向书。"
  decisionImpact: "如果不成立，就收窄到一个主权走廊、转向以出口信用机构为主，或搁置这个独立承保命题。"
- assumption: "对大多数目标货物来说，有决策价值的证据能在承保前拿到。"
  basis: research.yaml
  validationTest: "在 50 批历史或在途货物中证明，第一条走廊所需字段有 70% 以上能在保单出具前拿到。"
  decisionImpact: "如果不成立，就从承保时评分转向承保后监控和理赔防范工作流。"
- assumption: "交易所中立的定位是一个真实的购买理由，而不只是一个功能偏好。"
  basis: idea.yaml
  validationTest: "在拓客和赢单/丢单复盘中确认，超过 60% 的合格潜客把跨银行、经纪商或交易所的可移植性列为参与洽谈的理由，并且前 2 个试点在混合厂商环境中运行。"
  decisionImpact: "如果不成立，就与某一个场馆或工作流平台合作或做白标，而不是自建一个独立品类。"
- assumption: "当地验货机构、仓库和单据合作方能在不拖垮毛利率的前提下，满足数据质量和反腐门槛。"
  basis: research.yaml
  validationTest: "开展 3 个合作方试点，SLA 目标为事件完整度超过 95%，每 100 批已监控货物的未解决审计异常不超过 1 起。"
  decisionImpact: "如果不成立，就进一步收窄走廊范围，有意识地增加高触达运营投入，或放弃这个市场。"
- assumption: "扣除合作方和数据成本后，第一条走廊的打法仍能支撑软件级别的经济模型。"
  basis: operator judgment
  validationTest: "到第三个试点时，把合作方和数据成本控制在已监控货物年化生产收入的 30% 以下。"
  decisionImpact: "如果不成立，就提价、收窄监控工作流，或在公司变成一门服务型重资产生意之前及时止损。"
experimentRoadmap:
- horizon: "0–90 天"
  experiment: "访谈 12 家聚焦加纳、科特迪瓦可可和腰果走廊的目标保险公司、出口信用机构、经纪商和再保险公司。"
  hypothesis: "首批市场足够集中，4-5 家客户掌握了大部分可触达的业务量，并且正承受着赔付率压力。"
  successMetric: "至少 3 个合格的保险公司潜客，各自有明确的买家、走廊业务量和预算触发点。"
  owner: "创始人/CEO"
- horizon: "0–90 天"
  experiment: "用一个验货网络、一个货物监管方或仓库运营商、一个单据或电子提单来源，搭出第一条走廊的数据栈。"
  hypothesis: "承保前所需证据能在大多数货物出单前拼齐。"
  successMetric: "在 50 批历史或在途货物记录中，所需字段有 70% 以上能在承保前拿到。"
  owner: "创始工程师"
- horizon: "0–90 天"
  experiment: "和一个共创客户一起，在历史货物档案上回测原型风险评分。"
  hypothesis: "多源证据能识别出人工纸质审核会漏掉的异常模式。"
  successMetric: "模型能标记出相当一部分已知异常案例，且承保方能接受的误报率低于 20%。"
  owner: "风险产品负责人"
- horizon: "3–6 个月"
  experiment: "在发往欧盟的可可货物上跑第一个付费走廊试点。"
  hypothesis: "即便完整的理赔证据还没跑出来，只要能提升速度和可见度，承保团队就愿意为一个中立评分层付费。"
  successMetric: "签下并跑通一个付费试点，覆盖至少 100 批货物，并追踪试点前后的承保指标对比。"
  owner: "创始人/CEO"
- horizon: "6–12 个月"
  experiment: "把试点转为正式生产，加入理赔和异常反馈闭环。"
  hypothesis: "试点结果足够扎实，能让这个评分成为实盘出单或监控流程的一部分。"
  successMetric: "签下一份生产合同，并拿到一个可对外引用的案例，展示 30% 以上的报价提速，或一个止损/提前干预的结果。"
  owner: "解决方案负责人"
- horizon: "9–18 个月"
  experiment: "通过合作方主导的部署，把这套打法复制到第二条走廊或相邻品类。"
  hypothesis: "第一条走廊的打法足够可复用，能支撑高效扩张。"
  successMetric: "拿下第二个付费客户，且复用第一条走廊至少 50% 的合作方和对接打法。"
  owner: "合作伙伴负责人"
operations:
- "维护走廊上线打法手册，涵盖验货机构审核、仓库放货管控、单据规则手册，以及保险公司的人工复核政策。"
- "在出具生产级风险评分前核对至少两个独立证据来源，并把有争议的货物转入人工承保。"
- "与每家保险公司开展季度赔付率和理赔复核，重新校准阈值并验证投资回报。"
- "对接现有的出单、信用证和理赔流程，而不是要求客户更换整套系统。"
- "维护针对 MLETR 或 ETDA 类单据效力和 EUDR 证据要求的走廊合规地图。"
team:
- role: "创始人/CEO"
  startTiming: "第 0 个月"
  rationale: "在买家问题和触发时机仍在验证阶段时，亲自负责保险公司销售、经纪商与再保险公司的引荐，以及走廊选择。"
- role: "创始工程师"
  startTiming: "第 0 个月"
  rationale: "搭建第一条走廊试点所需的数据接入管道、评分 API 和审计轨迹。"
- role: "风险产品负责人"
  startTiming: "第 2-4 个月"
  rationale: "用历史货运、异常和理赔数据校准评分逻辑，让试点真正具备决策价值。"
- role: "解决方案与合作运营负责人"
  startTiming: "第 4-6 个月"
  rationale: "把验货机构、仓库和单据合作方的上线流程标准化，减少定制化部署工作。"
- role: "合作伙伴负责人"
  startTiming: "第 9-12 个月"
  rationale: "只在第一个验证点跑出来之后，才扩大经纪商、再保险公司和走廊合作方的分销规模。"
milestones:
- horizon: "0–12 个月"
  items:
  - "完成 12-15 次 ICP(理想客户画像)访谈，锁定业务量最集中的 4-5 家保险公司或出口信用机构。"
  - "上线第一个加纳或科特迪瓦可可走廊 MVP，完成验货机构、单据和遥测数据的对接。"
  - "签下 1-2 个付费试点，并把至少 1 个转为正式生产，附带可衡量的报价提速或异常检测改善。"
  - "建立可复制的合作方 SLA 和第一份走廊合规打法手册。"
- horizon: "12–24 个月"
  items:
  - "在可可及相邻腰果走廊拿下 4-5 家保险公司或出口信用机构客户。"
  - "加入理赔反馈、EUDR 证据打包，以及面向放贷方或再保险公司的只读数据访问。"
  - "证明第二条走廊部署能复用第一次实施打法的至少一半内容。"
- horizon: "24–36 个月"
  items:
  - "只有在走廊单位经济模型和数据质量得到验证之后，才拓展一个新地域或新品类。"
  - "为再保险公司、银行或交易所推出基准和理赔分析产品。"
  - "成为多个单据和工作流场馆共用的中立风险层，而不是绑定在某一家交易所身上。"
risks:
- risk: "具名保险公司掌握的承保业务量或预算不足以支撑集中式的销售打法。"
  likelihood: High
  impact: High
  mitigation: "在搭建定制对接之前先核实走廊业务量和预算触发点，如果业务量集中在别处，就转向出口信用机构或收窄走廊范围。"
- risk: "当地验货机构、仓库或遥测数据不可靠，甚至可能被腐败操纵，足以瓦解评分的可信度。"
  likelihood: High
  impact: High
  mitigation: "在正式承保前要求多源交叉印证、合作方审计，并对有争议的货物启动人工复核。"
- risk: "交易所、工作流或单据平台捆绑出类似的面向保险公司的评分功能。"
  likelihood: Medium
  impact: High
  mitigation: "靠交易所中立的可移植性、与理赔挂钩的模型表现，以及保险公司自有的审计历史来做差异化。"
- risk: "监管或 EUDR 时间表的变动，拖慢紧迫感或让部署复杂化。"
  likelihood: Medium
  impact: Medium
  mitigation: "先靠赔付率和报价提速来卖，并挑选纸质流程和数字证据能并存的走廊。"
- risk: "试点部署变得过于定制化，达不到软件级别的利润率。"
  likelihood: Medium
  impact: High
  mitigation: "把打法收敛到一条走廊模板，尽量复用同一套合作方体系，拒绝会破坏可复制性的边缘案例。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "资金用于支撑 18 个月的走廊 MVP 搭建、合作方对接与合规工作、4-5 个核心岗位的招聘，以及 1-2 个付费保险公司试点，最终落地至少一个生产部署和一套可复制的第一条走廊打法。"
