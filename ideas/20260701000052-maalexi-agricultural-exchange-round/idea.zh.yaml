topRisks:
- name: "交易所平台向下游整合承保环节"
  description: "Maalexi 或类似交易所可能自建面向保险公司的风险评分层，把独立验证服务商挤出局。"
  mitigation: "以不依赖交易所的中立层身份直接卖给保险公司，并通过合同锁定数据可移植性，让保险公司关系保持在自己手里，而不是经由某一家交易所的合作绕道。"
- name: "实物验证仍可能被人为操纵"
  description: "被收买的验货师、被伪造的传感器信号或被篡改的保管记录，都可能瓦解保险公司所依赖的风险评分，造成毁掉信任的失败。"
  mitigation: "在出具评分前要求多源交叉印证(IoT 遥测数据、海关/卫星数据、独立验货机构签字)，并配合密码学层面的异常检测。"
- name: "监管和走廊差异拖慢扩张速度"
  description: "西非、海湾和欧盟的保险及贸易融资规则差异很大，拉长了销售周期，也让统一的合规打法变得复杂。"
  mitigation: "先在一条走廊、一家保险公司落地，沉淀出成文的合规与对接打法，再联合当地再保险公司或出口信用机构逐条走廊复制。"
