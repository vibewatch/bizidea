differentiator: >-
  和交易所或撮合平台运营商不同，这款产品不要求保险公司或出口商把交易活动搬到新平台上。它卖给核保团队的是一个可移植的风险评分，能直接嵌进他们已经在承保的保单和授信额度里——不管货物最终经由哪家交易所、银行还是经纪商清算。正是这种中立性，让它有机会成为多家互相竞争的农产品交易所共用的风险数据基准层，而不是押注某一家在这场撮合平台大战中胜出。
conceptDiagram:
  title: 农产品出口抵押品风险验证流程
  mermaid: |
    flowchart LR
      Shipment[Cocoa/cashew export shipment] --> Oracle[IoT custody + customs + surveyor oracle]
      Oracle --> RiskAPI[Agri Collateral Risk API]
      Insurer[Trade-credit insurer underwriting desk] --> RiskAPI
      RiskAPI --> Score[Verified collateral risk score]
      Score --> Policy[Priced trade-credit policy or credit line]
      Policy --> Exporter[Exporter receives financing]
