problem: >-
  承保跨境农产品出口融资的贸易信用保险公司和区域出口信用机构，如今给风险定价时，依然靠纸质原产地证书、提单和验货师的定期巡检。这些单据慢、容易造假，也反映不出货物从农场到港口再到买家这一路上真正发生了什么。一旦货物被改道、掉包或评级造假，保险公司和放贷方往往要等到理赔或违约发生后才发现——于是它们要么在高风险走廊拒保，要么把保费定得偏高，要么把敞口压得远低于出口商的真实融资需求。
targetUser:
  primary: "为农产品出口货物融资的区域贸易信用保险公司和出口信用机构中的承保团队"
  secondary: "对同一批已投保货物提供联合贷款的贸易融资银行和大宗商品交易部门"
  buyer: "区域贸易信用保险公司的承保负责人或首席风险官"
startupThesis:
  nonObviousInsight: "多数农业金融科技的关注点都放在搭建交易所或撮合平台本身，但保险公司 Tawuniya 选择领投 Maalexi，说明近期真正握有预算的是给风险定价的承保方，而不是撮合交易的交易所运营方——一个独立于任何交易所、直接卖给保险公司的风险验证层，能比再造一个竞品交易所更快拿到预算。"
  beachhead: "西非和海湾地区中型贸易信用保险公司里，为发往欧美买家的可可、腰果出口货物承保的核保团队"
  wedge: "一个抵押品验证 API——把 IoT 保管遥测数据、海关与物流数据、独立验货机构的证明整合成一个实时风险评分，让保险公司直接接入现有承保流程，先打透一条出口走廊"
  whyNowCatalyst: "一家保险公司公开领投代币化农产品验证融资，说明承保方已经在为这个品类主动编列预算，而不是坐等交易所生态先成熟起来。"
  ventureScalePath: "先从一家保险公司、一条高欺诈风险的可可/腰果走廊切入，验证赔付率能否改善，再按走廊、按品类逐步扩展到西非、拉美和东南亚，同时叠加一个再保险级别的风险数据市场——任何保险公司、银行或交易所(包括 Maalexi 这类平台)都可以订阅。"
solution: >-
  在货物原产地部署一套轻量级验证体系——IoT 集装箱/保管传感器、卫星与海关数据接入、经过审核的独立验货机构网络——持续证明货物从仓库到船舶这一路上的质量、保管链条和位置。这些数据会喂给一个风险评分 API，保险公司可以直接从自己的承保系统调用它，在货物离港前为保单定价或审批授信额度，并在关键保管交接点再次调用，抢在理赔发生之前拦截改道或掉包。评分模型和验证记录都是可移植的，保险公司或放贷方不必绑定某一个交易所或撮合平台才能用上这些数据。
goToMarketSeed:
  firstCustomer: "中型贸易信用保险公司或出口信用机构的承保负责人，目前正为发往欧美买家的西非可可或腰果出口商承保"
  buyingTrigger: "可可/腰果出口保单出现一次代价高昂的欺诈或违约事件后，续保季的赔付率复核，叠加 Tawuniya 领投 Maalexi 所释放出的保险公司对代币化验证的明确兴趣"
  currentAlternative: "人工审核纸质原产地证书、提单和第三方验货机构的定期巡检报告，辅以经纪人证明"
  switchingReason: "一个即插即用的 API 能在不增聘验货人员的情况下压缩理赔调查时间、降低赔付率；而且验证记录可移植、不绑定单一交易所，保险公司在选择合作的交易平台和放贷方时仍保有主动权。"
  pricingHypothesis: "按批次收取验证费，外加与承保出口量挂钩的基点制风险数据订阅费"
