scenarios:
  downside:
    description: Paid-pilot conversion slows, one anchor logo slips, and partner data quality keeps production pricing near the low end of the BP range, so the company exits Y3 with only 4 active corridor accounts and would need an extension round.
    y3RevenueK: 1497.0
    y3EbitdaK: -977.0
    cashLowPointK: -399.5
    keyAssumptionChanges:
      - First paid pilot slips from M6 to M8 and Y3 exits at 4 active corridor accounts instead of 6.
      - Blended monthly revenue per account tops out at $33K by Q4Y3 instead of $37K.
      - Gross margin tops out at 68% because partner monitoring remains more manual than planned.
  base:
    description: 'The base case follows the BP path: first paid pilot in month 6, 4 active corridor accounts by Month 24, and 6 by Y3 exit through modest second-corridor expansion and analytics upsell inside existing insurer relationships.'
    y3RevenueK: 2103.0
    y3EbitdaK: -483.7
    cashLowPointK: 390.6
    keyAssumptionChanges:
      - Customer ramp moves from 2 active paid accounts at Y1 exit to 4 at Y2 exit and 6 at Y3 exit.
      - Gross margin expands from 50% in the first pilot months to 72% in Q4Y3 as partner workflows become reusable.
      - Only two incremental GTM hires are added through Y3 because the market stays concentrated and expansion comes mostly from existing logos.
  upside:
    description: One broker or reinsurer channel works early, the first corridor becomes repeatable faster than planned, and the company exits Y3 with 7 active corridor accounts plus better analytics attach, putting EBITDA near breakeven to slightly positive.
    y3RevenueK: 2953.5
    y3EbitdaK: 181.6
    cashLowPointK: 1241.5
    keyAssumptionChanges:
      - Q4Y3 active corridor accounts rise to 7 instead of 6 because one partner channel accelerates second-logo wins.
      - Blended monthly revenue per account reaches $40K by Q4Y3 through richer shipment-fee volume and analytics attach.
      - Gross margin reaches 74% as onboarding playbooks and partner SLAs reduce manual exception handling.
sensitivity:
  - variable: ARPU
    downsideCase: $300K production account-year with weaker shipment-fee capture
    baseCase: $390K steady-state account-year
    upsideCase: $430K+ account-year with analytics and higher monitored shipment volume
    y3RevenueImpactK: -420.0
    cashImpactK: -300.0
  - variable: CAC
    downsideCase: $200K CAC if founder-led selling stays primary and referrals are weak
    baseCase: $160K CAC with concentrated direct sales and some same-logo expansion
    upsideCase: $120K CAC if broker and reinsurer introductions supply most qualified pilots
    y3RevenueImpactK: -120.0
    cashImpactK: -240.0
  - variable: churn
    downsideCase: 3.0% monthly if early corridor proof is inconsistent
    baseCase: 2.0% monthly account churn
    upsideCase: 1.0% monthly if production accounts expand before renewal
    y3RevenueImpactK: -170.0
    cashImpactK: -150.0
  - variable: sales cycle
    downsideCase: 8-9 months end-to-end; first paid pilot lands in M8
    baseCase: ~6 months; first paid pilot lands in M6
    upsideCase: 4-5 months; partner-introduced pilot lands in M5
    y3RevenueImpactK: -606.0
    cashImpactK: -790.0
  - variable: gross margin
    downsideCase: 68% Y3 gross margin because partner monitoring stays labor-heavy
    baseCase: 71% Y3 gross margin
    upsideCase: 74% Y3 gross margin with cleaner SLAs and less exception work
    y3RevenueImpactK: 0.0
    cashImpactK: -170.0
  - variable: hiring pace
    downsideCase: Two scale hires are pulled forward before repeatability is proven
    baseCase: 7 FTE by Q4Y2 and 9 FTE by Q4Y3
    upsideCase: One back-half GTM hire is delayed until after the second corridor proves itself
    y3RevenueImpactK: 0.0
    cashImpactK: -220.0
modelDiagram:
  title: corridor account economics
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> CorridorAccounts
      CorridorAccounts --> MonitoredShipments
      MonitoredShipments --> Revenue
      CorridorAccounts --> BenchmarkData
      BenchmarkData --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from growing active paid corridor accounts from 2 at Y1 exit to 6 at Y3 exit while blended account ARPU rises from pilot-heavy ~$28K months to ~$37K months.
  - checkName: Must go right
    finding: The company must land a first paid pilot by M6 and keep partner and data costs below the BP's 30% ceiling so gross margin can clear 70% by Y3.
  - checkName: Model breaks if
    finding: If the sales cycle stretches toward 8-9 months or partner data quality delays production pricing, downside revenue falls to about $1.5M and cash dips roughly $0.4M below zero.
  - checkName: Next-round proof
    finding: A seed story exists once the pre-seed gets the company to 3 paid or production accounts by Month 18 and 4 active corridor accounts by Month 24 with a referenceable underwriting ROI case.
sanityChecks:
  ruleOf40: Y3 growth 91% + EBITDA margin -23% = 68%
  burnMultiple: Y2 burn multiple 0.9x (burn $786K on $854K incremental revenue), improving to 0.5x in Y3.
  revenuePerFte: $234K Y3 using 9 Q4Y3 FTE (benchmark $200–400K vertical SaaS)
  flags:
