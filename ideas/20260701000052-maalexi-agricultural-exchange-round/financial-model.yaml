slug: agri-export-collateral-risk-oracle
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: month
    source: '[BP date 2026-07-01]; heuristic: the plan is dated on the first day of the month, so the financial model starts immediately rather than waiting for the next accounting period.'
  - id: A2
    name: Opening cash from pre-seed raise
    value: '2500'
    unit: USD K
    source: '[BP fundingAsk.targetFundingRangeUsd $2-4M]; model uses a $2.5M opening cash balance near the low end because the beachhead is narrow and the BP argues for proving one corridor before overcapitalizing.'
  - id: A3
    name: Customer unit definition
    value: active paid insurer or ECA corridor account
    unit: unit
    source: '[BP gtm.pricing paid corridor pilot followed by production contract]; [BP businessModel.unitOfValue verified insured shipment]; model counts a paid corridor account rather than individual shipments so contract revenue reconciles cleanly to customers × ARPU.'
  - id: A4
    name: Starting customers (M1)
    value: '0'
    unit: count
    source: '[BP milestones first paid pilot occurs in the first 6 months, so the model starts with no paying accounts.]'
  - id: A5
    name: Initial paid pilot contract value
    value: '75'
    unit: USD K per pilot
    source: '[BP investorMemo.firstCustomer initialContract $50k-$100k paid corridor pilot]; model uses the midpoint.'
  - id: A6
    name: Steady-state annual revenue per production corridor account
    value: '390'
    unit: USD K per account-year
    source: '[BP investorMemo.firstCustomer production contract $200k-$400k annual]; [BP gtm.pricing adds per-shipment and volume-linked fees]; model uses an upper-midpoint steady-state account value once one corridor is live.'
  - id: A7
    name: Y1 blended monthly revenue per active account
    value: M6-M12 = 20,20,22,24,25,27,28
    unit: USD K per account-month
    source: '[A5-A6]; [BP milestones 1-2 paid pilots and at least 1 production conversion by month 12]; operator judgment that Y1 stays pilot-heavy.'
  - id: A8
    name: Y2 blended monthly revenue per active account
    value: Q1-Q4 = 28,30,32,34
    unit: USD K per account-month
    source: '[A6]; [BP milestones 4-5 insurer or ECA logos by months 12-24]; model assumes corridor accounts convert from pilot pricing toward production plus shipment fees through Y2.'
  - id: A9
    name: Y3 blended monthly revenue per active account
    value: Q1-Q4 = 34,35,36,37
    unit: USD K per account-month
    source: '[A6]; [BP milestones 24-36 months add benchmark and claims-analytics products]; [Research market.som $2.0M year-3]; model assumes one or two second-corridor or analytics expansions by Y3.'
  - id: A10
    name: Y1 end-of-month active paid corridor accounts
    value: 0,0,0,0,0,1,1,1,2,2,2,2
    unit: accounts
    source: '[BP experimentRoadmap first paid pilot in months 3-6 and one production contract in months 6-12]; [BP milestones sign 1-2 paid pilots by month 12].'
  - id: A11
    name: Y2 quarter-end active paid corridor accounts
    value: 2,3,3,4
    unit: accounts
    source: '[BP milestones reach 4-5 insurer or ECA logos across cocoa and adjacent cashew corridors by month 24]; model uses 4 paid corridor accounts by Q4Y2 as the conservative end of that range.'
  - id: A12
    name: Y3 quarter-end active paid corridor accounts
    value: 4,5,5,6
    unit: accounts
    source: '[BP milestones 24-36 months expand to a new geography or commodity family and launch analytics products]; model assumes 6 active corridor accounts by Q4Y3, including second-corridor expansion inside existing logos rather than only new logos.'
  - id: A13
    name: Gross margin ramp
    value: Y1 50-58%; Y2 61-69%; Y3 70-72%
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 70]; [BP operatingAssumptions partner and data costs must stay below 30% by the third pilot]; startup-finance heuristic: pilots are services-heavier before the corridor template is reusable.'
  - id: A14
    name: Founder loaded annual cash compensation
    value: '150'
    unit: USD K
    source: Startup-finance heuristic for a pre-seed founder taking below-market but full-cash compensation while covering payroll tax and benefits.
  - id: A15
    name: Engineering loaded annual compensation
    value: '180'
    unit: USD K per FTE
    source: '[BP team needs founding engineering plus later corridor integrations]; startup-finance heuristic for cross-border B2B data and API talent.'
  - id: A16
    name: Risk product loaded annual compensation
    value: '190'
    unit: USD K per FTE
    source: '[BP team risk product lead calibrates scoring logic against shipment and claims data]; startup-finance heuristic for underwriting-model talent.'
  - id: A17
    name: Solutions and partner-ops loaded annual compensation
    value: '140'
    unit: USD K per FTE
    source: '[BP team solutions and partner operations lead standardizes surveyor, warehouse, and document onboarding]; startup-finance heuristic for deployment plus partner-operations scope.'
  - id: A18
    name: Partnerships and GTM loaded annual compensation
    value: '160'
    unit: USD K per FTE
    source: '[BP team partnerships lead starts after first proof point]; startup-finance heuristic for one enterprise seller or partnerships operator with travel-heavy corridor coverage.'
  - id: A19
    name: Hiring schedule
    value: M3 risk lead; M5 solutions/partner ops; M10 partnerships lead; M16 engineer2; M22 partner-ops2; M29 GTM2; M34 engineer3
    unit: hires
    source: '[BP team startTiming]; [BP strategicChoices.sequencingRationale integration and risk-model talent before scaled sales]; model adds only the minimum extra hires needed to support 4-6 corridor accounts.'
  - id: A20
    name: Non-salary sales and marketing spend
    value: 8-24
    unit: USD K per month
    source: '[BP gtm channels are founder-led direct sales, broker and reinsurer introductions, and partner deployment]; startup-finance heuristic for travel, conferences, broker development, and CRM in a narrow enterprise market.'
  - id: A21
    name: Non-salary R&D and data-feed spend
    value: 10-22
    unit: USD K per month
    source: '[BP product requires surveyor, customs or eBL, telemetry, and audit-trail integrations]; startup-finance heuristic for cloud, data normalization, and API usage costs before scale efficiencies.'
  - id: A22
    name: Non-salary G&A and compliance spend
    value: 7-17
    unit: USD K per month
    source: '[BP operations require compliance maps, legal review, insurance, and auditability]; startup-finance heuristic for pre-seed legal, accounting, and trade-compliance overhead.'
  - id: A23
    name: Blended CAC
    value: '160'
    unit: USD K per new corridor account
    source: Model-derived from about $1.0M of cumulative sales and marketing spend through Y3 over 6 active corridor-account wins; rounded to reflect concentrated enterprise selling and some same-logo expansions.
  - id: A24
    name: Steady-state annual ARPU for unit economics
    value: '390'
    unit: USD K per active corridor account
    source: '[A6]; unit economics use the steady-state production account value rather than the pilot-heavy early-year blend.'
  - id: A25
    name: Monthly customer churn
    value: '2.0'
    unit: percent
    source: Startup-finance heuristic for high-ACV insurance infrastructure contracts where logo churn is low but corridor programs can roll off if proof or partner quality weakens.
  - id: A26
    name: Next-round milestone plus buffer
    value: 3 paid or production corridor accounts by Month 18 and 4 by Month 24
    unit: milestone
    source: '[BP experimentRoadmap one production contract by months 6-12 and second logo replication by months 9-18]; [BP milestones 4-5 logos by months 12-24]; funding ask includes a six-month cash buffer beyond the Month-18 proof point.'
