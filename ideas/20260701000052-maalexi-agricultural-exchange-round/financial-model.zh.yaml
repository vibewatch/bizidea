scenarios:
  downside:
    description: 付费试点转化放缓，一个锚点客户延迟落地，合作方数据质量又把生产定价压在商业计划书区间的低端，公司到第 3 年结束时只有 4 个活跃走廊账户，需要一轮过桥融资。
    y3RevenueK: 1497.0
    y3EbitdaK: -977.0
    cashLowPointK: -399.5
    keyAssumptionChanges:
    - 首个付费试点从第 6 个月推迟到第 8 个月，第 3 年结束时活跃走廊账户为 4 个，而不是 6 个。
    - 到第 3 年第 4 季度，单账户月均混合收入最高只到 3.3 万美元，而不是 3.7 万美元。
    - 毛利率最高只到 68%，因为合作方监控仍比计划中更依赖人工。
  base:
    description: '基准情形沿着商业计划书的路径走：第 6 个月拿下首个付费试点，第 24 个月拿到 4 个活跃走廊账户，靠既有保险公司客户内部的适度第二走廊扩张和分析产品追加销售，到第 3 年结束时达到 6 个。'
    y3RevenueK: 2103.0
    y3EbitdaK: -483.7
    cashLowPointK: 390.6
    keyAssumptionChanges:
    - 客户数从第 1 年结束时的 2 个活跃付费账户，增长到第 2 年结束时的 4 个，再到第 3 年结束时的 6 个。
    - 毛利率从首批试点月份的 50% 扩大到第 3 年第 4 季度的 72%，因为合作方工作流变得可复用。
    - 到第 3 年只新增两个 GTM 岗位，因为市场依然集中，扩张主要来自现有客户。
  upside:
    description: 一条经纪商或再保险渠道提前跑通，第一条走廊比计划更快变得可复制，公司到第 3 年结束时拿到 7 个活跃走廊账户，分析产品的搭售也更好，EBITDA 逼近盈亏平衡甚至略转正。
    y3RevenueK: 2953.5
    y3EbitdaK: 181.6
    cashLowPointK: 1241.5
    keyAssumptionChanges:
    - 到第 3 年第 4 季度，活跃走廊账户增至 7 个而非 6 个，因为一条合作渠道加速了第二个客户的拿下。
    - 到第 3 年第 4 季度，单账户月均混合收入达到 4 万美元，得益于更丰厚的批次费和分析产品搭售。
    - 毛利率达到 74%，因为上线打法手册和合作方 SLA 减少了人工异常处理工作量。
sensitivity:
- variable: ARPU
  downsideCase: 生产账户年值降到 30 万美元，批次费捕获能力偏弱
  baseCase: 稳态账户年值 39 万美元
  upsideCase: 账户年值 43 万美元以上，叠加分析产品和更高的已监控货量
  y3RevenueImpactK: -420.0
  cashImpactK: -300.0
- variable: CAC
  downsideCase: 如果创始人直销仍是主渠道、引荐不足，CAC 升到 20 万美元
  baseCase: CAC 16 万美元，以集中式直销加部分同客户内扩张为主
  upsideCase: 如果经纪商和再保险公司引荐贡献了大部分合格试点，CAC 降到 12 万美元
