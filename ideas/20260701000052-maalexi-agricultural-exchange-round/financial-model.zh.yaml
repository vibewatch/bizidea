modelDiagram:
  title: 走廊账户经济模型
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> CorridorAccounts
      CorridorAccounts --> MonitoredShipments
      MonitoredShipments --> Revenue
      CorridorAccounts --> BenchmarkData
      BenchmarkData --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入来自活跃付费走廊账户从第 1 年结束时的 2 个增长到第 3 年结束时的 6 个，同时单账户混合 ARPU 从试点为主的约 2.8 万美元/月升到约 3.7 万美元/月。
- checkName: 必须成立的前提
  finding: 公司必须在第 6 个月前拿下首个付费试点，并把合作方和数据成本控制在商业计划书 30% 的上限之内，毛利率才能在第 3 年冲过 70%。
- checkName: 模型崩溃的临界点
  finding: 如果销售周期拉长到 8-9 个月，或者合作方数据质量拖慢了生产定价，下行情形的收入会跌到约 150 万美元，现金会跌破零约 40 万美元。
- checkName: 下一轮融资的证明点
  finding: 只要预种子轮资金能让公司在第 18 个月拿到 3 个付费或生产账户，并在第 24 个月拿到 4 个活跃走廊账户，再加上一个可对外引用的承保投资回报案例，种子轮的故事就成立。
sanityChecks:
  ruleOf40: 第 3 年增长率 91% + EBITDA 利润率 -23% = 68%
  burnMultiple: 第 2 年烧钱倍数 0.9 倍(在 85.4 万美元增量收入上烧掉 78.6 万美元)，第 3 年改善到 0.5 倍。
  revenuePerFte: 按第 3 年第 4 季度 9 名全职员工计算，人均年收入 23.4 万美元(对标垂直 SaaS 基准 20 万至 40 万美元)
  flags:
  - 第 3 年 EBITDA 利润率仍为负，所以下一轮融资要靠走廊可复制性和承保投资回报证明，而不是靠盈利本身。
  - 四到六个活跃走廊账户很可能只对应 4-5 家保险公司客户，所以一个锚点客户的延迟就可能让年收入摆动约 30 万至 40 万美元。
  - 毛利率只有在合作方和数据接入成本于第三个试点前保持在商业计划书 30% 上限以下时，才能冲过 70%。
  - 模型假设承保前数据完整度达到 70% 以上，且首个付费试点在第 6 个月落地；只要有一项落空，下行情形的现金就会转负。
