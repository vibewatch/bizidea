slug: agri-export-collateral-risk-oracle
date: '2026-07-01'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-01]；经验法则：商业计划书的日期是当月第一天，因此财务模型直接从这个月起算，不必等到下一个会计期。'
- id: A2
  name: 预种子轮融资到账现金
  value: '2500'
  unit: USD K
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M]；模型采用 250 万美元的期初现金余额，接近区间下限，因为滩头市场狭窄，商业计划书也主张先验证一条走廊，再考虑融资过量。'
- id: A3
  name: 客户单位定义
  value: 活跃付费保险公司或出口信用机构走廊账户
  unit: unit
  source: '[BP gtm.pricing 付费走廊试点后转正式生产合同]；[BP businessModel.unitOfValue 已验证的已投保货物]；模型按付费走廊账户计数，而非按单批货物计数，这样合同收入能干净地对应到客户数 × ARPU。'
- id: A4
  name: 起始客户数(第 1 个月)
  value: '0'
  unit: count
  source: '[BP milestones 首个付费试点发生在前 6 个月内，因此模型从零付费账户起算。]'
- id: A5
  name: 首个付费试点合同金额
  value: '75'
  unit: USD K per pilot
  source: '[BP investorMemo.firstCustomer initialContract 5 万至 10 万美元的付费走廊试点]；模型取区间中点。'
- id: A6
  name: 生产阶段走廊账户的稳态年收入
  value: '390'
  unit: USD K per account-year
  source: '[BP investorMemo.firstCustomer production contract 年度 20 万至 40 万美元]；[BP gtm.pricing 叠加按批次和按量计费]；一旦某条走廊跑通，模型采用偏上区间中点的稳态账户价值。'
- id: A7
  name: 第 1 年活跃账户月均混合收入
  value: M6-M12 = 20,20,22,24,25,27,28
  unit: USD K per account-month
  source: '[A5-A6]；[BP milestones 到第 12 个月签下 1-2 个付费试点并至少转化 1 个正式生产]；运营判断：第 1 年仍以试点为主。'
- id: A8
  name: 第 2 年活跃账户月均混合收入
  value: Q1-Q4 = 28,30,32,34
  unit: USD K per account-month
  source: '[A6]；[BP milestones 第 12-24 个月拿下 4-5 家保险公司或出口信用机构客户]；模型假设走廊账户在第 2 年内逐步从试点定价转向生产定价加批次费。'
- id: A9
  name: 第 3 年活跃账户月均混合收入
  value: Q1-Q4 = 34,35,36,37
  unit: USD K per account-month
  source: '[A6]；[BP milestones 第 24-36 个月新增基准和理赔分析产品]；[Research market.som 第 3 年 200 万美元]；模型假设到第 3 年会有一到两次第二走廊或分析产品的扩张。'
- id: A10
  name: 第 1 年各月末活跃付费走廊账户数
  value: 0,0,0,0,0,1,1,1,2,2,2,2
  unit: accounts
  source: '[BP experimentRoadmap 第 3-6 个月签下首个付费试点，第 6-12 个月签下一份生产合同]；[BP milestones 到第 12 个月签下 1-2 个付费试点]。'
- id: A11
  name: 第 2 年各季末活跃付费走廊账户数
  value: 2,3,3,4
  unit: accounts
  source: '[BP milestones 到第 24 个月在可可及相邻腰果走廊拿下 4-5 家保险公司或出口信用机构客户]；模型取该区间保守端，假设第 2 年第 4 季度末有 4 个付费走廊账户。'
- id: A12
  name: 第 3 年各季末活跃付费走廊账户数
  value: 4,5,5,6
  unit: accounts
  source: '[BP milestones 第 24-36 个月拓展到新地域或新品类并推出分析产品]；模型假设第 3 年第 4 季度末有 6 个活跃走廊账户，其中包含现有客户内部的第二走廊扩张，而不仅仅是新客户。'
- id: A13
  name: 毛利率爬坡
  value: Y1 50-58%; Y2 61-69%; Y3 70-72%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70]；[BP operatingAssumptions 到第三个试点时合作方和数据成本须低于 30%]；创业财务经验法则：在走廊模板变得可复用之前，试点阶段的服务属性更重。'
- id: A14
  name: 创始人年度现金薪酬(含负担成本)
  value: '150'
  unit: USD K
  source: 创业财务经验法则：预种子期创始人拿低于市场水平但全额现金的薪酬，同时覆盖工资税和福利成本。
- id: A15
  name: 工程岗年度薪酬(含负担成本)
  value: '180'
  unit: USD K per FTE
  source: '[BP team 需要创始工程师，后续还要做走廊对接]；针对跨境 B2B 数据和 API 人才的创业财务经验法则。'
- id: A16
  name: 风险产品岗年度薪酬(含负担成本)
  value: '190'
  unit: USD K per FTE
  source: '[BP team 风险产品负责人需要用货运和理赔数据校准评分逻辑]；针对承保建模人才的创业财务经验法则。'
- id: A17
  name: 解决方案与合作运营岗年度薪酬(含负担成本)
  value: '140'
  unit: USD K per FTE
  source: '[BP team 解决方案与合作运营负责人需要把验货机构、仓库和单据的上线流程标准化]；针对部署加合作运营范畴的创业财务经验法则。'
- id: A18
  name: 合作伙伴与 GTM 岗年度薪酬(含负担成本)
  value: '160'
  unit: USD K per FTE
  source: '[BP team 合作伙伴负责人在第一个验证点跑出来后才入职]；针对一名企业销售或合作运营人员、需要频繁差旅覆盖走廊的创业财务经验法则。'
- id: A19
  name: 招聘计划
  value: 第 3 个月风险负责人；第 5 个月解决方案/合作运营；第 10 个月合作伙伴负责人；第 16 个月工程师 2；第 22 个月合作运营 2；第 29 个月 GTM2；第 34 个月工程师 3
  unit: hires
  source: '[BP team startTiming]；[BP strategicChoices.sequencingRationale 先招对接和风险建模人才，再扩大销售规模]；模型只新增支撑 4-6 个走廊账户所需的最少额外招聘。'
- id: A20
  name: 非薪资类销售与市场支出
  value: 8-24
  unit: USD K per month
  source: '[BP gtm 渠道为创始人直销、经纪商与再保险公司引荐，以及合作方部署]；针对狭窄企业市场中差旅、会议、经纪商拓展和 CRM 支出的创业财务经验法则。'
- id: A21
  name: 非薪资类研发与数据接入支出
  value: 10-22
  unit: USD K per month
  source: '[BP product 需要验货机构、海关或电子提单、遥测数据和审计轨迹的对接]；针对规模化效应显现之前云服务、数据标准化和 API 调用成本的创业财务经验法则。'
- id: A22
  name: 非薪资类行政管理与合规支出
  value: 7-17
  unit: USD K per month
  source: '[BP operations 需要合规地图、法律复核、保险和可审计性]；针对预种子期法务、会计和贸易合规开销的创业财务经验法则。'
- id: A23
  name: 混合获客成本(CAC)
  value: '160'
  unit: USD K per new corridor account
  source: 由模型推导：到第 3 年累计约 100 万美元的销售与市场支出，拿下 6 个活跃走廊账户；取整以反映集中式企业销售外加部分同客户内部扩张的特点。
- id: A24
  name: 单位经济模型用的稳态年 ARPU
  value: '390'
  unit: USD K per active corridor account
  source: '[A6]；单位经济模型采用稳态生产账户价值，而非试点占比高的早期混合值。'
- id: A25
  name: 月度客户流失率
  value: '2.0'
  unit: percent
  source: 针对高客单价保险基础设施合同的创业财务经验法则：客户流失率低，但如果验证效果或合作方质量变弱，走廊项目也可能被砍掉。
- id: A26
  name: 下一轮融资的里程碑加缓冲
  value: 到第 18 个月拿下 3 个付费或生产走廊账户，到第 24 个月拿下 4 个
  unit: milestone
  source: '[BP experimentRoadmap 第 6-12 个月签下一份生产合同，第 9-18 个月复制出第二个客户]；[BP milestones 第 12-24 个月拿下 4-5 家客户]；融资需求在第 18 个月的验证点之外，额外包含六个月的现金缓冲。'
