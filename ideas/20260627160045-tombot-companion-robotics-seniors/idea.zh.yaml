problem: >-
  老年照护机构即将接收数千台陪伴机器人，却没有任何运营基础设施来管理它们。员工缺少排班工具、使用率追踪手段或结构化文档流程，照护运营商也无法生成基于价值医疗合同和未来 CMS 报销所需的临床疗效数据。没有这一层，机器人就会变成昂贵的搁置品，资本投入案例在第一次董事会审查时就会崩塌。

targetUser:
  primary: 美国辅助生活机构和专业护理机构的记忆照护单元主任及护理主任
  secondary: 负责管理多机构老年生活网络、评估陪伴机器人机队采购的集中采购干事
  buyer: 持有陪伴机器人有效采购订单机构的护理主任或首席临床官

startupThesis:
  nonObviousInsight: >-
    陪伴机器人的硬件问题基本已解——Tombot、PARO 及竞争对手将于 2026 年正式进入商业市场。真正的卡点在于：每家机构都需要向 CFO 证明机器人投入的合理性、为基于价值医疗审计留存居民疗效记录、培训员工——而这套基础设施至今不存在。谁先建立临床工作流层，谁就能在付款方制定报销标准之前嵌入机构，从而在疗效衡量标准的制定上获得超额话语权。
  beachhead: >-
    美国 100—300 张床位辅助生活机构的记忆照护单元，已在 2026 年秋季 Tombot Jennie 商业发货前签订购买订单
  wedge: >-
    机器人使用排班与自动临床疗效文档 SaaS，与现有 EHR 系统（PointClickCare、MatrixCare）集成，将会话记录转化为付款方可用的干预报告
  whyNowCatalyst: >-
    Tombot 2026 年秋季商业首发将向记忆照护机构大批交付陪伴机器人，而这些机构尚无运营层支撑，由此形成一个时间点明确、规模可达数千台的部署文档缺口——目前没有任何在位软件厂商能填补这一空白。
  ventureScalePath: >-
    从陪伴机器人延伸至所有非药物干预（音乐疗法、光照疗法、回忆疗法），进而成为覆盖全美 15,600 家护理院和辅助生活机构的行为健康活动管理平台，最终成为定义非药物老年照护付款方报销标准的数据层。

solution: >-
  一个面向老年照护运营商的 SaaS 平台，提供陪伴机器人机队管理仪表盘，涵盖居民—机器人排班、交互会话记录、参与度评分追踪，以及与 EHR 系统兼容的自动临床文档导出。系统呈现疗效指标——躁动减少、睡眠改善、社交参与频率——格式符合基于价值医疗审计和未来付款方提交要求。通过护理人员平板电脑上的轻量级应用配对，每家机构的设置不超过一天，除现有 Wi-Fi 和机器人厂商 API 外无需任何现场硬件集成。

goToMarketSeed:
  firstCustomer: >-
    拥有有效 Tombot Jennie 预订单、基于价值医疗合同要求记录非药物干预疗效的 150 张床位美国记忆照护机构的护理主任
  buyingTrigger: >-
    收到 Tombot 机器人发货确认（2026 年秋季），触发董事会层面的 ROI 审查，并在预计交付后 30—60 天内引发 CFO 询问
  currentAlternative: >-
    手工纸质活动记录和员工班次笔记录入 EHR 自由文本字段，既无结构化疗效追踪，也无机器人使用率衡量
  switchingReason: >-
    平台每周为护理团队节省 2—4 小时手工文档工作，同时生成结构化疗效数据——既能向董事会证明机器人资本支出的合理性，又能满足基于价值医疗合同审计员的要求；纸质记录无法做到这两点
  pricingHypothesis: >-
    按机器人席位收费，每机构每月 $500—$800，相较于每台 $3,000—$5,000 的机器人资本成本和被替代的护理人工成本而言，这是微不足道的支出；多机构运营商按年度合同谈判企业授权价格

whyNow:
  - point: >-
      Tombot 2026 年秋季首发将向没有运营基础设施的机构交付数千台机器人，在已知日历节点上形成部署—文档缺口。
    signalRefs: ["2026年秋季商业首发"]
    sourceRefs: [2]
  - point: >-
      2.3 万台预订印证了老年照护买方在任何工作流工具存在之前已承诺出资，在机器人实际到货前形成先发窗口。
    signalRefs: ["2.3万台预订需求信号"]
    sourceRefs: [1]
  - point: >-
      医疗运营商投资方（Lutheran Foundation for Long Term Living、Florida Community Health Network）印证了照护服务机构已在积极寻求部署基础设施，而不仅仅是硬件。
    signalRefs: ["医疗运营商投资方"]
    sourceRefs: [1]
  - point: >-
      CMS 将基于价值的医疗合同延伸至长期照护领域，正在加速推动对结构化非药物干预文档的需求——陪伴机器人会话记录可以提供这类数据。
    signalRefs: ["社会孤立的医疗投资论点"]
    sourceRefs: [2]
  - point: >-
      3 亿以上的痴呆症人口规模终将倒逼 CMS 制定陪伴机器人的报销标准；率先掌握疗效数据的平台，将在付款方尚未落笔之前，先行定义评估指标体系。
    signalRefs: ["3亿痴呆症可及市场"]
    sourceRefs: [1]

differentiator: >-
  不同于 EHR 内嵌的通用活动追踪模块，本平台专为机器人交互数据而设计——捕捉会话级行为信号（参与时长、躁动事件、发声频率），这是目前任何 EHR 厂商都不采集的数据。最早与 Tombot 和 PARO 建立集成合作，形成数据网络效应：使用平台的机构越多，疗效基准数据集越丰富，任何新入局者都无法在没有多年部署积累的情况下复制。平台在付款方制定标准之前，就成为事实上的报销文档规范。

conceptDiagram:
  title: "照护机器人运营平台：从采购订单到可报销疗效"
  mermaid: |
    flowchart LR
      PO[Robot Purchase Order] --> Onboard[Facility Onboarding\n<1 day]
      Onboard --> Schedule[Resident-Robot\nScheduler]
      Schedule --> Session[Interaction\nSession Logger]
      Session --> Analytics[Behavioral\nOutcome Analytics]
      Analytics --> EHR[EHR Export\nPointClickCare / MatrixCare]
      Analytics --> VBC[Value-Based Care\nAudit Reports]
      EHR --> ROI[CFO ROI\nJustification]
      VBC --> ROI

businessModelCanvas:
  customerSegments:
    - 美国辅助生活机构的记忆照护单元主任和护理主任
    - 持有陪伴机器人采购订单的专业护理机构
    - 负责多机构老年生活网络的集中采购组织
  valuePropositions:
