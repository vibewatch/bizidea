    - 与 Tombot 和 PARO 经销商建立机器人厂商渠道合作
  customerRelationships:
    - 为前 20 家机构配备专属客户成功经理，提供高触达入驻服务
    - 每月发布疗效基准报告，将机构指标与匿名同行队列对比
    - 为早期采用者提供 CMS 报销文档模板共创开发计划
  revenueStreams:
    - 每机构 SaaS 订阅，每月 $500—$800
    - 多机构运营商年度企业授权，价格按年度合同谈判
    - 未来面向研究机构的匿名人群健康数据授权（预计第 3 年起）
  keyResources:
    - 基于陪伴机器人交互模式训练的行为疗效数据模型
    - PointClickCare、MatrixCare 和 Netsmart 的 EHR 集成连接器
    - 与 Tombot 和 PARO 建立的机器人厂商 API 合作关系
  keyActivities:
    - 构建和维护 EHR 集成连接器
    - 在 CMS 报销标准出台前，主导制定疗效评估框架
    - 在 2026 年秋季 Tombot 发货前签约前 20—50 家机构客户
  keyPartners:
    - Tombot 和 PARO——机器人硬件分销和联合营销合作伙伴
    - PointClickCare 和 MatrixCare——EHR 集成合作伙伴
    - Lutheran Foundation for Long Term Living 和 Florida Community Health Network——共创客户
  costStructure:
    - 平台开发和 EHR 集成的工程团队
    - 负责机构部署的客户成功和入驻团队
    - CMS 文档标准的监管和临床事务顾问

jobsToBeDone:
  - job: >-
      当机构接收第一批陪伴机器人时，帮助护理主任向 CFO 证明资本支出的合理性，以获得董事会批准、避免机器人闲置。
    currentAlternative: 手工纸质活动记录和员工随机观察笔记，无任何疗效指标
    successMetric: CFO 在 90 天试点审查后，凭借结构化疗效数据批准机器人项目延续
  - job: >-
      当基于价值医疗审计员要求提供非药物干预文档时，帮助临床团队在一小时内生成结构化疗效报告，从而通过审计、不把护士从病区抽走。
    currentAlternative: 将 EHR 自由文本备注手工整理成 Excel 表格，且无机器人会话数据
    successMetric: 审计通过，陪伴机器人干预的文档零缺陷

ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      2.3 万台预订和 2026 年秋季商业首发是具体的需求信号；医疗运营商投资方印证了照护机构的承诺意愿和部署紧迫性。
  painIntensity:
    score: 4
    rationale: >-
      机构花 $3,000—$5,000 采购单台机器人却没有文档基础设施，将面临 CFO 即时质询和基于价值医疗审计敞口——纸质记录无法应对。
  wedgeClarity:
    score: 5
    rationale: >-
      机器人首次购入的节点是有时间限制、高度紧迫的采购触发器，产品定义清晰——机器人机队排班加临床疗效文档 SaaS，绑定 2026 年秋季这一可识别的日历事件。
  defensibility:
    score: 3
    rationale: >-
      疗效基准的数据网络效应和率先落地的 EHR 集成合作，构成中等程度的护城河；EHR 厂商有可能捆绑类似功能，但需要机器人厂商 API 授权和当前并不持有的行为数据。
  ventureScale:
    score: 4
    rationale: >-
      全美 15,600 家护理院和辅助生活机构，按每月每机构 $500 订阅计，代表 $9.4 亿以上的 SaaS 市场机会；扩展至所有非药物干预和全球市场，可寻址市场进一步扩大至数十亿美元规模。

topRisks:
  - name: 机器人厂商纵向整合
    description: >-
      Tombot 或 PARO 可能自建运营软件层并与硬件捆绑销售，消除第三方平台的存在空间。
    mitigation: >-
      在 2026 年秋季发货前主动争取机器人厂商的联合营销和优先集成合作，将平台定位为硬件的补充——扩大机器人 TAM 而非与其竞争。
  - name: CMS 报销时间线不确定性
    description: >-
      若 CMS 需要 3—5 年才能正式确立陪伴机器人的报销标准，ROI 论点将长期偏软，机构将推迟文档工具的投入。
    mitigation: >-
      将即时 ROI 建立在护理人时节省和基于价值医疗审计合规上，而非依赖 CMS 报销——让产品在报销利好落地前就能自负盈亏。
  - name: EHR 厂商竞争
    description: >-
      PointClickCare 或 MatrixCare 可能在其现有平台上增加陪伴机器人活动追踪功能，凭借已有的机构关系将独立工具挤出。
    mitigation: >-
      在 EHR 厂商原生开发前取得集成资质；将产品定位为向 EHR 输送结构化信号的机器人疗效数据提供方，而非竞争性工作流层，令合作比替代更有吸引力。
