  adoptionFrictionMatrix:
  - friction: Staff will see robot logging as extra work unless it writes back into the record.
    severity: high
    affectedBuyer: Director of Nursing / memory-care director
    mitigation: Start with one-tap workflows, exportable summaries, and EHR write-back through partner-approved interfaces.
    sourceRefs:
    - 13
    - 23
    - 24
    - 25
  - friction: Clinical benefit evidence is directional but not definitive across every outcome a buyer may ask about.
    severity: medium
    affectedBuyer: Chief Clinical Officer / medical director
    mitigation: Sell documentation, utilization, and program-management value first, while collecting facility-specific outcome data for later claims.
    sourceRefs:
    - 39
    - 63
    - 65
  - friction: OEM and EHR partner dependence can slow deployment.
    severity: high
    affectedBuyer: IT lead / innovation sponsor
    mitigation: Support CSV or manual ingest at launch and deepen APIs only where lighthouse partners prove value.
    sourceRefs:
    - 23
    - 24
    - 25
    - 28
    - 40
  - friction: Reimbursement is indirect today.
    severity: high
    affectedBuyer: CFO / regional operator
    mitigation: Anchor ROI on survey readiness, caregiver support reporting, and higher robot utilization before pitching future payer submissions.
    sourceRefs:
    - 1
    - 5
    - 15
    - 50
    - 53
