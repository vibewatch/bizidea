reportMemo:
  executiveTakeaways:
  - 'Tombot''s planned 2026 launch turns companion robotics from a theoretical category into an operational deployment problem: the company says it already has more than 23,000 pre-order and waitlist customers, while its investor materials cite 20,000+ reservations from 116 countries.[31][33]'
  - 'The compliance angle is real, but it is not robot reimbursement yet: CMS GUIDE funds dementia care navigation and respite, and revised nursing-home survey guidance keeps pushing providers toward documented non-pharmacologic care and psychotropic stewardship.[1][2][5][75]'
  - The strongest incumbents are split between hardware vendors and EHR systems. That leaves room for a neutral operations layer, but only if it integrates cleanly and does not over-claim clinical efficacy.[23][24][25][28][36][39][40][41][65]
  - 'Public and quasi-public programs already show willingness to fund companion technology when outcomes are legible: New York''s ElliQ program reached 834 participants with 94% reporting less loneliness and 97% better overall wellness, and Washington Medicaid coverage gives a concrete reimbursement-adjacent precedent.[46][48][50][53][54]'
  marketDefinition: 'The relevant market is not elder-care robots in the abstract; it is workflow and documentation software for companion-robot programs inside U.S. senior care operators. The product sits between device adoption, non-pharmacologic dementia care, and EHR interoperability: it schedules scarce robot sessions, captures resident-level intervention logs, and turns them into auditable care documentation for assisted living and nursing-home teams.[1][2][5][23][28][36][40]'
  customerAndBuyer: The operational user is the memory-care or wellness staff member assigning robot sessions, but the economic buyer is usually a Director of Nursing, memory-care director, clinical informatics leader, or regional operator who already owns EHR workflows and survey risk. The beachhead is plausible because assisted living alone counts roughly 41,465 communities and nearly 1.4 million licensed beds, while U.S. nursing homes add another 14,700 facilities; assisted-living dementia prevalence is already high enough that workflow standardization matters even before robot-specific reimbursement exists.[6][11][74]
  buyingTriggers:
  - point: Robot shipment confirmation or waitlist conversion forces the operator to answer who will schedule sessions, document usage, and defend ROI to leadership.
    sourceRefs:
    - 31
    - 33
  - point: Surveyor and clinical leadership pressure to show non-pharmacologic interventions before or alongside psychotropic use makes structured session logging more valuable.
    sourceRefs:
    - 2
    - 5
    - 10
    - 75
  - point: Existing technology roadmaps already prioritize EHR, staffing, point-of-care documentation, and analytics, so a robot-ops tool can ride an established IT buying motion instead of inventing one.
    sourceRefs:
    - 13
    - 14
    - 23
  willingnessToPay:
    summary: Budget room is plausible when framed against existing care-tech and care-delivery spend. ElliQ sells at $39-$59 per month direct-to-consumer, Joy for All pets sit around $160-$180 one-time, PointClickCare's USCDI Connector pricing is $65 per app per facility per month, and senior care itself is expensive—CareScout's 2025 national medians are $6,200 per month for assisted living and $9,581 for a semi-private nursing-home room. A few hundred dollars per facility per month is therefore believable if the software reduces documentation time or improves utilization, but buyers will still demand proof before broad rollout.
    sourceRefs:
    - 15
    - 23
    - 41
    - 57
    - 58
  competitiveLandscape: The category is fragmented. Tombot is trying to create a scaled dementia-companion hardware category; PARO has the deepest clinical or medical-device positioning; ElliQ has public-program traction and a subscription model; PointClickCare and MatrixCare own the longitudinal record and partner channels; and low-cost robotic pets absorb price-sensitive demand. None of these players appears to offer a neutral, multi-vendor operations and payer-documentation layer for facility fleets.[23][24][25][28][36][39][40][41][57]
  incumbentThesis:
  - incumbentClass: Companion robot OEMs
    point: OEMs want to sell and support their own device, not become the cross-vendor workflow layer for every session, note, and payer artifact in a facility.
    sourceRefs:
    - 28
    - 31
    - 36
    - 40
  - incumbentClass: EHR platforms
    point: PointClickCare and MatrixCare have the system-of-record advantage and partner ecosystems, but their public materials emphasize interoperability and marketplace extensibility rather than robot-specific session telemetry or intervention benchmarking.
    sourceRefs:
    - 23
    - 24
    - 25
    - 26
    - 27
  - incumbentClass: Consumer robotic pets
    point: Low-cost robotic pets can satisfy companionship use cases at $160-$180, but they do not generate structured outcomes, staffing workflows, or EHR-connected documentation.
    sourceRefs:
    - 57
    - 58
  - incumbentClass: Public aging programs
    point: Programs like NYSOFA and Washington Medicaid prove budget and demand, but they still need operational partners that can onboard devices, train staff, and produce consistent evidence at provider level.
    sourceRefs:
    - 46
    - 48
    - 50
    - 53
  - incumbentClass: Clinical evidence gatekeepers
    point: PARO's device-style evidence and FDA or NLM listing show that trust accumulates around measurable therapeutic claims; a software layer must support that evidence process without making unsupported claims itself.
    sourceRefs:
    - 19
    - 36
    - 39
    - 65
  regulatoryLandscape: Regulation is more about care process and claims discipline than about robot-specific licensing today. CMS GUIDE makes dementia-care navigation, caregiver support, and respite a reimbursed program element, while the National Partnership and QSO-25-07 keep long-term-care providers focused on person-centered, non-pharmacologic approaches and better psychotropic documentation. That helps the startup if it behaves like workflow infrastructure; it hurts if it overreaches into unsupported therapeutic marketing, which the FTC explicitly polices.[1][2][5][19][75]
  technologyLandscape: The plumbing is good enough to build. PointClickCare exposes SMART on FHIR and USCDI Connector workflows with sandbox access and explicit per-facility pricing, MatrixCare markets partner integrations and interoperability into senior living and skilled nursing, and companion-robot vendors already operate membership, waitlist, or public-program distribution models. The missing layer is standardized session capture and facility-grade outcome reporting across those silos.[23][24][25][40][41][46]
  distributionChannels:
  - point: Robot OEM and distributor partnerships are the fastest route to the first lighthouse accounts because Tombot is cultivating a large waitlist while NYSOFA and Washington programs already socialize the category with older-adult buyers.
    sourceRefs:
    - 31
    - 33
    - 48
    - 50
    - 53
  - point: Senior living IT and quality buyers are already funding EHR, scheduling, point-of-care documentation, wander management, and analytics, so conferences and peer networks around those workflows are natural channels.
    sourceRefs:
    - 13
    - 14
    - 23
  - point: EHR marketplace and integration programs can be a credibility channel once the startup proves it reduces duplicate charting rather than creating another disconnected app.
    sourceRefs:
    - 23
    - 24
    - 25
  partnershipEcosystem:
  - point: PointClickCare and MatrixCare integrations are table stakes for workflow adoption because DONs will not tolerate a robot tool that lives outside the resident record.
    sourceRefs:
    - 23
    - 24
    - 25
  - point: State aging offices and public programs such as NYSOFA and Washington DSHS are useful evidence-generation and distribution partners because they already sponsor companion-tech deployments.
    sourceRefs:
    - 46
    - 48
    - 50
    - 53
  - point: Robot OEMs benefit when a third party increases utilization, staff training consistency, and retention without forcing the OEM to become a post-acute software company.
    sourceRefs:
    - 28
    - 31
    - 36
    - 40
  dataMoats:
  - point: Normalized session-level data across robot types, residents, staff, and outcomes can become the first cross-facility benchmark set for companion-robot utilization.
    sourceRefs:
    - 23
    - 28
    - 31
    - 40
  - point: Documentation templates aligned to non-pharmacologic dementia care and psychotropic oversight become more valuable as CMS survey expectations tighten.
    sourceRefs:
    - 2
    - 5
    - 10
  - point: Program-level evidence from public and operator pilots can compound into a payer-facing proof set that low-cost pet substitutes cannot replicate.
    sourceRefs:
    - 50
    - 53
    - 57
    - 58
  geographicConsiderations:
  - point: The U.S. is the right first market because the thesis depends on CMS-adjacent documentation pressure, long-term-care survey rules, and post-acute EHR vendors already entrenched in care delivery.
    sourceRefs:
    - 1
    - 2
    - 5
    - 23
  - point: New York and Washington are especially attractive pilot geographies because they already support ElliQ through public programs, reducing category-education burden.
    sourceRefs:
    - 46
    - 48
    - 50
    - 53
  - point: Global dementia prevalence is far larger than the U.S. alone, but reimbursement and care-delivery structures vary enough that international expansion should follow, not lead.
    sourceRefs:
    - 8
    - 9
  sensitivityCases:
  - case: Robot shipment timing slips or device volumes ramp slower than Tombot suggests
    impact: Demand shifts from always-on scheduling software to lighter-weight pilot documentation and ROI reporting for a smaller cohort of facilities.
    sourceRefs:
    - 31
    - 33
  - case: CMS and payers never create explicit robot reimbursement
    impact: The product must win on operational ROI, survey readiness, and caregiver or resident outcomes rather than direct claims submission.
    sourceRefs:
    - 1
    - 2
    - 5
    - 19
  - case: EHR vendors or OEMs bundle basic robot notes
    impact: The standalone wedge narrows unless the startup owns deeper benchmarks, multi-vendor data normalization, and faster deployment than native modules.
    sourceRefs:
    - 23
    - 24
    - 25
    - 28
    - 40
  validationPlan:
  - priority: high
    question: Will Directors of Nursing pay before a payer signal exists, or only after the first board or audit review?
    evidenceToGather: Ten to fifteen buyer interviews with assisted living and memory-care operators that already budget EHR, documentation, or wander-management tools.
  - priority: high
    question: Can robot session data be normalized into PointClickCare and MatrixCare workflows without a services-heavy deployment?
    evidenceToGather: A technical proof-of-concept using one robot partner, SMART on FHIR or export flows, and one assisted living pilot site.
  - priority: medium
    question: Will OEMs share enough telemetry and channel access to support a neutral third-party operations layer?
    evidenceToGather: Partnership interviews with Tombot, PARO distributors, and companion-tech program operators plus sample telemetry exports.
  - priority: medium
    question: 'Which outcome measures matter most to operators and public programs: loneliness, engagement, agitation, caregiver burden, or survey readiness?'
    evidenceToGather: Design-partner pilots that compare resident, caregiver, and operator reporting before and after a 60- to 90-day deployment.
