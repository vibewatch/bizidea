competitors:
- name: Tombot
  stage: scale-up
  wedge: Lifelike robotic emotional support animals for dementia and behavioral health users.
  pricing: Official site is waitlist-first and does not publish a final retail price.
  strength: Large waitlist, strong dementia-specific branding, and visible healthcare-investor backing.
  weaknessVsUs: Hardware-first approach; no neutral scheduling, utilization analytics, or EHR-grade documentation layer.
  sourceRefs:
  - 28
  - 31
  - 33
- name: PARO
  stage: incumbent
  wedge: Therapeutic robotic seal with medical-device framing and a long research history.
  pricing: Institutional quote and distributor-sale model rather than self-serve public pricing.
  strength: AccessGUDID-listed therapeutic use cases and an extensive research-paper archive create clinical credibility.
  weaknessVsUs: Single-device therapy product with limited workflow, fleet, or documentation software.
  sourceRefs:
  - 36
  - 37
  - 39
- name: ElliQ
  stage: scale-up
  wedge: AI companion and wellness engagement robot with public-program distribution and direct subscription pricing.
  pricing: $39-$59 per month membership, with state programs able to subsidize or cover access.
  strength: Strong public-sector evidence base, daily engagement data, and caregiver-facing features.
  weaknessVsUs: Primarily home-oriented and single-user; not purpose-built for shared-fleet scheduling or senior-living EHR documentation.
  sourceRefs:
  - 40
  - 41
  - 46
  - 50
  - 53
- name: PointClickCare
  stage: incumbent
  wedge: Post-acute and senior-care EHR plus interoperability platform.
  pricing: $65 per app per facility per month for FHIR API access; broader enterprise contracts are separate.
  strength: Installed base, resident-record ownership, and a developer and marketplace motion.
  weaknessVsUs: Generic interoperability and records infrastructure rather than robot-specific intervention workflows or benchmarks.
  sourceRefs:
  - 23
- name: MatrixCare
  stage: incumbent
  wedge: Senior living and skilled nursing software with partner-integration positioning.
  pricing: Custom enterprise and partner-contract pricing.
  strength: Relevant care-setting footprint plus explicit interoperability and partner language.
  weaknessVsUs: Not positioned as a robot program system or payer-documentation benchmark layer.
  sourceRefs:
  - 24
  - 25
  - 26
  - 27
regulatoryTechnicalConstraints:
- point: Long-term care survey guidance now puts psychotropic and chemical-restraint oversight into a tighter documentation framework, so the product must preserve resident-specific evidence of non-pharmacologic interventions and outcomes.
  sourceRefs:
  - 2
  - 5
  - 75
- point: Any claims about reducing agitation, loneliness, or clinical symptoms need substantiation and careful marketing discipline under FTC health-claims rules.
  sourceRefs:
  - 19
  - 39
  - 65
- point: 'EHR write-back is feasible but not free: PointClickCare prices FHIR access per app per facility and incumbent partner ecosystems can gate deployment speed.'
  sourceRefs:
  - 23
  - 24
  - 25
- point: Robot hardware data is still fragmented across waitlists, memberships, and OEM-specific programs rather than a standard clinical event schema.
  sourceRefs:
  - 28
  - 40
  - 41
validationSignals:
- point: Tombot says it has more than 23,000 pre-order and waitlist customers ahead of first customer launch.
  sourceRefs:
  - 33
- point: NYSOFA's third-year ElliQ program reached 834 older adults and reported 94% less loneliness and 97% better overall wellness.
  sourceRefs:
  - 50
- point: Washington Medicaid coverage for ElliQ shows that a public payer can fund companion-tech deployment when the program looks like supportive care rather than gadget retail.
  sourceRefs:
  - 46
  - 53
  - 54
- point: Senior living providers already rank analytics, EHR, point-of-care documentation, and wander-management among top near-term technology investments.
  sourceRefs:
  - 13
  - 14
openQuestions:
- How many 100-300 bed assisted living operators will actually receive companion robots in the next 12 months, versus merely sitting on waitlists?
- Will robot OEMs expose reliable session telemetry or only manual and CSV exports during early deployments?
- 'Which outcome measures matter most to operators and public programs: loneliness, engagement, agitation, caregiver burden, or survey readiness?'
- Can the product access enough EHR context without triggering the same long enterprise integration cycles that slow other post-acute tools?
