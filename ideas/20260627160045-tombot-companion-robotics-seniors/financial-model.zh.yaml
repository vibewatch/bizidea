slug: care-robot-ops-platform
date: '2026-06-27'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP 日期 2026-06-27；模型从规划日期次月起算]'
- id: A2
  name: 模型中的客户单位定义
  value: 平台上的付费老年照护机构
  unit: definition
  source: '[BP businessModel.unitOfValue 为每机构每月订阅；pitch 同样面向老年照护运营商而非个人消费者]'
- id: A3
  name: 每机构年度混合 ARPU
  value: '8.4'
  unit: usdK/year
  source: '[BP gtm.pricing 每机构每月 $500—$800，研究市场使用约 $7.8K ARR；模型采用约 $700 MRR 反映中间定价加少量企业分析附加值]'
- id: A4
  name: 稳态毛利率
  value: '74.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 75；模型低一个百分点，以反映 PointClickCare 连接器费用、托管和入驻支持成本]'
- id: A5
  name: 第 1 年每月净新增付费机构数
  value: 0,0,1,1,2,2,2,2,2,2,3,3
  unit: count
  source: '[BP 里程碑要求第 5—6 月完成 3 个付费试点、第 8 月达到 10 家、第 12 月达到 20 家；模型直接沿用该增长节奏]'
- id: A6
  name: 第 2 年每季度净新增付费机构数
  value: 6,8,9,7
  unit: count
  source: '[BP 12—24 月里程碑目标 50 家付费机构和首个企业多机构合同；模型从 20 家增长至 Q4Y2 的 50 家]'
- id: A7
  name: 第 3 年每季度净新增付费机构数
  value: 15,21,27,17
  unit: count
  source: '[BP 24—36 月里程碑目标 150 家；基础案例保守承诺年末 130 家，将战略冲刺目标作为上行空间]'
- id: A8
  name: 创始人/CEO 含税薪酬
  value: '120.0'
  unit: usdK/year
  source: '[BP 团队 CEO/创始人从第 0 月起；数字健康创始人 pre-seed 阶段薪酬的行业经验值]'
- id: A9
  name: CTO 含税薪酬
  value: '160.0'
  unit: usdK/year
  source: '[BP 团队 CTO/主力工程师从第 0 月起，具备 FHIR 集成经验；医疗集成工程负责人薪酬的行业经验值]'
- id: A10
  name: 创始全栈工程师含税薪酬
  value: '150.0'
  unit: usdK/year
  source: '[BP 团队创始全栈工程师从第 2 月起；行业经验值]'
- id: A11
  name: 客户成功经理含税薪酬
  value: '90.0'
  unit: usdK/year
  source: '[BP 团队客户成功经理从第 3 月起；高触达入驻角色的行业经验值]'
- id: A12
  name: 临床事务顾问按 1.0 FTE 计算的含税薪酬
  value: '180.0'
  unit: usdK/year
  source: '[BP 团队临床事务顾问从第 4 月起兼职；行业经验值，按 0.2 FTE 起逐步提升至 0.3 再到 0.5]'
- id: A13
  name: 销售/GTM 含税薪酬
  value: '130.0'
  unit: usdK/year
  source: '[BP gtm 依赖直销和合作伙伴渠道；第一位全职销售人员仅在早期试点验证后加入；行业经验值]'
- id: A14
  name: 产品/运营含税薪酬
  value: '110.0'
  unit: usdK/year
  source: '[BP 产品和多机构运营商仪表盘扩展，在第 2 年需要一名半职运营负责人；行业经验值]'
- id: A15
  name: G&A 含税薪酬
  value: '80.0'
  unit: usdK/year
  source: '[BP fundingAsk 和 SOC 2/合规需求表明第 3 年需要兼职财务运营支持；行业经验值]'
- id: A16
  name: 招聘序列
  value: M1 创始人+CTO；M2 +1 工程师；M3 +1 客户成功；M4 +0.2 临床顾问；M10 +1 销售；M18 顾问升至 0.3 FTE；M24 +0.5 产品/运营；M30 顾问升至 0.5 FTE 并 +0.5 G&A
  unit: schedule
  source: '[BP team.startTiming、strategicChoices.sequencingRationale、milestones 及 fundingAsk 使用资金摘要]'
- id: A17
  name: 非薪酬运营支出节奏
  value: "Y1 S&M/R&D/G&A 非薪酬 = 24.0/105.0/70.5；Y2 = 48.0/132.0/84.0；Y3 = 60.0/144.0/96.0"
  unit: usdK/year
  source: '[BP fundingAsk 列出大会费用、PointClickCare 认证、OEM 集成、HIPAA/SOC2 基础设施和合规成本；采用行业经验值分阶段]'
- id: A18
  name: pre-seed 完成后起始现金
  value: '2300.0'
  unit: usdK
  source: '[BP fundingAsk targetFundingRangeUsd $1.5—2.5M；模型采用 $2.3M 以达到 Q4Y2 里程碑证明并保留 6 个月缓冲]'
- id: A19
  name: 单位经济模型月度客户流失率
  value: '1.5'
  unit: percent
  source: '[BP operatingAssumptions 目标基于基准驱动的留存率和 >110% NRR；模型对早期垂直 SaaS 产品采用偏保守的低十几年化 logo 流失率]'
- id: A20
  name: 每机构混合 CAC
  value: '5.8'
  unit: usdK
  source: '[BP gtm.funnelTargets 显示外联到合格试点转化率 25—35%、合格试点到付费转化率 50%+，并有来自 Tombot 投资方的暖渠道；行业经验值将此换算为低于 $6K 的 CAC]'
- id: A21
  name: 收入确认时间策略
  value: 收入在签约当月按每活跃机构 $0.7K MRR 确认
  unit: policy
  source: '[BP gtm.pricing 和 investorMemo.initialContract 描述月付试点合同；模型在当月确认订阅收入，收入直接等于客户数 × ARPU]'
- id: A22
  name: 资金使用分配比例
  value: 39% 工程 / 25% GTM / 13% G&A / 23% 缓冲
  unit: mix
  source: '[由 Q4Y2 里程碑前的模型支出结构加 6 个月缓冲推算]'
- id: A23
  name: 现金流动简化假设
  value: 不建模债务、资本支出或营运资金变动；现金随 EBITDA 变动
  unit: policy
  source: '[pre-seed 规划模型的行业经验值，其中软件订阅收入主导、资本密集度低]'
