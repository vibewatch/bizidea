scenarios:
  downside:
    description: OEM 接入和 EHR 部署比计划更慢，混合 ARR 降至约 $7.2K，第 3 年末增长至 95 家机构，毛利率压缩至 70%。
    y3RevenueK: 487.2
    y3EbitdaK: -762.3
    cashLowPointK: -19.1
    keyAssumptionChanges:
    - 混合年度 ARPU 从 $8.4K 降至 $7.2K
    - 机构增长在第 3 年末停留在 95 家而非 130 家，成交周期约延后一个季度
    - 毛利率维持在 70% 而非 74%，因为入驻仍然较为依赖人力
  base:
    description: 创始人主导销售、Tombot 触发的紧迫感以及轻量级 EHR 部署，推动业务从第 1 年 20 家机构增长至第 3 年末 130 家，混合 ARR 约 $8.4K。
    y3RevenueK: 772.8
    y3EbitdaK: -530.7
    cashLowPointK: 322.4
    keyAssumptionChanges:
    - 采用假设 A2—A23 建模
    - 收入主要来自机构订阅，ARPU 中仅嵌入少量企业分析附加值
    - 招聘保持精简，第 3 年全程以里程碑为门控
  upside:
    description: 一个 OEM 合作和一个多机构运营商渠道的加持，将机构数推升至 150 家、混合 ARR 达到约 $9.0K、毛利率改善至 76%。
    y3RevenueK: 996.0
    y3EbitdaK: -346.4
    cashLowPointK: 609.5
    keyAssumptionChanges:
    - 混合年度 ARPU 通过企业客户和附加模块组合从 $8.4K 提升至 $9.0K
    - 第 3 年末客户增至 150 家而非 130 家
    - 随着集成变得更可复制，毛利率改善至 76%
