modelDiagram:
  title: 照护机器人运营平台单位经济模型流程
  mermaid: |-
    flowchart LR
      Shipments[Robot shipment confirmations] --> Pilots[Facility pilots]
      Pilots --> Facilities[Paying facilities]
      Facilities --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[74% gross profit]
      GrossProfit --> Cash[Runway to 50-facility proof]
modelSanity:
- checkName: 收入引擎
  finding: 基础案例收入由 20→50→130 家机构的增长节奏驱动，混合 ARR 约 $8.4K，大多数客户在多机构扩展发力前来自发货触发的单机构销售。
- checkName: 必须保持的前提
  finding: 模型取决于 PointClickCare 和 OEM 集成足够轻量，使约 $5.8K 的 CAC 仍能在低 ACV 订阅的约 11 个月内回收。
- checkName: 模型崩溃条件
  finding: 若 ARPU 压缩至 $7.2K 且成交周期延后一个季度，悲观案例将在第 3 年结束前使现金略微转负。
- checkName: 下一轮融资证明要素
  finding: 在 Q4Y2 完成 50 家付费机构、一份 5 家以上机构的运营商合同，以及留存率证明——这是最能支撑下一轮融资的运营里程碑。
sanityChecks:
  ruleOf40: 第 3 年增长率 158.5% + EBITDA 利润率 -68.7% = 89.8%
  burnMultiple: 第 2 年净耗比 2.95 倍，改善至第 3 年净耗比 0.79 倍，分别对应约 $25.2 万和 $67.2 万净新增 ARR。
  revenuePerFte: 第 3 年人均收入 $11.9 万（以 Q4Y3 的 6.5 FTE 计，低于早期垂直 SaaS 舒适区的 $15—$25 万，说明扩展 ARPU 至关重要）
  flags:
  - 基础案例已假设公司在第 1 年达到 20 家机构、Q4Y2 达到 50 家，因此 Tombot 发货或 PointClickCare 部署的任何延误都会迅速压垮整个模型。
  - 第 3 年人均收入仍然偏低，意味着风险投资案例依赖于后期企业仪表盘、基准数据或治疗模块扩展，将 ARPU 推出基础订阅的范围之外。
  - 仅凭 $2.3M pre-seed 维持正向现金，是因为招聘保持异常精简；若在运营商验证前提前引入第二位销售或完整的监管团队，很可能需要提前启动下一轮。
