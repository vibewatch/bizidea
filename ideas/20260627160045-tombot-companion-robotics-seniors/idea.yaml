differentiator: >-
  Unlike generic activity tracking modules bundled into EHRs, this platform is purpose-built
  around robot interaction data — capturing session-level behavioral signals (engagement
  duration, agitation events, vocalization frequency) that no EHR vendor currently collects.
  The earliest integration partnerships with Tombot and PARO create a data network effect:
  the more facilities use the platform, the richer the outcome benchmarking dataset becomes,
  and no new entrant can replicate that without years of deployment. The platform becomes the
  de facto reimbursement documentation standard before payers have written the criteria.

