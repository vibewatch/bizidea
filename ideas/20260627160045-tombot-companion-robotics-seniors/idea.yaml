problem: >-
  Senior care facilities are about to receive thousands of companion robots with no operational
  infrastructure to manage them. Staff lack scheduling tools, utilization tracking, or structured
  documentation workflows, and care operators have no way to generate the clinical outcome data
  that value-based care contracts and future CMS reimbursement will require. Without this layer,
  robots become expensive shelf items and the capital investment case collapses in the first
  board review.

targetUser:
  primary: Memory care unit directors and Directors of Nursing at U.S. assisted living and skilled nursing facilities
  secondary: Group purchasing officers managing multi-facility senior living networks evaluating companion robot fleet acquisitions
  buyer: Director of Nursing or Chief Clinical Officer at facilities with active companion robot purchase orders

startupThesis:
  nonObviousInsight: >-
    The companion robot hardware problem is nearly solved — Tombot, PARO, and competitors are
    arriving commercially in 2026. The real bottleneck is that every facility needs to justify
    the robot spend to a CFO, document resident outcomes for value-based care audits, and train
    staff — and none of that infrastructure exists yet. Whoever builds the clinical workflow
    layer first will be embedded before payers define reimbursement criteria, giving them
    outsized influence over the outcome-measurement standard itself.
  beachhead: >-
    Memory care units at U.S. assisted living facilities with 100-300 beds that have signed
    Tombot Jennie purchase orders ahead of Fall 2026 commercial shipments
  wedge: >-
    Robot utilization scheduling and automated clinical outcome documentation SaaS that
    integrates with existing EHR systems (PointClickCare, MatrixCare) to turn session logs
    into payer-ready intervention reports
  whyNowCatalyst: >-
    Tombot's Fall 2026 commercial launch will flood memory care facilities with companion robots
    that have no operational layer, creating a simultaneous thousands-of-unit deployment gap
    with no incumbent software vendor to fill it.
  ventureScalePath: >-
    Expand from companion robots to all non-pharmacological interventions (music therapy, light
    therapy, reminiscence therapy), then become the behavioral health activity management
    platform for all 15,600 U.S. nursing homes and assisted living facilities, and ultimately
    the data layer that defines payer reimbursement standards for non-drug senior care.

solution: >-
  A SaaS platform giving senior care operators a companion robot fleet management dashboard
  covering resident-robot scheduling, interaction session logging, engagement score tracking,
  and automated clinical documentation exports compatible with EHR systems. The system surfaces
  outcome metrics — agitation reduction, sleep improvement, social engagement frequency — in
  formats required for value-based care audits and future payer submissions. Setup takes under
  one day per facility via a lightweight app paired to nursing staff tablets, with no on-site
  hardware integration required beyond existing Wi-Fi and the robot manufacturer API.

goToMarketSeed:
  firstCustomer: >-
    Director of Nursing at a 150-bed U.S. memory care facility with an active Tombot Jennie
    pre-order and a value-based care contract requiring documented non-pharmacological
    intervention outcomes
  buyingTrigger: >-
    Receipt of companion robot shipment confirmation from Tombot (Fall 2026), which triggers
    board-level ROI review and CFO inquiry within 30-60 days of expected delivery
  currentAlternative: >-
    Manual paper activity logs and staff shift notes entered into EHR free-text fields with
    no structured outcome tracking or robot utilization measurement
  switchingReason: >-
    The platform eliminates 2-4 nursing hours per week of manual documentation while generating
    structured outcome data that justifies robot capital expense to the board and satisfies
    value-based care contract auditors — neither of which paper logs can produce
  pricingHypothesis: >-
    $500-800 per facility per month on a per-robot seat model, positioned as a rounding error
    against the $3,000-5,000 per-unit robot capital cost and the nursing labor it displaces;
    enterprise licensing for multi-facility operators at negotiated annual contracts

