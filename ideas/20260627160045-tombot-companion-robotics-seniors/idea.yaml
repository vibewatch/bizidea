      justify the capital expense to the CFO, so they can secure board approval and avoid robot
      shelf-life.
    currentAlternative: Manual paper activity logs and anecdotal staff observation notes with no outcome metrics
    successMetric: CFO approves robot program continuation after 90-day pilot review with structured outcome data
  - job: >-
      When a value-based care auditor requests non-pharmacological intervention documentation,
      help the clinical team generate a structured outcome report in under one hour, so they
      can pass the audit without pulling nurses off the floor.
