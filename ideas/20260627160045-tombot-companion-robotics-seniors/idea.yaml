topRisks:
  - name: Robot Manufacturer Vertical Integration
    description: >-
      Tombot or PARO could build their own operational software layer and bundle it with
      hardware, eliminating the need for a third-party platform.
    mitigation: >-
      Pursue co-marketing and preferred integration partnerships with robot manufacturers before
      Fall 2026 launch, framing the platform as complementary to hardware and expanding the
      robot TAM rather than competing with it.
  - name: CMS Reimbursement Timeline Uncertainty
    description: >-
      If CMS takes 3-5 years to formalize companion robot reimbursement criteria, the ROI case
      remains soft and facilities deprioritize documentation tooling investment.
    mitigation: >-
      Build immediate ROI around nursing labor savings and value-based care audit compliance —
      not CMS reimbursement — so the product pays for itself before the reimbursement win
      materializes.
  - name: EHR Vendor Competition
    description: >-
      PointClickCare or MatrixCare could add companion robot activity tracking to their existing
      platforms, leveraging incumbent facility relationships to crowd out a standalone tool.
    mitigation: >-
      Achieve EHR integration status before EHR vendors build natively; position as a robot
      outcome data supplier feeding structured signals into the EHR rather than a competing
      workflow layer, making partnership more attractive than displacement.
