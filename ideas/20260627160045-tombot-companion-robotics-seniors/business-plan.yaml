slug: care-robot-ops-platform
date: '2026-06-27'
executiveSummary: >-
  Senior care facilities are about to receive thousands of companion robots (Tombot Jennie, PARO,
  ElliQ) with no operational infrastructure to schedule sessions, track resident outcomes, or
  generate the clinical documentation that value-based care audits and board ROI reviews demand.
  Care Robot Ops Platform is a SaaS layer that sits between robot hardware and the EHR — scheduling
  resident-robot sessions, capturing interaction telemetry, and exporting structured outcome reports
  into PointClickCare and MatrixCare. The primary buying trigger is Tombot's Fall 2026 commercial
  shipment of Jennie units to 23,000+ pre-order customers; the Director of Nursing receives the
  robot and immediately faces CFO scrutiny and potential CMS surveyor questions about non-pharmacologic
  intervention documentation. The beachhead is memory care units at 100-300-bed U.S. assisted living
  facilities with active Tombot purchase orders, a segment where over 42% of residents already have
  dementia and where the compliance pressure is highest. The company wins by being the first to own
  robot session data across multiple hardware vendors and embedding EHR write-back before incumbents
  can respond; a growing cross-facility outcome benchmark dataset then becomes a durable moat that
  no late entrant can replicate without years of deployed usage. The initial SaaS price of $500-800
  per facility per month is a rounding error against the $3,000-5,000 robot capital cost it
  justifies and the 2-4 nursing hours per week it saves; the long-term path is to become the
  reimbursement documentation standard for all non-pharmacological senior care interventions.
  One material gap in the current evidence base is the exact share of Tombot pre-orders belonging
  to facilities in the 100-300-bed assisted living segment; the SAM and beachhead headcount must
  be validated in the first 90 days of customer discovery.

problem:
  - "Senior care facilities receiving companion robots in Fall 2026 have no scheduling tool to assign resident-robot sessions, track utilization, or prevent robots from sitting unused."
  - "Directors of Nursing face immediate CFO ROI review after robot delivery with only paper activity logs and anecdotal staff notes — no structured outcome data to defend the capital spend."
  - "Value-based care contracts and tightening CMS survey guidance (QSO-25-07, National Partnership) require documented non-pharmacologic intervention records; manual EHR free-text notes fail this standard."
  - "No neutral software layer exists to normalize session data across robot vendors (Tombot, PARO, ElliQ) into a single facility-grade documentation workflow."
  - "Robot OEM dashboards, if they exist, are device-specific and do not write back to the resident record in PointClickCare or MatrixCare where surveyors and care teams actually look."

solution:
  - "SaaS fleet management dashboard: resident-robot scheduling, one-tap session logging, engagement scoring, and agitation/sleep/social engagement outcome tracking across robot types."
  - "Automated clinical documentation export into PointClickCare and MatrixCare via SMART on FHIR and USCDI Connector; day-1 fallback via CSV import for facilities where EHR API access is pending."
  - "CFO ROI and surveyor-ready outcome reports generated automatically after each session cycle, showing agitation reduction, nursing hours saved, and robot utilization vs. capital cost."
  - "Setup under one day per facility via nursing staff tablets and Wi-Fi — no on-site hardware, no IT project required."
  - "Cross-facility outcome benchmark reports (anonymized peer cohort) delivered monthly, creating an ongoing evidence asset for payer negotiations and CMS compliance."

whyWeWin:
  - "First-mover timing: Tombot's Fall 2026 commercial launch is a known calendar event creating simultaneous demand across thousands of facilities with no incumbent software vendor positioned to respond."
  - "Data network effect: normalized session telemetry across robot vendors and facilities compounds into the only cross-facility companion-robot outcome benchmark dataset — unreplicable without years of deployment."
  - "EHR integration as a moat: embedding PointClickCare and MatrixCare write-back before EHR vendors build natively makes the platform the structured data supplier, positioning partnership over displacement."
  - "Regulatory tailwind ownership: by building documentation templates aligned to CMS surveyor guidance now, the platform can shape what payers define as a reimbursable outcome metric before criteria exist."
  - "Channel leverage: operator investors (Lutheran Foundation for Long Term Living, Florida Community Health Network) inside Tombot's own cap table are natural design partners and channel references."
  - "Narrow, defensible scope: EHR vendors and OEMs are not positioned to build a neutral multi-vendor robot operations layer; the startup is not competing with them but feeding structured data into their systems."

strategicChoices:
  beachhead: >-
    Memory care units at U.S. assisted living facilities with 100-300 beds that have active Tombot
    Jennie pre-orders ahead of Fall 2026 commercial shipments — roughly 2,177 qualifying large
    assisted living communities with >42% dementia prevalence (based on researched SAM).
  wedgeRationale: >-
    The robot shipment confirmation is the single most time-bound, high-urgency buying trigger in
    the market: it forces an immediate CFO ROI review and staff workflow question that manual paper
    logs cannot answer. Targeting facilities with active purchase orders collapses the sales cycle
    from category education to operational urgency. Broader senior care workflow plays (music therapy,
    wander management) are deliberate deferred scope because they dilute the product focus before
    the robot-specific data moat is established.
  sequencingRationale: >-
    Build the robot scheduling and documentation core first (Months 0-6) to capture the Fall 2026
    Tombot shipment wave before any competitor can respond. Sign Tombot and PARO as integration
    partners in parallel with customer discovery (Months 1-4) to guarantee API access; without OEM
    telemetry, the product falls back to CSV, losing the behavioral signal advantage. EHR integration
    (PointClickCare) follows immediately after the first 3-5 lighthouse accounts validate that
    write-back is table stakes for DON adoption. Hire clinical affairs and regulatory advisor before
    12 months to avoid claims-marketing risk that could invite FTC scrutiny. Multi-facility operator
    enterprise contracts come at Month 12+ once 20 single-facility pilots establish the benchmark
    dataset and unit economics case.
  notYet:
    - "Music therapy, light therapy, and reminiscence therapy documentation (planned Year 2+ expansion after robot vertical is proven)"
    - "International markets — reimbursement structure varies too much to be a first-market priority"
    - "Consumer direct-to-senior distribution — home-based companion robot users lack the payer documentation need that drives facility willingness to pay"
    - "Building proprietary robot hardware or integrating with general-purpose home health robots"
    - "Clinical research / IRB studies that could establish therapeutic efficacy claims — regulatory risk outweighs early revenue gain"

market:
  tam: "$440M — 56,165 U.S. facilities (41,465 assisted living + 14,700 nursing homes) × ~$7.8K estimated annual subscription (based on researched market data)"
  sam: "$17M — ~2,177 large 100-300 bed assisted living communities with memory care and tech-readiness filter × ~$7.8K ARR (based on researched SAM)"
  som: "$1.2M — ~150 facilities reachable by Year 3 via 3-5 multi-site operators and OEM channel deals × ~$7.8K ARR (based on researched SOM)"
  segments:
    - "Memory care units at 100-300 bed U.S. assisted living facilities with companion robot purchase orders"
    - "Skilled nursing facilities and multi-facility senior living network GPOs evaluating companion robot fleet acquisitions"
  buyingProcess: >-
    Economic buyer is the Director of Nursing or Chief Clinical Officer; IT lead and CFO are
    co-approvers for EHR integration and capital justification respectively. Decision triggered by
    robot shipment confirmation, typically completing within 30-60 days of delivery under board
    ROI review pressure. Multi-facility operators compress cycles through GPO or regional VP approval.

product:
  mvp: >-
    Web and tablet app for resident-robot session scheduling, one-tap interaction logging, and
    automated outcome summary export (PDF + CSV) compatible with PointClickCare and MatrixCare;
    supports Tombot Jennie telemetry via API or CSV fallback; setup under one day per facility.
  sixMonth: "Bi-directional PointClickCare FHIR write-back live; Tombot API integration certified; 10-20 paying facilities onboarded; monthly peer-benchmark reports launched."
  twelveMonth: "MatrixCare integration live; multi-facility operator dashboard with fleet-wide utilization analytics; PARO telemetry connector added; 50 facilities on platform; CMS surveyor-ready documentation templates published."
  twentyFourMonth: "Expansion to music therapy and light therapy activity logging modules; anonymized population health data product offered to research institutions; 150+ facilities; enterprise multi-site licensing model active."
  keyBets:
    - "OEM API access: Tombot and PARO share sufficient session telemetry to build behavioral signals without a hardware integration project at each site"
    - "EHR write-back without services overhead: PointClickCare SMART on FHIR integration can be deployed in under one week per facility without custom IT projects"
    - "DON willingness to pay before CMS reimbursement exists: operational ROI (nursing hour savings, audit readiness) is sufficient to close the first 20 accounts"
    - "Benchmark data as retention: monthly peer-cohort outcome reports make churn costly once a facility has 3+ months of data history"

gtm:
  wedge: >-
    Direct outreach to Directors of Nursing at facilities with confirmed Tombot Jennie pre-orders,
    timed to robot shipment confirmation notifications (Fall 2026); pitch is "your robot arrives in
    90 days — here is how you justify it to your CFO and pass your next survey."
  channels:
    - "Direct sales to Tombot Jennie pre-order waitlist via partnership with Tombot customer success (co-marketing access in exchange for utilization uplift data)"
    - "LeadingAge and AHCA/NCAL conference presence targeting memory care directors and Directors of Nursing"
    - "Lutheran Foundation for Long Term Living and Florida Community Health Network as design-partner references and warm referral channels (both are Tombot investors)"
    - "PointClickCare and MatrixCare marketplace listings once EHR integration is certified"
    - "State aging office partnerships (NYSOFA, Washington DSHS) for public-program-funded companion tech deployments"
  funnelTargets: "Outreach to pre-order facility → qualified pilot 25-35%; qualified pilot → paying subscription 50%+ (buying trigger is structural, not discretionary)"
  pricing: >-
    $500-800 per facility per month (per-robot seat model; 1-3 robots per facility in Year 1).
    Positioned as <1% of the annual robot capital cost per unit and offset by 2-4 nursing hours
    per week saved. Enterprise multi-facility operators: annual contract at negotiated per-facility
    rate with volume discount. Price anchored against PointClickCare FHIR access at $65/app/facility/month
    and senior care delivery costs of $6,200-9,581/resident/month (based on researched willingness-to-pay data).

businessModel:
  revenueStreams:
    - "Monthly SaaS subscription per facility ($500-800/month; per-robot seat model)"
    - "Enterprise annual licensing for multi-facility operators at negotiated contract rates"
    - "Future anonymized population health outcome data licensing to research organizations and payers (Year 3+)"
  unitOfValue: "Per-facility per-month subscription; value delivered as nursing hours saved per week and audit-proof documentation per robot deployed"
  targetGrossMarginPct: 75
  expansionLevers:
    - "Add non-pharmacological therapy modules (music, light, reminiscence) to existing facility subscriptions (land-and-expand)"
    - "Upsell enterprise analytics tier with multi-site fleet benchmarking and regional operator dashboards"
    - "Data licensing revenue from anonymized cross-facility outcome benchmarks sold to health systems, payers, and academic researchers"
    - "International expansion following U.S. reimbursement precedent set with CMS (Canada, UK, Japan — high dementia prevalence, established care infrastructure)"

strategyMap:
  northStarMetric: "Number of paying facilities with ≥90 days of continuous session data"
  inputMetrics:
    - "Weekly robot utilization rate per facility (sessions logged / sessions scheduled)"
    - "Time from robot delivery to first platform session logged (target: <7 days)"
    - "DON-reported nursing hours saved per week on documentation"
    - "Audit pass rate for facilities using platform-generated documentation"
    - "Net Revenue Retention (target: >110% at 12 months)"
  moatsToBuild:
    - "Cross-facility companion-robot session benchmark dataset (normalized across Tombot, PARO, ElliQ)"
    - "Certified EHR write-back integrations (PointClickCare, MatrixCare) before EHR vendors build natively"
    - "CMS surveyor-aligned documentation templates established as the de facto non-pharmacologic intervention record standard"
    - "Robot OEM preferred-partner status locking in API access and co-marketing before competitors can negotiate equivalent terms"
  killCriteria:
    - "Fewer than 5 paying facilities after 6 months of sales effort targeting Tombot pre-order list"
    - "Tombot or PointClickCare announces a native competing product before Month 9"
    - "Robot delivery volumes fall below 500 U.S. facilities in calendar year 2026 (demand signal collapses)"
    - "DON churn rate exceeds 30% in first cohort after 90-day pilot (product-market fit failure)"
  mermaid: |
    flowchart LR
      PreOrder[Tombot Pre-Order\nWaitlist Access] --> Outreach[Direct DON\nOutreach]
      Outreach --> Pilot[Paid Pilot\n30-day onboarding]
      Pilot --> MVP[Session Scheduler\n+ Outcome Logger]
      MVP --> EHR[PointClickCare\nFHIR Write-Back]
      EHR --> Proof[CFO ROI Report\n+ Audit Pass]
      Proof --> Expand[Multi-Facility\nEnterprise Contract]
      MVP --> Benchmark[Cross-Facility\nOutcome Benchmark]
      Benchmark --> Expand
      Expand --> DataMoat[Payer Documentation\nStandard Ownership]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Strong near-term timing and a concrete buying trigger; conviction depends on OEM API access and whether DONs pay before CMS reimbursement materializes."
    whyBelieve: "23,000 confirmed Tombot pre-orders create a known fleet deployment event in Fall 2026 with no incumbent software vendor positioned to capture it, and two of Tombot's own investors are care facility operators who need exactly this product."
    whyDoubt: "Tombot or PointClickCare could bundle a competing feature within 12-18 months, and the reimbursement case is indirect today — the product must win on operational ROI alone until CMS moves."
    nextDiligence: "Interview 10 Directors of Nursing with active Tombot pre-orders to confirm willingness to pay $500+/month before robot arrival and validate that EHR write-back is non-negotiable."
  firstCustomer:
    title: "Director of Nursing, 150-bed U.S. memory care assisted living facility"
    profile: "Facility with 80-150 memory care residents, active Tombot Jennie pre-order, PointClickCare EHR, and a value-based care contract requiring documented non-pharmacologic intervention outcomes."
    trigger: "Receipt of Tombot shipment confirmation (Fall 2026) triggers immediate CFO ROI review and board inquiry within 30-60 days of expected delivery."
    buyer: "Director of Nursing (operational sponsor) with CFO co-approval for annual contracts above $10K"
    initialContract: "$6,000-9,600 annual pilot contract (1-2 robots, $500-800/month); conversion path is 90-day pilot with structured outcome report delivered at Day 85 before renewal decision."
  mustBeTrue:
    - "At least 500 U.S. assisted living facilities in the 100-300 bed segment receive Tombot Jennie units in the 12 months following Fall 2026 commercial launch — otherwise the deployment wave is too small for the beachhead."
    - "Directors of Nursing at facilities with active robot purchase orders will pay $500-800/month for scheduling and documentation software before CMS companion-robot reimbursement exists, based on operational ROI (nursing hours saved, survey readiness) alone."
    - "Tombot and at least one other OEM (PARO or ElliQ) will grant API telemetry access to a neutral third-party operations platform rather than building their own fleet management SaaS."
    - "PointClickCare SMART on FHIR integration can be deployed at a new facility in under one week without a custom IT project, making EHR write-back a competitive entry barrier rather than a deployment bottleneck."
    - "The cross-facility outcome benchmark dataset becomes a meaningful retention and expansion driver: facilities with 3+ months of normalized session data show Net Revenue Retention above 110% and resist churning to a later OEM-native tool."
  diligenceQuestions:
    - "How many of Tombot's 23,000 pre-orders are from 100-300 bed U.S. assisted living facilities specifically, and what is the confirmed delivery timeline for this segment?"
    - "Will Tombot share customer identity and shipment confirmation timing with a preferred SaaS partner, or must the startup find pre-order customers through independent outreach?"
    - "What telemetry does Tombot's current API expose — session start/end, behavioral signals, battery/status — and on what timeline will it be available to third-party developers?"
    - "Have any Directors of Nursing at facilities with companion robot purchase orders already attempted to solve the documentation problem, and what did they try?"
    - "What is PointClickCare's current process and timeline for certifying a new USCDI Connector app, and are there revenue-share terms that affect the unit economics?"
    - "Would Lutheran Foundation for Long Term Living or Florida Community Health Network pilot the product at their own facilities, and on what terms?"

operatingAssumptions:
  - assumption: "Directors of Nursing will pay $500-800/month before CMS companion-robot reimbursement is defined, based on operational ROI from nursing hour savings and survey audit readiness."
    basis: "idea.yaml"
    validationTest: "10-15 buyer interviews with DONs at facilities holding active Tombot pre-orders; target: 6+ confirm they would budget this category before shipment arrives."
    decisionImpact: "If false, pricing must drop to $200-300/month or product must be repositioned as a post-audit ROI tool rather than a pre-deployment operational necessity."
  - assumption: "Tombot will share session telemetry via API with preferred third-party SaaS partners rather than building its own fleet management software."
    basis: "research.yaml"
    validationTest: "Partnership conversation with Tombot BD team within 60 days; assess whether they have an existing developer or ISV program and sample telemetry payload."
    decisionImpact: "If OEM withholds API access, the product must rely on CSV/manual ingest at launch, losing behavioral signal advantage and potentially delaying PointClickCare write-back quality."
  - assumption: "PointClickCare SMART on FHIR integration can be deployed at a new facility in under one week without a custom IT services project."
    basis: "research.yaml"
    validationTest: "Technical proof-of-concept using PointClickCare sandbox environment (USCDI Connector documented pricing: $65/app/facility/month) and one pilot facility IT lead."
    decisionImpact: "If EHR integration requires 4-8 week services engagements per facility, gross margin drops below 60% and sales cycle extends, breaking the fast-deployment GTM assumption."
  - assumption: "Tombot's Fall 2026 commercial shipments will reach at least 500 qualifying U.S. assisted living facilities within 12 months — sufficient to establish beachhead sales velocity without relying on PARO or ElliQ volume."
    basis: "idea.yaml"
    validationTest: "Monitor Tombot shipment announcements and waitlist conversion communications in Q3 2026; cross-reference with direct customer discovery calls to estimate facility counts."
    decisionImpact: "If robot volumes are below 500 facilities in Year 1, SAM timelines extend 12-18 months and the funding ask must be scaled back or the beachhead shifted to PARO or ElliQ customer bases."
  - assumption: "Cross-facility outcome benchmark data creates meaningful retention: facilities with 90+ days of session history resist churning to a later OEM-native tool."
    basis: "operator judgment"
    validationTest: "Measure Day-90 churn rate and Net Revenue Retention across first 20 pilot accounts; target NRR >110% and <10% Day-90 churn as retention signal."
    decisionImpact: "If benchmark data does not reduce churn, the moat thesis weakens and the business is more transactional than defensible; pricing and positioning must shift accordingly."

experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "DON buyer discovery interviews"
    hypothesis: "Directors of Nursing at facilities with active Tombot pre-orders will confirm willingness to pay $500+/month for scheduling and documentation software before robot arrival."
    successMetric: "6 of 15 interviewees say they would sign a pilot agreement at $500-800/month within 30 days of robot delivery confirmation."
    owner: "CEO / founder"
  - horizon: "0–90 days"
    experiment: "Tombot OEM partnership conversation"
    hypothesis: "Tombot will agree to share session telemetry API access with a preferred third-party SaaS partner in exchange for utilization uplift data and co-marketing."
    successMetric: "Signed letter of intent or developer program enrollment with access to Tombot sandbox telemetry by Day 60."
    owner: "CEO / founder"
  - horizon: "0–90 days"
    experiment: "PointClickCare FHIR technical proof-of-concept"
    hypothesis: "PointClickCare SMART on FHIR and USCDI Connector can ingest companion robot session data and write a structured activity note to a resident record in under 5 days of engineering."
    successMetric: "Working sandbox integration that writes a session log as a structured FHIR resource to a test resident record without manual data entry."
    owner: "CTO / lead engineer"
  - horizon: "90–180 days"
    experiment: "First 3 paid pilot deployments"
    hypothesis: "Facilities receiving Tombot robots will sign a $500-800/month pilot and report that platform-generated documentation satisfies their CFO ROI review within 90 days."
    successMetric: "3 signed pilot contracts; 2 of 3 pilots report CFO approval of robot program continuation using platform output."
    owner: "CEO / Sales"
  - horizon: "90–180 days"
    experiment: "Lutheran Foundation and Florida Community Health Network design-partner pilots"
    hypothesis: "Tombot operator investors will agree to pilot the platform at their own facilities, providing warm reference accounts and feedback on survey-audit documentation quality."
    successMetric: "At least 1 signed pilot agreement with Lutheran Foundation or FCHN facility; feedback incorporated into documentation template before broader launch."
    owner: "CEO / founder"
  - horizon: "180–365 days"
    experiment: "Multi-facility operator enterprise contract"
    hypothesis: "A regional assisted living operator managing 5+ facilities with Tombot robots will sign an enterprise annual contract at a per-facility rate below $700/month in exchange for volume discount."
    successMetric: "1 signed enterprise contract covering 5+ facilities; used as primary case study for subsequent operator outreach."
    owner: "CEO / Sales"
  - horizon: "180–365 days"
    experiment: "Peer-benchmark report as retention driver"
    hypothesis: "Monthly anonymized peer-cohort outcome benchmark reports will increase platform stickiness, reducing 6-month churn rate below 10%."
    successMetric: "6-month churn rate below 10% in first 20-account cohort; 80%+ of facilities open the monthly benchmark report."
    owner: "Product / Customer Success"

operations:
  - "Customer success manager (CSR) embedded for high-touch onboarding of first 20 facilities; targets <7-day time-to-first-session-logged."
  - "EHR integration pipeline: PointClickCare USCDI Connector certified by Month 4; MatrixCare partner integration by Month 9."
  - "OEM API management: dedicated integration layer normalizing telemetry across Tombot, PARO, and ElliQ schemas; CSV/manual fallback for Day 1."
  - "HIPAA-compliant data architecture: all resident session data stored in SOC 2 Type II certified cloud infrastructure with facility-level data segmentation."
  - "Clinical affairs advisor engaged by Month 6 to review all documentation templates for CMS survey compliance and FTC claims discipline."
  - "Conference presence at LeadingAge Annual (November) and AHCA/NCAL (October) for pipeline generation and competitor monitoring."

team:
  - role: "CEO / Founder"
    startTiming: "Month 0"
    rationale: "Owns customer discovery, OEM partnerships, and fundraising; must have senior living operator network or post-acute health-tech sales background to access DON buyer relationships."
  - role: "CTO / Lead Engineer"
    startTiming: "Month 0"
    rationale: "Owns platform architecture, EHR integration connectors, and OEM API pipeline; prior FHIR and post-acute EHR integration experience is mandatory to meet Month-4 PointClickCare certification deadline."
  - role: "Clinical Affairs Advisor (part-time)"
    startTiming: "Month 4"
    rationale: "Reviews documentation templates for CMS survey compliance and FTC health-claims discipline; prevents regulatory risk as platform scales outcome reporting language."
  - role: "Customer Success Manager"
    startTiming: "Month 3"
    rationale: "Manages high-touch onboarding for first 20 facilities; drives time-to-first-session-logged below 7 days and monitors DON satisfaction as primary churn signal."
  - role: "Full-Stack Engineer (Founding)"
    startTiming: "Month 2"
    rationale: "Accelerates EHR integration and OEM telemetry pipeline alongside CTO; second engineer needed before Fall 2026 shipment wave to avoid single-point-of-failure in core product."

