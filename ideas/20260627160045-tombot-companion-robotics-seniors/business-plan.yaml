risks:
  - risk: "Tombot or PointClickCare announces a native companion robot operations product, eliminating the standalone market."
    likelihood: Medium
    impact: High
    mitigation: "Secure OEM preferred-partner status and EHR marketplace certification before Month 9; position as the multi-vendor neutral data layer that expands OEM and EHR TAM rather than competing; deepen benchmark dataset to create a switching cost that no bundled feature can replicate quickly."
  - risk: "Robot delivery volumes in Year 1 fall well below Tombot's 23,000 pre-order figure due to manufacturing delays or order cancellations."
    likelihood: Medium
    impact: High
    mitigation: "Monitor Tombot shipment announcements in real time; pivot beachhead to PARO and ElliQ customer bases if Tombot volumes disappoint; build CSV/manual ingest path so the product works before OEM API is available."
  - risk: "Directors of Nursing refuse to pay before CMS reimbursement exists, requiring anchor on nursing labor savings alone."
    likelihood: Medium
    impact: Medium
    mitigation: "Pre-build CFO ROI calculator showing 2-4 nursing hours/week saved against fully-loaded nursing wage ($35-45/hour); price the platform at <50% of the weekly labor saving to make ROI immediate and undeniable without any reimbursement argument."
  - risk: "EHR integration requires a 4-8 week IT services engagement per facility, breaking the sub-7-day onboarding promise."
    likelihood: Medium
    impact: Medium
    mitigation: "Run FHIR proof-of-concept before signing first paid pilot; design CSV fallback so documentation export works on Day 1 without EHR API; route PointClickCare USCDI Connector through already-approved app marketplace path to reduce IT approval friction."
  - risk: "FTC enforcement or CMS survey scrutiny if documentation templates overstate therapeutic or clinical efficacy claims."
    likelihood: Low
    impact: High
    mitigation: "Engage clinical affairs advisor by Month 6 to review all product language; position platform as operational documentation and utilization tracking, not as a therapeutic claims tool; follow PARO's model of separating device evidence from software marketing."

fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$1.5–2.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway covers: (1) CEO + CTO founding team salaries for 18 months;
    (2) one founding engineer hired Month 2; (3) customer success manager hired Month 3;
    (4) clinical affairs part-time advisor from Month 4; (5) PointClickCare USCDI Connector
    certification fees and OEM API integration costs; (6) LeadingAge and AHCA/NCAL conference
    presence; (7) HIPAA-compliant cloud infrastructure (SOC 2 Type II). Goal: 20 paying
    facilities and $150K+ ARR by Month 18, establishing the SOM trajectory and benchmark
    dataset required for a seed round.
