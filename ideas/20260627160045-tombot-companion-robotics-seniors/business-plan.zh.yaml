slug: care-robot-ops-platform
date: '2026-06-27'
executiveSummary: >-
  老年照护机构即将接收数千台陪伴机器人（Tombot Jennie、PARO、ElliQ），却没有任何运营基础设施来排班会话、追踪居民疗效，或生成基于价值医疗审计和董事会 ROI 审查所需的临床文档。照护机器人运营平台是一个 SaaS 层，位于机器人硬件与 EHR 之间——调度居民—机器人会话、采集交互遥测数据，并将结构化疗效报告导出至 PointClickCare 和 MatrixCare。主要采购触发器是 Tombot 在 2026 年秋季向超过 2.3 万名预订客户商业发货 Jennie 机器人；护理主任收到机器人后，立即面临 CFO 质询和 CMS 巡查员就非药物干预文档记录提出的潜在问题。滩头市场是持有有效 Tombot 采购订单的 100—300 张床位美国辅助生活机构的记忆照护单元——该细分市场中超过 42% 的居民已有痴呆症，合规压力最大。公司的制胜之道在于率先跨越多家硬件厂商掌握机器人会话数据，并在现有厂商反应之前嵌入 EHR 写回；持续增长的跨机构疗效基准数据集，将形成任何后来者若无多年部署积累就无法复制的持久护城河。初始 SaaS 定价每机构每月 $500—$800，相对于其所证明的 $3,000—$5,000 机器人资本成本和每周节省的 2—4 护理人时而言，几乎可以忽略不计；长期路径是成为所有非药物老年照护干预的报销文档规范。当前证据基础的一处实质性缺口是 Tombot 预订中属于 100—300 张床位辅助生活机构的确切比例；SAM 和滩头市场的数量须在客户发现的头 90 天内验证。

problem:
  - "2026 年秋季接收陪伴机器人的照护机构没有排班工具来分配居民—机器人会话、追踪使用率，或防止机器人闲置。"
  - "护理主任在机器人交付后立即面临 CFO 的 ROI 审查，手头只有纸质活动记录和员工随机笔记——没有结构化疗效数据来证明资本支出的合理性。"
  - "基于价值的医疗合同和日趋严格的 CMS 巡查指南（QSO-25-07、全国伙伴计划）要求留存有记录的非药物干预记录；手工 EHR 自由文本备注无法满足这一标准。"
  - "目前没有中立软件层能将跨机器人厂商（Tombot、PARO、ElliQ）的会话数据规范化，汇入统一的机构级文档工作流。"
  - "机器人 OEM 的仪表盘（若存在）仅针对特定设备，不写回到 PointClickCare 或 MatrixCare 中巡查员和照护团队实际查看的居民记录。"

solution:
  - "SaaS 机队管理仪表盘：跨机器人类型的居民—机器人排班、一键会话记录、参与度评分，以及躁动/睡眠/社交参与疗效追踪。"
  - "通过 SMART on FHIR 和 USCDI Connector 自动导出临床文档至 PointClickCare 和 MatrixCare；针对 EHR API 接入待批的机构，第一天即提供 CSV 导入备用方案。"
  - "每次会话周期结束后自动生成 CFO ROI 和巡查员就绪疗效报告，呈现躁动减少幅度、节省的护理人时及机器人使用率与资本成本的对比。"
  - "通过护理人员平板电脑和 Wi-Fi 在每家机构一天内完成设置——无需现场硬件、无 IT 项目。"
  - "每月向机构推送跨机构匿名同行队列疗效基准报告，为付款方谈判和 CMS 合规持续积累循证资产。"

whyWeWin:
  - "先发时机：Tombot 2026 年秋季商业首发是已知日历事件，在数千家机构间同步释放需求，而没有任何在位软件厂商布局。"
  - "数据网络效应：跨机器人厂商、机构和居民的规范化会话遥测数据，将汇聚成唯一的跨机构陪伴机器人疗效基准数据集——缺少多年部署积累，任何人都无法复制。"
  - "EHR 集成作为护城河：在 EHR 厂商原生开发前嵌入 PointClickCare 和 MatrixCare 写回，使平台成为结构化数据的提供方，将合作而非替代定为默认格局。"
  - "监管顺风占位：现在就构建与 CMS 巡查指南对齐的文档模板，平台就能在付款方写下标准之前，塑造可报销疗效指标的定义。"
  - "渠道杠杆：Tombot 自身资本表上的运营商投资方（Lutheran Foundation for Long Term Living、Florida Community Health Network）天然是共创客户和渠道背书。"
  - "定位清晰、易守难攻：EHR 厂商和 OEM 都没有能力构建中立的多厂商机器人运营层；创业公司不是在与他们竞争，而是在向其系统输送结构化数据。"

strategicChoices:
  beachhead: >-
    美国 100—300 张床位辅助生活机构的记忆照护单元，持有 2026 年秋季商业发货前的有效 Tombot Jennie 预订单——基于研究 SAM 估算，约有 2,177 家符合条件的大型辅助生活社区，痴呆症住院率超过 42%。
  wedgeRationale: >-
    机器人发货确认是市场中时限最明确、紧迫度最高的采购触发器：它立即触发 CFO ROI 审查和员工工作流问题，而手工纸质记录无法回答这些问题。锁定持有有效采购订单的机构，将销售周期从品类教育压缩为运营紧迫性。音乐疗法、防走失管理等更宽泛的老年照护工作流场景，是刻意延后的范围——因为在机器人专属数据护城河建立之前拓宽产品焦点会分散精力。
  sequencingRationale: >-
    第一步（0—6 月）先建机器人排班和文档核心，赶在任何竞争者反应之前捕获 Tombot 2026 年秋季发货浪潮。同步开展客户发现（1—4 月），签约 Tombot 和 PARO 为集成合作伙伴，确保 API 接入；没有 OEM 遥测数据，产品就得回退到 CSV，失去行为信号优势。EHR 集成（PointClickCare）在前 3—5 家灯塔客户验证写回是护理主任采购必要条件后立即跟进。在满 12 个月前聘用临床事务和监管顾问，避免可能招致 FTC 审查的市场宣传合规风险。企业多机构合同从第 12 月起推进——等 20 个单机构试点建立起基准数据集和单位经济模型案例。
  notYet:
    - "音乐疗法、光照疗法和回忆疗法文档（计划第 2 年以上扩展，待机器人垂直场景验证后）"
    - "国际市场——报销结构差异过大，不宜作为首选市场"
    - "直达老年人的消费者分销——居家陪伴机器人用户缺乏驱动机构付费意愿的付款方文档需求"
    - "自建机器人硬件或集成通用家用健康机器人"
    - "可建立疗效主张的临床研究/IRB 研究——监管风险超过早期收入收益"

market:
  tam: "$4.4 亿——全美 56,165 家机构（41,465 家辅助生活 + 14,700 家护理院）× 估算年度订阅约 $7.8K（基于研究市场数据）"
  sam: "$1,700 万——约 2,177 家 100—300 张床位的大型辅助生活社区（经记忆照护和技术就绪性筛选）× 约 $7.8K ARR（基于研究 SAM）"
  som: "$120 万——第 3 年通过 3—5 家多机构运营商和 OEM 渠道可触达约 150 家机构 × 约 $7.8K ARR（基于研究 SOM）"
  segments:
    - "持有陪伴机器人采购订单的 100—300 张床位美国辅助生活机构的记忆照护单元"
    - "评估陪伴机器人机队采购的专业护理机构和多机构老年生活网络集中采购组织"
  buyingProcess: >-
    经济买方是护理主任或首席临床官；IT 负责人和 CFO 分别作为 EHR 集成和资本证明的联合审批人。决策由机器人发货确认触发，通常在交付后 30—60 天内在董事会 ROI 审查压力下完成。多机构运营商通过集中采购或区域副总裁审批压缩决策周期。

product:
  mvp: >-
    面向居民—机器人会话排班、一键交互记录和自动疗效摘要导出（PDF + CSV）的 Web 及平板应用，兼容 PointClickCare 和 MatrixCare；通过 API 或 CSV 备用方案支持 Tombot Jennie 遥测数据；每家机构一天内完成设置。
  sixMonth: "PointClickCare 双向 FHIR 写回上线；Tombot API 集成完成认证；10—20 家付费机构完成入驻；每月同行基准报告启动。"
  twelveMonth: "MatrixCare 集成上线；多机构运营商仪表盘含全机队使用率分析；PARO 遥测连接器接入；平台服务 50 家机构；CMS 巡查员就绪文档模板发布。"
  twentyFourMonth: "扩展至音乐疗法和光照疗法活动记录模块；向研究机构提供匿名人群健康数据产品；服务 150 家以上机构；企业多机构授权模式上线。"
  keyBets:
    - "OEM API 接入：Tombot 和 PARO 共享足够的会话遥测数据，无需在每个站点开展硬件集成项目即可构建行为信号"
    - "无服务开销的 EHR 写回：PointClickCare SMART on FHIR 集成可在每家机构不超过一周内部署，无需定制 IT 项目"
    - "CMS 报销存在前护理主任的付费意愿：运营 ROI（护理人时节省、审计就绪）足以签下前 20 个客户"
    - "基准数据作为留存手段：持有 3 个月以上规范化会话历史数据的机构，在流失至 OEM 原生工具时的阻力会显著增大"

gtm:
  wedge: >-
    直接向持有已确认 Tombot Jennie 预订单机构的护理主任发起外联，时机配合机器人发货确认通知（2026 年秋季）；核心话术是"你的机器人 90 天后到货——这是你向 CFO 证明它的方式，也是通过下次巡查的方法。"
  channels:
    - "通过 Tombot 客户成功团队的合作伙伴关系，直销至 Tombot Jennie 预订候补名单（以使用率提升数据换取联合营销接入）"
    - "LeadingAge 和 AHCA/NCAL 大会存在感，触达记忆照护主任和护理主任"
    - "Lutheran Foundation for Long Term Living 和 Florida Community Health Network 作为共创客户参照和暖转介渠道（两者均为 Tombot 投资方）"
    - "EHR 集成认证完成后在 PointClickCare 和 MatrixCare 市场上架"
    - "州级老龄事务合作伙伴（NYSOFA、Washington DSHS），用于公共项目资助的伴侣科技部署"
  funnelTargets: "外联预订机构 → 合格试点 25—35%；合格试点 → 付费订阅 50%+（采购触发器是结构性的，非可选项）"
  pricing: >-
    每机构每月 $500—$800（按机器人席位收费；第 1 年每机构 1—3 台）。
    定位为每台机器人年度资本成本的 <1%，并可由每周节省 2—4 护理人时来抵消。企业多机构运营商：以协商的每机构费率签署年度合同，附量价折扣。定价以 PointClickCare FHIR 接入 $65/应用/机构/月和老年照护交付成本 $6,200—$9,581/居民/月为参照（基于研究付费意愿数据）。

businessModel:
  revenueStreams:
    - "每机构月度 SaaS 订阅（$500—$800/月；按机器人席位收费）"
    - "多机构运营商企业年度授权，按协商合同费率"
    - "未来面向研究机构和付款方的匿名人群健康疗效数据授权（第 3 年以上）"
  unitOfValue: "每机构每月订阅；价值体现为每周节省的护理人时和每台部署机器人的审计级文档"
  targetGrossMarginPct: 75
  expansionLevers:
    - "向现有机构订阅添加非药物治疗模块（音乐、光照、回忆）（深耕扩展模式）"
    - "向上销售含多机构机队基准和区域运营商仪表盘的企业分析套餐"
    - "向医疗系统、付款方和学术研究机构销售匿名跨机构疗效基准数据授权收入"
    - "跟随 CMS 建立的美国报销先例进行国际扩张（加拿大、英国、日本——痴呆症患病率高、照护基础设施成熟）"

strategyMap:
  northStarMetric: "持续积累 ≥90 天会话数据的付费机构数量"
  inputMetrics:
    - "每机构每周机器人使用率（已记录会话数 / 已排班会话数）"
    - "从机器人交付到平台记录首次会话的时间（目标：<7 天）"
    - "护理主任反馈的每周文档节省护理人时数"
    - "使用平台生成文档的机构审计通过率"
    - "净收入留存率（目标：12 个月时 >110%）"
  moatsToBuild:
    - "跨机构陪伴机器人会话基准数据集（跨 Tombot、PARO、ElliQ 规范化）"
    - "在 EHR 厂商原生开发前完成 PointClickCare、MatrixCare 认证 EHR 写回集成"
    - "以 CMS 巡查员对齐的文档模板确立非药物干预记录的事实标准"
    - "机器人 OEM 优先合作伙伴地位，在竞争对手谈判同等条款之前锁定 API 接入和联合营销"
  killCriteria:
    - "针对 Tombot 预订名单 6 个月销售努力后付费机构不足 5 家"
    - "Tombot 或 PointClickCare 在第 9 月前宣布原生竞争产品"
    - "机器人 2026 年历年交付美国机构数量低于 500 家（需求信号崩塌）"
    - "首批队列 90 天试点后护理主任流失率超过 30%（产品市场契合失败）"
  mermaid: |
    flowchart LR
      PreOrder[Tombot Pre-Order\nWaitlist Access] --> Outreach[Direct DON\nOutreach]
      Outreach --> Pilot[Paid Pilot\n30-day onboarding]
      Pilot --> MVP[Session Scheduler\n+ Outcome Logger]
      MVP --> EHR[PointClickCare\nFHIR Write-Back]
      EHR --> Proof[CFO ROI Report\n+ Audit Pass]
      Proof --> Expand[Multi-Facility\nEnterprise Contract]
      MVP --> Benchmark[Cross-Facility\nOutcome Benchmark]
      Benchmark --> Expand
      Expand --> DataMoat[Payer Documentation\nStandard Ownership]

investorMemo:
  verdict:
    call: "会面/进一步调查"
    conviction: "近期时机强劲、采购触发器具体；确信度取决于 OEM API 接入以及护理主任是否在 CMS 报销落地前就愿意付费。"
    whyBelieve: "2.3 万台已确认的 Tombot 预订，在 2026 年秋季形成一个已知的机队部署事件，而目前没有任何在位软件厂商有能力捕获它；Tombot 自身资本表上的两家投资方正是照护机构运营商，他们恰恰需要这个产品。"
    whyDoubt: "Tombot 或 PointClickCare 可能在 12—18 个月内捆绑竞争功能；报销路径目前是间接的——产品必须单凭运营 ROI 制胜，直到 CMS 出手。"
    nextDiligence: "访谈 10 位持有有效 Tombot 预订单的护理主任，确认他们是否愿意在机器人到货前每月支付 $500+，并验证 EHR 写回是否为不可或缺的条件。"
  firstCustomer:
    title: "护理主任，150 张床位美国记忆照护辅助生活机构"
    profile: "机构有 80—150 名记忆照护居民、有效的 Tombot Jennie 预订单、PointClickCare EHR，以及要求记录非药物干预疗效的基于价值医疗合同。"
    trigger: "收到 Tombot 发货确认（2026 年秋季），立即触发 CFO ROI 审查，并在预计交付后 30—60 天内引发董事会询问。"
    buyer: "护理主任（运营发起人），年度合同超过 $10K 时需 CFO 联合审批"
    initialContract: "$6,000—$9,600 年度试点合同（1—2 台机器人，$500—$800/月）；转化路径为 90 天试点，在第 85 天前交付结构化疗效报告，供续约决策参考。"
  mustBeTrue:
    - "在 2026 年秋季商业首发后 12 个月内，至少有 500 家 100—300 张床位辅助生活机构接收 Tombot Jennie 机器人——否则部署浪潮规模不足以支撑滩头市场。"
    - "持有有效机器人采购订单机构的护理主任，将在 CMS 陪伴机器人报销标准存在之前，仅凭运营 ROI（节省护理人时、审计就绪）即支付每月 $500—$800 的排班和文档软件费用。"
    - "Tombot 及至少一家其他 OEM（PARO 或 ElliQ）将向中立第三方运营平台授予 API 遥测接入，而非自建机队管理 SaaS。"
    - "PointClickCare SMART on FHIR 集成可在每家新机构一周内完成部署，无需定制 IT 项目，使 EHR 写回成为竞争门槛而非部署瓶颈。"
    - "跨机构疗效基准数据集成为有意义的留存和扩展驱动力：积累 3 个月以上规范化会话数据的机构，净收入留存率超过 110%，且抵制流失至 OEM 原生工具。"
  diligenceQuestions:
    - "Tombot 的 2.3 万台预订中，有多少具体来自 100—300 张床位的美国辅助生活机构，该细分市场的确认交付时间线是什么？"
    - "Tombot 是否会与优先 SaaS 合作伙伴共享客户身份和发货确认时间，还是创业公司须通过独立外联自行找到预订客户？"
    - "Tombot 当前 API 暴露哪些遥测数据——会话开始/结束、行为信号、电量/状态——何时能向第三方开发者开放？"
    - "持有陪伴机器人采购订单的机构中，是否有护理主任已尝试解决文档问题，尝试了什么方案？"
    - "PointClickCare 认证新 USCDI Connector 应用的当前流程和时间线是什么？是否存在影响单位经济模型的收入分成条款？"
    - "Lutheran Foundation for Long Term Living 或 Florida Community Health Network 是否愿意在其自有机构试点该产品？条款是什么？"

operatingAssumptions:
  - assumption: "护理主任将在 CMS 陪伴机器人报销标准确立之前支付 $500—$800/月，依据是护理人时节省和巡查审计就绪带来的运营 ROI。"
    basis: "idea.yaml"
    validationTest: "与持有有效 Tombot 预订单机构的护理主任进行 10—15 次买方访谈；目标：6 人以上确认在发货到达前会为该品类做预算。"
    decisionImpact: "若结果为否，定价须降至 $200—$300/月，或产品须重新定位为审计后 ROI 工具，而非发货前运营必要品。"
  - assumption: "Tombot 将通过 API 向优先第三方 SaaS 合作伙伴共享会话遥测数据，而非自建机队管理软件。"
    basis: "research.yaml"
    validationTest: "在 60 天内与 Tombot 业务拓展团队展开合作对话；评估其是否有现有开发者或 ISV 计划及样本遥测负载。"
    decisionImpact: "若 OEM 拒绝 API 接入，产品在首发时须依赖 CSV/手工导入，失去行为信号优势，并可能推迟 PointClickCare 写回质量。"
  - assumption: "PointClickCare SMART on FHIR 集成可在每家新机构一周内完成部署，无需定制 IT 服务项目。"
    basis: "research.yaml"
    validationTest: "使用 PointClickCare 沙盒环境进行技术概念验证（USCDI Connector 文档定价：$65/应用/机构/月），并联合一家试点机构 IT 负责人。"
    decisionImpact: "若 EHR 集成每家机构需要 4—8 周服务接入，毛利率将跌破 60%，销售周期延长，快速部署的 GTM 假设随之崩塌。"
  - assumption: "Tombot 2026 年秋季商业发货将在 12 个月内覆盖至少 500 家符合条件的美国辅助生活机构——足以建立滩头市场销售速度，不需依赖 PARO 或 ElliQ 的出货量。"
    basis: "idea.yaml"
    validationTest: "实时监测 Tombot 发货公告和候补名单转化通知（2026 年三季度起）；通过直接客户发现电话交叉估算机构数量。"
    decisionImpact: "若第 1 年机器人覆盖机构低于 500 家，SAM 时间线延长 12—18 个月，融资金额需相应缩减，或滩头市场须转向 PARO 或 ElliQ 客户基础。"
  - assumption: "跨机构疗效基准数据能创造有意义的留存效果：积累 90 天以上会话历史的机构，抵制流失至后来 OEM 原生工具。"
    basis: "运营判断"
    validationTest: "追踪前 20 个试点客户的第 90 天流失率和净收入留存率；目标 NRR >110%、第 90 天流失率 <10% 作为留存信号。"
    decisionImpact: "若基准数据未能降低流失，护城河论点弱化，业务的可防御性下降为事务性；定价和定位须相应调整。"

experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "护理主任买方发现访谈"
    hypothesis: "持有有效 Tombot 预订单机构的护理主任，将确认在机器人到货前愿意为排班和文档软件每月支付 $500+。"
    successMetric: "15 位受访者中有 6 位表示愿意在机器人发货确认后 30 天内以 $500—$800/月签署试点协议。"
    owner: "CEO/创始人"
  - horizon: "0–90 天"
    experiment: "Tombot OEM 合作对话"
    hypothesis: "Tombot 将同意向优先第三方 SaaS 合作伙伴共享会话遥测 API 接入，换取使用率提升数据和联合营销。"
    successMetric: "在第 60 天前签署意向书或完成开发者计划注册，并获得 Tombot 沙盒遥测接入。"
    owner: "CEO/创始人"
  - horizon: "0–90 天"
    experiment: "PointClickCare FHIR 技术概念验证"
    hypothesis: "PointClickCare SMART on FHIR 和 USCDI Connector 可在 5 天工程工作内将陪伴机器人会话数据导入并将结构化活动记录写入居民档案。"
    successMetric: "在沙盒环境中完成可用集成，将一条会话记录作为结构化 FHIR 资源写入测试居民档案，无需手工数据录入。"
    owner: "CTO/主力工程师"
  - horizon: "90–180 天"
    experiment: "前 3 个付费试点部署"
    hypothesis: "接收 Tombot 机器人的机构将签署 $500—$800/月的试点协议，并报告平台生成的文档在 90 天内满足 CFO ROI 审查要求。"
    successMetric: "3 份签署的试点合同；3 个试点中有 2 个报告 CFO 批准机器人项目延续，依据为平台输出结果。"
    owner: "CEO/销售"
  - horizon: "90–180 天"
    experiment: "Lutheran Foundation 和 Florida Community Health Network 共创客户试点"
    hypothesis: "Tombot 运营商投资方将同意在其自有机构试点平台，提供暖参照账户，并就巡查审计文档质量给出反馈。"
    successMetric: "与 Lutheran Foundation 或 FCHN 机构签署至少 1 份试点协议；反馈在更大范围首发前纳入文档模板。"
    owner: "CEO/创始人"
  - horizon: "180–365 天"
    experiment: "多机构运营商企业合同"
    hypothesis: "管理 5 家以上持有 Tombot 机器人机构的区域辅助生活运营商，将以低于每机构 $700/月的量价折扣，签署企业年度合同。"
    successMetric: "1 份覆盖 5 家以上机构的企业合同；用作后续运营商外联的主要案例研究。"
    owner: "CEO/销售"
  - horizon: "180–365 天"
    experiment: "同行基准报告作为留存驱动力"
    hypothesis: "每月匿名同行队列疗效基准报告将提升平台粘性，将 6 个月流失率压低至 10% 以下。"
    successMetric: "前 20 个客户队列 6 个月流失率低于 10%；80% 以上的机构打开每月基准报告。"
    owner: "产品/客户成功"

operations:
  - "为前 20 家机构配备嵌入式客户成功经理，提供高触达入驻服务；目标首次会话记录时间 <7 天。"
  - "EHR 集成管道：PointClickCare USCDI Connector 在第 4 月完成认证；MatrixCare 合作伙伴集成在第 9 月上线。"
  - "OEM API 管理：专用集成层跨 Tombot、PARO 和 ElliQ schema 规范化遥测数据；第一天提供 CSV/手工导入备用方案。"
  - "HIPAA 合规数据架构：所有居民会话数据存储于 SOC 2 Type II 认证云基础设施，按机构级别隔离数据。"
  - "在第 6 月前聘用临床事务顾问，审查所有文档模板的 CMS 巡查合规性和 FTC 市场宣传纪律。"
  - "在 LeadingAge 年会（11 月）和 AHCA/NCAL（10 月）维持大会存在感，用于管线建设和竞争监测。"

team:
  - role: "CEO/创始人"
    startTiming: "第 0 月"
    rationale: "负责客户发现、OEM 合作伙伴关系和融资；须具备老年生活运营商网络或医疗 SaaS 销售背景，才能触达护理主任买方关系。"
  - role: "CTO/主力工程师"
    startTiming: "第 0 月"
    rationale: "负责平台架构、EHR 集成连接器和 OEM API 管道；拥有 FHIR 和医疗后期急性 EHR 集成经验是必要条件，以满足第 4 月 PointClickCare 认证截止日期。"
  - role: "临床事务顾问（兼职）"
    startTiming: "第 4 月"
    rationale: "审查文档模板的 CMS 巡查合规性和 FTC 健康主张纪律；随着平台疗效报告语言规模化，防范监管风险。"
  - role: "客户成功经理"
    startTiming: "第 3 月"
    rationale: "管理前 20 家机构的高触达入驻；将首次会话记录时间压低至 7 天以内，并将护理主任满意度作为流失的主要预警信号。"
  - role: "创始全栈工程师"
    startTiming: "第 2 月"
    rationale: "与 CTO 并肩推进 EHR 集成和 OEM 遥测管道；在 2026 年秋季发货浪潮前引入第二位工程师，避免核心产品单点故障。"

milestones:
  - horizon: "0–12 个月"
    items:
      - "完成 15 次护理主任买方发现访谈；确认 ≥6 个 $500+/月的付费意愿信号（第 1—2 月）"
      - "与 Tombot 签署 OEM 遥测合作意向书（第 2 月）"
      - "PointClickCare FHIR 概念验证在沙盒中运行（第 2 月）"
      - "MVP 会话排班和疗效记录上线；CSV 导入可用（第 4 月）"
      - "PointClickCare USCDI Connector 认证并在首家试点机构部署（第 4—5 月）"
      - "3 份付费试点合同签署，$500—$800/月，机构正在接收 Tombot 机器人（第 5—6 月）"
      - "Lutheran Foundation 或 FCHN 共创客户试点上线（第 6 月）"
      - "平台服务 10 家付费机构；第一份月度同行基准报告发布（第 8 月）"
      - "MatrixCare 集成上线；PARO 遥测连接器接入（第 10—11 月）"
      - "20 家付费机构；3 家以上运营商的企业多机构合同管道启动（第 12 月）"
  - horizon: "12–24 个月"
    items:
      - "50 家付费机构；首份企业多机构合同签署（5 家以上机构）"
      - "CMS 巡查员就绪文档模板发布，并在至少 1 次 AHCA/NCAL 大会演讲中被引用"
      - "PARO 认证为第二个 OEM 集成合作伙伴"
      - "每月基准数据集覆盖 50 家以上机构；匿名队列报告向研究机构开放"
      - "首批客户队列的净收入留存率超过 110% 经验证"
      - "基于 SOM 至 ARR 轨迹启动 A 轮融资"
  - horizon: "24–36 个月"
    items:
      - "平台服务 150 家机构；ARR 接近研究 SOM 的 $120 万"
      - "音乐疗法和光照疗法活动记录模块作为深耕扩展产品层推出"
      - "与医疗系统或学术研究合作伙伴签署首份数据授权协议"
      - "在加拿大或英国启动国际试点（跟随美国报销先例）"
      - "与 CMS 或 AHCA 就陪伴机器人报销文档标准启动对话"

risks:
  - risk: "Tombot 或 PointClickCare 宣布原生陪伴机器人运营产品，消除独立市场空间。"
    likelihood: Medium
    impact: High
    mitigation: "在第 9 月前取得 OEM 优先合作伙伴地位和 EHR 市场认证；将定位强调为扩大 OEM 和 EHR TAM 的多厂商中立数据层，而非竞争关系；深化基准数据集，形成捆绑功能无法迅速复制的转换成本。"
  - risk: "第 1 年机器人交付量远低于 Tombot 的 2.3 万台预订数，原因是制造延误或订单取消。"
    likelihood: Medium
    impact: High
    mitigation: "实时监测 Tombot 发货公告；若 Tombot 出货量令人失望，将滩头市场切换至 PARO 和 ElliQ 客户群；构建 CSV/手工导入路径，使产品在 OEM API 可用之前也能运转。"
  - risk: "护理主任在 CMS 报销存在前拒绝付费，须单凭护理人工节省来锚定销售。"
    likelihood: Medium
    impact: Medium
    mitigation: "预先构建 CFO ROI 计算器，展示每周节省 2—4 护理人时相对于完全成本护理薪资（$35—$45/小时）的价值；将平台定价设为每周劳动节省额的 <50%，使 ROI 在没有任何报销论点的情况下立即显而易见。"
  - risk: "EHR 集成每家机构需要 4—8 周 IT 服务接入，打破 7 天内入驻的承诺。"
    likelihood: Medium
    impact: Medium
    mitigation: "在签署首个付费试点前运行 FHIR 概念验证；设计 CSV 备用方案，确保文档导出在第一天无需 EHR API 即可工作；通过已批准的 PointClickCare USCDI Connector 应用市场路径降低 IT 审批摩擦。"
  - risk: "若文档模板夸大治疗或临床疗效主张，FTC 执法或 CMS 巡查将产生合规风险。"
    likelihood: Low
    impact: High
    mitigation: "在第 6 月前聘用临床事务顾问审查所有产品语言；将平台定位为运营文档和使用率追踪工具，而非疗效主张工具；参照 PARO 将设备证据与软件市场宣传分开的做法。"

fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$1.5–2.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月资金跑道涵盖：(1) CEO + CTO 创始团队 18 个月薪酬；(2) 第 2 月引进一名创始工程师；(3) 第 3 月招募客户成功经理；(4) 第 4 月起聘用临床事务兼职顾问；(5) PointClickCare USCDI Connector 认证费用和 OEM API 集成成本；(6) LeadingAge 和 AHCA/NCAL 大会参会费用；(7) HIPAA 合规云基础设施（SOC 2 Type II）。目标：第 18 月前达到 20 家付费机构和超过 $15 万 ARR，建立支撑种子轮的 SOM 轨迹和基准数据集。
