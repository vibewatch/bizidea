  fiveForces:
    supplierPower:
      score: 4
      rationale: 创业公司在早期市场依赖机器人 OEM 数据、EHR 写回以及它无法自控的合作伙伴审批流程。
      sourceRefs:
      - 23
      - 24
      - 25
      - 28
      - 40
    buyerPower:
      score: 4
      rationale: 运营商买方集中、预算意识强，若产品不能明显优于手工记录或现有 EHR 工作流，随时可以回退。
      sourceRefs:
      - 13
      - 14
      - 15
      - 23
    threatOfEntrants:
      score: 3
      rationale: 工作流层可以构建，但持久进入需要集成资质、公共项目证据，以及足以在受监管照护环境中显得可信的使用数据积累。
      sourceRefs:
