      - 23
      - 28
      - 57
      - 58
    competitiveRivalry:
      score: 3
      rationale: "竞争真实但分散：硬件厂商、EHR 平台和低价替代品都很活跃，但目前没有明显的中立机器人运营品类领导者。"
      sourceRefs:
      - 23
      - 24
      - 25
      - 28
      - 36
      - 40
  pestle:
  - factor: political
    impact: positive
    point: CMS 正在以奖励更好文档记录和照护者支持的方式扩大痴呆症照护和长期照护的监管力度。
    sourceRefs:
    - 1
    - 2
    - 5
    - 75
  - factor: economic
    impact: positive
    point: 照护服务本身已经很昂贵，当软件能提升使用率或减少文档摩擦时，少量软件支出就容易获得认可。
    sourceRefs:
    - 13
    - 15
    - 17
  - factor: social
    impact: positive
    point: 痴呆症患病率上升和孤独的健康代价，为非药物支持性干预创造了持续需求。
    sourceRefs:
    - 8
    - 9
    - 17
    - 74
  - factor: technological
    impact: positive
    point: 医疗后期互操作标准和合作伙伴生态，使专注型创业公司的 EHR 集成切实可行。
    sourceRefs:
    - 23
    - 24
    - 25
  - factor: legal
    impact: negative
    point: 主张、知情同意和精神类药物文档预期，对任何接触居民疗效数据的产品都设定了较高的合规门槛。
    sourceRefs:
    - 5
    - 19
    - 39
    - 65
  adoptionFrictionMatrix:
  - friction: 除非记录写回到档案，否则员工会将机器人记录视为额外工作。
    severity: high
    affectedBuyer: 护理主任/记忆照护主任
    mitigation: 从一键工作流、可导出摘要和通过合作伙伴批准接口实现的 EHR 写回开始。
    sourceRefs:
    - 13
    - 23
    - 24
    - 25
  - friction: 临床受益证据具有方向性，但并非在每一个买方可能询问的疗效维度上都确定。
    severity: medium
    affectedBuyer: 首席临床官/医疗主任
    mitigation: 首先销售文档、使用率和项目管理价值，同时积累机构专属疗效数据，留待后续主张。
    sourceRefs:
    - 39
    - 63
    - 65
  - friction: OEM 和 EHR 合作伙伴依赖可能拖慢部署。
    severity: high
    affectedBuyer: IT 负责人/创新推动者
    mitigation: 在首发时支持 CSV 或手工导入，仅在灯塔合作伙伴证明价值后深化 API 集成。
    sourceRefs:
    - 23
    - 24
    - 25
    - 28
    - 40
  - friction: 报销目前是间接的。
    severity: high
    affectedBuyer: CFO/区域运营商
    mitigation: 在推销未来付款方提交前，以巡查就绪性、照护者支持报告和更高机器人使用率来锚定 ROI。
    sourceRefs:
    - 1
    - 5
    - 15
    - 50
    - 53
