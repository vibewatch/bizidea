competitors:
- name: Tombot
  stage: scale-up
  wedge: 面向痴呆症和行为健康用户的仿真机器人情感支持动物。
  pricing: 官网采用候补名单优先模式，未公布最终零售价格。
  strength: 庞大候补名单、清晰的痴呆症品牌定位，以及可见的医疗投资方背书。
  weaknessVsUs: 硬件优先思路；没有中立的排班、使用率分析或 EHR 级文档层。
  sourceRefs:
  - 28
  - 31
  - 33
- name: PARO
  stage: incumbent
  wedge: 以医疗器械定位、拥有长期研究历史的治疗性机器海豹。
  pricing: 机构报价和经销商销售模式，无自助式公开定价。
  strength: AccessGUDID 登记的治疗适应症和丰富的研究论文储备，赋予其临床可信度。
  weaknessVsUs: 单设备治疗产品，工作流、机队管理或文档软件能力有限。
  sourceRefs:
  - 36
  - 37
  - 39
- name: ElliQ
  stage: scale-up
  wedge: 具备公共项目分销渠道和直接订阅定价的 AI 陪伴与健康互动机器人。
  pricing: 每月 $39—$59 会员费，州级项目可补贴或全额覆盖。
  strength: 强劲的公共部门证据基础、每日参与数据和面向照护者的功能。
  weaknessVsUs: 主要面向居家和单用户场景；并非专为共享机队排班或老年生活 EHR 文档而设计。
  sourceRefs:
  - 40
  - 41
  - 46
  - 50
  - 53
- name: PointClickCare
  stage: incumbent
  wedge: 医疗后期和老年照护 EHR 及互操作平台。
  pricing: FHIR API 接入 $65/应用/机构/月；更宽泛的企业合同另行定价。
  strength: 已安装基础、居民记录所有权以及开发者和市场化动作。
  weaknessVsUs: 通用互操作和记录基础设施，而非机器人专属干预工作流或基准。
  sourceRefs:
  - 23
- name: MatrixCare
  stage: incumbent
  wedge: 具备合作伙伴集成定位的老年生活和专业护理软件。
  pricing: 定制企业和合作伙伴合同定价。
  strength: 相关照护场景覆盖及明确的互操作和合作伙伴语言。
  weaknessVsUs: 未定位为机器人项目系统或付款方文档基准层。
  sourceRefs:
  - 24
  - 25
  - 26
  - 27
regulatoryTechnicalConstraints:
- point: 长期照护巡查指南现已将精神类药物和化学约束监督纳入更严格的文档框架，因此产品必须为非药物干预和疗效保留居民专属证据。
  sourceRefs:
  - 2
  - 5
  - 75
- point: 任何关于减少躁动、孤独或临床症状的主张，都需要在 FTC 健康主张规则下进行实质性支撑并保持营销纪律。
  sourceRefs:
  - 19
  - 39
  - 65
- point: "EHR 写回可行但并非免费：PointClickCare 按应用按机构对 FHIR 接入收费，在位合作伙伴生态系统可能限制部署速度。"
  sourceRefs:
  - 23
  - 24
  - 25
- point: 机器人硬件数据仍然分散于候补名单、会员制和 OEM 专属项目，尚未形成标准的临床事件 schema。
  sourceRefs:
  - 28
  - 40
  - 41
validationSignals:
- point: Tombot 称在首批客户发货前已有超过 2.3 万个预订和候补名单客户。
  sourceRefs:
  - 33
- point: NYSOFA 第三年 ElliQ 项目覆盖 834 名老年人，94% 反映孤独感减少、97% 反映整体健康改善。
  sourceRefs:
  - 50
- point: 华盛顿 Medicaid 对 ElliQ 的覆盖表明，当项目形态类似支持性照护而非电子设备零售时，公共付款方可以资助陪伴技术部署。
  sourceRefs:
  - 46
  - 53
  - 54
- point: 老年生活机构已将分析、EHR、护理点文档和防走失管理列为近期技术投资的优先方向。
  sourceRefs:
  - 13
  - 14
openQuestions:
- 未来 12 个月内实际接收陪伴机器人的 100—300 张床位辅助生活运营商究竟有多少，与仅停留在候补名单上的相比？
- 机器人 OEM 在早期部署阶段会开放可靠的会话遥测，还是只提供手工导出和 CSV？
- "对运营商和公共项目而言，哪些疗效指标最重要：孤独感、参与度、躁动、照护者负担，还是巡查就绪性？"
- 产品能否在不触发其他医疗后期工具所面临的漫长企业集成周期的前提下，获取足够的 EHR 上下文？
