scenarios:
  downside:
    description: OEM access and EHR deployment take longer than planned, dropping blended ARR to roughly $7.2K, slowing the ramp to 95 facilities by Y3 end, and compressing margin to 70%.
    y3RevenueK: 487.2
    y3EbitdaK: -762.3
    cashLowPointK: -19.1
    keyAssumptionChanges:
    - Blended annual ARPU falls from $8.4K to $7.2K
    - Facility ramp ends Y3 at 95 instead of 130 because close cycles slip roughly one quarter
    - Gross margin stays at 70% instead of 74% because onboarding remains labor heavier
  base:
    description: Founder-led sales, Tombot-triggered urgency, and lightweight EHR deployments grow the business from 20 year-one facilities to 130 facilities by Y3 end at roughly $8.4K blended ARR.
    y3RevenueK: 772.8
    y3EbitdaK: -530.7
    cashLowPointK: 322.4
    keyAssumptionChanges:
    - Uses assumptions A2-A23 as modeled
    - Most revenue comes from facility subscriptions, with only modest enterprise analytics uplift embedded in ARPU
    - Hiring stays lean and milestone-gated through Y3
  upside:
    description: One OEM partnership and one multi-site operator channel add lift end-state adoption to 150 facilities, blended ARR to roughly $9.0K, and gross margin to 76%.
    y3RevenueK: 996.0
    y3EbitdaK: -346.4
    cashLowPointK: 609.5
    keyAssumptionChanges:
    - Blended annual ARPU rises from $8.4K to $9.0K through enterprise and add-on mix
    - Customer ramp ends Y3 at 150 facilities instead of 130
    - Gross margin improves to 76% as integrations become more repeatable
