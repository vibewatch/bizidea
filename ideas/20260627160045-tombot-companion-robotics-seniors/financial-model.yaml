modelDiagram:
  title: care robot ops unit economics flow
  mermaid: |-
    flowchart LR
      Shipments[Robot shipment confirmations] --> Pilots[Facility pilots]
      Pilots --> Facilities[Paying facilities]
      Facilities --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[74% gross profit]
      GrossProfit --> Cash[Runway to 50-facility proof]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by a 20 to 50 to 130 facility ramp at roughly $8.4K blended ARR, with most wins coming from shipment-triggered single-site sales before multi-site expansion matters.
- checkName: Must go right
  finding: The model depends on PointClickCare and OEM integrations staying lightweight enough that a ~$5.8K CAC still pays back in about 11 months on a low-ACV subscription.
- checkName: Model breaks if
  finding: If ARPU compresses toward $7.2K and close cycles slip by a quarter, the downside case pushes cash slightly negative before Y3 ends.
- checkName: Next-round proof
  finding: Hitting 50 paying facilities, one 5+ site operator contract, and retention proof by Q4Y2 is the operating milestone that best supports the next financing.
sanityChecks:
  ruleOf40: Y3 growth 158.5% + EBITDA margin -68.7% = 89.8%
  burnMultiple: Y2 burn multiple 2.95x improving to Y3 burn multiple 0.79x on roughly $252K and $672K of net new ARR.
  revenuePerFte: $119K Y3 using Q4Y3 6.5 FTE (below the ~$150-250K early vertical SaaS comfort zone, so expansion ARPU matters)
  flags:
  - The base case already assumes the company reaches 20 facilities in Year 1 and 50 by Q4Y2, so any delay in Tombot shipments or PointClickCare deployment would pressure the entire model quickly.
  - Revenue per FTE is still light by Y3, which means the venture case depends on later enterprise dashboards, benchmark data, or therapy-module expansion lifting ARPU beyond the base-case subscription alone.
  - Cash stays positive on a $2.3M pre-seed only because hiring remains unusually lean; pulling forward a second seller or a full regulatory team before operator proof would likely force an earlier round.
