- id: A15
  name: G&A loaded cash compensation
  value: '80.0'
  unit: usdK/year
  source: '[BP fundingAsk and SOC 2 / compliance needs imply fractional finance-ops support by Year 3, startup-finance heuristic]'
- id: A16
  name: Hiring sequence
  value: M1 founder+CTO; M2 +1 engineer; M3 +1 customer success; M4 +0.2 clinical advisor; M10 +1 seller; M18 advisor to 0.3 FTE; M24 +0.5 product/ops; M30 advisor to 0.5 FTE and +0.5 G&A
  unit: schedule
  source: '[BP team.startTiming, strategicChoices.sequencingRationale, milestones, and fundingAsk use-of-funds summary]'
- id: A17
  name: Non-payroll opex ramp
  value: Y1 S&M/R&D/G&A non-payroll = 24.0/105.0/70.5; Y2 = 48.0/132.0/84.0; Y3 = 60.0/144.0/96.0
  unit: usdK/year
  source: '[BP fundingAsk lists conference spend, PointClickCare certification, OEM integration, HIPAA/SOC2 infrastructure, and compliance costs; startup-finance heuristic used to phase them]'
- id: A18
  name: Starting cash after pre-seed close
  value: '2300.0'
  unit: usdK
  source: '[BP fundingAsk targetFundingRangeUsd $1.5-2.5M; model uses $2.3M to reach Q4Y2 proof plus a 6-month buffer]'
- id: A19
  name: Monthly logo churn for unit economics
  value: '1.5'
  unit: percent
  source: '[BP operatingAssumptions target benchmark-driven retention and >110% NRR; model uses a conservative low-teens annual logo-churn equivalent for an early vertical SaaS product]'
- id: A20
  name: Blended CAC per facility
  value: '5.8'
  unit: usdK
  source: '[BP gtm.funnelTargets show 25-35% outreach-to-qualified-pilot and 50%+ pilot-to-paid conversion, with warm OEM/operator channels from Tombot investors; startup-finance heuristic translates that into sub-$6K CAC]'
- id: A21
  name: Revenue recognition timing
  value: Revenue starts in signed month at $0.7K MRR per active facility
  unit: policy
  source: '[BP gtm.pricing and investorMemo.initialContract describe monthly pilot contracts; model recognizes subscription revenue in the live month so revenue reconciles directly to customers × ARPU]'
- id: A22
  name: Funding ask allocation mix
  value: 39% Engineering / 25% GTM / 13% G&A / 23% Buffer
  unit: mix
  source: '[Derived from modeled spend mix through the Q4Y2 milestone plus 6 months of buffer]'
- id: A23
  name: Cash movement simplification
  value: No debt, capex, or working-capital swing modeled; cash moves by EBITDA
  unit: policy
  source: '[Startup-finance heuristic for a pre-seed planning model where software subscriptions dominate and capital intensity is low]'
