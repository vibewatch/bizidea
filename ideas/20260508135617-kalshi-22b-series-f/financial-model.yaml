slug: event-contract-control-plane
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-08] model begins the month after the business plan date.'
- id: A2
  name: Starting cash at M1
  value: $2.3M
  unit: USD
  source: "[BP fundingAsk targetFundingRangeUsd $2–4M] uses a low-end/midpoint pre-seed close at model start to match the stated 18-month runway target."
- id: A3
  name: Customer metric normalization
  value: 1.0 customer = one paying production-equivalent governed entity; paid design partners are modeled as partial customer equivalents until production conversion.
  unit: definition
  source: "[BP milestones 0–12 months] + startup-finance heuristic so pilot, implementation, and annual contracts reconcile to one ARPU-based P&L."
- id: A4
  name: Blended annual ARPU
  value: $240K
  unit: USD/customer/year
  source: '[research market.som] cites about $200K ACV; [BP investorMemo initialContract] says production contracts should reach roughly $150K-$250K annual SaaS, so the model uses $240K including light usage and module uplift.'
- id: A5
  name: Target gross margin
  value: 70%
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct].'
- id: A6
  name: Monthly customer churn
  value: 1.5%
  unit: pct/month
  source: '[BP risks single-venue dependency + early-stage product] startup-finance heuristic for sticky enterprise workflow software with concentrated market risk.'
- id: A7
  name: Gross new-customer ramp Y1
  value: M1-M12 = 0, 0, 0.5, 0, 0.5, 0, 0.5, 0, 0.6, 0.4, 0.2, 0.2
  unit: new customers/month
  source: "[BP gtm funnelTargets] + [BP milestones 0–12 months] paced to reach 2-3 paid design partners and at least 2 pilot-to-production conversions in year 1."
- id: A8
  name: Gross new-customer ramp Y2
  value: M13-M24 = 0.3, 0.3, 0.4, 0.4, 0.4, 0.4, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5
  unit: new customers/month
  source: "[BP milestones 12–24 months] paced to end year 2 at about 7 production-equivalent customers inside the stated 6-8 target range."
- id: A9
  name: Gross new-customer ramp Y3
  value: M25-M36 = 0.4, 0.4, 0.4, 0.4, 0.5, 0.5, 0.5, 0.6, 0.6, 0.6, 0.6, 0.6
  unit: new customers/month
  source: "[BP milestones 24–36 months] + [research market.som] paced to finish year 3 near 12 customers and roughly $2.2M-$2.4M annual revenue."
- id: A10
  name: Founder / CEO loaded compensation
  value: $150K
  unit: USD/year
  source: '[BP team Founder / CEO] startup-finance heuristic for a modest founder cash salary plus payroll tax and benefits load.'
- id: A11
  name: Engineering loaded compensation
  value: $210K
  unit: USD/year
  source: '[BP team Founding eng] startup-finance heuristic for senior integration and rules-engine talent in U.S. fintech software.'
- id: A12
  name: Product/compliance lead loaded compensation
  value: $192K
  unit: USD/year
  source: '[BP team Product/compliance lead] startup-finance heuristic for a domain-heavy product/regulatory hire.'
- id: A13
  name: Solutions engineer loaded compensation
  value: $168K
  unit: USD/year
  source: '[BP team Solutions engineer] startup-finance heuristic for implementation-heavy enterprise fintech support.'
- id: A14
  name: Sales / GTM loaded compensation
  value: $210K
  unit: USD/year
  source: '[BP team Account executive or GTM lead] startup-finance heuristic for the first enterprise seller including payroll load; variable comp is held inside S&M spend.'
- id: A15
  name: G&A / ops loaded compensation
  value: $132K
  unit: USD/year
  source: '[BP operations + team growth] startup-finance heuristic for part-finance, part-ops support once customer count passes 6 entities.'
- id: A16
  name: Hiring timeline
  value: M1 founder and founding engineer; M4 product/compliance; M7 solutions engineer; M13 first GTM hire; M16 second engineer; M22 second solutions engineer; M25 G&A / ops; M28 second GTM hire; M31 third engineer
  unit: timeline
  source: '[BP team] first five hires follow the plan directly; later hires are conservative extensions needed to support the 12-customer year-3 milestone.'
- id: A17
  name: Non-payroll sales & marketing spend ramp
  value: $5K/mo in M1-M6, $8K/mo in M7-M12, $12K/mo in M13-M18, $15K/mo in M19-M24, $18K/mo in M25-M30, $20K/mo in M31-M36
  unit: USD/month
  source: '[BP gtm channels + referral experiments] heuristic for founder-led outbound, travel, partner development, and light commercial content without scaled paid acquisition.'
- id: A18
  name: Non-payroll R&D tools spend ramp
  value: $10K/mo in Y1, $12K/mo in Y2, $14K/mo in Y3
  unit: USD/month
  source: '[BP product + operations] heuristic for cloud, security, developer tooling, market-data normalization, and test environments outside COGS.'
- id: A19
  name: Non-payroll G&A spend ramp
  value: $8K/mo in Y1, $10K/mo in Y2, $12K/mo in Y3
  unit: USD/month
  source: '[BP operations + regulatoryTechnicalConstraints] heuristic for legal, accounting, insurance, audit, and admin software.'
- id: A20
  name: Funding ask sizing
  value: $2.3M pre-seed
  unit: USD
  source: "[BP fundingAsk] + [model calc] sized to reach the 12–24 month milestone of 6-8 production customers, one referral channel, and first adjacent-venue proof with about 6 months of cash buffer."
- id: A21
  name: CAC convention
  value: $86.9K fully loaded CAC
  unit: USD/new customer
  source: '[Model calc] trailing 18-month sales & marketing spend of about $790.5K divided by 9.1 gross new customer equivalents in M19-M36.'
