scenarios:
  downside:
    description: Slower institutional adoption, lower ACV, and slightly higher churn keep the company below the year-3 SOM case and force a raise before breakeven.
    y3RevenueK: 1520.2
    y3EbitdaK: -1208.7
    cashLowPointK: -639.5
    keyAssumptionChanges:
    - ARPU falls to $216K annual.
    - Gross new-customer ramp runs 20% below base.
    - Monthly churn rises to 2.0%.
    - Gross margin compresses to 68%.
  base:
    description: Founder-led sales convert a small but real beachhead into about 12 production-equivalent customers by year 3 while keeping hiring disciplined.
    y3RevenueK: 2234.3
    y3EbitdaK: -678.5
    cashLowPointK: 226.1
    keyAssumptionChanges:
    - ARPU stays at $240K blended annualized revenue per production-equivalent customer.
    - Customer growth follows the milestone-based ramp to about 7 customers by Q4Y2 and 11.6 by Q4Y3.
    - Gross margin stays at the 70% business-plan target.
    - Hiring adds commercial and delivery capacity only after the first two production wins.
  upside:
    description: Broker-led urgency and faster conversions lift logo growth and ACV enough to approach breakeven by the end of year 3.
    y3RevenueK: 2926.9
    y3EbitdaK: -135.1
    cashLowPointK: 1063.5
    keyAssumptionChanges:
    - ARPU rises to $258K annual from desk and module expansion.
    - Gross new-customer ramp runs 15% above base from partner-sourced deals.
    - Monthly churn improves to 1.0%.
    - Gross margin expands to 72% as implementations standardize.
