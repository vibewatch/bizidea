modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by founder-led conversion of 2 design-partner wins in year 1 into roughly 7 production-equivalent customers by Q4Y2 and 11.6 by Q4Y3 at $240K blended ARPU.
- checkName: Must go right
  finding: The company must prove that COO/CCO buyers will fund a standalone control layer early enough to justify the first GTM hire in year 2.
- checkName: Model breaks if
  finding: If sales cycles slip about 15% versus plan, the model loses about $335K of year-3 revenue and cash turns negative before the next round.
- checkName: Next-round proof
  finding: A credible seed story is 6-8 production customers plus a broker or consultant referral channel and first adjacent-venue rules pilot before cash falls below roughly $0.55M.
sanityChecks:
  ruleOf40: Y3 growth 89% + EBITDA margin -30% = 59%
  burnMultiple: Y3 burn multiple 0.64x = $678.5K net burn / $1055.2K net new revenue.
  revenuePerFte: "$235K Y3 using about 9.5 average FTE (benchmark roughly $200–400K SaaS)."
  flags:
  - The base case still ends year 3 EBITDA-negative, so the company likely needs a seed round before self-funding growth.
  - Customer counts are modeled as production-equivalent revenue units because paid pilots and implementation-heavy first contracts mix services with SaaS early on.
  - The market remains concentrated around one venue, so regulatory or platform changes can impair both demand and retention faster than the P&L alone shows.
