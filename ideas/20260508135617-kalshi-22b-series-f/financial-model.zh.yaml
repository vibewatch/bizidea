scenarios:
  downside:
    description: 如果机构采用更慢、ACV 更低、流失率略高，公司就会低于第 3 年 SOM 情景，并在盈亏平衡前被迫再融资。
    y3RevenueK: 1520.2
    y3EbitdaK: -1208.7
    cashLowPointK: -639.5
    keyAssumptionChanges:
    - ARPU 降至年化 $216K。
    - 新增客户爬坡比基准情景低 20%。
    - 月度流失率升至 2.0%。
    - 毛利率收缩至 68%。
  base:
    description: 在招聘节奏保持克制的前提下，创始人主导销售把一个虽小但真实存在的滩头市场，在第 3 年转成约 12 个等效生产客户。
    y3RevenueK: 2234.3
    y3EbitdaK: -678.5
    cashLowPointK: 226.1
    keyAssumptionChanges:
    - ARPU 维持在每个等效生产客户年化 $240K 的综合收入水平。
    - 客户增长按里程碑节奏爬坡，到 Q4Y2 约 7 个客户，Q4Y3 约 11.6 个。
    - 毛利率维持在商业计划中的 70% 目标。
    - 只有在拿下前两个生产客户后，才扩充商业和交付能力。
  upside:
    description: 如果券商驱动的紧迫性更强、转化更快，客户数增长和 ACV 就足以把公司在第 3 年末推近盈亏平衡。
    y3RevenueK: 2926.9
    y3EbitdaK: -135.1
    cashLowPointK: 1063.5
    keyAssumptionChanges:
    - 由于交易台扩张和模块增购，ARPU 升至年化 $258K。
    - 由于伙伴来源交易，新增客户爬坡比基准高 15%。
    - 月度流失率改善到 1.0%。
    - 随着实施流程标准化，毛利率提升到 72%。
