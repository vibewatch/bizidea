  upsideCase: 把第二个 GTM 招聘推迟到 Q3Y3
  y3RevenueImpactK: 0.0
  cashImpactK: -315.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      TargetAccounts[目标账户] --> PaidPilots[付费试点]
      PaidPilots --> ProductionCustomers[生产客户]
      ProductionCustomers --> SubscriptionRevenue[订阅收入]
      SubscriptionRevenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下的收入，来自创始人在第 1 年拿下的 2 个共创客户，按 $240K 综合 ARPU 转化为 Q4Y2 约 7 个等效生产客户、Q4Y3 约 11.6 个。
- checkName: 必须跑通的前提
  finding: 公司必须尽快证明 COO/CCO 这类买家愿意为独立控制层买单，才能支撑第 2 年的首个 GTM 招聘。
- checkName: 模型失效条件
  finding: 如果销售周期比计划晚约 15%，模型会损失约 $335K 的第 3 年收入，并在下一轮融资前出现现金转负。
- checkName: 下一轮融资证明点
  finding: 一个可信的种子轮故事是：在现金跌破约 $0.55M 之前，做到 6-8 个生产客户、1 条券商或顾问转介渠道，以及首个相邻交易场所规则试点。
sanityChecks:
  ruleOf40: Y3 增长 89% + EBITDA margin -30% = 59%
  burnMultiple: Y3 burn multiple 0.64x = $678.5K net burn / $1055.2K net new revenue.
  revenuePerFte: 第 3 年人均收入约 $235K，按平均约 9.5 个 FTE 计算（SaaS 基准约为 $200–400K）。
  flags:
  - 基准情景下，第 3 年末 EBITDA 仍为负，因此公司大概率还需要一轮 seed 融资，才能走到自我供血增长。
  - 客户数之所以按“等效生产收入单位”建模，是因为付费试点和实施较重的首批合同在早期会把服务收入和 SaaS 收入混在一起。
  - 市场仍然围绕一个交易场所高度集中，因此监管或平台变化对需求和留存的打击，可能会比 P&L 里显示出来的更快。
