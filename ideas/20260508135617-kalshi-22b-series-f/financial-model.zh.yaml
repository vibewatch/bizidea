slug: event-contract-control-plane
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-08] 模型从商业计划日期后的下一个月开始。'
- id: A2
  name: M1 期初现金
  value: $2.3M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M] 采用模型起点时点上偏低/中位的 pre-seed 到账额，以匹配所述 18 个月现金跑道目标。'
- id: A3
  name: 客户指标口径统一
  value: 1.0 客户 = one paying 产品ion-equivalent governed entity; paid 共创客户 are modeled as partial 客户 equivalents until 产品ion conversion.
  unit: definition
  source: '[BP milestones 0–12 months] + 创业财务经验法则，用来把试点、实施和年合同统一到一套基于 ARPU 的 P&L 口径里。'
- id: A4
  name: 综合年 ARPU
  value: $240K
  unit: USD/customer/year
  source: '[research market.som] 提到约 $200K ACV；[BP investorMemo initialContract] 则指出生产合同应达到约 $150K-$250K 年度 SaaS，因此模型采用 $240K，并计入轻度用量和模块增购。'
- id: A5
  name: 目标毛利率
  value: 70%
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct]。'
- id: A6
  name: 月度客户流失率
  value: 1.5%
  unit: pct/month
  source: '[BP risks single-venue dependency + early-stage product]——针对市场集中风险较高、但粘性较强的企业工作流软件采用创业财务经验法则。'
- id: A7
  name: 第 1 年新增客户爬坡
  value: M1-M12 = 0, 0, 0.5, 0, 0.5, 0, 0.5, 0, 0.6, 0.4, 0.2, 0.2
  unit: new customers/month
  source: '[BP gtm funnelTargets] + [BP milestones 0–12 months]——按这个节奏，第 1 年可达到 2-3 个付费共创客户，以及至少 2 个从试点转生产的客户。'
- id: A8
  name: 第 2 年新增客户爬坡
  value: M13-M24 = 0.3, 0.3, 0.4, 0.4, 0.4, 0.4, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5
  unit: new customers/month
  source: '[BP milestones 12–24 months]——按这个节奏，第 2 年末可达到约 7 个等效生产客户，落在所述 6-8 个目标区间内。'
- id: A9
  name: 第 3 年新增客户爬坡
  value: M25-M36 = 0.4, 0.4, 0.4, 0.4, 0.5, 0.5, 0.5, 0.6, 0.6, 0.6, 0.6, 0.6
  unit: new customers/month
  source: '[BP milestones 24–36 months] + [research market.som]——按这个节奏，第 3 年末可接近 12 个客户和约 $2.2M-$2.4M 的年收入。'
- id: A10
  name: 创始人 / CEO 全成本薪酬
  value: $150K
  unit: USD/year
  source: '[BP team Founder / CEO]——按创业财务经验法则，采用相对克制的创始人现金薪资，并计入工资税和福利负担。'
- id: A11
  name: 工程岗位全成本薪酬
  value: $210K
  unit: USD/year
  source: '[BP team Founding eng]——按美国金融科技软件里资深集成与规则引擎人才的创业财务经验法则估算。'
- id: A12
  name: 产品/合规负责人全成本薪酬
  value: $192K
  unit: USD/year
  source: '[BP team Product/compliance lead]——按领域要求较重的产品/监管岗位招聘的创业财务经验法则估算。'
- id: A13
  name: 解决方案工程师全成本薪酬
  value: $168K
  unit: USD/year
  source: '[BP team Solutions engineer]——按实施负担较重的企业金融科技支持岗位的创业财务经验法则估算。'
- id: A14
  name: 销售 / GTM 全成本薪酬
  value: $210K
  unit: USD/year
  source: '[BP team Account executive or GTM lead]——按首位企业销售的创业财务经验法则估算，并计入薪酬负担；浮动薪酬并入 S&M 开支。'
- id: A15
  name: 行政与运营全成本薪酬
  value: $132K
  unit: USD/year
  source: '[BP operations + team growth]——按客户数超过 6 个实体后所需的半财务、半运营支持岗位采用创业财务经验法则估算。'
- id: A16
  name: 招聘时间表
  value: M1 founder 和 founding engineer; M4 产品/合规; M7 solutions engineer; M13 首个 GTM hire; M16 第二个 engineer; M22 第二个 solutions engineer; M25 G&A / ops; M28 第二个 GTM hire; M31 第三个 engineer
  unit: timeline
  source: '[BP team] 前五个招聘直接按计划执行；后续招聘是为支撑第 3 年 12 客户里程碑所需的保守延展。'
- id: A17
  name: 非薪酬销售与市场费用爬坡
  value: $5K/mo in M1-M6, $8K/mo in M7-M12, $12K/mo in M13-M18, $15K/mo in M19-M24, $18K/mo in M25-M30, $20K/mo in M31-M36
  unit: USD/month
  source: '[BP gtm channels + referral experiments]——适用于创始人主导外呼、差旅、伙伴拓展和轻量商业内容、且不依赖规模化付费获客的经验法则。'
- id: A18
  name: 非薪酬研发工具费用爬坡
  value: $10K/mo in Y1, $12K/mo in Y2, $14K/mo in Y3
  unit: USD/month
  source: '[BP product + operations]——用于 COGS 之外的云、 安全、开发者工具、市场数据标准化和测试环境开支的经验法则。'
- id: A19
  name: 非薪酬行政管理费用爬坡
  value: $8K/mo in Y1, $10K/mo in Y2, $12K/mo in Y3
  unit: USD/month
  source: '[BP operations + regulatoryTechnicalConstraints]——用于法务、会计、保险、审计和行政软件开支的经验法则。'
- id: A20
  name: 融资需求规模
  value: $2.3M pre-seed
  unit: USD
  source: '[BP fundingAsk] + [model calc]——融资规模按 12–24 个月里程碑来定：达到 6-8 个生产客户、1 条转介渠道、首个相邻交易场所验证，并留约 6 个月现金缓冲。'
- id: A21
  name: CAC 口径
  value: 全成本 CAC 为 $86.9K
  unit: USD/new customer
  source: '[Model calc]——取过去 18 个月约 $790.5K 的销售与市场费用，除以 M19-M36 期间 9.1 个新增客户等效值。'
