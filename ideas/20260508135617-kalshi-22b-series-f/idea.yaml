topRisks:
  - name: Regulatory perimeter shrinks
    description: If regulators or states materially narrow allowed contracts, the initial market could grow slower than expected.
    mitigation: Focus first on clearly permitted institutional use cases and build a policy engine portable to adjacent regulated event and micro-derivative products.
  - name: Platform dependency on Kalshi
    description: Heavy reliance on one venue could make the company vulnerable to API, pricing, or distribution changes.
    mitigation: Integrate through broker and OMS workflows early so the product remains valuable wherever event contracts are distributed.
  - name: Institutions may build in-house
    description: Large funds could try to extend existing risk systems instead of buying a new vendor.
    mitigation: Win mid-market design partners first, productize the long tail of contract taxonomy and audit workflows, and prove faster approval cycles than internal builds.
