differentiator: >-
  Most risk tools assume fixed asset classes, while generic compliance software cannot reason about contract-specific event triggers, settlement logic, or jurisdictional ambiguity. This startup's wedge is a contract taxonomy and policy engine purpose-built for event markets, with approvals and reconciliation wired directly into institutional trading workflows. As it sees more contracts, exception patterns, and governance decisions, it builds a proprietary rules and audit dataset that gets harder for internal teams to replicate.
