problem: >-
  U.S. macro funds and prop shops can now get enough liquidity to care about event contracts, but their compliance and risk systems do not know how to classify, approve, or monitor them. Each new strategy turns into bespoke legal review, spreadsheet limits, and manual post-trade reconciliation because the instruments sit awkwardly between derivatives infrastructure and gambling-style regulatory scrutiny. Once block trading and broker connectivity arrive, that ad hoc process breaks under real position size and audit pressure.
targetUser:
  primary: Head of Risk, COO, or Chief Compliance Officer at a U.S. macro hedge fund or prop shop piloting event-contract trading
  secondary: Head of product or electronic trading at a broker integrating Kalshi for institutional clients
  buyer: COO or Chief Compliance Officer at a U.S. macro hedge fund or prop shop
startupThesis:
  nonObviousInsight: >-
    The scarce asset is no longer retail liquidity or price discovery; Kalshi is using new capital to solve that. The new bottleneck is institutional operability: firms need a system that turns each event contract into machine-readable permissions, limits, and audit evidence before they can scale exposure.
  beachhead: U.S. macro hedge funds and proprietary trading firms with listed-derivatives infrastructure evaluating their first production Kalshi deployment
  wedge: Pre-trade policy engine and post-trade reconciliation layer that maps event contracts to approved strategies, jurisdiction rules, and firm-specific exposure limits
  whyNowCatalyst: >-
    Kalshi's 800% institutional volume surge and planned block-trading and broker-integration rollout mean funds are moving from experimentation to production exactly as regulatory scrutiny intensifies.
  ventureScalePath: >-
    Start as the control plane for event contracts, then expand into risk, accounting, and compliance infrastructure for new regulated micro-derivatives and alternative trading venues globally.
solution: >-
  Build an event-contract control plane that sits between Kalshi, broker pipes, and a fund's existing OMS or internal execution stack. The product ingests contract metadata, tags each market to approved strategy buckets, enforces pre-trade restrictions by desk, trader, jurisdiction, and size, and creates a clean audit trail for compliance committees. Post-trade, it normalizes fills into fund-level exposure, scenario, and reconciliation views so operations teams can close books without bespoke scripts. A reporting layer generates policy exceptions, counsel-ready review packs, and board-level summaries that make event-contract programs defensible inside institutional governance. Over time, the same data model can power portfolio analytics and capital allocation across other alternative contract types.
goToMarketSeed:
  firstCustomer: 10-100 person U.S. macro hedge fund with an internal execution stack and a 2-10 person compliance team preparing its first Kalshi pilot
  buyingTrigger: A trading desk requests live access after a new broker integration or block-trading workflow becomes available and compliance refuses to approve manual controls
  currentAlternative: Manual legal review plus spreadsheets, internal scripts, and generic OMS notes
  switchingReason: >-
    The control plane removes weeks of bespoke policy design and gives the fund live approvals, exceptions, and reconciliation without replacing its existing execution stack.
  pricingHypothesis: Annual SaaS platform fee per fund entity plus usage tiers based on connected desks and monthly event-contract volume
