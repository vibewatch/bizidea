slug: event-contract-control-plane
date: '2026-05-08'
executiveSummary: 事件合约交易正在从探索性使用跨进机构生产工作流，但审批、监控和月末结账流程，今天仍主要靠法律备忘录、表格和内部脚本在撑。这家公司卖的是一层控制平面，面向正准备首次实盘部署 Kalshi 的美国宏观对冲基金和自营交易公司；这些客户在合规批准交易前，必须先拿到机器可读的权限、限额和审计证据。产品一开始故意切得很窄：只做 Kalshi 事件合约的交易前规则执行和交易后对账，不去替代 OMS、执行系统或大型监控套件。它的 GTM 打法围绕一个明确触发点展开：当基金开启实体开户、Advanced API 或 FIX 接入、RFQ 或券商连接时，COO 或 CCO 要么把控制流程正式化，要么就只能阻止上线。因此，定价应从六位数年费 SaaS 订阅加实施费起步，因为买家在为治理和运营风险下降买单，而不是为散户式订单流买单。最强的证据来自交易场所势能、美国流动性集中、机构工作流基础模块和清晰可见的监管推力；最大的缺口则是，真正处在近期活跃试点中的基金到底有多少，而不是只是在旁边关注这个赛道。如果这个客户池很浅，公司就该保持精干，把规则引擎产品化后迁移到相邻的受监管微型衍生品工作流，而不是硬押一个纯 Kalshi 的结局。
problem:
- 在评估实盘事件合约交易的基金，今天依然依赖人工法律审查、表格权限和邮件审批，因为既有风控与合规栈并不能很好地给交易场所特定合约做分类和控制。
- 随着 Kalshi 增加 RFQ、券商、子账户和结算工作流，面对更大的仓位规模、月末结账要求和监管审视，人工控制会迅速变得脆弱。
solution:
- 交付一层控制平面，把 Kalshi 的市场元数据转成机构自定义的策略桶、交易员权限、司法辖区规则和交易前敞口限额。
- 把成交、持仓和结算标准化成对账与审计输出，让合规和运营团队能更快批准上线，也能在不写定制脚本的情况下完成结账。
whyWeWin:
- 产品直接瞄准拦住生产落地的真正瓶颈——规则审批和对账——而既有厂商更多盯着交易场所接入、监控告警或通用合规流程。
- 一套可重复使用的合约分类体系，加上不断积累的例外处理和治理数据，会随着新增上市合约、客户规则决策和接入交易台而持续升值。
strategicChoices:
  beachhead: 员工规模 10-100 人、拥有内部执行栈和小型合规团队、正准备首次生产级 Kalshi 上线的美国宏观对冲基金和自营交易公司。
  wedgeRationale: 这批客户痛点够急，技术成熟度也足够高，能快速集成，而且预算买家就是 COO 或 CCO；如果更早卖给券商或大型多资产在位企业，只会在产品还没证明能更快拿到审批前，就把销售周期拉长。
  sequencingRationale: 先围绕一个占主导地位的美国交易场所做元数据接入、规则配置和对账；在客户开户节点由创始人亲自打单；等到两家基金进入生产后，再补券商和 OMS 连接器，因为只有核心审批工作流先被验证，集成和渠道合作才真正有意义。
  notYet:
  - 完整替代交易监控系统或做市场滥用告警
  - 散户或投顾工作流
  - 在可迁移规则模型未被验证前就扩张到美国以外的交易场所
  - 超出事件合约治理和结账范围的宽泛组合分析
market:
  tam: 估算 TAM 为 $72.0M：按约 400 家以美国为主的机构实体、每家约 $180k 的综合 ACV 计算。
  sam: 估算 SAM 为 $27.0M：按约 150 家近期正在评估实盘事件合约工作流的美国基金、自营交易公司和券商计算。
  som: 第 3 年 SOM 估算为 $2.4M：按 12 家客户、每家约 $200k ACV，并通过实施较重的共创客户销售节奏来计算。
  segments:
  - 正在试点事件合约交易的美国宏观对冲基金和自营交易公司
  - 为机构客户增加 Kalshi 连接能力的券商和市场接入服务商
  buyingProcess: 这个问题通常由 COO、CCO 或风险负责人来负责，因为触发点是治理和可审计性，而不只是下单本身。预算最可能在实体开户、API 或 FIX 激活、第一次 RFQ 或类大宗交易流程上线时释放——也就是人工控制已经不能再被接受的时候。
product:
  mvp: MVP 要覆盖 Kalshi 合约接入、合约到策略的分类体系、交易台和交易员权限规则、司法辖区与类别限制、交易前审批、例外日志以及带结算语义的对账导出。它应该接进客户既有的内部执行工作流，而不是替换掉它们。
  sixMonth: 交付一个生产级 Kalshi 连接器、规则控制台、例外队列和对账模块，至少要让两家共创基金能完成试点审批和月末结账。
  twelveMonth: 补上支持券商和子账户的控制能力，为敏感合约类别提供可重复使用模板，并做出可直接交给律师的报告，以缩短后续五家客户的部署时间。
  twentyFourMonth: 把同一套规则引擎扩展到通过券商分发的事件合约和相邻受监管微型衍生品工作流里，避免公司沦为单一交易场所的功能供应商。
  keyBets:
  - 买家会先为审批速度和可审计性付费，再为更丰富的分析能力付费。
  - 专业化的分类体系和例外处理模型，会优于内部脚本和通用监管科技模块。
  - 两次成功的基金部署，就足以建立打开券商和顾问转介渠道所需的可信度。
gtm:
  wedge: 由创始人主导销售一套面向首次生产级 Kalshi 上线的控制平面，切入点就是基金必须拿出书面权限和对账流程才能获得合规签字的那个时刻。
  channels:
  - 直接外呼目标宏观基金和自营交易公司的 COO、CCO 与风险负责人
  - 围绕开户项目获取券商、顾问和 Kalshi 周边生态的转介绍
  - 把共创客户销售打进那些已经在评估 API、FIX、RFQ 或实体账户开设的基金
  funnelTargets: 12 个月内，把 20-30 个目标账户转成 6-8 个合格试点、2-3 个付费共创客户，以及至少 2 个从试点转生产的客户。
  pricing: 按基金实体收取年度 SaaS 平台费，并叠加实施费和按接入交易台数、事件合约交易量划分的使用分层；这与治理型买家的属性、六位数付费意愿和高接触初期部署打法是匹配的。
businessModel:
  revenueStreams:
  - 为规则与对账平台接入支付年度 SaaS 订阅费
  - 为集成、分类体系配置和控制设计支付实施费
  - 面向券商或额外实体的高级报告与扩展连接器模块
  unitOfValue: 受治理覆盖的基金实体，后续再按接入交易台数量和月度事件合约交易量扩展。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在首家基金客户内部继续扩展交易台、子账户和实体
  - 一旦买方侧验证成立，就卖面向券商的控制模块
  - 把规则引擎复用到相邻的受监管事件和微型衍生品交易场所
strategyMap:
  northStarMetric: 通过平台完成规则执行和月度对账、且已在生产环境运行事件合约交易的客户实体数量。
  inputMetrics:
  - 由开户触发型外联带来的合格试点机会数
  - 从规则启动到获得合规审批的中位天数
  - 每审查 100 笔订单的例外率
  - 试点转生产的转换率
  - 来自新增交易台或实体的净收入留存
  moatsToBuild:
  - 映射到机构自定义策略和司法辖区规则的专有合约分类体系
  - 与机构工作流绑定的历史例外、审批和结算数据集
  - 深入接进子账户、持仓、结算和合规复核流程的高粘性集成
  killCriteria:
  - 9 个月内进入活跃试点的可信共创客户少于 3 家
  - 即便 MVP 已上线，12 个月内转成生产的试点仍少于 2 个
  - 超过一半目标账户坚持认为这项能力应该由既有监控或 OMS 供应商来做
  - 在可复用的客户采用出现之前，监管变化就已显著压缩可交易合约类别
  mermaid: |-
    flowchart LR
      Wedge[第一批生产级 Kalshi 基金上线] --> MVP[规则与对账 MVP]
      MVP --> Proof[两家基金完成生产部署]
      Proof --> Expansion[券商模块与相邻交易场所扩张]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口清晰、时机也对，但在真正的活跃试点需求被验证、而不是只停留在叙事势能前，判断仍应保持克制。
    whyBelieve: 机构工作流基础模块、流动性集中和持续上升的监管审视，共同制造了一个已经成立、而既有工具只能部分解决的治理痛点。
    whyDoubt: 如果真正活跃的机构部署仍然稀少，短期市场可能既太小，又过度依赖单一交易场所。
    nextDiligence: 至少核实三家点名基金或券商是否有明确的实装时间表，并确认 COO 或 CCO 会为独立控制层买单，而不是延展既有工具。
  firstCustomer:
    title: 一家员工 10-100 人、正在试点 Kalshi 的美国宏观对冲基金的 COO 或 CCO
    profile: 这家机构已经跑着上市衍生品工作流，也有自己的内部执行栈，但还没有专门为事件合约设计的规则系统。
    trigger: 实体开户、Advanced API 或 FIX 激活、或第一次 RFQ 工作流上线，会让合规部门不再接受基于表格的控制方式。
    buyer: COO 或首席合规官
    initialContract: $75k-$150k 的付费试点或由实施支撑的首年合同；一旦基金把一个或多个交易台转入生产，便可转成约 $150k-$250k 的年度 SaaS 合同。
  mustBeTrue:
  - 未来 12 个月内，至少有 10 家目标美国基金或自营交易公司已经上线或即将上线事件合约。
  - COO 或 CCO 这类买家会把审批速度和可审计性视为值得单独拨预算的痛点，而不只是试点期的临时麻烦。
  - 专业供应商相较内部脚本，能实质性缩短合规审批时间。
  - Kalshi 或券商工作流的增长能持续足够久，让专业厂商在既有厂商反应过来前先拿下多家客户。
  - 如果只做 Kalshi 的市场停滞，这套规则引擎也能迁移到相邻的受监管事件产品或微型衍生品上。
  diligenceQuestions:
  - 有多少点名基金处在真实实施阶段，而不是只停留在探索？
  - 到底是哪些具体控制缺口，让买家放弃既有的 OMS、监控或表格流程？
  - 买家更偏好独立控制平面，还是既有供应商提供的嵌入式模块？
  - 哪些合约类别在内部审批里摩擦最大，因此最适合成为第一批产品模板？
  - Kalshi 未来自己用原生机构治理功能吃掉这个切口的可能性有多大？
  riskHeatmap:
  - risk: 围绕敏感事件合约类别的监管边界收紧
    likelihood: High
    impact: High
    leadingIndicator: 新的州级或联邦动作实质性缩减了可交易合约类别，或让目标账户暂停上线。
    mitigation: 先做监管范围收紧的使用场景，并让规则引擎可迁移到相邻受监管产品。
  - risk: 对 Kalshi 的单一交易场所依赖限制了市场深度和议价能力
    likelihood: High
    impact: High
    leadingIndicator: 大多数高质量潜在客户表示，在更广泛的交易场所或券商分发到位前不会采购。
    mitigation: 尽早做好贴近券商和 OMS 的连接器，这样无论事件合约通过哪里分发，产品都依旧有用。
  - risk: 买家延展内部工具或转向相邻监控套件
    likelihood: Medium
    impact: High
    leadingIndicator: 试点反复卡住，因为潜在客户认为内部脚本已经足够应付第一年的使用。
    mitigation: 用打包好的分类体系、模板和对账输出，证明自己能带来更快的审批时间和更顺畅的月末结账。
  - risk: 真实活跃试点数量可能低于市场叙事所暗示的水平
    likelihood: Medium
    impact: High
    leadingIndicator: 集中触达 20-30 个目标账户后，出现的可信共创客户机会仍少于 3 个。
    mitigation: 在扩大销售招聘前，先把范围重定向到更广的另类合约治理场景。
operatingAssumptions:
- assumption: 目标基金里会有相当一部分在未来 12 个月内走到真实上线决策，而不是一直停留在研究阶段。
  basis: research.yaml
  validationTest: 访谈 10 家目标基金和 3 家券商或顾问，并记录至少 3 个点名实施时间表，同时明确买家和阻碍因素。
  decisionImpact: 如果不成立，就推迟销售招聘，并把产品重定位到相邻交易场所或嵌入式合作。
- assumption: 买家会为独立控制层付费，因为既有监控或 OMS 工具并不能解决合约特定的审批和对账问题。
  basis: research.yaml
  validationTest: 在至少 5 次共创客户沟通中确认：如果部署时间和审计证据明显改善，客户愿意接受一套独立工作流。
  decisionImpact: 如果不成立，路线图就应转向与既有厂商做 OEM 或嵌入式分发，而不是直接销售独立产品。
- assumption: 首个部署在不替换客户执行栈的前提下，也能交付能量化的价值。
  basis: idea.yaml
  validationTest: 用客户既有内部工作流完成一次试点集成，并证明审批时间或月末结账工作量相较基线有所下降。
  decisionImpact: 如果不成立，实施成本就会上升，公司应收窄范围，或只做系统化程度更高的客户。
- assumption: 合约分类体系和例外数据积累护城河的速度，会快于既有厂商复制功能集的速度。
  basis: operator judgment
  validationTest: 跟踪新客户是否复用已有规则模板，以及前两次部署之后中标率是否提升。
  decisionImpact: 如果不成立，公司就只能靠服务和关系竞争，这会削弱风险投资回报，也可能改变融资需求。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 建立目标账户名单，并与 COO、CCO 和风险负责人完成 20 场结构化客户访谈。
  hypothesis: 主要阻碍因素是合规审批和对账，而不是连接能力或纯执行。
  successMetric: 至少 8 场访谈提到近期上线触发点，且有 3 家愿意分享当下审批流程细节。
  owner: 创始人
- horizon: 0–90 天
  experiment: 用真实的 Kalshi 对象类型和样例合约类别，做出一个可点击演示的规则与例外工作流。
  hypothesis: 相比泛泛的监管科技定位，买家会更愿意围绕具体审批工作流展开交流。
  successMetric: 看完演示后，至少 5 个目标账户会要求继续开技术范围界定会议。
  owner: 创始工程师
- horizon: 0–90 天
  experiment: 围绕一个基金实体，用付费试点方案测试共创客户定价。
  hypothesis: 如果实施与审计输出包含在内，治理型买家会接受六位数的首年定价。
  successMetric: 至少 2 个潜在客户接受 $75k-$150k 的付费试点区间。
  owner: 创始人
- horizon: 3–6 个月
  experiment: 上线一个覆盖市场、子账户、持仓、成交和结算的 MVP 连接器，并配套一套规则集和例外队列。
  hypothesis: 一个连接器再加上带明确取舍的规则模板，就足以让首个客户完成合规审批。
  successMetric: 至少一家共创客户完成试点审批，并把测试工作流跑进系统。
  owner: 创始工程师
- horizon: 6–12 个月
  experiment: 让两个生产试点完整跑完一个月度对账周期。
  hypothesis: 上线后，交易后结账和审计证据会成为最强的留存驱动。
  successMetric: 两家客户通过平台完成月末对账，并续签成年合同。
  owner: 解决方案工程师
- horizon: 6–12 个月
  experiment: 拿下一家券商、顾问或监控相邻厂商的转介合作。
  hypothesis: 一旦初始验证点成立，渠道引荐会比冷启动外呼更有效。
  successMetric: 签下一份转介协议，并从合作伙伴线索里拿到至少 3 个合格机会。
  owner: 创始人
operations:
- 维护一套合约分类库，覆盖市场类别、结算逻辑、地域敏感性和受限人员规则。
- 沉淀实体开户、API 或 FIX 激活和月度对账配置的实施手册。
- 对每一次规则修改和例外处理，都使用审计日志和客户专属变更管理。
- 与券商、顾问和监控相邻厂商建立合作节奏，用于转介和集成支持。
team:
- role: 创始人 / CEO
  startTiming: Month 0
  rationale: 必须亲自抓客户发现、共创客户销售和合作伙伴拓展，因为市场很窄，叙事需要快速迭代。
- role: 创始工程师
  startTiming: Month 0
  rationale: 需要尽快把交易场所连接器、规则引擎和对账数据模型做出来，才能跟上早期共创客户节奏。
- role: 产品/合规负责人
  startTiming: Month 3
  rationale: 把法律和市场结构细节转成可重复使用的规则模板、实施手册和审计输出。
- role: 解决方案工程师
  startTiming: Month 6
  rationale: 缩短集成周期，并支持第一批生产客户，同时避免创始团队变成全职服务团队。
- role: 客户主管或 GTM 负责人
  startTiming: Month 12
  rationale: 只有在两次生产胜利验证了可复用性和渠道话术后，才启动招聘。
milestones:
- horizon: 0–12 个月
  items:
  - 在目标滩头市场验证至少 3 个付费共创客户
  - 交付生产就绪的 Kalshi 连接器、规则控制台和对账工作流
  - 至少让 2 家客户从试点转成生产级年合同
  - 建立一条券商或顾问转介渠道
- horizon: 12–24 个月
  items:
  - 在基金、自营交易公司和至少一家券商相邻客户中拿下 6-8 家生产客户
  - 为敏感合约类别和重子账户工作流补充可重复使用模板
  - 证明新增交易台、实体或报告模块能带来扩张收入
  - 如果 Kalshi 集中度仍是风险，就启动首个相邻交易场所或微型衍生品规则试点
- horizon: 24–36 个月
  items:
  - 达到研究设定的第 3 年 SOM 情景：约 12 家客户、约 $2.4M 的 ARR 等效收入
  - 成为券商或顾问主导的机构事件合约上线项目里默认会被提到的治理层
  - 证明控制平面可以迁移到单一交易场所以外
risks:
- risk: 监管变化压缩了可交易或可被机构接受的合约类别范围。
  likelihood: High
  impact: High
  mitigation: 先锚定监管范围收紧的合约类别，并保持产品架构可迁移到相邻受监管合约类型。
- risk: 公司在客户需求和技术接入上都过度依赖一个主导性交易场所。
  likelihood: High
  impact: High
  mitigation: 通过券商和工作流合作方接入，并提前把规则引擎准备好，适配相邻分发渠道。
- risk: 内部脚本和相邻监控厂商，对早期买家来说可能仍然“够用”。
  likelihood: Medium
  impact: High
  mitigation: 把通用工具给不了的、能量化的审批时长和月末结账结果打包卖出来。
- risk: 实施负担压垮早期团队产能，让公司滑向服务外包模式。
  likelihood: Medium
  impact: Medium
  mitigation: 在扩大团队前，先把连接器、规则模板和开户实施手册标准化。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这笔资金可覆盖 18 个月的核心工程投入、1 名产品/合规招聘、高接触的共创客户实施，以及足够的创始人主导 GTM 开支，用来证明 2 家生产客户加 1 条可复用的转介渠道。
