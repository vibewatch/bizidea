competitors:
- name: Kalshi 原生机构工具
  stage: incumbent
  wedge: 交易场所原生的 RFQ、子账户、FIX/API 连接能力和组合接口。
  pricing: 按交易所费率表收费；没有单独披露机构控制软件价格。
  strength: 对交易场所对象理解最深，也最接近新的工作流基础模块。
  weaknessVsUs: 提供的是交易基础模块，不是为基金治理定制的跨规则审批和对账层。
  sourceRefs:
  - 14
  - 15
  - 22
  - 24
  - 25
  - 26
  - 28
  - 29
  - 36
  - 38
- name: Eventus
  stage: scale-up
  wedge: 为交易所、券商和预测市场提供交易监控与市场风险控制。
  pricing: 企业定制定价 / 需申请演示。
  strength: 监控产品成熟，且明确打出预测市场定位。
  weaknessVsUs: 更偏向告警和交易场所完整性，而不是交易台级权限规则或运营结账。
  sourceRefs:
  - 48
  - 49
  - 50
- name: Solidus Labs
  stage: scale-up
