reportMemo:
  executiveTakeaways:
  - 机构事件合约交易正在比治理栈适应得更快地走向真实运营。
  - 最强的切口不在纯执行，而在围绕交易场所特定合约的规则配置、审批和对账。
  - 真正的竞争更多来自相邻监控套件、交易场所原生能力和内部扩展方案，而不是某个直接的品类龙头。
  - 监管模糊性既是最大风险，也是买家愿意为专用控制层付费的原因。
  marketDefinition: 一类软件，帮助机构用户在交易场所规则、券商工作流和内部风控规则之间，对事件合约交易进行审批、监控和对账。
  customerAndBuyer: 初始用户是美国宏观基金、自营交易公司以及少数正在增加事件合约接入能力的券商里的风险、合规和运营负责人；预算买家通常是 COO 或 CCO，因为痛点在治理和可审计性，而不只是下单。
  buyingTriggers:
  - point: RFQ、FIX、子账户和券商式工作流，会把探索性交易直接变成生产级审批问题，而表格根本扛不住。
    sourceRefs:
    - 1
    - 14
    - 22
    - 24
    - 26
    - 36
  - point: 券商分发让事件合约更容易进入投委会和法务团队视野，也把书面化控制要求的门槛抬高了。
    sourceRefs:
    - 3
    - 44
    - 46
    - 47
  - point: 监控话术和执法压力正在提高一项成本：如果没有明确权限和审计轨迹，就放交易员去用新合约类别，会越来越贵。
    sourceRefs:
    - 9
    - 10
    - 58
    - 59
    - 60
  willingnessToPay:
    summary: 当买家本来就在为监控、市场风险和报告工具拨预算时，这笔钱最容易站得住脚；在这种前提下，只要能缩短上线审批、减少人工复核和对账，一套聚焦事件合约的控制平面就能支撑六位数年费。
    sourceRefs:
    - 48
    - 49
    - 50
    - 52
    - 53
    - 58
    - 59
  competitiveLandscape: 这个市场分散在交易场所原生 API、广义监控厂商、券商接入层和内部扩展方案之间。如果一家专业产品能真正掌握合约分类体系、交易前权限逻辑和交易后可审计性，而不是直接去替代执行或监控系统，就还有空间。
  incumbentThesis:
  - incumbentClass: 原生交易场所工具
    point: Kalshi 已经开放了 RFQ、FIX、子账户、持仓和结算等能力，但这些更像交易接入的积木，而不是面向基金定制的规则审批和可直接交给律师的审计工作流。
    sourceRefs:
    - 14
    - 22
    - 24
    - 25
    - 26
    - 28
    - 29
    - 36
    - 38
  - incumbentClass: 通用监控厂商
    point: Eventus 和 Solidus 能监控市场滥用和市场风险模式，但它们并不是围绕策略级权限、实体专属规则手册或事件合约月末结账对账来构建的。
    sourceRefs:
    - 48
    - 49
    - 50
    - 52
    - 53
    - 54
  - incumbentClass: 券商原生接入
    point: Robinhood 和 Interactive Brokers 的作用在于分发和解释事件合约，但它们的工作流重心是客户接入和教育，而不是覆盖交易台、用户和法律解释差异的机构治理。
    sourceRefs:
    - 44
    - 46
    - 47
  - incumbentClass: 内部扩展方案
    point: 基金当然可以把交易场所 API 接进自己的 OMS 备注和脚本里，但这样规则变更、受限人员逻辑和结算映射都得自己维护。
    sourceRefs:
    - 14
    - 16
    - 21
    - 24
    - 25
    - 28
    - 29
    - 38
  regulatoryLandscape: 这个品类名义上处在美国受监管衍生品框架里，但政治和法律敏感度依然很高，因此买家会要求按合约类别、地域和参与者分层控制，而不会默认普通期货治理框架就够用。
  technologyLandscape: 这套技术堆栈是 API first，而且越来越偏机构化：RFQ、FIX、子账户、实时持仓和结算数据都已经开放。真正的技术缺口不是连接性本身，而是怎么把交易场所元数据变成机构自定义的权限、例外和账簿记录输出。
  distributionChannels:
  - point: 在实体账户开设、Advanced API/FIX 激活以及首次 RFQ 或类大宗工作流上线这些时点切入销售。
    sourceRefs:
    - 14
    - 22
    - 24
    - 36
  - point: 借助正在把事件合约正常化为对冲工具的券商和教育渠道，把共创客户需求筛出来。
    sourceRefs:
    - 44
    - 46
    - 47
  - point: 和已经贴近交易场所的市场完整性与数据分发玩家合作，拿到可信转介绍。
    sourceRefs:
    - 9
    - 43
    - 48
    - 52
  partnershipEcosystem:
  - point: Kalshi 以及与之连接的 FCM、FIX 和券商通道，都是核心伙伴，因为越多机构工作流经过这个交易场所，规则层的价值就越高。
    sourceRefs:
    - 1
    - 14
    - 24
    - 25
    - 36
  - point: 监控厂商是合理的集成伙伴，因为它们本来就接触调查团队和市场完整性团队，即便它们并不解决基金层面的权限问题。
    sourceRefs:
    - 9
    - 48
    - 49
    - 52
    - 53
  - point: 媒体和数据分发方会扩大关注事件合约信号的交易台范围。
    sourceRefs:
    - 43
  dataMoats:
  - point: 一套可重复使用的映射，把合约元数据对应到策略桶、受限人员和司法辖区规则上；每当交易场所上线一个新市场，这套映射都会继续复利。
    sourceRefs:
    - 10
    - 16
    - 21
  - point: 子账户、成交、持仓和结算历史，可以沉淀成一套专有治理数据集，记录机构到底是怎么审批和监控事件合约的。
    sourceRefs:
    - 26
    - 28
    - 29
    - 38
  geographicConsiderations:
  - point: 美国是正确的滩头市场，因为 Kalshi 是最清晰的受监管交易场所；但州级可用性差异和体育博彩敏感性，仍然要求规则能感知地域。
    sourceRefs:
    - 3
    - 6
    - 44
  - point: 后续扩张更应该跟着那些拿到相近监管清晰度和券商分发能力的交易场所走，而不是先做按地域划分的销售计划。
    sourceRefs:
    - 46
    - 47
  sensitivityCases:
  - case: 监管方收紧可允许的合约类别，或提升对事件市场的审视。
    impact: 滩头市场的 SAM 会很快被压缩，因此产品必须让规则引擎能迁移到相邻的微型衍生品或另类交易场所工作流。
    sourceRefs:
    - 3
    - 6
    - 10
    - 60
  - case: Kalshi 和券商正在加速推进 RFQ、FIX 以及更高交易量的机构工作流。
    impact: 紧迫性会上升，因为人工审批会更早失效，从而缩短控制平面的价值兑现时间。
    sourceRefs:
    - 1
    - 14
    - 22
    - 24
    - 36
  - case: 广义监控厂商补上了事件合约专属的规则和对账模块。
    impact: 除非创业公司掌握更深的合约分类体系、例外处理和买家专属审计证据，否则差异化会被迅速压缩。
    sourceRefs:
    - 48
    - 49
    - 50
    - 52
    - 53
    - 54
  validationPlan:
  - priority: high
    question: 已经有多少美国宏观基金和自营交易公司在做实盘或即将上线的 Kalshi 试点？
    evidenceToGather: 去和券商、Kalshi 周边顾问以及 10 家目标基金做赢单/输单访谈，重点找真实的实施时间表和阻碍模式。
  - priority: high
    question: 买家会更偏好独立控制平面，还是既有监控/OMS 基础设施中的嵌入式模块？
    evidenceToGather: 和 COO/CCO 做共创客户访谈，再补上与监控和 OMS 厂商的集成访谈。
  - priority: medium
    question: 到底是哪些合约类别最容易引发内部阻力：政治、体育、天气还是宏观数据？
    evidenceToGather: 从试点客户处收集样例规则备忘录、受限人员名单和法律审查记录。
analysisModels:
  marketMapDiagram:
    title: 事件合约工作流栈
    mermaid: |-
      quadrantChart
        title 事件合约工作流栈
        x-axis 低工作流专属性 --> 高工作流专属性
        y-axis 低紧迫性 --> 高紧迫性
        quadrant-1 战略平台
        quadrant-2 专业控制层
        quadrant-3 通用替代方案
        quadrant-4 原生但不完整的工具
        Eventus: [0.48, 0.60]
        Solidus Labs: [0.58, 0.62]
        券商原生接入: [0.32, 0.55]
        Kalshi 原生工具: [0.67, 0.72]
        拟议中的创业公司: [0.89, 0.90]
  fiveForces:
    supplierPower:
      score: 4
      rationale: 这家创业公司高度依赖少数几个交易场所和券商通道，而当下 Kalshi 正是机构化功能势能最强的核心平台。
      sourceRefs:
      - 1
      - 14
      - 22
      - 24
      - 25
      - 43
    buyerPower:
      score: 4
      rationale: 早期买家数量少、成熟度高，也有能力扩展内部栈，因此在接受新供应商前，他们一定会要求看到更快审批和更顺滑运营的实证。
      sourceRefs:
      - 14
      - 16
      - 21
      - 24
      - 28
      - 29
    threatOfEntrants:
      score: 3
      rationale: API 和券商教育降低了技术门槛，但维护交易场所特定规则、合约分类体系和审计历史，仍然形成了实打实的学习曲线。
      sourceRefs:
      - 21
      - 22
      - 28
      - 36
      - 38
      - 46
      - 47
    threatOfSubstitutes:
      score: 5
      rationale: 交易场所原生工具、监控套件、券商和内部脚本都能提供部分替代，哪怕没有任何一种能同时把规则和对账彻底解决。
      sourceRefs:
      - 14
      - 22
      - 24
      - 25
      - 48
      - 49
      - 52
      - 53
    competitiveRivalry:
      score: 3
      rationale: 直接竞争对手不多，但相邻的合规和监控在位厂商已经在向同一批预算拥有者销售，并开始靠近预测市场工作流。
      sourceRefs:
      - 48
      - 49
      - 50
      - 52
      - 53
      - 54
      - 58
      - 59
  pestle:
  - factor: 政治
    impact: negative
    point: 预测市场仍然高度带有政治敏感性，因此规则变化或舆论争议都可能迅速改变合约资格和买家意愿。
    sourceRefs:
    - 3
    - 10
    - 60
  - factor: 经济
    impact: positive
    point: 券商和交易场所都在明确把事件合约包装为对冲宏观和气候风险的工具，这让严肃使用场景不再只局限于投机。
    sourceRefs:
    - 1
    - 3
    - 46
    - 47
  - factor: 社会
    impact: neutral
    point: 更广泛的散户可得性有助于这个品类正常化，但按州限制和博彩类比，仍会给机构带来声誉顾虑。
    sourceRefs:
    - 3
    - 44
  - factor: 技术
    impact: positive
    point: RFQ、FIX、实时持仓和结算接口，降低了外部控制层的集成摩擦。
    sourceRefs:
    - 22
    - 24
    - 25
    - 28
    - 36
    - 38
  - factor: 法律
    impact: negative
    point: 联邦监管、日报要求、KYC/AML 义务和积极执法预期，都抬高了任何机构上线项目的合规负担。
    sourceRefs:
    - 6
    - 9
    - 16
    - 60
  adoptionFrictionMatrix:
  - friction: 不同合约类型和司法辖区下的规则处理口径不清晰
    severity: high
    affectedBuyer: 首席合规官
    mitigation: 上线一套合约分类体系和审批规则，把地域、参与者限制和类别专属控制都编码进去。
    sourceRefs:
    - 3
    - 6
    - 10
    - 16
  - friction: 围绕 RFQ、持仓、子账户和结算的集成工作量
    severity: medium
    affectedBuyer: COO / 运营负责人
    mitigation: 先从 API-first 的连接器和针对高频场景的映射模板做起。
    sourceRefs:
    - 21
    - 22
    - 24
    - 25
    - 26
    - 28
    - 29
    - 38
  - friction: 买家认为内部脚本已经足够应付试点
    severity: high
    affectedBuyer: COO / CTO
    mitigation: 证明自己带来的审批时间更短、月末结账更顺，比内部临时方案更强。
    sourceRefs:
    - 14
    - 24
    - 25
    - 28
    - 29
    - 38
  - friction: 对单一交易场所的依赖削弱了部分买家的紧迫感
    severity: medium
    affectedBuyer: 投委会发起人
    mitigation: 把产品定位成可重复使用的控制模型，适用于相邻的事件和微型衍生品交易场所，而不只是 Kalshi。
    sourceRefs:
    - 1
    - 43
    - 46
    - 47
