jobsToBeDone:
- job: 当我的基金要开通事件合约交易时，帮我审批哪些交易台和交易员可以用哪些合约，让他们不用卡在合规瓶颈里也能上线。
  currentAlternative: 人工法律备忘录、表格权限和邮件审批。
  successMetric: 从策略申请到拿到实盘交易审批的天数
- job: 当事件合约头寸结算和滚动时，帮我的运营团队完成敞口对账并生成审计证据，让他们不用特殊流程也能结账。
  currentAlternative: 内部脚本，再加上人工交易与结算核对。
  successMetric: 每个交易实体每月节省的运营与合规工时
