problem: 美国宏观基金和自营交易公司如今已经能在事件合约里拿到足够流动性，足以认真配置；但它们既有的合规与风控系统还不知道该怎么给这类产品分类、审批和监控。每上一条新策略，都得重新做法律审查、用表格设限额、靠人工做交易后对账，因为这类工具尴尬地夹在衍生品基础设施和博彩式监管审视之间。一旦大宗交易和券商连接真正上线，这套临时拼出来的流程就会在真实仓位规模和审计压力下失效。
targetUser:
  primary: 正在试点事件合约交易的美国宏观对冲基金或自营交易公司的风险负责人、COO 或首席合规官
  secondary: 为机构客户接入 Kalshi 的券商产品负责人或电子交易负责人
  buyer: 美国宏观对冲基金或自营交易公司的 COO 或首席合规官
startupThesis:
  nonObviousInsight: 稀缺资产已经不再是散户流动性或价格发现——Kalshi 正在用新资金解决这件事。新的瓶颈变成了机构可运营性：机构要想扩大敞口，必须先有一套系统，把每一份事件合约变成机器可读的权限、限额和审计证据。
  beachhead: 拥有上市衍生品基础设施、正在评估首次生产级 Kalshi 部署的美国宏观对冲基金和自营交易公司
  wedge: 一套交易前规则引擎和交易后对账层，把事件合约映射到已批准策略、司法辖区规则和机构自定义敞口限额上
  whyNowCatalyst: Kalshi 的机构交易量增长了 800%，同时还在推进大宗交易和券商集成；这意味着基金正好在监管审视加剧之际，从试验阶段走向生产阶段。
  ventureScalePath: 先从事件合约的控制平面切入，再向全球新型受监管微型衍生品和另类交易场所的风险、会计与合规基础设施扩张。
solution: 搭建一层位于 Kalshi、券商通道和基金既有 OMS 或内部执行栈之间的事件合约控制平面。产品先吸收合约元数据，把每个市场归到已批准的策略桶里，再按交易台、交易员、司法辖区和规模执行交易前限制，并为合规委员会留下清晰的审计轨迹。交易后，它把成交标准化成基金层面的敞口、情景和对账视图，让运营团队不用写定制脚本也能结账。报告层再生成规则例外、可直接交给外部律师的审查包和董事会级摘要，让事件合约项目在机构治理里站得住脚。长期看，这套数据模型还能支撑其他另类合约类型的组合分析与资金配置。
goToMarketSeed:
  firstCustomer: 员工规模 10-100 人、拥有内部执行栈、合规团队 2-10 人、正准备首次 Kalshi 试点的美国宏观对冲基金
  buyingTrigger: 新的券商集成或大宗交易流程可用后，交易台申请实盘接入，但合规部门拒绝再批准人工控制。
  currentAlternative: 人工法律审查，再加上表格、内部脚本和通用 OMS 备注。
  switchingReason: 这套控制平面能省掉数周的定制规则设计，让基金在不替换既有执行栈的情况下，直接获得在线审批、例外处理和对账能力。
  pricingHypothesis: 按基金实体收取年度 SaaS 平台费，再按接入交易台数量和月度事件合约交易量分层收费。
