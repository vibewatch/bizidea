topRisks:
- name: 监管边界收紧
  description: 如果监管方或各州显著收紧可交易合约范围，初始市场增长就可能低于预期。
  mitigation: 先聚焦监管边界清晰的机构使用场景，并把规则引擎做成可迁移到相邻受监管事件产品和微型衍生品上的形态。
- name: 对 Kalshi 平台依赖过重
  description: 过度依赖单一交易场所，会让公司暴露在 API、定价或分发变化的风险下。
  mitigation: 尽早通过券商和 OMS 工作流接入，这样无论事件合约通过哪里分发，产品都还有价值。
- name: 机构可能自研
  description: 大型基金可能会选择扩展既有风控系统，而不是采购新供应商。
  mitigation: 先拿下中端市场的共创客户，把长尾的合约分类和审计工作流产品化，并证明比内部自研更快拿到审批。
