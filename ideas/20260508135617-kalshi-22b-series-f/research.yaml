reportMemo:
  executiveTakeaways:
  - Institutional event-contract trading is becoming operationally real faster than governance stacks are adapting.
  - The strongest wedge is not raw execution but policying, approvals, and reconciliation around venue-specific contracts.
  - Most real competition comes from adjacent surveillance suites, venue-native primitives, and internal extensions rather than a direct category leader.
  - Regulatory ambiguity is both the main risk and the reason buyers may pay for a dedicated control layer.
  marketDefinition: Software that lets institutional users approve, monitor, and reconcile event-contract trading across venue rules, broker workflows, and internal risk policy.
  customerAndBuyer: Initial users are heads of risk, compliance, and operations at U.S. macro funds, prop firms, and a small set of brokers adding event-contract access; the economic buyer is usually the COO or CCO because the pain is governance and auditability, not order entry alone.
  buyingTriggers:
  - point: RFQ, FIX, subaccount, and broker-style workflows turn exploratory trading into a production approval problem that spreadsheets handle poorly.
    sourceRefs:
    - 1
    - 14
    - 22
    - 24
    - 26
    - 36
  - point: Broker distribution makes event contracts more visible to investment committees and legal teams, which raises the bar for documented controls.
    sourceRefs:
    - 3
    - 44
    - 46
    - 47
  - point: Surveillance messaging and enforcement pressure increase the cost of letting traders use a new contract class without explicit permissions and audit trails.
    sourceRefs:
    - 9
    - 10
    - 58
    - 59
    - 60
  willingnessToPay:
    summary: Budget is most defensible when the buyer already funds surveillance, market-risk, and reporting tools; in that context, a focused event-contract control plane can support six-figure annual spend if it shortens go-live approvals and reduces manual review and reconciliation.
    sourceRefs:
    - 48
    - 49
    - 50
    - 52
    - 53
    - 58
    - 59
  competitiveLandscape: The market is fragmented across venue-native APIs, broad surveillance vendors, broker access layers, and in-house extensions. That leaves room for a specialist product if it owns contract taxonomy, pre-trade entitlement logic, and post-trade auditability rather than trying to replace execution or surveillance systems outright.
  incumbentThesis:
  - incumbentClass: Native venue tooling
    point: Kalshi already exposes RFQ, FIX, subaccounts, positions, and settlements, but those are building blocks for trading access rather than fund-specific policy approval and counsel-ready audit workflows.
    sourceRefs:
    - 14
    - 22
    - 24
    - 25
    - 26
    - 28
    - 29
    - 36
    - 38
  - incumbentClass: Generic surveillance vendors
    point: Eventus and Solidus can monitor market abuse and market-risk patterns, but they are not built around strategy-level permissions, entity-specific rulebooks, or close-the-books reconciliation for event contracts.
    sourceRefs:
    - 48
    - 49
    - 50
    - 52
    - 53
    - 54
  - incumbentClass: Broker-native access
    point: Robinhood and Interactive Brokers help distribute and explain event contracts, but their workflow focus is client access and education, not institutional governance across desks, users, and legal interpretations.
    sourceRefs:
    - 44
    - 46
    - 47
  - incumbentClass: In-house extensions
    point: A fund can wire venue APIs into its own OMS notes and scripts, but then it must maintain rule changes, restricted-person logic, and settlement mapping itself.
    sourceRefs:
    - 14
    - 16
    - 21
    - 24
    - 25
    - 28
    - 29
    - 38
  regulatoryLandscape: The category sits inside a regulated U.S. derivatives framework but remains politically and legally sensitive enough that buyers will want contract-class, geography, and participant-level controls instead of assuming ordinary futures governance is sufficient.
  technologyLandscape: The stack is API-first and increasingly institutional, with RFQ, FIX, subaccounts, streaming positions, and settlement data already exposed. The technical gap is not connectivity alone; it is turning venue metadata into firm-specific permissions, exceptions, and books-and-records outputs.
  distributionChannels:
  - point: Sell into onboarding moments such as entity-account setup, Advanced API/FIX activation, and first RFQ or block-style workflows.
    sourceRefs:
    - 14
