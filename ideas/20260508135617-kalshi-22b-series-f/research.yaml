  validationPlan:
  - priority: high
    question: How many U.S. macro funds and prop firms already have live or imminent Kalshi pilots?
    evidenceToGather: Win-loss interviews with brokers, Kalshi-adjacent consultants, and 10 target funds; look for real implementation timelines and blocker patterns.
  - priority: high
    question: Will buyers prefer a standalone control plane or an embedded module inside existing surveillance/OMS infrastructure?
    evidenceToGather: Design-partner calls with COOs/CCOs plus integration interviews with surveillance and OMS vendors.
  - priority: medium
    question: 'Which contract classes trigger the most internal resistance: politics, sports, weather, or macro data?'
    evidenceToGather: Collect sample policy memos, restricted-person lists, and legal review notes from pilot customers.
