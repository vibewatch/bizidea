slug: event-contract-control-plane
date: '2026-05-08'
executiveSummary: >-
  Event-contract trading is crossing from exploratory usage into production institutional workflows, but approval, surveillance, and close-the-books processes are still handled with legal memos, spreadsheets, and internal scripts. This company sells a control plane to U.S. macro hedge funds and prop firms that are preparing their first live Kalshi deployment and need machine-readable permissions, limits, and audit evidence before compliance will approve trading. The initial product wedge is narrow by design: pre-trade policy enforcement plus post-trade reconciliation for Kalshi event contracts, without trying to replace OMS, execution, or broad surveillance suites. The go-to-market system is coherent around one trigger: when a fund enables entity onboarding, Advanced API or FIX access, RFQ, or broker connectivity, the COO or CCO must either formalize controls or block launch. Pricing should therefore start as a six-figure annual SaaS subscription plus implementation because the buyer is funding governance and operations risk reduction, not retail-style order flow. The strongest evidence is venue momentum, concentrated U.S. liquidity, institutional workflow primitives, and visible regulatory pressure; the biggest missing fact is how many funds are in active near-term pilots versus only monitoring the category. If that customer count is shallow, the company should stay small and productize the rules engine for adjacent regulated micro-derivative workflows rather than force a pure Kalshi-only outcome.
problem:
  - Funds evaluating live event-contract trading still rely on manual legal review, spreadsheet permissions, and email approvals because existing risk and compliance stacks do not classify or control venue-specific contracts well.
  - As Kalshi adds RFQ, broker, subaccount, and settlement workflows, manual controls become fragile under larger position sizes, monthly close requirements, and regulatory scrutiny.
solution:
  - Deliver a control plane that converts Kalshi market metadata into firm-specific strategy buckets, trader entitlements, jurisdiction rules, and exposure limits enforced before orders are sent.
  - Normalize fills, positions, and settlements into reconciliation and audit outputs so compliance and operations teams can approve launches faster and close books without bespoke scripts.
whyWeWin:
  - The product is aimed at the actual blocker to production adoption—policy approval and reconciliation—while incumbents focus on venue access, surveillance alerts, or generic compliance workflows.
  - A reusable contract taxonomy plus accumulated exception and governance data should get more valuable with each listed contract, customer policy decision, and integrated desk.
strategicChoices:
  beachhead: 10-100 person U.S. macro hedge funds and prop firms with internal execution stacks and small compliance teams preparing their first production Kalshi rollout.
  wedgeRationale: This slice has urgent pain, enough technical maturity to integrate quickly, and a clear economic buyer in the COO or CCO; selling earlier into brokers or larger multi-asset incumbents would extend sales cycles before the product has proof of faster approvals.
  sequencingRationale: Start with metadata ingestion, policying, and reconciliation for one dominant U.S. venue; sell founder-led into onboarding moments; then add broker and OMS connectors after two funds reach production, because integrations and channel partnerships matter only after the core approval workflow is proven.
  notYet:
    - Full trade-surveillance replacement or market-abuse alerting
    - Retail or advisor workflows
    - Non-U.S. venue expansion before a portable rules model is proven
    - Broad portfolio analytics beyond event-contract governance and close
market:
  tam: $72.0M estimated TAM based on roughly 400 U.S.-centric institutional entities at about $180k blended ACV.
  sam: $27.0M estimated SAM based on roughly 150 near-term U.S. funds, prop firms, and brokers evaluating live event-contract workflows.
  som: $2.4M year-3 SOM based on 12 customers at about $200k ACV through implementation-heavy design-partner sales.
  segments:
    - U.S. macro hedge funds and prop firms piloting event-contract trading
    - Brokers and market-access providers adding Kalshi connectivity for institutional clients
  buyingProcess: COO, CCO, or head of risk usually owns the problem because the trigger is governance and auditability, not order entry alone. Budget is most likely released during entity onboarding, API or FIX activation, or the first RFQ or block-style rollout when manual controls are no longer acceptable.
product:
  mvp: >-
    MVP covers Kalshi contract ingestion, contract-to-strategy taxonomy, desk and trader entitlement rules, jurisdiction and category restrictions, pre-trade approvals, exception logging, and settlement-aware reconciliation exports. It should integrate with existing internal execution workflows rather than replace them.
  sixMonth: Ship one production Kalshi connector, policy console, exception queue, and reconciliation package good enough for two design-partner funds to complete pilot approvals and monthly close.
  twelveMonth: Add broker and subaccount-aware controls, reusable templates for sensitive contract classes, and counsel-ready reporting that shortens deployment time for the next five customers.
  twentyFourMonth: Extend the same rules engine into broker-distributed event contracts and adjacent regulated micro-derivative workflows so the company is not a single-venue feature vendor.
  keyBets:
    - Buyers will pay for approval speed and auditability before they pay for richer analytics.
    - A specialist taxonomy and exception model will outperform internal scripts and generic regtech modules.
    - Two successful fund deployments will create enough credibility to open broker and consultant referral channels.
gtm:
  wedge: Founder-led sale of a control plane for first-production Kalshi rollouts, attached to the exact moment a fund needs documented permissions and reconciliation to get compliance signoff.
  channels:
    - Direct outbound to COOs, CCOs, and heads of risk at target macro funds and prop firms
    - Broker, consultant, and Kalshi-adjacent referral introductions tied to onboarding projects
    - Design-partner sales into funds already evaluating API, FIX, RFQ, or entity-account setup
  funnelTargets: 20-30 target accounts to 6-8 qualified pilots, 2-3 paid design partners, and at least 2 pilot-to-production conversions within 12 months.
  pricing: Annual SaaS platform fee per fund entity with implementation fees and usage tiers based on connected desks and event-contract volume; this matches a governance buyer, six-figure willingness-to-pay context, and a high-touch initial deployment motion.
businessModel:
  revenueStreams:
    - Annual SaaS subscription for policy and reconciliation platform access
    - Implementation fees for integrations, taxonomy setup, and control design
    - Premium reporting and expanded connector modules for brokers or additional entities
  unitOfValue: Fund entity under governance, expanded by connected desks and monthly event-contract volume.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add desks, subaccounts, and entities inside the first fund customer
    - Sell broker-facing control modules once buy-side proof exists
    - Reuse the rules engine for adjacent regulated event and micro-derivative venues
strategyMap:
  northStarMetric: Number of customer entities running event-contract trading in production with policy enforcement and monthly reconciliation completed through the platform.
  inputMetrics:
    - Qualified pilot opportunities created from onboarding-trigger outreach
    - Median days from policy kickoff to compliance approval
    - Exception rate per 100 orders reviewed
    - Pilot-to-production conversion rate
    - Net revenue retention from added desks or entities
  moatsToBuild:
    - Proprietary contract taxonomy mapped to firm-specific strategy and jurisdiction rules
    - Historical exception, approval, and settlement dataset tied to institutional workflows
    - Sticky integrations into subaccounts, positions, settlements, and compliance review processes
  killCriteria:
    - Fewer than 3 credible design-partner customers enter an active pilot within 9 months
    - Fewer than 2 pilots convert to production within 12 months despite shipped MVP
    - More than half of target accounts insist the capability belongs inside existing surveillance or OMS vendors
    - Regulatory changes materially shrink permitted contract categories before repeatable customer adoption is visible
  mermaid: |
    flowchart LR
      Wedge[First-production Kalshi fund rollouts] --> MVP[Policy and reconciliation MVP]
      MVP --> Proof[Two production fund deployments]
      Proof --> Expansion[Broker modules and adjacent venue expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear wedge and timely trigger, but conviction stays limited until real active-pilot demand is proven beyond narrative momentum.
    whyBelieve: Institutional workflow primitives, concentrated liquidity, and rising regulatory scrutiny create a real governance pain that existing tools only partially solve.
    whyDoubt: The near-term market may be too small or too dependent on one venue if active institutional deployments are still sparse.
    nextDiligence: Verify at least three named funds or brokers with live implementation timelines and confirm that the COO or CCO will fund a standalone control layer instead of extending existing tools.
  firstCustomer:
    title: COO or CCO at a 10-100 person U.S. macro hedge fund piloting Kalshi
    profile: The firm already runs listed-derivatives workflows, has an internal execution stack, and lacks a purpose-built policy system for event contracts.
    trigger: Entity onboarding, Advanced API or FIX activation, or first RFQ workflow causes compliance to reject spreadsheet-based controls.
    buyer: COO or Chief Compliance Officer
    initialContract: $75k-$150k paid pilot or implementation-backed first year contract, converting to roughly $150k-$250k annual SaaS once the fund moves one or more desks into production.
  mustBeTrue:
    - At least 10 target U.S. funds or prop firms have live or imminent event-contract rollouts in the next 12 months.
    - COO or CCO buyers view approval speed and auditability as budget-worthy pain, not just temporary pilot inconvenience.
    - A specialist vendor can shorten compliance approval time materially versus internal scripts.
    - Kalshi or broker workflow growth persists long enough for a specialist to win multiple customers before incumbents react.
    - The rules engine generalizes into adjacent regulated event or micro-derivative products if the Kalshi-only market stalls.
  diligenceQuestions:
    - How many named funds are in active implementation versus exploration only?
    - What exact control gaps make buyers reject existing OMS, surveillance, or spreadsheet workflows?
    - Does the buyer prefer a standalone control plane or an embedded module from an existing vendor?
    - Which contract classes create the strongest internal approval friction and therefore the best initial product templates?
    - How likely is Kalshi to subsume this wedge with native institutional governance features?
  riskHeatmap:
    - risk: Regulatory perimeter shrinks around sensitive event-contract categories
      likelihood: High
      impact: High
      leadingIndicator: New state or federal actions materially reduce permitted contract classes or make target accounts pause rollouts.
      mitigation: Focus on clearly permitted use cases first and keep the rules engine portable to adjacent regulated products.
    - risk: Single-venue dependency on Kalshi limits market depth and bargaining power
      likelihood: High
      impact: High
      leadingIndicator: Most qualified prospects say they will wait for broader venue or broker distribution before buying.
      mitigation: Build broker and OMS-adjacent connectors early enough to stay useful wherever event contracts are distributed.
    - risk: Buyers extend internal tools or buy adjacent surveillance suites instead
      likelihood: Medium
      impact: High
      leadingIndicator: Pilots consistently stall because prospects decide internal scripts are sufficient for first-year usage.
      mitigation: Prove faster approval cycles and cleaner monthly close with packaged taxonomy, templates, and reconciliation outputs.
    - risk: Real active-pilot count is lower than market narrative suggests
      likelihood: Medium
      impact: High
      leadingIndicator: Fewer than 3 credible design-partner opportunities emerge after concentrated outreach to 20-30 target accounts.
      mitigation: Re-scope to broader alternative-contract governance use cases before scaling sales hiring.
operatingAssumptions:
  - assumption: A meaningful subset of target funds will reach a real go-live decision in the next 12 months rather than remain in research mode.
    basis: research.yaml
    validationTest: Interview 10 target funds and 3 brokers or consultants, and document at least 3 named implementation timelines with identified buyers and blockers.
    decisionImpact: If false, defer sales hiring and reposition the product toward adjacent venues or embedded partnerships.
  - assumption: Buyers will fund a standalone control layer because existing surveillance or OMS tools do not solve contract-specific approvals and reconciliation.
    basis: research.yaml
    validationTest: In at least 5 design-partner calls, confirm willingness to run a separate workflow if deployment time and audit evidence improve materially.
    decisionImpact: If false, shift roadmap toward OEM or embedded distribution with incumbents instead of direct standalone sales.
  - assumption: The first deployment can deliver measurable value without replacing the customer's execution stack.
    basis: idea.yaml
    validationTest: Complete one pilot integration using existing internal workflows and show reduced approval time or monthly close effort versus the customer's baseline.
    decisionImpact: If false, implementation cost rises and the company should narrow scope or target better-instrumented customers only.
  - assumption: Contract taxonomy and exception data become a durable moat faster than incumbents can copy the feature set.
    basis: operator judgment
    validationTest: Track whether new customers reuse prior rule templates and whether win rates improve after the first two deployments.
    decisionImpact: If false, the company must compete on services and relationships, which weakens venture returns and may change funding needs.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Build a target-account list and run 20 structured customer interviews with COOs, CCOs, and heads of risk.
    hypothesis: The dominant blocker is compliance approval and reconciliation, not connectivity or pure execution.
    successMetric: At least 8 interviews describe a near-term go-live trigger and 3 agree to share current approval workflow detail.
    owner: Founder
  - horizon: 0–90 days
    experiment: Produce a clickable policy and exception workflow demo using real Kalshi object types and sample contract classes.
    hypothesis: Buyers will engage more with a concrete approval workflow than with generic regtech positioning.
    successMetric: At least 5 target accounts request a follow-up technical scoping call after seeing the demo.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Test design-partner pricing with a paid pilot proposal tied to one fund entity.
    hypothesis: Governance buyers will accept six-figure first-year pricing if implementation and audit outputs are included.
    successMetric: At least 2 prospects accept a paid pilot range of $75k-$150k.
    owner: Founder
  - horizon: 3–6 months
    experiment: Ship MVP connector for markets, subaccounts, positions, fills, and settlements with one policy ruleset and exception queue.
    hypothesis: One connector plus opinionated rules templates is enough for a first customer to complete compliance approval.
    successMetric: One design partner completes pilot approval and routes test workflows through the system.
    owner: Founding eng
  - horizon: 6–12 months
    experiment: Run two production pilots through a full monthly reconciliation cycle.
    hypothesis: Post-trade close and audit evidence will be the strongest retention driver after go-live.
    successMetric: Two customers complete month-end reconciliation using the platform and renew into annual contracts.
    owner: Solutions engineer
  - horizon: 6–12 months
    experiment: Secure one referral partnership with a broker, consultant, or surveillance-adjacent partner.
    hypothesis: Channel introductions will outperform cold outbound once initial proof points exist.
    successMetric: One signed referral arrangement and at least 3 qualified opportunities from partner-sourced leads.
    owner: Founder
operations:
  - Maintain a contract taxonomy library covering market category, settlement logic, geography sensitivity, and restricted-person rules.
  - Run implementation playbooks for entity onboarding, API or FIX activation, and monthly reconciliation setup.
  - Use audit logging and customer-specific change management for every policy edit and exception disposition.
  - Build partner operating rhythms with brokers, consultants, and surveillance-adjacent vendors for referral and integration support.
team:
  - role: Founder / CEO
    startTiming: Month 0
    rationale: Must own customer discovery, design-partner sales, and partner development because the market is narrow and messaging needs rapid iteration.
  - role: Founding eng
    startTiming: Month 0
    rationale: Needed to build venue connectors, policy engine, and reconciliation data model quickly enough for early design partners.
  - role: Product/compliance lead
    startTiming: Month 3
    rationale: Converts legal and market-structure nuance into reusable rule templates, implementation playbooks, and audit outputs.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Shortens integration cycles and supports the first production customers without turning founders into full-time services staff.
  - role: Account executive or GTM lead
    startTiming: Month 12
    rationale: Hire only after two production wins prove repeatability and channel messaging.
milestones:
  - horizon: 0–12 months
    items:
      - Validate at least 3 paid design partners in the target beachhead
      - Ship production-ready Kalshi connector, policy console, and reconciliation workflow
      - Convert at least 2 customers from pilot to production annual contracts
      - Establish one broker or consultant referral channel
  - horizon: 12–24 months
    items:
      - Reach 6-8 production customers across funds, prop firms, and one broker-adjacent customer
      - Add reusable templates for sensitive contract classes and subaccount-heavy workflows
      - Prove expansion revenue from added desks, entities, or reporting modules
      - Launch first adjacent venue or micro-derivative rules pilot if Kalshi concentration remains a risk
  - horizon: 24–36 months
    items:
      - Reach the researched year-3 SOM case of roughly 12 customers and about $2.4M ARR-equivalent revenue
      - Become the default governance layer referenced in broker or consultant-led institutional event-contract rollouts
      - Demonstrate portability of the control plane beyond a single venue
risks:
  - risk: Regulatory changes narrow the set of tradable or institutionally acceptable contract categories.
    likelihood: High
    impact: High
    mitigation: Anchor on clearly permitted categories first and keep the product architecture portable to adjacent regulated contract types.
  - risk: The company is too dependent on one dominant venue for customer demand and technical access.
    likelihood: High
    impact: High
    mitigation: Integrate through broker and workflow partners and prepare the rules engine for adjacent distribution channels.
  - risk: Internal scripts and adjacent surveillance vendors remain good enough for early buyers.
    likelihood: Medium
    impact: High
    mitigation: Package measurable time-to-approval and month-end-close outcomes that generic tools do not provide.
  - risk: Implementation burden overwhelms early team capacity and turns the company into a services shop.
    likelihood: Medium
    impact: Medium
    mitigation: Standardize connectors, rules templates, and onboarding playbooks before scaling headcount.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds core engineering, one product/compliance hire, high-touch design-partner implementations, and enough founder-led GTM to prove two production customers plus one repeatable referral channel.
