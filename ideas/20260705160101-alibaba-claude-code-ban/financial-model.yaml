scenarios:
  downside:
    description: Production conversions slip, late Y2/Y3 hiring is partially throttled, and gross margin stays more services-heavy than planned.
    y3RevenueK: 2940.0
    y3EbitdaK: -190.0
    cashLowPointK: 440.0
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 24 instead of 35.
      - Realized revenue per production logo exits closer to roughly $170K ARR than $180K ARR.
      - Gross margin exits near 66% and the late-Y3 engineering hire slips by about one quarter.
  base:
    description: Founder-led pilots convert on one-rollout-cycle timelines, budget comes from adjacent assistant spend, and partner plus same-account expansion drive the Y3 ramp.
    y3RevenueK: 3997.0
    y3EbitdaK: 358.7
    cashLowPointK: 604.8
    keyAssumptionChanges:
      - 3 paying accounts by M12, 8 by Q4Y2, and 35 by Q4Y3.
      - Steady-state production value reaches about $180K ARR per logo in line with the researched SOM math.
      - Gross margin reaches the BP target 70% by Y3 as onboarding, evidence packaging, and routing templates standardize.
  upside:
    description: A partner channel becomes productive earlier, premium replay and retention modules attach faster, and deployment templates improve margin ahead of plan.
    y3RevenueK: 4821.0
    y3EbitdaK: 1028.0
    cashLowPointK: 828.5
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 40 instead of 35.
      - Premium retention and incident-replay modules lift blended value toward roughly $190K-$195K ARR per production logo.
      - Gross margin exits around 72% as integrations and evidence exports reuse faster across cohorts.
sensitivity:
  - variable: ARPU
    downsideCase: Seat-year pricing lands near the low end of the BP range and add-on attach is weak.
    baseCase: Production logos settle around the researched $180K ARR level.
    upsideCase: Retention and replay modules push blended production value toward about $190K-$195K ARR.
    y3RevenueImpactK: -400.0
    cashImpactK: -280.0
  - variable: CAC
    downsideCase: Partner referrals underperform and more founder time plus travel is needed to win each pilot.
    baseCase: Founder-led selling and a narrow buyer set keep CAC near $46K.
    upsideCase: One productive managed-desktop or governance partner keeps CAC closer to $40K.
    y3RevenueImpactK: -120.0
    cashImpactK: -190.0
  - variable: churn
    downsideCase: Monthly churn rises toward 3.0% if some accounts standardize on a sovereign replacement after the first year.
    baseCase: Monthly churn holds near 2.0% once the rollout gate is embedded in policy workflow.
    upsideCase: Monthly churn stays near 1.5% because the evidence and fallback runbooks become sticky.
    y3RevenueImpactK: -220.0
    cashImpactK: -160.0
  - variable: sales cycle
    downsideCase: Pilot-to-production conversion stretches from about 90 days to roughly 150 days.
    baseCase: One rollout quarter is enough to prove 72-hour approvals and an accepted fallback runbook.
    upsideCase: Security review and budget owner alignment compress conversion closer to 60 days.
    y3RevenueImpactK: -700.0
    cashImpactK: -360.0
  - variable: gross margin
    downsideCase: More deployments stay services-heavy and gross margin stalls in the mid-60s.
    baseCase: Gross margin reaches 70% by Y3 as templates and routing automation improve.
    upsideCase: Gross margin reaches roughly 72% with faster reuse of evidence exports and fallback rules.
    y3RevenueImpactK: 0.0
    cashImpactK: -240.0
  - variable: hiring pace
    downsideCase: Y3 scale hires are pulled forward before partner leverage is proven.
    baseCase: Hiring follows the BP sequencing and waits for conversion proof before scale roles are added.
    upsideCase: One late-Y3 engineering or GTM hire can slip without slowing bookings materially.
    y3RevenueImpactK: 80.0
    cashImpactK: -220.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Triggers[Regional rollout trigger] --> PaidPilots[Paid cohort-approval pilots]
      PaidPilots --> ApprovedSeats[Governed seats under policy]
      ApprovedSeats --> AnnualSubs[Annual seat subscriptions]
      AnnualSubs --> AddOns[Retention and replay modules]
      AddOns --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from moving from 3 paying accounts at Y1 exit to 35 by Q4Y3 while steady-state production value reaches the researched roughly $180K ARR per logo.
  - checkName: Must go right
    finding: Budget owners have to treat the rollout gate as an attach to existing Copilot, Cursor, or Qoder spend and same-account cohort expansion must start by the first annual renewal.
  - checkName: Model breaks if
    finding: If pilot-to-production conversion stretches beyond one rollout quarter and gross margin stalls below the mid-60s, the downside case pulls the cash floor toward roughly $0.4M even after throttling late hires.
  - checkName: Next-round proof
    finding: The seed case is 8 production logos or equivalent cohort volume by Q4Y2/Q1Y3, second-agent support, and one partner-sourced expansion that shows repeatable channel leverage.
sanityChecks:
  ruleOf40: Y3 growth 353.2% + EBITDA margin 9.0% = 362.2%
  burnMultiple: Y2 burn multiple is about 1.6x using roughly $1.1M of EBITDA burn against about $0.7M of net new ARR; Q3Y3 turns EBITDA positive.
  revenuePerFte: $333K Y3 on 12 ending FTE (benchmark $200-400K SaaS)
  flags:
    - The base case requires the company to jump from 8 to 35 paying accounts in Y3, so same-account expansion and the first partner channel both need to work earlier than in a typical enterprise SaaS ramp.
    - customersEop includes paid pilots in Y1, so recurring-only production logos trail the headline count until Y2.
    - Q4Y3 ARR reaches the researched roughly $6.3M SOM run-rate, so any narrowing of the true beachhead would force a slower hiring and revenue plan.
    - Gross margin reaches the 70% target only if onboarding, evidence packaging, and fallback runbooks become standardized rather than staying services-heavy.
    - Cash is modeled as EBITDA; enterprise prepayments, collections timing, or compliance capex could move the actual cash curve by a quarter.
