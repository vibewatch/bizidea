slug: coding-agent-rollout-gate
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: YYYY-MM
    source: '[BP date 2026-07-05] the model starts with the first full operating month after the dated plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: $2.8M
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash low point] the base case raise is sized to reach the Q4Y2/Q1Y3 seed-proof milestone and still hold about six months of peak-burn buffer.'
  - id: A3
    name: Starting paying accounts
    value: '0'
    unit: count
    source: '[BP milestones 0-12 months] the company starts pre-revenue and must first convert design partners into paid pilots.'
  - id: A4
    name: Paying account definition
    value: A paid pilot or annual production customer governing at least one cohort.
    unit: definition
    source: '[BP businessModel.revenueStreams + BP gtm.pricing] customersEop counts any account already paying for pilot or production scope.'
  - id: A5
    name: Pilot economics
    value: $60K over roughly 2 months (~$30K/mo)
    unit: USD/account
    source: '[BP investorMemo.firstCustomer.initialContract $40k-$80k pilot] the model uses the midpoint pilot fee for early cohort-approval projects.'
  - id: A6
    name: Production subscription economics
    value: $180K ARR per production logo (~1,500 seats × $120 governed seat-year attach)
    unit: USD/account/year
    source: '[BP gtm.pricing $80-$150 seat-year + Research market.som 35 logos × 1,500 seats × $120] steady-state pricing matches the researched governance attach and the BP annual contract range.'
  - id: A7
    name: Customer ramp
    value: 3 paying accounts by M12, 8 by Q4Y2, and 35 by Q4Y3.
    unit: customersEop
    source: '[BP milestones + BP experimentRoadmap + BP gtm.channels + Research market.som] base case assumes founder-led pilots in Y1, repeatable production conversions in Y2, and partner plus same-account expansion in Y3.'
  - id: A8
    name: Revenue recognition convention
    value: 'Revenue equals period-end paying accounts × blended realized revenue per account for that period: Y1 about $17K-$22K/month, Y2 about $33K-$42K/quarter, Y3 about $42K-$45K/quarter.'
    unit: formula
    source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] this reconciles customer counts to the pilot-to-production pricing mix.'
  - id: A9
    name: Gross margin ramp
    value: 0% pre-revenue; 35%-45% in monetized Y1 months; 52%-66% in Y2; 68%-70% in Y3.
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + startup-finance heuristic] high-touch onboarding and evidence work depress early margins before templates and routing automation mature.'
  - id: A10
    name: Hiring timeline
    value: M1 founder CEO, founding engineer, and founding product/security; M5 solutions/integrations; M10 customer success; M13 first sales/partnerships; M16 engineer 2; M22 engineer 3; M27 solutions 2; M29 sales 2; M31 G&A; M33 engineer 4.
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until pilot conversion proof exists, then adds delivery and GTM capacity ahead of the Y3 expansion push.'
  - id: A11
    name: Founder loaded compensation
    value: $170K
    unit: USD/year
    source: '[BP team Founder CEO + startup-finance heuristic] lean pre-seed founder cash compensation plus payroll taxes and benefits.'
  - id: A12
    name: Engineering loaded compensation
    value: $200K
    unit: USD/year
    source: '[BP team Founding eng + startup-finance heuristic] senior applied-security and platform engineering talent is required, but pre-seed cash pay stays below public-company levels.'
  - id: A13
    name: Product / security loaded compensation
    value: $180K
    unit: USD/year
    source: '[BP team Founding product/security + startup-finance heuristic] reflects a technical policy owner who can run pilots and shape auditable controls.'
  - id: A14
    name: Solutions / integrations loaded compensation
    value: $165K
    unit: USD/year
    source: '[BP team Solutions and integrations engineer + startup-finance heuristic] this role must implement managed-desktop, proxy, and fallback integrations in customer environments.'
  - id: A15
    name: Customer success loaded compensation
    value: $145K
    unit: USD/year
    source: '[BP team Customer success and implementation lead + startup-finance heuristic] covers production onboarding and same-account expansion support without building a large services bench.'
  - id: A16
    name: Sales / partnerships loaded compensation
    value: $180K
    unit: USD/year
    source: '[BP gtm.channels + startup-finance heuristic] includes concentrated enterprise outreach, partner management, and variable comp for a niche security workflow sale.'
  - id: A17
    name: G&A / ops loaded compensation
    value: $120K
    unit: USD/year
    source: '[BP operations + startup-finance heuristic] covers finance, vendor management, insurance, and basic compliance operations once production scale appears.'
  - id: A18
    name: Payroll allocation to P&L lines
    value: Founder 55% S&M / 20% R&D / 25% G&A; engineering 100% R&D; product/security 75% R&D / 25% G&A; solutions 35% S&M / 65% R&D; customer success 60% S&M / 40% G&A; sales 100% S&M; G&A 100% G&A.
    unit: allocation
    source: '[BP team role rationales + BP operations] this maps payroll into functional lines while keeping implementation-heavy delivery visible.'
  - id: A19
    name: Non-payroll opex ramp
    value: Monthly non-payroll spend starts at S&M/R&D/G&A of $4K/$10K/$6K and exits Y3 around $25K/$20K/$12K per month.
    unit: USD/month
    source: '[BP operations + startup-finance heuristic] covers cloud, travel, partner motion, legal, audit, and insurance without assuming a heavy paid-demand engine.'
  - id: A20
    name: Cash conversion convention
    value: Cash movement equals EBITDA.
    unit: formula
    source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale.'
  - id: A21
    name: Steady-state monthly logo churn
    value: 2.0%
    unit: percent per month
    source: '[startup-finance heuristic for early enterprise workflow SaaS + BP key bets on same-account expansion] once embedded in rollout policy, logos should be sticky but the model still assumes meaningful early-stage churn.'
  - id: A22
    name: CAC convention
    value: Total 36-month sales and marketing spend divided by 35 net new paying accounts.
    unit: formula
    source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led enterprise selling plus partner introductions across the full buildout period.'
  - id: A23
    name: Next-round milestone for funding sizing
    value: By Q4Y2/Q1Y3 the company should have 8 production logos or equivalent paid cohort volume, second-agent support, and at least one partner-sourced expansion.
    unit: milestone
    source: '[BP milestones 12-24 months + BP product.twelveMonth + BP experimentRoadmap 9-18 months] the pre-seed is sized to reach seed-ready proof on conversion, expansion, and channel credibility.'
  - id: A24
    name: Quarterly salary-roll convention
    value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots.
    unit: convention
    source: '[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the monthly hiring ramp.'
  - id: A25
    name: Base sales cycle
    value: Roughly 90 days from paid pilot start to annual production conversion.
    unit: days
    source: '[BP experimentRoadmap 3-6 months and 6-12 months + BP gtm.wedge] early customers should decide inside one rollout cycle if approval speed and fallback continuity improve.'
