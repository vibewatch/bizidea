  - point: AI 网关和云端模型托管商是天然的技术伙伴，能帮上回退路径的执行、成本控制和集中遥测。
    sourceRefs:
    - 23
    - 24
    - 25
    - 26
  - point: 身份、策略和审计生态很关键，因为企业级上线需要的是配发好的访问权限、托管配置和可导出的证据，而不是随手写的脚本。
    sourceRefs:
    - 11
