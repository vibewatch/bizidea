    - 20
    - 21
    - 33
  - point: AI 治理和安全编程咨询公司能帮忙开拓客户，因为它们本来就在为企业编程助手做就绪度评审和策略设计。
    sourceRefs:
    - 29
    - 32
    - 36
  partnershipEcosystem:
  - point: 底层编程智能体厂商和 IDE 是互补关系，因为这家创业公司是在它们之间做路由，而不是想把它们整个取代掉。
    sourceRefs:
