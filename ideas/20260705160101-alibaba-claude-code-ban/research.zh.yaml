competitors:
- name: GitHub Copilot Enterprise
  stage: 现有厂商
  wedge: GitHub 原生编程助手，具备企业策略、用量预算、内容排除和代码评审工作流。
  pricing: Enterprise 套餐 $39/user/month；Business 套餐 $19/user/month
  strength: 在以 GitHub 为核心的工程团队里，预算和管理流程早已嵌入到位。
  weaknessVsUs: 单一厂商的管控没法独立比较不同智能体间的隐藏行为，也不能把有风险的群组自动重新路由到替代方案。
  sourceRefs:
  - 10
  - 11
  - 12
- name: Cursor Enterprise
  stage: 成长型公司
  wedge: AI IDE，具备企业级管理、隐私模式、SSO/SCIM、代码库与模型管控，深受开发者青睐。
  pricing: Teams 套餐 $40/user/month；Enterprise 套餐定制报价
  strength: 开发者拉力和企业级包装都很强；Cursor 宣称获得了 64% 的财富 500 强企业信赖。
  weaknessVsUs: 产品设计的出发点仍是让企业采用 Cursor 本身，而不是做中立的跨厂商群组测试或经批准的回退路由。
  sourceRefs:
  - 17
  - 18
  - 19
- name: Qoder Enterprise
  stage: 现有厂商
  wedge: 主权/本地优先的企业编程平台，具备 SSO/RBAC/SCIM、知识引擎和团队管控。
  pricing: Teams 套餐 $40/seat-month；Enterprise 套餐 $20/seat-month，另加点数费用
  strength: 对中国关联或数据主权敏感的群组来说，是评估下来最强的替代方案。
  weaknessVsUs: 解决问题的方式是整体切换厂商和工作流，而不是在多款智能体之间保留一套中立控制平面。
  sourceRefs:
  - 20
  - 21
  - 22
- name: Portkey
  stage: 成长型公司
  wedge: AI 网关，提供统一 API、路由、护栏机制、组织级审计日志和模型故障切换。
  pricing: Production 套餐 $49/month；Enterprise 套餐定制报价
  strength: 在跨多个模型提供商的路由、可观测性和可靠性上，是最接近的相邻控制平面竞品。
  weaknessVsUs: 本质上是 API 层基础设施，管不到 IDE 上线审批、群组基准测试，也做不了编程智能体的隐藏提示词/遥测差异比对。
  sourceRefs:
  - 23
  - 24
- name: Cloudflare AI Gateway
  stage: 现有厂商
  wedge: 托管式 AI 应用控制平面，具备动态路由、缓存、日志和 DLP。
  pricing: 按用量计费 / 联系销售
  strength: 全球基础设施实力雄厚，请求层的路由和可观测性原语也很成熟。
  weaknessVsUs: 管的主要是模型流量，管不到开发者群组策略、上线前回放，也做不了跨厂商编程智能体的保障。
  sourceRefs:
  - 25
  - 26
regulatoryTechnicalConstraints:
- point: 跨境传输和数据驻留方面的要求，需要对提示词、代码上下文和日志的流向做可审计的管控。
