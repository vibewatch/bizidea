openQuestions:
- 企业编程智能体上线中，真正属于群组特有行为漂移、而非泛泛法务或安全异议的情况有多频繁？
- 买家会不会接受在受管开发者电脑上做终端埋点，还是产品必须只靠中继和配置驱动？
- Qoder 式的主权替代主要是中国/亚太地区的模式，还是类似的本地智能体需求会扩散到其他地区？
- 实际操作中谁会先签字批预算：Copilot 或 Cursor 的席位负责人、CISO，还是开发者平台负责人？
