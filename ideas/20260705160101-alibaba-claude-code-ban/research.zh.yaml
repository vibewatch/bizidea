    - 19
    - 33
  dataMoats:
  - point: 一套跨群组的基准语料库——记录真实代理网络、VDI 和区域环境下提示词、工具调用和访问权限的差异——会随着每一次客户上线不断积累变厚。
    sourceRefs:
    - 1
    - 15
    - 16
  - point: 前沿厂商与本地替代方案之间的安全故障切换规则，见过的真实事件和策略边界情况越多，护城河就越深。
    sourceRefs:
    - 20
    - 21
    - 23
    - 25
  - point: 一条记录哪些厂商行为导致了阻断、误报或生产力损失的长期证据链，任何一家助手厂商都很难中立地重新造出来。
    sourceRefs:
    - 4
