differentiator: 大多数周边产品是从通用 AI 网关、席位管理或事后可观测性切入。这家公司抓的则是部署前和线上群组的信任问题：同一个编程智能体，为什么会在不同地理位置或网络环境里，对不同开发者表现出不同隐藏行为；以及怎么在不改变 IDE 习惯的前提下，直接绕开这些差异。这样积出来的专有数据，就是厂商政策漂移、误判环境和安全回退规则——这些都不是终端安全工具或通用 AI 网关自然会长出来的。
