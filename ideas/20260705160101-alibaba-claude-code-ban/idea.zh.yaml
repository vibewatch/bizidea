topRisks:
- name: 厂商不透明度继续加深
  description: 大型编程智能体厂商可能把隐藏提示词、遥测或策略信号藏得更深，单靠代理侧观察就更难看清。
  mitigation: 同时使用端点探针、受控回放节点和厂商认可的企业部署模式，避免产品只依赖一个观察点。
- name: 客户直接选择全面封禁
  description: 部分安全团队遇到信任事件后，可能直接禁用外部编程智能体，而不是购买一层控制系统。
  mitigation: 优先卖给仍在积极推进上线、且全球团队结构复杂的组织，并量化按群组控制如何在不逼用户二选一的情况下守住生产力。
- name: 工具组合太多
  description: 不同 IDE、CLI、代理和 VDI 组合，会让稳定的会话差异测试在运营上变得复杂。
  mitigation: 先从 Claude Code、Cursor、VS Code 和受管 VDI 基线做起，再沿着基准环境和伙伴集成往外扩。
