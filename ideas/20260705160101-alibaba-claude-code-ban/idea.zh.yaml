jobsToBeDone:
- job: 当我们想把编程智能体推向多个地区的团队时，帮安全和开发者平台团队按群组比较隐藏的厂商行为，这样我们就能在不把工具一刀切封掉的前提下，批准安全访问。
  currentAlternative: 人工试点、一刀切地区封禁、厂商问卷和临时代理测试。
  successMetric: 新增地区或外包群组的审批时间，从数周降到 72 小时以内。
- job: 当厂商改了地理检查或悄悄改写提示词行为时，帮我们把受影响的工程师切到获批回退路径，并保留审计链路，这样发布工作就不用因为全公司范围停用而中断。
  currentAlternative: 紧急采购本地工具，再从笔记本和网络日志里手工还原事故。
  successMetric: 检测并控制政策漂移的平均时间压到 30 分钟以内，受影响团队的迭代承诺零失手。
