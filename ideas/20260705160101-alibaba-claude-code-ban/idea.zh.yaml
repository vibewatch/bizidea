problem: 全球工程组织已经开始让编程智能体查看内部大仓、起草代码、从开发者笔记本上直接跑修复，但真正决定谁会被标记、会检查哪些遥测、提示词会不会被悄悄改写的那层厂商侧逻辑，并不在企业手里。一旦服务商隔夜加上隐藏的地理或反蒸馏规则，安全团队就只剩两条路：一刀切封禁，或紧急切到本地替代工具。前者会打乱发布节奏，后者会拖慢外包团队生产力。现有 IAM、DLP 和 AI 网关管的是凭证和 API 用量，管不到 IDE 智能体在不同地区、代理和托管桌面环境里的具体行为。
targetUser:
  primary: 1,000–10,000 人的 SaaS、电商或电子企业里，负责推进 Claude Code 试点的开发者平台 VP 或平台安全总监；这些试点横跨美国、印度和与中国相关的外包团队。
  secondary: 负责获批编程工具和受管工程桌面的开发者体验负责人，或 AI 治理负责人。
  buyer: CISO 或开发者平台 VP。
startupThesis:
  nonObviousInsight: 编程智能体的新失效模式，不只是代码质量差或密钥泄露，而是群组级的厂商行为漂移：同一套代码库里，开发者会因为地理位置、代理或反滥用启发式规则不同，收到不同的隐藏检查、提示词变体或访问结果。
  beachhead: 那些正在把前沿编程智能体铺向美国、印度和与中国大陆相关工程群组的大型开发者平台团队，会成为第一批滩头市场。这些团队通常分布在 1,000–10,000 人的 SaaS、电商和电子企业里，共用同一套 GitHub Enterprise 仓库和内部大仓。
  wedge: 产品的切口是一道编程智能体上线闸门：从每个开发者群组回放标准任务，对比隐藏提示词和遥测行为差异，再把高风险群组自动路由到获批的替代或本地智能体，全程不改变 IDE 使用习惯。
  whyNowCatalyst: Alibaba 在同一周内因被报道存在隐藏地理识别和提示词标记行为，从 Claude Code 转向 Qoder。这说明企业需要先给编程智能体补上一层信任和回退路径，否则厂商政策一漂移，工程工作就会停摆。
  ventureScalePath: 先从全球工程团队的编程智能体上线审批切入，再扩到 CI 智能体、代码评审智能体、内部辅助智能体，最后变成一张跨厂商保障网络，去治理每一次高权限企业智能体会话。
solution: 产品把客户自控的中继层和轻量端点探针整合在一起，覆盖 Claude Code、Cursor 及类似 IDE 智能体。正式上线前，它会从每个地区、VDI 镜像和代理配置回放一套基准编程任务，对比隐藏提示词变更、工具调用行为、遥测去向和访问结果。安全和开发者平台负责人随后批准一套群组策略，明确哪些开发者群组在什么网络条件下可以使用哪些厂商；一旦行为漂移，系统会自动回退到获批的替代或本地智能体。上线后，平台会记录每个会话的厂商版本、策略指纹和路由决策，让团队排查事故、证明合规时，不用把整轮上线全部关停。久而久之，它会变成企业编程智能体的信任注册表和连续性控制平面。
goToMarketSeed:
  firstCustomer: 一家总部在新加坡的软件公司，约有 1,500 名工程师，VS Code 桌面统一受管，150 名外包在与中国大陆相关的 VDI 环境里工作，后端团队正在积极试点 Claude Code。
  buyingTrigger: 安全审查，或区域扩张节点。尤其是当公司要把编程智能体试点从一个工程中心扩到第二个地区或外包群组时。
  currentAlternative: 一刀切地区封禁、厂商问卷、人工试点测试，以及自研中继脚本或 VDI 隔离。
  switchingReason: 首个客户会切换过来，是因为这道上线闸门既能让全球团队维持同一种开发者体验，也能拿出安全与合规证据；更重要的是，它只把高风险群组改道，不用把工具对所有人一起关掉。
  pricingHypothesis: 采用年度订阅，按纳管的开发者席位和活跃编程智能体群组计费；长期证据留存和事故回放再做高阶增购。
