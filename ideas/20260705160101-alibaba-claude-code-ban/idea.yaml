topRisks:
  - name: "Vendor opacity hardens"
    description: "Major coding-agent vendors could further obscure hidden prompts, telemetry, or policy signals, reducing visibility from a proxy alone."
    mitigation: "Use a mix of endpoint instrumentation, controlled replay nodes, and vendor-approved enterprise deployment modes so the product does not rely on one observation point."
  - name: "Customers choose outright bans"
    description: "Some security teams may respond to trust incidents by banning external coding agents instead of buying a control layer."
    mitigation: "Sell into organizations with active rollout mandates and mixed global teams, and quantify how cohort-specific controls preserve productivity without forcing an all-or-nothing decision."
  - name: "Too many tool permutations"
    description: "Different IDEs, CLIs, proxies, and VDI stacks could make reliable session diffing operationally complex."
    mitigation: "Start with Claude Code, Cursor, VS Code, and managed VDI baselines, then expand from benchmarked reference environments and partner integrations."
