scenarios:
  downside:
    description: 生产转化变慢，Y2/Y3 后段招聘被部分节流，毛利率也比计划更偏服务化。
    y3RevenueK: 2940.0
    y3EbitdaK: -190.0
    cashLowPointK: 440.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 约为 24，而不是 35。
    - 每个生产客户的实际收入收在约 $170K ARR，而不是 $180K ARR。
    - 毛利率收在约 66%，且 Y3 后段的工程招聘延后约 1 个季度。
  base:
    description: 创始人主导的试点按 1 个上线周期转化，预算来自相邻的智能体支出，合作伙伴和同账户扩张共同拉动 Y3 爬坡。
    y3RevenueK: 3997.0
    y3EbitdaK: 358.7
    cashLowPointK: 604.8
    keyAssumptionChanges:
    - 到 M12 有 3 个付费账户，到 Q4Y2 增至 8 个，到 Q4Y3 达到 35 个。
    - 稳态生产价值按研究测算，达到每个客户约 $180K ARR。
    - 随着客户导入、证据打包和路由模板标准化，毛利率在 Y3 达到 BP 目标的 70%。
  upside:
    description: 合作伙伴渠道更早跑起来，高级回放和留存模块更快附着，部署模板也提前改善毛利率。
    y3RevenueK: 4821.0
    y3EbitdaK: 1028.0
    cashLowPointK: 828.5
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 约为 40，而不是 35。
    - 留存和事故回放高级模块把混合价值抬到每个生产客户约 $190K-$195K ARR。
    - 随着集成和证据导出在不同群组间复用得更快，毛利率收在约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 每席位每年定价落在 BP 区间低端，附加模块挂载也偏弱。
  baseCase: 生产客户稳定在研究给出的 $180K ARR 水平附近。
  upsideCase: 留存和事故回放模块把混合客单价推向约 $190K-$195K ARR。
  y3RevenueImpactK: -400.0
  cashImpactK: -280.0
- variable: CAC
  downsideCase: 合作伙伴转介绍不及预期，每拿下 1 个试点都得投入更多创始人时间和差旅。
  baseCase: 创始人主导销售加上收窄买方集合，让 CAC 维持在接近 $46K。
  upsideCase: 只要 1 个受管控桌面或治理伙伴真正跑通，CAC 就能更接近 $40K。
  y3RevenueImpactK: -120.0
  cashImpactK: -190.0
- variable: 流失率
  downsideCase: 如果部分账户在第一年后统一切到主权替代方案，月度流失率会抬到接近 3.0%。
  baseCase: 一旦上线闸门嵌进策略工作流，月度流失率就稳定在接近 2.0%。
  upsideCase: 由于证据和回退手册变得有粘性，月度流失率会维持在接近 1.5%。
  y3RevenueImpactK: -220.0
  cashImpactK: -160.0
- variable: 销售周期
  downsideCase: 从试点转生产的转化时间会从约 90 天拉长到约 150 天。
  baseCase: 1 个上线季度就足以证明 72 小时审批和一套被接受的回退手册。
  upsideCase: 如果安全审查和预算负责人对齐更顺，转化时间可压到接近 60 天。
  y3RevenueImpactK: -700.0
  cashImpactK: -360.0
- variable: 毛利率
  downsideCase: 更多部署会继续偏服务化，毛利率卡在 60% 多的中段。
  baseCase: 随着模板和路由自动化改善，毛利率在 Y3 达到 70%。
  upsideCase: 随着证据导出和回退规则复用更快，毛利率可达到约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -240.0
- variable: 招聘节奏
  downsideCase: 在还没证明合作伙伴杠杆前，Y3 的规模化招聘就被提前拉动。
  baseCase: 招聘按 BP 的排序推进，先等转化验证跑出来，再补规模化岗位。
  upsideCase: Y3 后段即便少招 1 名工程或 GTM 人员，也不会明显拖慢签单。
  y3RevenueImpactK: 80.0
  cashImpactK: -220.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  Triggers[Regional rollout trigger] --> PaidPilots[Paid cohort-approval pilots]\n  PaidPilots --> ApprovedSeats[Governed seats under policy]\n  ApprovedSeats --> AnnualSubs[Annual seat subscriptions]\n  AnnualSubs --> AddOns[Retention and replay modules]\n  AddOns --> Revenue[Revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash and runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎来自这样一条爬坡：Y1 末有 3 个付费账户，到 Q4Y3 增至 35 个，同时稳态生产价值达到研究给出的每客户约 $180K ARR。
- checkName: 必须成立
  finding: 预算负责人必须把上线闸门视为既有 Copilot、Cursor 或 Qoder 支出的附加层，而同账户的群组扩张也必须在第一次年续前启动。
- checkName: 模型会失效，如果
  finding: 如果试点转生产超过 1 个上线季度，且毛利率始终上不去、卡在 60% 多的中段，那么即便压住后段招聘，悲观情形下的现金底也会被拖向约 $0.4M。
- checkName: 下一轮证明点
  finding: seed 轮要看的证明点是到 Q4Y2/Q1Y3 做到 8 个生产客户或等量群组体量、支持第 2 个智能体，并拿下 1 个来自合作伙伴的扩张案例，证明渠道杠杆可以复制。
sanityChecks:
  ruleOf40: Y3 增长 353.2% + EBITDA 利润率 9.0% = 362.2%
  burnMultiple: Y2 的烧钱倍数约为 1.6x：约 $1.1M 的 EBITDA 亏损，对应约 $0.7M 的净新增 ARR；Q3Y3 转为 EBITDA 为正。
  revenuePerFte: Y3 为 $333K，对应期末 12 名 FTE（SaaS 基准为 $200-400K）
  flags:
  - 基准情形要求公司在 Y3 把付费账户从 8 个跳到 35 个，所以同账户扩张和第一条合作伙伴渠道都得比典型企业 SaaS 爬坡更早跑通。
  - customersEop 在 Y1 把付费试点也算进去，因此只看经常性收入的生产客户数，要到 Y2 才会追上总口径。
  - Q4Y3 的 ARR 达到研究测算约 $6.3M 的 SOM 运行率，因此只要真实滩头市场变窄，招聘和收入计划都必须放慢。
  - 只有当客户导入、证据打包和回退手册实现标准化，而不是继续重服务化，毛利率才能达到 70% 目标。
  - 模型把现金按 EBITDA 处理；企业预付款、回款时点或合规资本开支，都可能让真实现金曲线前后偏移 1 个季度。
