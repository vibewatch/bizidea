slug: coding-agent-rollout-gate
date: '2026-07-05'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-05] 模型从该计划日期后的第一个完整运营月开始。'
- id: A2
  name: 期初现金 / pre-seed 轮融资
  value: $2.8M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash low point] 基准情形的融资额，按能撑到 Q4Y2/Q1Y3 的 seed 验证里程碑来定，同时还要保留约 6 个月的峰值烧钱缓冲。'
- id: A3
  name: 期初付费账户数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司从营收前起步，必须先把共创客户转成付费试点。'
- id: A4
  name: 付费账户定义
  value: 至少覆盖 1 个群组的付费试点客户，或年度生产客户。
  unit: definition
  source: '[BP businessModel.revenueStreams + BP gtm.pricing] customersEop 统计的是所有已经为试点或生产范围付费的账户。'
- id: A5
  name: 试点单位经济模型
  value: 约 2 个月合计 $60K（约 $30K/月）
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract $40k-$80k pilot] 模型对早期群组审批项目采用试点费用中位数。'
- id: A6
  name: 生产订阅单位经济模型
  value: 每个生产客户 $180K ARR（约 1,500 个席位 × 每受治理席位每年 $120 的附加收费）
  unit: USD/account/year
  source: '[BP gtm.pricing $80-$150 seat-year + Research market.som 35 logos × 1,500 seats × $120] 稳态定价与研究给出的治理附加收费，以及 BP 的年度合同区间一致。'
- id: A7
  name: 客户爬坡
  value: 到 M12 有 3 个付费账户，到 Q4Y2 增至 8 个，到 Q4Y3 达到 35 个。
  unit: customersEop
  source: '[BP milestones + BP experimentRoadmap + BP gtm.channels + Research market.som] 基准情形假设：Y1 由创始人主导试点，Y2 跑通可复制的生产转化，Y3 靠合作伙伴和同账户扩张放大。'
- id: A8
  name: 收入确认口径
  value: 收入 = 期末付费账户数 × 当期每账户的混合实际收入：Y1 约 $17K-$22K/月，Y2 约 $33K-$42K/季度，Y3 约 $42K-$45K/季度。
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] 这个口径把客户数和从试点到生产的定价结构对上。'
- id: A9
  name: 毛利率爬坡
  value: 营收前为 0%；Y1 有收入的月份为 35%-45%；Y2 为 52%-66%；Y3 为 68%-70%。
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + startup-finance heuristic] 在模板和路由自动化成熟前，高触达客户导入和证据工作会压低早期毛利。'
- id: A10
  name: 招聘时间表
  value: M1 配置创始人/CEO、创始工程师和创始产品/安全负责人；M5 配置解决方案/集成；M10 配置客户成功；M13 配置首名销售/渠道合作；M16 配置第 2 名工程师；M22 配置第 3 名工程师；M27 配置第 2 名解决方案；M29 配置第 2 名销售；M31 配置 G&A；M33 配置第 4 名工程师。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在拿到试点转化验证前，团队保持精干；验证出现后，再在 Y3 扩张前补实施和 GTM 产能。'
- id: A11
  name: 创始人综合薪酬成本
  value: $170K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] 对应精简的 pre-seed 创始人现金薪酬，再加工资税和福利。'
- id: A12
  name: 工程综合薪酬成本
  value: $200K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 需要资深应用安全和平台工程人才，但 pre-seed 现金薪酬仍低于上市公司水平。'
- id: A13
  name: 产品 / 安全综合薪酬成本
  value: $180K
  unit: USD/year
  source: '[BP team Founding product/security + startup-finance heuristic] 反映的是一位既能跑试点、又能塑造可审计控制的技术型策略负责人。'
- id: A14
  name: 解决方案 / 集成综合薪酬成本
  value: $165K
  unit: USD/year
  source: '[BP team Solutions and integrations engineer + startup-finance heuristic] 这个角色必须在客户环境里落地受管控桌面、代理和回退路径集成。'
- id: A15
  name: 客户成功综合薪酬成本
  value: $145K
  unit: USD/year
  source: '[BP team Customer success and implementation lead + startup-finance heuristic] 覆盖生产导入和同账户扩张支持，不必搭一支很大的服务团队。'
- id: A16
  name: 销售 / 渠道合作综合薪酬成本
  value: $180K
  unit: USD/year
  source: '[BP gtm.channels + startup-finance heuristic] 覆盖高度聚焦的企业外联、伙伴管理，以及出售小众安全工作流所需的浮动激励。'
- id: A17
  name: G&A / 运营综合薪酬成本
  value: $120K
  unit: USD/year
  source: '[BP operations + startup-finance heuristic] 当生产规模出现后，覆盖财务、供应商管理、保险和基础合规运营。'
- id: A18
  name: 工资分摊到 P&L 的口径
  value: 创始人 55% S&M / 20% R&D / 25% G&A；工程 100% R&D；产品/安全 75% R&D / 25% G&A；解决方案 35% S&M / 65% R&D；客户成功 60% S&M / 40% G&A；销售 100% S&M；G&A 100% G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 这把工资映射到各条 P&L 科目，同时让实施占比较高的交付成本保持可见。'
- id: A19
  name: 非薪酬运营费用爬坡
  value: 非薪酬月度支出从 S&M/R&D/G&A 的 $4K/$10K/$6K 起步，到 Y3 末约为每月 $25K/$20K/$12K。
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 覆盖云、差旅、渠道推进、法务、审计和保险，不假设会重投付费获客。'
- id: A20
  name: 现金转换口径
  value: 现金变动 = EBITDA。
  unit: formula
  source: '[startup-finance heuristic] 在 pre-seed 规模下，默认 capex、税、融资费用和营运资金时点影响都不重要。'
- id: A21
  name: 稳态月度客户流失率
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP key bets on same-account expansion] 一旦嵌入上线策略，客户粘性应该不弱，但模型仍假设早期存在有分量的流失。'
- id: A22
  name: CAC 口径
  value: 36 个月总销售与市场费用 ÷ 35 个净新增付费账户。
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 这个口径覆盖了整个搭建期的创始人主导企业销售和渠道引荐。'
- id: A23
  name: 融资规模对应的下一轮里程碑
  value: 到 Q4Y2/Q1Y3，公司应拥有 8 个生产客户或等量的付费群组体量、支持第 2 个智能体，并至少拿到 1 个来自合作伙伴的扩张案例。
  unit: milestone
  source: '[BP milestones 12-24 months + BP product.twelveMonth + BP experimentRoadmap 9-18 months] 这笔 pre-seed 融资按能跑到可进入 seed 轮的验证来定：既要证明转化和扩张，也要证明渠道可信。'
- id: A24
  name: 季度薪酬滚动口径
  value: Y2-Y3 的薪酬行按各季度内的实际月度入职计算，而不是只看季度末快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 这样能让薪酬费用与按月爬坡的招聘节奏保持内部一致。'
- id: A25
  name: 基准销售周期
  value: 从付费试点开始到转成年费生产合同，约 90 天。
  unit: days
  source: '[BP experimentRoadmap 3-6 months and 6-12 months + BP gtm.wedge] 如果审批速度和回退路径连续性改善，早期客户应能在 1 个上线周期内做出决定。'
