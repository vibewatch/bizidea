competitors:
- name: GitHub Copilot Enterprise
  stage: incumbent
  wedge: GitHub-native coding assistant with enterprise policies, usage budgets, content exclusion, and code-review workflows.
  pricing: $39/user/month Enterprise; $19/user/month Business
  strength: Already budgeted and administratively embedded in GitHub-centric engineering organizations.
  weaknessVsUs: Single-vendor controls do not independently compare hidden behavior across agents or automatically reroute risky cohorts to alternates.
  sourceRefs:
  - 10
  - 11
  - 12
- name: Cursor Enterprise
  stage: scale-up
  wedge: AI IDE with enterprise admin, privacy mode, SSO/SCIM, repository and model controls, and strong developer affinity.
  pricing: Teams $40/user/month; Enterprise custom
  strength: Developer pull and enterprise packaging are strong; Cursor claims trust at 64% of Fortune 500 companies.
  weaknessVsUs: Still optimized for adopting Cursor itself, not for neutral cross-vendor cohort testing or approved fallback routing.
  sourceRefs:
  - 17
  - 18
  - 19
- name: Qoder Enterprise
  stage: incumbent
  wedge: Sovereign/local-first enterprise coding platform with SSO/RBAC/SCIM, knowledge engine, and team controls.
  pricing: Teams $40/seat-month; Enterprise $20/seat-month plus credits
  strength: Strongest reviewed replacement option for China-linked or sovereignty-sensitive cohorts.
  weaknessVsUs: Solves the problem by switching vendors and workflows, not by preserving one neutral control plane across multiple agents.
  sourceRefs:
  - 20
  - 21
  - 22
- name: Portkey
  stage: scale-up
  wedge: AI gateway with unified API, routing, guardrails, org-wide audit logs, and model failover.
  pricing: $49/month Production; enterprise custom
  strength: Closest adjacent control-plane competitor for routing, observability, and reliability across multiple model providers.
  weaknessVsUs: Mostly API-layer infrastructure; it does not own IDE rollout approvals, cohort benchmarking, or hidden prompt/telemetry diffing for coding agents.
  sourceRefs:
  - 23
  - 24
- name: Cloudflare AI Gateway
  stage: incumbent
  wedge: Managed AI application control plane with dynamic routing, caching, logs, and DLP.
  pricing: Usage-based / contact sales
  strength: Strong global infrastructure and mature request-layer routing and observability primitives.
  weaknessVsUs: Primarily manages model traffic, not developer-cohort policy, pre-rollout replay, or cross-vendor coding-agent assurance.
  sourceRefs:
  - 25
  - 26
