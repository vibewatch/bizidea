  validationPlan:
  - priority: high
    question: How many 1,000-10,000 employee software, ecommerce, and electronics companies already run coding-agent pilots across at least two regions or contractor pools?
    evidenceToGather: Design-partner pipeline interviews, reseller and deployment-partner data, and rollout counts from managed desktop or AI-governance consultancies.
  - priority: high
    question: Do buyers pay for a neutral rollout gate separately, or must it piggyback on Copilot, Cursor, or broader security budgets?
    evidenceToGather: Pricing interviews tied to live Copilot/Cursor/Qoder renewal cycles plus joint workshops with CISO and developer-platform owners.
  - priority: medium
    question: What percentage of rollout blockers are truly cohort-specific behavior drift versus generic legal or security objections?
    evidenceToGather: Postmortems from at least 10 coding-agent pilot reviews, tagged by issue type, region, and resolution path.
  - priority: medium
    question: Can benchmark replay detect enough meaningful differences to justify auto-routing rather than human-only escalation?
    evidenceToGather: Controlled pilots that replay the same task suite across regions, proxies, and approved fallback agents, then compare drift detection against human review outcomes.
