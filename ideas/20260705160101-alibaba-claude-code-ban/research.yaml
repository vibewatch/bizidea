openQuestions:
- How often do enterprise coding-agent rollouts encounter truly cohort-specific behavior drift rather than generic legal or security objections?
- Will buyers accept endpoint instrumentation on managed developer desktops, or must the product stay relay- and settings-driven?
- Is Qoder-style sovereign replacement mostly a China/APAC pattern, or will similar local-agent requirements spread to other regions?
- 'Which budget owner signs first in practice: the Copilot or Cursor seat owner, the CISO, or the developer-platform leader?'
