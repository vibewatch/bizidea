slug: ai-model-swap-qualifier
date: "2026-06-28"
executiveSummary: >-
  AI Model Swap Qualifier 应以日本优先、工作流级认证层的定位起步，服务于必须在企业客户批准迁移前证明
  Sakana Fugu 备选方案安全有效的中型系统集成商。第一个客户是一家 200–500 人的东京 SI，拥有金融服务或
  制造业的文档分析、摘要或对话工作流，并已收到客户的书面要求提供审计级迁移证据。产品不应以宽泛的 LLM
  可观测套件上线，因为眼前的预算时机只有一个工作流、一个审批委员会和一个模型替换决策——报告本身就是
  撬动支出的产品。研究将市场规模估算为 TAM 约 $60.6M、日本滩头市场 SAM $21.2M、第三年 SOM 建模值 $0.9M，
  因此只有当每次认证都能转化为可复用的基准资产、审批模板和持续再认证收入时，公司才具备真正的吸引力。
  产品路径应从高触达的按工作流认证出发，在首批报告通过采购和风险团队验收后，再扩展到监控、漂移预警和定期重跑。
  公司能赢，是因为它成为了云评测工具、模型提供商和水平型 LLM-Ops 厂商默认不提供的那份中立审批文件——
  尤其针对日语工作流和保守型企业审批场景。最大的否定性风险在于：中型日本 SI 实际上依赖 Anthropic 级模型的
  数量可能少于预期，且采购委员会可能在没有标准机构背书的情况下拒绝第三方报告；这两个缺口在研究中仍未封闭，
  应影响资金消耗速度和招聘节奏。因此，这应当以 pre-seed 验证轮而非规模轮来融资，直到付费试点、报告验收和
  持续监控需求都得到证明为止。
problem:
  - >-
    拥有基于 Anthropic 生产工作流的中型日本 SI，可能在出口管制时间线内失去模型访问，
    但仍须向企业客户提供书面的连续性计划。
  - >-
    用 Sakana Fugu 或其他区域模型替换 Claude 级工作流，需要针对工作流的质量、安全性和日语行为提供
    专项证明，而非一个通用基准分数。
  - >-
    现有替代方案是内部工程师用自研脚本进行手工测试和非正式提示词比对，无法产出采购、风险或
    受监管买家批准迁移所需的审计就绪文件。
solution:
  - >-
    构建一款工作流认证产品：客户上传提示词库、黄金样例和工作流定义，然后对 Fugu 及其他候选替换模型
    运行结构化跨模型基准测试。
  - >-
    将每次运行打包成标准化认证报告，含差距分析、整改建议、脱敏控制、审计日志和审批元数据，
    使输出结果可直接用于采购和合规审查。
  - >-
    将一次性项目转化为持续监控：在模型更新后重跑已认证工作流，当漂移显著改变先前核准的差距档案时
    向客户发出警报。
whyWeWin:
  - >-
    买家需要的是中立的、工作流专属的审批文件；云平台和水平型评测平台主要为内部工程质量优化，
    而非面向外部迁移签字。
  - >-
    日语基准语料库、采购导向的报告模板，以及针对特定模型对的适配手册，应比通用评测框架积累得更快。
  - >-
    大型 SI 和超大规模云厂商默认不会拿下这个切口——因为初始目标客户是缺乏内部工具能力、
    但服务于有严格审批要求的企业客户的中市场 SI。
strategicChoices:
  beachhead: >-
    员工 100–2,000 人的东京 Tier 2–3 系统集成商，在 Anthropic API 上为金融服务或制造业客户运行
    日语文档分析、摘要或客服工作流的生产系统。
  wedgeRationale: >-
    这个切口比直接向大企业销售或提供通用评测平台更快产生验证结果，因为一个业务冠军、一个买家、
    一个触发因素和一个工作流就能对应到一个付费认证决策。JISA 集中了目标渠道，工作流已经存在，
    客户将产品与手工测试而非完整平台替换相比较。
  sequencingRationale: >-
    先从高触达报告工作流和数据集自举起步，因为初期瓶颈在于可用的黄金测试集、隐私处理和买家信任。
    一旦报告被验收，再叠加持续漂移监控、标准化模板和合作伙伴辅助分发；此后才应扩展到直接企业销售、
    更多区域模型家族和非日本治理使用场景。
  notYet:
    - 宽泛的内部开发者可观测或提示词管理工具
    - 在报告模板完成付费试点转化前进行大企业定制集成
    - 在日本滩头市场验证完成前开展标准密集型政府或跨境扩展
    - 在没有人工审查和审计日志的情况下提供自动迁移建议
market:
  tam: >-
    TAM 估算 $60.6M：基于日本 19,528 家 100 人以上企业（制造业、信息通信、金融保险），
    乘以 47% 生成式 AI 使用率、每年 1.1 个关键工作流，以及每工作流 $6,000 的建模认证支出。
  sam: >-
    SAM 估算 $21.2M：聚焦 5,002 家 100 人以上的信息通信和金融保险企业，
    按 47% 生成式 AI 采用率和每年 1.5 个在范围内的工作流、相同建模支出计算。
  som: >-
    SOM 建模值 $0.9M：第三年可触达份额，假设从 467 家 JISA 正式会员及相邻企业团队中
    获取约 50 个付费客户，每客户每年平均认证三个工作流。
  segments:
    - 运行 Anthropic 依赖型企业工作流的中型日本系统集成商，初期聚焦金融服务和制造业客户
    - 需要同等认证文件以直接批准模型替换的大型日本企业 AI 治理团队
  buyingProcess: >-
    运营冠军通常是拥有现有工作流的 AI 或 ML 负责人，经济买家是 SI 的 CTO、VP 工程或 AI 治理负责人。
    最可信的切入动作是针对一个真实迁移请求的付费认证，然后在采购或风险团队验收报告格式后，
    再转换为监控订阅。
product:
  mvp: >-
    v1 应一次处理一个生产工作流：导入提示词、链路追踪和买家核准的样例；自举一套干净的黄金测试集；
    运行成对跨模型基准测试；输出标准化认证包，含差距分析、脱敏控制、审计日志和整改指导。
    应支持人工审查和明确的空值处理，而非声称通用模型等同性。
  sixMonth: >-
    签下 2–3 个共创客户，交付工作流导入、数据集自举、日语脱敏和最小保留控制，
    并为文档分析或摘要工作流交付首批付费 Fugu 对比现有模型的认证报告。
  twelveMonth: >-
    增加定期重跑、漂移增量、审批历史、按工作流类型可复用的报告模板，以及将首批项目客户转为
    经常性账户的监控控制台。
  twentyFourMonth: >-
    从 Fugu 优先替换扩展至其他区域提供商和直接企业治理团队的模型无关认证，同时测试一个主权和
    审批要求同样强烈的第二地理市场或监管驱动的相邻场景。
  keyBets:
    - 足够多的中型日本 SI 拥有对 Anthropic 级模型的实时依赖，能支持可重复的付费试点。
    - 第三方认证报告无需标准机构正式背书即可被采购接受。
    - 客户愿意在脱敏和最小保留政策下共享足够的提示词、链路追踪和样例。
    - 模型更新足够频繁，使再认证成为真实的订阅需求，而非偶发的支持任务。
gtm:
  wedge: >-
    向面临客户实时 Fugu 迁移证据需求的东京 SI 出售付费的按工作流认证，在客户审批窗口内交付报告，
    并在首次认证通过采购和风险审查后将该账户转为持续监控。
  channels:
    - 创始人主导对外销售，触达 JISA 会员及相邻中型 SI 的 AI 负责人和 CTO
    - 与 Sakana 及其他需要中立采用证据的区域模型提供商共同销售
    - 一旦报告模板被企业客户接受，通过治理、采购和受监管行业渠道获得转介
  funnelTargets: "目标账户发现→合格付费试点 20–30%，付费试点→生产监控 50%+，生产账户→第二工作流或直接企业扩展 60%+（12 个月内）。"
  pricing: >-
    按工作流定价，因为预算时机是一次迁移审批事件，而非席位采用。以每工作流 $3k–$8k 的认证费起步，
    再叠加基于活跃认证工作流和重跑频率的每月 $500–$1,500 监控订阅；这与手工测试替代方案对齐，
    且初始合同易于审批通过。
businessModel:
  revenueStreams:
    - 迁移认证的按工作流认证费
    - 已认证工作流的月度或季度监控订阅
    - 面向拥有重复替换需求的企业治理团队或 SI 账户的多工作流年度套餐
  unitOfValue: 处于活跃认证或监控状态的已认证生产工作流
  targetGrossMarginPct: 70
  expansionLevers:
    - 首份报告验收后，在同一 SI 或企业账户内增加更多工作流
    - 将一次性认证转化为持续漂移监控和定期再认证
    - 从 SI 主导的项目扩展至直接企业治理团队和更多区域模型家族
strategyMap:
  northStarMetric: 平台在客户审批窗口内交付审计就绪迁移决策、并持续保持认证时效的生产工作流数量
  inputMetrics:
    - 已确认 Anthropic 级依赖的合格目标账户数
    - 从工作流导入到认证包交付的时间
    - 具备可复用黄金测试集和标准化报告模板的试点比例
    - 试点转生产监控的转化率
    - 每生产客户每季度的再认证运行次数
  moatsToBuild:
    - 与真实采购和风险问题挂钩的日语基准语料库
    - 跨现有模型到区域模型对的工作流专属适配手册
    - 随重复认证积累的审计历史、审批元数据和漂移增量
    - 通过 JISA、区域模型提供商和信任报告格式的治理审批人建立的渠道访问
  killCriteria:
    - 前 15 个目标 SI 对话中，少于 5 个发现实时 Anthropic 级工作流及 6 个月内可行的迁移项目
    - 30 个合格目标账户对话后，少于 3 个付费试点成交
    - 前 6 个试点报告中，少于一半被采购或风险审查人以不超过 2 轮实质性跟进问题接受
    - 前 4 个生产账户中，少于 2 个在初始报告后 6 个月内购买持续监控或再认证
  mermaid: |
    flowchart LR
      Wedge[Japan SI model-swap wedge] --> MVP[Workflow qualification and report engine]
      MVP --> Proof[Accepted certification reports and paid monitoring]
      Proof --> Expansion[Model-agnostic governance and adjacent regulated markets]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      真实的买家痛点和连贯的切口，但直到报告验收和持续监控需求在可能比初看更窄的市场中得到验证之前，
      确信度有限。
    whyBelieve: >-
      出口管制冲击、主权模型发布和日本企业审批文化，共同创造了一个具体时机：中立的工作流认证文件
      能比宽泛的评测平台更快撬动支出。
    whyDoubt: >-
      建模 SOM 偏小，替代方案充足，研究仍未证明有多少中型日本 SI 同时依赖 Anthropic 级模型，
      且采购能信任第三方报告。
    nextDiligence: >-
      验证 3–5 个付费试点、至少 2 次采购或风险团队的报告验收，以及至少 2 次监控转化，
      再将其视为超出窄服务辅助切口的投资标的。
  firstCustomer:
    title: 东京中型系统集成商的 AI 工程负责人
    profile: >-
      一家 200–500 人的 SI，为金融服务或制造业客户服务，拥有一个当前依赖 Anthropic API 的
      日语文档分析或摘要生产工作流。
    trigger: >-
      企业客户要求提供书面证据，证明基于 Fugu 的备选方案在安全性和性能上与现有工作流持平，
      才批准迁移。
    buyer: SI 的 CTO 或 VP 工程，客户的采购或 AI 治理职能作为联合签字人
    initialContract: >-
      一个工作流认证 $3k–$8k，报告通过验收且模型更新需要重跑后，转化为每月 $500–$1,500 的监控订阅。
  mustBeTrue:
    - 前 15 个合格 SI 对话中至少 5 个须暴露实时 Anthropic 级依赖和 6 个月内可行的迁移项目。
    - 前 5 个付费试点中至少 3 个须采用大致标准化的报告范围，而非定制咨询重度项目。
    - 前 6 个试点报告中至少 50% 须被采购或风险审查人以不超过 2 轮实质性跟进问题接受。
    - 前 4 个生产账户中至少 2 个须在初始报告后 6 个月内购买持续监控或定期再认证。
    - 第 18 个月前，至少 30% 的合格管道须来自 JISA 或区域模型提供商等合作伙伴或网络渠道，而非纯创始人对外销售。
  diligenceQuestions:
    - 目前有多少中型日本 SI 在 Anthropic、Fable 或 Mythos 级 API 上运行生产工作流，而非通用 OpenAI 或开源技术栈？
    - 受监管日本企业账户的采购和 AI 治理委员会在批准模型替换时究竟需要哪些证据包？
    - 客户能否在 APPI 约束下共享提示词、链路追踪和黄金样例，而不强制要求本地部署或大量定制化？
    - Sakana 和其他区域模型提供商多久更改一次行为，足以证明付费再认证而非轻量监控的价值？
    - Sakana、JISA 或类似合作伙伴能否引介合格项目，同时不把公司变成白标服务团队？
operatingAssumptions:
  - assumption: 有足够多的中型日本 SI 拥有 Anthropic 级生产依赖，能支持可重复的滩头市场。
    basis: research.yaml
    validationTest: 完成 15 个目标账户访谈，确认至少 5 个实时工作流和 3 个近期付费试点机会。
    decisionImpact: 若不成立，在招募 GTM 人员前，将目标收窄至直接企业治理团队或放弃日本 SI 切口。
  - assumption: 采购和风险团队将接受第三方认证报告，无需 JISA、JEITA 或 IPA 的正式背书。
    basis: research.yaml
    validationTest: 让 3 名治理或采购审批人审阅试点报告，获得至少 2 份书面验收或有条件批准。
    decisionImpact: 若不成立，优先推进标准合作，并转向更慢的企业设计周期，而非直接规模化。
  - assumption: 客户将按标准工作流定价付费，而非将公司推向定制咨询。
    basis: idea.yaml
    validationTest: 以标准 $3k–$8k 范围成交 3 个付费试点，并在无定制工作说明扩展的情况下将至少 2 个转为监控。
    decisionImpact: 若不成立，毛利率和风险投资规模潜力下降，团队应保持低消耗或重新定位为专业服务软件。
  - assumption: 脱敏和最小保留控制足以从受监管客户处收集可用的提示词、链路追踪和样例。
    basis: research.yaml
    validationTest: 使用真实工作流数据完成 2 个试点客户的上线，无超出计划产品控制范围的重大隐私升级。
    decisionImpact: 若不成立，路线图须转向客户自管部署或低敏感度工作流，增加实施成本和销售摩擦。
  - assumption: 模型漂移和发布节奏产生持续的再认证需求。
    basis: research.yaml
    validationTest: 签下 2 个承诺在初始认证后按月或季度重跑的客户，并在前 12 个月内观察到至少 1 个重大变化事件。
    decisionImpact: 若不成立，业务仍为项目驱动型，须依赖远高于建模 SOM 的新客户量。
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: 摸清滩头市场中真实的 Anthropic 级依赖和购买触发因素。
    hypothesis: 目标 SI 中有相当比例已经拥有需要近期模型替换证据的面向客户工作流。
    successMetric: 15 个合格访谈产出至少 5 个实时依赖案例和 3 个愿意商定付费试点范围的买家。
    owner: 创始人/CEO
  - horizon: "0–90 天"
    experiment: 通过对一个历史工作流进行礼宾式认证包，测试采购接受度。
    hypothesis: 买家更在乎可追溯的报告格式，而非第一版是否完全自动化。
    successMetric: 3 名采购或治理审查人评定认证包与审批相关，且至少 2 人仅提出小幅修改意见。
    owner: AI 治理负责人
  - horizon: "90–180 天"
    experiment: 对文档分析或摘要工作流运行首个真实付费 Fugu 认证。
    hypothesis: 产品能在客户审批窗口内将客户提示词和样例转化为决策就绪的迁移报告。
    successMetric: 1 个付费试点按时交付报告并到达审批会议，无需超出约定范围的定制咨询。
    owner: 创始工程师
  - horizon: "90–180 天"
    experiment: 验证标准定价和监控转化。
    hypothesis: 工作流定价加轻量持续监控比席位定价或大型企业平台合同更易购买。
    successMetric: 标准套餐在 8 次定价对话中赢得 5 次，并将至少 1 个试点转为监控。
    owner: 创始人/CEO
  - horizon: "6–12 个月"
    experiment: 为早期生产账户上线定期重跑、漂移增量和审批历史。
    hypothesis: 当认证在模型更新后可能过期时，客户愿意支付持续费用。
    successMetric: 2 个生产客户采用重跑，且至少 1 个基准显著变化触发书面再认证审查。
    owner: 产品与评测工程师
  - horizon: "12–18 个月"
    experiment: 通过 JISA 或区域模型提供商建立合作伙伴来源管道。
    hypothesis: 一旦报告模板获得信任，渠道合作伙伴能比冷启动对外销售更快提供合格项目。
    successMetric: 至少 30% 的合格管道和 2 个已签约试点来自 2 个活跃合作伙伴。
    owner: GTM 负责人
operations:
  - 在任何提示词或链路追踪数据进入评测前，维护 APPI 感知脱敏、最小保留和客户审批工作流。
  - 运行将自动化评测与人工审查配对的基准 QA 流程，用于日语细微差别和特定领域安全检查。
  - 保持含审计日志、审批元数据和明确空值处理的标准化报告模板，使每份认证均采购就绪。
  - 跟踪每个已认证工作流的模型版本变更和重跑计划，而非将认证视为一次性项目。
  - 将云评测后端和模型提供商集成作为可互换的执行层管理，以保持供应商中立。
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 在集中的早期市场中主导客户发现、创始人亲自打单、定价和合作伙伴拓展。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 构建工作流导入、评测编排、报告生成和首个面向客户的试点技术栈。
  - role: 产品与评测工程师
    startTiming: Month 1
    rationale: 将礼宾式方法论转化为可复用的基准模板、漂移监控和模型对适配手册。
  - role: AI 治理负责人
    startTiming: Month 2
    rationale: 构建与日本采购预期一致的报告结构、隐私控制、审批工作流和客户上线流程。
  - role: GTM 负责人
    startTiming: Month 9
    rationale: 仅在付费试点、报告验收和首批监控转化证明该模式可重复后，才增加管道扩充能力。
milestones:
  - horizon: "0–12 个月"
    items:
      - 跨文档分析、摘要和对话使用场景，完成 5–8 个付费工作流认证试点。
      - 将至少 3 个试点转化为持续监控或定期再认证账户。
      - 标准化一份认证模板，至少被 2 个企业采购或风险团队以小幅修改通过。
      - 在生产中交付脱敏、审计历史、审批元数据和漂移增量工作流。
  - horizon: "12–24 个月"
    items:
      - 跨中型 SI 和直接企业治理账户，达到 15–20 个付费客户。
      - 新增至少 2 个合作伙伴来源渠道，并证明其在不压低定价的情况下产生合格试点。
      - 在报告保持模型无关的前提下，支持除 Fugu 之外的至少一个第二区域模型家族。
      - 将持续再认证确立为收入的重要组成部分，而非纯粹的一次性项目。
  - horizon: "24–36 个月"
    items:
      - 达到约 35–50 个付费客户，工作流量与建模 $0.9M 第三年 SOM 一致。
      - 在至少一半生产账户中展示从一个工作流扩展到多个工作流。
      - 根据合作伙伴拉力、留存率和毛利率决定是否可以开展更广泛的地域或监管扩展。
risks:
  - risk: 出口管制放宽或客户在公司建立更广泛治理切口前恢复对美国前沿模型的访问。
    likelihood: Medium
    impact: High
    mitigation: 从第一天起将产品构建为模型无关，销售连续性、再认证和多模型治理，而非仅针对紧急替换响应。
  - risk: 采购委员会在没有更强标准或协会背书的情况下不信任第三方认证报告。
    likelihood: High
    impact: High
    mitigation: 尽早测试报告验收，保留完整审计日志，仅在证据显示需要时才寻求 JISA 或类似背书。
  - risk: 数据共享和隐私控制使上线速度慢于目标客户可承受的程度。
    likelihood: Medium
    impact: High
    mitigation: 从脱敏、最小保留和工作流范围数据集自举起步，在控制措施验证前避免承诺宽泛的生产数据导入。
  - risk: 水平型评测厂商、云平台或大型 SI 打包足够多的类认证工作流，在公司建立护城河前压缩定价。
    likelihood: Medium
    impact: Medium
    mitigation: 围绕日语基准资产、审批模板、审计历史和合作伙伴分发建立差异化，而非依赖通用评测基础设施。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    资助 18 个月，构建工作流认证引擎、隐私与审计控制，以及持续监控产品；完成 5–8 个付费试点；
    将至少 3 个转为监控或再认证账户；并在扩大 GTM 支出前验证日本优先认证能否超越事件驱动型
    服务辅助细分市场。
