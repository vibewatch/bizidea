slug: ai-model-swap-qualifier
date: "2026-06-28"
executiveSummary: >-
  AI Model Swap Qualifier should start as a Japan-first, workflow-level
  certification layer for mid-sized system integrators that must prove a
  Sakana Fugu fallback is safe and effective before an enterprise client will
  approve a migration off Anthropic-dependent workflows. The first customer is
  a 200-500 person Tokyo SI with a live financial-services or manufacturing
  document-analysis, summarization, or chat workflow and a written client
  request for audit-grade migration evidence. The product should not launch as
  a broad LLM observability suite because the immediate budget moment is one
  workflow, one approval committee, and one model-swap decision; the report is
  the product that unlocks spending. Research sizes the market at roughly
  $60.6M TAM, $21.2M Japan beachhead SAM, and $0.9M modeled year-3 SOM, so the
  company only becomes interesting if each qualification compounds into
  reusable benchmark assets, approval templates, and recurring re-certification
  revenue. The product sequence should move from high-touch per-workflow
  qualification into monitoring, drift alerts, and scheduled re-runs once the
  first reports are accepted by procurement and risk teams. The company can win
  if it becomes the neutral approval artifact that cloud eval tools, model
  providers, and horizontal LLM-ops vendors do not provide by default,
  especially for Japanese-language workflows and conservative enterprise
  approvals. The biggest disconfirming risks are that too few mid-sized
  Japanese SIers actually depend on Anthropic-class models and that procurement
  committees may reject third-party reports without standards-body support;
  both gaps remain open in the research and should shape burn and hiring. This
  should therefore be financed as a pre-seed proof round, not a scale round,
  until paid pilots, report acceptance, and recurring monitoring demand are
  demonstrated.
problem:
  - >-
    Mid-sized Japanese SIers with production Anthropic-based workflows can lose
    model access on export-control timelines but still owe enterprise clients a
    documented continuity plan.
  - >-
    Replacing Claude-class workflows with Sakana Fugu or another regional model
    requires workflow-specific proof on quality, safety, and Japanese-language
    behavior, not a generic benchmark score.
  - >-
    The current alternative is manual testing with custom scripts and informal
    prompt comparisons, which does not produce the audit-ready artifact
    procurement, risk, or regulated buyers need to approve migration.
solution:
  - >-
    Build a workflow qualification product where customers upload prompt
    libraries, golden examples, and workflow definitions, then run structured
    cross-model benchmarks against Fugu and other candidate replacement models.
  - >-
    Package each run into a standardized certification report with gap
    analysis, remediation recommendations, redaction controls, audit trails,
    and approval metadata so the output can be used in procurement and
    compliance review.
  - >-
    Convert one-time projects into recurring monitoring by re-running certified
    workflows after model updates and alerting customers when drift materially
    changes the previously approved gap profile.
whyWeWin:
  - >-
    The buyer needs a neutral, workflow-specific approval artifact; clouds and
    horizontal eval platforms mostly optimize for internal engineering quality,
    not external migration sign-off.
  - >-
    A Japanese-language benchmark corpus, procurement-oriented report template,
    and adaptation playbook for specific model pairs should compound faster than
    a generic eval harness alone.
  - >-
    Large SIers and hyperscalers do not win this wedge by default because the
    first target customer is the mid-market SI that lacks internal tooling but
    still serves enterprise clients with strict approval requirements.
strategicChoices:
  beachhead: >-
    Tokyo-based Tier 2-3 system integrators with 100-2,000 employees that run
    production Japanese-language document-analysis, summarization, or customer
    service workflows on Anthropic APIs for financial-services or manufacturing
    clients.
  wedgeRationale: >-
    This wedge creates faster proof than selling directly to large enterprises
    or offering a general eval platform because one champion, one buyer, one
    trigger, and one workflow can be tied to a paid certification decision.
    JISA concentrates the target channel, the workflow already exists, and the
    customer compares the product against manual testing rather than against a
    full platform replacement.
  sequencingRationale: >-
    Start with a high-touch report workflow and dataset bootstrapping because
    the first bottlenecks are usable golden sets, privacy handling, and buyer
    trust. Once reports are accepted, add recurring drift monitoring,
    standardized templates, and partner-assisted distribution; only after that
    should the company expand to direct enterprise sales, additional regional
    model families, and non-Japan governance use cases.
  notYet:
    - Broad internal developer observability or prompt-management tooling
    - Large-enterprise custom integrations before the report template converts paid pilots
    - Standards-heavy government or cross-border expansion before Japan beachhead proof exists
    - Automated migration recommendations without human review and audit trails
market:
  tam: >-
    $60.6M estimated TAM based on 19,528 Japanese 100+ employee establishments
    across manufacturing, information and communications, and finance and
    insurance, 47% genAI usage, 1.1 critical workflows per year, and roughly
    $6,000 modeled qualification spend per workflow.
  sam: >-
    $21.2M estimated SAM focused on 5,002 information and communications plus
    finance and insurance establishments with 100+ employees, using 47% genAI
    adoption and 1.5 in-scope workflows per year at similar spend.
  som: >-
    $0.9M modeled year-3 SOM assuming roughly 50 paying customers from the 467
    JISA member network and adjacent enterprise teams, averaging three
    qualifying workflows per customer per year.
  segments:
    - Mid-sized Japanese system integrators running Anthropic-dependent enterprise workflows, starting with financial-services and manufacturing clients
    - Large Japanese enterprise AI governance teams that need the same certification artifact for direct model-swap approvals
  buyingProcess: >-
    The operational champion is usually the AI or ML lead who owns the existing
    workflow, while the economic buyer is the SI CTO, VP Engineering, or Head
    of AI Governance. The most credible entry motion is a paid qualification on
    one live migration request, followed by a monitoring subscription only
    after procurement or risk teams accept the report format.
product:
  mvp: >-
    v1 should handle one production workflow at a time: ingest prompts, traces,
    and buyer-approved examples; bootstrap a clean golden set; run pairwise
    cross-model benchmarks; and output a standardized certification packet with
    gap analysis, redaction controls, audit logs, and remediation guidance.
    It should support human review and explicit null handling rather than claim
    universal model parity.
  sixMonth: >-
    Close 2-3 design partners, ship workflow ingestion, dataset bootstrapping,
    Japanese redaction and minimal-retention controls, and deliver the first
    paid Fugu-versus-incumbent certification reports for document-analysis or
    summarization workflows.
  twelveMonth: >-
    Add scheduled re-runs, drift deltas, approval history, reusable report
    templates by workflow type, and a monitoring dashboard that converts the
    first project customers into recurring accounts.
  twentyFourMonth: >-
    Expand from Fugu-first swaps into model-agnostic certification across other
    regional providers and direct enterprise governance teams, while testing one
    second geography or regulation-driven adjacency where sovereignty and
    approval requirements are similarly strong.
  keyBets:
    - Enough mid-sized Japanese SIers have live Anthropic-class dependencies to support repeatable paid pilots.
    - Third-party certification reports can be accepted without requiring a formal standards-body endorsement first.
    - Customers will share sufficient prompts, traces, and examples under redaction and minimal-retention policies.
    - Model updates happen often enough that re-certification becomes a real subscription, not a rare support task.
gtm:
  wedge: >-
    Sell a paid, per-workflow qualification to a Tokyo SI facing a live client
    demand for Fugu migration evidence, deliver the report within the client's
    approval window, and convert that account to recurring monitoring once the
    first certification clears procurement and risk review.
  channels:
    - Founder-led outbound to AI leads and CTOs inside JISA-member and adjacent mid-sized SI firms
    - Co-sell motions with Sakana and other regional model providers that need neutral adoption evidence
    - Governance, procurement, and regulated-industry referrals once a report template is accepted by an enterprise client
  funnelTargets: "Target-account discovery->qualified paid pilot 20-30%, paid pilot->production monitoring 50%+, and production account->second workflow or direct enterprise expansion 60%+ within 12 months."
  pricing: >-
    Price by workflow because the budget moment is one migration approval event,
    not seat adoption. Start with a $3k-$8k per-workflow qualification fee,
    then layer a $500-$1,500 monthly monitoring subscription based on active
    certified workflows and rerun cadence; this aligns with the manual-testing
    alternative and keeps the first contract easy to approve.
businessModel:
  revenueStreams:
    - Per-workflow qualification fees for migration certification
    - Monthly or quarterly monitoring subscriptions for certified workflows
    - Multi-workflow annual packages for enterprise governance teams or SI accounts with repeated swaps
  unitOfValue: Certified production workflow under active qualification or monitoring
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more workflows within the same SI or enterprise account once the first report is accepted
    - Convert one-off qualifications into recurring drift monitoring and scheduled re-certification
    - Expand from SI-led projects into direct enterprise governance teams and additional regional model families
strategyMap:
  northStarMetric: Production workflows for which the platform delivers an audit-ready migration decision inside the customer's approval window and keeps that certification current
  inputMetrics:
    - Qualified target accounts with confirmed Anthropic-class dependency
    - Time from workflow ingestion to delivery of a certification packet
    - Share of pilots with reusable golden sets and standardized report templates
    - Pilot-to-production monitoring conversion rate
    - Number of re-certification runs per production customer per quarter
  moatsToBuild:
    - Japanese-language benchmark corpus tied to real procurement and risk questions
    - Workflow-specific adaptation playbooks across incumbent-to-regional model pairs
    - Audit history, approval metadata, and drift deltas that accumulate over repeated certifications
    - Channel access through JISA, regional model providers, and governance approvers who trust the report format
  killCriteria:
    - Fewer than 5 of the first 15 target SI conversations reveal a live Anthropic-class workflow plus a near-term migration request
    - Fewer than 3 paid pilots close after 30 qualified target-account conversations
    - Fewer than half of the first 6 pilot reports are accepted for migration review with no more than 2 follow-up rounds from procurement or risk
    - Fewer than 2 of the first 4 production accounts buy recurring monitoring or re-certification within 6 months of the initial report
  mermaid: |
    flowchart LR
      Wedge[Japan SI model-swap wedge] --> MVP[Workflow qualification and report engine]
      MVP --> Proof[Accepted certification reports and paid monitoring]
      Proof --> Expansion[Model-agnostic governance and adjacent regulated markets]
investorMemo:
  verdict:
    call: Watch
    conviction: Real buyer pain and a coherent wedge, but conviction remains limited until report acceptance and recurring monitoring demand are proven in a market that may be narrower than it first appears.
    whyBelieve: Export-control shocks, sovereign-model launches, and Japanese approval culture create a concrete moment where a neutral workflow certification artifact can unlock spending faster than a broad eval platform.
    whyDoubt: The modeled SOM is small, substitutes are plentiful, and the research still does not prove how many mid-sized Japanese SIers both depend on Anthropic-class models and can get procurement to trust a third-party report.
    nextDiligence: Verify 3-5 paid pilots, at least 2 report acceptances by procurement or risk teams, and at least 2 monitoring conversions before treating this as more than a narrow services-assisted wedge.
  firstCustomer:
    title: AI engineering lead at a Tokyo mid-sized system integrator
    profile: A 200-500 person SI serving a financial-services or manufacturing client with a live Japanese-language document-analysis or summarization workflow currently dependent on Anthropic APIs.
    trigger: The enterprise client requests written evidence that a Fugu-based fallback matches the incumbent workflow's safety and performance bar before approving migration.
    buyer: CTO or VP Engineering at the SI, with the client's procurement or AI governance function as co-signer
    initialContract: "$3k-$8k for one workflow certification, with conversion to a $500-$1,500 per month monitoring subscription if the report is accepted and model updates require re-runs."
  mustBeTrue:
    - At least 5 of the first 15 qualified SI conversations must surface a live Anthropic-class dependency and a plausible migration project within 6 months.
    - At least 3 of the first 5 paid pilots must use a mostly standard report scope rather than bespoke consulting-heavy work.
    - At least 50% of the first 6 pilot reports must be accepted by procurement or risk reviewers with no more than 2 substantive follow-up rounds.
    - At least 2 of the first 4 production accounts must buy recurring monitoring or scheduled re-certification within 6 months.
    - By month 18, at least 30% of qualified pipeline must come through partner or network channels such as JISA or regional model providers rather than pure founder outbound.
  diligenceQuestions:
    - How many mid-sized Japanese SIers currently run production workflows on Anthropic, Fable, or Mythos-class APIs rather than on generic OpenAI or open-source stacks?
    - What exact evidence package do procurement and AI governance committees require to approve a model swap in regulated Japanese enterprise accounts?
    - Can customers share prompts, traces, and golden examples under APPI constraints without forcing on-prem or heavy custom deployment?
    - How often do Sakana and other regional model providers change behavior enough to justify paid re-certification?
    - Will Sakana, JISA, or similar partners introduce qualified projects without turning the company into a white-labeled services arm?
operatingAssumptions:
  - assumption: There are enough mid-sized Japanese SIers with production Anthropic-class dependencies to support a repeatable beachhead.
    basis: research.yaml
    validationTest: Complete 15 target-account interviews and confirm at least 5 live workflows plus 3 near-term paid pilot opportunities.
    decisionImpact: If false, narrow to direct enterprise governance teams or abandon the Japan SI wedge before hiring GTM headcount.
  - assumption: Procurement and risk teams will accept a third-party certification report without requiring formal endorsement from JISA, JEITA, or IPA.
    basis: research.yaml
    validationTest: Get 3 governance or procurement approvers to review a pilot report and secure at least 2 written acceptances or conditional approvals.
    decisionImpact: If false, prioritize standards partnerships and slower enterprise design cycles instead of direct scaling.
  - assumption: Customers will pay standard workflow-based pricing rather than pushing the company into custom consulting.
    basis: idea.yaml
    validationTest: Close 3 paid pilots at the standard $3k-$8k scope and convert at least 2 to monitoring without custom statement-of-work expansion.
    decisionImpact: If false, gross margin and venture-scale potential fall, so the team should keep burn low or reposition as specialized services software.
  - assumption: Redaction and minimal-retention controls are enough to collect usable prompts, traces, and examples from regulated customers.
    basis: research.yaml
    validationTest: Onboard 2 pilot customers using real workflow data with no material privacy escalation beyond the planned product controls.
    decisionImpact: If false, the roadmap must shift to customer-managed deployment or lower-sensitivity workflows, increasing implementation cost and sales friction.
  - assumption: Model drift and release cadence create recurring re-certification demand.
    basis: research.yaml
    validationTest: Secure 2 customers that commit to monthly or quarterly re-runs after the initial certification and observe at least 1 material delta event in the first 12 months.
    decisionImpact: If false, the business remains project-led and must depend on much higher new-logo volume than the modeled SOM suggests.
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: Map real Anthropic-class dependency and buying triggers across the beachhead.
    hypothesis: A meaningful share of target SIers already have client-facing workflows that need model-swap evidence soon.
    successMetric: 15 qualified interviews produce at least 5 live dependency cases and 3 buyers willing to scope a paid pilot.
    owner: Founder CEO
  - horizon: "0-90 days"
    experiment: Test procurement acceptance using a concierge certification packet on one historical workflow.
    hypothesis: Buyers care more about a traceable report format than about whether the first version is fully automated.
    successMetric: 3 procurement or governance reviewers rate the packet as approval-relevant and at least 2 specify only minor changes.
    owner: AI governance lead
  - horizon: "90-180 days"
    experiment: Run the first live paid Fugu qualification on a document-analysis or summarization workflow.
    hypothesis: The product can turn customer prompts and examples into a decision-ready migration report inside the client's approval window.
    successMetric: 1 paid pilot delivers a report on schedule and reaches an approval meeting without requiring bespoke consulting beyond agreed scope.
    owner: Founding eng
  - horizon: "90-180 days"
    experiment: Validate standard pricing and monitoring conversion.
    hypothesis: Workflow-based pricing plus light recurring monitoring is easier to buy than seat pricing or a larger enterprise platform contract.
    successMetric: The standard package wins in 5 of 8 pricing conversations and converts at least 1 pilot to monitoring.
    owner: Founder CEO
  - horizon: "6-12 months"
    experiment: Launch scheduled re-runs, drift deltas, and approval history for early production accounts.
    hypothesis: Customers will pay recurring fees when certification can become stale after model updates.
    successMetric: 2 production customers adopt reruns and at least 1 materially changed benchmark triggers a documented re-certification review.
    owner: Product and eval engineer
  - horizon: "12-18 months"
    experiment: Build partner-sourced pipeline through JISA or a regional model provider.
    hypothesis: Channel partners can source qualified projects faster than cold outbound once the report template is trusted.
    successMetric: At least 30% of qualified pipeline and 2 signed pilots come from 2 active partners.
    owner: GTM lead
operations:
  - Maintain APPI-aware redaction, minimal-retention, and customer approval workflows before any prompt or trace data enters evaluation.
  - Run a benchmark QA process that pairs automated evaluation with human review for Japanese-language nuance and domain-specific safety checks.
  - Keep a standardized report template with audit trails, approval metadata, and explicit null handling so every certification is procurement-ready.
  - Track model-version changes and re-run schedules for each certified workflow instead of treating qualification as a one-off project.
  - Manage cloud evaluation backends and model-provider integrations as interchangeable execution layers so the company stays vendor-neutral.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own customer discovery, founder-led sales, pricing, and partner development in a concentrated early market.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build workflow ingestion, evaluation orchestration, report generation, and the first customer-facing pilot stack.
  - role: Product and eval engineer
    startTiming: Month 1
    rationale: Turn concierge methodology into reusable benchmark templates, drift monitoring, and model-pair adaptation playbooks.
  - role: AI governance lead
    startTiming: Month 2
    rationale: Encode report structure, privacy controls, approval workflows, and customer onboarding aligned with Japanese procurement expectations.
  - role: GTM lead
    startTiming: Month 9
    rationale: Add pipeline capacity only after paid pilots, report acceptance, and the first monitoring conversions prove the motion is repeatable.
milestones:
  - horizon: "0-12 months"
    items:
      - Close 5-8 paid workflow qualification pilots across document-analysis, summarization, and chat use cases.
      - Convert at least 3 pilots into recurring monitoring or scheduled re-certification accounts.
      - Standardize one certification template that at least 2 enterprise procurement or risk teams accept with only minor edits.
      - Ship redaction, audit history, approval metadata, and drift-delta workflows in production.
  - horizon: "12-24 months"
    items:
      - Reach 15-20 paying customers across mid-sized SI and direct enterprise governance accounts.
      - Add at least 2 partner-sourced channels and prove they generate qualified pilots without collapsing pricing.
      - Support at least one second regional model family beyond Fugu while remaining model-agnostic in reports.
      - Establish recurring re-certification as a material share of revenue rather than pure one-time project work.
  - horizon: "24-36 months"
    items:
      - Reach roughly 35-50 paying customers and workflow volume consistent with the modeled $0.9M year-3 SOM.
      - Demonstrate expansion from one workflow to multiple workflows in at least half of production accounts.
      - Decide whether the business can justify broader geographic or regulatory expansion based on partner pull, retention, and gross-margin profile.
risks:
  - risk: Export controls ease or customer access to U.S. frontier models returns before the company establishes a broader governance wedge.
    likelihood: Medium
    impact: High
    mitigation: Build the product as model-agnostic from day one and sell continuity, recertification, and multi-model governance rather than only emergency swap response.
  - risk: Procurement committees do not trust a third-party certification report without stronger standards or association backing.
    likelihood: High
    impact: High
    mitigation: Test report acceptance early, preserve full audit trails, and pursue JISA or similar endorsement only if the evidence shows it is required for conversion.
  - risk: Data-sharing and privacy controls make onboarding slower and more expensive than the target customers can tolerate.
    likelihood: Medium
    impact: High
    mitigation: Start with redaction, minimal retention, and workflow-scoped dataset bootstrapping, and avoid promising broad production data ingestion before controls are proven.
  - risk: Horizontal eval vendors, clouds, or large SIers bundle enough certification-like workflow to compress pricing before the company builds a moat.
    likelihood: Medium
    impact: Medium
    mitigation: Differentiate around Japanese-language benchmark assets, approval templates, audit history, and partner distribution instead of generic eval infrastructure.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the workflow qualification engine, privacy and
    audit controls, and recurring monitoring product; close 5-8 paid pilots;
    convert at least 3 into monitoring or re-certification accounts; and prove
    whether Japan-first certification can expand beyond an event-driven
    services-assisted niche before scaling GTM spend.
