reportMemo:
  executiveTakeaways:
  - 'This is a real but event-driven market: export-control shocks create urgency, while durable value depends on broadening into ongoing model-governance and recertification.'
  - The initial wedge is narrow enough to sell, but too small to justify a pure services business unless each engagement compounds into reusable software, datasets, and approval templates.
  - Competition is intense in generic eval tooling, yet weak in neutral, Japanese-language migration certification that procurement and risk teams can actually sign off on.
  - The startup wins only if it becomes the approval artifact buyers trust, not just another engineering dashboard for internal experimentation.
  marketDefinition: 'A Japan-first certification and governance layer for AI model swaps: proving that a replacement model can safely substitute for an incumbent on real production workflows.'
  customerAndBuyer: The day-to-day champion is an AI/ML lead at a mid-sized Japanese SI or enterprise platform team. The economic buyer is usually a CTO, CIO, or head of AI governance, with procurement and risk acting as de facto co-signers.
  buyingTriggers:
  - point: Access to a frontier model can disappear on export-control timelines, turning fallback planning from a theoretical governance issue into a live migration project.
    sourceRefs:
    - 1
    - 2
    - 3
    - 5
  - point: Japanese provider and user responsibilities now emphasize logging, risk evaluation, privacy handling, and remediation, which makes informal side-by-side testing hard to defend in procurement.
    sourceRefs:
    - 9
    - 12
    - 13
    - 20
    - 21
    - 22
    - 23
    - 27
  - point: Evaluation tooling and local AI infrastructure are mature enough that buyers can now demand evidence rather than promises before approving a swap to a regional model.
    sourceRefs:
    - 10
    - 11
    - 14
    - 31
    - 32
    - 33
  willingnessToPay:
    summary: 'Budget exists inside AI platform, governance, and modernization programs: clouds sell evaluation as a standard product surface, governance vendors package audit-ready evidence, and horizontal eval vendors monetize seats, traces, or enterprise contracts. The startup should therefore sell into an existing AI-ops/governance budget line, not a speculative innovation carve-out.'
    sourceRefs:
    - 11
    - 17
    - 20
    - 34
    - 35
    - 36
    - 37
    - 38
  competitiveLandscape: The market is crowded on internal evals and observability, but sparse on external certification. Most tools help builders improve apps; few help a buyer or procurement committee approve a model swap.
  incumbentThesis:
  - incumbentClass: Cloud platforms
    point: Cloud vendors already ship strong evaluation primitives, but they do not default to neutral, buyer-facing certification documents for cross-vendor model swaps.
    sourceRefs:
    - 10
    - 11
    - 14
    - 15
  - incumbentClass: Horizontal LLM eval platforms
    point: LangSmith, Braintrust, Humanloop, and Arize are strong internal quality systems, yet their center of gravity is product iteration for builders rather than procurement-grade migration sign-off.
    sourceRefs:
    - 16
    - 17
    - 18
    - 19
  - incumbentClass: Model providers
    point: Model vendors can benchmark their own products, but enterprise buyers still need model-agnostic evidence when the whole problem is dependence on a single provider.
    sourceRefs:
    - 2
    - 3
    - 5
    - 6
  - incumbentClass: Large SIers and consultancies
    point: Consultancies can assemble manual benchmarks and reports, but they are slow, project-heavy, and weakly reusable versus a software-plus-playbook approach.
    sourceRefs:
    - 21
    - 28
    - 30
  regulatoryLandscape: Japan remains pro-innovation, but the combination of the AI Promotion Act, business guidelines, privacy law, and sector-specific rules makes documented controls more important than ad hoc testing. For exporters and multinationals, EU-style obligations further raise the bar for traceability and approval discipline.
  technologyLandscape: 'The enabling stack already exists: datasets, LLM judges, human review, tracing, prompt versioning, and audit logs are available from clouds and specialist vendors. The gap is not raw eval capability but packaging those primitives into neutral, workflow-specific migration evidence.'
  distributionChannels:
  - point: Co-sell with Sakana and adjacent regional model providers around sovereignty and continuity use cases, then expand through the same infrastructure programs funding local AI capacity.
    sourceRefs:
    - 5
    - 6
    - 32
    - 33
  - point: Use the JISA member network as the densest first-customer and referral base because it concentrates the IT services and software vendors most likely to own client migrations.
    sourceRefs:
    - 28
    - 30
  - point: Land through governance, risk, and procurement committees by positioning the output as an audit artifact rather than a developer convenience feature.
    sourceRefs:
    - 20
    - 21
    - 22
    - 37
    - 38
  partnershipEcosystem:
  - point: Regional model providers have incentive to support a neutral qualification layer because it accelerates enterprise adoption without forcing buyers to trust only vendor-authored benchmarks.
    sourceRefs:
    - 5
    - 6
  - point: Cloud evaluation backends can serve as execution infrastructure for benchmark jobs while the startup owns the methodology, interpretation, and report packaging.
    sourceRefs:
    - 10
    - 11
    - 12
    - 13
  - point: Industry associations and governance forums can make the report format legible to buyers, especially if the artifact vocabulary aligns with Hiroshima-process and Japanese enterprise compliance language.
    sourceRefs:
    - 24
    - 28
    - 30
  dataMoats:
  - point: Migration playbooks across specific model pairs compound over time; each qualification creates reusable remediation patterns for the next buyer.
    sourceRefs:
    - 5
    - 6
    - 16
    - 19
  - point: A Japanese-language benchmark library tied to procurement and risk questions is harder to copy than a generic eval harness alone.
    sourceRefs:
