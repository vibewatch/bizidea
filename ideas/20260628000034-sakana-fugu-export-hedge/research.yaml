  adoptionFrictionMatrix:
  - friction: Customers often lack a clean, workflow-specific golden dataset to benchmark a model swap.
    severity: high
    affectedBuyer: AI/ML lead at the SI or enterprise platform team
    mitigation: Offer dataset bootstrapping from prompts, production traces, and buyer-approved examples as part of the first qualification.
    sourceRefs:
    - 10
    - 16
    - 18
    - 19
  - friction: Prompt logs and evaluation data can contain PII or confidential business information, turning benchmarking into a privacy project as well as a QA project.
    severity: high
    affectedBuyer: Compliance, privacy, and risk owners
    mitigation: Support Japanese redaction policies, minimal-retention modes, and explicit APPI handling procedures before customer data ever enters an eval run.
    sourceRefs:
    - 4
    - 21
    - 27
  - friction: Procurement teams may not trust a migration recommendation unless it comes with audit trails, approvals, and a standardized report format.
    severity: high
    affectedBuyer: Procurement committee and AI governance function
    mitigation: Package every evaluation with traceable logs, report exports, human-review checkpoints, and approval metadata.
    sourceRefs:
    - 9
    - 12
    - 13
    - 20
    - 37
    - 38
  - friction: Model behavior drifts across releases, so a one-time benchmark can go stale quickly.
    severity: medium
    affectedBuyer: Product owner or platform engineering lead
    mitigation: Turn one-off qualification into scheduled re-runs and delta alerts when the certified gap profile changes materially.
    sourceRefs:
    - 10
    - 11
    - 14
    - 16
  - friction: Regional models may still miss domain-specific quality bars, especially when Japanese language nuance matters.
    severity: medium
    affectedBuyer: Business sponsor waiting to approve the migration
    mitigation: Use pairwise task-level benchmarks and adaptation recommendations rather than yes/no parity claims at the model level.
    sourceRefs:
    - 5
    - 6
    - 10
    - 19
