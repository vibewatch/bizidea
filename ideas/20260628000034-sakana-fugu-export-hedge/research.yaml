openQuestions:
- How many mid-sized Japanese SIers actually have production workflows tied to Anthropic/Fable/Mythos-class models instead of generic OpenAI or open-source stacks?
- Will procurement and risk committees accept a third-party certification report without a standards-body endorsement from an organization such as JISA, JEITA, or IPA?
- How frequently will Sakana and other regional providers change model behavior enough to force paid re-certification rather than light-touch monitoring?
- Can the startup access enough customer-approved prompts, traces, and golden examples to build a defensible Japanese benchmark corpus without creating a data-governance headache?
