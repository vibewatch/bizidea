  validationPlan:
  - priority: high
    question: How many JISA-like SIers currently have production workflows tied to Claude/Fable/Mythos-class models rather than generic OpenAI or open-source stacks?
    evidenceToGather: Ten discovery calls with mid-sized Tokyo SIs plus one anonymized list of current model dependencies per firm.
  - priority: high
    question: Will procurement and risk committees accept a third-party certification report without explicit standards-body endorsement?
    evidenceToGather: Two recent customer sign-off packs, one regulated-industry RFP, and feedback from at least three governance approvers.
  - priority: medium
    question: Does continuous re-qualification after model updates create enough recurring demand to support software-like retention?
    evidenceToGather: Version-change histories for Sakana and two frontier models, plus pilot commitments for monthly or quarterly recertification.
