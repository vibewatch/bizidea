ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      TechCrunch coverage of both Anthropic's export restrictions and Sakana Fugu's explicit enterprise-hedge
      positioning confirms a real market event with named companies, documented business impact, and a concrete
      enterprise buyer segment already identified by the model provider itself.
  painIntensity:
    score: 4
    rationale: >-
      ISVs face contract liability, enterprise relationship damage, and potential revenue loss if they migrate
      without documented qualification; the pain is acute, time-sensitive, and affects a concentrated population
      of Japan-based API-dependent shops with no current structured remedy.
  wedgeClarity:
    score: 5
    rationale: >-
      Extremely specific wedge: per-workflow certification report for export-control-forced model migrations,
      targeting Tokyo-based Tier 2-3 ISVs serving financial-services enterprise clients. Narrow enough to execute
      in a 90-day sprint and immediately testable with a single design-partner ISV.
  defensibility:
    score: 3
    rationale: >-
      Early-mover advantage and an accumulating adaptation playbook create meaningful defensibility over time, but
      large SIers or hyperscalers could build internal tooling for the top-tier segment; initial focus on
      underserved Tier 2-3 ISVs reduces that risk during the critical first 18 months.
  ventureScale:
    score: 4
    rationale: >-
      Japan's ISV market alone supports meaningful initial ARR; expansion to South Korea, EU AI Act compliance,
      and general multi-model governance use cases opens a global platform opportunity in the hundreds of millions
