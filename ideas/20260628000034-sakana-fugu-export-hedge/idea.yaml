topRisks:
  - name: "Export-control reversal deflates urgency"
    description: "If U.S. export restrictions on Anthropic or other frontier models are lifted, the primary buying trigger disappears and enterprise qualification demand could collapse quickly."
    mitigation: "Position the platform from day one as a general model migration and governance tool—valuable for model upgrades, multi-model operations, and internal compliance beyond any single export-control scenario."
  - name: "Regional model quality falls short of enterprise bar"
    description: "If Sakana's Fugu fails to achieve performance parity with US frontier models on key enterprise tasks, Japanese enterprises may defer migration indefinitely rather than accept a lower-quality fallback."
    mitigation: "Build the platform as model-agnostic from the start so it qualifies any regional model candidate, ensuring the value proposition holds regardless of which regional model eventually wins the enterprise market."
  - name: "Large SIers and hyperscalers build internal tooling"
    description: "Major Japanese system integrators and cloud providers—Fujitsu, NTT Data, AWS Japan—may build proprietary qualification frameworks internally and capture the large-enterprise segment."
    mitigation: "Focus initial GTM exclusively on Tier 2-3 ISVs (100-2,000-person shops) who lack the AI team capacity to build internal tooling and who serve enterprise clients requiring audit-grade certification documents."
