problem: >-
  Japanese enterprises and ISVs that built production AI workflows on Anthropic's Claude API face sudden,
  unpredictable access termination as U.S. export restrictions expand—a risk made concrete when Anthropic
  restricted Mythos and Fable models to non-American markets. When access is cut, migrating to a regional
  alternative like Sakana's Fugu requires proving the replacement meets the same performance, safety, and
  Japanese-language quality standards as the original model. No structured qualification toolchain exists today:
  enterprises rely on ad hoc manual testing that produces no audit-ready deliverable their enterprise clients or
  regulators can accept, creating contract liability and delaying migration approvals by weeks or months.
targetUser:
  primary: >-
    ML and AI engineering leads at Tokyo-based Tier 2-3 system integrators (SIers, 100-2,000 employees) that
    built production Japanese-language document analysis, summarization, or chat workflows on Anthropic's Claude
    API for enterprise financial-services or manufacturing clients
  secondary: >-
    AI compliance officers at large Japanese enterprises in financial services and government agencies who need
    documented evidence that AI replacements meet safety and performance standards before approving model
    migrations
  buyer: "CTO or VP Engineering at a Tier 2-3 ISV, or Head of AI Governance at a large Japanese enterprise"
startupThesis:
  nonObviousInsight: >-
    Export controls did not merely block a model—they transformed latent model-dependency risk into a synchronized
    migration crisis across all Japan-based Anthropic API users simultaneously. This synchronized demand for
    qualification services creates a concentrated, time-boxed market that did not exist six months ago and that no
    enterprise evaluation tool is built to serve; the companies that build a qualification playbook first will win
    the migration contracts that follow.
  beachhead: >-
    Tokyo-based Tier 2-3 system integrators (100-2,000 employees) that built one or more production
    Japanese-language document analysis, summarization, or customer-service chat workflows on Anthropic's Claude
    API for enterprise financial-services or manufacturing clients who require audit-grade migration documentation
  wedge: >-
    Per-workflow qualification report service: ISVs upload their existing prompt library and golden evaluation
    set, run cross-model benchmarks against Sakana Fugu, and receive a gap-analysis certification document their
    enterprise clients can accept in procurement and compliance review
  whyNowCatalyst: >-
    Anthropic's restriction of Mythos and Fable models to non-American markets and Sakana's explicit positioning
    of Fugu as an enterprise hedge created immediate, documented buyer urgency for a qualification process that no
    existing LLM evaluation tool was designed to provide.
  ventureScalePath: >-
    Start with Fugu qualification for Japan-based ISVs, expand to other export-restricted markets (South Korea, EU
    AI Act compliance, India), then become the model-agnostic enterprise qualification and governance platform for
    any organization managing multi-model operations, model upgrades, or vendor-lock-in risk at scale.
solution: >-
  A SaaS platform where Japanese ISVs and enterprise AI teams upload existing prompt suites, golden evaluation
  sets, and workflow specifications, then run systematic cross-model benchmarks comparing a restricted U.S. model
  against regional candidates like Sakana Fugu. The engine produces a structured gap analysis documenting
  performance degradation points, safety-behavior differences, and Japanese-language quality gaps, alongside a
  ranked list of prompt adaptation strategies to close each identified deficiency. Every benchmark run generates a
  certification report formatted for enterprise procurement and regulated-industry compliance review—an audit
  artifact that lets clients formally approve the migration. The platform accumulates an adaptation playbook of
  common migration patterns across model pairings, turning each completed qualification into compounding
  defensibility. Ongoing monitoring subscriptions alert customers when a new model update shifts their previously
  certified gap profile, creating recurring revenue beyond the initial project engagement.
goToMarketSeed:
  firstCustomer: >-
    A 200-500-person Tokyo-based system integrator that built a Japanese-language document-analysis or
    summarization workflow on Claude API for a financial-services enterprise client, and has received a written
    request from that client to demonstrate the Fugu-based fallback meets the same quality and safety standards
    before migration approval
  buyingTrigger: >-
    Enterprise client formally requests written certification—acceptable to their procurement committee and risk
    function—that the Fugu-based replacement matches the performance and safety bar of the existing Claude API
    workflow before the client will authorize migration
  currentAlternative: >-
    Manual ad hoc testing by the ISV's internal AI engineers using custom evaluation scripts and informal prompt
    comparisons, producing no standardized documentation or audit-ready deliverable
  switchingReason: >-
    The certification report is a procurement-accepted audit artifact that unlocks client sign-off; manual testing
    produces no such deliverable, creating contract risk and delaying migration approval by weeks or months while
    the access-restriction deadline approaches
  pricingHypothesis: >-
    Per-workflow qualification project fee ($3,000-$8,000 per workflow), with an ongoing monthly monitoring
    subscription ($500-$1,500/month) for model-change alerts and continuous benchmark tracking
