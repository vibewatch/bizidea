slug: ai-model-swap-qualifier
date: "2026-06-28"
currency: USD
modelStartMonth: "2026-07"

assumptions:
  - id: A1
    name: 起始客户数（第 1 个月）
    value: "0"
    unit: count
    source: "[BP exec summary] 发布时尚未产生收入；首个付费试点目标在第 5 个月，经过 4 个月的产品构建和发现期"
  - id: A2
    name: 每工作流认证费（均值）
    value: "6000"
    unit: USD
    source: "[research.yaml market.som] SOM 推导中使用的每工作流 $6,000 建模认证支出；与 BP 定价区间 $3,000–$8,000 一致"
  - id: A3
    name: 每认证工作流槽位月度监控费
    value: "750"
    unit: USD/month/slot
    source: "[BP pricing] $500–$1,500/月区间；$750 中高档适用于拥有 2 个以上活跃工作流的账户；$9K/工作流/年稳态与研究 $6K 基准加漂移警报溢价一致"
  - id: A4
    name: 第 1/2/3 年 COGS 率
    value: "30/28/26 pct"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct=70] 第 1 年 30% 反映人工审查密集型交付；至第 3 年随基准模板和自动化增加降至 26%；毛利率 70%–74%"
  - id: A5
    name: 第 1 年新增客户数
    value: "7"
    unit: count
    source: "[BP milestones 0-12 months] 目标 5–8 个付费试点；模型取中值 7；第 5 个月首个试点（4 个月产品冲刺后），此后每月 1 个新账户，第 9 个月除外"
  - id: A6
    name: 第 2 年新增客户数
    value: "13"
    unit: count
    source: "[BP milestones 12-24 months] 目标 15–20 个付费客户；7+13=20，第 2 年末累计"
  - id: A7
    name: 第 3 年新增客户数
    value: "20"
    unit: count
    source: "[BP milestones 24-36 months] 35–50 个付费客户；20+20=40 累计；低于中值以相对 SOM 上限保守"
  - id: A8
    name: 第 1/2/3 年每新客户平均新增工作流槽位数
    value: "1/1.5/2"
    unit: slots per customer
    source: "[BP sequencingRationale] 每个试点从一个工作流起步；首份报告验收后在账户内扩展；SOM 模型稳态每客户 3 个工作流；第 2 年斜率反映共创客户追加销售"
  - id: A9
    name: 第 2/3 年每现有账户每年扩展工作流槽位数
    value: "0.5/1"
    unit: slots/account/year
    source: "[BP expansionLevers] 首份报告验收后在同一 SI 内增加更多工作流；第 2 年 0.5/年，第 3 年 1/年，随信任度和模板复用提升"
  - id: A10
    name: 月度流失率
    value: "1.5"
    unit: pct/month
    source: "[Heuristic] 企业 B2B SaaS 典型年流失率 10–20%；对无标准背书的早期供应商保守估算 18% 年流失率（1.5%/月）；日本客户忠诚度部分抵消"
  - id: A11
    name: 已募 pre-seed 融资
    value: "3000000"
    unit: USD
    source: "[BP fundingAsk] $2–4M 区间；模型取中值 $3M；实际现金计算在建模燃烧率下可提供 24 个月以上现金跑道"
  - id: A12
    name: 每全职员工全包人力成本
    value: "125000"
    unit: USD/year
    source: "[Heuristic] $100K 基本工资 + 25% 雇主负担；AI 初创日本/美国混合团队混合标准；全包 $10.4K/全职员工/月用于损益表"
  - id: A13
    name: 非人力月度管理费用
    value: "8000"
    unit: USD/month
    source: "[Heuristic] $2K 云/工具，$2K 东京共享办公室，$2K 法务/财务，$2K 出行/JISA 会议；4–7 名员工精益初创管理费用"
  - id: A14
    name: 首个付费试点销售周期
    value: "4"
    unit: months
    source: "[BP experimentRoadmap 0-90 days] 首个付费试点目标在第 6 个月；发现加礼宾式认证；日本 B2B 通常 3–6 个月；JISA 渠道降低摩擦"
  - id: A15
    name: 监控转化率（已认证账户中的比例）
    value: "75"
    unit: pct
    source: "[BP funnelTargets] 试点转生产监控目标 50%+；模型取 75%，即报告模板被采购信任后可实现的中期目标"
  - id: A16
    name: GTM 负责人入职月份
    value: "10"
    unit: month
    source: "[BP team] BP 中 GTM 负责人第 9 个月的理由；模型取第 10 个月，反映标准 1 个月入职；销售&营销成本从 $5.7K 跃升至 $16.1K/月"
  - id: A17
    name: CAC（每新客户销售与营销支出）
    value: "12000"
    unit: USD
    source: "[Calc A12+A13] 第 2 年销售&营销成本 $154K（GTM 负责人薪酬 + CEO 40% 时间 + 活动）/ 13 个新客户 = $11.8K；取整 $12K；JISA 渠道相比纯冷启动对外销售降低边际 CAC"
  - id: A18
    name: 年度混合 ARPU
    value: "22000"
    unit: USD/year
    source: "[Calc A3+A8] 第 3 年末稳态：2.25 槽位/账户 × $750/月 × 12 = $20.25K 监控 + $1.75K 平均认证活动 = $22K；在研究 $6K/工作流 × 3 工作流 = $18K 基准之上"

