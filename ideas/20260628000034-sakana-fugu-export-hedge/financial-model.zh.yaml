    y3EbitdaK: -750.0
    cashLowPointK: 950.0
    keyAssumptionChanges:
      - "第 3 年新增客户减至 10（基准 20）"
      - "监控价格降至 $500/槽位/月下限（基准 $750）"
      - "由于采购在无标准背书情况下抗拒经常性合同，监控转化率跌至 50%"
  base:
    description: "第 1 年 7 个试点，第 2 年末 20 个客户，第 3 年末 40 个；监控 $750/槽位/月；75% 监控转化率"
    y3RevenueK: 886.5
    y3EbitdaK: -501.1
    cashLowPointK: 1316.0
    keyAssumptionChanges:
      - "按建模执行：A5 至 A18 基准值适用"
  upside:
    description: "JISA 渠道加速；第 3 年末 50 个客户；高端多工作流账户 $900/槽位/月；90% 监控转化"
    y3RevenueK: 1200.0
    y3EbitdaK: -300.0
    cashLowPointK: 1600.0
    keyAssumptionChanges:
      - "第 3 年新增客户增至 30（基准 20）"
      - "成熟账户平均 3 个工作流，监控价格 $900/槽位/月"
      - "以合规驱动的再认证定位推动监控转化率达 90%"

sensitivity:
  - variable: "每工作流槽位监控价格"
    downsideCase: "$500/槽位/月（BP 下限；单工作流账户；无多工作流溢价）"
    baseCase: "$750/槽位/月（中档；每账户 2 个以上工作流；含漂移警报溢价）"
    upsideCase: "$1,000/槽位/月（企业高端；3 个以上工作流；审计历史锁定）"
    y3RevenueImpactK: 150.0
    cashImpactK: 111.0
  - variable: "CAC"
    downsideCase: "第 3 年每年 10 个新客户（日本 6 个月审批周期；出口管制紧迫感减退）"
    baseCase: "第 3 年每年 20 个新客户（4 个月周期；JISA 引介降低摩擦）"
    upsideCase: "第 3 年每年 30 个新客户（JISA 渠道加上 Sakana 共同销售双线并进）"
    y3RevenueImpactK: 200.0
    cashImpactK: 148.0
  - variable: "流失率"
    downsideCase: "3.0%/月（18% 账户不续约；一次性项目心态；无标准背书）"
    baseCase: "1.5%/月（企业黏性；合规驱动留存；审计历史切换成本）"
    upsideCase: "0.5%/月（平台成为审计记录系统；迁移至新供应商须重新认证，成本可观）"
    y3RevenueImpactK: 90.0
    cashImpactK: 67.0
  - variable: "毛利率"
    downsideCase: "全程 35% COGS（人工审查随收入扩展；API 推理成本未压缩）"
    baseCase: "第 3 年 26% COGS（基准模板自动化降低边际交付成本）"
    upsideCase: "第 3 年 20% COGS（模板完全复用；LLM 作为评判者替代大部分人工审查时间）"
    y3RevenueImpactK: 0.0
    cashImpactK: 133.0
  - variable: "销售周期"
    downsideCase: "首个试点 6 个月以上（日本采购增加 2 轮委员会审批；APPI 数据审查）"
    baseCase: "4 个月（创始人主导 JISA 引介；单工作流范围压缩审批面）"
    upsideCase: "2 个月（出口管制紧迫感带来热入站；共创客户条款绕过完整采购流程）"
    y3RevenueImpactK: 60.0
    cashImpactK: 44.0
  - variable: "ARPU"
    downsideCase: "50% 的已认证账户订阅监控（一次性项目心态持续）"
    baseCase: "75% 转化为监控（采购验收首份报告后的合规留存）"
    upsideCase: "90% 转化（监控定位为企业风险职能的强制再认证）"
    y3RevenueImpactK: 263.0
    cashImpactK: 195.0

modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[JISA outbound leads] --> Pilots[Paid qualification pilots]
      Pilots --> QualFee[Per-workflow fee 6K one-time]
      Pilots --> Report[Certification report]
      Report --> Approval[Procurement sign-off]
      Approval --> Monitor[Monitoring 750 per slot per mo]
      Monitor --> ARR[Compounding monitoring ARR]
      Monitor --> Recert[Annual re-qualification pull]
      QualFee --> GrossProfit[Gross profit 70 to 74 pct]
      ARR --> GrossProfit
      GrossProfit --> Cash[Cash runway 3M pre-seed]

modelSanity:
  - checkName: 收入引擎
    finding: "监控 ARR 从第 1 年末 $7K/月复利增长至第 3 年末 $67.5K/月，随着 90 个已认证工作流槽位以 $750/月积累，加上每个新客户季度 $6K 的按工作流认证费提振现金。"
  - checkName: 必须做对的事
    finding: "第 1 年内至少 7 个付费试点须以标准 $6K 定价成交，且无定制咨询范围蔓延，证明采购在没有 JISA 或 IPA 正式背书的情况下也会接受第三方认证报告。"
  - checkName: 模型失效条件
    finding: "监控转化率跌破 50%：以 50% 转化率计算，第 3 年收入降至约 $450K，多消耗约 $350K 现金，第 3 年末仅余约 $960K——足够跑道但无可信的 A 轮谈判筹码。"
  - checkName: 下一轮融资证明
    finding: "A 轮证据需要 40 个以上付费账户、$800K 以上 ARR、60% 以上监控留存，以及至少 2 个合作伙伴来源渠道；第 3 年第 4 季度基准情景指标按设计交付全部四项门槛。"

sanityChecks:
  ruleOf40: "第 3 年收入增长 198%（$886K 对比第 2 年 $297K）+ EBITDA 利润率 -57% = Rule of 40 得分 141；在规模化前阶段增长主导；EBITDA 路径实现盈亏平衡约需 60 个客户以稳定监控费率（估计在第 4 年）"
  burnMultiple: "第 3 年燃烧倍数 = $501K 净消耗 / $590K 增量收入 = 0.85 倍（高效；Bessemer 成长阶段基准 <1.5 倍）"
  revenuePerFte: "第 3 年 $886K / 平均 8.5 名全职员工 = $104K/全职员工（低于 $200–400K 的 SaaS 基准；高触达交付模型在第 1–3 年符合预期；随监控 ARR 增长无需同比例增员，预计第 4 年超过 $200K）"
  flags:
    - "单一地域收入集中：第 1–3 年客户全部为日本 SI；在监控基础足够稳定前，出口管制逆转会削弱主要购买触发因素"
