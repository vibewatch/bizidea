scenarios:
  downside:
    description: "Export controls ease in Y2 cutting urgency; 25 customers by EOY3 (vs 40 base); monitoring at $500/slot/month lower bound; monitoring conversion drops to 50%"
    y3RevenueK: 380.0
    y3EbitdaK: -750.0
    cashLowPointK: 950.0
    keyAssumptionChanges:
      - "New customer additions Y3 reduced to 10 (vs 20 base)"
      - "Monitoring price at $500/slot/month lower bound (vs $750 base)"
      - "Monitoring conversion drops to 50% as procurement resists recurring contracts without standards endorsement"
  base:
    description: "7 pilots in Y1, 20 customers by EOY2, 40 by EOY3; monitoring at $750/slot/month; 75% monitoring conversion rate"
    y3RevenueK: 886.5
    y3EbitdaK: -501.1
    cashLowPointK: 1316.0
    keyAssumptionChanges:
      - "As modeled: A5 through A18 base values apply"
  upside:
    description: "JISA channel accelerates; 50 customers by EOY3; premium multi-workflow accounts at $900/slot/month; 90% monitoring conversion"
    y3RevenueK: 1200.0
    y3EbitdaK: -300.0
    cashLowPointK: 1600.0
    keyAssumptionChanges:
      - "New customer additions Y3 increased to 30 (vs 20 base)"
      - "Monitoring price $900/slot/month for mature accounts averaging 3 workflows"
      - "Monitoring conversion at 90% driven by compliance-driven re-certification framing"

sensitivity:
  - variable: "monitoring price per workflow slot"
    downsideCase: "$500/slot/month (BP lower bound; single-workflow accounts; no multi-workflow premium)"
    baseCase: "$750/slot/month (mid-tier; 2+ workflows per account; includes drift-alert premium)"
    upsideCase: "$1,000/slot/month (enterprise premium; 3+ workflows; audit-history lock-in)"
    y3RevenueImpactK: 150.0
    cashImpactK: 111.0
  - variable: "CAC"
    downsideCase: "10 new customers/year in Y3 (Japan 6-month approval cycles; export-control urgency fades)"
    baseCase: "20 new customers/year in Y3 (4-month cycles; JISA intro reduces friction)"
    upsideCase: "30 new customers/year in Y3 (JISA channel plus Sakana co-sell both active)"
    y3RevenueImpactK: 200.0
    cashImpactK: 148.0
  - variable: "churn"
    downsideCase: "3.0%/month (18% of accounts non-renew; one-time project mentality; no standards endorsement)"
    baseCase: "1.5%/month (enterprise stickiness; compliance-driven retention; audit history switching cost)"
    upsideCase: "0.5%/month (platform becomes audit-of-record; material cost to re-qualify with a new vendor)"
    y3RevenueImpactK: 90.0
    cashImpactK: 67.0
  - variable: "gross margin"
    downsideCase: "35% COGS throughout (manual human review scales with revenue; API inference costs not compressed)"
    baseCase: "26% COGS Y3 (automation of benchmark templates reduces marginal delivery cost)"
    upsideCase: "20% COGS Y3 (full template reuse; LLM-as-judge replaces most human review hours)"
    y3RevenueImpactK: 0.0
    cashImpactK: 133.0
  - variable: "sales cycle"
    downsideCase: "6+ months to first pilot (Japan procurement adds 2 extra committee rounds; APPI data review)"
    baseCase: "4 months (founder-led JISA intro; single-workflow scope constrains approval surface)"
    upsideCase: "2 months (hot inbound from export-control urgency; design-partner terms bypass full procurement)"
    y3RevenueImpactK: 60.0
    cashImpactK: 44.0
  - variable: "ARPU"
    downsideCase: "50% of qualified accounts subscribe to monitoring (one-time project mentality persists)"
    baseCase: "75% conversion to monitoring (compliance retention once first report accepted by procurement)"
    upsideCase: "90% conversion (monitoring framed as mandatory recertification for enterprise risk function)"
    y3RevenueImpactK: 263.0
    cashImpactK: 195.0

modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[JISA outbound leads] --> Pilots[Paid qualification pilots]
      Pilots --> QualFee[Per-workflow fee 6K one-time]
      Pilots --> Report[Certification report]
      Report --> Approval[Procurement sign-off]
      Approval --> Monitor[Monitoring 750 per slot per mo]
      Monitor --> ARR[Compounding monitoring ARR]
      Monitor --> Recert[Annual re-qualification pull]
      QualFee --> GrossProfit[Gross profit 70 to 74 pct]
      ARR --> GrossProfit
      GrossProfit --> Cash[Cash runway 3M pre-seed]

modelSanity:
  - checkName: Revenue engine
    finding: "Monitoring ARR compounds from $7K/month at EOY1 to $67.5K/month at EOY3 as 90 certified workflow-slots accumulate at $750/month, with $6K per-workflow qualification fees boosting cash in each new-customer quarter."
  - checkName: Must go right
    finding: "At least 7 paid pilots must close in Y1 at standard $6K pricing without bespoke consulting scope creep, proving procurement will accept a third-party certification report without formal JISA or IPA endorsement."
  - checkName: Model breaks if
    finding: "Monitoring conversion drops below 50%: at 50% conversion Y3 revenue falls to roughly $450K, burning $350K more cash and leaving only ~$960K at EOY3 — enough runway but no credible Series A leverage."
  - checkName: Next-round proof
    finding: "Series A evidence requires 40+ paying accounts, $800K+ ARR, 60%+ monitoring retention, and at least 2 partner-sourced channels; Q4Y3 base-case metrics deliver all four thresholds by design."

sanityChecks:
  ruleOf40: "Y3 revenue growth 198% (886K vs 297K Y2) + EBITDA margin -57% = Rule of 40 score 141; growth dominates at pre-scale stage; EBITDA path to breakeven requires ~60 customers at steady monitoring rates (estimated Y4)"
  burnMultiple: "Y3 burn multiple = $501K net burn / $590K incremental revenue = 0.85x (efficient; Bessemer benchmark <1.5x for growth stage)"
  revenuePerFte: "$886K Y3 / 8.5 avg FTE = $104K per FTE (below $200-400K SaaS benchmark; expected with high-touch delivery model in Y1-Y3; should exceed $200K by Y4 as monitoring ARR scales without proportional headcount)"
  flags:
    - "Single-geography revenue concentration: all Y1-Y3 customers are Japan-based SIs; export-control reversal deflates primary buying trigger before monitoring base is durable"
    - "Revenue per FTE $104K is below early SaaS benchmark; model assumes gross margin holds at 70%+ even as team doubles — requires benchmark template reuse to avoid consulting drift"
    - "No EBITDA profitability modeled through Y3; breakeven requires roughly 60 active accounts at $750/slot/month monitoring rates, estimated in Y4 at current growth trajectory"
    - "Monitoring conversion at 75% has no live data support yet; every 10-point drop costs roughly $88K in Y3 revenue and $65K in cash — the single biggest model sensitivity"
    - "CAC payback of 9 months assumes Japan enterprise sales cycles stay at 4 months average; documented cases of 6-9 month enterprise cycles would stretch payback to 18 months and compress Series A preparation window"
