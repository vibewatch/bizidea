  - id: A3
    name: Monthly monitoring fee per certified workflow slot
    value: "750"
    unit: USD/month/slot
    source: "[BP pricing] $500-$1,500/month range; $750 mid-to-upper for accounts with 2+ active workflows; $9K/workflow/year steady-state aligns with research $6K floor plus drift-alert premium"
  - id: A4
    name: COGS rate Y1/Y2/Y3
    value: "30/28/26 pct"
    unit: pct
    source: "[BP businessModel.targetGrossMarginPct=70] Y1 30% reflects manual human-review intensive delivery; ramps to 26% by Y3 as benchmark templates and automation increase; gross margin 70% to 74%"
  - id: A5
    name: New customers Y1
    value: "7"
    unit: count
    source: "[BP milestones 0-12 months] 5-8 paid pilots target; model uses 7 as midpoint; first pilot in M5 after 4-month product sprint then 1 new account per month except M9 quiet"
  - id: A6
    name: New customers Y2
    value: "13"
    unit: count
    source: "[BP milestones 12-24 months] 15-20 paying customers target; 7+13=20 cumulative by EOY2"
  - id: A7
    name: New customers Y3
    value: "20"
    unit: count
    source: "[BP milestones 24-36 months] 35-50 paying customers; 20+20=40 cumulative; below midpoint to stay conservative vs upper SOM bound"
  - id: A8
    name: Avg new workflow-slots per new customer Y1/Y2/Y3
    value: "1/1.5/2"
    unit: slots per customer
    source: "[BP sequencingRationale] Start one workflow per pilot; expansion within accounts after first report acceptance; 3-workflow steady-state per SOM model; Y2 ramp reflects design-partner upsell"
  - id: A9
    name: Expansion workflow-slots per existing account per year Y2/Y3
    value: "0.5/1"
    unit: slots/account/year
    source: "[BP expansionLevers] Add more workflows within same SI once first report accepted; 0.5/year Y2 then 1/year Y3 as trust and template reuse builds"
  - id: A10
    name: Monthly churn rate
    value: "1.5"
    unit: pct/month
    source: "[Heuristic] Enterprise B2B SaaS typical 10-20% annual churn; conservative 18% annual (1.5%/month) for early-stage vendor without standards endorsement; Japan loyalty partially offsets"
  - id: A11
    name: Pre-seed funding raised
    value: "3000000"
    unit: USD
    source: "[BP fundingAsk] $2-4M range; model uses $3M midpoint; actual cash math yields 24+ months runway at modeled burn rate"
  - id: A12
    name: All-in headcount cost per FTE
    value: "125000"
    unit: USD/year
    source: "[Heuristic] $100K base salary + 25% employer burden; blended Japan/US hybrid team for AI startup; $10.4K/FTE/month all-in used in P&L"
  - id: A13
    name: Non-headcount monthly overhead
    value: "8000"
    unit: USD/month
    source: "[Heuristic] $2K cloud/tools, $2K Tokyo shared office, $2K legal/accounting, $2K travel/JISA events; lean startup overhead for 4-7 FTE"
  - id: A14
    name: Sales cycle to first paid pilot
    value: "4"
    unit: months
    source: "[BP experimentRoadmap 0-90 days] First paid pilot target by M6; discovery plus concierge cert; Japan B2B typically 3-6 months; JISA channel reduces friction"
  - id: A15
    name: Monitoring conversion rate (pct of qualified accounts)
    value: "75"
    unit: pct
    source: "[BP funnelTargets] pilot-to-production monitoring 50%+ target; model uses 75% as achievable mid-term once report template is trusted by procurement"
  - id: A16
    name: GTM lead start month
    value: "10"
    unit: month
    source: "[BP team] GTM lead Month 9 rationale in BP; model uses M10 reflecting standard 1-month onboarding; S&M cost step-up from $5.7K to $16.1K/month"
  - id: A17
    name: CAC (sales and marketing spend per new customer)
    value: "12000"
    unit: USD
    source: "[Calc A12+A13] Y2 S&M cost $154K (GTM lead salary + CEO 40% time + events) / 13 new customers = $11.8K; rounded to $12K; JISA channel reduces marginal CAC vs pure cold outbound"
  - id: A18
    name: ARPU annual blended
    value: "22000"
    unit: USD/year
    source: "[Calc A3+A8] EOY3 steady-state: 2.25 slots/account x $750/month x 12 = $20.25K monitoring + $1.75K avg qualification activity = $22K; within research $6K/workflow x 3 workflows = $18K floor"

