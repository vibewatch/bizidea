problem: >-
  在 Anthropic Claude API 上搭建了生产 AI 工作流的日本企业和 ISV，正面临美国出口管制扩大带来的突发性、不可预测的
  访问中断风险——当 Anthropic 将 Mythos 和 Fable 限制为非美国市场不可用时，这一风险已变为现实。访问一旦中断，
  迁移到 Sakana Fugu 等区域替代方案就需要证明新模型在性能、安全性和日语质量标准上与原模型等同。目前没有任何
  结构化认证工具链：企业依赖临时手工测试，产出物既无法满足企业客户的采购审查要求，也无法通过监管合规审核，
  由此带来合同责任风险，并将迁移审批时间拖延数周乃至数月。
targetUser:
  primary: >-
    东京中小型系统集成商（SIer，员工 100–2,000 人）的 ML/AI 工程负责人——这些公司已将日语文档分析、摘要或对话
    等生产工作流搭建在 Anthropic Claude API 上，服务对象为金融服务或制造业的企业客户。
  secondary: >-
    大型日本金融服务机构和政府机构的 AI 合规官——在批准模型迁移前，他们需要书面证据证明 AI 替换方案
    达到安全与性能标准。
  buyer: "中小型 ISV 的 CTO 或 VP 工程，或大型日本企业 AI 治理负责人"
startupThesis:
  nonObviousInsight: >-
    出口管制的影响不只是封锁了一个模型——它同步触发了所有在日使用 Anthropic API 的企业的迁移危机。
    这种集中爆发的认证服务需求，形成了一个半年前根本不存在、现有企业评估工具完全无力覆盖的时间窗口。
    率先构建认证方法论的公司，将拿下随之而来的迁移合同。
  beachhead: >-
    东京中小型系统集成商（员工 100–2,000 人），已在 Anthropic Claude API 上搭建一条或多条日语文档分析、
    摘要或客服对话生产工作流，服务对象为要求审计级迁移文档的金融服务或制造业企业客户。
  wedge: >-
    按工作流计费的认证报告服务：ISV 上传现有提示词库和黄金测试集，对 Sakana Fugu 运行跨模型基准测试，
    获得一份企业客户可在采购和合规审查中接受的差距分析认证文档。
  whyNowCatalyst: >-
    Anthropic 将 Mythos 和 Fable 限制为非美国市场不可用，加上 Sakana 明确将 Fugu 定位为企业对冲方案，
    立即制造了有据可查的买家紧迫感——而这正是现有任何 LLM 评测工具都无法满足的需求。
  ventureScalePath: >-
    从面向日本 ISV 的 Fugu 认证起步，向其他受出口管制影响的市场扩展（韩国、欧盟 AI 法规合规、印度），
    最终成为任何需要管理多模型运营、模型升级或供应商锁定风险的企业所依赖的模型无关企业认证与治理平台。
solution: >-
  一款 SaaS 平台：日本 ISV 和企业 AI 团队上传现有提示词套件、黄金测试集和工作流规格，运行系统化跨模型
  基准测试，对比受限美国模型与 Sakana Fugu 等区域候选模型的表现。引擎生成结构化差距分析，记录性能退化点、
  安全行为差异和日语质量缺口，并提供针对每项缺陷的提示词适配策略排序建议。每次基准测试都生成一份格式化
  的认证报告，供企业采购和受监管行业合规审查使用——这份审计文件让客户能正式批准迁移。平台积累跨模型对的
  常见迁移模式适配手册，将每次完成的认证转化为持续增长的竞争壁垒。持续监控订阅会在模型更新导致已认证
  差距档案发生变化时向客户发出警报，在初始项目合作之外产生经常性收入。
goToMarketSeed:
  firstCustomer: >-
    一家员工 200–500 人的东京系统集成商——已在 Claude API 上搭建了日语文档分析或摘要工作流，服务某金融服务
    企业客户，且已收到该客户的书面要求：在迁移审批前须证明基于 Fugu 的备选方案达到与现有工作流相同的质量和安全标准。
  buyingTrigger: >-
    企业客户正式要求书面认证——需获得其采购委员会和风险职能认可——证明基于 Fugu 的替代方案在性能和安全性上
    与现有 Claude API 工作流持平，否则不予授权迁移。
  currentAlternative: >-
    ISV 内部 AI 工程师用自研评测脚本和非正式提示词比对进行临时手工测试，无法产出标准化文档或审计可用的交付物。
  switchingReason: >-
    认证报告是采购可接受的审计文件，能解锁客户签字；手工测试无法产出此类文件，导致合同风险，
    并在访问限制截止日期临近之际将迁移审批拖延数周乃至数月。
  pricingHypothesis: >-
    按工作流计费的认证项目费用（每工作流 $3,000–$8,000），加上持续的月度监控订阅
    （每月 $500–$1,500），用于模型变更警报和持续基准跟踪。
