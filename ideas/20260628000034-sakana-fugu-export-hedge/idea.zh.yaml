jobsToBeDone:
  - job: >-
      当企业客户正式要求提供书面证明——证明基于 Fugu 的替代方案与现有 Claude API 工作流在性能和安全标准上
      一致时，帮助 ISV 的 AI 负责人开展系统化跨模型认证并生成认证文档，从而在访问限制截止日期前完成客户
      采购审查并推进迁移。
    currentAlternative: >-
      内部 AI 工程师用自研脚本进行临时提示词比对，无标准化输出格式，也无审计可用的文档。
    successMetric: >-
      收到认证报告后 30 天内，企业客户采购部门批准基于 Fugu 的迁移，且客户跟进问题不超过两轮。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      TechCrunch 同时报道了 Anthropic 出口管制和 Sakana Fugu 的企业对冲定位，确认了真实的市场事件：
      有具名公司、有记录的业务影响，模型提供商本身也已识别出具体的企业买家群体。
  painIntensity:
    score: 4
    rationale: >-
      ISV 若在未完成书面认证的情况下迁移，将面临合同责任、企业关系受损和潜在收入损失；痛点急迫、
      有时间压力，且集中在一批缺乏现有结构化解决方案的在日 API 依赖型企业。
  wedgeClarity:
    score: 5
    rationale: >-
      切口极为具体：针对出口管制驱动的模型迁移，提供按工作流的认证报告服务，目标客户为服务金融服务企业的
      东京中小型 ISV。窄到足以在 90 天冲刺内落地，并可立即与单一共创客户 ISV 完成验证。
  defensibility:
    score: 3
    rationale: >-
      先发优势加上积累的适配手册，随时间推移形成有实质意义的竞争壁垒；但大型系统集成商或超大规模云厂商
      可能为头部客户自建内部工具。前 18 个月聚焦服务不足的中小型 ISV 可降低这一风险。
  ventureScale:
    score: 4
    rationale: >-
      仅日本 ISV 市场就能支撑可观的初期 ARR；向韩国、欧盟 AI 法规合规和通用多模型治理场景扩展，
      随着模型迁移事件成为企业常态，可打开全球数亿美元的平台级机会。
topRisks:
  - name: "出口管制逆转削弱紧迫感"
    description: "若美国解除对 Anthropic 等前沿模型的出口管制，主要购买触发因素消失，企业认证需求可能迅速崩塌。"
    mitigation: "从第一天起就将平台定位为通用模型迁移与治理工具——在任何单一出口管制场景之外，它对模型升级、多模型运营和内部合规同样有价值。"
  - name: "区域模型质量达不到企业标准"
    description: "若 Sakana Fugu 在关键企业任务上无法达到与美国前沿模型相当的性能，日本企业可能无限期推迟迁移，而非接受低质量的备选方案。"
    mitigation: "从一开始就将平台构建为模型无关，使其能认证任何区域模型候选方案，确保无论哪家区域模型最终赢得企业市场，价值主张都成立。"
  - name: "大型系统集成商和超大规模云厂商自建内部工具"
    description: "富士通、NTT Data、AWS Japan 等日本大型系统集成商和云厂商可能在内部构建专有认证框架，占据大企业客户细分。"
    mitigation: "将初期 GTM 完全聚焦于员工 100–2,000 人的中小型 ISV——这些企业缺乏 AI 团队自建内部工具的能力，同时服务于要求审计级认证文件的企业客户。"
