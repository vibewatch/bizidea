  - 39
- name: LangSmith
  stage: scale-up
  wedge: 与 LangChain 开发者生态系统紧密对齐的链路追踪和评测基础设施。
  pricing: 付费席位从每用户每月 $39 起，加上链路追踪和部署用量。
  strength: 强大的开发者心智份额，以及成熟的离线基准测试与在线监控分离机制。
  weaknessVsUs: 以开发者为中心且框架相邻，因此不能自然解决供应商中立认证或日本采购打包问题。
  sourceRefs:
  - 16
  - 34
- name: Humanloop
  stage: scale-up
  wedge: 企业评测、提示词管理和可观测性，具备 UI 优先和代码优先的协作模式。
  pricing: 企业主导/定制；公开定价页面描述平台但无透明的固定认证档位。
  strength: 技术和非技术审查者之间良好的协作模式，加上内置的 LLM 评判者和人工评测者。
  weaknessVsUs: 针对内部产品迭代优化，而非面向外部买家或客户签字的独立迁移证据。
  sourceRefs:
  - 18
  - 36
- name: Braintrust
  stage: scale-up
  wedge: 横向 AI 治理、评测和可观测性，带有明确的审计和访问控制定位。
  pricing: 有公开定价，但打包仍面向企业，而非简单的按工作流认证报价。
  strength: 清晰的治理叙事，覆盖评测时、生产审计、访问控制和运行时执行。
  weaknessVsUs: 宽泛的治理范围对于日本优先的窄迁移问题显得过重，且未针对本地语言或采购规范定制。
  sourceRefs:
  - 17
  - 38
- name: Galileo
  stage: scale-up
  wedge: AI 可靠性平台，将评测、可观测性和护栏结合，带有公开自助服务定价。
  pricing: 免费档位，Pro 档 $100/月，企业定制。
  strength: 清晰的可靠性定位、公开的入门定价，以及近期增长和融资带来的强劲类别势头。
  weaknessVsUs: 专注于内部可靠性和可观测性，而非针对特定替换事件的买家认可认证文件。
  sourceRefs:
