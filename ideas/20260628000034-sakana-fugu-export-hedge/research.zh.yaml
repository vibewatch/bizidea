competitors:
- name: Arize AI
  stage: scale-up
  wedge: 跨框架的 LLM 和 Agent 评测加上预生产和生产的可观测性。
  pricing: 公开定价页面面向企业，未呈现此使用场景的清晰自助服务档位。
