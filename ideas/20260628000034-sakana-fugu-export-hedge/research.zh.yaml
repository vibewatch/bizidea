    sourceRefs:
    - 21
    - 22
    - 25
    - 26
    - 27
  adoptionFrictionMatrix:
  - friction: 客户通常缺乏干净的、工作流专属的黄金测试集来对模型替换做基准测试。
    severity: high
    affectedBuyer: SI 或企业平台团队的 AI/ML 负责人
    mitigation: 将从提示词、生产链路追踪和买家核准样例中自举数据集作为首次认证的一部分。
    sourceRefs:
    - 10
    - 16
    - 18
    - 19
  - friction: 提示词日志和评测数据可能包含个人信息或保密商业信息，使基准测试同时成为隐私项目和质量保证项目。
    severity: high
    affectedBuyer: 合规、隐私和风险负责人
    mitigation: 在客户数据进入任何评测运行前，支持日语脱敏政策、最小保留模式和明确的 APPI 处理流程。
    sourceRefs:
    - 4
    - 21
    - 27
  - friction: 采购团队可能不信任迁移建议，除非附有审计日志、审批记录和标准化报告格式。
    severity: high
    affectedBuyer: 采购委员会和 AI 治理职能
    mitigation: 为每次评测打包可追溯日志、报告导出、人工审查检查点和审批元数据。
    sourceRefs:
    - 9
    - 12
    - 13
    - 20
    - 37
    - 38
  - friction: 模型行为随版本发布漂移，单次基准测试可能迅速过期。
    severity: medium
    affectedBuyer: 产品负责人或平台工程负责人
    mitigation: 将一次性认证转化为定期重跑和已认证差距档案发生重大变化时的增量警报。
    sourceRefs:
    - 10
    - 11
    - 14
    - 16
  - friction: 区域模型可能在特定领域质量门槛上仍存在差距，尤其当日语细微差别至关重要时。
    severity: medium
    affectedBuyer: 等待批准迁移的业务发起方
    mitigation: 使用成对任务级基准测试和适配建议，而非在模型层面声称是/否的等同性。
    sourceRefs:
    - 5
    - 6
    - 10
    - 19
