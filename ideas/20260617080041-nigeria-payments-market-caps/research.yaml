competitors:
- name: MetricStream
  stage: incumbent
  wedge: Horizontal GRC and compliance workflow automation.
  pricing: Custom enterprise quote.
  strength: Mature control-testing, case-management, and policy workflows for enterprise compliance teams.
  weaknessVsUs: Not pre-modeled for Nigerian issuing/acquiring cap math, payment-rail routing, or filing-grade denominator logic.
  sourceRefs:
  - 35
- name: Collibra
  stage: incumbent
  wedge: Data governance, lineage, and trusted data foundations.
  pricing: Custom enterprise quote.
  strength: Strong catalog and governance posture for regulated data environments.
  weaknessVsUs: Stops at data governance; does not natively generate CBN-style monthly returns or remediation scenarios.
  sourceRefs:
  - 36
- name: Interswitch / Verve
  stage: incumbent
  wedge: Local payment rails, card scheme, QR, and enterprise payments infrastructure.
  pricing: Enterprise infrastructure contracts and custom commercial terms.
  strength: Deep integration into Nigerian banks, cards, merchants, and acceptance infrastructure.
  weaknessVsUs: A rail operator is not the same thing as a neutral group-level compliance control plane for concentration and storage rules.
  sourceRefs:
  - 29
