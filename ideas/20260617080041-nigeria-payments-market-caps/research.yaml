openQuestions:
- The linked CBN circular PDF was fetch-blocked in this run; what exact denominator, rail, and related-party definitions govern the 25 percent and 15 percent tests?
- Will the CBN aggregate bank, MFB, processor, and agent subsidiaries under one UBO as a single reporting perimeter for both issuing and acquiring share?
- What supervisory sanctions or remediation steps apply before a hard breach, and will there be phased waivers for migration or split-entity plans?
- How much critical payment data still sits outside Nigeria among the most exposed operators, and which datasets are hardest to repatriate without downtime?
