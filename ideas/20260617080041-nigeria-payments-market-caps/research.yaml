reportMemo:
  executiveTakeaways:
  - 'The wedge is real: the regulation turns concentration monitoring and data residency into dated operating work, not abstract policy risk.'
  - The beachhead is commercially urgent but logo-constrained; Nigeria works as a sharp entry wedge, not a complete standalone market story.
  - The best buyers are payment groups broadening across both merchant and consumer sides because structural risk rises as they add banking, cards, and POS footprint.
  - Execution risk is as much about integrations and migration sequencing as legal interpretation, so cloud and advisory partnerships matter early.
  marketDefinition: Nigeria-first software and workflow tooling for regulated payment groups that need to measure cross-side concentration, evidence in-country payment-data storage, and defend monthly filings at transaction level.
  customerAndBuyer: The practical buyer is a chief compliance officer, COO, or group CTO inside a large Nigerian payment group. The deal closes when one person has to own filing accuracy, infrastructure repatriation, and entity-level market-share exposure at the same time.
  buyingTriggers:
  - point: The new circular converts concentration monitoring into monthly market-share returns with a year-end 2026 market-structure deadline and a January 2027 storage deadline.
    sourceRefs:
    - 1
    - 2
  - point: Expansion from merchant payments into banking, deposits, cards, and consumer finance raises the chance that one group now straddles both sides of the network.
    sourceRefs:
    - 22
    - 23
    - 24
    - 25
  - point: Local-cloud and data-centre buildouts create natural budget cover for repatriation and compliance programs that a control plane can attach to.
    sourceRefs:
    - 32
    - 33
    - 34
  willingnessToPay:
    summary: This looks like an enterprise-budget problem, not SMB SaaS. Buyers already absorb recurring compliance work, migration spend, and payment-ops risk, so a tool that shrinks monthly return effort and de-risks onshore readiness can sell as part of a broader remediation program.
    sourceRefs:
    - 1
    - 4
    - 5
    - 33
    - 34
  competitiveLandscape: Direct Nigeria-specific cap-compliance software still appears sparse, but buyers can already assemble partial substitutes from horizontal GRC, data governance, local hosting, processor dashboards, and advisory work. The winning product therefore has to collapse those fragments into one regulator-grade workflow rather than compete on a generic dashboard.
  incumbentThesis:
  - incumbentClass: Cloud platforms
    point: Local hosting solves only the sovereignty layer; it does not compute CBN-style market-share math or monthly filing evidence by entity and rail.
    sourceRefs:
    - 11
    - 12
    - 33
    - 34
  - incumbentClass: Generic GRC suites
    point: Horizontal IRM and GRC products bring workflow depth, but they still need heavy customisation before they resemble Nigerian payments supervision logic.
    sourceRefs:
    - 35
    - 39
  - incumbentClass: Data governance suites
    point: Cataloging and lineage are useful inputs, yet they stop short of regulator-ready denominator models, remediation scenarios, and filing packs.
    sourceRefs:
    - 36
  - incumbentClass: Payment rails and processors
    point: Processors own valuable transaction data, but buyers may resist relying on a market participant as the neutral arbiter of group-level concentration exposure.
    sourceRefs:
    - 17
    - 18
    - 37
    - 38
  - incumbentClass: In-house BI and manual ops
    point: Internal dashboards can reproduce one report, but recurring routing changes, agent rules, and monthly filings turn the problem into workflow software rather than one-off analytics.
    sourceRefs:
    - 17
    - 20
    - 25
  regulatoryLandscape: The category sits at the intersection of payments supervision, data-protection and transfer rules, beneficial-ownership disclosure, and AML automation. A credible product must therefore treat every rule as versioned policy rather than hard-coded logic.
  technologyLandscape: Hosting is necessary but insufficient. The hard product problem is an in-country evidence ledger that can unify processor feeds, PTSA routes, merchant and agent footprints, and cloud-storage maps into reproducible filing outputs.
  distributionChannels:
  - point: Founder-led direct sales into compliance, payments-ops, and CTO-led remediation programs at the highest-risk operators is the clearest initial route.
    sourceRefs:
    - 1
    - 21
    - 25
