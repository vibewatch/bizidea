  - 38
- name: ServiceNow IRM
  stage: incumbent
  wedge: Workflow-centred risk and compliance orchestration.
  pricing: Quote-based module licensing.
  strength: Enterprise workflow breadth and strong adoption inside large risk teams.
  weaknessVsUs: Requires significant customisation before it looks like Nigerian payments supervision software.
