slug: payments-cap-compliance-os
date: '2026-06-17'
executiveSummary: >-
  Payments Cap Compliance OS should be built as a Nigeria-first compliance control plane for payment groups that now have to prove both market-share discipline and local data storage under new CBN deadlines. The most credible first customer is a large Nigerian payments group that operates across issuing and merchant acquiring, stores some payment data outside Nigeria, and has already launched a board-level remediation program for December 2026 readiness. The immediate pain is not generic GRC; it is the monthly work of reconciling processor, merchant, entity, and hosting data into one regulator-grade view that can survive audit and still inform commercial decisions. The strongest wedge is therefore a paid diagnostic and filing workflow that computes cap exposure by entity and rail, produces the first monthly filing pack, and identifies which datasets must be moved onshore first. Research supports a real timing catalyst, but it also shows the market is logo-constrained, with an estimated $9.0M TAM, $3.8M initial SAM, and $1.5M year-3 SOM unless the company expands into adjacent geographies or rule sets. Product, pricing, and channels must all stay aligned to that constraint: founder-led sales into compliance and CTO buyers, onboarding tied to one high-risk group structure, and annual pricing by legal entities plus monitored payment volume. The main reason to believe is that incumbents each solve only one slice of the problem, while the new regulation forces customers to unify compliance math, data lineage, and remediation workflow in one place. The main reason to doubt is that the underlying circular PDF was not fetched in research, so exact denominator definitions, aggregation logic, and sanctions still need confirmation before the product hard-codes policy assumptions.
problem:
  - "Dual-sided Nigerian payment groups often cannot calculate issuing and acquiring exposure across subsidiaries, rails, and partner flows with enough precision to file monthly regulator-grade reports."
  - "The same operators must now repatriate payment data into Nigeria and document beneficial ownership under deadline, but those workstreams usually sit across separate compliance, engineering, legal, and infrastructure teams."
solution:
  - "Provide a Nigeria-resident compliance ledger that ingests payment, entity, and storage-footprint data, normalizes it by legal entity and rail, and computes CBN-style market-share exposure with transaction-level evidence."
  - "Start with a paid diagnostic plus first filing workflow, then expand into remediation scenarios, onshore-data migration tracking, and recurring monthly compliance operations for the whole payment group."
whyWeWin:
  - "The wedge sits exactly where substitutes break down: local hosting vendors do not compute share-cap math, generic GRC tools do not model payment rails, and internal BI cannot sustain versioned monthly filings plus remediation workflow."
  - "Each filing cycle compounds proprietary value in entity mapping, denominator assumptions, remediation playbooks, and onshore-data lineage that make the system harder to replace than a one-off consulting project."
strategicChoices:
  beachhead: "Nigerian payment groups with both issuing and merchant-acquiring exposure, offshore payment-data footprints, and a named 2026 remediation owner before the December 31, 2026 compliance deadline."
  wedgeRationale: >-
    This slice creates faster proof than selling broadly into all fintechs or banks because the buyer already faces monthly reporting, potential cap exposure, and a near-term migration program at the same time. It also supports enterprise ACVs without requiring the company to win a large volume of lower-urgency logos.
  sequencingRationale: >-
    The company should start with read-only ingestion, one filing-grade rules layer, and a paid remediation diagnostic because trust and policy accuracy matter more than deep automation in year one. GTM stays founder-led until the team proves that one diagnostic converts into an annual subscription, while hiring prioritizes compliance engineering and implementation before channel scale. Partnerships with local cloud and advisory firms come after the core filing workflow works because those partners amplify distribution only if the product already owns the compliance narrative.
  notYet:
    - "Pan-African expansion before 3-5 Nigerian production logos prove the workflow and economics"
    - "Full AML transaction monitoring or generic risk-management modules"
    - "Merchant analytics dashboards for revenue teams"
    - "Automated restructuring recommendations without customer and counsel review"
market:
  tam: "$9.0M estimated TAM based on 36 CBN-licensed MMOs and switching/processors at roughly $250k blended annual ACV, excluding banks and expansion outside Nigeria."
  sam: "$3.8M estimated initial SAM based on roughly 15 high-scale Nigerian groups with meaningful dual-sided exposure and board-level readiness work at about $250k ACV."
  som: "$1.5M estimated year-3 SOM based on about 6 reachable production logos at roughly $250k blended ACV in a logo-constrained but urgent entry market."
  segments:
    - "Primary: large Nigerian PSP, processor, switch, or bank-owned payment groups with both issuing and acquiring exposure"
    - "Secondary: regional African payment groups and banks facing adjacent sovereignty, ownership, or concentration rules after Nigeria proof"
  buyingProcess: >-
    The day-to-day champion is likely the chief compliance officer, COO, or group CTO, but deals start only when one executive owns filing accuracy, remediation planning, and infrastructure repatriation together. The first contract should begin as a board-backed readiness diagnostic or first monthly filing project, then convert to annual software once the customer trusts the calculations and evidence model.
product:
  mvp: >-
    The MVP should ingest processor exports, merchant and entity mappings, and cloud-region or storage inventories for one payment group, then calculate share exposure by entity and rail, generate a filing-ready evidence pack, and flag onshore-data gaps. It should remain read-only and human-reviewed rather than attempt live routing or automated restructuring decisions.
  sixMonth: "Ship 2-3 paid diagnostics and one production-grade filing workflow with configurable rules, entity graphing, evidence packs, storage-footprint mapping, and audit logs."
  twelveMonth: "Add repeatable connectors into common processor, switch, data warehouse, and cloud-log sources, plus scenario modeling for routing, partner, or entity-structure changes and hardened role controls for enterprise procurement."
  twentyFourMonth: "Expand from Nigerian filing workflow into a broader market-structure and data-sovereignty control plane covering more African jurisdictions, deeper migration orchestration, and benchmark exposure analytics across multiple payment groups."
  keyBets:
    - "The first painful workflow is filing-grade concentration monitoring and onshore-readiness evidence, not generic governance automation."
    - "Customers will trust a read-only compliance ledger faster than a system that tries to control production payment routing."
    - "A paid diagnostic can convert into recurring software because monthly filing and remediation work repeats after the initial project."
    - "Rules versioning and entity mapping can become reusable enough to keep implementation from turning into bespoke consulting."
gtm:
  wedge: "Sell a paid cap-and-localization readiness diagnostic that delivers the first regulator-grade exposure model and filing pack for one high-risk payment group, then convert that workflow into an annual compliance operating subscription."
  channels:
    - "Founder-led direct sales to chief compliance officers, COOs, and group CTOs at high-risk Nigerian payment groups"
    - "Referral and co-sell partnerships with local regulatory advisers, audit firms, and AML or governance specialists already interpreting the circular"
    - "Co-sell motions with local cloud, colocation, and migration partners when buyers are already repatriating payment data"
  funnelTargets: "Target account→qualified discovery 20-30%, qualified discovery→paid diagnostic 20-35%, paid diagnostic→annual production 50%+, production logo→second entity or jurisdiction expansion 40%+ within 12 months."
  pricing: "Start with a paid 6-10 week diagnostic and first filing package, then annual SaaS priced by legal entities under monitoring and monthly payment volume, plus onboarding for source mapping. This matches how buyers budget today: they already fund remediation workstreams and need one auditable system of record rather than more seats or dashboards."
businessModel:
  revenueStreams:
    - "Annual subscription for the compliance ledger, filing workflow, and evidence retention"
    - "Onboarding and data-mapping fees for the first entity group or filing cycle"
    - "Expansion fees for scenario modeling, additional entities, and new jurisdictions"
  unitOfValue: "Legal entities and monitored monthly payment volume under compliance workflow"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more entities, rails, and monthly filing cycles within the same payment group"
    - "Sell scenario-modeling and remediation-planning modules once the filing workflow is trusted"
    - "Expand into adjacent African markets or bank subsidiaries facing similar sovereignty and concentration rules"
    - "Embed through audit, advisory, and infrastructure partners that manage multiple regulated operators"
strategyMap:
  northStarMetric: "Monthly CBN filing cycles completed with transaction-level evidence and no unresolved exposure exceptions"
  inputMetrics:
    - "Paid diagnostics started per quarter"
    - "Days from kickoff to first filing-grade exposure model"
    - "Percentage of monitored payment volume mapped to legal entity, rail, and storage location"
    - "Paid diagnostic to annual production conversion rate"
    - "Average number of entities or rails expanded per production customer"
  moatsToBuild:
    - "Versioned rules library for Nigerian cap formulas, filing templates, and policy overrides"
    - "Entity-resolved transaction history linked to filing outcomes, remediation actions, and audit questions"
    - "Onshore-data lineage and migration telemetry tied directly to compliance evidence"
  killCriteria:
    - "Fewer than 6 of the first 15 qualified ICP interviews confirm a live monthly reporting or remediation workflow with spreadsheet-based reconciliation."
    - "Fewer than 2 of the first 4 paid diagnostics convert to annual production subscriptions."
    - "Median time from kickoff to first filing-grade model exceeds 45 days across the first 3 deployments because source data is too fragmented."
    - "Primary-circular review shows denominator or aggregation logic that makes the proposed rules engine materially different from customer expectations."
  mermaid: |
    flowchart LR
      Wedge[Paid cap-compliance diagnostic] --> MVP[Read-only filing and evidence ledger]
      MVP --> Proof[Trusted monthly filings and remediation plans]
      Proof --> Expansion[Multi-entity and multi-market compliance OS]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Strong forcing event and coherent workflow wedge, but conviction stays moderate until policy details, budget ownership, and repeatable deployment speed are proven in the field."
    whyBelieve: "The regulation turns concentration math, data residency, and ownership evidence into one dated enterprise workflow that current substitutes do not unify well."
    whyDoubt: "The immediate Nigerian logo universe is small and the missing primary circular details could reduce urgency or change product requirements."
    nextDiligence: "Secure the primary circular, validate the exact reporting formula with counsel and two target operators, and convert one paid diagnostic into an annual production contract within a filing cycle."
  firstCustomer:
    title: "Chief compliance officer at a dual-sided Nigerian payment group"
    profile: "A large Nigerian PSP, processor, or bank-owned payments group with issuing and merchant-acquiring exposure, some transaction data still hosted outside Nigeria, and a board-mandated 2026 remediation plan."
    trigger: "A board or regulator readiness review before the December 2026 deadline exposes unclear cap exposure, fragmented monthly reporting, or unverified onshore-data status."
    buyer: "Chief compliance officer, COO, or group CTO"
    initialContract: "$50k-$100k paid diagnostic and first filing package, credited toward a $180k-$300k annual production contract once one filing cycle is completed and monitored sources remain live."
  mustBeTrue:
    - "At least 40% of qualified beachhead accounts must already reconcile cap exposure or storage readiness through spreadsheets, manual exports, or fragmented advisory work."
    - "The first filing-grade diagnostic must convert to annual production in at least half of early deployments because the workflow repeats monthly."
    - "Rules versioning must absorb primary-circular ambiguity without turning every customer into a custom policy implementation."
    - "One Nigerian payment group must support annual ACV in roughly the $180k-$300k range once entities and monitored volume are live."
    - "Nigerian proof points must transfer into adjacent African sovereignty or market-structure rules before the initial logo pool saturates."
  diligenceQuestions:
    - "What exact denominator, rail, and related-party definitions does the primary CBN circular use for the 25% and 15% tests?"
    - "Who inside the first target account actually controls budget when compliance, data migration, and payments operations all touch the same problem?"
    - "How many source systems and cloud regions must be mapped before one filing-grade model is credible enough for production use?"
    - "Will buyers accept a read-only evidence ledger first, or do they expect deeper workflow automation before signing annual software?"
    - "Which partner channel sources the fastest qualified opportunity: local counsel, audit firm, AML vendor, or cloud migration partner?"
operatingAssumptions:
  - assumption: "Large dual-sided Nigerian payment groups are the earliest and highest-intensity buyers because they face both cap exposure and data-localization work at once."
    basis: idea.yaml
    validationTest: "Interview 15 target operators and confirm that at least 6 already have named remediation owners, active reporting work, and board-level concern before year-end 2026."
    decisionImpact: "If false, the ICP must narrow further to bank-owned groups or expand to adjacent regulated workflows with stronger urgency."
  - assumption: "A paid diagnostic and first filing pack is the fastest credible entry point into annual software."
    basis: research.yaml
    validationTest: "Run 4 proposal cycles and confirm that at least 2 buyers approve a paid diagnostic with a defined conversion path to annual subscription."
    decisionImpact: "If false, the company must either sell through advisory partners, lower scope to a reporting product, or accept a slower enterprise sales motion."
  - assumption: "Read-only ingestion from exports, warehouses, and cloud logs is enough to prove value before customers demand production-routing control."
    basis: idea.yaml
    validationTest: "Deliver the first 2 diagnostics using read-only data access and confirm each produces a filing-grade model without blocking on core payment-stack integration."
    decisionImpact: "If false, implementation cost and security review rise materially, which increases capital needs and reduces early gross margin."
  - assumption: "Rules ambiguity in the circular can be managed through policy versioning instead of bespoke code for every customer."
    basis: research.yaml
    validationTest: "Review the primary circular with counsel and two design partners, then document whether one configurable rules framework covers all required filing assumptions."
    decisionImpact: "If false, the product behaves more like consulting software and loses its repeatable venture profile."
  - assumption: "The product can expand beyond Nigeria into adjacent sovereignty or concentration workflows before the local logo universe saturates."
    basis: operator judgment
    validationTest: "Map at least 3 adjacent African or bank-subsidiary rule sets and confirm with 5 buyer conversations that the same evidence ledger solves a near-term second use case."
    decisionImpact: "If false, investors should underwrite the company as a narrower Nigeria compliance business with lower ceiling and tighter burn discipline."
experimentRoadmap:
  - horizon: 0–90 days
    experiment: "Interview 15 chief compliance, COO, and CTO leaders at dual-sided Nigerian payment groups and banks."
    hypothesis: "Monthly cap reporting and onshore-data readiness already sit inside an active executive remediation workflow."
    successMetric: "At least 10 interviews confirm live spreadsheet or fragmented advisory work, and at least 5 accounts share a near-term reporting or board review deadline."
    owner: "Founder/CEO"
  - horizon: 0–90 days
    experiment: "Run 2 concierge diagnostics using sample processor, entity, and storage-footprint data from design partners before full product automation."
    hypothesis: "One filing-grade exposure model can be assembled with a repeatable data schema from read-only inputs."
    successMetric: "Two design partners receive usable exposure outputs and one pays for a follow-on diagnostic or filing workflow."
    owner: "Founding eng"
  - horizon: 90–180 days
    experiment: "Validate the primary circular, filing template, and policy edge cases with local counsel plus two affected operators."
    hypothesis: "A versioned rules engine can cover the real reporting logic without per-customer rewrites."
    successMetric: "One validated rules specification covers at least 80% of filing logic and is accepted by two design partners for pilot use."
    owner: "Compliance product lead"
  - horizon: 90–180 days
    experiment: "Close 2-3 paid diagnostics and deliver the first monthly filing packs."
    hypothesis: "Customers will fund a paid entry product if it reduces filing risk and shortens readiness work."
    successMetric: "At least 2 paid diagnostics complete, and at least 1 converts to an annual production contract within one filing cycle."
    owner: "Founder/CEO"
  - horizon: 180–360 days
    experiment: "Launch one co-sell motion with a local audit or regulatory advisory firm and one local cloud or migration partner."
    hypothesis: "Partner channels can source qualified opportunities once the company has one live proof point."
    successMetric: "Partners contribute at least 3 qualified opportunities and 1 signed diagnostic."
    owner: "Partnerships lead"
  - horizon: 180–540 days
    experiment: "Add scenario modeling for routing, merchant mix, or entity-structure changes inside the first production accounts."
    hypothesis: "Expansion revenue comes from remediation planning, not just monthly report generation."
    successMetric: "At least 2 production customers adopt the scenario module and expand ACV by 25% or more."
    owner: "Product lead"
operations:
  - "Maintain a Nigeria-resident evidence ledger with immutable audit logs, policy versions, and source-to-filing traceability for every reported metric."
  - "Standardize onboarding around one entity map, one storage-footprint inventory, and one filing baseline before automating deeper workflows."
  - "Package security, counsel-review, and policy-override workflows early because trust and regulatory accuracy are the first adoption barriers."
  - "Operate with local hosting, migration, and advisory partners so infrastructure and compliance workstreams stay coordinated inside customer accounts."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, design-partner selection, and pricing because the main risk is whether the workflow earns a standalone enterprise budget."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the compliance ledger, ingestion layer, and rules engine that determine time to first filing-grade output."
  - role: "Compliance product lead"
    startTiming: "Month 1-3"
    rationale: "Turn circular logic, filing templates, and policy edge cases into configurable product requirements rather than ad hoc services work."
  - role: "Solutions and implementation engineer"
    startTiming: "Month 3-6"
    rationale: "Shorten source mapping, data normalization, and deployment time across the first customer cohort."
  - role: "Partnerships lead"
    startTiming: "Month 9-12"
    rationale: "Scale referrals from advisory and infrastructure partners only after the first production proof point exists."
milestones:
  - horizon: 0–12 months
    items:
      - "Validate the primary circular and publish one production-ready rules specification"
      - "Sign 3 paid diagnostics with high-risk Nigerian payment groups"
      - "Convert at least 2 diagnostics into annual production subscriptions"
      - "Complete one referenceable monthly filing workflow with transaction-level evidence"
  - horizon: 12–24 months
    items:
      - "Launch repeatable connectors for the most common processor, warehouse, and cloud-log environments in the beachhead"
      - "Expand at least 2 customers into additional entities, rails, or scenario modules"
      - "Sign 1-2 channel partnerships that each source qualified compliance opportunities"
      - "Prove readiness for one adjacent geography or rule set beyond Nigeria"
  - horizon: 24–36 months
    items:
      - "Reach 6 production logos and approximately $1.5M ARR if ACV assumptions hold"
      - "Support multi-jurisdiction workflows for at least one regional payment group"
      - "Benchmark exposure, filing-cycle time, and remediation patterns across the customer base"
      - "Decide whether to stay focused on payments supervision or broaden into adjacent regulated infrastructure controls"
risks:
  - risk: "The underlying CBN circular may define denominator, aggregation, or enforcement rules differently than public summaries imply."
    likelihood: High
    impact: High
    mitigation: "Keep formulas and templates versioned, validate with counsel and design partners before automation, and avoid promising autonomous compliance decisions until the primary text is confirmed."
  - risk: "The Nigerian beachhead may contain too few urgent logos to support efficient standalone growth."
    likelihood: High
    impact: High
    mitigation: "Target the highest-risk groups first, sell for high ACV, and validate adjacent African or bank-subsidiary use cases before scaling headcount."
  - risk: "Fragmented processor, entity, and cloud data could make deployment slower and more services-heavy than planned."
    likelihood: Medium
    impact: High
    mitigation: "Start with read-only diagnostics, productize the first connectors aggressively, and hire implementation talent before scaling sales."
  - risk: "Horizontal GRC suites, advisory firms, or processors may bundle enough workflow to block a new standalone vendor."
    likelihood: Medium
    impact: Medium
    mitigation: "Own the filing-grade rules engine and evidence model, then use those same advisers and infrastructure vendors as channels rather than direct enemies."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months should fund a small team to validate the circular, ship the first filing-grade ledger, win 3 paid diagnostics, convert at least 2 production customers, and establish the local compliance and hosting partnerships required for repeatable deployments."
