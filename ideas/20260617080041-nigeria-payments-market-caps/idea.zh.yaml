problem: >-
  同时运营消费者发卡和商户收单业务的尼日利亚支付集团，往往缺乏跨子公司、产品线和数据存储的监管级市占率视图。CBN 的新阈值将这一盲区变成了生存风险——企业可能在一侧市场持续扩张的同时，无意间突破另一侧的限制。与此同时，本地存储截止日期和实际受益人披露要求，迫使合规、基础设施和管理层团队在同一批交易数据上、在紧迫时间线内协调推进。
targetUser:
  primary: "尼日利亚支付集团中同时运营发卡和收单业务的首席合规官或支付运营负责人"
  secondary: "负责支付事件存储、报告及监管凭证的 CTO 或数据平台负责人"
  buyer: "首席合规官、COO 或集团 CTO"
startupThesis:
  nonObviousInsight: >-
    真正的痛点不只是在尼日利亚境内存储数据，而是每月证明一个多产品支付集团没有在网络双侧叠加市场力量。一旦市占率上限成为运营指标，胜出的产品就是一套监管级交易台账与情景推演引擎——告诉运营商何时需要隔离实体、迁移存储，或在触碰规则前将商户量转给合作伙伴。
  beachhead: >-
    在尼日利亚同时持有发卡和收单牌照、支付数据分散在境外云区域、交易量足够大以至董事会层面在 2026 年底前必须正视新 CBN 阈值的 PSP、商户收单机构及银行系支付集团
  wedge: >-
    一套本地数据合规控制平面，按主体和支付通道计算 CBN 口径的市占率敞口，生成月度申报包，并在产品、路由或合作伙伴调整可能触碰上限时及时预警
  whyNowCatalyst: >-
    CBN 将市场结构市占率限制与硬性数据境内存储截止日期及月度报告要求捆绑实施，合规因此成为一个即时的系统性问题，而非缓慢推进的政策讨论。
  ventureScalePath: >-
    先从尼日利亚支付运营商切入，再将这套市场结构与数据主权 OS 扩展至非洲及其他新兴市场的银行、金融科技和交换运营商——当监管机构对支付基础设施推行本地存储、所有权披露和反垄断规则时，需求自然形成。
solution: >-
  产品将发卡、收单、交换、商户和云存储事件接入一套尼日利亚境内账本，按法律实体、产品线和通道对交易量进行标准化处理。它计算面向监管机构的份额指标，追踪实际受益人证据，并生成月度合规包，其中包含每项数据的底层交易明细。运营商可获得预测：一个新的商户细分、发卡合作或并购动作落地之前，它会如何将自身推向 25% 和 15% 的阈值。同一控制平面还可绘制哪些数据集仍在尼日利亚境外，并统筹迁移优先级、留存策略和本地存储合规审计日志。长期来看，它将成为市场结构决策的操作系统，而不仅仅是一款报告工具。
goToMarketSeed:
  firstCustomer: >-
    尼日利亚金融科技机构或银行系支付集团，同时运营发卡和商户收单业务，交易数据存储于尼日利亚境外云区域，并需在 2026 年第四季度监管合规评审前完成月度市占率报告
  buyingTrigger: >-
    收到央行通函后内部下达合规指令、为 2026 年 12 月 31 日截止日期准备董事会整改计划，或评估是否拆分或将支付业务一侧转给合作伙伴
  currentAlternative: "通过处理器导出数据进行电子表格核对，结合内部 BI 看板、当地律师意见及临时云迁移项目"
  switchingReason: >-
    控制平面提供唯一可审计的市占率敞口与数据本地化就绪状态的权威数据源，比在合规、财务、工程和法律团队之间拼凑碎片化导出数据更快、更安全。
  pricingHypothesis: "按法律实体数量和月支付量计费的年度软件订阅，加上数据源映射的上线费用"
whyNow:
  - point: "双边市占率上限将支付增长策略变为实时合规约束，运营商需要每天了解发卡量与收单量如何相互影响。"
    signalRefs: ["双边市占率上限重塑产品策略"]
    sourceRefs: [1, 2]
  - point: "2027 年 1 月 1 日本地存储截止日期，迫使支付集团现在就对交易数据集进行盘点并启动迁移，而非继续拖延基础设施整改。"
    signalRefs: ["支付数据必须尽快迁回境内"]
    sourceRefs: [1, 2]
  - point: "月度报告要求形成自然的软件预算周期——法律团队无法每个月手动重新计算上限数据。"
    signalRefs: ["合规变为每月例行工作流"]
    sourceRefs: [2]
  - point: "Paystack、Flutterwave、Moniepoint 及大型银行被点名，说明这一规则触及的正是最有能力立即采购控制平面的运营商。"
    signalRefs: ["新规冲击的是行业头部，而非小型初创"]
    sourceRefs: [1]
differentiator: >-
  本地云服务商可在尼日利亚托管数据，通用 GRC 软件可存储政策，但两者都无法按监管机构跨主体和通道看待的方式计算支付市场集中度。商户分析看板也止步于商业智能，而非申报级证据。这家初创公司的优势在于将尼日利亚境内交易账本、专项市占率逻辑、所有权披露工作流和整改情景建模集于一体。其护城河来自标准化交易历史、监管就绪的分母模型，以及运营商在保持增长的同时维持合规的工作流数据——这些数据每个申报周期都在积累，使系统越来越难以被替换。
conceptDiagram:
  title: 尼日利亚支付合规上限循环
  mermaid: |
    flowchart LR
      Buyer[Compliance and payments ops leader] --> Pain[Cannot prove share-cap and data-localization compliance]
      Pain --> Product[Payments cap compliance OS]
      Product --> Outcome[File on time and keep growing without breaching CBN limits]
businessModelCanvas:
  customerSegments:
    - 同时持有发卡与收单敞口的尼日利亚支付服务提供商
    - 面临本地存储指令的银行系支付集团及交换机构
    - 正在拓展至多个受监管非洲市场的区域性金融科技集团
  valuePropositions:
    - 从交易级数据中计算监管级发卡与收单市占率敞口
    - 将本地存储和所有权规则转化为可审计的运营工作流
    - 在运营商触碰结构性上限之前提供整改路径预测
  channels:
    - 直接向支付集团的合规、COO 及 CTO 负责人销售
    - 通过本地监管顾问、审计机构及云迁移合作伙伴推荐
    - 创始人主导的触达，以公开及私下合规截止日期为触发点
  customerRelationships:
    - 针对一个实体集团的付费诊断
    - 与数据平台及合规团队共同实施
    - 扩展至多主体的持续报告与情景规划
  revenueStreams:
    - 合规平台年度订阅
    - 首次上线及数据映射费用
    - 情景建模与跨市场扩张的高级模块费用
  keyResources:
    - 尼日利亚境内交易账本
    - 市占率规则引擎与报告模板
    - 接入处理器、交换机构、数据仓库及云日志的集成能力
  keyActivities:
    - 交易与实体数据标准化
    - 维护规则逻辑与申报工作流
    - 执行数据本地化审计与迁移映射
    - 生成重构与合作伙伴路由决策的情景模型
  keyPartners:
    - 本地云服务商与托管服务提供商
    - 审计、法律及监管咨询机构
    - 支付处理器、交换机构及银行核心系统供应商
    - 数据迁移与安全合作伙伴
  costStructure:
    - 合规工程与系统集成
    - 本地托管与数据运营
    - 企业实施与客户支持
    - 监管研究与客户获取
jobsToBeDone:
  - job: >-
      当 CBN 要求提交月度市占率报告时，帮助合规团队计算所有实体的发卡和收单敞口，以便自信地完成申报，并在触发违规之前发现问题。
    currentAlternative: "跨处理器导出数据、BI 看板与电子表格的人工核对"
    successMetric: "报告周期时长，以及未解决的市占率计算异常数量"
  - job: >-
      在规划产品发布、合作协议或云迁移时，帮助运营团队了解哪些动作会影响上限敞口和本地存储合规，从而保持增长而不触发整改危机。
    currentAlternative: "与业务规划脱节的临时性法律备忘录和工程审计"
    successMetric: "获得有记录的监管批准所需的新产品或迁移计划审批时间"
ideaScorecard:
  signalStrength:
    score: 4
    rationale: "两份同日来源描述了精确的阈值、截止日期及受影响运营商，形成具体的监管强制事件。"
  painIntensity:
    score: 5
    rationale: "违反市占率上限或错过数据本地化截止日期，可能制约增长、触发整改，并迫使大型支付集团紧急重构。"
  wedgeClarity:
    score: 5
    rationale: "面向尼日利亚双边支付运营商的月度上限报告加本地存储就绪需求，是一个有明确买方和截止日期的窄口工作流。"
  defensibility:
    score: 4
    rationale: "本地交易账本、实体图谱和监管专项分母模型可形成黏性，尽管咨询机构和大型处理器可能攻占工作流的局部环节。"
  ventureScale:
    score: 4
    rationale: "尼日利亚是聚焦的切入点，但同样的市场结构和数据主权引擎可扩展至其他受监管支付市场及相邻银行规则。"
topRisks:
  - name: 监管模糊性
    description: "由于底层 CBN 通函 PDF 未能直接获取，确切的计算方法或执法细节可能在运营商阅读原始文本后发生变化。"
    mitigation: "以可配置规则进行试点，尽早与当地律师及共创客户共同验证，并将所有公式和申报模板视为版本化政策而非硬编码逻辑。"
  - name: 初期客户数量有限
    description: "尼日利亚运营商中，同时面临市占率上限和数据本地化规则双重即时压力、规模足够大的机构相对较少。"
    mitigation: "优先瞄准风险最高的集团，再扩展至银行、交换机构及附近的非洲市场——相同的控制平面可解决相邻的数据主权和集中度规则。"
  - name: 集成负担较重
    description: "产品必须先接入碎片化的交易、实体和云存储数据，才能证明 ROI，这可能拖慢部署进度。"
    mitigation: "从只读连接器和纯报告诊断起步，待合规基线建立可信度后，再分阶段引入更深层的数据本地化与情景建模模块。"
