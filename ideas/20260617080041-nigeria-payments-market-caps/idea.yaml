problem: >-
  Nigerian payment groups that operate both consumer issuing and merchant acquiring often lack a regulator-grade view
  of market share across subsidiaries, products, and data stores. The new CBN thresholds turn that blind spot into an
  existential risk because a firm can keep growing on one side of the market while accidentally breaching limits on the
  other. At the same time, local-storage deadlines and beneficial-ownership disclosure requirements force compliance,
  infrastructure, and executive teams to coordinate on the same transaction data under tight timelines.
targetUser:
  primary: "Chief compliance officer or head of payments operations at a Nigerian payment group running both issuing and acquiring businesses"
  secondary: "CTO or data-platform lead responsible for payment-event storage, reporting, and regulatory evidence"
  buyer: "Chief compliance officer, COO, or group CTO"
startupThesis:
  nonObviousInsight: >-
    The expensive problem is not merely storing data in Nigeria; it is proving every month that a multi-product payment
    group is not compounding market power across both sides of the network. Once market-share caps become an operating
    metric, the winning product is a regulator-grade transaction ledger and scenario engine that tells operators when to
    ring-fence entities, move storage, or shift merchant volume to partners before they breach the rule.
  beachhead: >-
    Nigerian PSPs, merchant acquirers, and bank-owned payment groups with both issuing and acquiring licenses, payment
    data spread across foreign cloud regions, and enough transaction volume to face board-level scrutiny on the new CBN
    thresholds before year-end 2026
  wedge: >-
    A local-data compliance control plane that computes CBN-style market-share exposure by entity and rail, produces
    monthly filing packs, and flags when product, routing, or partner changes are needed to stay below the cap
  whyNowCatalyst: >-
    The CBN has paired structural market-share limits with a hard onshore-data deadline and monthly reporting, making
    compliance an immediate systems problem instead of a slow policy discussion.
  ventureScalePath: >-
    Start with Nigerian payment operators, then expand into a broader market-structure and data-sovereignty OS for
    banks, fintechs, and switch operators across Africa and other emerging markets as regulators impose local-storage,
    ownership-disclosure, and anti-dominance rules on payment infrastructure.
solution: >-
  The product ingests issuing, acquiring, switch, merchant, and cloud-storage events into a Nigeria-resident ledger
  that normalizes volume by legal entity, product line, and rail. It calculates regulator-facing share metrics, tracks
  beneficial-ownership evidence, and produces a monthly compliance pack with the exact transactions behind each figure.
  Operators get forecasts that show how a new merchant segment, issuer partnership, or M&A move would push them toward
  the 25% and 15% thresholds before they commit capital. The same control plane maps which datasets still sit outside
  Nigeria and orchestrates migration priorities, retention policies, and audit logs for local-storage compliance. Over
  time, it becomes the operating system for market-structure decisions, not just a reporting tool.
goToMarketSeed:
  firstCustomer: >-
    A Nigerian fintech or bank-owned payments group with both issuing and merchant-acquiring businesses, transaction
    data in non-Nigerian cloud regions, and monthly market-share reports due before its Q4 2026 regulatory readiness
    review
  buyingTrigger: >-
    Receiving an internal compliance mandate after the CBN circular, preparing a board remediation plan for the
    December 31, 2026 deadline, or evaluating whether to split or partner away one side of the payments business
  currentAlternative: "Spreadsheet reconciliation across processor exports, internal BI dashboards, local counsel, and ad hoc cloud migration projects"
  switchingReason: >-
    The control plane gives one auditable source of truth for share-cap exposure and data-localization readiness, which
    is faster and safer than reconciling fragmented exports across compliance, finance, engineering, and legal teams.
  pricingHypothesis: "Annual software subscription priced by legal entities and monthly payment volume, plus onboarding for data-source mapping"
