topRisks:
  - name: Regulatory ambiguity
    description: "Because the underlying circular PDF was not directly fetched, the exact calculation method or enforcement details may shift after operators read the primary text."
    mitigation: "Pilot with configurable rules, validate early with local counsel and design partners, and treat every formula and filing template as versioned policy rather than hard-coded logic."
  - name: Limited initial logo count
    description: "Only a relatively small set of Nigerian operators are large and complex enough to feel immediate pain from both share caps and data-localization rules."
    mitigation: "Target the highest-risk groups first, then expand into banks, switches, and nearby African markets where the same control plane solves adjacent sovereignty and concentration rules."
  - name: Heavy integration burden
    description: "The product must ingest fragmented transaction, entity, and cloud-storage data before it can prove ROI, which can slow deployment."
    mitigation: "Start with read-only connectors and a reporting-only diagnostic, then phase into deeper data-localization and scenario modules once the compliance baseline is trusted."
