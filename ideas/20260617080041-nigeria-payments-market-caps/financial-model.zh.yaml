slug: payments-cap-compliance-os
date: '2026-06-17'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-17] 模型从商业计划日期的下一个月开始。'
- id: A2
  name: 期初现金与融资规模
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M] 基本情景取 pre-seed 区间低端，因为招聘保持精简，第三年前销售维持创始人主导。'
- id: A3
  name: 起始付费活跃集团数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones] 公司从零收入起步，必须先销售付费诊断。'
- id: A4
  name: 客户定义
  value: 一个处于付费诊断或循环生产合规工作流中的支付集团
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.unitOfValue] customersEop 追踪活跃付费集团数，而非单个法律实体数。'
- id: A5
  name: 扣除流失后的净客户增长
  value: Q4Y1 达 3 个活跃集团，Q4Y2 达 5 个，Q1Y3 起稳定在 6 个
  unit: count
  source: '[BP milestones + Research market.som 6 reachable logos] 基本情景对应第一年 3 次付费诊断，第二年新增 2 个集团，第三年初达到 SOM 上限 6 个。'
- id: A6
  name: 每活跃集团混合已确认收入
  value: Y1 年化 $156K，Y2 $228K，Y3 $264K
  unit: USD/group/year
  source: '[BP investorMemo.firstCustomer.initialContract $50–100K 诊断 + $180–300K 年度生产 + Research bottomUpSizingDrivers $250K ACV] 早期收入以诊断为主，Y3 假设在既定生产区间内进行一次适度的实体或模块扩展。'
- id: A7
  name: 毛利率爬坡
  value: Y1 55%，Y2 67%，Y3 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP product.sixMonth] 启动阶段服务和实施权重较高，连接器和证据包标准化后逐步达到计划稳态目标。'
- id: A8
  name: 单位经济模型月流失率
  value: 1.7%
  unit: percent/month
  source: '[startup-finance heuristic + BP investorMemo.mustBeTrue] 企业合规工作流应具有黏性，但客户池偏小意味着流失率不能假设为零。'
- id: A9
  name: 各岗位含税全包薪酬
  value: "创始人/CEO $150K；联合创始工程师 $170K；合规产品负责人 $135K；方案实施工程师 $125K；合作伙伴负责人 $135K；高级工程师 $160K；客户成功/实施 $110K"
  unit: USD/year
  source: '[BP team + startup-finance heuristic] 采用以尼日利亚为优先的精简企业软件团队，含薪资税和福利。'
- id: A10
  name: 招聘时间线
  value: M1 创始人和联合创始工程师；M2 合规产品负责人；M5 方案实施工程师；M10 合作伙伴负责人；M14 高级工程师；M18 客户成功/实施
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale] 产品、实施和合规能力优先于任何大规模 GTM 扩张招聘。'
- id: A11
  name: 薪酬职能分配
  value: "创始人 60% 销售&市场 / 40% G&A；联合创始和高级工程师 100% 研发；合规负责人 75% 研发 / 25% G&A；方案工程师 60% 研发 / 40% G&A；合作伙伴 100% 销售&市场；客户成功 50% 销售&市场 / 50% G&A"
  unit: allocation
  source: '[BP team rationales + BP operations] 按运营职能将人员成本计入损益表。'
- id: A12
  name: 非薪酬销售与市场费用
  value: M9 前 $6K/月，M10–M12 $9K/月，M13–M18 $10K/月，M19–M24 $12K/月，M25–M30 $14K/月，M31–M36 $16K/月
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] 涵盖创始人出行、合作伙伴赋能、合规活动及针对性的企业触达，而非付费获客。'
- id: A13
  name: 非薪酬研发费用
  value: Y1 $8K/月，Y2 $10K/月，Y3 $12K/月
  unit: USD/month
  source: '[BP product + BP operations] 涵盖申报级证据包的托管、日志、数据管道、安全控制和测试。'
- id: A14
  name: 非薪酬 G&A 费用
  value: Y1 $6K/月，Y2 $7K/月，Y3 $8K/月
  unit: USD/month
  source: '[BP operations + Research regulatoryLandscape] 涵盖法律顾问、审计、保险及本地公司行政。'
- id: A15
  name: 现金转换政策
  value: EBITDA 近似代表现金变动
  unit: modeling convention
  source: '[startup-finance heuristic] 在 pre-seed 规模下，资本支出、税费、融资费用和营运资金波动假设为不重大。'
- id: A16
  name: CAC 约定
  value: 36 个月内每获取一个客户的累计销售与市场费用 $175.6K
  unit: USD/logo
  source: '[BP gtm 创始人主导直销 + 合作伙伴推荐 + model calc] 以模型中总销售与市场费用除以基本情景获取的 6 个活跃集团计算。'
- id: A17
  name: 融资里程碑
  value: 5 个活跃客户、2 次实体扩展、可复用连接器，以及一个相邻司法管辖区试点，同时保留不少于 6 个月现金缓冲
  unit: milestone
  source: '[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary] 这是 pre-seed 轮需要完成的证明包，才能使更大规模的 seed 轮具有可信度。'
