fundingAsk:
  round: pre-seed
  amountM: 2.0
  runwayMonths: 30
  milestone: 达到 5 个活跃客户、完成 2 次实体扩展、交付可复用连接器，并启动一个相邻司法管辖区试点，同时保留至少 6 个月现金缓冲。
