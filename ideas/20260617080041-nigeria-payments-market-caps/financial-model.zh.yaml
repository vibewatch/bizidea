scenarios:
  downside:
    description: 政策模糊拖慢转化，定价落在区间低端，公司第三年只达到 5 个活跃集团。
    y3RevenueK: 1160.0
    y3EbitdaK: -616.2
    cashLowPointK: -102.7
    keyAssumptionChanges:
    - 净客户爬坡上限为 5 个活跃集团（而非 6 个），原因是第二年一个新客和第三年一次扩展各延期一轮。
    - 每集团混合年化收入降至 Y1 $150K、Y2 $216K、Y3 $240K。
    - 证据包交付和托管服务化程度较高，Y3 毛利率仅达 68%。
  base:
    description: 基本情景保持在 6 个客户的 SOM 天花板内，增长靠转化第一年三次诊断，并在第三年每个成熟集团挂载一个适度的扩展模块驱动。
    y3RevenueK: 1540.0
    y3EbitdaK: -327.0
    cashLowPointK: 355.4
    keyAssumptionChanges:
    - 活跃集团从 Q4Y1 的 3 个增至 Q4Y2 的 5 个，Q1Y3 起稳定在 6 个。
    - 每活跃集团已确认年化收入从 $156K 升至 $264K——诊断转为年度生产，并附加实体级扩展。
    - 团队在 M18 后保持 7 人，使公司在整个 36 个月模型期内现金保持正值。
  upside:
    description: 参考客户和合作伙伴推荐多引入一个客户，公司达到 7 个活跃集团，第三年接近盈亏平衡。
    y3RevenueK: 1817.0
    y3EbitdaK: -96.8
    cashLowPointK: 738.4
    keyAssumptionChanges:
    - 一个额外的合作伙伴引荐集团在第二年末落地，将第三年活跃客户数提升至 7 个。
    - 每集团混合年化收入提升至 Y1 $162K、Y2 $240K、Y3 $276K。
    - 连接器和月度申报包标准化快于预期，Y3 毛利率达 72%。
sensitivity:
- variable: ARPU
  downsideCase: Y3 每活跃集团成熟年化收入 $240K
  baseCase: Y3 每活跃集团成熟年化收入 $264K
  upsideCase: Y3 每活跃集团成熟年化收入 $276K
  y3RevenueImpactK: -140.0
  cashImpactK: -98.0
- variable: CAC
  downsideCase: 合作伙伴推荐不及预期、创始人主导周期仍然昂贵，销售与市场投入强度上升 25%。
  baseCase: 基本情景累计每获取一个客户约花费 $175.6K 销售与市场费用。
  upsideCase: 温暖推荐使销售与市场投入强度持平，同时保持相同客户数。
  y3RevenueImpactK: 0.0
  cashImpactK: -98.3
- variable: churn
  downsideCase: 一个成熟生产集团在 Y3 流失或暂停扩展，M28 起只剩 5 个活跃集团。
  baseCase: 净客户计划 Q1Y3 起保持 6 个活跃集团。
  upsideCase: 零流失，所有 6 个基本情景集团持续扩展实体或模块。
  y3RevenueImpactK: -198.0
  cashImpactK: -138.6
- variable: sales cycle
  downsideCase: 后三个客户各因法律审查和数据映射拖延约一个季度。
  baseCase: 客户分别在 M4、M6、M9、M16、M22 和 M27 落地。
  upsideCase: 可参考诊断将一个较晚的客户提前一个季度落地。
  y3RevenueImpactK: -66.0
  cashImpactK: -97.1
- variable: gross margin
  downsideCase: Y3 毛利率停滞在 68%，而非 70%。
  baseCase: Y3 毛利率达到商业计划目标 70%。
  upsideCase: 实施更具可复用性，Y3 毛利率达 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -30.8
- variable: hiring pace
  downsideCase: 高级工程和客户成功岗在收入证明建立前提前一个季度入职。
  baseCase: M18 后不再新增招聘。
  upsideCase: 后期招聘推迟至第六个客户可参考后再执行。
  y3RevenueImpactK: 0.0
  cashImpactK: -67.5
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      DiagnosticsAndReferrals --> ActiveGroups
      ActiveGroups --> BlendedARPU
      BlendedARPU --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 营收引擎
  finding: 基本情景通过填满 6 个客户的 SOM 天花板，并将每集团混合收入从 $156K 提升至 $264K（诊断转化加实体扩展），在第三年达到约 $1.54M 收入。
- checkName: 必须做对的事
  finding: 前三次诊断中至少两次需要转化，第六个客户必须在 Q1Y3 前落地——因为模型刻意避免组建大型销售团队。
- checkName: 模型崩溃条件
  finding: 若公司上限停在 5 个活跃集团、成熟年化每集团收入 $240K，下行情景现金在第三年末前会略微转负。
- checkName: 下一轮融资证明包
  finding: 一个可信的 seed 轮故事是：5 个活跃客户、2 次实体扩展、可复用连接器，以及一个相邻司法管辖区试点，且不错过 70% 稳态毛利率目标。
sanityChecks:
  ruleOf40: Y3 增速 68.9% + EBITDA 利润率 -21.2% = 47.7%
  burnMultiple: Y2 净新增 2 个客户对应燃烧倍数约 1.4x，Y3 同样 7 人团队支撑第六个客户后改善至约 1.2x。
  revenuePerFte: Y3 人均收入 $220K（大约处于垂直 SaaS 基准 $200–400K 的低端）
  flags:
  - 仅限尼日利亚的即时客户池偏小，模型因此依赖每集团的扩展收入，而非大量客户数增长。
  - 研究阶段未获取主 CBN 通函 PDF，申报分母和汇总逻辑在规则引擎硬编码前仍需法律顾问验证。
  - 基本情景 EBITDA 全程为负；若交付工作比计划更偏向定制，$2.0M 融资需求将向商业计划区间中段靠拢。
  - M18 后不再新增招聘，若实施、支持或相邻司法管辖区工作需要比计划更多的本地人员，执行风险将上升。
