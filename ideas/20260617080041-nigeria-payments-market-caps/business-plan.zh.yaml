slug: payments-cap-compliance-os
date: '2026-06-17'
executiveSummary: >-
  Payments Cap Compliance OS 应以尼日利亚为首发市场，作为合规控制平面为支付集团打造，服务对象是那些现在必须同时证明市占率合规与本地数据存储达标的机构。最可信的第一批客户，是在发卡和商户收单两侧均有运营、部分支付数据仍存于尼日利亚境外、且已在董事会层面启动 2026 年 12 月整改计划的大型尼日利亚支付集团。眼下的核心痛点并非通用 GRC，而是每月将处理器、商户、实体和托管数据汇聚成一份经得起审计、同时能支撑商业决策的监管级视图。因此，最锋利的切入点是付费诊断加申报工作流——按主体和通道计算上限敞口，产出第一份月度申报包，并找出哪些数据集必须优先迁回境内。研究支持一个真实的时机催化剂，但也表明市场客户池受限：TAM 约 $9.0M，初始 SAM $3.8M，若不扩展至相邻地区或规则体系，第三年 SOM 约 $1.5M。产品、定价和渠道必须围绕这一约束对齐：创始人主导的销售深入合规和 CTO 买家，上线绑定一个高风险集团结构，按法律实体数量加监控支付量计年度费用。最有力的信念是现有厂商各自只解决了问题的一个切片，而新规迫使客户在同一系统内统一合规计算、数据溯源和整改工作流。最大的疑虑是底层通函 PDF 在研究阶段未能获取，因此精确分母定义、汇总逻辑和制裁细节在产品硬编码政策假设前仍需确认。
problem:
  - "运营双边业务的尼日利亚支付集团，往往无法以足够精度跨子公司、通道和合作伙伴流量计算发卡与收单敞口，难以提交符合监管要求的月度报告。"
  - "同一批运营商现在还需在截止日期前将支付数据迁回尼日利亚并披露实际受益人，而这两条工作线通常分散于合规、工程、法律和基础设施等不同团队。"
solution:
  - "提供一套尼日利亚境内合规账本，接入支付、实体和存储足迹数据，按法律实体和通道进行标准化处理，并以交易级证据计算 CBN 口径的市占率敞口。"
  - "从付费诊断和首次申报工作流起步，再扩展至整改情景、境内数据迁移追踪，以及整个支付集团的月度合规运营。"
whyWeWin:
  - "切口正好卡在各类替代方案的断点上：本地托管服务商不做市占率计算，通用 GRC 工具不建支付通道模型，内部 BI 无法维护版本化的月度申报与整改工作流。"
  - "每个申报周期都在实体映射、分母假设、整改手册和境内数据溯源上积累专有价值，系统因此比一次性咨询项目更难被替换。"
strategicChoices:
  beachhead: "尼日利亚同时持有发卡和商户收单敞口、境外支付数据足迹、且在 2026 年 12 月 31 日合规截止日期前已有明确整改负责人的支付集团。"
  wedgeRationale: >-
    这个切片比大范围铺向所有金融科技或银行更快出效果——买方同时面临月度报告、潜在上限敞口和近期迁移计划三重压力。它还支持企业级 ACV，不需要公司拿下大量紧迫程度较低的客户。
  sequencingRationale: >-
    公司应从只读数据接入、一套申报级规则层和付费整改诊断起步，因为第一年信任和政策准确性比深度自动化更重要。GTM 保持创始人主导，直到团队证明一次诊断能转化为年度订阅；招聘优先补充合规工程和实施能力，而非渠道规模。与本地云和咨询机构的合作伙伴关系等核心申报工作流跑通之后再推进，因为只有当产品已掌握合规叙事，合作伙伴才能放大分发。
  notYet:
    - "在 3–5 个尼日利亚生产客户证明工作流和经济模型前，不做泛非扩张"
    - "不做完整的 AML 交易监控或通用风险管理模块"
    - "不为营收团队做商户分析看板"
    - "未经客户和法律顾问审核，不做自动化重构建议"
market:
  tam: "TAM 约 $9.0M，基于 36 家 CBN 持牌移动货币运营商及交换/处理机构，以混合年 ACV 约 $250k 估算，不含银行和尼日利亚以外扩张。"
  sam: "初始 SAM 约 $3.8M，基于约 15 家具有实质双边敞口、已有董事会级 2026 年整改工作的大型尼日利亚集团，以 ACV 约 $250k 估算。"
  som: "第三年 SOM 约 $1.5M，基于约 6 个可触及的生产客户，以混合 ACV 约 $250k 估算——客户池受限但需求紧迫的切入市场。"
  segments:
    - "主要：同时持有发卡与收单敞口的大型尼日利亚 PSP、处理器、交换机构或银行系支付集团"
    - "次要：尼日利亚证明后，面临相邻数据主权、所有权或集中度规则的区域非洲支付集团和银行"
  buyingProcess: >-
    日常推动者通常是首席合规官、COO 或集团 CTO，但只有当某位高管同时负责申报准确性、整改规划和基础设施迁移时，交易才会启动。第一份合同应从董事会背书的就绪诊断或首次月度申报项目切入，待客户信任计算逻辑和证据模型后再转为年度软件。
product:
  mvp: >-
    MVP 应为一个支付集团接入处理器导出数据、商户与实体映射及云区域或存储清单，然后按主体和通道计算市占率敞口，生成申报就绪证据包，并标记境内数据缺口。它应保持只读和人工审核状态，而非尝试实时路由或自动化重构决策。
  sixMonth: "交付 2–3 次付费诊断和一套生产级申报工作流，包含可配置规则、实体图谱、证据包、存储足迹映射和审计日志。"
  twelveMonth: "增加接入常见处理器、交换机构、数据仓库和云日志来源的可复用连接器，以及路由、合作伙伴或实体结构变化的情景建模，并强化企业采购所需的权限控制。"
  twentyFourMonth: "从尼日利亚申报工作流扩展为更广泛的市场结构和数据主权控制平面，覆盖更多非洲司法管辖区、更深度的迁移编排，以及跨多个支付集团的基准敞口分析。"
  keyBets:
    - "第一个痛苦工作流是申报级集中度监控与境内就绪证据，而非通用治理自动化。"
    - "客户信任一套只读合规账本的速度，快于一个试图控制生产支付路由的系统。"
    - "付费诊断可以转化为循环软件，因为月度申报和整改工作每月重复。"
    - "规则版本化和实体映射可以做到足够可复用，避免每次实施都变成定制咨询。"
gtm:
  wedge: "销售付费的上限与本地化就绪诊断，为一个高风险支付集团交付首个监管级敞口模型和申报包，再将该工作流转化为年度合规运营订阅。"
  channels:
    - "创始人主导的直销，深入高风险尼日利亚支付集团的首席合规官、COO 和集团 CTO"
    - "与已在解读通函并转化为管控措施和董事会行动的本地监管顾问、审计机构和 AML 专家建立推荐与联合销售合作"
    - "与本地云、托管及迁移合作伙伴联合销售，当买方已在将支付数据迁回境内时切入"
  funnelTargets: "目标账户→合格探索 20–30%；合格探索→付费诊断 20–35%；付费诊断→年度生产 50%+；生产客户→12 个月内扩展至第二主体或司法管辖区 40%+。"
  pricing: "从付费 6–10 周诊断和首次申报包起步，再转为按监控法律实体数量和月支付量计费的年度 SaaS，加上数据源映射的上线费用。这与买方当前的预算方式一致——他们已经在为整改工作流买单，需要的是一套可审计的系统级记录，而非更多席位或看板。"
businessModel:
  revenueStreams:
    - "合规账本、申报工作流和证据留存的年度订阅"
    - "首个实体集团或申报周期的上线与数据映射费用"
    - "情景建模、追加实体和新司法管辖区的扩展费用"
  unitOfValue: "纳入合规工作流监控的法律实体数量和月支付量"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一支付集团内增加主体、通道和月度申报周期"
    - "待申报工作流建立信任后，销售情景建模和整改规划模块"
    - "扩展至面临类似数据主权和集中度规则的相邻非洲市场或银行子公司"
    - "通过同时管理多个受监管运营商的审计、咨询和基础设施合作伙伴嵌入分发"
strategyMap:
  northStarMetric: "以交易级证据完成的 CBN 月度申报周期数量，且无未解决的敞口异常"
  inputMetrics:
    - "每季度启动的付费诊断数量"
    - "从启动到首个申报级敞口模型的天数"
    - "已映射至法律实体、通道和存储位置的受监控支付量占比"
    - "付费诊断转化为年度生产的转化率"
    - "每个生产客户平均扩展的实体或通道数量"
  moatsToBuild:
    - "涵盖尼日利亚上限公式、申报模板和政策覆盖的版本化规则库"
    - "与申报结果、整改措施和审计问题关联的实体解析交易历史"
    - "与合规证据直接挂钩的境内数据溯源和迁移遥测"
  killCriteria:
    - "前 15 次合格 ICP 访谈中，少于 6 次确认存在使用电子表格核对的在役月度报告或整改工作流。"
    - "前 4 次付费诊断中，少于 2 次转化为年度生产订阅。"
    - "前 3 次部署中，从启动到首个申报级模型的中位时间超过 45 天——因为数据源过于碎片化。"
    - "主通函审查显示分母或汇总逻辑与客户预期存在实质性差异，致使规则引擎方案需要重大调整。"
  mermaid: |
    flowchart LR
      Wedge[Paid cap-compliance diagnostic] --> MVP[Read-only filing and evidence ledger]
      MVP --> Proof[Trusted monthly filings and remediation plans]
      Proof --> Expansion[Multi-entity and multi-market compliance OS]
investorMemo:
  verdict:
    call: "观望"
    conviction: "强制性事件清晰，工作流切口连贯，但在政策细节、预算归属和可重复部署速度经过实地验证之前，信念维持中等。"
    whyBelieve: "该法规将集中度计算、数据驻留和所有权证据，整合成一个有日期约束的企业级工作流，而现有替代方案都无法很好地统一这些需求。"
    whyDoubt: "尼日利亚的即时客户池偏小，且缺失的主通函细节可能降低紧迫性或改变产品需求。"
    nextDiligence: "获取主通函，与律师和两家目标运营商验证确切的报告公式，并在一个申报周期内将一次付费诊断转化为年度生产合同。"
  firstCustomer:
    title: "双边尼日利亚支付集团的首席合规官"
    profile: "大型尼日利亚 PSP、处理器或银行系支付集团，同时持有发卡和商户收单敞口，部分交易数据仍托管于尼日利亚境外，并已有董事会授权的 2026 年整改计划。"
    trigger: "2026 年 12 月截止日期前的董事会或监管就绪审查，暴露了不清晰的上限敞口、碎片化的月度报告，或未经验证的境内数据状态。"
    buyer: "首席合规官、COO 或集团 CTO"
    initialContract: "$50k–$100k 付费诊断和首次申报包，完成一个申报周期且监控数据源保持在线后，抵扣年度生产合同费用 $180k–$300k。"
  mustBeTrue:
    - "至少 40% 的合格滩头账户已通过电子表格、手动导出或碎片化咨询来核对上限敞口或存储就绪情况。"
    - "首次申报级诊断在至少一半早期部署中转化为年度生产，因为工作流每月重复。"
    - "规则版本化必须能吸收主通函中的模糊之处，而不把每个客户都变成定制政策实施。"
    - "一家尼日利亚支付集团在实体和监控量上线后，必须支撑年 ACV 约 $180k–$300k。"
    - "尼日利亚的证明点必须在初始客户池饱和前，迁移到相邻的非洲数据主权或市场结构规则。"
  diligenceQuestions:
    - "主 CBN 通函对 25% 和 15% 测试使用的确切分母、通道和关联方定义是什么？"
    - "当合规、数据迁移和支付运营三条线触及同一问题时，第一个目标账户内部谁实际控制预算？"
    - "在一个申报级模型足以投入生产使用前，需要映射多少数据源和云区域？"
    - "买方是否接受先上只读证据账本，还是在签署年度软件前就期待更深层的工作流自动化？"
    - "哪个合作伙伴渠道获取合格机会最快：当地律师、审计机构、AML 工具商，还是云迁移伙伴？"
operatingAssumptions:
  - assumption: "大型双边尼日利亚支付集团是最早、最高强度的买方，因为他们同时面临上限敞口和数据本地化工作。"
    basis: idea.yaml
    validationTest: "访谈 15 家目标运营商，确认至少 6 家已有明确整改负责人、在役报告工作和 2026 年底前的董事会关注。"
    decisionImpact: "若为假，ICP 需进一步收窄至银行系集团，或扩展至紧迫性更强的相邻受监管工作流。"
  - assumption: "付费诊断加首次申报包是进入年度软件最快的可信切入点。"
    basis: research.yaml
    validationTest: "推进 4 次提案流程，确认至少 2 家买方批准付费诊断，且有明确的年度订阅转化路径。"
    decisionImpact: "若为假，公司必须通过咨询合作伙伴销售、将范围缩小为报告产品，或接受更慢的企业销售节奏。"
  - assumption: "从导出数据、数据仓库和云日志进行只读接入，足以在客户要求生产路由控制之前证明价值。"
    basis: idea.yaml
    validationTest: "使用只读数据访问交付前 2 次诊断，并确认每次都能产出申报级模型，而不被核心支付栈集成所阻塞。"
    decisionImpact: "若为假，实施成本和安全审查将大幅上升，增加资本需求并压低早期毛利率。"
  - assumption: "通函中的规则模糊性可通过政策版本化管理，而无需为每个客户定制编码。"
    basis: research.yaml
    validationTest: "与律师和两家共创客户审查主通函，然后验证一套可配置规则框架是否覆盖所有必要的申报假设。"
    decisionImpact: "若为假，产品更像咨询软件，失去可重复的风险投资属性。"
  - assumption: "在本地客户池饱和前，产品能扩展至尼日利亚以外的相邻数据主权或集中度工作流。"
    basis: operator judgment
    validationTest: "梳理至少 3 个相邻非洲或银行子公司规则集，并通过 5 次买家对话确认同一证据账本可解决近期的第二用例。"
    decisionImpact: "若为假，投资者应将公司定性为天花板较低、需更严格控制燃烧率的尼日利亚合规细分业务。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "访谈双边尼日利亚支付集团和银行中的 15 位首席合规官、COO 和 CTO。"
    hypothesis: "月度上限报告和境内数据就绪已纳入高管主导的整改工作流。"
    successMetric: "至少 10 次访谈确认存在使用电子表格或碎片化咨询的实时核对工作，且至少 5 个账户有近期报告或董事会审查截止日期。"
    owner: "创始人/CEO"
  - horizon: 0–90 天
    experiment: "在全产品自动化前，使用共创客户提供的处理器、实体和存储足迹样本数据，运行 2 次人工诊断。"
    hypothesis: "一份申报级敞口模型可以用只读输入的可重复数据模式拼出来。"
    successMetric: "两家共创客户收到可用的敞口输出，且至少一家为后续诊断或申报工作流付费。"
    owner: "联合创始工程师"
  - horizon: 90–180 天
    experiment: "与当地律师及两家受影响运营商共同验证主通函、申报模板和政策边界案例。"
    hypothesis: "一套版本化规则引擎可以覆盖真实的报告逻辑，无需逐客户改写。"
    successMetric: "一份经验证的规则规格覆盖至少 80% 的申报逻辑，并被两家共创客户接受用于试点。"
    owner: "合规产品负责人"
  - horizon: 90–180 天
    experiment: "签下 2–3 次付费诊断，交付首批月度申报包。"
    hypothesis: "如果付费入门产品能降低申报风险并缩短就绪周期，客户愿意为此买单。"
    successMetric: "至少 2 次付费诊断完成，且至少 1 次在一个申报周期内转化为年度生产合同。"
    owner: "创始人/CEO"
  - horizon: 180–360 天
    experiment: "与一家本地审计或监管咨询机构、一家本地云或迁移合作伙伴分别启动联合销售。"
    hypothesis: "公司有一个在线证明点后，合作伙伴渠道才能带来合格商机。"
    successMetric: "合作伙伴贡献至少 3 个合格商机和 1 个已签诊断。"
    owner: "合作伙伴负责人"
  - horizon: 180–540 天
    experiment: "在首批生产客户中为路由、商户结构或实体结构变化增加情景建模。"
    hypothesis: "扩张收入来自整改规划，而非单纯的月度报告生成。"
    successMetric: "至少 2 个生产客户采用情景模块，且 ACV 扩展 25% 或以上。"
    owner: "产品负责人"
operations:
  - "维护尼日利亚境内证据账本，为每项报告指标保留不可变审计日志、政策版本和数据源到申报的完整溯源。"
  - "在自动化更深层工作流前，将上线流程标准化为一份实体映射、一份存储足迹清单和一条申报基线。"
  - "尽早打包安全性、律师审查和政策覆盖工作流——信任和监管准确性是第一道采用门槛。"
  - "与本地托管、迁移和咨询合作伙伴协同运营，确保基础设施和合规工作线在客户账户内保持协调。"
team:
  - role: "创始人/CEO"
    startTiming: "第 0 月"
    rationale: "主导创始人销售、共创客户筛选和定价，因为核心风险在于工作流是否能赢得独立的企业预算。"
  - role: "联合创始工程师"
    startTiming: "第 0 月"
    rationale: "搭建合规账本、接入层和规则引擎，决定从启动到首个申报级输出的时间。"
  - role: "合规产品负责人"
    startTiming: "第 1–3 月"
    rationale: "将通函逻辑、申报模板和政策边界案例转化为可配置的产品需求，而非临时服务工作。"
  - role: "方案实施工程师"
    startTiming: "第 3–6 月"
    rationale: "缩短第一批客户的数据源映射、数据标准化和部署时间。"
  - role: "合作伙伴负责人"
    startTiming: "第 9–12 月"
    rationale: "在第一个生产证明点建立后，才通过咨询和基础设施合作伙伴放大推荐。"
milestones:
  - horizon: 0–12 个月
    items:
      - "验证主通函，发布一份生产就绪的规则规格"
      - "与高风险尼日利亚支付集团签署 3 次付费诊断"
      - "至少将 2 次诊断转化为年度生产订阅"
      - "完成一次有交易级证据的可参考月度申报工作流"
  - horizon: 12–24 个月
    items:
      - "为滩头市场中最常见的处理器、数据仓库和云日志环境推出可复用连接器"
      - "至少 2 个客户扩展至额外实体、通道或情景模块"
      - "签署 1–2 个各自带来合格合规商机的渠道合作"
      - "证明准备好进入尼日利亚以外的一个相邻地区或规则集"
  - horizon: 24–36 个月
    items:
      - "若 ACV 假设成立，达到 6 个生产客户和约 $1.5M ARR"
      - "为至少一家区域支付集团支持多司法管辖区工作流"
      - "跨客户群对敞口、申报周期和整改模式进行基准分析"
      - "决定是继续聚焦支付监管，还是向相邻受监管基础设施管控扩展"
risks:
  - risk: "底层 CBN 通函定义的分母、汇总规则或执法路径，可能与公开摘要的描述存在差异。"
    likelihood: High
    impact: High
    mitigation: "保持公式和模板版本化，在自动化前与律师和共创客户验证，并避免在主文本确认前承诺自主合规决策。"
  - risk: "尼日利亚滩头市场可能包含的紧迫客户太少，不足以支撑高效的独立增长。"
    likelihood: High
    impact: High
    mitigation: "优先攻打风险最高的集团，以高 ACV 销售，并在扩张人员规模前验证相邻非洲或银行子公司用例。"
  - risk: "处理器、实体和云数据碎片化，可能导致部署比计划更慢、更偏向服务。"
    likelihood: Medium
    impact: High
    mitigation: "从只读诊断起步，大力产品化首批连接器，并在扩大销售前雇用实施人才。"
  - risk: "水平 GRC 套件、咨询机构或处理器可能捆绑足够的工作流，阻断新的独立供应商。"
    likelihood: Medium
    impact: Medium
    mitigation: "守住申报级规则引擎和证据模型，再将同样的顾问和基础设施供应商作为渠道而非直接竞争对手。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月应足以支撑一支精干团队：验证通函、交付首套申报级账本、赢得 3 次付费诊断、转化至少 2 个生产客户，并建立可重复部署所需的本地合规和托管合作关系。"
