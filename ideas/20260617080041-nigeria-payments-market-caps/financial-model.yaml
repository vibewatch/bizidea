assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-17] the model starts in the month after the business-plan date.'
- id: A2
  name: Opening cash and round size
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M] base case uses the low end of the stated pre-seed range because hiring stays lean and sales remain founder-led through year 3.'
- id: A3
  name: Starting active paying groups
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones] the company starts pre-revenue and must first sell paid diagnostics.'
- id: A4
  name: Customer definition
  value: One payment group in a paid diagnostic or recurring production compliance workflow
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.unitOfValue] customersEop tracks active paying groups, not individual legal entities.'
- id: A5
  name: Net logo ramp after churn
  value: 3 active groups by Q4Y1, 5 by Q4Y2, and 6 by Q1Y3 onward
  unit: count
  source: '[BP milestones + Research market.som 6 reachable logos] base case matches three paid diagnostics in year 1, adds two more groups in year 2, and reaches the six-logo SOM ceiling early in year 3.'
- id: A6
  name: Blended recognized revenue per active group
  value: Y1 $156K, Y2 $228K, Y3 $264K annualized
  unit: USD/group/year
  source: '[BP investorMemo.firstCustomer.initialContract $50-100K diagnostic + $180-300K annual production + Research bottomUpSizingDrivers $250K ACV] early revenue is diagnostic-heavy, while Y3 assumes one modest entity or module expansion inside the stated production range.'
- id: A7
  name: Gross margin ramp
  value: 55% in Y1, 67% in Y2, 70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP product.sixMonth] launch starts services- and implementation-heavy, then reaches the plan''s steady-state target once connectors and evidence packs repeat.'
- id: A8
  name: Monthly churn for unit economics
  value: 1.7%
  unit: percent/month
  source: '[startup-finance heuristic + BP investorMemo.mustBeTrue] enterprise compliance workflows should be sticky, but the small logo universe means churn cannot be assumed to be zero.'
- id: A9
  name: Loaded compensation by role
  value: Founder/CEO $150K; founding engineer $170K; compliance product lead $135K; solutions engineer $125K; partnerships lead $135K; senior engineer $160K; customer success/implementation $110K
  unit: USD/year
  source: '[BP team + startup-finance heuristic] uses a lean hybrid Nigeria-first enterprise-software team with payroll tax and benefits included.'
- id: A10
  name: Hiring timeline
  value: M1 founder and founding engineer; M2 compliance product lead; M5 solutions/implementation engineer; M10 partnerships lead; M14 senior engineer; M18 customer success/implementation
  unit: timeline
  source: '[BP team.startTiming + BP strategicChoices.sequencingRationale] product, implementation, and compliance capacity are hired before any broad GTM scale.'
- id: A11
  name: Functional payroll allocation
  value: Founder 60% S&M / 40% G&A; founding and senior engineers 100% R&D; compliance lead 75% R&D / 25% G&A; solutions engineer 60% R&D / 40% G&A; partnerships 100% S&M; customer success 50% S&M / 50% G&A
  unit: allocation
  source: '[BP team rationales + BP operations] rolls headcount cost into the P&L by operating function.'
- id: A12
  name: Non-payroll sales and marketing spend
  value: $6K/mo through M9, $9K/mo M10-M12, $10K/mo M13-M18, $12K/mo M19-M24, $14K/mo M25-M30, and $16K/mo M31-M36
  unit: USD/month
  source: '[BP gtm.channels + startup-finance heuristic] covers founder travel, partner enablement, compliance events, and tightly targeted enterprise outreach rather than paid demand gen.'
- id: A13
  name: Non-payroll R&D spend
  value: $8K/mo in Y1, $10K/mo in Y2, and $12K/mo in Y3
  unit: USD/month
  source: '[BP product + BP operations] covers hosting, logs, data pipelines, security controls, and testing for filing-grade evidence packs.'
- id: A14
  name: Non-payroll G&A spend
  value: $6K/mo in Y1, $7K/mo in Y2, and $8K/mo in Y3
  unit: USD/month
  source: '[BP operations + Research regulatoryLandscape] covers counsel, audit, insurance, and local corporate administration.'
- id: A15
  name: Cash conversion policy
  value: EBITDA approximates cash movement
  unit: modeling convention
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital swings are assumed immaterial at pre-seed scale.'
- id: A16
  name: CAC convention
  value: $175.6K total S&M per landed logo over 36 months
  unit: USD/logo
  source: '[BP gtm founder-led direct sales + partner referrals + model calc] uses total modeled sales and marketing spend divided by six active groups landed in the base case.'
- id: A17
  name: Funding milestone
  value: Five active logos, two entity expansions, repeatable connectors, and one adjacent-jurisdiction pilot with six months of cash buffer
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary] this is the proof package the pre-seed round needs to finance before a larger seed raise becomes credible.'
