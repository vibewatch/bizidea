scenarios:
  downside:
    description: Policy ambiguity slows conversions, pricing lands closer to the low end of the range, and the company reaches only five active groups by year 3.
    y3RevenueK: 1160.0
    y3EbitdaK: -616.2
    cashLowPointK: -102.7
    keyAssumptionChanges:
    - Net logo ramp tops out at 5 active groups instead of 6 because one year-2 land and one year-3 expansion slip.
    - Blended annualized revenue per group falls to $150K in Y1, $216K in Y2, and $240K in Y3.
    - Gross margin reaches only 68% in Y3 because evidence-pack delivery and hosting stay more services-heavy.
  base:
    description: Base case stays within the six-logo SOM ceiling, with growth driven by converting three year-1 diagnostics and attaching one modest expansion module per mature group by year 3.
    y3RevenueK: 1540.0
    y3EbitdaK: -327.0
    cashLowPointK: 355.4
    keyAssumptionChanges:
    - Net active groups move from 3 in Q4Y1 to 5 in Q4Y2 and 6 from Q1Y3 onward.
    - Recognized annualized revenue per active group rises from $156K to $264K as diagnostics convert into annual production and entity-level expansions attach.
    - The team stays at 7 FTE after M18, which keeps the company cash-positive through the full 36-month model.
  upside:
    description: Reference customers and partner referrals pull one extra logo into the pipe, so the company reaches seven active groups and nearly breaks even by year 3.
    y3RevenueK: 1817.0
    y3EbitdaK: -96.8
    cashLowPointK: 738.4
    keyAssumptionChanges:
    - One additional partner-sourced group lands by late year 2, lifting the year-3 active-logo count to 7.
    - Blended annualized revenue per group increases to $162K in Y1, $240K in Y2, and $276K in Y3.
    - Gross margin reaches 72% in Y3 as connectors and monthly filing packs standardize faster than planned.
sensitivity:
- variable: ARPU
  downsideCase: $240K mature annualized revenue per active group in Y3
  baseCase: $264K mature annualized revenue per active group in Y3
  upsideCase: $276K mature annualized revenue per active group in Y3
  y3RevenueImpactK: -140.0
  cashImpactK: -98.0
- variable: CAC
  downsideCase: S&M intensity rises 25% because partner referrals underperform and founder-led cycles stay expensive.
  baseCase: Base case spends about $175.6K of cumulative S&M per landed logo.
  upsideCase: Warm referrals keep S&M intensity flat while preserving the same logo count.
  y3RevenueImpactK: 0.0
  cashImpactK: -98.3
- variable: churn
  downsideCase: One mature production group churns or pauses expansion in Y3, leaving only 5 active groups from M28 onward.
  baseCase: Net customer schedule holds 6 active groups from Q1Y3 onward.
  upsideCase: No churn and all six base-case groups keep expanding entities or modules.
  y3RevenueImpactK: -198.0
  cashImpactK: -138.6
- variable: sales cycle
  downsideCase: The last three logos each slip by roughly one quarter because legal review and data mapping take longer.
  baseCase: Logos land in M4, M6, M9, M16, M22, and M27.
  upsideCase: Referenceable diagnostics pull one later logo forward by one quarter.
  y3RevenueImpactK: -66.0
  cashImpactK: -97.1
- variable: gross margin
  downsideCase: Y3 gross margin stalls at 68% instead of 70%.
  baseCase: Y3 gross margin reaches the BP target of 70%.
  upsideCase: Y3 gross margin reaches 72% as implementation gets more repeatable.
  y3RevenueImpactK: 0.0
  cashImpactK: -30.8
- variable: hiring pace
  downsideCase: Senior engineering and customer-success hires are pulled forward by one quarter before revenue proof is established.
  baseCase: No hires are added after M18.
  upsideCase: Later hires stay deferred until the sixth logo is referenceable.
  y3RevenueImpactK: 0.0
  cashImpactK: -67.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DiagnosticsAndReferrals --> ActiveGroups
      ActiveGroups --> BlendedARPU
      BlendedARPU --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case reaches about $1.54M of Y3 revenue by filling the six-logo SOM ceiling and lifting blended revenue per group from $156K to $264K as diagnostics convert and entity expansions attach.
- checkName: Must go right
  finding: Two of the first three diagnostics need to convert and the sixth logo must land by Q1Y3, because the model deliberately avoids building a large sales team.
- checkName: Model breaks if
  finding: If the company tops out at five active groups and $240K mature annualized revenue per group, downside cash dips slightly negative before the end of Y3.
- checkName: Next-round proof
  finding: A credible seed story is five active logos, two entity expansions, repeatable connectors, and one adjacent-jurisdiction pilot without missing the 70% steady-state gross-margin target.
sanityChecks:
  ruleOf40: Y3 growth 68.9% + EBITDA margin -21.2% = 47.7%
  burnMultiple: Y2 burn multiple is about 1.4x on two net new logos and improves to about 1.2x in Y3 as the same 7-FTE team supports the sixth logo.
  revenuePerFte: $220K Y3 (roughly in the low end of the $200-400K vertical SaaS benchmark)
  flags:
  - The immediate Nigeria-only logo universe is small, so the model depends on expansion revenue per group rather than large customer-count growth.
  - Research did not fetch the primary CBN circular PDF, so filing denominators and aggregation logic still need counsel validation before the rules engine is hard-coded.
  - The base case stays EBITDA-negative through Y3; if delivery work proves more bespoke than planned, the $2.0M ask will need to move toward the middle of the BP range.
  - No hires are added after M18, so execution risk rises if implementation, support, or adjacent-jurisdiction work requires more local staffing than the plan assumes.
