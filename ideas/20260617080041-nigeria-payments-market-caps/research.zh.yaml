    sourceRefs:
    - 30
    - 31
    - 34
competitors:
- name: MetricStream
  stage: incumbent
  wedge: 水平 GRC 与合规工作流自动化。
  pricing: 定制企业报价。
  strength: 面向企业合规团队的成熟管控测试、案例管理和政策工作流。
  weaknessVsUs: 未针对尼日利亚发卡/收单上限计算、支付通道路由或申报级分母逻辑进行预建模。
  sourceRefs:
  - 35
- name: Collibra
  stage: incumbent
  wedge: 数据治理、溯源和可信数据基础。
  pricing: 定制企业报价。
  strength: 面向受监管数据环境的强大目录和治理能力。
  weaknessVsUs: 止步于数据治理，原生不生成 CBN 口径的月度报告或整改情景。
  sourceRefs:
  - 36
- name: Interswitch / Verve
  stage: incumbent
  wedge: 本地支付通道、卡方案、二维码和企业支付基础设施。
  pricing: 企业基础设施合同和定制商务条款。
  strength: 深度嵌入尼日利亚银行、卡、商户和受理基础设施。
  weaknessVsUs: 通道运营商并不等同于针对集中度和存储规则的中立集团级合规控制平面。
  sourceRefs:
  - 29
  - 37
  - 38
- name: ServiceNow IRM
  stage: incumbent
  wedge: 以工作流为中心的风险与合规编排。
  pricing: 基于报价的模块授权。
  strength: 企业工作流广度，在大型风险团队中具有较强采用。
  weaknessVsUs: 需要大量定制才能呈现尼日利亚支付监管软件的样子。
  sourceRefs:
  - 39
- name: Rack Centre / Equinix ecosystem
  stage: incumbent
  wedge: 境内托管、互联和主权云邻近。
  pricing: 基础设施报价和托管合同。
  strength: 直接解决问题中的托管、延迟和数据主权部分。
  weaknessVsUs: 提供合规机架和网管，不提供集团级上限监控、申报逻辑或情景建模。
  sourceRefs:
  - 30
  - 31
  - 32
  - 33
  - 34
regulatoryTechnicalConstraints:
- point: 任何生产系统都必须跨关联实体建模市占率，因为通函针对的是机构和集团层面的市场力量，而非单一产品线。
  sourceRefs:
  - 1
  - 3
- point: 在尼日利亚产生的支付数据自 2027 年起必须在境内存储和管理，因此架构选择即合规决策。
  sourceRefs:
  - 2
  - 4
  - 11
  - 13
- point: 月度报告依赖 PTSA、处理器和终端路由可见性，而非单纯的总账数据。
  sourceRefs:
  - 17
  - 18
  - 19
- point: UBO 和自动化 AML 义务扩大了对交易对手和控制人的入职、审计和治理预期。
  sourceRefs:
  - 14
  - 15
  - 16
validationSignals:
- point: CBN 已将集中度风险转化为有日期约束的月度工作流——这类强制事件通常催生软件预算。
  sourceRefs:
  - 1
  - 2
  - 3
- point: 大型运营商正在主动向发卡、收单和银行多层融合，集团级敞口随时间变得更难手动追踪。
  sourceRefs:
  - 22
  - 23
  - 24
- point: 本地基础设施供应商和电信运营商已在大力投入工作负载迁移，表明境内存储项目现在就在预算之内。
  sourceRefs:
  - 32
  - 33
  - 34
- point: 商户侧基础设施仍具战略意义——银行仍在部署数以万计的 POS 终端，与金融科技收单方竞争。
  sourceRefs:
  - 25
  - 29
openQuestions:
- 本次运行中 CBN 通函 PDF 链接被拦截；对 25% 和 15% 测试，究竟适用怎样的分母、通道和关联方定义？
- CBN 是否会将银行、小额信贷银行、处理器和代理子公司，以同一 UBO 归入单一申报口径，同时覆盖发卡和收单市占率？
- 硬性违规之前会适用哪些监管制裁或整改步骤，迁移或实体拆分计划是否会获得分阶段豁免？
- 敞口最大的运营商中，有多少关键支付数据仍在境外，哪些数据集最难在不停机的情况下迁移？
