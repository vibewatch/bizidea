jobsToBeDone:
  - job: When a central process team wants to copy a winning kiln control recipe from one plant to another, help them validate and deploy the change safely, so they can capture fuel and emissions gains without risking quality or uptime.
    currentAlternative: Process-engineering playbooks, spreadsheets, and APC vendor professional services
    successMetric: Days from approved pilot result to production rollout at the next plant
  - job: When plant operators override a new AI-driven control setting, help the group operations team understand why and adapt the rollout plan, so they can keep trust high and standardize what actually works.
    currentAlternative: Shift notes, historian screenshots, and postmortem calls between plants
    successMetric: Override rate and realized savings versus modeled savings after rollout
