topRisks:
  - name: Incumbent control-stack resistance
    description: APC vendors or DCS integrators may block access if they see the rollout layer as competitive or operationally risky.
    mitigation: Position the product as a vendor-neutral deployment and evidence layer, start with read-only historian integrations, and prove it drives more successful vendor rollouts.
  - name: Operator trust gap
    description: Plant teams may reject centrally pushed control changes if the software feels like a black box that ignores local process nuance.
    mitigation: Keep operators in the approval loop, surface explainable preflight checks, and make every override part of the learning and benchmarking workflow.
  - name: Beachhead concentration
    description: Cement is a finite starting market, and long enterprise sales cycles could slow early growth.
    mitigation: Start in cement for wedge clarity, then expand quickly into steel, glass, and chemicals once the rollout-governance pattern is proven.
