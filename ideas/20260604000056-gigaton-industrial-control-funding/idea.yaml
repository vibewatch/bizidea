problem: >-
  Multi-plant cement groups can prove AI control value on one kiln, but scaling those setpoint changes across brownfield plants is still a manual, high-risk workflow. Group process teams manage recipe changes, operator approvals, exception handling, and quality guardrails through spreadsheets, historian screenshots, and shift handovers that were never designed for autonomous control. That slows rollout, erodes trust after every override, and leaves millions in fuel savings and carbon reduction stranded after the pilot.
targetUser:
  primary: Group process excellence leaders and kiln optimization managers at multi-plant cement producers
  secondary: Plant managers and control-room superintendents responsible for clinker quality, fuel mix, and line uptime
  buyer: VP Manufacturing Excellence or Group Head of Process Performance at regional cement groups
startupThesis:
  nonObviousInsight: >-
    The hard problem is no longer proving that AI can improve kiln performance; named deployments and reported savings show that part is becoming real. The new bottleneck is rollout governance across shifts, plants, and operating envelopes, because brownfield heavy-industry sites still lack a system for safely shipping control changes, tracking overrides, and proving which recipe should become the new standard.
  beachhead: >-
    Multi-plant cement producers operating 5 to 30 clinker lines that have already piloted AI or advanced process control on at least one kiln but still deploy new control recipes through central engineers and plant-by-plant manual signoff
  wedge: >-
    A control rollout OS that versions kiln recipes and setpoint changes, simulates constraint compliance against historian data, routes approvals, generates shift-ready operating playbooks, and tracks overrides back to cost and CO2 outcomes
  whyNowCatalyst: >-
    Gigaton's funding, named live deployments, large per-plant savings, and stated expansion into adjacent continuous-process sectors show AI control has moved from concept to rollout, making safe deployment governance newly urgent.
  ventureScalePath: >-
    Start with kiln-control rollout for cement groups, then expand the same deployment-governance layer into steel furnaces, glass lines, and chemicals plants, eventually becoming the system of record for industrial AI operating envelopes, override analytics, and cross-site performance benchmarking.
solution: >-
  Build a deployment layer that sits between AI control vendors, APC systems, and plant operations teams. The product ingests historian data, recipe changes, quality constraints, and vendor-recommended setpoint adjustments, then runs a preflight check on each rollout against plant-specific operating envelopes before anything hits the control room. It creates approval flows for group process leaders and plant managers, auto-generates shift handover instructions, and records every operator override with root-cause tags. After rollout, it measures whether the new control recipe actually delivered the expected fuel, throughput, and emissions outcomes so the corporate team can decide which playbooks to standardize across the fleet. The initial deployment stays vendor-neutral and API-light by starting with historian, DCS, and spreadsheet exports instead of requiring a rip-and-replace control stack.
goToMarketSeed:
  firstCustomer: A regional cement producer with 5 to 15 clinker lines, one successful AI-control pilot, and a central process team trying to standardize fuel-mix optimization before the next annual energy and decarbonization plan
  buyingTrigger: A first successful pilot or fuel-price shock that pushes corporate operations leaders to roll new control recipes from one plant to the rest of the network without hurting quality or uptime
  currentAlternative: APC vendor services, historian dashboards, spreadsheet-based rollout checklists, manual shift handovers, and process-engineering consultants
  switchingReason: The wedge lets the buyer scale proven control gains across plants with auditability and operator trust, without replacing the incumbent DCS, historian, or AI optimization vendor
  pricingHypothesis: Annual software fee priced per active clinker line or per plant under managed rollout, with premium modules for cross-site benchmarking and operator-override analytics
