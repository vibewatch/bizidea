scenarios:
  downside:
    description: >-
      Procurement drags, APC vendors absorb more workflow, and the company closes fewer multi-site
      expansions than planned.
    y3RevenueK: 3000
    y3EbitdaK: -430
    cashLowPointK: 420
    keyAssumptionChanges:
      - Y2 blended ARPU drops from $400K to $350K and Y3 blended ARPU drops from $450K to $400K.
      - >-
        The company exits Y3 with 8 active accounts instead of 10 because the sales cycle stretches
        toward 12 months.
      - Gross margin reaches only 65% because deployments stay more services-heavy.
      - >-
        Partner-sourced pipeline contributes less than expected, keeping CAC elevated and slowing
        expansions.
  base:
    description: >-
      The base case converts three paid pilots into seven production accounts by Q4Y2 and reaches
      the BP SOM path by exiting Y3 at about $4.5M ARR.
    y3RevenueK: 4050
    y3EbitdaK: 281.63
    cashLowPointK: 1105.48
    keyAssumptionChanges:
      - None; this scenario is the operating plan defined by assumptions A1-A20.
  upside:
    description: >-
      Partner-led credibility shortens procurement, expansion modules attach faster, and the team
      turns pilot proof into a broader multi-site rollout motion.
    y3RevenueK: 5250
    y3EbitdaK: 980
    cashLowPointK: 1250
    keyAssumptionChanges:
      - >-
        Y2 blended ARPU rises to $425K and Y3 blended ARPU rises to $500K as premium benchmarking
        and override analytics attach earlier.
      - >-
        The company exits Y3 with 12 active accounts because partner-sourced pilots close faster and
        expand sooner.
      - >-
        Gross margin reaches 72% as historian normalization and approval templates become more
        repeatable.
      - >-
        Sales cycle compresses toward 7 months once one partner-sourced deployment becomes
        referenceable.
sensitivity:
  - variable: ARPU
    downsideCase: $400K Y3 blended ACV
    baseCase: $450K Y3 blended ACV
    upsideCase: $500K Y3 blended ACV
    y3RevenueImpactK: -450
    cashImpactK: -315
  - variable: CAC
    downsideCase: $260K fully loaded CAC per new account
    baseCase: $220K fully loaded CAC
    upsideCase: $180K with partner-assisted selling
    y3RevenueImpactK: 0
    cashImpactK: -240
  - variable: churn
    downsideCase: 2.0% monthly logo churn
    baseCase: 1.5% monthly churn
    upsideCase: 1.0% monthly churn with stronger system-of-record behavior
    y3RevenueImpactK: -220
    cashImpactK: -170
  - variable: sales cycle
    downsideCase: 12 months because OT review and procurement drag
    baseCase: 9 months
    upsideCase: 7 months with partner-led trust transfer
    y3RevenueImpactK: -900
    cashImpactK: -650
  - variable: gross margin
    downsideCase: 65% mature gross margin
    baseCase: 70% target gross margin
    upsideCase: 72% with standardized deployments
    y3RevenueImpactK: 0
    cashImpactK: -202.5
  - variable: hiring pace
    downsideCase: Pull forward one engineer and one solutions hire by two quarters
    baseCase: Follow the BP sequencing and only add scaled GTM after pilots convert
    upsideCase: Delay one non-core GTM hire until partner referrals are proven
    y3RevenueImpactK: 0
    cashImpactK: -280
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Trigger[Pilot success or fuel-change trigger] --> Accounts[Paying producer-group accounts]
      Accounts --> Lines[Managed lines and plants per account]
      Lines --> Revenue[Subscription + onboarding + benchmark modules]
      Revenue --> GrossProfit[Gross profit after deployment COGS]
      GrossProfit --> Cash[Cash runway after payroll and opex]
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue comes from growing from 3 paid accounts at Y1 end to 10 by Q4Y3 while
      lifting blended ACV from pilot pricing to about $450K as more plants and premium modules
      expand inside each group.
  - checkName: Must go right
    finding: >-
      The company has to standardize historian normalization and approval workflows fast enough that
      gross margin can climb from the mid-50s in Y2 to 70% by Q4Y3 without slowing deployments.
  - checkName: Model breaks if
    finding: >-
      The biggest cash risk is a sales cycle stretching toward 12 months because the sales-cycle
      sensitivity has the largest combined downside impact on both Y3 revenue and runway.
  - checkName: Next-round proof
    finding: >-
      A credible next round is supported if the company exits Q4Y2 with 7 production accounts, one
      partner-sourced rollout, and visible second-plant expansion before using the six-month cash
      buffer.
sanityChecks:
  ruleOf40: Y3 growth 84.1% + EBITDA margin 7% = 91.1%.
  burnMultiple: >-
    Y2 burn multiple is about 0.3x on roughly $2350K of net new ARR; Y3 turns EBITDA positive while
    adding about $1700K of exit ARR.
  revenuePerFte: >-
    $368.2K Y3 revenue per Q4Y3 FTE using $4050K revenue and 11 year-end FTE (benchmark $200-$400K
    SaaS).
  flags:
    - >-
      The reachable market is concentrated, so even the base case depends on a small number of
      multinational or regional cement groups approving standalone budget for a new workflow layer.
    - >-
      The model assumes buyers will pay for a vendor-neutral governance layer instead of forcing the
      product into APC vendor bundles; if that proves false, pricing and gross margin both drift
      toward the downside case.
    - >-
      Y1 and Y2 burn stay heavy because OT review, historian normalization, and operator-trust work
      keep deployments partly services-influenced until playbooks standardize.
    - >-
      Cash roll-forward treats EBITDA as cash and excludes working-capital timing, taxes, and capex,
      so real quarterly cash movement could be lumpier than shown.
