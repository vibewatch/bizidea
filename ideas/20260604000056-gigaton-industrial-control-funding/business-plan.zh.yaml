slug: kiln-control-rollout-os
date: '2026-06-04'
executiveSummary: Kiln Control Rollout OS 最适合先做成一层厂商中立的部署治理软件，服务那些已经在至少一座窑炉上证明 AI 或 APC 有价值的多厂区水泥生产商。第一位客户应是一家区域性集团：有 5–15
  条熟料线、一个已经跑通的控制试点，以及一个急着在下一轮规划前把燃料配比或能效提升标准化的集团工艺团队。研究已经把痛点坐实：Adani Cement、Heidelberg Materials 和 Holcim 的具名部署说明工厂级控制软件已经在真实运行，而每厂
  $1M–$3M 的已披露节省、外加约 30,000 吨 CO2 减排，也让全集团 rollout 的拖延直接变成财务问题。公司不该再卖一个优化器；它该卖的是预飞校验、审批路由、交接班 handover 和人工接管分析，让集团能把一套跑赢的配方复制出去，而不冒质量、开工率或排放合规的风险。这套
  GTM 逻辑是连贯的：触发点是一个已经被证明的试点，或者一次替代燃料 rollout；买方是制造卓越副总裁或集团工艺绩效负责人；第一份合同是单厂付费试点；定价则随着纳管的熟料线增加而扩张。模型化市场规模不大，但足够支撑一家聚焦公司——TAM
  约 $96.0M、SAM 约 $27.0M、第三年 SOM 约 $4.5M；同时，目前也没有找到专门针对这类 rollout 治理层的权威独立品类数据。公司要赢，前提是上线时坚持 historian-first、只读部署，不去替换现有厂商，而是补位；再把人工接管数据和真实结果数据沉淀成跨站点的专有
  benchmark。真正让人犹豫的点也很明确：买家集中、OT 驱动的销售周期长，以及 APC 厂商可能把足够多的 rollout 工作流打包进来，在创业公司成为 system of record 之前就把切口压扁。
problem:
- 多厂区水泥集团已经能在一座窑炉上证明 AI 或 APC 有价值，但新配方扩到更多工厂时，依然靠电子表格、historian 截图、邮件审批和交接班推进——这些工具根本不是为全集团 rollout 设计的。
- 替代燃料渗透、碳成本压力和排放合规要求，让每一次控制变更都更值钱、也更危险，所以 rollout 一旦慢下来或前后不一致，董事会看得见的节省就会被晾在半空。
solution:
- 做一套只读 rollout OS：给窑炉配方做版本管理，接入 historian 和电子表格导出，按工厂条件跑预飞检查，并在新的设定值包进控制室之前把审批流先走完。
- go-live 之后，继续抓取操作员人工接管、交接班记录，以及真实的燃料、产量和 CO2 结果，让集团团队判断哪些 playbook 应该成为全网标准，哪些该回滚。
whyWeWin:
- 这个切口卡在试点之后、全集团标准化之前——价值最容易卡住的地方，也正是现有工具最弱的地方。
- 产品和 APC、DCS、historian 厂商是互补关系，不要求客户换控制栈，反而能靠提升项目成功率更快卖进去。
- 跨站点迁移数据、人工接管原因，以及“模型预测 vs 真实结果”的 rollout 结果，会逐步沉淀成工厂级工具天然看不到的专有 benchmark 护城河。
strategicChoices:
  beachhead: 运营 5–30 条熟料线、至少有一座窑炉已经上线 AI 或 APC、并且有中心工艺团队想把跑赢的配方复制到更多工厂的多厂区水泥生产商。
  wedgeRationale: 这个窄入口有明确买方、清晰的试点后触发点，也能用 rollout 速度、人工接管率和真实节省来量化结果；如果一开始就想服务所有连续流程行业，只会稀释可信度，也拖慢第一个标杆客户的落地。
  sequencingRationale: 先做一条 historian-first、只读的水泥 workflow，让公司先证明信任感，以及从试点到第二工厂的转化，再去加更深的集成、伙伴渠道和相邻行业扩张。
  notYet:
  - 第一代产品先不直接写回 DCS 或 APC 系统
  - 先不碰新建绿地工厂，那里的现有自动化项目通常已经把技术栈定死了
  - 在 2–3 个水泥集团进入生产前，先不扩到钢铁、玻璃和化工
  - 先不做 rollout 治理之外的通用工业分析或可持续报告
market:
  tam: 模型化 TAM 约为 $96.0M：按欧洲、美国和大型印度集团中大约 320 座符合条件的水泥厂计算，每座受管工厂对应约 $300k 的年 ACV。
  sam: 模型化 SAM 约为 $27.0M：按大约 90 座近期可触达工厂计算，这些工厂都位于多厂集团内部，已经在推动 APC 现代化、替代燃料或脱碳项目。
  som: 第三年 SOM 约为 $4.5M：前提是早期试点能转成多站点 rollout，在 3–5 个生产集团内跑起 15 座受管工厂。
  segments:
  - 主要：运营 5–30 条熟料线，且至少有一座窑炉已经上线 AI/APC 的多厂区水泥生产商
  - 次要：正在跨多个工厂推进替代燃料、熟料因子优化或脱碳项目的水泥集团
  buyingProcess: 这笔采购通常始于一个成功试点、一次燃料价格冲击，或一次替代燃料 rollout：集团必须把一套跑赢的操作配方复制到下一个工厂，又不能伤到质量和开工率。集团工艺负责人会发起试点，制造卓越副总裁或集团工艺绩效负责人掌预算，而工厂经理加
    IT/OT 安全评审，则会以可审计性、只读部署和操作员接受度作为生产 rollout 的放行条件。
product:
  mvp: MVP 应该是一套面向单个水泥集团的 historian-first rollout 工作台。它要能给配方和设定值包做版本管理，结合 historian 数据和工厂约束做预飞检查，路由审批，生成可直接交班使用的 handover
    指引，并记录人工接管以及“模型预测 vs 真实结果”的差异，而且不要求直接写回控制系统。
  sixMonth: 签下 2 个共创客户，上线只读 historian 接入、配方版本管理和审批工作流，并证明一条试点线可以从参考工厂扩到第二个工厂，而且全程有清晰审计链。
  twelveMonth: 把 2–3 个生产集团转成付费生产账户，加入跨站点 benchmark 和结构化人工接管分类，并在混合 historian 环境下把部署 playbook 标准化。
  twentyFourMonth: 成为水泥行业全集团 rollout 治理的 system of record，再把同一条 workflow 主干扩到一个买方路径相似、historian 接入条件相近的相邻连续流程行业。
  keyBets:
  - 买方会愿意为部署治理单独付费，而不是等 APC 厂商把它打包进去。
  - 只读 historian 数据加导出的实验室或质量输入，已经足够支撑可信的预飞检查，不必一开始就做更深的 OT 集成。
  - 当预飞假设、审批链和人工接管原因被明确摊开时，操作员的信任会提升，而不是下降。
  - 一个账户里只要有一次成功的第二工厂 rollout，就会打开整个集团内部的强扩张路径。
gtm:
  wedge: 第一座窑炉控制试点跑通，或者一次替代燃料配方变更落地之后，马上切入：此时客户最想把收益复制到下一座工厂，但又不敢拿熟料质量、排放或开工率去赌。
  channels:
  - 由创始人直接向集团制造卓越和工艺绩效负责人销售
  - 和希望提升客户全集团 rollout 成功率的 APC 与自动化厂商联合销售或做转介绍合作
  - 借 historian、分析软件和工业集成商的推荐，缩短拿到只读数据访问的时间
  funnelTargets: 线索发现→合格试点 20–30%；合格试点→付费试点 30–40%；试点→生产 50%+；转生产后 6 个月内扩到第二个受管工厂或产线的账户占比 60%+。
  pricing: 先对单厂或单线收付费试点费，之后按纳入治理 rollout 的活跃熟料线收年度订阅费，再叠加入场费和高级跨站点 benchmark 模块；因为每多一条线把验证过的配方比人工流程更快标准化一次，买方就能立刻感到价值。
businessModel:
  revenueStreams:
  - 面向受治理 rollout 工作流的年度平台订阅
  - 围绕 historian、质量和审批配置的付费导入与站点标准化服务
  - 用于跨站点 benchmark 和操作员人工接管洞察的高级分析模块
  unitOfValue: 通过受治理 rollout 工作流管理的活跃熟料线
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一个生产集团里，首个 rollout 跑通后继续增加更多熟料线和工厂
  - 从 rollout 审批扩到 benchmark、例外分析和配方迁移建议
  - 水泥 proof point 可以对外引用后，再进入一个相邻连续流程行业
strategyMap:
  northStarMetric: 采用标准化配方并达到目标节省和 CO2 结果、且人工接管率没有抬升的生产熟料线数量
  inputMetrics:
  - 从试点结果获批到下一工厂正式上线的天数
  - 试点转生产的转化率
  - rollout 后前 30 天的人工接管率
  - 每条受管产线的真实燃料节省相对模型预测的兑现情况
  - 每个生产账户下的受管熟料线数量
  moatsToBuild:
  - 按燃料配比、窑型和运行边界沉淀的跨站点配方迁移模式库
  - 把操作员行为和 rollout 假设、工厂上下文连起来的人工接管原因数据集
  - 一层采购安全的治理软件：跨全集团提供审计链、审批流和与 historian 关联的证据
  killCriteria:
  - 前 6 个付费试点中，不到 2 个能在 12 个月内转成生产部署
  - 从“试点验证过的配方”到“第二工厂 rollout”的中位时间，在实施后依然高于 8 周
  - 超过 40% 的生产 rollout 仍然需要定制工程支持，导致毛利率无法向 70% 靠拢
  mermaid: |
    flowchart LR
      Wedge[Beachhead wedge] --> MVP[MVP]
      MVP --> Proof[Proof points]
      Proof --> Expansion[Expansion motion]
investorMemo:
  verdict:
    call: 值得见面 / 继续尽调
    conviction: 这是一个有前景的窄切口，客户时点也对，但最终判断取决于两件事：买方会不会为独立治理层买单，以及他们会不会把它当成 APC 服务的一部分。
    whyBelieve: 具名上线部署、可观的单厂经济性，以及明确存在的人工 rollout 瓶颈，都支持这样一个产品切口：单厂 AI 控制一旦跑通，后面就需要它。
    whyDoubt: 起步市场集中又保守，而现有 APC 或自动化厂商完全可能吸收掉足够多的工作流，压缩这家公司的独立价值。
    nextDiligence: 验证 10–15 个目标生产集团，拿下 2 个付费试点，并证明至少有 1 个试点能在 6 个月内从参考工厂扩到第二个工厂。
  firstCustomer:
    title: 区域性水泥生产商里的集团工艺卓越负责人
    profile: 一家有 5–15 条熟料线、已经跑通过一次窑炉控制试点、historian 环境混合、并且有中心团队要在下一轮运营计划前把燃料和减排收益标准化的生产商。
    trigger: 第一次 AI/APC 试点跑通，或者一次替代燃料切换，会让集团必须把新配方推到全网，同时又不能伤到质量和开工率。
    buyer: 制造卓越副总裁或集团工艺绩效负责人
    initialContract: 单厂或单线付费试点 $75k–$150k；随着 3–5 条熟料线进入受治理 rollout，转为约 $250k–$500k 的年度生产支出。
  mustBeTrue:
  - 至少一半的合格目标集团已经在一座窑炉上跑着 AI 或 APC，但跨站点 rollout 仍靠电子表格、邮件或人工交接班。
  - 只读 historian 数据和质量数据足以生成一个让操作员和工厂经理信任的预飞流程，用来支持第二工厂 rollout 决策。
  - 买方愿意从制造卓越或能效预算里，为独立 rollout 治理层付费，而不是要求把它打包进 APC 合同。
  - 一次成功的生产部署，能在 6 个月内扩到至少一个额外工厂或产线，从而证明账户级 land-and-expand 经济性。
  - APC 和自动化在位企业不会在前 24 个月内，足够快地推出等价的厂商中立审批、交接班和人工接管分析功能，直接抹掉切口。
  diligenceQuestions:
  - 现在到底有多少多厂区水泥集团，已经有一座 AI/APC 窑炉在线，却还没有可复用的全集团 rollout 工作流？
  - 当一个试点要从一座工厂走向下一座工厂时，预算究竟归谁管：制造卓越、工艺工程、工厂运营，还是采购？
  - 要让第二工厂的预飞结果足够可信，最低需要哪些 historian、实验室和质量数据？
  - 客户为什么要买这一层，而不是继续扩 APC 厂商服务，或者交给系统集成商？
  - 水泥之后，钢铁、玻璃和化工里，哪个相邻行业的采购触发最接近、数据接入负担最低？
operatingAssumptions:
- assumption: 近期可触达市场里，确实大约有 90 座工厂已经把 AI/APC 的价值验证到足以把 rollout 治理列成下一笔预算。
  basis: research.yaml
  validationTest: 访谈 20 个生产集团，并按在线试点状态、多厂区足迹和未来 12 个月内的 rollout 计划，至少筛出 10 个合格目标。
  decisionImpact: 如果不成立，就把滩头市场收窄到一个区域，或一个替代燃料渗透更高的子细分，并放慢 GTM 招聘。
- assumption: 只读 historian 接入，加上导出的质量和配方数据，就能在不直接写回 OT 的情况下交付第一波价值。
  basis: research.yaml
  validationTest: 完成 3 个共创客户部署，在 6 周或更短时间内跑出可用的预飞检查，而且不做直接 DCS 集成。
  decisionImpact: 如果不成立，工程团队就必须更早把深度集成排到前面，实施成本会上升，销售效率也会后移。
- assumption: 经济买方会批准独立治理预算，因为这笔钱相对单厂节省来说占比很小。
  basis: research.yaml
  validationTest: 围绕近期试点或 rollout 事件，在 8–10 场采购和制造卓越访谈里测试定价与预算归属。
  decisionImpact: 如果不成立，公司就得转向伙伴转售或更重服务的打包方式，毛利和客户关系控制力都会被削弱。
- assumption: 只要审批链、预飞假设和人工接管记录都摆在明面上，操作员就会接受这套 human-in-the-loop 的 rollout 工作流。
  basis: idea.yaml
  validationTest: 和工厂经理、控制室负责人一起做试点复盘，把首个 30 天 rollout 中的退出率或硬接管率压到 25% 以下。
  decisionImpact: 如果不成立，产品就该先强调文档化和事后分析，而不是主动治理 rollout。
- assumption: 水泥行业里跑通的 proof point，至少能迁移到一个相邻连续流程行业，而不需要把产品整套重写。
  basis: 团队判断
  validationTest: 在 2 个水泥生产账户跑起来之后，到钢铁、玻璃和化工里做 10 通 discovery，确认至少有一个细分行业具备相同的买方、触发点和数据输入。
  decisionImpact: 如果不成立，就把公司当成更窄的水泥软件公司来经营，并减少平台扩张方向的招聘。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 个目标水泥集团里的集团工艺负责人、工厂经理和 APC 项目负责人。
  hypothesis: 公司能找到足够多的试点后 rollout 痛点，支撑一条事件驱动的付费试点路径。
  successMetric: 至少 10 场访谈记录到：最近一次配方 rollout 花了超过 2 周，或者卡在审批、交接班或操作员阻力上。
  owner: CEO
- horizon: 0–90 天
  experiment: 为一个共创客户交付 concierge 式预飞工作流，使用 historian 导出、配方差异和人工审批路由。
  hypothesis: 买方会在要求全自动化或写回集成之前，先为受治理 rollout 付费。
  successMetric: 两位潜在客户在看过真实 rollout 案例的工作流输出后，同意付费试点范围或签 LOI。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 把配方版本管理、基于角色的审批和交接班指令生成做成产品，服务首个试点账户。
  hypothesis: 真正的 minimum lovable product 不是控制模型新不新，而是工作流纪律能不能落地。
  successMetric: 有一个试点账户把产品当成真实第二工厂 rollout 的主审批记录。
  owner: 产品负责人
- horizon: 90–180 天
  experiment: 在只读部署、审计日志和不直接写回控制系统的前提下，跑通 OT 安全与工厂变更评审。
  hypothesis: 不做深度 OT 集成，也能在第一阶段清掉安全和可靠性方面的反对意见。
  successMetric: 三个试点站点在不做定制安全架构的前提下，通过同一套基础控制包完成评审。
  owner: 平台负责人
- horizon: 6–12 个月
  experiment: 和一家 APC 厂商、historian 厂商或工业集成商正式达成联合销售或转介绍合作。
  hypothesis: 当创业公司被定义成“让 rollout 更容易成功的一层”时，伙伴辅助销售能降低信任摩擦。
  successMetric: 至少有一个伙伴来源的试点启动，其成交周期短于创始人自拓的试点。
  owner: CEO
- horizon: 6–12 个月
  experiment: 推动首批生产账户在第一条线之后，继续扩到第二条线或第二座工厂。
  hypothesis: 一旦一次 rollout 跑通，在同一个集团里 land-and-expand 会比赢下一个新 logo 更便宜、更快。
  successMetric: 至少 60% 的生产账户在 go-live 后 6 个月内新增一条受管产线或一座受管工厂。
  owner: 客户负责人
operations:
- 维护安全的 historian 与电子表格接入流程，把数据保留策略和访问控制说清楚。
- 围绕不同工厂原型，维护一套受控的配方版本库、预飞规则、审批模板和交接班格式。
- 给每一次 rollout 打上时间到审批、人工接管原因、稳定时间，以及“模型预测 vs 真实节省”的埋点。
- 持续维护 OT 评审、安全和审计文档，支撑保守工厂里的只读部署。
- 给 APC 厂商、historian 厂商和工业集成商建立伙伴 enablement，同时不丢掉对工作流数据的所有权。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 先把 historian 接入、配方版本管理、审批流和人工接管抓取做出来，再谈扩范围。
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 亲自抓共创客户销售、伙伴拓展，以及前几轮高度依赖可信度的采购流程。
- role: 工业解决方案负责人
  startTiming: 第 1 个月
  rationale: 把窑炉运行、工厂约束和交接班流程翻成客户真正信任的可复用 rollout 模板。
- role: 产品工程师
  startTiming: 第 3 个月
  rationale: 把 concierge 式试点流程做成可复用产品表面和客户配置，而不是越做越像定制软件。
- role: 解决方案工程师
  startTiming: 第 6 个月
  rationale: 降低混合 historian 环境下的部署摩擦，避免每个实施都把创始人拖进去。
- role: 企业客户经理
  startTiming: 第 9 个月
  rationale: 等试点打包、定价和第二工厂扩张都能对外引用之后，再补规模化销售。
milestones:
- horizon: 0–12 个月
  items:
  - 签下 2 个付费共创客户，并至少通过产品完成 1 次第二工厂 rollout
  - 上线生产级的配方版本管理、审批、交接班和人工接管分析，且部署模型保持只读
  - 至少把 2 个试点转成年付生产合同
  - 建立一个能提供或加速合格试点的生态伙伴关系
- horizon: 12–24 个月
  items:
  - 做到 6–8 个生产账户，或在 3–5 个水泥集团中管理 12+ 条熟料线
  - 证明大多数生产账户都能从第一工厂稳定扩到更多产线或工厂
  - 把跨站点 benchmark 和“模型预测 vs 真实节省”报告做成高级模块
  - 用同一套 workflow 核心选定并测试一个相邻连续流程垂直行业
- horizon: 24–36 个月
  items:
  - 达到或超过模型里的 15 座受管工厂 SOM 路径，或者根据真实转化数据收窄 thesis
  - 在标杆水泥集团内部成为默认的 rollout system of record，而不是一次性试点工具
  - 带着可引用的水泥 benchmark 和伙伴分发能力，进入一个相邻行业
risks:
- risk: APC、DCS 或自动化在位企业挡住集成，或者把足够多的 rollout 工作流打包进去，直接压扁这个切口。
  likelihood: Medium
  impact: High
  mitigation: 坚持厂商中立，从只读 historian 访问切入，并证明产品是在提高现有项目成功率，而不是替代工厂控制。
- risk: 如果对本地工艺细节建模不够，工厂操作员可能会拒绝由中心治理的配方。
  likelihood: High
  impact: High
  mitigation: 把操作员留在审批链里，把预飞假设摊开，并把每次人工接管都当成结构化产品反馈，而不是噪音。
- risk: historian 质量参差不齐、工厂数据又异构，会让部署过度依赖服务。
  likelihood: Medium
  impact: High
  mitigation: 先标准化最低数据 schema，把第一版 ICP 收窄到 historian 成熟度足够的工厂，并延后更深的定制集成。
- risk: 这个滩头市场确实存在，但如果相邻行业转不动，规模可能还是不够支撑风险投资回报。
  likelihood: Medium
  impact: Medium
  mitigation: 尽早衡量账户扩张，18 个月前验证下一条垂直线，并在跨行业迁移没被证明前，控制好招聘节奏。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-4M
  runwayMonths: 18
  useOfFundsSummary: 把 historian-first 的 rollout 治理产品做出来，拿下 2–3 个付费共创客户，用一套可复用的只读架构清掉 OT 与安全阻力，并把至少 2 个账户转成生产部署，证明公司能在下一轮融资前跑通第二工厂扩张。
