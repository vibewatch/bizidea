    sourceRefs:
    - 11
    - 12
    - 13
  - factor: 经济
    impact: positive
    point: 能源节省和碳成本下降，让运营软件的预算故事落在真金白银上，而不只是 ESG 叙事。
    sourceRefs:
    - 1
    - 4
    - 12
  - factor: 社会
    impact: negative
    point: 如果中心下发的控制变更看起来不透明或不安全，操作员信任会很快被磨掉。
