    - 4
    - 21
  - factor: 技术
    impact: positive
    point: historian 和分析基础设施已经足够成熟，完全可以支撑一层只读的 rollout 治理软件，而不必把控制栈推倒重来。
    sourceRefs:
    - 8
    - 9
    - 10
  - factor: 法律
    impact: negative
    point: ICS 安全和排放合规要求会拖慢部署，也会抬高审计性和变更控制的门槛。
