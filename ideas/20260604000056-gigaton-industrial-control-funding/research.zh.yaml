    mitigation: 把自己定位成一层厂商中立的成功放大器：提升现有项目 ROI，而不是取代它。
    sourceRefs:
    - 4
    - 5
    - 6
    - 7
  - friction: 各工厂 historian 与数据质量环境差异大
    severity: 中
    affectedBuyer: 集团工艺卓越团队
    mitigation: 先规范最低数据 schema，并支持从 historian 导出标签开始的分阶段接入。
    sourceRefs:
    - 8
    - 9
    - 10
market:
  tam:
    value: $96.0M
    rationale: 自下而上的估算：以欧洲约 200 座工厂、美国 99 座工厂，以及 Adani/ACC 的多厂足迹为锚点，估算欧洲、美国和大型印度集团里大约有 320 座符合滩头市场条件的水泥厂；再乘以每座受管工厂约 $0.30M
      的年 ACV。这个数字明显低于已披露的单厂节省和 APC 回本水平。
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 26
    - 27
    - 29
  sam:
    value: $27.0M
    rationale: 假设近期可触达的工厂约有 90 座，主要分布在欧洲、印度和部分北美全集团中的多厂集团里，而且这些工厂已经在推进替代燃料、脱碳或 APC 现代化；按同样每座工厂约 $0.30M 的估算 ACV 计算。
    isEstimate: true
    sourceRefs:
    - 15
    - 22
    - 24
    - 25
    - 26
    - 29
  som:
    value: $4.5M
    rationale: 第三年可达份额假设是：在 3–5 个共创客户集团里管理 15 座工厂。只要创业公司能把一条试点线转成多站点 rollout，并证明真实节省被兑现，这个目标虽然激进，但仍有可能。
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 29
