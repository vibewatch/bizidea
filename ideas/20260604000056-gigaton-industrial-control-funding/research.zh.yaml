  strength: 在水泥场景里有明确案例：窑炉热能降低 3%、人工操作减少、ROI 很快。
  weaknessVsUs: 它强在单厂控制表现，弱在跨站点审批、交接班和人工接管 benchmark 这类工作流。
  sourceRefs:
  - 4
- name: Honeywell
  stage: 在位企业
  wedge: 分层 APC，支持全厂和厂商无关的优化
  pricing: 定制定价，未公开
  strength: 全厂级优化和绩效分析，很打动成熟的工艺组织。
  weaknessVsUs: 产品中心仍是 APC 优化和监控，而不是跨班次、跨站点的全集团 rollout 治理。
  sourceRefs:
  - 6
- name: AspenTech
  stage: 在位企业
  wedge: AI 增强型自适应 APC 与控制器生命周期管理
  pricing: 定制定价，未公开
  strength: 建模能力深、控制器生命周期工具完整，在流程工业里可信度强。
  weaknessVsUs: 它是为改善控制器行为设计的，不是为一个水泥集团编排人工审批和 rollout 后学习而设计的。
  sourceRefs:
  - 5
- name: Siemens
  stage: 在位企业
  wedge: 以 CEMAT 为中心的水泥数字化自动化栈
  pricing: 定制定价，未公开
  strength: 在水泥自动化里的装机优势明显，数字化叙事也更完整。
  weaknessVsUs: 它更聚焦工厂自动化和数字企业结果，而不是存量全集团里的配方治理。
  sourceRefs:
  - 7
regulatoryTechnicalConstraints:
- point: EU ETS 和 CBAM 让排放表现直接变成经济问题，也提高了运行变更可审计的必要性。
  sourceRefs:
  - 11
  - 12
  - 13
- point: 美国水泥窑受有害空气污染物限值约束，因此燃料和工艺变更不能碰坏排放合规。
  sourceRefs:
  - 14
- point: 任何 ICS 相关部署都必须守住安全、可靠和网络安全要求，这会抬高接近 OT 工作流的软件门槛。
  sourceRefs:
  - 30
- point: 替代燃料系统能改善经济性，但也会引入新的工艺波动，因此 rollout 前必须先建模。
  sourceRefs:
  - 15
  - 24
  - 25
validationSignals:
- point: 具名上线部署证明，大型水泥集团已经足够信任 AI 控制，不再只是停留在试点话术。
  sourceRefs:
  - 1
  - 2
- point: 单厂经济性已经足够大，因此更快的全集团 rollout 完全有可能支撑一层单独的软件预算。
  sourceRefs:
  - 1
  - 4
- point: 大型水泥集团正在明确投资 OT 可视化和网络隔离，这让软件治理从小众工厂议题上升成董事会层面的议题。
  sourceRefs:
  - 28
  - 29
  - 30
- point: 替代燃料和熟料下降项目，会反复制造“必须跨多站点改运行边界”的时点。
  sourceRefs:
  - 15
  - 22
  - 24
  - 25
openQuestions:
- 集团工艺团队现在到底有多常因为审批链和交接班流程太脆弱，而拒绝或延后复制一套跑赢的 APC 配方？
- 买方会把 rollout 治理当成新的 system of record，还是坚持要它长在现有 APC 合同里？
- 要在新工厂上做出可信的预飞模拟，最低需要哪些 historian 和实验室数据？
- 水泥之后，钢铁、玻璃和化工里，哪个行业的买方路径最接近、集成负担最低？
