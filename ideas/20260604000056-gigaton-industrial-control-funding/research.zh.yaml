  adoptionFrictionMatrix:
  - friction: OT 网络安全与变更管理评审
    severity: 高
    affectedBuyer: 工厂自动化负责人，以及 IT/OT 安全负责人
    mitigation: 先从只读 historian 接入、基于角色的审批和第一阶段不做直接写回开始。
    sourceRefs:
    - 28
    - 29
    - 30
  - friction: 操作员对中心生成配方的不信任
    severity: 高
    affectedBuyer: 控制室主管和工厂经理
    mitigation: 把预飞假设公开、输出可直接交班的 playbook，并给每次人工接管打上结构化根因反馈。
