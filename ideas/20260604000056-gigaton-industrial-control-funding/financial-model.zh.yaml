scenarios:
  downside:
    description: 采购拉长、APC 厂商吸收了更多工作流，而公司拿下的多站点扩张也少于计划。
    y3RevenueK: 3000
    y3EbitdaK: -430
    cashLowPointK: 420
    keyAssumptionChanges:
    - Y2 综合 ARPU 从 $400K 降到 $350K，Y3 综合 ARPU 从 $450K 降到 $400K。
    - 公司在 Y3 末只有 8 个活跃账户，而不是 10 个，因为销售周期被拉长到接近 12 个月。
    - 毛利率只能做到 65%，因为部署仍然偏服务化。
    - 伙伴来源 pipeline 的贡献低于预期，导致 CAC 居高不下，扩张也更慢。
  base:
    description: 基准情景会把 3 个付费试点在 Q4Y2 前转成 7 个生产账户，并在 Y3 末沿着 BP 的 SOM 路径走到约 $4.5M ARR。
    y3RevenueK: 4050
    y3EbitdaK: 281.63
    cashLowPointK: 1105.48
    keyAssumptionChanges:
    - 无；这个情景就是 A1–A20 假设定义出的经营计划。
  upside:
    description: 伙伴带来的可信度缩短了采购周期，扩张模块更快挂上，团队也把试点 proof point 放大成更广的多站点 rollout 动作。
    y3RevenueK: 5250
    y3EbitdaK: 980
    cashLowPointK: 1250
    keyAssumptionChanges:
    - Y2 综合 ARPU 升到 $425K，Y3 综合 ARPU 升到 $500K，因为高级 benchmark 和人工接管分析更早挂上。
    - 公司在 Y3 末做到 12 个活跃账户，因为伙伴来源试点更快成交、也更快扩出去。
    - 随着 historian 标准化和审批模板更可复用，毛利率能做到 72%。
    - 一旦有一个伙伴来源的部署能拿来做 reference，销售周期就会压向 7 个月。
