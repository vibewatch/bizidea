  y3RevenueImpactK: 0
  cashImpactK: -202.5
- variable: 招聘节奏
  downsideCase: 把 1 名工程师和 1 名解决方案人员各提前两个季度招聘
  baseCase: 按 BP 节奏走，只有试点转正后才补规模化 GTM
  upsideCase: 在伙伴转介绍被验证前，延后一名非核心 GTM 招聘
  y3RevenueImpactK: 0
  cashImpactK: -280
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Trigger[Pilot success or fuel-change trigger] --> Accounts[Paying producer-group accounts]
      Accounts --> Lines[Managed lines and plants per account]
      Lines --> Revenue[Subscription + onboarding + benchmark modules]
      Revenue --> GrossProfit[Gross profit after deployment COGS]
      GrossProfit --> Cash[Cash runway after payroll and opex]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自账户数从 Y1 末的 3 个付费账户增长到 Q4Y3 的 10 个，同时随着更多工厂和高级模块在每个集团里扩张，综合 ACV 从试点定价抬升到约 $450K。
- checkName: 必须跑通的环节
  finding: 公司必须足够快地把 historian 标准化和审批工作流做成标准件，才能让毛利率从 Y2 中段的 50% 多提升到 Q4Y3 的 70%，同时又不拖慢部署。
- checkName: 模型失效条件
  finding: 最大的现金风险来自销售周期拉长到接近 12 个月，因为销售周期敏感性对 Y3 收入和现金跑道的下行冲击合在一起最大。
- checkName: 下一轮融资证明点
  finding: 如果公司能在 Q4Y2 结束时做到 7 个生产账户、1 个伙伴来源 rollout，并在动用 6 个月现金缓冲前跑出可见的第二工厂扩张，就足以支撑一次可信的下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长率 84.1% + EBITDA 利润率 7% = 91.1%。
  burnMultiple: Y2 burn multiple 约为 0.3x，对应约 $2350K 的净新增 ARR；Y3 则在新增约 $1700K 期末 ARR 的同时转为 EBITDA 为正。
  revenuePerFte: 按 $4050K 收入和 Q4Y3 的 11 名年末 FTE 计算，Y3 每名 FTE 对应 $368.2K 收入（SaaS benchmark 为 $200–$400K）。
  flags:
  - 可触达市场高度集中，因此即使是基准情景，也依赖少数跨国或区域性水泥集团愿意为这层新 workflow 单独批预算。
  - 模型假设买方会为厂商中立的治理层付费，而不是把产品塞进 APC 厂商的打包方案里；如果这个假设不成立，定价和毛利率都会向下行情景漂移。
  - Y1 和 Y2 的 burn 依然偏重，因为 OT 评审、historian 标准化和操作员信任建设，会让部署在 playbook 标准化之前始终带着一部分服务属性。
  - 现金滚动把 EBITDA 当作现金，并排除了营运资本时点、税项和 capex，因此真实季度现金波动可能会比模型显示得更颠簸。
