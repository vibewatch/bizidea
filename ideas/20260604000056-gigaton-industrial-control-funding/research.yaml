openQuestions:
- How often do group process teams currently reject or delay copying a winning APC recipe because approval and handover workflows are too fragile?
- Will buyers view rollout governance as a new system of record or expect it to appear inside their incumbent APC contract?
- What minimum historian and lab data are required to produce a trustworthy preflight simulation for a new site?
- Which adjacent sector after cement—steel, glass, or chemicals—has the closest buyer motion and lowest integration burden?
