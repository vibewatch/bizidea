  tam:
    value: $96.0M
    rationale: 'Bottom-up estimate: ~320 eligible beachhead cement plants across Europe, the U.S., and large Indian groups using Europe’s 200 plants, the U.S. 99 plants, and the Adani/ACC multi-plant footprint as anchors; multiplied by an estimated $0.30M annual ACV per managed plant, which sits well below reported plant-level savings and APC payback.'
