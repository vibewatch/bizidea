slug: kiln-control-rollout-os
date: '2026-06-04'
executiveSummary: >-
  Kiln Control Rollout OS should start as a vendor-neutral deployment-governance
  layer for multi-plant cement producers that already proved AI or APC value on
  at least one kiln. The first customer is a regional group with 5-15 clinker
  lines, one working control pilot, and a corporate process team under pressure
  to standardize fuel-mix or energy-performance gains before the next planning
  cycle. Research supports the pain: named deployments at Adani Cement,
  Heidelberg Materials, and Holcim show plant-level control software is live,
  while reported savings of $1M-$3M and roughly 30,000 tonnes of CO2 per plant
  make delayed fleet rollout financially visible. The company should not sell
  another optimizer; it should sell preflight validation, approval routing,
  shift handovers, and override analytics that let a group copy a winning
  recipe without risking quality, uptime, or emissions compliance. The
  go-to-market system is coherent because the trigger is a proven pilot or
  alternative-fuel rollout, the buyer is the VP of Manufacturing Excellence or
  Group Head of Process Performance, the first contract is a paid pilot on one
  plant, and pricing scales with managed clinker lines. Modeled market size is
  modest but investable for a focused company—about $96.0M TAM, $27.0M SAM, and
  $4.5M year-3 SOM—while no authoritative standalone category dataset was found
  for this specific rollout-governance layer. The company can win if it stays
  historian-first and read-only at launch, complements incumbents instead of
  displacing them, and turns override plus realized-outcome data into a
  proprietary cross-site benchmark. The main reasons to hesitate are
  concentrated buyers, long OT-driven sales cycles, and the risk that APC
  vendors bundle enough rollout workflow to collapse the wedge before the
  startup becomes system of record.
problem:
  - Multi-plant cement groups can prove AI or APC value on one kiln, but they still scale new recipes through spreadsheets, historian screenshots, email approvals, and shift handovers that were not built for fleet rollout.
  - Alternative-fuel adoption, carbon-cost pressure, and emissions compliance make each control change more valuable and more risky, so slow or inconsistent rollout leaves board-visible savings stranded.
solution:
  - Build a read-only rollout OS that versions kiln recipes, ingests historian and spreadsheet exports, runs plant-specific preflight checks, and routes approvals before a new setpoint package reaches the control room.
  - After go-live, capture operator overrides, shift notes, and realized fuel, throughput, and CO2 outcomes so the group team can decide which playbooks should become fleet standard and which should be rolled back.
whyWeWin:
  - The wedge is downstream of the pilot but upstream of fleet standardization, which is where proven value most often stalls and where incumbent tools are weakest.
  - The product is complementary to APC, DCS, and historian vendors, letting the company sell faster by improving project success rather than demanding a control-stack replacement.
  - Cross-site transfer data, override causes, and realized-vs-modeled rollout results can compound into a proprietary benchmark moat that plant-level tools do not naturally see.
strategicChoices:
  beachhead: Multi-plant cement producers operating 5-30 clinker lines with at least one live AI or APC kiln deployment and a central process team trying to copy winning recipes across plants.
  wedgeRationale: This narrow entry point has a clear buyer, a visible post-pilot trigger, and measurable proof in rollout speed, override rates, and realized savings; serving all continuous-process industries first would dilute credibility and slow the first reference account.
  sequencingRationale: Start with historian-first, read-only governance for one cement workflow so the company can prove trust and conversion from pilot to second plant before adding deeper integrations, partner channels, and adjacent-industry expansion.
  notYet:
    - Direct write-back into DCS or APC systems in the first product generation
    - New-build greenfield plants where incumbent automation projects already define the stack
    - Steel, glass, and chemicals expansion before 2-3 cement groups are live in production
    - Generic industrial analytics or sustainability reporting outside rollout governance
market:
  tam: "~$96.0M modeled TAM based on roughly 320 eligible cement plants across Europe, the U.S., and large Indian groups at about $300k annual ACV per managed plant."
  sam: "~$27.0M modeled SAM based on roughly 90 near-term addressable plants inside multi-plant groups already pushing APC modernization, alternative fuels, or decarbonization programs."
  som: "~$4.5M year-3 SOM based on 15 managed plants across 3-5 producer groups if early pilots convert into multi-site rollouts."
  segments:
    - "Primary: Multi-plant cement producers with 5-30 clinker lines and at least one live AI/APC kiln deployment"
    - "Secondary: Cement groups actively rolling out alternative-fuel, clinker-factor, or decarbonization programs across multiple plants"
  buyingProcess: >-
    The motion usually starts when a successful pilot, fuel-price shock, or
    alternative-fuel rollout creates pressure to copy a winning operating
    recipe to the next plant without hurting quality or uptime. A group process
    leader sponsors the pilot, the VP of Manufacturing Excellence or Group Head
    of Process Performance owns budget, and plant managers plus IT/OT security
    reviewers gate production rollout on auditability, read-only deployment,
    and operator acceptance.
product:
  mvp: >-
    MVP is a historian-first rollout workspace for one cement producer group.
    It should version recipes and setpoint packages, run preflight checks
    against historian data and plant constraints, route approvals, generate
    shift-ready handover instructions, and log overrides plus realized-vs-modeled
    outcomes without requiring direct control-system write-back.
  sixMonth: Sign 2 design partners, ship read-only historian ingestion plus recipe versioning and approval workflows, and prove one pilot can move from a successful reference plant to a second plant with a clear audit trail.
  twelveMonth: Convert 2-3 producer groups into paid production accounts, add cross-site benchmarking and structured override taxonomy, and standardize deployment playbooks across mixed historian environments.
  twentyFourMonth: Become the system of record for fleet rollout governance in cement, then expand the same workflow spine into one adjacent continuous-process sector with similar buyer motion and historian access.
  keyBets:
    - Buyers will purchase deployment governance as a standalone workflow layer instead of waiting for APC vendors to bundle it.
    - Read-only historian data and exported lab or quality inputs are sufficient for a credible preflight check before deeper OT integration.
    - Operator trust improves when preflight assumptions, approvals, and override reasons are explicit rather than buried in plant-side notes.
    - One successful second-plant rollout inside an account creates a strong expansion path across the rest of the fleet.
gtm:
  wedge: Sell immediately after a first successful kiln-control pilot or alternative-fuel recipe change creates pressure to copy gains to the next plant without risking clinker quality, emissions, or uptime.
  channels:
    - Direct founder-led sales to group manufacturing-excellence and process-performance leaders
    - Co-sell or referral partnerships with APC and automation vendors that want higher rollout success across customer fleets
    - Historian, analytics, and industrial integrator referrals that shorten time to read-only data access
  funnelTargets: "Discovery→qualified pilot 20-30%, qualified pilot→paid pilot 30-40%, pilot→production 50%+, production→second managed plant within 6 months in 60%+ of converted accounts."
  pricing: Charge a paid pilot for one plant or line, then annual subscription priced by active clinker line under managed rollout with onboarding fees and premium cross-site benchmarking; this matches a buyer who feels value every time a proven recipe is standardized across one more line faster than the manual process.
businessModel:
  revenueStreams:
    - Annual platform subscription for governed rollout workflows
    - Paid onboarding and site-normalization services for historian, quality, and approval setup
    - Premium analytics modules for cross-site benchmarking and operator-override intelligence
  unitOfValue: Active clinker line managed through a governed rollout workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more clinker lines and plants within the same producer group after the first successful rollout
    - Expand from rollout approvals into benchmarking, exception analysis, and recipe transfer recommendations
    - Enter one adjacent continuous-process sector after cement proof points are referenceable
strategyMap:
  northStarMetric: Production clinker lines running a standardized recipe that achieve target savings and CO2 outcomes without elevated override rates
  inputMetrics:
    - Days from approved pilot result to next-plant production rollout
    - Pilot-to-production conversion rate
    - Override rate in the first 30 days after rollout
    - Realized-vs-modeled fuel savings by managed line
    - Managed clinker lines per production account
  moatsToBuild:
    - Cross-site library of recipe transfer patterns by fuel mix, kiln archetype, and operating envelope
    - Override-cause dataset linking operator behavior to rollout assumptions and plant context
    - Procurement-safe governance layer with audit trails, approvals, and historian-linked evidence across fleets
  killCriteria:
    - Fewer than 2 of the first 6 paid pilots convert to production within 12 months
    - Median time from pilot-proven recipe to second-plant rollout stays above 8 weeks after implementation
    - More than 40% of production rollouts require bespoke engineering work that prevents gross margin from trending toward 70%
  mermaid: |
    flowchart LR
      Wedge[Beachhead wedge] --> MVP[MVP]
      MVP --> Proof[Proof points]
      Proof --> Expansion[Expansion motion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Promising narrow wedge with real customer timing, but conviction depends on proving buyers will fund a standalone governance layer and not treat it as APC services.
    whyBelieve: Named live deployments, large per-plant economics, and explicit manual-rollout bottlenecks support a credible product wedge after single-plant AI control succeeds.
    whyDoubt: The initial market is concentrated and conservative, and incumbent APC or automation vendors could absorb enough workflow to compress the startup's standalone value.
    nextDiligence: Validate 10-15 target producer groups, secure 2 paid pilots, and prove at least one pilot expands from the reference plant to a second plant within 6 months.
  firstCustomer:
    title: Group process excellence leader at a regional cement producer
    profile: A producer with 5-15 clinker lines, one successful kiln-control pilot, mixed historian environments, and a central team tasked with standardizing fuel and emissions gains before the next operating plan.
    trigger: A first successful AI/APC pilot or alternative-fuel transition creates pressure to roll a new recipe across the fleet without harming quality or uptime.
    buyer: VP Manufacturing Excellence or Group Head of Process Performance
    initialContract: "$75k-$150k paid pilot for one plant or line, converting to roughly $250k-$500k annual production spend as 3-5 clinker lines move under governed rollout."
  mustBeTrue:
    - At least half of qualified target groups already run AI or APC on one kiln but still use spreadsheets, email, or manual handovers for cross-site rollout.
    - Read-only historian and quality data are sufficient to generate a preflight workflow that operators and plant managers trust for second-plant rollout decisions.
    - Buyers will fund a standalone rollout-governance layer from manufacturing-excellence or energy-performance budgets rather than insist it be bundled into APC contracts.
    - One successful production deployment expands to at least one additional plant or line within 6 months, proving account-level land-and-expand economics.
    - APC and automation incumbents do not ship equivalent vendor-neutral approvals, handovers, and override analytics fast enough to erase the wedge in the first 24 months.
  diligenceQuestions:
    - How many multi-plant cement groups already have one live AI/APC kiln but no repeatable fleet rollout workflow?
    - Which team actually owns budget when a pilot needs to move from one plant to the next: manufacturing excellence, process engineering, plant operations, or procurement?
    - What minimum historian, lab, and quality data are required to make a second-plant preflight trustworthy?
    - Why will a customer buy this layer instead of extending APC vendor services or using a systems integrator?
    - Which adjacent sector after cement has the closest buying trigger and lowest data-integration burden?
operatingAssumptions:
  - assumption: The near-term reachable market really includes about 90 plants where AI/APC value is proven enough that rollout governance is the next budget line.
    basis: research.yaml
    validationTest: Interview 20 producer groups and qualify at least 10 against live pilot status, multi-plant footprint, and planned rollout activity inside the next 12 months.
    decisionImpact: If false, narrow the beachhead to one region or one alternative-fuels-heavy subsegment and slow GTM hiring.
  - assumption: Read-only historian ingestion plus exported quality and recipe data can deliver first value without direct OT write-back.
    basis: research.yaml
    validationTest: Complete 3 design-partner implementations with usable preflight checks in 6 weeks or less and no direct DCS integration.
    decisionImpact: If false, engineering must prioritize deeper integrations earlier, raising implementation cost and delaying sales efficiency.
  - assumption: Economic buyers will approve a standalone governance budget because the spend is small relative to plant-level savings.
    basis: research.yaml
    validationTest: Test pricing and budget ownership in 8-10 procurement and manufacturing-excellence conversations tied to recent pilot or rollout events.
    decisionImpact: If false, the company must shift toward partner-led resale or services-heavy packaging, weakening margin and control of the customer relationship.
  - assumption: Operators will trust a human-in-the-loop rollout workflow if approvals, preflight assumptions, and override capture are explicit.
    basis: idea.yaml
    validationTest: Run pilot retrospectives with plant managers and control-room leads and keep opt-out or hard-override rates below 25% during the first 30 rollout days.
    decisionImpact: If false, the product must emphasize documentation and postmortem analytics first rather than active rollout governance.
  - assumption: Cement proof points will transfer into at least one adjacent continuous-process industry without a full product rewrite.
    basis: operator judgment
    validationTest: After 2 production cement accounts, run 10 discovery calls in steel, glass, and chemicals and confirm one segment shares the same buyer, trigger, and data inputs.
    decisionImpact: If false, operate the company as a narrower cement software business and reduce platform-expansion hiring.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview group process leaders, plant managers, and APC project owners at 15 target cement groups.
    hypothesis: The company can find enough post-pilot rollout pain to support an event-driven paid pilot motion.
    successMetric: At least 10 interviews document a recent recipe rollout that took more than 2 weeks or was delayed by approvals, handovers, or operator pushback.
    owner: CEO
  - horizon: 0–90 days
    experiment: Deliver a concierge preflight workflow for one design partner using historian exports, recipe diffs, and manual approval routing.
    hypothesis: Buyers will pay for governed rollout before demanding full automation or write-back integration.
    successMetric: Two prospects agree to paid pilot scope or LOIs after reviewing the workflow output on a real rollout case.
    owner: Founding engineer
  - horizon: 90–180 days
    experiment: Productize recipe versioning, role-based approvals, and shift handover generation for the first pilot account.
    hypothesis: Workflow discipline, not control-model novelty, is the minimum lovable product.
    successMetric: One pilot account uses the product as the primary approval record for a real second-plant rollout.
    owner: Product lead
  - horizon: 90–180 days
    experiment: Run OT security and plant-change reviews using read-only deployment, audit logs, and no direct control-system write-back.
    hypothesis: Security and reliability objections can be cleared without deep OT integration in phase one.
    successMetric: Three pilot sites clear review with the same baseline control package and no custom security architecture.
    owner: Platform lead
  - horizon: 6–12 months
    experiment: Formalize one co-sell or referral partnership with an APC vendor, historian vendor, or industrial integrator.
    hypothesis: Partner-assisted selling lowers trust friction because the startup is framed as the rollout-success layer.
    successMetric: One partner-sourced pilot launches with lower time-to-close than founder-sourced pilots.
    owner: CEO
  - horizon: 6–12 months
    experiment: Drive second-line or second-plant expansion inside the first production accounts.
    hypothesis: Land-and-expand inside one group is cheaper and faster than winning a new logo once one rollout succeeds.
    successMetric: At least 60% of production accounts add another managed line or plant within 6 months of go-live.
    owner: Account lead
operations:
  - Maintain secure historian and spreadsheet-ingestion workflows with clear data-retention and access controls.
  - Run a controlled library of recipe versions, preflight rules, approval templates, and shift handover formats by plant archetype.
  - Instrument every rollout for time-to-approval, override reasons, time-to-stability, and realized-vs-modeled savings.
  - Maintain OT-review, security, and audit documentation that supports read-only deployment across conservative plants.
  - Build partner enablement for APC vendors, historians, and industrial integrators without giving away ownership of the workflow data.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build historian ingestion, recipe versioning, approvals, and override capture before the company broadens scope.
  - role: CEO
    startTiming: Month 0
    rationale: Own design-partner selling, partner development, and the credibility-heavy first procurement cycles.
  - role: Industrial solutions lead
    startTiming: Month 1
    rationale: Translate kiln operations, plant constraints, and shift workflows into repeatable rollout templates that buyers trust.
  - role: Product engineer
    startTiming: Month 3
    rationale: Turn concierge pilot workflows into repeatable product surfaces and customer-specific configuration that does not become custom software.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Reduce deployment friction across mixed historian environments and keep founders out of every implementation.
  - role: Enterprise account executive
    startTiming: Month 9
    rationale: Add scaled pipeline only after pilot packaging, pricing, and second-plant expansion are referenceable.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid design partners and complete at least 1 second-plant rollout through the product
      - Ship production-grade recipe versioning, approvals, shift handovers, and override analytics in a read-only deployment model
      - Convert at least 2 pilots into annual production contracts
      - Establish one ecosystem partnership that sources or accelerates qualified pilots
  - horizon: 12–24 months
    items:
      - Reach 6-8 production accounts or 12+ managed clinker lines across 3-5 cement groups
      - Prove repeat expansion from first plant to additional lines or plants inside most production accounts
      - Launch cross-site benchmarking and realized-vs-modeled savings reporting as premium modules
      - Select and test one adjacent continuous-process vertical using the same workflow core
  - horizon: 24–36 months
    items:
      - Reach or exceed the modeled 15 managed-plant SOM path or narrow the thesis based on observed conversion data
      - Become the default rollout system of record inside reference cement groups rather than a one-off pilot tool
      - Enter one adjacent sector with referenceable cement benchmarks and partner-led distribution
risks:
  - risk: APC, DCS, or automation incumbents block integrations or bundle enough rollout workflow to compress the wedge.
    likelihood: Medium
    impact: High
    mitigation: Stay vendor-neutral, lead with read-only historian access, and prove the product increases incumbent project success rather than replacing plant controls.
  - risk: Plant operators reject centrally governed recipes because local nuance is under-modeled.
    likelihood: High
    impact: High
    mitigation: Keep operators in approvals, expose preflight assumptions, and treat every override as structured product feedback rather than error noise.
  - risk: Mixed historian quality and heterogeneous plant data make deployments too services-heavy.
    likelihood: Medium
    impact: High
    mitigation: Standardize a minimum data schema, narrow the first ICP to plants with acceptable historian maturity, and delay deeper custom integrations.
  - risk: The beachhead is real but too narrow to support venture outcomes if adjacent sectors do not convert.
    likelihood: Medium
    impact: Medium
    mitigation: Measure account expansion early, validate the next vertical by month 18, and keep hiring disciplined until cross-sector transfer is proven.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-4M
  runwayMonths: 18
  useOfFundsSummary: Build the historian-first rollout-governance product, win 2-3 paid design partners, clear OT and security objections with a repeatable read-only architecture, and convert at least 2 accounts into production so the company can prove second-plant expansion before raising the next round.
