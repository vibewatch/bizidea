jobsToBeDone:
- job: 当中心工艺团队想把一套跑赢的窑炉控制配方从一个工厂复制到另一个工厂时，帮他们把这次变更安全验证并部署出去，这样他们就能拿到燃料和减排收益，又不必冒质量或开工率下滑的风险。
  currentAlternative: 工艺工程 playbook、电子表格，以及 APC 厂商的专业服务
  successMetric: 从试点结果获批到下一个工厂正式上线的天数
- job: 当工厂操作员人工接管新的 AI 驱动控制设定时，帮集团运营团队看清原因并调整 rollout 方案，这样他们既能守住信任，也能把真正有效的做法标准化。
  currentAlternative: 交接班记录、historian 截图，以及工厂之间的复盘电话
  successMetric: rollout 后的人工接管率，以及实际节省相对模型节省的兑现情况
