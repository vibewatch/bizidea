topRisks:
- name: 现有控制栈的阻力
  description: 如果 APC 厂商或 DCS 集成商把这层 rollout 软件视为竞争者，或者觉得它增加运营风险，就可能挡住接入。
  mitigation: 把产品定位成厂商中立的部署与证据层，先从只读 historian 集成开始，并证明它能让现有厂商的 rollout 更容易成功。
- name: 操作员信任缺口
  description: 如果软件像一个不理会现场工艺细节的黑箱，工厂团队可能会拒绝中心下发的控制变更。
  mitigation: 让操作员留在审批环里，把预飞检查解释清楚，并让每次人工接管都进入学习和对标闭环。
- name: 滩头市场过窄
  description: 水泥只是一个有限的起步市场，而漫长的企业销售周期可能拖慢早期增长。
  mitigation: 先在水泥里把切口打透，再在 rollout 治理模式跑通后快速扩到钢铁、玻璃和化工。
