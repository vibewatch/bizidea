problem: 多厂区水泥集团已经能在单座窑炉上证明 AI 控制有效，但要把这些设定值调整推广到各个存量工厂，至今还是一套靠人工推进、风险又高的流程。集团工艺团队用电子表格、historian 截图和交接班记录来管理配方变更、操作员审批、例外处理和质量护栏——这些工具从来不是为自主控制设计的。结果是上线速度慢、每次人工接管后信任感都会被磨掉，试点之后本该拿到的数百万美元燃料节省和减碳收益也被卡在原地。
targetUser:
  primary: 多厂区水泥生产商里的集团工艺卓越负责人和窑炉优化经理
  secondary: 负责熟料质量、燃料配比和产线开工率的工厂经理与控制室主管
  buyer: 区域性水泥集团的制造卓越副总裁或集团工艺绩效负责人
startupThesis:
  nonObviousInsight: 难题已经不是证明 AI 能提升窑炉表现；具名部署和已披露节省说明这一步正在变成现实。新的瓶颈是跨班次、跨工厂、跨运行边界的上线治理，因为存量重工业工厂至今还没有一套系统，能安全地下发控制变更、追踪人工接管，并证明哪套配方应该成为新的标准。
  beachhead: 运营 5–30 条熟料线、已经至少在一座窑炉上试点过 AI 或 APC、但新控制配方仍靠中心工程师和逐厂人工签字推进的多厂区水泥生产商
  wedge: 一套控制上线 OS：给窑炉配方和设定值变更做版本管理，结合 historian 数据模拟约束是否满足，路由审批，生成可直接交班使用的操作手册，并把每次人工接管追回到成本和 CO2 结果。
  whyNowCatalyst: Gigaton 的融资、具名上线部署、可观的单厂节省，以及其向相邻连续流程行业扩张的表态，都说明 AI 控制已经从概念走向 rollout，安全的部署治理因此突然变得紧迫。
  ventureScalePath: 先从水泥集团的窑炉控制 rollout 切入，再把同一套部署治理层扩到钢铁炉、玻璃产线和化工厂，最终成为工业 AI 运行边界、人工接管分析和跨站点绩效对标的系统记录层。
solution: 做一层部署软件，夹在 AI 控制厂商、APC 系统和工厂运营团队之间。产品接入 historian 数据、配方变更、质量约束和厂商建议的设定值调整后，先按每座工厂自己的运行边界做一轮预飞检查，再决定哪些变更能进控制室。它会给集团工艺负责人和工厂经理生成审批流，自动产出交接班指引，并把每次操作员人工接管都打上根因标签。上线之后，它再去衡量新配方到底有没有兑现预期的燃料、产量和排放结果，让集团团队决定哪套
  playbook 应该在全网标准化。首版部署坚持厂商中立、少 API 依赖，先从 historian、DCS 和电子表格导出开始，而不是要求客户把整套控制栈推倒重来。
goToMarketSeed:
  firstCustomer: 一家区域性水泥生产商：有 5–15 条熟料线，跑通过一次 AI 控制试点，还有一个中心工艺团队，正想在下一轮年度能耗与脱碳规划前把燃料配比优化标准化。
  buyingTrigger: 第一次试点跑通，或者燃料价格突然波动，会逼着集团运营负责人把新控制配方从一个工厂推到整个网络，同时又不能伤到质量和开工率。
  currentAlternative: APC 厂商服务、historian 仪表板、基于电子表格的上线清单、人工交接班，以及工艺工程咨询。
  switchingReason: 这个切口让买方能在不替换现有 DCS、historian 或 AI 优化厂商的前提下，把已经验证过的控制收益带到更多工厂，而且过程可审计、也更容易赢得操作员信任。
  pricingHypothesis: 按活跃熟料线或纳入托管 rollout 的工厂收取年度软件费；跨站点对标和操作员人工接管分析则作为高级模块单独收费。
