  validationPlan:
  - priority: high
    question: How many independent pediatric groups with 10-40 providers run compatible legacy stacks in the first ten target states?
    evidenceToGather: Build a state-by-state target account list with current EHR, payer mix, and clinic count.
  - priority: high
    question: What percent of well-child revenue leakage comes from missed screening, counseling, vaccine, and combo-visit codes in the beachhead segment?
    evidenceToGather: Run blinded coding audits with two pediatric billing partners across at least five groups.
  - priority: medium
    question: Which adolescent privacy and proxy-access workflows break when the product drafts notes or messages before clinician sign-off?
    evidenceToGather: Pilot consent and record-segmentation flows with one multi-site group in two states with different minor-consent rules.
