competitors:
- name: Develo
  stage: scale-up
  wedge: AI-native pediatric operating system combining clinical, billing, and family engagement workflows.
  pricing: Not public
  strength: Closest category narrative to an AI-native pediatric replacement and already cites multi-state provider adoption.
  weaknessVsUs: Replacement-heavy positioning can be slower to land than a narrower well-child interval wedge that overlays the existing stack first.
  sourceRefs:
  - 37
- name: PCC
  stage: incumbent
  wedge: Pediatric-native EHR, billing, and dashboard suite sold on an all-inclusive monthly fee.
  pricing: Flat monthly fee with $0 startup and $0 data conversion; exact dollar amount not public.
  strength: Deep pediatric workflow trust and broad support footprint in independent pediatrics.
  weaknessVsUs: Current public evidence emphasizes templates, support, and dashboards more than AI-native well-child orchestration.
  sourceRefs:
  - 23
  - 24
- name: Office Practicum
  stage: incumbent
  wedge: Pediatric-specific EHR with VacLogic, integrated screening, CHADIS connectivity, and pediatric RCM services.
  pricing: Quote-based software plus optional RCM services.
  strength: Best-in-class pediatric clinical and vaccine workflow depth, plus strong pediatric billing specialization.
  weaknessVsUs: Public positioning is workflow-rich but less clearly AI-native, leaving room for a tighter well-child automation layer.
  sourceRefs:
  - 28
  - 29
  - 39
- name: Elation Health
  stage: scale-up
  wedge: AI-forward primary-care EHR extending into pediatrics with ambient documentation and clinician-first UX.
  pricing: Quote-based; AI features included in platform positioning.
  strength: Strong evidence that AI documentation and pediatric workflows can improve clinician time and family experience.
  weaknessVsUs: Less pediatric-native workflow depth than specialty incumbents, especially around interval-specific recall and pediatric RCM nuance.
  sourceRefs:
  - 30
  - 31
- name: Phreesia
  stage: incumbent
  wedge: Intake, access, self-scheduling, and gap-closing overlay for existing pediatric stacks.
  pricing: Contract-based; public ROI framing rather than transparent list price.
  strength: Hard proof that digital outreach can reduce calls, rebook no-shows, and improve well-child quality metrics.
  weaknessVsUs: Strong before-and-between-visit tooling, but no clinical documentation or pediatric charge-capture brain.
  sourceRefs:
  - 32
  - 33
