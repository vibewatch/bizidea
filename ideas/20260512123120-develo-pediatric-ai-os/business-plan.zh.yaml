slug: well-child-interval-os
date: '2026-05-12'
executiveSummary: >-
  公司应以独立美国儿科诊所集团的定期体检周期协调叠加层为起点——这些集团已在现有儿科电子病历系统中运行病历，但仍跨多个独立工具和手工操作协调外联、登记、筛查、表格和费用捕获。首批目标客户是拥有 4–8 个院区的 15–30 名服务提供者集团，其中预防保健就诊占就诊量的大部分，且开学季、收入周期审查或新院区并购往往会暴露漏掉的就诊、不完整的准备和编码漏洞。切入点有意设计得很窄：短信优先的家庭外联、基于年龄的数字化登记和筛查、病历草稿，以及定期体检就诊的建议模式儿科费用捕获——不强制要求第一天就替换电子病历。这种节奏比销售完整儿科操作系统更容易证明价值，因为买家可以在同一个反复发生的工作流中衡量就诊准备率、召回逾期就诊数量、离诊时间和被接受的费用建议。GTM、产品和定价都应围绕同一套动作：为单个院区集群提供付费试点，当工作流展示出降低劳动力成本和提升收入的 ROI 后，转化为按服务提供者席位和定期体检量定价的年度合同。最强的战略优势不是通用 AI 病历记录，而是将 Bright Futures 节奏、疫苗就绪状态、筛查完成、家庭沟通和计费证据跨院区链接的儿科周期逻辑。当前主要待解问题是：首批目标州中兼容遗留系统的集中程度，以及在滩头客群中能回收多少编码漏洞——因此公司应在集成速度和计费信任在实际试点中得到验证后，再争取扩展机会。
problem:
  - 独立儿科诊所集团仍在割裂的电子病历、消息、登记、排班和计费工具之间开展定期体检就诊，员工手工追赶表格、筛查问卷、提醒和疫苗就绪状态。
  - 工作流碎片化降低了预防保健就诊完成率，拖慢了离诊流程，并在行政资源本就有限的诊所里造成儿科咨询、筛查和免疫相关费用的漏录。
solution:
  - 部署叠加优先的儿科工作流层：就诊前发送各年龄段登记和筛查问卷，标记逾期疫苗和缺失保险数据，将逾期患者归入优先级外联队列。
  - 就诊中及就诊后起草文档，整理常规表格，并在扩展至更广泛诊所工作流之前，建议与已记录的筛查、咨询和免疫事件挂钩的儿科费用捕获代码。
whyWeWin:
  - 产品端到端掌控定期体检周期，而现有厂商、通用 AI 病历助手和患者互动叠加工具各自只覆盖其中的片段。
  - 跨院区的就诊准备完成、召回响应和证据挂钩费用捕获数据，可积累成一套儿科运营基准和收入完整性护城河，难以被快速复制。
strategicChoices:
  beachhead: 拥有 3–10 个院区、10–40 名服务提供者、高定期体检就诊量、仍在使用遗留儿科电子病历加独立登记、消息和计费工具的独立美国儿科诊所集团。
  wedgeRationale: 这一细分市场在同一反复发生的工作流中承受劳动力负担和收入流失双重压力，因此一个窄定期体检叠加层能比销售宽泛儿科平台或独立病历助手更快地证明 ROI。
  sequencingRationale: 从单个院区集群的外联、登记、病历草稿和建议模式编码的只读模式起步；只有在公司验证了就诊准备提升和计费信任之后，才添加写回能力、多院区铺开和相邻工作流。
  notYet:
    - 全面儿科电子病历替换
    - 患病就诊分诊和下班后儿科护理工作流
    - 工作流关联消息以外的直接面向消费者的家庭 App
    - 治理和集成复杂度更高的大型医疗系统或 FQHC 推广
market:
  tam: 基于 51,081 个儿科基层医疗 NPI 和每位服务提供者席位约 $4,500 年度协调工具支出，TAM 估算约为 $229.9M。
  sam: 基于集中在目标多院区集团形态的私人诊所儿科服务提供者席位，SAM 估算约为 $29.1M。
  som: 基于约 40 个集团、每集团 20 名服务提供者、每席位约 $4,500 年度支出，第 3 年可及 SOM 约为 $3.6M。
  segments:
    - 拥有 3–10 个院区和 10–40 名服务提供者的独立美国儿科诊所集团
    - 儿科 MSO 和规模更大的多院区儿童基层医疗集团
  buyingProcess: >-
    冠军通常是 COO 或诊所运营主管，在收入审查、逾期就诊清单或人员短缺让定期体检工作流无法忽视之后介入。医生合伙人、CEO 或 COO 在院区集群试点展示出更高的就诊准备率、更干净的编码，以及对现有系统的低风险叠加部署后，完成签约。
product:
  mvp: >-
    MVP 是针对单个院区集群的只读定期体检工作流：发送短信优先的登记和发育筛查问卷，标记疫苗和保险缺口，起草就诊病历，并为临床医生或计费员审批提供证据挂钩的儿科编码建议。
  sixMonth: 上线两个生产试点，具备召回队列、基于年龄的登记、筛查跟踪、病历草稿、费用建议审核，以及覆盖就诊准备率、逾期就诊召回和离诊漏洞的仪表盘。
  twelveMonth: 为早期最常见的电子病历、诊所管理、消息和计费组合增加可复制的集成；引入选择性写回、基准报告和已审批工作流的多院区推广工具。
  twentyFourMonth: 在定期体检周期滩头可复制后，从定期体检周期协调扩展至相邻儿科工作流，如患病就诊登记、转诊协调、疫苗库存可见性和家庭留存营销。
  keyBets:
    - 如果试点同时改善劳动力效率和收入完整性，买家愿意为独立的工作流层付费。
    - 带证据挂钩审计回顾的建议模式编码，将比从第一天就自动化账单准备更快赢得信任。
    - 少量集成模式足以覆盖大多数早期滩头账户，避免以服务为主的高成本落地模式。
gtm:
  wedge: >-
    先销售付费院区集群试点，修复定期体检准备和编码漏洞，买家再考虑更广泛的操作系统故事——用可量化的召回、接诊效率和干净账单成果替代通用 AI 营销话术。
  channels:
    - 创始人主导，直接向多院区儿科集团的 COO、医生合伙人和诊所运营主管销售
    - 与已在审查漏单和拒付趋势的儿科计费和 RCM 机构联合销售和转介绍
    - 儿科专科协会、会议和运营商转介绍，Bright Futures、疫苗和筛查流利度是信任货币
  funnelTargets: "线索到合格试点 15–25%，合格试点到付费试点 40–60%，付费试点到生产 60%+，首个院区集群到集团全面推广 70%+（6 个月内）。"
  pricing: >-
    按服务提供者人数和每月定期体检量定价的年度订阅，加上工作流梳理和召回清单整理的一次性实施费用；这与买家围绕反复发生的预防保健工作量编制预算的方式一致，并将定价与产生劳动力和收入 ROI 的工作流绑定。
businessModel:
  revenueStreams:
    - 定期体检工作流管理年度软件订阅
    - 一次性实施和数据整理费用
    - 召回、接诊效率和收入完整性的高级分析和基准服务
  unitOfValue: 通过定期体检周期工作流管理的活跃服务提供者席位
  targetGrossMarginPct: 70
  expansionLevers:
    - 从单个院区集群扩展至同一儿科集团的所有院区
    - 在定期体检闭环获得信任后，添加相邻儿科工作流
    - 在核心工作流产品之上销售基准和收入完整性分析服务
strategyMap:
  northStarMetric: 生产院区集群上已完成且干净计费的定期体检就诊带来的月度毛利增量
  inputMetrics:
    - 就诊前筛查完成率
    - 完全准备好的定期体检就诊占比
    - 每月召回的逾期定期体检就诊数量
    - 编码建议接受率
    - 付费试点转生产合同的转化率
  moatsToBuild:
    - 链接年龄段、筛查状态、疫苗就绪状态、家庭外联、病历内容和收费结果的儿科周期图谱
    - 按院区、服务提供者、付款方结构和地域维度记录召回响应、就诊准备率和编码漏洞的基准数据集
    - 覆盖隐私分段、表格和预防保健逻辑的可复用州级感知工作流模板
  killCriteria:
    - 聚焦滩头销售 12 个月内签下的付费试点不足 3 个
    - 没有任何试点在不增加员工审核负担的前提下将就诊准备率或逾期就诊召回率提升至少 15%
    - 尽管有证据挂钩的审核工作流，编码建议接受率在试点 90 天后仍低于 60%
  mermaid: |
    flowchart LR
      Wedge[Well-child interval wedge] --> MVP[Read-first recall intake and coding MVP]
      MVP --> Proof[Prepared-visit and revenue proof points]
      Proof --> Expansion[Multi-workflow pediatric OS expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: 切入点和买家痛点都令人信服，但在公司证明可复制的集成速度和可量化的儿科费用捕获提升之前，信念值保持有限。
    whyBelieve: 公司盯准的是最高频率的儿科工作流，劳动力负担、家庭体验和收入漏洞在同一个运营审查里同时呈现。
    whyDoubt: 现有儿科电子病历、Develo、患者互动叠加工具和环境式 AI 厂商各自解决相邻片段，初创公司必须证明这一周期切入点本身就值得独立预算。
    nextDiligence: 验证一个实际试点，在使用现有系统的院区集群上展示更快的定期体检准备、召回逾期就诊和被接受的编码提升。
  firstCustomer:
    title: 15–30 名服务提供者的独立儿科诊所集团的 COO 或诊所运营主管
    profile: 一个 4–8 个院区的郊区或区域集团，定期体检就诊占总量三分之一以上，员工仍在独立的电子病历、消息和计费工具之间传递提醒、表格和代码。
    trigger: 开学季需求、新院区并购或收入周期审查暴露出逾期定期就诊、未完成筛查和漏掉的儿科计费代码。
    buyer: COO 或医生合伙人
    initialContract: 针对 1–2 个院区的 $20k–$40k 付费试点（90–120 天），在召回、登记和编码工作流上线后，转化为 15–30 名服务提供者集团约 $70k–$140k 的 ARR 年度合同。
  mustBeTrue:
    - 独立儿科诊所集团在准备好更换现有儿科电子病历之前，愿意为叠加式工作流产品付费。
    - 公司能够在定期体检中回收足够多的漏掉就诊或编码漏洞，以支撑模型测算水平的服务提供者席位定价。
    - 两到三种集成模式足以覆盖大多数早期账户，而不会让定制实施拖垮毛利。
    - 临床医生和计费员对建议模式的文档和编码足够信任，愿意在实际离诊工作流中使用。
    - 滩头在验证后能扩展至更广泛的儿科工作流，而不是停留在 ACV 有限的窄召回工具。
  diligenceQuestions:
    - 前 20 个目标账户中最常见的电子病历、诊所管理、消息和计费系统组合是哪些？
    - 滩头客群中，定期体检收入漏洞有多大比例来自漏掉的筛查、咨询、疫苗或联合就诊编码？
    - 试点能多快在就诊准备、逾期就诊召回或更干净的账单方面产生买家可见的 ROI？
    - 产品在与 Develo、PCC、Office Practicum 和 Phreesia 的实际评估中，哪些地方赢，哪些地方输？
    - 哪些州应该最先避免，因为青少年隐私或代理访问规则让部署难度显著增加？
operatingAssumptions:
  - assumption: 按服务提供者席位和定期体检量定价的模式能够通过预算审批，因为买家已在为减少劳动力和改善儿科收入完整性付费。
    basis: research.yaml
    validationTest: 至少签下 3 个付费试点，买家接受试点定价和记录清晰的接近模型服务提供者席位支出水平的年度转化路径。
    decisionImpact: 若假设不成立，定价必须转向以实施服务为主、更低 ACV 的软件，或付款方/RCM 合作伙伴的变现模式。
  - assumption: 建议模式编码和病历草稿将比自主化账单或文档工作流更快赢得信任。
    basis: idea.yaml
    validationTest: 在试点中，编码建议接受率达到至少 60%，且拒付率、返工量或临床医生投诉无明显增加。
    decisionImpact: 若假设不成立，路线图应降低费用捕获优先级，先聚焦外联、登记和基准分析。
  - assumption: 第一批集成组合足以覆盖滩头的大多数账户，使部署可复制。
    basis: research.yaml
    validationTest: 在前 15 个合格机会中构建目标账户系统矩阵，确认优先连接器覆盖至少 70% 的管道。
    decisionImpact: 若假设不成立，将滩头收窄至单一现有系统栈，或接受更慢的服务主导实施模式。
  - assumption: 当外联以短信优先且在就诊前发送时，家庭完成数字化筛查和登记的比例足够高。
    basis: research.yaml
    validationTest: 在试点中，在不提高爽约率或前台备用工作量的前提下，就诊前筛查完成率达到至少 50%。
    decisionImpact: 若假设不成立，公司必须将工作流重新设计为院内完成，并降低预期的劳动力节省效果。
  - assumption: 州级青少年隐私复杂性可通过优先进入低复杂度州来管理。
    basis: operator judgment
    validationTest: 梳理前 10 个目标州的代理访问和未成年人同意边界案例，确认至少 5 个州支持带有有限例外的标准上线策略。
    decisionImpact: 若假设不成立，推广节奏放慢，公司需要更早投入合规工程，并缩小地域覆盖范围。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 采访滩头细分市场中 15 位儿科 COO、诊所运营主管和 RCM 负责人。
    hypothesis: 当预防就诊缺口、人员短缺和编码漏洞在同一个运营审查中同时出现时，买家感受到最强烈的紧迫感。
    successMetric: 至少 10 次访谈确认同一购买触发模式，5 人同意分享当前工作流地图或 KPI 基线。
    owner: CEO
  - horizon: 0–90 天
    experiment: 与两家儿科 RCM 合作伙伴对 60–90 天的定期体检准备和计费数据进行审计。
    hypothesis: 漏掉的筛查、咨询、疫苗和联合就诊编码产生的可量化漏洞，足以支撑费用捕获切入点。
    successMetric: 5 个集团完成盲审，至少 3 个显示出可回收收入或高于支撑试点定价所需阈值的返工。
    owner: Product lead
  - horizon: 0–90 天
    experiment: 针对最常见的早期电子病历、消息和计费系统组合，构建一个实际的只读集成原型。
    hypothesis: 如果系统能可靠读取排班、外联状态、筛查完成情况和计费上下文，试点可以在无需全面写回的情况下启动。
    successMetric: 一个可运作的原型在共创客户环境中支持召回队列生成、诊前外联和证据挂钩编码建议。
    owner: Founding eng
  - horizon: 90–180 天
    experiment: 运行两个付费院区集群试点，每周进行 ROI 回顾和临床医生审批关口。
    hypothesis: 在一个预防季内，单个集群能展示就诊准备提升和被接受的编码改进。
    successMetric: 签下两个付费试点，至少一个在就诊准备率、逾期就诊召回或被接受的费用建议方面提升 15% 以上。
    owner: CEO
  - horizon: 90–180 天
    experiment: 测试仅按服务提供者席位定价与席位加定期体检量分层定价两种试点打包方式。
    hypothesis: 买家更倾向于与反复发生的预防保健工作量挂钩的定价，而非单纯的席位固定价格。
    successMetric: 5 位合格买家中有 3 位选择工作量挂钩模式，并接受清晰的试点转年度合同路径。
    owner: CEO
  - horizon: 180–360 天
    experiment: 利用首个试点案例研究，与一家儿科计费或工作流咨询机构启动一个转介绍渠道。
    hypothesis: 专科合作伙伴能缩短信任建立时间，并在首批直销胜利后创造合格管道。
    successMetric: 一个合作伙伴动作在 6 个月内产生至少 3 个合格机会或 1 个付费试点。
    owner: GTM lead
operations:
  - 在启用家庭消息或青少年工作流自动化之前，维护州级感知的同意、代理访问和记录分段策略。
  - 每周对就诊准备率、逾期召回转化、编码建议接受率和离诊异常运行院区记分卡。
  - 在承诺多州或多系统推广之前，将试点标准化为单个院区集群和一套已审批的系统栈。
  - 在审计表现稳定之前，保持临床医生和计费员在文档和编码的审批环节中的参与。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责集成层、工作流引擎和叠加优先切入点所需的产品可靠性。
  - role: 产品与实施负责人
    startTiming: Month 0
    rationale: 将儿科工作流复杂性转化为可复制的试点设计，并在自动化、信任与推广速度之间做取舍。
  - role: 方案工程师
    startTiming: Month 3
    rationale: 将系统特定的异常转化为可复用的集成和入驻手册，从而缩短部署时间。
  - role: 儿科 RCM 与临床信息化负责人
    startTiming: Month 6
    rationale: 强化费用捕获逻辑、审计就绪性，以及买家对文档和编码工作流的信任。
  - role: GTM 负责人
    startTiming: Month 9
    rationale: 仅在首批试点产生面向 COO 和医生合伙人销售的可复制 ROI 故事后加入。
milestones:
  - horizon: 0–12 个月
    items:
      - 在定义的滩头客群中签下 3 个付费试点
      - 上线第一套可复制的只读集成组合和一个选择性写回工作流
      - 发布一篇展示就诊准备率提升和可量化收入完整性改进的案例研究
      - 至少将 2 个试点转化为年度生产合同
  - horizon: 12–24 个月
    items:
      - 在现有客户内将院区集群试点扩展为更广泛的集团推广
      - 只有在核心定期体检闭环获得信任后，才添加基准报告和相邻工作流模块
      - 与至少 2 家儿科计费、RCM 或工作流咨询机构建立合作关系
      - 通过可复用实施手册大幅缩短部署时间
  - horizon: 24–36 个月
    items:
      - 接近年 3 约 40 个生产集团的 SOM 目标，或根据实际转化数据修订市场假设
      - 扩展至相邻儿科工作流，如患病就诊登记、转诊协调和家庭留存
      - 将产品确立为儿科运营和收入完整性层，而非单点召回工具
      - 决定公司应深化叠加模式还是迈向更完整的儿科操作系统
risks:
  - risk: 现有儿科电子病历、诊所管理、消息和计费系统的集成差异，可能使入驻过慢、服务成本过高。
    likelihood: High
    impact: High
    mitigation: 优先处理最常见的早期系统组合，先以只读模式上线，在可复制性建立之前避免承诺广泛的写回能力。
  - risk: 临床医生和计费员可能对 AI 生成的病历或费用建议信任不足，无法改变实际离诊行为。
    likelihood: High
    impact: High
    mitigation: 保持系统在建议模式，将每条建议与支撑证据关联，并每周与客户回顾结果。
  - risk: Develo、儿科电子病历现有厂商和互动叠加工具可能在经济价值显现后迅速扩张，压缩切入空间。
    likelihood: High
    impact: High
    mitigation: 先在最窄的周期工作流上取胜，再通过儿科基准数据和多系统协调积累差异化优势。
  - risk: 就诊前数字化登记和筛查的家庭完成率，可能因付款方结构或院区患者群而参差不齐。
    likelihood: Medium
    impact: Medium
    mitigation: 使用短信优先外联，保留院内备用方案，并按完成率模式分段工作流，而非假设全面数字化采用。
  - risk: 青少年隐私、代理访问和各州同意规则，可能延迟在某些地域或工作流的扩展。
    likelihood: Medium
    impact: High
    mitigation: 先按低复杂度州排序推广，并在扩展敏感工作流之前构建策略感知访问控制。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月资金覆盖第一批集成组合、3 个付费试点、审计级编码和隐私控制、早期实施和 RCM 人才，以及足够的验证数据——用于判断公司能否成为可复制的儿科工作流平台，而非仅仅是一个以服务为主的窄叠加层。
