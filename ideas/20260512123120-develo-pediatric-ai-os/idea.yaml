jobsToBeDone:
  - job: When tomorrow's well-child schedule has missing forms, overdue vaccines, and incomplete developmental screeners, help the practice prep each family automatically, so they can keep visits on time and capture complete documentation at checkout.
    currentAlternative: Staff phone calls, portal reminders, paper forms, and manual chart prep in the pediatric EMR
    successMetric: Percent of well visits arriving fully prepared and average checkout time per preventive appointment
  - job: When the group sees overdue annual visits and inconsistent preventive revenue across clinics, help operators recapture families and standardize coding, so they can grow same-store visit volume without hiring more coordinators.
    currentAlternative: Spreadsheet recall lists, generic bulk texting tools, and retrospective billing audits
    successMetric: Well-child completion rate, recovered overdue visits, and pediatric charge capture per provider
