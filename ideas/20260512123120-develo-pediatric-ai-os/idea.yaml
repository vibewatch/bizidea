topRisks:
  - name: Integration drag
    description: Pediatric groups often run idiosyncratic EMR, practice-management, and messaging combinations that can slow onboarding and dilute early ROI.
    mitigation: Start with the most common pediatric system combinations and offer a read-only rollout focused on recall, intake, and coding recommendations before deeper write-back.
  - name: Clinical and billing trust gap
    description: Providers and billers may resist AI-generated documentation or coding suggestions if they fear compliance errors or extra review burden.
    mitigation: Keep clinicians in the approval loop, launch with recommendation mode, and tie adoption to measurable improvements in prepared visits, same-day completion, and claim cleanliness.
  - name: Full-stack incumbent squeeze
    description: Pediatric EMR vendors or emerging AI-native pediatric platforms could broaden into the same workflow once the economics become obvious.
    mitigation: Win on the narrowest, highest-frequency well-child workflow first, then compound advantage through pediatric-specific benchmark data and multi-system orchestration incumbents do not natively control.
