problem: >-
  Independent pediatric groups live or die on recurring well-child visits, but staff still coordinate age-specific intake,
  developmental screeners, vaccine readiness, family reminders, school and camp forms, and billing across disconnected
  EMR, messaging, scheduling, and RCM tools. Families arrive with incomplete paperwork, clinicians finish documentation
  after hours, and billers miss pediatric counseling, screening, and vaccine-administration charges because the workflow
  breaks across systems. The result is lower preventive visit capture, slower checkout, and avoidable revenue leakage in
  practices that already run on thin administrative capacity.
targetUser:
  primary: COO or practice administrator at an independent U.S. pediatric group with 3-10 clinics and 10-40 providers
  secondary: Revenue cycle manager or front-office operations lead responsible for visit prep and checkout throughput
  buyer: CEO, COO, or physician-owner
startupThesis:
  nonObviousInsight: >-
    The first breakout pediatric AI companies will not win by replacing note-taking alone; they will own the well-child
    interval, where family engagement, age-specific clinical prep, and pediatric billing all collide. What changed is that
    FHIR-native interoperability plus AI scribes and charge capture now make it possible to sit across legacy pediatric
    systems, while fresh capital and multi-state adoption prove practices are finally willing to buy specialty-specific
    workflow replacement.
  beachhead: >-
    Independent U.S. pediatric groups with 3-10 clinics, 10-40 providers, and high well-child volume that still run
    preventive visits through a legacy pediatric EMR plus separate intake, texting, and billing tools
  wedge: >-
    A well-child interval orchestration layer that generates age-specific family intake and screeners, predicts vaccines
    due, drafts visit documentation, and auto-suggests pediatric charge capture before checkout
  whyNowCatalyst: >-
    Develo's financing and reported multi-state adoption show pediatric practices are ready to buy specialty-specific
    operating software now, and FHIR-native interoperability with embedded scribes and charge capture makes deployment
    possible without a risky full-stack migration on day one.
  ventureScalePath: >-
    Start with preventive visit orchestration and revenue integrity, then expand into sick-visit intake, vaccine
    inventory, referral coordination, family retention campaigns, multi-location scheduling, and eventually a full
    pediatric practice operating system.
solution: >-
  The product connects to the pediatric EMR, practice-management system, billing stack, and family messaging tools to
  create a single longitudinal workflow for every child due for a well visit. Before the appointment, it sends the right
  age-specific forms and screeners, flags overdue vaccines or missing insurance data, and automatically recaptures missed
  or overdue visits into high-yield outreach queues. During the visit, it drafts the note, assembles school and camp
  paperwork, and recommends pediatric codes tied to documented counseling, screenings, and immunization events. After the
  visit, it routes families into follow-up messaging while giving managers a dashboard for recall gaps, checkout delays,
  and coding leakage by provider and location. The initial release is narrow and measurable: faster well-child prep,
  higher completion rates, and cleaner pediatric charge capture without forcing an immediate EMR rip-and-replace.
goToMarketSeed:
  firstCustomer: >-
    A 15-30 provider independent pediatric group with 4-8 suburban clinics, more than one-third of visits coming from
    well-child care, and staff still moving forms, reminders, and codes between separate EMR, intake, texting, and
    billing tools
  buyingTrigger: >-
    Back-to-school season, a drop in preventive visit completion, a new clinic acquisition, or a revenue-cycle review
    that exposes missed screenings and charge leakage creates urgency to fix the workflow before adding more headcount
  currentAlternative: >-
    Legacy pediatric EMR and practice-management software, separate intake and family-messaging point solutions,
    outsourced billing support, and manual staff phone calls and form chasing
  switchingReason: >-
    This wedge improves both family experience and revenue integrity in the highest-frequency pediatric workflow, while
    the status quo forces staff to swivel between tools and still misses visits, forms, and charges
  pricingHypothesis: >-
    Annual SaaS subscription priced by provider count and monthly well-child visit volume, plus implementation fees for
    workflow mapping and historical recall-list cleanup
