slug: well-child-interval-os
date: '2026-05-12'
executiveSummary: >-
  This company should start as a well-child interval orchestration overlay for
  independent U.S. pediatric groups that already run the chart in incumbent
  pediatric EHRs but still coordinate outreach, intake, screeners, forms, and
  charge capture across separate tools and manual work. The first customer is a
  15-30 provider group with 4-8 clinics where preventive visits are a large
  share of volume and back-to-school season, a revenue-cycle review, or a clinic
  acquisition exposes missed visits, incomplete prep, and coding leakage. The
  beachhead wedge is deliberately narrow: text-first family outreach, age-based
  digital intake and screening, note draft, and recommendation-mode pediatric
  charge capture for well visits, without forcing a day-one EMR replacement.
  This sequencing is faster to prove than a full pediatric operating system
  because buyers can measure prepared-visit rate, recovered overdue visits,
  checkout time, and accepted charge suggestions inside one recurring workflow.
  Go-to-market, product, and pricing should stay coupled around that same motion:
  a paid pilot for one clinic cluster, then an annual contract priced by provider
  seats and well-child volume once the workflow shows labor and revenue ROI. The
  strongest strategic advantage is not generic AI note-taking; it is pediatric
  interval logic that links Bright Futures cadence, vaccine readiness, screening
  completion, family communication, and billing evidence across sites. The main
  open questions are how concentrated compatible legacy stacks are in the first
  target states and how much charge leakage can be recovered in the beachhead
  segment, so the company should earn expansion only after integration speed and
  billing trust are proven in live pilots.
problem:
  - Independent pediatric groups still run well-child visits across disconnected EMR, messaging, intake, scheduling, and billing tools, so staff chase forms, screeners, reminders, and vaccine readiness manually.
  - That workflow fragmentation lowers preventive visit completion, slows checkout, and causes missed pediatric counseling, screening, and immunization-related charges in practices with little spare admin capacity.
solution:
  - Deploy an overlay-first pediatric workflow layer that sends age-specific intake and screeners before the visit, flags overdue vaccines and missing insurance data, and recaptures overdue patients into prioritized outreach queues.
  - During and after the visit, draft documentation, assemble routine forms, and suggest pediatric charge capture tied to documented screenings, counseling, and immunization events before expansion into broader practice workflows.
whyWeWin:
  - The product owns the well-child interval end to end, which incumbents, generic AI scribes, and patient-engagement overlays each address only in fragments.
  - Cross-clinic data on prep completion, recall response, and evidence-linked charge capture can compound into a pediatric operations benchmark and revenue-integrity moat that is hard to reproduce quickly.
strategicChoices:
  beachhead: Independent U.S. pediatric groups with 3-10 clinics, 10-40 providers, and high well-child volume that still run a legacy pediatric EHR plus separate intake, texting, and billing tools.
  wedgeRationale: This segment feels labor burden and revenue leakage in the same recurring workflow, so a narrow well-child overlay can show ROI faster than selling a broad pediatric platform or a standalone scribe.
  sequencingRationale: Start read-first on outreach, intake, note draft, and recommendation-mode coding for one clinic cluster; add write-back, multi-site rollout, and adjacent workflows only after the company proves prepared-visit lift and billing trust.
  notYet:
    - Full pediatric EMR replacement
    - Sick-visit triage and after-hours pediatric care workflows
    - Direct-to-consumer family app beyond workflow-linked messaging
    - Large health systems or FQHC rollouts with heavier governance and integration complexity
market:
  tam: $229.9M estimated TAM based on 51,081 pediatric primary-care NPIs and roughly $4,500 annual orchestration spend per provider seat.
  sam: $29.1M estimated SAM based on private-practice pediatric seats concentrated in the target multi-site group shape.
  som: $3.6M reachable year-3 SOM based on about 40 groups with 20 providers each at roughly $4,500 annual spend per provider seat.
  segments:
    - Independent U.S. pediatric groups with 3-10 clinics and 10-40 providers
    - Pediatric MSOs and larger multi-site children's primary care groups
  buyingProcess: >-
    The champion is usually the COO or practice administrator after revenue
    reviews, overdue-visit lists, or staffing strain make the well-child
    workflow impossible to ignore. The physician-owner, CEO, or COO signs once a
    clinic-cluster pilot shows better prepared-visit rates, cleaner coding, and
    low-risk overlay deployment on top of the incumbent stack.
product:
  mvp: >-
    MVP is a read-first well-child workflow for one clinic cluster that sends
    text-first intake and developmental screeners, flags vaccine and insurance
    gaps, drafts visit notes, and provides evidence-linked pediatric coding
    recommendations for clinician or biller approval.
  sixMonth: Ship two production pilots with recall queues, age-based intake, screener tracking, note draft, charge-suggestion review, and dashboards for prepared visits, overdue visit recovery, and checkout leakage.
  twelveMonth: Add repeatable integrations for the top early EHR, PM, messaging, and billing combinations; introduce selective write-back, benchmark reporting, and multi-clinic rollout tooling for approved workflows.
  twentyFourMonth: Expand from well-child interval orchestration into adjacent pediatric workflows such as sick-visit intake, referral coordination, vaccine inventory visibility, and family retention campaigns once the beachhead is repeatable.
  keyBets:
    - Buyers will fund a separate workflow layer if it improves both labor efficiency and revenue integrity in the same well-child pilot.
    - Recommendation-mode coding with evidence-linked audit review will build trust faster than trying to automate claim prep from day one.
    - A small number of integration patterns can cover most early beachhead accounts well enough to avoid a services-heavy rollout model.
gtm:
  wedge: >-
    Sell a paid clinic-cluster pilot that fixes well-child prep and charge
    leakage before buyers consider any broader operating-system story, using
    measurable recall, throughput, and clean-claim outcomes instead of generic
    AI positioning.
  channels:
    - Founder-led direct sales to COOs, physician-owners, and practice administrators at multi-site pediatric groups
    - Co-sell and referral motion with pediatric billing and RCM firms already reviewing missed charges and denial trends
    - Pediatric specialty associations, conferences, and operator referrals where Bright Futures, vaccine, and screener fluency matter
  funnelTargets: "Lead to qualified pilot 15-25%, qualified pilot to paid pilot 40-60%, paid pilot to production 60%+, first clinic-cluster to group rollout 70%+ within 6 months."
  pricing: >-
    Annual subscription priced by provider count and monthly well-child volume,
    plus one-time implementation for workflow mapping and recall-list cleanup;
    this matches how buyers budget around recurring preventive workload and ties
    pricing to the workflow creating staffing and revenue ROI.
businessModel:
  revenueStreams:
    - Annual software subscription for well-child workflow management
    - One-time implementation and data cleanup fees
    - Premium analytics and benchmarking for recall, throughput, and revenue integrity
  unitOfValue: Active provider seat managed through the well-child interval workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one clinic cluster to all clinics in the same pediatric group
    - Add adjacent pediatric workflows after the well-child loop is trusted
    - Sell benchmark and revenue-integrity analytics on top of the core workflow product
strategyMap:
  northStarMetric: Monthly gross profit lift from completed and cleanly billed well-child visits on live clinic clusters
  inputMetrics:
    - Pre-visit screener completion rate
    - Percent of well visits arriving fully prepared
    - Recovered overdue well-child visits per month
    - Coding recommendation acceptance rate
    - Paid pilot to production conversion rate
  moatsToBuild:
    - Pediatric interval graph linking age band, screening status, vaccine readiness, family outreach, note content, and charge outcomes
    - Benchmark dataset on recall response, prepared-visit rate, and coding leakage by clinic, provider, payer mix, and geography
    - Reusable state-aware workflow templates for privacy segmentation, forms, and preventive care logic
  killCriteria:
    - Fewer than 3 paid pilots signed within 12 months of focused selling into the beachhead
    - No pilot improves prepared-visit rate or recovered overdue visits by at least 15% without increasing staff review burden
    - Coding recommendation acceptance remains below 60% after 90 days in pilot despite evidence-linked review workflows
  mermaid: |
    flowchart LR
      Wedge[Well-child interval wedge] --> MVP[Read-first recall intake and coding MVP]
      MVP --> Proof[Prepared-visit and revenue proof points]
      Proof --> Expansion[Multi-workflow pediatric OS expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Compelling wedge and credible buyer pain, but conviction stays limited until the company proves repeatable integration speed and measurable pediatric charge-capture uplift.
    whyBelieve: The company targets the highest-frequency pediatric workflow where labor burden, family experience, and revenue leakage already sit in one operating review.
    whyDoubt: Incumbent pediatric EHRs, Develo, patient-engagement overlays, and ambient AI vendors all solve adjacent pieces, so the startup must prove that the interval wedge is budget-worthy on its own.
    nextDiligence: Validate one live pilot showing faster well-child prep, recovered overdue visits, and accepted coding uplift on a clinic cluster using the incumbent stack.
  firstCustomer:
    title: COO or practice administrator at a 15-30 provider independent pediatric group
    profile: A 4-8 clinic suburban or regional group where well-child care is more than one-third of visits and staff still move reminders, forms, and codes across separate EMR, texting, and billing tools.
    trigger: Back-to-school demand, an acquisition, or a revenue-cycle review exposes overdue well visits, incomplete screeners, and missed pediatric charges.
    buyer: COO or physician-owner
    initialContract: $20k-$40k paid pilot for 1-2 clinics over 90-120 days, converting to roughly $70k-$140k ARR for a 15-30 provider group once recall, intake, and coding workflows are live.
  mustBeTrue:
    - Independent pediatric groups will pay for an overlay workflow product before they are ready to rip out the incumbent pediatric EHR.
    - The company can recover enough missed visits or charge leakage in well-child care to justify provider-seat pricing around the modeled spend level.
    - Two to three integration patterns cover most early accounts without custom implementation destroying margins.
    - Clinicians and billers trust recommendation-mode documentation and coding enough to use the product in live checkout workflows.
    - The beachhead can expand into broader pediatric workflows after proof, rather than remaining a narrow recall tool with limited ACV.
  diligenceQuestions:
    - Which EHR, PM, messaging, and billing stacks appear most often in the first 20 target accounts?
    - What percentage of well-child revenue leakage in the beachhead comes from missed screeners, counseling, vaccine, or combo-visit coding?
    - How quickly can a pilot produce buyer-visible ROI in prepared visits, overdue-visit recovery, or cleaner claims?
    - Where does the product win or lose against Develo, PCC, Office Practicum, and Phreesia in live evaluations?
    - Which states should the company avoid first because adolescent privacy or proxy-access rules make deployment materially harder?
operatingAssumptions:
  - assumption: A provider-seat and well-child-volume pricing model can clear budget because buyers already spend to remove labor and improve pediatric revenue integrity.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots where buyers accept pilot pricing and a documented annual conversion path near the modeled provider-seat spend.
    decisionImpact: If false, pricing must shift toward implementation-heavy services, lower ACV software, or payer or RCM-partner monetization.
  - assumption: Recommendation-mode coding and note draft will gain trust faster than autonomous claim or documentation workflows.
    basis: idea.yaml
    validationTest: In pilot, achieve at least 60% acceptance of coding recommendations with no material increase in denials, rework, or clinician complaints.
    decisionImpact: If false, the roadmap should de-emphasize charge capture and focus first on outreach, intake, and benchmarking.
  - assumption: The first integration set can cover enough of the beachhead to keep deployment repeatable.
    basis: research.yaml
    validationTest: Build a target-account stack matrix across the first 15 qualified opportunities and confirm the prioritized connectors cover at least 70% of pipeline.
    decisionImpact: If false, narrow the beachhead to one incumbent stack or accept a slower services-led implementation model.
  - assumption: Families will complete digital screeners and intake at a high enough rate when outreach is text-first and sent before the visit.
    basis: research.yaml
    validationTest: In pilot, reach at least 50% pre-visit screener completion without raising no-show rates or front-desk fallback workload.
    decisionImpact: If false, the company must redesign the workflow around in-office completion and lower the expected labor-savings case.
  - assumption: State-level adolescent privacy complexity can be managed by sequencing initial sales into lower-complexity states first.
    basis: operator judgment
    validationTest: Map the first 10 target states for proxy-access and minor-consent edge cases and confirm at least 5 support a standard launch policy with limited exceptions.
    decisionImpact: If false, rollout pace slows and the company needs earlier investment in compliance engineering and narrower geographic focus.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 pediatric COOs, practice administrators, and RCM leads in the beachhead segment.
    hypothesis: Buyers feel the strongest urgency when preventive visit shortfalls, staffing strain, and coding leakage show up together in one operating review.
    successMetric: At least 10 interviews confirm the same buying trigger pattern and 5 agree to share current-state workflow maps or KPI baselines.
    owner: CEO
  - horizon: 0–90 days
    experiment: Audit 60-90 days of well-child prep and billing data with two pediatric RCM partners.
    hypothesis: Missed screeners, counseling, vaccine, and combo-visit coding create enough measurable leakage to support a charge-capture wedge.
    successMetric: Five groups complete blinded audits and at least 3 show recoverable revenue or rework above the threshold needed to support pilot pricing.
    owner: Product lead
  - horizon: 0–90 days
    experiment: Build one live read-first integration prototype across the most common early EHR, messaging, and billing stack.
    hypothesis: A useful pilot can launch without full write-back if the system can read schedules, outreach status, screening completion, and billing context reliably.
    successMetric: One working prototype supports recall queue generation, pre-visit outreach, and evidence-linked coding recommendations in a design-partner environment.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run two paid clinic-cluster pilots with weekly ROI reviews and clinician approval gates.
    hypothesis: One cluster can show prepared-visit lift and accepted coding improvement within one preventive season.
    successMetric: Two paid pilots signed and at least one shows 15%+ improvement in prepared visits, overdue-visit recovery, or accepted charge suggestions.
    owner: CEO
  - horizon: 90–180 days
    experiment: Test pilot packaging and annual pricing with provider-seat only versus provider-seat plus well-child-volume tiers.
    hypothesis: Buyers will prefer pricing tied to recurring preventive workload rather than flat seat pricing alone.
    successMetric: Three of five qualified buyers select the workload-linked model and accept a clear pilot-to-annual conversion path.
    owner: CEO
  - horizon: 180–360 days
    experiment: Launch one referral channel with a pediatric billing or workflow consultancy using the first pilot case study.
    hypothesis: Specialist partners can lower trust-building time and create qualified pipeline after the first direct wins.
    successMetric: One partner motion produces at least 3 qualified opportunities or 1 paid pilot within 6 months.
    owner: GTM lead
operations:
  - Maintain state-aware consent, proxy-access, and record-segmentation policies before enabling family messaging or adolescent workflow automation.
  - Run weekly clinic scorecards on prepared visits, overdue recall conversion, coding recommendation acceptance, and checkout exceptions.
  - Standardize pilots around one clinic cluster and one approved stack before promising multi-state or multi-stack rollouts.
  - Keep clinicians and billers in the approval loop for documentation and coding until audit performance is stable.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns the integration layer, workflow engine, and product reliability needed for the overlay-first wedge.
  - role: Product and implementation lead
    startTiming: Month 0
    rationale: Turns pediatric workflow complexity into a repeatable pilot design and manages tradeoffs between automation, trust, and rollout speed.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Shortens deployment time by converting stack-specific exceptions into reusable integration and onboarding playbooks.
  - role: Pediatric RCM and clinical informatics lead
    startTiming: Month 6
    rationale: Strengthens charge-capture logic, audit readiness, and buyer trust in documentation and coding workflows.
  - role: GTM lead
    startTiming: Month 9
    rationale: Added only after the first pilots produce a repeatable ROI story for COO- and physician-owner-level selling.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid pilots with independent pediatric groups in the defined beachhead
      - Ship the first repeatable read-first integration set and one selective write-back workflow
      - Publish one case study showing prepared-visit lift and measurable revenue-integrity improvement
      - Convert at least 2 pilots into annual production contracts
  - horizon: 12–24 months
    items:
      - Expand from clinic-cluster pilots to broader group rollouts inside existing customers
      - Add benchmark reporting and adjacent workflow modules only after the core well-child loop is trusted
      - Build partnerships with at least 2 pediatric billing, RCM, or workflow consultancies
      - Reduce deployment time materially through reusable implementation playbooks
  - horizon: 24–36 months
    items:
      - Approach the year-3 SOM case of roughly 40 production groups or revise the market thesis based on live conversion data
      - Expand into adjacent pediatric workflows such as sick-visit intake, referral coordination, and family retention
      - Establish the product as a pediatric operations and revenue-integrity layer rather than a point recall tool
      - Decide whether the company should deepen the overlay model or move toward a fuller pediatric operating system
risks:
  - risk: Integration variability across incumbent pediatric EHR, PM, texting, and billing stacks could make onboarding too slow and services-heavy.
    likelihood: High
    impact: High
    mitigation: Prioritize the most common early stack combinations, launch read-first, and avoid promising broad write-back before repeatability exists.
  - risk: Clinicians and billers may not trust AI-generated notes or charge suggestions enough to change live checkout behavior.
    likelihood: High
    impact: High
    mitigation: Keep the system in recommendation mode, link every suggestion to supporting evidence, and review outcomes with customers weekly.
  - risk: Develo, pediatric EHR incumbents, and engagement overlays may broaden fast enough to compress the wedge.
    likelihood: High
    impact: High
    mitigation: Win on the narrowest interval workflow first and compound advantage through pediatric benchmark data and multi-system orchestration.
  - risk: Family completion of pre-visit digital intake and screeners may be uneven across payer mix or clinic populations.
    likelihood: Medium
    impact: Medium
    mitigation: Use text-first outreach, preserve in-office fallbacks, and segment workflows by completion patterns instead of assuming uniform digital adoption.
  - risk: Adolescent privacy, proxy access, and state-by-state consent rules could delay expansion into some geographies or workflows.
    likelihood: Medium
    impact: High
    mitigation: Sequence rollout by lower-complexity states first and build policy-aware access controls before expanding sensitive workflows.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the first integration set, 3 paid pilots, audit-grade coding and privacy controls, early implementation and RCM talent, and enough proof to determine whether the company can become a repeatable pediatric workflow platform rather than a narrow services-heavy overlay.
