- name: Develo
  stage: scale-up
  wedge: AI 原生儿科操作系统，融合临床、计费和家庭互动工作流。
  pricing: 未公开
  strength: 最接近 AI 原生儿科替代品类叙事，且已引用多州服务提供者采用数据。
  weaknessVsUs: 替代导向的定位落地速度可能慢于先叠加现有系统的更窄定期体检周期切入点。
  sourceRefs:
  - 37
- name: PCC
  stage: incumbent
  wedge: 儿科原生电子病历、计费和仪表盘套件，以全包月费销售。
  pricing: 固定月费，$0 启动费，$0 数据迁移费；具体金额未公开。
  strength: 在独立儿科领域拥有深厚的工作流信任和广泛的支持覆盖。
  weaknessVsUs: 当前公开证据更多强调模板、支持和仪表盘，而非 AI 原生定期体检协调。
  sourceRefs:
  - 23
  - 24
- name: Office Practicum
  stage: incumbent
  wedge: 儿科专用电子病历，带 VacLogic、集成筛查、CHADIS 连接和儿科 RCM 服务。
  pricing: 基于报价的软件加可选 RCM 服务。
  strength: 同类领先的儿科临床和疫苗工作流深度，以及强大的儿科计费专业化。
  weaknessVsUs: 公开定位工作流丰富但 AI 原生度尚不清晰，为更紧密的定期体检自动化层留有空间。
  sourceRefs:
  - 28
  - 29
  - 39
- name: Elation Health
  stage: scale-up
  wedge: AI 前沿基层医疗电子病历，通过环境式文档和以医生为先的 UX 向儿科延伸。
  pricing: 基于报价；AI 功能包含在平台定位中。
  strength: 有力证据表明 AI 文档和儿科工作流能改善医生时间和家庭体验。
  weaknessVsUs: 儿科原生工作流深度弱于专科现有厂商，尤其是周期特定召回和儿科 RCM 细节。
  sourceRefs:
  - 30
  - 31
- name: Phreesia
  stage: incumbent
  wedge: 面向现有儿科系统的登记、就诊准入、自助排班和质量缺口填补叠加工具。
  pricing: 合同制；公开以 ROI 框架而非透明标价呈现。
  strength: 有力证据证明数字化外联能减少电话量、重约爽约，并改善定期体检质量指标。
  weaknessVsUs: 就诊前和就诊间工具强大，但无临床文档或儿科费用捕获能力。
  sourceRefs:
  - 32
  - 33
regulatoryTechnicalConstraints:
- point: 青少年隐私、代理访问分段和 COPPA 规则，要求采用州级感知的同意和视图逻辑，而非简单的全家庭统一访问。
  sourceRefs:
  - 14
  - 15
  - 17
- point: 信息阻断和互操作性规则意味着任何数据屏蔽或过滤必须符合有效例外，而非厂商偏好。
  sourceRefs:
  - 11
  - 12
  - 14
- point: 定期体检自动化必须尽可能映射到 US Core 患者、免疫接种、筛查和 SMART 后端模式，而非专有对象。
  sourceRefs:
  - 16
  - 18
  - 19
  - 20
  - 21
  - 22
- point: 儿科计费逻辑必须在不超越临床医生审核的前提下，处理预防就诊、发育筛查、免疫接种工作流和付款方特定报销规则。
  sourceRefs:
  - 5
  - 25
  - 29
validationSignals:
- point: Develo 的融资和多州服务提供者采用报告表明，买家现在会考虑儿科原生工作流替代方案。
  sourceRefs:
  - 37
- point: Office Practicum 发布儿科 RCM 提升指标，表明诊所愿意为明确的收入完整性改善付费。
  sourceRefs:
  - 29
- point: Phreesia 的儿科案例展示了可量化的劳动力节省、自助排班采用率和逾期定期就诊减少。
  sourceRefs:
  - 32
  - 33
- point: Elation 的儿科案例研究表明，如果 AI 驱动的文档能明显减少下班后的病历时间，临床医生会采纳。
  sourceRefs:
  - 30
  - 31
openQuestions:
- 有多少家拥有 3–10 个院区的独立儿科诊所集团仍依赖 API 有限的遗留系统，需要手工集成工作？
- 目标细分市场中，定期体检收入流失有多大比例具体来自漏掉的筛查、疫苗咨询和联合就诊编码？
- 哪些州对诊前筛查和家长消息工作流产生最难处理的青少年隐私边界案例？
- 在 AI 生成的编码建议从建议模式进入半自动化账单准备之前，需要多高的买家信任度？
