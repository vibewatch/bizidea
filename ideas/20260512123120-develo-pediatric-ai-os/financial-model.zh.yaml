  y3RevenueImpactK: -60.0
  cashImpactK: -190.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionGroups
      ProductionGroups --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基本情景由生产集团从第 1 年末的 4 个增至第 3 年末的 26 个驱动，混合年合同价值为 $108K。
- checkName: 必须做对的事
  finding: 第一批连接器组合必须足够快地可复制，使试点转化为更广泛的推广，而毛利率不会停滞在 70% 以下。
- checkName: 模型失效条件
  finding: 若试点转生产周期拉长至 9 个月，或 ARPU 回落至 $96K 的下行情景，公司在下一个融资节点前可能需要额外资本。
- checkName: 下一轮融资依据
  finding: 下一轮融资的依据是 12 个以上生产集团、合作伙伴来源的管道，以及部署时间和审计审核负担随账户规模扩大而下降的证据。
sanityChecks:
  ruleOf40: 第 3 年增速 129.2% + EBITDA 利润率 -12.8% = 116.4%
  burnMultiple: 约第 2 年消耗倍数 0.8x，第 3 年消耗倍数 0.2x（基于年末 ARR 扩展计算）
  revenuePerFte: 第 3 年每 FTE 收入 $220.0K（SaaS 基准 $200–400K）
  flags:
