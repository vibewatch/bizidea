fundingAsk:
  round: pre-seed
  amountM: 2.6
  runwayMonths: 30
  milestone: 达到至少 12 个生产集团，将首批试点转化为更广泛的集团推广，落地 2 个儿科计费或 RCM 转介绍合作伙伴，并展示使毛利率保持在 70% 以上且剩余 6 个月现金的部署手册。
