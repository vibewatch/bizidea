scenarios:
  downside:
    description: 遗留系统差异和较慢的试点转化使公司更依赖服务收入，限制了生产集团的扩张速度。
    y3RevenueK: 1458.0
    y3EbitdaK: -518.0
    cashLowPointK: 185.0
    keyAssumptionChanges:
    - 年度 ARPU 落在 $96K，因为分析附加服务渗透率低，更多收入依赖折扣试点转化。
    - 第 3 年末约 18 个生产集团，而非 26 个，因为付费试点转化需要接近 9 个月。
    - 毛利率仅能达到约 70%，因为集成和审计审核仍长期依赖人工。
  base:
    description: 三个付费试点演变为可复制的院区集群推广动作，现有儿科集团在第 2、3 年逐院区扩大规模。
    y3RevenueK: 1980.0
    y3EbitdaK: -253.2
    cashLowPointK: 1026.2
    keyAssumptionChanges:
    - 每个生产集团的混合年收入为 $108K，结合基于席位的核心合同与适度的分析扩展，不计独立实施费用上行。
    - 生产集团从第 1 年末的 4 个增至第 3 年末的 26 个，仍低于商业计划和研究中 40 个集团的 SOM 目标。
    - 毛利率在首批连接器组合和实施手册可复制后才突破 70%。
  upside:
    description: 一个 RCM 转介绍渠道跑通，集团推广速度加快，基准分析提升实际合同价值。
    y3RevenueK: 2460.0
    y3EbitdaK: 55.0
    cashLowPointK: 1040.0
    keyAssumptionChanges:
    - 年度 ARPU 升至 $120K，因为基准和收入完整性分析在更多生产客户中成功附加。
    - 第 3 年末约 30 个生产集团，因为两个渠道合作伙伴降低了直销瓶颈。
    - 毛利率达到约 75%，因为团队在大多数账户中复用相同的连接器和入驻模式。
