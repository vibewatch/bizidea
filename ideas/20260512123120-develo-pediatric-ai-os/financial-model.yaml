modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionGroups
      ProductionGroups --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by growing production groups from 4 at Y1 exit to 26 at Y3 exit on a $108K blended annual contract value.
- checkName: Must go right
  finding: The first connector set must become repeatable fast enough that pilots convert into broader rollouts without gross margin stalling below 70%.
- checkName: Model breaks if
  finding: If pilot-to-production cycles stretch toward nine months or ARPU falls back toward the $96K downside case, the company likely needs additional capital before the next financing proof point.
- checkName: Next-round proof
  finding: The next round is justified by 12+ production groups, partner-sourced pipeline, and evidence that deployment time and audit-review burden are falling as accounts scale.
sanityChecks:
  ruleOf40: Y3 growth 129.2% + EBITDA margin -12.8% = 116.4%
  burnMultiple: Approx. Y2 burn multiple 0.8x and Y3 burn multiple 0.2x using end-of-year ARR expansion.
  revenuePerFte: $220.0K Y3 (benchmark $200–400K SaaS)
  flags:
  - Base case still exits Y3 EBITDA negative, so the company likely raises its next round before full profitability.
  - Revenue concentration remains material because 26 modeled production groups still represent a small and relationship-driven customer base.
  - Gross margin assumes the first integration patterns stop behaving like custom services after the initial pilots and early multi-site rollouts.
  - CAC and churn are heuristic because there is no observed cohort history yet for this exact pediatric workflow product.
