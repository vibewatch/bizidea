    sourceRefs: [1]
  - point: 二十多个州数百名儿科服务提供者的采用，表明市场已在主动购买儿科原生运营软件，而非仅仅忍受遗留系统。
    signalRefs:
      - 儿科细分已有真实的规模化验证
    sourceRefs: [2]
  - point: 巨大的儿科就诊量意味着，即便在定期体检完成率、文档时效和编码准确度上取得微小进步，也能迅速叠加成可观的 ROI。
    signalRefs:
      - 海量预防保健就诊量让行政损耗代价高昂
    sourceRefs: [3]
differentiator: >-
  现有儿科电子病历管理病历，通用 AI 病历助手管理病历记录，但两者都不掌控从家庭准备开始、到编码、表格和召回结束的纵向定期体检周期。本产品围绕年龄段儿科逻辑构建：筛查量表、疫苗时间节点、监护人沟通、学校表格和儿科收费规则，集成在一个工作流图谱中。这形成了一套关于预防保健就诊如何转化为已完成诊疗、家庭留存和干净账单的专有数据集——横跨多院区儿科集团。
