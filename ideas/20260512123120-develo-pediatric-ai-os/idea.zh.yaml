problem: >-
  独立儿科诊所集团的生死命脉是反复发生的定期体检就诊，但员工仍需在割裂的电子病历、消息、排班和 RCM
  工具之间，手工协调各年龄段的诊前登记、发育筛查、疫苗就绪状态、家长提醒、学校与夏令营表格及计费工作。家庭到诊时表格填写不完整，临床医生下班后才能完成文档，计费人员因工作流跨系统断裂而漏录儿科咨询、筛查和疫苗管理费用代码。结果是：预防保健就诊完成率偏低，离诊流程拖沓，以及在本就行政资源有限的诊所里产生本可避免的收入流失。
targetUser:
  primary: 独立美国儿科诊所集团的 COO 或诊所运营主管，该集团拥有 3–10 个院区、10–40 名服务提供者
  secondary: 负责就诊准备和离诊效率的收入周期管理人员或前台运营负责人
  buyer: CEO、COO 或医生合伙人
startupThesis:
  nonObviousInsight: >-
    最先脱颖而出的儿科 AI 公司，不会仅凭替代病历记录而胜出；它们将占据儿科定期体检周期这一核心阵地——家庭互动、各年龄段临床准备与儿科计费在此汇聚。变局在于：FHIR 原生互操作加上
    AI 病历助手和费用捕获，现在已能架设在遗留儿科系统之上；而新鲜资本和多州采用证据则表明，诊所终于愿意购买专科工作流替代方案。
  beachhead: >-
    拥有 3–10 个院区、10–40 名服务提供者、高定期体检就诊量的独立美国儿科诊所集团，目前仍通过遗留儿科电子病历加上独立登记、消息和计费工具处理预防保健就诊
  wedge: >-
    一个定期体检周期协调层，可生成各年龄段的家庭诊前登记和筛查表，预测应接种疫苗，起草就诊文档，并在离诊前自动建议儿科费用代码
  whyNowCatalyst: >-
    Develo 的融资和多州采用报告表明，儿科诊所现在已准备好购买专科运营软件；而 FHIR 原生互操作加嵌入式病历助手和费用捕获，使首日不需要全栈迁移的部署成为可能。
  ventureScalePath: >-
    从预防保健就诊协调和收入完整性起步，再扩展至患病就诊登记、疫苗库存、转诊协调、家庭留存营销、多院区排班，最终演变为完整的儿科诊所操作系统。
solution: >-
  产品连接儿科电子病历、诊所管理系统、计费栈和家庭消息工具，为每个待接受定期体检的儿童建立单一的纵向工作流。就诊前，发送适龄表格和筛查问卷，标记逾期未接种的疫苗或缺失的保险数据，并将错过或逾期就诊的家庭自动归入高优先级外联队列。就诊中，起草病历，整理学校和夏令营所需文件，并推荐与已记录的咨询、筛查和免疫事件挂钩的儿科诊疗代码。就诊后，将家庭引导至后续消息跟进，同时为管理人员提供一个仪表盘，按服务提供者和院区维度展示召回缺口、离诊延迟和编码漏单。初始版本范围窄而可衡量：更快的定期体检准备、更高的完成率，以及更干净的儿科费用捕获——无需立即进行电子病历的大换血。
goToMarketSeed:
  firstCustomer: >-
    一个拥有 15–30 名服务提供者和 4–8 个郊区院区的独立儿科诊所集团，定期体检就诊占总就诊量三分之一以上，员工仍在独立的电子病历、登记、消息和计费工具之间手工传递表格、提醒和代码
  buyingTrigger: >-
    开学季、预防保健就诊完成率下滑、新院区并购，或收入周期审查暴露出漏录的筛查和计费漏洞，都会催生在增加人手之前修复工作流的紧迫感
  currentAlternative: >-
    遗留儿科电子病历和诊所管理软件、独立的登记和家庭消息单点解决方案、外包计费支持，以及员工的手工电话和表格催收
  switchingReason: >-
    这一切入点同时改善家庭体验和收入完整性——针对最高频率的儿科工作流；而现状迫使员工在工具之间反复切换，仍然漏掉就诊、表格和计费代码
  pricingHypothesis: >-
    按服务提供者人数和每月定期体检就诊量定价的年度 SaaS 订阅，加上工作流梳理和历史召回清单整理的实施费用
