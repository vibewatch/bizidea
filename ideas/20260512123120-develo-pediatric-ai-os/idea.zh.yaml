  - point: 新鲜资本和运营老将背书的投资人表明，儿科工作流替代已成为一个有资金支持的可信软件赛道。
    signalRefs:
      - 专科替代赛道正获资本验证
    sourceRefs: [1, 2]
  - point: 病历、计费、登记、排班和家庭沟通的割裂，为跨工作流产品而非单功能插件提供了清晰的市场空白。
