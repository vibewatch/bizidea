jobsToBeDone:
  - job: 明天的定期体检日程里有表格未填、疫苗逾期、发育筛查未完成——帮助诊所自动为每个家庭做好准备，让就诊按时进行、离诊时完整完成文档。
    currentAlternative: 员工电话、门户提醒、纸质表格和在儿科电子病历中手工准备病历
    successMetric: 完全准备好的定期体检就诊占比，以及每次预防保健就诊的平均离诊时间
  - job: 当集团发现各院区年度就诊逾期、预防保健收入参差不齐时，帮助运营团队召回家庭并标准化编码，在不增加协调员的情况下提升同店就诊量。
    currentAlternative: 电子表格召回名单、通用批量短信工具和事后计费审计
    successMetric: 定期体检完成率、召回逾期就诊数量，以及每位服务提供者的儿科费用捕获量
