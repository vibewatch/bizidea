topRisks:
  - name: 集成阻力
    description: 儿科诊所集团往往采用各异的电子病历、诊所管理和消息系统组合，可能拖慢入驻速度并削弱早期 ROI。
    mitigation: 从最常见的儿科系统组合入手，先提供仅读模式的落地版本，聚焦召回、登记和编码建议，再深入推进写回集成。
  - name: 临床与计费信任缺口
    description: 如果服务提供者和计费人员担心合规错误或额外审核负担，可能会抵触 AI 生成的文档或编码建议。
    mitigation: 保持临床医生在审批环节中的参与，以建议模式上线，并将采用率与可量化的就诊准备改善、当日完成率和账单质量指标挂钩。
  - name: 全栈现有厂商的压制
    description: 儿科电子病历厂商或新兴 AI 原生儿科平台可能在经济价值显现后迅速向同一工作流延伸。
    mitigation: 先在最窄、最高频的定期体检工作流上取胜，再通过儿科专有基准数据和多系统协调能力积累差异化优势——这是现有厂商原生能力无法快速复制的。
