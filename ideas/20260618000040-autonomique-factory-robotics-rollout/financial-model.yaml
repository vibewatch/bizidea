modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Founder + partner pipeline] --> Pilots[Paid pilots]
      Pilots --> Networks[Production plant networks]
      Networks --> Revenue[Blended ACV revenue]
      Revenue --> GrossProfit[Gross profit after onboarding COGS]
      GrossProfit --> Cash[Cash after payroll and opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case Y3 revenue is driven by reaching 8 plant networks at roughly $300K blended ACV, which is the same SOM logic used in the business plan and research.
- checkName: Must go right
  finding: At least half of the first 2-3 paid pilots must convert within about 9 months so the company can hit 6 production networks by Q4Y2 without hiring ahead of proof.
- checkName: Model breaks if
  finding: If sales cycles stretch to 12 months or gross margin stalls near 65%, the downside case drives cash toward roughly $500K before the business earns a seed-ready story.
- checkName: Next-round proof
  finding: The next financing is justified when this pre-seed capital produces 6 production networks, one partner-sourced pilot, and a repeatable export-plus-adapter deployment motion.
sanityChecks:
  ruleOf40: Y3 growth 62.2% + EBITDA margin 0.4% = 62.6%.
  burnMultiple: 'Y2 burn multiple is about 0.5x: $478.8K EBITDA burn against roughly $900K of net-new ARR growth from 3 to 6 networks.'
  revenuePerFte: About $281K Y3 revenue per year-end FTE (8 FTE), which is acceptable but still near the low end of a $200K-$400K enterprise-software benchmark.
  flags:
  - The model assumes standalone budget ownership emerges quickly enough for 3 year-one paid pilots and 6 production networks by Q4Y2, which is still unproven in the research.
  - Y1 and Y2 gross margins stay below the 70% target because onboarding and document-mapping work remains meaningful early in the companys life.
  - LTV/CAC looks attractive, but it still depends on heuristic churn rather than observed multi-year renewal data.
