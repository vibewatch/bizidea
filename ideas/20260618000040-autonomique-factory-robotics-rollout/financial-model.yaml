slug: robot-task-qualification-os
date: '2026-06-18'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: Starts the first full month after the 2026-06-18 business-plan date.
- id: A2
  name: Starting paying plant networks (M1)
  value: '0'
  unit: count
  source: '[BP milestones; BP product.sixMonth] The plan begins before any paid pilot is signed, so M1 starts with zero paying customer networks.'
- id: A3
  name: Blended annualized customer value
  value: $300.0K ARR per plant network
  unit: usdK_per_year
  source: '[BP gtm.pricing; BP market.som; research.market.som] The BP prices production contracts around $200K-$350K and explicitly models year-three SOM as 8 networks at about $300K blended ACV.'
- id: A4
  name: Revenue recognition method
  value: $25.0K per active customer-month; new logos counted at roughly half-period contribution in the month or quarter they land
  unit: usdK_per_customer_month
  source: '[A3; BP investorMemo.firstCustomer.initialContract] $300K annualized value implies $25K monthly revenue, and a half-period convention keeps early pilot timing consistent with the BPs $75K-$125K paid-pilot framing.'
- id: A5
  name: Customer ramp
  value: 3 paying networks by M12, 6 by Q4Y2, and 8 by Q4Y3
  unit: customers
  source: '[BP milestones; BP market.som; BP product.twelveMonth] The ramp matches 2-3 paid pilots in year 1, 4-6 production networks by months 12-24, and the BPs 8-network year-three SOM case.'
- id: A6
  name: Gross margin ramp
  value: 45%-65% in Y1, 62%-68% in Y2, and 68%-70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP operatingAssumptions] Early deployments carry onboarding and template-mapping labor, then converge toward the BPs 70% target as adapters and exports standardize.'
- id: A7
  name: Monthly churn
  value: 1.2%
  unit: percent
  source: Startup-finance heuristic for sticky but still-unproven industrial enterprise workflow software with annual contracts, measured implementation work, and non-zero incumbent-bundling risk.
- id: A8
  name: Fully loaded CAC
  value: $160.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP risks; research.reportMemo.buyingTriggers] Founder-led enterprise selling, plant travel, pilot support, and partner enablement keep CAC materially above mid-market SaaS norms.'
- id: A9
  name: Loaded salary bands
  value: Founder/CEO $120K; engineering $170K; product/domain $160K; solutions $150K; deployment/CS $130K; sales/partnerships $150K; G&A $110K
  unit: usdK_per_fte_year
  source: Startup-finance heuristic for a lean pre-seed industrial B2B software team using modest founder cash pay and domain-heavy early hires rather than a large sales bench.
- id: A10
  name: Headcount ramp snapshots
  value: Founder/CEO 1/1/1/1/1/1; engineering 1/1/1/1/2/2; product/domain 1/1/1/1/1/1; solutions 0/1/1/1/1/1; deployment/CS 0/0/1/1/1/1; sales/partnerships 0/0/0/1/1/1; G&A 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale; BP milestones] The model follows the BP hiring order exactly in year 1 and only adds one engineer by year 2 plus one G&A hire by year 3 to stay capital efficient.'
- id: A11
  name: Functional non-salary opex
  value: Y1 $20K-$35K per month, Y2 $95K-$110K per quarter, and Y3 $90K-$105K per quarter
  unit: usdK
  source: Startup-finance heuristic for travel, cloud, security/compliance, insurance, legal, and customer-site support layered on top of the BP headcount plan.
- id: A12
  name: Payroll timing after Y1
  value: Second engineer added in Y2 and first dedicated G&A hire added at the start of Y3; no extra sales headcount is pulled forward before partner proof exists
  unit: method
  source: '[BP team; BP operatingAssumptions; BP milestones] The BP delays channel scaling until case-study proof exists, so payroll ramps more slowly after the first GTM hire.'
- id: A13
  name: Starting cash after pre-seed close
  value: $2.4M
  unit: usdM
  source: '[BP fundingAsk] The BP asks for $2M-$4M of pre-seed capital; the model uses $2.4M as the minimum credible raise that funds the hiring plan through the 6-network milestone with buffer.'
- id: A14
  name: Downside scenario deltas
  value: $275K ACV, 65% steady-state gross margin, 12-month sales cycle, and 6 networks by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.sensitivityCases; research.categoryDynamics.headwinds] The downside assumes slower conversion, more bundled competition, and services-heavy onboarding persisting longer than planned.'
- id: A15
  name: Upside scenario deltas
  value: $325K ACV, 72% steady-state gross margin, 7-month sales cycle, and 9 networks by Q4Y3
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones; research.reportMemo.partnershipEcosystem] The upside assumes benchmark analytics and partner referrals lift pricing, speed, and expansion volume.'
- id: A16
  name: Cash conversion simplification
  value: Ending cash rolls from EBITDA with no debt, capex, or tax lines
  unit: method
  source: Startup-finance heuristic for an asset-light pre-seed software company where working-capital swings are small relative to operating burn.
