  validationPlan:
  - priority: high
    question: How many engineering hours and meetings does one new robot task approval consume after a successful pilot?
    evidenceToGather: Interview manufacturing-engineering teams at 3–5 auto suppliers and collect actual task-signoff artifacts.
  - priority: high
    question: Which documents already serve as the de facto launch packet—risk assessments, control plans, work instructions, PPAP attachments, or OEM dashboards?
    evidenceToGather: Obtain redacted approval packets from one supplier and one integrator.
  - priority: medium
    question: Where do buyers want the system of record to live relative to MES, QMS, and robot OEM tools?
    evidenceToGather: Map the current toolchain in two pilot accounts and identify the true system-of-record owner.
