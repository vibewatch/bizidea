jobsToBeDone:
  - job: "当一个机器人任务已经在量产中跑通时，帮我们的制造工程团队快速把下一个相似任务也过审，这样扩自动化时就不用每次都从零重启审批流程。"
    currentAlternative: "基于电子表格的作业指导、集成商笔记和手工产线试跑。"
    successMetric: "新机器人辅助任务的审批时间从几个月缩到几周。"
  - job: "当一个新的线边机器人任务在试跑里打不到 takt time 或质量目标时，帮我们的工厂团队迅速拆清到底哪里变了，好在影响量产产出前把 rollout 问题修掉。"
    currentAlternative: "在机器人 OEM 工具、主管日志和线下工程会议之间临时排障。"
    successMetric: "新任务上线时，能在不做大规模返工的前提下达到目标节拍和首检质量的比例。"
