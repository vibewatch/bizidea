differentiator: >-
  大多数面向工厂的机器人软件，盯的是车队管理、机器人编程或首次单元调试。
  这家公司卡住的是一层更窄但突然变得紧急的工作流：第一次部署成功之后，到接下来十个任务陆续获批之间的那一层——
  作业指导翻译、审批证据和面向操作员的 rollout 包。它的防守力来自不断变厚的数据层：任务级验收标准、失效模式和可复用审批模板，
  而这些恰恰不是 OEM 或系统集成商跨客户最容易看见的部分。
