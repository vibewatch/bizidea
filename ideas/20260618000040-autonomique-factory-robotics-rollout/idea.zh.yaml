problem: >-
  一旦半人形机器人在真实工厂里证明自己能跑通一个任务，制造商立刻就想把它复用到相邻的配套、搬运、检验或产线支援工作里。
  但每个新任务都对应不同的作业指导、质量容差、操作员交接、节拍目标和安全证据，
  所以 rollout 团队只能退回到电子表格、集成商经验和一厂一厂开签核会的老路上。
  结果是，可适应的工厂 AI 反而比固定式自动化更难放大：机器人本身很灵活，
  但每个新任务的审批流程一点都不灵活。
targetUser:
  primary: "一家拥有 5-20 座工厂的汽车零部件集团里的制造工程负责人，服务本田或丰田体系，正把一个半人形机器人平台从加拿大首个量产任务扩展到相邻的线边工作流。"
  secondary: "负责新机器人辅助任务作业指导、 takt-time 验证和操作员交接的工厂工业工程经理。"
  buyer: "制造工程 VP 或自动化负责人。"
startupThesis:
  nonObviousInsight: >-
    在柔性工厂机器人里，真正稀缺的资产已经不只是机器人硬件，也不只是一次成功试点。
    更稀缺的是资质审批层：它要证明一台可重定向的机器人在下一个任务上，
    依然能把精度、人与机器人交互和回退行为都控制在正确范围内。
    随着 physical AI 越来越灵活，最高摩擦的瓶颈会从安装一个机器人单元，转到给几十个任务变体逐一认证。
  beachhead: >-
    与 Honda、Toyota 供应链相关的汽车零部件制造商，已经把一种半人形平台投进真实量产，
    现在需要在现有小型工厂网络里，批准这套平台去做重复性的配套、线边补货和检验交接任务。
  wedge: >-
    一个机器人任务资质审批 OS：把一个已经获批的量产任务，转成下一次 rollout 可复用的作业指导模板、验收测试、
    操作员交接步骤和证据包。
  whyNowCatalyst: >-
    Autonomique 从付费试点走向量产，再叠加其明确提出要跨多任务和全球 F.tech 站点扩张，
    让 embodied AI rollout 的新瓶颈变成了逐任务做资质审批。
  ventureScalePath: >-
    先从汽车零部件任务审批切入，之后演变成 embodied AI 变更控制的跨厂商系统记录层，覆盖电子、物流、航天等经常重定向机器人的工厂。
solution: >-
  产品先吃进一个已验证量产任务的 SOP、机器人任务程序、质量检查点、节拍目标和操作员触点，
  再为下一个候选任务生成一整套资质审批包。制造工程团队可以在正式上线试跑前，
  用它对照此前已获批的动作、安全假设、所需工装和人工升级处理步骤，判断新任务是否过关。
  rollout 期间，系统把 dry run、缺陷观察、 takt-time 结果和主管签核都收进同一个工作流，
  取代四散的电子表格和邮件线程。时间一长，软件会沉淀出一套最深的可复用任务配方库和失效模式库，
  专门服务于存量汽车工厂里的可适应机器人。
goToMarketSeed:
  firstCustomer: >-
    一家在北美拥有 7 座工厂的汽车零部件供应商，已经在加拿大让一个类似 Autonomique 的半人形任务上线，
    其中央制造团队正试图在同一轮预算周期内，再批准 3 个重复性线边任务，然后扩展到 Ohio 和 Mexico 站点。
  buyingTrigger: >-
    一个付费试点达成量产目标后，总部要求工厂工程团队在同一轮预算内，把机器人复制到更多任务或下一家工厂。
  currentAlternative: >-
    系统集成商 playbook、电子表格版作业指导、机器人 OEM 控制台、手工线体试跑，以及各工厂单独开的签核会。
  switchingReason: >-
    首个客户之所以会切换，是因为产品能把每个获批任务都变成一个可复用的 launch packet，
    从而明显压缩证明下一个任务安全、精准、可量产所需的工程时间和返工量。
  pricingHypothesis: >-
    按工厂网络规模和待审批任务族数量收年费，首个机器人平台适配器另收一次性 setup fee。
