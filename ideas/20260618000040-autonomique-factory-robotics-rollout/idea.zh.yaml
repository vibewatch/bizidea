topRisks:
  - name: "OEM 捆绑"
    description: "机器人厂商可能会把基础任务模板和审批工具直接打包进自己的部署栈里。"
    mitigation: "坚持跨厂商定位，拿住制造商真正需要的工厂侧证据、签核历史和跨混合机器人车队、跨站点的工作流记录。"
  - name: "服务化蔓延"
    description: "早期客户可能要求每个新任务都做定制工程，逼着公司滑向集成商经济模型。"
    mitigation: "把首批部署收束在固定任务族里，先把模板、验收标准和 rollout 报告产品化，再谈大范围扩张。"
  - name: "独立预算线偏弱"
    description: "有些工厂可能仍会把任务审批埋在更大的自动化项目里，而不是单独采购软件。"
    mitigation: "在试点后扩张的那个时间点切入，用更快的多任务 rollout、更少的 launch 缺陷和更高的稀缺工程时间复用率来讲 ROI。"
