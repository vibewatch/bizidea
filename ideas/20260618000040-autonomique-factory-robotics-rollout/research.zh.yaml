        拟议创业公司: [0.86, 0.92]
  fiveForces:
    supplierPower:
      score: 3
      rationale: Startup 依赖机器人 API、集成商配合和安全标准映射，但只要软件层保持硬件中立，仍有能力在不同技术栈之间切换。
      sourceRefs:
      - 2
      - 21
      - 26
    buyerPower:
      score: 4
      rationale: 买家群体集中、技术成熟，而且身处不容犯错的量产环境里，所以早期最关键的是能不能建立参考案例和 ROI 证明。
      sourceRefs:
      - 1
      - 3
      - 24
    threatOfEntrants:
      score: 3
      rationale: 工作流软件本身不难做，但编码后的标准知识、跨厂商集成和长期沉淀的任务证据数据，会形成不低的学习曲线。
      sourceRefs:
      - 12
      - 21
      - 23
    threatOfSubstitutes:
      score: 4
      rationale: 工厂完全可以继续用集成商、电子表格、control plan 文档和现有编程/仿真套件，而不是再加一层专门的审批软件。
      sourceRefs:
      - 23
      - 29
      - 32
    competitiveRivalry:
      score: 4
      rationale: 市场里相邻的机器人软件厂商非常多，但大多数竞争仍属间接竞争，因为他们优化的是执行、设计或安全，不是反复发生的 launch 审批。
      sourceRefs:
      - 26
      - 27
      - 29
      - 32
  pestle:
  - factor: 政治
    impact: negative
    point: 贸易和产业政策的变化让汽车供应链更区域化、也更重审计，这会抬高跨站点变更控制的复杂度。
    sourceRefs:
    - 9
    - 10
    - 11
  - factor: 经济
    impact: positive
    point: 劳动力短缺和数字工程外包，会放大那些能压缩 rollout 工作量的软件价值。
    sourceRefs:
    - 7
    - 8
  - factor: 社会
    impact: positive
    point: 制造商需要工具，帮助一小撮工程师更安全、更稳定地看住越来越多的自动化。
    sourceRefs:
    - 7
    - 20
  - factor: 技术
    impact: positive
    point: 机器人自主化、跨厂商控制和数字制造验证工具，正在成熟到足以支撑它们之上的新工作流层。
    sourceRefs:
    - 2
    - 26
    - 31
  - factor: 法律
    impact: negative
    point: 风险评估、验证和 lockout/tagout 义务会拖慢每次 rollout，也会抬高缺失证据的代价。
    sourceRefs:
    - 12
    - 14
    - 21
  - factor: 环境
    impact: neutral
    point: 机器人厂商越来越常把自动化与降废和效率提升挂钩，但这个切口真正卖的是工作流和可审计性，而不是直接的可持续开支。
    sourceRefs:
    - 1
    - 2
  adoptionFrictionMatrix:
  - friction: 证明不同任务变体都满足安全要求
    severity: 高
    affectedBuyer: 制造工程与 EHS 负责人
    mitigation: 从与最新机器人安全标准对齐的风险评估模板和验证步骤切入。
    sourceRefs:
    - 12
    - 15
    - 21
  - friction: 把机器人行为映射进汽车质量文件
    severity: 高
    affectedBuyer: 供应商质量与制造工程团队
    mitigation: 把证据导出成 APQP、control plan、PPAP 和客户特定要求这些买家已经认可的格式。
    sourceRefs:
    - 23
    - 24
    - 25
  - friction: 要与混合 OEM 和仿真栈集成
    severity: 中
    affectedBuyer: 自动化负责人
    mitigation: 保持厂商中立，并为机器人日志、仿真输出和作业指导系统提供适配器。
    sourceRefs:
    - 26
    - 29
    - 31
  - friction: 证明 ROI 独立于服务支出存在
    severity: 中
    affectedBuyer: 制造工程 VP
    mitigation: 用当前外包工作流作为基线，比较审批时间、试跑返工和首发上线表现。
    sourceRefs:
    - 7
    - 8
market:
  tam:
    value: $60.0M
    rationale: 估算方法是 240 个未来可能把机器人任务审批标准化的多工厂汽车供应商或 OEM 集团 × 约 $250k 的年度网络 ACV；集团数量来自对美国超 2,000 座汽车设施 [9]、55 座美国整车总装厂 [10]，以及汽车行业高机器人密度 [5][6] 的保守汇总。
    isEstimate: true
    sourceRefs:
    - 5
    - 6
    - 9
    - 10
  sam:
    value: $18.0M
    rationale: 在 TAM 基础上进一步收窄到约 72 个北美供应商集团：这些集团已经在运行或即将扩张柔性机器人项目，按约 $250k ACV 计算。
    isEstimate: true
    sourceRefs:
    - 1
    - 5
    - 7
    - 9
  som:
    value: $2.4M
    rationale: 到第 3 年覆盖 8 个工厂网络，且每个网络在管理多个任务族后形成约 $300k 的 blended ACV；8 × $300k = $2.4M。
    isEstimate: true
    sourceRefs:
    - 1
    - 7
    - 23
