  - point: 大型现有厂商已经在卖编程、仿真和安全层，买家很可能认为这些产品本就该覆盖相邻需求。
    sourceRefs:
    - 26
    - 29
    - 31
    - 32
  - point: 量产线几乎不容犯错，因此审批软件一旦出现误判，代价会格外高。
    sourceRefs:
    - 1
    - 3
    - 12
competitors:
- name: Wandelbots
  stage: 成长期
  wedge: 围绕跨厂商的软件定义自动化，把机器人、工作流和数字孪生连接成一层统一编排系统。
  pricing: 企业级定制报价；未发现公开标价。
  strength: 在跨厂商控制和工业机器人规模化运营上叙事很强。
  weaknessVsUs: 核心仍是机器人自动化编排，不是首次部署成功之后、专门面向汽车任务审批包与签核工作流的产品。
  sourceRefs:
  - 26
- name: Vention
  stage: 成长期
  wedge: 云平台叠加预工程化机器人单元，简化自动化设备的设计、下单和部署。
  pricing: 定制报价 / 配置化方案定价；未发现公开标价。
  strength: 对于想快速上线机器人单元的买家，turnkey 部署动作很强。
  weaknessVsUs: 更偏向搭建和部署机器人单元，而不是在既有工厂网络内部，反复给相邻任务做资质审批。
  sourceRefs:
  - 27
- name: ABB RobotStudio + SafeMove
  stage: 现有厂商
  wedge: ABB 技术栈内的离线编程、调试与机器人安全工具。
  pricing: 企业软件与控制器定价；未发现简单的公开套餐价。
  strength: 装机基础深、调试流程成熟，且安全可信度高。
  weaknessVsUs: 当买家保持在 ABB 栈内时最强；一旦要做跨混合车队、跨质量系统的中立工厂侧审批记录，它就弱很多。
  sourceRefs:
  - 29
  - 30
- name: Siemens Tecnomatix / Process Simulate
  stage: 现有厂商
  wedge: 面向更快 launch 和更高质量的数字制造与 3D 工艺验证。
  pricing: 企业订阅 / 计划制软件；详细价格仅通过 Siemens 方案提供。
  strength: 在复杂生产系统中的虚拟验证和 launch 工程能力极强。
  weaknessVsUs: 这是一个重型仿真环境，不是给反复出现的机器人任务审批、操作员交接和证据收集准备的轻量操作系统。
  sourceRefs:
  - 31
  - 32
- name: GrayMatter Robotics
  stage: 成长期
  wedge: 一层 AI，用来让机器人适配不同零件、工艺、环境和工厂重构需求。
  pricing: 企业级定制报价；未发现公开标价。
  strength: 在工厂现场快速部署和重配置 physical AI 这件事上，故事讲得很强。
  weaknessVsUs: 更靠近工艺执行与适配，而不是买家为了审计和 rollout 治理所需的跨站点审批记录。
  sourceRefs:
  - 28
regulatoryTechnicalConstraints:
- point: 每一个机器人应用在首次上电或进入协作使用前，都需要完成文档化的风险评估、验证和审查。
  sourceRefs:
  - 12
  - 21
- point: 汽车供应商必须让新的流程证据对齐 APQP、control plan、PPAP 和 OEM 的客户特定要求。
  sourceRefs:
  - 22
  - 23
  - 24
  - 25
- point: 维护和异常处理必须满足 lockout/tagout 及工人保护控制要求，而不只是覆盖机器人在正常节拍下的行为。
  sourceRefs:
  - 12
  - 14
validationSignals:
- point: 一家具名的 Tier-1 买家，正把 embodied-AI 部署从付费试点推进到真实量产，并准备扩到更多任务。
  sourceRefs:
  - 1
  - 2
- point: Autonomique 把自己定位成硬件中立平台，这会放大一份跨任务、跨站点的中立审批记录的价值。
  sourceRefs:
  - 1
  - 2
- point: 北美制造业的机器人密度仍高、范围也足够广；只要工作流完成产品化，就具备重复销售的土壤。
  sourceRefs:
  - 5
  - 9
  - 10
- point: 安全和质量机构仍在加码文档要求，因此可审计的 launch packet 会越来越值钱。
  sourceRefs:
  - 15
  - 23
  - 24
openQuestions:
- 一个供应商集团内部，第二个和第三个机器人任务的真实审批中位时间到底是多少？
- 今天最难拼齐的材料究竟是哪种：风险评估、作业指导、control plan，还是操作员培训证据？
- 买家会不会坚持把审批记录留在现有 QMS 或 MES 里，而不是接受一个新的独立工作流？
- 对于小工厂而言，机器人 OEM 或集成商工具有多频繁已经能满足“够用”的审批需求？
