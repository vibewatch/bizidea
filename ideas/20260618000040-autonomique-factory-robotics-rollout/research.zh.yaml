reportMemo:
  executiveTakeaways:
  - 买家的痛点正在从“证明一台机器人能不能工作”转向“证明接下来的十个任务能否安全、稳定地上线”。
  - 相邻工具已经覆盖编程、仿真和单元安全，但在试点成功和网络化 rollout 之间，那份可复用的审批包显然还没有明确 owner。
  - 汽车质量流程是最佳切口：只要机器人 rollout 证据能顺畅映射进工厂既有的质量 ritual，软件就有机会成为 embodied-AI 的变更控制记录层。
  marketDefinition: 供制造工程团队使用的工作流与证据软件，专门解决 embodied-AI 首次试点成功后，后续机器人辅助任务怎么过审。
  customerAndBuyer: 主要用户是负责任务 rollout、作业指导、节拍验证和产线签核的制造与工业工程负责人；经济买家是工厂网络层面的自动化负责人或制造工程负责人。
  buyingTriggers:
  - point: 首个机器人任务打进量产后，总部立刻要求团队把它复制到相邻任务或其他站点。
    sourceRefs:
    - 1
    - 2
    - 4
  - point: 劳动力和数字技能短缺，让每次新 rollout 都更依赖稀缺工程师和外部帮手。
    sourceRefs:
    - 7
    - 8
  - point: 更新后的机器人安全标准和汽车质量要求，抬高了每次任务变更的文档负担。
    sourceRefs:
    - 12
    - 15
    - 23
    - 24
  willingnessToPay:
    summary: 公开价几乎查不到，但稀缺工程师人力、外包 OT/IT 工作和不容出错的量产门槛叠在一起，足以支撑这类工作流开支。买家更可能拿“省下多少工程周数、少掉多少失败试跑”来衡量，而不是拿它去对标通用 MES 定价。
    sourceRefs:
    - 7
    - 8
    - 12
    - 23
  competitiveLandscape: 周边竞争在机器人编程、仿真、单元部署和安全上都很拥挤。真正的空白，是工厂侧那条会反复发生的工作流：把一个成功的机器人任务变成下一个任务、下一条线、下一个站点都能复用、且经得起审计的审批包。
  incumbentThesis:
  - incumbentClass: 机器人 OEM 套件
    point: OEM 和自主化厂商掌控执行层，但他们的默认工具主要优化编程与部署，不是由工厂自己持有的跨厂商审批记录。
    sourceRefs:
    - 2
    - 26
    - 29
  - incumbentClass: 数字制造套件
    point: 仿真巨头擅长在 3D 环境里验证机器人单元，但那是重型工程环境，不是线边团队高频反复使用的轻量化任务审批工作流。
    sourceRefs:
    - 29
    - 31
    - 32
  - incumbentClass: 质量合规栈
    point: AIAG 和 IATF 框架已经定义了汽车工厂如何记录 control plan 和客户特定要求，但它们并不会原生把机器人行为翻译成可复用的任务证据。
    sourceRefs:
    - 22
    - 23
    - 24
    - 25
  - incumbentClass: 系统集成商
    point: 制造商本来就把很多 OT、IT 和自动化工作外包出去；如果只给出“做服务”这一种答案，客户只会更依赖定制项目，而不会沉淀可复用的内部 launch 记忆。
    sourceRefs:
    - 7
    - 8
    - 12
  regulatoryLandscape: 产品身处一套很密的安全与质量制度里：机器人风险评估、协作运行验证、lockout/tagout，以及汽车 OEM 客户特定质量控制，都会决定任务审批数据该怎么采集。
  technologyLandscape: 相邻技术栈包括机器人自主化平台、离线编程、数字孪生、安全控制器和 connected-worker 工具；缺口在工作流层——把这些系统产出的结果转成可复用的审批。
  distributionChannels:
  - point: 通过已经在扩一个机器人部署的供应商制造工程负责人，做共创客户销售。
    sourceRefs:
    - 1
    - 3
    - 4
  - point: 当 OEM 或系统集成商需要首个单元之外的 rollout 成功率时，由他们转介绍进来。
    sourceRefs:
    - 2
    - 17
    - 29
  - point: 借安全和质量生态切入；这些生态本来就在培训买家如何应对 launch 文档和标准升级。
    sourceRefs:
    - 15
    - 23
    - 24
  partnershipEcosystem:
  - point: 机器人 OEM 和自主化厂商需要一份中立的工厂侧审批记录，好在不接管客户内部签核流程的前提下，把资料交给买家。
    sourceRefs:
    - 2
    - 26
    - 28
  - point: 仿真和离线编程厂商更适合把基线任务模型和验收证据喂给 startup，而不是直接替代它。
    sourceRefs:
    - 29
    - 31
    - 32
  - point: 质量机构和工厂顾问提供了买家早已熟悉的 vocabulary，比如 control plan、CSR 和 launch gate。
    sourceRefs:
    - 22
    - 23
    - 24
  dataMoats:
  - point: 已获批任务模板会逐步积累跨工厂的机器人验收阈值、工装假设和升级处理模式。
    sourceRefs:
    - 1
    - 2
    - 23
  - point: 随着买家把机器人重定向到更多工作流和站点，失败历史和重新审批历史会越来越有防守力。
    sourceRefs:
    - 4
    - 12
    - 21
  - point: 跨厂商证据归一化很关键，因为工厂通常不想把 rollout 记忆锁死在单一机器人栈里。
    sourceRefs:
    - 26
    - 29
    - 31
  geographicConsiderations:
  - point: Ontario 以及更大的北美汽车走廊很有吸引力，因为供应商密集、总装集中，天然更容易出现重复 rollout 机会。
    sourceRefs:
    - 9
    - 10
    - 11
  - point: 与日系 OEM 绑定、且拥有全球生产工程组织的供应商尤其值得盯，因为标准和 rollout 经验会跨站点流动。
    sourceRefs:
    - 1
    - 4
    - 24
  sensitivityCases:
  - case: OEM 打包基础审批能力
    impact: 如果自主化厂商能交付“够用”的审批模板，startup 就必须在跨厂商证据、买家工作流中立性和可审计性上继续拉开差距。
    sourceRefs:
    - 2
    - 26
    - 29
  - case: Rollout 继续由服务主导
    impact: 如果工厂仍靠集成商和咨询工时来做扩张，软件 ACV 会被压缩，部署成本也会抬高。
    sourceRefs:
    - 7
    - 8
  - case: Embodied-AI 部署在试点后停住
    impact: 如果更多试点始终过不了量产线，滩头市场需求就会从 rollout OS 转回试点就绪工具。
    sourceRefs:
    - 1
    - 2
  validationPlan:
  - priority: high
    question: 一个成功试点之后，再给一个新机器人任务过审，究竟要吃掉多少工程工时和多少次会议？
    evidenceToGather: 访谈 3-5 家汽车供应商的制造工程团队，并收集真实的任务签核资料。
  - priority: high
    question: 现在到底是哪几份文件在充当 launch packet——风险评估、control plan、作业指导、PPAP 附件，还是 OEM 控制台？
    evidenceToGather: 从一家供应商和一家集成商手里拿到脱敏的审批包。
  - priority: medium
    question: 相对于 MES、QMS 和机器人 OEM 工具，买家希望把 system of record 放在哪里？
    evidenceToGather: 在两个试点客户里画清现有工具链，并确认真正的 system-of-record owner。
analysisModels:
  marketMapDiagram:
    title: 工厂机器人 rollout 工具
    mermaid: |-
      quadrantChart
        title 市场地图
        x-axis 低专业化 --> 高专业化
        y-axis 低紧迫度 --> 高紧迫度
        Vention: [0.30, 0.45]
