slug: robot-task-qualification-os
date: '2026-06-18'
executiveSummary: >-
  Robot Task Qualification OS 最适合先做成工厂侧的审批层，卖给已经把一个半人形或可适应机器人任务推入真实量产、
  现在又要把它复制到相邻工作流和更多站点的北美汽车零部件集团。真正急的痛点不是给第一套机器人单元编程，
  而是每扩一个新任务，都得重新拼风险评估、作业指导、质量证据、操作员交接步骤和签核包。首个买家应该是制造工程 VP 或总监，
  日常用户则是工厂工业工程经理，供应商质量或 EHS 则是必经审批方。首个产品要窄、要只读：吃进已获批任务资料和试跑结果，
  然后为下一个任务族生成可复用的审批包，而不是去替代 MES、QMS、机器人 OEM 工具或数字孪生软件。GTM 的启动点，
  应该卡在试点之后的扩张时刻——总部要求一个工厂网络在同一轮预算周期里，把已经成功的机器人任务复制到另外 3 个任务或下一个站点。
  定价要跟工厂网络范围和待审批任务族挂钩：先收付费试点和平台适配器费用，如果审批时间、试跑返工和 launch 缺陷都能改善，
  再转成年费订阅。最难的战略选择，是先打穿汽车任务审批，因为 APQP、control plan 和安全文档虽然麻烦，
  但流程清晰，其他工厂品类暂时没有这么明确的抓手。现在的证据足以说明 rollout 瓶颈正在成形，
  但仍缺直接证据证明审批中位工作量、system of record 的真实归属，以及买家究竟会把它当独立软件买单还是继续跟服务打包，
  所以这更适合持续跟踪，而不是今天就高强度下注。
problem:
  - "汽车零部件制造商现在已经能把可适应机器人从试点推到真实量产，但每个新任务仍要重新做安全验证、更新作业指导、补齐质量证据，再一厂一厂签核，整个过程靠电子表格、会议和经验拼起来。"
  - "结果是，physical AI 越灵活，扩张瓶颈反而越明显，因为本就稀缺的制造工程团队必须反复证明下一个任务既安全、又精准、还能直接上量产。"
solution:
  - "搭建一套审批工作流：吃进已获批任务资料、SOP、机器人任务参数、节拍目标、质量检查和操作员触点，再为下一个任务生成验收测试草案、签核步骤和证据包。"
  - "给制造工程、质量和 EHS 一条经得起审计的统一工作流，记录 dry run、偏差、纠正动作和最终批准，让 rollout 记忆在工厂之间持续累积，而不是每个任务都重新来过。"
whyWeWin:
  - "这个切口卡在首个部署成功和更大范围 rollout 之间。现有厂商大多只从编程、仿真或安全工具侧面切入，很少真正拥有一份可复用、由工厂自己掌握的审批记录。"
  - "如果公司能跨混合机器人栈沉淀任务级验收阈值、失效模式和人工 override 历史，就能搭出一张跨厂商的资质审批图谱，而这不是 OEM 套件和服务公司天然会掌握的资产。"
strategicChoices:
  beachhead: 北美本田系、丰田系汽车零部件供应商集团，拥有 5-20 座工厂，已经有一个可适应机器人量产任务上线，并且中央制造工程团队正试图批准 3-5 个相邻的重复性线边任务。
  wedgeRationale: 这个细分市场的购买触发最清楚：一次成功试点会立刻带来复制压力，要求团队在同一轮 launch 节奏里把机器人扩到更多任务；同时，汽车行业的质量流程会把审批做慢、做弱的代价直接暴露在工程工时、节拍损失和 launch 风险上。相比同时向多个行业和多个用例卖一个通用机器人运营平台，这是更快的验证路径。
  sequencingRationale: 先从只读 ingest、审批模板和审批工作流做起，只服务一个机器人平台和少数几个任务族，因为买家在愿意把更多流程集中进来之前，先要看到可信、可审计、能跟现有系统共存。等 2-3 个量产转化跑通，再补更深的连接器、benchmarking 和渠道合作；那之后才考虑从汽车零部件扩到别的行业，或者从审批层扩到更广的 rollout 编排。
  notYet:
    - 广义的机器人车队管理或执行控制
    - 还没有首个量产验证点的 greenfield 工厂自动化项目
    - 电子、物流、航天等非汽车垂直行业
    - 完整替代 MES、QMS、仿真或 OEM 编程环境
market:
  tam: $60.0M 的估算 TAM，基于约 240 个多工厂汽车供应商或 OEM 集团，未来可能按每年约 $250K 的网络 ACV 标准化机器人任务审批。
  sam: $18.0M 的估算 SAM，基于约 72 个北美供应商集团，已经在运行或即将扩张柔性机器人项目，按每年约 $250K ACV 计算。
  som: 基于第 3 年覆盖 8 个工厂网络、每个网络在平台上管理多个任务族后约 $300K blended ACV，得到 $2.4M 的估算 SOM。
  segments:
    - 把一个可适应机器人平台扩展到现有工厂群的北美汽车零部件供应商集团
    - 需要一份工厂侧审批记录来支持重复 rollout 的工业系统集成商和机器人厂商
  buyingProcess: >-
    动作通常从首个机器人任务打进量产开始：总部要求制造工程团队把它复制到相邻任务或下一座工厂，
    但又不想再重复几个月的手工审批。经济决策权大概率落在制造工程 VP 或总监手里，
    而工厂工业工程、供应商质量、EHS 和自动化负责人会一起判断，这套工作流能不能嵌进现有的 APQP、control plan 和安全流程。
product:
  mvp: >-
    MVP 是一个只读的审批工作台，只服务一个机器人平台和一个供应商网络里的 3 个任务族。
    它要能吃进此前已获批任务的资料，记录试跑结果和异常，并生成可复用的风险评估清单、作业指导差异、验收测试和签核包，
    但不去做机器人编程，也不去抢量产执行的 system of record。
  sixMonth: 在 6 个月内拿下 2-3 个共创客户，把一个任务族模板库跑顺，并证明基于导出文件的 ingest 加审批工作流，确实能缩短下一个机器人辅助任务上线所需的时间和协同成本。
  twelveMonth: 至少把 1-2 个付费试点转成年产合同，补上最常见的机器人日志和文档系统连接器，并把部署流程标准化到一个平台适配器加一套可复用的汽车文档导出模板上。
  twentyFourMonth: 在 24 个月内成为汽车零部件行业里可适应工厂机器人的跨站点审批层，补上 benchmark analytics、混合厂商证据归一化和更深的 rollout 治理，再向相邻工业垂直行业扩张。
  keyBets:
    - 深度集成还没做之前，只靠导出的 SOP、机器人日志和质量资料，也足以证明价值。
    - 只要能在成功试点后明显减少工程周数和失败试跑次数，买家就愿意为独立的审批层买单。
    - APQP、control plan、PPAP 和机器人安全资料可以被映射进一个可重复的产品工作流，而不是每个任务都做一遍定制咨询。
    - 跨厂商中立性足够重要，工厂不会默认只用 OEM 或集成商工具。
gtm:
  wedge: 把首个 offer 卖成一个付费的试点后扩张项目：把一个已经获批的量产任务转成接下来 3-5 个任务可复用的 launch packet，核心卖点是审批更快、launch 缺陷更少、稀缺制造工程时间复用更高。
  channels:
    - 创始人亲自打单，直接卖给多工厂汽车零部件供应商里 VP 和总监级的制造工程负责人
    - 与已经在扩一个 Autonomique 式部署的工厂网络做共创销售
    - 与机器人 OEM、自主化厂商和工业系统集成商建立转介绍合作，帮他们把成功 rollout 从首个单元推向后续扩张
    - 围绕 APQP、control plan 和工业机器人标准切换的质量与安全生态转介绍
  funnelTargets: "目标是 intro→qualified discovery 25-35%，discovery→paid pilot 20-30%，paid pilot→production 50%+，以及首个量产网络在 12 个月内扩到第二座工厂或第二个任务族的比例达到 40%+。"
  pricing: 每年按工厂网络范围和待审批任务族数量收费，另收平台适配和 onboarding 费用；这样既贴合研究里围绕“节省工程周数”的付费逻辑，也能从约 $75K-$125K 的试点，走到多个任务族同时激活后约 $200K-$350K 的年度量产 ACV。
businessModel:
  revenueStreams:
    - 按工厂网络和活跃任务族收费的年度审批工作流订阅
    - 首次部署时收取 onboarding、平台适配和文档映射费用
    - 面向多站点 rollout 治理的高级分析与 benchmarking 模块
  unitOfValue: 通过审批工作流被治理起来的工厂网络和任务族。
  targetGrossMarginPct: 70
  expansionLevers:
    - 从一个机器人平台和 3 个任务族，扩到同一供应商集团内更多工厂
    - 当客户在网络里引入更多机器人平台时，补上混合厂商支持
    - 当审批历史积累到一定厚度后，再叠加 benchmark analytics、审计报告和合作伙伴工作区
strategyMap:
  northStarMetric: 通过平台获批、并且无需大规模二次返工就能进入真实量产的新机器人辅助任务数量。
  inputMetrics:
    - 从候选任务选定到 launch packet 获批的天数
    - 获批任务从试跑转到量产的转化率
    - 每个新任务审批消耗的工程工时
    - 量产首月的 launch 缺陷或异常率
    - 从 pilot 到 production 的转化率
  moatsToBuild:
    - 跨厂商的任务族模板库、验收阈值库和升级处理路径库
    - 把任务上下文、偏差、纠正动作和最终量产结果连在一起的审批历史
    - 深度贴合汽车安全与质量文档习惯，让这条工作流很难被替换掉
  killCriteria:
    - 聚焦滩头市场卖了 12 个月，签下的付费试点仍少于 3 个
    - 没有任何试点能把下一个任务的审批周期或工程工时，相比客户手工基线压缩至少 30%
    - 少于 50% 的付费试点能转成量产合同，因为客户坚持把审批留在 OEM、集成商或电子表格工作流里
  mermaid: |
    flowchart LR
      Wedge[试点后汽车零部件 rollout 切口] --> MVP[审批包 MVP]
      MVP --> Proof[任务 launch 更快获批]
      Proof --> Expansion[跨站点、跨厂商扩张]
investorMemo:
  verdict:
    call: Watch
    conviction: 工作流痛点明确，购买触发也可信，但在独立预算归属和 pilot-to-production 的可重复转化跑通前，判断仍应保持中等强度。
    whyBelieve: 一家 Tier-1 的具名 rollout，再加上不断加重的安全和质量文档负担，让任务审批有机会成为可适应工厂机器人的新控制点。
    whyDoubt: 周边现有厂商很密，加上买家很容易把事情做成服务项目；如果审批继续被绑在 OEM、集成商或 APQP 咨询里，公司就可能失手。
    nextDiligence: 去验证一个多工厂汽车供应商里的付费试点，是否真能带来可测量的周期缩短，并有把合同转成年费网络订阅的可信路径。
  firstCustomer:
    title: 多工厂汽车零部件制造工程负责人
    profile: 一个拥有 5-20 座工厂的北美供应商集团，已经上线一个可适应机器人任务，中央制造工程团队正承受压力，要在两个或更多站点批准相似的线边任务。
    trigger: 一个付费试点或首个量产任务达标后，总部要求团队在同一轮预算内，把这套部署复制到相邻任务或更多工厂。
    buyer: 制造工程 VP
    initialContract: 一个 $75K-$125K 的付费试点，覆盖一个平台和 3 个任务族；如果审批周期和 launch 结果改善，再转成约 $200K-$350K 的年度网络软件加支持合同。
  mustBeTrue:
    - 至少 5 个目标供应商集团确认：试点后的任务审批是一个值得单列预算的痛点，且它不同于机器人编程、安全控制或通用质量软件。
    - 一个试点就能在不降低质量和安全审核标准的前提下，把第二个任务的审批周期或工程投入至少压缩 30%。
    - 在客户要求更深的 MES、QMS 或 OEM 系统控制之前，先接受只读 overlay 和导出的证据包。
    - 至少一半的成功试点会转成年费量产合同，而不是停留在集成商主导的服务项目。
    - 跨厂商中立性足够重要，以至于混合机器人栈的供应商更愿意采用工厂自有的审批记录，而不是只靠 OEM 专属工具。
  diligenceQuestions:
    - 今天给第二个机器人任务过审时，最难拼的到底是哪份资料：风险评估、作业指导、control plan 证据，还是操作员培训证明？
    - 目标客户里，任务审批的 system of record 到底归谁：制造工程、供应商质量、EHS，还是某个现有 QMS？
    - 当前痛点里，有多少来自文档工作流，有多少来自软件根本消不掉的机器人性能不确定性？
    - 对一个制造工程 VP 来说，试点后要把这件事买成长期软件，最低要看到多大的 KPI 改善？
    - 当 OEM 或集成商已经在支持 rollout 时，究竟还差哪一步，才会让工厂网络再补一个独立审批层？
operatingAssumptions:
  - assumption: 买家会在首个机器人任务量产成功后，为独立的审批工作流买单。
    basis: research.yaml
    validationTest: 在客户已经使用 OEM、仿真或质量工具的前提下，至少签下 3 个付费试点，并明确基线 KPI，证明客户仍愿意额外签一份审批软件合同。
    decisionImpact: 如果不成立，公司就该转成 OEM 或集成商渠道里的合作模块，或做带服务的嵌入式工作流，而不是坚持独立平台。
  - assumption: 基于导出文件的 ingest 和只读工作流，已经足够让首版产品证明周期缩短和可审计性提升。
    basis: idea.yaml
    validationTest: 跑 3 次共创客户工作流重建，确认团队不用深度回写集成，也能生成被审阅方接受的 launch packet。
    decisionImpact: 如果不成立，实施成本和销售摩擦都会明显上升，滩头市场就必须继续收窄到系统更干净、平台更统一的客户。
  - assumption: 只要聚焦一个机器人平台和少数几个重复性任务族，就足以在一个工厂网络里沉淀出可复用模板。
    basis: idea.yaml
    validationTest: 在首个试点里，把初始任务的审批结构至少 60% 复用到另外 2 个任务上，而且改动范围可控。
    decisionImpact: 如果不成立，产品很容易塌回到定制工程服务，届时要么进一步收窄到单一工作流，要么放弃任务族定价。
  - assumption: 一旦 startup 证明它能提升 rollout 成功率，OEM 和系统集成商的转介绍会变成有效渠道。
    basis: research.yaml
    validationTest: 在首个量产案例后的 9 个月里，让至少 25% 的合格 pipeline 和 1 个付费试点来自合作伙伴转介绍。
    decisionImpact: 如果不成立，公司就该更久地维持创始人主导销售，并推迟依赖合作渠道的招聘和扩张计划。
  - assumption: 即便企业需求很重，业务依然能把部署标准化到足以维持软件式毛利率。
    basis: operator judgment
    validationTest: 到第 5 次部署时，在客户结果指标不变的前提下，把单客户实施工时较前两个试点至少压缩 30%。
    decisionImpact: 如果不成立，公司就该提高 onboarding 费用、进一步收窄 ICP，或者接受一个毛利更低、服务更重的模型。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 收集 10-15 次访谈和 3 份脱敏审批包，访谈对象覆盖目标制造工程团队、供应商质量和 EHS 相关方。
    hypothesis: 最强购买触发点就是试点后的复制要求，而反复卡住团队的是拼审批证据，不是给机器人编程。
    successMetric: 8 次访谈确认了具名触发点、当前工作流 owner，以及每次任务审批的可量化时间或工时基线。
    owner: CEO
  - horizon: 0–90 天
    experiment: 用共创客户导出的 SOP、风险评估和试跑笔记，重建一条历史上的“第二个任务审批”工作流。
    hypothesis: 不做深度系统集成，也能把现有资料归一成一个可复用的审批包。
    successMetric: 一份审批包草案被客户团队认定为“基本完整”，并能反推出 MVP 的最小数据模型。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 在一个机器人平台上跑 2 个付费试点，每个试点覆盖 3 个任务族。
    hypothesis: 一个聚焦试点足以把审批周期和返工压到值得买年费量产合同的水平。
    successMetric: 签下 2 个试点，且至少 1 个试点相对基线实现 30%+ 的周期或工程工时改善。
    owner: CEO
  - horizon: 90–180 天
    experiment: 上线 APQP、control plan 和安全审查资料的导出模板，再补一个机器人日志连接器。
    hypothesis: 只要输出能嵌进现有质量流程和评审会议，买家对软件的信任会建立得更快。
    successMetric: 2 个试点客户在真实签核评审里使用生成的导出文件，而不需要并行重做一套手工文档。
    owner: 产品与领域负责人
  - horizon: 6–12 个月
    experiment: 在首个付费试点后，测试一个 OEM 或集成商转介绍渠道。
    hypothesis: 只要合作方本身也承担部署风险，当他们需要一份中立审批记录来帮助扩张成功时，就会愿意把 startup 介绍进来。
    successMetric: 从合作伙伴拿到 5 个合格机会和 1 个已关闭试点。
    owner: GTM 负责人
  - horizon: 12–18 个月
    experiment: 基于早期客户的审批周期、偏差和 launch 结果数据，上线 benchmark 模块。
    hypothesis: 跨客户 benchmarking 会提高续约概率，也会让护城河不止停在文档工作流层面。
    successMetric: 前 3 个量产客户会在季度 rollout 复盘或续约讨论中实际使用 benchmark 输出。
    owner: 产品负责人
operations:
  - 部署开始前，先给每个试点建立审批周期、工程工时、试跑返工和量产首月异常的基线。
  - 早期部署坚持只读、坚持导出驱动，让产品在信任还没完全建立前就能跟 QMS、MES、仿真和 OEM 工具共存。
  - 按任务族和机器人平台维护受控模板，覆盖风险评估、操作员交接、control plan 证据和异常日志。
  - 试点期间每周都拉制造工程、供应商质量和 EHS 开治理复盘，把 override 和缺失证据及时补齐。
  - 把平台适配和文档映射沉淀成可重复 playbook，避免早期客户把团队拖进没有边界的服务项目里。
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 在客户认知和采购路径都没定型前，必须亲自扛起企业销售、共创客户范围界定和首批量产转化。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 负责把工作流引擎、证据模型和首个平台适配器做出来，这三样共同决定产品的核心切口。
  - role: 产品与制造业领域负责人
    startTiming: 第 0 个月
    rationale: 把 APQP、control plan、安全和操作员交接要求翻成客户愿意信任的产品逻辑。
  - role: 解决方案架构师
    startTiming: 第 4 个月
    rationale: 把集成、文档导出和部署 QA 标准化，避免试点一路滑成定制咨询。
  - role: 部署与客户成功负责人
    startTiming: 第 6 个月
    rationale: 负责试点埋点、每周治理复盘和转化准备，避免续约完全绑在创始人身上。
  - role: GTM 与合作伙伴负责人
    startTiming: 第 12 个月
    rationale: 至少要等一个量产案例站住以后，再去放大 OEM、集成商和质量生态的渠道。
milestones:
  - horizon: 0–12 个月
    items:
      - 在定义好的汽车零部件滩头市场里拿下 2-3 个付费试点。
      - 依靠导出式 ingest，为第二个机器人任务生成一份被客户接受的审批包。
      - 至少把 1 个试点转成年费量产合同，并拿到可量化的 KPI 改善。
  - horizon: 12–24 个月
    items:
      - 在一个或两个机器人平台上，支持 4-6 个量产工厂网络。
      - 把 APQP、control plan 和安全导出模板，以及最常见的平台适配器标准化。
      - 证明至少 1 个来自合作伙伴的试点，以及 1 次发生在现有客户集团内部的跨站点扩张。
  - horizon: 24–36 个月
    items:
      - 覆盖 8 个量产工厂网络，跑到模型里的第 3 年 SOM 路径。
      - 把 benchmark analytics 和混合厂商资质审批归一化做成核心续约驱动。
      - 判断是否有足够的可重复性和渠道证据，支持扩到相邻工业垂直行业。
risks:
  - risk: OEM 或自主化厂商把“够用”的审批模板直接做进自己的部署栈里。
    likelihood: Medium
    impact: High
    mitigation: 坚持跨厂商定位，拿住工厂自有的证据和审计历史，并与混合车队集成，而不是去跟对方比机器人执行层。
  - risk: 早期客户要太多个性化工程和文档工作，吞掉软件毛利。
    likelihood: High
    impact: High
    mitigation: 首个 offer 只覆盖一个平台和少数几个任务族，onboarding 单独收费，并拒绝超出产品模板模型的开放式定制任务工程。
  - risk: 买家继续把审批支出埋在集成商或自动化项目预算里，不愿为独立软件买单。
    likelihood: Medium
    impact: High
    mitigation: 卡住试点后扩张的触发点来卖，用基线 ROI 指标切入，同时培育 OEM 和集成商渠道，在直接预算薄弱时由他们来赞助这条工作流。
  - risk: 真正的瓶颈可能是机器人可靠性或工艺波动，而不是文档和审批工作流。
    likelihood: Medium
    impact: High
    mitigation: 通过早期调研和试点，把工作流延迟与技术性任务失败拆开，只聚焦机器人能力已经被验证过的可重复任务族。
  - risk: 不同客户之间的汽车质量与安全要求差异太大，短期内难以长出可重复产品。
    likelihood: Medium
    impact: Medium
    mitigation: 先从日系 OEM 相关的供应商集团打起，围绕共同的 APQP、control plan 和标准驱动资料做标准化，再逐步放宽客户类型。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的跑道应足以养起创始产品团队、首批领域和方案岗位、2-3 个付费试点、第一批平台适配器与文档模板，并积累出足够的客户证据，判断这究竟能做成独立软件，还是只能做成嵌在合作伙伴里的工作流。
