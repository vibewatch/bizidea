topRisks:
  - name: "OEM bundling"
    description: "Robot vendors may add basic task-template and approval tooling into their own deployment stacks."
    mitigation: "Stay cross-vendor and own the plant-side evidence, sign-off, and workflow history that manufacturers need across mixed robot fleets and sites."
  - name: "Services creep"
    description: "Early customers may request custom engineering for each new task, pushing the company toward integrator economics."
    mitigation: "Package the first deployments around fixed task families and productize templates, acceptance criteria, and rollout reports before broad expansion."
  - name: "Weak standalone budget line"
    description: "Some plants may still bury task qualification inside broader automation projects instead of buying separate software."
    mitigation: "Sell at the post-pilot expansion moment with ROI tied to faster multi-task rollout, fewer launch defects, and better reuse of scarce engineering time."
