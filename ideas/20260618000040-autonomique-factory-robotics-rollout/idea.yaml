differentiator: >-
  Most robotics software around factories focuses on fleet management, robot
  programming, or initial cell commissioning. This company owns the narrower
  but newly urgent layer between a successful first deployment and the next
  ten approved tasks: work-instruction translation, qualification evidence, and
  operator-ready rollout packets. That creates defensibility through a growing
  dataset of task-level acceptance criteria, failure modes, and reusable
  approval templates that neither OEMs nor system integrators see across many
  customers.
