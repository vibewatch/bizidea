    and Mexico sites.
  buyingTrigger: >-
    A paid pilot hits production goals and headquarters asks the factory
    engineering team to replicate the robot on additional tasks or at the next
    plant within the same budget cycle.
  currentAlternative: >-
    System-integrator playbooks, spreadsheet work instructions, robot OEM
    dashboards, manual line trials, and plant-specific sign-off meetings.
  switchingReason: >-
    The first customer switches because the product converts each approved task
    into a reusable launch packet, cutting the engineering time and rework
    required to prove the next task is safe, precise, and production-ready.
  pricingHypothesis: >-
    Annual subscription priced by plant network and number of task families
    under qualification, with setup fees for the first robot platform adapter.
