jobsToBeDone:
  - job: "When one robot task succeeds in production, help our manufacturing engineering team qualify the next similar task quickly, so we can expand automation without restarting the approval process from scratch."
    currentAlternative: "Spreadsheet-based work instructions, integrator notes, and manual line trials."
    successMetric: "Time to approve a new robot-assisted task falls from months to a few weeks."
  - job: "When a new line-side robot task misses takt time or quality targets in trial runs, help our plant team isolate what changed, so we can fix rollout issues before they hit production output."
    currentAlternative: "Ad hoc debugging across robot OEM tools, supervisor logs, and offline engineering meetings."
    successMetric: "Percentage of new task launches that hit target cycle time and first-pass quality without major rework."
