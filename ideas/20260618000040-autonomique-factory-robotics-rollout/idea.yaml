problem: >-
  Once a semi-humanoid robot proves it can handle one live factory task,
  manufacturers immediately want to reuse it for adjacent kitting, handling,
  inspection, or line-support work. But every new task requires different work
  instructions, quality tolerances, operator handoffs, cycle-time targets, and
  safety evidence, so rollout teams fall back to spreadsheets, integrator
  tribal knowledge, and plant-by-plant sign-off meetings. That makes adaptable
  factory AI paradoxically harder to scale than fixed automation: the robot is
  flexible, but the approval process for each new task is not.
targetUser:
  primary: "Director of manufacturing engineering at a 5-20 plant auto-parts group supplying Japanese OEM platforms and expanding one semi-humanoid robot platform from a first Canadian production task into adjacent line-side workflows."
  secondary: "Plant industrial engineering manager responsible for work instructions, takt-time validation, and operator handoff on new robot-assisted tasks."
  buyer: "VP of manufacturing engineering or head of automation."
startupThesis:
  nonObviousInsight: >-
    The scarce asset in flexible factory robotics is no longer just robot
    hardware or a successful pilot. It is the qualification layer that proves a
    retaskable robot can perform the next job with the right precision,
    operator interaction, and fallback behavior. As physical AI gets more
    adaptable, the highest-friction bottleneck moves from installing one robot
    cell to certifying dozens of task variants.
  beachhead: >-
    Honda- and Toyota-linked auto-parts manufacturers using one semi-humanoid
    platform in live production and needing to approve that platform for
    repetitive kitting, line-side replenishment, and inspection-handoff tasks
    across a small network of existing plants.
  wedge: >-
    A robot task qualification OS that turns one approved production task into
    reusable work-instruction templates, acceptance tests, operator handoff
    steps, and evidence packets for the next task rollout.
  whyNowCatalyst: >-
    Autonomique's move from paid pilot to production, plus the stated plan to
    expand across multiple tasks and global F.tech sites, makes task-by-task
    qualification the new bottleneck for embodied AI rollout.
  ventureScalePath: >-
    Start with auto-parts task qualification, then become the cross-vendor
    system of record for embodied-AI change control across electronics,
    logistics, aerospace, and other factories that retask robots frequently.
solution: >-
  The product would ingest standard operating procedures, robot-task programs,
  quality checkpoints, cycle-time targets, and operator touchpoints for one
  proven production task, then generate a qualification package for the next
  task candidate. Manufacturing engineering teams would use it to compare new
  tasks against prior approved motions, safety assumptions, required tooling,
  and human escalation steps before line trials begin. During rollout, the
  system would track dry runs, defect observations, takt-time results, and
  supervisor sign-off in one workflow, replacing scattered spreadsheets and
  email threads. Over time, the software would accumulate the deepest library
  of reusable task recipes and failure patterns for adaptable factory robots in
  brownfield auto plants.
goToMarketSeed:
  firstCustomer: >-
    A 7-plant North American auto-parts supplier that has one Autonomique-style
    semi-humanoid task live in Canada and a central manufacturing team trying
