  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Leads[创始人 + 合作伙伴 pipeline] --> Pilots[付费试点]
      Pilots --> Networks[量产工厂网络]
      Networks --> Revenue[混合 ACV 收入]
      Revenue --> GrossProfit[扣除 onboarding COGS 后的毛利]
      GrossProfit --> Cash[扣除薪资和 opex 后的现金]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下的 Y3 收入，来自 8 个工厂网络、每个网络约 $300K 的 blended ACV；这与 business plan 和 research 里使用的 SOM 逻辑完全一致。
- checkName: 必须成立的前提
  finding: 前 2-3 个付费试点里，至少一半要在约 9 个月内转化，公司才能在不提前扩招的情况下，于 Q4Y2 达到 6 个量产网络。
- checkName: 模型失效条件
  finding: 如果销售周期拉长到 12 个月，或毛利率卡在 65% 左右，下行情景会把现金压到约 $500K，届时公司很难讲出一轮 seed 能接受的故事。
- checkName: 下一轮融资证明点
  finding: 只有当这笔 pre-seed 资金换来 6 个量产网络、1 个合作伙伴转介绍试点，以及一套可重复的“导出 + 适配器”部署动作时，下一轮融资才算站住。
sanityChecks:
  ruleOf40: Y3 growth 62.2% + EBITDA margin 0.4% = 62.6%.
  burnMultiple: 'Y2 的 burn multiple 约为 0.5x：$478.8K EBITDA burn，对应从 3 个网络增长到 6 个网络、约 $900K 的净新增 ARR。'
  revenuePerFte: 以年末 8 FTE 计算，Y3 每名员工约对应 $281K 收入，算过得去，但仍处在 $200K-$400K 企业软件基准的较低一端。
  flags:
  - 模型假设独立预算归属会很快形成，因此第 1 年能拿到 3 个付费试点、Q4Y2 前能做到 6 个量产网络；但这一点在研究里还没有被证实。
  - Y1 和 Y2 的毛利率都低于 70% 目标，因为 onboarding 和文档映射在公司早期仍占不小比重。
  - LTV/CAC 看起来很亮眼，但它仍建立在经验性 churn 假设之上，而不是多年的真实续约数据。
