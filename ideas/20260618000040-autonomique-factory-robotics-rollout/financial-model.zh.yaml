scenarios:
  downside:
    description: 捆绑式竞争和更长的审批周期会让业务更偏服务化，并把客户转化节奏整体往后推。
    y3RevenueK: 1550.0
    y3EbitdaK: -330.0
    cashLowPointK: 520.0
    keyAssumptionChanges:
    - 混合 ACV 从 $300K 降到 $275K。
    - 稳态毛利率卡在 65%，而不是 70%。
    - 销售周期从约 9 个月拉长到 12 个月。
    - Q4Y3 的量产网络数从 8 个掉到 6 个。
  base:
    description: 基准情景假设，第 1 年的 3 个付费试点能在 Q4Y2 前转成 6 个量产网络，并在 Q4Y3 前达到 8 个，同时毛利率逐步贴近 BP 目标。
    y3RevenueK: 2250.0
    y3EbitdaK: 9.6
    cashLowPointK: 1103.9
    keyAssumptionChanges:
    - 混合 ACV 维持在约 $300K，与 BP 对第 3 年 SOM 的假设一致。
    - 随着 onboarding 越来越模板化，毛利率在 Y3 达到 70%。
    - 销售周期维持在约 9 个月，靠创始人主导销售加有选择的合作伙伴转介绍推进。
    - Q4Y3 达到 8 个量产网络，与 BP 的 SOM 路径一致。
  upside:
    description: 案例研究和合作伙伴转介绍会把扩张提前、把定价抬高，也让模型更早进入 EBITDA 转正。
    y3RevenueK: 2750.0
    y3EbitdaK: 290.0
    cashLowPointK: 1210.0
    keyAssumptionChanges:
    - 当客户加购分析和混合厂商治理模块后，混合 ACV 从 $300K 提高到 $325K。
    - 稳态毛利率从 70% 提升到 72%。
    - 销售周期从约 9 个月压缩到 7 个月。
    - Q4Y3 的量产网络数从 8 个提高到 9 个。
