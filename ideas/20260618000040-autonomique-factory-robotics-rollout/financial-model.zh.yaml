slug: robot-task-qualification-os
date: '2026-06-18'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: 从 2026-06-18 的 business-plan 日期之后的首个完整月份开始。
- id: A2
  name: 期初付费工厂网络数（M1）
  value: '0'
  unit: count
  source: '[BP milestones; BP product.sixMonth] 计划启动时还没有签下任何付费试点，所以 M1 的付费客户网络数是 0。'
- id: A3
  name: 混合年化客户价值
  value: $300.0K ARR per plant network
  unit: usdK_per_year
  source: '[BP gtm.pricing; BP market.som; research.market.som] BP 把量产合同定价在 $200K-$350K，并且明确用 8 个网络、每个约 $300K blended ACV 来推演第 3 年 SOM。'
- id: A4
  name: 收入确认方法
  value: $25.0K per active customer-month; new logos counted at roughly half-period contribution in the month or quarter they land
  unit: usdK_per_customer_month
  source: '[A3; BP investorMemo.firstCustomer.initialContract] $300K 的年化价值对应每月 $25K 收入，而半周期计入口径能让早期试点节奏与 BP 的 $75K-$125K 付费试点框架保持一致。'
- id: A5
  name: 客户爬坡
  value: 3 paying networks by M12, 6 by Q4Y2, and 8 by Q4Y3
  unit: customers
  source: '[BP milestones; BP market.som; BP product.twelveMonth] 这个爬坡路径对应第 1 年的 2-3 个付费试点、12-24 个月的 4-6 个量产网络，以及 BP 第 3 年 8 个网络的 SOM 情景。'
- id: A6
  name: 毛利率爬坡
  value: 45%-65% in Y1, 62%-68% in Y2, and 68%-70% in Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct; BP operatingAssumptions] 早期部署要扛 onboarding 和模板映射的人力成本，等适配器和导出模板标准化后，毛利率再逐步靠近 BP 的 70% 目标。'
- id: A7
  name: 月流失率
  value: 1.2%
  unit: percent
  source: 面向粘性较强、但仍未经验证的工业企业工作流软件的创业财务经验值：合同按年签，实施工作不轻，且存在一定的现有厂商捆绑风险。
- id: A8
  name: 完全摊销 CAC
  value: $160.0K per production customer
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP risks; research.reportMemo.buyingTriggers] 创始人主导的企业销售、工厂现场出差、试点支持和合作伙伴 enablement，都会把 CAC 明显抬到高于中端 SaaS 常模的水平。'
- id: A9
  name: 全成本薪资带
  value: Founder/CEO $120K; engineering $170K; product/domain $160K; solutions $150K; deployment/CS $130K; sales/partnerships $150K; G&A $110K
  unit: usdK_per_fte_year
  source: 面向精干 pre-seed 工业 B2B 软件团队的创业财务经验值：创始人现金薪酬偏克制，早期优先补重领域能力的岗位，而不是堆大销售团队。
- id: A10
  name: 人员爬坡快照
  value: Founder/CEO 1/1/1/1/1/1; engineering 1/1/1/1/2/2; product/domain 1/1/1/1/1/1; solutions 0/1/1/1/1/1; deployment/CS 0/0/1/1/1/1; sales/partnerships 0/0/0/1/1/1; G&A 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale; BP milestones] 模型在第 1 年完全按 BP 的招聘顺序走，只在第 2 年加 1 个工程师、第 3 年加 1 个 G&A，以保持资本效率。'
- id: A11
  name: 非薪资职能运营开支
  value: Y1 $20K-$35K per month, Y2 $95K-$110K per quarter, and Y3 $90K-$105K per quarter
  unit: usdK
  source: 创业财务经验值，覆盖差旅、云成本、安全合规、保险、法务和客户现场支持，叠加在 BP 的 headcount 计划之上。
- id: A12
  name: Y1 之后的薪资时点
  value: Second engineer added in Y2 and first dedicated G&A hire added at the start of Y3; no extra sales headcount is pulled forward before partner proof exists
  unit: method
  source: '[BP team; BP operatingAssumptions; BP milestones] BP 要等案例证明出来后才放大渠道，因此首个 GTM 岗位之后的人力爬坡会更慢。'
- id: A13
  name: pre-seed 交割后的期初现金
  value: $2.4M
  unit: usdM
  source: '[BP fundingAsk] BP 计划募集 $2M-$4M 的 pre-seed 资金；模型采用 $2.4M，视为既能支撑到 6 个网络里程碑、又留有缓冲的最低可信融资额。'
- id: A14
  name: 下行情景增量
  value: $275K ACV, 65% steady-state gross margin, 12-month sales cycle, and 6 networks by Q4Y3
  unit: scenario_inputs
  source: '[BP risks; research.sensitivityCases; research.categoryDynamics.headwinds] 下行情景假设转化更慢、捆绑竞争更强、服务化 onboarding 持续时间比计划更长。'
- id: A15
  name: 上行情景增量
  value: $325K ACV, 72% steady-state gross margin, 7-month sales cycle, and 9 networks by Q4Y3
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones; research.reportMemo.partnershipEcosystem] 上行情景假设 benchmark analytics 和合作伙伴转介绍同时抬升定价、速度和扩张规模。'
- id: A16
  name: 现金转化简化假设
  value: Ending cash rolls from EBITDA with no debt, capex, or tax lines
  unit: method
  source: 轻资产 pre-seed 软件公司的创业财务经验值：营运资本波动相对经营性亏损很小，因此不单独展开债务、capex 或税项。
