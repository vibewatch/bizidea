scenarios:
  downside:
    description: OEM 落地和法务放行一起延后，坐席定价更接近 $15，试点转化也低于计划。
    y3RevenueK: 990.0
    y3EbitdaK: -720.0
    cashLowPointK: 90.0
    keyAssumptionChanges:
      - 坐席单价从 $18 降到 $15。
      - 试点转生产率从 60% 降到 40%。
      - OEM 和授权审批把大多数新 logo 推迟了两个季度。
      - 月度流失率从 2.0% 升到 3.0%。
  base:
    description: 创始人主导的试点在 Q4Y3 前转出 12 个进入生产的 logo，同时招聘严格跟着里程碑走，毛利率进入低 70% 区间。
    y3RevenueK: 1410.0
    y3EbitdaK: -521.0
    cashLowPointK: 450.0
    keyAssumptionChanges:
      - 生产 logo 数在 Y1 达到 2 个、Y2 达到 5 个、Y3 达到 12 个。
      - 坐席定价守在 $18，先以 500 席落地，再扩到 700 席。
      - 毛利率从 Y1 的 69% 升到 Y3 的 73%。
      - 销售、客户成功和合作伙伴岗位，都在试点与生产里程碑达成后才追加。
  upside:
    description: 两条 OEM 渠道按时打开，销售周期缩短，而且更多客户在年内扩到了第二站点。
    y3RevenueK: 1785.0
    y3EbitdaK: -120.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - 销售周期从 9 个月压缩到 6 个月。
      - Q4Y3 前的生产 logo 数达到 14 个。
      - 成熟客户更快扩向 700 席部署。
      - 随着实施标准化，毛利率升到 76%。
sensitivity:
  - variable: ARPU
    downsideCase: "$15 per seat per month with slower seat expansion"
    baseCase: "$18 per seat per month with 500-seat land and 700-seat expansion"
    upsideCase: "$18 per seat per month with faster 700-seat rollout across mature logos"
    y3RevenueImpactK: -235.0
    cashImpactK: -170.0
  - variable: CAC
    downsideCase: "$90K CAC because more founder and solutions time is needed per logo"
    baseCase: "$70K CAC"
    upsideCase: "$55K CAC from OEM and workflow-partner assisted distribution"
    y3RevenueImpactK: -60.0
    cashImpactK: -150.0
  - variable: churn
    downsideCase: "3.0% monthly logo churn from weak ROI proof or policy pushback"
    baseCase: "2.0% monthly logo churn"
    upsideCase: "1.0% monthly logo churn with strong multi-site stickiness"
    y3RevenueImpactK: -120.0
    cashImpactK: -95.0
  - variable: sales cycle
    downsideCase: "12 months from first meeting to production contract"
    baseCase: "9 months"
    upsideCase: "6 months with paid pilots attached to OEM refresh cycles"
    y3RevenueImpactK: -260.0
    cashImpactK: -220.0
  - variable: gross margin
    downsideCase: "68% because implementation and OEM support stay services-heavy"
    baseCase: "73%"
    upsideCase: "76%，前提是集成与导入手册逐步标准化"
    y3RevenueImpactK: 0.0
    cashImpactK: -70.0
  - variable: hiring pace
    downsideCase: "Second AE, partnerships, and finance hires are pulled forward by two quarters"
    baseCase: "All non-core hires are milestone-tied"
    upsideCase: "Back-office and one GTM hire are delayed until more than 8 production logos"
    y3RevenueImpactK: -20.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      TargetAccounts --> QualifiedPipeline
      QualifiedPipeline --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> MonitoredSeats
      MonitoredSeats --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingSpend
      OperatingSpend --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景的收入来自 Y1 把两个创始人主导的付费试点转成生产，Y2 做到五个客户，随后在 Q4Y3 扩到十二个、平均 700 席的 logo。
  - checkName: 必须跑通的前提
    finding: 这个模型依赖 OEM 数据权和员工授权流程都足够顺，才能把试点转生产率守在 BP 目标的 50%+ 附近。
  - checkName: 模型会失效的情况
    finding: 如果销售周期拉长到 12 个月，或定价明显低于每席 $18，下行情景会让公司在下一轮融资前接近现金耗尽。
  - checkName: 下一轮融资证明点
    finding: 当公司拿到五个进入生产的 BPO 客户、一次多站点扩张，以及两种 OEM 遥测来源下的可复制实施能力时，seed 轮故事最扎实。
sanityChecks:
  ruleOf40: "Y3 增长 136% + EBITDA 利润率 -37% = 99%；方向上很强，但被较小的 Y2 收入基数放大了。"
  burnMultiple: "Y2 的 burn multiple 约为 1.7x，Y3 随着经常性坐席收入扩得比 burn 更快，改善到约 0.4x。"
  revenuePerFte: "$134K Y3 on average 10.5 FTE (benchmark $200–400K SaaS)"
  flags:
    - 基础情景里 Y1 要成功转化两个付费试点；只要有一个延后，现金曲线就会明显恶化。
    - 到 Y3 为止，每个 FTE 对应收入仍低于成熟 SaaS 常模，因为集成、授权流程和实施工作依然偏重人力。
    - 现金流假设 EBITDA 基本等于现金 burn；试点开票和年度预付的营运资金节奏，仍需在真实合同里验证。
    - Y3 计划仍依赖 OEM 数据权协议，以及在受控试点之外也能守住 50%+ 员工加入率。
