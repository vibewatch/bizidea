scenarios:
  downside:
    description: OEM 推出节奏和法务签字双双推迟，席位定价更接近 $15，试点转化率也低于计划。
    y3RevenueK: 990.0
    y3EbitdaK: -720.0
    cashLowPointK: 90.0
    keyAssumptionChanges:
      - 席位价格平均从 $18 降到 $15。
      - 试点转生产转化率从 60% 降到 40%。
      - OEM 和同意审批把大多数新 logo 推迟了两个季度。
      - 月度流失率从 2.0% 升到 3.0%。
  base:
    description: 创始人主导的试点在 Q4Y3 前转成 12 个生产 logo，同时招聘始终与关键里程碑挂钩，毛利率也抬升到 low-70s。
    y3RevenueK: 1410.0
    y3EbitdaK: -521.0
    cashLowPointK: 450.0
    keyAssumptionChanges:
      - 生产客户数在 Y1 达到 2 个，Y2 达到 5 个，Y3 达到 12 个。
      - 席位价格稳定在 $18，先落地 500 席，再扩到成熟的 700 席。
      - 毛利率从 Y1 的 69% 提升到 Y3 的 73%。
      - 只有在试点和生产里程碑达到后，才新增销售、客户成功和合作岗位。
  upside:
    description: 两个 OEM 渠道按时打开，销售周期缩短，而且更多 logo 在年末前扩展到第二个站点。
    y3RevenueK: 1785.0
    y3EbitdaK: -120.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - 销售周期从 9 个月缩短到 6 个月。
      - Q4Y3 前的生产 logo 达到 14 个。
      - 成熟 logo 更快扩向 700 席部署。
      - 随着实施流程标准化，毛利率升到 76%。
sensitivity:
  - variable: ARPU
    downsideCase: "$15 per seat per month with slower seat expansion"
    baseCase: "$18 per seat per month with 500-seat land and 700-seat expansion"
    upsideCase: "$18 per seat per month with faster 700-seat rollout across mature logos"
    y3RevenueImpactK: -235.0
    cashImpactK: -170.0
  - variable: CAC
    downsideCase: "$90K CAC because more founder and solutions time is needed per logo"
    baseCase: "$70K CAC"
    upsideCase: "$55K CAC from OEM and workflow-partner assisted distribution"
    y3RevenueImpactK: -60.0
    cashImpactK: -150.0
  - variable: churn
    downsideCase: "3.0% monthly logo churn from weak ROI proof or policy pushback"
    baseCase: "2.0% monthly logo churn"
    upsideCase: "1.0% monthly logo churn with strong multi-site stickiness"
    y3RevenueImpactK: -120.0
    cashImpactK: -95.0
  - variable: sales cycle
    downsideCase: "12 months from first meeting to production contract"
    baseCase: "9 months"
    upsideCase: "6 months with paid pilots attached to OEM refresh cycles"
    y3RevenueImpactK: -260.0
    cashImpactK: -220.0
  - variable: gross margin
    downsideCase: "68% because implementation and OEM support stay services-heavy"
    baseCase: "73%"
    upsideCase: "76% after integration and onboarding playbooks standardize"
    y3RevenueImpactK: 0.0
    cashImpactK: -70.0
  - variable: hiring pace
    downsideCase: "Second AE, partnerships, and finance hires are pulled forward by two quarters"
    baseCase: "All non-core hires are milestone-tied"
    upsideCase: "Back-office and one GTM hire are delayed until more than 8 production logos"
    y3RevenueImpactK: -20.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      TargetAccounts --> QualifiedPipeline
      QualifiedPipeline --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> MonitoredSeats
      MonitoredSeats --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingSpend
      OperatingSpend --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景下，收入来自两次由创始人推动的付费试点在 Y1 转成生产，Y2 到达 5 个 logo，然后在 Q4Y3 前扩到 12 个、平均 700 席的 logo。
  - checkName: 必须顺利成立的前提
    finding: 这个模型依赖 OEM 数据权可得，以及员工同意工作流足够顺滑，才能把试点转生产率维持在 BP 目标的 50%+ 附近。
  - checkName: 模型会失效的情形
    finding: 如果销售周期拉长到 12 个月，或定价显著低于每席 $18，下行情景会让公司在下一轮融资前几乎烧光现金。
  - checkName: 下一轮融资证明点
    finding: 当公司拿下 5 个生产 BPO logo、1 个多站点扩张，并在两家 OEM 遥测源上形成可复制实施动作时，seed 故事最扎实。
sanityChecks:
  ruleOf40: "Y3 增长 136% + EBITDA margin -37% = 99%；方向上很强，但也被较小的 Y2 收入基数放大了。"
  burnMultiple: "以净新增 ARR 计，Y2 的 burn multiple 约为 1.7x；到 Y3，随着经常性席位收入增速快于 burn，这一数值改善到约 0.4x。"
  revenuePerFte: "$134K Y3 on average 10.5 FTE (benchmark $200–400K SaaS)"
  flags:
    - 基准情景里，Y1 有两个付费试点完成转化；只要其中一个延后，现金曲线就会明显变差。
    - 到 Y3，Revenue per FTE 仍低于成熟 SaaS 常见水平，因为集成、同意工作流和实施动作依然偏重人力。
    - 现金流假设 EBITDA 可以较好近似 burn；但试点开票和年付预收带来的营运资金时点，仍需在真实合同里验证。
    - Y3 计划仍然依赖 OEM 数据权协议，以及 50%+ 的员工 opt-in 能力，在受控试点之外同样成立。
