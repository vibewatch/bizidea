slug: cognitive-fatigue-ops
date: 2026-04-29
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: pre-seed 轮后的期初现金
    value: "2600000"
    unit: usd
    source: "[BP fundingAsk.targetFundingRangeUsd] 基础模型假设公司刚完成一笔 $2.6M 融资，位于既定 $2-3M 区间中部。"
  - id: A2
    name: 平均付费试点价格
    value: "45000"
    unit: usd per pilot
    source: "[BP gtm.pricing] 取已给出 $30,000-$75,000 试点区间的中位数。"
  - id: A3
    name: 试点时长
    value: "3"
    unit: months
    source: "[BP gtm.pricing] 把 8-12 周试点按 3 个月收入确认处理。"
  - id: A4
    name: 初始生产坐席单价
    value: "18"
    unit: usd per seat per month
    source: "[BP gtm.pricing; Research market.som] 采用 BP 定价上沿，并与研究里的 SOM 测算一致。"
  - id: A5
    name: 每个 logo 的初始生产坐席数
    value: "500"
    unit: seats
    source: "[BP executiveSummary; Research market.sam] 首个客户画像就是 500+ 坐席的外包联络中心。"
  - id: A6
    name: 每个 logo 的成熟生产坐席数
    value: "700"
    unit: seats
    source: "[Research market.som] SOM 假设 12 个 logo，平均每个 700 个被监控坐席。"
  - id: A7
    name: 年末生产 logo 数
    value: "Y1 2; Y2 5; Y3 12"
    unit: logos
    source: "[BP milestones; Research market.som] Y1 先证明试点转生产，Y2 做到 3-5 个生产客户，Y3 接近 12 个 logo 的 SOM。"
  - id: A8
    name: 试点转生产率
    value: "60"
    unit: percent
    source: "[BP gtm.funnelTargets] BP 目标是 50%+，模型用 60% 作为可信但不激进的基线。"
  - id: A9
    name: 毛利率爬坡
    value: "Y1 69%; Y2 71%; Y3 73%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 随着实施流程越来越标准化，毛利率温和爬升到 70% 目标之上。"
  - id: A10
    name: 月度 logo 流失率
    value: "2.0"
    unit: percent
    source: "创业财务经验值：早期企业 SaaS 的客户集中度高，模型比成熟 SaaS 更保守。"
  - id: A11
    name: 每个生产 logo 的 CAC
    value: "70000"
    unit: usd
    source: "创业财务经验值，基于创始人主导外呼、9 个月企业销售周期，以及大量靠付费试点转化。"
  - id: A12
    name: 平均销售周期
    value: "9"
    unit: months
    source: "[BP market.buyingProcess; BP gtm.channels] 涉及法务、HR、IT 和站点管理层评审的企业级 BPO 销售，按 9 个月建模。"
  - id: A13
    name: 团队扩张节奏
    value: "Q1Y1 3 FTE; Q4Y1 5; Q4Y2 9; Q4Y3 12"
    unit: fte
    source: "[BP team; BP milestones] 创始团队时点来自 BP，后续 GTM / CS 招聘只在生产客户累积后追加。"
  - id: A14
    name: 全成本薪酬
    value: "Founder 144K; Eng 174K; ML 198K; Product 162K; Solutions 150K; Sales 168K; CS 132K; Partnerships 156K; G&A 114K"
    unit: usd per year
    source: "创业财务经验值，采用美国早期团队薪资带，并加上 20% 税费和福利负担。"
  - id: A15
    name: 非薪酬运营支出
    value: "18K-28K per month"
    unit: usd per month
    source: "[BP operations] 覆盖云服务、数据工具、隐私/法务顾问、保险、差旅和获客工具。"
  - id: A16
    name: 现金流处理
    value: "EBITDA 近似代表经营现金变动"
    unit: policy
    source: "创业财务经验值：这一软件优先、pre-seed 阶段的案例不建债务、税、capex 或营运资金科目。"
  - id: A17
    name: 下一轮融资里程碑
    value: "5 个生产客户 logo、2 份 OEM 数据权协议、1 次多站点扩张，以及可重复的实施手册"
    unit: milestone
    source: "[BP milestones 0-12 months and 12-24 months; BP operatingAssumptions] 用这些节点来反推本轮融资规模，并额外留 6 个月缓冲。"
  - id: A18
    name: 下行情景定价底线
    value: "15"
    unit: usd per seat per month
    source: "[Research reportMemo.sensitivityCases] 研究里明确提到 $10/月 的清算情景；下行情景这里采用较温和但仍不利的 $15/月。"
