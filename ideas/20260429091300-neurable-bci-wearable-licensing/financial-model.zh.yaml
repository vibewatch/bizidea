slug: cognitive-fatigue-ops
date: 2026-04-29
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: pre-seed 轮融资后的期初现金
    value: "2600000"
    unit: usd
    source: "[BP fundingAsk.targetFundingRangeUsd] 基准模型假设在声明的 $2-3M 区间内，以 $2.6M 完成融资后立即起跑。"
  - id: A2
    name: 付费试点平均价格
    value: "45000"
    unit: usd per pilot
    source: "[BP gtm.pricing] 采用给定 $30,000-$75,000 付费试点区间的中位数。"
  - id: A3
    name: 试点时长
    value: "3"
    unit: months
    source: "[BP gtm.pricing] 将 8-12 周试点按 3 个月收入确认建模。"
  - id: A4
    name: 初始生产席位价格
    value: "18"
    unit: usd per seat per month
    source: "[BP gtm.pricing; Research market.som] 采用 BP 定价上沿，以及研究中 SOM 的计算口径。"
  - id: A5
    name: 每个 logo 的初始生产席位数
    value: "500"
    unit: seats
    source: "[BP executiveSummary; Research market.sam] 首个客户画像就是一个拥有 500+ 席位的外包联络中心。"
  - id: A6
    name: 每个 logo 的成熟生产席位数
    value: "700"
    unit: seats
    source: "[Research market.som] SOM 假设 12 个 logo，平均每个 700 个被监测席位。"
  - id: A7
    name: 年末生产客户数
    value: "Y1 2; Y2 5; Y3 12"
    unit: logos
    source: "[BP milestones; Research market.som] Y1 先证明试点转化，Y2 到达 3-5 个生产 logo，Y3 接近 12 个 logo 的 SOM。"
  - id: A8
    name: 试点转生产转化率
    value: "60"
    unit: percent
    source: "[BP gtm.funnelTargets] BP 目标是 50%+ 转化；模型采用 60% 的 blended 假设，可信但不激进。"
  - id: A9
    name: 毛利率爬坡
    value: "Y1 69%; Y2 71%; Y3 73%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 假设随着实施动作越来越可复制，毛利率会温和高于 70% 目标。"
  - id: A10
    name: 月度 logo 流失率
    value: "2.0"
    unit: percent
    source: "Startup-finance heuristic: 早期 enterprise SaaS logo 集中度高，因此按比成熟 SaaS 更保守的口径建模。"
  - id: A11
    name: 每个生产 logo 的 CAC
    value: "70000"
    unit: usd
    source: "Startup-finance heuristic anchored to founder-led outbound, 9-month enterprise sales motion, and paid-pilot-heavy conversion."
  - id: A12
    name: 平均销售周期
    value: "9"
    unit: months
    source: "[BP market.buyingProcess; BP gtm.channels] 企业级 BPO 销售需要经过法务、HR、IT 和站点管理层评审，因此按 9 个月建模。"
  - id: A13
    name: 人员爬坡
    value: "3 FTE at Q1Y1; 5 at Q4Y1; 9 at Q4Y2; 12 at Q4Y3"
    unit: fte
    source: "[BP team; BP milestones] 创始团队时间表来自 BP，后续 GTM / CS 招聘只在生产 logo 累积后逐步加。"
  - id: A14
    name: 全包薪酬
    value: "Founder 144K; Eng 174K; ML 198K; Product 162K; Solutions 150K; Sales 168K; CS 132K; Partnerships 156K; G&A 114K"
    unit: usd per year
    source: "Startup-finance heuristic using US early-stage salary bands plus 20% payroll tax and benefits load."
  - id: A15
    name: 非工资运营支出
    value: "18K-28K per month"
    unit: usd per month
    source: "[BP operations] 覆盖云资源、数据工具、法务/隐私顾问、保险、差旅和销售拓展工具。"
  - id: A16
    name: 现金流处理口径
    value: "EBITDA approximates operating cash movement"
    unit: policy
    source: "Startup-finance heuristic: 该软件优先、pre-seed 阶段案例中，不建模债务、税、capex 或营运资金授信。"
  - id: A17
    name: 下一轮融资里程碑
    value: "5 production logos, 2 OEM data-rights agreements, one multi-site expansion, repeatable implementation playbook"
    unit: milestone
    source: "[BP milestones 0-12 months and 12-24 months; BP operatingAssumptions] 用这些节点来倒推本轮融资规模，并额外留出 6 个月缓冲。"
  - id: A18
    name: 下行情景定价底线
    value: "15"
    unit: usd per seat per month
    source: "[Research reportMemo.sensitivityCases] 研究明确提到 $10/month 的清价情景；下行情景采用稍温和但仍偏不利的 $15/month。"
