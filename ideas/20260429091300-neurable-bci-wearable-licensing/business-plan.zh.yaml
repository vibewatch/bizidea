slug: cognitive-fatigue-ops
date: '2026-04-29'
executiveSummary: >-
  Cognitive Fatigue Ops 面向外包联络中心卖的是一层工作流软件：把 OEM
  耳机上的 EEG 遥测转成低风险的排班和辅导动作。第一个客户应该是美国或其他英语市场的 BPO，规模在
  500+ 个语音坐席，统一配发头戴式耳机，而且 QA 或离职压力已经摆上台面。第一版产品不碰临床推断，也不做自动化处分；它只建议微休息、队列再平衡和主管提示，并把这些动作和可量化的运营结果绑在一起。这个切口踩中的时间点，正是 Neurable 往授权路线转的时候——这意味着 EEG 的分发，很可能通过耳机 OEM 比创业公司自己造硬件扩得更快。前三年的市场看上去真实但不大：研究估算联络中心滩头市场的 TAM 约为 $88.8M，SAM 约为 $18.0M，第 3 年 SOM 约为 $1.8M。因此公司得尽快证明两件事：员工和法务团队愿不愿意接受非纪律性的 EEG 监测；以及疲劳信号能不能比现有 WFM 与 QA 代理指标更早给出干预窗口。在授权、ROI 和数据权还没被证明前，计划应当刻意避开欧洲、泛化员工监控，以及宽泛的健康软件。现有证据足以支撑持续跟踪，但还不够让人高确信约见，因为真实场景里的信号可靠性、买方采用和 OEM 数据权都还没跑通。
problem:
  - 联络中心通常要等到 QA 分数、合规错误或离职率恶化后，才会发现团队已经被过劳拖垮。
  - 固定休息表、主管经验、WFM 仪表盘和健康问卷这类现有替代方案，都抓不住班中认知过载。
  - 随着 EEG 进入日常耳机，买方仍缺一款可审计的工作流产品，把脑信号数据转成安全的运营动作。
solution:
  - 接入已授权 OEM 耳机的 EEG 遥测，给每名坐席做基线校准，并在班次维度产出疲劳、专注和恢复评分。
  - 把这些分数送进主管和 WFM 工作流，在表现恶化前先建议微休息、更低复杂度的队列分流和定向辅导。
  - 给员工提供可见的授权控制和个人趋势视图，同时把每次干预与结果都记成日志，让客户能证明这套系统是在预防问题，而不是做隐形监控。
whyWeWin:
  - 公司卖的不是硬件，也不是通用健康 App；它只攻一个工作流，而且员工本来就戴耳机、疲劳又直接影响单位经济模型。
  - 产品以叠加层的方式接入现有 WFM、QA 和耳机栈，比让 BPO 重换核心系统的切入成本低得多。
  - 如果试点跑通，公司会滚出一套很难复制的数据资产，把跨设备 EEG 信号、干预动作以及 QA 或离职结果连到几千个班次上。
strategicChoices:
  beachhead: 500-1000 名语音坐席、统一使用头戴式耳机、并且正在经历耳机更新或 QA 改进项目的英语外包客服中心。
  wedgeRationale: 这个细分市场本来就把休息遵守率、QA 和过劳当核心指标，所以低风险干预产品可以直接对着现有 KPI 做测试，不用让客户重构整套运营。更广义的雇主健康软件或横向 BCI 软件，买方会更模糊、触发更弱，ROI 也更难证明。
  sequencingRationale: 在任何自动化之前，先把授权、校准和建议工作流跑顺，因为法务信任和信号验证才是真正的卡点。前 2-3 个试点先由团队直接卖给运营负责人；只有当团队证明了可复制的试点转生产路径、且首批集成明显缩短部署周期后，才加上 OEM 打包和工作流伙伴分发。
  notYet:
    - 在美国主导部署和政策控制尚未证明前，不进入欧洲
    - 不做泛化员工监控或纪律评分
    - 不自研 EEG 硬件
    - 不碰 200 个坐席以下的小型联络中心
    - 在 BPO 打法还不能复制前，不扩到电话销售、远程医疗或调度场景
market:
  tam: 基于约 493,000 个可触达的语音/重度耳机场景外包联络中心坐席，按每个被监控坐席每月约 $15 估算，自下而上的 TAM 约为 $88.8M。
  sam: 面向 500+ 坐席、且具备试点准备度的英语外包联络中心，估算 SAM 约为 $18.0M。
  som: 以 12 个 BPO 客户、每家平均 700 个被监控坐席、每席每月约 $18 估算，第 3 年 SOM 约为 $1.8M。
  segments:
    - 服务电商或金融科技项目、且拥有 500+ 语音坐席的外包联络中心
    - 后续可扩到电话销售、远程医疗、调度等其他重度依赖耳机的运营场景
  buyingProcess: 预算大概率掌握在运营负责人或劳动力管理负责人手里，但 QA、HR、法务、IT 和站点管理层都会在部署前介入。最有可能撬开预算的触发，是耳机更新周期、过劳或离职飙升，或客户强推的 QA 改善项目，因为这些场景会让团队急着寻找新的干预杠杆。
product:
  mvp: 第 1 版是一层建议引擎，接入耳机遥测、完成坐席校准、生成疲劳与恢复评分，并把微休息和辅导建议连同员工授权控制一起展示出来。它应先支持影子模式和人工执行，并提供基础导出能力，把结果送进现有 WFM 或 QA 流程。
  sixMonth: 两个共创客户试点在影子模式下上线，具备授权工作流、校准面板、一个 WFM 集成，以及能把 EEG 驱动建议与现有 QA 和排班信号做对照的报表。
  twelveMonth: 至少有一个 BPO 进入生产部署，具备主管工作流、队列路由建议、按站点或项目输出的基准报表，以及对至少两个 OEM 耳机来源的支持。
  twentyFourMonth: 用同一套决策引擎进入相邻的重度耳机工作流，并向现有客户卖基准和政策模块，而不是去做泛化的健康平台。
  keyBets:
    - 消费级 EEG 在校准后，足以支撑低风险建议。
    - 只要产品明确不用于纪律处分、且员工看得见，坐席就愿意选择加入。
    - 现有 WFM 和 QA 系统足够开放，叠加层能插进去，而不会变成长周期替换项目。
    - 多 OEM 的跨设备归一化，最终会成为护城河，而不是售后负担。
gtm:
  wedge: 围绕一个 BPO 站点或项目卖付费试点；只要耳机更新、过劳压力或 QA 整改把决策窗口打开，就先把试点签下来。
  channels:
    - 由创始人主导外呼，直达目标 BPO 的运营副总裁和劳动力管理负责人
    - 围绕年度换机周期，与 OEM 和耳机打包渠道合作
    - 与 WFM、QA 和 BPO 治理软件厂商做集成与联合销售
  funnelTargets: 目标客户到合格试点对话转化率 20-30%，合格试点对话到付费试点 20-25%，付费试点到生产 50%+，生产后 12 个月内扩到第二个站点或新模块 50%+。
  pricing: 先收一个站点 8-12 周的付费试点，价格约 $30,000-$75,000；之后转成按年签的软件合同，按每个被监控坐席每月约 $12-$18 收费，并设年度起付门槛，对基准报表和更深的 WFM 或 QA 集成收取溢价。这样定价既低于大型 WFM 或 copilot 的支出，又能把价值直接挂到被监控劳动力规模和可量化的 QA / 离职结果上。
businessModel:
  revenueStreams:
    - 按被监控坐席收费的年度 SaaS 订阅
    - 付费试点与部署费用
    - 高级集成与基准模块
    - 后续扩展到相邻重度耳机工作流的增购模块
  unitOfValue: 在年度站点或企业合同下，按每个被监控坐席每月收费
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一个 BPO 客户内扩更多站点和项目
    - 销售基于汇总结果数据沉淀出的基准报表和干预打法
    - 从微休息建议扩到路由和辅导模块
    - 把同一套准备度引擎延伸到相邻的重度耳机工作流
strategyMap:
  northStarMetric: 进入生产的被监控坐席数，以及已验证的干预-结果跟踪规模
  inputMetrics:
    - 每季度合格 BPO 探索电话数量
    - 共创客户转化率
    - 从项目启动到影子模式部署的中位天数
    - 试点中的坐席选择加入率
    - 相比基线，试点在 QA 波动、休息遵守率或离职风险代理指标上的改善
    - 试点转生产率
  moatsToBuild:
    - 跨 OEM 的信号归一化与校准层
    - 连接疲劳分数、干预动作和运营结果的结果数据集
    - 能让法务、HR 和劳工相关方信任的政策与授权控制
    - 可复用的 WFM、QA 和治理系统集成
  killCriteria:
    - 前 12 个月里，20 次合格 BPO 对话后仍拿不到 2 个付费试点
    - 前两个试点即便明确不用于纪律处分，坐席选择加入率仍低于 50%
    - 90 天后，试点结果仍无法在统计上明显优于基线 QA 或过劳代理指标
    - 没有任何 OEM 伙伴愿意给生产部署所需的企业数据权
  mermaid: |
    flowchart LR
      Wedge[Contact-center fatigue wedge] --> MVP[Consent plus scoring plus recommendations]
      MVP --> Proof[Paid pilots with QA and burnout proof]
      Proof --> Expansion[Multi-site rollout and adjacent workflows]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口可信，也确实对准了具体工作流，但在付费试点里把授权、信号增益和 OEM 数据权跑通之前，判断强度应当保持克制。
    whyBelieve: 研究显示买方痛点真实、相邻软件预算已经存在，而且硬件分发正在发生变化，给应用层公司腾出了时间窗口。
    whyDoubt: 近端滩头市场不大，又被隐私、劳工和信号可靠性同时掐住；如果这些约束解不开，公司可能在品类做大前就先卡住。
    nextDiligence: 先拿下两个付费 BPO 试点，签好员工授权政策，并共同设一张记分卡，把 EEG 驱动的干预和现有 WFM、QA 方法逐项对比。
  firstCustomer:
    title: 500-1000 个坐席的外包客服中心里的运营副总裁
    profile: 服务电商或金融科技项目的 BPO，耳机配置标准化，WFM 集中管理，QA 波动明显，而且每年都有耳机采购周期。
    trigger: 耳机更新、过劳飙升，或客户对 QA 的升级施压，让管理层愿意尝试新的运营杠杆。
    buyer: 运营副总裁或劳动力管理负责人
    initialContract: 先签一个站点 8-12 周、价格约 $30,000-$75,000 的付费试点；如果试点能改善双方约定的运营指标并通过法务审查，再转成按每个被监控坐席每月约 $12-$18 的年度合同。
  mustBeTrue:
    - 前 10 个目标 BPO 里，至少有 3 家认为过劳或 QA 波动足够紧迫，愿意在今年出资做付费试点。
    - 至少有 2 家 OEM 或耳机伙伴，愿意开放生产级评分和审计日志所需的数据权限。
    - 在 90 天试点里，EEG 驱动建议至少在一个约定干预指标上优于现有 WFM 或 QA 代理信号。
    - 当产品明确不用于纪律处分、且员工可见时，过半数符合条件的坐席愿意选择加入。
    - 至少有 1 个试点会在上线后 6 个月内，以目标坐席价格带或更高水平转入生产。
  diligenceQuestions:
    - 哪些耳机 OEM 愿意给企业数据权，并支持 BPO 部署，而不只是卖消费级 App 打包方案？
    - 运营副总裁究竟会用哪一个 KPI 提升，来批准试点后的生产预算？
    - 劳工、HR 和法务会把“防过劳”和“监控”之间的边界画在哪里？
    - 相比现有的排班遵守率、QA、情绪或处理时长信号，EEG 到底能多给出多少增量？
    - 前 20 个目标客户最常用的是哪些 WFM 与 QA 系统，这些集成真实落地有多难？
  riskHeatmap:
    - risk: 员工或监管方反弹，把产品直接定性为监控
      likelihood: High
      impact: High
      leadingIndicator: 试点法务审查禁止进入生产，或在激励中性的授权设计下，坐席加入率仍低于 50%。
      mitigation: 第一版产品必须明确选择加入、不用于纪律处分、员工可见，而且只允许低风险干预并采用短周期数据留存。
    - risk: 真实场景里的 EEG 信号太嘈杂，撑不起运营价值
      likelihood: High
      impact: High
      leadingIndicator: 试点模型在校准后仍跑不赢基线 QA 或 WFM 代理指标，而且不同班次给出的建议前后不稳。
      mitigation: 先把输出限定为建议，要求校准期，在影子模式下对比基线，并避免任何高风险自动化。
    - risk: OEM 落地或企业数据接入比预期更慢
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户在更新周期内拿不到兼容耳机，或 OEM 合同限制生产数据导出。
      mitigation: 同时支持多个耳机伙伴，围绕换机窗口去卖，并在做深度集成前优先把数据权尽调做透。
    - risk: 现有 WFM 和 QA 厂商在公司拿到证据前就把工作流吃掉
      likelihood: Medium
      impact: Medium
      leadingIndicator: 买方反复要求只把这项能力作为 NICE、Observe.AI 等系统的附加功能，而不愿做点状试点。
      mitigation: 把自己定位成差异化的神经数据层，先接入现有工作流，再沉淀现有厂商手里没有的结果数据。
    - risk: 滩头市场的经济模型太小，撑不起风险投资回报
      likelihood: Medium
      impact: High
      leadingIndicator: 生产定价最终只能落在每坐席每月约 $10，且第一年后相邻工作流的扩展需求仍然很弱。
      mitigation: 尽早测试扩展需求，在拿到证明前保持团队精干，也不要靠“宽平台故事”去提前融资。
operatingAssumptions:
  - assumption: 500+ 坐席的英语 BPO 会愿意单独采购一套疲劳运营试点，而不是等核心 WFM 厂商补功能。
    basis: research.yaml
    validationTest: 对 15 个目标客户做访谈，并从合格 BPO 中按既定试点价格拿下至少 2 个付费试点。
    decisionImpact: 如果不成立，公司要么转向渠道优先分发，要么放弃独立应用层这套判断。
  - assumption: 第一批生产场景只做低风险建议，也足以体现可量化 ROI。
    basis: idea.yaml
    validationTest: 在 90 天试点里，不靠自动执行，只用微休息、路由或辅导，就在至少一个运营 KPI 上拿到双方认可的改善。
    decisionImpact: 如果不成立，路线图就得更早走向深度自动化，法律和技术风险都会抬高。
  - assumption: 只要产品控制清晰、个人可见，员工授权是能做成的。
    basis: research.yaml
    validationTest: 收集 3-5 个 BPO 的 HR / 法务书面反馈，并在前两个试点里把加入率做到 50% 以上。
    decisionImpact: 如果不成立，公司可能只能收缩到员工自助健康工具，或者直接退出这个市场。
  - assumption: 只要接好 2-3 个 WFM 与 QA 集成，就能覆盖大部分近端目标客户。
    basis: operator judgment
    validationTest: 给前 20 个潜在客户画系统栈分布，确认少数几套系统覆盖了多数合格机会。
    decisionImpact: 如果不成立，实施会过度服务化，销售效率也会被拖慢。
  - assumption: 至少有两个耳机 OEM 愿意支持生产级数据接入和企业签约。
    basis: research.yaml
    validationTest: 完成对 Neurable 类供应商的商务尽调，并从至少 2 家伙伴拿到书面数据权条款。
    decisionImpact: 如果不成立，硬件依赖就会变成真正的瓶颈，公司应推迟融资或调整滩头市场。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 与目标 BPO 的运营副总裁、WFM、QA、HR 和法务共做 20 次结构化访谈。
    hypothesis: 在目标细分里，耳机更新或 QA 整改足以制造付费试点的紧迫感。
    successMetric: 拿到至少 10 个合格机会，并有 2 家目标客户同意试点范围、买方和时间表。
    owner: CEO / 创始人销售
  - horizon: 0–90 天
    experiment: 与至少 3 家耳机供应商完成数据权、遥测接入和采购条款尽调。
    hypothesis: 不自研硬件，也能拿到企业级数据接入能力。
    successMetric: 至少 2 家供应商给出可用于 BPO 部署的数据权条款。
    owner: CEO / 合作伙伴负责人
  - horizon: 0–90 天
    experiment: 找 10-15 位目标用户测试授权 UX、员工面板和主管建议控制台原型。
    hypothesis: 员工可见性和“非纪律性用途”的框定，能显著提高信任与参与意愿。
    successMetric: 至少 70% 的受访者认为这套政策和界面足够清楚，也能接受用于试点。
    owner: 产品负责人
  - horizon: 90–180 天
    experiment: 启动第一个影子模式试点，把 EEG 驱动建议与现有 WFM、QA 信号做对比。
    hypothesis: 经过校准的 EEG 分数，能比当前运营代理信号更早发现干预窗口。
    successMetric: 90 天后拿到一个在统计上有意义的领先指标或 KPI 提升，且不存在未解决的法务阻碍。
    owner: 创始工程师 + 数据负责人
  - horizon: 90–180 天
    experiment: 逐个做 A/B 测试：微休息时机、队列路由建议和主管辅导提示。
    hypothesis: 某一类干预会比其他方案更容易跑出 ROI，并成为生产转化的默认切口。
    successMetric: 至少有一种干预带来足够清晰的改善，能支撑生产定价和案例沉淀。
    owner: 产品负责人 + 共创客户运营负责人
  - horizon: 180–360 天
    experiment: 把表现最好的试点转成生产，并在同一客户内扩到第二个站点或项目。
    hypothesis: 在同一 BPO 内做多站点扩张，会比拿全新 logo 更快、更便宜。
    successMetric: 试点结束后 6 个月内，拿到 1 份生产合同和 1 个来自首个客户的扩展承诺。
    owner: CEO / 客户成功
operations:
  - 任何试点上线前，必须先跑完客户法务、HR 和站点管理层的授权与政策审查流程
  - 评分、干预和审计日志都要做版本化，让每次建议都能追溯到模型版本和当时的政策状态
  - 第一批 WFM 与 QA 集成要按潜在客户覆盖面排序，而不是按单个客户的定制需求来排
  - OEM 伙伴管理要覆盖数据权、固件变更和设备支持承诺
  - 每周和共创客户做一次复盘，盯基线指标、异常事件和员工反馈
team:
  - role: 创始人 / CEO
    startTiming: 第 0 个月
    rationale: 在打法仍处于验证期时，亲自负责客户发现、企业销售、共创客户管理和 OEM 谈判。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 搭起试点所需的数据接入、授权、审计和集成骨架。
  - role: 应用 ML / 数据负责人
    startTiming: 第 0-2 个月
    rationale: 负责校准逻辑、跨设备归一化和试点分析，尽快证明或证伪信号价值。
  - role: 产品与运营负责人
    startTiming: 第 2-4 个月
    rationale: 把 BPO 工作流翻成建议逻辑、试点记分卡和可复制的生产打法。
  - role: 解决方案工程师
    startTiming: 第 4-6 个月
    rationale: 当第一个共创客户签约后，缩短实施时间，并把第一批集成产品化。
  - role: 隐私与劳工法律顾问
    startTiming: 第 0 个月
    rationale: 从一开始就收敛最高采用风险，提前划清产品边界、授权文案和留存政策。
milestones:
  - horizon: 0–12 个月
    items:
      - 在目标 BPO 细分里签下 2 个付费试点
      - 拿到 2 家耳机 OEM 可接受的企业数据权条款
      - 上线影子模式评分、授权控制，以及第一个 WFM 或 QA 集成
      - 至少把 1 个试点转成生产，并留出明确 KPI 结果
  - horizon: 12–24 个月
    items:
      - 做到 3-5 个进入生产的 BPO 客户，并形成可复制的实施打法
      - 在生产环境支持至少 2 种 OEM 遥测来源
      - 把基准报表和表现最好的干预模块做成标准包
      - 至少让 1 个客户扩到第二个站点或项目
  - horizon: 24–36 个月
    items:
      - 在联络中心之外，证明至少一个相邻重度耳机工作流可以复制扩张
      - 建起跨多个客户的基准数据集，把干预与 QA、离职结果连起来
      - 通过至少 1 个 OEM 打包或工作流软件渠道，跑出伙伴分发
      - 根据相邻需求拉力和生产定价韧性，重新评估融资策略
risks:
  - risk: 即便 ROI 看起来为正，员工信任和监管接受度也可能直接卡住部署。
    likelihood: High
    impact: High
    mitigation: 从明确授权、员工可见控制、非纪律性产品边界，以及经律师审查的短留存政策做起。
  - risk: 在嘈杂的真实联络中心环境里，信号可靠性可能不够。
    likelihood: High
    impact: High
    mitigation: 先把范围限制在低风险建议上，按用户做校准，与基线做对照，在证据充分前不碰高风险自动化。
  - risk: 硬件供给和 OEM 数据权可能拖慢实施和销售周期。
    likelihood: Medium
    impact: High
    mitigation: 同时支持多个 OEM，尽早把伙伴尽调做透，并把试点对齐客户的耳机更新窗口。
  - risk: 在切口尚未被证明前，现有 WFM 或 QA 厂商可能凭分发先把市场吃掉。
    likelihood: Medium
    impact: Medium
    mitigation: 聚焦差异化的神经数据结果，先集成而不是替换，并沉淀跨设备的专有结果数据。
  - risk: 如果定价被压缩、相邻需求又弱，联络中心滩头市场可能太小。
    likelihood: Medium
    impact: High
    mitigation: 保持低 burn，在第 12-18 个月就验证相邻工作流扩张；若拉力不足，就收紧融资姿态。
fundingAsk:
  stage: 种子前轮
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金主要覆盖一支精干创始团队、OEM 与法务尽调、2-3 个共创客户试点、第一批 WFM 或 QA 集成，以及足够判断这条切口能否转成可复制生产收入的证据。
