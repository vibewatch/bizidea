slug: cognitive-fatigue-ops
date: '2026-04-29'
executiveSummary: >-
  Cognitive Fatigue Ops 向外包联络中心销售一层工作流软件，把 OEM
  耳机产生的 EEG 遥测转化为低风险排班与辅导动作。首个客户是以美国或其他英语市场为主、拥有 500+
  个语音席位、统一使用包耳式耳机且面临明显 QA 或流失压力的 BPO。初始产品不宣称临床级推断或自动化纪律处分；它推荐微休息、队列再平衡和与可衡量运营结果挂钩的主管提示。这个切入点卡在
  Neurable 的授权推进节点上，说明 EEG 的分发可能通过耳机 OEM 比由创业公司自研硬件更快扩散。市场看起来真实，但前三年仍较窄：研究估算联络中心滩头市场
  TAM 约 $88.8M、SAM 约 $18.0M、Y3 SOM 约 $1.8M。因此，公司必须尽快证明两点：员工和法务团队会同意非纪律处分用途的
  EEG 监测，以及疲劳信号能否比现有 WFM 与 QA 替代指标更早提示干预时点。在获得更强的同意、ROI 和数据权证据之前，该计划刻意回避欧洲、泛化员工监控以及宽泛的健康软件。现有证据支持将其列为值得认真观察的案例，但尚不足以高置信会面，因为真实世界中的信号可靠性、买方采纳和
  OEM 数据权仍未被证明。
problem:
  - 联络中心运营方通常只有在 QA 分数、合规错误或流失情况恶化之后，才会发现倦怠。
  - 固定休息排班、主管判断、WFM 仪表板和健康问卷等现有替代方案无法捕捉班次内的认知过载。
  - 随着 EEG 进入日常耳机，买方仍缺少一款可审计的工作流产品，能够把脑信号数据转化为安全的运营动作。
solution:
  - 接入获授权 OEM 耳机的 EEG 遥测，为每名座席校准基线，并在班次层面生成疲劳、专注和恢复评分。
  - 将这些评分送入主管与 WFM 工作流，在绩效下降前推荐微休息、较低复杂度的队列路由和定向辅导。
  - 为员工提供可见的同意控制和个人趋势视图，同时记录每次干预及其结果，使客户能够证明该系统属于预防工具，而非隐蔽监控。
whyWeWin:
  - 公司卖的不是硬件，也不是通用健康应用；它解决的是一个员工本就佩戴耳机且疲劳具有直接单位经济效应的具体工作流。
  - 产品以叠加层方式落在现有 WFM、QA 和耳机栈之上，相比要求 BPO 替换核心系统，切换成本更低。
  - 如果试点有效，公司将持续积累一套难以复制的数据集，把跨设备 EEG 信号、干预动作与数千个班次的 QA 或流失结果关联起来。
strategicChoices:
  beachhead: 拥有 500-1000 名语音座席、统一使用包耳式耳机，并正处于耳机更新或 QA 提升项目中的英语外包客户支持中心。
  wedgeRationale: 这一细分市场已经将休息遵守率、QA 和倦怠视为核心指标，因此低风险干预产品可以在现有 KPI 上被测试，而无需客户改变整个运营模式。更广泛的雇主健康或横向 BCI 软件会面对更模糊的买方、更弱的触发因素以及更难证明的 ROI。
  sequencingRationale: 在任何自动化之前，先从同意、校准和推荐工作流做起，因为法律信任与信号验证才是门槛风险。前 2-3 个试点先直接卖给运营负责人；只有在团队证明试点到生产的可重复路径，并且首批集成能缩短部署时间后，再增加 OEM 捆绑和工作流伙伴分发。
  notYet:
    - 在美国主导部署和政策控制尚未被证明前，不进入欧洲
    - 不做泛化员工监控或纪律评分
    - 不自研 EEG 硬件
    - 不服务少于 200 个席位的小型联络中心
    - 在 BPO 剧本可重复之前，不扩展到电话销售、远程医疗或调度
market:
  tam: 基于约 493,000 个可触达的、以语音和耳机为主的外包联络中心席位，按每个受监控席位每月约 $15 自下而上估算的 TAM 为 $88.8M。
  sam: 面向拥有 500+ 席位且具备试点可能性的英语外包联络中心，估算 SAM 为 $18.0M。
  som: 基于 12 个 BPO logo、平均 700 个受监控席位、每席位每月约 $18，估算第 3 年 SOM 为 $1.8M。
  segments:
    - 为电商或金融科技项目提供服务、拥有 500+ 语音座席的外包联络中心
    - 后续可扩展到电话销售、远程医疗和调度等高耳机场景
  buyingProcess: 运营或劳动力管理负责人最可能掌握预算，但在部署前还会涉及 QA、HR、法务、IT 和站点管理层。预算最可能由耳机更新、倦怠或流失激增，或客户强制的 QA 提升项目触发，从而为新增干预杠杆制造紧迫性。
product:
  mvp: 版本 1 是一层推荐系统，接入耳机遥测、执行座席校准、生成疲劳与恢复评分，并配备员工同意控制来呈现微休息与辅导建议。它应先支持 shadow mode 和人工执行，并提供导出到现有 WFM 或 QA 工作流的基础能力。
  sixMonth: 两个设计合作方试点在 shadow mode 中上线，具备同意工作流、校准仪表板、一个 WFM 集成，以及可将 EEG 驱动建议与现有 QA 和排班信号对比的报告能力。
  twelveMonth: 至少为一个 BPO 进行生产部署，提供主管工作流、队列路由建议、按站点或项目的对标报告，并支持至少两个 OEM 耳机数据源。
  twentyFourMonth: 将同一决策引擎扩展到相邻的高耳机场景，并向现有客户销售对标与政策模块，而不是构建宽泛的健康平台。
  keyBets:
    - 消费级 EEG 在完成校准后能够可靠支持低风险推荐。
    - 如果产品明确用于防止疲劳且不用于纪律处分，座席会选择加入。
    - 现有 WFM 与 QA 系统足够开放，叠加层可以接入，而不需要漫长的替换项目。
    - 跨多个 OEM 的设备归一化最终会成为护城河，而不是支持负担。
gtm:
  wedge: 围绕一个 BPO 站点或项目销售付费试点，在耳机更新、倦怠压力或 QA 整改创造的即时决策窗口中切入。
  channels:
    - 由创始人主导，向目标 BPO 的运营副总裁和劳动力管理负责人进行外呼销售
    - 与年度更新周期绑定的 OEM 和耳机捆绑合作
    - 与 WFM、QA 和 BPO 治理供应商进行集成与联合销售
  funnelTargets: 目标账户→合格试点对话 20-30%，合格试点对话→付费试点 20-25%，付费试点→生产部署 50%+，生产部署→在 12 个月内扩展到第二站点或新增模块 50%+
  pricing: 对单一站点收取约 $30,000-$75,000 的 8-12 周付费试点费用，然后转换为按受监控座席每月收费的年度软件合同，目标价格约为 $12-$18，并设置年度最低消费以及对标和更深层 WFM 或 QA 集成的高级费用。这样定价既低于主要 WFM 或 copilot 支出，又能把价值与受监控劳动力规模以及可量化的 QA 或流失结果挂钩。
businessModel:
  revenueStreams:
    - 按受监控座席计费的年度 SaaS 订阅
    - 付费试点和部署费用
    - 高级集成与对标模块
    - 后续面向相邻高耳机场景的扩展模块
  unitOfValue: 在年度站点或企业合同下，按每月受监控座席计费
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一 BPO logo 内增加更多站点和项目
    - 销售基于汇总结果数据构建的对标报告和干预打法
    - 从微休息推荐扩展到路由和辅导模块
    - 将同一套就绪度引擎延伸到相邻的高耳机场景
strategyMap:
  northStarMetric: 具备已验证干预结果追踪的生产级受监控座席数
  inputMetrics:
    - 每季度合格的 BPO 发现电话数量
    - 设计合作方转化率
    - 从启动到 shadow mode 部署的中位天数
    - 试点期间的座席选择加入率
    - 相较基线，试点在 QA 波动、休息遵守率或流失风险代理指标上的提升
    - 试点转生产转化率
  moatsToBuild:
    - 跨 OEM 的信号归一化与校准层
    - 将疲劳评分、干预和运营结果连接起来的结果数据集
    - 获得法务、HR 和劳工相关方信任的政策与同意控制
    - 可复用的 WFM、QA 与治理系统集成
  killCriteria:
    - 前 12 个月内，在 20 次合格 BPO 对话之后仍少于 2 个付费试点
    - 尽管采用非纪律处分定位，前两个试点的座席选择加入率仍低于 50%
    - 90 天后，试点结果在统计上未能明显优于基线 QA 或倦怠代理指标
    - 没有 OEM 合作伙伴授予生产部署所需的企业数据权
  mermaid: |
    flowchart LR
      Wedge[联络中心疲劳切入点] --> MVP[同意 + 评分 + 推荐]
      MVP --> Proof[带有 QA 与倦怠证明的付费试点]
      Proof --> Expansion[多站点推广与相邻工作流扩展]
investorMemo:
  verdict:
    call: Watch
    conviction: 工作流切入点可信，但在付费试点中证明同意、信号提升和 OEM 数据权之前，判断应保持克制。
    whyBelieve: 研究显示买方痛点真实存在、相邻软件预算充足，而且有明确的硬件分发催化剂，为应用层公司创造了空间。
    whyDoubt: 近期滩头市场规模较小，且受隐私、劳工和信号可靠性风险强烈制约，因此公司可能在证明可扩展品类之前就停滞。
    nextDiligence: 获取两个付费 BPO 试点，签署员工同意政策，并共享一套将 EEG 驱动干预与当前 WFM 和 QA 方法进行比较的评分卡。
  firstCustomer:
    title: 拥有 500-1000 个席位的外包支持中心的运营副总裁
    profile: 一家服务电商或金融科技项目的 BPO，耳机已标准化、WFM 集中管理、QA 波动明显，并按年采购耳机。
    trigger: 耳机更新、倦怠激增，或客户在 QA 上升级施压，使管理层愿意试用另一种运营杠杆。
    buyer: VP Operations 或 Head of Workforce Management
    initialContract: 单站点 8-12 周付费试点，价格约 $30,000-$75,000；如果试点提升约定的运营指标并通过法务审查，则转为按每个受监控座席每月约 $12-$18 的年度合同。
  mustBeTrue:
    - 前 10 个目标 BPO 中，至少有 3 个表示倦怠或 QA 波动足够紧迫，愿意在今年为付费试点买单。
    - 至少有 2 个 OEM 或耳机合作伙伴允许访问生产级评分和审计日志所需的数据。
    - 在 90 天试点中，EEG 驱动的推荐在至少一个约定干预指标上优于现有 WFM 或 QA 代理指标。
    - 当产品明确为非纪律处分且员工可见时，超过一半符合条件的座席会选择加入。
    - 至少有 1 个试点在上线后 6 个月内，按目标座席定价区间或更高水平转为生产部署。
  diligenceQuestions:
    - 哪些耳机 OEM 愿意授予企业数据权，并支持 BPO 部署，而不仅仅是消费级应用捆绑？
    - 运营副总裁会用哪一个精确 KPI 提升来批准试点后的生产预算？
    - 劳工、HR 和法务相关方如何界定倦怠预防与监控之间可接受的边界？
    - 相比现有的排班遵守率、QA、情绪或处理时长信号，EEG 能带来多大幅度的增量提升？
    - 前 20 个目标 logo 最常见的 WFM 与 QA 系统是什么，而这些集成在实践中到底有多难？
  riskHeatmap:
    - risk: 员工或监管者的反弹把产品界定为监控工具
      likelihood: High
      impact: High
      leadingIndicator: 尽管采用中性激励的同意设计，试点法务审查仍禁止生产使用，或座席选择加入率跌破 50%。
      mitigation: 首个产品必须明确为选择加入、非纪律处分、员工可见，并限制为低风险干预且数据保留期较短。
    - risk: 真实世界中的 EEG 信号噪声过大，无法产生运营价值
      likelihood: High
      impact: High
      leadingIndicator: 试点模型在校准后仍无法优于基线 QA 或 WFM 代理指标，并在不同班次中给出不一致的推荐。
      mitigation: 将输出限制为推荐、要求校准期、在 shadow mode 下与基线比较，并避免高风险自动化。
    - risk: OEM rollout 或企业数据访问推进慢于预期
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户无法在更新周期内采购兼容耳机，或 OEM 合同限制生产数据导出。
      mitigation: 支持多个耳机合作伙伴，围绕更新窗口销售，并在做定制集成前优先完成数据权商业尽调。
    - risk: 在创业公司建立证明前，既有 WFM 和 QA 供应商就吸收了该工作流
      likelihood: Medium
      impact: Medium
      leadingIndicator: 买方反复要求该功能只能作为 NICE、Observe.AI 等系统的附加项出现，并拒绝点状解决方案试点。
      mitigation: 将自身定位为差异化的神经数据层，集成到既有工作流中，并收集 incumbents 尚未掌握的结果数据。
    - risk: 滩头市场的经济体量不足以支撑风险投资回报
      likelihood: Medium
      impact: High
      leadingIndicator: 生产定价稳定在每席位每月约 $10，且第一年后向相邻工作流的扩展拉动仍然薄弱。
      mitigation: 尽早测试扩展需求，在证明期保持团队精简，在相邻需求真实出现前避免以宽泛平台故事融资。
operatingAssumptions:
  - assumption: 拥有 500+ 席位的英语 BPO 会愿意购买独立的疲劳运营试点，而不是等待核心 WFM 供应商补齐该功能。
    basis: research.yaml
    validationTest: 对目标账户进行 15 次访谈，并从合格 BPO 中按既定试点定价拿下至少 2 个付费试点。
    decisionImpact: 如果不成立，公司应转向以渠道优先的分发，或放弃独立应用层这一论点。
  - assumption: 首个生产用例可以停留在低风险推荐层面，同时仍展示出可衡量的 ROI。
    basis: idea.yaml
    validationTest: 在 90 天试点中，通过微休息、路由或辅导，在不进行自动执行的前提下，展示至少一个运营 KPI 的约定改进。
    decisionImpact: 如果不成立，路线图就需要更早走向更深层自动化，从而提高法律和技术风险。
  - assumption: 当产品控制和个人可见性足够明确时，能够获得座席同意。
    basis: research.yaml
    validationTest: 收集 3-5 个 BPO HR 或法务团队的书面政策反馈，并在前两个试点中实现超过 50% 的选择加入率。
    decisionImpact: 如果不成立，公司可能需要收缩为员工自助式健康工具，或退出该市场。
  - assumption: 两到三个 WFM 和 QA 集成就能覆盖大多数近期目标 logo。
    basis: 运营判断
    validationTest: 按系统栈对前 20 个潜在客户进行映射，并确认少量系统即可覆盖大多数合格机会。
    decisionImpact: 如果不成立，实施会变得过于服务化，并拖慢销售效率。
  - assumption: 至少两个耳机 OEM 会支持生产级数据访问和企业签约。
    basis: research.yaml
    validationTest: 与类似 Neurable 的供应商完成商业尽调，并从至少 2 个合作伙伴那里获得书面的数据权条款。
    decisionImpact: 如果不成立，硬件依赖将成为瓶颈，公司应推迟融资或调整滩头市场。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 在目标 BPO 中，与 VP Operations、WFM、QA、HR 和法务相关方进行 20 次结构化访谈。
    hypothesis: 耳机更新或 QA 整改项目会在目标细分市场中创造出足以支撑付费试点的紧迫性。
    successMetric: 至少 10 个合格机会，以及 2 个目标账户同意试点范围、买方和时间线。
    owner: CEO / 创始人销售
  - horizon: 0–90 天
    experiment: 与至少 3 家耳机供应商完成关于数据权、遥测访问和采购条款的 OEM 尽调。
    hypothesis: 无需自研硬件也能获得企业级数据访问。
    successMetric: 至少 2 家供应商提供适用于 BPO 部署的可接受数据权条款。
    owner: CEO / 合作伙伴关系
  - horizon: 0–90 天
    experiment: 与 10-15 名目标用户一起原型验证同意 UX、员工仪表板和主管推荐控制台。
    hypothesis: 员工可见性和非纪律处分定位会显著提高信任和参与意愿。
    successMetric: 至少 70% 的受访用户认为政策和 UI 易于理解，并可接受用于试点。
    owner: 产品负责人
  - horizon: 90–180 天
    experiment: 启动第一个 shadow mode 试点，并将 EEG 驱动推荐与现有 WFM 和 QA 信号进行比较。
    hypothesis: 经过校准的 EEG 评分比当前运营代理指标更早识别干预窗口。
    successMetric: 90 天后出现一个在统计上有意义的领先指标或 KPI 提升，且没有未解决的法务阻碍。
    owner: 创始工程师 + 数据负责人
  - horizon: 90–180 天
    experiment: 逐项对微休息时机、队列路由建议和主管辅导提示进行 A/B 测试。
    hypothesis: 某一类干预会显示出更清晰的 ROI，并成为转化到生产部署的默认切入点。
    successMetric: 有一类干预产生足够大的可衡量改进，可支撑生产定价和案例研究。
    owner: 产品负责人 + 设计合作方运营负责人
  - horizon: 180–360 天
    experiment: 将表现最好的试点转为生产部署，并在同一 logo 内推广到第二个站点或项目。
    hypothesis: 在同一 BPO 内的多站点扩展会比获取一个全新 logo 更快、更便宜。
    successMetric: 在试点结束后 6 个月内，获得一份生产合同和同一首个客户内部的一项扩展承诺。
    owner: CEO / 客户成功
operations:
  - 在任何试点启动前，与客户法务、HR 和站点管理层完成同意与政策审查流程
  - 建立版本化的评分、干预和审计日志流水线，使每条推荐都能追溯到模型版本和政策状态
  - 按潜在客户覆盖率而非定制需求，优先制定首批 WFM 和 QA 系统的集成打法
  - 负责数据权、固件变更和设备支持承诺的 OEM 合作伙伴管理
  - 与设计合作方保持每周评审节奏，跟踪基线指标、异常情况和员工反馈
team:
  - role: 创始人 / CEO
    startTiming: 第 0 个月
    rationale: 在销售动作仍处于假设验证阶段时，负责需求发现、企业销售、设计合作方管理和 OEM 合作谈判。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 构建试点所需的数据接入、同意、审计和集成骨架。
  - role: 应用 ML / 数据负责人
    startTiming: 第 0-2 个月
    rationale: 负责校准逻辑、跨设备归一化和试点分析，以尽快证明或证伪信号价值。
  - role: 产品与运营负责人
    startTiming: 第 2-4 个月
    rationale: 将 BPO 工作流转化为推荐逻辑、试点评分卡和可投入生产的运营剧本。
  - role: 解决方案工程师
    startTiming: 第 4-6 个月
    rationale: 在首个设计合作方签约后缩短实施时间，并将首批集成产品化。
  - role: 隐私与劳工法律顾问
    startTiming: 第 0 个月
    rationale: 通过塑造产品边界、同意措辞和保留策略，及早降低最高采纳风险。
milestones:
  - horizon: 0–12 个月
    items:
      - 在目标 BPO 细分市场中签下 2 个付费试点
      - 确保 2 家耳机 OEM 提供可接受的企业数据权条款
      - 发布 shadow mode 评分、同意控制以及首个 WFM 或 QA 集成
      - 将至少 1 个试点转为生产部署，并记录 KPI 影响
  - horizon: 12–24 个月
    items:
      - 达到 3-5 个生产级 BPO logo，并形成可重复的实施剧本
      - 在生产环境中支持至少 2 个 OEM 遥测来源
      - 将对标报告和表现最佳的干预模块作为标准套餐推出
      - 将至少 1 个 logo 扩展到第二个站点或项目
  - horizon: 24–36 个月
    items:
      - 在联络中心之外的一个相邻高耳机场景中证明可重复扩展
      - 构建一个跨多个 logo 的对标数据集，将干预与 QA 及流失结果关联起来
      - 通过至少 1 个 OEM 捆绑或工作流软件渠道建立合作伙伴驱动分发
      - 根据相邻需求拉动和生产定价韧性，重新评估融资策略
risks:
  - risk: 即使 ROI 看起来积极，员工信任与监管接受度仍可能阻止部署。
    likelihood: High
    impact: High
    mitigation: 从明确同意、员工可见控制、非纪律处分产品边界以及经法律顾问审查的短保留期策略做起。
  - risk: 在嘈杂的真实联络中心环境中，信号可靠性可能不足。
    likelihood: High
    impact: High
    mitigation: 将范围限制在低风险推荐上，按用户做校准，与基线进行对照测试，并在证据充分前避免高风险自动化。
  - risk: 硬件可用性和 OEM 数据权可能拖慢实施和销售周期。
    likelihood: Medium
    impact: High
    mitigation: 支持多个 OEM，尽早优先进行合作伙伴尽调，并把试点与客户耳机更新窗口对齐。
  - risk: 在切入点被证明之前，既有 WFM 或 QA 供应商可能凭借分发优势压制创业公司。
    likelihood: Medium
    impact: Medium
    mitigation: 聚焦差异化的神经数据结果，集成而不是替换，并收集专有的跨设备结果数据。
  - risk: 如果定价被压缩或相邻需求较弱，联络中心滩头市场可能过小。
    likelihood: Medium
    impact: High
    mitigation: 保持低消耗，在第 12-18 个月验证向相邻工作流的扩展；若扩展拉动缺失，则收紧融资姿态。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金将支持一个精干的创始团队、OEM 与法务尽调、2-3 个设计合作方试点、首批 WFM 或 QA 集成，以及足够的证据来判断该切入点能否转化为可重复的生产收入。
