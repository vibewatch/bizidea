slug: cognitive-fatigue-ops
date: '2026-04-29'
executiveSummary: >-
  Cognitive Fatigue Ops 要卖的是一层面向外包联络中心的工作流软件，把 OEM 耳机里的 EEG 遥测数据转成低风险的排班与辅导动作。首个客户应该是以美国或其他英语市场为主、拥有 500+ 个语音席位、统一使用包耳式耳机、且 QA 或离职压力已经浮出水面的 BPO。首版产品不做临床级推断，也不做自动化纪律处分；它只建议微休息、队列再平衡和主管提示，并把这些建议和可衡量的运营结果绑在一起。这个切口之所以成立，时点正卡在 Neurable 推动授权分发上：这意味着 EEG 的铺货速度，很可能会通过耳机 OEM 快过一家创业公司自己造硬件。市场看起来真实，但头三年仍偏窄；研究给出的联络中心滩头市场约为 $88.8M TAM、$18.0M SAM 和第 3 年 $1.8M SOM。因此，公司必须尽快证明两件事：员工和法务团队愿意接受非纪律性的 EEG 监测；以及疲劳信号确实比现有的 WFM 和 QA 代理指标更早指向该干预的时刻。路线图也刻意避开欧洲、泛员工监控和大而全的健康软件，至少要等同意机制、ROI 和数据权证据更扎实后再谈。眼下这些证据足以支撑一个值得持续跟踪的机会，但还撑不起高置信度会面，因为真实世界的信号可靠性、买方采用意愿和 OEM 数据权仍没有被跑通。
problem:
  - 联络中心运营团队通常要等到 QA 分数、合规错误或离职率恶化后，才看见倦怠问题已经爆发。
  - 固定休息安排、主管经验、WFM 仪表盘和健康问卷等现有替代方案，都抓不住班中发生的认知过载。
  - 随着 EEG 进入日常耳机，买方仍然缺少一款可审计的工作流产品，能把脑信号数据转成安全的运营动作。
solution:
  - 接入获得授权的 OEM 耳机里的 EEG 遥测数据，为每位坐席建立基线校准，并在班次维度生成疲劳、专注和恢复评分。
  - 把这些评分送进主管和 WFM 工作流，在绩效真正下滑之前建议微休息、较低复杂度队列分流和定向辅导。
  - 给员工可见的同意控制和个人趋势视图，同时记录每次干预及其结果，让客户能证明这套系统是预防工具，而不是暗中监控。
whyWeWin:
  - 公司卖的不是硬件，也不是通用健康应用；它只解决一个场景——员工本来就全天佩戴耳机，而且疲劳直接影响单位经济模型。
  - 产品以叠加层方式接入现有 WFM、QA 和耳机体系，相比要求 BPO 替换核心系统，切换成本更低。
  - 如果试点跑通，公司就会累积一套难以复制的数据，把跨设备 EEG 信号、干预动作以及 QA 或离职结果串到成千上万班次上。
strategicChoices:
  beachhead: 拥有 500-1000 名语音坐席、统一使用包耳式耳机、并且正在经历耳机更新或 QA 改进项目的英语外包客服中心。
  wedgeRationale: 这个细分市场本来就把休息达标率、QA 和倦怠当核心指标管理，所以一款低风险干预产品，可以直接对照现有 KPI 去测试，而不需要客户改造整套运营体系。相比之下，更泛的雇主健康软件或横向 BCI 软件，会面对更模糊的买方、更弱的触发点，也更难证明 ROI。
  sequencingRationale: 在进入任何自动化之前，应先把同意、校准和建议工作流跑通，因为法务信任和信号验证才是真正卡住扩张的风险。前 2-3 个试点应直接卖给运营负责人；只有等团队证明试点到生产的转化动作可复制，且首批集成真的缩短部署时间后，再加 OEM 打包和工作流伙伴分发。
  notYet:
    - Europe before US-led deployment and policy controls are proven
    - Generic employee monitoring or disciplinary scoring
    - Custom EEG hardware development
    - Small contact centers under 200 seats
    - Expansion into telesales, telehealth, or dispatch before the BPO playbook is repeatable
market:
  tam: 基于约 493,000 个可触达、以语音和耳机为主的外包联络中心席位，并按每个被监测席位每月约 $15 估算，自下而上的年 TAM 约为 $88.8M。
  sam: 针对拥有 500+ 席位、具备试点准备度的英语外包联络中心，估算 SAM 为 $18.0M。
  som: 按第 3 年拿下 12 个 BPO logo、平均每个 700 个被监测席位、且每席每月约 $18 计，估算第 3 年 SOM 为 $1.8M。
  segments:
    - 服务电商或金融科技项目、拥有 500+ 名语音坐席的外包联络中心
    - 后续再扩到电话销售、远程医疗和调度等重度耳机运营场景
  buyingProcess: 预算持有人大概率是运营负责人或劳动力管理负责人，但部署前通常还要拉上 QA、HR、法务、IT 和现场管理层一起评估。最容易撬动预算的触发点，通常是耳机更新、倦怠或离职突然恶化，或客户强推的 QA 改进项目，因为这些时点会让团队愿意再加一个干预抓手。
product:
  mvp: 第 1 版是一层建议软件：接入耳机遥测、完成坐席校准、生成疲劳与恢复评分，并在带有员工同意控制的前提下给出微休息和辅导建议。首版应优先支持 shadow mode 和人工执行，同时提供基础导出能力，把结果送入现有 WFM 或 QA 工作流。
  sixMonth: 两个 design-partner 试点在 shadow mode 上线，包含同意工作流、校准仪表盘、一个 WFM 集成，以及一套报告，用来比较 EEG 驱动建议和现有 QA / 排班信号的差异。
  twelveMonth: 至少一个 BPO 进入生产部署，具备主管工作流、队列分流建议、按站点或项目出具的基准报告，以及至少支持两家 OEM 耳机数据源。
  twentyFourMonth: 把同一套决策引擎扩展到相邻的重度耳机工作流，并向现有客户出售基准报告和策略模块，而不是去造一套泛健康平台。
  keyBets:
    - 经过校准后，消费级 EEG 足以稳定支撑低风险建议。
    - 只要产品明确非纪律化、且员工可见，坐席愿意选择加入。
    - 现有 WFM 和 QA 系统的开放程度足够高，叠加层可以接进去，而不必做漫长的替换项目。
    - 跨多个 OEM 的设备归一化能力最终会变成护城河，而不是实施负担。
gtm:
  wedge: 围绕一个 BPO 站点或项目卖付费试点；只要耳机更新、倦怠压力或 QA 整改让团队出现明确决策窗口，就切进去。
  channels:
    - Founder-led outbound to VP Operations and Head of Workforce Management at target BPOs
    - OEM and headset-bundle partnerships tied to annual refresh cycles
    - Integrations and co-selling with WFM, QA, and BPO-governance vendors
  funnelTargets: Target accounts→qualified pilot conversations 20-30%, qualified pilot conversations→paid pilots 20-25%, paid pilots→production 50%+, production→second site or module expansion 50%+ within 12 months
  pricing: 先收一个 8-12 周、单站点约 $30,000-$75,000 的付费试点；随后转成年付软件合同，按被监测坐席每月收费，目标价格带约为 $12-$18，并为基准报告和更深的 WFM 或 QA 集成收取高级费用。这个定价刻意压在核心 WFM 或 copilot 支出之下，同时又把价值锚定在被监测劳动力规模，以及 QA 或离职结果上的可衡量改善。
businessModel:
  revenueStreams:
    - 按被监测坐席计费的年度 SaaS 订阅
    - 付费试点与部署费用
    - 高级集成和基准报告模块
    - 后续扩展到相邻重度耳机工作流的增购模块
  unitOfValue: 在年度站点或企业合同下，按月计费的被监测坐席
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一个 BPO logo 内扩更多站点和项目
    - 出售基于聚合结果数据形成的基准报告和干预 playbook
    - 从微休息建议扩到分流与辅导模块
    - 把同一套准备度引擎扩到相邻重度耳机工作流
strategyMap:
  northStarMetric: 已进入生产、且完成干预结果验证跟踪的被监测坐席数
  inputMetrics:
    - 每季度的合格 BPO 发现电话数
    - Design-partner 转化率
    - 从 kickoff 到 shadow-mode 部署的中位天数
    - 试点期间的坐席 opt-in 率
    - 相对基线，试点在 QA 波动、休息达标率或离职风险代理指标上的提升
    - 试点转生产的转化率
  moatsToBuild:
    - 跨 OEM 的信号归一化与校准层
    - 把疲劳评分、干预动作与运营结果连起来的结果数据集
    - 让法务、HR 和劳工相关方都能信任的政策与同意控制层
    - 可复用的 WFM、QA 和治理系统集成
  killCriteria:
    - 前 12 个月内，完成 20 次合格 BPO 洽谈后，付费试点仍少于 2 个
    - 尽管产品明确非纪律化，在前两个试点中坐席 opt-in 率仍低于 50%
    - 90 天后，试点结果在统计上仍未比基线 QA 或倦怠代理指标更好
    - 没有任何 OEM 伙伴授予生产部署所需的企业数据权
  mermaid: |
    flowchart LR
      Wedge[Contact-center fatigue wedge] --> MVP[Consent plus scoring plus recommendations]
      MVP --> Proof[Paid pilots with QA and burnout proof]
      Proof --> Expansion[Multi-site rollout and adjacent workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: 工作流切口可信，但在付费试点里证明同意机制、信号增益和 OEM 数据权之前，判断仍应保持克制。
    whyBelieve: 研究显示买方痛点真实、周边软件预算已存在，而且硬件分发端出现了明确催化，为应用层公司腾出了空间。
    whyDoubt: 近期滩头市场规模偏小，又同时受隐私、劳工和信号可靠性约束，公司很可能在证明可扩展品类之前就卡住。
    nextDiligence: 拿下两个付费 BPO 试点，签好员工同意政策，并建立一套共享评分卡，把 EEG 驱动干预与当前 WFM 和 QA 方法并排比较。
  firstCustomer:
    title: 500-1000 席外包客服中心里的 VP Operations
    profile: 为电商或金融科技项目服务的 BPO，统一采购耳机、集中做 WFM、QA 波动明显，而且耳机采购按年循环。
    trigger: 耳机更新、倦怠突然加剧，或客户因 QA 升级而施压，让管理层愿意尝试新的运营抓手。
    buyer: VP Operations 或 Head of Workforce Management
    initialContract: 单站点 8-12 周付费试点，金额约为 $30,000-$75,000；若试点改善了约定运营指标并通过法务评审，则转为每个被监测席位每月约 $12-$18 的年付合同。
  mustBeTrue:
    - 前 10 个目标 BPO 中，至少有 3 家认为倦怠或 QA 波动足够紧迫，愿意在今年为付费试点拨预算。
    - 至少有 2 家 OEM 或耳机伙伴允许企业访问生产评分和审计日志所需的数据。
    - 在 90 天试点里，EEG 驱动建议在至少一个约定干预指标上优于现有 WFM 或 QA 代理指标。
    - 当产品明确非纪律化且员工可见时，超过一半的合格坐席愿意 opt in。
    - 至少有 1 个试点能在上线后 6 个月内，按目标席位价格带转成生产合同。
  diligenceQuestions:
    - 哪些耳机 OEM 愿意授予企业数据权，并支持 BPO 部署，而不是只允许消费级 app 打包？
    - VP Operations 会用哪一个精确 KPI 改善，来批准试点后的生产预算？
    - 在倦怠预防和监控之间，劳工、HR 和法务各自能接受的边界到底在哪里？
    - 相比现有的排班达标率、QA、情绪或处理时长信号，EEG 额外带来多大增益？
    - 前 20 个目标 logo 最常见的 WFM 和 QA 系统是什么，这些集成在现实里到底有多难？
  riskHeatmap:
    - risk: Employee or regulator backlash frames the product as surveillance
      likelihood: High
      impact: High
      leadingIndicator: 尽管同意设计不带激励偏向，试点中的法务评审仍禁止生产使用，或坐席 opt-in 率跌破 50%。
      mitigation: 首版产品必须明确 opt-in、非纪律化、员工可见，并把输出限制在低风险干预上，且数据短留存。
    - risk: Real-world EEG signals are too noisy for operational value
      likelihood: High
      impact: High
      leadingIndicator: 完成校准后，试点模型仍无法稳定优于基线 QA 或 WFM 代理指标，且不同班次间建议前后不一致。
      mitigation: 先把输出限制为建议，要求校准周期，在 shadow mode 里对照基线验证，并避免高风险自动化。
    - risk: OEM rollout or enterprise data access is slower than expected
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户在更新周期里买不到兼容耳机，或 OEM 合同限制生产级数据导出。
      mitigation: 支持多家耳机合作伙伴、围绕更新窗口销售，并在投入定制集成前优先完成数据权尽调。
    - risk: Incumbent WFM and QA vendors absorb the workflow before the startup gains proof
      likelihood: Medium
      impact: Medium
      leadingIndicator: 买方反复要求该功能只能作为 NICE、Observe.AI 或类似系统的附加模块采购，并拒绝点状试点。
      mitigation: 把自己定位成差异化神经数据层，接入现有工作流，并尽快积累现有厂商尚未掌握的结果数据。
    - risk: Beachhead economics are too small for venture-scale returns
      likelihood: Medium
      impact: High
      leadingIndicator: 生产定价最终落在每席每月约 $10，且第一年之后相邻工作流的扩张拉力仍然很弱。
      mitigation: 尽早测试扩张需求，在证明阶段保持团队精简，并在相邻需求尚未出现前，避免按大平台故事去融资。
operatingAssumptions:
  - assumption: 拥有 500+ 席位的英语 BPO 会愿意单独采购一个疲劳运营试点，而不是等核心 WFM 厂商自己补上功能。
    basis: research.yaml
    validationTest: 跑 15 场目标账户访谈，并从合格 BPO 中按既定试点定价签下至少 2 个付费试点。
    decisionImpact: 如果不成立，公司应转向渠道优先分发，或放弃独立应用层论点。
  - assumption: 首个生产场景可以停留在低风险建议层，但依然能证明可衡量 ROI。
    basis: idea.yaml
    validationTest: 在 90 天试点中，不做自动执行，仅靠微休息、分流或辅导建议，就能让至少一个运营 KPI 达成约定改善。
    decisionImpact: 如果不成立，路线图就必须更早进入深度自动化，从而显著抬高法务和技术风险。
  - assumption: 当产品控制和个人可见性足够明确时，坐席同意是有机会做到的。
    basis: research.yaml
    validationTest: 从 3-5 家 BPO 的 HR 或法务团队收集书面政策反馈，并在前两个试点中实现超过 50% 的 opt-in。
    decisionImpact: 如果不成立，公司可能只能收缩到员工自助健康工具，或直接退出这个市场。
  - assumption: 2-3 个 WFM 和 QA 集成，就能覆盖大多数近期开拓目标 logo。
    basis: operator judgment
    validationTest: 按系统栈梳理前 20 个潜在客户，确认少数几套系统确实覆盖了大部分合格机会。
    decisionImpact: 如果不成立，实施会过度服务化，销售效率也会被拖慢。
  - assumption: 至少两家耳机 OEM 愿意支持生产级数据访问和企业合同。
    basis: research.yaml
    validationTest: 对类似 Neurable 的供应商完成商业尽调，并从至少 2 家伙伴手里拿到书面的数据权条款。
    decisionImpact: 如果不成立，硬件依赖会重新成为瓶颈，公司应推迟融资或更换滩头市场。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 在目标 BPO 中，和 VP Operations、WFM、QA、HR 及法务相关方完成 20 场结构化访谈。
    hypothesis: 在目标细分市场里，耳机更新或 QA 整改项目足以制造一个付费试点所需的紧迫窗口。
    successMetric: 至少拿到 10 个合格机会，并有 2 个目标账户就试点范围、买方与时间线达成一致。
    owner: CEO / founder-sales
  - horizon: 0–90 天
    experiment: 与至少 3 家耳机供应商完成 OEM 数据权、遥测接入和采购条款尽调。
    hypothesis: 不需要自研硬件，也能拿到企业级数据访问。
    successMetric: 至少有 2 家供应商给出可接受的 BPO 部署数据权条款。
    owner: CEO / partnerships
  - horizon: 0–90 天
    experiment: 用 10-15 位目标用户测试同意 UX、员工仪表盘和主管建议控制台原型。
    hypothesis: 员工可见性和非纪律化定位，会显著改善信任和参与意愿。
    successMetric: 至少 70% 的受访用户认为这套政策和 UI 足够容易理解，也足够适合试点。
    owner: Product lead
  - horizon: 90–180 天
    experiment: 上线首个 shadow-mode 试点，并把 EEG 驱动建议与现有 WFM、QA 信号对照比较。
    hypothesis: 经过校准的 EEG 评分，能比当前运营代理信号更早发现干预窗口。
    successMetric: 90 天后拿到至少一个在统计上有意义的领先指标或 KPI 提升，且没有未解决的法务阻碍。
    owner: Founding eng + data lead
  - horizon: 90–180 天
    experiment: 把微休息时点、队列分流建议和主管辅导提示逐一做 A/B 测试。
    hypothesis: 某一类干预会更清楚地证明 ROI，并成为生产转化的默认切口。
    successMetric: 至少有一种干预带来足够明显的改善，可支撑生产定价和案例输出。
    owner: Product lead + design partner ops lead
  - horizon: 180–360 天
    experiment: 把表现最好的试点转成生产，并在同一 logo 内扩到第二个站点或项目。
    hypothesis: 在同一个 BPO 内做多站点扩张，会比拿一个全新 logo 更快、更便宜。
    successMetric: 试点结束后 6 个月内，拿到 1 份生产合同，并在首个客户内部拿到 1 个扩张承诺。
    owner: CEO / customer success
operations:
  - 在任何试点启动前，都要先完成与客户法务、HR 和现场管理层的同意及政策评审工作流
  - 建立版本化的评分、干预与审计日志管线，让每条建议都能追溯到模型版本和政策状态
  - 按潜在客户覆盖率而不是零散定制需求，优先排出首批 WFM 和 QA 系统集成 playbook
  - 通过 OEM 伙伴管理机制覆盖数据权、固件变化和设备支持承诺
  - 每周和 design partner 复盘基线指标、异常情况和员工反馈
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 在整个商业动作仍停留在假设驱动阶段时，必须亲自负责客户发现、企业销售、design partner 管理和 OEM 伙伴谈判。
  - role: 创始工程负责人
    startTiming: Month 0
    rationale: 负责搭建试点所需的数据接入、同意控制、审计能力和集成骨架。
  - role: 应用 ML / 数据负责人
    startTiming: Month 0-2
    rationale: 负责校准逻辑、跨设备归一化以及试点分析，尽快证明或否定信号价值。
  - role: 产品与运营负责人
    startTiming: Month 2-4
    rationale: 把 BPO 工作流翻成建议逻辑、试点评分卡和可生产化的运营 playbook。
  - role: 解决方案工程师
    startTiming: Month 4-6
    rationale: 一旦首个 design partner 签约，就要尽快缩短实施时间，并把首批集成产品化。
  - role: 隐私与劳工法律顾问
    startTiming: Month 0
    rationale: 通过提前收紧产品边界、同意措辞和留存政策，尽早降低最大的采用风险。
milestones:
  - horizon: 0–12 个月
    items:
      - 在目标 BPO 细分市场签下 2 个付费试点
      - 拿下 2 家具备可接受企业数据权条款的耳机 OEM
      - 上线 shadow-mode 评分、同意控制，以及首个 WFM 或 QA 集成
      - 至少把 1 个试点转成生产，并记录清晰的 KPI 改善
  - horizon: 12–24 个月
    items:
      - 拿下 3-5 个进入生产的 BPO logo，并形成可复制的实施 playbook
      - 在生产环境支持至少 2 个 OEM 遥测数据源
      - 把基准报告和表现最好的干预模块做成标准包上线
      - 至少让 1 个 logo 扩到第二个站点或项目
  - horizon: 24–36 个月
    items:
      - 证明这套打法可以可重复地扩到联络中心之外的一种重度耳机工作流
      - 建起跨多个 logo 的基准数据集，把干预动作与 QA、离职结果连起来
      - 建立至少 1 个 OEM 打包渠道或工作流软件渠道的伙伴分发
      - 根据相邻需求拉力和生产定价稳定性，重新评估融资策略
risks:
  - risk: 即便 ROI 看起来成立，员工信任和监管接受度仍可能直接阻断部署。
    likelihood: High
    impact: High
    mitigation: 从明确同意、员工可见控制、非纪律化产品边界和经顾问审阅的短留存政策做起。
  - risk: 在嘈杂的真实联络中心条件下，信号可靠性可能不够。
    likelihood: High
    impact: High
    mitigation: 把范围限制在低风险建议上，按用户逐个校准，对照基线验证，在证据不足前避免高风险自动化。
  - risk: 硬件供给和 OEM 数据权可能拖慢实施与销售周期。
    likelihood: Medium
    impact: High
    mitigation: 支持多家 OEM，尽早做伙伴尽调，并把试点时间卡在客户耳机更新窗口上。
  - risk: 在切口被证明前，现有 WFM 或 QA 厂商可能凭分发优势先一步吸收这个工作流。
    likelihood: Medium
    impact: Medium
    mitigation: 聚焦差异化的神经数据结果，优先做集成而不是替换，并积累专有的跨设备结果数据。
  - risk: 如果定价受压或相邻需求拉力不足，联络中心这个滩头可能太小，撑不起 venture-scale 回报。
    likelihood: Medium
    impact: High
    mitigation: 保持低 burn，在第 12-18 个月前验证相邻工作流扩张，并在扩张拉力不明显时收紧融资姿态。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金将覆盖一个精简的创始团队、OEM 与法务尽调、2-3 个 design-partner 试点、首批 WFM 或 QA 集成，以及判断这个切口能否转成可重复生产收入所需的关键证据。
