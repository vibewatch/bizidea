market:
  tam:
    value: $88.8M
    rationale: 'Bottom-up estimate: Concentrix (455k employees), TTEC (51k), and TaskUs (65.5k) imply 571.5k employees; applying 60% delivery-role share and 60% voice/headset-heavy share yields ~206k seats. Scaling by 2.4x for additional private/global peers gives ~493k seats; at $15/seat/month the TAM is about $88.8M.'
    isEstimate: true
    sourceRefs:
    - 4
    - 5
    - 6
    - 18
  sam:
    value: $18.0M
    rationale: Constraining to English-language outsourced contact centers with 500+ seats and plausible pilot readiness yields about 100k reachable seats at the same $180 annual ARPU.
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 5
    - 6
    - 18
  som:
    value: $1.8M
    rationale: Twelve BPO logos times 700 seats times $18/seat/month for 12 months yields about $1.8M ARR.
    isEstimate: true
    sourceRefs:
    - 18
    - 21
