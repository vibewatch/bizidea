assumptions:
  - id: A1
    name: Opening cash from pre-seed round
    value: "2600000"
    unit: usd
    source: "[BP fundingAsk.targetFundingRangeUsd] Base model starts immediately after a $2.6M close inside the stated $2-3M range."
  - id: A2
    name: Average paid pilot price
    value: "45000"
    unit: usd per pilot
    source: "[BP gtm.pricing] Uses the midpoint of the stated $30,000-$75,000 paid-pilot range."
  - id: A3
    name: Pilot duration
    value: "3"
    unit: months
    source: "[BP gtm.pricing] 8-12 week pilot modeled as 3 months of revenue recognition."
  - id: A4
    name: Initial production seat price
    value: "18"
    unit: usd per seat per month
    source: "[BP gtm.pricing; Research market.som] Uses the top end of BP pricing and the research SOM math."
  - id: A5
    name: Initial production seats per logo
    value: "500"
    unit: seats
    source: "[BP executiveSummary; Research market.sam] First customer profile is a 500+ seat outsourced contact center."
  - id: A6
    name: Mature production seats per logo
    value: "700"
    unit: seats
    source: "[Research market.som] SOM assumes 12 logos averaging 700 monitored seats."
  - id: A7
    name: Production logos at year end
    value: "Y1 2; Y2 5; Y3 12"
    unit: logos
    source: "[BP milestones; Research market.som] Y1 proves pilot conversion, Y2 hits 3-5 production logos, Y3 approaches the 12-logo SOM."
  - id: A8
    name: Pilot to production conversion
    value: "60"
    unit: percent
    source: "[BP gtm.funnelTargets] BP targets 50%+ conversion; model uses 60% blended as a credible but not aggressive base."
  - id: A9
    name: Gross margin ramp
    value: "Y1 69%; Y2 71%; Y3 73%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] Ramps modestly above the 70% target as implementation work becomes more repeatable."
  - id: A10
    name: Monthly logo churn
    value: "2.0"
    unit: percent
    source: "Startup-finance heuristic: early enterprise SaaS with concentrated logos is modeled more conservatively than mature SaaS."
  - id: A11
    name: CAC per production logo
    value: "70000"
    unit: usd
    source: "Startup-finance heuristic anchored to founder-led outbound, 9-month enterprise sales motion, and paid-pilot-heavy conversion."
  - id: A12
    name: Average sales cycle
    value: "9"
    unit: months
    source: "[BP market.buyingProcess; BP gtm.channels] Enterprise BPO sales with legal, HR, IT, and site leadership review is modeled at 9 months."
  - id: A13
    name: Headcount ramp
    value: "3 FTE at Q1Y1; 5 at Q4Y1; 9 at Q4Y2; 12 at Q4Y3"
    unit: fte
    source: "[BP team; BP milestones] Founding team timing comes from BP, with later GTM/CS hires added only as production logos accumulate."
  - id: A14
    name: Fully loaded compensation
    value: "Founder 144K; Eng 174K; ML 198K; Product 162K; Solutions 150K; Sales 168K; CS 132K; Partnerships 156K; G&A 114K"
    unit: usd per year
    source: "Startup-finance heuristic using US early-stage salary bands plus 20% payroll tax and benefits load."
  - id: A15
    name: Non-payroll operating spend
    value: "18K-28K per month"
    unit: usd per month
    source: "[BP operations] Covers cloud, data tooling, legal/privacy counsel, insurance, travel, and prospecting tools."
  - id: A16
    name: Cash flow treatment
    value: "EBITDA approximates operating cash movement"
    unit: policy
    source: "Startup-finance heuristic: no debt, taxes, capex, or working-capital line is modeled for this software-first pre-seed case."
  - id: A17
    name: Next financing milestone
    value: "5 production logos, 2 OEM data-rights agreements, one multi-site expansion, repeatable implementation playbook"
    unit: milestone
    source: "[BP milestones 0-12 months and 12-24 months; BP operatingAssumptions] Used to size the round plus 6 months of buffer."
  - id: A18
    name: Downside pricing floor
    value: "15"
    unit: usd per seat per month
    source: "[Research reportMemo.sensitivityCases] Research explicitly notes a $10/month clearing case; downside scenario uses a milder but still adverse $15/month outcome."
