scenarios:
  downside:
    description: OEM rollout and legal signoff slip, seat pricing clears nearer $15, and pilot conversions fall below plan.
    y3RevenueK: 990.0
    y3EbitdaK: -720.0
    cashLowPointK: 90.0
    keyAssumptionChanges:
      - Seat price averages $15 instead of $18.
      - Pilot-to-production conversion falls from 60% to 40%.
      - OEM and consent approvals push most new logos back by two quarters.
      - Monthly churn rises from 2.0% to 3.0%.
  base:
    description: Founder-led pilots convert into 12 production logos by Q4Y3 while hiring stays milestone-tied and gross margin reaches the low-70s.
    y3RevenueK: 1410.0
    y3EbitdaK: -521.0
    cashLowPointK: 450.0
    keyAssumptionChanges:
      - Production logos reach 2 by Y1, 5 by Y2, and 12 by Y3.
      - Seat pricing holds at $18 with 500-seat initial land and 700-seat mature expansion.
      - Gross margin rises from 69% in Y1 to 73% in Y3.
      - Sales, CS, and partnerships hires are added only after pilot and production milestones are met.
  upside:
    description: Two OEM channels open on time, sales cycles compress, and more logos expand to second sites before year end.
    y3RevenueK: 1785.0
    y3EbitdaK: -120.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - Sales cycle compresses from 9 months to 6 months.
      - Production logos reach 14 by Q4Y3.
      - Mature logos expand faster toward 700-seat deployments.
      - Gross margin reaches 76% as implementation becomes more standardized.
