  - variable: ARPU
    downsideCase: "$15 per seat per month with slower seat expansion"
    baseCase: "$18 per seat per month with 500-seat land and 700-seat expansion"
    upsideCase: "$18 per seat per month with faster 700-seat rollout across mature logos"
    y3RevenueImpactK: -235.0
    cashImpactK: -170.0
  - variable: CAC
    downsideCase: "$90K CAC because more founder and solutions time is needed per logo"
    baseCase: "$70K CAC"
    upsideCase: "$55K CAC from OEM and workflow-partner assisted distribution"
    y3RevenueImpactK: -60.0
    cashImpactK: -150.0
  - variable: churn
    downsideCase: "3.0% monthly logo churn from weak ROI proof or policy pushback"
    baseCase: "2.0% monthly logo churn"
    upsideCase: "1.0% monthly logo churn with strong multi-site stickiness"
    y3RevenueImpactK: -120.0
    cashImpactK: -95.0
  - variable: sales cycle
    downsideCase: "12 months from first meeting to production contract"
    baseCase: "9 months"
    upsideCase: "6 months with paid pilots attached to OEM refresh cycles"
    y3RevenueImpactK: -260.0
    cashImpactK: -220.0
  - variable: gross margin
    downsideCase: "68% because implementation and OEM support stay services-heavy"
    baseCase: "73%"
    upsideCase: "76% after integration and onboarding playbooks standardize"
    y3RevenueImpactK: 0.0
    cashImpactK: -70.0
  - variable: hiring pace
    downsideCase: "Second AE, partnerships, and finance hires are pulled forward by two quarters"
    baseCase: "All non-core hires are milestone-tied"
    upsideCase: "Back-office and one GTM hire are delayed until more than 8 production logos"
    y3RevenueImpactK: -20.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> QualifiedPipeline
      QualifiedPipeline --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> MonitoredSeats
      MonitoredSeats --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> OperatingSpend
      OperatingSpend --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from converting two founder-led paid pilots into production in Y1, reaching five logos by Y2, then expanding to twelve 700-seat logos by Q4Y3.
  - checkName: Must go right
    finding: The model depends on OEM data-rights access and employee-consent workflows staying good enough to keep pilot-to-production conversion near the 50%+ BP target.
  - checkName: Model breaks if
    finding: If sales cycles stretch to 12 months or pricing clears materially below $18 per seat, the downside case drives cash close to depletion before the next round.
  - checkName: Next-round proof
    finding: The seed story is strongest once the company shows five production BPO logos, one multi-site expansion, and repeatable implementation with two OEM telemetry sources.
sanityChecks:
  ruleOf40: "Y3 growth 136% + EBITDA margin -37% = 99%; directionally strong but inflated by a small Y2 revenue base."
  burnMultiple: "Burn multiple is about 1.7x in Y2 on net new ARR, improving to about 0.4x in Y3 as recurring seat revenue compounds faster than burn."
  revenuePerFte: "$134K Y3 on average 10.5 FTE (benchmark $200–400K SaaS)"
  flags:
    - Two paid pilots convert in Y1 in the base case; if one slips, the cash curve worsens quickly.
    - Revenue per FTE remains below mature SaaS norms through Y3 because integrations, consent workflows, and implementation work stay relatively labor intensive.
    - Cash flow assumes EBITDA is a good proxy for cash burn; working-capital timing on pilot invoicing and annual prepay still needs validation in real contracts.
    - The Y3 plan still relies on OEM data-rights agreements and 50%+ employee opt-in staying feasible outside controlled pilots.
