market:
  tam:
    value: $88.8M
    rationale: 自下而上估算：Concentrix（455k employees）、TTEC（51k）和 TaskUs（65.5k）合计 571.5k 名员工；按 60% delivery-role 占比和 60% 语音 / 重度耳机占比，得到约 206k 个席位。再按 2.4x 扩到更多私营和全球同行，约为 493k 个席位；若按 $15/seat/month 计，TAM 约为 $88.8M。
    isEstimate: true
    sourceRefs:
    - 4
    - 5
    - 6
    - 18
  sam:
    value: $18.0M
    rationale: 把范围收窄到拥有 500+ 席位、以英语为主且具备试点准备度的外包联络中心，可触达席位约为 100k；按同样每年 $180 ARPU 估算，SAM 约为 $18.0M。
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 5
    - 6
    - 18
  som:
    value: $1.8M
    rationale: 12 个 BPO logo × 每个 700 席 × $18/seat/month × 12 个月，约为 $1.8M ARR。
    isEstimate: true
    sourceRefs:
    - 18
    - 21
