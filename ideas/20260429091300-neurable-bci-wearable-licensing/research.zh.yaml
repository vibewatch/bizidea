        - 13
        - 13
    - case: Seat pricing clears only $10/month
      impact: 按同样的 logo 计划，ARR 将大约只有 $1.0M，而不是 $1.8M。
      sourceRefs:
        - 18
  validationPlan:
    - priority: high
      question: 如果 EEG 监测被限制为倦怠预防和非纪律处分用途，座席与法务相关方是否会同意？
      evidenceToGather: 与 3-5 个 BPO 法务/HR 团队以及 20+ 名一线员工进行试点政策审查。
    - priority: high
      question: 相比现有的排班、情绪或遵守率代理指标，EEG 是否能更早预测 QA 或倦怠恶化？
      evidenceToGather: 进行 90 天设计合作方试点，并与现有 QA/WFM 信号进行盲比对。
    - priority: medium
      question: 哪种干预最先能创造足够 ROI 以打开预算？
      evidenceToGather: 分别对微休息时机、队列路由和主管辅导逐项做 A/B 测试。
    - priority: medium
      question: 哪些 OEM 允许在消费级 EEG 硬件之上授予企业数据权？
      evidenceToGather: 与类似 Neurable 的授权方以及至少一个额外 OEM 做商业尽调。
