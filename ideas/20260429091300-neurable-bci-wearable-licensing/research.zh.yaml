market:
  tam:
    value: $88.8M
    rationale: 自下而上估算：Concentrix（455k 员工）、TTEC（51k）和 TaskUs（65.5k）合计 571.5k 员工；按 60% 交付岗位占比和 60% 语音/高耳机占比计算，得到约 206k 席位。再按 2.4x 扩展系数覆盖其他私营/全球同行，可得约 493k 席位；按每席位每月 $15 计费，TAM 约为 $88.8M。
    isEstimate: true
    sourceRefs:
      - 4
      - 5
      - 6
      - 18
  sam:
    value: $18.0M
    rationale: 将范围限制为拥有 500+ 席位且具备试点就绪度的英语外包联络中心，在同样 $180 年 ARPU 下，可触达席位约为 100k。
    isEstimate: true
    sourceRefs:
      - 1
      - 4
      - 5
      - 6
      - 18
  som:
    value: $1.8M
    rationale: 12 个 BPO logo × 700 个席位 × $18/席位/月 × 12 个月，得到约 $1.8M ARR。
    isEstimate: true
    sourceRefs:
      - 18
      - 21
