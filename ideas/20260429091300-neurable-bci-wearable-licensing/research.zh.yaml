market:
  tam:
    value: $88.8M
    rationale: 自下而上估算：Concentrix 455k 员工、TTEC 51k、TaskUs 65.5k，合计 571.5k；若按 60% 交付岗位占比，再乘 60% 的语音 / 重度耳机场景占比，可得约 206k 个席位。再对其他私营与全球同类企业乘以 2.4x 扩展系数，得到约 493k 个席位；按每席每月 $15 计，TAM 约为 $88.8M。
    isEstimate: true
    sourceRefs:
    - 4
    - 5
    - 6
    - 18
  sam:
    value: $18.0M
    rationale: 若只看 500+ 坐席、英语场景、且具备现实试点可能的外包联络中心，可触达席位约 100k；按同样每年 $180 的 ARPU，SAM 约为 $18.0M。
    isEstimate: true
    sourceRefs:
    - 1
    - 4
    - 5
    - 6
    - 18
  som:
    value: $1.8M
    rationale: 以 12 个 BPO 客户 × 每家 700 个席位 × 每席每月 $18 × 12 个月估算，ARR 约为 $1.8M。
    isEstimate: true
    sourceRefs:
    - 18
    - 21
