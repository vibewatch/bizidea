  validationPlan:
  - priority: high
    question: 如果产品只用于预防倦怠和非纪律性动作，坐席与法务相关方是否愿意接受 EEG 监测？
    evidenceToGather: 和 3-5 个 BPO 法务 / HR 团队做试点政策评审，并访谈 20+ 名一线坐席。
  - priority: high
    question: 相比现有的排班、情绪或达标率代理指标，EEG 能否更早预测 QA 或倦怠恶化？
    evidenceToGather: 跑一个 90 天 design-partner 试点，并与现有 QA / WFM 信号做盲测对比。
  - priority: medium
    question: 哪一种干预最先能打开预算？
    evidenceToGather: 分别对微休息时点、队列分流和主管辅导做 A/B 测试，一次只测一种。
  - priority: medium
    question: 哪些 OEM 允许在消费级 EEG 硬件之上叠加企业数据权？
    evidenceToGather: 对类似 Neurable 的授权方，以及至少一家额外 OEM 做商业尽调。
