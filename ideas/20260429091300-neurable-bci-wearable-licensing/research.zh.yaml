  validationPlan:
  - priority: high
    question: 如果用途被严格限制在防过劳和非纪律性动作上，坐席与法务相关方会同意 EEG 监测吗？
    evidenceToGather: 与 3-5 个 BPO 的法务 / HR 团队做试点政策评审，并访问 20+ 名前线坐席。
  - priority: high
    question: 相比现有排班、情绪或遵守率代理指标，EEG 能更早预测 QA 或过劳恶化吗？
    evidenceToGather: 做一个 90 天的共创客户试点，盲测对比现有 QA / WFM 信号。
  - priority: medium
    question: 哪一种干预最先能撬开预算？
    evidenceToGather: 把微休息时机、队列路由和主管辅导逐一做 A/B 测试。
  - priority: medium
    question: 哪些 OEM 允许在消费级 EEG 硬件之上叠加企业级数据权？
    evidenceToGather: 对 Neurable 类授权方做商务尽调，并至少再覆盖 1 家 OEM。
