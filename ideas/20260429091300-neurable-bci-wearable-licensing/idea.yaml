topRisks:
  - name: Privacy backlash
    description: Employees and regulators may view brain-signal monitoring as surveillance, killing adoption even if the ROI is clear.
    mitigation: Start with explicit consent, employee-visible dashboards, limited retention, and policy controls that restrict use to wellness and staffing interventions rather than disciplinary actions.
  - name: Signal reliability
    description: Consumer EEG signals may be too noisy for high-stakes operational decisions in real-world call center environments.
    mitigation: Limit recommendations to low-risk interventions such as breaks and routing, require calibration periods, and prove lift against QA and attrition before deeper workflow automation.
  - name: Hardware dependency
    description: If OEM rollout of EEG-enabled headsets is slower than expected, the startup could be blocked on device availability.
    mitigation: Build the workflow and analytics layer to support multiple headset partners and launch with small pilots tied to refresh cycles rather than betting on one vendor.
