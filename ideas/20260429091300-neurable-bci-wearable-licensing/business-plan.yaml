slug: cognitive-fatigue-ops
date: '2026-04-29'
executiveSummary: >-
  Cognitive Fatigue Ops sells a workflow layer for outsourced contact centers
  that converts EEG telemetry from OEM headsets into low-risk staffing and
  coaching actions. The first customer is a US-led or other English-language
  BPO with 500+ voice seats, standardized over-ear headsets, and visible QA or
  attrition pressure. The initial product does not claim clinical inference or
  automated discipline; it recommends microbreaks, queue rebalancing, and
  supervisor prompts tied to measurable operational outcomes. This wedge is
  timed to Neurable's licensing push, which suggests EEG distribution may expand
  faster through headset OEMs than through a startup building hardware itself.
  The market appears real but narrow in the first three years, with research
  estimating about $88.8M TAM, $18.0M SAM, and $1.8M year-3 SOM for the
  contact-center beachhead. The company therefore has to prove two things
  quickly: that workers and legal teams will consent to non-disciplinary EEG
  monitoring, and that fatigue signals improve intervention timing beyond
  existing WFM and QA proxies. The plan deliberately avoids Europe, generic
  employee surveillance, and broad wellness software until consent, ROI, and
  data-rights evidence are stronger. Current evidence supports a serious watch
  case, but not yet a high-conviction meet, because real-world signal
  reliability, buyer adoption, and OEM data rights remain unproven.
problem:
  - Contact-center operators usually detect burnout only after QA scores, compliance errors, or attrition worsen.
  - Existing substitutes such as static break schedules, supervisor judgment, WFM dashboards, and wellness surveys do not capture in-shift cognitive overload.
  - As EEG moves into everyday headsets, buyers still lack an auditable workflow product that turns brain-signal data into safe operational actions.
solution:
  - Ingest EEG telemetry from licensed OEM headsets, calibrate each agent baseline, and produce fatigue, focus, and recovery scores at shift level.
  - Feed those scores into supervisor and WFM workflows to recommend microbreaks, lower-complexity queue routing, and targeted coaching before performance degrades.
  - Give employees visible consent controls and personal trend views, while logging every intervention and outcome so customers can prove the system is preventive rather than covert surveillance.
whyWeWin:
  - The company is not selling hardware or a generic wellness app; it is solving one workflow where workers already wear headsets and fatigue has direct unit economics.
  - The product lands as an overlay on existing WFM, QA, and headset stacks, which lowers switching cost versus asking BPOs to replace core systems.
  - If pilots work, the company compounds a hard-to-replicate dataset linking cross-device EEG signals, interventions, and QA or attrition outcomes across thousands of shifts.
strategicChoices:
  beachhead: English-language outsourced customer-support centers with 500-1000 voice agents, standardized over-ear headsets, and an active headset refresh or QA-improvement program.
  wedgeRationale: This segment already manages break adherence, QA, and burnout as core metrics, so a low-risk intervention product can be tested against existing KPIs without asking customers to change the whole operation. Broader employer-wellness or horizontal BCI software would face fuzzier buyers, weaker triggers, and harder ROI proof.
  sequencingRationale: Start with consent, calibration, and recommendation workflows before any automation because legal trust and signal validation are the gating risks. Sell directly to operations leaders for the first 2-3 pilots, then add OEM bundle and workflow-partner distribution only after the team proves a repeatable pilot-to-production motion and the first integrations shorten deployment.
  notYet:
    - Europe before US-led deployment and policy controls are proven
    - Generic employee monitoring or disciplinary scoring
    - Custom EEG hardware development
    - Small contact centers under 200 seats
    - Expansion into telesales, telehealth, or dispatch before the BPO playbook is repeatable
market:
  tam: $88.8M estimated bottom-up TAM based on about 493,000 reachable voice and headset-heavy outsourced contact-center seats at roughly $15 per monitored seat per month.
  sam: $18.0M estimated SAM for English-language outsourced contact centers with 500+ seats and plausible pilot readiness.
  som: $1.8M estimated year-3 SOM based on 12 BPO logos averaging 700 monitored seats at roughly $18 per seat per month.
  segments:
    - Outsourced contact centers with 500+ voice agents serving ecommerce or fintech programs
    - Later headset-heavy operations such as telesales, telehealth, and dispatch
  buyingProcess: Operations or workforce-management leaders are the likely budget owners, with QA, HR, legal, IT, and site leadership involved before deployment. Budget is most likely unlocked by a headset refresh, a burnout or attrition spike, or a client-mandated QA improvement program that creates urgency for another intervention lever.
product:
  mvp: Version 1 is a recommendation layer that ingests headset telemetry, performs agent calibration, generates fatigue and recovery scores, and surfaces microbreak and coaching recommendations with employee consent controls. It should support shadow mode and manual actioning first, plus a basic export into existing WFM or QA workflows.
  sixMonth: Two design-partner pilots live in shadow mode with consent workflows, calibration dashboards, one WFM integration, and reporting that compares EEG-driven recommendations against existing QA and schedule signals.
  twelveMonth: Production deployment for at least one BPO with supervisor workflows, queue-routing recommendations, benchmark reporting by site or program, and support for at least two OEM headset sources.
  twentyFourMonth: Expand the same decisioning engine into adjacent headset-heavy workflows and sell benchmark and policy modules to existing customers instead of building a broad wellness platform.
  keyBets:
    - Consumer-grade EEG can reliably support low-risk recommendations after calibration.
    - Agents will opt in if the product is visibly non-disciplinary and tied to fatigue prevention.
    - Existing WFM and QA systems are open enough that an overlay can fit without long replacement projects.
    - Cross-device normalization across multiple OEMs becomes a moat rather than a support burden.
gtm:
  wedge: Sell a paid pilot around one BPO site or program where headset refresh, burnout pressure, or QA remediation creates an immediate decision window.
  channels:
    - Founder-led outbound to VP Operations and Head of Workforce Management at target BPOs
    - OEM and headset-bundle partnerships tied to annual refresh cycles
    - Integrations and co-selling with WFM, QA, and BPO-governance vendors
  funnelTargets: Target accounts→qualified pilot conversations 20-30%, qualified pilot conversations→paid pilots 20-25%, paid pilots→production 50%+, production→second site or module expansion 50%+ within 12 months
  pricing: Charge an 8-12 week paid pilot of roughly $30,000-$75,000 for one site, then convert to annual software priced per monitored agent seat per month, targeting roughly $12-$18 with annual minimums and premium fees for benchmarking and deeper WFM or QA integrations. This keeps pricing below major WFM or copilot spend while tying value to monitored labor volume and measurable QA or attrition outcomes.
businessModel:
  revenueStreams:
    - Annual SaaS subscription priced by monitored agent seats
    - Paid pilot and deployment fees
    - Premium integration and benchmark modules
    - Later expansion modules for adjacent headset-heavy workflows
  unitOfValue: Monitored agent seat per month under an annual site or enterprise contract
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more sites and programs within the same BPO logo
    - Sell benchmark reporting and intervention playbooks built from aggregated outcome data
    - Expand from microbreak recommendations into routing and coaching modules
    - Extend the same readiness engine into adjacent headset-heavy workflows
strategyMap:
  northStarMetric: Production monitored agent seats with validated intervention-outcome tracking
  inputMetrics:
    - Qualified BPO discovery calls per quarter
    - Design-partner conversion rate
    - Median days from kickoff to shadow-mode deployment
    - Agent opt-in rate during pilots
    - Pilot lift in QA variance, break adherence, or attrition-risk proxy versus baseline
    - Pilot-to-production conversion rate
  moatsToBuild:
    - Cross-OEM signal-normalization and calibration layer
    - Outcome dataset linking fatigue scores, interventions, and operational results
    - Policy and consent controls trusted by legal, HR, and labor stakeholders
    - Reusable integrations into WFM, QA, and governance systems
  killCriteria:
    - Fewer than 2 paid pilots after 20 qualified BPO conversations in the first 12 months
    - Agent opt-in stays below 50% in the first two pilots despite non-disciplinary positioning
    - Pilot results fail to beat baseline QA or burnout proxies by a statistically useful margin after 90 days
    - No OEM partner grants enterprise data rights needed for production deployments
  mermaid: |
    flowchart LR
      Wedge[Contact-center fatigue wedge] --> MVP[Consent plus scoring plus recommendations]
      MVP --> Proof[Paid pilots with QA and burnout proof]
      Proof --> Expansion[Multi-site rollout and adjacent workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Credible workflow wedge, but conviction should stay limited until consent, signal lift, and OEM data rights are proven in paid pilots.
    whyBelieve: Research shows real buyer pain, adjacent software budgets, and a clear hardware-distribution catalyst that creates space for an application-layer company.
    whyDoubt: The near-term beachhead is small and heavily constrained by privacy, labor, and signal-reliability risk, so the company could stall before proving a scalable category.
    nextDiligence: Secure two paid BPO pilots with signed employee-consent policies and a shared scorecard comparing EEG-driven interventions against current WFM and QA methods.
  firstCustomer:
    title: VP Operations at a 500-1000 seat outsourced support center
    profile: A BPO serving ecommerce or fintech programs with standardized headsets, centralized WFM, visible QA variance, and annual headset procurement cycles.
    trigger: A headset refresh, burnout spike, or client escalation on QA that makes management willing to trial another operational lever.
    buyer: VP Operations or Head of Workforce Management
    initialContract: 8-12 week paid pilot for one site at roughly $30,000-$75,000, converting to an annual contract at roughly $12-$18 per monitored seat per month if the pilot improves agreed operating metrics and passes legal review.
  mustBeTrue:
    - At least 3 of the first 10 target BPOs say burnout or QA variance is urgent enough to fund a paid pilot this year.
    - At least 2 OEM or headset partners allow enterprise access to the data required for production scoring and audit logs.
    - In a 90-day pilot, EEG-derived recommendations outperform existing WFM or QA proxies on at least one agreed intervention metric.
    - More than half of eligible agents opt in when the product is explicitly non-disciplinary and employee-visible.
    - At least 1 pilot converts to production at or above the target seat-pricing band within 6 months of go-live.
  diligenceQuestions:
    - Which headset OEMs will grant enterprise data rights and support BPO deployments rather than only consumer app bundles?
    - What exact KPI improvement will a VP Operations use to approve production budget after a pilot?
    - How do labor, HR, and legal stakeholders define an acceptable boundary between burnout prevention and surveillance?
    - How much incremental lift does EEG provide over existing schedule adherence, QA, sentiment, or handle-time signals?
    - Which WFM and QA systems dominate the first 20 target logos, and how hard are those integrations in practice?
  riskHeatmap:
    - risk: Employee or regulator backlash frames the product as surveillance
      likelihood: High
      impact: High
      leadingIndicator: Pilot legal reviews prohibit production use or agent opt-in falls below 50% despite incentive-neutral consent design.
      mitigation: Keep the first product explicitly opt-in, non-disciplinary, employee-visible, and limited to low-risk interventions with short data retention.
    - risk: Real-world EEG signals are too noisy for operational value
      likelihood: High
      impact: High
      leadingIndicator: Pilot models fail to outperform baseline QA or WFM proxies after calibration and produce inconsistent recommendations across shifts.
      mitigation: Constrain outputs to recommendations, require calibration periods, compare against baselines in shadow mode, and avoid high-stakes automation.
    - risk: OEM rollout or enterprise data access is slower than expected
      likelihood: Medium
      impact: High
      leadingIndicator: Prospects cannot source compatible headsets during refresh cycles or OEM contracts restrict production data export.
      mitigation: Support multiple headset partners, sell around refresh windows, and prioritize commercial diligence on data rights before custom integration work.
    - risk: Incumbent WFM and QA vendors absorb the workflow before the startup gains proof
      likelihood: Medium
      impact: Medium
      leadingIndicator: Buyers repeatedly ask for the feature only as an add-on to NICE, Observe.AI, or similar systems and resist point-solution pilots.
      mitigation: Position as a differentiated neural-data layer, integrate into incumbent workflows, and collect outcome data that incumbents do not already own.
    - risk: Beachhead economics are too small for venture-scale returns
      likelihood: Medium
      impact: High
      leadingIndicator: Production pricing settles near $10 per seat per month and expansion pull into adjacent workflows remains weak after the first year.
      mitigation: Test expansion demand early, keep the team lean through proof, and avoid raising on a broad platform story until adjacency demand is real.
operatingAssumptions:
  - assumption: English-language BPOs with 500+ seats will buy a separate fatigue-ops pilot without waiting for core WFM vendors to add the feature.
    basis: research.yaml
    validationTest: Run 15 target-account interviews and secure at least 2 paid pilots at the stated pilot pricing from qualified BPOs.
    decisionImpact: If false, the company should pivot toward channel-first distribution or abandon the standalone application-layer thesis.
  - assumption: The first production use case can stay within low-risk recommendations and still show measurable ROI.
    basis: idea.yaml
    validationTest: In a 90-day pilot, show agreed improvement on at least one operational KPI from microbreaks, routing, or coaching without automated enforcement.
    decisionImpact: If false, the roadmap requires deeper automation earlier, increasing legal and technical risk.
  - assumption: Agent consent is achievable when product controls and personal visibility are explicit.
    basis: research.yaml
    validationTest: Collect written policy feedback from 3-5 BPO HR or legal teams and achieve more than 50% opt-in in the first two pilots.
    decisionImpact: If false, the company may need to narrow to employee self-service wellness tooling or exit the market.
  - assumption: Two to three WFM and QA integrations cover most near-term target logos.
    basis: operator judgment
    validationTest: Map the first 20 prospects by systems stack and confirm a small set covers most qualified opportunities.
    decisionImpact: If false, implementation becomes too services-heavy and slows sales efficiency.
  - assumption: At least two headset OEMs will support production data access and enterprise contracting.
    basis: research.yaml
    validationTest: Complete commercial diligence with Neurable-like suppliers and secure written data-rights terms from at least 2 partners.
    decisionImpact: If false, hardware dependency becomes the bottleneck and the company should delay fundraising or change beachhead.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Run 20 structured interviews with VP Operations, WFM, QA, HR, and legal stakeholders across target BPOs.
    hypothesis: A headset refresh or QA-remediation program creates enough urgency for a paid pilot in the target segment.
    successMetric: At least 10 qualified opportunities and 2 target accounts agreeing to pilot scope, buyer, and timeline.
    owner: CEO / founder-sales
  - horizon: 0–90 days
    experiment: Complete OEM diligence on data rights, telemetry access, and procurement terms with at least 3 headset suppliers.
    hypothesis: Enterprise-grade data access is available without building custom hardware.
    successMetric: At least 2 suppliers provide acceptable data-rights terms for a BPO deployment.
    owner: CEO / partnerships
  - horizon: 0–90 days
    experiment: Prototype consent UX, employee dashboard, and supervisor recommendation console with 10-15 target users.
    hypothesis: Employee visibility and non-disciplinary framing materially improve trust and willingness to participate.
    successMetric: At least 70% of interviewed users say the policy and UI are understandable and acceptable for a pilot.
    owner: Product lead
  - horizon: 90–180 days
    experiment: Launch the first shadow-mode pilot and compare EEG-driven recommendations with existing WFM and QA signals.
    hypothesis: Calibrated EEG scores detect intervention windows earlier than current operational proxies.
    successMetric: One statistically useful lead indicator or KPI lift after 90 days and no unresolved legal blockers.
    owner: Founding eng + data lead
  - horizon: 90–180 days
    experiment: A/B test microbreak timing, queue routing suggestions, and supervisor coaching prompts one at a time.
    hypothesis: One intervention class will show clearer ROI and become the default wedge for production conversion.
    successMetric: One intervention produces a measurable improvement large enough to anchor production pricing and case studies.
    owner: Product lead + design partner ops lead
  - horizon: 180–360 days
    experiment: Convert the best pilot to production and roll out to a second site or program within the same logo.
    hypothesis: Multi-site expansion inside one BPO is faster and cheaper than finding a net-new logo.
    successMetric: One production contract plus one expansion commitment inside the first customer within 6 months of pilot close.
    owner: CEO / customer success
operations:
  - Consent and policy review workflow with customer legal, HR, and site leadership before any pilot launch
  - Versioned scoring, intervention, and audit-log pipeline so every recommendation can be traced to model version and policy state
  - Integration playbook for the first WFM and QA systems prioritized by prospect coverage rather than custom requests
  - OEM partner management covering data rights, firmware changes, and device support commitments
  - Weekly design-partner review cadence with baseline metrics, exception tracking, and employee feedback
team:
  - role: Founder / CEO
    startTiming: Month 0
    rationale: Own discovery, enterprise selling, design-partner management, and OEM partnership negotiations while the motion is still hypothesis-driven.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the ingestion, consent, audit, and integration backbone needed for pilots.
  - role: Applied ML or data lead
    startTiming: Month 0-2
    rationale: Own calibration logic, cross-device normalization, and pilot analysis to prove or disprove signal value quickly.
  - role: Product and operations lead
    startTiming: Month 2-4
    rationale: Translate BPO workflows into recommendation logic, pilot scorecards, and production-ready operating playbooks.
  - role: Solutions engineer
    startTiming: Month 4-6
    rationale: Shorten implementation time once the first design partner signs and productize the first integrations.
  - role: Privacy and labor counsel advisor
    startTiming: Month 0
    rationale: Reduce the highest adoption risk early by shaping product boundaries, consent language, and retention policies.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 2 paid pilots in the target BPO segment
      - Secure 2 headset OEMs with acceptable enterprise data-rights terms
      - Ship shadow-mode scoring, consent controls, and the first WFM or QA integration
      - Convert at least 1 pilot into production with documented KPI impact
  - horizon: 12–24 months
    items:
      - Reach 3-5 production BPO logos with repeatable implementation playbooks
      - Support at least 2 OEM telemetry sources in production
      - Launch benchmark reporting and the highest-performing intervention module as a standard package
      - Expand at least 1 logo to a second site or program
  - horizon: 24–36 months
    items:
      - Prove repeatable expansion into one adjacent headset-heavy workflow beyond contact centers
      - Build a multi-logo benchmark dataset linking interventions to QA and attrition outcomes
      - Establish partner-led distribution with at least 1 OEM bundle or workflow-software channel
      - Reassess fundraising strategy based on adjacency pull and production pricing durability
risks:
  - risk: Employee trust and regulatory acceptance may block deployment even if ROI looks positive.
    likelihood: High
    impact: High
    mitigation: Start with explicit consent, employee-visible controls, non-disciplinary product boundaries, and short-retention policies reviewed by counsel.
  - risk: Signal reliability may be insufficient in noisy real contact-center conditions.
    likelihood: High
    impact: High
    mitigation: Limit scope to low-risk recommendations, calibrate by user, test against baselines, and avoid high-stakes automation until evidence is strong.
  - risk: Hardware availability and OEM data rights may slow implementation and sales cycles.
    likelihood: Medium
    impact: High
    mitigation: Support multiple OEMs, prioritize partner diligence early, and align pilots with customer headset refresh windows.
  - risk: Incumbent WFM or QA vendors may out-distribute the startup before the wedge is proven.
    likelihood: Medium
    impact: Medium
    mitigation: Focus on differentiated neural-data outcomes, integrate rather than replace, and collect proprietary cross-device outcome data.
  - risk: The contact-center beachhead may be too small if pricing compresses or adjacency demand is weak.
    likelihood: Medium
    impact: High
    mitigation: Keep burn low, validate expansion into adjacent workflows by month 12-18, and tighten fundraising posture if expansion pull is absent.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-3M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds a small founding team, OEM and legal diligence, 2-3 design-partner pilots, the first WFM or QA integrations, and enough evidence to decide whether the wedge can convert into repeatable production revenue.
