topRisks:
  - name: 隐私反弹
    description: 员工和监管方可能会把脑信号监测视为监控，即便 ROI 很清楚，也会直接卡死采用。
    mitigation: 从明确同意、员工可见仪表盘、有限留存和严格政策控制做起，把使用范围限制在健康和排班干预，而不是纪律处分。
  - name: 信号可靠性
    description: 消费级 EEG 信号在真实呼叫中心环境里，可能噪声太大，撑不起高风险运营决策。
    mitigation: 先把建议限制在休息和分流这类低风险动作上，要求预先校准，并在更深层自动化前先证明对 QA 和流失有提升。
  - name: 硬件依赖
    description: 如果支持 EEG 的耳机 OEM 推出速度低于预期，创业公司可能会被设备供给卡住。
    mitigation: 把工作流和分析层做成支持多家耳机合作伙伴，并把试点绑在更新周期上，而不是押注单一厂商。
