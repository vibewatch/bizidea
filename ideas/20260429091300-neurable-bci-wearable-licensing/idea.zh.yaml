    successMetric: 每个被监控坐席的离职率和 QA 波动下降
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 一篇带日期的 TechCrunch 报道，加上两页已核验的公司页面，足以证明 BCI 正从小众硬件走向可授权的消费级可穿戴分发。
  painIntensity:
    score: 4
    rationale: 过劳、QA 漏洞和人员流失在联络中心都很贵，即便当前信号簇没有把这部分成本完全量化。
  wedgeClarity:
    score: 5
    rationale: 第一条工作流、买方、触发条件和干预闭环都足够窄，而且可以直接验证。
  defensibility:
    score: 4
    rationale: 护城河会来自认知-结果基准、工作流集成以及信任/合规层，而不只是模型本身的新颖性。
  ventureScale:
    score: 4
    rationale: 一旦滩头市场跑通，公司就能扩到更多重度依赖耳机的工作流，最终走向更广义的可穿戴认知准备度软件。
topRisks:
  - name: 隐私反弹
    description: 员工和监管方可能把脑信号监测视为监控，即便 ROI 清晰，也会直接卡死采用。
    mitigation: 从明确授权、员工可见面板、有限留存和严格政策控制做起，把用途限定在健康与排班干预，而不是纪律处分。
  - name: 信号可靠性
    description: 在真实呼叫中心环境里，消费级 EEG 信号可能过于嘈杂，撑不起高风险运营决策。
    mitigation: 先把建议限制在休息和路由等低风险动作上，要求校准期，并在更深层自动化之前先证明对 QA 和离职率的提升。
  - name: 硬件依赖
    description: 如果支持 EEG 的耳机 OEM 落地比预期慢，创业公司就会被设备供给卡住。
    mitigation: 把工作流和分析层做成支持多个耳机伙伴的结构，并围绕客户的更新周期做小范围试点，而不是押注单一供应商。
