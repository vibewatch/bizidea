ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster has corroborated evidence of dealer adoption, faster workflows, named ticket sizes, and new institutional capital entering the category.
  painIntensity:
    score: 4
    rationale: Slow approvals directly delay equipment purchases and hurt funded conversion, but the pain is concentrated in dealers with enough financed volume.
  wedgeClarity:
    score: 5
    rationale: The first product is a narrow quote-to-approval packaging and routing workflow for specific equipment dealers, not a generic lending platform.
  defensibility:
    score: 4
    rationale: Conversion, stipulation, and asset-level routing data across many dealers and lenders can compound into a differentiated underwriting and workflow moat.
  ventureScale:
    score: 5
    rationale: Hard-asset commerce spans many verticals, and the same rail can expand from origination into servicing, renewals, trade-ins, and pan-European lender distribution.
topRisks:
  - name: Dealer integration sprawl
    description: Each distributor runs a messy mix of CRM, CPQ, broker, and document tools, which can slow deployment and dilute product focus.
    mitigation: Start with one branch, one product family, and exported-data connectors first, then add deeper integrations only after proving funded-conversion lift.
  - name: Incumbent lender bundling
    description: A large lender or broker network could try to bundle a similar workflow into its own captive portal and squeeze out neutral software.
    mitigation: Win by supporting multi-lender routing, dealer-owned workflow data, and cross-lender analytics that a captive portal cannot offer credibly.
  - name: Credit-cycle whiplash
    description: If SME defaults rise, lenders may tighten credit and reduce approval velocity, making workflow software look less urgent in the short term.
    mitigation: Position the product as conversion and packaging infrastructure that helps lenders say yes safely, while also reducing wasted sales effort on weak applications.
