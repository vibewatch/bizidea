problem: >-
  Advanced-manufacturing equipment dealers lose deals because financing still
  runs through emailed PDFs, re-keyed machine specs, and lender-specific
  document chases after the buyer is ready to purchase. Sales teams know the
  exact asset, service plan, and delivery schedule, but that context rarely
  reaches lenders in a structured format, so approvals stall and buyers delay
  capex. As more machines are sold with financing embedded at point of sale,
  the bottleneck shifts from lender appetite to quote-to-underwriting data flow.
targetUser:
  primary: >-
    Commercial finance and sales-operations leaders at UK distributors of CNC
    machines, industrial 3D printers, laser-cutting systems, and other
    advanced-manufacturing equipment sold into SMEs.
  secondary: >-
    Credit and operations teams at non-bank equipment lenders that rely on
    dealer-originated applications and need cleaner asset packaging.
  buyer: >-
    Commercial Director, Head of Sales Operations, or Vendor Finance Director at
    an equipment distributor with multiple lender relationships.
startupThesis:
  nonObviousInsight: >-
    The new scarcity is not capital. Forward-flow facilities and strong loss
    performance show lenders will fund these deals, but only if the asset,
    installation, warranty, and buyer context arrive in a lender-ready package
    at quote time. The winning company is the neutral data rail that standardizes
    machine-sale context before an application ever hits underwriting.
  beachhead: >-
    UK distributors of CNC machines, industrial 3D printers, and laser-cutting
    systems that close 10-50 SME equipment deals per month, finance a large
    share of orders, and currently juggle 3-8 lender relationships through
    email, broker portals, and PDF packets.
  wedge: >-
    A quote-to-approval workspace that pulls machine specs, buyer docs, service
    terms, and installation details from dealer CRM and CPQ workflows, then
    routes one structured package to matched lenders with stipulation tracking
    and e-sign completion.
  whyNowCatalyst: >-
    More than 75 embedded dealer channels, hours-level application turnaround,
    and a new forward-flow facility show the market has crossed from bespoke
    broking into software-ready origination infrastructure.
  ventureScalePath: >-
    Start with UK advanced-manufacturing dealers, then expand into transport,
    agriculture, medical, and energy equipment, becoming the operating system
    for hard-asset commerce, underwriting data, servicing triggers, and
    multi-lender distribution across Europe.
solution: >-
  The product sits between the dealer's quote workflow and the lender's credit
  queue. It converts machine configuration, invoice, warranty, installer,
  maintenance, and buyer KYC documents into a normalized application package so
  the buyer uploads information once and the dealer never re-keys the same deal
  into multiple portals. Lenders receive asset-rich files with consistent fields,
  while dealers get real-time visibility into stipulations, SLA countdowns, and
  fallback options if the first lender declines. Over time, the company can use
  approval, decline, and repeat-order data to recommend lender routing and spot
  which machine categories or customer profiles need different packaging before
  a deal stalls.
goToMarketSeed:
  firstCustomer: >-
    A UK distributor selling CNC machines and industrial 3D printers into
    fabrication and precision-manufacturing SMEs, with 15-30 financed deals per
    month and three or more active lender partners.
  buyingTrigger: >-
    The dealer adds a new lender, launches an online quote flow, or misses
    quarter-end orders because finance approvals are still moving through email
    and manual re-entry.
  currentAlternative: >-
    Email threads, broker portals, lender-specific PDF packs, generic e-sign
    tools, and the status quo of sending buyers to a separate broker after the
    equipment quote is issued.
  switchingReason: >-
    This wedge increases funded conversion without putting the dealer on a new
    balance sheet: it gives sales teams one workflow, gives lenders cleaner
    asset context, and gives buyers a same-day path from quote to signed finance
    documents.
  pricingHypothesis: >-
    SaaS subscription priced by dealer branch and financed deal volume, plus a
    per-funded-order workflow fee tied to saved sales-ops labor and higher
    approval conversion.
