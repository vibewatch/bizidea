differentiator: >-
  Existing lenders own capital and broker portals own submission forms, but
  neither owns the structured asset context that starts in the dealer's quote.
  This company would become the neutral equipment-data layer across dealers and
  lenders, learning which combinations of machine type, service package, buyer
  profile, and document completeness actually convert. That creates a routing
  and underwriting dataset that is hard for any single lender or dealer to
  assemble alone.
