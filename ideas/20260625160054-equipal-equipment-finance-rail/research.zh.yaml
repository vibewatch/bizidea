  searchedQueries:
  - 查找英国资产融资与设备融资市场的权威最新来源，重点关注工业设备经销商的嵌入式融资。优先检索：融资与租赁协会统计数据、British Business Bank、UK Finance、英格兰银行、ONS、Make UK 及制造技术协会。请附来源 URL。
  - 查找与英国消费信贷、信贷经纪、商业贷款、供应商融资、KYC/AML、电子签名及数据保护相关的权威来源，适用于一个为英国中小企业设备经销商打包设备融资申请的软件平台。优先检索：FCA、ICO、HM Treasury 及英国政府来源。请附来源 URL。
  - 查找与经销商嵌入式设备融资、资产融资市集及英国和欧洲设备/中小企业融资贷款起源软件相关的公司及产品页面。优先检索：Equipal、Swoop Funding、Braemar Finance、Kennet Equipment Leasing、nCino、Provenir、finmid 的公开定价或产品页面。请附来源 URL。
  - 查找英国制造业中小企业投资、机械设备采购、资本支出及设备购买融资障碍的权威来源。优先检索：Make UK、BDRC 中小企业融资监测、British Business Bank、ONS、英格兰银行、行业协会及权威专业媒体。请附来源 URL。
  - 查找当前报价至审批设备融资管道替代工具的公开产品、定价及文档页面：DocuSign、PandaDoc、Salesforce Sales Cloud/CPQ、HubSpot 报价模块及通用贷款经纪门户。请附直接 URL。
  - 查找揭示英国设备融资、资产融资申请速度或经销商人工工作流痛点的社区评论、RFP、论坛及客户信号来源。优先检索：经纪商/贷款方的 Trustpilot 评价、制造业论坛及从业者评论。请附来源 URL。
  - 查找与在英国构建设备融资申请打包工作流相关的权威技术与平台来源：开放银行/核验、电子签名、KYC/身份认证、云安全及工作流自动化。优先检索：TrueLayer、Open Banking Limited、DocuSign、Entrust/Onfido、AWS、Microsoft 及标准机构。请附来源 URL。
  - 查找英国制造业中小企业或制造业企业数量（尤其是中小企业）的权威来源，以及企业在机械/设备方面的投资数据。优先检索：DBT 商业人口估算、ONS、Make UK 及英格兰银行。请附来源 URL。
  - 查找英国机床、CNC、3D 打印或先进制造设备经销商/供应商数量，或可作为相关经销商/供应商数量代理指标的行业展会参展商数量的权威来源。优先检索：MTA、MACH、AMUK、ADS 及行业目录。请附来源 URL。
  - MACH 2024 或 MACH 展会有多少家参展商？哪个官方来源有记录？请附 URL。
  - 查找官方 MTA 或 MACH 来源，获取英国 CNC 及制造技术领域参展商、会员或供应商的数量数据。请附 URL。
  - 查找 Novuna Business Finance、Close Brothers Asset Finance、Siemens Financial Services UK、Aldermore 和 Shire Leasing 提供的英国商业资产融资或供应商融资的当前公开产品页面 URL。请附精确 URL。
  - 查找 DLL、BNP Paribas Leasing Solutions UK、Propel Finance 和 Capalona 提供的供应商融资或设备融资的当前公开产品或用例 URL。请附精确 URL。
  - 查找 TrueLayer 支付、银行数据或即时核验（适用于企业引导流程）的当前公开产品或用例 URL。请附精确 URL。
  - 查找 Entrust 或 Onfido 身份核验及 KYC/AML（适用于金融服务场景）的当前公开产品或文档 URL。请附精确 URL。
