  sensitivityCases:
  - case: 信贷成本维持高位，中小企业去杠杆持续
    impact: 量的增长放缓，ROI 须通过降低运营阻力、提交材料更清洁和更高融资转化率来证明，而非单靠品类扩张。
    sourceRefs:
    - 3
    - 4
    - 5
    - 6
  - case: 供应商融资在位企业捆绑自己的工作流层
    impact: 中立的多贷款方路由和经销商自有数据成为核心差异化，但若合作伙伴要求排他，销售周期可能拉长。
