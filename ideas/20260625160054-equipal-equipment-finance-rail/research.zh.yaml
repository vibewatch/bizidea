  validationPlan:
  - priority: high
    question: 一家 CNC 或工业 3D 打印经销商能否在 60 天试点内显著缩短报价至融资签约的周转时间？
    evidenceToGather: 实际交易的前后时间戳、附加条件数量，以及按贷款方细分的融资转化率。
  - priority: high
    question: 两三家贷款方是否愿意接受标准化的经销商自有材料包，而不强制全量重录至首接触门户？
    evidenceToGather: 集成访谈、样本数据映射，以及带真实申请的人工导出试点（追踪接受率和重录情况）。
  - priority: medium
    question: 前 20 家目标客户主流使用哪些经销商系统组合，在做完整 API 工作之前能从导出数据中提取多少信息？
    evidenceToGather: MACH 参展商和试点候选对象的 CRM、ERP 和 CPQ 组合调查。
  - priority: medium
    question: 哪些设备品类产生最高的文件负担，付费意愿最强？
    evidenceToGather: 跨 CNC、增材制造、激光及相邻硬资产垂直领域的资产类型分层分析。
