topRisks:
- name: 经销商集成碎片化
  description: 每家分销商都运行着 CRM、CPQ、经纪商工具和文档工具的杂乱组合，可能拖慢部署节奏、分散产品焦点。
  mitigation: 先从单个网点、单一产品系列和导出数据连接器起步，只有在证明融资转化率提升后，才逐步添加更深层的集成。
- name: 在位贷款方捆绑竞争
  description: 大型贷款方或经纪商网络可能尝试在自己的封闭门户中捆绑类似的工作流功能，挤压中立软件的生存空间。
  mitigation: 靠多贷款方路由、经销商自有工作流数据和跨贷款方分析数据取胜——这些是封闭门户无法可信提供的。
- name: 信贷周期波动冲击
  description: 若中小企业违约率上升，贷款方可能收紧信贷、降低审批效率，短期内让工作流软件看起来没那么紧迫。
  mitigation: 将产品定位为帮助贷款方安全批准申请的转化和打包基础设施，同时减少在薄弱申请上浪费的销售精力。
