jobsToBeDone:
- job: 制造业中小企业确认机器报价后，帮助经销商销售运营团队正确打包资产和买家信息，在订单变冷之前拿到贷款方批准。
  currentAlternative: 发送 PDF 邮件、向各贷款方门户重复录入同一笔交易、在销售代表、买家和经纪商之间追踪缺失文件
  successMetric: 从确认报价到融资文件签署的时间，以及分产品线的融资订单转化率
