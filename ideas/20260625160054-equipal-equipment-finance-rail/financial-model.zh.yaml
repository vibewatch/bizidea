  baseCase: 首家付费共创客户于第 4 个月，第二家经销商于第 9 个月
  upsideCase: 首家标志客户提前一个季度落地，网点扩张更早启动
  y3RevenueImpactK: -114.1
  cashImpactK: -125.1
