scenarios:
  downside:
    description: 贷款方接受周期延长、网点扩张放缓，Y3 末仅有 14 个活跃经销商集团。
    y3RevenueK: 1080.0
    y3EbitdaK: -773.2
    cashLowPointK: -63.7
    keyAssumptionChanges:
    - 混合年 ARPU 降至 $108K——更少网点和工作流费用激活。
    - 毛利率压缩至 67%——更多贷款方交接保持人工操作。
    - 客户路径滑落至 Y2 经历 2、3、4、6 个经销商集团，Y3 经历 8、10、12、14 个。
  base:
    description: 一家付费共创客户完成转化，合作伙伴转介绍稳步新增经销商集团，网点扩张在各账户内拉升 ARPU。
    y3RevenueK: 1425.1
    y3EbitdaK: -551.9
    cashLowPointK: 269.8
    keyAssumptionChanges:
    - 混合年 ARPU 维持在每活跃经销商集团 $114K。
    - 毛利率达到 70% 的商业计划目标。
    - 客户路径在 Y2 达到 3、4、6、8 个经销商集团，Y3 达到 10、12、15、18 个。
  upside:
    description: 首家经销商跨网点扩张更快，合作伙伴渠道更早转化，数据分析层在 Y3 末开始货币化。
    y3RevenueK: 1860.0
    y3EbitdaK: -275.0
    cashLowPointK: 697.5
    keyAssumptionChanges:
    - 混合年 ARPU 升至 $120K——网点密度和工作流费用占比改善。
    - 一旦引导和路由标准化，毛利率扩展至 72%。
    - 客户路径改善至 Y2 达到 4、5、7、10 个经销商集团，Y3 达到 12、15、19、22 个。
