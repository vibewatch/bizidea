modelDiagram:
  title: 经销商集团营收与现金循环
  mermaid: "flowchart LR\n  TargetDealers --> PaidPilots\n  PaidPilots --> ActiveDealerGroups\n  ActiveDealerGroups --> BranchExpansion\n  BranchExpansion --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash\n  PartnerChannels --> ActiveDealerGroups"
modelSanity:
- checkName: 营收引擎
  finding: 基准情景营收由经销商集团从 2 个增至 18 个驱动，同时通过多网点推广和工作流费用提升每账户收入。
- checkName: 必须跑通的假设
  finding: 模型需要贷款方足够频繁地接受标准化的经销商自有材料包，使毛利率维持在 70%，同时引导保持产品化。
- checkName: 模型崩溃条件
  finding: 若销售周期滑后一个季度或网点扩张停滞，下行情景现金在下一轮融资窗口前略微转负。
- checkName: 下轮融资验证点
  finding: 一旦公司达到八个活跃经销商集团、可重复引导和早期基准或路由证据，下一轮融资即有依据。
sanityChecks:
  ruleOf40: Y3 增长率 177.8% + EBITDA 利润率 -38.7% = 139.1%
  burnMultiple: Y3 烧钱倍数 0.6x（Y2 收入 +$912.0K 对应 EBITDA -$551.9K）。
  revenuePerFte: Y3 每全职员工营收 $203.6K（Q4Y3 共 7 名全职员工；垂直 SaaS 基准 $200–400K）。
  flags:
  - 基准情景在全公司盈亏平衡前仍需后续融资；Q4Y3 现金保持正值仅因团队规模精简且招聘推迟至关键节点出现后。
  - 毛利率假设贷款方足够频繁接受标准化的经销商自有材料包，使实施和异常处理不会像服务工作那样增长。
  - 仅当首个网点扩展至每个经销商集团多个桌台后低流失率持续，LTV/CAC 输出才具有说服力。
