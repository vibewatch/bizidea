  upsideCase: Those hires each slip by one quarter with no delivery bottleneck
  y3RevenueImpactK: 0.0
  cashImpactK: -100.5
modelDiagram:
  title: dealer-group revenue and cash loop
  mermaid: |-
    flowchart LR
      TargetDealers --> PaidPilots
      PaidPilots --> ActiveDealerGroups
      ActiveDealerGroups --> BranchExpansion
      BranchExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      PartnerChannels --> ActiveDealerGroups
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from 2 to 18 dealer groups while
    lifting revenue per account through multi-branch rollout and workflow fees.
- checkName: Must go right
  finding: The model needs lenders to accept normalized dealer-owned packages often
    enough that gross margin can hold at 70% while onboarding stays productized.
- checkName: Model breaks if
  finding: If sales cycles slip by a quarter or branch expansion stalls, downside
    cash turns slightly negative before the next financing window opens.
- checkName: Next-round proof
  finding: The next round is justified once the company reaches eight active dealer
    groups with repeatable onboarding and early benchmark or routing evidence.
sanityChecks:
  ruleOf40: Y3 growth 177.8% + EBITDA margin -38.7% = 139.1%
  burnMultiple: 0.6x Y3 burn multiple (-$551.9K EBITDA on +$912.0K revenue vs Y2).
  revenuePerFte: $203.6K Y3 (7 FTE at Q4Y3; benchmark $200–400K vertical SaaS).
  flags:
  - The base case still needs a follow-on round before full-company break-even; Q4Y3
    cash remains positive only because the team stays lean and hiring is delayed until
    proof points appear.
  - Gross margin assumes lenders accept normalized dealer-owned packages often enough
    that implementation and exception handling do not grow like services work.
  - The LTV/CAC output looks strong only if low churn holds after the first branch
    expands to multiple desks inside each dealer group.
