scenarios:
  downside:
    description: Lender acceptance takes longer, branch expansion is slower, and the
      company finishes Y3 with only 14 active dealer groups.
    y3RevenueK: 1080.0
    y3EbitdaK: -773.2
    cashLowPointK: -63.7
    keyAssumptionChanges:
    - Blended annual ARPU falls to 108K as fewer branches and workflow fees activate.
    - Gross margin compresses to 67% because more lender handoffs stay manual.
    - Customer path slips to 2,3,4,6 dealer groups through Y2 and 8,10,12,14 through
      Y3.
  base:
    description: One paid design partner converts, partner-led referrals add dealer
      groups steadily, and branch expansion lifts ARPU inside each account.
    y3RevenueK: 1425.1
    y3EbitdaK: -551.9
    cashLowPointK: 269.8
    keyAssumptionChanges:
    - Blended annual ARPU stays at 114K per active dealer group.
    - Gross margin reaches the 70% business-plan target.
    - Customer path reaches 3,4,6,8 dealer groups in Y2 and 10,12,15,18 in Y3.
  upside:
    description: The first dealer expands faster across branches, partner channels
      convert sooner, and the analytics layer starts monetizing by late Y3.
    y3RevenueK: 1860.0
    y3EbitdaK: -275.0
    cashLowPointK: 697.5
    keyAssumptionChanges:
    - Blended annual ARPU rises to 120K as branch density and workflow-fee mix improve.
    - Gross margin expands to 72% once onboarding and routing standardize.
    - Customer path improves to 4,5,7,10 dealer groups in Y2 and 12,15,19,22 in Y3.
