  downsideCase: Expansion stalls and end-Y3 count reaches 16 dealer groups
  baseCase: End-Y3 count reaches 18 dealer groups
  upsideCase: Expansion holds and end-Y3 count reaches 20 dealer groups
  y3RevenueImpactK: -142.6
  cashImpactK: -75.1
- variable: sales cycle
  downsideCase: Logo landings slip by roughly one quarter
  baseCase: First paid design partner in M4 and second dealer by M9
  upsideCase: First logo lands one quarter earlier and branch expansion starts sooner
  y3RevenueImpactK: -114.1
  cashImpactK: -125.1
- variable: gross margin
  downsideCase: 65% if lenders force more manual re-key and support load stays high
  baseCase: 70% target gross margin
  upsideCase: 75% once routing and onboarding standardize
  y3RevenueImpactK: 0.0
