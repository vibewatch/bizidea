  searchedQueries:
  - Find authoritative recent sources on the UK asset finance and equipment finance market relevant to embedded finance for industrial equipment dealers. Prioritize Finance & Leasing Association statistics, British Business Bank, UK Finance, Bank of England, ONS, Make UK, and manufacturing technology associations. Include source URLs.
  - Find authoritative sources on UK consumer credit, credit broking, business lending, vendor finance, KYC/AML, e-signature, and data protection rules relevant to a software platform that packages equipment finance applications for UK SME equipment dealers. Prioritize FCA, ICO, HM Treasury, and UK government sources. Include source URLs.
  - Find companies and product pages relevant to dealer-embedded equipment finance, asset finance marketplaces, and lending-origination software for equipment/SME finance in the UK and Europe. Prioritize Equipal, Swoop Funding, Braemar Finance, Kennet Equipment Leasing, nCino, Provenir, finmid, and public pricing or product pages. Include source URLs.
  - Find authoritative sources on UK manufacturing SME investment, machinery purchasing, capital expenditure, and obstacles to financing equipment purchases. Prioritize Make UK, BDRC SME Finance Monitor, British Business Bank, ONS, Bank of England, industry associations, and reputable trade press. Include source URLs.
  - 'Find public product, pricing, and documentation pages for common tools used as current alternatives to a quote-to-approval equipment finance rail: DocuSign, PandaDoc, Salesforce Sales Cloud/CPQ, HubSpot quotes, and generic loan broker portals. Include direct URLs.'
  - Find community, reviews, RFP, forum, and customer-signal sources that reveal pain points in UK equipment finance, asset finance application speed, or dealer manual workflow. Prioritize Trustpilot reviews for brokers/lenders, manufacturing forums, and practitioner commentary. Include source URLs.
  - 'Find authoritative technical and platform sources relevant to building an equipment-finance application packaging workflow in the UK: open banking/verification, e-signature, KYC/identity, cloud security, and workflow automation. Prioritize TrueLayer, Open Banking Limited, DocuSign, Entrust/Onfido, AWS, Microsoft, and standards bodies. Include source URLs.'
  - Find authoritative sources for the number of UK manufacturing SMEs or manufacturing businesses, especially SMEs, plus data on business investment in machinery/equipment. Prioritize DBT business population estimates, ONS, Make UK, and Bank of England. Include source URLs.
  - Find authoritative sources on UK machine tool, CNC, 3D printing, or advanced manufacturing equipment dealer/vendor counts or trade show exhibitor counts that can proxy the number of relevant dealers or suppliers. Prioritize MTA, MACH, AMUK, ADS, and industry directories. Include source URLs.
  - How many exhibitors were at MACH 2024 or the MACH exhibition, and what official source states it? Include URLs.
  - Find official MTA or MACH sources stating the number of exhibitors, members, or suppliers relevant to CNC and manufacturing technology in the UK. Include URLs.
  - Find current public product page URLs for UK business asset finance or vendor finance from Novuna Business Finance, Close Brothers Asset Finance, Siemens Financial Services UK, Aldermore, and Shire Leasing. Include exact URLs.
  - Find current public product page URLs for vendor finance or equipment finance from DLL, BNP Paribas Leasing Solutions UK, Propel Finance, and Capalona. Include exact URLs.
  - Find current public product or use-case URLs for TrueLayer payments, bank data, or instant verification relevant to business onboarding. Include exact URLs.
  - Find current public product or documentation URLs for Entrust or Onfido identity verification and KYC/AML relevant to financial services. Include exact URLs.
