    - 10
    - 11
  geographicConsiderations:
  - point: The UK is a sensible launch market because one regulatory perimeter meets a concentrated manufacturing-technology channel and an already digitalizing asset-finance market.
    sourceRefs:
    - 9
    - 12
    - 13
    - 14
    - 15
  - point: European expansion is plausible but adds open-banking governance and multi-country asset-finance workflow complexity, which incumbent platforms already treat as a product feature.
    sourceRefs:
    - 19
    - 20
    - 21
    - 22
    - 37
    - 38
  sensitivityCases:
  - case: Credit costs stay elevated and SME deleveraging continues
    impact: Volume growth slows, so ROI must be proven through lower ops drag, cleaner submissions, and higher funded conversion rather than category expansion alone.
    sourceRefs:
    - 3
    - 4
    - 5
    - 6
  - case: Vendor-finance incumbents bundle their own workflow layer
    impact: Neutral multi-lender routing and dealer-owned data become the core differentiation, but sales cycles may lengthen if partners expect exclusivity.
    sourceRefs:
    - 28
    - 29
    - 31
    - 36
  - case: Open-banking rollout or adoption stalls
    impact: Bank-data enrichment lands later, so the core product must work with document-first application packages and LOS exports from day one.
    sourceRefs:
    - 19
    - 20
    - 21
    - 22
    - 23
  validationPlan:
  - priority: high
    question: Can one CNC or industrial-3D-printing dealer cut quote-to-signed-finance turnaround materially in a 60-day pilot?
    evidenceToGather: Before-and-after timestamps, stipulation counts, and funded conversion by lender on live deals.
  - priority: high
    question: Will two or three lenders accept a normalized dealer-owned package without forcing full re-key into first-contact portals?
    evidenceToGather: Integration interviews, sample payload mapping, and a manual-export pilot with real applications.
  - priority: medium
    question: Which dealer stacks dominate the first 20 targets and how much data can be lifted from exports before full API work?
    evidenceToGather: CRM, ERP, and CPQ stack survey across MACH exhibitors and pilot prospects.
  - priority: medium
    question: Which equipment categories create the highest documentation burden and the strongest willingness to pay?
    evidenceToGather: Asset-type segmentation across CNC, additive, laser, and adjacent hard-asset verticals.
