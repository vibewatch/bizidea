competitors:
- name: Equipal
  stage: scale-up
  wedge: Dealer-embedded equipment finance platform with lender distribution and institutional funding.
  pricing: Custom / not publicly disclosed
  strength: Best live proof that equipment sellers will embed finance in the sales motion and that asset-specific underwriting can perform.
  weaknessVsUs: Closer to an origination marketplace than a neutral upstream data rail, so dealers with existing lender panels may still need a vendor-agnostic workflow layer.
  sourceRefs:
  - 10
  - 11
- name: Swoop Funding
  stage: scale-up
  wedge: Broad SME finance marketplace spanning asset finance, leases, and refinance.
  pricing: Quote-based lender matching; no public SaaS pricing
  strength: Wide lender discovery and a strong educational top-of-funnel for SMEs and advisers.
  weaknessVsUs: More about sourcing a finance product than operationalising quote-to-underwriting packaging inside dealer workflows.
  sourceRefs:
  - 27
  - 39
- name: Braemar Finance
  stage: incumbent
  wedge: Relationship-led UK asset finance brokerage across multiple finance products.
  pricing: Custom / quote-led
  strength: Trusted advisory motion and familiarity with SME asset-finance categories.
  weaknessVsUs: Human-led brokerage does not become the dealer’s persistent system of record for multi-lender packaging and stipulation tracking.
  sourceRefs:
  - 40
- name: nCino
  stage: incumbent
  wedge: Commercial lending origination system sold to lenders and banks.
  pricing: Enterprise custom pricing
  strength: Institution-grade workflow, risk control, and lender-side deployment muscle.
  weaknessVsUs: Optimized for institutions after intake, not for the dealer-side collection and normalization of equipment context before submission.
  sourceRefs:
  - 32
- name: Alfa Systems
  stage: incumbent
  wedge: Core asset-finance software for large lenders, lessors, and captive finance programs.
  pricing: Enterprise custom pricing
  strength: Deep asset-finance specialization and broad lifecycle coverage for institutional clients.
  weaknessVsUs: Heavyweight lender-centric deployments create space for a lighter dealer-side orchestration layer upstream.
  sourceRefs:
  - 35
