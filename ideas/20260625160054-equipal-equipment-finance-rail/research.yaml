    - 23
    - 24
  - friction: Incumbent vendor-finance relationships can make dealers wary of another layer
    severity: medium
    affectedBuyer: Commercial director
    mitigation: Position the product as a neutral multi-lender control layer that improves submission quality without displacing lending economics.
    sourceRefs:
    - 28
    - 29
