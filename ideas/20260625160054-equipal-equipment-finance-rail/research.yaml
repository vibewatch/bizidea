openQuestions:
- What share of finance-assisted CNC, additive, and laser-equipment quotes is actually lost after quote acceptance because of approval friction rather than lender decline?
- 'Which dealer systems dominate the first 20 target accounts: CRM, ERP, CPQ, OEM portals, or spreadsheets?'
- How willing are non-bank lenders to consume a dealer-owned normalized package before forcing full re-key into their own portals?
- Does the sharpest pain sit with independent distributors, OEM-owned direct sales teams, or broker-led vendor programs?
- Where is the practical perimeter between workflow automation and credit broking when buyers are sole traders or small partnerships?
