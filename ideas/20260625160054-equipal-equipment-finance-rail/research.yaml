  adoptionFrictionMatrix:
  - friction: Unclear perimeter between workflow software and regulated credit broking
    severity: high
    affectedBuyer: Compliance and commercial leadership
    mitigation: Keep lender choice logic and disclosures explicit, and design the product as packaging and routing infrastructure rather than advice or underwriting.
    sourceRefs:
    - 12
    - 13
  - friction: Heterogeneous lender integration landscape
    severity: high
    affectedBuyer: Sales operations and IT
    mitigation: Start with document-normalization and export workflows, then add deeper integrations into leading lender-side systems over time.
    sourceRefs:
    - 32
    - 33
    - 34
    - 35
    - 37
    - 38
  - friction: Dealer quote and asset data quality varies by product line and branch
    severity: medium
    affectedBuyer: Sales operations
    mitigation: Start with a narrow equipment taxonomy and templated data capture for the highest-volume asset classes.
    sourceRefs:
    - 9
    - 27
    - 36
  - friction: Buyer KYC and document collection still create drop-off
    severity: medium
    affectedBuyer: SME purchaser
    mitigation: Use open-banking, verification, and e-signature partners to reduce duplicate data entry and signature loops.
    sourceRefs:
