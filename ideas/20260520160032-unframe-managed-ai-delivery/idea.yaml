jobsToBeDone:
  - job: >-
      When an enterprise AI budget is approved, help the shared-services transformation lead launch the first wave of
      workflows with clear owners and gates, so they can show production wins before the next operating review.
    currentAlternative: PMO spreadsheets, Jira boards, and weekly steering-committee meetings run by an SI
    successMetric: Three production workflows launched within 90 days with no missed governance gate
  - job: >-
      When multiple AI partners are involved, help the CIO office measure delivery slippage and business impact across
      projects, so they can reallocate spend toward the teams that actually ship outcomes.
    currentAlternative: Manual status decks and consultant-generated milestone reports
    successMetric: Weekly executive view of rollout status, blocked dependencies, and ROI progress across all active AI deployments
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Multiple verified sources confirm unusually strong traction and spending for this category.
  painIntensity:
    score: 4
    rationale: Missing the first production rollout after budget approval is expensive and highly visible for enterprise buyers.
  wedgeClarity:
    score: 4
    rationale: The beachhead is a specific delivery command center for shared-services AI rollouts, not a broad AI platform.
  defensibility:
    score: 4
    rationale: Proprietary rollout benchmarks, templates, and partner-performance data can compound into a sticky control layer.
  ventureScale:
    score: 5
    rationale: The platform can expand from one rollout PMO into the system of record for enterprise AI execution and spend.
topRisks:
  - name: Bundling by incumbents
    description: Large systems integrators or work-management platforms could add similar rollout dashboards once the category becomes obvious.
    mitigation: Start where incumbents are weakest by becoming the buyer-controlled source of truth across multiple partners and proving ROI with benchmark data they do not possess.
  - name: Weak initial urgency
    description: If a customer has only one small pilot, the pain may not justify buying a dedicated delivery layer.
    mitigation: Sell only into accounts with approved multi-workflow programs and a hard quarterly deadline, where slip risk is already board-visible.
  - name: Integration drag
    description: The product can fail if onboarding requires heavy customization across every customer's PMO and governance stack.
    mitigation: Begin with a narrow integration surface around task systems, approval checkpoints, and KPI reporting, then add deeper connectors after the core rollout workflow proves sticky.
