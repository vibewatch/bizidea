slug: unframe-managed-ai-delivery
date: '2026-05-20'
executiveSummary: >-
  This company should start as the buyer-controlled AI delivery command center
  for Fortune 2000 shared-services programs that already have budget for several
  AI workflows, not as another model platform or systems integrator. The urgent
  pain begins after an AI budget or SOW is signed: finance, procurement, and HR
  workflows now have board-visible deadlines, but delivery is still managed
  across spreadsheets, Jira, steering decks, and partner status calls. The
  beachhead is a transformation team that must get three shared-services
  workflows live inside 90 days and needs one system of record for owners,
  policy gates, blockers, and ROI baselines. The MVP should therefore convert an
  approved backlog into governed work packages, approval checkpoints,
  dependency tracking, and executive exception reporting, without trying to own
  model runtime, workflow execution, or full data orchestration. Go-to-market
  should be founder-led and tied to one paid pilot inside an already-approved AI
  program, with pricing based on active workflows and delivery partners under
  management. The strongest source of defensibility is neutral cross-partner
  accountability plus benchmark data on stage-gate slippage, deployment speed,
  and expansion patterns across workflows. The biggest disconfirming risk is
  that CIO buyers let the delivery vendor or existing work-management stack own
  this layer instead of funding a separate command center. Market size and ACV
  in the research are estimate-based, and the exact first budget owner below the
  CIO/CDO level is still inferred, so the first six months must focus on
  willingness-to-pay, onboarding speed, and pilot conversion evidence before the
  company scales hiring.
problem:
  - "Enterprises with approved AI programs still run delivery through consulting SOWs, PMO spreadsheets, Jira boards, and manual governance reviews, so funded workflows slip without a single accountable source of truth."
  - "Once several AI workflows and external partners are active at once, CIO teams cannot see which data dependency, policy gate, or vendor is blocking production, which makes quarterly operating reviews and ROI claims unreliable."
solution:
  - "A delivery command center turns each approved AI initiative into governed work packages with named owners, approval checkpoints, KPI baselines, and partner scorecards for finance, procurement, and HR workflows."
  - "The product gives transformation leaders and executives one buyer-controlled view of blockers, deadline risk, policy exceptions, and pilot-to-production progress without replacing the underlying automation or model stack."
whyWeWin:
  - "The wedge is narrow and urgent: multi-workflow enterprise AI programs already have budget and deadlines, but execution accountability is still fragmented."
  - "A neutral control plane is more credible than a delivery-vendor dashboard when the buyer needs to compare multiple partners, workstreams, and governance gates."
  - "Reusable rollout templates, slippage benchmarks, and partner-performance history can compound into data assets that generic PM tools and services firms do not naturally accumulate."
strategicChoices:
  beachhead: "Fortune 2000 shared-services transformation teams that already funded 3-10 AI workflows and need the first three workflows in accounts payable, vendor onboarding, or employee services live within one quarter."
  wedgeRationale: "This slice already has budget, partner complexity, and a hard operating-review deadline, so the startup can prove value against spreadsheet-plus-SI coordination faster than by pitching a broad enterprise AI platform to earlier-stage AI programs."
  sequencingRationale: "Start with lightweight integrations around task systems, approvals, and KPI reporting so the company can launch executive visibility in under 30 days, then add workflow templates, benchmark scorecards, and policy evidence once pilot data exists. Founder-led sales and solutions-heavy onboarding come before scaled GTM because the first sale depends on deadline risk, governance credibility, and deployment fit rather than broad top-of-funnel demand."
  notYet:
    - "Single-workflow pilots where existing project tools are usually good enough."
    - "Owning workflow execution, model hosting, or agent orchestration instead of the delivery control layer."
    - "SMB and mid-market buyers without a formal transformation office or multi-partner rollout."
    - "Broad horizontal PMO replacement for non-AI programs."
market:
  tam: "Estimated TAM: $1.2B based on about 2,000 large-enterprise target accounts, 78% AI-active share, and roughly $750k blended annual platform ACV."
  sam: "Estimated SAM: $250.0M for roughly 500 near-term beachhead accounts with funded multi-workflow shared-services rollout urgency."
  som: "Estimated SOM: $10.5M by year 3 from about 30 customers at roughly $350k net ARR each through direct sales and partner-influenced expansion."
  segments:
    - "Primary: Fortune 2000 shared-services and enterprise automation teams running several approved AI workflows across finance, procurement, and HR."
    - "Secondary: Systems-integrator PMO leaders and enterprise AI consultancies that need a buyer-visible operating layer for multi-workflow delivery programs."
  buyingProcess: >-
    The sale starts when an approved AI budget, signed SOW, or board mandate
    creates a 90-day production deadline for multiple workflows. The CIO, CDO,
    or head of enterprise automation sponsors the program, while security,
    functional owners, and delivery partners validate whether the product can
    expose blockers, governance status, and ROI baselines quickly enough to
    justify a paid pilot.
product:
  mvp: >-
    MVP scope is a command center for one shared-services AI program: ingest the
    approved workflow backlog, map owners and dependencies, track policy and
    review gates, baseline KPI targets, and produce executive exception
    reporting across internal teams and external partners. Support only the
    minimum integrations needed for early proof: task-system status, approval
    checkpoints, and KPI inputs.
  sixMonth: "Production-ready pilot package with workflow templates for accounts payable, vendor onboarding, and employee services; partner scorecards; approval tracking; and first executive dashboards live in under 30 days."
  twelveMonth: "Expand into reusable governance evidence packs, cross-workflow benchmarking, deeper connector coverage for common enterprise task and approval systems, and multi-program views inside one account."
  twentyFourMonth: "Broaden from rollout visibility into the system of record for enterprise AI delivery performance, including portfolio-level benchmark intelligence, policy controls, and spend-allocation insights across vendors and workflows."
  keyBets:
    - "Buyers will fund a separate delivery control plane when they already have three or more AI workflows under deadline pressure."
    - "Lightweight integrations are sufficient to show executive value before heavier workflow-system integration is required."
    - "Benchmark data on delay sources, approval friction, and partner performance will be more defensible than generic dashboarding."
    - "Shared-services workflows create a more repeatable first template library than starting with bespoke line-of-business use cases."
gtm:
  wedge: "Sell a paid 90-day delivery pilot for one funded shared-services AI program that covers three workflows and proves faster issue escalation, cleaner governance tracking, and measurable pilot-to-production accountability."
  channels:
    - "Founder-led direct sales to CIO, CDO, head of enterprise automation, and shared-services transformation leaders."
    - "Co-sell with systems integrators and enterprise AI consultancies that already own implementation work but need a buyer-trusted reporting layer."
    - "Selective cloud and governance ecosystem referrals once the startup can show neutral cross-vendor proof rather than a services-heavy deployment."
  funnelTargets: "Target account to qualified discovery 15-20%; qualified discovery to paid pilot 20-30%; paid pilot to annual production subscription 50%+; production account to second function or six-plus workflows within 12 months 30%+."
  pricing: "Charge a paid 90-day pilot, then convert to an annual subscription priced by active governed workflows and external delivery partners under management, with premium pricing for executive reporting and policy-control modules. This fits an already-approved program budget and ties price to rollout complexity rather than seats."
businessModel:
  revenueStreams:
    - "Paid 90-day pilot fees for one funded AI program."
    - "Annual platform subscription based on active governed workflows and partner complexity."
    - "Premium modules for executive reporting, policy controls, and benchmark analytics."
  unitOfValue: "Active governed AI workflow deployment managed through the command center, with account pricing stepping up as more workflows and partners are added."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add adjacent shared-services workflows after the first three reach production."
    - "Expand from one transformation program into enterprise-wide AI portfolio management."
    - "Sell benchmark analytics and policy-control modules once delivery data accumulates."
    - "Use partner-led deployments to open additional functions and regions inside the same account."
strategyMap:
  northStarMetric: "Number of governed AI workflows in production managed through the command center."
  inputMetrics:
    - "Qualified accounts with a funded 90-day multi-workflow deadline."
    - "Days from kickoff to first executive dashboard."
    - "Percent of workflows with baseline KPI and named owner captured."
    - "Pilot-to-production conversion rate."
    - "Workflow expansion rate per production account."
    - "Median number of critical blockers resolved before deadline."
  moatsToBuild:
    - "Benchmark dataset on stage-gate slippage, blocker sources, and time-to-production across enterprise AI workflows."
    - "Template library for shared-services rollout plans, approvals, and KPI baselines."
    - "Partner scorecards and cross-vendor accountability history that the buyer controls."
    - "Audit-ready evidence model linking policy requirements to workflow checkpoints and exceptions."
  killCriteria:
    - "Fewer than 3 paid pilots after 25 qualified target-account sales cycles within 12 months."
    - "Median time to first usable dashboard remains above 30 days after the first 4 deployments."
    - "Less than 50% of paid pilots convert to annual production subscriptions because existing PMO tooling is judged sufficient."
  mermaid: |
    flowchart LR
      Wedge[Beachhead wedge] --> MVP[MVP]
      MVP --> Proof[Proof points]
      Proof --> Expansion[Expansion motion]
investorMemo:
  verdict:
    call: Watch
    conviction: "Strong market timing and a plausible wedge, but conviction should stay moderate until buyers prove they will fund a neutral control plane separate from the delivery vendor."
    whyBelieve: "Enterprises are already signing large AI delivery contracts, and the startup targets the messy accountability layer that adjacent platforms and services firms do not clearly own."
    whyDoubt: "The first buyer, budget owner, and willingness to pay for a separate command center are still inferred rather than directly evidenced in the source set."
    nextDiligence: "Confirm three paid pilots in accounts with active AI programs and prove the product can stand up an executive dashboard with lightweight integrations in under 30 days."
  firstCustomer:
    title: "Head of enterprise automation at a Fortune 2000 shared-services organization"
    profile: "A large enterprise with an approved AI program, multiple finance, procurement, or HR workflows scheduled for rollout, and at least one external implementation partner under a quarterly deadline."
    trigger: "A signed AI program budget, board mandate, or partner SOW commits the team to put several workflows into production before the next operating review."
    buyer: "CIO or Chief Digital Officer"
    initialContract: "Paid 90-day pilot worth roughly $75k-$150k for one program covering three workflows, converting to about $250k-$500k annual subscription if the team reaches production visibility and ongoing governance use."
  mustBeTrue:
    - "At least 3 of the first 10 qualified beachhead buyers agree to a paid pilot tied to a funded multi-workflow deadline."
    - "The product can ingest task, approval, and KPI data and produce an executive-ready dashboard within 30 days in at least 4 of the first 5 deployments."
    - "At least 50% of paid pilots convert to annual subscriptions because buyers keep using the command center after the first workflows go live."
    - "At least 30% of production accounts expand to a second function or six-plus governed workflows within 12 months."
    - "At least 2 of the first 5 SI or consultancy partners agree to co-sell despite buyer-visible partner scorecards."
  diligenceQuestions:
    - "Who below the CIO actually owns the budget line for delivery accountability once the AI SOW is signed?"
    - "Which first workflow produces the cleanest KPI baseline and fastest proof: accounts payable, vendor onboarding, or employee services?"
    - "How often do buyers want a neutral system of record rather than extending Jira, Asana, or the delivery vendor's own portal?"
    - "What integration depth is required before the product stops looking like software and starts looking like another services-heavy PMO layer?"
    - "Will implementation partners tolerate transparent scorecards if the buyer controls the data?"
operatingAssumptions:
  - assumption: "The beachhead buyer already has at least three approved AI workflows and a hard quarterly deadline."
    basis: idea.yaml
    validationTest: "Run 15 structured discovery calls and proceed only if at least 8 prospects have three or more funded workflows plus a named deadline within the next two quarters."
    decisionImpact: "If false, narrow ICP to more regulated or deadline-driven verticals, or delay GTM hiring until urgency is clearer."
  - assumption: "A lightweight integration surface around task systems, approvals, and KPI reporting is enough to create executive value."
    basis: research.yaml
    validationTest: "Deploy two pilots using only task, approval, and KPI connectors and confirm each can produce a trusted dashboard and blocker view in under 30 days."
    decisionImpact: "If false, product scope and services load increase, which raises capital needs and slows the sales motion."
  - assumption: "Buyers will pay for a neutral control plane instead of relying on their implementation partner or generic work-management stack."
    basis: research.yaml
    validationTest: "Ask 10 qualified buyers to choose among paid pilot, partner-delivered dashboard, or status quo and require at least 3 signed paid pilots before scaling."
    decisionImpact: "If false, reposition toward partner-sold software or abandon the category before building a larger team."
  - assumption: "Shared-services workflow templates can be standardized enough to reduce onboarding effort after the first few accounts."
    basis: operator judgment
    validationTest: "Map the first 10 customer workflows and confirm at least 70% fit a reusable template for owners, gates, and KPI baselines with limited custom fields."
    decisionImpact: "If false, stay in a narrower workflow niche and do not expand into a broader portfolio product."
  - assumption: "Benchmark and partner-performance data will become a durable expansion and retention driver."
    basis: research.yaml
    validationTest: "In post-pilot reviews, confirm that at least half of production customers use benchmark or scorecard views in monthly operating reviews within 90 days of conversion."
    decisionImpact: "If false, defensibility shifts toward workflow-specific operating software rather than a cross-program command center."
experimentRoadmap:
  - horizon: 0–90 days
    experiment: "Interview 15 CIO, head-of-automation, and shared-services transformation leaders with active AI programs."
    hypothesis: "A meaningful subset sees rollout accountability, not model quality, as the immediate blocker once budgets are signed."
    successMetric: "8 qualified buyers report three or more funded workflows plus a hard delivery deadline and rank execution visibility as a top-two pain."
    owner: Founder/CEO
  - horizon: 0–90 days
    experiment: "Build a lightweight pilot using one task-system connector, one approval workflow, and KPI baseline capture."
    hypothesis: "The startup can create a credible executive dashboard without deep system replacement work."
    successMetric: "2 design partners agree the product is useful after seeing a live dashboard built in under 30 days."
    owner: Founding eng
  - horizon: 90–180 days
    experiment: "Close three paid pilots covering shared-services workflows in one program each."
    hypothesis: "Buyers will pay before broad GA if the pilot is tied to a funded operating-review deadline."
    successMetric: "3 signed paid pilots and at least 2 pilots launched on schedule by day 180."
    owner: Founder/CEO
  - horizon: 90–180 days
    experiment: "Test partner scorecards with one global SI and one specialist AI consultancy."
    hypothesis: "Partners will accept buyer-visible accountability if the product also reduces status firefighting and escalations."
    successMetric: "2 partners agree to share status data and support a joint pilot instead of blocking the rollout."
    owner: Founding solutions engineer
  - horizon: 180–270 days
    experiment: "Package repeatable templates for accounts payable, vendor onboarding, and employee services rollouts."
    hypothesis: "A template library can cut setup effort materially after the first few deployments."
    successMetric: "Median onboarding time for the next two pilots falls below 21 days to first dashboard."
    owner: Product engineer
  - horizon: 180–360 days
    experiment: "Measure expansion and operating-review usage in the first production accounts."
    hypothesis: "Once the first workflows go live, buyers will use the command center for monthly portfolio decisions and expand scope."
    successMetric: "At least 1 production account adds a second function or three more workflows within 12 months of initial pilot close."
    owner: Founder/CEO
operations:
  - "Maintain a standard implementation checklist covering task ingestion, approval checkpoints, KPI baselines, and executive reporting."
  - "Run a weekly blocker-review process that flags late approvals, missing owners, and partner slippage across all active programs."
  - "Produce a reusable governance evidence pack that maps workflow checkpoints to policy and audit requirements."
  - "Track every deployment in a simple CRM and delivery system with qualification gates tied to workflow count, deadline, and partner complexity."
  - "Build a benchmark dataset from each rollout on onboarding time, blocker categories, approval delays, and expansion outcomes."
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: "Own the core control plane, connectors, data model, and benchmark instrumentation from day one."
  - role: Founding solutions engineer
    startTiming: Month 1
    rationale: "Early revenue depends on fast pilot delivery, workflow mapping, and turning customer-specific setup into reusable templates."
  - role: Product engineer
    startTiming: Month 6
    rationale: "Convert pilot learnings into repeatable admin workflows, dashboarding, and governance evidence features without stalling core engineering."
  - role: Enterprise account executive
    startTiming: Month 9
    rationale: "Add dedicated pipeline capacity only after the founder has proven qualification criteria, pricing, and pilot conversion in the beachhead."
milestones:
  - horizon: 0–12 months
    items:
      - "Close 3 paid pilots in funded shared-services AI programs."
      - "Launch first executive dashboard in under 30 days for at least 4 deployments."
      - "Convert at least 2 pilots to annual subscriptions."
      - "Standardize templates for accounts payable, vendor onboarding, and employee services."
  - horizon: 12–24 months
    items:
      - "Reach 10-15 production customers with repeatable workflow and approval templates."
      - "Add multi-program portfolio views, benchmark analytics, and governance evidence packs."
      - "Establish 3-5 active co-sell or implementation partners."
      - "Show expansion from first function into additional workflows or regions in several accounts."
  - horizon: 24–36 months
    items:
      - "Become the system of record for AI delivery performance in at least 30 enterprise accounts."
      - "Expand from shared-services rollout control into broader enterprise AI portfolio and spend-allocation decisions."
      - "Demonstrate durable benchmark and partner-performance moats through higher retention and multi-program expansion."
risks:
  - risk: "Generic work-management suites or delivery-vendor portals are seen as good enough for the first wave of AI programs."
    likelihood: High
    impact: High
    mitigation: "Qualify only accounts with several workflows, multiple partners, and a hard deadline where generic status tracking has already broken down."
  - risk: "Onboarding requires too much custom integration work, making gross margins and deployment speed unattractive."
    likelihood: Medium
    impact: High
    mitigation: "Constrain the MVP to task, approval, and KPI connectors and refuse deals that require deep system replacement before template fit is proven."
  - risk: "Systems integrators resist buyer-visible scorecards and block channel access."
    likelihood: Medium
    impact: Medium
    mitigation: "Position the product as a shared operating layer that reduces escalation noise, and recruit partners only after proving the buyer still controls the source of truth."
  - risk: "The first workflow lacks a measurable KPI baseline, so the product looks like reporting software rather than an operating system."
    likelihood: Medium
    impact: High
    mitigation: "Require every pilot to define baseline KPIs, deadline milestones, and executive review metrics before kickoff."
  - risk: "Hyperscalers and automation incumbents add comparable delivery-governance features before the startup builds data advantages."
    likelihood: Medium
    impact: High
    mitigation: "Move quickly on neutral cross-partner benchmarking, reusable templates, and lightweight deployment speed that bundled platforms are slower to deliver."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2.5–3.5M"
  runwayMonths: 18
  useOfFundsSummary: "Eighteen months should fund the founding product team, a solutions-heavy pilot motion, 3-5 design and paid pilot accounts, and the template-plus-benchmark data needed to prove pilot conversion before a larger seed raise."
