modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[合格且 deadline 驱动的账户] --> Pilots[付费 90 天试点]
      Pilots --> Production[生产订阅]
      Production --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
      Production --> Benchmarks[基准与合作方数据]
      Benchmarks --> Expansion[工作流与模块扩张]
      Expansion --> Revenue
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的收入来自：把 3 个创始人主导试点在 Q4Y2 前转成 10 个生产客户，再在 Q4Y3 前把 30 个账户推到每个 $350K ARPU。
- checkName: 必须跑通的点
  finding: 接入必须保持在 30 天以内，而且连接器要足够轻，否则公司既做不到计划中 Y3 的 70% 毛利率，也会滑向服务型业务。
- checkName: 模型会失效，如果
  finding: 如果企业销售周期拖到 12 个月，或者买方认为 SI 仪表盘和通用 PM 工具已经够用，模型就会向 downside 情景滑落，本轮融资缓冲也会被吃掉。
- checkName: 下一轮融资证明
  finding: 只要公司在 Y2 结束前证明自己有 10 个生产客户、3–5 个合作伙伴渠道，以及可复用的第二职能扩张能力，下一轮融资就站得住。
sanityChecks:
  ruleOf40: Y3 增长率 204.7% + EBITDA 利润率 25.7% = 230.4%；这个数字偏高，主要因为 Y2 基数仍然很小，且以试点转化为主。
  burnMultiple: Y1 的 burn multiple 为 0.7x，对应退出时首个 $1.05M ARR；Y2 随着试点收入转化、且招聘按里程碑推进，改善到 0.1x。
  revenuePerFte: 按 Y3 年末 14 个 FTE 计算，人均收入为 $473K（SaaS 基准约 $200–400K）；高于基准，但对高 ACV 的企业级指挥中枢产品仍算合理。
  flags:
  - Y2 之后到 Y3 仍需要新增 20 个净新账户，因此企业销售周期滑点是最大的收入风险。
  - 毛利爬坡默认轻量集成已经足够；如果客户要求更深的工作流替换，毛利率就会掉到 70% 目标之下。
  - Rule of 40 和 burn multiple 看起来异常漂亮，是因为模型从很小的试点基数起跳；投资人更该盯试点转化和接入证明，而不是 headline 效率。
