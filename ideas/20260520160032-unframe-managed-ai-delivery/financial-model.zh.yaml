scenarios:
  downside:
    description: 试点转化延后，ARPU 更接近 $325K，公司到 Y3 结束时只有 24 个客户，而不是 30 个。
    y3RevenueK: 5064.6
    y3EbitdaK: 609.9
    cashLowPointK: 927.9
    keyAssumptionChanges:
    - Y2 结束时只有 8 个客户，而不是 10 个，因为付费试点转化更慢。
    - Y3 的季度末客户路径改为 10、13、18、24。
    - 随着买方更偏向试点级范围，混合 ARPU 下滑到 $325K。
  base:
    description: 3 个付费试点在 Q4Y2 转成 10 个生产客户，然后借助合作伙伴带动的扩张，在 Q4Y3 把公司推到 30 个账户。
    y3RevenueK: 6620.83
    y3EbitdaK: 1699.25
    cashLowPointK: 1448.3
    keyAssumptionChanges:
    - 每个生产账户的混合年度 ARPU 维持在 $350K。
    - 随着接入模板减少人工工作，毛利率从 Y1 的 60% 提升到 Y3 的 70%。
    - 招聘按 A19 的里程碑节奏推进，而不是前置堆人。
  upside:
    description: 试点转化更快、合作伙伴联合销售更顺、扩张更强，到 Q4Y3 公司做到 34 个客户，并拿到略高的定价。
    y3RevenueK: 8281.2
    y3EbitdaK: 2861.5
    cashLowPointK: 1791.6
    keyAssumptionChanges:
    - Y2 结束时做到 12 个客户，而不是 10 个，因为试点更早转化。
    - Y3 的季度末客户路径改善为 14、19、25、34。
    - 随着管理层报告和策略控制模块更早挂上去，混合 ARPU 提升到 $375K。
