competitors:
- name: Unframe
  stage: scale-up
  wedge: Managed AI delivery platform that configures tailored enterprise solutions in days and expands across use cases.
  pricing: No upfront licensing; enterprise subscription after outcome-based evaluation.
  strength: Strong traction signal and explicit positioning around closing the gap between AI ambition and execution.
  weaknessVsUs: Because it is also the delivery vendor, buyers may still want a more neutral system-of-record for partner governance and cross-vendor accountability.
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- name: Moveworks
  stage: scale-up
  wedge: Enterprise AI assistant and agent platform that combines search, action, and workflow automation across business functions.
  pricing: Custom enterprise pricing; no public self-serve enterprise plan.
  strength: Broad cross-functional footprint, multilingual deployment, and strong employee-facing workflow automation.
  weaknessVsUs: Center of gravity is end-user productivity and self-service rather than executive rollout command across multiple external partners and milestones.
  sourceRefs:
  - 16
  - 17
  - 18
  - 21
  - 22
  - 27
- name: UiPath
  stage: incumbent
  wedge: Agentic automation and orchestration platform with mature governance, monitoring, and process automation depth.
  pricing: Public Basic, Standard, and Enterprise tiers with heavier governance and flexibility in upper tiers.
  strength: Credible orchestration, deployment logging, ROI visibility, and strong finance-automation relevance.
  weaknessVsUs: Optimized for executing automations rather than giving the buyer a neutral command center over every AI project and delivery party.
  sourceRefs:
  - 29
  - 30
  - 31
  - 32
- name: Palantir AIP
  stage: incumbent
  wedge: Secure private-network AI platform layered on top of Palantir’s ontology and developer tooling.
  pricing: Custom enterprise pricing; public pricing not disclosed.
  strength: Deep context model, regulated-enterprise credibility, and powerful data/agent platform capabilities.
  weaknessVsUs: Heavier platform and implementation posture than a lightweight buyer-controlled rollout command layer.
  sourceRefs:
  - 34
  - 35
  - 36
  - 38
- name: Jira Align
  stage: incumbent
  wedge: Strategy-to-delivery portfolio management that connects executive plans to team-level work.
  pricing: Enterprise contact-sales motion; detailed public enterprise pricing not disclosed on the Align product page.
  strength: Already solves visibility, dependencies, and program management for large organizations.
  weaknessVsUs: Generic portfolio tooling does not encode AI-specific governance gates, model-risk controls, data-readiness, or partner performance.
  sourceRefs:
  - 40
  - 42
  - 43
  - 44
