slug: unframe-managed-ai-delivery
date: '2026-05-20'
executiveSummary: 这家公司应该从买方可控的 AI 交付指挥中枢起步，服务那些已经给多个 AI 工作流拨了预算的 Fortune 2000 共享服务项目，而不是再做一个模型平台或系统集成商。真正紧迫的痛点出现在 AI 预算或 SOW 签完之后：财务、采购和 HR 的工作流都背上了董事会可见的 deadline，但交付还散落在表格、Jira、汇报 deck 和合作方状态会上。滩头市场是一支必须在 90 天内让三个共享服务工作流上线的转型团队，他们需要一个系统来统一记录 owner、策略关卡、阻塞项和 ROI 基线。所以 MVP 应该把已批准的 backlog 变成可治理的工作包、审批检查点、依赖跟踪和管理层例外报告，而不是去接管模型运行时、工作流执行或完整的数据编排。GTM 应由创始人亲自打单，绑定到一个已经获批 AI 项目中的付费试点，定价按活跃工作流和在管交付伙伴数来收。最强的防御力来自中立的跨伙伴问责能力，以及关于阶段关卡滑点、部署速度和跨工作流扩张模式的基准数据。最大的反证风险，是 CIO 买方把这层能力交给交付厂商或现有工作管理堆栈，而不愿单独为一个指挥中枢付钱。研究里的市场规模和 ACV 都是估算值，CIO/CDO 之下的首个预算 owner 也仍是推断，所以前六个月必须先把付费意愿、接入速度和试点转化证据跑出来，再扩大招聘。
problem:
- 已经批准 AI 项目的企业，交付还靠咨询 SOW、PMO 表格、Jira 看板和手工治理评审来推进，所以有预算的工作流照样会延期，而且没人能给出统一、可追责的事实源。
- 一旦多个 AI 工作流和外部合作方同时开跑，CIO 团队就看不清到底是哪个数据依赖、策略关卡或供应商卡住了生产，这让季度经营评审和 ROI 说法都变得不可靠。
solution:
- 交付指挥中枢会把每个已批准的 AI 项目拆成带明确 owner、审批检查点、KPI 基线和合作方评分卡的可治理工作包，适用于财务、采购和 HR 工作流。
- 产品给转型负责人和管理层一张由买方掌控的统一视图：阻塞项、deadline 风险、策略例外，以及从试点到生产的推进进度；底层自动化或模型堆栈则不需要替换。
whyWeWin:
- 切口既窄又急：多工作流企业 AI 项目已经有预算也有 deadline，但执行责任还散在各处。
- 当买方要同时比较多个合作方、工作流和治理关卡时，一层中立控制平面比交付厂商自带的仪表盘更可信。
- 可复用的 rollout 模板、滑点基准和合作方表现历史，会慢慢滚成通用 PM 工具和服务公司天然攒不出来的数据资产。
strategicChoices:
  beachhead: 已经给 3–10 个 AI 工作流拨款、并且要在一个季度内让应付账款、供应商入驻或员工服务里的前三个工作流上线的 Fortune 2000 共享服务转型团队。
  wedgeRationale: 这个切片已经具备预算、合作方复杂度和硬性的经营评审 deadline，所以公司能比起向更早期的 AI 项目兜售一个宽泛企业 AI 平台，更快证明自己比“表格 + SI 协调”更有价值。
  sequencingRationale: 先围绕任务系统、审批和 KPI 报告做轻量集成，把管理层可见性在 30 天内跑出来；等试点数据出来后，再加工作流模板、基准评分卡和策略证据。创始人主导销售、解决方案团队高触达接入，要先于规模化 GTM，因为第一单成交依赖的是 deadline 风险、治理可信度和部署契合度，而不是宽泛的漏斗流量。
  notYet:
  - 只有单一工作流的试点——这类场景里现有项目工具通常已经够用。
  - 去接管工作流执行、模型托管或 Agent 编排，而不是守住交付控制层。
  - 没有正式转型办公室或多合作方 rollout 的 SMB 和中端市场买家。
  - 把非 AI 项目都纳进来的泛 PMO 替代方案。
market:
  tam: 预计 TAM：$1.2B，基于约 2,000 个大型企业目标账户、78% 的 AI 活跃占比，以及约 $750k 的混合年度平台 ACV。
  sam: 预计 SAM：$250.0M，对应约 500 个短期内最适合切入、且已批多工作流共享服务 rollout 预算的账户。
  som: 预计 SOM：第 3 年达到 $10.5M，来自约 30 个客户，每个客户约 $350k 净 ARR，依靠直销和合作方带动的 land-and-expand。
  segments:
  - 主要：在财务、采购和 HR 上同时推进多个已批准 AI 工作流的 Fortune 2000 共享服务与企业自动化团队。
  - 次要：需要一层买方可见操作层来管理多工作流交付项目的系统集成商 PMO 负责人和企业 AI 咨询公司。
  buyingProcess: 当已批准的 AI 预算、签好的 SOW 或董事会指令把多个工作流都压到 90 天生产 deadline 上时，销售流程就启动了。CIO、CDO 或企业自动化负责人会赞助这个项目，而安全团队、业务 owner 和交付伙伴会一起判断，这个产品能不能足够快地把阻塞项、治理状态和 ROI 基线亮出来，从而支撑一次付费试点。
product:
  mvp: MVP 范围是一套服务单个共享服务 AI 项目的指挥中枢：吃进已批准的工作流 backlog，映射 owner 和依赖，跟踪策略与评审关卡，建立 KPI 基线，并在内部团队和外部合作方之间输出管理层例外报告。早期只支持最少量的集成——任务系统状态、审批检查点和 KPI 输入——以便尽快拿到证据。
  sixMonth: 上线可用于生产的试点包：覆盖应付账款、供应商入驻和员工服务的工作流模板，合作方评分卡，审批跟踪，以及能在 30 天内跑起来的第一批管理层仪表盘。
  twelveMonth: 扩到可复用的治理证据包、跨工作流基准、更深的常见企业任务和审批系统连接器，以及同一账户内多个项目的统一视图。
  twentyFourMonth: 从 rollout 可见性，扩到企业 AI 交付表现的事实记录系统，覆盖组合级基准洞察、策略控制，以及跨厂商和工作流的预算分配判断。
  keyBets:
  - 当买方已经有三个以上 AI 工作流在 deadline 压力下推进时，他们愿意为一层独立的交付控制平面买单。
  - 在必须做更重的工作流系统集成之前，轻量集成就足够向管理层证明价值。
  - 关于延期来源、审批摩擦和合作方表现的基准数据，比通用仪表盘更有防御力。
  - 从共享服务工作流起步，比从高度定制的业务线用例起步，更容易做出可复用的首批模板库。
gtm:
  wedge: 卖一个付费 90 天交付试点，服务一个已获预算的共享服务 AI 项目，覆盖 3 个工作流，并证明更快的问题升级、更清晰的治理跟踪，以及从试点到生产的可量化交付责任。
  channels:
  - 创始人主导，直接卖给 CIO、CDO、企业自动化负责人和共享服务转型负责人。
  - 与已经承接实施工作的系统集成商和企业 AI 咨询公司联合销售，但把买方信任的报告层掌握在自己手里。
  - 等公司能证明自己提供的是中立的跨厂商证据，而不是重服务部署后，再选择性接入云和治理生态带来的转介绍。
  funnelTargets: 目标账户到合格 discovery 15–20%；合格 discovery 到付费试点 20–30%；付费试点到年度生产订阅 50%+；生产客户在 12 个月内扩到第二个职能或 6 个以上工作流 30%+。
  pricing: 先收一个付费 90 天试点，之后转成按活跃治理工作流和在管外部交付伙伴数量计价的年度订阅；管理层报告和策略控制模块额外收费。这样既贴合已批项目预算，也让价格跟 rollout 复杂度挂钩，而不是跟 seat 数挂钩。
businessModel:
  revenueStreams:
  - 面向单个已获预算 AI 项目的付费 90 天试点费。
  - 按活跃治理工作流和合作方复杂度计价的年度平台订阅。
  - 管理层报告、策略控制和基准分析的高级模块。
  unitOfValue: 通过指挥中枢管理的活跃治理型 AI 工作流部署；随着工作流和合作方数量增加，账户定价逐级上升。
  targetGrossMarginPct: 70
  expansionLevers:
  - 前三个工作流上线后，再加相邻的共享服务工作流。
  - 从一个转型项目扩到企业级 AI 组合管理。
  - 等交付数据积累起来后，再卖基准分析和策略控制模块。
  - 借合作方带动的部署，把更多职能和地区打进同一账户。
strategyMap:
  northStarMetric: 通过指挥中枢管理并已在生产运行的治理型 AI 工作流数量。
  inputMetrics:
  - 有预算、且 90 天内要完成多工作流落地的合格账户数。
  - 从 kickoff 到第一张管理层仪表盘的天数。
  - 已记录 KPI 基线和明确 owner 的工作流占比。
  - 试点转生产的转化率。
  - 每个生产账户的工作流扩张率。
  - deadline 前解决的关键阻塞项中位数。
  moatsToBuild:
  - 关于企业 AI 工作流阶段关卡滑点、阻塞来源和上线时间的基准数据集。
  - 共享服务 rollout 计划、审批流程和 KPI 基线的模板库。
  - 由买方掌控的合作方评分卡和跨厂商问责历史。
  - 把策略要求映射到工作流检查点和例外事项上的、可供审计的证据模型。
  killCriteria:
  - 12 个月内跑过 25 个合格目标账户销售周期后，付费试点仍少于 3 个。
  - 前 4 次部署之后，到第一张可用仪表盘的中位时间仍高于 30 天。
  - 付费试点转年度生产订阅的比例低于 50%，原因是买方认为现有 PMO 工具已经够用。
  mermaid: |
    flowchart LR
      Wedge[滩头切口] --> MVP[MVP]
      MVP --> Proof[验证点]
      Proof --> Expansion[扩张路径]
investorMemo:
  verdict:
    call: 观察
    conviction: 市场时点很强、切口也说得通，但在买方证明愿意为独立于交付厂商的中立控制平面买单之前，判断仍应保持中等强度。
    whyBelieve: 企业已经在签大额 AI 交付合同，而公司瞄准的是那些相邻平台和服务公司都没有明确拿下的混乱责任层。
    whyDoubt: 首个买方、预算 owner，以及单独为一个指挥中枢付费的意愿，在现有来源里都还是推断，不是直接证据。
    nextDiligence: 确认 3 个来自活跃 AI 项目账户的付费试点，并证明产品靠轻量集成就能在 30 天内立起管理层仪表盘。
  firstCustomer:
    title: Fortune 2000 共享服务组织里的企业自动化负责人
    profile: 一家大型企业，已经批准 AI 项目，财务、采购或 HR 有多个工作流排队 rollout，并且至少有一个外部实施伙伴卡在季度 deadline 上。
    trigger: 签好的 AI 项目预算、董事会指令或合作方 SOW，把团队推到必须在下一次经营评审前让多个工作流进入生产。
    buyer: CIO 或首席数字官
    initialContract: 先签一个价值约 $75k–$150k 的 90 天付费试点，覆盖一个项目里的 3 个工作流；如果团队拿到了生产可见性并持续使用治理能力，再转成约 $250k–$500k 的年度订阅。
  mustBeTrue:
  - 前 10 个合格滩头买家里，至少有 3 个愿意签一个绑定已获预算多工作流 deadline 的付费试点。
  - 在前 5 次部署里，至少 4 次能在 30 天内吃进任务、审批和 KPI 数据，并产出一张管理层可用的仪表盘。
  - 至少 50% 的付费试点能转成年度订阅，因为首批工作流上线后，买方还会继续使用这个指挥中枢。
  - 至少 30% 的生产客户能在 12 个月内扩到第二个职能或 6 个以上治理工作流。
  - 前 5 个 SI 或咨询合作方里，至少 2 个愿意在买方可见评分卡的前提下联合销售。
  diligenceQuestions:
  - AI SOW 一旦签完，CIO 之下到底是谁在为交付责任这条预算线拍板？
  - 哪个首个工作流最容易做出清晰 KPI 基线和最快证明：应付账款、供应商入驻，还是员工服务？
  - 买方到底多常会要一套中立的事实记录系统，而不是继续用 Jira、Asana 或交付厂商自己的 portal？
  - 产品要做到多深的集成，才不会再像软件，而开始像另一个重服务的 PMO 层？
  - 如果数据掌握在买方手里，实施伙伴是否愿意接受透明评分卡？
operatingAssumptions:
- assumption: 滩头买家已经至少批准了 3 个 AI 工作流，而且季度 deadline 很硬。
  basis: idea.yaml
  validationTest: 做 15 次结构化 discovery call；只有当至少 8 个潜在客户同时具备 3 个以上已获预算工作流和未来两个季度内的明确 deadline 时，才继续推进。
  decisionImpact: 如果不成立，就把 ICP 缩到更受监管或 deadline 压力更强的垂直行业，或者先暂停 GTM 招聘，直到紧迫感更清晰。
- assumption: 围绕任务系统、审批和 KPI 报告做一层轻量集成，就足以给管理层创造价值。
  basis: research.yaml
  validationTest: 只用任务、审批和 KPI 连接器上线两个试点，确认每个试点都能在 30 天内做出可信的仪表盘和阻塞视图。
  decisionImpact: 如果不成立，产品范围和服务负担都会变大，资本需求会上升，销售节奏也会变慢。
- assumption: 买方愿意为中立控制平面买单，而不是继续依赖实施伙伴或通用工作管理堆栈。
  basis: research.yaml
  validationTest: 让 10 个合格买方在付费试点、合作方交付的仪表盘和维持现状之间做选择；没有至少 3 个签好的付费试点，就不扩大团队。
  decisionImpact: 如果不成立，就把定位改成由合作方代卖的软件，或在组大团队前直接放弃这个品类。
- assumption: 共享服务工作流模板足够可标准化，能在前几个账户之后明显降低接入成本。
  basis: operator judgment
  validationTest: 梳理前 10 个客户工作流，确认至少 70% 能用可复用模板覆盖 owner、关卡和 KPI 基线，只需要少量自定义字段。
  decisionImpact: 如果不成立，就守在更窄的工作流细分里，不要扩成更泛的组合产品。
- assumption: 基准数据和合作方表现数据会变成持久的扩张与留存驱动。
  basis: research.yaml
  validationTest: 在试点后复盘里确认，至少一半的生产客户会在转化后 90 天内，把基准或评分卡视图纳入月度经营评审。
  decisionImpact: 如果不成立，防御力就会从跨项目指挥中枢，转向更具体的工作流运营软件。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位正在推进 AI 项目的 CIO、自动化负责人和共享服务转型负责人。
  hypothesis: 在预算签完之后，真正立刻卡住他们的不是模型质量，而是 rollout 责任。
  successMetric: 8 个合格买家反馈他们有 3 个以上已获预算工作流和硬性交付 deadline，并把执行可见性列为前两大痛点之一。
  owner: Founder/CEO
- horizon: 0–90 天
  experiment: 用一个任务系统连接器、一个审批工作流和 KPI 基线采集，搭出轻量试点。
  hypothesis: 不用做很深的系统替换，公司也能做出一张有说服力的管理层仪表盘。
  successMetric: 2 个共创客户在看到 30 天内搭好的在线仪表盘后，认可产品有用。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 签下 3 个付费试点，每个试点都覆盖同一项目中的共享服务工作流。
  hypothesis: 只要试点绑在已获预算的经营评审 deadline 上，买方会在产品全面 GA 之前先付钱。
  successMetric: 到第 180 天签下 3 个付费试点，且至少 2 个试点按计划启动。
  owner: Founder/CEO
- horizon: 90–180 天
  experiment: 拿一家全球 SI 和一家专业 AI 咨询公司测试合作方评分卡。
  hypothesis: 只要产品也能减少状态救火和升级摩擦，合作方会接受让买方看见责任分布。
  successMetric: 2 家合作方同意共享状态数据并支持联合试点，而不是拦着 rollout。
  owner: 创始解决方案工程师
- horizon: 180–270 天
  experiment: 把应付账款、供应商入驻和员工服务 rollout 打包成可复用模板。
  hypothesis: 前几个部署做完后，模板库能实质性压低接入工作量。
  successMetric: 接下来两个试点到第一张仪表盘的中位接入时间降到 21 天以下。
  owner: 产品工程师
- horizon: 180–360 天
  experiment: 衡量首批生产账户里的扩张情况，以及它们在经营评审中的使用频率。
  hypothesis: 一旦首批工作流上线，买方会用这个指挥中枢做月度组合决策，并继续扩大范围。
  successMetric: 至少有 1 个生产账户在首个试点签约后 12 个月内，加上第二个职能或再增加 3 个工作流。
  owner: Founder/CEO
operations:
- 维护一套标准实施清单，覆盖任务接入、审批检查点、KPI 基线和管理层报告。
- 每周跑一次阻塞项复盘，标出所有活跃项目中的审批延误、owner 缺失和合作方滑点。
- 做一套可复用的治理证据包，把工作流检查点映射到策略和审计要求上。
- 用一个简单的 CRM 和交付系统跟踪每次部署，并把准入关卡绑在工作流数量、deadline 和合作方复杂度上。
- 从每次 rollout 里沉淀基准数据：接入时长、阻塞类别、审批延误和扩张结果。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 从第一天起负责核心控制平面、连接器、数据模型和基准埋点。
- role: 创始解决方案工程师
  startTiming: Month 1
  rationale: 早期收入取决于快速交付试点、完成工作流映射，并把客户定制设置收敛成可复用模板。
- role: 产品工程师
  startTiming: Month 6
  rationale: 把试点经验沉淀成可复用的管理流程、仪表盘和治理证据功能，同时不拖慢核心工程。
- role: 企业客户经理
  startTiming: Month 9
  rationale: 只有当创始人已经验证了滩头市场的资格标准、定价和试点转化后，才增加专职 pipeline 能力。
milestones:
- horizon: 0–12 个月
  items:
  - 在已获预算的共享服务 AI 项目里签下 3 个付费试点。
  - 至少 4 次部署能在 30 天内跑出第一张管理层仪表盘。
  - 至少 2 个试点转成年度订阅。
  - 把应付账款、供应商入驻和员工服务模板标准化。
- horizon: 12–24 个月
  items:
  - 做到 10–15 个生产客户，并沉淀出可复用的工作流与审批模板。
  - 加入多项目组合视图、基准分析和治理证据包。
  - 建立 3–5 个活跃的联合销售或实施合作方。
  - 在多个账户里证明从首个职能扩到更多工作流或地区。
- horizon: 24–36 个月
  items:
  - 在至少 30 个企业账户里成为 AI 交付表现的事实记录系统。
  - 从共享服务 rollout 控制，扩到更广泛的企业 AI 组合和预算分配决策。
  - 通过更高留存和多项目扩张，证明基准数据和合作方表现数据形成了耐久护城河。
risks:
- risk: 通用工作管理套件或交付厂商 portal 被认为已足够覆盖第一波 AI 项目。
  likelihood: High
  impact: High
  mitigation: 只筛选那些已有多个工作流、多个合作方且 deadline 很硬、通用状态跟踪已经失效的账户。
- risk: 接入需要太多定制集成，导致毛利和部署速度都不好看。
  likelihood: Medium
  impact: High
  mitigation: 把 MVP 严格限制在任务、审批和 KPI 连接器上；在模板契合度还没跑通前，拒绝任何要求深度系统替换的交易。
- risk: 系统集成商抵触买方可见的评分卡，从而阻断渠道入口。
  likelihood: Medium
  impact: Medium
  mitigation: 把产品定位成能减少升级噪音的共享操作层，并且只有在证明买方仍掌握事实源之后，才招募合作方。
- risk: 首个工作流没有可量化的 KPI 基线，让产品看起来更像报表软件，而不是操作系统。
  likelihood: Medium
  impact: High
  mitigation: 要求每个试点在 kickoff 前先定好基线 KPI、deadline 里程碑和管理层评审指标。
- risk: 超大云厂商和自动化现有厂商在公司攒出数据优势前，就补上类似的交付治理能力。
  likelihood: Medium
  impact: High
  mitigation: 尽快做出中立的跨合作方基准、可复用模板和轻量部署速度，这些都是打包平台更慢才能交付的东西。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2.5–3.5M
  runwayMonths: 18
  useOfFundsSummary: 18 个月的资金应足以覆盖创始产品团队、以解决方案为核心的试点打法、3–5 个共创和付费试点账户，以及证明试点转化所需的模板和基准数据，然后再去冲更大一轮 seed。
