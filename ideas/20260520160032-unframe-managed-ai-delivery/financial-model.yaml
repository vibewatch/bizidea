modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified deadline-driven accounts] --> Pilots[Paid 90-day pilots]
      Pilots --> Production[Production subscriptions]
      Production --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
      Production --> Benchmarks[Benchmark and partner data]
      Benchmarks --> Expansion[Workflow and module expansion]
      Expansion --> Revenue
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by converting three founder-led pilots into 10 production customers by Q4Y2 and then expanding to 30 accounts at $350K ARPU by Q4Y3."
  - checkName: Must go right
    finding: "Onboarding has to stay under 30 days with lightweight connectors so the company can reach the planned 70% Y3 gross margin without turning into a services business."
  - checkName: Model breaks if
    finding: "If enterprise sales cycles stretch to 12 months or buyers accept SI dashboards and generic PM tools as good enough, the model falls toward the downside case and the current round loses its buffer."
  - checkName: Next-round proof
    finding: "The next raise is justified once the company shows 10 production customers, 3-5 partner channels, and repeatable second-function expansion by the end of Y2."
sanityChecks:
  ruleOf40: "Y3 growth 204.7% + EBITDA margin 25.7% = 230.4%, inflated by the small pilot-conversion base in Y2."
  burnMultiple: "Y1 burn multiple is 0.7x on the first $1.05M of exit ARR; Y2 improves to 0.1x as pilot revenue converts and hiring stays milestone-gated."
  revenuePerFte: "$473K Y3 using 14 year-end FTE (benchmark $200–400K SaaS); above benchmark but plausible for a high-ACV enterprise command-center product."
  flags:
    - "Y3 still requires 20 net new accounts after Y2, so enterprise sales-cycle slippage is the single biggest revenue risk."
    - "The margin ramp assumes lightweight integrations remain sufficient; deeper workflow replacement work would pull gross margin below the 70% target."
    - "Rule-of-40 and burn-multiple outputs look unusually strong because the model ramps from a small pilot base, so investors should focus more on pilot conversion and onboarding proof than headline efficiency."
