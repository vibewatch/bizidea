      - 47
      - 51
    threatOfSubstitutes:
      score: 5
      rationale: 系统集成商、Jira/Asana、UiPath、Moveworks 和 Palantir 如今都能覆盖这项 JTBD 的一部分。
      sourceRefs:
      - 17
