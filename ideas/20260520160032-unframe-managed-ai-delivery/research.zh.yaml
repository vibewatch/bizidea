      - 43
    competitiveRivalry:
      score: 4
      rationale: 这个品类虽早，但周边平台已经很多；一旦预算和用例变得更显性，它们都可能顺着切口冲进来。
      sourceRefs:
      - 1
      - 17
      - 29
      - 34
  pestle:
  - factor: 政治
    impact: negative
    point: 政府正在加码 AI 监管，这会抬高企业部署中的文档和策略映射负担。
    sourceRefs:
    - 53
    - 54
    - 57
  - factor: 经济
    impact: positive
    point: 企业已经在为 AI 及相邻自动化付费，所以创业公司可以直接挂到现成预算科目上，而不是从零教育市场。
    sourceRefs:
    - 1
    - 31
    - 57
  - factor: 社会
    impact: positive
    point: AI 采用越来越多地由运营团队和非技术员工推动，这更利好那些能把业务需求变成受控 rollout 的产品。
    sourceRefs:
    - 28
    - 49
  - factor: 技术
    impact: positive
    point: 云平台和模型平台如今已经提供足够好用的安全 Agent 部署积木，做一层交付指挥能力的成本因此下降。
    sourceRefs:
    - 45
    - 46
    - 47
  - factor: 法律
    impact: negative
    point: 针对生成式 AI 的治理要求意味着，每次 rollout 都必须拿出可追溯性、控制和证据，而不只是把结果跑出来。
    sourceRefs:
    - 51
    - 53
    - 54
  adoptionFrictionMatrix:
  - friction: 安全与合规评审
    severity: high
    affectedBuyer: CIO 与 CISO
    mitigation: 从第一个试点起就支持私有化部署、留存控制、血缘追踪，以及和策略绑定的审计证据。
    sourceRefs:
    - 5
    - 19
    - 51
    - 53
  - friction: 遗留系统与数据映射
    severity: high
    affectedBuyer: 自动化负责人或转型负责人
    mitigation: 先围绕工作队列、审批和 KPI 做轻量连接器，而不是一上来就做全量数据迁移。
    sourceRefs:
    - 4
    - 11
    - 17
  - friction: 合作方抵触透明评分卡
    severity: medium
    affectedBuyer: 转型办公室
    mitigation: 把产品定位成共享交付操作层：既减少救火，又把范围讲清楚。
    sourceRefs:
    - 7
    - 24
  - friction: KPI owner 模糊
    severity: high
    affectedBuyer: CIO 或业务 sponsor
    mitigation: 强制每次 rollout 都从可量化的基线指标和管理层例外报告起步。
    sourceRefs:
    - 4
    - 6
    - 44
