topRisks:
- name: 现有厂商打包进入
  description: 一旦品类变得明显，大型系统集成商或工作管理平台就可能补上类似的 rollout 仪表盘。
  mitigation: 先打现有厂商最弱的点：成为买方掌控、跨多个合作方的事实源，并用他们没有的基准数据把 ROI 讲清楚。
- name: 初始紧迫感不够
  description: 如果客户只有一个很小的试点，痛点可能还不足以支撑购买一层专门的交付系统。
  mitigation: 只卖给那些已经批准多工作流项目、而且季度 deadline 很硬的账户；这些场景下，延期风险已经能被董事会看到。
- name: 集成阻力
  description: 如果每个客户接入都要在 PMO 和治理堆栈上做大量定制，产品就容易失手。
  mitigation: 先把集成面压在任务系统、审批检查点和 KPI 报告上；等核心 rollout 工作流证明有黏性，再补更深的连接器。
