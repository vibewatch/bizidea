problem: Fortune 2000 公司已经批下了不小的 AI 预算，但真正的瓶颈，是把董事会层面的指令变成横跨财务、采购和 HR 的在线、可治理工作流。现在的交付还靠咨询 SOW、Jira 看板、表格和临时性的模型治理评审硬拼，价值兑现时间看不清，也给企业和系统集成商之间留下了昂贵的滑点空间。
targetUser:
  primary: Fortune 2000 公司里负责共享服务转型的 VP，或企业自动化负责人；其组织已批准 3–10 个横跨财务、采购和 HR 的 AI 工作流部署
  secondary: 全球系统集成商内部负责多个企业 AI 工作流、且要在固定时间承诺下交付的 PMO 负责人
  buyer: CIO 或首席数字官
startupThesis:
  nonObviousInsight: 企业 AI 里真正稀缺的资产，已经不再是模型访问权，而是预算签完之后、能对交付结果负责的记录系统。企业一旦开始按“托管结果”来购买 AI，赢家就会是那层夹在客户、内部利益相关方和交付伙伴之间的软件——它能压缩部署周期，也能把业务价值讲清楚。
  beachhead: 已经批了 3–10 个 AI 部署、并且要在一个季度内让应付账款、供应商入驻或员工服务运营里前三个工作流上线的 Fortune 2000 共享服务组织
  wedge: 一个交付指挥中枢，把每个已批准的 AI 项目拆成可治理的工作包、评审关卡、ROI 基线和合作方评分卡，让一个转型团队也能把多个工作流推上线
  whyNowCatalyst: Unframe 的合同增速和留存说明，企业已经从 AI 试验走到了购买托管式 AI 交付这一步，执行可见性因此成了下一个迫切的控制点。
  ventureScalePath: 先做共享服务 AI 落地的执行层，随后扩到跨工作流基准数据、可复用交付打法、策略控制，以及客户账户内所有企业 AI 厂商和集成商之间的支出编排。
solution: 产品是一套给企业转型团队及其实施伙伴使用的 AI 交付指挥中枢。它吃进已批准的用例待办，把每个工作流映射到所需数据源、审核人、策略关卡和目标 KPI，再把这些信息变成有节奏的推进机制，持续打出风险标记和面向管理层的进度报告。它不把每次部署当成定制化咨询项目，而是把启动模板、验收标准，以及从试点到生产的交接流程标准化。它还会给买方一张中立的评分卡，直接看出是哪家合作方、哪个工作流或哪道治理关卡拖慢了交付。时间一长，这个指挥中枢会变成企业 AI 落地表现的事实记录系统，而不是又一层项目管理蒙版。
goToMarketSeed:
  firstCustomer: Fortune 2000 公司里负责企业自动化的负责人；这家公司已经签下七位数的 AI 服务或平台合同，并且要在下一次季度经营评审前让三个共享服务工作流上线
  buyingTrigger: 新批下来的企业 AI 预算、董事会指令，或已签 SOW，把团队推到必须在 90 天内交付多个工作流的节点
  currentAlternative: 全球系统集成商 PMO，加上 Jira、表格、指导委员会汇报材料和手工治理评审
  switchingReason: 当买方意识到现有堆栈只能看到活动，却没人对交付结果负责；而这个产品既能压低延期风险，又能量化合作方表现，还能缩短拿到第一个生产成果的时间，他们就会切换。
  pricingHypothesis: 按活跃 AI 工作流部署数量和受管外部交付伙伴数量收取年度平台费；管理层报告和策略控制模块单独溢价。
