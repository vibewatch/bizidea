jobsToBeDone:
- job: 当企业 AI 预算获批后，帮助共享服务转型负责人把第一波工作流以明确 owner 和关卡推上线，这样他们就能在下一次经营评审前拿出生产成果。
  currentAlternative: 由 SI 负责的 PMO 表格、Jira 看板和每周指导委员会会议
  successMetric: 90 天内上线 3 个生产工作流，且没有漏掉任何治理关卡
- job: 当多个 AI 合作方同时参与时，帮助 CIO 办公室衡量项目间的交付滑点和业务影响，好把预算重新分给真正能把结果做出来的团队。
  currentAlternative: 人工状态汇报材料和咨询顾问生成的里程碑报告
  successMetric: 每周给高管一张全局视图：所有活跃 AI 部署的落地状态、阻塞依赖和 ROI 进展
