assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[business-plan.yaml date] startup-finance heuristic: 采用计划日期之后的第一个完整月份'
- id: A2
  name: M1 期初现金
  value: '2000'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 选取所述 $2–4M pre-seed 区间下限'
- id: A3
  name: 净活跃付费医疗系统爬坡
  value: 3 by Y1 / 7 by Y2 / 12 by Y3
  unit: customers
  source: '[business-plan.yaml milestones; research.yaml market.som rationale]'
- id: A4
  name: 首个付费试点落地时间
  value: Month 4
  unit: month
  source: '[business-plan.yaml milestones 0–12 months] 第一年落地一个付费试点'
- id: A5
  name: 混合年合同额
  value: '330'
  unit: USDK/year
  source: '[business-plan.yaml gtm.pricing; research.yaml market.som] $250k–$350k 定价区间，围绕 12 个系统约等于 $4M ARR 的 SOM 测算取中位'
- id: A6
  name: 落地当月确认收入比例
  value: '50'
  unit: percent
  source: 'startup-finance heuristic: 平均来看客户多在月中启动'
- id: A7
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct]'
- id: A8
  name: 创始人 CEO 年度现金全成本
  value: '144'
  unit: USDK/year
  source: 'startup-finance heuristic: $120K 薪资加 20% 工资税与福利'
- id: A9
  name: 工程师年度现金全成本
  value: '192'
  unit: USDK/year
  source: 'startup-finance heuristic: $160K 薪资加 20% 工资税与福利'
- id: A10
  name: 产品/运营年度现金全成本
  value: '168'
  unit: USDK/year
  source: 'startup-finance heuristic: $140K 薪资加 20% 工资税与福利'
- id: A11
  name: 销售 AE 年度基础现金全成本
  value: '168'
  unit: USDK/year
  source: 'startup-finance heuristic: $140K 基本薪资加 20% 工资税与福利；变动销售成本另行建模'
- id: A12
  name: 客户成功 / 实施年度全成本
  value: '132'
  unit: USDK/year
  source: 'startup-finance heuristic: $110K 薪资加 20% 工资税与福利'
- id: A13
  name: G&A / 合规年度现金全成本
  value: '120'
  unit: USDK/year
  source: 'startup-finance heuristic: $100K 薪资加 20% 工资税与福利'
- id: A14
  name: 研发非薪酬支出
  value: 8 in Y1, then 6 + 0.6 per active customer monthly
  unit: USDK/month
  source: 'startup-finance heuristic: 支撑 PHI 工作流所需的云、安全、工具和 QA 成本'
- id: A15
  name: 销售与市场非薪酬支出
  value: 5 in Y1, 7 in Y2, 9 in Y3 + 2 per AE + 6% of revenue
  unit: USDK/month
  source: 'startup-finance heuristic: 企业差旅、演示、行业会议和佣金'
- id: A16
  name: G&A 非薪酬支出
  value: 6 + 0.5 per active customer monthly, plus 1 after compliance hire
  unit: USDK/month
  source: 'startup-finance heuristic: 法务、保险、审计与后台支持'
- id: A17
  name: 首位专职销售入职时间
  value: Month 13
  unit: month
  source: '[business-plan.yaml team; gtm] 首个试点年度维持创始人主导销售，之后补一位销售来验证可复制性'
- id: A18
  name: 第二位客户成功岗位入职时间
  value: Month 28
  unit: month
  source: '[business-plan.yaml milestones 12–24 months] 多专科扩张启动后再补位支持'
- id: A19
  name: 单位经济学稳态月度流失率
  value: '1.5'
  unit: percent
  source: 'startup-finance heuristic: 早期企业 SaaS 续约风险的保守假设'
- id: A20
  name: 混合 CAC
  value: '121.6'
  unit: USDK/customer
  source: 由 Y2–Y3 预测销售与市场支出除以 9 个净新增活跃客户计算
- id: A21
  name: 现金回款时点
  value: In-period collection
  unit: policy
  source: startup-finance heuristic; 已提示企业付款条款可能晚于收入确认
- id: A22
  name: 融资需求
  value: '2.0'
  unit: USDM
  source: '[business-plan.yaml fundingAsk] 融资规模以覆盖 12–24 个月里程碑并保留 6 个月缓冲为准'
