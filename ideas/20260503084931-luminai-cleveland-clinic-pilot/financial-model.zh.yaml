scenarios:
  downside:
    description: 试点转生产延后，混合 ACV 更接近 $300K，实施摩擦也拖慢后续招聘和客户增长。
    y3RevenueK: 2400.0
    y3EbitdaK: -817.8
    cashLowPointK: -279.5
    keyAssumptionChanges:
    - ACV 从 $330K 降至 $300K。
    - Y3 结束时活跃系统数只有 10 个，而不是 12 个。
    - 毛利率从 70% 降至 68%，因为服务成分更重的时间拉长。
  base:
    description: 第一年由创始人主导拿下试点，第二年把试点转成生产，第三年扩到 12 个活跃系统，接近研究中的 SOM 情形。
    y3RevenueK: 2983.7
    y3EbitdaK: -507.6
    cashLowPointK: 290.1
    keyAssumptionChanges:
    - 混合 ACV 维持在 $330K。
    - 活跃系统增长路径为 Y1 达到 3 个、Y2 达到 7 个、Y3 达到 12 个。
    - 毛利率维持在商业计划目标的 70%。
  upside:
    description: 某个专科更早证明可复制性，ACV 向计划区间上沿靠拢，并在 Q4Y3 扩至 14 个活跃系统。
    y3RevenueK: 3844.8
    y3EbitdaK: 93.0
    cashLowPointK: 1209.0
    keyAssumptionChanges:
    - ACV 从 $330K 提升到 $345.6K。
    - 到 Q4Y3 活跃系统数达到 14 个。
    - 随着实施更可复制，毛利率从 70% 提升到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 由于试点转生产打包更窄，ACV 降至 $280K
  baseCase: 已落地系统的混合 ACV 为 $330K
  upsideCase: 随着专科扩张证明增强，ACV 升至 $360K
  y3RevenueImpactK: -455.6
  cashImpactK: -486.6
- variable: CAC
  downsideCase: 外勤销售支出更高且销售提前扩编，CAC 升至约 $145K
  baseCase: 预测 CAC 约为每个净新增客户 $122K
  upsideCase: 参考客户带来的销售效率让 CAC 维持在约 $105K
  y3RevenueImpactK: 0.0
  cashImpactK: -147.5
- variable: churn
  downsideCase: 净留存走弱，Y3 期末少一个活跃系统
  baseCase: 预测在 Y3 新增客户爬坡阶段，流失基本保持净平
  upsideCase: 早期无流失，且到 Q4Y3 额外保留/扩张一个系统
  y3RevenueImpactK: -41.2
  cashImpactK: -24.1
- variable: sales cycle
  downsideCase: 安全与集成评审拖慢合同，企业销售周期拉长约 1 个季度
  baseCase: 从试点到生产的路径大致保持在 9 个月医疗企业销售周期内
  upsideCase: 参考客户把新客户销售周期压缩约 1 个季度
  y3RevenueImpactK: -82.5
  cashImpactK: -148.5
- variable: gross margin
  downsideCase: 因实施长期偏重服务，毛利率停在 65%
  baseCase: 毛利率达到商业计划中的 70% 目标
  upsideCase: 随着工作流更干净、异常处理更少，毛利率提升到 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -248.3
- variable: hiring pace
  downsideCase: 可复制部署尚未验证前就提前招聘非核心岗位
  baseCase: 以里程碑驱动招聘，只有在客户证明点出现后才补销售、G&A 和客户成功
  upsideCase: 把非核心招聘推迟到下一次生产转化之后
  y3RevenueImpactK: 0.0
  cashImpactK: -258.9
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准增长主要来自活跃医疗系统客户数从 Y1 末 3 个增至 Y3 末 12 个，且每个客户混合 ACV 为 $330K，而不是依赖激进提价。
- checkName: 必须成立的条件
  finding: 公司必须在大致一个采购周期内把早期试点转为生产，这样 Q4Y2 才能达到 7 个活跃系统，避免 pre-seed 现金缓冲过早变薄。
- checkName: 模型失效条件
  finding: 如果 ACV 向 $300K 下滑，且客户增长停在 10 个系统，下一轮融资证明点前会出现约 $280K 现金缺口。
- checkName: 下一轮融资证明
  finding: 到 Y2 末，公司需要展示 5-7 个活跃付费系统、可复用的 Epic/FHIR 交接能力，以及至少 2 个第二专科扩张案例，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 growth 80.8% + EBITDA margin -17.0% = 63.8%
  burnMultiple: Y2 burn multiple 0.41x using $546K EBITDA burn / $1.32M net new ARR; Y3 burn multiple 0.31x using $508K burn / $1.65M net new ARR.
  revenuePerFte: $249K Y3 on ~12.0 average FTE (benchmark $200–400K enterprise SaaS)
  flags:
  - 模型假设收入确认当期即可回款；现实中医疗系统付款条款可能比收入确认晚 60-90 天，会压缩基准情形现金缓冲。
  - 预测按净活跃付费系统计数，并未单独拆分试点与生产客户，因此早期客户结构有所简化。
  - 如果实施或合规服务在更长时间内仍高度定制，从第一年起维持 70% 毛利率可能偏乐观。
