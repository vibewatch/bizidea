scenarios:
  downside:
    description: 试点转化放缓，混合 ACV 更接近 $300K，且实施摩擦推迟后续招聘与客户增长。
    y3RevenueK: 2400.0
    y3EbitdaK: -817.8
    cashLowPointK: -279.5
    keyAssumptionChanges:
    - ACV 从 $330K 降至 $300K。
    - 客户爬坡在 Y3 结束时为 10 个活跃系统，而非 12 个。
    - 由于服务负担持续更久，毛利率从 70% 降至 68%。
  base:
    description: 第 1 年由创始人主导拿下试点，第 2 年将试点转为生产部署，第 3 年扩张至 12 个活跃系统，接近调研中的 SOM 情景。
    y3RevenueK: 2983.7
    y3EbitdaK: -507.6
    cashLowPointK: 290.1
    keyAssumptionChanges:
    - 混合 ACV 保持在 $330K。
    - 客户爬坡在 Y1 达到 3 个活跃系统、Y2 达到 7 个、Y3 达到 12 个。
    - 毛利率维持在 business-plan 的 70% 目标。
  upside:
    description: 一个专科更早证明可复制，ACV 向计划区间上沿靠拢，扩张使活跃系统在 Q4Y3 达到 14 个。
    y3RevenueK: 3844.8
    y3EbitdaK: 93.0
    cashLowPointK: 1209.0
    keyAssumptionChanges:
    - ACV 从 $330K 提升至 $345.6K。
    - 客户爬坡在 Q4Y3 达到 14 个活跃系统。
    - 随着实施更可复制，毛利率从 70% 提升至 72%。
sensitivity:
- variable: ARPU
  downsideCase: 由于试点到生产的包装更窄，ACV 为 $280K
  baseCase: 已落地系统的混合 ACV 为 $330K
  upsideCase: 更强的专科扩张验证将 ACV 提升至 $360K
  y3RevenueImpactK: -455.6
  cashImpactK: -486.6
- variable: CAC
  downsideCase: 更高的外勤销售支出和更早增加销售人员将 CAC 推高至 ~$145K
  baseCase: 预测每个净新增客户的 CAC 为 ~$122K
  upsideCase: 由口碑案例驱动的销售使 CAC 保持在 ~$105K
  y3RevenueImpactK: 0.0
  cashImpactK: -147.5
- variable: 流失率
  downsideCase: 净留存下滑，Y3 结束时少 1 个活跃系统
  baseCase: 在 Y3 的新客户爬坡过程中，预测在流失层面基本保持净平
  upsideCase: 没有早期流失，且到 Q4Y3 多保留/扩展 1 个系统
  y3RevenueImpactK: -41.2
  cashImpactK: -24.1
- variable: 销售周期
  downsideCase: 由于安全和集成审查拖慢合同签署，企业销售周期延长约 1 个季度
  baseCase: 试点到生产的推进保持在约 9 个月的医疗企业销售周期内
  upsideCase: 标杆客户使新客户销售周期缩短约 1 个季度
  y3RevenueImpactK: -82.5
  cashImpactK: -148.5
- variable: 毛利率
  downsideCase: 由于实施仍偏重服务，毛利率停留在 65%
  baseCase: 毛利率达到 business-plan 的 70% 目标
  upsideCase: 随着工作流更干净、异常处理更少，毛利率提升至 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -248.3
- variable: 招聘节奏
  downsideCase: 在可重复部署被证明前就提前招聘非核心岗位
  baseCase: 按里程碑招聘，只有在客户验证点出现后才增加销售、G&A 和 CS
  upsideCase: 将非核心岗位招聘延后到下一次生产转化之后
  y3RevenueImpactK: 0.0
  cashImpactK: -258.9
modelDiagram:
  title: 单元经济流转
  mermaid: "flowchart LR\n  Leads --> Pilots\n  Pilots --> ProductionCustomers\n  ProductionCustomers --> Revenue\n  Revenue --> GrossProfit\n  GrossProfit --> Cash"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景增长主要由活跃医疗系统客户从 Y1 末的 3 个增加到 Y3 末的 12 个驱动，混合 ACV 为 $330K，而不是依赖激进提价。
- checkName: 必须做对的事
  finding: 公司必须在大致一个采购周期内将早期试点转化为生产部署，使 Q4Y2 达到 7 个活跃系统，赶在 pre-seed 现金缓冲变薄之前。
- checkName: 模型失效条件
  finding: 如果 ACV 降向 $300K，且客户增长停在 10 个系统，那么在公司达到下一轮融资验证点前，下行情景现金将转为约 -$280K。
- checkName: 下一轮融资验证点
  finding: 下一轮融资的依据是：到 Y2 末展示 5-7 个活跃付费系统、可重复的 Epic/FHIR 交接，以及至少两个第二专科扩展案例。
sanityChecks:
  ruleOf40: Y3 growth 80.8% + EBITDA margin -17.0% = 63.8%
  burnMultiple: Y2 burn multiple 0.41x using $546K EBITDA burn / $1.32M net new ARR; Y3 burn multiple 0.31x using $508K burn / $1.65M net new ARR.
  revenuePerFte: $249K Y3 on ~12.0 average FTE (benchmark $200–400K enterprise SaaS)
  flags:
  - 现金回收假设为当期完成；真实医疗系统的回款条款可能比收入确认滞后 60-90 天，从而压缩基础情景的现金缓冲。
  - 预测统计的是净活跃付费系统，未单独展示试点与生产客户数量，因此早期阶段的客户结构被简化。
  - 若实施或合规服务在客户间长期保持高度定制化，第一年即维持 70% 毛利率可能偏乐观。
