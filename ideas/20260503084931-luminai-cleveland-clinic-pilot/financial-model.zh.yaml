assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[business-plan.yaml date] 创业财务启发式：计划日期后的第一个完整月份'
- id: A2
  name: M1 期初现金
  value: '2000'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 取所述 $2–4M pre-seed 区间的低端'
- id: A3
  name: 净活跃付费系统爬坡
  value: 3 by Y1 / 7 by Y2 / 12 by Y3
  unit: customers
  source: '[business-plan.yaml milestones; research.yaml market.som rationale]'
- id: A4
  name: 首个付费试点落地
  value: Month 4
  unit: month
  source: '[business-plan.yaml milestones 0–12 months] 第一年 1 个付费试点'
- id: A5
  name: 混合年度合同价值
  value: '330'
  unit: USDK/year
  source: '[business-plan.yaml gtm.pricing; research.yaml market.som] $250k–$350k 定价区间，以 SOM 测算中的 12 个系统 ≈ $4M ARR 为中心'
- id: A6
  name: 落地当月确认收入
  value: '50'
  unit: percent of monthly ARPU
  source: 创业财务启发式：客户平均在月中开始付费
- id: A7
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct]'
- id: A8
  name: 创始人兼CEO 年化总现金成本
  value: '144'
  unit: USDK/year
  source: 创业财务启发式：$120K 薪资加 20% 工资税/福利
- id: A9
  name: 工程师年化总现金成本
  value: '192'
  unit: USDK/year
  source: 创业财务启发式：$160K 薪资加 20% 工资税/福利
- id: A10
  name: 产品/运营年化总现金成本
  value: '168'
  unit: USDK/year
  source: 创业财务启发式：$140K 薪资加 20% 工资税/福利
- id: A11
  name: 销售 AE 年化总基础成本
  value: '168'
  unit: USDK/year
  source: 创业财务启发式：$140K 基本薪资加 20% 工资税/福利；可变销售成本单独建模
- id: A12
  name: 客户成功 / 实施年化总成本
  value: '132'
  unit: USDK/year
  source: 创业财务启发式：$110K 薪资加 20% 工资税/福利
- id: A13
  name: G&A / 合规年化总现金成本
  value: '120'
  unit: USDK/year
  source: 创业财务启发式：$100K 薪资加 20% 工资税/福利
- id: A14
  name: 研发非薪酬支出
  value: 8 in Y1, then 6 + 0.6 per active customer monthly
  unit: USDK/month
  source: 创业财务启发式：用于 PHI 工作流的云、安全、工具和 QA
- id: A15
  name: 销售与市场非薪酬支出
  value: 5 in Y1, 7 in Y2, 9 in Y3 + 2 per AE + 6% of revenue
  unit: USDK/month
  source: 创业财务启发式：企业差旅、演示、会议和佣金
- id: A16
  name: G&A 非薪酬支出
  value: 6 + 0.5 per active customer monthly, plus 1 after compliance hire
  unit: USDK/month
  source: 创业财务启发式：法务、保险、审计和后台职能
- id: A17
  name: 首位专职销售招聘
  value: Month 13
  unit: month
  source: '[business-plan.yaml team; gtm] 首个试点年度由创始人主导销售，然后增加一名销售以建立可复制性'
- id: A18
  name: 第二位客户成功招聘
  value: Month 28
  unit: month
  source: '[business-plan.yaml milestones 12–24 months] 多专科 rollout 开始后支撑扩张'
- id: A19
  name: 用于单元经济的稳态月流失率
  value: '1.5'
  unit: percent
  source: 创业财务启发式：保守估计的早期企业 SaaS 续约风险
- id: A20
  name: 混合 CAC
  value: '121.6'
  unit: USDK/customer
  source: 由预测的 Y2–Y3 销售与市场支出除以 9 个净新增活跃客户计算得出
- id: A21
  name: 现金回收时点
  value: In-period collection
  unit: policy
  source: 创业财务启发式；之所以标记，是因为企业回款条款可能滞后于收入确认
- id: A22
  name: 融资需求
  value: '2.0'
  unit: USDM
  source: '[business-plan.yaml fundingAsk] 按达到 12–24 个月里程碑并附加 6 个月缓冲来设定'
