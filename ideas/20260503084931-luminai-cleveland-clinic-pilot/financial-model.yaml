scenarios:
  downside:
    description: Pilot conversion slips, blended ACV lands closer to $300K, and implementation friction delays later hires and customer adds.
    y3RevenueK: 2400.0
    y3EbitdaK: -817.8
    cashLowPointK: -279.5
    keyAssumptionChanges:
    - ACV drops from $330K to $300K.
    - Customer ramp ends Y3 at 10 active systems instead of 12.
    - Gross margin slips from 70% to 68% because services remain heavier for longer.
  base:
    description: Founder-led year 1 lands a pilot, year 2 converts pilots to production, and year 3 expansion gets to 12 active systems near the research SOM case.
    y3RevenueK: 2983.7
    y3EbitdaK: -507.6
    cashLowPointK: 290.1
    keyAssumptionChanges:
    - Blended ACV stays at $330K.
    - Customer ramp reaches 3 active systems by Y1, 7 by Y2, and 12 by Y3.
    - Gross margin holds at the business-plan target of 70%.
  upside:
    description: One specialty proves repeatable earlier, ACV trends toward the top of the plan range, and expansion brings 14 active systems by Q4Y3.
    y3RevenueK: 3844.8
    y3EbitdaK: 93.0
    cashLowPointK: 1209.0
    keyAssumptionChanges:
    - ACV rises from $330K to $345.6K.
    - Customer ramp reaches 14 active systems by Q4Y3.
    - Gross margin improves from 70% to 72% as implementation gets more repeatable.
sensitivity:
- variable: ARPU
  downsideCase: $280K ACV from narrower pilot-to-production packaging
  baseCase: $330K ACV blended across landed systems
  upsideCase: $360K ACV with stronger specialty expansion proof
  y3RevenueImpactK: -455.6
  cashImpactK: -486.6
- variable: CAC
  downsideCase: Higher field selling spend and earlier rep additions push CAC toward ~$145K
  baseCase: Forecast CAC of ~$122K per net new logo
  upsideCase: Reference-led selling keeps CAC near ~$105K
  y3RevenueImpactK: 0.0
  cashImpactK: -147.5
- variable: churn
  downsideCase: Net retention slips and Y3 exits with one fewer active system
  baseCase: Forecast stays effectively net-flat on churn through Y3 new-logo ramp
  upsideCase: No early churn and one extra system retained/expanded by Q4Y3
  y3RevenueImpactK: -41.2
  cashImpactK: -24.1
- variable: sales cycle
  downsideCase: Enterprise cycle stretches by ~1 quarter because security and integration review slows contracts
  baseCase: Pilot-to-production motion stays inside roughly a 9-month healthcare enterprise cycle
  upsideCase: Reference customers compress new-logo sales by ~1 quarter
  y3RevenueImpactK: -82.5
  cashImpactK: -148.5
- variable: gross margin
  downsideCase: Gross margin stays at 65% because implementation remains service-heavy
  baseCase: Gross margin reaches the 70% business-plan target
  upsideCase: Gross margin improves to 73% with cleaner workflows and lower exception handling
  y3RevenueImpactK: 0.0
  cashImpactK: -248.3
- variable: hiring pace
  downsideCase: Front-load non-core hires before repeatable deployment is proven
  baseCase: Milestone-based hiring adds sales, G&A, and CS only after customer proof points
  upsideCase: Delay non-core hires until after the next production conversion
  y3RevenueImpactK: 0.0
  cashImpactK: -258.9
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads --> Pilots
      Pilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case growth is driven mainly by adding active health-system logos from 3 at Y1 end to 12 at Y3 end at a blended $330K ACV, not by heroic price expansion.
- checkName: Must go right
  finding: The company has to convert early pilots into production within roughly one procurement cycle so Q4Y2 reaches 7 active systems before the pre-seed cash cushion gets thin.
- checkName: Model breaks if
  finding: If ACV falls toward $300K and customer adds stall at 10 systems, downside cash turns negative by about $280K before the company reaches the next financing proof point.
- checkName: Next-round proof
  finding: The next round is justified by showing 5-7 active paying systems, repeatable Epic/FHIR handoff, and at least two second-specialty expansion wins by the end of Y2.
sanityChecks:
  ruleOf40: Y3 growth 80.8% + EBITDA margin -17.0% = 63.8%
  burnMultiple: Y2 burn multiple 0.41x using $546K EBITDA burn / $1.32M net new ARR; Y3 burn multiple 0.31x using $508K burn / $1.65M net new ARR.
  revenuePerFte: $249K Y3 on ~12.0 average FTE (benchmark $200–400K enterprise SaaS)
  flags:
  - Cash conversion is assumed in-period; real health-system payment terms can trail revenue by 60-90 days and would tighten the base-case cash cushion.
  - The forecast counts net active paying systems and does not separately show pilot-vs-production logos, so early-period mix is simplified.
  - Holding 70% gross margin from the first year may prove optimistic if implementation or compliance services remain customer-specific longer than planned.
