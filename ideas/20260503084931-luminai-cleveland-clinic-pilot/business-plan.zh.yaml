slug: referral-intake-control-tower
date: '2026-05-03'
executiveSummary: Cleveland Clinic 与 Luminai 的试点证明，美国大型医疗系统现在愿意在转诊接诊录入上测试 AI；而这一流程依旧高度依赖人工、传真繁多，并且在运营上仍与核心 EHR 功能分离。公司应从大型 IDN 和学术医疗系统中的集中式专科转诊团队切入，因为在那里，积压、不完整资料包和误路由会直接拖慢排班、浪费协调员人力。首个产品应是一套面向 1–2 个专科的转诊接诊录入控制塔：接收传真或上传转诊、提取必填字段、检查完整性、把病例路由进正确工作队列，并在异常场景保留人工复核。GTM 体系应先向接入业务 VP 或门诊运营负责人卖一个付费试点，触发点通常是接入中心转型或专科增长项目；等转诊周转时间与排班填充率提升跑出来后，再转成年付平台费加使用量收费。只有在公司能用队列叠加式部署、强审计轨迹，以及可量化的转诊到排班时长下降，在无需替换 EHR 的前提下先证明价值，这套策略才成立。Epic、Phreesia、Luma、Medsender 以及更广义的自动化厂商都是真实竞争者，因此公司必须靠专科特有的路由逻辑、完整性规则，以及转诊到排班分析取胜，而不是靠通用 OCR。当前输入里仍缺少几个关键事实：真实试点量级、可接受错误阈值，以及各家系统里预算到底归谁；因此前 90 天应聚焦买方验证、历史转诊盲测 QA，以及与一个高量级专科共同设计试点。
problem:
  - 大型医疗系统仍通过传真或混合文档渠道接收大量专科转诊，迫使协调员重复录入数据、追补缺失信息，并手动决定目标队列。
  - 真正的瓶颈发生在下游排班与 EHR 工作流之前，这会造成转诊周转更慢、患者流失、专科产能闲置，以及现有 OCR、RPA 和 EHR 收件箱工具都无法彻底消除的人力成本。
solution:
  - 交付一套转诊接诊录入控制塔，接收入站文档、提取患者和转诊数据、标记缺失资料，并生成带置信度分数和 SLA 跟踪的结构化专科工作项。
  - 让人工只盯低置信度异常，而常规转诊则流入现有排班或 EMR 工作队列；系统同时产出审计轨迹以及按来源、专科和协调员拆分的转诊到排班分析。
whyWeWin:
  - 这一切口卡在一个狭窄但关键的运营瓶颈上，买方明确、ROI 可量化，而且刚获得顶级医疗系统试点验证。
  - 现有厂商要么控制下游轨道，要么卖宽泛的患者接入套件，但鲜少围绕 EHR 之前那摊混乱问题——专科完整性校验、异常处理和路由逻辑——来构建产品。
  - 一旦早期嵌入真实接入中心，围绕路由规则、异常结果和转诊到排班转化形成的工作流数据，就可能变成有防御性的专有数据集。
strategicChoices:
  beachhead: 美国大型医疗系统和学术医疗中心中的集中式专科转诊团队，这些团队要处理大量外部传真转诊，覆盖心脏科、消化科、神经科和骨科等服务线。
  wedgeRationale: 这一入口的痛点紧迫、买方集中，而且能用转诊积压、周转时间、无人工触达率和排班转化率等指标直接证明价值；比起售卖横向医院自动化平台，它更容易快速验证。
  sequencingRationale: 先为 1–2 个专科推出队列叠加式接诊录入自动化，因为这样能缩小集成范围、缩短安全与工作流设计周期，并先产出结果数据，为后续 Epic/FHIR 回写、企业级铺开和相邻工作流扩张打基础。
  notYet:
    - 在转诊接诊录入尚未于生产环境跑通前，就去做事前授权自动化。
    - 宽泛的呼叫中心编排或通用医院后台 AI 定位。
    - 转诊量不足以支撑企业级实施的 SMB 诊所和单门店部署。
    - 面向消费者的导航、医生搜索或端到端患者互动套件。
market:
  tam: '$0.5B'
  sam: '$105.0M'
  som: '$4.0M'
  segments:
    - 拥有集中接入中心和数十个专科门诊的美国大型医疗系统与 IDN。
    - 通过混合渠道接收外部转诊的学术医疗中心和多专科医疗机构。
  buyingProcess: 运营冠军用户大概率是转诊或接入运营负责人，但由于产品会触达 PHI 和下游工作队列，真正上线采购仍要经过 CIO、安全和集成评审。最快的路径是由接入中心转型或专科增长目标资助一个边界清晰的试点，证明吞吐和排班提升后再扩展。
product:
  mvp: MVP 应支持传真和文档接入、必填字段提取、按专科的完整性校验、队列叠加式路由、异常复核，以及面向一个医疗系统内 1–2 个专科的审计日志。它不该宣称能做泛化自动化，而应先证明在未完成全量回写集成前，协调员就能以更少人工处理更多转诊。
  sixMonth: 在一个集中接入中心启动首个付费试点，具备历史 QA 基线、人工复核闭环、SLA 仪表盘，并在一个专科上交付可量化的周转时间改善。
  twelveMonth: 增加基于 Epic 或 FHIR 的下游交接能力，把可配置路由规则扩展到 2–3 个专科，并提供把接诊录入表现与排班转化、流失下降挂钩的报表。
  twentyFourMonth: 在多个医疗系统中标准化可复用的部署手册，先把转诊接诊录入扩到更多专科和站点，之后再测试事前授权或影像医嘱接诊等相邻工作流。
  keyBets:
    - 队列叠加式部署在完成双向 EHR 集成前就能创造足够价值。
    - 一到两个专科既有足够高的转诊量，路由规则又足够清晰，适合安全地做早期自动化。
    - 买方愿意为协调员人力下降和更快填满排班付费，而不是只为文档提取准确率买单。
    - 在第一年里，审计能力和异常处理会比追求完全无人化更重要。
gtm:
  wedge: 向大型医疗系统中在某个高量级专科存在明显转诊积压的接入业务 VP、门诊运营负责人或 CIO 卖一个付费试点；一旦试点证明可排班吞吐更快，就转正式合同。
  channels:
    - 由创始人主导，直接面向接入中心和门诊运营负责人做企业销售。
    - 借助医疗系统创新团队和患者接入转型团队担任试点赞助方。
    - 借助 Epic、FHIR 和医疗 IT 实施伙伴加速信任建立与部署。
  funnelTargets: 每季度 10-15 个合格买方对话 -> 25-35% 付费试点率 -> 50%+ 试点转生产转化率 -> 60%+ 生产客户在 12 个月内扩展到第二个专科。
  pricing: 先付费试点，之后采用按转诊量分层的报价式年度软件收费；基准情形是向约 $250k-$350k 年合同额收敛，因为研究里的市场测算假设约 $300k ACV，而买方更在意排班填充、周转效率和人力 ROI，而不是席位数。
businessModel:
  revenueStreams:
    - 转诊接诊录入控制塔的年度 SaaS 订阅。
    - 按月处理转诊量计费的使用费。
    - 用于实施、工作流梳理和集成的专业服务。
  unitOfValue: 按医疗系统或专科接入中心每月处理的转诊量计。
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一家医疗系统里增加更多专科和集中接入团队。
    - 随着更多入站渠道接入平台，提高转诊量计费档位。
    - 只有在转诊部署已建立受信任的集成与规则管理立足点后，再引入相邻接诊录入工作流。
strategyMap:
  northStarMetric: 在约定 SLA 内被转成可排班工作项的入站转诊占比。
  inputMetrics:
    - 常规病例的无人工触达转诊处理率。
    - 必填数据项上的关键字段提取与路由准确率。
    - 按专科拆分的转诊到排班中位时长。
    - 缺失文档追补率。
    - 试点转生产转化率。
  moatsToBuild:
    - 专科特有的路由与完整性规则数据集。
    - 跨服务线的转诊到排班转化率与流失率基准数据。
    - 面向大型医疗系统、可复用的 Epic 或 FHIR 集成与安全审查手册。
  killCriteria:
    - 如果前三个试点在经过人工复核调优后，仍无法在常规转诊上做到至少 50% 无人工触达处理，且关键路由或数据错误率低于 5%，说明该工作流还不适合自动化。
    - 如果在试点启动后 12 个月内，没有任何一个付费试点转成高于 $250k 年化的生产合同，那么这个独立品类可能过窄或过难采购。
  mermaid: |
    flowchart LR
      Wedge[集中式专科转诊试点] --> MVP[队列叠加式转诊接诊录入 MVP]
      MVP --> Proof[积压下降 排班更快 异常可审计]
      Proof --> Expansion[更多专科 更多站点 更深集成]
investorMemo:
  verdict:
    call: 值得会面 / 继续尽调
    conviction: 中等确信度，因为买方痛点和切口都可信，但生产环境可接受的错误阈值与实施速度仍未被证明。
    whyBelieve: 已点名的 Cleveland Clinic 试点，加上传真驱动的转诊流程迟迟未消失，让这成为一个狭窄但真实的企业切口。
    whyDoubt: 现有证据对 ROI、可接受自动化阈值，以及一家创业公司能否不沦为 Epic 和接入套件旁边的重服务功能，仍说明不足。
    nextDiligence: 如果公司能在无需完整 EHR 回写的前提下，用可量化的积压和排班改善拿下 2–3 家目标医疗系统的付费专科试点，这个方向就值得继续尽调。
  firstCustomer:
    title: 由 VP 赞助的大型美国 IDN 集中接入团队
    profile: 一家拥有至少 20 个专科门诊、由集中式转诊团队处理大量外部传真，并将病例导入 Epic 或类似下游工作队列的多院区医疗系统。
    trigger: 转诊积压、专科增长压力，或暴露出患者流失与排班延迟的接入中心现代化项目。
    buyer: 接入业务 VP
    initialContract: 假设单一专科的付费试点为 $75k-$150k，跑通后转为约 $250k-$350k 年化软件合同，前提是已上线 2+ 个专科或全系统转诊量。
  mustBeTrue:
    - 至少有一个起步专科具备足够转诊量和标准化路由规则，能在 90 天内做出可衡量试点。
    - 对历史转诊做盲测 QA 后，产品在人工复核配合下能把关键提取和路由错误控制在买方可接受阈值以下。
    - 买方愿意先采购队列叠加式试点，而不是一开始就要求完整 Epic 或 Cerner 回写。
    - 试点经济性最终能转成接近研究中约 $300k ACV 的生产合同，而不是低价席位计费。
    - 早期客户会扩到更多专科，因为产品改善了排班填充与人力效率，而不只是文档处理。
  diligenceQuestions:
    - 哪些专科服务线既有最高传真量，又有最清晰的路由逻辑，适合作为首个部署？
    - 在强制人工复核前，接入负责人能接受的关键错误阈值是多少？
    - 公司能否在叠加模式下证明 ROI，还是必须完成全量 Epic 集成才能赢单并扩张？
    - 转诊接诊录入自动化的预算到底掌握在接入运营、数字化运营还是 CIO 手里？
    - 为什么 Epic、Phreesia、Luma 或 Medsender 满足不了首个客户的需求？
  riskHeatmap:
    - risk: 医院销售和实施周期过长
      likelihood: High
      impact: High
      leadingIndicator: 在 10 个合格买方流程后，付费试点启动数少于 2 个，或在安全与集成审查中反复卡住。
      mitigation: 从范围很窄的试点起步、坚持创始人主导销售，并用低集成度的队列叠加部署绑定积压下降结果。
    - risk: 患者接诊录入自动化错误损害信任
      likelihood: Medium
      impact: High
      leadingIndicator: 盲测 QA 显示，在工作流调优后关键路由或必填字段错误仍高于 5%。
      mitigation: 保留人工复核、提供审计轨迹、先从路由规则更清晰的专科开始，并阻止低置信度病例自动路由。
    - risk: 现有厂商和相邻供应商封住切口
      likelihood: Medium
      impact: Medium
      leadingIndicator: 试点后买方持续偏向 Epic 或已有患者接入套件，因为他们认为差异化只剩 OCR。
      mitigation: 靠专科完整性逻辑、转化分析和更快部署取胜，而不是靠通用文档提取。
    - risk: 预算归属与定价模型弱于预期
      likelihood: Medium
      impact: High
      leadingIndicator: 买方只愿给低于假设企业 ACV 的部门预算，或坚持高度定制、重服务收费。
      mitigation: 尽早验证经济买方，把 ROI 包装成排班填充与人力杠杆，并把 ICP 收窄到有高层接入目标的系统。
operatingAssumptions:
  - assumption: 买方会接受先做队列叠加试点，再做完整双向 EHR 回写。
    basis: research.yaml
    validationTest: 做 5-10 次买方访谈，并拿到 2 份明确以叠加式部署和有限集成为起点的试点设计。
    decisionImpact: 如果不成立，路线图就必须更早优先做更深的 Epic 或 Cerner 集成，公司也需要更多实施资本。
  - assumption: 在大型医疗系统的生产部署中，约 $300k 的年合同额是可实现的。
    basis: research.yaml
    validationTest: 至少与 3 位经济买方测试定价，并签下 1 个包含书面扩展路径的付费试点。
    decisionImpact: 如果不成立，公司就必须聚焦更大的系统、调整打包方式，或重新评估作为独立公司是否具备风险投资规模。
  - assumption: 心脏科、消化科、神经科或骨科里，至少有一个专科既具高量级，又有足够一致的路由规则。
    basis: idea.yaml
    validationTest: 标注并复核至少 2 个目标专科的 200-500 份历史转诊，对比完整性、异常类型和路由一致性。
    decisionImpact: 如果不成立，就要更换滩头专科，并在真实部署前进一步收窄 MVP 范围。
  - assumption: 在仍显著减少人工触达的同时，人工复核闭环能把关键错误控制在运营可接受阈值以下。
    basis: operator judgment
    validationTest: 对模型输出做协调员盲测 QA，并在历史和试点实时样本上衡量无人工触达率、复核覆盖率和关键错误率。
    decisionImpact: 如果不成立，产品定位和定价就得从“自动化”转向“工作流辅助”，利润率与速度优势都会下降。
  - assumption: 预算权通常会落在接入或门诊运营，而不是纯创新预算。
    basis: research.yaml
    validationTest: 在 5 次买方访谈中确认预算归属、审批路径，以及活跃接入中心转型项目的 ROI 叙事。
    decisionImpact: 如果不成立，GTM 动作就必须转向 CIO 主导的转型销售，并接受更长采购周期。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 10 位来自 IDN 和学术医疗系统的目标买方，梳理触发事件、预算归属和试点意愿。
    hypothesis: 当积压和排班填充指标可见时，接入和门诊运营负责人愿意为一个狭窄的转诊接诊录入试点买单。
    successMetric: 10 次访谈中至少有 6 次确认存在明确购买触发，且有 2 家愿意进入试点范围设计。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 对 2 个候选专科的 200-500 份历史转诊做盲测 QA。
    hypothesis: 至少有一个专科的文档一致性足够高，配合人工复核后关键错误率可低于 5%。
    successMetric: 所选专科的必填字段提取准确率高于 90%，关键路由错误低于 5%。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 在一个集中接入中心上线叠加式试点，配套异常复核和 SLA 仪表盘。
    hypothesis: 在未完成完整 EHR 回写前，产品也能减少人工触达并缩短周转时间。
    successMetric: 转诊到排班中位时长至少下降 30%，或常规病例无人工触达处理率至少达到 50%。
    owner: 创始产品/运营
  - horizon: 6–12 个月
    experiment: 为首个生产客户增加 Epic 或 FHIR 交接能力，并扩展到第二个专科。
    hypothesis: 更深的工作流集成会提升试点转生产转化率，并推动同一系统内扩张。
    successMetric: 首个客户签下生产合同，并在试点完成后 6 个月内上线第二个专科。
    owner: 集成工程师
  - horizon: 12–18 个月
    experiment: 与 Epic 或医疗 IT 顾问正式建立一个实施伙伴渠道。
    hypothesis: 可信部署伙伴能缩短安全与集成摩擦，而不会把公司变成服务型公司。
    successMetric: 签下 1 个正式伙伴关系，并带来或加速至少 1 个试点机会。
    owner: 创始人/CEO
operations:
  - 在大规模对外销售前，先搭好符合 HIPAA 的安全、合规和审计资料包。
  - 维持协调员在环的 QA 工作流，把人工改判、缺失数据原因和路由异常沉淀为训练数据。
  - 把实施标准化到工作流梳理、专科规则配置，以及试点期间的每周绩效复盘。
  - 首个部署使用现有排班和转诊工作队列，而不是替换 EHR 工作流。
  - 引入 Epic 或 FHIR 实施伙伴，以缩短投产时间。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责首个试点所需的文档接入、提取质量、路由引擎和审计能力。
  - role: 创始产品/运营
    startTiming: Month 0
    rationale: 负责梳理转诊工作流、管理试点成功指标，并把协调员反馈转成专科规则设计。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 第一年必须由其亲自主导企业销售、买方发现与共创客户招募。
  - role: 集成工程师
    startTiming: Month 3-6
    rationale: 一旦试点需求被验证，就需要有人负责 Epic、FHIR 和安全评审实施，避免产品开发速度被拖住。
  - role: 客户成功或实施负责人
    startTiming: Month 9-12
    rationale: 支持生产部署和跨专科扩张，同时沉淀可复用的部署手册。
milestones:
  - horizon: 0–12 个月
    items:
      - 拿下 2 个共创客户并在一个集中接入中心启动 1 个付费试点。
      - 在一个专科上证明关键错误低于 5%，且周转时间有可量化改善。
      - 完成可复用的安全审查资料包和首个队列叠加式部署手册。
      - 将首个试点转成生产合同，并明确扩到第二个专科的路径。
  - horizon: 12–24 个月
    items:
      - 达到 3-5 家生产级医疗系统客户，并在多个专科使用平台。
      - 上线基于 Epic 或 FHIR 的下游交接能力，以及与流失率和排班填充绑定的转诊到排班分析。
      - 建立一个能缩短实施时间的伙伴辅助部署动作。
  - horizon: 24–36 个月
    items:
      - 通过约 12 家落地系统、接近研究假设的 blended ACV，达到第 3 年约 $4M 年化收入的 SOM 目标。
      - 先在现有客户内扩展更多专科和站点，再考虑拓展到相邻接诊录入工作流。
      - 基于转诊部署跑出的证据，决定下一个产品线是事前授权还是影像医嘱接诊录入。
risks:
  - risk: 医院销售周期过长，拖慢试点启动和收入兑现。
    likelihood: High
    impact: High
    mitigation: 聚焦狭窄的运营试点，由创始人主导销售，并把 ROI 绑定到积压下降和排班填充。
  - risk: 自动化错误或数据质量差，削弱协调员和高层的信任。
    likelihood: Medium
    impact: High
    mitigation: 从第一天起就采用人工复核、专科化规则集、置信度阈值和审计轨迹。
  - risk: 现有 EHR 或患者接入厂商把这套能力吸收成一个功能。
    likelihood: Medium
    impact: Medium
    mitigation: 把 EHR 之前的异常处理、专科路由和转化分析做得更深，让大套件难以标准化复制。
  - risk: 不同医疗系统之间的实施负担过于定制化。
    likelihood: Medium
    impact: High
    mitigation: 围绕队列叠加式部署、可复用的集成模式和有限的首个专科打法做标准化。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月跑道应足以覆盖核心产品、安全与合规准备、2-3 个试点部署、初始 Epic 或 FHIR 集成能力，以及把首批医疗系统试点转成可复用生产案例所需的小团队。
