  - point: 文档 AI 和工作流工具已足够成熟，使半结构化接诊录入自动化具备现实可行性。
    sourceRefs:
    - 36
    - 37
    - 11
  - point: 更广义的医疗自动化与临床工作流市场仍在增长，为相邻工作流工具提供预算空间。
    sourceRefs:
    - 21
    - 22
  headwinds:
  - point: EHR 现有厂商和现有转诊网络工具，会让医院把接诊录入自动化视为一个功能，而不是独立预算项。
    sourceRefs:
    - 15
    - 18
    - 19
  - point: 安全、AI 透明度和集成审查，即便在行政工作流上也会拉长投产时间。
    sourceRefs:
    - 6
    - 8
    - 29
  - point: 以传真为主的数据质量仍很混乱，低置信度病例很可能长期需要人工复核。
    sourceRefs:
    - 14
    - 17
    - 24
competitors:
- name: Luminai
  stage: scale-up
  wedge: 更广义的医疗行政自动化平台，如今已在 Cleveland Clinic 的转诊管理场景中得到验证。
  pricing: 定制企业定价（未公开列出）。
  strength: 具备可作为参考案例的医疗系统验证，以及更广泛的运营自动化可信度。
  weaknessVsUs: 范围更广，可能削弱其在专科转诊深度上的聚焦，让产品更像横向自动化，而不是接诊录入控制塔。
  sourceRefs:
  - 1
  - 16
- name: Phreesia
  stage: incumbent
  wedge: 上市公司的患者接入与转诊管理软件，核心卖点是填满排班并标准化转诊流程。
  pricing: 定制企业定价 / 预约演示。
  strength: 在患者接入领域已有成熟分发，并擅长用员工节省和新患者增长来讲 ROI。
  weaknessVsUs: 更偏套件化；在以传真为主、专科化的异常处理上，未必会足够有主见。
  sourceRefs:
  - 13
- name: Luma Health
  stage: scale-up
  wedge: 在更广义患者成功平台中嵌入 AI 传真自动化。
  pricing: 定制企业定价 / 预约演示。
  strength: 在医疗传真自动化和患者接入工作流上的定位很清晰。
  weaknessVsUs: 更广义的患者接入范围，反而给更深的控制塔分析和按专科路由逻辑留下空间。
  sourceRefs:
  - 14
- name: Epic
  stage: incumbent
  wedge: 掌握下游排班、互操作性，以及医院最信任的许多工作队列。
  pricing: 套件 / 平台定价，未对这一工作流单独公开列价。
  strength: 内嵌分发、运营信任强，并且天然连通排班和临床数据。
  weaknessVsUs: Epic 默认并不能消除入站文档清洗问题；许多机构仍通过外部门户、传真流程或人工协调来处理转诊。
  sourceRefs:
  - 15
  - 30
- name: Medsender
  stage: startup
  wedge: 面向医疗的 HIPAA 合规传真、转诊和沟通自动化。
  pricing: 定制定价 / 销售驱动。
  strength: 比更宽泛的接入套件更贴近传真和转诊底层。
  weaknessVsUs: 当前定位仍是更广义的通信/传真自动化，而不是与排班结果紧密绑定的专科转诊控制塔。
  sourceRefs:
  - 17
regulatoryTechnicalConstraints:
- point: 处理 PHI 的工具会面临安全审查，必须符合医疗网络安全控制与审计要求。
  sourceRefs:
  - 8
  - 29
- point: 互操作性价值取决于 EHR 工作流集成，以及对 FHIR ServiceRequest 和 Task 这类标准的实际使用。
  sourceRefs:
  - 11
  - 12
  - 15
- point: ONC 的 HTI-1 规则提高了对预测型决策支持透明度的审视，尤其是在越来越多健康 IT 环境开始使用 AI 驱动建议时。
  sourceRefs:
  - 6
  - 9
- point: 传真源数据噪声大、缺漏多，因此即便提取系统很强，也仍需要异常路由和人工复核。
  sourceRefs:
  - 14
  - 17
  - 24
- point: 医院之间在专科路由逻辑和工作队列设计上的差异很大，形成了按客户定制的实施负担。
  sourceRefs:
  - 23
  - 30
  - 3
validationSignals:
- point: Cleveland Clinic 正在用 Luminai 试点转诊管理，直接验证了企业买方愿意在这个工作流上测试 AI。
  sourceRefs:
  - 1
  - 2
- point: 美国大型医疗系统仍普遍维护正式的医生转诊门户和接入中心，说明这个流程在运营上仍然独立且足够重要。
  sourceRefs:
  - 3
  - 33
  - 34
  - 35
- point: 相邻的接入与导航厂商仍在吸引战略资本和并购兴趣，包括 DexCare 和 Kyruus 相关交易。
  sourceRefs:
  - 19
  - 20
- point: 学术文献里已经出现把转诊自动化做成 SMART on FHIR 构建模式的案例，说明问题足够具体，能被原型化和量化。
  sourceRefs:
  - 23
- point: 已公开的概念验证研究明确针对 eReferral 与传真长期并存之间的缺口，这与本创业公司 thesis 高度一致。
  sourceRefs:
  - 24
- point: 多家厂商如今已直接营销转诊、传真或患者接入自动化，说明买方教育已经开始，即便品类仍很分散。
  sourceRefs:
  - 13
  - 14
  - 17
  - 31
  - 32
openQuestions:
- 哪些专科服务线能同时提供最干净的“高转诊量 + 文档一致性 + 高层紧迫度”组合，适合作为首个部署？
- 当前积压里，到底有多少是缺失数据造成的、多少是目标地误路由造成的、又有多少只是产能约束？
- 买方是否接受先做工作队列叠加部署，还是从第一天起就必须完整写回 Epic/Cerner？
- 在让常规转诊绕过人工触达之前，接入负责人要求的复核率和准确率阈值分别是多少？
