slug: referral-intake-control-tower
date: '2026-05-03'
executiveSummary: Cleveland Clinic's Luminai pilot validates that large U.S. health systems will now test AI on referral intake, a workflow that remains manual, fax-heavy, and operationally separate from core EHR functionality. The company should enter through centralized specialty-referral teams at large IDNs and academic systems where backlog, incomplete packets, and misrouting directly slow scheduling and waste coordinator labor. The initial product should be a referral-intake control tower for 1-2 specialties that ingests faxed or uploaded referrals, extracts required fields, checks completeness, routes cases into the correct work queue, and keeps humans in the loop for exceptions. The GTM system should start with a paid pilot sold to a VP of Access or ambulatory operations leader during an access-center transformation or specialty growth push, then convert to an annual platform plus usage contract once turnaround-time and schedule-fill gains are visible. The strategy works only if the company proves value before full EHR replacement by using a queue-overlay deployment, strong audit trails, and measurable reductions in referral-to-schedule time. Competition is real from Epic, Phreesia, Luma, Medsender, and broader automation vendors, so the company must win on specialty-specific routing logic, completeness rules, and referral-to-schedule analytics rather than generic OCR. Key missing facts from the inputs are live pilot volume, acceptable error thresholds, and actual budget ownership by system, so the first 90 days should focus on buyer validation, blind QA on historical referrals, and pilot design with one high-volume specialty.
problem:
  - Large health systems still receive many specialty referrals by fax or mixed document channels, forcing coordinators to re-key data, chase missing information, and manually decide destination queues.
  - The bottleneck sits before downstream scheduling and EHR workflows, creating slower referral turnaround, lost patients, underused specialty capacity, and labor costs that existing OCR, RPA, and EHR inbox tools do not fully remove.
solution:
  - Deliver a referral-intake control tower that ingests inbound documents, extracts patient and referral data, flags missing documentation, and creates structured specialty-specific work items with confidence scores and SLA tracking.
  - Keep humans focused on low-confidence exceptions while routine referrals flow into existing scheduling or EMR work queues, generating audit trails and referral-to-schedule analytics by source, specialty, and coordinator.
whyWeWin:
  - The wedge is a narrow operational bottleneck with an identified buyer, measurable ROI, and recent enterprise validation from a top-tier health system pilot.
  - Incumbents own downstream rails or broad patient-access suites, but few are positioned around the pre-EHR mess of specialty-specific completeness checks, exception handling, and routing logic.
  - Workflow data on routing rules, exception outcomes, and referral-to-schedule conversion can become a defensible dataset if the company embeds early in live access centers.
strategicChoices:
  beachhead: Centralized specialty-referral teams at large U.S. health systems and academic medical centers that receive high volumes of external fax referrals for service lines such as cardiology, gastroenterology, neurology, and orthopedics.
  wedgeRationale: This entry point has urgent pain, a concentrated buyer, and clear proof metrics such as referral backlog, turnaround time, no-touch rate, and schedule conversion; it is faster to validate than selling a horizontal hospital-automation platform.
  sequencingRationale: Start with queue-overlay intake automation for 1-2 specialties because that minimizes integration scope, shortens security and workflow design work, and creates outcome data that supports later Epic/FHIR write-back, enterprise rollout, and adjacent workflow expansion.
  notYet:
    - Prior authorization automation before referral intake is proven in production.
    - Broad call-center orchestration or generic hospital back-office AI positioning.
    - SMB practices and single-clinic deployments with insufficient referral volume to justify enterprise implementation.
    - Consumer-facing navigation, provider search, or end-to-end patient engagement suites.
market:
  tam: '$0.5B'
  sam: '$105.0M'
  som: '$4.0M'
  segments:
    - Large U.S. health systems and IDNs with centralized access centers and dozens of specialty clinics.
    - Academic medical centers and multi-specialty provider organizations with mixed-channel external referral intake.
  buyingProcess: The operational champion is likely referral or access operations leadership, but production purchase still runs through CIO, security, and integration review because the product touches PHI and downstream work queues. The fastest path is a bounded pilot funded by access-center transformation or specialty-growth goals, then expansion after demonstrated throughput and scheduling gains.
product:
  mvp: The MVP should support fax and document ingestion, required-field extraction, specialty-specific completeness checks, queue-overlay routing, exception review, and audit logging for 1-2 specialties at one health system. It should avoid broad automation claims and instead prove that coordinators can process more referrals with lower manual touch before full write-back integration.
  sixMonth: Launch one paid pilot in a centralized access center with historical QA baselines, human-in-the-loop review, SLA dashboards, and measurable turnaround-time improvement in one specialty.
  twelveMonth: Add Epic or FHIR-based downstream handoff, configurable routing rules across 2-3 specialties, and reporting that ties intake performance to schedule conversion and leakage reduction.
  twentyFourMonth: Standardize a repeatable deployment playbook across multiple health systems, expand within referral intake to more specialties and sites, and only then test adjacent workflows such as prior-auth or imaging-order intake.
  keyBets:
    - Queue-overlay deployment creates enough value before full bidirectional EHR integration.
    - One or two specialties have both high referral volume and routing rules clean enough for safe early automation.
    - Buyers will pay for reduced coordinator labor and faster schedule fill, not just document extraction accuracy.
    - Auditability and exception handling will matter more than maximizing full autonomy in the first year.
gtm:
  wedge: Sell a paid pilot to a VP of Access, ambulatory operations leader, or CIO at a large system with a visible referral backlog in one high-volume specialty and convert once the pilot shows faster schedulable throughput.
  channels:
    - Founder-led direct enterprise sales into access-center and ambulatory operations leadership.
    - Health system innovation and patient-access transformation teams as pilot sponsors.
    - Epic, FHIR, and healthcare IT implementation partners that can accelerate trust and deployment.
  funnelTargets: 10-15 qualified buyer conversations per quarter -> 25-35% paid pilot rate -> 50%+ pilot-to-production conversion -> 60%+ production customers expanding to a second specialty within 12 months.
  pricing: Paid pilot followed by quote-led annual software pricing with referral-volume tiers; base case is conversion toward roughly $250k-$350k annual contracts because the researched market assumes about $300k ACV and buyers care about schedule fill, turnaround, and labor ROI more than seat count.
businessModel:
  revenueStreams:
    - Annual SaaS subscription for the referral-intake control tower.
    - Usage-based fees tied to monthly referral volume processed.
    - Professional services for implementation, workflow mapping, and integration.
  unitOfValue: Monthly referral volume processed for a health system or specialty access center.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more specialties and centralized access teams within the same health system.
    - Increase referral volume tiers as more inbound channels are routed through the platform.
    - Introduce adjacent intake workflows only after referral deployments create trusted integration and rule-management footholds.
strategyMap:
  northStarMetric: Percentage of inbound referrals converted into schedulable work items within agreed SLA.
  inputMetrics:
    - No-touch referral processing rate on routine cases.
    - Critical field extraction and routing accuracy on required data elements.
    - Median referral-to-schedule time by specialty.
    - Missing-document chase rate.
    - Pilot-to-production conversion rate.
  moatsToBuild:
    - Specialty-specific routing and completeness-rule dataset.
    - Referral-to-schedule conversion and leakage benchmark data across service lines.
    - Repeatable Epic or FHIR integration and security-review playbooks for large systems.
  killCriteria:
    - If the first three pilots cannot achieve at least 50% no-touch processing on routine referrals with less than 5% critical routing or data errors after human-review tuning, the workflow is not automation-ready.
    - If no paid pilot converts into a production contract above $250k annualized within 12 months of pilot start, the standalone category may be too narrow or too hard to buy.
  mermaid: |
    flowchart LR
      Wedge[Centralized specialty-referral pilot] --> MVP[Queue-overlay referral intake MVP]
      MVP --> Proof[Lower backlog faster scheduling audit-ready exceptions]
      Proof --> Expansion[More specialties more sites deeper integration]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Medium conviction because the buyer pain and wedge are credible, but production error tolerance and implementation speed are still unproven.
    whyBelieve: A named Cleveland Clinic pilot plus persistent fax-heavy referral workflows creates a plausible path to a narrow but real enterprise wedge.
    whyDoubt: The evidence base is still thin on ROI, acceptable automation thresholds, and whether a startup can avoid becoming a services-heavy feature beside Epic and access-suite incumbents.
    nextDiligence: Confirm that two to three target health systems will fund a paid specialty-specific pilot before full EHR write-back if the company can show measurable backlog and scheduling gains.
  firstCustomer:
    title: VP-sponsored centralized access team at a large U.S. IDN
    profile: A multi-hospital system with at least 20 specialty clinics and a centralized referral team processing high external fax volume into Epic or similar downstream work queues.
    trigger: Referral backlog, specialty growth pressure, or an access-center modernization initiative that exposes lost patients and delayed scheduling.
    buyer: VP of Access
    initialContract: Assumed $75k-$150k paid pilot for one specialty converting to roughly $250k-$350k annualized software once 2+ specialties or systemwide referral volume are live.
  mustBeTrue:
    - At least one initial specialty has enough referral volume and standardized routing rules to support a measurable pilot inside 90 days.
    - Blind QA on historical referrals shows the product can keep critical extraction and routing errors below a buyer-acceptable threshold with human review.
    - Buyers will purchase a queue-overlay pilot before demanding full Epic or Cerner write-back on day one.
    - Pilot economics convert into production contracts near the researched ~$300k ACV, not low-end seat pricing.
    - Early customers expand to additional specialties because the product improves schedule fill and labor productivity, not just document handling.
  diligenceQuestions:
    - Which specialty service lines have both the highest fax volume and the cleanest routing logic for a first deployment?
    - What critical-error threshold will an access leader accept before manual review is mandatory?
    - Can the company prove ROI in overlay mode, or is full Epic integration required to win and expand?
    - Who actually controls budget for referral-intake automation: access operations, digital operations, or CIO?
    - Why will Epic, Phreesia, Luma, or Medsender not satisfy the first customer's requirement set?
  riskHeatmap:
    - risk: Long hospital sales and implementation cycles
      likelihood: High
      impact: High
      leadingIndicator: Fewer than 2 paid pilot starts after 10 qualified buyer processes or repeated stalls in security and integration review.
      mitigation: Start with narrowly scoped pilots, founder-led selling, and low-integration queue-overlay deployments tied to backlog reduction.
    - risk: Automation errors on patient intake damage trust
      likelihood: Medium
      impact: High
      leadingIndicator: Blind QA shows more than 5% critical routing or required-field errors after workflow tuning.
      mitigation: Keep humans in the loop, ship audit trails, start with specialties that have clearer routing rules, and block low-confidence cases from auto-routing.
    - risk: Incumbents and adjacent vendors close the wedge
      likelihood: Medium
      impact: Medium
      leadingIndicator: Buyers consistently prefer Epic or existing patient-access suites after pilots because differentiation is seen as OCR only.
      mitigation: Win on specialty completeness logic, conversion analytics, and faster deployment rather than generic document extraction.
    - risk: Budget owner and pricing model are weaker than assumed
      likelihood: Medium
      impact: High
      leadingIndicator: Buyers ask for departmental budgets below the assumed enterprise ACV or insist on services-heavy custom pricing.
      mitigation: Validate economic buyer early, package ROI around schedule fill and labor leverage, and narrow ICP to systems with executive access mandates.
operatingAssumptions:
  - assumption: Buyers will accept a queue-overlay pilot before full bidirectional EHR write-back.
    basis: research.yaml
    validationTest: Run 5-10 buyer interviews and secure 2 pilot designs that explicitly start with overlay deployment and limited integration.
    decisionImpact: If false, the roadmap must prioritize deeper Epic or Cerner integration earlier and the company will need more implementation capital.
  - assumption: A roughly $300k annual contract value is achievable for production deployments at large systems.
    basis: research.yaml
    validationTest: Test pricing with at least 3 economic buyers and close 1 paid pilot that includes a written expansion path to production pricing.
    decisionImpact: If false, the company must narrow to larger systems, change packaging, or reconsider standalone venture-scale economics.
  - assumption: Cardiology, gastroenterology, neurology, or orthopedics contain a first specialty with both high volume and sufficiently consistent routing rules.
    basis: idea.yaml
    validationTest: Annotate and review 200-500 historical referrals across at least 2 target specialties to compare completeness rates, exception types, and routing consistency.
    decisionImpact: If false, the beachhead specialty must change and MVP scope should narrow further before field deployment.
  - assumption: Human-in-the-loop review can keep critical errors below operationally acceptable thresholds while still reducing manual touch materially.
    basis: operator judgment
    validationTest: Conduct blind coordinator QA on model outputs and measure no-touch rate, reviewer override rate, and critical error rate on historical and live pilot samples.
    decisionImpact: If false, product claims and pricing must shift toward workflow assist rather than automation, reducing margin and speed advantages.
  - assumption: Budget authority will usually sit with access or ambulatory operations rather than a pure innovation budget.
    basis: research.yaml
    validationTest: In 5 buyer interviews, identify budget owner, approval path, and expected ROI framing for active access-center modernization programs.
    decisionImpact: If false, the GTM motion must reorient toward CIO-led transformation sales and longer procurement cycles.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 10 target buyers across IDNs and academic systems to map trigger events, budget owner, and pilot appetite.
    hypothesis: Access and ambulatory operations leaders will fund a narrow referral-intake pilot when backlog and schedule-fill metrics are visible.
    successMetric: At least 6 of 10 interviews confirm an active buying trigger and 2 agree to pilot scoping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run blind QA on 200-500 historical referrals from 2 candidate specialties.
    hypothesis: One specialty will show enough document consistency to support less than 5% critical errors with human review.
    successMetric: Greater than 90% required-field extraction accuracy and less than 5% critical routing error on the chosen specialty.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Deploy an overlay pilot in one centralized access center with exception review and SLA dashboards.
    hypothesis: The product can reduce manual touch and turnaround time before full EHR write-back.
    successMetric: At least 30% reduction in median referral-to-schedule time or at least 50% no-touch processing on routine cases.
    owner: Founding product/ops
  - horizon: 6–12 months
    experiment: Add Epic or FHIR handoff for the first production customer and expand to a second specialty.
    hypothesis: Deeper workflow integration will increase pilot-to-production conversion and expansion inside the same system.
    successMetric: First customer signs production contract and launches a second specialty within 6 months of pilot completion.
    owner: Integration engineer
  - horizon: 12–18 months
    experiment: Formalize one implementation-partner channel with Epic or healthcare IT consultants.
    hypothesis: Trusted deployment partners can shorten security and integration friction without turning the company into a services firm.
    successMetric: One signed partner relationship and at least 1 sourced or accelerated pilot opportunity.
    owner: Founder CEO
operations:
  - Build a HIPAA-ready security, compliance, and audit package before broad outbound selling.
  - Maintain a coordinator-in-the-loop QA workflow that captures overrides, missing-data reasons, and routing exceptions as training data.
  - Standardize implementation around workflow mapping, specialty rule configuration, and weekly performance reviews during pilots.
  - Use existing scheduling and referral work queues rather than replacing EHR workflows in the first deployment.
  - Recruit Epic or FHIR implementation partners that can shorten time-to-production.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns document ingestion, extraction quality, routing engine, and auditability for the first pilot.
  - role: Founding product/ops
    startTiming: Month 0
    rationale: Maps referral workflows, manages pilot success metrics, and turns coordinator feedback into specialty-specific rule design.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Required for founder-led enterprise sales, buyer discovery, and design-partner recruitment during the first year.
  - role: Integration engineer
    startTiming: Month 3-6
    rationale: Needed once pilot demand is validated to handle Epic, FHIR, and security-review implementation work without stalling product velocity.
  - role: Customer success or implementation lead
    startTiming: Month 9-12
    rationale: Supports production rollouts and expansion across specialties while preserving repeatable deployment playbooks.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 2 design partners and launch 1 paid pilot in a centralized access center.
      - Prove a specialty-specific workflow with less than 5% critical error and measurable turnaround improvement.
      - Complete a reusable security review package and first queue-overlay deployment playbook.
      - Convert the first pilot into a production contract with a defined second-specialty expansion path.
  - horizon: 12–24 months
    items:
      - Reach 3-5 production health-system customers using the platform in multiple specialties.
      - Ship Epic or FHIR-based downstream handoff and referral-to-schedule analytics tied to leakage and schedule fill.
      - Establish one partner-assisted deployment motion that reduces implementation time.
  - horizon: 24–36 months
    items:
      - Reach the researched Year-3 SOM target of about $4M in annualized revenue through roughly 12 landed systems at blended ACV near the research case.
      - Expand within existing customers to additional specialties and sites before broadening into adjacent intake workflows.
      - Decide, based on proof from referral deployments, whether prior-auth or imaging-order intake is the next product line.
risks:
  - risk: Long hospital sales cycles delay pilot starts and revenue realization.
    likelihood: High
    impact: High
    mitigation: Focus on a narrow operational pilot, founder-led selling, and ROI framed around backlog reduction and schedule fill.
  - risk: Automation errors or poor data quality erode trust with coordinators and executives.
    likelihood: Medium
    impact: High
    mitigation: Use human-in-the-loop review, specialty-specific rule sets, confidence thresholds, and audit trails from day one.
  - risk: Incumbent EHR or patient-access vendors absorb the feature set.
    likelihood: Medium
    impact: Medium
    mitigation: Go deeper on pre-EHR exception handling, specialty routing, and conversion analytics that broad suites do not productize well.
  - risk: Implementation burden becomes too custom across health systems.
    likelihood: Medium
    impact: High
    mitigation: Standardize around queue-overlay deployments, reusable integration patterns, and a limited first-specialty playbook.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months of runway should fund the core product, security and compliance readiness, 2-3 pilot deployments, initial Epic or FHIR integration capability, and the small team needed to convert the first health-system pilots into repeatable production references.
