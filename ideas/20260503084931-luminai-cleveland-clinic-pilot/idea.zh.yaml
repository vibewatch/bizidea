jobsToBeDone:
  - job: 当数千份外部转诊以非结构化格式涌入时，帮助集中接入团队准确分诊和路由这些转诊，让他们无需增加协调员编制也能更快完成患者排班。
    currentAlternative: 在 EHR 工作队列中人工查看传真并重复录入
    successMetric: 从转诊到完成排班的中位时间，以及无需人工触达即可完成处理的转诊占比
