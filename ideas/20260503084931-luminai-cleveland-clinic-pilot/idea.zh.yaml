topRisks:
  - name: 医院销售周期偏长
    description: 即便工作流切口很强，也可能被安全审查、集成规划或委员会式采购拖住。
    mitigation: 先从集中接入团队内由创新预算支持的试点切入，把 ROI 包装成转诊积压下降，并尽量压低初始集成复杂度。
  - name: 患者接诊自动化误差
    description: 转诊分类错误或资料不完整可能延误治疗，并迅速摧毁运营负责人的信任。
    mitigation: 对低置信度病例保留人工复核路径，提供审计轨迹，并先从路由规则清晰的专科开始。
  - name: 现有厂商夹击
    description: 一旦需求被验证，EHR 厂商、BPO 或横向自动化平台都可能补上类似转诊功能。
    mitigation: 抢先做深专科工作流能力，证明转化率和流失率改善，并在现有厂商跟上前扩到相邻接入工作流。
