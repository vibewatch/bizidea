problem: 医院仍在通过传真等非结构化渠道接收大量专科转诊，员工不得不反复录入数据、追补缺失资料，并人工判断每个病例该进入哪条队列。这会拉长转诊周转、造成患者流失、让专科产能填不满，也推高协调员人力成本。EHR 收件箱和 RPA 工具并没有真正解决最脏的接诊录入环节：文档经常不完整、标签不准，甚至被送进错误队列。
targetUser:
  primary: 美国大型医疗系统内负责转诊运营或集中接入中心、且承担高专科转诊量的负责人
  secondary: 门诊排班员和转诊协调员
  buyer: 多院区医疗系统的接入业务 VP、门诊 COO 或 CIO
startupThesis:
  nonObviousInsight: 新机会不是泛泛而谈的医院后台 AI，而是入站转诊文档与下游排班之间那层很窄的接诊录入层；医疗系统现在愿意在这里试点 AI，因为任务偏行政、边界清楚，且成效可以被量化。
  beachhead: 美国医疗系统中的集中式专科转诊团队，它们每月接收数千份外部传真转诊，覆盖心脏科、消化科、神经科和骨科等专科
  wedge: 转诊接诊录入控制塔：接入传真和文档，提取必填字段，标记缺失数据，按服务线优先级分流，并把清洗后的病例推入排班或 EMR 工作队列
  whyNowCatalyst: Cleveland Clinic 专门在转诊管理上试点 AI，说明大型医疗系统已经把这一流程视为足够紧迫、也足够安全的部署对象。
  ventureScalePath: 一旦嵌入转诊接诊录入，平台可以顺势扩到事前授权录入、病历调取、影像医嘱、呼叫中心工作流，以及全院级接入中心编排。
solution: 产品是一层转诊接诊录入操作层，连接传真收件箱、共享邮箱、转诊门户和下游 EHR 或排班系统。它用 AI 提取患者、医生、诊断和文档数据，识别转诊类型与目的地，并生成带置信度分数和异常标记的结构化工作项。员工只处理低置信度或资料不完整的病例，常规转诊则带着 SLA 计时器和审计轨迹直接进入正确队列。系统按来源、专科和协调员追踪流失、周转时间和排班转化，把原本黑箱式的行政流程变成可管理的运营仪表盘。时间越久，平台越能沉淀各服务线的路由规则、必备文档和产能约束。
goToMarketSeed:
  firstCustomer: 拥有集中接入中心、至少 20 个专科门诊，并且仍通过传真接收大量外部转诊的整合交付网络
  buyingTrigger: 转诊积压、接入中心转型任务，或暴露出患者流失和排班延迟的专科增长计划
  currentAlternative: EHR 收件箱内的人工协调员流程、BPO 人员、基础 OCR 和脆弱的 RPA 脚本
  switchingReason: 面向单一工作流的控制塔能把现有方案仍留给人工的混乱接诊录入环节自动化，并证明更快周转、更低单笔转诊人工成本，以及更少流失或误路由病例
  pricingHypothesis: 平台费加基于使用量的收费，按月度转诊量或专科门诊席位计费
