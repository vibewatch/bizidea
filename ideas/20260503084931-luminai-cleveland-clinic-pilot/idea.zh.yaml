    signalRefs: [转诊管理仍困在人工与传真里]
    sourceRefs: [1]
  - point: 自动化范围已经足够具体，可以围绕提取、分类和路由交付，而不是停留在模糊的“AI 提效”口号上。
    signalRefs: [非结构化接诊录入已有自动化路径]
    sourceRefs: [1]
  - point: 从一条狭窄工作流起步，让创业公司能先以较现实的落地动作进入医院，再扩到相邻行政界面。
    signalRefs: [窄工作流切口更容易落地]
    sourceRefs: [1]
differentiator: 多数医疗自动化厂商一开始就卖得太宽，不是通用文档 AI，就是 RPA，结果转诊协调员仍要在邮件和 EHR 队列里处理异常。这家公司从一个明确运营瓶颈切入，掌握路由逻辑和完整性校验，并把输出直接绑定到排班结果。由此形成围绕专科转诊规则、异常模式和转化表现的专有反馈回路，横向 OCR 或工作流工具很难复制。
