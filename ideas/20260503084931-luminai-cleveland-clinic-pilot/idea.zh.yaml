differentiator: 多数医疗自动化供应商起步过于宽泛，销售通用文档 AI 或 RPA，结果仍让转诊协调员在邮件和 EHR 队列中处理异常。这家公司从单一运营瓶颈切入，掌握路由逻辑和完整性检查，并将输出直接连接到排班结果。这样便围绕专科特定的转诊规则、异常模式和转化表现形成专有反馈闭环，是横向 OCR 或工作流工具难以复制的。
