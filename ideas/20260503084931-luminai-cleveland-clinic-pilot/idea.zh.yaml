problem: 医院仍通过以传真为主、缺乏结构化的渠道接收专科转诊，迫使员工重复录入数据、追补缺失信息，并手动判断每个病例该流向哪里。这会拉长转诊周转时间、流失患者、让专科产能吃不满，还抬高协调员编制成本。EHR 收件箱和 RPA 工具都解决不了最混乱的接诊录入环节——文件常常不完整、标签错误，或被分到错误队列。
targetUser:
  primary: 美国大型医疗系统中负责转诊运营或集中接入中心的负责人，且专科转诊量很高
  secondary: 门诊排班员和转诊协调员
  buyer: 多院区医疗系统中的接入业务 VP、门诊 COO 或 CIO
startupThesis:
  nonObviousInsight: 新机会不在于泛化的医院后台 AI，而在于入站转诊文档与下游排班之间这层狭窄的接诊录入层；医疗系统现在愿意在这里试点 AI，因为任务偏行政、边界清晰、效果也可量化。
  beachhead: 美国医疗系统中的集中式专科转诊团队，这些团队每月要接收数千份来自外部的传真转诊，覆盖心脏科、消化科、神经科和骨科等专科
  wedge: 一套转诊接诊录入控制塔，可接收传真和文档、提取必填字段、标记缺失数据、按专科服务线确定优先级，并把清洗后的病例推入排班或 EMR 工作队列
  whyNowCatalyst: Cleveland Clinic 已在转诊管理上试点 AI，说明大型医疗系统如今认为这一工作流既足够紧迫，也足够安全，值得部署。
  ventureScalePath: 一旦嵌入转诊接诊录入，平台便可扩展到事前授权录入、病历调取、影像检查医嘱、呼叫中心工作流，以及整个医疗系统的企业级接入中心编排。
solution: 产品是一层转诊接诊录入操作层，位于传真收件箱、共享邮箱、转诊门户与下游 EHR 或排班系统之间。它用 AI 提取患者、医生、诊断和文档数据；识别转诊类型与目标流向；并生成带置信度分数和异常标记的结构化工作项。员工只需复核低置信度或资料不完整的病例，而常规转诊会带着 SLA 计时器和审计轨迹直接流入正确队列。系统还能按来源、专科和协调员衡量流失率、周转时间与排班转化率，把原本黑箱的行政流程变成运营仪表盘。随着时间推移，平台会学会各条服务线的路由规则、必备文档和产能约束。
goToMarketSeed:
  firstCustomer: 拥有集中接入中心、至少 20 个专科门诊，且仍通过传真接收大量外部转诊的整合交付网络
  buyingTrigger: 转诊积压、接入中心转型任务，或暴露出患者流失和排班延迟的专科增长计划
  currentAlternative: EHR 收件箱里的人工协调员流程、BPO 人员、基础 OCR，以及脆弱的 RPA 脚本
  switchingReason: 面向单一工作流的控制塔能把现有厂商仍靠人工处理的混乱接诊录入环节自动化，同时证明更快周转、更低单笔转诊人工成本，以及更少流失或误路由病例
  pricingHypothesis: 平台费加基于使用量的收费，按月度转诊量或专科门诊席位计费
whyNow:
  - point: 大型医疗系统现在已开始验证 AI 进入真实行政工作流，从而降低了新供应商的可信度门槛。
    signalRefs: [企业级买方验证]
    sourceRefs: [1]
  - point: 转诊管理依旧高度依赖人工和传真，因此 ROI 论证立刻成立，运营负责人一看就懂。
    signalRefs: [转诊管理仍高度依赖人工]
    sourceRefs: [1]
  - point: 现在的自动化范围已具体到可以交付，因为试点里明确写出了提取、分类和路由，而不再只是含糊的“AI 提效”说法。
    signalRefs: [非结构化接诊录入可以自动化]
    sourceRefs: [1]
  - point: 从单一狭窄工作流切入，让创业公司更有机会先打进医院，再向相邻行政场景扩张。
    signalRefs: [聚焦单一工作流的切口可信]
    sourceRefs: [1]
differentiator: 大多数医疗自动化厂商一上来做得太宽，卖的是通用文档 AI 或 RPA，结果转诊协调员仍得在邮件和 EHR 队列里做异常处理。这家公司从一个明确的运营瓶颈切入，掌握路由逻辑与完整性校验，并把结果直接连到排班结果上。这样会围绕专科特有的转诊规则、异常模式与转化表现形成专有反馈回路，横向 OCR 或工作流工具很难复制。
