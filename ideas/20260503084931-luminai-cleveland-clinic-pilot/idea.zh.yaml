jobsToBeDone:
- job: 当成千上万份外部转诊以非结构化格式到达时，帮助集中接入团队正确分诊并路由它们，从而在不增加协调员编制的情况下更快为患者安排就诊。
  currentAlternative: 在 EHR 工作队列中人工审核传真并重复录入
  successMetric: 转诊到完成排班的中位时长，以及无需人工触达即可处理的转诊占比
