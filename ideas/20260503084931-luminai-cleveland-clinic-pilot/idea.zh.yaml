topRisks:
  - name: 医院销售周期漫长
    description: 即便切口足够强，也可能卡在安全审查、集成规划或委员会式采购流程里。
    mitigation: 先从集中接入团队中由创新预算支持的试点切入，把 ROI 打包成转诊积压下降，并尽量减少初始集成。
  - name: 患者接诊录入自动化出错
    description: 如果转诊分类错误或资料不完整，可能延误治疗，并让运营负责人迅速失去信任。
    mitigation: 对低置信度病例保留人工复核路径，提供审计轨迹，并先从路由规则清晰的专科开始。
  - name: 现有厂商挤压
    description: 一旦需求被证明，EHR 厂商、BPO 或横向自动化平台可能都会补上类似的转诊功能。
    mitigation: 更快做深专科工作流能力，证明转化率和流失率改善，并在现有厂商跟上之前扩展到相邻接入工作流。
