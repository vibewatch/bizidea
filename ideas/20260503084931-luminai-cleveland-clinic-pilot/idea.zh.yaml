topRisks:
- name: 医院销售周期长
  description: 即便工作流切口很强，也可能在安全审查、集成规划或委员会式采购中停滞。
  mitigation: 从集中接入团队中由创新预算支持的试点开始，围绕减少转诊积压来包装 ROI，并尽量减少初始集成。
- name: 患者接收环节的自动化错误
  description: 分类错误或信息不完整的转诊可能延误护理，并破坏运营负责人对系统的信任。
  mitigation: 为低置信度病例保留人工复核路径，提供审计轨迹，并从路由规则清晰的专科开始。
- name: 现有厂商挤压
  description: 一旦需求被验证，EHR 供应商、BPO 或横向自动化平台可能增加类似的转诊功能。
  mitigation: 更快在专科特定工作流深度上建立优势，证明转化与流失改善效果，并在现有厂商追上前扩展到相邻接入工作流。
