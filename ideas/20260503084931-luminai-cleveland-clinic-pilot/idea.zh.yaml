problem: 医院仍通过高度依赖传真、缺乏结构化的渠道接收专科转诊，迫使员工重复录入数据、追补缺失信息，并手动判断每个病例应流向何处。这会造成转诊周转时间过长、患者流失、专科产能利用不足，以及昂贵的协调员人力成本。EHR 收件箱和 RPA 工具都无法解决最混乱的接收环节：文档不完整、标签错误，或被路由到错误队列。
targetUser:
  primary: 美国大型医疗系统中负责转诊运营或集中接入的大型负责人，所在系统拥有高专科转诊量
  secondary: 门诊排班人员和转诊协调员
  buyer: 多医院医疗系统中的就医入口副总裁、门诊 COO 或 CIO
startupThesis:
  nonObviousInsight: 新的机会并非泛化的医院后台 AI，而是位于转入转诊文档与下游排班之间的狭窄接收层；医疗系统如今愿意试点 AI，是因为这项任务属于行政流程、边界清晰且可衡量。
  beachhead: 美国医疗系统中集中化的专科转诊团队，每月接收数千份来自外部的传真转诊，覆盖心脏科、消化科、神经科和骨科
  wedge: 转诊接收控制塔，可摄取传真和文档、提取必填字段、标记缺失数据、按服务线排序优先级，并将清洗后的病例推送至排班或 EMR 工作队列
  whyNowCatalyst: Cleveland Clinic 专门在转诊管理上试点 AI，说明大型医疗系统如今认为这一工作流既足够紧迫，也足够安全，值得部署。
  ventureScalePath: 一旦嵌入转诊接收环节，平台可扩展到事前授权接收、病历请求、影像检查医嘱、呼叫中心工作流，以及整个医疗系统的企业级接入中心编排。
solution: 该产品是一层转诊接收运营层，位于传真收件箱、共享邮箱、转诊门户与下游 EHR 或排班系统之间。它利用 AI 提取患者、医生、诊断和文档数据；识别转诊类型与目的地；并生成带有置信度评分和异常标记的结构化工作项。员工只需复核低置信度或不完整病例，而常规转诊会直接流入正确队列，并附带 SLA 计时与审计轨迹。系统按来源、专科和协调员衡量流失率、周转时间和排班转化率，把原本黑盒的行政职能转化为运营仪表盘。随着时间推移，平台会学习各服务线的路由规则、必需文档和产能约束。
goToMarketSeed:
  firstCustomer: 拥有集中接入中心、至少 20 个专科门诊且仍通过传真接收大量外部转诊的综合交付网络
  buyingTrigger: 转诊积压、接入中心转型任务，或暴露患者流失与排班延迟问题的专科增长计划
  currentAlternative: EHR 收件篮中的人工协调员流程、BPO 人员、基础 OCR，以及脆弱的 RPA 脚本
  switchingReason: 聚焦工作流的控制塔能够自动化现有厂商仍留给人工处理的混乱接收环节，同时证明更快的周转、更低的单次转诊人力成本，以及更少的病例流失或错路由。
  pricingHypothesis: 平台费加按用量计费，按月度转诊量或专科门诊席位收费
