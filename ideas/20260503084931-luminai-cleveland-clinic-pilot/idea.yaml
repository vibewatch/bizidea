topRisks:
  - name: Long hospital sales cycles
    description: Even a strong workflow wedge can stall in security review, integration planning, or committee-based procurement.
    mitigation: Start with innovation-funded pilots in centralized access teams, package ROI around referral backlog reduction, and minimize initial integrations.
  - name: Automation errors on patient intake
    description: Misclassified or incomplete referrals could delay care and destroy trust with operations leaders.
    mitigation: Keep a human-in-the-loop review path for low-confidence cases, provide audit trails, and begin with specialties that have clear routing rules.
  - name: Incumbent squeeze
    description: EHR vendors, BPOs, or horizontal automation platforms may add similar referral features once demand is proven.
    mitigation: Move faster on specialty-specific workflow depth, prove conversion and leakage outcomes, and expand into adjacent access workflows before incumbents catch up.
