problem: Hospitals still receive specialty referrals through fax-heavy, unstructured channels that force staff to re-key data, chase missing information, and manually decide where each case goes. That creates long referral turnaround times, lost patients, underfilled specialty capacity, and expensive coordinator headcount. EHR inboxes and RPA tools do not solve the messy intake step where documents are incomplete, mislabeled, or routed to the wrong queue.
targetUser:
  primary: Director of referral operations or centralized access at a large U.S. health system with high specialty referral volume
  secondary: Clinic schedulers and referral coordinators
  buyer: VP of Access, ambulatory COO, or CIO at a multi-hospital health system
startupThesis:
  nonObviousInsight: The new opportunity is not generic hospital back-office AI; it is the narrow intake layer between inbound referral documents and downstream scheduling, where health systems are now willing to pilot AI because the task is administrative, bounded, and measurable.
  beachhead: Centralized specialty-referral teams at U.S. health systems receiving thousands of external fax referrals per month for cardiology, gastroenterology, neurology, and orthopedics
  wedge: Referral intake control tower that ingests faxes and documents, extracts required fields, flags missing data, prioritizes by service line, and pushes clean cases into scheduling or EMR work queues
  whyNowCatalyst: Cleveland Clinic piloting AI specifically on referral management shows that major systems now view this workflow as urgent enough and safe enough for deployment.
  ventureScalePath: Once embedded in referral intake, the platform can expand into prior authorization intake, records requests, imaging orders, call-center workflows, and enterprise access-center orchestration across the health system.
solution: The product is a referral-intake operating layer that sits between fax inboxes, shared mailboxes, referral portals, and downstream EHR or scheduling systems. It uses AI to extract patient, provider, diagnosis, and document data; classify referral type and destination; and create structured work items with confidence scores and exception flags. Staff only review low-confidence or incomplete cases, while routine referrals flow straight into the right queue with an SLA clock and audit trail. The system measures leakage, turnaround time, and schedule conversion by source, specialty, and coordinator, turning a black-box admin function into an operational dashboard. Over time, the platform learns each service line's routing rules, required documentation, and capacity constraints.
goToMarketSeed:
  firstCustomer: Integrated delivery networks with centralized access centers and at least 20 specialty clinics that still receive high external referral volume by fax
  buyingTrigger: Referral backlogs, access-center transformation mandates, or specialty growth initiatives that expose lost patients and delayed scheduling
  currentAlternative: Manual coordinator workflows inside EHR in-baskets, BPO staff, basic OCR, and brittle RPA scripts
  switchingReason: A workflow-specific control tower can automate the messy intake step incumbents leave manual while proving faster turnaround, lower labor per referral, and fewer lost or misrouted cases
  pricingHypothesis: Platform fee plus usage-based pricing tied to monthly referral volume or specialty-clinic seats
