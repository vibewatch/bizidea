slug: copilot-mcp-credential-broker
date: '2026-06-17'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-17] 模型从这份商业计划日期之后的下一个月启动。'
- id: A2
  name: M1 期初现金
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP fundingAsk runwayMonths] 取声明的 pre-seed 区间中部附近，既覆盖 18 个月验证计划，也多留 6 个月缓冲。'
- id: A3
  name: 期初活跃付费账户数
  value: '0'
  unit: 个
  source: '[BP milestones 0–12 months] 公司起步时没有收入，得先拿下付费共创客户。'
- id: A4
  name: 活跃付费账户定义
  value: 处于付费部署或生产订阅中的一个客户
  unit: 定义
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] customersEop 统计的是首个商业化周期里，已经付费部署或进入生产订阅的客户。'
- id: A5
  name: 部署费
  value: 前 3 个月共 $45K
  unit: 美元/账户
  source: '[BP investorMemo.firstCustomer.initialContract $25K-$50K] 模型取区间高位，因为首条工作流部署包含连接器加固和策略包搭建。'
- id: A6
  name: 上线窗口
  value: 从付费部署到生产订阅需要 3 个月
  unit: 月
  source: '[BP product.twelveMonth + BP strategicChoices.sequencingRationale] 这和首条工作流在启动后 30 天内进入受保护上线、再叠加配置与评审时间的节奏一致。'
- id: A7
  name: 首条工作流经常性订阅
  value: $90K/year (~$7.5K/month)
  unit: 美元/账户/年
  source: '[BP investorMemo.firstCustomer.initialContract $60K-$100K annual subscription] 对一条安全关键的生产工作流，模型取区间偏上中位。'
- id: A8
  name: 首次续约后的扩展经常性价值
  value: $120K/year (~$10K/month)
  unit: 美元/账户/年
  source: '[BP mustBeTrue expansion + BP businessModel.expansionLevers + Research market.som] 假设顺利的客户会加更多端点或第二条工作流，使价值高于初始订阅。'
- id: A9
  name: 新增客户节奏
  value: Y1 4 个付费客户、Y2 6 个、Y3 26 个，Q4Y3 累计 36 个
  unit: 起步节奏
  source: '[BP milestones + BP experimentRoadmap + operator judgment] 这和 Y1 3–5 个共创客户、Y2 6–10 个生产客户，以及 Y3 在伙伴带动下提速的节奏一致。'
- id: A10
  name: 流失假设
  value: 36 个月 P&L 不显式建模客户流失；单位经济模型采用 1.2% 的月度稳态流失率
  unit: 建模约定
  source: '[startup-finance heuristic + BP risks] 模型假设早期 客户群 至少会留到首个合同周期结束；真正的续约风险放在敏感性和单位经济模型里体现。'
- id: A11
  name: 各收入类型毛利率
  value: 部署费 60%，首条工作流经常性订阅 77%，扩展经常性订阅 80%
  unit: 收入占比
  source: '[BP businessModel.targetGrossMarginPct + BP operatingAssumptions] 这反映出早期上线仍带服务成分，但随着模板标准化，毛利率会逐步高于 70% 目标。'
- id: A12
  name: 创始人 / GTM 全负担薪酬
  value: $170K
  unit: 美元/年
  source: '[BP team CEO / GTM founder] 采用偏克制的创始人薪酬，并计入薪资税与福利。'
- id: A13
  name: 核心工程全负担薪酬
  value: $180K/FTE
  unit: 美元/FTE/年
  source: '[BP team Founding eng + Identity and platform engineer] 这是高级安全与平台工程人才的混合现金全负担水平。'
- id: A14
  name: 产品工程全负担薪酬
  value: $165K/FTE
  unit: 美元/FTE/年
  source: '[startup-finance heuristic] 对追加的创业公司产品工程师，模型采用精简但市场上站得住的全负担薪酬。'
- id: A15
  name: 解决方案架构师全负担薪酬
  value: $165K
  unit: 美元/年
  source: '[BP team Solutions architect] 面向客户的一线部署人才，全负担薪酬已计入 payroll load。'
- id: A16
  name: 合作 / 销售全负担薪酬
  value: $165K/FTE
  unit: 美元/FTE/年
  source: '[BP team Partnerships lead + BP gtm.channels] 在没有大额 OTE 计划之前，模型采用偏精简的企业销售与渠道承载成本。'
- id: A17
  name: 客户成功全负担薪酬
  value: $145K
  unit: 美元/年
  source: '[BP experimentRoadmap second-workflow expansion] 一旦首批 10 个客户上线，需要 1 名售后运营岗位来承接上线承接和扩张。'
- id: A18
  name: 综合行政 / 运营全负担薪酬
  value: $125K
  unit: 美元/年
  source: '[BP operations] 用于支撑精简的财务、法务和供应商管理。'
- id: A19
  name: 招聘时间表
  value: M1 创始人 + 2 名技术；M4 解决方案；M8 产品工程师；M10 合作；M13 销售；M15 产品工程师；M18 客户成功；M21 运营；M27 销售；M30 产品工程师
  unit: 时间表
  source: '[BP team + BP strategicChoices.sequencingRationale] 前 5 个岗位和计划一致，后续招聘则等到部署可复制的证据跑出来后再开。'
- id: A20
  name: 销售与市场非工资支出
  value: M1-3 每月 $5K，M4-6 每月 $6K，M7-9 每月 $8K，M10-12 每月 $10K，之后到 Q4Y3 逐步升到每月 $26K
  unit: 美元/月
  source: '[BP gtm.channels] 这是一套创始人外呼、伙伴差旅、研讨会和轻量企业 GTM 工具的经验值，不包含大规模付费获客。'
- id: A21
  name: 研发非工资支出
  value: M1-3 每月 $7K，之后逐步升到 Q4Y3 每月 $18K
  unit: 美元/月
  source: '[BP product + BP operations] 这部分主要覆盖云资源、日志、安全测试和连接器基础设施。'
- id: A22
  name: 综合行政非工资支出
  value: M1-3 每月 $4K，之后逐步升到 Q4Y3 每月 $15K
  unit: 美元/月
  source: '[BP operations] 这是一套法务、会计、保险和行政工具的经验值。'
- id: A23
  name: 工资在 P&L 里的分摊
  value: 创始人、解决方案、合作、销售和客户成功记入 S&M；工程记入 R&D；运营记入 G&A
  unit: 分摊
  source: '[BP team rationales] 把每个岗位映射到 P&L 的具体运营科目里。'
- id: A24
  name: CAC 计算规则
  value: $66.7K = Y2-Y3 S&M 支出 / 32 个建模新增付费客户
  unit: 美元/新增客户
  source: '[BP gtm.funnelTargets + model calc] 模型按企业直销加伙伴带单的动作来算，不是假设纯自助式 SaaS。'
- id: A25
  name: 现金转换假设
  value: 现金变动等于 EBITDA
  unit: 建模约定
  source: '[startup-finance heuristic] 假设在 pre-seed 规模下，税项、资本开支、债务服务和营运资金波动都不构成主要影响。'
- id: A26
  name: 融资需求规模
  value: $3.0M pre-seed
  unit: USD
  source: '[BP fundingAsk round + targetFundingRangeUsd + model cash trough] 这笔钱既要覆盖 18 个月的共创客户和生产转化计划，也要保留大约 6 个月缓冲。'
