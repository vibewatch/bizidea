scenarios:
  downside:
    description: 如果 Microsoft 原生控制拉长了评审周期、Y3 新增客户明显变慢，而且客户价值停留在首条工作流附近，下行情景就会出现。
    y3RevenueK: 1993.2
    y3EbitdaK: -1059.1
    cashLowPointK: -189.2
    keyAssumptionChanges:
    - Y3 新增客户从基准情景的 26 个降到 16 个，因为原生替代方案和安全评审摩擦拖慢启动。
    - 首条工作流经常性价值从 $90K 降到 $84K，扩展经常性价值从 $120K 降到约 $110K。
    - 部署和支持仍偏服务化，使毛利率比基准情景再低约 100–200 bps。
  base:
    description: 4 个 Y1 付费部署在 Q4Y2 长成 10 个付费客户，到 Q4Y3 长成 36 个；第 3 年大部分价值来自生产订阅和第二条工作流扩张。
    y3RevenueK: 2777.5
    y3EbitdaK: -504.4
    cashLowPointK: 364.5
    keyAssumptionChanges:
    - Y1 落地 4 个付费部署，Y2 以 10 个付费客户收尾，Y3 年末达到 36 个付费客户。
    - 每个客户先经历一笔 $45K 部署费，再转成 $90K 的经常性订阅，并在首次续约后向 $120K 扩。
    - 到 Q4Y3 团队只扩到 12 个 FTE，因此收入增长更多来自伙伴带单和老客户扩张，而不是一支庞大的地面销售团队。
  upside:
    description: 如果伙伴转介绍更早出现、上线落地手册缩短审批，而扩张模块又把经常性价值推高到基准之上，就会走到上行情景。
    y3RevenueK: 3650.0
    y3EbitdaK: 169.4
    cashLowPointK: 868.8
    keyAssumptionChanges:
    - 伙伴带动让 Y2 做到 11 个付费客户，Y3 新增 33 个，年末累计达到 44 个。
    - 随着审批和事件回放模块更早挂上，首条工作流经常性价值升到约 $96K，扩展价值升到约 $126K。
    - 标准化上线落地手册降低了交付负担，因此毛利率大约改善 200 bps，而无需更大的团队。
sensitivity:
- variable: ARPU
  downsideCase: 如果买家不接受多端点定价，首条工作流 ACV 会落到 $84K，扩展 ACV 约 $110K。
  baseCase: 基准情景假设首条工作流 ACV 为 $90K，首次续约后扩展 ACV 约 $120K。
  upsideCase: 如果审批和事件回放模块更早挂上，首条工作流 ACV 可到 $96K，扩展 ACV 约 $126K。
  y3RevenueImpactK: -160.8
  cashImpactK: -132.5
- variable: CAC
  downsideCase: 如果伙伴带来的商机储备下滑、Y3 新增从 26 个掉到约 20 个，CAC 会逼近 $80K。
  baseCase: 基准情景里的 CAC 约为 $66.7K，即 Y2-Y3 的 S&M 支出除以 32 个建模新增付费客户。
  upsideCase: 如果 Microsoft 和 ServiceNow 伙伴能送来首会，而 Y3 新增靠近 29 个，CAC 会往高 $50Ks 走。
  y3RevenueImpactK: -727.5
  cashImpactK: -412.2
- variable: churn
  downsideCase: 如果这层代理始终只停留在一条工作流工具上，到 Y3 可能会有约 5 个早期续约没做成。
  baseCase: 36 个月 P&L 假设在 Y4 之前没有显式 logo 流失，但单位经济模型里仍用 1.2% 的稳态月流失率做压力测试。
  upsideCase: 账户在第一次续约决策到来前，就保住了首条工作流并扩到第二个端点。
  y3RevenueImpactK: -250.0
  cashImpactK: -133.5
- variable: sales cycle
  downsideCase: 如果安全评审、日志和私有部署问题把 Y1 之后的大多数启动都往后推约两个月，下行情景就会成真。
  baseCase: 模型假设以 ServiceNow 为中心的上线，从研讨会到付费部署大体接近 6 个月企业销售周期。
  upsideCase: 如果预置策略包和伙伴落地手册起效，Y1 之后的大多数启动可以整体提前约 1 个月。
  y3RevenueImpactK: -447.5
  cashImpactK: -377.9
- variable: gross margin
  downsideCase: 如果部署和支持工作一直很重，Y3 毛利率会卡在 68–69%，而不是走到低 70s。
  baseCase: 基准情景假设 Y3 加权毛利率约 71%，稳态经常性毛利率约 75%。
  upsideCase: 如果部署标准化、支持负担下降，Y3 毛利率可进到 73–74% 区间。
  y3RevenueImpactK: 0.0
  cashImpactK: -95.7
- variable: hiring pace
  downsideCase: 如果在客户节奏还没被证明前，就把 2 个 GTM 岗位和第 3 名产品工程师提前招进来，现金会更吃紧。
  baseCase: 招聘节奏遵循 business-plan.yaml 里“产品优先、伙伴第二”的顺序。
  upsideCase: 如果 10 个客户的验证点提前出现，Y2 末和 Y3 的招聘都可以往后放。
  y3RevenueImpactK: 0.0
  cashImpactK: -231.4
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads[Security review workshops] --> PaidDeployments[Paid deployments]
      PaidDeployments --> ProductionSubs[Production subscriptions]
      ProductionSubs --> Expansion[More endpoints or second workflows]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入增长，来自 Q4Y2 的 10 个付费客户到 Q4Y3 的 36 个，同时成熟客户群会从 $45K 部署费爬到 $90K–$120K 的经常性合同。
- checkName: 必须跑顺的点
  finding: 到 Y2，伙伴动作必须真的起量；否则公司很难在只配 3 名专职 GTM 的情况下，于 Y3 再新增 26 个客户。
- checkName: 模型会崩在
  finding: 如果销售周期多拖约 2 个月，或早期续约没能扩张，下行情景会在公司拿到 seed-ready 证明点之前把现金打到零以下。
- checkName: 下一轮证明点
  finding: 最容易开启下一轮融资的时刻，是公司做到 8–10 个生产客户、30 天部署，以及能支撑 $120K 扩展 ACV 的第二条工作流扩张。
sanityChecks:
  ruleOf40: Y3 增长率 218.3% + EBITDA 利润率 -18.2% = 200.1%（Y2 基数太小，数值被明显放大）。
  burnMultiple: Y3 的 burn multiple 约 0.2x（$504.9K burn / 约 $2.8M 净新增 ARR，稳态 ACV 取 $108K）；真正考验资本效率的是 Y2。
  revenuePerFte: 按 Q4Y3 的 12 名员工算，Y3 每个 FTE 约对应 $231K 收入，落在 SaaS 常见的 $200K–$400K 区间内。
  flags:
  - 基准情景下，Y3 年末只有 36 个付费客户，所以它依赖的是更高的端点密度和第二条工作流扩张，而不是字面上对齐 research.yaml 里 60 个客户的 SOM 速记。
  - P&L 在 Y4 之前没有显式建模客户流失，这对一家年轻的企业安全产品来说偏乐观，因此流失率和销售周期敏感性很关键。
  - Y3 仍然是 EBITDA 亏损，因此 seed 轮能不能顺利打开，更依赖可复制的部署速度和伙伴带单，而不是利润率。
  - 如果 Microsoft 原生控制补缺口的速度快于预期，模型很可能会同时打偏 ARPU 和毛利率两条核心假设。
