assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-17] model starts the month after the dated business plan.'
- id: A2
  name: Opening cash at M1
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP fundingAsk runwayMonths] placed near the middle of the stated pre-seed range to fund the 18-month proof plan plus a six-month buffer.'
- id: A3
  name: Starting active paying accounts
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] the company begins pre-revenue and must first close paid design partners.'
- id: A4
  name: Active paying account definition
  value: A logo under paid deployment or production subscription
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] customersEop tracks paid logos across the first commercial lifecycle.'
- id: A5
  name: Deployment fee
  value: $45K over the first 3 months
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract $25K-$50K] modeled at the top end because the first workflow includes connector hardening and policy-pack setup.'
- id: A6
  name: Go-live window
  value: 3 months from paid deployment to production subscription
  unit: months
  source: '[BP product.twelveMonth + BP strategicChoices.sequencingRationale] aligns the first workflow with a sub-30-day protected go-live after kickoff plus setup and review time.'
- id: A7
  name: First-workflow recurring subscription
  value: $90K/year (~$7.5K/month)
  unit: USD/account/year
  source: '[BP investorMemo.firstCustomer.initialContract $60K-$100K annual subscription] uses the upper-middle of the stated range for a security-critical production workflow.'
- id: A8
  name: Expanded recurring value after first renewal
  value: $120K/year (~$10K/month)
  unit: USD/account/year
  source: '[BP mustBeTrue expansion + BP businessModel.expansionLevers + Research market.som] assumes successful accounts add more endpoints or a second workflow, lifting value above the initial subscription.'
- id: A9
  name: New logo cadence
  value: 4 paid logos in Y1, 6 in Y2, and 26 in Y3 for 36 total by Q4Y3
  unit: start pattern
  source: '[BP milestones + BP experimentRoadmap + operator judgment] matches 3-5 design partners in Y1, 6-10 production logos by Y2, and a partner-assisted Y3 ramp.'
- id: A10
  name: Churn convention
  value: No explicit logo churn in the 36-month P&L; unit economics use 1.2% monthly steady-state churn
  unit: modeling convention
  source: '[startup-finance heuristic + BP risks] early cohorts are assumed to stay through the first contract cycle, but renewal risk is carried in sensitivity and unit economics.'
- id: A11
  name: Gross margin by revenue type
  value: 60% on deployment, 77% on first-workflow recurring, 80% on expanded recurring
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct + BP operatingAssumptions] reflects a services-assisted launch that trends above the 70% target as templates standardize.'
- id: A12
  name: Founder / GTM loaded compensation
  value: $170K
  unit: USD/year
  source: '[BP team CEO / GTM founder] modest founder salary plus payroll taxes and benefits.'
- id: A13
  name: Core engineering loaded compensation
  value: $180K/FTE
  unit: USD/year
  source: '[BP team Founding eng + Identity and platform engineer] blended loaded cash comp for senior security and platform engineering talent.'
- id: A14
  name: Product engineering loaded compensation
  value: $165K/FTE
  unit: USD/year
  source: '[startup-finance heuristic] lean but market-credible loaded pay for additional startup product engineers.'
- id: A15
  name: Solutions architect loaded compensation
  value: $165K
  unit: USD/year
  source: '[BP team Solutions architect] customer-facing deployment talent with payroll load.'
- id: A16
  name: Partnerships / sales loaded compensation
  value: $165K/FTE
  unit: USD/year
  source: '[BP team Partnerships lead + BP gtm.channels] lean enterprise seller and channel-carrying cost before large OTE plans.'
- id: A17
  name: Customer success loaded compensation
  value: $145K
  unit: USD/year
  source: '[BP experimentRoadmap second-workflow expansion] one post-sale operator supports onboarding and expansion once the first 10 logos are live.'
- id: A18
  name: G&A / ops loaded compensation
  value: $125K
  unit: USD/year
  source: '[BP operations] lean finance, legal, and vendor-management support.'
- id: A19
  name: Hiring timeline
  value: M1 founder + 2 technical, M4 solutions, M8 product engineer, M10 partnerships, M13 sales, M15 product engineer, M18 customer success, M21 ops, M27 sales, M30 product engineer
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale] the first five roles match the plan and later hires wait for repeatable deployment proof.'
- id: A20
  name: Non-payroll sales & marketing spend
  value: $5K/mo M1-3, $6K/mo M4-6, $8K/mo M7-9, $10K/mo M10-12, then steps to $26K/mo by Q4Y3
  unit: USD/month
  source: '[BP gtm.channels] heuristic for founder outbound, partner travel, workshops, and light enterprise GTM tooling without paid demand gen at scale.'
- id: A21
  name: Non-payroll R&D spend
  value: $7K/mo M1-3, then steps gradually to $18K/mo by Q4Y3
  unit: USD/month
  source: '[BP product + BP operations] heuristic for cloud, logging, security testing, and connector infrastructure.'
- id: A22
  name: Non-payroll G&A spend
  value: $4K/mo M1-3, then steps gradually to $15K/mo by Q4Y3
  unit: USD/month
  source: '[BP operations] heuristic for legal, accounting, insurance, and admin tooling.'
- id: A23
  name: Payroll allocation to P&L lines
  value: Founder, solutions, partnerships, sales, and customer success to S&M; engineering to R&D; ops to G&A
  unit: allocation
  source: '[BP team rationales] maps each role into the operating lines used in the P&L.'
- id: A24
  name: CAC calculation convention
  value: $66.7K = Y2-Y3 S&M spend / 32 modeled new paying logos
  unit: USD/new logo
  source: '[BP gtm.funnelTargets + model calc] uses the modeled direct and partner-assisted enterprise motion rather than a pure self-serve SaaS assumption.'
- id: A25
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] assumes taxes, capex, debt service, and working-capital swings are immaterial at pre-seed scale.'
- id: A26
  name: Funding ask sizing
  value: $3.0M pre-seed
  unit: USD
  source: '[BP fundingAsk round + targetFundingRangeUsd + model cash trough] funds the 18-month design-partner and production-conversion plan while preserving roughly six months of buffer.'
