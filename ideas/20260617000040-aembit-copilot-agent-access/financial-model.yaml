scenarios:
  downside:
    description: Native Microsoft controls lengthen reviews, Y3 logo adds slow materially, and customers stay closer to first-workflow pricing.
    y3RevenueK: 1993.2
    y3EbitdaK: -1059.1
    cashLowPointK: -189.2
    keyAssumptionChanges:
    - Y3 gross new logos fall from 26 in the base case to 16 because native alternatives and security-review friction slow starts.
    - First-workflow recurring value slips from $90K to $84K and expanded recurring value from $120K to about $110K.
    - Deployment and support stay more services-heavy, keeping gross margins about 100-200 bps below the base case.
  base:
    description: Four Y1 paid deployments grow into 10 paying logos by Q4Y2 and 36 by Q4Y3, with most year-3 value coming from production subscriptions and second-workflow expansion.
    y3RevenueK: 2777.5
    y3EbitdaK: -504.4
    cashLowPointK: 364.5
    keyAssumptionChanges:
    - Y1 lands 4 paid deployments, Y2 ends with 10 paying logos, and Y3 exits with 36 paying logos.
    - Each logo starts with a $45K deployment, converts into a $90K recurring subscription, and expands toward $120K after the first renewal.
    - Headcount stays lean at 12 FTE by Q4Y3, so revenue growth comes more from partner-assisted selling and expansion than from a large field team.
  upside:
    description: Partner referrals arrive earlier, the rollout playbook shortens approvals, and expansion lift pushes recurring value above the base case.
    y3RevenueK: 3650.0
    y3EbitdaK: 169.4
    cashLowPointK: 868.8
    keyAssumptionChanges:
    - Partner-assisted demand pulls Y2 to 11 paying logos and Y3 gross adds to 33 logos, exiting the year with 44 total.
    - First-workflow recurring value rises to about $96K and expanded recurring value to about $126K as approval and replay modules attach sooner.
    - Gross margin improves roughly 200 bps because the rollout playbook reduces delivery load without requiring a larger team.
sensitivity:
- variable: ARPU
  downsideCase: $84K first-workflow ACV and about $110K expanded ACV if buyers resist multi-endpoint pricing.
  baseCase: $90K first-workflow ACV and about $120K expanded ACV after the first renewal.
  upsideCase: $96K first-workflow ACV and about $126K expanded ACV when approvals and replay modules attach early.
  y3RevenueImpactK: -160.8
  cashImpactK: -132.5
- variable: CAC
  downsideCase: CAC pushes toward $80K as partner-sourced pipeline slips and Y3 gross adds fall from 26 to about 20 logos.
  baseCase: CAC is about $66.7K using Y2-Y3 S&M spend divided by 32 modeled new paying logos.
  upsideCase: CAC trends toward the high-$50Ks if Microsoft and ServiceNow partners source the first meeting and Y3 gross adds move toward 29 logos.
  y3RevenueImpactK: -727.5
  cashImpactK: -412.2
- variable: churn
  downsideCase: Roughly five early renewals fail by Y3 because the broker remains a one-workflow tool instead of expanding with the account.
  baseCase: The 36-month P&L assumes no explicit logo loss before Y4, while unit economics use a 1.2% steady-state monthly churn stress test.
  upsideCase: Accounts retain the first workflow and expand into second endpoints before the first renewal decision arrives.
  y3RevenueImpactK: -250.0
  cashImpactK: -133.5
- variable: sales cycle
  downsideCase: Security review, logging, and private-deployment questions push most post-Y1 starts back about two months.
  baseCase: The model assumes the ServiceNow-centered rollout stays close to a six-month enterprise cycle from workshop to paid deployment.
  upsideCase: Prebuilt policy packs and partner playbooks pull most post-Y1 starts forward about one month.
  y3RevenueImpactK: -447.5
  cashImpactK: -377.9
- variable: gross margin
  downsideCase: Deployment and support work keep margins near 68-69% in Y3 instead of reaching the low 70s.
  baseCase: Y3 weighted gross margin is about 71% and steady-state recurring margin is modeled at 75%.
  upsideCase: Standardized deployment and lower support load move Y3 gross margin into the 73-74% range.
  y3RevenueImpactK: 0.0
  cashImpactK: -95.7
- variable: hiring pace
  downsideCase: Two GTM hires and the third product engineer are pulled forward before the logo ramp is proven.
  baseCase: Hiring follows the product-first, partner-second sequence in business-plan.yaml.
  upsideCase: Late-Y2 and Y3 hires wait until after the 10-logo proof point is already visible.
  y3RevenueImpactK: 0.0
  cashImpactK: -231.4
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Security review workshops] --> PaidDeployments[Paid deployments]
      PaidDeployments --> ProductionSubs[Production subscriptions]
      ProductionSubs --> Expansion[More endpoints or second workflows]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from moving from 10 paying logos at Q4Y2 to 36 at Q4Y3 while mature cohorts step from $45K deployments into $90K-$120K recurring contracts.
- checkName: Must go right
  finding: The partner motion has to become real by Y2 so the company can add 26 new logos in Y3 without carrying more than three dedicated GTM heads.
- checkName: Model breaks if
  finding: If sales cycles slip by roughly two months or early renewals fail to expand, the downside case pushes cash below zero before the company earns a seed-ready proof point.
- checkName: Next-round proof
  finding: The next financing is easiest once the company shows 8-10 production logos, 30-day deployments, and visible second-workflow expansion that supports the $120K expanded ACV.
sanityChecks:
  ruleOf40: Y3 growth 218.3% + EBITDA margin -18.2% = 200.1% (inflated by the small Y2 base).
  burnMultiple: Y3 burn multiple is about 0.2x (($504.9K burn) / ~$2.8M net new ARR at a $108K steady-state ACV); Y2 is the real capital-efficiency proving year.
  revenuePerFte: About $231K Y3 using Q4Y3 headcount of 12 (inside the typical $200–400K SaaS range).
  flags:
  - The base case exits Y3 with 36 paying logos, so it relies on higher endpoint density and second-workflow expansion rather than literally matching the 60-logo SOM shorthand in research.yaml.
  - The P&L carries no explicit logo churn before Y4, which is optimistic for a young enterprise-security product and is why the churn and sales-cycle sensitivities matter.
  - Y3 is still EBITDA-negative, so the seed round depends on repeatable deployment speed and partner-sourced pipeline more than on profitability.
  - If Microsoft-native controls close the gap faster than expected, the model would likely miss both ARPU and gross-margin assumptions at the same time.
