differentiator: 大多数相邻产品要么从身份迁移、数据治理切入，要么等智能体已经拿到访问权后再做事后监控。这家公司卡在 MCP/API 动作的实时发凭证路径上，因此既能给买家一个更快的部署切口，也能沉淀一套专有数据：哪些策略放行、哪些动作被拒、运行时到底怎么用。它不是去替换现有 IAM，而是把自己长成生产环境里“智能体如何拿到访问权”的记录系统。
