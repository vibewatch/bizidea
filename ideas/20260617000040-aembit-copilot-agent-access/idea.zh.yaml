problem: Copilot Studio 让企业团队很容易把能调用 MCP 服务器、内部 API 和 SaaS 系统的智能体推出来，但这些动作大多还在靠静态密钥或宽权限服务主体跑。这样一来，安全团队既证明不了每份凭证到底对应哪项任务，也没法把智能体锁进一条获批的动作路径；真要撤掉高风险访问，又会把整条工作流一起打断。现有 IAM、密钥库和 PAM 栈懂人、也懂应用，却不懂那些会在运行时动态选工具的智能体。
targetUser:
  primary: 在财富 500 强制造业、分销或商业服务企业里，负责身份工程或 AI 平台安全的总监级负责人；这些企业正把 Copilot Studio 运营型智能体接到 SAP、ServiceNow 和内部 API 上。
  secondary: 负责 Copilot Studio 连接器、MCP 服务器和生产上线审批的 Microsoft 平台负责人或企业架构师。
  buyer: CISO 或安全工程副总裁
startupThesis:
  nonObviousInsight: 智能体安全里第一笔能长期立住的预算，不会再给一个泛化治理仪表盘。真正先花钱的，是夹在 Copilot Studio 与 MCP/API 工具之间的运行时凭证层——因为部署已经很容易，发凭证这件事却还把智能体当成一个访问固定的静态应用。
  beachhead: 以 Microsoft 为核心的财富 500 强企业，正上线 Copilot Studio 的采购、服务运营或财务例外处理智能体；这些智能体会经由 MCP 服务器调用 SAP、ServiceNow 和自研内部 API。
  wedge: 一层可插拔代理：把每次 MCP 或 API 工具调用都包进任务级策略里，只为这一个动作发一张短时凭证，写上“智能体 + 用户”的身份上下文，再留下可审计的决策日志。
  whyNowCatalyst: Aembit 的发布说明，面向 Copilot Studio 的短时、可审计凭证已经不是概念；而 MCP 又刚好把智能体触达企业系统的门槛降到了最低。
  ventureScalePath: 先拿下 Copilot Studio 的动作代理，再往跨运行时凭证发放、智能体审批流、第三方智能体信任，以及整个企业软件里的非人访问控制平面扩。
solution: 产品夹在 Copilot Studio 与智能体要用的 MCP 服务器、SaaS 连接器和内部 API 之间。每次工具调用时，它都会按智能体、用户、任务、目标系统和申请动作去跑策略判断，然后要么铸发一张短时凭证，要么直接拦截。安全团队能在一条证据链里看清：是谁申请了访问、为什么放行、碰了哪个系统、凭证又在什么时候过期。首版先给高价值运营工作流配上带约束的护栏——比如供应商入驻、工单升级、财务例外处理；这些场景里，买家本来就最怕过度授权的服务账号。
goToMarketSeed:
  firstCustomer: 一家财富 500 强制造或分销企业，内部有 Microsoft AI 卓越中心，正上线一条 Copilot Studio 采购例外处理智能体；它通过自定义 MCP 服务器读取 SAP 里的供应商数据，并在 ServiceNow 里开单或更新工单。
  buyingTrigger: 试点从只读回答，开始转向跨 SAP 或 ServiceNow 的执行型工作流，随之触发生产安全评审或审计例外处理流程。
  currentAlternative: 共享的 Azure 服务主体、放在 Azure Key Vault 里的密钥、自研中间件，以及由身份团队用表格维护的访问评审。
  switchingReason: 这层代理让团队不必重写每个连接器也能批准上线：每次工具调用都会拿到任务级凭证、集中化策略校验和可回放的审计记录，而不是再多塞一份常驻密钥。
  pricingHypothesis: 平台年费按受保护的智能体工作流数量和纳入治理的工具端点收费，首个 SAP 或 ServiceNow 上线再叠加实施收入。
whyNow:
- point: 面向 Copilot Studio 智能体的运行时短时凭证，已经是现成可部署的产品；这让“代理式访问”从未来架构设想，变成了当下就能开工的品类。
