  - SAP 和 ServiceNow 实施伙伴。
  costStructure:
  - 集成与安全工程。
  - 解决方案架构师和企业支持。
  - 企业销售，以及用于策略评估和日志记录的云基础设施。
jobsToBeDone:
- job: 当 Copilot Studio 运营型智能体准备经由 MCP 服务器拿到 SAP 或 ServiceNow 的写权限时，帮助身份团队只为这项任务发出最小凭证，这样他们就能批准上线，不必再加一份常驻密钥。
  currentAlternative: 共享服务主体和手工密钥评审
  successMetric: 从安全评审到生产批准的天数
- job: 当审计或事故响应追问“为什么这个智能体碰了企业系统”时，帮助 AI 安全团队把当时的访问决策完整回放出来，这样他们就不用手工拼日志也能证明策略合规。
  currentAlternative: 密钥库日志、应用日志和基于表格的访问证明
  successMetric: 解释或撤销一次智能体动作的平均耗时
