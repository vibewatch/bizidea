topRisks:
- name: Microsoft 功能补位
  description: Microsoft 可能会在 Copilot Studio 里原生补上短时凭证代理或更深的策略控制。
  mitigation: 靠跨系统的 MCP 覆盖、更快的 SAP 与 ServiceNow 集成，以及超出 Microsoft 原生边界的审计工作流取胜。
- name: 集成蔓延
  description: 企业早期部署可能需要太多定制 MCP 和内部 API 集成，结果反而不够轻。
  mitigation: 先死磕一套经过取舍的组合——Copilot Studio + SAP 或 ServiceNow + 标准 MCP 网关——把首个 30 天上线包做出来。
- name: 预算早于痛感
  description: 还停留在只读 Copilot 助手阶段的买家，可能要等智能体真的在生产系统里动手后才肯花钱。
  mitigation: 直接卖进那些已经被写权限、审计例外项或事故可见性卡住的上线关口，让问题先成为高管名下的明确事项。
