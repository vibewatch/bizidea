competitors:
- name: Aembit
  stage: 成长期
  wedge: 面向 agentic AI 与工作负载的运行时 IAM，主打混合身份、MCP 身份网关和短时凭证。
  pricing: Starter 免费；Teams 每个智能体每月 $20、每个工作负载每月 $20；Enterprise 定制报价。
  strength: 和拟议切口的产品市场契合度最高，而且已经接入 Copilot Studio。
  weaknessVsUs: 它的平台叙事更宽，反而给了更强主观取舍的 Copilot Studio + SAP / ServiceNow 上线包，以及更深工作流审计证据留下空间。
  sourceRefs:
  - 1
  - 25
- name: Astrix Security
  stage: 成长期
  wedge: AI 智能体发现、可见性，以及内建安全的配置 / 控制平面。
  pricing: 企业定制报价。
  strength: 围绕 AI 智能体与 NHI 的发现和策略治理叙事很强。
  weaknessVsUs: 它更偏发现和控制平面，不像在实时 MCP / API 访问点做逐次短时凭证发放那样贴近调用路径。
  sourceRefs:
  - 39
- name: Oasis Security
  stage: 成长期
  wedge: 向 AI 智能体和生命周期控制延伸的非人身份治理平台。
  pricing: 企业定制报价。
  strength: 很清楚地把 AI 智能体框成 NHI，点出了身份蔓延、归属和生命周期风险。
  weaknessVsUs: 它更偏治理和 NHI 生命周期，而不是把运行时代理直接插进 Copilot 执行路径。
  sourceRefs:
  - 38
- name: CyberArk
  stage: 现有厂商
  wedge: 围绕机密、证书、工作负载身份和 SSH keys 的机器身份安全与特权访问。
  pricing: 企业定制报价。
  strength: 品牌信任、广泛的机器身份版图，以及深厚的特权访问买方关系。
  weaknessVsUs: 平台动作更重，也缺少 Copilot / MCP 工作流的具体场景，容易拖慢单一用例的上线切入。
  sourceRefs:
  - 27
  - 28
regulatoryTechnicalConstraints:
- point: MCP 授权要求 OAuth 2.1、受保护资源元数据、精确的重定向校验和权限范围最小化，这会直接抬高任何路径内代理的实现门槛。
  sourceRefs:
  - 19
  - 20
- point: 高影响智能体动作需要显式审批、审计轨迹，以及熔断或人工介入机制，才能符合安全采用指引。
  sourceRefs:
  - 21
  - 22
- point: Copilot Studio 已经依赖数据策略、认证选项和 Purview / Sentinel 日志，所以第三方控制必须贴合 Microsoft 的管理模型，而不是绕开它。
  sourceRefs:
  - 3
  - 4
  - 5
  - 6
- point: Entra 正把智能体身份与业务发起人做成一等生命周期对象，这意味着新控制最好嵌进身份治理，而不是另起一个孤岛外挂层。
  sourceRefs:
  - 11
  - 12
- point: 面向 SAP 和 ServiceNow 的企业智能体，越来越要求在进生产前就具备运行时隔离和贴合业务上下文的策略语义。
  sourceRefs:
  - 14
  - 16
  - 17
validationSignals:
- point: Aembit 已经在公开售卖面向 Copilot Studio 的运行时凭证代理，而且对 AI 智能体给出了 Starter 与 Teams 包装。
  sourceRefs:
  - 1
  - 25
- point: Microsoft 正把智能体身份、治理和采用成熟度做成正式框架，而不是把企业智能体继续当作纯实验界面。
  sourceRefs:
