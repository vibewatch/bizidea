  searchedQueries:
  - 查找近期权威资料，覆盖 Microsoft Copilot Studio 的安全、治理、认证、审计日志和企业部署控制，重点看连接外部系统或 MCP 服务器的智能体。
  - 查找关于非人身份、工作负载身份以及 AI 智能体身份安全的权威资料，覆盖 Aembit、Astrix、Oasis Security、CyberArk、Teleport、Okta 和 SailPoint。
  - 查找关于企业 AI 智能体采用、Copilot 采用、ServiceNow AI 智能体、SAP 企业 AI 或工作流自动化采用的权威资料，以及与“会执行动作的企业智能体安全控制”相关的市场数据。
  - 查找与 AI 智能体安全、最小权限、短时凭证、服务账号、非人身份、提示注入和可审计访问控制相关的官方标准、监管或政府指引。
  - 查找近期新闻和产品资料，重点聚焦 Aembit 如何保护 Microsoft Copilot Studio 智能体，以及为什么短时、可审计凭证对企业 AI 智能体重要的独立分析。
  - 查找 Microsoft 官方资料，覆盖 Microsoft 365 商业付费席位、Copilot 采用，以及与企业安全买方相关的 Copilot Studio 管理或治理文档。
  - 查找 SAP 官方资料，覆盖客户数、AI Copilot 助手s / 智能体；以及 ServiceNow 官方资料，覆盖企业客户数和 AI 智能体治理。
  - 查找关于 MCP 授权、OAuth 2.1、令牌交换、短时凭证、工作负载身份联邦和最小权限机器身份模式的官方或标准化资料。
  - 查找 Aembit、Teleport 工作负载身份、CyberArk 机器身份和 Microsoft Entra 的官方定价或打包页面，用作相邻预算参照。
  - 查找公开可访问且可抓取的权威分析师或市场数据页面，覆盖机器身份、工作负载身份、非人身份或 AI 智能体安全的市场规模预测。
  - 查找能量化企业对服务账号、非人身份、密钥蔓延或 AI 智能体治理缺口担忧的权威调研或报告。
