reportMemo:
  executiveTakeaways:
  - Aembit 在 2026 年 6 月面向 Copilot Studio 的发布，证明企业智能体的运行时凭证代理已经不是纸上谈兵。
  - 最尖锐的购买时点，是只读助手开始跨 ServiceNow、SAP、MCP 服务器和内部 API 动手执行时。
  - 切口很急，也很挤。要拉开差距，只能靠以 Microsoft 为核心的工作流里更快的部署速度，以及更扎实的“智能体-用户-任务”审计证据。
  - 最初围绕 Copilot 的市场有意义，但单独看并不算大；长期上行空间，大概率要靠往更广的跨运行时智能体与工作负载 IAM 扩。
  - 安全指引正收敛到几件事：最小权限、收窄工具范围、高影响动作保留人工监督，以及可审计日志——这和凭证代理层天然契合。
  marketDefinition: 这类软件处在运行时身份与访问控制层：当 AI 智能体调用 MCP 服务器、SaaS 连接器和内部 API 时，它按任务发放凭证、集中执行策略，并为每个动作留下一条审计证据链。
  customerAndBuyer: 一线用户是大型、以 Microsoft 为核心的企业里，负责身份工程和 AI 平台安全的总监级团队。经济买方通常是 CISO 或安全工程副总裁；Copilot Studio、ServiceNow、SAP 和企业架构负责人则是技术赞助人。
  buyingTriggers:
  - point: 当 Copilot Studio 试点准备在 ServiceNow、SAP 或内部 API 上执行写操作时，企业就会被迫围绕凭证、策略和可审计性做一次生产安全评审。
    sourceRefs:
    - 1
    - 2
    - 3
    - 13
    - 14
    - 16
    - 18
  - point: 一旦出现未知智能体、越权或 AI 智能体相关事故，就会暴露一个现实：静态凭证加临时审批这套做法已经撑不住了。
    sourceRefs:
    - 29
    - 30
    - 31
    - 32
    - 33
  - point: 身份团队开始上 agent 身份或工作负载身份方案时，会很快发现：老式服务主体和密钥库工作流，依然留着动作级控制的缺口。
    sourceRefs:
    - 9
    - 10
    - 11
    - 12
    - 21
    - 22
  willingnessToPay:
    summary: 付费意愿是站得住的。买家本来就在为身份控制付费，AI 预算也正往核心工作流迁。Aembit 的公开包装说明，这个品类很快就能落到“按智能体计费”；而大型工作流平台也把“卡住上线的治理问题”从科研项目，变成了可以单列预算的采购项。
    sourceRefs:
    - 15
    - 25
    - 34
    - 35
  competitiveLandscape: 竞争已经分成四拨：Microsoft、SAP、ServiceNow 这类平台原生的智能体控制；向智能体延伸的 NHI 和身份治理套件；主打短时凭证的机器身份 / 工作负载身份厂商；以及以发现和策略为主的新一代智能体安全创业公司。真正的空白，是一层极度产品化的 Copilot Studio 运行时代理：先在一条工作流上快速落地，再在工具执行点把可审计性证明出来。
  incumbentThesis:
  - incumbentClass: 云与工作流平台
    point: Microsoft、SAP 和 ServiceNow 可以把自家的智能体表面越做越硬，但它们不会自动给出一层跨平台代理，统一覆盖 MCP 服务器、SaaS API 和横跨多套企业栈的内部系统。
    sourceRefs:
    - 7
    - 11
    - 14
    - 16
    - 17
    - 18
  - incumbentClass: 身份与治理套件
    point: Entra、SailPoint 和 Okta 正把 agent 与 NHI 治理讲得更清楚，但只要一家创业公司能在实时调用路径上，成为最快帮企业放行一条高风险生产工作流的工具，仍有赢面。
    sourceRefs:
    - 11
    - 12
    - 29
    - 40
  - incumbentClass: 机器与工作负载身份厂商
    point: CyberArk 和 Teleport 已经把短时身份和高权限机器访问做成共识，但它们更偏基础设施，不像“Copilot Studio + SAP / ServiceNow 工作流”这么贴近业务上线。
    sourceRefs:
    - 26
    - 27
    - 28
  - incumbentClass: NHI 与智能体安全创业公司
    point: Aembit、Astrix 和 Oasis 都说明市场认可“AI 智能体本质上是身份问题”，但场上大多数玩家仍更偏发现、姿态管理或平台总叙事，还没有把 Copilot 运行时切口打得足够窄。
    sourceRefs:
    - 1
    - 25
    - 38
    - 39
  regulatoryLandscape: 目前还没有一条专门为了 Copilot 写的法规直接驱动采购，但控制方向已经很清楚：安全采用指引、最小权限、明确审批阈值和可审计动作历史，正在变成自治智能体触碰敏感企业系统前的事实标准。
  technologyLandscape: 底层原语已经到位：MCP 授权正在向 OAuth 2.1 和受保护资源元数据收敛，主流云厂商也早就推无密钥工作负载身份联邦，Microsoft 还在把 agent 专属的身份与治理对象补齐。现在缺的，不是单个组件，而是把这些东西拼成一层真正能落地的代理——既贴合 Copilot Studio，也不要求企业把整套身份栈推倒重来。
  distributionChannels:
  - point: 直接切进 Copilot Studio 的生产就绪评审——安全团队此时本来就在争论服务主体、连接器和 ServiceNow / SAP 的写权限。
    sourceRefs:
    - 1
    - 3
    - 13
    - 14
    - 16
  - point: 通过 Microsoft、SAP、ServiceNow 和系统集成伙伴共销——他们本来就在承接企业智能体部署和工作流现代化项目。
    sourceRefs:
    - 14
    - 16
    - 17
    - 18
  - point: 让身份与 NHI 咨询方成为渠道放大器，因为这类问题最容易被包装成“最小权限、工作负载身份现代化和审计就绪”。
    sourceRefs:
    - 9
    - 10
    - 27
    - 40
  partnershipEcosystem:
  - point: Microsoft 和 Power Platform 伙伴很关键，因为 Copilot Studio 的治理、认证和日志本来就锚在 Entra 与 Power Platform 管理体系里。
    sourceRefs:
    - 3
    - 4
    - 5
    - 6
    - 7
  - point: ServiceNow 和 SAP 伙伴同样重要，因为企业买家越来越希望智能体在受治理的工作流和 ERP 环境里动手，而不是在外围试验。
    sourceRefs:
    - 13
    - 14
    - 16
    - 17
    - 18
  - point: 身份和标准生态也很重要，因为 MCP、OAuth、工作负载身份联邦和短时凭证模式，都是这个品类建立信任的底层。
    sourceRefs:
    - 10
    - 19
    - 20
    - 23
    - 26
  dataMoats:
  - point: 一张把智能体、用户、任务、工具、目标系统、凭证时长和结果串起来的策略决策图，每多一条受管控的工具调用就更值钱。
    sourceRefs:
    - 1
    - 11
    - 12
    - 19
  - point: 被拒动作、升级审批请求和人工审批结果，最终都能沉淀成针对特定企业工作流和连接器类型的差异化上线模板。
    sourceRefs:
    - 20
    - 21
    - 22
    - 33
  geographicConsiderations:
  - point: 美国主导的首发市场是站得住的——以 Microsoft 为核心的大企业已经背上安全采用指引，而且对生产级智能体上线最急。
    sourceRefs:
    - 7
    - 21
    - 24
  - point: 多区域部署仍要考虑数据驻留感知的日志与治理，因为智能体动作穿越的是业务系统和证据链，不只是模型端点。
    sourceRefs:
    - 3
    - 6
    - 7
  sensitivityCases:
  - case: Microsoft 原生能力补齐更多运行时身份缺口
    impact: 如果 Copilot Studio 加上 Entra Agent ID 很快就能给出可信的范围化运行时访问，独立产品定价就会被压缩；创业公司必须更强调跨平台中立、工作流模板和审计证据深度。
    sourceRefs:
    - 3
    - 11
    - 12
  - case: 执行动作的智能体采用速度比平台叙事更慢
    impact: 如果企业更长时间把智能体限制在只读或人工审批模式，预算启动时间就会拉长，创业公司能卖进去的，只剩少数真正往生产推进的团队。
    sourceRefs:
    - 29
    - 34
    - 35
  - case: 影子智能体或越权事故一旦被广泛看见
    impact: 只要出现一次大事故，运行时策略、独立智能体身份和即时凭证就很可能从“加分项”变成上线门槛。
    sourceRefs:
    - 30
    - 31
    - 32
    - 33
  validationPlan:
  - priority: 高
    question: 典型的首个生产上线，在第一年到底会保护多少个受管控智能体，或多少个经由 MCP 接入的端点？
    evidenceToGather: 收集 5 家目标账户里、围绕 1 条 Copilot Studio 工作流的架构图、端点清单和权限计数。
  - priority: 高
    question: 买家会不会单独为运行时代理付费，还是一定要把发现与注册表功能打包进去才愿意采购？
    evidenceToGather: 收集身份、AI 平台和安全团队的预算负责人访谈，以及赢单 / 输单记录。
  - priority: 中
    question: 最先落地的初始工作流到底是哪种：ServiceNow 支撑的服务运营，还是 SAP 支撑的采购与财务例外处理？
    evidenceToGather: 按工作流类型梳理商机储备，并收集实施伙伴对见效时间与集成工作量的反馈。
  - priority: 中
    question: 私有部署、客户自持密钥或客户自管审计存储，究竟多频繁地会成为硬要求？
    evidenceToGather: 收集前 20 家企业潜客的安全问卷和采购阶段异议。
