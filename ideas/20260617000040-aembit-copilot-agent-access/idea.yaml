topRisks:
  - name: Microsoft feature catch-up
    description: Microsoft could add native short-lived credential brokerage or deeper policy controls inside Copilot Studio.
    mitigation: Win on cross-system MCP coverage, faster SAP and ServiceNow integrations, and audit workflows that span beyond Microsoft's native boundary.
  - name: Integration sprawl
    description: Enterprises may need too many custom MCP and internal API integrations for early deployments to feel lightweight.
    mitigation: Start with one opinionated stack—Copilot Studio plus SAP or ServiceNow plus a standard MCP gateway—and package a 30-day first rollout.
  - name: Budget before pain
    description: Buyers still running read-only copilots may postpone spend until an agent actually takes action in production systems.
    mitigation: Sell into rollout gates where write access, audit exceptions, or incident visibility already create a named executive problem.
