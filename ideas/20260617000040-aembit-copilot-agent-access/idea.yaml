jobsToBeDone:
  - job: >-
      When a Copilot Studio operations agent is about to gain write access to
      SAP or ServiceNow through an MCP server, help identity teams issue the
      minimum credential for that task, so they can approve launch without
      another standing secret.
    currentAlternative: Shared service principals and manual secret reviews
    successMetric: Days from security review to production approval
  - job: >-
      When audit or incident response asks why an agent touched an enterprise
      system, help AI security teams replay the exact access decision, so they
      can prove policy compliance without stitching logs by hand.
    currentAlternative: Vault logs, app logs, and spreadsheet-based access attestations
    successMetric: Mean time to explain or revoke an agent action
