problem: >-
  Copilot Studio makes it easy for enterprise teams to ship agents that call
  MCP servers, internal APIs, and SaaS systems, but most of those actions still
  ride on static secrets or broad service principals. Security teams then cannot
  prove which task justified each credential, constrain an agent to one
  approved action path, or revoke risky access without breaking the whole
  workflow. Existing IAM, vault, and PAM stacks understand humans and apps, not
  agents that choose tools dynamically at runtime.
targetUser:
  primary: >-
    Director of Identity Engineering or AI Platform Security at a Fortune 500
    manufacturer, distributor, or business-services enterprise deploying
    Copilot Studio operations agents over SAP, ServiceNow, and internal APIs
  secondary: >-
    Microsoft platform owner or enterprise architect responsible for Copilot
    Studio connectors, MCP servers, and production rollout approvals
  buyer: CISO or VP of Security Engineering
startupThesis:
  nonObviousInsight: >-
    The first durable budget in agent security will not be for another generic
    governance dashboard. It will be for the runtime credential layer sitting
    between Copilot Studio and MCP or API tools, because deployment is now easy
    while secret issuance still assumes a static application with fixed access.
  beachhead: >-
    Fortune 500 Microsoft-centric enterprises launching Copilot Studio
    procurement, service-operations, or finance exception agents that invoke
    SAP, ServiceNow, and custom internal APIs through MCP servers
  wedge: >-
    A drop-in broker that wraps each MCP or API tool call with task-scoped
    policy, issues a short-lived credential for that single action, stamps it
    with agent-plus-user identity context, and records an audit-ready decision
    log
  whyNowCatalyst: >-
    Aembit's launch shows that short-lived, auditable credentials for Copilot
    Studio are no longer theoretical just as MCP makes it trivial for agents to
    touch more enterprise systems.
  ventureScalePath: >-
    Start with Copilot Studio action brokerage, then expand into cross-runtime
    credential issuance, agent approval workflows, third-party agent trust, and
    the broader control plane for non-human access across enterprise software.
solution: >-
  The product sits between Copilot Studio and the MCP servers, SaaS connectors,
  and internal APIs an enterprise agent wants to use. For every tool call, it
  evaluates policy against the agent, user, task, destination system, and
  requested action, then mints a short-lived credential or blocks the request.
  It gives security teams one evidence trail showing which agent asked for
  access, why it was granted, what system it touched, and when the credential
  expired. The first version ships opinionated guardrails for high-value
  operations workflows such as supplier onboarding, ticket escalation, and
  finance exception handling where buyers already fear over-privileged service
  accounts.
goToMarketSeed:
  firstCustomer: >-
    A Fortune 500 manufacturer or distributor with a Microsoft AI center of
    excellence launching a Copilot Studio procurement-exception agent that uses
    custom MCP servers to read supplier data in SAP and open or update cases in
    ServiceNow
  buyingTrigger: >-
    A pilot moving from read-only answers to action-taking workflows across SAP
    or ServiceNow, triggering a production security review or audit exception
    process
  currentAlternative: >-
    Shared Azure service principals, secrets in Azure Key Vault, custom
    middleware, and spreadsheet-based access reviews run by the identity team
  switchingReason: >-
    The broker lets the team approve launch without rewriting every connector,
    because each tool call gets a task-scoped credential, centralized policy
    check, and replayable audit record instead of another standing secret.
  pricingHypothesis: >-
    Annual platform fee based on protected agent workflows and governed tool
    endpoints, plus implementation revenue for the first SAP or ServiceNow
    rollout
