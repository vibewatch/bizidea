market:
  tam:
    value: $316.8M
    rationale: 'Bottom-up estimate: ~8,800 ServiceNow enterprise customers x 150 governed action-taking agents per customer x $20 per agent per month from Aembit’s public team pricing = about $316.8M annualized; cross-check sits below the broader $3.1B 2025 workload identity security market forecast.'
    isEstimate: true
    sourceRefs:
    - 15
    - 25
    - 37
  sam:
    value: $44.4M
    rationale: Constrain TAM to about 1,233 enterprises already at partial or full AI-agent scale (14% of ~8,800 per Capgemini) and keep the same 150-agent, $20-per-agent-month benchmark, yielding roughly $44.4M.
    isEstimate: true
    sourceRefs:
    - 15
    - 25
    - 34
  som:
    value: $3.6M
    rationale: Reachable Year-3 case assumes 60 production logos at about 250 governed agents each on the public $20-per-agent-month benchmark, landed through direct sales and ecosystem partners.
    isEstimate: true
    sourceRefs:
    - 14
    - 16
    - 25
