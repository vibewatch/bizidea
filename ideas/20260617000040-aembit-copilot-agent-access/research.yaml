competitors:
- name: Aembit
  stage: scale-up
  wedge: Runtime IAM for agentic AI and workloads with blended identity, MCP identity gateway, and short-lived credentials.
  pricing: Starter free; Teams $20/agent/month and $20/workload/month; Enterprise custom.
  strength: Closest product-market fit to the proposed wedge and already integrated with Copilot Studio.
  weaknessVsUs: Broader platform framing still leaves room for a more opinionated Copilot Studio plus SAP or ServiceNow launch pack and deeper workflow-specific audit evidence.
  sourceRefs:
  - 1
  - 25
- name: Astrix Security
  stage: scale-up
  wedge: AI agent discovery, visibility, and secure-by-design provisioning or control plane.
  pricing: Custom enterprise quote.
  strength: Strong discovery and policy-driven governance story across AI agents and NHIs.
  weaknessVsUs: More discovery and control-plane oriented than per-call ephemeral credential issuance at the live MCP or API access point.
  sourceRefs:
  - 39
- name: Oasis Security
  stage: scale-up
  wedge: Non-human identity governance platform extending into AI agents and lifecycle control.
  pricing: Custom enterprise quote.
  strength: Clear framing of AI agents as NHIs with identity sprawl, ownership, and lifecycle risks.
  weaknessVsUs: Focuses more on governance and NHI lifecycle than on inserting a runtime broker into Copilot execution paths.
  sourceRefs:
  - 38
- name: CyberArk
  stage: incumbent
  wedge: Machine identity security and privileged access across secrets, certificates, workload identities, and SSH keys.
  pricing: Custom enterprise quote.
  strength: Brand trust, broad machine-identity footprint, and deep privileged-access buyer relationships.
  weaknessVsUs: Heavier platform motion and less Copilot or MCP workflow specificity, which can slow a one-use-case launch motion.
  sourceRefs:
  - 27
  - 28
