reportMemo:
  executiveTakeaways:
  - Aembit’s June 2026 Copilot Studio launch proves that runtime credential brokerage for enterprise agents is no longer theoretical.
  - The sharp buying moment is the move from read-only copilots to action-taking agents across ServiceNow, SAP, MCP servers, and internal APIs.
  - 'The wedge is urgent but crowded: differentiation has to come from fastest deployment for Microsoft-centric workflows and better agent-user-task audit evidence.'
  - The initial Copilot-centric market is meaningful but not massive on its own, so long-term upside likely depends on expansion into broader cross-runtime agent and workload IAM.
  - Security guidance is converging around least privilege, scoped tools, human oversight for high-impact actions, and auditable logs, which fits a credential brokerage layer well.
  marketDefinition: Runtime identity and access control software that brokers task-scoped credentials for AI agents calling MCP servers, SaaS connectors, and internal APIs, while centralizing policy and audit evidence for each action.
  customerAndBuyer: Primary users are director-level identity engineering and AI platform security teams inside large Microsoft-centric enterprises. The economic buyer is usually the CISO or VP of security engineering, with Copilot Studio, ServiceNow, SAP, and enterprise architecture owners acting as technical sponsors.
  buyingTriggers:
  - point: A Copilot Studio pilot is about to take write actions in ServiceNow, SAP, or internal APIs, forcing a production security review around credentials, policy, and auditability.
    sourceRefs:
    - 1
    - 2
    - 3
    - 13
    - 14
    - 16
    - 18
  - point: Unknown agents, scope violations, or AI-agent-related incidents expose that static credentials and ad hoc approvals no longer scale.
    sourceRefs:
    - 29
    - 30
    - 31
    - 32
    - 33
  - point: Identity teams begin adopting agent identities or workload identity patterns and realize that legacy service principals and vault workflows still leave action-level gaps.
    sourceRefs:
    - 9
    - 10
    - 11
    - 12
    - 21
    - 22
  willingnessToPay:
    summary: Willingness to pay is credible because buyers already fund identity controls and are moving AI spend into core workflows. Aembit’s public packaging shows the category can land on per-agent pricing quickly, while large workflow platforms make launch-blocking governance a budgetable problem rather than a science project.
    sourceRefs:
    - 15
    - 25
    - 34
    - 35
  competitiveLandscape: 'Competition is splitting across four camps: platform-native agent controls from Microsoft, SAP, and ServiceNow; NHI and identity-governance suites extending into agents; machine-identity and workload-identity vendors emphasizing short-lived credentials; and newer agent-security startups focused on discovery plus policy. The whitespace is a highly opinionated Copilot Studio runtime broker that lands on one workflow fast and proves auditability at the point of tool execution.'
  incumbentThesis:
  - incumbentClass: Cloud and workflow platforms
    point: Microsoft, SAP, and ServiceNow can harden their native agent surfaces, but they do not automatically deliver one cross-platform broker for MCP servers, SaaS APIs, and internal systems spanning multiple enterprise stacks.
    sourceRefs:
    - 7
    - 11
    - 14
    - 16
    - 17
    - 18
  - incumbentClass: Identity and governance suites
    point: Entra, SailPoint, and Okta are making agent and NHI governance more explicit, but a purpose-built startup can still win if it becomes the fastest way to unblock one high-stakes production rollout at the live call path.
    sourceRefs:
    - 11
    - 12
    - 29
    - 40
  - incumbentClass: Machine and workload identity vendors
    point: CyberArk and Teleport already normalize short-lived identities and privileged machine access, but they are more infrastructure-centric than Copilot Studio plus SAP or ServiceNow workflow-centric.
    sourceRefs:
    - 26
    - 27
    - 28
  - incumbentClass: NHI and agent-security startups
    point: Aembit, Astrix, and Oasis show the market believes AI agents are an identity problem, but most of the field still leans toward discovery, posture, or broad platform positioning rather than a deeply opinionated Copilot runtime wedge.
    sourceRefs:
    - 1
    - 25
    - 38
    - 39
  regulatoryLandscape: 'There is no single Copilot-specific regulation driving the purchase, but the control direction is clear: secure-adoption guidance, least-privilege expectations, clear approval thresholds, and auditable action histories are becoming de facto requirements before autonomous agents are allowed to touch sensitive enterprise systems.'
  technologyLandscape: 'The primitives now exist: MCP authorization is standardizing on OAuth 2.1 and protected resource metadata, major clouds already promote secretless workload identity federation, and Microsoft is creating agent-specific identity and governance objects. The gap is turning those pieces into one deployable broker that fits Copilot Studio and enterprise workflow teams without requiring a full identity-stack rewrite.'
