operations:
  - "维护一套针对 Snowflake、BigQuery、dbt 和 signed-session 应用认证的参考架构与部署清单。"
  - "每周审查提示词失败、策略异常和回归漂移的基准结果。"
  - "按租户和按受治理查询维度监控数据仓库与推理成本。"
  - "构建一套可复用的安全评审材料，覆盖数据流、审计日志、血缘和模型处理边界。"
  - "在简单的创始人主导 CRM 中跟踪销售管道，并把资格门槛绑定到上线日期、架构适配度和安全赞助人。"
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: "从一开始就负责核心运行时、数据仓库连接器和回归基础设施。"
  - role: 创始解决方案工程师
    startTiming: Month 2
    rationale: "早期交易取决于实施速度、对安全评审的支持，以及把定制试点工作沉淀为可复制手册。"
  - role: 产品工程师
    startTiming: Month 6
    rationale: "把试点学习沉淀为管理工作流、证据包和可部署 SDK，同时不拖慢核心平台工作。"
  - role: GTM 通才
    startTiming: Month 9
    rationale: "只有在前几次生产转化验证销售动作之后，才加入管道运营、合作伙伴管理和客户扩展支持。"
milestones:
  - horizon: 0–12 个月
    items:
      - "完成 15-20 次合格买家访谈，并将其中 3 家转化为付费试点。"
      - "交付对 Snowflake、BigQuery、dbt 摄取、signed-session 策略映射、血缘和审计日志的 MVP 支持。"
      - "实现至少 2 次生产上线，且不发生高严重度租户泄露事故。"
      - "证明基准回归测试套件和可重复使用的安全评审证据包可行。"
  - horizon: 12–24 个月
    items:
      - "把核心滩头架构的部署标准化到 45 天以内。"
      - "达到 8-12 条生产产品线，并证明至少 30% 的客户会扩展到第二条产品线。"
      - "增加可复用策略模板、成本护栏以及一种由合作伙伴影响的交付动作。"
      - "在滩头市场中建立公司作为面向客户 AI 分析默认中立控制平面的定位。"
  - horizon: 24–36 个月
    items:
      - "实现约 40-45 条受治理产品线部署，与研究中的第 3 年 SOM 保持一致。"
      - "扩展到相邻的内部分析治理和跨产品可观测性模块，同时不丢失中立运行时定位。"
      - "在提示词回归数据、租户策略映射和合作伙伴主导的部署手册上建立持久护城河。"
risks:
  - risk: "目标买家仍将第一代分析 Copilot 保持在内部使用，不愿为外部控制层付费。"
    likelihood: High
    impact: High
    mitigation: "只筛选那些面临外部上线压力的账户，并证明相对于内部自建计划的上线速度优势。"
  - risk: "现有厂商或云平台打包了足够多的治理能力，压缩差异化空间。"
    likelihood: Medium
    impact: High
    mitigation: "聚焦跨工具的策略编排、可审计性和外部租户运行时保证，这是更大套件较难做好的部分。"
  - risk: "部署复杂性使得每个试点都演变成高服务占比的定制集成。"
    likelihood: Medium
    impact: High
    mitigation: "限制初始架构范围，并尽早投资可复用 SDK、策略模板和解决方案工程能力。"
  - risk: "安全与采购周期拖慢试点转化，拉长现金消耗。"
    likelihood: Medium
    impact: Medium
    mitigation: "在 MVP 中明确纳入合规证据和部署边界，并以带清晰生产标准的付费试点推进。"
  - risk: "定价被现有分析基础设施预算基准向下锚定。"
    likelihood: Medium
    impact: Medium
    mitigation: "围绕一次上线决策和可量化的风险消除来定价，再通过受治理查询量和更多产品线扩张。"
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "为期 18 个月的资金将用于交付面向 Snowflake、BigQuery 和 dbt 的滩头产品；拿下 3 个付费试点和 2 次生产上线；构建回归测试与可审计性的护城河；并证明创始人主导加合作伙伴辅助的 GTM 动作可以复制。"
