scenarios:
  downside:
    description: "Slower pilot conversion, modest ARPU compression, and slightly worse churn force a bridge before the model reaches self-funding territory."
    y3RevenueK: 1530.47
    y3EbitdaK: -1020.34
    cashLowPointK: -531.64
    keyAssumptionChanges:
      - ARPU falls to $90K per active product line.
      - Monthly churn rises to 1.3%.
      - Y3 new product-line wins slow from 33 to 26.
  base:
    description: "Reference customers and a narrow partner motion let the company compound founder-led pilots into a repeatable governed-analytics wedge."
    y3RevenueK: 2382.65
    y3EbitdaK: -423.81
    cashLowPointK: 202.11
    keyAssumptionChanges:
      - ARPU stays at $100K blended ARR.
      - Monthly churn holds at 1.0%.
      - Y2-Y3 new wins follow the 1/2/2/2 and 6/8/9/10 quarterly ramps.
  upside:
    description: "Partner pull-through and usage expansion turn Q4Y3 EBITDA positive enough to approach a clean seed-to-Series A handoff."
    y3RevenueK: 3394.26
    y3EbitdaK: 284.31
    cashLowPointK: 795.12
    keyAssumptionChanges:
      - ARPU expands to $108K through usage overages and second-product-line growth.
      - Monthly churn improves to 0.8%.
      - Y2-Y3 wins pull forward as reference accounts validate the deployment playbook.
