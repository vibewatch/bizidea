    baseCase: $35.9K blended CAC
    upsideCase: 10% lower spend per win through partner sourcing
    y3RevenueImpactK: 0.0
    cashImpactK: -77.4
  - variable: churn
    downsideCase: 1.3% monthly logo churn
    baseCase: 1.0% monthly logo churn
    upsideCase: 0.8% monthly logo churn
    y3RevenueImpactK: -53.85
    cashImpactK: -47.22
  - variable: sales cycle
    downsideCase: Average cycle extends by ~60 days and pushes wins two months later
    baseCase: ~120-day pilot-to-production motion
    upsideCase: Security evidence pack shortens conversion by ~30 days
    y3RevenueImpactK: -459.35
    cashImpactK: -426.93
  - variable: gross margin
    downsideCase: Gross margin lands 5 points below plan
    baseCase: 70% steady-state gross margin
    upsideCase: Automation lifts gross margin about 3 points above plan
    y3RevenueImpactK: 0.0
    cashImpactK: -158.94
  - variable: hiring pace
