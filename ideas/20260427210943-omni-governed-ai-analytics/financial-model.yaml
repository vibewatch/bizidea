    baseCase: Milestone-gated hiring plan
    upsideCase: Discretionary late hires wait until revenue proves out
    y3RevenueImpactK: 0.0
    cashImpactK: -87.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionProductLines
      ProductionProductLines --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case Y3 revenue is driven by 40.4 active product lines at about $100K blended ARR after the company proves a referenceable pilot-to-production motion."
  - checkName: Must go right
    finding: "The plan depends on converting early pilots into production references fast enough to support the 6/8/9/10 quarterly landing ramp in Y3 without overhiring first."
  - checkName: Model breaks if
    finding: "If ARPU slips to $90K and sales cycles stretch by about 60 days, the downside case runs roughly $531.6K below zero before Y3 ends."
  - checkName: Next-round proof
    finding: "Roughly 10 production product lines, sub-45-day deployments, and visible Q4Y3 EBITDA inflection are the operating proof points that justify the next financing."
sanityChecks:
  ruleOf40: "Y3 growth 262.0% + EBITDA margin -17.8% = 244.2% (inflated by the still-small Y2 revenue base)."
  burnMultiple: "Y2 burn multiple 1.56x, improving to Y3 0.14x as net new ARR outpaces burn."
  revenuePerFte: "$242K Y3 on average 9.8 FTE (benchmark $200–400K SaaS)."
  flags:
    - Downside assumptions create a funding gap before year end, so the round only works if paid-pilot urgency is real and close timing stays tight.
    - Modeled Y3 growth requires partner-assisted distribution after Y2; a purely founder-led motion would likely undershoot the 40-45 deployment target.
    - CAC payback looks strong because pricing is enterprise-like, but direct willingness-to-pay evidence is still limited and should be validated in the first three pilots.
    - Cash roll-forward excludes working-capital benefits from annual prepayments; that is conservative, but actual collections discipline will still matter.
