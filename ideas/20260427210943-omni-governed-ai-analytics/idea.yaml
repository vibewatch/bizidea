problem: "Vertical SaaS companies want to add natural-language analytics to their customer portals, but their metric logic was built for dashboards and analyst SQL, not agentic question-answering. They end up stitching together dbt models, app permissions, and prompt rules, which creates inconsistent KPI answers and cross-tenant data-leak risk. One bad AI answer can kill trust with an enterprise account and stall expansion revenue."
targetUser:
  primary: "VP Product or Head of Data Platform at a Series B+ vertical SaaS company with an existing analytics module"
  secondary: "Staff analytics engineer or embedded data product manager owning metric definitions and customer-facing reporting"
  buyer: "VP Product, Chief Product Officer, or Head of Data Platform"
startupThesis:
  nonObviousInsight: "The hard part of AI analytics is no longer generating language; it is turning internal metric logic into a runtime contract that survives every tenant boundary, permission rule, and query surface."
  beachhead: "Series B+ vertical SaaS vendors on Snowflake or BigQuery with dbt-based metrics that already sell dashboards to enterprise customers and plan to launch an in-app analytics copilot in the next 6-12 months."
  wedge: "A tenant-aware semantic gateway that compiles approved metrics, row-level permissions, and answer templates into an API every customer-facing analytics copilot must call."
  whyNowCatalyst: "Omni's $120M round around a semantic layer for governed BI shows that metric governance is becoming urgent just as AI queries join dashboards and SQL as a primary analytics interface."
  ventureScalePath: "Start as the control plane for customer-facing AI analytics, then expand into internal AI analyst governance, embedded benchmark products, audit workflows, and cross-application metric observability for the entire enterprise data stack."
solution: "The product plugs into a SaaS vendor's warehouse, dbt project, and application permission model to define metric contracts that are safe for AI retrieval. Every in-app copilot query is routed through the gateway, which resolves tenant scope, approved dimensions, and canonical metric definitions before generating an answer. Each response returns lineage, underlying SQL, confidence checks, and a safe fallback to deterministic chart blocks when the request is ambiguous. The system also runs regression tests when metric definitions change, so product and data teams can see which prompts, dashboards, and customer accounts would break before release. Over time, the gateway becomes the runtime and audit log for every analytics answer delivered to end users."
goToMarketSeed:
  firstCustomer: "A 200-1,500 employee vertical SaaS company selling into finance, HR, or operations teams, with an existing dashboard SKU and a committed 2026 roadmap item for natural-language customer analytics."
  buyingTrigger: "A top enterprise customer or board roadmap review demands an AI analytics copilot, while security and data teams require proof that answers are tenant-safe and KPI-consistent before launch."
  currentAlternative: "Internal build on dbt or LookML-style models plus application permissions, prompt engineering, and manual QA."
  switchingReason: "The gateway shortens launch time, centralizes metric logic across dashboards and copilots, and gives product and security teams reproducible evidence that answers are permissioned and correct."
  pricingHypothesis: "Annual platform subscription plus governed query volume, starting around $40k-$100k ARR per product line with usage expansion as more end users adopt the copilot."
