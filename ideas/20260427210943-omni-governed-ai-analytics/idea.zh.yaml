problem: "垂直 SaaS 公司想把自然语言分析加入客户门户，但它们的指标逻辑原本是为仪表盘和分析师 SQL 构建的，而不是为代理式问答准备的。结果它们不得不把 dbt 模型、应用权限和提示词规则硬拼在一起，导致 KPI 回答不一致，并带来跨租户数据泄露风险。一次糟糕的 AI 回答就可能摧毁企业客户的信任，并拖慢扩展收入。"
targetUser:
  primary: "在一家已拥有分析模块的 Series B+ 垂直 SaaS 公司任职的产品副总裁或数据平台负责人"
  secondary: "负责指标定义和面向客户报表的资深分析工程师或嵌入式数据产品经理"
  buyer: "产品副总裁、首席产品官或数据平台负责人"
startupThesis:
  nonObviousInsight: "AI 分析真正困难的部分已不再是生成语言，而是把内部指标逻辑变成一种运行时契约，使其在每个租户边界、权限规则和查询界面上都能保持成立。"
  beachhead: "使用 Snowflake 或 BigQuery、基于 dbt 管理指标、已经向企业客户销售仪表盘，并计划在未来 6-12 个月内推出应用内分析 Copilot 的 Series B+ 垂直 SaaS 厂商。"
  wedge: "一个租户感知的语义网关，把已批准的指标、行级权限和回答模板编译成所有面向客户分析 Copilot 都必须调用的 API。"
  whyNowCatalyst: "Omni 围绕受治理 BI 的语义层完成 $120M 融资，表明在 AI 查询与仪表盘、SQL 并列成为主要分析接口之际，指标治理正变得格外紧迫。"
  ventureScalePath: "先成为面向客户 AI 分析的控制平面，再扩展到内部 AI 分析师治理、嵌入式基准产品、审计工作流，以及覆盖整个企业数据栈的跨应用指标可观测性。"
solution: "该产品接入 SaaS 厂商的数据仓库、dbt 项目和应用权限模型，以定义适合 AI 检索的安全指标契约。每一次应用内 Copilot 查询都会先经过网关，由其在生成答案前解析租户范围、已批准维度和规范化指标定义。每个响应都会返回血缘、底层 SQL、置信校验，并在请求存在歧义时安全回退到确定性的图表模块。系统还会在指标定义发生变更时运行回归测试，让产品和数据团队能在发布前看到哪些提示、仪表盘和客户账户会受影响。随着时间推移，这个网关会成为所有面向终端用户分析答案的运行时与审计日志。"
goToMarketSeed:
  firstCustomer: "一家拥有 200-1,500 名员工、向财务、人力资源或运营团队销售产品的垂直 SaaS 公司，已经有现成的仪表盘 SKU，并且在 2026 路线图中明确承诺推出自然语言客户分析。"
  buyingTrigger: "某个头部企业客户或董事会路线图评审要求上线 AI 分析 Copilot，同时安全和数据团队要求在发布前证明答案具备租户安全与 KPI 一致性。"
  currentAlternative: "基于 dbt 或 LookML 风格模型，再配合应用权限、提示词工程和人工 QA 的内部自建方案。"
  switchingReason: "该网关能缩短上线时间，把仪表盘与 Copilot 的指标逻辑集中到一起，并为产品和安全团队提供可复现的证据，证明答案权限正确且结果无误。"
  pricingHypothesis: "采用年度平台订阅加受治理查询量计费，每条产品线起步大约 $40k-$100k ARR；随着更多终端用户采用 Copilot，再按使用量扩容。"
