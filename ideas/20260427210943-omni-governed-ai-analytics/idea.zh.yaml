problem: >-
  垂直 SaaS 公司希望在客户门户里加入自然语言分析，但它们的指标逻辑原本是为仪表盘和分析师写 SQL 而设计，不是为代理式问答准备的。结果团队只能把 dbt 模型、应用权限和提示词规则硬拼在一起，最后既会给出前后不一致的 KPI 答案，也会带来跨租户数据泄露风险。只要 AI 回答错一次，就可能让企业客户失去信任，连带拖慢扩展收入。
targetUser:
  primary: 已有分析模块的 Series B+ 垂直 SaaS 公司里，负责产品的副总裁或数据平台负责人
  secondary: 负责指标定义和面向客户报表的资深分析工程师，或嵌入式数据产品经理
  buyer: 产品副总裁、首席产品官，或数据平台负责人
startupThesis:
  nonObviousInsight: AI 分析真正难的地方，已经不是生成语言，而是把内部指标逻辑变成一份运行时契约，让它在每一道租户边界、权限规则和查询入口前都不失真。
  beachhead: 已在 Snowflake 或 BigQuery 上运行、用 dbt 管理指标、已经向企业客户销售仪表盘，并计划在未来 6-12 个月上线应用内分析 Copilot 的 Series B+ 垂直 SaaS 厂商。
  wedge: 一层租户感知的语义网关，把经过批准的指标、行级权限和回答模板编译成 API，所有面向客户的分析 Copilot 都必须调用它。
  whyNowCatalyst: Omni 围绕受治理 BI 语义层完成 $120M 融资，说明指标治理正在变得紧迫，而 AI 查询又正与仪表盘和 SQL 一起，成为主要的分析入口。
  ventureScalePath: 先成为面向客户 AI 分析的控制平面，再扩展到内部 AI 分析师治理、嵌入式基准产品、审计工作流，以及覆盖整套企业数据栈的跨应用指标可观测性。
solution: >-
  产品接入 SaaS 厂商的数据仓库、dbt 项目和应用权限模型，把这些内容定义成适合 AI 检索的指标契约。每一次应用内 Copilot 查询都会先经过网关，由它解析租户范围、已批准的维度和规范化指标定义，再生成回答。每条回答都会返回血缘、底层 SQL、置信度检查，并在请求含糊时安全回退到确定性的图表区块。系统还会在指标定义变更时跑回归测试，让产品和数据团队在发布前看到哪些提示词、仪表盘和客户账户会出问题。随着时间推移，这层网关会变成所有面向终端用户分析回答的运行时和审计日志。
goToMarketSeed:
  firstCustomer: 一家拥有 200-1,500 名员工、销售对象是财务、人力或运营团队的垂直 SaaS 公司；它已经有仪表盘 SKU，并把自然语言客户分析列为 2026 年的明确路线图事项。
  buyingTrigger: 某个头部企业客户，或董事会级路线图评审，要求推出 AI 分析 Copilot；与此同时，安全和数据团队要求在上线前先证明答案既租户安全、又与 KPI 保持一致。
  currentAlternative: 基于 dbt 或类似 LookML 的模型，加上应用权限、提示词工程和人工 QA 的内部自建方案。
  switchingReason: 这层网关能缩短上线时间，把仪表盘和 Copilot 共用的指标逻辑集中管理，并给产品和安全团队提供可复现的证据，证明答案既符合权限要求也足够准确。
  pricingHypothesis: 采用年度平台订阅加受治理查询量计费，每条产品线起步约为 $40k-$100k ARR；随着更多终端用户使用 Copilot，再继续按用量扩张。
