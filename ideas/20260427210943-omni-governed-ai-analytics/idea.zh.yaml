jobsToBeDone:
  - job: 当企业客户要求提供应用内分析 Copilot 时，帮助产品副总裁快速上线可信答案，从而在不发生分析事故的前提下拿下扩展收入。
    currentAlternative: 围绕数据仓库模型、应用代码和提示词调优的内部自建方案
    successMetric: GA 上线所需时间，以及高严重度回答错误或租户泄露事件为零
  - job: 当指标定义发生变化时，帮助数据平台负责人一次性更新所有仪表盘和 AI 回答入口，从而避免 KPI 漂移和支持升级。
    currentAlternative: 依赖 BI 模型、应用逻辑和 QA 表格之间的人工协同
    successMetric: 指标变更传播所需平均时间，以及分析支持工单的下降幅度
