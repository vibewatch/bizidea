topRisks:
  - name: 现有厂商顺势带货
    description: 现有 BI 或数据仓库厂商可能会补上类似的语义 API，并把它打包进更大的平台合同里。
    mitigation: 先从现有厂商最薄弱的位置下手：面向外部客户的 Copilot 需要租户感知权限、应用内嵌和产品级运行时保证，这些都更难被它们快速补齐。
  - name: 内部自建偏好
    description: 强势的产品和数据团队可能会觉得，靠 dbt、提示词代码和现有应用权限就能把这件事拼出来。
    mitigation: 用更快部署、回归测试、可审计性，以及可量化的上线风险下降取胜——这些能力自建后通常最难长期维护。
  - name: 证明点仍然稀缺
    description: 这个集群只有一个经过核实的同日来源，所以市场信号也许真实，但目前记录仍偏少。
    mitigation: 早期 GTM 先聚焦那些已经承诺在 2026 年上线 AI 分析的共创客户，再用实施速度、通过的安全评审和被解锁的扩展收入来验证。