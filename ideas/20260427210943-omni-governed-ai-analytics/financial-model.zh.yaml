  round: pre-seed
  amountM: 2.4
  runwayMonths: 30
  milestone: 达到约 10 条生产级产品线、核心部署周期压到 45 天以内，并跑通一条伙伴辅助交付路径，同时为下一轮融资保留 6 个月缓冲。
