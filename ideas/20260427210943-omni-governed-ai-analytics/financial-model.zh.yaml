      percentage: 15.0
scenarios:
  downside:
    description: 试点转化更慢、ARPU 略被压缩、流失稍高时，公司会在接近自我造血前被迫追加一轮过桥融资。
    y3RevenueK: 1530.47
    y3EbitdaK: -1020.34
    cashLowPointK: -531.64
    keyAssumptionChanges:
      - 每条活跃产品线的 ARPU 降到 $90K。
      - 月度流失率升至 1.3%。
      - Y3 新增产品线从 33 条放缓到 26 条。
  base:
    description: 参考客户和一条收得很窄的伙伴路径，让公司把创始人主导的试点逐步复利成一条可复制的受治理分析切口。
    y3RevenueK: 2382.65
    y3EbitdaK: -423.81
    cashLowPointK: 202.11
    keyAssumptionChanges:
      - 综合 ARR 保持在 $100K。
      - 月度流失率维持在 1.0%。
      - Y2-Y3 新增签约按 1/2/2/2 和 6/8/9/10 的季度爬坡执行。
  upside:
    description: 伙伴拉动和用量扩张让 Q4Y3 的 EBITDA 由负转正，并接近一条干净的 seed-to-Series A 交接线。
    y3RevenueK: 3394.26
    y3EbitdaK: 284.31
    cashLowPointK: 795.12
    keyAssumptionChanges:
      - 通过超额用量和第二条产品线扩张，把 ARPU 拉升到 $108K。
      - 月度流失率改善到 0.8%。
      - 参考账户验证交付手册后，Y2-Y3 的新增签约进一步前移。
sensitivity:
  - variable: ARPU
    downsideCase: 每条活跃产品线的综合 ARR 为 $90K
    baseCase: 综合 ARR 为 $100K
    upsideCase: 综合 ARR 为 $108K
    y3RevenueImpactK: -238.27
    cashImpactK: -220.51
  - variable: CAC
    downsideCase: 每笔新签的销售与市场支出高出 20%
    baseCase: 综合 CAC 为 $35.9K
    upsideCase: 通过伙伴带来线索后，支出降低 10%
    y3RevenueImpactK: 0.0
    cashImpactK: -77.4
  - variable: churn
    downsideCase: 月度 logo 流失率为 1.3%
    baseCase: 月度 logo 流失率为 1.0%
    upsideCase: 月度 logo 流失率为 0.8%
    y3RevenueImpactK: -53.85
    cashImpactK: -47.22
  - variable: sales cycle
    downsideCase: 平均销售周期延长约 60 天，导致签约整体后移两个月
    baseCase: 约 120 天的试点到生产周期
    upsideCase: 安全证据包让转化时间缩短约 30 天
    y3RevenueImpactK: -459.35
    cashImpactK: -426.93
  - variable: gross margin
    downsideCase: 毛利率比计划低 5 个点
    baseCase: 稳态毛利率为 70%
    upsideCase: 自动化让毛利率比计划高约 3 个点
    y3RevenueImpactK: 0.0
    cashImpactK: -158.94
  - variable: hiring pace
    downsideCase: 在验证重复性之前，第二位产品、运营和解决方案岗位被提前招入
    baseCase: 以里程碑为闸门的招聘计划
    upsideCase: 非必要的后续招聘延后到收入被验证之后
    y3RevenueImpactK: 0.0
    cashImpactK: -87.5
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionProductLines
      ProductionProductLines --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: Base 情况下的 Y3 收入，建立在约 40.4 条活跃产品线、每条约 $100K 综合 ARR，以及公司已经证明“试点到生产”动作可复制之上。
  - checkName: 必须做对的事
    finding: 这套计划能否成立，关键在于公司是否能足够快地把早期试点转成生产参考案例，从而支撑 Y3 里 6/8/9/10 的季度落地节奏，而不是在此之前就过度招人。
  - checkName: 模型会失效的情况
    finding: 如果 ARPU 掉到 $90K，且销售周期再拉长约 60 天，Downside 情况会在 Y3 结束前把现金打到约 -$531.6K。
  - checkName: 下一轮融资需要的证明点
    finding: 约 10 条生产级产品线、核心部署周期压到 45 天以内，以及 Q4Y3 可见的 EBITDA 拐点，就是支撑下一轮融资的关键经营证明。
sanityChecks:
  ruleOf40: Y3 增长 262.0% + EBITDA 利润率 -17.8% = 244.2%（由于 Y2 收入基数仍小，这个数被明显放大）。
  burnMultiple: Y2 burn multiple 为 1.56x；到 Y3 改善至 0.14x，因为净新增 ARR 的增长开始快过 burn。
  revenuePerFte: 以平均 9.8 FTE 计算，Y3 每名员工对应收入约为 $242K（处于 SaaS $200–400K 的常见区间内）。
  flags:
    - 如果 Downside 假设成立，年末前就会出现资金缺口，因此这轮融资只有在付费试点的紧迫度真实存在、且成交节奏保持紧凑时才成立。
    - 模型里的 Y3 增长需要一条伙伴辅助分发路径；如果完全依赖创始人亲自销售，达到 40-45 条部署的概率会明显降低。
    - CAC 回本看起来很漂亮，主要因为定价更像企业软件；但直接付费意愿证据仍然有限，必须在前三个试点里验证。
    - 现金滚动没有计入年度预付款对营运资金的改善；这让模型偏保守，但实际回款纪律仍会很关键。
