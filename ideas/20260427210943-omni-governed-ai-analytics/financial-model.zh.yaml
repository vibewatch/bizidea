fundingAsk:
  round: pre-seed
  amountM: 2.4
  runwayMonths: 30
  milestone: "达到约 10 条生产产品线、核心部署用时低于 45 天，并建立一条合作伙伴辅助交付动作，同时在下一轮融资前保留 6 个月缓冲。"
  useOfFunds:
    - bucket: 工程
      amountUsd: 1020000
      percentage: 42.5
    - bucket: GTM
      amountUsd: 720000
      percentage: 30.0
    - bucket: G&A
      amountUsd: 300000
      percentage: 12.5
    - bucket: 缓冲（6 个月）
      amountUsd: 360000
      percentage: 15.0
scenarios:
  downside:
    description: "试点转化更慢、ARPU 受到一定压缩、流失略有恶化，会迫使公司在模型达到自我造血前先进行过桥融资。"
    y3RevenueK: 1530.47
    y3EbitdaK: -1020.34
    cashLowPointK: -531.64
    keyAssumptionChanges:
      - ARPU 降至每条活跃产品线 $90K。
      - 月度流失率升至 1.3%。
      - Y3 新增产品线胜出从 33 条放缓至 26 条。
  base:
    description: "参考客户与一条狭窄的合作伙伴动作使公司能够把创始人主导试点复利成一个可复制的受治理分析切口。"
    y3RevenueK: 2382.65
    y3EbitdaK: -423.81
    cashLowPointK: 202.11
    keyAssumptionChanges:
      - ARPU 保持在综合 ARR $100K。
      - 月度流失率维持在 1.0%。
      - Y2-Y3 新增胜出遵循 1/2/2/2 和 6/8/9/10 的季度爬坡。
  upside:
    description: "合作伙伴带动和使用量扩张会让 Q4Y3 的 EBITDA 足够转正，从而接近一次干净的 seed-to-Series A 交接。"
    y3RevenueK: 3394.26
    y3EbitdaK: 284.31
    cashLowPointK: 795.12
    keyAssumptionChanges:
      - ARPU 通过使用量超额和第二条产品线增长扩展到 $108K。
      - 月度流失率改善至 0.8%。
      - 参考账户验证部署手册后，Y2-Y3 的胜出会更早发生。
sensitivity:
  - variable: ARPU
    downsideCase: 每条活跃产品线综合 ARR 为 $90K
    baseCase: 综合 ARR 为 $100K
    upsideCase: 综合 ARR 为 $108K
    y3RevenueImpactK: -238.27
    cashImpactK: -220.51
  - variable: CAC
    downsideCase: 每次成交的销售和市场支出提高 20%
    baseCase: 综合 CAC 为 $35.9K
    upsideCase: 通过合作伙伴获客把支出降低 10%
    y3RevenueImpactK: 0.0
    cashImpactK: -77.4
  - variable: churn
    downsideCase: 月度 logo 流失率 1.3%
    baseCase: 月度 logo 流失率 1.0%
    upsideCase: 月度 logo 流失率 0.8%
    y3RevenueImpactK: -53.85
    cashImpactK: -47.22
  - variable: sales cycle
    downsideCase: 平均销售周期延长约 60 天，并把赢单整体后移两个月
    baseCase: 约 120 天的 pilot-to-production 动作
    upsideCase: 安全证据包将转化缩短约 30 天
    y3RevenueImpactK: -459.35
    cashImpactK: -426.93
  - variable: gross margin
    downsideCase: 毛利率比计划低 5 个点
    baseCase: 稳态毛利率 70%
    upsideCase: 自动化使毛利率比计划高约 3 个点
    y3RevenueImpactK: 0.0
    cashImpactK: -158.94
  - variable: hiring pace
    downsideCase: 在可复制性尚未证明前就提前招聘第二位产品、运营和解决方案岗位
    baseCase: 以里程碑为闸门的招聘计划
    upsideCase: 可选的后期招聘等到收入表现验证后再启动
    y3RevenueImpactK: 0.0
    cashImpactK: -87.5
modelDiagram:
  title: 单元经济流转图
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionProductLines
      ProductionProductLines --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基础情景下的 Y3 收入由 40.4 条活跃产品线驱动，综合 ARR 约 $100K，前提是公司证明了可被引用的 pilot-to-production 动作。"
  - checkName: 必须做对的事
    finding: "该计划依赖于足够快地把早期试点转化为生产参考案例，从而支撑 Y3 的 6/8/9/10 季度落地爬坡，同时避免过早过度招聘。"
  - checkName: 模型失效条件
    finding: "如果 ARPU 下滑到 $90K，且销售周期延长约 60 天，那么 downside 情景会在 Y3 结束前出现约 $531.6K 的现金缺口。"
  - checkName: 下一轮融资证明点
    finding: "大约 10 条生产产品线、低于 45 天的部署周期，以及可见的 Q4Y3 EBITDA 拐点，是足以支撑下一轮融资的运营证明点。"
sanityChecks:
  ruleOf40: "Y3 增长率 262.0% + EBITDA 利润率 -17.8% = 244.2%（由于 Y2 收入基数仍小，因此该指标被放大）。"
  burnMultiple: "Y2 burn multiple 为 1.56x，随着净新增 ARR 跑赢 burn，Y3 改善至 0.14x。"
  revenuePerFte: "按平均 9.8 FTE 计算，Y3 每名员工对应收入为 $242K（SaaS 基准为 $200–400K）。"
  flags:
    - 如果付费试点紧迫性不真实且成交节奏不够紧，该轮融资在 downside 假设下会在年末前产生资金缺口。
    - 模型中的 Y3 增长要求 Y2 之后存在合作伙伴辅助分发；如果完全依赖创始人主导销售，40-45 条部署目标很可能落空。
    - CAC 回本看起来很强，是因为定价接近企业软件水平；但直接的付费意愿证据仍然有限，应在前三个试点中验证。
    - 现金滚动未计入年度预付带来的营运资本收益；这偏保守，但实际回款纪律仍然重要。
