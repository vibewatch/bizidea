openQuestions:
- How many target buyers will fund a separate control-plane vendor before their customer-facing copilot is already in production?
- Is the first must-have feature answer regression testing, permission enforcement, or auditability/reporting for security teams?
- Can the startup integrate deeply enough with existing embedded analytics SKUs to avoid being pulled into a full BI replacement evaluation?
- Will warehouse-native AI analytics from Snowflake/BigQuery be good enough for the majority of early design partners?
