competitors:
- name: Omni
  stage: scale-up
  wedge: Full AI analytics platform with semantic model, embedded analytics, and MCP/AI surfaces.
  pricing: Custom enterprise pricing; broader platform sale.
  strength: Strong governance narrative, recent funding, customer-facing analytics proof points.
  weaknessVsUs: Asks buyers to adopt more of the analytics stack instead of a narrow runtime gateway.
  sourceRefs:
  - 1
  - 5
  - 6
  - 7
- name: Cube
  stage: scale-up
  wedge: Headless semantic layer and embedded analytics infrastructure with multitenancy and chat APIs.
  pricing: Free/self-serve plus annual order forms and usage overages.
  strength: Closest architectural substitute; strong developer orientation and tenant-aware controls.
  weaknessVsUs: Less opinionated about answer governance workflows, regression testing, and product-manager-friendly launch controls.
  sourceRefs:
  - 9
  - 10
  - 11
  - 12
- name: ThoughtSpot
  stage: incumbent
  wedge: Agentic analytics platform centered on Spotter and broader semantic/BI ownership.
  pricing: User and usage-based data pricing.
  strength: Enterprise brand, trusted analytics agent positioning, strong UX.
  weaknessVsUs: Better suited when buyer wants a new analytics front end, not a neutral tenant-safe runtime inside an existing SaaS product.
  sourceRefs:
  - 25
  - 26
- name: Sigma
  stage: scale-up
  wedge: Warehouse-native analytics, embedded apps, and AI applications with inherited warehouse security.
  pricing: Custom; license tiers tied to permissions and usage.
  strength: Strong warehouse-native posture, RLS/CLS support, interactive embedded product story.
  weaknessVsUs: Still a broader analytics/application platform rather than a minimal governance gateway.
  sourceRefs:
  - 27
  - 28
- name: Snowflake Cortex Analyst
  stage: incumbent
  wedge: API-first conversational analytics on Snowflake semantic views and warehouse security.
  pricing: Bundled/cloud consumption based.
  strength: Native distribution, credible text-to-SQL stack, semantic-view momentum.
  weaknessVsUs: Snowflake-specific and incomplete on app-layer tenant policy orchestration across customer-facing SaaS workflows.
