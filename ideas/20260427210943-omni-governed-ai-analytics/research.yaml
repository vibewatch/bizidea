  validationPlan:
  - priority: high
    question: Will VP Product buyers pay to avoid tenant-safety and KPI-consistency launch risk, or will they still prefer internal build?
    evidenceToGather: 10 buyer interviews plus 3 live design-partner evaluations comparing internal-build timeline vs gateway deployment.
  - priority: high
    question: 'Which control is most budget-creating: permissions, answer regression testing, lineage/audit log, or safe fallback UX?'
    evidenceToGather: Problem-ranking interviews with analytics engineers and product leaders; ask for security review artifacts and launch blockers.
  - priority: medium
    question: How often do external analytics copilots need to span multiple data stores or tools rather than one warehouse-native stack?
    evidenceToGather: Architecture diagrams from 5 target accounts and partner interviews with dbt/SI implementers.
  - priority: medium
    question: Can the product land without displacing the incumbent embedded analytics UI?
    evidenceToGather: Prototype integrations inside one existing dashboard SKU using signed embed/API paths from current stacks.
