    isEstimate: true
    sourceRefs:
    - 1
    - 7
    - 19
    - 24
    - 28
  sam:
    value: $125.0M
    rationale: 估算逻辑：约 250 个符合滩头画像的北美消费电子、AR/VR 和联网设备业务单元 × 首条正式生产走廊约 $500k ACV。
    isEstimate: true
    sourceRefs:
    - 1
