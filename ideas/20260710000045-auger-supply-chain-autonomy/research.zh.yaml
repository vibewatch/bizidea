competitors:
- name: Auger
  stage: scale-up
  wedge: 压在 ERP、WMS、TMS 和计划系统之上的自主运营层，可重分配库存，并把更新后的计划回写进现有工具。
  pricing: 企业级定制定价（未公开）。
  strength: AI 原生叙事最强，明确强调回写，并且在完全相同的叠加式自主赛道上已经拿到早期企业客户。
  weaknessVsUs: 它的定位更宽，更像“自主供应链操作系统”；创业公司可以把“单一上市缺货工作流 + 人还在回路里的上线节奏”讲得更尖。
