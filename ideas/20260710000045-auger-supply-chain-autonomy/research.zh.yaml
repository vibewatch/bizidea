  - 5
- name: Kinaxis
  stage: incumbent
  wedge: 并行计划与库存响应平台，用于快速情景建模和企业级供应链协同。
  pricing: 企业级定制定价（未公开）。
  strength: 计划侧口碑深、实时情景分析强，在复杂制造环境里已被长期接受。
  weaknessVsUs: 它通常以更大的计划转型项目切入，这给范围更窄、初始 ROI 更清晰的缺货台产品留了窗口。
