    isEstimate: true
    sourceRefs:
    - 19
    - 20
    - 28
    - 32
bottomUpSizingDrivers:
- driver: 总可触达业务单元数
  value: ~2,000 个拥有多节点缺货台的全球大型离散制造业务单元
  source: calc
- driver: 滩头业务单元数
