jobsToBeDone:
  - job: >-
      When a supplier slip threatens a launch window, help the control-tower
      lead decide which orders, regions, and channels get scarce inventory
      first, so they can protect revenue and service commitments.
    currentAlternative: "War-room spreadsheets and manual ERP reallocations"
    successMetric: "Hours from shortage alert to executed allocation plan"
  - job: >-
      When planners are juggling warehouse stock, in-transit inventory, and
      customer priorities, help the network planner push a coordinated plan
      back into existing systems, so they can reduce expedites and avoid
      unnecessary order decommits.
    currentAlternative: "Dashboard review followed by email, chat, and ad hoc system updates"
    successMetric: "Fill rate preserved and expedite spend reduced per exception event"
