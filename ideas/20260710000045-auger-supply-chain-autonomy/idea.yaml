topRisks:
  - name: "Autonomy trust gap"
    description: "Supply-chain leaders may refuse autonomous write-back on high-stakes allocations until governance is proven."
    mitigation: "Start with human approval, role-based guardrails, explainable tradeoff scoring, and audit-ready logs before expanding to auto-execution."
  - name: "Dirty cross-system data"
    description: "Late or inconsistent order, inventory, and transport data can make a recommended reallocation wrong at the moment it is executed."
    mitigation: "Launch on customers with stable interfaces, score every action for data confidence, and fall back to recommendation-only mode when data freshness drops."
  - name: "Incumbent suite response"
    description: "ERP, planning, or control-tower vendors could add adjacent exception workflows once the ROI becomes visible."
    mitigation: "Win by integrating across mixed stacks, owning the cross-system decision-outcome dataset, and delivering value on one exception corridor faster than suites can ship."
