differentiator: >-
  This is not a visibility dashboard and not a full planning-suite replacement.
  The product owns the high-stakes last mile of exception execution: who gets
  scarce inventory, what gets decommitted, and which logistics plan is pushed
  back into the system right now. Its defensible asset is the decision-policy
  graph linking customer priority, SLA, margin, and network state to realized
  outcomes, plus the audit trail and write-back integrations that make deeper
  autonomy trusted over time.
