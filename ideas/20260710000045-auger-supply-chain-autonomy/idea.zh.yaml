jobsToBeDone:
- job: 当供应商延期威胁上市窗口时，帮控制塔负责人决定哪些订单、区域和渠道先拿到稀缺库存，好守住收入和服务承诺。
  currentAlternative: 战情室表格和手工 ERP 重分配
  successMetric: 从缺货预警到分配方案执行完成的小时数
- job: 当规划员同时盯着仓内库存、在途库存和客户优先级时，帮网络规划负责人把一套协调后的方案回写进现有系统，好减少加急，也少做不必要的取消承诺。
  currentAlternative: 先看仪表盘，再靠邮件、聊天和临时系统更新去执行
  successMetric: 每次异常里守住的满足率，以及压掉的加急支出
