problem: 消费者硬件一到发布期，团队还是得在 Excel、邮件和聊天软件里打缺货战情室，因为没有任何核心系统能把 ERP 配额、仓储可用量、在途库存和客户优先级放到一处裁决。只要元器件延期或需求猛增，规划员就得手工决定哪些订单先吃缺口、哪些库存要重分配、哪些货要加急，往往等卖货窗口已经明显收窄才动手。现有控制塔能报预警，却很少把一份可执行的跨系统方案回写进栈里，所以每逢大异常，收入、满足率和毛利都会往外漏。
targetUser:
  primary: 负责上市关键缺货处置的消费硬件业务单元供应链控制塔负责人
  secondary: 负责缺货分诊的库存分配经理或网络规划经理
  buyer: 业务单元的供应链副总裁、COO 或运营 GM
startupThesis:
  nonObviousInsight: 真正的突破不是预测更准，而是做出一层企业敢放权的执行层：它能横跨 ERP、WMS、TMS 和计划工具裁决异常，又不逼企业把这些系统整套替换掉。只要软件既能读跨栈状态，也能把选定的重分配动作回写进现有系统，缺货处置就不再是规划员临时拉的战情室，而是可重复的产品。
  beachhead: 北美消费电子、AR/VR 和联网设备业务单元；有代工伙伴、至少 3 个区域履约节点，而且每天都要在缺货台上决定哪类上市单或渠道单先拿到受限库存。
  wedge: 先给一个上市关键产品族做缺货处置自动驾驶：吃进订单优先级、在途库存、仓内状态和运输选项，然后给出或直接执行库存重分配、取消承诺和加急运输决策，并留下审计轨迹。
  whyNowCatalyst: Auger 的融资和点名客户说明，企业现在愿意为能在现有供应链栈里动手的叠加式自主层买单，而不是再买一个可视化看板。
  ventureScalePath: 先从硬件上市缺货台切进去，再扩到供应商延误响应、渠道分配、退货再平衡，以及服装、工业、医疗和 CPG 供应链里的日常网络异常执行。
solution: 先做一套系统，吃进客户现有栈里的订单、库存、发运和计划数据，给一个产品族或一个上市项目拼出实时异常视图。每次缺货事件发生，产品都按服务水平、收入、毛利和运输成本给各类权衡打分，然后生成一份重分配和执行方案。第一版先把人留在回路里：一键批准、稳定回写到现有系统，不碰替换。时间一长，每次动作是被接受还是被否掉，都会变成调策略的训练数据，软件也就能一点点接管更多缺货台动作。
goToMarketSeed:
  firstCustomer: 年收入 $1B+ 的消费硬件品牌；走零售和 DTC，ERP 用 SAP 或 Oracle，另有独立计划套件，北美至少 3 个履约节点，而且每周都在开上市缺货战情室。
  buyingTrigger: 即将到来的设备上市、供应商延期或渠道需求暴涨，让团队每天都得开缺货分配电话会，零售和 DTC 的服务承诺也开始吃紧。
  currentAlternative: 规划员战情室：Excel、邮件或 Slack、BI 看板，再加手工跑 ERP、WMS 和 TMS 交易。
  switchingReason: 这个切口只解决一个最痛的流程，不要求替换计划栈，而且能把价值直接打在挽回的上市收入、减少的加急支出和更快的异常处理周期上。
  pricingHypothesis: 按业务单元和托管网络节点收年费，再按月度异常量做扩容档位。
