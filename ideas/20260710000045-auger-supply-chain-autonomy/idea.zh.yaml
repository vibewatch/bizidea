topRisks:
- name: 自治信任缺口
  description: 在治理能力没跑通前，供应链负责人可能不会让高风险库存分配直接自动回写。
  mitigation: 先从人工审批、基于角色的护栏、可解释的权衡打分和可审计日志做起，再逐步放开到自动执行。
- name: 跨系统脏数据
  description: 只要订单、库存或运输数据晚到、错位，推荐出来的重分配在执行那一刻就可能已经不对。
  mitigation: 先在接口稳定的客户里上线，给每个动作打数据置信度；一旦新鲜度掉下来，就退回只给建议的模式。
- name: 套件厂商反击
  description: 一旦 ROI 被看见，ERP、计划或控制塔厂商都可能很快补上相邻异常流程。
  mitigation: 赢法是跨混搭栈集成、拿住跨系统决策结果数据集，并在一条异常走廊里比套件更快交付价值。
