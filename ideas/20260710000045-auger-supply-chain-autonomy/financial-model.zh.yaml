slug: launch-shortage-autopilot
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] 模型从带日期的商业计划之后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3-4.5M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景取区间下限，因为招聘节奏仍算克制，而且公司会在 Y3 里转成 EBITDA 为正。'
- id: A3
  name: 起始付费业务单元数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，先得把付费试点卖出来。'
- id: A4
  name: 客户定义
  value: 一个处于付费状态的活跃业务单元或缺货走廊；可能是付费试点，也可能是年度生产合同
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop 统计的是付费走廊，不是单个终端用户。'
- id: A5
  name: 付费试点单价
  value: 约 3 个月 $100K（约 $33K/月）
  unit: USD/business unit
  source: '[BP gtm.pricing $75k-$125k paid pilot] 模型取一个上市关键产品族试点的中位值。'
- id: A6
  name: 正式生产合同与扩张单价
  value: 初始正式生产约 $480K ARR（约 $40K/月），到 Y3 随节点和渠道扩张，逐步逼近约 $600K ARR（约 $50K/月）
  unit: USD/business unit/year
  source: '[BP market.sam roughly $500k initial ACV + BP market.som roughly $600k blended ARR + BP gtm.pricing $300k-$600k annual subscription] 模型从 SAM 锚点起步，只在节点和渠道扩张后才走到 SOM 锚点。'
- id: A7
  name: 客户爬坡
  value: M12 时 2 个付费业务单元，Y2 Q4 时 6 个，Y3 Q4 时 15 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + BP market.som 15 live production BUs] 基准情景对齐第 1 年 2 个付费试点、第 2 年 5-7 个正式生产业务单元，以及第 3 年底达到 15 个业务单元的 SOM 目标。'
- id: A8
  name: 收入确认规则
  value: 活跃付费业务单元数 × 每条走廊的混合已实现收入：Y2 前每季度约 $100K-$110K，Y3 前段约 $97K-$120K（新试点仍在混入），到 Y3 Q4 约 $150K/季度
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som] 这样能让收入直接绑在付费走廊数量和定价结构上。'
- id: A9
  name: 试点转正式生产周期
  value: 前 6 个业务单元约 90 天，等标准连接器和剧本证明后，再压到 60-75 天
  unit: days
  source: '[BP strategicChoices.sequencingRationale + BP experimentRoadmap live pilot and procurement tests + BP investorMemo.mustBeTrue convert within 120 days] Y3 的爬坡要成立，部署速度必须更快，但仍得在可信范围内。'
- id: A10
  name: 毛利率爬坡
  value: Y1 为 45%-55%，Y2 为 58%-67%，Y3 为 68%-70%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research adoptionFrictionMatrix dirty cross-system data] 早期交付更偏服务，只有连接器复用和治理模板跑出来，毛利才能抬上去。'
- id: A11
  name: 招聘时间表
  value: M1 创始人/CEO、创始工程师和工作流负责人；M4 集成架构师；M8 实施/客户成功；M12 企业销售；M15 第二位工程师；M18 运营；M21 第二位集成/解决方案；M24 第三位工程师；M27 第二位实施/客户成功；M30 第二位销售/伙伴；M32 第四位工程师
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 只有在前几个试点和正式生产证明出现后，才补交付与 GTM 人手。'
- id: A12
  name: 创始人全成本薪酬
  value: $180.0K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] 采用精简创始人现金薪酬，并计入福利和薪资税。'
- id: A13
  name: 工程全成本薪酬
  value: $200.4K per FTE
  unit: USD/year
  source: '[BP team founding eng + startup-finance heuristic] 混搭栈集成和优化工作需要资深工程人才。'
- id: A14
  name: 供应链工作流负责人全成本薪酬
  value: $184.8K
  unit: USD/year
  source: '[BP team Supply chain workflow lead + startup-finance heuristic] 这个岗位要同时吃下行业知识、策略设计和面向客户的试点工作。'
- id: A15
  name: 集成 / 解决方案全成本薪酬
  value: $189.6K per FTE
  unit: USD/year
  source: '[BP team Integration / solutions architect + startup-finance heuristic] 对应 ERP、WMS、TMS 和计划栈的集成负责人，也覆盖售前方案设计。'
- id: A16
  name: 实施 / 客户成功全成本薪酬
  value: $159.6K per FTE
  unit: USD/year
  source: '[BP team Implementation and customer success lead + startup-finance heuristic] 假设这是技术型岗位，但还不到合伙人级别的薪酬。'
- id: A17
  name: 销售 / 伙伴全成本薪酬
  value: $219.6K per FTE
  unit: USD/year
  source: '[BP team Enterprise seller / partnerships lead + startup-finance heuristic] 含浮动薪酬、差旅和企业外勤销售成本。'
- id: A18
  name: 运营 / G&A 全成本薪酬
  value: $129.6K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 覆盖财务、供应商和合规运营，但不提前搭完整后台。'
- id: A19
  name: 薪酬分摊到损益表
  value: 创始人 50% 计入 S&M / 30% 计入 R&D / 20% 计入 G&A；工程 100% 计入 R&D；工作流负责人 80% 计入 R&D / 20% 计入 G&A；集成 30% 计入 S&M / 70% 计入 R&D；实施 50% 计入 S&M / 50% 计入 R&D；销售 100% 计入 S&M；运营 100% 计入 G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 这样能把创始人主导销售和实施密集型交付的成本结构看清。'
- id: A20
  name: 非薪酬 Opex 爬坡
  value: S&M 每月 $8K-$32K，R&D 每月 $12K-$28K，G&A 每月 $7K-$14K，覆盖 36 个月
  unit: USD/month
  source: '[BP operations + BP gtm.channels + Research regulatoryLandscape + startup-finance heuristic] 这笔钱覆盖云开销、差旅、法务、保险和审计/合规工具，不假设重型付费获客。'
- id: A21
  name: 现金转换规则
  value: EBITDA 近似代表现金变动
  unit: formula
  source: '[startup-finance heuristic] 假设在 pre-seed 阶段，税费、CapEx、债务服务和营运资金时差都不构成实质影响。'
- id: A22
  name: 月度 churn
  value: 1.8%
  unit: percent/month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP expansionLevers + BP investorMemo.mustBeTrue] 一旦工作流嵌进去，这类产品会比较黏，但模型没有假设零流失。'
- id: A23
  name: CAC 口径
  value: Y1-Y2 的销售与市场费用约 $171K / 每个首波正式生产业务单元
  unit: USD/business unit
  source: '[model calc using Y1-Y2 S&M spend divided by 6 production BUs at Q4Y2 + BP funnelTargets] 这是按首批证明样本算出的保守 CAC，而不是 36 个月放大后的平均值。'
- id: A24
  name: 用于融资规模的下一轮里程碑
  value: 6 个正式生产业务单元、2 个可引用客户、25% 伙伴来源的合格商机池，以及 1 个受控低风险自动执行部署
  unit: milestone
  source: '[BP milestones 12-24 months + BP experimentRoadmap + BP fundingAsk.useOfFundsSummary] 这就是这笔 pre-seed 必须资助到位的可进种子轮证明包。'
- id: A25
  name: 季度薪酬规则
  value: Y2-Y3 的薪酬行按季度内实际月度入职节奏滚算，而不是只看季度末快照
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] 这样即便公开 headcount 只展示季度末点位，工资费用仍和月度招聘爬坡一致。'
