scenarios:
  downside:
    description: 套件竞争更强、集成更慢、买方更谨慎，导致公司跑不到计划中的正式生产业务单元增速，毛利也没法完全归一。
    y3RevenueK: 4050.0
    y3EbitdaK: -320.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Y3 Q4 的 customersEop 只有 11 个，不是 15 个；因为伙伴来源商机池不达预期，销售周期也一直停在接近 120 天。
    - 成熟正式生产价值封顶在约 $500K ARR，而不是研究里的约 $600K 混合水平。
    - 毛利率期末只到约 66%，因为实施和连接器工作仍然更偏定制。
  base:
    description: 基准情景沿着 BP 的里程碑走：第 1 年 2 个付费试点，第 2 年 5-7 个正式生产业务单元，到 Y3 Q4 时 15 个活跃付费业务单元。
    y3RevenueK: 5830.0
    y3EbitdaK: 989.5
    cashLowPointK: 1029.1
    keyAssumptionChanges:
    - 活跃付费业务单元从 M12 的 2 个，爬到 Y2 Q4 的 6 个，再到 Y3 Q4 的 15 个；途中从创始人直销扩到伙伴辅助渠道。
    - 正式生产走廊的价值从约 $480K ARR 起步，随着节点与渠道扩张，加上初步自动执行，到 Y3 后段接近约 $600K ARR。
    - 毛利率从 Y1 以试点服务为主的 40% 多，一路爬到 Y3 Q4 时 BP 目标的 70%。
  upside:
    description: 可引用客户和伙伴转介绍把转化提前拉动，公司能更早签下更多正式生产业务单元，也能更早挂上高级自动化模块。
    y3RevenueK: 6750.0
    y3EbitdaK: 1650.0
    cashLowPointK: 1150.0
    keyAssumptionChanges:
    - Y3 Q4 的 customersEop 到 18 个而不是 15 个，因为伙伴来源交易在 Y2 就占到超过 25% 的合格商机池。
    - 混合正式生产价值更早走到约 $650K ARR，因为自动执行和第二条走廊模块更早挂上。
    - 随着连接器复用更快压低直接交付负担，毛利率期末能到约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 成熟正式生产价值停在约 $500K ARR。
  baseCase: 成熟正式生产价值到 Y3 Q4 时接近约 $600K ARR。
  upsideCase: 自动执行和第二条走廊扩张把成熟价值抬向约 $650K ARR。
  y3RevenueImpactK: -600.0
  cashImpactK: -420.0
- variable: CAC
  downsideCase: 企业销售周期要吃掉多 25% 的现场时间和方案设计，把 CAC 推向约 $215K。
  baseCase: 前 6 个正式生产业务单元的 CAC 稳在约 $171K。
  upsideCase: 伙伴热启动介绍把 CAC 压到更接近约 $150K。
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: churn
  downsideCase: 由于部分试点没能在客户内部继续扩张，月度 churn 升到 3.0%。
  baseCase: 工作流嵌进去后，月度 churn 稳在 1.8%。
  upsideCase: 审计轨迹和回写治理带来黏性，月度 churn 约 1.0%。
  y3RevenueImpactK: -360.0
  cashImpactK: -290.0
- variable: sales cycle
  downsideCase: 因为采购和 IT 审批继续拖慢，试点转正式生产仍然接近 120 天。
  baseCase: 前 6 个业务单元约 90 天，等标准连接器出来后，后续压到 60-75 天。
  upsideCase: 一旦能引用案例，Y2 起转化会压到约 60 天。
  y3RevenueImpactK: -820.0
  cashImpactK: -540.0
- variable: gross margin
  downsideCase: 由于交付仍然太定制，期末毛利率只能到 66%。
  baseCase: Y3 Q4 毛利率达到 BP 目标的 70%。
  upsideCase: 连接器复用和策略模板更快标准化，毛利率可到约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -230.0
- variable: hiring pace
  downsideCase: 在可引用案例还没跑出来前，第二位销售和支持岗位就提前两个季度入场。
  baseCase: 放大招聘严格跟着 BP 的排序来，只在试点和正式生产证明后补人。
  upsideCase: Y3 最后几位招聘会等到第 13 个正式生产业务单元上线后再进场，也不拖增长。
  y3RevenueImpactK: 0.0
  cashImpactK: -300.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  TargetAccounts[Target hardware business units] --> PaidPilots[Paid pilots]\n  PaidPilots --> ProductionBUs[Production business units]\n  ProductionBUs --> ExpansionModules[Node and channel expansion]\n  ExpansionModules --> Revenue[Revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入由两条轴驱动：M12 时 2 个活跃付费业务单元，到 Y3 Q4 时增到 15 个；同时每条走廊的价值从试点定价慢慢爬到约 $600K 成熟 ARR。
- checkName: 必须跑对的事
  finding: 标准连接器和人审回写必须把试点转正式生产压到大约一个季度，否则从 Y2 Q4 的 6 个付费单元跳到 Y3 Q4 的 15 个，会直接滑坡。
- checkName: 模型会失效如果
  finding: 如果正式生产价值卡在 $500K ARR 左右，或毛利率一直起不来到 70%，Y3 的 EBITDA 就转不正，$3.0M 的 pre-seed 也留不出舒服的 6 个月缓冲。
- checkName: 下一轮证明包
  finding: 种子轮要讲的故事是：6 个正式生产业务单元、2 个可引用客户、25% 伙伴来源商机池，以及 1 个受控低风险自动执行部署；同时账上现金仍高于约 $1.0M。
sanityChecks:
  ruleOf40: Y3 增长 197.4% + EBITDA 利润率 17.0% = 214.4%（主要是因为 Y2 基数太小，方向上能看，别拿它当成熟 SaaS 质量）。
  burnMultiple: 按约 $0.86M EBITDA burn 对应约 $1.68M 新增 exit ARR 计，Y2 burn multiple 约 0.5x；到 Y3 公司已经 EBITDA 转正，传统 burn multiple 的意义会下降。
  revenuePerFte: $448K 的 Y3 收入 / 13 名期末 FTE（略高于垂直 SaaS 常见的 $200-400K 区间，因为这里 ACV 是企业级）。
  flags:
  - 从 Y2 Q4 的 6 个活跃付费业务单元跳到 Y3 Q4 的 15 个，目标很激进，前提是伙伴渠道真的跑出来，而不是只停留在承诺上。
  - customersEop 既包含付费试点，也包含正式生产业务单元，所以在 Y1 和 Y2 前段，真正的经常性正式生产客户数会落后于表面上的付费客户数。
  - 只有当连接器复用显著压低定制实施量时，毛利率才能到 BP 目标的 70%；客户数据一脏，毛利可能就会卡在 60% 中段。
  - 现金按 EBITDA 建模，因此里程碑回款节奏、实施预付款和企业采购延迟，都会让真实现金曲线偏离模型。
  - $125M 的滩头 SAM 很集中，所以 1-2 个目标账户延后，就足以实质性改变 Y2 签约额和下一轮融资时点。
