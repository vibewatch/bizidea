slug: launch-shortage-autopilot
date: '2026-07-10'
executiveSummary: Launch Shortage Autopilot 最该从北美消费电子、AR/VR 和联网设备业务单元切入，做一层缺货处置操作层，因为这些团队到今天还在每周拉上市战情室。产品不是要替换计划套件；它吃进 ERP、WMS、TMS 和计划工具里的订单优先级、库存、发运和运输状态，然后围绕一个上市关键产品族，给出经人工批准的重分配、取消承诺或加急运输方案。第一个客户该是年收入 $1B+ 的硬件品牌：ERP 用 SAP 或 Oracle，另有独立计划栈，至少 3 个区域履约节点，而且眼下正遇到新品上市或供应商延期，靠表格分诊已经太慢。研究能撑起这条赛道，因为 Auger、FourKites、Blue Yonder、Kinaxis 和 o9 都已经开始卖从可视化走向动作的工作流，而 Auger 更证明了企业愿意在不替换核心系统的前提下，为叠加式自主层付费。第一单应该是一个业务单元的付费试点，先证明预警到动作的周期更快、加急支出更低、满足率能守住，再去要更大的自动化权限。只有扩张跑得通，这才是一条能做成创投生意的切口：当前估算是 $1.2B TAM、$125.0M 滩头 SAM 和第 3 年 $9.0M 的模型化 SOM。最大的执行风险，是跨系统脏数据、买方不愿放开受控回写，以及套件或更有钱的叠加层把功能打包带走。眼下最关键的缺口，是北美合格业务单元到底有多少，以及第一阶段买方肯放开的审批边界在哪，所以前 90 天必须死盯 ICP 映射、数据就绪度审计和治理设计。
problem:
- 控制塔团队今天还靠表格、邮件，以及手工跑 ERP、WMS 和 TMS 交易来处理上市缺货，因为没有任何系统能在一条闭环里，同时裁决订单优先级、库存位置、在途库存和客户承诺之间的权衡。
- 一旦元器件延期或需求暴涨，规划员就得决定哪些订单先吃缺口、哪些节点要重分配、哪些货要加急；很多时候，等他们动手，销售窗口已经开始收窄。
- 可视化和计划工具会报风险，但很少把一套可执行、可审计的跨系统方案推回栈里，所以每逢大异常，满足率、上市收入和毛利都会往外漏。
solution:
- 先为一个产品族吃进订单、库存、发运、ETA 和业务优先级数据，给团队一条实时缺货队列，并附上重分配、取消承诺、替代或加急运输的建议动作。
- 第一阶段把规划员留在回路里：用基于角色的审批、置信度分数和一键回写进现有系统，而不是逼客户替掉 ERP 或计划软件。
- 从每次被接受和被拒绝的动作里学习，按渠道、客户层级、SLA、毛利和节点状态去调缺货策略，然后再把低风险场景放开到受控自动执行。
whyWeWin:
- 这个切口比 Kinaxis、o9 或 Blue Yonder 更窄，也更容易上线，因为我们卖的是缺货台，不是整套计划转型。
- 在混搭的 ERP、WMS、TMS 和计划栈之间做厂商中立的回写，本来就不是偏物流的可视化网络或企业内部战情室能轻易复刻的。
- 把优先级规则、已批准动作与最终服务或毛利结果串起来的决策策略历史，会变成专有资产；那些今天还靠表格驱动的宽套件，反而抓不到这层数据。
- 审计轨迹和人工审批日志，正好对冲关税、出口管制、强迫劳动和 AI 治理这些会拖慢自主动作落地的顾虑。
strategicChoices:
  beachhead: 北美消费电子、AR/VR 和联网设备业务单元；有代工伙伴、ERP 用 SAP 或 Oracle，至少 3 个区域履约节点，而且围绕上市关键 SKU 有反复出现的缺货台。
  wedgeRationale: 一个上市关键产品族就够痛：痛点集中、日常节奏统一，挽回的服务、少掉的取消承诺和更低的加急支出都能量化。比起一上来卖通用控制塔、计划套件替代，或整条自主供应链编排，这样更快拿到证明，也不必在数据就绪度和信任还没跑通前把摊子铺太大。
  sequencingRationale: 先把跨栈摄取、审批和受控回写做扎实，再谈自动执行，因为数据新鲜度和可审计性才是采用的总闸门。前 2-3 个试点之前，销售必须由创始人亲自打；等公司能拿出可重复的部署路径、KPI 抬升和业务单元里的明确预算线，再上伙伴和商业化杠杆。
  notYet:
  - 不做完整计划套件替代，也不做端到端供应链转型。
  - 不碰缺货台之外的供应商采购或寻源自动化。
  - 在硬件打法没跑顺前，不扩到服装、医疗、工业或 CPG。
  - 在人审回写还没证明既安全又有价值之前，不做完全自主的跨网络执行。
market:
  tam: $1.2B 的估算 TAM：大约 2,000 个全球大型离散制造业务单元，都有多节点缺货台；按每个业务单元稳态约 $600k ACV 计算。
  sam: $125.0M 的估算 SAM：大约 250 个符合滩头画像的北美消费电子、AR/VR 和联网设备业务单元；按首条正式生产走廊约 $500k ACV 计算。
  som: 模型里第 3 年的 SOM 为 $9.0M：15 个在线生产业务单元，单价混合到约 $600k ARR，前提是试点能转生产，并继续扩到更多节点和渠道。
  segments:
  - 北美消费电子、AR/VR 和联网设备业务单元；需求受上市节奏驱动，每周都要开缺货分配电话会。
  - 相邻的离散制造业务单元也有多节点缺货台，尤其是工业、服装和医疗运营商；它们同样卡在混搭栈下的计划到执行断层。
  buyingProcess: 交易通常由控制塔负责人、分配规划员或网络规划员发起——只要新品上市、供应商失手或关税变化逼得团队每天开缺货会。真正拍板的人一般是供应链副总裁、COO 或业务单元 GM；最可信的切入方式，是围绕一个产品族先做付费试点，等满足率保护、加急支出下降和周期缩短被量化后，再转成年费制的业务单元订阅。
product:
  mvp: MVP 只管一个业务单元里的一个产品族：从客户现有栈里吃进订单、库存、发运、ETA 和优先级数据，给缺货权衡打分，把建议动作送去给规划员审批，再带着审计轨迹回写进现有系统。
  sixMonth: 在 2 个共创客户试点里上线：标准 SAP 或 Oracle 的订单/库存连接器，外加 1 个 WMS、TMS 或可视化数据源、审批流，以及盯预警到动作时长、风险满足率和加急支出的 KPI 看板。
  twelveMonth: 补齐多节点支持、策略仿真、取消承诺和加急剧本，再加基于角色的治理，让团队能按产品族比较“推荐—批准—执行”三种状态。
  twentyFourMonth: 把低风险缺货动作放开到受控自动执行，把同一套策略引擎扩到硬件账户里的供应商延误响应和渠道分配，并把可复用连接器打包给相邻离散制造垂直行业。
  keyBets:
  - 一个产品族的范围配上标准连接器，足以在 45 天内跑到生产级证明。
  - 买方会先接受“人审 + 回写”的模式，再接受更宽的自主权。
  - 更快响应、少掉取消承诺和更低加急支出，足够撑起每年 $300k+ 的正式生产合同。
  - 真实缺货事件里的审批历史和结果历史，会滚成一套有防御力的策略数据集，宽套件很难快速补齐。
gtm:
  wedge: 在设备上市、供应商失手或需求猛增时切进去，替一个上市关键产品族做缺货处置系统：用共享动作队列、可审计建议和受控回写，取代表格战情室。
  channels:
  - 创始人主导直销，先打年收入 $1B+ 硬件品牌里的供应链转型负责人、控制塔负责人和业务单元运营负责人。
  - 等拿到 1 个生产案例后，再与云数据平台、ERP 相邻伙伴和系统集成商共销。
  - 再通过已经在目标账户里的可视化网络、3PL 和计划现代化项目拿转介绍。
  funnelTargets: 目标账户引荐→合格沟通 40%+；合格沟通→付费试点 20-30%；付费试点→正式生产 50%+；首个生产业务单元→12 个月内扩到第二条走廊 60%+
  pricing: 先围绕一个产品族、一个区域卖 $75k-$125k 的付费试点；跑通后，再按业务单元收 $300k-$600k 年费，按托管节点和月度异常量分档，受控自动执行模块另收溢价。这样既贴合现有上市运营预算，也让买方能用挽回的收入、守住的满足率和省下的加急支出来核这笔单，而不是按席位数算。
businessModel:
  revenueStreams:
  - 按业务单元或缺货走廊收平台年费，并按托管节点和月度异常量分档。
  - ERP、WMS、TMS 和计划系统的上线与连接器一次性费用。
  - 高级的受控回写、策略仿真，以及审计/合规模块。
  unitOfValue: 按业务单元管理的一条缺货处置走廊，价格随活跃节点和月度异常量走
  targetGrossMarginPct: 70
  expansionLevers:
  - 首个试点证明 ROI 后，先在第一个业务单元里加更多节点、区域和渠道。
  - 从一个产品族扩到同一账户里的相邻上市项目和常态化缺货走廊。
  - 缺货证明跑通后，再加供应商延误响应、渠道分配和退货再平衡。
  - 等硬件打法稳定后，再把集成与策略栈复用到相邻离散制造垂直行业。
strategyMap:
  northStarMetric: 一个上市关键产品族上，从缺货预警到分配决策获批并执行完成的中位小时数
  inputMetrics:
  - 每周都有缺货台且存在真实购买触发器的合格滩头账户数。
  - 缺货事件里，订单、库存、发运和优先级数据能自动新鲜挂上的比例。
  - 从缺货预警到动作获批并执行完成的中位小时数。
  - 相对客户基线，守住的满足率和省掉的加急支出。
  - 付费试点转正式生产，以及扩到第二条走廊的比例。
  moatsToBuild:
  - 把客户优先级、SLA、毛利、节点状态、已批准动作和最终结果连起来的决策策略历史。
  - 可复用的混搭栈连接器，加上数据新鲜度打分，既缩部署时间，也抬信任。
  - 沉淀到供应链治理和合规工作流里的审计与审批语料。
  killCriteria:
  - 前 20 个合格滩头账户里，9 个月内签下的付费试点少于 2 个。
  - 首 3 个试点里，每个账户都要花超过 45 天才能打通订单、库存、发运和优先级数据，并启用受控回写。
  - 前 3 个试点没能把预警到动作的中位时长压低至少 30%，也没把加急支出或取消承诺量压低至少 10%。
  - 付费试点转正式生产长期低于 50%，或者正式生产定价落到每个业务单元每年 $300k 以下。
  mermaid: "flowchart LR\n  Wedge[One product-family shortage desk] --> MVP[Human-approved reallocation and write-back]\n  MVP --> Proof[Faster cycle time and lower expedite spend]\n  Proof --> Expansion[Multi-corridor hardware accounts and adjacent verticals]\n"
investorMemo:
  verdict:
    call: 进一步尽调
    conviction: 买方痛点真实、切口足够尖、赛道验证也已经能看见，值得认真往下看；但真正能不能站住，还得看它能否足够快地部署，并在更有钱的套件和叠加层面前赢出一场可信的仗。
    whyBelieve: 市场已经明确从“看见问题”走向“动手处理”，而一个上市关键产品族又刚好给了公司一条很窄的验证路径：不替换核心系统，也能证明收入挽回和加急成本下降。
    whyDoubt: 滩头 SAM 只有 $125.0M，而这条赛道上已经挤着资本充足的套件和叠加层，所以公司必须拿出异常快的集成速度，以及清晰的相邻异常扩张路径。
    nextDiligence: 先对 8-10 个目标账户做技术和商业尽调，再盯一个付费试点，从数据审计一直跟到年合约转化。
  firstCustomer:
    title: 北美一家 $1B+ 消费设备业务单元的缺货台负责人
    profile: 这个品牌年收入超过 $1B，ERP 用 SAP 或 Oracle，另有独立计划套件、代工伙伴和至少 3 个区域履约节点，而且每周都在开上市分配电话会。
    trigger: 临近的设备上市、供应商延期或渠道需求猛增，威胁到零售和 DTC 承诺，把团队拖进每天的缺货分配电话会。
    buyer: 供应链副总裁或业务单元 GM
    initialContract: 先围绕一个上市关键产品族、一个区域，卖 $75k-$125k 的付费试点；如果它能证明响应更快、满足率守得住、加急支出更低，再转成按节点和月度异常量分档的 $300k-$600k 业务单元年订阅。
  mustBeTrue:
  - 北美至少有 15 个消费设备业务单元符合滩头画像，而且反复开缺货战情室，并握有预算权。
  - 前 8 个共创客户候选里，至少 5 个能在 45 天内放出订单、库存、发运和优先级数据，并允许在至少 1 个核心系统里做受控回写。
  - 人审试点能把缺货预警到动作的中位时长压低 30% 以上，并把加急支出或取消承诺量压低 10% 以上。
  - 至少 50% 的付费试点，能在结束后 120 天内转成每年 $300k+ 的正式生产合同。
  - 在前 12 次竞争性评估里，套件、叠加层或内部方案的胜出率低于 75%。
  diligenceQuestions:
  - 北美到底有多少消费设备业务单元真正符合滩头画像，并且自己扛着缺货 P&L？
  - 前 10 个目标账户里，主流的 ERP、计划、WMS 和 TMS 组合分别是什么？实际能回写的对象又有哪些？
  - 共创客户在试点开始前，愿意分享哪些基线指标：满足率、加急支出、取消承诺量，以及预警到动作的周期？
  - 第一阶段里，供应链负责人、IT 和内部审计愿意接受的审批边界是什么？又需要什么证据才能继续放开？
  - 账户里的第一笔预算会从哪里出——业务单元运营、控制塔现代化，还是更宽的供应链转型？
  - 当买方把 Auger、Kinaxis、o9、Blue Yonder、FourKites 或内部团队放在一起比较时，究竟是哪一个缺口促成切换？
operatingAssumptions:
- assumption: 滩头市场里，已经有足够多的业务单元把反复出现的缺货台直接绑在上市收入上，足够支撑聚焦式外呼。
  basis: research.yaml
  validationTest: 把前 30 个目标账户逐一绘图，并完成 15 次访谈，确认它们每周都开缺货会、有真实上市项目，而且预算负责人是谁。
  decisionImpact: 如果不成立，就先收窄到 AR/VR 之类更密的子赛道，或先扩到更大的硬件异常工作流，再放大销售。
- assumption: 标准连接器加上一个产品族的范围，足够在 45 天内吃进核心数据并做受控回写。
  basis: research.yaml
  validationTest: 和 8 个账户做技术审计，至少从其中 5 家拿到订单、库存、发运和优先级规则的可用导出或 API 权限。
  decisionImpact: 如果不成立，就先把产品收回到只给建议的模式，或者在放大 GTM 前先为更重的实施工作留预算。
- assumption: 买方会先接受人审回写，再接受完全自主执行。
  basis: idea.yaml
  validationTest: 在 2 个共创客户里，让供应链和内部审计相关方签下试点 RACI 与审批策略。
  decisionImpact: 如果不成立，就推迟自主路线图，把产品定位成决策支持和工作流，而不是自动驾驶。
- assumption: 一个产品族的试点，足以证明服务挽回或成本改善，从而撑起每年 $300k-$600k 的定价。
  basis: research.yaml
  validationTest: 做完 2 个付费试点，并拿到签字确认的 ROI 复盘，把周期缩短、满足率守住和加急/取消承诺成本下降量化出来。
  decisionImpact: 如果不成立，就下调 ACV 预期，再重算这门生意还能不能撑起创投级软件模型。
- assumption: 已有硬件客户会在缺货证明跑通后，继续扩到供应商延误响应或渠道分配等相邻异常类型。
  basis: idea.yaml
  validationTest: 到第 18 个月前，让 2 个生产客户承诺第二条走廊的路线图或扩张试点。
  decisionImpact: 如果不成立，就继续聚焦缺货台，不要预支更宽品类 TAM。
- assumption: 第一个生产案例出来后，数据平台或 ERP 相邻伙伴打法会变得高效。
  basis: research.yaml
  validationTest: 签 2 个伙伴，并在第 12 个月前证明伙伴导来的付费试点转化率，只比直销低不超过 10 个百分点。
  decisionImpact: 如果不成立，就让 GTM 更长时间保持创始人主导，并推迟依赖渠道的招聘。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 绘制前 30 个滩头账户地图并访谈缺货台
  hypothesis: 有足够多业务单元符合滩头画像，而且未来 12 个月内存在真实购买触发器。
  successMetric: 完成 15 次访谈，确认 10 个账户每周都开缺货分配电话会，且预算负责人明确。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 数据就绪度与受控回写审计
  hypothesis: 标准连接器加一个产品族的范围，足够让试点在 45 天内上线。
  successMetric: 5 个账户提供可用的订单、库存、发运和优先级数据，且至少 2 个批准回写设计。
  owner: 集成/解决方案架构师
- horizon: 90-180 天
  experiment: 与 2 个共创客户做历史缺货回放
  hypothesis: 在人审前提下，这套建议能比表格协同更好，甚至还没放开自动执行就先赢下来。
  successMetric: 80% 的回放事件被判断优于当前流程，且有 1 个伙伴转成付费试点。
  owner: 供应链工作流负责人
- horizon: 90-180 天
  experiment: 围绕一个上市关键产品族跑真实付费试点
  hypothesis: 上线一个季度内，这套工作流就能把周期缩短，也能压下加急或取消承诺的痛。
  successMetric: 试点业务单元的预警到动作时长快 30%，且加急支出或取消承诺量下降 10%。
  owner: 实施与客户成功负责人
- horizon: 6-12 个月
  experiment: 测试试点转正式生产的定价与采购
  hypothesis: 只要试点 ROI 留档，买方就会签年费 $300k+ 的合同。
  successMetric: 签下 1 份 $300k ARR 以上的正式生产合同，且有 2 个采购流程在目标定价下拿到口头预算批准。
  owner: 创始人/CEO
- horizon: 6-12 个月
  experiment: 跑通数据平台或 ERP 相邻的共销打法
  hypothesis: 至少有 1 条伙伴渠道能在不把部署范围拉得过大的前提下，降低信任摩擦。
  successMetric: 合格商机池里 25% 来自伙伴，且付费试点转化率只比直销低不超过 10 个百分点。
  owner: 创始人/CEO
- horizon: 12-18 个月
  experiment: 放开低风险自动执行，并扩到第二条走廊
  hypothesis: 买方会先从人审缺货方案，扩到一小类受控自动执行动作，同时愿意把相邻异常也拉进来。
  successMetric: 1 个生产客户为预定义的低风险动作类开启自动执行，且 2 个客户承诺第二条异常走廊。
  owner: 供应链工作流负责人
operations:
- 先定一套规范化的缺货事件数据模型，把订单优先级、库存位置、在途状态、ETA 置信度、客户承诺和已执行动作都串起来。
- 做一层数据新鲜度和置信度打分；只要源系统漂了或更新过期，就禁止回写。
- 把人工审批流、不可变日志、基于角色的护栏和可导出的审计记录一起做好，让贸易、寻源和 AI 治理审查都能过。
- 每周和客户复盘一次预警到动作时长、满足率守住多少、加急支出、取消承诺量，以及为什么被人工覆盖。
- 部署剧本只从一个产品族、一个业务单元起步，不先卷入更大的 ERP 或网络转型。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 负责 ICP 发现、把第一批试点卖给供应链和业务单元买方，并持续把产品范围钉死在一条可量化的缺货流程上。
- role: 创始工程师
  startTiming: Month 0
  rationale: 先把规范化异常模型、审批工作流和安全回写层做出来，再考虑拓宽集成。
- role: 供应链工作流负责人
  startTiming: Month 0-3
  rationale: 把分配逻辑、治理策略和 ROI 埋点编码进产品，做到规划员和内部审计都敢在生产环境里用。
- role: 集成/解决方案架构师
  startTiming: Month 3
  rationale: 把 SAP、Oracle、WMS、TMS 和可视化连接器产品化，把部署时间压到 45 天以下。
- role: 实施与客户成功负责人
  startTiming: Month 6-9
  rationale: 把付费试点推成正式生产上线，跑每周 KPI 复盘，并把每个客户里的扩张打法沉淀下来。
- role: 企业销售/伙伴负责人
  startTiming: Month 12
  rationale: 只有在第一个案例证明部署和 ROI 可重复后，才开始放大直销和伙伴来源商机池。
milestones:
- horizon: 0-12 个月
  items:
  - 在北美消费设备业务单元里拿下 2 个付费试点。
  - 让 2 条上市关键产品族走廊上线，至少覆盖 1 套 SAP 或 Oracle 栈，以及 1 个 WMS、TMS 或可视化数据源。
  - 在首个正式生产业务单元里，证明缺货预警到动作时长快 30%，且加急支出或取消承诺量下降 10%。
  - 把第一个付费试点转成每年 $300k+ 的业务单元合同。
- horizon: 12-24 个月
  items:
  - 做到 5-7 个正式生产业务单元，并拿到至少 2 个可引用客户。
  - 上线策略仿真、基于角色的治理，以及对预定义缺货动作的低风险自动执行。
  - 让数据平台、ERP 或 SI 伙伴贡献 25% 的合格商机池，且转化不比直销差。
  - 只在已有硬件账户里扩到供应商延误响应或渠道分配。
- horizon: 24-36 个月
  items:
  - 做到 15 个在线正式生产业务单元，与当前第 3 年 SOM 模型一致。
  - 赢下至少 3 个多走廊账户：既管缺货，也管至少 1 条相邻异常工作流。
  - 只有在硬件场景的部署时间和胜率稳定后，才扩到 1 个相邻离散制造垂直行业。
  - 决定公司能否围绕更宽的异常自主平台，支撑一套 Series A 扩张计划。
risks:
- risk: 跨系统数据又脏又慢，既让建议不安全，也拖慢试点部署。
  likelihood: High
  impact: High
  mitigation: 先从一个产品族起步，在前期摸底阶段就要求样本数据，给动作打置信度；一旦源数据不新鲜，就退回只给建议。
- risk: 买方长期把产品卡在人审层，限制 ACV 增长，也削弱产品差异化。
  likelihood: Medium
  impact: High
  mitigation: 先定义低风险动作类，先把可审计性做扎实；等客户信了日志和 KPI 提升，再逐步放大自动化。
- risk: 在公司拿到可引用滩头案例前，套件厂商或更有钱的叠加层就先把一个够用的缺货流程打包带走。
  likelihood: Medium
  impact: High
  mitigation: 靠更快部署、跨混搭栈中立和单个产品族上更尖锐的 KPI 证明取胜，而不是去讲宽泛控制塔叙事。
- risk: 真正每周都开缺货台、或短期内真有上市触发器的目标业务单元，比模型假设少。
  likelihood: Medium
  impact: High
  mitigation: 尽早把头部账户逐一映射，优先盯上市节奏最高的子赛道，并在扩招前先在首批客户内测试相邻缺货走廊。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3-4.5M
  runwayMonths: 18
  useOfFundsSummary: 这笔 pre-seed 要拿来做跨栈摄取、审批和受控回写的 MVP，资助 2-3 个共创客户试点，补齐供应链工作流、集成和实施人才，并证明一个产品族的试点能转成每年 $300k+ 的正式生产合同，再往第二条走廊扩。
