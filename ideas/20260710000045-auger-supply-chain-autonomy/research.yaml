  validationPlan:
  - priority: high
    question: Which exact shortage decisions recur weekly in the first 10 target accounts—allocation, decommit, expedite, substitute, or order promising?
    evidenceToGather: 30–60 days of exception logs and planner call notes from one launch-critical business unit.
  - priority: high
    question: What approval boundary will first buyers accept before automatic write-back?
    evidenceToGather: Pilot governance requirements, RACI, and approval thresholds from supply chain and internal audit stakeholders.
  - priority: medium
    question: How large is the measurable value pool per corridor?
    evidenceToGather: Baseline OTIF penalties, expedite spend, cycle time from alert to action, and recovered-revenue examples.
  - priority: medium
    question: Which systems dominate integration friction?
    evidenceToGather: Actual API availability, master-data quality, and event freshness across ERP, WMS, TMS, and planning stacks in three design partners.
  - priority: low
    question: Can the wedge sell from BU operations budget before corporate transformation sponsorship appears?
    evidenceToGather: Budget-owner interviews and closed-lost notes from similar supply-chain software deals.
