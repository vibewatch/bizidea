openQuestions:
- Which exact shortage actions—allocation, decommit, expedite, substitute, or order promising—drive the highest weekly pain in the first design-partner segment?
- What autonomy boundary will first buyers accept before write-back can move from human approval to governed automatic execution?
- How large is the real value pool per corridor once OTIF penalties, expedite costs, and recovered revenue are measured inside a single business unit?
- Which external feeds or master-data gaps most often break recommendation quality in target accounts using mixed SAP, Oracle, WMS, and TMS stacks?
