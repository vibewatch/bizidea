competitors:
- name: Auger
  stage: scale-up
  wedge: Autonomous operating layer on top of ERP, WMS, TMS, and planning systems that reallocates inventory and pushes updated plans back into existing tools.
  pricing: Custom enterprise contract; no public pricing list.
  strength: Strongest AI-native narrative, explicit write-back posture, and early enterprise logos in the exact overlay-autonomy category.
  weaknessVsUs: Positioning is broad “autonomous supply chain OS”; a startup can be sharper on a single launch-shortage workflow and human-in-the-loop rollout.
  sourceRefs:
  - 2
  - 3
  - 5
- name: Kinaxis
  stage: incumbent
  wedge: Concurrent planning and inventory response platform for rapid scenario modeling and enterprise supply-chain alignment.
  pricing: Custom enterprise contract; no public pricing list.
  strength: Deep planning credibility, real-time scenario analysis, and longstanding acceptance in complex manufacturing environments.
  weaknessVsUs: Usually enters as a broader planning transformation, leaving room for a faster shortage-desk product with narrower scope and clearer initial ROI.
  sourceRefs:
  - 18
  - 19
  - 20
- name: o9 Solutions
  stage: scale-up
  wedge: AI-driven control tower connecting planning and execution, with heavy emphasis on hyper-collaboration and large-scale allocation or forecasting.
  pricing: Custom enterprise contract; no public pricing list.
  strength: Modern control-tower narrative, strong enterprise scale claims, and proof points in forecasting and allocation-heavy environments.
  weaknessVsUs: More generalist and transformation-oriented than a shortage-first wedge; a startup can go deeper on governed action for one product family.
  sourceRefs:
  - 21
  - 22
  - 23
- name: FourKites
  stage: scale-up
  wedge: Intelligent control tower and inventory twin built on network data, real-time ETAs, and logistics execution signals.
  pricing: Custom enterprise contract; no public pricing list.
  strength: Rich external execution data, broad network participation, and increasingly explicit inventory-risk and mitigation tooling.
  weaknessVsUs: Its center of gravity is still logistics and network visibility; a shortage-autopilot wedge can focus more deeply on customer-priority policy and ERP write-back governance.
  sourceRefs:
  - 24
  - 25
  - 26
  - 36
- name: Blue Yonder
  stage: incumbent
  wedge: Supply-chain command center plus planning and network collaboration across partners, with inventory optimization and rebalancing.
  pricing: Custom enterprise contract; no public pricing list.
  strength: Large install base, measurable inventory or OTIF outcomes, and broad multi-party orchestration vision.
  weaknessVsUs: Suite breadth creates heavier transformation motion; a focused overlay can land faster in one shortage corridor without a full-platform decision.
  sourceRefs:
  - 27
  - 28
  - 29
  - 37
