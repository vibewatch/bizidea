    - 36
    - 37
  dataMoats:
  - point: Accepted and rejected shortage actions create a company-specific decision-policy history that links customer priority, margin, SLA, and network state to realized outcomes.
    sourceRefs:
    - 3
    - 4
    - 5
  - point: Continuous exposure to real execution events—late ASNs, port delays, short shipments, dark trailers, and OTIF misses—improves action ranking beyond what a static planning model can learn.
    sourceRefs:
    - 24
