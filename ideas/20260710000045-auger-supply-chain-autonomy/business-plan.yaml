slug: launch-shortage-autopilot
date: "2026-07-10"
executiveSummary: >-
  Launch Shortage Autopilot should start as a shortage-resolution operating
  layer for North American consumer-electronics, AR/VR, and connected-device
  business units that still run weekly launch war rooms. The product is not a
  planning-suite replacement; it ingests order priority, inventory, shipment,
  and transport state across ERP, WMS, TMS, and planning tools and produces a
  human-approved reallocation, decommit, or expedite plan for one
  launch-critical product family. The first customer is a $1B+ hardware brand
  with SAP or Oracle ERP, a separate planning stack, three or more regional
  fulfillment nodes, and an upcoming launch or supplier slip that makes
  spreadsheet triage too slow. Research supports the category because Auger,
  FourKites, Blue Yonder, Kinaxis, and o9 all now market visibility-to-action
  workflows, and Auger shows enterprises will buy overlay autonomy without
  replacing core systems. The first sale should be a paid pilot on one business
  unit that proves faster alert-to-action cycle time, lower expedite spend, and
  preserved fill rate before broader automation rights are requested. The
  market is large enough for a venture wedge only if expansion works: current
  estimates are $1.2B TAM, $125.0M beachhead SAM, and $9.0M modeled year-3
  SOM. The main execution risks are dirty cross-system data, buyer reluctance
  to permit governed write-back, and competitive bundling from suites or
  better-funded overlays. The key gaps are the true count of qualifying North
  American business units and the phase-one approval boundary, so the first 90
  days must focus on ICP mapping, data-readiness audits, and governance design.
problem:
  - >-
    Control-tower teams still resolve launch shortages with spreadsheets,
    email, and manual ERP, WMS, and TMS transactions because no system
    adjudicates trade-offs across order priority, inventory location,
    in-transit stock, and customer commitments in one loop.
  - >-
    When a component slips or demand spikes, planners must decide which orders
    to short, which nodes to reallocate, and whether to expedite freight after
    the selling window has already narrowed.
  - >-
    Visibility and planning tools flag risk but rarely push an executable,
    audit-ready cross-system plan back into the stack, so fill rate, launch
    revenue, and margin leak during every major exception.
solution:
  - >-
    Ingest order, inventory, shipment, ETA, and business-priority data for one
    product family and present a live shortage queue with recommended
    reallocate, decommit, substitute, or expedite actions.
  - >-
    Keep planners in the loop at first with role-based approvals, confidence
    scores, and one-click write-back into incumbent systems rather than asking
    the customer to replace ERP or planning software.
  - >-
    Learn from accepted and rejected actions to tune shortage policy by
    channel, customer tier, SLA, margin, and node state, then expand into
    governed auto-execution for low-risk cases.
whyWeWin:
  - >-
    The wedge is narrower and faster to deploy than Kinaxis, o9, or Blue
    Yonder because it sells a shortage desk, not a full planning
    transformation.
  - >-
    Vendor-neutral write-back across mixed ERP, WMS, TMS, and planning stacks
    is harder for logistics-heavy visibility networks or in-house war rooms to
    reproduce.
  - >-
    The decision-policy history linking priority rules, approved actions, and
    realized service or margin outcomes becomes a proprietary asset that broad
    suites do not capture from spreadsheet-driven workflows.
  - >-
    Audit trails and human-approval logs directly address tariff,
    export-control, forced-labor, and AI-governance concerns that slow autonomous
    action adoption.
strategicChoices:
  beachhead: >-
    North American consumer-electronics, AR/VR, and connected-device business
    units with contract-manufacturing partners, SAP or Oracle ERP, three or
    more regional fulfillment nodes, and a recurring shortage desk for
    launch-critical SKUs.
  wedgeRationale: >-
    One launch-critical product family creates concentrated pain, one daily
    operating cadence, and a measurable value pool in recovered service,
    decommit avoidance, and lower expedite spend. It yields faster proof than
    pitching a general control tower, a planning-suite replacement, or broad
    autonomous supply chain orchestration before the startup has proven data
    readiness and trust.
  sequencingRationale: >-
    Build cross-stack ingestion, approvals, and governed write-back before
    autonomous execution because data freshness and auditability are the gating
    adoption risks. Keep sales founder-led through the first 2-3 pilots, then
    add partner and commercial leverage only after the company can show a
    repeatable deployment path, KPI uplift, and a clear budget line inside one
    business unit.
  notYet:
    - Full planning-suite replacement or end-to-end supply chain transformation.
    - Supplier procurement or sourcing automation outside the shortage desk.
    - Apparel, healthcare, industrial, or CPG vertical expansion before the hardware playbook is repeatable.
    - Fully autonomous cross-network execution before human-approved write-back proves safe and valuable.
market:
  tam: >-
    $1.2B estimated TAM based on about 2,000 global large discrete-goods
    business units with multi-node shortage desks at roughly $600k steady-state
    ACV per business unit.
  sam: >-
    $125.0M estimated SAM based on about 250 North American
    consumer-electronics, AR/VR, and connected-device business units that fit
    the beachhead profile at roughly $500k initial production ACV.
  som: >-
    $9.0M modeled year-3 SOM based on 15 live production business units at
    roughly $600k blended ARR after pilot-to-production and node or channel
    expansion.
  segments:
    - >-
      North American consumer-electronics, AR/VR, and connected-device business
      units with launch-driven demand and weekly shortage allocation calls.
    - >-
      Adjacent discrete-goods business units with multi-node shortage desks,
      especially industrial, apparel, and healthcare operators that share the
      same mixed-stack planning and execution problem.
  buyingProcess: >-
    A control-tower director, allocation planner, or network planner usually
    champions the deal when a launch, supplier miss, or tariff shift forces
    daily shortage calls. The economic buyer is the VP Supply Chain, COO, or
    business-unit GM, and the most credible entry motion is a paid pilot on one
    product family that converts to an annual business-unit subscription after
    measured fill-rate protection, lower expedite spend, and faster cycle time.
product:
  mvp: >-
    The MVP covers one product family inside one business unit. It ingests
    order, inventory, shipment, ETA, and priority data from the customer's
    existing stack, scores shortage trade-offs, routes recommendations for
    planner approval, and writes approved actions back into incumbent systems
    with an audit trail.
  sixMonth: >-
    Go live in 2 design-partner pilots with standard SAP or Oracle order and
    inventory connectors, one WMS, TMS, or visibility feed, approval workflow,
    and KPI dashboards for alert-to-action time, fill rate at risk, and
    expedite spend.
  twelveMonth: >-
    Add multi-node support, policy simulation, decommit and expedite playbooks,
    and role-based governance that lets teams compare recommended, approved,
    and executed actions by product family.
  twentyFourMonth: >-
    Enable governed auto-execution for low-risk shortage actions, extend the
    same policy engine to supplier-delay response and channel allocation inside
    hardware accounts, and package reusable connectors for adjacent
    discrete-goods verticals.
  keyBets:
    - >-
      One product-family scope plus standard connectors is enough to reach
      production proof within 45 days.
    - >-
      Buyers will accept human-approved recommendations and write-back before
      they accept broad autonomy.
    - >-
      Faster response, decommit avoidance, and lower expedite spend are large
      enough to support $300k+ annual production contracts.
    - >-
      Approval and outcome history from live shortage events compounds into a
      defensible policy dataset that broad suites do not quickly replicate.
gtm:
  wedge: >-
    Land during a device launch, supplier miss, or demand spike as the
    shortage-resolution system for one launch-critical product family,
    replacing spreadsheet war rooms with a shared action queue, audit-ready
    recommendations, and governed write-back.
  channels:
    - >-
      Founder-led direct sales into supply-chain transformation,
      control-tower, and business-unit operations leaders at $1B+ hardware
      brands.
    - >-
      Co-sell motions with cloud data platforms, ERP-adjacent partners, and
      systems integrators once one production case study exists.
    - >-
      Referral motions through visibility networks, 3PLs, and planning
      modernization programs already inside target accounts.
  funnelTargets: "target-account intro→qualified discovery 40%+; discovery→paid pilot 20-30%; paid pilot→production 50%+; first production BU→second corridor expansion 60%+ within 12 months"
  pricing: >-
    Start with a $75k-$125k paid pilot for one product family and one region,
    then convert to a $300k-$600k annual subscription per business unit tiered
    by managed nodes and monthly exception volume, with premium pricing for
    governed auto-execution modules. This matches an existing launch-operations
    budget and lets buyers underwrite the contract against recovered revenue,
    fill-rate protection, and lower expedite spend rather than seat count.
businessModel:
  revenueStreams:
    - Annual platform subscription per business unit or shortage corridor, tiered by managed nodes and monthly exception volume.
    - One-time onboarding and connector fees for ERP, WMS, TMS, and planning integrations.
    - Premium governed write-back, policy simulation, and audit or compliance modules.
  unitOfValue: Managed shortage-resolution corridor per business unit, priced by active nodes and monthly exception volume
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more nodes, regions, and channels within the first business unit after the first pilot proves ROI.
    - Expand from one product family into adjacent launches and recurring shortage corridors inside the same account.
    - Add supplier-delay response, channel allocation, and returns rebalancing once shortage proof exists.
    - Reuse the integration and policy stack in adjacent discrete-goods verticals after the hardware playbook is stable.
strategyMap:
  northStarMetric: Median hours from shortage alert to approved and executed allocation decision on a launch-critical product family
  inputMetrics:
    - Qualified beachhead accounts with weekly shortage desks and a live buying trigger.
    - Percentage of shortage events with fresh order, inventory, shipment, and priority data attached automatically.
    - Median hours from shortage alert to approved and executed action.
    - Fill rate preserved and expedite spend avoided versus the customer's baseline.
    - Paid pilot-to-production conversion and second-corridor expansion rate.
  moatsToBuild:
    - Decision-policy history linking customer priority, SLA, margin, node state, approved action, and realized outcome.
    - Reusable mixed-stack connectors plus data-freshness scoring that shorten deployment and improve trust.
    - Audit and approval corpus that becomes embedded in supply-chain governance and compliance workflows.
  killCriteria:
    - Fewer than 2 of the first 20 qualified beachhead accounts sign a paid pilot within 9 months.
    - More than 45 days are required to connect order, inventory, shipment, and priority data and enable governed write-back at each of the first 3 pilots.
    - The first 3 pilots fail to cut median alert-to-action time by at least 30% and reduce expedite spend or decommit volume by at least 10%.
    - Paid pilot-to-production conversion stays below 50% or realized production pricing lands below $300k annual per business unit.
  mermaid: |
    flowchart LR
      Wedge[One product-family shortage desk] --> MVP[Human-approved reallocation and write-back]
      MVP --> Proof[Faster cycle time and lower expedite spend]
      Proof --> Expansion[Multi-corridor hardware accounts and adjacent verticals]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Real buyer pain, a sharp wedge, and visible category validation justify a
      serious look, but conviction depends on proving fast deployment and a
      credible win against better-funded suites and overlays.
    whyBelieve: >-
      The market has demonstrably moved from visibility to action, and one
      launch-critical product family gives the startup a narrow way to prove
      recovered revenue and lower expedite cost without replacing core systems.
    whyDoubt: >-
      The beachhead SAM is only $125.0M and the category already has
      well-funded suites and overlays, so the company needs unusually fast
      integrations and a clear path into adjacent exception workflows.
    nextDiligence: >-
      Complete technical and commercial diligence on 8-10 target accounts, then
      watch one paid pilot from data audit through annual contract conversion.
  firstCustomer:
    title: North America shortage desk leader at a $1B+ consumer-device business unit
    profile: >-
      A $1B+ brand with SAP or Oracle ERP, a separate planning suite,
      contract-manufacturing partners, three or more regional fulfillment
      nodes, and weekly launch-allocation calls.
    trigger: >-
      An upcoming device launch, supplier slip, or channel-demand spike
      threatens retailer or DTC commitments and creates daily shortage
      allocation calls.
    buyer: VP Supply Chain or business-unit GM
    initialContract: >-
      Start with a $75k-$125k paid pilot for one launch-critical product family
      and one region, then convert to a $300k-$600k annual business-unit
      subscription tiered by nodes and monthly exception volume if the pilot
      proves faster response, preserved fill rate, and lower expedite spend.
  mustBeTrue:
    - At least 15 North American consumer-device business units match the beachhead profile and run recurring shortage war rooms with budget authority.
    - At least 5 of the first 8 design-partner prospects can expose order, inventory, shipment, and priority data and permit governed write-back into at least one core system within 45 days.
    - Human-approved pilots cut median shortage alert-to-action time by 30%+ and reduce expedite spend or decommit volume by 10%+ on a live product family.
    - At least 50% of paid pilots convert to $300k+ annual production contracts within 120 days of pilot completion.
    - Bundled suite, overlay, or internal alternatives win fewer than 75% of the first 12 competitive evaluations.
  diligenceQuestions:
    - How many North American consumer-device business units actually fit the beachhead and own shortage P&L?
    - Which ERP, planning, WMS, and TMS combinations dominate the first 10 target accounts, and what write-back objects are available in practice?
    - What baseline fill rate, expedite spend, decommit volume, and alert-to-action metrics can design partners share before a pilot starts?
    - What approval boundary will supply-chain leaders, IT, and internal audit accept in phase one, and what evidence expands that boundary?
    - Which budget line pays first inside the account—business-unit operations, control-tower modernization, or broader supply chain transformation?
    - When buyers compare Auger, Kinaxis, o9, Blue Yonder, FourKites, or internal teams, what exact gap makes them switch?
operatingAssumptions:
  - assumption: >-
      Enough beachhead business units already run recurring shortage desks tied
      to launch revenue to support focused outbound.
    basis: research.yaml
    validationTest: >-
      Map the top 30 target accounts and complete 15 interviews confirming
      weekly shortage calls, active launch programs, and named budget owners.
    decisionImpact: >-
      If false, narrow to a denser subsegment such as AR/VR or broaden into a
      larger hardware exception workflow before scaling sales.
  - assumption: >-
      Standard connectors and one product-family scope are enough to ingest core
      data and enable governed write-back within 45 days.
    basis: research.yaml
    validationTest: >-
      Complete technical audits with 8 accounts and obtain usable exports or
      API access for orders, inventory, shipments, and priority rules from at
      least 5.
    decisionImpact: >-
      If false, reduce product scope to recommendation-only mode or budget
      heavier implementation work before scaling GTM.
  - assumption: >-
      Buyers will accept human-approved write-back before they accept autonomous
      execution.
    basis: idea.yaml
    validationTest: >-
      Get pilot RACI and approval policies signed by supply-chain and internal
      audit stakeholders at 2 design partners.
    decisionImpact: >-
      If false, defer the autonomy roadmap and position the product as decision
      support and workflow rather than an autopilot.
  - assumption: >-
      One product-family pilot can show enough recovered service or cost value
      to support $300k-$600k annual pricing.
    basis: research.yaml
    validationTest: >-
      Complete 2 paid pilots with signed ROI reviews that quantify faster cycle
      time, preserved fill rate, and lower expedite or decommit costs.
    decisionImpact: >-
      If false, lower ACV expectations and re-test whether the business can
      support venture-scale software economics.
  - assumption: >-
      Existing hardware accounts will expand into adjacent exception types such
      as supplier-delay response or channel allocation after shortage proof.
    basis: idea.yaml
    validationTest: >-
      Secure roadmap commitments or expansion pilots for a second corridor from
      2 production customers by month 18.
    decisionImpact: >-
      If false, keep the company focused on shortage desks and do not underwrite
      broad category TAM.
  - assumption: >-
      A data-platform or ERP-adjacent partner motion becomes efficient after the
      first production case study.
    basis: research.yaml
    validationTest: >-
      Sign 2 partners and show partner-sourced paid-pilot conversion within 10
      percentage points of direct outbound by month 12.
    decisionImpact: >-
      If false, keep GTM founder-led longer and delay channel-dependent hiring.
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: Top-30 beachhead account map and shortage-desk interviews
    hypothesis: Enough business units fit the beachhead and have an active buying trigger in the next 12 months.
    successMetric: 15 interviews completed and 10 accounts confirmed with weekly shortage allocation calls and a named budget owner.
    owner: Founder CEO
  - horizon: "0-90 days"
    experiment: Data-readiness and governed-write-back audit
    hypothesis: Standard connectors plus one product-family scope can support a pilot go-live within 45 days.
    successMetric: 5 accounts provide usable order, inventory, shipment, and priority data plus at least 2 approve a write-back design.
    owner: Integration / solutions architect
  - horizon: "90-180 days"
    experiment: Historical shortage replay with 2 design partners
    hypothesis: Human-approved recommendations outperform spreadsheet coordination before auto-execution is enabled.
    successMetric: 80% of replayed events are judged better than the current process and 1 partner converts to a paid pilot.
    owner: Supply chain workflow lead
  - horizon: "90-180 days"
    experiment: Live paid pilot on one launch-critical product family
    hypothesis: The workflow can cut cycle time and reduce expedite or decommit pain within one quarter of go-live.
    successMetric: 30% faster alert-to-action time and 10% lower expedite spend or decommit volume at the pilot business unit.
    owner: Implementation and customer success lead
  - horizon: "6-12 months"
    experiment: Pilot-to-production pricing and procurement test
    hypothesis: Buyers will sign an annual $300k+ contract once pilot ROI is documented.
    successMetric: 1 production contract signed above $300k ARR and 2 procurement cycles reach verbal budget approval at target pricing.
    owner: Founder CEO
  - horizon: "6-12 months"
    experiment: Data-platform or ERP-adjacent co-sell motion
    hypothesis: One partner channel can reduce trust friction without stretching deployment scope.
    successMetric: 25% of qualified pipeline is partner-sourced with paid-pilot conversion within 10 percentage points of direct outbound.
    owner: Founder CEO
  - horizon: "12-18 months"
    experiment: Low-risk auto-execution and second-corridor expansion
    hypothesis: Buyers will expand from human-approved shortage plans to governed auto-execution for a narrow action set and will pull adjacent exception types.
    successMetric: 1 production customer enables auto-execution for a predefined low-risk action class and 2 customers commit to a second exception corridor.
    owner: Supply chain workflow lead
operations:
  - Canonical shortage-event data model spanning order priority, inventory location, in-transit state, ETA confidence, customer commitments, and executed actions.
  - Data-freshness and confidence scoring that blocks write-back when source systems drift or updates are stale.
  - Human-approval workflow with immutable logs, role-based guardrails, and exportable audit records for trade, sourcing, and AI-governance review.
  - Weekly operating review with the customer on alert-to-action time, fill-rate preservation, expedite spend, decommit volume, and override reasons.
  - Deployment playbook that starts with one product family and one business unit before broader ERP or network transformation work.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Owns ICP discovery, sells the first pilots to supply-chain and business-unit buyers, and keeps product scope tied to one measurable shortage workflow.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the canonical exception model, approvals workflow, and secure write-back layer before the company broadens integrations.
  - role: Supply chain workflow lead
    startTiming: Month 0-3
    rationale: Encodes allocation logic, governance policies, and ROI instrumentation that planners and internal audit will trust in production.
  - role: Integration / solutions architect
    startTiming: Month 3
    rationale: Productizes SAP, Oracle, WMS, TMS, and visibility connectors so deployment time falls below the 45-day target.
  - role: Implementation and customer success lead
    startTiming: Month 6-9
    rationale: Turns paid pilots into production rollouts, manages weekly KPI reviews, and creates the expansion playbook inside each logo.
  - role: Enterprise seller / partnerships lead
    startTiming: Month 12
    rationale: Scales direct and partner-sourced pipeline only after the first case study proves repeatable deployment and ROI.
milestones:
  - horizon: "0-12 months"
    items:
      - Close 2 paid pilots in North American consumer-device business units.
      - Go live on 2 launch-critical product-family corridors across at least 1 SAP or Oracle stack and 1 WMS, TMS, or visibility feed.
      - Prove 30% faster shortage alert-to-action time and 10% lower expedite spend or decommit volume at the first production business unit.
      - Convert the first paid pilot into a $300k+ annual business-unit contract.
  - horizon: "12-24 months"
    items:
      - Reach 5-7 production business units and at least 2 referenceable logos.
      - Launch policy simulation, role-based governance, and low-risk auto-execution for predefined shortage actions.
      - Generate 25% of qualified pipeline from data-platform, ERP, or SI partners without worse conversion than direct sales.
      - Expand into supplier-delay response or channel allocation only inside existing hardware accounts.
  - horizon: "24-36 months"
    items:
      - Reach 15 live production business units, consistent with the current year-3 SOM model.
      - Win 3 or more multi-corridor accounts spanning shortages plus at least 1 adjacent exception workflow.
      - Expand into 1 adjacent discrete-goods vertical only after hardware deployment time and win rates are stable.
      - Decide whether the company can justify a Series A expansion plan around a broader exception-autonomy platform.
risks:
  - risk: Dirty or late cross-system data makes recommendations unsafe or slows pilot deployment.
    likelihood: High
    impact: High
    mitigation: Start with one product family, require sample data during discovery, add confidence scoring, and fall back to recommendation-only mode when source freshness drops.
  - risk: Buyers cap the product at human approval for too long, limiting ACV growth and product differentiation.
    likelihood: Medium
    impact: High
    mitigation: Define low-risk action classes, prove auditability first, and expand automation only after customers trust the logs and KPI lift.
  - risk: Incumbent suites or better-funded overlays bundle an adequate shortage workflow before the startup establishes a referenceable beachhead.
    likelihood: Medium
    impact: High
    mitigation: Win on faster deployment, mixed-stack neutrality, and sharper KPI proof on one product family rather than on a broad control-tower narrative.
  - risk: The real count of target business units with weekly shortage desks or near-term launch triggers is lower than the model assumes.
    likelihood: Medium
    impact: High
    mitigation: Map the top accounts early, prioritize subsegments with the highest launch cadence, and test adjacent shortage corridors inside the first logos before scaling headcount.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Build the cross-stack ingestion, approval, and governed write-back MVP,
    fund 2-3 design-partner pilots, hire supply-chain workflow, integration,
    and implementation talent, and prove that one product-family pilots
    convert into $300k+ annual production contracts and second-corridor
    expansion.
