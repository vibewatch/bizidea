slug: "launch-shortage-autopilot"
date: "2026-07-10"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
- id: "A1"
  name: "Model start month"
  value: "2026-08"
  unit: "YYYY-MM"
  source: "[BP date 2026-07-10] the model begins in the first full month after the dated business plan."
- id: "A2"
  name: "Opening cash / pre-seed raise"
  value: "$3.0M"
  unit: "USD"
  source: "[BP fundingAsk targetFundingRangeUsd $3-4.5M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the stated range because hiring stays disciplined and the company crosses into EBITDA-positive territory during Y3."
- id: "A3"
  name: "Starting paying business units"
  value: "0"
  unit: "count"
  source: "[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first sell paid pilots."
- id: "A4"
  name: "Customer definition"
  value: "One active paying business unit or shortage corridor in a paid pilot or annual production contract"
  unit: "definition"
  source: "[BP gtm.pricing + BP businessModel.unitOfValue] customersEop counts paying corridors, not individual end users."
- id: "A5"
  name: "Paid pilot economics"
  value: "$100K over roughly 3 months (~$33K/mo)"
  unit: "USD/business unit"
  source: "[BP gtm.pricing $75k-$125k paid pilot] the model uses the midpoint for a launch-critical product-family pilot."
- id: "A6"
  name: "Production contract and expansion economics"
  value: "Initial production lands near $480K ARR (~$40K/mo) and matures toward ~$600K ARR (~$50K/mo) by Y3"
  unit: "USD/business unit/year"
  source: "[BP market.sam roughly $500k initial ACV + BP market.som roughly $600k blended ARR + BP gtm.pricing $300k-$600k annual subscription] the model starts near the SAM anchor and reaches the SOM anchor only after node and channel expansion."
- id: "A7"
  name: "Customer ramp"
  value: "2 active paying business units by M12, 6 by Q4Y2, and 15 by Q4Y3"
  unit: "customersEop"
  source: "[BP milestones 0-12, 12-24, 24-36 months + BP market.som 15 live production BUs] base case matches two paid pilots in year 1, 5-7 production BUs by year 2, and the year-3 SOM target by year end."
- id: "A8"
  name: "Revenue recognition convention"
  value: "Active paying business units multiplied by blended realized revenue per corridor: about $100K-$110K per quarter through Y2, about $97K-$120K per quarter in early Y3 while new pilots mix in, and about $150K per quarter by Q4Y3"
  unit: "formula"
  source: "[BP gtm.pricing + BP businessModel.revenueStreams + Research market.som] this keeps revenue directly tied to paying corridor count and pricing mix."
- id: "A9"
  name: "Pilot-to-production cycle"
  value: "Roughly 90 days for the first six business units, compressing toward 60-75 days once standard connectors and playbooks are proven"
  unit: "days"
  source: "[BP strategicChoices.sequencingRationale + BP experimentRoadmap live pilot and procurement tests + BP investorMemo.mustBeTrue convert within 120 days] the Y3 ramp requires faster but still believable repeat deployments."
- id: "A10"
  name: "Gross margin ramp"
  value: "45%-55% in Y1, 58%-67% in Y2, and 68%-70% in Y3"
  unit: "gross margin percent"
  source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + Research adoptionFrictionMatrix dirty cross-system data] early delivery is services-heavy before connector reuse and governance templates improve margin."
- id: "A11"
  name: "Hiring timeline"
  value: "M1 founder CEO, founding engineer, and workflow lead; M4 integration architect; M8 implementation / customer success; M12 enterprise seller; M15 second engineer; M18 ops; M21 second integration / solutions; M24 third engineer; M27 second implementation / CS; M30 second sales / partnerships; M32 fourth engineer"
  unit: "timeline"
  source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring adds delivery and GTM only after the first pilots and production proof exist."
- id: "A12"
  name: "Founder loaded compensation"
  value: "$180.0K"
  unit: "USD/year"
  source: "[BP team Founder CEO + startup-finance heuristic] lean founder cash compensation with payroll taxes and benefits."
- id: "A13"
  name: "Engineering loaded compensation"
  value: "$200.4K per FTE"
  unit: "USD/year"
  source: "[BP team founding eng + startup-finance heuristic] mixed-stack integration and optimization work needs senior engineering talent."
- id: "A14"
  name: "Supply chain workflow lead loaded compensation"
  value: "$184.8K"
  unit: "USD/year"
  source: "[BP team Supply chain workflow lead + startup-finance heuristic] the role mixes domain expertise, policy design, and customer-facing pilot work."
- id: "A15"
  name: "Integration / solutions loaded compensation"
  value: "$189.6K per FTE"
  unit: "USD/year"
  source: "[BP team Integration / solutions architect + startup-finance heuristic] reflects ERP, WMS, TMS, and planning-stack integration ownership plus pre-sales solutioning."
- id: "A16"
  name: "Implementation / customer success loaded compensation"
  value: "$159.6K per FTE"
  unit: "USD/year"
  source: "[BP team Implementation and customer success lead + startup-finance heuristic] assumes technical but not partner-level compensation."
- id: "A17"
  name: "Sales / partnerships loaded compensation"
  value: "$219.6K per FTE"
  unit: "USD/year"
  source: "[BP team Enterprise seller / partnerships lead + startup-finance heuristic] includes variable compensation, travel, and enterprise field selling."
- id: "A18"
  name: "Ops / G&A loaded compensation"
  value: "$129.6K"
  unit: "USD/year"
  source: "[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] covers finance, vendor, and compliance operations without building a full back office."
- id: "A19"
  name: "Payroll allocation to P&L lines"
  value: "Founder 50% S&M / 30% R&D / 20% G&A; engineering 100% R&D; workflow lead 80% R&D / 20% G&A; integration 30% S&M / 70% R&D; implementation 50% S&M / 50% R&D; sales 100% S&M; ops 100% G&A"
  unit: "allocation"
  source: "[BP team role rationales + BP operations] maps headcount cost into functional lines while keeping deployment and founder-led sales visible."
- id: "A20"
  name: "Non-payroll opex ramp"
  value: "S&M $8K-$32K per month, R&D $12K-$28K per month, and G&A $7K-$14K per month over 36 months"
  unit: "USD/month"
  source: "[BP operations + BP gtm.channels + Research regulatoryLandscape + startup-finance heuristic] covers cloud spend, travel, legal, insurance, and audit/compliance tooling without assuming paid-demand scale."
- id: "A21"
  name: "Cash conversion convention"
  value: "EBITDA approximates cash movement"
  unit: "formula"
  source: "[startup-finance heuristic] taxes, capex, debt service, and working-capital timing are assumed immaterial at pre-seed scale."
- id: "A22"
  name: "Monthly churn"
  value: "1.8%"
  unit: "percent/month"
  source: "[startup-finance heuristic for early enterprise workflow SaaS + BP expansionLevers + BP investorMemo.mustBeTrue] the workflow should be sticky once embedded, but the model does not assume zero churn."
- id: "A23"
  name: "CAC convention"
  value: "$171K of Y1-Y2 sales and marketing spend per first-wave production business unit"
  unit: "USD/business unit"
  source: "[model calc using Y1-Y2 S&M spend divided by 6 production BUs at Q4Y2 + BP funnelTargets] this is a conservative CAC based on the first proof cohort rather than full 36-month scale."
- id: "A24"
  name: "Next-round milestone for funding sizing"
  value: "6 production business units, 2 referenceable logos, 25% partner-sourced qualified pipeline, and 1 governed low-risk auto-execution deployment"
  unit: "milestone"
  source: "[BP milestones 12-24 months + BP experimentRoadmap + BP fundingAsk.useOfFundsSummary] this is the seed-ready proof package the pre-seed must finance."
- id: "A25"
  name: "Quarterly salary convention"
  value: "Y2-Y3 salary rows use actual monthly hiring inside each quarter rather than only quarter-end snapshots"
  unit: "convention"
  source: "[Headcount column convention + BP team.startTiming] this keeps the salary line consistent with the monthly hiring ramp."
