scenarios:
  downside:
    description: "Suite competition, slower integrations, and more cautious buyers keep the company below the planned production-unit ramp and prevent full margin normalization."
    y3RevenueK: 4050.0
    y3EbitdaK: -320.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - "Q4Y3 customersEop reaches 11 instead of 15 because partner-sourced pipeline underdelivers and sales cycles stay near 120 days."
    - "Mature production value tops out around $500K ARR instead of the researched roughly $600K blended level."
    - "Gross margin exits near 66% because implementation and connector work remain more bespoke."
  base:
    description: "Base case follows the BP milestone path of two paid pilots in year 1, 5-7 production business units by year 2, and 15 active paying business units by Q4Y3."
    y3RevenueK: 5830.0
    y3EbitdaK: 989.5
    cashLowPointK: 1029.1
    keyAssumptionChanges:
    - "Active paying business units move from 2 at M12 to 6 at Q4Y2 and 15 at Q4Y3 as founder-led sales add a partner-assisted channel."
    - "Production corridor value starts near roughly $480K ARR and expands toward roughly $600K ARR by late Y3 with node and channel expansion plus initial auto-execution."
    - "Gross margin climbs from pilot-heavy mid-40s in Y1 to the BP target of 70% by Q4Y3."
  upside:
    description: "Reference logos and partner referrals pull conversions forward, so the company lands more production units and attaches premium automation earlier."
    y3RevenueK: 6750.0
    y3EbitdaK: 1650.0
    cashLowPointK: 1150.0
    keyAssumptionChanges:
    - "Q4Y3 customersEop reaches 18 instead of 15 because partner-sourced deals make up more than 25% of qualified pipeline by Y2."
    - "Blended production value reaches roughly $650K ARR as auto-execution and second-corridor modules attach earlier."
    - "Gross margin exits around 72% as connector reuse lowers direct delivery load faster than planned."
sensitivity:
- variable: "ARPU"
  downsideCase: "Mature production value settles near $500K ARR."
  baseCase: "Mature production value reaches roughly $600K ARR by Q4Y3."
  upsideCase: "Auto-execution and second-corridor expansion lift mature value toward roughly $650K ARR."
  y3RevenueImpactK: -600.0
  cashImpactK: -420.0
- variable: "CAC"
  downsideCase: "Enterprise cycles need 25% more field time and solutioning, pushing CAC toward roughly $215K."
  baseCase: "CAC stays near roughly $171K on the first six production business units."
  upsideCase: "Warm partner introductions keep CAC closer to roughly $150K."
  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
- variable: "churn"
  downsideCase: "Monthly churn rises to 3.0% as some pilots fail to expand inside the logo."
  baseCase: "Monthly churn holds at 1.8% once the workflow is embedded."
  upsideCase: "Monthly churn stays near 1.0% because audit trails and write-back governance create stickiness."
  y3RevenueImpactK: -360.0
  cashImpactK: -290.0
- variable: "sales cycle"
  downsideCase: "Pilot-to-production stays near 120 days because procurement and IT approvals stay slow."
  baseCase: "The first six business units convert in about 90 days and later ones in 60-75 days after standard connectors exist."
  upsideCase: "Referenceability compresses conversion toward about 60 days by Y2."
  y3RevenueImpactK: -820.0
  cashImpactK: -540.0
- variable: "gross margin"
  downsideCase: "Gross margin exits at 66% because delivery remains too bespoke."
  baseCase: "Gross margin reaches the BP target of 70% in Q4Y3."
  upsideCase: "Gross margin reaches roughly 72% as connector reuse and policy templates standardize faster."
  y3RevenueImpactK: 0.0
  cashImpactK: -230.0
- variable: "hiring pace"
  downsideCase: "A second seller and support hires are pulled forward by two quarters before referenceability is proven."
  baseCase: "Scale hires follow the BP sequencing and arrive only after pilot and production proof."
  upsideCase: "The final Y3 hires wait until the 13th production business unit is live without slowing growth."
  y3RevenueImpactK: 0.0
  cashImpactK: -300.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      TargetAccounts[Target hardware business units] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionBUs[Production business units]
      ProductionBUs --> ExpansionModules[Node and channel expansion]
      ExpansionModules --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
- checkName: "Revenue engine"
  finding: "Base revenue is driven by growing from 2 active paying business units at M12 to 15 by Q4Y3 while corridor value climbs from pilot pricing to roughly $600K mature ARR."
- checkName: "Must go right"
  finding: "Standard connectors and human-approved write-back must compress pilot-to-production cycles toward one quarter, or the jump from 6 paying units at Q4Y2 to 15 at Q4Y3 will slip."
- checkName: "Model breaks if"
  finding: "If production value stalls near $500K ARR or gross margin stays below the 70% target, Y3 EBITDA stays negative and the $3.0M pre-seed no longer carries a six-month buffer comfortably."
- checkName: "Next-round proof"
  finding: "The seed story is 6 production business units, 2 referenceable logos, 25% partner-sourced pipeline, and 1 governed low-risk auto-execution deployment with cash still above roughly $1.0M."
sanityChecks:
  ruleOf40: "Y3 growth 197.4% + EBITDA margin 17.0% = 214.4% (inflated by the small Y2 base, so treat it as directional rather than mature-SaaS quality)."
  burnMultiple: "Y2 burn multiple is about 0.5x using roughly $0.86M of EBITDA burn against about $1.68M of net new exit ARR; Y3 turns EBITDA positive before a traditional burn-multiple framing matters."
  revenuePerFte: "$448K Y3 on 13 ending FTE (slightly above the $200-400K vertical SaaS benchmark because ACV is enterprise-scale)."
  flags:
  - "The step from 6 active paying business units at Q4Y2 to 15 at Q4Y3 is ambitious and depends on the partner channel becoming real, not merely promised."
  - "customersEop includes paid pilots and production business units, so recurring-only production count lags the headline paying count through most of Y1 and early Y2."
  - "Gross margin only reaches the BP target of 70% if connector reuse materially reduces bespoke implementation; dirty customer data could hold margins in the mid-60s."
  - "Cash is modeled as EBITDA, so milestone billing timing, implementation prepayments, and enterprise procurement delays could shift the actual cash curve."
