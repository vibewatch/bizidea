slug: cell-therapy-network-integrity-os
date: '2026-07-07'
executiveSummary: >-
  细胞疗法网络诚信操作系统，瞄准的是美国先进疗法申办方一个真实的上市就绪痛点：他们必须跨多州启动授权治疗机构，同时还要守住可追溯性、方案执行和疗效报告。第一个买家是申办方的商业运营负责人或先进疗法运营负责人，正准备启动一个 3-10 州的网络，眼下靠零散的工具和服务来管理提供方入网、监管链事件和报告。产品切口刻意收得很窄：提供方资质认证与机构就绪工作流、逐剂监管链记录、监管链异常预警，以及能让申办方为"可追溯、医生主导"网络这一说法辩护的疗效导出包。比起完整的疗法编排系统，这道切口更容易被快速验证，因为它挂靠在一个本来就有预算、且延误成本清晰可见的上市里程碑上。市场进入打法应保持创始人主导、按客户精耕，直到公司证明一次付费试点能缩短机构启用时间、提升监管链完整度，足以拿下一份正式生产合同。最强的扩张路径不是更宽泛的医院资质认证，而是面临同样机构资质审核、文档记录和治疗后报告负担的相邻先进疗法提供方网络。最大的缺口不在概念，而在证据：创始信号锚定在 MuseCell 一次上市模式上，近期买家的确切数量、提供方规模和专用供应商的定价基准，眼下都还只是估算。由于美国这个即时滩头市场看起来只是一个低两位数百万美元规模的软件市场，只有当早期试点证明存在从这道切口通向相邻先进疗法网络的可复制路径时，这家公司才值得投入尽调。
problem:
  - 上市阶段的先进细胞疗法申办方必须快速在多州启动合格治疗机构，但眼下提供方审核、培训和上市就绪工作，仍然靠邮件、表格、顾问和一次性法务流程在撑着。
  - 随着交付从少数几个学术中心走向社区和门诊场景，每多一次交接，就多一分出现监管链记录缺失、方案偏差或疗效提交延误的风险——这些都会拖慢营收、招致审查，并损害申办方相对于海外或未经验证替代方案的可信度。
solution:
  - 申办方侧的工作流操作系统，用标准化的机构就绪证据取代临时拼凑的入网方式，招募、认证并培训授权提供方。
  - 逐剂监管链事件记录，带异常预警和审计轨迹，架在现有物流和编排供应商之上，而不是取代它们。
  - 疗效采集与导出层，帮申办方从分布式提供方网络中拼出可直接呈交监管机构、支付方和媒体的证据。
whyWeWin:
  - 这个品类现在的替代品分散在资质认证、物流、编排、登记和服务供应商之间，恰恰在网络启动速度和可追溯性同时吃紧的那个点上，留出了一个面向申办方的空白。
  - 买家本来就在为相邻的上市基础设施掏钱，所以这个产品可以重新分配现有的商业化和运营预算，而不需要另开一条新的可自由裁量支出线。
  - 如果这家初创公司能成为机构就绪度、监管链异常和跨网络对标数据的系统记录方，就能在现有厂商把技术栈整合起来之前，先建立起数据和工作流层面的转换成本。
strategicChoices:
  beachhead: 美国上市阶段的再生医学和先进细胞疗法申办方，正在商业化上市后 12 个月内启动其首个 3-10 州授权提供方网络。
  wedgeRationale: >-
    这道切口比完整的疗法编排更窄，也比通用资质认证更急迫，因为一次延误或记录不全的机构上线会立刻卡住营收，并且恰恰在申办方最想摆脱医疗游或灰色市场替代方案的那一刻，动摇它对外宣称的可追溯性。
  sequencingRationale: >-
    先从提供方入网、机构就绪证据、监管链异常处理和简单的疗效导出做起，因为这些工作流可以靠 CSV 和 API 集成部署，并能对照上市时间来衡量效果。只有在一两家申办方证明产品确实改变了上线速度和审计就绪度、值得签一份年度合同之后，才加入合作伙伴集成、对标报告和相邻疗法模板。销售在拿到这份证据之前保持创始人主导，之后再招聘实施和合作伙伴拓展人员，最后才转向大规模的现场销售。
  notYet:
    - 在美国的上市就绪打法尚未跑通、可复制之前，先不做欧洲和跨境扩张。
    - 不把完整的生产编排或 EHR 回写当作核心产品承诺。
    - 不做面向消费者的再生诊所市场或灰色市场诊所网络。
    - 不做先进疗法提供方网络之外的通用医院资质认证。
market:
  tam: "$60M 估算 TAM，基于约 80 个申办方侧先进疗法网络项目，按每个约 $0.75M 的混合年支出计算。"
  sam: "$12M 估算美国滩头市场 SAM，基于约 24 个上市阶段或扩张阶段项目，按约 $0.5M ACV 计算。"
  som: "$2.4M 估算第 3 年 SOM，基于试点转生产后 6 个客户按约 $0.4M ACV 计算。"
  segments:
    - 正在搭建授权治疗机构网络的美国先进细胞疗法和再生医学申办方
    - 必须完成培训、就绪度审核和报告才能留在申办方网络内的认证治疗机构和医生诊所
  buyingProcess: >-
    这是一种按客户精耕的销售动作，由一次上市、州扩张或社区机构启用的截止日期触发。发起人通常是商业运营或先进疗法运营负责人，但由于系统会触及机构资质审核、监管链记录和下游报告，质量、监管、医学事务和 IT 部门都必须批准这套工作流。
product:
  mvp: >-
    MVP 应覆盖提供方入网、机构就绪核查清单、文件收集、剂量监管链事件记录、监管链异常预警，以及一个基础的疗效导出包。应优先依靠导入和轻量级集成，而不是定制的 EHR 或生产系统集成。
  sixMonth: 发布一个共创客户版本，包含申办方和机构双端门户、模板驱动的就绪工作流、可审计的监管链事件，以及供登记或质量报告使用的 CSV 或 FHIR 导出。
  twelveMonth: 加入多网络仪表盘、对标视图，与一家物流供应商和一套编排或枢纽工作流对接的伙伴连接器，以及供上市评审使用的审计包生成功能。
  twentyFourMonth: 把同一套事件模型扩展到相邻的先进疗法网络，比如扩大使用的基因疗法或其他受监管的门诊细胞疗法项目，并在申办方之间复用对标数据。
  keyBets:
    - 申办方会为一个中立的运营层付费，而不是把这套工作流硬塞进 McKesson、TrakCel 或内部工具里。
    - 只有当导出内容能减少重复的认证和登记工作时，治疗机构才会采用这套工作流。
    - 一个聚焦监管链和就绪度的窄事件模型，足以在深度集成建成之前证明价值。
    - 在更大的现有厂商打包出类似功能之前，跨网络对标数据对买家来说就会变得重要。
gtm:
  wedge: 向正在新州集群里搭建下一批 5-10 家授权提供方的申办方，出售一次付费的上市就绪试点。
  channels:
    - 创始人对上市就绪、网络运营和先进疗法运营负责人的直接销售，锁定具名申办方账户
    - 来自认证、监管事务和细胞疗法运营顾问的转介
    - 通过冷链、编排、枢纽和专科分销伙伴的联合销售或集成拉动获客
  funnelTargets: "具名账户到合格评估转化率 25% 以上，合格评估到付费试点转化率 30% 以上，试点到年度生产合同转化率 60% 以上"
  pricing: >-
    先以首次网络铺开的付费试点或实施套餐起步，再转为按活跃治疗机构或提供方数量、外加每剂监管链事件计费的年度申办方订阅。这让价格与州扩张、网络复杂度以及更快机构启用带来的营收增量挂钩，而不是单纯按席位计价。
businessModel:
  revenueStreams:
    - 首个申办方网络部署的付费试点和入网费
    - 覆盖活跃机构、提供方就绪和审计工作流的年度申办方网络订阅
    - 随治疗量增长而扩大的按剂或按监管链事件计费的使用费
    - 一旦跨网络数据形成，就推出高级对标和合规报告模块
  unitOfValue: 一个有监管链事件追踪和报告产出的活跃授权治疗机构
  targetGrossMarginPct: 72
  expansionLevers:
    - 加入共享机构资质审核和可追溯性工作流的相邻先进疗法品类
    - 一旦多个申办方网络跑在同一套事件模型上，就销售对标和审计产品
    - 加深与物流、编排和登记系统的集成，以提高转换成本和 ACV
strategyMap:
  northStarMetric: 平台上活跃运行、监管链记录完整度超过 95%、且疗效按时提交的治疗机构数量
  inputMetrics:
    - 从提供方提名到机构上线所需的天数
    - 监管链记录无缺口的剂量占比
    - 按时提交所需疗效数据的受治患者占比
    - 付费试点转生产合同的转化率
    - 无需定制重建就交付的可复用申办方工作流数量
  moatsToBuild:
    - 跨申办方的机构就绪模板和异常分类体系
    - 默认对接 CIBMTR、认证和物流工作流的数据导出
    - 跨网络关联就绪度、监管链异常和疗效的对标数据集
  killCriteria:
    - 面向上市客户销售 12 个月后，付费共创客户少于 2 家
    - 试点部署未能将机构启用时间比申办方基线缩短至少 30% 或 4 周
    - 早期客户需要大量人工数据处理，导致生产部署无法支撑毛利率超过 70% 的路径
  mermaid: |
    flowchart LR
      Wedge[Launch-stage sponsor network] --> MVP[Credentialing plus custody MVP]
      MVP --> Proof[Proof of faster site activation and cleaner custody records]
      Proof --> Expansion[Adjacent advanced-therapy networks and benchmark data]
investorMemo:
  verdict:
    call: Watch
    conviction: 真实的运营痛点加上碎片化的替代方案，构成了一道站得住脚的切口，但近期市场规模和买家数量目前还太薄，撑不起高信心判断。
    whyBelieve: 如果上市阶段的申办方反复遇到同样的网络搭建难题，一个统一机构就绪度、监管链保障和疗效报告的申办方侧控制层，就有可能凌驾于今天这个碎片化的服务栈之上。
    whyDoubt: 初始买家群体可能不到二十几个真实账户，现有伙伴或内部门户可能会在初创公司赢得独立预算之前，先把这笔预算吃掉。
    nextDiligence: 在为更大的扩张故事背书之前，先拿下一家上市阶段申办方的付费试点，证明明显更快的上线速度和高监管链完整度。
  firstCustomer:
    title: 美国上市阶段先进细胞疗法申办方的商业运营负责人
    profile: 一家大约 100-500 名员工的申办方，正准备其首个跨州授权提供方网络，已经在用外部物流或枢纽伙伴，但缺少内部的机构就绪、监管链记录和疗效报告系统。
    trigger: 一次已宣布的美国上市或下一轮州扩张，需要在一个规划周期内启用 5-10 家提供方。
    buyer: 商业运营 / 先进疗法运营副总裁或负责人
    initialContract: 首批 5-10 个机构的付费试点，如果下一波上市顺利搭上这个平台，将转为约 $0.4M-$0.5M 的年度合同。
  mustBeTrue:
    - 未来 24 个月里，至少有 15 家美国申办方会进入多机构先进疗法网络搭建模式。
    - 一家上市阶段的申办方会为独立软件供应商付费，而不是把这个需求塞进 McKesson、TrakCel 或内部工具里。
    - MVP 能把提供方启用时间至少缩短 30%，同时把监管链记录完整度保持在 95% 以上。
    - 治疗机构会接受这套工作流，因为它减少了重复的认证和登记工作，而不是增加了净行政负担。
    - 同一套事件模型会在第 18 个月前赢得至少一个相邻先进疗法品类，把市场扩展到最初的美国滩头市场之外。
  diligenceQuestions:
    - 未来 24 个月里，究竟有多少申办方真正在启动或扩张 3-10 州的提供方网络？
    - 在商业运营、先进疗法运营和外部枢纽服务合同之间，这个问题实际上归哪个预算管？
    - 在更快的机构启用、更少的监管链异常和更好的报告合规之间，哪个试点 ROI 指标真正能把申办方转化为生产用户？
    - 这款产品能否以足够低的成本对接登记、物流和认证工作流，从而维持软件级别的毛利率？
    - 在这家初创公司做大之前，为什么 TrakCel、McKesson 或申办方自建门户不会先补上这套功能？
operatingAssumptions:
  - assumption: 有足够多处于活跃网络搭建模式的美国上市阶段申办方账户，能支撑一次聚焦的种子前市场进入。
    basis: research.yaml
    validationTest: 在 90 天内建立一份具名账户地图，完成 15-20 场买家访谈，其中至少 10 个账户确认存在正在进行的网络搭建计划。
    decisionImpact: 如果不成立，就收紧烧钱速度、推迟招聘，并更早把 ICP 扩展到相邻先进疗法品类。
  - assumption: 买家愿意为一个独立的网络诚信产品付费，而不是把这套工作流打包进服务或内部工具里。
    basis: research.yaml
    validationTest: 拿下一次付费试点，且不需要申办方额外购买一个更大的打包服务套餐。
    decisionImpact: 如果不成立，就把产品重新定位为通过现有服务伙伴销售的嵌入式模块或渠道产品。
  - assumption: 只要这套工作流能减少重复报告和入网工作，治疗机构就会使用它。
    basis: research.yaml
    validationTest: 在第一次试点中，至少 80% 的目标机构完成入网和月度报告时，行政耗时与申办方现有流程相比持平或更低。
    decisionImpact: 如果不成立，就把产品重心转向申办方侧的后台自动化，减少面向机构一侧的工作流。
  - assumption: 轻量级的 CSV 和 API 集成，足以让最初几次部署产生价值。
    basis: operator judgment
    validationTest: 前两次部署无需定制 EHR 集成，就能覆盖 90% 以上所需的监管链和报告字段。
    decisionImpact: 如果不成立，公司就必须增加服务密集型的实施工作，或者进一步收窄 MVP 范围。
  - assumption: 核心事件模型能从第一个滩头市场推广到另一个先进疗法网络。
    basis: idea.yaml
    validationTest: 在第 18 个月前，用同一套数据模型和工作流模板，在最初的再生医学申办方切口之外赢得一个共创客户合作。
    decisionImpact: 如果不成立，这门生意就会停留在一个小众合规产品的定位上，眼下的创投规模论证会大幅削弱。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 建立一份实时的美国申办方账户地图，覆盖处于上市或州扩张模式的公司，并开展结构化买家访谈。
    hypothesis: 近期市场里至少有 10 个存在紧迫网络搭建痛点的活跃申办方账户。
    successMetric: 完成 15-20 场访谈，确认 10 个具名账户，其中 5 个账户确认存在人工监管链或机构就绪缺口。
    owner: 商业创始人
  - horizon: 0-90 天
    experiment: 在建成深度集成之前，先用模拟的就绪度和监管链工作流，卖出一次付费的共创客户试点。
    hypothesis: 申办方愿意在完整平台建成之前，为一个窄范围的上市就绪与监管链产品付费。
    successMetric: 交付 2 份试点提案，签下 1 份付费试点。
    owner: 商业创始人
  - horizon: 3-6 个月
    experiment: 在一家申办方首批 5-10 个机构中部署 MVP。
    hypothesis: 标准化入网和异常处理，能比申办方现有工作流显著缩短上线时间。
    successMetric: 试点队列中机构启用速度至少加快 30%，机构采用率达到 80%。
    owner: 细胞疗法运营负责人
  - horizon: 3-6 个月
    experiment: 与一家申办方和一家治疗机构一起上线登记和认证导出功能。
    hypothesis: 如果所需报告可以导出、无需重复录入数据，机构就会接受这个平台。
    successMetric: 每次患者或机构事件生成所需产出的人工返工时间少于 15 分钟。
    owner: 创始工程师
  - horizon: 6-9 个月
    experiment: 把一家冷链或编排合作伙伴接入监管链事件模型。
    hypothesis: 伙伴数据接入能提升监管链完整度，同时不会把部署变成定制服务项目。
    successMetric: 监管链记录完整度超过 95%，且伙伴专属实施工作量少于 2 周。
    owner: 实施工程师
  - horizon: 9-12 个月
    experiment: 把首次试点转化为年度生产合同，并发布一份内部 ROI 案例研究。
    hypothesis: 可衡量的上市速度和文档记录提升，足以拿下一份生产预算。
    successMetric: 完成 1 次生产合同转化，至少获得 1 位可对外引用的高管客户。
    owner: 商业创始人
  - horizon: 12-18 个月
    experiment: 在一个相邻先进疗法品类中测试同一套工作流。
    hypothesis: 产品能在不完全重建的情况下扩展到最初滩头市场之外。
    successMetric: 拿下 1 个相邻品类共创客户，新增工作流逻辑占比低于 20%。
    owner: 产品负责人
operations:
  - 维护版本受控的机构就绪模板，对应申办方要求和 FACT、NMDP、CIBMTR 等外部标准的证据预期。
  - 在早期部署阶段，设立一个人工介入的异常处理台，专门处理缺失的监管链事件、超期的处理窗口和不完整的提供方文档。
  - 优先对接申办方自有的物流、编排和质量系统的 CSV 或 API 数据流，再尝试大范围的 EHR 回写。
  - 让监管事务和隐私法务全程参与，确保早期客户始终锚定在有据可查、申办方主导的项目上，而不是灰色市场诊所网络。
team:
  - role: 商业创始人
    startTiming: Month 0
    rationale: 买家群体小、受时间窗口驱动，在形成可复制的销售动作之前，需要创始人亲自主导客户筛选、试点销售和伙伴招募。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 公司需要一位强力的建造者，在不过度构建的前提下，交付工作流引擎、审计日志和首批数据集成。
  - role: 细胞疗法运营与合规负责人
    startTiming: Month 1
    rationale: 买家信任依赖于把机构资质审核、监管链和报告工作流建模得足够可信，才能经得起监管和运营尽调的检验。
  - role: 实施工程师
    startTiming: Month 6
    rationale: 拿下第一次付费试点后，部署的可复制性和伙伴集成，比再增加拿配额的销售人手更重要。
milestones:
  - horizon: 0-12 个月
    items:
      - 完成一份具名账户地图，并与上市阶段申办方完成 15-20 场买家访谈。
      - 签下 1 个付费共创客户，交付覆盖机构就绪、监管链异常和疗效导出的 MVP。
      - 在首个试点网络中证明机构启用速度至少加快 30%、监管链完整度超过 95%。
      - 把试点转化为 1-2 份年度生产合同。
  - horizon: 12-24 个月
    items:
      - 拿下 4 家申办方客户，让一次物流集成加一套登记或认证导出工作流变得可复制。
      - 推出对标和审计包报告，改善续约和扩展谈判。
      - 用同一套核心事件模型验证 1 个相邻先进疗法品类。
  - horizon: 24-36 个月
    items:
      - 拿下 6 家申办方客户，平台上的活跃治疗机构达到 50 家以上。
      - 扩展到至少 2 种相邻先进疗法网络类型，且无需为每一种都定制重建。
      - 用跨网络对标数据和伙伴分销来巩固续约、提高 ACV。
risks:
  - risk: 公司可能过度依赖一个眼下可见的上市模式，而真实的买家池对创投级回报来说仍然太小。
    likelihood: High
    impact: High
    mitigation: 在团队验证具名账户群体、并在既定 ICP 内拿下至少一次付费试点之前，不扩充团队规模。
  - risk: 申办方可能更倾向于延伸使用 McKesson、TrakCel、内部门户或咨询工作流，而不是购买一个新平台。
    likelihood: High
    impact: High
    mitigation: 把产品定位为一个能与现有厂商系统集成的中立层，并证明比打包替代方案上线更快、审计轨迹更清晰。
  - risk: 如果新工作流带来额外的文档记录负担，治疗机构可能会抵触。
    likelihood: Medium
    impact: High
    mitigation: 把机构侧的数据录入做到最少，优先做能消除重复认证、登记和申办方报告工作的导出功能。
  - risk: 围绕未获批再生产品的监管收紧或品类污名，可能会压缩或延后最初的滩头市场。
    likelihood: Medium
    impact: High
    mitigation: 把早期销售锚定在申办方主导、具备 FDA 认知的项目上，并让工作流在不同监管路径之间保持可配置。
  - risk: 集成复杂度和申办方特定的数据要求，可能把部署变成服务密集型项目。
    likelihood: Medium
    impact: Medium
    mitigation: 先从一个窄事件模型、申办方自有的数据边界和一小组可复制连接器做起，再承诺深度系统替换。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    用 18 个月资金验证真实买家池，构建资质认证加监管链 MVP，拿下 2-3 次付费试点，证明可复制的部署经济模型，并在招聘更大规模的市场进入团队之前，先赢得向相邻先进疗法网络扩张的资格。
