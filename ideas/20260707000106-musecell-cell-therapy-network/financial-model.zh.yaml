scenarios:
  downside:
    description: >-
      申办方销售周期拉长，到 Y3 只转化 4 家生产申办方，ACV 维持在约 $420K，公司整体比基准情景更偏服务密集型。
    y3RevenueK: 1572.0
    y3EbitdaK: -945.0
    cashLowPointK: -435.1
    keyAssumptionChanges:
      - "生产申办方到 Y3 期末只达到 4 家，而不是 6 家。"
      - "稳态 ACV 更接近 $420K，而不是 $480K。"
      - "由于试点支持仍靠人工，稳态毛利率停滞在 60% 出头。"
  base:
    description: >-
      基准情景到 Y3 拿下 6 家生产申办方，稳态 ACV 约 $480K，付费试点为从上市就绪项目过渡到年度软件合同架起了桥梁。
    y3RevenueK: 2672.0
    y3EbitdaK: -122.5
    cashLowPointK: 876.0
    keyAssumptionChanges:
      - "与主模型假设一致。"
  upside:
    description: >-
      伙伴转介压缩了周期，到 Y3 转化 8 家申办方，ACV 升到 $500K 以上，更好的收入结构带来明显为正的 EBITDA。
    y3RevenueK: 3591.0
    y3EbitdaK: 572.1
    cashLowPointK: 1359.3
    keyAssumptionChanges:
      - "生产申办方到 Y3 期末达到 8 家。"
      - "凭借对标报告和更大的机构覆盖面，稳态 ACV 升向约 $516K。"
      - "得益于更好的伙伴获客渠道，转化速度比基准快约一个季度。"
sensitivity:
  - variable: ARPU
    downsideCase: "稳态生产 ACV 停滞在 $420K。"
    baseCase: "稳态生产 ACV 达到 $480K。"
    upsideCase: "凭借更强的对标报告采用度，稳态生产 ACV 达到 $540K。"
    y3RevenueImpactK: -315.0
    cashImpactK: -226.8
  - variable: CAC
    downsideCase: "由于团队更依赖直接外呼、伙伴拓展较慢，CAC 为 $200K。"
    baseCase: "创始人主导销售加上小范围伙伴动作，CAC 为 $154K。"
    upsideCase: "如果转介绍和集成伙伴带来大部分合格试点，CAC 为 $120K。"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "月度流失率 3.0%，且 H2Y3 流失 1 个客户。"
    baseCase: "月度流失率 2.0%。"
    upsideCase: "凭借强工作流锁定效应，月度流失率降到 1.0%。"
    y3RevenueImpactK: -314.0
    cashImpactK: -223.8
  - variable: sales cycle
    downsideCase: "所有转化都推迟一个季度；首份生产合同从 M10 推迟到 M13。"
    baseCase: "首份生产合同在 M10 签下，后续转化按建模节奏进行。"
    upsideCase: "伙伴转介绍把转化提前约一个季度。"
    y3RevenueImpactK: -204.0
    cashImpactK: -463.6
  - variable: gross margin
    downsideCase: "由于试点和异常处理仍偏服务密集，稳态毛利率为 66%。"
    baseCase: "生产收入的稳态毛利率为 72%。"
    upsideCase: "随着更多导出和集成实现标准化，稳态毛利率达到 75%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -157.2
  - variable: pilot conversion
    downsideCase: "40% 的付费试点转化为年度生产合同。"
    baseCase: "60% 的付费试点实现转化。"
    upsideCase: "凭借更强的证据和客户推荐，70% 的付费试点实现转化。"
    y3RevenueImpactK: -200.0
    cashImpactK: -144.0
  - variable: hiring pace
    downsideCase: "项目经理和集成工程师的招聘提前一个季度。"
    baseCase: "项目经理在 M28、集成工程师在 M34 入职。"
    upsideCase: "如果试点进度放缓、团队要保留现金，两个岗位都延后一个季度招聘。"
    y3RevenueImpactK: 0.0
    cashImpactK: -83.7
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      NamedAccounts --> PaidPilots
      PaidPilots --> ProductionSponsors
      ProductionSponsors --> ActiveSites
      ActiveSites --> SubscriptionRevenue
      ActiveSites --> UsageRevenue
      SubscriptionRevenue --> GrossProfit
      UsageRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景收入来自 6 份年度申办方合同，到 Y3 末以约 $480K ACV 退出，每次转化前的空档由付费试点填补。
  - checkName: 必须跑对的环节
    finding: 试点转生产的转化率必须保持在 BP 设定的 60% 目标附近，因为这个滩头市场眼下只包含约 24 个近期申办方项目。
  - checkName: 模型会在哪坏掉
    finding: 如果转化推迟一个季度且 ACV 维持不变，下行情景的现金会在公司证明具备种子轮资格之前就跌破零。
  - checkName: 下一轮融资前的证明点
    finding: 一旦公司在 Y2 末前展示出 4 家生产申办方、可复制的集成经济模型，以及一个相邻品类的共创客户，种子轮融资便有了依据。
sanityChecks:
  ruleOf40: "Y3 增长 87.2% + EBITDA 利润率 -4.6% = 82.6%"
  burnMultiple: "Y2 燃烧倍数为 0.5x：约 $1.27M 净新增 ARR（4 家申办方按 $420K ARR 计，减去 1 家申办方按 $408K ARR 计）只消耗了 $646.7K 的 EBITDA 亏损。"
  revenuePerFte: "Y3 人均收入 $334K（$2.67M 收入 / Q4Y3 的 8 名 FTE；对比垂直 SaaS 基准约 $200-400K）"
  flags:
    - "基准情景在 Y3 仍略微 EBITDA 为负，因此下一轮融资取决于能否证明客户经济模型可复制，而不是盈利能力本身。"
    - "到 Y3 的 6 家客户，大约只是所引用的 24 个项目滩头市场的四分之一，因此少数几个账户延后签约，就会对结果产生实质影响。"
    - "Y3 混合毛利率只达到约 68.7%，因为试点和人工介入的实施仍在收入结构中占比不小；72% 是单位经济的稳态目标，不是 Y3 的报告均值。"
    - "由于上市时点较为集中，管理层很可能希望在扩充更广泛的市场进入团队之前多留一些缓冲，因此这笔融资额相对建模烧钱速度显得保守。"
