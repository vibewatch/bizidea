openQuestions:
- How many non-oncology or regenerative-therapy sponsors will actually stand up multi-state authorized-provider networks in the next 24 months, versus staying single-site or relying on medical tourism alternatives?
- Can treatment centers accept another operating layer unless it auto-populates accreditation, registry, and EHR workflows?
- What minimum data-rights structure allows the startup to benchmark custody and protocol-adherence patterns without triggering buyer IP concerns?
- How quickly can the wedge generalize from advanced cell therapies into adjacent regulated provider-network categories if the initial beachhead stays small?
