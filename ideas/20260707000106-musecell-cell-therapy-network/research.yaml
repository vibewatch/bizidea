  validationPlan:
  - priority: high
    question: How many U.S. launch-stage or expansion-stage advanced-therapy sponsors will be in active network-build mode over the next 24 months?
    evidenceToGather: Build a live account map from launches, late-stage programs, and treatment-center activations; confirm timing with 15-20 commercial-operations interviews.
  - priority: high
    question: Will sponsors pay a separate software vendor instead of extending existing hub, logistics, or internal workflows?
    evidenceToGather: Run one paid design-partner pilot that measures site activation time, missing-document rates, and custody exception resolution versus the current manual process.
  - priority: medium
    question: What minimum data export is required for CIBMTR, safety follow-up, and internal quality review?
    evidenceToGather: Interview registry, pharmacovigilance, and cell-therapy-ops stakeholders to define the default event model and export package.
  - priority: medium
    question: How much cross-customer benchmarking can the product do before buyers get uncomfortable with IP or patient-data boundaries?
    evidenceToGather: Pressure-test legal terms for benchmarking, de-identification, and event aggregation with two design partners and outside counsel before productizing the data model.
