competitors:
- name: TrakCel
  stage: scale-up
  wedge: Cell and gene therapy orchestration and audit-trail software for therapy developers.
  pricing: Not publicly disclosed; enterprise implementation model.
  strength: Strong therapy-orchestration focus with regulatory-compliant audit trail and patient-journey visibility.
  weaknessVsUs: Does not own provider credentialing, multi-state network launch, or outcomes-registry workflows as the primary wedge.
  sourceRefs:
  - 31
  - 48
- name: Biologics by McKesson / InspiroGene
  stage: incumbent
  wedge: Specialty pharmacy, hub, logistics, and qualified treatment-center support for CGTs.
  pricing: Not publicly disclosed; service and enterprise contract model.
  strength: Deep distribution and patient-support reach around complex therapies.
  weaknessVsUs: Service-heavy and manufacturer-centric; not a neutral self-serve OS for emerging provider networks.
  sourceRefs:
  - 30
  - 27
- name: Cryoport
  stage: incumbent
  wedge: Validated cold-chain monitoring and shipment chain-of-custody for cell therapies.
  pricing: Not publicly disclosed; shipment and platform contract model.
  strength: Owns the monitored logistics layer and documented condition data.
  weaknessVsUs: Covers physical product movement, not provider readiness, training, or outcomes capture.
  sourceRefs:
  - 32
  - 50
- name: symplr Provider
  stage: incumbent
  wedge: Generic provider credentialing and enrollment software for healthcare systems.
  pricing: Not publicly disclosed; enterprise subscription model.
  strength: Established hospital credentialing and enrollment workflows.
  weaknessVsUs: Generic to healthcare providers; lacks therapy-specific custody, site activation, and post-treatment reporting layers.
  sourceRefs:
  - 33
  - 45
- name: NMDP / CIBMTR
  stage: incumbent
  wedge: Standards, network participation, and outcomes-registry gravity for cellular therapy programs.
  pricing: Registry and participation model, not pure SaaS pricing.
  strength: High trust and embedded reporting relationships across treatment centers.
  weaknessVsUs: Acts as standards and registry infrastructure rather than a sponsor-facing operating system for rapid network rollout.
