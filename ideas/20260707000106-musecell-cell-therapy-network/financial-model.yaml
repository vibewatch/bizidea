scenarios:
  downside:
    description: >-
      Sponsor sales cycles stretch, only 4 production sponsors convert by Y3,
      ACV stays near $420K, and the company remains more services-heavy than the
      base case.
    y3RevenueK: 1572.0
    y3EbitdaK: -945.0
    cashLowPointK: -435.1
    keyAssumptionChanges:
      - "Production sponsors reach only 4 by Y3 EOP instead of 6."
      - "Steady-state ACV stays closer to $420K than $480K."
      - "Steady-state gross margin stalls near the mid-60s because pilot support remains manual."
  base:
    description: >-
      Base case lands 6 production sponsors by Y3 on roughly $480K steady-state
      ACV, with paid pilots funding the bridge from launch-readiness projects
      into annual software contracts.
    y3RevenueK: 2672.0
    y3EbitdaK: -122.5
    cashLowPointK: 876.0
    keyAssumptionChanges:
      - "Base assumptions as modeled."
  upside:
    description: >-
      Partner referrals compress the cycle, 8 sponsors convert by Y3, ACV rises
      above $500K, and better mix drives clearly positive EBITDA.
    y3RevenueK: 3591.0
    y3EbitdaK: 572.1
    cashLowPointK: 1359.3
    keyAssumptionChanges:
      - "Production sponsors reach 8 by Y3 EOP."
      - "Steady-state ACV rises toward ~$516K through benchmark reporting and larger site footprints."
      - "Conversions happen roughly a quarter faster with better partner sourcing."
