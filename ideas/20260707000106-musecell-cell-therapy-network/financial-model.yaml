modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      NamedAccounts --> PaidPilots
      PaidPilots --> ProductionSponsors
      ProductionSponsors --> ActiveSites
      ActiveSites --> SubscriptionRevenue
      ActiveSites --> UsageRevenue
      SubscriptionRevenue --> GrossProfit
      UsageRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from 6 annual sponsor contracts that exit Y3 at about $480K ACV, with paid pilots filling the gap before each conversion.
  - checkName: Must go right
    finding: Pilot-to-production conversion must stay near the BP's 60 percent target because the beachhead only contains about 24 near-term sponsor programs.
  - checkName: Model breaks if
    finding: If conversions slip a quarter and ACV stays flat, downside cash falls below zero before the company proves seed readiness.
  - checkName: Next-round proof
    finding: A seed raise is justified once the company shows 4 production sponsors, repeatable integration economics, and one adjacent-category design partner by late Y2.
sanityChecks:
  ruleOf40: "Y3 growth 87.2% + EBITDA margin -4.6% = 82.6%"
  burnMultiple: "Y2 burn multiple 0.5x: $646.7K EBITDA burn on about $1.27M net-new ARR (4 sponsors at $420K ARR less 1 sponsor at $408K ARR)."
  revenuePerFte: "$334K Y3 ($2.67M revenue / 8 Q4Y3 FTE; benchmark ~$200-400K vertical SaaS)"
  flags:
    - "Base case is still slightly EBITDA-negative in Y3, so the next round depends on proof of repeatable customer economics rather than profitability."
    - "Six customers by Y3 equals roughly one-quarter of the cited 24-program beachhead, so a small number of slipped accounts materially changes the outcome."
    - "Blended gross margin only reaches about 68.7% in Y3 because pilots and human-in-the-loop implementations remain in mix; the 72% unit margin is a steady-state target, not the reported Y3 average."
    - "The funding ask is conservative versus modeled burn because launch timing is concentrated and management likely wants extra buffer before adding broader GTM capacity."
