problem: >-
  在美国推出新一代干细胞疗法的再生医学公司，几乎要在一夜之间搭建起跨多州的医生提供方网络，才能和患者过去远赴海外求诊的诊所竞争。眼下这套铺开流程全靠人力凑：法务团队一份份手写提供方协议，商务拓展人员靠打电话核实背景和现场走访来筛选医生，却没有一套共享系统去追踪每批细胞的监管链、核查治疗方案是否被严格执行，或是跨提供方记录患者疗效。网络里出一个害群之马、一次没记录的用药偏差，或是一份缺失的监管链记录，都可能引发州医学委员会的处罚，或是一则毁掉声誉的新闻——而这恰恰会摧毁整个品类赖以取代海外医疗游的"可追溯、由医生主导"定位。
targetUser:
  primary: >-
    美国再生医学与先进细胞疗法公司里负责商业化和网络运营的负责人，他们正逐州招募、认证并监督授权医生提供方。
  secondary: 网络内的授权医生诊所，他们必须完成入网培训、方案培训和合规报告，才能留在厂商网络里。
  buyer: 细胞疗法厂商的商业运营 / 网络拓展副总裁或负责人。
startupThesis:
  nonObviousInsight: >-
    当 Dezawa MuseCells 这类免疫耐受的异体细胞疗法绕开传统 FDA 审批药物路径在美国上市时，规模化的瓶颈不再是细胞科学本身，而是证明网络的可信度：谁有资格给患者用药、每一剂的监管链是否完整、疗效是否被记录得足够扎实以经得起监管和媒体的审视。目前还没有专门为这类疗法打造的合规层，因为这个品类本身才刚刚开始标准化（WHO INN 命名、多州授权提供方模式），这意味着一个网络诚信平台完全可能在现有厂商抢占之前，先一步成为默认基础设施。
  beachhead: >-
    效仿 MuseCell Innovations 模式的美国再生医学和先进细胞疗法厂商，它们在美国商业化上市的头 12 个月里正积极在 3 到 10 个州招募授权医生提供方，却缺乏内部的资质认证、监管链和疗效追踪系统。
  wedge: >-
    一套专为先进细胞疗法提供方网络打造的资质认证与监管链操作系统：医生审核与入网工作流、从实验室到患者的逐剂监管链追踪、方案执行核查清单，以及一个厂商可以拿去向监管机构、保险公司和媒体证明网络可追溯的疗效登记库。
  whyNowCatalyst: >-
    MuseCell Innovations 同时在四个州完成美国上市，说明再生医学公司现在把搭建授权提供方网络当成主要的市场进入打法，这为它们眼下靠人力硬凑的资质认证和可追溯性基础设施创造了紧迫且可反复出现的需求。
  ventureScalePath: >-
    从帮细胞疗法厂商搭建授权提供方网络起步，再扩展到面临同样网络诚信难题的相邻先进疗法品类（扩大使用的基因疗法、外泌体和多肽抗衰老诊所、复方生物制剂网络），最终成为支付方、州医学委员会和厂商都依赖的再生医学网络监督用疗效登记与审计追踪层。
solution: >-
  一个网络运营平台，供细胞疗法厂商的商业化团队用结构化的资质认证工作流去招募、审核、引入医生提供方，取代邮件和表格。每批细胞从生产到运输、再到给药医生手中，都有一份数字化的监管链记录，一旦出现监管链缺口或处理时限超期就自动预警。提供方为每一次患者接诊完成方案执行核查清单，平台把匿名化的疗效数据汇总进一个登记库，厂商可以拿这个登记库去面对监管机构和媒体。面向提供方的门户负责处理入网文书和培训模块，让新州的上线时间从目前动辄数月的人力流程，缩短到几周。
goToMarketSeed:
  firstCustomer: >-
    某家在美国上市的再生医学公司（沿袭 MuseCell Innovations 的模式）的商业运营负责人，负责在新一轮州级上市中招募和认证医生提供方。
  buyingTrigger: >-
    一次刚宣布或即将启动的多州美国商业化上市，需要快速搭建起医生提供方网络才能与海外诊所竞争，而内部又没有足够的人手从零打造监管链追踪和资质认证工具。
  currentAlternative: >-
    人力流程：法务起草提供方协议、用表格追踪资质、靠临时现场走访审计，提供方之间没有共享的监管链或疗效系统。
  switchingReason: >-
    人力方式一旦超过几个州就撑不住了，随时可能出现没记录的监管链缺口或方案偏差，从而拆穿公司对外宣称的"可追溯、由医生主导"——而这正是它用来把患者从海外诊所抢回来的核心卖点；一套专用系统能让新州更快上线，并留下经得起审查的审计轨迹。
  pricingHypothesis: >-
    按提供方网络订阅收费，以每个活跃授权提供方席位计价，再叠加每剂监管链交易费，随厂商的州覆盖范围扩大而增长。
whyNow:
  - point: >-
      MuseCell 同时在四个州启动授权提供方网络，说明厂商现在把靠分布式医生网络扩张当成主要的市场进入打法，而不是单开一家诊所。
    signalRefs: [多州授权医生网络同步上线]
    sourceRefs: [1]
  - point: >-
      公司明确把自己定位为海外干细胞旅行的替代方案，证实医疗旅游正是这道切口必须打败的现有对手，而且是一个疏于监管、很弱的对手。
    signalRefs: [替代海外医疗游的定位论]
    sourceRefs: [1]
  - point: >-
      可追溯性和医生主导的网络结构正被当作核心差异化卖点来营销，说明网络诚信基础设施已经被认定具有商业价值，而不只是合规上的附带考量。
    signalRefs: [可追溯性与标准化被当作官方差异化卖点]
    sourceRefs: [1]
  - point: >-
      WHO INN 命名进展能成为新闻，说明这类疗法仍处于标准化之前的阶段，留出了一个窗口期，让现有合规供应商还没能锁死这个品类。
    signalRefs: [品类仍处于监管标准化之前]
    sourceRefs: [1]
differentiator: >-
  通用资质认证软件（面向医院医务处设计）或专科药房枢纽服务（面向药品配送物流设计）都不是为这个场景打造的；这个平台专门针对活细胞、由医生给药的先进疗法在监管链和方案执行上的特定要求而设计——在这里，哪怕丢一份记录都可能让厂商彻底失去"可追溯网络"这个说法的立足点。疗效登记库还能给厂商提供一套通用工具做不出来的、可直接呈交监管机构和媒体的证据基础。
