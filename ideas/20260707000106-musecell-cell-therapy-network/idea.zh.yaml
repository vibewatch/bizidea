jobsToBeDone:
  - job: >-
      在新州搭建授权提供方网络时，帮商业化负责人快速审核和引入医生，让网络能在没有人工文书拖延的情况下上线。
    currentAlternative: 法务起草的一次性提供方协议和人工背景核实
    successMetric: 从招募提供方到网络上线所需的天数
  - job: >-
      向授权提供方运送细胞疗法剂量时，帮厂商追踪监管链和处理过程，让他们在监管机构或记者问起时能证明没有出现缺口。
    currentAlternative: 纸质或表格式运输日志，没有自动预警
    successMetric: 拥有完整、无缺口监管链记录的剂量比例
  - job: >-
      患者完成治疗后，帮厂商跨所有提供方采集疗效数据，让他们能向监管机构和支付方展示一份标准化的安全性与有效性记录。
    currentAlternative: 没有共享的疗效系统；各提供方各自保管记录
    successMetric: 登记库中已采集疗效数据的受治患者比例
ideaScorecard:
  signalStrength:
    score: 3
    rationale: >-
      这个 cluster 基于同日一篇具体细节丰富的专题报道（四个州、对抗海外医疗游的定位、可追溯性宣称），但缺乏独立佐证，因此评分被压低。
  painIntensity:
    score: 4
    rationale: >-
      人力、临时拼凑的提供方网络铺开方式，给正在争分夺秒取代海外诊所的厂商带来了真实的监管和声誉风险，对买家来说是高风险痛点。
  wedgeClarity:
    score: 4
    rationale: >-
      这道切口（资质认证加监管链加疗效登记库，服务细胞疗法提供方网络）范围窄、够具体，而且直接对应来源文章里公司自己宣传的内容。
  defensibility:
    score: 3
    rationale: >-
      由于品类尚未标准化，存在先发优势，但护城河能否成立，取决于能否在通用合规供应商进场之前，先在多家厂商之间建立起真正的疗效数据网络效应。
  ventureScale:
    score: 3
    rationale: >-
      细胞疗法厂商这个初始滩头市场很窄，但通向相邻先进疗法品类（基因疗法扩大使用、抗衰老诊所）的路径，为通向更大市场提供了可信路线。
topRisks:
  - name: 证据单薄，只有一个来源
    description: >-
      整个 cluster 都建立在一篇专题报道之上，因此关于 MuseCell 网络规模的假设，以及厂商普遍需要这类基础设施的推断，都可能被夸大。
    mitigation: >-
      在 MVP 之外扩建之前，先直接访谈 5-10 位再生医学商业化负责人来验证需求，并持续跟踪陆续出现的其他厂商上市动态。
  - name: 初始买家池偏小
    description: >-
      目前在美国搭建多州先进细胞疗法提供方网络的公司只有寥寥几家，这限制了近期的成交量。
    mitigation: >-
      从第一天起就把平台的资质认证和监管链模块设计成可通用于相邻先进疗法和扩大使用品类，让可触达的买家群体能快速扩大。
  - name: 底层疗法的监管归属尚不明确
    description: >-
      由于这些细胞疗法大多游离在标准 FDA 审批药物路径之外，监管口径一旦变化，这个平台所依赖的市场就可能随之改变或萎缩。
    mitigation: >-
      把合规工作流设计得足够灵活，能适应多种监管路径（扩大使用、试药权、医生指导用药），并与追踪政策动向的监管事务顾问保持密切联系。
