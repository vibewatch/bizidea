slug: cell-therapy-network-integrity-os
date: '2026-07-07'
executiveSummary: >-
  Cell-therapy network integrity OS targets a real launch-readiness pain for U.S.
  advanced-therapy sponsors that must activate authorized treatment sites across
  multiple states while preserving traceability, protocol adherence, and
  outcomes reporting. The first buyer is the Head of Commercial Operations or
  advanced-therapy operations lead at a sponsor preparing a 3-10 state network
  launch and currently managing provider onboarding, custody events, and
  reporting through fragmented tools and services. The product wedge is
  deliberately narrow: provider credentialing and site-readiness workflows,
  dose-level chain-of-custody logging, custody exception alerts, and outcomes
  exports that let a sponsor defend its traceable physician-led network claim.
  This wedge is faster to prove than full therapy orchestration because it
  attaches to the launch milestone that already has budget and a visible cost of
  delay. The go-to-market motion should stay founder-led and account-based until
  the company proves one paid pilot can shorten site activation time and
  improve custody completeness enough to win a production contract. The
  strongest expansion path is not broader hospital credentialing, but adjacent
  advanced-therapy provider networks that share the same site qualification,
  documentation, and post-treatment reporting burden. The largest gap is
  evidence, not concept: the founding signal is anchored on one MuseCell launch
  pattern, and the exact count of near-term buyers, provider volumes, and
  pricing benchmarks for a dedicated vendor are still estimates. Because the
  immediate U.S. beachhead appears to be a low-double-digit-millions software
  market, the company merits diligence only if early pilots show a repeatable
  route from this wedge into adjacent advanced-therapy networks.
problem:
  - Launch-stage advanced cell-therapy sponsors must activate qualified treatment
    sites across multiple states quickly, but today provider vetting, training,
    and launch readiness are still managed through email, spreadsheets,
    consultants, and one-off legal workflows.
  - As delivery moves beyond a few academic centers into community and
    outpatient settings, every extra handoff increases the risk of a missing
    custody record, protocol deviation, or delayed outcomes submission that can
    slow revenue, trigger scrutiny, and damage the sponsor's credibility
    against overseas or unproven alternatives.
solution:
  - Sponsor-side workflow OS for recruiting, credentialing, and training
    authorized providers with standardized site-readiness evidence instead of ad
    hoc onboarding.
  - Dose-level chain-of-custody event logging with exception alerts and audit
    trails that sit above existing logistics and orchestration vendors rather
    than replacing them.
  - Outcomes capture and export layer that helps sponsors assemble regulator-,
    payer-, and media-ready evidence from a distributed provider network.
whyWeWin:
  - The category's current substitutes are fragmented across credentialing,
    logistics, orchestration, registry, and services vendors, leaving a
    sponsor-facing gap at the exact point where network launch speed and
    traceability matter together.
  - Buyers already fund adjacent launch infrastructure, so the product can
    reallocate existing commercialization and operations budget instead of
    asking for a new discretionary line item.
  - If the startup becomes the system of record for site readiness, custody
    exceptions, and cross-network benchmarks, it can build data and workflow
    switching costs before incumbents unify the stack.
strategicChoices:
  beachhead: U.S. launch-stage regenerative-medicine and advanced cell-therapy
    sponsors activating their first 3-10 state authorized-provider network
    within 12 months of commercial launch.
  wedgeRationale: >-
    This wedge is narrower than full therapy orchestration and more urgent than
    generic credentialing because a delayed or poorly documented site launch
    blocks revenue immediately and undermines the sponsor's traceability claim
    at the exact moment it is trying to displace medical tourism or gray-market
    alternatives.
  sequencingRationale: >-
    Start with provider onboarding, site-readiness evidence, custody exception
    management, and simple outcomes exports because those workflows can be
    deployed with CSV and API integrations and measured against launch timing.
    Add partner integrations, benchmark reporting, and adjacent therapy
    templates only after one or two sponsors prove the product changes go-live
    speed and audit readiness enough to justify an annual contract. Keep sales
    founder-led until that proof exists, then hire implementation and
    partnership capacity before a broad field-sales motion.
  notYet:
    - Europe and cross-border expansion before the U.S. launch-readiness motion
      is repeatable.
    - Full manufacturing orchestration or EHR writeback as a core product
      promise.
    - Consumer-facing regenerative clinic marketplaces or gray-market clinic
      networks.
    - Generic hospital credentialing outside advanced-therapy provider
      networks.
market:
  tam: "$60M estimated TAM based on roughly 80 sponsor-side advanced-therapy network programs at about $0.75M blended annual spend."
  sam: "$12M estimated U.S. beachhead SAM based on about 24 launch-stage or expansion-stage programs at roughly $0.5M ACV."
  som: "$2.4M estimated year-3 SOM based on 6 customers at about $0.4M ACV after pilot-to-production conversion."
  segments:
    - U.S. advanced cell-therapy and regenerative-medicine sponsors building
      authorized treatment-site networks
    - Accredited treatment centers and physician practices that must complete
      training, readiness, and reporting to stay in sponsor networks
  buyingProcess: >-
    The motion is account-based and triggered by a launch, state expansion, or
    community-site activation deadline. The champion is usually a
    commercial-operations or advanced-therapy-operations leader, but quality,
    regulatory, medical affairs, and IT must approve the workflow because the
    system touches site qualification, custody records, and downstream
    reporting.
product:
  mvp: >-
    The MVP should cover provider onboarding, site-readiness checklists,
    document collection, dose custody event logging, custody exception alerts,
    and a basic outcomes export package. It should rely on imports and
    lightweight integrations first, not custom EHR or manufacturing
    integrations.
  sixMonth: Ship a design-partner release with sponsor and site portals,
    template-driven readiness workflows, auditable custody events, and CSV or
    FHIR exports for registry or quality reporting.
  twelveMonth: Add multi-network dashboards, benchmark views, partner
    connectors to one logistics vendor and one orchestration or hub workflow,
    and audit-pack generation for launch reviews.
  twentyFourMonth: Expand the same event model into adjacent advanced-therapy
    networks such as expanded-access gene therapy or other regulated outpatient
    cell-therapy programs, with reusable benchmark data across sponsors.
  keyBets:
    - Sponsors will pay for a neutral operating layer instead of forcing the
      workflow into McKesson, TrakCel, or internal tools.
    - Treatment sites will adopt the workflow only if exports reduce duplicate
      accreditation and registry work.
    - A narrow custody and readiness event model is enough to prove value
      before deep integrations are built.
    - Cross-network benchmark data will matter to buyers before a larger
      incumbent bundles similar features.
gtm:
  wedge: Sell a paid launch-readiness pilot to sponsors standing up the next
    5-10 authorized providers in a new state cluster.
  channels:
    - Founder-led direct sales to launch-readiness, network-operations, and
      advanced-therapy-ops leaders at named sponsor accounts
    - Referrals from accreditation, regulatory-affairs, and cell-therapy
      operations advisers
    - Co-sell or integration-led sourcing through cold-chain, orchestration,
      hub, and specialty distribution partners
  funnelTargets: "named account to qualified evaluation 25%+, qualified evaluation to paid pilot 30%+, pilot to annual production contract 60%+"
  pricing: >-
    Start with a paid pilot or implementation package for the first network
    rollout, then convert to an annual sponsor subscription priced by active
    treatment sites or providers plus per-dose custody events. This aligns
    price with state expansion, network complexity, and the revenue impact of
    faster site activation rather than with seat count alone.
businessModel:
  revenueStreams:
    - Paid pilot and onboarding fees for the first sponsor network deployment
    - Annual sponsor-network subscription for active sites, provider readiness,
      and audit workflows
    - Per-dose or per-custody-event usage fees as treatment volume scales
    - Premium benchmark and compliance reporting modules once cross-network data
      exists
  unitOfValue: active authorized treatment site with tracked custody events and
    reporting outputs
  targetGrossMarginPct: 72
  expansionLevers:
    - Add adjacent advanced-therapy categories that share site qualification and
      traceability workflows
    - Sell benchmark and audit products once multiple sponsor networks run on
      the same event model
    - Deepen integrations with logistics, orchestration, and registry systems
      to raise switching costs and ACV
strategyMap:
  northStarMetric: Active treatment sites live on the platform with greater
    than 95 percent complete custody records and on-time outcomes submission
  inputMetrics:
    - Days from provider nomination to site go-live
    - Percentage of doses with a gap-free custody record
    - Percentage of treated patients with required outcomes data submitted on
      time
    - Paid pilot to production conversion rate
    - Number of reusable sponsor workflows shipped without custom rebuild
  moatsToBuild:
    - Cross-sponsor site-readiness templates and exception taxonomy
    - Default data exports and integrations into CIBMTR, accreditation, and
      logistics workflows
    - Benchmark dataset linking readiness, custody exceptions, and outcomes
      across networks
  killCriteria:
    - Fewer than 2 paid design partners after 12 months of launch-targeted
      selling
    - Pilot deployments fail to reduce site activation time by at least 30
      percent or 4 weeks versus the sponsor baseline
    - Early customers require so much manual data work that production
      deployments cannot support a path to greater than 70 percent gross margin
  mermaid: |
    flowchart LR
      Wedge[Launch-stage sponsor network] --> MVP[Credentialing plus custody MVP]
      MVP --> Proof[Proof of faster site activation and cleaner custody records]
      Proof --> Expansion[Adjacent advanced-therapy networks and benchmark data]
investorMemo:
  verdict:
    call: Watch
    conviction: Real operational pain and fragmented substitutes create a
      plausible wedge, but the near-term market and buyer count are still too
      thin for high conviction today.
    whyBelieve: A sponsor-facing control plane that unifies site readiness,
      custody assurance, and outcomes reporting could sit above today's
      fragmented services stack if launch-stage sponsors repeatedly face the
      same network-build problem.
    whyDoubt: The initial buyer universe may be fewer than two dozen real
      accounts and incumbent partners or internal portals may absorb the budget
      before a startup wins standalone spend.
    nextDiligence: Secure one paid pilot with a launch-stage sponsor and show
      materially faster go-live plus high custody completeness before
      underwriting the broader expansion story.
  firstCustomer:
    title: Head of Commercial Operations at a U.S. launch-stage advanced
      cell-therapy sponsor
    profile: A roughly 100-500 employee sponsor preparing its first multi-state
      authorized-provider network, already using outside logistics or hub
      partners but lacking an internal system for site readiness, custody
      logging, and outcomes reporting.
    trigger: An announced U.S. launch or next state expansion that must
      activate 5-10 providers within one planning cycle.
    buyer: VP or Head of Commercial Operations / Advanced Therapy Operations
    initialContract: Paid pilot for the first 5-10 sites, converting to a
      roughly $0.4M-$0.5M annual contract if the next launch wave goes live on
      the platform.
  mustBeTrue:
    - At least 15 U.S. sponsors will enter multi-site advanced-therapy
      network-build mode over the next 24 months.
    - A launch-stage sponsor will pay a standalone software vendor instead of
      folding the need into McKesson, TrakCel, or internal tooling.
    - The MVP will cut provider activation time by at least 30 percent while
      keeping custody-record completeness above 95 percent.
    - Treatment sites will accept the workflow because it removes duplicate
      accreditation and registry work rather than adding net admin time.
    - The same event model will win at least one adjacent advanced-therapy
      category by month 18, expanding the market beyond the initial U.S.
      beachhead.
  diligenceQuestions:
    - How many sponsors are truly launching or expanding 3-10 state provider
      networks in the next 24 months?
    - Which budget owns this problem in practice across commercial ops,
      advanced-therapy ops, and external hub-services contracts?
    - Which pilot ROI metric actually converts a sponsor to production use
      among faster site activation, fewer custody exceptions, and better
      reporting compliance?
    - Can the product integrate with registry, logistics, and accreditation
      workflows cheaply enough to sustain software-like gross margins?
    - Why will TrakCel, McKesson, or a sponsor-built portal not add this
      feature set before the startup scales?
operatingAssumptions:
  - assumption: There are enough U.S. launch-stage sponsor accounts in active
      network-build mode to support a focused pre-seed go-to-market.
    basis: research.yaml
    validationTest: Build a named-account map and complete 15-20 buyer
      interviews within 90 days, with at least 10 accounts confirming a live
      network-build initiative.
    decisionImpact: If false, narrow burn, delay hiring, and expand the ICP
      into adjacent advanced-therapy categories earlier.
  - assumption: Buyers will fund a separate network-integrity product instead
      of bundling the workflow into services or internal tools.
    basis: research.yaml
    validationTest: Close one paid pilot without requiring the sponsor to buy a
      larger bundled services package.
    decisionImpact: If false, reposition as an embedded module or channel
      product sold through existing service partners.
  - assumption: Treatment sites will use the workflow if it reduces duplicate
      reporting and onboarding work.
    basis: research.yaml
    validationTest: In the first pilot, at least 80 percent of target sites
      complete onboarding and monthly reporting with neutral or lower admin
      time versus the sponsor's current process.
    decisionImpact: If false, shift product scope toward sponsor-side
      back-office automation and away from site-facing workflows.
  - assumption: Lightweight CSV and API integrations are enough to make the
      first deployments valuable.
    basis: operator judgment
    validationTest: The first two deployments capture more than 90 percent of
      required custody and reporting fields without custom EHR integration.
    decisionImpact: If false, the company must add services-heavy
      implementation work or further narrow the MVP.
  - assumption: The core event model generalizes beyond the first beachhead
      into another advanced-therapy network.
    basis: idea.yaml
    validationTest: Win one design-partner engagement outside the initial
      regenerative sponsor wedge by month 18 using the same data model and
      workflow templates.
    decisionImpact: If false, the business remains a niche compliance product
      and the current venture-scale case weakens materially.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Build a live account map of U.S. sponsors in launch or
      state-expansion mode and run structured buyer interviews.
    hypothesis: The near-term market contains at least 10 active sponsor
      accounts with urgent network-build pain.
    successMetric: 15-20 interviews completed, 10 named accounts qualified, and
      5 accounts confirming manual custody or site-readiness gaps.
    owner: Commercial founder
  - horizon: 0-90 days
    experiment: Sell a paid design-partner pilot using mocked readiness and
      custody workflows before building deep integrations.
    hypothesis: Sponsors will pay for a narrow launch-readiness and custody
      product before the full platform exists.
    successMetric: 2 pilot proposals delivered and 1 signed paid pilot.
    owner: Commercial founder
  - horizon: 3-6 months
    experiment: Deploy the MVP across one sponsor's first wave of 5-10 sites.
    hypothesis: Standardized onboarding and exception management can cut
      go-live time materially versus the sponsor's current workflow.
    successMetric: At least 30 percent faster site activation and 80 percent
      site adoption in the pilot cohort.
    owner: Cell-therapy ops lead
  - horizon: 3-6 months
    experiment: Ship registry and accreditation exports with one sponsor and
      one treatment site.
    hypothesis: Sites will accept the platform if required reports can be
      exported without duplicate data entry.
    successMetric: Required outputs generated with less than 15 minutes of
      manual rework per patient or site event.
    owner: Founding eng
  - horizon: 6-9 months
    experiment: Integrate one cold-chain or orchestration partner into the
      custody event model.
    hypothesis: Partner data feeds can raise custody completeness without
      turning deployments into custom services projects.
    successMetric: Greater than 95 percent custody-record completeness and less
      than 2 weeks of partner-specific implementation effort.
    owner: Implementation engineer
  - horizon: 9-12 months
    experiment: Convert the first pilot into an annual production contract and
      publish an internal ROI case study.
    hypothesis: Measurable launch-speed and documentation gains are enough to
      win a production budget.
    successMetric: 1 production conversion and at least 1 executive referenceable
      customer.
    owner: Commercial founder
  - horizon: 12-18 months
    experiment: Test the same workflow in one adjacent advanced-therapy
      category.
    hypothesis: The product can expand beyond the initial beachhead without a
      full rebuild.
    successMetric: 1 adjacent-category design partner and less than 20 percent
      new workflow logic required.
    owner: Product lead
operations:
  - Maintain version-controlled site-readiness templates mapped to sponsor
    requirements and external standards such as FACT, NMDP, and CIBMTR evidence
    expectations.
  - Run a human-in-the-loop exception desk for missing custody events, expired
    handling windows, and incomplete provider documentation during early
    deployments.
  - Integrate first with sponsor-owned CSV or API feeds from logistics,
    orchestration, and quality systems before attempting broad EHR writeback.
  - Keep regulatory-affairs and privacy counsel in the operating loop so early
    customers stay anchored on documented sponsor-led programs rather than
    gray-market clinic networks.
team:
  - role: Commercial founder
    startTiming: Month 0
    rationale: The buyer universe is small, timing-driven, and requires
      founder-led account selection, pilot selling, and partner recruitment
      before a repeatable sales motion exists.
  - role: Founding eng
    startTiming: Month 0
    rationale: The company needs one strong builder to ship the workflow
      engine, audit log, and first data integrations without overbuilding.
  - role: Cell-therapy ops and compliance lead
    startTiming: Month 1
    rationale: Buyer trust depends on encoding site qualification, custody, and
      reporting workflows credibly enough to survive regulatory and operational
      diligence.
  - role: Implementation engineer
    startTiming: Month 6
    rationale: After the first paid pilot, deployment repeatability and partner
      integrations matter more than adding quota-carrying sales headcount.
milestones:
  - horizon: 0-12 months
    items:
      - Complete a named-account map and 15-20 buyer interviews across
        launch-stage sponsors.
      - Sign 1 paid design partner and ship the MVP for site readiness, custody
        exceptions, and outcomes export.
      - Prove at least 30 percent faster site activation and greater than 95
        percent custody completeness across the first pilot network.
      - Convert the pilot into 1-2 annual production contracts.
  - horizon: 12-24 months
    items:
      - Reach 4 sponsor customers and make one logistics integration plus one
        registry or accreditation export workflow repeatable.
      - Launch benchmark and audit-pack reporting that improves renewal and
        expansion conversations.
      - Validate 1 adjacent advanced-therapy category using the same core event
        model.
  - horizon: 24-36 months
    items:
      - Reach 6 sponsor customers and 50 or more active treatment sites on the
        platform.
      - Expand into at least 2 adjacent advanced-therapy network types without
        a custom rebuild for each.
      - Use cross-network benchmarks and partner distribution to defend
        renewals and raise ACV.
risks:
  - risk: The company may be overfitting to one visible launch pattern while
      the real buyer pool remains too small for venture returns.
    likelihood: High
    impact: High
    mitigation: Do not scale headcount until the team validates the
      named-account universe and closes at least one paid pilot in the defined
      ICP.
  - risk: Sponsors may prefer to extend McKesson, TrakCel, internal portals, or
      consulting workflows instead of buying a new platform.
    likelihood: High
    impact: High
    mitigation: Position the product as a neutral layer that integrates with
      incumbent systems and prove a faster go-live plus clearer audit trail than
      bundled alternatives.
  - risk: Treatment sites may resist a new workflow if it creates extra
      documentation burden.
    likelihood: Medium
    impact: High
    mitigation: Make site-side data entry minimal and prioritize exports that
      remove duplicate accreditation, registry, and sponsor reporting work.
  - risk: Regulatory tightening or category stigma around unapproved
      regenerative products could shrink or delay the initial beachhead.
    likelihood: Medium
    impact: High
    mitigation: Anchor early sales on sponsor-led, FDA-aware programs and keep
      workflows configurable across different regulatory pathways.
  - risk: Integration complexity and sponsor-specific data requirements could
      turn deployments into services-heavy projects.
    likelihood: Medium
    impact: Medium
    mitigation: Start with a narrow event model, sponsor-owned data boundaries,
      and a small set of repeatable connectors before promising deep system
      replacement.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to validate the true buyer pool, build the credentialing
    plus custody MVP, land 2-3 paid pilots, prove repeatable deployment
    economics, and earn the right to expand into adjacent advanced-therapy
    networks before hiring a broader go-to-market team.
