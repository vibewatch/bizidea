problem: >-
  Regenerative-medicine companies launching next-generation stem-cell therapies in the U.S. must build multi-state
  physician-provider networks almost overnight to compete with the overseas clinics patients previously traveled to.
  Today that rollout is done ad hoc: legal teams draft one-off provider agreements, BD staff vet physicians by
  reference calls and site visits, and there is no shared system for tracking chain-of-custody on each cell lot,
  verifying protocol adherence, or logging patient outcomes across providers. A single bad actor in the network, an
  undocumented dosing deviation, or a missing custody record can trigger state medical board action or a
  reputation-destroying news story that undermines the entire "traceable, physician-led" positioning the category
  depends on to displace medical tourism.
targetUser:
  primary: >-
    Commercialization and network-operations leaders at U.S.-launching regenerative-medicine and advanced
    cell-therapy companies who are recruiting, credentialing, and monitoring authorized physician providers
    state by state.
  secondary: Authorized physician-provider practices that must complete onboarding, protocol training, and compliance reporting to stay in a manufacturer's network.
  buyer: VP or Head of Commercial Operations / Network Development at the cell-therapy manufacturer.
startupThesis:
  nonObviousInsight: >-
    As immune-tolerant, allogeneic cell therapies like Dezawa MuseCells launch in the U.S. outside the traditional
    FDA-approved-drug pathway, the bottleneck to scale is not the cell science but proving network integrity: who
    can be trusted to administer it, whether each dose's custody chain is intact, and whether outcomes are tracked
    well enough to survive regulatory and media scrutiny. No purpose-built compliance layer exists yet for this
    specific class of therapy, because the category itself is only now standardizing (WHO INN naming, multi-state
    authorized-provider models), which means a network-integrity platform can become the default infrastructure
    before an incumbent claims it.
  beachhead: >-
    U.S. regenerative-medicine and advanced cell-therapy manufacturers (following MuseCell Innovations' model) that
    are actively recruiting authorized physician providers across 3-10 states in their first 12 months of U.S.
    commercial launch and lack an internal system for credentialing, chain-of-custody, and outcomes tracking.
  wedge: >-
    A credentialing and chain-of-custody operating system purpose-built for advanced cell-therapy provider
    networks: physician vetting and onboarding workflows, per-dose custody tracking from lab to patient, protocol
    adherence checklists, and an outcomes registry that the manufacturer can present to regulators, insurers, and
    media as evidence of a traceable network.
  whyNowCatalyst: >-
    MuseCell Innovations' simultaneous four-state U.S. launch shows regenerative-medicine companies are now
    standing up authorized-provider networks as their primary go-to-market motion, creating urgent, repeatable
    demand for the credentialing and traceability infrastructure they are building ad hoc today.
  ventureScalePath: >-
    Start with cell-therapy manufacturers building authorized-provider networks, then expand to adjacent
    advanced-therapy categories facing the same network-integrity problem (expanded-access gene therapies,
    exosome and peptide longevity clinics, compounded-biologic networks), and ultimately become the outcomes
    registry and audit-trail layer that payers, state medical boards, and manufacturers all rely on for
    regenerative-medicine network oversight.
solution: >-
  A network-operations platform that a cell-therapy manufacturer's commercialization team uses to recruit, vet, and
  onboard physician providers with structured credentialing workflows instead of email and spreadsheets. Each cell
  lot gets a digital chain-of-custody record from manufacturing through shipment to the administering physician,
  with automatic alerts on custody gaps or expired handling windows. Providers complete protocol-adherence
  checklists per patient encounter, and the platform aggregates anonymized outcome data into a registry the
  manufacturer can show regulators and the press. A provider-facing portal handles onboarding paperwork and
  training modules so new states can go live in weeks rather than the current multi-month ad hoc process.
goToMarketSeed:
  firstCustomer: >-
    The Head of Commercial Operations at a U.S.-launching regenerative-medicine company (in MuseCell Innovations'
    pattern) responsible for recruiting and credentialing physician providers in its next wave of state launches.
  buyingTrigger: >-
    A newly announced or imminent multi-state U.S. commercial launch that requires standing up a physician-provider
    network fast enough to compete with overseas clinics, without the internal headcount to build custody-tracking
    and credentialing tooling from scratch.
  currentAlternative: >-
    Manual workflow using legal-drafted provider agreements, spreadsheet-based credential tracking, and ad hoc
    site-visit audits, with no shared chain-of-custody or outcomes system across providers.
  switchingReason: >-
    The manual approach cannot scale past a handful of states without risking an undocumented custody gap or
    protocol deviation that undermines the "traceable, physician-led" claim the company needs to win patients away
    from overseas clinics; a purpose-built system gets new states live faster with a defensible audit trail.
  pricingHypothesis: >-
    Per-provider-network subscription priced per active authorized-provider seat plus a per-dose chain-of-custody
    transaction fee, scaling with the manufacturer's state footprint.
