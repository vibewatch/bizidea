jobsToBeDone:
  - job: >-
      When launching a new state's authorized-provider network, help the commercialization lead vet and onboard
      physicians quickly, so they can go live without manual paperwork delays.
    currentAlternative: Legal-drafted one-off provider agreements and manual reference checks
    successMetric: Days from provider recruitment to network go-live
  - job: >-
      When shipping a cell-therapy dose to an authorized provider, help the manufacturer track its custody and
      handling, so they can prove no gap occurred if a regulator or journalist asks.
    currentAlternative: Paper or spreadsheet shipment logs with no automated alerts
    successMetric: Percentage of doses with a complete, gap-free custody record
  - job: >-
      When a patient completes treatment, help the manufacturer capture outcome data across all providers, so they
      can show regulators and payers a standardized safety and efficacy record.
    currentAlternative: No shared outcomes system; individual providers keep their own records
    successMetric: Percentage of treated patients with outcomes data captured in the registry
