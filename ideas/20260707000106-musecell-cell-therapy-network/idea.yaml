topRisks:
  - name: Thin single-source evidence
    description: >-
      The entire cluster rests on one feature article, so the assumed scale of MuseCell's network and the broader
      pattern of manufacturers needing this infrastructure could be overstated.
    mitigation: >-
      Validate demand with direct interviews of 5-10 regenerative-medicine commercialization leads before building
      beyond an MVP, and track additional manufacturer launches as they occur.
  - name: Small initial buyer pool
    description: >-
      Only a handful of companies are currently launching multi-state advanced cell-therapy provider networks in
      the U.S., which limits near-term deal volume.
    mitigation: >-
      Design the platform's credentialing and custody modules to generalize to adjacent advanced-therapy and
      expanded-access categories from day one, so the addressable buyer set expands quickly.
  - name: Regulatory ambiguity of the underlying therapies
    description: >-
      Because many of these cell therapies operate outside standard FDA-approved-drug pathways, shifting
      regulatory treatment could change or shrink the market this platform depends on.
    mitigation: >-
      Build compliance workflows flexible enough to adapt to multiple regulatory pathways (expanded access,
      right-to-try, physician-directed use) and maintain close ties to regulatory-affairs advisors who track policy
      shifts.
