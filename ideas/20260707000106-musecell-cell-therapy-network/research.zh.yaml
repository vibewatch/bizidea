competitors:
- name: TrakCel
  stage: scale-up
  wedge: 面向疗法开发商的细胞与基因疗法编排及审计轨迹软件。
  pricing: 未公开披露；企业级实施模式。
  strength: 疗法编排能力强，具备符合监管要求的审计轨迹和患者旅程可视化。
  weaknessVsUs: 提供方资质认证、多州网络启动或疗效登记并非其核心切口。
