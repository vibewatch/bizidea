  pricing: 登记与参与模式，而非纯 SaaS 定价。
  strength: 在治疗机构中拥有高信任度和根深蒂固的报告关系。
  weaknessVsUs: 定位是标准和登记基础设施，而不是面向厂商、支持网络快速铺开的操作系统。
  sourceRefs:
  - 20
