openQuestions:
- 未来 24 个月里，究竟有多少非肿瘤或再生疗法厂商会真正搭建起多州授权提供方网络，而不是维持单一机构或依赖医疗旅游替代方案？
- 除非能自动填充认证、登记和 EHR 工作流，否则治疗机构会接受又一层运营系统吗？
- 什么样的最低数据权利结构，能让初创公司在不触发买家知识产权顾虑的前提下，对监管链和方案执行模式做对标分析？
- 如果初始滩头市场一直偏小，这道切口能多快从先进细胞疗法推广到相邻的受监管提供方网络品类？
