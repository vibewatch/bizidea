  source: calc
- driver: 第三年可达覆盖
  value: 6-8 家客户中的 50 家门诊（估）
  source: calc
categoryDynamics:
  growthRate: 8.2% CAGR（对更广义临床试验市场的自上而下交叉校验）
  growthRateSourceRefs:
  - 50
  tailwinds:
  - point: 新的资本投入和专科扩张，验证了心脏科与肥胖领域 AI 招募基础设施的需求。
    sourceRefs:
    - 8
    - 2
  - point: 基于 EHR 的招募工具、标准以及机器可读的队列定义方法，正成熟为可用的实施原语。
    sourceRefs:
    - 46
    - 48
  - point: 心衰和降脂试验中的代表性缺口，加大了对系统化患者识别和外联记录的需求压力。
    sourceRefs:
    - 14
  headwinds:
  - point: 转诊流失和下游筛查浪费意味着，软件必须改变工作流，而不只是制造更多线索量。
    sourceRefs:
    - 20
    - 22
  - point: 研究中心数据异质性和 EHR 功能缺口仍会拖慢部署，并削弱价值实现速度。
    sourceRefs:
    - 49
  - point: 广义竞争者已经占据了 CTMS、患者互动、可行性和社区准入等相邻预算。
    sourceRefs:
    - 7
    - 16
    - 24
    - 28
competitors:
- name: Iterative Health
  stage: scale-up
  wedge: 社区研究中心研究基础设施与专科研究中心运营，并正从胃肠领域扩展到心脏科和肥胖领域。
  pricing: 企业级定制定价；未公开披露。
  strength: 近期融资和心血管合作显示出其在资本、分发和专科研究中心执行上的可信度。
  weaknessVsUs: 更广泛的网络加服务模式，可能不如面向专科机构的纯粹心代谢就诊前入组工作流那样聚焦。
  sourceRefs:
  - 8
  - 2
- name: TriNetX
  stage: scale-up
  wedge: 面向可行性评估、试验设计和医疗机构连接的大型真实世界数据网络。
  pricing: 企业级定制定价；未公开披露。
  strength: 强大的数据规模和申办方/医疗机构网络效应。
  weaknessVsUs: 它最擅长的是可行性评估和队列发现，而不是单一专科机构预约流程中的日常协调员任务管理。
  sourceRefs:
  - 7
  - 10
- name: Medidata
  stage: incumbent
  wedge: 横向临床试验操作系统，覆盖 CTMS、患者体验、多样性和研究中心洞察。
  pricing: 企业级定制定价；未公开披露。
  strength: 分发能力、既有信任，以及跨研究运营的广度。
  weaknessVsUs: 横向广度可能使专科化的心代谢入组和 EHR 原生预筛选成为较低优先级的工作流。
  sourceRefs:
  - 13
  - 16
  - 14
- name: Circuit Clinical
  stage: scale-up
  wedge: 将研究带入日常诊疗场景的社区型试验准入网络。
  pricing: 企业级定制定价；未公开披露。
  strength: 医生网络触达能力和社区试验激活能力。
  weaknessVsUs: 以网络触达为导向，并不能自动解决目标机构内部的专科就诊前资格逻辑和协调员工作流问题。
  sourceRefs:
  - 24
- name: Antidote
  stage: scale-up
  wedge: 聚焦于申办方侧转诊生成与资格判定的企业级患者匹配和招募。
  pricing: 企业级定制定价；未公开披露。
  strength: 在企业级匹配和转诊生成方面定位清晰。
  weaknessVsUs: 如果转诊在筛查前仍然流失，那么单纯的外部匹配层并不能解决院内跟进和病历级资格判定问题。
  sourceRefs:
  - 17
  - 20
  - 22
regulatoryTechnicalConstraints:
- point: 临床研究工作流要求研究者监督、流程控制以及符合 GCP 预期的可审计文档；在早期部署中，完全自主的外联不太可能被接受。
  sourceRefs:
  - 51
- point: 面向研究的 FHIR 资源和 SMART 启动确有帮助，但正式部署仍取决于每个研究中心能够暴露哪些预约、诊断、用药和用户上下文数据。
  sourceRefs:
  - 46
  - 45
  - 48
  - 49
- point: 关于 EHR 招募支持和功能缺口的文献表明，方案标准翻译、本地数据质量和工作流适配仍是限制因素。
  sourceRefs: []
- point: 心血管试验中的代表性与入组缺口既构成机会也构成约束：软件必须在扩大覆盖的同时，不削弱文档纪律。
  sourceRefs: []
validationSignals:
- point: Iterative Health 最近的 $77M 融资表明，投资人相信 AI 驱动的临床试验招募与匹配仍是一个活跃的基础设施赛道。
  sourceRefs:
  - 8
- point: Iterative 与 US Heart & Vascular 的合作，是心血管社区研究中心研究基础设施正在被搭建的直接证据。
  sourceRefs:
  - 2
- point: TriNetX 基于大规模、与医疗机构相连的 EHR 数据集销售临床设计与招募能力，说明买方对数据驱动招募工作流已有成熟需求。
  sourceRefs:
  - 7
  - 10
- point: Antidote 自身内容强调转诊流失和肥胖场景下的准备度缺口，而这正是就诊前入组层要解决的运营痛点。
  sourceRefs:
  - 20
  - 22
- point: Medable 和 Medidata 持续推出面向研究中心和 AI 的试验工具，这证明既有玩家正将研究中心负担和工作流自动化视为积极布局的路线图方向。
  sourceRefs:
  - 30
  - 13
openQuestions:
- 美国目前有多少集中式心脏科诊疗平台拥有足够的方案量，足以支撑一个专门的入组工作流产品？
