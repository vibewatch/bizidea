reportMemo:
  executiveTakeaways:
  - 入组痛点确实存在，但现在最值得做的空档，已经不是再去做一层泛化获客，而是如何在患者离开门诊前，把日常专科就诊翻成按方案排好的工作清单。
  - 近期融资和合作活动说明，AI 招募正从胃肠领域外溢到心内科和肥胖方向；这更像是在验证滩头市场，而不是逼创业公司从零教育需求。
  - 真正的战略空档在站点运营层：大型 RWD 网络和赞助方平台能做可行性评估，但协调员最后一公里执行和就诊前触达仍然七零八落。
  - 心代谢需求之所以有结构性吸引力，是因为肥胖和心脏病负担都很大，而心衰和降脂试验里的代表性缺口，又持续逼站点把筛查覆盖和文档留痕做得更系统。
  - 集成依旧是卡口风险：FHIR 和 SMART 的确在降摩擦，但本地排班数据、方案翻译，以及可审计的人工复核，照样决定见效速度。
  - 广义招募、DCT 和站点科技竞品都不缺钱；创业公司只有把心代谢专科工作流做得足够有判断，才不会滑成另一个通用招募看板。
  - 第 3 年更可信的结果，不是做成一个大而全市场，而是拿下一块不大、但真有意义的专科站点版图；更大的上行要靠后续扩进 CRO 可行性评估、赞助方预测和基准数据。
  marketDefinition: 这个市场指向美国临床试验运营软件，服务对象是积极开展研究的心内科与肥胖专科诊疗平台。它覆盖 EHR 原生预筛查、协调员工作队列、触达追踪，以及围绕赞助方出资的心代谢研究做站点级入组分析。它不包括面向消费者的试验市场、完整 EDC/CTMS、通用 CRO 服务，也不包括只给赞助方用的可行性工具。
  customerAndBuyer: 日常用户是临床研究协调员或集中式站点运营团队。真正拍板掏钱的，通常是多站点专科平台里的研究运营 VP/Director 或 COO，因为部署会同时碰到门诊工作流、IT 权限、合规要求和赞助方入组表现。
  buyingTriggers:
  - point: 一旦新签了肥胖、心衰或心血管研究，团队就会立刻暴露出仍在靠人工转诊和翻病历推进招募的问题；入组风险会从抽象担忧变成眼前压力。
    sourceRefs:
    - 8
    - 2
    - 20
  - point: 站点如果被要求提升代表性和入组质量，就需要一套既能更早识别合格患者、又能把过程完整留痕的做法。
    sourceRefs:
    - 14
  - point: FHIR、SMART launch 和更成熟的 EHR 招募工具开始可用，让就诊前匹配在运营上比几年前更容易落地。
    sourceRefs:
    - 48
    - 46
  willingnessToPay:
    summary: 邻近预算本来就躺在站点运营和招募相关品类里：无论是提供方还是赞助方，早就在为企业级招募、患者参与、多样性和可行性工具买单。只要这个切口能把价值直接绑到筛查吞吐、转诊质量和漏招风险上，它就有机会把预算切出来，而不必去争一笔空泛的 AI 预算。
    sourceRefs:
    - 7
    - 16
    - 13
    - 17
    - 28
  competitiveLandscape: 竞争格局大致分成五类：赞助方优先的数据平台、广义临床试验操作系统、社区触达/招募网络、外部患者获取供应商，以及内部手工流程。创业公司若想真正拉开差异，就得死守专科诊疗平台内部运营——尤其是就诊前筛查、转诊分诊和协调员后续跟进——而不是正面去打一场通用招募市场之战。
  incumbentThesis:
  - incumbentClass: 赞助方平台
    point: Medidata 这类平台能赢下广义试验运营，但它们优化的是跨研究的横向流程覆盖，不是专科门诊里围绕心代谢研究的就诊前资格筛查。
    sourceRefs:
    - 13
    - 16
    - 14
  - incumbentClass: 真实世界数据网络
    point: TriNetX 这类网络在可行性评估、队列发现和提供方连接上很强，但它们不会天然拿下每天的协调员执行层；真正决定转化的是即将到来的预约、排除条件和触达时机。
    sourceRefs:
    - 7
    - 10
  - incumbentClass: 招募市场与站点网络
    point: Antidote、Circuit 和 Elligo 能把漏斗顶部做大，但默认模式仍把最后一公里的资格确认和门诊内跟进，留给目标诊疗平台自己消化。
    sourceRefs:
    - 17
    - 20
    - 24
    - 28
  - incumbentClass: 开放标准与 EHR 原生报表
    point: FHIR、SMART 和研究资源标准让集成更现实，但光有标准并不会自动把方案逻辑翻成站点专属工作清单、审计轨迹和转化基准。
    sourceRefs:
    - 46
    - 45
    - 48
    - 49
  - incumbentClass: 内部协调员团队
    point: 人工翻病历当然灵活，但一旦跨门诊、跨方案扩张，效率就会塌；创业公司只有在减轻协调员负担、又不牺牲研究者监督和记录质量时，才有胜算。
    sourceRefs:
    - 51
  regulatoryLandscape: 它所处的运营环境，更像受监管的临床运营，而不是普通 SaaS。即便软件只是辅助筛查、并不直接替人做入组决策，买方仍会要求研究者监督、可靠的审计轨迹，以及保守的患者触达控制。
  technologyLandscape: 底层使能栈已经存在——FHIR 资源、SMART launch 和队列定义工具都能用——但最后做得好不好，仍取决于本地数据映射、排班权限，以及方案标准被翻成可供人工复核动作的质量。
  distributionChannels:
  - point: 最自然的起步渠道，是直接卖给专科诊疗平台和集中式研究运营负责人，因为流程改造和集成都需要高触达实施。
    sourceRefs:
    - 2
    - 35
    - 13
  - point: 赞助方和 CRO 的转介绍同样重要，因为越来越多社区站点合作，是由面向赞助方的平台和网络在上游先拼起来的。
    sourceRefs:
    - 2
    - 35
    - 7
  - point: 互操作伙伴能显著提升部署可信度，尤其当 SMART/FHIR 对齐能力已经进入采购清单时。
    sourceRefs:
    - 48
    - 49
    - 46
  partnershipEcosystem:
  - point: EHR 厂商与互操作标准组织都很关键，因为方案匹配必须接进排班、诊断、用药和 launch context，而不能每个站点都从头重建。
    sourceRefs:
    - 46
    - 45
    - 48
    - 49
  - point: 社区型专科站点网络正逐步变成关键分发节点，这点从 Iterative 的心血管合作和 Elligo 面向赞助方/CRO 的定位里看得很清楚。
    sourceRefs:
    - 2
    - 35
    - 28
  - point: 即便切口是站点原生，外部招募和患者参与伙伴依然重要，因为转诊质量和患者教育，仍会影响下游转化。
    sourceRefs:
    - 20
    - 22
    - 24
  dataMoats:
  - point: 如果一个可复用的方案规则库能与面向研究的数据模型对齐，并且每次部署都在压缩配置时间、降低误报，它就可能长成真正有防御力的资产。
    sourceRefs:
    - 46
  - point: 跨站点的转诊流失、筛败原因和就诊到首筛转化基准，会逐步沉淀成通用看板拿不到的护城河。
    sourceRefs:
    - 20
    - 13
  - point: 心代谢专科深度很关键，因为肥胖和心血管工作流里反复出现的用药、诊断和就诊模式，横向厂商往往会处理得过于粗。
    sourceRefs:
    - 8
    - 2
    - 22
  geographicConsiderations:
  - point: 最好的早期切口仍是美国，因为产品假设依赖赞助方出资的专科诊疗平台、美国临床试验基础设施，以及美国特有的互操作和合规工作流。
    sourceRefs:
    - 36
    - 39
    - 2
  - point: 比起单个学术中心，区域性大型集团和社区研究网络更重要，因为可信的医生关系本身就是转化优势的一部分。
    sourceRefs:
    - 2
    - 24
    - 28
  sensitivityCases:
  - case: 用 CSV 或报表式接入替代实时排班 / FHIR 集成
    impact: 试点会更快启动，但日常自动化能力会更弱；这会压低短期 ARPU，也让产品更容易被协调员人力替代。
    sourceRefs:
    - 48
    - 46
  - case: 赞助方 / CRO 带单提前出现
    impact: 如果赞助方/CRO pull-through 提前出现，赢单率可能上去，因为预算更急；但路线图也会更早被推向可行性评估和多站点报告。
    sourceRefs:
    - 35
    - 7
    - 2
  - case: 肥胖试验热度持续，而心内科采用更慢
    impact: 如果肥胖试验持续火热而心内科采用更慢，滩头市场依旧成立；只是产品语言应先偏向肥胖和代谢试验，再慢慢扩向更广的心血管领域。
    sourceRefs:
    - 8
    - 22
    - 39
  validationPlan:
  - priority: high
    question: 美国有多少家背后有 PE 的心内科集团，今天真的在跑由集中式研究运营支撑的肥胖、心衰或更广泛心代谢研究？
    evidenceToGather: 做出 20 个账户的目标清单，梳理各站点当前方案库存，以及正在合作的赞助方/CRO。
  - priority: high
    question: 在最重要的两类目标 EHR 环境里，做出一份有用的就诊前工作清单，最少需要哪几条数据流？
    evidenceToGather: 做集成发现访谈、拿样例排班导出，并把 1 个真实方案翻成可执行的筛查逻辑。
  - priority: high
    question: 到底哪个 KPI 最能打开预算：节省协调员工时、缩短首筛天数、提高筛查通过率，还是提高达成入组目标的概率？
    evidenceToGather: 围绕 1 个真实在跑方案设计试点，并把人工基线和软件结果并排比较。
  - priority: medium
    question: 如果每条建议都由人工复核，买方会接受在尚未取得研究特定同意前，由软件辅助触达患者吗？
    evidenceToGather: 和站点法务/隐私负责人及赞助方研究团队做合规访谈。
  - priority: medium
    question: 赞助方或 CRO 转介绍，是否足以缩短销售周期，从而抵消重集成实施带来的拖累？
    evidenceToGather: 去访谈 CRO 可行性负责人和专科站点网络渠道。
analysisModels:
  marketMapDiagram:
    title: 心代谢试验 intake 市场图
    mermaid: "quadrantChart\n  title 心代谢试验 intake 市场图\n  x-axis 专业化低 --> 专业化高\n  y-axis 紧迫性低 --> 紧迫性高\n  quadrant-1 横向平台\n  quadrant-2 最匹配\n  quadrant-3 优先级低\n  quadrant-4 细分但更慢\n  TriNetX: [0.45, 0.68]\n  Medidata: [0.35, 0.62]\n  Circuit Clinical: [0.62, 0.58]\n  Antidote: [0.52, 0.55]\n  Iterative Health: [0.72, 0.78]\n  拟议创业公司: [0.87, 0.9]"
  fiveForces:
    supplierPower:
      score: 3
      rationale: EHR 接入和 launch context 权限确实重要，但标准化 API 和队列定义工具让切换摩擦比“完全定制集成”的时代低了一些。
      sourceRefs:
      - 46
      - 48
      - 49
    buyerPower:
      score: 4
      rationale: 初始买方高度集中，主要就是有限几家研究活跃的专科平台；而且它们完全可以拿新软件去和加协调员、通用 EHR 报表或现有厂商比价。
      sourceRefs:
      - 8
      - 35
      - 13
    threatOfEntrants:
      score: 3
      rationale: LLM 和标准把方案逻辑的构建成本打下来，但真实工作流调优、合规预期和跨站点表现数据，仍然构成不小门槛。
      sourceRefs:
      - 46
      - 48
      - 51
    threatOfSubstitutes:
      score: 4
      rationale: 人工翻病历、外部招募供应商和大而全的站点科技套件，都是可信替代；一旦创业公司证明不出明显更高的流程吞吐，就很难赢。
      sourceRefs:
      - 20
      - 24
      - 16
    competitiveRivalry:
      score: 4
      rationale: 竞争在相邻层非常激烈——RWD 网络、站点平台、DCT 供应商、招募市场和重服务站点网络都在打，即便真正为这个切口做深的玩家还不多。
      sourceRefs:
      - 8
      - 7
      - 13
      - 24
      - 28
  pestle:
  - factor: 政治
    impact: positive
    point: 社区触达和心血管试验代表性压力，会推高对更好筛查与留痕工作流的需求。
    sourceRefs:
    - 14
  - factor: 经济
    impact: positive
    point: 病种负担大、漏招代价高，让招募吞吐成了一笔可以预算化的运营问题，而不只是“研究上更好看”。
    sourceRefs:
    - 36
    - 39
  - factor: 社会
    impact: positive
    point: 患者本来就信任专科医生，所以把招募嵌进日常专科诊疗，往往比冷启动式外部触达更有效。
    sourceRefs:
    - 2
    - 24
    - 20
  - factor: 技术
    impact: positive
    point: FHIR、SMART 以及机器可读的队列定义方法，让按方案驱动的筛查比旧式报表流程更可落地。
    sourceRefs:
    - 46
    - 48
    - 49
  - factor: 法律
    impact: negative
    point: 任何会碰到患者识别和触达的流程，都必须保住受监管临床研究对监督、可解释性和可审计性的要求。
    sourceRefs:
    - 51
  adoptionFrictionMatrix:
  - friction: 各站点、各厂商对 EHR 和排班数据的开放程度差异很大
    severity: high
    affectedBuyer: 研究运营负责人和门诊信息团队
    mitigation: 从最常见的专科工作流入手，接受分阶段接入，并先用一个方案把价值证出来，再做更深自动化。
    sourceRefs:
    - 48
    - 46
  - friction: 方案解释必须可审计，而且要保留临床复核
    severity: high
    affectedBuyer: 合规负责人和首席研究者
    mitigation: 采用人工复核参与的方案翻译方式，把排除理由写清楚，并让日志对齐 GCP 预期。
    sourceRefs:
    - 51
  - friction: 如果不能立刻减轻工作量，协调员团队不会愿意再看一个新看板
    severity: medium
    affectedBuyer: 临床研究协调员
    mitigation: 交付与真实预约绑定的就诊前队列，并用节省的工时对照人工翻病历。
    sourceRefs:
    - 20
  - friction: 预算归属容易卡在站点领导、赞助方和 CRO 之间
    severity: medium
    affectedBuyer: 首席运营官或研究运营副总裁
    mitigation: 围绕真实在跑研究的漏招风险去包装试点，并同步培养赞助方/CRO 带单伙伴。
    sourceRefs:
    - 35
    - 7
    - 8
