reportMemo:
  executiveTakeaways:
  - 入组痛点真实存在，但当下最可执行的缺口已经不再是泛化线索获取，而是在患者离开门诊前，把日常专科就诊转成按试验方案细分的工作清单。
  - 近期融资和合作动态说明，AI 招募正从 GI 走向心脏科与肥胖症，这验证了拟定的滩头市场，而不是逼着创业公司从零教育市场。
  - 关键战略空档在站点运营层：大型 RWD 网络和赞助方平台擅长做可行性评估，但在最后一公里的协调员执行和就诊前触达上，流程依然是碎的。
  - 心代谢需求在结构上很有吸引力，因为肥胖症和心脏病负担庞大，而心衰和降脂试验中的代表性缺口，又持续逼着站点改进筛查覆盖和文档留痕。
  - 集成是卡口风险：FHIR 和 SMART 确实降低了摩擦，但本地排班数据、方案翻译，以及可审计的人工作业复核，依旧决定价值兑现速度。
  - 泛化招募、DCT 和站点技术竞品都融资充足，因此创业公司只有坚持在心代谢专科工作流上做出鲜明取舍，而不是变成又一个通用招募仪表盘，才有胜算。
  - 第 3 年更可信的结果，不是大众市场级规模，而是一个虽小但有分量的专科站点 footprint；真正的上行，来自后续扩展到 CRO 可行性评估、赞助方预测和基准数据。
  marketDefinition: 这个市场是面向美国研究活跃型心脏科和肥胖症专科诊疗机构的临床试验运营软件。它涵盖 EHR 原生预筛查、协调员工作队列、触达追踪，以及面向赞助方资助的心代谢研究的站点级入组分析。它不包括面向消费者的试验市场、完整 EDC/CTMS 系统、通用 CRO 服务，以及只服务赞助方的可行性工具。
  customerAndBuyer: 日常使用者是临床研究协调员或集中式站点运营团队。经济买家通常是多站点专科平台的 VP/Director of Research Operations 或 COO，因为部署会同时触及门诊工作流、IT 权限、合规要求和赞助方入组表现。
  buyingTriggers:
  - point: 新签下的肥胖症、心衰或心血管研究，会立刻暴露出转诊和翻病历工作仍有多大比例依赖人工，让入组风险从抽象问题变成当下问题。
    sourceRefs:
    - 8
    - 2
    - 20
  - point: 当站点承压于提升代表性和入组质量时，就需要一套可审计的方法，能更早在诊疗流程中识别并记录合格患者。
    sourceRefs:
    - 14
  - point: FHIR、SMART launch 和日益成熟的 EHR 招募工具，让就诊前匹配在运营上比几年前更可行。
    sourceRefs:
    - 48
    - 46
  willingnessToPay:
    summary: 相邻的站点运营和招募预算池已经存在：服务提供方和赞助方本来就在为企业级招募、患者参与、多样性和可行性工具付费。只要这个切口能把价值直接绑到筛查吞吐、转诊质量和错失入组风险上，就能赢得预算，而不需要去争取“试试看 AI”的投机性开支。
    sourceRefs:
    - 7
    - 16
    - 13
    - 17
    - 28
  competitiveLandscape: 竞争格局大致分成五类：赞助方优先的数据平台、广义临床试验操作系统、社区准入 / 招募网络、外部患者获取供应商，以及内部 / 手工流程。如果创业公司能坚持站在专科诊疗运营内部——尤其是就诊前筛查、转诊分诊和协调员跟进——而不是正面去打一个通用招募市场，它的差异化会最强。
  incumbentThesis:
  - incumbentClass: 赞助方平台
    point: Medidata 一类平台擅长覆盖广泛研究运营，但它们优化的是跨研究的横向流程覆盖，而不是专科门诊内部、面向心代谢场景的就诊前资格筛查。
    sourceRefs:
    - 13
    - 16
    - 14
  - incumbentClass: 真实世界数据网络
    point: TriNetX 一类网络在可行性评估、队列发现和提供方连接上很强，但在每天真正决定转化的协调员层——即将到来的预约、排除条件和触达时机——它们并不会天然胜出。
    sourceRefs:
    - 7
    - 10
  - incumbentClass: 招募市场和站点网络
    point: Antidote、Circuit 和 Elligo 能扩大漏斗顶端触达，但在它们的默认模式下，目标诊所仍需自己完成最后一公里的资格确认和门诊内跟进。
    sourceRefs:
    - 17
    - 20
    - 24
    - 28
  - incumbentClass: 开放标准与 EHR 原生报表
    point: FHIR、SMART 和研究资源让集成更现实，但标准本身并不会把方案逻辑翻译成站点级工作清单、审计轨迹和转化基准。
    sourceRefs:
    - 46
    - 45
    - 48
    - 49
  - incumbentClass: 内部协调员团队
    point: 人工翻病历依旧灵活，但跨诊所和跨方案扩张时效率很差；创业公司只有在减少协调员负担的同时，仍保留研究者监督和文档质量，才能赢。
    sourceRefs:
    - 51
  regulatoryLandscape: 这个运营环境更接近受监管的临床运营，而不是普通 SaaS。即便软件只是辅助筛查、并不直接做入组决定，买家依然会期待研究者监督、可靠的审计轨迹，以及保守的患者接触控制。
  technologyLandscape: 底层使能栈已经存在——FHIR 资源、SMART launch、队列定义工具都已成熟——但真正的实施质量，依然取决于本地数据映射、排班访问，以及能否把方案标准干净地翻译成人工复核后的动作。
  distributionChannels:
  - point: 直接卖给专科诊疗平台和集中式研究运营负责人，是最自然的起步渠道，因为工作流改造和集成都需要高触达式实施。
    sourceRefs:
    - 2
    - 35
    - 13
  - point: 赞助方和 CRO 引荐渠道同样重要，因为社区站点合作越来越多是在更上游、由面向赞助方的平台和网络来组织。
    sourceRefs:
    - 2
    - 35
    - 7
  - point: 互操作合作伙伴能加快部署可信度，尤其当 SMART / FHIR 对齐的集成能力已成采购关注点时。
    sourceRefs:
    - 48
    - 49
    - 46
  partnershipEcosystem:
  - point: EHR 厂商和互操作标准组织很关键，因为方案匹配必须无须每个站点都重做一遍，就能接入排班、诊断、用药和 launch context。
    sourceRefs:
    - 46
    - 45
    - 48
    - 49
  - point: 社区专科站点网络正成为重要分发节点；Iterative 在心血管领域的合作，以及 Elligo 围绕赞助方 / CRO 的定位，都说明了这一点。
    sourceRefs:
    - 2
    - 35
    - 28
  - point: 即便这个切口是站点原生的，上游的招募和患者参与伙伴依旧重要，因为转诊质量和患者教育仍会影响下游转化。
    sourceRefs:
    - 20
    - 22
    - 24
  dataMoats:
  - point: 一套可复用的方案规则库，只要能映射到面向研究的数据模型，并在每次部署中持续缩短上线时间、降低误报，就会成为可防御资产。
    sourceRefs:
    - 46
  - point: 跨站点的转诊流失、筛失败原因和就诊到受筛转化基准，会逐步累积成通用仪表盘拿不到的护城河。
    sourceRefs:
    - 20
    - 13
  - point: 心代谢专科深度很重要，因为肥胖症和心血管工作流里会反复出现用药、诊断和就诊模式信号，而横向厂商往往把这些处理得过于泛化。
    sourceRefs:
    - 8
    - 2
    - 22
  geographicConsiderations:
  - point: 最优的早期切口应先做美国市场，因为产品假设依赖赞助方资助的专科诊疗平台、美国试验基础设施，以及美国特有的互操作 / 合规工作流。
    sourceRefs:
    - 36
    - 39
    - 2
  - point: 区域性大型医疗集团和社区研究网络，比单一学术中心更重要，因为转化优势的一部分正来自医生关系里的信任。
    sourceRefs:
    - 2
    - 24
    - 28
  sensitivityCases:
  - case: 先走 CSV 或报表式 onboarding，而不是实时排班 / FHIR 集成
    impact: 试点会更快，但日常自动化更弱；这会压低短期 ARPU，也让产品更容易被协调员人工替代。
    sourceRefs:
    - 48
    - 46
  - case: 赞助方 / CRO pull-through 提前出现
    impact: 由于预算紧迫性更强，赢单率可能上升，但路线图也会比原计划更早被拉向可行性评估和多站点报表。
    sourceRefs:
    - 35
    - 7
    - 2
  - case: 肥胖症试验浪潮持续强劲，而心脏科采用更慢
    impact: 滩头市场仍然成立，但公司应先让产品语言更偏向肥胖症和代谢试验，再逐步扩向广义心血管。
    sourceRefs:
    - 8
    - 22
    - 39
  validationPlan:
  - priority: high
    question: 今天到底有多少由 PE 支持、拥有集中式研究运营的心脏科集团，正在积极运行肥胖症、心衰或更广义的心代谢研究？
    evidenceToGather: 20 个目标账户清单、每个站点当前方案库存，以及活跃的赞助方 / CRO 关系。
  - priority: high
    question: 在前两大目标 EHR 环境里，要生成一个有用的就诊前工作清单，最小数据流到底是什么？
    evidenceToGather: 集成发现访谈、排班导出样本，以及 1 个被翻译成可执行筛查逻辑的真实方案。
  - priority: high
    question: 真正能解锁预算的 KPI 是什么：节省协调员工时、首筛天数、筛通过率，还是入组达成率？
    evidenceToGather: 围绕 1 个真实方案设计试点，并与人工基线做对照。
  - priority: medium
    question: 如果每条推荐都由人工复核，买家是否会接受在获得明确研究同意前，由软件辅助做患者触达？
    evidenceToGather: 与站点法务 / 隐私负责人及赞助方研究团队做合规访谈。
  - priority: medium
    question: 赞助方或 CRO 引荐，能否足够缩短销售周期，以抵消重集成带来的实施成本？
    evidenceToGather: 与 CRO 可行性评估负责人和专科站点网络做渠道访谈。
analysisModels:
  marketMapDiagram:
    title: 心代谢试验 intake 市场地图
    mermaid: "quadrantChart\n  title Cardiometabolic trial intake market map\n  x-axis Low specialization --> High specialization\n  y-axis Low urgency --> High urgency\n  quadrant-1 Horizontal platforms\n  quadrant-2 Best fit\n  quadrant-3 Low priority\n  quadrant-4 Niche but slower\n  TriNetX: [0.45, 0.68]\n  Medidata: [0.35, 0.62]\n  Circuit Clinical: [0.62, 0.58]\n  Antidote: [0.52, 0.55]\n  Iterative Health: [0.72, 0.78]\n  Proposed startup: [0.87, 0.9]"
  fiveForces:
    supplierPower:
      score: 3
      rationale: EHR 访问和 launch-context 权限很关键，但与完全定制集成的世界相比，基于标准的 API 和队列定义工具已经降低了一部分切换摩擦。
      sourceRefs:
      - 46
      - 48
      - 49
    buyerPower:
      score: 4
      rationale: 最初的买家池集中在数量有限、研究活跃的专科平台中，而且它们完全可以把新软件与新增协调员、通用 EHR 报表或现有供应商放在一起比较。
      sourceRefs:
      - 8
      - 35
      - 13
    threatOfEntrants:
      score: 3
      rationale: LLM 和标准降低了构建方案逻辑的成本，但真实世界的工作流调优、合规预期以及跨站点表现数据，仍然构成了不小的门槛。
      sourceRefs:
      - 46
      - 48
      - 51
    threatOfSubstitutes:
      score: 4
      rationale: 如果创业公司证明不了吞吐显著提升，人工翻病历、外部招募供应商和广义站点技术套件，都会成为可信替代品。
      sourceRefs:
      - 20
      - 24
      - 16
    competitiveRivalry:
      score: 4
      rationale: 邻近层的竞争非常激烈——RWD 网络、站点平台、DCT 厂商、招募市场和重服务站点网络都在里面——即便真正为这个切口量身定制的玩家还不多。
      sourceRefs:
      - 8
      - 7
      - 13
      - 24
      - 28
  pestle:
  - factor: 政治
    impact: positive
    point: 社区准入和心血管试验代表性压力，提升了市场对更好筛查和文档工作流的需求。
    sourceRefs:
    - 14
  - factor: 经济
    impact: positive
    point: 庞大的疾病负担，以及错失入组带来的成本，使招募吞吐成为一个可以明确预算化的运营问题，而不只是研究上的“加分项”。
    sourceRefs:
    - 36
    - 39
  - factor: 社会
    impact: positive
    point: 患者本就信任专科医生，因此把招募嵌进日常专科诊疗，对很多心代谢研究来说，比冷启动的外部触达更有效。
    sourceRefs:
    - 2
    - 24
    - 20
  - factor: 技术
    impact: positive
    point: FHIR、SMART 和机器可读的队列定义方法，让按方案筛查比旧式报表工作流更可行。
    sourceRefs:
    - 46
    - 48
    - 49
  - factor: 法律
    impact: negative
    point: 任何触及患者识别和触达的工作流，都必须保留受监管临床研究所要求的监督、可解释性和可审计性。
    sourceRefs:
    - 51
  adoptionFrictionMatrix:
  - friction: 各站点和各厂商的 EHR 与排班数据访问差异很大
    severity: high
    affectedBuyer: 研究运营负责人和诊所 IT
    mitigation: 从最常见的专科工作流切入，接受分阶段 onboarding，并先在单一方案上证明价值，再做更深自动化。
    sourceRefs:
    - 48
    - 46
  - friction: 方案解释必须可审计，且仍需临床人员复核
    severity: high
    affectedBuyer: 合规负责人和主要研究者
    mitigation: 采用 human-in-the-loop 的方案翻译，明确写出排除理由，并让日志对齐 GCP 预期。
    sourceRefs:
    - 51
  - friction: 如果新仪表盘不能立刻减负，协调员团队会抵触
    severity: medium
    affectedBuyer: 临床研究协调员
    mitigation: 直接交付与真实预约绑定的就诊前队列，并量化相对人工翻病历节省的工时。
    sourceRefs:
    - 20
  - friction: 预算归属可能尴尬地夹在站点管理层、赞助方和 CRO 之间
    severity: medium
    affectedBuyer: COO or VP Research Operations
    mitigation: 把试点包装成围绕一项真实研究的入组风险项目，同时培育赞助方 / CRO pull-through 伙伴。
    sourceRefs:
    - 35
    - 7
    - 8
market:
  tam:
    value: $180.0M
    rationale: 估算逻辑是：长期看，美国约有 1,500 家可能运行赞助方资助研究的心代谢专科诊所或研究单元，每个活跃单元的年软件 + 实施 ACV 约为 $120k；再结合肥胖症和心脏病的高负担、活跃的专科试验活动，以及相邻站点 / 招募平台的企业级定价定位做交叉校验。
    isEstimate: true
    sourceRefs:
    - 36
    - 39
    - 50
    - 7
    - 13
  sam:
    value: $42.0M
    rationale: 滩头市场把 TAM 收窄到约 350 家诊所，主要位于由 PE 支持或其他具备集中管理能力的美国心脏科集团，以及相邻的肥胖症项目中；假设每家诊所 $120k ACV，则得到 $42M。
    isEstimate: true
    sourceRefs:
    - 8
    - 2
    - 36
    - 39
  som:
    value: $6.0M
    rationale: 第 3 年可触达情形，假设通过分阶段 rollout 和方案扩展，最终覆盖约 6-8 个多站点客户中的 50 家活跃诊所，每家 ACV 约 $120k。
    isEstimate: true
    sourceRefs:
    - 8
    - 2
    - 35
    - 20
bottomUpSizingDrivers:
- driver: 可触达总单元数
  value: 1,500 个具备研究能力的美国心代谢专科诊所或等效研究单元（估）
  source: '[36],[39],[8]'
- driver: 每个活跃诊所的预估 ACV
  value: 每年 $120k（估）
  source: '[7],[13],[17]'
- driver: SAM 内的滩头诊所数
  value: 约 20-25 个集中式专科平台中的 350 家诊所（估）
  source: calc
- driver: 第 3 年可触达 footprint
  value: 6-8 个客户中的 50 家诊所（估）
  source: calc
categoryDynamics:
  growthRate: 8.2% CAGR（更广义临床试验市场的自上而下交叉校验）
  growthRateSourceRefs:
  - 50
  tailwinds:
  - point: 新资本流入和专科扩张，验证了心脏科与肥胖症中的 AI 招募基础设施需求。
    sourceRefs:
    - 8
    - 2
  - point: 基于 EHR 的招募工具、标准和机器可读的队列定义方法，正在成熟成可用的实施积木。
    sourceRefs:
    - 46
    - 48
  - point: 心衰和降脂试验里的代表性缺口，让系统化的患者识别和触达记录变得更迫切。
    sourceRefs:
    - 14
  headwinds:
  - point: 转诊流失和下游筛查浪费意味着，软件必须真正改造工作流，而不是只制造更多线索量。
    sourceRefs:
    - 20
    - 22
  - point: 站点数据异构和 EHR 功能缺口，依旧会拖慢部署并削弱价值兑现速度。
    sourceRefs:
    - 49
  - point: 广义竞争对手已经占据 CTMS、患者参与、可行性评估和社区准入等相邻预算池。
    sourceRefs:
    - 7
    - 16
    - 24
    - 28
competitors:
- name: Iterative Health
  stage: 成长期
  wedge: 社区站点研究基础设施与专科站点运营，正从 GI 扩展到心脏科和肥胖症。
  pricing: 企业级定制报价；未公开列价。
  strength: 最新融资和心血管合作说明它在资本、分发和专科站点执行上都具备可信度。
  weaknessVsUs: 更宽的网络 + 服务模式，可能不如面向专科诊疗机构的纯粹心代谢就诊前 intake 工作流那样鲜明。
  sourceRefs:
  - 8
  - 2
- name: TriNetX
  stage: 成长期
  wedge: 面向可行性评估、试验设计和医疗服务提供方连接的大型真实世界数据网络。
  pricing: 企业级定制报价；未公开列价。
  strength: 数据规模大，且具备赞助方 / 提供方网络效应。
  weaknessVsUs: 它最强的是可行性评估和队列发现，而不是单一专科诊疗机构预约流里的日常协调员任务执行。
  sourceRefs:
  - 7
  - 10
- name: Medidata
  stage: 成熟厂商
  wedge: 横向临床试验操作系统，覆盖 CTMS、患者体验、多样性和站点洞察。
  pricing: 企业级定制报价；未公开列价。
  strength: 分发能力强、买家信任高，而且研究运营覆盖面广。
  weaknessVsUs: 横向覆盖很广，但也意味着面向心代谢的专科 intake 和 EHR 原生预筛查，可能只是较低优先级工作流。
  sourceRefs:
  - 13
  - 16
  - 14
- name: Circuit Clinical
  stage: 成长期
  wedge: 把研究带入日常诊疗场景的社区化试验准入网络。
  pricing: 企业级定制报价；未公开列价。
  strength: 在医生网络准入和社区试验激活上很强。
  weaknessVsUs: 网络准入导向，并不会自动解决目标诊所内部的专科就诊前资格逻辑和协调员工作流问题。
  sourceRefs:
  - 24
- name: Antidote
  stage: 成长期
  wedge: 围绕赞助方侧转诊生成和资格确认的企业级患者匹配与招募平台。
  pricing: 企业级定制报价；未公开列价。
  strength: 在企业级匹配和转诊生成上的定位清晰。
  weaknessVsUs: 如果转诊在线下筛查前就流失了，仅靠外部匹配层并不能补上门诊内跟进和病历级资格确认。
  sourceRefs:
  - 17
  - 20
  - 22
regulatoryTechnicalConstraints:
- point: 临床研究工作流要求研究者监督、流程控制以及符合 GCP 预期的可审计文档；在早期部署里，完全自动化的患者触达大概率不可接受。
  sourceRefs:
  - 51
- point: 面向研究的 FHIR 资源和 SMART launch 能提供帮助，但真实生产部署仍取决于每个站点能暴露哪些预约、诊断、用药和用户上下文数据。
  sourceRefs:
  - 46
  - 45
  - 48
  - 49
- point: 关于 EHR 招募支持和功能缺口的文献说明，方案标准翻译、本地数据质量和工作流适配，依旧是核心限制因素。
  sourceRefs: []
- point: 心血管试验中的代表性与入组缺口，既带来机会也带来约束：软件必须扩大覆盖面，但不能削弱文档纪律。
  sourceRefs: []
validationSignals:
- point: Iterative Health 最近一轮 $77M 融资，说明投资人仍然相信 AI 临床试验招募与匹配是一个真实存在的基础设施品类。
  sourceRefs:
  - 8
- point: Iterative 与 US Heart & Vascular 的合作，直接证明了心血管社区站点研究基础设施正在搭建中。
  sourceRefs:
  - 2
- point: TriNetX 在大型提供方关联 EHR 数据集之上销售临床设计和招募能力，这说明买家对数据驱动招募工作流的需求已经成熟。
  sourceRefs:
  - 7
  - 10
- point: Antidote 自己的内容都在强调转诊流失和肥胖症特有的 readiness 缺口，而这恰恰是就诊前 intake 层要解决的运营痛点。
  sourceRefs:
  - 20
  - 22
- point: Medable 和 Medidata 还在持续推出面向站点和 AI 的试验工具，说明现有厂商已经把站点负担和工作流自动化放进活跃路线图里。
  sourceRefs:
  - 30
  - 13
openQuestions:
- 美国到底有多少集中式心脏科诊疗平台，具备足够的方案量，值得购买一个专门的 intake 工作流产品？
- 前 20 个目标账户里，最常见的专科 EHR 和排班系统是什么？就诊前到底能拿到哪些最小数据流？
- 在真实采购中，预算归属到底是站点运营、赞助方 pass-through，还是 CRO 主导的 study setup？
- 哪个试点 KPI 足够有决定性，能在一个研究周期内替代人工翻病历和通用招募供应商？
