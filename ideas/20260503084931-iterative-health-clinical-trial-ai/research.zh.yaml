    rationale: 把 TAM 收窄到约 350 家门诊，集中在由 PE 支持或已完成集中化管理的美国心内科集团及相邻肥胖项目中；这些组织最容易快速标准化研究运营。350 x $120k ACV。
    isEstimate: true
    sourceRefs:
    - 8
    - 2
    - 36
    - 39
  som:
    value: $6.0M
    rationale: 第 3 年可触达情景，假设 6-8 个多站点客户、约 50 家活跃门诊，在分阶段铺设和方案扩张后，每家站点约 $120k ACV。
    isEstimate: true
    sourceRefs:
    - 8
    - 2
    - 35
    - 20
bottomUpSizingDrivers:
- driver: 总可服务单元数
  value: 1,500 家美国具备研究能力的心代谢专科门诊或等价研究单元（估算）
  source: '[36],[39],[8]'
- driver: 每个活跃门诊的估算 ACV
  value: 每年 $120k（估算）
  source: '[7],[13],[17]'
- driver: SAM 内的滩头门诊数
  value: 约 20-25 个集中式专科平台下的 350 家门诊（估算）
  source: calc
- driver: 第 3 年可触达门诊版图
  value: 6-8 个客户下的 50 家门诊（估算）
  source: calc
categoryDynamics:
  growthRate: 更广义临床试验市场自上而下交叉校验后约为 8.2% CAGR
  growthRateSourceRefs:
  - 50
  tailwinds:
  - point: 新融资和专科扩张，验证了心内科与肥胖领域对 AI 招募基础设施的需求。
    sourceRefs:
    - 8
    - 2
  - point: 基于 EHR 的招募工具、互操作标准以及机器可读的队列定义方法，已经开始长成能用的实施原语。
    sourceRefs:
    - 46
    - 48
  - point: 心衰和降脂试验里的代表性缺口，让站点更需要系统化识别患者并留下触达记录。
    sourceRefs:
    - 14
  headwinds:
  - point: 转诊流失和下游筛查浪费意味着，软件必须真能改变流程，而不是只多造一些线索。
    sourceRefs:
    - 20
    - 22
  - point: 站点数据异构、EHR 功能不齐，依旧会拖慢部署，也可能削弱见效速度。
    sourceRefs:
    - 49
  - point: CTMS、患者参与、可行性评估和社区触达等相邻预算位上，已有大公司先卡住了位置。
    sourceRefs:
    - 7
    - 16
    - 24
    - 28
competitors:
- name: Iterative Health
  stage: scale-up
  wedge: 社区站点研究基础设施与专科站点运营，正从胃肠扩到心内科和肥胖。
  pricing: 企业级定制定价；未公开标价。
  strength: 近期融资和心血管合作说明，它在资金、分发和专科站点执行上都有可信度。
  weaknessVsUs: 更宽的网络+服务模式，未必会像一个纯粹做就诊前心代谢 intake 的产品那样有判断。
  sourceRefs:
  - 8
  - 2
- name: TriNetX
  stage: scale-up
  wedge: 面向可行性评估、试验设计和医疗提供方连接的大型真实世界数据网络。
  pricing: 企业级定制定价；未公开标价。
  strength: 数据规模大，赞助方和提供方网络效应强。
  weaknessVsUs: 它最强的是可行性评估和队列发现，而不是单个专科诊疗平台预约流里的日常协调员执行。
  sourceRefs:
  - 7
  - 10
- name: Medidata
  stage: incumbent
  wedge: 横向临床试验操作系统，覆盖 CTMS、患者体验、多样性和站点洞察。
  pricing: 企业级定制定价；未公开标价。
  strength: 分发力强、老客户信任高，而且覆盖研究运营全流程。
  weaknessVsUs: 横向能力太多，专科化的心代谢 intake 和 EHR 原生预筛查很可能排不到高优先级。
  sourceRefs:
  - 13
  - 16
  - 14
- name: Circuit Clinical
  stage: scale-up
  wedge: 把研究带入日常护理场景的社区试验接入网络。
  pricing: 企业级定制定价；未公开标价。
  strength: 医生网络和社区试验激活能力是优势。
  weaknessVsUs: 网络接入强，不等于自动解决目标诊疗平台内部的专科资格逻辑和协调员工作流。
  sourceRefs:
  - 24
- name: Antidote
  stage: scale-up
  wedge: 面向赞助方侧的企业级患者匹配与招募，重点是转诊生成和资格确认。
  pricing: 企业级定制定价；未公开标价。
  strength: 围绕企业级匹配和转诊生成的定位很清楚。
  weaknessVsUs: 如果转诊在正式筛查前就流失，单靠外部匹配层并不能解决门诊内跟进和病历级资格确认。
  sourceRefs:
  - 17
  - 20
  - 22
regulatoryTechnicalConstraints:
- point: 临床研究流程要求研究者监督、过程控制和可审计记录，以符合 GCP 预期；在早期部署里，完全自动化触达大概率行不通。
  sourceRefs:
  - 51
- point: 面向研究的 FHIR 资源和 SMART launch 确实有帮助，但真正能不能上线，仍取决于每个站点愿意开放哪些预约、诊断、用药和用户上下文数据。
  sourceRefs:
  - 46
  - 45
  - 48
  - 49
- point: 关于 EHR 招募支持和功能缺口的文献都说明，方案标准翻译、本地数据质量和流程贴合度仍然是限制因素。
  sourceRefs: []
- point: 心血管试验里的代表性与入组缺口，既是机会也是约束：软件得把覆盖面做大，但不能放松记录纪律。
  sourceRefs: []
validationSignals:
- point: Iterative Health 近期的 $77M 融资，说明投资人仍然相信 AI 驱动的临床试验招募与匹配是一条活跃的基础设施赛道。
  sourceRefs:
  - 8
- point: Iterative 与 US Heart & Vascular 的合作，是心血管社区站点研究基础设施正在搭建的直接证据。
  sourceRefs:
  - 2
- point: TriNetX 在大型提供方关联 EHR 数据之上主打试验设计与招募能力，说明买方对数据驱动的招募工作流已有成熟需求。
  sourceRefs:
  - 7
  - 10
- point: Antidote 自己的内容就反复强调转诊流失和肥胖招募里的准备度缺口，而这正是就诊前 intake 层要解决的痛点。
  sourceRefs:
  - 20
  - 22
- point: Medable 和 Medidata 还在持续推出面向站点与 AI 的试验工具，说明现有厂商把站点负担和流程自动化视为正在推进的路线图。
  sourceRefs:
  - 30
  - 13
