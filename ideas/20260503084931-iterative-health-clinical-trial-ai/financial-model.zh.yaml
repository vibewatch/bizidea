assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: month
    source: "[BP date 2026-05-03; 模型从计划发布后的下一个月开始]"
  - id: A2
    name: 计费单位
    value: active research site
    unit: customer-unit
    source: "[BP businessModel.unitOfValue: Active research site with live cardiometabolic protocols]"
  - id: A3
    name: 起始活跃站点（M1）
    value: '0'
    unit: count
    source: "[BP product.sixMonth 和里程碑节奏表明，模型起始时仍处于设计合作伙伴、尚未确认收入的阶段]"
  - id: A4
    name: Y1 期末活跃站点
    value: '12'
    unit: count
    source: "[BP milestones 0-12 months：2-3 个付费试点，且至少 2 个转成生产合同；模型据此假设 M12 有 12 个活跃站点]"
  - id: A5
    name: Y2 期末活跃站点
    value: '36'
    unit: count
    source: "[BP product.twelveMonth 与 milestones 12-24 months；在完整达到 50 站点 SOM 前，先逐步爬坡到多诊所部署]"
  - id: A6
    name: Y3 期末活跃站点
    value: '50'
    unit: count
    source: "[BP market.som 和 research market.som：第 3 年约可达到 50 家活跃诊所 / 站点]"
  - id: A7
    name: 每个活跃站点的年 ARPU
    value: '120.0'
    unit: USDK
    source: "[research.bottomUpSizingDrivers: Estimated ACV per active clinic $120k per year]"
  - id: A8
    name: 收入确认公式
    value: average active sites in period x 10.0
    unit: USDK per month
    source: "[由 A2 和 A7 推导；$120k 年 ARPU = 每月 $10k ARPU]"
  - id: A9
    name: 毛利率目标
    value: '75.0'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 75]"
  - id: A10
    name: 创始人现金薪酬
    value: '180.0'
    unit: USDK annual loaded
    source: "[创业财务经验值：受监管 B2B SaaS 在 pre-seed 阶段，创始人现金薪资通常低于市场价]"
  - id: A11
    name: 工程岗位现金薪酬
    value: '210.0'
    unit: USDK annual loaded
    source: "[创业财务经验值：资深 health-tech 软件工程师的 fully loaded 成本]"
  - id: A12
    name: 临床信息学岗位现金薪酬
    value: '180.0'
    unit: USDK annual loaded
    source: "[创业财务经验值：临床信息学负责人的 fully loaded 成本]"
  - id: A13
    name: 客户成功与实施岗位现金薪酬
    value: '140.0'
    unit: USDK annual loaded
    source: "[创业财务经验值：实施负责人 fully loaded 成本]"
  - id: A14
    name: 销售与 GTM 岗位现金薪酬
    value: '160.0'
    unit: USDK annual loaded
    source: "[创业财务经验值：早期客户经理或 GTM 运营岗位的 fully loaded 成本]"
  - id: A15
    name: G&A 与运营岗位现金薪酬
    value: '130.0'
    unit: USDK annual loaded
    source: "[创业财务经验值：精简的财务、合规与运营岗位 fully loaded 成本]"
  - id: A16
    name: 招聘顺序
    value: 创始人和创始工程师在起始即到位；临床信息学负责人于 Y1 Q2 前后加入；客户成功于 Y1 Q3 加入；GTM 于 Y1 Q4 加入；Y3 期间继续补充工程、GTM、G&A 和客户成功岗位
    unit: plan
    source: "[BP team section 与里程碑节奏]"
  - id: A17
    name: 月流失率
    value: '2.0'
    unit: percent
    source: "[创业财务经验值：按研究驱动的站点软件，logo churn 通常低于 SMB SaaS，但波动性高于核心 EHR 系统]"
  - id: A18
    name: 每个活跃站点的 CAC
    value: '40.0'
    unit: USDK
    source: "[由模型推导：Y2 salesMarketing 支出 $970.8K / 24 个净新增活跃站点；并锚定 BP funnelTargets]"
  - id: A19
    name: 非薪酬运营支出爬坡
    value: Y1 平均每月 $53.3K；Y2 平均每月 $91.0K；Y3 平均每月 $103.7K
    unit: USDK per month
    source: "[创业财务经验值：受监管 health-tech 除薪酬外，还需要较多法务、合规、差旅、软件和云成本]"
  - id: A20
    name: pre-seed 交割后的起始现金
    value: '2200.0'
    unit: USDK
    source: "[BP fundingAsk.stage pre-seed 且 targetFundingRangeUsd 为 $2-4M；基础模型采用 $2.2M 到账]"
  - id: A21
    name: 融资缓冲政策
    value: '550.0'
