modelDiagram:
  title: 单元经济性流程
  mermaid: "flowchart LR\n  线索 --> 付费试点\n  付费试点 --> 活跃研究中心\n  活跃研究中心 --> 收入\n  收入 --> 毛利润\n  毛利润 --> 现金\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情形下，收入来自活跃研究中心从 Y1 期末的 12 个增长到 Y3 期末的 50 个，且每个研究中心的年度 ARPU 为研究支持的 $120K。
- checkName: 必须达成
  finding: 公司必须将试点转正式商用转化率维持在接近 60%，同时把方案配置时间降到足以维持计划中 75% 毛利率的水平。
- checkName: 模型失效条件
  finding: 如果销售周期拉长到约 9 个月，或低自动化上线方式将 ARPU 压低到接近每个研究中心 $108K，现金风险就会显著上升。
- checkName: 下一轮融资验证点
  finding: 一个可信的 seed 轮故事应包括：36 个活跃研究中心、约两周内可重复的实施流程，以及在下一轮融资前跑通首个申办方或 CRO 转介绍动作。
sanityChecks:
  ruleOf40: Y3 增长率 81.3% + EBITDA 利润率 3.3% = 84.6%
  burnMultiple: Y1 的 burn multiple 约为 2.0x，随着研究中心扩张开始覆盖固定团队成本，Y2 改善到约 0.2x。
  revenuePerFte: 按 Y3 期末 15 名 FTE 计算，人均收入约为 $348K，处于垂直 SaaS 合理的 $200-400K 区间内，但前提是实施过程保持模板化。
  flags:
  - 模型将客户计为产生收入的活跃研究中心，而非母体诊疗平台；到 Y3 时 logo 数仅为 6-8 个。
  - 75% 毛利率假设来自商业计划目标；如果试点仍然高度依赖实施，该假设可能偏激进。
  - 收入集中度较高，因为 50 个活跃研究中心很可能集中在少数几个专科平台客户内部。
  - 现金流仅按 EBITDA 建模；未包含债务、资本开支或回款延迟。
