  name: 招聘顺序
  value: 起始配置为创始人与创始工程师；Y1 Q2 增加临床信息学；Y1 Q3 增加客户成功；Y1 Q4 增加 GTM；到 Y3 逐步新增工程、GTM、G&A 和客户成功岗位
  unit: plan
