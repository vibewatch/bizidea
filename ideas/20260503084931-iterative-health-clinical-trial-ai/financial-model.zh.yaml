- id: A13
  name: 客户成功与实施岗位现金薪酬
  value: '140.0'
  unit: USDK annual loaded
  source: '[创业财务经验法则：实施负责人的全额成本]'
- id: A14
  name: 销售与 GTM 岗位现金薪酬
  value: '160.0'
  unit: USDK annual loaded
  source: '[创业财务经验法则：早期客户经理或 GTM 运营人员的全额成本]'
- id: A15
  name: G&A 与运营岗位现金薪酬
  value: '130.0'
  unit: USDK annual loaded
  source: '[创业财务经验法则：精简财务、合规与运营岗位的全额成本]'
