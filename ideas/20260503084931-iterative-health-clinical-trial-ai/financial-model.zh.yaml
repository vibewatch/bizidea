modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Leads[线索] --> PaidPilots[付费试点]
      PaidPilots --> ActiveSites[活跃站点]
      ActiveSites --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入，来自活跃站点数从 Y1 期末 12 个爬到 Y3 期末 50 个，同时单站点年度 ARPU 维持在 research 支撑的 $120K。
  - checkName: 必须做对的地方
    finding: 公司必须把试点转生产转化率守在约 60%，同时继续压缩方案配置时间，才能保住规划里的 75% 毛利率。
  - checkName: 模型会在哪种情况下失效
    finding: 如果销售周期拉长到约 9 个月，或低自动化接入把 ARPU 压到每站点约 $108K，现金风险就会明显抬头。
  - checkName: 下一轮融资要看的证明点
    finding: 一个站得住脚的种子轮故事，需要在下一轮前做到 36 个活跃站点、约两周的可重复实施周期，并跑通第一条赞助方 / CRO 转介绍。
sanityChecks:
  ruleOf40: 'Y3 增长率 81.3% + EBITDA 利润率 3.3% = 84.6%'
  burnMultiple: 'Y1 burn multiple 约为 2.0x；随着站点扩张开始覆盖固定团队成本，Y2 改善到约 0.2x。'
  revenuePerFte: '按 Y3 期末 15 个 FTE 计算，单 FTE 收入约 $348K；这落在垂直 SaaS 大致 $200-400K 的合理区间里，但前提是实施必须模板化。'
  flags:
    - 模型里的 customers 指的是产生收入的活跃研究站点，而不是母体诊疗平台；到 Y3 真正的 logo 数只有 6-8 个。
    - 75% 毛利率来自 business plan 的目标值；如果试点长期偏重实施，这个假设会显得偏激进。
    - 收入集中度很高，因为 50 个活跃站点大概率集中在少数几个专科平台客户里。
    - 现金流按 EBITDA 直接建模；没有纳入债务、capex 或回款延迟。
