  name: 每个活跃研究中心的 CAC
  value: '40.0'
  unit: USDK
  source: '[由模型推导：Y2 salesMarketing 支出 $970.8K ÷ 24 个净新增活跃研究中心；锚定 BP funnelTargets]'
