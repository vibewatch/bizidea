  unit: USDK per month
  source: '[创业财务经验法则：受监管 health-tech 除薪酬外，还需要可观的法务、合规、差旅、软件和云支出]'
- id: A20
  name: pre-seed 完成后的起始现金
  value: '2200.0'
  unit: USDK
