    - bucket: 工程
      amountUsd: 792000
      percentage: 36
    - bucket: GTM
      amountUsd: 528000
      percentage: 24
    - bucket: G&A
      amountUsd: 330000
      percentage: 15
    - bucket: 缓冲资金（6 个月）
      amountUsd: 550000
      percentage: 25
scenarios:
  downside:
    description: 试点转正速度更慢，而且更多客户停留在报表式 onboarding，导致站点扩张延后、定价承压。
    y3RevenueK: 3850.0
    y3EbitdaK: -420.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - "与 BP funnelTargets 相比，试点转生产的转化率从 60% 降到 40%。"
      - "Q4Y3 的活跃站点从 50 家下滑到 38 家。"
      - "由于更多客户停留在低自动化 onboarding，ARPU 从 $120K 降到 $108K。"
      - "毛利率最终停在 72%，而不是 75% 目标。"
  base:
    description: 创始人主导销售把 2-3 个试点转成生产，并把活跃站点扩展到 50 家，同时达到目标毛利率。
    y3RevenueK: 5220.0
    y3EbitdaK: 169.8
    cashLowPointK: 584.5
    keyAssumptionChanges:
      - "试点转生产转化率基本维持在 BP 目标的 60%。"
      - "活跃站点从 Y1 期末 12 家，扩到 Y2 期末 36 家，再到 Y3 期末 50 家。"
      - "ARPU 维持在研究支持的每个活跃站点 $120K。"
      - "毛利率达到 BP 目标的 75%。"
  upside:
    description: 早期平台内部扩张更快，赞助方引荐也更早启动，从而带来更高站点数和更好的销售效率。
    y3RevenueK: 6240.0
    y3EbitdaK: 540.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - "试点转生产转化率从 60% 提升到 70%。"
      - "Q4Y3 的活跃站点从 50 家增至 58 家。"
      - "随着更多客户叠加额外方案，ARPU 从 $120K 提升到 $126K。"
      - "从 Y2 起，赞助方或 CRO 引荐可将销售周期缩短约两个月。"
sensitivity:
  - variable: ARPU
    downsideCase: "$108K annual ARPU per active site"
    baseCase: "$120K annual ARPU per active site"
    upsideCase: "$132K annual ARPU per active site"
    y3RevenueImpactK: -522.0
    cashImpactK: -391.5
  - variable: CAC
    downsideCase: "$55K CAC per active site"
    baseCase: "$40K CAC per active site"
    upsideCase: "$32K CAC per active site"
    y3RevenueImpactK: 0.0
    cashImpactK: -360.0
  - variable: churn
    downsideCase: 3.0% monthly churn
    baseCase: 2.0% monthly churn
    upsideCase: 1.5% monthly churn
    y3RevenueImpactK: -435.0
    cashImpactK: -310.0
  - variable: sales cycle
    downsideCase: 9-month cycle from discovery to production
    baseCase: 6-month cycle from discovery to production
    upsideCase: 4-month cycle from discovery to production
    y3RevenueImpactK: -690.0
    cashImpactK: -420.0
  - variable: gross margin
    downsideCase: 72% gross margin
    baseCase: 75% gross margin
    upsideCase: 78% gross margin
    y3RevenueImpactK: 0.0
    cashImpactK: -156.6
  - variable: hiring pace
    downsideCase: 在关键验证点出现前两个季度就提前招聘 GTM 和 G&A
    baseCase: 按模型中的试点后节奏逐步加人
    upsideCase: 在试点转正被证明前，延后非工程岗位招聘
    y3RevenueImpactK: -120.0
    cashImpactK: -450.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ActiveSites
      ActiveSites --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情形下的收入来自活跃站点从 Y1 期末 12 家扩到 Y3 期末 50 家，且每个站点采用研究支持的 $120K 年 ARPU。
  - checkName: 必须跑对的环节
    finding: 公司必须把试点转生产率维持在约 60%，同时不断压缩方案上线时间，才能守住计划中的 75% 毛利率。
  - checkName: 模型会在哪种情况下失效
    finding: 如果销售周期拖长到约 9 个月，或者低自动化 onboarding 把 ARPU 压到每站点约 $108K，现金风险就会明显上升。
  - checkName: 下一轮融资所需证明
    finding: 一个可信的 seed 故事，应包括 36 个活跃站点、约两周的可重复实施流程，以及首条跑通的赞助方或 CRO 引荐动作。
sanityChecks:
  ruleOf40: "Y3 growth 81.3% + EBITDA margin 3.3% = 84.6%"
  burnMultiple: "Y1 burn multiple 约为 2.0x；随着站点扩张开始覆盖固定团队成本，Y2 改善到约 0.2x。"
  revenuePerFte: "按 15 个期末 FTE 计算，Y3 约为 $348K；落在垂直 SaaS 可能成立的 $200-400K 区间，但前提是实施必须模板化。"
  flags:
    - "模型把 customers 视为产生收入的活跃研究站点，而不是母体诊疗平台；到 Y3，logo 数只有 6-8 个。"
    - "75% 毛利率来自业务计划目标；如果试点长期保持重实施形态，这个假设可能偏激进。"
    - "收入集中度很高，因为 50 个活跃站点很可能集中在少数几个专科平台客户内部。"
    - "现金流按 EBITDA 建模；未纳入债务、capex 或回款延迟。"
