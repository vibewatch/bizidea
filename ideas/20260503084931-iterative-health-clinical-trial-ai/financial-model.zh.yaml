scenarios:
  downside:
    description: 试点转正更慢，报表式接入占比也更高，结果就是站点扩张被拖住、定价跟着承压。
    y3RevenueK: 3850.0
    y3EbitdaK: -420.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
      - '试点转生产转化率相较 BP funnelTargets，从 60% 掉到 40%。'
      - 'Q4Y3 期末活跃站点数从 50 滑到 38。'
      - '由于更多客户停留在低自动化接入，ARPU 从 $120K 降到 $108K。'
      - '毛利率最终停在 72%，而不是目标的 75%。'
  base:
    description: 创始人主导销售把 2-3 个试点转成生产合同，再把活跃站点扩到 50 个，同时守住目标毛利率。
    y3RevenueK: 5220.0
    y3EbitdaK: 169.8
    cashLowPointK: 584.5
    keyAssumptionChanges:
      - '试点转生产转化率基本守住 BP 里 60% 的目标。'
      - '活跃站点数从 Y1 期末 12 个，扩大到 Y2 期末 36 个、Y3 期末 50 个。'
      - 'ARPU 维持在 research 支撑的每个活跃站点 $120K。'
      - '毛利率达到 BP 设定的 75% 目标。'
  upside:
    description: 早期平台内扩张更快，赞助方转介绍也更早起量，于是站点数上升、销售效率改善。
    y3RevenueK: 6240.0
    y3EbitdaK: 540.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - '试点转生产转化率从 60% 提升到 70%。'
      - 'Q4Y3 期末活跃站点数从 50 增到 58。'
      - '随着更多客户追加方案，ARPU 从 $120K 提升到 $126K。'
      - '从 Y2 开始，赞助方或 CRO 转介绍把销售周期大致缩短 2 个月。'
