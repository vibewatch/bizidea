date: '2026-05-03'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP 日期 2026-05-03；模型从计划发布后的次月开始]'
- id: A2
  name: 计费单位
  value: 活跃研究中心
  unit: customer-unit
  source: '[BP businessModel.unitOfValue：已上线心代谢方案的活跃研究中心]'
- id: A3
  name: 起始活跃研究中心数（M1）
  value: '0'
  unit: count
  source: '[BP product.sixMonth 与里程碑时序表明，模型起始时处于无收入的设计伙伴阶段]'
- id: A4
  name: Y1 期末活跃研究中心数
  value: '12'
  unit: count
  source: '[BP 0-12 个月里程碑：2-3 个付费试点和至少两个正式合同；模型设定为 M12 时有 12 个活跃研究中心]'
- id: A5
  name: Y2 期末活跃研究中心数
  value: '36'
  unit: count
  source: '[BP product.twelveMonth 加上 12-24 个月里程碑；在达到完整 50 个研究中心的 SOM 之前，逐步爬坡到多门诊部署]'
- id: A6
  name: Y3 期末活跃研究中心数
  value: '50'
  unit: count
  source: '[BP market.som 与 research market.som：第 3 年约可达到 50 个活跃门诊/研究中心]'
- id: A7
  name: 每个活跃研究中心的年度 ARPU
  value: '120.0'
  unit: USDK
  source: '[research.bottomUpSizingDrivers：每个活跃门诊的估算 ACV 为每年 $120k]'
- id: A8
  name: 收入确认公式
  value: 期间平均活跃研究中心数 x 10.0
  unit: USDK per month
  source: '[由 A2 和 A7 推导的模型公式；$120k 年度 ARPU = $10k 月度 ARPU]'
- id: A9
  name: 毛利率目标
  value: '75.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 75]'
- id: A10
  name: 创始人现金薪酬
  value: '180.0'
  unit: USDK annual loaded
  source: '[创业财务经验法则：受监管 B2B SaaS 在 pre-seed 阶段，创始人现金薪资低于市场水平]'
- id: A11
  name: 工程岗位现金薪酬
  value: '210.0'
  unit: USDK annual loaded
  source: '[创业财务经验法则：高级 health-tech 软件工程师的全额成本]'
