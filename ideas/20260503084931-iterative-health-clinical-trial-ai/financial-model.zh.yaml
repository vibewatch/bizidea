  - id: A3
    name: 起始活跃站点数（M1）
    value: '0'
    unit: 个
    source: '[BP product.sixMonth 与里程碑节奏都表明，模型起点仍处于设计伙伴、尚未形成收入的阶段]'
  - id: A4
    name: Y1 期末活跃站点数
    value: '12'
    unit: 个
    source: '[BP 0-12 个月里程碑：2-3 个付费试点，且至少转成两个生产合同；模型按 M12 达到 12 个活跃站点处理]'
  - id: A5
    name: Y2 期末活跃站点数
    value: '36'
    unit: 个
    source: '[BP product.twelveMonth 与 12-24 个月里程碑；在完整达到 50 个站点 SOM 前，先爬坡到多门诊部署]'
  - id: A6
    name: Y3 期末活跃站点数
    value: '50'
    unit: 个
    source: '[BP market.som 与 research market.som：第 3 年约可触达 50 家活跃门诊/站点]'
