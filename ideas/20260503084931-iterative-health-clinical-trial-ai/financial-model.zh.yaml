scenarios:
  downside:
    description: 试点转化更慢且更多依赖报表式上线，会推迟研究中心扩张并对定价形成压力。
    y3RevenueK: 3850.0
    y3EbitdaK: -420.0
    cashLowPointK: 120.0
    keyAssumptionChanges:
    - 相较 BP funnelTargets，试点转正式商用转化率从 60% 降至 40%。
    - 到 Q4Y3 时，期末活跃研究中心从 50 个滑落到 38 个。
    - 由于更多客户停留在自动化程度较低的上线方式，ARPU 从 $120K 降至 $108K。
    - 毛利率稳定在 72%，而非目标的 75%。
  base:
    description: 由创始人主导销售，将 2-3 个试点转为正式商用，然后在达到目标毛利率的前提下把活跃研究中心扩展到 50 个。
    y3RevenueK: 5220.0
    y3EbitdaK: 169.8
    cashLowPointK: 584.5
    keyAssumptionChanges:
    - 试点转正式商用转化率维持在接近 BP 目标的 60%。
    - 活跃研究中心从 Y1 期末的 12 个扩展到 Y2 期末的 36 个，并在 Y3 期末达到 50 个。
    - ARPU 维持在研究支持的每个活跃研究中心 $120K。
    - 毛利率达到 BP 目标的 75%。
  upside:
    description: 在早期平台客户内更快扩张，并更早启动申办方转介绍动作，可提升研究中心数量并改善销售效率。
    y3RevenueK: 6240.0
    y3EbitdaK: 540.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
    - 试点转正式商用转化率从 60% 提升到 70%。
    - 到 Q4Y3 时，期末活跃研究中心从 50 个提高到 58 个。
    - 随着更多客户增加额外方案，ARPU 从 $120K 提升到 $126K。
    - 从 Y2 开始，申办方或 CRO 转介绍可将销售周期缩短约两个月。
