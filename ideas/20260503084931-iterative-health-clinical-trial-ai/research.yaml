openQuestions:
- How many centralized cardiology practice platforms in the U.S. currently have enough protocol volume to justify a dedicated intake workflow product?
- Which specialty EHR and scheduling systems dominate the first 20 target accounts, and what minimum data feed is actually available before a visit?
- 'Who owns the budget in practice: site operations, sponsor pass-through, or CRO-led study setup?'
- What pilot KPI is decisive enough to displace manual chart review and generic recruitment vendors within one study cycle?
