  stage: scale-up
  wedge: Large real-world-data network for feasibility, trial design, and healthcare-provider connectivity.
  pricing: Custom enterprise pricing; not publicly listed.
  strength: Strong data scale and sponsor/provider network effects.
  weaknessVsUs: Best known for feasibility and cohort discovery, not daily coordinator tasking inside a single specialty practice’s appointment flow.
  sourceRefs:
  - 7
  - 10
- name: Medidata
  stage: incumbent
  wedge: Horizontal clinical-trial operating system spanning CTMS, patient experience, diversity, and site insights.
  pricing: Custom enterprise pricing; not publicly listed.
  strength: Distribution, incumbent trust, and breadth across study operations.
  weaknessVsUs: Horizontal breadth can make specialty-specific cardiometabolic intake and EHR-native pre-screening a lower-priority workflow.
  sourceRefs:
  - 13
