  validationPlan:
  - priority: high
    question: How many PE-backed cardiology groups with centralized research ops actively run obesity, heart-failure, or broader cardiometabolic trials today?
    evidenceToGather: 20-account target list, current protocol inventory by site, and active sponsor/CRO relationships.
  - priority: high
    question: What is the minimum data feed needed to produce a useful pre-visit worklist inside the top two target EHR environments?
    evidenceToGather: Integration discovery calls, sample scheduling exports, and one protocol translated into executable screening logic.
  - priority: high
    question: 'Which KPI actually unlocks budget: coordinator hours saved, days-to-first-screen, screen-pass rate, or enrollment against target?'
    evidenceToGather: Pilot design with baseline/manual comparison across one live protocol.
  - priority: medium
    question: Will buyers accept software-assisted outreach before explicit study-specific consent if a human reviews each recommendation?
    evidenceToGather: Compliance interviews with site legal/privacy leads and sponsor study teams.
  - priority: medium
    question: Can sponsor or CRO referrals shorten the sales cycle enough to offset integration-heavy implementation?
    evidenceToGather: Channel interviews with CRO feasibility leaders and specialty-site networks.
