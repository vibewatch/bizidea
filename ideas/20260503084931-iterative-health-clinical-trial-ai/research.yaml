  adoptionFrictionMatrix:
  - friction: EHR and scheduling data access varies by site and vendor
    severity: high
    affectedBuyer: Research ops leader and clinic IT
    mitigation: Start with the most common specialty workflows, accept phased onboarding, and prove value on one protocol before deeper automation.
    sourceRefs:
    - 48
    - 46
  - friction: Protocol interpretation must remain auditable and clinician-reviewed
    severity: high
    affectedBuyer: Compliance lead and principal investigator
    mitigation: Use human-in-the-loop protocol translation, explicit exclusion reasoning, and logs aligned to GCP expectations.
    sourceRefs:
    - 51
  - friction: Coordinator teams will resist another dashboard unless it reduces work immediately
    severity: medium
    affectedBuyer: Clinical research coordinators
