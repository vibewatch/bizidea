  - 14
- name: Circuit Clinical
  stage: scale-up
  wedge: Community-based trial access network that brings research into everyday care settings.
  pricing: Custom enterprise pricing; not publicly listed.
  strength: Physician-network access and community trial activation.
  weaknessVsUs: Network-access orientation does not automatically solve specialty pre-visit eligibility logic and coordinator workflow inside a target practice.
  sourceRefs:
