- name: Iterative Health
  stage: scale-up
  wedge: Community-site research infrastructure and specialty-site operations, expanding from GI into cardiology and obesity.
  pricing: Custom enterprise pricing; not publicly listed.
  strength: Recent funding and a cardiovascular partnership suggest capital, distribution, and specialty-site execution credibility.
  weaknessVsUs: Broader network-and-services model may be less opinionated than a pure pre-visit cardiometabolic intake workflow for specialty practices.
