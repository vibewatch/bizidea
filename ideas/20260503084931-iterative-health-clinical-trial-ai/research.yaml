  wedge: Enterprise patient matching and recruitment focused on sponsor-side referral generation and qualification.
  pricing: Custom enterprise pricing; not publicly listed.
  strength: Clear positioning around enterprise match and referral generation.
  weaknessVsUs: If referrals still leak before screening, an external matching layer alone does not fix in-clinic follow-through and chart-level qualification.
