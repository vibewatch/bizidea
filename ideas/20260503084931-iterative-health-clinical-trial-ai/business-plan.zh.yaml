slug: cardiometabolic-trial-intake
date: '2026-05-03'
executiveSummary: >-
  这家公司要卖给美国多站点心内科集团和肥胖医学网络一套 EHR 原生的预筛查与触达操作系统，服务对象是正在跑赞助方出资的心代谢临床试验。眼下最痛的地方，是人工翻病历和协调员靠表格分诊：首筛启动慢、日常门诊里的合格患者不断漏掉、站点产能也被白白浪费。最合适的滩头市场，是拥有 20-100 家门诊、背后有 PE 支持且设有中央研究职能的心内科平台，尤其是那些刚启动肥胖或心衰试验、短期内就要面对入组压力的团队。第一版产品必须收得很窄：按方案生成就诊前工作清单、给出经过人工复核的资格解释、并围绕真实预约留下可审计的触达记录。整套 GTM 逻辑是自洽的，因为感受到漏招风险的那位买方，往往也正好掌控研究运营；他们可以先从一个付费试点起步，等首筛天数和协调员工时改善后，再把系统铺到更多门诊。真正的竞争优势，不是泛泛而谈的 AI 匹配，而是扎进专科诊疗平台内部，把心代谢工作流做深——这一层正是赞助方平台和招募市场型产品最弱的地方。研究支持这是一个真实、但边界清楚的初始市场：估算 TAM 为 $180M、SAM 为 $42M、3 年可触达 SOM 为 $6M；若想撑起更大的风投想象空间，后续必须扩到 CRO 可行性评估和赞助方基准数据。最大风险在于集成拖慢落地、站点与赞助方之间预算归属不清，以及现有厂商在公司建起数据护城河前就把相似功能打包卖出。由于来源里仍缺定价对标和研究活跃型心内科平台的真实数量，早期定价包装和销售能力都应视作待验证的运营假设，而不是既成事实。
problem:
  - 心内科和肥胖试验站点至今还靠人工翻病历、协调员记忆和通用 EHR 报表，所以合格患者会在日常诊疗中被漏掉。
  - 入组变慢会拖延赞助方里程碑、抬高协调员人力成本，也让多站点专科平台即使已经有足够病人流量，研究产能仍然吃不满。
solution:
  - 接入诊所 EHR、排班数据和转诊入口，在患者即将到诊前跑按方案定制的资格逻辑。
  - 给协调员生成就诊前触达、就诊中研究讨论提醒和就诊后跟进清单，并把纳入与排除理由完整留痕。
  - 给研究负责人提供站点级看板，看到候选人流、筛败原因和就诊到首筛的转化情况，从而调整排班和方案组合。
whyWeWin:
  - 产品直接扎进站点运营层，因为患者匹配后能不能真正进入筛查，取决于即将发生的预约和协调员动作。
  - 把心代谢专科做深，理应能拿到更好的方案模板、更低的误报率，以及比横向招募工具更有用的转化基准。
  - 如果每个季度都能继续缩短方案配置时间、做出 ROI 证明，那么可复用的方案规则库和跨站点的转诊流失、筛败模式数据，就能慢慢长成防御力。
strategicChoices:
  beachhead: 拥有 20-100 家门诊、研究运营已集中化、并新上肥胖、心衰或更广泛心代谢方案的美国 PE 支持型心内科诊疗平台。
  wedgeRationale: 先把一个按方案定制的就诊前筛查工作流卖进现有专科网络，比一上来卖完整 CTMS 或赞助方分析套件更容易做出证明——因为痛点够急、流程归一支团队管，而且价值能在一个研究周期里量出来。
  sequencingRationale: 公司该先用低集成成本试点和协调员吞吐改善证明自己，先在单一方案上跑通；再扩到多方案站点订阅；只有当一线交付反复跑顺后，才去做 CRO 可行性评估、赞助方预测和跨站点基准产品。
  notYet:
    - 面向大众的外部患者获客市场或消费者端试验匹配。
    - 完整 CTMS、EDC，或端到端赞助方运营平台。
    - 在美国专科平台打法和互操作模板跑顺前就急着国际化。
market:
  tam: 估算中的美国心代谢专科门诊软件机会约 $180M，对应约 1,500 个具备研究能力的单位，以及约 $120k 的年度 ACV。
  sam: 估算中的滩头市场约 $42M，对应约 350 家门诊，集中在研究运营可快速标准化的心内科集团和相邻肥胖项目中。
  som: 第 3 年可触达规模约 $6M，对应约 50 家活跃门诊，分布在 6-8 个客户里，并经历分阶段铺设与方案扩张。
  segments:
    - 研究活跃的多站点心内科诊疗平台，且研究运营已集中化
    - 正在新增心代谢方案的肥胖医学网络和专科站点集团
  buyingProcess: 研究运营负责人通常最直接感受到问题，但真正成交还得让门诊 IT、合规和 PI 都点头，因为患者识别和触达必须有可审计的流程控制。最可信的切入口，是把一个真实在跑的研究和一个运营 KPI——例如首筛天数或节省的协调员工时——打包成付费试点。
product:
  mvp: MVP 应先支持 1-2 个心代谢方案，接入预约数据和最小可用的临床数据流，产出每日就诊前工作清单，并记录经过人工复核的触达与排除原因。它不该自动触达患者，而应把重点放在优化协调员执行，同时留下可审计记录。
  sixMonth: 在最重要的一到两个目标 EHR / 报表环境里拿下两个共创试点，把方案上线时间压到两周以内，并证明人工翻病历时间和首筛天数都明显下降。
  twelveMonth: 支持单个客户在 3-5 家门诊上铺开多方案版本，加入站点经理看板，追踪筛败原因和队列表现，并把第一套常见 EHR 栈的实施路径产品化。
  twentyFourMonth: 扩到 6-8 个专科平台的多门诊部署，加入面向赞助方 / CRO 的入组预测与基准报告，并利用聚合后的心代谢转化数据，提升研究选择和方案设计支持能力。
  keyBets:
    - 只要有预约、诊断、用药和转诊上下文这类最小数据流，就足以生成有用的就诊前队列。
    - 只要新流程嵌进每天的预约审阅，而且确实能帮活跃方案省时间，研究协调员就会用。
    - 方案翻译这件事可以被足够标准化，不至于把毛利率拖成重服务模式。
    - 在成交和续约上，心代谢专科深度会比一个更宽但更浅的招募平台故事更有分量。
gtm:
  wedge: 向刚签下新肥胖或心衰研究、又担心人工筛查拖垮入组目标的多站点心内科平台，卖一个付费试点。
  channels:
    - 创始人主导外联，直接找研究运营 VP / Director 和专科平台 COO
    - 围绕新开的心代谢研究，争取赞助方和 CRO 转介绍
    - 专科研究会议与定向运营者闭门交流
    - 能提升部署可信度的互操作与 EHR 实施伙伴
  funnelTargets: 目标客户到首次沟通 25%+、首次沟通到付费试点 20%+、付费试点到年度生产合同 60%+、生产客户在 12 个月内继续扩展到更多门诊或更多方案 70%+。
  pricing: 先卖一个覆盖单一在研方案和有限门诊数的付费试点，再转成按活跃研究站点收费、并按方案量分层的年度订阅；这种结构更贴合买方感受到的入组风险，也让扩张和真实使用量挂钩，而不是卖虚的 AI 席位。
businessModel:
  revenueStreams:
    - 首个方案部署的付费实施与试点费用
    - 按活跃研究站点收取的年度 SaaS 订阅
    - 新研究上线时的方案接入 / 配置费
    - 后续面向赞助方、CRO 或大型站点网络的基准数据与预测增值模块
  unitOfValue: 具备在研心代谢方案的活跃研究站点，并可随着支持方案数增加而扩容。
  targetGrossMarginPct: 75
  expansionLevers:
    - 试点证明后，在同一客户内继续加方案
    - 从首批门诊向整个平台其余门诊铺开
    - 当跨站点数据足够可信后，卖赞助方或 CRO 报告模块
    - 从心内科延伸到相邻的肥胖和代谢试验工作流
strategyMap:
  northStarMetric: 每个活跃站点每月从日常专科门诊里产出的已筛查患者数。
  inputMetrics:
    - 站点激活到首位筛查患者的天数
    - 每位入组患者对应的协调员翻病历工时
    - 就诊前完成复核的被标记患者比例
    - 试点转生产合同的转化率
    - 方案配置时间
  moatsToBuild:
    - 可复用的心代谢方案规则库，并持续缩短配置时间
    - 跨站点的转诊流失、筛败原因和就诊到首筛转化基准
    - 在最常见专科平台 EHR 环境里做深集成和流程信任
  killCriteria:
    - 前 5 个试点里，不足 2 个能在 12 个月内转成生产合同
    - 做完 3 次实施后，中位方案配置时间仍超过 4 周
    - 试点相较基线，无法把首筛天数或协调员工时改善至少 20%
  mermaid: |
    flowchart LR
      Wedge[多站点心内科集团新开肥胖或心衰研究] --> MVP[就诊前方案工作清单与触达留痕]
      MVP --> Proof[首筛更快且协调员筛查时间下降]
      Proof --> Expansion[每个客户铺到更多门诊与更多方案]
      Expansion --> Moat[跨站点心代谢基准数据]
investorMemo:
  verdict:
    call: 值得约见 / 继续深挖
    conviction: 这是一个已经被验证过痛点类别里的清晰工作流切口，但前提是公司得尽快证明：低集成成本也能部署，而且预算有人拍板。
    whyBelieve: 研究同时给出了真实的入组痛点、持续的资本投入，以及赞助方优先平台和真正拿下转化的协调员工作流之间的明显空档。
    whyDoubt: 初始市场集中、交付又偏重，如果试点最后像定制服务，或者现有厂商把相似能力直接打包卖，公司就可能卡住。
    nextDiligence: 去验证 3 个目标客户、它们的活跃方案量，以及一个付费试点是否真能把首筛天数改善到足以换来多站点年度合同。
  firstCustomer:
    title: PE 支持型心内科诊疗平台的研究运营副总裁
    profile: 美国专科集团，拥有中央研究运营、20-100 家门诊，并且新上的肥胖或心衰试验项目目前仍靠协调员从日常门诊里手工筛查。
    trigger: 集团刚签下一项新的赞助方或 CRO 研究，发现如果继续人工翻病历，激活后的头几周里就很可能错过入组目标。
    buyer: 研究运营 VP / Director，部分情况下由 COO 联合推动
    initialContract: 在 3-5 家门诊、1 个真实在跑方案上收取 $40k-$75k 的付费试点；随着更多门诊和方案上线，再转成约 $120k-$180k 的年度订阅。
  mustBeTrue:
    - 美国至少有 20 个优先级足够高的目标账户，活跃心代谢方案量足以支撑一个专门的 intake 产品。
    - 只靠预约数据加最小临床数据流，就能在不做重度定制 EHR 集成的前提下生成可用的就诊前工作清单。
    - 在完整赞助方招采流程启动前，买方就愿意先用研究运营预算或赞助方 pass-through 预算付钱。
    - 协调员和研究者会信任经人工复核的推荐结果，并愿意把它用到真实在跑的研究中。
    - 在现有厂商或服务公司补齐这层能力前，公司能先把“试点转生产”跑成可复用动作。
  diligenceQuestions:
    - 前 20 个目标账户里，哪两套 EHR 或排班环境最常见？在就诊前到底能拿到哪些数据？
    - 专科诊疗平台过去买研究运营工具时，究竟哪个 KPI 最能打开预算？
    - 平均一个目标平台每年会跑多少个活跃的肥胖、心衰或更广泛心代谢方案？
    - 在目标站点里，正式取得研究同意前，和研究相关的患者触达会受到哪些合规约束？
    - 在站点级招募工作流里，赞助方或 CRO 多大程度会影响甚至补贴技术选型？
  riskHeatmap:
    - risk: 集成时间过长，或者每个站点都要单独定制。
      likelihood: High
      impact: High
      leadingIndicator: 前 3 个试点都要超过 6 周，才能稳定产出就诊前工作清单。
      mitigation: 从最常见的专科 EHR 入手，试点期允许 CSV / 报表式导入，并把映射标准化到“一次只做一个方案”。
    - risk: 买方宁愿继续加协调员，或继续用现有供应商，也不想再上一套新工具。
      likelihood: Medium
      impact: High
      leadingIndicator: 首次沟通里大家都说产品好，但除非赞助方全额买单，否则没人愿意跑付费试点。
      mitigation: 把试点绑到真实研究上，量化节省的协调员工时和首筛天数，并把定价对准漏招风险。
    - risk: 现有试验科技厂商或站点网络补上相似的匹配能力。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 越来越多交易输掉，是因为买方认为现有 CTMS 或招募供应商也能做就诊前匹配。
      mitigation: 更快把心代谢方案模板、工作流 UX 和横向厂商不具备的跨站点转化基准做出来。
    - risk: 合规顾虑限制触达，或者削弱团队对算法建议的信任。
      likelihood: Medium
      impact: High
      leadingIndicator: 试点站点即使确认标记准确，仍要求大量人工复核，并阻断触达流程。
      mitigation: 坚持 human-in-the-loop，明确展示排除理由，并把日志设计成符合研究者监督和 GCP 式审计预期。
operatingAssumptions:
  - assumption: 前两个目标 EHR 环境都能在不启动漫长企业级集成项目的情况下，暴露预约、诊断、用药和转诊上下文。
    basis: research.yaml
    validationTest: 在 5 个目标账户里做集成发现，并在 45 天内把 1 份样例数据流接进一个可运行的就诊前规则原型。
    decisionImpact: 如果不成立，就把 ICP 收窄到更容易输出报表的站点，压低短期定价，并推迟赞助方分析招聘。
  - assumption: 围绕 1 个真实在跑研究打包的付费试点，是早期买方愿意签的合同形态。
    basis: operator judgment
    validationTest: 在做多方案扩展前，先用试点方案拿到至少 3 份 LOI 或付费共创客户协议。
    decisionImpact: 如果不成立，就把定价改成纯年度订阅，或更早转向赞助方 / CRO 带单。
  - assumption: 首筛天数和节省的协调员工时，是这个滩头买方最容易被打动的 ROI 指标。
    basis: research.yaml
    validationTest: 在 10 次客户访谈里，让买方给预算驱动 KPI 排序，并要求至少 1 个试点同时测这两个指标。
    decisionImpact: 如果不成立，就把产品分析和定价重心改到入组达成率、筛查通过率或赞助方报告上。
  - assumption: 心代谢方案深度会在赢单率上真正压过横向招募工具。
    basis: idea.yaml
    validationTest: 跟踪前 5 笔交易里的竞品对打，并验证专科模板能否把配置时间或误报率至少压低 25%。
    decisionImpact: 如果不成立，就更早放宽定位，或考虑与更大的试验科技套件合作，而不是正面硬碰。
  - assumption: 第 3 年做到 6-8 个客户、50 家门诊，而且不把自己做成重服务实施公司，是现实的。
    basis: research.yaml
    validationTest: 在前 3 个生产客户落地后，持续跟踪平均实施工时、单次部署毛利和扩容周期。
    decisionImpact: 如果不成立，就要重算融资需求、提高服务收费，或进一步收窄产品范围，只保留更轻的协调员工具。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 做出一份 20 个账户的目标清单，聚焦 PE 支持的心内科和肥胖集团，这些机构要有中央研究运营和活跃的心代谢研究。
    hypothesis: 这个滩头市场既够集中，也够大，足以支持聚焦外联，而不用先做大规模市场教育。
    successMetric: 拿到 20 个合格目标账户，并记录清楚买方姓名、现有方案和可能触发器。
    owner: 创始人 / CEO
  - horizon: 0–90 天
    experiment: 跑 5 场集成发现会议，并用 1 份真实预约或报表抽取样例做出工作清单原型。
    hypothesis: 在完整 SMART 或 FHIR 集成之前，只靠最小数据流也能把试点跑起来。
    successMetric: 45 天内做出 1 个可运行原型，能把按方案匹配的就诊记录筛出来，而且复核质量可接受。
    owner: 创始工程师
  - horizon: 0–90 天
    experiment: 围绕试点包装、KPI 优先级和触达合规要求，做 10 场买方访谈。
    hypothesis: 只要 ROI 绑定真实在跑研究、而且研究者复核被明确保留，研究运营负责人就愿意为付费试点买单。
    successMetric: 至少 3 位受访者确认愿意跑付费试点，并对 1 个核心成功 KPI 达成一致。
    owner: 创始人 / CEO
  - horizon: 90–180 天
    experiment: 分别围绕 1 个肥胖或心衰方案启动 2 个付费试点，并和人工基线流程做对照。
    hypothesis: 产品能把翻病历劳动量和首筛启动时间压到足以换来年度生产合同。
    successMetric: 两个试点都把首筛天数或协调员工时改善至少 20%。
    owner: 客户成功负责人
  - horizon: 180–270 天
    experiment: 把第一套常见 EHR 环境下的方案配置模板和实施手册产品化。
    hypothesis: 配置过程能被做成可复用动作，从而把毛利率拉回软件公司该有的水平。
    successMetric: 到第 3 次生产部署时，中位方案配置时间降到两周以内。
    owner: 临床信息学负责人
  - horizon: 270–450 天
    experiment: 结合客户的新方案启动，测试 1 条赞助方或 CRO 转介绍渠道。
    hypothesis: 上游转介绍能缩短销售周期、提高试点成交率，而且不必过早把路线图拉成赞助方优先。
    successMetric: 1 个被转介绍的机会从介绍到付费试点不超过 90 天。
    owner: 创始人 / CEO
operations:
  - 把 human-in-the-loop 的方案翻译流程做成标准动作，并为每一次资格规则变更保留版本控制和审计日志。
  - 每个试点都坚持“一套方案、一条数据流、一个成功指标”先跑通，再决定是否扩 scope。
  - 实施栈先支持 CSV 接入，再支持 SMART 或 FHIR 集成，避免过早把自己绑死在重集成上。
  - 和客户建立固定的入组复盘节奏，把被标记候选人、实际筛查和排除结果与原始流程逐项对比。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 需要有人把首版数据接入、规则和工作流产品快速做出来，同时把实施学习直接反馈给产品决策。
  - role: 临床信息学负责人
    startTiming: Month 0-3
    rationale: 这个角色对把方案标准翻成可审计逻辑至关重要，也能降低部署最后滑向定制服务的风险。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 早期买方高度集中，产品范围又依赖一线流程学习，所以必须由创始人亲自打单、亲自做客户发现。
  - role: 客户成功与实施负责人
    startTiming: Month 6
    rationale: 一旦首批试点开始转生产合同，就需要有人接住交付质量和后续扩容，不能继续全压在创始团队身上。
  - role: GTM 运营或客户经理
    startTiming: Month 9-12
    rationale: 只有当试点手册、定价和 ICP 都被验证得足够清楚之后，才值得补这类岗位去放大外联。
milestones:
  - horizon: 0–12 个月
    items:
      - 在目标滩头市场拿下 2-3 个付费共创客户试点。
      - 在真实研究里把首筛天数或协调员工时改善至少 20%。
      - 把第一条常见专科 EHR 或报表式工作流的实施路径标准化。
      - 至少把 2 个试点转成年度生产合同。
  - horizon: 12–24 个月
    items:
      - 把生产客户扩到 6-8 个专科平台、约 50 家活跃门诊。
      - 支持多方案部署，并给管理者提供队列表现和筛败分析看板。
      - 跑通第一条可重复复制的赞助方或 CRO 转介绍渠道。
  - horizon: 24–36 个月
    items:
      - 基于跨站点心代谢转化数据，推出面向赞助方的预测和基准产品。
      - 从心内科扩到工作流信号相近的肥胖及其他代谢专科。
      - 把实施做成模板驱动型流程，而不再是创始人亲自盯每一单。
risks:
  - risk: 不同专科 EHR 和排班系统的差异拖慢部署，把公司一步步推向定制服务。
    likelihood: High
    impact: High
    mitigation: 第一年只做最常见工作流，允许分阶段 CSV 接入，并拒绝过度定制的试点。
  - risk: 买方看不到足够强的 ROI，不愿意用新系统替代人工协调员筛查或现有招募供应商。
    likelihood: Medium
    impact: High
    mitigation: 围绕一个真实在跑方案卖单，先量出人工流程基线，并把成功指标严格绑到预算和入组风险上。
  - risk: 合规或研究者顾虑让患者触达难以及时推进，也削弱团队对算法建议的采用意愿。
    likelihood: Medium
    impact: High
    mitigation: 强制保留人工复核，清楚展示规则逻辑和排除理由，并让产品日志对齐审计要求。
  - risk: 横向大厂或社区站点网络在公司建起专科数据护城河前，先补出重叠能力。
    likelihood: Medium
    impact: Medium
    mitigation: 继续把心代谢专科深度做窄做深，更快上线方案模板，并把跨站点表现数据沉淀成差异化基准。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月把滩头市场跑实，做出第一套可重复的集成与方案配置手册，把试点转成生产合同，并把门诊覆盖做大到足以验证赞助方或 CRO 带单，而不是过早膨胀成宽而重的试验科技套件。
