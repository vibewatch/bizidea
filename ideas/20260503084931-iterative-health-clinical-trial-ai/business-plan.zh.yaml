slug: cardiometabolic-trial-intake
date: '2026-05-03'
executiveSummary: 该公司将向运行申办方资助心代谢试验的美国多点位心脏科集团和肥胖医学网络，销售一套 EHR 原生的预筛选与外联操作系统。最直接的痛点是人工病历审查和协调员电子表格分诊，这会延迟首次筛查、让日常就诊中的合格患者被错过，并浪费研究中心产能。建议的滩头市场是拥有 20-100 家门诊且设有集中式研究职能的 PE 支持心脏科平台，尤其是在其启动肥胖或心衰试验、面临短期入组风险时。首个产品应保持聚焦：按方案定制的就诊前工作清单、人工复核的资格解释，以及与实时预约绑定的可审计外联追踪。该 GTM 逻辑是连贯的，因为感受到入组风险的同一位买方通常也掌控研究运营，可以先从一个付费试点开始，并在首次筛查天数和协调员工时改善后扩展到更多门诊。核心竞争优势不是通用 AI 匹配，而是嵌入专科机构运营内部的心代谢工作流深度，而这正是申办方平台和招募市场的薄弱点。研究支持一个真实但边界清晰的初始市场：估算 TAM 为 $180M、SAM 为 $42M、第三年 SOM 为 $6M；若要获得更大的风险投资上行空间，还需向 CRO 可行性和申办方基准分析扩展。最大风险在于集成阻力、研究中心与申办方之间预算归属不清，以及在创业公司建立数据护城河之前，既有玩家就打包上线类似功能。精确定价基准以及真正具备研究活跃度的心脏科平台数量，在现有材料中仍不完整，因此早期包装方式和销售能力应被视为可验证的经营假设，而非既定事实。
problem:
- 心脏科和肥胖领域的专科试验中心仍依赖人工病历审查、协调员记忆和通用 EHR 报表，因此在日常诊疗中会错过合格患者。
- 入组缓慢会拖延申办方里程碑、增加协调员工作量，并让多点位专科平台即使已有患者流量，研究产能仍然闲置。
solution:
- 连接机构的 EHR、排班数据流和转诊入口，在患者即将就诊前运行按方案定制的资格判定逻辑。
- 生成协调员工作清单，用于就诊前外联、就诊中研究讨论提示，以及就诊后跟进，并记录纳入与排除理由。
- 为研究负责人提供中心级仪表板，展示候选人流转、筛选失败原因和就诊到筛查的转化情况，以便其调整人员配置和方案组合。
whyWeWin:
- 产品从研究中心运营层切入，在这里，即将到来的预约和协调员动作决定了匹配到的患者最终是否会被筛查。
- 心代谢专科深度应能带来比横向招募工具更好的方案模板、更低的误报率，以及更有用的转化基准。
- 如果配置时间和 ROI 证明能够逐季改善，那么可复用的方案规则库，加上跨中心的转诊流失和筛选失败模式数据，便可形成可防御的护城河。
strategicChoices:
  beachhead: 拥有 20-100 家门诊、集中式研究运营，以及新肥胖、心衰或更广泛心代谢方案的美国 PE 支持心脏科诊疗平台。
  wedgeRationale: 向现有专科网络销售单一的、按方案定制的就诊前筛查工作流，比销售完整 CTMS 或申办方分析套件更容易快速验证，因为痛点更直接、工作流由单一团队负责，而且价值可以在一个研究周期内衡量。
  sequencingRationale: 公司应先在单一方案上验证轻集成试点和协调员处理量提升，然后扩展到多方案的研究中心订阅，只有在多次正式商用验证成功之后，再建设 CRO 可行性、申办方预测和跨中心基准分析产品。
  notYet:
  - 广泛的外部患者获客市场或面向消费者的试验匹配。
  - 完整的 CTMS、EDC 或端到端申办方运营平台。
  - 在形成美国专科平台打法和互操作模板之前，不做国际扩张。
market:
  tam: 估算美国心代谢专科门诊软件机会为 $180M，约对应 1,500 个具备研究能力的单位，以及约 $120k 的年度 ACV。
  sam: 估算滩头市场为 $42M，覆盖约 350 家可标准化研究运营的集中式心脏科集团门诊及相邻肥胖项目。
  som: 第三年可达情形估算为 $6M，基于分阶段门诊铺开和方案扩展后，约 6-8 家客户中的 50 家活跃门诊。
  segments:
  - 设有集中式研究运营的研究活跃型多点位心脏科诊疗平台
  - 正在增加心代谢方案的肥胖医学网络和专科研究中心集团
  buyingProcess: 研究运营负责人通常拥有这一问题，但采购还需要门诊 IT、合规团队以及主要研究者的认可，因为患者识别和外联需要可审计的工作流控制。最可信的切入方式，是围绕一个在研项目和一个运营 KPI（如首次筛查天数或协调员节省工时）开展付费试点。
product:
  mvp: MVP 应支持一到两个心代谢方案，接入预约数据和最小化临床数据流，生成每日就诊前工作清单，并记录经人工复核的外联与排除理由。产品应避免自主外联，而是通过可审计记录来优化协调员执行。
  sixMonth: 在排名前一到两个目标 EHR/报表环境中拿下两个设计伙伴试点，将方案配置时间控制在两周以内，并证明人工病历审查时间和首次筛查天数可被量化降低。
  twelveMonth: 支持每位客户在 3-5 家门诊内开展多方案部署，新增面向中心管理者的筛选失败原因与队列表现仪表板，并将首个通用 EHR 技术栈的实施路径产品化、标准化。
  twentyFourMonth: 扩展至 6-8 个专科平台的多门诊部署，增加面向申办方/CRO 的入组预测和基准报告，并利用聚合后的心代谢转化数据提升研究选择和方案设计支持。
  keyBets:
  - 最小化的预约、诊断、用药和转诊背景数据流，足以生成有价值的就诊前队列。
  - 如果新工作流嵌入日常预约审查，并能在真实方案上节省时间，研究协调员就会采用它。
  - 方案翻译与结构化可以被标准化到足以让毛利率高于以服务为主的实施模式。
  - 在采购和留存上，心代谢专科深度将比“更广但更浅”的招募平台叙事更重要。
gtm:
  wedge: 向刚签下新的肥胖或心衰研究、并担心人工筛查会错过入组目标的多点位心脏科平台销售付费试点。
  channels:
  - 由创始人主导，外呼研究运营副总裁/总监及专科平台 COO
  - 围绕研究中心启动新心代谢研究的申办方和 CRO 转介绍
  - 专科研究会议和定向运营者圆桌
  - 提升部署可信度的互操作与 EHR 实施合作伙伴
  funnelTargets: 目标账户到探索会议转化率 25%+，探索会议到付费试点 20%+，付费试点到年度正式合同 60%+，正式客户在 12 个月内扩展到更多门诊或更多方案的比例 70%+。
  pricing: 围绕一个在研方案和有限门诊开展付费试点，随后转为按活跃研究中心收费、并按方案数量分层的年度订阅；这种方式更贴合买方感知入组风险的方式，也让扩张与实际运营使用对齐，而不是围绕投机性的 AI 席位收费。
businessModel:
  revenueStreams:
  - 首次方案部署的实施费和试点费
  - 按活跃研究中心收取年度 SaaS 订阅费
  - 新研究的方案上线或配置费用
  - 后续面向申办方、CRO 或更大研究中心网络的基准分析与预测附加模块
  unitOfValue: 已上线心代谢方案的活跃研究中心，并按支持方案数量扩展。
  targetGrossMarginPct: 75
  expansionLevers:
  - 在试点验证后，于同一客户内增加更多方案
  - 从首批门诊扩展到整个平台其余门诊
  - 在跨中心数据具备可信度后，销售申办方或 CRO 报告模块
  - 从心脏科扩展到相邻的肥胖与代谢试验工作流
strategyMap:
  northStarMetric: 每个活跃研究中心每月从日常专科就诊中产生的已筛查患者数。
  inputMetrics:
  - 从研究中心启用到首位患者完成筛查所需天数
  - 每位入组患者对应的协调员病历审查工时
  - 在就诊前完成复核的已标记患者占比
  - 试点转正式商用转化率
  - 方案配置时间
  moatsToBuild:
  - 可复用的心代谢方案规则库，并持续缩短配置时间
  - 关于转诊流失、筛选失败原因和就诊到筛查转化的跨中心基准
  - 在最常见专科平台 EHR 环境中的深度集成和工作流信任
  killCriteria:
  - 前 5 个试点中，12 个月内转正式商用的不足 2 个
  - 在完成 3 次部署后，方案配置时间中位数仍高于 4 周
  - 与基线相比，试点未能将首次筛查天数或协调员工时至少改善 20%
  mermaid: "flowchart LR\n  Wedge[多点位心脏科集团新增肥胖或心衰研究] --> MVP[就诊前方案工作清单与外联日志]\n  MVP --> Proof[首次筛查天数更短，协调员筛查时间更低]\n  Proof --> Expansion[每个客户覆盖更多门诊与更多方案]\n  Expansion --> Moat[跨中心心代谢基准数据]\n"
investorMemo:
  verdict:
    call: 继续会面 / 深入尽调
    conviction: 这是一个位于已验证痛点类别中的清晰工作流切口，但投资信心取决于能否快速证明轻集成部署和预算归属。
    whyBelieve: 研究表明，真实的入组痛点、活跃的资本形成，以及“申办方优先平台”与决定转化成败的协调员工作流之间，确实存在可信的空白。
    whyDoubt: 初始市场集中且实施较重，因此如果试点表现得像定制服务，或既有玩家快速打包类似功能，公司就可能停滞。
    nextDiligence: 验证三个目标账户、其活跃方案量，以及一个付费试点是否足以显著改善首次筛查天数，从而转化为多研究中心年度合同。
  firstCustomer:
    title: PE 支持的心脏科诊疗平台研究运营副总裁
    profile: 一家美国专科集团，设有集中式研究运营，拥有 20-100 家门诊，并开展新的肥胖或心衰试验项目，依赖协调员对日常就诊进行筛查。
    trigger: 该集团签下新的申办方或 CRO 研究后发现，在启动后的最初几周内，人工病历审查很可能导致错失入组目标。
    buyer: 研究运营副总裁或总监，有时由 COO 共同推动
    initialContract: 在 3-5 家门诊和一个在研方案上开展 $40k-$75k 的付费试点，随着更多门诊和方案上线，转为约 $120k-$180k 的年度订阅。
  mustBeTrue:
  - 美国至少有 20 个优先目标账户，具备足够的在研心代谢方案量，足以支撑专门的入组产品。
  - 无需完整的定制 EHR 集成，仅靠最小化的预约加临床数据流，就能生成可用的就诊前工作清单。
  - 买方会先从研究运营预算或申办方转付预算中支付，而不会等待完整的申办方主导采购流程。
  - 协调员和研究者会对经人工复核的建议建立足够信任，并在真实研究中使用该工作流。
  - 在既有玩家或服务商补上工作流缺口之前，公司能够实现可重复的试点转正式商用转化。
  diligenceQuestions:
  - 前 20 个目标账户主要由哪两种 EHR 或排班环境主导？就诊前实际可访问到哪些数据？
  - 历史上，哪些 KPI 能真正为专科机构的研究运营工具释放预算？
  - 平均每个目标平台每年运行多少个活跃的肥胖、心衰或更广泛的心代谢方案？
  - 在目标研究中心，正式获得研究同意之前，与研究相关的外联受哪些合规限制约束？
  - 申办方或 CRO 多大程度上会影响或补贴研究中心级招募工作流的技术选择？
  riskHeatmap:
  - risk: 集成耗时过长，或需要针对研究中心进行定制开发。
    likelihood: 高
    impact: 高
    leadingIndicator: 前三个试点都需要超过六周才能产出稳定的就诊前工作清单。
    mitigation: 先从最常见的专科 EHR 入手，允许试点阶段采用 CSV 或报表式上线，并围绕“一次一个方案”标准化映射。
  - risk: 买方更愿意增加协调员或继续使用现有供应商，而不是采用新的工作流工具。
    likelihood: 中
    impact: 高
    leadingIndicator: 探索通话中认可产品，但除非申办方全额付款，否则拒绝付费试点。
    mitigation: 将试点绑定到真实研究，量化协调员节省工时和首次筛查天数改善，并围绕错失入组风险进行定价包装。
  - risk: 既有试验技术厂商或研究中心网络上线类似匹配功能。
    likelihood: 中
    impact: 中
    leadingIndicator: 竞争性交易越来越多地流失，因为买方表示其当前 CTMS 或招募供应商现在也能处理就诊前匹配。
    mitigation: 更快地建立心代谢方案深度、工作流 UX，以及横向厂商缺乏的跨中心转化基准。
  - risk: 合规顾虑限制了外联，或降低了对算法建议的信任。
    likelihood: 中
    impact: 高
    leadingIndicator: 即使候选人被准确标记，试点研究中心仍要求大量人工复核，并阻断外联流程。
    mitigation: 保持“人类在环”设计，明确展示排除理由，并让日志对齐研究者监督和 GCP 式审计要求。
operatingAssumptions:
- assumption: 前两个目标 EHR 环境无需经历冗长的企业级集成项目，就能暴露预约、诊断、用药和转诊背景数据。
  basis: research.yaml
  validationTest: 与五个目标账户开展集成调研，并在 45 天内将一个样本数据流接入可运行的就诊前规则原型。
  decisionImpact: 若不成立，则将 ICP 收窄到更适合报表方式的研究中心，降低短期定价，并推迟申办方分析相关招聘。
- assumption: 围绕一个在研研究的付费试点，是面向首批买方可销售的合同形态。
  basis: 运营判断
  validationTest: 在开发多方案扩展功能之前，先通过试点方案拿下至少三份意向书或付费设计伙伴协议。
  decisionImpact: 若不成立，则改为仅围绕年度订阅重新设计定价，或更早推进申办方/CRO 带动销售。
- assumption: 首次筛查天数和协调员节省工时，是对滩头买方最有说服力的 ROI 指标。
  basis: research.yaml
  validationTest: 在十次客户访谈中，让买方对驱动预算的 KPI 进行排序，并要求至少一个试点基线研究同时测量这两个指标。
  decisionImpact: 若不成立，则将产品分析和定价转向入组达成率、筛查通过率或申办方报告。
- assumption: 心代谢方案深度将相对于横向招募工具形成真实的赢单率优势。
  basis: idea.yaml
  validationTest: 跟踪前五笔交易中的竞争评估，并测试专科化模板是否能将配置时间或误报率至少降低 25%。
  decisionImpact: 若不成立，则应更早扩大定位，或选择合作而非与大型试验技术套件正面竞争。
- assumption: 在不演变为重服务实施业务的前提下，第三年达到 6-8 家客户和 50 家门诊的覆盖是现实的。
  basis: research.yaml
  validationTest: 在前三个正式客户之后，测量平均实施工时、按部署拆分的毛利率，以及扩展周期时间。
  decisionImpact: 若不成立，则需重设融资需求、提高服务定价，或将产品范围收窄为更轻量的协调员工具。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 建立一个包含 20 个目标账户的名单，覆盖设有集中式研究运营、且正在开展心代谢研究的 PE 支持心脏科与肥胖机构。
  hypothesis: 该滩头市场规模和集中度都足以支持聚焦式外呼，而非广泛的市场教育。
  successMetric: 记录 20 个合格目标账户，包含明确买方、当前方案以及可能的采购触发点。
  owner: 创始人兼 CEO
- horizon: 0–90 天
  experiment: 开展五次集成调研会议，并基于一个真实预约或报表摘录构建工作清单原型。
  hypothesis: 在完成完整 SMART 或 FHIR 集成之前，仅依靠最小化数据流也能启动有用的试点。
  successMetric: 在 45 天内产出一个可运行原型，以可接受的复核质量识别符合方案的就诊。
  owner: 创始工程师
- horizon: 0–90 天
  experiment: 围绕试点包装方式、KPI 优先级和外联合规要求，进行十次买方访谈。
  hypothesis: 如果 ROI 绑定到一个在研研究，且研究者复核仍然明确可见，那么研究运营负责人会购买付费试点。
  successMetric: 至少三位受访者确认愿意开展付费试点，并就一个核心成功 KPI 达成一致。
  owner: 创始人兼 CEO
- horizon: 90–180 天
  experiment: 分别围绕一个肥胖或心衰方案启动两个付费试点，并与人工基线工作流进行对比。
  hypothesis: 产品能够显著减少病历审查劳动、加快首次筛查，从而赢得年度正式合同。
  successMetric: 两个试点都实现首次筛查天数或协调员节省工时至少 20% 的改善。
  owner: 客户成功负责人
- horizon: 180–270 天
  experiment: 将首个通用 EHR 环境的方案配置模板和实施手册产品化。
  hypothesis: 配置流程可以被标准化到足以支撑软件式毛利率。
  successMetric: 到第三次正式部署时，方案配置时间中位数降到两周以下。
  owner: 临床信息学负责人
- horizon: 270–450 天
  experiment: 测试一个与客户新方案启动相关的申办方或 CRO 转介绍合作。
  hypothesis: 上游转介绍伙伴可在不过早迫使产品走向“申办方优先”路线图的情况下，缩短销售周期并提高试点成交率。
  successMetric: 从引荐开始算，至少有一个转介绍机会在 90 天内进入付费试点。
  owner: 创始人兼 CEO
operations:
- 维护“人类在环”的方案翻译流程，对每次资格规则变更都保留版本控制和审计日志。
- 在扩展范围前，先将每个试点标准化为一个方案、一条数据流和一个成功指标。
- 采用轻量化实施栈，优先支持 CSV 上线，其次再支持 SMART 或 FHIR 集成。
- 与客户建立定期入组复盘节奏，将已标记候选人、已筛查对象和排除情况与基线工作流进行对比。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 负责构建首个数据接入、规则和工作流产品，并让实施中的学习尽可能贴近产品决策。
- role: 临床信息学负责人
  startTiming: 第 0-3 个月
  rationale: 对将方案标准转化为可审计逻辑至关重要，并可降低部署演变为定制服务的风险。
- role: 创始人兼 CEO
  startTiming: 第 0 个月
  rationale: 由于早期买方群体高度集中，且产品范围依赖直接的工作流学习，因此必须由创始人主导销售和客户发现。
- role: 客户成功与实施负责人
  startTiming: 第 6 个月
  rationale: 在首批试点转化后需要该角色，以避免部署质量和扩张受制于创始团队。
- role: GTM 运营人员或客户经理
  startTiming: 第 9-12 个月
  rationale: 只有在试点打法、定价和 ICP 被验证到足以支持可重复外呼后，才增加该岗位。
milestones:
- horizon: 0–12 个月
  items:
  - 在目标滩头市场中拿下 2-3 个付费设计伙伴试点。
  - 在真实研究中证明首次筛查天数或协调员节省工时至少改善 20%。
  - 为一种常见专科 EHR 或报表式工作流标准化首条实施路径。
  - 至少将两个试点转化为年度正式合同。
- horizon: 12–24 个月
  items:
  - 将正式客户扩展到 6-8 个专科平台和约 50 家活跃门诊。
  - 支持多方案部署，并提供用于队列表现和筛选失败分析的管理者仪表板。
  - 推出首个申办方或 CRO 转介绍渠道，并形成可重复的联合销售动作。
- horizon: 24–36 个月
  items:
  - 基于跨中心心代谢转化数据，推出面向申办方的预测和基准分析产品。
  - 从心脏科扩展到工作流信号相似的相邻肥胖与代谢专科。
  - 达到一个规模，使实施主要由模板驱动，而非由创始人亲自推动。
risks:
- risk: 专科 EHR 和排班系统之间的集成差异会拖慢部署，并把公司推向定制服务。
  likelihood: 高
  impact: 高
  mitigation: 将第一年限制在最常见的工作流，允许分阶段 CSV 上线，并拒绝高度定制的试点。
- risk: 买方看不到足够的 ROI，因此不会替代人工协调员筛查或现有招募供应商。
  likelihood: 中
  impact: 高
  mitigation: 围绕一个在研方案销售，为人工流程建立基线，并要求成功指标能直接映射到预算和入组风险。
- risk: 合规或研究者顾虑阻碍及时外联，并降低对算法建议的采用。
  likelihood: 中
  impact: 高
  mitigation: 保持人工复核为必需，展示规则逻辑和排除理由，并让产品日志对齐审计预期。
- risk: 在创业公司建立专科数据护城河之前，横向既有玩家或社区研究中心网络就加入重叠功能。
  likelihood: 中
  impact: 中
  mitigation: 保持对心代谢专科深度的聚焦，更快交付方案模板，并将跨中心表现数据转化为差异化基准。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 融资以支撑 18 个月运营，用于验证滩头市场、建立首套可重复的集成与方案配置打法、将试点转为正式合同，并在不过度建设宽泛试验技术套件的情况下，积累足够的门诊覆盖来测试申办方或 CRO 带动销售。
