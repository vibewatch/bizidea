slug: cardiometabolic-trial-intake
date: '2026-05-03'
executiveSummary: >-
  这家公司要卖给美国多站点心脏科集团和肥胖症医疗网络一套 EHR 原生的预筛查与触达操作系统，服务于由赞助方资助的心代谢临床试验。眼下最直接的痛点，是人工翻病历和协调员靠表格做分诊，这会拖慢首筛时间，让本来在日常门诊里就出现的合格患者被漏掉，也让站点产能白白闲置。最适合的滩头市场，是由 PE 支持、拥有 20-100 家诊所且设有集中式研究职能的心脏科平台，尤其当它们正启动肥胖症或心衰试验、短期就面临入组压力时。第一款产品必须保持收敛：按方案生成的就诊前工作清单、由人工复核的资格解释，以及绑定真实预约的可审计触达追踪。这个 GTM 体系是自洽的，因为感受到入组风险的正是同一位买家，他也掌握研究运营预算，可以先从一个付费试点开始，等到首筛天数和协调员工时改善后，再在更多诊所里扩张。真正的竞争优势不在泛化 AI 匹配，而在专科诊疗运营内部的心代谢工作流深度——这正是赞助方平台和招募市场相对薄弱的地方。研究支持这个市场真实存在，但初始规模有边界：预计 TAM 为 $180M、SAM 为 $42M、第 3 年 SOM 为 $6M；如果想获得更大的风险投资回报，还得向 CRO 可行性评估和赞助方基准分析继续扩展。最大风险包括集成拖慢、站点与赞助方之间预算归属不清，以及现有厂商在公司建立数据护城河前就把类似功能打包进去。现有来源仍缺乏精确的定价基准，以及美国研究活跃型心脏科平台的真实数量，因此早期的产品包装和销售能力，都应被视为需要验证的运营假设，而不是既成事实。
problem:
  - 心脏科和肥胖症专科试验站点仍然依赖人工翻病历、协调员记忆和通用 EHR 报表，因此很多合格患者会在日常诊疗里被漏掉。
  - 入组缓慢会拖延赞助方里程碑、抬高协调员人力成本，也让多站点专科平台即便患者流量充足，研究产能依旧被闲置。
solution:
  - 接入诊所的 EHR、排班数据流和转诊入口，在就诊前运行按方案定制的资格判断逻辑。
  - 为协调员生成工作清单，覆盖就诊前触达、就诊中研究讨论提示，以及带有纳入/排除理由记录的就诊后跟进。
  - 给研究负责人提供站点级仪表盘，查看候选人流转、筛失败原因和就诊到受筛的转化情况，以便调整人手配置和方案组合。
whyWeWin:
  - 产品从站点运营层切入，而真正决定一个已匹配患者能否走到受筛环节的，正是即将发生的预约和协调员的执行动作。
  - 在心代谢专科上的深度，应该能带来更好的方案模板、更低的误报率，以及比横向招募工具更有用的转化基准。
  - 如果每个季度都能继续缩短上线时间、拿出 ROI 证明，一套可复用的方案规则库，加上跨站点的转诊流失和筛失败模式数据，就能累积成防御性护城河。
strategicChoices:
  beachhead: 由 PE 支持的美国心脏科诊疗平台，拥有 20-100 家诊所、集中式研究运营团队，以及新的肥胖症、心衰或更广义的心代谢方案。
  wedgeRationale: 往现有专科网络里卖一个按方案定制的就诊前筛查工作流，比卖整套 CTMS 或赞助方分析平台更容易更快跑出证据，因为痛点够急、流程归属清晰，而且价值能在单个研究周期内量化。
  sequencingRationale: 公司应先在单一方案上证明轻集成试点和协调员吞吐提升，再扩展到多方案站点订阅；只有在反复完成生产落地后，才去建设 CRO 可行性评估、赞助方预测和跨站点基准产品。
  notYet:
    - 广义的外部患者获取市场，或面向消费者的试验匹配。
    - 完整的 CTMS、EDC，或端到端赞助方运营平台。
    - 在美国专科平台打法和互操作模板跑通前，就做国际扩张。
market:
  tam: 约 $180M 的美国心代谢专科诊所软件机会，假设约 1,500 个具备研究能力的单元、每个活跃单元年合同额约 $120k。
  sam: 约 $42M 的滩头市场，对应约 350 家位于集中式心脏科集团和邻近肥胖症项目中的诊所，它们可以较快标准化研究运营。
  som: 第 3 年可触达情形约为 $6M，对应约 50 家活跃诊所、6-8 个客户，在诊所分阶段铺开和方案扩展后实现。
  segments:
    - 拥有集中式研究运营的研究活跃型多站点心脏科诊疗平台
    - 新增心代谢方案的肥胖症医疗网络和专科站点集团
  buyingProcess: 研究运营负责人通常是最核心的问题拥有者，但采购还会牵涉诊所 IT、合规负责人和主要研究者，因为患者识别与触达必须在可审计的流程控制下完成。最可信的切入方式，是把一个付费试点绑到一项真实在跑的研究和一个明确的运营 KPI 上，例如首位受筛所需天数或节省的协调员工时。
product:
  mvp: MVP 应先支持 1-2 个心代谢方案，摄取预约信息和最小必要的临床数据流，生成每日就诊前工作清单，并记录经人工复核的触达与排除原因。它应避免自动化触达，而是用可审计的记录去优化协调员执行。
  sixMonth: 在前 1-2 个目标 EHR / 报表环境里拿下两家设计合作伙伴试点，把方案上线时间压到两周以内，并证明人工翻病历时间和首筛天数的可量化下降。
  twelveMonth: 支持每个客户在 3-5 家诊所中滚动上线多方案，补上站点经理查看筛失败原因和队列表现的仪表盘，并把第一套常见 EHR 栈的实施路径产品化。
  twentyFourMonth: 在 6-8 个专科平台中实现多诊所部署，增加面向赞助方 / CRO 的入组预测与基准报告，并用汇总后的心代谢转化数据来提升研究选择和方案设计支持。
  keyBets:
    - 只要拿到预约、诊断、用药和转诊背景这几类最小数据，就足以做出有用的就诊前队列。
    - 如果新流程嵌进日常预约复核、并能在真实方案上省时间，研究协调员就会采用它。
    - 方案翻译足够标准化后，毛利率就能维持在高于重服务实施模式的水平。
    - 在采购和留存上，心代谢专科深度会比“更广但更浅”的招募平台故事更重要。
gtm:
  wedge: 向刚签下一项新的肥胖症或心衰研究、担心人工筛查会错过入组目标的多站点心脏科平台，卖出一个付费试点。
  channels:
    - 由创始人直接外呼 VP / Director of Research Operations 和专科平台 COO
    - 围绕新开心代谢研究，由赞助方和 CRO 引荐进入站点
    - 专科研究会议和定向运营者圆桌
    - 能提升部署可信度的互操作与 EHR 实施伙伴
  funnelTargets: 目标账户到 discovery meeting 25%+、discovery 到付费试点 20%+、付费试点到年度生产合同 60%+、生产客户到新增诊所或新增方案扩张 70%+（12 个月内）。
  pricing: 先卖一个覆盖单一在跑方案和有限诊所的付费试点，再转成年付订阅，按活跃研究站点计费，并按方案数量分层；这种方式贴合买家感知入组风险的方式，也让扩张与真实运营使用保持一致，而不是去卖投机性的 AI seat。
businessModel:
  revenueStreams:
    - 首次方案部署的付费实施和试点费用
    - 按活跃研究站点收取的年度 SaaS 订阅
    - 新研究上线时收取的方案 onboarding / 配置费用
    - 后续面向赞助方、CRO 或大型站点网络的基准分析与预测附加模块
  unitOfValue: 带有真实心代谢方案的活跃研究站点，并按支持的方案数量扩张。
  targetGrossMarginPct: 75
  expansionLevers:
    - 在同一客户内部，于试点证明后增加更多方案
    - 从首批诊所扩展到整个平台的其余诊所
    - 等跨站点数据足够可信后，卖赞助方或 CRO 报告模块
    - 从心脏科延伸到相邻的肥胖症与代谢类试验工作流
strategyMap:
  northStarMetric: 每个活跃站点-月，从日常专科就诊中产出的受筛患者数。
  inputMetrics:
    - 站点启动到首位受筛患者的天数
    - 每位入组患者对应的协调员翻病历工时
    - 在就诊前完成复核的标记患者占比
    - 试点转生产的转化率
    - 方案上线时间
  moatsToBuild:
    - 可复用的心代谢方案规则库，且上线时间持续下降
    - 跨站点的转诊流失、筛失败原因与就诊到受筛转化基准
    - 在最常见专科平台 EHR 环境里的深度集成与工作流信任
  killCriteria:
    - 前 5 个试点里，不足 2 个在 12 个月内转成生产
    - 做完 3 次实施后，方案上线中位时间仍高于 4 周
    - 试点相对基线，无法把首筛天数或协调员工时至少改善 20%
  mermaid: |
    flowchart LR
      Wedge[New obesity or heart-failure study at multi-site cardiology group] --> MVP[Pre-visit protocol worklists and outreach logging]
      MVP --> Proof[Shorter days-to-first-screen and lower coordinator screening time]
      Proof --> Expansion[More clinics and more protocols per customer]
      Expansion --> Moat[Cross-site cardiometabolic benchmark data]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: 这是一个位于已验证痛点品类里的清晰工作流切口，但要真正建立信心，前提是尽快证明轻集成部署和预算归属都能跑通。
    whyBelieve: 研究显示入组痛点真实存在，资本也在持续流入；而且在赞助方优先平台和协调员实际执行工作流之间，确实存在一段可切入的空档。
    whyDoubt: 初始市场高度集中、实施也偏重，因此如果试点越来越像定制服务，或现有厂商迅速补上相似能力，公司就可能卡住。
    nextDiligence: 验证 3 个目标账户、它们当前的活跃方案量，以及一个付费试点是否足以把首筛天数改善到能转成多站点年度合同。
  firstCustomer:
    title: PE 支持型心脏科诊疗平台的研究运营 VP
    profile: 美国专科集团，拥有集中式研究运营、20-100 家诊所，以及一个依赖协调员筛查日常门诊的全新肥胖症或心衰试验项目。
    trigger: 集团新签下一项赞助方或 CRO 研究后，在站点启动最初几周就发现，人工翻病历很可能会错过入组目标。
    buyer: VP 或 Director of Research Operations，有时由 COO 共同推动
    initialContract: 覆盖 3-5 家诊所和 1 个在跑方案的 $40k-$75k 付费试点；随着更多诊所和方案上线，再转成约 $120k-$180k 的年度订阅。
  mustBeTrue:
    - 美国至少有 20 个优先目标账户，拥有足够多在跑的心代谢方案，值得为 intake 工作流单独采购产品。
    - 只靠最小的预约加临床数据流，不做完全定制的 EHR 集成，也能产出可用的就诊前工作清单。
    - 买家愿意用研究运营预算或赞助方 pass-through 预算付费，而不是必须等完整的赞助方主导采购流程。
    - 协调员和研究者会对人工复核后的推荐建立足够信任，并把它用在真实研究里。
    - 在现有厂商或服务商补齐工作流缺口前，公司能把试点转生产这件事做成可重复流程。
  diligenceQuestions:
    - 前 20 个目标账户里，哪两种 EHR 或排班环境最常见？就诊前到底能拿到哪些数据？
    - 在专科诊疗机构里，历史上什么 KPI 最能解锁研究运营工具预算？
    - 平均每个目标平台每年会跑多少个活跃的肥胖症、心衰或更广义的心代谢方案？
    - 目标站点在获得明确研究同意前，对研究相关触达有哪些合规限制？
    - 赞助方或 CRO 会在多大程度上影响或补贴站点级招募工作流的软件选择？
  riskHeatmap:
    - risk: 集成耗时过长，或者必须为每个站点做大量定制。
      likelihood: High
      impact: High
      leadingIndicator: 前 3 个试点都需要 6 周以上，才能产出稳定的就诊前工作清单。
      mitigation: 从最常见的专科 EHR 起步，允许试点先走 CSV 或报表式上线，并围绕单一方案标准化映射。
    - risk: 买家更愿意增加协调员人手，或继续用现有厂商，而不是上新的工作流工具。
      likelihood: Medium
      impact: High
      leadingIndicator: discovery call 上大家都觉得产品不错，但除非赞助方全额买单，否则不愿启动付费试点。
      mitigation: 把试点绑到真实研究，量化节省的协调员工时和首筛天数，并用“错失入组风险”的口径来包装定价。
    - risk: 现有临床试验技术厂商或站点网络加入相似的匹配功能。
      likelihood: Medium
      impact: Medium
      leadingIndicator: 越来越多的竞争机会最后输掉，因为买家说现有 CTMS 或招募供应商已经能处理就诊前匹配。
      mitigation: 在心代谢方案深度、工作流 UX 和跨站点转化基准上跑得更快，做出横向厂商没有的东西。
    - risk: 合规顾虑限制触达流程，或削弱大家对算法推荐的信任。
      likelihood: Medium
      impact: High
      leadingIndicator: 即便候选人标记准确，试点站点仍要求大量人工复核，并阻止触达工作流真正上线。
      mitigation: 保持 human-in-the-loop 设计，明确展示排除理由，并让日志对齐研究者监督和 GCP 风格的审计要求。
operatingAssumptions:
  - assumption: 前两套目标 EHR 环境都能暴露预约、诊断、用药和转诊背景，而不需要长期的企业级集成项目。
    basis: research.yaml
    validationTest: 在 45 天内与 5 个目标账户完成集成发现，并把 1 份样例数据流导入一个可运行的就诊前规则原型。
    decisionImpact: 如果不成立，就把 ICP 收窄到更容易导出报表的站点，降低短期定价，并推迟招聘赞助方分析相关岗位。
  - assumption: 以单一在跑研究为核心的付费试点，是最初买家愿意签的合同形态。
    basis: operator judgment
    validationTest: 在建设多方案扩展功能前，至少拿到 3 份 LOI 或付费设计合作伙伴协议，验证试点包装可卖。
    decisionImpact: 如果不成立，就把定价改成纯年度订阅，或更早推进赞助方 / CRO pull-through。
  - assumption: 首筛天数和节省的协调员工时，是滩头买家最买账的 ROI 指标。
    basis: research.yaml
    validationTest: 在 10 次客户访谈里，让买家对预算驱动 KPI 排序，并要求 1 个试点的基线研究同时测量这两个指标。
    decisionImpact: 如果不成立，就把产品分析和定价重心转向入组达成率、筛通过率或赞助方报告。
  - assumption: 心代谢方案深度会带来对横向招募工具的真实赢单优势。
    basis: idea.yaml
    validationTest: 跟踪前 5 笔交易中的竞品评估，验证专科模板是否至少能把上线时间或误报率改善 25%。
    decisionImpact: 如果不成立，就更早拓宽定位，或改为与大型临床试验技术套件合作而不是正面竞争。
  - assumption: 第 3 年做到 6-8 个客户和 50 家诊所，在不把自己做成重服务实施公司的前提下是现实的。
    basis: research.yaml
    validationTest: 在前 3 个生产客户上线后，持续测量每次部署的平均实施工时、毛利率和扩张周期。
    decisionImpact: 如果不成立，就重设融资需求、提高服务收费，或收窄产品范围，改做更轻量的协调员工具。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 建一份包含 20 个账户的目标清单，聚焦由 PE 支持、具备集中式研究运营且在跑心代谢研究的心脏科和肥胖症集团。
    hypothesis: 这个滩头市场规模和集中度都足够高，可以支撑聚焦式外呼，而不需要广撒网做市场教育。
    successMetric: 拿到 20 个合格目标账户，且已记录清楚买家、当前方案和潜在购买触发点。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 做 5 次集成发现访谈，并用 1 份真实预约或报表抽取数据，原型化出一个工作清单。
    hypothesis: 在完整 SMART 或 FHIR 集成前，只靠最小数据流也能启动有价值的试点。
    successMetric: 45 天内拿出 1 个可运行原型，能找出与方案匹配的就诊，并达到可接受的复核质量。
    owner: 创始工程师
  - horizon: 0–90 天
    experiment: 访谈 10 位买家，验证试点包装、KPI 优先级，以及触达流程的合规要求。
    hypothesis: 只要 ROI 绑定一项在跑研究、且研究者复核保持明确，研究运营负责人就愿意购买一个付费试点。
    successMetric: 至少 3 位受访者明确愿意做付费试点，并对 1 个核心成功 KPI 达成一致。
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: 分别围绕 1 个肥胖症或心衰方案，启动 2 个付费试点，并与人工基线工作流对照。
    hypothesis: 产品能显著减少翻病历人力并加快首筛，从而换来年度生产合同。
    successMetric: 两个试点都至少把首筛天数或协调员工时改善 20%。
    owner: 客户成功负责人
  - horizon: 180–270 天
    experiment: 把首个常见 EHR 环境的方案配置模板和实施 playbook 产品化。
    hypothesis: 上线过程可以被标准化到足以支撑软件型毛利率。
    successMetric: 到第 3 次生产部署时，方案上线中位时间降到 2 周以内。
    owner: 临床信息学负责人
  - horizon: 270–450 天
    experiment: 围绕客户的新方案启动，测试 1 个赞助方或 CRO 引荐合作。
    hypothesis: 上游引荐伙伴能缩短销售周期、提高试点成交率，而不会过早把路线图拖向赞助方优先。
    successMetric: 1 个被引荐的机会在引荐后 90 天内转成付费试点。
    owner: 创始人/CEO
operations:
  - 保持 human-in-the-loop 的方案翻译流程，并为每次资格规则变更保留版本控制和审计日志。
  - 每个试点先标准化到 1 个方案、1 条数据流和 1 个成功指标，再逐步扩大范围。
  - 采用轻量实施栈：先支持 CSV onboarding，再做 SMART 或 FHIR 集成。
  - 与客户建立固定的入组复盘节奏，把被标记候选人、实际受筛和排除情况与基线流程逐项对照。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 需要先把最初的数据摄取、规则引擎和工作流产品搭起来，同时让实施过程中的一手学习直接反馈到产品决策里。
  - role: 临床信息学负责人
    startTiming: Month 0-3
    rationale: 这个角色对把方案标准翻译成可审计逻辑至关重要，也能降低部署滑向定制服务的风险。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 早期买家池高度集中，产品边界又依赖直接的工作流学习，因此必须由创始人主导销售和客户发现。
  - role: 客户成功与实施负责人
    startTiming: Month 6
    rationale: 一旦首批试点转正，就需要这个角色把部署质量和扩张节奏撑起来，避免一切都卡在创始团队身上。
  - role: GTM 运营或客户经理
    startTiming: Month 9-12
    rationale: 只有当试点打法、定价和 ICP 已经被证明具备可重复性后，才值得加这类岗位。
milestones:
  - horizon: 0–12 个月
    items:
      - 在目标滩头市场拿下 2-3 个付费设计合作伙伴试点。
      - 在真实研究中证明首筛天数或协调员工时至少改善 20%。
      - 为一种常见专科 EHR 或报表式工作流标准化出第一条实施路径。
      - 至少把 2 个试点转成年度生产合同。
  - horizon: 12–24 个月
    items:
      - 把生产客户扩展到 6-8 个专科平台、约 50 家活跃诊所。
      - 支持多方案部署，以及查看队列表现和筛失败分析的管理者仪表盘。
      - 跑通第一条可重复的赞助方或 CRO 引荐渠道。
  - horizon: 24–36 个月
    items:
      - 基于跨站点心代谢转化数据，推出面向赞助方的预测和基准产品。
      - 从心脏科扩展到相邻的肥胖症和代谢专科，前提是工作流信号依旧相似。
      - 把实施流程做成主要依赖模板，而不是持续依赖创始人亲自推动。
risks:
  - risk: 专科 EHR 和排班系统的差异过大，导致部署变慢，并把公司推向定制服务。
    likelihood: High
    impact: High
    mitigation: 把第 1 年严格收敛在最常见的工作流里，允许分阶段 CSV onboarding，并拒绝过度定制的试点。
  - risk: 买家感受到的 ROI 不够强，不足以替代人工协调员筛查或现有招募供应商。
    likelihood: Medium
    impact: High
    mitigation: 围绕 1 个真实在跑方案来卖，先量化人工基线，并把成功指标绑定到预算与入组风险。
  - risk: 合规或研究者顾虑阻碍及时触达，也削弱大家对算法推荐的采用。
    likelihood: Medium
    impact: High
    mitigation: 强制保留人工复核、暴露规则逻辑和排除理由，并让产品日志对齐审计要求。
  - risk: 在公司建立专科数据护城河前，横向现有厂商或社区站点网络就加上了重叠功能。
    likelihood: Medium
    impact: Medium
    mitigation: 保持在心代谢专科深度上足够收敛，先把方案模板做快，再把跨站点表现数据沉淀成差异化基准。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用 18 个月来验证滩头市场，搭出首套可重复的集成与方案配置 playbook，把试点转成生产合同，并积累足够的诊所覆盖度，去测试赞助方或 CRO pull-through，而不必过早把产品做成一套大而全的临床试验技术平台。
