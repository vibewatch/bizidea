problem: 心脏科和肥胖症专科试验站点，今天依然靠人工翻病历、协调员记忆和通用 EHR 报表来找合格患者。结果就是，即便合适患者每天都在门诊里流动，入组依旧缓慢、赞助方里程碑被拖慢、站点产能也吃不满。随着更多方案进入心代谢人群，研究团队需要的是一种能在日常诊疗环节里就抓住合格线索的工作流，而不是几周后再靠表格回补。
targetUser:
  primary: 在独立心脏科集团和肥胖症医疗网络中负责赞助方资助试验的临床研究负责人
  secondary: 多站点专科诊所内部的临床研究协调员
  buyer: 专科诊疗平台的研究运营 VP 或 COO
startupThesis:
  nonObviousInsight: 真正的变化在于，AI 招募正从狭窄的学术中心工作流，转向高流量专科诊疗机构；在这里，决定胜负的数据废气不是泛化患者市场，而是预约排班、转诊原因、诊断记录和用药事件。大多数团队还把招募当成外包营销问题；真正的解法，是把日常专科就诊持续转成按试验方案细分的动态工作清单。
  beachhead: 在美国由 PE 支持、拥有 20-100 家诊所、正新增肥胖症、心衰或心代谢药物试验且已经建立集中式研究职能的心脏科集团
  wedge: 一个 EHR 原生的方案规则引擎，能持续预筛查即将到来的专科就诊，在预约前标记合格患者，并给协调员生成可审计的触达与跟进队列
  whyNowCatalyst: Iterative Health 的融资以及其向心脏科和肥胖症扩张，说明赞助方和站点网络现在急需更贴合专科场景的招募基础设施，来支撑新方案扩张。
  ventureScalePath: 先从赞助方资助的专科站点集团切入，再扩展到 CRO 可行性评估、赞助方入组预测，以及面向心代谢适应症的跨站点数据网络，用于方案设计、站点选择和招募基准分析。
solution: 产品会接入专科诊所的 EHR、排班数据流和转诊入口，持续运行按方案定制的资格判断逻辑。系统每天生成协调员工作清单，覆盖就诊前触达、就诊中研究讨论提示，以及带有纳入/排除理由记录的就诊后跟进。研究负责人可以看到站点级仪表盘，了解候选人流转、筛失败原因，以及各诊所的方案瓶颈。随着时间推移，系统会学到哪些站点、诊断和就诊类型最容易转成正式入组，帮助赞助方和站点集团挑到更合适的研究，并少开那些持续低效的站点。
goToMarketSeed:
  firstCustomer: 一家拥有集中式研究运营团队、正在启动首个肥胖症或心衰试验项目的美国多站点心脏科诊疗平台
  buyingTrigger: 该集团新签下一项赞助方或 CRO 研究后，意识到如果协调员还靠人工翻病历，就会错过入组目标
  currentAlternative: 在 EHR 里手工翻病历、填写赞助方可行性表格、使用协调员外呼清单，以及通用患者招募供应商
  switchingReason: 这个切口能在患者就诊前、在日常专科工作流内部就找出候选人，缩短协调员筛查时间，也比广告驱动式招募或表格分诊留下更干净的触达记录
  pricingHypothesis: 按活跃研究站点收取年度平台费，再叠加按活跃方案数量或已入组参与者计费的使用分层
whyNow:
  - point: AI 临床试验招募领域出现新资金，让专科站点运营方更愿意购买基础设施，而不是继续加人。
    signalRefs: [资本正流向临床试验招募基础设施]
    sourceRefs: [1]
  - point: 向心脏科和肥胖症扩张，立刻带来了更贴合心代谢工作流的软件需求，而不是继续沿用遗留的 GI 研究运营体系。
    signalRefs: [招募需求正转向心代谢专科]
    sourceRefs: [1]
  - point: 在站点网络里做匹配，更偏向嵌入门诊运营的软件——因为患者本来就在这里出现——而不是外部的大范围招募活动。
    signalRefs: [站点网络执行力比漏斗顶端广告更关键]
    sourceRefs: [1]
  - point: 患者-研究匹配现在已经是明确的预算项，因此更容易卖出一款聚焦预筛查、且能量化入组 ROI 的产品。
    signalRefs: [患者-研究匹配正成为核心产品品类]
    sourceRefs: [1]
differentiator: 大多数临床试验招募厂商从外部线索获取或赞助方仪表盘切入；这家公司从专科诊疗运营内部切入——那里资格信号最新鲜，协调员也能在患者流失前就采取行动。由此形成的专有反馈回路，会告诉系统究竟哪些就诊类型、诊断和站点行为，真的能在心代谢试验里带来筛查与正式入组。
