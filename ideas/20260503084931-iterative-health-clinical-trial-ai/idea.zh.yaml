jobsToBeDone:
  - job: 当新的心代谢研究启动时，帮助专科研究团队从日常门诊流里找出并联系可能符合条件的患者，这样他们就能在不继续扩编协调员的情况下完成入组目标。
    currentAlternative: 人工翻病历加表格工作清单
    successMetric: 站点激活到首位筛查患者的天数，以及单站点达成入组目标的比例
