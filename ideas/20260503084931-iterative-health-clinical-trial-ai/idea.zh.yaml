problem: 心脏科和肥胖领域的专科试验中心仍依赖人工病历审查、协调员记忆和通用 EHR 报表来寻找合格患者。这会导致入组缓慢、错过申办方里程碑，并使研究中心产能被闲置，即使合适患者每天都在门诊流转。随着更多方案进入心代谢人群，研究团队需要的是在日常诊疗中就捕捉资格的工作流，而不是几周后再通过电子表格跟进。
targetUser:
  primary: 运行申办方资助试验的独立心脏科集团和肥胖医学网络的临床研究负责人
  secondary: 多点位专科机构内部的临床研究协调员
  buyer: 专科医疗平台的研究运营副总裁或首席运营官
startupThesis:
  nonObviousInsight: 真正的变化在于，AI 招募正从狭窄的学术中心工作流转向高流量专科机构；在这里，真正有价值的数据不是广泛的患者市场，而是预约排期、转诊原因、诊断和用药事件。多数团队仍把招募视为外包营销；真正的突破在于把日常专科就诊转化为持续刷新的、按方案定制的工作清单。
  beachhead: 拥有 20-100 家门诊、正在增加肥胖、心衰或心代谢药物试验且已设立集中式研究职能的美国 PE 支持心脏科集团
  wedge: 一套 EHR 原生的方案规则引擎，可对即将到来的专科就诊进行预筛选，在预约前标记合格患者，并为协调员提供可审计的外联与跟进队列
  whyNowCatalyst: Iterative Health 的融资以及向心脏科和肥胖领域扩张表明，申办方和研究中心网络如今需要足够快速的专科化招募基础设施，以支撑新方案扩展。
  ventureScalePath: 先从申办方资助的专科研究中心集团切入，再扩展至 CRO 可行性评估、申办方入组预测，以及面向心代谢适应症的跨中心数据网络，用于方案设计、中心选择和招募基准分析。
solution: 产品连接专科机构的 EHR、排班数据流和转诊入口，持续运行按方案定制的资格判定逻辑。它生成协调员的每日工作清单，用于就诊前外联、就诊中试验讨论提示，以及就诊后跟进，并记录纳入与排除理由。研究负责人可获得中心级仪表板，查看候选人流转、筛选失败原因以及各门诊的方案瓶颈。随着时间推移，系统会学习哪些中心、诊断和就诊类型更容易转化为入组，帮助申办方和研究中心集团选择更合适的研究，并减少低效中心的开启。
goToMarketSeed:
  firstCustomer: 一家拥有集中式研究运营团队、正启动首个肥胖或心衰试验项目的美国多点位心脏科诊疗平台
  buyingTrigger: 该机构签下新的申办方或 CRO 研究后发现，如果协调员继续手工筛查病历，就会错失入组目标
  currentAlternative: EHR 中的人工病历审查、申办方可行性电子表格、协调员呼叫名单以及通用患者招募供应商
  switchingReason: 这一切入点能在患者就诊前，于日常专科工作流中识别候选人，缩短协调员筛查时间，并生成比广告驱动招募或电子表格分诊更规范的外联记录
  pricingHypothesis: 按活跃研究中心收取年度平台费，并根据活跃方案数或已入组参与者设置使用分层
