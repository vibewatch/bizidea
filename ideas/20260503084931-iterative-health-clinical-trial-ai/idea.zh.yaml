      sourceRefs: [1]
problem: 心内科和肥胖专科试验站点到现在还在靠人工翻病历、协调员脑内记忆和通用 EHR 报表找合格患者。结果就是入组节奏慢、赞助方里程碑一拖再拖、站点产能也吃不满——哪怕合适患者其实每天都在门诊里经过。随着越来越多方案涌向心代谢人群，研究团队真正缺的不是几周后再补一轮表格，而是一套能在日常诊疗现场就把资格筛出来的工作流。
targetUser:
  primary: 在独立心内科集团和肥胖医学网络中负责赞助试验的临床研究负责人
  secondary: 多站点专科诊所内的临床研究协调员
  buyer: 专科诊疗平台的研究运营副总裁或首席运营官
startupThesis:
  nonObviousInsight: 真正变掉的，不是 AI 会不会招募，而是招募这件事正从学术中心那套窄流程，外溢到高就诊量的专科诊疗平台。在这里，最值钱的数据残留不是泛患者流量池，而是预约排班、转诊原因、诊断和用药事件。多数团队还把招募当成外包营销；真正能解锁的，是把日常专科门诊持续翻成按方案刷新的候选名单。
  beachhead: 美国由 PE 支持、拥有 20-100 家门诊的心内科集团；这类机构正新增肥胖、心衰或更广泛的心代谢药物试验，而且已经建起中央研究职能
  wedge: 一个 EHR 原生的方案规则引擎，能在专科就诊前先做预筛查、提前圈出可能合格患者，并给协调员生成可审计的触达和跟进队列
  whyNowCatalyst: Iterative Health 的融资，以及它向心内科和肥胖扩张，说明赞助方和站点网络都在赶着补上一套能跟上新方案扩容速度的专科招募基础设施。
  ventureScalePath: 先切进赞助方驱动的专科站点集团，再往 CRO 可行性评估、赞助方入组预测，以及面向心代谢适应症的跨站点数据网络扩，去服务方案设计、站点遴选和招募基准。
solution: 产品接入专科诊所的 EHR、排班数据和转诊入口，持续跑按方案定制的资格逻辑。系统每天给协调员吐出三类工作清单：就诊前触达、就诊中研究讨论提醒、就诊后跟进，并把纳入和排除理由完整留痕。研究负责人则能看到站点级看板，追踪候选人流、筛败原因和各门诊的方案瓶颈。随着数据越积越多，系统还能学会哪些站点、诊断和就诊类型最容易转成真实入组，帮助赞助方和站点集团挑更合适的研究，也少开一些表现差的站点。
goToMarketSeed:
  firstCustomer: 一家美国多站点心内科诊疗平台，拥有中央研究运营团队，正启动首个肥胖或心衰试验项目
  buyingTrigger: 集团刚签下一项新的赞助方或 CRO 研究，马上发现如果协调员还靠手工翻病历，入组目标大概率会失手
  currentAlternative: 在 EHR 里人工翻病历、用赞助方可行性表格排查、协调员电话名单，以及通用患者招募供应商
  switchingReason: 这个切口把候选患者提前卡在日常专科流程里，而不是等就诊结束后再补救；它既能缩短协调员筛查时间，也能比广告招募或表格分诊留下更干净的触达记录。
  pricingHypothesis: 每个活跃研究站点收取年度平台费，再按活跃方案数或入组人数分层收费
whyNow:
  - point: AI 试验招募赛道的新一轮融资，让专科站点运营方更愿意买基础设施，而不是继续靠加人硬扛。
    signalRefs: [试验招募基础设施还在持续吸金]
    sourceRefs: [1]
  - point: 心内科和肥胖方向的扩张，立刻催生了更懂心代谢工作流的软件需求，而不是继续拿旧的 GI 研究运营工具凑合。
    signalRefs: [心代谢专科成了下一波招募主战场]
    sourceRefs: [1]
  - point: 站点网络式匹配天然偏向嵌进门诊运营的软件，因为患者本来就在这里出现，而不是靠外部大范围招募活动。
    signalRefs: [胜负手不在买流量，而在站点执行]
    sourceRefs: [1]
  - point: 患者与试验匹配如今已经是一条明确预算项，因此更容易卖出一个能量化入组 ROI 的聚焦型预筛查产品。
    signalRefs: [患者与试验匹配正在单独成类]
    sourceRefs: [1]
differentiator: 大多数试验招募供应商都从外部线索获取或赞助方看板切入。这个项目反过来，先扎进专科诊疗平台内部运营——这里资格信号最新，协调员也能在患者流失前动手。这会形成一条专有反馈回路：到底哪些就诊类型、诊断和站点动作，最终真能在心代谢试验里转成筛查和入组。
