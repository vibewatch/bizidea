topRisks:
- name: 集成阻力
  description: 专科机构可能存在碎片化 EHR 配置，拖慢部署并降低价值实现速度。
  mitigation: 先从最常见的专科 EHR 入手，并在全面集成前提供轻量级的 CSV 或报表式上线路径。
- name: 工作流验证缺口
  description: 买方可能怀疑，相比增加协调员人手，预筛选提醒是否真能显著改善入组。
  mitigation: 围绕单一方案销售，并通过与筛查处理量、首次筛查时间和协调员节省工时挂钩的可量化试点来验证。
- name: 既有玩家挤压
  description: 一旦该切入点被证明有价值，现有试验技术供应商或研究中心网络可能会加入类似的患者匹配功能。
  mitigation: 聚焦心代谢专科深度、最快的方案配置能力，以及通用供应商缺乏的跨中心转化基准。
