topRisks:
  - name: 集成拖慢
    description: 专科诊疗机构的 EHR 体系可能很分散，导致部署变慢、价值兑现时间拉长。
    mitigation: 先覆盖最常见的专科 EHR，并在完整集成前提供轻量的 CSV 或报表式上线路径。
  - name: 工作流成效证明缺口
    description: 买家可能不相信，预筛查提醒相比直接增加协调员人手，真的能显著提升入组。
    mitigation: 以单一方案切入，卖一个可量化的试点，并把筛查吞吐、首次受筛时间和节省的协调员工时绑到试点目标上。
  - name: 现有厂商挤压
    description: 一旦这个切口被证明有价值，现有试验技术供应商或站点网络可能会迅速补上类似的患者匹配能力。
    mitigation: 聚焦心代谢专科深度、最快的方案配置速度，以及通用厂商拿不出的跨站点转化基准。
