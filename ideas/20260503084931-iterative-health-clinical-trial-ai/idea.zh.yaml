jobsToBeDone:
  - job: 当一项新的心代谢研究启动时，帮专科研究团队从日常门诊流里找出并联系可能合格的患者，这样他们不用继续扩编协调员也能完成入组目标。
    currentAlternative: 人工翻病历和表格工作清单
    successMetric: 站点启动到首位受筛患者的天数，以及各站点完成入组目标的比例
