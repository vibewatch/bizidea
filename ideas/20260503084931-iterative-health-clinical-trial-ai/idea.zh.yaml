differentiator: 多数试验招募供应商从外部获客或申办方仪表板切入。这家公司则从专科机构运营内部切入，在这里资格信号最新鲜，协调员也能在患者流失前采取行动。这会形成专有反馈闭环，沉淀出哪些就诊类型、诊断和中心行为，真正能在心代谢试验中带来筛查和入组参与者。
