jobsToBeDone:
- job: 当新的心代谢研究启动时，帮助专科研究团队从日常门诊流量中识别并联系可能合格的患者，从而在不增加更多协调员的情况下完成入组目标。
  currentAlternative: 人工病历审查与电子表格工作清单
  successMetric: 从研究中心启用到首位患者完成筛查所需天数，以及各中心完成入组目标的比例
