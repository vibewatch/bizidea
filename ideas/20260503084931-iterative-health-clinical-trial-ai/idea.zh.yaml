  wedgeClarity:
    score: 5
    rationale: 针对肥胖和心内科试验，对即将到来的专科就诊做预筛查，是一个足够窄、又足够可执行的首个工作流。
  defensibility:
    score: 4
    rationale: 嵌入式工作流数据、方案映射和转化基准，会逐步复利成较强的数据护城河。
  ventureScale:
