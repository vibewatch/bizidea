    rationale: 这个切口可以从专科站点一路扩到 CRO、赞助方和跨适应症的方案设计软件。
topRisks:
  - name: 集成拖慢落地
    description: 专科诊疗平台的 EHR 环境可能很碎片，既拖部署速度，也会拉长见效时间。
    mitigation: 先做最常见的专科 EHR，并在完全打通前提供轻量级 CSV 或报表式接入路径。
  - name: 工作流价值还没被证实
    description: 买方可能不信预筛查提醒真能比多招协调员更明显地提升入组。
    mitigation: 先围绕单一方案卖一个可量化试点，把筛查吞吐、首筛时间和节省的协调员工时绑定成结果指标。
  - name: 现有厂商挤压
    description: 一旦这个切口被验证有价值，现有试验科技厂商或站点网络可能迅速补上类似的患者匹配能力。
    mitigation: 把重心放在心代谢专科深度、最快方案配置能力，以及通用厂商拿不到的跨站点转化基准上。
