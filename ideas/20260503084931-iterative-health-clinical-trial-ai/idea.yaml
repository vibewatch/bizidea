problem: Specialty trial sites in cardiology and obesity still rely on manual chart review, coordinator memory, and generic EHR reports to find eligible patients. That causes slow enrollment, missed sponsor milestones, and underused site capacity even when the right patients are already passing through clinics every day. As more protocols move into cardiometabolic populations, research teams need a workflow that catches eligibility in routine care, not weeks later in spreadsheet follow-up.
targetUser:
  primary: Directors of clinical research at independent cardiology groups and obesity medicine networks running sponsor-funded trials
  secondary: Clinical research coordinators inside multi-site specialty practices
  buyer: VP Research Operations or Chief Operating Officer at a specialty practice platform
startupThesis:
  nonObviousInsight: What changed is that AI recruiting is moving out of narrow academic-site workflows into high-volume specialty practices, where the winning data exhaust is appointment schedules, referral reasons, diagnoses, and medication events rather than broad patient marketplaces. Most teams still treat recruitment as outsourced marketing; the real unlock is turning routine specialty visits into continuously refreshed protocol-specific worklists.
  beachhead: PE-backed U.S. cardiology groups with 20-100 clinics that are adding obesity, heart-failure, or cardiometabolic drug trials and already operate a central research function
  wedge: An EHR-native protocol rules engine that pre-screens upcoming specialty visits, flags eligible patients before appointments, and gives coordinators audit-ready outreach and follow-up queues
  whyNowCatalyst: Iterative Health's financing and move into cardiology and obesity show sponsors and site networks now need specialty-specific recruiting infrastructure fast enough to support new protocol expansion.
  ventureScalePath: Start with sponsor-funded specialty site groups, then expand into CRO feasibility, sponsor enrollment forecasting, and a cross-site data network for protocol design, site selection, and recruitment benchmarking across cardiometabolic indications.
solution: The product connects to the specialty practice's EHR, scheduling feed, and referral intake to run protocol-specific eligibility logic continuously. It creates daily coordinator worklists for pre-visit outreach, in-visit study discussion prompts, and post-visit follow-up with documented inclusion and exclusion reasoning. Research leaders get site-level dashboards showing candidate flow, screen-fail reasons, and protocol bottlenecks by clinic. Over time, the system learns which sites, diagnoses, and visit types convert into enrollments, helping sponsors and site groups choose better studies and open fewer underperforming sites.
goToMarketSeed:
  firstCustomer: A multi-site U.S. cardiology practice platform with a centralized research operations team launching its first obesity or heart-failure trial program
  buyingTrigger: The group signs a new sponsor or CRO study and realizes enrollment targets will be missed if coordinators keep screening charts manually
  currentAlternative: Manual chart review in the EHR, sponsor feasibility spreadsheets, coordinator call lists, and generic patient recruitment vendors
  switchingReason: This wedge finds candidates inside routine specialty workflows before the visit happens, shortens coordinator screening time, and produces cleaner outreach records than ad-driven recruitment or spreadsheet triage
  pricingHypothesis: Annual platform fee per active research site plus a usage tier based on active protocols or enrolled participants
