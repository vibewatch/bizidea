topRisks:
  - name: Integration drag
    description: Specialty practices may have fragmented EHR setups that slow deployment and reduce time-to-value.
    mitigation: Start with the most common specialty EHRs and a light-weight CSV or report-based onboarding path before full integration.
  - name: Workflow proof gap
    description: Buyers may doubt that pre-screening alerts will materially improve enrollment versus adding coordinator headcount.
    mitigation: Sell against a single protocol with a measured pilot tied to screening throughput, first-screen timing, and coordinator hours saved.
  - name: Incumbent squeeze
    description: Existing trial-tech vendors or site networks could add similar patient-matching features once the wedge proves valuable.
    mitigation: Focus on cardiometabolic specialty depth, fastest protocol configuration, and cross-site conversion benchmarks that generic vendors lack.
