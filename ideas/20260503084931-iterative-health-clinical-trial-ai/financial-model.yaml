    y3RevenueImpactK: -120.0
    cashImpactK: -450.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ActiveSites
      ActiveSites --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from active sites growing from 12 at Y1 exit to 50 at Y3 exit at a research-backed $120K annual ARPU per site.
  - checkName: Must go right
    finding: The company must keep pilot-to-production conversion near 60% while reducing protocol setup time enough to preserve the planned 75% gross margin.
  - checkName: Model breaks if
    finding: Cash risk becomes material if sales cycles stretch to about 9 months or lower-automation onboarding pushes ARPU closer to $108K per site.
  - checkName: Next-round proof
    finding: A credible seed case is 36 active sites, repeatable implementation in about two weeks, and the first sponsor or CRO referral motion working before the next raise.
sanityChecks:
  ruleOf40: "Y3 growth 81.3% + EBITDA margin 3.3% = 84.6%"
  burnMultiple: "Y1 burn multiple is about 2.0x and improves to about 0.2x in Y2 as site expansion begins to cover the fixed team."
  revenuePerFte: "About $348K Y3 using 15 exit FTE, which is within a plausible $200-400K vertical SaaS range but only if implementation stays templated."
  flags:
    - "Model counts customers as active revenue-generating research sites rather than parent practice platforms; logo count is only 6-8 by Y3."
    - "The 75% gross-margin assumption is from the business plan target and may prove aggressive if pilots remain implementation-heavy."
    - "Revenue concentration is high because 50 active sites likely sit inside a small number of specialty-platform customers."
    - "Cash flow is modeled as EBITDA only; no debt, capex, or delayed collections are included."
