slug: cardiometabolic-trial-intake
date: '2026-05-03'
executiveSummary: >-
  This company would sell an EHR-native pre-screening and outreach operating system to U.S. multi-site cardiology groups and obesity medicine networks running sponsor-funded cardiometabolic trials. The immediate pain is manual chart review and coordinator spreadsheet triage, which delay first screens, miss eligible patients in routine visits, and waste site capacity. The proposed beachhead is PE-backed cardiology platforms with 20-100 clinics and a centralized research function, especially when they are launching obesity or heart-failure trials and face near-term enrollment risk. The first product should stay narrow: protocol-specific pre-visit worklists, human-reviewed eligibility explanations, and audit-ready outreach tracking tied to live appointments. The go-to-market system is coherent because the same buyer who feels the missed-enrollment risk also controls research operations, can start with one paid pilot, and can expand across clinics once days-to-first-screen and coordinator hours improve. The main competitive advantage is not generic AI matching but cardiometabolic workflow depth inside specialty practice operations, where sponsor platforms and recruitment marketplaces are weaker. Research supports a real but bounded initial market, with an estimated $180M TAM, $42M SAM, and $6M year-3 SOM; expansion into CRO feasibility and sponsor benchmarking is required for larger venture upside. The largest risks are integration drag, unclear budget ownership between sites and sponsors, and the possibility that incumbents bundle similar features before the startup builds a data moat. Exact pricing benchmarks and the true count of research-active cardiology platforms remain incomplete in the source material, so early packaging and sales capacity should be treated as testable operating assumptions rather than facts.
problem:
  - Specialty cardiology and obesity trial sites still depend on manual chart review, coordinator memory, and generic EHR reports, so eligible patients are missed during routine care.
  - Slow enrollment delays sponsor milestones, increases coordinator labor, and leaves multi-site specialty platforms with underused research capacity even when patient volume is already present.
solution:
  - Connect to the practice EHR, scheduling feed, and referral intake to run protocol-specific eligibility logic before upcoming visits.
  - Generate coordinator worklists for pre-visit outreach, in-visit study discussion prompts, and post-visit follow-up with documented inclusion and exclusion reasoning.
  - Give research leaders site-level dashboards on candidate flow, screen-fail reasons, and visit-to-screen conversion so they can adjust staffing and protocol mix.
whyWeWin:
  - The product starts at the site-operations layer, where upcoming appointments and coordinator actions determine whether a matched patient ever gets screened.
  - Cardiometabolic specialty depth should yield better protocol templates, lower false positives, and more useful conversion benchmarks than horizontal recruitment tools.
  - A reusable protocol-rule library plus cross-site data on referral leakage and screen-fail patterns can become a defensible moat if setup time and proof of ROI improve each quarter.
strategicChoices:
  beachhead: PE-backed U.S. cardiology practice platforms with 20-100 clinics, centralized research operations, and new obesity, heart-failure, or broader cardiometabolic protocols.
  wedgeRationale: Selling one protocol-specific pre-visit screening workflow into an existing specialty network creates faster proof than selling a full CTMS or sponsor analytics suite because the pain is immediate, the workflow is owned by one team, and value can be measured within a study cycle.
  sequencingRationale: The company should first prove integration-light pilots and coordinator throughput gains on one protocol, then expand to multi-protocol site subscriptions, and only after repeated production wins build CRO feasibility, sponsor forecasting, and cross-site benchmarking products.
  notYet:
    - Broad external patient-acquisition marketplace or consumer trial matching.
    - Full CTMS, EDC, or end-to-end sponsor operations platform.
    - International expansion before a U.S. specialty-platform playbook and interoperability template exist.
market:
  tam: $180M estimated U.S. cardiometabolic specialty-clinic software opportunity at roughly 1,500 research-capable units and about $120k annual ACV.
  sam: $42M estimated beachhead across roughly 350 clinics in centralized cardiology groups and adjacent obesity programs that can standardize research operations.
  som: $6M year-3 reachable case based on about 50 active clinics across 6-8 customers after phased clinic rollout and protocol expansion.
  segments:
    - Research-active multi-site cardiology practice platforms with centralized research operations
    - Obesity medicine networks and specialty site groups adding cardiometabolic protocols
  buyingProcess: Research operations leadership usually owns the problem, but buying also requires clinic IT, compliance, and principal-investigator comfort because patient identification and outreach need auditable workflow control. The most credible entry is a paid pilot tied to one live study and one operating KPI such as days-to-first-screen or coordinator hours saved.
product:
  mvp: The MVP should support one or two cardiometabolic protocols, ingest appointments plus a minimal clinical data feed, produce daily pre-visit worklists, and log human-reviewed outreach and exclusion reasons. It should avoid autonomous outreach and instead optimize coordinator execution with audit-ready records.
  sixMonth: Land two design-partner pilots on the top one or two target EHR/reporting environments, deliver protocol setup in under two weeks, and show measurable reduction in manual chart-review time and days-to-first-screen.
  twelveMonth: Support multi-protocol rollouts across 3-5 clinics per customer, add site-manager dashboards on screen-fail reasons and queue performance, and productize a repeatable implementation path for the first common EHR stack.
  twentyFourMonth: Expand to multi-clinic deployments across 6-8 specialty platforms, add sponsor/CRO-facing enrollment forecasting and benchmark reporting, and use aggregated cardiometabolic conversion data to improve study selection and protocol design support.
  keyBets:
    - A minimal feed of appointments, diagnoses, medications, and referral context is enough to create a useful pre-visit queue.
    - Research coordinators will adopt a new workflow if it is embedded in daily appointment review and saves time on a live protocol.
    - Protocol translation can be standardized enough to keep gross margin above services-heavy implementation models.
    - Cardiometabolic specialty depth will matter more in buying and retention than a broader but shallower recruitment platform story.
gtm:
  wedge: Sell a paid pilot to a multi-site cardiology platform that has just signed a new obesity or heart-failure study and is worried manual screening will miss enrollment targets.
  channels:
    - Founder-led outbound to VP or Director of Research Operations and specialty-platform COOs
    - Sponsor and CRO referrals tied to sites opening new cardiometabolic studies
    - Specialty research conferences and targeted operator roundtables
    - Interoperability and EHR implementation partners that improve deployment credibility
  funnelTargets: Target account to discovery meeting 25%+, discovery to paid pilot 20%+, paid pilot to annual production contract 60%+, and production customer to additional clinic or protocol expansion 70%+ within 12 months.
  pricing: Paid pilot for one live protocol and limited clinics, converting to an annual subscription priced per active research site with protocol-volume tiers; this matches how buyers feel enrollment risk and keeps expansion aligned with operational usage rather than speculative AI seats.
businessModel:
  revenueStreams:
    - Paid implementation and pilot fees for initial protocol deployment
    - Annual SaaS subscription per active research site
    - Protocol onboarding or configuration fees for new studies
    - Benchmarking and forecasting add-ons for sponsors, CROs, or larger site networks later
  unitOfValue: Active research site with live cardiometabolic protocols, expanded by number of supported protocols.
  targetGrossMarginPct: 75
  expansionLevers:
    - Add protocols within the same customer after pilot proof
    - Roll out from the first clinics to the rest of the platform
    - Sell sponsor or CRO reporting modules once cross-site data is credible
    - Extend from cardiology into adjacent obesity and metabolic trial workflows
strategyMap:
  northStarMetric: Screened patients generated from routine specialty visits per active site-month.
  inputMetrics:
    - Days from site activation to first screened patient
    - Coordinator chart-review hours per enrolled patient
    - Percentage of flagged patients reviewed before the visit
    - Pilot-to-production conversion rate
    - Protocol setup time
  moatsToBuild:
    - Reusable cardiometabolic protocol-rule library with declining setup time
    - Cross-site benchmarks on referral leakage, screen-fail reasons, and visit-to-screen conversion
    - Deep integrations and workflow trust within the most common specialty-platform EHR environments
  killCriteria:
    - Fewer than 2 of the first 5 pilots reach production within 12 months
    - Median protocol setup time stays above 4 weeks after 3 implementations
    - Pilots fail to improve days-to-first-screen or coordinator time by at least 20% versus baseline
  mermaid: |
    flowchart LR
      Wedge[New obesity or heart-failure study at multi-site cardiology group] --> MVP[Pre-visit protocol worklists and outreach logging]
      MVP --> Proof[Shorter days-to-first-screen and lower coordinator screening time]
      Proof --> Expansion[More clinics and more protocols per customer]
      Expansion --> Moat[Cross-site cardiometabolic benchmark data]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Clear workflow wedge in a validated pain category, but conviction depends on proving integration-light deployment and budget ownership quickly.
    whyBelieve: Research shows real enrollment pain, active capital formation, and a credible gap between sponsor-first platforms and the coordinator workflow where conversion is won or lost.
    whyDoubt: The initial market is concentrated and implementation-heavy, so the company could stall if pilots behave like bespoke services or if incumbents bundle similar features.
    nextDiligence: Validate three target accounts, their active protocol volume, and whether one paid pilot can improve days-to-first-screen enough to convert into a multi-site annual contract.
  firstCustomer:
    title: VP Research Operations at a PE-backed cardiology practice platform
    profile: U.S. specialty group with centralized research ops, 20-100 clinics, and a new obesity or heart-failure trial program that relies on coordinators screening routine visits.
    trigger: The group signs a new sponsor or CRO study and sees that manual chart review will likely miss enrollment targets within the first weeks of activation.
    buyer: VP or Director of Research Operations, sometimes with COO sponsorship
    initialContract: $40k-$75k paid pilot across 3-5 clinics and one live protocol, converting to roughly $120k-$180k annual subscription as more clinics and protocols go live.
  mustBeTrue:
    - At least 20 priority target accounts in the U.S. have enough live cardiometabolic protocol volume to justify a dedicated intake product.
    - A minimal appointment plus clinical data feed can produce a usable pre-visit worklist without a full bespoke EHR integration.
    - Buyers will pay from research operations or sponsor pass-through budget before waiting for a full sponsor-led procurement process.
    - Coordinators and investigators will trust human-reviewed recommendations enough to use the workflow on live studies.
    - The company can achieve repeatable pilot-to-production conversion before incumbents or services firms close the workflow gap.
  diligenceQuestions:
    - Which two EHR or scheduling environments dominate the first 20 target accounts, and what data is actually accessible pre-visit?
    - What KPI has historically unlocked budget for research-operations tooling at specialty practices?
    - How many active obesity, heart-failure, or broader cardiometabolic protocols does the average target platform run per year?
    - What compliance constraints govern study-related outreach before explicit study consent at target sites?
    - How often do sponsors or CROs influence or subsidize technology selection for site-level recruiting workflows?
  riskHeatmap:
    - risk: Integration takes too long or requires site-specific custom work.
      likelihood: High
      impact: High
      leadingIndicator: First three pilots require more than six weeks to produce stable pre-visit worklists.
      mitigation: Start with the most common specialty EHRs, allow CSV or report-based onboarding for pilots, and standardize mappings around one protocol at a time.
    - risk: Buyers prefer adding coordinators or using existing vendors instead of a new workflow tool.
      likelihood: Medium
      impact: High
      leadingIndicator: Discovery calls praise the product but refuse paid pilots unless sponsors pay in full.
      mitigation: Tie pilots to a live study, quantify coordinator hours saved and days-to-first-screen, and package pricing against missed-enrollment risk.
    - risk: Incumbent trial-tech vendors or site networks add similar matching features.
      likelihood: Medium
      impact: Medium
      leadingIndicator: Competitive deals increasingly collapse because buyers say their current CTMS or recruitment vendor can now handle pre-visit matching.
      mitigation: Move faster on cardiometabolic protocol depth, workflow UX, and cross-site conversion benchmarks that horizontal vendors lack.
    - risk: Compliance concerns limit outreach or reduce trust in algorithmic recommendations.
      likelihood: Medium
      impact: High
      leadingIndicator: Pilot sites require extensive manual review and block outreach workflows even when candidates are flagged accurately.
      mitigation: Keep a human-in-the-loop design, make exclusion reasoning explicit, and align logs to investigator oversight and GCP-style audit expectations.
operatingAssumptions:
  - assumption: The first two target EHR environments can expose appointments, diagnoses, medications, and referral context without a long enterprise integration project.
    basis: research.yaml
    validationTest: Run integration discovery with five target accounts and ingest one sample data feed into a working pre-visit rules prototype within 45 days.
    decisionImpact: If false, narrow the ICP to report-friendly sites, reduce near-term pricing, and delay hiring for sponsor analytics.
  - assumption: A paid pilot tied to one live study is a sellable contract shape for the initial buyer.
    basis: operator judgment
    validationTest: Secure at least three letters of intent or paid design-partner agreements using a pilot package before building multi-protocol expansion features.
    decisionImpact: If false, redesign pricing around annual subscriptions only or pursue sponsor/CRO pull-through earlier.
  - assumption: Days-to-first-screen and coordinator hours saved are the most persuasive ROI metrics for the beachhead buyer.
    basis: research.yaml
    validationTest: In ten customer interviews, ask buyers to rank budget-driving KPIs and require one pilot baseline study to measure both metrics.
    decisionImpact: If false, reorient product analytics and pricing toward enrollment attainment, screen-pass rate, or sponsor reporting.
  - assumption: Cardiometabolic protocol depth will create a real win-rate advantage over horizontal recruitment tools.
    basis: idea.yaml
    validationTest: Track competitive evaluations in the first five deals and test whether specialty-specific templates reduce setup time or false positives by at least 25%.
    decisionImpact: If false, broaden positioning earlier or partner rather than compete head-on with larger trial-tech suites.
  - assumption: The year-3 reachable footprint of 6-8 customers and 50 clinics is realistic without becoming a services-heavy implementation business.
    basis: research.yaml
    validationTest: Measure average implementation hours, gross margin by deployment, and expansion cycle time after the first three production customers.
    decisionImpact: If false, reset fundraising needs, increase services pricing, or narrow the product scope to a lighter-weight coordinator tool.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Build a 20-account target list of PE-backed cardiology and obesity groups with centralized research operations and active cardiometabolic studies.
    hypothesis: The beachhead is large enough and concentrated enough to support focused outbound rather than broad market education.
    successMetric: 20 qualified target accounts with named buyers, current protocols, and likely buying trigger documented.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run five integration discovery sessions and prototype a worklist from one real appointment or report extract.
    hypothesis: A useful pilot can launch from minimal feeds before full SMART or FHIR integration.
    successMetric: One functioning prototype that surfaces protocol-matched visits with acceptable review quality in under 45 days.
    owner: Founding eng
  - horizon: 0–90 days
    experiment: Conduct ten buyer interviews on pilot packaging, KPI priorities, and compliance requirements for outreach.
    hypothesis: Research-ops leaders will buy a paid pilot if ROI is tied to one live study and investigator review remains explicit.
    successMetric: At least three interviewees confirm willingness to run a paid pilot and agree on one primary success KPI.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Launch two paid pilots on one obesity or heart-failure protocol each and compare against manual baseline workflows.
    hypothesis: The product can reduce chart-review labor and accelerate first screens enough to earn annual production contracts.
    successMetric: At least 20% improvement in days-to-first-screen or coordinator hours saved in both pilots.
    owner: Customer success lead
  - horizon: 180–270 days
    experiment: Productize protocol configuration templates and implementation playbooks for the first common EHR environment.
    hypothesis: Setup can become repeatable enough to support software-like gross margins.
    successMetric: Median protocol setup time drops below two weeks by the third production deployment.
    owner: Clinical informatics lead
  - horizon: 270–450 days
    experiment: Test one sponsor or CRO referral partnership tied to a customer's new protocol launch.
    hypothesis: Upstream referral partners can shorten sales cycles and improve pilot close rates without forcing a sponsor-first roadmap too early.
    successMetric: One referred opportunity reaches paid pilot in less than 90 days from introduction.
    owner: Founder CEO
operations:
  - Maintain a human-in-the-loop protocol translation process with version control and audit logs for every eligibility rule change.
  - Standardize onboarding around one protocol, one data feed, and one success metric per pilot before expanding scope.
  - Use a lightweight implementation stack that supports CSV onboarding first and SMART or FHIR integration second.
  - Establish regular enrollment review cadences with customers to compare flagged candidates, screens, and exclusions against baseline workflow.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Needed to build the first data-ingestion, rules, and workflow product while keeping implementation learnings close to product decisions.
  - role: Clinical informatics lead
    startTiming: Month 0-3
    rationale: Critical for translating protocol criteria into auditable logic and reducing the risk that deployments become bespoke services.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Founder-led sales and customer discovery are required because the early buyer pool is concentrated and product scope depends on direct workflow learning.
  - role: Customer success and implementation lead
    startTiming: Month 6
    rationale: Needed once the first pilots convert so deployment quality and expansion do not bottleneck on the founding team.
  - role: GTM operator or account executive
    startTiming: Month 9-12
    rationale: Add only after the pilot playbook, pricing, and ICP are proven enough to support repeatable outbound.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 2-3 paid design-partner pilots in the target beachhead.
      - Prove at least 20% improvement in days-to-first-screen or coordinator hours saved on live studies.
      - Standardize the first implementation path for one common specialty EHR or report-based workflow.
      - Convert at least two pilots into annual production contracts.
  - horizon: 12–24 months
    items:
      - Expand production customers to 6-8 specialty platforms and roughly 50 active clinics.
      - Support multi-protocol deployments and manager dashboards for queue performance and screen-fail analytics.
      - Launch the first sponsor or CRO referral channel with a repeatable co-sell motion.
  - horizon: 24–36 months
    items:
      - Add sponsor-facing forecasting and benchmarking products built on cross-site cardiometabolic conversion data.
      - Extend from cardiology into adjacent obesity and metabolic specialties where workflow signals remain similar.
      - Reach a scale where implementation is mostly template-driven rather than founder-led.
risks:
  - risk: Integration variability across specialty EHRs and scheduling systems slows deployment and pushes the company into custom services.
    likelihood: High
    impact: High
    mitigation: Constrain the first year to the most common workflows, allow phased CSV onboarding, and refuse deeply bespoke pilots.
  - risk: Buyers do not see enough ROI to replace manual coordinator screening or current recruitment vendors.
    likelihood: Medium
    impact: High
    mitigation: Sell against one live protocol, baseline the manual process, and require success metrics that map directly to budget and enrollment risk.
  - risk: Compliance or investigator concerns prevent timely outreach and reduce adoption of algorithmic recommendations.
    likelihood: Medium
    impact: High
    mitigation: Keep human review mandatory, expose rule logic and exclusion reasoning, and align product logging to audit expectations.
  - risk: Horizontal incumbents or community-site networks add overlapping functionality before the startup establishes a specialty-data moat.
    likelihood: Medium
    impact: Medium
    mitigation: Stay narrow on cardiometabolic specialty depth, ship faster protocol templates, and turn cross-site performance data into differentiated benchmarks.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months to validate the beachhead, build the first repeatable integration and protocol-config playbook, convert pilots into production contracts, and reach enough clinic footprint to test sponsor or CRO pull-through without overbuilding a broad trial-tech suite.
