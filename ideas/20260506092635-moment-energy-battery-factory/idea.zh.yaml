problem: GPU 机柜托管运营商签下 AI 客户的速度，已经快过公用事业公司交付新增电力容量的速度。二次寿命 EV 电池看起来很适合做削峰和备电，但项目总会卡在电池包质量不确定、安全尽调，以及缺少可融资的性能模型上。现在这套工作仍散落在 EPC 表格、实验室测试和定制工程研究里，结果就是即便经济性有吸引力，再利用电池也依旧显得风险很高。
targetUser:
  primary: 北美 1-10 MW GPU 机柜托管运营商的基础设施副总裁或能源负责人
  secondary: 负责受限数据中心站点储能设计与报批的微电网 EPC 负责人
  buyer: 基础设施副总裁、COO 或数据中心开发负责人
startupThesis:
  nonObviousInsight: 真正的解锁点不是把回收做得更好，而是工厂级二次寿命电池供给与 AI 驱动的电力稀缺，终于叠出足够体量，可以把健康评分、质保和调度标准化。一旦再利用电池包能像资产一样被承保，而不是被当成废旧物料处理，它就会成为受限站点追加兆瓦数最快的路径。
  beachhead: 面向北美 1-10 MW GPU 机柜托管站点的表后削峰与备电项目，这类站点的公用事业升级通常会延后 12 个月以上。
  wedge: 一层二次寿命电池承保与运行时软件，负责认证电池批次、生成保险方 / AHJ 可接受的安全资料包，并针对数据中心负载曲线优化调度。
  whyNowCatalyst: Moment 的新融资和工厂扩建，加上市场明确把焦点放在 AI 数据中心的电力瓶颈上，说明再利用 EV 电池正好在数据中心急需非电网容量的时候开始可得。
  ventureScalePath: 先从 GPU 机柜托管改造项目切入，再把同一套承保、合规与调度系统扩展到 EV 充电场站、工业园区，以及需要可信性能数据的大规模二次寿命储能金融合作方。
solution: 打造一层软件，把来源杂、状态不一的退役 EV 电池库存，变成受限数据中心站点可融资、可运营的电力系统。产品从二次寿命工厂接入电池健康和溯源数据，按具体工况给每个批次打分，并生成目前仍需人工拼装的报批、保险和贷款材料。部署后，系统继续负责削峰、短时穿越和有限备电的调度，同时持续跟踪衰减表现与最初承保假设之间的偏差。长期看，公司会积累起业内最好的数据集，知道不同再利用电池批次在真实 AI 负载模式下到底表现如何，从而推出竞争对手无法有把握定价的质保与融资产品。
goToMarketSeed:
  firstCustomer: 一家正在为新 1-10 MW AI 租户上线，但公用事业增容尚未完成的北美 GPU 机柜托管运营商。
  buyingTrigger: 已签署的 AI 容量租约，或公用事业并网延迟，使站点若不能快速补上临时或表后电力容量，就会面临收入风险。
  currentAlternative: 采购全新锂电 BESS 并配套定制 EPC 研究，或者一边等待电网升级、一边用柴油机过渡保底。
  switchingReason: 这套切口让二次寿命电池项目比定制方案更容易拿到许可、保险和稳定运行，而且通常比为临时电力缺口采购全新储能更快、更便宜。
  pricingHypothesis: 前期按项目收取承保费用，后续按已部署 MWh 收取年度软件订阅费，并可叠加性能担保或共享收益模块。
