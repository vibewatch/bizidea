topRisks:
- name: 安全与报批拖慢推进
  description: 主管部门、保险方或客户，可能会把二次寿命电池视为不适合关键基础设施站点的高风险方案。
  mitigation: 先从削峰和短时穿越场景起步，而不是一上来就承诺完整备电，并交付由第三方测试合作方背书的标准化 AHJ 与保险文档。
- name: 电池供给不稳定
  description: 退役 EV 电池批次在化学体系、健康状况和溯源质量上可能差异过大，难以做重复部署。
  mitigation: 早期只支持少数批次，直接接入工厂级测试数据，只承保那些落在已验证工况范围内的项目。
- name: 硬件厂商补齐软件缺口
  description: 全新电池 BESS 厂商或二次寿命制造商，可能自己做出基础软件，把公司从项目里挤出去。
  mitigation: 掌握跨供应商的承保数据集和融资级分析层，并与硬件提供商合作，而不是在硬件上正面竞争。
