- job: 当 EPC 希望在受限站点使用梯次利用电池时，帮助项目团队证明其安全性与性能，以便获得许可、保险和内部批准。
  currentAlternative: 手工工程研究、实验室测试，以及一次性文档材料包。
  successMetric: 获得许可批准的时间，以及成功进入投运的项目占比。
