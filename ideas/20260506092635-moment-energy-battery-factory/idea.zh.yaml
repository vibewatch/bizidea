differentiator: 大多数能源管理软件默认面对的是全新、均质的电池包；大多数二次寿命玩家卖的是硬件或项目集成。这家公司卡住了最难、也最少人做的中间层：专为再利用电池打造的批次级承保、安全文档和运行时优化，服务于高价值、受电力约束的场景。它的护城河，是一套持续扩大的性能数据集，把电池溯源、工况、衰减和项目结果连起来，并进一步变成质保和融资审批的基础。
