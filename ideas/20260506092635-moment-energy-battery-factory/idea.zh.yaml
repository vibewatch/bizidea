problem: GPU 托管运营商签下 AI 客户的速度，正快于公用事业新增供电能力的交付速度。梯次利用 EV 电池看起来很适合用于削峰和备用，但几乎每个项目都会卡在电池包质量不确定性、安全尽调以及缺乏可融资性能模型上。如今相关工作仍被拆散在 EPC 表格、实验室测试和定制工程研究中，即使经济性很有吸引力，再利用电池也仍显得风险过高。
targetUser:
  primary: 北美 1-10 MW GPU 托管运营商的基础设施副总裁或能源负责人
  secondary: 负责受限数据中心站点储能设计与许可的小电网 EPC 负责人
  buyer: 基础设施副总裁、COO 或数据中心开发负责人
startupThesis:
  nonObviousInsight: 真正的解锁点不是更好的回收，而是工厂级梯次利用电池供给与 AI 驱动的电力稀缺，如今共同创造出足够大的规模，足以把健康评分、保修和调度标准化。一旦再利用电池包可以像资产一样被承保评估，而不是被当作废料处理，它们就会成为受限站点增加兆瓦容量的最快路径。
  beachhead: 面向北美 1-10 MW GPU 托管站点的表后削峰与备用项目，这些站点的公用事业升级已延迟 12 个月以上。
  wedge: 一个面向梯次利用电池的承保评估与运行时层：认证电池包批次、生成保险方/AHJ 可接受的安全材料，并针对数据中心负载曲线优化调度。
  whyNowCatalyst: Moment 的新融资与工厂扩建，再加上围绕 AI 数据中心电力瓶颈的明确叙事，说明再利用 EV 电池正好在数据中心急需非电网容量的时点上开始可获得。
  ventureScalePath: 先从 GPU 托管改造项目切入，再将同一套承保评估、合规与调度系统扩展到 EV 充电场站、工业园区，以及需要跨大规模梯次利用储能资产获取可信性能数据的融资伙伴。
solution: 打造一个软件层，把异质化的退役 EV 电池库存转化为适用于受限数据中心站点、可融资且可运营的电力系统。产品接入来自梯次利用工厂的电池健康状态与溯源数据，针对特定工况为每个批次评分，并生成目前仍需人工拼装的许可、保险方和贷款方文档。部署后，系统负责削峰、穿越与有限备用的调度，同时持续跟踪相对于原始承保评估假设的衰减情况。随着时间推移，公司将积累关于再利用电池批次在真实 AI 负载模式下表现的最佳数据集，从而推出竞争对手无法有把握定价的保修与融资产品。
goToMarketSeed:
  firstCustomer: 一家北美 GPU 托管运营商，在公用事业服务升级完成前就要让新的 1-10 MW AI 租户上线。
  buyingTrigger: 已签署的 AI 容量租约，或公用事业并网延迟，使站点收入面临风险，除非其能迅速增加临时或表后电力容量。
  currentAlternative: 采购新的锂离子 BESS 供应商并配套定制 EPC 研究，或等待电网升级并用柴油提供过渡期韧性。
  switchingReason: 这一切口让梯次利用电池比定制项目更容易获批、投保和运营，同时通常比为临时电力缺口购买全新储能更快且更便宜。
  pricingHypothesis: 按项目收取前期承保评估费，另加按已部署 MWh 计价的年度软件订阅，并提供可选的性能保证或共享节省增值项。
