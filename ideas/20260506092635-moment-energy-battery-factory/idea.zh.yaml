jobsToBeDone:
- job: 当新的 AI 租户签约时，如果公用事业容量还没准备好，帮助数据中心基础设施团队快速搭起安全的临时储能方案，让他们尽早开始产生收入的算力交付。
  currentAlternative: 等待公用事业升级，或委托一个定制化的全新电池微电网项目。
  successMetric: 避免了多少个月的公用事业延迟暴露，以及按时交付了多少增量 MW。
- job: 当 EPC 想在受限站点使用二次寿命电池时，帮助项目团队证明安全与性能，让他们拿到许可、保险和内部审批。
  currentAlternative: 人工工程研究、实验室测试以及一次性的文档包。
  successMetric: 获得许可批准所需时间，以及能够完成调试的项目比例。
