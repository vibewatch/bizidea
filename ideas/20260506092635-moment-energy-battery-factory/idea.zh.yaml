differentiator: 大多数能源管理软件默认面对的是全新、均质的电池包；大多数二次寿命玩家卖的则是硬件或项目集成。这家公司咬住的是最难、也最少人愿意做的中间层：专为再利用电池设计的批次级承保、安全文档和运行时优化，服务的是高价值、又受电力约束的场景。它的护城河是一套不断变厚的性能数据集，把电池溯源、工况、衰减和项目结果串起来，再反过来支撑质保和融资审批。
