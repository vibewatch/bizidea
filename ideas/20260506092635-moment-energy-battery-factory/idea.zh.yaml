topRisks:
- name: 安全与审批拖延
  description: 监管机构、保险方或客户可能认为梯次利用电池对关键基础设施站点来说风险过高。
  mitigation: 先从削峰和穿越场景切入，而非全备用，并交付由第三方测试伙伴支持的标准化 AHJ 与保险材料。
- name: 电池供给不稳定
  description: 退役 EV 电池批次在化学体系、健康状态和溯源方面可能差异过大，不利于可重复部署。
  mitigation: 早期限制支持的批次，直接接入工厂级测试数据，并只对符合已验证工况的项目进行承保评估。
- name: 硬件厂商补齐差距
  description: 新电池 BESS 供应商或梯次利用制造商可能会补齐基础软件能力，从而把公司挤出项目。
  mitigation: 掌握跨供应商承保评估数据集和融资级分析层，并与硬件提供商合作，而不是在硬件本体上竞争。
