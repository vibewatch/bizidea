reportMemo:
  executiveTakeaways:
  - 'Supply-side proof is now real: Moment says its Series B took total funding above $100M and its DOE-backed U.S. factory plan targets 1 GWh of repurposed storage, so second-life batteries are moving from pilot rhetoric toward industrial supply [2,4].'
  - 'The bottleneck is bankability, not chemistry alone: certification, safety review, and battery-valuation data keep showing up as gating issues before reused packs can be financed or permitted at critical-load sites [6,8,9,24,31].'
  - AI and data-center power scarcity make the beachhead unusually urgent; primary and independent sources now frame batteries as part of the answer to constrained data-center growth [1,3,29,30,31,32,35].
  - Competition is real but fragmented between hardware-led second-life vendors and easier-to-insure first-life or diesel substitutes, leaving room for a neutral underwriting and evidence layer [2,8,19,21,27].
  - Willingness to pay should come from avoided delay, diesel substitution, and demand-charge relief rather than from a generic sustainability budget [7,12,14].
  - The beachhead SAM is likely in the tens of millions rather than billions, so venture-scale upside depends on expanding the same control plane into fleets, industrial campuses, and financing/warranty partners [9,10,11,14,35].
  marketDefinition: North American software control layer for second-life battery energy storage deployed behind the meter at power-constrained sites, with a beachhead in 1-10 MW AI/GPU colocation and adjacent microgrid projects. The category includes battery cohort scoring, safety and insurer/AHJ evidence packs, and dispatch/monitoring software for reused EV packs; it excludes battery manufacturing, recycling-only services, generic EMS for homogeneous new batteries, and utility-scale merchant storage [2,3,13,17,18,35].
  customerAndBuyer: The ICP is a North American data-center operator or microgrid EPC facing a signed compute customer and a delayed utility upgrade. The daily user is the infrastructure/energy team and project EPC; the economic buyer is likely the VP Infrastructure, COO, or development head because the spend sits inside capacity delivery and resilience rather than a sustainability budget. Procurement friction comes from insurer, fire-code, and engineering review as much as from software security [1,2,14,31,32,35,36].
  buyingTriggers:
  - point: A signed AI or colocation contract lands before utility capacity is available, putting revenue timing at risk.
    sourceRefs:
    - 1
    - 2
    - 35
  - point: The buyer needs a faster alternative to diesel or wants to shave expensive peaks while waiting for grid reinforcement.
    sourceRefs:
    - 7
    - 12
    - 14
  - point: A project team wants to use reused batteries but gets blocked by insurer, AHJ, or internal safety review requests.
    sourceRefs:
    - 6
    - 8
    - 31
  willingnessToPay:
    summary: 'Willingness to pay is strongest when the product attaches to an already-justified infrastructure spend: peak shaving, diesel replacement, or financed battery projects. Fetched evidence shows buyers already accept leasing and Battery-as-a-Service structures and value avoided demand charges and resilience benefits, which supports a workflow-plus-runtime software layer sold into the same project budget [7,12,13,14].'
    sourceRefs:
    - 7
    - 12
    - 13
    - 14
  competitiveLandscape: Competition splits into hardware-led second-life vendors (Moment, Connected Energy, B2U, Smartville, RePurpose), first-life BESS substitutes, and the default of waiting for grid upgrades or using diesel. Most current players make money by supplying systems or battery inventory; fewer are neutral across suppliers, and fewer still specialize in insurer/AHJ-ready underwriting for critical-load sites [2,8,17,18,19,21,27,29].
  incumbentThesis:
  - incumbentClass: New-battery BESS vendors
    point: First-life BESS vendors are easier to insure because their packs are homogeneous, but their default motion is to sell hardware capacity, not to build a neutral underwriting layer that makes heterogeneous reused packs bankable across multiple suppliers.
    sourceRefs:
    - 12
    - 24
    - 27
    - 29
  - incumbentClass: Second-life hardware vendors
    point: Moment, Connected Energy, B2U, and Smartville prove the category exists, but they are economically pushed toward selling their own systems or inventory; that leaves room for software that is supplier-neutral and optimized for documentation, insurance, and runtime evidence rather than metal.
    sourceRefs:
    - 2
    - 8
    - 19
    - 21
  - incumbentClass: Generic energy software and in-house builds
    point: Horizontal EMS or internal tooling can dispatch batteries, but they do not come with repurposing-process credibility, battery valuation logic, or ready-made safety packages for reused EV packs in high-scrutiny facilities.
    sourceRefs:
    - 6
    - 9
    - 13
    - 33
  - incumbentClass: Wait-for-grid and diesel substitutes
    point: The status quo often wins because it is familiar, not because it is superior. Battery systems that bridge grid delays or replace diesel become attractive when lost revenue, emissions, and operating complexity are explicit enough to justify a faster alternative.
    sourceRefs:
    - 10
    - 12
    - 35
  regulatoryLandscape: 'Bankability depends on a stack that is unusually unforgiving for reused batteries: repurposing-process credibility, fire-code scrutiny for lithium-ion systems in dense data centers, and safe end-of-life handling rules. These requirements help the startup if it productizes the documentation burden, but they also slow sales and make shallow software insufficient [6,24,31,32,33,34].'
  technologyLandscape: 'Second-life deployments are becoming more data-driven: vendors now emphasize battery telemetry, state-of-health modeling, and cloud EMS to automate dispatch and financing, while trade coverage shows certification and module-versus-pack selection remain live technical differentiators. The durable software layer is likely the one that converts heterogeneous pack data into repeatable duty-cycle recommendations and live performance traces [6,8,9,13,21,24].'
  distributionChannels:
  - point: Direct sales into infrastructure and energy teams are the clearest entry because the product unlocks capacity-delivery timelines that are already executive priorities.
    sourceRefs:
    - 1
    - 2
    - 35
  - point: Microgrid EPCs, switchgear integrators, and battery-system suppliers are critical channel partners because runtime controls and documentation need to sit inside real projects rather than replace them.
    sourceRefs:
