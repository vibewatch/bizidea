  sensitivityCases:
  - case: Critical-load buyers insist on first-life batteries
    impact: If data-center buyers refuse reused packs for anything beyond low-risk peak shaving, conversion slows and the startup is pushed toward softer industrial or fleet use cases first.
    sourceRefs:
    - 27
