openQuestions:
- What exact documentation set convinces a North American data-center insurer and AHJ to approve reused batteries without bespoke testing for every project?
- How many 1-10 MW GPU colo or edge-AI projects will actually buy behind-the-meter storage before utility upgrades arrive?
- Can the startup get non-exclusive access to battery provenance and telemetry across multiple second-life suppliers?
- Will buyers accept a standalone underwriting software line item, or must the product be bundled into battery-project economics and financing?
