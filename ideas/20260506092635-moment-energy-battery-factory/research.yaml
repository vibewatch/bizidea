    - 35
  validationPlan:
  - priority: high
    question: What minimum evidence package makes a reused-battery project acceptable to a data-center insurer, AHJ, and owner engineer?
    evidenceToGather: Three to five live project document checklists plus interviews with one fire-protection engineer, one insurer, and two EPCs.
  - priority: high
    question: How many 1-10 MW colocation or edge-AI sites will buy temporary or behind-the-meter storage instead of waiting for utility upgrades?
    evidenceToGather: Pipeline review with five colocation operators or microgrid EPCs, including project size, delay duration, and stopgap power choice.
  - priority: medium
    question: Can the startup obtain battery provenance and telemetry feeds from multiple second-life suppliers on commercially workable terms?
    evidenceToGather: Supplier interviews, sample data schemas, and one pilot integration with a repurposing factory or OEM battery owner.
  - priority: medium
    question: Will buyers pay separately for underwriting software, or only when bundled into a battery project?
    evidenceToGather: Price testing with EPCs, battery vendors, and infrastructure buyers using three packaging options.
