jobsToBeDone:
- job: When a new AI tenant signs before utility capacity is ready, help the data-center infrastructure team stand up safe interim storage so they can start revenue-generating compute sooner.
  currentAlternative: Wait for utility upgrades or commission a bespoke new-battery microgrid project.
  successMetric: Months of utility-delay exposure avoided and incremental MW delivered on time.
- job: When an EPC wants to use second-life batteries on a constrained site, help the project team prove safety and performance so they can get permits, insurance, and internal approval.
  currentAlternative: Manual engineering studies, lab testing, and one-off documentation packages.
  successMetric: Time to permit approval and percentage of projects that reach commissioning.
