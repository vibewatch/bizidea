problem: GPU colocation operators are signing AI customers faster than utilities can deliver new capacity. Second-life EV batteries look attractive for peak shaving and backup, but every project stalls on pack-quality uncertainty, safety diligence, and lack of a bankable performance model. Today the work is pieced together across EPC spreadsheets, lab tests, and bespoke engineering studies, which makes reused batteries feel risky even when the economics are compelling.
targetUser:
  primary: VP Infrastructure or Head of Energy at a North American 1-10 MW GPU colocation operator
  secondary: Microgrid EPC lead responsible for storage design and permitting on constrained data-center sites
  buyer: VP Infrastructure, COO, or Head of Data Center Development
startupThesis:
  nonObviousInsight: The unlock is not better recycling; it is that factory-scale second-life battery supply and AI-driven power scarcity now create enough volume to standardize health scoring, warranty, and dispatch. Once reused packs can be underwritten like an asset instead of treated like salvage, they become the fastest path to incremental megawatts on constrained sites.
  beachhead: Behind-the-meter peak-shaving and backup projects for North American 1-10 MW GPU colocation sites whose utility upgrades are delayed 12+ months.
  wedge: A second-life battery underwriting and runtime layer that certifies pack cohorts, generates insurer/AHJ-ready safety packages, and optimizes dispatch against data-center load profiles.
  whyNowCatalyst: Moment's new funding and factory buildout, combined with explicit framing around AI data-center power bottlenecks, suggest reused EV batteries are becoming available at the exact moment data centers need non-grid capacity fast.
  ventureScalePath: Start with GPU colo retrofit projects, then expand the same underwriting, compliance, and dispatch system to EV charging depots, industrial campuses, and financing partners that need trusted performance data across large fleets of second-life storage assets.
solution: Build a software layer that turns heterogeneous used EV battery inventory into a financeable, operable power system for constrained data-center sites. The product ingests battery health and provenance data from second-life factories, scores each cohort for specific duty cycles, and produces permitting, insurer, and lender documentation that today must be assembled manually. After deployment, it runs dispatch for peak shaving, ride-through, and limited backup while continuously tracking degradation against the original underwriting assumptions. Over time, the company builds the best dataset on how reused battery cohorts perform under real AI-load patterns, enabling warranties and financing products competitors cannot price confidently.
goToMarketSeed:
  firstCustomer: A North American GPU colocation operator bringing a new 1-10 MW AI tenant online before its utility service upgrade is complete.
  buyingTrigger: A signed AI capacity lease or utility interconnection delay that leaves revenue at risk unless the site can add temporary or behind-the-meter power capacity quickly.
  currentAlternative: New lithium-ion BESS vendors paired with bespoke EPC studies, or waiting for the grid upgrade while using diesel for interim resilience.
  switchingReason: This wedge makes second-life batteries easier to permit, insure, and operate than a custom project, while usually landing faster and cheaper than buying all-new storage for an interim power gap.
  pricingHypothesis: Upfront project underwriting fee plus annual software subscription priced per deployed MWh, with optional performance-guarantee or shared-savings add-ons.
