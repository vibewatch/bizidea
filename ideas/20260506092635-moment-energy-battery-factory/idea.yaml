topRisks:
- name: Safety and permitting drag
  description: Authorities, insurers, or customers may treat second-life batteries as too risky for critical infrastructure sites.
  mitigation: Start with peak-shaving and ride-through use cases rather than full backup, and ship standardized AHJ and insurer documentation backed by third-party testing partners.
- name: Inconsistent battery supply
  description: Used EV battery cohorts may vary too much in chemistry, health, and provenance for repeatable deployments.
  mitigation: Limit supported cohorts early, integrate directly with factory-grade testing data, and only underwrite projects that fit validated duty cycles.
- name: Hardware vendors close the gap
  description: New-battery BESS vendors or second-life manufacturers may build basic software and squeeze the company out of projects.
  mitigation: Own the cross-supplier underwriting dataset and financing-grade analytics layer, and partner with hardware providers instead of competing on metal.
