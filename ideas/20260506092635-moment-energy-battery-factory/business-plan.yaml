slug: second-life-power-orchestrator
date: '2026-05-06'
executiveSummary: >-
  Second-life battery supply is becoming industrialized just as North American GPU colocation operators face delayed utility upgrades and acute pressure to energize revenue-generating AI capacity faster. The proposed company should enter with a narrow software wedge: cohort-level battery underwriting, insurer and AHJ evidence packs, and dispatch controls for 1-10 MW behind-the-meter projects that use reused EV batteries for peak shaving, ride-through, and limited backup. The first customer is a colo operator or microgrid EPC working a live project where a signed tenant or utility delay makes months of lost capacity expensive enough to justify a paid pilot. Research supports the urgency and channel logic, but not full market certainty: the modeled SAM is about $37.5M and year-3 SOM about $3.0M, so the investment case depends on expanding the same control plane into fleet depots, industrial campuses, and financing or warranty partners. The company should therefore avoid broad energy-management positioning and avoid competing on hardware, full EPC scope, or generic sustainability analytics. The near-term proof point is not deployed megawatt-hours alone; it is whether standardized evidence and runtime data can convert second-life batteries from bespoke engineering risk into a repeatable project approval path. The biggest disconfirming risk is that critical-load buyers still default to first-life batteries or diesel because insurer, AHJ, and owner-engineer scrutiny remains too high for reused packs. Key gaps from the inputs are the exact documentation set required for approval, the commercial terms for multi-supplier telemetry access, and whether software can be sold as a distinct line item rather than only bundled into project economics.
problem:
  - GPU colocation operators and microgrid EPCs lose months of revenue or project margin when utility upgrades lag but second-life battery projects still require bespoke safety, performance, and permitting work.
  - Existing alternatives such as first-life BESS, diesel, or internal spreadsheet-based studies win by default because reused EV packs are harder to underwrite, insure, and operate consistently across heterogeneous cohorts.
solution:
  - Build a supplier-neutral underwriting layer that ingests battery provenance and state-of-health data, scores cohorts against specific duty cycles, and produces standardized insurer, AHJ, and owner-engineer evidence packs.
  - Add shadow-mode then live dispatch software for peak shaving, ride-through, and limited backup so realized degradation and runtime performance feed back into future underwriting and financing decisions.
whyWeWin:
  - The company sits in the high-friction middle that hardware vendors and generic EMS providers under-serve: making heterogeneous reused batteries bankable for critical but time-sensitive projects.
  - A growing dataset linking battery provenance, duty cycle, approval outcomes, and realized degradation can become a differentiated underwriting and warranty asset across suppliers and sites.
  - The first buyer has a concrete budget trigger because lost AI capacity, diesel exposure, and delayed tenant revenue are easier to justify than a generic sustainability software purchase.
strategicChoices:
  beachhead: North American 1-10 MW GPU colocation sites and their microgrid EPC partners using behind-the-meter storage to bridge utility delays of 12 or more months.
  wedgeRationale: This slice combines the sharpest speed-to-power pain, a small set of identifiable buyers, and a deployment-led proof point that can be measured in avoided delay, approved projects, and converted pilots; broader second-life storage software would dilute urgency and slow validation.
  sequencingRationale: Start with underwriting and approval evidence before broad autonomous dispatch because insurer and AHJ acceptance is the gating step; once projects clear approval and run in shadow mode, add live controls, then expand the same data and policy layer into adjacent constrained-site segments and financing partners.
  notYet:
    - Selling or financing battery hardware directly
    - Utility-scale merchant storage optimization
    - Full-site microgrid orchestration across all asset types
    - Full-backup critical-load promises before peak-shaving and ride-through deployments are accepted
    - International expansion before North American supplier and approval workflows are repeatable
market:
  tam: $275.0M estimated TAM based on about 1,100 North American constrained sites over time across AI or colo projects, fleet or charging depots, and industrial or public campuses at roughly $250k blended year-1 software plus underwriting ACV.
  sam: $37.5M estimated SAM for roughly 150 North American 1-10 MW GPU colo or adjacent microgrid projects reachable in the next few years.
  som: $3.0M estimated year-3 SOM assuming about 12 live projects at roughly $250k annualized project value.
  segments:
    - North American GPU colocation operators with delayed utility capacity and signed AI tenant demand
    - Microgrid EPCs and switchgear integrators designing behind-the-meter storage for constrained data-center sites
  buyingProcess: The champion is usually the infrastructure or energy lead on a live capacity-delivery project, but insurer, fire-code, owner-engineer, and EPC stakeholders materially shape the sale. The fastest motion is a paid project pilot tied to a delayed site, then conversion to a production contract once the evidence pack and runtime layer reduce approval friction and support commissioning.
product:
  mvp: >-
    The MVP is a project underwriting workspace for second-life battery deployments at one delayed colo site. It must ingest supplier battery data, score supported cohorts for peak-shaving and ride-through duty cycles, generate insurer and AHJ-ready documentation, and run shadow-mode dispatch against site load data.
  sixMonth: >-
    Support 2 to 3 validated battery cohorts, ship the first evidence-pack templates for insurer, AHJ, and owner-engineer review, complete one supplier data integration, and run 2 paid pilots with shadow-mode dispatch and degradation tracking.
  twelveMonth: >-
    Add live dispatch for approved peak-shaving and limited backup use cases, broaden integrations to 2 or more suppliers plus one EPC workflow, and turn pilot outputs into reusable approval and underwriting templates.
  twentyFourMonth: >-
    Expand the same underwriting and runtime layer into fleet depots, industrial campuses, and financing or warranty partners while deepening site controls, approval analytics, and multi-project portfolio reporting.
  keyBets:
    - Standardized evidence packs can materially reduce bespoke insurer and AHJ review for reused-battery projects.
    - Early customers will accept second-life batteries first for peak shaving and ride-through before demanding full backup commitments.
    - Supplier-neutral telemetry and provenance data from at least two battery sources can be integrated on workable commercial terms.
    - Runtime performance data from the first projects will improve underwriting accuracy enough to create defensible approval and financing leverage.
gtm:
  wedge: Paid underwriting and approval package for a delayed 1-10 MW GPU colo project, sold with a shadow-dispatch pilot after a signed tenant, utility delay, or insurer review exposes a revenue-risking power gap.
  channels:
    - Founder-led direct sales to VP Infrastructure, COO, and Head of Data Center Development roles at North American colo operators
    - Co-sell and referral partnerships with microgrid EPCs, switchgear integrators, and second-life battery suppliers already in active projects
    - Later financing and insurance partners once approval evidence and runtime data are proven
  funnelTargets: qualified discovery→technical diligence 40%+, technical diligence→paid pilot 30%+, paid pilot→production 50%+, production→referenceable case study 50%+
  pricing: Paid project underwriting fee plus annual software subscription priced per deployed MWh and site, because buyers first need approval and design work on a live project and then ongoing dispatch, monitoring, and reporting after commissioning; base-case packaging should test roughly $75k-$150k paid pilots converting toward about $200k-$300k annualized production value within the research-based ~$250k blended year-1 ACV anchor.
businessModel:
  revenueStreams:
    - Upfront underwriting, simulation, and approval-pack fees per project
    - Annual subscription for dispatch, monitoring, and compliance reporting per deployed site and MWh
    - Premium analytics or partner fees for warranty support, financing support, and portfolio benchmarking
  unitOfValue: Deployed second-life battery MWh underwritten and managed per site
  targetGrossMarginPct: 70
  expansionLevers:
    - More projects, MWh, and supported cohorts within the same customer or EPC relationship
    - New segments such as fleet depots and industrial campuses using the same underwriting and runtime layer
    - Higher-value modules for financing support, warranty analytics, and portfolio reporting
strategyMap:
  northStarMetric: Annualized deployed MWh approved and operating through the platform without bespoke underwriting rebuilds
  inputMetrics:
    - Paid pilot to production conversion rate
    - Percentage of projects cleared with standardized evidence packs
    - Number of supported battery cohorts with validated telemetry feeds
    - Shadow-mode to live-dispatch conversion rate
    - Median project approval cycle time versus customer baseline
  moatsToBuild:
    - Cross-supplier dataset linking provenance, state-of-health, duty cycle, and realized degradation
    - Reusable insurer, AHJ, and owner-engineer evidence templates tied to live performance traces
    - EPC and supplier workflow integrations that embed the product inside real project delivery
  killCriteria:
    - Fewer than 3 of the first 10 beachhead accounts have an active project delayed long enough to justify a paid storage pilot
    - Fewer than 2 of the first 4 paid pilots convert to production at or above a $200k annualized contract value
    - The company cannot secure usable non-exclusive telemetry and provenance feeds from at least 2 suppliers by month 9
    - Standardized evidence packs still require bespoke third-party testing or custom engineering on more than half of pilot projects
  mermaid: |
    flowchart LR
      Wedge[Delayed GPU colo power-gap project] --> MVP[Underwriting workspace plus evidence pack]
      MVP --> Proof[Approved pilot and shadow-dispatch data]
      Proof --> Expansion[Live dispatch then fleets campuses finance partners]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong customer pain and a differentiated wedge, but investability depends on proving approval-path repeatability and expansion beyond a modest beachhead.
    whyBelieve: Utility-delay pain, growing second-life supply, and fragmented hardware-led competition create a credible opening for a neutral bankability layer that attaches to real infrastructure budgets.
    whyDoubt: Critical-load buyers may still prefer first-life batteries or diesel if insurer and AHJ skepticism keeps reused-battery approvals too bespoke.
    nextDiligence: Win 2 paid delayed-site pilots and show that at least 1 converts to a production deployment because the standardized evidence pack and runtime data materially shorten approval and commissioning.
  firstCustomer:
    title: VP Infrastructure at a North American 1-10 MW GPU colocation operator
    profile: Operator with a signed AI tenant or colo customer, delayed utility service, and an EPC evaluating behind-the-meter storage to bridge months of lost capacity.
    trigger: A signed customer launch date or utility interconnection delay creates a revenue-risking power gap and forces a choice between diesel, first-life batteries, or a second-life deployment that needs approval evidence fast.
    buyer: VP Infrastructure or COO
    initialContract: 8-12 week paid underwriting and shadow-dispatch pilot at roughly $75k-$150k, converting to about $200k-$300k annualized production value through upfront project fees plus ongoing software subscription if the site reaches commissioning.
  mustBeTrue:
    - At least 30% of target beachhead accounts have a live or near-term project where utility delay makes temporary or behind-the-meter storage economically urgent.
    - Insurer, AHJ, and owner-engineer reviews can be standardized enough that the first evidence-pack template materially reduces bespoke project work.
    - At least two second-life suppliers will provide provenance and telemetry data on terms that preserve supplier neutrality.
    - Buyers will fund the product from capacity-delivery or resilience budgets at roughly the researched $250k blended year-1 value, not treat it as optional software.
    - The underwriting and runtime layer will expand into larger adjacent constrained-site segments quickly enough to matter before the beachhead saturates.
  diligenceQuestions:
    - What exact document set and third-party evidence are required today for insurer and AHJ approval on a reused-battery data-center project?
    - How often do delayed 1-10 MW colo projects choose diesel or first-life batteries instead of second-life storage, and why?
    - Can the startup get multi-supplier battery data without exclusive hardware relationships or margin-sharing that destroys neutrality?
    - Is the real buyer the colo operator, the EPC, or a financing partner once a live project reaches procurement?
    - Which early use case clears fastest in practice: peak shaving, ride-through, or limited backup?
  riskHeatmap:
    - risk: Critical-load buyers or reviewers reject reused batteries as too risky
      likelihood: High
      impact: High
      leadingIndicator: Pilot projects stall in insurer, AHJ, or owner-engineer review despite standardized evidence packs and conservative use-case scoping.
      mitigation: Start with peak-shaving and ride-through deployments, use third-party certification evidence, and avoid full-backup claims until approvals are repeatable.
    - risk: Battery provenance and telemetry are too inconsistent across suppliers
      likelihood: Medium
      impact: High
      leadingIndicator: The team cannot onboard two suppliers with sufficient state-of-health, provenance, and historical performance data by month 9.
      mitigation: Restrict the first product to validated cohorts, require telemetry-rich partners, and refuse projects outside supported chemistries and duty cycles.
    - risk: Hardware-led incumbents or first-life substitutes win the project before software value is visible
      likelihood: Medium
      impact: High
      leadingIndicator: Discovery calls repeatedly end with customers choosing a bundled first-life BESS or hardware-vendor software stack before a paid pilot is scoped.
      mitigation: Sell into active delayed projects, partner rather than compete with hardware suppliers, and anchor value on approval speed and avoided delay economics.
    - risk: The product is bought only as services-heavy project work
      likelihood: Medium
      impact: Medium
      leadingIndicator: Prospects accept custom studies but reject recurring software for dispatch, monitoring, or reporting after commissioning.
      mitigation: Build the MVP around repeatable evidence templates and runtime monitoring, require recurring software in pilot conversion plans, and avoid bespoke consulting-only deals.
    - risk: The beachhead is too small for venture-scale follow-on
      likelihood: Medium
      impact: High
      leadingIndicator: By month 12 there are no credible expansion conversations with fleet, industrial, financing, or warranty partners using the same platform.
      mitigation: Validate adjacent segments early, instrument portfolio-level reporting, and use beachhead proof to open financing and broader constrained-site workflows.
operatingAssumptions:
  - assumption: The first real budget owner sits in infrastructure or capacity delivery rather than sustainability because the trigger is lost revenue from delayed power.
    basis: research.yaml
    validationTest: Close at least 3 design-partner or pilot opportunities where the commercial sponsor is a VP Infrastructure, COO, development lead, or EPC project owner with an active capacity-delivery budget.
    decisionImpact: If false, the GTM motion must shift toward longer-cycle ESG, finance, or innovation budgets and the wedge becomes less urgent.
  - assumption: Supplier-neutral access to battery provenance and telemetry from at least two sources is commercially attainable.
    basis: research.yaml
    validationTest: Execute sample-data reviews and one live integration each with 2 suppliers or battery owners by month 9.
    decisionImpact: If false, narrow the product to a single-supplier software stack or abandon the neutrality thesis.
  - assumption: Peak shaving and ride-through are the first acceptable critical-site use cases for second-life batteries, ahead of full backup.
    basis: idea.yaml
    validationTest: In 5 buyer and reviewer interviews plus 2 pilot scopes, confirm that these lower-risk duty cycles can clear review faster than full-backup proposals.
    decisionImpact: If false, the roadmap must move toward softer non-data-center segments sooner and reduce data-center concentration.
  - assumption: Customers will pay roughly the researched ~$250k blended year-1 value when the product is packaged inside a live project with measurable avoided-delay economics.
    basis: research.yaml
    validationTest: Test three packaging options and convert at least 1 paid pilot into a production contract at or above $200k annualized value.
    decisionImpact: If false, reduce service scope, move to partner-led bundling, or reconsider whether the segment supports venture-scale economics.
  - assumption: The same underwriting and runtime layer can open materially larger adjacent markets within 12 to 18 months.
    basis: operator judgment
    validationTest: Generate at least 2 serious expansion pilots or funded design discussions in fleet, industrial-campus, financing, or warranty workflows by month 18.
    decisionImpact: If false, treat the business as a niche project software company and lower funding ambition accordingly.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 10 colo operators, EPCs, insurers, and owner engineers tied to delayed 1-10 MW projects and collect live approval checklists.
    hypothesis: Approval evidence, not raw battery economics alone, is the gating problem on second-life projects.
    successMetric: At least 5 participants share a concrete documentation checklist and at least 3 confirm willingness to scope a paid pilot if the evidence burden is reduced.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build a prototype cohort-scoring engine using one supplier dataset and map outputs to peak-shaving and ride-through duty cycles.
    hypothesis: Available battery provenance and state-of-health data are sufficient to make repeatable initial underwriting recommendations.
    successMetric: The prototype scores at least 2 supported cohorts and produces a customer-reviewable output without bespoke analyst work for every scenario.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run 2 paid underwriting pilots on delayed colo projects with standardized insurer and AHJ evidence packs.
    hypothesis: Customers will pay upfront if the product shortens approval work on a live capacity-delivery project.
    successMetric: At least 2 paid pilots start and at least 1 reaches formal technical diligence with insurer, AHJ, or owner-engineer review.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Launch shadow-mode dispatch against one live or simulated site load profile before taking control authority.
    hypothesis: The software can model dispatch value and degradation credibly enough to support production conversion.
    successMetric: Shadow-mode outputs remain within agreed tolerance of engineering expectations for 30 consecutive operating days.
    owner: Battery analytics lead
  - horizon: 180–270 days
    experiment: Formalize one co-sell motion with a microgrid EPC or switchgear integrator already serving constrained data-center projects.
    hypothesis: Channel partners can source better-timed pilots than cold outbound alone.
    successMetric: One partner produces at least 4 qualified opportunities and 1 paid pilot within a quarter.
    owner: Founder CEO
  - horizon: 180–360 days
    experiment: Test the same underwriting and monitoring stack on one adjacent fleet depot or industrial-campus project.
    hypothesis: The core product generalizes beyond the data-center wedge with limited additional implementation work.
    successMetric: One adjacent pilot uses at least 70% of the existing product and reaches funded deployment or pilot status.
    owner: Solutions engineer
operations:
  - Maintain a versioned approval-template library for insurer, AHJ, and owner-engineer packets with clear evidence owners and review dates.
  - Run a battery-data QA pipeline that checks provenance completeness, chemistry support, and telemetry integrity before a cohort enters underwriting.
  - Use shadow-mode validation before any live dispatch authority is granted on a customer site.
  - Build partnerships with third-party test labs, fire-protection engineers, and EPCs rather than owning certification or field services directly.
  - Track every pilot with a project review cadence covering approval stage, duty-cycle fit, commissioning risk, and conversion plan.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, pilot design, and partner recruitment because buyer truth and project timing are the primary company risks.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the underwriting workspace, supplier data ingestion, and initial shadow-dispatch infrastructure.
  - role: Battery analytics and product lead
    startTiming: Month 0-3
    rationale: Turn heterogeneous battery data into cohort scoring, degradation models, and reusable evidence outputs rather than one-off analyses.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Shorten pilot deployment time with EPC integrations, site-load mapping, and repeatable implementation patterns.
  - role: Partnerships and customer success lead
    startTiming: Month 9-12
    rationale: Manage supplier, EPC, and early production accounts once the company has multiple live projects and renewal risk.
milestones:
  - horizon: 0–12 months
    items:
      - Complete 10 to 15 beachhead interviews and collect 3 live approval checklists from insurer, AHJ, or owner-engineer stakeholders
      - Launch the MVP underwriting workspace, first evidence-pack template set, and one supplier data integration
      - Start 2 paid pilots on delayed colo projects and convert at least 1 into a production deployment or commissioning-ready contract
      - Prove shadow-mode dispatch and degradation tracking on at least one supported cohort without bespoke rebuild for each project
  - horizon: 12–24 months
    items:
      - Support 2 or more suppliers, 3 or more validated cohorts, and live dispatch for approved peak-shaving and ride-through projects
      - Reach 4 to 6 production customers or EPC-led deployments with repeatable onboarding and at least 1 referenceable case study
      - Open 1 to 2 adjacent pilots in fleet, industrial-campus, financing, or warranty workflows using the same core platform
  - horizon: 24–36 months
    items:
      - Establish portfolio reporting, financing-support analytics, and reusable approval templates that reduce deployment friction across multiple site types
      - Show expansion revenue from adjacent constrained-site segments rather than dependence on a single data-center wedge
      - Demonstrate that the underwriting dataset improves approval speed, pricing power, or partner leverage across the installed base
risks:
  - risk: Critical-site reviewers continue to treat second-life batteries as unbankable for data-center deployments
    likelihood: High
    impact: High
    mitigation: Focus on conservative early duty cycles, use third-party evidence, and avoid full-backup claims until the approval path is repeatable.
  - risk: Supplier data quality and cohort variability prevent repeatable underwriting
    likelihood: Medium
    impact: High
    mitigation: Limit supported cohorts, require provenance-rich integrations, and reject projects outside validated chemistry and duty-cycle bounds.
  - risk: Customers buy integrated hardware or default to first-life batteries or diesel instead of a neutral software layer
    likelihood: Medium
    impact: High
    mitigation: Sell into active delayed projects, partner with EPCs and hardware vendors, and anchor value on approval speed and avoided-delay economics.
  - risk: The company becomes a services-heavy project consultant with weak recurring software margins
    likelihood: Medium
    impact: Medium
    mitigation: Productize evidence packs, shadow-dispatch workflows, and recurring monitoring early, and qualify out one-off consulting engagements.
  - risk: Expansion beyond the data-center beachhead is slower than the funding plan assumes
    likelihood: Medium
    impact: High
    mitigation: Test adjacent pilots by month 12 to 18 and lower burn if the platform does not generalize beyond the initial wedge.
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds a small technical and commercial founding team, 2 to 4 paid pilots, supplier and EPC integrations, standardized approval-pack infrastructure, shadow-to-live dispatch validation, and enough adjacent-market testing to determine whether the company is a venture-scale underwriting control plane or a narrower project software business.
