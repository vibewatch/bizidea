scenarios:
  downside:
    description: Y2 有 1 个生产部署、Y3 有 2 个部署向后滑，blended ARPU 更接近 $235K，且支持工作拖低了毛利率。
    y3RevenueK: 1689.0
    y3EbitdaK: -520.6
    cashLowPointK: 548.6
    keyAssumptionChanges:
      - 年度新增客户从 Y1 / Y2 / Y3 的 3 / 4 / 6，降为 3 / 3 / 5。
      - blended 年度 ARPU 从 $250K 下调到 $235K。
      - 月度流失率从 1.0% 升到 1.25%，毛利率从 70% 降到 69%。
  base:
    description: 公司在 Y1 拿下 3 个付费项目，Y2 达到 4-6 个生产部署，并在 Y3 末于研究给出的 $250K blended ACV 锚点上维持约 11 个活跃项目。
    y3RevenueK: 2279.9
    y3EbitdaK: -90.0
    cashLowPointK: 1032.5
    keyAssumptionChanges:
      - 年度新增客户按模型假设执行：Y1 / Y2 / Y3 分别新增 3 / 4 / 6 个。
      - blended 年度 ARPU 保持在 $250K，毛利率维持 70%。
      - 随着承保 workflow 在调试上线后嵌入客户流程，月度流失率稳定在 1.0%。
  upside:
    description: 一个强 reference customer 加上 EPC 转介，把一个额外的 Y2 部署提前拉进来，并让 Y3 定价比计划略高。
    y3RevenueK: 2937.3
    y3EbitdaK: 428.9
    cashLowPointK: 1582.9
    keyAssumptionChanges:
      - 年度新增客户从 3 / 4 / 6 提升到 4 / 5 / 6，并获得更早的合作伙伴带动转化。
      - blended 年度 ARPU 从 $250K 提升到 $265K。
      - 月度流失率改善到 0.8%，毛利率从 70% 提升到 72%。
sensitivity:
  - variable: ARPU
    downsideCase: $235K blended annual ARPU
    baseCase: $250K blended annual ARPU
    upsideCase: $265K blended annual ARPU
    y3RevenueImpactK: -136.8
    cashImpactK: -95.8
  - variable: CAC
    downsideCase: $110K CAC from slower enterprise conversion and more partner travel
    baseCase: $87.8K CAC
    upsideCase: $70K CAC via EPC referrals and denser proof points
    y3RevenueImpactK: 0.0
    cashImpactK: -177.0
  - variable: churn
    downsideCase: 1.5% monthly churn
    baseCase: 1.0% monthly churn
    upsideCase: 0.8% monthly churn
    y3RevenueImpactK: -108.0
    cashImpactK: -76.0
  - variable: sales cycle
    downsideCase: Two production conversions slip by one quarter
    baseCase: Pilot-to-production timing matches milestones
    upsideCase: One major logo converts one quarter earlier
    y3RevenueImpactK: -295.0
    cashImpactK: -210.0
  - variable: gross margin
    downsideCase: 65% gross margin from heavier implementation and lab support
    baseCase: 70% gross margin
    upsideCase: 72% gross margin from repeatable templates and less bespoke work
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: hiring pace
    downsideCase: Sales and platform hires pulled forward one quarter before revenue proves out
    baseCase: Lean hiring as modeled
    upsideCase: Platform and G&A hires delayed one quarter until customer count supports them
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionProjects
      ProductionProjects --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: base case 的收入，来自 Y3 末约 11 个活跃项目、每个项目 $250K 的 blended annual ARPU，对应约 $2.8M 的 exit ARR 和 $2.28M 的已确认 Y3 收入。
  - checkName: 必须做对的地方
    finding: 公司必须足够快地把早期付费试点转成可重复的生产部署，维持 3 / 4 / 6 的新增客户路径，同时让供应商集成保持可复用。
  - checkName: 模型失效条件
    finding: 如果销售周期拉长、定价又向 downside 靠拢，那么 Y3 EBITDA 会恶化到约 -$521K，现金低点也会压缩到约 $549K。
  - checkName: 下一轮融资证明点
    finding: 到第 24 个月，公司若能证明 4-6 个生产部署、两家供应商集成、一个可公开引用的数据中心案例，以及相邻场景的真实拉力，就能为下一轮融资提供支撑。
sanityChecks:
  ruleOf40: Y3 growth 107.8% + EBITDA margin -3.9% = 103.9%
  burnMultiple: Y3 burn multiple 0.1x = $90.0K net burn / about $1.23M net new ARR; Y2 is roughly 0.7x while the beachhead motion is still proving out.
  revenuePerFte: $304K Y3 ($2.28M revenue / 7.5 average FTE vs benchmark $200–400K vertical SaaS / project software)
  flags:
    - 收入仍集中在少数几个部署里，所以只要有一个项目延迟或丢单，Y3 结果就会明显波动。
    - 滩头 SAM 只有约 $37.5M，因此 venture-scale 上行空间仍取决于能否扩展到车队、工业园区和融资 / 质保 workflow。
    - 模型假设软件能够守住独立或可明确归因的 $250K blended annual project value，但研究也提示买家可能更想把这笔钱打包进 EPC 或融资经济性里。
    - 若想守住 70% 毛利率，就必须防止定制化现场服务和认证工作不断渗进 COGS。