scenarios:
  downside:
    description: Y2 有 1 个生产部署延后，Y3 有 2 个部署延后，综合 ARPU 更接近 $235K，且支持工作压缩了毛利率。
    y3RevenueK: 1689.0
    y3EbitdaK: -520.6
    cashLowPointK: 548.6
    keyAssumptionChanges:
    - Y1 / Y2 / Y3 的新增客户爬坡从 3 / 4 / 6 降至 3 / 3 / 5。
    - 综合年度 ARPU 从 $250K 降至 $235K。
    - 月流失率从 1.0% 升至 1.25%，毛利率从 70% 降至 69%。
  base:
    description: 公司在 Y1 拿下 3 个付费项目，Y2 达到 4 到 6 个生产部署，并在 Y3 末基于研究得出的 $250K 综合 ACV 锚点达到约 11 个活跃项目。
    y3RevenueK: 2279.9
    y3EbitdaK: -90.0
    cashLowPointK: 1032.5
    keyAssumptionChanges:
    - 新增客户爬坡遵循模型设定，在 Y1 / Y2 / Y3 分别为 3 / 4 / 6。
    - 综合年度 ARPU 保持在 $250K，毛利率为 70%。
    - 随着承保评估工作流在投运后嵌入客户流程，月流失率维持在 1.0%。
  upside:
    description: 强势标杆客户和 EPC 转介绍使 Y2 额外提前一个部署，并将 Y3 定价小幅抬升至计划之上。
    y3RevenueK: 2937.3
    y3EbitdaK: 428.9
    cashLowPointK: 1582.9
    keyAssumptionChanges:
    - 在合作伙伴助推的更早转化下，新增客户爬坡从 3 / 4 / 6 提升为 4 / 5 / 6。
    - 综合年度 ARPU 从 $250K 升至 $265K。
    - 月流失率改善至 0.8%，毛利率从 70% 扩大至 72%。
sensitivity:
- variable: ARPU
  downsideCase: $235K 综合年度 ARPU
  baseCase: $250K 综合年度 ARPU
  upsideCase: $265K 综合年度 ARPU
  y3RevenueImpactK: -136.8
  cashImpactK: -95.8
- variable: CAC
  downsideCase: 由于企业转化更慢和伙伴差旅更多而导致的 $110K CAC
  baseCase: $87.8K CAC
  upsideCase: 通过 EPC 转介绍和更密集验证点实现的 $70K CAC
  y3RevenueImpactK: 0.0
  cashImpactK: -177.0
- variable: 流失率
  downsideCase: 1.5% 月流失率
  baseCase: 1.0% 月流失率
  upsideCase: 0.8% 月流失率
  y3RevenueImpactK: -108.0
  cashImpactK: -76.0
- variable: 销售周期
  downsideCase: 两个生产转化延后一个季度
  baseCase: 试点转生产时间与里程碑一致
  upsideCase: 一个重要客户提前一个季度转化
  y3RevenueImpactK: -295.0
  cashImpactK: -210.0
- variable: 毛利率
  downsideCase: 由于实施和实验室支持更重，毛利率为 65%
  baseCase: 70% 毛利率
  upsideCase: 由于模板更可复用且定制化工作更少，毛利率为 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 招聘节奏
  downsideCase: 在收入证明之前，销售和平台岗位提前一个季度招聘
  baseCase: 按模型设定进行精简招聘
  upsideCase: 平台和综合行政岗位延后一个季度招聘，直到客户数量足以支撑
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  线索 --> 付费试点\n  付费试点 --> 生产项目\n  生产项目 --> 收入\n  收入 --> 毛利润\n  毛利润 --> 现金\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入由 Y3 末达到约 11 个活跃项目驱动，在 $250K 综合年度 ARPU 下，对应约 $2.8M 的退出 ARR 和 $2.28M 的 Y3 确认收入。
- checkName: 必须做对的事
  finding: 公司必须足够快地将早期付费试点转化为可重复的生产部署，以维持 3 / 4 / 6 的客户新增路径，同时保持供应商集成的可复用性。
- checkName: 模型失效条件
  finding: 如果销售周期延后、且定价下滑至下行情景附近，Y3 EBITDA 将恶化至约 -$521K，现金低点将压缩至约 $549K。
- checkName: 下一轮融资所需证明
  finding: 一旦公司在第 24 个月前展示出 4 到 6 个生产部署、两个供应商集成、一个可引用数据中心案例以及相邻细分市场拉动，下一轮融资就具备正当性。
sanityChecks:
  ruleOf40: Y3 增长 107.8% + EBITDA 利润率 -3.9% = 103.9%
  burnMultiple: Y3 burn multiple 为 0.1x = $90.0K 净烧钱 / 约 $1.23M 净新增 ARR；Y2 约为 0.7x，因为滩头打法仍在验证中。
  revenuePerFte: $304K Y3（$2.28M 收入 / 7.5 平均 FTE，对比垂直 SaaS / 项目软件 $200–400K 基准）
  flags:
  - 收入仍集中在少数部署上，因此单个项目的延迟或流失都会实质性影响 Y3 结果。
  - 滩头市场 SAM 仅约 $37.5M，因此风投级上行空间仍取决于扩展到车队、工业园区以及融资或保修工作流。
  - 模型假设软件可以维持独立或可明确归因的 $250K 综合年度项目价值，尽管研究指出买家可能更倾向于将其打包进 EPC 或融资经济性中。
  - 要维持 70% 毛利率，就必须防止随着项目扩张，定制化现场服务和认证工作渗入销售成本。
