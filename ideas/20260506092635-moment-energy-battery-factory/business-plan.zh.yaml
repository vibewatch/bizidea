slug: second-life-power-orchestrator
date: '2026-05-06'
executiveSummary: >-
  北美 GPU 机柜托管运营商一边被公用事业升级延迟卡住，一边又急着给能产生收入的 AI 容量送电；偏偏就在这个时间点，二次寿命电池供给也开始走向工业化。拟议中的公司应该从一个很窄、但很硬的切口进场：面向 1-10 MW 表后项目，提供批次级电池承保、保险方与 AHJ 资料包，以及调度控制，帮助项目用再利用 EV 电池完成削峰、短时穿越和有限备电。第一批客户应是一家机柜托管运营商或微电网 EPC，手上正有 live 项目，签约租户或公用事业延迟已经让几个月的产能损失贵到足以支撑付费试点。研究证明了紧迫性和渠道逻辑，但还不足以给出完整市场确定性：模型中的 SAM 约为 $37.5M，Y3 SOM 约为 $3.0M，所以投资逻辑能不能成立，取决于同一控制平面能否继续扩到车队场站、工业园区，以及融资或质保合作方。公司因此不该把自己讲成泛能源管理平台，也不该在硬件、完整 EPC 范围或通用可持续分析上分心。近期真正要证明的，不是堆出多少兆瓦时，而是标准化证据和运行数据能否把二次寿命电池从“定制工程风险”变成一条可重复的项目审批路径。最大的反证风险是，关键负载买家依旧因为保险方、AHJ 和业主工程师审查太严，而继续默认全新电池或柴油。输入资料里还缺三件关键事：审批到底要哪一套精确文档、多供应商遥测接入的商业条款是什么，以及软件能不能作为独立预算项卖出去，而不是只能被打包进项目经济性里。
problem:
  - GPU 机柜托管运营商和微电网 EPC 一旦碰上公用事业升级滞后，就会丢掉几个月收入或项目毛利；可二次寿命电池项目依旧得扛定制化的安全、性能和报批工作。
  - 全新 BESS、柴油，或内部基于表格的研究之所以经常默认胜出，不是因为它们一定更优，而是因为再利用 EV 电池跨批次更难被稳定承保、投保和运营。
solution:
  - 构建一层供应商中立的承保系统，接入电池溯源和 SOH 数据，按特定工况给批次打分，并产出标准化的保险方、AHJ 与业主工程师资料包。
  - 再叠加先 shadow-mode、后 live 的调度软件，用于削峰、短时穿越和有限备电，让真实衰减与运行表现回流到后续承保和融资决策里。
whyWeWin:
  - 公司咬住的是一个高摩擦、又被硬件厂商和通用 EMS 同时忽略的中间层：让来源杂的再利用电池，在关键但时间敏感的项目里也具备可融资性。
  - 一套把电池溯源、工况、审批结果和真实衰减串起来的数据集，会逐步长成差异化的承保与质保资产，而且能跨供应商、跨站点复用。
  - 首个买家拥有非常具体的预算触发器，因为 AI 容量损失、柴油暴露和租户收入延迟，远比一笔泛可持续软件采购更容易 justify。
strategicChoices:
  beachhead: 北美 1-10 MW GPU 机柜托管站点，以及其微电网 EPC 合作方；这些站点会用表后储能来跨越 12 个月以上的公用事业延迟。
  wedgeRationale: 这一切片同时具备最尖锐的“多快能上电”痛点、数量可识别的买家，以及可以用避免延迟、项目获批和试点转正来衡量的部署型 proof point；如果一开始就做更广泛的二次寿命储能软件，紧迫感会被稀释，验证速度也会变慢。
  sequencingRationale: 先把承保和审批证据做好，再逐步走向更广泛的自主调度，因为保险方和 AHJ 的接受度才是卡口；等项目通过审批并完成 shadow-mode 运行后，再加 live 控制，然后把同一套数据与策略层扩到相邻的受限站点场景和融资合作方。
  notYet:
    - 直接销售或融资电池硬件
    - 公用事业级 merchant storage 优化
    - 覆盖所有资产类型的全站微电网编排
    - 在削峰和短时穿越尚未被接受前，就承诺完整关键负载备电
    - 在北美的供应链与审批流程尚未可重复前，就贸然国际化
market:
  tam: 基于约 1,100 个北美受限站点的估算 TAM 为 $275.0M，这些站点横跨 AI / 机柜托管项目、车队 / 充电场站，以及工业 / 公共园区，按每站点约 $250k 的首年软件加承保 ACV 计算。
  sam: 未来几年内可触达的北美 1-10 MW GPU 机柜托管或相邻微电网项目约 150 个，对应估算 SAM 为 $37.5M。
  som: 假设 Y3 约有 12 个在运项目、每个项目年化价值约 $250k，则估算 Y3 SOM 为 $3.0M。
  segments:
    - 面临公用事业容量延迟、但已经签下 AI 租户需求的北美 GPU 机柜托管运营商
    - 为受限数据中心站点设计表后储能的微电网 EPC 和开关设备集成商
  buyingProcess: champion 通常是正在推进真实容量交付项目的基础设施或能源负责人，但保险方、消防规范相关方、业主工程师和 EPC 都会实质性影响成交。最快的打法，是把产品卖成一个与延迟站点绑定的付费项目试点；一旦证据包与运行时层显著降低审批摩擦、支持调试上线，再转成生产合同。
product:
  mvp: >-
    MVP 是一个服务于单个延迟机柜托管站点的二次寿命电池项目承保工作台。它必须能接入供应商电池数据，针对削峰和短时穿越工况给受支持批次打分，生成可供保险方和 AHJ 审核的文档，并基于站点负载数据运行 shadow-mode 调度。
  sixMonth: >-
    支持 2 到 3 个已验证的电池批次，交付首版面向保险方、AHJ 和业主工程师的资料包模板，完成 1 个供应商数据集成，并运行 2 个带 shadow-mode 调度和衰减追踪的付费试点。
  twelveMonth: >-
    为获批的削峰和有限备电场景加入 live 调度，把集成拓展到 2 个以上供应商和 1 个 EPC workflow，并把试点输出沉淀为可复用的审批与承保模板。
  twentyFourMonth: >-
    把同一套承保与运行时层扩展到车队场站、工业园区，以及融资或质保合作方，同时补强站点控制、审批分析和跨项目组合报表能力。
  keyBets:
    - 标准化证据包能够实质减少再利用电池项目里定制化的保险方与 AHJ 审查。
    - 早期客户会先接受二次寿命电池做削峰和短时穿越，而不是一上来就要求完整备电承诺。
    - 至少两家电池来源的供应商中立遥测与溯源数据，可以在可接受的商业条款下接入。
    - 首批项目产生的运行数据，会足够提升承保精度，从而建立有防御性的审批与融资杠杆。
gtm:
  wedge: 面向一个延迟中的 1-10 MW GPU 机柜托管项目，销售“付费承保 + 审批资料包”，并在租户签约、公用事业延迟或保险审核暴露出收入风险的电力缺口后，叠加 shadow-dispatch 试点。
  channels:
    - 由创始人直接销售给北美机柜托管运营商中的 VP Infrastructure、COO 和 Head of Data Center Development
    - 与已经参与在建项目的微电网 EPC、开关设备集成商和二次寿命电池供应商联合销售与互相转介
    - 待审批证据和运行数据被验证后，再切入融资与保险合作方
  funnelTargets: qualified discovery→technical diligence 40%+，technical diligence→paid pilot 30%+，paid pilot→production 50%+，production→referenceable case study 50%+
  pricing: 因为买家一开始需要的是 live 项目上的审批与设计工作，项目投运后才需要持续调度、监控和报告，所以应采用“付费项目承保费 + 按已部署 MWh 与站点收取的年度软件订阅费”的定价；基础方案应测试约 $75k-$150k 的付费试点，并向约 $200k-$300k 的年化生产价值转化，对齐研究给出的约 $250k 首年 blended ACV 锚点。
businessModel:
  revenueStreams:
    - 按项目收取前期承保、仿真和审批资料包费用
    - 按站点和 MWh 收取调度、监控与合规报告年度订阅费
    - 用于质保支持、融资支持和组合 benchmark 的高级分析或合作方费用
  unitOfValue: 每站点已承保并由平台管理的二次寿命电池 MWh
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一客户或 EPC 关系中增加项目数、MWh 和受支持批次
    - 用同一套承保与运行时层切入车队场站、工业园区等新细分场景
    - 推出融资支持、质保分析和组合报表等更高价值模块
strategyMap:
  northStarMetric: 通过平台获批并投入运行、且无需重新定制承保流程的年化已部署 MWh
  inputMetrics:
    - 付费试点到生产合同的转化率
    - 使用标准化证据包完成审批的项目占比
    - 具备有效遥测接入的受支持电池批次数量
    - shadow-mode 到 live-dispatch 的转化率
    - 与客户基线相比的项目审批周期中位数
  moatsToBuild:
    - 跨供应商的数据集，把溯源、SOH、工况和真实衰减连起来
    - 与真实运行轨迹绑定的可复用保险方、AHJ 与业主工程师证据模板
    - 嵌入真实项目交付流程的 EPC 与供应商工作流集成
  killCriteria:
    - 前 10 个滩头账户中，少于 3 个存在延迟足够久、值得为储能试点付费的真实项目
    - 前 4 个付费试点中，少于 2 个能以至少 $200k 年化合同价值转成生产部署
    - 到第 9 个月，公司仍无法从至少 2 家供应商获得可用的非独家遥测和溯源数据
    - 超过一半试点项目仍需要定制第三方测试或专门工程工作，标准化证据包没有显著降低负担
  mermaid: |
    flowchart LR
      Wedge[延迟中的 GPU 机柜托管电力缺口项目] --> MVP[承保工作台加证据包]
      MVP --> Proof[获批试点与 shadow-dispatch 数据]
      Proof --> Expansion[live 调度，然后扩到车队、园区和融资合作方]
investorMemo:
  verdict:
    call: Watch
    conviction: 客户痛点够硬，切口也有差异化，但是否值得投，取决于公司能否把审批路径做成可重复流程，并走出一个并不算大的滩头市场。
    whyBelieve: 公用事业延迟带来的痛感、不断增长的二次寿命供给，以及碎片化且偏硬件导向的竞争格局，一起为一层中立的可融资性软件打开了窗口，而且预算能挂在真实的基础设施支出上。
    whyDoubt: 如果保险方和 AHJ 对再利用电池的怀疑让审批始终高度定制，关键负载买家大概率还是会回到全新电池或柴油。
    nextDiligence: 拿下 2 个延迟站点的付费试点，并证明至少有 1 个能因为标准化证据包和运行数据显著缩短审批与调试，而顺利转成生产部署。
  firstCustomer:
    title: 北美 1-10 MW GPU 机柜托管运营商的 VP Infrastructure
    profile: 这类运营商已经签下 AI 租户或机柜托管客户，公用事业服务又延迟，EPC 正在评估表后储能，以填补数月的产能损失。
    trigger: 已签的客户上线日期或公用事业并网延迟，制造了一个会直接影响收入的电力缺口，迫使团队在柴油、全新电池或需要快速审批证据的二次寿命部署之间做选择。
    buyer: VP Infrastructure 或 COO
    initialContract: 8-12 周的付费承保与 shadow-dispatch 试点，价格约 $75k-$150k；如果站点顺利推进到调试上线，再通过项目费用加持续订阅转成约 $200k-$300k 的年化生产价值。
  mustBeTrue:
    - 至少 30% 的目标滩头账户存在一个正在进行或近期将启动的项目，且公用事业延迟已经让临时或表后储能在经济上变得非常紧迫。
    - 保险方、AHJ 和业主工程师的审查可以被足够标准化，以至于第一版证据模板就能显著减少定制项目工作量。
    - 至少两家二次寿命供应商愿意提供既能保持供应商中立、又足够支撑产品的溯源与遥测数据。
    - 买家愿意从容量交付或韧性预算中，按研究给出的约 $250k 首年 blended value 付费，而不是把产品视作可有可无的软件。
    - 承保与运行时层能足够快地扩到更大的相邻受限站点场景，否则在滩头市场饱和前就难以支撑 venture-scale 结果。
  diligenceQuestions:
    - 今天在一个再利用电池数据中心项目里，保险方和 AHJ 到底要求哪些文档和第三方证据？
    - 延迟中的 1-10 MW 机柜托管项目，究竟有多常在二次寿命储能与柴油 / 全新电池之间选后者，原因又是什么？
    - 创业公司能否在不绑定独家硬件关系、也不让利润被分成吃掉的前提下，拿到多供应商电池数据？
    - 真正的买家到底是机柜托管运营商、EPC，还是进入采购阶段后出现的融资合作方？
    - 哪个早期用例在现实里最容易过关：削峰、短时穿越，还是有限备电？
  riskHeatmap:
    - risk: 关键负载买家或审核方认为再利用电池风险过高而拒绝采用
      likelihood: High
      impact: High
      leadingIndicator: 即便已有标准化证据包并收窄到保守场景，试点项目仍在保险方、AHJ 或业主工程师审查环节卡住。
      mitigation: 从削峰和短时穿越部署起步，使用第三方认证证据，在审批路径可重复之前不做完整备电承诺。
    - risk: 不同供应商之间的电池溯源和遥测数据过于不一致
      likelihood: Medium
      impact: High
      leadingIndicator: 团队到第 9 个月仍无法让两家供应商上线足够的 SOH、溯源和历史性能数据。
      mitigation: 把首版产品限定在已验证批次上，要求合作方具备足够丰富的遥测数据，并拒绝超出支持化学体系和工况范围的项目。
    - risk: 以硬件为主的 incumbents 或全新电池替代方案，在软件价值显现前先拿下项目
      likelihood: Medium
      impact: High
      leadingIndicator: 潜在客户在付费试点还没明确前，就频繁选择打包式全新 BESS 或硬件厂商的软件栈。
      mitigation: 锁定正在延迟的 live 项目去卖，与硬件供应商合作而不是正面竞争，并把价值锚定在审批速度和避免延迟的经济性上。
    - risk: 产品最终只会被当成服务密集型项目工作来买
      likelihood: Medium
      impact: Medium
      leadingIndicator: 线索愿意接受定制研究，却拒绝在调试上线后为调度、监控或报告支付持续软件费用。
      mitigation: 从 MVP 开始就把证据模板与运行监控产品化，在试点转正方案中强制包含 recurring software，并主动放弃纯咨询型交易。
    - risk: 滩头市场太小，不足以支撑 venture-scale 的后续发展
      likelihood: Medium
      impact: High
      leadingIndicator: 到第 12 个月时，仍没有与车队、工业、融资或质保合作方围绕同一平台展开可信扩展对话。
      mitigation: 尽早验证相邻细分市场，构建组合级报表，并用滩头案例撬动融资和更广泛的受限站点 workflow。
operatingAssumptions:
  - assumption: 第一个真正的预算持有者会落在基础设施或容量交付团队，而不是可持续团队，因为触发器是延迟供电带来的收入损失。
    basis: research.yaml
    validationTest: 至少拿下 3 个 design-partner 或试点机会，商业赞助人都来自 VP Infrastructure、COO、开发负责人或拥有 live 容量交付预算的 EPC 项目 owner。
    decisionImpact: 如果这个判断不成立，GTM 就得转向周期更长的 ESG、财务或创新预算，切口也会变得没那么紧迫。
  - assumption: 能以商业上可行的方式，从至少两家来源拿到供应商中立的电池溯源和遥测数据。
    basis: research.yaml
    validationTest: 到第 9 个月前，分别与 2 家供应商或电池持有方完成样本数据评审和一次 live 集成。
    decisionImpact: 如果做不到，就要么把产品收窄成单一供应商软件栈，要么放弃“中立层”这条 thesis。
  - assumption: 对二次寿命电池来说，削峰和短时穿越会比完整备电更早成为关键站点可接受的初始用例。
    basis: idea.yaml
    validationTest: 在 5 次买家 / 审核方访谈加 2 次试点 scope 中，确认这两类低风险工况比完整备电更容易通过审查。
    decisionImpact: 如果不成立，路线图就要更早转向更温和的非数据中心场景，并降低数据中心集中度。
  - assumption: 只要产品被打包进一个能量化避免延迟收益的 live 项目里，客户就愿意支付研究推导出的约 $250k 首年 blended value。
    basis: research.yaml
    validationTest: 测试 3 种打包方式，并至少把 1 个付费试点转成一个年化价值不低于 $200k 的生产合同。
    decisionImpact: 如果不成立，就需要缩减服务范围、转向 partner-led bundling，或者重新判断这个细分市场是否足以支撑 venture-scale economics。
  - assumption: 同一套承保与运行时层能在 12-18 个月内打开明显更大的相邻市场。
    basis: operator judgment
    validationTest: 到第 18 个月前，在车队、工业园区、融资或质保 workflow 中拿到至少 2 个严肃的扩展试点或已获预算的设计讨论。
    decisionImpact: 如果不成立，就应把公司视为一个小众项目软件生意，并相应下调融资 ambition。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 10 位与延迟中的 1-10 MW 项目相关的机柜托管运营商、EPC、保险方和业主工程师，并收集 live 审批清单。
    hypothesis: 卡口并不只是电池经济性，而是审批证据。
    successMetric: 至少 5 位参与者愿意分享具体文档清单，且至少 3 位确认只要证据负担下降，就愿意讨论付费试点。
    owner: 创始人 / CEO
  - horizon: 0–90 天
    experiment: 用一家供应商的数据集搭一个原型批次评分引擎，并把输出映射到削峰和短时穿越工况。
    hypothesis: 现有的电池溯源与 SOH 数据，足以支持可重复的初步承保建议。
    successMetric: 原型至少能给 2 个受支持批次打分，并产出客户可审阅的结果，而不需要每个场景都靠分析师手工重做。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 在延迟中的机柜托管项目上运行 2 个付费承保试点，并交付标准化的保险方和 AHJ 资料包。
    hypothesis: 只要产品能缩短 live 容量交付项目里的审批工作，客户就愿意为前期工作付费。
    successMetric: 至少启动 2 个付费试点，且至少 1 个进入保险方、AHJ 或业主工程师参与的正式技术尽调。
    owner: 创始人 / CEO
  - horizon: 90–180 天
    experiment: 在接管控制权前，先针对一个真实或模拟站点负载曲线启动 shadow-mode 调度。
    hypothesis: 软件能够足够可信地建模调度价值和衰减，从而支撑生产转化。
    successMetric: shadow-mode 输出在连续 30 个运行日里，都能维持在与工程预期约定的误差范围内。
    owner: 电池分析负责人
  - horizon: 180–270 天
    experiment: 与一家已经服务受限数据中心项目的微电网 EPC 或开关设备集成商，建立正式联合销售流程。
    hypothesis: 渠道合作方能比冷启动外呼带来时机更好的试点。
    successMetric: 单个合作方在一个季度内贡献至少 4 个合格机会和 1 个付费试点。
    owner: 创始人 / CEO
  - horizon: 180–360 天
    experiment: 在一个相邻的车队场站或工业园区项目上，测试同一套承保与监控栈。
    hypothesis: 核心产品只需少量新增实施工作，就能泛化到数据中心切口之外。
    successMetric: 至少 1 个相邻试点复用现有产品能力的 70% 以上，并进入已获预算的部署或试点状态。
    owner: 解决方案工程师
operations:
  - 维护一个带版本控制的审批模板库，覆盖保险方、AHJ 和业主工程师资料包，并明确证据 owner 与复审日期。
  - 建立电池数据 QA 流程，在批次进入承保前检查溯源完整性、化学体系支持情况和遥测完整性。
  - 在任何客户站点交出 live 调度权限前，都先跑完 shadow-mode 验证。
  - 与第三方测试实验室、消防工程师和 EPC 建立合作，而不是自己承担认证或现场服务。
  - 为每个试点设定固定复盘节奏，跟踪审批阶段、工况匹配度、调试风险和转化计划。
team:
  - role: 创始人 / CEO
    startTiming: Month 0
    rationale: 亲自负责 founder-led sales、试点设计和合作方招募，因为买家真实需求与项目时机，是公司当前最大的风险来源。
  - role: 创始工程师
    startTiming: Month 0
    rationale: 搭建承保工作台、供应商数据接入，以及第一版 shadow-dispatch 基础设施。
  - role: 电池分析与产品负责人
    startTiming: Month 0-3
    rationale: 把来源杂的电池数据变成批次评分、衰减模型和可复用证据输出，而不是一次性的分析项目。
  - role: 解决方案工程师
    startTiming: Month 6
    rationale: 通过 EPC 集成、站点负载映射和可复用实施模式，缩短试点上线时间。
  - role: 合作伙伴与客户成功负责人
    startTiming: Month 9-12
    rationale: 当公司进入多项目并行和续约风险阶段后，负责管理供应商、EPC 和早期生产客户。
milestones:
  - horizon: 0–12 个月
    items:
      - 完成 10-15 次滩头访谈，并从保险方、AHJ 或业主工程师手里拿到 3 份 live 审批清单
      - 上线 MVP 承保工作台、首版证据模板集和 1 个供应商数据集成
      - 启动 2 个延迟中的机柜托管付费试点，并至少把 1 个转成生产部署或可直接调试上线的合同
      - 在至少 1 个受支持批次上证明 shadow-mode 调度和衰减追踪可以运行，而不需要每个项目都从头重建
  - horizon: 12–24 个月
    items:
      - 支持 2 家以上供应商、3 个以上已验证批次，并在获批的削峰和短时穿越项目中上线 live 调度
      - 做到 4-6 个生产客户或 EPC 驱动部署，具备可重复的 onboarding 流程，并至少拿到 1 个可公开引用的案例
      - 在车队、工业园区、融资或质保 workflow 中，开启 1-2 个使用同一核心平台的相邻试点
  - horizon: 24–36 个月
    items:
      - 建立组合报表、融资支持分析和可复用审批模板，降低多类站点的部署摩擦
      - 证明收入扩张已来自相邻受限站点场景，而不是只押在单一数据中心切口上
      - 证明承保数据集正在提升整个安装基盘上的审批速度、定价能力或合作方杠杆
risks:
  - risk: 关键站点审核方仍把二次寿命电池视为不适合数据中心部署的不可融资方案
    likelihood: High
    impact: High
    mitigation: 聚焦保守的早期工况，使用第三方证据，并在审批路径可重复前避免做完整备电承诺。
  - risk: 供应商数据质量和批次差异过大，无法形成可重复承保
    likelihood: Medium
    impact: High
    mitigation: 限定受支持批次，要求高质量溯源集成，并拒绝超出已验证化学体系和工况边界的项目。
  - risk: 客户更愿意买一体化硬件方案，或直接默认全新电池 / 柴油，而不是中立软件层
    likelihood: Medium
    impact: High
    mitigation: 只卖给活跃的延迟项目，与 EPC 和硬件厂商合作，并把价值锚定在审批速度和避免延迟的经济性上。
  - risk: 公司最终变成服务密集型项目顾问，缺乏高毛利的 recurring software
    likelihood: Medium
    impact: Medium
    mitigation: 尽早把证据包、shadow-dispatch workflow 和持续监控产品化，并主动筛掉一次性咨询项目。
  - risk: 超出数据中心滩头市场的扩张速度，比融资计划假设的更慢
    likelihood: Medium
    impact: High
    mitigation: 在第 12-18 个月就测试相邻试点；如果平台无法泛化到初始切口之外，就应下调 burn。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: 这笔 18 个月资金将覆盖一支小而精的技术与商业创始团队、2-4 个付费试点、供应商与 EPC 集成、标准化审批资料包基础设施、从 shadow 到 live 的调度验证，以及足够多的相邻市场测试，用来判断这家公司最终会成为 venture-scale 的承保控制平面，还是一个更窄的项目软件业务。