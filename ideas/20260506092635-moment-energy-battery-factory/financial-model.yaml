  - variable: CAC
    downsideCase: $110K CAC from slower enterprise conversion and more partner travel
    baseCase: $87.8K CAC
    upsideCase: $70K CAC via EPC referrals and denser proof points
    y3RevenueImpactK: 0.0
    cashImpactK: -177.0
  - variable: churn
    downsideCase: 1.5% monthly churn
    baseCase: 1.0% monthly churn
    upsideCase: 0.8% monthly churn
    y3RevenueImpactK: -108.0
    cashImpactK: -76.0
  - variable: sales cycle
    downsideCase: Two production conversions slip by one quarter
    baseCase: Pilot-to-production timing matches milestones
    upsideCase: One major logo converts one quarter earlier
    y3RevenueImpactK: -295.0
    cashImpactK: -210.0
  - variable: gross margin
    downsideCase: 65% gross margin from heavier implementation and lab support
    baseCase: 70% gross margin
    upsideCase: 72% gross margin from repeatable templates and less bespoke work
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: hiring pace
    downsideCase: Sales and platform hires pulled forward one quarter before revenue proves out
    baseCase: Lean hiring as modeled
    upsideCase: Platform and G&A hires delayed one quarter until customer count supports them
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionProjects
      ProductionProjects --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base case revenue is driven by reaching about 11 active projects by Y3 exit at a $250K blended annual ARPU, which implies roughly $2.8M exit ARR and $2.28M recognized Y3 revenue.
  - checkName: Must go right
    finding: The company must convert early paid pilots into repeatable production deployments fast enough to stay on the 3 / 4 / 6 customer-add path while keeping supplier integrations reusable.
  - checkName: Model breaks if
    finding: If sales cycles slip and pricing falls toward the downside case, Y3 EBITDA worsens to about -$521K and the cash low point compresses to roughly $549K.
  - checkName: Next-round proof
    finding: The next financing is justified once the company shows 4 to 6 production deployments, two supplier integrations, one referenceable data-center case, and adjacent-segment pull by month 24.
sanityChecks:
  ruleOf40: Y3 growth 107.8% + EBITDA margin -3.9% = 103.9%
  burnMultiple: Y3 burn multiple 0.1x = $90.0K net burn / about $1.23M net new ARR; Y2 is roughly 0.7x while the beachhead motion is still proving out.
  revenuePerFte: $304K Y3 ($2.28M revenue / 7.5 average FTE vs benchmark $200–400K vertical SaaS / project software)
  flags:
    - Revenue remains concentrated in a small number of deployments, so one delayed or lost project would move Y3 results materially.
    - The beachhead SAM is only about $37.5M, so venture-scale upside still depends on expansion into fleet, industrial-campus, and financing or warranty workflows.
    - The model assumes software can hold a standalone or clearly attributable $250K blended annual project value even though research notes buyers may prefer bundling into EPC or financing economics.
    - Holding 70% gross margin requires resisting bespoke field-service and certification work from leaking into COGS as projects scale.
