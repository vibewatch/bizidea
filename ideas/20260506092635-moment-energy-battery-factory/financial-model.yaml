scenarios:
  downside:
    description: One Y2 production deployment and two Y3 deployments slip, blended ARPU lands closer to $235K, and support work trims gross margin.
    y3RevenueK: 1689.0
    y3EbitdaK: -520.6
    cashLowPointK: 548.6
    keyAssumptionChanges:
      - Gross new-customer ramp falls from 3 / 4 / 6 adds in Y1 / Y2 / Y3 to 3 / 3 / 5.
      - Blended annual ARPU falls from $250K to $235K.
      - Monthly churn rises from 1.0% to 1.25% and gross margin eases from 70% to 69%.
  base:
    description: The company lands 3 paid projects in Y1, reaches 4 to 6 production deployments by Y2, and exits Y3 at about 11 active projects on the researched $250K blended ACV anchor.
    y3RevenueK: 2279.9
    y3EbitdaK: -90.0
    cashLowPointK: 1032.5
    keyAssumptionChanges:
      - Gross new-customer ramp follows the modeled 3 / 4 / 6 annual adds across Y1 / Y2 / Y3.
      - Blended annual ARPU stays at $250K with 70% gross margin.
      - Monthly churn holds at 1.0% as underwriting workflows become embedded after commissioning.
  upside:
    description: A strong reference customer and EPC referrals pull one extra Y2 deployment forward and lift Y3 pricing modestly above plan.
    y3RevenueK: 2937.3
    y3EbitdaK: 428.9
    cashLowPointK: 1582.9
    keyAssumptionChanges:
      - Gross new-customer ramp improves from 3 / 4 / 6 annual adds to 4 / 5 / 6 with earlier partner-assisted conversion.
      - Blended annual ARPU rises from $250K to $265K.
      - Monthly churn improves to 0.8% and gross margin expands from 70% to 72%.
