    - 17
    - 26
  adoptionFrictionMatrix:
  - friction: 保险方和 AHJ 对关键站点中再利用电池的怀疑
    severity: 高
    affectedBuyer: 基础设施副总裁 / 业主工程师
    mitigation: 打包第三方认证证据、标准化安全假设，以及诸如削峰等保守的初始应用场景，再逐步走向有限备用。
    sourceRefs:
    - 6
    - 31
  - friction: 电池溯源与健康状态差异性
    severity: 高
    affectedBuyer: 小电网 EPC / 技术买家
    mitigation: 将早期部署限制在已验证批次，并要求供给伙伴具备丰富遥测数据。
    sourceRefs:
    - 8
    - 9
  - friction: 资本项目采购周期
    severity: 中
    affectedBuyer: COO / 开发负责人
    mitigation: 伴随既有电池项目一起销售，并通过合作伙伴提供融资式或打包式切入。
    sourceRefs:
    - 14
    - 15
  - friction: 与站点负载、电价机制及其他资产的运行时集成
    severity: 中
    affectedBuyer: 运营负责人
    mitigation: 在获取调度权限前，优先采用 API 集成并完成影子模式验证。
    sourceRefs:
    - 13
    - 29
  - friction: 默认偏好新电池或柴油
    severity: 中
    affectedBuyer: CFO / 基础设施买家
    mitigation: 以更快通电、更低前期成本和清晰的避免延期经济性为主导，而不是只讲可持续性。
    sourceRefs:
    - 7
    - 12
    - 27
