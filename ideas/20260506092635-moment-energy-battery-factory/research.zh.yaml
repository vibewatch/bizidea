    - 32
    - 35
  - point: OEM 合作、投资人支持以及本土工厂计划，正在提高二次寿命电池的可得供给。
    sourceRefs:
    - 4
    - 5
    - 15
    - 16
    - 23
  - point: 更丰富的运行数据和认证里程碑，正在让二次寿命项目更容易从技术上自证成立。
    sourceRefs:
    - 6
    - 8
    - 9
    - 24
  headwinds:
  - point: 不是每一块退役 EV 电池都适合做二次寿命，一部分流向依然会更适合回收或直接更换成一次寿命产品。
    sourceRefs:
    - 25
    - 27
  - point: AI 数据中心正在面临更强的锂电安全审查。
    sourceRefs:
    - 31
    - 32
    - 33
  - point: 这个品类的经济性，仍经常被打包进项目融资或硬件销售里，而不是单独的软件预算。
    sourceRefs:
    - 14
    - 22
competitors:
- name: Moment Energy
  stage: scale-up
  wedge: 北美二次寿命电池制造商，拥有 OEM 供给关系和工厂级扩张目标。
  pricing: 定制项目报价；抓取材料中没有公开标准定价。
  strength: 在北美供给证明、认证进展和近期融资上最强。
  weaknessVsUs: 以硬件为先，而且经济上绑定在自家电池平台上，而不是一层跨供应商的中立承保软件。
  sourceRefs:
  - 2
  - 4
  - 5
  - 6
- name: Connected Energy
  stage: scale-up
  wedge: 二次寿命 BESS 厂商，提供系统、软件和融资，并在英国 / 欧洲有深厚部署经验。
  pricing: 报价制；提供 leasing 和 Battery Storage as a Service。
  strength: 运行历史长、OEM 合作深，并且明确提供融资方案。
  weaknessVsUs: 卖的是集成系统和融资，针对北美 AI 数据中心的适配度较低，也没有明显展示出跨第三方供应商的中立性。
  sourceRefs:
  - 8
  - 13
  - 14
  - 15
  - 16
- name: B2U Storage Solutions
  stage: scale-up
  wedge: 公用事业级二次寿命项目的持有与运营方，在商业系统里使用 EV 电池包。
  pricing: 抓取材料中未披露公开项目定价。
  strength: 拥有多 MWh 级二次寿命项目的真实运行数据。
  weaknessVsUs: 更偏项目业主和公用事业级场景，而不是软件主导或数据中心特化。
  sourceRefs:
  - 19
  - 20
- name: Smartville
  stage: startup
  wedge: 二次寿命储能创业公司，强调技术架构以及模块级与整包级的选择。
  pricing: 抓取材料中未披露公开项目定价。
  strength: 在电池包架构和扩张路径上有技术差异化。
  weaknessVsUs: 阶段更早，公开层面缺少保险方 / AHJ workflow 或供应商中立承保的证明。
  sourceRefs:
  - 21
- name: RePurpose Energy
  stage: startup
  wedge: 源于研究机构的二次寿命储能公司，以 EV 电池为基础搭建储能系统。
  pricing: 抓取材料中未披露公开项目定价。
  strength: 二次寿命定位清晰，也有学术背景。
  weaknessVsUs: 与更大玩家相比，公开证据里在规模、融资打法和大项目部署足迹上都较弱。
  sourceRefs:
  - 17
  - 18
regulatoryTechnicalConstraints:
- point: 把锂电池放进 AI 数据中心，会带来消防风险和规范审查复杂度；即便技术逻辑成立，也可能拖慢审批。
  sourceRefs:
  - 31
  - 32
- point: 再利用流程本身的可信度很重要；类似 UL 1974 的证据正在成为二次寿命电池可融资性的关键信号。
  sourceRefs:
  - 6
  - 24
- point: EPA 指南明确说明，锂电池在寿命终点阶段必须小心处理，否则会伤及人员和环境。
  sourceRefs:
  - 33
  - 34
- point: 可靠的二次寿命承保，依赖的是电池遥测与 SOH 数据，而不只是铭牌参数。
  sourceRefs:
  - 8
  - 9
- point: 调度软件必须与站点负载、电价、并网服务及其他能源资产集成，这会抬高实施复杂度。
  sourceRefs:
  - 13
  - 14
validationSignals:
- point: Moment 在 2026 年的 Series B 让累计融资超过 $100M，这是一个很强的信号，说明投资人把二次寿命电池视作可规模化的基础设施，而不是定制试点。
  sourceRefs:
  - 1
  - 2
- point: Moment 获得 DOE 支持的工厂计划，以及 UL 1974 认证里程碑，说明北美正在形成供给链与认证基础设施。
  sourceRefs:
  - 4
  - 6
  - 24
- point: Moment 与 SFU 的合作，明确把二次寿命电池和不断增长的数据中心电力需求绑在了一起。
  sourceRefs:
  - 3
- point: Connected Energy 既拿到投资人支持，也与 Volvo 等 OEM 建立合作，说明二次寿命供给与部署生态都在成熟。
  sourceRefs:
  - 15
  - 16
  - 22
- point: B2U 已让多个二次寿命系统投入运行，其中包括使用 Honda 电池的项目，这表明非小规模的商业部署已经在发生。
  sourceRefs:
  - 19
  - 20
- point: Google、Amazon 相关的公用事业采购，以及更早的 Nissan / Eaton 部署，都说明电池正在更接近数据中心的核心供电架构。
  sourceRefs:
  - 28
  - 29
  - 30
openQuestions:
- 到底哪一套精确文档，才能让北美数据中心的保险方和 AHJ 在不为每个项目都定制测试的情况下，批准再利用电池？
- 真实世界里，有多少 1-10 MW 的 GPU 机柜托管或 edge-AI 项目，会在公用事业升级前先购买表后储能？
- 创业公司能否在多家二次寿命供应商之间，拿到非独家的电池溯源与遥测访问权？
- 买家会接受独立的承保软件预算项，还是必须把产品打包进电池项目经济性和融资里？
