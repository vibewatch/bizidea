  pestle:
  - factor: 政治
    impact: positive
    point: DOE 支持的本土再利用产能，加上更广泛的能源韧性政策，都在帮助这个品类获得正当性。
    sourceRefs:
    - 4
  - factor: 经济
    impact: positive
    point: 创纪录的低空置率和持续加剧的电力约束，让“多快能上电”对数据中心运营商来说更有价值。
    sourceRefs:
    - 1
    - 35
  - factor: 社会
    impact: neutral
    point: AI 需求正在把买家的容忍度推向更务实的供电方案，但如果再利用电池的安全性缺乏充分文档，信任会很快崩掉。
    sourceRefs:
    - 1
    - 32
  - factor: 技术
    impact: positive
    point: 更好的遥测、衰减建模和云端 EMS，让再利用电池比几年前更容易被评分、调度和融资。
    sourceRefs:
    - 8
    - 9
    - 13
  - factor: 法律
    impact: negative
    point: 锂电消防规范审查和处理规则，会给每一个部署都带来真实摩擦，尤其是在关键设施里。
    sourceRefs:
    - 31
    - 33
    - 34
  - factor: 环境
    impact: positive
    point: 二次寿命系统先延长电池使用寿命、再进入回收，这一叙事能为 OEM 和站点业主提供更强的循环经济故事。
    sourceRefs:
    - 17
    - 26
  adoptionFrictionMatrix:
  - friction: 保险方和 AHJ 对关键站点使用再利用电池持怀疑态度
    severity: high
    affectedBuyer: 基础设施副总裁 / 业主工程师
    mitigation: 打包第三方认证证据、标准化安全假设，以及像削峰这类更保守的首批场景，再逐步走向有限备电。
    sourceRefs:
    - 6
    - 31
  - friction: 电池溯源和 SOH 差异过大
    severity: high
    affectedBuyer: 微电网 EPC / 技术买家
    mitigation: 早期部署只限制在已验证批次上，并要求供给伙伴具备丰富遥测数据。
    sourceRefs:
    - 8
    - 9
  - friction: 资本项目采购周期长
    severity: medium
    affectedBuyer: COO / 开发负责人
    mitigation: 与现有电池项目绑定销售，并通过合作方提供融资或打包式切入。
    sourceRefs:
    - 14
    - 15
  - friction: 运行时要与站点负载、电价和其他资产集成
    severity: medium
    affectedBuyer: 运营负责人
    mitigation: 采用 API-first 集成，并在真正接管调度权限前先完成 shadow-mode 验证。
    sourceRefs:
    - 13
    - 29
  - friction: 买家默认更偏好一次寿命电池或柴油
    severity: medium
    affectedBuyer: CFO / 基础设施买家
    mitigation: 先讲更快送电、更低前期成本和清晰的避免延迟经济性，而不是只讲可持续价值。
    sourceRefs:
    - 7
    - 12
    - 27
