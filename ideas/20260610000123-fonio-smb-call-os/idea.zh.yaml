problem: 多门店医美连锁为了拉动咨询线索已经投入不少获客费用，但高意向来电还是经常撞上忙碌的前台、语音信箱或缓慢的回拨队列。后续跟进又散落在电话、WhatsApp、表格和轻量预约工具里，运营团队很难看清哪些线索被救回来了，哪些已经漏掉。结果就是咨询收入流失、患者体验不稳定，而且每开一家新店，前台编制的压力就跟着往上走。
targetUser:
  primary: 欧洲 5–30 家门店、已把线索承接集中化的现金支付型医美连锁的 COO 或运营副总裁。
  secondary: 负责电话和 WhatsApp 咨询转化的增长负责人或呼叫中心经理。
  buyer: COO、运营副总裁，或创始人型经营者。
startupThesis:
  nonObviousInsight: 真正能赢的切口不是一台通用 SMB 语音机器人；当来电自动化已经够用、供应商又开始补齐 WhatsApp、邮件、CRM 和日历时，真正的控制点会变成离线生意的收入编排——这些生意依然会被未接来电直接卡住。
  beachhead: 在欧洲经营注射、皮肤和身体项目咨询漏斗、拥有 5–30 家门店、依赖付费获客且电话与 WhatsApp 混合承接的医美连锁。
  wedge: 一条“未接来电→咨询预约”工作流：接住入站电话、判断治疗意向、拉起 WhatsApp 跟进线程、给出日历档期，只把边角案例交给员工。
  whyNowCatalyst: fonio 的规模、宣称的解决率，以及它向 WhatsApp、CRM 和日历层延伸的路线图，都说明“替掉前台第一层工作”这件事，已经足够可信，值得运营方现在就合并工具。
  ventureScalePath: 先从医美诊所做起，再把同一套收入回收操作层扩到口腔、视光、宠物等高预约密度的 SMB 连锁；这些行业同样有入站需求、缺人和渠道碎片化问题。
solution: 不要做通用 SMB 助手，而是做一套医美诊所承接 OS。产品保留诊所原有电话号码，几秒内接住未接或溢出电话，抓取治疗意向，并在更容易促成咨询时把对话切到 WhatsApp。它把预约、提醒和线索状态同步回诊所现有的排班与 CRM 工具，让运营方按门店、投放活动和团队看到救回了多少收入。涉及价格例外、医疗问题或 VIP 线索时，系统始终能转人工——这样诊所可以把重复的前台流程自动化，又不用把临床建议交给 AI。
goToMarketSeed:
  firstCustomer: 一家位于 DACH 或英国、由 PE 支持的医美连锁，拥有 8–20 家门店，集中分发线索，依赖付费社媒获客，并把电话、WhatsApp 与预约工具拆开使用。
  buyingTrigger: 新店开业、未接来电审计，或付费线索 ROI 下滑，让团队第一次看清在员工回得过来之前到底漏掉了多少咨询需求。
  currentAlternative: 前台员工、外包接线服务、通用 VoIP 自动接待，以及彼此脱节的 CRM 与预约软件。
  switchingReason: 这个切口直接对上“已预约咨询”和“救回收入”，又能兼容现有电话线路和系统，同时保留人工接管例外情况的控制权。
  pricingHypothesis: 按门店收平台费，再叠加按合格咨询或已解决入站对话计费。
