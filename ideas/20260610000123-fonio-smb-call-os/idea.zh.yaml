differentiator: 大多数语音 AI 供应商卖的是单一渠道产品，诊所软件里的现有厂商卖的则是排班或 CRM 模块。这里的公司要赢，关键是拿下从“未接入站意向”到“咨询预约完成”这整个转化闭环，覆盖电话和 WhatsApp，并配上医美场景专用的线索筛选与升级模板。时间拉长以后，护城河不在语音技术本身，而在收入归因、门店级 benchmark 和通用电话或预约厂商天然攒不出来的工作流数据。
