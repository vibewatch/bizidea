topRisks:
- name: 打包攻击
  description: 电话、CRM 或诊所软件现有厂商一旦看到 ROI 被验证，可能会把基础 AI 承接功能直接打包进来。
  mitigation: 靠垂直转化分析、门店级快速上线和专为医美咨询漏斗调过的模板取胜，而不是停留在通用接听层。
- name: 工作流信任与合规
  description: 脚本出错、升级判断错误，或误触临床表述，都可能伤害患者信任并让部署直接失败。
  mitigation: 把产品严格限定在行政承接；只用批准脚本；每个门店都做抽样 QA，并保留即时人工接管。
- name: 集成熵增
  description: 诊所集团常常把电话系统、WhatsApp 账号、CRM 和排班工具混着用，价值交付速度很容易被拖慢。
  mitigation: 先吃下滩头市场里最常见的两三套技术栈，先卖“无须推倒重来”的叠加层，再逐步扩覆盖面。
