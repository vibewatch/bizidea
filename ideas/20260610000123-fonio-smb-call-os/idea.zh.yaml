jobsToBeDone:
- job: 当付费线索在下班后或前台正忙时打来电话，帮诊所运营方接住、筛选并预约咨询，把原本会掉进语音信箱的收入捞回来。
  currentAlternative: 前台接待、语音信箱、外包接线服务和次日回拨。
  successMetric: 每 100 条入站线索带来的已预约咨询数。
- job: 当需求同时从电话和 WhatsApp 进来时，帮运营负责人把跟进和升级流程跑标准化，这样新开门店时前台人头不用线性增长。
  currentAlternative: 共享收件箱、表格、割裂的预约工具和管理者手工盯盘。
  successMetric: 无需人工接手就被解决或转成预约的入站对话占比。
