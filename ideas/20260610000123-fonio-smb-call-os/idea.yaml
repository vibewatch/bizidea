problem: >-
  Multi-location aesthetic clinic groups spend heavily to generate inbound consult demand, but too many high-intent
  calls still hit busy receptionists, voicemail, or slow callback queues. Follow-up then fragments across phone,
  WhatsApp, spreadsheets, and lightweight booking tools, so operators cannot reliably tell which leads were recovered
  and which leaked away. The result is lost consult revenue, inconsistent patient experience, and rising pressure to
  add front-desk headcount every time a new location opens.
targetUser:
  primary: "COO or VP Operations at a European cash-pay aesthetic clinic group with 5-30 locations and centralized lead handling."
  secondary: "Head of Growth or contact-center manager responsible for consult conversion across phone and WhatsApp."
  buyer: "COO, VP Operations, or founder-operator."
startupThesis:
  nonObviousInsight: "The winning wedge is not a generic SMB voice bot; once call automation is good enough and vendors are adding WhatsApp, email, CRM, and calendars, the real control point becomes revenue orchestration for offline businesses that still live and die by missed inbound demand."
  beachhead: "European aesthetic clinic groups running injectables, skin, and body-treatment consult funnels across 5-30 locations, with paid acquisition and mixed phone-plus-WhatsApp intake."
  wedge: "A missed-call-to-booked-consult workflow that answers inbound calls, qualifies treatment intent, opens a WhatsApp follow-up thread, offers calendar slots, and hands only edge cases to staff."
  whyNowCatalyst: "fonio's scale, claimed resolution rates, and roadmap into WhatsApp, CRM, and calendar layers show that front-desk replacement has become credible enough for operators to consolidate tools now."
  ventureScalePath: "Start with aesthetic clinics, then expand the same revenue-recovery operating layer into dental, vision, veterinary, and other appointment-heavy SMB rollups where inbound demand, staff shortages, and channel sprawl look similar."
solution: >-
  Build a vertical operating system for aesthetic-clinic intake rather than a generic SMB assistant. The product keeps
  the clinic's existing phone numbers live, answers missed or overflow calls in seconds, captures treatment interest,
  and shifts the conversation into WhatsApp when that channel is more likely to close the consult. It syncs bookings,
  reminders, and lead state into the clinic's existing scheduling and CRM tools so operators can see recovered revenue
  by location, campaign, and staff team. Human escalation stays built in for pricing exceptions, medical questions, or
  VIP leads, which lets clinics automate the repetitive front-desk layer without trusting AI to handle clinical advice.
goToMarketSeed:
  firstCustomer: "A PE-backed DACH or UK aesthetic clinic chain with 8-20 locations, centralized lead routing, paid social acquisition, and separate phone, WhatsApp, and booking tools."
  buyingTrigger: "A new-clinic opening, missed-call audit, or deteriorating paid-lead ROI that exposes how much consult demand is leaking before staff can respond."
  currentAlternative: "Front-desk staff plus outsourced answering services, generic VoIP auto-attendants, and disconnected CRM and booking software."
  switchingReason: "The wedge maps directly to booked consults and recovered revenue, fits existing phone lines and systems, and still gives staff controlled human takeover for exceptions."
  pricingHypothesis: "Per-location platform fee plus usage-based pricing for qualified consults or resolved inbound conversations."
