differentiator: >-
  Most voice-AI vendors sell a channel product, while incumbents in clinic software sell scheduling or CRM modules.
  This company wins by owning the conversion loop from missed inbound intent to booked consult across phone and
  WhatsApp, with vertical templates for aesthetic-clinic lead qualification and escalation. Over time, the moat is not
  raw speech tech; it is revenue attribution, location-level benchmarking, and workflow data that generic telephony or
  booking vendors do not naturally accumulate.
