topRisks:
  - name: Bundle attack
    description: "Telephony, CRM, or clinic-software incumbents could bundle basic AI intake once the category proves ROI."
    mitigation: "Win on vertical conversion analytics, fast location rollouts, and templates tuned for aesthetic-clinic consult funnels rather than generic call handling."
  - name: Workflow trust and compliance
    description: "A bad script, wrong escalation, or accidental clinical claim could damage patient trust and sink deployments."
    mitigation: "Keep the product scoped to administrative intake, enforce approved scripts, sample QA every location, and maintain instant human takeover."
  - name: Integration entropy
    description: "Clinic groups often run messy combinations of phone systems, WhatsApp accounts, CRMs, and schedulers that slow time to value."
    mitigation: "Start with the two or three most common stacks in the beachhead segment and sell a no-rip-and-replace overlay before broadening coverage."
