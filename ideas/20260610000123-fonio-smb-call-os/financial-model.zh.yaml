scenarios:
  downside:
    description: 试点转化更慢、价格没有超过 $72K 集团锚点、毛利率也卡在目标以下，公司到 Y3 末仍明显亏损。
    y3RevenueK: 1188.0
    y3EbitdaK: -423.0
    cashLowPointK: 340.0
    keyAssumptionChanges:
    - Y3 末只有 18 个付费集团，而不是 25 个。
    - 已实现 ACV 大致停在每集团 $72K，原因是用量和对标加购都偏弱。
    - 由于集成长期维持定制化，毛利率最高只到 68%。
  base:
    description: 创始人主导销售拿下 5 个 Y1 集团，Y2 末扩到 15 个，Y3 末到 25 个，同时靠用量和对标把 ACV 温和抬升。
    y3RevenueK: 1606.0
    y3EbitdaK: -149.83
    cashLowPointK: 670.41
    keyAssumptionChanges:
    - 到第 12 个月上线 5 个集团，Y2 末做到 15 个。
    - 正式生产 ACV 做到研究里的 $72K 集团锚点，并在 Y3 Q4 靠用量温和升到 $84K。
    - 毛利率从 Y1 试点密集期的 45%-65%，改善到 Y3 Q4 的 72%。
  upside:
    description: 两套主流技术栈更快跑出验证，且每个诊所集团内扩张更强，公司可在下一轮融资前逼近现金流盈亏平衡。
    y3RevenueK: 1944.0
    y3EbitdaK: 120.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
    - Y3 末有 30 个付费集团，而不是 25 个。
    - 随着用量更高、高级对标挂得更早，平均 ACV 会更早来到约 $84K。
    - 上线和合规手册更快标准化，毛利率可到 74%。
sensitivity:
- variable: ARPU
  downsideCase: 正式生产阶段的 ACV 卡在接近 $65K，因为买方把它当试点软件，而不是工作流平台。
  baseCase: 核心合同做到研究里的 10 店集团 $72K 锚点，再叠加温和的用量和对标提升。
  upsideCase: 随着咨询回收收费和报表模块顺利挂上去，ACV 升到 $80K+。
  y3RevenueImpactK: -210.0
  cashImpactK: -150.0
- variable: CAC
  downsideCase: 全负担 CAC 抬到接近 $60K，因为每单都更吃创始人时间，也要做更多定制化尽调。
  baseCase: 靠创始人主导销售再加定向伙伴转介绍，CAC 稳在接近 $50K。
  upsideCase: 两套集成和 1 个渠道伙伴跑顺后，演示更可复制，CAC 可降到接近 $40K。
  y3RevenueImpactK: -40.0
  cashImpactK: -180.0
- variable: 流失率
  downsideCase: 如果信任事故增多，或归因太弱让年约续签更难，月流失率会漂到 2.0%。
  baseCase: 因为产品嵌在预约和响应时长工作流里，月流失率维持在接近 1.3%。
  upsideCase: 如果对标和多工作流扩张一起加深护城河，月流失率可改善到接近 0.8%。
  y3RevenueImpactK: -170.0
  cashImpactK: -140.0
- variable: 销售周期
  downsideCase: 试点转正式的转化跌破 50%，成交时间就会被往后拖 1-2 个季度。
  baseCase: 合格线索到付费试点维持在 30%-40%，付费试点到正式生产维持在 60%+。
  upsideCase: 两份强案例能压缩尽调周期，并把付费试点到正式生产的转化率抬到 70% 以上。
  y3RevenueImpactK: -240.0
  cashImpactK: -180.0
- variable: 毛利率
  downsideCase: 由于支持和渠道成本仍太靠人工，毛利率最高只到接近 66%。
  baseCase: 当上线范围收敛到两种技术栈组合后，毛利率能到 70%-72%。
  upsideCase: 随着实施模板和 QA 工作流稳定下来，毛利率能到 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: 招聘节奏
  downsideCase: 为了接住越来越散的实施需求，第二位工程师和第二位 AE 都得提前两个季度入场。
  baseCase: 从 Y2 Q4 起，团队维持在 7 名 FTE，同时把两套部署手册标准化。
  upsideCase: 如果产品化做得更好，公司就能把 1 个 GTM 岗位推迟到种子轮之后再招，收入也不会掉。
  y3RevenueImpactK: 40.0
  cashImpactK: -160.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[流失审计与转介绍] --> Pilots[付费试点集团]\n  Pilots --> Production[正式生产诊所集团]\n  Production --> Expansion[更多门店与更多工作流]\n  Expansion --> Revenue[订阅加使用费收入]\n  Revenue --> GrossProfit[70%+ 毛利]\n  GrossProfit --> Cash[现金与跑道]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入引擎，是诊所集团数从 5 个长到 25 个，同时混合 ACV 从试点定价一路抬到 Y3 Q4 约 $84K，并叠加用量与对标。
- checkName: 必须跑对的事
  finding: Y1 的前 5 个集团必须足够快地转正式并扩张，快到 15 个集团在 Y2 末真能对应 100+ 家上线门店，否则种子轮里程碑就会后移。
- checkName: 模型失效条件
  finding: 如果试点转正式的转化跌到约 50% 以下，或月流失率逼近 2%，在看到 Y3 Q4 盈亏平衡前，现金走势就会先滑向下行情景。
- checkName: 下一轮证明点
  finding: 只有两套集成、15 个正式生产集团、100+ 家上线门店和 1 条真实跑通的伙伴渠道都到位，Y3 Q4 接近盈亏平衡的轨迹才足以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长 124% + EBITDA 利润率 -9% = 115%
  burnMultiple: Y3 的烧钱倍数为 0.16x（从 Q4Y2 到 Q4Y3，约 $930K 新增 ARR 对应 $150K 烧钱）。
  revenuePerFte: Y3 为 $229K（垂直 SaaS 对标区间为 $200-400K）
  flags:
  - 单看切口，滩头市场规模只算中等，所以初始医美切口跑通后，能否扩到相邻工作流或相邻垂直仍然关键。
  - Y3 的 Q1-Q3 仍在烧钱，所以模型依旧依赖试点持续转正式，而不是假设销售效率突然跳升。
  - 基准情景假设两种诊所技术栈组合就能覆盖首批 25 个集团的大头；如果集成更分散，毛利率和招聘需求都会受压。
