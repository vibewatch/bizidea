slug: aesthetic-consult-recovery-os
date: '2026-06-10'
executiveSummary: 这家公司应该先从欧洲医美连锁的“咨询回收操作层”起步——这些连锁已经把承接集中起来，也能按门店量出咨询预约到底漏了多少。最好的首个客户，是一家位于 DACH 或英国、拥有 8–20 家门店、靠付费获客、把电话和 WhatsApp 分开跑的医美连锁；背后最好有一位想在不线性加前台人手的前提下继续扩张的运营负责人。第一刀要刻意收窄，不做通用 AI 前台，而是专盯四件事：接住未接或溢出电话、判断治疗意向、在合适时拉起 WhatsApp 跟进、把咨询塞回诊所现有系统完成预约，并给边角案例保留人工接管。这个范围正好卡住采购触发点：新店开业、未接来电审计，或付费线索 ROI 下滑，一旦把收入流失摊开，运营方就会动。研究也支持当下时点：AI 来电处理已经有 SMB 级规模，横向供应商也正往全渠道工作流控制延伸；但在这个场景里，真正该抢的控制点不是语音技术本身，而是医美场景的线索到预约编排。近期最硬的优势，不是宣称替掉核心诊所软件，而是把电话和 WhatsApp 两端的归因数据、门店对标和升级手册越滚越厚。市场是真需求，但单独看体量不算大；research.yaml 估算滩头市场 TAM 为 $72.0M、SAM 为 $18.0M、第 3 年 SOM 为 $1.8M，所以计划不能默认切口天然够大，必须先证明部署效率，再证明相邻场景扩张。最关键的反证风险有两个：目标连锁是否真的把承接集中在可重复的技术栈上；以及买方是否足够信任纯行政型 AI，愿意把试点转成约 $60K-$90K ARR 的正式合同。
problem:
- 多门店医美诊所为了获取咨询需求持续投钱，但高意向入站电话还是会被忙碌的前台、语音信箱和缓慢回拨漏掉，来不及转成预约。
- 后续跟进散落在电话、WhatsApp、预约工具和表格里，运营负责人既看不清到底救回了多少收入，也不得不随着门店扩张继续加前台人手。
solution:
- 部署一套叠加式咨询回收系统：接住未接或溢出电话、判断治疗意向、发起合规的 WhatsApp 跟进、给出预约档期，并只把例外情况转给员工。
- 把对话状态、预约和归因同步回诊所现有的排班与 CRM 系统，让运营方能按门店衡量咨询预约提升、流失收窄和人工接管率。
whyWeWin:
- 这条切口比通用 AI 前台更窄、也更容易量化，因为它只对着一个董事会看得懂的结果卖：把诊所已经花钱买来的入站需求，转成更多咨询预约。
- 横向语音供应商和诊所软件套件各自只占住了工作流的一部分，于是给了垂直控制点机会——把电话、WhatsApp、预约和门店级收入归因串成一条线。
- 每上线一家客户，治疗意向判断手册、升级规则和流失对标数据都会继续沉淀，这些东西比电话打包商或服务商更难快速复刻。
strategicChoices:
  beachhead: 位于 DACH 或英国、拥有 5–30 家门店、承接集中化、依赖付费获客，并同时跑电话与 WhatsApp 咨询流程的 PE 支持或独立医美连锁。
  wedgeRationale: 比起直接卖一个宽泛的诊所 AI 代理，这个切口更容易先打出证明，因为 ROI 事件又窄又清楚：把错过或延迟响应的入站需求救回成咨询预约。买方可以先在现有电话和诊所管理系统上叠一层，几周内看到咨询预约提升，等信任建立以后再谈更宽的工作流改造。
  sequencingRationale: 产品一开始该盯住接听、筛选、WhatsApp 跟进、预约同步、披露和人工接管，并且只先支持一两套主流诊所技术栈，因为信任和起效速度比功能宽度更重要。GTM 也该在前 3–5 家正式客户前保持创始人主导、用 ROI 审计推进；等上线手册和归因看板可复用之后，再加合作渠道和相邻工作流。
  notYet:
  - 通话量低、决策权分散的单店诊所
  - 替换诊所管理、EMR 或核心电话系统
  - 临床建议、治疗推荐或自动化价格例外处理
  - 在医美切口还没跑通前，就扩到口腔、视光或宠物场景
market:
  tam: 估算 TAM 为 $72.0M：按欧洲约 10,000 家医美诊所门店、每个门店每年约 $7,200 的通信与工作流软件支出测算。
  sam: 估算 SAM 为 $18.0M：对应初始滩头市场 DACH、英国、法国、意大利和西班牙约 2,500 个多门店医美点位。
  som: 估算第 3 年 SOM 为 $1.8M：按约 250 个签约门店、每个约 $7,200 ARR 测算。
  segments:
  - 已把线索承接集中化、同时跑电话和 WhatsApp 的多门店医美连锁
  - 在医美验证跑通后，可切入的高预约密度连锁，如口腔、视光和宠物集团
  buyingProcess: 内部发起人往往是 COO、运营副总裁，或负责集中前台/联络中心的人，他们直接背未接来电流失、招人压力和门店表现；真正拍板的人常常是 COO、创始人型经营者，或 PE 支持的运营方。最顺的成交路径，是由新店开业、未接来电审计或付费线索 ROI 下滑触发的付费试点，把高流量工作流里的流失直接摊在台面上。
product:
  mvp: MVP 是一层无须推倒重来的叠加系统：保留诊所现有电话号码，接住未接或溢出电话，记录治疗兴趣，发起合规的 WhatsApp 跟进，给出日历档期，并把医疗、价格或 VIP 例外转给员工。第一版只支持一两套主流诊所技术栈，且明确不碰临床建议和整套诊所管理替换。
  sixMonth: 在 6 个月内，做出 2–3 个付费试点，覆盖未接来电基线、批准脚本、电话加 WhatsApp 编排、预约同步、人工升级，以及按门店查看响应时效、救回线索和咨询预约的看板。
  twelveMonth: 在 12 个月内，至少把 3 个试点转成正式生产合同，把前 2 套诊所技术栈的上线流程标准化，并补上跨门店的流失、爽约和对标报表。
  twentyFourMonth: 在 24 个月内，先在医美场景里扩到提醒、二次预约和沉睡线索唤醒；只有当部署经济性和以归因为核心的留存被证实之后，才测试一个相邻的高预约密度垂直。
  keyBets:
  - 足够多的 8–20 家门店连锁已经把承接集中化，这样一套叠加工作流就能在同一买方名下服务多个点位。
  - 只做行政型自动化，配合明确披露和人工接管，足以拿到正式上线批准。
  - 先支持前两套主流诊所技术栈，就足够在更广泛集成之前形成可重复销售管道。
  - 从线索到预约的归因和对标数据，会比单纯“接起来”更能驱动留存。
gtm:
  wedge: 卖给多门店医美连锁的是“未接来电变咨询预约”的试点，不是通用 AI 前台，也不是整套诊所系统替换。
  channels:
  - 创始人主导直销，面向 5–30 家门店医美连锁的 COO、运营副总裁和创始人型经营者
  - 与诊所管理顾问、PE 运营合伙人和诊所软件经销商做转介合作
  - 围绕未接来电与咨询流失做 ROI 审计，把当下痛点直接变成试点商业论证
  funnelTargets: 线索→合格试点 20-30%，合格试点→付费试点 30-40%，付费试点→正式生产 60%+；在转化客户中，50%+ 能在 12 个月内把首个集团扩到更多门店。
  pricing: 先卖 3–5 家门店的付费试点，再转成年合同：按门店收平台费，并按合格咨询对话或救回的咨询预约收使用费。这个定价逻辑契合买方预算，因为产品替代的是流失的付费需求和新增前台人力；而 research.yaml 给出的支出代理也说明，只要 ROI 跑得通，每个覆盖门店每年约 $7,200 的软件价值是站得住的。
businessModel:
  revenueStreams:
  - 按门店收取年度软件订阅费
  - 按合格咨询对话或救回的咨询预约收使用费
  - 早期部署的一次性实施费与工作流配置费
  - 正式上线后追加的对标报告与更多工作流模块
  unitOfValue: 被覆盖的诊所门店，加上按使用量计费的合格入站咨询对话
  targetGrossMarginPct: 70
  expansionLevers:
  - 试点跑通后，在同一诊所集团里继续加门店
  - 在现有客户中增加提醒、二次预约和沉睡线索回收工作流
  - 出售按门店统计的流失、响应时效和咨询转化对标报告
  - 当医美操作手册可复用后，把同一操作层扩到相邻的高预约密度连锁
strategyMap:
  northStarMetric: 每个已上线门店，从未接或溢出的入站需求里额外救回的咨询预约数
  inputMetrics:
  - 在目标 SLA 内被接住的未接或溢出电话占比
  - 无需人工接手就被预约成功的合格入站对话占比
  - 相对试点前基线，每 100 条入站线索的咨询预约提升
  - 从首次入站接触到第一次有效回复的中位时间
  - 付费试点到正式生产的转化率
  moatsToBuild:
  - 覆盖电话、WhatsApp、投放来源与门店结果的线索到预约归因图谱
  - 围绕常见治疗、分期付款问题和例外处理模式的医美专用筛选与升级手册
  - 在前两套主流诊所技术栈上可重复的上线流程与对标数据集
  killCriteria:
  - 如果前 15 个合格商机里，不到 5 个同时具备集中化承接权和超过 10% 的可量化未接来电流失，说明滩头市场过于分散。
  - 如果前 4 个付费试点不能在 90 天内把每条入站线索带来的咨询预约至少抬升 15%，或把中位响应时间至少压缩 80%，说明 ROI 论证不够硬。
  - 如果在完成流失下降验证后，不到一半的付费试点转成年正式生产，说明买方对产品的信任或价值认可还不够支撑风险投资级增长。
  mermaid: "flowchart LR\n  Wedge[咨询回收切口] --> MVP[电话加 WhatsApp 叠加式 MVP]\n  MVP --> Proof[咨询预约提升证明]\n  Proof --> Expansion[多门店铺开与相邻工作流扩张]\n  Wedge --> Data[线索到预约归因数据]\n  Data --> Proof\n  Proof --> Moat[对标与工作流护城河]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 品类时点强、切口也自洽，值得继续尽调；但在技术栈集中度和以信任驱动的试点转化跑通前，判断仍应克制。
    whyBelieve: 公司盯住的是一笔可量化的收入流失，目标买方本来就在为相邻工具付费，而且可以先叠一层，不必替掉核心系统。
    whyDoubt: 滩头市场单独看体量有限，而且横向通信厂商和诊所软件套件都能打包工作流的一部分；如果部署和验证拖太久，窗口会收窄。
    nextDiligence: 确认两个已上线试点：在一套主流诊所技术栈上，咨询预约提升可量化，同时存在通往 $60K-$90K 年合同的可信路径。
  firstCustomer:
    title: DACH 或英国、已把承接集中化的医美连锁 COO 或运营副总裁
    profile: 管理 8–20 家门店，依赖付费社媒或搜索获客，把电话和 WhatsApp 跟进拆开跑；集中线索量足够高，未接来电会肉眼可见地影响咨询预约和前台配置。
    trigger: 新店开业、未接来电审计或付费线索 ROI 走弱，让团队发现当前前台流程已经来不及把入站需求救回来。
    buyer: COO 或运营副总裁
    initialContract: $15K-$25K 的 3–5 家门店付费试点，随后转成一家 10 门店集团约 $60K-$90K ARR 的合同——按门店订阅加按使用量计费的咨询回收费。
  mustBeTrue:
  - 目标诊所集团里，得有足够多客户把承接集中在可复用的技术栈上，这样一套实施模板才能在同一买方旗下覆盖多家门店。
  - 电话和 WhatsApp 的行政类自动化，得实实在在多救回足够多的已预约咨询，ROI 才能跑赢外包接线或继续加前台人手。
  - 买方得愿意接受叠加式部署，不要求先把核心诊所软件或电话服务商整套换掉。
  - 即便这类流程贴着医疗合规，披露、经批准的话术和人工接管机制也得足以换来信任。
  - 早期客户必须在 12 个月内，从一个回收工作流扩到更多门店或相邻工作流，才能撑起有吸引力的 ACV 增长。
  diligenceQuestions:
  - 现在 DACH 和英国，真正把电话和消息承接集中起来跑的 8–20 店医美集团到底有多少？
  - 在首批 50 个可触达账户里，哪些诊所技术栈组合最常见？只做两套集成够不够覆盖大头？
  - 咨询预约流失率要高到什么程度、响应速度要提升多少，买方才会把预算从加人或现有工具挪过来？
  - 在买方要求人工复核前，究竟哪些对话可以安全自动化？
  - 运营方有多常选 Pabau、Phorest、电话套餐或外包接线，而不是专门的咨询回收产品？
operatingAssumptions:
- assumption: 足够多的 8–20 家门店医美连锁已经把承接集中化，能支撑一条可重复的创始人主导销售管道。
  basis: research.yaml
  validationTest: 采访 20 位目标运营方，至少有 8 家明确表示：一个买方同时掌握多门店电话与消息承接，并共用流失 KPI。
  decisionImpact: 如果不成立，公司就得把客户进一步收缩到更大的 PE 支持集团，或转向带服务的交付，而不是可重复软件。
- assumption: 只支持一两套主流诊所技术栈，就足够覆盖第一波试点。
  basis: research.yaml
  validationTest: 在前 15 个合格账户里，至少有 10 个使用 MVP 计划支持的同两套诊所管理与电话组合。
  decisionImpact: 如果不成立，实施复杂度会上升，ICP 必须继续收窄，销售才能放量。
- assumption: 买方会信任只做行政流程的 AI——前提是脚本获批、披露清楚，并且能即时转人工。
  basis: idea.yaml
  validationTest: 在前 2 个上线试点中，做到高严重度合规/信任事故为 0，并让至少 70% 的目标对话按客户批准的自治规则完成处理。
  decisionImpact: 如果不成立，路线图就得更长时间保留人工在环，定价也要反映更重的服务成分。
- assumption: 一家 10 门店集团每年 $60K-$90K 的合同价是能接受的，因为它低于线索流失和新增前台人力的成本。
  basis: research.yaml
  validationTest: 在至少 6 份试点方案里亮出目标定价，并拿到 3 份书面确认的“试点转正式”路径，且价格不低于模型假设的年合同区间。
  decisionImpact: 如果不成立，TAM 和招聘计划都要收缩，公司可能得转向更低客单价、更高成交量的分发方式，而不是垂直企业打法。
- assumption: 除了“接起来”之外，归因和对标报告会继续驱动留存与扩张。
  basis: 运营判断
  validationTest: 到第 12 个月，至少有 2 家正式客户明确表示，之所以增加门店或新工作流，是因为看到了流失或对标报告价值。
  decisionImpact: 如果不成立，护城河就会更偏向实施速度，路线图也该下调重分析扩张的优先级。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 与多门店医美运营方做 ICP 和流失诊断访谈
  hypothesis: 最先愿意买单的，是那些已集中承接、能看见未接来电流失、又正被扩张或人手压力逼着花钱的运营负责人。
  successMetric: 完成 20 场合格访谈，其中至少 8 家账户愿意分享未接来电、响应时长或咨询预约流失的基线数据。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 在 2-3 家共创客户处做人工代跑式未接来电回收审计
  hypothesis: 哪怕先用半人工流程，结合通话日志和 WhatsApp 跟进，也能量出足够大的咨询回收机会，支撑付费试点。
  successMetric: 两家买方拿到 ROI 基线，且至少一家签下付费试点方案。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在一套主流诊所技术栈上上线首个叠加式 MVP
  hypothesis: 产品无需替换核心系统，也能在 8 周内上线，并安全自动化大多数低风险承接对话。
  successMetric: 首个付费试点在 8 周内上线，且第一个月平台处理的目标对话占比至少达到 60%。
  owner: 产品与实施负责人
- horizon: 90–180 天
  experiment: 在 6 家合格买方里测试试点包装和定价
  hypothesis: 比起免费验证项目或按席位收费，买方会更偏好带咨询回收 KPI 的明确定价付费试点。
  successMetric: 按目标价格签下两单付费试点，且有一位买方预先认可与咨询预约提升挂钩的年度转正式框架。
  owner: 创始人/CEO
- horizon: 180–360 天
  experiment: 补上第二套诊所技术栈集成，并比较实施成本
  hypothesis: 支持第二套主流技术栈，能明显扩大可触达管道，同时不会让上线复杂度翻倍。
  successMetric: 第二套技术栈上的一单试点在 10 周内上线，且平均实施工作量上升不超过 30%。
  owner: 创始工程师
- horizon: 180–540 天
  experiment: 和顾问、分销商或 PE 运营网络测试一条伙伴驱动分发路径
  hypothesis: 只要首个正式生产案例能证明流失下降，行业伙伴就能带来意图更高的机会。
  successMetric: 伙伴来源机会占合格管道至少 20%，并产出一单签约试点。
  owner: 战略合作负责人
operations:
- 在承诺大范围自动化前，先围绕一套披露文案库、一套升级分类和每周 KPI 复盘，把上线流程标准化。
- 产品范围只守行政承接和预约，医疗、定价和 VIP 例外情况一律保留即时人工接管。
- 把电话、WhatsApp 和诊所管理系统集成当成受控运营面来管——支持层级写清楚，只做叠加式部署，不做整套替换。
- 每周都要抽检对话质量和咨询预约归因；一旦信任出问题，这个品类死得会比模型出错更快。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 在采购路径还没定型前，亲自扛创始人主导销售、试点设计、定价和首批运营方/合作伙伴关系。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭建电话编排、WhatsApp 工作流、预约同步和审计控制，决定试点能不能又快又稳地上线。
- role: 产品与实施负责人
  startTiming: 第 1 个月
  rationale: 把一单一案的部署磨成可复用的上线手册，并让路线图始终围着运营方的起效速度排优先级。
- role: 诊所运营与合规专员
  startTiming: 第 3 个月
  rationale: 负责话术审批、升级政策、QA 复核，以及这类贴着医疗流程的买方信任要求。
- role: 战略客户经理
  startTiming: 第 9 个月
  rationale: 只有首个正式生产案例跑出来、试点转正式路径也写清楚后，才加销售产能。
milestones:
- horizon: 0–12 个月
  items:
  - 第 3 个月：完成 20 场买方访谈、2-3 次人工代跑式审计，并拿到第一版流失基线数据集
  - 第 6 个月：在首个诊所技术栈组合上上线 MVP，打通电话、WhatsApp、预约同步和人工接管控制
  - 第 9 个月：把首批 2 个付费试点转成正式生产合同，并量出咨询预约提升
  - 第 12 个月：做到 5 个正式生产诊所集团，并把前 2 套技术栈组合的上线流程标准化
- horizon: 12–24 个月
  items:
  - 第 18 个月：上线门店数超过 100 家，并证明能从一个工作流稳定扩到提醒或再预约
  - 第 21 个月：建起 1 条能稳定出单的顾问、分销商或 PE 运营伙伴渠道
  - 第 24 个月：把对标报表做到成熟，能按门店比较流失、响应时长和转化
- horizon: 24–36 个月
  items:
  - 第 30 个月：在现有医美客户里上线一个相邻工作流，比如沉睡线索激活或再预约
  - 第 33 个月：用同一套咨询回收架构，测试一个相邻的重预约垂直
  - 第 36 个月：逼近 250 个签约门店；如果扩张效率仍然太差，就停止追逐独立垂直规模
risks:
- risk: 即便范围只限行政流程，买方也可能不信任 AI 参与面向患者的对话。
  likelihood: Medium
  impact: High
  mitigation: 范围只做行政流程；脚本和披露必须先获批；每周抽样 QA；边角案例保留即时人工接管。
- risk: 电话、WhatsApp、CRM 与预约系统之间的集成熵增，可能让上线过程过于定制化。
  likelihood: High
  impact: High
  mitigation: MVP 只支持前两套主流技术栈组合，先卖无须推倒重来的叠加层，再扩覆盖。
- risk: 电话、诊所软件或 AI 接待员现有厂商，可能把基础咨询回收功能直接打包进来。
  likelihood: High
  impact: Medium
  mitigation: 别在“能不能接起来”上打，而要靠线索到预约归因、医美专用操作手册和更快的多门店部署来拉开差距。
- risk: 滩头市场可能过小或过于分散，撑不起风险投资级的客户数增长。
  likelihood: Medium
  impact: High
  mitigation: 先用早期调研验证承接集中度；只有在医美操作手册被证明后，再扩到相邻的高预约密度整合赛道。
- risk: 归因噪音可能太大，导致收入回收证明出得不够快，无法推动试点转正式。
  likelihood: Medium
  impact: Medium
  mitigation: 上线前先打好流失基线，把看板绑在咨询预约和响应时效上，并把试点收窄到一个高流量工作流，确保前后对比干净。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 融资目标是换来 18 个月跑道：证明前 3–5 个付费试点，至少把 5 家诊所集团转成正式生产，做出前两套诊所技术栈集成，并把归因、合规和部署重复性打到足以支撑种子轮扩张。
