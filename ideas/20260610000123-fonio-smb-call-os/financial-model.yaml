scenarios:
  downside:
    description: Slower pilot conversion, no pricing uplift beyond the $72K group anchor, and margin capped below target keep the company meaningfully loss-making through Y3.
    y3RevenueK: 1188.0
    y3EbitdaK: -423.0
    cashLowPointK: 340.0
    keyAssumptionChanges:
      - Y3 exits at 18 paying groups instead of 25.
      - Realized ACV stays flat at about $72K per group with less usage and benchmark upsell.
      - Gross margin only reaches 68% because integrations stay bespoke longer.
  base:
    description: Founder-led sales converts five Year-1 groups, scales to 15 by end-Y2, and reaches 25 groups by end-Y3 while modest usage and benchmarking expand ACV.
    y3RevenueK: 1606.0
    y3EbitdaK: -149.83
    cashLowPointK: 670.41
    keyAssumptionChanges:
      - Five groups are live by Month 12 and 15 by end-Y2.
      - Production ACV reaches the researched $72K group anchor and rises modestly with usage to $84K in Q4Y3.
      - Gross margin improves from pilot-heavy 45%-65% in Y1 to 72% in Q4Y3.
  upside:
    description: Faster proof on two dominant stacks and stronger expansion inside each clinic group push the company near cash-flow breakeven before the next round.
    y3RevenueK: 1944.0
    y3EbitdaK: 120.0
    cashLowPointK: 720.0
    keyAssumptionChanges:
      - Y3 exits at 30 paying groups instead of 25.
      - Average ACV reaches about $84K earlier through higher usage and premium benchmarking attach.
      - Gross margin reaches 74% as onboarding and compliance playbooks standardize faster.
sensitivity:
  - variable: ARPU
    downsideCase: Production ACV stalls near $65K because buyers treat the product as pilot software rather than a workflow platform.
    baseCase: Core contracts reach the researched $72K 10-location anchor with modest usage and benchmark uplift.
    upsideCase: ACV reaches $80K+ as recovered-consult fees and reporting modules attach cleanly.
    y3RevenueImpactK: -210.0
    cashImpactK: -150.0
  - variable: CAC
    downsideCase: Fully loaded CAC rises toward $60K because each deal needs more founder time and bespoke diligence.
    baseCase: CAC holds near $50K through founder-led selling plus targeted partner referrals.
    upsideCase: CAC falls toward $40K once two integrations and one channel partner make demos more repeatable.
    y3RevenueImpactK: -40.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: Monthly churn drifts to 2.0% if trust incidents or weak attribution make annual renewals harder.
    baseCase: Monthly churn stays near 1.3% because the product sits inside booking and response-time workflows.
    upsideCase: Monthly churn improves toward 0.8% if benchmarking and multi-workflow expansion deepen the moat.
    y3RevenueImpactK: -170.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: Pilot-to-production conversion slips below 50% and pushes closes back by one to two quarters.
    baseCase: Qualified pilot to paid pilot stays in the 30-40% band and paid pilot to production stays at 60%+.
    upsideCase: Two strong case studies compress diligence and raise paid pilot to production conversion above 70%.
    y3RevenueImpactK: -240.0
    cashImpactK: -180.0
  - variable: gross margin
    downsideCase: Gross margin tops out near 66% because support and channel costs stay too manual.
    baseCase: Margin reaches 70%-72% once onboarding narrows to two stack combinations.
    upsideCase: Margin reaches 75% as implementation templates and QA workflows stabilize.
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: hiring pace
    downsideCase: The second engineer and second AE are both pulled forward by two quarters to handle implementation sprawl.
    baseCase: Hiring stays at 7 FTE from Q4Y2 onward while the team standardizes two deployment playbooks.
    upsideCase: Better productization lets the company defer one GTM hire until after seed with no revenue slip.
    y3RevenueImpactK: 40.0
    cashImpactK: -160.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Leakage audits and referrals] --> Pilots[Paid pilot groups]
      Pilots --> Production[Production clinic groups]
      Production --> Expansion[More locations and workflows]
      Expansion --> Revenue[Subscription plus usage revenue]
      Revenue --> GrossProfit[70%+ gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from growing from 5 to 25 clinic groups while blended ACV steps from pilot pricing to roughly $84K in Q4Y3 through usage and benchmarking.
  - checkName: Must go right
    finding: The first five Year-1 groups must convert and expand quickly enough that 15 groups imply 100+ live locations by end-Y2, or the seed milestone slips.
  - checkName: Model breaks if
    finding: If pilot-to-production conversion falls below roughly 50% or churn approaches 2% monthly, cash trends toward the downside case before Q4Y3 breakeven appears.
  - checkName: Next-round proof
    finding: The next financing is justified once two integrations, 15 production groups, 100+ live locations, and one real partner channel make the Q4Y3 near-breakeven trajectory credible.
sanityChecks:
  ruleOf40: Y3 growth 124% + EBITDA margin -9% = 115%
  burnMultiple: Y3 burn multiple 0.16x ($150K burn on roughly $930K of net new ARR from Q4Y2 to Q4Y3).
  revenuePerFte: $229K Y3 (benchmark $200-400K vertical SaaS)
  flags:
    - The beachhead is only moderately large on a standalone basis, so adjacent workflows or verticals still matter after the initial aesthetic wedge is proven.
    - Q1-Q3 Y3 remain cash-burning, so the model still depends on continued pilot-to-production conversion rather than assuming a sudden sales-efficiency jump.
    - The base case assumes two clinic-stack combinations cover enough of the first 25 groups; broader integration sprawl would pressure both gross margin and hiring needs.
