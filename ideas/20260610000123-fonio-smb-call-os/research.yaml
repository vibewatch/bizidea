    - 34
    - 38
  "willingnessToPay":
    "summary": "Public pricing pages show that clinics and SMB operators already buy multiple adjacent tools: fonio starts at €85/month, RingCentral shows plans starting at $39 and $60 tiers, Quo starts at $19 per user per month, Smith.ai sells receptionist plans, Pabau Starter starts at £50/month, and Phorest is quote-based. The budget argument is therefore consolidation plus measurable revenue recovery, not a net-new line item."
    "sourceRefs":
