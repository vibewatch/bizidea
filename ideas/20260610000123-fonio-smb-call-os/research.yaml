  "regulatoryLandscape": "The product sits in a manageable but real compliance zone. GDPR and the European Commission data-protection framework govern personal-data handling; EDPB guidance highlights added care around health-related data; PECR constrains electronic marketing and outreach; and WhatsApp requires approved templates and policy-compliant messaging behavior. The safest launch scope is therefore administrative intake, scheduling, reminders, and escalation rather than clinical advice [12, 13, 14, 15, 16, 17, 18, 19, 21]."
  "technologyLandscape": "The core stack is ready. Meta exposes WhatsApp Business platform primitives, pricing, marketing-message flows, and templates; Twilio exposes voice and healthcare-friendly communications primitives; and horizontal vendors already ship AI receptionists, call summaries, and AI phone agents. The hard problem is orchestration, integration, and safe handoff design, not raw channel access [16, 17, 18, 19, 20, 21, 22, 23, 24, 26]."
