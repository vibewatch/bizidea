  "competitiveLandscape": "Competition is fragmented across four layers. fonio, Quo, and Smith.ai validate AI receptionist demand for SMBs [1, 2, 28, 29]. RingCentral, Dialpad, and Aircall bundle AI into broader communications stacks [23, 24, 25, 26, 27]. Pabau, Phorest, Zenoti, Fresha, and AestheticsPro already own clinic scheduling, CRM, charting, and reputation workflows [30, 31, 32, 35, 36, 37, 38, 39]. That fragmentation leaves room for a vertical control point focused specifically on consult-recovery orchestration for aesthetic groups rather than generic calling or generic practice management [31, 34, 36, 40]."
