competitors:
- name: fonio.ai
  stage: 扩张期
  wedge: 面向 SMB 的 AI 电话助手，正朝全渠道 AI 操作系统扩张。
  pricing: €85/月起。
  strength: 品类原生增长很快、通话量验证强，且路线图已不止停在语音。
  weaknessVsUs: 横向 SMB 定位，给更深的医美专属咨询回收工作流和归因层留了空间。
  sourceRefs:
  - 1
  - 2
  - 4
- name: RingCentral
  stage: 现有厂商
  wedge: AI 接待员，加上一整套 UCaaS/CCaaS 捆绑包。
  pricing: 核心套餐约从 $39 起，更高阶的 AI / 联络中心层级价格更高。
  strength: 分发强、打包能力强，电话基础也成熟。
  weaknessVsUs: 在医美场景的资格判断、咨询编排和诊所工作流语境上都不够深。
  sourceRefs:
  - 24
  - 25
- name: Dialpad
  stage: 现有厂商
  wedge: AI 虚拟接待员、AI 电话代理和 AI 联络中心平台。
  pricing: 分层定价，高价值的 AI / 联络中心模块另行上探。
  strength: 原生 AI 通信栈很强，语音工作流也具备企业级就绪度。
  weaknessVsUs: 横向联络中心导向，并不是专为医美咨询回收打造。
  sourceRefs:
  - 26
  - 27
- name: Pabau
  stage: 扩张期
  wedge: 服务医美和轻医美诊所的诊所管理系统，覆盖线索管理、多门店控制和爽约工具。
  pricing: 入门套餐 £50/月起，往上还有附加模块和更高档位。
  strength: 深度占住垂直诊所工作流，对轻医美运营的贴合度也很清楚。
  weaknessVsUs: 它还没把自己定位成电话加消息场景下默认的 AI 语音与未接来电回收层。
  sourceRefs:
  - 30
  - 31
  - 32
  - 33
  - 34
- name: Phorest
  stage: 扩张期
  wedge: 面向医美诊所的软件，覆盖预约、聊天、AI 功能和多门店报表。
  pricing: 报价制。
  strength: 在诊所体验、排班、口碑和多门店报表上都很贴合。
  weaknessVsUs: 它不够电话优先，也没那么聚焦“未接来电到咨询预约”这条特定闭环。
  sourceRefs:
  - 35
  - 36
  - 37
  - 38
  - 39
