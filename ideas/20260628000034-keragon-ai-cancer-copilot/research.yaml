  coverageGap: This workflow can support a large evidence base, but the run still stopped below the 100-source target because a meaningful share of otherwise-relevant material was not credibly fetchable in-run or was repetitive after deduplication. High-value pages on HHS HIPAA, Mayo, Moffitt, City of Hope, Johns Hopkins, some NCCN assets, Becker's, and selected BusinessWire or publisher pages were blocked, timed out, or gated, and many additional center pages repeated the same marketing claims without adding new decision-useful facts. The retained corpus therefore favors distinct verified pages across government, standards, academic programs, peer-reviewed evidence, and adjacent vendors rather than padding with thin duplicates.
