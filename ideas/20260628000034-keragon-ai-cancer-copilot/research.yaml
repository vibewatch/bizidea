  geographicConsiderations:
  - point: The wedge is U.S.-first because the customer set, interoperability rules, and evidence base are concentrated around U.S. cancer centers and health-IT policy.
    sourceRefs:
    - 1
    - 15
    - 16
    - 17
  - point: Remote second-opinion programs widen geography, so the startup should expect national referral capture rather than only local catchment growth.
    sourceRefs:
    - 33
    - 50
    - 63
  sensitivityCases:
  - case: Volume concentrates in only the top tier of centers
    impact: If only a narrow slice of academic programs has enough complex external referrals, early SAM is smaller and sales must stay highly concentrated.
    sourceRefs:
    - 1
    - 50
    - 53
    - 58
  - case: Interoperability remains patchy in real life
    impact: If FHIR and EHI access still leave too much manual chasing for pathology, imaging, and PDFs, deployment time and gross margin both worsen.
    sourceRefs:
    - 15
    - 16
    - 17
    - 18
    - 19
  - case: Discordance is concentrated in pathology-heavy rare cancers
    impact: The best first product may need to stay tightly focused on lymphoma, sarcoma, and similar disease lines before broadening across oncology.
    sourceRefs:
    - 26
    - 27
    - 28
    - 30
  - case: Generalist documentation vendors move upstream
    impact: If ambient vendors bundle stronger pre-chart synthesis, differentiation shifts toward external data reconciliation, auditability, and disease-specific conflict logic.
    sourceRefs:
    - 34
    - 81
    - 82
  validationPlan:
  - priority: high
    question: Can the product cut median time from referral arrival to specialist-ready case packet by at least 50%?
    evidenceToGather: Time-stamped before and after workflow data on record collection, case summarization, and first specialist review across one lymphoma or sarcoma pathway.
  - priority: high
    question: How often does a disagreement map change the questions specialists ask or reduce unnecessary escalation?
    evidenceToGather: Pilot data on cases with modified workup, avoided repeat imaging or therapy, and documented management changes after expert review.
  - priority: medium
    question: What percentage of eligible cases arrive with enough digital imaging, pathology, and notes to automate effectively?
    evidenceToGather: Intake audit by source system, file type, and missing-data category across a month of external referrals.
  - priority: medium
    question: Which buyer actually captures the first-year ROI—the center, a self-pay program, or an employer or payer partner?
    evidenceToGather: Pricing interviews tied to current second-opinion program economics, employer contracts, and coordinator staffing models.
