openQuestions:
- How many eligible external referrals per month do the top 20 NCI or NCCN centers actually process in lymphoma, sarcoma, and other disagreement-heavy cancers?
- What proportion of cases arrive with digital pathology and image access versus only PDF reports, and how much manual chasing remains even after TEFCA and FHIR APIs?
- What liability language and human-review checkpoints do CMOs require before allowing AI-generated disagreement maps into pre-consult workflow?
- 'Which party captures the earliest ROI in practice: the cancer center, a self-pay second-opinion program, or an employer or payer partner?'
