  adoptionFrictionMatrix:
  - friction: Outside records, imaging, pathology, and patient-generated data arrive in heterogeneous formats.
    severity: high
    affectedBuyer: CIO or second-opinion program director
    mitigation: Start with coordinator-assisted intake and patient upload, then layer FHIR, HL7, PACS, and structured oncology connectors for the highest-volume sources first.
    sourceRefs:
    - 17
    - 18
    - 19
    - 76
  - friction: Clinicians may fear liability or over-trust if the output looks diagnostic rather than preparatory.
    severity: high
    affectedBuyer: CMO or physician champion
    mitigation: Keep the product focused on evidence assembly, missing-data flags, and question packs with explicit human sign-off and traceability.
    sourceRefs:
    - 24
    - 34
    - 63
  - friction: Navigator teams are already overloaded and will reject tools that add manual data entry.
    severity: high
    affectedBuyer: Navigation lead
    mitigation: Measure saved prep time, auto-ingest documents whenever possible, and show fewer duplicated handoffs rather than more clicks.
    sourceRefs:
    - 40
    - 42
    - 78
  - friction: Budget owners may struggle to map software spend to reimbursable revenue quickly.
    severity: medium
    affectedBuyer: VP Oncology Service Line
    mitigation: Anchor ROI to explicit second-opinion pricing, coordinator productivity, employer or payer referral growth, and reduced low-value escalations.
    sourceRefs:
    - 51
    - 53
    - 72
market:
  tam:
    value: $55.5M
    rationale: 74 NCI-designated cancer centers x modeled 1,000 complex referral or discordance-prep cases per center-year x $750 software value per case = $55.5M; 1,000 cases per center is below the roughly 1,351 rare-cancer diagnoses implied by 400,000 annual diagnoses across 74 centers and a 25% rare-cancer share.
    isEstimate: true
    sourceRefs:
    - 1
    - 8
    - 51
    - 53
  sam:
    value: $22.5M
    rationale: Beachhead SAM models 25 high-volume programs with visible remote or online second-opinion infrastructure x 1,200 eligible complex cases per year x $750 per case = $22.5M.
    isEstimate: true
    sourceRefs:
    - 1
    - 50
    - 51
    - 53
    - 58
    - 63
  som:
    value: $3.6M
    rationale: Year-3 reachable share assumes 6 landed centers x 800 live cases per year x $750 per case = $3.6M, which is materially below current self-pay second-opinion fee levels.
    isEstimate: true
    sourceRefs:
    - 50
    - 51
    - 53
    - 58
    - 72
