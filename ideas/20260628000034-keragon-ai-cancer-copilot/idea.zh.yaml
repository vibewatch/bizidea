problem: >-
  罕见癌症二次会诊项目至今仍以 PDF、门户截图、影像报告和分散在各系统间的患者
  记录处理生死攸关的转诊，而专科医生可能对化疗方案或残留病灶的判断截然相反。
  协调员和临床医生在治疗开始或升级之前，要花费宝贵的数天时间重建病例时间线、
  梳理相互矛盾的建议，以及确定哪些问题真正关键。这种延误既抬高了过度治疗风险，
  又耗费了高成本肿瘤学人力，还让患者在人生最艰难的时刻经历一片混乱。
targetUser:
  primary: "美国 NCI 指定癌症中心二次会诊与转诊运营负责人——这些中心接收来自社区肿瘤科医生的复杂淋巴瘤、肉瘤及其他罕见癌症转诊。"
  secondary: "同一中心内的肿瘤多学科委员会协调员、肿瘤护理导航员及专科医生。"
  buyer: "肿瘤服务线副总裁、首席医疗官，或癌症二次会诊项目主任"
startupThesis:
  nonObviousInsight: >-
    这个赛道的第一个赢家不太可能是一个自主诊断模型，而是一个运营层——在肿瘤委员会
    或二次会诊之前，把碎片化的患者证据转化为临床医生可直接使用的分歧图谱、缺失数据
    清单和问题包。
  beachhead: >-
    美国学术癌症中心及大型区域肿瘤网络中设有专属二次会诊项目的机构，主要针对淋巴瘤、
    肉瘤及其他治疗方案易存在分歧的罕见或侵袭性癌症，切入点是来自社区诊所、缺乏结构化
    病历的外部转诊。
  wedge: >-
    一个病例整合与分歧识别助手，能摄取外部病历、可穿戴趋势、影像报告、病理笔记和
    症状病史，在首次会诊前输出统一的诊疗时间线、标注建议冲突并起草专科医生问题包。
  whyNowCatalyst: >-
    Keragon 案例证明，通用 AI 加上患者自生成数据，现已能在复杂癌症工作流程中实质性
    提升问诊质量；而漏掉替代解释所付出的代价，可能是不必要的化疗或放疗。
  ventureScalePath: >-
    从高价值肿瘤学二次会诊起步，逐步扩展至院内肿瘤多学科委员会准备、付款方与雇主
    癌症导航证据包、社区向学术机构的转诊接收，最终延伸至其他多模态证据与专家分歧
    共同驱动延误和成本的专科决策领域。
solution: >-
  Oncology Discordance Copilot 接入文件检索通道、患者上传、影像报告文本、实验室数据
  及可选的可穿戴或症状数据，在专科医生接触病历之前建立一份完整的纵向病例档案。产品
  本身不诊断癌症——它的作用是整理证据、识别缺失病历、对比既往意见中的治疗建议，并
  标记值得针对性追问而非盲目升级治疗的模糊随访发现。协调员获得一个针对不完整或存在
  矛盾病例的工作队列，而医生则会收到一份包含时间线、未解决冲突和患者专属问题的简短
  会诊简报。首个模块作为二次会诊运营软件出售，既能降低监管风险，又能节省临床医生时间
  并减少可避免的过度治疗。
goToMarketSeed:
  firstCustomer: >-
    每月接收 50 个以上淋巴瘤、肉瘤或其他罕见癌症外部二次会诊转诊，且已配备专职护理
    导航员或肿瘤委员会协调员的 NCI 指定美国癌症中心或大型区域肿瘤网络。
  buyingTrigger: >-
    某中心启动或扩大虚拟二次会诊项目、签署新的雇主或付款方转诊合同，或转诊量增长到
    专科医生正在等待病历整合而非进行临床评审的程度。
  currentAlternative: >-
    护理导航员手动追档、PDF 包拼装、医生对外部病历的临时评审，以及无法梳理分歧或
    缺失证据的通用笔记工具。
  switchingReason: >-
    切口缩短了从转诊到会诊的准备时间，将零散的外部病历转化为结构化的分歧简报，使专
    科医生时间更高效——这是手动协调和通用文档工具无法做到的。
  pricingHypothesis: >-
    年度平台最低费用加按转诊案例计费，并为肿瘤委员会工作流及雇主或付款方转诊通道
    提供高级模块溢价。
