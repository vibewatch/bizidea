differentiator: >-
  这不是通用患者聊天机器人，也不是另一款面向诊所的 LLM 病历摘要工具。产品专为
  一个痛苦的工作流而打造：外部癌症转诊病历碎片化、既往专家意见相互矛盾、下一个
  决策可能将患者锁定在数月毒性治疗中。随着时间推移，护城河来自病例整合集成、
  分歧解决数据集，以及一张专有图谱——记录哪些证据缺口和冲突模式真正改变了最终
  的肿瘤学决策。
