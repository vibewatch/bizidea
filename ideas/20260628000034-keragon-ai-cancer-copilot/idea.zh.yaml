topRisks:
  - name: "临床责任顾虑"
    description: "癌症中心可能担心任何接触治疗工作流的 AI 一旦被临床医生过度信任，都会带来医疗法律风险。"
    mitigation: "将首款产品聚焦于证据整合和问题生成，每个环节都要求人工审批，并发布工作流审计轨迹而非诊断声明。"
  - name: "初始证据基础薄弱"
    description: "信号来源有力，但仅来自一个创始人案例，若问题的实际发生频率或预算规模低于预期，采纳速度可能放缓。"
    mitigation: "选择已在营销二次会诊服务的中心开展试点，衡量病例准备时间和决策延误缩短情况，重点聚焦于痛点最易证明的转诊量大的罕见癌症项目。"
  - name: "集成阻力"
    description: "外部肿瘤病历跨越门户、PDF、影像报告和病理系统，可能拖慢实施进度并压低早期 ROI。"
    mitigation: "从轻量级患者上传和协调员上传工作流起步，只有在证明一条窄转诊通道的价值后，才添加更深入的检索集成。"
