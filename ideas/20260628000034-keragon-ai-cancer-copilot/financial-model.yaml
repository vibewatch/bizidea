modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Target cancer centers] --> Pilots[90-day paid pilots]
      Pilots --> LiveCenters[Production centers]
      LiveCenters --> Cases[Eligible referral cases]
      Cases --> Revenue[Platform + case-fee + module revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Runway and next-round timing]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from converting two paid pilots into 6 live centers by Q4Y3 and expanding mature-center annualized revenue toward about $600K through case fees and early module upsells.
- checkName: Must go right
  finding: The company must keep pilot-to-production timing near the 6-month base case because sales-cycle slippage is the largest single hit to both Y3 revenue and cash runway in the sensitivity table.
- checkName: Model breaks if
  finding: If mature-center ARPU stays nearer $500K or gross margin slips to 67%, the downside case pushes cash below zero before the next round closes.
- checkName: Next-round proof
  finding: The next financing is justified once the team proves roughly $1.2M ARR by month 18 and then shows a repeatable path from 4 live centers to 6 live centers with module expansion.
sanityChecks:
  ruleOf40: Y3 growth 108.8% + EBITDA margin -40.3% = 68.5%.
  burnMultiple: Burn multiple improves from about 1.3x in Y2 to about 0.6x in Y3 as exit ARR grows from roughly $1.8M to $3.6M while headcount rises only from 12 to 13 FTE.
  revenuePerFte: '$207.2K Y3 using 13 exit FTE (A22 benchmark: $200K-$400K healthcare / enterprise SaaS).'
  flags:
  - The base case requires mature-center revenue to reach roughly $600K annualized by Y3 exit, which is meaningfully above the entry platform minimum and therefore depends on case-fee and module expansion materializing.
  - Cash still falls to about $422K by Y3 exit while EBITDA remains negative, so the company still needs a timely Series A rather than assuming self-funding from operations.
  - Revenue concentration is high because only 6 centers drive the full Y3 plan; one delayed flagship account would materially change both ARR and runway.
