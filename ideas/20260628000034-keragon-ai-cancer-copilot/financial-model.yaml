scenarios:
  downside:
    description: One pilot slips, production approvals take closer to 9 months than 6, and mature-center revenue lands nearer $500K annualized instead of the base-case $600K exit level.
    y3RevenueK: 2235.0
    y3EbitdaK: -1490.0
    cashLowPointK: -190.0
    keyAssumptionChanges:
    - Q4Y3 ends with 5 live centers instead of 6.
    - Exit annualized ARPU per mature center lands near $500K instead of $600K because employer/payer and tumor-board upsells slip.
    - Gross margin holds near 67% because manual record chasing and services stay heavier for longer.
  base:
    description: Two paid pilots convert into 4 live centers by the end of Y2 and 6 live centers by Q4Y3, with case-fee expansion and the first module upsells lifting the exit run rate to about $3.6M ARR.
    y3RevenueK: 2693.0
    y3EbitdaK: -1084.6
    cashLowPointK: 422.0
    keyAssumptionChanges:
    - M18 reaches roughly $100K monthly revenue, which is the modeled $1.2M ARR proof point in the business plan.
    - Q4Y2 ends with 4 live centers and Q4Y3 ends with 6 live centers, matching the plan’s 6+ center milestone.
    - Blended exit annualized revenue per center reaches about $600K through case-fee expansion plus tumor-board or employer/payer module adoption at early flagship accounts.
  upside:
    description: Pilot-to-production conversion compresses, one extra center lands by late Y3, and module attach happens a quarter earlier without needing materially more headcount.
    y3RevenueK: 3275.0
    y3EbitdaK: -690.0
    cashLowPointK: 780.0
    keyAssumptionChanges:
    - Q3Y3 reaches 6 live centers and Q4Y3 exits at 7 instead of 6.
    - Exit annualized ARPU per mature center moves toward $650K-$675K as two accounts expand faster into higher-volume pathways.
    - Gross margin improves to about 72% as onboarding templates and integrations become more repeatable.
