modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Target cancer centers] --> Pilots[90-day paid pilots]
      Pilots --> LiveCenters[Production centers]
      LiveCenters --> Cases[Eligible referral cases]
      Cases --> Revenue[Platform + case-fee + module revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Runway and next-round timing]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自将两个付费试点转化为第 3 年 Q4 的 6 个在线中心，案例费扩展加上早期模块追加销售将成熟中心年化收入推向约 $600K。
- checkName: 必须做对的事
  finding: 公司必须将试点转化时间维持在接近 6 个月的基准情景，因为销售周期延误是敏感性表中对第 3 年收入和现金跑道影响最大的单一因素。
- checkName: 模型崩溃条件
  finding: 若成熟中心 ARPU 维持在约 $500K 或毛利率下滑至 67%，下行情景将在下一轮关闭前将现金推至零以下。
- checkName: 下一轮融资验证条件
  finding: 一旦团队在第 18 个月证明约 $1.2M ARR，并展示从 4 个在线中心扩展至 6 个中心、同时叠加模块扩展的可复制路径，即可合理启动下一轮融资。
sanityChecks:
  ruleOf40: 第 3 年增速 108.8% + EBITDA 利润率 -40.3% = 68.5%。
  burnMultiple: 消耗倍数从第 2 年约 1.3x 改善至第 3 年约 0.6x——退出 ARR 从约 $1.8M 增至 $3.6M，而人员仅从 12 人增至 13 人。
  revenuePerFte: '第 3 年人均收入 $207.2K，使用 13 名退出 FTE（A22 基准：医疗/企业 SaaS $200K–$400K）。'
  flags:
  - 基准情景要求成熟中心年化收入在第 3 年退出时达到约 $600K，这明显高于入门平台最低费用，因此依赖案例费和模块扩展的实际落地。
  - 第 3 年退出时现金仍降至约 $422K 而 EBITDA 仍为负，公司仍需及时完成 A 轮，而非假设能从运营中自给自足。
  - 收入集中度高，6 个中心驱动全部第 3 年计划；任何一个旗舰客户延期都会对 ARR 和资金跑道产生实质影响。
