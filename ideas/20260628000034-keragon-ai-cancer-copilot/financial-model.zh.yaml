scenarios:
  downside:
    description: 一个试点延期，正式审批接近 9 个月而非 6 个月，成熟中心年化收入落在约 $500K 而非基准情景的 $600K 退出水平。
    y3RevenueK: 2235.0
    y3EbitdaK: -1490.0
    cashLowPointK: -190.0
    keyAssumptionChanges:
    - Q4Y3 以 5 个在线中心结束，而非 6 个。
    - 每个成熟中心退出年化 ARPU 约 $500K（因雇主/付款方和肿瘤委员会追加销售延期，低于 $600K）。
    - 毛利率维持约 67%，因手动病历追踪和服务更重持续更久。
  base:
    description: 两个付费试点在第 2 年末转化为 4 个在线中心，第 3 年 Q4 达到 6 个，案例费扩展和首批模块追加销售将退出运行率推至约 $3.6M ARR。
    y3RevenueK: 2693.0
    y3EbitdaK: -1084.6
    cashLowPointK: 422.0
    keyAssumptionChanges:
    - 第 18 个月达到约 $10 万月收入，即商业计划中 $1.2M ARR 的验证节点。
    - Q4Y2 末 4 个在线中心，Q4Y3 末 6 个，与计划的 6 个以上中心里程碑吻合。
    - 早期旗舰客户通过案例费扩展和肿瘤委员会或雇主/付款方模块采纳，每中心混合年化收入退出约 $600K。
  upside:
    description: 试点转化压缩，一个额外中心在第 3 年末落地，模块附加比基准情景提前一季度，无需显著增加人员。
    y3RevenueK: 3275.0
    y3EbitdaK: -690.0
    cashLowPointK: 780.0
    keyAssumptionChanges:
    - Q3Y3 达到 6 个在线中心，Q4Y3 退出时为 7 个而非 6 个。
    - 两个客户更快扩展至更高量通道，每个成熟中心退出年化 ARPU 向 $650K–675K 攀升。
    - 入职模板和集成更具可复制性，毛利率提升至约 72%。
