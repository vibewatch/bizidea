assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date]'
- id: A2
  name: 种子轮关闭后起始现金
  value: '4200'
  unit: USDK
  source: '[BP fundingAsk $3-5M range]；基准情景使用 $4.2M 关闭额，以在 A 轮进程前保留 6 个月缓冲。'
- id: A3
  name: 起始付费中心数（第 1 个月）
  value: '0'
  unit: 数量
  source: '[BP milestones 0-12 months]'
- id: A4
  name: 客户增长至里程碑路径
  value: 2 by M12, 4 by Q4Y2, 6 by Q4Y3
  unit: 付费中心
  source: '[BP milestones], [BP market.som], [Research market.som]'
- id: A5
  name: 付费试点定价
  value: 12K per month during a 90-day pilot
  unit: 每中心每月 USDK
  source: '[BP buyingProcess], [BP gtm.pricing] 加上试点定价低于正式年度合同的初创财务经验值。'
- id: A6
  name: 试点后正式生产底价
  value: roughly $300K annualized revenue per center by the month-18 proof point
  unit: 每中心每年 USDK
  source: '[BP gtm.pricing], [BP milestones $1.2M ARR by month 18]，以及建模的 3 个中心正式生产里程碑。'
- id: A7
  name: 成熟中心退出年化收入
  value: about $600K by M36
  unit: 每中心每年 USDK
  source: '[BP market.som], [Research market.som], [BP product.twentyFourMonth]；该假设包含案例费扩展和早期模块追加销售，超出入门平台最低费用。'
- id: A8
  name: 目标毛利率
  value: '70'
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct]'
- id: A9
  name: 营业成本占收入比例
  value: '30'
  unit: 百分比
  source: '[BP businessModel.targetGrossMarginPct] 及软件优先证据整合工作流经验值。'
- id: A10
  name: 试点转化为正式生产的时间节点
  value: first pilot starts in M4; successful paid pilots convert to production in about 6 months from initial start
  unit: 时间节点
  source: '[BP buyingProcess], [BP sequencingRationale], [BP milestones]'
- id: A11
  name: 月度流失率
  value: '1.2'
  unit: 百分比
  source: 针对黏性但受预算审查的企业临床工作流软件的初创财务经验值。
- id: A12
  name: 全成本 CAC
  value: '275'
  unit: 每落地中心 USDK
  source: '[BP funnelTargets], [BP buyingProcess 试点成功后 2–4 个月正式生产周期]，以及学术医疗中心企业销售经验值。'
- id: A13
  name: 创始人/高管含福利薪酬
  value: '180'
  unit: 每年 USDK
  source: 锚定企业健康科技种子阶段创始人现金薪酬的初创财务经验值。
- id: A14
  name: 工程师含福利薪酬
  value: '160'
  unit: 每年 USDK
  source: '[BP team Founding engineer] 加上医疗 AI 和集成人才的初创财务经验值。'
- id: A15
  name: 临床运营/客户成功含福利薪酬
  value: '120'
  unit: 每年 USDK
  source: '[BP team Clinical operations and customer success lead] 加上种子阶段医疗运营招聘经验值。'
- id: A16
  name: 企业销售含福利薪酬
  value: '170'
  unit: 每年 USDK
  source: '[BP team Head of enterprise sales] 加上学术医疗中心健康 IT OTE 经验值。'
- id: A17
  name: G&A/合规含福利薪酬
  value: '90'
  unit: 每年 USDK
  source: '[BP operations HIPAA/SOC 2 focus] 加上精简种子阶段财务和合规支持经验值。'
- id: A18
  name: 招聘顺序
  value: M1 founder + 2 eng + clinical advisor/cofounder; M4 third eng; M7 fourth eng + first sales hire + first clinical ops/CS hire; M13 fifth eng; M16 G&A/compliance; M19 second sales + second CS; M28 sixth eng
  unit: 时间节点
  source: '[BP team], [BP sequencingRationale]，以及 [BP fundingAsk.useOfFundsSummary]'
- id: A19
  name: 非薪酬运营费用爬坡
  value: 30K per month in early Y1 rising to 100K per month by Q4Y3
  unit: 每月 USDK
  source: '[BP operations], [BP risks]，以及云/AI、差旅、法务和合规支出的初创财务经验值。'
- id: A20
  name: 收入确认惯例
  value: customersEop counts paying centers, including paid pilots; blended revenue per center rises as pilots convert and case-fee/module expansion layers in
  unit: 政策
  source: '[BP gtm.pricing], [BP product.twentyFourMonth], [BP market.som]'
- id: A21
  name: 现金转换假设
  value: EBITDA approximates cash movement
  unit: 政策
  source: 初创财务经验值；不单独建模债务、资本支出、税务或营运资本行项目。
- id: A22
  name: 健全性检验所用人均收入基准
  value: $200K-$400K
  unit: 退出时每 FTE USDK 收入
  source: 企业/医疗 SaaS 基准的初创财务经验值。
