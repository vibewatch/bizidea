- point: AccessHope 显示异步肿瘤评审可在约五天内完成，仍能识别治疗变更和节省成本。
  sourceRefs:
  - 38
- point: 顶尖癌症中心现在公开营销远程或线上二次会诊，通常附有明确的自费定价。
  sourceRefs:
  - 50
  - 51
  - 53
  - 58
  - 63
- point: 肿瘤项目已在采纳 AI 文档和虚拟肿瘤委员会工具，降低了对工作流辅助的质疑。
  sourceRefs:
  - 34
  - 77
