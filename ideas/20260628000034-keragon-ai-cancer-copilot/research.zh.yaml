openQuestions:
- 前 20 个 NCI 或 NCCN 中心实际每月在淋巴瘤、肉瘤和其他高分歧癌症中处理多少符合条件的外部转诊？
- 携带数字病理和影像访问权限的案例占多大比例，TEFCA 和 FHIR API 之后手动追档还剩多少？
- 首席医疗官在允许 AI 生成的分歧图谱进入会诊前工作流之前，需要哪些责任语言和人工审查节点？
- '在实践中哪个主体最先获取 ROI：癌症中心、自费二次会诊项目还是雇主或付款方合作伙伴？'
