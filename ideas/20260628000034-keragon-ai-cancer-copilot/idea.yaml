problem: >-
  Rare-cancer second-opinion programs still receive life-or-death referrals as
  PDFs, portal screenshots, imaging reports, and patient notes spread across
  systems, while specialists may disagree on regimen choice or whether residual
  disease is real. Coordinators and clinicians spend precious days reconstructing
  timelines, reconciling conflicting recommendations, and figuring out which
  questions actually matter before treatment starts or escalates. That delay
  increases overtreatment risk, burns high-cost oncology labor, and gives
  patients a chaotic experience at the worst moment of their lives.
targetUser:
  primary: "Directors of second-opinion and referral operations at U.S. NCI-designated cancer centers receiving complex lymphoma, sarcoma, and other rare-cancer cases from community oncologists."
  secondary: "Tumor-board coordinators, oncology nurse navigators, and specialist physicians inside the same centers."
  buyer: "VP Oncology Service Line, Chief Medical Officer, or director of a cancer second-opinion program"
startupThesis:
  nonObviousInsight: >-
    The first winner here is unlikely to be an autonomous diagnostic model. It
    is the operating layer that turns fragmented patient evidence into a
    clinician-ready disagreement map, missing-data checklist, and question pack
    before a tumor board or second-opinion visit.
  beachhead: >-
    U.S. academic cancer centers and large regional oncology networks that run
    dedicated second-opinion programs for lymphoma, sarcoma, and other
    regimen-discordant rare or aggressive cancer cases, starting with external
    referrals that arrive from community practices without structured records
  wedge: >-
    A case-compilation and discordance copilot that ingests outside records,
    wearable trends, imaging reports, pathology notes, and symptom histories to
    produce a unified care timeline, highlight recommendation conflicts, and
    draft specialist question packets before the first review
  whyNowCatalyst: >-
    The Keragon case shows that general AI plus patient-generated data can now
    materially improve question quality in a complex cancer workflow, while the
    consequences of missing an alternative explanation can be unnecessary
    chemotherapy or radiotherapy.
  ventureScalePath: >-
    Start with high-value oncology second opinions, then expand into internal
    tumor-board prep, payer and employer cancer-navigation evidence packs,
    community-to-academic referral intake, and eventually other specialty
    decisions where multimodal evidence and expert disagreement drive delay and
    cost.
solution: >-
  Oncology Discordance Copilot plugs into document retrieval feeds, patient
  uploads, imaging-report text, labs, and optional wearable or symptom data to
  build a single longitudinal case file before a specialist touches the chart.
  The product does not diagnose cancer; it structures evidence, surfaces missing
  records, compares treatment recommendations across prior opinions, and flags
  ambiguous follow-up findings that deserve targeted questions rather than blind
  escalation. Coordinators get a work queue for incomplete or contradictory
  cases, while physicians receive a short briefing with timelines, unresolved
  conflicts, and patient-specific questions for the consult. The first module is
  sold as second-opinion operations software, which keeps regulatory exposure
  lower while still saving clinician time and reducing avoidable overtreatment.
goToMarketSeed:
  firstCustomer: >-
    An NCI-designated U.S. cancer center or large regional oncology network that
    receives 50 or more outside second-opinion referrals per month for lymphoma,
    sarcoma, or other rare-cancer cases and already staffs dedicated nurse
    navigators or tumor-board coordinators
  buyingTrigger: >-
    A center launches or scales a virtual second-opinion program, signs a new
    employer or payer referral contract, or sees referral volume rise enough
    that specialists are waiting on record assembly instead of clinical review
  currentAlternative: >-
    Manual chart chasing by nurse navigators, PDF packet assembly, ad hoc
    physician review of outside records, and generic note-taking tools that do
    not map disagreements or missing evidence
  switchingReason: >-
    The wedge shortens time-to-review and makes specialist time more productive
    by turning scattered outside records into a structured disagreement brief,
    which manual coordination and generic documentation tools cannot do
  pricingHypothesis: >-
    Annual platform minimum plus per referred case pricing, with premium modules
    for tumor-board workflow and employer or payer referral pathways
