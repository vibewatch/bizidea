topRisks:
  - name: "Clinical-liability fear"
    description: "Cancer centers may worry that any AI touching treatment workflows creates medico-legal exposure if clinicians over-trust the output."
    mitigation: "Keep the first product focused on evidence assembly and question generation, require human sign-off everywhere, and publish workflow audit trails instead of diagnostic claims."
  - name: "Thin initial evidence base"
    description: "The source signal is powerful but comes from one founder case study, so adoption could be slower if the problem is less frequent or less budgeted than it appears."
    mitigation: "Pilot with centers already marketing second opinions, measure case-prep time and decision-delay reduction, and concentrate on referral-heavy rare-cancer programs where pain is easiest to prove."
  - name: "Integration drag"
    description: "Outside oncology records span portals, PDFs, imaging reports, and pathology systems, which can slow implementation and reduce early ROI."
    mitigation: "Start with lightweight patient-upload and coordinator-upload workflows, then add deeper retrieval integrations only after proving value on a narrow referral pathway."
