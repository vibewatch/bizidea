differentiator: >-
  This is not a generic patient chatbot and not another LLM note summarizer for
  clinics. The product is purpose-built for one painful workflow: external
  cancer cases where records are fragmented, prior specialists disagree, and the
  next decision could lock a patient into months of toxic therapy. Over time the
  moat comes from case-assembly integrations, dispute-resolution datasets, and a
  proprietary map of which evidence gaps and conflict patterns actually change
  final oncology decisions.
