slug: oncology-discordance-copilot
date: "2026-06-28"
executiveSummary: >-
  Oncology Discordance Copilot is an operations-layer software product for
  U.S. academic cancer centers that converts fragmented, conflicting external
  referral records into specialist-ready case briefings before a second-opinion
  consult or tumor board begins. The beachhead pain is measurable and severe:
  rare-cancer patients require 12 or more opinions when two oncologists recommend
  opposite chemotherapy regimens, coordinators spend hours assembling PDFs and
  portal screenshots, and ambiguous follow-up imaging has led to unnecessary
  radiotherapy that could have been avoided with cleaner evidence synthesis. The
  product does not diagnose cancer; it structures timelines, surfaces
  recommendation conflicts, flags missing records, and generates targeted
  specialist question packs—workflow tasks that manual navigation and generic
  note-summarization tools cannot perform. The wedge is second-opinion program
  operations software sold to NCI-designated cancer centers receiving 50 or more
  complex lymphoma and sarcoma referrals per month, a segment where specialist
  re-review is already documented to change diagnosis or management and where
  centers charge $1,690–3,000 per self-pay case, making sub-$1,000 software
  value per case a conservative model. Research across 84 verified sources
  supports a U.S. beachhead SAM of roughly $22.5M and a modeled Year-3
  reachable share of $3.6M across six landed centers. The primary regulatory
  posture is evidence-assembly software below FDA clinical-decision-support
  thresholds, which allows faster commercial deployment than an autonomous
  oncology recommender while still delivering overtreatment-avoidance ROI.
  The long-run moat is a proprietary dataset linking outside-record conflict
  patterns to eventual diagnosis or treatment changes—data no incumbent
  currently owns. The seed round of $3–5M funds two paid 90-day pilots, four
  core engineering hires, HIPAA/SOC 2 compliance, and the first enterprise
  sales hire, targeting three signed production contracts and $1.2M ARR by
  month 18.

problem:
  - "Rare-cancer second-opinion programs receive external referrals as scattered PDFs, portal screenshots, imaging reports, and symptom notes spread across systems; nurse navigators spend multiple hours per case manually assembling packets before a specialist can begin clinical review."
  - "When prior specialists disagree on regimen choice or follow-up imaging is ambiguous, no current tool maps the conflicts, identifies missing evidence, or generates targeted questions—forcing avoidable treatment delays and raising overtreatment risk at the highest-stakes moment of a patient's illness."

solution:
  - "A coordinator-facing case-compilation engine that ingests uploaded and retrieved outside records—PDFs, imaging reports, labs, wearable exports, symptom histories—and outputs a structured longitudinal timeline, a missing-record checklist, and a recommendation-conflict map before the first specialist touch."
  - "A specialist-facing pre-consult briefing module that presents unresolved treatment conflicts and an AI-generated question pack, enabling physicians to focus on judgment rather than chart assembly and reducing avoidable escalation when ambiguous findings have alternative explanations such as thymus rebound."

whyWeWin:
  - "No existing product reconciles fragmented external oncology records into a specialist-ready disagreement map: AccessHope is service-heavy, OncoLens focuses on post-intake conference orchestration, Abridge and Ambience target in-session ambient documentation, and navigation platforms manage ongoing care rather than pre-consult evidence synthesis."
  - "Each case reviewed enriches a proprietary conflict-to-outcome dataset—linking evidence gaps and recommendation clashes to final diagnosis or management changes—that compounds into a moat competitors cannot replicate without years of similar workflow deployment."
  - "Operations-software regulatory positioning (evidence assembly + question generation, never treatment recommendation) allows clinical trust to build faster than autonomous-AI competitors while satisfying CMO liability requirements through full audit trails and mandatory human sign-off."
  - "Beachhead accounts already market and charge for second opinions at $1,690–3,000 per case, making a sub-$1,000-per-case software value a demonstrably conservative ROI argument rather than an aspirational one."

strategicChoices:
  beachhead: >-
    NCI-designated U.S. cancer centers and large regional oncology networks that
    already operate a dedicated remote or virtual second-opinion program for
    lymphoma and sarcoma, receiving at least 50 complex external referrals per
    month and staffing dedicated nurse navigators or tumor-board coordinators.
  wedgeRationale: >-
    This narrow slice has four properties that accelerate proof: the pain is
    acute and time-stamped (coordinator prep time per case is measurable),
    the buyer already charges money per second opinion so software ROI anchors
    to existing pricing, specialist re-review in these disease lines is
    documented to change management in 10–30% of cases justifying overtreatment
    avoidance claims, and the sales target is small enough (25 high-volume
    programs nationally) that two signed pilots create significant reference
    leverage. Broader oncology or multi-specialty entry would dilute disease
    specificity and extend clinical validation timelines without proportionate
    market size gain at seed stage.
  sequencingRationale: >-
    Operations software sells first because it is the lowest-regulatory-risk
    framing and delivers measurable coordinator-productivity ROI within a 90-day
    pilot. The tumor-board module ships second because it serves the same buyer
    with a closely related workflow and can be upsold without a new procurement
    cycle. Employer and payer referral pathway expansion comes third because it
    requires center-side ROI documentation as proof before payer procurement will
    engage. FHIR and EHR integrations are layered in after pilot proof to avoid
    integration drag killing the first deals before value is established. Hiring
    follows product: founding engineer and clinical advisor at month 0, enterprise
    sales and customer-success at month 6 once the pilot playbook is validated.
  notYet:
    - "Autonomous cancer diagnosis or treatment recommendation (regulatory risk and trust deficit)"
    - "Pediatric oncology (separate regulatory, workflow, and consent environment)"
    - "Community oncology practices (insufficient referral volume and IT resources for initial deployment)"
    - "Direct-to-patient consumer tooling (requires different product surface, sales motion, and safety framing)"
    - "International markets (U.S. interoperability stack, buyer relationships, and evidence base are the foundation)"
    - "Radiology AI or digital pathology image analysis (deep technical moat held by specialized incumbents)"

market:
  tam: "$55.5M — 74 NCI-designated cancer centers x modeled 1,000 eligible complex referral cases per center-year x $750 software value per case (research.yaml estimate; $750 is below self-pay second-opinion fees of $1,690–3,000)"
  sam: "$22.5M — 25 high-volume programs with visible remote or online second-opinion infrastructure x 1,200 eligible complex cases per year x $750 per case (research.yaml estimate)"
  som: "$3.6M — Year-3 reachable share across 6 landed centers x 800 live cases per year x $750 per case (research.yaml estimate)"
  segments:
    - "NCI-designated cancer centers with active remote or virtual second-opinion programs for rare or aggressive cancers (lymphoma, sarcoma, and similar regimen-discordant disease lines)"
    - "Large regional oncology networks and employer- or payer-linked cancer-navigation operators handling significant external referral volume"
  buyingProcess: >-
    A 90-day paid pilot scoped to one disease-specific referral pathway is the
    primary entry mechanism, initiated by the second-opinion program director or
    VP Oncology Service Line after a product demo; full production contracts
    require IT security review, CMO clinical approval, and legal BAA, typically
    adding 2–4 months to the cycle after pilot success is documented.

product:
  mvp: >-
    Coordinator-facing web tool that accepts document uploads (PDFs, imaging
    reports, labs) for a single lymphoma or sarcoma referral pathway, extracts
    a chronological case timeline, categorizes missing record types, and
    generates a one-page recommendation-conflict brief for specialist pre-consult
    review; no EHR integration required at launch.
  sixMonth: >-
    Add automated conflict detection across multiple prior treatment
    recommendations, AI-generated specialist question packs per case, and a
    multi-case coordinator work queue dashboard; expand pilot to second disease
    pathway (sarcoma or gynecologic oncology) within same launch center.
  twelveMonth: >-
    Native FHIR R4 / HL7 connector for highest-volume EHR source at lead center
    to reduce manual upload burden; tumor-board prep module shipping case
    briefings for internal multidisciplinary conferences; 3–4 centers live in
    production.
  twentyFourMonth: >-
    Employer and payer referral pathway module enabling case compilation for
    external benefit-program routing; structured export to EHR or care-management
    systems; 6+ centers live; proprietary conflict-to-outcome dataset operational
    across reviewed case history; cross-center benchmarking dashboard for program
    directors.
  keyBets:
    - "External-record normalization engine achieves specialist trust before generalist ambient documentation vendors build comparable rare-cancer specificity"
    - "Per-case data flywheel: each reviewed case enriches conflict pattern library, improving downstream disagreement-detection precision across disease lines"
    - "Operations-software framing sustains a positioning below FDA clinical-decision-support classification while delivering overtreatment-avoidance ROI that justifies enterprise spend"
    - "FHIR / mCODE / DICOM stack matures enough by Month 6 to automate ≥50% of record ingestion at early accounts, protecting coordinator-adoption economics"

gtm:
  wedge: >-
    Sell 90-day paid pilots to second-opinion program directors at 2–3
    NCI-designated cancer centers already marketing virtual or online second
    opinions for lymphoma or sarcoma; pilot scope is one disease pathway,
    success metric is ≥30% reduction in median coordinator prep time per case.
  channels:
    - "Founder-led direct enterprise sales to oncology service-line leaders and second-opinion program directors at NCI-designated centers"
    - "Pilots initiated through rare-cancer clinical networks (SARC sarcoma cooperative, lymphoma working groups) for warm introductions at high-volume centers"
    - "AccessHope-style expert-review operators as channel or data partners once center-side workflow proof exists"
    - "Academic conference presence (ASCO, NCCN) for clinical champion recruitment and brand establishment in second-opinion operations category"
  funnelTargets: "Outbound contact to qualified discovery call 20–30%; discovery to pilot LOI 25–40%; pilot to production contract 50%+ (contingent on documented prep-time reduction ≥30%)"
  pricing: >-
    Annual platform minimum of $60–120K per center plus a per-case fee of
    $200–400 for referred cases above a contractual baseline volume; premium
    tumor-board prep and employer/payer pathway modules billed at additional
    per-module or per-seat tiers. Rationale: per-case pricing aligns the startup's
    revenue with referral-volume growth and keeps average software cost well below
    the $1,690–3,000 per-case fees centers already charge for self-pay second
    opinions. Platform minimum covers fixed integration and compliance costs.

businessModel:
  revenueStreams:
    - "Annual platform subscription per center (covers base case volume and coordinator seats)"
    - "Per-referred-case fee above contractual baseline volume"
    - "Premium module fees for tumor-board prep and employer/payer referral pathway"
    - "Implementation and integration services (initially bundled into pilot fee to lower adoption friction)"
  unitOfValue: "Eligible complex oncology referral cases processed through the copilot workflow and producing a specialist-reviewed disagreement brief"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Volume growth within landed centers as their virtual second-opinion programs scale and employer/payer contracts add referral volume"
    - "Cross-sell of tumor-board prep module to the same second-opinion program buyer without a new procurement cycle"
    - "Employer and payer channel expansion using documented center-side ROI as proof for benefit-navigator procurement"
    - "Multi-center platform licenses for large integrated oncology networks managing referrals across multiple sites"

strategyMap:
  northStarMetric: "Monthly specialist-reviewed oncology cases with an AI-generated disagreement brief (vs. manual baseline)"
  inputMetrics:
    - "Median days from external referral arrival to specialist-ready case packet"
    - "Share of cases with complete relevant records at first specialist touch"
    - "Number of recommendation conflicts surfaced per 100 eligible cases"
    - "Coordinator prep time per case in minutes"
    - "Pilot-to-production contract conversion rate"
    - "Net revenue retention per center (year-over-year case volume x per-case fee)"
  moatsToBuild:
    - "Proprietary dataset linking outside-record conflict patterns to eventual diagnosis or treatment changes across reviewed cases"
    - "EHR and FHIR integrations with the highest-volume community referral sources at each beachhead center"
    - "Cross-center benchmarks on prep time, conflict rate, and management-change frequency that make the platform a system of record for second-opinion operations"
    - "Workflow trust with specialist oncologists who rely on copilot briefings as primary pre-consult review document"
  killCriteria:
    - "Fewer than 2 pilot LOIs signed from NCI-designated centers within 6 months of seed close"
    - "Pilot-to-production conversion rate below 40% after first two completed pilots"
    - "Median coordinator prep time not reduced by at least 30% in any completed pilot cohort"
    - "No referenceable production customer by month 18 post-seed"
    - "Average pilot deal size below $60K ACV, making unit economics unsustainable at modeled sales cost"
  mermaid: |
    flowchart LR
      Wedge[Second-opinion program director\nat NCI cancer center] --> Pain[Fragmented external referrals\ndelay specialist review]
      Pain --> MVP[Case-compilation and\ndiscordance copilot MVP]
      MVP --> Proof[Documented prep-time\nreduction in 90-day pilot]
      Proof --> Expand[Tumor-board module +\nemployer/payer pathway]
      Expand --> Moat[Conflict-to-outcome\ndataset + integrations]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "High conviction on pain severity, wedge specificity, and competitive white space; primary caveat is that the evidence base is one founder case study and center-level sales cycles run 6–12 months."
    whyBelieve: "Expert oncology re-review measurably changes diagnoses and averts unnecessary therapy in rare cancers, centers already charge $1,690–3,000 per self-pay second opinion making software ROI conservative, and no existing vendor reconciles fragmented outside records into a specialist-ready disagreement map before the consult."
    whyDoubt: "The initial why-now signal is a single compelling founder story rather than a multi-center workflow study, and academic medical center procurement cycles plus CMO liability scrutiny could push first production revenue well past 18 months."
    nextDiligence: "A signed LOI or paid pilot agreement with one named NCI-designated cancer center that processes 50+ complex external referrals per month, with a documented baseline coordinator prep time per case."
  firstCustomer:
    title: "Second-Opinion Program Director, NCI-Designated Cancer Center"
    profile: "An academic cancer center with an active remote or virtual second-opinion service for lymphoma or sarcoma, staffing 2–4 nurse navigators who manually assemble 50–200 external referral packets per month from community oncologists."
    trigger: "Program scales after signing a new employer or payer referral contract, and coordinators can no longer assemble specialist-ready case packets fast enough to match available physician slots without adding headcount."
    buyer: "VP Oncology Service Line or Second-Opinion Program Director"
    initialContract: "$60–120K annual platform fee plus per-case fee; entry via a 90-day paid pilot scoped to one disease-specific referral pathway with coordinator prep time as the primary success metric."
  mustBeTrue:
    - "Second-opinion program directors at NCI-designated centers will authorize $60–120K+ annual software spend when a 90-day pilot documents ≥30% reduction in coordinator prep time per case."
    - "The copilot can normalize at least 70% of incoming external referral documents—PDFs, imaging reports, labs—into a usable structured timeline without requiring manual re-entry by coordinators."
    - "Specialist oncologists will act on AI-generated disagreement maps and question packs when those outputs include explicit human sign-off checkpoints and a full audit trail, satisfying CMO liability requirements."
    - "At least 20–25 NCI-designated or peer cancer centers have sufficient referral volume (≥50 complex eligible cases per month) and program maturity to justify the initial platform fee within a 2-year commercial window."
    - "Recommendation conflicts and missing-evidence patterns are common enough in rare-cancer referral cohorts that a 90-day single-pathway pilot surfaces enough decision-relevant signals to constitute defensible ROI evidence."
  diligenceQuestions:
    - "How many eligible external referrals does this center process per month in lymphoma, sarcoma, and other rare cancers, and what share arrive with digital pathology and imaging access versus PDF-only reports?"
    - "What liability sign-off language and human-review checkpoints would your CMO require before allowing an AI-generated disagreement map into pre-consult workflow?"
    - "Who captures first-year ROI—the center's own second-opinion program, an employer or payer contract partner, or both—and does that affect where the software budget sits?"
    - "How long does your typical oncology software procurement cycle run from pilot start to production contract, and is the pilot budget owned by the program director or requires VP or C-suite approval?"
    - "Which of AccessHope, OncoLens, Abridge, an in-house EHR workflow, or nurse navigator headcount is the closest current substitute, and what would an incumbent need to ship to make this solution redundant?"
    - "Have you seen cases where an ambiguous follow-up finding—imaging, pathology, or conflicting prior regimen—delayed treatment or led to an avoidable escalation in the past 12 months, and how was it resolved?"

operatingAssumptions:
  - assumption: "Beachhead centers receive at least 50 complex eligible external referrals per month in lymphoma or sarcoma, generating sufficient per-case volume to reach break-even on $60–120K annual platform minimums."
    basis: idea.yaml
    validationTest: "Referral intake audit at 3 prospective NCI-designated centers confirming eligible case volume and current coordinator prep time before pilot LOI."
    decisionImpact: "If median eligible volume is below 30 cases per month, per-case economics shrink and platform minimum must rise to $150K+ or SAM contracts significantly; pivots beachhead toward larger network operators."
  - assumption: "Software value of approximately $750 per case is well below the self-pay second-opinion prices centers already charge ($1,690–3,000), making ROI argument compelling without requiring operational savings alone."
    basis: research.yaml
    validationTest: "Pricing interviews with 5 VP Oncology Service Line or program director contacts confirming they benchmark software against specialist labor cost or second-opinion fee revenue, not only coordinator hourly savings."
    decisionImpact: "If buyers benchmark solely against coordinator hourly cost (~$35–50/hr x 4 hrs = $140–200/case ceiling), per-case pricing must drop below $150 or switch to FTE-displacement framing with a higher platform minimum."
  - assumption: "Coordinator-upload-only MVP (no EHR integration) delivers sufficient prep-time reduction to pass a 90-day pilot without requiring FHIR or HL7 connectors before the first contract is signed."
    basis: operator judgment
    validationTest: "90-day pilot at first center using upload-only intake, measuring ≥30% median prep-time reduction vs. baseline despite manual document submission."
    decisionImpact: "If coordinators refuse the manual upload workflow and insist on automated EHR ingestion before trialing the product, MVP requires earlier FHIR integration investment, adding 3–4 months to first pilot timeline and $200–400K in engineering spend."
  - assumption: "Operations-software regulatory framing—evidence assembly, missing-record detection, and question generation with mandatory human sign-off—keeps the product below FDA clinical-decision-support classification requiring clearance."
    basis: research.yaml
    validationTest: "Written assessment by health-IT regulatory counsel before commercial launch confirming the product qualifies as non-device CDS under 21st Century Cures Act criteria."
    decisionImpact: "If evidence-assembly features are classified as device CDS, FDA 510(k) or De Novo path adds 12–24 months and $500K–1M+ to timeline and budget, requiring a seed extension or strategy pivot toward a lower-scope MVP."
  - assumption: "Rare-cancer recommendation conflicts and ambiguous imaging findings are frequent enough in the beachhead disease lines (lymphoma, sarcoma) that a 90-day single-pathway pilot surfaces meaningful decision-change signals across at least 20–30 cases."
    basis: research.yaml
    validationTest: "Retrospective case audit at pilot center showing ≥10 recommendation conflicts or ambiguous-finding flags per 100 reviewed cases in lymphoma or sarcoma referral cohort."
    decisionImpact: "If discordance rate is below 5% in the beachhead disease lines, overtreatment-avoidance ROI story collapses and value proposition reduces to coordinator efficiency only, which may not sustain $60–120K ACV at seed-stage centers without a larger efficiency gain."

experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Founder-led discovery interviews with 12–15 nurse navigators and second-opinion program directors at NCI-designated centers"
    hypothesis: "At least 8 of 15 programs report median coordinator prep time above 4 hours per complex rare-cancer case, confirming productivity ROI is the primary pilot hook."
    successMetric: "≥8/15 interviews confirm >4h median prep time AND express willingness to participate in a paid 90-day pilot scoped to one disease pathway."
    owner: "Founder/CEO"
  - horizon: "0–90 days"
    experiment: "Build and test case-timeline prototype against 25 de-identified retrospective oncology referral records from a prospective pilot center"
    hypothesis: "Prototype correctly identifies chronological conflicts in prior treatment recommendations or ambiguous imaging findings in at least 75% of reviewed cases."
    successMetric: "≥18/25 cases produce a specialist-reviewable timeline with at least one surfaced conflict or missing-evidence flag that is confirmed as clinically meaningful by an oncology clinical advisor."
    owner: "Founding engineer"
  - horizon: "90–180 days"
    experiment: "Execute first paid 90-day pilot at one NCI-designated cancer center on a single lymphoma or sarcoma referral pathway"
    hypothesis: "Coordinator-upload-only intake reduces median prep time per case by ≥30% vs. the documented pre-pilot baseline."
    successMetric: "≥30% reduction in median days from referral arrival to specialist-ready case packet; ≥70% of pilot cases reviewed using the copilot brief as primary pre-consult document."
    owner: "Founder/CEO and clinical operations lead"
  - horizon: "90–180 days"
    experiment: "Pricing sensitivity interviews with 5 VP Oncology Service Line or program director contacts at prospective second and third accounts"
    hypothesis: "At least 3 of 5 buyers will authorize $80K+ annual spend if ROI documentation shows ≥2x coordinator-hour savings relative to platform cost."
    successMetric: "≥3/5 buyers confirm budget authorization intent at $80K+ ACV given the ROI model derived from Pilot 1 data."
    owner: "Founder/CEO"
  - horizon: "180–365 days"
    experiment: "Develop and pilot FHIR R4 connector for the lead center's highest-volume EHR source to reduce manual document upload"
    hypothesis: "Automated record ingestion covers at least 50% of eligible case documents without manual coordinator upload at the live center."
    successMetric: "≥50% of case documents auto-ingested from EHR or FHIR endpoint in production; coordinator upload events drop by ≥40% on covered document types."
    owner: "Founding engineer"
  - horizon: "180–365 days"
    experiment: "Beta test tumor-board prep module with an internal multidisciplinary conference at first production center"
    hypothesis: "Tumor-board coordinator reports case-prep time reduction ≥25% vs. prior manual process, and physicians find briefing sufficient to replace independent chart review before the conference."
    successMetric: "≥2 of 3 lead tumor-board physicians adopt the copilot briefing as their primary pre-conference document within the first 4 conference cycles."
    owner: "Clinical operations lead"

operations:
  - "HIPAA-compliant cloud infrastructure with signed BAA (AWS or Azure GovCloud equivalent); SOC 2 Type II certification targeted by month 12"
  - "FHIR R4 / HL7 connector roadmap prioritized by case document volume at beachhead accounts: Epic first, Cerner second, specialty PACS integrations thereafter"
  - "CAP-compliant pathology content strategy: structured summaries and conflict flags only, no direct protocol reprints or templated text from licensed CAP materials"
  - "Clinical safety review by licensed oncology professional before each product release that touches disagreement-map or question-pack outputs"
  - "Customer success paired with each account from pilot kickoff; oncology nurse navigator or former second-opinion coordinator as first CS hire to maintain workflow credibility"
  - "ONC interoperability and information-blocking rule monitoring for policy changes affecting EHI access or data-sharing obligations relevant to external referral workflows"

team:
  - role: "Founding engineer (clinical NLP and health data integration)"
    startTiming: "Month 0"
    rationale: "Builds case-timeline extraction engine, document-normalization pipeline, and FHIR integration layer; must have prior experience with oncology or clinical NLP and HIPAA-compliant data handling."
  - role: "Oncology clinical advisor or co-founder (nurse navigator or oncology informaticist)"
    startTiming: "Month 0"
    rationale: "Co-designs coordinator workflow, validates clinical safety framing for disagreement maps and question packs, and provides referenceable credibility with CMOs and physician champions during pilots."
  - role: "Head of enterprise sales (academic medical center or health system experience)"
    startTiming: "Month 6"
    rationale: "Owns second and third center deals after founder-led Pilot 1; academic center sales cycles require dedicated relationship management and procurement navigation that a founder cannot sustain beyond two simultaneous accounts."
  - role: "Clinical operations and customer success lead (former navigator or second-opinion coordinator)"
    startTiming: "Month 6"
    rationale: "Drives pilot-to-production conversion by serving as the operational counterpart for navigator and coordinator teams; identifies upsell triggers for tumor-board module expansion."

