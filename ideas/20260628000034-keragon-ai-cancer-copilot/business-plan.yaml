    items:
      - "Seed round closed ($3–5M)"
      - "Discovery interview program complete (12+ NCI center contacts, 2 pilot LOIs signed)"
      - "MVP shipped and live at first NCI-designated cancer center on lymphoma or sarcoma referral pathway"
      - "90-day Pilot 1 complete with documented ≥30% coordinator prep-time reduction"
      - "Second pilot LOI signed (second center, second disease pathway)"
      - "Regulatory counsel opinion confirming operations-software CDS classification"
  - horizon: "12–24 months"
    items:
      - "3–4 production contracts signed across distinct NCI-designated centers"
      - "Tumor-board prep module shipped and live at lead center"
      - "FHIR R4 integration live at lead center covering ≥50% of case document ingestion"
      - "$1.2–2M ARR"
      - "SOC 2 Type II certification complete"
      - "Employer or payer referral pathway module scoped and in pilot design"
  - horizon: "24–36 months"
    items:
      - "6+ centers live in production"
      - "Employer and payer referral pathway module launched at 2+ accounts"
      - "$3.5–4M ARR"
      - "Proprietary conflict-to-outcome dataset operational across all reviewed case history"
      - "Series A fundraise initiated with documented retention and expansion metrics"

risks:
  - risk: "Clinical-liability fear blocks CMO approval of disagreement-map workflow"
    likelihood: High
    impact: High
    mitigation: "Keep all outputs framed as evidence assembly and question generation, never treatment recommendation; require explicit physician sign-off on every briefing; build and publish full audit trails for each case; engage CMO champion as co-designer during pilot."
  - risk: "Integration drag: outside records arrive as heterogeneous PDFs and portal exports, slowing automation and coordinator adoption"
    likelihood: High
    impact: Medium
    mitigation: "Launch MVP with coordinator-upload-only intake requiring no EHR integration; prove value on narrow pathway before adding FHIR connectors; prioritize highest-volume source integrations after pilot proof to protect first-deal economics."
  - risk: "Academic medical center procurement cycle extends beyond 12 months, delaying first production revenue"
    likelihood: High
    impact: Medium
    mitigation: "Sell paid pilot first (90-day, scoped, defined success metric) to generate revenue and de-risk procurement; secure internal clinical champion before IT and legal review begins; target centers with visible second-opinion programs and existing vendor relationships."
  - risk: "Thin initial evidence base—one founder case study—means the rare-cancer discordance problem may be less frequent or less budgeted than it appears"
    likelihood: Medium
    impact: High
    mitigation: "Run retrospective case audits at first two prospective centers before signing LOIs to confirm eligible referral volume and baseline discordance frequency; publish peer-reviewed case-study ROI data after first two pilots to anchor clinical credibility."
  - risk: "Generalist ambient documentation vendors (Abridge, Ambience) move upstream to pre-consult record synthesis"
    likelihood: Medium
    impact: High
    mitigation: "Maintain rare-cancer disease specificity, external-record reconciliation, and audit-trail depth as permanent differentiators; accelerate proprietary conflict-to-outcome dataset to create a moat those vendors cannot replicate quickly without comparable second-opinion workflow deployment."

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: "18 months of runway funds: founding engineering team (2–3 hires) to build case-timeline engine, normalization pipeline, and first FHIR connector; two paid 90-day pilots at NCI-designated cancer centers including implementation support; enterprise sales hire at month 6; HIPAA / SOC 2 compliance and regulatory counsel; clinical safety review infrastructure. Target exit criteria at month 18: 3 signed production contracts and $1.2M ARR."
