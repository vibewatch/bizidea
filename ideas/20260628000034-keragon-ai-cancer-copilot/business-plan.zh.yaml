slug: oncology-discordance-copilot
date: "2026-06-28"
executiveSummary: >-
  Oncology Discordance Copilot 是面向美国学术癌症中心的运营层软件，在二次会诊或肿瘤
  多学科讨论会开始之前，将碎片化、相互矛盾的外部转诊病历转化为专科医生可直接使用的
  病例简报。切口痛点清晰且严峻：罕见癌症患者在两位肿瘤科医生推荐截然相反的化疗方案
  后需要 12 个或更多医学意见；协调员花费数小时拼装 PDF 和门户截图；模糊的随访影像曾
  导致本可避免的放疗。产品本身不诊断癌症——它整理时间线、识别建议冲突、标记缺失病历
  并生成针对性的专科医生问题包，这些工作是手动导航和通用笔记摘要工具无法完成的。切入
  点是面向每月接收 50 个以上复杂淋巴瘤和肉瘤转诊的 NCI 指定癌症中心的二次会诊运营软件
  ——在这一细分市场中，专科复审已有记录地能改变诊断或治疗，而中心对自费病例的收费高达
  $1,690–3,000，使每病例软件价值低于 $1,000 成为保守的建模假设。基于 84 个经验证来源
  的研究支持美国滩头市场 SAM 约 $22.5M，第 3 年可达份额建模为跨六家落地中心 $3.6M。
  主要监管定位是低于 FDA 临床决策支持门槛的证据整合软件，商业部署速度快于自主肿瘤推荐
  系统，同时仍能交付规避过度治疗的 ROI。长期护城河是一个专有数据集，将外部病历冲突模式
  与最终诊断或治疗变更关联——这是现有厂商都不具备的数据。$3–5M 种子轮资金支持两个
  付费 90 天试点、四名核心工程招聘、HIPAA/SOC 2 合规，以及首位企业销售招聘，目标是
  第 18 个月签署三份正式合同并达到 $1.2M ARR。

problem:
  - "罕见癌症二次会诊项目以零散 PDF、门户截图、影像报告和分散在各系统间的症状笔记接收外部转诊；护理导航员每个病例需花费数小时手动拼装材料包，专科医生才能开始临床评审。"
  - "当既往专科医生对方案选择存在分歧，或随访影像结果模糊时，目前没有任何工具能梳理冲突、识别缺失证据或生成针对性问题——迫使本可避免的治疗延误，并在患者病情最危急的时刻推高过度治疗风险。"

solution:
  - "面向协调员的病例整合引擎：摄取上传和检索的外部病历（PDF、影像报告、实验室数据、可穿戴设备导出、症状病史），在专科医生首次接触前输出结构化纵向时间线、缺失病历清单和治疗建议冲突图谱。"
  - "面向专科医生的会诊前简报模块：呈现未解决的治疗冲突以及 AI 生成的问题包，让医生专注于临床判断而非整理病历，并在模糊发现（如胸腺反弹）有替代解释时减少不必要的治疗升级。"

whyWeWin:
  - "没有任何现有产品能将碎片化外部肿瘤病历整合为专科医生可用的分歧图谱：AccessHope 以服务为主导，OncoLens 聚焦于摄取后的会诊编排，Abridge 和 Ambience 针对诊中环境记录，而导航平台管理的是持续护理而非会诊前证据整合。"
  - "每个经过评审的病例都会丰富一个专有的分歧-结果数据集——将证据缺口和建议冲突与最终诊断或治疗变更关联起来——积累成竞争对手若无类似工作流部署经验就无法复制的护城河。"
  - "运营软件的监管定位（证据整合加问题生成，绝不涉及治疗建议）使临床信任的建立速度快于自主 AI 竞争对手，同时通过完整审计轨迹和强制人工审批满足首席医疗官的责任要求。"
  - "滩头客户已经以每病例 $1,690–3,000 对外收费，使每病例软件价值低于 $1,000 成为明显保守的 ROI 论据，而非志向远大的推测。"

strategicChoices:
  beachhead: >-
    已运营专属远程或虚拟淋巴瘤和肉瘤二次会诊项目的 NCI 指定美国癌症中心及大型区域肿瘤
    网络，每月接收至少 50 个复杂外部转诊，并配备专职护理导航员或肿瘤委员会协调员。
  wedgeRationale: >-
    这个窄切口具备四个加速验证的特性：痛点急迫且可量化（每病例协调员准备时间可测量）；
    买家已在每次二次会诊上收费，软件 ROI 直接锚定现有定价；在这些病种中，专科复审改变
    治疗方案的比例有据可查（10–30%），支撑规避过度治疗的主张；全国高量项目约 25 个，
    两个签约试点就能产生显著参考杠杆。更广泛的肿瘤或多专科切入会稀释疾病特异性，延长
    临床验证周期，而在种子阶段并不能换来相称的市场规模增益。
  sequencingRationale: >-
    运营软件先卖，因为监管风险最低，且在 90 天试点内可交付可测量的协调员生产力 ROI。
    肿瘤委员会模块第二个发布，因为它服务同一买家、工作流高度相关，无需新采购周期即可
    追加销售。雇主和付款方转诊通道扩展排在第三，因为它需要中心侧 ROI 文档作为付款方
    采购前的证据。FHIR 和 EHR 集成在试点验证后分层接入，避免集成阻力在价值证明前扼杀
    首批交易。招聘跟随产品：创始工程师和临床顾问在第 0 个月到位，企业销售和客户成功在
    第 6 个月（试点打法验证后）到位。
  notYet:
    - "自主癌症诊断或治疗建议（监管风险与信任赤字）"
    - "儿科肿瘤（独立的监管、工作流和知情同意环境）"
    - "社区肿瘤诊所（转诊量不足，IT 资源不够支撑初期部署）"
    - "直接面向患者的消费者工具（需要不同的产品形态、销售方式和安全框架）"
    - "国际市场（美国互操作性体系、买家关系和证据基础是根基）"
    - "放射科 AI 或数字病理影像分析（专业厂商已有深厚技术护城河）"

market:
  tam: "$55.5M——74 个 NCI 指定癌症中心 × 每中心每年建模 1,000 个符合条件的复杂转诊案例 × 每案例 $750 软件价值（research.yaml 估算；$750 低于自费二次会诊收费 $1,690–3,000）"
  sam: "$22.5M——25 个有可见远程或线上二次会诊基础设施的高量项目 × 每年 1,200 个符合条件的复杂案例 × 每案例 $750（research.yaml 估算）"
  som: "$3.6M——第 3 年可达份额：6 个落地中心 × 每年 800 个在线案例 × 每案例 $750（research.yaml 估算）"
  segments:
    - "设有活跃远程或虚拟二次会诊项目的 NCI 指定癌症中心（针对罕见或侵袭性癌症：淋巴瘤、肉瘤及类似治疗方案易存分歧的病种）"
    - "承接大量外部转诊量的大型区域肿瘤网络及雇主或付款方关联的癌症导航运营商"
  buyingProcess: >-
    以 90 天付费试点为主要切入机制，范围限定于一条疾病专属转诊通道，由二次会诊项目主任
    或肿瘤服务线副总裁在产品演示后发起；正式生产合同需经过 IT 安全审查、首席医疗官临床
    批准和法务 BAA，通常在试点成功记录后再增加 2–4 个月。

product:
  mvp: >-
    面向协调员的网页工具，接受单条淋巴瘤或肉瘤转诊通道的文档上传（PDF、影像报告、
    实验室数据），提取按时间排序的病例时间线，分类缺失病历类型，并生成一页治疗建议
    冲突简报供专科医生会诊前参考；发布时无需 EHR 集成。
  sixMonth: >-
    增加跨多条既往治疗建议的自动冲突检测、AI 生成的每病例专科医生问题包，以及多病例
    协调员工作队列看板；在同一启动中心扩展至第二条疾病通道（肉瘤或妇科肿瘤）。
  twelveMonth: >-
    面向主要中心最高量 EHR 来源的原生 FHIR R4/HL7 连接器，减少手动上传负担；肿瘤委员会
    准备模块上线，为院内多学科会议输出病例简报；3–4 个中心进入生产。
  twentyFourMonth: >-
    雇主和付款方转诊通道模块，支持外部福利项目路由的病例整合；结构化导出至 EHR 或护理
    管理系统；6 个以上中心在线；专有分歧-结果数据集在全部历史评审案例中运行；面向项目
    主任的跨中心基准对比看板。
  keyBets:
    - "外部病历标准化引擎在通用环境记录厂商建立可比稀有癌症特异性之前赢得专科医生信任"
    - "每病例数据飞轮：每个经评审的病例丰富冲突模式库，提升跨病种下游分歧检测精度"
    - "运营软件定位在低于 FDA 临床决策支持分类的同时，持续交付规避过度治疗的 ROI，支撑企业级支出"
    - "FHIR/mCODE/DICOM 技术栈在第 6 个月前成熟到足以在早期客户自动完成 ≥50% 的病历摄取，保护协调员采纳经济性"

gtm:
  wedge: >-
    向 2–3 家已在营销淋巴瘤或肉瘤虚拟或线上二次会诊的 NCI 指定癌症中心的二次会诊项目
    主任出售 90 天付费试点；试点范围为一条疾病通道，成功指标为每病例协调员准备时间中位数
    减少 ≥30%。
  channels:
    - "创始人主导直接企业销售，面向 NCI 指定中心的肿瘤服务线负责人和二次会诊项目主任"
    - "通过罕见癌症临床网络（SARC 肉瘤合作组、淋巴瘤工作组）发起试点，为高量中心提供热引荐"
    - "AccessHope 类专家评审运营商作为渠道或数据合作伙伴（前提是中心侧工作流验证完成）"
    - "学术会议（ASCO、NCCN）出席，用于招募临床倡导者并在二次会诊运营品类中建立品牌"
  funnelTargets: "出站联系到合格发现通话 20–30%；发现通话到试点意向书 25–40%；试点到正式合同 50%+（以记录准备时间减少 ≥30% 为条件）"
  pricing: >-
    每中心年度平台最低费用 $60–120K，加上超出合同基准量的转诊案例按 $200–400 计费；
    肿瘤委员会准备和雇主/付款方通道高级模块按额外每模块或每席位计费。定价逻辑：按案例
    计费将收入与转诊量增长挂钩，平均软件成本远低于中心已收取的 $1,690–3,000 每案例
    自费费用；平台最低费用覆盖固定集成和合规成本。

businessModel:
  revenueStreams:
    - "每中心年度平台订阅（覆盖基准案例量和协调员席位）"
    - "超出合同基准量的按转诊案例费"
    - "肿瘤委员会准备及雇主/付款方转诊通道高级模块费"
    - "实施与集成服务（初期捆绑进试点费用以降低采纳摩擦）"
  unitOfValue: "通过助手工作流处理并生成专科医生评审分歧简报的符合条件的复杂肿瘤转诊案例"
  targetGrossMarginPct: 70
  expansionLevers:
    - "随着落地中心虚拟二次会诊项目扩大规模及雇主/付款方合同增加转诊量，在现有中心内实现量的增长"
    - "向同一二次会诊项目买家交叉销售肿瘤委员会准备模块，无需新采购周期"
    - "利用已记录的中心侧 ROI 作为证明，向雇主和付款方渠道扩展以撬动福利导航采购"
    - "面向跨多站点管理转诊的大型集成肿瘤网络提供多中心平台授权"

strategyMap:
  northStarMetric: "每月经 AI 生成分歧简报后由专科医生评审的肿瘤案例数（对比手动基线）"
  inputMetrics:
    - "外部转诊到达至专科医生可用病例包的中位天数"
    - "专科医生首次接触时具备完整相关病历的案例比例"
    - "每 100 个符合条件案例中识别出的建议冲突数量"
    - "每病例协调员准备时间（分钟）"
    - "试点转化为正式合同的比率"
    - "每中心净收入留存（同比案例量 × 案例费）"
  moatsToBuild:
    - "将外部病历冲突模式与最终诊断或治疗变更关联的专有数据集（跨所有历史评审案例）"
    - "与各滩头中心最高量社区转诊来源的 EHR 和 FHIR 集成"
    - "跨中心准备时间、冲突率和治疗变更频率基准，将平台打造为专家评审运营的记录系统"
    - "专科肿瘤医生对助手简报的工作流信任——将其作为主要会诊前评审文档"
  killCriteria:
    - "种子轮关闭 6 个月内来自 NCI 指定中心的试点意向书不足 2 份"
    - "前两个完成试点后试点转化率低于 40%"
    - "任何已完成试点群组的协调员准备时间中位数未减少至少 30%"
    - "种子轮后第 18 个月前无可引用的正式生产客户"
    - "平均试点交易规模低于 $60K ACV，使单位经济模型在建模销售成本下不可持续"
  mermaid: |
    flowchart LR
      Wedge[Second-opinion program director\nat NCI cancer center] --> Pain[Fragmented external referrals\ndelay specialist review]
      Pain --> MVP[Case-compilation and\ndiscordance copilot MVP]
      MVP --> Proof[Documented prep-time\nreduction in 90-day pilot]
      Proof --> Expand[Tumor-board module +\nemployer/payer pathway]
      Expand --> Moat[Conflict-to-outcome\ndataset + integrations]

investorMemo:
  verdict:
    call: "进一步调查/跟进"
    conviction: "对痛点严重性、切口清晰度和竞争空白高度确信；主要疑虑是证据基础只有一个创始人案例研究，且学术医疗中心销售周期通常为 6–12 个月。"
    whyBelieve: "肿瘤专家复审在罕见癌症中有据可查地改变诊断并避免不必要治疗；中心已对自费二次会诊收取 $1,690–3,000，使软件 ROI 保守可信；没有任何现有厂商在会诊前将碎片化外部病历整合为专科医生可用的分歧图谱。"
    whyDoubt: "初始 why-now 信号是一个单一的引人注目的创始人故事，而非多中心工作流研究；学术医疗中心采购周期加上首席医疗官的责任审查，可能将首笔正式收入推迟至第 18 个月之后。"
    nextDiligence: "与一家每月处理 50 个以上复杂外部转诊的 NCI 指定癌症中心签署意向书或付费试点协议，并记录试点前每病例协调员准备时间基线。"
  firstCustomer:
    title: "NCI 指定癌症中心二次会诊项目主任"
    profile: "一家设有活跃淋巴瘤或肉瘤远程或虚拟二次会诊服务的学术癌症中心，配备 2–4 名护理导航员，每月从社区肿瘤科医生处手动拼装 50–200 份外部转诊材料包。"
    trigger: "项目在签署新的雇主或付款方转诊合同后扩大规模，而协调员在不增加人手的情况下已无法以足够快的速度为可用的医生时间槽准备好专科医生可用的病例包。"
    buyer: "肿瘤服务线副总裁或二次会诊项目主任"
    initialContract: "年度平台费 $60–120K 加按案例计费；通过 90 天付费试点切入，范围限定于一条疾病专属转诊通道，以协调员准备时间作为主要成功指标。"
  mustBeTrue:
    - "NCI 指定中心的二次会诊项目主任在 90 天试点记录每病例协调员准备时间减少 ≥30% 后，愿意授权 $60–120K 以上的年度软件支出。"
    - "助手能将至少 70% 的入站外部转诊文档（PDF、影像报告、实验室数据）标准化为可用的结构化时间线，无需协调员手动重新录入。"
    - "当 AI 生成的分歧图谱和问题包包含明确的人工审批节点和完整审计轨迹、满足首席医疗官责任要求时，专科肿瘤医生会据此采取行动。"
    - "至少 20–25 个 NCI 指定或同类癌症中心有足够的转诊量（每月 ≥50 个符合条件的复杂案例）和项目成熟度，在 2 年商业窗口内支撑初始平台费。"
    - "罕见癌症转诊队列中的建议冲突和缺失证据模式足够频繁，使 90 天单通道试点能识别出足以构成可辩护 ROI 证据的决策相关信号。"
  diligenceQuestions:
    - "贵中心每月在淋巴瘤、肉瘤和其他罕见癌症中处理多少符合条件的外部转诊，其中有数字病理和影像访问权限的占多大比例？"
    - "您的首席医疗官在允许 AI 生成的分歧图谱进入会诊前工作流之前，需要哪些责任免责语言和人工审查节点？"
    - "谁获得第一年 ROI——中心自己的二次会诊项目、雇主或付款方合同伙伴，还是两者共享——这会影响软件预算归属吗？"
    - "您的肿瘤软件采购从试点开始到正式合同通常需要多长时间，试点预算由项目主任控制还是需要副总裁或高管批准？"
    - "AccessHope、OncoLens、Abridge、院内 EHR 工作流或护理导航员人力中，哪个是目前最接近的替代方案？现有厂商需要推出什么才能使这个方案变得多余？"
    - "过去 12 个月内，您见过因模糊随访发现（影像、病理或冲突既往方案）延误治疗或导致可避免升级的案例吗？最终如何解决的？"

operatingAssumptions:
  - assumption: "滩头中心每月接收至少 50 个符合条件的淋巴瘤或肉瘤复杂外部转诊，产生足够的按案例量以实现 $60–120K 年度平台最低费用的盈亏平衡。"
    basis: idea.yaml
    validationTest: "在签署试点意向书前，对 3 个潜在 NCI 指定中心进行转诊接收审计，确认符合条件的案例量和当前协调员准备时间基线。"
    decisionImpact: "若每月符合条件量中位数低于 30 个案例，按案例经济性收缩，平台最低费用须提升至 $150K 以上，或 SAM 大幅收缩；切入点向更大的网络运营商转移。"
  - assumption: "每案例约 $750 的软件价值远低于中心已收取的自费二次会诊价格（$1,690–3,000），使 ROI 论据无需仅依赖运营节省即可成立。"
    basis: research.yaml
    validationTest: "对 5 位肿瘤服务线副总裁或项目主任联系人进行定价访谈，确认他们以专科医生劳动力成本或二次会诊收费收入为基准衡量软件，而非仅以协调员小时成本为基准。"
    decisionImpact: "若买家仅以协调员小时成本为基准（约 $35–50/小时 × 4 小时 = $140–200/案例上限），按案例定价须降至 $150 以下，或切换至 FTE 替代框架并提高平台最低费用。"
  - assumption: "仅靠协调员上传的 MVP（无 EHR 集成）在签署首份合同前无需 FHIR 或 HL7 连接器，即可通过 90 天试点并交付足够的准备时间缩减。"
    basis: operator judgment
    validationTest: "第一个中心的 90 天试点使用仅上传方式摄取，测量是否比基线实现 ≥30% 准备时间中位数减少，尽管文档提交为手动。"
    decisionImpact: "若协调员拒绝手动上传工作流并坚持要求在试用前实现自动化 EHR 摄取，MVP 需提前投入 FHIR 集成开发，首次试点时间线延长 3–4 个月，工程支出增加 $200–400K。"
  - assumption: "运营软件监管定位——证据整合、缺失病历检测和问题生成并强制人工审批——使产品低于需要 FDA 审批的临床决策支持分类门槛。"
    basis: research.yaml
    validationTest: "商业发布前由健康 IT 监管法律顾问提供书面评估，确认产品在 21 世纪治愈法案标准下符合非设备 CDS 资格。"
    decisionImpact: "若证据整合功能被归类为设备 CDS，FDA 510(k) 或 De Novo 路径将在时间线和预算中增加 12–24 个月和 $500K–1M 以上，需要种子轮延期或策略向范围更窄的 MVP 转型。"
  - assumption: "滩头病种（淋巴瘤、肉瘤）中罕见癌症建议冲突和模糊影像发现的频率足够高，使 90 天单通道试点能在至少 20–30 个案例中识别出有意义的决策变更信号。"
    basis: research.yaml
    validationTest: "试点中心的回顾性病例审计显示，淋巴瘤或肉瘤转诊队列中每 100 个评审案例有 ≥10 个建议冲突或模糊发现标记。"
    decisionImpact: "若滩头病种的分歧率低于 5%，规避过度治疗的 ROI 故事崩溃，价值主张退化为单纯的协调员效率提升，这在种子阶段可能无法支撑 $60–120K ACV，除非效率提升幅度更大。"

experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "创始人主导对 NCI 指定中心 12–15 名护理导航员和二次会诊项目主任的发现访谈"
    hypothesis: "15 个项目中至少 8 个报告复杂罕见癌症病例协调员准备时间中位数超过 4 小时，确认生产力 ROI 是主要试点钩子。"
    successMetric: "≥8/15 次访谈确认准备时间中位数 >4 小时，且表达参与单条疾病通道 90 天付费试点的意愿。"
    owner: "创始人/CEO"
  - horizon: "0–90 天"
    experiment: "针对潜在试点中心的 25 份去标识化回顾性肿瘤转诊记录构建并测试病例时间线原型"
    hypothesis: "原型在至少 75% 的评审案例中正确识别既往治疗建议中的时间冲突或模糊影像发现。"
    successMetric: "≥18/25 个案例输出专科医生可评审的时间线，且至少包含一个经肿瘤临床顾问确认具有临床意义的冲突或缺失证据标记。"
    owner: "创始工程师"
  - horizon: "90–180 天"
    experiment: "在一家 NCI 指定癌症中心的单条淋巴瘤或肉瘤转诊通道上执行首个付费 90 天试点"
    hypothesis: "仅靠协调员上传的摄取方式使每病例准备时间中位数比记录的试点前基线减少 ≥30%。"
    successMetric: "从外部转诊到达至专科医生可用病例包中位天数减少 ≥30%；≥70% 的试点案例以助手简报作为主要会诊前文档完成评审。"
    owner: "创始人/CEO 及临床运营负责人"
  - horizon: "90–180 天"
    experiment: "对潜在第二、三个客户的 5 位肿瘤服务线副总裁或项目主任联系人进行定价敏感性访谈"
    hypothesis: "若 ROI 文档显示平台成本的协调员工时节省 ≥2 倍，5 位买家中至少 3 位将授权 $80K 以上年度支出。"
    successMetric: "≥3/5 位买家基于第一试点数据推导的 ROI 模型确认 $80K 以上 ACV 的预算授权意向。"
    owner: "创始人/CEO"
  - horizon: "180–365 天"
    experiment: "为主要中心最高量 EHR 来源开发并试点 FHIR R4 连接器以减少手动文档上传"
    hypothesis: "自动化病历摄取覆盖在线中心至少 50% 的符合条件案例文档，无需协调员手动上传。"
    successMetric: "≥50% 的案例文档从 EHR 或 FHIR 端点自动摄取进入生产；涵盖文档类型的协调员上传事件减少 ≥40%。"
    owner: "创始工程师"
  - horizon: "180–365 天"
    experiment: "在首个正式生产中心的院内多学科会议上 Beta 测试肿瘤委员会准备模块"
    hypothesis: "肿瘤委员会协调员报告病例准备时间比此前手动流程减少 ≥25%，且医生认为简报足以替代会议前的独立病历查阅。"
    successMetric: "首轮 4 次会议周期内，≥2/3 位主要肿瘤委员会医生将助手简报作为会议前主要文档采纳。"
    owner: "临床运营负责人"

operations:
  - "HIPAA 合规云基础设施并签署 BAA（AWS 或 Azure GovCloud 同等方案）；第 12 个月目标取得 SOC 2 Type II 认证"
  - "FHIR R4/HL7 连接器路线图按滩头客户案例文档量优先排序：Epic 首位，Cerner 其次，专业 PACS 集成随后"
  - "CAP 合规病理内容策略：仅提供结构化摘要和冲突标记，不直接转载或使用 CAP 授权材料的模板文本"
  - "每次发布涉及分歧图谱或问题包输出的版本，须在发布前由持照肿瘤专业人员进行临床安全审查"
  - "每个客户从试点启动起即配备专属客户成功负责人；首位客户成功招聘为肿瘤护理导航员或前二次会诊协调员，以保持工作流公信力"
  - "持续监测 ONC 互操作性与信息封锁规则动态，关注影响外部转诊工作流 EHI 访问或数据共享义务的政策变化"

team:
  - role: "创始工程师（临床 NLP 与健康数据集成）"
    startTiming: "第 0 个月"
    rationale: "构建病例时间线提取引擎、文档标准化流水线和 FHIR 集成层；须具备肿瘤学或临床 NLP 及 HIPAA 合规数据处理的实际经验。"
  - role: "肿瘤临床顾问或联合创始人（护理导航员或肿瘤信息学专家）"
    startTiming: "第 0 个月"
    rationale: "共同设计协调员工作流，验证分歧图谱和问题包的临床安全框架，在试点期间为首席医疗官和医生倡导者提供可背书的公信力。"
  - role: "企业销售负责人（具备学术医疗中心或医疗系统经验）"
    startTiming: "第 6 个月"
    rationale: "在创始人主导的第一个试点之后负责第二、三个中心的交易；学术中心销售周期需要专职的关系维护和采购流程把控，创始人无法在同时跟进两个以上客户时独力承担。"
  - role: "临床运营与客户成功负责人（前导航员或二次会诊协调员）"
    startTiming: "第 6 个月"
    rationale: "作为导航员和协调员团队的运营对口方推动试点转化为正式合同；识别肿瘤委员会模块扩展的追加销售触发点。"

milestones:
  - horizon: "0–12 个月"
    items:
      - "种子轮完成（$3–5M）"
      - "发现访谈项目完成（≥12 个 NCI 中心联系人，2 份试点意向书签署）"
      - "MVP 在首家 NCI 指定癌症中心的淋巴瘤或肉瘤转诊通道上线"
      - "90 天第一次试点完成，记录协调员准备时间减少 ≥30%"
      - "第二份试点意向书签署（第二个中心，第二条疾病通道）"
      - "监管法律顾问意见书确认运营软件 CDS 分类"
  - horizon: "12–24 个月"
    items:
      - "跨不同 NCI 指定中心签署 3–4 份正式合同"
      - "肿瘤委员会准备模块在主要中心上线"
      - "FHIR R4 集成在主要中心上线，覆盖 ≥50% 的案例文档摄取"
      - "$1.2–2M ARR"
      - "SOC 2 Type II 认证完成"
      - "雇主或付款方转诊通道模块完成范围规划并进入试点设计"
  - horizon: "24–36 个月"
    items:
      - "6 个以上中心在正式生产中运行"
      - "雇主和付款方转诊通道模块在 2 个以上客户启动"
      - "$3.5–4M ARR"
      - "专有分歧-结果数据集在所有历史评审案例中运行"
      - "以留存和扩展指标为依据启动 A 轮融资"

risks:
  - risk: "临床责任顾虑阻碍首席医疗官批准分歧图谱工作流"
    likelihood: High
    impact: High
    mitigation: "所有输出均定位为证据整合和问题生成，绝不涉及治疗建议；每份简报都要求医生明确审批；为每个案例构建并发布完整审计轨迹；试点期间将首席医疗官倡导者纳入共同设计。"
  - risk: "集成阻力：外部病历以异构 PDF 和门户导出形式到达，拖慢自动化进程和协调员采纳"
    likelihood: High
    impact: Medium
    mitigation: "MVP 以仅协调员上传方式启动，无需 EHR 集成；在添加 FHIR 连接器前先在窄通道上证明价值；试点验证后优先集成最高量来源以保护首批交易经济性。"
  - risk: "学术医疗中心采购周期超过 12 个月，延迟首笔正式收入"
    likelihood: High
    impact: Medium
    mitigation: "先销售付费试点（90 天、范围明确、有定义成功指标）以产生收入并降低采购风险；在 IT 和法务审查前确保内部临床倡导者；优先选择有可见二次会诊项目和现有供应商关系的中心。"
  - risk: "初始证据基础薄弱——一个创始人案例研究——意味着罕见癌症分歧问题的实际发生频率或预算化程度可能低于预期"
    likelihood: Medium
    impact: High
    mitigation: "在签署意向书前，在前两个潜在中心进行回顾性病例审计以确认符合条件的转诊量和基线分歧频率；前两个试点后发布同行评审案例研究 ROI 数据以建立临床公信力。"
  - risk: "通用环境记录厂商（Abridge、Ambience）向上游会诊前病历综合扩展"
    likelihood: Medium
    impact: High
    mitigation: "将罕见癌症疾病特异性、外部病历核对和审计轨迹深度作为永久差异化因素；加速构建专有分歧-结果数据集，形成这些厂商若无相当规模的二次会诊工作流部署就无法快速复制的护城河。"

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月资金跑道用途：创始工程团队（2–3 人）构建病例时间线引擎、标准化流水线和首个 FHIR 连接器；在 NCI 指定癌症中心开展两个付费 90 天试点（含实施支持）；第 6 个月企业销售招聘；HIPAA/SOC 2 合规与监管法律顾问；临床安全审查基础设施。第 18 个月退出标准：3 份已签正式合同和 $1.2M ARR。"
