slug: surface-finishing-quote-os
date: '2026-07-09'
executiveSummary: Surface Finishing Quote OS 瞄准的是航空航天机器人精整里一个窄但可信的痛点：在吃掉稀缺程序员产能、或占用在产去毛刺 / 抛光单元之前，先快速判断一个新零件能不能在现有单元上赚钱地跑起来。产品不是另一套离线编程软件，而是一层报价到工艺的记录系统，架在 ENCY、RoboDK、Robotmaster 和各家 OEM 工具之上，把 CAD 文件、表面规格和单元模板变成人工复核后的可行性分数、节拍区间、工装假设和可复用工艺包。最合适的首批客户，是北美通过 AS9100 认证、拥有 2-4 个机器人精整单元、反复处理钛合金或铝合金零件家族、且 RFQ 周转已经被一位资深程序员卡住的工厂。研究支持这个市场确实存在，但规模不大：TAM 约 $77.6M，滩头市场 SAM 约 $7.6M；如果公司能拿下 24 家工厂、每个活跃单元年花费约 $20k，到第 3 年可触达的 SOM 约 $1.5M。也因此，这更像一个很强的工作流切口，还不是自带创投级体量的独立市场；投资成立与否，取决于后面能否继续扩到工单释放、QA 证据，以及多工厂或相邻垂直的去材作业。产品路径刻意保守：先在重复的钛合金和铝合金零件家族上做顾问式报价和人工签核，再补上“估算对实际”的学习、工艺包复用，更深的集成和相邻垂直则放到后面。最大的反证风险是信任：如果回测和首批试点，始终赢不过 Excel / 人工估算，或者降不下计划外上机验证，买家还是会回到资深程序员和集成商手里。研究还留下两个没解完的洞：目标工厂里到底有多少已经跑 2-6 个单元，以及 100 人以下工厂里最先拍板的人是谁。因此，前 90 天必须先把单元密度、预算归属和数据接入可行性做实，再谈扩张招聘。
problem:
- 拥有 2-6 个机器人去毛刺或抛光单元的航空航天精整工厂，今天仍得靠资深程序员或外部集成商来判断一个新零件能不能上机器人。这会拖慢 RFQ 周转，也会把在产单元的时间挤掉。
- 现有离线编程套件，能帮工厂在决定接单后往下走；但它们留不住报价假设、审批上下文，也沉不下“估算对实际”的学习，更拼不出一条适配 AS9100、Nadcap 和 ITAR 敏感环境的可审计流程。
solution:
- 在程序员碰到在产单元之前，先吃进 CAD、材料、表面规格和目标单元约束，产出一份经人工复核的机器人可行性分数、节拍区间、碰撞与可达性标记，以及工装假设。
- 把每一笔已接单报价都沉成可复用的工艺包，供编程、QA 和排产使用，再把上机验证结果回灌到模板库里，让重复零件家族越报越快、越报越准。
whyWeWin:
- 在 ENCY、RoboDK、Robotmaster 或各家 OEM 工具接手之前，这家初创公司先拿住决策层：哪些零件值得按机器人精整去报价，报价建立在什么假设上，以及这次决策怎么沉成可复用的运营记忆。
- 一套跨 OEM 的数据集，把几何、材料、工装、节拍假设、审批记录和真实上机验证结果绑在一起，就能长成服务公司和单厂商 OLP 套件都不自然会去搭的护城河。
strategicChoices:
  beachhead: 北美 AS9100 认证航空航天精整工厂，拥有 2-6 个机器人去毛刺或抛光单元，处理重复出现的钛合金支架或铝合金壳体，并且已经感受到 RFQ 积压或程序员瓶颈。
  wedgeRationale: 这一段市场触发最明确、验证闭环最短、可复用数据也最多。重复零件家族让报价精度可以被检验；在产单元停机让 ROI 对运营负责人一眼就能算清；而且这套流程还能在不替换客户编程栈的前提下持续改进。
  sequencingRationale: 先做顾问式报价、置信区间和工艺包记录，再谈更深的自动化，因为研究已经说明，仿真精度、安全审查和工作流信任才是真正的采用障碍。GTM 团队扩起来之前，先靠创始人主导销售，再配一个偏应用工程的部署动作，好让公司先看清报价假设到底会在哪些地方失真，然后再去扩连接器、渠道和垂直范围。
  notYet:
  - 在重复钛合金和铝合金零件家族上的航空航天验证跑通前，先不做医疗器械或通用工业精整
  - 暂不做自动生成机器人代码，也不做完整的自适应精整控制；现有 OLP 和单元自动化栈继续充当执行层
  - 暂不碰大而全的 ERP 替换、通用报价软件或全能型制造分析
market:
  tam: $77.6M（研究估算：北美约 3,879 个可覆盖的去材或精整单元，每个活跃单元年工作流支出约 $20k）
  sam: $7.6M（研究估算：北美偏航空航天的滩头市场精整工厂，套用机器人就绪子集和每厂约 3.5 个活跃单元）
  som: $1.5M（研究里的第 3 年情形：24 家付费工厂，每家约 3.2 个活跃单元，每个活跃单元年支出约 $20k）
  segments:
  - 主要：面向 AS9100 或 Nadcap 的航空航天精整加工厂，拥有 2-6 个机器人去毛刺或抛光单元
  - 次要：多工厂精密精整商，或正把机器人表面精整扩到相邻航空航天 / 医疗项目里的合同制造商
  buyingProcess: 日常推动者通常是制造工程经理、应用工程负责人或资深机器人程序员，但真正批预算的会是运营副总裁或制造工程总监，因为这笔钱最终要靠报价吞吐、产能和单元利用率来证明。最容易成交的时点，是新单元调试、RFQ 积压，或关键程序员卡住的时候；如果 CAD 和工艺数据涉及 ITAR 或 CUI，还得过 IT 或安全审查。
product:
  mvp: 一个“单单元、单零件家族”的报价顾问：吃进 CAD、材料、表面规格和预配置单元模板，吐出经人工复核的可行性分数、节拍区间、工装假设和工艺包记录。最终路径生成仍复用客户现有的 OLP 或 OEM 软件，而不是自己去生成生产级机器人代码。
  sixMonth: 上线历史 RFQ 回测工具、1-2 个可复用的 OLP 或 OEM 连接器、“实际对估算”看板，以及首批钛合金和铝合金零件家族的可复用模板。
  twelveMonth: 补上审批工作流、本地部署或私有云、多单元模板复用，以及导出到 QA 和排产的能力，让已接单报价变成受控的生产交接，而不是一张留在表格里的记录。
  twentyFourMonth: 从单单元报价扩到航空航天精整商的多工厂工艺记忆层；只有在模板精度证明可以迁移时，才开始切入相邻的医疗器械或通用工业去材工作流。
  keyBets:
  - 重复的钛合金和铝合金零件家族足够结构化，节拍置信区间有机会跑赢电子表格和口口相传式估算。
  - 光是一份工艺包记录，本身就有足够价值，能在公司自动化更多机器人编程之前先把采用率打出来。
  - 本地部署或私有云，再加上明确的数据控制，就足以解开 ITAR / CUI 敏感试点的阻碍。
  - 只要模板库和连接器库足够小而精，部署就有机会压在 90 天以内，也能避免业务一路滑向应用工程服务。
gtm:
  wedge: 在调试上线、积压爆发或程序员瓶颈出现时，向 AS9100 认证工厂卖一笔付费的单单元 RFQ 分流试点，用一套经人工复核的“报价到工艺包”，替掉“电子表格 + 在产单元上机验证”的手工活。只有当试点在一个重复零件家族上证明报价更快、计划外验证更少后，才继续扩。
  channels:
  - 创始人亲自直销给目标精整工厂里的制造工程负责人、运营负责人和老板兼经营者
  - 与已经参与单元调试或改造的机器人 OEM、末端执行器和磨料供应商、航空航天自动化集成商建立联合销售或转介绍关系
  - 通过 A3、NASF 和航空航天供应商生态做定向触达，因为这些地方本来就在讨论自动化、劳动力短缺和吞吐提升项目
  funnelTargets: 目标账户 → 合格初访 20-30%，合格初访 → 付费试点 30-40%，付费试点 → 生产签约 50%+，生产签约 → 第二单元或第二站点扩张在 12 个月内达到 60%+
  pricing: 先收上线实施费，再按活跃精整单元收年费，上面叠 RFQ 量分层。这样定价绑定的是少掉的在产单元停机、更快的报价周转和可复用工艺包，而不是席位数，也和想法阶段的“按单元定价”假设一致。
businessModel:
  revenueStreams:
  - 按活跃机器人精整单元收取年度订阅费
  - 上线实施以及 CAD / OLP 连接器部署收费
  - 审批、QA 交接和“估算对实际”分析的扩展模块
  unitOfValue: 受管理的活跃机器人精整单元，以及对应的已报价零件家族
  targetGrossMarginPct: 70
  expansionLevers:
  - 先在第一家工厂里加更多单元、材料和重复零件家族
  - 在多工厂精整集团内部复制到兄弟站点
  - 一旦报价精度被信任，就加售审批、QA 证据和基准分析
  - 只有当航空航天模板库被证明可复用后，才往相邻的去材工作流扩
strategyMap:
  northStarMetric: 已接单 RFQ 在不发生计划外在产单元上机验证的前提下，按报价节拍区间顺利启动
  inputMetrics:
  - 从收到 CAD 到交付客户可用报价的中位小时数
  - 已接单作业在报价节拍置信区间内启动的占比
  - 每个新零件家族对应的计划外在产单元上机验证时长
  - 在重复版本和零件家族之间的模板复用率
  - 付费试点转生产合同的转化率
  moatsToBuild:
  - 一套跨 OEM 的几何、材料、工装和节拍数据集，并和“估算对实际”结果绑在一起
  - 一套按零件家族沉淀审批、工装假设和可复用工艺包的精整模板库
  - 靠可审计记录和受控数据架构，在 ITAR / CUI 敏感环境里建立部署可信度
  killCriteria:
  - 前 5 家目标工厂里，6 个月内买下付费单单元试点的不到 2 家
  - 历史回测和前 2 个试点，没法让至少 70% 的重复零件作业落进报价节拍区间，或者没把报价周转砍下 30%+
  - 前 3 个试点的中位部署时间超过 90 天，原因是连接器、安全或数据归一化工作太定制
  mermaid: |
    flowchart LR
      Wedge[AS9100 finishing RFQ triage] --> MVP[One-cell quote to process pack]
      MVP --> Proof[Faster quotes and less live-cell prove-out]
      Proof --> Expansion[Multi-cell, multi-site, adjacent-vertical expansion]
investorMemo:
  verdict:
    call: 观察
    conviction: 这是个锋利的工业工作流切口，痛点站得住，数据闭环也有护城河雏形；但在试点证明报价精度、且公司显示出能越过 $7.6M 滩头市场 SAM 之前，判断还不能太满。
    whyBelieve: 离线编程显然正在产品化，而这家初创公司切的，正是编程之前那道真实缺口：运营负责人已经切身感受到停机和专家产能的压力。
    whyDoubt: 初始市场偏窄，小工厂里到底谁拍板这个问题还没解，而且只要第一批估算跟现场脱节，信任就会很快塌掉。
    nextDiligence: 先拿到 10 份账户图谱、1 份盲测式历史 RFQ 回测，以及至少 1 个付费单单元试点，证明报价速度和上机验证改善是可量化的。
  firstCustomer:
    title: AS9100 认证航空航天精整工厂的制造工程总监
    profile: 一家北美工厂，拥有 2-4 个机器人去毛刺或抛光单元、一位资深机器人程序员，持续收到钛合金或铝合金零件家族 RFQ，而且又被逼着在不让在产单元停机的情况下加快报价。
    trigger: RFQ 量突然上来、新的精整单元刚上线，或者关键程序员在重复的航空航天作业上成了瓶颈。
    buyer: 运营副总裁或制造工程总监
    initialContract: 先卖一个 8-12 周、价格约 $25k-$40k 的单单元付费试点；如果试点证明报价速度和上机验证确实改善，这笔钱可以冲抵后续 2-4 个单元、每年 $50k-$80k 的订阅费，外加上线和连接器费用。
  mustBeTrue:
  - 至少 40% 的合格滩头市场工厂，已经跑着 2 个以上机器人去毛刺或抛光单元，并且每月都会评估重复的钛合金或铝合金 RFQ。
  - 对至少 50 份历史 RFQ 做盲测回放时，系统能让 70%+ 的重复零件作业落进报价节拍区间，同时把明显不适合机器人做的工件正确标出来。
  - 在前 5 个试点意向客户里，至少 3 家愿意在本地部署或私有云控制下开放 CAD 和上机验证数据，哪怕他们对 ITAR 或 CUI 有顾虑。
  - 只要报价周转变快、计划外上机验证时长下降，付费单单元试点转成年生产合同的比例就能超过 50%。
  - 在前 5 单赢单里，至少有 3 单会证明单一厂商 OLP 套件仍然不够用，因为买家需要一层跨混合工具和审批流程的中立“报价到工艺”记录系统。
  diligenceQuestions:
  - 目标 AS9100 或 Nadcap 精整工厂里，已经跑 2-6 个机器人精整单元，而不是只有一个试点单元的，占比到底多少？
  - 在 100 人以下的工厂里，最先签字的到底是谁：运营副总裁、制造工程总监、报价负责人，还是老板 / 总经理？
  - 资深程序员要看到多高的精度，才会相信一套软件生成的节拍区间，敢拿它直接去报价？
  - 在本地部署或私有云架构、且连接器有限的前提下，首个部署能不能压在 90 天内？还是说每个账户都会被拖成重服务定制？
  - ENCY、RoboDK、ABB 或某家集成商，最快多久就能把足够多的 RFQ 可行性工作流打包进来，把这个切口压扁？
operatingAssumptions:
- assumption: 具备 2-6 个单元、且有重复零件家族的“机器人就绪”航空航天精整工厂，数量足够支撑一个聚焦的北美切口。
  basis: research.yaml
  validationTest: 做出 10 份共创客户账户图谱，把单元数量、机器人品牌、材料和月度 RFQ 节奏都摸清，并对齐 research 里最高优先级的验证计划。
  decisionImpact: 如果这个判断不成立，ICP 就得继续收窄到多工厂集团，或者改去单元密度更高的其他垂直。
- assumption: 在重复的钛合金和铝合金零件家族上，节拍置信区间可以在不生成完整机器人代码的前提下，跑赢人工估算。
  basis: research.yaml
  validationTest: 对至少 50 份历史 RFQ 做盲测回放，把模型输出同时拿去对照真实上机验证结果和资深程序员估算。
  decisionImpact: 如果这个判断不成立，公司就该把核心切口从“报价智能”转向工艺包记忆和审批流程。
- assumption: 在受控部署模式下，目标账户会分享足够多的 CAD、报价和上机验证数据，让团队建起一套会持续变强的估算库。
  basis: research.yaml
  validationTest: 完成至少 3 家防务相关或 ITAR 敏感意向客户的安全审查和试点数据共享协议。
  decisionImpact: 如果这个判断不成立，路线图就得先转本地部署，降低基准分析野心，或者绕开最敏感的账户。
- assumption: 按单元定价再叠加 RFQ 量分层，比按席位授权更贴合买家的预算心智。
  basis: idea.yaml
  validationTest: 向前 6 家合格意向客户拿出 3 套定价方案，并确认至少 4 家更偏好按单元或按工作流签约。
  decisionImpact: 如果这个判断不成立，公司就得把包装改成固定试点费、站点授权，或嵌入渠道的定价方式。
- assumption: 靠一套小而精的连接器和模板库，前 3 个部署可以在 90 天内交付完。
  basis: 团队判断
  validationTest: 跟踪前 3 个试点从启动到第一份真实报价之间的总天数，以及定制工程小时数。
  decisionImpact: 如果这个判断不成立，招聘计划就得提前补更多解决方案能力，产品范围也必须收得更紧，避免服务化蔓延。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 做 10 份共创客户账户图谱，覆盖单元数量、机器人品牌、材料、RFQ 量，以及当前报价流程到底归谁负责。
  hypothesis: 滩头市场里，拥有 2-6 个单元、且持续收到重复零件 RFQ 的工厂够多，足以支撑一条聚焦的销售动作。
  successMetric: 10 家被映射的账户里，至少 6 家满足完整 ICP，并确认每月都有重复零件 RFQ 流入。
  owner: 创始人 / 制造业 GTM 负责人
- horizon: 0-90 天
  experiment: 对共创客户的至少 50 份历史钛合金和铝合金 RFQ 做盲测回放。
  hypothesis: 一套“规则 + 模板”的估算器，能在任何在产单元上机验证之前，先给出有用的可行性判断和节拍区间。
  successMetric: 被评估的作业里，70%+ 能落进报价节拍区间，而且工程师愿意承认输出至少在方向上有用。
  owner: 创始工程师
- horizon: 0-90 天
  experiment: 跟 3 家防务相关意向客户开安全和部署工作坊。
  hypothesis: 只要本地部署或私有云，加上清晰的权限控制，就足以解开试点数据共享的阻碍。
  successMetric: 3 家意向客户里，至少 2 家会接受试点架构，而不要求完全气隙的定制化搭建。
  owner: 创始人 / 平台负责人
- horizon: 3-6 个月
  experiment: 上线一个付费单单元试点，把一笔已接单报价沉成某个重复零件家族上的可复用工艺包。
  hypothesis: 这套“报价到工艺”记录层，能比电子表格式手工流程更快地压下报价周转和计划外验证。
  successMetric: 在试点账户里，报价周转提速 30%+，计划外在产单元上机验证时长下降 20%+
  owner: 应用 / 解决方案工程师
- horizon: 6-12 个月
  experiment: 用“按单元 + RFQ 分层”的合同方式，在 3-4 家合格工厂里测试付费试点转化和定价。
  hypothesis: 只要工作流改善能被量化，买家就愿意先付单单元试点的钱，再转成年生产合同。
  successMetric: 12 个月内，至少拿下 2 个付费试点和 1 个转成生产年合同的客户。
  owner: 创始人 / 制造业 GTM 负责人
- horizon: 6-12 个月
  experiment: 和某个 OEM、集成商或工装伙伴一起，试跑一条围绕单元调试事件的转介绍或联合销售动作。
  hypothesis: 调试和改造伙伴给出的线索，时机要比宽泛的漏斗顶部营销更准。
  successMetric: 单一伙伴渠道至少带来 3 个合格机会。
  owner: 创始人 / 合作伙伴负责人
- horizon: 12-18 个月
  experiment: 用同一套模板家族，把首个生产客户从一个单元扩到第二个单元或兄弟站点。
  hypothesis: 模板复用能缩短部署时间，也是把 ACV 拉高的最快路径。
  successMetric: 扩张在 60 天内成交，合同价值相对最初生产范围提升 25%+
  owner: 创始人 / 大客户负责人
operations:
- 从第一天起就提供本地部署或私有云、基于角色的访问控制，以及面向 CAD 与工艺文件的明确数据隔离。
- 每周和客户应用工程团队一起复盘“估算对实际”，让报价失误直接变成模板更新，而不是售后工单。
- 就算产品自动化了更多上游分析，最终程序发布仍要留在客户现有的机器人安全和质量流程里，由人批准。
- 借 OEM、工装和集成商伙伴，在调试上线或改造节点把单元模板、工装假设和转介绍管道先种进去。
team:
- role: 创始人 / 制造业 GTM 负责人
  startTiming: 第 0 个月
  rationale: 公司第一道风险，是 RFQ 痛点能不能真的转成预算，所以创始人必须亲自抓需求发现、试点销售和共创客户关系。
- role: 创始工程师（CAD 收件与估算引擎）
  startTiming: 第 0 个月
  rationale: 核心产品问题，是要把混乱的 RFQ 输入，变成架在现有 OLP 系统之上、且值得信任的可行性与节拍输出。
- role: 应用 / 解决方案工程师
  startTiming: 第 3-6 个月
  rationale: 工业客户最终会按部署速度和估算贴不贴现场来判断产品，所以必须先有一个能把模板编码进去、又能把上线周期压短的人。
- role: 平台 / 安全工程师
  startTiming: 第 6-9 个月
  rationale: 一旦开始做防务相关试点，本地部署、私有云、审计日志和受控数据要求，就会直接变成产品定义的一部分。
- role: 渠道 / 客户负责人
  startTiming: 第 9-12 个月
  rationale: 只要第一个试点证明了价值，公司下一位 GTM 招聘就该盯住 OEM、集成商和多工厂账户扩张，而不是泛线索生成。
milestones:
- horizon: 0-12 个月
  items:
  - 完成 10 份 ICP 账户图谱，以及一套覆盖 50 份 RFQ 的历史回测数据集。
  - 上线单单元 MVP，至少带一个可复用的 OLP 或 OEM 连接器，以及一种受控部署选项。
  - 成交 2-3 个付费试点，并至少把 1 家工厂转成生产年合同。
  - 在一家共创客户那里证明：报价周转提速 30%+，计划外验证时长下降 20%+
- horizon: 12-24 个月
  items:
  - 做到 5-8 家生产级航空航天工厂客户，并至少把 2 个账户扩到第二个单元或兄弟站点。
  - 上线审批、QA 交接和“估算对实际”分析模块，并把它们绑到核心报价流程上。
  - 标准化 2-3 个高价值连接器和模板家族，把中位部署时间压在 90 天以内。
  - 建起至少 2 条伙伴渠道，能稳定带来合格的调试或改造机会。
- horizon: 24-36 个月
  items:
  - 只有在部署速度和试点转化率都守住目标的前提下，才去逼近研究里的 24 家付费工厂 SOM 情形。
  - 把模板和估算数据集继续沉成一层基准能力，去提升赢单率、报价把握和上线速度。
  - 相邻的医疗器械或通用工业扩张，到底比继续深挖航空航天精整更划算，要看证据，不看故事。
risks:
- risk: 仿真或估算精度不够，资深程序员不会相信软件生成的报价假设。
  likelihood: High
  impact: High
  mitigation: 先从重复的钛合金和铝合金零件家族切入，亮出置信区间、保留人工复核，并在扩大范围前用历史和实时上机验证数据把它校准。
- risk: 单元特定的工装、夹具和工艺差异，会把公司拖进重服务部署。
  likelihood: High
  impact: High
  mitigation: 早期产品先锁在单单元试点、少数材料和可复用模板家族上，并把部署时间作为董事会级指标来盯。
- risk: ITAR、CUI 或客户安全要求，把试点拖得太慢，慢到学不到东西。
  likelihood: Medium
  impact: High
  mitigation: 从第一天起就按本地部署或私有云来设计，并优先卖给那些愿意在受控但不完全定制的架构下试点的账户。
- risk: ENCY、RoboDK、Robotmaster、ABB 或集成商往上游吃进报价可行性工作流。
  likelihood: Medium
  impact: High
  mitigation: 差异化不要只押仿真，而要押在跨 OEM 中立性、可审计的报价假设，以及“估算对实际”的运营记忆上。
- risk: 如果不向相邻市场扩，航空航天精整这个滩头市场可能太小，或者周期性太强，撑不起创投级结果。
  likelihood: Medium
  impact: High
  mitigation: 把航空航天精整当成验证切口，不当成终局市场；扩张必须以模板可迁移性和渠道拉力可量化为前提。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱用来支撑 18 个月：做出单单元 MVP、完成受控部署与安全能力、跑 3-5 个共创客户试点、拿下前 2-3 个生产转化，并收集足够证据，判断这家公司是停在一个小众工作流工具，还是能扩成更宽的机器人去材操作系统。
