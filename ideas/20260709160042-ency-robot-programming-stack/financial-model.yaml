scenarios:
  downside:
    description: "Security review, services creep, and slower partner pull hold the business to 18 paid shops by Q4Y3 and pressure gross margin."
    y3RevenueK: 912.8
    y3EbitdaK: -751.6
    cashLowPointK: -90.4
    keyAssumptionChanges:
      - "Q4Y2 exits at 7 paid shops and Q4Y3 exits at 18 instead of 24."
      - "Y3 blended quarterly ARPU stays in the $17.0K-$18.0K range because second-cell and module attach rates lag."
      - "Gross margin slips to 65% and the deployment hire is pulled forward one quarter to absorb custom work."
  base:
    description: "Founder-led sales, one partner channel, and repeatable templates push the company to the researched 24-shop SOM path by Q4Y3."
    y3RevenueK: 1255.0
    y3EbitdaK: -431.5
    cashLowPointK: 282.0
    keyAssumptionChanges:
      - "Y1 closes 3 paid shops, Y2 exits at 8, and Y3 exits at 24 as second-cell expansions and referrals start to work."
      - "Blended quarterly ARPU steps from $16.5K in Q1Y2 to $19.0K in Q4Y3 as more accounts move from one-cell pilots to production scope."
      - "Hiring stays lean until productized connectors exist, with only one product hire in Y2 and one deployment hire in late Y3."
  upside:
    description: "Referrals and second-cell expansions land earlier, pushing 28 paid shops by Q4Y3 with slightly better module attach and margin."
    y3RevenueK: 1532.6
    y3EbitdaK: -188.6
    cashLowPointK: 553.0
    keyAssumptionChanges:
      - "Q4Y2 exits at 10 paid shops and Q4Y3 exits at 28 as commissioning partners produce earlier qualified pipeline."
      - "Quarterly ARPU rises to $18.5K-$20.0K as approvals, QA handoff, and multi-cell scope attach faster."
      - "Gross margin improves to 72% and the deployment hire is delayed until conversion evidence is clearer."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Blended production ARPU is 10% lower because pilots stay at one cell and modules do not attach."
    baseCase: "Mature production shops reach about $72K annualized revenue, with quarterly ARPU stepping from $16.5K to $19.0K over the model."
    upsideCase: "ARPU is 10% higher because second-cell expansions and approvals/QA modules attach faster."
    y3RevenueImpactK: -124.7
    cashImpactK: -121.6
  - variable: "CAC"
    downsideCase: "Partner leads convert worse and sales/marketing spend per new shop rises about 20%."
    baseCase: "Blended CAC is about $39.2K per new paid shop from Y2-Y3 S&M spend."
    upsideCase: "Referral efficiency improves and CAC falls about 15%."
    y3RevenueImpactK: 0.0
    cashImpactK: -39.4
  - variable: "churn"
    downsideCase: "Monthly churn runs closer to 1.8% and slows the paid-shop base to 21 by Q4Y3."
    baseCase: "Monthly churn stays around 1.2% once shops convert to annual production contracts."
    upsideCase: "Monthly churn is closer to 1.0% and Q4Y3 exits at 25 paid shops."
    y3RevenueImpactK: -141.2
    cashImpactK: -83.3
  - variable: "sales cycle"
    downsideCase: "Security review and customer validation add one quarter to the sales cycle, pushing many wins rightward."
    baseCase: "Backlog, commissioning, and programmer-bottleneck events keep the sales cycle short enough to reach 8 shops by Q4Y2."
    upsideCase: "One quarter comes out of the sales cycle because partner-sourced deals close faster."
    y3RevenueImpactK: -373.7
    cashImpactK: -273.2
  - variable: "gross margin"
    downsideCase: "Deployment and support stay services-heavy and gross margin settles at 65%."
    baseCase: "Gross margin reaches the BP target of 70% as pilots convert into repeatable software scope."
    upsideCase: "Cleaner deployments and higher software mix push gross margin to 72%."
    y3RevenueImpactK: 0.0
    cashImpactK: -87.8
  - variable: "hiring pace"
    downsideCase: "The product and deployment hires are both pulled forward by about one quarter to handle custom work."
    baseCase: "One product hire arrives in Y2 and one deployment hire arrives late in Y3 after conversion proof exists."
    upsideCase: "Both hires can be delayed by about one quarter without slowing customer delivery."
    y3RevenueImpactK: 0.0
    cashImpactK: -86.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Leads[Founder and partner leads] --> Pilots[Paid one-cell pilots]
      Pilots --> Production[Production shops and second-cell expansions]
      Production --> Revenue[Subscription plus onboarding revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway and next-round proof]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from growing from 3 paid shops at Y1 exit to 24 by Q4Y3 while moving each mature account toward roughly $72K of annualized production scope."
  - checkName: "Must go right"
    finding: "The company has to keep deployments template-light and sales cycles near plan because a one-quarter slip removes about $374K of Y3 revenue and roughly $273K of ending cash."
  - checkName: "Model breaks if"
    finding: "If security review and custom engineering push gross margin into the mid-60s, the downside case turns cash negative before the business reaches enough production shops to self-fund."
  - checkName: "Next-round proof"
    finding: "The next round is justified when the company reaches 8 production shops with at least 2 expansions and shows that sub-90-day deployments can repeat through partner-sourced pipeline."
sanityChecks:
  ruleOf40: "Y3 growth 239% + EBITDA margin -34% = 204% (directionally strong, but flattered by the small Y2 base)."
  burnMultiple: "Y2 burn multiple 3.1x improving to Y3 0.5x on net-new revenue."
  revenuePerFte: "$179K Y3 using q4Y3 headcount (below the $200-400K SaaS benchmark and acceptable only if deployments stay standardized)."
  flags:
    - "The base case depends on scaling from 8 to 24 shops in Y3; the sales-cycle sensitivity shows that a one-quarter slip is the biggest single cash risk."
    - "Revenue per q4Y3 FTE is still only about $179K, which means the company must prove that later years expand mostly through software scope rather than service-heavy onboarding."
    - "The round works at the low end of the BP funding range only because hiring stays disciplined and the model assumes no capex or working-capital drag."
