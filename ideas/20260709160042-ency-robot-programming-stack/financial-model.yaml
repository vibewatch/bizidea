slug: "surface-finishing-quote-os"
date: "2026-07-09"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[business-plan.yaml date] The model starts in the first full month after the 2026-07-09 plan date."
  - id: A2
    name: "Opening cash from pre-seed round"
    value: "2000"
    unit: "USDK"
    source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd] Uses the low end of the stated $2-4M range because the hiring plan stays lean enough to reach the 24-month operating milestone plus a 6-month buffer."
  - id: A3
    name: "Starting paid shops (M1)"
    value: "0"
    unit: "shops"
    source: "[business-plan.yaml experimentRoadmap 0-90 days] The first 90 days are account mapping, back-tests, and deployment/security workshops rather than production revenue."
  - id: A4
    name: "Paid-shop ramp"
    value: "3 at Y1 exit, 8 at Y2 exit, 24 at Y3 exit"
    unit: "shops"
    source: "[business-plan.yaml milestones; research.yaml market.som] Matches 2-3 paid pilots and 1 production conversion in Y1, the 5-8 production-shop goal in Y2, and the researched 24-shop year-3 SOM path if execution holds."
  - id: A5
    name: "Mature annual ARPU per production shop"
    value: "72"
    unit: "USDK/year"
    source: "[research.yaml bottomUpSizingDrivers + business-plan.yaml businessModel.expansionLevers] Anchored to about 3.5 active cells per shop x roughly $20K workflow spend per cell, plus modest attach for approvals/QA analytics."
  - id: A6
    name: "Period ARPU recognition ramp"
    value: "Y1 $7.0K per month, Y2 $16.5K-$17.5K per quarter, Y3 $18.0K-$19.0K per quarter"
    unit: "USDK/shop/period"
    source: "[business-plan.yaml investorMemo.firstCustomer.initialContract + gtm.pricing] Early periods reflect paid one-cell pilots and onboarding; later periods move toward full production subscriptions with broader cell scope."
  - id: A7
    name: "Target gross margin"
    value: "70"
    unit: "percent"
    source: "[business-plan.yaml businessModel.targetGrossMarginPct] Modeled as 30% COGS on recognized revenue."
  - id: A8
    name: "Founder / manufacturing GTM lead loaded annual cost"
    value: "120"
    unit: "USDK/year"
    source: "startup-finance heuristic: lean industrial pre-seed founder cash salary plus payroll tax and benefits while remaining the primary seller."
  - id: A9
    name: "Founding eng loaded annual cost"
    value: "180"
    unit: "USDK/year"
    source: "[business-plan.yaml team] startup-finance heuristic for a senior CAD/estimation engineer in an industrial workflow startup."
  - id: A10
    name: "Applications / solutions engineer loaded annual cost"
    value: "144"
    unit: "USDK/year"
    source: "[business-plan.yaml team] startup-finance heuristic for an early deployment-oriented applications hire."
  - id: A11
    name: "Platform / security engineer loaded annual cost"
    value: "168"
    unit: "USDK/year"
    source: "[business-plan.yaml team] startup-finance heuristic for on-prem/private-cloud, audit, and security-oriented product work."
  - id: A12
    name: "Channel / account lead loaded annual cost"
    value: "144"
    unit: "USDK/year"
    source: "[business-plan.yaml team] startup-finance heuristic for the first partner- and expansion-focused GTM hire."
  - id: A13
    name: "Product / integration engineer timing and loaded cost"
    value: "M18 at $168K annualized"
    unit: "hire plan"
    source: "[business-plan.yaml milestones 12-24 months + sequencingRationale] Added only after initial pilots prove the wedge and connector standardization becomes the bottleneck."
  - id: A14
    name: "Deployment / customer success engineer timing and loaded cost"
    value: "M28 at $132K annualized"
    unit: "hire plan"
    source: "[business-plan.yaml milestones 24-36 months] Pulled in only after the business is clearly scaling beyond the first 8 production shops."
  - id: A15
    name: "Non-salary operating spend ramp"
    value: "S&M base $2K/$3K/$4K per month plus variable per customer; R&D base $3K/$4K/$5K; G&A base $2.5K/$3K/$3.5K across Y1/Y2/Y3"
    unit: "USDK/month"
    source: "startup-finance heuristic for travel, partner demos, CAD/compute, security tooling, legal, and accounting in a lean industrial SaaS plan."
  - id: A16
    name: "Monthly logo churn for unit economics"
    value: "1.2"
    unit: "percent/month"
    source: "startup-finance heuristic: workflow software embedded in quoting and deployment should be sticky once live, but the niche market and mixed fleets justify a non-trivial churn assumption."
  - id: A17
    name: "Blended CAC per new paid shop"
    value: "39.2"
    unit: "USDK/customer"
    source: "calc from modeled Y2-Y3 sales and marketing spend of about $824K divided by 21 net new paid shops."
  - id: A18
    name: "Cash conversion timing"
    value: "EBITDA approximates operating cash flow"
    unit: "policy"
    source: "startup-finance heuristic: the model assumes no debt, capex, or material working-capital swings at this stage."
  - id: A19
    name: "Funding milestone"
    value: "8 production shops, 2 second-cell or sister-site expansions, 2 active partner channels, and median deployment under 90 days"
    unit: "milestone"
    source: "[business-plan.yaml milestones 12-24 months + strategicChoices.sequencingRationale] This is the proof point used to size the current round and next financing narrative."
