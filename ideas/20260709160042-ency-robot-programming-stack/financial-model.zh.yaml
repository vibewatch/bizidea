scenarios:
  downside:
    description: 安全审查、服务化蔓延和伙伴拉动偏慢，会把业务压在 Q4Y3 仅 18 家付费工厂，同时挤压毛利率。
    y3RevenueK: 912.8
    y3EbitdaK: -751.6
    cashLowPointK: -90.4
    keyAssumptionChanges:
    - Q4Y2 以 7 家付费工厂收尾，Q4Y3 以 18 家收尾，而不是 24 家。
    - 由于第二单元和模块挂载率偏慢，Y3 综合季度 ARPU 维持在 $17.0K-$18.0K 区间。
    - 毛利率滑到 65%，而且为了接住定制化工作，部署岗位要提前一个季度入场。
  base:
    description: 靠创始人主导销售、一条伙伴渠道和可复用模板，公司在 Q4Y3 跑到研究里的 24 家工厂 SOM 路径。
    y3RevenueK: 1255.0
    y3EbitdaK: -431.5
    cashLowPointK: 282.0
    keyAssumptionChanges:
    - Y1 收尾时有 3 家付费工厂，Y2 收尾 8 家，Y3 收尾 24 家；背后假设是第二单元扩张和转介绍开始起作用。
    - 随着更多账户从单单元试点走向生产范围，综合季度 ARPU 从 Q1Y2 的 $16.5K 逐步升到 Q4Y3 的 $19.0K。
    - 在产品化连接器真正出现前，招聘始终保持精简：Y2 只加 1 个产品岗，Y3 后段再补 1 个部署岗。
  upside:
    description: 转介绍和第二单元扩张更早落地，会把 Q4Y3 的付费工厂数推到 28 家，同时模块挂载率和毛利率也略好一些。
    y3RevenueK: 1532.6
    y3EbitdaK: -188.6
    cashLowPointK: 553.0
    keyAssumptionChanges:
    - 由于调试伙伴更早带来合格管道，Q4Y2 收尾 10 家付费工厂，Q4Y3 收尾 28 家。
    - 由于审批、QA 交接和多单元范围挂载更快，季度 ARPU 提升到 $18.5K-$20.0K。
    - 毛利率改善到 72%，而部署岗位则推迟到转化证据更清楚后再招。
sensitivity:
- variable: ARPU
  downsideCase: 由于试点一直停留在单单元、模块也没挂上，综合生产 ARPU 会低 10%。
  baseCase: 成熟生产工厂可达到约 $72K 的年化收入，模型里季度 ARPU 从 $16.5K 逐步升到 $19.0K。
  upsideCase: 由于第二单元扩张和审批 / QA 模块挂载更快，ARPU 会高 10%。
  y3RevenueImpactK: -124.7
  cashImpactK: -121.6
- variable: CAC
  downsideCase: 伙伴线索转化更差，每新增一家工厂对应的销售 / 市场支出提高约 20%。
  baseCase: 按 Y2-Y3 的销售与市场支出计算，综合 CAC 约为每家新增付费工厂 $39.2K。
  upsideCase: 转介绍效率提升，CAC 下降约 15%。
  y3RevenueImpactK: 0.0
  cashImpactK: -39.4
- variable: 流失率
  downsideCase: 月度流失率更接近 1.8%，会把 Q4Y3 的付费工厂基数拖到 21 家。
  baseCase: 工厂一旦转成生产年合同，月度流失率稳定在约 1.2%。
  upsideCase: 月度流失率更接近 1.0%，Q4Y3 可收尾在 25 家付费工厂。
  y3RevenueImpactK: -141.2
  cashImpactK: -83.3
- variable: 销售周期
  downsideCase: 安全审查和客户验证会给销售周期再加一个季度，让很多赢单整体右移。
  baseCase: 积压、调试上线和程序员瓶颈这些事件，会把销售周期压得足够短，使公司能在 Q4Y2 跑到 8 家工厂。
  upsideCase: 由于伙伴来源的交易成交更快，销售周期可以缩短一个季度。
  y3RevenueImpactK: -373.7
  cashImpactK: -273.2
- variable: 毛利率
  downsideCase: 部署和支持持续偏服务化，毛利率会落在 65%。
  baseCase: 随着试点转成可复用的软件范围，毛利率能走到 BP 目标的 70%。
  upsideCase: 部署更干净、软件收入占比更高，毛利率可推到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -87.8
- variable: 招聘节奏
  downsideCase: 为了接住定制化工作，产品岗和部署岗都要提前约一个季度入场。
  baseCase: 在有了转化证明后，Y2 只加 1 个产品岗，Y3 后段再补 1 个部署岗。
  upsideCase: 这两个岗位都能再往后拖约一个季度，而不拖慢客户交付。
  y3RevenueImpactK: 0.0
  cashImpactK: -86.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Leads[Founder and partner leads] --> Pilots[Paid one-cell pilots]
      Pilots --> Production[Production shops and second-cell expansions]
      Production --> Revenue[Subscription plus onboarding revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway and next-round proof]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形里的收入引擎，来自付费工厂从 Y1 末的 3 家长到 Q4Y3 的 24 家，同时把每个成熟账户推向约 $72K 的年化生产范围。
- checkName: 必须跑对的地方
  finding: 公司必须把部署做得足够模板化、让销售周期贴着计划跑，因为只要晚一个季度，Y3 收入大约就会少掉 $374K，期末现金大约会少掉 $273K。
- checkName: 模型会失效，如果
  finding: 如果安全审查和定制工程把毛利率压到 60% 多的中段，下行情形会在业务跑到足够多生产工厂、能自我供血之前，就先把现金打成负数。
- checkName: 下一轮融资要看的证明
  finding: 当公司做到 8 家生产工厂、至少 2 个扩张案例，并证明低于 90 天的部署可以沿着伙伴管道重复跑通时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 增速 239% + EBITDA 利润率 -34% = 204%（方向上很强，但也被偏小的 Y2 基数抬高了）。
  burnMultiple: Y2 的 burn multiple 为 3.1x，按净新增收入看，Y3 改善到 0.5x。
  revenuePerFte: 按 q4Y3 人头算，Y3 每 FTE 收入约 $179K（低于 $200-400K 的 SaaS 基准；只有在部署保持标准化时才算说得过去）。
  flags:
  - 基准情形押的是 Y3 从 8 家工厂扩到 24 家；而销售周期敏感性已经说明，晚一个季度就是最大的单点现金风险。
  - 按 q4Y3 计算，每个 FTE 对应收入仍只有约 $179K，这意味着公司必须证明：后几年的扩张主要靠软件范围变宽，而不是靠重服务式上线。
  - 这一轮能按 BP 融资区间低端值成立，前提只有两个：招聘足够克制，而且模型默认没有 capex 或营运资本拖累。
