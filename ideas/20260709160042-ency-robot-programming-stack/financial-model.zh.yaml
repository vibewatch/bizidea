slug: surface-finishing-quote-os
date: '2026-07-09'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[business-plan.yaml date] 模型从 2026-07-09 计划日期后的第一个完整月份开始。'
- id: A2
  name: pre-seed 轮期初现金
  value: '2000'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd] 采用 $2-4M 区间的低端值，因为按当前精简招聘计划，足以跑到 24 个月运营里程碑，再外加 6 个月缓冲。'
- id: A3
  name: 起始付费工厂数（M1）
  value: '0'
  unit: shops
  source: '[business-plan.yaml experimentRoadmap 0-90 days] 前 90 天做的是账户映射、回测和部署 / 安全工作坊，不是生产收入。'
- id: A4
  name: 付费工厂爬坡
  value: 3 at Y1 exit, 8 at Y2 exit, 24 at Y3 exit
  unit: shops
  source: '[business-plan.yaml milestones; research.yaml market.som] 对齐 Y1 的 2-3 个付费试点和 1 个生产转化、Y2 的 5-8 家生产工厂目标，以及在执行顺利时研究里的“第 3 年 24 家工厂” SOM 路径。'
- id: A5
  name: 单个生产工厂的成熟期年 ARPU
  value: '72'
  unit: USDK/year
  source: '[research.yaml bottomUpSizingDrivers + business-plan.yaml businessModel.expansionLevers] 锚定为每家工厂约 3.5 个活跃单元 × 每单元约 $20K 的工作流支出，再加上少量审批 / QA 分析模块挂载。'
- id: A6
  name: 分期 ARPU 确认爬坡
  value: Y1 $7.0K per month, Y2 $16.5K-$17.5K per quarter, Y3 $18.0K-$19.0K per quarter
  unit: USDK/shop/period
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract + gtm.pricing] 前期体现的是付费单单元试点和上线实施；后期则往覆盖更多单元的完整生产订阅过渡。'
- id: A7
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 按确认收入的 30% 作为 COGS 建模。'
- id: A8
  name: 创始人 / 制造业 GTM 负责人全包年成本
  value: '120'
  unit: USDK/year
  source: 创业财务经验值：工业 pre-seed 阶段按精简创始人工资现金支出、工资税和福利测算，同时默认他仍是第一销售。
- id: A9
  name: 创始工程师全包年成本
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml team] 创业财务经验值：工业工作流初创公司里一位资深 CAD / 估算工程师的成本水平。'
- id: A10
  name: 应用 / 解决方案工程师全包年成本
  value: '144'
  unit: USDK/year
  source: '[business-plan.yaml team] 创业财务经验值：早期偏部署导向的应用工程岗位成本。'
- id: A11
  name: 平台 / 安全工程师全包年成本
  value: '168'
  unit: USDK/year
  source: '[business-plan.yaml team] 创业财务经验值：本地部署 / 私有云、审计和安全导向产品工作的岗位成本。'
- id: A12
  name: 渠道 / 客户负责人全包年成本
  value: '144'
  unit: USDK/year
  source: '[business-plan.yaml team] 创业财务经验值：首位聚焦伙伴与扩张的 GTM 招聘成本。'
- id: A13
  name: 产品 / 集成工程师入职时点与全包成本
  value: M18 at $168K annualized
  unit: hire plan
  source: '[business-plan.yaml milestones 12-24 months + sequencingRationale] 只有在最初试点证明切口成立、且连接器标准化开始成为瓶颈后，才补这个岗位。'
- id: A14
  name: 部署 / 客户成功工程师入职时点与全包成本
  value: M28 at $132K annualized
  unit: hire plan
  source: '[business-plan.yaml milestones 24-36 months] 只有在业务明显跑出前 8 家生产工厂之后，才把这个岗位提前拉进来。'
- id: A15
  name: 非工资经营开支爬坡
  value: S&M base $2K/$3K/$4K per month plus variable per customer; R&D base $3K/$4K/$5K; G&A base $2.5K/$3K/$3.5K across Y1/Y2/Y3
  unit: USDK/month
  source: 创业财务经验值：用于覆盖差旅、伙伴演示、CAD / 算力、安全工具、法务和会计等支出，适用于精简版工业 SaaS 计划。
- id: A16
  name: 单位经济模型里的月度客户流失率
  value: '1.2'
  unit: percent/month
  source: 创业财务经验值：嵌进报价和部署流程的工作流软件一旦上线，粘性通常不低；但考虑到市场小众且机队混杂，仍需保留一个不算轻的流失假设。
- id: A17
  name: 每家新增付费工厂的综合 CAC
  value: '39.2'
  unit: USDK/customer
  source: 由模型里的 Y2-Y3 销售与市场费用约 $824K，除以 21 家净新增付费工厂推得。
- id: A18
  name: 现金转化时点
  value: EBITDA 近似等于经营现金流
  unit: policy
  source: 创业财务经验值：模型在这个阶段默认没有债务、资本开支或显著营运资本波动。
- id: A19
  name: 下一轮融资里程碑
  value: 8 家生产工厂、2 个第二单元或兄弟站点扩张、2 条活跃伙伴渠道，以及中位部署时间低于 90 天
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months + strategicChoices.sequencingRationale] 这是本轮融资规模和下一轮融资叙事所依赖的关键证明点。'
