slug: surface-finishing-quote-os
date: "2026-07-09"
executiveSummary: >-
  Surface Finishing Quote OS targets a narrow but credible pain inside aerospace
  robotic finishing: deciding quickly whether a new part can run profitably on
  an existing deburring or polishing cell before a scarce programmer or live
  robot cell is consumed. The product is not another offline-programming suite;
  it is a quote-to-process record layer that sits above ENCY, RoboDK,
  Robotmaster, and OEM tools, turning CAD files, finish specs, and cell
  templates into human-reviewed feasibility scores, cycle-time bands, tooling
  assumptions, and reusable process packs. The best first customer is an
  AS9100-certified North American shop with 2-4 robotic finishing cells, repeat
  titanium or aluminum part families, and a single senior programmer who
  already bottlenecks RFQ turnaround. Research supports a real but modest
  market: TAM around $77.6M, beachhead SAM around $7.6M, and a reachable year-3
  SOM around $1.5M if the company wins 24 shops at roughly $20k per active
  cell. That makes this a strong workflow wedge but not yet a standalone
  venture-scale market; the investment case depends on later expansion into
  release, QA evidence, and multi-site or adjacent-vertical material-removal
  operations. The product sequence is deliberately conservative: start with
  advisory quoting and human sign-off on repeat titanium and aluminum families,
  then add estimate-versus-actual learning, process-pack reuse, and only later
  deeper integrations or adjacent verticals. The biggest disconfirming risk is
  trust: if back-tests and first pilots cannot consistently beat
  spreadsheet/manual estimating or reduce unplanned live-cell prove-out, buyers
  will stay with senior programmers and integrators. Research also leaves two
  gaps unresolved: how many target shops already operate 2-6 cells, and which
  title signs first in sub-100-employee shops, so the first 90 days must settle
  cell density, budget ownership, and data-access feasibility before the
  company scales hiring.
problem:
  - "Aerospace finishing shops with 2-6 robotic deburring or polishing cells still rely on a senior programmer or outside integrator to decide whether an incoming part is robotable, which slows RFQ turnaround and steals time from live production cells."
  - "Existing offline-programming suites help after a shop chooses to pursue a job, but they do not preserve quote assumptions, approval context, or estimate-versus-actual learning in an auditable workflow that fits AS9100, Nadcap, and ITAR-sensitive environments."
solution:
  - "Ingest CAD, material, finish spec, and target-cell constraints to produce a human-reviewed robotability score, cycle-time band, collision and reachability flags, and tooling assumptions before a programmer touches the live cell."
  - "Turn each accepted quote into a reusable process pack for programming, QA, and scheduling, then feed prove-out results back into the template library so repeat part families quote faster and more accurately over time."
whyWeWin:
  - "The startup owns the decision layer before ENCY-, RoboDK-, Robotmaster-, or OEM-class tools take over: which parts are worth quoting for robotic finishing, under what assumptions, and how that decision becomes reusable operating memory."
  - "A cross-OEM dataset linking geometry, material, tooling, cycle-time assumptions, approvals, and actual prove-out results compounds into a moat that services firms and single-vendor OLP suites do not naturally build."
strategicChoices:
  beachhead: >-
    North American AS9100-certified aerospace finishing shops with 2-6 robotic
    deburring or polishing cells that handle repeat titanium brackets or
    aluminum housings and already feel RFQ backlog or programmer bottlenecks.
  wedgeRationale: >-
    This slice has the clearest trigger, shortest proof loop, and most reusable
    data. Repeat part families make quote accuracy testable, live-cell downtime
    makes ROI legible to operations leaders, and the workflow can be improved
    without replacing the customer's programming stack.
  sequencingRationale: >-
    Start with advisory quoting, confidence bands, and process-pack recordkeeping
    before deeper automation because research shows simulation fidelity,
    security review, and workflow trust are the main adoption barriers. Founder-
    led sales and one applications-oriented deployment motion come before a
    scaled GTM team so the company learns where quote assumptions fail before it
    broadens connectors, channels, or vertical scope.
  notYet:
    - "Medical-device or general-industrial finishing before aerospace proof on repeat titanium and aluminum families"
    - "Autonomous robot code generation or full adaptive finishing control; existing OLP and cell-automation stacks remain the execution layer"
    - "Broad ERP replacement, generic quoting software, or all-purpose manufacturing analytics"
market:
  tam: "$77.6M (research estimate: about 3,879 North American material-removal or finishing cells addressable at roughly $20k annual workflow spend per active cell)"
  sam: "$7.6M (research estimate: beachhead North American aerospace-oriented finishing shops, applying the robot-ready subset and about 3.5 active cells per shop)"
  som: "$1.5M (research year-3 case: 24 paid shops at about 3.2 active cells each and roughly $20k annual spend per active cell)"
  segments:
    - "Primary: AS9100- or Nadcap-oriented aerospace finishing job shops with 2-6 robotic deburring or polishing cells"
    - "Secondary: Multi-site precision finishers or contract manufacturers expanding robotic surface finishing into adjacent aerospace or medical programs"
  buyingProcess: >-
    The day-to-day champion is usually the manufacturing engineering manager,
    application-engineering lead, or senior robot programmer, but economic
    approval sits with the VP of Operations or Director of Manufacturing
    Engineering because the spend is justified by quote throughput, capacity,
    and cell utilization. Deals are most likely during new-cell commissioning,
    RFQ backlog, or a key-programmer bottleneck and may require IT or security
    review when CAD and process data are ITAR- or CUI-sensitive.
product:
  mvp: >-
    A one-cell, one-part-family quote advisor that ingests CAD, material, finish
    spec, and a preconfigured cell template, then outputs a human-reviewed
    feasibility score, cycle-time band, tooling assumptions, and process-pack
    record. It should reuse the customer's existing OLP or OEM software for
    final path generation rather than generate production robot code itself.
  sixMonth: "Ship historical RFQ back-test tooling, one or two repeatable OLP or OEM connectors, actual-versus-estimate dashboards, and reusable templates for the first titanium and aluminum part families."
  twelveMonth: "Add approval workflows, on-prem or private-cloud deployment, multi-cell template reuse, and exports into QA and scheduling so accepted quotes become controlled production handoffs rather than spreadsheet artifacts."
  twentyFourMonth: "Expand from one-cell quoting into a multi-site process-memory layer for aerospace finishers and, only if template accuracy transfers, begin adjacent medical-device or general-industrial material-removal workflows."
  keyBets:
    - "Repeat titanium and aluminum part families are structured enough that confidence bands can outperform spreadsheet or tribal-knowledge estimating."
    - "A process-pack record is valuable enough to win adoption before the company automates more of robot programming."
    - "On-prem or private-cloud deployment and explicit data controls are sufficient to unblock ITAR- and CUI-sensitive pilots."
    - "A small template and connector library can keep deployments under 90 days and prevent the business from turning into application-engineering services."
gtm:
  wedge: >-
    Sell a paid one-cell RFQ triage pilot to AS9100-certified shops during
    commissioning, backlog, or programmer-bottleneck events, replacing manual
    spreadsheet plus live-cell prove-out work with a human-reviewed
    quote-to-process pack. Expand only after the pilot proves faster quote
    turnaround and lower unplanned prove-out on one repeat part family.
  channels:
    - "Founder-led direct sales to manufacturing engineering leaders, operations leaders, and owner-operators at target finishing shops"
    - "Co-sell or referral relationships with robot OEMs, end-effector and abrasive suppliers, and aerospace automation integrators already involved in cell commissioning or retrofit work"
    - "Targeted outreach through A3, NASF, and aerospace-supplier ecosystems where automation, labor shortage, and throughput projects are already discussed"
  funnelTargets: "Target account→qualified discovery 20-30%, qualified discovery→paid pilot 30-40%, paid pilot→production 50%+, production→second-cell or second-site expansion 60%+ within 12 months."
  pricing: >-
    Paid onboarding plus annual subscription per active finishing cell, with
    RFQ-volume tiers layered on top. This aligns price with avoided live-cell
    downtime, faster quote turnaround, and reusable process packs rather than
    with seat count, and matches the idea's per-cell pricing hypothesis.
businessModel:
  revenueStreams:
    - "Annual subscription per active robotic finishing cell"
    - "Paid onboarding and CAD or OLP connector deployment"
    - "Expansion modules for approvals, QA handoff, and estimate-versus-actual analytics"
  unitOfValue: "Active robotic finishing cell and quoted part family under management"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more cells, materials, and repeat part families within the first plant"
    - "Roll out to sister sites within multi-location finishing groups"
    - "Upsell approval, QA evidence, and benchmark analytics once quote accuracy is trusted"
    - "Expand into adjacent material-removal workflows only after the aerospace template library is repeatable"
strategyMap:
  northStarMetric: "Accepted RFQs launched within the quoted cycle-time band without unplanned live-cell prove-out"
  inputMetrics:
    - "Median hours from CAD receipt to customer-ready quote"
    - "Share of accepted jobs launched inside the quoted cycle-time confidence band"
    - "Unplanned live-cell prove-out hours per new part family"
    - "Template reuse rate across repeat revisions and part families"
    - "Paid-pilot-to-production conversion rate"
  moatsToBuild:
    - "Cross-OEM geometry, material, tooling, and cycle-time dataset tied to estimate-versus-actual outcomes"
    - "Finishing template library that captures approvals, tooling assumptions, and reusable process packs by part family"
    - "Deployment credibility in ITAR- and CUI-sensitive environments through auditable records and controlled data architecture"
  killCriteria:
    - "Fewer than 2 of the first 5 target shops buy a paid one-cell pilot within 6 months"
    - "Historical back-tests and the first 2 pilots fail to place at least 70% of repeat-part jobs inside the quoted cycle-time band or fail to cut quote turnaround by 30%+"
    - "Median deployment time exceeds 90 days across the first 3 pilots because connector, security, or data-normalization work is too custom"
  mermaid: |
    flowchart LR
      Wedge[AS9100 finishing RFQ triage] --> MVP[One-cell quote to process pack]
      MVP --> Proof[Faster quotes and less live-cell prove-out]
      Proof --> Expansion[Multi-cell, multi-site, adjacent-vertical expansion]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Sharp industrial workflow wedge with credible pain and a defensible data loop, but conviction stays limited until pilots prove quote accuracy and the company shows expansion beyond a $7.6M beachhead SAM."
    whyBelieve: "Offline programming is clearly productizing, and the startup attacks a real pre-programming gap where operations leaders already feel downtime and expert-capacity pressure."
    whyDoubt: "The initial market is narrow, buyer-title ambiguity remains unresolved in smaller shops, and trust can collapse quickly if the first estimates miss reality."
    nextDiligence: "Get 10 account maps, one blind historical-RFQ back-test, and at least one paid one-cell pilot proving measurable quote-speed and prove-out gains."
  firstCustomer:
    title: "Director of Manufacturing Engineering at an AS9100-certified aerospace finishing shop"
    profile: "A North American shop with 2-4 robotic deburring or polishing cells, one senior robot programmer, recurring titanium or aluminum part-family RFQs, and pressure to quote faster without taking a live cell offline."
    trigger: "RFQ volume spikes, a new finishing cell is commissioned, or a key programmer becomes the bottleneck on repeat aerospace work."
    buyer: "VP Operations or Director of Manufacturing Engineering"
    initialContract: "Paid 8-12 week one-cell pilot around $25k-$40k, credited toward a $50k-$80k annual subscription for 2-4 cells plus onboarding and connector fees if the pilot proves quote-speed and prove-out improvements."
  mustBeTrue:
    - "At least 40% of qualified beachhead shops run 2+ robotic deburring or polishing cells and review repeat titanium or aluminum RFQs monthly."
    - "Blind back-tests on at least 50 historical RFQs can place 70%+ of repeat-part jobs inside the quoted cycle-time band while correctly flagging obvious non-robotable work."
    - "At least 3 of the first 5 pilot prospects allow CAD and prove-out data ingestion under on-prem or private-cloud controls despite ITAR or CUI concerns."
    - "Paid one-cell pilots convert to annual production contracts above 50% once quote turnaround improves and unplanned prove-out hours fall."
    - "Single-vendor OLP suites remain insufficient in at least 3 of the first 5 wins because buyers need a neutral quote-to-process record across mixed tools and approval workflows."
  diligenceQuestions:
    - "What percentage of target AS9100 or Nadcap finishers already run 2-6 robotic finishing cells rather than a single pilot cell?"
    - "Who signs first in sub-100-employee shops: VP Operations, Director of Manufacturing Engineering, estimating leader, or owner-GM?"
    - "What accuracy threshold does a senior programmer require before trusting a software-generated cycle-time band enough to quote from it?"
    - "Can the first deployment stay under 90 days with on-prem or private-cloud architecture and limited connectors, or does each account require services-heavy customization?"
    - "How quickly could ENCY, RoboDK, ABB, or an integrator bundle enough RFQ-feasibility workflow to compress the wedge?"
operatingAssumptions:
  - assumption: "There are enough robot-ready aerospace finishing shops with 2-6 cells and repeat part families to support a focused North American wedge."
    basis: research.yaml
    validationTest: "Build 10 design-partner account maps with cell counts, robot brands, materials, and monthly RFQ cadence, matching research's highest-priority validation plan."
    decisionImpact: "If false, the ICP must narrow further to multi-site groups or shift toward a different vertical with higher cell density."
  - assumption: "Cycle-time confidence bands can beat manual estimating on repeat titanium and aluminum families without requiring full robot-code generation."
    basis: research.yaml
    validationTest: "Run blind back-tests on at least 50 historical RFQs and compare the model output with both actual prove-out results and senior-programmer estimates."
    decisionImpact: "If false, the company should pivot toward process-pack memory and approvals rather than claim quote intelligence as the core wedge."
  - assumption: "Target accounts will share enough CAD, quote, and prove-out data under controlled deployment models to build a compounding estimate library."
    basis: research.yaml
    validationTest: "Complete security reviews and pilot data-sharing agreements with at least 3 defense-adjacent or ITAR-sensitive prospects."
    decisionImpact: "If false, the roadmap must move on-prem first, reduce benchmarking ambitions, or avoid the most sensitive accounts."
  - assumption: "Per-cell pricing plus RFQ-volume tiers fits the buyer's mental budget model better than seat-based licensing."
    basis: idea.yaml
    validationTest: "Present three pricing proposals to the first 6 qualified prospects and confirm that at least 4 prefer a per-cell or workflow-based contract structure."
    decisionImpact: "If false, the company must repackage around fixed pilot fees, site licenses, or channel-embedded pricing."
  - assumption: "The first 3 deployments can be completed in under 90 days with a small connector and template library."
    basis: operator judgment
    validationTest: "Track elapsed days and custom engineering hours from kickoff to first live quote across the first 3 pilots."
    decisionImpact: "If false, the hiring plan must pull forward more solutions capacity and the product scope must tighten to avoid services creep."
experimentRoadmap:
  - horizon: 0-90 days
    experiment: "Create 10 design-partner account maps covering cell counts, robot brands, materials, RFQ volume, and current quote workflow ownership."
    hypothesis: "The beachhead has enough 2-6 cell shops with recurring repeat-part RFQs to support a focused sales motion."
    successMetric: "At least 6 of 10 mapped accounts meet the full ICP and confirm monthly repeat-part RFQ flow."
    owner: "Founder / manufacturing GTM lead"
  - horizon: 0-90 days
    experiment: "Run a blind back-test on at least 50 historical titanium and aluminum RFQs from design partners."
    hypothesis: "A rules-plus-template estimator can produce useful feasibility and cycle-time bands before any live-cell prove-out."
    successMetric: "70%+ of evaluated jobs land inside the quoted cycle-time band and engineers accept the output as directionally useful."
    owner: "Founding eng"
  - horizon: 0-90 days
    experiment: "Hold security and deployment workshops with 3 defense-adjacent prospects."
    hypothesis: "On-prem or private-cloud deployment with clear role controls is sufficient to unblock pilot data sharing."
    successMetric: "At least 2 of 3 prospects approve a pilot architecture without requiring a fully air-gapped custom build."
    owner: "Founder / platform lead"
  - horizon: 3-6 months
    experiment: "Deploy a paid one-cell pilot that converts one accepted quote into a reusable process pack on a repeat part family."
    hypothesis: "The quote-to-process record reduces quote turnaround and unplanned prove-out faster than manual spreadsheet workflow."
    successMetric: "30%+ faster quote turnaround and 20%+ lower unplanned live-cell prove-out hours at the pilot account."
    owner: "Applications / solutions engineer"
  - horizon: 6-12 months
    experiment: "Test paid-pilot conversion and pricing across 3-4 qualified shops using per-cell plus RFQ-tier contracts."
    hypothesis: "The buyer will pay for a one-cell pilot and convert to annual production if the workflow improvement is measurable."
    successMetric: "At least 2 paid pilots and 1 conversion to a production annual contract within 12 months."
    owner: "Founder / manufacturing GTM lead"
  - horizon: 6-12 months
    experiment: "Pilot one referral or co-sell motion with an OEM, integrator, or tooling partner tied to cell commissioning events."
    hypothesis: "Commissioning and retrofit partners can supply better-timed leads than broad top-of-funnel marketing."
    successMetric: "At least 3 qualified opportunities sourced by one partner channel."
    owner: "Founder / partnerships"
  - horizon: 12-18 months
    experiment: "Expand the first production customer from one cell to a second cell or sister site using the same template family."
    hypothesis: "Template reuse shortens deployment time and is the fastest path to higher ACV."
    successMetric: "Expansion closes within 60 days and increases contract value by 25%+ versus the initial production scope."
    owner: "Founder / account lead"
operations:
  - "Offer on-prem or private-cloud deployment, role-based access, and explicit data segregation for CAD and process files from day one."
  - "Run weekly estimate-versus-actual reviews with customer application-engineering teams so quote misses become template updates rather than support tickets."
  - "Keep final program release human-approved inside the customer's existing robot-safety and quality workflow even as the product automates more upstream analysis."
  - "Use OEM, tooling, and integrator partners to seed cell templates, tooling assumptions, and referral pipeline during commissioning or retrofit events."
team:
  - role: "Founder / manufacturing GTM lead"
    startTiming: "Month 0"
    rationale: "The first company risk is whether RFQ pain converts into budget, so the founder must own discovery, pilot sales, and design-partner relationships directly."
  - role: "Founding eng (CAD intake and estimation engine)"
    startTiming: "Month 0"
    rationale: "The core product problem is turning messy RFQ inputs into trustworthy feasibility and cycle-time output above existing OLP systems."
  - role: "Applications / solutions engineer"
    startTiming: "Month 3-6"
    rationale: "Industrial customers will judge the product by deployment speed and estimate fidelity, so one operator who can encode templates and shorten onboarding is essential."
  - role: "Platform / security engineer"
    startTiming: "Month 6-9"
    rationale: "On-prem, private-cloud, audit logging, and controlled-data requirements become product-defining once defense-adjacent pilots begin."
  - role: "Channel / account lead"
    startTiming: "Month 9-12"
    rationale: "After the first pilot proves value, the company needs one GTM hire focused on OEM, integrator, and multi-site account expansion rather than generic lead generation."
milestones:
  - horizon: "0-12 months"
    items:
      - "Complete 10 ICP account maps and a 50-RFQ historical back-test dataset."
      - "Ship the one-cell MVP with at least one repeatable OLP or OEM connector and a controlled deployment option."
      - "Close 2-3 paid pilots and convert at least 1 shop to a production annual contract."
      - "Demonstrate 30%+ faster quote turnaround and 20%+ lower unplanned prove-out hours at one design partner."
  - horizon: "12-24 months"
    items:
      - "Reach 5-8 production aerospace shops and expand at least 2 accounts to a second cell or sister site."
      - "Launch approvals, QA handoff, and estimate-versus-actual analytics modules tied to the core quote workflow."
      - "Standardize 2-3 high-value connectors and template families so median deployment time stays below 90 days."
      - "Establish at least 2 partner channels that contribute qualified commissioning or retrofit opportunities."
  - horizon: "24-36 months"
    items:
      - "Approach the researched SOM case of 24 paid shops only if deployment speed and pilot conversion stay within target."
      - "Turn the template and estimate dataset into a benchmark layer that improves win rate, quote confidence, and onboarding speed."
      - "Decide whether adjacent medical-device or general-industrial expansion beats deeper penetration of aerospace finishing on evidence, not on narrative."
risks:
  - risk: "Simulation or estimate fidelity is not good enough for senior programmers to trust software-generated quote assumptions."
    likelihood: High
    impact: High
    mitigation: "Start with repeat titanium and aluminum families, expose confidence bands, require human review, and validate against historical and live prove-out data before widening scope."
  - risk: "Cell-specific tooling, fixturing, and process variation pull the company into services-heavy deployments."
    likelihood: High
    impact: High
    mitigation: "Constrain the early product to one-cell pilots, narrow materials, and reusable template families, and track deployment time as a board-level metric."
  - risk: "ITAR, CUI, or customer security requirements slow pilots enough to block learning."
    likelihood: Medium
    impact: High
    mitigation: "Design for on-prem or private-cloud deployment from the start and sell first into accounts willing to pilot under controlled but not fully bespoke architectures."
  - risk: "ENCY, RoboDK, Robotmaster, ABB, or integrators move upstream into quote-feasibility workflow."
    likelihood: Medium
    impact: High
    mitigation: "Differentiate on multi-OEM neutrality, auditable quote assumptions, and estimate-versus-actual operating memory rather than on simulation alone."
  - risk: "The aerospace-finishing beachhead is too small or too cyclical to support venture-scale outcomes without adjacent expansion."
    likelihood: Medium
    impact: High
    mitigation: "Treat aerospace finishing as a proof wedge, not the terminal market, and make expansion contingent on measurable template transferability and channel pull."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of one-cell MVP build, controlled deployment and security work, 3-5 design-partner pilots, the first 2-3 production conversions, and the proof needed to decide whether this remains a niche workflow tool or expands into a broader robotic material-removal operating system."
