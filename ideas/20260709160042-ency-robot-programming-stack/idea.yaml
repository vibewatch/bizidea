problem: >-
  Aerospace finishing shops increasingly want robots to take on deburring and
  polishing, but every new part still starts as a custom application-engineering
  project. A senior programmer or outside integrator must decide by hand whether
  the geometry, tooling, reach, and cycle time make the job feasible, often by
  simulating it manually or stealing time on a live cell. That slows RFQ
  turnaround, burns scarce expert capacity, and keeps repeat work from becoming
  a scalable software process.
targetUser:
  primary: >-
    Manufacturing engineering and application-engineering leaders at North
    American AS9100-certified aerospace finishing shops running 2-6 robotic
    deburring or polishing cells
  secondary: >-
    Robot programming leads responsible for offline simulation, prove-out, and
    changeovers on robotic surface-finishing cells
  buyer: VP Operations or Director of Manufacturing Engineering
startupThesis:
  nonObviousInsight: >-
    ENCY's tighter tie-up with Stäubli suggests CAD/CAM-to-trajectory
    translation and offline simulation are crossing from bespoke specialist work
    into repeatable product features. Once that happens, the scarce asset shifts
    upstream from writing every robot program by hand to deciding which RFQs are
    truly robotable, what assumptions make them profitable, and how approved
    settings get reused across similar parts.
  beachhead: >-
    RFQ triage and cycle-time estimation for North American AS9100-certified
    aerospace finishing shops with 2-6 robotic deburring or polishing cells
    handling repeat titanium and aluminum part families
  wedge: >-
    An RFQ-to-process-pack layer that ingests CAD files, finish requirements,
    and cell constraints, then estimates reachability, cycle time, collision
    risk, and tooling assumptions before a programmer touches the live robot
    cell
  whyNowCatalyst: >-
    ENCY and Stäubli are explicitly productizing offline programming,
    simulation, and repeatable advanced-process setup, making pre-quote
    robotability scoring newly credible for shops that lose money whenever
    programming takes a cell offline.
  ventureScalePath: >-
    Start with aerospace deburring and polishing RFQs, expand into job release,
    quality evidence, and template reuse across medical-device, general
    industrial, and outsourced finishing networks, then become the operating
    system for robotic material-removal cells.
solution: >-
  Surface Finishing Quote OS sits above CAD/CAM, OEM offline-programming
  software, and ERP quoting tools rather than replacing them. It ingests a
  part's CAD model, material, finish spec, and target cell configuration, then
  uses reusable templates plus simulation outputs to generate a feasibility
  score, cycle-time range, tooling plan, and quote assumptions. When the shop
  wins the job, the same record becomes a process pack for programming, QA, and
  scheduling, so the application-engineering work is not lost in email threads
  and local files. Actual prove-out and run data feed back into the estimate
  library, improving quote accuracy and template reuse over time.
