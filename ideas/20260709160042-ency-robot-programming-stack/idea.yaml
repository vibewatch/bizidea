topRisks:
  - name: Simulation fidelity gap
    description: One bad mismatch between quoted feasibility and real-world cell behavior could destroy trust in the product.
    mitigation: Start with confidence bands, narrow cell and process scope, and feed actual prove-out results back into the estimate library before automating harder jobs.
  - name: OEM bundling
    description: ENCY, Stäubli, or another offline-programming vendor could extend into quote estimation and absorb the workflow inside a native toolchain.
    mitigation: Own the cross-system layer around RFQ intake, pricing logic, ERP handoff, and multi-OEM performance data where OEM tools are least neutral.
  - name: Services creep
    description: Custom tooling, fixturing, and material nuances could push the business toward expensive application-engineering services.
    mitigation: Constrain early deployments to deburring and polishing on a small set of materials and cell types, and only expand after templates are repeatable.
