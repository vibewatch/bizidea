differentiator: >-
  ENCY-class tools help generate and validate robot paths once an engineer has
  already decided to pursue a job. This company owns the missing commercial and
  operational layer before that handoff: which parts should be quoted for
  robotic processing, what assumptions make the quote safe, and how accepted
  settings become reusable templates. Its moat compounds through
  geometry-to-cycle-time priors, tooling libraries, and estimate-versus-actual
  performance data collected across many part families and cells.
