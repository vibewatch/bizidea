openQuestions:
- What percentage of AS9100/Nadcap aerospace finishers already run two or more robotic deburring or polishing cells versus single pilot cells?
- Will design partners allow enough historical RFQ, CAD, and prove-out data access under ITAR/CUI rules to train a compounding estimate library?
- Can modeled cycle-time confidence bands beat senior programmer judgment on repeat titanium and aluminum part families without a services-heavy deployment?
- In sub-100-employee shops, does the first budget owner sit with manufacturing engineering, estimating/sales, or the plant owner/GM?
