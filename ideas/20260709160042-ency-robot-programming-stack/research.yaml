    - 24
  sensitivityCases:
  - case: OEM and OLP suites move upstream into quote feasibility
    impact: If ENCY-, ABB-, or Robotmaster-class tools bundle practical cycle-time estimation and RFQ triage, the startup must differentiate on multi-OEM neutrality, auditability, and estimate-versus-actual learning rather than on simulation alone.
    sourceRefs:
