    - 6
    - 9
    - 10
  - case: Robotic finishing adoption stays choppy in metals and machinery
    impact: If 2024-style softness in metals persists, buyers may delay new workflow software until a cell expansion or acute labor event forces action.
    sourceRefs:
    - 13
    - 12
    - 18
  - case: Compliance requirements force slower deployment patterns
    impact: If technical-data, CUI, or safety review blocks cloud-first delivery, onboarding may lengthen, but the product also becomes more defensible if it embeds audit-grade controls from the start.
    sourceRefs:
    - 25
    - 26
    - 27
    - 28
  validationPlan:
  - priority: high
    question: What share of beachhead shops already use 2-6 robotic finishing cells versus one-off pilot cells?
    evidenceToGather: Ten design-partner account maps, including cell counts, robot brands, and current quote/prove-out workflow ownership.
  - priority: high
    question: Can the startup beat senior programmer judgment on repeat titanium and aluminum part families without eroding trust?
    evidenceToGather: Blind back-tests on historical RFQs comparing model estimates with actual prove-out outcomes and live engineer estimates.
  - priority: medium
    question: Will target accounts permit enough CAD, quote, and prove-out data ingestion under ITAR/CUI rules to build a compounding dataset?
    evidenceToGather: Security reviews, deployment-architecture interviews, and sample pilot data-sharing agreements from defense-adjacent suppliers.
