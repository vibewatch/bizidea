    - 32
  - point: Quality and supply-chain ecosystem partners—Nadcap, OASIS-driven certification workflows, and multi-site finishers—help the startup align with how aerospace buyers already qualify vendors.
    sourceRefs:
    - 20
    - 22
    - 23
    - 24
  dataMoats:
  - point: Each quote-to-prove-out loop can add geometry, material, tooling, and estimate-versus-actual cycle-time data that generic OLP tools do not typically aggregate across customers.
    sourceRefs:
    - 4
    - 11
    - 35
  - point: A library of finishing templates tied to force-control settings, abrasive wear patterns, and part-family behavior can compound into better confidence bands for new RFQs.
    sourceRefs:
    - 30
    - 31
    - 32
    - 33
  - point: Cross-OEM feasibility and simulation history becomes more valuable as shops mix legacy and new cells instead of standardizing on one vendor.
    sourceRefs:
