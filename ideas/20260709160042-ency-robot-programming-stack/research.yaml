  adoptionFrictionMatrix:
  - friction: Simulation fidelity versus real-world finishing variation
    severity: high
    affectedBuyer: Robot programming lead
    mitigation: Start with repeat titanium and aluminum families, expose confidence bands, and close the loop with actual prove-out data before automating harder geometries.
    sourceRefs:
    - 1
    - 11
    - 35
    - 29
  - friction: ITAR and CUI concerns around CAD and process data
    severity: high
    affectedBuyer: Operations and IT leadership
    mitigation: Offer on-prem or air-gapped deployment options and explicit data-segmentation controls from day one.
    sourceRefs:
    - 25
    - 26
    - 28
  - friction: Messy RFQ inputs and inconsistent spec normalization
    severity: medium
    affectedBuyer: Application engineering manager
    mitigation: Constrain pilots to narrow part families and build templated intake around the minimum geometry, material, and finish fields that drive feasibility.
