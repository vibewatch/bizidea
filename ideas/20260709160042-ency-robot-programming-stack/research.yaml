    value: $1.5M
    rationale: 'Reachable year-3 case: 24 paid shops x 3.2 active cells x $20k annual spend assumes the startup lands through bottleneck or commissioning events, then expands one account at a time across repeat part families and sister cells.'
    isEstimate: true
    sourceRefs:
    - 16
    - 18
    - 29
