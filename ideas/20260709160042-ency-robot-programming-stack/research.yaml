    - 7
    - 8
    - 9
    - 10
  geographicConsiderations:
  - point: The wedge is strongest in North America because aerospace supply-chain labor stress is visible there, and the product can start in a region where buyer proximity and channel relationships matter.
    sourceRefs:
    - 16
    - 18
    - 17
  - point: Defense-adjacent programs raise the bar for technical-data handling, pushing many target accounts toward on-prem, private-cloud, or air-gapped deployment models.
    sourceRefs:
    - 25
    - 26
    - 28
  - point: Multi-facility finishing groups such as Valence suggest a credible expansion path from one site to regional clusters once templates and approvals are reusable.
    sourceRefs:
