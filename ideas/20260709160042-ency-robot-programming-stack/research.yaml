market:
  tam:
    value: $77.6M
    rationale: 'Bottom-up broad-cell estimate: 31,311 North American robot orders in 2024 x 59% non-automotive mix proxy x 14% metal/machinery share x 5-year active installed-base window x 30% material-removal/finishing relevance ≈ 3,879 addressable cells; x $20k estimated annual workflow spend per cell = about $77.6M.'
    isEstimate: true
    sourceRefs:
    - 13
    - 19
    - 3
  sam:
    value: $7.6M
    rationale: 'Beachhead constraint: NASF executive-summary data imply ~2,600 U.S. surface-finishing job shops and aerospace at ~10% of end-market demand, or roughly 260 U.S. aerospace-oriented shops; applying a 1.2x North America factor, a 35% robot-ready subset, 3.5 active cells per shop, and $20k per cell yields about $7.6M.'
    isEstimate: true
    sourceRefs:
    - 14
    - 15
    - 3
