competitors:
- name: ENCY Robot
  stage: scale-up
  wedge: CAD/CAM-to-robot offline programming with full-cell simulation and Stäubli-aligned manufacturing workflows.
  pricing: Custom quote / not publicly listed
  strength: Strong bridge from CAD trajectories to robot-ready motion with explicit collision and singularity claims.
  weaknessVsUs: Starts after the shop has already decided to pursue the job and does not obviously own the RFQ-to-assumption record.
  sourceRefs:
  - 1
  - 2
- name: RoboDK
  stage: scale-up
  wedge: Robot-agnostic offline programming, simulation, and machining workflows at a comparatively accessible public price point.
  pricing: $3,995 perpetual base; $17,995 calibration tier
  strength: Broad robot support and clear ROI as an engineering productivity tool.
  weaknessVsUs: Generic OLP does not by itself encode quote assumptions, buyer context, or estimate-versus-actual learning for aerospace finishing shops.
  sourceRefs:
  - 3
  - 4
- name: Robotmaster
  stage: incumbent
  wedge: Mature CAD/CAM-driven offline programming for cutting, machining, deburring, and finishing applications.
  pricing: Custom quote / not publicly listed
  strength: Deep manufacturing application coverage and strong credibility with integrators and advanced users.
  weaknessVsUs: Still centered on program creation and application execution rather than on commercial triage and reusable quote memory.
  sourceRefs:
  - 9
  - 39
- name: GrayMatter Robotics
  stage: scale-up
  wedge: Adaptive robotic surface-finishing platform that combines physics-informed AI, force sensing, and cell-level automation.
  pricing: Custom quote / pilot-led
  strength: Closer to the process outcome, with evidence of rework and consumables improvements in finishing-heavy environments.
  weaknessVsUs: Leans toward owning the cell and automation project, not toward a neutral pre-quote layer for mixed fleets and legacy OEM software.
  sourceRefs:
  - 11
  - 38
- name: ABB RobotStudio
  stage: incumbent
  wedge: OEM-native offline programming and machining add-ons for ABB robot cells.
  pricing: License-based / public list price not shown
  strength: Accurate virtual-controller environment and explicit machining/deburring extensions.
  weaknessVsUs: Tied to ABB cells and still focused on execution after the job is already accepted.
  sourceRefs:
  - 5
  - 6
