topRisks:
- name: 仿真精度缺口
  description: 只要有一次“报价可行、现场却跑不动”的严重错配，买家对产品的信任就可能直接崩掉。
  mitigation: 先给出置信区间，收窄单元和工艺范围，再把真实上机验证结果回灌进估算库，等这些跑稳了再去自动化更难的作业。
- name: OEM 捆绑
  description: ENCY、Stäubli 或其他离线编程厂商，完全可能往报价估算延伸，把这层工作流吃回自己的原生工具链里。
  mitigation: 要抢住 RFQ 收件、定价逻辑、ERP 交接和多 OEM 表现数据这一层跨系统地带——这里恰恰是 OEM 工具最不够中立的地方。
- name: 服务化蔓延
  description: 定制工装、夹具和材料细节，很容易把业务一路拖向昂贵的应用工程服务。
  mitigation: 早期部署先把范围锁在少数材料和单元类型上的去毛刺、抛光，只有模板真正可复用后再扩。
