differentiator: ENCY 这一类工具，擅长在工程师已经决定接单后去生成和验证机器人路径。这家公司吃的是更前面的商业和运营层：哪些零件值得按机器人工艺去报价，报价靠什么假设才安全，以及接单后的设定怎么变成可复用模板。它的护城河会沿着几何到节拍的先验、工装库，以及跨大量零件家族和单元积累的“估算对实际”表现数据一路加深。
