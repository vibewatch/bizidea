jobsToBeDone:
- job: 当新的航空航天零件 RFQ 到来时，帮应用工程团队判断它是否适合现有机器人单元，以及该按什么节拍假设去报价，这样团队就能在不打断生产的前提下快速出价。
  currentAlternative: 在 OEM 工具里手工仿真，再配合 Excel 报价和临时性的上机验证讨论
  successMetric: 从收到 CAD 到交付客户可用报价所需的小时数
- job: 当重复零件家族带着版本变更回来时，帮机器人编程负责人复用正确模板，并标出哪些地方需要重新验证，这样就能用最少的上机验证时间把作业放出去。
  currentAlternative: 翻旧程序文件、本地笔记，再靠程序员记忆去拼
  successMetric: 每个改版零件对应的在产单元上机验证时长
