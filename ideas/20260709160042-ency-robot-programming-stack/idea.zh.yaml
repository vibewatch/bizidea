problem: 航空航天精整工厂越来越想让机器人接过去毛刺和抛光，但每个新零件一进来，起手仍是一单定制的应用工程项目。几何、工装、可达性和节拍到底行不行，还是得靠资深程序员或外部集成商手工判断，往往不是人工仿真，就是直接占用在产单元。结果是 RFQ 周转被拖慢，稀缺专家产能被烧掉，重复件也始终沉不成一套可规模化的软件流程。
targetUser:
  primary: 运行 2-6 个机器人去毛刺或抛光单元的北美 AS9100 认证航空航天精整工厂中的制造工程与应用工程负责人
  secondary: 负责机器人表面精整单元离线仿真、上机验证和换型的机器人编程负责人
  buyer: 运营副总裁或制造工程总监
startupThesis:
  nonObviousInsight: ENCY 跟 Stäubli 绑得更紧，说明从 CAD/CAM 到轨迹转换、再到离线仿真，正在从定制化专家活变成可复用产品能力。拐点一到，最稀缺的就不再是每个程序都手写，而是更上游的判断：哪些 RFQ 真的适合机器人做，怎样的假设才能赚钱，以及通过审批的设定怎么在相似零件间复用。
  beachhead: 面向北美 AS9100 认证航空航天精整工厂的 RFQ 分流与节拍估算，这些工厂运行 2-6 个机器人去毛刺或抛光单元，并反复处理钛合金和铝合金零件家族
  wedge: 一层 RFQ 到工艺包的系统：吃进 CAD 文件、表面要求和单元约束，在程序员碰到在产机器人单元前，就先估出可达性、节拍、碰撞风险和工装假设。
  whyNowCatalyst: ENCY 和 Stäubli 已经在把离线编程、仿真和可复用的高级工艺设置产品化。对那些一停机编程就亏钱的工厂来说，报价前先做机器人可行性评分，这件事一下子站得住了。
  ventureScalePath: 先从航空航天去毛刺和抛光 RFQ 切入，再把工单释放、质量证据和模板复用扩到医疗器械、通用工业和外包精整网络，最后做成机器人去材单元的操作系统。
solution: Surface Finishing Quote OS 不是去替换 CAD/CAM、OEM 离线编程软件或 ERP 报价工具，而是架在它们之上。它吃进零件 CAD 模型、材料、表面规格和目标单元配置，再结合可复用模板与仿真输出，生成可行性分数、节拍区间、工装方案和报价假设。工厂一旦拿下订单，同一份记录就会变成供编程、QA 和排产复用的工艺包，应用工程工作不会再散在邮件线程和本地文件里。真实的上机验证与运行数据还会回灌到估算库里，让报价精度和模板复用率越跑越高。
goToMarketSeed:
  firstCustomer: 一家北美 AS9100 认证航空航天精整工厂，拥有 2-4 个机器人去毛刺或抛光单元、一位资深机器人程序员，并持续收到钛合金支架或铝合金壳体的 RFQ
  buyingTrigger: RFQ 量上来、新增机器人单元上线，或者关键程序员变成瓶颈时，工厂就会被逼着在不增加在产单元停机的前提下，加快报价周转。
  currentAlternative: 资深机器人程序员或外部集成商在 OEM 离线编程工具里手工仿真零件、维护 Excel 报价表，再靠单元上机验证把价格报实。
  switchingReason: 这个切口把报价可行性变成一套可复用的软件工作流，不用逼工厂拆掉现有 OEM 编程栈，就能缓解专家瓶颈和单元停机。
  pricingHypothesis: 按活跃精整单元收取年费，再叠加 RFQ 量分层；CAD 和 OEM 软件连接器的上线另行收费。
