  - factor: 法律
    impact: negative
    point: AS9100 / Nadcap 的流程纪律，再加上 OSHA 的安全义务，让可审计的变更记录和人工审批成了入场门槛。
    sourceRefs:
    - 20
    - 21
    - 22
    - 27
  - factor: 环境
    impact: neutral
    point: 表面精整本来就是强监管行业，而且已经被要求把工艺跑得更干净、更稳定；这会偏向那些能减少浪费的软件，但也会让变更节奏变慢。
    sourceRefs:
    - 14
    - 11
  adoptionFrictionMatrix:
  - friction: 仿真精度 vs 真实精整波动
    severity: 高
    affectedBuyer: 机器人编程负责人
    mitigation: 先从重复的钛合金和铝合金零件家族做起，亮出置信区间，并在自动化更复杂几何之前，先用真实上机验证数据把闭环跑通。
    sourceRefs:
    - 1
    - 11
    - 35
    - 29
  - friction: 围绕 CAD 与工艺数据的 ITAR / CUI 顾虑
    severity: 高
    affectedBuyer: 运营与 IT 管理层
    mitigation: 从第一天起就提供本地部署或气隙部署选项，并把明确的数据分区控制做进去。
    sourceRefs:
    - 25
    - 26
    - 28
  - friction: RFQ 输入很乱，规格归一也不一致
    severity: 中
    affectedBuyer: 应用工程经理
    mitigation: 试点先锁在窄一些的零件家族上，再围绕决定可行性的最小几何、材料和表面字段，把模板化收件流程搭起来。
    sourceRefs:
    - 2
    - 4
    - 33
  - friction: 买家不愿替换现有编程或安全流程
    severity: 中
    affectedBuyer: 制造工程总监
    mitigation: 把产品摆成现有 OLP 软件之上的建议层和记录层，保留人工审批和既有机器安全流程。
    sourceRefs:
    - 5
    - 7
    - 8
    - 27
market:
  tam:
    value: $77.6M
    rationale: 自下而上的广义单元测算：2024 年北美机器人订单 31,311 台 × 59% 非汽车占比代理值 × 14% 金属 / 机械份额 × 5 年活跃装机窗口 × 30% 去材 / 精整相关度 ≈ 3,879 个可覆盖单元；再乘每个单元每年估算 $20k 的工作流支出，约为 $77.6M。
    isEstimate: true
    sourceRefs:
    - 13
    - 19
    - 3
  sam:
    value: $7.6M
    rationale: 按滩头市场收窄：NASF 摘要数据显示，美国约有 2,600 家表面精整加工厂，而航空航天约占终端市场需求的 10%，也就是约 260 家偏航空航天的美国工厂；再乘上 1.2x 的北美系数、35% 的机器人就绪子集、每厂 3.5 个活跃单元，以及每单元 $20k 的支出，得到约 $7.6M。
    isEstimate: true
    sourceRefs:
    - 14
    - 15
    - 3
  som:
    value: $1.5M
    rationale: 第 3 年可触达情形：24 家付费工厂 × 3.2 个活跃单元 × 每年 $20k 的支出。这个前提是，公司能借瓶颈事件或新单元调试切进去，然后沿着重复零件家族和兄弟单元，一家一家往外扩。
    isEstimate: true
    sourceRefs:
    - 16
    - 18
    - 29
    - 37
