categoryDynamics:
  growthRate: 2023 年全球工业机器人运行保有量增长 10%；北美机器人订单在 2024 年大致持平后，于 2025 年 Q3 回升 11.6%。
  growthRateSourceRefs:
  - 19
  - 12
  - 13
  tailwinds:
  - point: 离线编程和数字孪生已经足够主流，价值开始往更上游的可行性判断、模板化和报价智能迁移。
    sourceRefs:
    - 1
    - 5
    - 8
  - point: 非汽车领域的自动化需求正在变宽，金属和通用制造都在其中。
    sourceRefs:
    - 12
    - 13
  - point: 航空航天和精整行业的人手短缺，会抬高“把稀缺工艺经验沉进软件里”这件事的价值。
    sourceRefs:
    - 16
    - 17
    - 18
  headwinds:
  - point: 金属行业订单在 2024 年依然偏软，所以哪怕长期自动化逻辑没坏，节奏也会一阵一阵地抖。
    sourceRefs:
    - 13
  - point: 特殊工艺认证、技术数据控制和安全审查，会拖慢云优先的落地节奏，也逼着团队更谨慎地划范围。
    sourceRefs:
    - 20
    - 26
    - 28
    - 27
competitors:
- name: ENCY Robot
  stage: 成长期公司
  wedge: 从 CAD/CAM 到机器人的离线编程，配套整单元仿真和贴合 Stäubli 的制造工作流。
  pricing: 定制定价 / 未公开
  strength: 它把 CAD 轨迹到机器人可执行运动这一步接得很稳，还明确强调了碰撞和奇异点处理。
  weaknessVsUs: 它的起点，是工厂已经决定接这单之后；而 RFQ 到假设记录这一层，显然不在它手里。
  sourceRefs:
  - 1
  - 2
- name: RoboDK
  stage: 成长期公司
  wedge: 提供跨机器人品牌的离线编程、仿真和加工工作流，而且公开价格相对更容易切入。
  pricing: $3,995 永久授权基础版；$17,995 标定版本
  strength: 机器人支持面广，作为工程效率工具，ROI 也说得清。
  weaknessVsUs: 通用 OLP 本身并不会替航空航天精整工厂记下报价假设、买家上下文，或“估算对实际”的学习。
  sourceRefs:
  - 3
  - 4
- name: Robotmaster
  stage: 现有厂商
  wedge: 面向切割、加工、去毛刺和精整场景的成熟 CAD/CAM 驱动离线编程。
  pricing: 定制定价 / 未公开
  strength: 制造应用覆盖很深，在集成商和高级用户那里也有很强的可信度。
  weaknessVsUs: 它的中心仍然是程序创建和应用执行，而不是商业分流和可复用的报价记忆。
  sourceRefs:
  - 9
  - 39
- name: GrayMatter Robotics
  stage: 成长期公司
  wedge: 一套自适应机器人表面精整平台，把物理启发式 AI、力传感和单元级自动化绑在一起。
  pricing: 定制定价 / 以试点推进
  strength: 它离最终工艺结果更近，而且已经拿出了在精整密集场景里降低返工和耗材的证据。
  weaknessVsUs: 它更倾向于直接接管单元和自动化项目，而不是去做一层面向混合机队和老旧 OEM 软件的中立报价前系统。
  sourceRefs:
  - 11
  - 38
- name: ABB RobotStudio
  stage: 现有厂商
  wedge: 面向 ABB 机器人单元的 OEM 原生离线编程和加工扩展。
  pricing: 许可证模式 / 未展示公开标价
  strength: 它的虚拟控制器环境足够准确，也明确提供了加工和去毛刺扩展。
  weaknessVsUs: 它绑在 ABB 单元上，而且重心仍在“工单已经接下后”的执行阶段。
  sourceRefs:
  - 5
  - 6
regulatoryTechnicalConstraints:
- point: 航空航天客户会要求供应商资质和可追溯流程对齐 AS9100 / OASIS，而且往往还要叠加 Nadcap 特殊工艺认证。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- point: 如果 CAD、工艺包或上机验证数据被认定为 ITAR 技术数据或 CUI，那部署架构和访问控制就会直接变成产品定义级约束。
  sourceRefs:
  - 25
  - 26
  - 28
- point: 机器人单元规划和程序发布，仍然要受机器防护和工业机器人安全义务约束，所以这类产品天然需要人工签核和可审计审批。
  sourceRefs:
  - 27
- point: 就算路径编程自动化了，力控制、刀具磨损和单元特定验证，依然是技术瓶颈。
  sourceRefs:
  - 29
  - 30
  - 31
  - 32
  - 35
validationSignals:
- point: ENCY 和 Stäubli 已经明确把 CAD/CAM 到机器人的转换、碰撞检查和停机缩减，打包成一套产品化工作流。
  sourceRefs:
  - 1
  - 2
- point: GrayMatter 声称在精整场景里拿到了很大的收益——返工下降、耗材节省，以及在气隙防务环境中的本地学习能力——这说明只要真能跑通，精整团队会为结果导向的自动化买单。
  sourceRefs:
  - 11
- point: Enjet Aero 的案例把滩头市场的痛点形状讲得很具体：手工去毛刺瓶颈、质量一致性要求、工装健康监控，以及明确的 FAT / 验证步骤。
  sourceRefs:
  - 29
- point: NASF 的行业报告说明，表面精整在美国仍是一个体量不小但极度分散的行业；这正适合先按单厂卖工作流切口，再通过区域集团往上卷。
  sourceRefs:
  - 14
  - 15
openQuestions:
- 这些 AS9100 / Nadcap 航空航天精整工厂里，已经跑着两个及以上机器人去毛刺或抛光单元的，占比到底多少？相对的，只停留在单个试点单元的又有多少？
- 在 ITAR / CUI 规则下，共创客户会不会开放足够多的历史 RFQ、CAD 和上机验证数据，让团队训练出一套会持续变强的估算库？
- 不靠重服务部署，模型给出的节拍置信区间，能不能在重复的钛合金和铝合金零件家族上赢过资深程序员的判断？
- 在 100 人以下的工厂里，第一预算归属到底落在制造工程、报价 / 销售，还是工厂老板 / 总经理手里？
