scenarios:
  downside:
    description: "California freight programs delay route expansion and adjacent expansion slips, so the company stays concentrated in the initial wedge and margin improves more slowly."
    y3RevenueK: 1090.0
    y3EbitdaK: -388.0
    cashLowPointK: 190.0
    keyAssumptionChanges:
      - "Q4Y3 active paid corridors reaches 9 instead of 12."
      - "Blended Y3 corridor ARPU stays closer to $132K than $145K-$150K."
      - "Gross margin tops out around 68% because integrations remain semi-custom."
  base:
    description: "The first two pilots convert on schedule, early logos expand into more corridors, and one small adjacent-mode or adjacent-state wedge contributes in Y3 without adding more than one GTM hire."
    y3RevenueK: 1517.1
    y3EbitdaK: -160.6
    cashLowPointK: 476.6
    keyAssumptionChanges:
      - "3 active paid corridors by M12, 8 by Q4Y2, and 12 by Q4Y3."
      - "Blended production ARPU rises from about $132K at first conversion toward about $150K exit ARR per corridor by Q4Y3."
      - "Gross margin reaches the low-to-mid 70s by Y3 as connectors and California templates become reusable."
  upside:
    description: "Second-corridor expansion lands faster and one adjacent-mode program converts earlier, lifting corridor count and premium module attach without needing a second solutions bench."
    y3RevenueK: 1845.0
    y3EbitdaK: 92.0
    cashLowPointK: 610.0
    keyAssumptionChanges:
      - "Q4Y3 active paid corridors reaches 14 instead of 12."
      - "Premium reporting and benchmarking modules lift realized ARPU about 8-10% above base."
      - "Gross margin reaches roughly 78% as deployment time falls below 75 days."
sensitivity:
  - variable: ARPU
    downsideCase: "Production pricing stays near $132K ARR per corridor and premium modules do not attach."
    baseCase: "Blended Y3 production ARPU reaches about $145K with modest premium reporting attach."
    upsideCase: "Benchmarking and regulator-reporting modules lift realized ARPU toward $155K-$160K."
    y3RevenueImpactK: -151.7
    cashImpactK: -112.0
  - variable: CAC
    downsideCase: "Buyers need more founder time and on-site diligence, pushing CAC toward about $120K per corridor."
    baseCase: "CAC stays near $91K per corridor on a concentrated founder-led motion."
    upsideCase: "Partner referrals and repeatable pilots pull CAC toward about $70K per corridor."
    y3RevenueImpactK: -90.0
    cashImpactK: -200.0
  - variable: churn
    downsideCase: "Monthly corridor churn rises toward 3.0% because buyers fold the workflow back into internal tools."
    baseCase: "Monthly churn holds near 1.8% once the product becomes the evidence system of record."
    upsideCase: "Monthly churn stays near 1.0% because corridor templates and audit history are sticky."
    y3RevenueImpactK: -130.0
    cashImpactK: -95.0
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production cycles stretch from about 90 days to 120-150 days."
    baseCase: "Two pilots convert inside the first year and expansion corridors land on roughly quarterly cadence."
    upsideCase: "A route-expansion trigger compresses approval cycles closer to 60 days."
    y3RevenueImpactK: -220.0
    cashImpactK: -170.0
  - variable: "gross margin"
    downsideCase: "Gross margin stalls around 68% because integrations stay semi-custom and support remains high-touch."
    baseCase: "Gross margin reaches roughly 74% in Y3 as template reuse improves."
    upsideCase: "Gross margin reaches 78%+ as connector reuse and export-first workflows standardize."
    y3RevenueImpactK: 0.0
    cashImpactK: -125.0
  - variable: "hiring pace"
    downsideCase: "A second solutions or ops hire is pulled forward before adjacent revenue is proven."
    baseCase: "Headcount stays capped at 6 FTE after the first GTM hire."
    upsideCase: "The company delays the next full-time hire until after adjacent design-partner proof."
    y3RevenueImpactK: -40.0
    cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts[8 target AV programs] --> Pilots[Paid one-corridor pilots]
      Pilots --> Corridors[Active paid corridors]
      Corridors --> Revenue[Subscription and premium revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue comes from growing active paid corridors from 3 at Y1 exit to 12 by Q4Y3 while blended corridor ARR rises from early $132K production pricing toward about $150K as premium reporting modules attach."
  - checkName: "Must go right"
    finding: "The first two pilots must convert into repeatable multi-corridor deployments so the company can reach 8 paid corridors by Q4Y2 without adding a second solutions bench."
  - checkName: "Model breaks if"
    finding: "If sales cycles drift past 120 days or buyers keep the workflow in-house, the downside case pushes cash toward roughly $0.2M before a seed-quality milestone appears."
  - checkName: "Next-round proof"
    finding: "The seed story is 8 paid corridors, roughly 70% gross margin, one adjacent design partner, and deployment time below 90 days with buffer cash still intact."
sanityChecks:
  ruleOf40: "Y3 growth 89.1% + EBITDA margin -10.6% = 78.5%"
  burnMultiple: "Y2 burn multiple is about 0.8x using roughly $0.6M of EBITDA burn against about $0.7M of net new ARR; Q4Y3 turns slightly EBITDA positive."
  revenuePerFte: "$253K Y3 on 6 ending FTE (benchmark $200-400K SaaS; reasonable for an integration-heavy control-plane product)"
  flags:
    - "customersEop is modeled as active paid corridors rather than logos because corridor is the pricing unit; logo count is lower than the corridor count throughout the model."
    - "The $2.0M ask only works if headcount stays capped at 6 FTE through Y3; one extra solutions or G&A hire pulled forward would likely move the round toward the middle of the BP range."
    - "Base Y3 revenue assumes about 2 paid adjacent corridors outside the California freight beachhead; if adjacency slips, revenue likely stalls closer to the researched $1.2M California-only SOM."
