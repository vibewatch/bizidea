slug: remote-response-proof-os
date: "2026-07-09"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-09] the operating model starts in the first full month after the dated business plan."
  - id: A2
    name: Opening cash / pre-seed raise
    value: "$2.0M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] uses the low end of the stated range because the plan keeps post-Y1 headcount flat and is sized to reach the Q4Y2 milestone with roughly six months of buffer."
  - id: A3
    name: Revenue unit definition
    value: "customersEop counts active paid corridors (pilot or production), not logos"
    unit: definition
    source: "[BP businessModel.unitOfValue active corridor under compliance control + BP pricing per active corridor] corridor count is the cleanest way to reconcile pricing, expansion, and revenue."
  - id: A4
    name: Starting active paid corridors
    value: "0"
    unit: count
    source: "[BP experimentRoadmap 0-90 days + BP milestones 0-12 months] the company begins pre-revenue and must first win paid pilots."
  - id: A5
    name: Paid pilot price
    value: "$60K over about 3 months (~$20K/month)"
    unit: USD/corridor
    source: "[BP investorMemo.firstCustomer.initialContract $50k-$75k paid 8-12 week pilot] the base case uses the midpoint of the stated pilot band."
  - id: A6
    name: Production corridor price path
    value: "About $132K ARR at first conversion, rising toward $150K ARR by Y3"
    unit: USD/corridor/year
    source: "[BP investorMemo.firstCustomer.initialContract $120k-$180k annual first-corridor subscription + BP businessModel.revenueStreams + BP product.twentyFourMonth premium modules] the model stays in the lower-middle of the stated annual range and assumes modest premium attach by Y3."
  - id: A7
    name: Paid corridor ramp
    value: "3 active paid corridors by M12, 8 by Q4Y2, and 12 by Q4Y3"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 + BP gtm.funnelTargets + Research market.som $1.2M Y3 case] the model reaches the researched SOM and only modestly exceeds it after adjacency begins contributing in Y3."
  - id: A8
    name: Y1 pilot and conversion cadence
    value: "Pilot 1 starts in M5, pilot 2 starts in M8, both convert by M11, and a second-corridor expansion lands by M12"
    unit: timeline
    source: "[BP experimentRoadmap 3-6 months paid pilot + 6-12 months 2 annual contracts + BP milestones second-corridor expansion] this drives the stepped Y1 monthly revenue ramp."
  - id: A9
    name: Gross margin ramp
    value: "45-65% on paid months in Y1, 62-70% in Y2, and 72-75% in Y3"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP milestones gross margin at or above 70% by 12-24 months + Research adoptionFrictionMatrix] margins improve only as integrations and policy templates become repeatable."
  - id: A10
    name: Hiring timeline
    value: "Founder/GTM, product/compliance, and one engineer at start; solutions engineer in M4; second engineer in M7; first sales/partnerships hire in Q3Y2; no additional FTE through Y3"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + BP risks keep hiring lean] the company adds only the roles explicitly needed to win and expand the first few corridors."
  - id: A11
    name: Founder / GTM loaded compensation
    value: "$135K"
    unit: USD/year
    source: "[startup-finance heuristic for founder cash pay in a pre-seed B2B infrastructure startup] lean founder salary plus payroll taxes and benefits."
  - id: A12
    name: Product / compliance loaded compensation
    value: "$150K"
    unit: USD/year
    source: "[BP team product / compliance lead + startup-finance heuristic] senior compliance and product talent, but below late-stage market cash levels."
  - id: A13
    name: Engineering loaded compensation
    value: "$175K"
    unit: USD/year
    source: "[BP team founding eng and second full-stack or data engineer + startup-finance heuristic] enough to hire senior integration talent without assuming top-of-market cash."
  - id: A14
    name: Solutions / integrations loaded compensation
    value: "$155K"
    unit: USD/year
    source: "[BP team solutions / integrations engineer + startup-finance heuristic] reflects a senior deployment owner rather than a broad services bench."
  - id: A15
    name: Sales / partnerships loaded compensation
    value: "$170K"
    unit: USD/year
    source: "[BP gtm.channels + startup-finance heuristic] includes travel and variable pay for founder-assisted enterprise selling."
  - id: A16
    name: Payroll allocation to P&L lines
    value: "Founder 75% S&M / 25% G&A; solutions 50% S&M / 50% R&D; product/compliance and engineering 100% R&D; sales/partnerships 100% S&M"
    unit: allocation
    source: "[BP team role rationales + BP operations] maps headcount cost into the functional opex lines used by the model."
  - id: A17
    name: Non-payroll opex ramp
    value: "Monthly non-payroll spend rises from about $14K in early Y1 to about $28K by Q4Y3"
    unit: USD/month
    source: "[BP operations + BP gtm.channels + startup-finance heuristic] covers cloud, map and video storage, travel, legal, insurance, and data tooling without a large paid-demand budget."
  - id: A18
    name: Cash conversion convention
    value: "Cash movement is approximated by EBITDA"
    unit: formula
    source: "[startup-finance heuristic] capex, taxes, debt service, and working-capital timing are assumed immaterial at this scale."
  - id: A19
    name: Steady-state monthly corridor churn
    value: "1.8%"
    unit: percent per month
    source: "[startup-finance heuristic for sticky enterprise workflow SaaS + BP strategyMap.northStarMetric system-of-record positioning] the workflow should be sticky, but the concentrated buyer pool argues against mature-SaaS churn assumptions."
  - id: A20
    name: CAC convention
    value: "Y2-Y3 sales and marketing spend divided by 9 net new active paid corridors"
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] CAC is measured on the corridor unit because that is how the product is sold and expanded."
  - id: A21
    name: Next-round milestone for funding sizing
    value: "8 active paid corridors across roughly 4-5 customers by Q4Y2, one adjacent design partner, gross margin near 70%, and deployment time under 90 days"
    unit: milestone
    source: "[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + model cash curve] the ask is sized to reach this proof point with about six months of cash buffer."
  - id: A22
    name: Y3 expansion mix
    value: "About 2 of the 12 Q4Y3 active paid corridors come from an adjacent AV mode or second-state path"
    unit: corridor mix
    source: "[BP milestones 24-36 months + BP operatingAssumptions California templates are portable + Research sensitivityCases] this is what lets the model edge above the researched California-freight-only SOM."
  - id: A23
    name: Treatment of implementation fees
    value: "The base case does not add stand-alone implementation-fee revenue beyond the pilot pricing and blended corridor ARPU assumptions"
    unit: modeling choice
    source: "[BP businessModel.revenueStreams + conservative modeling choice] keeping base revenue tied mainly to corridor subscriptions avoids hiding a services-heavy economics problem."
