slug: remote-response-proof-os
date: "2026-07-09"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: 模型起始月
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-09] 运营模型从商业计划落款日之后的第一个完整月开始。"
  - id: A2
    name: 期初现金 / pre-seed 融资
    value: "$2.0M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + 模型现金曲线] 取所述区间的下限，因为计划让 Y1 之后的人员规模保持不变，且规模刚好够跑到 Q4Y2 里程碑并留出约六个月缓冲。"
  - id: A3
    name: 营收单位定义
    value: "customersEop 统计的是活跃付费走廊（试点或正式生产），不是客户数。"
    unit: definition
    source: "[BP businessModel.unitOfValue active corridor under compliance control + BP pricing per active corridor] 走廊数是把定价、扩展和营收对齐的最干净口径。"
  - id: A4
    name: 起始活跃付费走廊数
    value: "0"
    unit: count
    source: "[BP experimentRoadmap 0-90 days + BP milestones 0-12 months] 公司从零营收起步，必须先赢下付费试点。"
  - id: A5
    name: 付费试点价格
    value: "约 3 个月共 $60K（约 ~$20K/month）"
    unit: USD/corridor
    source: "[BP investorMemo.firstCustomer.initialContract $50k-$75k paid 8-12 week pilot] 基准情形取所述试点区间的中点。"
  - id: A6
    name: 生产走廊价格路径
    value: "首次转化时约 $132K ARR，到 Y3 逐步抬向 $150K ARR"
    unit: USD/corridor/year
    source: "[BP investorMemo.firstCustomer.initialContract $120k-$180k annual first-corridor subscription + BP businessModel.revenueStreams + BP product.twentyFourMonth premium modules] 模型停在所述年度区间的中下段，并假设到 Y3 有适度的高级模块附加。"
  - id: A7
    name: 付费走廊爬坡
    value: "M12 达到 3 条活跃付费走廊，Q4Y2 达到 8 条，Q4Y3 达到 12 条"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 + BP gtm.funnelTargets + Research market.som $1.2M Y3 case] 模型达到研究得出的 SOM，并在 Y3 相邻领域开始贡献后仅略微超出。"
  - id: A8
    name: Y1 试点与转化节奏
    value: "试点 1 在 M5 启动，试点 2 在 M8 启动，两者都在 M11 前转化，第二条走廊扩展在 M12 落地"
    unit: timeline
    source: "[BP experimentRoadmap 3-6 months paid pilot + 6-12 months 2 annual contracts + BP milestones second-corridor expansion] 这驱动了 Y1 逐月的阶梯式营收爬坡。"
  - id: A9
    name: 毛利率爬坡
    value: "Y1 的付费月份为 45-65%，Y2 为 62-70%，Y3 为 72-75%"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP milestones gross margin at or above 70% by 12-24 months + Research adoptionFrictionMatrix] 只有当集成和策略模板变得可复用时，毛利率才会改善。"
  - id: A10
    name: 招聘时间线
    value: "起步时配创始人/GTM、产品/合规和 1 名工程师；M4 招解决方案工程师；M7 招第 2 名工程师；Q3Y2 招首名销售/合作岗位；到 Y3 结束前不再增加 FTE"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + BP risks keep hiring lean] 公司只招那些为赢下并扩展头几条走廊而明确需要的岗位。"
  - id: A11
    name: 创始人 / GTM 综合薪酬
    value: "$135K"
    unit: USD/year
    source: "[startup-finance heuristic for founder cash pay in a pre-seed B2B infrastructure startup] 精简的创始人薪资，加上工资税和福利。"
  - id: A12
    name: 产品 / 合规综合薪酬
    value: "$150K"
    unit: USD/year
    source: "[BP team product / compliance lead + startup-finance heuristic] 资深的合规与产品人才，但低于后期市场的现金水平。"
  - id: A13
    name: 工程综合薪酬
    value: "$175K"
    unit: USD/year
    source: "[BP team founding eng and second full-stack or data engineer + startup-finance heuristic] 足以招到资深集成人才，又不假设按市场顶格给现金。"
  - id: A14
    name: 解决方案 / 集成综合薪酬
    value: "$155K"
    unit: USD/year
    source: "[BP team solutions / integrations engineer + startup-finance heuristic] 反映的是一位资深部署负责人，而非一支庞大的服务队伍。"
  - id: A15
    name: 销售 / 合作综合薪酬
    value: "$170K"
    unit: USD/year
    source: "[BP gtm.channels + startup-finance heuristic] 包含出差和创始人协助的企业销售的浮动薪酬。"
  - id: A16
    name: 薪酬向损益表科目的分摊
    value: "创始人 75% 计入 S&M / 25% 计入 G&A；解决方案 50% 计入 S&M / 50% 计入 R&D；产品/合规和工程 100% 计入 R&D；销售/合作 100% 计入 S&M"
    unit: allocation
    source: "[BP team role rationales + BP operations] 把人员成本映射到模型使用的各职能运营费用科目。"
  - id: A17
    name: 非薪酬运营费用爬坡
    value: "月度非薪酬支出从 Y1 早期的约 $14K，升到 Q4Y3 的约 $28K"
    unit: USD/month
    source: "[BP operations + BP gtm.channels + startup-finance heuristic] 覆盖云、地图与视频存储、出差、法务、保险和数据工具，不含大额付费获客预算。"
  - id: A18
    name: 现金折算惯例
    value: "现金变动按 EBITDA 近似"
    unit: formula
    source: "[startup-finance heuristic] 在这个规模上，资本开支、税、偿债和营运资金的时点差异都假设为不重大。"
  - id: A19
    name: 稳态月度走廊流失率
    value: "1.8%"
    unit: percent per month
    source: "[startup-finance heuristic for sticky enterprise workflow SaaS + BP strategyMap.northStarMetric system-of-record positioning] 这条工作流应该很黏，但集中的买家群体不支持采用成熟 SaaS 的流失假设。"
  - id: A20
    name: CAC 计算惯例
    value: "用 Y2-Y3 的销售与市场费用，除以 9 条净新增活跃付费走廊"
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] CAC 按走廊这个单位来衡量，因为产品就是这么卖和扩展的。"
  - id: A21
    name: 用于融资规模测算的下一轮里程碑
    value: "到 Q4Y2，在约 4-5 个客户之间做到 8 条活跃付费走廊、1 个相邻共创客户、毛利率接近 70%，部署时间低于 90 天"
    unit: milestone
    source: "[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + 模型现金曲线] 融资额度按跑到这个证明点、并留约六个月现金缓冲来测算。"
  - id: A22
    name: Y3 扩展构成
    value: "Q4Y3 的 12 条活跃付费走廊里，约 2 条来自相邻 AV 模式或第二个州的路径"
    unit: corridor mix
    source: "[BP milestones 24-36 months + BP operatingAssumptions California templates are portable + Research sensitivityCases] 正是这部分让模型能略微超过研究得出的、只算加州货运的 SOM。"
  - id: A23
    name: 实施费的处理方式
    value: "基准情形除了试点定价和综合走廊 ARPU 假设外，不额外计入单独的实施费收入"
    unit: modeling choice
    source: "[BP businessModel.revenueStreams + conservative modeling choice] 把基准营收主要绑定在走廊订阅上，避免掩盖一个重服务的经济性问题。"
