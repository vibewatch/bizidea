scenarios:
  downside:
    description: "加州货运项目推迟路线扩展，相邻扩展也延后，公司因此困在最初的切口里，毛利率改善更慢。"
    y3RevenueK: 1090.0
    y3EbitdaK: -388.0
    cashLowPointK: 190.0
    keyAssumptionChanges:
      - "Q4Y3 活跃付费走廊达到 9 条，而非 12 条。"
      - "Y3 综合走廊 ARPU 更接近 $132K，而非 $145K-$150K。"
      - "毛利率顶多约 68%，因为集成仍是半定制的。"
  base:
    description: "前两个试点按计划转化，早期客户扩展出更多走廊，一个小型的相邻模式或相邻州切口在 Y3 有贡献，且无需增加超过一名 GTM 人员。"
    y3RevenueK: 1517.1
    y3EbitdaK: -160.6
    cashLowPointK: 476.6
    keyAssumptionChanges:
      - "M12 达到 3 条活跃付费走廊，Q4Y2 达到 8 条，Q4Y3 达到 12 条。"
      - "综合生产 ARPU 从首次转化时的约 $132K，升到 Q4Y3 每条走廊约 $150K 的出口 ARR。"
      - "随着连接器和加州模板可复用，Y3 毛利率达到 70% 出头到中段。"
  upside:
    description: "第二条走廊扩展落地更快，一个相邻模式项目转化更早，抬高了走廊数和高级模块附加，且无需第二支解决方案队伍。"
    y3RevenueK: 1845.0
    y3EbitdaK: 92.0
    cashLowPointK: 610.0
    keyAssumptionChanges:
      - "Q4Y3 活跃付费走廊达到 14 条，而非 12 条。"
      - "高级报送和基准对标模块，把实际 ARPU 抬高到基准之上约 8-10%。"
      - "随着部署时间降到 75 天以下，毛利率达到约 78%。"
sensitivity:
  - variable: ARPU
    downsideCase: "生产定价停在每条走廊约 $132K ARR，且高级模块没有附加。"
    baseCase: "Y3 综合生产 ARPU 达到约 $145K，带适度的高级报送附加。"
    upsideCase: "基准对标和监管报送模块把实际 ARPU 抬向 $155K-$160K。"
    y3RevenueImpactK: -151.7
    cashImpactK: -112.0
  - variable: CAC
    downsideCase: "买家需要更多创始人时间和现场尽调，把 CAC 推向每条走廊约 $120K。"
    baseCase: "在集中、创始人主导的打法下，CAC 停在每条走廊约 $91K。"
    upsideCase: "伙伴转介和可复制的试点，把 CAC 拉向每条走廊约 $70K。"
    y3RevenueImpactK: -90.0
    cashImpactK: -200.0
  - variable: "流失率"
    downsideCase: "月度走廊流失率升向 3.0%，因为买家把工作流收回内部工具。"
    baseCase: "一旦产品成为证据记录系统，月度流失率守在 1.8% 附近。"
    upsideCase: "因为走廊模板和审计历史很黏，月度流失率停在 1.0% 附近。"
    y3RevenueImpactK: -130.0
    cashImpactK: -95.0
  - variable: "销售周期"
    downsideCase: "试点到生产的周期从约 90 天拉长到 120-150 天。"
    baseCase: "两个试点在第一年内转化，扩展走廊大致按季度节奏落地。"
    upsideCase: "一个路线扩展触发点把审批周期压到接近 60 天。"
    y3RevenueImpactK: -220.0
    cashImpactK: -170.0
  - variable: "毛利率"
    downsideCase: "毛利率卡在约 68%，因为集成仍是半定制、支持仍高触达。"
    baseCase: "随着模板复用改善，Y3 毛利率达到约 74%。"
    upsideCase: "随着连接器复用和以导出为先的工作流标准化，毛利率达到 78% 以上。"
    y3RevenueImpactK: 0.0
    cashImpactK: -125.0
  - variable: "招聘节奏"
    downsideCase: "在相邻营收被验证之前，就提前招了第二名解决方案或运营人员。"
    baseCase: "首名 GTM 人员之后，人员规模封顶在 6 名 FTE。"
    upsideCase: "公司把下一名全职招聘推迟到相邻共创客户被证明之后。"
    y3RevenueImpactK: -40.0
    cashImpactK: -180.0
modelDiagram:
  title: 单位经济流
  mermaid: |
    flowchart LR
      Accounts[8 target AV programs] --> Pilots[Paid one-corridor pilots]
      Pilots --> Corridors[Active paid corridors]
      Corridors --> Revenue[Subscription and premium revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: "营收引擎"
    finding: "基准营收来自活跃付费走廊从 Y1 末的 3 条增长到 Q4Y3 的 12 条，同时综合走廊 ARR 随高级报送模块附加，从早期 $132K 的生产定价升向约 $150K。"
  - checkName: "必须做对的事"
    finding: "前两个试点必须转化为可复制的多走廊部署，公司才能在不增加第二支解决方案队伍的情况下，于 Q4Y2 达到 8 条付费走廊。"
  - checkName: "模型崩溃的条件"
    finding: "如果销售周期漂过 120 天，或买家把工作流留在内部，下行情形会把现金压向约 $0.2M，且还没等到一个种子轮质量的里程碑出现。"
  - checkName: "下一轮的证明点"
    finding: "种子轮故事是 8 条付费走廊、约 70% 毛利率、一个相邻共创客户、部署时间低于 90 天，且缓冲现金仍完好。"
sanityChecks:
  ruleOf40: "Y3 growth 89.1% + EBITDA margin -10.6% = 78.5%"
  burnMultiple: "Y2 烧钱倍数约 0.8 倍——用约 $0.6M 的 EBITDA 烧钱对约 $0.7M 的净新增 ARR；Q4Y3 略微转为 EBITDA 为正。"
  revenuePerFte: "Y3 人均 $253K，按期末 6 名 FTE 计（基准 $200-400K SaaS；对一个集成密集的控制平面产品而言合理）"
  flags:
    - "customersEop 建模为活跃付费走廊而非客户数，因为走廊才是定价单位；整个模型里的客户数都低于走廊数。"
    - "$2.0M 的融资额度，只有在人员规模于整个 Y3 都封顶在 6 名 FTE 时才成立；提前多招一名解决方案或 G&A 人员，很可能把这一轮推向 BP 区间的中段。"
    - "基准 Y3 营收假设加州货运滩头之外约有 2 条付费的相邻走廊；若相邻扩展延后，营收很可能停在更接近研究得出的、只算加州的 $1.2M SOM。"
