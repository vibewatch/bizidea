jobsToBeDone:
  - job: "当城市改动我们卡车的可运营范围时，帮远程运营团队发布新的走廊规则，并证明每一趟都跑在范围内，这样才不会危及上线审批。"
    currentAlternative: "手工改 GIS、发 Slack 通知、用电子表格追踪。"
    successMetric: "从地理围栏通知到车队全面落地的耗时，加上运营前拦截到的路线例外数量。"
  - job: "当 AV 事件后应急响应人员打来电话时，帮值班操作员按政策接听、并留下一条可直接送审的时间线，这样安全与合规团队就不用花好几天去还原。"
    currentAlternative: "电话树、工单工具和手工还原日志。"
    successMetric: "在 SLA 内接听的呼叫占比，以及生成一份完整事后证据包的耗时。"
