problem: >-
  重型 AV 项目在规模还小的时候，可以用几套分开的工具管远程操控、路线地图和事故
  日志；但加州的新规把这种碎片化变成了上线的拦路虎。地方一次地理围栏变更或一通
  应急响应呼叫，现在都得在支撑商业审批的那份合规记录里完成路由、打时间戳、写清
  来龙去脉。大多数团队还在把调度控制台、GIS 图层、电话树和电子表格拼在一起，让
  30 秒响应的证明和百万英里证据的积累又慢又脆。
targetUser:
  primary: "在加州货运走廊上试运营 5-25 辆无人重卡的重型自动驾驶货运商，其自动驾驶运营或远程运营负责人。"
  secondary: "负责事故响应、地理围栏变更和许可证据的安全与合规经理。"
  buyer: "运营副总裁或安全与合规负责人。"
startupThesis:
  nonObviousInsight: >-
    加州的规则变化不只是多了些文书工作，它把远程协助中心变成了商业上线的真正
    控制面。一旦城市能对车队设地理围栏、应急响应人员又期待 30 秒内有人接听，稀缺
    的软件层就是那套把路线权限、干预日志和应急流程串起来的合规 OS——而不是又一个
    自动驾驶模型。
  beachhead: >-
    重型自动驾驶货运商的远程协助团队，他们在加州港口到仓库、短途中程走廊上试运营
    5-25 辆无人重卡，这里的地理围栏变更和应急响应呼叫会卡住商业上线。
  wedge: >-
    一套远程响应验证 OS，负责路由应急响应人员的呼叫、把城市级地理围栏更新发布到
    运营走廊、记录每一次干预，并自动生成可直接送审的证据包。
  whyNowCatalyst: >-
    加州新的 AV 规则把响应时延、市政地理围栏和证据记录变成了明确的上线要求，从而
    为围绕远程运营的软件腾出了预算，不再让合规散落在临时拼凑的工具里。
  ventureScalePath: >-
    先从加州重型 AV 上线就绪度切入，再把同一套控制平面扩展到 Robotaxi、接驳、
    配送、场内和矿区车队，并在远程协助成为运营瓶颈的地方，加上面向保险公司、供应商
    和监管方的报送模块。
solution: >-
  搭一座面向 AV 远程运营与合规的控制塔。产品把路线定义、地方地理围栏通知、应急
  响应联系人、远程操控事件、视频片段和测试里程日志，汇入一套按走廊组织的记录系统。
  当某座城市改动了允许区域，或发生事故时，软件会更新当前的运行设计域、核实谁在
  SLA 内接了呼叫，并拉出一条记录每一个人为与车辆动作的时间线。随后它把这些记录
  变成审计轨迹、里程碑看板和可直接送审的证据包，让运营方不用临时手忙脚乱就能证明
  自己已经就绪。
goToMarketSeed:
  firstCustomer: >-
    一家 A 到 C 轮的自动驾驶货运公司，在南加州仓储、港口和仓库走廊上反复跑
    10-20 辆无人重卡，内部有一支小规模远程协助团队。
  buyingTrigger: >-
    一份扩大路线覆盖的申请、一个新市政施加的地理围栏约束，或是内部要在商业上线前
    证明百万英里就绪度的推动。
  currentAlternative: >-
    事故发生时临时拼凑起来的远程操控控制台、调度软件、GIS/地图工具、电话树、电子
    表格和外部法律顾问。
  switchingReason: >-
    这个切口给首个客户一套系统，既满足 30 秒响应要求、把走廊变更推进运营，又能生成
    可直接送审的证据——不用每次城市或车辆事件一变就重搭一遍工作流。
  pricingHypothesis: >-
    按活跃走廊和远程运营席位收年度订阅费，另加监管模板和车队数据连接器的实施费。
