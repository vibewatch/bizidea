differentiator: >-
  多数 AV 厂商各卖各的：要么卖自动驾驶，要么卖远程操控，要么卖车队管理软件。这家
  公司要拿下的，是车辆、远程操作员、城市地理围栏，以及那个解锁上线审批的证据包
  之间受监管的交接环节。它的护城河靠走廊级响应数据、干预模板，以及可直接送审的
  审计逻辑不断加厚——这些恰恰是内部工具和 OEM 控制台很少跨客户标准化的东西。
