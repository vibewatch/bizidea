topRisks:
  - name: "初始市场太小"
    description: "加州重型 AV 项目数量很少，首批买家可能高度集中、转化缓慢。"
    mitigation: "先拿下货运，再把同一套模块扩展到 Robotaxi、接驳、配送和供应商的远程运营团队。"
  - name: "内部自建栈竞争"
    description: "资金充裕的 AV 运营商或远程操控厂商，可能选择自己扩展内部控制中心工具，而不是买一层新的软件。"
    mitigation: "靠可直接送审的工作流、跨系统的证据打包，以及内部工具很少产品化的多客户基准对标取胜。"
  - name: "规则解读漂移"
    description: "加州各市政和监管方对地理围栏、响应 SLA 和部署证据的执法口径，可能不断演变。"
    mitigation: "用可配置的策略引擎，并与早期车队、法律顾问和安全运营方紧密共创，让规则更新以模板形式交付，而不是变成定制项目。"
