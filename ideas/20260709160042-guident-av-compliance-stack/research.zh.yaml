      - 21
      - 29
      - 30
    competitiveRivalry:
      score: 4
      rationale: 直接的品类竞争还在萌芽，但相邻玩家众多，买家完全可以把这套工作流并入现有厂商或内部团队。
      sourceRefs:
      - 17
      - 18
      - 19
      - 21
      - 22
  pestle:
  - factor: 政治
    impact: positive
    point: 加州把应急响应通信和紧急地理围栏，变成了明确的政策议题，这就凿出了一块此前未必存在的软件预算。
    sourceRefs:
    - 1
    - 2
  - factor: 经济
    impact: negative
    point: 客户池仍然很小，港口/疏港运输的需求还带周期性，即便痛点是真实的，谨慎的买家依然能拖延新增软件开支。
    sourceRefs:
    - 24
    - 28
  - factor: 社会
    impact: positive
    point: 公共安全信任是 AV 推广的核心，这抬高了清晰响应工作流、以及“谁在何时做了什么”证明的价值。
    sourceRefs:
    - 10
    - 11
    - 31
  - factor: 技术
    impact: positive
    point: 远程任务分派、远程操控、自动驾驶平台和 GIS 系统都足够成熟，合规控制面可以直接搭在这些验证过的基础组件上。
    sourceRefs:
    - 16
    - 18
    - 19
    - 29
  - factor: 法律
    impact: negative
    point: 法律负担不轻，因为部署规则现在覆盖响应时限、地理围栏处理、远程运营资质和结构化事件报送。
    sourceRefs:
    - 1
    - 3
    - 4
    - 25
    - 26
  - factor: 环境
    impact: positive
    point: 加州的清洁车队和疏港转型又叠上了一层走廊治理，让与位置绑定的证据和规则追踪更有价值。
    sourceRefs:
    - 25
    - 26
    - 23
  adoptionFrictionMatrix:
  - friction: 大型 AV 项目可能更愿意扩展内部安全和远程运营工具。
    severity: 高
    affectedBuyer: 安全负责人或远程运营负责人
    mitigation: 先切入证据与面向监管方的工作流层，再把数据导出到现有内部系统。
    sourceRefs:
    - 15
    - 16
    - 21
    - 22
  - friction: 产品必须先接入路线管控、远程操控、视频和事件日志，才能让人觉得在运营上靠得住。
    severity: 高
    affectedBuyer: 远程运营负责人
    mitigation: 先做连接器，接入买家已经提到、当作现有替代方案的远程操控、自动驾驶和 GIS 系统。
    sourceRefs:
    - 4
    - 5
    - 17
    - 18
    - 29
  - friction: 除非产出物可送审、可导出，安全和法务团队在事故期间可能不信任第三方系统。
    severity: 中
    affectedBuyer: 安全与合规负责人
    mitigation: 让第一版就能生成响应包、事故时间线和原始报送模板，而不是强推一套封闭工作流。
    sourceRefs:
    - 3
    - 10
    - 11
    - 31
  - friction: 第一个市场足够集中，一个项目延期就能明显拖累销售管道质量。
    severity: 高
    affectedBuyer: CEO 或运营副总裁
    mitigation: 一旦加州模板验证成功，就迅速扩展到相邻 AV 模式和多州项目。
    sourceRefs:
    - 6
    - 19
    - 21
    - 22
    - 23
