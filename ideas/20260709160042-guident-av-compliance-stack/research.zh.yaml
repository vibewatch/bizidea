openQuestions:
- 到底有多少加州货运 AV 项目会真的去买第三方合规层，而不是扩展内部远程运营工具？
- 市政紧急地理围栏指令会以机器可读的形式送达，还是主要靠人工通知和电话？
- 实际付款的预算归属方到底是谁——自动驾驶运营、安全/合规，还是部署项目管理？
- 加州的响应和证据模板，迁移到德州等商业化进度更靠前的 AV 货运州，可迁移性有多高？
