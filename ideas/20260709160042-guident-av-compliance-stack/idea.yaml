jobsToBeDone:
  - job: "When a city changes where our trucks can operate, help the remote-operations team publish the new corridor rules and prove every run stayed inside them, so we do not jeopardize launch approval."
    currentAlternative: "Manual GIS edits, Slack updates, and spreadsheet tracking."
    successMetric: "Hours from geofence notice to fleet-wide rollout plus number of route exceptions caught before operation."
