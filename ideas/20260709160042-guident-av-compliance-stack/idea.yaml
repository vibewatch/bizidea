topRisks:
  - name: "Small initial market"
    description: "California heavy-duty AV programs are few, so the first buyer set may be concentrated and slow to convert."
    mitigation: "Land with trucking first, then expand the same module set into robotaxi, shuttle, delivery, and supplier remote-ops teams."
  - name: "Internal stack competition"
    description: "Well-funded AV operators or teleoperation vendors may try to extend in-house control-center tooling instead of buying a new layer."
    mitigation: "Win on regulator-ready workflows, cross-system evidence packaging, and multi-customer benchmarks that internal tools rarely productize."
  - name: "Rule interpretation drift"
    description: "California municipalities and regulators may evolve how they enforce geofencing, responder SLAs, and deployment evidence."
    mitigation: "Use a configurable policy engine and close design partnerships with early fleets, counsel, and safety operators so rule updates ship as templates instead of custom projects."
