problem: >-
  Heavy-duty AV programs can manage teleoperation, route maps, and incident
  logs in separate tools while they are small, but California's new rules turn
  that fragmentation into a launch blocker. A local geofence change or
  first-responder call now has to be routed, timestamped, and explained inside
  the same compliance record that supports commercial approval. Most teams still
  stitch together dispatch consoles, GIS layers, phone trees, and spreadsheets,
  making 30-second response proof and million-mile evidence accumulation slow
  and brittle.
targetUser:
  primary: "Head of autonomy operations or remote operations at a heavy-duty autonomous trucking operator piloting 5-25 driver-out trucks on California freight corridors."
  secondary: "Safety and compliance managers responsible for incident response, geofence changes, and permit evidence."
  buyer: "VP Operations or Head of Safety and Compliance."
startupThesis:
  nonObviousInsight: >-
    California's rule change does not just create more paperwork; it turns the
    remote assistance center into the real control surface for commercial
    launch. Once cities can geofence fleets and first responders expect a
    30-second human answer, the scarce software layer is the compliance OS that
    connects route permissions, intervention logs, and emergency workflows—not
    another autonomy model.
  beachhead: >-
    Remote-assistance teams at heavy-duty autonomous trucking operators piloting
    5-25 driver-out trucks on California port-to-warehouse and short
    middle-mile corridors, where geofence changes and responder calls can stall
    commercial launch.
  wedge: >-
    A remote-response proofing OS that routes first-responder calls, publishes
    city-level geofence updates to operating corridors, logs every
    intervention, and auto-builds approval-ready evidence packs.
  whyNowCatalyst: >-
    California's new AV rules make responder latency, municipal geofences, and
    evidence logging explicit launch requirements, creating budget for software
    around remote operations instead of leaving compliance inside ad hoc
    tooling.
  ventureScalePath: >-
    Start with California heavy-duty AV launch readiness, then expand the same
    control plane into robotaxi, shuttle, delivery, yard, and mining fleets,
    plus insurer, supplier, and regulator reporting modules wherever remote
    assistance becomes the operating bottleneck.
solution: >-
  Build a control tower for AV remote operations and compliance. The product
  ingests route definitions, local geofence notices, responder contacts,
  teleoperator events, video snippets, and test-mile logs into a per-corridor
  system of record. When a city changes an allowed zone or an incident occurs,
  the software updates the active operating design domain, verifies who
  answered within SLA, and opens a timeline with every human and vehicle
  action. It then turns those records into audit trails, milestone dashboards,
  and permit-ready evidence packets so operators can prove readiness without a
  manual scramble.
goToMarketSeed:
  firstCustomer: >-
    A Series A-C autonomous trucking company with 10-20 driver-out heavy-duty
    trucks on repeated Southern California depot, port, and warehouse corridors
    and a small in-house remote assistance team.
  buyingTrigger: >-
    An application to expand route coverage, a new municipality imposing
    geofence constraints, or an internal push to prove million-mile readiness
    before commercial launch.
  currentAlternative: >-
    Teleoperation consoles, dispatch software, GIS/map tools, phone trees,
    spreadsheets, and outside counsel stitched together during incidents.
  switchingReason: >-
    The wedge gives the first customer one system to meet the 30-second
    responder requirement, push corridor changes into operations, and produce
    approval-ready evidence without rebuilding the workflow every time a city
    or vehicle event changes.
  pricingHypothesis: >-
    Annual subscription priced per active corridor and remote-operations seat,
    plus implementation fees for regulator templates and fleet-data connectors.
