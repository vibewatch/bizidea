differentiator: >-
  Most AV vendors sell autonomy, teleoperation, or fleet-management software in
  isolation. This company would own the regulated handoff between the vehicle,
  the remote operator, the city geofence, and the evidence package that
  unlocks launch approval. Its moat compounds through corridor-level response
  data, intervention templates, and regulator-ready audit logic that internal
  tools and OEM consoles rarely normalize across customers.
