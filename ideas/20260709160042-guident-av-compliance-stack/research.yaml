  adoptionFrictionMatrix:
  - friction: Large AV programs may prefer to extend internal safety and remote-ops tooling.
    severity: high
    affectedBuyer: Head of Safety or remote operations leader
    mitigation: Sell into the evidence and regulator-facing workflow layer first, with exports into existing internal systems.
    sourceRefs:
    - 15
    - 16
    - 21
    - 22
  - friction: The product must integrate route control, teleoperation, video, and event logs before it feels operationally credible.
    severity: high
    affectedBuyer: Remote operations leader
    mitigation: Start with connectors to the teleop, autonomy, and GIS systems already cited by buyers as current substitutes.
