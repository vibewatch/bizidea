openQuestions:
- How many California freight AV programs will actually buy a third-party compliance layer instead of extending internal remote-ops tooling?
- Will municipal emergency-geofence directives arrive in a machine-readable form, or mostly through manual notices and calls?
- 'Which budget owner pays first in practice: autonomy operations, safety/compliance, or deployment program management?'
- How portable are California responder and evidence templates to Texas and other AV freight states where commercialization is further along?
