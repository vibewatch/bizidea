competitors:
- name: Guident
  stage: scale-up
  wedge: Remote monitoring and control center software for autonomous operations.
  pricing: Custom enterprise pricing; public list pricing not posted.
  strength: Close to the command-center workflow with explicit positioning around remote oversight, assistance, and compliant operations.
  weaknessVsUs: Its center of gravity is remote command and monitoring, not a neutral multi-customer compliance OS for corridor permissions and permit evidence.
  sourceRefs:
  - 17
- name: Ottopia
  stage: scale-up
  wedge: Tele-driving and remote-assistance platform for autonomous vehicles.
  pricing: Custom pricing; public pricing not posted.
  strength: Strong human-in-the-loop and teleoperation framing that maps directly to intervention workflows.
  weaknessVsUs: Teleoperation is a key input but not the full compliance record, geofence-control, or evidence-packaging layer.
  sourceRefs:
  - 18
- name: Applied Intuition
  stage: incumbent
  wedge: Broad autonomy and trucking software platform spanning validation, simulation, and enterprise integrations.
  pricing: Custom enterprise pricing.
  strength: Deep integration footprint and broad credibility with autonomy programs make it a natural adjacent incumbent.
  weaknessVsUs: 'Its breadth is also the gap: responder SLA proof, municipal geofence operations, and regulator-ready incident packaging are not the obvious core object.'
  sourceRefs:
  - 19
  - 20
- name: Torc Robotics
  stage: scale-up
  wedge: Operator-built trucking stack with remote-task, safety, and responder workflows for Daimler-backed driverless freight.
  pricing: Internal stack; not sold as off-the-shelf compliance software.
  strength: Purpose-built freight context and mature responder / remote-task materials show what a sophisticated buyer can build internally.
  weaknessVsUs: Optimized for Torc’s own operating program rather than a shared compliance OS usable across fleets, corridors, and regulators.
  sourceRefs:
  - 15
  - 16
- name: Kodiak AI
  stage: scale-up
  wedge: Trucking autonomy stack with productized inspection and truckport operations.
  pricing: Internal / partnership pricing; public pricing not posted.
  strength: Shows deep trucking-domain understanding and willingness to productize adjacent compliance surfaces such as inspections.
  weaknessVsUs: The stack is designed to accelerate Kodiak’s own network, not to serve as a neutral evidence and geofence-control layer for multiple operators.
  sourceRefs:
  - 21
