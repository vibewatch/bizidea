slug: detection-envelope-os
date: '2026-05-16'
executiveSummary: >-
  Detection Envelope OS targets ISR drone OEMs that are already integrating longer-range edge
  sensors but still clear payload releases through manual post-flight analysis, one-off services,
  and fragmented evidence packets. The first customer is a 100-1,000 person U.S. or Australian
  ISR drone OEM with one active Group 2 or Group 3 aircraft family, a new third-party payload
  integration, and an acceptance event due inside one quarter. The product should start as an
  on-prem or edge-deployable software layer that ingests flight logs, detections, operator labels,
  and mission context to generate auditable detection envelopes, search-mode recommendations, and
  customer-ready release artifacts for one sensor-airframe configuration. The strategic choice is
  to win a narrow beachhead around one live payload integration milestone rather than sell a
  broader autonomy stack, because the proof point is concrete: fewer days from integration flight
  to approved mission profile. GTM, pricing, and implementation should all revolve around that same
  event: founder-led sales to VP Programs or mission-systems leaders, a paid first deployment tied
  to one payload release, and annual pricing per active platform family with expansion by payload
  and aircraft family. The company can win if it remains a neutral approval layer across sensor
  vendors and OEMs while building a proprietary corpus of labeled field performance and partner-
  specific evidence templates. The biggest disconfirming risk is that buyers may extend internal
  scripts or adjacent vendors such as Shield AI, Palantir, NI, or Wind River instead of funding a
  standalone envelope layer. The inputs also do not identify the exact budget owner or government
  acceptance standard for the first programs, so those gaps must be closed before scaling sales and
  capture hiring.
problem:
  - >-
    ISR drone OEMs can buy better edge-sensing payloads faster than they can prove where those
    payloads are reliable across altitude, clutter, weather, EW, and comms conditions.
  - >-
    Each payload integration or firmware change forces flight-test and autonomy teams back into
    spreadsheets, custom Python analysis, and manual evidence assembly before a customer exercise or
    acceptance review.
  - >-
    Existing autonomy runtimes, data layers, and test tooling store telemetry or run simulations,
    but they do not produce a living mission-approved detection envelope for one sensor-airframe
    configuration.
solution:
  - >-
    Ingest exported flight logs, detections, operator adjudication, telemetry, and environmental
    context for one payload and platform family, then model where autonomous search, cueing, or
    tracking modes are approved to operate.
  - >-
    Generate an auditable envelope, release deltas, and a customer-ready evidence package that
    tells program teams which search modes are approved, where confidence drops, and what additional
    test data is required.
  - >-
    Deploy first as an on-prem or edge workflow overlay so the customer can keep existing sensors,
    autopilots, HIL tooling, and security boundaries while compressing the manual approval loop.
whyWeWin:
  - >-
    The wedge is tied to a budgeted milestone with visible ROI: fewer repeat flights and faster
    time from payload integration to approved mission profile.
  - >-
    A neutral envelope layer is easier for OEMs to adopt than a full-stack autonomy replacement
    when they already run mixed sensors, aircraft, and incumbent software.
  - >-
    Every deployment can compound reusable detection baselines, release-delta benchmarks, and
    approval templates that generic test-data systems do not naturally accumulate.
  - >-
    Allied defense buyers increasingly want traceable, governable AI evidence, which favors a
    workflow built around auditable release decisions rather than raw model claims.
strategicChoices:
  beachhead: >-
    Detection-envelope validation for one active U.S. or Australian ISR drone program adding a new
    long-range third-party sensing payload to a single Group 2 or Group 3 aircraft family.
  wedgeRationale: >-
    This beachhead has the clearest pain, buyer, and proof loop: a payload integration milestone or
    exercise forces the OEM to prove where a new sensor can be trusted, and success is measured in
    days saved, repeat flights avoided, and an acceptance packet cleared faster than the status quo.
    Broader autonomy, data-fusion, or mission-planning products would require displacing incumbents
    before the company has customer evidence.
  sequencingRationale: >-
    Product starts with batch ingest, envelope generation, and evidence packaging for one
    sensor-airframe pair because those are the minimum capabilities needed to win the first
    milestone. GTM stays founder-led and services-assisted until the team proves that two or three
    deployment patterns repeat across OEMs. Hiring follows that order: core ingest and assurance
    engineering first, forward deployment and security second, and scaled capture only after the
    first production references exist.
  notYet:
    - Full autonomy runtime, C2, or mission-planning replacement
    - Generic commercial robotics sensing workflows outside defense
    - Multi-domain expansion into maritime or counter-UAS before three ISR logos are live
    - Real-time in-mission control or sensor tasking before the post-flight approval loop is repeatable
    - Non-allied geographies where export controls and support complexity rise early
market:
  tam: "$300.0M estimated TAM: about 400 addressable ISR, EW, and autonomy platform-family or sensor-integration programs across the U.S., Five Eyes, and NATO at roughly $750k annual software plus deployment spend."
  sam: "$45.0M estimated SAM: about 60 near-term U.S., Australian, and UK ISR platform-family programs with active sensor refresh or payload integration needs at roughly $750k average contract value."
  som: "$5.6M estimated year-3 SOM: about 8 live programs at roughly $700k each after landing on one platform family and expanding through OEM and payload partners."
  segments:
    - "Primary: 100-1,000 person ISR drone OEMs and autonomy integrators with one active Group 2 or Group 3 aircraft family and a near-term payload integration milestone."
    - "Secondary: sensor vendors and adjacent defense autonomy programs that need the same envelope-approval workflow after the ISR beachhead proves repeatable."
  buyingProcess: >-
    The motion should begin with a founder-led workflow audit 60-120 days before an exercise,
    payload release, or customer evaluation, usually through the autonomy, flight-test, or
    mission-systems lead. The economic decision then moves to the VP Programs, GM of autonomous
    systems, or director of mission systems, who can fund a paid deployment against milestone-risk
    reduction and convert to an annual program contract after the first envelope is used in a real
    release decision.
product:
  mvp: >-
    MVP covers secure batch ingest for one sensor-airframe pair, envelope generation across mission
    conditions, release-delta comparison, and export of an approval-ready evidence packet for one
    active program. It should work first from exported logs and labeled detections rather than deep
    live integration into every incumbent system.
  sixMonth: >-
    Ship one production-grade on-prem deployment, prebuilt connectors for the highest-value
    telemetry and detection exports in the pipeline, role-based review workflows, and side-by-side
    comparison of envelope changes across payload or firmware revisions.
  twelveMonth: >-
    Add reusable approval templates by buyer pattern, threshold and override policy controls,
    benchmarking across multiple releases, and expansion support for a second payload or aircraft
    family inside the same OEM.
  twentyFourMonth: >-
    Expand into multi-program portfolio visibility, cross-platform envelope benchmarking, and
    adjacent defense sensing workflows such as maritime autonomy or counter-UAS once the ISR
    release-governance loop is proven.
  keyBets:
    - Customers will fund a dedicated envelope-approval product without requiring the startup to replace autonomy or test infrastructure.
    - Exported or sanitized flight data is enough to prove ROI before classified integrations are necessary.
    - The first two or three OEM deployments will share enough workflow structure to keep implementation repeatable.
    - Sensor vendors will co-sell once the product shortens acceptance time across multiple airframes.
gtm:
  wedge: >-
    Sell a paid deployment for one live payload integration milestone, positioning the product as
    the fastest way to turn raw detections into an auditable mission-approved envelope without
    changing the customer's sensor, autopilot, or test stack.
  channels:
    - Founder-led outbound to VP Programs, mission-systems leaders, and autonomy or flight-test leads at ISR drone OEMs
    - Co-selling with sensing payload vendors already integrating across AeroVironment, TEKEVER, Insitu, and similar OEM environments
    - Defense integrators and innovation channels that reward open interfaces and fast validation on active programs
  funnelTargets: "Target-account outreach -> qualified milestone audit 15-25%; qualified audit -> paid design partner 30-40%; paid design partner -> annual production contract 50%+; production account -> second payload or aircraft-family expansion 30%+ within 12 months."
  pricing: >-
    Price per active platform family and program year, not per seat: an initial 8-12 week paid
    design partner at roughly $75k-$150k for deployment and evidence setup, converting into a
    $400k-$800k annual license for one active platform family plus integration fees for additional
    payloads or aircraft families. This matches the cost of milestone delay better than IT-style
    seat pricing and stays consistent with the researched ~$750k ACV envelope.
businessModel:
  revenueStreams:
    - Paid design-partner deployment for one payload integration milestone
    - Annual software subscription per active platform family or program
    - Integration and secure-deployment fees for new sensors, aircraft families, or environments
    - Premium benchmarking and cross-release reporting modules after production adoption
  unitOfValue: Active platform-family program-year
  targetGrossMarginPct: 70
  expansionLevers:
    - Additional payloads and firmware release cycles within the same aircraft family
    - Additional aircraft families or programs inside the same OEM or integrator
    - Co-sold deployments with sensing payload vendors across multiple OEMs
    - Adjacent defense sensing workflows after the ISR wedge proves repeatable
strategyMap:
  northStarMetric: Production programs using the platform for recurring payload or release-approval cycles
  inputMetrics:
    - Qualified milestone audits per quarter
    - Days from integration flight to approved mission profile
    - Paid design partner to annual production conversion rate
    - Percentage of releases using a previously generated envelope baseline
    - Average deployment time to first usable evidence packet
  moatsToBuild:
    - Cross-program corpus of labeled detection performance by environment, payload, and airframe
    - Partner-specific approval templates and release-governance workflows
    - Integration layer into telemetry, detection, and test-data exports already used by OEM teams
  killCriteria:
    - Fewer than 3 paid design partners in the first 12 months of focused selling
    - Paid design partner to annual production conversion below 40% after the first 5 deployments
    - Median time from kickoff to first usable evidence packet stays above 6 weeks after the third implementation
    - No customer accepts vendor-generated envelope evidence in a real release or acceptance decision by month 18
  mermaid: |
    flowchart LR
      Wedge[Payload integration wedge] --> MVP[Envelope generation MVP]
      MVP --> Proof[Faster approved mission profiles]
      Proof --> Expansion[More payloads, airframes, and programs]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong wedge conviction, with medium confidence until budget ownership and secure deployment repeatability are proven.
    whyBelieve: The company targets an urgent, narrow approval workflow created by real cross-OEM sensor integrations and rising demand for auditable autonomy evidence.
    whyDoubt: The standalone category is modest and adjacent incumbents or internal teams may absorb the workflow before a new system of record is funded.
    nextDiligence: Win two paid design partners tied to live payload milestones and show one converts into an annual production contract after a measurable cycle-time reduction.
  firstCustomer:
    title: VP Programs at a Group 2 or Group 3 ISR drone OEM
    profile: >-
      A 100-1,000 person U.S. or Australian OEM or integrator running one active defense ISR
      contract, integrating a new third-party sensing payload onto a single aircraft family, and
      preparing for an exercise or customer evaluation inside 120 days.
    trigger: A payload integration milestone, firmware release, or customer acceptance event that forces the team to prove where the new sensor can be trusted in contested or degraded conditions.
    buyer: VP Programs or director of mission systems
    initialContract: >-
      An 8-12 week paid design partner at roughly $75k-$150k for one platform family and one
      release milestone, converting into a $400k-$800k annual contract plus integration fees if the
      first deployment reduces time to approved mission profile by at least 30% or avoids a repeat
      flight cycle.
  mustBeTrue:
    - At least 3 of the first 10 target OEMs confirm the first deal can be funded from program or milestone-risk budgets rather than pure services spend.
    - The first deployment reduces days from payload integration flight to approved mission profile by at least 30%.
    - Exported or sanitized data is sufficient for the first production-worthy envelope at two accounts.
    - One government, prime, or internal review board accepts the startup's envelope evidence in a real release decision at two separate programs.
    - More than 60% of qualified opportunities fit the first two deployment patterns without bespoke integrations.
  diligenceQuestions:
    - Which exact budget owner signs the first contract: VP Programs, mission systems, flight test, or a services line?
    - What minimum data and deployment architecture are required to prove value without moving logs across domains?
    - Will OEMs accept a neutral third-party approval artifact, or must a prime or government test center reissue the result?
    - Which two telemetry or detection export formats cover most of the first-year pipeline?
    - Can sensor vendors become a real distribution channel, or do they prefer to keep acceptance workflows services-heavy?
operatingAssumptions:
  - assumption: Program or milestone-risk budgets can fund the first deployment inside one quarter.
    basis: research.yaml
    validationTest: Interview 10 target OEM or integrator accounts and secure at least 2 paid deployments without waiting for a new procurement vehicle.
    decisionImpact: If false, the company must sell through larger primes, lower the ACV, or accept much longer sales cycles.
  - assumption: On-prem or edge deployment with exported logs is enough to deliver the first approval artifact.
    basis: research.yaml
    validationTest: Deliver one pilot using sanitized or exportable data and confirm the customer uses the result in a real release review.
    decisionImpact: If false, security engineering and capital needs rise materially and the beachhead narrows to a smaller set of cleared programs.
  - assumption: Flight logs, detections, and operator labels provide enough signal to model a credible first envelope without deeper runtime instrumentation.
    basis: operator judgment
    validationTest: Build a manual-envelope prototype from one design partner's historical test set and compare its recommendations against the team's existing release decisions.
    decisionImpact: If false, MVP scope expands into heavier integrations and the first proof cycle slows.
  - assumption: A $400k-$800k annual contract is credible because avoiding one delayed exercise or repeat flight is worth more than the software cost.
    basis: idea.yaml
    validationTest: Get two signed paid design partners to pre-negotiate annual pricing within or above the proposed band after milestone success.
    decisionImpact: If false, the company becomes a lower-ACV tooling business and must shrink burn or pursue a different buyer.
  - assumption: Sensor vendors will co-sell once the platform shortens acceptance across multiple OEMs.
    basis: research.yaml
    validationTest: Secure one payload-vendor partner that introduces the startup into at least 3 qualified OEM opportunities within 12 months.
    decisionImpact: If false, pipeline generation remains founder-led and the company should delay channel hiring.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12-15 autonomy, flight-test, and mission-systems leaders at target ISR OEMs and collect current release artifacts for one recent payload integration.
    hypothesis: The first buyer will pay to compress approval cycles and evidence assembly, not just to store telemetry.
    successMetric: At least 8 interviews rank approval delay or repeat-flight risk as a top-3 pain and 3 accounts share a real milestone artifact for redlining.
    owner: CEO
  - horizon: 0–90 days
    experiment: Produce one manual envelope and draft approval packet from historical test data behind the scenes.
    hypothesis: Buyers will judge value by decision-readiness of the output before full automation is complete.
    successMetric: At least 2 target accounts agree the packet is materially better than current spreadsheets and commit to a paid design-partner timeline.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Build the first secure batch-ingest connectors for one telemetry export path and one detection-label workflow already present in the pipeline.
    hypothesis: Two narrow connector paths can cover most early deployments without custom platform replacement.
    successMetric: More than 60% of qualified opportunities fit one of the two paths and onboarding stays under 20 engineer-days per account.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run the first paid design partner against a live payload integration milestone.
    hypothesis: The product can shorten time to approved mission profile by at least 30% on a real program.
    successMetric: Customer confirms a measurable cycle-time reduction or avoided repeat-flight event and requests an annual production proposal within 30 days.
    owner: Forward deployment lead
  - horizon: 180–360 days
    experiment: Deliver a second on-prem deployment at a different OEM using the same core ingest and review workflow.
    hypothesis: The beachhead is repeatable enough to support software-like gross margins rather than bespoke services.
    successMetric: Second deployment goes live in 4 weeks or less with less than 25% custom code beyond reusable connectors and templates.
    owner: Security or platform engineer
  - horizon: 180–540 days
    experiment: Launch one co-sell motion with a payload vendor already integrated across multiple OEMs.
    hypothesis: Vendor distribution can reduce CAC and accelerate second-program expansion after the first production reference.
    successMetric: One vendor partner generates at least 3 qualified introductions and 1 paid deployment inside 12 months.
    owner: CEO
operations:
  - Air-gapped or on-prem deployment package with signed evidence exports and no raw-data dependency on public cloud
  - Standard data-ingest and operator-labeling workflow for each new payload integration
  - Weekly release-review cadence with autonomy, flight-test, and program stakeholders during active milestones
  - Integration playbooks with sensor vendors, OEM telemetry owners, and test-data tooling already inside the workflow
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Own ingest, envelope modeling, and the first two reusable connectors needed to prove the wedge.
  - role: Forward deployment lead
    startTiming: Month 1-3
    rationale: Run customer implementations, translate flight-test workflows into product requirements, and protect repeatability.
  - role: Applied perception or assurance engineer
    startTiming: Month 4-6
    rationale: Improve envelope quality, release-delta analysis, and confidence-threshold logic from early field data.
  - role: Security or platform engineer
    startTiming: Month 6-9
    rationale: Harden on-prem deployment, audit logging, and controlled-environment packaging required for defense adoption.
  - role: Defense capture or program lead
    startTiming: Month 9-12
    rationale: Turn founder-led selling into a repeatable pipeline only after the first production reference and partner motion exist.
milestones:
  - horizon: 0–12 months
    items:
      - Close 2 paid design partners tied to live payload integration milestones
      - Convert at least 1 design partner into a $400k+ annual production contract
      - Prove median time from integration flight to approved mission profile improves by at least 30%
      - Ship a repeatable on-prem deployment package and first two reusable connectors
  - horizon: 12–24 months
    items:
      - Reach 4-5 production programs across at least 3 OEM logos
      - Land one payload-vendor co-sell relationship that generates qualified pipeline
      - Expand at least 2 customers to a second payload or aircraft family
      - Publish internal benchmark dashboards for cross-release envelope comparisons
  - horizon: 24–36 months
    items:
      - Reach 8 production programs, roughly consistent with researched year-3 SOM
      - Add portfolio visibility across multiple programs inside one OEM
      - Enter one adjacent sensing workflow such as maritime autonomy or counter-UAS from an existing customer base
      - Demonstrate a reusable approval-template library across U.S., Australian, and UK buyer patterns
risks:
  - risk: Budget ownership stays ambiguous across flight test, autonomy, and program teams.
    likelihood: High
    impact: High
    mitigation: Sell against one named milestone with a VP Programs or mission-systems buyer and require a clear success metric before starting deployment.
  - risk: Secure deployment and cross-domain restrictions slow time to value.
    likelihood: High
    impact: High
    mitigation: Start with on-prem batch ingest, sanitized data, and signed evidence exports before attempting deeper live integrations.
  - risk: Adjacent incumbents or internal teams extend existing tooling enough to block a standalone purchase.
    likelihood: Medium
    impact: High
    mitigation: Win on neutral approval artifacts, faster cycle time, and cross-vendor reuse rather than generic analytics features.
  - risk: Implementation remains too bespoke to sustain software-like margins.
    likelihood: Medium
    impact: High
    mitigation: Narrow the beachhead to one platform family, standardize the first two connectors, and decline feature work that does not improve reuse.
  - risk: Government or prime reviewers refuse to rely on vendor-generated envelope evidence.
    likelihood: Medium
    impact: High
    mitigation: Align outputs to existing review workflows early and use design partners to validate which artifacts can be accepted without rework.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months of runway should fund the core ingest and assurance product, two secure
    deployment patterns, 2-3 paid design partners, the first annual production conversion, and the
    small engineering and forward-deployment team needed to prove repeatable defense adoption before
    scaled go-to-market hiring.
