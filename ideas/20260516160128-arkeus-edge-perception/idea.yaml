topRisks:
  - name: OEM insourcing risk
    description: Large drone OEMs or sensor vendors may try to build this workflow internally once they see the pain clearly.
    mitigation: Start with cross-vendor envelope modeling and customer acceptance workflows that are hardest to recreate inside one product team.
  - name: Secure data friction
    description: Defense programs may resist adoption if test data cannot leave controlled environments or if integrations require long security reviews.
    mitigation: Offer edge and on-prem deployment first, support batch imports before live integrations, and win on unclassified or exportable test workflows initially.
  - name: Budget ownership ambiguity
    description: Perception validation spans flight test, autonomy engineering, and program delivery, so the startup could get stuck between stakeholders.
    mitigation: Sell against a specific acceptance milestone with one economic buyer and quantify ROI as fewer repeat flights and faster mission-profile approval.
