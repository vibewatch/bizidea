problem: >-
  ISR drone OEMs can now buy far better edge-sensing payloads, but they still
  prove performance through fragmented range reports, manual flight-log review,
  and one-off integration services. Each new sensor or firmware revision changes
  where detections are trustworthy across altitude, clutter, weather, and
  comms conditions. Without a system that turns those test results into
  mission-approved operating envelopes, programs delay exercises, overconstrain
  autonomy, or ship risky configurations to operators.
targetUser:
  primary: >-
    Head of autonomy or perception engineering at a 100-1,000 person ISR drone
    OEM integrating a new third-party sensing payload onto one Group 2 or Group
    3 UAS family for a U.S. Department of Defense or Australian Department of
    Defence program
  secondary: >-
    Flight-test or evaluation lead responsible for proving detection
    performance, tuning mission profiles, and assembling evidence for customer
    acceptance
  buyer: >-
    VP Programs, GM of autonomous systems, or director of mission systems at the
    drone OEM or integrator
startupThesis:
  nonObviousInsight: >-
    As edge sensors become dramatically better and get integrated across more
    autonomous platforms, the scarce capability is no longer raw detection. It
    is converting noisy field performance into an auditable detection envelope
    that tells commanders exactly when the autonomy stack can trust the sensor.
    The company that owns that envelope-definition layer becomes a control point
    between sensor vendors, airframe OEMs, and defense buyers.
  beachhead: >-
    Detection-envelope validation for ISR drone OEMs adding a new long-range
    edge-sensing payload to one active U.S. or Australian defense surveillance
    program
  wedge: >-
    An edge-deployable software layer that ingests flight logs, detections,
    operator labels, and environmental context to generate mission-approved
    sensing envelopes, search-mode recommendations, and customer acceptance
    evidence for one platform family
  whyNowCatalyst: >-
    Arkeus's live deployments, eight-times-farther detection claim, named OEM
    integrations, and expansion funding show perception capability is outrunning
    the tooling used to validate where autonomous systems can safely rely on it.
  ventureScalePath: >-
    Start with one ISR platform family, then expand into every defense program
    that adds third-party sensing, counter-UAS perception, maritime autonomy,
    and later dual-use robotics fleets that need governed sensor-performance
    envelopes across changing environments.
solution: >-
  Detection Envelope OS sits between test operations, autonomy software, and
  customer acceptance. It ingests sensor outputs, GPS and platform telemetry,
  operator adjudication, and mission context, then models where detection
  performance is strong enough to enable autonomous search, cueing, or tracking.
  The product produces a living operating envelope for each sensor-platform
  configuration, plus the evidence package a program team needs for a flight
  review or customer milestone. Instead of re-running weeks of manual analysis
  after every payload tweak, teams get a governed release decision on which
  modes are approved, where confidence drops, and what further test data is
  required. The first use case is narrow but painful: shortening the time
  between a new payload integration flight and an approved mission profile for
  one ISR contract.
