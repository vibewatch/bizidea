scenarios:
  downside:
    description: Budget ownership stays messy, secure deployment remains services-heavy, and the company exits Y3 with only six live programs.
    y3RevenueK: 3225.0
    y3EbitdaK: -515.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - Exit Q4Y2 at 4 production programs and Q4Y3 at 6 instead of 8.
      - Hold Y3 blended annual ARPU near $600K instead of $700K because expansion into second payloads slips.
      - Keep mature gross margin near 65% because more deployment work stays bespoke.
  base:
    description: Two paid design partners in Y1 become five production programs by Q4Y2 and eight by Q4Y3 as one vendor channel starts contributing qualified pipeline.
    y3RevenueK: 4583.75
    y3EbitdaK: 59.11
    cashLowPointK: 892.57
    keyAssumptionChanges:
      - Matches A4-A19 with 3 active paying programs by M12, 5 by Q4Y2, and 8 by Q4Y3.
      - Uses the $100K design-partner to $700K mature-program pricing ladder in A7.
      - Gross margin ramps to the 70% target only once deployment packaging is standardized.
  upside:
    description: Payload-vendor introductions accelerate closes, second-program expansions attach earlier, and the company exits Y3 with ten live programs at slightly better margin.
    y3RevenueK: 5610.0
    y3EbitdaK: 820.0
    cashLowPointK: 1150.0
    keyAssumptionChanges:
      - Exit Q4Y2 at 6 production programs and Q4Y3 at 10 instead of 8.
      - Lift blended Y3 annual ARPU to roughly $725K through faster second-payload expansion.
      - Reach about 72% steady-state gross margin as partner-led deployment absorbs more onboarding work.
