  - variable: ARPU
    downsideCase: $620K blended annual revenue per active program in Y3
    baseCase: $700K blended annual revenue per active program in Y3
    upsideCase: $750K blended annual revenue per active program in Y3
    y3RevenueImpactK: -480.0
    cashImpactK: -340.0
  - variable: CAC
    downsideCase: $220K CAC if every program requires bespoke capture and long security review
    baseCase: $150K CAC
    upsideCase: $120K CAC with payload-vendor referrals and repeat buyer patterns
    y3RevenueImpactK: -90.0
    cashImpactK: -280.0
  - variable: churn
    downsideCase: 2.5% monthly churn if design partners do not become embedded release workflows
    baseCase: 1.5% monthly churn
    upsideCase: 1.0% monthly churn after approval templates become sticky
    y3RevenueImpactK: -320.0
    cashImpactK: -230.0
  - variable: sales cycle
    downsideCase: 9-12 months from audit to production contract
    baseCase: 6-9 months blended cycle
    upsideCase: 4-6 months with qualified partner-sourced intros
    y3RevenueImpactK: -650.0
    cashImpactK: -420.0
  - variable: gross margin
    downsideCase: 65% steady-state gross margin because forward deployment remains labor-heavy
    baseCase: 70% steady-state gross margin
    upsideCase: 72% steady-state gross margin once deployments reuse secure packaging and evidence templates
    y3RevenueImpactK: 0.0
    cashImpactK: -260.0
  - variable: hiring pace
    downsideCase: Add GTM and G&A hires two quarters earlier than modeled
    baseCase: Follow the A13 hiring sequence
    upsideCase: Delay one non-customer-facing hire until after the Q4Y2 milestone
    y3RevenueImpactK: -60.0
    cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetPrograms --> PaidDesignPartners
      PaidDesignPartners --> ProductionPrograms
      PayloadVendorIntroductions --> ProductionPrograms
      ProductionPrograms --> ExpansionRevenue
      ExpansionRevenue --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from two paid design partners in Y1, then five production programs by Q4Y2 and eight by Q4Y3 at a blended ACV ramp from roughly $300K to $700K.
  - checkName: Must go right
    finding: The company must prove that on-prem batch ingest and reusable evidence packets cut approval-cycle time enough for design partners to convert into annual program budgets.
  - checkName: Model breaks if
    finding: The downside case shows the model losing its cash cushion if buyers treat deployments as bespoke services and production conversion slips below the planned pace.
  - checkName: Next-round proof
    finding: A credible next round is supported by exiting Q4Y2 with 4-5 production programs, at least one working payload-vendor channel, and visible evidence that deployments are repeatable across OEMs.
sanityChecks:
  ruleOf40: Y3 growth 163.53% + EBITDA margin 1.29% = 164.82%
  burnMultiple: Y2 burn multiple is about 0.45x ($1.0M EBITDA burn on roughly $2.2M net new ARR from about $0.7M to about $2.9M exit ARR); Y3 turns modestly EBITDA-positive.
  revenuePerFte: $352.6K Y3 revenue per Q4Y3 FTE (benchmark $200-400K workflow software)
  flags:
    - The model assumes only eight live programs by Q4Y3, so any single-program delay or loss has an outsized effect on revenue concentration.
    - Gross margin reaches 70% only if secure deployment, labeling, and evidence packaging become repeatable rather than services-heavy for each new payload.
    - Budget ownership remains the biggest commercial risk; if VP Programs cannot fund the first annual contract directly, the sales cycle sensitivity becomes the main cash-risk driver.
    - Cash flow is approximated from EBITDA and excludes deferred revenue timing, capex, and working-capital swings, so the model is for planning rather than treasury precision.
