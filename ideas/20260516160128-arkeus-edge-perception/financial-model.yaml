slug: detection-envelope-os
date: '2026-05-16'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: month
    source: "[BP date 2026-05-16] The model starts in the first full month after the dated business plan."
  - id: A2
    name: Opening cash from seed round
    value: '3000'
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $3-5M] Base case uses a $3.0M seed at the low end of the stated range because the plan stays lean and reaches the Q4Y2 milestone plus six months of buffer."
  - id: A3
    name: Starting customers
    value: '0'
    unit: active paying programs
    source: "[BP product.mvp + BP milestones 0-12 months] The company starts pre-revenue before the first paid design-partner deployment."
  - id: A4
    name: Y1 customer ramp
    value: "M6 first paid design partner, M10 second paid design partner, M12 first production conversion; 3 active paying programs by M12"
    unit: active paying programs
    source: "[BP milestones 0-12 months] Anchored to 2 paid design partners and at least 1 $400K+ production conversion inside year 1; monthly timing is a startup-finance interpolation."
  - id: A5
    name: Y2 production ramp
    value: "Q1Y2 3, Q2Y2 4, Q3Y2 4, Q4Y2 5 active programs"
    unit: active paying programs
    source: "[BP milestones 12-24 months] Directly anchored to the 4-5 production-program target by month 24."
  - id: A6
    name: Y3 production ramp
    value: "Q1Y3 6, Q2Y3 7, Q3Y3 8, Q4Y3 8 active programs"
    unit: active paying programs
    source: "[BP milestones 24-36 months + Research market.som] Reaches the explicit 8-program year-3 SOM endpoint."
  - id: A7
    name: Pricing ladder
    value: "Y1 design partner $100K annualized equivalent; Y1 exit blend $220K; Y2 blended ACV $300K to $575K; Y3 blended ACV $620K to $700K"
    unit: annualK per active program
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] Uses the midpoint of the $75K-$150K design-partner range, then ramps toward the researched ~$700K live-program value by Y3."
  - id: A8
    name: Revenue recognition method
    value: "average active programs in period x blended annualized ARPU"
    unit: formula
    source: "[Derived from A4-A7] Monthly revenue equals average monthly active programs x annualized ARPU / 12; quarterly revenue equals average quarterly active programs x annualized ARPU / 4."
  - id: A9
    name: Gross margin ramp
    value: "Y1 55%-60%, Y2 63%-68%, Y3 69%-70%"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70] Early deployments carry forward-deployment and secure-packaging drag before the playbook is standardized."
  - id: A10
    name: Monthly churn for unit economics
    value: '1.5'
    unit: percent
    source: "[Startup-finance heuristic for sticky defense workflow software] Renewal risk should be lower than generic SaaS once a release-governance artifact is embedded, but still above mature-defense-program retention until repeatability is proven."
  - id: A11
    name: Steady-state CAC
    value: '150'
    unit: USDK per new program
    source: "[BP gtm.channels + BP buyingProcess + Research distributionChannels] Founder-led defense selling, travel, and security review overhead justify six-figure CAC until payload-vendor introductions reduce sourcing cost."
  - id: A12
    name: Loaded salary bands
    value: "Founder/Exec 180; Engineering 190; Forward Deployment 165; Applied Assurance 200; Security/Platform 210; GTM/Capture 220; Product/Benchmark 180; Program Success/Ops 160; G&A/Finance 140"
    unit: annualK per FTE
    source: "[BP team + startup-finance heuristic] Uses lean U.S./allied defense-software cash compensation plus payroll burden."
  - id: A13
    name: Hiring sequence
    value: "Founding engineer M1; forward deployment M4; applied assurance M6; security/platform M10; capture/program M13; product/benchmark M16; second engineer M19; program success M22; sales/partnerships M27; second assurance M30; third engineer M33; G&A M35"
    unit: timing
    source: "[BP team + BP strategicChoices.sequencingRationale] Engineering, deployment, and security precede scaled GTM; later hires are smooth-ramp extensions once production references exist."
  - id: A14
    name: Headcount endpoints
    value: "5 FTE by Q4Y1, 9 FTE by Q4Y2, 13 FTE by Q4Y3"
    unit: FTE
    source: "[BP team + BP fundingAsk.useOfFundsSummary] Keeps the company lean through proof of repeatability before broader capture hiring."
  - id: A15
    name: Non-payroll sales and marketing ramp
    value: "Y1 $8K-$18K per month; Y2 $60K-$96K per quarter; Y3 $108K-$150K per quarter"
    unit: USDK
    source: "[BP gtm.channels + startup-finance heuristic] Covers founder-led travel, account development, partner work, and targeted defense events rather than broad demand generation."
  - id: A16
    name: Non-payroll R&D ramp
    value: "Y1 $10K-$20K per month; Y2 $54K-$72K per quarter; Y3 $78K-$96K per quarter"
    unit: USDK
    source: "[BP product roadmap + BP operations] Covers cloud tooling, deployment packaging, telemetry connectors, and release-governance productization."
  - id: A17
    name: Non-payroll G&A ramp
    value: "Y1 $7K-$12K per month; Y2 $30K-$39K per quarter; Y3 $42K-$54K per quarter"
    unit: USDK
    source: "[BP operations + startup-finance heuristic] Covers legal, insurance, compliance, contracting, and finance overhead."
  - id: A18
    name: Funding sizing rule
    value: "Raise enough to reach the Q4Y2 milestone and still hold roughly six months of operating buffer into Y3"
    unit: policy
    source: "[BP fundingAsk runwayMonths 18 + model requirement] The base case extends the stated raise to a milestone-plus-buffer rule rather than a bare 18-month bridge."
  - id: A19
    name: Cash flow simplification
    value: "ending cash equals opening cash plus cumulative EBITDA"
    unit: formula
    source: "[Startup-finance heuristic] Assumes minimal capex, debt, taxes, and working-capital distortion for an asset-light software company."
