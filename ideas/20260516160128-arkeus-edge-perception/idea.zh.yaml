topRisks:
  - name: OEM 内部自研风险
    description: 一旦大型无人机 OEM 或传感器厂商把痛点看透，可能会尝试把这套流程直接内建。
    mitigation: 先拿下跨厂商包线建模和客户验收流程，这恰恰是单一产品团队最难在内部复制出来的部分。
  - name: 安全数据摩擦
    description: 如果测试数据不能离开受控环境，或集成要经过很长的安全审查，防务项目可能会抗拒采用。
    mitigation: 先主打边缘和本地部署，先支持批量导入再谈实时集成，并优先从非涉密或可出口的测试流程切入。
  - name: 预算归属模糊
    description: 感知验证横跨飞测、自主工程和项目交付，创业公司很容易被卡在多个利益相关方之间。
    mitigation: 围绕一个明确的验收里程碑去卖，锁定一个经济买家，并把 ROI 量化成更少的重复飞行和更快的任务剖面获批。
