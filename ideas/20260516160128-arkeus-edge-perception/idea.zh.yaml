jobsToBeDone:
  - job: >-
      当我们把新感知载荷挂到某个 ISR 机型家族上时，帮自主团队尽快证明这颗传感器在哪些场景里可靠到足以支撑自主搜索和指引，这样下一次演训或客户里程碑就能更快过关。
    currentAlternative: >-
      在电子表格、定制脚本、幻灯片和供应商测试报告之间手工做靶场分析
    successMetric: 从集成飞行到任务剖面获批的天数
  - job: >-
      当客户追问新载荷在杂波、高度和退化条件下的表现时，帮飞测团队拿出一份经得起审计的验收包，省掉下一轮昂贵的重复飞行。
    currentAlternative: >-
      靠遥测导出和分析师判断临时拼证据包
    successMetric: 组出客户可直接使用的感知证据包所需时间
