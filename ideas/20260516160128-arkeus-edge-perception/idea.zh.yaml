problem: >-
  ISR 无人机 OEM 现在能买到强得多的边缘感知载荷，但验证性能的方式仍然是零散的靶场报告、手工飞行日志复盘和一次一做的集成服务。每换一个新传感器、每迭代一版固件，探测在不同高度、杂波、天气和通信条件下到底哪里还能信，都会变。要是没有一套系统把这些测试结果收束成任务获批的运行包线，项目就只能推迟演训、把自主能力卡得更死，或者把高风险配置直接交给一线操作员。
targetUser:
  primary: >-
    一家 100–1,000 人规模的 ISR 无人机 OEM 里，负责自主或感知工程的负责人；他们正把第三方新型感知载荷集成到某个 Group 2 或 Group 3 UAS 平台家族上，服务于美国国防部或澳大利亚国防部项目。
  secondary: >-
    负责证明探测性能、调参任务剖面，并整理客户验收证据的飞测或评估负责人。
  buyer: >-
    无人机 OEM 或系统集成商里的 VP Programs、自治系统 GM，或 mission systems 总监。
startupThesis:
  nonObviousInsight: >-
    当边缘传感器性能大幅提升，并开始挂到越来越多的自主平台上，真正稀缺的能力就不再是“能不能探测到”，而是能不能把嘈杂的实地表现收束成一条可审计的探测包线，让指挥员清楚知道自治栈在什么条件下可以信这颗传感器。谁拿下这层包线定义层，谁就能卡在传感器供应商、机体 OEM 和防务买家之间。
  beachhead: >-
    面向正在为某个活跃的美国或澳大利亚防务监视项目引入新型远程边缘感知载荷的 ISR 无人机 OEM，提供探测包线验证。
  wedge: >-
    一层可在边缘部署的软件，吃进飞行日志、探测结果、操作员标注和环境上下文，为单一平台家族产出任务获批的感知包线、搜索模式建议和客户验收证据。
  whyNowCatalyst: >-
    Arkeus 的实战部署、8 倍探测距离宣称、已点名的 OEM 集成，以及新增扩张资金都说明：感知能力的进步速度，已经把“验证自主系统到底能在什么条件下安全依赖它”的工具甩在后面。
  ventureScalePath: >-
    先从一个 ISR 平台家族切入，再扩到所有需要引入第三方感知能力的防务项目、反无人机感知、海事自主，最终延展到需要在变化环境里管理传感器性能包线的双用途机器人车队。
solution: >-
  探测包线 OS 夹在测试运营、自主软件和客户验收之间。它吃进传感器输出、GPS 与平台遥测、操作员裁定以及任务上下文，然后建模判断：在什么条件下，探测性能已经足够支持自主搜索、指引或跟踪。产品为每一种传感器—平台配置生成一份持续更新的运行包线，也产出项目团队在飞行评审或客户里程碑上需要提交的证据包。团队不用在每次载荷小改后再花几周做手工分析，而是直接拿到一份受控发布决策：哪些模式已获批、哪里信心下滑、还缺哪些测试数据。第一个用例很窄，但痛得很真：把一次新载荷集成飞行和一份 ISR 合同下任务剖面获批之间的时间明显压短。
goToMarketSeed:
  firstCustomer: >-
    一家美国或澳大利亚的 ISR 无人机 OEM：手上有一个活跃的防务合同，临近一次实战演训或验收节点，且正把新的第三方感知载荷集成到单一机型家族上。
  buyingTrigger: >-
    载荷集成里程碑、自主软件发布，或客户评估节点逼着团队证明：在受对抗或退化条件下，这颗新传感器到底能在哪些地方被信任。
  currentAlternative: >-
    临时拼出来的靶场报告、电子表格、定制 Python 分析、现有测试仪器工具，以及重服务的系统集成方案。
  switchingReason: >-
    这个切口不要求替换现有传感器或自动驾驶系统，而是把“从原始探测结果到作战批准”之间最手工的一步压缩掉，直接把原始探测转成可复用的探测包线和任务模式发布工件。
  pricingHypothesis: >-
    先按每个活跃平台家族收取年度项目许可证，并收取上手与数据集成费用；随后再按新增传感器载荷、机型家族或任务项目扩容收费。
whyNow:
  - point: 宣称的探测距离出现跃升，意味着项目方更需要一套工具，去证明这些性能到底在哪些实地条件下站得住。
    signalRefs: [探测距离出现了实质性跃升]
    sourceRefs: [2]
  - point: 已经落地到美国和澳大利亚防务组织，说明这早就是作战采用问题，不是路线图上的想象题。
    signalRefs: [感知能力已经进入实战防务流程]
    sourceRefs: [1]
  - point: 多家无人机 OEM 的已命名集成，意味着传感器厂商和平台团队现在都需要一种中立方法，去验证同一载荷在不同机体环境里的表现。
    signalRefs: [跨平台集成已经在当下发生]
    sourceRefs: [3]
  - point: 新一轮扩张资金和制造扩张表明，边缘感知正从定制项目走向更广泛的采购与重复部署。
    signalRefs: [预算正从试点转向规模化部署]
    sourceRefs: [1, 2]
  - point: 五角大楼对自主 ISR 的需求上升，让感知可靠性成了眼前就会卡项目的硬约束，也意味着预算可能马上被撬动。
    signalRefs: [自主 ISR 需求正在拉动传感器采用]
    sourceRefs: [3]
differentiator: >-
  通用测试数据平台能存遥测，但回答不了防务买家真正关心的问题：某个传感器和某架飞机的组合，到底在哪些场景里可靠到足以支撑自主使用。这个公司要拿下的，是从原始探测到任务获批包线、伙伴定制证据包，以及跨版本对比之间的翻译层。它的护城河一头来自跨环境的专有探测性能基线，另一头来自 OEM 团队的流程锁定——因为每次载荷更新和验收评审，他们都得过这一层。
