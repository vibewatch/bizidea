scenarios:
  downside:
    description: 预算归属依然混乱，安全部署继续是重服务模式，公司到 Y3 结束时只跑着 6 个真实项目。
    y3RevenueK: 3225.0
    y3EbitdaK: -515.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - Q4Y2 只做到 4 个量产项目，Q4Y3 只做到 6 个，而不是 8 个。
      - 由于第二个载荷的扩张推迟，Y3 混合年化 ARPU 维持在约 $600K，而不是 $700K。
      - 成熟毛利率停在约 65%，因为更多部署工作仍然需要定制化完成。
  base:
    description: Y1 的 2 个付费 design partner，到 Q4Y2 转成 5 个量产项目，到 Q4Y3 做到 8 个，同时 1 条厂商渠道开始贡献合格销售线索。
    y3RevenueK: 4583.75
    y3EbitdaK: 59.11
    cashLowPointK: 892.57
    keyAssumptionChanges:
      - 与 A4-A19 保持一致：M12 达到 3 个活跃付费项目，Q4Y2 达到 5 个，Q4Y3 达到 8 个。
      - 采用 A7 中从 $100K design-partner 到 $700K 成熟项目的定价阶梯。
      - 毛利率只有在部署打包标准化之后，才会真正爬到 70% 目标。
  upside:
    description: 载荷厂商引荐加快成交，第二项目扩张更早挂上，公司到 Y3 结束时做到 10 个真实项目，且毛利更高一些。
    y3RevenueK: 5610.0
    y3EbitdaK: 820.0
    cashLowPointK: 1150.0
    keyAssumptionChanges:
      - Q4Y2 做到 6 个量产项目，Q4Y3 做到 10 个，而不是 8 个。
      - 随着第二载荷扩张更快发生，Y3 混合年化 ARPU 抬到约 $725K。
      - 随着伙伴主导部署吸收更多上手工作，稳态毛利率达到约 72%。
sensitivity:
  - variable: ARPU
    downsideCase: Y3 每个活跃项目的混合年收入为 $620K
    baseCase: Y3 每个活跃项目的混合年收入为 $700K
    upsideCase: Y3 每个活跃项目的混合年收入为 $750K
    y3RevenueImpactK: -480.0
    cashImpactK: -340.0
  - variable: CAC
    downsideCase: 如果每个项目都要定制 capture 和长周期安全评审，CAC 升到 $220K
    baseCase: $150K CAC
    upsideCase: 借助载荷厂商转介和重复买家模式，CAC 降到 $120K
    y3RevenueImpactK: -90.0
    cashImpactK: -280.0
  - variable: churn
    downsideCase: 如果 design partner 没能嵌入发布工作流，月流失率升到 2.5%
    baseCase: 1.5% monthly churn
    upsideCase: 审批模板变得黏住流程后，月流失率降到 1.0%
    y3RevenueImpactK: -320.0
    cashImpactK: -230.0
  - variable: sales cycle
    downsideCase: 从 workflow audit 到量产合同要 9–12 个月
    baseCase: 混合销售周期为 6–9 个月
    upsideCase: 有合格伙伴引荐时，缩短到 4–6 个月
    y3RevenueImpactK: -650.0
    cashImpactK: -420.0
  - variable: gross margin
    downsideCase: 前线部署持续吃人力，稳态毛利率只有 65%
    baseCase: 70% steady-state gross margin
    upsideCase: 当部署复用安全打包和证据模板后，稳态毛利率达到 72%
    y3RevenueImpactK: 0.0
    cashImpactK: -260.0
  - variable: hiring pace
    downsideCase: GTM 和 G&A 招聘比模型早两个季度启动
    baseCase: 按 A13 的招聘顺序执行
    upsideCase: 把 1 个非客户前台岗位推迟到 Q4Y2 里程碑后再招
    y3RevenueImpactK: -60.0
    cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      TargetPrograms[目标项目] --> PaidDesignPartners[付费 design partners]
      PaidDesignPartners --> ProductionPrograms[量产项目]
      PayloadVendorIntroductions[载荷厂商引荐] --> ProductionPrograms
      ProductionPrograms --> ExpansionRevenue[扩张收入]
      ExpansionRevenue --> Revenue[收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的收入来自 Y1 的 2 个付费 design partner，随后到 Q4Y2 做到 5 个量产项目，到 Q4Y3 做到 8 个；混合 ACV 从约 $300K 爬到 $700K。
  - checkName: 必须跑通的事
    finding: 公司必须证明，本地批量接入和可复用证据包，确实能把审批周期压短到足以让 design partner 进入年度项目预算。
  - checkName: 模型会失效的情形
    finding: 下行情景说明，如果买家把部署继续当成定制服务，且量产转化速度低于计划，模型的现金缓冲就会被吃穿。
  - checkName: 下一轮融资证明点
    finding: 如果公司能在 Q4Y2 退出时做到 4–5 个量产项目、至少 1 条有效的载荷厂商渠道，并让市场看到部署能跨 OEM 重复，这就足以支撑下一轮融资叙事。
sanityChecks:
  ruleOf40: Y3 growth 163.53% + EBITDA margin 1.29% = 164.82%
  burnMultiple: Y2 burn multiple is about 0.45x ($1.0M EBITDA burn on roughly $2.2M net new ARR from about $0.7M to about $2.9M exit ARR); Y3 turns modestly EBITDA-positive.
  revenuePerFte: $352.6K Y3 revenue per Q4Y3 FTE (benchmark $200-400K workflow software)
  flags:
    - 模型假设到 Q4Y3 只有 8 个真实项目，因此任何单一项目的延期或流失，都会把收入集中度风险迅速放大。
    - 毛利率只有在安全部署、标注和证据打包真正可复制，而不是每接一个新载荷都重做一遍时，才可能爬到 70%。
    - 预算归属仍是最大的商业风险；如果 VP Programs 不能直接为首个年费合同买单，销售周期敏感性就会变成最主要的现金风险驱动。
    - 现金流是按 EBITDA 近似推算，未计入递延收入时点、capex 和营运资本波动，因此这个模型更适合规划，不适合做 treasury 精算。
