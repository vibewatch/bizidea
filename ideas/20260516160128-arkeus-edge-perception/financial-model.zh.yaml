slug: detection-envelope-os
date: '2026-05-16'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-06'
    unit: month
    source: "[BP date 2026-05-16] 模型从标注日期后的第一个完整月份开始。"
  - id: A2
    name: seed 轮期初现金
    value: '3000'
    unit: USDK
    source: "[BP fundingAsk targetFundingRangeUsd $3-5M] 基准情景采用区间下沿的 $3.0M seed 轮融资，因为按当前计划，公司能保持精简，并跑到 Q4Y2 里程碑后仍留出约 6 个月缓冲。"
  - id: A3
    name: 起始客户数
    value: '0'
    unit: active paying programs
    source: "[BP product.mvp + BP milestones 0-12 months] 公司从零收入起步，在拿到首个付费 design-partner 部署前没有付费客户。"
  - id: A4
    name: Y1 客户爬坡
    value: "M6 first paid design partner, M10 second paid design partner, M12 first production conversion; 3 active paying programs by M12"
    unit: active paying programs
    source: "[BP milestones 0-12 months] 锚定为第 1 年内拿下 2 个付费 design partner，并完成至少 1 个 $400K+ 的量产转化；月度节奏是按创业公司财务习惯做的插值。"
  - id: A5
    name: Y2 量产爬坡
    value: "Q1Y2 3, Q2Y2 4, Q3Y2 4, Q4Y2 5 active programs"
    unit: active paying programs
    source: "[BP milestones 12-24 months] 直接锚定第 24 个月达到 4–5 个量产项目的目标。"
  - id: A6
    name: Y3 量产爬坡
    value: "Q1Y3 6, Q2Y3 7, Q3Y3 8, Q4Y3 8 active programs"
    unit: active paying programs
    source: "[BP milestones 24-36 months + Research market.som] 对应研究里明确写出的第 3 年 8 个项目的 SOM 终点。"
  - id: A7
    name: 定价阶梯
    value: "Y1 design partner $100K annualized equivalent; Y1 exit blend $220K; Y2 blended ACV $300K to $575K; Y3 blended ACV $620K to $700K"
    unit: annualK per active program
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research market.som] 先取 $75K–$150K design-partner 区间的中位数，再在 Y3 逐步爬到研究中约 $700K 的成熟项目价值。"
  - id: A8
    name: 收入确认方法
    value: "average active programs in period x blended annualized ARPU"
    unit: formula
    source: "[Derived from A4-A7] 月收入等于月均活跃项目数 x 年化 ARPU / 12；季度收入等于季均活跃项目数 x 年化 ARPU / 4。"
  - id: A9
    name: 毛利率爬坡
    value: "Y1 55%-60%, Y2 63%-68%, Y3 69%-70%"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70] 早期部署会被前线交付和安全打包拖累，等 playbook 标准化后毛利率才会抬上来。"
  - id: A10
    name: 单位经济模型月流失率
    value: '1.5'
    unit: percent
    source: "[Startup-finance heuristic for sticky defense workflow software] 一旦发布治理工件嵌入流程，续约风险理应低于通用 SaaS；但在可复制性被证明前，留存仍不会像成熟防务项目那样稳。"
  - id: A11
    name: 稳态 CAC
    value: '150'
    unit: USDK per new program
    source: "[BP gtm.channels + BP buyingProcess + Research distributionChannels] 创始人主导的防务销售、差旅和安全评审开销，会把 CAC 顶在六位数；只有当载荷厂商引荐真正起效后，获客成本才会下来。"
  - id: A12
    name: 完整薪酬带宽
    value: "Founder/Exec 180; Engineering 190; Forward Deployment 165; Applied Assurance 200; Security/Platform 210; GTM/Capture 220; Product/Benchmark 180; Program Success/Ops 160; G&A/Finance 140"
    unit: annualK per FTE
    source: "[BP team + startup-finance heuristic] 采用精简版美国 / 盟友防务软件公司的现金薪酬，并计入工资税与附加成本。"
  - id: A13
    name: 招聘顺序
    value: "Founding engineer M1; forward deployment M4; applied assurance M6; security/platform M10; capture/program M13; product/benchmark M16; second engineer M19; program success M22; sales/partnerships M27; second assurance M30; third engineer M33; G&A M35"
    unit: timing
    source: "[BP team + BP strategicChoices.sequencingRationale] 先补工程、部署和安全，再扩大 GTM；后续招聘是在量产参考客户出现后的平滑延展。"
  - id: A14
    name: 终点人数
    value: "5 FTE by Q4Y1, 9 FTE by Q4Y2, 13 FTE by Q4Y3"
    unit: FTE
    source: "[BP team + BP fundingAsk.useOfFundsSummary] 在验证可复制性之前，公司始终保持精简，不会过早扩张更大规模的 capture 团队。"
  - id: A15
    name: 非薪酬销售与市场费用爬坡
    value: "Y1 $8K-$18K per month; Y2 $60K-$96K per quarter; Y3 $108K-$150K per quarter"
    unit: USDK
    source: "[BP gtm.channels + startup-finance heuristic] 覆盖创始人销售差旅、账户拓展、伙伴协作和定向防务活动，而不是大范围 demand generation。"
  - id: A16
    name: 非薪酬研发费用爬坡
    value: "Y1 $10K-$20K per month; Y2 $54K-$72K per quarter; Y3 $78K-$96K per quarter"
    unit: USDK
    source: "[BP product roadmap + BP operations] 覆盖云工具、部署打包、遥测连接器和发布治理产品化。"
  - id: A17
    name: 非薪酬 G&A 费用爬坡
    value: "Y1 $7K-$12K per month; Y2 $30K-$39K per quarter; Y3 $42K-$54K per quarter"
    unit: USDK
    source: "[BP operations + startup-finance heuristic] 覆盖法务、保险、合规、合同和财务开销。"
  - id: A18
    name: 融资规模规则
    value: "Raise enough to reach the Q4Y2 milestone and still hold roughly six months of operating buffer into Y3"
    unit: policy
    source: "[BP fundingAsk runwayMonths 18 + model requirement] 基准情景不是只做 18 个月桥接，而是按“跑到里程碑且进 Y3 仍留出约 6 个月缓冲”的规则来定融资规模。"
  - id: A19
    name: 现金流简化方法
    value: "ending cash equals opening cash plus cumulative EBITDA"
    unit: formula
    source: "[Startup-finance heuristic] 假设这是一家轻资产软件公司，因此 capex、债务、税项和营运资本扰动都很小。"
