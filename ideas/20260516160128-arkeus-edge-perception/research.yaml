openQuestions:
- Which exact U.S., Australian, or UK program offices own budget for sensor-envelope validation rather than flight test, autonomy software, or services integration?
- Can target customers keep all logs, labels, and model-refresh steps fully on-prem or at the tactical edge without cross-domain export?
- How many active Group 2/3/5 ISR programs will integrate a new third-party sensing payload in the next 12 months?
- Will allied buyers accept vendor-generated envelope evidence, or will they still require government test-center or prime-contractor signoff before operational release?
