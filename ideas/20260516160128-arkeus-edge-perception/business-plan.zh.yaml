slug: detection-envelope-os
date: '2026-05-16'
executiveSummary: >-
  探测包线 OS 瞄准的，是已经开始集成长距离边缘传感器、却仍靠人工飞后分析、一次性服务和零散证据包来放行载荷版本的 ISR 无人机 OEM。首个客户应是一家位于美国或澳大利亚、人数在 100–1,000 之间的 ISR 无人机 OEM：手上有一个活跃的 Group 2 或 Group 3 机型家族，正在接第三方新载荷，而且一个季度内就要面对验收节点。产品起步应是一层本地化或边缘可部署的软件，吃进飞行日志、探测结果、操作员标注和任务上下文，为单一传感器—机体配置生成可审计的探测包线、搜索模式建议和面向客户的发布工件。战略选择是围绕一个真实的载荷集成里程碑，先拿下狭窄滩头，而不是一上来就卖完整自主栈，因为验证点非常具体：从集成飞行到任务剖面获批，能不能少花几天。GTM、定价和交付都该围着这同一个事件打：由创始人直接卖给 VP Programs 或 mission-systems 负责人，把首次付费部署绑在一个载荷发布节点上，再按每个活跃平台家族收年费，并沿着载荷和机型家族扩张。只要公司能始终守住“跨传感器厂商、跨 OEM 的中立审批层”定位，同时持续积累标注过的实地性能数据和伙伴专属证据模板，就有机会赢。最大的反证风险在于，买家可能宁愿把内部脚本继续往前拉，或直接扩展 Shield AI、Palantir、NI、Wind River 这类相邻供应商，而不是单独为一层包线系统买单。现有输入也没有指出首批项目的准确预算归属和政府验收标准，所以这些空白在扩大销售和 capture 招聘前必须补上。
problem:
  - ISR 无人机 OEM 买到更强边缘感知载荷的速度，已经快过他们证明这些载荷在不同高度、杂波、天气、EW 和通信条件下到底哪里可靠的速度。
  - 每次载荷集成或固件变更，飞测和自主团队都得重新回到电子表格、定制 Python 分析和手工证据整理里，才能赶上客户演训或验收评审。
  - 现有自主运行时、数据层和测试工具能存遥测、能跑仿真，但给不出某一组传感器—机体配置持续更新的、任务获批的探测包线。
solution:
  - 把单一载荷和平台家族的飞行日志导出、探测结果、操作员裁定、遥测和环境上下文接进来，然后建模判断：自主搜索、指引或跟踪模式到底在哪些条件下获批运行。
  - 生成一份可审计的包线、发布差异对比和面向客户的证据包，清楚告诉项目团队哪些搜索模式已获批、哪里置信度在掉、还需要补什么测试数据。
  - 第一阶段以本地化或边缘工作流叠加层落地，让客户保留现有传感器、自动驾驶、HIL 工具和安全边界，同时把最手工的审批闭环压短。
whyWeWin:
  - 这个切口直接绑在有预算的里程碑上，ROI 看得见：更少重复飞行、更快从载荷集成走到任务剖面获批。
  - 在 OEM 已经同时跑多种传感器、多种机体和现有软件的前提下，一层中立包线层比整套替换自主系统更容易落地。
  - 每次部署都会沉淀可复用的探测基线、版本差异基准和审批模板；这些东西不是通用测试数据系统天然会积累出来的。
  - 盟友防务买家越来越看重可追溯、可治理的 AI 证据，因此围绕可审计发布决策搭建的工作流，会比只卖模型性能宣称更占优势。
strategicChoices:
  beachhead: >-
    面向某个正在为单一 Group 2 或 Group 3 机型家族引入第三方长距离感知载荷的活跃美国或澳大利亚 ISR 无人机项目，提供探测包线验证。
  wedgeRationale: >-
    这个滩头市场的痛点、买家和验证闭环最清楚：只要出现载荷集成里程碑或演训节点，OEM 就必须证明新传感器到底在哪些地方能被信任。成功与否可以直接量化成省下多少天、少飞多少次、以及比现状更快放行验收包。要是上来就做更广的自主、数据融合或任务规划产品，就得在还没拿到客户证据前先去顶掉现有厂商。
  sequencingRationale: >-
    产品先从单一传感器—机体组合的批量接入、包线生成和证据打包做起，因为这是拿下首个里程碑的最低能力集。GTM 继续由创始人主导，并靠服务协助推进，直到团队证明两到三种部署模式能在不同 OEM 间重复。招聘也按这个顺序走：先把接入和 assurance 工程搭起来，再补前线部署和安全，等首批量产参考客户出来后再扩 capture 团队。
  notYet:
    - 完整自主运行时、C2 或任务规划替代方案
    - 防务之外的通用商业机器人感知工作流
    - 在 3 个 ISR logo 跑起来之前，就扩到海事或反无人机等多域场景
    - 在飞后审批闭环还没跑顺之前，就做实时任务内控制或传感器调度
    - 出口管制和支持复杂度过早抬升的非盟友地区
market:
  tam: "$300.0M 估算 TAM：美国、Five Eyes 和 NATO 约有 400 个可触达的 ISR、EW 与自主平台家族或传感器集成项目，按每年约 $750k 的软件与部署支出测算。"
  sam: "$45.0M 估算 SAM：美国、澳大利亚和英国约有 60 个近期开着新传感器升级或载荷集成需求的 ISR 平台家族项目，平均合同价值约 $750k。"
  som: "$5.6M 估算第 3 年 SOM：先拿下一个平台家族，再沿着 OEM 与载荷伙伴扩张，到第 3 年做成约 8 个在运行项目、每个约 $700k。"
  segments:
    - "核心：100–1,000 人规模的 ISR 无人机 OEM 与自主系统集成商；他们手上有一个活跃的 Group 2 或 Group 3 机型家族，且近期就有载荷集成里程碑。"
    - "次级：在 ISR 滩头验证可复制后，传感器厂商和相邻的防务自主项目也会需要同样的包线审批工作流。"
  buyingProcess: >-
    销售动作应从一次由创始人主导的工作流审计切入，时间点放在演训、载荷发布或客户评估前 60–120 天，通常先接触自主、飞测或 mission-systems 负责人。真正的经济决策随后会转到 VP Programs、自治系统 GM 或 mission systems 总监手里；他们能以降低里程碑风险为由，为付费部署买单，并在第一份包线真正参与发布决策后，转成年度项目合同。
product:
  mvp: >-
    MVP 先覆盖单一传感器—机体组合的安全批量接入、跨任务条件的包线生成、版本差异对比，以及面向单一活跃项目导出可直接用于审批的证据包。第一步应优先支持导出日志和已标注探测结果，而不是一开始就深度接进每个现有系统。
  sixMonth: >-
    6 个月内交付一个生产级本地部署版本，补上对管道里价值最高的遥测与探测导出格式的预置连接器，加上基于角色的评审流程，以及载荷或固件版本之间包线变化的并排对比。
  twelveMonth: >-
    12 个月内加入按买家模式复用的审批模板、阈值与人工覆盖策略控制、跨多个版本的基准对比，以及在同一 OEM 内支持第二个载荷或第二个机型家族扩展。
  twentyFourMonth: >-
    24 个月后，在 ISR 发布治理闭环被验证跑通的前提下，扩到多项目组合视图、跨平台包线基准，以及海事自主、反无人机等相邻防务感知工作流。
  keyBets:
    - 客户愿意为一款专门的包线审批产品付费，而不要求创业公司把自主系统或测试基础设施整套替换掉。
    - 在必须接入涉密系统前，导出或脱敏后的飞行数据已经足够证明 ROI。
    - 前两到三个 OEM 部署在工作流结构上足够相似，能让交付保持可复制。
    - 一旦产品能把多个机体上的验收时间压短，传感器厂商就愿意参与联合销售。
gtm:
  wedge: >-
    围绕一个真实的载荷集成里程碑卖出首次付费部署，把产品定位成“在不改客户传感器、自动驾驶或测试栈的前提下，最快把原始探测结果变成可审计任务获批包线”的方式。
  channels:
    - 由创始人直接外呼 ISR 无人机 OEM 的 VP Programs、mission-systems 负责人，以及自主或飞测负责人
    - 与已经在 AeroVironment、TEKEVER、Insitu 等 OEM 环境里落地的感知载荷厂商联合销售
    - 通过奖励开放接口和快速验证的防务集成商与创新通道切入活跃项目
  funnelTargets: "目标账户触达 -> 里程碑审计资格转化 15-25%；合格审计 -> 付费 design partner 30-40%；付费 design partner -> 年度量产合同 50%+；量产账户 -> 12 个月内扩到第二个载荷或机型家族 30%+。"
  pricing: >-
    按活跃平台家族和项目年度定价，而不是按 seat：首单可做 8–12 周的付费 design partner，价格约 $75k–$150k，用于部署和证据配置；随后转成单一活跃平台家族每年 $400k–$800k 的许可，再对新增载荷或机型家族收取集成费。这样更贴合里程碑延误成本，也与研究里约 $750k ACV 的包线相一致。
businessModel:
  revenueStreams:
    - 围绕单一载荷集成里程碑的付费 design-partner 部署
    - 按每个活跃平台家族或项目收取年度软件订阅
    - 新传感器、机型家族或环境带来的集成与安全部署费用
    - 量产采用后再叠加高级基准测试与跨版本报告模块
  unitOfValue: 活跃平台家族项目年
  targetGrossMarginPct: 70
  expansionLevers:
    - 同一机型家族里新增载荷和固件发布周期
    - 同一 OEM 或集成商内部扩到更多机型家族或项目
    - 借助感知载荷厂商，在多个 OEM 间联合销售部署
    - ISR 切口被验证可复制后，扩到相邻防务感知工作流
strategyMap:
  northStarMetric: 使用平台反复完成载荷或版本审批周期的量产项目数
  inputMetrics:
    - 每季度合格的里程碑审计数量
    - 从集成飞行到任务剖面获批的天数
    - 付费 design partner 转成年付量产合同的比例
    - 使用既有包线基线完成审批的发布占比
    - 从部署启动到第一份可用证据包的平均时间
  moatsToBuild:
    - 按环境、载荷和机体沉淀的跨项目标注探测性能语料
    - 伙伴专属审批模板和发布治理工作流
    - 接进 OEM 团队已在使用的遥测、探测和测试数据导出层
  killCriteria:
    - 聚焦销售开始后前 12 个月内，付费 design partner 少于 3 个
    - 前 5 次部署后，付费 design partner 转成年付量产合同的比例低于 40%
    - 第 3 次实施后，从 kickoff 到首份可用证据包的中位时间仍高于 6 周
    - 到第 18 个月为止，还没有客户在真实发布或验收决策里接受供应商生成的包线证据
  mermaid: |
    flowchart LR
      Wedge[载荷集成切口] --> MVP[包线生成 MVP]
      MVP --> Proof[更快拿到获批任务剖面]
      Proof --> Expansion[更多载荷、机体和项目]
investorMemo:
  verdict:
    call: 见面 / 继续深入
    conviction: 对切口的判断很强，但在预算归属和安全部署可复制性被证实前，整体信心仍是中等。
    whyBelieve: 公司瞄准的是一个既紧迫又狭窄的审批工作流，这个工作流由真实发生的跨 OEM 传感器集成和对可审计自主证据的需求上升共同催生。
    whyDoubt: 独立品类的天花板不算大，而相邻现有厂商或内部团队，可能会在新的 system of record 被单独预算前就把这层工作流吃掉。
    nextDiligence: 先拿下 2 个围绕真实载荷里程碑的付费 design partner，并证明其中 1 个在周期时间明显缩短后转成年度量产合同。
  firstCustomer:
    title: Group 2 或 Group 3 ISR 无人机 OEM 的 VP Programs
    profile: >-
      一家位于美国或澳大利亚、规模在 100–1,000 人之间的 OEM 或集成商：手上有一个活跃的国防 ISR 合同，正在把新的第三方感知载荷接到单一机型家族上，并将在 120 天内迎来演训或客户评估。
    trigger: 载荷集成里程碑、固件发布，或客户验收事件逼着团队证明：在受对抗或退化条件下，新传感器到底能在哪些地方被信任。
    buyer: VP Programs 或 mission systems 总监
    initialContract: >-
      先做一个 8–12 周、价格约 $75k–$150k 的付费 design partner，覆盖单一平台家族和一个发布里程碑；如果首轮部署能把任务剖面获批时间缩短至少 30%，或避免一轮重复飞行，再转成每年 $400k–$800k 的合同并叠加集成费。
  mustBeTrue:
    - 前 10 个目标 OEM 里，至少有 3 家确认首单可以从项目预算或里程碑风险预算里出，而不是只能走纯服务开支。
    - 首次部署能把从载荷集成飞行到任务剖面获批的天数至少压缩 30%。
    - 在两个账户里，导出或脱敏后的数据已经足以做出第一版达到量产标准的包线。
    - 至少有一个政府、主承包商或内部评审委员会，在两个独立项目里接受创业公司给出的包线证据进入真实发布决策。
    - 超过 60% 的合格机会都能套进前两种部署模式，而不需要定制集成。
  diligenceQuestions:
    - "第一份合同究竟由谁签字：VP Programs、mission systems、flight test，还是某条服务线？"
    - 不跨域搬运日志的前提下，证明价值所需的最低数据和部署架构是什么？
    - OEM 会接受中立第三方出具的审批工件，还是必须由主承包商或政府测试中心重新签发结果？
    - 哪两种遥测或探测导出格式覆盖了第一年大部分销售管道？
    - 传感器厂商能否成为真实的分销渠道，还是他们更愿意把验收流程继续做成重服务？
operatingAssumptions:
  - assumption: 项目预算或里程碑风险预算能在一个季度内为首次部署买单。
    basis: research.yaml
    validationTest: 访谈 10 个目标 OEM 或集成商账户，并在不等待新采购载体的前提下拿到至少 2 个付费部署。
    decisionImpact: 如果不成立，公司就得借更大的主承包商去卖、下调 ACV，或接受长得多的销售周期。
  - assumption: 采用本地化或边缘部署、配合导出日志，就足以交付第一份审批工件。
    basis: research.yaml
    validationTest: 用脱敏或可导出的数据交付一个 pilot，并确认客户把结果真正用进一次发布评审。
    decisionImpact: 如果不成立，安全工程和资本需求都会明显上升，滩头市场也会缩窄到更少数具备许可资质的项目。
  - assumption: 飞行日志、探测结果和操作员标注已经提供足够信号，不用更深的运行时插桩也能建出第一版可信包线。
    basis: operator judgment
    validationTest: 用一个 design partner 的历史测试集手工做一版包线原型，并把建议结果和团队当前的发布决策对比。
    decisionImpact: 如果不成立，MVP 范围会膨胀到更重的集成，首轮验证周期也会放慢。
  - assumption: 每年 $400k–$800k 的合同区间站得住，因为只要避开一次演训延期或重复飞行，价值就已经高过软件成本。
    basis: idea.yaml
    validationTest: 拿到 2 个已签字的付费 design partner，并让他们在里程碑成功后预先谈定落在或高于该区间的年费。
    decisionImpact: 如果不成立，公司就会滑向更低 ACV 的工具生意，只能压 burn 或换买家。
  - assumption: 只要平台能把多个 OEM 的验收时间压短，传感器厂商就愿意联合销售。
    basis: research.yaml
    validationTest: 拿下 1 个载荷厂商伙伴，并在 12 个月内通过对方带来至少 3 个合格 OEM 机会。
    decisionImpact: 如果不成立，销售管道生成仍将主要靠创始人，公司也该推迟渠道招聘。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 12–15 位目标 ISR OEM 的自主、飞测和 mission-systems 负责人，并收集一次近期载荷集成中实际使用的发布工件。
    hypothesis: 首个买家愿意为压缩审批周期和证据整理付费，而不只是为存遥测付费。
    successMetric: 至少 8 次访谈把审批延迟或重复飞行风险列为前 3 大痛点，且有 3 个账户愿意分享真实里程碑工件供 redline。
    owner: CEO
  - horizon: 0–90 天
    experiment: 在客户背后用历史测试数据做出一版手工包线和审批包草稿。
    hypothesis: 在全自动化完成前，买家会先按输出结果是否足够支撑决策来判断价值。
    successMetric: 至少 2 个目标账户认可这份材料明显优于现有电子表格，并承诺进入付费 design-partner 时间表。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 为销售管道里已经存在的一条遥测导出路径和一条探测标注工作流，做出首批安全批量接入连接器。
    hypothesis: 两条很窄的连接路径，已经能覆盖大多数早期部署，而不需要替换客户平台。
    successMetric: 超过 60% 的合格机会能落进这两条路径之一，且每个账户的上手时间保持在 20 个工程师工作日以内。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 围绕一个真实载荷集成里程碑，跑通首个付费 design partner。
    hypothesis: 在真实项目里，产品能把任务剖面获批时间至少缩短 30%。
    successMetric: 客户确认周期时间有可量化下降，或避免了一次重复飞行事件，并在 30 天内要求提交年度量产方案。
    owner: 前线部署负责人
  - horizon: 180–360 天
    experiment: 用同一套核心接入和评审工作流，在另一家 OEM 交付第二个本地部署。
    hypothesis: 这个滩头市场足够可复制，最终能支撑软件式毛利，而不是长期沦为定制服务。
    successMetric: 第二次部署能在 4 周或更短时间上线，且除可复用连接器和模板外，定制代码占比低于 25%。
    owner: 安全或平台工程师
  - horizon: 180–540 天
    experiment: 和一家已经跨多个 OEM 集成的载荷厂商跑一条联合销售路径。
    hypothesis: 一旦有首个量产参考客户，厂商渠道能压低 CAC，并加快第二个项目的扩张。
    successMetric: 1 个厂商伙伴在 12 个月内带来至少 3 个合格引荐和 1 个付费部署。
    owner: CEO
operations:
  - 具备签名证据导出、且不依赖公有云原始数据的隔离网或本地部署包
  - 针对每次新载荷集成的一套标准化数据接入与操作员标注流程
  - 在活跃里程碑期间，与自主、飞测和项目相关方保持每周发布评审节奏
  - 与传感器厂商、OEM 遥测负责人和现有测试数据工具对齐的集成 playbook
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责接入、包线建模，以及证明切口所需的前两个可复用连接器。
  - role: 前线部署负责人
    startTiming: Month 1-3
    rationale: 负责客户实施，把飞测工作流翻成产品需求，同时守住交付可复制性。
  - role: 应用感知 / assurance 工程师
    startTiming: Month 4-6
    rationale: 利用早期实地数据，提高包线质量、版本差异分析和置信阈值逻辑。
  - role: 安全 / 平台工程师
    startTiming: Month 6-9
    rationale: 打磨本地部署、审计日志和受控环境打包能力，这是防务采用的硬门槛。
  - role: 防务 capture / 项目负责人
    startTiming: Month 9-12
    rationale: 只有首个量产参考客户和伙伴动作跑出来后，才把创始人主导销售转成可复制的销售管道。
milestones:
  - horizon: 0–12 个月
    items:
      - 围绕真实载荷集成里程碑拿下 2 个付费 design partner
      - 至少把 1 个 design partner 转成 $400k+ 的年度量产合同
      - 证明从集成飞行到任务剖面获批的中位时间至少改善 30%
      - 交付可复用的本地部署包和前两个通用连接器
  - horizon: 12–24 个月
    items:
      - 在至少 3 个 OEM logo 上做到 4–5 个量产项目
      - 拿下 1 条能带来合格销售管道的载荷厂商联合销售关系
      - 至少有 2 个客户扩到第二个载荷或第二个机型家族
      - 发布内部基准仪表盘，用于跨版本包线对比
  - horizon: 24–36 个月
    items:
      - 做到 8 个量产项目，与研究中的第 3 年 SOM 大体一致
      - 在同一 OEM 内实现多个项目的组合级可视化
      - 基于现有客户群进入 1 个相邻感知工作流，例如海事自主或反无人机
      - 证明一套可复用的审批模板库，能覆盖美国、澳大利亚和英国买家模式
risks:
  - risk: 预算归属在飞测、自主和项目团队之间始终不清楚。
    likelihood: High
    impact: High
    mitigation: 围绕一个已命名里程碑去卖，锁定 VP Programs 或 mission-systems 买家，并在部署开始前就约定清楚成功指标。
  - risk: 安全部署和跨域限制拖慢价值兑现。
    likelihood: High
    impact: High
    mitigation: 先从本地批量接入、脱敏数据和签名证据导出做起，再考虑更深的实时集成。
  - risk: 相邻现有厂商或内部团队把现有工具稍微往前推一把，就足以挡掉独立采购。
    likelihood: Medium
    impact: High
    mitigation: 靠中立审批工件、更短周期时间和跨厂商复用取胜，而不是去拼通用分析功能。
  - risk: 交付长期过于定制，撑不起软件式毛利。
    likelihood: Medium
    impact: High
    mitigation: 把滩头市场压到单一平台家族，标准化前两个连接器，并拒绝一切不能提升复用度的定制需求。
  - risk: 政府或主承包商评审方不愿依赖供应商生成的包线证据。
    likelihood: Medium
    impact: High
    mitigation: 尽早让输出结果贴合现有评审流程，并借 design partner 验证哪些工件可以不返工就被接受。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月跑道应足以把核心接入与 assurance 产品做出来，跑通两种安全部署模式，拿下 2–3 个付费 design partner，完成首个年度量产转化，并养起证明防务采用可复制所需的小型工程和前线部署团队；在这之前，不宜过早扩张 GTM 招聘。
