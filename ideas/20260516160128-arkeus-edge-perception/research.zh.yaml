      - 100
      - 106
    threatOfSubstitutes:
      score: 4
      rationale: 内部脚本、类 Palantir 数据层、NI 实验室和类 Wind River 现有厂商，已经占住了相邻工作流，而且都能继续往外扩。
      sourceRefs:
      - 36
      - 39
      - 43
      - 77
    competitiveRivalry:
      score: 4
      rationale: 相邻自主厂商很多，DoD 兴趣也很广；Replicator 相关招标吸引了大量提案，说明竞争非常拥挤。
      sourceRefs:
      - 27
      - 34
      - 86
  pestle:
  - factor: 政治
    impact: positive
    point: 盟友国防开支持续上行，NATO 的自主系统政策也在向前推，这两者都利好 AI 驱动 ISR 能力的持续采购。
    sourceRefs:
    - 90
    - 101
  - factor: 经济
    impact: positive
    point: 军用无人机市场仍保持两位数增长，这给载荷和软件迭代预算继续扩张提供了空间。
    sourceRefs:
    - 87
  - factor: 社会
    impact: neutral
    point: 操作员对自主系统的信任仍然脆弱，因为人手紧张的团队在放出更多自主权前，仍要先看到可审计、可解释的输出。
    sourceRefs:
    - 44
    - 62
    - 100
  - factor: 技术
    impact: positive
    point: 边缘算力和任务系统架构都在进步，让机上验证和更快更新变得更可行。
    sourceRefs:
    - 28
    - 82
    - 95
  - factor: 法律
    impact: negative
    point: 出口管制和类似适航的安全论证要求，会拖慢跨境部署与测试。
    sourceRefs:
    - 106
    - 107
  - factor: 环境
    impact: neutral
    point: 海上杂波、低能见度和受干扰的 RF 环境，让传感器表现高度依赖场景，这反而抬高了包线建模的必要性。
    sourceRefs:
    - 16
    - 21
    - 74
  adoptionFrictionMatrix:
  - friction: 跨域与涉密数据处理
    severity: 高
    affectedBuyer: 项目副总裁 / 安全负责人
    mitigation: 先从本地部署的批量数据导入和签名证据包做起，避免原始数据跨域流动。
    sourceRefs:
    - 68
    - 77
    - 93
  - friction: 异构传感器与机体接口
    severity: 高
    affectedBuyer: 任务系统负责人
    mitigation: 先在一个平台家族落地，并为价值最高的传感器和遥测数据流预置连接器。
    sourceRefs:
    - 57
    - 70
    - 85
  - friction: 自主信任与放行治理
    severity: 高
    affectedBuyer: 飞行测试负责人
    mitigation: 产出可审计的包线、人工接管阈值，以及与 assurance 和负责任 AI 预期对齐的证据。
    sourceRefs:
    - 44
    - 45
    - 100
  - friction: 国际出口与合规范围
    severity: 中
    affectedBuyer: 国际项目总经理
    mitigation: 先从 Five Eyes 和 NATO 对齐项目切入，并把受出口管制的算力或传感器部件模块化。
    sourceRefs:
    - 101
    - 106
    - 107
