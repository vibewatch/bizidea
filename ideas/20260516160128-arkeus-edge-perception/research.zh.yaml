- name: Palantir AIP for Defense
  stage: 现有厂商
  wedge: 贯穿涉密系统到战术边缘设备的国防 AI 与数据层。
  pricing: 按合同定价；未公开
  strength: 在国防数据融合上装机基础深厚，也容易借助既有 Palantir 项目足迹产生拉力。
  weaknessVsUs: 它位于嵌入式传感器运行时和类似适航的证据闭环之上，更像集成点，而不是专门做包线引擎的产品。
  sourceRefs:
  - 36
- name: NI Aerospace & Defense
  stage: 现有厂商
  wedge: 面向嵌入式航天与国防验证的 HIL、测试数据与仪器栈。
  pricing: 企业 / 按配置定价；未公开
  strength: 在 A&D 测试实验室里装机量巨大，可信度也高。
  weaknessVsUs: 以仪器为先的工具本身，并不能从实地运行数据里持续产出任务已批准的活体包线。
  sourceRefs:
  - 39
- name: Wind River VxWorks
  stage: 现有厂商
  wedge: 面向任务关键航电的安全认证嵌入式运行时与测试套件。
  pricing: 订阅授权；未公开
  strength: 在航电里锁定极深，而且认证资历受信任。
  weaknessVsUs: 它是运行时与认证底座，不是面向异构传感器的跨版本分析与审批产品。
  sourceRefs:
  - 43
regulatoryTechnicalConstraints:
- point: 盟友国防买家越来越要求 AI 驱动自主系统具备可解释性、可追溯性、人工可治理性和可靠性。
  sourceRefs:
  - 100
  - 101
- point: 出口管制可能附着在传感器、惯性器件、AI 软件和算力硬件上，让跨境部署与支持变得更复杂。
  sourceRefs:
  - 106
- point: 军民两用和试飞作业仍要继承类似适航的安全论证，以及 BVLOS 证据要求。
  sourceRefs:
  - 107
- point: 安全运行时与防篡改要求，抬高了把新感知代码部署到现役任务计算机上的技术门槛。
  sourceRefs:
  - 93
validationSignals:
- point: Arkeus 已经把 Warden 集成到 TEKEVER AR3 EVO、AeroVironment JUMP20 和 Insitu Integrator 上，这说明跨 OEM 传感器接入不是纸面能力，而是在真实发生。
  sourceRefs:
  - 1
  - 2
  - 3
- point: 澳大利亚陆军、美国海军和美国陆军的平台授标，说明买家正在为需要可重复验收证据的模块化载荷机队掏钱。
  sourceRefs:
  - 6
  - 21
  - 25
- point: Picogrid 把大部分异构传感器集成编码工作从数周压到不到一天，说明买家确实为更快的中间件与验证工作流买单。
  sourceRefs:
  - 70
- point: Replicator 相关招标吸引了 132 家公司和 165 份提案，说明围绕自主协同和通信韧性的项目需求很广。
  sourceRefs:
  - 86
- point: Lockheed 已经演示了机上 AI 识别和同周期模型再训练，这抬高了外界对传感器模型“既快又受控”更新的预期。
  sourceRefs:
  - 60
openQuestions:
- 到底是哪几个美国、澳大利亚或英国项目办公室，在为传感器包线验证买单，而不是把预算放在飞测、自主软件或集成服务上？
- 目标客户能否把全部日志、标签和模型刷新步骤完整留在本地机房或战术边缘，而不做跨域导出？
- 未来 12 个月里，会有多少个活跃的 Group 2/3/5 ISR 项目集成新的第三方感知载荷？
- 盟友买家会接受供应商生成的包线证据，还是在作战放行前仍必须拿到政府测试中心或主承包商签字？
