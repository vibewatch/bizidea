      sourceRefs:
      - 43
      - 82
      - 88
    buyerPower:
      score: 4
      rationale: 买方集中在少数几个国防项目和主承包商手里，而且他们往往还能退回内部工具或相邻栈。
      sourceRefs:
      - 57
      - 69
      - 90
    threatOfEntrants:
      score: 3
      rationale: 这个软件问题很诱人，但 assurance、出口管制和数据获取门槛，让可信进入者远比做通用分析 SaaS 更难。
      sourceRefs:
