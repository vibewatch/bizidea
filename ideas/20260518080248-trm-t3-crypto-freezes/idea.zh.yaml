problem: >-
  稳定币发行商和托管加密平台虽然越来越具备技术上的冻结能力，但大多数仍通过电子表格、邮件、
  链上分析截图和外部法律顾问来执行实际工作流。当账户盗用或紧急执法请求来袭，团队必须识别钱包、
  确认授权、快速触发冻结，并跨司法管辖区保留一份站得住脚的案件记录。检测工具已有，
  但冻结执行、审批和具备审计质量的案件管理这一运营层仍然缺失。
targetUser:
  primary: 稳定币发行商和托管钱包平台中、可在链上冻结或限制资产的金融犯罪运营负责人
  secondary: 处理执法机构来函请求的法律运营经理和调查团队
  buyer: 稳定币发行商或托管加密平台的首席合规官、反洗钱合规官或法务总顾问
startupThesis:
  nonObviousInsight: >-
    加密金融犯罪响应的瓶颈，正在从追踪非法钱包，转向一旦追踪置信度达到后，
    如何在多方之间足够快速地执行并记录冻结。随着发行商拥有实质冻结权力，
    真正稀缺的产品是运营协调与证据管控，而非又一个分析仪表盘。
  beachhead: >-
    已有大量 TRON 或其他高速稳定币敞口、且持续收到紧急欺诈、制裁或执法升级请求、
    但仍在手动管理冻结流程的稳定币发行商和托管钱包服务商
  wedge: >-
    一个冻结响应操作层——将已追踪的钱包转化为经审批的案件，路由发行商和法律行动，
    触发冻结工作流，并在同一系统内汇编符合司法管辖区要求的证据包
  whyNowCatalyst: >-
    TRM、Tether 和 TRON 公开展示了 24 小时冻结能力、$450M 已冻结资金和跨 23 个司法管辖区的协调，
    这让冻结操作软件对任何希望在合作伙伴和监管方面显得可信的发行商而言，都变得迫切起来。
  ventureScalePath: >-
    从稳定币发行商的紧急冻结执行起步，逐步扩展至更广泛的加密调查、制裁操作、资产追回工作流、
    交易对手风险决策，以及成为发行商、托管方、交易所和代币化金融平台资产管控行动的系统级记录源。
solution: >-
  为加密资产管控团队构建一个案件管理与执行平台。产品接收已追踪的钱包或来函请求，
  创建结构化案件档案，核查必要授权与紧急程度，并在触发冻结步骤前将审批路由至合规、
  法律和发行商运营人员。它维护一条包含钱包情报、请求行动、冻结状态、交易对手和对外沟通的时间线，
  让团队能清晰说明为何采取行动及由谁审批。客户从紧急稳定币冻结工作流起步，
  然后为账户盗用、制裁命中、交易所升级和执法请求添加可复用的模板。
  目标不是取代链上分析，而是将检测到的风险转化为快速、一致、可复查的运营行动。
goToMarketSeed:
  firstCustomer: >-
    合规团队精简、持续面临基于 TRON 的欺诈敞口、并直接负责冻结或限制可疑钱包的
    美元稳定币发行商或托管钱包平台
  buyingTrigger: >-
    紧急欺诈案件激增、新的银行或交易所合作伙伴尽调流程，
    或一起高关注度事件迫使发行商证明能在数小时内完成冻结并留存记录
  currentAlternative: 通过链上分析仪表盘、电子表格、邮件、工单工具、外部法律顾问和内部操作手册的手动工作流
  switchingReason: >-
    现有分析工具能帮团队找出异常资金流，但不提供快速执行冻结并事后为决策辩护所需的
    审批链、行动路由和案件证据包。
  pricingHypothesis: 按调查团队规模和月案件量收取年度平台订阅费，并为执法机构门户和审计导出提供高级模块
