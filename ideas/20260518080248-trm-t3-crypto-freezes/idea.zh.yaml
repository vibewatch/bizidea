  customerSegments:
    - 稳定币发行商
    - 托管钱包平台
    - 具备直接资产限制工作流的加密交易所
  valuePropositions:
    - 快速执行紧急冻结，同时保持法律和合规管控
    - 为每个资产管控案件集中证据、审批记录和沟通内容
    - 减少发行商、工具商和执法合作伙伴之间的运营混乱
  channels:
    - 向加密基础设施公司合规和法律负责人直接销售
    - 与链上分析工具商和调查咨询公司建立合作
    - 来自银行、托管和交易所交易对手在对发行商进行尽调时的转介
  customerRelationships:
    - 针对初次冻结操作手册的高触达工作流设计
    - 与合规和法律团队持续优化策略
    - 紧急事件中的优先支持
  revenueStreams:
    - 年度 SaaS 订阅
    - 按案件量或受管实体数的按量计费
    - 实施和集成费用
  keyResources:
    - 案件模式与审批工作流引擎
    - 与链上分析和工单系统的集成
    - 司法管辖区与证据模板库
  keyActivities:
    - 维护冻结工作流模板
    - 集成数据源和行动系统
    - 改进案件打包、审计导出和响应分析
  keyPartners:
    - 链上分析工具商
    - 加密托管方和发行商基础设施服务商
    - 执法机构联络公司和合规咨询机构
  costStructure:
    - 工作流与集成工程
    - 合规和法律领域专业能力
    - 企业销售和客户支持
jobsToBeDone:
  - job: >-
      当紧急非法资金告警触发时，帮助我们的合规团队快速冻结正确的钱包并记录每一步审批，
      让我们既能阻止损失，又不会制造法律敞口。
    currentAlternative: 通过分析仪表盘、电子表格、即时通讯和法律顾问审查进行手动升级
    successMetric: 从案件创建到冻结行动的时间，以及审批记录完整的案件比例
  - job: >-
      当执法机构询问我们对可疑钱包采取了什么行动时，帮助我们的调查团队交出一份
      符合司法管辖区要求的案件档案，让我们无需手动重建时间线就能可信地回应。
    currentAlternative: 翻找邮件、收集截图、临时撰写备忘录
    successMetric: 生成完整案件档案所需的小时数，以及缺失证据文件的数量
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 信号给出了具体的运营基准、具名参与方、已冻结资金规模和司法管辖区数量，但证据仍为单一来源。
  painIntensity:
    score: 5
    rationale: 在这个既紧迫又高风险的工作流中，遗漏或延误合法冻结可能直接造成损失、引发合作伙伴审查和监管损害。
  wedgeClarity:
    score: 5
    rationale: 冻结执行与案件管理是切口明确的初始工作流，有特定买家、明确的事件触发点和显而易见的手动替代方案。
  defensibility:
    score: 4
    rationale: 审批链、案件历史和司法管辖区专属操作手册能积累成粘性工作流数据，即便分析工具商可能向该类别延伸。
  ventureScale:
    score: 4
    rationale: 初始市场集中，但同一管控层可扩展至更广泛的加密调查和各大平台的资产治理工作流。
topRisks:
  - name: 现有厂商贴身竞争
    description: 链上分析工具商或大型发行商可能从告警功能延伸至基础案件管理和冻结工具。
    mitigation: 先以跨方协调和证据工作流——那些位于分析工具之上的能力——切入，再成为跨多家工具商的中立记录系统。
  - name: 客户集中度过高
    description: 初始滩头市场由拥有直接冻结权限的少数成熟发行商和托管平台构成。
    mitigation: 优先定向中端市场和快速成长平台，再扩展至协调相同工作流的交易所、托管方、代币化资产发行商和服务商。
  - name: 错误冻结的法律责任
    description: 如果产品导致冻结了错误的钱包，或在授权依据薄弱的情况下行动，客户可能面临法律和声誉风险。
    mitigation: 在审批环节保留人工介入，在行动前要求进行授权核查和证据门槛确认，并将系统定位为受控执行软件而非自主执法工具。
