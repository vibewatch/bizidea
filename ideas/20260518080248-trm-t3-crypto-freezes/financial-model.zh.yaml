fundingAsk:
  round: seed
  amountM: 3.2
  runwayMonths: 24
  milestone: 在下轮融资前，达成 8 个生产客户、70% 以上毛利率、一个已上线的下游管控点集成，以及至少一个合作伙伴驱动的扩张动作。
  useOfFunds:
    - bucket: 工程
      amountUsd: 1280000
      percentage: 40
    - bucket: GTM
      amountUsd: 864000
      percentage: 27
    - bucket: 一般及行政
      amountUsd: 352000
      percentage: 11
    - bucket: 缓冲（6 个月）
      amountUsd: 704000
      percentage: 22
scenarios:
  downside:
    description: 信任建立缓慢、实际 ACV 偏低、更多人工案件工作，导致公司在 Y3 末未达计划客户数和毛利率。
    y3RevenueK: 1500.0
    y3EbitdaK: -1050.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - Y2 和 Y3 新增客户从 8 个滑落至 Y1 后净新增约 5 个。
      - Y3 混合 ARPU 落在约 $170K，因为更多账户停留在试点范围内。
      - 毛利率收于约 68%，因为证据打包和集成工作仍偏服务密集。
  base:
    description: 公司在 Y1 签约 4 个付费客户，Y2 末达 8 个，Y3 末扩展至 12 个，同时毛利率升过 70% 目标。
    y3RevenueK: 2000.0
    y3EbitdaK: -684.0
    cashLowPointK: 606.97
    keyAssumptionChanges:
      - 客户新增按 A4 至 A6 推进，Q4Y3 末达 12 个客户。
      - 年均 ARPU 从 Y1 试点定价 $90K 爬升至 Y3 生产账户 $200K。
      - 毛利率从 Y1 的 45%–64% 提升至 Y3 的 72%–73%，随操作手册和集成标准化而改善。
  upside:
    description: 合作伙伴转介更早激活，生产转化压缩销售周期，附加工作流将货币化推向研究 ACV 区间上限。
    y3RevenueK: 2550.0
    y3EbitdaK: -250.0
    cashLowPointK: 880.0
    keyAssumptionChanges:
      - 公司 Y3 末达约 14 个客户而非 12 个，因为合作伙伴引入的交易转化更快。
      - Y3 混合 ARPU 达约 $215K，因为更多客户购买第二个工作流和实施费。
      - 毛利率收于约 75%，因为集成复用降低了人工服务负担。
sensitivity:
  - variable: ARPU
    downsideCase: Y3 年 ARPU $170K
    baseCase: Y3 年 ARPU $200K
    upsideCase: Y3 年 ARPU $215K
    y3RevenueImpactK: -300.0
    cashImpactK: -220.0
  - variable: CAC
    downsideCase: 交易需要更多定制法律和创始人时间，CAC $190K
    baseCase: CAC $147.5K
    upsideCase: 合作伙伴引入，CAC $120K
    y3RevenueImpactK: -60.0
    cashImpactK: -340.0
  - variable: churn
    downsideCase: 月流失率 2.5%
    baseCase: 月流失率 1.5%
    upsideCase: 月流失率 1.0%
    y3RevenueImpactK: -140.0
    cashImpactK: -105.0
  - variable: sales cycle
    downsideCase: 平均试点到生产周期 9 个月
    baseCase: 混合周期约 6 个月
    upsideCase: 事件驱动紧迫性和合作伙伴信任背书下，周期压缩至 4–5 个月
    y3RevenueImpactK: -360.0
    cashImpactK: -290.0
  - variable: gross margin
    downsideCase: 稳态毛利率 68%
    baseCase: 稳态毛利率 73%
    upsideCase: 稳态毛利率 75%
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
  - variable: hiring pace
    downsideCase: 合规运营和第二个销售人员比建模提前两个季度入职
    baseCase: 将后期招聘推迟至 Y3 验证可见后
    upsideCase: 12 个活跃客户后再增加第二个销售人员
    y3RevenueImpactK: -40.0
    cashImpactK: -170.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      IncidentTrigger --> QualifiedPilot
      QualifiedPilot --> ProductionCustomer
      ProductionCustomer --> SubscriptionAndImplementationRevenue
      SubscriptionAndImplementationRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
  - checkName: 收入引擎
    finding: 基础情景收入由 Y1 末 4 个付费客户增长至 Q4Y3 的 12 个、同时混合 ARPU 从试点定价提升至约 $200K 生产 ACV 驱动。
  - checkName: 必须做对的事
    finding: 模型需要合作伙伴辅助的生产转化，以将销售周期控制在约 6 个月，因为敏感性分析显示转化变慢是 Y3 收入最大拖累。
  - checkName: 模型破裂点
    finding: 下行情景出现于买家将更多工作留给定制法律审查，导致毛利率趋向 68%、CAC 趋向 $190K、现金低点趋向约 $140K。
  - checkName: 下轮融资证明
    finding: 下次融资的依据是 Y2 末达到 8 个生产客户、70% 以上毛利率，以及至少一条证明切口能超越创始人主导销售的合作伙伴驱动扩张路径。
sanityChecks:
  ruleOf40: "Y3 增速 98.84% + EBITDA 利润率 -34.20% = 64.64%"
  burnMultiple: "Y2 烧钱倍数 1.41x，基于期末 ARR 口径 Y3 改善至 0.66x。"
