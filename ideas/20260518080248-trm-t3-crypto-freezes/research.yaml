competitors:
- name: TRM Labs
  stage: incumbent
  wedge: Blockchain intelligence plus real-time networked response for crypto businesses and law enforcement.
  pricing: Custom enterprise pricing
  strength: Most direct adjacency because Beacon Network, Forensics, and Orion already connect tracing, alerts, and defensibility.
  weaknessVsUs: Its core workflow still starts from analytics and alert review, not from issuer-grade approval routing and neutral multi-party case orchestration.
  sourceRefs:
  - 8
  - 9
  - 10
- name: Chainalysis
  stage: incumbent
  wedge: Best-known tracing and investigations platform used by regulators, law enforcement, and major exchanges.
  pricing: Custom enterprise pricing
  strength: Deep data, trusted investigations brand, and strong public-private network effects.
  weaknessVsUs: Reactor is strongest at tracing and investigation rather than cross-functional freeze execution and legal workflow control.
  sourceRefs:
  - 24
  - 27
- name: Elliptic
  stage: scale-up
  wedge: Crypto compliance, monitoring, and stablecoin-risk analytics for regulated institutions and issuers.
  pricing: Custom enterprise pricing
  strength: Most explicit stablecoin-risk positioning besides the analytics incumbents.
  weaknessVsUs: Still focused on monitoring, ecosystem analysis, and investigations rather than the controlled action layer after a decision is made.
  sourceRefs:
  - 11
  - 19
- name: Unit21
  stage: scale-up
  wedge: AI-led AML and fraud case management for regulated financial institutions.
  pricing: Custom enterprise pricing
  strength: Strong audit-ready investigation workflow with human-in-the-loop approvals.
  weaknessVsUs: Not crypto-native and does not own blockchain intelligence, token controls, or issuer-specific freeze playbooks.
  sourceRefs:
  - 20
  - 23
regulatoryTechnicalConstraints:
- point: Freezes must be backed by lawful authority and auditable decision records, which makes human approval and evidence retention mandatory.
  sourceRefs:
  - 15
  - 19
- point: Not every asset is equally controllable; the product only works where issuers or custodians actually have blacklist or restriction capabilities.
  sourceRefs:
  - 17
  - 29
- point: Multi-chain activity and cross-border counterparties complicate monitoring thresholds, escalation logic, and reporting obligations.
  sourceRefs:
  - 11
  - 25
- point: The product must fit existing screening and investigations stacks rather than assume customers will replace them.
  sourceRefs:
  - 9
  - 20
  - 24
validationSignals:
- point: T3 FCU has already frozen over $450 million and can support asset freezes within 24 hours in urgent cases.
  sourceRefs:
