    - 24
  - case: Buyers prefer a broader AML stack instead of a dedicated freeze product
    impact: The company may need to bundle adjacent workflows such as SAR prep, travel-rule evidence, or post-freeze recovery tracking sooner than planned.
    sourceRefs:
