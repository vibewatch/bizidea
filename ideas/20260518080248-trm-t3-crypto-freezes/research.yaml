    - 26
  validationPlan:
  - priority: high
    question: How many urgent freeze or restriction cases does a mid-tier issuer or custodial platform actually process per quarter?
    evidenceToGather: Customer interviews with compliance leads plus anonymized case-volume exports from early design partners.
  - priority: high
    question: Which system currently owns the final approval before a freeze is executed?
    evidenceToGather: Process maps from issuers, custodians, and exchanges showing legal, compliance, and platform sign-off steps.
  - priority: medium
    question: 'Which integrations are mandatory on day one: analytics, wallet infrastructure, ticketing, or law-enforcement portals?'
    evidenceToGather: Implementation interviews with teams using TRM, Chainalysis, Circle Wallets, BitGo, Fireblocks, or internal admin tooling.
  - priority: medium
    question: Will buyers accept a dedicated product or insist on a bundled AML suite?
    evidenceToGather: Procurement feedback from active issuer and custody buyers plus competitor displacement interviews.
