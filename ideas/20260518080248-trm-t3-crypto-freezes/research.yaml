  sourceRefs:
  - 12
- point: Circle now sells programmable compliance checks, blocklists, and reporting inside its wallet stack, validating demand for operational control layers.
  sourceRefs:
  - 17
- point: OKX described the $225 million freeze as a months-long coordinated investigation, confirming the workflow is complex and multi-party.
  sourceRefs:
  - 28
openQuestions:
- How many urgent freeze or restriction cases does a realistic design-partner issuer handle each month, and how many involve outside counsel or law enforcement?
- Will early buyers prefer a neutral layer that works across TRM, Chainalysis, and internal tools, or a bundled workflow from one incumbent?
- 'Which control points matter most beyond USDT and USDC: exchange balances, custodial wallets, smart-contract admin controls, or banking interfaces?'
- What proof of legal defensibility is required before a customer will let the product sit in the approval path for a real freeze?
