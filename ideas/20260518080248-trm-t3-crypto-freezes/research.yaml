    - 16
    - 27
  geographicConsiderations:
  - point: The U.S. is the clearest anchor market because OFAC, Treasury, DOJ, and FinCEN actions create frequent, high-stakes response requirements.
    sourceRefs:
    - 2
    - 13
    - 14
    - 15
  - point: Europe matters because MiCA forces stablecoin issuers to show formal controls and ongoing risk management to regulators.
    sourceRefs:
    - 19
    - 26
  - point: Cross-border scam and laundering cases touching Brazil, APAC, and other jurisdictions make multilingual, multi-authority workflow support important early.
    sourceRefs:
    - 12
    - 16
    - 30
  sensitivityCases:
  - case: TRM or Chainalysis expands from tracing into full freeze orchestration
    impact: The startup must position as a neutral system of record and workflow layer across multiple analytics vendors rather than a direct tracing replacement.
    sourceRefs:
