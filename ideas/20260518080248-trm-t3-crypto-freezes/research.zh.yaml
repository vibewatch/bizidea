  - case: 买家更倾向于宽泛的 AML 套件而非专项冻结产品
    impact: 公司可能需要比计划更早捆绑制裁报告准备、行程规则证据或冻结后追回跟踪等相邻工作流。
    sourceRefs:
    - 20
