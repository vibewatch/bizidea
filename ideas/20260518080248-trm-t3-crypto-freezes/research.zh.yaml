  - case: 监管方或客户在每次冻结前要求更多文件记录
    impact: 销售紧迫性上升，但工作流深度、法律审查支持和实施复杂度也同步增加。
    sourceRefs:
    - 15
    - 19
    - 26
  validationPlan:
  - priority: high
    question: 中端发行商或托管平台实际每季度处理多少起紧急冻结或限制案件？
    evidenceToGather: 与合规负责人进行客户访谈，加上早期共创客户的匿名案件量导出。
  - priority: high
    question: 哪个系统目前拥有冻结执行前的最终审批权？
    evidenceToGather: 来自发行商、托管方和交易所的流程图，展示法律、合规和平台签字步骤。
  - priority: medium
    question: "第一天哪些集成是必须的：分析工具、钱包基础设施、工单系统，还是执法机构门户？"
    evidenceToGather: 与使用 TRM、Chainalysis、Circle Wallets、BitGo、Fireblocks 或内部管理工具的团队进行实施访谈。
  - priority: medium
    question: 买家是否会接受专项产品，还是坚持要求捆绑的 AML 套件？
    evidenceToGather: 来自活跃发行商和托管方买家的采购反馈，以及竞争替换访谈。
