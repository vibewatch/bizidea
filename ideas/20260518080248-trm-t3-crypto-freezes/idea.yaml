problem: >-
  Stablecoin issuers and custodial crypto platforms increasingly have the technical ability to freeze funds, but most still
  run the actual workflow through spreadsheets, email threads, chain-analysis screenshots, and outside counsel. When an
  account takeover or urgent law-enforcement request lands, teams must identify the wallet, confirm authority, trigger the
  freeze fast enough to matter, and preserve a defensible case record across jurisdictions. Detection tooling exists, but
  the operational layer for freeze execution, approvals, and audit-ready case management is missing.
targetUser:
  primary: Financial-crime operations leads at stablecoin issuers and custodial wallet platforms that can freeze or restrict assets on-chain
  secondary: Legal operations managers and investigations teams handling inbound law-enforcement requests
  buyer: Chief Compliance Officer, MLRO, or General Counsel at a stablecoin issuer or custodial crypto platform
startupThesis:
  nonObviousInsight: >-
    The bottleneck in crypto financial-crime response is shifting from tracing illicit wallets to executing and documenting
    freezes fast enough across multiple actors once tracing confidence exists. As issuers gain practical freeze power, the
    scarce product becomes operational coordination and evidence control, not another analytics dashboard.
  beachhead: >-
    Stablecoin issuers and custodial wallet providers with meaningful TRON or other high-velocity stablecoin exposure that
    already receive urgent fraud, sanctions, or law-enforcement escalation requests but still manage freeze operations
    manually
  wedge: >-
    A freeze-response operating layer that turns a traced wallet into an approval-gated case, routes issuer and legal
    actions, triggers the freeze workflow, and compiles a jurisdiction-ready evidence packet in one system
  whyNowCatalyst: >-
    TRM, Tether, and TRON publicly showing 24-hour freeze capability, $450 million in frozen funds, and coordination across
    23 jurisdictions makes freeze-operations software newly urgent for any issuer that wants to look credible to partners
    and regulators.
  ventureScalePath: >-
    Start with urgent freeze execution for stablecoin issuers, then expand into broader crypto investigations, sanctions
    operations, recovery workflows, counterparty-risk decisioning, and the system of record for asset-control actions
    across issuers, custodians, exchanges, and tokenized-finance platforms.
solution: >-
  Build a case-management and execution platform for crypto asset-control teams. The product ingests a traced wallet or
  inbound request, creates a structured case file, checks required authority and urgency, and routes approvals to
  compliance, legal, and issuer operators before the freeze step is triggered. It maintains a timeline of wallet
  intelligence, requested actions, freeze status, counterparties, and outbound communications so teams can show exactly why
  they acted and who approved it. Customers start with urgent stablecoin freeze workflows, then add recurring templates for
  account takeovers, sanctions hits, exchange escalations, and law-enforcement requests. The goal is not to replace chain
  analytics, but to turn detected risk into fast, consistent, reviewable operational action.
goToMarketSeed:
  firstCustomer: >-
    A dollar-stablecoin issuer or custodial wallet platform with a lean compliance team, recurring TRON-based fraud
    exposure, and direct responsibility for freezing or restricting suspicious wallets
  buyingTrigger: >-
    A spike in urgent fraud cases, a new banking or exchange partner diligence process, or a high-profile incident that
    forces the issuer to prove it can freeze and document actions within hours
  currentAlternative: Manual workflow across chain-analytics dashboards, spreadsheets, email, ticketing tools, outside counsel, and internal runbooks
  switchingReason: >-
    Existing analytics tools help teams find bad flows, but they do not provide the approval chain, action routing, and
    case evidence package needed to execute freezes quickly and defend the decision later.
  pricingHypothesis: Annual platform subscription priced by investigation team size and monthly case volume, with premium modules for law-enforcement portals and audit exports
