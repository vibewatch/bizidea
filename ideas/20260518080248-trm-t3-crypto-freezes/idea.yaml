topRisks:
  - name: Incumbent adjacency
    description: Chain-analytics vendors or large issuers may extend from alerting into basic case management and freeze tooling.
    mitigation: Start with cross-party orchestration and evidence workflows that sit above analytics tools, then become the neutral system of record across multiple vendors.
  - name: Customer concentration
    description: The first beachhead includes a relatively small set of sophisticated issuers and custodial platforms with direct freeze authority.
    mitigation: Target mid-market and fast-growing platforms first, then expand into exchanges, custodians, tokenized-asset issuers, and service providers that coordinate the same workflow.
  - name: Wrongful-freeze liability
    description: If the product contributes to freezing the wrong wallet or acting on weak authority, customers may face legal and reputational blowback.
    mitigation: Keep humans in the approval loop, require authority checks and evidence thresholds before action, and position the system as controlled execution software rather than autonomous enforcement.
