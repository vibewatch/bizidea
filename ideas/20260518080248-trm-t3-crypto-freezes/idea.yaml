jobsToBeDone:
  - job: >-
      When an urgent illicit-flow alert hits, help our compliance team freeze the right wallet fast and document every
      approval, so we can stop losses without creating legal exposure.
    currentAlternative: Manual escalation through analytics dashboards, spreadsheets, chat, and counsel review
    successMetric: Time from case creation to freeze action and percentage of cases with complete approval records
  - job: >-
      When law enforcement asks what action we took on a suspicious wallet, help our investigations team deliver a
      jurisdiction-ready case packet, so we can respond credibly without reconstructing the timeline by hand.
    currentAlternative: Email searches, screenshot collection, and ad hoc memo writing
    successMetric: Hours to produce a complete case dossier and number of missing evidence artifacts
