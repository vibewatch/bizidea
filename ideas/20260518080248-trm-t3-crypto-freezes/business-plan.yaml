slug: stablecoin-freeze-ops
date: '2026-05-18'
executiveSummary: >-
  Stablecoin issuers and custodial crypto platforms can already freeze assets, but many still execute urgent cases through analytics dashboards, spreadsheets, email, and counsel review. That creates a narrow but acute software wedge: the operational layer that turns a traced wallet into an approved, documented, and defensible freeze within hours. The first customer is a mid-market stablecoin issuer or custodial wallet platform with direct freeze authority, recurring TRON or USDT fraud exposure, and a lean compliance team that cannot afford incident chaos. The product should start as an approval-gated case workspace and evidence system of record, not as autonomous enforcement, because wrongful-freeze risk and legal authority checks are the main adoption blockers. Go-to-market works best as incident-led direct sales to CCO, MLRO, or General Counsel buyers, supported by referrals and integrations from analytics vendors already upstream of the alert. The market is real but concentrated: research models roughly $48.0M TAM, $16.2M SAM, and a $2.4M reachable Year-3 SOM for the initial freeze-orchestration category, so expansion into adjacent crypto investigations and asset-control workflows is required for venture scale. The main strategic risk is bundling from TRM, Chainalysis, or issuer-stack providers before a neutral system-of-record wedge is proven. Key gaps remain on actual quarterly case volume, the exact day-one integration stack, and whether buyers will fund a dedicated product versus a broader AML suite, so the first 12 months must focus on design-partner proof rather than broad market expansion.
problem:
  - Stablecoin issuers and custodial platforms increasingly need to freeze funds within 24 hours, but the execution path from alert to approved action is still manual, fragmented, and hard to audit.
  - High-stakes cases span compliance, legal, platform operations, analytics vendors, and law enforcement, yet most teams lack one system that records authority, approvals, evidence, and outbound actions across jurisdictions.
solution:
  - Deliver a crypto-native case-management layer that ingests a traced wallet or inbound request, routes authority checks and approvals, and maintains an immutable case timeline for every freeze or restriction action.
  - Start with manual-execution orchestration and jurisdiction-ready evidence packets, then add direct integrations into token-admin, wallet, and custody action systems for the highest-volume control points.
whyWeWin:
  - The wedge sits in the handoff incumbents do not fully own today: converting blockchain intelligence into approved, cross-functional, legally defensible action rather than another monitoring dashboard.
  - Each case can compound proprietary approval-path, response-time, and evidence-template data into a sticky workflow graph that is hard for generic AML tools or single-vendor stacks to replicate quickly.
strategicChoices:
  beachhead: Mid-market stablecoin issuers and custodial wallet platforms with meaningful USDT or USDC exposure, direct freeze authority, and recurring urgent fraud or sanctions escalations still handled manually.
  wedgeRationale: This segment feels incident urgency, partner-diligence pressure, and legal-review complexity in the same workflow, so one narrow product can produce visible time-to-freeze and auditability proof faster than selling a broad AML suite.
  sequencingRationale: The company should sell alert-to-approval orchestration and evidence control first, add direct execution integrations second, and expand into adjacent investigations only after buyers trust the product in the real approval path and reference accounts prove a neutral layer is worth buying.
  notYet:
    - Full tracing or transaction-monitoring replacement
    - Autonomous freeze execution without human approval
    - Broad retail-facing dispute recovery or generic banking AML workflow software
market:
  tam: $48.0M estimated TAM based on roughly 240 global buyers at about $200k ACV.
  sam: $16.2M estimated SAM based on roughly 90 high-urgency buyers with meaningful stablecoin scam-response exposure at about $180k ACV.
  som: $2.4M Year-3 reachable SOM based on 12 logos at roughly $200k ACV after incident-led landings and partner-led expansion.
  segments:
    - Stablecoin issuers and custodial wallet platforms with direct asset-restriction authority
    - Crypto exchanges, crypto banks, and tokenized-finance operators coordinating adjacent asset-control workflows
  buyingProcess: Compliance or investigations leadership typically starts the evaluation after an urgent case or partner diligence request exposes workflow gaps. The deal then requires legal, platform-operations, and security review before the economic buyer approves a narrow pilot tied to one incident workflow and explicit auditability outcomes.
product:
  mvp: >-
    MVP is an approval-gated freeze workspace that ingests alerts from existing analytics tools, enforces authority and evidence checklists, routes human approvals, and produces a jurisdiction-ready case packet. It should initially hand off execution to existing token-admin or custody systems rather than automate the freeze itself.
  sixMonth: Ship a design-partner product with alert intake, approval routing, evidence templates, SLA tracking, audit exports, and integrations to one analytics system plus one ticketing or case system.
  twelveMonth: Add direct integrations to the most common issuer or custody control points, reusable playbooks for account-takeover and sanctions cases, and benchmark reporting on response time and case completeness.
  twentyFourMonth: Expand into the broader system of record for asset-control actions across issuers, custodians, exchanges, and tokenized-finance platforms, including adjacent investigations, recovery tracking, and counterparty escalation workflows.
  keyBets:
    - Buyers will trust a human-in-the-loop approval layer before they trust autonomous freeze execution.
    - One analytics integration plus one downstream action integration will cover enough early cases to support repeatable pilots.
    - Neutral orchestration across multiple vendors will remain valuable even as tracing incumbents deepen workflow features.
gtm:
  wedge: Sell a narrow paid pilot around urgent freeze and restriction cases for one compliance team, one approval chain, and one downstream control point, triggered by a recent incident or partner diligence event.
  channels:
    - Direct outbound and founder-led sales to CCOs, MLROs, General Counsel, and heads of investigations after visible incident or diligence triggers
    - Integration and referral partnerships with TRM, Chainalysis, Elliptic, and adjacent investigations consultancies
    - Warm introductions from custody, wallet, and travel-rule compliance ecosystems already serving regulated VASPs
  funnelTargets: Alert-linked intro to qualified pilot 20-30%, qualified pilot to paid pilot 50%+, paid pilot to production workflow 60%+, first workflow to second workflow expansion 50%+ within 9 months.
  pricing: Annual subscription priced by investigation team size and case volume, plus implementation fees for integrations and workflow setup; this matches how customers budget for recurring incident-response capability rather than one-off investigations.
businessModel:
  revenueStreams:
    - Annual software subscription for approval routing, case records, and audit exports
    - Implementation and integration fees for analytics, custody, wallet, and ticketing connections
    - Premium modules for law-enforcement portals, jurisdiction-specific evidence templates, and benchmark reporting
  unitOfValue: Active freeze and restriction workflows managed with complete approval and evidence records
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one incident playbook into sanctions, exchange escalations, and post-freeze recovery workflows
    - Add second and third downstream control-point integrations within the same customer
    - Move from one issuer or custodial entity into additional business lines and geographies
strategyMap:
  northStarMetric: Monthly freeze or restriction cases completed within SLA with full approval and evidence records
  inputMetrics:
    - Median time from case creation to approved action
    - Percentage of cases with complete authority and evidence checklist
    - Paid pilot to production conversion rate
    - Number of integrated downstream control points per customer
    - Expansion from first workflow to second workflow inside each logo
  moatsToBuild:
    - Jurisdiction-specific evidence and escalation template library
    - Benchmark dataset on approval paths, response times, and case outcomes across asset-control workflows
    - Cross-vendor workflow graph linking analytics alerts, human approvals, and downstream enforcement actions
  killCriteria:
    - Fewer than 3 paid design partners after 9 months of focused selling into the beachhead
    - No pilot shows at least 50% faster case-to-action time or at least 90% case-record completeness versus the customer's manual baseline
    - More than half of qualified prospects insist on bundled incumbent workflow tools instead of a neutral orchestration layer
  mermaid: |
    flowchart LR
      Wedge[Urgent freeze-response pilot] --> MVP[Approval and evidence MVP]
      MVP --> Proof[Faster defensible case handling]
      Proof --> Expansion[Broader asset-control system of record]
investorMemo:
  verdict:
    call: Watch
    conviction: Acute customer pain and a crisp workflow wedge are real, but conviction is limited by a concentrated buyer set and heavy bundling risk from analytics incumbents.
    whyBelieve: Public evidence shows freezes are frequent, urgent, multi-jurisdictional, and still operationally fragmented, creating a credible opening for a neutral execution layer.
    whyDoubt: The initial category is small and trust-heavy, and incumbents or issuer-stack vendors may absorb enough of the workflow before an independent startup establishes reference customers.
    nextDiligence: Verify with three design-partner prospects that a paid pilot tied to one freeze workflow can materially improve response time and auditability enough to win budget now rather than after incumbent bundling.
  firstCustomer:
    title: Compliance lead at a mid-market stablecoin issuer or custodial wallet platform
    profile: A regulated crypto operator with direct token or wallet restriction authority, recurring scam or sanctions escalations, existing analytics tooling, and a lean team still coordinating freezes through tickets, email, and counsel.
    trigger: A recent urgent fraud or sanctions case, or a partner diligence request that forces the company to prove it can freeze and document action within hours.
    buyer: Chief Compliance Officer, MLRO, or General Counsel
    initialContract: $60k-$120k paid pilot for one workflow and core integrations, converting to roughly $150k-$250k ARR once the product sits in the production approval path for multiple case types.
  mustBeTrue:
    - Mid-tier issuers and custodial platforms process enough urgent freeze cases each quarter to justify a dedicated budget line.
    - Buyers prefer a neutral orchestration layer across analytics and control systems over waiting for one incumbent to bundle the workflow.
    - Human-in-the-loop approvals and evidence templates reduce adoption friction enough for the product to sit in real production cases.
    - One or two downstream control-point integrations cover most early production demand.
    - Adjacent workflows beyond urgent freezes are close enough to support expansion after the beachhead is proven.
  diligenceQuestions:
    - How many freeze or restriction cases per month does the target design partner actually handle today?
    - Which person or system owns final approval before a freeze is executed in the current workflow?
    - Which integration is mandatory on day one for a pilot to be credible?
    - What proof would make a buyer choose a dedicated product instead of an incumbent AML suite?
    - How often do cases require multi-jurisdiction evidence packaging rather than a single internal memo?
operatingAssumptions:
  - assumption: Beachhead buyers have repeated enough urgent cases to justify a recurring annual software contract rather than consulting spend.
    basis: research.yaml
    validationTest: Interview at least 12 target buyers and confirm at least 6 process monthly or quarterly incident volume high enough to fund a paid pilot from an operating budget.
    decisionImpact: If false, narrow to higher-volume issuers or reposition as services-led software for the most acute customers only.
  - assumption: The first pilot can deliver measurable value without owning the actual freeze action system on day one.
    basis: operator judgment
    validationTest: Run two workflow-mapping sessions and one prototype review where buyers agree that approval routing, evidence control, and audit exports are enough to start a pilot before direct execution integration.
    decisionImpact: If false, the roadmap must prioritize direct issuer or custody integrations earlier and capital needs increase.
  - assumption: A neutral layer across TRM, Chainalysis, and internal tooling is more valuable than a single-incumbent workflow for early buyers.
    basis: research.yaml
    validationTest: In 10 sales conversations, confirm at least 5 qualified prospects actively use or expect to use multiple systems in the approval path.
    decisionImpact: If false, partner tightly with one ecosystem instead of building a broad multi-vendor control plane.
  - assumption: Wrongful-freeze liability can be contained with human approvals, authority checks, and strong evidence retention.
    basis: idea.yaml
    validationTest: Review the proposed workflow with three legal or compliance buyers and confirm they would allow the product into the approval path if it preserves explicit sign-off and case records.
    decisionImpact: If false, the company must stay outside the critical approval path and sell reporting or post-incident tooling instead.
  - assumption: Expansion into adjacent investigations and asset-control workflows is necessary because the initial freeze-orchestration market is too small on its own.
    basis: research.yaml
    validationTest: Validate with design partners that at least two adjacent workflows share the same buyer and enough underlying data model to cross-sell within 12 months.
    decisionImpact: If false, investor fit weakens and the company should be financed as a niche compliance software business rather than a venture-scale platform.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 compliance, legal, and investigations leaders at stablecoin issuers and custodial platforms about current freeze workflows.
    hypothesis: The strongest buying trigger is an urgent incident or partner diligence event that exposes manual approval and evidence gaps.
    successMetric: At least 10 interviews confirm the same trigger and 5 share a current-state workflow map.
    owner: CEO
  - horizon: 0–90 days
    experiment: Prototype alert-to-approval case intake with authority checklist, evidence packet, and audit export using sample data from one design partner.
    hypothesis: Buyers will view the approval and documentation layer as valuable even before direct execution integration is live.
    successMetric: Two design-partner prospects rate the prototype as sufficient for a paid pilot and identify fewer than 10 blocking gaps.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run two paid pilots for one urgent freeze workflow each with explicit baseline and post-deployment SLA measurement.
    hypothesis: A narrow workflow pilot can materially reduce time-to-action and improve case completeness versus the manual baseline.
    successMetric: Two paid pilots signed and at least one shows 50% faster median case handling or 90% complete case records.
    owner: CEO
  - horizon: 90–180 days
    experiment: Build the highest-frequency downstream integration chosen by early pilots and measure pilot conversion lift.
    hypothesis: One direct control-point integration will materially improve production conversion versus orchestration-only deployments.
    successMetric: Production conversion improves to at least 60% once the integration is live.
    owner: Founding eng
  - horizon: 180–360 days
    experiment: Launch one formal referral or co-sell motion with an upstream analytics or compliance partner.
    hypothesis: Partner-led trust transfer shortens enterprise sales cycles in a concentrated market.
    successMetric: One signed partner motion produces at least 3 qualified pilot opportunities.
    owner: CEO
  - horizon: 180–360 days
    experiment: Expand the strongest customer from urgent freezes into one adjacent workflow such as sanctions escalations or post-freeze recovery tracking.
    hypothesis: The same buyer and data model support credible expansion beyond the initial beachhead.
    successMetric: One customer adopts a second workflow within 6 months of first production use.
    owner: Product lead
operations:
  - Maintain case schemas, authority checklists, and evidence templates for each supported jurisdiction and workflow.
  - Integrate upstream analytics alerts and downstream token-admin or custody action systems without replacing the customer's existing monitoring stack.
  - Provide premium incident support and postmortem reviews during urgent cases to turn services work into reusable playbooks.
  - Keep customers responsible for final legal authority and enforcement decisions while the product owns orchestration, records, and auditability.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the case model, workflow engine, integrations, and audit exports that define the wedge.
  - role: Product and compliance lead
    startTiming: Month 0
    rationale: Translates legal, investigations, and issuer-control requirements into workflows buyers will trust in production.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Reduces implementation drag, productizes customer-specific variations, and accelerates pilot deployment.
  - role: Crypto compliance seller
    startTiming: Month 6
    rationale: Adds domain-credible outbound capacity once the first pilot conversion pattern is visible.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Formalizes upstream analytics and custody ecosystem channels after the product has a referenceable workflow and integration story.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 design partners in the stablecoin issuer and custodial wallet beachhead
      - Ship alert intake, approval routing, audit exports, and the first downstream control-point integration
      - Convert 2 paid pilots into production workflows with measured SLA improvement
      - Publish defensible case studies on response-time and case-completeness gains
  - horizon: 12–24 months
    items:
      - Add reusable playbooks for sanctions, exchange escalations, and post-freeze recovery tracking
      - Expand within existing logos to second workflows or additional entities
      - Establish 2 partner-led distribution motions with analytics or custody ecosystems
      - Reach a repeatable implementation model with lower services intensity per deployment
  - horizon: 24–36 months
    items:
      - Become the system of record for asset-control actions across multiple crypto control points
      - Launch benchmark reporting products based on response-time and case-pattern data
      - Expand beyond the initial issuer beachhead into adjacent exchanges, crypto banks, and tokenized-finance operators
      - Prove whether the category can support a larger investigations and asset-governance platform
risks:
  - risk: TRM, Chainalysis, Elliptic, or issuer-stack vendors may bundle enough workflow to collapse the standalone wedge.
    likelihood: High
    impact: High
    mitigation: Win on neutral orchestration across multiple systems, faster deployment, and production-grade evidence workflows rather than tracing depth.
  - risk: The initial buyer universe may be too small and concentrated to support efficient venture-scale growth.
    likelihood: High
    impact: High
    mitigation: Use the beachhead only to prove a broader asset-control platform and demand early evidence that adjacent workflows share the same buyer and data model.
  - risk: Buyers may refuse to place a startup in the approval path for real freezes because wrongful-freeze liability is too sensitive.
    likelihood: Medium
    impact: High
    mitigation: Keep explicit human approvals, authority checks, and detailed case records, and start with orchestration before direct action control.
  - risk: Integration complexity into token-admin, custody, and internal case systems could make deployments too services-heavy.
    likelihood: Medium
    impact: Medium
    mitigation: Standardize the first integration stack, prioritize the highest-frequency control points, and add solutions talent only after early pilots.
  - risk: Buyers may choose a broader AML suite or postpone purchase until they can buy the workflow from an incumbent.
    likelihood: Medium
    impact: High
    mitigation: Tie pilots to measurable incident-response outcomes and sell immediately after visible incident or diligence triggers.
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the first 3 design partners, one to two core integrations, legal and compliance product depth, initial partner-led distribution, and enough production proof to determine whether the wedge can expand beyond a concentrated initial market.
