scenarios:
  downside:
    description: Slower trust-building, lower realized ACV, and more manual case work keep the company below the planned Y3 logo count and gross margin.
    y3RevenueK: 1500.0
    y3EbitdaK: -1050.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - Y2 and Y3 additions slip from 8 new logos to roughly 5 net new logos after Y1.
      - Blended Y3 ARPU lands closer to $170K instead of $200K because more accounts stay in pilot scope.
      - Gross margin exits near 68% because evidence packaging and integration work stay services-heavy.
  base:
    description: The company lands four paid logos in Y1, reaches eight by the end of Y2, and expands to twelve by the end of Y3 while gross margin rises above the 70% target.
    y3RevenueK: 2000.0
    y3EbitdaK: -684.0
    cashLowPointK: 606.97
    keyAssumptionChanges:
      - Customer adds follow A4 through A6 and end at 12 logos in Q4Y3.
      - Blended annual ARPU ramps from $90K in Y1 pilots to $200K in Y3 production accounts.
      - Gross margin improves from 45%-64% in Y1 to 72%-73% in Y3 as playbooks and integrations standardize.
  upside:
    description: Partner referrals activate earlier, production conversions compress the sales cycle, and add-on workflows push monetization toward the top of the researched ACV range.
    y3RevenueK: 2550.0
    y3EbitdaK: -250.0
    cashLowPointK: 880.0
    keyAssumptionChanges:
      - The company exits Y3 with roughly 14 logos instead of 12 because partner-sourced deals convert faster.
      - Blended Y3 ARPU reaches about $215K as more customers buy second workflows and implementation fees.
      - Gross margin exits near 75% because integration reuse reduces manual services load.
sensitivity:
  - variable: ARPU
    downsideCase: $170K annual ARPU in Y3
    baseCase: $200K annual ARPU in Y3
    upsideCase: $215K annual ARPU in Y3
    y3RevenueImpactK: -300.0
    cashImpactK: -220.0
  - variable: CAC
    downsideCase: $190K CAC as deals require more bespoke legal and founder time
    baseCase: $147.5K CAC
    upsideCase: $120K CAC via partner-sourced intros
    y3RevenueImpactK: -60.0
    cashImpactK: -340.0
  - variable: churn
    downsideCase: 2.5% monthly churn
    baseCase: 1.5% monthly churn
    upsideCase: 1.0% monthly churn
    y3RevenueImpactK: -140.0
    cashImpactK: -105.0
  - variable: sales cycle
    downsideCase: 9-month average pilot-to-production cycle
    baseCase: ~6-month blended cycle
    upsideCase: 4-5 month cycle with incident-led urgency and partner trust transfer
    y3RevenueImpactK: -360.0
    cashImpactK: -290.0
  - variable: gross margin
    downsideCase: 68% steady-state gross margin
    baseCase: 73% steady-state gross margin
    upsideCase: 75% steady-state gross margin
    y3RevenueImpactK: 0.0
    cashImpactK: -130.0
  - variable: hiring pace
    downsideCase: Add compliance ops and the second seller two quarters earlier than modeled
    baseCase: Keep late-stage hires until Y3 proof is visible
    upsideCase: Delay the second seller until after 12 logos are active
    y3RevenueImpactK: -40.0
    cashImpactK: -170.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      IncidentTrigger --> QualifiedPilot
      QualifiedPilot --> ProductionCustomer
      ProductionCustomer --> SubscriptionAndImplementationRevenue
      SubscriptionAndImplementationRevenue --> GrossProfit
      GrossProfit --> OperatingCash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by growing from 4 paid logos at the end of Y1 to 12 by Q4Y3 while blended ARPU rises from pilot pricing to about $200K production ACV.
  - checkName: Must go right
    finding: The model needs partner-assisted production conversion to keep the sales cycle near six months, because sensitivity shows slower conversion is the biggest Y3 revenue drag.
  - checkName: Model breaks if
    finding: The downside case appears if buyers keep more work in bespoke legal review, which pushes gross margin toward 68%, CAC toward $190K, and the cash low point toward roughly $140K.
  - checkName: Next-round proof
    finding: The next financing is justified by exiting Y2 with 8 production logos, 70%+ gross margin, and at least one partner-sourced expansion path that proves the wedge can move beyond founder-led selling.
sanityChecks:
  ruleOf40: Y3 growth 98.84% + EBITDA margin -34.20% = 64.64%
  burnMultiple: Y2 burn multiple 1.41x, improving to 0.66x in Y3 on exit ARR basis.
  revenuePerFte: $200K Y3 on 10 exit FTE (benchmark $200-400K SaaS)
  flags:
    - The model reaches the researched SOM only by closing 12 logos in a concentrated market, so a few lost enterprise deals move the Y3 outcome materially.
    - Revenue per exit FTE sits at the low end of healthy SaaS benchmarks because the company still carries workflow, compliance, and integration labor rather than a purely software-delivery model.
    - Gross margin clears the business-plan target only if evidence templates and downstream integrations become reusable; continued bespoke implementation would pressure both EBITDA and runway.
    - The $3.2M ask is near the middle of the stated seed range because trust-heavy enterprise sales and regulated onboarding lengthen CAC payback versus a typical horizontal SaaS motion.
