slug: stablecoin-freeze-ops
date: '2026-05-18'
executiveSummary: >-
  稳定币发行商和托管加密平台已具备冻结资产的能力，但许多仍通过分析仪表盘、电子表格、邮件和法律顾问审查来处理紧急案件。
  这造就了一个窄而尖锐的软件切口：将已追踪钱包转化为数小时内完成审批、留存记录、站得住脚的冻结操作层。
  首批客户是中端市场稳定币发行商或托管钱包平台——拥有直接冻结权限、持续面临 TRON 或 USDT 欺诈敞口、合规团队精简，无法承受事件混乱。
  产品应当从审批把关的案件工作区和证据记录系统起步，而非自主执法——因为错误冻结风险和法律授权核查是主要的采购阻力。
  GTM 打法最优先是事件驱动的直销，面向 CCO、反洗钱合规官或法务总顾问买家，辅以分析工具商的转介和集成合作。
  市场真实但集中：研究模型显示，初始冻结协调品类的 TAM 约 $48.0M、SAM 约 $16.2M、第 3 年可触达 SOM 约 $2.4M，
  因此扩展至相邻加密调查和资产管控工作流是实现创投规模的必要条件。
  主要战略风险是 TRM、Chainalysis 或发行商技术栈提供商的捆绑销售——在中立记录系统切口被证实之前就把市场吃掉。
  关键信息缺口仍在：实际季度案件量、第一天的集成栈，以及买家是否愿意为专项产品而非更广泛的 AML 套件买单；
  因此前 12 个月必须聚焦共创客户验证，而非大范围市场扩张。
problem:
  - 稳定币发行商和托管平台日益需要在 24 小时内冻结资金，但从告警到批准行动的执行路径仍然手动、碎片化、难以审计。
  - 高风险案件横跨合规、法律、平台运营、分析工具商和执法机构，但大多数团队没有一个系统能跨司法管辖区记录授权、审批、证据和对外行动。
solution:
  - 提供一个加密原生案件管理层，接收已追踪的钱包或来函请求，路由授权核查和审批，并为每次冻结或限制行动维护不可篡改的案件时间线。
  - 先从手动执行协调和符合司法管辖区要求的证据包起步，再为最高频管控点添加直接接入代币管理、钱包和托管行动系统的集成。
whyWeWin:
  - 切口正好落在现有厂商尚未完全拥有的交接点上：把区块链情报转化为经审批、跨职能、有法律依据的行动，而非又一个监控仪表盘。
  - 每个案件都能将专有的审批路径、响应时间和证据模板数据沉淀成粘性工作流图谱，这是通用 AML 工具或单一厂商技术栈难以快速复制的。
strategicChoices:
  beachhead: 拥有大量 USDT 或 USDC 敞口、直接冻结权限、以及持续面临紧急欺诈或制裁升级但仍靠手动处理的中端市场稳定币发行商和托管钱包平台。
  wedgeRationale: 这一细分群体在同一个工作流中同时感受到事件紧迫性、合作伙伴尽调压力和法律审查复杂性，一款窄产品就能比销售宽泛的 AML 套件更快交出可见的冻结速度和可审计性证明。
  sequencingRationale: 公司应当先卖告警到审批的协调和证据管控，再添加直接执行集成，只有当买家信任该产品已进入真实审批路径、参考客户也证明中立层值得购买之后，才扩展至相邻调查。
  notYet:
    - 完整的追踪或交易监控替代
    - 无人工审批的自主冻结执行
    - 面向零售用户的争议恢复或通用银行 AML 工作流软件
market:
  tam: 基于全球约 240 个买家、每家约 $200k ACV，估算 TAM 为 $48.0M。
  sam: 基于约 90 个高紧迫性买家（具有大量稳定币欺诈响应敞口）、每家约 $180k ACV，估算 SAM 为 $16.2M。
  som: 基于事件驱动落地和合作伙伴驱动扩张后、第 3 年 12 个客户约 $200k ACV，可触达 SOM 为 $2.4M。
  segments:
    - 拥有直接资产限制权限的稳定币发行商和托管钱包平台
    - 协调相邻资产管控工作流的加密交易所、加密银行和代币化金融运营商
  buyingProcess: 合规或调查负责人通常在紧急案件或合作伙伴尽调请求暴露工作流缺口后启动评估。交易随后需要法律、平台运营和安全审查，经济买家才会批准一个与单一事件工作流和明确可审计性目标挂钩的窄范围试点。
product:
  mvp: >-
    MVP 是一个审批把关的冻结工作区，接收来自现有分析工具的告警，强制执行授权和证据核查清单，
    路由人工审批，并生成符合司法管辖区要求的案件档案。初期应将执行移交给现有代币管理或托管系统，
    而非自动化冻结本身。
  sixMonth: 为共创客户交付具备告警接收、审批路由、证据模板、SLA 跟踪、审计导出功能的产品，并完成一个分析系统和一个工单或案件系统的集成。
  twelveMonth: 添加到最常见发行商或托管管控点的直接集成、账户盗用和制裁案件的可复用操作手册，以及响应时间和案件完整性的基准报告。
  twentyFourMonth: 扩展成跨发行商、托管方、交易所和代币化金融平台资产管控行动的系统级记录源，包括相邻调查、追回跟踪和交易对手升级工作流。
  keyBets:
    - 买家在信任自主冻结执行之前，会先信任人工审批层。
    - 一个分析集成加一个下游行动集成就能覆盖足够多的早期案件，支撑可复制的试点。
    - 跨多家工具商的中立协调，即便追踪工具商深化工作流功能，也仍然有价值。
gtm:
  wedge: 围绕一个合规团队、一条审批链和一个下游管控点的紧急冻结和限制案件，由最近的事件或合作伙伴尽调事件触发，销售窄范围付费试点。
  channels:
    - 在可见事件或尽调触发后，向 CCO、反洗钱合规官、法务总顾问和调查负责人直接外呼、创始人主导销售
    - 与 TRM、Chainalysis、Elliptic 及相邻调查咨询公司建立集成和转介合作
    - 来自已服务受监管 VASP 的托管、钱包和行程规则合规生态的温热引荐
  funnelTargets: 告警关联引入到合格试点 20–30%，合格试点到付费试点 50% 以上，付费试点到生产工作流 60% 以上，首个工作流到第二个工作流扩展在 9 个月内 50% 以上。
  pricing: 按调查团队规模和案件量收取年度订阅费，加上分析、托管、钱包和工单连接的实施和集成费用；这与客户将循环事件响应能力而非一次性调查列入预算的方式相符。
businessModel:
  revenueStreams:
    - 审批路由、案件记录和审计导出的年度软件订阅
    - 分析、托管、钱包和工单连接的实施和集成费用
    - 执法机构门户、司法管辖区专属证据模板和基准报告的高级模块
  unitOfValue: 以完整审批和证据记录管理的有效冻结和限制工作流数量
  targetGrossMarginPct: 70
  expansionLevers:
    - 从一个事件操作手册扩展至制裁、交易所升级和冻结后追回工作流
    - 在同一客户内添加第二和第三个下游管控点集成
    - 从一个发行商或托管实体扩展至更多业务线和地区
strategyMap:
  northStarMetric: 每月在 SLA 内完成并具备完整审批和证据记录的冻结或限制案件数
  inputMetrics:
    - 从案件创建到审批行动的中位时间
    - 具备完整授权和证据核查清单的案件比例
    - 付费试点到生产的转化率
    - 每个客户集成的下游管控点数量
    - 每个客户从首个工作流扩展至第二个工作流
  moatsToBuild:
    - 司法管辖区专属证据和升级模板库
    - 跨资产管控工作流的审批路径、响应时间和案件结果基准数据集
    - 连接分析告警、人工审批和下游执法行动的跨工具商工作流图谱
  killCriteria:
    - 专注定向滩头市场销售 9 个月后，付费共创客户少于 3 个
    - 没有试点显示案件到行动时间至少缩短 50%，或案件记录完整度至少达到 90%（相比客户手动基线）
    - 超过半数合格潜在客户坚持使用捆绑式现有厂商工作流工具，而非中立协调层
  mermaid: |
    flowchart LR
      Wedge[Urgent freeze-response pilot] --> MVP[Approval and evidence MVP]
      MVP --> Proof[Faster defensible case handling]
      Proof --> Expansion[Broader asset-control system of record]
investorMemo:
  verdict:
    call: Watch
    conviction: 客户痛点真实、工作流切口清晰，但集中的买家群体和分析工具商的捆绑风险限制了当前的确信度。
    whyBelieve: 公开证据表明冻结频繁、紧迫、跨司法管辖区、且运营仍然碎片化，为中立执行层提供了可信的切入机会。
    whyDoubt: 初始品类规模小、信任建立耗时，现有厂商或发行商技术栈提供商可能在独立创业公司建立参考客户之前就把足够多的工作流吸收掉。
    nextDiligence: 与三个共创客户候选方核实：一个与单一冻结工作流挂钩的付费试点，能否足以改善响应时间和可审计性，以便在现有厂商捆绑之前就赢得预算。
  firstCustomer:
    title: 中端市场稳定币发行商或托管钱包平台的合规负责人
    profile: 一家拥有直接代币或钱包限制权限的受监管加密运营商，持续面临诈骗或制裁升级，已有分析工具，但团队仍通过工单、邮件和法律顾问协调冻结。
    trigger: 最近一起紧急欺诈或制裁案件，或合作伙伴尽调请求迫使公司证明能在数小时内完成冻结并留存记录。
    buyer: 首席合规官、反洗钱合规官或法务总顾问
    initialContract: "$60k–$120k 的单工作流核心集成付费试点，一旦产品进入多类案件生产审批路径，转化为约 $150k–$250k ARR。"
  mustBeTrue:
    - 中端发行商和托管平台每季度处理的紧急冻结案件量，足以支撑一条专项预算线。
    - 买家更倾向于跨分析和管控系统的中立协调层，而非等待某家现有厂商把工作流捆绑进来。
    - 人工审批和证据模板足以降低采购阻力，让产品真正进入生产案件的审批路径。
    - 一两个下游管控点集成能覆盖大多数早期生产需求。
    - 超出紧急冻结的相邻工作流足够接近，可在滩头被证实后支撑扩张。
  diligenceQuestions:
    - 目标共创客户每月实际处理多少起冻结或限制案件？
    - 当前工作流中，谁或哪个系统在冻结执行前拥有最终审批权？
    - 哪个集成是第一天试点可信的必要条件？
    - 什么样的证明会让买家选择专项产品而非现有 AML 套件？
    - 多频次案件需要跨司法管辖区证据打包，而非单一内部备忘录？
operatingAssumptions:
  - assumption: 滩头买家已有足够多的重复紧急案件，值得签一份循环年度软件合同，而非咨询支出。
    basis: research.yaml
    validationTest: 访谈至少 12 个目标买家，确认至少 6 个处理的月度或季度事件量足以从运营预算中拨出付费试点。
    decisionImpact: 若不成立，则缩小至更高案件量的发行商，或将产品重新定位为仅针对最紧迫客户的服务主导型软件。
  - assumption: 首个试点可在第一天不拥有实际冻结行动系统的情况下交付可衡量价值。
    basis: operator judgment
    validationTest: 进行两次工作流梳理会议和一次原型评审，让买家认可在直接执行集成上线前，审批路由、证据管控和审计导出已足以启动试点。
    decisionImpact: 若不成立，路线图必须更早优先开发发行商或托管集成，资金需求也相应增加。
  - assumption: 跨 TRM、Chainalysis 和内部工具的中立层，对早期买家的价值高于单一厂商的工作流。
    basis: research.yaml
    validationTest: 在 10 次销售对话中，确认至少 5 个合格潜在客户在审批路径中确实使用或预期使用多个系统。
    decisionImpact: 若不成立，则与单一生态紧密合作，而非构建宽泛的多厂商管控平面。
  - assumption: 错误冻结的法律责任可通过人工审批、授权核查和完善的证据留存加以管控。
    basis: idea.yaml
    validationTest: 与三位法律或合规买家审查拟议工作流，确认若产品保留明确的签字授权和案件记录，他们会允许其进入审批路径。
    decisionImpact: 若不成立，公司必须留在关键审批路径之外，改为销售报告或事后工具。
  - assumption: 扩展至相邻调查和资产管控工作流是必要的，因为初始冻结协调市场本身规模太小。
    basis: research.yaml
    validationTest: 与共创客户核实，至少两个相邻工作流共享同一买家，且底层数据模型足以支撑在 12 个月内交叉销售。
    decisionImpact: 若不成立，投资方适配度减弱，公司应作为细分合规软件业务而非创投规模平台来融资。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈稳定币发行商和托管平台的 15 位合规、法律和调查负责人，了解当前冻结工作流。
    hypothesis: 最强的购买触发是暴露手动审批和证据缺口的紧急事件或合作伙伴尽调。
    successMetric: 至少 10 次访谈确认同一触发点，5 人分享当前状态的工作流图。
    owner: CEO
  - horizon: 0–90 天
    experiment: 使用一位共创客户的样本数据，原型化从告警到审批的案件接收，包含授权核查清单、证据包和审计导出。
    hypothesis: 买家在直接执行集成上线前，就会将审批和文档层视为有价值的产品。
    successMetric: 两位共创客户候选方将原型评为足以启动付费试点，且识别出的阻塞缺口少于 10 个。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 为各一个紧急冻结工作流运行两个付费试点，并设置明确的基线和部署后 SLA 测量。
    hypothesis: 一个窄范围工作流试点能相对于手动基线显著缩短行动时间并提高案件完整性。
    successMetric: 两个付费试点签约，且至少一个显示中位案件处理时间缩短 50% 或案件记录完整度达到 90%。
    owner: CEO
  - horizon: 90–180 天
    experiment: 构建早期试点选定的最高频下游集成，并测量试点转化的提升效果。
    hypothesis: 一个直接管控点集成将比仅有协调功能的部署显著提升生产转化率。
    successMetric: 集成上线后生产转化率提升至至少 60%。
    owner: 创始工程师
  - horizon: 180–360 天
    experiment: 与上游分析或合规合作伙伴启动一个正式的转介或联合销售动作。
    hypothesis: 合作伙伴信任背书在集中市场中能缩短企业销售周期。
    successMetric: 一个已签署的合作伙伴动作产生至少 3 个合格试点机会。
    owner: CEO
  - horizon: 180–360 天
    experiment: 将最强的客户从紧急冻结扩展至一个相邻工作流，如制裁升级或冻结后追回跟踪。
    hypothesis: 同一买家和数据模型支撑可信的初始滩头之外的扩张。
    successMetric: 一个客户在首次生产使用 6 个月内采用第二个工作流。
    owner: 产品负责人
operations:
  - 为每个支持的司法管辖区和工作流维护案件模式、授权核查清单和证据模板。
  - 集成上游分析告警和下游代币管理或托管行动系统，不替换客户现有的监控技术栈。
  - 在紧急事件中提供高级事件支持和事后复盘，将服务工作转化为可复用操作手册。
  - 让客户保留最终法律授权和执法决策的责任，产品负责协调、记录和可审计性。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 构建定义切口的案件模型、工作流引擎、集成和审计导出。
  - role: 产品与合规负责人
    startTiming: Month 0
    rationale: 将法律、调查和发行商管控要求转化为买家愿意在生产中信任的工作流。
  - role: 解决方案工程师
    startTiming: Month 4
    rationale: 降低实施阻力，将客户特定变化产品化，加速试点部署。
  - role: 加密合规销售
    startTiming: Month 6
    rationale: 在首个试点转化模式可见后，添加有领域可信度的对外销售能力。
  - role: 合作伙伴负责人
    startTiming: Month 9
    rationale: 在产品有可参考工作流和集成故事后，正式建立上游分析和托管生态渠道。
milestones:
  - horizon: 0–12 个月
    items:
      - 在稳定币发行商和托管钱包滩头市场签约 3 个共创客户
      - 交付告警接收、审批路由、审计导出和首个下游管控点集成
      - 将 2 个付费试点转化为具有可衡量 SLA 改善的生产工作流
      - 发布有响应时间和案件完整性提升数据的可信案例研究
  - horizon: 12–24 个月
    items:
      - 为制裁、交易所升级和冻结后追回跟踪添加可复用操作手册
      - 在现有客户内扩展至第二个工作流或更多实体
      - 与分析或托管生态建立 2 个合作伙伴主导的分发动作
      - 达成每次部署服务强度更低的可复制实施模型
  - horizon: 24–36 个月
    items:
      - 成为跨多个加密管控点资产管控行动的系统级记录源
      - 基于响应时间和案件模式数据推出基准报告产品
      - 从初始发行商滩头扩展至相邻交易所、加密银行和代币化金融运营商
      - 验证该品类是否能支撑更大的调查和资产治理平台
risks:
  - risk: TRM、Chainalysis、Elliptic 或发行商技术栈提供商可能捆绑足够多的工作流，让独立切口失去意义。
    likelihood: High
    impact: High
    mitigation: 靠跨多个系统的中立协调、更快的部署速度和生产级证据工作流取胜，而非拼追踪深度。
  - risk: 初始买家群体可能规模太小、过于集中，无法支撑高效的创投规模增长。
    likelihood: High
    impact: High
    mitigation: 仅将滩头用于证明更广泛的资产管控平台，并及早要求证据表明相邻工作流共享同一买家和数据模型。
  - risk: 买家可能因错误冻结责任过于敏感，拒绝让创业公司进入真实冻结的审批路径。
    likelihood: Medium
    impact: High
    mitigation: 保留明确的人工审批、授权核查和详细案件记录，从协调功能起步，先于直接行动管控。
  - risk: 接入代币管理、托管和内部案件系统的集成复杂度可能使部署过于服务密集。
    likelihood: Medium
    impact: Medium
    mitigation: 标准化首个集成栈，优先最高频管控点，仅在早期试点之后才增加解决方案人才。
  - risk: 买家可能选择更宽泛的 AML 套件，或推迟采购直到能从现有厂商处获得该工作流。
    likelihood: Medium
    impact: High
    mitigation: 将试点与可衡量的事件响应结果挂钩，并在可见事件或尽调触发后立即推进销售。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 个月资金覆盖首批 3 个共创客户、一到两个核心集成、法律和合规产品深度、初始合作伙伴分发，以及足够的生产验证，以判断切口能否超越集中的初始市场。
