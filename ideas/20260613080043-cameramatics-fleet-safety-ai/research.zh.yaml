      score: 4
      rationale: 企业车队集中、专业，而且习惯长采购周期；如果 ROI 不能直接映射到理赔、安全或合规结果，它们完全可以继续拖。
      sourceRefs:
      - 20
      - 23
      - 24
    threatOfEntrants:
      score: 3
      rationale: 做软件切进来并不难，但要把集成广度、安全领域信任、隐私治理和结果数据都跑起来，执行门槛并不低。
