slug: fleet-safety-evidence-os
date: '2026-06-13'
executiveSummary: >-
  Fleet Safety Evidence OS targets UK and Ireland parcel, utility, and
  gas-distribution fleets with 500-5,000 vehicles that already run camera
  telematics but still manage preventable-collision review in vendor portals,
  email, and spreadsheets. The immediate pain is not event capture; it is the
  backlog of coaching, claims, and compliance work that follows each risky
  event, especially in self-insured or high-deductible fleets where loss
  leakage hits operating profit directly. The MVP is a vendor-neutral workflow
  layer that ingests event clips and metadata from installed systems, ranks
  likely preventable incidents, assigns the right owner, and creates one
  auditable case record for coaching, claims, and compliance follow-through.
  The beachhead is intentionally narrow because preventable-collision review has
  a clear buyer, a hard budget trigger, and measurable proof points within one
  renewal cycle or one overloaded camera rollout. Go to market should start with
  founder-led direct sales into fleets already standardizing cameras, then add
  broker, insurer, and TPA referrals once the company can prove faster case
  closure and better claims defensibility. The strongest evidence is that
  enterprise fleets already budget for AI safety systems and that incumbents
  remain strongest at capture rather than cross-vendor downstream workflow. The
  biggest open questions are how many target fleets truly operate mixed camera
  estates and how much third-party API and clip portability incumbents allow in
  practice. If those assumptions hold, the company can build from a $65.3M
  beachhead SAM toward a broader fleet risk operations platform; if they do not,
  the business will need to narrow to specific ecosystems or move upmarket.
problem:
  - >-
    Fleet safety teams at multi-depot fleets receive more risky-event clips than
    they can review, route, and close, which delays coaching and leaves the
    highest-value incidents buried in vendor queues.
  - >-
    Claims, compliance, and operations teams still assemble evidence manually
    after collisions and near misses, which weakens preventability decisions,
    insurer negotiations, and audit readiness.
solution:
  - >-
    Ingest clips and metadata from existing telematics and camera systems into a
    shared case workflow that prioritizes likely preventable incidents and
    assigns actions by depot, driver, and manager.
  - >-
    Generate coaching packets, claims evidence files, and compliance records
    from the same case so fleets can prove intervention quality and reduce
    repeat losses without replacing installed hardware.
whyWeWin:
  - >-
    Incumbents mainly sell capture and suite standardization, while this product
    is designed for mixed estates where safety leaders care more about closed
    actions, claim defensibility, and audit evidence than about another camera
    feature.
  - >-
    The defensible asset is a cross-vendor dataset linking event type,
    preventability, intervention choice, and claim outcome, plus privacy-aware
    workflow templates that are hard to recreate with spreadsheets or a single
    vendor portal.
strategicChoices:
  beachhead: >-
    Preventable-collision review and coaching workflows for UK and Ireland
    parcel, utility, and gas-distribution fleets with 500-5,000 vehicles,
    5-20 depots, installed camera telematics, and self-insured or
    high-deductible loss programs.
  wedgeRationale: >-
    This workflow concentrates the sharpest pain in one place because a major
    collision, insurer renewal, or camera rollout creates immediate backlog,
    visible economic loss, and executive attention across safety, claims, and
    operations. It creates faster proof than a broad fleet analytics product
    because the startup can measure case-cycle time, coaching completion, and
    claim-quality improvement inside one pilot.
  sequencingRationale: >-
    Start with a narrow overlay and a limited connector set so the company can
    land without asking fleets to rip out hardware or replatform claims systems.
    Prove ROI on one urgent workflow first, then add insurer reporting, broker
    referrals, and broader benchmarking only after repeatable pilot conversion
    exists. Hiring follows the same order: product and integration talent
    first, implementation second, and scaled channel sales only after the
    deployment playbook is stable.
  notYet:
    - Full telematics suite replacement or owned camera hardware
    - Real-time in-cab coaching or driver-scoring products beyond post-event workflows
    - Broad U.S. expansion before UK and Ireland proof plus repeatable partner distribution
market:
  tam: >-
    $261.0M estimated annual UK TAM based on roughly 5.801M commercial vehicles,
    a 15% workflow-fit share, and about $25 per vehicle per month software ARPU.
  sam: >-
    $65.3M estimated beachhead SAM for parcel, utility, gas-distribution, and
    similar service fleets in the 500-5,000 vehicle band.
  som: >-
    $13.5M year-3 SOM assuming 30 fleets, about 1,500 active vehicles per
    customer, and roughly $300 annual ARR per active vehicle.
  segments:
    - Self-insured parcel fleets with multi-depot operations
    - Utility, gas-distribution, and field-service fleets with high deductible programs
  buyingProcess: >-
    The process usually starts after a major preventable collision, insurer
    renewal pressure, or a camera rollout that overwhelms the central safety
    team. A director of fleet safety or transport compliance typically sponsors
    the pilot, while the VP Operations, COO, or Head of Fleet Safety signs once
    the startup shows faster case closure, better evidence quality, and
    acceptable privacy and IT controls.
product:
  mvp: >-
    The MVP ingests event clips and metadata from the first 2-3 common camera or
    telematics feeds, creates a shared case record, scores likely
    preventability, routes incidents, and produces coaching, claims, and audit
    outputs from one workflow. It should include privacy controls, retention
    settings, and baseline-versus-post-launch measurement, but avoid deep
    replacement of existing claims or telematics systems.
  sixMonth: >-
    Ship three paid pilots with case intake, depot routing, coaching packet
    generation, claim file export, audit logs, and dashboards for case aging,
    coaching latency, and repeat incidents.
  twelveMonth: >-
    Add the next connector set, insurer and broker reporting templates,
    role-based approvals, and account benchmarking so one pilot can expand
    across more depots and a second workflow such as insurer renewal review.
  twentyFourMonth: >-
    Expand into subcontractor safety governance, policy enforcement, and
    cross-fleet benchmarking, with enough outcome history to recommend which
    interventions reduce repeat losses by route, depot, and driver cohort.
  keyBets:
    - Fleets will fund a workflow overlay separately from their camera vendor if it improves case speed and claim defensibility
    - Limited connectors and structured exports are enough to win the first 10 customers before broader integration depth
    - One workflow win in preventable-collision review can expand into claims and compliance modules inside the same account
    - Buyers will trust vendor-neutral benchmarking and audit trails more than ad hoc spreadsheets or single-vendor reports
gtm:
  wedge: >-
    Sell a paid pilot around one urgent preventable-collision and coaching
    workflow for a fleet that already has installed cameras and needs faster
    action before renewal, after a serious incident, or during a high-volume
    rollout.
  channels:
    - Founder-led direct enterprise sales into fleets standardizing video telematics
    - Insurance broker, insurer, and TPA referrals tied to claims and renewal outcomes
    - Telematics ecosystem partners and open-platform integrations for mixed fleets
    - Fleet safety events focused on parcel, utility, and service operators
  funnelTargets: "Target lead→qualified pilot 15-25%, qualified pilot→paid pilot 40%+, paid pilot→production contract 60%+, first workflow→second module or wider depot rollout within 12 months 40%+"
  pricing: >-
    Charge an annual subscription by active vehicle band, with a paid pilot or
    onboarding fee tied to the first depot or vehicle cohort brought under
    workflow. This matches buyer economics because value scales with the number
    of vehicles whose events now produce faster coaching, cleaner claims files,
    and lower administrative leakage, while implementation fees cover the early
    integration and workflow setup work.
businessModel:
  revenueStreams:
    - Annual platform subscription priced by active vehicle band
    - Paid onboarding and workflow configuration for the first fleet or depot rollout
    - Premium claims and insurer reporting module
    - Benchmarking and governance add-ons once customers run multiple depots or workflows
  unitOfValue: active vehicle under managed safety workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more vehicles and depots within the first fleet account
    - Expand from coaching workflow into claims and insurer reporting
    - Add subcontractor and third-party driver governance
    - Sell benchmark and policy-enforcement modules to multi-fleet operators and insurers
strategyMap:
  northStarMetric: Median time from safety event to closed case with documented coaching or claims action
  inputMetrics:
    - Active vehicles under workflow
    - Percentage of cases triaged within 24 hours
    - Percentage of coaching actions completed within 7 days
    - Claim evidence packets delivered within 48 hours of request
    - Repeat risky-event rate for coached drivers within 90 days
  moatsToBuild:
    - Cross-vendor case history linking event context, intervention choice, and outcome
    - Depot and route benchmarking that improves triage priorities over time
    - Embedded privacy, retention, and insurer-evidence workflow templates for UK and Ireland fleets
  killCriteria:
    - Fewer than 5 of the first 10 target fleets confirm that post-event workflow pain is budget-worthy in the next 12 months
    - Fewer than 2 paid pilots close after 6 months of focused selling into fleets with installed cameras
    - Pilot accounts fail to cut median case-closure time by at least 30% within 90 days
    - Fewer than 50% of paid pilots convert to annual production contracts because incumbent tools are good enough
  mermaid: |
    flowchart LR
      Wedge[Preventable collision workflow] --> MVP[Cross-vendor case management]
      MVP --> Proof[Faster coaching and better claims evidence]
      Proof --> Expansion[More depots, more workflows, insurer channels]
investorMemo:
  verdict:
    call: Watch
    conviction: Credible wedge and buyer pain, but conviction stays moderate until mixed-estate demand and incumbent API openness are proven in paid pilots.
    whyBelieve: The research shows fleets already budget for AI camera systems and still lack a neutral operating layer that closes coaching, claims, and compliance work across depots.
    whyDoubt: The company can fail if bundled workflow from incumbents is good enough or if third-party access to clips and metadata is too constrained.
    nextDiligence: Confirm with 3 paid pilots that a self-insured fleet will buy a standalone overlay and expand beyond the first workflow after measurable case-speed and claims-quality gains.
  firstCustomer:
    title: Director of fleet safety at a self-insured parcel or gas-distribution fleet
    profile: >-
      A UK or Ireland fleet with 800-2,500 vehicles, 5-20 depots, installed
      camera telematics, and a central safety team that now manages collision
      review, coaching, and claims follow-up across multiple regions.
    trigger: A major preventable collision, worsening renewal economics, or a new camera rollout that creates review backlog and weak follow-through.
    buyer: VP Operations, COO, or Head of Fleet Safety
    initialContract: >-
      $40k-$75k paid pilot covering 300-800 vehicles or a small set of depots,
      converting to roughly $180k-$450k annual subscription value as the full
      fleet or broader workflow set is activated.
  mustBeTrue:
    - At least half of target UK and Ireland fleets run mixed or fragmented safety workflows painful enough to fund a separate overlay.
    - The product can reduce median event-to-closed-case time by 30% or more without replacing the existing telematics stack.
    - Claims, safety, and operations stakeholders will accept one shared case record as the system of action after a collision.
    - Broker, insurer, or TPA referrals can produce qualified pipeline at lower CAC than direct outbound alone.
    - At least 50% of paid pilots convert into annual contracts and expand beyond the first depot or vehicle cohort within 12 months.
  diligenceQuestions:
    - How often do target fleets operate more than one camera or telematics system in the same safety workflow today?
    - Which KPI actually opens budget first in the first 10 accounts: coaching latency, claim-cycle time, or renewal economics?
    - What API, export, and clip-portability limits do CameraMatics, Samsara, Geotab, and similar vendors impose on third-party overlays?
    - Who owns the operational process after a serious incident in practice: safety, claims, or regional operations?
    - How much of pilot ROI can be measured inside 90 days versus only at annual renewal?
operatingAssumptions:
  - assumption: Enough target fleets already run mixed camera estates or fragmented downstream workflows to justify a vendor-neutral overlay.
    basis: research.yaml
    validationTest: Complete 10 discovery calls with target fleets and confirm at least 6 use more than one system or rely on spreadsheets and email for post-event casework.
    decisionImpact: If false, narrow the product to one partner ecosystem or focus only on fleets with explicit multi-vendor operations.
  - assumption: A paid pilot can prove value with 2-3 connectors and structured exports rather than deep replacement of claims or telematics software.
    basis: operator judgment
    validationTest: Deploy 2 pilots using limited integrations and show production use within 45 days of contract signature.
    decisionImpact: If false, implementation cost and sales cycles rise, forcing a higher-ACV enterprise-only strategy or a larger fundraise.
  - assumption: Pricing by active vehicle band is acceptable if the product shows faster case closure and cleaner evidence outcomes.
    basis: idea.yaml
    validationTest: Present list pricing in 5 pilot negotiations and win at least 3 with less than 20% discount from target pricing.
    decisionImpact: If false, the company must rely more on services, narrower modules, or a different unit of value such as per depot or per active case.
  - assumption: Broker, insurer, and TPA referrals can become a repeatable channel after the first proof points.
    basis: research.yaml
    validationTest: Sign 2 referral or co-sell agreements that generate at least 5 qualified pilot opportunities within 9 months.
    decisionImpact: If false, customer acquisition remains founder-led for longer and the company must delay channel hiring and revise the funding plan.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 10 target fleet safety and claims leaders about the last serious preventable incident and current case workflow.
    hypothesis: Post-event coordination and evidence assembly rank among the top three pains after camera rollout.
    successMetric: At least 7 of 10 accounts describe a recent backlog, manual claims assembly, or missed coaching follow-through severe enough to sponsor a pilot.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run integration and export tests against the first 3 target data sources and one insurer or TPA workflow.
    hypothesis: The startup can ingest enough clip and metadata detail to power case routing without privileged deep platform access.
    successMetric: Three usable connectors or exports support case creation, routing, and evidence packet generation with less than 2 weeks of setup each.
    owner: Founding integrations engineer
  - horizon: 90–180 days
    experiment: Close 3 paid pilots with fleets in parcel, utility, or gas distribution.
    hypothesis: A recent collision, renewal pressure, or rollout backlog creates a fast enough budget trigger for a standalone workflow overlay.
    successMetric: Three paid pilots close within 6 months and at least one is sourced through a broker, insurer, or TPA partner.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Measure baseline versus post-launch case-cycle time, coaching completion, and evidence turnaround in each pilot.
    hypothesis: Structured case management reduces median case-closure time and improves coaching completion without adding operational burden.
    successMetric: Median case-closure time falls by 30% and coaching completion within 7 days rises above 80% in at least 2 pilots.
    owner: Customer success lead
  - horizon: 6–12 months
    experiment: Launch insurer and broker reporting templates and test whether they help convert pilots into annual contracts.
    hypothesis: Shared reporting strengthens economic buyer support because it ties safety workflow to renewal and claims outcomes.
    successMetric: At least 2 pilot customers cite insurer or broker reporting as part of their production purchase decision.
    owner: Product manager
  - horizon: 12–18 months
    experiment: Expand one production customer from coaching workflow into claims or compliance module across additional depots.
    hypothesis: The first workflow creates enough trust and data continuity to support a second module sale without a new procurement cycle.
    successMetric: One customer expands ARR by 50% or more within 12 months of the initial production contract.
    owner: Account lead
operations:
  - Standard incident schema and evidence taxonomy across the first connector set
  - Privacy, retention, signage, and DPIA templates for UK and Ireland deployments
  - Paid implementation playbook for depot onboarding, role mapping, and baseline metric capture
  - Broker, insurer, and TPA partner process for evidence export and renewal reporting
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Owns direct sales, design-partner discovery, and insurer or broker relationships while the market thesis is still being proven.
  - role: Founding product engineer
    startTiming: Month 0
    rationale: Builds the core case workflow, audit trail, and analytics needed to prove the first customer outcome.
  - role: Founding integrations engineer
    startTiming: Month 1
    rationale: Multi-vendor ingestion and export reliability are the main adoption bottleneck, so connector speed matters earlier than broad feature depth.
  - role: Customer success and implementation lead
    startTiming: Month 4
    rationale: The company needs repeatable onboarding, metric instrumentation, and cross-functional account management to convert pilots.
  - role: Channel and enterprise sales lead
    startTiming: Month 9
    rationale: Add only after 2-3 pilots show repeatable messaging and the first referral partners can be turned into pipeline.
milestones:
  - horizon: 0–12 months
    items:
      - Close 10 structured discovery calls across parcel, utility, and gas fleets
      - Launch 3 paid pilots on the core preventable-collision workflow
      - Prove 30% reduction in median case-closure time in at least 2 pilots
      - Ship the first 3 connectors plus insurer-ready evidence packet export
  - horizon: 12–24 months
    items:
      - Convert at least 2 pilots into annual production contracts
      - Expand one customer across additional depots and a second workflow module
      - Sign 2 broker, insurer, or TPA referral agreements that generate qualified pipeline
      - Launch benchmark and governance reporting for multi-depot fleets
  - horizon: 24–36 months
    items:
      - Reach roughly 30 production fleets and about $13.5M year-3 SOM case ARR
      - Add subcontractor safety governance and policy-enforcement modules
      - Build a cross-fleet outcome dataset linking event types, interventions, and claims results
      - Establish the company as the default vendor-neutral workflow layer for mixed-estate fleet safety operations
risks:
  - risk: Incumbent camera and telematics vendors bundle enough workflow to make a standalone overlay hard to justify.
    likelihood: High
    impact: High
    mitigation: Focus on mixed-estate fleets, cross-vendor evidence workflows, and insurer-facing reporting that single-suite tools handle poorly.
  - risk: API limits, export constraints, or inconsistent schemas slow deployment and erode gross margin.
    likelihood: High
    impact: High
    mitigation: Start with a narrow connector roadmap, charge for implementation, and prioritize target accounts whose systems permit practical data access.
  - risk: Buyers like the concept but cannot prove ROI quickly enough to win a new budget line.
    likelihood: Medium
    impact: High
    mitigation: Instrument baseline and post-launch metrics from day one and sell against renewal timing, claim leakage, and coaching backlog rather than generic safety narratives.
  - risk: Privacy or worker-acceptance concerns delay rollout or restrict usable footage.
    likelihood: Medium
    impact: Medium
    mitigation: Default to data minimization, clear retention controls, audio-off settings where needed, and deployment templates aligned to UK and Ireland obligations.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of runway to build the core product and connector set, close
    and service the first paid pilots, instrument ROI proof, and establish the
    first insurer, broker, and telematics distribution relationships before a
    larger seed round.
