  fiveForces:
    supplierPower:
      score: 3
      rationale: >-
        Data access depends on telematics vendors, camera partners, and API
        policies, but open platforms and existing cloud video workflows keep
        supplier power from being overwhelming.
      sourceRefs: [19, 27, 28]
    buyerPower:
      score: 4
      rationale: >-
        Enterprise fleets are concentrated, sophisticated, and used to long
        procurements; they can delay spend unless ROI maps directly to claims,
        safety, or compliance outcomes.
      sourceRefs: [20, 23, 24]
    threatOfEntrants:
      score: 3
      rationale: >-
        Software entry is feasible, but integration breadth, safety-domain trust,
        privacy governance, and outcome data create real execution barriers.
      sourceRefs: [7, 9, 27]
    threatOfSubstitutes:
      score: 5
      rationale: >-
        The default substitute remains incumbent portals plus spreadsheets,
        email, insurer workflows, or fuller telematics suites, all of which are
        already in place inside target fleets.
      sourceRefs: [18, 19, 20]
    competitiveRivalry:
      score: 4
      rationale: >-
        Camera vendors, AI dashcam specialists, and connected-operations
        platforms are all pushing deeper into safety workflows, creating heavy
        rivalry around the same enterprise accounts.
      sourceRefs: [1, 25, 30]
  pestle:
    - factor: political
      impact: positive
      point: EU and UK road-safety policy continues to push more ADAS and driver-monitoring capability into commercial fleets.
      sourceRefs: [6]
    - factor: economic
      impact: positive
      point: Self-insured and high-deductible fleets feel collision costs directly, increasing appetite for faster claims and coaching workflows.
      sourceRefs: [16, 17, 21]
    - factor: social
      impact: neutral
      point: Fleets want better coaching and proof of driver understanding, but worker acceptance still depends on how monitoring is implemented.
      sourceRefs: [7, 20]
    - factor: technological
      impact: positive
      point: AI cameras, cloud storage, and open integrations make event capture abundant enough that workflow automation becomes valuable.
      sourceRefs: [5, 27, 28]
    - factor: legal
      impact: negative
      point: DPIAs, signage, retention rules, and audio restrictions raise deployment overhead for in-vehicle surveillance.
      sourceRefs: [7, 9]
    - factor: environmental
      impact: neutral
      point: Electrification and route-efficiency programs add operational complexity but do not by themselves create the workflow wedge.
      sourceRefs: [14, 15]
  adoptionFrictionMatrix:
    - friction: Multi-vendor event normalization and evidence ingestion
      severity: high
      affectedBuyer: Fleet safety and IT
      mitigation: Start with a narrow connector set and standard incident schema for the most common camera feeds.
      sourceRefs: [19, 27, 28]
    - friction: Driver privacy and works-council or policy acceptance
      severity: high
      affectedBuyer: Compliance and HR
      mitigation: Default to data-minimization controls, audio-off settings, and clear retention plus signage templates.
      sourceRefs: [7, 9]
    - friction: Cross-functional ownership between safety, claims, and operations
      severity: medium
      affectedBuyer: VP Operations
      mitigation: Sell against one urgent workflow first, then expand with shared dashboards and case records.
      sourceRefs: [18, 19, 21]
    - friction: Proving measurable savings quickly
      severity: medium
      affectedBuyer: CFO and fleet buyer
      mitigation: Instrument baseline-versus-post-launch metrics for coaching cycle time, repeat events, and claim resolution speed.
      sourceRefs: [16, 17, 35]
market:
  tam:
    value: $261.0M
    rationale: >-
      UK commercial vehicle base of roughly 5.175M LCVs plus 626k HGVs = 5.801M
      vehicles; assume 15% are eventually in multi-depot fleets where a
      camera-agnostic workflow layer is relevant, then apply estimated $25 per
      vehicle per month software ARPU: 5.801M x 15% x $300 ARR ≈ $261.0M.
    isEstimate: true
    sourceRefs: [13, 31]
  sam:
    value: $65.3M
    rationale: >-
      Constrain TAM to parcel, utility, gas-distribution, and similar service
      fleets in the 500-5,000 vehicle band by assuming 25% of the workflow-fit
      UK vehicle pool belongs to that beachhead: 870k x 25% x $300 ARR ≈ $65.3M.
    isEstimate: true
    sourceRefs: [13, 14, 15, 23, 24, 31]
  som:
    value: $13.5M
    rationale: >-
      Year-3 reachable case of 30 fleets x 1,500 active vehicles average x $300
      ARR per vehicle = $13.5M, which is consistent with selling into a tiny
      fraction of large UK parcel and service fleets rather than mass adoption.
    isEstimate: true
    sourceRefs: [1, 14, 15, 23, 31]
