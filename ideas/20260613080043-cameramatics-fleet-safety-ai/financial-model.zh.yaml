scenarios:
  downside:
    description: 试点转正更慢、伙伴转介绍更晚起量，而且更多客户长期停留在较小车辆群组，结果公司到第 3 年末只做到 22 家车队，单车队收入也更低。
    y3RevenueK: 4867.5
    y3EbitdaK: 138.2
    cashLowPointK: 1100.0
    keyAssumptionChanges:
    - 第 3 年季末客户数从 14、18、24、30 下修到 11、14、18、22。
    - 每个活跃车队年化收入从 $360K 降到 $330K，因为更多客户停留在接近试点规模的铺设阶段。
    - 毛利率从 70% 下滑到 67%，因为连接器和证据导出工作仍然更依赖人工。
  base:
    description: Y1 的 3 个试点都能转成标杆案例，转介绍渠道从 Y2 开始贡献线索，公司在第 3 年末以 30 家车队、每个活跃车队年价值 $360K 退出。
    y3RevenueK: 6840.0
    y3EbitdaK: 1665.0
    cashLowPointK: 1358.0
    keyAssumptionChanges:
    - 客户数按 A8、A9 和 A10 执行。
    - 毛利率维持在商业计划给出的 70% 目标。
    - 招聘按 A12 推进，不会在验证点出现前就提前拉起大销售或大服务团队。
  upside:
    description: 试点证明更早落地，转介绍渠道超预期，而且更多车队激活更大的车辆群组，公司到第 3 年末能做到 36 家车队。
    y3RevenueK: 8677.5
    y3EbitdaK: 3124.8
    cashLowPointK: 1450.0
    keyAssumptionChanges:
    - 第 3 年季末客户数从 14、18、24、30 上修到 16、22、28、36。
    - 每个活跃车队年化收入从 $360K 提高到 $390K，因为更多客户扩到更多场站和保险报告工作流。
    - 毛利率从 70% 提升到 72%，因为上线和证据打包流程更模板化。
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃车队年化收入落在 $330K。
  baseCase: 每个活跃车队年化收入维持在 $360K。
  upsideCase: 每个活跃车队年化收入提升到 $390K。
  y3RevenueImpactK: -570.0
  cashImpactK: -399.0
- variable: CAC
  downsideCase: 综合 CAC 升到 $95K，因为直销外呼仍是主导动作。
  baseCase: 综合 CAC 保持在 $75K，且 Y2 起伙伴转介绍开始贡献。
  upsideCase: 随着经纪人和保险公司渠道把线索预热好，综合 CAC 降到 $60K。
  y3RevenueImpactK: -360.0
  cashImpactK: -540.0
- variable: 流失率
  downsideCase: 月流失率升到 2.0%，因为产品始终只绑在单一事故工作流上。
  baseCase: 月流失率维持在 1.5%。
  upsideCase: 一旦多个场站和报告模块都跑起来，月流失率降到 1.0%。
  y3RevenueImpactK: -300.0
  cashImpactK: -210.0
- variable: 销售周期
  downsideCase: 从试点转正式合同的周期被拉长到接近 9 个月，因为隐私、IT 和数据访问审批更久。
  baseCase: 试点转正式合同约 6 个月，和 Y1 到 Y2 的里程碑路径一致。
  upsideCase: 随着转介绍信誉更强，试点转正式合同可压缩到接近 4 个月。
  y3RevenueImpactK: -495.0
  cashImpactK: -420.0
- variable: 毛利率
  downsideCase: 毛利率维持在 67%，因为实施仍然服务化很重。
  baseCase: 毛利率维持在 70% 目标。
  upsideCase: 随着导出、路由和证据包标准化，毛利率可到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -205.2
- variable: 招聘节奏
  downsideCase: 第二位客户经理、分析工程师和财务运营岗位都提前两个季度到位。
  baseCase: 招聘按 A12 推进。
  upsideCase: 后期岗位延后一到两个季度入职，也不会拖慢增长。
  y3RevenueImpactK: 0.0
  cashImpactK: -250.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionFleets
      ProductionFleets --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 第 3 年收入来自两件事：正式车队从 10 家扩到 30 家，同时每个账户逐步扩到约 1,200 辆纳入工作流的活跃车辆，每辆车 ARR 为 $300。
- checkName: 必须做对的事
  finding: 前 3 个付费试点必须在 Y2 转成标杆和转介绍证明，这样客户增长才能从创始人单兵销售切到可复制的伙伴辅助销售。
- checkName: 模型失效条件
  finding: 如果销售周期被拉长，车队又长期停留在更小的铺设群组里，下行情景下第 3 年收入会掉到约 $4.9M，现金也会被压到低位的 $1M 出头。
- checkName: 下一轮融资证明点
  finding: 当公司做到 10 家正式车队、2 个试点转正、2 份转介绍协议，并且基准分析报告已经上线且现金缓冲仍在时，就足以支撑下一轮融资。
sanityChecks:
  ruleOf40: 第 3 年增长 210.2% + EBITDA 利润率 24.3% = 234.5%（方向上很强，但也被 Y2 基数过小放大了）。
  burnMultiple: Y2 相对新增 ARR 的 burn multiple 约为 0.1x；到 Y3 因为 EBITDA 转正，这个指标已不再有太大意义。
  revenuePerFte: 第 3 年期末每个 FTE 对应收入 $489K（对比成熟 SaaS 大致 $200K-$400K 的基准）。
  flags:
  - 基准情景依旧假设每个正式车队最终能把约 1,200 辆车纳入工作流，所以如果单账户铺开不顺，收入和回本都会承压。
  - 从 10 家车队跳到 30 家，前提是 Y2 就把付费试点转正并跑通转介绍渠道；只靠创始人直销，很难支撑这个爬坡。
  - 如果集成、隐私和保险报告工作始终高度定制、服务化很重，毛利率就可能达不到 70% 目标。
  - 每个 FTE 的收入高于成熟 SaaS 基准，因为模型假设的是高 ACV 企业客户和精简团队；如果真做出来会很漂亮，但执行要求也更高。
