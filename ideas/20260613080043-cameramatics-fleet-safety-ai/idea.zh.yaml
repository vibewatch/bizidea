problem: 大批自保车队现在采集到的危险驾驶和事故数据，已经远超安全团队真正能消化的量。每次遇到急刹片段、险情或碰撞后，管理者还是要靠邮件和表格把司机辅导、理赔和合规动作拼起来，既拖慢干预，也削弱给保险公司的证据质量。随着 AI 摄像头在企业车队加速铺开，瓶颈不再是看见风险，而是把发生了什么说清楚，并在下一次损失前把闭环真正做完。
targetUser:
  primary: 服务英国和爱尔兰包裹、公共事业或燃气配送车队的车队安全负责人或运输合规负责人；车队规模为 500–5,000 辆、跨多个场站，且采用自保或高免赔额模式
  secondary: 负责可预防碰撞复盘和司机辅导的理赔经理或区域运营经理
  buyer: 运营副总裁、COO 或车队安全负责人
startupThesis:
  nonObviousInsight: 车队安全里真正能赢的层，不再是摄像头或告警本身，而是把原始视频事件变成大规模分布式车队里可举证的辅导、理赔和合规结果的执行系统。
  beachhead: 切入英国和爱尔兰包裹、公共事业、燃气配送车队里可预防碰撞复盘与司机辅导这条工作流；目标车队规模 500–5,000 辆、多个场站，并采用自保或高免赔额损失方案。
  wedge: 做一套厂商中立的安全证据工作流，从现有车联网系统接入高风险事件片段，判断哪些事故必须处理，再自动生成司机辅导包、理赔档案和合规审计留痕。
  whyNowCatalyst: CameraMatics 的扩张融资和具名企业部署说明，车队已经愿意为 AI 事件采集买单，真正紧缺的是事后落地执行这一层。
  ventureScalePath: 先从可预防损失工作流切进去，再扩到保险公司集成、分包商安全治理、车队基准分析，以及商用运输里所有运营风险事件的政策执行。
solution: 在已安装的车队摄像头系统之上再搭一层厂商中立的运营系统，而不是替换硬件。产品接入事件片段和元数据，给出可预防性评分，把每个案件路由给合适的安全经理，并生成一条整合视频、司机历史、辅导动作和理赔状态的单一记录。系统还能产出保险公司和监管方都能直接使用的证据包，让安全负责人证明的不是“买了摄像头”，而是“干预真正落地了”。随着数据积累，系统会按场站、线路类型、司机资历和车型学习哪些干预最能减少重复事件，把安全复盘从被动行政工作变成可量化的损失预防。
goToMarketSeed:
  firstCustomer: 首个客户应是英国包裹或燃气配送车队：800–2,500 辆车、5–20 个场站，已经装好摄像头车联网系统，并承担自保留存额或较高年度理赔免赔额。
  buyingTrigger: 触发采购的往往是一次重大可预防碰撞、续保时损失率恶化，或一次全车队摄像头铺设突然把中央安全团队的复盘工作压爆。
  currentAlternative: 车联网厂商后台，再加表格、邮件工单和手工理赔协同
  switchingReason: 这家公司不要求车队拆掉现有摄像头硬件；它做的是把现有事件流变成更快的司机辅导、更干净的理赔证据，以及跨场站可见的重复事故下降。
  pricingHypothesis: 按活跃车辆档位收年费，再叠加理赔与保险报告的高级工作流模块
