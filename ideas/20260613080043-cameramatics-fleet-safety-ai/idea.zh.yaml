differentiator: 现有车联网厂商擅长的是在自家平台里采视频、打事件标签；这家公司做的是面向结果的中立执行层，服务那些真正关心后续结果的车队——辅导有没有做完、可预防性怎么判、理赔举证够不够硬、审计能不能过。它的防守力来自一套专有数据：把事件类型、干预选择、运营上下文和理赔结果在混合车队里连起来。这比再做一款摄像头型号更难复制。
