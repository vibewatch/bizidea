topRisks:
- name: 现有厂商打包销售
  description: 摄像头和车联网厂商可能补更多工作流能力，并把它们作为现有平台的一部分一起卖。
  mitigation: 把重点放在厂商中立编排、混合车队报表，以及单一厂商工具做不好的保险级工作流上。
- name: 集成拖慢落地
  description: 企业车队常常有不一致的事件 schema、老旧理赔系统和各场站自成一套的流程，部署很容易被拖慢。
  mitigation: 先从一个高价值工作流和少量连接器起步，再用付费实施和模板把上线动作标准化。
- name: ROI 证明不够快
  description: 买家可能认可工作流方向，但如果平台不能很快证明损失下降或理赔节省，就会犹豫。
  mitigation: 上线时就配好基线与上线后对照看板，把指标绑到买家本来就在看的辅导延迟、重复事故和理赔周期。
