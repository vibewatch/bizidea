jobsToBeDone:
- job: 当摄像头铺开后，危险驾驶和碰撞事件突然暴增时，帮车队安全团队先把最该处理的案子挑出来，好让他们尽快辅导司机，防止重复损失。
  currentAlternative: 在车联网后台里手工看队列，再用表格做后续跟进
  successMetric: 从事件发生到司机辅导完成的时长
- job: 当续保或重大理赔临近时，帮理赔和安全团队把一条站得住脚的证据链拼出来，好把争议率压下去，并守住续保经济性。
  currentAlternative: 邮件线程、导出视频片段和手工拼理赔档案
  successMetric: 理赔结案时间和续保时的可预防损失率
