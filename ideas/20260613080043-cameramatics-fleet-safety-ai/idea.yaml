topRisks:
  - name: Incumbent bundling
    description: Camera and telematics vendors may add more workflow features and pitch them as part of the existing platform.
    mitigation: Focus on vendor-neutral orchestration, mixed-fleet reporting, and insurer-grade workflows that single-vendor tools do not solve well.
  - name: Integration drag
    description: Enterprise fleets often have inconsistent event schemas, legacy claims systems, and depot-specific processes that can slow deployment.
    mitigation: Start with one high-value workflow and a limited connector set, then use paid implementation and templates to standardize rollout.
  - name: ROI proof gap
    description: Buyers may like the workflow but hesitate unless the platform shows measurable loss reduction or claim savings quickly.
    mitigation: Launch with baseline-versus-post-launch dashboards tied to coaching latency, repeat incidents, and claim-cycle metrics the buyer already tracks.
