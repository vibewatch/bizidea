differentiator: >-
  Incumbent telematics vendors optimize for capturing video and flagging events inside their own platform. This
  company is built as the neutral action layer for fleets that care about downstream outcomes: coach completion,
  preventability decisions, claim defensibility, and audit readiness. Its defensibility comes from the proprietary
  dataset that links event type, intervention choice, operational context, and claim outcome across mixed fleets,
  which is harder to replicate than another camera model.
