problem: >-
  Large self-insured fleets now capture far more risky-driving and incident data than their safety teams can actually
  operationalize. After every hard-brake clip, near miss, or collision, managers still stitch together coaching,
  claims, and compliance steps in email and spreadsheets, which slows intervention and weakens insurer evidence.
  As AI cameras spread across enterprise fleets, the bottleneck shifts from seeing risk to proving what happened and
  closing the loop before the next loss.
targetUser:
  primary: Director of fleet safety or transport compliance at a self-insured parcel, utility, or gas-distribution fleet running 500-5,000 vehicles across multiple depots
  secondary: Claims manager or regional operations manager responsible for preventable-collision reviews and driver coaching
  buyer: VP Operations, COO, or Head of Fleet Safety
startupThesis:
  nonObviousInsight: >-
    The winning layer in fleet safety is no longer the camera or the alert; it is the system of action that turns raw
    video events into defensible coaching, claims, and compliance outcomes across a large distributed fleet.
  beachhead: >-
    Preventable-collision review and coaching workflows for UK and Ireland parcel, utility, and gas-distribution
    fleets with 500-5,000 vehicles, multiple depots, and a self-insured or high-deductible loss program.
  wedge: >-
    A vendor-neutral safety evidence workflow that ingests risky-event clips from existing telematics systems, ranks
    which incidents need action, and auto-generates coaching packets, claims files, and compliance audit trails.
  whyNowCatalyst: >-
    CameraMatics' expansion round and named enterprise deployments show fleets already budget for AI event capture,
    making post-event operationalization the newly urgent gap.
  ventureScalePath: >-
    Start with preventable-loss workflows, then expand into insurer integrations, subcontractor safety governance,
    fleet benchmarking, and policy enforcement across every operational risk event in commercial transport.
solution: >-
  Build a vendor-neutral operations layer that sits on top of installed fleet-camera systems instead of replacing them.
  The product ingests event clips and metadata, scores likely preventability, routes each case to the right safety
  manager, and creates a single record that combines video, driver history, coaching actions, and claim status. It
  also produces insurer-ready and regulator-ready evidence packs so safety leaders can prove intervention quality
  rather than merely show they bought cameras. Over time, the system learns which interventions reduce repeat events
  by depot, route type, driver tenure, and vehicle class, turning safety review from reactive admin into measurable
  loss prevention.
goToMarketSeed:
  firstCustomer: >-
    A UK parcel or gas-distribution fleet with 800-2,500 vehicles, 5-20 depots, an installed camera-telematics stack,
    and a self-insured retention or high annual claims deductible.
  buyingTrigger: >-
    A major preventable collision, insurer renewal with worsening loss ratios, or a fleet-wide camera rollout that
    suddenly overwhelms the central safety team with review work.
  currentAlternative: Telematics vendor portal plus spreadsheets, email casework, and manual claims coordination
  switchingReason: >-
    The startup does not ask the fleet to rip out camera hardware; it turns existing event feeds into faster coaching,
    cleaner claims evidence, and a visible reduction in repeat incidents across depots.
  pricingHypothesis: Annual platform fee priced by active vehicle band plus a premium workflow module for claims and insurer reporting
