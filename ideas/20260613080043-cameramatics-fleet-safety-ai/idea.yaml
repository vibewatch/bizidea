jobsToBeDone:
  - job: >-
      When risky-driving and collision events spike after a camera rollout, help the fleet safety team triage what
      matters first, so they can coach drivers quickly and prevent repeat losses.
    currentAlternative: Manual queue review inside the telematics portal plus spreadsheet-based follow-up
    successMetric: Time from event to completed coaching action
  - job: >-
      When an insurer renewal or major claim is approaching, help claims and safety managers assemble a defensible
      evidence trail, so they can lower dispute rates and protect renewal economics.
    currentAlternative: Email threads, exported clips, and manual claim file assembly
    successMetric: Claim resolution time and preventable-loss ratio at renewal
