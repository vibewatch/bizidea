slug: fleet-safety-evidence-os
date: '2026-06-13'
executiveSummary: Fleet Safety Evidence OS 瞄准的是英国和爱尔兰 500–5,000 辆规模的包裹、公共事业和燃气配送车队。这些车队已经装了摄像头车联网系统，但可预防碰撞复盘依旧散落在厂商后台、邮件和表格里。眼下最痛的不是事件采集，而是每次高风险事件之后堆积起来的司机辅导、理赔和合规工作，尤其在自保或高免赔额车队里，任何理赔漏损都会直接侵蚀经营利润。MVP 是一层厂商中立的工作流：从已安装系统接入事件片段和元数据，判断哪些事故大概率可预防，分配给对应负责人，并为辅导、理赔和合规后续生成一条可审计的案件记录。滩头市场刻意收窄，因为可预防碰撞复盘有明确买家、刚性的预算触发点，也能在一个续保周期或一次摄像头大规模铺设里迅速看到效果。GTM 应该先靠创始人主导，直销给正在标准化摄像头系统的车队；等公司能证明更快结案和更强理赔举证能力后，再叠加经纪人、保险公司和 TPA 转介绍。最强的证据在于：企业车队已经为 AI 安全系统列预算，但现有厂商依旧更强在采集层，而不是跨厂商的下游工作流。最大的未决问题是，目标车队里到底有多少真正运行在混合摄像头体系下，以及现有厂商在第三方 API 和片段可携带性上到底放开多少。如果这些假设成立，公司可以从 $65.3M 的滩头 SAM 继续长成更广义的车队风险运营平台；如果不成立，业务就得收窄到特定生态，或者直接走更高客单价市场。
problem:
- 多场站车队的安全团队收到的高风险事件片段，已经多到看不过来、分不过去、收不了尾，结果司机辅导被拖延，最该优先处理的事故反而埋在厂商队列里。
- 碰撞和险情之后，理赔、合规和运营团队仍然靠手工拼证据，这会削弱可预防性判断、保险谈判和审计准备。
solution:
- 把现有车联网和摄像头系统里的片段与元数据接进一套共享案件工作流，优先挑出大概率可预防事故，再按场站、司机和管理者分派动作。
- 从同一案件里同时生成司机辅导包、理赔证据档案和合规记录，让车队不用替换现有硬件，也能证明干预质量并减少重复损失。
whyWeWin:
- 现有厂商主要卖的是事件采集和套件标准化，而这款产品专门为混合存量系统设计；对安全负责人来说，他们更关心动作有没有闭环、理赔证据够不够硬、审计能不能过，而不是再多一个摄像头功能。
- 真正能沉淀成壁垒的是一套跨厂商数据：把事件类型、可预防性、干预选择和理赔结果连起来；再叠加对隐私友好的工作流模板，这些都不是表格或单一厂商后台能轻易复刻的。
strategicChoices:
  beachhead: 先切英国和爱尔兰包裹、公共事业和燃气配送车队里的可预防碰撞复盘与司机辅导工作流；目标车队有 500–5,000 辆车、5–20 个场站，已经装好摄像头车联网，并采用自保或高免赔额损失方案。
  wedgeRationale: 这条工作流把最尖锐的痛点压缩到了一个地方：一次重大碰撞、一次续保压力，或一次摄像头铺设，都会立刻带来积压、看得见的经济损失，以及安全、理赔、运营三方高管的注意力。相比做一款宽泛的车队分析产品，这条线更快出结果，因为公司可以在一个试点里直接量化案件周期、辅导完成率和理赔质量改善。
  sequencingRationale: 先做一层窄工作流，连接器也先少量上，这样落地时不用逼车队拆硬件或重做理赔系统。先在一条最急的工作流上把 ROI 跑通，等试点转化可以复制后，再上保险报告、经纪人转介绍和更广的基准分析。招聘顺序也一样：先产品和集成人才，再补实施，等部署打法稳定后才扩渠道销售。
  notYet:
  - 整套车联网替换方案或自有摄像头硬件
  - 超出事后工作流范围的实时车内辅导或司机评分产品
  - 在英国和爱尔兰尚未跑通、伙伴分销尚未可复制前就全面扩张美国
market:
  tam: 英国年 TAM 估算为 $261.0M：基于约 5.801M 辆商用车、15% 的工作流适配渗透率，以及每车每月约 $25 的软件 ARPU。
  sam: 滩头 SAM 估算为 $65.3M，聚焦 500–5,000 辆规模的包裹、公共事业、燃气配送及相近服务车队。
  som: 第 3 年 SOM 为 $13.5M，假设拿下 30 家车队、每家约 1,500 辆活跃车辆、每辆活跃车年 ARR 约 $300。
  segments:
  - 多场站运营的自保型包裹车队
  - 采用高免赔额方案的公共事业、燃气配送和现场服务车队
  buyingProcess: 采购通常由一次重大可预防碰撞、续保压力，或一次把中央安全团队压爆的摄像头铺设触发。试点一般由车队安全总监或运输合规负责人推动；等创业公司能证明更快结案、更好的证据质量，以及可接受的隐私和 IT 控制后，最终签字人会是运营副总裁、COO 或车队安全负责人。
product:
  mvp: MVP 先接入前 2–3 个常见摄像头或车联网数据流，生成共享案件记录，判断可预防性、分派事故，并把司机辅导、理赔和审计产出放进同一条工作流里。产品应自带隐私控制、留存设置以及上线前后对照衡量，但不要去深度替换现有理赔或车联网系统。
  sixMonth: 6 个月内交付 3 个付费试点，覆盖案件接入、场站路由、司机辅导包生成、理赔档案导出，以及案件滞留、辅导延迟和重复事故看板。
  twelveMonth: 12 个月内补下一批连接器、保险公司和经纪人报告模板、按角色审批流程以及账户级基准分析，让一个试点能扩到更多场站，并带出第二条工作流，比如续保复盘。
  twentyFourMonth: 24 个月内扩到分包商安全治理、政策执行和跨车队基准分析，并积累足够结果历史，开始推荐哪些干预最能按线路、场站和司机分群减少重复损失。
  keyBets:
  - 只要能把案件速度和理赔举证能力拉上去，车队就愿意在摄像头厂商之外单独为一层工作流买单。
  - 先靠少量连接器和结构化导出，就足以在更深集成前拿下前 10 个客户。
  - 只要在可预防碰撞复盘这条工作流上赢一次，就能在同一客户里继续扩到理赔和合规模块。
  - 买家会比起临时表格或单一厂商报表，更信任厂商中立的基准分析和审计留痕。
gtm:
  wedge: 围绕一条最急的可预防碰撞与司机辅导工作流卖付费试点，目标是那些已经装好摄像头、又在续保前、重大事故后或高流量铺设期急需更快落地动作的车队。
  channels:
  - 由创始人主导，直接销售给正在标准化视频车联网的车队
  - 与理赔和续保结果挂钩的保险经纪人、保险公司和 TPA 转介绍
  - 面向混合车队的车联网生态伙伴与开放平台集成
  - 聚焦包裹、公共事业和服务运营商的车队安全行业活动
  funnelTargets: 目标漏斗：线索→合格试点 15–25%，合格试点→付费试点 40%+，付费试点→正式生产合同 60%+，首个工作流→第二模块或更大范围场站铺开在 12 个月内达到 40%+。
  pricing: 按活跃车辆档位收年订阅费，并对首个场站或首批车辆纳入工作流收取付费试点或上线费。这套定价贴合买家经济模型，因为价值会随着纳入工作流的车辆增多而放大——事件可以更快转成司机辅导、更干净的理赔档案和更低的行政漏损；而实施费则覆盖早期集成和流程搭建成本。
businessModel:
  revenueStreams:
  - 按活跃车辆档位计费的年度平台订阅
  - 首个车队或场站上线的付费实施与工作流配置
  - 高级理赔与保险报告模块
  - 当客户跑多个场站或多条工作流后，再卖基准分析与治理增购项
  unitOfValue: 纳入托管安全工作流的活跃车辆
  targetGrossMarginPct: 70
  expansionLevers:
  - 在首个车队账户里扩更多车辆和场站
  - 从司机辅导工作流扩到理赔和保险报告
  - 补上分包商与第三方司机治理
  - 向多车队运营商和保险公司销售基准分析与政策执行模块
strategyMap:
  northStarMetric: 从安全事件发生到案件结案，并完成有记录的司机辅导或理赔动作的中位时间
  inputMetrics:
  - 纳入工作流的活跃车辆数
  - 24 小时内完成分诊的案件占比
  - 7 天内完成司机辅导动作的占比
  - 收到请求后 48 小时内交付理赔证据包的占比
  - 被辅导司机在 90 天内重复高风险事件发生率
  moatsToBuild:
  - 跨厂商案件历史，把事件上下文、干预选择和结果连起来
  - 按场站和线路做基准分析，持续优化分诊优先级
  - 为英国和爱尔兰车队内嵌隐私、留存和保险证据工作流模板
  killCriteria:
  - 前 10 家目标车队里，不到 5 家确认未来 12 个月内愿意为事后工作流痛点单独列预算
  - 聚焦已装摄像头车队连续卖 6 个月后，仍拿不下 2 个付费试点
  - 试点账户在 90 天内无法把案件结案中位时间至少压缩 30%
  - 不到 50% 的付费试点能转成年合同，原因是现有厂商工具已经“够用了”
  mermaid: |
    flowchart LR
      Wedge[Preventable collision workflow] --> MVP[Cross-vendor case management]
      MVP --> Proof[Faster coaching and better claims evidence]
      Proof --> Expansion[More depots, more workflows, insurer channels]
investorMemo:
  verdict:
    call: 观察
    conviction: 切口和买家痛点都可信，但在付费试点证明混合存量系统的真实需求、以及现有厂商 API 开放度前，判断仍应保持中等。
    whyBelieve: 研究说明，车队已经为 AI 摄像头系统做了预算，但仍缺一层中立运营系统，去把跨场站的司机辅导、理赔和合规工作真正收尾。
    whyDoubt: 如果现有厂商打包出来的工作流已经够用，或者第三方拿不到足够的片段和元数据，这家公司就可能跑不出来。
    nextDiligence: 先用 3 个付费试点确认：自保车队愿不愿意单独买一层独立工作流；在案件速度和理赔质量可量化改善后，能不能从第一条工作流继续扩单。
  firstCustomer:
    title: 自保型包裹或燃气配送车队的车队安全总监
    profile: 目标是英国或爱尔兰车队：800–2,500 辆车、5–20 个场站，已装好摄像头车联网，并由中央安全团队跨多个区域统一管理碰撞复盘、司机辅导和理赔跟进。
    trigger: 一次重大可预防碰撞、续保经济性恶化，或新一轮摄像头铺设导致复盘积压、执行跟进变弱。
    buyer: 运营副总裁、COO 或车队安全负责人
    initialContract: $40k-$75k 的付费试点，覆盖 300-800 辆车或少量场站；当全车队或更广工作流被激活后，可转成约 $180k-$450k 的年度订阅合同。
  mustBeTrue:
  - 至少一半的英国和爱尔兰目标车队运行在足够碎片化的混合安全工作流里，痛到愿意为独立叠加层买单。
  - 产品不替换现有车联网栈，也能把从事件发生到案件结案的中位时间压缩 30% 以上。
  - 发生碰撞后，理赔、安全和运营相关方愿意把同一条共享案件记录当成执行系统。
  - 经纪人、保险公司或 TPA 转介绍，能以低于纯直销外呼的 CAC 带来合格线索。
  - 至少 50% 的付费试点能在 12 个月内转成年合同，并从第一场站或第一批车辆继续扩开。
  diligenceQuestions:
  - 现在的目标车队里，同一条安全工作流同时跑不止一套摄像头或车联网系统的情况到底有多常见？
  - 前 10 个账户里，究竟是哪项 KPI 最先打开预算：司机辅导延迟、理赔周期，还是续保经济性？
  - CameraMatics、Samsara、Geotab 等厂商，会在 API、导出能力和片段可携带性上给第三方叠加层设置哪些限制？
  - 遇到重大事故后，真正负责执行流程的人到底是谁：安全、理赔，还是区域运营？
  - 试点 ROI 里，有多少能在 90 天内量出来，又有多少只能到年度续保时才看清？
operatingAssumptions:
- assumption: 已有足够多目标车队运行在混合摄像头体系或碎片化下游工作流里，足以支撑一层厂商中立叠加层。
  basis: research.yaml
  validationTest: 完成 10 通目标车队访谈，并确认至少 6 家同时使用多套系统，或在事后案件处理中依赖表格和邮件。
  decisionImpact: 如果不成立，产品就应收窄到单一伙伴生态，或只聚焦那些明确存在多厂商运营需求的车队。
- assumption: 只靠 2-3 个连接器和结构化导出，付费试点就能证明价值，而不需要深度替换理赔或车联网软件。
  basis: 运营判断
  validationTest: 用有限集成上线 2 个试点，并在签约后 45 天内进入正式使用。
  decisionImpact: 如果不成立，实施成本和销售周期都会上升，公司就得转向更高 ACV 的纯企业策略，或扩大融资规模。
- assumption: 如果产品能更快结案、拿出更干净的证据结果，按活跃车辆档位定价就能被接受。
  basis: idea.yaml
  validationTest: 在 5 场试点谈判中拿出明码标价，并至少赢下 3 单，折扣不超过目标价的 20%。
  decisionImpact: 如果不成立，公司就得更依赖服务收入、更窄模块，或改用按场站、按活跃案件等不同价值单位计费。
- assumption: 经纪人、保险公司和 TPA 转介绍在首批证明点之后能变成可复制渠道。
  basis: research.yaml
  validationTest: 签下 2 份转介绍或联合销售协议，并在 9 个月内带来至少 5 个合格试点机会。
  decisionImpact: 如果不成立，获客会更长时间依赖创始人亲自打单，公司必须推迟渠道招聘并重改融资计划。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 10 位目标车队的安全和理赔负责人，复盘他们最近一次严重可预防事故以及当前案件流。
  hypothesis: 摄像头铺开之后，事后协同和证据拼装会进入前三大痛点。
  successMetric: 10 个账户里至少有 7 个描述过近期积压、手工拼理赔材料，或司机辅导跟进漏掉，严重到愿意支持一个试点。
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 围绕前 3 个目标数据源和 1 条保险公司或 TPA 工作流，跑集成与导出测试。
  hypothesis: 即便没有深度平台权限，创业公司也能接到足够的片段和元数据来支持案件路由。
  successMetric: 做出 3 个可用连接器或导出方案，能支持建案、路由和证据包生成，而且每个接入设置时间都低于 2 周。
  owner: 创始集成工程师
- horizon: 90–180 天
  experiment: 在包裹、公共事业或燃气配送车队里拿下 3 个付费试点。
  hypothesis: 近期碰撞、续保压力或铺设积压，会形成足够快的预算触发点，让客户愿意为独立工作流叠加层付费。
  successMetric: 6 个月内签下 3 个付费试点，且至少 1 个来自经纪人、保险公司或 TPA 伙伴。
  owner: 创始人 / CEO
- horizon: 90–180 天
  experiment: 在每个试点里衡量上线前后案件周期、辅导完成率和证据交付时效。
  hypothesis: 结构化案件管理能在不增加运营负担的前提下，把案件结案中位时间压下来，并提升辅导完成率。
  successMetric: 至少 2 个试点把案件结案中位时间压低 30%，且 7 天内完成司机辅导的比例提高到 80% 以上。
  owner: 客户成功负责人
- horizon: 6–12 个月
  experiment: 上线保险公司和经纪人报告模板，并测试它们是否有助于把试点转成年合同。
  hypothesis: 共享报告会强化经济买家的支持，因为它把安全工作流直接连到续保和理赔结果上。
  successMetric: 至少 2 家试点客户在转正式采购时，把保险公司或经纪人报告列为决策因素之一。
  owner: 产品经理
- horizon: 12–18 个月
  experiment: 把 1 家正式客户从司机辅导工作流扩到理赔或合规模块，并覆盖更多场站。
  hypothesis: 第一条工作流能积累足够信任和数据连续性，让客户不用重新走采购流程就买第二个模块。
  successMetric: 初始正式合同签下 12 个月内，有 1 家客户把 ARR 提高 50% 以上。
  owner: 客户负责人
operations:
- 前一批连接器统一使用一套标准事故 schema 和证据分类
- 为英国和爱尔兰部署准备隐私、留存、标识和 DPIA 模板
- 建立按场站上线、角色映射和基线指标采集的付费实施打法
- 和经纪人、保险公司、TPA 共建证据导出和续保报告流程
team:
- role: 创始人 / CEO
  startTiming: 第 0 个月
  rationale: 在市场假设尚未跑通前，亲自负责直销、共创客户访谈，以及保险公司和经纪人关系。
- role: 创始产品工程师
  startTiming: 第 0 个月
  rationale: 负责搭出核心案件工作流、审计留痕和分析能力，用来证明首个客户结果。
- role: 创始集成工程师
  startTiming: 第 1 个月
  rationale: 多厂商接入和导出稳定性是最主要的采纳瓶颈，所以连接器速度要早于大而全的功能深度。
- role: 客户成功与实施负责人
  startTiming: 第 4 个月
  rationale: 公司要把试点转正，就必须尽早建立可复制的上线流程、指标埋点和跨部门账户管理。
- role: 渠道与企业销售负责人
  startTiming: 第 9 个月
  rationale: 只有在 2-3 个试点把信息传递和伙伴转线索的机制跑顺后，才值得加这个岗位。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 10 通结构化客户访谈，覆盖包裹、公共事业和燃气车队
  - 在核心可预防碰撞工作流上上线 3 个付费试点
  - 至少在 2 个试点里证明案件结案中位时间下降 30%
  - 交付前 3 个连接器和面向保险公司的证据包导出
- horizon: 12–24 个月
  items:
  - 至少把 2 个试点转成年度正式合同
  - 让 1 家客户扩到更多场站，并购买第二个工作流模块
  - 签下 2 份来自经纪人、保险公司或 TPA 的转介绍协议，能持续带来合格线索
  - 上线多场站车队的基准分析与治理报告
- horizon: 24–36 个月
  items:
  - 拿下约 30 家正式车队，并接近第 3 年 $13.5M SOM 案例 ARR
  - 补上分包商安全治理和政策执行模块
  - 建立跨车队结果数据集，把事件类型、干预动作和理赔结果连起来
  - 把公司做成混合车队安全运营里的默认厂商中立工作流层
risks:
- risk: 现有摄像头和车联网厂商把足够多工作流功能打包进去，独立叠加层会更难卖。
  likelihood: High
  impact: High
  mitigation: 聚焦混合存量系统车队、跨厂商证据工作流，以及单一套件工具做不好的保险报告。
- risk: API 限制、导出约束或 schema 不一致，会拖慢部署并侵蚀毛利率。
  likelihood: High
  impact: High
  mitigation: 先走一条收窄的连接器路线图，对实施收费，并优先做那些系统能实际开放数据访问的目标客户。
- risk: 买家认可概念，但如果 ROI 证明不够快，就很难拿到一条新的预算线。
  likelihood: Medium
  impact: High
  mitigation: 从第一天起就埋好基线和上线后指标，把销售叙事绑到续保时间点、理赔漏损和司机辅导积压，而不是泛泛讲安全。
- risk: 隐私或员工接受度问题会拖慢上线，甚至限制可用视频范围。
  likelihood: Medium
  impact: Medium
  mitigation: 默认启用数据最小化、清晰的留存控制、必要时关闭音频，并采用符合英国和爱尔兰要求的部署模板。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要撑 18 个月：把核心产品和连接器集做出来，拿下并服务首批付费试点，把 ROI 证明跑顺，同时建立第一批保险公司、经纪人和车联网分销关系，再去启动更大一轮 seed 融资。
