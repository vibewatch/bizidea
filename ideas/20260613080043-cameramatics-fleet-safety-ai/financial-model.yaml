    y3RevenueImpactK: -570.0
    cashImpactK: -399.0
  - variable: CAC
    downsideCase: "Blended CAC rises to $95K because direct outbound remains the dominant motion."
    baseCase: "Blended CAC stays at $75K with partner referrals contributing from Y2."
    upsideCase: "Blended CAC falls to $60K as broker and insurer channels warm the pipeline."
    y3RevenueImpactK: -360.0
    cashImpactK: -540.0
  - variable: churn
    downsideCase: "Monthly churn rises to 2.0% because the product stays tied to a single incident workflow."
    baseCase: "Monthly churn stays at 1.5%."
    upsideCase: "Monthly churn falls to 1.0% once multiple depots and reporting modules are live."
    y3RevenueImpactK: -300.0
    cashImpactK: -210.0
  - variable: sales cycle
    downsideCase: "Pilot-to-production stretches toward 9 months because privacy, IT, and data-access approvals take longer."
    baseCase: "Pilot-to-production stays around 6 months, consistent with the Y1-to-Y2 milestone path."
    upsideCase: "Pilot-to-production compresses toward 4 months with stronger referral credibility."
    y3RevenueImpactK: -495.0
    cashImpactK: -420.0
  - variable: gross margin
    downsideCase: "Gross margin holds at 67% because implementations remain services-heavy."
    baseCase: "Gross margin stays at the 70% target."
    upsideCase: "Gross margin reaches 72% as exports, routing, and evidence packets become standardized."
    y3RevenueImpactK: 0.0
    cashImpactK: -205.2
  - variable: hiring pace
    downsideCase: "AE2, analytics, and finance ops are all pulled forward by two quarters."
    baseCase: "Hiring follows A12."
    upsideCase: "Later-stage hires slip by one to two quarters without slowing growth."
    y3RevenueImpactK: 0.0
    cashImpactK: -250.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionFleets
      ProductionFleets --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Y3 revenue is driven by growing from 10 to 30 production fleets while each account expands toward roughly 1,200 active vehicles under workflow at $300 ARR per vehicle.
  - checkName: Must go right
    finding: The first three paid pilots must convert into references and referral-channel proof by Y2 so customer growth can shift from founder-only selling to repeatable partner-assisted selling.
  - checkName: Model breaks if
    finding: If sales cycles stretch and fleets stay at smaller rollout cohorts, the downside case falls to about $4.9M of Y3 revenue and cash compresses toward the low-$1M range.
  - checkName: Next-round proof
    finding: The next financing is justified once the company reaches 10 production fleets, two pilot conversions, and two referral agreements with benchmark reporting live and cash buffer intact.
sanityChecks:
  ruleOf40: "Y3 growth 210.2% + EBITDA margin 24.3% = 234.5% (directionally strong but inflated by the small Y2 base)."
  burnMultiple: "About 0.1x in Y2 on net new ARR, then not meaningful in Y3 because EBITDA turns positive."
  revenuePerFte: "$489K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K mature SaaS benchmark)."
  flags:
    - "Base case still assumes each production fleet reaches about 1,200 active vehicles under workflow, so weak intra-account rollout would pressure both revenue and payback."
    - "The jump from 10 to 30 fleets depends on paid-pilot conversion and referral channels working by Y2; founder-led direct sales alone is unlikely to support that ramp."
    - "Gross margin can miss the 70% target if integration, privacy, and insurer-reporting work remains custom and services-heavy."
    - "Revenue per FTE sits above mature SaaS benchmarks because the model assumes high-ACV enterprise logos and a lean team; attractive if real, but execution-sensitive."
