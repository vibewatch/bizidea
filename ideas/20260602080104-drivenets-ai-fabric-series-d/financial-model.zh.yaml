    downsideCase: "在伙伴来源需求被证明前，提前招入 2 个人"
    baseCase: "到 Q4Y3 达到 14 FTE"
    upsideCase: "最后 2 个岗位延后到 Q2Y3 转化证明之后再招"
    y3RevenueImpactK: -150.0
    cashImpactK: -280.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Pipeline[合格的上线评估] --> Paid[付费 commissioning sprint]
      Paid --> Domains[付费 fabric 域]
      Domains --> Revenue[经常性收入]
      Revenue --> GrossProfit[毛利润]
      GrossProfit --> Cash[期末现金]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形下，Y3 收入主要来自 30 个付费 fabric 域、每个约 $300K ACV，而不是靠激进提价撑出来。
  - checkName: 必须成立的前提
    finding: 至少一半付费 commissioning sprint 必须转成年订阅，否则公司达不到 seed 计划赖以成立的 Y2 末 14 域里程碑。
  - checkName: 模型会失效的情况
    finding: 如果安全评审把销售周期拖到约 7 个月以上，或流失率升到约 2.5% 以上，在可复制性被证明前，现金走势就会滑向 downside 情形。
  - checkName: 下一轮融资证明
    finding: 如果公司在 Y2 末做到约 14 个付费域、1 条可复制伙伴渠道，并且在 Y3 下半年看见季度 EBITDA 转正路径，就足以支撑下一轮融资叙事。
sanityChecks:
  ruleOf40: "Y3 增速 140.6% + EBITDA 利润率 4.1% = 144.7%"
  burnMultiple: "Y2 burn multiple 为 0.4x（大约 -$1.2M EBITDA，对应从 5 个付费域增至 14 个付费域带来的约 $2.7M 净新增 ARR）。"
  revenuePerFte: "按 Q4Y3 的 14 FTE 计算，Y3 人均收入为 $444.6K（高于通用 SaaS 的 $200-400K 基准，但对高 ACV 基础设施软件仍属合理）。"
  flags:
    - "基准情形要求公司在 Q4Y3 前打满研究测算的 30 域 SOM，所以伙伴渠道不能明显掉链子。"
    - "毛利率固定在 70%，但首年交付很重；如果定制化服务占比更高，盈利时间会被继续推迟。"
    - "客户集中度依然很高，所以 Y2 若丢掉 1 个 $300K 域，收入和现金跑道都会明显受压。"
