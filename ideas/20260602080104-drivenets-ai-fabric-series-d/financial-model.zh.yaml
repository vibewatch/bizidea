  - variable: ARPU
    downsideCase: "$250K annual ACV"
    baseCase: "$300K annual ACV"
    upsideCase: "$320K annual ACV"
    y3RevenueImpactK: -1037.5
    cashImpactK: -726.3
  - variable: CAC
    downsideCase: "$100K CAC per new domain"
    baseCase: "$80K CAC per new domain"
    upsideCase: "$60K CAC per new domain"
    y3RevenueImpactK: 0.0
    cashImpactK: -360.0
  - variable: 流失率
    downsideCase: "2.5% monthly churn"
    baseCase: "1.5% monthly churn"
    upsideCase: "1.0% monthly churn"
    y3RevenueImpactK: -650.0
    cashImpactK: -455.0
  - variable: 销售周期
    downsideCase: "从线索合格到签单需要 7 个月"
