scenarios:
  downside:
    description: "如果安全评审拖慢数据接入、转化率低于目标，公司到 Y3 末只做到 22 个付费域，而不是 30 个。"
    y3RevenueK: 4525.0
    y3EbitdaK: -725.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
      - "销售周期会从约 5 个月拉长到约 7 个月。"
      - "付费 sprint 转年合同的比例会从 50% 降到 35%。"
      - "月度流失率会从 1.5% 升到 2.5%。"
  base:
    description: "在创始人主导销售下，足够多的 launch sprint 能完成转化，使公司在 Y2 末做到 14 个付费域，并在 Y3 达到研究支持的 30 域 SOM。"
    y3RevenueK: 6225.0
    y3EbitdaK: 257.5
    cashLowPointK: 1006.2
    keyAssumptionChanges:
      - "年 ACV 保持在每个付费域约 $300K。"
      - "付费 sprint 转年合同维持在计划设定的 50%+。"
      - "团队规模从 Y1 末 6 FTE 增长到 Y3 末 14 FTE。"
  upside:
    description: "如果可复制伙伴渠道跑通、多域扩张也更快，公司能在不显著扩大的团队规模下，跑出高于基准的域数爬坡。"
    y3RevenueK: 7125.0
    y3EbitdaK: 980.0
    cashLowPointK: 1180.0
    keyAssumptionChanges:
      - "Q4Y3 季末付费域数达到 36，而不是 30。"
      - "扩展模块会把成熟客户的实际 ACV 拉升到约 $320K。"
      - "随着部署 playbook 标准化，毛利率会从 70% 提升到 72%。"
