  - id: A8
    name: 第 3 年季末付费域数
    value: '16,20,25,30'
    unit: domains
    source: "[Research market.som 30 paying domains by year 3]；[BP expansion from one launch to multiple domains]"
  - id: A9
    name: 收入确认节奏
    value: '25'
    unit: USD K per active domain per month
    source: "[A3]；启发式：年合同价值按月平均确认"
  - id: A10
    name: 付费 sprint 转年合同
    value: '50'
    unit: percent
    source: "[BP gtm.funnelTargets paid sprint→annual production subscription 50%+]"
  - id: A11
    name: 月度 logo 流失率
    value: '1.5'
