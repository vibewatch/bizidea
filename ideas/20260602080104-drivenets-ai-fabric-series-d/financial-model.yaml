scenarios:
  downside:
    description: "Security review slows data access, conversion slips below target, and the company exits Y3 at 22 paid domains instead of 30."
    y3RevenueK: 4525.0
    y3EbitdaK: -725.0
    cashLowPointK: 420.0
    keyAssumptionChanges:
      - "Sales cycle stretches from roughly 5 months to roughly 7 months."
      - "Paid sprint to annual conversion falls from 50% to 35%."
      - "Monthly churn rises from 1.5% to 2.5%."
  base:
    description: "Founder-led sales convert enough launch sprints to finish Y2 with 14 paid domains and reach the research-backed 30-domain year-3 SOM."
    y3RevenueK: 6225.0
    y3EbitdaK: 257.5
    cashLowPointK: 1006.2
    keyAssumptionChanges:
      - "Annual ACV stays at roughly $300K per paid domain."
      - "Paid sprint to annual conversion stays at the plan's 50%+ target."
      - "Headcount rises from 6 FTE at Y1 exit to 14 FTE at Y3 exit."
  upside:
    description: "A repeatable partner channel and faster multi-domain expansion lift the company above the base domain ramp without needing a much larger team."
    y3RevenueK: 7125.0
    y3EbitdaK: 980.0
    cashLowPointK: 1180.0
    keyAssumptionChanges:
      - "Quarter-end paid domains reach 36 by Q4Y3 instead of 30."
      - "Expansion modules lift realized ACV to roughly $320K on mature accounts."
      - "Gross margin improves from 70% to 72% as deployment playbooks standardize."
