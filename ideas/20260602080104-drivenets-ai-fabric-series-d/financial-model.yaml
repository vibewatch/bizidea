modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pipeline[Qualified launch assessments] --> Paid[Paid commissioning sprints]
      Paid --> Domains[Paid fabric domains]
      Domains --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case Y3 revenue is driven mainly by reaching 30 paid fabric domains at about $300K ACV rather than by aggressive price expansion.
  - checkName: Must go right
    finding: At least half of paid commissioning sprints must convert to annual subscriptions or the company misses the 14-domain Y2 milestone that underpins the seed plan.
  - checkName: Model breaks if
    finding: If security review stretches the sales cycle past roughly 7 months or churn rises above roughly 2.5%, cash trends toward the downside case before repeatability is proven.
  - checkName: Next-round proof
    finding: The next round is justified by exiting Y2 with about 14 paid domains, one repeatable partner channel, and a visible path to positive quarterly EBITDA in H2 Y3.
sanityChecks:
  ruleOf40: "Y3 growth 140.6% + EBITDA margin 4.1% = 144.7%"
  burnMultiple: "Y2 burn multiple 0.4x (-$1.2M EBITDA on roughly $2.7M net new ARR from 5 to 14 paid domains)."
  revenuePerFte: "$444.6K Y3 using Q4Y3 headcount of 14 FTE (above the generic SaaS $200-400K benchmark, but plausible for high-ACV infrastructure software)."
  flags:
    - "Base case requires the company to hit the full 30-domain research SOM by Q4Y3, so partner-led sourcing cannot slip materially."
    - "Gross margin is held at 70% even though the first year is deployment-heavy; more bespoke services work would delay profitability."
    - "Customer concentration remains high, so one lost $300K domain in Y2 would noticeably reduce revenue and runway."
