      point: 开放 AI Ethernet 标准和高集体通信负载的工作负载库，正在抬高专业网络验证的必要性。
      sourceRefs:
        - 10
        - 11
        - 28
        - 29
    - factor: 法律
      impact: negative
      point: 安全和治理要求会限制创业公司如何从接近生产环境的系统里接入配置、遥测和运营数据。
      sourceRefs:
        - 23
        - 24
    - factor: 环境
      impact: negative
      point: 电力和基础设施瓶颈会拖慢新 AI 产能上线，也会压缩客户愿意试新工具的窗口期。
      sourceRefs:
        - 37
  adoptionFrictionMatrix:
    - friction: 在上线窗口里，给一家新厂商开放配置和遥测访问
      severity: 高
      affectedBuyer: 网络工程与安全负责人
      mitigation: 先从只读采集、zero-trust 部署模式和离线证据包切入。
      sourceRefs:
        - 23
        - 24
    - friction: 多厂商 fabric 里，大家互相甩锅
      severity: 中
      affectedBuyer: 基础设施 VP
      mitigation: 报告必须保持中立，而且结论要绑在贴近工作负载的测试上，不能只看设备计数器。
      sourceRefs:
        - 1
        - 8
        - 21
    - friction: 每个客户环境都缺少足够长的 AI 工作负载历史 trace
      severity: 中
      affectedBuyer: 集群运营负责人
      mitigation: 先用 NCCL 风格集体通信模式和 benchmark 库做种子测试，再随着时间用客户 trace 微调。
      sourceRefs:
        - 7
        - 29
        - 32
    - friction: 买方担心试一个新工具本身就会拖慢 cutover
      severity: 高
      affectedBuyer: AI 产能总经理
      mitigation: 把产品打包成 cutover 前 sprint，交付物和范围固定，不碰在线 fabric 的控制。
      sourceRefs:
        - 1
        - 15
        - 17
