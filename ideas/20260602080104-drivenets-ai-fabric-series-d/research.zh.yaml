regulatoryTechnicalConstraints:
  - point: 即便是只读采集，也必须满足敏感基础设施环境里的 zero-trust 和 AI 数据安全要求。
    sourceRefs:
      - 23
      - 24
  - point: 开放 AI Ethernet 标准仍在演进，所以互操作逻辑必须随着 ESUN 和 UEC 的推进持续调整。
    sourceRefs:
      - 10
      - 11
  - point: 集体通信占比高的 AI 工作负载，对拥塞和节点间通信质量极其敏感，所以 readiness 误判——无论假阳性还是假阴性——代价都很高。
    sourceRefs:
      - 7
      - 28
      - 29
  - point: 主权 AI 部署可能要求控制平面落在区域内，同时更严格地处理拓扑和运营数据。
    sourceRefs:
      - 18
      - 19
      - 22
validationSignals:
  - point: DriveNets 的融资新闻明确把网络瓶颈和集群 bring-up 过慢，定性成 AI 基础设施里的经济痛点。
    sourceRefs:
      - 1
  - point: OCP 和 UEC 的动作说明，整个生态都预期开放 Ethernet 在 AI 基础设施里会变得更重要，因此厂商中立验证的价值也会随之上升。
    sourceRefs:
      - 10
      - 11
  - point: GPU 云运营方如今会直接卖超大集群访问和网络感知编排，这说明上线质量已经成了面对客户的价值承诺。
    sourceRefs:
      - 25
      - 26
      - 27
  - point: Hyperscaler 和厂商文档早已把节点间网络、遥测和 fabric 管理视作可扩展 AI 工作负载的一阶要求。
    sourceRefs:
      - 28
      - 29
      - 30
openQuestions:
  - 有多少滩头买方愿意在第一次生产 cutover 前，让一家新厂商接入拓扑、配置和 NIC 数据？
  - 第一笔预算最终通常由谁拍板：网络工程、AI 平台负责人，还是外部系统集成商？
  - 2026-2028 年的上线项目里，真正的异构 Ethernet 集群会有多普遍？还是说更多仍是单栈 NVIDIA 或 InfiniBand？
  - 最能把紧迫感转成预算的证明形式是什么：节省的上线天数、避免回滚的风险，还是 GPU 利用率提升？
