    strength: 性能叙事强、遥测能力深，而且与主流 AI 加速器生态高度绑定。
    weaknessVsUs: 它优化的是 NVIDIA 自家栈及其相邻运维场景，而不是跨竞争基础设施做中立多厂商 Ethernet readiness。
