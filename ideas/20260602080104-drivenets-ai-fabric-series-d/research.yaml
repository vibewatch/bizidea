  sensitivityCases:
  - case: Incumbents bundle enough commissioning into existing platforms
    impact: If Juniper, Cisco, or NVIDIA extend current ops products into stronger pre-launch validation, the startup must win on neutrality, auditability, and workload-shaped pass-fail reporting.
    sourceRefs:
