topRisks:
  - name: Incumbent bundling
    description: Switch vendors or large observability platforms could bundle partial commissioning features into existing contracts.
    mitigation: Start as a neutral, cross-vendor layer whose value depends on mixed environments and workload-shaped validation that incumbents do not cover end to end.
  - name: Narrow early market
    description: The initial buyer set may be limited to operators launching large heterogeneous clusters in the next 12 to 18 months.
    mitigation: Expand the same product into cluster expansions, firmware changes, and sovereign or enterprise internal superclusters once the first commissioning workflows land.
  - name: Telemetry access friction
    description: Customers may hesitate to grant a new vendor deep access to network configs and production telemetry during launch windows.
    mitigation: Land first as a read-only deployment with fast value from pre-cutover validation reports, then earn broader integrations after proving bring-up speed and utilization gains.
