jobsToBeDone:
  - job: >-
      When a new heterogeneous AI cluster is nearing launch, help the infrastructure team prove the fabric is ready for
      real training and inference traffic, so they can release GPUs to customers without weeks of war-room debugging.
    currentAlternative: Manual acceptance testing across vendor tools and systems integrator checklists
    successMetric: Days from hardware delivery to revenue-ready cluster go-live
  - job: >-
      When a firmware update, rack expansion, or vendor mix change hits a live cluster, help the network team predict the
      utilization impact before rollout, so they can avoid idle GPUs and emergency reversions.
    currentAlternative: Change reviews in spreadsheets plus post-change monitoring after deployment
    successMetric: Reduction in fabric-related utilization drops and rollback incidents after network changes
