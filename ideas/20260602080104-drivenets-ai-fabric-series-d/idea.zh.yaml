topRisks:
  - name: 现有厂商捆绑
    description: 交换机厂商或大型可观测性平台，可能会把部分 commissioning 能力直接塞进已有合同。
    mitigation: 先把自己落成一层中立的跨厂商系统，价值建立在混合环境和负载贴形验证上——这是现有厂商做不到端到端覆盖的部分。
  - name: 早期市场偏窄
    description: 初始买方群体可能只限于未来 12-18 个月内要上线大型异构集群的运营方。
    mitigation: 第一批 commissioning 工作流跑通后，再把同一套产品扩到集群扩容、固件变更，以及主权或企业内部超级集群。
  - name: 遥测接入阻力
    description: 客户可能不愿在上线窗口内，把网络配置和生产遥测的深层访问权限交给一个新厂商。
    mitigation: 先用只读部署切入，靠 cutover 前验证报告快速证明价值；等 bring-up 速度和利用率改善跑出来，再争取更深的集成。
