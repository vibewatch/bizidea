differentiator: >-
  现有可观测性工具是在利用率掉下来之后才告诉运营方哪里坏了，厂商套件也只能解释自己那一段 fabric。
  这家公司盯的是上线前 readiness 和跨厂商正确性，尤其是 AI 东西向流量——那里每晚一天，经济代价都最大。
  它的护城河会随着一套专有数据不断变厚：哪些配置模式、哪些验证失败、哪些修复动作，最终会把
  GPU 利用率拉到什么水平，这些结果都来自真实异构集群。
