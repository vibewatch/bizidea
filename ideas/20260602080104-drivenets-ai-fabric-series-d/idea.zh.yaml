problem: >-
  现在 AI 基础设施团队买 GPU 的速度，已经快过他们把异构集群安全调到可投产网络的速度。
  他们验证 Ethernet fabric 仍靠厂商点工具、合成基准和深夜 war room，所以只要 RoCE、
  拓扑或固件有一个地方没对齐，就可能让价值八位数的 GPU 集群低效跑上几周。随着多厂商
  AI 集群变成常态，决定收入兑现速度的越来越不是服务器什么时候到货，而是 fabric 什么时候
  能 bring-up 到可上线状态。
targetUser:
  primary: >-
    独立 GPU 云厂商或主权 AI 算力建设方里的 AI 基础设施/网络工程负责人，正在混合加速器
    pod 和多家网络厂商环境下部署一个 2,000-10,000 GPU 的 Ethernet 集群
  secondary: >-
    正在把首个异构内部 AI 超级集群上线的大型企业集群运营负责人
  buyer: 基础设施 VP、网络工程负责人，或 AI 产能总经理
startupThesis:
  nonObviousInsight: >-
    AI 基础设施新的控制点，不在交换芯片本身，而在一层调试上线能力：它要先证明异构 fabric
    可以安全承载负载，昂贵 GPU 才值得点亮。开放的多厂商 Ethernet 虽然降低了硬件锁定，
    但也带来一个新的软件问题：跨厂商正确性、拥塞验证，以及面向 all-to-all AI 流量的变更控制。
  beachhead: >-
    给 GPU 云厂商和主权 AI 建设方做 fabric commissioning 工作流：它们正要 bring-up
    第一个 2,000-8,000 GPU 的 Ethernet 集群，集群里有混合加速器 pod、至少两家网络厂商，
    而且未来 90 天内就有直接关系收入的上线日期
  wedge: >-
    一个平台，只读接入拓扑和配置数据，回放 AI 工作负载流量模式，在 cutover 前找出跨厂商瓶颈，
    并给出集群 go-live 的 pass-fail 上线报告
  whyNowCatalyst: >-
    DriveNets 融资、AMD 参考架构，以及多篇报道明确写到 GPU 因网络瓶颈闲置，说明开放异构
    AI fabric 已经先到了，而运营方还没有一套标准方法去安全完成 commissioning。
  ventureScalePath: >-
    先从新 AI 集群的投产前 commissioning 切入，再扩到持续漂移检测、变更模拟、自动化修复建议，
    以及面向所有多厂商 Ethernet 加速器数据中心的基准数据层。
solution: >-
  产品要先成为 GPU 交给付费工作负载前的 AI fabric readiness system of record。
  它从现有厂商工具里拉取交换机配置、NIC 设置、拓扑图和遥测数据，然后不跑通用网络测试，
  而是按集体训练和推理的东西向流量去做负载贴形验证。运营团队会先看到一张按优先级排好的问题清单：
  哪些拥塞域、哪些无损配置错误、哪些因素最可能拖垮利用率；同时还会拿到一份把网络问题直接映射到
  收入延后和每 token 成本影响的报告。集群上线后，平台再盯住固件升级、机架扩容或混合厂商改动带来的
  风险漂移，提前判断哪些修改会把 fabric 再次压回目标 GPU 利用率以下。
goToMarketSeed:
  firstCustomer: >-
    一家 100-400 人规模的 GPU 云厂商或主权 AI 建设方，正在搭建首个 2,000-8,000 GPU 的
    Ethernet 集群，里面有混合加速器 pod、至少两家网络厂商，而且本季度就有已经签下的企业算力合同要兑现
  buyingTrigger: >-
    集群距离上线或扩容只剩一个季度，但网络验证还在多家厂商之间靠人工推进，go-live 日期已经有失守风险
  currentAlternative: >-
    厂商专用网络管理工具，加上合成基准、电子表格、系统集成商 war room 和人工验收测试
  switchingReason: >-
    这个平台能在工作负载真正压上集群前先抓出多厂商失效模式，把 time-to-revenue 拉短；
    比等 GPU 已经闲下来再去拼各家点工具，既更快也更稳。
  pricingHypothesis: >-
    按 fabric 域或每 1,000 个纳管 GPU 收年订阅费；新集群上线和大规模扩容，再叠加高级 commissioning 套餐
