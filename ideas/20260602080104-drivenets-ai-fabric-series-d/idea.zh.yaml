jobsToBeDone:
  - job: >-
      当一个新的异构 AI 集群快要上线时，帮基础设施团队证明 fabric 已经能承载真实训练和推理流量，
      这样他们就不用再花几周蹲 war room 调 bug，便能把 GPU 释放给客户。
    currentAlternative: 在各家厂商工具和系统集成商清单之间做人工验收测试
    successMetric: 从硬件到货到集群可产生收入的 go-live 天数
  - job: >-
      当固件升级、机架扩容或厂商组合变化落到在线集群上时，帮网络团队先预判对利用率的影响，
      这样就能避免 GPU 闲置和紧急回滚。
    currentAlternative: 用电子表格做变更评审，上线后再补做监控
    successMetric: 网络变更后，由 fabric 引发的利用率下滑和回滚事件减少多少
