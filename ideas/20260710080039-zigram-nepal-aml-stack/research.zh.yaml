  competitiveLandscape: ZIGRAM 是最直接的威胁，因为它已经把尼泊尔本地化和统一技术栈、本地伙伴模式绑在了一起。Tookitaki 靠聚焦 APAC 的 FRAML 运营和降低假阳性竞争，ComplyAdvantage 靠 API/数据驱动的筛查监控竞争，NICE Actimize 和 Oracle 则靠广泛的企业级套件竞争。尼泊尔市场里真正的替代品，仍然是现有 AML 模块加表格加系统集成商的组合，不是完全没有软件 [16][17][18][19][20][21][22][23][24][26][27][28][29][30][32][33][35]。
  incumbentThesis:
  - incumbentClass: 全球 AML 套件
    point: Oracle 和 NICE Actimize 已经覆盖监控、筛查、反欺诈和监管报告，但它们的公开资料是横向通用的，尼泊尔专属的申报内容和本地落地的复杂性，仍然留给客户或伙伴生态自己解决。
    sourceRefs:
