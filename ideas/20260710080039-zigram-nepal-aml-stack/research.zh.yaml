    point: ZIGRAM 已经证明本地实施联盟有助于拿下尼泊尔的交易，但同样的模式也可能留出空间，给一个更轻的厂商中立叠加层——如果银行只想要本地化而不想换掉整套系统。
    sourceRefs:
