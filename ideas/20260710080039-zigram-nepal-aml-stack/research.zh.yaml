  - incumbentClass: APAC 反金融犯罪套件
    point: Tookitaki 更贴近工作流，在 FRAML/案件管理上宣称很强，但它公开的定位是 APAC 通用型，而不是明确针对尼泊尔本地化。
    sourceRefs:
    - 22
    - 23
    - 24
    - 25
  - incumbentClass: 以 API 为主的筛查与数据厂商
    point: ComplyAdvantage 在全球筛查数据、模块化监控和案件工作流上最强，但它的定位仍是原生 API 风险基础设施，而不是尼泊尔专属的监管内容包。
