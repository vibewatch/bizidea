reportMemo:
  executiveTakeaways:
  - 需求信号是真实的，但很集中：Machhapuchchhre Bank 已经选择 ZIGRAM 的尼泊尔本地化统一 AML/反欺诈技术栈，证明只要把本地化和工作流统一打包在一起，尼泊尔市场上确实有买家愿意为这个品类掏钱 [16][17][20]。
  - 本地化——而不是原始检测模型——才是可信的切口。FIU-Nepal 持续更新 STR/SAR 和 TTR 指引，APG 认为商业银行相对其他金融机构更成熟，但市场其余部分在筛查和监管上仍有缺口 [4][5][6]。
  - 尼泊尔的数字化规模足以制造痛点，但单靠自身还撑不起风投级规模：NRB 名录上仍只有 20 家商业银行，但 2023/24 财年移动银行用户已达到 2465 万，QR 支付笔数增长 117.03% [1][2]。
  - 横向的现有厂商已经覆盖了通用技术栈。Oracle、NICE Actimize、Tookitaki 和 ComplyAdvantage 都在卖监控、筛查或案件管理模块，所以创业公司必须以尼泊尔专属编排层的身份取胜，而不是再造一套通用全套件 [22][26][29][32]。
  - 第三年 SOM 靠几家客户就能达到，但如果不做区域扩张，TAM 依然有限；本地市场天花板是真实存在的，除非尼泊尔能变成一套可复用的本地化引擎，服务南亚周边市场和支付机构 [1][2][36][37]。
  marketDefinition: 市场定义：为南亚金融机构本地化金融犯罪管控的软件与数据层——把客户和支付筛查、交易监控、反欺诈告警统一、案件管理，以及针对尼泊尔特定义务的 FIU 达标报告结合在一起，而不是通用的全球 AML 模块 [3][5][6][18][19][22][29][32][35]。
  customerAndBuyer: 日常使用者是尼泊尔商业银行的 AML/FCC 运营负责人、相当于 MLRO 的团队，以及反欺诈运营经理；经济买家通常是负责数字渠道风险和监管管控的 CRO、合规负责人或 COO [1][2][4][16][17]。
  buyingTriggers:
  - point: NRB/FIU 审查、内部审计，或可疑活动报告整改工作，会暴露出还有多少本地申报逻辑仍停留在表格和人工调查员手里。
    sourceRefs:
    - 4
    - 5
    - 6
  - point: 数字支付增长推高了告警量，让现有人手更难同时管理分开的反欺诈、筛查和 AML 队列。
    sourceRefs:
    - 2
    - 14
    - 15
  - point: 银行现代化或换厂商项目，为一层更轻的本地化方案，或与本地伙伴一起部署的统一 FRAML 技术栈，打开了机会窗口。
    sourceRefs:
    - 16
    - 17
    - 20
    - 21
  willingnessToPay:
    summary: 公开定价信息很少，但付费意愿是可信的：一家尼泊尔商业银行已经买下了这个品类，现有厂商把这些产品定位成企业级风险平台，相邻市场的案例研究关注的是扩充合规团队，而不是替换免费工具。预算科目已经存在于银行风险/合规现代化和支付筛查项目之中。
    sourceRefs:
