competitors:
- name: ZIGRAM
  stage: scale-up
  wedge: 与本地实施伙伴一起销售的尼泊尔本地化全套 AML/FRAML 技术栈。
  pricing: 企业定制定价，无公开报价单。
  strength: 已经拿下一个真实的尼泊尔银行部署案例，落地模式清晰依赖本地伙伴。
  weaknessVsUs: 一个更轻、厂商中立的本地化层，比整套系统替换更容易被采用。
  sourceRefs:
  - 16
  - 17
  - 18
  - 19
  - 20
  - 21
- name: Tookitaki
  stage: scale-up
  wedge: 聚焦 APAC 的反金融犯罪套件，宣称具备可解释 AI、案件管理和假阳性降低能力。
  pricing: 企业定制定价，无公开报价单。
  strength: FRAML 相关的营销话术很强，公开宣称部署更快、假阳性更少、告警命中率更高。
  weaknessVsUs: 公开资料是区域通用型，而不是明确以尼泊尔报告需求为先。
  sourceRefs:
  - 22
  - 23
  - 24
  - 25
- name: ComplyAdvantage
  stage: scale-up
  wedge: 以模块化平台形式交付的 AI 驱动筛查、监控和金融犯罪情报。
  pricing: 企业定制定价，无公开报价单。
  strength: PEP/制裁数据能力强，工作流采用模块化设计，并有案例证明成长中的受监管企业会为筛查和监控升级付费。
  weaknessVsUs: 面向全球 API/数据的定位，并不能自动解决尼泊尔专属申报包或本地部署信任的问题。
  sourceRefs:
  - 26
  - 27
  - 28
  - 38
  - 39
- name: NICE Actimize
  stage: incumbent
  wedge: 覆盖 AML、反欺诈、制裁和调查的企业级 FRAML 和监控技术栈。
  pricing: 企业定制定价，无公开报价单。
  strength: 套件覆盖深度广，且明确定位为统一的反欺诈加 AML。
  weaknessVsUs: 尼泊尔市场规模不大，一整套企业级套件仍会把昂贵的最后一公里本地化工作留给买家自己解决。
  sourceRefs:
