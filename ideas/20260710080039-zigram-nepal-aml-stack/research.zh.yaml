  validationPlan:
  - priority: high
    question: 尼泊尔 20 家商业银行中，哪些已经在用 Oracle、NICE、Tookitaki、自建系统或人工 AML 工作流？哪些地方用叠加层比整套推翻重建更容易？
    evidenceToGather: 访谈 8-10 位银行 AML 负责人，梳理当前厂商、人工变通做法和即将到来的续约日期。
  - priority: high
    question: 目标银行目前仍靠人工完成的 FIU-Nepal 申报材料和审计留痕有哪些？
    evidenceToGather: 在两个合规团队准备 STR/SAR 和 TTR 材料时全程跟进观察，包括数据提取、证据包和审批链条。
  - priority: medium
    question: 在商业银行滩头市场饱和之前，存在 NRB AML 缺口的支付机构是否有独立预算？
    evidenceToGather: 访谈 5 位 PSP/PSO 风险负责人，核实 AML-CFT 是否已经作为一项预算科目出现在 2026 年的合规或技术规划中。
  - priority: medium
    question: 哪个相邻市场能用最少的全新规则和数据集，复用尼泊尔本地化引擎？
    evidenceToGather: 各选一家共创客户机构，比较尼泊尔和斯里兰卡的报告义务、筛查规则和调查员工作流。
