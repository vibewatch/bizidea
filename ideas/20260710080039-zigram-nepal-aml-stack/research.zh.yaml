    mitigation: 以模块化叠加层的方式落地，配合分阶段连接器，而不是要求立刻替换整套系统。
    sourceRefs:
    - 2
    - 19
    - 24
    - 29
    - 33
  - friction: 在一个极小买家市场里的信任和采购惯性
    severity: high
    affectedBuyer: CRO / 合规负责人
    mitigation: 用共创客户部署和本地实施伙伴快速建立参考案例，降低外界感知到的执行风险。
    sourceRefs:
    - 16
    - 17
    - 20
    - 21
  - friction: 从银行滩头市场扩展到支付机构
    severity: medium
    affectedBuyer: 创始人 / 国家总经理
    mitigation: 优先服务规模更大、监管更严的机构，只有在银行参考案例建立起来之后，才把 PSP 专属的管控缺口产品化。
    sourceRefs:
    - 2
    - 4
