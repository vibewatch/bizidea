  - incumbentClass: 内部工作流加系统集成商
    point: 退路仍然是表格、人工调查，以及东拼西凑的现有模块；APG 和 NRB 的证据显示这种方式能运转，但水平参差不齐，尤其是在最大几家银行之外。
    sourceRefs:
    - 2
