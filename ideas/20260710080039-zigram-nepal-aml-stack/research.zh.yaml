    - 17
  - point: 像 AMNIL 和 Dolma 这样的本地实施伙伴是可信的渠道，因为他们能减少基础设施、落地和监管信任方面的阻力。
    sourceRefs:
    - 20
    - 21
  - point: 随着 NRB 在尽职调查、AML 预算和数字支付增长上的监管趋严，支付机构会是第二条渠道。
    sourceRefs:
