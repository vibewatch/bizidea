- name: Oracle
  stage: incumbent
  wedge: 覆盖交易监控、客户尽职调查、筛查和监管报告的端到端 FCCM 技术栈。
  pricing: 企业定制定价，无公开报价单。
  strength: 模块覆盖深入，套件内置监管报告支持。
  weaknessVsUs: 横向能力强并不等于尼泊尔可用内容齐备，而且部署范围可能大大超出一个以本地化为先的更轻切口所需要的规模。
  sourceRefs:
