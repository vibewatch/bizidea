  regulatoryLandscape: 尼泊尔 AML 的法律基线是《资产（货币）洗钱防制法》，FIU-Nepal 在 NRB 内部运行更新后的 STR/SAR 和 TTR 流程。APG 2023 年的互评报告认为，商业银行和较大金融机构在自动化筛查上比其他金融机构更领先，而 NRB 的支付监管检查仍然在支付机构中发现尽职调查薄弱、AML 项目预算不足和治理缺口 [3][4][5][6][2]。
  technologyLandscape: 支撑技术栈已经很清楚：统一 FRAML、可解释 AI 监控、实体级筛查、集成案件管理和监管机构认可的报告。Tookitaki、NICE Actimize、Oracle 和 ComplyAdvantage 都在卖这套架构里的某一块，所以创业公司的优势必须来自尼泊尔专属的数据、工作流和部署方式，而不是通用的模型宣称 [14][15][22][23][24][26][27][28][29][30][32][33][35]。
  distributionChannels:
  - point: 创始人主导，直接卖进尼泊尔 20 家商业银行，是最清晰的切口，因为买家集中，而且至少有一家具名银行已经为这个品类掏钱。
    sourceRefs:
    - 1
