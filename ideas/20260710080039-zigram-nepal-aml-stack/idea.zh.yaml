problem: >-
  尼泊尔地区银行面临的金融犯罪合规义务，常被全球 AML 套件当作事后定制来处理——尤其在本地 PEP 数据、FIU 报告和监管特定工作流上。这迫使合规团队在通用的制裁筛查、交易监控和反欺诈系统之上，硬套表格核对和人工案件准备，结果就是调查缓慢、审计脆弱。银行数字化渠道的同时，各自为战的反欺诈和 AML 技术栈还在成倍增加告警和交接环节，恰好撞上本地监管机构收紧管控的时点。
targetUser:
  primary: 正在推进移动和数字银行现代化的尼泊尔商业银行 AML 与金融犯罪运营负责人。
  secondary: 同一批银行里负责整合分散监控工具的 CIO 和反欺诈运营转型负责人。
  buyer: 尼泊尔商业银行的首席风险官或合规负责人。
startupThesis:
  nonObviousInsight: >-
    新兴市场 FRAML 领域真正能赢的产品，不是通用检测引擎，而是本地化层——把本地 PEP 情报、监管机构认可的报告和本地部署，打包进一套银行可直接上线的工作流。
  beachhead: >-
    尼泊尔商业银行中拥有 20-100 家分支机构、移动银行交易量在增长，且制裁筛查、交易监控与反欺诈审查各自为战的 AML 与反欺诈运营团队。
  wedge: >-
    一套尼泊尔专属的 FRAML 层，接入现有银行系统，提供本地 PEP 覆盖、Nepal Rastra Bank 与 FIU-Nepal 报告包、统一告警分流和调查员案件处理。
  whyNowCatalyst: >-
    Machhapuchchhre Bank 现场选定了一套统一、基于微服务、尼泊尔本地化的 AML 系统，说明买家正在从通用合规工具转向本地化 FRAML 技术栈。
  ventureScalePath: >-
    从尼泊尔商业银行起步，再把同一套本地化引擎复用到汇款服务商、电子钱包和其他南亚前沿市场金融机构，最终成为多家 AML 厂商底层的监管数据与工作流层。
solution: >-
  该产品叠加在银行的核心、渠道和交易系统之上，提供持续维护的尼泊尔 PEP 与实体数据包、NRB 和 FIU 报告模板，以及制裁、AML 和反欺诈的本地规则库。它把告警统一到一个调查员控制台，让可疑账户、支付模式和欺诈信号被当作一个案件处理，而不是分散在三个队列里。微服务架构让银行可以逐步采用各模块，并与本地实施伙伴一起在当地部署，与来源中描述的落地模式一致。随着时间推移，公司可以在相似银行之间对假阳性调优和调查工作流做基准对比，加深护城河。
goToMarketSeed:
  firstCustomer: >-
    一家拥有 25-75 家分支机构、有自有移动应用、即将迎来 NRB 或 FIU 报告审查的尼泊尔商业银行的 AML 或金融犯罪运营负责人。
  buyingTrigger: >-
    一次面向监管机构的报告审查，或数字银行现代化项目，暴露出把本地 AML 和反欺诈管控硬套在进口软件上的成本。
  currentAlternative: >-
    分散的全球 AML 模块、基于表格的本地 PEP 核对、人工 FIU 报告准备，以及系统集成商主导的定制集成。
  switchingReason: >-
    一套打包的尼泊尔本地化层能缩短实施时间、降低人工报告风险，并消除点状工具在反欺诈和合规团队之间造成的交接。
  pricingHypothesis: >-
    按银行主体收取年度订阅费，叠加告警量分级定价，实施和本地化更新费用与本地伙伴一同交付。
