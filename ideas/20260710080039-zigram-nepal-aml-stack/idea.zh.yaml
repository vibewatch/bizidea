jobsToBeDone:
  - job: >-
      当尼泊尔银行推进数字渠道现代化或更换 AML 工具时，帮助 AML 负责人把筛查、监控和报告本地化，让银行上线时不留 NRB/FIU 缺口。
    currentAlternative: 全球 AML 厂商模块，加上基于表格的本地合规工作和系统集成商定制。
    successMetric: 从启动到监管机构认可上线所需的周数，以及自动填充的 FIU 申报字段比例。
  - job: >-
      当反欺诈和 AML 告警分流到不同团队时，帮助调查员把信号合并成一个案件，用更少的人工交接更快关闭高风险告警。
    currentAlternative: 分散的反欺诈工具、交易监控队列，以及邮件或表格里的人工案件记录。
    successMetric: 调查耗时中位数，以及假阳性交接率。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 三份互相印证的来源和一次具名银行部署证明了真实需求，尽管证据集中在单一市场。
  painIntensity:
    score: 4
    rationale: 金融犯罪管控缺口带来监管和欺诈损失风险，不过紧迫程度仍取决于每家银行自身的数字化增速。
  wedgeClarity:
    score: 5
    rationale: 尼泊尔专属 PEP 覆盖、FIU 报告和统一 FRAML 工作流，共同定义了一款清晰、可直接采购的切入产品。
  defensibility:
    score: 4
    rationale: 监管映射、本地数据和告警反馈调优会随时间积累优势，尽管全球 AML 厂商可能复制其中部分能力。
  ventureScale:
    score: 4
    rationale: 首个市场狭小，但本地化层可以扩展到前沿市场的银行、电子钱包和汇款通道。
topRisks:
  - name: 本地市场天花板
    description: 如果扩张逻辑不成立，仅靠尼泊尔市场可能撑不起风投级回报。
    mitigation: 把尼泊尔当作验证点，再将可复用的本地化包产品化，推向南亚周边银行和资金转移市场。
  - name: 现有厂商挤压
    description: 一旦需求得到验证，全球 AML 厂商或本地系统集成商可能会把尼泊尔本地化能力捆绑进自己的产品。
    mitigation: 在监管映射、伙伴分销渠道和统一反欺诈加 AML 工作流数据上抢先一步——这些恰恰是服务公司难以标准化复制的部分。
  - name: 合规准确性责任风险
    description: 本地 PEP 覆盖或 FIU 报告模板中的错误，可能损害早期银行客户的信任。
    mitigation: 每次发布前，用带版本号的规则包配合人工审批流程、本地合规专家和参考银行验证来把关。
