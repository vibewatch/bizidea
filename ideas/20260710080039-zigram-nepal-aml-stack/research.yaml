reportMemo:
  executiveTakeaways:
  - 'The demand signal is real but concentrated: Machhapuchchhre Bank already chose ZIGRAM for a Nepal-localized unified AML/fraud stack, proving that a buyer in Nepal will fund this category when localization and workflow unification are packaged together [16][17][20].'
  - Localization—not raw detection models—is the credible wedge. FIU-Nepal keeps updating STR/SAR and TTR guidance, and APG says commercial banks are relatively more advanced than other FIs while the rest of the market still shows screening and supervision gaps [4][5][6].
  - 'Nepal is digitally large enough to create pain but not large enough to create venture scale on its own: NRB still lists only 20 commercial banks, yet mobile banking users reached 24.65 million and QR payment number grew 117.03% in FY2023/24 [1][2].'
  - Horizontal incumbents already cover the generic stack. Oracle, NICE Actimize, Tookitaki, and ComplyAdvantage all market monitoring, screening, or case-management modules, so a startup must win as the Nepal-specific orchestration layer rather than as another generic full suite [22][26][29][32].
  - Year-3 SOM is reachable at a few logos, but TAM remains modest without regional expansion; the local-market ceiling is real unless Nepal becomes a reusable localization engine for adjacent South Asian markets and payment institutions [1][2][36][37].
  marketDefinition: 'Defined market: software and data layers that localize financial-crime controls for South Asian financial institutions—combining customer and payment screening, transaction monitoring, fraud-alert unification, case management, and FIU-ready reporting for Nepal-specific obligations rather than generic global AML modules [3][5][6][18][19][22][29][32][35].'
  customerAndBuyer: Day-to-day users are heads of AML/FCC operations, MLRO-equivalent teams, and fraud-operations managers at Nepali commercial banks; the economic buyer is usually the CRO, Head of Compliance, or COO who owns digital-channel risk and regulator-facing controls [1][2][4][16][17].
  buyingTriggers:
  - point: An NRB/FIU review, internal audit, or suspicious-activity reporting remediation effort exposes how much local filing logic still lives in spreadsheets and manual investigator work.
    sourceRefs:
    - 4
    - 5
    - 6
  - point: Digital-payment growth increases alert volume and makes separate fraud, screening, and AML queues harder to manage with existing staff.
    sourceRefs:
    - 2
    - 14
    - 15
  - point: A bank modernization or vendor-change program creates an opening for a lighter localization layer or a unified FRAML stack deployed with local partners.
    sourceRefs:
    - 16
    - 17
    - 20
    - 21
  willingnessToPay:
    summary: Public pricing is scarce, but willingness to pay is credible because a Nepal commercial bank has already bought the category, incumbent vendors position these products as enterprise-wide risk platforms, and case studies from adjacent markets focus on scaling compliance teams rather than on replacing free tools. The budget line already exists inside bank risk/compliance modernization and payment-screening programs.
    sourceRefs:
    - 16
    - 17
    - 22
    - 25
    - 26
    - 38
    - 39
  competitiveLandscape: ZIGRAM is the closest direct threat because it already pairs Nepal localization with a unified stack and local partner model. Tookitaki competes on APAC-focused FRAML operations and false-positive reduction, ComplyAdvantage on API/data-driven screening and monitoring, and NICE Actimize plus Oracle on broad enterprise suites. The true substitute inside Nepal remains incumbent AML modules plus spreadsheets and SI work, not no software at all [16][17][18][19][20][21][22][23][24][26][27][28][29][30][32][33][35].
  incumbentThesis:
  - incumbentClass: Global AML suites
    point: Oracle and NICE Actimize already cover monitoring, screening, fraud, and regulatory reporting, but their public material is horizontal and still leaves Nepal-specific filing content and local rollout complexity to the customer or partner ecosystem.
    sourceRefs:
    - 29
    - 30
    - 31
    - 32
    - 33
    - 34
    - 35
  - incumbentClass: APAC anti-financial-crime suites
    point: Tookitaki is closer to the workflow and has strong FRAML/case-management claims, but its public positioning is APAC-generic rather than explicitly Nepal-localized.
    sourceRefs:
    - 22
    - 23
    - 24
    - 25
  - incumbentClass: API-led screening and data vendors
    point: ComplyAdvantage is strongest where global screening data, modular monitoring, and case workflow matter, but it is still oriented around API-native risk infrastructure rather than a Nepal-specific regulatory pack.
    sourceRefs:
    - 26
    - 27
    - 28
    - 38
    - 39
  - incumbentClass: Local partner plus full-stack model
    point: ZIGRAM already proves that local implementation alliances help close Nepal deals, yet that same model could leave room for a thinner vendor-neutral overlay if banks want localization without a bigger suite replacement.
    sourceRefs:
    - 16
    - 17
    - 18
    - 19
    - 20
    - 21
  - incumbentClass: In-house workflows plus system integrators
    point: The fallback remains spreadsheets, manual investigations, and stitched-together incumbent modules; APG and NRB evidence shows this is workable but uneven, especially outside the largest banks.
    sourceRefs:
    - 2
    - 4
    - 5
    - 6
  regulatoryLandscape: Nepal’s AML baseline is the Asset (Money) Laundering Prevention Act, with FIU-Nepal running updated STR/SAR and TTR processes inside NRB. APG’s 2023 mutual evaluation says commercial banks and larger FIs are further ahead on automated screening than other FIs, while NRB’s payment-oversight inspections still find weak due diligence, under-budgeted AML programs, and governance gaps among payment institutions [3][4][5][6][2].
  technologyLandscape: 'The enabling stack is already clear: unified FRAML, explainable AI monitoring, entity-level screening, integrated case management, and regulator-ready reporting. Tookitaki, NICE Actimize, Oracle, and ComplyAdvantage all market pieces of this architecture, which means the startup’s edge must come from Nepal-specific data, workflows, and deployment rather than from generic model claims [14][15][22][23][24][26][27][28][29][30][32][33][35].'
  distributionChannels:
  - point: Direct founder-led selling into Nepal’s 20 commercial banks is the clearest wedge because the buyer set is concentrated and at least one named bank has already funded the category.
