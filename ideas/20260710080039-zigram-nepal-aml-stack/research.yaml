  validationPlan:
  - priority: high
    question: Which of Nepal’s 20 commercial banks already run Oracle, NICE, Tookitaki, homegrown, or manual AML workflows, and where is an overlay easier than a rip-and-replace?
    evidenceToGather: Interview 8-10 bank AML leaders and map current vendors, manual workarounds, and upcoming renewal dates.
  - priority: high
    question: Which FIU-Nepal submission artifacts and audit trails are still manual at target banks today?
    evidenceToGather: Shadow two compliance teams during STR/SAR and TTR preparation, including the data pulls, evidence packs, and approval chain.
  - priority: medium
    question: Do payment institutions with NRB AML gaps have independent budget before the commercial-bank beachhead saturates?
    evidenceToGather: Interview 5 PSP/PSO risk leaders and review whether AML-CFT appears as a line item in 2026 compliance or tech plans.
  - priority: medium
    question: Which adjacent market reuses the Nepal localization engine with the fewest net-new rules and datasets?
    evidenceToGather: Compare Nepal and Sri Lanka reporting obligations, screening rules, and investigator workflows across one design-partner institution each.
