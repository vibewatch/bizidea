openQuestions:
- How many of Nepal’s 20 commercial banks already run incumbent AML/fraud suites, and where is an overlay sale easier than a rip-and-replace?
- Will NRB or FIU-facing buyers insist on in-country or on-prem deployment for suspicious-activity case data?
- Which Nepal-specific datasets—PEP, beneficial ownership, adverse media, remittance corridor intelligence—remain most manual today?
- Is Sri Lanka or the Nepal PSP/remittance segment the faster second wedge once the first bank reference goes live?
