problem: >-
  Regional banks in Nepal face financial-crime obligations that global AML suites often treat as afterthought
  customization, especially around local PEP data, FIU reporting, and regulator-specific workflows. That forces
  compliance teams to bolt spreadsheet checks and manual case prep onto generic sanctions, monitoring, and fraud
  systems, creating slow investigations and brittle audits. As banks digitize channels, separate fraud and AML stacks
  also multiply alerts and handoffs just as local supervisors expect tighter control.
targetUser:
  primary: Heads of AML and financial-crime operations at Nepali commercial banks modernizing mobile and digital banking.
  secondary: CIOs and fraud-operations transformation leads at the same banks consolidating fragmented monitoring tools.
  buyer: Chief Risk Officer or Head of Compliance at a Nepali commercial bank.
startupThesis:
  nonObviousInsight: >-
    The winning product in emerging-market FRAML is not the generic detection engine; it is the localization layer that
    packages local PEP intelligence, regulator-ready reporting, and in-country deployment into one bank-ready workflow.
  beachhead: >-
    AML and fraud operations teams at Nepali commercial banks with 20-100 branches, growing mobile-banking volumes, and
    separate sanctions screening, transaction monitoring, and fraud-review workflows.
  wedge: >-
    A Nepal-specific FRAML layer that plugs into existing banking systems to deliver local PEP coverage, Nepal Rastra
    Bank and FIU-Nepal report packs, unified alert triage, and investigator casework.
  whyNowCatalyst: >-
    Machhapuchchhre Bank's live selection of a unified, microservices-based, Nepal-localized AML system shows that
    buyers are moving now from generic compliance tooling to localized FRAML stacks.
  ventureScalePath: >-
    Start with Nepali commercial banks, then reuse the same localization engine across remittance providers, wallets,
    and other South Asian frontier-market financial institutions, eventually becoming the regulatory-data and workflow
    layer underneath multiple AML vendors.
solution: >-
  The product would sit above a bank's core, channel, and transaction systems and ship a maintained Nepal pack of PEP
  and entity data, NRB and FIU reporting templates, and local rule libraries for sanctions, AML, and fraud. It would
  unify alerts into one investigator console so a suspicious account, payment pattern, and fraud signal are worked as
  one case instead of three queues. A microservices design would let banks adopt modules gradually and deploy them
  in-country with local implementation partners, matching the rollout model described in the sources. Over time, the
  company could benchmark false-positive tuning and investigation workflows across similar banks to deepen its moat.
goToMarketSeed:
  firstCustomer: >-
    Head of AML or financial-crime operations at a Nepali commercial bank with 25-75 branches, an in-house mobile app,
    and an upcoming NRB or FIU reporting review.
  buyingTrigger: >-
    A regulator-facing reporting review or digital-banking modernization project that exposes the cost of stitching
    local AML and fraud controls onto imported software.
  currentAlternative: >-
    Separate global AML modules, spreadsheet-based local PEP checks, manual FIU report preparation, and SI-led custom
    integrations.
  switchingReason: >-
    A packaged Nepal localization layer cuts implementation time, reduces manual reporting risk, and eliminates handoffs
    between fraud and compliance teams that point tools create.
  pricingHypothesis: >-
    Annual subscription per bank entity plus alert-volume tiers, with paid implementation and localization updates
    delivered alongside local partners.
