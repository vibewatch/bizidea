jobsToBeDone:
  - job: >-
      When a Nepali bank modernizes digital channels or replaces an AML tool, help the AML lead localize screening,
      monitoring, and reporting so the bank can go live without NRB/FIU gaps.
    currentAlternative: Global AML vendor modules plus spreadsheet-based local compliance work and SI customization.
    successMetric: Weeks to regulator-ready go-live and percentage of FIU filing fields auto-populated.
  - job: >-
      When fraud and AML alerts hit separate teams, help investigators merge signals into one case so they can close
      higher-risk alerts faster with fewer manual handoffs.
    currentAlternative: Separate fraud tools, transaction-monitoring queues, and manual case notes in email or spreadsheets.
    successMetric: Median investigation time and false-positive handoff rate.
