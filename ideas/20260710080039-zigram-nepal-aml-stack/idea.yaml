topRisks:
  - name: Local-market ceiling
    description: Nepal alone may not support venture outcomes if expansion logic is weak.
    mitigation: Use Nepal as the proof point, then productize reusable localization packs for adjacent South Asian banking and money-movement markets.
  - name: Incumbent vendor squeeze
    description: Global AML vendors or local SIs could bundle Nepal localization once demand is proven.
    mitigation: Move faster on regulator mappings, partner distribution, and unified fraud-plus-AML workflow data that services firms cannot easily standardize.
  - name: Compliance accuracy liability
    description: Errors in local PEP coverage or FIU reporting templates could damage trust with early bank customers.
    mitigation: Ship versioned rule packs with human approval workflows, local compliance SMEs, and reference-bank validation before each release.
