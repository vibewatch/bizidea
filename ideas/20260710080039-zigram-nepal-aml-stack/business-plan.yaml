slug: nepal-framl-localization-os
date: "2026-07-10"
executiveSummary: >-
  Nepal FRAML localization OS should start as a vendor-neutral localization
  overlay for Nepali commercial banks that already run imported AML or fraud
  tools plus manual local workflows. Research shows live demand because
  Machhapuchchhre Bank has already bought a Nepal-localized unified stack and
  FIU-Nepal updated STR/SAR and TTR guidance in 2025, making local rule
  maintenance and filing accuracy urgent. The first product is not a new
  generic detection engine; it is Nepal-specific PEP/RCA data, FIU-ready
  report packs, unified alert triage, and investigator casework deployed on
  top of incumbent systems with local partners. The first customer is a 25-75
  branch Nepali commercial bank with an in-house mobile app, rising
  digital-payment volume, and an upcoming NRB or FIU review or modernization
  project. The first sale should be a paid pilot for one bank entity and one
  reporting workflow that converts only after the platform auto-populates most
  filing fields, reduces manual case preparation, and shortens investigation
  cycle time. This wedge is attractive because the buyer set is concentrated,
  pain is regulator-linked, and an overlay can be proven faster than a
  full-suite rip-and-replace. The market is real but small: modeled SAM is
  about $8.0M and year-3 SOM about $1.6M, so the venture case depends on
  reusing the localization engine in Sri Lanka or adjacent regulated
  institutions. Research does not yet confirm incumbent penetration,
  in-country deployment requirements, or credible price points, so overlay win
  rate, deployment architecture, and ACV must be validated in the first 12
  months.
problem:
  - >-
    Nepali commercial banks still stitch together global AML modules,
    spreadsheet-based local PEP checks, and manual STR/SAR/TTR preparation
    even as digital-payment volume raises alert counts.
  - >-
    Separate fraud and AML queues create duplicate investigations, slower
    escalations, and weaker audit trails exactly when NRB/FIU scrutiny is
    rising.
  - >-
    Generic vendors cover monitoring and screening breadth but leave
    Nepal-specific filing logic, local data maintenance, and regulator-ready
    workflows to the bank or SI.
solution:
  - >-
    Ship a Nepal localization overlay with maintained PEP/RCA and reporting
    mappings, versioned STR/SAR/TTR packs, and auditable evidence generation
    for regulator-facing filings.
  - >-
    Unify fraud, screening, and AML alerts into one investigator queue and
    case file without forcing the bank to replace its current monitoring stack
    on day one.
  - >-
    Deploy through modular connectors and local partners so a bank can start
    with one entity and one workflow, then add modules after proof.
whyWeWin:
  - >-
    The startup sells the last-mile product gap incumbents and SIs still treat
    as custom work: Nepal-specific data, filing templates, and investigator
    workflow tied to live rule changes.
  - >-
    A vendor-neutral overlay is easier for banks to buy than a full-suite
    replacement because it fits existing modernization budgets and lowers
    core-system switching risk.
  - >-
    Cross-bank tuning data, filing-template history, and local partner
    deployment playbooks compound into a moat that generic global suites do
    not maintain market by market.
strategicChoices:
  beachhead: >-
    Nepali commercial banks with 20-100 branches, growing mobile or QR payment
    usage, separate fraud plus AML workflows, and a near-term NRB/FIU review
    or modernization trigger.
  wedgeRationale: >-
    Commercial banks are the fastest proof market because they already face the
    strongest supervisory expectations, have explicit local reporting pain, and
    represent a concentrated buyer set with at least one live category
    purchase. This creates faster referenceability than starting with Nepal
    payment institutions, remittance providers, or a broad South Asia suite.
  sequencingRationale: >-
    Build the localization overlay, filing packs, and unified casework before
    any new detection engine because deployment speed and reporting accuracy
    are the gating risks. Keep sales founder-led through the first 2-3 bank
    pilots, use local partners to reduce rollout friction, and expand into a
    second market only after the Nepal deployment kit, pricing, and pilot to
    production motion are repeatable.
  notYet:
    - Full transaction-monitoring or fraud-detection engine replacement before the localization overlay proves repeatable.
    - Nepal payment institutions, wallets, and remittance providers before 2-3 commercial bank references exist.
    - Broad South Asia expansion before one adjacent regulatory pack reuses most of the Nepal content and data model.
    - Generative-AI investigator copilots before audit-ready reporting and case-triage workflow are trusted.
market:
  tam: >-
    $27.6M estimated TAM assuming Nepal commercial and development banks,
    Nepal payment institutions, and a later Sri Lanka bank cohort buy
    localized financial-crime workflow software.
  sam: >-
    $8.0M estimated SAM from Nepal’s 20 commercial banks at roughly $400k
    blended annual contract value per bank.
  som: >-
    $1.6M modeled year-3 SOM from 4 Nepal commercial bank logos at roughly
    $400k blended ACV.
  segments:
    - >-
      Nepali commercial banks with 20-100 branches, growing mobile or QR
      payment usage, and separate fraud plus AML workflows.
    - >-
      Nepal payment institutions and adjacent South Asian banks that can reuse
      the same localization engine after the bank beachhead is proven.
  buyingProcess: >-
    A Head of AML/FCC operations or transformation lead usually sponsors the
    deal when an NRB/FIU review or vendor-change project exposes manual local
    work. The CRO, Head of Compliance, or COO signs once a paid pilot shows
    faster filing prep, lower handoffs, and no need for a core-system
    rip-and-replace.
product:
  mvp: >-
    MVP covers one bank entity and one investigator workflow: Nepal PEP/RCA
    data, STR/SAR/TTR templates, unified alert inbox, case management, and
    audit trail layered over existing screening or monitoring systems. It
    excludes new detection models, cross-border expansion packs, and broad
    payment-institution workflows until the overlay proves adoption.
  sixMonth: >-
    Launch 2 design-partner pilots with standard core-banking or channel data
    connectors, versioned Nepal rule packs, approval workflow for filings, and
    KPI dashboards for filing auto-population, case-prep time, and alert
    handoff rate.
  twelveMonth: >-
    Convert 2 pilots to production, add false-positive tuning, regulator-change
    diff releases, partner deployment kit, and benchmark reporting across the
    first bank cohort.
  twentyFourMonth: >-
    Reach 4 production Nepal bank logos, package a reusable adjacent-market
    rule engine, and launch one second-market pilot in Sri Lanka or a closely
    related institution type only if the Nepal playbook is profitable and
    repeatable.
  keyBets:
    - Banks will buy a localization overlay even when an incumbent monitoring engine stays in place.
    - Versioned Nepal rule packs can be maintained as software, not custom consulting.
    - One unified case queue can cut manual handoffs enough to justify $250k-$400k annual software spend.
    - The second-market pack can reuse at least 60% of the Nepal content and workflow model.
gtm:
  wedge: >-
    Sell a paid Nepal-localization pilot into a commercial bank facing an
    NRB/FIU review, internal audit remediation, or digital-banking upgrade,
    replacing spreadsheet PEP checks and manual FIU case prep with a unified
    overlay on top of incumbent tools.
  channels:
    - Founder-led direct sales to Head of AML, Head of Compliance, CRO, and CIO buyers across Nepal’s 20 commercial banks.
    - Local Nepali implementation partners that own in-country rollout, data mapping, and regulator-comfort work.
    - Core-banking, digital-channel, and risk-integration partners once the first 2 production references exist.
  funnelTargets: "target-account intro→qualified discovery 50%+; qualified discovery→paid pilot 20-30%; paid pilot→production 60%+; first production bank→second module or entity expansion 50%+ within 12 months"
  pricing: >-
    Start with a $40k-$80k paid pilot for one bank entity and one reporting or
    casework workflow, then convert to a $250k-$400k annual subscription per
    bank entity priced by active modules and alert or filing volume, with
    separate implementation and annual localization-update fees. This keeps the
    initial approval inside a compliance-modernization budget while preserving
    expansion into broader fraud and AML workflows once ROI is proven.
businessModel:
  revenueStreams:
    - Annual software subscription per bank entity for Nepal-localized screening, casework, and reporting workflows.
    - One-time implementation, connector, and data-onboarding fees delivered with local partners.
    - Recurring localization-update and premium workflow modules for unified fraud-plus-AML case management and benchmarking.
  unitOfValue: One regulated bank entity running the Nepal localization pack, priced by active modules and monthly alert or filing volume
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more workflows, entities, or branch groups inside the first bank after pilot-to-production conversion.
    - Expand from filing and PEP localization into unified fraud-plus-AML casework and false-positive tuning.
    - Reuse the regulatory content engine for Sri Lanka or other adjacent South Asian bank markets.
    - Add payment-institution packs only after the commercial-bank deployment playbook is standardized.
strategyMap:
  northStarMetric: Number of production bank entities generating FIU-ready case packs from one unified alert queue each month
  inputMetrics:
    - Qualified Nepal commercial bank accounts with a named NRB/FIU review, audit remediation, or modernization trigger in the next 12 months.
    - Days from pilot kickoff to first live unified alert and filing workflow.
    - Percentage of STR/SAR/TTR fields auto-populated from system data and case history.
    - Median investigator case-preparation time and fraud-to-AML handoff rate versus customer baseline.
    - Paid pilot-to-production conversion and second-module expansion rate.
  moatsToBuild:
    - Nepal-specific PEP/RCA, beneficial-ownership, and filing mappings that stay current with FIU-Nepal rule changes.
    - Reusable connector and deployment playbooks that let local partners land the overlay without replacing incumbent systems.
    - Cross-bank alert-resolution and filing-history data that improves tuning and embeds the product in regulator-facing workflows.
  killCriteria:
    - Fewer than 2 of the first 10 Nepal commercial bank targets sign a paid pilot within 12 months.
    - The first 3 pilots fail to auto-populate at least 70% of required STR/SAR or TTR fields and cut median case-preparation time by 30%+ within 90 days.
    - Paid pilot-to-production conversion stays below 50% or realized software pricing lands below $250k annual per bank entity.
    - By month 18 the second-market pack reuses less than 60% of the Nepal rule objects and data model, leaving the regional expansion thesis unproven.
  mermaid: |
    flowchart LR
      Wedge[Nepal bank localization overlay] --> MVP[PEP plus FIU report pack plus unified casework]
      MVP --> Proof[2 production bank references and faster filings]
      Proof --> Expansion[Sri Lanka or adjacent institution pack]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Interesting regulatory-localization wedge with a real buyer signal, but
      current evidence is not yet enough for a partner meeting because Nepal
      alone is too small and ZIGRAM already has the reference logo.
    whyBelieve: >-
      A named bank purchase plus active FIU rule changes show that banks will
      fund Nepal-specific FRAML workflow software when it reduces manual
      reporting and investigation pain.
    whyDoubt: >-
      The first market contains only 20 commercial banks, pricing is not yet
      validated, and the best visible competitor already closed a live Nepal
      deployment.
    nextDiligence: >-
      Validate 8-10 bank accounts, then watch one paid pilot prove overlay
      deployment speed, pilot-to-production conversion, and reusable
      second-market localization.
  firstCustomer:
    title: Head of AML at a 25-75 branch Nepali commercial bank
    profile: >-
      A commercial bank with its own mobile app, growing digital-payment
      volume, imported AML modules or manual local checks, and separate fraud
      and compliance queues.
    trigger: >-
      An upcoming NRB/FIU review, internal audit remediation, or digital-banking
      modernization project exposes manual PEP checks and filing preparation.
    buyer: CRO or Head of Compliance
    initialContract: >-
      $40k-$80k paid pilot for one bank entity and one reporting workflow,
      converting to a $250k-$400k annual software subscription plus
      implementation and update fees if the pilot auto-populates 70%+ of
      filing fields and cuts case-prep time 30%+.
  mustBeTrue:
    - At least 6 of Nepal’s 20 commercial banks still run material parts of local PEP review or FIU reporting manually and face a budgeted modernization or audit trigger within 24 months.
    - At least 3 of the first 6 serious prospects prefer a vendor-neutral overlay over a full-suite replacement or SI-only project.
    - The first 3 pilots can auto-populate 70%+ of required STR/SAR or TTR fields and cut median case-preparation time by at least 30% within 90 days.
    - At least 50% of paid pilots convert to $250k+ annual software contracts without services exceeding 30% of first-year revenue.
    - A Sri Lanka or adjacent-institution pack can reuse at least 60% of the Nepal content, rules, and workflow model by month 18.
  diligenceQuestions:
    - How many of Nepal’s 20 commercial banks already use Oracle, NICE, Tookitaki, ZIGRAM, or homegrown workflows, and which are easiest to sell as overlays?
    - Do target banks require in-country or on-prem deployment for suspicious-activity case data, and what does that do to gross margin and rollout speed?
    - What percentage of FIU filing fields and case-preparation steps are still manual at the first 2 design partners?
    - Can the startup win against ZIGRAM and incumbent suites without owning the full transaction-monitoring engine?
    - Which second market reuses the Nepal pack with the least net-new regulatory content: Sri Lanka banks or Nepal payment institutions?
operatingAssumptions:
  - assumption: Banks will buy a Nepal-localization overlay without first replacing their incumbent monitoring or screening engines.
    basis: research.yaml
    validationTest: Win 2 paid pilots where the bank keeps its current monitoring engine in place and buys the overlay as the first scoped project.
    decisionImpact: If false, the company must expand into a heavier suite replacement motion, which increases capital needs and slows sales.
  - assumption: A $250k-$400k annual software contract per bank entity is acceptable once the pilot proves filing and workflow ROI.
    basis: research.yaml
    validationTest: Secure 3 written pricing validations or 1 paid pilot conversion at $250k+ annual software value within the first 12 months.
    decisionImpact: If false, the modeled SAM, SOM, and funding efficiency fall, forcing narrower scope or a less venture-scale plan.
  - assumption: Versioned Nepal STR/SAR and TTR packs can be maintained with software releases and limited SME review rather than labor-heavy custom services.
    basis: idea.yaml
    validationTest: Deliver 2 regulator-change updates to design partners within 5 business days each using the same release workflow and less than 1 week of SME effort per update.
    decisionImpact: If false, gross margin drops and the company should price explicitly for managed compliance services or narrow the product.
  - assumption: Local implementation partners can repeat deployments in under 90 days with limited custom engineering.
    basis: research.yaml
    validationTest: Complete the first 3 partner-assisted deployments in under 90 days each with less than 2 engineer-weeks of bespoke work per bank.
    decisionImpact: If false, partner leverage is weaker than planned and sales capacity must stay founder- and services-heavy longer.
  - assumption: An adjacent-market pack can reuse most of the Nepal content engine rather than requiring a near-full rebuild.
    basis: operator judgment
    validationTest: Build a Sri Lanka rule-gap map by month 12 showing at least 60% reuse of core data objects, filing workflow, and release tooling.
    decisionImpact: If false, the regional expansion thesis weakens and the company should be financed as a niche profitable business rather than a venture bet.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 12 Nepal commercial bank AML or compliance leaders and map current vendor stack, manual reporting steps, and renewal calendars.
    hypothesis: At least 6 banks have manual local workflow pain plus a concrete trigger in the next 24 months.
    successMetric: 6+ qualified banks with named trigger, current workflow map, and identified economic buyer.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Shadow STR/SAR and TTR preparation at 2 design-partner banks and quantify manual field entry, approval steps, and fraud-to-AML handoffs.
    hypothesis: Filing preparation and case assembly are manual enough to justify an overlay before a full-suite replacement.
    successMetric: Baseline showing 30%+ of filing fields or case-prep steps are manual at both banks.
    owner: Compliance product lead
  - horizon: 0–90 days
    experiment: Build the first Nepal rule-pack and unified casework prototype on one design-partner data sample.
    hypothesis: The product can auto-populate most required filing fields and unify separate alert queues without replacing the incumbent engine.
    successMetric: One prototype auto-populates 70%+ of filing fields and shows one shared case view across AML and fraud alerts.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Convert 2 design partners into paid pilots with one local implementation partner attached to each deployment.
    hypothesis: Partner-assisted rollout lowers trust and integration friction enough to get banks to pay before full platform replacement.
    successMetric: 2 paid pilots signed at "$40k+" each with explicit production conversion criteria.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Move the first 2 pilots into production and measure filing auto-population, case-prep time, and pilot-to-production conversion.
    hypothesis: Production proof on workflow efficiency and reporting accuracy is enough to win annual software contracts.
    successMetric: 2 production banks, 30%+ case-prep time reduction, and at least 1 contract at $250k+ annual software value.
    owner: Solutions lead
  - horizon: 6–12 months
    experiment: Run a Sri Lanka localization feasibility sprint with one advisor or design partner and compare rule reuse against Nepal.
    hypothesis: An adjacent bank market can reuse most of the localization engine, making regional expansion plausible.
    successMetric: Documented rule-gap map showing at least 60% reuse and one credible second-market pilot target.
    owner: Founder product
operations:
  - Maintain versioned Nepal STR/SAR, TTR, and PEP/RCA rule packs with explicit release notes, approval workflow, and rollback history.
  - Run data-quality checks on local watchlists, beneficial-ownership mappings, and filing templates before each customer release.
  - Standardize partner-led deployment playbooks for core-banking, channel, and case-management integrations so the product lands as an overlay rather than a custom SI project.
  - Track every pilot against pre-agreed baselines for filing auto-population, case-prep time, alert handoff rate, and audit readiness.
  - Preserve bank-controlled deployment options and evidence exports until real buyer data clarifies in-country or on-prem requirements.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led bank sales, pilot packaging, and early partner recruitment in a market with only 20 primary buyers.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the first Nepal rule engine, connectors, unified case queue, and audit trail required for design-partner pilots.
  - role: Compliance product lead
    startTiming: Month 0
    rationale: Translate FIU and NRB changes into versioned software requirements and keep reporting accuracy credible with early banks.
  - role: Solutions lead
    startTiming: Month 3
    rationale: Reduce deployment friction, codify partner onboarding, and protect core engineering time as pilots start.
  - role: Data operations analyst
    startTiming: Month 6
    rationale: Maintain local PEP/RCA and filing datasets so accuracy does not collapse into bespoke customer work.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Turn local implementation firms and integration partners into a repeatable channel once the first 2 production references exist.
milestones:
  - horizon: 0–12 months
    items:
      - Map current-state AML and fraud workflows across at least 10 of Nepal’s 20 commercial banks.
      - Sign 2 paid design-partner pilots with explicit filing and casework KPIs.
      - Convert 2 pilots to production and prove 70%+ filing-field auto-population plus 30%+ case-prep time reduction.
      - Publish a repeatable Nepal rule-pack release process and partner deployment kit.
  - horizon: 12–24 months
    items:
      - Reach 4 production Nepal commercial bank logos and validate the modeled $1.6M year-3 SOM path.
      - Win at least 1 second-module or second-entity expansion inside an early customer account.
      - Complete one adjacent-market localization pack and launch 1 non-Nepal pilot only if Nepal deployments stay under 90 days.
      - Keep services below 30% of first-year revenue per new logo.
  - horizon: 24–36 months
    items:
      - Establish a second regulated-institution market with 2 production references using the same content engine.
      - Build benchmark tuning and workflow analytics across the installed base without becoming a generic AML suite vendor.
      - Reach a partner-assisted deployment model that no longer depends on founders for every implementation.
risks:
  - risk: Nepal alone may not support venture returns if adjacent-market reuse is slower than planned.
    likelihood: High
    impact: High
    mitigation: Treat Nepal as the proof point, test Sri Lanka reuse by month 12, and avoid scaling burn until a second pack shows substantial content reuse.
  - risk: ZIGRAM or incumbent suites can bundle localization and squeeze the overlay wedge.
    likelihood: High
    impact: High
    mitigation: Position as the fastest vendor-neutral overlay, land before rip-and-replace decisions, and turn local data and workflow releases into a visible product advantage.
  - risk: Errors in local PEP coverage or FIU reporting logic could destroy trust with early banks.
    likelihood: Medium
    impact: High
    mitigation: Use versioned rule packs, human approval checkpoints, SME review, and release rollback before every filing-related update.
  - risk: In-country deployment, procurement, or data-access constraints make pilots slower and more services-heavy than planned.
    likelihood: Medium
    impact: High
    mitigation: Offer bank-controlled deployment patterns, standardize the first connector set, and qualify prospects on data access before signing pilots.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway should fund the Nepal rule engine, local data
    operations, 2-3 design-partner pilots, 2 production bank references,
    partner enablement, and one adjacent-market feasibility pack before a
    larger financing decision.
