slug: nepal-framl-localization-os
date: "2026-07-10"
executiveSummary: >-
  尼泊尔 FRAML 本地化操作系统应该从一层厂商中立的本地化叠加层起步，服务那些已经在跑进口 AML
  或反欺诈工具、外加人工本地流程的尼泊尔商业银行。研究显示需求真实存在：Machhapuchchhre Bank
  已经买下一套尼泊尔本地化的统一技术栈，FIU-Nepal 又在 2025 年更新了 STR/SAR 和 TTR 指引，本地
  规则维护和申报准确性因此变得紧迫。第一款产品不是又一个通用检测引擎，而是尼泊尔专属的 PEP/RCA
  数据、FIU 达标报告包、统一告警分流和调查员案件处理，部署在现有系统之上，并由本地伙伴协助落地。
  第一个客户是一家拥有 25-75 家分支机构、有自建移动应用、数字支付量在增长、即将迎来 NRB 或 FIU
  审查或现代化项目的尼泊尔商业银行。第一单应该是针对一个银行主体、一条报告工作流的付费试点，只有
  当平台自动填充大部分申报字段、减少人工案件准备、缩短调查周期后，试点才会转化为正式合同。这个切口
  有吸引力，因为买家集中、痛点与监管直接挂钩，而且叠加层比整套系统推翻重建更容易快速验证。市场是
  真实的但规模不大：建模得出的 SAM 约为 800 万美元，第三年 SOM 约为 160 万美元，所以风投级机会
  取决于能否把这套本地化引擎复用到斯里兰卡或相邻的受监管机构。研究尚未证实现有厂商的渗透率、
  在岸部署要求或可信定价点，因此叠加层的中标率、部署架构和 ACV 都必须在头 12 个月内验证。
problem:
  - >-
    尼泊尔商业银行仍在拼凑全球 AML 模块、基于表格的本地 PEP 核查，以及人工 STR/SAR/TTR 准备工作，
    而数字支付量的上升正在推高告警数量。
  - >-
    分散的反欺诈和 AML 队列造成重复调查、升级变慢、审计留痕变弱，恰好撞上 NRB/FIU 监管趋严的时点。
  - >-
    通用厂商覆盖了监控和筛查的广度，但把尼泊尔专属的申报逻辑、本地数据维护和监管机构认可的工作流，
    留给了银行或系统集成商自己解决。
solution:
  - >-
    交付一套尼泊尔本地化叠加层：维护好的 PEP/RCA 与报告映射、带版本号的 STR/SAR/TTR 规则包，
    以及面向监管机构申报的可审计证据生成。
  - >-
    把反欺诈、筛查和 AML 告警统一到一个调查员队列和案件文件里，且不强迫银行第一天就替换现有
    监控技术栈。
  - >-
    通过模块化连接器和本地伙伴部署，让银行可以先上一个主体、一条工作流，验证效果后再加模块。
whyWeWin:
  - >-
    这家公司卖的正是现有厂商和系统集成商仍当作定制工作的最后一公里产品缺口：尼泊尔专属数据、
    申报模板，以及紧跟规则变化的调查员工作流。
  - >-
    厂商中立的叠加层比整套系统替换更容易让银行买单，因为它能塞进现有的现代化预算，也降低了
    核心系统切换的风险。
  - >-
    跨银行调优数据、申报模板历史和本地伙伴部署手册会不断积累，形成通用全球套件难以逐个市场
    维护的护城河。
strategicChoices:
  beachhead: >-
    尼泊尔商业银行中拥有 20-100 家分支机构、移动或 QR 支付使用量在增长、反欺诈与 AML 工作流
    各自为战，且近期有 NRB/FIU 审查或现代化触发点的银行。
  wedgeRationale: >-
    商业银行是验证最快的市场，因为它们本就承受着最强的监管期望，有明确的本地报告痛点，买家
    集中，并且至少有一次真实的品类采购发生过。相比从尼泊尔支付机构、汇款服务商或宽泛的南亚
    套件起步，这能更快建立可参考的案例。
  sequencingRationale: >-
    先做本地化叠加层、申报包和统一案件处理，再考虑任何新的检测引擎，因为部署速度和申报准确性
    才是关卡风险。头 2-3 个银行试点保持创始人主导销售，靠本地伙伴降低落地阻力，只有在尼泊尔
    部署套件、定价和"试点到量产"的打法都可复制之后，才扩张到第二个市场。
  notYet:
    - 在本地化叠加层证明可复制之前，替换整套交易监控或反欺诈检测引擎。
    - 在 2-3 个商业银行参考案例出现之前，进入尼泊尔支付机构、电子钱包和汇款服务商市场。
    - 在一个相邻监管包能复用大部分尼泊尔内容和数据模型之前，进行大范围南亚扩张。
    - 在审计就绪的报告和案件分流工作流得到信任之前，推出生成式 AI 调查员副驾驶功能。
market:
  tam: >-
    估算 TAM 为 2760 万美元，假设尼泊尔的商业银行、开发银行、支付机构，以及后续的斯里兰卡
    银行群体都会购买本地化的金融犯罪工作流软件。
  sam: >-
    估算 SAM 为 800 万美元，来自尼泊尔 20 家商业银行，按每家约 40 万美元的混合年度合同价值计算。
  som: >-
    建模得出的第三年 SOM 为 160 万美元，来自 4 家尼泊尔商业银行客户，按约 40 万美元的混合 ACV
    计算。
  segments:
    - >-
      尼泊尔商业银行中拥有 20-100 家分支机构、移动或 QR 支付使用量在增长，且反欺诈和 AML 工作流
      各自为战的银行。
    - >-
      尼泊尔支付机构，以及在银行滩头验证后可以复用同一套本地化引擎的相邻南亚银行。
  buyingProcess: >-
    通常由 AML/FCC 运营负责人或转型负责人发起交易，触发点是 NRB/FIU 审查或换厂商项目暴露出的
    人工本地工作量。CRO、合规负责人或 COO 会在付费试点证明申报准备更快、交接更少、且不需要
    替换核心系统之后签字。
product:
  mvp: >-
    MVP 覆盖一个银行主体和一条调查员工作流：尼泊尔 PEP/RCA 数据、STR/SAR/TTR 模板、统一告警
    收件箱、案件管理和审计留痕，叠加在现有筛查或监控系统之上。它不包含新的检测模型、跨境扩张包，
    以及广泛的支付机构工作流，直到叠加层证明能被采用为止。
  sixMonth: >-
    上线 2 个共创客户试点，配备标准核心银行系统或渠道数据连接器、带版本号的尼泊尔规则包、
    申报审批工作流，以及申报自动填充率、案件准备耗时、告警交接率的 KPI 仪表盘。
  twelveMonth: >-
    把 2 个试点转为正式生产，加入假阳性调优、监管变更差异发布、伙伴部署套件，并对首批银行群体做
    基准报告。
  twentyFourMonth: >-
    达到 4 家生产环境的尼泊尔银行客户，打包一套可复用的相邻市场规则引擎，只有在尼泊尔打法已经
    盈利且可复制的前提下，才在斯里兰卡或密切相关的机构类型启动第二个市场试点。
  keyBets:
    - 即便现有监控引擎仍留在原地，银行也会为本地化叠加层付费。
    - 带版本号的尼泊尔规则包可以当作软件来维护，而不是定制咨询。
    - 一个统一案件队列能减少足够多的人工交接，值得银行为此支付 25 万-40 万美元的年度软件费用。
    - 第二市场规则包能复用至少 60% 的尼泊尔内容和工作流模型。
gtm:
  wedge: >-
    向面临 NRB/FIU 审查、内部审计整改或数字银行升级的商业银行卖一个付费的尼泊尔本地化试点，
    用一套叠加在现有工具之上的统一方案，替换表格式 PEP 核查和人工 FIU 案件准备。
  channels:
    - 创始人主导，直接向尼泊尔 20 家商业银行的 AML 负责人、合规负责人、CRO 和 CIO 销售。
    - 掌握本地落地、数据映射和监管信任工作的尼泊尔本地实施伙伴。
    - 前 2 个生产环境参考案例出现后接入的核心银行系统、数字渠道和风险集成伙伴。
  funnelTargets: 目标漏斗：目标账户初次接触→合格需求发现 50%+；合格需求发现→付费试点 20-30%；付费试点→正式生产 60%+；首家生产环境银行在 12 个月内扩到第二个模块或第二个主体的比例达到 50%+。
  pricing: >-
    从一个银行主体、一条报告或案件工作流的 4 万-8 万美元付费试点起步，随后转为每个银行主体
    25 万-40 万美元的年度订阅，按启用模块和告警或申报量定价，实施费和年度本地化更新费单独计费。
    这让首次审批留在合规现代化预算之内，同时保留了在 ROI 得到验证后向更广泛的反欺诈和 AML
    工作流扩张的空间。
businessModel:
  revenueStreams:
    - 按银行主体收取的尼泊尔本地化筛查、案件处理和报告工作流年度软件订阅。
    - 与本地伙伴一同交付的一次性实施、连接器和数据上线费用。
    - 统一反欺诈加 AML 案件管理与基准对比高级模块的持续本地化更新费。
  unitOfValue: 一个运行尼泊尔本地化包的受监管银行主体，按启用模块和月度告警或申报量定价
  targetGrossMarginPct: 70
  expansionLevers:
    - 试点转正式生产后，在首家银行内增加更多工作流、主体或分支机构群组。
    - 从申报和 PEP 本地化，扩展到统一反欺诈加 AML 案件处理和假阳性调优。
    - 把监管内容引擎复用到斯里兰卡或其他相邻南亚银行市场。
    - 只有在商业银行部署手册标准化之后，才增加支付机构规则包。
strategyMap:
  northStarMetric: 每月从一个统一告警队列生成 FIU 达标案件包的生产环境银行主体数量
  inputMetrics:
    - 未来 12 个月内已有具名 NRB/FIU 审查、审计整改或现代化触发点的合格尼泊尔商业银行客户。
    - 从试点启动到首次上线统一告警和申报工作流所需的天数。
    - 由系统数据和案件历史自动填充的 STR/SAR/TTR 字段比例。
    - 相对客户基线的调查员案件准备耗时中位数和反欺诈到 AML 交接率。
    - 付费试点转正式生产的比例，以及第二模块的扩展率。
  moatsToBuild:
    - 与 FIU-Nepal 规则变化保持同步的尼泊尔专属 PEP/RCA、受益所有人和申报映射。
    - 让本地伙伴能落地叠加层而不替换现有系统的可复用连接器和部署手册。
    - 跨银行的告警处理和申报历史数据，能改善调优并把产品嵌入监管机构可见的工作流之中。
  killCriteria:
    - 前 10 个尼泊尔商业银行目标客户中，12 个月内签下付费试点的不足 2 家。
    - 头 3 个试点未能在 90 天内自动填充至少 70% 的必填 STR/SAR 或 TTR 字段，也没能把案件准备
      耗时中位数降低 30% 以上。
    - 付费试点转正式生产比例低于 50%，或实际软件定价低于每个银行主体年度 25 万美元。
    - 第 18 个月时，第二市场规则包复用的尼泊尔规则对象和数据模型不到 60%，区域扩张论点无法验证。
  mermaid: |
    flowchart LR
      Wedge[Nepal bank localization overlay] --> MVP[PEP plus FIU report pack plus unified casework]
      MVP --> Proof[2 production bank references and faster filings]
      Proof --> Expansion[Sri Lanka or adjacent institution pack]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      这是一个有意思的监管本地化切口，有真实的买家信号，但目前的证据还不足以进入合伙人会议，
      因为尼泊尔单一市场太小，而且 ZIGRAM 已经拿下了那个参考客户。
    whyBelieve: >-
      一次具名银行采购，加上仍在变化的 FIU 规则，说明只要能减少人工报告和调查负担，银行就会
      为尼泊尔专属的 FRAML 工作流软件付费。
    whyDoubt: >-
      首个市场只有 20 家商业银行，定价尚未验证，而且最明显的竞争对手已经拿下了一次真实的
      尼泊尔部署。
    nextDiligence: >-
      先验证 8-10 个银行客户账户，再观察一个付费试点，看它能否证明叠加层的部署速度、
      试点转生产比例，以及第二市场本地化的可复用性。
  firstCustomer:
    title: 一家 25-75 家分支机构尼泊尔商业银行的 AML 负责人
    profile: >-
      一家拥有自建移动应用、数字支付量在增长、进口 AML 模块或人工本地核查、反欺诈与合规
      队列各自为战的商业银行。
    trigger: >-
      即将到来的 NRB/FIU 审查、内部审计整改或数字银行现代化项目，暴露出人工 PEP 核查和
      申报准备的问题。
    buyer: CRO 或合规负责人
    initialContract: >-
      针对一个银行主体、一条报告工作流的 4 万-8 万美元付费试点；如果试点能自动填充 70% 以上
      的申报字段并把案件准备耗时降低 30% 以上，就转为 25 万-40 万美元的年度软件订阅，
      外加实施和更新费用。
  mustBeTrue:
    - 尼泊尔 20 家商业银行中至少有 6 家，本地 PEP 审查或 FIU 报告的主要部分仍靠人工完成，
      且在 24 个月内面临已列入预算的现代化或审计触发点。
    - 前 6 个正式意向客户中至少有 3 家更倾向厂商中立的叠加层，而不是整套系统替换或纯系统
      集成商项目。
    - 头 3 个试点能在 90 天内自动填充 70% 以上的必填 STR/SAR 或 TTR 字段，并把案件准备
      耗时中位数降低至少 30%。
    - 至少 50% 的付费试点能转化为 25 万美元以上的年度软件合同，且服务收入不超过首年收入的 30%。
    - 到第 18 个月，斯里兰卡或相邻机构规则包能复用至少 60% 的尼泊尔内容、规则和工作流模型。
  diligenceQuestions:
    - 尼泊尔 20 家商业银行中已经有多少在用 Oracle、NICE、Tookitaki、ZIGRAM 或自建工作流，
      哪些最容易以叠加层的方式卖进去？
    - 目标银行是否要求可疑活动案件数据必须在岸或本地部署，这对毛利率和落地速度有什么影响？
    - 前 2 个共创客户的 FIU 申报字段和案件准备步骤中，目前还有多少比例是人工完成的？
    - 在不拥有完整交易监控引擎的情况下，这家公司能否赢过 ZIGRAM 和现有套件厂商？
    - 哪个第二市场能以最少的全新监管内容复用尼泊尔规则包：斯里兰卡银行，还是尼泊尔支付机构？
operatingAssumptions:
  - assumption: 银行会在不先替换现有监控或筛查引擎的前提下，购买尼泊尔本地化叠加层。
    basis: research.yaml
    validationTest: 赢下 2 个付费试点，银行保留现有监控引擎，把叠加层作为第一个界定范围的项目购买。
    decisionImpact: 如果不成立，公司必须转向更重的整套系统替换打法，这会增加资金需求并拖慢销售。
  - assumption: 一旦试点证明了申报和工作流的 ROI，每个银行主体 25 万-40 万美元的年度软件合同是可以接受的。
    basis: research.yaml
    validationTest: 在头 12 个月内拿到 3 份书面定价确认，或完成 1 个转化为 25 万美元以上年度软件价值的付费试点。
    decisionImpact: 如果不成立，建模的 SAM、SOM 和融资效率都会下降，公司必须收窄范围或降低风投级野心。
  - assumption: 带版本号的尼泊尔 STR/SAR 和 TTR 规则包，可以靠软件发布加有限的专家审查维护，而不需要
      大量人工定制服务。
    basis: idea.yaml
    validationTest: 用同一套发布流程，在 5 个工作日内向共创客户交付 2 次监管变更更新，每次专家投入
      不超过 1 周。
    decisionImpact: 如果不成立，毛利率会下降，公司应该明确按托管合规服务定价，或收窄产品范围。
  - assumption: 本地实施伙伴能在 90 天内、以有限的定制工程完成重复部署。
    basis: research.yaml
    validationTest: 完成前 3 次伙伴协助部署，每次都在 90 天以内，每家银行的定制工程投入不超过
      2 个工程师周。
    decisionImpact: 如果不成立，伙伴杠杆比计划弱，销售能力必须更长时间地依赖创始人和服务团队。
  - assumption: 一个相邻市场规则包能复用尼泊尔内容引擎的大部分，而不需要近乎重建。
    basis: operator judgment
    validationTest: 到第 12 个月建成一份斯里兰卡规则差异地图，显示核心数据对象、申报工作流和
      发布工具的复用率至少 60%。
    decisionImpact: 如果不成立，区域扩张论点会变弱，公司应该被当作一家利基型盈利业务来融资，
      而不是风投级项目。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 12 位尼泊尔商业银行 AML 或合规负责人，梳理当前厂商技术栈、人工报告步骤
      和续约日历。
    hypothesis: 至少 6 家银行存在人工本地工作流痛点，且未来 24 个月内有具体触发点。
    successMetric: 至少 6 家符合条件的银行，各自有具名触发点、现有工作流地图和明确的经济买家。
    owner: 创始人 CEO
  - horizon: 0–90 天
    experiment: 在 2 家共创客户银行现场观察 STR/SAR 和 TTR 准备过程，量化人工填写字段、
      审批步骤和反欺诈到 AML 的交接。
    hypothesis: 申报准备和案件整理的人工程度足以支撑一个叠加层产品，而不需要整套系统替换。
    successMetric: 基线数据显示两家银行中 30% 以上的申报字段或案件准备步骤仍为人工操作。
    owner: 合规产品负责人
  - horizon: 0–90 天
    experiment: 用一个共创客户的数据样本，构建第一个尼泊尔规则包和统一案件处理原型。
    hypothesis: 该产品能自动填充大部分必填申报字段，并在不替换现有引擎的情况下统一分散的告警队列。
    successMetric: 一个原型能自动填充 70% 以上的申报字段，并展示一个跨 AML 和反欺诈告警的
      共享案件视图。
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: 把 2 个共创客户转为付费试点，每次部署都配一个本地实施伙伴。
    hypothesis: 伙伴协助的落地能足够降低信任和集成阻力，让银行在整套平台替换之前先付费。
    successMetric: 签下 2 个各自 "$40k+" 的付费试点，并附有明确的量产转化标准。
    owner: 创始人 CEO
  - horizon: 6–12 个月
    experiment: 把前 2 个试点推入生产环境，测量申报自动填充率、案件准备耗时和试点转生产比例。
    hypothesis: 工作流效率和申报准确性上的量产证明，足以赢得年度软件合同。
    successMetric: 2 家生产环境银行，案件准备耗时降低 30% 以上，且至少 1 份合同达到年度软件
      价值 25 万美元以上。
    owner: 解决方案负责人
  - horizon: 6–12 个月
    experiment: 与一位顾问或共创客户一起跑一次斯里兰卡本地化可行性冲刺，对比规则复用率与尼泊尔的差异。
    hypothesis: 一个相邻银行市场能复用本地化引擎的大部分内容，让区域扩张变得可行。
    successMetric: 一份文档化的规则差异地图，显示复用率至少 60%，并锁定一个可信的第二市场
      试点目标。
    owner: 创始人产品负责人
operations:
  - 维护带版本号的尼泊尔 STR/SAR、TTR 和 PEP/RCA 规则包，附带明确的发布说明、审批流程和
    回滚历史。
  - 在每次客户发布前，对本地观察名单、受益所有人映射和申报模板做数据质量检查。
  - 为核心银行系统、渠道和案件管理集成标准化伙伴主导的部署手册，让产品以叠加层而非定制系统
    集成项目的方式落地。
  - 用事先约定的基线，跟踪每个试点在申报自动填充率、案件准备耗时、告警交接率和审计就绪度上
    的表现。
  - 在真实买家数据澄清在岸或本地部署要求之前，保留由银行控制的部署选项和证据导出能力。
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 在一个只有 20 个主要买家的市场里，亲自主导银行销售、试点打包和早期伙伴招募。
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 构建共创客户试点所需的第一版尼泊尔规则引擎、连接器、统一案件队列和审计留痕。
  - role: 合规产品负责人
    startTiming: 第 0 个月
    rationale: 把 FIU 和 NRB 的变化转译成带版本号的软件需求，让早期银行相信申报准确性。
  - role: 解决方案负责人
    startTiming: 第 3 个月
    rationale: 试点启动后降低部署阻力，把伙伴上线流程标准化，保护核心工程时间。
  - role: 数据运营分析师
    startTiming: 第 6 个月
    rationale: 维护本地 PEP/RCA 和申报数据集，避免准确性问题演变成定制化客户服务工作。
  - role: 合作伙伴负责人
    startTiming: 第 9 个月
    rationale: 前 2 个生产环境参考案例出现后，把本地实施公司和集成伙伴变成一个可复制的渠道。
milestones:
  - horizon: 0–12 个月
    items:
      - 在尼泊尔 20 家商业银行中至少 10 家里，梳理现有的 AML 和反欺诈工作流现状。
      - 签下 2 个带明确申报和案件处理 KPI 的付费共创客户试点。
      - 把 2 个试点转为生产环境，证明申报字段自动填充率 70% 以上，且案件准备耗时降低 30% 以上。
      - 发布一套可复制的尼泊尔规则包发布流程和伙伴部署套件。
  - horizon: 12–24 个月
    items:
      - 达到 4 家生产环境的尼泊尔商业银行客户，验证建模得出的 160 万美元第三年 SOM 路径。
      - 在一个早期客户账户内，赢下至少 1 次第二模块或第二主体扩展。
      - 完成一个相邻市场本地化包，并且只有在尼泊尔部署持续保持 90 天以内时，才启动 1 个
        非尼泊尔试点。
      - 每个新客户的服务收入占首年收入的比例保持在 30% 以下。
  - horizon: 24–36 个月
    items:
      - 用同一套内容引擎，在第二个受监管机构市场建立 2 个生产环境参考案例。
      - 在已安装客户群中构建基准调优和工作流分析能力，同时避免变成一个通用 AML 套件厂商。
      - 达到不再需要创始人参与每一次实施的伙伴协助部署模式。
risks:
  - risk: 如果相邻市场的复用速度比计划慢，仅靠尼泊尔市场可能撑不起风投级回报。
    likelihood: High
    impact: High
    mitigation: 把尼泊尔当作验证点，第 12 个月前测试斯里兰卡的复用情况，在第二个规则包证明
      有实质内容复用之前，不扩大烧钱规模。
  - risk: ZIGRAM 或现有套件厂商可能会把本地化能力捆绑进产品，挤压叠加层的空间。
    likelihood: High
    impact: High
    mitigation: 把自己定位为最快的厂商中立叠加层，在整套系统替换决策之前先落地，把本地数据和
      工作流发布变成看得见的产品优势。
  - risk: 本地 PEP 覆盖或 FIU 报告逻辑中的错误，可能摧毁早期银行客户的信任。
    likelihood: Medium
    impact: High
    mitigation: 每次涉及申报的更新前，使用带版本号的规则包、人工审批检查点、专家审查和
      发布回滚机制。
  - risk: 在岸部署、采购或数据访问限制，让试点比计划更慢、更依赖服务投入。
    likelihood: Medium
    impact: High
    mitigation: 提供由银行控制的部署模式，把第一批连接器标准化，并在签约试点前就数据访问
      问题对客户做资格筛选。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-3M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的现金跑道应该足以支撑尼泊尔规则引擎、本地数据运营、2-3 个共创客户试点、2 个
    生产环境银行参考案例、伙伴赋能，以及一个相邻市场可行性研究包，直到下一轮更大规模的
    融资决策。
