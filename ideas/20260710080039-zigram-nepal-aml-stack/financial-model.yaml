  baseCase: Blended annual value lands around $420K with some late-Y3 expansion.
  upsideCase: Expanded early logos push blended value toward $470K.
  y3RevenueImpactK: -250.0
  cashImpactK: -180.0
- variable: CAC
  downsideCase: Founder-led sales and partner travel push first-wave CAC toward $200K.
  baseCase: CAC stays near about $165K on the first 4 Nepal production logos.
  upsideCase: Warm partner introductions keep CAC closer to $145K.
  y3RevenueImpactK: 0.0
  cashImpactK: -140.0
- variable: churn
  downsideCase: Monthly churn rises to 2.5% if one early bank fails to expand or renew cleanly.
  baseCase: Monthly churn holds at 1.5% once the workflow is embedded.
  upsideCase: Monthly churn stays near 1.0% because regulator-facing workflow becomes sticky.
  y3RevenueImpactK: -110.0
  cashImpactK: -90.0
- variable: sales cycle
  downsideCase: Pilot-to-production takes about 120 days because procurement and data-mapping run long.
  baseCase: The first four Nepal banks convert in roughly 90 days and the adjacent-market pilot follows the same template.
  upsideCase: Referenceability compresses conversion toward 60-75 days by Y2.
  y3RevenueImpactK: -420.0
  cashImpactK: -310.0
- variable: gross margin
  downsideCase: Gross margin exits at 66% because direct delivery remains too bespoke.
  baseCase: Gross margin reaches the BP target of 70% by Q4Y3.
  upsideCase: Gross margin reaches about 72% as release tooling and partner playbooks mature faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
- variable: hiring pace
  downsideCase: The second seller and third engineer are pulled forward by two quarters before adjacent-market proof exists.
  baseCase: Scale hires follow the BP sequencing and arrive after pilot and production proof.
  upsideCase: The final engineering hire waits until the first adjacent-market production conversion without slowing growth.
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetBanks[Target Nepal banks] --> PaidPilots[Paid pilots]
      PaidPilots --> NepalProduction[Nepal production banks]
      NepalProduction --> Expansion[Expansion modules]
      NepalProduction --> Adjacent[Adjacent-market pilot]
      Expansion --> Revenue[Revenue]
      Adjacent --> Revenue
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue is driven by converting 2 paid pilots into 4 Nepal production banks by Q4Y2 and then adding 2 adjacent-market paying institutions plus in-logo expansion by Q4Y3.
- checkName: Must go right
  finding: Local partners must keep deployments near the 90-day target so pilot logos convert before the model adds the second seller and adjacent-market motion.
- checkName: Model breaks if
  finding: If realized logo value stays near $360K ARR or pilot-to-production stretches toward 120 days, the downside case pushes cash below zero before regional proof exists.
- checkName: Next-round proof
  finding: A seed round is justified once 4 Nepal production logos, 1 expansion win, and 1 adjacent-market paid pilot exist with services still below the BP 30% threshold for new-logo first-year revenue.
sanityChecks:
  ruleOf40: Y3 growth 97.0% + EBITDA margin -6.2% = 90.8% (strong directionally, though still flattered by the small Y2 base).
  burnMultiple: Y2 burn multiple is about 0.6x using roughly $613.7K of EBITDA burn against roughly $1080.0K of net new exit ARR; Y3 improves to about 0.1x as Q4 turns positive.
  revenuePerFte: $232K Y3 on 10 ending FTE (within the ~$200-400K vertical SaaS benchmark).
  flags:
  - The core Nepal bank market has only 20 buyers, so missing one or two target accounts can move Y2 and Y3 materially.
  - customersEop includes paid pilots and production entities, so recurring-only production count is lower than the headline paying count in mixed pilot quarters.
  - Q4Y3 turns EBITDA positive only if partner-assisted deployments actually stay under 90 days and localization upkeep does not collapse into services-heavy work.
  - ZIGRAM already has a live Nepal bank deployment, so the overlay-vs-suite positioning must stay crisp or the 90-day conversion assumption will slip.
  - Cash is modeled as EBITDA, so enterprise billing milestones, implementation prepayments, or delayed collections can shift the real cash curve by a few months.
