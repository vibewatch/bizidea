date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] the model begins in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the stated range and only works because hiring stays lean and Q4Y3 turns quarterly EBITDA positive.'
- id: A3
  name: Starting paying bank entities
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first sell paid pilots.'
- id: A4
  name: Customer definition
  value: One paying bank or adjacent regulated institution in a paid pilot or production contract
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop counts paying entities, not end users.'
- id: A5
  name: Paid pilot economics
  value: $60K over roughly 3 months (~$20K/mo)
  unit: USD/customer
  source: '[BP gtm.pricing $40K-$80K paid pilot] the model uses the midpoint for one entity and one workflow.'
- id: A6
  name: Initial production contract economics
  value: About $330K ARR (~$27.5K/mo)
  unit: USD/customer/year
  source: '[BP gtm.pricing $250K-$400K annual subscription + Research willingnessToPay] the first production contract lands below the $400K SAM anchor while proof is still early.'
- id: A7
  name: Mature logo value and expansion
  value: Core production value matures toward ~$400K ARR and late-Y3 realized value can reach roughly $450K-$500K with localization updates and second-workflow expansion
  unit: USD/customer/year
  source: '[BP market.som 4 logos x $400k + BP businessModel.expansionLevers + BP gtm.funnelTargets expansion target] Y3 revenue assumes some early logos expand after production proof.'
- id: A8
  name: Customer ramp
  value: 2 active paying entities by M12, 4 by Q4Y2, and 6 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + BP product.twelveMonth + Research market.som] the base case reaches the Nepal 4-logo target, then adds 2 adjacent-market paying institutions by year 3.'
- id: A9
  name: Pilot-to-production cycle
  value: Roughly 90 days
  unit: days
  source: '[BP operatingAssumptions partner deployments under 90 days + BP milestones + Research validationSignals local implementation ecosystem] the first four Nepal banks convert on one-quarter pilots.'
- id: A10
  name: Gross margin ramp
  value: 42%-46% in paid-pilot months, 64% by late Y2, and 70% by Q4Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions + Research regulatoryTechnicalConstraints] early delivery is partner- and data-heavy before rule-pack release and deployment reuse improve margin.'
- id: A11
  name: Hiring timeline
  value: Founder CEO, founding engineer, and compliance product lead at start; solutions lead by M3; data operations by M6; partnerships lead by M9; second engineer by M15; second delivery hire by M18; second seller by M24; third engineer by M30
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring adds capacity only after paid pilots and production references are visible.'
- id: A12
  name: Founder loaded compensation
  value: $150.0K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic for South Asia enterprise software] founder pay is below US regtech norms but still fully loaded for taxes, travel, and benefits.'
- id: A13
  name: Engineering loaded compensation
  value: $130.0K per FTE
  unit: USD/year
  source: '[BP team founding eng + startup-finance heuristic for mixed Nepal/regional technical talent] specialized integration and rule-engine work requires senior but not Bay-Area-priced talent.'
- id: A14
  name: Compliance product loaded compensation
  value: $110.0K
  unit: USD/year
  source: '[BP team Compliance product lead + startup-finance heuristic] this role blends domain expertise, release governance, and customer-facing implementation work.'
- id: A15
  name: Solutions / delivery loaded compensation
  value: $100.0K per FTE
  unit: USD/year
  source: '[BP team Solutions lead + startup-finance heuristic] reflects implementation ownership, partner enablement, and data-mapping support.'
- id: A16
  name: Data operations loaded compensation
  value: $60.0K
  unit: USD/year
  source: '[BP team Data operations analyst + startup-finance heuristic] local dataset maintenance is specialized but can be staffed locally.'
- id: A17
  name: Sales / partnerships loaded compensation
  value: $130.0K per FTE
  unit: USD/year
  source: '[BP team Partnerships lead + startup-finance heuristic] includes variable compensation, travel, and relationship-driven enterprise selling.'
- id: A18
  name: Payroll allocation to P&L lines
  value: Founder 50% S&M / 20% R&D / 30% G&A; engineering 100% R&D; compliance product 80% R&D / 20% G&A; solutions 30% S&M / 70% R&D; data operations 60% R&D / 40% G&A; sales 100% S&M
  unit: allocation
  source: '[BP team role rationales + BP operations] this maps headcount cost into functional spend while keeping founder-led sales and delivery visible.'
- id: A19
  name: Non-payroll opex ramp
  value: S&M ~$5K-$20K/mo, R&D ~$10K-$22K/mo, and G&A ~$5K-$13K/mo over 36 months
  unit: USD/month
  source: '[BP operations + Research partnershipEcosystem + Research dataMoats + startup-finance heuristic] covers cloud, compliance tooling, travel, legal, insurance, and partner enablement.'
- id: A20
  name: Cash conversion convention
  value: EBITDA approximates cash movement
  unit: formula
  source: '[startup-finance heuristic] taxes, debt, capex, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A21
  name: Monthly churn
  value: 1.5%
  unit: percent/month
  source: '[startup-finance heuristic for embedded bank workflow software + BP businessModel.expansionLevers] once deployed, compliance workflow software should be sticky but not assumed perfect.'
- id: A22
  name: CAC convention
  value: Y1-Y2 sales and marketing spend divided by the first 4 Nepal production logos = about $165K CAC
  unit: USD/customer
  source: '[model calc using Y1-Y2 S&M spend + BP gtm.funnelTargets] this is a conservative CAC anchored to the first proof cohort rather than the full 36-month scale.'
- id: A23
  name: Next-round milestone for funding sizing
  value: 4 Nepal production bank logos, at least 1 in-logo expansion, partner deployments consistently under 90 days, and 1 adjacent-market paid pilot
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + Research geographicConsiderations] this is the seed-ready proof package the pre-seed is sized to finance with buffer.'
- id: A24
  name: Adjacent-market timing
  value: The first adjacent-market paid pilot starts in Y3 and the second paying adjacent institution arrives near Q3Y3
  unit: timeline
  source: '[BP milestones 24-36 months + Research geographicConsiderations Sri Lanka next market] regional expansion is deferred until the Nepal playbook is repeatable.'
- id: A25
  name: Quarterly salary convention
  value: Y2-Y3 salary rows use actual monthly hiring inside each quarter rather than only the quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] this keeps the salary line consistent with the monthly hiring ramp.'
- id: A26
  name: customersEop reporting convention
  value: customersEop includes paid pilots and production entities
  unit: convention
  source: '[model reporting convention + BP gtm.pricing] this makes the wedge visible, but recurring-only production count lags the paying-entity count in mixed pilot quarters.'
