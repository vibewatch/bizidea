scenarios:
  downside:
    description: Incumbent pressure and slower partner rollouts delay conversions, keep adjacent-market reuse late, and hold realized contract value below plan.
    y3RevenueK: 1710.0
    y3EbitdaK: -515.0
    cashLowPointK: -90.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 4 instead of 6 because pilot-to-production stretches toward 120 days and the second adjacent-market institution slips out of Y3.
    - Mature realized logo value stays closer to about $360K ARR instead of the base case blend of roughly $420K-plus with expansion.
    - Gross margin exits near 66% because deployment and data-maintenance work remain more bespoke than planned.
  base:
    description: Base case converts 2 paid pilots, reaches 4 Nepal production banks by Q4Y2, and adds 2 adjacent-market paying institutions by Q4Y3 while early banks expand into more workflows.
    y3RevenueK: 2320.0
    y3EbitdaK: -143.7
    cashLowPointK: 478.3
    keyAssumptionChanges:
    - 2 paid pilot entities are active by M12, 4 Nepal production entities are live by Q4Y2, and 6 paying entities are active by Q4Y3 including 2 adjacent-market institutions.
    - Initial production logos land around $330K ARR and a subset of early banks expands toward roughly $450K-$500K realized annual value by late Y3.
    - Gross margin climbs from pilot-heavy low-40s in Y1 to the BP target of 70% by Q4Y3 as partner deployments and rule-pack releases standardize.
  upside:
    description: Referenceability and partner referrals pull conversions forward, so early banks expand faster and the adjacent-market pack starts contributing sooner.
    y3RevenueK: 2790.0
    y3EbitdaK: 240.0
    cashLowPointK: 690.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 7 instead of 6 because the second adjacent-market deployment starts one quarter earlier and partner-sourced pipeline improves.
    - Realized logo value reaches roughly $450K core ARR and closer to $500K on expanded early banks because second-workflow attach rates beat the base case.
    - Gross margin exits around 72% as localization updates and connector reuse reduce delivery effort faster than planned.
