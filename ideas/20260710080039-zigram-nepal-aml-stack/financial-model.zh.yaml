scenarios:
  downside:
    description: 现有厂商的挤压和伙伴落地速度放缓，拖慢了转化节奏，让相邻市场复用推迟，实际合同价值也低于计划。
    y3RevenueK: 1710.0
    y3EbitdaK: -515.0
    cashLowPointK: -90.0
    keyAssumptionChanges:
    - 第三年第四季度 customersEop 只到 4 个而不是 6 个，因为试点转生产拉长到接近 120 天，第二个相邻市场机构也没能在第三年落地。
    - 成熟客户实际价值维持在约 $360K ARR 左右，低于基准情形加上扩展后约 $420K 以上的水平。
    - 毛利率收尾在接近 66%，因为部署和数据维护工作比计划中更依赖定制。
  base:
    description: 基准情形转化 2 个付费试点，第二年第四季度达到 4 家尼泊尔生产环境银行，第三年第四季度新增 2 家相邻市场付费机构，同时早期银行扩展到更多工作流。
    y3RevenueK: 2320.0
    y3EbitdaK: -143.7
    cashLowPointK: 478.3
    keyAssumptionChanges:
    - 第 12 个月有 2 个活跃付费试点主体，第二年第四季度有 4 个尼泊尔生产环境主体上线，第三年第四季度有 6 个付费主体在跑，其中包含 2 家相邻市场机构。
    - 首批生产合同落地价约 $330K ARR，部分早期银行到第三年末的实际年度价值扩展到约 $450K-$500K。
    - 毛利率从第一年试点为主时的 40% 出头，随着伙伴部署和规则包发布走向标准化，爬升到第三年第四季度的商业计划目标 70%。
  upside:
    description: 可参考案例和伙伴引荐把转化节奏往前拉，早期银行扩展更快，相邻市场规则包也更早开始贡献收入。
    y3RevenueK: 2790.0
    y3EbitdaK: 240.0
    cashLowPointK: 690.0
    keyAssumptionChanges:
    - 第三年第四季度 customersEop 达到 7 个而不是 6 个，因为第二个相邻市场部署提前一个季度启动，伙伴带来的销售线索也在改善。
    - 成熟客户实际价值达到约 $450K 核心 ARR，扩展后的早期银行更接近 $500K，因为第二工作流的附加转化率超过了基准情形。
    - 毛利率收尾在约 72%，因为本地化更新和连接器复用比计划更快地降低了交付投入。
sensitivity:
- variable: ARPU
  downsideCase: 成熟客户实际价值收窄至约 $360K ARR。
  baseCase: 混合年度价值约在 $420K，第三年末有少量扩展。
  upsideCase: 早期客户扩展后把混合价值推高到约 $470K。
  y3RevenueImpactK: -250.0
  cashImpactK: -180.0
- variable: CAC
  downsideCase: 创始人主导销售加上伙伴出差，把首批 CAC 推高到约 $200K。
  baseCase: CAC 在前 4 家尼泊尔生产环境客户上维持在约 $165K。
  upsideCase: 伙伴的热情引荐让 CAC 更接近 $145K。
  y3RevenueImpactK: 0.0
  cashImpactK: -140.0
- variable: 流失率
  downsideCase: 如果一家早期银行没能顺利扩展或续约，月度流失率会升到 2.5%。
  baseCase: 一旦工作流嵌入业务，月度流失率维持在 1.5%。
  upsideCase: 因为面向监管机构的工作流粘性更强，月度流失率接近 1.0%。
  y3RevenueImpactK: -110.0
  cashImpactK: -90.0
- variable: 销售周期
  downsideCase: 由于采购和数据映射拖长，试点转生产大约需要 120 天。
  baseCase: 前四家尼泊尔银行在约 90 天内完成转化，相邻市场试点沿用同一模板。
  upsideCase: 可参考案例让转化周期到第二年压缩到 60-75 天。
  y3RevenueImpactK: -420.0
  cashImpactK: -310.0
- variable: 毛利率
  downsideCase: 因为直接交付仍过于定制化，毛利率收尾在 66%。
  baseCase: 毛利率在第三年第四季度达到商业计划目标 70%。
  upsideCase: 因为发布工具和伙伴打法成熟得更快，毛利率达到约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
- variable: 招聘节奏
  downsideCase: 在相邻市场验证出现之前，第二名销售和第三名工程师提前两个季度到岗。
  baseCase: 规模化招聘按商业计划的节奏进行，在试点和生产验证之后才到岗。
  upsideCase: 最后一名工程师招聘等到第一个相邻市场生产转化之后才进行，且不拖慢增长。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济模型流程图
  mermaid: "flowchart LR\n  TargetBanks[Target Nepal banks] --> PaidPilots[Paid pilots]\n  PaidPilots --> NepalProduction[Nepal production banks]\n  NepalProduction --> Expansion[Expansion modules]\n  NepalProduction --> Adjacent[Adjacent-market pilot]\n  Expansion --> Revenue[Revenue]\n  Adjacent --> Revenue\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入的驱动来自把 2 个付费试点转化为第二年第四季度的 4 家尼泊尔生产环境银行，再加上第三年第四季度新增的 2 家相邻市场付费机构，以及客户内部扩展。
- checkName: 必须做对的事
  finding: 本地伙伴必须把部署周期稳定控制在接近 90 天的目标内，让试点客户在模型加入第二名销售和相邻市场动作之前完成转化。
- checkName: 模型失效的临界点
  finding: 如果成熟客户实际价值停留在约 $360K ARR，或者试点转生产拉长到接近 120 天，下行情形会在区域验证出现之前把现金推到零以下。
- checkName: 下一轮融资的证明
  finding: 一旦有了 4 家尼泊尔生产环境客户、1 次扩展成功案例和 1 个相邻市场付费试点，且服务收入仍低于商业计划设定的新客户首年收入 30% 门槛，种子轮就站得住脚。
sanityChecks:
  ruleOf40: 第三年增速 97.0% + EBITDA 利润率 -6.2% = 90.8%（方向上看很强劲，但仍因为第二年基数较小而显得好看）。
  burnMultiple: 第二年烧钱倍数约为 0.6 倍，用约 $613.7K 的 EBITDA 烧钱除以约 $1080.0K 的净新增期末 ARR 得出；第三年随着第四季度转正改善到约 0.1 倍。
  revenuePerFte: 第三年人均收入 $232K，对应 10 名期末全职员工（落在垂直行业 SaaS 约 $200-400K 的基准区间内）。
  flags:
  - 尼泊尔核心银行市场只有 20 个买家，错过一两个目标客户就会显著影响第二、三年的数字。
  - customersEop 既包含付费试点也包含生产环境主体，所以在试点和生产环境混合的季度里，纯经常性生产客户数低于对外展示的付费客户总数。
  - 只有当伙伴协助的部署真正稳定在 90 天以内、且本地化维护没有塌陷成高服务投入的工作时，第三年第四季度才能实现 EBITDA 转正。
  - ZIGRAM 已经拿下一个真实的尼泊尔银行部署案例，所以叠加层与整套系统的定位必须保持清晰，否则 90 天转化假设会打滑。
  - 现金是按 EBITDA 建模的，所以企业计费里程碑、实施预付款或延迟回款都可能让实际现金曲线偏移几个月。
