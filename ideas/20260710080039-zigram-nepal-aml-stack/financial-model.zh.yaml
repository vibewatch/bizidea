slug: nepal-framl-localization-os
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] 模型从商业计划签署日期之后的第一个完整月份开始。'
- id: A2
  name: 期初现金／种子前融资额
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-3M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情形取所述融资区间的低端，且只有在招聘保持精简、第三年第四季度 EBITDA 转正的前提下才成立。'
- id: A3
  name: 期初付费银行主体数
  value: '0'
  unit: 数量
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先卖出付费试点。'
- id: A4
  name: 客户定义
  value: 一个处于付费试点或生产合同阶段的付费银行或相邻受监管机构
  unit: 定义
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop 统计的是付费主体数量，不是终端用户数。'
- id: A5
  name: 付费试点经济模型
  value: 约 3 个月内 $60K（约 $20K/月）
  unit: 美元/客户
  source: '[BP gtm.pricing $40K-$80K paid pilot] 模型对一个主体、一条工作流取中间值计算。'
- id: A6
  name: 首个生产合同经济模型
  value: 约 $330K ARR（约 $27.5K/月）
  unit: 美元/客户/年
  source: '[BP gtm.pricing $250K-$400K annual subscription + Research willingnessToPay] 在验证还处于早期阶段时，首个生产合同的落地价格低于 $400K 的 SAM 锚点。'
- id: A7
  name: 成熟客户价值与扩展
  value: 核心生产合同价值逐步成熟至约 $400K ARR，随着本地化更新和第二工作流扩展，第三年末实际实现价值可达约 $450K-$500K
  unit: 美元/客户/年
  source: '[BP market.som 4 logos x $400k + BP businessModel.expansionLevers + BP gtm.funnelTargets expansion target] 第三年收入假设部分早期客户在生产验证后会扩展合同规模。'
- id: A8
  name: 客户增长节奏
  value: 第 12 个月 2 个活跃付费主体，第二年第四季度 4 个，第三年第四季度 6 个
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, 24-36 months + BP product.twelveMonth + Research market.som] 基准情形达到尼泊尔 4 家客户的目标，随后在第三年新增 2 家相邻市场付费机构。'
- id: A9
  name: 试点转生产周期
  value: 约 90 天
  unit: 天数
  source: '[BP operatingAssumptions partner deployments under 90 days + BP milestones + Research validationSignals local implementation ecosystem] 前四家尼泊尔银行都在一个季度的试点周期内完成转化。'
- id: A10
  name: 毛利率爬坡曲线
  value: 付费试点月份为 42%-46%，第二年末达 64%，第三年第四季度达 70%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions + Research regulatoryTechnicalConstraints] 早期交付高度依赖伙伴和数据投入，规则包发布和部署复用成熟后毛利率才会改善。'
- id: A11
  name: 招聘时间线
  value: 起步阶段配置创始人 CEO、创始工程师和合规产品负责人；第 3 个月加入解决方案负责人；第 6 个月加入数据运营；第 9 个月加入合作伙伴负责人；第 15 个月加入第二名工程师；第 18 个月加入第二名交付人员；第 24 个月加入第二名销售；第 30 个月加入第三名工程师
  unit: 时间线
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 只有在付费试点和生产环境参考案例已经可见之后，才会增加招聘产能。'
- id: A12
  name: 创始人全成本薪酬
  value: $150.0K
  unit: 美元/年
  source: '[BP team Founder CEO + startup-finance heuristic for South Asia enterprise software] 创始人薪酬低于美国 regtech 行业的常规水平，但仍是包含税费、出差和福利的全成本口径。'
- id: A13
  name: 工程全成本薪酬
  value: $130.0K（每名全职员工）
  unit: 美元/年
  source: '[BP team founding eng + startup-finance heuristic for mixed Nepal/regional technical talent] 专业的系统集成和规则引擎工作需要资深人才，但不需要按硅谷薪资水平定价。'
- id: A14
  name: 合规产品全成本薪酬
  value: $110.0K
  unit: 美元/年
  source: '[BP team Compliance product lead + startup-finance heuristic] 这个岗位融合了领域专业知识、发布治理和面向客户的实施工作。'
- id: A15
  name: 解决方案／交付全成本薪酬
  value: $100.0K（每名全职员工）
  unit: 美元/年
  source: '[BP team Solutions lead + startup-finance heuristic] 体现了实施责任、伙伴赋能和数据映射支持工作的成本。'
- id: A16
  name: 数据运营全成本薪酬
  value: $60.0K
  unit: 美元/年
  source: '[BP team Data operations analyst + startup-finance heuristic] 本地数据集维护工作专业性强，但可以在当地招聘人手。'
- id: A17
  name: 销售／合作伙伴全成本薪酬
  value: $130.0K（每名全职员工）
  unit: 美元/年
  source: '[BP team Partnerships lead + startup-finance heuristic] 包含浮动薪酬、出差，以及依赖关系驱动的企业销售工作。'
- id: A18
  name: 薪酬在利润表科目间的分配
  value: 创始人 50% 计入销售营销 / 20% 计入研发 / 30% 计入行政；工程 100% 计入研发；合规产品 80% 计入研发 / 20% 计入行政；解决方案 30% 计入销售营销 / 70% 计入研发；数据运营 60% 计入研发 / 40% 计入行政；销售 100% 计入销售营销
  unit: 分配比例
  source: '[BP team role rationales + BP operations] 把人力成本映射到各职能支出上，同时保持创始人主导销售和交付工作的可见性。'
- id: A19
  name: 非薪酬运营支出爬坡
  value: 36 个月内，销售营销约 $5K-$20K/月，研发约 $10K-$22K/月，行政约 $5K-$13K/月
  unit: 美元/月
  source: '[BP operations + Research partnershipEcosystem + Research dataMoats + startup-finance heuristic] 涵盖云服务、合规工具、出差、法务、保险和伙伴赋能等支出。'
- id: A20
  name: 现金转换假设
  value: 用 EBITDA 近似现金变动
  unit: 计算方式
  source: '[startup-finance heuristic] 假设在种子前阶段的规模下，税费、债务、资本支出和营运资金时点的影响都可以忽略。'
- id: A21
  name: 月度流失率
  value: 1.5%
  unit: 百分比/月
  source: '[startup-finance heuristic for embedded bank workflow software + BP businessModel.expansionLevers] 一旦部署完成，合规工作流软件应该具有较高粘性，但不假设完美留存。'
- id: A22
  name: CAC 计算假设
  value: 第一、二年销售营销支出除以前 4 家尼泊尔生产环境客户 = 约 $165K CAC
  unit: 美元/客户
  source: '[model calc using Y1-Y2 S&M spend + BP gtm.funnelTargets] 这是一个锚定在首批验证客户群、而非完整 36 个月规模上的保守 CAC 估算。'
- id: A23
  name: 用于融资额度测算的下一轮里程碑
  value: 4 家尼泊尔生产环境银行客户，至少 1 次客户内部扩展，伙伴部署稳定保持在 90 天以内，以及 1 个相邻市场付费试点
  unit: 里程碑
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + Research geographicConsiderations] 这是种子轮就位前需要的验证包，种子前融资的额度就是按此测算并留有缓冲。'
- id: A24
  name: 相邻市场时间点
  value: 第一个相邻市场付费试点在第三年启动，第二个相邻市场付费机构约在第三年第三季度加入
  unit: 时间线
  source: '[BP milestones 24-36 months + Research geographicConsiderations Sri Lanka next market] 区域扩张要等到尼泊尔打法可复制之后才会启动。'
- id: A25
  name: 季度薪资核算假设
  value: 第二、三年的薪资行按每季度内实际的月度招聘情况计算，而不是只取季度末快照
  unit: 核算假设
  source: '[Headcount column convention + BP team.startTiming] 这样能让薪资科目与逐月的招聘节奏保持一致。'
- id: A26
  name: customersEop 统计口径
  value: customersEop 既包含付费试点也包含生产环境主体
  unit: 核算假设
  source: '[model reporting convention + BP gtm.pricing] 这样能让切口的进展看得见，但在试点和生产环境混合的季度里，纯经常性生产客户数会落后于付费主体总数。'
