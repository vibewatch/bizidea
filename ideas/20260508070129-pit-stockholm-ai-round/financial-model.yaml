slug: spreadsheet-migration-control-plane
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-08] modeled as the first full month after plan publication'
- id: A2
  name: Annualized revenue per active paid migration program
  value: '150'
  unit: USDK per year
  source: '[BP market.som, research.market.som] both model ~30 customers at ~$150k ACV'
- id: A3
  name: Paid pilot revenue normalization
  value: 75 over 6 months = 150 annualized
  unit: USDK / months
  source: '[BP investorMemo.firstCustomer.initialContract] $50k-100k pilot modeled at midpoint over 6 months so monthly revenue matches the $150k annual platform fee'
- id: A4
  name: Y1 customer ramp
  value: 3 paid programs by M12
  unit: customers
  source: '[BP milestones 0-12 months, GTM funnel targets] 3 design partners with at least 1 paid pilot converted to production; base case treats the paid design-partner programs as active revenue-generating migrations by year end'
- id: A5
  name: Y2 customer ramp
  value: 10 customers by M24
  unit: customers
  source: '[BP milestones 12-24 months] reach 8-10 annual customers; base case uses the top end of the stated milestone'
- id: A6
  name: Y3 customer ramp
  value: 30 customers by M36
  unit: customers
  source: '[BP market.som, milestones 24-36 months; research.bottomUpSizingDrivers] modeled year-3 SOM equals 30 customers'
- id: A7
  name: Gross margin ramp
  value: 60% Y1 / 65% Y2 / 70% Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 70% target reached only by Y3 because early deployments are more service-heavy'
- id: A8
  name: Steady-state CAC
  value: '60'
  unit: USDK per customer
  source: 'Startup-finance heuristic: early enterprise SaaS with founder-led sales, quote-based deals, and narrow ICP commonly needs ~$45k-75k fully loaded CAC; set near the middle and checked against the GTM funnel in BP'
- id: A9
  name: Steady-state monthly logo churn
  value: '2.0'
  unit: percent
  source: Startup-finance heuristic for a young enterprise workflow vendor; operating model assumes no realized churn events in the first 36 months because initial contracts are fixed-term and expansion-focused
- id: A10
  name: Hiring sequence
  value: engineering first, then solutions, security, and GTM
  unit: sequence
  source: '[BP team.startTiming, strategicChoices.sequencingRationale] directly informs the quarterly hiring ramp'
- id: A11
  name: Fully loaded annual pay by role
  value: CEO 120, CTO 120, Eng 190, Solutions 150, Sales 160, Security/Ops 175
  unit: USDK per FTE
  source: Startup-finance heuristic for seed-stage Stockholm / EU-US startup compensation including payroll taxes and benefits
- id: A12
  name: Non-payroll operating spend ramp
  value: cloud, security, legal, travel, and tooling rise from ~19K monthly in Q1Y1 to ~70K monthly in Q4Y3
  unit: USDK per month
  source: Startup-finance heuristic anchored to BP emphasis on connectors, security review packets, and founder-led enterprise sales
- id: A13
  name: Opening cash
  value: '2700'
  unit: USDK
  source: '[BP fundingAsk] inside the stated $2-4M pre-seed target range and consistent with an 18-month runway objective'
- id: A14
  name: Additional financing in base case
  value: none before seed
  unit: boolean / narrative
  source: Modeling choice so the cash line shows when the BP target pre-seed round stops covering burn; late-Y3 cash pressure is flagged explicitly
