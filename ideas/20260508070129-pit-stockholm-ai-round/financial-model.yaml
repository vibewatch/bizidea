modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> DesignPartners
      DesignPartners --> PaidPrograms
      PaidPrograms --> AnnualContracts
      AnnualContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by reaching 30 active paid migration programs by Q4Y3 at roughly $150K annualized ARPU, with most wins still coming from founder-led sales before partner leverage materially helps.
- checkName: Must go right
  finding: Shadow-run pilots have to convert into annual production programs fast enough to hit 10 customers by M24 and prove second-workflow expansion inside the same vendors.
- checkName: Model breaks if
  finding: If sales cycles slip by a quarter or gross margin stays closer to 65%, the company needs capital materially earlier and the pre-seed no longer bridges cleanly to seed.
- checkName: Next-round proof
  finding: The cleanest seed milestone is 8-10 annual customers plus repeatable security approval and at least 2 partner-assisted deployments, matching the BP 12-24 month objectives.
sanityChecks:
  ruleOf40: Y3 growth 180.2% + EBITDA margin -18.2% = 162.1%
  burnMultiple: Y3 burn multiple 0.3x (-$547.0K EBITDA on $1937.5K net new revenue)
  revenuePerFte: $215K Y3 using Q4Y3 14 FTE (benchmark $200–400K SaaS)
  flags:
  - Base case assumes the $2.7M pre-seed closes at model start; without that financing the company has no operating runway.
  - No realized logo churn is modeled in the first 36 months even though unit economics assume 2% steady-state churn; downside scenarios cover that gap.
  - Year-3 cash dips slightly below zero before any follow-on financing, so the model implies a seed process should start in mid-Y3 rather than waiting for cash exhaustion.
  - Gross margin only reaches the 70% target in Y3; if parity work remains highly manual, the business looks too services-heavy for this burn profile.
