scenarios:
  downside:
    description: One quarter slower sales cycles, weaker pilot conversion, and gross margin stuck at 65% keep the company in a services-heavier posture.
    y3RevenueK: 2100.0
    y3EbitdaK: -1150.0
    cashLowPointK: -1250.0
    keyAssumptionChanges:
    - ARPU falls to $135K as pilots discount more heavily.
    - Customers reach only 20 by M36 instead of 30.
    - Gross margin caps at 65% because manual review remains heavy.
  base:
    description: Founder-led sales converts the design-partner wedge into 10 customers by M24 and 30 by M36, with gross margin reaching the 70% target in Y3.
    y3RevenueK: 3012.5
    y3EbitdaK: -547.0
    cashLowPointK: -74.2
    keyAssumptionChanges:
    - Uses assumptions A2 through A14 with no extra financing before seed.
    - Gross margin improves from 60% to 70% as deployments standardize.
    - Hiring remains engineering-led until customer proof and security controls are in place.
  upside:
    description: Partner referrals arrive earlier, second-workflow expansion lifts blended usage, and the company reaches near break-even in Y3.
    y3RevenueK: 3900.0
    y3EbitdaK: 150.0
    cashLowPointK: 320.0
    keyAssumptionChanges:
    - Customers reach 36 by M36 through faster partner-assisted wins.
    - Blended annualized ARPU rises to $165K as second workflows attach earlier.
    - Gross margin reaches 72% as manual review hours fall faster than expected.
