    score: 5
    rationale: 所有试图替代旧工具的 AI 原生企业厂商，都会面对迁移和持续变更管理风险，因此平台空间足够大。
topRisks:
- name: 客户切口过窄
  description: 如果“替代型”产品的采用速度低于预期，先卖给 AI 原生厂商而不是终端企业，会限制早期市场规模。
  mitigation: 先盯住采购和财务场景；这些领域更常见重度依赖电子表格的工作流。等产品证明 ROI 后，再扩展到直接面向企业的部署。
- name: 流程推断准确性
  description: 凌乱电子表格和收件箱里藏着的业务逻辑，可能过于模糊，难以可靠地自动抽取。
  mitigation: 保留人工复核环节，先聚焦结构化审批工作流，并在任何生产切换前都先做并行模拟。
- name: 平台依赖
  description: 电子表格、邮件或 SaaS API 一旦变化，接入器能力就会受影响，部署节奏也会放慢。
  mitigation: 先优先覆盖价值最高的系统，同时围绕导出文件构建稳健的兜底接入方案，并在早期留出足够服务毛利吸收接入器维护成本。
