jobsToBeDone:
- job: 当我们向客户销售“替代电子表格审批流程”的方案时，帮实施团队尽快看清真实流程，并证明新系统足够安全，好让项目按时上线，不必临时拉一堆服务团队救火。
  currentAlternative: 人工研讨会、电子表格考古，以及一次性迁移脚本
  successMetric: 从签约到生产上线的天数
- job: 当客户上线后不断冒出边界情况时，帮团队发现旧流程与新应用之间的漂移，避免客户又退回 Excel。
  currentAlternative: 支持工单和被动的定制配置
  successMetric: 90 天后仍完全留在新产品内运行的工作流占比
ideaScorecard:
