  wedgeClarity:
    score: 5
    rationale: 围绕电子表格负担最重的工作流做安全抽取和一致性测试，是一个足够窄、也足够具体的首个产品。
  defensibility:
    score: 4
    rationale: 流程图谱、迁移基准和切换数据可以持续复利，逐步沉淀成难复制的工作流语料库。
