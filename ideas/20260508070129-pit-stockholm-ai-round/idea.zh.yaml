jobsToBeDone:
  - job: 当我们向客户销售“替代电子表格驱动的审批流程”时，帮实施团队把真实流程梳理出来，并证明新系统足够安全，这样他们就能按时上线，而不是临门一脚变成服务救火。
    currentAlternative: 手工工作坊、电子表格考古，以及一次性的迁移脚本
    successMetric: 从签约到生产上线的天数
  - job: 当客户上线后不断冒出边界情况时，帮团队发现旧流程和新应用之间的漂移，避免客户又退回 Excel。
    currentAlternative: 支持工单和被动式定制配置
    successMetric: 90 天后仍完全跑在新产品里的工作流占比
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 该主题有 3 个已验证来源、一笔具名的 $16M 种子轮，以及明确的“替代”叙事，但产品细节仍然有限。
  painIntensity:
    score: 4
    rationale: 从电子表格迁到产品是一个又痛、又慢、还会卡收入的环节，尤其对要拿下企业部署的厂商来说更是如此。
  wedgeClarity:
    score: 5
    rationale: 围绕电子表格密集型工作流迁移，先做安全抽取和一致性测试，切口窄且具体。
  defensibility:
    score: 4
    rationale: 流程图谱、迁移基准和切换数据会不断复利，最终形成难以复制的工作流语料库。
  ventureScale:
    score: 5
    rationale: 任何试图替代旧工具的 AI 原生企业软件厂商，都要面对迁移和持续变更管理风险，因此平台空间足够大。
topRisks:
  - name: 客户切口过窄
    description: 如果“替代型”产品的采用速度低于预期，只卖给 AI 原生厂商而不是终端企业，会让早期市场规模受限。
    mitigation: 先在采购和财务领域切入，这些场景里电子表格工作流最常见；等产品证明 ROI 后，再扩展到直接面向企业的部署。
  - name: 流程推断准确率
    description: 混乱的电子表格和邮箱里藏着大量隐性业务逻辑，自动抽取未必足够可靠。
    mitigation: 保留人工复核层，先聚焦结构化审批工作流，并在任何生产切换前先跑并行模拟。
  - name: 平台依赖
    description: 电子表格、邮件或 SaaS API 的变化可能削弱连接器能力，拖慢部署。
    mitigation: 先优先支持价值最高的系统，必要时用导出文件作为兜底入口，并在早期留出足够的服务毛利吸收连接器维护成本。
