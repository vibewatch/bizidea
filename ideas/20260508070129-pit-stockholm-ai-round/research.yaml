  validationPlan:
  - priority: high
    question: Can the product reconstruct approval logic with enough accuracy to support a real shadow run on live customer data?
    evidenceToGather: Three design-partner migrations with parity-rate metrics, mismatch taxonomy, and hours saved versus manual discovery.
  - priority: high
    question: 'Which budget owner pays first: professional services, product-platform, or customer success?'
    evidenceToGather: Ten buyer interviews and two pilot proposals showing budget source, approval path, and procurement objections.
  - priority: medium
