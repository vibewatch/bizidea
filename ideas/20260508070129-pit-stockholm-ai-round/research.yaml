openQuestions:
- How many live spreadsheet-to-system cutovers does a target AI-native vendor actually run per quarter, and how lumpy is that demand?
- Will customers grant deep mailbox and SaaS-log access early enough in the implementation cycle for the product to matter?
- 'What parity threshold is sufficient for buyers to trust go-live: exact output match, exception coverage, or auditability plus human review?'
- Are system integrators a scalable channel, or will they resist tooling that compresses billable discovery work?
