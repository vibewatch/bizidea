slug: spreadsheet-migration-control-plane
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date 2026-05-08] 按计划发布后的第一个完整月份建模'
- id: A2
  name: 每个活跃付费迁移项目的年化收入
  value: '150'
  unit: USDK per year
  source: '[BP market.som, research.market.som] 两处都按约 30 个客户、约 $150k ACV 建模'
- id: A3
  name: 付费试点收入归一化
  value: 75 over 6 months = 150 annualized
  unit: USDK / months
  source: '[BP investorMemo.firstCustomer.initialContract] 将 $50k-100k 试点按中位数折算为 6 个月收入，使月度收入与 $150k 年费匹配'
- id: A4
  name: Y1 客户爬坡
  value: 3 paid programs by M12
  unit: customers
  source: '[BP milestones 0-12 months, GTM funnel targets] 3 个共创客户且至少 1 个付费试点转生产环境；基准情形把这些共创客户项目视作年末已开始贡献收入的活跃迁移'
- id: A5
  name: Y2 客户爬坡
  value: 10 customers by M24
  unit: customers
  source: '[BP milestones 12-24 months] 到 8-10 个年度客户；基准情形取区间上沿'
- id: A6
  name: Y3 客户爬坡
  value: 30 customers by M36
  unit: customers
  source: '[BP market.som, milestones 24-36 months; research.bottomUpSizingDrivers] 建模中的第 3 年 SOM 等于 30 个客户'
- id: A7
  name: 毛利率爬坡
  value: 60% Y1 / 65% Y2 / 70% Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 由于早期部署更偏服务，70% 目标毛利率只在 Y3 达到'
- id: A8
  name: 稳态 CAC
  value: '60'
  unit: USDK per customer
  source: '创业财务经验假设：处于早期、创始人主导销售、报价制成交、ICP 较窄的企业 SaaS，完整 CAC 常见在 ~$45k-75k；这里取中位附近，并与 BP 的销售漏斗做交叉检查'
- id: A9
  name: 稳态月度 logo churn
  value: '2.0'
  unit: percent
  source: 年轻企业工作流厂商的创业财务经验假设；经营模型假设前 36 个月没有实际流失，因为首批合同以固定期限和扩张为主
- id: A10
  name: 招聘顺序
  value: engineering first, then solutions, security, and GTM
  unit: sequence
  source: '[BP team.startTiming, strategicChoices.sequencingRationale] 直接决定季度招聘节奏'
- id: A11
  name: 各岗位完全成本年薪
  value: CEO 120, CTO 120, Eng 190, Solutions 150, Sales 160, Security/Ops 175
  unit: USDK per FTE
  source: 面向种子阶段斯德哥尔摩 / 欧美创业公司的薪酬经验假设，已含薪资税和福利
- id: A12
  name: 非薪酬运营支出爬坡
  value: cloud, security, legal, travel, and tooling rise from ~19K monthly in Q1Y1 to ~70K monthly in Q4Y3
  unit: USDK per month
  source: 以 BP 中对连接器、安全评审包和创始人主导企业销售的强调为锚点的创业财务经验假设
- id: A13
  name: 期初现金
  value: '2700'
  unit: USDK
  source: '[BP fundingAsk] 位于 $2-4M pre-seed 目标区间内，并与 18 个月 runway 目标一致'
- id: A14
  name: 基准情形中的额外融资
  value: none before seed
  unit: boolean / narrative
  source: 建模时故意不在 seed 前加入额外融资，以便直接看出 BP 目标 pre-seed 何时撑不住 burn；Y3 后段的现金压力会被明确标出
