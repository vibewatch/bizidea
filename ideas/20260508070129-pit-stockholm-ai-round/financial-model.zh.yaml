slug: spreadsheet-migration-control-plane
date: '2026-05-08'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP 日期 2026-05-08] 以计划发布日期后的第一个完整月份作为建模起点'
- id: A2
  name: 每个活跃付费迁移项目的年化收入
  value: '150'
  unit: USDK per year
  source: '[BP market.som, research.market.som] 两处都按约 30 个客户、约 $150k ACV 建模'
- id: A3
  name: 付费试点收入归一化
  value: 75 over 6 months = 150 annualized
  unit: USDK / months
  source: '[BP investorMemo.firstCustomer.initialContract] $50k-100k 的试点按中位数并摊到 6 个月，因此月收入与 $150k 年平台费对齐'
- id: A4
  name: Y1 客户爬坡
  value: 3 paid programs by M12
  unit: customers
  source: '[BP milestones 0-12 months, GTM funnel targets] 目标是 3 个共创客户，且至少 1 个付费试点转入生产；基础情景把这些付费共创项目视作年末仍在计费的活跃迁移项目'
- id: A5
  name: Y2 客户爬坡
  value: 10 customers by M24
  unit: customers
  source: '[BP milestones 12-24 months] 目标是在年化口径下达到 8-10 个客户；基础情景取里程碑上沿'
- id: A6
  name: Y3 客户爬坡
  value: 30 customers by M36
  unit: customers
  source: '[BP market.som, milestones 24-36 months; research.bottomUpSizingDrivers] 设定第 3 年 SOM 等于 30 个客户'
- id: A7
  name: 毛利率爬坡
  value: 60% Y1 / 65% Y2 / 70% Y3
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 70% 目标只在 Y3 达成，因为早期部署更依赖服务'
- id: A8
  name: 稳定期 CAC
  value: '60'
  unit: USDK per customer
  source: 创业财务经验值：早期企业 SaaS、创始人主导销售、报价成交且 ICP 很窄时，完全成本 CAC 常落在约 $45k-75k；这里取中位附近，并与 BP 的漏斗目标交叉校验
- id: A9
  name: 稳定期月度 logo 流失率
  value: '2.0'
  unit: percent
  source: 创业财务经验值：针对年轻的企业工作流厂商；运营模型假设前 36 个月没有实际流失，因为首批合同多为固定期限且以扩张为主
- id: A10
  name: 招聘顺序
  value: engineering first, then solutions, security, and GTM
  unit: sequence
  source: '[BP team.startTiming, strategicChoices.sequencingRationale] 直接决定季度招聘爬坡顺序'
- id: A11
  name: 各岗位完全成本年薪
  value: CEO 120, CTO 120, Eng 190, Solutions 150, Sales 160, Security/Ops 175
  unit: USDK per FTE
  source: 创业财务经验值：适用于种子阶段、位于斯德哥尔摩 / 横跨欧美的创业公司，已包含工资税和福利
- id: A12
  name: 非工资运营支出爬坡
  value: cloud, security, legal, travel, and tooling rise from ~19K monthly in Q1Y1 to ~70K monthly in Q4Y3
  unit: USDK per month
  source: 创业财务经验值：围绕云成本、安全、法务、差旅和工具支出，从 Y1 Q1 的月均约 $19K 提升到 Y3 Q4 的月均约 $70K
- id: A13
  name: 期初现金
  value: '2700'
  unit: USDK
  source: '[BP fundingAsk] 位于既定 $2-4M pre-seed 目标区间内，并与 18 个月现金跑道目标一致'
- id: A14
  name: 基础情景下的额外融资
  value: none before seed
  unit: boolean / narrative
  source: 为了让现金曲线清楚显示：在商业计划所设 pre-seed 之后，如果不再融资，资金会在何时见底；Y3 后期的现金压力会被明确标注
