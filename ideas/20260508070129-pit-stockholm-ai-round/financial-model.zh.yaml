modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads --> DesignPartners
      DesignPartners --> PaidPrograms
      PaidPrograms --> AnnualContracts
      AnnualContracts --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的核心驱动，是到 Q4Y3 做到 30 个活跃付费迁移项目、年化 ARPU 约 $150K，而且大部分成交仍主要依赖创始人销售，伙伴杠杆尚未真正放大。
- checkName: 必须做对的事
  finding: 影子运行试点必须足够快地转成年度生产项目，才能在 M24 做到 10 个客户，并在同一批厂商里证明第二工作流扩张。
- checkName: 模型会失灵的地方
  finding: 如果销售周期多拖一个季度，或者毛利率更接近 65%，公司会更早需要融资，pre-seed 也就不再足以平稳衔接 seed。
- checkName: 下一轮融资证明点
  finding: 最干净的 seed 里程碑，是做到 8-10 个年度客户、可重复通过安全评审，并完成至少 2 次伙伴协助部署，这与 BP 的 12-24 个月目标一致。
sanityChecks:
  ruleOf40: Y3 growth 180.2% + EBITDA margin -18.2% = 162.1%
  burnMultiple: Y3 burn multiple 0.3x (-$547.0K EBITDA on $1937.5K net new revenue)
  revenuePerFte: $215K Y3 using Q4Y3 14 FTE (benchmark $200–400K SaaS)
  flags:
  - 基准情形假设模型启动时就完成 $2.7M pre-seed；没有这笔钱，公司根本没有运营 runway。
  - 前 36 个月模型里没有实际发生 logo churn，尽管单位经济部分假设稳态月流失率为 2%；这部分风险被放进 downside 情景里处理。
  - Y3 现金在后段略微跌破 0，因此模型隐含的结论是：seed 融资流程应在 Y3 中段启动，而不是等现金见底才动。
  - 70% 目标毛利率只在 Y3 才达到；如果一致性工作依旧高度依赖人工，这个 burn 水平下的业务会显得过于服务化。
