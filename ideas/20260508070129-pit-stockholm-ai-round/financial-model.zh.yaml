scenarios:
  downside:
    description: 如果销售周期慢一个季度、试点转化更弱，且毛利率卡在 65%，公司就会长期停留在更偏服务的交付形态。
    y3RevenueK: 2100.0
    y3EbitdaK: -1150.0
    cashLowPointK: -1250.0
    keyAssumptionChanges:
    - 由于试点折扣更重，ARPU 下降到 $135K。
    - 到 M36 只做到 20 个客户，而不是 30 个。
    - 因为人工复核仍然很重，毛利率上限只有 65%。
  base:
    description: 在基础情景下，创始人主导销售把共创客户切口转成 M24 的 10 个客户和 M36 的 30 个客户，并在 Y3 把毛利率拉到 70% 目标。
    y3RevenueK: 3012.5
    y3EbitdaK: -547.0
    cashLowPointK: -74.2
    keyAssumptionChanges:
    - 直接采用 A2 到 A14 的假设，seed 前不额外融资。
    - 随着部署标准化，毛利率从 60% 提升到 70%。
    - 在客户验证和安全控制到位前，招聘仍以工程研发为先。
  upside:
    description: 如果合作伙伴转介绍更早出现、第二工作流扩展更快抬升混合使用量，公司有机会在 Y3 接近盈亏平衡。
    y3RevenueK: 3900.0
    y3EbitdaK: 150.0
    cashLowPointK: 320.0
    keyAssumptionChanges:
    - 借助合作伙伴更快拿单，到 M36 客户数增至 36 个。
    - 由于第二工作流更早挂载，混合年化 ARPU 提升到 $165K。
    - 如果人工复核小时数下降快于预期，毛利率可升至 72%。
