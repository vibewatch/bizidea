scenarios:
  downside:
    description: 销售周期多拖一个季度，试点转化更弱，毛利率卡在 65%，公司会更像一家重服务交付的团队。
    y3RevenueK: 2100.0
    y3EbitdaK: -1150.0
    cashLowPointK: -1250.0
    keyAssumptionChanges:
    - ARPU 降到 $135K，因为试点折扣更重。
    - 到 M36 只做到 20 个客户，而不是 30 个。
    - 毛利率最高只能到 65%，因为人工复核始终很重。
  base:
    description: 创始人主导销售把共创客户切口转成 M24 的 10 个客户、M36 的 30 个客户，毛利率在 Y3 达到 70% 目标。
    y3RevenueK: 3012.5
    y3EbitdaK: -547.0
    cashLowPointK: -74.2
    keyAssumptionChanges:
    - 采用 A2 到 A14 的全部假设，seed 前不额外融资。
    - 随着部署逐步标准化，毛利率从 60% 提升到 70%。
    - 在拿到客户证据和安全控制之前，招聘节奏始终以工程为主。
  upside:
    description: 伙伴转介更早起量，第二工作流扩张抬高综合使用收入，公司在 Y3 接近盈亏平衡。
    y3RevenueK: 3900.0
    y3EbitdaK: 150.0
    cashLowPointK: 320.0
    keyAssumptionChanges:
    - 借助更快的伙伴协助成交，到 M36 客户数达到 36 个。
    - 由于更早挂上第二工作流，综合年化 ARPU 提升到 $165K。
    - 随着人工复核时长下降得更快，毛利率提升到 72%。
