modelDiagram:
  title: 单位经济模型流转
  mermaid: "flowchart LR\n  Leads[销售线索] --> DesignPartners[共创客户]\n  DesignPartners --> PaidPrograms[付费项目]\n  PaidPrograms --> AnnualContracts[年度合同]\n  AnnualContracts --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的核心驱动，是到 Q4Y3 做到 30 个活跃付费迁移项目，每个项目约 $150K 年化 ARPU；在合作伙伴放大真正出现前，大多数订单仍来自创始人主导销售。
- checkName: 必须做对的事
  finding: 影子运行试点必须足够快地转成年度生产项目，才能在 M24 达到 10 个客户，并证明同一厂商内部存在第二工作流扩展。
- checkName: 模型会失效的情况
  finding: 如果销售周期再拖一个季度，或者毛利率更接近 65%，公司就会明显更早需要融资，pre-seed 也不再足够平滑地接到 seed。
- checkName: 下一轮融资证明点
  finding: 最干净的 seed 里程碑，是做到 8-10 个年约客户、可重复的安全审批，以及至少 2 个合作伙伴协助部署项目，这与 BP 中 12-24 个月目标一致。
sanityChecks:
  ruleOf40: Y3 增长率 180.2% + EBITDA 利润率 -18.2% = 162.1%
  burnMultiple: Y3 burn multiple 为 0.3x（净新增收入 $1937.5K，对应 EBITDA -$547.0K）
  revenuePerFte: 按 Q4Y3 的 14 FTE 计算，Y3 每 FTE 收入约 $215K（SaaS 基准约 $200–400K）
  flags:
  - 基础情景假设 $2.7M 的 pre-seed 在模型起点完成；没有这笔融资，公司几乎没有可运营跑道。
  - 虽然单位经济模型假设稳定期月流失率为 2%，但前 36 个月没有建模任何实际 logo 流失；这一缺口由 downside 情景覆盖。
  - 在没有后续融资的前提下，Y3 现金会轻微跌破 0，因此模型隐含的含义是：seed 融资流程应在 Y3 年中启动，而不是等现金耗尽。
  - 毛利率直到 Y3 才达到 70% 目标；如果一致性工作长期高度依赖人工，这个 burn profile 下业务会显得过于偏服务。
