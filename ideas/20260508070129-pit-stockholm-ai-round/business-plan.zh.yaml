slug: spreadsheet-migration-control-plane
date: '2026-05-08'
executiveSummary: >-
  这家公司卖的是一套迁移控制平面，客户是 AI 原生采购软件厂商里的实施团队——这些厂商正替企业客户把“电子表格驱动的供应商入驻流程”迁进新系统。眼下最直接的买方，是 VP 或 Professional Services 负责人；一旦隐藏的审批逻辑必须从 Excel、共享邮箱和 SaaS 日志里反向拆出来，他们的上线时间和服务毛利就会同时承压。研究支持这个聚焦切口：目标市场是大约 150 家 AI 原生采购与财务软件厂商，对应估算约 $22.5M 的 SAM；早期销售的典型触发点，则是刚签下一个要求在一个季度内完成切换的企业大客户。这个产品的切口不是泛化自动化，而是影子运行的一致性测试——先证明新系统在正式切换前就能像旧电子表格流程那样工作。这一点很关键，因为只有先证明迁移更快、更稳，后续才有资格扩展到漂移检测、回滚和持续变更管理。当前计划刻意避开直面企业数字化改造项目、宽泛的流程挖掘，以及通用自动化搭建功能；在公司能拿出“窄场景、少人工、高一致性迁移”这类可复用证据之前，不去摊大饼。最大的反证风险在于：如果工作流推断始终摆脱不了重服务交付，毛利就会塌成定制实施。所以下一个 12 个月，重点是 3 个共创客户部署、可审计的安全控制，以及按在跑的迁移项目定价，而不是按 seat 卖。市场规模和 ACV 都来自研究文件的建模估算，并非已签客户证据，因此投资判断最终仍要看早期一致性指标和试点转化数据。
problem:
  - AI 原生采购和财务软件厂商能签下“替代电子表格流程”的单子，却常在实施阶段耗掉时间和毛利，因为他们得从 Excel、邮箱和零散 SaaS 日志里把没文档的审批逻辑重新拼出来。
  - 内部脚本、顾问和工作坊式梳理虽然灵活，但速度慢、审计性差；当企业客户要求证明切换不会影响线上流程时，这套办法风险很高。
solution:
  - 接入 Excel、Google Sheets、共享邮箱和关键工作流系统，从真实生产资料里推断规则、审批路径和例外处理，而不是只靠访谈。
  - 生成可供审阅的流程图谱、可执行迁移测试和影子运行一致性报告，让实施团队在上线前就能证明新旧行为一致。
  - 上线后继续监控漂移和账外例外，避免客户重新退回电子表格。
whyWeWin:
  - 这个切口比流程挖掘或 iPaaS 更窄：只在厂商主导的切换过程中，为一个高度依赖电子表格的工作流证明一致性；买方此时既有紧迫 deadline，也有预算。
  - 重复迁移会不断沉淀专有语料：流程图谱、例外模式和一致性基准会越积越厚，准确率更高，人工成本更低。
  - 现有厂商各自占着数据导入、自动化或流程分析的一段，但没有人围绕“AI 原生工作流替代”这件事，为实施团队的 ROI 做产品设计。
strategicChoices:
  beachhead: 把供应商入驻流程从 Excel、共享邮箱和单点 SaaS 迁进自家系统记录层的 Series A-C AI 原生采购厂商
  wedgeRationale: 这类买方比终端客户更早感到痛，手里也握着实施预算，还有明确的上线 deadline；供应商入驻又比更宽的采购或财务流程套件更窄、更容易建模，因此更快打出证据。
  sequencingRationale: 先做 Excel、Sheets 和邮箱接入，再配人工复核的一致性测试，把一个工作流先跑通；只有在付费试点证明“上线更快”可重复后，再补漂移检测和伙伴工具。招聘节奏也一样：先上连接器和推断工程，再补解决方案，最后才放大合作伙伴能力。
  notYet:
    - 直接承接企业数字化改造项目；这类项目销售周期更长，安全范围更宽，工作流差异也更大。
    - 在供应商入驻之外，先不碰支出审批、AP 自动化等相邻工作流，直到一致性迁移能稳定复现。
    - 先不做通用流程挖掘看板或低代码自动化构建，以免把“切换保障”这个价值主张做散。
market:
  tam: 估算 TAM 为 $1.1B，覆盖 AI 原生工作流厂商、大型 SI，以及直接面向企业改造团队的市场，按每年约 $150k 的项目价值测算
  sam: 估算 beachhead SAM 为 $22.5M，对应约 150 家正在做企业实施的 AI 原生采购与财务软件厂商
  som: 估算第 3 年 SOM 为 $4.5M，假设通过创始人主导销售和伙伴转介拿下 30 个客户，ACV 约 $150k
  segments:
    - 为企业客户替代电子表格驱动供应商入驻流程的 AI 原生采购软件厂商
    - 做类似“电子表格到系统”切换的 AI 原生财务和审批工作流厂商
  buyingProcess: 通常是实施负责人或 VP Professional Services 在刚拿下企业大客户、切换 deadline 已经锁死时发起采购。预算审批多半落在 VP Professional Services 或 COO，随后会进入安全评审，因为产品要接触电子表格、邮箱和工作流日志。
product:
  mvp: MVP 先吃进供应商入驻场景下的 Excel、Google Sheets 和共享邮箱数据，生成可供审阅的流程图谱，并对旧流程和目标应用跑影子对比。系统内置人工签核、不一致报告和审计轨迹，避免团队把它当成一个黑盒 agent 扔上生产。
  sixMonth: 先把共创客户最常用的连接器补齐，上线人工在环的规则审阅，再完成 3 次影子运行，量化一致性比例，以及相对工作坊式梳理节省了多少人工时。
  twelveMonth: 把 MVP 做成可过审的部署产品，补齐角色权限、留存控制、回滚工作流、漂移监控，以及面向供应商入驻场景的可复用迁移模板。
  twentyFourMonth: 从单一工作流的切换工具，扩成更完整的迁移控制层，覆盖更多采购和财务工作流，并给 SI 和实施团队提供伙伴控制台。
  keyBets:
    - Excel、Google Sheets 和共享邮箱连接器，在早期即便没有深度 ERP 集成，也足以覆盖大部分隐藏逻辑，让部署产生价值。
    - 有人工复核的推断，能把一致性做到账户可接受的阈值，而不会把每个项目都拖成定制服务。
    - 只要产品真能砍掉几周梳理工作，并守住 Professional Services 毛利，实施负责人就愿意按平台价付费。
gtm:
  wedge: 向一家 Series B AI 原生采购厂商的 VP Professional Services 卖一个付费试点；这家公司刚签下企业客户，对方要求在一个季度内把供应商入驻从电子表格迁走。
  channels:
    - 创始人亲自做外呼和关系销售，面向 AI 原生采购与财务软件厂商里的实施负责人、 Professional Services 负责人和 COO。
    - 当第一套工作流打法可复制后，通过实施顾问和系统集成商的共创客户转介绍扩张。
    - 和采购编排、自动化平台做集成与生态合作，降低连接器阻力。
  funnelTargets: "10-15 个合格厂商对话，转成 3 个共创客户；共创客户到付费试点转化率 60%+；试点到年约转化率 50%+；正式投产后 12 个月内，50%+ 客户扩展到第二个工作流。"
  pricing: 按每个在跑的迁移项目收取年度平台费；第一个工作流先卖付费试点，之后按工作流数量和监控流程量阶梯扩张。这和买方的项目制预算相匹配，也贴合研究文件里同类企业级、报价制基础设施的定价方式。
businessModel:
  revenueStreams:
    - 对每个在管的 live migration program 收取年度订阅
    - 第一个工作流部署收取付费试点和导入费用
    - 对额外工作流、监控量和上线后漂移检测收扩展费
  unitOfValue: 围绕某个具体工作流的一次 live migration program，后续按新增工作流和监控流程量扩张
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一家厂商里，从第一次成功切换后继续扩更多工作流
    - 把一次性试点，做成长期在线的漂移检测和回滚监控
    - 让 SI 和实施伙伴在多个厂商账户上标准化使用这套平台
strategyMap:
  northStarMetric: 成功迁到生产，并在 90 天后仍未退回电子表格的工作流数量
  inputMetrics:
    - 每季度合格的 live cutover 机会数
    - 关键决策路径上的影子运行一致性比例
    - 每次迁移消耗的人工复核时长
    - 试点转生产的转化率
    - 第二工作流扩张率
  moatsToBuild:
    - 专有的流程图谱、偏差分类和已验证迁移测试案例语料库
    - 能缩短企业评审周期的安全与审计控制，尤其覆盖电子表格和邮箱访问
    - 面向采购和财务工作流切换的可复制伙伴打法
  killCriteria:
    - 如果 3 个共创客户都跑不出至少 1 个付费试点，或者产品做不到在明显少于当前服务流程的人力投入下，达到买方能接受的一致性阈值，那就该重新收窄甚至重做当前切口。
  mermaid: |
    flowchart LR
      Wedge[供应商入驻切换切口] --> MVP[连接器加一致性验证 MVP]
      MVP --> Proof[付费试点验证省时与一致性证据]
      Proof --> Expansion[扩展到更多工作流与伙伴驱动分发]
investorMemo:
  verdict:
    call: 值得会面并继续调查
    conviction: 切口非常清晰，但真正的信心取决于——一致性测试能不能做成软件，而不是披着软件外衣的服务。
    whyBelieve: AI 原生工作流厂商眼下确实卡在实施瓶颈上，而相邻赛道里还没有谁拿下“电子表格替代的一致性切换”这个位置。
    whyDoubt: beachhead 集中度高，技术不确定性也大；在做出持久的软件护城河前，团队可能先被高触达服务拖住。
    nextDiligence: 先核实 3 个共创客户，量化线上迁移的一致性覆盖率，并确认预算负责人是否愿意把付费试点转成年约平台合同。
  firstCustomer:
    title: 一家 Series B AI 原生采购厂商的 VP Professional Services
    profile: 团队有 10-50 名实施人员，且多个企业客户仍在把供应商入驻从 Excel 和邮件迁进新产品。
    trigger: 新签企业客户要求一个季度内完成切换，并要求看到审批逻辑在迁移后仍能成立的证据。
    buyer: VP Professional Services 或 COO
    initialContract: 单个 live migration 的付费试点约 $50k-100k；一旦一致性被证明、且第二个工作流开始排期，就转成大约 $150k 的年度平台合同
  mustBeTrue:
    - 3 个共创客户愿意在正式上线前，足够早地开放电子表格、邮箱和工作流日志权限，让团队跑影子测试。
    - MVP 能在供应商入驻场景里，用明显少于工作坊式梳理的人力，做到买方可接受的一致性阈值。
    - VP Professional Services 这类买方愿意按企业软件定价付费，因为产品既缩短实施时间，也守住服务毛利。
    - 至少一半的付费试点会转成年约，并在第一年内扩展到第二个工作流。
    - 合作伙伴会觉得“交付更快、风险更低”比保留可计费的迁移模糊地带更值钱。
  diligenceQuestions:
    - 目标厂商每个季度到底会跑多少次“电子表格到系统”的切换？需求有多集中？
    - 在真实项目里，最有价值的资料组合究竟是什么：电子表格、共享邮箱，还是下游 SaaS 日志？
    - 买方需要看到什么样的一致性证据，才会批准上生产？
    - 第一笔预算最可能来自哪里：Professional Services、产品平台，还是客户成功？
    - 实施伙伴到底会愿意转卖这个产品，还是更想把梳理工作继续按人天计费？
  riskHeatmap:
    - risk: 工作流推断始终摆脱不了重服务，产品化做不出来
      likelihood: High
      impact: High
      leadingIndicator: 前 3 次影子运行之后，人工复核时长仍与当前咨询式基线相差无几
      mitigation: 先把 MVP 限死在供应商入驻场景，保留人工复核层，在扩范围之前先把高频例外模式产品化。
    - risk: beachhead 买方池太窄，或者需求过于波动
      likelihood: Medium
      impact: High
      leadingIndicator: 对外拓展前 6 个月，合格的 live cutover 机会少于 10 个
      mitigation: 先拿下采购场景，再只在 ROI 被证明之后，扩到相邻的财务工作流厂商和伙伴渠道。
    - risk: 连接器权限、额度或安全评审拖慢部署
      likelihood: Medium
      impact: High
      leadingIndicator: 共创客户在试点范围界定阶段无法开放邮箱或电子表格权限，或额度限制让重放稳定性失效
      mitigation: 提前做基于导出的兜底方案、最小权限访问控制，以及标准化安全评审包，再去扩更广的连接器。
    - risk: 一旦赛道被验证，现有厂商很快把功能吃进去
      likelihood: Medium
      impact: Medium
      leadingIndicator: Flatfile、Workato 或流程挖掘厂商开始向实施团队宣传“带一致性验证的切换产品”
      mitigation: 把工作流专属迁移数据、极速部署打法和伙伴关系做深，形成通用平台很难复制的壁垒。
operatingAssumptions:
  - assumption: 第一笔预算会来自 Professional Services 或实施负责人，而不是中心化的产品平台预算。
    basis: research.yaml
    validationTest: 跑 10 场买方访谈，并拿到 2 份试点方案，明确预算拥有者、审批路径和采购阻力。
    decisionImpact: 如果不成立，定价模型和销售路径就要转向产品平台基础设施预算，审批周期也会拉长。
  - assumption: Excel、Google Sheets 和共享邮箱连接器，已经能覆盖供应商入驻场景里大部分早期工作流逻辑。
    basis: idea.yaml
    validationTest: 回看 15 个近期实施项目的资料清单，量化哪类来源解释了大多数审批路径和例外情况。
    decisionImpact: 如果不成立，路线图就得更早转向深度 ERP 或采购系统连接器，而不是继续押注邮箱侧推断。
  - assumption: 有人工复核的推断，能做到买方能接受的一致性阈值，同时不把部署经济性拖成定制咨询。
    basis: operator judgment
    validationTest: 完成 3 次影子运行，把一致性指标和人工复核时长与当前实施基线对比。
    decisionImpact: 如果不成立，公司要么继续收窄到更简单的工作流，要么接受服务主导的模式，而这会削弱风投回报模型。
  - assumption: 一旦产品真的缩短梳理周期、降低上线风险，实施伙伴就会愿意帮忙分销。
    basis: research.yaml
    validationTest: 做 5 场伙伴访谈，再共交付 1 次迁移，测附着率、伙伴毛利影响和转卖意愿。
    decisionImpact: 如果不成立，公司就应更长时间坚持创始人主导分销，避免过早招以渠道为主的 GTM 角色。
  - assumption: 安全评审可以被标准化，不至于变成早期试点的最大阻塞项。
    basis: research.yaml
    validationTest: 把最小权限访问、留存设置和审计日志打包成标准安全材料，并在前 3 个试点中测审批时长。
    decisionImpact: 如果不成立，路线图和招聘都要更早把合规基础设施提到优先级前面。
experimentRoadmap:
  - horizon: 0-90 天
    experiment: 访谈 10 家目标厂商的实施和 Professional Services 负责人，并推销一个付费的供应商入驻试点。
    hypothesis: 痛感最强、也最有预算控制权的买方是 VP Professional Services 或 COO，而不是 IT 或数据团队。
    successMetric: 至少 10 家目标账户里有 6 家确认存在活跃切换痛点，其中 2 家同意进入试点范围界定。
    owner: 创始人/CEO
  - horizon: 0-90 天
    experiment: 从共创客户收集匿名化电子表格、邮箱线程和工作流导出，判断哪些连接器能解释最多隐藏逻辑。
    hypothesis: 在还没接深度 ERP 集成前，电子表格和邮箱资料就足以让 MVP 产生价值。
    successMetric: 在抽样项目里，至少 70% 的关键决策路径可由首批连接器重建出来。
    owner: 创始人/CTO
  - horizon: 90-180 天
    experiment: 围绕供应商入驻跑 3 次影子迁移，对比一致性、发现的例外，以及相较伙伴正常流程节省了多少人工时间。
    hypothesis: 产品能显著减少梳理工作量，同时达到买方认可、可以支持上线审核的一致性阈值。
    successMetric: 3 次影子运行里至少有 2 次实现 30%+ 人工节省，并达到买方定义的一致性门槛。
    owner: 创始工程师
  - horizon: 90-180 天
    experiment: 在首批试点里测试一套标准安全包，覆盖访问范围、留存控制和审计日志。
    hypothesis: 安全和隐私异议可以靠可重复的最小权限部署模型解决。
    successMetric: 至少 2 个试点账户一次过安全评审，或拿到范围清晰、可执行的整改清单。
    owner: 安全与数据平台负责人
  - horizon: 180-360 天
    experiment: 把付费试点转成年度订阅，并顺手卖出第二个工作流和漂移监控。
    hypothesis: 一旦第一次切换证明了“更快上线、回滚风险更低”，买方就会继续扩张。
    successMetric: 试点到年约转化率 50%+，且 12 个月内至少有 1 个第二工作流扩张。
    owner: 创始人/CEO
  - horizon: 180-360 天
    experiment: 与一个实施伙伴联合销售并交付一次迁移，测清楚伙伴侧的经济账。
    hypothesis: 如果产品能提升交付毛利、缩短项目周期，伙伴就愿意分销。
    successMetric: 至少签下一次伙伴协助部署，并拿到“伙伴有效毛利提升或交付时间下降”的证据。
    owner: 解决方案负责人
operations:
  - 采用最小权限的连接器架构，并为额度或权限失败准备基于导出的兜底方案
  - 为电子表格和邮箱内容提供审计日志、留存控制和脱敏流程
  - 用实施操作手册把资料收集、规则审阅和切换签核标准化
  - 持续监控 Microsoft 和 Google API 的额度与重试表现，守住连接器健康度
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 和创始团队一起把首批连接器、流程图谱引擎和一致性测试框架搭起来。
  - role: 应用 AI 与规则工程师
    startTiming: 第 1-3 个月
    rationale: 提升工作流推断、例外分类和人工复核工具，但不过度自动化切换决策。
  - role: 解决方案工程师
    startTiming: 第 3-6 个月
    rationale: 把共创客户部署沉淀成可复制的实施操作手册，并为销售攒出 ROI 证据。
  - role: 安全与数据平台工程师
    startTiming: 第 6-9 个月
    rationale: 把企业评审需要的访问控制、留存、审计日志和部署可靠性产品化。
  - role: GTM 通才
    startTiming: 第 9-12 个月
    rationale: 在第一批生产案例跑出来后，辅助创始人拓 pipeline、转试点，并做早期伙伴赋能。
milestones:
  - horizon: 0-12 个月
    items:
      - 签下 3 个聚焦采购工作流软件的共创客户
      - 上线 Excel、Google Sheets 和共享邮箱连接器，并支持人工复核的流程图谱生成
      - 完成 3 次影子运行，至少把 1 个付费试点转成生产
      - 建立可重复的安全评审包和可审计部署控制
  - horizon: 12-24 个月
    items:
      - 达到 8-10 个年度客户，并在多个账户里验证第二工作流扩张
      - 上线漂移监控、回滚工作流，以及可复用的供应商入驻迁移模板
      - 通过实施方或 SI 渠道签下 2-3 个伙伴协助部署
  - horizon: 24-36 个月
    items:
      - 从供应商入驻扩展到相邻的采购与财务审批工作流
      - 基于累计迁移数据，做出伙伴控制台和基准库
      - 证明公司能从 beachhead 走到建模中的第 3 年 SOM（约 $4.5M）
risks:
  - risk: 面对真实世界里混乱的资料，工作流推断准确率可能波动太大，撑不起自动化一致性测试。
    likelihood: High
    impact: High
    mitigation: 把人工保留在审批闭环中，先聚焦结构化审批流程，并在一致性指标可重复前严控范围。
  - risk: 公司可能滑成一家重服务的迁移外包店，而不是软件公司。
    likelihood: High
    impact: High
    mitigation: 围绕软件价值定价，持续跟踪每次部署消耗的人工时长，并拒绝那些在早期试点后仍无法产品化的工作流类型。
  - risk: 连接器额度、邮箱权限和安全评审可能拖慢 time-to-value。
    likelihood: Medium
    impact: High
    mitigation: 提前做基于导出的接入兜底、最小权限连接器范围和标准化安全评审材料。
  - risk: 在扩展到相邻工作流或渠道前，最初的买方池可能太小。
    likelihood: Medium
    impact: Medium
    mitigation: 先打透采购 beachhead，只有在 ROI 证据足够清楚后，才扩到财务工作流厂商和伙伴分销。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 用这笔 18 个月的资金完成连接器和推断研发、企业级安全控制、3-5 个共创客户部署，以及把滩头切口转成可复制付费试点所需的创始人主导销售动作。
