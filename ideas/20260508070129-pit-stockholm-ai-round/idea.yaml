jobsToBeDone:
  - job: When we sell a customer on replacing a spreadsheet-run approval workflow, help our implementation team discover the real process and prove the new system is safe, so they can launch on time without a services fire drill.
    currentAlternative: Manual workshops, spreadsheet archaeology, and one-off migration scripts
    successMetric: Days from signed contract to production go-live
  - job: When a customer keeps finding edge cases after launch, help our team detect drift between the old process and the new app, so they can prevent rollback to Excel.
    currentAlternative: Support tickets and reactive custom configuration
    successMetric: Percentage of workflows that stay fully inside the new product after 90 days
