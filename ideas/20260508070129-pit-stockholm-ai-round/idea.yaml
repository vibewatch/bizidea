topRisks:
  - name: Narrow customer wedge
    description: Selling to AI-native vendors rather than end enterprises could limit early market size if replacement adoption is slower than expected.
    mitigation: Start with vendors in procurement and finance where spreadsheet-heavy workflows are common, then expand to direct enterprise deployments once the product proves ROI.
  - name: Process inference accuracy
    description: Hidden business logic in messy spreadsheets and inboxes may be too ambiguous for reliable automated extraction.
    mitigation: Keep a human-in-the-loop review layer, focus first on structured approval workflows, and use side-by-side simulation before any production cutover.
  - name: Platform dependence
    description: Changes in spreadsheet, email, or SaaS APIs could weaken connectors and slow deployment.
    mitigation: Prioritize the highest-value systems, build resilient ingestion around exports as a fallback, and charge enough services margin early to absorb connector maintenance.
