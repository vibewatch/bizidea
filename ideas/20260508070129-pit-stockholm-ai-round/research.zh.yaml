  pricing: 企业级报价
  strength: BPM / 改造覆盖面广，也更受既有企业信任
  weaknessVsUs: 属于更重的改造套件，不擅长为 AI 原生厂商做快速、可复制的实施迁移
  sourceRefs:
  - 76
- name: Workato
  stage: 成长期
  wedge: iPaaS 与工作流自动化平台
  pricing: 灵活、可预期的定制企业定价
  strength: 接入器覆盖广，是很强的工作流自动化底座
  weaknessVsUs: 仍要求人工先定义目标逻辑和 recipes；无法原生发现隐藏的电子表格行为，也不提供切换一致性证明
  sourceRefs:
  - 80
  - 81
  - 85
- name: Internal scripts + consultants
  stage: 替代方案
  wedge: 定制研讨会、一次性迁移代码和按工时计费的实施服务
  pricing: 服务工时 + 定制工具
  strength: 足够灵活，而且早已嵌入实施流程
  weaknessVsUs: 难以复用、审计能力弱，而且保留了实施利润拖累，而不是把它移除
  sourceRefs:
  - 58
  - 59
  - 61
regulatoryTechnicalConstraints:
- point: 电子表格和邮件接入器会真实遇到 API 限流与配额约束，产品设计必须正面处理。
  sourceRefs:
  - 101
  - 105
  - 107
- point: 在开放采购和财务工作流数据前，企业客户会要求强合规和安全控制。
  sourceRefs:
  - 19
  - 35
- point: 当产品处理个人数据时，针对收件箱和电子表格的工作流推断会触发 GDPR 义务。
  sourceRefs:
  - 109
  - 19
  - 35
- point: AI 辅助推断和建议必须配套明确的人类监督与风险控制。
  sourceRefs:
  - 109
- point: 凌乱的电子表格逻辑和隐藏异常，会给全自动迁移设置准确率天花板。
  sourceRefs:
  - 8
  - 61
validationSignals:
- point: Pit 的种子融资和“替代”叙事表明，投资人相信新一代企业软件可以替代电子表格和旧 SaaS，而不只是给它们打辅助。
  sourceRefs:
  - 1
  - 2
  - 3
- point: ORO 围绕 agentic procurement orchestration 融到大额资金，说明这个领域的买方和投资人都愿意为工作流层基础设施买单。
  sourceRefs:
  - 51
- point: Zip 公开强调 Anthropic 在不增加人头的情况下把采购规模放大 5 倍，说明买方确实愿意为工作流压缩和运营杠杆付费。
  sourceRefs:
  - 21
- point: Flatfile 的客户案例公开展示了更快入驻和六位数成本节省，这验证了缓解迁移痛点本身就有预算。
  sourceRefs:
  - 67
  - 68
- point: 公开讨论里已经出现大量 AI 采购工具和持续的从业者报道，这说明市场正在主动探索需求，而不是只停留在概念阶段。
  sourceRefs:
  - 4
  - 5
  - 31
openQuestions:
- 目标 AI 原生厂商每个季度到底会做多少次从电子表格迁到系统的项目？需求波动有多大？
- 客户会不会在实施周期足够早的阶段开放深度邮箱和 SaaS 日志访问，让产品真正发挥作用？
- 买方认为什么样的一致性阈值足以放心上线：输出完全一致、异常覆盖率，还是“可审计 + 人工复核”即可？
- 系统集成商会成为可规模化渠道，还是会抗拒任何压缩可计费发现工作的工具？
