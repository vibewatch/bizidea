  weaknessVsUs: 更适合在数据已建模后优化流程，不天然服务于 AI 原生应用替换过程中的厂商主导切换保障
  sourceRefs:
  - 69
  - 71
- name: SAP Signavio
  stage: incumbent
  wedge: 流程改造与流程智能套件
  pricing: 企业报价制
  strength: BPM/流程改造覆盖面广，也有现有厂商信任背书
  weaknessVsUs: 套件更重，不适合 AI 原生厂商做快速、可重复的实施迁移
  sourceRefs:
  - 76
- name: Workato
  stage: scale-up
  wedge: iPaaS 与工作流自动化平台
  pricing: 灵活、可预测的定制企业定价
  strength: 连接器覆盖广，工作流自动化底座成熟
  weaknessVsUs: 仍要求人工先定义目标逻辑和 recipe；它不会原生发现电子表格里隐藏的行为，也不提供切换一致性证明
  sourceRefs:
  - 80
  - 81
  - 85
- name: Internal scripts + consultants
  stage: substitute
  wedge: 定制工作坊、一次性迁移代码和按时计费的实施投入
  pricing: 服务工时费加定制工具
  strength: 灵活，而且早已嵌入现有实施流程
  weaknessVsUs: 难复用、审计性弱，而且保留了实施毛利拖累，而不是把它消掉
  sourceRefs:
  - 58
  - 59
  - 61
regulatoryTechnicalConstraints:
- point: 电子表格和邮件连接器会遇到真实的 API 限流和配额约束，产品架构必须提前绕开。
  sourceRefs:
  - 101
  - 105
  - 107
- point: 在开放采购和财务工作流数据前，企业客户会先要求很强的合规和安全控制。
  sourceRefs:
  - 19
  - 35
- point: 当产品对邮箱和电子表格做工作流推断时，只要涉及个人数据，就会触发 GDPR 义务。
  sourceRefs:
  - 109
  - 19
  - 35
- point: AI 辅助推断和建议必须配套明确的人类监督和风险控制。
  sourceRefs:
  - 109
- point: 混乱的电子表格逻辑和隐藏例外，会为全自动迁移设下一道准确率天花板。
  sourceRefs:
  - 8
  - 61
validationSignals:
- point: Pit 的种子轮融资与“替代型”叙事说明，投资人已经相信新一代企业软件能替换电子表格和旧 SaaS，而不只是做辅助层。
  sourceRefs:
  - 1
  - 2
  - 3
- point: ORO 围绕 agentic procurement orchestration 融了大额资金，说明买方和投资人都在为这个领域的工作流基础设施买单。
  sourceRefs:
  - 51
- point: Zip 公开强调 Anthropic 在不扩编的情况下把采购规模放大 5 倍，说明买方愿意为流程压缩和运营杠杆付费。
  sourceRefs:
  - 21
- point: Flatfile 公布的客户案例显示导入显著提速、还能省下六位数成本，证明市场确实愿意为“迁移减痛”付预算。
  sourceRefs:
  - 67
  - 68
- point: 公开讨论里已经出现大量 AI 采购工具和持续性的从业者内容，这说明需求正在被市场探索，而不只是停留在纸面假设。
  sourceRefs:
  - 4
  - 5
  - 31
openQuestions:
- 目标 AI 原生厂商每季度到底会跑多少次“电子表格到系统”的切换？这种需求有多波动？
- 客户会不会在实施周期足够早的时候，就开放邮箱和 SaaS 日志权限，让产品真正派上用场？
- 对买方来说，什么样的一致性门槛足以支持上线：结果完全一致、覆盖足够多例外，还是“可审计 + 有人工复核”就够？
- 系统集成商会成为可扩张渠道，还是会抵触任何压缩可计费梳理工作的工具？
