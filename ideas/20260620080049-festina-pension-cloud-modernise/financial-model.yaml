scenarios:
  downside:
    description: "Two lighthouse starts slip, production scope expands more slowly, and deployment work stays more custom even though the hiring plan is already in motion."
    y3RevenueK: 5751.2
    y3EbitdaK: -364.8
    cashLowPointK: 738.6
    keyAssumptionChanges:
      - "Only five paid account starts land by Y3, with the second Y2 add and the Y3 add delayed into later quarters."
      - "The monetization ramp lands at $55K / $70K / $100K / $145K monthly per active account after Y1 instead of the base $60K / $78K / $115K / $165K path."
      - "Gross margin runs about 2 points below base because mapping and reconciliation work stay services-heavy for longer."
  base:
    description: "Six paid account starts convert into roughly five active lighthouse administrators by Q4Y3, while blended account ARR climbs as more policy blocks and scheme-change workflows go live."
    y3RevenueK: 8035.7
    y3EbitdaK: 1288.9
    cashLowPointK: 1685.6
    keyAssumptionChanges:
      - "Paid account starts land in M5, M9, M12, M18, M24, and M31, ending with ~5 active administrators by Q4Y3."
      - "Monthly recognized revenue per active account ramps from $35K in pilot-heavy Y1 to $165K in H2Y3 as workflow and policy-block scope expands."
      - "Gross margin improves from 45-50% in Y1 to 70% by Q4Y3 as implementation templates and partner delivery reduce bespoke work."
  upside:
    description: "Partner referrals pull new logos forward, pricing expands a little faster, and the product reaches repeatable deployments before the full Y3 hiring plan is stressed."
    y3RevenueK: 9297.6
    y3EbitdaK: 2246.6
    cashLowPointK: 1953.9
    keyAssumptionChanges:
      - "Seven paid account starts land by Y3, with the second Y2 and Y3 additions pulled forward by about one quarter."
      - "Monthly recognized revenue per active account ramps to $180K in H2Y3 as a larger share of administrators add second workflows or policy blocks."
      - "Gross margin exits roughly 1 point above base because partners absorb more deployment work and the templates standardize faster."
