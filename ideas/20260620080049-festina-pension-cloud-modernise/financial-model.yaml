assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-06-20] model starts the first full month after the business-plan date."
  - id: A2
    name: "Opening cash / seed raise"
    value: "$4.0M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $4–6M + model cash trough] uses the low end of the stated seed range because the base case stays below the researched year-three SOM while preserving more than $1.6M at the Q4Y2 milestone low point."
  - id: A3
    name: "Starting active paying accounts (M1)"
    value: "0"
    unit: "count"
    source: "[BP milestones 0–12 months + BP experimentRoadmap] the company starts pre-revenue and must first convert design partners into paid pilots."
  - id: A4
    name: "Customer unit definition"
    value: "Active paying pension administrator account running at least one pilot or production workflow on the ledger"
    unit: "definition"
    source: "[BP businessModel.unitOfValue + BP gtm.pricing] revenue expands mainly through more policy blocks and workflows inside each administrator, so the model tracks paid accounts rather than seats."
  - id: A5
    name: "Paid pilot contract midpoint"
    value: "$300K"
    unit: "USD/account"
    source: "[BP investorMemo.firstCustomer.initialContract $200K-$400K] midpoint paid pilot for one policy block and one workflow."
  - id: A6
    name: "Initial production contract range"
    value: "$750K-$1.5M ARR before broader book expansion"
    unit: "USD/account/year"
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract] production starts in the stated range before multiple books or scheme-change modules expand scope."
  - id: A7
    name: "Blended recognized revenue per active paying account"
    value: "Y1 $420K annualized; H1Y2 $720K; H2Y2 $936K; H1Y3 $1.38M; H2Y3 $1.98M"
    unit: "USD/account/year"
    source: "[BP gtm.pricing + Research market.som $12.0M] keeps Y1 pilot-heavy, brings Y2 into the stated production range, and still leaves Q4Y3 ARR below the researched year-three SOM ceiling."
  - id: A8
    name: "Gross account-add schedule"
    value: "M5, M9, M12, M18, M24, and M31 paid starts; 6 total starts across 36 months"
    unit: "gross new paying accounts"
    source: "[BP milestones 0–12, 12–24, and 24–36 months + BP gtm.channels] produces about 5 active lighthouse administrators by Q4Y3 after churn, consistent with the plan’s 4-5-account ambition."
  - id: A9
    name: "Monthly active-account churn"
    value: "1.0%"
    unit: "pct/month"
    source: "[startup-finance heuristic for sticky enterprise workflow software + BP risks] allows for pilot failures and budget-driven scope loss while staying consistent with a regulated, high-switching-cost buyer."
  - id: A10
    name: "Gross margin ramp"
    value: "Y1 45-50%; Y2 55-62%; Y3 64-70%"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP experimentRoadmap implementation-hours reduction] early deployments carry more services and reconciliation cost, then approach the target as templates standardize."
  - id: A11
    name: "Founder / seller loaded compensation"
    value: "$180K"
    unit: "USD/FTE/year"
    source: "[BP team Founder seller + startup-finance heuristic] lean founder cash pay with payroll load."
  - id: A12
    name: "Engineering loaded compensation"
    value: "$220K"
    unit: "USD/FTE/year"
    source: "[BP team Founding eng + startup-finance heuristic] reflects senior integration and data-platform talent."
  - id: A13
    name: "Product / pension-domain loaded compensation"
    value: "$185K"
    unit: "USD/FTE/year"
    source: "[BP team Product and pension-domain lead + startup-finance heuristic] average across the initial domain lead and the later second product/domain hire."
  - id: A14
    name: "Solutions / implementation loaded compensation"
    value: "$170K"
    unit: "USD/FTE/year"
    source: "[BP team Solutions architect + startup-finance heuristic] covers customer onboarding and repeatable mapping playbooks without building a large services bench."
  - id: A15
    name: "Partnerships / sales loaded compensation"
    value: "$190K"
    unit: "USD/FTE/year"
    source: "[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] includes travel and variable compensation for channel-led enterprise selling."
  - id: A16
    name: "Security / QA loaded compensation"
    value: "$180K"
    unit: "USD/FTE/year"
    source: "[BP operations audit and release-governance burden + startup-finance heuristic] adds quality and security capacity before multi-account production scale."
  - id: A17
    name: "G&A / ops loaded compensation"
    value: "$130K"
    unit: "USD/FTE/year"
    source: "[BP operations + startup-finance heuristic] lean finance, compliance coordination, and customer-ops support."
  - id: A18
    name: "Hiring timeline"
    value: "M1 founder, eng1, product1; M3 sol1; M9 part1; M11 security1; M15 eng2; M18 ops; M21 sol2; M24 product2; M27 part2; M30 eng3; M31 sol3; M33 security2; M35 eng4"
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale] follows the plan’s engineering-first and deployment-repeatability-first sequencing, then layers partner and scale hires as lighthouse proof accumulates."
  - id: A19
    name: "Payroll allocation to P&L lines"
    value: "Founder 65% S&M / 35% G&A; solutions 45% S&M / 55% R&D; product 90% R&D / 10% G&A; security 80% R&D / 20% G&A; engineering 100% R&D; partnerships 100% S&M; ops 100% G&A"
    unit: "allocation"
    source: "[BP team role rationales + BP operations] maps payroll into the functional lines used in the P&L."
  - id: A20
    name: "Non-payroll spend ramp"
    value: "Monthly S&M $24K/$34K/$44K/$56K/$70K/$86K; R&D $16K/$22K/$28K/$32K/$40K/$48K; G&A $10K/$14K/$18K/$22K/$28K/$34K by successive 6-month blocks"
    unit: "USD/month"
    source: "[BP operations + BP gtm.channels + startup-finance heuristic] covers events, cloud, legal, security review, insurance, and partner enablement without assuming mass-market paid demand gen."
  - id: A21
    name: "Paid-pilot to production conversion in base case"
    value: "70%"
    unit: "pct of paid starts"
    source: "[BP gtm.funnelTargets paid pilot→production 50%+ + BP investorMemo.mustBeTrue] assumes the company outperforms the minimum once the first production reference is live, but still leaves one gross start short of stable production by Y3."
  - id: A22
    name: "CAC convention"
    value: "$620K per converted production account"
    unit: "USD/account"
    source: "[BP gtm.funnelTargets + model calc] Y2-Y3 sales and marketing spend of about $2.60M divided by 4.2 converted production-equivalent accounts (6 gross starts × 70% conversion)."
  - id: A23
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA"
    unit: "formula"
    source: "[startup-finance heuristic] debt service, taxes, and capex are assumed immaterial at seed scale."
  - id: A24
    name: "Next-round milestone for funding sizing"
    value: "Q4Y2 with 4-5 production administrators, 2 partner-sourced deployments, ~30% lower implementation hours, and one UK/Nordic reference"
    unit: "milestone"
    source: "[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary + model cash curve] this is the first point where the beachhead looks repeatable enough for a Series A process."
