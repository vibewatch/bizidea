modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionAdmins
      ProductionAdmins --> ExpandedPolicies
      ExpandedPolicies --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by roughly five active lighthouse administrators by Q4Y3 and a per-account ARR ramp toward about $2.0M as extra policy blocks and scheme-change workflows go live."
  - checkName: "Must go right"
    finding: "The two Y2 partner-sourced deployments need to convert into production quickly enough for the $115K-to-$165K monthly ARPU ramp to materialize without adding a large services bench."
  - checkName: "Model breaks if"
    finding: "If lighthouse starts slip and pricing lands near the ARPU downside case, cash low point compresses toward $0.7M before the company has next-round proof."
  - checkName: "Next-round proof"
    finding: "A Series A story is strongest once Q4Y2 shows 4-5 production administrators, partner-sourced wins, and implementation hours down about 30% versus the first pilots."
sanityChecks:
  ruleOf40: "Y3 growth 184% + EBITDA margin 16% = 200%"
  burnMultiple: "Y2 burn multiple 0.4x ($985K EBITDA burn on $2.390M net new revenue); Y3 is EBITDA positive."
  revenuePerFte: "$536K Y3 (benchmark $200–400K SaaS)"
  flags:
    - "Revenue per FTE is above typical SaaS benchmarks, so the model depends on very high ACV and partner-enabled delivery rather than a scaled direct implementation team."
    - "The base case still needs six paid account starts across three years; if one of the Y2 or Y3 lighthouse adds slips, the sales-cycle sensitivity takes more than $0.5M out of year-three revenue."
    - "Gross margin only reaches the 70% target if mapping templates and partner delivery absorb bespoke reconciliation work by H2Y3."
    - "The downside case stays cash-positive but falls below a $1M cushion, so management should raise before the Q4Y2 milestone drifts materially."
