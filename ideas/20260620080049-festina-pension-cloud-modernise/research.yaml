  marketMapDiagram:
    title: Pensions modernization market map
    mermaid: |-
      quadrantChart
        title Pension modernization market map
        x-axis Low replacement scope --> High replacement scope
        y-axis Low immediate compliance pressure --> High immediate compliance pressure
        quadrant-1 Suite-led modernization
