competitors:
  - name: Festina Finance
    stage: scale-up
    wedge: Modular cloud-native life and pension administration plus an advisor workbench for investment professionals.
    pricing: Custom quote / not public
    strength: Already referenced with large European pension books and visible UK expansion; sells a credible modular alternative to big-bang core replacement.
    weaknessVsUs: Still presents as a broader policy-administration platform, whereas the proposed startup can land with lower replacement scope around dashboards, reporting, and scheme-change control.
    sourceRefs:
      - 40
      - 41
  - name: Lumera
    stage: scale-up
    wedge: Life-and-pensions transformation platform combining admin technology, data migration, and expert services.
    pricing: Custom quote / not public
    strength: Proven ability to migrate large books and deepen UK presence through the Acuity acquisition.
    weaknessVsUs: Its centre of gravity is still a heavier transformation motion; the proposed startup can sell a read-first overlay that de-risks change before full migration.
    sourceRefs:
      - 43
      - 44
  - name: Keylane / Heywood
    stage: incumbent
    wedge: European pension and insurance core software plus UK pension administration, data, and member-engagement technology.
    pricing: Custom quote / not public
    strength: Strong UK/NL footprint with more than 180 schemes and over eight million members through the Heywood estate.
    weaknessVsUs: More oriented to broad administration and member platforms than to an auditable benefit-event abstraction layer beside legacy cores.
    sourceRefs:
      - 47
      - 48
      - 49
  - name: Sapiens CoreSuite for Life & Pensions
    stage: incumbent
    wedge: Cloud-first, low-code, pre-integrated life and pensions core suite.
    pricing: Custom quote / not public
    strength: Broad product depth and global installed-base credibility in insurance-core modernization.
    weaknessVsUs: The suite is optimized for broader core-modernization decisions, not for a narrow compliance-and-change overlay sold into a reluctant replacement programme.
    sourceRefs:
      - 50
      - 51
  - name: Bravura Sonata
    stage: incumbent
    wedge: Full-lifecycle administration platform for pensions, SIPPs, life, and adjacent investment products.
    pricing: Custom quote / not public
    strength: Handles complex, high-volume administration with workflow and integration depth across multiple product lines.
    weaknessVsUs: A richer admin footprint can imply longer deployment and more platform change than an audit-first shadow ledger focused on dashboards and controlled rule updates.
    sourceRefs:
      - 52
      - 53
