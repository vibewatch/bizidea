        - 13
        - 43
        - 47
        - 52
    competitiveRivalry:
      score: 4
      rationale: High. Full-suite incumbents, pension-tech platforms, and migration specialists all pursue the same modernization budget even if their scopes differ from the proposed overlay wedge.
      sourceRefs:
