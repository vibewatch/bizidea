  pestle:
    - factor: political
      impact: positive
      point: UK and EU policy are explicitly pushing dashboards and pension tracking systems, which legitimises external data-exposure projects at board level.
      sourceRefs:
        - 1
        - 9
    - factor: economic
      impact: positive
      point: Pension assets and member books are so large that a relatively small software overlay can be justified against already material administration budgets.
      sourceRefs:
        - 21
        - 22
        - 35
    - factor: social
      impact: positive
      point: Member expectations for visibility and pension consolidation increase the value of trustworthy data exposure and better self-service experiences.
      sourceRefs:
        - 1
        - 13
        - 14
    - factor: technological
      impact: positive
      point: Cloud-first PAS, large-scale migration tooling, and explicit mainframe-modernization paths make overlay modernization more practical than it was a few years ago.
      sourceRefs:
        - 39
        - 44
        - 51
        - 58
    - factor: legal
      impact: negative
      point: Matching, member-data, Dutch transition, and Solvency II disclosure obligations create real compliance and audit pressure that can slow delivery if the data model is weak.
      sourceRefs:
        - 5
        - 7
        - 8
        - 20
        - 28
  adoptionFrictionMatrix:
    - friction: Member-data quality and matching accuracy
      severity: high
      affectedBuyer: Trustees and operations leads
      mitigation: Start with read-only reconciliation, benchmark match rates, and ship a formal data-improvement plan before any write-back workflow.
      sourceRefs:
        - 5
        - 10
        - 11
        - 12
    - friction: Legacy-core extraction and release governance
      severity: high
      affectedBuyer: CIO / platform transformation lead
      mitigation: Ingest existing batch outputs first, avoid synchronous writes, and prove ledger accuracy before moving to deeper operational workflows.
      sourceRefs:
        - 39
        - 44
        - 58
    - friction: Procurement cycles and incumbent SI politics
      severity: medium
      affectedBuyer: COO / CIO
      mitigation: Land inside a mandated dashboard or Wtp milestone and position the product as a lower-risk coexistence layer rather than a replacement programme.
      sourceRefs:
        - 1
        - 3
        - 27
        - 43
    - friction: Fear of duplicating an incumbent PAS roadmap
      severity: medium
      affectedBuyer: Head of administration transformation
      mitigation: Prove faster time-to-value on one compliance or change workflow and integrate with the incumbent instead of displacing it on day one.
      sourceRefs:
        - 40
        - 47
        - 50
        - 52
market:
  tam:
    value: $360.0M
    rationale: 'Estimate 45M target member/policy units across the UK, Netherlands, and Nordics × an $8 annual overlay spend per active unit. The unit base is anchored by Nest’s 13.8M members, PGGM’s 5.8M participants, the 9.5M Dutch workers already moving under the Future Pensions Act, and additional very large books referenced by APG and Festina. Top-down cross-check: the result sits well below the Europe slice implied by fetched global life PAS market summaries.'
    isEstimate: true
    sourceRefs:
      - 29
      - 32
      - 33
      - 35
      - 41
      - 59
      - 60
      - 62
  sam:
    value: $144.0M
    rationale: 'Restrict the TAM to roughly 18M units in the most reachable near-term beachhead: UK schemes/providers already connecting to dashboards, Dutch administrators executing Wtp transitions, and selected Nordic books already in visible modernization programmes; 18M × $8 = $144M.'
    isEstimate: true
    sourceRefs:
      - 1
      - 13
      - 14
      - 27
      - 29
      - 32
      - 35
  som:
    value: $12.0M
    rationale: Year-3 reachable share assumes about 1.5M live units across 4-5 lighthouse accounts in the 500k+ policy segment; 1.5M × $8 = $12M.
    isEstimate: true
    sourceRefs:
      - 3
      - 13
      - 14
      - 29
      - 41
      - 44
