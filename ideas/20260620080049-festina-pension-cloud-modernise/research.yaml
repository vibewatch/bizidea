  fiveForces:
    supplierPower:
      score: 3
      rationale: Moderate. Access to legacy-core data, pension-domain implementers, and migration partners matters, but buyers can choose among multiple consulting and cloud-modernization toolchains rather than depend on a single supplier.
      sourceRefs:
        - 39
        - 44
        - 58
    buyerPower:
      score: 4
      rationale: High. The target market is concentrated in a small number of large administrators and providers running formal procurement around hard deadlines and existing partner relationships.
      sourceRefs:
        - 3
        - 12
        - 27
        - 29
    threatOfEntrants:
      score: 3
      rationale: Moderate. Generic cloud and event-driven tooling lowers the technical barrier, but pension-specific data models, matching logic, and regulatory workflows still create meaningful domain-entry friction.
      sourceRefs:
        - 5
        - 39
        - 51
        - 58
    threatOfSubstitutes:
      score: 5
      rationale: Very high. Buyers can stay with incumbent PAS roadmaps, dashboard ISPs, SI-led extraction projects, or internal spreadsheet and ETL workarounds.
      sourceRefs:
        - 4
