openQuestions:
  - Which legacy policy-admin cores dominate the 500,000-3,000,000 policy segment in the first ten target accounts, and how accessible are their batch exports or event feeds?
  - How much budget already sits with dashboard programmes versus broader administration transformation, and what percentage is locked up by ISPs or system integrators?
  - Which scheme-change workflows (fee changes, indexation, decumulation rules, CDC updates) generate the largest spreadsheet and weekend-release burden today?
  - Will incumbents such as Lumera, Keylane, Sapiens, or Bravura increasingly expose event-level APIs, or keep steering buyers toward broader suite adoption?
