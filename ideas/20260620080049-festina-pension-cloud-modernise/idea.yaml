problem: >-
  European pension and life funds still run large policy books on mainframe
  stacks that make scheme changes, member-data exposure, and regulator
  reporting painfully slow. Every new dashboard mandate, Solvency II reporting
  change, or fee-rule update turns into a brittle project across COBOL code,
  batch jobs, and spreadsheet reconciliation. Full core replacements can take
  years, so operators keep paying for delay even when they know the stack is
  the bottleneck.
targetUser:
  primary: >-
    Core-platform transformation leaders at European pension administrators and
    life insurers running legacy policy books
  secondary: >-
    Actuarial change teams and pension operations managers responsible for
    scheme updates, dashboard feeds, and regulator reporting
  buyer: >-
    COO, CIO, or Head of Policy Administration Transformation at a pension or
    life platform owner
startupThesis:
  nonObviousInsight: >-
    The urgent budget is not for a full pension-core rewrite; it is for an
    auditable benefit-event layer that can expose legacy policy logic to
    dashboards, reporting, and scheme changes now. Whoever becomes the trusted
    abstraction layer for benefit events can expand from compliance plumbing
    into the system of change for the whole policy book.
  beachhead: >-
    Nordic and Dutch pension administrators with 500,000 to 3 million
    closed-book life and retirement policies on IBM Z or AS/400-era cores that
    must expose member data to pension dashboards and handle frequent scheme or
    fee changes
  wedge: >-
    An event-sourced shadow ledger that maps legacy policy rules into
    dashboard-ready APIs, scheme-change simulators, and regulator feeds without
    replacing the incumbent policy admin core
  whyNowCatalyst: >-
    Pension dashboards and Solvency II data demands are forcing funds to
    externalize core data, while validated growth capital behind modular
    API-first vendors shows buyers now have budget for incremental
    modernization.
  ventureScalePath: >-
    Start with benefit-event APIs and regulated reporting for legacy books, then
    expand into product configuration, policy migration tooling, advisor/member
    workflows, and eventually a full operating layer across pension, annuity,
    and life administration.
solution: >-
  Build a vertical software layer that sits beside the legacy pension core and
  creates a canonical benefit-event ledger for policies, contributions, fees,
  and payouts. The first product ingests batch outputs and policy tables from
  the incumbent system, turns them into auditable APIs, and generates
  dashboard-ready member records plus regulator-ready extracts. A second module
  lets operations teams simulate scheme and fee changes before they touch the
  mainframe, reducing the risk of weekend releases and actuarial spreadsheet
  workarounds. Over time, the ledger becomes the control plane for policy
  change management and book migration, giving customers a path away from the
  core without a big-bang replacement.
goToMarketSeed:
  firstCustomer: >-
    A Danish or Dutch pension administrator with 500,000-plus legacy policies,
    an active pension dashboard integration program, and a public transformation
    mandate but no appetite for a multiyear full-core replacement
  buyingTrigger: >-
    A pension dashboard deadline, Solvency II reporting remediation, or a
    planned scheme and fee-rule overhaul that forces the fund to expose and
    validate policy data outside the mainframe
  currentAlternative: >-
    Multi-year system-integrator-led core replacement projects plus point ETL,
    actuarial spreadsheets, and manual reconciliation around the existing
    policy admin stack
  switchingReason: >-
    The shadow-ledger wedge delivers a visible regulatory and operations outcome
    in months, preserves the incumbent core during rollout, and creates a safer
    path to modernization than a single high-risk replacement program.
  pricingHypothesis: >-
    Annual platform fee priced by active policies on the ledger, plus a one-time
    implementation fee for each dashboard or reporting workflow brought live
