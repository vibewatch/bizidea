topRisks:
  - name: Long enterprise sales cycles
    description: Pension and life-platform deals can stall behind board approvals, procurement, and incumbent SI politics.
    mitigation: Start with a single mandated workflow like dashboard feeds, price for a fast pilot, and sell through implementation partners already inside the account.
  - name: Integration complexity
    description: Legacy policy books often contain fragmented product rules and poor documentation that can delay time to value.
    mitigation: Build the product around repeatable ingestion patterns for common pension cores and begin with read-heavy use cases before introducing write-back workflows.
  - name: Incumbent platform retaliation
    description: Core vendors and system integrators may bundle adjacent modules or warn customers against a shadow-ledger approach.
    mitigation: Position as a non-rip-and-replace compliance and change layer, prove coexistence with incumbent systems, and capture audit data the incumbent stack does not model well.
