jobsToBeDone:
  - job: >-
      When a pension dashboard deadline lands, help the transformation lead
      expose trusted member and policy data from a mainframe core so they can
      comply without starting a full replacement.
    currentAlternative: >-
      ETL projects, custom batch exports, and manual reconciliation across the
      incumbent policy admin system
    successMetric: Dashboard data feed launched on time with fewer manual reconciliations per reporting cycle
  - job: >-
      When scheme or fee rules change, help pension operations teams simulate
      and validate policy impacts before release so they can avoid risky
      weekend changes and post-release corrections.
    currentAlternative: >-
      Spreadsheet-based actuarial testing and bespoke changes inside COBOL or
      vendor-maintained core systems
    successMetric: Days to release a scheme change and number of post-release policy corrections
