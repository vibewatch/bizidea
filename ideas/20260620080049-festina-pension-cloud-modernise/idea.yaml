differentiator: >-
  Most vendors in this category sell either a full policy administration
  replacement or generic data-integration services. This company would start at
  the highest-pain seam: translating legacy pension policy logic into a trusted
  benefit-event model that powers dashboard, reporting, and scheme-change
  workflows. That creates a proprietary rules corpus and customer dependency on
  the event ledger, which is harder to displace than a pure API gateway or
  consultancy.
