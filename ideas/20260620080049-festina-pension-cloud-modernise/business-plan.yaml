slug: benefit-event-api-layer
date: '2026-06-20'
executiveSummary: >-
  Benefit Event API Layer should start as a read-only shadow ledger for Dutch
  pension administrators running 500,000-3,000,000 legacy retirement policies
  through Future Pensions Act transition and dashboard-data exposure programs.
  The immediate pain is not replacing the core; it is producing auditable
  member, policy, and benefit-event data fast enough for dashboard, reporting,
  and rule-change deadlines without adding new spreadsheet reconciliation. The
  first product should ingest batch outputs and policy tables from one legacy
  book, map them into a canonical benefit-event model, and generate
  dashboard-ready extracts, reconciliation logs, and scheme-change simulations
  before any write-back workflow is attempted. The economic buyer is the COO,
  CIO, or head of policy-administration transformation already accountable for a
  named transition milestone, while actuarial and operations teams decide
  whether the output is trusted enough to use in production. Pricing should
  follow active policies live on the ledger plus one-time workflow activation
  fees, so the company can land through a paid pilot on one policy block and
  expand as more books and change workflows move onto the platform. The hard
  strategic choice is to avoid full PAS replacement, advisor tooling, and
  small-scheme selling until the company proves that a narrow overlay can
  launch one live compliance workflow in months. Research supports the timing
  through UK dashboard deadlines, Dutch transition work, and continued
  modernization funding, but it also shows high substitution risk from
  incumbents, ISPs, SIs, and internal ETL patches. Public competitor pricing
  and first-account implementation effort remain open questions, so the first
  12-18 months should be run as a proof-of-deployment and proof-of-budget
  exercise rather than a scale-at-all-costs expansion.
problem:
  - Large European pension and life administrators must expose trusted member, value, and policy data for dashboards, reporting, and transition programs, but legacy mainframes still encode benefit logic in COBOL, batch jobs, and undocumented tables.
  - Every fee, scheme, or disclosure change becomes a risky project across ETL patches, spreadsheets, and manual reconciliations, while full PAS replacement is too slow and politically heavy for near-term deadlines.
solution:
  - Build an audit-first shadow ledger that ingests legacy batch outputs and policy tables, translates them into canonical benefit events, and serves dashboard-ready APIs, regulatory extracts, and exception queues without replacing the core.
  - Add a controlled scheme-change simulator on top of the same ledger so operations and actuarial teams can test fee, indexation, or benefit-rule changes before they touch the mainframe.
whyWeWin:
  - The wedge lands at the highest-pain seam, trusted benefit-event translation for mandated external data and rule-change workflows, rather than competing head-on as a full policy-administration suite.
  - If the company captures legacy-rule mappings, reconciliation outcomes, and simulation history across multiple books, it builds a proprietary audit and migration corpus that ISPs, generic integrators, and internal ETL teams do not naturally own.
strategicChoices:
  beachhead: Dutch pension administrators with 500,000-3,000,000 legacy retirement policies on IBM Z or AS/400-era cores that are already funded for Future Pensions Act transition and dashboard or member-data exposure work.
  wedgeRationale: The slice combines active transition budgets, repeated rule-change work, and low appetite for a big-bang core replacement, so a read-only benefit-event overlay can prove value faster than selling a full PAS alternative. The UK is more urgent on dashboards, but a late-cycle buyer there is more likely to default to its existing ISP or administrator, which makes Dutch transition programs a better first wedge for a new vendor.
  sequencingRationale: Start with one read-only extract and reconciliation workflow on one policy block because that minimizes security and release-governance friction, then add scheme-change simulation once the ledger is trusted, then expand by book, workflow, and partner channel. Hiring follows the same order, with engineering and pension-domain product first and solutions and partner roles only after the first production deployment proves repeatability.
  notYet:
    - Full policy-administration replacement
    - Open-banking advisor or member-experience modules
    - Small schemes without active transition budgets
    - Write-back automation into the core before read-only accuracy is proven
market:
  tam: $360.0M estimated TAM based on roughly 45M UK, Dutch, and Nordic member or policy units at about $8 annual overlay spend per active unit.
  sam: $144.0M estimated SAM centered on roughly 18M units in Dutch, UK, and selected Nordic accounts with active dashboard or transition programs.
  som: $12.0M estimated year-three SOM based on about 1.5M live units across 4-5 lighthouse accounts at about $8 per active unit-year.
  segments:
    - Dutch pension administrators with large legacy retirement books and active transition programs
    - Nordic life and pension platform owners plus UK providers already funding dashboard or reporting modernization
  buyingProcess: >-
    The likely champion is the transformation lead or operations sponsor
    responsible for a named transition, dashboard, or reporting milestone, while
    economic approval sits with the COO, CIO, or head of administration
    transformation. A credible first sale is a paid pilot on one policy block or
    workflow, validated by actuarial, operations, security, and the incumbent SI
    before expanding to the full book.
product:
  mvp: >-
    MVP is a read-only shadow ledger for one legacy policy book. It ingests
    copied batch outputs and policy tables, produces dashboard or regulatory
    extracts plus reconciliation and audit logs, and supports human-reviewed
    exception handling before any write-back or core orchestration.
  sixMonth: Land 2-3 design partners, ship repeatable batch ingest and canonical benefit-event mapping for one core pattern, and prove one live extract or reporting workflow with materially fewer manual reconciliations.
  twelveMonth: Add scheme-change simulation, exception workflows, and templates for the most common legacy extract patterns, then convert successful pilots into 3 production deployments and the first partner-led opportunity.
  twentyFourMonth: Become the control layer for legacy pension-book change by covering multiple books and workflows per customer, adding migration and controlled-write orchestration selectively, and expanding from Dutch lighthouse accounts into UK and Nordic programs.
  keyBets:
    - Existing batch outputs and policy tables are sufficient to create trusted read-only value before deep integrations.
    - Buyers will fund a separate overlay if it lands inside an already-budgeted transition or compliance program.
    - One trusted ledger can expand from dashboards and reporting into higher-ACV scheme-change and migration workflows.
    - Migration consultancies, administrators, and ISPs will eventually distribute the product instead of blocking it.
gtm:
  wedge: Sell a paid pilot around one named transition milestone that maps a single legacy policy block into audit-ready dashboard or reporting outputs and one simulated rule-change workflow, framed around fewer manual reconciliations and safer releases rather than generic modernization software.
  channels:
    - Founder-led direct sales into Dutch pension administrators and closed-book life platform owners with active transition or dashboard programs
    - Co-sell and implementation partnerships with pension migration consultancies and core-system integrators already running those programs
    - Referral or integration partnerships with dashboard connection providers, ISPs, and adjacent member-data vendors
    - Targeted industry events and executive roundtables focused on pension transition and administration modernization
  funnelTargets: "Lead→qualified discovery 20-30%, qualified discovery→paid pilot 25-35%, paid pilot→production 50%+, production→second workflow or policy-book expansion 60%+ within 12 months."
  pricing: Annual platform fee priced by active policies live on the ledger plus one-time implementation and workflow-activation fees; this fits how administrators budget transition work, supports a $200K-$400K paid first deployment on one block or workflow, and can expand toward roughly $750K-$1.5M annual production contracts as more books and change workflows move into scope.
businessModel:
  revenueStreams:
    - Annual software subscription by active policies live on the ledger
    - One-time implementation and workflow activation fees for each dashboard, reporting, or scheme-change module
    - Expansion modules for simulation, migration tooling, and audit analytics
  unitOfValue: Active policies and change workflows governed through the ledger.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one policy block to the full legacy book inside the same administrator
    - Add scheme-change simulation and migration-control modules once data exposure is live
    - Use partner-led delivery to add similar books across other administrators without proportional services growth
strategyMap:
  northStarMetric: Active policies covered by production benefit-event workflows that no longer rely on manual reconciliation outside the platform.
  inputMetrics:
    - Days from data handoff to first trusted benefit-event ledger
    - Manual reconciliation hours removed per reporting or dashboard cycle
    - Paid pilot to production conversion rate
    - Percent of production customers adding a second workflow or policy block within 12 months
    - Accuracy and exception-resolution rate on generated extracts and rule simulations
  moatsToBuild:
    - Customer-specific corpus of mapped legacy policy rules, exceptions, and audit trails
    - Reusable extract, reconciliation, and simulation templates for common pension-core patterns
    - Partner and customer trust around read-only deployment, controlled change, and regulator-ready evidence
  killCriteria:
    - Fewer than 2 paid design partners signed within 9 months of focused beachhead selling
    - First 3 pilots fail to launch one production extract or reporting workflow within 120 days from clean data handoff
    - Pilot-to-production conversion remains below 40% across the first 5 paid pilots
    - Expansion to a second workflow or policy block occurs in fewer than 2 of the first 5 production customers
  mermaid: |
    flowchart LR
      Wedge[Dutch transition data wedge] --> MVP[Read-only shadow ledger MVP]
      MVP --> Proof[Live extracts with fewer reconciliations]
      Proof --> Expansion[Rule-change and book expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: Strong regulatory timing and a credible non-replacement wedge justify deeper diligence, but conviction depends on proving low-services deployments and a standalone budget line.
    whyBelieve: Large administrators already spend real money on dashboard, transition, and modernization work, and incumbents are still biased toward broader transformations rather than a narrow audit-first overlay.
    whyDoubt: If ISPs, PAS vendors, or incumbent SIs can satisfy the required data-exposure and rule-change workflows without a separate product, the startup may never earn durable ACV.
    nextDiligence: Confirm two paid pilots can stand up from existing extracts, launch one live production workflow in under 120 days, and create a credible path to $750K+ annual production scope.
  firstCustomer:
    title: Dutch pension administration transformation team
    profile: A large Dutch administrator or closed-book life platform owner with 500,000+ legacy retirement policies, an active Wtp transition program, and no appetite for a multiyear core replacement.
    trigger: A named Wtp rule transition, dashboard data-exposure milestone, or reporting remediation forces the team to externalize and validate benefit logic outside the mainframe.
    buyer: COO, CIO, or Head of Policy Administration Transformation
    initialContract: $200K-$400K paid pilot for one policy block and one workflow, converting to roughly $750K-$1.5M annual platform subscription plus implementation as additional books and scheme-change modules move live.
  mustBeTrue:
    - At least 5 target administrators confirm that dashboard or transition data exposure is a budget-worthy pain distinct from full PAS replacement.
    - The first 3 pilots can ingest copied batch outputs and policy tables fast enough to produce trusted extracts within 120 days.
    - At least half of paid pilots convert to production without requiring write-back control of the incumbent core.
    - The same ledger can sell a second workflow such as scheme-change simulation or additional reporting within 12 months of the first production go-live.
    - Migration consultancies, ISPs, or administrators generate at least 2 qualified partner-sourced pilots after the first lighthouse deployment.
  diligenceQuestions:
    - Which budget owner actually signs first, the transition program sponsor, the CIO, or the external administrator running the book?
    - What minimum data package is required to deliver a trusted ledger for the most common legacy cores in the first 10 target accounts?
    - How much of the dashboard or transition budget is already locked up by ISPs, SIs, or incumbent PAS vendors?
    - Which workflow closes first in practice, dashboard extracts, Solvency II reporting, or scheme-change simulation?
    - How much implementation work is needed before gross margins can approach 70%?
operatingAssumptions:
  - assumption: Transition-program budgets can fund a separate overlay rather than only SI or ISP services.
    basis: research.yaml
    validationTest: Close at least 5 qualified opportunities and verify that 3 or more have a standalone software budget owner tied to a named milestone.
    decisionImpact: If false, the company should reposition as a partner-embedded module or co-delivered service instead of a standalone platform sale.
  - assumption: Copied batch outputs and policy tables are enough for the first-value deployment.
    basis: idea.yaml
    validationTest: In the first 3 design-partner deployments, deliver a trusted production-ready extract or reconciliation workflow within 120 days using read-only data only.
    decisionImpact: If false, the company must narrow to cleaner cores, raise implementation pricing, and delay broad beachhead expansion.
  - assumption: Policy-based pricing plus workflow fees fits buyer procurement better than seat-based pricing.
    basis: idea.yaml
    validationTest: Test policy-based and seat-based proposals in at least 4 live deals and compare win rate, sales-cycle length, and annualized contract value.
    decisionImpact: If false, TAM, expansion logic, and revenue predictability compress and the packaging must be redesigned.
  - assumption: Migration consultancies and dashboard partners will co-sell or at least not block the product.
    basis: research.yaml
    validationTest: Secure 2 partner-sourced pilot opportunities and 1 co-delivery agreement within 9 months of the first lighthouse account.
    decisionImpact: If false, direct-sales burden stays high, procurement slows, and the team should delay channel-heavy hiring.
  - assumption: Scheme-change simulation materially expands ACV after the initial data-exposure wedge.
    basis: operator judgment
    validationTest: Within the first 3 production customers, get at least 2 signed roadmap commitments or paid expansions for a second workflow.
    decisionImpact: If false, the company remains a narrower compliance overlay with lower venture-scale potential and should cap hiring against that smaller scope.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Interview 15 Dutch and Nordic transformation leads, operations sponsors, and actuarial change managers.
    hypothesis: Wtp and dashboard programs have named owners, KPI definitions, and budget for audit-ready data exposure.
    successMetric: 10 interviews confirm a buyer, a trigger, and a measurable pilot KPI.
    owner: Founder CEO
  - horizon: "0–90 days"
    experiment: Collect anonymized batch layouts and policy tables from 3 target accounts and map one prototype ledger.
    hypothesis: Common extract patterns are repeatable enough to productize read-only ingest.
    successMetric: 2 datasets produce a trusted canonical model and exception list within 30 days.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Launch 2 paid pilots on one policy block each for dashboard or reporting output.
    hypothesis: A narrow pilot can go live in under 120 days and cut manual reconciliation by at least 50%.
    successMetric: 2 paid pilots launch and 1 production workflow meets the reconciliation target.
    owner: Founder CEO
  - horizon: "90–180 days"
    experiment: Run one historical scheme-change simulation using a customer's fee or indexation change.
    hypothesis: The same ledger can support a higher-value second workflow without deep core write-back.
    successMetric: Operations or actuarial reviewers accept 80%+ of the simulated outputs and one customer commits to a paid second-module scope.
    owner: Product lead
  - horizon: "6–12 months"
    experiment: Pilot partner delivery with 1 ISP and 2 pension migration consultancies.
    hypothesis: Partner-led access shortens procurement and reduces political resistance.
    successMetric: 3 partner evaluations completed and 2 qualified opportunities are sourced through partners.
    owner: Partnerships lead
  - horizon: "12–18 months"
    experiment: Standardize the top 2 core-pattern ingest templates and exception playbooks.
    hypothesis: Deployment effort can fall 30% by the fifth implementation.
    successMetric: Median implementation hours per account fall by at least 30% while production error rates stay flat or improve.
    owner: Solutions architect
operations:
  - Baseline each deployment on extract-cycle time, match rate, reconciliation hours, and scheme-change release effort before rollout.
  - Keep early deployments read-only with full audit logs, exception queues, and customer approval gates for every extract or simulation output.
  - Maintain reusable mapping templates for common batch layouts, dashboard feeds, and reporting outputs to keep implementations software-like.
  - Run joint weekly governance with the customer, incumbent SI, and actuarial or operations team to document rule interpretations, exceptions, and release blockers.
  - Qualify accounts for minimum data availability and partner posture before committing to delivery dates.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the canonical benefit-event model, ingest tooling, and audit-first product architecture.
  - role: Product and pension-domain lead
    startTiming: Month 0
    rationale: Translates Wtp, dashboard, and scheme-change workflows into deployable product requirements and pilot KPIs.
  - role: Founder seller
    startTiming: Month 0
    rationale: Owns beachhead discovery, closes design partners, and turns lighthouse outcomes into repeatable budget conversations.
  - role: Solutions architect
    startTiming: Month 3
    rationale: Standardizes data mapping, security review, and partner-friendly deployment playbooks so pilots do not become bespoke consulting.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Converts early case studies into SI, ISP, and administrator referral channels once the first production deployment proves coexistence.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 2-3 design partners in Dutch pension transition programs and launch 2 paid pilots.
      - Put at least 1 dashboard, reporting, or remediation workflow into production with a documented reduction in manual reconciliation.
      - Prove one scheme-change simulation use case on live customer data and publish a lighthouse case study.
      - Ship repeatable ingest and audit templates for the first common legacy core pattern.
  - horizon: "12–24 months"
    items:
      - Convert the first pilots into 3-5 production customers and secure at least 2 partner-sourced deployments.
      - Add scheme-change simulation, exception management, and the second core-pattern template as standard modules.
      - Reduce implementation hours per new account by at least 30% versus the first two pilots.
      - Expand from Dutch lighthouse accounts into at least 1 UK or Nordic program.
  - horizon: "24–36 months"
    items:
      - Reach roughly 1.5M live policies across 4-5 lighthouse accounts, consistent with the researched year-three SOM.
      - Have most production customers running more than one workflow or policy block through the ledger.
      - Use the accumulated rules corpus to launch migration-control or controlled-write capabilities for selected accounts without becoming a full PAS replacement.
risks:
  - risk: Buyers treat dashboard and transition budget as SI or ISP spend, not standalone software.
    likelihood: Medium
    impact: High
    mitigation: Sell into named milestones with a paid pilot and a partner-coexistence story, and require an executive sponsor and success KPI before scoping.
  - risk: Legacy data quality and rule documentation make early deployments too services-heavy.
    likelihood: High
    impact: High
    mitigation: Start with read-only batch outputs, qualify data readiness, and invest early in exception handling and repeatable templates.
  - risk: Incumbent PAS vendors or administrators bundle adjacent modules and block access.
    likelihood: Medium
    impact: High
    mitigation: Position the product as a non-replacement control layer, prove faster time-to-value on one workflow, and partner where incumbents already own transformation scope.
  - risk: The scheme-change module does not expand beyond the initial compliance workflow.
    likelihood: Medium
    impact: Medium
    mitigation: Test second-workflow demand inside every pilot and keep cost structure aligned to a narrower data-exposure business until expansion proves out.
  - risk: Incorrect matching or extraction outputs create compliance and reputational risk.
    likelihood: Medium
    impact: High
    mitigation: Keep human approval gates, audit trails, and reconciliation checks in every release, and avoid autonomous write-back.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$4–6M"
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of runway to build the read-only shadow ledger and simulation modules, hire the pension-domain, solutions, and partner-enablement team, complete 2-3 paid pilots, and convert the first lighthouse administrators into repeatable production and partner-led deployments.
