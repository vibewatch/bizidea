competitors:
  - name: Festina Finance
    stage: scale-up
    wedge: "模块化云原生人寿与养老金管理加面向投资专业人士的顾问工作台。"
    pricing: Custom quote / not public
    strength: "已与欧洲大型养老金账本建立引用关系并展示可见的英国扩张；销售可信的模块化替代方案以取代大爆炸式核心替换。"
    weaknessVsUs: "仍以更宽泛的保单管理平台形象出现，而拟议初创公司可以仅围绕仪表盘、报告和方案变更控制以更小替换范围切入。"
