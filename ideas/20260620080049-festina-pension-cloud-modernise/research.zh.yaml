market:
  tam:
    value: $360.0M
    rationale: "估算：英国、荷兰和北欧目标成员/保单单位约 4500 万，按每有效单位年度叠加层支出 8 美元计算。单位基数以 Nest 的 1380 万成员、PGGM 的 580 万参与者、荷兰《未来养老金法》下已完成转型的 950 万工人以及 APG 和 Festina 提及的其他大型账本为锚。自上而下交叉验证：结果远低于已获取的全球人寿 PAS 市场摘要所隐含的欧洲份额。"
    isEstimate: true
    sourceRefs:
