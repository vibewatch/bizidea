    pricing: Custom quote / not public
    strength: "已证明迁移大型账本的能力，并通过收购 Acuity 深化英国布局。"
    weaknessVsUs: "重心仍在更重的转型动作；拟议初创公司可以先销售只读叠加层，在全面迁移前降低变更风险。"
    sourceRefs:
