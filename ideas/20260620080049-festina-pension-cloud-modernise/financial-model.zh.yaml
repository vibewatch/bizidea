scenarios:
  downside:
    description: "两个标杆客户启动推迟，生产范围扩展更慢，即使招聘计划已在推进，部署工作仍更加定制化。"
    y3RevenueK: 5751.2
    y3EbitdaK: -364.8
    cashLowPointK: 738.6
    keyAssumptionChanges:
      - "第 3 年前仅有 5 个付费账户启动，第 2 年第二次新增和第 3 年新增推迟至更晚季度。"
      - "第 1 年后每个有效账户的月度变现爬坡落在 $55K / $70K / $100K / $145K，低于基础情景的 $60K / $78K / $115K / $165K。"
      - "毛利率比基础情景低约 2 个百分点，因为映射和对账工作在更长时间内维持服务化。"
  base:
    description: "六个付费账户启动转化为第 3 年第 4 季度约五家有效标杆管理机构，混合账户年度合同价值随更多保单块和方案变更工作流上线而攀升。"
    y3RevenueK: 8035.7
    y3EbitdaK: 1288.9
    cashLowPointK: 1685.6
    keyAssumptionChanges:
      - "付费账户启动分别在 M5、M9、M12、M18、M24 和 M31，第 3 年第 4 季度结束时约有 5 家有效管理机构。"
      - "每有效账户的月度确认收入从试点为主的第 1 年 3.5 万美元，爬升至第 2 年下半年 16.5 万美元，工作流和保单块范围随之扩展。"
      - "毛利率从第 1 年的 45–50% 提升至第 3 年第 4 季度的 70%，实施模板和合作伙伴交付减少定制工作。"
  upside:
    description: "合作伙伴推荐提前带来新客户，定价扩展速度稍快，产品在全部第 3 年招聘计划压力到来前实现可复制部署。"
    y3RevenueK: 9297.6
    y3EbitdaK: 2246.6
    cashLowPointK: 1953.9
    keyAssumptionChanges:
      - "第 3 年前完成七个付费账户启动，第 2 年第二次和第 3 年新增提前约一个季度。"
      - "每有效账户月度确认收入在第 2 年下半年爬升至 18 万美元，因为更多管理机构增加了第二工作流或保单块。"
      - "毛利率收官比基础情景高约 1 个百分点，合作伙伴承接了更多部署工作，模板标准化速度更快。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "第 3 年下半年每有效账户月度收入 $150K"
    baseCase: "第 3 年下半年每有效账户月度收入 $165K"
    upsideCase: "第 3 年下半年每有效账户月度收入 $175K"
    y3RevenueImpactK: -718.6
    cashImpactK: -560.5
  - variable: "流失率"
    downsideCase: "月度有效账户流失率 1.5%"
    baseCase: "月度有效账户流失率 1.0%"
    upsideCase: "月度有效账户流失率 0.7%"
    y3RevenueImpactK: -585.7
    cashImpactK: -470.3
  - variable: "销售周期"
    downsideCase: "第 1/2 年一次新增和第 3 年新增各推迟约一个季度"
    baseCase: "新增分别在 M5、M9、M12、M18、M24 和 M31 落地"
    upsideCase: "合作伙伴主导的新增提前至 M8、M17、M22 和 M29"
    y3RevenueImpactK: -575.2
    cashImpactK: -586.7
  - variable: "毛利率"
    downsideCase: "从第 2 年起毛利率轨道比基础情景低 2 个百分点"
    baseCase: "毛利率从 45% 爬升至第 3 年第 4 季度的 70%"
    upsideCase: "从第 2 年起毛利率比基础情景高 1 个百分点"
    y3RevenueImpactK: 0.0
    cashImpactK: -226.3
  - variable: "CAC"
    downsideCase: "GTM 非薪酬支出增加 20%，同等账户启动数"
    baseCase: "每个转化生产账户 CAC $620K"
    upsideCase: "通过合作伙伴杠杆降低 GTM 非薪酬支出 10%"
    y3RevenueImpactK: 0.0
    cashImpactK: -751.2
  - variable: "招聘节奏"
    downsideCase: "第 2 年末和第 3 年雇员提前一个季度入职"
    baseCase: "第二位产品、第二位销售、eng3、sol3、security2 和 eng4 按计划时间入职"
    upsideCase: "上述雇员各推迟一个季度，不造成收入损失"
    y3RevenueImpactK: 0.0
    cashImpactK: -290.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      线索 --> 付费试点
      付费试点 --> 生产管理机构
      生产管理机构 --> 扩展保单
      扩展保单 --> 营收
      营收 --> 毛利润
      毛利润 --> 现金
modelSanity:
  - checkName: "收入引擎"
    finding: "基础情景收入由第 3 年第 4 季度约五家有效标杆管理机构驱动，随额外保单块和方案变更工作流上线，每账户年度合同价值爬升至约 200 万美元。"
  - checkName: "必须成立的前提"
    finding: "第 2 年两个合作伙伴来源部署必须足够快地转化为生产，才能使 11.5 万至 16.5 万美元的月度 ARPU 爬坡实现，同时不新增大型服务团队。"
  - checkName: "模型崩溃条件"
    finding: "若标杆客户启动推迟，且定价落在 ARPU 下行情景，现金低点将在公司获得下轮融资证明前压缩至约 70 万美元。"
  - checkName: "下轮融资证明"
    finding: "A 轮故事在第 2 年第 4 季度呈现 4–5 家生产管理机构、合作伙伴赢单，且实施工时比前两个试点下降约 30% 时最有说服力。"
sanityChecks:
  ruleOf40: "第 3 年增长率 184% + EBITDA 利润率 16% = 200%"
  burnMultiple: "第 2 年消耗倍数 0.4x（EBITDA 消耗 98.5 万美元对应 239 万美元净新增收入）；第 3 年 EBITDA 转正。"
  revenuePerFte: "第 3 年每 FTE 收入 $536K（SaaS 基准 $200–400K）"
  flags:
    - "每 FTE 收入高于典型 SaaS 基准，因此模型依赖极高的 ACV 和合作伙伴赋能交付，而非规模化直接实施团队。"
    - "基础情景仍需三年内完成六个付费账户启动；若第 2 年或第 3 年任何一个标杆新增推迟，销售周期敏感性将从第三年收入中抹去逾 50 万美元。"
    - "毛利率仅在映射模板和合作伙伴交付在第 2 年下半年前吸收定制对账工作的情况下，才能达到 70% 目标。"
    - "下行情景维持现金正数，但跌破 100 万美元缓冲，管理层应在第 2 年第 4 季度里程碑明显偏移前启动融资。"
