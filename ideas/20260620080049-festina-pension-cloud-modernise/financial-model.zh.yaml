slug: "benefit-event-api-layer"
date: "2026-06-20"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: "YYYY-MM"
    source: "[BP date 2026-06-20] 模型从商业计划日期后的第一个完整月份开始。"
  - id: A2
    name: "期初现金 / 种子轮融资"
    value: "$4.0M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $4–6M + model cash trough] 使用种子融资区间下限，因为基础情景在低于研究中的第三年 SOM 上限的同时，仍在第 2 年第 4 季度里程碑低点保留逾 160 万美元。"
  - id: A3
    name: "起始有效付费客户数（M1）"
    value: "0"
    unit: "个"
    source: "[BP milestones 0–12 months + BP experimentRoadmap] 公司从零收入起步，必须先将共创客户转化为付费试点。"
  - id: A4
    name: "客户单元定义"
    value: "在账本上运行至少一个试点或生产工作流的有效付费养老金管理机构账户"
    unit: "定义"
    source: "[BP businessModel.unitOfValue + BP gtm.pricing] 收入主要通过每个管理机构内更多保单块和工作流扩展，因此模型跟踪付费账户而非席位。"
  - id: A5
    name: "付费试点合同中点值"
    value: "$300K"
    unit: "USD/account"
    source: "[BP investorMemo.firstCustomer.initialContract $200K-$400K] 单保单块、单工作流付费试点的中点值。"
  - id: A6
    name: "初始生产合同区间"
    value: "$750K-$1.5M ARR before broader book expansion"
    unit: "USD/account/year"
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract] 多账本或方案变更模块扩展前，生产合同从上述区间起步。"
  - id: A7
    name: "每有效付费账户的混合确认收入"
    value: "Y1 $420K annualized; H1Y2 $720K; H2Y2 $936K; H1Y3 $1.38M; H2Y3 $1.98M"
    unit: "USD/account/year"
    source: "[BP gtm.pricing + Research market.som $12.0M] 第 1 年试点为主，第 2 年进入上述生产区间，第 4 季度第 3 年末 ARR 仍低于研究中的第三年 SOM 上限。"
  - id: A8
    name: "总付费账户新增时间表"
    value: "M5, M9, M12, M18, M24, and M31 paid starts; 6 total starts across 36 months"
    unit: "gross new paying accounts"
    source: "[BP milestones 0–12, 12–24, and 24–36 months + BP gtm.channels] 经流失后，第 3 年第 4 季度约有 5 家有效标杆管理机构，与计划 4–5 家目标一致。"
  - id: A9
    name: "月度有效账户流失率"
    value: "1.0%"
    unit: "pct/month"
    source: "[startup-finance heuristic for sticky enterprise workflow software + BP risks] 允许试点失败和预算驱动的范围损失，同时与受监管、转换成本高的买家保持一致。"
  - id: A10
    name: "毛利率爬坡"
    value: "Y1 45-50%; Y2 55-62%; Y3 64-70%"
    unit: "毛利率"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP experimentRoadmap implementation-hours reduction] 早期部署服务和对账成本较高，随模板标准化逐步接近目标。"
  - id: A11
    name: "创始人 / 销售到手薪酬（含附加成本）"
    value: "$180K"
    unit: "USD/FTE/year"
    source: "[BP team Founder seller + startup-finance heuristic] 创始人现金薪酬偏低，含薪酬附加成本。"
  - id: A12
    name: "工程师到手薪酬（含附加成本）"
    value: "$220K"
    unit: "USD/FTE/year"
    source: "[BP team Founding eng + startup-finance heuristic] 反映高级集成和数据平台人才的市场水平。"
  - id: A13
    name: "产品 / 养老金领域到手薪酬（含附加成本）"
    value: "$185K"
    unit: "USD/FTE/year"
    source: "[BP team Product and pension-domain lead + startup-finance heuristic] 初始领域负责人与后续第二位产品 / 领域雇员的平均值。"
  - id: A14
    name: "解决方案 / 实施到手薪酬（含附加成本）"
    value: "$170K"
    unit: "USD/FTE/year"
    source: "[BP team Solutions architect + startup-finance heuristic] 覆盖客户入职和可复用映射操作手册，不建立大型服务团队。"
  - id: A15
    name: "合作关系 / 销售到手薪酬（含附加成本）"
    value: "$190K"
    unit: "USD/FTE/year"
    source: "[BP team Partnerships lead + BP gtm.channels + startup-finance heuristic] 含差旅和渠道主导企业销售的浮动薪酬。"
  - id: A16
    name: "安全 / 质量保障到手薪酬（含附加成本）"
    value: "$180K"
    unit: "USD/FTE/year"
    source: "[BP operations audit and release-governance burden + startup-finance heuristic] 在多账户生产规模化前增加质量和安全能力。"
  - id: A17
    name: "职能 / 运营到手薪酬（含附加成本）"
    value: "$130K"
    unit: "USD/FTE/year"
    source: "[BP operations + startup-finance heuristic] 精简的财务、合规协调和客户运营支持。"
  - id: A18
    name: "招聘时间表"
    value: "M1 founder, eng1, product1; M3 sol1; M9 part1; M11 security1; M15 eng2; M18 ops; M21 sol2; M24 product2; M27 part2; M30 eng3; M31 sol3; M33 security2; M35 eng4"
    unit: "时间线"
    source: "[BP team + BP strategicChoices.sequencingRationale] 遵循计划的工程优先、部署可复制性优先顺序，标杆证据积累后再叠加合作伙伴和规模化雇员。"
  - id: A19
    name: "薪酬分配至损益表行项"
    value: "Founder 65% S&M / 35% G&A; solutions 45% S&M / 55% R&D; product 90% R&D / 10% G&A; security 80% R&D / 20% G&A; engineering 100% R&D; partnerships 100% S&M; ops 100% G&A"
    unit: "分配比例"
    source: "[BP team role rationales + BP operations] 将薪酬映射至损益表所用的职能条线。"
  - id: A20
    name: "非薪酬支出爬坡"
    value: "Monthly S&M $24K/$34K/$44K/$56K/$70K/$86K; R&D $16K/$22K/$28K/$32K/$40K/$48K; G&A $10K/$14K/$18K/$22K/$28K/$34K by successive 6-month blocks"
    unit: "USD/month"
    source: "[BP operations + BP gtm.channels + startup-finance heuristic] 覆盖活动、云服务、法律、安全审查、保险和合作伙伴赋能，不假设大规模付费需求拓展。"
  - id: A21
    name: "基础情景中试点转生产转化率"
    value: "70%"
    unit: "付费启动转化率"
    source: "[BP gtm.funnelTargets paid pilot→production 50%+ + BP investorMemo.mustBeTrue] 假设公司在首个生产参考案例上线后超出最低值，但第 3 年仍有一个总启动未达稳定生产。"
  - id: A22
    name: "CAC 约定"
    value: "$620K per converted production account"
    unit: "USD/account"
    source: "[BP gtm.funnelTargets + model calc] 第 2–3 年销售与市场支出约 260 万美元，除以 4.2 个转化的生产等效账户（6 个总启动 × 70% 转化率）。"
  - id: A23
    name: "现金转换约定"
    value: "Cash movement equals EBITDA"
    unit: "公式"
    source: "[startup-finance heuristic] 在种子阶段，债务偿还、税费和资本支出假设可忽略不计。"
  - id: A24
    name: "下轮融资的里程碑标准"
    value: "Q4Y2 with 4-5 production administrators, 2 partner-sourced deployments, ~30% lower implementation hours, and one UK/Nordic reference"
    unit: "里程碑"
    source: "[BP milestones 12–24 months + BP fundingAsk.useOfFundsSummary + model cash curve] 这是滩头市场看起来足够可复制、可进行 A 轮融资流程的首个时间节点。"
