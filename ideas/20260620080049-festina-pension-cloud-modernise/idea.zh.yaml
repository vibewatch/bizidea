      滩头市场处于欧洲大型替换市场内部，可从合规 API 扩展至更广泛的保单管理和账本迁移。
topRisks:
  - name: 企业销售周期漫长
    description: 养老金和人寿平台的交易可能因董事会审批、采购流程和在位系统集成商的政治博弈而陷入僵局。
    mitigation: 从仪表盘数据推送等单一强制性工作流入手，定价支持快速试点，通过已进入客户账户的实施合作伙伴销售。
  - name: 集成复杂度高
    description: 遗留保单账本往往包含碎片化的产品规则和文档缺失，可能延迟价值交付。
    mitigation: 围绕常见养老金核心的可复用摄取模式构建产品，先从只读用例入手，再引入写回工作流。
  - name: 在位平台反制
    description: 核心厂商和系统集成商可能捆绑相邻模块，或警告客户提防影子账本方案。
    mitigation: 定位为非替换式合规与变更层，证明与在位系统共存，并积累在位栈无法良好建模的审计数据。
