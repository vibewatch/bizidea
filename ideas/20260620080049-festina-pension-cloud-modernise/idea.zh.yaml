problem: >-
  欧洲养老金与人寿基金仍在大型机栈上运营大量保单，导致方案变更、成员数据开放和监管报告极为迟缓。每一次新的仪表盘强制要求、偿付能力 II 报告变更或费率规则更新，都会变成一个横跨 COBOL 代码、批处理作业和电子表格对账的脆弱项目。全面核心替换可能耗时数年，运营商即使知道系统栈是瓶颈，也不得不持续为拖延买单。
targetUser:
  primary: >-
    欧洲养老金管理机构和人寿保险公司中负责遗留保单账本的核心平台转型负责人
  secondary: >-
    负责方案更新、仪表盘数据推送和监管报告的精算变更团队及养老金运营经理
  buyer: >-
    养老金或人寿平台所有者的 COO、CIO 或保单管理转型主管
startupThesis:
  nonObviousInsight: >-
    紧迫的预算不在于全面重写养老金核心；真正的需求是一个可审计的权益事件层，让遗留保单逻辑立即开放给仪表盘、报告和方案变更。谁先成为权益事件的可信抽象层，谁就能从合规管道扩张为整个保单账本的变更控制系统。
  beachhead: >-
    北欧和荷兰的养老金管理机构——运行在 IBM Z 或 AS/400 时代核心上、拥有 50 万至 300 万封闭式人寿和退休保单，且必须向养老金仪表盘开放成员数据并频繁处理方案或费率变更
  wedge: >-
    一个基于事件溯源的影子账本，将遗留保单规则映射为仪表盘就绪的 API、方案变更模拟器和监管数据推送，无需替换在位保单管理核心
  whyNowCatalyst: >-
    养老金仪表盘和偿付能力 II 数据要求正在迫使基金向外部开放核心数据，同时模块化 API 优先厂商身后的已验证增长资金表明买家现已有预算用于渐进式现代化。
  ventureScalePath: >-
    从权益事件 API 和遗留账本的受监管报告起步，逐步扩展到产品配置、保单迁移工具、顾问与成员工作流，最终成为覆盖养老金、年金和人寿管理的完整运营层。
solution: >-
  构建一个垂直软件层，紧贴遗留养老金核心，为保单、缴费、费率和赔付建立规范化的权益事件账本。第一个产品从在位系统摄取批量输出和保单表，将其转化为可审计的 API，生成仪表盘就绪的成员记录和监管就绪的数据导出。第二个模块让运营团队在触及大型机之前模拟方案和费率变更，降低周末发布风险和精算电子表格补救的代价。随着时间推移，账本成为保单变更管理和账本迁移的控制平面，为客户提供一条无需大爆炸式替换就能摆脱核心系统的路径。
goToMarketSeed:
  firstCustomer: >-
    拥有 50 万以上遗留保单、已启动养老金仪表盘集成项目、有明确转型授权但无意进行多年全面核心替换的丹麦或荷兰养老金管理机构
  buyingTrigger: >-
    养老金仪表盘截止日期、偿付能力 II 报告整改，或计划中的方案和费率规则修订——任何一个迫使基金在大型机外部开放和验证保单数据的触发点
  currentAlternative: >-
    系统集成商主导的多年期核心替换项目，加上围绕现有保单管理栈的 ETL 点工具、精算电子表格和人工对账
  switchingReason: >-
    影子账本切口能在数月内交付可见的监管和运营成果，在推广期间保留在位核心，为现代化提供比单一高风险替换项目更安全的路径。
  pricingHypothesis: >-
    按账本上的有效保单数量收取年度平台费，每条仪表盘或报告工作流上线时另收一次性实施费
whyNow:
  - point: >-
      规模化增长资本正流入养老金核心现代化领域，表明董事会和投资人已将其视为主动软件预算项，而非延迟的技术债务。
