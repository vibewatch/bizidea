      养老金仪表盘和偿付能力 II 强制要求设定了开放保单数据的硬截止日期，使外部 API 层比纯战略性平台重写更容易获得预算支持。
    signalRefs:
      - 监管数据截止期限正在倒逼核心数据开放
    sourceRefs:
      - 2
  - point: >-
      基金等不起多年替换周期——现有大型机已因产品、费率和报告变更而成本过高、响应太慢。
