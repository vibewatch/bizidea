jobsToBeDone:
  - job: >-
      养老金仪表盘截止日期到来时，帮助转型负责人从大型机核心中开放可信的成员和保单数据，在无需启动全面替换的情况下实现合规。
    currentAlternative: >-
      ETL 项目、自定义批量导出，以及围绕在位保单管理系统的人工对账
    successMetric: 仪表盘数据推送按时上线，每个报告周期的人工对账次数减少
  - job: >-
      方案或费率规则变更时，帮助养老金运营团队在发布前模拟并验证保单影响，避免高风险的周末变更和发布后修正。
    currentAlternative: >-
      基于电子表格的精算测试，以及在 COBOL 或厂商维护的核心系统内部进行定制化变更
    successMetric: 方案变更的发布天数，以及发布后保单修正数量
