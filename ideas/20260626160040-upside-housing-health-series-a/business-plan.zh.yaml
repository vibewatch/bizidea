slug: workforce-housing-stability-platform
date: "2026-06-26"
executiveSummary: >-
  劳动力住房稳定平台是一项由雇主采购的住房导航福利，面向已在通过员工流失、缺勤和可避免理赔
  承担住房不稳定成本的自保险企业。滩头市场是德克萨斯州城市中员工规模 5,000–15,000 人的
  自保险医疗和科技型雇主——这些市场住房压力大，但安置运营的可行性高于供应最受制约的沿海市场。
  首个产品并非宽泛的社会关怀平台，而是嵌入年度开放报名和特定 HRIS 事件的自愿住房风险筛查，
  配合顾问主导的安置支持和供 HR 使用的留用仪表盘。GTM 体系围绕单一买家时机设计：CHRO 或
  福利副总裁面临 Q4 福利续约或离职率峰值，急需比 EAP 利用率更可防御的替代方案。研究和输入
  创意均支持干预本身——付款方渠道厂商已证明住房导航可带来 ROI 并签署合同，但尚未证明雇主
  会直接大规模购买。因此，计划从共创客户、经纪人及 TPA 渠道和两个首发城市起步，再进行更广
  泛的地域或细分扩张。最大的否定性风险是雇主职责范畴存疑，以及住房供给制约在软件形成差异化
  之前就让安置 SLA 失效。公开数据尚未提供该产品成熟的雇主直接定价基准，因此试点定价和转化
  阈值必须及早测试而非提前假设。
problem:
  - "自保险雇主在人员流失和理赔中承担住房不稳定的成本，但 HR 团队通常只有在员工已旷工、递交辞呈或陷入危机后才意识到问题。"
  - "EAP、心理健康平台和社会关怀转介工具可以筛查或辅导，但无法在一个预算周期内同时整合 HR 工作流触发、真实住房导航和 CHRO 可答辩的留用证明。"
solution:
  - "在开放报名、休假、搬迁和离职流程中嵌入自愿住房风险筛查，再将被标记员工导入 AI 辅助住房顾问——顾问负责匹配房源、补贴路径和本地合作伙伴。"
  - "以 PEPM 福利加安置费的形式销售，并配套与安置速度和 90 天留用挂钩的结果仪表盘，使首次续约决策基于已稳定的员工人数而非辅导利用率。"
whyWeWin:
  - "我们使用付款方验证过的干预方式，但将其打包给直接感受到离职成本的雇主预算拥有者，形成比通过健康险计划进行医疗损失降低销售更短的验证环路。"
  - "如果公司在一套工作流中积累 HRIS 触发数据、分城市安置数据、房东响应情况和留用结果，可以建立一条 EAP 在位厂商和通用转介网络都不具备的护城河。"
strategicChoices:
  beachhead: >-
    奥斯汀、达拉斯和休斯顿使用 Workday 或 ADP 的自保险医疗和科技型雇主，员工规模
    5,000–15,000 人，面临 Q4 福利续约压力，且有可计量的时薪或中薪劳动力因住房成本
    压力导致的离职率。
  wedgeRationale: >-
    开放报名和特定 HRIS 事件筛查比宽泛健康福利提供更快的验证路径：它给团队一个具名
    的买家、一个周期性的预算窗口，以及一个足够小的工作流，可以在单个续约周期内
    衡量安置情况和 90 天留用率。
  sequencingRationale: >-
    产品应从一个自愿筛查流、两个核心 HRIS 连接器和两个城市起步，因为住房运营是
    速率限制因素；GTM 应从直接共创客户和经纪人或 TPA 引入的交易起步，因为纯粹的
    冷启动雇主销售不如通过既有福利关系销售可信；招聘应优先住房运营和实施人员，
    再扩大销售团队规模。
  notYet:
    - "优先通过健康险计划销售——买家、KPI 体系和销售周期与雇主留用切口截然不同。"
    - "在城市供给和合作伙伴容量验证 30 天安置模式之前向旧金山和纽约全面铺开。"
    - "扩展至宽泛的消费者住房搜索、家庭搬迁服务或超越雇主留用用例的通用社会关怀平台。"
market:
  tam: >-
    基于研究模型估算年度 TAM 为 $2.8B：3,900 万自保险计划参与者 × 60% 员工份额假设
    × $10 PEPM 福利定价。
  sam: >-
    SAM 估算为 $420.0M，对应以加州/德州为蓝本但以德州为主的 5,000–15,000 人自保险
    雇主在住房压力城市的切口：$2.8B × 15%。
  som: >-
    第 3 年 SOM 估算为 $2,700 万：30 家已落地雇主 × 平均 7,500 名合格员工 × 约
    $10 PEPM 年化。
  segments:
    - "在德克萨斯州住房压力城市中集中部署劳动力的自保险医疗和科技型雇主。"
    - "聚合自保险雇主需求并可跨账户打包福利的经纪人、TPA 和 PEO。"
  buyingProcess: >-
    流程从福利副总裁或 CHRO 在开放报名、EAP 续约或离职率峰值时启动，随后扩展至
    福利运营、法务、隐私和财务审核——因为产品涉及敏感员工数据和福利设计。当买家
    相信特定城市的试点能在一个续约周期内展示安置和留用改善，且不会让管理者接触
    个案敏感数据时，交易就会落地。
product:
  mvp: >-
    MVP 覆盖一个自愿筛查流、Workday 和 ADP 事件摄取、员工录入、顾问案例管理、
    住房房源匹配、合作伙伴转介追踪，以及展示两个首发城市安置速度和 90 天留用率
    的雇主仪表盘。有意排除深度理赔集成、保险公司工作流和全国住房覆盖。
  sixMonth: >-
    交付生产就绪的 Workday 和 ADP 连接器、住房顾问控制台、房东及非营利合作伙伴
    工作流，以及覆盖筛查量、转介接受率、安置时间和 90 天留用率的雇主仪表盘。
  twelveMonth: >-
    增加 Rippling 支持、经纪人和 TPA 报告、按城市分析的安置 SLA 预测，以及可配置
    的雇主隐私控制——确保个案细节不流入管理者决策工作流。
  twentyFourMonth: >-
    拓展至更多阳光地带城市和部分加州城市，为 TPA 和 PEO 增加多雇主渠道打包，
    并叠加按城市和雇主细分的安置成功率、留用提升和合作伙伴表现基准分析。
  keyBets:
    - "当项目针对近期续约或离职率触发事件销售时，雇主会将住房稳定视为留用和生产力福利。"
    - "两城市的供给密度和合作伙伴覆盖足以支撑对首批雇主群体的可信 30 天安置承诺。"
    - "产品化的 HRIS 触发和隐私安全报告可使部署可复制，而不会让公司蜕变为服务驱动的咨询机构。"
gtm:
  wedge: >-
    围绕 Q4 开放报名或 EAP 续约销售付费试点：在一个城市对特定员工群体进行筛查，
    将接受的案例导入住房导航，并在达成安置速度和 90 天留用目标后转为更广泛的
    PEPM 合同。
  channels:
    - "创始人主导直接面向 CHRO、首席人事官和福利副总裁共创客户销售。"
    - "已参与 EAP 和健康福利续约的福利经纪人和顾问。"
    - "试点打法可复制后，作为第二步分发的 TPA 和 PEO。"
  funnelTargets: "线索→合格试点 15–25%，合格试点→付费试点 40%+，付费试点→正式生产 50%+，正式生产雇主→12 个月内多城市或渠道扩张，占比 30%+ 账户。"
  pricing: >-
    合格员工约 $8–$15 PEPM，加上每次核实安置 $500–$1,000 的费用；试点定价设计
    以单名稳定员工价值远超项目成本为依据，参照输入创意所述的避免离职事件。
businessModel:
  revenueStreams:
    - "住房稳定福利覆盖的合格员工 PEPM 订阅。"
    - "符合项目标准的核实安置绩效费。"
    - "面向 TPA、PEO 和部分福利中间商的白标或渠道打包。"
  unitOfValue: "福利覆盖的合格员工，扩张以稳定员工人数和新增雇主人群衡量。"
  targetGrossMarginPct: 70
  expansionLevers:
    - "同一雇主内从一个城市和员工群体扩展至多个城市。"
    - "从直接雇主销售进入 TPA、经纪人和 PEO 分发。"
    - "在安置和留用数据积累后增加基准分析和渠道报告。"
strategyMap:
  northStarMetric: "安置到稳定住所且 90 天后仍在职的员工人数。"
  inputMetrics:
    - "合格报名或 HRIS 事件工作流中的筛查完成率。"
    - "被标记员工的住房导航选择加入率。"
    - "按城市分析的转介到安置中位天数。"
    - "已安置员工的 90 天留用率。"
    - "付费试点转正式生产合同的转化率。"
  moatsToBuild:
    - "按雇主细分和城市的 HRIS 触发到安置结果数据集。"
    - "按案例类型分析的房东、补贴和非营利合作伙伴响应速度的专有记录。"
    - "降低部署和续约摩擦的经纪人、TPA 和雇主实施手册。"
  killCriteria:
    - "如果前 20 家目标雇主中不足 5 家同意参与共创客户流程，说明雇主职责范畴认可度和紧迫感弱于论题假设。"
    - "如果首发城市前 25 个接受案例在 30 天内的安置率低于 50%，说明运营模式尚不可行。"
    - "如果第 12 个月前没有一个付费试点转为正式 PEPM 合同，说明直接雇主付费意愿对这一切口而言过弱。"
  mermaid: |
    flowchart LR
      Wedge[Q4 enrollment and HRIS trigger wedge] --> MVP[Voluntary screen plus housing navigation MVP]
      MVP --> Proof[Placement speed and 90-day retention proof]
      Proof --> Expansion[TPA and broker channels plus multi-metro expansion]
investorMemo:
  verdict:
    call: "深入了解 / 进一步调查"
    conviction: "切口清晰、相邻证明存在，但信念取决于雇主是否直接采购，以及首发城市运营能否维持 SLA 质量。"
    whyBelieve: "公司锁定真实预算拥有者和一个由续约触发的窄流程，留用证明的出现速度快于付款方渠道住房销售。"
    whyDoubt: "雇主采购意愿、隐私设计和住房供给执行均可能在软件形成差异化护城河之前失败。"
    nextDiligence: "在德克萨斯州验证两个有明确安置和 90 天留用目标的付费共创客户试点，再承销更广泛的雇主需求。"
  firstCustomer:
    title: 德克萨斯州自保险医疗雇主的福利副总裁
    profile: "一家使用 Workday 的 8,000 人雇主，在奥斯汀和达拉斯面临一线和中薪劳动力流失，且下一个福利周期有 EAP 续约和劳动力稳定压力。"
    trigger: "Q4 福利续约，或近期出现暴露关键员工群体住房压力的离职率峰值。"
    buyer: "CHRO 或首席人事官"
    initialContract: >-
      一个城市、一个特定员工群体的 $50K–$100K 试点，若雇主基于安置速度和 90 天
      留用结果续约，则转为约 $500K–$900K 的年度 PEPM 合同价值。
  mustBeTrue:
    - "CHRO 和福利副总裁买家会将住房稳定视为合理的留用福利，而非将问题推给健康险计划或 EAP 厂商。"
    - "报名和 HRIS 事件中的自愿筛查能产生足够的选择加入量，以产生统计上有效的试点证明。"
    - "两个首发城市能在不击穿毛利或错过 30 天承诺的情况下维持安置质量。"
    - "经纪人、TPA 或 PEO 渠道在首批直接雇主胜出后会放大分发，而非要求完全白标的服务模式。"
    - "早期结果数据会比通用转介目录更有价值，并在相邻厂商增加住房功能后仍可防御。"
  diligenceQuestions:
    - "哪类员工群体首先产生最清晰的留用 ROI：一线医疗员工、中收入科技运营员工，还是其他细分？"
    - "试点采购中，雇主法律顾问会提出哪些具体的隐私和健康计划设计异议？"
    - "CHRO 以 PEPM 方式续约所需的安置率和安置时间阈值是多少？"
    - "经纪人或 TPA 能持续带来合格试点，还是公司仍将依赖创始人主导的直接销售？"
    - "Upside、findhelp 或 EAP 在位厂商一旦该切口被证明，能多快复制面向雇主的工作流？"
operatingAssumptions:
  - assumption: "若试点与开放报名、续约或明显的离职率问题挂钩，雇主会将其作为留用福利购买。"
    basis: research.yaml
    validationTest: "至少从 3 家以留用或缺勤为主要购买原因（而非社会影响品牌）的雇主签署付费试点。"
    decisionImpact: "若不成立，公司应转向经纪人主导的白标分发，或放弃直接雇主 GTM。"
  - assumption: "自愿筛查流能在雇主隐私约束内产生足够的接受案例以证明 ROI，而无需强制侵入性数据采集。"
    basis: operator judgment
    validationTest: "在前 2 个试点中合计达到至少 10% 筛查完成率和 25 个接受的导航案例，同时维持雇主隐私约束。"
    decisionImpact: "若不成立，切口不会产生足够信号，公司必须收窄至更高风险群体或重新设计触发方式。"
  - assumption: "首发城市合作伙伴容量足以在 30 天内安置有意义比例的接受案例。"
    basis: idea.yaml
    validationTest: "追踪前 25 个接受案例，在前 2 个城市中确认至少 50% 在 30 天内完成核实安置。"
    decisionImpact: "若不成立，扩张应暂停，直至供给合作关系改善且 SLA 措辞放宽。"
  - assumption: "Workday 和 ADP 集成可以以有限的自定义工程量实现产品化。"
    basis: research.yaml
    validationTest: "完成 3 个使用相同核心连接器工作流、每次部署自定义工程不超过 2 人周的雇主部署。"
    decisionImpact: "若不成立，服务负担将压缩利润率，产品范围必须在扩大销售前收窄。"
  - assumption: "经纪人和 TPA 在看到 CFO 可防御的留用故事后会引入试点。"
    basis: research.yaml
    validationTest: "在 9 个月内签署至少 2 个渠道合作方，每方各带来一个合格试点机会。"
    decisionImpact: "若不成立，增长规划应假设更慢的直销模式和更小的近期 SOM。"
experimentRoadmap:
  - horizon: 0–90 天
    experiment: "围绕 Q4 续约规划，对德克萨斯州医疗和科技型雇主的 20 位 CHRO 和福利副总裁进行访谈。"
    hypothesis: "至少 8 位受访者会将住房不稳定描述为值得试点的留用或出勤问题。"
    successMetric: "8 位合格受访者具有具名的续约或离职率触发点，且愿意审阅试点方案。"
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: "与 4 位共创客户候选人共同原型化自愿筛查和隐私安全的雇主仪表盘。"
    hypothesis: "买家会优先选择以留用为导向、个案细节分离的报告，而非通用利用率仪表盘。"
    successMetric: "3 位受访者批准数据边界设计，进入试点采购流程。"
    owner: 创始人产品
  - horizon: 0–90 天
    experiment: "构建首个 Workday 和 ADP 触发流，以及德克萨斯州两个城市的顾问案例管理工作流。"
    hypothesis: "团队能在试点启动后 30 天内产生首个员工转介，而不让自定义集成工作占据开发时间线。"
    successMetric: "2 个活跃雇主试点在合同签署后 30 天内产生转介。"
    owner: 创始工程师
  - horizon: 3–6 个月
    experiment: "在奥斯汀和达拉斯招募房东、非营利组织和补贴路径合作伙伴，并衡量安置转化率。"
    hypothesis: "精选合作伙伴网络能在 30 天内为接受案例提供至少 50% 的安置率。"
    successMetric: "25 个接受案例，30 天内核实安置率 50%+。"
    owner: 住房运营负责人
  - horizon: 3–6 个月
    experiment: "将共创客户转化为具有明确留用和安置成功标准的付费试点。"
    hypothesis: "若试点合同与留用经济挂钩，雇主愿意在长期理赔证明出现之前付费。"
    successMetric: "签署 3 个各不低于 $50K 的付费试点。"
    owner: 创始人/CEO
  - horizon: 6–12 个月
    experiment: "启动首个经纪人或 TPA 主导的试点包，并与创始人主导的直销对比转化率。"
    hypothesis: "中间渠道分发能在不显著降低胜率质量的情况下减少品类教育摩擦。"
    successMetric: "2 个渠道来源的试点，至少 1 个转化为正式生产合同。"
    owner: 合作伙伴负责人
operations:
  - "在承诺雇主 SLA 之前，先建立特定城市的住房合作伙伴名册，并每周审查房东响应速度和补贴路径。"
  - "将敏感案例管理保留在服务层，仅向雇主提供汇总的留用和安置报告。"
  - "标准化 Workday 和 ADP 部署手册，使福利运营团队能以最少的 IT 自定义工作完成上线。"
  - "每个雇主账户配备具名的福利负责人、隐私负责人和本地住房运营负责人。"
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: "主导创始人驱动的雇主销售、经纪人关系和试点打包，因为首批合同需要品类教育和快速迭代。"
  - role: 创始工程师
    startTiming: Month 0
    rationale: "构建活跃试点所需的首个 HRIS 触发器、雇主仪表盘和案例管理骨架。"
  - role: 住房运营负责人
    startTiming: Month 1
    rationale: "供给侧执行是瓶颈，公司需要在扩大需求之前先推进城市合作伙伴开发和 SLA 所有权。"
  - role: 解决方案工程师
    startTiming: Month 4
    rationale: "降低雇主间的部署摩擦，并将可复制的实施手册固化。"
  - role: 合作伙伴负责人
    startTiming: Month 8
    rationale: "只有在直销试点验证了留用故事和实施路径之后，经纪人、TPA 和 PEO 渠道才值得优先投入。"
milestones:
  - horizon: 0–12 个月
    items:
      - "签署 6–8 家共创客户，至少 3 家转化为付费试点。"
      - "优先推进奥斯汀和达拉斯，待合作伙伴容量验证后再将休斯顿作为第三个城市。"
      - "首 25 个接受案例中 30 天安置率 50%+，并展示早期 90 天留用证据。"
      - "在扩大 GTM 投入之前，至少将 1 个试点转化为正式 PEPM 合同。"
  - horizon: 12–24 个月
    items:
      - "增加 Rippling 和渠道报告，再通过 2–3 个经纪人或 TPA 关系扩张。"
      - "在多个德克萨斯州城市和部分加州城市达到 10–15 家正式生产雇主。"
      - "按城市和员工群体发布留用和安置基准报告。"
      - "收紧隐私控制和运营仪表盘，确保部署保持产品化而非服务化。"
  - horizon: 24–36 个月
    items:
      - "拓展至更多阳光地带城市和部分已验证合作伙伴密度的加州雇主。"
      - "使通过 TPA 或 PEO 的多雇主打包成为新预订的有意义份额。"
      - "围绕雇主触发的住房稳定结果建立可防御的数据资产，而不扩展为通用社会关怀平台。"
risks:
  - risk: "雇主可能仍将住房视为超出公司职责范畴，倾向于将问题留给健康险计划或 EAP 厂商。"
    likelihood: High
    impact: High
    mitigation: "以留用经济为切入，围绕续约事件推进试点，并借助经纪人或 TPA 将福利纳入雇主既有采购动作。"
  - risk: "首发城市住房供给制约可能击穿安置承诺，并迫使毛利率承压的人工运营介入。"
    likelihood: High
    impact: High
    mitigation: "仅在合作伙伴密度已核实的城市上线，限制试点量，在安置数据支撑 SLA 之前暂缓扩张。"
  - risk: "隐私和健康计划设计顾虑可能拖慢采购流程或收窄可用员工数据范围。"
    likelihood: Medium
    impact: High
    mitigation: "从第一天起采用自愿参与、严格角色分离和汇总雇主报告。"
  - risk: "Upside、findhelp 或 EAP 在位厂商可能在初创公司证明雇主需求后捆绑类似服务。"
    likelihood: Medium
    impact: High
    mitigation: "快速推进 HRIS 工作流嵌入、续约关联证明和相邻厂商尚未拥有的特定城市结果数据。"
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    用 18 个月现金跑道交付产品化的 Workday 和 ADP 部署，在两个首发城市建立真实的
    住房合作伙伴容量，赢得 6–8 家共创客户，至少 3 家转化为付费试点，并完成首个
    正式 PEPM 续约。
