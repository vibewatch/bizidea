scenarios:
  downside:
    description: "试点转化推迟约两个季度，部分雇主维持单城市规模，服务密集度使毛利率低于目标。"
    y3RevenueK: 4864.0
    y3EbitdaK: -659.7
    cashLowPointK: 60.0
    keyAssumptionChanges:
    - "Q4Y3 期末客户数达到 12 家而非 16 家。"
    - "混合年度 ARPU 因更多账户以较小范围续约而降至约 $456K。"
    - "毛利率维持 65%，月度流失率升至 2.8%。"
  base:
    description: "公司在第 1 年完成一家正式生产雇主转化，Q4Y2 达到 10 家，在维持 70% 毛利率目标的同时，第 3 年通过渠道辅助实现增长。"
    y3RevenueK: 6240.0
    y3EbitdaK: 546.6
    cashLowPointK: 1342.6
    keyAssumptionChanges:
    - "Q4Y3 期末客户数达到 16 家，年度 ARPU $480K（周期性）。"
    - "尽管住房导航运营存在服务层，毛利率维持 70%。"
    - "Q4Y3 人员达到 15 人，商业化招聘落后于直销和渠道需求的验证。"
  upside:
    description: "经纪人和 TPA 分发在第 2 年开始奏效，直销试点转化加速，可复制实施提升范围和毛利率。"
    y3RevenueK: 9196.0
    y3EbitdaK: 2799.8
    cashLowPointK: 1905.2
    keyAssumptionChanges:
    - "Q4Y3 期末客户数达到 20 家而非 16 家。"
    - "随着更多雇主跨城市和群体扩张，混合年度 ARPU 升至约 $528K。"
    - "随着集成和本地合作伙伴手册标准化，毛利率提升至 72%。"
