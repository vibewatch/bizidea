reportMemo:
  executiveTakeaways:
    - >-
      The best wedge is not “housing as a wellness perk” but “housing-risk interception” tied to
      retention, absence prevention, and claims avoidance for self-insured employers.
    - >-
      Competition is mostly adjacent rather than direct: EAP vendors own budget lines, social-care
      vendors own referral infrastructure, and payer-native housing players own medical ROI stories.
    - >-
      Execution risk is supply-side as much as software-side; without metro-by-metro housing
      inventory and partner capacity, promised placement SLAs will break before demand does.
    - >-
      The most credible channel strategy is broker, TPA, PEO, or payer-adjacent distribution paired
      with HRIS workflow embedding, not a pure cold-start employer sales motion.
  marketDefinition: >-
    An employer-purchased housing stability benefit that sits between EAP counseling and healthcare
    social-care coordination, using HR and benefits triggers to route at-risk workers into real
    housing navigation rather than generic referrals.
  customerAndBuyer: >-
    Primary buyers are CHROs, VP Benefits leaders, and benefits-operations teams at self-insured
    employers; adjacent influencers include brokers, TPAs, PEOs, and population-health leaders who
    can validate ROI and compliance design.
  buyingTriggers:
    - point: >-
        Benefits leaders already review rising healthcare and wellness spend, which creates room for
        an outcome-tied benefit framed as retention protection rather than counseling utilization.
      sourceRefs:
        - 104
        - 110
        - 72
    - point: >-
        Payer-side proof points make housing instability legible as a contractible problem: Upside
        is explicitly selling housing stabilization to Medicaid, Medicare Advantage, and employers
        with ROI language and operating evidence.
      sourceRefs:
        - 1
        - 2
        - 8
        - 9
    - point: >-
        Housing pressure remains intense enough that employers in expensive or supply-constrained
        metros can plausibly treat housing instability as a workforce continuity issue rather than a
        fringe social-service issue.
      sourceRefs:
        - 98
        - 116
        - 117
  willingnessToPay:
    summary: >-
      Public evidence supports willingness to fund adjacent benefits and to pay for outcomes, but
      not yet a mature public pricing benchmark for employer housing navigation. The strongest case
      is proxy-based: employers already absorb large health-benefit spend, already buy
      EAP/mental-health products, and can understand housing stabilization when it is tied to
      near-term retention and medical-cost avoidance.
    sourceRefs:
      - 104
      - 108
      - 110
      - 8
      - 10
  competitiveLandscape: >-
    The landscape breaks into four classes: payer-native housing specialists, whole-person-care
    infrastructure vendors, employer EAP/mental-health incumbents, and HRIS/workflow platforms that
    can distribute triggers but not solve housing execution. The opportunity exists because no class
    cleanly combines employer budget ownership, HR workflow embedding, and end-to-end housing
    placement operations.
  incumbentThesis:
    - incumbentClass: EAP and mental-health vendors
      point: >-
        They already sit in the benefits budget, but their core product is counseling and care
        navigation rather than landlord, voucher, or move-in execution.
      sourceRefs:
        - 2
        - 108
        - 68
        - 54
    - incumbentClass: Social-care referral infrastructure
      point: >-
        These platforms are strong at screening, directories, and closed-loop referrals, but they
        are not inherently HR-native benefits products and can feel indirect for a CHRO buyer.
      sourceRefs:
        - 18
        - 27
        - 33
        - 39
    - incumbentClass: Health plans and payer-channel housing vendors
      point: >-
        They can justify spend with medical-loss and utilization metrics, but employer buyers want
        immediate workforce outcomes and a faster sales cycle than health-plan contracting usually
        provides.
      sourceRefs:
        - 3
        - 4
        - 9
        - 8
    - incumbentClass: HRIS and workflow platforms
      point: >-
        They can trigger enrollment, status-change, and offboarding workflows, but they do not own
        housing supply, concierge capacity, or the outcome data needed to prove stabilization.
      sourceRefs:
        - 79
        - 82
        - 84
  regulatoryLandscape: >-
    The compliance surface spans benefit-plan design, employee wellness rules, privacy and security
    obligations when health and HR data are combined, and fair handling of sensitive household
    information. The harder issue is not any single statute but designing a data flow that keeps the
    employer on the right side of voluntariness, minimum necessary data collection, and role
    separation.
  technologyLandscape: >-
    The product is technically feasible because modern HRIS and payroll platforms expose integration
    surfaces, while whole-person-care vendors have normalized screening and referral workflows. The
    hard part is operational orchestration: matching signals from HR systems with housing inventory,
    concierge workflows, and local partner availability fast enough to matter.
  distributionChannels:
    - point: >-
        Benefits and wellness budgets are already populated with EAP and mental-health vendors,
        making broker-led or consultant-assisted packaging more plausible than a standalone
        new-category sale.
      sourceRefs:
        - 108
        - 110
        - 65
    - point: >-
        A channel that rides existing healthcare-social-care infrastructure can shorten time to
        value by avoiding greenfield community network buildout in every market.
      sourceRefs:
        - 14
        - 32
        - 102
    - point: >-
        HRIS and payroll marketplaces are the most credible insertion point for workflow-triggered
        screening because they sit where enrollment, leave, and employment-status events already
        occur.
      sourceRefs:
        - 79
        - 82
        - 84
  partnershipEcosystem:
    - point: >-
        Housing-voucher and rental-assistance ecosystems matter because the product needs pathways
        to real units and subsidy programs, not just advice.
      sourceRefs:
        - 97
        - 98
        - 116
    - point: >-
        Social-care networks can fill referral, documentation, and community-partner gaps where the
        startup does not yet own a local partner base.
      sourceRefs:
        - 18
        - 36
        - 126
    - point: >-
        Benefits consultants, TPAs, and PEOs are strategically attractive because they already
        aggregate employer demand and influence benefit selection.
      sourceRefs:
        - 65
        - 69
        - 2
  dataMoats:
    - point: >-
        The strongest moat is not a generic model but a feedback loop linking HR triggers, housing
        inventory, landlord responsiveness, and retention outcomes by metro and employer segment.
      sourceRefs:
        - 6
        - 16
        - 37
    - point: >-
        Closed-loop referral and outcome infrastructure can compound into a defensible dataset about
        which interventions actually convert into placement and stability.
      sourceRefs:
        - 18
        - 37
        - 70
    - point: >-
        Distribution data from HRIS events becomes especially valuable when it is tied to a service
        layer that incumbents cannot easily replicate with software alone.
      sourceRefs:
        - 79
        - 82
        - 84
  geographicConsiderations:
    - point: >-
        Launch economics are highly metro dependent because housing supply, voucher usability, and
        partner density vary far more than software deployment does.
      sourceRefs:
        - 98
        - 97
        - 116
    - point: >-
        High-cost coastal metros create acute pain but also the toughest placement math; Sun Belt
        expansion may offer better early operational win rates even if the narrative starts in
        California.
      sourceRefs:
        - 117
        - 116
    - point: >-
        The beachhead should prioritize markets where employer concentration and community-housing
        infrastructure overlap, not just where rents are highest.
      sourceRefs:
        - 3
        - 2
        - 100
  sensitivityCases:
    - case: Employer views housing as outside scope
      impact: >-
        Sales cycles lengthen and pilots fail unless ROI is framed around retention and absence
        prevention rather than social mission.
      sourceRefs:
        - 108
        - 54
        - 68
    - case: Housing supply remains structurally tight
      impact: >-
        Service quality degrades first; promised SLAs and guarantees become the main source of
        gross-margin pressure.
      sourceRefs:
        - 98
        - 116
        - 97
    - case: Adjacencies bundle sideways
      impact: >-
        The whitespace narrows quickly if EAP or SDOH vendors add a housing layer before the startup
        owns distinctive workflow and outcomes data.
      sourceRefs:
        - 1
        - 18
        - 39
        - 69
  validationPlan:
    - priority: high
      question: >-
        Will CHROs buy housing stabilization as a retention benefit rather than defer to the health
        plan or EAP?
      evidenceToGather: >-
        Five buyer interviews and one broker-led design-partner conversation in CA/TX large
        employers.
    - priority: high
      question: >-
        Can the team consistently place employees within the promised time window in two launch
        metros?
      evidenceToGather: >-
        Pilot data on referral-to-placement cycle times, landlord response rates, and subsidy
        utilization.
    - priority: medium
      question: >-
        Do employers prefer direct contracting or a white-label/embedded channel through TPAs,
        brokers, or payers?
      evidenceToGather: >-
        Partner pipeline tests across one broker, one TPA, and one social-care infrastructure
        vendor.
    - priority: medium
      question: >-
        What data boundary design makes legal and HR stakeholders comfortable with screening and
        triage?
      evidenceToGather: Counsel review memo plus employer privacy and wellness-program design workshops.
analysisModels:
  marketMapDiagram:
    title: Employer housing stability market map
    mermaid: |-
      quadrantChart
        title Employer housing stability market map
        x-axis Generalist referral / benefits --> Specialized housing navigation
        y-axis Lower buyer urgency --> Higher buyer urgency
        Lyra Health: [0.14, 0.52]
        Spring Health: [0.18, 0.56]
        findhelp: [0.46, 0.44]
        Unite Us: [0.62, 0.70]
        Upside: [0.79, 0.83]
        Proposed startup: [0.87, 0.89]
  fiveForces:
    supplierPower:
      score: 4
      rationale: >-
        Housing inventory, voucher pathways, and concierge capacity are scarce and local, so the
        service is constrained by off-platform supply more than by software alone.
      sourceRefs:
        - 98
        - 97
        - 116
    buyerPower:
      score: 4
      rationale: >-
        CHRO and benefits buyers already have substitute budgets in EAP and mental-health
        categories, so a new vendor must show clear incremental ROI or fit inside existing channels.
      sourceRefs:
        - 108
        - 104
        - 110
    threatOfEntrants:
      score: 3
      rationale: >-
        The software layer is reproducible, but local housing operations, referral closure data, and
        employer-workflow integration raise the bar above a pure SaaS clone.
      sourceRefs:
        - 79
        - 18
        - 37
    threatOfSubstitutes:
      score: 5
      rationale: >-
        EAPs, mental-health vendors, health plans, and social-care referral platforms can all
        present themselves as “good enough” alternatives even when they stop short of actual housing
        placement.
      sourceRefs:
        - 2
        - 68
        - 54
        - 39
    competitiveRivalry:
      score: 4
      rationale: >-
        Direct rivalry is still emerging, but adjacent vendors are well funded, already distributed,
        and can extend into housing once employer demand is proven.
      sourceRefs:
        - 1
        - 11
        - 30
        - 126
  pestle:
    - factor: political
      impact: positive
      point: >-
        Federal and state attention to SDOH and whole-person care keeps housing in the policy
        conversation, which helps category legibility.
      sourceRefs:
        - 100
        - 102
        - 125
    - factor: economic
      impact: negative
      point: >-
        Rising housing costs and constrained supply raise the urgency of the problem but also make
        placement execution harder and costlier.
      sourceRefs:
        - 98
        - 116
        - 117
    - factor: social
      impact: positive
      point: >-
        The health impacts of housing instability are well documented, making the category more
        credible than a purely speculative wellness add-on.
      sourceRefs:
        - 118
        - 119
        - 120
    - factor: technological
      impact: positive
      point: >-
        HRIS APIs and social-care infrastructure make it technically realistic to detect risk
        earlier and coordinate follow-through inside existing employer workflows.
      sourceRefs:
        - 79
        - 82
        - 84
        - 19
    - factor: legal
      impact: negative
      point: >-
        Wellness, privacy, and benefit-plan rules make voluntariness, consent, and role separation
        central to product design.
      sourceRefs:
        - 89
        - 90
        - 92
        - 93
        - 95
    - factor: environmental
      impact: neutral
      point: >-
        Climate and disaster shocks can worsen displacement risk, but they create episodic demand
        rather than a stable standalone GTM wedge.
      sourceRefs:
        - 98
        - 100
  adoptionFrictionMatrix:
    - friction: HR buyer skepticism that housing belongs in employer scope
      severity: high
      affectedBuyer: CHRO / VP Benefits
      mitigation: Sell against retention and absence outcomes, not abstract SDOH rhetoric.
      sourceRefs:
        - 2
        - 108
        - 10
    - friction: Privacy and wellness-program design concerns
      severity: high
      affectedBuyer: Legal, privacy, benefits operations
      mitigation: >-
        Use voluntary flows, minimize employer-visible sensitive data, and separate case handling
        from HR decision-making.
      sourceRefs:
        - 89
        - 93
        - 95
    - friction: Housing supply bottlenecks in target metros
      severity: high
      affectedBuyer: Program operator / finance
      mitigation: >-
        Launch where partner density and subsidy pathways are strongest before making aggressive SLA
        guarantees.
      sourceRefs:
        - 97
        - 98
        - 116
    - friction: Integration drag across HRIS and benefits systems
      severity: medium
      affectedBuyer: Benefits ops / IT
      mitigation: >-
        Start with one or two major HRIS connectors and use event-triggered workflows rather than
        deep custom implementations.
      sourceRefs:
        - 79
        - 82
        - 84
market:
  tam:
    value: $2.8B
    rationale: >-
      Conservative modeled TAM = 39.0M self-insured plan participants reported by DOL × 60% assumed
      employee share × $10 PEPM × 12 months = about $2.8B annualized.
    isEstimate: true
    sourceRefs:
      - 106
      - 104
  sam:
    value: $420.0M
    rationale: >-
      Beachhead SAM applies a 15% filter to TAM for the narrower CA/TX, high-cost-metro, 5k-15k
      self-insured employer wedge: $2.8B × 15% ≈ $420M.
    isEstimate: true
    sourceRefs:
      - 106
      - 117
      - 116
  som:
    value: $27.0M
    rationale: >-
      Modeled year-3 SOM assumes 30 landed employers × 7,500 eligible workers average × $10 PEPM ×
      12 months = $27.0M ARR-equivalent.
    isEstimate: true
    sourceRefs:
      - 104
      - 79
      - 2
bottomUpSizingDrivers:
  - driver: Self-insured participants in filed group health plans
    value: 39.0M participants
    source: '[106]'
  - driver: Modeled employee-only share of participant base
    value: 60%
    source: calc
  - driver: PEPM midpoint used for market model
    value: $10 PEPM
    source: est.
  - driver: Beachhead filter for CA/TX + 5k-15k self-insured employers
    value: 15% of TAM
    source: calc
  - driver: Year-3 land-and-expand assumption
    value: 30 employers × 7,500 employees
    source: est.
