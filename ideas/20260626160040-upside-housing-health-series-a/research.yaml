      sourceRefs:
        - 98
        - 116
        - 97
competitors:
  - name: Upside
    stage: scale-up
    wedge: >-
      Housing stabilization sold through healthcare and payer channels with hands-on placement and
      concierge execution.
    pricing: Custom enterprise pricing; no public rate card found.
    strength: Most directly proves that housing navigation can be contracted and staffed at scale.
    weaknessVsUs: >-
      Still framed primarily around member health and payer ROI rather than HR-native retention
      workflows.
    sourceRefs:
      - 1
      - 2
      - 8
      - 9
  - name: Unite Us
    stage: incumbent
    wedge: >-
      Whole-person-care infrastructure centered on screening, referral closure, and community
      network data.
    pricing: >-
      Custom enterprise pricing; public site emphasizes demos and contracts rather than list
      pricing.
    strength: Broad network, interoperability, and payer/provider credibility.
    weaknessVsUs: >-
      More infrastructure-like than benefit-like; does not natively own the employer
      housing-retention narrative.
    sourceRefs:
      - 11
      - 18
      - 27
      - 14
  - name: findhelp
    stage: incumbent
    wedge: Social-care search, benefits, and referral network with employer and payer packaging.
    pricing: >-
      Public pricing pages exist but route to packaged enterprise plans rather than transparent seat
      or PEPM pricing.
    strength: >-
      Large directory-style network and mature product surface across employers, payers, and
      community organizations.
    weaknessVsUs: >-
      Closer to navigation infrastructure and benefits discovery than to guaranteed housing
      placement and retention outcomes.
    sourceRefs:
      - 30
      - 33
      - 39
      - 46
  - name: Lyra Health
    stage: scale-up
    wedge: >-
      Employer mental-health and care-navigation platform with strong benefits distribution and
      outcomes reporting.
    pricing: Custom contract pricing; site pushes quote requests and ROI tools rather than public pricing.
    strength: >-
      Deep employer distribution, benefits-consultant relationships, and strong perceived legitimacy
      with CHRO buyers.
    weaknessVsUs: >-
      Core value prop is mental health and care access, not housing inventory, subsidy, or move-in
      orchestration.
    sourceRefs:
      - 54
      - 58
      - 65
      - 59
  - name: Spring Health
    stage: scale-up
    wedge: Employer EAP and mental-health platform with strong employer-sales motion and ROI framing.
    pricing: Custom enterprise pricing; no public price card found.
    strength: >-
      Clear employer positioning, outcomes marketing, and an EAP wedge that already fits benefits
      procurement.
    weaknessVsUs: >-
      Still a substitute rather than a direct housing operator; it can triage stress and burnout but
      not secure housing supply.
    sourceRefs:
      - 69
      - 68
      - 70
      - 72
regulatoryTechnicalConstraints:
  - point: >-
      Screening must be structured as voluntary and privacy-sensitive because employer wellness
      rules constrain how medical or related information is collected and incentivized.
    sourceRefs:
      - 93
      - 94
      - 92
  - point: >-
      If health or case data are commingled with benefits operations, HIPAA-style privacy and
      security expectations become central to architecture and contracts.
    sourceRefs:
      - 89
      - 90
      - 91
  - point: >-
      California privacy rules add extra sensitivity for employer programs that touch personal and
      household information in a large launch market.
    sourceRefs:
      - 95
      - 96
  - point: >-
      Operationally, the platform is only as good as its ability to integrate HR workflows while
      maintaining separation between case support and employment decision-making.
    sourceRefs:
      - 79
      - 82
      - 84
validationSignals:
  - point: >-
      Upside explicitly markets employers and benefits leaders as a buyer class, which de-risks the
      claim that the workforce channel is addressable.
    sourceRefs:
      - 2
      - 1
  - point: >-
      The best public evidence for ROI comes from payer-side housing navigation, suggesting the
      intervention itself is real even if the employer packaging is still emerging.
    sourceRefs:
      - 8
      - 9
  - point: >-
      The market already supports sophisticated social-care software and integrations, so building
      the workflow layer is more execution challenge than technical impossibility.
    sourceRefs:
      - 18
      - 35
      - 79
  - point: >-
      Public research consistently links housing instability to worse health outcomes, which
      strengthens the claims-avoidance portion of the employer value proposition.
    sourceRefs:
      - 118
      - 120
      - 121
openQuestions:
  - >-
    Will CHROs treat housing stabilization as a legitimate retention benefit, or will they insist it
    live inside a health-plan or EAP bundle?
  - >-
    What minimum placement success rate is needed before employers trust a retention guarantee
    enough to renew after a pilot?
  - >-
    Which launch metros offer the best mix of employer density, affordable-inventory pathways, and
    local housing-partner capacity?
  - >-
    How much sensitive case data can stay with the service layer while still giving HR enough
    visibility to justify budget and renewal?
