  tailwinds:
    - point: >-
        Housing instability is increasingly treated as a health and cost problem, which makes
        employer experimentation more plausible than even a few years ago.
      sourceRefs:
        - 1
        - 8
        - 100
    - point: >-
        Employers already buy adjacent benefits and have the workflow surfaces needed to insert
        screening and navigation triggers.
      sourceRefs:
        - 108
