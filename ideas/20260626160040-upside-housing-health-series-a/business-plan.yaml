slug: workforce-housing-stability-platform
date: "2026-06-26"
executiveSummary: >-
  Workforce housing stability platform is an employer-purchased housing
  navigation benefit for self-insured companies that are already paying the
  cost of housing instability through turnover, absenteeism, and avoidable
  claims. The beachhead is self-insured healthcare and tech-enabled employers
  with 5,000-15,000 employees in Texas metros, where housing pressure is high
  but placement operations are more feasible than in the most supply-constrained
  coastal markets. The first product is not a broad social-care platform; it is
  a voluntary housing-risk screen embedded in open enrollment and selected HRIS
  events, paired with concierge-led placement support and a retention dashboard
  for HR. The GTM system is designed around one buyer moment: a CHRO or VP
  Benefits facing Q4 benefit renewal or attrition spikes and needing a more
  defensible alternative to EAP counseling utilization metrics. Research and
  the input idea support the intervention itself because payer-channel vendors
  have shown housing navigation can be contracted with ROI, but they do not yet
  prove that employers will buy this directly at scale. The plan therefore
  starts with design partners, broker and TPA influence, and two launch metros
  before broader geographic or segment expansion. The biggest disconfirming
  risks are employer scope skepticism and the possibility that housing supply
  constraints break promised placement SLAs before the software is differentiated.
  Public inputs do not provide a mature direct employer pricing benchmark for
  this exact product, so pilot pricing and conversion thresholds must be tested
  early rather than assumed.
problem:
  - Self-insured employers absorb the cost of housing instability in workforce attrition and claims, but HR teams usually learn about the problem only after an employee is already missing work, resigning, or entering crisis.
  - EAPs, mental-health platforms, and social-care referral tools can screen or counsel, but they do not combine HR workflow triggers, real housing navigation, and retention-based proof that a CHRO can defend in one budget cycle.
solution:
  - Embed a voluntary housing-risk screen in open enrollment, leave, relocation, and offboarding workflows, then route flagged employees to an AI-assisted housing concierge that matches inventory, subsidy pathways, and local partners.
  - Sell the program as a PEPM benefit with placement fees and outcome dashboards tied to placement speed and 90-day retention, so the first renewal decision is based on stabilized employees rather than counseling utilization.
whyWeWin:
  - We use a payer-proven intervention but package it for the employer budget owner who feels turnover immediately, creating a shorter proof loop than medical-loss-reduction sales through health plans.
  - If the company captures HRIS trigger data, metro-by-metro placement data, landlord responsiveness, and retention outcomes in one workflow, it can build a moat that neither EAP incumbents nor generic referral networks own today.
strategicChoices:
  beachhead: >-
    Self-insured healthcare and tech-enabled employers with 5,000-15,000
    employees in Austin, Dallas, and Houston using Workday or ADP, with Q4
    benefit-renewal pressure and measurable hourly or mid-salary workforce
    turnover tied to housing cost stress.
  wedgeRationale: >-
    Open-enrollment and selected HRIS-event screening creates a faster proof
    path than a broad wellness benefit because it gives the team a named buyer,
    a recurring budget window, and a small enough workflow to measure placement
    and 90-day retention within one renewal cycle.
  sequencingRationale: >-
    Product should start with one voluntary screening flow, two core HRIS
    connectors, and two metros because housing operations are the rate limiter;
    GTM should start with direct design partners and broker or TPA-introduced
    deals because pure cold-start employer sales are less credible than selling
    through existing benefits relationships; hiring should prioritize housing
    operations and solutions implementation before scaling sales headcount.
  notYet:
    - Selling first through health plans, where the buyer, KPI set, and sales cycle are different from the employer-retention wedge.
    - National rollout into San Francisco and New York before metro supply and partner capacity prove the 30-day placement model.
    - Broad consumer housing search, family relocation services, or a general social-care platform beyond the employer retention use case.
market:
  tam: >-
    Estimated $2.8B annual TAM based on the research model of 39.0M
    self-insured plan participants, a 60% employee-share assumption, and a $10
    PEPM benefit price.
  sam: >-
    Estimated $420.0M SAM for the narrower CA/TX-inspired but operationally
    Texas-first wedge of 5,000-15,000 employee self-insured employers in
    housing-stressed metros.
  som: >-
    Estimated $27.0M year-3 SOM based on 30 landed employers averaging 7,500
    eligible employees at roughly $10 PEPM annualized.
  segments:
    - Self-insured healthcare and tech-enabled employers with concentrated workforces in housing-stressed Texas metros.
    - Brokers, TPAs, and PEOs that aggregate self-insured employer demand and can package the benefit across multiple accounts.
  buyingProcess: >-
    The process starts with a VP Benefits or CHRO around open enrollment,
    EAP renewal, or an attrition spike, then expands to benefits operations,
    legal, privacy, and finance review because the product touches sensitive
    employee data and benefit design. The deal closes when the buyer believes a
    metro-specific pilot can show placement and retention improvement inside one
    renewal cycle without exposing managers to case-level sensitive data.
product:
  mvp: >-
    MVP covers one voluntary screening flow, Workday and ADP event ingestion,
    employee intake, concierge case management, housing inventory matching,
    partner referral tracking, and employer dashboards for placement speed and
    90-day retention in two launch metros. It deliberately excludes deep claims
    integration, carrier workflows, and national housing coverage.
  sixMonth: >-
    Ship production-ready Workday and ADP connectors, a housing concierge
    console, landlord and nonprofit partner workflow, and employer dashboards
    for screening volume, referral acceptance, placement time, and 90-day
    retention.
  twelveMonth: >-
    Add Rippling support, broker and TPA reporting, placement-SLA forecasting by
    metro, and configurable employer privacy controls that keep case detail out
    of manager decision workflows.
  twentyFourMonth: >-
    Expand into additional Sun Belt and selected California metros, add
    multi-employer channel packaging for TPAs and PEOs, and layer benchmark
    analytics on placement success, retention lift, and partner performance by
    metro and employer segment.
  keyBets:
    - Employers will treat housing stabilization as a retention and productivity benefit when the program is sold against a near-term renewal or attrition trigger.
    - Two-metro supply density and partner coverage are enough to support a credible 30-day placement promise for the first employer cohort.
    - Productized HRIS triggers and privacy-safe reporting can make deployment repeatable without turning the company into a services-heavy consultancy.
gtm:
  wedge: >-
    Sell a paid pilot around Q4 open enrollment or EAP renewal that screens a
    defined employee population in one metro, routes accepted cases to housing
    navigation, and converts to a broader PEPM contract if placement speed and
    90-day retention targets are met.
  channels:
    - Founder-led direct sales to CHRO, Chief People Officer, and VP Benefits design partners.
    - Benefits brokers and consultants who already shape EAP and wellness renewals.
    - TPAs and PEOs as second-step distribution once the pilot playbook is repeatable.
  funnelTargets: "Lead→qualified pilot 15-25%, qualified pilot→paid pilot 40%+, paid pilot→production 50%+, production employer→multi-metro or channel expansion within 12 months in 30%+ of accounts."
  pricing: >-
    Price the product as roughly $8-$15 PEPM for eligible employees plus a
    $500-$1,000 fee per verified housing placement, with pilot pricing sized to
    prove that one stabilized employee is worth far more than program cost given
    the avoided turnover event described in the input idea.
businessModel:
  revenueStreams:
    - PEPM subscription for eligible employees covered by the housing-stability benefit.
    - Performance fees for verified placements that meet program criteria.
    - White-label or channel packaging for TPAs, PEOs, and selected benefits intermediaries.
  unitOfValue: Eligible employee covered by the benefit, with expansion measured by stabilized employees and additional employer populations.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one metro and employee cohort to multiple metros within the same employer.
    - Move from direct employer sales into TPA, broker, and PEO distribution.
    - Add benchmark analytics and channel reporting once placement and retention data accumulate.
strategyMap:
  northStarMetric: Employees placed into stable housing and still active at 90 days.
  inputMetrics:
    - Screening completion rate in eligible enrollment or HRIS-event workflows.
    - Flagged employee opt-in rate to housing navigation.
    - Median referral-to-placement days by metro.
    - 90-day retention rate for placed employees.
    - Paid pilot to production conversion rate.
  moatsToBuild:
    - HRIS-trigger to placement-outcome dataset by employer segment and metro.
    - Proprietary record of landlord, subsidy, and nonprofit partner responsiveness by case type.
    - Broker, TPA, and employer implementation playbooks that reduce deployment and renewal friction.
  killCriteria:
    - If fewer than 5 of the first 20 target employers agree to a design-partner process, employer scope and urgency are weaker than the thesis assumes.
    - If the first 25 accepted cases in launch metros do not achieve at least a 50% placement rate within 30 days, the operating model is not yet viable.
    - If no paid pilot converts to a production PEPM contract by month 12, direct employer willingness to pay is too weak for this wedge.
  mermaid: |
    flowchart LR
      Wedge[Q4 enrollment and HRIS trigger wedge] --> MVP[Voluntary screen plus housing navigation MVP]
      MVP --> Proof[Placement speed and 90-day retention proof]
      Proof --> Expansion[TPA and broker channels plus multi-metro expansion]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: Strong wedge and adjacent proof exist, but conviction depends on whether employers buy direct and whether launch-metro operations can hold SLA quality.
    whyBelieve: The company targets a real budget owner and a narrow renewal-triggered workflow where retention proof can appear faster than in payer-channel housing sales.
    whyDoubt: Employer adoption, privacy design, and housing supply execution could all fail before software differentiation compounds into a moat.
    nextDiligence: Validate two paid design-partner pilots in Texas with explicit placement and 90-day retention targets before underwriting broad employer demand.
  firstCustomer:
    title: VP Benefits at a self-insured Texas healthcare employer
    profile: An 8,000-employee employer using Workday, facing frontline and mid-skill attrition in Austin and Dallas, with EAP renewal and workforce-stability pressure in the next benefits cycle.
    trigger: Q4 benefits renewal or a recent attrition spike that exposes housing stress in a critical employee population.
    buyer: CHRO or Chief People Officer
    initialContract: >-
      $50k-$100k pilot for one metro and one defined employee cohort, converting
      to roughly $500k-$900k annual PEPM contract value if the employer renews on
      placement speed and 90-day retention results.
  mustBeTrue:
    - CHRO and VP Benefits buyers will treat housing stabilization as a legitimate retention benefit instead of pushing the problem to the health plan or EAP vendor.
    - Voluntary screening inside enrollment and HRIS events can generate enough opt-in volume to produce statistically useful pilot proof.
    - Two launch metros can sustain placement quality without blowing up gross margin or missing the 30-day promise.
    - Broker, TPA, or PEO channels will amplify distribution after the first direct employer wins instead of demanding a fully white-labeled services model.
    - Early outcome data will become more valuable than a generic referral directory and remain defensible if adjacent vendors add housing features.
  diligenceQuestions:
    - Which employee cohorts produce the clearest retention ROI first: frontline healthcare staff, mid-income tech operations staff, or another segment?
    - What exact privacy and wellness-program design objections emerge from employer counsel during pilot procurement?
    - What placement rate and time-to-placement threshold is required for a CHRO to renew on a PEPM basis?
    - Can brokers or TPAs repeatedly bring qualified pilots, or will the company remain dependent on founder-led direct sales?
    - How quickly could Upside, findhelp, or EAP incumbents replicate the employer-facing workflow once the wedge is proven?
operatingAssumptions:
  - assumption: Employers will buy this as a retention benefit if the pilot is tied to open enrollment, renewal, or a visible attrition problem.
    basis: research.yaml
    validationTest: Secure at least 3 paid pilots from employers that name retention or absenteeism as the primary buying reason rather than social-impact branding.
    decisionImpact: If false, the company should shift toward broker-led white-label distribution or abandon direct employer GTM.
  - assumption: A voluntary screening flow can produce enough accepted cases to prove ROI without forcing employers into invasive data collection.
    basis: operator judgment
    validationTest: In the first 2 pilots, achieve at least 10% screening completion and 25 accepted navigation cases combined while maintaining employer privacy constraints.
    decisionImpact: If false, the wedge will not generate enough signal, so the company must narrow to higher-risk cohorts or redesign triggers.
  - assumption: Launch-metro partner capacity is sufficient to place a meaningful share of accepted cases within 30 days.
    basis: idea.yaml
    validationTest: Track the first 25 accepted cases and confirm at least 50% reach verified placement within 30 days in the first 2 metros.
    decisionImpact: If false, expansion should pause until supply partnerships improve and SLA language is loosened.
  - assumption: Workday and ADP integrations can be productized with limited custom engineering.
    basis: research.yaml
    validationTest: Complete 3 employer deployments with the same core connector workflow and less than 2 engineer-weeks of custom work per deployment.
    decisionImpact: If false, services load will compress margins and the product scope must narrow before scaling sales.
  - assumption: Brokers and TPAs will introduce pilots once they see a CFO-defensible retention story.
    basis: research.yaml
    validationTest: Sign at least 2 channel partners that each deliver one qualified pilot opportunity within 9 months.
    decisionImpact: If false, growth planning should assume a slower direct-sales model and a smaller near-term SOM.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 CHRO and VP Benefits prospects in Texas healthcare and tech-enabled employers around Q4 renewal planning.
    hypothesis: At least 8 prospects will describe housing instability as a retention or attendance problem worth piloting.
    successMetric: 8 qualified prospects with a named renewal or attrition trigger and willingness to review a pilot proposal.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Prototype the voluntary screen and privacy-safe employer dashboard with 4 design-partner prospects.
    hypothesis: Buyers will prefer retention-oriented reporting with case-detail separation over generic utilization dashboards.
    successMetric: 3 prospects approve the data-boundary design for pilot procurement.
    owner: Founder product
  - horizon: 0–90 days
    experiment: Build the first Workday and ADP trigger flows plus concierge case-management workflow for two Texas metros.
    hypothesis: The team can reach first employee referral within 30 days of pilot kickoff without custom integration work dominating the timeline.
    successMetric: 2 live employer pilots generate referrals within 30 days of contract start.
    owner: Founding eng
  - horizon: 3–6 months
    experiment: Recruit landlord, nonprofit, and voucher-pathway partners in Austin and Dallas and measure placement conversion.
    hypothesis: A curated partner network can deliver at least 50% placement within 30 days for accepted cases.
    successMetric: 25 accepted cases with 50%+ verified placement within 30 days.
    owner: Head of housing operations
  - horizon: 3–6 months
    experiment: Convert design partners into paid pilots with explicit retention and placement success criteria.
    hypothesis: Employers will pay before long-term claims proof if the pilot contract is tied to retention economics.
    successMetric: 3 paid pilots signed at "$50k+" each.
    owner: Founder CEO
  - horizon: 6–12 months
    experiment: Launch the first broker or TPA-led pilot package and compare conversion against founder-led direct deals.
    hypothesis: Intermediary distribution can reduce category-creation friction without materially lowering win quality.
    successMetric: 2 channel-sourced pilots and at least 1 conversion to production.
    owner: Head of partnerships
operations:
  - Build metro-specific housing partner rosters before promising employer SLAs, and review landlord responsiveness and subsidy pathways weekly.
  - Keep sensitive case management in the service layer while giving employers aggregated retention and placement reporting only.
  - Standardize Workday and ADP deployment playbooks so benefits ops teams can launch with minimal custom IT work.
  - Run every employer account with a named benefits owner, privacy owner, and local housing-operations lead.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led employer sales, broker relationships, and pilot packaging because the first contracts require category education and fast iteration.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the first HRIS triggers, employer dashboard, and case-management backbone needed for live pilots.
  - role: Head of housing operations
    startTiming: Month 1
    rationale: Supply-side execution is the bottleneck, so the company needs metro partner development and SLA ownership before scaling demand.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Reduce deployment friction across employers and codify repeatable implementation playbooks.
  - role: Head of partnerships
    startTiming: Month 8
    rationale: Broker, TPA, and PEO channels matter only after direct pilots prove the retention story and implementation path.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 6-8 design partners and convert at least 3 into paid pilots.
      - Launch Austin and Dallas first, with Houston ready as the third metro only after partner capacity is proven.
      - Prove 50%+ placement within 30 days on the first 25 accepted cases and show early 90-day retention evidence.
      - Convert at least 1 pilot into a production PEPM contract before expanding GTM spend.
  - horizon: 12–24 months
    items:
      - Add Rippling and channel reporting, then expand through 2-3 broker or TPA relationships.
      - Reach 10-15 production employers across multiple Texas and selected California metros.
      - Publish benchmark retention and placement reporting by metro and employee cohort.
      - Tighten privacy controls and operational dashboards so deployments remain productized rather than services-led.
  - horizon: 24–36 months
    items:
      - Expand into additional Sun Belt metros and selected California employers with proven partner density.
      - Make multi-employer packaging through TPAs or PEOs a meaningful share of new bookings.
      - Build a defensible data asset around employer-triggered housing stabilization outcomes without broadening into a generic social-care platform.
risks:
  - risk: Employers may still view housing as outside company scope and prefer to leave the issue with health plans or EAP vendors.
    likelihood: High
    impact: High
    mitigation: Lead with retention economics, pilot against renewal events, and use brokers or TPAs to frame the benefit inside existing employer purchasing motions.
  - risk: Housing supply constraints in launch metros may break placement promises and force gross-margin-heavy manual work.
    likelihood: High
    impact: High
    mitigation: Launch only in metros with verified partner density, cap pilot volume, and delay expansion until placement data supports the SLA.
  - risk: Privacy and wellness-program design concerns may slow procurement or narrow usable employee data.
    likelihood: Medium
    impact: High
    mitigation: Use voluntary participation, strict role separation, and aggregated employer reporting from day one.
  - risk: Upside, findhelp, or EAP incumbents could bundle a similar service after the startup proves employer demand.
    likelihood: Medium
    impact: High
    mitigation: Move quickly on HRIS workflow embedding, renewal-linked proof, and metro-specific outcome data that adjacent vendors do not already own.
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of runway to ship productized Workday and ADP deployments,
    stand up two launch metros with real housing partner capacity, win 6-8
    design partners, convert at least 3 into paid pilots, and prove the first
    production PEPM renewal.
