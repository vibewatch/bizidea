competitors:
  - name: Upside
    stage: scale-up
    wedge: 通过医疗和付款方渠道销售的住房稳定服务，配备亲力亲为的安置执行和顾问团队。
    pricing: 定制企业定价；未发现公开价目表。
    strength: 最直接证明了住房导航可以在规模上签约和配置人员。
    weaknessVsUs: 主要仍以成员健康和付款方 ROI 为框架，而非 HR 原生留用工作流。
    sourceRefs:
      - 1
      - 2
      - 8
      - 9
  - name: Unite Us
    stage: incumbent
    wedge: 以筛查、转介闭环和社区网络数据为核心的全人护理基础设施。
    pricing: 定制企业定价；公开网站强调演示和合同，而非列表定价。
    strength: 广泛的网络、互操作性及付款方/提供者可信度。
    weaknessVsUs: 更像基础设施而非福利产品；本质上不具备雇主住房留用叙事。
    sourceRefs:
      - 11
      - 18
      - 27
      - 14
  - name: findhelp
    stage: incumbent
    wedge: 面向雇主和付款方打包的社会关怀搜索、福利和转介网络。
    pricing: 有公开定价页面，但路由至企业打包方案，而非透明的按席位或 PEPM 定价。
    strength: 大型目录式网络和成熟的产品面，覆盖雇主、付款方和社区组织。
    weaknessVsUs: 更接近导航基础设施和福利发现，而非有保障的住房安置和留用结果。
    sourceRefs:
      - 30
      - 33
      - 39
      - 46
  - name: Lyra Health
    stage: scale-up
    wedge: 面向雇主的心理健康和护理导航平台，具备强大的福利分发和结果报告能力。
    pricing: 定制合同定价；网站推动报价请求和 ROI 工具，而非公开定价。
    strength: 深度雇主分发、福利顾问关系，以及在 CHRO 买家中的强烈感知合法性。
    weaknessVsUs: 核心价值主张是心理健康和护理可及性，而非住房库存、补贴或搬迁编排。
    sourceRefs:
      - 54
      - 58
      - 65
      - 59
  - name: Spring Health
    stage: scale-up
    wedge: 面向雇主的 EAP 和心理健康平台，具备强大的雇主销售动作和 ROI 框架。
    pricing: 定制企业定价；未发现公开价目表。
    strength: 清晰的雇主定位、结果营销，以及已嵌入福利采购的 EAP 切口。
    weaknessVsUs: 仍是替代品而非直接住房运营商；可以分诊压力和倦怠，但无法保障住房供给。
    sourceRefs:
      - 69
      - 68
      - 70
      - 72
regulatoryTechnicalConstraints:
  - point: 筛查必须设计为自愿且隐私敏感，因为雇主健康计划规则约束了如何采集和激励医疗或相关信息。
    sourceRefs:
      - 93
      - 94
      - 92
  - point: 若健康或案例数据与福利运营混合，HIPAA 式隐私和安全要求将成为架构和合同的核心内容。
    sourceRefs:
      - 89
      - 90
      - 91
  - point: 加州隐私规则对触及个人和家庭信息的雇主项目增加了额外敏感度，而该州是主要首发市场之一。
    sourceRefs:
      - 95
      - 96
  - point: 从运营角度看，平台的价值取决于能否在整合 HR 工作流的同时，将案例支持与雇用决策分离。
