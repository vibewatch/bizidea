validationSignals:
  - point: Upside 明确将雇主和福利负责人列为买家群体，从而降低了劳动力渠道可触达的风险。
    sourceRefs:
      - 2
      - 1
  - point: 最佳的公开 ROI 证据来自付款方侧住房导航，表明干预本身是真实的，即使雇主打包仍在形成中。
    sourceRefs:
      - 8
      - 9
  - point: 市场已经支持成熟的社会关怀软件和集成，因此构建工作流层是执行挑战，而非技术不可能。
    sourceRefs:
      - 18
      - 35
      - 79
  - point: 公开研究一致将住房不稳定与更差的健康结果挂钩，这强化了雇主价值主张中理赔规避的部分。
    sourceRefs:
