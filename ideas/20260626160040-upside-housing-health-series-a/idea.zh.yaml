problem: >-
  自保险雇主在不知情的情况下通过员工流失、缺勤和超额损失理赔承担住房不稳定的下游成本，
  而 HR 和福利团队没有任何预警系统来识别危机前的高风险员工。EAP 提供财务辅导，
  但无法将员工实际安置到稳定住所，住房不稳定员工 11–22 个百分点的失业风险完全无人拦截。
  目前市场上没有专为雇主端设计的平台，能以可量化、可合同化的留用结果拦截这一风险，
  并给 CFO 足够的信心批准干预项目的预算。
targetUser:
  primary: 高生活成本城市中员工规模 2,000–20,000 人的自保险雇主的福利副总裁或 CHRO
  secondary: 管理自保险雇主账户的第三方福利管理人和 PEO 平台
  buyer: 对福利预算和 EAP 供应商合同拥有决策权的 CHRO 或首席人事官
startupThesis:
  nonObviousInsight: >-
    Upside 的 A 轮融资证明住房导航对医疗付款方而言是可合同化、ROI 为正的干预，
    但同样的不稳定性既带来 6.7 天对比 4.8 天的住院差距，也带来 11–22 个百分点的
    失业概率——这让 CHRO/CFO 成为更优先的第一买家：离职成本立即计入人力资源预算，
    而非缓慢摊销在多年理赔数据中，将销售周期从 18 个月压缩到 Q4 单一福利续约季度。
  beachhead: >-
    加利福尼亚州和德克萨斯州员工规模 5,000–15,000 人的自保险科技和医疗雇主——
    住房成本使不稳定性问题更为紧迫，人员更替成本也最高
  wedge: >-
    住房风险筛查嵌入年度福利报名和 HRIS 离职流程，在住房危机触发缺勤或离职之前
    将高风险员工呈现给 HR 业务伙伴
  whyNowCatalyst: >-
    Upside 完成 $20M A 轮融资（2026 年 6 月），并通过 17+ 家健康险计划提供了 4x ROI
    实证，验证了住房导航干预模式，同时表明构建雇主直接产品所需的基础设施现已可授权
    或白标使用，无需从零重建安置物流。
  ventureScalePath: >-
    从大型自保险雇主切口出发，扩展至管理多雇主人群的 PEO，再到在团体健康险上提供
    住房稳定附加险的商业保险公司——最终覆盖整个雇主健康福利体系。
solution: >-
  一个将住房风险筛查嵌入 HR 工作流的 SaaS 平台，由 HRIS 事件触发（入职、年度报名或
  离职面谈），将被标记员工与 AI 引导的住房导航专员对接——专员负责匹配经济适用房房源、
  协调福利可覆盖的住房援助，并在 30 天内完成安置。雇主按 PEPM 订阅，获得展示住房安置
  情况、90 天留用率和避免离职成本的结果仪表盘。平台接入精选经济适用房库，整合 Section 8
  HCV 房源、雇主住房援助计划和本地非营利合作伙伴，大幅缩短安置周期。结果以 90 天员工
  留用指标为合同保障依据，为 CHRO 提供可在 CFO 预算评审和年度福利续约中使用的可防御
  ROI 核算。
goToMarketSeed:
  firstCustomer: >-
    旧金山湾区或奥斯汀的自保险科技雇主，员工规模 5,000–12,000 人，Q4 有一份即将续约
    的 EAP 合同，且过去 12 个月有记录在案的离职率峰值
  buyingTrigger: >-
    年度福利开放报名周期（Q4），或因裁员和迁址公开曝光住房脆弱性、令保留员工的 CHRO
    紧迫感显著上升
  currentAlternative: >-
    Lyra Health、Modern Health 或 Beacon 等 EAP 辅导平台——提供财务健康辅导，
    但无法为员工导航或安置住所
  switchingReason: >-
    EAP 厂商以完成辅导的会话数为 KPI，而非减少终止劳动合同；本平台以核实安置和 90 天
    员工留用为合同依据，为 HR 提供向 CFO 汇报的可防御 ROI，而非利用率统计
  pricingHypothesis: >-
    每月每人 $8–$15 的订阅费，加上每次核实安置 $500–$1,000 的绩效费，与每名稳定员工
    至少 $15K+ 的避免离职成本对齐，确保价值超过成本至少 10 倍
whyNow:
  - point: >-
      Upside 的 $20M A 轮融资（2026 年 6 月）配合 17+ 家健康险客户和 12 个月内 4x ROI
      的实证，证明住房导航是可合同化、可规模化的干预——基础设施现已可授权用于雇主直接产品，
      无需从零重建安置物流。
    signalRefs:
