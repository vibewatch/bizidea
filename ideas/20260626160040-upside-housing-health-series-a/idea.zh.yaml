      - 住房导航已在 10 州规模化验证
    sourceRefs: [1]
  - point: >-
      面临住房丧失风险的员工失业概率比同类高出 11–22 个百分点，为 CHRO 提供了无需多年
      理赔归因即可量化的即时成本案例。
    signalRefs:
      - 住房不稳定放大雇主离职风险
    sourceRefs: [3]
  - point: >-
      住房不稳定员工平均住院 6.7 天，有稳定住所员工为 4.8 天——自保险雇主可直接将这一
      差距与超额损失阈值建模，使住房导航在识别风险的同一季度内成为 CFO 可批准的预算项。
    signalRefs:
      - 住院成本差距可由雇主直接量化
    sourceRefs: [3]
  - point: >-
      Upside 已通过健康险渠道服务商业险及雇主赞助人群，证实无需新建安置基础设施即可
      触达雇主员工群体——空白地带就是直接面向 HR 买家的销售动作。
    signalRefs:
      - 雇主员工群体已在住房导航覆盖范围内
    sourceRefs: [2]
  - point: >-
      Flare Capital 将住房称为美国可预防医疗支出中记录最充分的根本原因之一——主流投资人
      的背书表明买方认知正接近临界点，差异化雇主渠道进入者的窗口期正在收窄。
    signalRefs:
      - 付款方 ROI 实证验证买方付费意愿
    sourceRefs: [2]
differentiator: >-
  不同于无安置能力只提供财务辅导的 EAP 厂商，本平台拥有端到端的住房导航工作流，并以
  核实安置结果为合同依据。不同于通过健康险渠道以医疗成本降低为 KPI 销售的 Upside，本
  产品直接面向 HR 和福利团队销售，集成 HRIS、采用 PEPM 定价，以劳动力留用指标为核心——
  买家、预算科目和销售方式根本不同。雇主买家的视角是 30–90 天留用周期，而非多年理赔
  归因窗口，ROI 在单个福利续约周期内即可体现且可证明。
