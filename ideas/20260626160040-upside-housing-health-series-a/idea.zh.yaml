      Inventory --> Placed["Placement Confirmed\nunder 30 Days"]
      Placed --> Dashboard["HR Dashboard\nROI Report"]
      Watch --> Dashboard
businessModelCanvas:
  customerSegments:
    - 高生活成本城市中员工规模 2,000–20,000 人的自保险雇主
    - 管理多雇主账户的 PEO 和第三方福利管理人
    - 寻求 SDOH 附加险的商业团体保险公司
  valuePropositions:
    - 附带合同化 90 天员工留用保障的住房稳定福利
    - HRIS 集成工作流，对现有 HR 工具零干扰
    - 与避免离职成本对齐的基于结果的定价
    - 以专有房源数据为支撑的 30 天住房安置 SLA
  channels:
    - 直接面向 CHRO 和福利副总裁销售
    - 福利经纪人渠道（Mercer、Aon、WTW）
    - PEO 平台合作（TriNet、Justworks、Rippling）
    - 面向雇主赞助人群的健康险嵌入式方案
  customerRelationships:
    - 为企业账户配备专属客户成功经理
    - 提供实时显示安置情况和留用 KPI 的自助 HR 仪表盘
    - 以离职成本基准为对照的季度业务评审
  revenueStreams:
    - "$8–$15 PEPM 订阅费"
    - "每次核实安置 $500–$1,000 的绩效费"
    - 向保险公司和 PEO 授权数据洞察
  keyResources:
    - 整合公开与非公开数据的经济适用房库
    - 基于 HRIS 和福利数据信号训练的 AI 住房风险评分模型
    - 目标城市的持牌住房顾问网络
    - HRIS 集成（Workday、ADP、Rippling、BambooHR）
  keyActivities:
    - 住房房源梳理与房东网络开发
    - AI 风险模型在 HRIS 和福利信号上的训练与校准
    - HRIS 集成维护与新连接器开发
    - 住房顾问招募、培训与质量管理
  keyPartners:
    - 目标城市的 Section 8 和 HCV 房东网络
    - 当地住房非营利组织和经济适用房倡导机构
    - HRIS 平台合作方（Workday、ADP、Rippling）
    - EAP 在位厂商——作为潜在白标渠道合作方
  costStructure:
    - 住房顾问人员成本（随成员安置量弹性伸缩的可变 COGS）
    - AI 平台基础设施和模型训练计算成本
    - 企业销售和 CHRO 渠道市场推广
    - HRIS 集成开发与维护
jobsToBeDone:
  - job: "当员工在福利报名中被识别为住房高风险人员时，帮助 HR 团队将其安置到稳定住所，以便在产生 $15K+ 替换成本之前留住这名技能员工。"
    currentAlternative: 转介至 EAP 财务顾问——顾问提供预算建议但无法落实住房安置
    successMetric: 员工在 30 天内确认完成住房安置；安置后 90 天时员工仍在职
  - job: "当自保险雇主的 CFO 要求为 SDOH 投资提供 ROI 论证时，帮助福利副总裁制作将住房干预与留用人数及避免离职支出挂钩的仪表盘。"
    currentAlternative: 零散的 EAP 利用率数据和无因果归因的手工 HR 报告
    successMetric: CFO 批准预算续约，且每次安置成本低于 $1,500，远优于 $15K+ 的避免离职成本
ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      三个已核实的融资事件来源记录了 $9.3B 年度住院成本、17+ 家付款方客户下的 4x ROI，
      以及住房高风险员工 11–22 个百分点的失业概率——为雇主渠道概念提供了异常扎实的量化证据。
  painIntensity:
    score: 4
    rationale: >-
      雇主离职成本和住房不稳定痛点有充分文献记录且可量化，但雇主渠道的紧迫性比直接驱动
      付款方的临床危机低一个层级——CHRO 需要将住房不稳定与自身损益挂钩，需要一定的教育铺垫。
  wedgeClarity:
    score: 5
    rationale: >-
      HRIS 触发的年度福利报名住房风险筛查是范围明确、可测试的首批用例，有具名的买家事件
      （Q4 开放报名）、清晰的集成点，以及可在扩大规模前验证切口的可量化 30 天安置 SLA。
  defensibility:
    score: 3
    rationale: >-
      住房房源数据层和顾问网络随时间积累形成可防御的护城河，但早期复制风险属中等——
      Upside 这样资金充裕的付款方渠道参与者一旦发现空白地带，可能在 12–18 个月内转型进入
      雇主直接销售。
  ventureScale:
    score: 4
    rationale: >-
      美国自保险雇主市场覆盖约 1.6 亿参保人；以 $10 PEPM 计，在 PEO 和保险公司扩展之前
      可寻址市场超过 $19B——具备风险投资规模，但受 PEPM 上限约束，相对于全面管理型医疗合同
      经济体量仍有局限。
topRisks:
  - name: 雇主采购惰性
    description: >-
      CHRO 可能将住房导航视为超出雇主职责范畴，倾向于将问题留给已持有成员关系且可将住房
      导航捆绑入现有管理型医疗合同的健康险厂商。
    mitigation: >-
      将住房导航定位为离职成本和 CFO 预算工具，而非临床服务；以时限内的试点绑定 Q4 续约，
      在申请全人群部署前先展示 30 天安置 ROI。
  - name: 付款方渠道的侵蚀风险
    description: >-
      Upside 及 Unite Us、findhelp 等新兴 SDOH 平台可能转型直接面向大型自保险雇主销售，
      在公司实现产品市场契合之前挤占独立雇主渠道进入者的空间。
    mitigation: >-
      掌控付款方渠道厂商所缺乏的 HRIS 集成层和 HR 原生工作流；以劳动力留用 KPI 和 PEPM
      定价竞争，抢占结构性不同的买家对话——付款方原生厂商在组织层面难以快速进入。
  - name: 经济适用房供给上限
    description: >-
      高成本城市的经济适用房库存受结构性制约——若雇主需求增长快于房东网络供应能力，
      安置 SLA 将会失效。
    mitigation: >-
      优先在住房可用性相对于不稳定风险最高的阳光地带城市（奥斯汀、凤凰城、亚特兰大）
      起步；在拓展至旧金山和纽约等高生活成本市场之前，超前于雇主需求建立房东供应网络。
