differentiator: >-
  Unlike EAP vendors that provide financial counseling with no placement capability, this platform owns the
  end-to-end housing navigation workflow and contracts on verified placement outcomes. Unlike Upside, which
  sells through health-plan channels using medical cost reduction KPIs, this product is sold directly to
  HR and benefits teams with HRIS integration, PEPM pricing, and workforce retention metrics — a
  fundamentally different buyer, budget line, and sales motion. The employer buyer operates on a 30-90 day
  retention horizon rather than a multi-year claims attribution window, making ROI immediate and provable
  within a single benefits-renewal cycle.
