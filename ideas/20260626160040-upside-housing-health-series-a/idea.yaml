jobsToBeDone:
  - job: "When an employee is identified as housing-at-risk during benefits enrollment, help the HR team navigate that employee to stable housing so they can retain a skilled worker before a $15K+ replacement cost is incurred."
    currentAlternative: Referral to EAP financial counselor who provides budgeting advice but cannot secure housing
    successMetric: Employee housing placement confirmed within 30 days; employee still active at 90 days post-placement
  - job: "When a self-insured employer's CFO requests ROI justification for SDOH investments, help the VP Benefits produce a dashboard linking housing interventions to retained headcount and avoided turnover spend."
    currentAlternative: Anecdotal EAP utilization rates and manual HR reports with no causal attribution to retention
    successMetric: CFO-approved budget renewal with cost-per-placement below $1,500 versus $15K+ avoided turnover cost
ideaScorecard:
  signalStrength:
    score: 5
    rationale: >-
      Three verified funding-event sources document $9.3B annual inpatient cost, 4x ROI with 17+ payer
      customers, and a quantified 11-22pp job-loss probability for housing-at-risk employees — unusually
      strong quantitative evidence grounding the employer-channel concept.
  painIntensity:
    score: 4
    rationale: >-
      Employer turnover cost and housing instability pain are well-documented and quantifiable, but the
      employer-channel urgency is one step removed from the direct clinical crisis that drives payer
      urgency — CHROs must connect housing instability to their own P&L, which requires some education.
  wedgeClarity:
    score: 5
    rationale: >-
      HRIS-triggered housing risk screening at annual benefits enrollment is a narrow, testable first use
      case with a named buyer event (Q4 open enrollment), a clear integration point, and a measurable
      30-day placement SLA to prove the wedge before scaling.
  defensibility:
    score: 3
    rationale: >-
      The housing inventory data layer and concierge network create a defensible moat over time, but
      early-stage replication risk is moderate — a well-funded payer-channel player like Upside could
      pivot to direct employer sales within 12-18 months of recognizing the white space.
  ventureScale:
    score: 4
    rationale: >-
      The US self-insured employer market covers roughly 160M covered lives; at $10 PEPM that is a
      $19B+ addressable market before PEO and carrier expansion — venture-scale but constrained by
      PEPM ceiling relative to full-stack managed-care contract economics.
topRisks:
  - name: Employer adoption inertia
    description: >-
      CHROs may view housing navigation as outside the employer's duty of care and defer to health-plan
      vendors who already hold the member relationship and can bundle housing navigation into existing
      managed-care contracts.
    mitigation: >-
      Frame housing navigation as a turnover-cost and CFO budget tool rather than a clinical service;
      lead with time-bounded pilots tied to Q4 renewals and show 30-day placement ROI before asking
      for full-population deployment.
  - name: Payer-channel encroachment
    description: >-
      Upside and emerging SDOH platforms such as Unite Us and Findhelp may pivot to sell directly to
      large self-insured employers, crowding out a standalone employer-channel entrant before the
      company achieves product-market fit.
    mitigation: >-
      Own the HRIS integration layer and HR-native workflow that payer-channel vendors lack; compete
      on workforce-retention KPIs and PEPM pricing to occupy a structurally different buyer conversation
      that payer-native vendors are organizationally slow to enter.
  - name: Affordable housing supply ceiling
    description: >-
      Affordable housing inventory in high-cost metros is structurally constrained — placement SLAs
      will break if employer demand scales faster than the landlord network supply can absorb.
    mitigation: >-
      Begin in Sun Belt metros (Austin, Phoenix, Atlanta) where housing availability is highest relative
      to instability risk; build landlord supply network ahead of employer demand before expanding to
      HCOL markets like San Francisco and New York.
