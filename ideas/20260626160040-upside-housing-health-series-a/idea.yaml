problem: >-
  Self-insured employers unknowingly absorb the downstream cost of workforce housing instability through employee
  turnover, absenteeism, and stop-loss claims yet HR and benefits teams have no early-warning system to identify
  workers at risk before a crisis hits. EAP programs offer financial counseling but cannot actually navigate
  employees to stable housing, leaving the documented 11-22 percentage-point job-loss risk for housing-unstable
  workers entirely unaddressed. No purpose-built employer-facing platform exists to intercept this risk with
  measurable, contractible retention outcomes that give a CFO confidence to fund the intervention.
targetUser:
  primary: VP of Benefits or CHRO at a self-insured employer with 2,000-20,000 employees in high cost-of-living metros
  secondary: Third-party benefits administrators and PEO platforms managing self-insured employer accounts
  buyer: CHRO or Chief People Officer with discretion over benefits budget and EAP vendor contracts
startupThesis:
  nonObviousInsight: >-
    Upside's Series A proves housing navigation is a contractible, ROI-positive intervention for health payers,
    but the same instability driving 6.7 vs 4.8 hospital days also drives an 11-22pp job-loss probability
    that makes CHRO/CFO a better first buyer: turnover costs are booked immediately to workforce budget rather
    than slowly amortized across multi-year claims data, collapsing the sales cycle from 18 months to a single
    Q4 benefits-renewal quarter.
  beachhead: >-
    Self-insured tech and healthcare employers in California and Texas with 5,000-15,000 employees where housing
    costs make instability acute and turnover replacement costs are highest
  wedge: >-
    Housing risk screening embedded in annual benefits enrollment and HRIS offboarding workflows, surfacing
    at-risk employees to HR business partners before a housing crisis triggers absenteeism or resignation
  whyNowCatalyst: >-
    Upside's $20M Series A (June 2026) and 4x ROI proof-points from 17+ health plans validate the housing
    navigation intervention model and signal that the infrastructure needed for a direct-to-employer product
    is now available to license or white-label without rebuilding from scratch.
  ventureScalePath: >-
    Start with large self-insured employer wedge, then expand to PEOs managing multi-employer populations,
    then to commercial insurance carriers offering housing-stability riders on group health policies —
    eventually spanning the full employer health benefits stack.
solution: >-
  A SaaS platform that embeds housing risk screening into HR workflows, triggered by HRIS events such as
  onboarding, annual enrollment, or exit interviews, and pairs flagged employees with AI-guided housing
  navigation concierges who surface affordable inventory, coordinate benefit-eligible housing assistance,
  and close placement within 30 days. Employers subscribe on a PEPM basis and receive outcome dashboards
  showing housing placements, 90-day retention rates, and avoided turnover cost. The platform connects to
  a curated affordable housing inventory combining Section 8 HCV availability, employer housing assistance
  programs, and local nonprofit partnerships to dramatically shorten time-to-placement versus manual EAP
  referrals. Outcomes are contractually guaranteed against a 90-day employee retention metric, giving
  CHROs a defensible ROI line item for CFO budget reviews and annual benefits-renewal justification.
goToMarketSeed:
  firstCustomer: >-
    Self-insured tech employer in the San Francisco Bay Area or Austin with 5,000-12,000 employees, an EAP
    contract up for renewal in Q4, and a documented attrition spike in the prior 12 months
  buyingTrigger: >-
    Annual benefits open-enrollment cycle (Q4) or a publicized round of layoffs and relocations that exposes
    housing vulnerability in the retained workforce and elevates CHRO urgency
  currentAlternative: >-
    EAP counseling platforms such as Lyra Health, Modern Health, or Beacon that offer financial wellness
    coaching but cannot navigate or place employees in housing
  switchingReason: >-
    EAP vendors track counseling sessions completed, not prevented terminations; this platform contracts on
    verified housing placements and 90-day employee retention, giving HR a defensible ROI line for the CFO
    rather than utilization statistics
  pricingHypothesis: >-
    $8-$15 PEPM subscription plus a $500-$1,000 performance fee per verified housing placement, aligned to
    the $15K+ avoided turnover cost to ensure value exceeds cost by at least 10x per stabilized employee
