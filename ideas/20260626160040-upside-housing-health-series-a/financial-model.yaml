modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Employer and broker leads] --> Pilots[Paid pilots]
      Pilots --> Production[Production PEPM contracts]
      Production --> Placements[Verified housing placements]
      Production --> Revenue[Recurring revenue]
      Placements --> Revenue
      Revenue --> GrossProfit[Gross profit at 70%]
      GrossProfit --> Cash[Cash for hiring and metro expansion]
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by one production conversion in Month 10, 10 production employers by Q4Y2, and 16 by Q4Y3 at a conservative $480K recurring ACV.
- checkName: Must go right
  finding: Pilot-to-production conversion must stay on the six-to-nine-month path while local housing operations remain efficient enough to hold the 70% gross-margin target.
- checkName: Model breaks if
  finding: If conversion slips about two quarters and gross margin settles near 65%, downside cash falls to roughly $60K before the next round.
- checkName: Next-round proof
  finding: The seed round is sized to reach 10-15 production employers, at least one channel-led production win, and productized multi-metro deployment proof for a Series A story.
sanityChecks:
  ruleOf40: Y3 growth 140% + EBITDA margin 8.8% = 148.8%
  burnMultiple: Y2 burn multiple is about 0.2x ($0.81M EBITDA burn on roughly $4.32M net new ARR from 1 to 10 production employers).
  revenuePerFte: $416K Y3 on 15 ending FTE (slightly above the ~$200-400K SaaS benchmark, but plausible for high-ACV enterprise benefit contracts).
  flags:
  - The base case excludes paid-pilot revenue and placement fees, so early topline is conservative but cash efficiency depends heavily on recurring production conversion.
  - Unit economics look strong on paper because each production employer is modeled at $480K recurring ACV; if employers buy only one metro or smaller cohorts, CAC payback will lengthen materially.
  - The downside case nearly exhausts cash, so a two-quarter conversion slip would require either slower hiring or a larger round than the modeled $3.5M seed.
