scenarios:
  downside:
    description: Pilot conversions slip by roughly two quarters, some employers stay at single-metro scope, and service intensity keeps gross margin below target.
    y3RevenueK: 4864.0
    y3EbitdaK: -659.7
    cashLowPointK: 60.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 12 instead of 16.
    - Blended annual ARPU falls to about $456K as more accounts renew at narrower scope.
    - Gross margin holds at 65% and monthly churn rises to 2.8%.
  base:
    description: The company converts one production employer in Year 1, reaches 10 by Q4Y2, and adds channel-assisted growth in Year 3 while holding the 70% gross-margin target.
    y3RevenueK: 6240.0
    y3EbitdaK: 546.6
    cashLowPointK: 1342.6
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 16 with $480K recurring annual ARPU.
    - Gross margin holds at 70% despite housing-navigation operations.
    - Hiring reaches 15 FTE by Q4Y3, with commercial hiring lagging proof of direct and channel demand.
  upside:
    description: Broker and TPA distribution start working in Year 2, direct pilots convert faster, and repeatable implementations lift both scope and gross margin.
    y3RevenueK: 9196.0
    y3EbitdaK: 2799.8
    cashLowPointK: 1905.2
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 20 instead of 16.
    - Blended annual ARPU rises to about $528K as more employers expand across metros and cohorts.
    - Gross margin improves to 72% as integrations and local partner playbooks standardize.
