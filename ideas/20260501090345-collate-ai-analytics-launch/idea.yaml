topRisks:
  - name: Incumbent bundling
    description: BI platforms may add their own basic validation and governance features for chat experiences.
    mitigation: Focus on cross-stack certification across multiple BI tools, catalogs, and semantic layers where vendor-native features are weakest.
  - name: Limited urgency outside early adopters
    description: Some companies may delay chat BI rollouts and keep traditional dashboards, slowing demand.
    mitigation: Sell first to teams with an explicit 2026 conversational analytics mandate or a recent analytics trust incident that creates immediate urgency.
  - name: Sparse market proof
    description: The cluster is anchored in a single verified source, so the category signal could be earlier than it appears.
    mitigation: Run design partnerships with data platform teams already experimenting with chat dashboards and validate through deployment speed, incidents prevented, and expansion into runtime monitoring.
