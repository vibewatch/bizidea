differentiator: >-
  BI vendors will ship chat, but they are incentivized to maximize usage
  inside their own interface, not to certify every answer path across
  heterogeneous catalogs, semantic layers, and permission systems. Generic LLM
  guardrail tools also miss the hard part because they do not understand
  metric lineage, dashboard definitions, or BI-specific access rules. A
  metadata-native release layer can become the neutral system of record for
  whether a conversational analytics answer was allowed, correct, and
  reproducible.
