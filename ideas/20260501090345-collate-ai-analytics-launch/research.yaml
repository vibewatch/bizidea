  validationPlan:
  - priority: high
    question: Will data platform leaders buy a separate pre-launch certification step before enterprise chat BI rollout?
    evidenceToGather: Interview 10-15 Heads of Data Platform running Copilot, Looker, ThoughtSpot, Sigma, or Qlik pilots; ask for incident history, approval workflow, and current QA artifacts.
  - priority: high
    question: 'Which integration becomes the first blocker: catalog, semantic layer, BI permissions, or warehouse roles?'
    evidenceToGather: Run 3 design-partner technical scoping sessions and map time-to-value for each connector plus minimum data needed to simulate restricted questions.
  - priority: medium
    question: Can the product displace in-house scripts rather than getting deferred to the BI vendor roadmap?
    evidenceToGather: Collect current alternative assets such as QA spreadsheets, dbt tests, prompt libraries, and support tickets from pilot prospects.
  - priority: medium
    question: What proof convinces security and legal teams that conversational analytics is safe enough to launch?
    evidenceToGather: 'Document approval criteria from security reviewers: audit logs, lineage evidence, permission simulation results, and model-hosting controls.'
