jobsToBeDone:
- job: 当公司希望让非分析人员通过聊天查询仪表盘时，帮助数据平台团队完成上线认证，从而在不失去数字信任的前提下推出自助式分析。
  currentAlternative: 跨仪表盘、权限和提示词示例的人工测试用例
  successMetric: 安全上线所需时间，以及上线后分析事故工单的减少幅度
- job: 当指标、仪表盘或访问规则发生变化时，帮助分析工程团队找出哪些对话式答案已经不安全或不一致，从而在领导层看到错误数字前修复漂移。
  currentAlternative: 临时 QA、BI 权限审查和支持升级处理
  successMetric: 答案漂移的平均发现时间，以及发布前捕获的高严重级别答案不匹配数量
