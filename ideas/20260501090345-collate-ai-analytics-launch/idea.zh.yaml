differentiator: >-
  BI 厂商当然会补上聊天功能，但它们的激励是最大化自家界面里的使用量，
  而不是为跨异构目录、语义层和权限系统的每一条回答路径做认证。通用的 LLM
  guardrail 工具也碰不到真正难点，因为它们不理解指标血缘、仪表板定义或 BI
  专属访问规则。一层原生依托元数据的发布系统，有机会成为关于某个会话式分析答案
  是否被允许、是否正确、是否可复现的中立系统记录层。
