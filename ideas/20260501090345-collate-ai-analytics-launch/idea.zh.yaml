topRisks:
  - name: 既有厂商捆绑
    description: BI 平台可能会为聊天体验补上一些基础验证与治理能力。
    mitigation: 聚焦跨多种 BI 工具、目录和语义层的跨栈认证场景，因为那里恰恰是厂商原生功能最弱的地方。
  - name: 早期采用者之外的紧迫性有限
    description: 有些公司可能会推迟聊天式 BI 上线，继续沿用传统仪表板，从而拖慢需求。
    mitigation: 先卖给那些已经明确提出 2026 年会话式分析计划，或刚经历过一次分析信任事故、紧迫性立刻拉满的团队。
  - name: 市场验证仍然稀薄
    description: 这个聚类主要锚定在一条经核验来源上，因此品类信号可能比表面看起来更早期。
    mitigation: 与已经在尝试聊天仪表板的数据平台团队做共创合作，并用部署速度、避免的事故数量以及向运行期监控的扩展来验证。