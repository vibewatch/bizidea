problem: >-
  数据平台团队正被要求把每个仪表板都变成聊天体验，但底层 BI
  栈从未为自由提问、边界权限或含糊的指标表述接受过真正检验。一旦
  非分析师也能随便发问，团队就会面临 KPI 回答彼此矛盾、受限数据切片
  被意外暴露，以及大量损害信任的支持工单。靠人工做提示词 QA
  和既有仪表板权限，远不足以为会话式分析上线兜底。
targetUser:
  primary: 拥有集中式 BI 栈和数据目录的 200-2,000 人 B2B 公司里的数据平台负责人或分析工程负责人
  secondary: 负责指标定义、仪表板治理和自助分析采用的分析工程师或 BI 平台负责人
  buyer: VP Data、Head of Data Platform 或 Director of Analytics Engineering
startupThesis:
  nonObviousInsight: 聊天式 BI 的胜负手不会是聊天界面本身，而会是那套上线管理系统——它能在员工真正开始提问之前，把元数据、权限和仪表板逻辑变成经过测试的答案契约。
  beachhead: 已经在运行 OpenMetadata 或类似目录系统，同时配有 Tableau、Looker 或 Power BI，并计划在 2026 年把既有仪表板通过聊天形式向内部开放的中型 B2B 软件与互联网公司数据平台团队。
  wedge: 一道原生依托元数据的 QA 与策略闸门，先模拟高概率业务问题，验证跨仪表板的指标一致性，执行行级与字段级访问规则，再只把已批准的回答路径发布到任意聊天式 BI 界面。
  whyNowCatalyst: Collate 基于 OpenMetadata 推出聊天驱动仪表板，说明交互层迁移已经启动，元数据也终于离查询界面足够近，足以支撑一层新的防护系统。
  ventureScalePath: 先做内部聊天式 BI 的上线前认证，再扩到运行期治理、答案可观测性，以及为所有接触企业指标、仪表板和面向客户分析的 AI agent 编排策略。
solution: >-
  这个产品会接入公司的数据目录、BI 工具、数仓权限体系和语义模型，
  在正式上线前为会话式分析生成一套测试框架。它会模拟成千上万条高概率
  利益相关方问题，检查回答是否与已批准指标一致，把每次响应追溯回血缘，
  并标出那些会暴露受限维度、或在不同仪表板间产生冲突数字的提示词。团队
  可以把一套经过批准的问答策略包发布到 Collate、自建副驾或 BI 原生聊天界面中，
  让每个回答都附带经过验证的指标来源，并在用户意图模糊时给出安全回退。上线后，
  系统还会在仪表板修改、指标变化或权限更新后监测漂移，并明确告诉数据团队哪些聊天回答需要重新认证。
goToMarketSeed:
  firstCustomer: 300-1,500 人的 SaaS 或平台型公司，中央数据团队精简、已有一批仪表板资产，而且管理层已明确要求面向销售、财务和运营负责人上线内部会话式分析。
  buyingTrigger: 计划把聊天驱动分析推广给非技术团队，或最近刚发生过一次因仪表板变化导致 KPI 混乱、管理层对自助数据失去信任的事件。
  currentAlternative: 手工 QA 表格、BI 权限、提示词调优，以及叠加在既有仪表板上的内部脚本。
  switchingReason: 这个切口给数据团队补上了一个明确的生产前认证步骤，能比自建测试矩阵或等待 BI 厂商覆盖所有治理边角更快降低上线风险。
  pricingHypothesis: 按接入的仪表板环境数量和已认证的会话式查询量收取年度平台订阅费，单个数据平台团队起步价约为 $30k-$80k ARR。
