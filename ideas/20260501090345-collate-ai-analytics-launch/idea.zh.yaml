jobsToBeDone:
  - job: 当公司想让非分析师通过聊天查询仪表板时，帮数据平台团队把这次上线做成可认证流程，这样他们就能在不丢掉数字信任的前提下推出自助分析。
    currentAlternative: 针对仪表板、权限和提示词示例做手工测试
    successMetric: 安全上线所需时间，以及上线后分析事故工单数量的下降
  - job: 当指标、仪表板或访问规则变化时，帮分析工程团队找出哪些会话式回答已经变得不安全或不一致，这样他们就能在管理层看到错误数字前先修掉漂移。
    currentAlternative: 临时 QA、BI 权限复查，以及支持升级处理
    successMetric: 发现答案漂移的平均耗时，以及上线前捕获的高严重度答案不匹配数量
ideaScorecard:
