problem: 数据平台团队正被要求把每个仪表盘都变成聊天体验，但底层 BI 技术栈从未针对自由提问、边界权限或模糊指标表述做过验证。非分析人员一旦可以“随便问”，团队就会面临 KPI 答案相互矛盾、受限数据切片被意外暴露，以及大量削弱信任的支持工单。人工提示词 QA 和仪表盘权限配置都过于脆弱，无法为对话式上线提供可信保障。
targetUser:
  primary: 拥有中心化 BI 技术栈和数据目录的 200-2,000 人 B2B 公司中的数据平台主管或分析工程负责人
  secondary: 负责指标定义、仪表盘治理和自助分析采用的分析工程师或 BI 平台负责人
  buyer: VP Data、数据平台主管或分析工程总监
startupThesis:
  nonObviousInsight: 对话式 BI 的制胜层不会是聊天 UI，而是一个发布管理系统：在员工真正提问之前，就把元数据、权限和仪表盘逻辑转化为经过验证的答案契约。
  beachhead: 已部署 OpenMetadata 或类似目录系统，并同时使用 Tableau、Looker 或 Power BI，且计划在 2026 年把现有仪表盘以聊天方式面向内部上线的中型 B2B 软件与互联网公司数据平台团队。
  wedge: 一个元数据原生的 QA 与策略闸门：模拟高概率业务问题，验证跨仪表盘的指标一致性，执行行级和字段级访问规则，并只向任何对话式 BI 界面发布已获批准的答案路径。
  whyNowCatalyst: Collate 基于 OpenMetadata 推出聊天驱动仪表盘，说明界面迁移已经开始，且元数据终于足够接近查询界面，足以支撑一层新的防护栏。
  ventureScalePath: 先从内部对话式 BI 的上线前认证切入，再扩展到运行时治理、答案可观测性，以及所有接触企业指标、仪表盘和面向客户分析的 AI 代理的策略编排。
solution: 该产品连接企业的数据目录、BI 工具、数仓权限系统和语义模型，在上线前为对话式分析生成测试框架。它会模拟数千个可能的利益相关方问题，检查答案是否匹配已批准指标，将每个响应追溯至数据血缘，并标记那些会暴露受限维度或在不同仪表盘之间产生冲突数字的提示。团队可以把经批准的问答策略包发布到 Collate、自定义副驾或 BI 原生聊天界面中，使每个答案都带有已验证的指标来源，并在意图模糊时提供安全回退。上线后，系统还会在仪表盘编辑、指标变更或权限更新后监测漂移，并明确告知数据团队哪些聊天答案需要重新认证。
goToMarketSeed:
  firstCustomer: 一家 300-1,500 人的 SaaS 或平台型公司，拥有精简的中心化数据团队、现有仪表盘资产，并收到高层要求，要为销售、财务和运营负责人上线内部对话式分析。
  buyingTrigger: 计划向非技术团队推出聊天驱动分析，或最近因仪表盘变更造成 KPI 混乱、导致管理层对自助数据失去信任。
  currentAlternative: 人工 QA 表格、BI 权限配置、提示词调优，以及叠加在现有仪表盘之上的内部脚本。
  switchingReason: 这个切入口为数据团队提供了一个具体的 chat BI 预生产认证步骤，相比自建测试矩阵或等待 BI 厂商覆盖所有治理边界，更快降低上线风险。
  pricingHypothesis: 按已连接的仪表盘环境数和已认证的对话查询量计费的年度平台订阅，单个数据平台团队起步价约为 $30k-$80k ARR。
