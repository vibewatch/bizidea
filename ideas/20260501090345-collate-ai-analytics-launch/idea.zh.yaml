differentiator: BI 厂商会推出聊天功能，但它们的激励是最大化各自界面内的使用量，而不是跨异构目录、语义层和权限系统去认证每一条答案路径。通用 LLM 防护栏工具也抓不住难点，因为它们并不理解指标血缘、仪表盘定义或 BI 特有的访问规则。元数据原生的发布层可以成为关于一条对话式分析答案是否被允许、是否正确、是否可复现的中立记录系统。
