slug: chat-bi-guardrails
date: '2026-05-01'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: month
  source: '[idea.yaml date 2026-05-01；模型在计划创建后立即启动]'
- id: A2
  name: 综合年合同价值
  value: '60'
  unit: USDK ARR per customer
  source: '[research.market.som：100 个客户、综合 ARR 约为 $60k；BP 定价为 $30k-$80k ARR]'
- id: A3
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[business-plan.businessModel.targetGrossMarginPct]'
- id: A4
  name: 第 1 年付费客户爬坡
  value: M6-M12 new logos = 1,0,1,0,1,1,1; 5 customers by M12
  unit: count
  source: '[business-plan.milestones：第 9 个月达到 2 个生产客户，第 12 个月达到 5 个生产客户]'
- id: A5
  name: 第 2 年按季度新增客户数
  value: Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 8
  unit: count per quarter
  source: '[business-plan.gtm 漏斗目标与创始人主导销售模式；首次生产验证后早期企业 SaaS 扩张的创业财务经验假设]'
- id: A6
  name: 第 3 年按季度新增客户数
  value: Q1Y3 11; Q2Y3 14; Q3Y3 17; Q4Y3 20
  unit: count per quarter
  source: '[business-plan.gtm 引荐 + 第 12 个月首个合作伙伴；可重复试点转化后由合作伙伴辅助爬坡的创业财务经验假设]'
- id: A7
  name: 客户流失率
  value: 1.0 monthly / ~3.0 quarterly
  unit: percent
  source: '[创业财务经验假设：采用年约且具备较强扩展潜力的早期 B2B 基础设施 SaaS]'
- id: A8
  name: 创始人现金薪酬
  value: '150'
  unit: USDK loaded annual
  source: '[business-plan.team Founder / CEO；低于市场水平的种子前轮创始人薪资经验假设，包含薪资税 / 福利]'
- id: A9
  name: 工程师现金薪酬
  value: '185'
  unit: USDK loaded annual per FTE
  source: '[business-plan.team 工程招聘；资深创业公司后端 / 平台工程师的经验假设]'
- id: A10
  name: 解决方案 / 客户成功现金薪酬
  value: '155'
  unit: USDK loaded annual per FTE
  source: '[business-plan.team 具备产品思维的解决方案工程师；技术型解决方案岗位的经验假设]'
- id: A11
  name: 销售现金薪酬
  value: '175'
  unit: USDK loaded annual per FTE
  source: '[business-plan.team 客户经理或创始人助理销售；早期企业 AE OTE 的经验假设]'
- id: A12
  name: 综合行政 / 运营现金薪酬
  value: '110'
  unit: USDK loaded annual per FTE
  source: '[早期运营 / 财务 / 安全通才岗位的经验假设]'
- id: A13
  name: 招聘时间线
  value: Founder M1; Eng M1/M7/M13/M22/M25/M32; Solutions M4/M18/M28; Sales M10/M19/M26/M34; Ops M16/M31
  unit: hire months
  source: '[business-plan.team、产品路线图，以及 research.regulatoryTechnicalConstraints 中的安全 / 合规实施需求]'
- id: A14
  name: 付费需求生成支出
  value: 3K/mo M1-M6; 5K/mo M7-M12; 8K/mo M13-M18; 12K/mo M19-M24; 18K/mo M25-M30; 24K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.gtm 创始人主导 + 合作伙伴渠道；纪律性早期获客的创业财务经验假设]'
- id: A15
  name: 研发工具与安全支出
  value: 3K/mo Y1; 4K/mo M13-M18; 5K/mo M19-M24; 6K/mo M25-M30; 7K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.operations 以及 research.regulatoryTechnicalConstraints 中关于可审计性和模型治理开销的要求；创业财务经验假设]'
- id: A16
  name: 综合行政开销
  value: 6K/mo M1-M6; 8K/mo M7-M12; 10K/mo M13-M18; 12K/mo M19-M24; 14K/mo M25-M30; 16K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.operations 和 investorMemo 中的安全 / 法务尽调需求；法务、会计、保险和管理软件的创业财务经验假设]'
- id: A17
  name: 收入确认口径
  value: Average active customers in period × 5K monthly recurring revenue
  unit: formula
  source: '[A2 与创业财务经验假设：年度 SaaS 合同在服务期内按比例确认收入]'
- id: A18
  name: M1 期初现金 / 种子前轮到账
  value: '2500'
  unit: USDK
  source: '[business-plan.fundingAsk targetFundingRangeUsd $2-4M；建模为达到可重复种子轮里程碑并额外留出六个月缓冲所需现金]'
- id: A19
  name: 现金转换口径
  value: Cash movement approximated by EBITDA
  unit: formula
  source: '[创业财务经验假设：保守的早期 SaaS 模型，假设几乎没有资本开支、债务和营运资金时序收益]'
- id: A20
  name: 稳态 CAC 计量口径
  value: '28'
  unit: USDK per new customer
  source: '[由 Y2 Q3-Q4 的销售与市场运行率除以新增客户数建模得出；作为 Y3 规模效率出现前的当前阶段 CAC]'
- id: A21
  name: 下一轮里程碑
  value: 15 production customers, >1.0M exit ARR, 2 BI connectors, and 1 active referral partner by month 18-24
  unit: milestone
  source: '[business-plan.milestones 和 fundingAsk.useOfFundsSummary]'
