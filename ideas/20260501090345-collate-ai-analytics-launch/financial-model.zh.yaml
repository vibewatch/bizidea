scenarios:
  downside:
    description: chat BI 上线保持谨慎，合作伙伴引荐表现不及预期，合同价格也更接近定价区间低端。
    y3RevenueK: 2150.0
    y3EbitdaK: -1210.0
    cashLowPointK: -520.0
    keyAssumptionChanges:
    - ARPU 下降至 $50K ARR
    - Y3 新增客户数较基准低约 30%
    - 由于支持与推理成本维持高位，毛利率只能维持在 65%
  base:
    description: 在首批生产客户出现后，创始人主导销售开始具备可重复性，且一个生态伙伴开始稳定输送合格上线项目。
    y3RevenueK: 3105.0
    y3EbitdaK: -634.26
    cashLowPointK: 136.08
    keyAssumptionChanges:
    - 综合 ARR 保持在 $60K
    - Y2 季度新增客户遵循 4/5/6/8，Y3 遵循 11/14/17/20
    - 毛利率维持在 70% 的商业模型目标
  upside:
    description: 混合环境需求比预期来得更快，且合作伙伴渠道在无需同步大幅增员的情况下带来更高量级的上线项目。
    y3RevenueK: 3950.0
    y3EbitdaK: -180.0
    cashLowPointK: 280.0
    keyAssumptionChanges:
    - 由于更早扩展到监控场景，ARPU 提升至 $65K
    - Y3 新增客户数较基准高约 15%
    - 随着连接器和支持工作标准化，毛利率提升至 72%
