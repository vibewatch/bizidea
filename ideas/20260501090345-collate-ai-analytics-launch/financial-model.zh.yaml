modelDiagram:
  title: 单位经济模型流
  mermaid: "flowchart LR\n  Leads[创始人外呼 + 合作伙伴引荐] --> Pilots[付费认证试点]\n  Pilots --> Customers[年度订阅客户]\n  Metadata[目录 + 语义 + BI 连接器] --> Customers\n  Customers --> Revenue[订阅 + 监控收入]\n  Revenue --> GrossProfit[70% 毛利润]\n  GrossProfit --> Cash[现金跑道]\n"
modelSanity:
- checkName: 营收引擎
  finding: 基准情景收入来自于：Y1 末 5 个付费账户，在综合 ARR 为 $60K 的情况下增长到 Y3 末 83 个客户；且只有在试点转化变得可重复后才开始加速。
- checkName: 必须成立的前提
  finding: 公司必须在 Y2 把创始人主导试点加一个生态伙伴，转化为可靠的新增客户引擎，否则 Y3 的爬坡无法出现。
- checkName: 模型失效条件
  finding: 如果 chat BI 上线长期停留在试点状态，且 Y3 新增客户数比计划低约 30%，则公司会在达到适合种子轮的牵引力之前现金转负。
- checkName: 下一轮证明
  finding: 当公司证明约 15 个生产客户、超过 $1M 的期末 ARR、两个在线 BI 连接器以及一个活跃引荐来源时，下一轮融资才具备充分依据。
sanityChecks:
  ruleOf40: Y3 增长率 251% + EBITDA 利润率 -20% = 230%（之所以很高，是因为增长建立在较小的 Y2 基数上）。
  burnMultiple: Y2 burn multiple 为 0.78x，即以 $1.03M 的消耗换来 $1.32M 的净新增 ARR。
  revenuePerFte: 按 Q4Y3 FTE 计算，Y3 每名 FTE 对应营收为 $194K（接近 SaaS $200-400K 基准区间的低端）。
  flags:
  - 基准情景在 Y3 末达到 83 个客户、约 $5.0M 的期末 ARR，仍低于 research SOM 中 100 个客户 / $6.0M ARR 的检查点。
  - 单位经济看起来很强，部分原因是模型假设月度客户流失率仅为 1.0%，但当前尚无足够 cohort 历史来证明这一点。
  - Y3 末现金仅剩 $136K，因此公司需要在模型期结束前很早就启动下一轮融资。
  - Y3 每名 FTE 对应营收仅约 $194K；对于服务占比较高的早期产品尚可接受，但给销售低效留下的空间有限。
