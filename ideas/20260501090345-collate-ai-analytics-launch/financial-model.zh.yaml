scenarios:
  downside:
    description: 聊天式 BI rollout 依旧谨慎，伙伴转介绍不及预期，合同金额也更接近定价带的低端。
    y3RevenueK: 2150.0
    y3EbitdaK: -1210.0
    cashLowPointK: -520.0
    keyAssumptionChanges:
    - ARPU 降到 $50K ARR
    - Y3 新增 logo 比基准情形低约 30%
    - 毛利率维持在 65%，因为支持与推理成本居高不下
  base:
    description: 在拿下首批生产客户后，创始人主导销售变得可复制，并有一个生态伙伴开始稳定输送合格 rollout 机会。
    y3RevenueK: 3105.0
    y3EbitdaK: -634.26
    cashLowPointK: 136.08
    keyAssumptionChanges:
    - 混合 ARR 保持在 $60K
    - Y2 季度新增 logo 按 4/5/6/8 走，Y3 按 11/14/17/20 走
    - 毛利率维持在业务模型里的 70% 目标
  upside:
    description: 混合环境需求比预期更早到来，而伙伴渠道能在不同比例增加人头的情况下带来更高密度的 rollout。
    y3RevenueK: 3950.0
    y3EbitdaK: -180.0
    cashLowPointK: 280.0
    keyAssumptionChanges:
    - ARPU 提升到 $65K，因为监控扩张更早发生
    - Y3 新增 logo 比基准情形高约 15%
    - 随着连接器与支持工作标准化，毛利率提升到 72%
