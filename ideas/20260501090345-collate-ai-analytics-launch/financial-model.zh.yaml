modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Leads[创始人外呼 + 伙伴转介绍] --> Pilots[付费认证试点]
      Pilots --> Customers[年度订阅客户]
      Metadata[目录 + 语义 + BI 连接器] --> Customers
      Customers --> Revenue[订阅 + 监控收入]
      Revenue --> GrossProfit[70% 毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入，来自付费账户从 Y1 末的 5 个增长到 Y3 末的 83 个，且只有在试点转化可复制之后才开始加速。
- checkName: 必须成立的前提
  finding: 公司必须在 Y2 把创始人主导试点和一个生态伙伴转成稳定的新 logo 引擎，否则 Y3 的爬坡根本起不来。
- checkName: 模型会失效的条件
  finding: 如果聊天式 BI rollout 长期停留在试点阶段，且 Y3 新增 logo 比计划低约 30%，公司会在达到 seed-ready 牵引力之前先把现金烧穿。
- checkName: 下一轮融资证明点
  finding: 当业务做到约 15 个生产客户、超过 $1M 的期末 ARR、两个在线 BI 连接器和一个活跃转介绍来源时，下一轮融资才算站得住。
sanityChecks:
  ruleOf40: Y3 growth 251% + EBITDA margin -20% = 230%（之所以异常高，是因为增长建立在很小的 Y2 基数之上）。
  burnMultiple: Y2 burn multiple 0.78x，对应 $1.03M burn / $1.32M net new ARR。
  revenuePerFte: $194K Y3 revenue per Q4Y3 FTE（接近 $200-400K SaaS benchmark 的低端）。
  flags:
  - 基准情形到 Y3 末只有 83 个客户、约 $5.0M 期末 ARR，仍低于 research 里 100 客户 / $6.0M ARR 的 SOM 检查点。
  - 单位经济看起来很强，但模型在缺乏足够 cohort 历史前，就假设了 1.0% 的月度 logo 流失率。
  - Y3 末现金只剩 $136K，因此公司必须在模型结束前很早就启动下一轮融资。
  - Y3 的每 FTE 收入只有约 $194K；对于服务占比较高的早期产品来说还能接受，但给销售低效留下的空间并不大。