slug: chat-bi-guardrails
date: '2026-05-01'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: month
  source: '[idea.yaml 日期为 2026-05-01；模型假设在计划形成后立刻启动]'
- id: A2
  name: 混合年合同价值
  value: '60'
  unit: USDK ARR per customer
  source: '[research.market.som：100 个客户、每个客户约 $60k 混合 ARR；BP pricing 为 $30k-$80k ARR]'
- id: A3
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[business-plan.businessModel.targetGrossMarginPct]'
- id: A4
  name: 第 1 年付费客户爬坡
  value: M6-M12 new logos = 1,0,1,0,1,1,1; 5 customers by M12
  unit: count
  source: '[business-plan.milestones：第 9 个月达到 2 个生产客户，第 12 个月达到 5 个生产客户]'
- id: A5
  name: 第 2 年按季度新增 logo
  value: Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 8
  unit: count per quarter
  source: '[business-plan.gtm funnel targets 和创始人主导销售路径；早期企业 SaaS 扩张的创业财务启发式]'
- id: A6
  name: 第 3 年按季度新增 logo
  value: Q1Y3 11; Q2Y3 14; Q3Y3 17; Q4Y3 20
  unit: count per quarter
  source: '[business-plan.gtm 中的转介绍 + 第 12 个月拿到首个伙伴；在试点转化可复制后的伙伴辅助爬坡启发式]'
- id: A7
  name: Logo 流失率
  value: 1.0 monthly / ~3.0 quarterly
  unit: percent
  source: '[创业财务启发式：适用于年费合同、扩张潜力强的早期 B2B 基础设施 SaaS]'
- id: A8
  name: 创始人现金薪酬
  value: '150'
  unit: USDK loaded annual
  source: '[business-plan.team Founder / CEO；按 pre-seed 阶段低于市场价的创始人工资，加上税费与福利负担]'
- id: A9
  name: 工程师现金薪酬
  value: '185'
  unit: USDK loaded annual per FTE
  source: '[business-plan.team 工程岗位；适用于初创公司高级后端/平台工程师的创业财务启发式]'
- id: A10
  name: 解决方案 / 客户成功现金薪酬
  value: '155'
  unit: USDK loaded annual per FTE
  source: '[business-plan.team 兼具产品思维的解决方案工程师；技术型解决方案岗位的创业财务启发式]'
- id: A11
  name: 销售现金薪酬
  value: '175'
  unit: USDK loaded annual per FTE
  source: '[business-plan.team account executive 或 founder-associate seller；早期企业 AE OTE 的创业财务启发式]'
- id: A12
  name: G&A / 运营现金薪酬
  value: '110'
  unit: USDK loaded annual per FTE
  source: '[适用于早期运营 / 财务 / 安全通才岗位的创业财务启发式]'
- id: A13
  name: 招聘时点
  value: Founder M1; Eng M1/M7/M13/M22/M25/M32; Solutions M4/M18/M28; Sales M10/M19/M26/M34; Ops M16/M31
  unit: hire months
  source: '[business-plan.team、产品路线图，以及 research.regulatoryTechnicalConstraints 里的安全/合规实施需求]'
- id: A14
  name: 付费获客支出
  value: 3K/mo M1-M6; 5K/mo M7-M12; 8K/mo M13-M18; 12K/mo M19-M24; 18K/mo M25-M30; 24K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.gtm 中创始人与伙伴主导渠道；纪律化早期 demand gen 的创业财务启发式]'
- id: A15
  name: 研发工具与安全支出
  value: 3K/mo Y1; 4K/mo M13-M18; 5K/mo M19-M24; 6K/mo M25-M30; 7K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.operations 加 research.regulatoryTechnicalConstraints 里对可审计性和模型治理的要求；创业财务启发式]'
- id: A16
  name: G&A 运营杂费
  value: 6K/mo M1-M6; 8K/mo M7-M12; 10K/mo M13-M18; 12K/mo M19-M24; 14K/mo M25-M30; 16K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.operations 与 investorMemo 里的安全/法务尽调需求；用于法务、会计、保险与行政软件的创业财务启发式]'
- id: A17
  name: 收入确认口径
  value: Average active customers in period × 5K monthly recurring revenue
  unit: formula
  source: '[A2 加创业财务启发式：年费 SaaS 合同按服务期线性确认]'
- id: A18
  name: 期初现金 / pre-seed 在 M1 完成
  value: '2500'
  unit: USDK
  source: '[business-plan.fundingAsk targetFundingRangeUsd 为 $2-4M；模型按能跑到可复制 seed 里程碑并额外留出 6 个月缓冲所需现金建模]'
- id: A19
  name: 现金转换口径
  value: Cash movement approximated by EBITDA
  unit: formula
  source: '[创业财务启发式：保守假设早期 SaaS 几乎没有 capex、债务和营运资本时差收益]'
- id: A20
  name: 稳态 CAC 口径
  value: '28'
  unit: USDK per new customer
  source: '[按 Y2 Q3-Q4 销售与市场 run-rate 除以新增 logo 建模；代表 Y3 放量前阶段性的 CAC]'
- id: A21
  name: 下一轮融资里程碑
  value: 15 production customers, >1.0M exit ARR, 2 BI connectors, and 1 active referral partner by month 18-24
  unit: milestone
  source: '[business-plan.milestones 和 fundingAsk.useOfFundsSummary]'
