    - 29
    - 31
market:
  tam:
    value: $0.8B
    rationale: 估算为 18,000 个全球目标账户 × 每年 $45k 的综合支出。相较于相邻市场信号，这一假设刻意保持保守：BI 市场的综合数据指出，规模将从 2023 年的 $29.42B 增长到 2030 年的 $54.27B；数据目录市场综合数据则指出，2030 年将达 $3.86B，CAGR 为 23.2%。当前建模切入口仅占这些更大支出池中的很小一部分。
    isEstimate: true
    sourceRefs:
    - 3
    - 7
    - 12
    - 24
    - 25
  sam:
    value: $180.0M
    rationale: 将 TAM 收窄到约 4,000 个位于北美和欧洲、已开始标准化受治理分析，并有望在未来几年试点对话式访问的中型账户，采用相同的 $45k 综合 ACV。
    isEstimate: true
    sourceRefs:
    - 1
    - 8
    - 10
    - 17
    - 24
    - 25
  som:
    value: $6.0M
    rationale: 可达成的第 3 年结果是假设通过创始人主导销售与生态引荐，在高风险首轮上线项目中拿下约 100 个客户，每个客户的综合 ARR 约为 $60k。
    isEstimate: true
    sourceRefs:
    - 3
    - 7
    - 12
