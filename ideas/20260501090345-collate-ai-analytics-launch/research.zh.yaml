  adoptionFrictionMatrix:
  - friction: 仪表盘与语义层之间的指标定义不一致
    severity: 高
    affectedBuyer: 数据平台主管
    mitigation: 先连接语义层和目录，再围绕已批准指标及其同义词生成回归测试套件。
