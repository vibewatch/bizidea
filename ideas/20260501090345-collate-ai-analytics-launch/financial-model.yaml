scenarios:
  downside:
    description: Chat BI rollouts stay cautious, partner referrals underperform, and contracts land closer to the low end of the pricing band.
    y3RevenueK: 2150.0
    y3EbitdaK: -1210.0
    cashLowPointK: -520.0
    keyAssumptionChanges:
    - ARPU falls to $50K ARR
    - Y3 new-logo adds run ~30% below base
    - Gross margin holds at 65% because support and inference costs stay high
  base:
    description: Founder-led sales becomes repeatable after the first production customers and one ecosystem partner begins supplying qualified rollouts.
    y3RevenueK: 3105.0
    y3EbitdaK: -634.26
    cashLowPointK: 136.08
    keyAssumptionChanges:
    - Blended ARR stays at $60K
    - Quarterly new-logo adds follow 4/5/6/8 in Y2 and 11/14/17/20 in Y3
    - Gross margin stays at the 70% business-model target
  upside:
    description: Mixed-estate demand arrives faster than expected and the partner channel produces higher-volume rollouts without a matching headcount jump.
    y3RevenueK: 3950.0
    y3EbitdaK: -180.0
    cashLowPointK: 280.0
    keyAssumptionChanges:
    - ARPU rises to $65K on earlier monitoring expansion
    - Y3 new-logo adds run ~15% above base
    - Gross margin improves to 72% as connector and support work standardize
