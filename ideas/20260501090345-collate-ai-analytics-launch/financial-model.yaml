modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Founder outbound + partner referrals] --> Pilots[Paid certification pilots]
      Pilots --> Customers[Annual subscriptions]
      Metadata[Catalog + semantic + BI connectors] --> Customers
      Customers --> Revenue[Subscription + monitoring revenue]
      Revenue --> GrossProfit[70% gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing from 5 paying accounts at Y1 end to 83 by Y3 end at a $60K blended ARR, with acceleration only after pilot conversion becomes repeatable.
- checkName: Must go right
  finding: The company must turn founder-led pilots plus one ecosystem partner into a reliable new-logo engine by Y2, or the Y3 ramp never materializes.
- checkName: Model breaks if
  finding: If chat-BI rollouts stay in pilot mode and Y3 logo adds fall about 30% below plan, cash turns negative before the business reaches seed-ready traction.
- checkName: Next-round proof
  finding: The next financing is justified when the business shows about 15 production customers, more than $1M exit ARR, two live BI connectors, and an active referral source.
sanityChecks:
  ruleOf40: Y3 growth 251% + EBITDA margin -20% = 230% (very high because growth starts from a small Y2 base).
  burnMultiple: Y2 burn multiple 0.78x using $1.03M burn over $1.32M net new ARR.
  revenuePerFte: $194K Y3 revenue per Q4Y3 FTE (near the low end of a $200-400K SaaS benchmark).
  flags:
  - Base case reaches 83 customers and about $5.0M exit ARR by Y3 end, which is still below the research SOM checkpoint of 100 customers / $6.0M ARR.
  - Unit economics look strong because the model assumes 1.0% monthly logo churn before enough cohort history exists to prove it.
  - Cash ends Y3 at only $136K, so the company would need to start the next round well before the model horizon ends.
  - Revenue per FTE is only around $194K in Y3, which is acceptable for a services-heavy early product but leaves limited room for sales inefficiency.
