problem: >-
  Indian state governments like Bihar are signing non-financial AI MoUs with multiple vendors at once — global
  hyperscalers (Google, Microsoft) and domestic multilingual specialists (CoRover, Sarvam AI) — for governance,
  education, workforce, and citizen-service use cases, while the state's own AI policy is still being drafted.
  No state IT department has the internal tooling or expertise to compare these vendors' citizen-facing chatbot
  and workflow outputs for factual accuracy, language coverage, data residency, or policy compliance once pilots
  go live. Because the MoUs are non-financial, there is no procurement gate forcing vendors to report on a
  common standard, so failures (wrong benefit eligibility answers, unsupported dialects, data leaving the state)
  will surface in the field, in front of citizens, before anyone in government even has a dashboard to see them.
targetUser:
  primary: >-
    Head of e-governance or Mission Director at a state IT/electronics-development nodal agency (e.g. Bihar's
    BELTRON-equivalent body) responsible for coordinating multiple AI vendor MoUs for citizen-service rollout
  secondary: >-
    Domestic AI vendors (CoRover, Sarvam AI) seeking to differentiate on measurable compliance and win future
    state tenders against hyperscalers
  buyer: State IT Secretary or e-governance Mission Director who signs off on multi-vendor AI pilot budgets
startupThesis:
  nonObviousInsight: >-
    The headline story is about which vendors won MoUs, but the real bottleneck is sequencing: states are
    approving multi-vendor citizen-facing AI pilots before their own AI policy exists, which means there is a
    open window — measured in months, not years — where a neutral assurance layer sold to the state (not to any
    vendor) can become the de facto compliance backbone the eventual policy will reference, rather than
    competing after the policy and its preferred vendors are locked in.
  beachhead: >-
    State e-governance nodal agencies in Indian states that have signed multiple non-financial AI vendor MoUs
    for citizen-service or education deployments while their state AI policy is still in draft, starting with
    Bihar's Department of Information Technology and its MoU counterparties CoRover and Sarvam AI
  wedge: >-
    A vendor-neutral AI assurance dashboard that ingests each vendor's citizen-facing chatbot/workflow outputs,
    flags factual, language-coverage, and data-residency violations against the state's draft AI policy
    provisions, and produces a single audit trail the state can present to its own legislature and to MeitY
  whyNowCatalyst: >-
    Bihar signed four parallel AI MoUs spanning governance, education, workforce, and citizen services on the
    same day its officials confirmed the state AI policy is still in final drafting, creating an urgent,
    time-boxed gap between vendor rollout and governance tooling that other states drafting similar policies
    will hit next.
  ventureScalePath: >-
    Land Bihar's e-governance nodal agency as a design partner during the current MoU rollout, codify the
    resulting audit schema as a reusable state AI policy compliance template, then expand horizontally to the
    dozen-plus Indian states drafting their own AI policies and vertically into national-level MeitY reporting,
    positioning the product as the assurance layer of record for public-sector AI in India and, later, other
    Global South digital-governance programs facing the same multi-vendor sequencing problem.
solution: >-
  Ship a lightweight assurance layer that connects to each MoU vendor's citizen-facing deployment (chatbot logs,
  API outputs, or exported transcripts) and continuously scores responses against a rubric derived from the
  state's own draft AI policy: factual accuracy on government scheme eligibility, dialect and language coverage
  claims, and data-residency/consent handling. Findings roll up into a single dashboard the e-governance nodal
  agency can use in vendor review meetings and legislative reporting, with per-vendor scorecards that let
  officials compare Google, Microsoft, CoRover, and Sarvam AI on the same axes instead of relying on vendor
  self-reported claims. A lightweight onboarding kit lets the state stand up monitoring for a new MoU vendor in
  days, ahead of any full policy or procurement process.
