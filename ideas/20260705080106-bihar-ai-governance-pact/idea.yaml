differentiator: >-
  Unlike the MoU vendors themselves, who each report on their own deployment in isolation, this product is
  vendor-neutral and sells directly to the state, giving it access to compare Google, Microsoft, CoRover, and
  Sarvam AI outputs on one common rubric derived from the state's own emerging policy language. Because it
  ships as a lightweight overlay on existing vendor APIs and transcripts rather than a replacement platform, it
  can be live in days — well before any of the vendors or the state itself builds a comparable cross-vendor
  audit capability in-house.
