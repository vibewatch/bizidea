topRisks:
  - name: No dedicated budget line
    description: >-
      The MoUs are explicitly non-financial, so there may be no existing budget the nodal agency can use to pay
      for an assurance subscription without a new procurement approval.
    mitigation: >-
      Launch the pilot tier funded through existing digital-governance or skilling grant lines (e.g. Digital
      India / MeitY-adjacent programs) so the state can start without a fresh budget ask.
  - name: Political and bureaucratic turnover
    description: >-
      State government priorities and personnel can shift after elections or cabinet reshuffles, stalling or
      killing a pilot tied to one administration's initiative.
    mitigation: >-
      Frame and document the assurance layer as infrastructure supporting the forthcoming formal state AI
      policy and align it with central MeitY guidance so it outlives any single minister's tenure.
  - name: Vendor resistance to independent monitoring
    description: >-
      Google, Microsoft, CoRover, or Sarvam AI could view third-party scoring of their outputs as adversarial
      and restrict transcript or API access needed for scoring.
    mitigation: >-
      Position the product as vendor-friendly assurance-as-a-service that helps each vendor demonstrate
      compliance for future state tenders, and secure state-side data-access rights in the MoU follow-on terms
      rather than relying on vendor cooperation alone.
