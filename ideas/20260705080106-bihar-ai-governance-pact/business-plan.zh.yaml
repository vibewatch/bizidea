slug: bihar-ai-governance-pact
date: "2026-07-05"
executiveSummary: >-
  印度受监管的公共服务 AI 已经在通过邦级 MoU 落地，但 Bihar 把时序失灵这件事摆得很清楚：四家厂商可以在邦政府发布政策、报告格式或事故流程之前就先上线，而这些东西本该让官员按同一标准比较它们。第一个客户是
  Bihar 电子政务牵头机构，或类似的邦级专项办公室——它必须统筹 Google、Microsoft、CoRover 和 Sarvam 的部署，并向 IT
  秘书、内阁、立法机构和 MeitY 为这些部署辩护。产品应从一个狭窄的保障层起步：接入 1–2 个高风险民生服务工作流的对话记录或 API
  导出，对照《印度 AI 治理指南》加上 DPDP、CERT-In 和邦政策草案条款给它们打分，产出一份每月的跨厂商评分卡。相比卖一整套治理套件或厂商原生的仪表盘，这是更好的切入口，因为买方在需要另一个模型平台之前，先需要的是中立的比较和可审计性。研究支撑了这个切口，但还撑不起一个风险投资级别的故事：印度本土的近期
  TAM 约 $24.8M，SAM 约 $2.4M，第 3 年 SOM 约 $0.9M（基于当前假设）。因此公司必须证明一套 Bihar
  打法能复制到其他 AI 活跃邦，再到部委和智慧城市，而不必每次都重做一遍定制服务。GTM
  必须挂靠到已经拨款的 AI 专项、卓越中心（CoE）或数字治理工作流上，因为付费意愿看起来是作为活跃项目内部的风险缓释而存在，而非一条独立的软件预算。最重要的缺失事实是：谁能授权花钱、邦政府能否强制拿到跨多家厂商的对话记录访问权、哪个工作流的出错代价最高；头
  90 天应先回答这些，再谈更大范围的搭建。
problem:
  - >-
    AI 活跃的印度邦，正在多家厂商上铺开民生服务部署，而它们自己的政策、评分卡和事故复盘流程都还没稳定，于是没有一套共享的办法能按同一套邦批准的标准来比较厂商。
  - >-
    民生服务和申诉工作流政治上高度显眼、又是多语言的，因此事实错误、路由失败、语言不支持或数据处理不当，都会赶在邦政府备好审计轨迹之前，先在公民面前暴露。
  - >-
    默认的替代品——人工委员会、厂商自报、云原生仪表盘——每一个都只覆盖工作的一部分，产不出一份中立的跨厂商记录，供邦政府在立法机构或 MeitY 评审中使用。
solution:
  - >-
    接入每个受监测部署的对话记录导出或 API 产出，在一个由邦政府掌控的评审层里，把回答、元数据、语言标签和数据处理证据统一规整。
  - >-
    对照一条基线给产出打分，这条基线由《印度 AI 治理指南》、DPDP、CERT-In 和邦政策草案条款搭成，配上针对具体工作流的测试，检验事实准确性、语言覆盖和升级处理质量。
  - >-
    交付按厂商拆分的评分卡、整改队列和可直接用于审计的评审材料包，让牵头机构能在同一套评分标准上比较 Google、Microsoft、CoRover、Sarvam 以及未来的厂商。
whyWeWin:
  - >-
    Google 和 Azure 在自家技术栈内提供了很强的管控，IBM／Credo／Holistic 提供了宽泛的治理工作流，但没有一家把自己定位成中立的、面向印度邦级、多语言、跨厂商的公共服务保障层。
  - >-
    一款邦政府优先的产品，在采购和政策评审中能保持厂商自筹自审无法企及的可信度，尤其是当本土和全球厂商在同一个项目里竞争时。
  - >-
    反复部署会积累起一套多语言公共服务失误的专有语料，加上一个印度专属的政策到控制项库，每接入一个邦、一个工作流就更好用。
strategicChoices:
  beachhead: >-
    Bihar 电子政务牵头机构，围绕 2026 年 6 月 Google、Microsoft、CoRover 和 Sarvam AI 的 MoU 下、在邦政策仍处最后草案时上线的首批民生服务与申诉类 AI 工作流。
  wedgeRationale: >-
    一个邦、一个专项办公室、2–4 个已上线的厂商部署，构成了做出同类可比证据的最快路径：如果这家创业公司能拿出一份改变了某次真实评审会的月度评分卡，它就有了一个可复用的案例。而去卖一套更宽的采购套件、一个通用治理平台，或一份厂商出资的白标评分卡，都会拖慢验证并削弱中立性这一立身之本。
  sequencingRationale: >-
    先从对话记录导出、一套基线控制项库和一份月度评审材料包做起，再去搭深度 API 集成、宽广的语言覆盖或第二个邦的扩张，因为预算归属和数据访问才是风险最高的未知项。先卖给邦政府，只把厂商和实施伙伴当作接入通道，并在组建规模化销售团队之前先招产品、评测和实施人才。
  notYet:
    - 把厂商出资的白标评分卡当作主要商业模式
    - 完整的政策撰写或采购管理软件
    - 覆盖每个部门、所有语言和所有工作流的基准
    - 在一个邦的模板跑通之前就扩张到联邦部委和智慧城市
market:
  tam: "$24.8M（研究估算：约 165 家公共部门主体，含 100 座智慧城市、53 个联邦部委和 12 个 AI 活跃邦，每家约 3 个受监测部署，年化价值各约 $50k）"
  sam: "$2.4M（研究估算：12 个 AI 活跃的印度邦，每邦约 4 个早期受监测部署，年化价值各约 $50k）"
  som: "$0.9M（研究估算：到第 3 年横跨 Bihar 及 4–5 个后续邦级客户约 18 个受监测部署，年化价值各约 $50k）"
  segments:
    - 统筹多厂商民生服务 AI 部署的 AI 活跃印度邦电子政务牵头机构
    - 一旦邦级模板可复制，联邦部委和智慧城市数字治理项目
  buyingProcess: >-
    当一次已上线的 AI 落地、一份政策草案或一次监督评审暴露出缺少共享评分卡时，专项办公室或部门 IT 团队会最先感到痛。IT
    秘书或专项主管出面赞助一个试点，政策与数据团队评审控制项，而这笔交易最可能是在现有的 AI 专项、CoE 或数字治理工作流内部获得拨款，而非作为一条独立的新软件预算。
product:
  mvp: >-
    一个由邦政府掌控的保障层，覆盖 1–2 个高风险工作流和 2 个厂商部署，接入对话记录或 API 导出，对照《印度 AI 治理指南》加上
    DPDP、CERT-In 和邦政策草案条款打分，并产出一份月度评审材料包。这个 MVP 明确保留人在环路中，先从对话记录导出接入起步，再谈深度实时集成。
  sixMonth: >-
    为 3–4 类厂商部署加上连接器、一个整改队列，以及最高流量工作流的印地语加一门地方语言基准集，让 Bihar
    或一个可比的共创客户能跑起每月例行评审，而不是一次性审计。
  twelveMonth: >-
    交付一套可复用的邦控制项库、可配置的工作流测试包，以及面向内阁、立法机构和 MeitY 评审的报告模板，让第二个、第三个邦能在极少政策返工的情况下接入。
  twentyFourMonth: >-
    扩张到部委或智慧城市项目，提供跨邦基准比对、招标比较支持和更大的工作流库，同时让产品聚焦在中立的公共部门保障上，而不是通用企业 AI 治理。
  keyBets:
    - 邦政府能在首个试点期从至少两家厂商拿到可用的对话记录或 API 导出权
    - 高风险工作流能用印地语和一门地方语言做基准，而不必把每次部署都变成定制服务项目
    - 专项办公室会从活跃 AI 项目预算里为中立的月度评分卡付费，因为内部自建这项能力更慢、也更缺可信度
    - 一份跨厂商基准记录不只对当前试点监督有用，在未来招标和政策执法中同样有价值
gtm:
  wedge: >-
    以 Bihar 2026 年 MoU 落地中某个已上线的民生服务工作流的月度跨厂商评分卡切入，定位成专项办公室在政策定稿之前、在首次公众或立法评审之前就需要的治理基础设施。
  channels:
    - 创始人主导，直接向 AI 活跃邦的 IT 秘书、专项主管和牵头机构负责人打单
    - 已嵌入邦级项目的实施伙伴和 AI CoE 搭建方
    - 把本土 AI 厂商和 IndiaAI 生态关系当作接入与背书通道，但不交出产品掌控权
  funnelTargets: "目标邦线索->合格设计试点 20-30%；合格设计试点->付费年度项目 40-50%；付费首邦->第二个受监测部署或部门 60%+"
  pricing: >-
    按受监测的厂商部署或工作流收取年度订阅，另加一笔一次性接入费，用于政策映射和连接器搭建。初始试点应小到能塞进现有 AI 专项或 CoE
    预算里，再转成年度合同，与研究假设的每个受监测部署约 $50k 对齐。
businessModel:
  revenueStreams:
    - 按受监测厂商部署或工作流收取的年度订阅
    - 每个新邦客户一次性的接入与控制项映射费
    - 面向更多工作流和语言的高级多语言基准包
    - 面向外部监督或采购周期的报告与招标比较模块
  unitOfValue: 邦 AI 项目内部的一个受监测厂商部署
  targetGrossMarginPct: 70
  expansionLevers:
    - 在首个邦客户内部增加更多工作流和厂商部署
    - 把控制项库复用到更多 AI 活跃邦
    - 一旦邦级打法标准化，扩张到部委和智慧城市项目
    - 一旦买方信任核心评分卡，追加销售基准和招标比较模块
strategyMap:
  northStarMetric: 被邦专项办公室接受、纳入月度跨厂商保障评审的已上线民生服务 AI 部署数量
  inputMetrics:
    - 从数据访问获批到首份月度评分卡的天数
    - 拿到可用对话记录或 API 导出访问的厂商部署数量
    - 被已批准多语言测试集覆盖的受监测交互占比
    - 在约定月度评审周期内解决的关键发现数量
    - 试点转年度合同的转化率
  moatsToBuild:
    - 横跨《印度 AI 治理指南》、DPDP、CERT-In 和邦条款的印度专属政策到控制项映射
    - 面向公共服务工作流的跨厂商多语言对话记录语料与失误分类体系
    - 缩短接入又不损中立的邦与厂商数据访问模板
  killCriteria:
    - 头 6 个目标邦里，9 个月内少于 2 个能从至少 2 家已上线厂商拿到可用数据访问
    - 首个试点在 6 个月内未能影响一次真实的评审决策，或未能把人工评审准备时间砍掉至少 50%
    - 12 个月内没有任何试点转化成 $150k 以上的年度合同，说明预算仍停在建议性而非运营刚需
  mermaid: |
    flowchart LR
      Wedge[Bihar multi-vendor citizen-service rollout] --> MVP[MVP transcript ingestion and monthly scorecard]
      MVP --> Proof[Proof points in one official review cycle]
      Proof --> Expansion[Second state template and ministry or Smart City expansion]
investorMemo:
  verdict:
    call: "观望"
    conviction: >-
      客户时机敏锐、差异化真实，但当前研究仍指向一个规模偏小、只限印度的市场，以及尚未解决的预算和数据访问风险。
    whyBelieve: >-
      Bihar 和其他邦级 AI 专项表明这波部署浪潮是真的，而且没有任何一家点名的竞品把厂商中立比较、多语言测试和印度专属公共部门控制项集于一个产品之中。
    whyDoubt: >-
      按当前假设，研究出来的 SAM 只有约 $2.4M，而公司还没证明谁能授权花钱、或能否保证跨厂商的对话记录访问。
    nextDiligence: >-
      拿下一个白纸黑字的试点，要有指名的预算归属人、两家厂商的数据访问，以及一条通往 $150k 以上年度合同的转化路径。
  firstCustomer:
    title: Bihar 电子政务牵头机构的专项主管
    profile: >-
      一个小型邦级项目办公室，统筹 2026 年 6 月横跨民生服务和教育试点的 AI MoU，负责厂商评审会和对外报告。
    trigger: >-
      试点部署在邦 AI 政策仍在敲定时就上线，制造出压力，要求在首次公众事故或内阁、立法评审之前先拿出治理成果。
    buyer: IT 秘书或电子政务专项主管
    initialContract: >-
      一个 3–6 个月、覆盖 1–2 个工作流和 2 家厂商的试点，约 $50k–$100k，一旦有 3–4 个部署进入月度评审，就转成
      $150k–$250k 的年度合同。
  mustBeTrue:
    - "首个邦里至少有两家已上线厂商，会在试点范围内提供对话记录或 API 导出访问。"
    - "牵头机构能从现有的 AI 专项、CoE、智慧治理或数字服务预算里为保障付费，而不必等一条新的软件预算科目。"
    - "一份月度跨厂商评分卡会揭示准确性、语言覆盖或数据处理上的差异，且这些差异能实质性改变一次评审或整改决策。"
    - "一个 3–6 个月的试点，一旦有 3–4 个部署被监测，就能转成 $150k–$250k 的年度合同。"
    - "Bihar 的控制项库能在 24 个月内复用到至少 4 个额外的 AI 活跃邦，而无需把产品重做成定制服务。"
  diligenceQuestions:
    - "Bihar 有哪个主体既能签下试点，又能强制 Google、Microsoft、CoRover 和 Sarvam 导出对话记录？"
    - "今天哪个工作流的出错代价最高：申诉、证件、福利资格，还是教育支持？"
    - "Bihar AI 政策草案里、或 MeitY 相关的报告预期里，有哪些条款能让这份评分卡强制到足以撑起预算？"
    - "多语言评测有多少能标准化，又有多少仍是经常性的人工服务成本？"
    - "有什么能阻止 Google、Microsoft 或某个实施伙伴，把'够用就行'的治理打包进部署合同？"
    - "最快的扩张路径究竟是更多邦、智慧城市，还是联邦部委，有什么证据支撑这个先后顺序？"
operatingAssumptions:
  - assumption: 现有的 AI 专项、CoE 或数字治理预算能为保障层付费，而不必等一条新的独立软件预算科目
    basis: research.yaml
    validationTest: 在头 90 天内，在 Bihar 加上至少另外 2 个 AI 活跃邦，拿到指名的预算归属人和白纸黑字的试点资金路径
    decisionImpact: 若不成立，定价和销售动作就得缩到建议性试点，或转成实施伙伴打包，这会削弱中立的邦政府优先立论
  - assumption: 邦政府能在首个已上线项目里从至少两家厂商拿到对话记录或 API 导出权
    basis: research.yaml
    validationTest: 在产品搭建越过 MVP 之前，收集至少 2 个厂商部署的样本导出和邦政府一侧的共享批准
    decisionImpact: 若不成立，接入会变成人工且政治上脆弱，公司可能得收窄到厂商侧 QA，而非邦政府侧保障
  - assumption: 买方看重一份中立的跨厂商评分卡，胜过依赖厂商原生仪表盘或人工委员会
    basis: idea.yaml
    validationTest: 与 5 个目标专项办公室做需求探索会和一份模拟评审材料包，确认他们会替换或实质性改变现有评审流程
    decisionImpact: 若不成立，产品就沦为一个软件杠杆很弱的报告服务，不应在需求验证前超前招人
  - assumption: 首批工作流的多语言基准集能搭建并维护，而毛利率不跌破目标
    basis: research.yaml
    validationTest: 为一个工作流搭一套印地语加一门地方语言的试点基准集，测量每月周期的人工评审工时和刷新成本
    decisionImpact: 若不成立，路线图就得收窄到更少的工作流或语言，且公司应推迟多邦扩张
  - assumption: Bihar 打法能在只做有限控制项库改动的情况下，复用到至少 4 个额外的 AI 活跃邦
    basis: 运营者判断
    validationTest: 在第 1 年招聘扩张前，比较 4 个后续邦的政策条款、工作流重合度和采购路径
    decisionImpact: 若不成立，市场就仍太定制、太小，撑不起风险投资级扩张，公司应留在服务主导，或停止规模化融资
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 在 Bihar 加上另外 3 个 AI 活跃邦，摸清预算归属和审批路径
    hypothesis: 在当前 AI 专项或 CoE 预算内部，存在一致的经济买方和可拨款的工作流
    successMetric: 在 4 个目标邦里至少 3 个，识别出指名的预算归属人和可信的资金路径
    owner: 创始人／公共部门 GTM
  - horizon: 0–90 天
    experiment: 在 Bihar 或一个可比的邦，从 2 个已上线厂商部署拿到样本对话记录或 API 导出访问
    hypothesis: 跨厂商数据访问可以在不重写整套采购栈的情况下拿到
    successMetric: 拿到两份可用导出，带元数据和白纸黑字的共享批准，可用于产品测试
    owner: 创始人／解决方案负责人
  - horizon: 0–90 天
    experiment: 为一个民生服务工作流搭一套印地语加一门地方语言的基准包
    hypothesis: 首个工作流能以可控的人工标注和评审投入完成打分
    successMetric: 4 周内上线一套已批准的基准集，并有一套书面的月度刷新流程
    owner: AI 评测负责人
  - horizon: 3–6 个月
    experiment: 在 1–2 个工作流和 2 家厂商上跑首份月度跨厂商评分卡试点
    hypothesis: 一份中立评分卡会在专项办公室内部改变至少一次整改或评审决策
    successMetric: 评分卡在一次正式评审会上被讨论，并有 3 项或以上纠正措施被接受
    owner: 创始工程师／政策负责人
  - horizon: 6–12 个月
    experiment: 把试点转成年度合同，并把覆盖扩到 3–4 个受监测部署
    hypothesis: 一旦评审工作流被运营化，专项办公室会拿出经常性预算付费
    successMetric: 签下一份价值 $150k 或以上的年度合同，并有 3–4 个部署上线
    owner: 创始人／公共部门 GTM
  - horizon: 9–18 个月
    experiment: 把模板复制到第二、第三个邦客户，或一个部委或智慧城市项目
    hypothesis: 控制项库和工作流包足够可移植，能支撑可复制的扩张
    successMetric: 拿下两个额外付费试点，或在首个客户之外有 6 个或以上受监测部署
    owner: 创始人／实施负责人
operations:
  - 搭建接入、脱敏、留存和审计日志工作流，对齐 DPDP 和 CERT-In 要求
  - 维护一套带版本的控制项库，对照《印度 AI 治理指南》、DPDP、CERT-In 和各邦草案条款
  - 为首批高流量民生服务用例做多语言基准生成和人工评审工作流
  - 面向专项办公室、厂商和外部监督相关方的月度评审材料包生产流程
  - 面向实施公司和 AI CoE 搭建方的合作打法，缩短部署又不交出买方归属
team:
  - role: 创始人／公共部门 GTM
    startTiming: 第 0 个月
    rationale: 邦预算导航、共创客户接入和专项办公室信任是最先卡关的因素，因此创始人必须亲自扛下销售和政策相邻的关系搭建
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: 首个产品验证取决于能否跨异构的厂商导出，可靠地做接入、规整、打分和评审材料包生成
  - role: AI 评测负责人
    startTiming: 第 2 个月
    rationale: 多语言测试设计和基准维护是产品可信度的核心，公司若想要 70% 毛利率，就不能让它停在临时外包任务上
  - role: 政策与合规负责人
    startTiming: 第 3 个月
    rationale: 在多邦扩张站得住脚之前，产品需要一套绑定《印度 AI 治理指南》、DPDP、CERT-In 和邦条款的可复用控制项库
  - role: 解决方案／实施工程师
    startTiming: 第 6 个月
    rationale: 除非把实施能力尽早产品化，否则邦与厂商的接入会卡在连接器、数据处理和部署规范上
milestones:
  - horizon: 0–12 个月
    items:
      - 拿下一个共创客户邦，从至少 2 个厂商部署获得数据访问
      - 用印地语加一门地方语言，为 1–2 个高风险工作流交付每月例行评分卡
      - 把首个试点转成覆盖 3–4 个受监测部署的 $150k 以上年度合同
      - 发布一套可复用的《印度 AI 治理指南》、DPDP 和 CERT-In 控制项库，用于邦接入
  - horizon: 12–24 个月
    items:
      - 通过另一个邦、部委或智慧城市项目，新增第二、第三个公共部门客户
      - 做到 6–8 个受监测部署和 4 种或以上可复用连接器模式
      - 上线可配置的工作流基准包和招标比较报告
  - horizon: 24–36 个月
    items:
      - 若可复制性得到验证，做到 5–6 个公共部门客户和 15 个或以上受监测部署
      - 标准化采购和报告模板，让新客户不再需要创始人主导的定制搭建
      - 依据赢单率和毛利数据，就部委、智慧城市或全球南方项目做出明确的扩张决策
risks:
  - risk: 邦 AI 项目内部没有明确的保障软件预算归属人出现
    likelihood: High
    impact: High
    mitigation: 把首单挂靠到一个活跃的 AI 专项、CoE 或数字治理工作流，并在扩编前要求一个指名的预算归属人
  - risk: 厂商或实施伙伴封锁对话记录或 API 导出访问
    likelihood: High
    impact: High
    mitigation: 在试点条款里锁定邦政府一侧的共享权，并在需要更深集成之前先支持对话记录导出接入
  - risk: 印度邦级市场起步太小，撑不起风险投资级扩张
    likelihood: High
    impact: High
    mitigation: 把第 1 年当作一次可复制性测试，若产品无法从 Bihar 扩到部委、智慧城市或多个邦，就停止规模化招人
  - risk: 多语言评测变得服务密集，压缩毛利率
    likelihood: Medium
    impact: High
    mitigation: 先从一个工作流和有限语言起步，再复用基准资产，并有选择地借助合作方增补语言覆盖
  - risk: 邦政策停留在建议性，或政治归属在试点转化前发生变化
    likelihood: Medium
    impact: Medium
    mitigation: 把产品锚定在绑定中央指引的当前评审与报告需求上，而不只绑一届政府或一条未来政策条款
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$1.5-2.5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的现金跑道应能养起一支小团队，赢下 2–3 个公共部门共创客户，把对话记录导出接入加上印度专属控制项库产品化，跑通一次付费年度转化，并检验从
    Bihar 往外扩张是否足够可复制，值得做风险投资级扩张。
