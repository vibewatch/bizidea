    - 31
    - 40
  geographicConsiderations:
  - point: Bihar is the best design-partner wedge because its multi-vendor rollout is already live while policy remains unsettled.
    sourceRefs:
    - 1
  - point: Second-wave demand is likeliest in states already running AI missions or drafting policies, such as Odisha and Kerala, plus the states named in ET's missions coverage.
    sourceRefs:
    - 12
    - 18
    - 19
  - point: A later expansion layer sits in union ministries and Smart City control rooms rather than in every district immediately.
    sourceRefs:
    - 6
    - 38
  sensitivityCases:
  - case: State AI policies stay aspirational and non-binding
    impact: Urgency drops from mandatory compliance to advisory reporting, stretching sales cycles and making early deals more services-heavy.
    sourceRefs:
    - 7
    - 8
    - 17
  - case: Hyperscalers bundle acceptable governance into deployment contracts
    impact: The wedge narrows toward cross-vendor comparison, India-specific policy templates, and multilingual benchmark depth rather than basic safety dashboards.
    sourceRefs:
    - 23
    - 25
    - 26
    - 27
    - 29
    - 30
  - case: Budgets remain tied to missions and CoEs rather than standalone software
    impact: The product must sell as a governance workstream inside funded AI programs instead of as an independent platform purchase.
    sourceRefs:
    - 1
    - 2
    - 3
    - 12
  validationPlan:
  - priority: high
    question: Can the state obtain transcript, prompt, or API-export rights across at least two live vendors?
    evidenceToGather: Draft MoU follow-on terms, sample transcript exports, and state-side data-sharing approvals from Bihar or a comparable state.
  - priority: high
    question: 'Which citizen-service workflows generate the highest risk-adjusted error cost: grievances, certificates, welfare eligibility, or education support?'
    evidenceToGather: A labeled sample of real service interactions, downstream escalation logs, and manual review outcomes by workflow.
  - priority: medium
    question: Which reporting artifacts would satisfy MeitY, the state cabinet, or legislative oversight without looking like vendor marketing?
    evidenceToGather: Existing review decks, compliance checklists, audit formats, and any draft state AI policy clauses referencing monitoring or incident handling.
