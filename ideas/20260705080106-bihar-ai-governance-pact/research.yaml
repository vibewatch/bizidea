openQuestions:
- Will Bihar's final AI policy require shared vendor logs, incident reporting, or third-party benchmarking, or will those controls stay voluntary?
- 'Who actually owns budget and data access in each target state: the nodal IT agency, a Smart City SPV, a department, or an implementation partner?'
- Can the startup obtain enough multilingual gold data to score factual accuracy on welfare, certificate, and grievance flows without services cost exploding?
- Will IndiaAI or a future AI Safety Institute publish common public-sector benchmark suites that commoditize part of the assurance layer?
