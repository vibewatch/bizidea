competitors:
- name: IBM watsonx.governance
  stage: incumbent
  wedge: Compliance mapping, evidence collection, and audit-ready reporting across a broad regulatory library.
  pricing: Custom enterprise pricing; no public self-serve pricing visible on the fetched product page.
  strength: Broad governance breadth and enterprise-grade compliance workflow.
  weaknessVsUs: Not visibly optimized for India-state, multilingual, cross-vendor public-service audits.
  sourceRefs:
  - 34
- name: Credo AI
  stage: scale-up
  wedge: Policy packs, risk library, and agent-governance controls across models and applications.
  pricing: Custom enterprise pricing; no public self-serve pricing visible on the fetched product page.
  strength: Strong positioning around regulatory mapping and runtime governance.
  weaknessVsUs: No India-state-specific public-sector templates or service-delivery depth visible in public materials.
  sourceRefs:
  - 32
- name: Holistic AI
  stage: scale-up
  wedge: Regulation-specific AI audits spanning bias, privacy, efficacy, robustness, and explainability.
  pricing: Custom enterprise pricing; demo-led sales motion with no public pricing on fetched product pages.
  strength: Explicit third-party audit framing.
  weaknessVsUs: Public materials do not show deep India-government or multilingual citizen-service specialization.
  sourceRefs:
  - 33
- name: Google Gemini Enterprise Agent Platform
  stage: incumbent
  wedge: Native model building, usage pricing, and monitoring inside the Google stack.
  pricing: Usage-based public pricing; fetched page shows Gemini 3.1 Pro from $2/1M input tokens and Gemini 3.5 Flash from $1.50/1M input tokens.
  strength: Strong native tooling, transparent usage pricing, and mature model-monitoring primitives.
  weaknessVsUs: Only sees Google-side telemetry rather than Microsoft, CoRover, Sarvam, and other vendor outputs together.
  sourceRefs:
  - 23
  - 24
  - 25
  - 26
- name: Microsoft Azure AI Foundry
  stage: incumbent
  wedge: Integrated AI platform with responsible-AI, observability, and data-residency controls.
