  stage: 扩张期
  wedge: 跨模型和应用的政策包、风险库和智能体治理管控。
  pricing: 定制企业定价；抓取的产品页上看不到公开的自助定价。
  strength: 在监管映射和运行时治理上定位很强。
  weaknessVsUs: 公开材料里看不到印度邦级专属的公共部门模板或服务交付深度。
