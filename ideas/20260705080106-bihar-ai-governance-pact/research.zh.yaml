competitors:
- name: IBM watsonx.governance
  stage: 现有厂商
  wedge: 在宽广的监管库上做合规映射、证据收集和可直接用于审计的报告。
  pricing: 定制企业定价；抓取的产品页上看不到公开的自助定价。
  strength: 宽广的治理广度和企业级合规工作流。
  weaknessVsUs: 看不出为印度邦级、多语言、跨厂商的公共服务审计做过优化。
