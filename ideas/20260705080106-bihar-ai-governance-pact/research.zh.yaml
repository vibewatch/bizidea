  validationPlan:
  - priority: 高
    question: 邦政府能否跨至少两家已上线厂商拿到对话记录、提示或 API 导出权？
    evidenceToGather: 来自 Bihar 或可比邦的 MoU 后续条款草案、样本对话记录导出，以及邦政府一侧的数据共享批准。
  - priority: 高
    question: 哪些民生服务工作流产生最高的风险调整后出错代价：申诉、证件、福利资格，还是教育支持？
    evidenceToGather: 一批带标注的真实服务交互样本、下游升级日志，以及按工作流拆分的人工评审结果。
  - priority: 中
    question: 哪些报告产物能满足 MeitY、邦内阁或立法监督，又不显得像厂商营销？
    evidenceToGather: 现有的评审材料、合规清单、审计格式，以及任何提及监测或事故处理的邦 AI 政策草案条款。
