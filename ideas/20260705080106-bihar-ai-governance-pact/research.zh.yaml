  stage: 现有厂商
  wedge: 在 Google 技术栈内的原生模型构建、用量计价和监测。
  pricing: 按用量的公开定价；抓取的页面显示 Gemini 3.1 Pro 起价 $2/1M 输入 tokens、Gemini 3.5 Flash 起价 $1.50/1M 输入 tokens。
  strength: 强大的原生工具、透明的用量定价和成熟的模型监测基元。
  weaknessVsUs: 只能看到 Google 一侧的遥测，无法把 Microsoft、CoRover、Sarvam 及其他厂商的产出一并看到。
