- name: Holistic AI
  stage: 扩张期
  wedge: 针对具体法规的 AI 审计，横跨偏见、隐私、有效性、稳健性和可解释性。
  pricing: 定制企业定价；演示主导的销售动作，抓取的产品页上无公开定价。
  strength: 明确的第三方审计定位。
  weaknessVsUs: 公开材料没有展示出对印度政府或多语言民生服务的深度专精。
