    - 8
  - point: 已嵌入部署的实施伙伴和 AI CoE 搭建方，能缩短拿到试点数据和服务负责人的路径。
    sourceRefs:
    - 2
    - 3
  - point: 与 IndiaAI 的算力、安全和报告项目对齐，能让产品显得像合规基础设施，而非可选软件。
    sourceRefs:
