topRisks:
  - name: 没有专门的预算科目
    description: >-
      这些 MoU 明确不含资金，所以牵头机构可能没有现成预算，可以在不走新采购审批的情况下为保障订阅付费。
    mitigation: >-
      用现有的数字治理或技能培训拨款科目（例如 Digital India／MeitY 相邻项目）来资助试点层，让邦政府不必新申请预算就能起步。
  - name: 政治与官僚层面的人事更替
    description: >-
      选举或内阁改组之后，邦政府的优先事项和人事可能变动，让一个绑在某届政府倡议上的试点停摆或被砍掉。
    mitigation: >-
      把保障层定位并记录成支撑即将出台的正式邦 AI 政策的基础设施，并与中央 MeitY 指引对齐，让它比任何一位部长的任期都活得更久。
  - name: 厂商抵触独立监测
    description: >-
      Google、Microsoft、CoRover 或 Sarvam AI 可能把第三方对其产出的打分视为对抗，进而限制打分所需的对话记录或 API 访问。
    mitigation: >-
      把产品定位成对厂商友好的保障即服务，帮每家厂商为未来的邦级招标证明合规，并在 MoU 后续条款里锁定邦政府一侧的数据访问权，而不是单靠厂商配合。
