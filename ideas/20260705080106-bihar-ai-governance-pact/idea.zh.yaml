problem: >-
  像 Bihar 这样的印度邦政府正一次性与多家厂商签署不含资金的 AI MoU——既有全球超大规模云厂商（Google、Microsoft），也有本土多语言专家（CoRover、Sarvam AI）——覆盖治理、教育、劳动力和民生服务用例，而该邦自己的 AI 政策还在起草。
  一旦试点上线，没有哪个邦 IT 部门具备内部工具或专业能力，去比对这些厂商面向公民的聊天机器人和工作流产出，看它们在事实准确性、语言覆盖、数据驻留或政策合规上究竟如何。由于这些 MoU 不含资金，没有采购关卡倒逼厂商按统一标准报告，于是各种失误（福利资格答错、方言不支持、数据流出本邦）会先在现场、在公民面前暴露，那时政府里甚至还没人有一块能看到问题的仪表盘。
targetUser:
  primary: >-
    某邦 IT／电子发展牵头机构（例如 Bihar 对应 BELTRON 的那类机构）里负责统筹多家 AI 厂商 MoU、推进民生服务落地的电子政务负责人或专项主管
  secondary: >-
    希望以可量化的合规做出差异化、在未来邦级招标中战胜超大规模云厂商的本土 AI 厂商（CoRover、Sarvam AI）
  buyer: 为多厂商 AI 试点预算拍板的邦 IT 秘书或电子政务专项主管
startupThesis:
  nonObviousInsight: >-
    头条讲的是谁拿下了 MoU，但真正卡住的是时序：各邦在自己的 AI 政策出台之前，就批准了多厂商、面向公民的 AI 试点。这意味着有一扇以月而非年计的窗口——一个卖给邦政府（而非任何厂商）的中立保障层，可以在这段时间里成为事实上的合规主干，让最终的政策去引用它，而不是等政策和它偏好的厂商都锁定之后才来竞争。
  beachhead: >-
    那些已经为民生服务或教育部署签下多份不含资金 AI 厂商 MoU、而邦级 AI 政策仍在草拟中的印度邦级电子政务牵头机构，先从 Bihar 信息技术部及其 MoU 对手方 CoRover、Sarvam AI 入手
  wedge: >-
    一个厂商中立的 AI 保障仪表盘：接入每家厂商面向公民的聊天机器人／工作流产出，对照邦 AI 政策草案条款标记出事实、语言覆盖和数据驻留违规，并生成一条邦政府可以拿去向自己的立法机构和 MeitY 呈报的统一审计轨迹
  whyNowCatalyst: >-
    Bihar 在官员确认邦 AI 政策仍在最后起草的同一天，签下四份并行的 AI MoU，横跨治理、教育、劳动力和民生服务，在厂商落地与治理工具之间制造出一道紧迫、有时限的缺口——其他正在起草类似政策的邦接下来也会撞上。
  ventureScalePath: >-
    在当前 MoU 落地期把 Bihar 的电子政务牵头机构拿下为共创客户，把由此形成的审计模式固化成一套可复用的邦 AI 政策合规模板，再横向扩展到十几个正在起草自己 AI 政策的印度邦，纵向切入 MeitY 的国家级报告，把产品做成印度公共部门 AI 的权威保障层，日后再延伸到面临同样多厂商时序问题的其他全球南方数字治理项目。
solution: >-
  推出一个轻量保障层，接入每家 MoU 厂商面向公民的部署（聊天机器人日志、API 产出或导出的对话记录），并持续按一套源自该邦 AI 政策草案的评分标准给回答打分：政府方案资格上的事实准确性、方言与语言覆盖声明，以及数据驻留／授权处理。所有发现汇总进一块仪表盘，电子政务牵头机构可以在厂商评审会和立法报告中使用，配上按厂商拆分的评分卡，让官员能在同一批坐标上比较 Google、Microsoft、CoRover 和 Sarvam AI，而不必依赖厂商自报的说法。一套轻量接入工具包，让邦政府几天内就能为一家新的 MoU 厂商搭起监测，抢在任何完整政策或采购流程之前。
goToMarketSeed:
  firstCustomer: >-
    Bihar 信息技术部／电子政务牵头机构，目前正统筹 Google、Microsoft、CoRover、Sarvam AI 的 MoU，用于民生服务和教育试点
  buyingTrigger: >-
    该邦 AI 政策进入最后起草，而四份厂商 MoU 已经上线，内部因此有压力，要向立法机构和 MeitY 证明试点是在被治理的，而不只是签了字
  currentAlternative: >-
    临时的内部委员会评审加上非正式的厂商自报，四家 MoU 厂商之间没有共享仪表盘，也没有统一的评估标准
  switchingReason: >-
    一份厂商中立的评分卡，让牵头机构能比任何正式采购驱动的审计流程提前数月，向自己的立法机构和 MeitY 展示治理成果，而成本只是自建能力的零头
  pricingHypothesis: >-
    按邦收取年度订阅费，按受监测的厂商部署计价，初始设一档低价试点层，用现有数字治理拨款科目而非新预算审批来支付
whyNow:
  - point: >-
      Bihar 在官员确认邦 AI 政策仍在敲定的同一天批准了四份并行的 AI 厂商 MoU，撕开一道治理缺口，一个中立保障层可以在政策锁定偏好工具之前先把它填上。
    signalRefs: [先部署后立政策的时序错位]
    sourceRefs: [1]
  - point: >-
      两家超大规模云厂商和两家本土厂商如今在同一个治理、教育、劳动力和民生服务空间里运作，却没有共享的评估标准，跨厂商比较由此成为一项尚未满足的紧迫需求。
    signalRefs: [多厂商、多领域的失控铺开]
    sourceRefs: [1]
  - point: >-
      本土厂商 CoRover 和 Sarvam AI 被明确定位在主权和多语言覆盖上，而只有当邦政府能拿它们与超大规模云厂商替代方案作对照度量时，这才是站得住脚的说法。
    signalRefs: [本土主权定位]
    sourceRefs: [1]
  - point: >-
      由于这些 MoU 不含资金，没有采购流程倒逼厂商问责，给第三方留下了一道结构性空档，去补上缺失的审计与报告层。
    signalRefs: [无资金的 MoU 结构]
    sourceRefs: [1]
  - point: >-
      面向政府员工、教师、学生和青年的 AI 技能培训计划，会迅速成倍放大跑在这些厂商工具上的公民和员工接触点数量，抬高不趁早备好监督工具的代价。
    signalRefs: [大规模公共部门技能培训铺开]
    sourceRefs: [1]
differentiator: >-
  与各自孤立报告自家部署的 MoU 厂商不同，这款产品保持厂商中立，直接卖给邦政府，让它得以在同一套源自该邦新兴政策语言的评分标准上，比较 Google、Microsoft、CoRover 和 Sarvam AI 的产出。因为它以轻量覆盖层的形式接在现有厂商 API 和对话记录之上，而不是一套替换平台，几天内就能上线——远早于任何厂商或邦政府自己自建出可比的跨厂商审计能力。
conceptDiagram:
  title: 邦 AI 治理保障流程
  mermaid: |
    flowchart LR
      Nodal[State e-governance nodal agency] --> MoUs[Vendor MoUs: Google, Microsoft, CoRover, Sarvam AI]
      MoUs --> Outputs[Citizen-facing chatbot and workflow outputs]
      Outputs --> Assurance[Vendor-neutral assurance layer]
      Assurance --> Scorecard[Per-vendor compliance scorecard]
      Scorecard --> Nodal
      Scorecard --> Legislature[Legislature and MeitY reporting]
