  - job: >-
      当本土厂商宣称在主权和多语言上胜过超大规模云厂商时，帮邦政府直接度量这些说法，好让采购决策建立在证据而非厂商营销之上
    currentAlternative: 相信厂商自带的基准测试和自报的语言覆盖说法
    successMetric: 每家厂商每季度被独立核验的政策相关声明数量
