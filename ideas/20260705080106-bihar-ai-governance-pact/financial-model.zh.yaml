modelDiagram:
  title: "邦客户营收循环"
  mermaid: |
    flowchart LR
      Programs[Funded state AI programs and CoEs] --> Pilots[Paid pilots]
      Pilots --> Accounts[Annual public-sector accounts]
      Accounts --> Deployments[Monitored deployments per account]
      Deployments --> Revenue[Subscription and onboarding revenue]
      Revenue --> GrossProfit[Gross profit after cloud and review COGS]
      GrossProfit --> Cash[Cash after lean operating spend]
modelSanity:
  - checkName: "营收引擎"
    finding: "基准情形由一个 Bihar 式试点驱动，到 Q4Y3 转化成 6 个付费公共部门客户和 18 个受监测部署，末值每客户 ARPU 约 $180K。"
  - checkName: "必须做对的事"
    finding: "公司必须在后续各邦复用同一套控制项库和接入动作，才能在不招一大批服务人手的情况下，让 Y3 毛利率仍收在 72% 附近。"
  - checkName: "模型会崩的情形"
    finding: "若销售周期滑约两个季度，或部署扩张卡在每客户约 2.5 个受监测部署以下，下行现金会向 $140K 底线收窄。"
  - checkName: "下一轮证明"
    finding: "下一段融资故事是到 Q4Y2 达到 3 个付费客户和 8 个受监测部署，并留有足够现金把第二邦可复制性推进到 Y3。"
sanityChecks:
  ruleOf40: "Y3 增长 167.8% ＋ EBITDA 利润率 -27.6% = 140.2%（方向上很强，但被 Y2 的小基数抬高了）。"
  burnMultiple: "Y2 按净新增收入约 2.0x，Y3 改善到约 0.4x，因为可复制的邦扩张让毛利增长快于烧钱。"
  revenuePerFte: "Y3 按 8 名末值 FTE 计为 $108K（基准 $200-400K SaaS），所以效率仍低于典型风险投资软件水平。"
  flags:
    - "Y3 每末值 FTE 收入仍偏低，所以风险投资故事取决于证明 Bihar 切口能在不线性增招服务人手的情况下，扩过头 5-6 个客户。"
    - "基准情形假设对话记录访问和政策映射能跨 4-5 个后续邦复用；若每个邦都变成定制，毛利率会打不到目标。"
    - "预算归属清晰和跨厂商数据访问仍是未经证明的假设，所以第一个共创客户比表格本身更重要。"
