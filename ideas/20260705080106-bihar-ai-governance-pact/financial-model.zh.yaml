slug: bihar-ai-governance-pact
date: "2026-07-05"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-05] 运营模型从商业计划落款月之后的第一个完整月份开始。"
  - id: A2
    name: "期初现金／pre-seed 募资额"
    value: "$1.5M"
    unit: "USD"
    source: "[BP fundingAsk.targetFundingRangeUsd $1.5-2.5M ＋ BP fundingAsk.useOfFundsSummary ＋ 针对印度本地公共部门 AI 团队的创业财务经验法则] 基准情形取所述区间的下限，因为在第二个邦的可复制性得到验证前，招聘保持精简。"
  - id: A3
    name: "期初付费客户数"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months ＋ BP experimentRoadmap] 公司从零营收起步，必须先赢下一个共创客户邦。"
  - id: A4
    name: "客户定义"
    value: "一个付费的公共部门客户，通常是一个邦级专项办公室或类似的政府项目，处于试点或年度合同之下。"
    unit: "definition"
    source: "[BP investorMemo.firstCustomer ＋ BP businessModel.unitOfValue] customersEop 按客户账户口径建模，因为一个客户会随后在多个受监测部署上扩张。"
  - id: A5
    name: "付费试点定价"
    value: "约 4 个月 $75K（每月约 $18.8K）。"
    unit: "USD/account"
    source: "[BP investorMemo.firstCustomer.initialContract 3-6 个月 $50k-$100k] 模型取所述试点区间的中值。"
  - id: A6
    name: "转化后的年度合同定价"
    value: "一旦 3 个受监测部署进入月度评审，年度经常性收入 $150K。"
    unit: "USD/account/year"
    source: "[BP investorMemo.firstCustomer.initialContract 一旦 3-4 个部署进入月度评审即 $150k-$250k 年度] 基准情形取年度区间的下限。"
  - id: A7
    name: "每客户部署扩张"
    value: "试点客户从 2 个受监测部署起步；成熟客户到 Q4Y3 达到约 3 个受监测部署、年化收入约 $180K。"
    unit: "deployments and USD/account/year"
    source: "[BP businessModel.revenueStreams ＋ BP businessModel.expansionLevers ＋ Research bottomUpSizingDrivers 假设每个受监测部署年度价格 $50k] $150K 以上的增量收入来自高级基准和报告模块。"
  - id: A8
    name: "客户爬坡与时点"
    value: "首个付费试点在 M7 启动，首份年度合同在 M11 上线，客户数在 Q4Y2 达到 3，在 Q4Y3 达到 6。"
    unit: "timeline and customersEop"
    source: "[BP experimentRoadmap 3-6 个月与 6-12 个月 ＋ BP milestones 12-24 与 24-36 个月] 爬坡先跟一个 Bihar 共创客户，之后才加入后续邦。"
  - id: A9
    name: "收入确认惯例"
    value: "试点期含接入和政策映射费；之后各期用平均活跃客户数乘以每客户的混合季度收入。"
    unit: "formula"
    source: "[BP gtm.pricing ＋ BP businessModel.revenueStreams] 这既让收入与客户数挂钩，又保留了计划中所述的一次性接入经济性。"
  - id: A10
    name: "毛利率爬坡"
    value: "Y1 为 45%-60%，Y2 为 62%-66%，Y3 为 68%-72%。"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 ＋ BP operatingAssumptions 关于多语言基准成本] 早期多语言评审更偏服务，之后可复用基准包和连接器改善毛利。"
  - id: A11
    name: "招聘时间线"
    value: "M1 创始人和创始工程师；M2 AI 评测负责人；M3 政策／合规负责人；M6 解决方案工程师；M15 第二名工程师；M27 第二名解决方案人手；M31 首名销售／合作人手。"
    unit: "timeline"
    source: "[BP team ＋ BP strategicChoices.sequencingRationale] 计划在组建规模化销售团队之前先补上产品、评测和实施产能。"
  - id: A12
    name: "创始人／公共部门 GTM 全成本现金薪酬"
    value: "$75K"
    unit: "USD/FTE/year"
    source: "针对一位亲自扛下邦销售、拿精简现金薪酬的印度本地 pre-seed 创始人的创业财务经验法则。"
  - id: A13
    name: "工程全成本现金薪酬"
    value: "$95K"
    unit: "USD/FTE/year"
    source: "针对搭建对话记录接入、打分和报告的印度本地资深产品与集成工程师的创业财务经验法则。"
  - id: A14
    name: "AI 评测全成本现金薪酬"
    value: "$65K"
    unit: "USD/FTE/year"
    source: "针对与 BP team 和 operations 相符的印度本地多语言评测人才的创业财务经验法则。"
  - id: A15
    name: "政策／合规全成本现金薪酬"
    value: "$70K"
    unit: "USD/FTE/year"
    source: "针对绑定 DPDP、CERT-In 和邦控制项库工作的印度本地政策与合规人才的创业财务经验法则。"
  - id: A16
    name: "解决方案／实施全成本现金薪酬"
    value: "$80K"
    unit: "USD/FTE/year"
    source: "针对支撑公共部门接入的印度本地部署与连接器人才的创业财务经验法则。"
  - id: A17
    name: "销售／合作全成本现金薪酬"
    value: "$90K"
    unit: "USD/FTE/year"
    source: "针对一位内含差旅和合作方管理成本的印度本地公共部门销售的创业财务经验法则。"
  - id: A18
    name: "薪酬向损益科目的分摊"
    value: "创始人 70% 计入 S&M、30% 计入 G&A；工程和 AI 评测 100% 计入 R&D；政策／合规 80% 计入 R&D、20% 计入 G&A；解决方案 40% 计入 S&M、60% 计入 R&D；销售 100% 计入 S&M。"
    unit: "allocation"
    source: "[BP team 各角色 rationale ＋ BP operations] 这把薪酬映射进模型所用的各职能运营支出科目。"
  - id: A19
    name: "非薪酬运营支出爬坡"
    value: "非薪酬支出从 M1 约每月 $6.5K 升到 Q4Y3 约每月 $23.5K。"
    unit: "USD/month"
    source: "[BP operations ＋ 创业财务经验法则] 这覆盖云、差旅、法务、安全工具和基础行政，且不假设一台庞大的地面销售机器。"
  - id: A20
    name: "现金转换惯例"
    value: "现金变动等于 EBITDA。"
    unit: "formula"
    source: "针对一家轻资产软件公司的创业财务经验法则——在 pre-seed 规模上，资本开支、税、债务和营运资金时点不单独建模。"
  - id: A21
    name: "月流失率"
    value: "2.5%"
    unit: "percent per month"
    source: "[BP risks 关于政策归属和预算续约 ＋ 早期公共部门经常性软件的创业财务经验法则] 年度工作流应该有黏性，但续约风险仍明显高于成熟 SaaS。"
  - id: A22
    name: "CAC 惯例"
    value: "$83K，用 Y1-Y3 销售与市场总支出除以 6 个已落地付费客户。"
    unit: "USD/account"
    source: "[用基准情形 S&M 支出的模型计算 ＋ BP gtm.channels ＋ BP gtm.funnelTargets] 创始人主导的销售和合作动作让 CAC 低于美国企业级基准，但仍高于中端市场 SaaS。"
  - id: A23
    name: "融资规模化的下一轮里程碑"
    value: "到 Q4Y2 达到 3 个付费客户和 8 个受监测部署，再到 Y3 中期用一套可复用的第二邦接入模板证明 4-5 个客户和 12 个受监测部署。"
    unit: "milestone"
    source: "[BP milestones 12-24 与 24-36 个月 ＋ BP fundingAsk.useOfFundsSummary ＋ 模型现金曲线] pre-seed 的规模按拿到可复制性证明、且保留六个月以上现金缓冲来测算。"
