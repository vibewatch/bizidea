scenarios:
  downside:
    description: "A second-state expansion slips by roughly two quarters, so the company exits Y3 with 4 accounts and 12 deployments instead of 6 and 18."
    y3RevenueK: 610.0
    y3EbitdaK: -395.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
      - "Account count ends Y3 at 4 instead of 6."
      - "Average deployment expansion stalls near 2.5 monitored deployments per account."
      - "Gross margin exits near 68% because multilingual review remains more manual."
  base:
    description: "One Bihar-style pilot converts, the control library reuses into two more public-sector accounts by Q4Y2, and Y3 exits at 6 accounts and 18 deployments."
    y3RevenueK: 865.0
    y3EbitdaK: -239.0
    cashLowPointK: 411.7
    keyAssumptionChanges:
      - "First paid pilot starts in M7 and converts to a $150K annual contract by M11."
      - "Account count reaches 3 by Q4Y2 and 6 by Q4Y3."
      - "Gross margin exits Y3 at 72% as benchmark packs and connectors are reused."
  upside:
    description: "Budget-owner clarity and transcript access arrive early enough that the same team reaches 7 accounts and 21 deployments by Q4Y3."
    y3RevenueK: 1050.0
    y3EbitdaK: -70.0
    cashLowPointK: 470.0
    keyAssumptionChanges:
      - "One extra state account lands in Y3 without materially accelerating hiring."
      - "Average deployment expansion reaches about 3.5 monitored deployments per account."
      - "Gross margin exits near 74% because onboarding becomes more standardized."
sensitivity:
  - variable: ARPU
    downsideCase: "Exit annual ARPU per account stays near $160K."
    baseCase: "Exit annual ARPU per account reaches $180K."
    upsideCase: "Exit annual ARPU per account reaches $200K."
    y3RevenueImpactK: -90.0
    cashImpactK: -65.0
  - variable: "sales cycle"
    downsideCase: "Two-quarter procurement delay on each new state."
    baseCase: "Founder-led and partner-led cycles convert every 6-9 months."
    upsideCase: "A reusable Bihar playbook shortens expansion cycles by one quarter."
    y3RevenueImpactK: -180.0
    cashImpactK: -150.0
  - variable: churn
    downsideCase: "4.0% monthly churn if budgets remain pilot-like."
    baseCase: "2.5% monthly churn."
    upsideCase: "1.5% monthly churn once annual reporting is embedded."
    y3RevenueImpactK: -45.0
    cashImpactK: -35.0
  - variable: "gross margin"
    downsideCase: "Y3 exit gross margin only reaches 68%."
    baseCase: "Y3 exit gross margin reaches 72%."
    upsideCase: "Y3 exit gross margin reaches 74%."
    y3RevenueImpactK: 0.0
    cashImpactK: -60.0
  - variable: "hiring pace"
    downsideCase: "Second solutions and sales hires are pulled forward by two quarters."
    baseCase: "Late-Y3 sales hire and Q3Y3 second-solutions hire only."
    upsideCase: "No sales hire is needed until after the modeled horizon."
    y3RevenueImpactK: 0.0
    cashImpactK: -95.0
  - variable: "deployment expansion"
    downsideCase: "Accounts average 2 monitored deployments at exit."
    baseCase: "Accounts average 3 monitored deployments at exit."
    upsideCase: "Accounts average 3.5 monitored deployments at exit."
    y3RevenueImpactK: -135.0
    cashImpactK: -90.0
modelDiagram:
  title: "State-account revenue loop"
  mermaid: |
    flowchart LR
      Programs[Funded state AI programs and CoEs] --> Pilots[Paid pilots]
      Pilots --> Accounts[Annual public-sector accounts]
      Accounts --> Deployments[Monitored deployments per account]
      Deployments --> Revenue[Subscription and onboarding revenue]
      Revenue --> GrossProfit[Gross profit after cloud and review COGS]
      GrossProfit --> Cash[Cash after lean operating spend]
modelSanity:
  - checkName: "Revenue engine"
    finding: "The base case is driven by one Bihar-style pilot converting into 6 paid public-sector accounts and 18 monitored deployments by Q4Y3, with exit ARPU near $180K per account."
  - checkName: "Must go right"
    finding: "The company has to reuse the same control library and onboarding motion across follow-on states so Y3 gross margin can still exit near 72% without hiring a large services bench."
  - checkName: "Model breaks if"
    finding: "If sales cycles slip by about two quarters or deployment expansion stalls below roughly 2.5 monitored deployments per account, downside cash compresses toward the $140K floor."
  - checkName: "Next-round proof"
    finding: "The next financing story is 3 paid accounts and 8 monitored deployments by Q4Y2, with enough remaining cash to prove second-state repeatability into Y3."
sanityChecks:
  ruleOf40: "Y3 growth 167.8% + EBITDA margin -27.6% = 140.2% (directionally strong but inflated by the small Y2 base)."
  burnMultiple: "About 2.0x in Y2 on net new revenue, improving to about 0.4x in Y3 as repeatable state expansion lifts gross profit faster than burn."
  revenuePerFte: "$108K Y3 on 8 exit FTE (benchmark $200-400K SaaS), so efficiency is still below classic venture software levels."
  flags:
    - "Y3 revenue per exit FTE is still low, so the venture case depends on proving that the Bihar wedge can expand beyond the first 5-6 accounts without linear services hiring."
    - "The base case assumes transcript access and policy mappings can be reused across 4-5 follow-on states; if each state becomes bespoke, gross margin will miss the target."
    - "Budget-owner clarity and cross-vendor data access remain unproven assumptions, so the first design partner matters more than the spreadsheet does."
