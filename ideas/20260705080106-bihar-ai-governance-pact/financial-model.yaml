slug: bihar-ai-governance-pact
date: "2026-07-05"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-05] the operating model starts in the first full month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed ask"
    value: "$1.5M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $1.5-2.5M + BP fundingAsk.useOfFundsSummary + startup-finance heuristic for India-local public-sector AI teams] the base case uses the low end of the stated range because hiring stays lean until second-state repeatability is proven."
  - id: A3
    name: "Starting paying accounts"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months + BP experimentRoadmap] the company starts pre-revenue and must first win a design-partner state."
  - id: A4
    name: "Customer definition"
    value: "One paid public-sector account, usually a state mission office or comparable government program under pilot or annual contract."
    unit: "definition"
    source: "[BP investorMemo.firstCustomer + BP businessModel.unitOfValue] customersEop is modeled at the account level because one account then expands across monitored deployments."
  - id: A5
    name: "Paid pilot pricing"
    value: "$75K over roughly 4 months (~$18.8K per month)."
    unit: "USD/account"
    source: "[BP investorMemo.firstCustomer.initialContract $50k-$100k over 3-6 months] the model uses the midpoint of the stated pilot range."
  - id: A6
    name: "Converted annual contract pricing"
    value: "$150K annual recurring revenue once 3 monitored deployments are reviewed monthly."
    unit: "USD/account/year"
    source: "[BP investorMemo.firstCustomer.initialContract $150k-$250k annual once 3-4 deployments are reviewed monthly] the base case uses the low end of the annual range."
  - id: A7
    name: "Deployment expansion per account"
    value: "Pilot accounts start at 2 monitored deployments; mature accounts reach about 3 monitored deployments and about $180K annualized revenue by Q4Y3."
    unit: "deployments and USD/account/year"
    source: "[BP businessModel.revenueStreams + BP businessModel.expansionLevers + Research bottomUpSizingDrivers assumed $50k annual price per monitored deployment] the extra revenue above $150K comes from premium benchmark and reporting modules."
  - id: A8
    name: "Customer ramp and timing"
    value: "First paid pilot starts in M7, first annual contract is live by M11, account count reaches 3 by Q4Y2, and 6 by Q4Y3."
    unit: "timeline and customersEop"
    source: "[BP experimentRoadmap 3-6 months and 6-12 months + BP milestones 12-24 and 24-36 months] the ramp follows one Bihar design partner first and only then adds follow-on states."
  - id: A9
    name: "Revenue recognition convention"
    value: "Pilot periods include onboarding and policy-mapping fees; later periods use average active accounts times blended quarterly revenue per account."
    unit: "formula"
    source: "[BP gtm.pricing + BP businessModel.revenueStreams] this keeps revenue tied to account count while preserving the one-time onboarding economics described in the plan."
  - id: A10
    name: "Gross margin ramp"
    value: "45%-60% in Y1, 62%-66% in Y2, and 68%-72% in Y3."
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions on multilingual benchmark cost] early multilingual review is services-heavier before reusable benchmark packs and connectors improve margin."
  - id: A11
    name: "Hiring timeline"
    value: "M1 founder and founding engineer; M2 AI evaluation lead; M3 policy/compliance lead; M6 solutions engineer; M15 second engineer; M27 second solutions hire; M31 first sales/partnerships hire."
    unit: "timeline"
    source: "[BP team + BP strategicChoices.sequencingRationale] the plan adds product, evaluation, and implementation capacity before a scaled sales team."
  - id: A12
    name: "Founder / public-sector GTM loaded cash compensation"
    value: "$75K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for an India-based pre-seed founder taking lean cash compensation while owning state sales directly."
  - id: A13
    name: "Engineering loaded cash compensation"
    value: "$95K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for India-based senior product and integration engineers building transcript ingestion, scoring, and reporting."
  - id: A14
    name: "AI evaluation loaded cash compensation"
    value: "$65K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for India-based multilingual evaluation talent consistent with BP team and operations."
  - id: A15
    name: "Policy / compliance loaded cash compensation"
    value: "$70K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for India-based policy and compliance talent tied to DPDP, CERT-In, and state control-library work."
  - id: A16
    name: "Solutions / implementation loaded cash compensation"
    value: "$80K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for India-based deployment and connector talent supporting public-sector onboarding."
  - id: A17
    name: "Sales / partnerships loaded cash compensation"
    value: "$90K"
    unit: "USD/FTE/year"
    source: "Startup-finance heuristic for an India-based public-sector seller with travel and partner-management costs embedded."
  - id: A18
    name: "Payroll allocation to P&L lines"
    value: "Founder 70% S&M and 30% G&A; engineering and AI evaluation 100% R&D; policy/compliance 80% R&D and 20% G&A; solutions 40% S&M and 60% R&D; sales 100% S&M."
    unit: "allocation"
    source: "[BP team role rationales + BP operations] this maps payroll into the functional opex lines used in the model."
  - id: A19
    name: "Non-payroll opex ramp"
    value: "Non-payroll spend rises from about $6.5K per month in M1 to about $23.5K per month by Q4Y3."
    unit: "USD/month"
    source: "[BP operations + startup-finance heuristic] this covers cloud, travel, legal, security tooling, and basic admin without assuming a large field-sales machine."
  - id: A20
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA."
    unit: "formula"
    source: "Startup-finance heuristic for an asset-light software company where capex, taxes, debt, and working-capital timing are not modeled separately at pre-seed scale."
  - id: A21
    name: "Monthly churn"
    value: "2.5%"
    unit: "percent per month"
    source: "[BP risks around policy ownership and budget renewal + startup-finance heuristic for early public-sector recurring software] annual workflows should be sticky, but renewal risk remains meaningfully higher than mature SaaS."
  - id: A22
    name: "CAC convention"
    value: "$83K, using total Y1-Y3 sales and marketing spend divided by 6 landed paid accounts."
    unit: "USD/account"
    source: "[Model calc using base-case S&M spend + BP gtm.channels + BP gtm.funnelTargets] founder-led selling and partner motions keep CAC below a U.S. enterprise benchmark but still high versus mid-market SaaS."
  - id: A23
    name: "Next-round milestone for funding sizing"
    value: "Reach 3 paid accounts and 8 monitored deployments by Q4Y2, then prove 4-5 accounts and 12 monitored deployments by mid-Y3 using a reusable second-state onboarding template."
    unit: "milestone"
    source: "[BP milestones 12-24 and 24-36 months + BP fundingAsk.useOfFundsSummary + model cash curve] the pre-seed is sized to get to repeatability proof with more than six months of cash buffer."
