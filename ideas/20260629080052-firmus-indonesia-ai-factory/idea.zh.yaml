problem: >-
  AI 工厂运营商已能锁定大规模 Nvidia 配额，但尚无完善的机制来销售、分批交付并激活这些产能给真实客户。非超大规模买家通常需要 32 至 256 张 GPU 的预留区块，并附有明确的上线日期；但运营商目前靠电子表格、CRM、DCIM 和自建脚本在多个系统间管理权属、机架就绪状态、供电模块和合同承诺。这一脱节同时造成两种失效：未售出的闲置库存，以及实际上并未准备好上线的超卖产能。
targetUser:
  primary: >-
    东南亚独立 AI 工厂运营商的 COO、产能交付负责人或商务运营主管，正在为 3 至 12 家主力租户推出首批 2,000 至 8,000 张 Nvidia GPU 机房
  secondary: >-
    区域 AI 软件、金融科技或工业模型公司的基础设施与采购负责人，需要预留 32 至 256 张 GPU 并获得有合同约束力的上线日期
  buyer: 首席商务官、COO 或 AI 产能业务总经理
startupThesis:
  nonObviousInsight: >-
    区域 AI 基础设施的新控制点不是另一个调度器或云控制台，而是一个产品化层——把大规模 Nvidia 配额拆解为可签约的小容量算力区块，每个区块附带明确的权属、就绪门控和客户验收证明。随着 GPU 供给向多年期园区级协议集中，稀缺的核心资产将变成可信赖、可销售的产能，而非单纯的硅晶片本身。
  beachhead: >-
    东南亚独立 AI 工厂运营商，正在分批推出首批 2,000 至 8,000 张 Nvidia GPU 机房，向 3 至 12 家区域企业租户销售 32 至 256 张 GPU 预留区块，并附有已签署的上线日期，时间窗口为未来 12 个月
  wedge: >-
    产能激活控制平面：把实际机架、电力、网络和配置的就绪状态映射到可售的 32 至 256 张 GPU 区块，再在上线前自动生成租户安全的权属方案和验收工作流
  whyNowCatalyst: >-
    Firmus 巴淡岛项目将最多 17 万张 Nvidia 加速卡的获取权与已签约客户协议声明相结合，并明确提出为中小企业拓宽获取渠道的目标，由此催生出把分批供给打包成可信赖小规模产品的迫切需求。
  ventureScalePath: >-
    从独立 AI 工厂的首批机房产能产品化起步，随着更多主权和私营园区上线，逐步扩展至多园区预留交易所、计费结算、工作负载可迁移性，以及区域 GPU 市场的风险承保。
solution: >-
  该产品成为商业承诺与物理集群就绪状态之间的系统记录。它从 CRM、DCIM、集群管理器和内部电子表格中摄取 GPU 交付计划、机架调试状态、供电模块通电情况、网络签收文件和租户需求，只对外暴露真正可以销售的产能区块。运营商用它为每位租户创建标准预留 SKU、分阶段上线计划、权属地图和验收清单，而不再靠定制化 SRE 项目应付每一次上线。随着时间推移，产品会学习哪些依赖项最常导致上线日期延误，并成为 AI 工厂产能规划、租户配置和扩容上线的默认层。
goToMarketSeed:
  firstCustomer: >-
    东南亚 100 至 500 人规模的 AI 工厂运营商，计划于 2027 年推出首批 2,000 至 8,000 张 Nvidia GPU 机房，有 3 至 12 家主力客户各需预留 32 至 256 张 GPU 并要求有合同约束力的上线日期
  buyingTrigger: >-
    运营商在机架、供电模块和网络域尚未完全就绪之前开始签署或谈判已承诺产能协议，商业承诺面临超越基础设施现实的风险。
  currentAlternative: >-
    靠电子表格、CRM 记录、通用项目管理工具和自建脚本拼凑的手工工作流，松散对接 DCIM、Kubernetes 和计费系统
  switchingReason: >-
    控制平面可防止超卖、减少定制租户配置工作，并比割裂的内部工具链更快地把分批 GPU 交付转化为可审计的可计费库存。
  pricingHypothesis: >-
    按在管活跃预留 GPU 区块或在管机房数量计收年费订阅，另加每次新机房上线及大规模扩容的实施费
