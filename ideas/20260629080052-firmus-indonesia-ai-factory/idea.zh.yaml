jobsToBeDone:
  - job: >-
      当新 AI 机房分批上线时，帮助运营商将真正就绪的 GPU 区块转化为可面向客户的预留产品，从而在不超卖的情况下签约并上线租户。
    currentAlternative: 电子表格、通用项目跟踪工具，以及商务团队与基础设施团队之间的内部协调
    successMetric: GPU 交付到租户上线的天数，以及按计划激活的已承诺区块比例
  - job: >-
      当新租户需要预留 32 至 256 张 GPU 区块时，帮助商务和基础设施团队生成权属与验收方案，从而无需定制化 SRE 项目即可完成配置。
    currentAlternative: 定制内部运行手册、工单队列和一次性基础设施脚本
    successMetric: 每次租户上线的工程工时，以及按合同日期完成上线的租户比例
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 三份窗口期内信源共同指向一个具体的 17 万张 GPU 建设计划及已命名的 Nvidia 合作关系，即使没有一手披露文件，信号也有实质分量。
  painIntensity:
    score: 4
    rationale: 一旦签订已承诺协议，已承诺产能与实际就绪产能之间的任何错位都可能导致昂贵库存闲置，或错过主力租户的上线日期。
  wedgeClarity:
    score: 5
    rationale: 针对分批 32 至 256 张 GPU 区块的产能激活是一个极窄的首个工作流切口，绑定了紧迫的买家时刻和可见的运营缺口。
  defensibility:
    score: 4
    rationale: 一个从交付里程碑、租户权属和上线失败中持续学习的就绪图谱，应当积累成内部工具所不具备的专有运营数据护城河。
  ventureScale:
    score: 5
    rationale: 滩头市场可扩展为多站点 AI 工厂运营的商务控制层、经纪业务、计费，以及区域算力市场的工作负载可迁移性。
topRisks:
  - name: 内部自建偏好
    description: 早期 AI 工厂运营商可能尝试自行拼接 CRM、DCIM 和集群工具，而不是采购一个新品类产品。
    mitigation: 以范围极窄的上线营收工作流切入，先在单个机房内展示缩短计费时间和降低超卖风险的价值，再考虑替换更广泛的系统。
  - name: 渠道压缩
    description: Nvidia、超大规模云厂商或主要云经纪商可能集中化产能分发，压缩独立运营商的市场空间。
    mitigation: 优先聚焦中立区域运营商，成为跨多个供给来源的互操作层，而非依赖任何单一上游渠道。
  - name: 数据真相混乱
    description: 建设、基础设施和商务系统对实际可上线产能的判断可能相互矛盾，损害产品的可信度。
    mitigation: 从只读模式起步，将多个系统整合为可审计的就绪视图，并在自动化下游动作前为每个可售产能区块附上证明材料。
