problem: >-
  AI factory operators can now secure giant Nvidia allocations before they have a clean way to
  sell, stage, and activate that capacity for real customers. Most non-hyperscale buyers want
  reserved 32-256 GPU blocks with hard go-live dates, but operators manage entitlements, rack
  readiness, power blocks, and contract promises across spreadsheets, CRM, DCIM, and internal
  scripts. That disconnect creates two failure modes at once: stranded inventory that is not sold,
  and oversold capacity that is not actually launch-ready.
targetUser:
  primary: >-
    COO, head of capacity delivery, or commercial operations leader at an independent Southeast
    Asian AI factory operator launching its first 2,000-8,000 Nvidia GPU hall for multiple anchor
    tenants
  secondary: >-
    Infrastructure and procurement lead at a regional AI software, fintech, or industrial-model
    company reserving 32-256 GPUs and needing a reliable go-live date
  buyer: Chief Commercial Officer, COO, or GM of AI capacity
startupThesis:
  nonObviousInsight: >-
    The new control point in regional AI infrastructure is not another scheduler or cloud console;
    it is the productization layer that converts elephant-sized Nvidia allocations into
    contractible smaller capacity blocks with explicit entitlements, readiness gates, and customer
    acceptance evidence. As GPU supply shifts into multi-year campus deals, the scarce asset
    becomes trustworthy sellable capacity, not raw silicon alone.
  beachhead: >-
    Independent Southeast Asian AI factory operators bringing their first 2,000-8,000 Nvidia GPU
    hall online in phased deliveries and selling 32-256 GPU reserved blocks to 3-12 regional
    enterprise tenants with signed go-live dates in the next 12 months
  wedge: >-
    A capacity activation control plane that maps real rack, power, network, and provisioning
    readiness to sellable 32-256 GPU blocks, then generates tenant-safe entitlement plans and
    automated acceptance workflows before go-live
  whyNowCatalyst: >-
    Firmus' Batam project couples access to up to 170,000 Nvidia accelerators with claims of
    committed customer deals and an explicit goal of widening access for smaller firms, creating an
    urgent need to package phased supply into trustworthy smaller offerings.
  ventureScalePath: >-
    Start with first-hall capacity productization for independent AI factories, then expand into
    multi-site reservation exchange, billing and settlement, workload portability, and risk
    underwriting for regional GPU markets as more sovereign and private campuses come online.
solution: >-
  The product becomes the system of record between commercial promises and physical cluster
  readiness. It ingests GPU delivery schedules, rack commission states, power-block energization,
  network sign-off, and tenant requirements from CRM, DCIM, cluster managers, and internal
  spreadsheets, then exposes only the capacity blocks that are truly sellable. Operators use it to
  create standard reservation SKUs, staged onboarding plans, entitlement maps, and acceptance
  checklists for each tenant instead of bespoke SRE projects. Over time it learns which
  dependencies most often break launch dates and becomes the default layer for capacity planning,
  tenant provisioning, and expansion launches across AI factories.
goToMarketSeed:
  firstCustomer: >-
    A 100-500 person Southeast Asian AI factory operator launching its first 2,000-8,000 Nvidia
    GPU phase in 2027, with 3-12 anchor customers that each need 32-256 reserved GPUs and a
    contractually meaningful go-live date
  buyingTrigger: >-
    The operator starts signing or negotiating committed capacity deals before every rack, power
    block, and network domain is fully ready, so commercial commitments are at risk of outrunning
    infrastructure reality.
  currentAlternative: >-
    Manual workflow across spreadsheets, CRM records, generic project-management tools, and
    internal scripts stitched loosely to DCIM, Kubernetes, and billing systems
  switchingReason: >-
    The control plane prevents overselling, reduces bespoke tenant provisioning work, and turns
    staged GPU deliveries into auditable billable inventory faster than a disconnected internal
    stack can.
  pricingHypothesis: >-
    Annual subscription priced per live reserved-GPU block or per hall under management, plus
    implementation fees for each new hall launch and major capacity expansion
