jobsToBeDone:
  - job: >-
      When a new AI hall is coming online in phases, help the operator turn only truly ready GPU
      blocks into customer-ready reservations, so they can sign and launch tenants without
      overselling.
    currentAlternative: Spreadsheets, generic project trackers, and internal coordination between commercial and infrastructure teams
    successMetric: Days from GPU delivery to tenant go-live and percent of promised blocks activated on schedule
  - job: >-
      When a new tenant wants a reserved 32-256 GPU block, help commercial and infrastructure teams
      generate an entitlement and acceptance plan, so they can provision the tenant without a
      bespoke SRE project.
    currentAlternative: Custom internal runbooks, ticket queues, and one-off infrastructure scripts
    successMetric: Engineering hours per tenant launch and percent of tenants launched on the contracted date
ideaScorecard:
  signalStrength:
    score: 4
    rationale: Three in-window sources converge on a concrete 170,000-GPU build-out and a named Nvidia relationship, giving the signal real weight even without a primary filing.
  painIntensity:
    score: 4
    rationale: Once committed deals are signed, any mismatch between promised and ready capacity can strand expensive inventory or miss anchor-tenant launch dates.
  wedgeClarity:
    score: 5
    rationale: Capacity activation for phased 32-256 GPU blocks is a narrow first workflow tied to an urgent buyer moment and a visible operational gap.
  defensibility:
    score: 4
    rationale: A readiness graph that learns from delivery milestones, tenant entitlements, and launch failures should compound into proprietary operational data that internal tools lack.
  ventureScale:
    score: 5
    rationale: The beachhead can expand into the commercial control layer for multi-site AI factory operations, brokerage, billing, and workload portability across regional compute markets.
topRisks:
  - name: Internal-build bias
    description: Early AI factory operators may try to stitch together CRM, DCIM, and cluster tooling themselves instead of buying a new category.
    mitigation: Land with a narrowly scoped launch-revenue workflow that shows time-to-bill and oversell-risk savings inside one hall before asking to replace broader systems.
  - name: Channel compression
    description: Nvidia, hyperscalers, or major cloud brokers could centralize capacity distribution and shrink the independent-operator segment.
    mitigation: Focus first on neutral regional operators and become the interoperability layer across multiple supply sources rather than depending on any single upstream channel.
  - name: Messy source-of-truth data
    description: Construction, infrastructure, and commercial systems may disagree on what capacity is actually launch-ready, undermining trust in the product.
    mitigation: Start read-only, reconcile multiple systems into an auditable readiness view, and attach evidence to every sellable capacity block before automating downstream actions.
