scenarios:
  downside:
    description: 试点转化延迟约一个季度，运营商将定价锚定在区间低端，公司以第 3 年仅 3 个在线付费机房退出。
    y3RevenueK: 1706.3
    y3EbitdaK: -941.6
    cashLowPointK: 419.4
    keyAssumptionChanges:
    - 首个付费机房在第 9 个月而非第 6 个月上线，第 2 年以 2 个在线机房退出，第 3 年以 3 个而非 4 个退出。
    - 每机房混合年收入从 $700K 降至 $650K，因为买家将定价锚定于首批机房订阅区间低端。
    - 毛利率从 72% 降至 68%，因为部署工作和客户特定集成仍较为手工。
  base:
    description: 一个标杆部署转化为参考客户，然后扩展至第 3 年 4 个在线付费机房，团队在 A 轮前保持自律。
    y3RevenueK: 2537.5
    y3EbitdaK: -340.6
    cashLowPointK: 1404.5
    keyAssumptionChanges:
    - 客户数量遵循 A6–A8，第 2 年末达到 3 个在线机房，第 3 年末达到 4 个。
    - 每机房混合年收入维持在 $700K，毛利率维持在 72% 的商业计划目标。
    - 团队在第 4 年第 3 季度达到 11 名 A 轮前全职员工，第二个规模化 GTM 岗位推迟至下轮融资后。
  upside:
    description: 首次参考部署加速了多机房扩张，实现了更高定价，第 3 年末退出时达到 5 个在线付费机房。
    y3RevenueK: 3468.8
    y3EbitdaK: 328.7
    cashLowPointK: 2346.7
    keyAssumptionChanges:
    - 首个在线机房于第 5 个月上线，第 2 年以 4 个在线机房退出，第 3 年以 5 个退出——一家运营商提前扩张。
    - 每机房混合年收入从 $700K 升至 $750K，因为公司抓住更多 $0.5–0.8M 订阅区间，并更早附加跨机房分析。
    - 毛利率从 72% 提升至 74%，因为集成和租户就绪工作流变得更模板化。
sensitivity:
- variable: ARPU
  downsideCase: 每机房混合年收入稳定在 $650K，因为买家将公司锚定于首批机房定价并延迟追加购买模块。
  baseCase: 每机房混合年收入维持在建模的 $700K。
  upsideCase: 每机房混合年收入达到 $750K，多机房分析和更强的 ROI 证明提升了收入捕获。
  y3RevenueImpactK: -181.2
  cashImpactK: -199.3
- variable: CAC
  downsideCase: 全成本 CAC 上升至约 $340K，因为每个新机房需要更多创始人时间、差旅和概念验证集成工作。
  baseCase: 建模 CAC 维持在每个新付费机房约 $280K。
  upsideCase: 共创客户参考缩短了资格认定和采购周期，CAC 降至约 $220K。
  y3RevenueImpactK: 0.0
  cashImpactK: -240.0
- variable: 流失率
  downsideCase: 留存表现如同第 3 年末损失一个机房——因为工作流仍像项目而非系统记录级关键。
  baseCase: 基础情景假设单位经济模型月流失率 1.5%，建模客户路径已纳入温和的集中风险。
  upsideCase: 留存表现如同保住每个机房并更快扩张——因为零超卖证明使产品在续约时具有强粘性。
  y3RevenueImpactK: -262.5
  cashImpactK: -166.8
- variable: 销售周期
  downsideCase: 采购、合规和数据就绪问题使每次标杆客户后的新签约多出约一个季度。
  baseCase: 基础情景假设首个试点在第 6 个月完成，后续签约遵循稳定但可重复的节奏。
  upsideCase: 参考部署将周期压缩约一个季度，提前拉入多机房签约。
  y3RevenueImpactK: -262.5
  cashImpactK: -336.3
- variable: 毛利率
  downsideCase: 毛利率维持在约 70%，因为客户特定集成和上线支持仍人力密集。
  baseCase: 毛利率维持在商业计划 72% 目标。
  upsideCase: 连接器和权属工作流变得更可复用，毛利率提升至 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -83.2
- variable: 招聘节奏
  downsideCase: 解决方案、数据、客户成功和产品岗位均需提前一个季度到位，以支撑定制化部署。
  baseCase: 基础情景等待在线机房数量为每个创始人后岗位提供合理化依据。
  upsideCase: 团队维持建模的招聘节奏，因为前 3 至 4 个机房仍可模板化交付。
  y3RevenueImpactK: 0.0
  cashImpactK: -143.8
modelDiagram:
  title: 单位经济模型流程图
  mermaid: |
    flowchart LR
      QualifiedOperators --> PaidHalls
      PaidHalls --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
      ReferenceDeployments --> QualifiedOperators
modelSanity:
- checkName: 营收引擎
  finding: 基础情景营收来自第 1 年 1 个在线机房增长至第 3 年 4 个在线机房，每机房混合年收入约 $700K。
- checkName: 必须做对的事
  finding: 首次共创客户部署必须足够快地转化为参考订阅，支撑第 2 年第 2 季度的第二个在线机房和第 2 年第 4 季度的第三个。
- checkName: 模型崩溃情形
  finding: 若定价压缩至 $650K 或销售周期延迟一个季度，第 3 年营收下降约 $180–260K，种子轮现金缓冲明显收窄。
- checkName: 下轮融资证明
  finding: A 轮故事是 3 个在线付费机房、ARR $1.5–2.1M，以及 2 份 ROI 支撑的书面参考部署——证明平台预防了超卖或加速了上线。
sanityChecks:
  ruleOf40: Y3 growth 107.1% + EBITDA margin -13.4% = 93.7%
  burnMultiple: 第 2 年和第 3 年净消耗/净新增 ARR 为 0.4x 和 0.5x，效率较高，但依赖在极少客户基础上维持高 ACV。
  revenuePerFte: $230.7K 第 3 年（基准：早期企业基础设施 SaaS $200–350K）
  flags:
  - 基础情景假设公司从研究估算约 18 个近期机房的滩头市场中赢得 4 个在线机房，因此客户数量验证是最大的营收顶线风险。
  - 实施和上线支持经济效益被归入混合 ARPU 而非单独的服务收入线，这平滑了季度波动性，但可能低估了现金的不均匀性。
  - 即使在基础情景中，公司到第 3 年仍未完全实现 EBITDA 盈亏平衡，因此下轮融资仍更多依赖 ARR 质量和参考证据而非盈利能力。
  - "客户集中度持续较高：第 3 年若损失一个机房，将减少约 $700K 的退出 ARR，明显压缩现金缓冲。"
