slug: gpu-campus-activation-os
date: '2026-06-29'
executiveSummary: >-
  东南亚独立 AI 工厂运营商正在每个机架、供电模块和冷却回路完全就绪之前签署已承诺的主力租户产能协议，同时面临超卖未可用库存和优质 GPU 区块因缺乏可靠就绪信号而闲置的双重风险。目前没有任何产品占据商业承诺与物理机房就绪状态之间的接缝：DCIM 套件跟踪基础设施，CRM 跟踪合同，公有云调度器分配活跃集群，但没有一个能把分批 GPU 建设转化为中立运营商的合同安全、租户就绪库存。这家公司打造产能激活操作系统——一个从运营商 CRM、DCIM 和配置系统中摄取机架调试状态、供电模块通电情况、冷却签收文件和租户需求，只暴露每个阶段真正可售 GPU 区块的系统记录。滩头市场规模小但紧迫：新加坡—柔佛—巴淡岛走廊内的 3 至 5 家东南亚 AI 工厂运营商，正在跨越 2027 至 2028 年推出首批 2,000 至 8,000 张 GPU 机房，附有已签署的上线日期。Firmus 巴淡岛项目承诺分批交付最多 17 万张 Nvidia 加速卡，并公开宣称营收已依赖已签约客户协议，是买家时机真实且受时间约束的最清晰信号。风险投资规模的路径来自于将机房级就绪数据积累成多园区 AI 工厂运营、租户经纪和跨站点工作负载可迁移性的默认商业化层，随着区域 GPU 市场走向成熟。

problem:
  - >-
    AI 工厂运营商已能锁定大规模 Nvidia 配额，但尚无完善的系统来分批销售和激活这些产能；DCIM、CRM 和集群工具互不相连，使商业承诺无法对照物理就绪里程碑进行追踪。
  - >-
    跨越 12 至 18 个月园区建设的分批 GPU 交付，迫使运营商在所有机架、供电模块和冷却回路完成调试之前做出合同上线承诺，造成双重失效——无法激活的超卖产能，以及因商务团队无法确认就绪状态而闲置未变现的可售库存。
  - >-
    需要 32 至 256 张 GPU 预留区块的非超大规模买家，要求标准化的预留 SKU、权属地图和验收清单；而今天每次租户上线都是定制化的 SRE 项目，而非可重复的工作流，推高了每次上线成本，拖延了计费时间。

solution:
  - >-
    产能激活控制平面：从 CRM、DCIM、集群管理器和电子表格中摄取 GPU 交付计划、机架调试状态、供电模块通电情况、网络签收文件和租户需求，经过门控后只暴露附有证明链接的真正可售 GPU 区块。
  - >-
    标准预留 SKU 构建器和租户权属生成器：把门控后的产能区块转化为可签约的 32 至 256 张 GPU 产品、分阶段上线计划和自动化验收清单——消除每次租户上线的定制化 SRE 运行手册。
  - >-
    就绪风险分析仪表板：向运营商展示所有在途租户承诺的上线风险敞口，使上线日期风险在成为合同违约之前就能在董事会层面可见。

whyWeWin:
  - >-
    没有任何在位产品贯穿商务就绪接缝；DCIM 套件（Schneider、Sunbird）止步于基础设施遥测，而 CRM 和公有云预留产品不为中立运营商园区建模部分调试状态。
  - >-
    每次机房部署都会生成一个专门针对该运营商基础设施、供应商和租户组合进行校准的就绪图谱；这个数据集随每次上线而积累，通用工作流工具在结构上难以复制。
  - >-
    购买触发点是董事会级营收风险事件——向已承诺主力租户超卖——而非生产力优化，这缩短了销售周期，并相对于年度软件订阅成本提升了付费意愿。
  - >-
    在首次机房上线期间切入，创造了高信任的扩张路径：一旦首次部署证明了 ROI，运营商自然会授权访问后续机房、额外站点，以及下游计费和经纪工作流。

strategicChoices:
  beachhead: >-
    东南亚独立 AI 工厂运营商，正在新加坡—柔佛—巴淡岛走廊跨越 2026 至 2027 年推出首批 2,000 至 8,000 张 Nvidia GPU 机房，有 3 至 12 家主力租户需要已签署的上线日期，预留 32 至 256 张 GPU 区块。
  wedgeRationale: >-
    机房上线工作流比任何更宽泛的平台定位提供更快、更可证伪的验证：成功是二元的（租户按合同日期上线，零超卖事件），买家痛点紧迫且受时间约束，单次机房部署中捕获的数据可直接复用于下一次。更宽泛的产能管理定位需要替换运营商已拥有的 DCIM 和 CRM 系统，增加阻力和销售周期长度。
  sequencingRationale: >-
    先造产品再招 GTM：就绪图谱和权属工作流必须在销售岗位之前存在，因此首次共创客户部署同时充当参考案例。创始人主导销售先于规模化渠道：滩头市场买家池不足 20 家运营商，每家都需要只有创始人早期才能传递的技术可信度。DCIM 和设施电力集成先于计费和经纪模块：数据质量是核心信任资产；下游商务 API 只有在就绪信号经过至少一次实际上线结果验证后才发布。
  notYet:
    - 多站点产能经纪和二级 GPU 预留交易所
    - 租户费用的计费、结算和开票模块
    - 跨多个园区的工作负载可迁移性和作业调度
    - 北亚、印度和中东地理扩张
    - GPU 融资、风险承保或配额交易产品

market:
  tam: "$120M ARR 全球（估算：约 120 个可触达 AI 算力机房 × 约 $1M ACV）"
  sam: "$14.4M ARR 东南亚（估算：36 个月内 18 次首批机房部署 × 约 $0.8M ACV）"
  som: "$2.8M ARR 第 3 年（估算：4 个在线机房 × 约 $0.7M ARR；基于已研究的 SOM）"
  segments:
    - >-
      东南亚独立 AI 工厂运营商，将分批 Nvidia GPU 机房商业化面向多租户预留产能（主要滩头市场）
    - >-
      新加坡—柔佛—巴淡岛走廊内向内外部买家以确定上线日期分配产能的主权或企业级 AI 园区（次级扩张）
  buyingProcess: >-
    COO 或 CCO 在签署首批主力租户承诺后识别超卖或上线风险；评估包含技术层面（与现有 DCIM 和 CRM 的概念验证集成）和商务层面（ROI 对比避免超卖违约损失和加快计费时间），基于运营商判断估计从首次演示到试点合同为 60 至 120 天周期；尚未收集一手买家访谈数据。

product:
  mvp: >-
    与一套 DCIM、一套 CRM 和运营商电子表格集成的只读产能就绪仪表板；将机架、供电模块和网络状态整合为带证明链接的门控可售 GPU 区块视图；为每个在途租户承诺输出上线置信度评分。
  sixMonth: >-
    可售区块生成器和权属工作流：运营商创建标准 32 至 256 张 GPU 预留 SKU，分配带分阶段上线计划的租户权属，并运行自动化验收清单；首个共创客户机房按合同日期上线并开始计费。
  twelveMonth: >-
    支持单个机房内 3 至 12 家并发租户的多租户上线模块；就绪风险分析对商务、运营和管理团队可见；第二家 DCIM 厂商和一个 GPU 配置系统的 API 连接器；第二个付费机房部署进行中。
  twentyFourMonth: >-
    管理同一运营商内两个或更多机房、或跨两家运营商的多机房控制平面；就绪图谱导出至下游计费和产能规划工具；早期跨园区风险基准分析对主力客户可用。
  keyBets:
    - >-
      运营商愿意为能够预防单次大规模超卖事件的产品支付企业 SaaS 定价，即使完整平台尚未建成。
    - >-
      来自 DCIM、CRM 和调试工具的结构化数据可通过 API 或 CSV 提取，无需多年集成项目。
    - >-
      机房上线工作流通过就绪历史、权属记录和验收证明形成足够的锁定效应，使运营商在产品内部扩展而非重建。

gtm:
  wedge: >-
    创始人主导与 3 至 5 家东南亚 AI 工厂运营商的 COO 和商务负责人建立联系，这些运营商目前正在签署或谈判主力租户已承诺协议，其首批 GPU 机房将于 2027 年正式上线。
  channels:
    - >-
      创始人主导直销，目标为巴淡岛、柔佛和雅加达走廊内已有记录的分批 GPU 建设项目的 5 至 10 家具名运营商
    - >-
      与 AI 机房调试期间已在场的 DCIM 和设施电力集成商（Schneider 生态系统）建立共创客户合作关系
    - >-
      通过 Firmus/DayOne 类型合作网络获得 Nvidia 生态系统和 GPU 园区开发商推荐；东南亚 AI 工厂社区规模小且关系紧密
  funnelTargets: >-
    合格运营商到试点合同转化率 30–50%；试点（单机房直至上线）到年度订阅转化率 60% 以上；年度到第二机房扩张转化率 70% 以上
  pricing: >-
    按在管机房数量收取年度订阅（2,000 至 8,000 张 GPU 机房 ACV 约 $0.5–0.8M），加一次性机房上线实施费（每个新机房 $50–150K）；定价锚定于单次预防超卖事件的财务风险敞口（潜在违反数百万美元主力合同），而非席位数或 GPU 数量。

businessModel:
  revenueStreams:
    - 产能激活控制平面的每机房年度 SaaS 订阅
    - 一次性机房上线及大规模扩容实施费
    - 多机房就绪分析和跨园区风险基准模块（第 2 年起）
  unitOfValue: 处于活跃商务管理中、有在线租户承诺的机房阶段
  targetGrossMarginPct: 72
  expansionLevers:
    - 同一运营商内的额外机房（站内扩张）
    - 利用首个参考案例开拓第二、第三家运营商部署
    - 随运营商成长为多园区组合，推出多站点交易所和计费模块
    - 第 3 年起面向 GPU 产能部署模式的跨园区数据基准产品

strategyMap:
  northStarMetric: >-
    在所有在线机房中按合同上线日期完成上线的 GPU 预留租户数量
  inputMetrics:
    - "GPU 交付里程碑到可售区块创建的天数（入库时间）"
    - "每机房每季度超卖事件数（目标：零）"
    - 每次租户上线的工程工时 vs. 运营商历史基准定制化 SRE 项目
    - 机房级就绪置信度评分准确性 vs. 实际上线结果
    - 每机房运营商净营收留存率，含扩张至额外机房和站点
  moatsToBuild:
    - >-
      针对每家运营商基础设施、供应商和租户组合进行校准的机房级就绪图谱——需要 6 至 12 个月在线运营才能积累，无法仅凭通用 DCIM 遥测数据复制
    - >-
      跨园区的交付里程碑、租户失效模式和上线风险规律数据集，使新机房在上线之前就能获得前瞻性风险评分
    - >-
      与 DCIM、CRM 和 GPU 配置栈的深度集成，使切换回自建项目的成本相对于 SaaS 订阅而言高得不合算
  killCriteria:
    - >-
      经过 3 次共创客户对话后，没有运营商确认预防超卖或加快计费时间值得支付 $100K 以上的试点预算：定价假设失败
    - >-
      首次机房部署超过 9 个月仍未显示可衡量的计费时间缩短或一次预防超卖事件：产品市场契合假设失败
    - >-
      第 18 个月时，不足 2 个付费机房在线且第二家客户未签约：滩头市场过窄或品类时机过早
  mermaid: |
    flowchart LR
      Wedge[滩头市场：首次机房上线风险] --> MVP[MVP：就绪仪表板 + 证明链接]
      MVP --> Proof[验证：租户按合同日期上线，零超卖]
      Proof --> Expand[扩张：同一运营商第二机房]
      Expand --> MultiSite[多站点控制平面]
      MultiSite --> Platform[平台：计费、经纪、工作负载可迁移性]

investorMemo:
  verdict:
    call: "深入调研 / 跟进"
    conviction: >-
      对切口清晰度和为何现在的时机具有高信念；主要不确定性在于东南亚滩头市场的买家池是否足够大，能在窗口关闭或在位企业响应之前建立品类验证。
    whyBelieve: >-
      Firmus 巴淡岛公告是多个汇聚信号之一，表明独立 AI 工厂运营商正在机房完全调试之前做出大型公开营收承诺，产生了董事会级痛点——如果产品能展示单次预防超卖事件，就足以支撑企业软件定价和快速采购。
    whyDoubt: >-
      上线时可触达的买家池少于 20 家东南亚运营商，因此公司必须在一个小市场中赢得不成比例的份额，并在第二轮融资可信之前扩大市场范围。
    nextDiligence: >-
      确认至少两家已命名的东南亚 AI 工厂运营商正在签署或积极谈判 2027 年 GPU 机房上线前的已承诺主力租户协议，且其商务和运营团队在结构化探索通话中承认就绪偏移问题。
  firstCustomer:
    title: "AI 工厂运营商 COO 或 CCO——首次机房上线"
    profile: >-
      100 至 500 人规模的东南亚基础设施运营商，计划在巴淡岛、柔佛或雅加达推出首批 2,000 至 8,000 张 Nvidia GPU 机房，有 3 至 12 家主力租户正在最终谈判 32 至 256 张 GPU 预留区块，上线日期有合同约束力，定于 2027 年。
    trigger: >-
      运营商商务团队在每个机架、供电模块和网络域完全调试之前签署（或距签署仅差几天）主力租户已承诺产能协议；运营层面某人意识到商业承诺已超越基础设施现实。
    buyer: "COO 或首席商务官"
    initialContract: >-
      $50–150K 实施费加第一年 $0.5–0.8M 订阅，覆盖一个机房；转化路径为 4 至 6 周概念验证集成工作坊（免费或象征性费用），引入单个机房直至上线的付费试点，然后在续约时转为年度订阅。
  mustBeTrue:
    - >-
      到 2027 年底，至少 5 家东南亚独立 AI 工厂运营商会在首批机房完全调试之前签署 32 至 256 张 GPU 预留区块的已承诺主力租户协议。
    - >-
      单次超卖事件的经济成本——违反主力租户合同或上线延期——超过 $500K，使 $0.5–0.8M 年度订阅仅凭预防价值即可合理化。
    - >-
      目标运营商的 DCIM、CRM 和调试系统能通过 API 或导出暴露足够的结构化数据，在无需 12 个月定制集成项目的情况下构建机房级就绪图谱。
    - >-
      在初创公司触达 2 至 3 个付费参考客户之前，Nvidia 提供的工具、超大规模云预留产品或 DCIM 厂商均不会发布针对中立运营商的产能激活工作流。
    - >-
      运营商的 COO 或 CCO 在主要 GPU 机房上线项目中拥有 $0.5–1M 企业软件投资的预算授权，无需每笔交易都经过董事会审批。
  diligenceQuestions:
    - >-
      目前有多少东南亚 AI 工厂运营商在部分调试中的 GPU 机房之前签署了已承诺主力租户产能协议——能否列举三家并描述其当前的就绪缺口？
    - >-
      当 64 至 256 张 GPU 主力租户的上线日期被错过时，典型的合同违约损失或营收风险敞口是多少，今天如何追踪？
    - >-
      Schneider Electric、Sunbird 或主要 DCIM 厂商会在 18 个月内发布涵盖商业权属和租户验收的产能激活工作流吗？
    - >-
      在 100 至 500 人规模的 AI 工厂运营商处，典型的 DCIM 和 CRM 集成需要多长时间，从第一天起可以期待什么数据质量？
    - >-
      Firmus 巴淡岛项目能否代表近期滩头市场，还是说走廊内大多数运营商距离首次租户上线承诺还有 18 至 24 个月？
    - >-
      5 家最可能的客户中，是否有人已经规划或启动了该就绪工作流的内部版本——他们构建了什么，为何未能满足需求？

operatingAssumptions:
  - assumption: >-
      目标运营商在首批机房所有机架和供电模块完全调试前 6 至 12 个月签署已承诺主力租户协议，产生足够大的就绪偏移窗口，足以支撑专用软件产品。
    basis: idea.yaml
    validationTest: >-
      在与 5 家东南亚 AI 工厂运营商进行的结构化探索通话中，至少 3 家确认商业承诺在最近一次机房上线或当前在建项目中先于基础设施完全就绪。
    decisionImpact: >-
      若平均就绪偏移不足 2 个月，紧迫性降低，定价权收窄；产品必须以效率为主——加快计费时间——而非风险预防，这将降低可合理化的 ACV。
  - assumption: >-
      初始目标运营商的 DCIM、CRM 和调试系统通过 API、CSV 或 Webhook 暴露结构化数据，两人工程团队可在 4 至 6 周冲刺内完成集成。
    basis: research.yaml
    validationTest: >-
      一家共创客户运营商在签署 NDA 后 30 天内提供其主要 DCIM 和 CRM 的数据模式导出；工程团队在收到导出后 6 周内确认可工作的集成原型。
    decisionImpact: >-
      若每家运营商的集成超过 4 个月，实施费模型失效，MVP 时间线推迟 6 个月以上；公司需要构建托管数据提取服务，而非依赖运营商侧 API 就绪状态。
  - assumption: >-
      运营商愿意为首批机房产能激活产品支付 $0.5–0.8M 年度 SaaS 订阅，以单次超卖或上线延期事件的财务风险敞口作为合理化依据。
    basis: idea.yaml
    validationTest: >-
      两家合格运营商在 MVP 完成之前的结构化定价探索对话中确认 $0.5M 以上的付费意愿；在成立后 6 个月内签署至少一份意向书或试点协议。
    decisionImpact: >-
      若 ACV 锚定在 $150–250K 而非 $0.5–0.8M，SAM 和融资需求须向下调整，ARR 可支撑的团队规模收缩，达到可信 A 轮的路径需要 8 至 10 个客户而非 3 至 4 个。
  - assumption: >-
      东南亚滩头市场在 2026 至 2028 年窗口内至少有 5 家合格运营商推出首批 AI 机房并有已承诺多租户协议，提供足够多的客户来建立参考案例并支撑 A 轮融资。
    basis: research.yaml
    validationTest: >-
      到第 9 个月，公司已在巴淡岛、柔佛或雅加达识别出至少 5 家有在运营首批机房项目的具名运营商，并与至少 3 家处于活跃销售对话中。
    decisionImpact: >-
      若第 9 个月合格管道中的运营商不足 3 家，目标客户画像须扩展至同一地区内在内部分配产能的主权或企业园区，或将滩头地理扩展至次级走廊——每一步都增加 GTM 复杂度。
  - assumption: >-
      在公司 18 个月现金跑道窗口内，没有 Nvidia 提供的平台、超大规模云产品或主要 DCIM 厂商会发布针对中立运营商的产能激活工作流。
    basis: research.yaml
    validationTest: >-
      每季度监控 Schneider EcoStruxure、Sunbird、AWS Capacity Blocks 和 Nvidia 生态系统合作伙伴的公开路线图；将任何已宣布的中立运营商权属工作流视为加速参考部署或向集成和审计层策略转型的触发事件。
    decisionImpact: >-
      若主要在位企业宣布可信的中立运营商就绪工作流，初创公司必须在在位企业发布之前完成参考部署，或重新定位为在位产品之上的集成和可审计层。

experimentRoadmap:
  - horizon: 0–90 天
    experiment: >-
      与 10 位东南亚 AI 工厂运营商 COO 和商务负责人进行结构化探索访谈，验证就绪偏移问题和定价假设
    hypothesis: >-
      至少 5 位运营商会用自己的话确认商业承诺在最近一次机房上线时超越了基础设施就绪，且他们缺乏专用的就绪追踪系统。
    successMetric: >-
      5 家以上运营商用自己的话确认问题，至少 2 家同意分享 DCIM 和 CRM 数据模式样本
    owner: "创始人（CEO 和 CTO）"
  - horizon: 0–90 天
    experiment: >-
      与 5 家合格运营商进行定价探索，使用以单次超卖或上线延期事件成本为锚点的价值 ROI 工作表
    hypothesis: >-
      已签署或接近签署主力租户承诺的运营商，在将成本框定为单次合同违约或上线延期时，会接受 $0.5M 以上的 ACV。
    successMetric: >-
      2 家运营商在结构化对话中表示愿意支付 $0.5M 以上；90 天内签署 1 份意向书或试点条款清单
    owner: "创始人（CEO）"
  - horizon: 0–90 天
    experiment: >-
      集成可行性冲刺：从一家共创客户获取 DCIM 和 CRM 数据导出，构建覆盖单个机房的概念验证就绪图谱
    hypothesis: >-
      来自 Schneider EcoStruxure 或同等 DCIM 加一套 CRM 的结构化数据，足以以 80% 以上的准确率计算可售 GPU 区块数量（对比运营商自身估算）。
    successMetric: >-
      概念验证就绪图谱在收到共创客户导出后 6 周内完成
    owner: "创始人（CTO）"
  - horizon: 90–180 天
    experiment: >-
      与一家运营商开展付费试点，通过覆盖至少 2 家主力租户的真实机房激活运行就绪仪表板
    hypothesis: >-
      该运营商商务团队报告就绪仪表板将协调开销和上线确认时间至少缩短了 30%（对比之前的流程）。
    successMetric: >-
      试点运营商在机房上线后 30 天内签署 $0.5M 以上的年度订阅，试点期间零超卖事件
    owner: 创始团队
  - horizon: 90–180 天
    experiment: >-
      以首次试点为参考案例开拓第二家运营商管道，绕过"先证明"的反对意见
    hypothesis: >-
      来自首次试点的有据可查参考案例，足以将两家额外合格运营商加速进入主动评估，无需另一次概念验证冲刺。
    successMetric: >-
      第 9 个月时有 2 家额外运营商处于主动试点谈判中
    owner: "CEO 和业务拓展"
  - horizon: 180–360 天
    experiment: >-
      发布 SKU 生成器和租户权属模块；衡量每次租户上线工程工时 vs. 运营商历史基准定制化 SRE 运行手册
    hypothesis: >-
      标准化权属和验收工作流使每次租户上线工程工时比运营商定制 SRE 项目减少至少 50%。
    successMetric: >-
      首家运营商在一份分享给潜在客户的书面案例研究中确认每次租户上线工时减少至少 50%
    owner: 产品和工程负责人

operations:
  - >-
    通过 API 连接器和 CSV 摄取对接 Schneider EcoStruxure、Sunbird、CRM 平台和标准调试清单的系统记录集成
  - >-
    数据治理和可审计性层——所有就绪证明均链接至源系统、加盖时间戳，并可导出用于运营商合规和租户验收文档
  - >-
    印度尼西亚 PDP 和新加坡可持续性合规控制，包括数据驻留配置和面向跨境配置证明要求的审计轨迹
  - >-
    机房上线期间由创始团队或高级工程师值守每次租户上线窗口的嵌入式客户成功支持
  - >-
    向 2 至 3 家运营商提供以折扣价格深度实施支持的共创客户计划，换取参考案例权、数据模式访问权和联合开发意见

team:
  - role: "创始人 CEO 兼商务负责人"
    startTiming: 第 0 个月
    rationale: >-
      面向 AI 工厂运营商 COO 和 CCO 的企业销售需要在基础设施和商务运营两方面都具备可信度；创始 CEO 必须有数据中心运营、企业 SaaS 销售或 AI 基础设施的先前经验，并在东南亚走廊拥有热络的人脉网络。
  - role: "创始人 CTO 兼平台工程师"
    startTiming: 第 0 个月
    rationale: >-
      就绪图谱和集成层是核心产品；CTO 必须能够在前 3 至 6 个月不需要团队的情况下，自行构建和交付与 DCIM 和 CRM 系统的 MVP 集成。
  - role: "高级基础设施与集成工程师"
    startTiming: 第 4 个月
    rationale: >-
      第二次集成冲刺和第二家运营商部署需要一位有数据中心管理软件 API 经验的专职工程师；在共创客户集成得到验证后再招聘，以避免过早规模化。
  - role: "企业销售与业务拓展负责人（驻东南亚）"
    startTiming: 第 9 个月
    rationale: >-
      一旦首次试点上线并准备好参考，一位在东南亚 AI 基础设施圈拥有现有人脉的资深销售人员可以将管道加速至第二、第三家运营商；在参考案例验证之前招聘会浪费资源。

milestones:
  - horizon: 0–12 个月
    items:
      - >-
        第 1 至 3 个月：完成 10 次结构化探索访谈；与 5 家以上运营商确认痛点和定价假设
      - >-
        第 3 个月：签署首份共创客户协议，覆盖 NDA 和与巴淡岛或柔佛走廊一家运营商的数据共享
      - >-
        第 4 至 6 个月：交付与一套 DCIM 和一套 CRM 集成的 MVP 就绪仪表板；共创客户的首个机房可售 GPU 区块视图上线
      - >-
        第 6 个月：签署首份付费试点合同，覆盖实施费和试点条款
      - >-
        第 9 至 12 个月：首次机房租户上线，零超卖事件；年度订阅续约金额 $0.5M 以上
      - >-
        第 12 个月：第二家运营商进入主动试点谈判；具名合格管道 3 家以上
  - horizon: 12–24 个月
    items:
      - >-
        第 12 至 15 个月：第二个付费机房部署在同一或第二家运营商上线
      - >-
        第 18 个月：两家付费运营商拥有年度订阅，合并 ARR 达到或超过 $1M
      - >-
        第 18 至 20 个月：权属和验收工作流模块发布并在两个在线机房中投入生产使用
      - >-
        第 20 至 24 个月：多机房控制平面在至少一家双机房运营商中进入 beta 测试
      - >-
        第 24 个月：种子期指标足以支持 A 轮融资，ARR $1.5–2.5M，覆盖 2 至 3 个客户，并有有据可查的 ROI 案例
  - horizon: 24–36 个月
    items:
      - >-
        第 24 至 30 个月：第三、第四家付费运营商，地理扩展至另一走廊（雅加达或吉隆坡）
      - >-
        第 30 个月：多站点就绪分析和早期跨园区基准分析对主力客户可用
      - >-
        第 36 个月：ARR $2.5–3M；A 轮完成；团队 12 至 15 人，含产品、工程和东南亚销售

risks:
  - risk: >-
      运营商在初创公司完成首次参考部署之前，在 DCIM、项目管理和 CRM 工具之上构建内部工具栈。
    likelihood: High
    impact: High
    mitigation: >-
      以免费或象征性费用的 4 至 6 周概念验证集成工作坊切入，在任何商业对话之前先交付可工作的就绪视图；通过记录 DCIM、CRM 和调试系统所需的完整集成范围，使内部重建成本可见。
  - risk: >-
      东南亚滩头市场买家池在 18 个月现金跑道窗口内被证明过窄，无法产生可重复需求（第 9 个月时合格管道中的运营商不足 3 家）。
    likelihood: Medium
    impact: High
    mitigation: >-
      若第 9 个月独立运营商管道低于门槛，将目标客户画像扩展至同一地区内的主权和企业园区；避免同时扩展地理和产品范围。
  - risk: >-
      目标运营商的 DCIM 或 CRM 数据质量太差或太孤立，无法在不启动多年集成项目的情况下构建可靠的就绪图谱，损害产品核心信任声明。
    likelihood: Medium
    impact: High
    mitigation: >-
      从带证明链接的就绪评分只读模式起步；若 API 就绪状态较低，提供托管数据提取服务作为付费附加模块；在就绪信号经过至少一次实际上线结果验证之前，不自动化下游预留或计费动作。
  - risk: >-
      Nvidia、主要超大规模云厂商或资金充足的 DCIM 厂商在初创公司触达 3 个参考客户之前宣布中立运营商产能激活产品。
    likelihood: Low
    impact: High
    mitigation: >-
      足够快地积累专有跨园区上线数据和租户验收历史，成为品类收敛的参考数据集；若大型在位企业进入核心工作流，重新定位为在位产品之上的集成和可审计层。
  - risk: >-
      印度尼西亚 PDP 和跨境数据法规制造合规摩擦，使集成和部署成本超出产品定价模型承受范围。
    likelihood: Medium
    impact: Medium
    mitigation: >-
      从第一天起就将数据驻留控制和可审计性设计入核心产品；将合规证明——租户验收文档、跨境传输排序——视为功能而非成本中心。

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 20
  useOfFundsSummary: >-
    20 个月现金跑道，资助创始团队、招聘 2 名工程师和 1 名驻东南亚销售负责人，完成 2 次付费机房部署并获得参考客户，在 A 轮前达到 ARR $1M 以上；主要消耗为创始团队薪酬、集成工程、机房上线期间的嵌入式客户成功支持，以及针对窄但高价值运营商管道的东南亚差旅和业务拓展。
