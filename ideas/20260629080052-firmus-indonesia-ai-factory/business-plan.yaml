slug: gpu-campus-activation-os
date: '2026-06-29'
executiveSummary: >-
  Independent AI factory operators in Southeast Asia are signing committed anchor-tenant capacity
  deals before every rack, power block, and cooling loop is production-ready, creating simultaneous
  risks of overselling unavailable inventory and leaving sellable GPU blocks stranded for want of a
  reliable readiness signal. No existing product owns the seam between commercial promises and
  physical hall readiness: DCIM suites track infrastructure, CRMs track contracts, and public-cloud
  schedulers allocate live clusters, but none converts a phased GPU build-out into contract-safe,
  tenant-ready inventory for a neutral operator. This company builds the capacity activation
  OS—a system of record that ingests rack commission states, power-block energization, cooling
  sign-off, and tenant requirements from operator CRM, DCIM, and provisioning systems, then
  surfaces only the GPU blocks that are truly sellable at each phase. The beachhead is narrow but
  urgent: 3-5 Southeast Asian AI factory operators (starting in the Singapore-Johor-Batam corridor)
  launching their inaugural 2,000-8,000 GPU halls with signed go-live dates across 2027-2028. The
  Firmus Batam project, committing up to 170,000 Nvidia accelerators in phased deliveries alongside
  public revenue commitments already contingent on committed customer deals, is the clearest signal
  that the buyer moment is real and time-constrained. Venture scale follows from compounding
  hall-level readiness data into the default commercialization layer for multi-campus AI factory
  operations, tenant brokerage, and cross-site workload portability as the regional GPU market
  matures.

problem:
  - >-
    AI factory operators secure giant Nvidia allocations before a clean system exists to stage,
    sell, and activate that capacity; DCIM, CRM, and cluster tools remain disconnected, leaving
    commercial promises untrackable against physical readiness milestones.
  - >-
    Phased GPU deliveries across 12-18 month campus builds force operators to make contractual
    go-live commitments before all racks, power blocks, and cooling loops are commissioned,
    creating twin failure modes—oversold capacity that cannot be activated and sellable inventory
    that stays unmonetized because commercial teams cannot confirm its readiness state.
  - >-
    Non-hyperscale buyers needing 32-256 GPU reserved blocks require standardized reservation SKUs,
    entitlement maps, and acceptance checklists; today each tenant onboarding is a bespoke SRE
    project rather than a repeatable workflow, raising per-launch cost and delaying time-to-bill.

solution:
  - >-
    A capacity activation control plane that ingests GPU delivery schedules, rack commission states,
    power-block energization, network sign-off, and tenant requirements from CRM, DCIM, cluster
    managers, and spreadsheets, then gates and surfaces only truly sellable GPU blocks with
    evidence links attached to each block.
  - >-
    Standard reservation SKU builder and tenant entitlement generator that converts gated capacity
    blocks into contractible 32-256 GPU products, staged onboarding plans, and automated acceptance
    checklists—eliminating bespoke SRE runbooks per tenant launch.
  - >-
    Readiness risk analytics dashboard that shows operators their go-live exposure across all
    in-flight tenant commitments so launch-date risk is visible at board level before it becomes
    a contractual breach.

whyWeWin:
  - >-
    No incumbent product bridges the commercial-readiness seam; DCIM suites (Schneider, Sunbird)
    stop at infrastructure telemetry, while CRMs and public-cloud reservation products do not model
    partial-commissioning states for neutral-operator campuses.
  - >-
    Each hall deployment generates a readiness graph uniquely calibrated to that operator's
    infrastructure, supplier, and tenant mix; this dataset compounds with every launch and is
    structurally difficult for a generic workflow tool to replicate.
  - >-
    The buying trigger is a board-level revenue risk event—overselling committed anchor tenants—not
    a productivity optimization, which shortens sales cycles and raises willingness to pay relative
    to the annual software subscription cost.
  - >-
    Entering during the first-hall launch creates a high-trust expansion path: the operator
    naturally grants access to later halls, additional sites, and downstream billing and brokerage
    workflows once the first deployment proves ROI.

strategicChoices:
  beachhead: >-
    Independent Southeast Asian AI factory operators launching their first 2,000-8,000 Nvidia GPU
    hall in the Singapore-Johor-Batam corridor across 2026-2027, with 3-12 anchor tenants needing
    signed go-live dates for 32-256 GPU reserved blocks.
  wedgeRationale: >-
    The hall-launch workflow creates faster, more falsifiable proof than any broader platform pitch:
    success is binary (tenants launched on contracted date with no oversell events), the buyer pain
    is acute and time-constrained, and the data captured during one hall deployment is directly
    reusable for the next. A broader capacity-management pitch would require displacing DCIM and
    CRM systems the operator already owns, increasing friction and sales cycle length.
  sequencingRationale: >-
    Build product before hiring GTM: the readiness graph and entitlement workflow must exist before
    a sales hire, so the first design-partner deployment doubles as a reference case. Founder-led
    sales before scaled channels: the beachhead logo pool is sub-20 operators, each requiring
    technical credibility only founders can convey early. DCIM and facility-power integrations
    before billing and brokerage modules: data quality is the core trust asset; downstream
    commercial APIs ship only after readiness signal is validated against actual launch outcomes.
  notYet:
    - Multi-site capacity brokerage and secondary GPU reservation exchange
    - Billing, settlement, and invoicing modules for tenant charges
    - Workload portability and job-scheduling across multiple campuses
    - North Asia, India, and Middle East geographic expansion
    - GPU financing, risk underwriting, or allocation trading products

market:
  tam: "$120M ARR globally (est. ~120 addressable AI-capacity halls x ~$1M ACV)"
  sam: "$14.4M ARR in Southeast Asia (est. 18 first-hall deployments x ~$0.8M ACV over 36 months)"
  som: "$2.8M ARR by year 3 (est. 4 live halls x ~$0.7M ARR; based on researched SOM)"
  segments:
    - >-
      Independent AI factory operators in Southeast Asia commercializing phased Nvidia GPU halls
      for multi-tenant reserved capacity (primary beachhead)
    - >-
      Sovereign or enterprise AI campuses in Singapore-Johor-Batam corridor allocating capacity
      to internal or affiliated buyers at defined go-live dates (secondary expansion)
  buyingProcess: >-
    COO or CCO identifies oversell or go-live risk after signing first anchor-tenant commitments;
    evaluation is technical (proof-of-integration with existing DCIM and CRM) and commercial
    (ROI against avoided oversell penalties and faster time-to-bill), with an estimated 60-120 day
    cycle from first demo to pilot contract based on operator judgment; no primary buyer interview
    data has been gathered yet.

product:
  mvp: >-
    Read-only capacity readiness dashboard integrated with one DCIM, one CRM, and operator
    spreadsheets; reconciles rack, power-block, and network states into a gated sellable-GPU-block
    view with evidence links; outputs a go-live confidence score per in-flight tenant commitment.
  sixMonth: >-
    Sellable-block generator and entitlement workflow: operators create standard 32-256 GPU
    reservation SKUs, assign tenant entitlements with staged onboarding plans, and run automated
    acceptance checklists; first design-partner hall is live with tenants billing on contracted
    dates.
  twelveMonth: >-
    Multi-tenant launch module supporting 3-12 concurrent tenants in one hall; readiness risk
    analytics visible to commercial, operations, and executive teams; API connectors for a second
    DCIM vendor and one GPU provisioning system; second paying hall deployment underway.
  twentyFourMonth: >-
    Multi-hall control plane managing two or more halls at the same operator or across two
    operators; readiness graph exports to downstream billing and capacity-planning tools; early
    cross-campus risk benchmarking available to anchor customers.
  keyBets:
    - >-
      Operators will pay enterprise SaaS pricing for a product that prevents a single large oversell
      event, even before the full platform is complete.
    - >-
      Structured data from DCIM, CRM, and commissioning tools is extractable via API or CSV without
      a multi-year integration project.
    - >-
      The hall-launch workflow creates enough lock-in through readiness history, entitlement
      records, and acceptance evidence that operators expand within the product rather than rebuild.

gtm:
  wedge: >-
    Founder-led engagement with COOs and commercial leaders at 3-5 Southeast Asian AI factory
    operators currently signing or negotiating anchor-tenant committed deals ahead of their first
    GPU hall going live in 2027.
  channels:
    - >-
      Founder-led direct sales targeting 5-10 named operators in Batam, Johor, and Jakarta
      corridors already on record with phased GPU build-outs
    - >-
      Design partnerships with DCIM and facility-power integrators (Schneider-ecosystem) already
      on-site during AI hall commissioning
    - >-
      Nvidia ecosystem and GPU campus developer referrals through the Firmus/DayOne-type
      partnership network; the SEA AI-factory community is small and relationship-dense
  funnelTargets: >-
    Qualified operators to pilot contract 30-50%; pilot (single hall through go-live) to annual
    subscription 60%+; annual to second hall expansion 70%+
  pricing: >-
    Annual subscription priced per hall under management (~$0.5-0.8M ACV for a 2,000-8,000 GPU
    hall), plus a one-time hall-launch implementation fee ($50-150K per new hall); pricing is
    anchored to the financial exposure of a single prevented oversell event (potential breach of
    a multi-million-dollar anchor contract), not seat count or GPU count.

businessModel:
  revenueStreams:
    - Annual per-hall SaaS subscription for the capacity activation control plane
    - One-time hall-launch and major expansion implementation fees
    - Premium multi-hall readiness analytics and cross-campus risk benchmarking modules (Year 2+)
  unitOfValue: Hall-phase under active commercial management with live tenant commitments
  targetGrossMarginPct: 72
  expansionLevers:
    - Additional halls at the same operator (land-and-expand within site)
    - Second and third operator deployments using the reference case from the first
    - Multi-site exchange and billing modules as operators mature into multi-campus portfolios
    - Cross-campus data benchmarking product for GPU capacity deployment patterns (Year 3+)

strategyMap:
  northStarMetric: >-
    Number of GPU-reserved tenants launched on contracted go-live date across all live halls
  inputMetrics:
    - "Days from GPU delivery milestone to sellable-block creation (time-to-inventory)"
    - "Oversell events per hall per quarter (target: zero)"
    - Engineering hours per tenant launch vs. operator baseline bespoke SRE project
    - Hall-level readiness confidence score accuracy vs. actual launch outcome
    - Operator net revenue retention per hall including expansion to additional halls and sites
  moatsToBuild:
    - >-
      Hall-level readiness graph calibrated to each operator's infrastructure, supplier, and
      tenant mix—data that takes 6-12 months of live operation to accumulate and is not
      replicable from generic DCIM telemetry alone
    - >-
      Cross-campus dataset of delivery milestones, tenant failure modes, and launch-risk patterns
      that enables proactive risk scoring for new halls before they go live
    - >-
      Integration depth with DCIM, CRM, and GPU provisioning stacks that makes switching back to
      a rebuild project costly relative to the SaaS subscription
  killCriteria:
    - >-
      After 3 design-partner conversations, no operator confirms that preventing oversell or
      accelerating time-to-bill is worth a $100K+ pilot budget: pricing hypothesis fails
    - >-
      First hall deployment takes more than 9 months to show a measurable reduction in
      time-to-bill or a prevented oversell event: product-market fit assumption fails
    - >-
      By month 18, fewer than 2 paid halls are live and a second logo has not signed: beachhead
      too narrow or category timing is too early
  mermaid: |
    flowchart LR
      Wedge[Beachhead: first-hall launch risk] --> MVP[MVP: readiness dashboard + evidence links]
      MVP --> Proof[Proof: tenants live on contracted date, zero oversell]
      Proof --> Expand[Expand: second hall same operator]
      Expand --> MultiSite[Multi-site control plane]
      MultiSite --> Platform[Platform: billing, brokerage, workload portability]

investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      High conviction on wedge clarity and why-now timing; primary uncertainty is whether the
      Southeast Asian beachhead logo pool is large enough to build category proof before the
      window closes or incumbents respond.
    whyBelieve: >-
      The Firmus Batam announcement is one of several converging signals that independent AI
      factory operators are making large public revenue commitments before their halls are fully
      commissioned, creating a board-level pain point that justifies enterprise software pricing
      and fast adoption if the product can show a single prevented oversell event.
    whyDoubt: >-
      The addressable logo pool at launch is fewer than 20 operators in Southeast Asia, so the
      company must win a disproportionate share of a small market early and expand scope before
      a second funding round is credible.
    nextDiligence: >-
      Confirm at least two named Southeast Asian AI factory operators have signed or are actively
      negotiating committed anchor-tenant deals ahead of a 2027 GPU hall go-live, and that their
      commercial and operations teams acknowledge the readiness-drift problem in a structured
      discovery call.
  firstCustomer:
    title: "AI factory operator COO or CCO — first-hall launch"
    profile: >-
      100-500 person Southeast Asian infrastructure operator launching its first 2,000-8,000 Nvidia
      GPU hall in Batam, Johor, or Jakarta with 3-12 anchor tenants in final negotiation for
      32-256 GPU reserved blocks and a contractually meaningful go-live date in 2027.
    trigger: >-
      The operator's commercial team signs (or is days away from signing) an anchor-tenant
      committed capacity deal before every rack, power block, and network domain is fully
      commissioned; someone in operations realizes the commercial promise has outpaced the
      infrastructure reality.
    buyer: "COO or Chief Commercial Officer"
    initialContract: >-
      $50-150K implementation fee plus $0.5-0.8M first-year subscription for one hall; conversion
      path is a 4-6 week proof-of-integration workshop (no-cost or nominal fee) leading to a paid
      pilot covering one hall through go-live, then annual subscription on renewal.
  mustBeTrue:
    - >-
      At least 5 independent Southeast Asian AI factory operators will have signed committed
      anchor-tenant deals for 32-256 GPU reserved blocks before their first hall is fully
      commissioned by end of 2027.
    - >-
      The economic cost of a single oversell event—breach of anchor-tenant contract or delayed
      go-live—exceeds $500K, making a $0.5-0.8M annual subscription justifiable on prevention
      value alone.
    - >-
      DCIM, CRM, and commissioning systems at target operators expose enough structured data via
      API or export to build a hall-level readiness graph without a 12-month custom integration
      project.
    - >-
      No Nvidia-supplied tooling, hyperscaler reservation product, or DCIM vendor will release a
      neutral-operator capacity activation workflow before the startup reaches 2-3 paid reference
      customers.
    - >-
      The operator's COO or CCO has budget authority for $0.5-1M enterprise software investments
      inside major GPU hall launch programs without requiring board approval for each deal.
  diligenceQuestions:
    - >-
      How many Southeast Asian AI factory operators are currently signing committed anchor-tenant
      capacity deals ahead of partially commissioned GPU halls—can you name three and describe their
      current readiness gap?
    - >-
      What is the typical contractual penalty or revenue exposure when a go-live date is missed for
      a 64-256 GPU anchor tenant, and how is that tracked today?
    - >-
      Will Schneider Electric, Sunbird, or a major DCIM vendor release a capacity activation
      workflow covering commercial entitlements and tenant acceptance within 18 months?
    - >-
      How long does a typical DCIM and CRM integration take at a 100-500 person AI factory
      operator, and what data quality can be expected from day one?
    - >-
      Is the Firmus Batam project representative of the near-term beachhead, or are most operators
      in the corridor still 18-24 months away from first-tenant go-live commitments?
    - >-
      Have any of the 5 most likely customers already scoped or started a homegrown version of this
      readiness workflow—what did they build and why did it fall short?

operatingAssumptions:
  - assumption: >-
      Target operators are signing committed anchor-tenant deals 6-12 months before every rack and
      power block in the first hall is fully commissioned, creating a readiness-drift window large
      enough to justify a dedicated software product.
    basis: idea.yaml
    validationTest: >-
      In 5 structured discovery calls with SEA AI factory operators, at least 3 confirm that
      commercial commitments preceded full infrastructure readiness on their most recent hall launch
      or current in-progress build.
    decisionImpact: >-
      If readiness drift is less than 2 months on average, the urgency drops and pricing power
      shrinks; the product must lead on efficiency—faster time-to-bill—rather than risk prevention,
      which lowers justifiable ACV.
  - assumption: >-
      DCIM, CRM, and commissioning systems at initial target operators expose structured data via
      API, CSV, or webhook that a two-person engineering team can integrate within a 4-6 week
      sprint.
    basis: research.yaml
    validationTest: >-
      One design-partner operator provides sample schema exports from its primary DCIM and CRM
      within 30 days of a signed NDA; the engineering team confirms a working integration prototype
      within 6 weeks of receiving those exports.
    decisionImpact: >-
      If integration takes more than 4 months per operator, the implementation fee model breaks and
      the MVP timeline shifts by 6+ months; the company would need to build a managed data
      extraction service rather than rely on operator-side API readiness.
  - assumption: >-
      Operators will pay $0.5-0.8M annual SaaS subscription for a first-hall capacity activation
      product, justified by the financial exposure of a single oversell or delayed go-live event.
    basis: idea.yaml
    validationTest: >-
      Two qualified operators confirm willingness to pay $0.5M+ in a structured pricing discovery
      conversation before the MVP is complete; at least one LOI or pilot agreement is signed within
      6 months of founding.
    decisionImpact: >-
      If ACV anchors at $150-250K rather than $0.5-0.8M, the SAM and funding ask must be remodeled
      downward, the team size supportable by ARR shrinks, and the path to a credible Series A
      requires 8-10 logos rather than 3-4.
  - assumption: >-
      The SEA beachhead contains at least 5 qualified operators launching first AI halls with
      committed multi-tenant deals in the 2026-2028 window, providing enough logos to establish a
      reference case and support a Series A raise.
    basis: research.yaml
    validationTest: >-
      By month 9, the company has identified at least 5 named operators in Batam, Johor, or Jakarta
      with live first-hall programs and is in active sales conversation with at least 3.
    decisionImpact: >-
      If the qualified pipeline contains fewer than 3 operators by month 9, the ICP must broaden to
      sovereign or enterprise campuses allocating capacity internally, or the beachhead geography
      must expand to secondary corridors—each of which increases go-to-market complexity.
  - assumption: >-
      No Nvidia-supplied platform, hyperscaler product, or major DCIM vendor will release a
      neutral-operator capacity activation workflow within the company's 18-month runway window.
    basis: research.yaml
    validationTest: >-
      Monitor public roadmaps of Schneider EcoStruxure, Sunbird, AWS Capacity Blocks, and Nvidia
      ecosystem partners quarterly; treat any announced neutral-operator entitlement workflow as a
      forcing function to accelerate reference deployments or pivot to an integration and audit
      layer strategy.
    decisionImpact: >-
      If a major incumbent announces a credible neutral-operator readiness workflow, the startup
      must either reach reference deployments before the incumbent ships or reposition as the
      integration and auditability layer above the incumbent product.

experimentRoadmap:
  - horizon: 0-90 days
    experiment: >-
      Structured discovery interviews with 10 SEA AI factory operator COOs and commercial leaders
      to validate the readiness-drift problem and pricing hypothesis
    hypothesis: >-
      At least 5 of 10 operators will confirm that commercial commitments outpaced infrastructure
      readiness on their most recent hall launch and that they lacked a dedicated readiness-tracking
      system.
    successMetric: >-
      5+ operators confirm the problem in their own words and at least 2 agree to share DCIM and
      CRM schema samples
    owner: "Founder (CEO and CTO)"
  - horizon: 0-90 days
    experiment: >-
      Pricing discovery with 5 qualified operators using a value-based ROI worksheet anchored to the
      cost of a single oversell or delayed go-live event
    hypothesis: >-
      Operators with a signed or near-signed anchor-tenant commitment will accept $0.5M+ ACV when
      the cost is framed against a single contractual breach or delayed go-live.
    successMetric: >-
      2 operators indicate willingness to pay $0.5M+ in a structured conversation; 1 LOI or pilot
      term sheet within 90 days
    owner: "Founder (CEO)"
  - horizon: 0-90 days
    experiment: >-
      Integration feasibility sprint: obtain DCIM and CRM data exports from one design partner and
      build a proof-of-concept readiness graph covering one hall
    hypothesis: >-
      Structured data from Schneider EcoStruxure or equivalent DCIM plus one CRM is sufficient to
      calculate a sellable-GPU-block count with 80%+ accuracy versus the operator's own estimate.
    successMetric: >-
      Proof-of-concept readiness graph completed within 6 weeks of receiving design-partner exports
    owner: "Founder (CTO)"
  - horizon: 90-180 days
    experiment: >-
      Paid pilot with one operator running the readiness dashboard through a real hall activation
      covering at least 2 anchor tenants
    hypothesis: >-
      The operator's commercial team reports that the readiness dashboard reduced coordination
      overhead and time-to-confirm go-live by at least 30% versus their previous process.
    successMetric: >-
      Pilot operator signs annual subscription at $0.5M+ within 30 days of hall go-live with no
      oversell events recorded during the pilot period
    owner: Founding team
  - horizon: 90-180 days
    experiment: >-
      Second operator pipeline development using the first pilot as a reference case to bypass the
      prove-it-first objection
    hypothesis: >-
      A documented reference case from the first pilot is sufficient to accelerate two additional
      qualified operators into active evaluation without another proof-of-concept sprint.
    successMetric: >-
      2 additional operators in active pilot negotiations by month 9
    owner: "CEO and BD"
  - horizon: 180-360 days
    experiment: >-
      Ship the SKU generator and tenant entitlement module; measure engineering hours per tenant
      launch versus operator historical baseline from bespoke SRE runbooks
    hypothesis: >-
      Standardized entitlement and acceptance workflows reduce per-tenant launch engineering hours
      by at least 50% versus operator bespoke SRE projects.
    successMetric: >-
      First operator confirms at least 50% reduction in per-tenant launch hours in a written case
      study shared with prospective customers
    owner: Product and engineering lead

operations:
  - >-
    System-of-record integrations via API connectors and CSV ingestion for Schneider EcoStruxure,
    Sunbird, CRM platforms, and standard commissioning checklists
  - >-
    Data governance and auditability layer where all readiness evidence is linked to the source
    system, timestamped, and exportable for operator compliance and tenant acceptance documentation
  - >-
    Indonesia PDP and Singapore sustainability compliance controls including data residency
    configuration and audit trail for operators navigating cross-border provisioning evidence
    requirements
  - >-
    Embedded customer success during hall launch with founding team or senior engineer on-call
    during each tenant go-live window
  - >-
    Design-partner program offering 2-3 operators deep implementation support at reduced cost in
    exchange for reference case rights, schema access, and co-development input

team:
  - role: "Founding CEO and commercial lead"
    startTiming: Month 0
    rationale: >-
      Enterprise sales to COOs and CCOs of AI factory operators requires credibility in both
      infrastructure and commercial operations; the founding CEO must have prior experience in
      data-center operations, enterprise SaaS sales, or AI infrastructure with a warm network in
      the SEA corridor.
  - role: "Founding CTO and platform engineer"
    startTiming: Month 0
    rationale: >-
      The readiness graph and integration layer are the core product; the CTO must be able to build
      and ship the MVP integration with DCIM and CRM systems without a team for the first 3-6
      months.
  - role: "Senior infrastructure and integrations engineer"
    startTiming: Month 4
    rationale: >-
      The second integration sprint and second operator deployment require a dedicated engineer with
      experience in data-center management software APIs; hire after the design-partner integration
      is proven to avoid premature scaling.
  - role: "Enterprise sales and BD hire (SEA-based)"
    startTiming: Month 9
    rationale: >-
      Once the first pilot is live and reference-ready, a senior sales hire with existing
      relationships in the SEA AI infrastructure community can accelerate pipeline to second and
      third operators; hiring before the reference case is proven wastes the resource.

milestones:
  - horizon: 0-12 months
    items:
      - >-
        Month 1-3: Complete 10 structured discovery interviews; confirm pain and pricing hypothesis
        with 5+ operators
      - >-
        Month 3: Sign first design-partner agreement covering NDA and data sharing with one operator
        in Batam or Johor corridor
      - >-
        Month 4-6: Deliver MVP readiness dashboard integrated with one DCIM and one CRM; first
        hall sellable-GPU-block view live for design partner
      - >-
        Month 6: First paid pilot contract signed covering implementation fee and pilot terms
      - >-
        Month 9-12: First hall tenant go-live with zero oversell events; annual subscription
        renewal secured at $0.5M+
      - >-
        Month 12: Second operator in active pilot negotiations; named qualified pipeline of 3+
        logos
  - horizon: 12-24 months
    items:
      - >-
        Month 12-15: Second paid hall deployment live at same or second operator
      - >-
        Month 18: Two paying operators on annual subscription with combined ARR at or above $1M
      - >-
        Month 18-20: Entitlement and acceptance workflow module shipped and in production use at
        both live halls
      - >-
        Month 20-24: Multi-hall control plane in beta with at least one two-hall operator
      - >-
        Month 24: Seed-stage metrics sufficient for Series A raise at $1.5-2.5M ARR across 2-3
        logos with documented ROI case
  - horizon: 24-36 months
    items:
      - >-
        Month 24-30: Third and fourth paying operators with geographic expansion to one additional
        corridor (Jakarta or Kuala Lumpur)
      - >-
        Month 30: Multi-site readiness analytics and early cross-campus benchmarking available to
        anchor customers
      - >-
        Month 36: $2.5-3M ARR; Series A closed; team of 12-15 including product, engineering,
        and SEA sales

risks:
  - risk: >-
      Operators build internal stacks layered on DCIM, project management, and CRM tools before the
      startup can land a first reference deployment.
    likelihood: High
    impact: High
    mitigation: >-
      Lead with a no-cost or nominal-fee proof-of-integration workshop (4-6 weeks) that delivers a
      working readiness view before any commercial conversation; make the cost of rebuilding
      internally visible by documenting the full integration scope required from DCIM, CRM, and
      commissioning systems.
  - risk: >-
      The Southeast Asian beachhead logo pool proves too narrow to generate repeatable demand within
      the 18-month runway window (fewer than 3 qualified operators in active pipeline by month 9).
    likelihood: Medium
    impact: High
    mitigation: >-
      Expand the ICP to sovereign and enterprise campuses within the same geography at month 9 if
      the independent-operator pipeline is below threshold; avoid expanding geography and product
      scope simultaneously.
  - risk: >-
      DCIM or CRM data quality at target operators is too poor or siloed to build a reliable
      readiness graph without a multi-year integration project, undermining the product's core trust
      claim.
    likelihood: Medium
    impact: High
    mitigation: >-
      Start read-only with evidence-linked readiness scoring; offer a managed data extraction
      service as a paid add-on if API readiness is low; do not automate downstream reservation or
      billing actions until readiness signal is validated against at least one actual launch outcome.
  - risk: >-
      Nvidia, a major hyperscaler, or a well-funded DCIM vendor announces a neutral-operator
      capacity activation product before the startup reaches 3 reference customers.
    likelihood: Low
    impact: High
    mitigation: >-
      Build proprietary cross-campus launch data and tenant acceptance histories fast enough to be
      the reference dataset the category converges on; reposition as the integration and audit layer
      if a large incumbent enters the core workflow.
  - risk: >-
      Indonesia PDP and cross-border data regulations create compliance friction that increases
      integration and deployment cost beyond the product pricing model.
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Design data residency controls and auditability into the core product from day one; treat
      compliance evidence—tenant acceptance documentation, cross-border transfer sequencing—as a
      feature rather than a cost center.

fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 20
  useOfFundsSummary: >-
    20 months of runway to fund the founding team, hire 2 engineers and 1 SEA-based sales lead,
    complete 2 paid hall deployments with reference customers, and reach $1M+ ARR before a Series A;
    primary burn is founding-team salaries, integration engineering, embedded customer success
    during hall launches, and SEA travel and BD for the narrow but high-value operator pipeline.
