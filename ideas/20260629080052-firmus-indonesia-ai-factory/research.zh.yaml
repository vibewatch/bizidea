competitors:
- name: Schneider Electric EcoStruxure IT
  stage: incumbent
  wedge: 针对复杂数据中心环境的厂商无关 DCIM 监控、规划和优化。
  pricing: 定制企业定价；抓取的产品页面未公开列出。
  strength: 在混合环境中具备强大的产能建模和基础设施可见性。
  weaknessVsUs: 似乎未将可售 GPU 区块、租户权属或客户验收工作流作为产品核心。
  sourceRefs:
  - 20
  - 21
- name: Sunbird DCIM
  stage: scale-up
  wedge: 数据中心内部的产能预留和资源规划。
  pricing: 定制企业定价；公开页面侧重功能介绍而非价目表。
  strength: 明确的产能预留工作流比大多数 DCIM 工具更接近这家初创公司的运营切口。
  weaknessVsUs: 预留面向内部基础设施资源，而非商业承诺、分批机房上线或合同安全的租户 SKU。
  sourceRefs:
  - 29
- name: AWS EC2 Capacity Blocks for ML
  stage: incumbent
  wedge: AWS 内部带未来可用窗口的短期 GPU 算力预留。
  pricing: 按实例类型、时长和区域的基于使用量的预留定价。
  strength: 让买家对 AI 算力的自助式预留体验形成期望。
  weaknessVsUs: 解决 AWS 内部云端预留问题，而非中立运营商的就绪状态、权属映射或本地机房激活。
  sourceRefs:
  - 16
  - 17
- name: Google Cloud Dynamic Workload Scheduler Calendar mode
  stage: incumbent
  wedge: 日历式预订，可预订最长 90 天的并置 GPU 和 TPU。
  pricing: 预留定价按资源类型和时长变化；产品以消耗为主，而非按机房收取 SaaS 费用。
  strength: 为客户建立了可搜索、可预订 AI 算力时间窗口的强烈心智模型。
  weaknessVsUs: 仍是公有云预留层，而非针对部分调试中、运营商自有园区的控制平面。
  sourceRefs:
  - 18
- name: CoreWeave
  stage: scale-up
  wedge: 直接向模型训练方销售高性能算力的 AI 原生云。
  pricing: 抓取的主页未公开列出。
  strength: 一站式 AI 云可吸收本应流向独立运营商的紧急需求。
  weaknessVsUs: 目标是成为算力提供商本身，而非第三方园区的商务就绪软件。
  sourceRefs:
  - 34
