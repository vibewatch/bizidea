  validationPlan:
  - priority: high
    question: 未来 24 个月内，有多少东南亚运营商会销售 32 至 256 张 GPU 预留区块，而非仅签署大规模批发合同？
    evidenceToGather: 在巴淡岛、柔佛、新加坡和雅加达进行十次买家访谈，加上一份近期产能条款清单或预留模板。
  - priority: high
    question: 现有 DCIM、调试和商务系统能否暴露足够的结构化数据，在无需大型定制集成项目的情况下自动化可售产能门控？
    evidenceToGather: 来自一家共创客户的 DCIM、CRM/CPQ 栈、配置工作流和验收清单各一份的数据模式样本。
  - priority: medium
    question: "哪个首要 KPI 最能引发共鸣：降低超卖风险、加快计费时间，还是降低每次租户上线的人工成本？"
    evidenceToGather: 来自一家运营商的单次机房上线试点评分卡，覆盖至少两家主力租户。
