reportMemo:
  executiveTakeaways:
  - The wedge is real because GPU supply is arriving in phased campus deals, while commercialization still happens through bespoke coordination across commercial, infrastructure, and provisioning teams.
  - 'The near-term market is narrow but urgent: a small number of Southeast Asian AI-factory operators are making high-stakes revenue promises before every rack, power block, and cooling loop is production-ready.'
  - Competition is indirect rather than direct; the startup mainly fights DCIM suites, public-cloud reservation products, and turnkey AI clouds, none of which cleanly own sellable-capacity readiness for neutral operators.
  - 'The biggest execution risk is data quality and category timing: operators must trust a new system of record before enough multi-tenant AI halls exist to create repeatable demand.'
  marketDefinition: Software that converts phased AI data-center build-out into contract-safe, tenant-ready GPU inventory by linking physical readiness, entitlement logic, and customer acceptance workflows.
  customerAndBuyer: The practical buyer is a COO, CCO, or head of capacity delivery at an independent AI-factory operator in Southeast Asia. Champions sit across commercial operations, data-center operations, and provisioning teams that must translate physical hall readiness into date-certain customer commitments.
  buyingTriggers:
  - point: Operators start signing committed offtake or anchor-tenant deals before all racks, power blocks, and network domains are fully ready, so revenue is exposed to readiness drift.
    sourceRefs:
    - 1
    - 2
    - 3
    - 4
  - point: 'Regional AI-ready campuses are filling fast: AirTrunk says its Johor platform is almost fully contracted even as new phases are still being built.'
    sourceRefs:
    - 24
    - 25
    - 15
  - point: Data-residency, efficiency, and sustainability rules make site choice and launch sequencing more consequential than generic cloud procurement.
    sourceRefs:
    - 7
    - 10
    - 11
    - 12
    - 13
    - 14
  willingnessToPay:
    summary: Budget exists inside major infrastructure programs, not innovation slush funds. Buyers are already committing billions to AI-ready campuses and cloud regions, and pre-leasing pressure means a tool that reduces oversell risk or accelerates billable go-live can justify enterprise-level pricing long before it becomes a line item called “capacity activation software.”
    sourceRefs:
    - 15
    - 24
    - 25
    - 30
    - 31
    - 32
    - 33
  competitiveLandscape: 'There is no obvious category king for this exact workflow. The incumbent set is fragmented: DCIM vendors model power and space, public clouds sell reserved GPU windows, and AI-native clouds offer turnkey alternatives. The gap is the commercial-readiness control point that tells an operator what fraction of a half-built hall is truly safe to sell, to whom, and for which date.'
  incumbentThesis:
  - incumbentClass: Cloud platforms
    point: AWS and Google already productize reserved GPU windows, but they do so inside their own cloud footprints rather than helping neutral operators commercialize partially commissioned halls.
    sourceRefs:
    - 16
    - 17
    - 18
  - incumbentClass: DCIM suites
    point: Schneider and Sunbird can model capacity, reservations, and infrastructure telemetry, yet they stop short of tenant-safe entitlement logic, commercial packaging, and acceptance evidence by customer.
    sourceRefs:
    - 20
    - 21
    - 29
  - incumbentClass: AI-native clouds
    point: CoreWeave and Crusoe reduce the need for neutral operators by selling turnkey AI capacity directly, but that is a substitute business model, not an operator control plane.
    sourceRefs:
    - 34
    - 35
  - incumbentClass: Regional operator stacks
    point: Operators such as AirTrunk, DCI, and Nxera can build internal workflows, but current public positioning centers on capacity, cooling, and resilience rather than a reusable commercial-readiness product.
    sourceRefs:
    - 24
    - 25
    - 26
    - 27
    - 28
  - incumbentClass: In-house tooling
    point: The default alternative remains spreadsheets, tickets, DCIM, and scripts because the workflow spans multiple systems of record and there is not yet a universally adopted product layer.
    sourceRefs:
    - 20
    - 21
    - 22
    - 23
    - 29
  regulatoryLandscape: Indonesia does not impose a blanket “all AI data must stay local” rule, but the fully effective PDP Law, GR 71 overlap, cross-border transfer sequencing, and the still-forming DPA create enough compliance uncertainty that operators benefit from auditable residency and provisioning evidence. Regionally, Singapore-style sustainability thresholds and approval constraints also push scale-out activity into Batam and Johor, which makes launch governance a cross-border operating issue, not just an engineering issue.
  technologyLandscape: The enabling stack is maturing fast. High-density AI halls now assume liquid cooling, >100kW rack design, and detailed commissioning of flow, pressure, power, and cooling loops. That means the startup should not pretend the scheduler is the control point; the product has to sit above facility telemetry and below commercial commitments.
