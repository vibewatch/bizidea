scenarios:
  downside:
    description: Pilot conversion slips by roughly one quarter, operators hold pricing closer to the low end of the range, and the company exits Y3 with only 3 live paid halls.
    y3RevenueK: 1706.3
    y3EbitdaK: -941.6
    cashLowPointK: 419.4
    keyAssumptionChanges:
    - The first paid hall lands in M9 instead of M6, Y2 exits with 2 live halls, and Y3 exits with 3 instead of 4.
    - Blended annual revenue per hall falls from $700K to $650K as buyers anchor closer to the low end of first-hall subscription pricing.
    - Gross margin slips from 72% to 68% because deployment work and customer-specific integrations stay more manual.
  base:
    description: One lighthouse deployment converts into a reference account, then expands to 4 live paid halls by Y3 while the team stays disciplined ahead of Series A.
    y3RevenueK: 2537.5
    y3EbitdaK: -340.6
    cashLowPointK: 1404.5
    keyAssumptionChanges:
    - Customer counts follow A6-A8, reaching 3 live halls by Y2 exit and 4 by Y3 exit.
    - Blended annual revenue per hall holds at $700K while gross margin stays at the 72% business-plan target.
    - The team reaches 11 pre-Series-A FTE by Q4Y3, with the second scaled GTM seat deferred until after the next financing.
  upside:
    description: The first reference deployment unlocks faster multi-hall expansion, higher realized pricing, and 5 live paid halls by Y3 exit.
    y3RevenueK: 3468.8
    y3EbitdaK: 328.7
    cashLowPointK: 2346.7
    keyAssumptionChanges:
    - The first live hall lands by M5, Y2 exits with 4 live halls, and Y3 exits with 5 as one operator expands earlier than planned.
    - Blended annual revenue per hall rises from $700K to $750K as the company captures more of the $0.5-0.8M subscription band and attaches cross-hall analytics sooner.
    - Gross margin improves from 72% to 74% as integrations and tenant-readiness workflows become more templated.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual revenue per hall settles at $650K because buyers hold the company to first-hall pricing and delay upsell modules.
  baseCase: Blended annual revenue per hall stays at $700K as modeled.
  upsideCase: Blended annual revenue per hall reaches $750K as multi-hall analytics and stronger ROI proof increase capture.
  y3RevenueImpactK: -181.2
  cashImpactK: -199.3
- variable: CAC
  downsideCase: Fully loaded CAC rises to about $340K because every new hall requires more founder time, travel, and proof-of-integration work.
  baseCase: Modeled CAC stays near $280K per new paid hall.
  upsideCase: CAC falls toward $220K as design-partner references shorten qualification and procurement.
  y3RevenueImpactK: 0.0
  cashImpactK: -240.0
- variable: churn
  downsideCase: Retention behaves like losing one hall by late Y3 because the workflow stays project-like rather than system-of-record critical.
  baseCase: The base case assumes 1.5% monthly churn for unit economics while the modeled customer path already bakes in modest concentration risk.
  upsideCase: Retention behaves like keeping every hall and expanding faster because zero-oversell evidence makes the product sticky at renewal.
  y3RevenueImpactK: -262.5
  cashImpactK: -166.8
- variable: sales cycle
  downsideCase: Procurement, compliance, and data-readiness issues add about one quarter to each post-lighthouse win.
  baseCase: The base case assumes the first pilot closes by month 6 and later wins follow on a measured but repeatable cadence.
  upsideCase: Reference deployments compress cycle time by about one quarter and pull multi-hall wins forward.
  y3RevenueImpactK: -262.5
  cashImpactK: -336.3
- variable: gross margin
  downsideCase: Gross margin stays closer to 70% because customer-specific integration and launch support remain labor-heavy.
  baseCase: Gross margin stays at the 72% target from the business plan.
  upsideCase: Gross margin reaches 74% as connectors and entitlement workflows become more reusable.
  y3RevenueImpactK: 0.0
  cashImpactK: -83.2
- variable: hiring pace
  downsideCase: Solutions, data, success, and product hires must all come one quarter earlier to support bespoke deployments.
  baseCase: The base case waits until live hall count justifies each post-founder hire.
  upsideCase: The team holds the modeled hiring cadence because the first 3-4 halls remain templateable.
  y3RevenueImpactK: 0.0
  cashImpactK: -143.8
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      QualifiedOperators --> PaidHalls
      PaidHalls --> SubscriptionRevenue
      SubscriptionRevenue --> GrossProfit
      GrossProfit --> Cash
      ReferenceDeployments --> QualifiedOperators
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from moving from 1 live hall in Y1 to 4 live halls by Y3 at roughly $700K of blended annual revenue per hall.
- checkName: Must go right
  finding: The first design-partner deployment has to convert into a reference subscription quickly enough to support a second live hall by Q2Y2 and a third by Q4Y2.
- checkName: Model breaks if
  finding: If pricing compresses toward $650K or sales cycles slip by a quarter, Y3 revenue falls by roughly $180-260K and the seed cash buffer shrinks meaningfully.
- checkName: Next-round proof
  finding: The Series A story is 3 live paid halls, $1.5-2.1M ARR, and 2 written ROI-backed reference deployments that show the platform prevented oversell or accelerated go-live.
sanityChecks:
  ruleOf40: Y3 growth 107.1% + EBITDA margin -13.4% = 93.7%
  burnMultiple: 0.4x in Y2 and 0.5x in Y3 on net burn / net new ARR, which is efficient but depends on maintaining high ACV with a tiny logo pool.
  revenuePerFte: $230.7K Y3 (benchmark $200-350K early enterprise infra SaaS)
  flags:
  - The base case assumes the company wins 4 live halls from a beachhead the research sizes at only about 18 near-term halls, so logo-count validation is the biggest top-line risk.
  - Implementation and launch-support economics are normalized into blended ARPU instead of shown as a separate services line, which smooths quarterly volatility but can understate cash lumpiness.
  - Even in the base case the company is not fully EBITDA-positive by Y3, so the next round still depends more on ARR quality and reference evidence than on profitability.
  - 'Customer concentration stays high: losing one hall in Y3 would remove about $700K of exit ARR and meaningfully compress the cash buffer.'
