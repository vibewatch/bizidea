modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> PlatformAndUsageRevenue
      PlatformAndUsageRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by active logos rising from 2.0 at Y1 end to 5.02 at Y3 end while blended annual revenue per logo moves toward $336K.
  - checkName: Must go right
    finding: The company must keep data-join deployments under 90 days so the month-15, month-18, and month-22 conversions happen before the narrow 12-logo SAM gets saturated.
  - checkName: Model breaks if
    finding: The downside case shows that a one-logo miss in Y2 plus higher churn nearly exhausts cash, leaving only about $43K at the trough.
  - checkName: Next-round proof
    finding: A credible next financing requires 4-6 production logos, repeatable connector reuse, and at least two workflow expansions that show the read-only wedge can broaden.
sanityChecks:
  ruleOf40: Y3 growth 72.4% + EBITDA margin -20.5% = 51.9%
  burnMultiple: Y3 burn multiple 0.5x using net burn divided by net new revenue versus Y2
  revenuePerFte: $166K Y3 on average 9.75 FTE (below $200-400K mature SaaS benchmark, but plausible for an integration-heavy seed company)
  flags:
    - Base case still depends on winning roughly 5 paying logos from a research-defined near-term SAM of about 12 accounts, so a few competitive losses matter a lot.
    - Revenue per FTE remains below mature software benchmarks because early deployments still require solutions work and connector upkeep.
    - The model only reaches the BP target gross margin in Y3; if connectors stay bespoke or buyers demand more implementation support, payback and runway will worsen.
