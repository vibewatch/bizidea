scenarios:
  downside:
    description: One Y2 conversion and one Y3 expansion slip, ARPU lands about 10% below plan after month 15, and churn rises as buyers choose internal builds.
    y3RevenueK: 924.7
    y3EbitdaK: -832.7
    cashLowPointK: 42.7
    keyAssumptionChanges:
      - Remove the month-22 and month-30 logo starts from the base case.
      - Reduce blended ARPU by roughly 10% from month 16 onward.
      - Increase post-pilot churn from 2.0% to 3.0% per month and hold Y3 gross margin to 68%.
  base:
    description: Two paid pilots land in Y1, three more logos convert across Y2-Y3, and blended revenue per active logo rises only as new workflows go live.
    y3RevenueK: 1614.9
    y3EbitdaK: -331.08
    cashLowPointK: 673.49
    keyAssumptionChanges:
      - Customer starts follow A9-A11 and reach 4.23 active logos by Q4Y2.
      - Blended monthly revenue per active logo rises from $16k in early pilots to $28k by Q4Y3.
      - Gross margin ramps to the BP target of 70% by Y3 as connector reuse improves.
  upside:
    description: A partner-sourced logo pulls into Y2, one extra Y3 logo lands, and better retention plus cleaner deployments let the business approach breakeven.
    y3RevenueK: 2229.8
    y3EbitdaK: 143.9
    cashLowPointK: 1206.7
    keyAssumptionChanges:
      - Add one extra logo in month 16 and one in month 33 relative to base.
      - Lift blended ARPU about 8% from month 16 onward through faster usage expansion.
      - Lower post-Y1 churn to 1.5% and raise Y3 gross margin to 72%.
