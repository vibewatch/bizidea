competitors:
  - name: "CellPoint Digital"
    stage: "scale-up"
    wedge: "Travel-specific payment orchestration, routing, settlement, and reconciliation"
    pricing: "Custom enterprise pricing"
    strength: "Purpose-built for travel payment orchestration with broad PSP/method coverage and native settlement logic."
    weaknessVsUs: "Optimizes payment supply chains, but does not appear to center the trip-linked traveler wallet, reward, and support-state problem in India."
    sourceRefs: [21]
  - name: "Juspay"
    stage: "scale-up"
    wedge: "India-centric payment orchestration, dynamic routing, refunds, and reconciliation"
    pricing: "Custom enterprise pricing"
    strength: "Deep gateway coverage, dynamic routing, tokenization, payouts, and reconciliation across a broad Indian payments ecosystem."
    weaknessVsUs: "Horizontal payment layer rather than a travel-native control plane tied to itinerary and loyalty events."
    sourceRefs: [22, 23, 24]
  - name: "Razorpay"
    stage: "incumbent"
    wedge: "Broad merchant payments, disbursements, and banking stack"
    pricing: "Custom enterprise pricing"
    strength: "Massive merchant footprint and broad payment-mode coverage make it a default incumbent in India."
    weaknessVsUs: "Horizontal merchant tooling does not solve trip-level refund/reward attribution or multi-system travel operations by default."
    sourceRefs: [25]
  - name: "M2P Fintech"
    stage: "scale-up"
    wedge: "Card issuance and card-network transaction rails"
    pricing: "Custom enterprise pricing"
    strength: "Strong card-rail primitives including OCT/AFT, tokenization, status checks, and merchant refund flows."
    weaknessVsUs: "Owns rail mechanics, not the OTA booking and loyalty joins that create the buyer's operating pain."
    sourceRefs: [26]
  - name: "Trintech"
    stage: "incumbent"
    wedge: "High-volume reconciliation and financial close automation"
    pricing: "Custom enterprise pricing"
    strength: "Strong exception routing, auditability, and matching at scale for hospitality and travel finance teams."
    weaknessVsUs: "Back-office close tooling arrives too late to become the trip-native, traveler-visible source of truth."
    sourceRefs: [18]
regulatoryTechnicalConstraints:
  - point: "If the product begins pooling or moving customer funds directly, it risks entering India's payment-aggregator authorization perimeter; the cleaner design is a software layer over licensed partners."
    sourceRefs: [9]
  - point: "Merchants and payment aggregators cannot keep raw card-on-file data; tokenized flows and limited stored card metadata are mandatory."
    sourceRefs: [10, 11, 12]
  - point: "Large credit-card issuers must give eligible customers network choice at issuance or renewal, which affects how co-branded travel card programs are structured."
    sourceRefs: [13]
  - point: "Refund and disbursement orchestration needs network-specific status, reversal, and message logic, especially once card and UPI-linked behaviors sit in the same customer journey."
    sourceRefs: [23, 26]
validationSignals:
  - point: "Tech Funding News reports that Scapia cards are used 15-20 times per month per user, which supports the thesis that travel cards are becoming everyday wallets."
    sourceRefs: [2]
  - point: "Federal Bank and BOBCARD both market the Scapia card around zero-forex, UPI/card rewards, instant redemption, and airport privileges, confirming the product bundles daily payments with travel benefits."
    sourceRefs: [4, 5]
  - point: "ixigo reports 122.95 million annual passenger segments, 83.56 million MAUs, and a 3 hour 17 minute average refund time, showing that refund operations are product-critical at real scale."
    sourceRefs: [29]
  - point: "MakeMyTrip reported $9.8 billion of gross bookings in FY25 while air, hotel, and bus volumes all grew, which implies there are buyers large enough for dedicated exception and ledger tooling."
    sourceRefs: [33]
  - point: "EaseMyTrip served about 26 million customers and 2.63 million hotel partners, signaling another large Indian travel operator with multi-party settlement complexity."
    sourceRefs: [30]
openQuestions:
  - "How much event-level issuer and settlement data will early customers actually expose to a third-party ledger vendor?"
  - "What share of refund and reward-support volume at target accounts is caused by data fragmentation versus supplier-side fulfillment issues?"
  - "Will non-RuPay credit-on-UPI options expand enough to materially change the cross-rail architecture over the next 24 months?"
  - "Will the biggest OTAs buy a shared control plane, or will they prefer to keep the core ledger in-house and only outsource reconciliation edges?"
