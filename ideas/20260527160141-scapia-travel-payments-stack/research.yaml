      sourceRefs: [29, 30, 33]
    threatOfEntrants:
      score: 3
      rationale: "New entrants can assemble orchestration and ledger tooling, but RBI-compliant payment design and travel-specific exception logic raise implementation difficulty."
      sourceRefs: [9, 10, 13, 22, 26]
    threatOfSubstitutes:
      score: 5
      rationale: "Internal builds, generic PSP dashboards, and finance-close software are all credible substitutes even if none solves the whole trip-native problem cleanly."
      sourceRefs: [17, 18, 22, 23, 25]
    competitiveRivalry:
      score: 3
      rationale: "Rivalry is meaningful in adjacent layers, but direct trip-linked cross-rail travel-ledger competition remains limited versus the number of horizontal payments vendors."
      sourceRefs: [21, 22, 25, 26]
  pestle:
    - factor: political
      impact: positive
      point: "India continues to push digital payments reach, QR acceptance, and international expansion of domestic rails, which enlarges the surface area for orchestration software."
      sourceRefs: [7]
    - factor: economic
      impact: positive
      point: "Travel and tourism spend in India is still expanding, which supports continued transaction growth at OTAs and travel-fintechs."
      sourceRefs: [6, 32]
    - factor: social
      impact: positive
      point: "Travel is increasingly framed as an everyday lifestyle category for younger Indian consumers, which supports daily-use travel card and reward behavior."
      sourceRefs: [1, 2]
    - factor: technological
      impact: positive
      point: "UPI, tokenization, routing, payout APIs, and dual-network products create the components needed for a higher-level trip-control plane."
      sourceRefs: [10, 14, 15, 22, 26]
    - factor: legal
      impact: negative
      point: "Payment-aggregator, tokenization, and card-data-storage rules make architectural missteps expensive and favor vendors that stay outside regulated fund handling."
      sourceRefs: [9, 10, 11, 12, 13]
  adoptionFrictionMatrix:
    - friction: "Joining OTA, issuer, PSP, and loyalty data into one canonical trip object"
      severity: high
      affectedBuyer: "VP Payments / Head of Product"
      mitigation: "Start with a read-only overlay on one trip type and one refund/reward workflow before expanding to more rails."
      sourceRefs: [17, 18, 22, 23]
    - friction: "Fear of stepping into a regulated funds-handling perimeter"
      severity: high
      affectedBuyer: "Compliance and finance leadership"
      mitigation: "Position as orchestration and ledger software that works with licensed PAs and issuer partners rather than moving money directly."
      sourceRefs: [9, 10, 13]
    - friction: "Internal-build bias at large travel platforms"
      severity: medium
      affectedBuyer: "Engineering leadership"
      mitigation: "Prove faster implementation and better cross-vendor visibility than in-house systems built around one subsystem."
      sourceRefs: [18, 29, 30, 33]
    - friction: "Low tolerance for refund or reward errors in a traveler-facing wallet"
      severity: high
      affectedBuyer: "Customer support and brand leadership"
      mitigation: "Provide audit trails, event-level explanations, and exception alerts before taking over execution flows."
      sourceRefs: [19, 23, 29]
