scenarios:
  downside:
    description: Y2 少 1 次转正、Y3 少 1 次扩容；第 15 个月后 ARPU 比计划低约 10%；同时买家更多选择内部自建，流失率上升。
    y3RevenueK: 924.7
    y3EbitdaK: -832.7
    cashLowPointK: 42.7
    keyAssumptionChanges:
    - 从基准情形里删掉第 22 个月和第 30 个月的 logo 启动。
    - 从第 16 个月开始，把混合 ARPU 下调约 10%。
    - 试点后月流失率从 2.0% 提到 3.0%，同时把 Y3 毛利率压在 68%。
  base:
    description: Y1 落地 2 个付费试点，Y2-Y3 再转进 3 个 logo；单个活跃 logo 的混合收入只会随着新工作流上线而逐步抬升。
    y3RevenueK: 1614.9
    y3EbitdaK: -331.08
    cashLowPointK: 673.49
    keyAssumptionChanges:
    - 客户启动节奏遵循 A9-A11，并在 Q4Y2 做到 4.23 个活跃 logo。
    - 单个活跃 logo 的混合月收入从早期试点的 $16k，逐步抬到 Q4Y3 的 $28k。
    - 随着连接器复用提升，毛利率到 Y3 爬到 BP 目标值 70%。
  upside:
    description: 1 个伙伴来源的 logo 提前在 Y2 落地，Y3 再多 1 个 logo；同时留存更好、部署更顺，业务接近 breakeven。
    y3RevenueK: 2229.8
    y3EbitdaK: 143.9
    cashLowPointK: 1206.7
    keyAssumptionChanges:
    - 相对基准情形，在第 16 个月和第 33 个月各新增 1 个 logo。
    - 从第 16 个月开始，随着 usage 扩容更快，把混合 ARPU 提高约 8%。
    - Y1 之后月流失率降到 1.5%，Y3 毛利率提高到 72%。
