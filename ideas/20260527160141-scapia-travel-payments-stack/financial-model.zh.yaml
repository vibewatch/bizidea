modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionLogos
      ProductionLogos --> PlatformAndUsageRevenue
      PlatformAndUsageRevenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情形下，收入由活跃 logo 数从 Y1 末的 2.0 提升到 Y3 末的 5.02 驱动，同时单个 logo 的混合年收入逐步逼近 $336K。
- checkName: 必须做对的事
  finding: 公司必须把数据 join 型部署压到 90 天以内，这样第 15、18、22 个月的转化才能发生在仅有 12 个 logo 的狭窄 SAM 被吃满之前。
- checkName: 模型失效条件
  finding: 下行情形显示，只要 Y2 少 1 个 logo，再叠加更高流失率，现金几乎被耗尽，谷底只剩约 $43K。
- checkName: 下一轮融资证明点
  finding: 想顺利拿到下一轮融资，必须做出 4-6 个正式 logo、证明连接器复用可重复，并完成至少 2 次工作流扩容，证明只读切口能继续变宽。
sanityChecks:
  ruleOf40: Y3 增长率 72.4% + EBITDA 利润率 -20.5% = 51.9%
  burnMultiple: Y3 burn multiple 为 0.5x，按净烧钱额除以相对 Y2 的净新增收入计算
  revenuePerFte: Y3 平均 9.75 个 FTE 对应 $166K 收入/人（低于成熟 SaaS 的 $200-400K 基准，但对一个集成负担较重的种子公司仍算合理）
  flags:
  - 基准情形仍然依赖从研究定义的约 12 个近端 SAM 账户里拿下约 5 个付费 logo，所以输掉几场关键竞争就会很伤。
  - 收入/FTE 仍低于成熟软件公司基准，因为早期部署还要投入大量 solutions 工作和连接器维护。
  - 模型要到 Y3 才碰到 BP 目标毛利率；如果连接器始终无法产品化、或买家要求更多实施支持，回本周期和现金跑道都会进一步恶化。
