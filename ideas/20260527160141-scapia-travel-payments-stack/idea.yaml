jobsToBeDone:
  - job: "When we launch a new travel card or UPI payment flow, help our payments team reconcile every booking, reward, and refund to one trip, so we can scale volume without support chaos."
    currentAlternative: "Internal ledgering and manual reconciliation across PSP, issuer, and booking reports"
    successMetric: "Refund-resolution time and percentage of trips with unreconciled payment or reward events"
