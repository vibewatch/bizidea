differentiator: >-
  PSPs, booking engines, and loyalty platforms each own one subsystem, but none are designed around the trip as the
  financial object that ties bookings, payments, refunds, and rewards together. This company starts with a very specific
  operational wedge: making the traveler wallet accurate across card and UPI flows while finance teams keep margin and
  liability visibility. Over time, defensibility comes from rail-specific reconciliation logic, merchant and itinerary
  mappings, and a proprietary dataset on how travel-fintech transactions behave across booking categories and post-booking
  changes.
