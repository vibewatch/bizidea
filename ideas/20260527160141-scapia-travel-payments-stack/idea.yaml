problem: >-
  Indian travel-fintech apps that add cards, UPI, and rewards do not just process bookings anymore; they have to
  reconcile a full trip lifecycle across multiple payment rails. One traveler may book on credit, pay small balances or
  ancillaries on UPI, earn rewards at different moments, then need refunds or reversals when plans change. Most teams
  manage this with internal ledgers, PSP exports, issuer reports, and manual support workflows, which leads to broken
  reward accrual, slow refunds, and poor unit-economics visibility exactly when usage is scaling fastest.
targetUser:
  primary: "Head of Payments, Cards, or Travel Fintech Product at an Indian OTA or travel-first fintech launching co-branded cards with UPI-linked payments"
  secondary: "Revenue-operations or finance leaders responsible for rewards liability, refunds, and payment reconciliation"
  buyer: "GM of Travel Fintech, VP Payments, or Chief Product Officer"
startupThesis:
  nonObviousInsight: >-
    The important shift is not that travel is going digital; it is that travel apps are turning into everyday spend
    surfaces. Once users swipe a travel card 15–20 times per month and also pay through UPI in the same app, the real
    bottleneck becomes a trip-linked ledger that can attribute every payment, reward, refund, and merchant interaction
    to one traveler journey across rails.
  beachhead: >-
    Indian travel-first fintechs and large OTAs with a co-branded or embedded travel card program that are expanding
    from flight bookings into hotels and everyday spend, starting with trip-level reconciliation for bookings, ancillaries,
    refunds, and rewards across card and UPI rails.
  wedge: >-
    A trip-linked commerce ledger that maps every card authorization, UPI payment, booking event, refund, and reward
    accrual to the same itinerary or traveler ID, then automates reconciliation and customer-visible wallet accuracy.
  whyNowCatalyst: >-
    Scapia's combination of rapid booking growth, high monthly card usage, and in-app convergence of credit-card and UPI
    rails makes cross-rail reconciliation newly urgent for any Indian travel-fintech platform trying to scale without
    margin leakage and support chaos.
  ventureScalePath: >-
    Start as the ledger for trip commerce at travel-fintech apps, then expand into merchant-funded offers, issuer and OTA
    partner settlement, loyalty exchange, trip-linked credit, and eventually the broader financial operating system for
    destination commerce in India and similar mobile-first travel markets.
solution: >-
  Build a B2B infrastructure layer for Indian travel-fintech platforms that creates a single trip ledger across booking,
  payment, reward, and refund events. The product ingests OTA booking records, card authorizations and settlements, UPI
  pay-ins, reversals, and loyalty events, then resolves them to one traveler and one trip so finance, product, and support
  teams see the same truth. It would automate reward posting rules for different payment rails, flag broken or delayed
  refunds, and surface margin leakage when an itinerary touches multiple merchants or cancellation paths. Customer-facing
  teams could use the same ledger to explain exactly what happened on a disputed reward or refund instead of stitching data
  from multiple vendors. The first deployment is an overlay on top of the existing issuer, PSP, booking, and loyalty stack
  rather than a core replacement.
goToMarketSeed:
  firstCustomer: >-
    A Series B+ Indian travel-fintech app or OTA with 200,000+ monthly active bookers, a live co-branded travel card, and
    a 2026 roadmap to expand hotels or everyday spend through UPI-linked payments.
  buyingTrigger: >-
    Launch of a dual-network or UPI-linked payment feature, rapid hotel-category expansion, or an executive push to reduce
    refund and rewards-support tickets as transaction frequency rises.
  currentAlternative: "Internal build plus PSP dashboards, issuer settlement files, loyalty exports, and spreadsheet-based finance and support reconciliation."
  switchingReason: >-
    Existing booking stacks and payment processors can each show one slice of the workflow, but none provide a trip-level
    source of truth across card, UPI, rewards, and reversals; this wedge cuts support cost, prevents wallet errors, and
    exposes unit economics without forcing a core-stack rewrite.
  pricingHypothesis: "Annual SaaS fee plus usage-based pricing per active cardholder or per reconciled trip and payment event."
