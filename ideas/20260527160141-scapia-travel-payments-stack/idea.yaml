topRisks:
  - name: "Platform bundling"
    description: "Large OTAs, issuers, or PSPs may try to assemble similar reconciliation workflows internally once the pain becomes visible."
    mitigation: "Win on faster deployment, trip-native data modeling, and cross-vendor visibility that would take months of coordination for an internal team to reproduce."
  - name: "Category concentration"
    description: "If only a handful of Indian travel-fintech platforms reach enough scale, the initial customer base could be narrower than it appears."
    mitigation: "Start in travel-first apps, then expand the same ledger into airline ancillaries, loyalty partners, and broader destination-commerce platforms that share the same cross-rail problem."
  - name: "Regulatory and rail complexity"
    description: "Changes in card-network, RuPay, or UPI rules could break integrations or make some flows harder to automate."
    mitigation: "Position as an orchestration and reconciliation layer, keep policy rules configurable by rail, and build close partnerships with issuers and PSPs that absorb scheme changes early."
