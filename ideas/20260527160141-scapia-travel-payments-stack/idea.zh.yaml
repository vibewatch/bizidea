topRisks:
- name: 平台打包
  description: 一旦痛点被看见，大型 OTA、发卡行或 PSP 可能会尝试把类似的对账流程自己拼出来。
  mitigation: 靠更快上线、以行程为原生的数据模型，以及跨供应商可见性取胜——这些能力让内部团队重做一遍，往往要协调好几个月。
- name: 品类过于集中
  description: 如果真正长到足够规模的印度旅行金融科技平台只有少数几家，最初客户池可能比表面看起来更窄。
  mitigation: 先在旅行优先 App 里站稳，再把同一套账本扩到航空增值服务、忠诚度伙伴，以及同样有跨轨问题的更广泛目的地商业平台。
- name: 监管与轨道复杂度
  description: 卡组织、RuPay 或 UPI 规则一旦变化，集成可能失效，部分流程也会更难自动化。
  mitigation: 把自己定位成编排与对账层，让各轨道规则保持可配置，并和能更早吸收 scheme 变化的发卡方与 PSP 建紧密合作。
