problem: 印度的旅行金融科技 App 一旦把卡、UPI 和奖励都接进来，就不只是处理预订了；它们得在多条支付轨道上，把整段行程的资金生命周期对上账。一个旅客可能先刷信用卡下单，再用 UPI 支付尾款或增值服务，在不同时间点拿到奖励，之后行程一变又要走退款或冲正。多数团队现在还是靠内部台账、PSP 导出、发卡方报表和人工客服流程硬拼，结果就是奖励入账出错、退款变慢、单位经济模型看不清，而且偏偏是在使用量涨得最快的时候。
targetUser:
  primary: 印度 OTA 或旅行金融科技平台里，负责支付、卡业务或旅行金融产品的负责人；这类公司正在上线联名卡，并把 UPI 绑定支付接进来。
  secondary: 负责奖励负债、退款和支付对账的营收运营或财务负责人。
  buyer: 旅行金融业务 GM、支付 VP，或首席产品官。
startupThesis:
  nonObviousInsight: 真正的变化不是旅行在继续数字化，而是旅行 App 正在变成日常消费入口。用户一旦每月刷旅行卡 15–20 次，又在同一个 App 里用 UPI 付款，真正卡住平台扩张的，就变成一套和行程绑定的账本：它得把每一笔支付、奖励、退款和商户交互，都归到同一段旅客旅程上。
  beachhead: 先打印度旅行优先的金融科技平台和大型 OTA：它们已经有联名卡或内嵌旅行卡项目，也正从机票往酒店和日常消费扩展。第一步先解决同一趟行程里，预订、增值服务、退款和奖励在卡轨与 UPI 轨上的对账。
  wedge: 做一本和行程绑定的商业账本，把每次刷卡授权、UPI 付款、预订事件、退款和奖励入账都映射到同一份 itinerary 或 traveler ID 上，再把对账和面向用户的钱包准确性自动化。
  whyNowCatalyst: Scapia 的预订增长很快、月度刷卡频次很高，而且信用卡与 UPI 轨道已经在 App 内合流。对任何想扩大规模、又不想把毛利漏掉、把客服拖乱的印度旅行金融科技平台来说，跨轨对账现在突然变得很急。
  ventureScalePath: 先做旅行金融科技 App 的 trip commerce 账本，再往商户出资优惠、发卡行与 OTA 结算、积分互换、行程相关信贷扩展，最后长成印度以及其他移动优先旅行市场里的目的地商业金融操作系统。
solution: 给印度旅行金融科技平台做一层 B2B 基础设施，把预订、支付、奖励、退款事件汇成一本 trip ledger。产品会吃进 OTA 预订记录、卡授权与清算、UPI 入账、冲正和忠诚度事件，再把它们归到同一个旅客、同一趟行程上，让财务、产品、客服看到的是同一套真相。它能按不同支付轨道自动执行奖励入账规则，标记断掉或延迟的退款，并在同一笔 itinerary 牵涉多个商户或多个取消路径时，把毛利流失直接亮出来。面向用户的团队也能靠这本账，讲清楚一笔有争议的奖励或退款到底发生了什么，不用再从多个供应商的数据里拼图。第一版不是替换核心系统，而是叠在现有发卡方、PSP、预订和忠诚度栈之上的一层 overlay。
goToMarketSeed:
  firstCustomer: 一家 Series B+ 的印度旅行金融科技 App 或 OTA：月活跃预订用户超过 200,000，联名旅行卡已经上线，并且 2026 年计划通过绑定 UPI 的支付把酒店或日常消费做大。
  buyingTrigger: 上线双网络卡或绑定 UPI 的支付功能、酒店品类快速扩张，或管理层要求在交易频次上升时把退款和奖励相关的客服工单压下去。
  currentAlternative: 内部自研，再叠加 PSP 看板、发卡行清算文件、忠诚度导出，以及靠表格完成的财务和客服对账。
  switchingReason: 现有预订栈和支付处理器各自只能看到流程的一小段，没有谁能在卡、UPI、奖励和冲正之间给出一份按行程聚合的单一真相；这个切口既能砍掉客服成本、避免钱包出错，也能把单位经济模型摊开看清，而且不用重写核心栈。
  pricingHypothesis: 按年收 SaaS 费用，再按活跃持卡人数量或每笔已对账的行程/支付事件收 usage fee。
