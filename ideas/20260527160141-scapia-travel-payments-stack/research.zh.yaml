      - 25
      - 26
    buyerPower:
      score: 4
      rationale: 滩头市场里的买家数量有限，但规模大、团队成熟、内部也有工程能力和现成供应商栈，因此每个 logo 的议价权都很强。
      sourceRefs:
      - 29
      - 30
      - 33
    threatOfEntrants:
      score: 3
      rationale: 新进入者可以拼出编排和账本能力，但要做到符合 RBI 要求的支付设计，又要吃透旅行场景的异常逻辑，落地难度并不低。
      sourceRefs:
      - 9
      - 10
