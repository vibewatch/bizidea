      - 22
      - 26
    threatOfSubstitutes:
      score: 5
      rationale: 内部自建、通用 PSP 看板和财务关账软件，都是可信替代方案——即便没有谁能把旅行原生问题彻底解干净。
      sourceRefs:
      - 17
      - 18
      - 22
      - 23
      - 25
    competitiveRivalry:
      score: 3
      rationale: 相邻层竞争不弱，但真正直接做“行程绑定、跨轨、旅行账本”的对手仍然有限，相比通用支付供应商的数量要少。
      sourceRefs:
      - 21
      - 22
      - 25
      - 26
  pestle:
  - factor: 政治
    impact: positive
    point: 印度还在持续推动数字支付覆盖、二维码受理和本土支付轨道的国际扩张，这会放大编排软件可以发挥作用的表面积。
    sourceRefs:
    - 7
  - factor: 经济
    impact: positive
    point: 印度旅行与旅游支出仍在增长，这会继续抬高 OTA 和旅行金融科技平台的交易量。
    sourceRefs:
    - 6
    - 32
  - factor: 社会
    impact: positive
    point: 对更年轻的印度消费者而言，旅行越来越像一种日常生活方式品类，这有利于旅行卡和奖励产品走向高频使用。
    sourceRefs:
    - 1
    - 2
  - factor: 技术
    impact: positive
    point: UPI、tokenization、路由、打款 API 和双网络产品都已具备，搭一层更高阶的 trip control plane 所需的零件其实已经齐了。
    sourceRefs:
    - 10
    - 14
    - 15
    - 22
    - 26
  - factor: 法律
    impact: negative
    point: 支付聚合商、tokenization 和卡数据存储规则，会把架构失误的代价拉得很高，也更利好那些能避开受监管资金处理的供应商。
    sourceRefs:
    - 9
    - 10
    - 11
    - 12
    - 13
  adoptionFrictionMatrix:
  - friction: 把 OTA、发卡方、PSP 和忠诚度数据并到同一个标准化 trip object 上
    severity: high
    affectedBuyer: 支付 VP / 产品负责人
    mitigation: 先从只读 overlay 开始，只覆盖一种 trip type 和一条退款/奖励工作流，再逐步扩到更多轨道。
    sourceRefs:
    - 17
    - 18
    - 22
    - 23
  - friction: 担心产品一步踩进受监管的资金处理边界
    severity: high
    affectedBuyer: 合规与财务管理层
    mitigation: 把产品讲成编排与账本软件，和持牌 PA、发卡方伙伴配合，而不是自己直接动钱。
    sourceRefs:
    - 9
    - 10
    - 13
  - friction: 大型旅行平台天然偏向内部自建
    severity: medium
    affectedBuyer: 工程管理层
    mitigation: 拿更快落地和更强的跨供应商可见性说话，证明自己比围绕单一子系统搭出来的内部方案更好。
    sourceRefs:
    - 18
    - 29
    - 30
    - 33
  - friction: 旅客可见的钱包对退款或奖励错误容忍度极低
    severity: high
    affectedBuyer: 客服与品牌负责人
    mitigation: 在接管执行流之前，先把审计轨迹、事件级解释和异常预警交出来。
    sourceRefs:
    - 19
    - 23
    - 29
