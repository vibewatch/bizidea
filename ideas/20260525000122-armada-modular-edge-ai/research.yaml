  validationPlan:
  - priority: high
    question: How many defense integrator programs will exceed 6 nodes in the next 24 months?
    evidenceToGather: Pipeline interviews with Navy-oriented primes, plus program-level rollout counts and maintenance window policies.
  - priority: high
    question: Which hardware and BMC interfaces are common across Armada units and legacy rugged compute shelters?
    evidenceToGather: Adapter inventory from OEM docs and field interviews with integrator platform engineers.
  - priority: medium
    question: Will operators trust a third-party control layer to stage firmware and model updates inside DDIL or IL5+ environments?
    evidenceToGather: Security review feedback, RMF package requirements, and pilot design constraints from one integrator and one remote industrial buyer.
  - priority: medium
    question: How much manual labor is spent today on failed updates, silent hardware drift, and remote-hands escalation?
    evidenceToGather: Current-state workflow maps, incident logs, and technician dispatch counts from two live programs.
