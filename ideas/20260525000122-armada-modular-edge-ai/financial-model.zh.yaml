scenarios:
  downside:
    description: 销售周期拉长，定价落在生产区间低端，公司以 25 个活跃项目而非 30 个结束 Y3。
    y3RevenueK: 5277.5
    y3EbitdaK: 1038.98
    cashLowPointK: 479.48
    keyAssumptionChanges:
    - Y2 新增项目 [1,2,1,1] 而非 [2,2,1,2]
    - Y3 新增项目 [3,4,4,5] 而非 [4,5,5,6]
    - 生产定价以 $380K 而非 $400K 退出
    - 毛利率峰值 68% 而非 70%
  base:
    description: Y1 三个付费试点在 Y2 转化为 10 个项目基础，公司在 Y3 末达到研究的 30 项目 SOM 路径。
    y3RevenueK: 7295.0
    y3EbitdaK: 2569.15
    cashLowPointK: 854.11
    keyAssumptionChanges:
    - Y1 签署 3 个付费试点
    - Y2 末 10 个活跃项目
    - Y3 末 30 个活跃项目，年末年度价值约 $400K
    - 毛利率在 Y3 达到 70% 的业务模型目标
  upside:
    description: 试点转化更快，基准/支持扩展拉高定价，公司以高于基础 SOM 路径结束 Y3。
    y3RevenueK: 9042.5
    y3EbitdaK: 3904.33
    cashLowPointK: 1113.87
    keyAssumptionChanges:
    - Y2 新增项目 [2,2,2,2] 而非 [2,2,1,2]
    - Y3 新增项目 [5,5,6,6] 而非 [4,5,5,6]
    - 生产定价以 $430K 而非 $400K 退出
    - 毛利率在 Q4Y3 达到 72%
sensitivity:
- variable: ARPU
  downsideCase: 生产定价 Y3 以 $350K 年均价值退出
  baseCase: 生产定价 Y3 以 $400K 年均价值退出
  upsideCase: 生产定价 Y3 以 $450K 年均价值退出
  y3RevenueImpactK: -910.0
  cashImpactK: -637.0
- variable: CAC
  downsideCase: CAC 因试点需要更多账户专项销售而升至 $180K
  baseCase: CAC 维持在每个增量生产项目约 $142K
  upsideCase: 通过合作伙伴来源的销售线索，CAC 降至 $115K
  y3RevenueImpactK: 0.0
  cashImpactK: -268.0
- variable: churn
  downsideCase: 月度流失率因机群持续以试点为主而稳定在 3.5%
  baseCase: 月度流失率 2.5%
  upsideCase: 工作流嵌入后月度流失率降至 1.8%
  y3RevenueImpactK: -365.0
  cashImpactK: -256.0
- variable: sales cycle
  downsideCase: 平均销售周期从约 6 个月延长至约 9 个月
  baseCase: 从试点到生产的动作维持约 6 个月
  upsideCase: 强合作伙伴推荐将周期压缩至约 4 到 5 个月
  y3RevenueImpactK: -2017.5
  cashImpactK: -374.7
- variable: gross margin
  downsideCase: 毛利率因上线持续偏重服务而峰值仅 65%
  baseCase: 毛利率在 Y3 达到 70%
  upsideCase: 借助更好的适配器复用毛利率达到 73%
  y3RevenueImpactK: 0.0
  cashImpactK: -365.0
- variable: hiring pace
  downsideCase: Y3 两个职位在 10 个项目完全稳定前提前招聘
  baseCase: Y1 后招聘按模型平滑爬坡推进
  upsideCase: 一个 GTM 和一个平台岗位延迟到利用率证明后再招
  y3RevenueImpactK: -250.0
  cashImpactK: -310.0
