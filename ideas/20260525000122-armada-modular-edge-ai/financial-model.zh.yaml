slug: austere-compute-fleet-assurance
date: '2026-05-25'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-25] 模型从业务计划日期次月启动，确保 pre-seed 资金在招聘爬坡前到位。'
- id: A2
  name: M1 开始现金
  value: '2600.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M; BP fundingAsk round pre-seed] 基础情景采用 $2.6M，处于声明范围内，规模足以达到 8 到 10 个生产项目里程碑并留有缓冲。'
- id: A3
  name: 模型中的客户单元
  value: active paid program deployment
  unit: definition
  source: '[BP businessModel.unitOfValue] 和 [BP gtm.pricing] 按在用项目和托管算力单元而非席位定价。'
- id: A4
  name: M1 起始付费项目数
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] 公司从零收入启动，仅在工作流梳理和适配器验证后才签署首个付费试点。'
- id: A5
  name: Y1 按月新增付费项目
  value: '[0, 0, 0, 1, 0, 1, 0, 0, 1, 0, 0, 0]'
  unit: count
  source: '[BP milestones 0–12 months sign 3 paid defense pilots] 和 [BP experimentRoadmap 90–180 days] 节奏安排使三个试点在 M9 前签署，不假设 Y1 虚高爬坡。'
- id: A6
  name: Y2 按季度新增付费项目
  value: '[2, 2, 1, 2]'
  unit: count
  source: '[BP milestones 12–24 months reach 8-10 production programs] 将 Y1 试点基础转化为 7 个增量在线项目，Y2 末达到 10 个活跃项目。'
- id: A7
  name: Y3 按季度新增付费项目
  value: '[4, 5, 5, 6]'
  unit: count
  source: '[BP market.som $12M at ~30 live programs] 和 [RS market.som ~30 live programs at ~$400k annual value] 驱动 Y3 从 10 个扩展到 30 个活跃项目。'
- id: A8
  name: 年度价值阶梯
  value: Y1 $120K; Y2 Q1 $180K, Q2 $220K, Q3 $250K, Q4 $280K; Y3 Q1 $320K, Q2 $360K, Q3 $400K, Q4 $400K
  unit: annual USDK per active program
  source: '[BP gtm.pricing $80k-$150k pilot then $150k-$300k annual subscription] 加 [RS bottomUpSizingDrivers blended annual value per program ~$400k]，试点从试点区间中段起步，成熟项目在 Y3 末达到研究得出的混合价值。'
- id: A9
  name: 收入确认策略
  value: average active programs in period multiplied by annual value
  unit: formula
  source: '初创财务启发式规则（来源：Financial Modeler mid-period go-live rule）；收入采用 ((BoP + EoP) / 2) × 年度合同价值计算月度或季度收入。'
- id: A10
  name: 毛利率爬坡
  value: Y1 revenue months 50%-55%; Y2 58%, 60%, 63%, 66%; Y3 67%, 69%, 70%, 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 和 [BP risks mixed hardware telemetry and services-heavy onboarding] 意味着毛利率从低于目标起步，仅在适配器和实施标准化后才达到 70%。'
- id: A11
  name: 各角色年度含税薪酬
  value: Founder 180; founding eng 170; product/solutions lead 160; implementation eng 140; security/compliance lead 150; account executive 170; platform engineer 160; customer success/program ops 120; partner/field ops lead 145; finance/ops 110; reliability engineer 160
  unit: annual USDK per FTE
  source: '[BP team roles and startTiming] 加精益美国国防软件初创企业含工资税和福利的现金薪酬启发式规则。'
- id: A12
  name: 招聘序列
  value: Founder、founding eng、product/solutions lead 在 M1；implementation engineer M4；security/compliance lead M8；first account executive M11；platform engineer M14；customer success/program ops M18；partner/field ops lead M21；second account executive M27；second platform engineer M30；second implementation engineer M31；finance/ops M33；reliability engineer M34
  unit: timing
  source: '[BP team] 加绑定 [BP product twelveMonth and twentyFourMonth] 及在 Y1 不过度招聘前提下支持 Y2 10 个项目、Y3 30 个项目所需的启发式规则增补。'
- id: A13
  name: 薪酬分摊策略
  value: Founder 60% S&M / 40% G&A; product lead 30% S&M / 50% R&D / 20% G&A; implementation engineers 50% S&M / 50% R&D; security lead 70% R&D / 30% G&A; CS/program ops 70% S&M / 30% G&A; partner lead 60% S&M / 40% G&A; engineers fully R&D; AEs fully S&M; finance fully G&A
  unit: policy
  source: '[BP team rationales]、[BP gtm] 和 [BP operations] 显示创始人主导销售、重度工作流部署和以产品为主的第一年，因此部门损益包含分摊薪酬加非薪酬支出。'
- id: A14
  name: 非薪酬运营费用爬坡
  value: S&M $6K-$24K/month; R&D $12K-$26K/month; G&A $8K-$18K/month
  unit: USDK per month
  source: '[BP fundingAsk.useOfFundsSummary]、[BP operations] 和受监管企业初创企业中国防客户差旅、云/集成工具、保险、法律及合规开销的启发式规则。'
- id: A15
  name: 稳态月度流失率
  value: '2.5'
  unit: percent
  source: 任务关键年度合同的初创财务启发式规则，受 [BP risks buyer concentration and OEM bundling] 和 [RS openQuestions] 中机群规模是否足够支撑独立预算的调节。
- id: A16
  name: 每个生产项目混合 CAC
  value: '141.83'
  unit: USDK
  source: 由 Y1-Y2 模型中 $992.83K 销售和营销支出除以 Y2 新增 7 个增量项目计算得出；与 [BP gtm founder-led direct sales]、[BP gtm funnelTargets] 和初步验证后才启动合作伙伴辅助扩张一致。
- id: A17
  name: 融资规模规则
  value: reach the 8-10 production-program milestone and keep 6 months of buffer
  unit: policy
  source: 开发者指令加 [BP fundingAsk runwayMonths 18]；模型将 pre-seed 规模定为能够达到下一个融资证明点并留有额外缓冲，而不仅仅是撑到首批试点。
- id: A18
  name: 现金流简化
  value: ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: '初创财务启发式规则：轻资产软件模型假设资本支出、债务、税收和营运资金扭曲极小。'
