      QualifiedPrograms --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      ProductionPrograms --> BenchmarkData
      BenchmarkData --> ExpansionACV
modelSanity:
- checkName: 收入引擎
  finding: 基础情景收入靠将三个 Y1 试点转化为 Q4Y2 的 10 个活跃项目，再在 Y3 以年末年度价值逐步升至 $400K 的方式新增 20 个项目来驱动。
- checkName: 必须跑通的事
  finding: 适配器复用率和从试点到生产的转化率须足够强，使公司在不让实施工作拖累毛利率低于模型爬坡的前提下达到 8 到 10 个生产项目。
- checkName: 模型崩溃条件
  finding: 若销售周期漂向 9 个月或生产定价长期停在约 $350K，现金状况将趋于紧张——这是最大的收入和资金跑道敏感性。
- checkName: 下一轮融资证明点
  finding: 若公司以 8 到 10 个生产项目、一条已批准写入路径、基准分析上线和约 6 个月剩余现金结束 pre-seed，则下一轮融资有据可依。
sanityChecks:
  ruleOf40: Y3 增长率 353.4% + EBITDA 利润率 35.2% = 388.6%。
  burnMultiple: Y2 消耗乘数约 0.4x（$755.49K 消耗 / Y2 新增 7 个以 $280K 退出 ACV 项目产生的 $1.96M 净新 ARR）。
  revenuePerFte: Y3 每人均收入 $521K（$7.295M 收入 / 14 名 Q4Y3 FTE；SaaS 基准 $200-400K，此处仅在六位数 ACV 和部署复用成立的情况下合理）。
  flags:
  - Y3 依赖于达到研究中的 30 项目完整 SOM 路径；若国防滩头产生的多节点机群少于 30 个，收入线将迅速收缩。
  - 模型 LTV/CAC 保持吸引力的前提是任务关键合同的月度流失率假设为 2.5%；留存率仍需首批生产维护周期的实证支撑。
  - 毛利率扩展到 70% 需要适配器复用和实施纪律；若客户持续要求定制遥测或工作流工作，模型对毛利率和招聘效率的假设过于乐观。
