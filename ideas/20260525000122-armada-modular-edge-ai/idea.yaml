topRisks:
  - name: Hardware vendors bundle lightweight ops tools
    description: Armada or other OEMs may ship basic monitoring and update tooling that slows adoption of a standalone platform.
    mitigation: Win on vendor neutrality, mixed-fleet support, disconnected-safe workflows, and benchmark data that single-OEM tools cannot provide.
  - name: Early market remains pilot-heavy
    description: If modular AI deployments stay stuck in small pilots, the number of near-term enterprise buyers may be limited.
    mitigation: Target integrators that already have named multi-node programs, then expand the same product into offshore energy and other remote operators as fleets commercialize.
  - name: Austere deployments are too bespoke at first
    description: Connectivity, power, and hardware profiles may vary enough that implementations become services-heavy.
    mitigation: Start with one narrow hardware profile and one Navy-style deployment pattern, then standardize adapters, rollout policies, and remediation playbooks before broadening coverage.
