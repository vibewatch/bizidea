differentiator: >-
  This is not another sovereign routing layer, generic Kubernetes platform, or after-the-fact observability dashboard. It
  is purpose-built for mixed ruggedized AI infrastructure fleets where connectivity is intermittent, hardware is
  heterogeneous, and service windows are operationally constrained. The moat comes from the failure, rollout, and
  maintenance dataset gathered across real austere deployments, plus the workflow lock-in created when operators use the
  system as their source of truth for readiness, updates, and field remediation.
