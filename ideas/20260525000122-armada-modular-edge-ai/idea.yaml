jobsToBeDone:
  - job: When a defense pilot expands into a multi-node modular AI fleet, help the program team push safe updates and verify node readiness, so they can keep local inference available during operations.
    currentAlternative: Manual rollout checklists, SSH sessions, vendor portals, and spreadsheets
    successMetric: Percentage of nodes updated without mission-impacting incident and mean time to recover from a failed rollout
  - job: When a remote site starts showing hardware or environmental drift, help the infrastructure lead diagnose and escalate the right field action, so they can avoid losing compute capacity in austere conditions.
    currentAlternative: Generic observability dashboards plus ad hoc field-service coordination
    successMetric: Mean time to detect, triage, and remediate node failures before workload loss
