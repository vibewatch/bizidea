problem: >-
  Defense integrators can now buy modular AI compute enclosures, but keeping 5-20 units mission-ready across ships, piers,
  and expeditionary sites is still a manual fire drill. Each software rollout, hardware alert, cooling issue, and workload
  move gets handled through vendor portals, SSH sessions, and field-service tickets, so one bad patch or silent component
  fault can strand local inference at the worst possible moment. Traditional DCIM and cloud observability tools assume
  stable connectivity and homogeneous racks, which disconnected mixed-fleet deployments do not have.
targetUser:
  primary: U.S. defense integrator program managers operating 5-20 modular AI compute units across one Navy or expeditionary base modernization program
  secondary: Offshore energy infrastructure teams running modular AI units on rigs or remote assets with intermittent connectivity
  buyer: VP Edge Infrastructure, program GM, or Director of Mission Systems at a defense systems integrator
startupThesis:
  nonObviousInsight: >-
    The bottleneck is no longer getting the first modular AI box built. Armada and Johnson Controls are industrializing the
    hardware layer, which means the scarce capability shifts to keeping heterogeneous edge compute fleets patched, healthy,
    and workload-ready under intermittent connectivity. Once deployments become repeatable fleets instead of one-off
    installs, mission assurance becomes the control point.
  beachhead: >-
    Defense systems integrators deploying 6-15 mixed modular AI compute units across one U.S. Navy shore-to-ship inference
    program where nodes must stay operational through low-bandwidth links and constrained maintenance windows
  wedge: >-
    A disconnected fleet-assurance layer that stages OTA software and firmware updates, scores node readiness, and
    automates failover and field-service escalation across mixed modular AI sites
  whyNowCatalyst: >-
    Armada's booking growth, named Navy and offshore customers, and Johnson Controls factory agreement show modular edge AI
    is moving from bespoke deployments to repeat fleets, making vendor-neutral operations software newly urgent.
  ventureScalePath: >-
    Start with defense modular AI fleets, then expand into offshore energy, mining, telecom, and sovereign neo-cloud
    operators that will all need the same control layer for ruggedized distributed compute.
solution: >-
  Build a mission-readiness OS for modular AI infrastructure running outside the data-center core. The product ingests node
  telemetry, environmental sensors, connectivity state, power conditions, and software versions to create a live readiness
  score for every deployed unit. It manages disconnected-safe rollout rings for models, containers, and firmware, then
  coordinates failover, spare-parts dispatch, and technician playbooks when a node drifts out of policy. Over time, the
  company builds the best dataset on how modular AI units actually fail, recover, and perform in austere environments,
  which lets it benchmark vendors, predict maintenance, and become the system of record for fielded edge compute fleets.
goToMarketSeed:
  firstCustomer: >-
    Program manager inside a 500-5,000 person U.S. defense integrator deploying 8-12 Armada and legacy edge-compute
    shelters for one Navy pier-to-ship AI inference program with intermittent SATCOM and strict change windows
  buyingTrigger: >-
    A pilot expands from one node to a multi-site fleet, or a production contract requires auditable update, uptime, and
    cyber-readiness across disconnected compute units
  currentAlternative: Vendor hardware portals, Kubernetes or Ansible scripts, generic observability tools, and remote-hands tickets coordinated in spreadsheets
  switchingReason: >-
    The product gives one disconnected-safe workflow for rollout rings, health telemetry, mission-readiness scoring, and
    service escalation across all units, reducing field failures and operator headcount versus stitching together vendor
    tools
  pricingHypothesis: "$80k-$150k annual platform fee per active program plus usage priced by managed modular compute unit and premium support for disconnected deployments"
