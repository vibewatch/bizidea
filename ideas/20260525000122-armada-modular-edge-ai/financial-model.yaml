modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      TargetAccounts --> QualifiedPrograms
      QualifiedPrograms --> PaidPilots
      PaidPilots --> ProductionPrograms
      ProductionPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      ProductionPrograms --> BenchmarkData
      BenchmarkData --> ExpansionACV
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by converting three Y1 pilots into 10 active programs by Q4Y2 and then adding 20 more programs in Y3 at year-end annual value that steps up to $400K.
- checkName: Must go right
  finding: Adapter reuse and pilot-to-production conversion must stay strong enough that the company reaches 8-10 production programs without implementation work dragging gross margin below the modeled ramp.
- checkName: Model breaks if
  finding: The cash profile gets uncomfortable if sales cycles drift toward nine months or if production pricing stays closer to $350K, because those are the biggest revenue and runway sensitivities.
- checkName: Next-round proof
  finding: The next financing is justified if the company exits the pre-seed with 8-10 production programs, one approved write path, benchmark analytics live, and roughly six months of remaining cash.
sanityChecks:
  ruleOf40: Y3 growth 353.4% + EBITDA margin 35.2% = 388.6%.
  burnMultiple: Y2 burn multiple about 0.4x ($755.49K burn / $1.96M net new ARR from 7 additional programs at $280K exit ACV).
  revenuePerFte: $521K Y3 ($7.295M revenue / 14 Q4Y3 FTE; benchmark $200-400K SaaS, justified here only if six-figure ACVs and deployment reuse hold).
  flags:
  - Y3 depends on reaching the full 30-program SOM path from the research; if the defense beachhead produces fewer than 30 multi-node fleets, the revenue line will compress quickly.
  - The modeled LTV/CAC stays attractive only because churn is assumed at 2.5% monthly on mission-critical contracts; retention still needs proof from the first production maintenance cycles.
  - Margin expansion to 70% requires adapter reuse and implementation discipline; if customers keep demanding bespoke telemetry or workflow work, the model is too optimistic on both gross margin and hiring efficiency.
