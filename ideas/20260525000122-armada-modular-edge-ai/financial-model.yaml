slug: austere-compute-fleet-assurance
date: '2026-05-25'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-05-25] model starts the month after the business-plan date so pre-seed cash is available before the hiring ramp.'
- id: A2
  name: Opening cash at M1
  value: '2600.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–4M; BP fundingAsk round pre-seed] base case uses a $2.6M close inside the stated range and sized to reach the 8-10 production-program milestone with buffer.'
- id: A3
  name: Customer unit in the model
  value: active paid program deployment
  unit: definition
  source: '[BP businessModel.unitOfValue] and [BP gtm.pricing] price against active programs and managed compute units rather than seats.'
- id: A4
  name: Starting paid programs (M1)
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] company starts pre-revenue and closes the first paid pilot only after workflow mapping and adapter proof.'
- id: A5
  name: Y1 new paid programs by month
  value: '[0, 0, 0, 1, 0, 1, 0, 0, 1, 0, 0, 0]'
  unit: count
  source: '[BP milestones 0–12 months sign 3 paid defense pilots] and [BP experimentRoadmap 90–180 days] paced so three pilots close by M9 and no vanity Y1 ramp is assumed.'
- id: A6
  name: Y2 new paid programs by quarter
  value: '[2, 2, 1, 2]'
  unit: count
  source: '[BP milestones 12–24 months reach 8-10 production programs] converts the Y1 pilot base into 7 incremental live programs and ends Y2 at 10 active programs.'
- id: A7
  name: Y3 new paid programs by quarter
  value: '[4, 5, 5, 6]'
  unit: count
  source: '[BP market.som $12M at ~30 live programs] and [RS market.som ~30 live programs at ~$400k annual value] drive the Y3 path from 10 to 30 active programs.'
- id: A8
  name: Annual value ladder
  value: Y1 $120K; Y2 Q1 $180K, Q2 $220K, Q3 $250K, Q4 $280K; Y3 Q1 $320K, Q2 $360K, Q3 $400K, Q4 $400K
  unit: annual USDK per active program
  source: '[BP gtm.pricing $80k-$150k pilot then $150k-$300k annual subscription] plus [RS bottomUpSizingDrivers blended annual value per program ~$400k] so pilots start near the middle of the pilot range and mature programs exit Y3 at the researched blended value.'
- id: A9
  name: Revenue recognition policy
  value: average active programs in period multiplied by annual value
  unit: formula
  source: 'Startup-finance heuristic named source: Financial Modeler mid-period go-live rule; revenue uses ((BoP + EoP) / 2) × annual contract value for the month or quarter.'
- id: A10
  name: Gross margin ramp
  value: Y1 revenue months 50%-55%; Y2 58%, 60%, 63%, 66%; Y3 67%, 69%, 70%, 70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] and [BP risks mixed hardware telemetry and services-heavy onboarding] imply margin starts below target and reaches 70% only after adapters and implementation standardize.'
- id: A11
  name: Loaded annual salaries by role
  value: Founder 180; founding eng 170; product/solutions lead 160; implementation eng 140; security/compliance lead 150; account executive 170; platform engineer 160; customer success/program ops 120; partner/field ops lead 145; finance/ops 110; reliability engineer 160
  unit: annual USDK per FTE
  source: '[BP team roles and startTiming] plus startup-finance heuristic for lean U.S. defense-software cash compensation including payroll tax and benefits.'
- id: A12
  name: Hiring sequence
  value: Founder, founding eng, and product/solutions lead in M1; implementation engineer M4; security/compliance lead M8; first account executive M11; platform engineer M14; customer success/program ops M18; partner/field ops lead M21; second account executive M27; second platform engineer M30; second implementation engineer M31; finance/ops M33; reliability engineer M34
  unit: timing
  source: '[BP team] plus startup-finance heuristic additions tied to [BP product twelveMonth and twentyFourMonth] and the need to support 10 programs by Y2 and 30 by Y3 without overhiring in Y1.'
- id: A13
  name: Payroll allocation policy
  value: Founder 60% S&M / 40% G&A; product lead 30% S&M / 50% R&D / 20% G&A; implementation engineers 50% S&M / 50% R&D; security lead 70% R&D / 30% G&A; CS/program ops 70% S&M / 30% G&A; partner lead 60% S&M / 40% G&A; engineers fully R&D; AEs fully S&M; finance fully G&A
  unit: policy
  source: '[BP team rationales], [BP gtm], and [BP operations] show founder-led selling, workflow-heavy deployment, and a product-led first year, so departmental P&L lines include allocated payroll plus non-payroll spend.'
- id: A14
  name: Non-payroll operating expense ramp
  value: S&M $6K-$24K/month; R&D $12K-$26K/month; G&A $8K-$18K/month
  unit: USDK per month
  source: '[BP fundingAsk.useOfFundsSummary], [BP operations], and startup-finance heuristic for travel to defense accounts, cloud/integration tooling, insurance, legal, and compliance overhead in a regulated enterprise startup.'
- id: A15
  name: Steady-state monthly churn
  value: '2.5'
  unit: percent
  source: Startup-finance heuristic for sticky mission-critical annual contracts, tempered by [BP risks buyer concentration and OEM bundling] and [RS openQuestions] about whether fleets stay large enough for standalone budgets.
- id: A16
  name: Blended CAC per production program
  value: '141.83'
  unit: USDK
  source: Calculated from modeled Y1-Y2 sales and marketing spend of $992.83K divided by the 7 incremental programs added in Y2 after the first three pilots; consistent with [BP gtm founder-led direct sales], [BP gtm funnelTargets], and partner-assisted expansion only after initial proof.
- id: A17
  name: Funding sizing rule
  value: reach the 8-10 production-program milestone and keep 6 months of buffer
  unit: policy
  source: Developer instruction plus [BP fundingAsk runwayMonths 18]; the model sizes the pre-seed to reach the next financing proof point with extra buffer rather than just survive to the first pilots.
- id: A18
  name: Cash flow simplification
  value: ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: 'Startup-finance heuristic: asset-light software model assumes minimal capex, debt, taxes, and working-capital distortion.'
