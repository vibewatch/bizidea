    - Y2 new programs [1,2,1,1] instead of [2,2,1,2]
    - Y3 new programs [3,4,4,5] instead of [4,5,5,6]
    - Production pricing exits at $380K rather than $400K
    - Gross margin peaks at 68% rather than 70%
  base:
    description: Three paid pilots in Y1 convert into a 10-program Y2 base, then the company reaches the researched 30-program SOM path by the end of Y3.
    y3RevenueK: 7295.0
    y3EbitdaK: 2569.15
    cashLowPointK: 854.11
    keyAssumptionChanges:
    - Y1 closes 3 paid pilots
    - Y2 ends at 10 active programs
    - Y3 ends at 30 active programs at ~$400K year-end annual value
    - Gross margin reaches the 70% business-model target by Y3
  upside:
    description: Pilot conversions happen faster and benchmark/support expansions lift pricing, so the company exits Y3 above the base SOM path.
    y3RevenueK: 9042.5
    y3EbitdaK: 3904.33
    cashLowPointK: 1113.87
    keyAssumptionChanges:
    - Y2 new programs [2,2,2,2] rather than [2,2,1,2]
    - Y3 new programs [5,5,6,6] rather than [4,5,5,6]
    - Production pricing exits at $430K rather than $400K
    - Gross margin reaches 72% in Q4Y3
