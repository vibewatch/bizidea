  buyingTrigger: >-
    试点从单节点扩展到多站点机群，或生产合同要求在断网算力单元间提供可
    审计的更新、在线率和网络就绪报告。
  currentAlternative: 厂商硬件门户、Kubernetes 或 Ansible 脚本、通用可观测性工具，以及用电子表格协调的远程支持工单
  switchingReason: >-
    产品提供一套断网安全的统一工作流，覆盖发布分级环、健康遥测、任务就绪
    度评分和服务升级——贯穿所有单元，相比拼接厂商工具能减少现场故障和运营
    人力。
  pricingHypothesis: "每个在用项目每年 $80k 到 $150k 的平台费，加上按托管模块化算力单元数量计价的使用费，以及针对断网部署的高级支持"
