problem: >-
  国防系统集成商现在可以采购模块化 AI 算力舱，但要让 5 到 20 台设备
  在舰船、码头和远征基地保持任务就绪状态，仍然是一场手工救火。每次
  软件发布、硬件告警、冷却故障和工作负载迁移都得靠厂商门户、SSH 会话
  和现场服务工单处理，一个坏补丁或一个沉默的组件故障就能在最糟糕的
  时刻让本地推理中断。传统 DCIM 和云可观测性工具假设稳定连接和同构
  机架——断网混合机群恰恰没有这两个条件。
targetUser:
  primary: 在一个海军或远征基地现代化项目中运营 5 到 20 台模块化 AI 算力单元的美国国防系统集成商项目经理
  secondary: 在石油平台或间歇性连接的偏远资产上运行模块化 AI 单元的近海能源基础设施团队
  buyer: 国防系统集成商的边缘基础设施副总裁、项目总经理或任务系统总监
startupThesis:
  nonObviousInsight: >-
    瓶颈已不再是造出第一台模块化 AI 计算舱。Armada 和 Johnson Controls
    正在把硬件层工业化——这意味着稀缺能力正在转移到另一个方向：如何在
    断网状态下让异构边缘算力机群持续打上补丁、保持健康、随时承载工作负载。
    一旦部署从一次性安装变成可重复的机群，任务保障就成了控制点。
  beachhead: >-
    在单个美国海军岸到舰推理项目中部署 6 到 15 台混合模块化 AI 算力单元
    的国防系统集成商——节点须在低带宽链路和受限维护窗口下保持运行。
  wedge: >-
    一个断网安全的机群保障层，负责分级 OTA 软件和固件更新、为节点就绪度
    评分，并在混合模块化 AI 站点间自动化故障切换和现场服务升级。
  whyNowCatalyst: >-
    Armada 的预订量增长、命名的海军和近海客户，以及 Johnson Controls
    工厂协议表明，模块化边缘 AI 正从定制部署向可重复机群演进，使厂商中立
    的运营软件迫切起来。
  ventureScalePath: >-
    从国防模块化 AI 机群起步，再扩展到近海能源、采矿、电信和主权新型云
    运营商——这些行业都需要同一套针对加固型分布式算力的控制层。
solution: >-
  为在数据中心核心之外运行的模块化 AI 基础设施构建任务就绪操作系统。产品
  采集节点遥测、环境传感器、连接状态、电力条件和软件版本，为每台已部署单元
  生成实时就绪度评分。它管理模型、容器和固件的断网安全分级发布环，当节点
  偏离策略时协调故障切换、备件调度和技术员操作手册。随着时间积累，公司将
  建立最完整的数据集，记录模块化 AI 单元在恶劣环境下的实际故障、恢复和性能
  表现，从而对厂商进行基准测试、预测维护，成为已部署边缘算力机群的系统
  记录层。
