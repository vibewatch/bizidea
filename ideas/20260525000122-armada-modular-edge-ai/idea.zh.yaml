jobsToBeDone:
  - job: 当国防试点扩展为多节点模块化 AI 机群时，帮助项目团队安全推送更新并验证节点就绪度，确保本地推理在行动中持续可用。
    currentAlternative: 手工发布检查清单、SSH 会话、厂商门户和电子表格
    successMetric: 无任务影响事件的节点更新成功率，以及从发布失败到恢复的平均时间
  - job: 当偏远站点开始出现硬件或环境漂移时，帮助基础设施负责人诊断并升级正确的现场处置措施，避免在恶劣条件下丧失算力。
    currentAlternative: 通用可观测性仪表板加临时现场服务协调
    successMetric: 从节点故障检测、分类到修复（在工作负载丢失之前）的平均耗时
