topRisks:
  - name: 硬件厂商捆绑轻量级运营工具
    description: Armada 或其他 OEM 可能随硬件附带基础监控和更新工具，拖慢独立平台的采用。
    mitigation: 靠厂商中立性、混合机群支持、断网安全工作流和单一 OEM 工具无法提供的基准数据取胜。
  - name: 早期市场仍以试点为主
    description: 若模块化 AI 部署长期停留在小规模试点，近期企业买家的数量可能有限。
    mitigation: 锁定已有命名多节点项目的集成商，再随机群商业化将同一产品扩展到近海能源和其他偏远运营商。
  - name: 恶劣部署早期过于定制化
    description: 连接、电力和硬件规格可能差异过大，导致实施工作量偏重服务。
    mitigation: 从单一硬件规格和一种海军式部署模式起步，在扩大覆盖范围之前先将适配器、发布策略和修复操作手册标准化。
