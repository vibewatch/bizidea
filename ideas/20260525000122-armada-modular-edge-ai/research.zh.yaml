  wedge: 面向国防和政府的任务就绪主权 Kubernetes 及基础设施生命周期管理
  pricing: 定制企业定价
  strength: 无外部控制平面定位，以及跨云、数据中心和边缘的全生命周期管理。
  weaknessVsUs: 更侧重集群和基础设施标准化，而非硬件遥测、就绪评分或现场服务编排。
  sourceRefs:
  - 12
  - 13
- name: Red Hat OpenShift Edge
  stage: incumbent
  wedge: 跨大规模分布式边缘资产的应用 Kubernetes 平台和自动化
  pricing: 定制企业订阅定价
  strength: 深厚的企业可信度和跨混合与边缘资产的成熟运营工具。
  weaknessVsUs: 针对集群和应用生命周期管理优化，而非断网模块化 AI 机箱的健康状态和维护工作流。
  sourceRefs:
  - 14
- name: Azure Arc + Fleet Manager
  stage: incumbent
  wedge: 跨本地、多云和边缘的集中治理、安全多集群更新和混合管控
  pricing: 按用量和企业协议计费
  strength: 跨异构基础设施的强集中治理和更新编排。
  weaknessVsUs: 仍锚定超大规模云控制模型，且有文档记录的断网场景限制，无法完美映射到恶劣国防运营。
  sourceRefs:
  - 15
  - 16
  - 17
  - 18
- name: ZEDEDA
  stage: scale-up
  wedge: 具备安全设备和应用生命周期管理的厂商中立分布式边缘编排
  pricing: 定制企业定价
  strength: 清晰的分布式边缘编排故事和厂商中立定位。
  weaknessVsUs: 对模块化 AI 基础设施机群的任务就绪评分、维护窗口和服务工作流的针对性相对不足。
  sourceRefs:
  - 10
regulatoryTechnicalConstraints:
- point: 处理 CUI 的项目须将平台映射到 NIST SP 800-171 管控及相关国防承包商义务。
  sourceRefs:
  - 21
- point: 零信任架构预期对身份、策略和最小权限工作流提出更高要求，即使在中断网络中也不例外。
  sourceRefs:
  - 23
  - 35
- point: MOSA 和技术刷新预期支持模块化接口和可分离组件，这不利于封闭的单一厂商工作流。
  sourceRefs:
  - 25
  - 26
- point: 断网和低带宽条件要求本地自主、分级同步和弹性更新机制，而非持续的云回连。
  sourceRefs:
  - 3
  - 16
  - 35
validationSignals:
- point: Armada 报告客户预订量增长 540%，并命名了海军、近海和可再生能源部署，表明对恶劣 AI 基础设施存在真实需求。
  sourceRefs:
  - 1
- point: UNITAS 2025 展示了模块化 AI 基础设施在对抗性海上条件下的海军舰船实战演练。
  sourceRefs:
  - 3
- point: Spectro Cloud 明确将战术、海上、SCIF 和隔离网络环境列为营销目标，确认了买家将连接受限基础设施视为真实品类。
  sourceRefs:
  - 12
- point: Google Cloud 边缘调查显示支出和规模持续增加，相当比例的企业计划进行大型边缘投资。
  sourceRefs:
  - 27
