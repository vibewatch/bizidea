  adoptionFrictionMatrix:
  - friction: 智能体藏匿于共享服务账号或通用应用之后时，发现不完整
    severity: high
    affectedBuyer: 安全与企业 AI 平台团队
    mitigation: 从暴露最丰富管理遥测数据的构建平台和 SaaS 系统起步，再通过身份和 OAuth 证据扩展。
