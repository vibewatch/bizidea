competitors:
- name: Willow
  stage: seed
  wedge: 针对 AI 智能体如何连接内部系统及其被允许执行什么操作的透明度与管控的智能体管理和访问层。
  pricing: Not public
  strength: 纯粹叙事与确切治理空白高度对齐，并已通过 Wix 这一相关共创客户完成初步验证。
  weaknessVsUs: 早期产品和发行成熟度尚未得到证明；切口仍需在初始合作伙伴之外获得更广泛的验证。
  sourceRefs:
  - 1
- name: Zenity
  stage: scale-up
  wedge: 企业 AI 安全平台，涵盖跨平台智能体的可观测性、态势管理和威胁保护。
  pricing: Custom / not public
  strength: 强有力的企业安全框架，同时具备部署前态势管理和运行时管控。
  weaknessVsUs: 更广泛的 AI 安全定位可能稀释对变更管控审批、业务所有权和跨应用推广工作流的专注。
  sourceRefs:
  - 20
- name: Noma Security
  stage: scale-up
  wedge: 跨模型、工具和 MCP 服务器的端到端 AI 和智能体发现、安全设计边界和运行时保护。
  pricing: Custom / not public
  strength: 全面的 AI 安全平台叙事，融资信号强、覆盖广度大。
  weaknessVsUs: 更偏向安全广度的优化；对于业务自建智能体的审批包、权限模拟和工作流原生撤权，叙事没有那么具体。
  sourceRefs:
  - 21
- name: Astrix
  stage: scale-up
  wedge: AI 智能体和非人类身份发现，加上短期凭证和审计记录的最小权限部署。
  pricing: Custom / not public
  strength: 强有力的身份优先方法，以及围绕安全设计部署的明确管控平面语言。
  weaknessVsUs: 以身份为中心的价值主张可能无法充分满足安全团队和业务团队共同需要的跨职能审批和责任人 UX。
  sourceRefs:
  - 22
- name: Microsoft native stack
  stage: incumbent
  wedge: "Microsoft 生态系统内的 Copilot Studio 治理、Power Platform 数据策略和 Microsoft 全面智能体治理指导。"
  pricing: Bundled / platform-led
  strength: 默认发行渠道、丰富遥测数据，以及针对 Microsoft 创建的智能体可信的原生管控。
