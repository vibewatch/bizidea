    - 19
    - 22
    - 24
  - friction: 业务团队可能将审批视为减速器并绕过治理
    severity: high
    affectedBuyer: 部门运营人员和自动化负责人
    mitigation: 默认低风险模板、预审批权限配置和一键责任人指定，让安全上线保持快速。
