slug: employee-agent-change-control
date: "2026-06-05"
currency: USD
modelStartMonth: "2026-07"

assumptions:
  - id: A1
    name: ARPU（每个生产客户的年度订阅费）
    value: "50.0"
    unit: K USD per year
    source: "BP 定价：ACV 区间 $45K–$60K；模型使用中间值 $50K"
  - id: A2
    name: 试点费（一次性共创客户参与费）
    value: "20.0"
    unit: K USD
    source: "BP investorMemo.firstCustomer：$15K–$25K 付费试点；模型使用中间值 $20K"
  - id: A3
    name: 目标毛利率
    value: "70"
    unit: percent
    source: "BP businessModel.targetGrossMarginPct: 70"
  - id: A4
    name: COGS 占收入百分比
    value: "30"
    unit: percent
    source: "由 A3 推导；COGS 包含云基础设施、数据处理和分配到交付的客户成功人力成本；按 A17，第三年改善至 27–28%"
  - id: A5
    name: 试点费确认周期
    value: "3"
    unit: months
    source: "行业惯例：共创客户合同按试点持续时间平摊确认；3 个月试点是企业 SaaS 价值验证的标准周期"
  - id: A6
    name: 试点转生产转化率
    value: "60"
    unit: percent
    source: "BP funnelTargets：试点转生产 50%+；模型使用 60% 作为基准情景可信度的中间值"
  - id: A7
    name: 从试点开始到生产合同的时间
    value: "5"
    unit: months
    source: "BP funnelTargets：试点启动到生产决策在 120 天内（约 4 个月）；模型保守使用 5 个月"
  - id: A8
    name: 每名全职员工综合成本
    value: "18.0"
    unit: K USD per month
    source: "行业惯例：$216K/年全包（底薪、工资税、福利），不含股权；与 BP.team 中高级岗位的市场薪酬一致"
  - id: A9
    name: 种子轮融资金额和时间
    value: "4.0"
    unit: M USD
    source: "BP fundingAsk.targetFundingRangeUsd：$3–5M；模型使用中间值 $4.0M，于第 1 个月完成"
  - id: A10
    name: A 轮融资金额和时间
    value: "8.0"
    unit: M USD
    source: "惯例：在第二年第三季度末、18+ 客户和约 $850K ARR 运转率后的里程碑驱动融资；$8M 用于支撑 18 个月的增长计划到 B 轮；在 Q3Y2 cashEopK 中作为现金流入反映"
  - id: A11
    name: 月度流失率
    value: "1.5"
    unit: percent per month
    source: "行业惯例：12 个月年度合同的早期企业 SaaS；约 85% 年度续签率 = 15% 年度总流失率 = 约 1.35%/月；模型取整为 1.5%"
  - id: A12
    name: 混合 CAC（每个新生产客户的全包销售和营销成本）
    value: "35.0"
    unit: K USD
    source: "由第二年模型推导：销售和营销支出约 $788K / 22 个新客户 = $35.8K；与 $50K ACV 企业 SaaS 12 个月回本惯例一致"
  - id: A13
    name: 第一年人员规模扩张计划
    value: "CEO+创始工程师 M1，产品安全 M2，集成工程师 M3，GTM 负责人 M9"
    unit: roles and months
    source: "BP team 章节；与声明的招聘时间直接映射"
  - id: A14
    name: 第二年新增人员，期末达 11 名全职员工
    value: "+2 Q1Y2（销售 AE+售前 SE），+2 Q2Y2（工程），+1 Q3Y2（客户成功），+1 Q4Y2（工程）"
    unit: FTE additions by quarter
    source: "惯例：从 5 名扩至 11 名全职员工，支持第二年末 26 个生产客户和两个合作伙伴渠道；与 BP 12–24 个月里程碑一致"
  - id: A15
    name: 第三年新增人员，达 18 名全职员工
    value: "+2 Q1Y3，+2 Q2Y3，+2 Q3Y3，+1 Q4Y3"
    unit: FTE additions by quarter
    source: "惯例：GTM 和工程扩张以支持 110 个客户；第三年收入/全职员工约 $220K，在 $200–400K 企业 SaaS 基准范围内"
  - id: A16
    name: 第一年非薪酬月度运营费用
    value: "13 to 22"
    unit: K USD per month
    source: "惯例：法务 $4–5K，云工具 $3–5K，差旅和营销 $2–5K，杂项 $3–5K；随 GTM 活动增加，从 $13K（M1）增长至 $22K（M9+）"
  - id: A17
    name: 第三年毛利率改善
    value: "72 to 73"
    unit: percent
    source: "惯例：每年 SaaS 运营中基础设施单位经济约改善 2–3 个百分点；从第一至二年 70% 升至第三年 Q1–Q2 的 72% 和 Q3–Q4 的 73%"
  - id: A18
    name: 第一年试点数量
    value: "5"
    unit: pilots
    source: "BP 里程碑 0–12 个月：签下 3–5 个付费试点；模型使用 5（上限），分别在 M4、M6、M7、M10、M11 签署"
  - id: A19
    name: 第一年期末生产客户数
    value: "4"
    unit: customers
    source: "BP 里程碑 0–12 个月：将至少 2 个试点转化为年度生产合同；模型使用 4（试点 1–3 在 M9–M11 转化，加上一个加速转化 M12）"
  - id: A20
    name: 第三年期末生产客户数
    value: "110"
    unit: customers
    source: "BP 里程碑 24–36 个月：约 120 个生产客户；模型使用 110（低于目标 8%）作为保守基准情景"
  - id: A21
    name: 模型开始月份
    value: "2026-07"
    unit: "YYYY-MM"
    source: "商业计划日期 2026-06-05 后一个月；为种子轮关闭和团队组建留出时间"
  - id: A22
    name: 收入构成
    value: "订阅 + 试点费"
    unit: description
    source: "收入 = 生产客户订阅（customersEop × $4.167K/月）加试点费（$20K/试点按 A5 在 3 个月内平摊确认）；unitEconomics 中的 ARPU 仅反映年度订阅"

