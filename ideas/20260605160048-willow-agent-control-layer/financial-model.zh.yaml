scenarios:
  downside:
    description: >-
      平台原生管控加速；ARPU 压缩至 $38K；月度流失率升至 2.5%；
      试点转化率降至 35%；第三年客户数跌至约 65。
    y3RevenueK: 2100.0
    y3EbitdaK: -1900.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - "ARPU 因平台原生价格压力从 $50K 降至 $38K"
      - "月度流失率从 1.5% 升至 2.5%"
      - "试点转生产转化率从 60% 降至 35%"
  base:
    description: >-
      基准情景如建模所示：ARPU $50K，60% 试点转化率，1.5% 月度流失率，
      第三年期末 110 个生产客户，A 轮 $8M 于第二年第三季度完成。
    y3RevenueK: 3306.0
    y3EbitdaK: -1230.6
    cashLowPointK: 1875.8
    keyAssumptionChanges:
      - "所有假设均按 A1–A22 建模"
  upside:
    description: >-
      合作伙伴渠道加速；ARPU 通过运行时附加模块扩展至 $62K；
      月度流失率降至 0.8%；第三年期末 145 个生产客户。
    y3RevenueK: 5000.0
    y3EbitdaK: -600.0
    cashLowPointK: 2200.0
    keyAssumptionChanges:
      - "ARPU 通过偏差监控和生命周期附加模块从 $50K 扩展至 $62K"
      - "合作伙伴渠道在第二年第三季度前贡献 40% 的管道"
      - "月度流失率降至 0.8%（净收入留存率 130%）"

sensitivity:
  - variable: ARPU
    downsideCase: "$35K——平台原生治理将混合 ACV 压缩 30%"
    baseCase: "$50K——BP $45K–$60K ACV 区间中间值（A1）"
    upsideCase: "$65K——运行时偏差和生命周期附加模块将 ACV 提升 30%"
    y3RevenueImpactK: -990.0
    cashImpactK: -990.0
  - variable: churn
    downsideCase: "2.5% 月度——产品市场契合度缺口使净收入留存率跌破 100%"
    baseCase: "1.5% 月度——85% 续签率的企业年度合同（A11）"
    upsideCase: "0.5% 月度——强劲 NPS 和扩张推动净收入留存率超过 120%"
    y3RevenueImpactK: -500.0
    cashImpactK: -500.0
  - variable: "sales cycle"
    downsideCase: "35% 试点转化——买家试点后默认回到平台原生管控"
    baseCase: "60% 试点转化——BP 目标 50%+ 的中间值（A6）"
    upsideCase: "80% 试点转化——强劲的早期支持者和低发现摩擦"
    y3RevenueImpactK: -1000.0
    cashImpactK: -1000.0
  - variable: "gross margin"
    downsideCase: "60%——复杂多厂商清单的服务密集型入驻推高 COGS"
    baseCase: "70%——BP 目标毛利率，产品化 SaaS 交付（A3）"
    upsideCase: "75%——基础设施自动化和自助入驻压缩 COGS"
    y3RevenueImpactK: 0.0
    cashImpactK: -331.0
  - variable: CAC
    downsideCase: "$50K——漫长的企业采购周期和两阶段安全审查"
    baseCase: "$35K——创始人主导销售转型为 AE 动作，辅以合作伙伴协助（A12）"
    upsideCase: "$20K——合作伙伴来源的线索跳过初始发现；信任转移更快"
    y3RevenueImpactK: -300.0
    cashImpactK: -300.0
  - variable: "hiring pace"
    downsideCase: "落后计划 2 个季度——技术招聘瓶颈延误产品和 GTM"
    baseCase: "按模型人员计划推进（A14、A15）"
    upsideCase: "GTM 提前 1 个季度——雇主品牌加速 AE 和售前工程师招聘"
    y3RevenueImpactK: -490.0
    cashImpactK: -130.0

modelDiagram:
  title: 单位经济模型流转图
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> Production
      Production --> ARR
      ARR --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
      Partners --> Pilots
      Churn --> Production

modelSanity:
  - checkName: "收入引擎"
    finding: >-
      年度订阅以 $50K ARPU 为基础，通过 60% 试点转生产漏斗扩张，
      从第一年 4 个客户复利增长至第三年末 110 个；
      从第二年第一季度起，销售 AE 和合作伙伴渠道补充创始人主导销售。
  - checkName: "必须走对的事"
    finding: >-
      前 3–5 个付费试点必须在第 8 个月前签署，并以 50%+ 转化率完成，
      才能支撑第二年第三季度 18+ 客户的 A 轮里程碑；
      一个季度的试点签约停滞会延迟所有后续的融资和招聘里程碑。
  - checkName: "模型失效条件"
    finding: >-
      若 Microsoft、Google 或 Salesforce 在 18 个月内推出可信的跨厂商智能体治理，
      ARPU 将被压缩至 $35K 以下，按 ARPU 敏感性分析行，第三年收入减少约 $990K，
      在现有成本结构下 A 轮里程碑将无法达成。
  - checkName: "下一轮证明"
    finding: >-
      第二年第三季度的 A 轮要求 18 个生产客户和 $850K 以上的 ARR 运转率，
      且须通过直销和至少一个合作伙伴渠道共同验证，
      与基准情景现金低点 $1,875.8K 和第三年消耗倍数 0.29x 一致。

sanityChecks:
  ruleOf40: "第三年收入增速 326% + EBITDA 利润率 -37% = 289%；早期强劲增长主导；该指标在 B 轮后趋于正常化"
  burnMultiple: "第二年 1.41x（$1,553K 消耗 / $1,100K 净新增 ARR）；第三年 0.29x（$1,231K / $4,200K 净新增 ARR）——随收入规模吸收基本固定的人员成本，快速改善"
