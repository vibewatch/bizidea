openQuestions:
- What standalone ACV will a 2,000-person design-partner customer accept for cross-platform approval and rapid revocation coverage versus extending native tooling?
- Which builders and connectors account for the majority of uncontrolled employee-built agents in the beachhead during the next 12 months?
- How complete can discovery be when agents reuse generic service accounts, OAuth apps, or embedded workflow credentials?
- Does the economic buyer sit more naturally in security, identity, or enterprise AI platform once companies move from incident response to scaled rollout?
