reportMemo:
  executiveTakeaways:
  - The real wedge is not generic AI security but cross-platform change control for employee-built agents that can act inside business SaaS.
  - Native platform governance is arriving fast, but it remains vendor-siloed; mixed-stack enterprises still lack one approval path, one owner record, and one rapid revocation workflow across agent builders.
  - Buyer urgency is being pulled forward by actual incident rates, shadow-agent discovery, and governance immaturity rather than by abstract future regulation alone.
  - The most defensible product layer combines entitlement simulation, ownership assignment, and rapid revocation with an inventory graph of agents, tools, and delegated actions.
  - 'Go-to-market should start where business teams already ship agents without central review: support, revops, and internal IT inside Microsoft-, Google-, and Salesforce-heavy service firms.'
  marketDefinition: Cross-platform governance software for employee-built and business-deployed AI agents that can read, write, or trigger actions in enterprise SaaS systems.
  customerAndBuyer: Primary user is the enterprise AI platform or security team that must approve and trace agent access; economic buyer is typically the CISO, CIO, or head of enterprise AI platform.
  buyingTriggers:
  - point: A security incident, scope violation, or shadow-agent discovery creates immediate demand for one owner registry and one rapid revocation workflow.
    sourceRefs:
    - 17
    - 18
    - 19
  - point: A broader rollout of Copilot Studio, Agentforce, Gemini, or similar builders forces central teams to replace ticket reviews with explicit approval controls.
    sourceRefs:
    - 2
    - 3
    - 5
    - 6
    - 7
  - point: Compliance programs become urgent when enterprises realize governance maturity trails adoption and upcoming oversight expectations.
    sourceRefs:
    - 9
    - 10
    - 13
    - 14
    - 15
  willingnessToPay:
    summary: Enterprises are already paying for agent capacity on usage and per-user models, while incident and visibility gaps create a separate security budget justification. A control layer can price against avoided review labor and faster incident containment, not just against raw model spend.
    sourceRefs:
    - 7
    - 13
    - 17
    - 18
    - 19
  competitiveLandscape: 'The field is splitting into three camps: platform-native governance inside major clouds and SaaS suites, identity/NHI vendors extending into agents, and AI-security vendors focused on posture plus runtime detection. The whitespace is a workflow-native approval plane that works across all three.'
  incumbentThesis:
  - incumbentClass: Cloud platforms
    point: Microsoft, Google, and Salesforce can add strong controls inside their own stacks, but mixed-stack enterprises still need one inventory and one approval layer across builders, connectors, and external SaaS actions.
    sourceRefs:
    - 2
    - 3
    - 5
    - 6
    - 7
    - 27
  - incumbentClass: Identity and NHI vendors
    point: Identity-first players are strong at credentials, service accounts, and least privilege, but they do not automatically own the business workflow for pre-launch approval, owner assignment, and delegated-action signoff.
    sourceRefs:
    - 22
    - 24
    - 25
  - incumbentClass: SaaS security vendors
    point: Discovery-heavy SaaS security tools can expose shadow AI and app sprawl, yet they are not the default place where security and business teams jointly simulate and approve agent reach before go-live.
    sourceRefs:
    - 20
    - 23
    - 25
  - incumbentClass: Generic AI security platforms
    point: Runtime monitoring is important, but buyers still need pre-deployment guardrails and an ownership system of record before a risky agent ever reaches production data.
    sourceRefs:
    - 20
    - 21
    - 26
    - 28
  regulatoryLandscape: The category is increasingly shaped by secure-by-design expectations, auditability, human oversight, and data-governance requirements rather than by one single AI-specific rulebook.
  technologyLandscape: The control surface is expanding quickly as agent builders, MCP-style tool protocols, and agent gateways make it easier for non-central teams to connect models to real enterprise actions.
  distributionChannels:
  - point: Land through security-led design-partner pilots after an incident, audit finding, or uncontrolled-builder rollout.
    sourceRefs:
    - 17
    - 18
    - 19
  - point: Co-sell through identity, NHI, and SaaS-security partners that already own discovery and least-privilege conversations.
