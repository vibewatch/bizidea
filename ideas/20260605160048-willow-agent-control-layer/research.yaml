    impact: Distribution improves through identity partnerships, but product scope must include machine identity, delegated credentials, and lifecycle controls earlier.
    sourceRefs:
    - 22
    - 24
    - 25
  - case: Runtime incidents remain common even after pre-launch approvals
    impact: Customers will expect runtime monitoring and enforcement add-ons, not just inventory and approval packets.
    sourceRefs:
    - 17
    - 18
    - 19
    - 26
  validationPlan:
  - priority: high
    question: Will CISOs buy a standalone cross-platform approval plane before they first try native controls?
    evidenceToGather: Five design-partner interviews across Microsoft-, Salesforce-, and Google-heavy enterprises plus current-state screenshots of approval workflows.
  - priority: high
    question: Which builders and SaaS connectors account for the majority of uncontrolled employee-built agents in the beachhead?
    evidenceToGather: Pilot discovery data from early customers and partner ecosystems, ranked by agent count and privileged actions.
  - priority: medium
    question: How complete can inventory be when agents reuse shared service accounts or generic OAuth apps?
    evidenceToGather: Field tests across Copilot Studio, Workspace, and custom MCP environments that compare declared agents versus discovered identities.
  - priority: medium
    question: What approval packet actually reduces review time without creating shadow bypass behavior?
    evidenceToGather: Usability studies with security reviewers and business operators comparing current ticket flows versus simulated control-plane approvals.
