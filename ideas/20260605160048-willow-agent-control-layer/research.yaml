competitors:
- name: Willow
  stage: seed
  wedge: Agent management and access layer for transparency and control over how AI agents connect to internal systems and what they are allowed to do.
  pricing: Not public
  strength: Pure-play narrative tightly aligned to the exact governance gap and already validated by a relevant design partner in Wix.
  weaknessVsUs: Early product and distribution maturity are unproven; the wedge still needs broader proof outside initial partners.
  sourceRefs:
  - 1
- name: Zenity
  stage: scale-up
  wedge: Enterprise AI security platform spanning observability, posture management, and threat protection for agents across platforms.
  pricing: Custom / not public
  strength: Strong enterprise security framing plus both pre-deployment posture and runtime controls.
  weaknessVsUs: Broader AI-security positioning can dilute focus on change-control approvals, business ownership, and cross-app rollout workflows.
  sourceRefs:
  - 20
- name: Noma Security
  stage: scale-up
  wedge: End-to-end AI and agent discovery, secure-by-design boundaries, and runtime protection across models, tools, and MCP servers.
  pricing: Custom / not public
  strength: Comprehensive AI-security platform story with strong funding signal and broad coverage.
  weaknessVsUs: Feels optimized for security breadth; the pitch is less specifically about approval packets, entitlement simulation, and workflow-native revocation for business-built agents.
  sourceRefs:
  - 21
- name: Astrix
  stage: scale-up
  wedge: AI-agent and non-human-identity discovery plus least-privilege deployment with short-lived credentials and audit trails.
  pricing: Custom / not public
  strength: Strong identity-first approach and explicit control-plane language around secure-by-design deployment.
  weaknessVsUs: Identity-centric value proposition may under-serve the cross-functional approval and ownership UX that security and business teams need together.
  sourceRefs:
  - 22
- name: Microsoft native stack
  stage: incumbent
  wedge: Copilot Studio governance, Power Platform data policies, and Microsoft-wide agent governance guidance inside the Microsoft ecosystem.
  pricing: Bundled / platform-led
  strength: Default distribution, rich telemetry, and credible native controls for Microsoft-created agents.
  weaknessVsUs: Does not win by default in mixed-stack environments spanning Google, Salesforce, GitHub, Jira, and third-party or custom agents.
  sourceRefs:
  - 2
  - 3
  - 4
