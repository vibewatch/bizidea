assumptions:
  - id: A1
    name: ARPU (annual subscription per production customer)
    value: "50.0"
    unit: K USD per year
    source: "BP pricing: $45K–$60K ACV range; model uses midpoint $50K"
  - id: A2
    name: Pilot fee (one-time design-partner engagement)
    value: "20.0"
    unit: K USD
    source: "BP investorMemo.firstCustomer: $15K–$25K paid pilot; model uses midpoint $20K"
  - id: A3
    name: Target gross margin
    value: "70"
    unit: percent
    source: "BP businessModel.targetGrossMarginPct: 70"
  - id: A4
    name: COGS as percent of revenue
    value: "30"
    unit: percent
    source: "Derived from A3; COGS includes cloud infrastructure, data-processing, and customer-success labor allocated to delivery; improves to 27–28% in Y3 per A17"
  - id: A5
    name: Pilot fee revenue recognition period
    value: "3"
    unit: months
    source: "Industry heuristic: design-partner engagements billed ratably over pilot duration; 3-month pilot is standard for enterprise SaaS proof-of-value"
  - id: A6
    name: Pilot-to-production conversion rate
    value: "60"
    unit: percent
    source: "BP funnelTargets: 50%+ pilot-to-production; model uses 60% as mid-point for base-case credibility"
  - id: A7
    name: Time from pilot start to production contract
    value: "5"
    unit: months
    source: "BP funnelTargets: pilot kickoff to production decision within 120 days (~4 months); model uses 5 months conservatively"
  - id: A8
    name: All-in cost per FTE
    value: "18.0"
    unit: K USD per month
    source: "Industry heuristic: $216K/year all-in (base salary, payroll taxes, benefits) for enterprise SaaS startup; excludes equity; consistent with market rates for seniority bands in BP.team"
  - id: A9
    name: Seed raise amount and timing
    value: "4.0"
    unit: M USD
    source: "BP fundingAsk.targetFundingRangeUsd: $3–5M; model uses midpoint $4.0M closing at Month 1"
  - id: A10
    name: Series A raise amount and timing
    value: "8.0"
    unit: M USD
    source: "Heuristic: milestone-driven raise at end of Q3Y2 after 18+ customers and ~$850K ARR run-rate; $8M calibrated to fund 18-month growth plan to Series B; reflected as cash inflow in Q3Y2 cashEopK"
  - id: A11
    name: Monthly churn rate
    value: "1.5"
    unit: percent per month
    source: "Industry heuristic: early-stage enterprise SaaS with 12-month annual contracts; ~85% annual renewal = 15% gross annual churn = ~1.35%/month; model rounds to 1.5%"
  - id: A12
    name: Blended CAC (fully-loaded sales and marketing cost per new production customer)
    value: "35.0"
    unit: K USD
    source: "Derived from Y2 model: S&M spend ~$788K / 22 new customers = $35.8K; consistent with 12-month payback heuristic for enterprise SaaS at $50K ACV"
  - id: A13
    name: Y1 headcount ramp
    value: "CEO+FoundEng M1, ProductSec M2, IntegEng M3, GTM Lead M9"
    unit: roles and months
    source: "BP team section; direct mapping of stated hire timing"
  - id: A14
    name: Y2 headcount additions ending at 11 FTE
    value: "+2 Q1Y2 (AE+SE), +2 Q2Y2 (Eng), +1 Q3Y2 (CS), +1 Q4Y2 (Eng)"
    unit: FTE additions by quarter
    source: "Heuristic: scaling from 5 to 11 FTE supports 26 production customers and two partner channels by end Y2; consistent with BP 12–24 month milestones"
  - id: A15
    name: Y3 headcount additions reaching 18 FTE
    value: "+2 Q1Y3, +2 Q2Y3, +2 Q3Y3, +1 Q4Y3"
    unit: FTE additions by quarter
    source: "Heuristic: GTM and engineering scaling to support 110 customers; revenue/FTE ~$220K by Y3 is within $200–400K SaaS benchmark"
  - id: A16
    name: Non-payroll monthly overhead Y1
    value: "13 to 22"
    unit: K USD per month
    source: "Heuristic: legal $4–5K, cloud tools $3–5K, travel/marketing $2–5K, misc $3–5K; grows from $13K (M1) to $22K (M9+) as GTM activities increase"
  - id: A17
    name: Y3 gross margin improvement
    value: "72 to 73"
    unit: percent
    source: "Heuristic: infrastructure unit economics improve ~2–3 percentage points per year of SaaS operation via deployment automation; moves from 70% (Y1–Y2) to 72% (Q1–Q2 Y3) and 73% (Q3–Q4 Y3)"
  - id: A18
    name: Y1 pilot count
    value: "5"
    unit: pilots
    source: "BP milestone 0–12 months: sign 3–5 paid pilots; model uses 5 (upper range) signed in M4, M6, M7, M10, M11"
  - id: A19
    name: Y1 production customers EOP
    value: "4"
    unit: customers
    source: "BP milestone 0–12 months: convert at least 2 pilots into annual production contracts; model uses 4 (pilots 1–3 convert M9–M11, plus one accelerated conversion M12)"
  - id: A20
    name: Y3 production customers EOP
    value: "110"
    unit: customers
    source: "BP milestone 24–36 months: roughly 120 production customers; model uses 110 (8% below target) as conservative base case"
  - id: A21
    name: Model start month
    value: "2026-07"
    unit: "YYYY-MM"
    source: "One month after business-plan date 2026-06-05; allows seed closing and team assembly"
  - id: A22
    name: Revenue composition
    value: "subscription + pilot fees"
    unit: description
    source: "Revenue = production-customer subscriptions (customersEop × $4.167K/month) plus pilot fees ($20K/pilot recognized ratably over 3 months per A5); ARPU in unitEconomics reflects annual subscription only"

