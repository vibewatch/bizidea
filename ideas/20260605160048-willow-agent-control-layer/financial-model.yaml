scenarios:
  downside:
    description: >-
      Platform-native controls accelerate; ARPU compresses to $38K; monthly
      churn rises to 2.5%; pilot conversion drops to 35%; Y3 customers fall
      to roughly 65.
    y3RevenueK: 2100.0
    y3EbitdaK: -1900.0
    cashLowPointK: 900.0
    keyAssumptionChanges:
      - "ARPU drops from $50K to $38K due to platform-native price pressure"
      - "Monthly churn rises from 1.5% to 2.5%"
      - "Pilot-to-production conversion falls from 60% to 35%"
  base:
    description: >-
      Base case as modeled: $50K ARPU, 60% pilot conversion, 1.5% monthly
      churn, 110 production customers EOP Y3, Series A of $8M closes Q3Y2.
    y3RevenueK: 3306.0
    y3EbitdaK: -1230.6
    cashLowPointK: 1875.8
    keyAssumptionChanges:
      - "All assumptions as modeled per A1–A22"
  upside:
    description: >-
      Partner channels accelerate; ARPU expands to $62K via runtime add-ons;
      monthly churn falls to 0.8%; 145 production customers EOP Y3.
    y3RevenueK: 5000.0
    y3EbitdaK: -600.0
    cashLowPointK: 2200.0
    keyAssumptionChanges:
      - "ARPU expands from $50K to $62K via drift-monitoring and lifecycle add-ons"
      - "Partner channels source 40% of pipeline by Q3Y2"
      - "Monthly churn falls to 0.8% (130% net revenue retention)"

sensitivity:
  - variable: ARPU
    downsideCase: "$35K — platform-native governance compresses blended ACV by 30%"
    baseCase: "$50K — midpoint of BP $45K–$60K ACV range (A1)"
    upsideCase: "$65K — runtime drift and lifecycle add-on modules raise ACV by 30%"
    y3RevenueImpactK: -990.0
    cashImpactK: -990.0
  - variable: churn
    downsideCase: "2.5% monthly — product-market fit gaps reduce net revenue retention below 100%"
    baseCase: "1.5% monthly — enterprise annual contracts at 85% renewal rate (A11)"
    upsideCase: "0.5% monthly — strong NPS and expansion drive 120%+ net revenue retention"
    y3RevenueImpactK: -500.0
    cashImpactK: -500.0
  - variable: "sales cycle"
    downsideCase: "35% pilot conversion — buyers default to platform-native controls after pilot"
    baseCase: "60% pilot conversion — BP target 50%+ used as mid-point (A6)"
    upsideCase: "80% pilot conversion — strong early champions and low discovery friction"
    y3RevenueImpactK: -1000.0
    cashImpactK: -1000.0
  - variable: "gross margin"
    downsideCase: "60% — services-heavy onboarding for complex multi-vendor inventories raises COGS"
    baseCase: "70% — BP target gross margin with productized SaaS delivery (A3)"
    upsideCase: "75% — infrastructure automation and self-serve onboarding compress COGS"
    y3RevenueImpactK: 0.0
    cashImpactK: -331.0
  - variable: CAC
    downsideCase: "$50K — long enterprise procurement cycles and two-stage security review"
    baseCase: "$35K — founder-led sales converting to AE motion with partner assist (A12)"
    upsideCase: "$20K — partner-sourced leads skip initial discovery; faster trust transfer"
    y3RevenueImpactK: -300.0
    cashImpactK: -300.0
  - variable: "hiring pace"
    downsideCase: "2 quarters behind plan — technical sourcing bottleneck delays product and GTM"
    baseCase: "On plan per model headcount schedule (A14, A15)"
    upsideCase: "1 quarter ahead on GTM — employer brand enables faster AE and SE hiring"
    y3RevenueImpactK: -490.0
    cashImpactK: -130.0

modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> Production
      Production --> ARR
      ARR --> GrossProfit
      GrossProfit --> EBITDA
      EBITDA --> Cash
      Partners --> Pilots
      Churn --> Production

modelSanity:
  - checkName: "Revenue engine"
    finding: >-
      Annual subscriptions at $50K ARPU scale through a 60% pilot-to-production
      conversion funnel, compounding from 4 customers in Y1 to 110 by end Y3
      as AE and partner channels augment founder-led sales from Q1Y2 onward.
  - checkName: "Must go right"
    finding: >-
      The first 3–5 paid pilots must sign by Month 8 and convert at 50%+ to
      sustain the Series A milestone of 18+ customers by Q3Y2; a single
      quarter of stalled pilot signings delays every subsequent funding and
      headcount milestone.
  - checkName: "Model breaks if"
    finding: >-
      Microsoft, Google, or Salesforce ships credible cross-vendor agent
      governance within 18 months, compressing ARPU below $35K and reducing
      Y3 revenue by ~$990K per the ARPU sensitivity row, which makes the
      Series A milestone unreachable on the current cost structure.
  - checkName: "Next-round proof"
    finding: >-
      Series A at Q3Y2 requires 18 production customers and an ARR run-rate
      above $850K demonstrated across both direct and at least one partner
      channel, consistent with the base-case cash low-point of $1,875.8K and
      the Y3 burn multiple of 0.29x.

sanityChecks:
  ruleOf40: "Y3 revenue growth 326% + EBITDA margin −37% = 289%; strong early-stage growth dominates; benchmark normalizes post-Series B"
  burnMultiple: "Y2 1.41x ($1,553K burn / $1,100K net new ARR); Y3 0.29x ($1,231K / $4,200K net new ARR) — rapidly improving as revenue scale absorbs largely-fixed headcount"
  revenuePerFte: "$220K Y3 average (15 avg FTE; $3,306K revenue; benchmark $200–400K enterprise SaaS)"
  flags:
    - "Series A close in Q3Y2 is load-bearing: the $8M raise is reflected as a $9,875.8K cash jump in that quarter; without it the company exhausts seed before reaching Q2Y3"
    - "Pilot-to-production conversion assumed at 60%; if it falls below 40% for two consecutive quarters the Series A milestone is missed and the model requires a bridge or immediate burn reduction"
    - "Discovery completeness is unproven — BP operating assumption requires 80%+ agents discoverable; incomplete inventory reduces pilot confidence and threatens the $50K ACV anchor"
    - "Platform-native governance risk is rated high-likelihood and high-impact in the BP risk register; ARPU compression from $50K to $35K reduces Y3 revenue by ~$990K per sensitivity analysis"
