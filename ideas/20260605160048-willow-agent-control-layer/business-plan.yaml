slug: employee-agent-change-control
date: "2026-06-05"
executiveSummary: >-
  Employee Agent Change Control should start as a cross-platform approval plane
  for business-built agents inside 1,000-5,000 employee digital-product and
  services companies, not as another generic AI security dashboard, agent
  runtime, or single-vendor admin add-on. The first customer is a roughly
  2,000-person services or software-heavy operator where support, revops, and
  internal IT teams already connect Copilot Studio, Agentforce, or Gemini-style
  agents into Salesforce, Zendesk, Jira, GitHub, and Google Workspace without a
  central review path. The buying trigger is an incident, audit finding, or
  enterprise rollout decision that forces the CISO or CIO to prove which
  employee-built agents can act in core systems and who owns them. Research
  supports a sizable market at an estimated $2.5B TAM, $360.0M SAM, and $6.0M
  modeled year-3 SOM if the company stays focused on mixed-stack enterprises
  rather than chasing single-platform deployments. The MVP should begin with
  agent inventory, entitlement simulation, owner assignment, approval packets,
  and a fast kill switch across the few builders and SaaS systems that dominate
  early deployments. The company can win if it becomes the workflow-native
  system of record for approved agent reach across Microsoft-, Google-, and
  Salesforce-heavy estates that native controls do not unify. The main risk is
  that platform, identity, and AI-security incumbents ship good-enough
  governance faster than the startup builds distribution. A second major gap is
  that direct standalone pricing evidence and discovery completeness behind
  shared service accounts are still unproven, so the first 12 months must test
  whether buyers will pay for a neutral approval overlay and whether inventory
  can be complete enough to earn trust.
problem:
  - "Security and enterprise AI platform teams cannot see, approve, and revoke employee-built agents consistently once business teams connect them into Salesforce, Jira, GitHub, Google Workspace, Zendesk, and similar core SaaS systems."
  - "Existing IAM, SaaS-admin, DLP, and AI-observability tools govern humans, apps, or runtime behavior in isolation, but they do not provide one cross-platform approval workflow with a named owner, scoped entitlements, and immediate revocation before go-live."
solution:
  - "Build a control plane that inventories every internal agent, maps creator and owner, simulates reachable systems and risky actions, and generates an approval packet before high-privilege connections go live."
  - "Start with read-mostly approval, time-bound access, and one-click revocation across the most common builders and SaaS systems, then add runtime drift and enforcement only after approval workflow adoption is proven."
whyWeWin:
  - "The product solves a mixed-stack problem that Microsoft, Google, and Salesforce address only inside their own ecosystems."
  - "Approval packets, owner assignment, and fast revocation map directly to the buyer's blocked-rollout problem more tightly than broad AI-security posture or observability products do."
  - "A growing graph of agents, scopes, owners, downstream actions, and drift events can compound into a differentiated risk and policy dataset across customers."
strategicChoices:
  beachhead: >-
    English-first digital-product companies and BPO-style service operators with
    1,000-5,000 employees, decentralized support or revops automation teams, and
    active use of Copilot Studio, Agentforce, Gemini, or similar builders across
    Salesforce, Zendesk, Jira, GitHub, and Google Workspace.
  wedgeRationale: >-
    This wedge creates faster proof than broad enterprise AI governance because
    the same teams already have incidents, shadow-agent discovery, or blocked
    rollout reviews tied to agents that can take action in business SaaS. One
    approval plane, one owner record, and one kill switch answer a single urgent
    question that releases budget: which employee-built agents are allowed to go
    live right now?
  sequencingRationale: >-
    Product, GTM, hiring, and partnerships should start with inventory,
    entitlement simulation, approval workflow, and revocation because that is
    the lowest-friction path into security-led pilots and keeps the company out
    of a premature runtime-security arms race. Once the startup proves that
    mixed-stack buyers will pay for approval first, it can add drift monitoring,
    runtime enforcement, and third-party agent onboarding without becoming a
    services-heavy integration shop.
  notYet:
    - "Single-vendor Microsoft-only, Google-only, or Salesforce-only deployments where native controls may be sufficient"
    - "Customer-facing external agents"
    - "Full runtime security and SOC-style response before approval workflow adoption is proven"
    - "Long-tail SMB accounts with low agent counts and weak centralized ownership"
market:
  tam: "$2.5B estimated TAM based on roughly 50,000 qualifying firms globally at about $50k blended annual spend for cross-platform agent governance."
  sam: "$360.0M estimated SAM based on roughly 8,000 reachable English-first digital-product and services firms actively operationalizing decentralized agents at about $45k ACV."
  som: "$6.0M modeled year-3 SOM based on roughly 120 customers at about $50k ACV through focused direct sales plus identity and SaaS-security partner channels."
  segments:
    - "Primary: security and enterprise AI platform teams at 1,000-5,000 employee digital-product and services firms running business-led agents across mixed SaaS estates"
    - "Secondary: department operations leaders in support, revops, and internal IT who need fast approvals and clearer ownership for the same agents"
  buyingProcess: >-
    The operational champion is usually the head of enterprise AI platform,
    security architecture lead, or AI governance owner, while the economic buyer
    is typically the CISO, CIO, or Head of Enterprise AI Platform because the
    spend sits between security risk and deployment velocity. The most credible
    motion is a paid pilot tied to one incident, audit finding, or uncontrolled
    builder rollout and converts once the buyer sees a single inventory, faster
    approvals, and a credible kill switch across multiple systems.
product:
  mvp: >-
    The MVP should support the narrowest common builder and system bundle across
    early customers: Copilot Studio, Agentforce, and one Google or custom-agent
    path, plus Salesforce, Zendesk, Jira, GitHub, and Google Workspace. It
    should discover agents and owners, simulate scopes and risky write actions,
    produce approval packets, and let security revoke or time-limit access
    without promising full runtime enforcement on day one.
  sixMonth: >-
    Ship 2-3 paid design-partner pilots with agent registry, owner assignment,
    entitlement simulation, approval packets, time-bound approvals, and one-click
    kill switch on the initial connector set.
  twelveMonth: >-
    Convert at least 2 pilots into annual production deployments, add policy
    templates for support, revops, and internal IT workflows, integrate more
    deeply with identity signals, and launch drift alerts when live behavior or
    ownership diverges from the approved state.
  twentyFourMonth: >-
    Expand from approval and revocation into a broader machine-identity control
    plane with runtime enforcement, third-party agent onboarding, and agent
    lifecycle management across more departments and mixed vendor stacks.
  keyBets:
    - "Mixed-stack enterprises will pay for a neutral approval layer before they standardize on one platform vendor's governance pane."
    - "The first builder and SaaS bundle covers most risky business-led deployments in the beachhead."
    - "Fast approvals and pre-approved templates can reduce shadow bypass behavior rather than increase it."
    - "Approval and drift data across customers will create a stronger moat than simple discovery or logging alone."
gtm:
  wedge: >-
    Sell a paid design-partner pilot that inventories one business unit's
    employee-built agents, simulates their reachable actions across core SaaS,
    and gives the buyer a named-owner approval path plus kill switch before a
    broader rollout proceeds.
  channels:
    - "Founder-led direct sales to CISOs, CIOs, and enterprise AI platform leaders after incidents, audit findings, or unmanaged builder rollouts"
    - "Design-partner pilots sourced through identity, NHI, and SaaS-security partners already selling discovery and least-privilege conversations"
    - "AI-governance consultancies and transformation programs that need an operational approval layer inside regulated or high-change accounts"
  funnelTargets: "Target account→qualified discovery 15-25%, qualified discovery→paid pilot 20-30%, pilot→production 50%+, and pilot kickoff→production decision within 120 days."
  pricing: >-
    Start with a paid pilot and convert to an annual subscription priced by
    connected systems and governed agent identities, because buyers are paying
    to reduce approval delay and incident exposure across a live workflow estate
    rather than to buy seats. Direct standalone pricing evidence is still thin,
    so the first design partners should test whether the product can support an
    assumed $15k-$25k pilot and convert to roughly $45k-$60k annual value for
    the first production deployment, in line with the research model's blended
    ACV.
businessModel:
  revenueStreams:
    - "Annual platform subscription for inventory, approval workflow, owner assignment, and revocation controls"
    - "Tiered fees tied to governed agent identities, connected systems, or approval volume"
    - "Premium modules for runtime drift monitoring, enforcement, and incident-response workflows"
    - "Limited professional services for initial policy setup and connector onboarding"
  unitOfValue: "Governed agent identities and connected systems under active approval control"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one business unit to support, revops, internal IT, and additional departments inside the same account"
    - "Add runtime drift, enforcement, and lifecycle modules after the approval system of record is established"
    - "Increase wallet share through identity, NHI, and SaaS-security partner distribution in mixed-stack enterprises"
strategyMap:
  northStarMetric: "Percentage of active employee-built agents in covered workflows that have a named owner, approved scope, and revocable access in the control plane"
  inputMetrics:
    - "Paid pilot to production conversion rate"
    - "Median time to approve or reject a new high-privilege agent"
    - "Percentage of discovered agents with complete owner and scope records"
    - "Mean time to revoke or disable a risky agent after an incident signal"
    - "Number of governed agent identities and connected systems per production customer"
  moatsToBuild:
    - "Cross-platform graph linking agent builders, owners, credentials, downstream tools, and approved actions"
    - "Dataset of approved, rejected, revoked, and drifted agent workflows by department and risk pattern"
    - "Reusable policy templates for business-led agent rollouts across mixed Microsoft, Google, Salesforce, and SaaS estates"
  killCriteria:
    - "Fewer than 3 paid pilots after 30 qualified beachhead account conversations"
    - "Pilot-to-production conversion below 50% across the first 6 pilots"
    - "Less than 80% discovery completeness for the first 10 pilot environments after combining builder, admin-log, and identity evidence"
    - "More than 60% of qualified prospects choose native platform controls over a neutral approval layer after a live demo"
  mermaid: |
    flowchart LR
      Wedge[Mixed-stack agent approval wedge] --> MVP[Inventory plus approval packet MVP]
      MVP --> Proof[Named owners, faster approvals, and rapid revocation]
      Proof --> Expansion[Drift monitoring and broader control plane]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Strong wedge and buyer timing, but conviction depends on proving discovery completeness and standalone budget before native platform controls catch up."
    whyBelieve: "The company attacks a concrete mixed-stack rollout blocker with a coherent first customer, trigger, and product scope that incumbents do not naturally unify across vendor boundaries."
    whyDoubt: "Competition is intense, pricing evidence is still thin, and the product fails if inventory remains incomplete or buyers decide platform-native controls are good enough."
    nextDiligence: "Verify with 3-5 paid pilots that buyers fund a neutral approval layer, discover enough shadow agents to matter, and convert to annual contracts within the modeled ACV range."
  firstCustomer:
    title: "Head of Enterprise AI Platform or security architecture lead at a 2,000-person digital-services company"
    profile: "A mixed-stack operator where support, revops, and internal IT teams already deploy self-serve agents into Salesforce, Zendesk, Jira, GitHub, and Google Workspace without a centralized review workflow."
    trigger: "An agent incident, audit finding, or large rollout decision forces leadership to document which employee-built agents can take action in core systems and who owns them."
    buyer: "CISO, CIO, or Head of Enterprise AI Platform"
    initialContract: "Assumption: an $15k-$25k paid pilot covering one business unit and the first connector bundle, converting to roughly $45k-$60k annual subscription value for the first production deployment if approvals centralize across multiple departments."
  mustBeTrue:
    - "Mixed-stack enterprises must view cross-platform agent approval as a funded problem rather than a temporary extension of manual review."
    - "The initial builder and SaaS connector bundle must cover most risky business-led agent deployments in the beachhead."
    - "Discovery must be complete enough to expose shadow agents and support owner assignment without large manual cleanup projects."
    - "Buyers must adopt approval workflow and kill switch controls before demanding full runtime enforcement in the first contract."
    - "The first production deployment must support roughly $45k+ annual value while keeping onboarding productizable."
  diligenceQuestions:
    - "How often does a mixed-stack customer actually cross a vendor boundary where native controls stop being sufficient?"
    - "What percentage of risky agents in early pilots can the product discover when service accounts and generic OAuth apps are involved?"
    - "Which specific approval artifact changes the buying decision: inventory, entitlement simulation, owner record, or kill switch?"
    - "Who owns the first budget in practice once the problem moves from incident response to scaled rollout: security, identity, or enterprise AI platform?"
    - "What pilot packaging and pricing produce the best conversion without turning onboarding into consulting?"
operatingAssumptions:
  - assumption: "Mixed-stack buyers will pay for a neutral approval plane before they standardize on native controls from Microsoft, Google, or Salesforce."
    basis: research.yaml
    validationTest: "Close at least 3 paid pilots across two different platform ecosystems and document whether the buyer evaluated native controls before selecting the startup."
    decisionImpact: "If false, the company should shift toward embedded or partner-led distribution instead of scaling a standalone direct-sales motion."
  - assumption: "Copilot Studio, Agentforce, and the first SaaS connector bundle cover at least 70% of risky business-led agents in the beachhead."
    basis: idea.yaml
    validationTest: "Collect builder and connector inventories from the first 8 qualified prospects and confirm that at least 70% of named risky agents fall inside the initial support matrix."
    decisionImpact: "If false, the roadmap broadens too quickly and the company should narrow ICP or delay GTM expansion."
  - assumption: "Discovery can reach at least 80% completeness in early pilots by combining builder APIs, admin logs, OAuth evidence, and identity signals."
    basis: research.yaml
    validationTest: "Audit the first 5 pilot environments and compare declared agents versus discovered agents to confirm at least 80% overlap within 30 days."
    decisionImpact: "If false, the product will not earn trust as a system of record and should reposition around scoped approval for supported builders only."
  - assumption: "Business teams will tolerate governance if low-risk agents can be approved in under 3 days and high-risk launches get clear escalation paths."
    basis: research.yaml
    validationTest: "Measure approval turnaround and bypass behavior in the first 3 pilots and require no material shadow-agent increase after workflow launch."
    decisionImpact: "If false, product design must prioritize more templates and automation before wider rollout."
  - assumption: "Founder-led sales can close the first 3-5 pilots before a dedicated enterprise seller is needed."
    basis: operator judgment
    validationTest: "Build a 30-account target list and secure at least 3 paid pilots or signed pilot LOIs within 9 months through founder-led outreach."
    decisionImpact: "If false, the wedge or buyer framing is weak and burn should stay low until positioning is corrected."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Interview 15 security, enterprise AI platform, and operations leaders about one recent uncontrolled-agent event or blocked rollout."
    hypothesis: "A named incident or rollout review creates a near-term purchase window for a cross-platform approval layer."
    successMetric: "At least 10 target accounts describe a live approval problem and at least 6 match the beachhead workflow and stack."
    owner: "Founder CEO"
  - horizon: "0–90 days"
    experiment: "Run a concierge inventory and approval-packet exercise for two design partners using exported builder, admin, and identity data."
    hypothesis: "A single inventory plus scope simulation will surface enough hidden reach or owner gaps to justify a paid pilot."
    successMetric: "At least 2 target accounts identify previously untracked agents or risky scopes and at least 1 signs a pilot or LOI."
    owner: "Founding eng"
  - horizon: "90–180 days"
    experiment: "Test the minimum connector bundle across 3 paid pilots."
    hypothesis: "The initial builder and SaaS bundle is sufficient to reach first value without custom integration sprawl."
    successMetric: "At least 2 pilots complete discovery, approval packet generation, and kill-switch setup within 30 days using only the initial support matrix."
    owner: "Product and eng lead"
  - horizon: "90–180 days"
    experiment: "Pilot pricing and packaging test"
    hypothesis: "A paid approval-led pilot converts better than free proofs of concept and still supports the modeled first-year ACV."
    successMetric: "At least 3 signed pilot scopes at target pricing and no worse than 50% pilot-to-production conversion across the first 6 pilots."
    owner: "Founder CEO"
  - horizon: "6–12 months"
    experiment: "Launch drift monitoring for the first production customers."
    hypothesis: "Customers that adopt approval workflow will also pay for post-launch drift visibility tied to the approved state."
    successMetric: "At least 2 production customers enable drift monitoring for 90 days and log actionable detections without major false-positive backlash."
    owner: "Product security lead"
  - horizon: "12–18 months"
    experiment: "Partner-sourced pipeline motion with one identity or SaaS-security partner."
    hypothesis: "Partners already in least-privilege and discovery conversations can source qualified pilots without lowering win rates."
    successMetric: "At least 25% of qualified pipeline comes from 2 active partners and partner-sourced pilots convert at least as well as direct pilots."
    owner: "GTM lead"
operations:
  - "Maintain a versioned connector and policy-template library for the first builder and SaaS systems that dominate beachhead deployments."
  - "Produce immutable approval records linking agent, owner, scopes, reviewer decision, and revocation history for every governed workflow."
  - "Standardize pilot onboarding around read-only discovery, identity evidence, and least-privilege recommendations before deeper enforcement."
  - "Run post-pilot reviews that compare approval time, discovery coverage, bypass behavior, and incident containment outcomes before expanding scope."
team:
  - role: "Founder CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, customer discovery, pricing, and the cross-functional trust narrative with CISO, CIO, and AI-platform buyers."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the agent graph, approval workflow, kill switch, and first connector bundle without outsourcing core product learning."
  - role: "Product security lead"
    startTiming: "Month 2"
    rationale: "Translate governance requirements into reusable policy templates, security-review artifacts, and drift-monitoring design."
  - role: "Integration engineer"
    startTiming: "Month 3"
    rationale: "Productize builder and SaaS integrations so onboarding stays inside a repeatable deployment window."
  - role: "GTM lead"
    startTiming: "Month 9"
    rationale: "Formalize pipeline generation and partner management only after the founder proves pilot conversion and buyer ownership."
milestones:
  - horizon: "0–12 months"
    items:
      - "Sign 3-5 paid pilots in the beachhead segment."
      - "Ship the initial builder and SaaS connector bundle with approval packets and one-click revocation."
      - "Complete first-value onboarding in under 30 days for at least 2 customers."
      - "Convert at least 2 pilots into annual production contracts."
  - horizon: "12–24 months"
    items:
      - "Launch drift monitoring and policy templates for support, revops, and internal IT workflows."
      - "Establish 2 partner channels that can source qualified mixed-stack opportunities."
      - "Expand within existing customers from one business unit to multiple governed departments."
      - "Package a procurement-ready security-review kit that shortens enterprise review cycles."
  - horizon: "24–36 months"
    items:
      - "Reach roughly 120 production customers or equivalent ARR consistent with the modeled SOM."
      - "Add runtime enforcement and broader agent lifecycle controls only if approval adoption and retention stay strong."
      - "Become the system of record for approved machine workers across more departments and third-party agent sources."
risks:
  - risk: "Platform-native governance catches up fast enough that mixed-stack buyers delay or avoid standalone spend."
    likelihood: High
    impact: High
    mitigation: "Differentiate on cross-platform depth, ownership workflow, and rapid revocation across Microsoft, Google, Salesforce, and third-party agent estates."
  - risk: "Discovery blind spots from service-account reuse or generic OAuth apps make the inventory feel incomplete."
    likelihood: High
    impact: High
    mitigation: "Start with builders and systems that expose richer telemetry, require identity integrations early, and qualify out accounts where attribution is too weak for proof."
  - risk: "Business teams see the product as a new approval bottleneck and route around it with shadow automation."
    likelihood: Medium
    impact: High
    mitigation: "Default low-risk templates, fast approval SLAs, and clear escalation paths so governance removes friction for safe launches."
  - risk: "Runtime abuse and prompt-injection concerns force customers to demand enforcement before the startup is ready."
    likelihood: Medium
    impact: Medium
    mitigation: "Sequence drift monitoring and revocation hooks early and treat full enforcement as a gated expansion path tied to repeated customer demand."
  - risk: "Pilot pricing or conversion is too weak to support software-like margins."
    likelihood: Medium
    impact: High
    mitigation: "Test paid pilots early, keep the integration bundle narrow, and avoid expanding GTM headcount until production ACV and onboarding time are repeatable."
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the control-plane core, ship the first builder and
    SaaS connector bundle, complete 3-5 paid pilots, convert early customers
    into annual contracts, add drift monitoring and security-review packaging,
    and prove that a neutral approval layer can win budget before incumbents
    close the gap.
