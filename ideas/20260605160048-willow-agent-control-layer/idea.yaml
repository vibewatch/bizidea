problem: >-
  Companies are letting employees and department leads deploy AI agents into
  support, sales, product, and internal IT workflows before security teams can
  see what those agents are allowed to do across core SaaS systems. Once an
  agent can read, write, or trigger actions in tools like Salesforce, Jira,
  GitHub, and Google Workspace, the real risk is no longer bad text output but
  silent privilege sprawl, broken approvals, and incidents no one can trace to a
  human owner. Existing IAM, SaaS admin, and DLP tooling govern human users or
  app-by-app integrations, so security teams end up reviewing agent access in
  tickets and spreadsheets while business teams keep shipping automations anyway.
targetUser:
  primary: "Security and enterprise AI platform teams at 1,000-5,000 employee digital-product and services companies rolling out self-serve AI agents across support, revenue operations, and internal IT."
  secondary: "Department operations leaders whose teams build or deploy agents connected to core SaaS systems."
  buyer: "CISO, CIO, or Head of Enterprise AI Platform."
startupThesis:
  nonObviousInsight: >-
    The new control gap is not model observability; it is machine-identity
    change management for employee-built agents that can quietly gain action
    privileges across many internal systems. As agent creation shifts from a
    central engineering team to workflow owners, the scarce capability becomes
    approving, scoping, and revoking agent entitlements at the workflow level
    before incidents happen.
  beachhead: >-
    1,000-5,000 employee digital-product and BPO-style service companies that
    let support, revenue-ops, and internal IT managers deploy self-serve AI
    agents connected to Salesforce, Zendesk, Jira, GitHub, and Google
    Workspace.
  wedge: >-
    An agent change-control layer that inventories every employee-built agent,
    simulates its reachable systems and actions, requires approval before high-
    privilege connections go live, and provides a one-click kill switch when a
    workflow drifts or misbehaves.
  whyNowCatalyst: >-
    Willow's financing and the cited rate of AI-agent incidents show enterprises
    already have agent-driven workflow risk, while agents connecting directly to
    internal systems make pre-deployment approval and rapid revocation newly
    urgent.
  ventureScalePath: >-
    Start with approval and kill-switch workflows for employee-built internal
    agents, then expand into runtime policy enforcement, third-party agent
    onboarding, vendor-risk reviews, agent identity lifecycle management, and a
    cross-enterprise system of record for every machine worker touching business
    software.
solution: >-
  The product plugs into major agent builders, identity providers, and SaaS
  admin APIs to create a live registry of every internal AI agent, who created
  it, which tools it can touch, and what actions it can take. Before a new agent
  goes live, the platform generates an approval packet that shows its connected
  systems, requested scopes, risky write actions, and required human owner. It
  can block unapproved agents, set time-bound access, and trigger a kill switch
  if an incident, policy violation, or ownership gap appears. Security teams get
  a workflow-native control plane instead of scattered OAuth logs and manual app
  reviews, while business teams keep the speed of self-serve agent deployment.
  Over time, the registry becomes the authoritative inventory and policy engine
  for every agent acting inside the enterprise.
goToMarketSeed:
  firstCustomer: >-
    A 2,000-person digital-services company where support and revops managers
    already use Microsoft Copilot Studio or similar agent builders to connect
    agents into Salesforce, Zendesk, Jira, and Google Workspace without a
    centralized review workflow.
  buyingTrigger: >-
    An AI-agent incident, audit finding, or broader rollout decision that forces
    the CISO or CIO to prove which employee-built agents can act in core
    business systems.
  currentAlternative: "SaaS admin consoles, manual OAuth reviews, SSO logs, ticket-based approvals, and generic DLP or CASB policies."
  switchingReason: >-
    The first customer switches because this wedge gives them one inventory,
    approval path, and kill switch for employee-built agents across many apps,
    which existing identity and SaaS-admin tools do not provide.
  pricingHypothesis: >-
    Annual subscription priced by connected systems and active governed agent
    identities, with premium incident-response and runtime-enforcement modules.
