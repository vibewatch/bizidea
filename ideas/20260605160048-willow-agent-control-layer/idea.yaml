topRisks:
  - name: "Incumbent bundling"
    description: "Identity, SaaS-management, or agent-platform vendors may ship partial approval and inventory features before the startup gets distribution."
    mitigation: "Win on cross-platform depth, workflow-specific policy templates, and faster incident revocation across mixed agent stacks rather than single-vendor environments."
  - name: "Discovery blind spots"
    description: "If many employee-built agents are created outside supported builders or hide behind generic service accounts, the inventory could feel incomplete."
    mitigation: "Start with the few builders and SaaS systems that account for most business-led deployments, then expand discovery through identity, OAuth, and admin-log integrations."
  - name: "Security friction backlash"
    description: "Business teams may resist a product that feels like a new approval bottleneck and route around it with shadow automation."
    mitigation: "Lead with fast approvals, clear ownership, and one-click templates that let safe agents launch quickly while escalating only high-risk scopes."
