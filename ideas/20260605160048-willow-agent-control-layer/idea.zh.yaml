problem: >-
  企业让员工和部门负责人将 AI 智能体接入客服、销售、产品和内部 IT 工作流，
  而安全团队根本看不清这些智能体在核心 SaaS 系统中被允许做什么。
  一旦智能体能够读写 Salesforce、Jira、GitHub、Google Workspace 等工具并触发操作，
  真正的风险就不再是错误的文本输出，而是无声蔓延的权限、失效的审批和无人能溯源到责任人的事故。
  现有的 IAM、SaaS 管理和 DLP 工具管的是人类用户或逐个应用的集成，
  安全团队只能在工单和电子表格里审查智能体权限，而业务团队依然照常推进自动化。
targetUser:
  primary: "拥有 1,000–5,000 名员工的数字产品和服务企业中，负责跨客服、营收运营和内部 IT 推行自助式 AI 智能体的安全与企业 AI 平台团队。"
  secondary: "构建或部署连接核心 SaaS 系统智能体的部门运营负责人。"
  buyer: "CISO、CIO 或企业 AI 平台负责人。"
startupThesis:
  nonObviousInsight: >-
    新的管控空白不是模型可观测性，而是员工自建智能体的机器身份变更管理——
    这些智能体能悄然在多个内部系统中积累操作权限。
    随着智能体创建从中央工程团队转向工作流负责人，
    稀缺能力变成了在事故发生之前在工作流层面审批、界定范围和撤销智能体权限。
  beachhead: >-
    拥有 1,000–5,000 名员工的数字产品公司和 BPO 型服务企业——
    这些企业允许客服、营收运营和内部 IT 经理自助部署连接
    Salesforce、Zendesk、Jira、GitHub 和 Google Workspace 的 AI 智能体。
  wedge: >-
    一个智能体变更管控层——盘点每个员工自建的智能体，
    模拟其可触达的系统和操作，要求高权限连接上线前完成审批，
    并在工作流偏离或出现异常时提供一键终止开关。
  whyNowCatalyst: >-
    Willow 的融资和所援引的 AI 智能体事故率表明，企业已经面临智能体驱动的工作流风险；
    而智能体直接连接内部系统，让部署前审批和快速撤权变得比以往更加紧迫。
  ventureScalePath: >-
    从员工自建内部智能体的审批和终止开关工作流起步，
    逐步扩展到运行时策略执行、第三方智能体接入、供应商风险评审、
    智能体身份生命周期管理，以及覆盖所有触达业务软件的机器工作者的跨企业系统记录。
solution: >-
  产品接入主流智能体构建平台、身份提供商和 SaaS 管理 API，
  为每个内部 AI 智能体建立实时注册表，记录创建者、可触达工具和可执行操作。
  新智能体上线前，平台生成审批包——展示其关联系统、申请的权限范围、高风险写入操作和必须指定的责任人。
  平台可拦截未经审批的智能体、设置有时限的访问权限，并在出现事故、策略违规或责任人空缺时触发终止开关。
  安全团队获得一个贴近工作流的管控平面，而非分散的 OAuth 日志和手动应用审查；
  业务团队则保留自助式智能体部署的速度。
  随着时间推移，注册表成为企业内每个智能体的权威清单和策略引擎。
