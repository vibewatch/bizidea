    迫使 CISO 或 CIO 证明哪些员工自建智能体可以在核心业务系统中执行操作。
  currentAlternative: "SaaS 管理控制台、手动 OAuth 审查、SSO 日志、工单审批流，以及通用 DLP 或 CASB 策略。"
  switchingReason: >-
    首批客户切换的原因是：这个切口为员工自建智能体提供了跨多个应用的统一清单、
    审批路径和终止开关——这是现有身份管理和 SaaS 管理工具无法提供的。
  pricingHypothesis: >-
    按关联系统和受治理的活跃智能体身份数计费的年度订阅，
    配以高级事故响应和运行时执行模块。
