topRisks:
  - name: "在位企业捆绑销售"
    description: "身份管理、SaaS 管理或智能体平台厂商可能在初创公司建立发行渠道之前就推出部分审批和清单功能。"
    mitigation: "以跨平台深度、工作流专属策略模板和在混合智能体栈（而非单一厂商环境）中更快的事故撤权来赢得竞争。"
  - name: "发现盲区"
    description: "如果大量员工自建智能体在已支持的构建平台之外创建，或藏匿于通用服务账号之后，清单可能显得不完整。"
    mitigation: "先从涵盖大多数业务主导部署的少数构建平台和 SaaS 系统起步，再通过身份、OAuth 和管理日志集成扩展发现能力。"
  - name: "安全审批阻力反弹"
    description: "业务团队可能将产品视为新的审批瓶颈，转而用影子自动化绕过治理。"
    mitigation: "以快速审批、清晰的责任归属和一键模板为主打——让安全智能体快速上线，只对高风险范围升级处理。"
