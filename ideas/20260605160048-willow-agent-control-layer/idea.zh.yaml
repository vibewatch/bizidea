jobsToBeDone:
  - job: "业务团队上线新内部 AI 智能体时，帮助安全团队证明它能读写哪些系统，这样我们就能在不拖慢每个自动化项目的情况下完成审批。"
    currentAlternative: "手动工单审查和逐应用 OAuth 核查。"
    successMetric: "审批或拒绝新内部智能体的时间从数周缩短至三天以内。"
  - job: "出现 AI 智能体事故或责任人空缺时，帮助 IT 立即撤销高风险智能体的访问权限，在损害扩散到核心 SaaS 工作流之前将其遏制。"
    currentAlternative: "翻遍管理控制台、SSO 日志和工作流文档，才能找到并禁用相关集成。"
    successMetric: "识别责任人并禁用高风险智能体的平均时间降至 15 分钟以内。"
