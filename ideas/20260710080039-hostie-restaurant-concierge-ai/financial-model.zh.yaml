scenarios:
  downside:
    description: 如果预订 / CRM 现有厂商的打包压力更大、合作伙伴转介绍又更慢，公司就会低于计划上线节奏，第二工作流附着率也起不来。
    y3RevenueK: 842.7
    y3EbitdaK: -764.0
    cashLowPointK: 488.7
    keyAssumptionChanges:
    - 到第 3 年 Q4，期末客户数 只能做到 18 而不是 24，因为试点转正式始终卡在 90-120 天，合作伙伴转介绍也不及预期。
    - 每个活跃集团的混合实现收入更接近基准的 $72K 年合同，扩容和 用量扩容 都很有限。
    - 毛利率期末只能到约 66%，而不是 70%，因为 QA、通信合规和定制分流依旧更吃人工。
  base:
    description: 基准情形沿着业务计划走：第 1 年签 2 个付费试点，到第 2 年 Q4 有 6 个活跃付费集团，到第 3 年 Q4 有 24 个，同时大约一半成熟账户会挂上第二工作流扩展。
    y3RevenueK: 1179.2
    y3EbitdaK: -502.6
    cashLowPointK: 758.6
    keyAssumptionChanges:
    - 活跃付费集团从 M12 的 2 个，爬到第 2 年 Q4 的 6 个，再到第 3 年 Q4 的 24 个；驱动力是创始人直销叠加合作伙伴转介绍。
    - 首份正式合同大致落在 $72K ARR，而到第 3 年后段，每个活跃集团的实现收入会随着 用量、实施导入 和第二工作流扩展抬到约 $7.4K/月。
    - 毛利率从第 1 年试点期偏多服务的 40% 中段，一路爬到第 3 年 Q4 接近商业模型目标的 70%。
  upside:
    description: 如果两家可引用标杆客户加合作伙伴转介绍一起把销售周期压缩，公司就能更早摸到第 3 年集团数区间上沿，也能更早挂上扩容收入。
    y3RevenueK: 1401.6
    y3EbitdaK: -318.9
    cashLowPointK: 869.7
    keyAssumptionChanges:
    - 第 3 年 Q4 的 期末客户数 能到 30 而不是 24，因为可引用性让需求沟通→试点和试点→集团上线的转化都更高。
    - 第二工作流更早落地，让第 3 年后段每个活跃集团的实现收入抬到约 $7.8K/月。
    - 如果标准的“通信 / 预订 / 活动”组合更少需要定制实施，期末毛利率可到约 72%。
sensitivity:
- variable: ARPU
  downsideCase: 正式年合同只能落在约 $60K，扩容附着也更慢。
  baseCase: 首份正式合同约为 $72K ARR，而到第 3 年后段，每个活跃集团实现收入抬到约 $7.4K/月。
  upsideCase: 用量 和第二工作流扩展让成熟集团更早逼近 $60K-$90K 区间上沿。
  y3RevenueImpactK: -170.0
  cashImpactK: -120.0
- variable: CAC
  downsideCase: 创始人时间和试点支持成本把早期标杆客户的 CAC 顶到约 $110K 以上。
  baseCase: 以第 2 年 Q4 的 6 个活跃付费集团为分母，早期标杆客户的 CAC 大约是 $95.5K。
  upsideCase: 可引用标杆客户和合作伙伴引荐把 CAC 拉到约 $85K 以下。
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
- variable: 流失率
  downsideCase: 如果私宴价值没有预想中那么粘，月流失率会往 3.0% 走。
  baseCase: 一旦工作流嵌进集团活动台和预订系统，月流失率维持在 2.0%。
  upsideCase: 响应速度看板和第二工作流扩展进一步加深粘性，月流失率可逼近 1.0%。
  y3RevenueImpactK: -95.0
  cashImpactK: -85.0
- variable: 销售周期
  downsideCase: 如果采购和集成审查持续偏慢，试点转正式会一直卡在 90-120 天。
  baseCase: 前 6 个集团大约 90 天完成转化，后续批次随着标准包跑通，逐步压向 60 天。
  upsideCase: 可引用性和标准合同让转化在第 3 年进一步压到 45-60 天。
  y3RevenueImpactK: -240.0
  cashImpactK: -180.0
- variable: 毛利率
  downsideCase: 如果 QA、通信注册和分流仍然更偏服务业，期末毛利率只到约 66%。
  baseCase: 到第 3 年 Q4，毛利率达到商业模型目标的 70%。
  upsideCase: 如果部署和升级 操作手册 更快标准化，期末毛利率可到约 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -95.0
- variable: 招聘节奏
  downsideCase: 在合作伙伴带来的需求被证明之前，第二名客户成功和后台支持岗位就被提前拉进来。
  baseCase: 团队到第 2 年 Q4 一直维持 7 个 FTE，只有在第 3 年上线量清晰可见时才加第 8 个 FTE。
  upsideCase: 如果实施 操作手册 和合作伙伴支持减轻了服务负担，第 8 个 FTE 可以拖到第 3 年后段再加。
  y3RevenueImpactK: 0.0
  cashImpactK: -110.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Outbound[Founder-led outbound + partner referrals] --> Pilots[Paid pilots]\n  Pilots --> Rollouts[Annual group rollouts]\n  Rollouts --> Expansion[Second workflow expansion]\n  Expansion --> Revenue[Revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash]"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎的核心，是把活跃付费集团从 M12 的 2 个拉到第 3 年 Q4 的 24 个，同时每个集团的实现收入随着扩容从试点价抬到年化略高于 $80K。
- checkName: 必须跑顺的地方
  finding: 公司必须把早期试点在大约一个季度内转成整集团上线，再把部署周期进一步压向 60 天，否则第 2 年 Q4 到第 3 年 Q4 这段客户爬坡会明显滑坡。
- checkName: 模型会失灵的情况
  finding: 如果付费意愿最终只落在年合同区间下沿，或者合作伙伴来源的商机一直起不来，CAC 就会维持在接近 20 个月回本，基准上线节奏也就无法自我供血。
- checkName: 下一轮融资证明
  finding: 下一轮融资的成立条件，是做到约 13 个活跃付费集团、2 个可引用标杆客户、25% 合格商机来自合作伙伴，并跑出首批第二工作流扩展，同时账上现金仍有几十万美元高位。
sanityChecks:
  ruleOf40: 第 3 年增长率 280.9% + EBITDA 利润率 -42.6% = 238.3%（主要因为第 2 年基数太小，这个指标只能当方向参考，不能拿成熟 SaaS 标准来读）。
  burnMultiple: 第 2 年 现金消耗倍数 约为 3.1x：约 $0.97M 的 EBITDA 现金消耗，对应约 $0.31M 的净新增 期末 ARR。对于共创客户年份还算能接受，但如果第 3 年合作伙伴转介绍和扩容没有把效率拉起来，这个水平不可持续。
  revenuePerFte: 第 3 年以期末 8 个 FTE 计算，单 FTE 收入约 $147K（低于垂直 SaaS 常见的约 $200–400K 基准，因为部署和 QA 仍明显偏服务化）。
  flags:
  - 活跃付费集团从第 2 年 Q4 的 6 个跳到第 3 年 Q4 的 24 个，这个跨越很激进，默认合作伙伴转介绍至少要贡献四分之一的合格商机。
  - LTV/CAC 只有约 2.5x，回本期约 20 个月；对于一个只有 $54.1M SAM 的窄市场来说，这个水位偏弱，除非可引用标杆客户出来后留存和扩容明显变好。
  - 直到第 3 年，单 FTE 收入仍低于典型 SaaS 基准，说明模型里还压着不小的实施和 QA 重量，而不是纯软件杠杆。
  - 公开的付费意愿证据很薄，所以从约 $15K 试点爬到约 $72K+ 年合同这条路径，还得靠两次真实采购周期来证明。
  - 模型把现金近似为 EBITDA，因此试点预付款、实施导入 开票节奏以及餐饮采购变慢，都可能让真实现金最低点明显偏离。
