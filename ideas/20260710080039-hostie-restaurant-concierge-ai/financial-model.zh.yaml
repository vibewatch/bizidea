slug: private-dining-lead-desk
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] 模型从带日期业务计划之后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情形取区间下限，因为招聘节奏保持克制，现金最低点仍能高于约 $0.75M。'
- id: A3
  name: 起始付费集团数（M1）
  value: '0'
  unit: 数量
  source: '[BP milestones 0-12 months] 公司从零收入起步，得先签下付费试点。'
- id: A4
  name: 客户定义
  value: 处于付费试点或年度正式合同中的一个活跃付费餐饮集团
  unit: 定义
  source: '[BP gtm.pricing + BP buyingProcess] 期末客户数 统计的是付费集团，不是单个食客或门店。'
- id: A5
  name: 每个正式合同集团平均覆盖门店数
  value: ~10
  unit: 门店/集团
  source: '[BP market.som + Research market.som] SOM 的测算默认每个正式合同集团约有 10 家门店。'
- id: A6
  name: 付费试点 单位经济模型
  value: 约 3 个月共 $15K（约 $5K/mo）
  unit: 美元/集团
  source: '[BP gtm.pricing $10k-$20k paid 60-90 day pilot] 模型取已给区间的中位数。'
- id: A7
  name: 首个正式合同 单位经济模型
  value: 首个集团上线时 ARR 为 $72K（约 $6K/mo）
  unit: 美元/集团/年
  source: '[BP gtm.pricing $60k-$90k annual group subscription + Research market.som $7.2k annual spend/location × ~10 locations] 首份正式合同落在年价区间中段，也和按门店测算的 SOM 逻辑一致。'
- id: A8
  name: 扩容与 用量扩容
  value: 到第 3 年后段，每个活跃集团的混合实现收入逐步抬到约 $7.4K/mo，来自 用量费、实施导入 和第二工作流扩展
  unit: 美元/集团/月
  source: '[BP businessModel.revenueStreams + BP milestones 24-36 months + BP businessModel.expansionLevers] 模型假设，一旦叠加预订异常和 VIP 分流，集团合同会温和扩容。'
- id: A9
  name: 客户爬坡
  value: M12 时有 2 个活跃付费集团，Q4Y2 时有 6 个，Q4Y3 时有 24 个
  unit: 期末客户数
  source: '[BP milestones 0-12, 12-24, and 24-36 months] 基准情形落在计划的第 3 年 20-30 个 生产环境集团 区间内，但仍要求第 3 年靠合作伙伴带动的快速爬坡。'
- id: A10
  name: 试点转正式周期
  value: 前 6 个集团约 90 天，到第 3 年随着标准包跑通，逐步压到约 60 天
  unit: 天
  source: '[BP product.sixMonth + BP operatingAssumptions on 45-day go-live + BP strategicChoices.sequencingRationale] 首批客户仍然偏重服务，跑熟之后部署才会更快。'
- id: A11
  name: 毛利率爬坡
  value: 第 1 年为 45%-50%，第 2 年为 56%-60%，第 3 年为 65%-70%
  unit: 毛利率百分比
  source: '[BP businessModel.targetGrossMarginPct 70 + Research regulatoryLandscape and technologyLandscape] 早期试点更偏服务业，等 QA、分流和集成 操作手册 标准化后，毛利率才会正常化。'
- id: A12
  name: 创始人总包成本
  value: $144.0K
  unit: 美元/年
  source: '[BP team Founder CEO + startup-finance heuristic] 创始人现金薪酬保持精简，并含工资税和福利。'
- id: A13
  name: 工程总包成本
  value: $168.0K
  unit: 美元/FTE/年
  source: '[BP team Founding eng + startup-finance heuristic] 假设配置 1 名资深全栈 / AI 集成工程师，薪酬按克制的 pre-seed 水位取值。'
- id: A14
  name: 餐饮工作流负责人总包成本
  value: $132.0K
  unit: 美元/年
  source: '[BP team Hospitality workflow lead + startup-finance heuristic] 反映了领域经验和 QA 负责人 的价值，但没有再加完整产品管理层。'
- id: A15
  name: 集成 / 解决方案总包成本
  value: $156.0K
  unit: 美元/FTE/年
  source: '[BP team Integration / solutions engineer + startup-finance heuristic] 覆盖通信、预订和活动系统集成 负责人 的成本。'
- id: A16
  name: 实施 / 客户成功总包成本
  value: $120.0K
  unit: 美元/FTE/年
  source: '[BP team Implementation and customer success lead + startup-finance heuristic] 假设这是偏技术型 CSM / 部署运营岗，而不是重型企业客户管理。'
- id: A17
  name: GTM / 合作伙伴总包成本
  value: $156.0K
  unit: 美元/FTE/年
  source: '[BP team GTM / partnerships lead + startup-finance heuristic] 含创始人辅助外呼和合作拓展所需的变量薪酬。'
- id: A18
  name: G&A / 运营总包成本
  value: $96.0K
  unit: 美元/年
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 只在首批可引用上线动作成型后，才加 1 名精简运营通才。'
- id: A19
  name: 招聘时间线
  value: M1 创始人/CEO、创始工程师和工作流负责人；M4 集成 / 解决方案；M7 实施 / 客户成功；M12 GTM / 合作伙伴；M20 G&A / 运营；M31 第二名实施 / 客户成功
  unit: 时间线
  source: '[BP team + BP sequencingRationale + startup-finance heuristic] 只有在试点跑通后才补客户侧扩张角色；考虑到 SAM 偏窄，其他招聘继续后置。'
- id: A20
  name: 工资在 P&L 中的分摊
  value: 创始人 50% S&M / 30% R&D / 20% G&A；工程 100% R&D；工作流负责人 75% R&D / 25% G&A；集成 25% S&M / 75% R&D；实施/CS 35% S&M / 45% R&D / 20% G&A；GTM 100% S&M；运营 100% G&A
  unit: 分摊
  source: '[BP team role rationales + BP operations] 这样的分摊能把创始人主导销售和部署工作真实露出来，不会误导成纯软件毛利模型。'
- id: A21
  name: 非工资 运营费用 爬坡
  value: 36 个月内，S&M 约为 $3K-$8K/mo，R&D 约为 $5K-$7K/mo，G&A 约为 $4K-$6K/mo
  unit: 美元/月
  source: '[BP operations + Research regulatoryLandscape + startup-finance heuristic] 覆盖云与模型用量、差旅、法务、通信注册、保险和轻量后台工具。'
- id: A22
  name: 现金转换约定
  value: EBITDA 近似等于现金变动
  unit: 公式
  source: '[startup-finance heuristic] 在 pre-seed 体量下，默认税、资本开支、债务服务和营运资金时差都不构成决定性影响。'
- id: A23
  name: 月度流失率
  value: 2.0%
  unit: 百分比/月
  source: '[startup-finance heuristic for early vertical SaaS + BP expansionLevers + Research competitiveLandscape] 工作流一旦嵌入会比较粘，但模型也没有假设接近零流失。'
- id: A24
  name: CAC 口径
  value: 以第 2 年 Q4 的活跃付费集团数为分母，Y1-Y2 的销售与市场费用折算为每组 $95.5K
  unit: USD/group
  source: '[模型测算：用 Y1-Y2 的 S&M 支出除以 Q4Y2 的 6 个活跃付费集团 + BP funnelTargets] 第一波标杆客户的 CAC 故意放保守，因为早期创始人时间和试点支持都很贵。'
- id: A25
  name: 下一轮融资里程碑
  value: 13 个活跃付费集团、2 个可引用标杆客户、25% 合格商机来自合作伙伴，以及第二工作流开始扩展，同时标准包上线时间已稳定压到 45 天以内
  unit: 里程碑
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + BP operatingAssumptions] 这就是 pre-seed 资金准备支撑到的、足够 具备种子轮条件 的证明包，并留了 6 个月 缓冲。'
- id: A26
  name: 季度工资口径
  value: Y2-Y3 的 薪资 行按季度内真实月度招聘节奏计算，而不是只看季末快照
  unit: 口径
  source: '[人员编制列口径 + BP team.startTiming] 这样薪资 K 才能和月度招聘爬坡保持一致。'
