scenarios:
  downside:
    description: Bundling pressure from reservation / CRM incumbents and slower partner referrals keep the company below the planned rollout pace and limit second-workflow attach.
    y3RevenueK: 842.7
    y3EbitdaK: -764.0
    cashLowPointK: 488.7
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 18 instead of 24 because pilot-to-production cycles stay closer to 90-120 days and partner referrals underdeliver.
    - Blended realized revenue per active group stays closer to the base $72K annual contract, with little expansion or usage uplift.
    - Gross margin exits near 66% instead of 70% because QA, telecom compliance, and custom routing remain more labor-intensive.
  base:
    description: Base case follows the business-plan path of two paid pilots in Y1, six active paying groups by Q4Y2, and twenty-four by Q4Y3 while second-workflow expansion attaches in about half of mature accounts.
    y3RevenueK: 1179.2
    y3EbitdaK: -502.6
    cashLowPointK: 758.6
    keyAssumptionChanges:
    - Active paying groups move from 2 at M12 to 6 at Q4Y2 and 24 at Q4Y3 as founder-led outbound adds a partner-assisted referral channel.
    - The first production contract lands near $72K ARR and late-Y3 realized revenue per active group rises toward roughly $7.4K per month with usage, onboarding, and second-workflow expansion.
    - Gross margin climbs from pilot-heavy mid-40s in Y1 to the 70% business-model target by Q4Y3 as deployments standardize.
  upside:
    description: Two reference logos and partner referrals compress sales cycles, allowing the company to reach the high end of the year-three group range sooner and attach expansion earlier.
    y3RevenueK: 1401.6
    y3EbitdaK: -318.9
    cashLowPointK: 869.7
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches 30 instead of 24 because referenceability improves discovery-to-pilot and pilot-to-rollout conversion.
    - Second-workflow expansion lands earlier, lifting late-Y3 realized revenue per active group toward roughly $7.8K per month.
    - Gross margin exits around 72% as the standard telephony / reservation / events bundle needs less bespoke implementation.
sensitivity:
- variable: ARPU
  downsideCase: Annual production contracts land near $60K and expansion attach is slower.
  baseCase: Initial production lands near $72K ARR and late-Y3 realized revenue per active group reaches roughly $7.4K per month.
  upsideCase: Usage and second-workflow expansion push mature groups toward the upper end of the $60K-$90K range earlier.
  y3RevenueImpactK: -170.0
  cashImpactK: -120.0
- variable: CAC
  downsideCase: Founder time and pilot support keep early-logo CAC above roughly $110K.
  baseCase: Early-logo CAC is about $95.5K using Y1-Y2 sales and marketing spend over six active paying groups by Q4Y2.
  upsideCase: Reference logos and partner intros pull CAC below roughly $85K.
  y3RevenueImpactK: 0.0
  cashImpactK: -130.0
- variable: churn
  downsideCase: Monthly churn rises toward 3.0% if private-dining value is less sticky than expected.
  baseCase: Monthly churn holds at 2.0% once the workflow is embedded in the group’s events desk and reservation stack.
  upsideCase: Monthly churn stays closer to 1.0% because response-speed dashboards and second-workflow expansion deepen stickiness.
  y3RevenueImpactK: -95.0
  cashImpactK: -85.0
- variable: sales cycle
  downsideCase: Pilot-to-production stays near 90-120 days because procurement and integration reviews stay slow.
  baseCase: The first six groups convert in roughly 90 days and later cohorts compress toward 60 days once the bundle is proven.
  upsideCase: Referenceability and standard contracts compress conversion toward 45-60 days by Y3.
  y3RevenueImpactK: -240.0
  cashImpactK: -180.0
- variable: gross margin
  downsideCase: Gross margin exits around 66% because QA, telecom registration, and routing remain more services-heavy.
  baseCase: Gross margin reaches the business-model target of 70% in Q4Y3.
  upsideCase: Gross margin exits around 72% as deployment and escalation playbooks standardize faster.
  y3RevenueImpactK: 0.0
  cashImpactK: -95.0
- variable: hiring pace
  downsideCase: A second customer-success hire and back-office support are pulled forward before partner-sourced demand is proven.
  baseCase: The team stays at seven FTE through Q4Y2 and adds the eighth FTE only once year-three rollout volume is visible.
  upsideCase: The eighth FTE is delayed until late Y3 because implementation playbooks and partner support reduce service load.
  y3RevenueImpactK: 0.0
  cashImpactK: -110.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Outbound[Founder-led outbound + partner referrals] --> Pilots[Paid pilots]
      Pilots --> Rollouts[Annual group rollouts]
      Rollouts --> Expansion[Second workflow expansion]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue is driven by growing from 2 active paying groups at M12 to 24 by Q4Y3 while realized revenue per group rises from pilot pricing to roughly the low-$80Ks annualized with expansion attach.
- checkName: Must go right
  finding: The company must convert early pilots into full-group rollouts within roughly one quarter and then compress deployment closer to sixty days, or the Q4Y2-to-Q4Y3 customer ramp will slip.
- checkName: Model breaks if
  finding: If willingness to pay tops out near the low end of the annual contract range or partner-sourced pipeline fails to appear, CAC stays near twenty-month payback and the base-case rollout pace no longer finances itself.
- checkName: Next-round proof
  finding: The next financing is justified by reaching roughly 13 active paying groups, 2 referenceable logos, 25% partner-sourced pipeline, and first second-workflow expansions with cash still around the high-hundreds of thousands.
sanityChecks:
  ruleOf40: Y3 growth 280.9% + EBITDA margin -42.6% = 238.3% (inflated by the very small Y2 base, so treat it as directional rather than mature-SaaS quality).
  burnMultiple: Y2 burn multiple is about 3.1x using roughly $0.97M of EBITDA burn against about $0.31M of net new exit ARR; acceptable for a design-partner year but too high to sustain unless partner referrals and expansion improve efficiency in Y3.
  revenuePerFte: $147K Y3 on 8 ending FTE (below the roughly $200–400K vertical SaaS benchmark because deployment and QA remain services-heavy).
  flags:
  - The jump from 6 active paying groups at Q4Y2 to 24 at Q4Y3 is ambitious and assumes partner referrals really deliver at least one quarter of qualified pipeline.
  - LTV/CAC is only about 2.5x with roughly 20 months of payback, which is weak for a narrow $54.1M SAM unless retention and expansion improve after the first reference logos.
  - Revenue per FTE stays below typical SaaS benchmarks through Y3, implying the model still carries meaningful implementation and QA weight rather than pure software leverage.
  - Public willingness-to-pay evidence is thin, so the assumed path from ~$15K pilots to ~$72K+ annual contracts still needs two real procurement cycles to prove out.
  - Cash is modeled as EBITDA, so pilot prepayments, onboarding invoice timing, and slower restaurant procurement could move the real cash low point materially.
