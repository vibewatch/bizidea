slug: private-dining-lead-desk
date: '2026-07-10'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-10] the model begins in the first full month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $3.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $3-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the stated range because hiring stays disciplined and the cash low point still remains above roughly $0.75M.'
- id: A3
  name: Starting paying groups (M1)
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] the company starts pre-revenue and must first close paid pilots.'
- id: A4
  name: Customer definition
  value: One active paying restaurant group in a paid pilot or annual production contract
  unit: definition
  source: '[BP gtm.pricing + BP buyingProcess] customersEop counts paying groups, not individual diners or locations.'
- id: A5
  name: Average covered locations per production group
  value: ~10
  unit: locations/group
  source: '[BP market.som + Research market.som] the SOM math assumes roughly 10 locations per production group.'
- id: A6
  name: Paid pilot economics
  value: $15K over roughly 3 months (~$5K/mo)
  unit: USD/group
  source: '[BP gtm.pricing $10k-$20k paid 60-90 day pilot] the model uses the midpoint of the stated pilot range.'
- id: A7
  name: Initial production contract economics
  value: $72K ARR (~$6K/mo) at first group rollout
  unit: USD/group/year
  source: '[BP gtm.pricing $60k-$90k annual group subscription + Research market.som $7.2k annual spend/location × ~10 locations] the initial production contract sits near the middle of the stated annual range and matches the location-based SOM math.'
- id: A8
  name: Expansion and usage uplift
  value: Late-Y3 blended realized revenue per active group rises toward ~$7.4K/mo as usage fees, onboarding, and second-workflow expansion attach
  unit: USD/group/month
  source: '[BP businessModel.revenueStreams + BP milestones 24-36 months + BP businessModel.expansionLevers] the model assumes the group contract expands modestly once reservation exceptions and VIP routing attach.'
- id: A9
  name: Customer ramp
  value: 2 active paying groups by M12, 6 by Q4Y2, and 24 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months] the base case stays inside the plan’s 20-30 year-3 production-group range while still requiring a steep Y3 partner-assisted ramp.'
- id: A10
  name: Pilot-to-production cycle
  value: ~90 days for the first six groups, compressing toward ~60 days by Y3 as the standard bundle is proven
  unit: days
  source: '[BP product.sixMonth + BP operatingAssumptions on 45-day go-live + BP strategicChoices.sequencingRationale] the first cohort is still service-heavy, then deployment gets faster with repetition.'
- id: A11
  name: Gross margin ramp
  value: 45%-50% in Y1, 56%-60% in Y2, and 65%-70% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + Research regulatoryLandscape and technologyLandscape] early pilots are services-heavy before QA, routing, and integration playbooks normalize.'
- id: A12
  name: Founder loaded compensation
  value: $144.0K
  unit: USD/year
  source: '[BP team Founder CEO + startup-finance heuristic] lean founder cash compensation with payroll taxes and benefits.'
- id: A13
  name: Engineering loaded compensation
  value: $168.0K
  unit: USD/FTE/year
  source: '[BP team Founding eng + startup-finance heuristic] assumes one senior full-stack / AI integration engineer at a lean pre-seed salary level.'
- id: A14
  name: Hospitality workflow lead loaded compensation
  value: $132.0K
  unit: USD/year
  source: '[BP team Hospitality workflow lead + startup-finance heuristic] reflects domain expertise plus QA ownership without adding a full product-management layer.'
- id: A15
  name: Integration / solutions loaded compensation
  value: $156.0K
  unit: USD/FTE/year
  source: '[BP team Integration / solutions engineer + startup-finance heuristic] covers telephony, reservation, and events-stack integration ownership.'
- id: A16
  name: Implementation / customer success loaded compensation
  value: $120.0K
  unit: USD/FTE/year
  source: '[BP team Implementation and customer success lead + startup-finance heuristic] assumes a technical CSM / deployment operator rather than enterprise account management overhead.'
- id: A17
  name: GTM / partnerships loaded compensation
  value: $156.0K
  unit: USD/FTE/year
  source: '[BP team GTM / partnerships lead + startup-finance heuristic] includes variable pay for founder-assisted outbound and partner development.'
- id: A18
  name: G&A / ops loaded compensation
  value: $96.0K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] assumes one lean operations generalist added only after the first referenceable rollout motions exist.'
- id: A19
  name: Hiring timeline
  value: M1 founder CEO, founding eng, and workflow lead; M4 integration / solutions; M7 implementation / customer success; M12 GTM / partnerships; M20 G&A / ops; M31 second implementation / customer success
  unit: timeline
  source: '[BP team + BP sequencingRationale + startup-finance heuristic] the plan adds only customer-facing scale roles after pilots, then defers broader hiring because the SAM is narrow.'
- id: A20
  name: Payroll allocation to P&L lines
  value: Founder 50% S&M / 30% R&D / 20% G&A; engineering 100% R&D; workflow lead 75% R&D / 25% G&A; integration 25% S&M / 75% R&D; implementation/CS 35% S&M / 45% R&D / 20% G&A; GTM 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] functional allocations keep founder-led sales and deployment work visible while avoiding a false pure-software margin profile.'
- id: A21
  name: Non-payroll opex ramp
  value: S&M roughly $3K-$8K/mo, R&D roughly $5K-$7K/mo, and G&A roughly $4K-$6K/mo over 36 months
  unit: USD/month
  source: '[BP operations + Research regulatoryLandscape + startup-finance heuristic] covers cloud / model usage, travel, legal, telecom registration, insurance, and lightweight back-office tooling.'
- id: A22
  name: Cash conversion convention
  value: EBITDA approximates cash movement
  unit: formula
  source: '[startup-finance heuristic] taxes, capex, debt service, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A23
  name: Monthly churn
  value: 2.0%
  unit: percent/month
  source: '[startup-finance heuristic for early vertical SaaS + BP expansionLevers + Research competitiveLandscape] the workflow should be sticky once embedded, but the model does not assume near-zero churn.'
- id: A24
  name: CAC convention
  value: $95.5K of Y1-Y2 sales and marketing spend per Q4Y2 active paying group
  unit: USD/group
  source: '[model calc using Y1-Y2 S&M spend divided by 6 active paying groups at Q4Y2 + BP funnelTargets] the first-wave CAC is deliberately conservative because founder time and pilot-support effort are expensive early.'
- id: A25
  name: Next-round milestone for funding sizing
  value: 13 active paying groups, 2 referenceable logos, 25% partner-sourced qualified pipeline, and first second-workflow expansions with a repeatable sub-45-day go-live bundle
  unit: milestone
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + BP operatingAssumptions] this is the seed-ready proof package the pre-seed is sized to reach with six months of buffer.'
- id: A26
  name: Quarterly salary convention
  value: Y2-Y3 salary rows use the actual monthly hiring inside each quarter rather than only quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team.startTiming] this keeps salaryK consistent with the monthly hiring ramp.'
