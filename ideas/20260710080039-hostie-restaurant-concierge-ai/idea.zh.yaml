jobsToBeDone:
- job: 当服务高峰里又碰上非营业时段活动询盘时，帮私宴经理先把人数、需求和联系方式收全，并立刻跟进，这样不用加人也能拿下更多带订金的活动。
  currentAlternative: 语音信箱、前台手写备注和人工回拨
  successMetric: 询盘到订金的转化率、首次响应时间、漏接来电挽回率
- job: 当客人来电或发短信要求改预订、处理外卖例外或提出 VIP 需求时，帮多门店运营团队用一致方式处理，让门店在不被经理频繁打断的情况下守住宾客体验。
  currentAlternative: 预订平台备注、共享邮箱和前厅员工接电话
  successMetric: 解决时长、宾客满意度，以及从服务时段里拿回来的电话打断小时数
