topRisks:
- name: 预订现有厂商挤压
  description: 一旦这个品类被证明有价值，预订或 POS 厂商可能会把礼宾能力直接加进现有产品。
  mitigation: 先卡住私宴、漏接来电挽回和跨渠道宾客承接这些现有厂商做不好的流程，同时接入它们的系统，而不是取代它们。
- name: 自动化伤品牌
  description: 如果礼宾回应不好，或把活动细节搞错，一次糟糕互动就可能既丢收入，又伤餐饮集团品牌。
  mitigation: 早期只放开很窄的意图集合，高风险承诺必须人工审批，并围绕转化、升级和宾客满意度信号搭 QA 看板。
- name: 集成与上线摩擦
  description: 餐饮集团常常同时跑着碎片化的电话、预订和消息系统，上线会被拖慢，自动化覆盖面也会被压缩。
  mitigation: 先用一套收束过的集成包上线，优先打集中式宾客运营团队，再在完整写回自动化前提供只读兜底工作流。
