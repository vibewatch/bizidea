problem: 多门店全服务餐厅在最关键的进线时刻还在丢收入：营业高峰电话响个不停、非营业时段客人发短信、私宴询盘来了却没人明确接手。预订系统能管标准桌位库存，但活动线索、外卖例外、VIP 备注和漏接来电回补，最后还是落到前台、共享邮箱和经理回电上。门店一多，这些手工宾客运营回路就会更慢、更不一致，也更难转成订金和复访。
targetUser:
  primary: 美国一线城市里拥有 5-25 家门店、做高端餐饮、私宴收入占比可观、且宾客服务标准集中管理的餐饮集团运营副总裁或宾客体验总监
  secondary: 负责非营业时段活动询盘和预订异常的私宴销售经理、区域 GM，以及电话中心或前台负责人
  buyer: 运营副总裁或 COO
startupThesis:
  nonObviousInsight: 下一块值钱的餐厅软件切口，不是再去拿常规桌位预订，而是拿下预订外围那些非结构化对话。线上订位和在线点餐先把最容易的交易吃掉了，剩下最值钱的流程——私宴、漏接来电、外卖例外、VIP 跟进——还卡在人力密集的渠道里。Hostie 的融资和产品边界说明，餐厅现在开始相信：一个常开在线的语音加短信礼宾，终于能把这块凌乱需求面跑通。
  beachhead: 美国高端餐饮集团，门店数在 5-25 家之间，主要分布在城市核心区，设有私宴空间，中央活动团队或宾客关系团队精简，却还在用预订软件、邮箱和门店电话手工承接非营业时段的电话、短信和私宴询盘
  wedge: 一个 7x24 小时在线的私宴与宾客运营礼宾，负责接电话、回短信、判断人数、日期、预算和意图，处理常规预订异常，并把活动询盘在现有预订系统里变成可收订金的线索
  whyNowCatalyst: Hostie 的融资，以及它明确覆盖电话、短信、预订、外卖、私宴和宾客沟通，说明餐厅终于开始为那些核心订位工具从未真正拿下的凌乱进线流程买自动化。
  ventureScalePath: 先从全服务餐饮集团的私宴和进线宾客沟通切入，再扩到外卖例外处理、回头客 CRM、VIP 分流、会员激活，以及横跨餐厅、酒店和场馆集团的更广泛餐饮宾客收入运营层。
solution: 私宴线索台接入餐饮集团的电话、SMS 和预订系统，把原本散在各门店的宾客需求收进一个结构化收件箱。常见问题可以秒回，活动细节按统一格式采集，只有高风险例外才转给经理或销售。放在私宴场景里，它能先把人数、时间、预算和用餐偏好摸清，再直接生成可收订金的线索或跟进草稿，不再只是多一条语音留言。放在日常宾客运营里，它能处理预订变更、非营业时段可订位咨询和外卖相关消息，不用员工在服务高峰每通电话都亲自接。时间一长，这套产品会变成宾客进线意图、各渠道带来多少活动收入、以及每家门店还在哪些环节漏需求的记录系统。
goToMarketSeed:
  firstCustomer: 纽约、芝加哥或迈阿密一家拥有 8-15 家门店的牛排、海鲜或地中海餐饮集团，设有私宴包间、客单价高，并由一名共享活动经理同时支持所有门店
  buyingTrigger: 节假日或婚礼旺季需求冲高、新店开业，或一次复盘明确显示漏接来电和私宴跟进过慢正在拖累宴会订金与宾客满意度
  currentAlternative: 前台员工、语音信箱回拨、共享邮箱、预订平台备注，以及外包的非营业时段接线服务
  switchingReason: 这条切口既能回收收入、又能减少前厅打断，而且不用替换预订或 POS 系统；靠更多已预订活动、更快首次响应和更高漏接来电挽回率，很快就能讲清 ROI。
  pricingHypothesis: 按门店收 SaaS 订阅费，再叠加礼宾处理电话、短信或合格活动线索的 用量费；私宴工作流和非营业时段覆盖收更高档。
