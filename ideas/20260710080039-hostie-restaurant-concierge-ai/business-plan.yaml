slug: private-dining-lead-desk
date: "2026-07-10"
executiveSummary: >-
  Private Dining Lead Desk should start as an after-hours and overflow
  guest-intake layer for 5-25 location upscale restaurant groups that already
  earn meaningful private-dining revenue and run one centralized events or
  guest-experience team. The product is not a reservation-system replacement;
  it intercepts calls and texts, captures party size, date, budget, and intent,
  resolves routine reservation exceptions, and routes only deposit-worthy or
  high-risk cases to staff. The first customer is an 8-15 location steakhouse,
  seafood, or Mediterranean group in New York, Chicago, or Miami where missed
  calls and slow private-event follow-up are most visible during holiday,
  wedding, or expansion periods. Research supports the wedge because phone-based
  demand still matters in full-service dining, operators are still budgeting
  for guest-tech and AI, and the market is fragmented across voice AI,
  reservation/CRM, and event tools rather than owned end-to-end by one vendor.
  The business only works if the company proves three things quickly: private
  events and exception workflows are valuable enough to pay for, a standard
  reservation-plus-event integration bundle can go live in under 45 days, and
  brand-safe automation can improve response speed without harming guest
  experience. Current market estimates are $675.6M TAM, $54.1M beachhead SAM,
  and $2.2M modeled year-3 SOM, which supports a focused vertical SaaS wedge
  but leaves little room for commodity positioning. The plan therefore
  prioritizes founder-led sales, one standard stack, human-supervised
  escalation, and group-level ROI dashboards before any push into takeout,
  loyalty, or broader hospitality. Important gaps remain: public price
  discovery is thin, the true share of beachhead value coming from private
  dining versus routine reservation coverage is unproven, and target-stack
  concentration by metro must be confirmed in the first 90 days.
problem:
  - >-
    High-intent guest demand still arrives by phone and text during service or
    after hours, so restaurant groups miss private-event deposits and valuable
    reservation changes before staff can call back.
  - >-
    Reservation systems and event CRMs own only part of the workflow; the
    unstructured conversation that starts with a ringing phone, a text, or a
    voicemail still lives in shared inboxes, host-stand notes, and manager
    memory.
  - >-
    As groups add locations, guest-service quality and follow-up speed become
    inconsistent across stores, which hurts conversion, VIP handling, and
    front-of-house labor productivity.
solution:
  - >-
    Answer overflow and after-hours calls and texts, capture party size, date,
    budget, occasion, and dining preferences, and classify whether the inquiry
    is a private-event lead, reservation exception, VIP request, or routine
    question.
  - >-
    Route structured, deposit-ready private-dining leads and approved
    reservation changes into the existing reservation or event workflow instead
    of asking the customer to replace its core stack.
  - >-
    Give central operations one dashboard for missed-call recovery,
    first-response SLA, inquiry-to-deposit conversion, escalation rates, and
    guest-intent patterns by location, channel, and occasion.
whyWeWin:
  - >-
    The beachhead is narrower and more valuable than generic restaurant phone AI
    because private-dining leads and high-value reservation exceptions have a
    clearer revenue owner and a faster payback story than FAQ coverage alone.
  - >-
    Selling an overlay that plugs into reservation and event systems fits how
    operators already buy software and avoids a low-probability rip-and-replace
    motion against established guest platforms.
  - >-
    Conversion-labeled guest-intent data tied to event deposits, response SLAs,
    and escalation outcomes becomes a proprietary workflow asset that host
    stands, answering services, and general voice tools do not naturally build.
  - >-
    Brand-safety QA, human escalation rules, and conservative SMS and
    call-recording compliance are adoption requirements that generic AI agents
    often underinvest in.
strategicChoices:
  beachhead: >-
    Upscale U.S. restaurant groups with 5-25 urban locations, private dining
    rooms, one centralized events or guest-experience owner, and a mostly
    standardized reservation stack across stores.
  wedgeRationale: >-
    Private-dining lead capture plus reservation exceptions creates one buyer,
    one workflow, and one ROI narrative around recovered deposits, faster first
    response, and fewer service-floor interruptions. It yields faster proof than
    pitching a broad restaurant concierge, generic order-taking AI, or full
    reservation-platform replacement before the company has proven integration
    speed and brand safety.
  sequencingRationale: >-
    Start with one standard telephony, reservation, and event handoff bundle,
    founder-led sales, and human-supervised escalation because workflow depth
    and deployment discipline matter more than raw model novelty. Only after 2-3
    pilots prove response and conversion lift should the company add partner
    distribution, broader location rollouts, and adjacent guest-ops workflows.
  notYet:
    - Single-location or self-serve SMB restaurants.
    - Broad takeout and order-management automation.
    - Hotel, venue, or cross-hospitality expansion.
    - Fully autonomous guest promises, outbound marketing, or upsell flows without human approval.
market:
  tam: >-
    $675.6M estimated TAM based on 184k U.S. full-service restaurant locations,
    68% reservation-taking penetration, and roughly $5.4k annual guest-ops
    software spend per location.
  sam: >-
    $54.1M estimated SAM focused on multi-unit upscale or private-events-heavy
    reservation-taking full-service groups, using a 30% multi-unit proxy, a 20%
    upscale subset, and about $7.2k annual spend per qualifying location.
  som: >-
    $2.2M modeled year-3 SOM based on about 30 production groups, 10 locations
    average, and roughly $7.2k annual spend per location after pilot-to-rollout
    conversion.
  segments:
    - >-
      Upscale restaurant groups with 5-25 urban locations, private dining
      rooms, and a centralized private-events or guest-experience function.
    - >-
      Adjacent multi-location full-service brands that already use event or
      reservation software but still leak missed calls and after-hours guest
      inquiries before they enter the formal workflow.
  buyingProcess: >-
    A private-dining manager, regional GM, or guest-experience lead usually
    champions the deal after a missed-call or slow-follow-up post-mortem. The
    VP Operations or COO signs a paid pilot covering the central events desk
    plus a few locations, then converts to an annual group subscription once
    missed-call recovery, first-response time, and inquiry-to-deposit conversion
    improve against baseline.
product:
  mvp: >-
    The MVP covers overflow and after-hours calls and texts for one restaurant
    group, captures event details, routes routine reservation exceptions, and
    pushes structured leads into one reservation stack and one event-management
    workflow. Human approval remains required for bespoke promises, pricing
    exceptions, complaints, and VIP cases.
  sixMonth: >-
    Go live in 2 design-partner pilots with one telephony provider, one
    reservation platform, one event-management handoff, transcript QA,
    escalation rules, and dashboards for missed-call recovery, first-response
    time, and inquiry-to-deposit conversion.
  twelveMonth: >-
    Add multi-location SLA routing, two-way write-back to the event or
    reservation stack, VIP tagging, and weekly manager-review workflows that
    compare AI-handled, escalated, and converted inquiries by location and
    occasion.
  twentyFourMonth: >-
    Expand inside existing restaurant groups from private dining into
    reservation exceptions, VIP routing, repeat-guest follow-up, and selected
    takeout exception handling only after the company proves brand safety and
    multi-location deployment repeatability.
  keyBets:
    - >-
      Private-dining and high-value exception volume is large enough inside the
      beachhead to support premium pricing rather than commodity phone coverage.
    - >-
      One standard telephony plus reservation plus event-tool bundle is enough
      to reach live pilots within 45 days.
    - >-
      Human-supervised AI can maintain acceptable brand tone for premium dining
      groups while still qualifying leads and resolving routine exceptions.
    - >-
      Accounts that buy for private dining will later expand into reservation
      exceptions, VIP routing, and repeat-guest workflows.
gtm:
  wedge: >-
    Land as the after-hours and overflow private-dining lead desk for one
    flagship concept or 3-5 event-heavy locations inside a restaurant group,
    proving more recovered calls, faster event response, and more deposit-ready
    leads without replacing reservation software.
  channels:
    - >-
      Founder-led outbound into COOs, VPs of operations, and private-dining
      leaders at target groups in New York, Chicago, and Miami, timed to
      holiday, wedding, new-opening, or staffing-pressure triggers.
    - >-
      Referral and co-sell motions with reservation consultants,
      event-management platforms, and telephony or systems-integration partners
      once the standard integration bundle is proven.
    - >-
      Land-and-expand from one flagship concept or pilot cluster to the rest of
      the group through weekly KPI reviews with central operations and store
      leadership.
  funnelTargets: "target-account intro→qualified discovery 35%+; discovery→paid pilot 20-25%; paid pilot→group rollout 60%+; first rollout→second workflow expansion 50%+ within 12 months"
  pricing: >-
    Start with a $10k-$20k paid 60-90 day pilot covering the central events
    desk plus 3-5 locations, then convert to a $60k-$90k annual group
    subscription priced as a per-location fee plus usage for handled calls,
    texts, or qualified event leads. This keeps the buying decision tied to
    recovered deposits and labor relief rather than seat count, but the exact
    willingness to pay remains an operating assumption until 2 pilots close.
businessModel:
  revenueStreams:
    - Annual subscription per covered location and central events desk.
    - Usage fees for handled calls, texts, or qualified private-event leads above plan thresholds.
    - One-time onboarding and integration fees plus premium analytics, QA, or after-hours coverage packages.
  unitOfValue: Covered restaurant location-month plus qualified guest-intake volume
  targetGrossMarginPct: 70
  expansionLevers:
    - Roll from 3-5 pilot locations to the full group once response and conversion KPIs hold.
    - Add reservation exceptions, VIP routing, and repeat-guest follow-up within the same logo.
    - Sell premium analytics, QA, and compliance tooling to multi-state operators.
    - Reuse the playbook in adjacent event-heavy restaurant groups before any broader hospitality expansion.
strategyMap:
  northStarMetric: Recovered high-intent guest inquiries converted to booked event deposits or resolved reservations within SLA per covered group-month
  inputMetrics:
    - Qualified beachhead accounts with centralized private-dining ownership and a visible buying trigger in the next 6 months.
    - Share of inbound interactions that are private-event leads or high-value reservation exceptions rather than simple FAQs.
    - Median first-response time for covered private-event and exception inquiries.
    - Missed-call recovery rate and inquiry-to-deposit conversion rate by location.
    - Paid pilot-to-group rollout conversion and second-workflow expansion rate.
  moatsToBuild:
    - Conversion-labeled guest-intent dataset tied to event deposits, reservation outcomes, and escalation reasons by location and occasion.
    - Standard integration and routing playbooks across telephony, reservation, and event stacks that shrink deployment time.
    - Brand-safety and compliance corpus covering approved scripts, escalation boundaries, and multi-state consent handling.
  killCriteria:
    - Design-partner logs show fewer than 20% of economically meaningful inbound interactions are private-event or high-value exception workflows.
    - Fewer than 3 of the first 20 qualified beachhead groups sign a paid pilot within 9 months.
    - The first 3 pilots fail to improve missed-call recovery by at least 25% and cut median private-event first-response time below 10 minutes during covered hours.
    - More than 45 days or bespoke engineering beyond the standard bundle is required for more than half of the first 4 pilots.
    - Paid pilot-to-group rollout conversion stays below 50% or realized annual pricing lands below $50k for a 10-location equivalent group.
  mermaid: |
    flowchart LR
      Wedge[Private-dining lead desk] --> MVP[After-hours and overflow call or text capture]
      MVP --> Proof[Faster response and more deposit-ready leads]
      Proof --> Expansion[Full-group rollout plus adjacent guest-ops workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Clear operator pain and a disciplined wedge merit continued diligence, but
      the case is not yet strong enough for a partner meeting because the
      beachhead is narrow and the category is crowded.
    whyBelieve: >-
      Private-dining and missed-call recovery sit before event CRMs and outside
      core reservation flows, so a focused overlay can prove ROI without asking
      a restaurant group to replace its existing stack.
    whyDoubt: >-
      The researched SAM is only $54.1M, substitutes are abundant, and public
      pricing evidence is too thin to underwrite durable $60k-$90k group
      contracts until pilots close.
    nextDiligence: >-
      Verify the intent mix, integration speed, and brand-safety metrics with 2
      design-partner audits and then watch one paid pilot convert into a
      full-group annual contract.
  firstCustomer:
    title: VP Operations at an 8-15 location upscale restaurant group with centralized private-dining coverage
    profile: >-
      An 8-15 location steakhouse, seafood, or Mediterranean group in New York,
      Chicago, or Miami with private dining rooms, high average checks, one
      shared events manager, and standardized reservation tooling across most
      stores.
    trigger: >-
      Peak holiday or wedding-season demand, a new-location opening, or a
      service review showing missed calls and slow private-event follow-up are
      costing deposits and guest satisfaction.
    buyer: VP Operations or COO
    initialContract: >-
      Start with a $10k-$20k paid 60-90 day pilot covering the central events
      desk plus 3-5 locations, then convert to a $60k-$90k annual group
      subscription priced per location plus usage once missed-call recovery,
      response time, and inquiry-to-deposit conversion beat the baseline.
  mustBeTrue:
    - At least 15 target restaurant groups in the first 3 metros fit the beachhead profile and have a named owner for private-dining or guest-experience operations.
    - At least 20% of economically meaningful inbound demand at design partners is private-event or high-value exception work rather than simple reservation or FAQ coverage.
    - One standard telephony, reservation, and event-tool bundle can cover most early accounts and go live within 45 days.
    - Paid pilots improve missed-call recovery, first-response speed, and inquiry-to-deposit conversion enough to support $60k+ annual group contracts.
    - Funded voice-AI vendors, reservation platforms, and event CRMs do not neutralize the wedge before the company secures a repeatable multi-location rollout playbook.
  diligenceQuestions:
    - How much of the real value pool in the ICP comes from private events and large parties versus commodity reservation coverage?
    - Which reservation and event stacks dominate the first target metros, and how consistently are they deployed across each group?
    - What baseline missed-call rate, event-response SLA, and inquiry-to-deposit conversion can design partners share before a pilot starts?
    - When operators compare Hostie, Slang, Loman, SevenRooms, Tripleseat, and in-house staff, what exact gap makes them buy a separate lead desk?
    - Which budget line pays first inside the account—private events, guest experience, labor efficiency, or broader restaurant tech?
operatingAssumptions:
  - assumption: >-
      Enough upscale 5-25 location restaurant groups in the first 3 metros have
      centralized private-dining ownership and fragmented inbound demand to
      support focused outbound.
    basis: research.yaml
    validationTest: >-
      Map the top 30 target groups and complete 15 interviews confirming
      private-dining revenue importance, centralized workflow ownership, and a
      near-term buying trigger.
    decisionImpact: >-
      If false, narrow to one metro or cuisine segment before adding GTM
      headcount, or abandon the restaurant wedge in favor of a denser vertical.
  - assumption: >-
      Private-event and high-value exception workflows represent enough of the
      inbound value pool to justify a premium product rather than commodity
      phone-answering pricing.
    basis: research.yaml
    validationTest: >-
      Review 60 days of call, text, and event logs from 2 design partners and
      measure the share of interactions that lead to deposits, high-value
      reservations, or manager escalations.
    decisionImpact: >-
      If false, reposition as broader guest-ops coverage with lower ACV
      expectations or stop funding the private-dining-led thesis.
  - assumption: >-
      One standard telephony plus reservation plus event-system bundle can reach
      pilot go-live in 45 days or less without heavy custom engineering.
    basis: research.yaml
    validationTest: >-
      Complete technical audits with 5 accounts and launch 2 pilot sandboxes
      proving intake, routing, and structured handoff on the standard stack.
    decisionImpact: >-
      If false, constrain the ICP to one vendor ecosystem or budget for a more
      services-heavy business that changes hiring and funding needs.
  - assumption: >-
      Buyers will accept $60k-$90k annual group pricing after a paid pilot if
      ROI is shown in recovered deposits and reduced service interruption.
    basis: idea.yaml
    validationTest: >-
      Run 2 paid pilots through procurement and capture signed proposals or
      closed contracts at target annualized pricing.
    decisionImpact: >-
      If false, lower ACV expectations, reduce planned headcount, and revisit
      whether the market can support venture-style returns.
  - assumption: >-
      Human-supervised AI can qualify event leads and resolve routine exceptions
      without unacceptable brand or compliance failures at premium restaurants.
    basis: research.yaml
    validationTest: >-
      Blind-review 100 pilot interactions for tone, accuracy, and escalation
      quality while tracking any unapproved promises, consent failures, or guest
      complaints.
    decisionImpact: >-
      If false, restrict the product to intake and routing only, which reduces
      differentiation and slows expansion into adjacent workflows.
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: ICP and intent-mix mapping across the top 30 target groups
    hypothesis: Enough accounts fit the beachhead and a meaningful share of inbound value comes from private events and high-value exceptions.
    successMetric: 15 interviews completed, 10 qualified groups confirmed, and 2 design partners share 60 days of call or text logs segmented by intent.
    owner: Founder CEO
  - horizon: "0-90 days"
    experiment: Standard integration bundle prototype
    hypothesis: One telephony, reservation, and event-tool bundle is enough to support the first pilots without custom architecture.
    successMetric: Sandbox routing works end to end and 2 design partners approve projected go-live in 45 days or less.
    owner: Founding eng
  - horizon: "0-90 days"
    experiment: Brand-safety and escalation QA test
    hypothesis: Human-supervised AI can qualify event leads without damaging premium-brand tone or making unapproved promises.
    successMetric: Blind QA of 100 sample interactions scores 90%+ acceptable tone and zero critical promise or compliance failures.
    owner: Hospitality workflow lead
  - horizon: "90-180 days"
    experiment: Live pilot for after-hours and overflow private-dining coverage
    hypothesis: The wedge can materially improve missed-call recovery and response speed within one season.
    successMetric: Missed-call recovery improves 25%+ and median first response falls below 10 minutes for covered inquiries over 60 days.
    owner: Implementation and customer success lead
  - horizon: "90-180 days"
    experiment: Pilot-to-contract pricing test
    hypothesis: Buyers will convert from a paid pilot to annual group pricing once deposit conversion and labor-relief metrics are documented.
    successMetric: 1 signed annual contract above $60k ARR or 2 budget-approved proposals at equivalent annualized pricing.
    owner: Founder CEO
  - horizon: "6-12 months"
    experiment: Partner referral motion with event or reservation ecosystem players
    hypothesis: A small partner channel can source qualified pilots without hurting deal quality.
    successMetric: 25% of qualified pipeline is partner-sourced with pilot conversion within 10 percentage points of founder-led outbound.
    owner: GTM / partnerships lead
  - horizon: "12-18 months"
    experiment: Second-workflow expansion inside production accounts
    hypothesis: Accounts that buy for private dining will also buy reservation-exception or VIP-routing workflows.
    successMetric: 2 production customers enable a second workflow within 12 months of their first rollout.
    owner: Implementation and customer success lead
operations:
  - Canonical guest-intent data model spanning calls, texts, private-event inquiries, reservation exceptions, VIP notes, and final booked outcome.
  - Weekly transcript and escalation QA review that flags tone issues, inaccurate promises, and unresolved guest conversations.
  - Conservative 10DLC registration, opt-in or opt-out management, and state-aware call-recording disclosure playbooks from day one.
  - Standard deployment runbook for one telephony provider, one reservation stack, and one event-system handoff before any custom integrations.
  - Weekly customer operating review on missed-call recovery, first-response SLA, inquiry-to-deposit conversion, and store-level override reasons.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Owns ICP discovery, sells the first pilots to operations leaders, and keeps the company focused on one measurable revenue wedge.
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the intake, routing, integration, and audit core before the company broadens workflow scope.
  - role: Hospitality workflow lead
    startTiming: Month 0-3
    rationale: Encodes private-dining qualification logic, escalation boundaries, and transcript QA standards that premium restaurants will trust.
  - role: Integration / solutions engineer
    startTiming: Month 3
    rationale: Productizes the telephony, reservation, and event-system bundle so pilot deployment stays under the 45-day target.
  - role: Implementation and customer success lead
    startTiming: Month 6
    rationale: Runs live pilots, manages weekly KPI reviews, and turns one pilot cluster into a full-group rollout playbook.
  - role: GTM / partnerships lead
    startTiming: Month 12
    rationale: Scales direct and partner-sourced pipeline only after the company has referenceable proof on deployment speed and ROI.
milestones:
  - horizon: "0-12 months"
    items:
      - Close 2 paid pilots with 8-15 location upscale restaurant groups in the first 3 metros.
      - Launch the standard telephony, reservation, and event-handoff bundle in 2 live customer environments.
      - Prove 25%+ missed-call recovery improvement and sub-10-minute median first response for covered private-event inquiries.
      - Convert the first paid pilot into a $60k+ annual group contract.
  - horizon: "12-24 months"
    items:
      - Reach 5-7 production restaurant groups and at least 2 referenceable logos.
      - Add two-way write-back, VIP routing, and reservation-exception workflows inside production accounts.
      - Generate 25% of qualified pipeline from partner referrals without worse pilot conversion than direct outbound.
      - Establish a repeatable compliance and QA playbook for multi-state deployments.
  - horizon: "24-36 months"
    items:
      - Reach 20-30 live production groups, consistent with the current year-3 SOM model.
      - Win second-workflow expansion in at least half of production accounts.
      - Decide whether adjacent hospitality categories merit expansion only after restaurant deployment time and win rates stay stable.
      - Build enough deployment, conversion, and retention evidence to support a Series A story or remain a focused restaurant-software company.
risks:
  - risk: Brand-damaging or inaccurate responses on premium guest requests erode trust with operators and guests.
    likelihood: Medium
    impact: High
    mitigation: Keep early intents narrow, require human escalation for bespoke promises and complaints, and run weekly transcript QA with operator sign-off.
  - risk: Fragmented reservation, telephony, and event stacks push deployment beyond the 45-day target and make the model services-heavy.
    likelihood: High
    impact: High
    mitigation: Start with one standard bundle, qualify for stack consistency during discovery, and fall back to structured routing before full write-back.
  - risk: The real value pool in the beachhead is too skewed toward simple reservation coverage to support differentiated pricing.
    likelihood: Medium
    impact: High
    mitigation: Validate intent mix before scaling sales and avoid broadening headcount until private-dining and exception volume is proven.
  - risk: Funded voice-AI vendors or guest-platform incumbents bundle good-enough event lead capture before the startup establishes a repeatable wedge.
    likelihood: High
    impact: High
    mitigation: Win on deposit-ready qualification, faster deployment, and group-level conversion analytics instead of generic call answering.
  - risk: SMS and call-recording compliance failures create legal and brand risk during multi-state rollout.
    likelihood: Medium
    impact: Medium
    mitigation: Use registered messaging routes, explicit consent handling, conservative recording disclosures, and auditable logs from the first pilot.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Build the compliant telephony, reservation, and event-workflow MVP, fund 2-3
    design-partner pilots, hire hospitality workflow, integration, and customer
    success talent, and prove that one pilot cluster converts into a full-group
    annual contract plus a second guest-ops workflow.
