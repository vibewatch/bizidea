topRisks:
  - name: "Incumbent reservation squeeze"
    description: "Reservation or POS vendors may add concierge features once the category proves valuable."
    mitigation: "Start with private dining, missed-call recovery, and cross-channel guest intake workflows that incumbents do not handle well, while integrating with their systems instead of replacing them."
  - name: "Brand-damaging automation"
    description: "If the concierge responds poorly to guests or mishandles event details, one bad interaction can cost revenue and damage a restaurant group's brand."
    mitigation: "Keep the early intent set narrow, require approval for high-stakes promises, and build QA dashboards around conversion, escalations, and guest-satisfaction signals."
  - name: "Integration and rollout friction"
    description: "Restaurant groups often run fragmented telephony, reservation, and messaging stacks that can slow deployment and reduce automation coverage."
    mitigation: "Launch with one constrained integration bundle, target groups with centralized guest operations, and offer read-only fallback workflows before full write-back automation."
