problem: >-
  Multi-location full-service restaurants still lose high-intent revenue in the
  moments when phones ring during service, guests text after hours, or private
  dining inquiries arrive without a clear owner. Reservation systems handle
  standard table inventory, but event leads, takeout exceptions, VIP notes, and
  missed-call recovery still fall back to host stands, shared inboxes, and
  manager callbacks. As a group adds locations, those manual guest-ops loops
  become slower, less consistent, and harder to convert into deposits or repeat
  visits.
targetUser:
  primary: >-
    VP of operations or director of guest experience at a 5-25 location upscale
    restaurant group in major U.S. metros with private dining revenue and
    centralized guest-service standards
  secondary: >-
    Private dining sales managers, regional GMs, and call-center or host-stand
    leads responsible for after-hours event inquiries and reservation exceptions
  buyer: "VP operations or COO"
startupThesis:
  nonObviousInsight: >-
    The next valuable restaurant software wedge is not owning routine table
    bookings; it is owning the unstructured conversations around those bookings.
    Digital reservations and online ordering solved the easy transactions first,
    which leaves the highest-value workflows, such as private dining, missed
    calls, takeout exceptions, and VIP guest follow-up, trapped in labor-heavy
    channels. Hostie's funding and product scope suggest restaurants now believe
    an always-on voice and text concierge can finally operationalize that messy
    demand surface.
  beachhead: >-
    Upscale U.S. restaurant groups with 5-25 urban locations, private dining
    rooms, and one lean central events or guest-relations team that still fields
    after-hours phone, text, and private-event inquiries manually across
    reservation software, email, and store phones
  wedge: >-
    An always-on private-dining and guest-ops concierge that answers calls and
    texts, qualifies party size, date, budget, and intent, resolves routine
    reservation exceptions, and turns event inquiries into deposit-ready leads
    inside the existing reservation stack
  whyNowCatalyst: >-
    Hostie's financing and explicit workflow coverage across calls, texts,
    reservations, takeout, private events, and guest communications show that
    restaurants are finally buying automation for the messy inbound workflows
    core booking tools never owned.
  ventureScalePath: >-
    Start with private dining and inbound guest communication for full-service
    restaurant groups, then expand into takeout exception handling, repeat-guest
    CRM, VIP routing, loyalty activation, and a broader hospitality guest-
    revenue operating layer across restaurants, hotels, and venue groups.
solution: >-
  Private Dining Lead Desk plugs into the restaurant group's phone, SMS, and
  reservation systems to create one structured inbox for guest demand that
  normally spills across stores. It answers common questions instantly, captures
  event details in a consistent format, and routes only high-stakes exceptions
  to managers or sales staff. For private dining, it can pre-qualify party size,
  timing, budget, and dining preferences, then generate a deposit-ready lead or
  draft follow-up sequence instead of another voicemail. For routine guest-ops,
  it can handle reservation changes, after-hours availability questions, and
  takeout-related messages without forcing staff to pick up every call during
  service. Over time, the product becomes the system of record for which inbound
  intents convert, which channels drive event revenue, and where each location
  still loses guest demand.
goToMarketSeed:
  firstCustomer: >-
    An 8-15 location steakhouse, seafood, or Mediterranean group in New York,
    Chicago, or Miami with private dining rooms, high average checks, and one
    shared events manager supporting every store
  buyingTrigger: >-
    Peak holiday or wedding-season demand, a new-location opening, or a post-
    mortem showing missed calls and slow event follow-up are costing banquet
    deposits and guest satisfaction
  currentAlternative: >-
    Host-stand staff, voicemail callbacks, shared inboxes, reservation-platform
    notes, and outsourced after-hours answering services
  switchingReason: >-
    The wedge captures revenue and removes front-of-house interruptions without
    replacing the reservation or POS stack, and it can prove ROI quickly through
    more booked events, faster first-response times, and higher missed-call
    recovery.
  pricingHypothesis: >-
    Per-location SaaS plus a usage fee for concierge-handled calls, texts, or
    qualified event leads, with premium tiers for private dining workflows and
    after-hours coverage
