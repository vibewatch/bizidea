  - 权威来源：美国全服务餐厅市场规模与展望、餐厅门店数量，以及和宾客运营、私宴相关的多门店经营趋势。
  - 可信来源：美国全服务餐厅门店数，以及多门店餐饮经营者的占比或趋势。
  - 美国一手监管或标准来源：餐厅使用的 AI 电话与短信助手涉及哪些规则，包括 TCPA 对短信/电话同意的要求、A2P 10DLC 注册，以及录音/隐私披露。
