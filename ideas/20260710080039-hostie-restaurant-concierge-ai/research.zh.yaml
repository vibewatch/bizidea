    - 91
    - 101
  - point: 经营者越来越把技术当竞争优势，也持续愿意给 AI 驱动的宾客与运营改进留预算。
    sourceRefs:
    - 90
    - 92
  - point: 和通用订桌相比，私宴与活动工作流为自动化线索承接提供了更高毛利、更像样的理由。
    sourceRefs:
    - 40
    - 65
  headwinds:
  - point: 消费者对价格更敏感，意味着买方会更严审回本周期，也可能推迟那些看起来还在试验期的项目。
    sourceRefs:
    - 93
    - 95
  - point: 合规、录音披露和品牌风险管理，会给语音和短信工作流增加真实的部署负担。
    sourceRefs:
    - 104
    - 109
    - 110
competitors:
- name: Hostie
  stage: 成长期
  wedge: 一层餐厅 AI 宾客沟通系统，同时覆盖电话、短信、预订、外卖和私宴询盘。
  pricing: 按套餐销售的 AI 电话与短信打包产品；已审阅的定价页说明，它卖的是类目化方案，而不是普通预订插件。
  strength: 在餐厅电话、短信、预订和活动承接集成上，和本案最正面重合。
  weaknessVsUs: 覆盖面更广，但在集中式私宴线索台和可直接收订金的资格判断上，未必有我们这么聚焦。
  sourceRefs:
  - 1
  - 2
  - 99
- name: Slang AI
  stage: 成长期
  wedge: 面向餐饮服务业的语音 AI“超级接待员”，负责入呼、预订、分流和宾客服务。
  pricing: 有公开定价页，但更像套餐/演示驱动，而不是简单的自助 SMB 结账。
  strength: 融资充足、餐饮专用、已接 OpenTable，也有较强企业级背书。
  weaknessVsUs: 偏语音优先，可能吃不住电话被接起之后那段更重的活动销售工作流。
  sourceRefs:
  - 20
  - 21
  - 100
- name: Tripleseat
  stage: 现有厂商
  wedge: 私宴与活动管理软件，覆盖 方案、支付和线索处理。
  pricing: 没有在已审阅的产品与内容页里看到公开标价，主要靠定制报价。
  strength: 在私宴和活动运营工作流上很深，覆盖线索分流、直接预订和支付。
  weaknessVsUs: 往往从“询盘已经进系统之后”才开始发力，默认并不拦截漏接来电，也不接非营业时段的电话/短信。
  sourceRefs:
  - 40
  - 43
  - 47
- name: SevenRooms
  stage: 现有厂商
  wedge: 面向餐饮集团的预订、CRM、营销、活动，以及新上线的语音 AI 平台。
  pricing: 公开定价页可见，但套餐配置依赖具体方案，并强调“不按每位客人抽成收费”。
  strength: 已有宾客数据、已有预订流程 负责人 身份，再加上集团级关系，是很可信的 捆绑销售 威胁。
  weaknessVsUs: 平台范围很大，未必比一个围绕单点 ROI 问题出售的私宴线索台更轻、更快。
  sourceRefs:
  - 65
  - 69
  - 72
- name: Loman AI
  stage: 种子轮
  wedge: 7x24 小时的餐厅 AI 电话代理，主打电话、订单、预订和人效提升。
  pricing: 定价页透明，但仍是餐饮专用部署产品，不是商品化通信能力。
  strength: 对餐厅来说，收入回收和省人工的故事很直接，也有 POS 与预订集成。
  weaknessVsUs: 更适合抓来电、订单和预订处理；在高价值私宴线索资格判断上的站位没那么鲜明。
  sourceRefs:
  - 79
  - 80
  - 98
regulatoryTechnicalConstraints:
- point: 美国通过 10DLC 路由发送商业短信，必须做品牌与活动注册，并明确 授权订阅、退订 和 使用场景。
  sourceRefs:
  - 104
  - 108
- point: 通话录音和截听规则因司法辖区而异，因此跨州部署必须按最保守标准做披露和明确同意处理。
  sourceRefs:
  - 109
  - 110
- point: 一旦语音 AI 该升级给员工，产品必须能优雅 转交，因为品牌安全地处理例外，和识别准确率同样重要。
  sourceRefs:
  - 20
  - 69
validationSignals:
- point: Hostie 的 500k 通电话研究说明，接通率提升和预订回收足够可量化，完全可以拿来搭 ROI 试点。
  sourceRefs:
  - 10
- point: Slang 的 B 轮和合作伙伴叙事说明，只要能接进现有预订栈，企业级餐饮买方会为语音 AI 买单。
  sourceRefs:
  - 30
  - 100
- point: Loman 的融资和部署主张说明，“回收收入 + 省人工”已经是餐厅经营者能接受的购买故事。
  sourceRefs:
  - 98
openQuestions:
- 真正的滩头市场收入里，私宴和大桌需求到底占多少？常规预订变更或外卖例外又占多少？
- 前几个目标城市里，最主流的预订和活动系统分别是什么？目标集团又有多大比例能在各店统一部署？
- 高端品牌愿意接受多大的错误预算，超过这条线他们就会把沟通重新交回人工？
- 集中式私宴团队究竟多常见？它们已经多大比例用了现代活动软件？而漏接来电承接又还在哪些地方游离在系统之外？
