  adoptionFrictionMatrix:
  - friction: Brand-damaging responses on high-stakes guest requests
    severity: high
    affectedBuyer: COO or VP Operations
    mitigation: Constrain early intents, enforce human escalation for promises and exceptions, and review transcripts weekly.
    sourceRefs:
    - 1
    - 20
    - 69
  - friction: Fragmented reservation, event, and telephony stacks across locations
    severity: high
    affectedBuyer: Ops lead with IT or systems responsibility
    mitigation: Standardize on one integration bundle first and sell to groups with centralized tooling before broader expansion.
    sourceRefs:
    - 9
    - 54
    - 70
  - friction: SMS consent, campaign registration, and call-recording compliance
    severity: medium
    affectedBuyer: Operations, marketing, and legal stakeholders
    mitigation: Use registered messaging routes, explicit opt-in flows, and conservative recording disclosures from day one.
    sourceRefs:
    - 104
    - 108
    - 109
    - 110
  - friction: Difficulty proving incremental ROI versus current staff process
    severity: high
    affectedBuyer: COO or finance-minded operator
    mitigation: Measure missed-call recovery, first-response time, and event inquiry conversion in every pilot.
    sourceRefs:
    - 10
    - 24
    - 40
  - friction: Workflow ownership ambiguity between event sales and store teams
    severity: medium
    affectedBuyer: Private-dining manager or regional GM
    mitigation: Route structured leads into the existing event workflow and define SLA ownership before launch.
    sourceRefs:
    - 47
    - 65
    - 70
