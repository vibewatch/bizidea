  pestle:
  - factor: political
    impact: negative
    point: Carrier- and registry-led anti-spam controls make compliant business texting more operationally heavy than a typical restaurant SaaS add-on.
    sourceRefs:
    - 104
    - 108
  - factor: economic
    impact: negative
    point: Full-service demand has recovered, but operators still face value sensitivity and cautious traffic, which raises the bar for any non-essential software spend.
    sourceRefs:
    - 93
    - 95
  - factor: social
    impact: positive
    point: Guests still care about reservations, speed, and convenience, which keeps a responsive guest-intake layer relevant even as online booking grows.
    sourceRefs:
