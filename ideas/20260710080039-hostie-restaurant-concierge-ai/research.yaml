  - Reputable sources on the number of full-service restaurant locations in the United States and the share or trends of multi-unit restaurant operators.
  - Primary U.S. regulatory or standards sources for AI phone and SMS assistants used by restaurants, including TCPA consent for texts and calls, A2P 10DLC registration, and call recording/privacy requirements.
