  sourceRefs:
  - 10
- point: Slang’s Series B and partnership messaging show that enterprise hospitality buyers will fund voice AI when it plugs into their current reservation stack.
  sourceRefs:
  - 30
  - 100
- point: Loman’s funding and deployment claims indicate that revenue-recapture plus labor-savings is already a credible buying story for restaurant operators.
  sourceRefs:
  - 98
openQuestions:
- How much of the real beachhead revenue comes from private events and large parties versus routine reservation changes or takeout exceptions?
- Which reservation and event systems dominate the first target metros, and what percentage of target groups run them consistently across all locations?
- What is the acceptable error budget for premium-brand guest communication before operators revert to human handling?
- How often do centralized private-dining teams already use modern event software, and where does missed-call capture still sit outside that workflow?
