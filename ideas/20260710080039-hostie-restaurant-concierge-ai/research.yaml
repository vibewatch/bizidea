competitors:
- name: Hostie
  stage: scale-up
  wedge: AI guest-communications layer spanning calls, texts, reservations, takeout, and private-event inquiries.
  pricing: Plan-based AI phone and texting bundle; reviewed pricing page confirms category-specific packaging rather than a generic reservation add-on.
  strength: Most direct category fit across restaurant calls, texts, reservations, and event-intake integrations.
  weaknessVsUs: Broad guest-ops scope may be less specialized on central private-dining lead desk workflows and deposit-ready event qualification.
  sourceRefs:
  - 1
  - 2
  - 99
- name: Slang AI
  stage: scale-up
  wedge: Hospitality voice AI “superhost” for inbound calls, reservations, routing, and guest service.
  pricing: Pricing page exists but appears plan- or demo-led rather than simple self-serve SMB checkout.
  strength: Well-funded, hospitality-specific voice AI with OpenTable integration and strong enterprise proof points.
  weaknessVsUs: Voice-first positioning can underweight the richer event-sales workflow that begins after a qualified call is captured.
  sourceRefs:
  - 20
  - 21
  - 100
- name: Tripleseat
  stage: incumbent
  wedge: Private-events and event-management workflow software covering proposals, payments, and lead handling.
  pricing: Custom quote / no public list price surfaced in reviewed product and content pages.
  strength: Deep private-dining and event-ops workflow ownership, including lead routing, direct booking, and payments.
  weaknessVsUs: Usually starts after the inquiry is in the system, so it does not own missed-call interception or after-hours voice and text capture by default.
  sourceRefs:
  - 40
  - 43
  - 47
- name: SevenRooms
  stage: incumbent
  wedge: Reservation, CRM, marketing, events, and emerging voice-AI platform for restaurant groups.
  pricing: Platform pricing page is public, with configuration-dependent plans and “no cover fees” positioning.
  strength: Existing guest data, reservation workflow ownership, and group-level operator relationships make it a credible bundling threat.
  weaknessVsUs: Broad platform scope can make it heavier than a focused private-dining lead desk that is sold on one narrow ROI problem.
  sourceRefs:
  - 65
  - 69
  - 72
- name: Loman AI
  stage: seed
  wedge: 24/7 restaurant AI phone agent focused on calls, orders, reservations, and labor leverage.
  pricing: Transparent pricing page for the phone-agent product, but still sold as a restaurant-specific deployment rather than commodity telephony.
  strength: Clear revenue-recapture and labor-savings narrative for restaurants, plus POS and reservation integrations.
  weaknessVsUs: Best suited to call capture and order or reservation handling; less clearly positioned around high-value private-dining lead qualification.
  sourceRefs:
  - 79
  - 80
  - 98
regulatoryTechnicalConstraints:
- point: U.S. business texting over 10DLC routes requires brand and campaign registration plus opt-in, opt-out, and use-case clarity.
  sourceRefs:
  - 104
  - 108
- point: Call-recording and interception rules vary by jurisdiction, so multi-state deployments should assume conservative disclosures and explicit consent handling.
  sourceRefs:
  - 109
  - 110
- point: The product must support graceful handoff when voice AI should escalate to staff, because brand-safe exception handling matters as much as recognition accuracy.
  sourceRefs:
  - 20
  - 69
validationSignals:
