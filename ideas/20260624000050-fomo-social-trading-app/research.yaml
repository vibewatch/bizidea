market:
  tam:
    value: "$95.6M"
    rationale: Bottom-up proxy = 39.8M current crypto owners across Brazil, Mexico, Indonesia, Singapore, and the UAE; assume only 20% are realistically reachable through digital-bank distribution and $12 annual platform revenue per active wallet => 39.8M × 20% × $12 = $95.6M.
    isEstimate: true
    sourceRefs:
    - 19
    - 20
    - 21
    - 22
    - 23
  sam:
    value: "$52.4M"
    rationale: Beachhead narrows to Brazil, Mexico, and Indonesia; their combined 36.4M current crypto owners discounted to a 12% bank-channel reachable share at the same $12 annual revenue per active wallet yields about $52.4M.
    isEstimate: true
    sourceRefs:
    - 19
    - 20
    - 21
  som:
    value: "$7.2M"
    rationale: Year-3 reachable share assumes six live partners averaging 100k active trading wallets each and roughly $12 annual platform revenue per active wallet => 6 × 100k × $12 = $7.2M.
    isEstimate: true
    sourceRefs:
    - 33
    - 35
    - 36
    - 37
    - 42
