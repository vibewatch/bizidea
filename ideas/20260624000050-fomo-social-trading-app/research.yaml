competitors:
- name: Coinbase Developer Platform
  stage: incumbent
  wedge: Embedded wallets, on-ramp, paymaster, and smart-account tooling for developer teams.
  pricing: Usage-based pricing and rewards on docs pages; enterprise contracting for larger programs.
  strength: Deep docs and adjacent on-ramp plus paymaster tooling reduce launch complexity.
  weaknessVsUs: Does not center on a bank-owned social graph, local bank workflow, or emerging-market compliance packaging.
  sourceRefs:
  - 41
  - 42
- name: Fireblocks / Dynamic
  stage: incumbent
  wedge: Institution-grade wallet infrastructure plus embedded-wallet distribution after the Dynamic acquisition.
  pricing: Quote-based enterprise stack, with Dynamic positioned as free-to-start and scale-up friendly.
  strength: Strong security posture, enterprise trust, and explicit neobank positioning.
  weaknessVsUs: Institution-first posture is powerful, but the stack is not purpose-built around social trading and bank-owned discovery loops.
  sourceRefs:
  - 47
  - 50
  - 58
- name: Privy
  stage: scale-up
  wedge: Developer-first embedded wallets, auth, gas sponsorship, and global wallet UX.
  pricing: Free-to-start with enterprise expansion.
  strength: Excellent onboarding UX and flexible wallet abstraction for product teams.
  weaknessVsUs: Stops short of regulated trading orchestration, local payments, and bank-specific social features.
  sourceRefs:
  - 64
  - 58
- name: Zero Hash
  stage: scale-up
  wedge: Regulated trading, on-ramp, account funding, and payout infrastructure for fintechs.
  pricing: Product-specific fees and enterprise contracts.
  strength: Compliance-heavy trading rails and fiat-crypto conversion are directly relevant to banks.
  weaknessVsUs: No native social graph or consumer discovery loop; more rails than product experience.
  sourceRefs:
  - 78
  - 42
- name: Bitso Business
  stage: scale-up
  wedge: LatAm-focused stablecoin, payments, FX, and developer APIs.
  pricing: Custom enterprise pricing and partnership-led packaging.
  strength: Local rails and LatAm positioning are strong for Brazil/Mexico adjacency.
  weaknessVsUs: Payments and FX are the center of gravity, not social trading or multi-region bank distribution.
  sourceRefs:
  - 85
  - 92
