  adoptionFrictionMatrix:
  - friction: Compliance teams may resist copy-trading mechanics
    severity: high
    affectedBuyer: Head of Product / Compliance
    mitigation: Start with rankings, follows, and watchlists plus market-specific disclosures before enabling one-tap auto-copy.
