  sensitivityCases:
  - case: Copy-trade UX is interpreted as advice or solicitation
    impact: Sales cycles lengthen and the first product may need leaderboards, watchlists, and explicit disclosures before one-tap auto-copy.
    sourceRefs:
    - 102
    - 107
    - 109
  - case: Horizontal infrastructure vendors add social or discovery primitives
    impact: The startup can still win in bank-specific workflow, but pricing power falls unless its data moat and local compliance modules are materially better.
    sourceRefs:
