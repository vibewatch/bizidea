    - 47
    - 58
    - 64
    - 78
  - case: Bank-channel conversion is lower than pure consumer social apps
    impact: TAM remains real, but near-term SOM shifts toward fewer larger partners with high-trust brands rather than broad mid-market rollout.
    sourceRefs:
    - 3
    - 32
    - 35
  - case: Funding and settlement partners become rollout bottlenecks
    impact: Time-to-live stretches if the startup cannot support multiple local payment and stablecoin stacks per market.
    sourceRefs:
