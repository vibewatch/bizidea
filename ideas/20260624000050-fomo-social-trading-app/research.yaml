openQuestions:
- Which exact feature set can ship in Brazil and Mexico without crossing into a higher-risk investment-advice interpretation?
- How much permissioned graph data will a design-partner neobank actually share for recommendations, leaderboards, and copy-trade prompts?
- What first-trade conversion rate is realistic inside a bank app versus a pure-play consumer social-trading app?
- Which local funding partners offer the best blend of approval speed, FX economics, and fraud controls in the first two launch markets?
