    - 92
    - 78
  validationPlan:
  - priority: high
    question: Can a bank-branded social trading flow drive at least 3–5% of monthly active users to a first crypto trade within 90 days?
    evidenceToGather: "Pilot funnel data by cohort: impression-to-wallet creation, wallet-to-funded-account, and funded-account-to-first-trade conversion."
  - priority: high
    question: Which disclosure and feature gating pattern is sufficient to keep copy-trade features out of the “advice” bucket in Brazil, Mexico, Singapore, and UAE launch paths?
    evidenceToGather: Written counsel comparing leaderboard-only, watchlist-follow, and one-tap auto-copy flows market by market.
  - priority: medium
    question: Which local funding partner combinations give the fastest path to first-trade completion without breaking unit economics?
    evidenceToGather: Time-to-money, fee, and failure-rate data for at least two on-ramp or FX partners per target market.
  - priority: medium
    question: How much user-permissioned graph data is available inside a neobank without creating privacy or governance objections?
    evidenceToGather: Data-sharing review for referrals, P2P contacts, social follows, and consented activity signals across one design partner.
