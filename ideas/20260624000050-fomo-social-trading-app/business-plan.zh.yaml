slug: social-trade-sdk-neobanks
date: "2026-06-24"
executiveSummary: >-
  社交交易 SDK 应以巴西为首发市场，定位为数字银行和超级应用的基础设施层——这些机构已感受到零售加密需求，却没有内部区块链团队。首批目标客户是注册用户 100 万–300 万、已有投资产品、有证据显示用户在行外独立加密 app 充值的巴西数字银行。眼前的痛点是可量化的留存与手续费流失，现有替代方案要么是内部构建需 18 个月以上，要么是只提供通道而无银行自主社交转化循环的交易所 API。MVP 因此应将内嵌智能钱包创建、gas 赞助、本地入金通道、排行榜与关注功能、辖区专属披露打包成一个付费试点，大约八周内可上线。产品排序至关重要：研究支持巴西监管路径更清晰、数字银行加密常态化程度更高，墨西哥应等到通过持牌合作伙伴验证合规模式后再进入。GTM 是一套连贯动作：创始人主导向 CPO 或产品副总裁销售，付费试点绑定首次交易转化率和上线时间，量产定价基于活跃交易钱包加交易量分成。信任基础包括社交交易经证明的消费者吸引力、账户抽象工具的成熟度，以及基础设施厂商与银行自主社交工作流之间的缺口。同样清晰的是质疑理由：银行渠道转化率可能低于纯消费 app，监管机构可能迫使先做排行榜产品再开放自动跟单，而在位钱包或交易所平台可能增加足够多的社交功能来压缩切口。若公司能迅速证明两件事，这门生意值得深入研究：10 周内完成生产部署，以及相比无社交内嵌加密流程可量化的首次交易转化率提升。
problem:
- 加密活跃市场的二三线数字银行，在用户离开行内 app 转向提供更快引导和更强社交证明的独立加密产品时，面临留存流失和手续费损失。
- 现有替代方案均不理想：内部构建需要区块链和合规专才，而通用交易所或钱包 API 无法为银行提供差异化的社交转化循环或本地上线打包方案。
solution:
- 提供一个白标 SDK，将内嵌智能钱包创建、gas 赞助、本地入金通道和银行自主社交发现打包在一起，让数字银行能用一支小型移动团队在约八周内上线内嵌现货加密。
- 先上线排行榜、关注、自选列表、一键首次购买和辖区专属披露；只有在生产中证明法律合规和转化效果后，再加入更深层的跟单自动化。
whyWeWin:
- 产品围绕现有厂商留下的确切缺口设计：激活银行自主用户图谱，而不仅仅是交易通道、钱包或托管。
- 每次部署都在积累权限社交转化数据、欺诈与 gas 遥测，以及辖区专属合规工作流——这些专有资产难以被水平 SDK 厂商快速复制。
strategicChoices:
  beachhead: "注册用户 100 万–500 万、已有投资界面、存在明显加密需求泄漏、内部无区块链团队的巴西数字银行。"
  wedgeRationale: >-
    这个切片比向所有银行或所有国家销售更快到达验证，因为买家已具备移动端分发能力、有留存问题和可能的创新预算，而巴西提供了比墨西哥或多国推广更强的加密常态化证据和更清晰的上线路径。优先进入已有投资工作流的银行，也减少了相比全新消费金融科技的产品教育负担。
  sequencingRationale: >-
    公司应先在巴西、现货加密和排行榜或关注机制上线，再推进广泛的跟单自动化——因为合规解释是最大的早期门控因素。GTM 在团队证明八周付费试点能转化为年度生产合同之前保持创始人主导，招聘优先考虑钱包、合规和实施深度，而非渠道规模。与本地入资和钱包基础设施厂商的合作，优先于国际扩张，因为结算可靠性和上线速度比宽泛的地理覆盖更紧迫。
  notYet:
  - 在巴西合规与转化模式未经验证前直接进入墨西哥
  - 股票、永续合约和预测市场
  - 超出单一合作伙伴权限边界的跨银行共享社交图谱产品
  - 全栈托管或券商-经纪商基础设施
market:
  tam: "基于自下而上代理估算的 TAM 约 $95.6M，对应巴西、墨西哥、印度尼西亚、新加坡和阿联酋可触达加密持有者，每活跃钱包年平台收入约 $12。"
  sam: "聚焦巴西、墨西哥和印度尼西亚的初始 SAM 约 $52.4M，按银行渠道可实际触达的份额折算。"
  som: "基于六家上线合作伙伴每家平均约 10 万活跃交易钱包、每钱包年收入约 $12，第 3 年 SOM 约 $7.2M。"
  segments:
  - 主要：巴西已有投资或财富功能的数字银行和超级应用，可将加密作为留存与收入产品嵌入
  - 次要：墨西哥、印度尼西亚、新加坡和阿联酋已有加密需求的银行或超级应用，在巴西验证后通过合规的本地入资和披露打包进入
  buyingProcess: >-
    日常推进方通常是产品或增长负责人，但合同必须在合规和工程团队认定上线路径比内部构建更快更安全后才能签署。首份合同应是与上线准备度、首次交易转化率和一个预算周期内生产上线决策挂钩的付费试点。
product:
  mvp: >-
    MVP 覆盖巴西一家合作伙伴银行：内嵌智能钱包创建、gas 赞助、本地入金集成、银行品牌排行榜与关注、一键首次购买、披露与限额控制，以及从曝光到首次交易的漏斗分析。明确排除多资产支持、跨银行网络效应和全自动跟单，直到达到法律和转化阈值。
  sixMonth: "完成两三个可配置披露规则、钱包恢复、事件埋点和至少两家本地入资合作伙伴集成的巴西试点，运行在单一核心链技术栈上。"
  twelveMonth: "将至少两个试点转化为生产，在法律顾问允许处增加受控跟单工作流，强化欺诈与风控，并为通过持牌合作伙伴进入一个第二波市场打包部署手册。"
  twentyFourMonth: "从巴西验证扩展到选定的枢纽和高需求市场，按辖区增加可复用合规模块，仅在同样的社交转化工作流仍然适用的情况下扩展至相邻资产类别。"
  keyBets:
  - 即便在全自动跟单上线前，排行榜和关注机制也能显著提升首次交易转化率。
  - 小型银行集成团队使用打包好的钱包和入资模块，可在 10 周以内达到首次价值。
  - 按辖区的合规打包足够有价值，可以保护定价不受水平钱包 SDK 商品化的侵蚀。
  - 首批生产客户会接受活跃钱包加交易量的定价逻辑，因为产品与收入和留存挂钩，而非可选的社交参与。
gtm:
  wedge: "销售一个付费的巴西上线试点，将无 gas 费现货加密引导和银行自主社交证明嵌入一个现有银行 app，再基于活跃交易钱包和交易量将试点转化为年度生产合同。"
  channels:
  - 创始人主导，直接向巴西数字银行和超级应用的 CPO、产品副总裁和消费支付业务总经理销售
  - 与本地入资、外汇和入金合作伙伴联合销售，通过提前解决资金流转来缩短采购周期
  - 与钱包和账户抽象厂商联合技术销售，降低首批试点的上线风险
  funnelTargets: "目标账户→合格商机 20–30%，合格商机→付费试点 20–35%，付费试点→生产 50% 以上，生产客户→钱包数或市场扩张 40% 以上（12 个月内）。"
  pricing: "从 8–10 周付费试点开始，再转为基于活跃已入资交易钱包的年度定价——每钱包每月约 $0.50–$1.50，加 10–15 个基点的交易量费用分成和最低平台承诺费。这符合买家的预算逻辑，因为产品以留存和新增手续费收入为理由，而非独立社交功能。"
businessModel:
  revenueStreams:
  - 与活跃已入资交易钱包挂钩的年度平台订阅费
  - 合作伙伴银行交易量的协议或交易费分成
  - 新市场或合规模块的上线和辖区开通费
  unitOfValue: "合作伙伴银行内的活跃已入资交易钱包，扩张维度包括更多市场、模块和交易量"
  targetGrossMarginPct: 70
  expansionLevers:
  - 在每家生产银行内增加更多活跃钱包和已入资用户
  - 通过可复用的本地入资和披露模块进入新辖区
  - 销售转化、留存和社交交易队列表现的高级分析模块
  - 仅在合规和流动性路径经过验证后，将同样的银行自主社交基础设施扩展至相邻资产类别
strategyMap:
  northStarMetric: "生产合作伙伴银行内的月活已入资交易钱包数"
  inputMetrics:
  - 从签署试点到首批用户上线的天数
  - 排行榜曝光到钱包创建的转化率
  - 钱包创建到首次交易的转化率
  - 付费试点到生产的转化率
  - 首次交易队列的 90 天留存率
  - 每家生产合作伙伴的平均活跃已入资钱包数
  moatsToBuild:
  - 将发现事件与已入资钱包、首次交易和留存相关联的权限社交转化数据集
  - 银行上线所需的辖区专属披露、限额和审批规则库
  - 随时间优化转化与损失控制的 gas 赞助、入资合作伙伴和欺诈遥测数据
  killCriteria:
  - 前四个付费试点中，少于两个在启动后六个月内进入生产。
  - 试点队列在 90 天内未能达到合格月活用户至少 3% 首次交易转化率。
  - 前三家银行部署的中位集成时间超过 10 周。
  - 外部法律顾问认定预定社交工作流需要许可证或功能限制，从而在巴西打破单位经济。
  mermaid: |
    flowchart LR
      Wedge[Brazil neobank pilot] --> MVP[Wallet plus funding plus leaderboard MVP]
      MVP --> Proof[First-trade conversion and production contracts]
      Proof --> Expansion[More banks, jurisdictions, and asset classes]
investorMemo:
  verdict:
    call: "进一步调查 / 深入了解"
    conviction: "切口有说服力、买家时机真实，但信念有条件：取决于巴西合规清晰度和银行渠道转化数据。"
    whyBelieve: "创业公司瞄准的是一个现有交易所、钱包 SDK 和机构优先加密平台均未为银行自主分发好好打包的特定留存与收入工作流。"
    whyDoubt: "市场在战略上很有吸引力，但银行渠道转化率仍未经证明；若社交功能和本地上线打包快速商品化，在位厂商可能压缩切口。"
    nextDiligence: "与巴西共创客户验证：排行榜优先试点能否在 10 周以内上线、用户首次交易转化率是否达标，以及是否支撑高于最低平台定价的生产合同。"
  firstCustomer:
    title: "一家有可量化加密 app 泄漏的巴西数字银行 CPO"
    profile: "巴西数字银行，注册用户 100 万–300 万，已有股票或财富界面，无区块链团队，内部有证据显示活跃用户在行外独立加密 app 充值。"
    trigger: "产品或留存复盘显示，竞争对手使内嵌加密常态化后出现用户泄漏，形成在当前规划周期内推出行内替代方案的压力。"
    buyer: "CPO 或产品副总裁"
    initialContract: "$30k–$60k 的 8–10 周付费试点，在 2.5 万–5 万活跃已入资钱包上线后转化为约 $120k–$250k 的年度平台费加按用量费用分成。"
  mustBeTrue:
  - 有明显加密需求泄漏的巴西数字银行，现在就会从留存或产品增长预算中拨款支持付费试点。
  - 相较于同一银行 app 内的非社交内嵌加密流程，排行榜和关注机制必须显著提升首次交易转化率。
  - 在全自动跟单上线之前，巴西上线可通过披露、限额和功能门控保持合规。
  - 早期客户会在公司尚无多国业务足迹时，接受低六位数美元范围的年化支出。
  - 可复用的合规与入资模块，能在水平厂商将非社交技术栈商品化之前，将产品带入第二波市场。
  diligenceQuestions:
  - 巴西究竟哪个功能集可以上线，而不会让产品被归入投资建议或招揽行为？
  - 共创伙伴银行实际上会开放多少经授权的社交或支付图谱数据，用于排名、关注和提示？
  - 相比无社交证明的内嵌加密流程，银行品牌社交流程的首次交易转化提升究竟有多大？
  - 哪种本地入资和外汇合作伙伴组合，在可接受的欺诈率和手续费水平下实现最快的到账时间？
  - 锚定客户是否会在一次付费试点后签署年度生产合同，还是会坚持更长的重服务验证期？
operatingAssumptions:
- assumption: "巴西是最快可信的上线市场，因为其需求、数字银行常态化程度和监管清晰度均强于首个试点选择墨西哥。"
  basis: research.yaml
  validationTest: "获取书面法律意见，并完成至少 3 次合格买家对话，确认巴西能在现行规则下比墨西哥更快推出计划中的 MVP。"
  decisionImpact: "若结论相反，公司必须重新排序至枢纽市场，或在资助完整交易上线之前，将产品收窄为风险更低的发现层。"
- assumption: "无全自动跟单的排行榜优先产品，仍能带来足够高的首次交易转化率来赢得生产合同。"
  basis: research.yaml
  validationTest: "完成至少 1 次试点或共创客户测试，证明接触排名、关注和一键购买的合格用户，相比非社交对照组转化率明显更高。"
  decisionImpact: "若结论相反，切口减弱，公司可能需要更激进的受监管产品，或转向不同的内嵌加密定位。"
- assumption: "合作伙伴银行会在无法接受的隐私或治理摩擦之前，分享足够的权限用户图谱或行为数据来驱动社交提示。"
  basis: research.yaml
  validationTest: "与 2 家共创伙伴完成涵盖推荐、P2P 联系人、关注和授权行为信号的数据共享与隐私审查。"
  decisionImpact: "若结论相反，产品必须依赖更弱的行内信号，将损失部分转化和护城河优势。"
- assumption: "通过可复用的实施手册和不超过小型客户工程小队，上线时间可控制在 10 周以内。"
  basis: idea.yaml
  validationTest: "使用相同的核心钱包、入资和分析模块完成前 3 个试点，每家合作伙伴的定制工作量不超过 3 名工程师-周。"
  decisionImpact: "若结论相反，毛利和销售效率将崩溃，公司必须收窄范围或转向更重服务的模式。"
- assumption: "活跃钱包加费用分成的定价，与数字银行买家的产品预算逻辑吻合，并能在早期支撑低六位数 ACV。"
  basis: idea.yaml
  validationTest: "获取 4 份合格潜在客户的方案反馈，确认至少 2 家接受定价逻辑，并有明确的从试点到年度生产的升级路径。"
  decisionImpact: "若结论相反，公司可能需要降低初始 ACV、增加服务收入，或改变价值单元，进而影响融资计划。"
experimentRoadmap:
- horizon: 0–90 天
  experiment: "对 15 家已运营投资或支付主导消费 app 的巴西数字银行和超级应用产品负责人进行访谈。"
  hypothesis: "至少有一个狭窄的买家细分，已将内嵌加密视为紧迫的留存与收入项目，而非投机性功能请求。"
  successMetric: "至少 8 次访谈确认可量化的加密需求泄漏或竞争压力，至少 4 个账户符合滩头市场画像。"
  owner: "创始人/CEO"
- horizon: 0–90 天
  experiment: "制作一份市场法律备忘录，比较巴西和墨西哥仅排行榜、关注、自选列表和自动跟单四种流程的合规认定。"
  hypothesis: "巴西支持商业可行的 MVP，门控问题少于墨西哥。"
  successMetric: "法律顾问批准巴西 MVP 功能集，且未发现迫使公司在试点上线前须全面持牌的障碍。"
  owner: "产品与监管负责人"
- horizon: 0–90 天
  experiment: "构建一个试点就绪原型，对从排行榜曝光到钱包创建再到首次已入资交易的漏斗进行埋点。"
  hypothesis: "打包好的社交优先流程，在技术启动后无需核心 SDK 之外的定制基础设施工作，即可到达共创伙伴演示阶段。"
  successMetric: "技术启动 30 天内，一家共创伙伴能完整审阅用户流程和数据埋点。"
  owner: "联创工程师"
- horizon: 90–180 天
  experiment: "就上线速度、首次交易转化率和生产决策时间节点签署首个付费巴西试点，并附明确成功标准。"
  hypothesis: "合格的滩头市场买家，会在多国扩张或全自动跟单上线之前为上线准备度付费。"
  successMetric: "一个付费试点签署并上线，在 120 天内有明确的生产决策路径。"
  owner: "创始人/CEO"
- horizon: 90–180 天
  experiment: "对至少两家本地入资或外汇合作伙伴，在审批时间、手续费、失败率和欺诈控制方面进行基准测试。"
  hypothesis: "多合作伙伴的资金流转方案，比依赖单一全球供应商更能保障结账速度和单位经济。"
  successMetric: "一个首选合作伙伴方案支持试点，在测试流量中实现可接受的手续费和不超过 5% 的入资失败率。"
  owner: "解决方案与合规工程师"
- horizon: 180–360 天
  experiment: "将两个付费试点转化为生产，并与一家钱包或账户抽象合作伙伴测试联合技术销售动作。"
  hypothesis: "生产验证加上合作伙伴公信力，将缩短后续企业销售周期，并支持第二市场扩张。"
  successMetric: "签署两份生产合同，并创建至少 3 个合格的合作伙伴引入商机。"
  owner: "合作伙伴负责人"
operations:
- 在每次上线前，维护覆盖允许社交功能、必要披露、入资合作伙伴和升级责任人的逐国发布矩阵。
- 对从社交曝光到钱包创建再到首次交易的全漏斗进行埋点，确保每个试点都产出决策级转化证据。
- 每个市场运行多家入资和结算合作伙伴，降低审批瓶颈、欺诈集中度和结账失败风险。
- 集中管理 gas 赞助预算、链路由和风险阈值，确保早期钱包经济可预测。
team:
- role: "创始人/CEO"
  startTiming: "Month 0"
  rationale: "主导创始人销售、共创客户招募和产品打包，因为首个预算决策取决于客户真相和快速迭代。"
- role: "联创工程师"
  startTiming: "Month 0"
  rationale: "构建快速推出首个试点所需的核心钱包、paymaster 和事件埋点技术栈。"
- role: "钱包与后端工程师"
  startTiming: "Month 1"
  rationale: "强化智能钱包恢复、链路由和入资合作伙伴集成，防止早期试点变成定制工程项目。"
- role: "解决方案与合规工程师"
  startTiming: "Month 3"
  rationale: "负责合作伙伴上线、披露配置，以及跨共创伙伴和上线辖区的实施手册。"
- role: "产品与监管负责人"
  startTiming: "Month 6"
  rationale: "将法律结论和试点经验转化为可复用的功能门控、审批工作流和辖区模块，保障可重复性。"
- role: "合作伙伴负责人"
  startTiming: "Month 9"
  rationale: "在首个生产验证出现后，扩展与入资、钱包和地区上线合作伙伴的联合销售动作。"
milestones:
- horizon: 0–12 个月
  items:
  - 上线内嵌钱包、入金通道、排行榜或关注机制和披露控制的巴西 MVP。
  - 签署 4–6 家共创伙伴，将至少 2 家转化为付费试点。
  - 将前 2 家银行推进至生产，并在至少一家客户身上证明 10 周以内的部署时间。
  - 在生产队列中验证首次交易转化率达到或超过内部终止阈值。
- horizon: 12–24 个月
  items:
  - 在法律顾问允许处标准化跟单功能门控，并通过持牌合作伙伴打包可重复的第二市场上线路径。
  - 增长至 6 家生产合作伙伴，验证第 3 年 SOM 关于活跃已入资钱包的假设。
  - 将合作伙伴引入的管道确立为新试点的重要来源。
  - 推出高级分析和合规模块，提升早期客户的 ACV。
- horizon: 24–36 个月
  items:
  - 在不损失部署速度或毛利纪律的前提下，扩展至选定的枢纽和高需求市场。
  - 仅在银行自主社交转化工作流依然可防守的情况下，扩展至相邻资产类别。
  - 在生产客户群中形成转化、留存和合规遥测的持久数据护城河。
risks:
- risk: "监管机构或银行合规团队比预期更早将社交交易机制认定为投资建议或招揽行为。"
  likelihood: High
  impact: High
  mitigation: "先上线排行榜、关注、自选列表和重披露流程；在每个市场启用更深层跟单功能之前，要求外部法律顾问签字确认。"
- risk: "水平钱包或交易所基础设施厂商增加足够多的社交和上线打包功能，压缩切口。"
  likelihood: Medium
  impact: High
  mitigation: "以银行自主图谱激活、本地合规模块和可量化的转化率提升来差异化，而非通用钱包管道。"
- risk: "合作伙伴银行拒绝分享足够的权限图谱或行为数据，导致社交提示的效果无法显著超过标准内嵌加密结账。"
  likelihood: Medium
  impact: High
  mitigation: "将产品设计为可随数据逐步丰富而增强，先用最少的数据证明价值，并在试点合同中明确约定同意范围和数据共享条款。"
- risk: "入资、外汇或结算合作伙伴成为上线节奏的瓶颈，降低结账经济性。"
  likelihood: Medium
  impact: Medium
  mitigation: "每个市场资质评估多家合作伙伴，尽早衡量失败率和审批时间，在前两个辖区中避免单一供应商依赖。"
- risk: "即便产品按时上线，银行渠道转化率也太低，无法支撑低六位数美元的生产合同。"
  likelihood: Medium
  impact: High
  mitigation: "对对照队列进行埋点，以转化验证而非功能数量来销售，并将 ICP 收窄至加密需求泄漏最显著的银行。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "18 个月的现金跑道应覆盖核心钱包与合规产品开发、2–3 个付费巴西试点、首批生产部署，以及在地理扩张前验证可重复上线速度和转化率所需的合作伙伴技术栈。"
