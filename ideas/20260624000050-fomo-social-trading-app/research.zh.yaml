competitors:
- name: Coinbase Developer Platform
  stage: incumbent
  wedge: 面向开发团队的内嵌钱包、入金、paymaster 和智能账户工具。
  pricing: 文档页面提供按用量定价和奖励；大型项目走企业合同。
  strength: 完善的文档以及配套的入金和 paymaster 工具降低了上线复杂度。
  weaknessVsUs: 不以银行自主社交图谱、本地银行工作流或新兴市场合规打包为中心。
  sourceRefs:
  - 41
  - 42
- name: Fireblocks / Dynamic
  stage: incumbent
  wedge: 机构级钱包基础设施，加上收购 Dynamic 后新增的内嵌钱包分发能力。
  pricing: 报价制企业方案，Dynamic 定位为免费起步、规模扩展友好。
  strength: 安全态势强、企业信任度高，且明确瞄准数字银行定位。
  weaknessVsUs: 机构优先立场强大，但技术栈并非专为社交交易和银行自主发现循环打造。
  sourceRefs:
  - 47
  - 50
  - 58
- name: Privy
  stage: scale-up
  wedge: 开发者优先的内嵌钱包、身份验证、gas 赞助和全球钱包 UX。
  pricing: 免费起步，企业扩展定价。
  strength: 出色的引导 UX 和灵活的钱包抽象，适合产品团队使用。
  weaknessVsUs: 不涉及受监管的交易编排、本地支付和银行专属社交功能。
  sourceRefs:
  - 64
  - 58
- name: Zero Hash
  stage: scale-up
  wedge: 面向金融科技的受监管交易通道、入金、账户入资和出金基础设施。
  pricing: 产品专属费率和企业合同。
  strength: 合规导向的交易通道和法币-加密转换与银行需求直接相关。
  weaknessVsUs: 无原生社交图谱或消费者发现循环；更多是通道，而非产品体验。
  sourceRefs:
  - 78
  - 42
- name: Bitso Business
  stage: scale-up
  wedge: 聚焦拉美的稳定币、支付、外汇和开发者 API。
  pricing: 定制企业定价和合作伙伴主导的打包方式。
  strength: 本地通道和拉美定位，在巴西/墨西哥周边优势明显。
  weaknessVsUs: 重心在支付和外汇，而非社交交易或多地区银行分发。
  sourceRefs:
  - 85
  - 92
regulatoryTechnicalConstraints:
- point: 巴西现有更清晰的 VASP 规则集，但上线设计仍须符合当地授权、治理和 AML 要求。
  sourceRefs:
  - 99
- point: 墨西哥将虚拟资产业务视为银行和金融科技机构严格划定的受监管活动，使合作伙伴选择尤为关键。
  sourceRefs:
  - 102
- point: 新加坡和阿联酋式枢纽市场的上线，即便创业公司规避直接托管，也可能需要持牌支付或虚拟资产路径。
  sourceRefs:
  - 106
  - 107
  - 109
- point: gas 赞助和智能钱包恢复将安全设计引向通行密钥、paymaster 和后端策略控制，而非仅依赖助记词 UX。
  sourceRefs:
  - 110
  - 113
  - 116
  - 47
validationSignals:
- point: Fomo 的融资和用户活跃度叙事表明，社交发现能驱动首次加密购买行为。
  sourceRefs:
  - 1
  - 3
- point: 大型数字银行已将加密作为原生银行体验，而非独立目的地。
  sourceRefs:
  - 27
  - 32
  - 33
- point: 东南亚移动金融 app 正将加密或 Web3 钱包推入主流消费界面。
  sourceRefs:
  - 35
  - 36
  - 37
  - 39
- point: "内嵌钱包和交易基础设施厂商的密集存在本身就是需求信号：技术栈中每个非社交层的买家已然存在。"
  sourceRefs:
  - 41
  - 47
  - 58
  - 64
  - 71
  - 78
  - 85
  - 92
openQuestions:
- 哪些具体功能集可以在巴西和墨西哥上线，而不会触发更高风险的投资建议认定？
- 共创客户数字银行实际上会为推荐、排行榜和跟单提示分享多少经授权的图谱数据？
- 银行 app 内的首次交易转化率，与纯消费级社交交易 app 相比，实际上能达到什么水平？
- 哪些本地入资合作伙伴在前两个上线市场中提供最佳的审批速度、外汇经济性和欺诈控制？
