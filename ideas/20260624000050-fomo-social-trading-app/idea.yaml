ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      Three independent same-day sources confirm Fomo's $75M raise, $4B volume, and 68K
      first-time buyers; Index Ventures, USV, and Benchmark participation signals strong
      institutional conviction in the social trading thesis.
  painIntensity:
    score: 4
    rationale: >-
      Neobanks face measurable user churn to Fomo-type apps and an 18-month build timeline
      for equivalent infrastructure — a strategic revenue and retention threat that CPOs feel
      acutely and that a generic CEX API cannot resolve.
  wedgeClarity:
    score: 5
    rationale: >-
      The eight-week embedded wallet SDK is narrow, testable, and directly tied to a
      documented Fomo signal — the wedge is a specific REST API endpoint, not a broad
      platform vision, and the first customer profile is tight enough for direct outreach.
  defensibility:
    score: 3
    rationale: >-
      Social graph data and compliance automation create a moat over time, but early
      adoption depends on moving faster than Coinbase and Binance launching white-label
      programs — a credible threat within 18 months that requires anchor contracts and
      exclusivity provisions to blunt.
  ventureScale:
    score: 4
    rationale: >-
      Hundreds of mid-tier neobanks globally represent a large addressable market; fee
      share on $4B-plus trading volume across ten neobank partners approaches $40M ARR,
      with upside from the cross-app social graph network effect and multi-asset expansion.
topRisks:
  - name: Coinbase or Binance launches a competing neobank SDK
    description: >-
      Either incumbent could ship a neobank white-label program within 12–18 months,
      leveraging existing compliance infrastructure and brand trust to crowd out an
      independent SDK vendor before the social graph moat is established.
    mitigation: >-
      Sign two or three anchor neobanks with 18-month exclusivity clauses in LatAm before
      the incumbents announce; early social graph data locked within partner permission
      boundaries creates a switching cost that a late incumbent entry cannot easily replicate.
  - name: Gas cost volatility squeezes sponsorship unit economics
    description: >-
      Gas sponsorship for first-time users on Ethereum mainnet can spike 10–50x during
      congestion events, making per-wallet unit economics unpredictable and temporarily
      negative for the sponsorship float.
    mitigation: >-
      Route all sponsored transactions through Ethereum L2s (Base, Arbitrum) with automatic
      fallback to Solana, and cap sponsorship exposure to $0.02 per transaction via cost
      controls baked into the SDK's transaction scheduler from day one.
  - name: Regulatory fragmentation slows multi-market expansion
    description: >-
      Non-custodial wallet rules, copy-trading disclosure requirements, and crypto
      derivatives regulations differ sharply across LatAm, SEA, and MENA, creating
      per-market legal spend that can delay expansion timelines and inflate overhead.
    mitigation: >-
      Hire one regional regulatory counsel each for Brazil, Singapore, and UAE who
      maintains the compliance module for that jurisdiction; charge customers a
      per-jurisdiction activation fee that offsets the recurring legal cost and turns
      compliance depth into a premium differentiator.
