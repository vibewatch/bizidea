problem: >-
  Tier-2 and Tier-3 neobanks in LatAm, Southeast Asia, and MENA have millions of engaged
  users who demand crypto features but defect to standalone crypto apps. Building ERC-4337
  embedded wallets, gas abstraction, and a social trading layer in-house requires 18 or more
  months and a dedicated blockchain engineering team that most neobanks cannot afford or
  retain. Licensing a generic CEX API delivers trading rails but no social layer, leaving
  the neobank unable to compete on the one dimension — viral social proof — that Fomo's data
  shows converts first-time buyers. The result is measurable user churn, foregone fee
  revenue, and a widening product gap that compounds each quarter.
targetUser:
  primary: CPO or Head of Product at a Tier-2 or Tier-3 neobank with 500K–5M DAUs in LatAm, SEA, or MENA
  secondary: Fintech super-apps in emerging markets seeking crypto revenue without a blockchain engineering team
  buyer: CPO or VP Product at the neobank
startupThesis:
  nonObviousInsight: >-
    The bottleneck to the next 100 million crypto users is not another exchange — it is the
    social proof moment that converts a skeptic into a buyer. Fomo's data shows roughly 11%
    of its user base made their very first crypto purchase because they saw a friend's live
    trade on a leaderboard. Neobanks already own that social graph — friend payment circles,
    P2P history, referral networks — but lack the crypto rails to activate it. Every major
    CEX white-label program has a structural disincentive to help neobanks win: they want the
    user on their platform, not the neobank's. A channel-agnostic SDK that packages ERC-4337
    wallets, gas sponsorship, and a portable social graph is the infrastructure layer that
    CEXes will never offer but neobanks urgently need.
  beachhead: >-
    Neobanks in Brazil and Mexico with 1M–5M registered users that already offer stock CFDs,
    have visible user churn to crypto apps, and want to ship gasless spot crypto with
    copy-trade but have no in-house blockchain team.
  wedge: >-
    A drop-in SDK for embedded ERC-4337 wallet creation, gas sponsorship, and one-tap Apple
    Pay or local payment crypto purchase — live in a neobank app in under eight weeks with
    two engineers.
  whyNowCatalyst: >-
    Fomo's $75M Series B at a $550M valuation and the SEC's simultaneous clearance of
    non-custodial wallet interfaces (June 2026) open a 12-month window before Coinbase and
    Binance can launch competing white-label programs.
  ventureScalePath: >-
    Wallet infrastructure across five anchor neobanks unlocks a cross-app social trading
    graph spanning millions of users; the company then monetizes protocol fee share, premium
    analytics, and a cross-app leaderboard network that becomes the Bloomberg Terminal for
    on-chain retail traders — eventually expanding into equities, perpetuals, and prediction
    market data as neobanks follow Fomo's announced multi-asset roadmap.
solution: >-
  The SDK ships in four modules: (1) an embedded wallet layer built on ERC-4337 that handles
  key creation, recovery, and gas sponsorship behind the existing neobank login — no seed
  phrase, no bridge, no separate app; (2) a social trading graph that surfaces live positions,
  community leaderboards, and one-tap copy-trade over the neobank's existing friend graph;
  (3) a fiat on-ramp adapter supporting Apple Pay, local card networks, and bank transfer so
  users complete their first trade in one checkout flow; and (4) a compliance layer that
  auto-generates position disclosure notices and enforces jurisdiction-specific limits for
  non-custodial broker-dealer exemptions. Neobanks call a single REST API; the SDK handles
  chain routing, gas optimization, and social data indexing. The first paying customer can go
  live in six to eight weeks with a team of two engineers, with no blockchain expertise
  required.
goToMarketSeed:
  firstCustomer: >-
    A Brazilian neobank with 1M–3M registered users, an existing stock CFD product, and
    internal data showing 8–15% of DAUs with external crypto apps installed — willing to run
    an eight-week paid pilot with a two-engineer integration team.
  buyingTrigger: >-
    The CPO reads Fomo's Series B press coverage, checks internal retention data, and
    discovers a measurable user cohort churning to Mercado Bitcoin or Bitso — the data point
    that creates internal urgency and unlocks an innovation budget allocation.
  currentAlternative: >-
    Building in-house over 18+ months with a dedicated blockchain team, or licensing a generic
    CEX API such as Coinbase Prime or Binance Connect that provides no social layer and routes
    user loyalty to the CEX rather than the neobank.
  switchingReason: >-
    Eight-week time-to-live, a built-in social and copy-trade layer that CEX APIs structurally
    cannot offer, and a compliance module pre-configured for LatAm regulatory requirements —
    the combination a two-person neobank mobile team cannot replicate in under two years.
  pricingHypothesis: >-
    Monthly per-active-wallet platform fee (target $0.50–$1.50 per MAW) plus 10–15 basis
    points of protocol fee share on trading volume, with a minimum monthly commitment of
    $5,000 for the first three anchor customers.
