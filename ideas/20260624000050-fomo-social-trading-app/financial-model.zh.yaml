modelDiagram:
  title: 单位经济流程
  mermaid: |
    flowchart LR
      PartnerPipeline --> PaidPilots
      PaidPilots --> ProductionBanks
      ProductionBanks --> ActiveWallets
      ActiveWallets --> PlatformFees
      ActiveWallets --> VolumeFeeShare
      PlatformFees --> Revenue
      VolumeFeeShare --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: "基础案例 Y3 收入来自六家上线数字银行合作伙伴，每家爬升至约 9.5 万活跃交易钱包，每钱包年收入约 $12。"
- checkName: 必须做对的事
  finding: "实施手册必须将上线时间控制在 10 周以内，因为在六客户模型中，一家银行延误会显著影响收入。"
- checkName: 模型崩溃条件
  finding: "若生产上线推迟一个季度且实现定价降至每钱包每年 $10，下行案例将使 Y3 EBITDA 转负并压缩现金缓冲。"
- checkName: 下轮融资证明
  finding: "在巴西拥有两家已上线的生产银行，有可量化的首次交易转化率提升，以及可重复扩展至六家合作伙伴的路径，是证明下轮融资合理性的里程碑。"
sanityChecks:
  ruleOf40: "Y3 growth 166.4% + EBITDA margin 12.7% = 179.1%"
  burnMultiple: "Y2 burn multiple is about 0.2x using $0.76M net burn against roughly $3.3M of net new ARR, though the metric looks unusually strong because the model is concentrated in a few high-ACV bank logos."
  revenuePerFte: "$347K Y3 using 16 ending FTE (benchmark $200-400K SaaS)"
  flags:
  - Y3 收入集中在仅六家银行合作伙伴，一家延迟上线或钱包爬升疲软都会显著影响结果。
  - 基础案例假设整个 Y3 无客户流失且月经济流失率仅 1.5%——在合同续签被证明之前偏乐观。
  - 毛利率仅在实施标准化后才能突破 70% 目标；每家合作伙伴超过约三个工程师-周的定制工作量都会对模型造成压力。
  - 监管或法律顾问驱动的功能门控会拉长销售周期，将现金走势推向下行案例。
