assumptions:
- id: A1
  name: 模型起始月份
  value: "2026-07"
  unit: month
  source: "[报告日期]"
- id: A2
  name: Pre-seed 关闭后期初现金
  value: "2800"
  unit: usdK
  source: "[BP fundingAsk $2–4M 区间；基础案例使用 $2.8M 关闭，保留六个月现金缓冲]"
- id: A3
  name: 每家银行付费试点费用
  value: "45"
  unit: usdK total per pilot
  source: "[BP gtm.pricing 8–10 周付费试点；企业基础设施试点的创业财务经验值]"
- id: A4
  name: 成熟期量产变现
  value: "12"
  unit: usd per active wallet per year
  source: "[BP gtm.pricing 每钱包每月 $0.50–$1.50 加 10–15 个基点费用分成；研究 bottomUpSizingDrivers 每活跃钱包年收入 $12]"
- id: A5
  name: 每上线合作伙伴的成熟期活跃钱包数
  value: "95000"
  unit: wallets
  source: "[Research market.som 假设每上线合作伙伴 10 万活跃钱包；基础案例使用 Y3 末 9.5 万]"
- id: A6
  name: 付费客户增长节奏
  value: "2 paying logos by Y1 end, 6 production partners by Q4Y2, 6 through Y3 while wallet volume expands"
  unit: count
  source: "[BP milestones；Research market.som]"
- id: A7
  name: 毛利率爬升路径
  value: "55-58% in pilot months, 68-72% during scale, 73% by Q4Y3"
  unit: percent
  source: "[BP businessModel.targetGrossMarginPct 70；BP operatingAssumptions 关于 10 周以内可重复实施]"
- id: A8
  name: 各职能全成本月薪资
  value: "Founder 12K; engineering 16K; solutions/compliance 15K; product/reg 14K; partnerships/GTM 13-14K; sales/CS 12K; G&A 11K"
  unit: usdK per month
  source: "[BP team 时间规划；Pre-seed 现金薪酬加薪资负担的创业财务经验值]"
- id: A9
  name: Y1 招聘顺序
  value: "Founder and founding eng M1; wallet eng M2; solutions/compliance M4; product/reg M7; partnerships M10"
  unit: timing
  source: "[BP team]"
- id: A10
  name: Y2–Y3 新增招聘
  value: "Add 2 engineers, 1 solutions/compliance, 1 GTM, 1 sales/CS, and 1 G&A by Q4Y2; add 4 more hires by Q4Y3"
  unit: timing
  source: "[BP sequencingRationale 和六合作伙伴里程碑；支撑六家企业客户的创业财务经验值]"
- id: A11
  name: 非薪资销售与营销支出爬升
  value: "5K to 32K per month"
  unit: usdK per month
  source: "[BP 创始人主导销售、联合销售和合作伙伴 GTM 动作；出行、会议和采购支持的经验值]"
- id: A12
  name: 非薪资研发支出爬升
  value: "10K to 27K per month"
  unit: usdK per month
  source: "[Research technologyLandscape 和 validationPlan；钱包基础设施、分析和安全工具的经验值]"
- id: A13
  name: 非薪资 G&A 支出爬升
  value: "8K to 18K per month"
  unit: usdK per month
  source: "[Research regulatoryTechnicalConstraints；法律、审计、财务和外部法律顾问的经验值]"
- id: A14
  name: 经济流失率
  value: "1.5"
  unit: percent per month
  source: "[内嵌转换成本的多年企业基础设施合同的创业财务经验值]"
- id: A15
  name: 每个新生产客户的 CAC
  value: "140"
  unit: usdK
  source: "[使用 Y2 销售与营销支出除以 4 个净新生产客户计算；创始人主导的企业金融科技经验值]"
- id: A16
  name: 每合作伙伴生产收入爬升
  value: "15K, 20K, 25K MRR in the first 3 months after go-live; 35-50K through months 4-9; 65-95K after year one"
  unit: usdK per month
  source: "[A4 每钱包定价、A5 钱包爬升和 BP milestones 关于转化与生产上线]"
- id: A17
  name: 起始付费客户数
  value: "0"
  unit: count
  source: "[BP milestones 显示试点和生产在模型起始后开始]"
- id: A18
  name: 现金转化假设
  value: "Operating cash movement approximates EBITDA because contracts carry minimum commitments and the model ignores working-capital swings"
  unit: policy
  source: "[年度企业合同的创业财务经验值]"
