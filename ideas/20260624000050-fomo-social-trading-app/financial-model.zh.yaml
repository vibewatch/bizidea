scenarios:
  downside:
    description: "生产上线推迟一个季度，成熟合作伙伴收入接近每钱包每年 $10，毛利率上限约 69%。"
    y3RevenueK: 4150.0
    y3EbitdaK: -210.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
    - ARPU 实现值从每活跃钱包每年 $12 降至 $10。
    - 第 4–6 号客户比基础案例晚一个季度上线。
    - 实施工作量保持偏重，毛利率比基础案例低 3 个百分点。
  base:
    description: "两个付费试点按时转化，六家生产合作伙伴在 Q4Y2 上线，每家合作伙伴在 Y3 末接近 9.5 万活跃钱包。"
    y3RevenueK: 5555.0
    y3EbitdaK: 707.3
    cashLowPointK: 1055.2
    keyAssumptionChanges:
    - 每活跃钱包收入维持在研究基准 $12 附近。
    - 前两家生产银行之后，上线速度保持在 10 周以内。
    - 按阶段计划招聘，而非提前扩张更大的销售团队。
  upside:
    description: "前六家合作伙伴钱包活跃度爬升更快，定价接近目标区间上限，高级分析模块在初始队列中获得附加销售。"
    y3RevenueK: 6900.0
    y3EbitdaK: 1280.0
    cashLowPointK: 1180.0
    keyAssumptionChanges:
    - 成熟合作伙伴收入升至每钱包每年约 $13.5。
    - 第 3–6 号客户比基础案例早约一个季度达到目标钱包渗透率。
    - 实施标准化更快推进，毛利率扩展至 70 多的中段。
