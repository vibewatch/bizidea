problem: >-
  拉美、东南亚和中东北非的二三线数字银行拥有数百万活跃用户，他们迫切需要加密功能，却在持续流失到独立加密 app。在内部从零构建 ERC-4337 内嵌钱包、gas 抽象和社交交易层，需要 18 个月以上并配备专职区块链工程团队——这是大多数数字银行无力负担或留住的资源。授权通用 CEX API 能提供交易通道，却没有社交层，让数字银行在最关键的维度——病毒式社交证明——上无从竞争，而 Fomo 的数据恰恰表明这才是转化首次购买者的核心驱动力。结果是可量化的用户流失、手续费收入减少，以及每季度持续扩大的产品差距。
targetUser:
  primary: 拉美、东南亚或中东北非的二三线数字银行 CPO 或产品负责人，DAU 50 万–500 万
  secondary: 新兴市场中希望获得加密收入、无需自建区块链工程团队的金融科技超级应用
  buyer: 数字银行的 CPO 或产品副总裁
startupThesis:
  nonObviousInsight: >-
    迈向下一亿加密用户的瓶颈不是又一家交易所——而是那个把观望者变成买家的社交证明时刻。Fomo 的数据显示，约 11% 的用户是因为在排行榜上看到朋友的实时交易，才完成了人生第一笔加密购买。数字银行本已拥有那张社交图谱——好友转账圈、P2P 历史、裂变网络——却缺乏加密通道来激活它。每家大型 CEX 的白标项目都有天然的结构性逆动力：它们想把用户留在自己的平台，而不是留给数字银行。一个与渠道无关的 SDK——打包了 ERC-4337 钱包、gas 赞助和可移植社交图谱——是 CEX 永远不会提供、而数字银行迫切需要的基础设施层。
  beachhead: >-
    巴西和墨西哥的数字银行，注册用户 100 万–500 万，已有股票差价合约产品，用户明显向加密 app 流失，希望上线无 gas 费现货加密和跟单功能，但内部没有区块链团队。
  wedge: >-
    一个即插即用的 SDK，支持内嵌 ERC-4337 钱包创建、gas 赞助，以及一键 Apple Pay 或本地支付购买加密——在数字银行 app 内上线，只需两名工程师、八周以内。
  whyNowCatalyst: >-
    Fomo 以 $550M 估值完成 $75M B 轮融资，同时 SEC 于 2026 年 6 月明确非托管钱包界面可合法运营，为在 Coinbase 和 Binance 推出竞争性白标项目之前，打开了一个 12 个月的时间窗口。
  ventureScalePath: >-
    五家锚定数字银行的钱包基础设施，将解锁一张横跨数百万用户的跨应用社交交易图谱；公司随后通过协议费分成、高级分析和跨应用排行榜网络变现——后者将成为链上零售交易者的彭博终端，并随着数字银行跟进 Fomo 公布的多资产路线图，逐步扩展至股票、永续合约和预测市场数据。
solution: >-
  SDK 分四个模块交付：(1) 基于 ERC-4337 的内嵌钱包层，在数字银行现有登录流程背后处理密钥创建、恢复和 gas 赞助——无需助记词、无需跨链桥、无需单独 app；(2) 社交交易图谱，在数字银行现有好友图谱上展示实时持仓、社区排行榜和一键跟单；(3) 法币入金适配器，支持 Apple Pay、本地银行卡网络和银行转账，让用户在单一结账流程内完成首笔交易；(4) 合规层，自动生成持仓披露通知，并对非托管券商豁免执行各辖区特定的限额控制。数字银行调用单一 REST API，SDK 负责链路由、gas 优化和社交数据索引。第一家付费客户可在两名工程师的情况下于 6–8 周内上线，无需任何区块链专业知识。
goToMarketSeed:
  firstCustomer: >-
    巴西数字银行，注册用户 100 万–300 万，已有股票差价合约产品，内部数据显示 8–15% 的 DAU 安装了外部加密 app——愿意以两名工程师的集成团队参与八周付费试点。
  buyingTrigger: >-
    CPO 读到 Fomo B 轮融资的报道，查阅内部留存数据，发现可量化的用户群正在流失到 Mercado Bitcoin 或 Bitso——这个数据点制造了内部紧迫感，并解锁了创新预算分配。
  currentAlternative: >-
    用专职区块链团队内部构建，需要 18 个月以上；或者授权通用 CEX API，如 Coinbase Prime 或 Binance Connect，这些 API 既无社交层，也会把用户忠诚度引向 CEX 而非数字银行。
  switchingReason: >-
    八周即可上线、内置社交与跟单层（CEX API 在结构上无法提供）、预配置拉美合规要求的合规模块——三者组合是两人数字银行移动团队在两年内无法复制的。
  pricingHypothesis: >-
    月活钱包平台费（目标每 MAW $0.50–$1.50）加交易量协议费分成（10–15 个基点），前三家锚定客户设最低月承诺费 $5,000。
whyNow:
- point: >-
    Fomo $75M B 轮融资证明 B2C 社交交易在规模上可行——62.5 万交易者、$4B 交易量、6.8 万首次购买者——为希望在不从零构建的情况下获得同等功能的数字银行，提供了经过验证的打法和竞争紧迫感。
  signalRefs:
  - 社交排行榜带动首次加密购买
  - 社交交易量验证病毒式获客模型
  sourceRefs:
  - 1
- point: >-
    SEC 于 2026 年 6 月明确非托管钱包界面可合法运营，消除了阻止受监管金融科技公司在消费 app 中嵌入自托管加密的最后重大法律障碍，推动合规团队为此前搁置的项目开绿灯。
  signalRefs:
  - SEC 明确非托管钱包监管立场
  sourceRefs:
  - 2
- point: >-
    ERC-4337 账户抽象已在 Fomo 规模下经过生产验证，打消了此前阻碍数字银行在链级基础设施上构建产品的工程风险——SDK 可完全建立在久经考验的技术原语之上。
  signalRefs:
  - ERC-4337 账户抽象实现消费级加密体验
  sourceRefs:
  - 2
- point: >-
    Fomo 宣布扩展至股票、永续合约和预测市场，表明社交交易基础设施将演变为资产类别无关的水平层，为 B2B SDK 公司提供随数字银行需求成长的多年扩张路线图。
  signalRefs:
  - 多资产扩张印证水平平台机遇
