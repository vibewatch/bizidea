jobsToBeDone:
- job: >-
    当数字银行 CPO 看到用户流失到 Fomo 类 app 时，帮助他们在八周内上线无 gas 费社交加密功能，从而无需自建区块链基础设施地留住用户并产生手续费收入。
  currentAlternative: >-
    内部构建需 18 个月，或使用无社交层的通用 CEX API，且用户忠诚度归属 CEX 而非数字银行。
  successMetric: >-
    功能上线后 30 天内完成首笔加密交易的数字银行 DAU 占比；首批队列目标 5% 或以上。
- job: >-
    当数字银行用户在排行榜上看到好友的实时盈利交易时，帮助他们通过 Apple Pay 一键跟单，从而零摩擦地完成第一笔链上购买，无需下载任何独立 app。
  currentAlternative: >-
    下载独立加密 app、完成 KYC、充值到独立钱包、手动下单——每个步骤都有 70–80% 的流失率。
  successMetric: >-
    点击跟单按钮的用户首次购买完成率超过 60%，从点击到链上确认的延迟低于四秒。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      三个独立同日信源确认 Fomo $75M 融资、$4B 交易量和 6.8 万首次购买者；Index Ventures、USV 和 Benchmark 的联合参与，印证了机构对社交交易论点的强烈信念。
  painIntensity:
    score: 4
    rationale: >-
      数字银行面临可量化的用户流失到 Fomo 类 app，以及同等基础设施 18 个月的构建周期——这是 CPO 深刻感受到的战略性收入与留存威胁，通用 CEX API 无法解决。
  wedgeClarity:
    score: 5
    rationale: >-
      八周内嵌钱包 SDK 切口窄、可测试，直接与有据可查的 Fomo 信号挂钩——切口是具体的 REST API 端点，而非宽泛的平台愿景，首批客户画像够清晰，足以直接触达。
  defensibility:
    score: 3
    rationale: >-
      社交图谱数据和合规自动化能随时间建立护城河，但早期采用依赖于比 Coinbase 和 Binance 更快推出白标项目——这是 18 个月内可信的威胁，需要锚定合同和独家条款来对冲。
  ventureScale:
    score: 4
    rationale: >-
      全球数百家中型数字银行代表着庞大的可寻址市场；十家数字银行合作伙伴超过 $4B 交易量的费用分成，ARR 接近 $40M，加上跨应用社交图谱网络效应和多资产扩张的上行空间。
topRisks:
- name: Coinbase 或 Binance 推出竞争性数字银行 SDK
  description: >-
    任一现有厂商均可能在 12–18 个月内推出数字银行白标项目，凭借现有合规基础设施和品牌信任，在社交图谱护城河建立之前把独立 SDK 厂商挤出市场。
  mitigation: >-
    在现有厂商宣布之前，在拉美与两三家锚定数字银行签订 18 个月独家条款；锁定在合作方权限边界内的早期社交图谱数据，形成后入局者难以快速复制的转换成本。
- name: Gas 费波动压缩 gas 赞助单位经济
  description: >-
    以太坊主网上针对首次用户的 gas 赞助，在网络拥堵期间可能飙升 10–50 倍，导致每钱包单位经济不可预测，赞助预付资金暂时为负。
  mitigation: >-
    将所有赞助交易路由至以太坊 L2（Base、Arbitrum），并自动回退到 Solana；通过 SDK 交易调度器内置的费用控制，将每笔赞助上限设为 $0.02。
- name: 监管碎片化拖慢多市场扩张
  description: >-
    非托管钱包规则、跟单披露要求和加密衍生品监管，在拉美、东南亚和中东北非之间差异显著，产生逐市场的法律开支，可能延误扩张时间表并推高间接成本。
  mitigation: >-
    分别为巴西、新加坡和阿联酋各招募一名地区监管法律顾问，负责维护该辖区的合规模块；向客户收取逐辖区开通费，以抵销持续的法律成本，并将合规深度转化为差异化溢价。
