  - variable: hiring pace
    downsideCase: "Front-load three extra commercial hires before product-market proof"
    baseCase: "Reach 12 FTE by Q4Y2 and 16 FTE by Q4Y3"
    upsideCase: "Delay two non-core hires until after the sixth partner is live"
    y3RevenueImpactK: -200.0
    cashImpactK: -280.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      PartnerPipeline --> PaidPilots
      PaidPilots --> ProductionBanks
      ProductionBanks --> ActiveWallets
      ActiveWallets --> PlatformFees
      ActiveWallets --> VolumeFeeShare
      PlatformFees --> Revenue
      VolumeFeeShare --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case Y3 revenue comes from six live neobank partners ramping toward roughly 95K active trading wallets each at about $12 annual revenue per wallet."
  - checkName: Must go right
    finding: "The implementation playbook has to keep launches under 10 weeks because one delayed bank materially reduces revenue in a six-logo model."
  - checkName: Model breaks if
    finding: "If production launches slip a quarter and realized pricing falls toward $10 per wallet per year, the downside case turns Y3 EBITDA negative and compresses the cash cushion."
  - checkName: Next-round proof
    finding: "Two Brazil banks live in production with measurable first-trade conversion uplift and a repeatable path to six partners are the milestones that justify the next financing."
sanityChecks:
  ruleOf40: "Y3 growth 166.4% + EBITDA margin 12.7% = 179.1%"
  burnMultiple: "Y2 burn multiple is about 0.2x using $0.76M net burn against roughly $3.3M of net new ARR, though the metric looks unusually strong because the model is concentrated in a few high-ACV bank logos."
  revenuePerFte: "$347K Y3 using 16 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "Y3 revenue is concentrated in only six bank partners, so one delayed launch or one weak wallet ramp can move the outcome materially."
    - "The base case assumes no logo churn through Y3 and only 1.5% monthly economic churn, which is optimistic until renewals are proven."
    - "Gross margin clears the 70% target only after implementations standardize; more than about three engineer-weeks of custom work per partner would pressure the model."
    - "Regulatory or counsel-driven feature gating can lengthen sales cycles and pull the cash profile toward the downside case."
