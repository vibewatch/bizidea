  - id: A1
    name: Model start month
    value: "2026-07"
    unit: month
    source: "[report date]"
  - id: A2
    name: Opening cash after pre-seed close
    value: "2800"
    unit: usdK
    source: "[BP fundingAsk $2-4M range; base case uses a $2.8M close to preserve a six-month cash buffer]"
  - id: A3
    name: Paid pilot fee per bank
    value: "45"
    unit: usdK total per pilot
    source: "[BP gtm.pricing paid 8-10 week pilot; startup-finance heuristic for enterprise infrastructure pilots]"
  - id: A4
    name: Mature production monetization
    value: "12"
    unit: usd per active wallet per year
    source: "[BP gtm.pricing $0.50-$1.50 per wallet per month plus 10-15 bps fee share; Research bottomUpSizingDrivers $12 annual platform revenue per wallet]"
  - id: A5
    name: Mature active wallets per live partner
    value: "95000"
    unit: wallets
    source: "[Research market.som assumes 100k active wallets per live partner; base case uses 95k by late Y3]"
  - id: A6
    name: Paying logo ramp
    value: "2 paying logos by Y1 end, 6 production partners by Q4Y2, 6 through Y3 while wallet volume expands"
    unit: count
    source: "[BP milestones; Research market.som]"
  - id: A7
    name: Gross margin ramp
    value: "55-58% in pilot months, 68-72% during scale, 73% by Q4Y3"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70; BP operatingAssumptions on sub-10-week repeatable implementations]"
  - id: A8
    name: Fully loaded monthly payroll by role
    value: "Founder 12K; engineering 16K; solutions/compliance 15K; product/reg 14K; partnerships/GTM 13-14K; sales/CS 12K; G&A 11K"
    unit: usdK per month
    source: "[BP team timing; startup-finance heuristic for pre-seed cash comp plus payroll load]"
  - id: A9
    name: Y1 hiring sequence
    value: "Founder and founding eng M1; wallet eng M2; solutions/compliance M4; product/reg M7; partnerships M10"
    unit: timing
    source: "[BP team]"
  - id: A10
    name: Y2-Y3 hiring additions
    value: "Add 2 engineers, 1 solutions/compliance, 1 GTM, 1 sales/CS, and 1 G&A by Q4Y2; add 4 more hires by Q4Y3"
    unit: timing
    source: "[BP sequencingRationale and 6-partner milestone; startup-finance heuristic for supporting six enterprise customers]"
  - id: A11
    name: Non-salary sales and marketing spend ramp
    value: "5K to 32K per month"
    unit: usdK per month
    source: "[BP founder-led sales, co-sell, and partner GTM motion; startup-finance heuristic for travel, events, and procurement support]"
  - id: A12
    name: Non-salary R&D spend ramp
    value: "10K to 27K per month"
    unit: usdK per month
    source: "[Research technologyLandscape and validationPlan; heuristic for wallet infra, analytics, and security tooling]"
  - id: A13
    name: Non-salary G&A spend ramp
    value: "8K to 18K per month"
    unit: usdK per month
    source: "[Research regulatoryTechnicalConstraints; heuristic for legal, audit, finance, and external counsel]"
  - id: A14
    name: Economic churn
    value: "1.5"
    unit: percent per month
    source: "[startup-finance heuristic for multi-year enterprise infrastructure contracts with embedded switching costs]"
  - id: A15
    name: CAC per new production logo
    value: "140"
    unit: usdK
    source: "[Model calc using Y2 sales and marketing spend over 4 net-new production logos; founder-led enterprise fintech heuristic]"
  - id: A16
    name: Production revenue ramp per partner
    value: "15K, 20K, 25K MRR in the first 3 months after go-live; 35-50K through months 4-9; 65-95K after year one"
    unit: usdK per month
    source: "[A4 pricing per wallet, A5 wallet ramp, and BP milestones on conversion and production launches]"
  - id: A17
    name: Starting paying customers
    value: "0"
    unit: count
    source: "[BP milestones show pilots and production begin after model start]"
  - id: A18
    name: Cash conversion assumption
    value: "Operating cash movement approximates EBITDA because contracts carry minimum commitments and the model ignores working-capital swings"
    unit: policy
    source: "[startup-finance heuristic for annual enterprise contracts]"
