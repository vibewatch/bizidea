scenarios:
  downside:
    description: "Production launches slip one quarter, mature partner revenue lands closer to $10 per wallet per year, and gross margin tops out near 69%."
    y3RevenueK: 4150.0
    y3EbitdaK: -210.0
    cashLowPointK: 410.0
    keyAssumptionChanges:
      - "ARPU realization falls from $12 to $10 per active wallet per year."
      - "Customers 4-6 launch one quarter later than the base case."
      - "Implementation work stays heavier, holding gross margin 3 points below base."
  base:
    description: "Two paid pilots convert on time, six production partners are live by Q4Y2, and each partner approaches roughly 95K active wallets by late Y3."
    y3RevenueK: 5555.0
    y3EbitdaK: 707.3
    cashLowPointK: 1055.2
    keyAssumptionChanges:
      - "Revenue per active wallet stays near the $12 research benchmark."
      - "Launch speed remains under 10 weeks after the first two production banks."
      - "Hiring follows the staged plan instead of pulling forward a larger sales team."
  upside:
    description: "The first six partners ramp wallet activity faster, pricing holds near the top of the target range, and premium analytics modules attach inside the initial cohort."
    y3RevenueK: 6900.0
    y3EbitdaK: 1280.0
    cashLowPointK: 1180.0
    keyAssumptionChanges:
      - "Mature partner revenue rises toward $13.5 per wallet per year."
      - "Customers 3-6 reach target wallet penetration about one quarter faster than base."
      - "Gross margin expands to the mid-70s as implementations standardize sooner."
