competitors:
- name: Fingerprint
  stage: 成长期
  wedge: 设备情报与访客识别，用于反欺诈和账号完整性。
  pricing: $99/月，含 20K API calls；额外每 1K 收 $4；企业版另议。
  strength: 设备层信号强，有公开定价，覆盖广泛的账户欺诈场景。
  weaknessVsUs: 不掌握用户名预留策略、首次触达提醒交互，也不提供上线级的监管就绪证据。
  sourceRefs:
  - 30
  - 31
- name: Sift
  stage: 在位厂商
  wedge: 覆盖开户注册、账号接管和诈骗的广义数字信任与反欺诈决策平台。
  pricing: 企业定制 / 未公开。
  strength: 成熟的反欺诈决策平台，用例覆盖广。
  weaknessVsUs: 更适合通用数字欺诈，不是为消费消息场景里的公开用户名上线和首条消息风险量身定做。
  sourceRefs:
  - 32
- name: Socure
  stage: 成长期
  wedge: 覆盖 注册、欺诈和信任工作流的身份与风险决策平台。
  pricing: 企业定制 / 未公开。
  strength: 在身份与风险决策上品牌强，能支撑升级验证和账号信任。
  weaknessVsUs: 更偏身份重验证，不够消息原生，也不是为化名用户名上线或 DM 专属提醒而生。
  sourceRefs:
  - 34
- name: ActiveFence
  stage: 成长期
  wedge: 为数字平台提供信任与安全和有害内容运营。
  pricing: 企业定制 / 未公开。
  strength: 在多类滥用场景上拥有很深的信任与安全经验和策略运营能力。
  weaknessVsUs: 更靠近事后审核和策略执行，而不是事前的用户名预留和首条消息安全控制。
  sourceRefs:
  - 33
- name: Arkose Labs
  stage: 在位厂商
  wedge: 覆盖用户旅程全链路的 bot、AI 代理 和人工欺诈防御。
  pricing: 企业定制 / 未公开。
  strength: 擅长在自动化滥用和脚本化账号攻击放大前把它们拦住。
  weaknessVsUs: 解决不了真人冒充流程、提醒设计，以及围绕公开用户名消息的监管证据问题。
  sourceRefs:
  - 35
regulatoryTechnicalConstraints:
- point: 在印度上线用户名功能，现在必须拿得出一套站得住脚的解释：在更广的 IT Act 和中介尽职义务框架下，平台如何防住冒充、诈骗和滥用。
  sourceRefs:
  - 1
  - 2
  - 7
  - 9
- point: 任何藏在公开用户名背后的身份绑定，都必须保住隐私、尽量减少可见披露；否则既会伤到产品价值，也会提高数据保护敏感性。
  sourceRefs:
  - 8
  - 21
  - 24
- point: 集成设计不能再默认公开手机号身份会一直是常态，因为 WhatsApp 生态文档已经在为 用户名 和 BSUID 做准备。
  sourceRefs:
  - 27
  - 28
validationSignals:
- point: 审查在几天内就从 WhatsApp 扩到 Telegram 和 Signal，这强烈表明监管盯的是整个品类模式，而不是单一平台。
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
- point: PIB 引用的官方投诉量从 2022 年的 10.29 lakh 升到 2024 年的 22.68 lakh，说明反诈控制已经是一个肉眼可见地变大的问题。
  sourceRefs:
  - 12
- point: ShareChat 表示自己服务 1.8 亿用户社区，而印度社交应用榜单上还有多款相邻应用具备可观本地规模。
  sourceRefs:
  - 19
  - 20
- point: Signal 和 WhatsApp 生态如今都把用户名明确当作保护手机号隐私的工具，这验证了化名联系场景正在更广泛地成形。
  sourceRefs:
  - 21
  - 25
  - 28
openQuestions:
- MeitY 发给 WhatsApp、Telegram 和 Signal 的具体安全问卷到底问了什么？其中有多少是产品设计问题，又有多少是在追问执法可追溯性？
- 今天中型印度应用每 10,000 条首次触达消息里，真实的冒充或“数字逮捕”投诉到底有多少？
- 买家会接受共享的跨应用滥用图谱吗？还是因 DPDP 和竞争顾虑，只能接受私有或联盟式部署？
- 在用户名上线失去商业吸引力之前，增长团队最多能接受多高的首次触达拦截误报率？
