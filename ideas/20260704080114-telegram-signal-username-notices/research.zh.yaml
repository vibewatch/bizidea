  searchedQueries:
  - 查找近期一手和权威来源，了解印度或 MeitY 对消息应用用户名功能的审查，包括 WhatsApp、Telegram 和 Signal。
  - 查找关于 Telegram 用户名、Signal 用户名、WhatsApp 隐私与防骗功能，以及首次触达消息安全的官方资料。
  - 查找与消息诈骗、钓鱼、冒充、“数字逮捕”骗局、中介义务、隐私和网络安全相关的印度权威监管、网络犯罪和消费者保护资料。
  - 查找可访问且可靠的来源，理解面向印度的消息、社交、社区和重聊天应用的市场规模与需求背景，以及信任与安全/反欺诈买家痛点。
  - 查找与用户名创建、账号完整性、冒充防护和首次触达消息安全相关的信任与安全、欺诈、身份或滥用防护厂商的官方产品、文档或定价页面。
  - 查找面向印度的聊天、社区、社交或消息应用的官方或可靠来源，要求披露用户数、MAU 或下载量，并且这些应用有现实可能需要用户名安全或首次触达反诈控制。
  - 查找印度《信息技术法 2000》、2021 年《中介规则》、2023 年《数字个人数据保护法》和 CERT-In 指令的官方直达 URL。
  - 查找印度网络犯罪、“数字逮捕”、钓鱼、冒充、RBI 警示和举报资源的官方或权威直达 URL。
  - 查找 ShareChat、Moj、Discord、Reddit、Meta/Facebook 和 WhatsApp 当前准确的官方安全/举报页面直达 URL。
  - 查找带有明确 CAGR 或增速数字的可访问直达来源，用于身份验证、数字反欺诈或相关市场的交叉校验。
  - 查找关于 WhatsApp 用户名或业务作用域用户 ID 的最新官方文档，来源包括 Microsoft、Meta 和通信平台厂商。
