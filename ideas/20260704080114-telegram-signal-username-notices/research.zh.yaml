    supplierPower:
      score: 4
      rationale: 产品依赖上游消息和身份底层能力，包括 用户名 或 BSUID 模型、验证轨道和设备情报 信号。能做什么、能多快集成，很大程度都被这些供应商决定。
      sourceRefs:
      - 28
      - 29
      - 30
      - 35
    buyerPower:
      score: 4
      rationale: '初始市场的客户数量有限，而买家还有靠谱替代方案：延后功能、保留手机号可见，或者用内部审核加相邻供应商硬拼出来。这让产品和信任团队在采购时手里有不小的筹码。'
      sourceRefs:
      - 1
      - 6
      - 20
    threatOfEntrants:
      score: 3
      rationale: 验证 API、设备情报和规则引擎这些核心部件都买得到，因此新进入者 做出原型不难。真正难的是攒出可靠的滥用语料，以及能扛过监管问询的策略证据工作流。
      sourceRefs:
      - 9
      - 29
      - 30
    threatOfSubstitutes:
      score: 5
      rationale: 人工信任审核、直接关功能、通用反欺诈工具，或者回到仅手机号身份，都是可信替代方案；对时间紧的中型应用尤其如此。
      sourceRefs:
      - 1
      - 2
      - 6
      - 21
      - 27
    competitiveRivalry:
      score: 4
      rationale: 竞争主要集中在数字信任、身份、信任与安全和 bot 防御等相邻层，虽然真正把这些能力收束成一套用户名专项控制平面的厂商还不多。
      sourceRefs:
      - 31
      - 32
      - 33
      - 34
      - 35
  pestle:
  - factor: 政治
    impact: negative
    point: 印度监管部门已经表明，他们愿意在功能大规模上线前就对消息平台的用户名设计施压。
    sourceRefs:
    - 1
    - 2
    - 3
    - 4
  - factor: 社会
    impact: negative
    point: 钓鱼、冒充和“数字逮捕”这类诈骗叙事，让任何强化陌生人触达的功能都要额外支付用户信任成本。
    sourceRefs:
    - 12
    - 13
  - factor: 技术
    impact: positive
    point: 保护隐私的用户名和 业务作用域 标识符正在技术上变成常态，这反而放大了围绕它们做控制层的需求。
    sourceRefs:
    - 21
    - 25
    - 27
    - 28
  - factor: 法律
    impact: negative
    point: IT Act、《中介规则》、CERT-In 指令和 DPDP 考量共同决定：比起一个简单风险分数，能解释清楚的控制与证据留存更重要。
    sourceRefs:
    - 7
    - 8
    - 9
  - factor: 经济
    impact: positive
    point: 印度的互联网和社交媒体用户基数仍在快速增长，不断冒出新的上线场景，足以支撑专门的软件预算。
    sourceRefs:
    - 14
    - 15
    - 17
  adoptionFrictionMatrix:
  - friction: 如果安全检查让用户觉得这是披着 KYC 外衣的去匿名化，用户会排斥。
    severity: 高
    affectedBuyer: 产品 / 信任与安全
    mitigation: 把身份绑定藏在后台，做成可选、按风险触发，而不是逼用户公开身份。
    sourceRefs:
    - 21
    - 22
    - 24
  - friction: 增长团队会抵触任何会伤害首条消息转化或回复率的东西。
    severity: 高
    affectedBuyer: CPO / 增长负责人
    mitigation: 先从提醒、影子模式打分和选择性升级验证开始，而不是默认直接拦截。
    sourceRefs:
    - 23
    - 27
    - 38
  - friction: 法务和政策团队要的是证据包，不是一个黑箱分数。
    severity: 高
    affectedBuyer: 法务 / 政策
    mitigation: 把控制措施、分组策略、拦截结果和投诉率打包成可导出的监管就绪报告。
    sourceRefs:
    - 1
    - 2
    - 9
  - friction: 工程集成会横跨 注册、用户名创建和消息流程。
    severity: 中
    affectedBuyer: 工程 / 平台
    mitigation: 第一步先落在用户名预留和首次触达消息上，不要第一天就试图替换所有信任工作流。
    sourceRefs:
    - 28
    - 29
    - 31
market:
  tam:
    value: $42.0M
    rationale: 估算 = 印度 7000 万个与用户名相关的身份 × 每个受保护身份每年约 $0.60 的软件支出。7000 万这一数字，按 2025 年印度 4.91 亿个社交媒体身份里的约 14% 作为近期可能需要化名首次触达控制的对象来建模，并锚定 ShareChat 这类本地语言/社区大盘面，以及其他多百万下载量的社交应用。每个身份 $0.60 的支出，则用 Twilio Verify 每次成功验证 $0.05 
      的定价、Fingerprint 大约每次 API 调用 $0.005 的量级做交叉校验，再叠加工作流和报告价值。
    isEstimate: true
    sourceRefs:
    - 15
    - 19
    - 20
    - 29
    - 30
  sam:
    value: $12.0M
    rationale: 估算 = 2000 万个滩头身份 × 约 $0.60。这个口径把市场收窄到面向印度的区域语言、社区和社交应用——它们既有可观的私信量，也有现实的用户名或隐私导向联系路线图。
    isEstimate: true
    sourceRefs:
    - 18
    - 19
    - 20
    - 29
    - 30
  som:
    value: $4.5M
    rationale: 估算 = 第 3 年上线的 750 万个受保护身份 × 约 $0.60。大致等于 5 家客户、平均每家 150 万个启用用户名的受保护账号；也可能是更多体量更小、但已出现上线紧迫性的挑战者应用。
    isEstimate: true
    sourceRefs:
    - 1
    - 2
    - 20
    - 29
    - 30
