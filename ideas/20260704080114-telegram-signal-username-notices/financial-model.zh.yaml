scenarios:
  downside:
    description: "试点更晚转正，报告模块挂载更慢，公司到 Y3 末只有 7 个活跃客户，而不是 9 个。"
    y3RevenueK: 2404.4
    y3EbitdaK: -384.6
    cashLowPointK: -170.3
    keyAssumptionChanges:
    - 客户爬坡放慢为：Y1 末 2 个付费账户、Y2 末 4 个、Y3 末 7 个。
    - 每个活跃客户的混合收入比基准情形低约 10%，因为更多分组和报告模块的扩展更慢。
    - 毛利率比计划低约 5 个点，因为合作方成本和实施工作始终没能标准化。
  base:
    description: "在精简的创始人主导打法下，前三家付费共创客户到 Y2 末滚成 5 个活跃账户，到 Y3 末滚成 9 个。"
    y3RevenueK: 3345.0
    y3EbitdaK: 393.9
    cashLowPointK: 536.5
    keyAssumptionChanges:
    - 客户数按 A6、A7 和 A8 的轨迹走，到 Y2 末达到 5 个付费账户、Y3 末达到 9 个。
    - 每个活跃客户的混合月收入，会从试点阶段每月 $15K 抬升到 Q4Y3 的每月 $42K，背后是更多分组和报告模块逐步挂上去。
    - 招聘保持“先验证再扩张”的节奏，第二位 GTM 和第二位 解决方案负责人都要等早期生产客户跑起来后才会入场。
  upside:
    description: "参考客户和更快的模块挂载把成交时间拉前，到 Y3 末把业务推到 10 个活跃客户，并带来更强的毛利。"
    y3RevenueK: 4099.0
    y3EbitdaK: 1003.6
    cashLowPointK: 944.2
    keyAssumptionChanges:
    - 客户爬坡变成：Y1 末 4 个付费账户、Y2 末 6 个、Y3 末 10 个。
    - 每个活跃客户的混合收入比基准高约 8%，因为上线范围和报告模块更早挂上。
    - 一旦可复用集成把部署开销压下去，毛利率会比基准高 1-2 个点。
sensitivity:
- variable: "ARPU"
  downsideCase: "季度客户月价值比基准低约 10%，因为账户更接近试点范围，报告模块扩展也推迟。"
  baseCase: "客户月价值按 A10 轨迹上升，到 Q4Y3 达到 $42K。"
  upsideCase: "如果更多分组和报告模块更早挂上，客户月价值会比基准高约 8-10%。"
  y3RevenueImpactK: -334.4
  cashImpactK: -333.6
- variable: "CAC"
  downsideCase: "S&M 固定支出每月多 $2K-$3K，且营收联动的 S&M 提高到 5-7%，因为需要更多创始人时间、差旅和手把手支持。"
  baseCase: "CAC 大致维持在模型中的 208.3K。"
  upsideCase: "合作转介绍和更强的参考案例，让 S&M 更接近营收的 3-4%。"
  y3RevenueImpactK: 0.0
  cashImpactK: -191.2
- variable: "流失率"
