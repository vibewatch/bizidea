slug: username-safety-control-plane
date: "2026-07-04"
currency: USD
modelStartMonth: "2026-08"
assumptions:
- id: A1
  name: "模型起始月份"
  value: "2026-08"
  unit: "YYYY-MM"
  source: "[BP date] 商业计划日期是 2026-07-04，因此模型从下一个完整经营月份开始。"
- id: A2
  name: "预种子轮交割后期初现金"
  value: "1900"
  unit: "USD K"
  source: "[BP fundingAsk.targetFundingRangeUsd] 按 $1.8M 预种子轮 加上约 $0.1M 现有现金建模，足够覆盖下一阶段验证包并留 6 个月缓冲。"
- id: A3
  name: "预种子轮融资规模"
  value: "1800"
  unit: "USD K"
  source: "[BP fundingAsk.targetFundingRangeUsd] 取声明区间 $1.5M-$3.0M 的中位偏中位置，而不是上限，因为基准情形直到 Y3 末团队仍控制在 10 FTE 以内。"
- id: A4
  name: "收入单位"
  value: "一个付费上线试点或生产客户账户"
  unit: "定义"
  source: "[BP gtm.wedge, investorMemo.firstCustomer.initialContract] 这里统计的一个 customer，是为启用用户名的场景支付限定范围试点或年度生产部署费用的一家应用账户。"
- id: A5
  name: "起始客户数（M1）"
  value: "0"
  unit: "数量"
  source: "[BP milestones 0-12 months] 只有 前期验证 把第一家共创客户转成付费试点后，收入才开始记入。"
- id: A6
  name: "Y1 月末客户路径"
  value: "0,0,0,0,1,1,2,2,2,3,3,3"
  unit: "期末客户数"
  source: "[BP milestones 0-12 months; BP gtm.funnelTargets] 基准情形在第 1 年拿到 2-3 家付费共创客户；前几个月先做验证和集成，之后才开始付费试点。"
- id: A7
  name: "Y2 季末客户数"
  value: "Q1Y2 4; Q2Y2 4; Q3Y2 5; Q4Y2 5"
  unit: "期末客户数"
  source: "[BP milestones 12-24 months] 到 Y2 末先把客户数控制在 5 家，期间重点是把试点转成年度生产合同，并开始卖报告模块扩展。"
- id: A8
  name: "Y3 季末客户数"
  value: "Q1Y3 6; Q2Y3 7; Q3Y3 8; Q4Y3 9"
  unit: "期末客户数"
  source: "[BP milestones 24-36 months; research market.som] 到年末跑到既定 5-10 家目标区间的中位数，并达到研究口径的 Y3 SOM 对应年化规模。"
- id: A9
  name: "收入确认时点"
  value: "每个月或每个季度按期中平均客户数确认"
  unit: "政策"
  source: "[startup-finance heuristic] 默认新试点和扩容平均在一个期间的中点落地，而不是首日全部生效。"
- id: A10
  name: "每个平均活跃客户的混合确认收入"
  value: "Y1 $15K/mo; Q1Y2 $18K/mo; Q2Y2 $22K/mo; Q3Y2 $26K/mo; Q4Y2 $30K/mo; Q1Y3 $33K/mo; Q2Y3 $36K/mo; Q3Y3 $39K/mo; Q4Y3 $42K/mo"
  unit: "USD K / 客户月"
  source: "[BP investorMemo.firstCustomer.initialContract; BP businessModel.expansionLevers; research market.som] 从 $45K 的 90 天试点起步，逐步跨过 $150K-$300K 的初始生产合同区间，到 Y3 末随着更多分组和报告模块挂上去，年化 ARPU 走到 $504K。"
- id: A11
  name: "毛利率爬坡"
  value: "Y1 60%; Q1Y2 68%; Q2Y2 70%; Q3Y2 72%; Q4Y2 74%; Y3 75%"
  unit: "百分比"
  source: "[BP businessModel.targetGrossMarginPct; research willingnessToPay] 试点阶段验证合作方和部署成本更重；等集成和证据包标准化后，毛利率逐步逼近 75% 目标。"
- id: A12
  name: "创始人 / 产品负责人含附加成本现金薪酬"
  value: "180"
  unit: "USD K / 年"
  source: "[BP team Founder / trust-and-safety product lead] 这是同时扛产品和创始人主导销售职责的资深创始人常见现金薪酬假设。"
- id: A13
  name: "工程岗位含附加成本现金薪酬"
  value: "170"
  unit: "USD K / FTE-年"
  source: "[BP team Founding engineer and Second engineer] 适用于早期全栈、风险管线和合作方集成工程师的经验口径。"
- id: A14
  name: "GTM 岗位含附加成本现金薪酬"
  value: "160"
  unit: "USD K / 年"
  source: "[BP team Design-partner / GTM lead; BP gtm.channels] 适用于以试点和合作转介绍为主、且需要创始人辅助的顾问式企业销售。"
- id: A15
  name: "解决方案 / 客户成功岗位含附加成本现金薪酬"
  value: "130"
  unit: "USD K / 年"
  source: "[BP product sixMonth; BP milestones 12-24 months] 适用于部署、证据包支持和早期账户扩张负责人的经验口径。"
- id: A16
  name: "行政 / 政策运营岗位含附加成本现金薪酬"
  value: "110"
  unit: "USD K / 年"
  source: "[BP operations; BP risks] 适用于隐私、供应商管理、财务以及监管回复运营支持的经验口径。"
- id: A17
  name: "招聘节奏"
  value: "M1 创始人和创始工程师；M5 第二位工程师；M8 GTM 负责人；M13 第一位 解决方案负责人；M16 第三位工程师；M18 政策运营；M22 第二位 GTM；M27 第四位工程师；M30 第二位 解决方案负责人"
  unit: "时间安排"
  source: "[BP team; BP strategicChoices.sequencingRationale] 先把工程和共创客户支持补齐，再招第二位 GTM，与“先验证、再放量”的切口节奏保持一致。"
- id: A18
  name: "薪资的职能分配"
  value: "创始人 65% S&M / 35% G&A；工程 100% R&D；GTM 100% S&M；solutions 50% R&D / 50% G&A；政策运营 100% G&A"
  unit: "分配比例"
  source: "[BP team rationales; BP operations] 创始人和 GTM 负责人承担商业动作，工程团队搭控制平面，解决方案 与政策运营分摊部署和合规工作。"
- id: A19
  name: "非薪资运营支出"
  value: "Y1 S&M 每月 $8K + 营收 4%，R&D 每月 $10K，G&A 每月 $10K；Y2 S&M 每月 $10K + 营收 5%，R&D $12K，G&A $12K；Y3 S&M 每月 $12K + 营收 5%，R&D $14K，G&A $14K"
  unit: "USD K / 月"
  source: "[startup-finance heuristic] 覆盖云服务、分析、差旅、法务、审计和合规支出，同时不额外假设一个很重的服务团队。"
- id: A20
  name: "用于单位经济模型的月度流失率"
  value: "1.8"
  unit: "百分比"
  source: "[startup-finance heuristic] 只要嵌进上线策略和证据工作流，产品理论上应当很黏；但客户数量少、监管紧迫性还在变化，因此不应假设业内最优流失。"
- id: A21
  name: "混合 CAC"
  value: "208.3"
  unit: "USD K / 每个净新增客户"
  source: "按模型里 Y2-Y3 的销售与市场费用 1250.0K，除以 6 个净新增付费客户计算得出。"
- id: A22
  name: "现金转换政策"
  value: "EBITDA 近似代表经营现金变动"
  unit: "政策"
  source: "[startup-finance heuristic] 现阶段未建模债务、capex、税项或显著营运资本波动。"
- id: A23
  name: "本轮融资要买下的里程碑"
  value: "做到 5 个活跃客户、至少 3 个转成年度生产合同、证明投诉下降 30%+ 且回复率拖累 <=5%，并在种子轮前把监管报告模块做出来"
  unit: "里程碑"
  source: "[BP milestones 0-12 months and 12-24 months; BP fundingAsk.useOfFundsSummary] 这就是用来决定 预种子轮 融资规模、并额外预留 6 个月缓冲的验证包。"
