modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: "收入引擎"
  finding: "基准情形下，收入来自 Y1 末 3 家付费共创客户，滚到 Y2 末 5 个活跃账户、Y3 末 9 个；同时随着更多分组和报告模块上线，混合年化 ARPU 逐步抬到 $504K 的 年化水平。"
- checkName: "必须做对的事"
  finding: "试点转生产的转化率必须接近商业计划里 50%+ 的目标，同时提醒和升级验证要把回复率拖累压在 5% 以内，这样由 CPO 持有的预算才真会被解锁。"
- checkName: "模型失效条件"
  finding: "只要销售周期再拉长大约一个季度，或者模块挂载更慢，下行情形就会在公司完全证明 种子轮 里程碑前把现金打到 0 以下。"
- checkName: "下轮融资验证点"
  finding: "当公司做到 5 个活跃客户、至少 3 份年度生产合同，并拿出一个被接受的监管报告工作流、能在早期账户里继续推高 ACV 时，种子轮 融资的故事才算站稳。"
sanityChecks:
  ruleOf40: "Y3 增速 157.7% + EBITDA 利润率 11.8% = 169.5%（主要因为 Y2 基数较小）。"
  burnMultiple: "Y2 burn multiple 约 0.5x（$584.6K EBITDA burn / $1065.5K 净新增收入），到 Y3 转为 EBITDA 为正。"
  revenuePerFte: "按 Q4Y3 的 10 FTE 计，Y3 每 FTE 收入约 $334.5K（SaaS benchmark 通常在 $200-$400K）。"
  flags:
  - 基准情形依然要求客户从最初 $150K-$300K 的生产合同区间，扩到接近 $500K 的期末 ARPU，因此模块挂载和更广分组覆盖必须按计划发生。
  - 只有当验证、设备情报和证据包实施都保持产品化，而不是滑向重服务定制，毛利率才到得了 75% 目标。
  - 下行情形会打穿现金，因此这笔预种子轮融资不足以同时吸收更慢的转化和更定制化的交付姿态；种子轮融资流程必须更早启动。
  - 现金按 EBITDA 近似建模，未计应收账款节奏、税项和 capex，所以实际 runway 可能比模型显示得更短。
