    score: 4
    rationale: >-
      监管动作已经扩到整个品类，WhatsApp 暂停上线、Arattai 直接关功能，也说明这不是某一家公司的偶发故事；只是来源深度仍然有限。
  painIntensity:
    score: 5
    rationale: >-
      欺诈、冒充和“数字逮捕”类风险严重到足以拖住产品上线，因此能直接触发高管级紧迫感。
  wedgeClarity:
    score: 5
    rationale: >-
      第一刀切得很窄也很具体：给用户名上线配上“创建 + 首次触达”的安全控制。
  defensibility:
    score: 4
    rationale: >-
      跨应用滥用指纹、近似用户名数据和嵌入式政策工作流，都可能慢慢叠成一条强护城河；只是大平台也有能力自己做掉一部分控制。
  ventureScale:
    score: 4
    rationale: >-
      起步市场不大，但这套控制平面可以扩到所有“化名触达”和合规要求正面撞上的消息场景。
topRisks:
- name: "大平台自己做"
  description: "大型消息应用可能更愿意把用户名安全能力留在内部自建，而不是购买外部基础设施。"
  mitigation: "先从中型区域应用和需要快速上线支持的邻近平台切入，再用部署数据把自己做成证据层——哪怕一部分控制最终仍留在客户内部。"
- name: "早期证据太薄"
  description: "当前信号只来自两篇新闻摘要，没有披露欺诈量级，也没有平台方的详细回应。"
  mitigation: "先围绕上线解锁和投诉下降去卖，并要求试点从第一天就基线化冒充举报、误报率和上线延迟。"
- name: "隐私摩擦"
  description: "升级验证一旦让用户感觉自己被去匿名化，采用率就会受伤——尤其当他们觉得用户名已经不再保护个人手机号时。"
  mitigation: "把身份绑定藏在后台，并且只在必要时触发；绝不把手机号暴露给对端；让应用只对高风险分组和首次触达流程启用验证。"
