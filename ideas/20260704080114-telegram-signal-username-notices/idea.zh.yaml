jobsToBeDone:
- job: >-
    当聊天应用准备在 MeitY 审查下上线或重新开启基于用户名的消息功能时，帮信任团队补上按风险分层的防护措施，同时不暴露手机号，这样团队既能按时上线，也能把这次上线说清楚、扛住问询。
  currentAlternative: "人工审核加延后上线"
  successMetric: "用户名功能按计划上线，同时每 10,000 条首次触达消息中的冒充投诉更低"
- job: >-
    当可疑用户名开始大范围外联时，帮平台风控团队在用户丢钱或泄露凭证前拦住冒充，这样他们也能向政策和客服负责人证明反诈是有效的。
  currentAlternative: "靠用户事后举报，再做封禁"
  successMetric: "在第二个受害者举报出现前，限制高风险用户名的中位耗时"
