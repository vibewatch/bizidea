differentiator: >-
  大多数信任与安全厂商都从通用审核、事后案件复盘，或会破坏化名体验的重 KYC 切入。这个团队盯住的是来源里真正暴露出来的失效点：公开用户名创建，以及欺诈扩散前的首次触达外联。这样一来，ROI 叙事就更干净——功能能上线、隐私能保住、政策也能交代过去；同时，近似用户名模式、投诉结果和跨应用重复作恶信号又会慢慢沉淀成一条可守的护城河。
