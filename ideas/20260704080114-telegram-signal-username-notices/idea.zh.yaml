problem: >-
  基于用户名的消息让应用在不暴露个人手机号的前提下支持发现、客服和化名沟通。但一旦公开用户名可以触达陌生人，信任与安全团队就得接手一个首触反诈问题：冒充、钓鱼和诈骗外联，通用审核工具往往要等伤害发生后才抓得住。在 MeitY 的审查下，印度应用已经不能再说“先上线、以后再管”；上线前或上线中就得把防护措施讲清楚。
targetUser:
  primary: "面向印度市场、正准备上线用户名消息功能的聊天、社区和市场平台里的信任与安全负责人，以及平台风控负责人。"
  secondary: "负责处理欺诈升级事件和监管回复的政策、法务和客服负责人。"
  buyer: "信任与安全 VP 或首席产品官"
startupThesis:
  nonObviousInsight: >-
    新的瓶颈不在抽象的身份验证，而在于如何证明：公开用户名的首次触达消息已经配上按风险分层的控制、提醒式交互和足够扎实的证据链，既能过监管，又不把化名体验毁掉。
  beachhead: >-
    聚焦印度的区域语言聊天和社区应用，MAU 在 500 万到 2000 万之间，以 Android 为主，私信已上线，公开用户名功能处于暂停或规划上线状态。
  wedge: >-
    一套保护隐私的控制平面：给用户名申请和首次触达 DM 打风险分；对高风险账号升级验证；在可疑外联前插入诈骗提醒；并导出可直接交监管的防护报告。
  whyNowCatalyst: >-
    MeitY 向 Telegram 和 Signal 发函、WhatsApp 暂停上线、Arattai 决定关闭基于用户名的账号功能——这让用户名安全从待办事项直接变成上线阻塞项。
  ventureScalePath: >-
    先从印度聊天应用的用户名上线安全切入，再把同一套信任图谱、提醒层和证据工具扩到市场平台、游戏、社交约会、创作者和金融科技的消息场景里——凡是靠化名触达拉增长的地方，都能复用。
solution: >-
  产品夹在建号、用户名预留和首次触达消息之间。它把手机号、设备或历史支付信誉等隐藏的已验证身份要素，绑定到公开用户名上，再实时给近似用户名、设备复用、短时间大范围外联、投诉历史和可疑回复模式打分。高风险用户会被触发升级验证、限速或受限的首条消息流程；正常用户则继续保留公开用户名和私密手机号。信任与安全团队拿到的是现成的提醒模板、投诉队列和证据看板，能看清哪些防护已开启、拦下了什么、不同分组的上线策略如何变化。时间一长，接入应用还能共享滥用指纹，让重复冒充者在整个网络里的触达能力一起掉下去。
goToMarketSeed:
  firstCustomer: >-
    一家面向印度市场的区域语言聊天或社区应用里的信任与安全 VP 或产品负责人，MAU 在 500 万到 2000 万之间，用户名功能处于暂停或计划上线状态。
  buyingTrigger: >-
    因 MeitY 审查触发的法务或政策评审，可能拖慢用户名功能上线，或迫使团队解释现有防护措施。
  currentAlternative: >-
    靠人工审核信任与安全案件，加上仅手机号建号、自研规则，或者干脆直接关功能。
  switchingReason: >-
    这个切口让应用不必在内部从零搭完整个信任栈，就能更快恢复或上线用户名功能；同时还能保住隐私，并生成一份具体可交付的监管回复材料。
  pricingHypothesis: >-
    按启用用户名功能的月活账号数收取年度 SaaS 平台费；跨应用信誉数据和监管报告模块再额外收费。
