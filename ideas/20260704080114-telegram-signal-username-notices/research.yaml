market:
  tam:
    value: $42.0M
    rationale: Estimate = 70M handle-relevant identities in India x ~$0.60 annual software spend per protected identity. The 70M figure models ~14% of India's 491M social-media identities in 2025 as near-term candidates for pseudonymous first-contact controls, anchored by large local-language/community surfaces like ShareChat and adjacent multi-million-download social apps. The $0.60 spend cross-checks against Twilio Verify's $0.05 successful-verification pricing and Fingerprint's roughly $0.005 per API-call list economics, then adds workflow/reporting value.
    isEstimate: true
    sourceRefs:
