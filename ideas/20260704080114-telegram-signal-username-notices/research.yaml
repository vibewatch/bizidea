  validationPlan:
  - priority: high
    question: How many impersonation or scam complaints per 10,000 first-contact messages do target apps see today?
    evidenceToGather: Internal support queues, trust-and-safety tickets, and complaint-rate baselines from 5-8 target accounts.
  - priority: high
    question: What exact safeguards or evidence requests are delaying username launches today?
    evidenceToGather: MeitY or internal policy questionnaires, launch review decks, and escalation emails from product, legal, and trust teams.
  - priority: medium
    question: How much first-contact friction can product teams tolerate before growth metrics break?
    evidenceToGather: A/B test data on warnings, rate limits, and step-up verification in a shadow or limited rollout.
  - priority: medium
    question: Will buyers accept a shared cross-app abuse graph, or require private or consortium-style deployments?
    evidenceToGather: Buyer interviews plus legal review of data-sharing constraints under DPDP and internal policy.
