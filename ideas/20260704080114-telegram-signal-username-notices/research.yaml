openQuestions:
- What exact safeguard questionnaire did MeitY send to WhatsApp, Telegram, and Signal, and how much of it was about product design versus law-enforcement traceability?
- How many impersonation or digital-arrest complaints per 10,000 first-contact messages do mid-size Indian apps actually see today?
- Will buyers accept a shared cross-app abuse graph, or require private or consortium-style deployments because of DPDP and competitive concerns?
- What false-positive rate in first-contact gating can growth teams tolerate before a username rollout becomes commercially unattractive?
