jobsToBeDone:
  - job: >-
      When a chat app is ready to launch or re-enable username-based messaging under MeitY scrutiny, help the trust team
      add risk-based safeguards without exposing phone numbers, so they can ship on time and defend the rollout.
    currentAlternative: "Manual review and delayed rollout"
    successMetric: "Username launch date met with lower impersonation complaints per 10,000 first-contact messages"
  - job: >-
      When a suspicious handle begins broad outreach, help platform risk teams stop impersonation before money or
      credentials are lost, so they can show measurable fraud prevention to policy and support leaders.
    currentAlternative: "Reactive user reports and after-the-fact bans"
    successMetric: "Median time to restrict a risky handle before a second victim report"
