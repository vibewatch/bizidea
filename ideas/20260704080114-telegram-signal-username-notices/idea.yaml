topRisks:
  - name: "Incumbent platform in-house build"
    description: "Large messaging apps may prefer to build username safeguards internally rather than buy external infrastructure."
    mitigation: "Start with mid-sized regional apps and adjacent platforms that need fast rollout help, then use deployment data to become the evidence layer even when some controls stay in-house."
  - name: "Thin early evidence base"
    description: "The current signal comes from two news summaries and does not disclose fraud volumes or platform response details."
    mitigation: "Sell around rollout enablement and complaint reduction, and require pilots to baseline impersonation reports, false positives, and launch delays from day one."
  - name: "Privacy friction"
    description: "Step-up checks could feel like de-anonymization and hurt adoption if users think usernames no longer protect their personal numbers."
    mitigation: "Keep identity binding hidden and selective, never reveal phone numbers to counterparties, and let apps tune verification only for risky cohorts and first-contact flows."
