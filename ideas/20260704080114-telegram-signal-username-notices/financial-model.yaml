slug: username-safety-control-plane
date: "2026-07-04"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date] first full operating month after the 2026-07-04 business plan date."
  - id: A2
    name: "Opening cash after pre-seed close"
    value: "1900"
    unit: "USD K"
    source: "[BP fundingAsk.targetFundingRangeUsd] modeled as a $1.8M pre-seed plus roughly $0.1M of existing cash, enough to fund the next proof package with a 6-month buffer."
  - id: A3
    name: "Pre-seed round size"
    value: "1800"
    unit: "USD K"
    source: "[BP fundingAsk.targetFundingRangeUsd] set near the middle of the stated $1.5M-$3.0M range rather than the ceiling because the base case keeps the team under 10 FTE until late Y3."
  - id: A4
    name: "Revenue unit"
    value: "One paid rollout pilot or production customer account"
    unit: "definition"
    source: "[BP gtm.wedge, investorMemo.firstCustomer.initialContract] the counted customer is one app account paying for a scoped pilot or annual production deployment on a username-enabled surface."
  - id: A5
    name: "Starting customers (M1)"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months] revenue starts only after discovery converts the first design partner into a paid pilot."
  - id: A6
    name: "Y1 month-end customer path"
    value: "0,0,0,0,1,1,2,2,2,3,3,3"
    unit: "customers EOP"
    source: "[BP milestones 0-12 months; BP gtm.funnelTargets] base case lands 2-3 paid design partners in year 1, with paid pilots starting only after the first few months of validation and integration work."
  - id: A7
    name: "Y2 quarter-end customers"
    value: "Q1Y2 4; Q2Y2 4; Q3Y2 5; Q4Y2 5"
    unit: "customers EOP"
    source: "[BP milestones 12-24 months] holds the customer count to five by Y2 exit while those accounts convert from pilots into annual production contracts and reporting-module expansion begins."
  - id: A8
    name: "Y3 quarter-end customers"
    value: "Q1Y3 6; Q2Y3 7; Q3Y3 8; Q4Y3 9"
    unit: "customers EOP"
    source: "[BP milestones 24-36 months; research market.som] reaches the middle of the stated 5-10 customer ambition and the researched Y3 SOM run-rate by year-end."
  - id: A9
    name: "Revenue recognition timing"
    value: "Midpoint customer count within each month or quarter"
    unit: "policy"
    source: "[startup-finance heuristic] new pilots and expansions are assumed to land halfway through a period on average rather than on day one."
  - id: A10
    name: "Blended recognized revenue per average active customer"
    value: "Y1 $15K/mo; Q1Y2 $18K/mo; Q2Y2 $22K/mo; Q3Y2 $26K/mo; Q4Y2 $30K/mo; Q1Y3 $33K/mo; Q2Y3 $36K/mo; Q3Y3 $39K/mo; Q4Y3 $42K/mo"
    unit: "USD K per customer-month"
    source: "[BP investorMemo.firstCustomer.initialContract; BP businessModel.expansionLevers; research market.som] starts at a $45K 90-day pilot, moves through the $150K-$300K initial production range, and exits Y3 at a $504K annualized ARPU once more cohorts and reporting modules attach."
  - id: A11
    name: "Gross margin ramp"
    value: "Y1 60%; Q1Y2 68%; Q2Y2 70%; Q3Y2 72%; Q4Y2 74%; Y3 75%"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct; research willingnessToPay] pilots carry heavier partner-verification and setup costs, then margin approaches the 75% target as integrations and evidence packs standardize."
  - id: A12
    name: "Founder / product loaded cash compensation"
    value: "180"
    unit: "USD K per year"
    source: "[BP team Founder / trust-and-safety product lead] startup-finance heuristic for a senior founder carrying both product and founder-led sales responsibilities."
  - id: A13
    name: "Engineering loaded cash compensation"
    value: "170"
    unit: "USD K per FTE-year"
    source: "[BP team Founding engineer and Second engineer] startup-finance heuristic for early full-stack, risk-pipeline, and partner-integration engineers."
  - id: A14
    name: "GTM loaded cash compensation"
    value: "160"
    unit: "USD K per FTE-year"
    source: "[BP team Design-partner / GTM lead; BP gtm.channels] startup-finance heuristic for a consultative, founder-assisted enterprise seller focused on pilots and partner referrals."
  - id: A15
    name: "Solutions / customer success loaded cash compensation"
    value: "130"
    unit: "USD K per FTE-year"
    source: "[BP product sixMonth; BP milestones 12-24 months] startup-finance heuristic for deployment, evidence-pack support, and early account expansion ownership."
  - id: A16
    name: "G&A / policy ops loaded cash compensation"
    value: "110"
    unit: "USD K per FTE-year"
    source: "[BP operations; BP risks] startup-finance heuristic for privacy, vendor management, finance, and regulator-response operations support."
  - id: A17
    name: "Hiring cadence"
    value: "Founder and founding engineer M1; second engineer M5; GTM lead M8; first solutions lead M13; third engineer M16; policy ops M18; second GTM M22; fourth engineer M27; second solutions lead M30"
    unit: "timing"
    source: "[BP team; BP strategicChoices.sequencingRationale] engineering and design-partner support land before the second GTM hire, keeping the ramp consistent with a proof-first wedge."
  - id: A18
    name: "Functional payroll allocation"
    value: "Founder 65% S&M / 35% G&A; engineering 100% R&D; GTM 100% S&M; solutions 50% R&D / 50% G&A; policy ops 100% G&A"
    unit: "allocation"
    source: "[BP team rationales; BP operations] the founder and GTM lead carry the commercial motion, engineers build the control plane, and solutions and policy ops split deployment plus compliance work."
  - id: A19
    name: "Non-payroll operating spend"
    value: "Y1 S&M $8K + 4% revenue monthly, R&D $10K monthly, G&A $10K monthly; Y2 S&M $10K + 5% revenue, R&D $12K, G&A $12K; Y3 S&M $12K + 5% revenue, R&D $14K, G&A $14K"
    unit: "USD K per month"
    source: "[startup-finance heuristic] covers cloud, analytics, travel, legal, audits, and compliance work for a trust-and-safety SaaS motion without adding a large services team."
  - id: A20
    name: "Monthly churn for unit economics"
    value: "1.8"
    unit: "percent"
    source: "[startup-finance heuristic] the product should be sticky once embedded in launch policy and evidence workflows, but the small logo base and evolving regulatory urgency argue against assuming best-in-class churn."
  - id: A21
    name: "Blended CAC"
    value: "208.3"
    unit: "USD K per net new customer"
    source: "Calculated from modeled Y2-Y3 sales and marketing spend of 1250.0K divided by 6 net new paid customers."
  - id: A22
    name: "Cash conversion policy"
    value: "EBITDA approximates operating cash movement"
    unit: "policy"
    source: "[startup-finance heuristic] no debt, capex, taxes, or material working-capital swings are modeled at this stage."
  - id: A23
    name: "Milestone financed by this round"
    value: "Reach 5 active customers, convert at least 3 into annual production contracts, prove 30%+ complaint reduction with <=5% reply-rate drag, and ship regulator-reporting before the seed round."
    unit: "milestone"
    source: "[BP milestones 0-12 months and 12-24 months; BP fundingAsk.useOfFundsSummary] this is the proof package used to size the pre-seed and reserve a 6-month buffer."
