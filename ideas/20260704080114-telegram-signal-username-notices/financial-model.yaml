scenarios:
  downside:
    description: "Pilots convert later, reporting attach lags, and the company exits Y3 with seven active customers instead of nine."
    y3RevenueK: 2404.4
    y3EbitdaK: -384.6
    cashLowPointK: -170.3
    keyAssumptionChanges:
      - "Customer ramp slips to 2 paid accounts at Y1 exit, 4 at Y2 exit, and 7 at Y3 exit."
      - "Blended revenue per active customer runs about 10% below the base case because expansion into more cohorts and reporting modules takes longer."
      - "Gross margin stays about 5 points below plan because partner costs and setup work remain less standardized."
  base:
    description: "A lean founder-led motion turns the first three paid design partners into five active accounts by Y2 exit and nine by Y3 exit."
    y3RevenueK: 3345.0
    y3EbitdaK: 393.9
    cashLowPointK: 536.5
    keyAssumptionChanges:
      - "Customer counts follow A6, A7, and A8, reaching five paid accounts by Y2 exit and nine by Y3 exit."
      - "Blended revenue per active customer rises from $15K per month in pilots to a $42K monthly run-rate by Q4Y3 as cohorts and reporting modules expand."
      - "Hiring stays proof-first, with the second GTM hire and second solutions hire only after early production accounts are live."
  upside:
    description: "Reference accounts and faster module attach pull deals forward, taking the business to ten active customers and stronger margins by Y3 exit."
    y3RevenueK: 4099.0
    y3EbitdaK: 1003.6
    cashLowPointK: 944.2
    keyAssumptionChanges:
      - "Customer ramp reaches 4 paid accounts at Y1 exit, 6 at Y2 exit, and 10 at Y3 exit."
      - "Blended revenue per active customer runs about 8% above base because rollout scope and reporting attach earlier."
      - "Gross margin is 1-2 points better than base once repeatable integrations reduce setup overhead."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Quarterly customer-month value is about 10% lower because accounts stay closer to pilot scope and delay reporting-module expansion."
    baseCase: "Customer-month value follows A10 and reaches $42K by Q4Y3."
    upsideCase: "Customer-month value lands about 8-10% above base if more cohorts and reporting modules attach earlier."
    y3RevenueImpactK: -334.4
    cashImpactK: -333.6
  - variable: "CAC"
    downsideCase: "S&M fixed spend rises by $2K-$3K per month and revenue-linked S&M goes to 5-7% as more founder time, travel, and hand-holding are needed."
    baseCase: "CAC stays near 208.3K as modeled."
    upsideCase: "Partner referrals and better references keep S&M closer to 3-4% of revenue."
    y3RevenueImpactK: 0.0
    cashImpactK: -191.2
  - variable: "churn"
    downsideCase: "Retention behaves like the company exits Y3 one customer lower because pilots do not all expand into entrenched production workflows."
    baseCase: "Unit economics assume 1.8% monthly churn while the main customer path already bakes in modest logo concentration risk."
    upsideCase: "Retention behaves like the company exits Y3 one customer higher because reporting and evidence workflows become embedded."
    y3RevenueImpactK: -333.0
    cashImpactK: -233.4
  - variable: "sales cycle"
    downsideCase: "Each new customer lands about one quarter later because procurement or policy review takes longer."
    baseCase: "The base case assumes the first paid pilot arrives in month 5 and new logos add in a measured founder-led rhythm."
    upsideCase: "Reference accounts shorten the cycle by roughly a quarter and pull the next design partner forward."
    y3RevenueImpactK: -450.0
    cashImpactK: -552.9
  - variable: "gross margin"
    downsideCase: "Gross margin stays 4-5 points below base because verification and setup work remain more bespoke."
    baseCase: "Gross margin ramps to the 75% business-plan target in Y3."
    upsideCase: "Gross margin runs 1-2 points above base if partner costs stay predictable and integrations template cleanly."
    y3RevenueImpactK: 0.0
    cashImpactK: -241.4
  - variable: "hiring pace"
    downsideCase: "Third engineer, policy ops, second GTM, and second solutions hires all pull 2-3 months earlier to support bespoke work."
    baseCase: "Hiring follows A17 and remains proof-first until production accounts are live."
    upsideCase: "The team can delay later hires because integrations and evidence packs stay more templated."
    y3RevenueImpactK: 0.0
    cashImpactK: -183.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from three paid design partners at Y1 exit compounding into nine active customers by Y3 exit while blended annual ARPU expands toward a $504K run-rate as more cohorts and reporting modules go live."
  - checkName: "Must go right"
    finding: "Pilot-to-production conversion has to stay near the business plan's 50%+ target while warning and step-up controls hold reply-rate drag to 5% or less so CPO-owned budgets actually unlock."
  - checkName: "Model breaks if"
    finding: "If sales cycles stretch by about a quarter or module attach lags, the downside case pushes cash below zero before the seed-proof milestone is fully de-risked."
  - checkName: "Next-round proof"
    finding: "The seed round is justified once the company has five active customers, at least three annual production contracts, and one accepted regulator-reporting workflow that expands ACV inside early accounts."
sanityChecks:
  ruleOf40: "Y3 growth 157.7% + EBITDA margin 11.8% = 169.5% (helped by a small Y2 base)."
  burnMultiple: "Y2 burn multiple is about 0.5x ($584.6K EBITDA burn on $1065.5K net new revenue), then Y3 turns EBITDA positive."
  revenuePerFte: "$334.5K Y3 using Q4Y3 10 FTE (benchmark $200-$400K SaaS)."
  flags:
    - "The base case still needs customers to expand from the initial $150K-$300K production range toward roughly $500K exit ARPU, so module attach and broader cohort coverage must materialize on schedule."
    - "Gross margin only reaches the 75% target if verification, device-intelligence, and evidence-pack setup stay productized rather than drifting into services-heavy custom deployments."
    - "The downside scenario goes cash-negative, so the modeled pre-seed is not large enough to absorb both slower conversions and a more bespoke delivery posture without a seed process starting earlier."
    - "Cash is modeled from EBITDA and excludes receivables timing, taxes, and capex, so actual runway could be somewhat shorter than the model shows."
