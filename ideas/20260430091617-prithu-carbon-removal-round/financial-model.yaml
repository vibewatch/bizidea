scenarios:
  downside:
    description: One-quarter slower closes and services-heavier onboarding delay the 12-program endpoint.
    y3RevenueK: 455.0
    y3EbitdaK: -430.0
    cashLowPointK: 890.0
    keyAssumptionChanges:
    - New customer adds slip by one quarter after Year 1, ending Year 3 at 10 live programs.
    - Production ARPU stays closer to $60K because fewer pilots convert to full usage.
    - Gross margin tops out at 65% because partner-delivered onboarding does not fully standardize.
  base:
    description: Three paid design partners in Year 1 compound into 12 live programs by Year 3 on measured hiring.
    y3RevenueK: 570.0
    y3EbitdaK: -314.7
    cashLowPointK: 1099.8
    keyAssumptionChanges:
    - Pilot ARPU averages $48K annualized for the first two quarters of each customer.
    - Production ARPU steps to $66K annualized after the first season.
    - Gross margin improves from about 59% in Year 1 to about 69% in Year 3 as partner-led delivery improves.
  upside:
    description: Faster renewals and slightly better farmer penetration lift revenue without a major hiring pull-forward.
    y3RevenueK: 660.0
    y3EbitdaK: -220.0
    cashLowPointK: 1210.0
    keyAssumptionChanges:
    - Two pilots renew one quarter earlier, lifting the blended customer mix toward production pricing.
    - Average production ARPU rises toward $72K as enrolled farmers per program approach the 10,000 midpoint sooner.
    - Gross margin reaches 72% as template reuse reduces exception-handling labor.
sensitivity:
- variable: ARPU
  downsideCase: Production ARPU averages $60K instead of $66K.
  baseCase: Production ARPU averages $66K.
  upsideCase: Production ARPU averages $72K.
  y3RevenueImpactK: -57.0
  cashImpactK: -145.0
- variable: CAC
  downsideCase: Founder-led selling plus travel pushes CAC to $35K.
  baseCase: CAC is $28K per new sponsor.
  upsideCase: Partner intros cut CAC to $22K.
  y3RevenueImpactK: 0.0
  cashImpactK: -84.0
- variable: churn
  downsideCase: Monthly churn rises to 2.5% as first-season programs fail to renew.
  baseCase: Monthly churn is 1.5%.
  upsideCase: Monthly churn improves to 1.0% with payout transparency and second-season adoption.
  y3RevenueImpactK: -38.0
  cashImpactK: -70.0
- variable: sales cycle
  downsideCase: Seasonal procurement slips average close time from 4 to 6 months.
  baseCase: Average sales cycle is about 4 months.
  upsideCase: Validated channel partners shorten close time to about 3 months.
  y3RevenueImpactK: -95.0
  cashImpactK: -160.0
- variable: gross margin
  downsideCase: Gross margin stalls at 65% because implementation remains semi-custom.
  baseCase: Gross margin reaches roughly 69% in Year 3.
  upsideCase: Gross margin reaches 72% through stronger template reuse.
  y3RevenueImpactK: 0.0
  cashImpactK: -75.0
- variable: hiring pace
  downsideCase: Two non-revenue hires are pulled forward by two quarters.
  baseCase: Hiring follows the measured quarter-end plan.
  upsideCase: Back-office hires stay delayed until repeat renewals are proven.
  y3RevenueImpactK: 15.0
  cashImpactK: -140.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Qualified sponsor leads] --> Pilots[Paid pilot programs]
      Pilots --> Renewals[Second-season contracts]
      Renewals --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[Gross profit after partner delivery]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case Year 3 revenue comes from 12 live sponsor programs reaching a blended $66K annual ARPU as pilots renew into second-season contracts.
- checkName: Must go right
  finding: The company must sign 3 paid design partners in Year 1 and keep onboarding partner-led so gross margin can climb toward 70% instead of collapsing into services.
- checkName: Model breaks if
  finding: A one-quarter sales-cycle slip combined with only 65% gross margin pushes Year 3 revenue toward $455K and shrinks the cash cushion enough to pressure an earlier raise.
- checkName: Next-round proof
  finding: The seed case is strongest once 2 pilots renew, 6 live programs are active, and at least one channel partner repeatedly sources deployments by roughly month 18.
sanityChecks:
  ruleOf40: Y3 growth 80.1% + EBITDA margin -55.2% = 24.9%.
  burnMultiple: Y3 burn multiple 1.2x using $314.7K net burn over $253.5K incremental revenue versus Y2.
  revenuePerFte: $48.5K Y3 recognized revenue per average FTE (mature SaaS benchmark roughly $200–400K; this plan still carries implementation-heavy capacity).
  flags:
  - Revenue per FTE stays well below scaled SaaS norms through Year 3, so the model only works if renewals and channel leverage improve faster after the seed round.
  - The cash curve assumes the full $2.0M pre-seed closes at model start; without that financing, cash would turn negative in Year 2.
  - Gross margin reaches the business-plan target only if partner-led onboarding truly contains implementation effort below the services-heavy failure mode called out in the BP.
  - 'Customer concentration remains high: by Year 3, losing even one large sponsor would materially dent ARR and delay the next raise.'
