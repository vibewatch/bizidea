- id: A1
  name: Model start month
  value: 2026-05
  unit: YYYY-MM
  source: '[BP date 2026-04-30; model starts the next month]'
- id: A2
  name: Opening cash after pre-seed close
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk $2–3M; model uses the low end $2.0M closing at start]'
- id: A3
  name: First-season pilot annual ARPU
  value: '48'
  unit: USDK per customer per year
  source: '[BP investorMemo initialContract $15k–$25k plus BP pricing per-farmer/per-verification midpoint heuristic]'
- id: A4
  name: Multi-season production annual ARPU
  value: '66'
  unit: USDK per customer per year
  source: '[BP pricing $25k–$35k annual contracts; research SOM implies roughly $65k–$67k/customer at 12 programs and 120,000 farmers]'
- id: A5
  name: Customer ramp
  value: 'Year 1: 3; Year 2: 7; Year 3: 12'
  unit: customers EOP
  source: '[BP milestones: 3 paid design partners in 0–12 months and 12 live programs in 24–36 months; Year 2 interpolated conservatively]'
- id: A6
  name: Gross margin ramp
  value: 'Year 1: 59%; Year 2: 64%; Year 3: 69%'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct 70 and operating assumption that partner-led onboarding preserves margin]'
- id: A7
  name: Founder / Exec loaded cash compensation
  value: '86.4'
  unit: USDK per FTE per year
  source: '[India early-stage climate/SaaS compensation heuristic: founder takes below-market cash plus 20% benefits/payroll load]'
- id: A8
  name: Engineering loaded cash compensation
  value: '60.0'
  unit: USDK per FTE per year
  source: '[India early-stage climate/SaaS compensation heuristic: senior product engineer plus 20% benefits/payroll load]'
- id: A9
  name: Product / implementation loaded cash compensation
  value: '43.2'
  unit: USDK per FTE per year
  source: '[India early-stage climate/SaaS compensation heuristic for product-implementation hybrid role]'
- id: A10
  name: Customer success / field ops loaded cash compensation
  value: '26.4'
  unit: USDK per FTE per year
  source: '[India field-operations startup compensation heuristic plus 20% load]'
- id: A11
  name: Sales / partnerships loaded cash compensation
  value: '43.2'
  unit: USDK per FTE per year
  source: '[India enterprise partnerships compensation heuristic plus 20% load]'
- id: A12
  name: G&A loaded cash compensation
  value: '21.6'
  unit: USDK per FTE per year
  source: '[India startup finance/admin compensation heuristic plus 20% load]'
- id: A13
  name: Non-payroll operating baseline
  value: 'Year 1: $7K/mo; Year 2: $10K/mo; Year 3: $13K/mo'
  unit: USDK per month
  source: '[Startup-finance heuristic for travel, cloud tools, legal/compliance, and admin in India-first enterprise SaaS]'
- id: A14
  name: CAC per new sponsor
  value: '28'
  unit: USDK per customer
  source: '[Founder-led India enterprise climate SaaS heuristic: 4-month cycle with travel-heavy design-partner selling]'
- id: A15
  name: Monthly churn
  value: '1.5'
  unit: percent
  source: '[BP investorMemo requires at least half of paid pilots convert to second season; modeled as moderate early enterprise logo churn heuristic]'
- id: A16
  name: Average sales cycle
  value: '4'
  unit: months
  source: '[BP buying tied to pilot approval and crop-cycle deadlines; startup-finance heuristic for founder-led enterprise sales]'
- id: A17
  name: Cash conversion simplification
  value: EBITDA approximates operating cash flow
  unit: policy
  source: '[Startup-finance heuristic: no debt, capex, or working-capital financing modeled separately in this pre-seed view]'
