competitors:
  - name: Grow Indigo
    stage: scale-up
    wedge: India-first regenerative agriculture and carbon platform tied to farmer aggregation, biological inputs, and carbon-credit buyer workflows.
    pricing: Custom / no public buyer pricing.
    strength: 本地分发与印度本土信誉强，包括在印度率先实现 Verra VM0042 签发，并明确承诺 75% 收益回流给农户。
    weaknessVsUs: More likely to operate as a bundled program platform and credit supplier than as a neutral white-label operating system for sponsors.
    sourceRefs:
      - 11
      - 12
      - 13
  - name: Boomitra
    stage: scale-up
    wedge: Global soil-carbon project developer using satellite- and AI-based MRV plus local project partners.
    pricing: Custom / buyer-led carbon credit sales; no public software pricing.
    strength: Demonstrated India issuance to 6,000 smallholders, support for one-acre plots, and a large proprietary soil dataset.
    weaknessVsUs: Oriented around Boomitra-run projects and its carbon marketplace rather than sponsor-owned workflow orchestration.
    sourceRefs:
      - 14
      - 15
      - 16
      - 17
      - 18
  - name: Regrow
    stage: scale-up
    wedge: Enterprise MRV and supply-chain / scope-3 platform for agribusinesses, CPGs, and project developers.
    pricing: Custom enterprise pricing.
    strength: Strong protocol-facing MRV credibility and enterprise distribution through partners like Cargill.
    weaknessVsUs: Product posture is top-down and portfolio-oriented, which leaves room for a narrower India smallholder ops layer.
    sourceRefs:
      - 19
      - 20
      - 21
      - 22
  - name: Agreena
    stage: scale-up
    wedge: Verra-verified European soil-carbon project plus supply-chain decarbonization and verified impact units.
    pricing: Custom / contact sales.
    strength: Scale, Verra verification, and an integrated supply-chain product for corporate buyers.
    weaknessVsUs: Europe-centered and better suited to mature corporate programs than to India-first field enrollment and payout transparency.
    sourceRefs:
      - 23
      - 24
      - 25
      - 26
  - name: Indigo Ag
    stage: incumbent
    wedge: Large agricultural sustainability platform spanning carbon credits, scope 3, agribusiness partnerships, and buyer demand.
    pricing: Custom / buyer and farmer program economics are not publicly listed.
    strength: 1M+ credits issued, Microsoft as repeat buyer, and substantial capital raised.
    weaknessVsUs: U.S.-centric incumbent with a broad suite and its own marketplace agenda rather than a lightweight neutral system of record for Indian programs.
    sourceRefs:
      - 27
      - 28
      - 29
      - 30
