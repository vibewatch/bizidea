  fiveForces:
    supplierPower:
      score: 4
      rationale: 注册机构、标准组织和被核证方接受的方法学集合都比较集中；ICVCM 目前只批准了有限的可持续农业方法，而 Gold Standard 仍掌握关键的 SOC 和 DMRV 基础设施。
      sourceRefs:
      - 31
      - 32
      - 33
    buyerPower:
      score: 4
      rationale: 赞助方既可以外包给项目开发方，也可以买更宽泛的 MRV 套件，甚至继续手工交付，因此新供应商必须靠更短启动周期和更少审计漏损把预算拿下来。
      sourceRefs:
      - 19
      - 20
      - 26
      - 30
    threatOfEntrants:
      score: 3
      rationale: 工作流软件本身不难做，但核证信任、方法学模板和现场合作网络没那么快能搭起来；现有玩家不断强调自有科学和数据栈，并不是没有原因。
      sourceRefs:
      - 13
      - 16
      - 19
      - 24
    threatOfSubstitutes:
      score: 5
      rationale: 当下默认方案仍然是手工：表格、外包现场团队和定制项目服务虽然扩张性差、MRV 成本高，但依旧能把事做完。
      sourceRefs:
      - 18
      - 21
      - 34
    competitiveRivalry:
      score: 4
      rationale: 竞争已经不轻，因为 Grow Indigo、Boomitra、Regrow、Agreena 和 Indigo 都在争夺相邻的土壤碳或 scope-3 预算，而印度项目面积还在持续增长。
      sourceRefs:
      - 8
      - 19
      - 23
      - 27
      - 29
  pestle:
  - factor: 政治
    impact: positive
    point: 印度正明确推动由政府支持的 FPO 组建，这会增加赞助方可合作的组织化农民群体。
    sourceRefs:
    - 3
    - 4
  - factor: 经济
    impact: negative
    point: 农业食品领域只拿到 4% 的气候融资，其中流向小农户的只有五分之一，因此预算形成仍然脆弱。
    sourceRefs:
    - 5
  - factor: 社会
    impact: positive
    point: 碳项目正在被卖成农民增收工具，而不只是 ESG 故事；因此分账透明度会直接影响信任和采用。
    sourceRefs:
    - 12
    - 14
    - 28
  - factor: 技术
    impact: positive
    point: 卫星、AI 和 DMRV 能力提升得已经足够快，让分布式小农户项目变得更可操作。
    sourceRefs:
    - 13
    - 16
    - 24
    - 33
  - factor: 法律
    impact: negative
    point: 方法学接受度和完整性规则还在变，如果创业公司太早支持过多框架，产品会变脆。
    sourceRefs:
    - 31
    - 32
  - factor: 环境
    impact: positive
    point: 气候智慧农业和再生实践瞄准的是真实的土壤与韧性问题，因此这个产品的核心问题不会随着 offset 情绪波动而消失。
    sourceRefs:
    - 5
    - 6
    - 8
  adoptionFrictionMatrix:
  - friction: 方法学与核证方碎片化
    severity: 高
    affectedBuyer: 可持续发展负责人 / 碳项目负责人
    mitigation: 先盯住一条作物走廊和一组被接受的方法学，再慢慢扩模板。
    sourceRefs:
    - 31
    - 32
    - 33
  - friction: 现场数据质量与实践核验
    severity: 高
    affectedBuyer: 碳项目经理和现场运营负责人
    mitigation: 使用离线优先工作流、证据完整性校验和卫星 QA 层。
    sourceRefs:
    - 13
    - 16
    - 21
  - friction: 农户信任与分账争议
    severity: 高
    affectedBuyer: COO / 合作社或项目运营方
    mitigation: 做透明分账单、碳信用销售可追踪性，以及赞助方侧的争议处理工作流。
    sourceRefs:
    - 12
    - 18
    - 28
  - friction: 合作方驱动的采购与实施复杂度
    severity: 中
    affectedBuyer: COO / 采购负责人
    mitigation: 和已经在聚合农户需求的项目开发方、FPO 渠道和注册机构伙伴一起卖。
    sourceRefs:
    - 10
    - 17
    - 20
    - 22
