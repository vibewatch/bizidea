    isEstimate: true
    sourceRefs:
    - 4
    - 7
    - 8
  sam:
    value: $6.0M
    rationale: 滩头市场约束：可触达的印度赞助方约 200 家（出口商、农业企业、FPO 联盟、项目开发方），他们正在启动第一条走廊试点 × 每年约 $30k 合同。
    isEstimate: true
    sourceRefs:
    - 3
    - 4
    - 8
  som:
    value: $0.8M
    rationale: 第 3 年可触达份额：12 个在跑项目 × $25k 基础费 + 120,000 名入组农户 × 约 $4 的用量费；这里按每个项目 10,000 名农户作为现实试点中位值，并让软件支出只占分账经济性的很小一部分。
    isEstimate: true
    sourceRefs:
    - 12
    - 14
    - 28
bottomUpSizingDrivers:
- driver: 可服务赞助方的组织化上限
  value: 以印度 10,000-FPO 计划作为农民集体组织化的上界
  source: '[4]'
- driver: 小农户占比
  value: 印度 86.1% 的农民是小农和边际农户，通常不足 2 公顷
  source: '[7]'
- driver: 现有赛道活跃度
  value: 印度已有超过 50 个农业碳项目，目标覆盖 1,650 万公顷
  source: '[8]'
- driver: 单项目示意农户数
  value: 每个客户估算 10,000 名农户；下限参考 Boomitra 6,000 名农户签发案例，上限参考 Grow Indigo 更大的项目面积
  source: calc using [12], [14]
- driver: 示意合同金额
  value: $25k-$35k 的混合年合同估算
  source: est.
categoryDynamics:
  growthRate: +69% YoY delivered carbon removals on the CDR.fyi dashboard (broad carbon-removal proxy, not agriculture-only)
  growthRateSourceRefs:
  - 35
  tailwinds:
  - point: 印度已经有一层清晰的农户聚合组织体系——10,000-FPO 计划及其配套机构。
    sourceRefs:
    - 3
    - 4
  - point: 印度的落地证明正在从试点走向签发，Grow Indigo 和 Boomitra 都已经展示出可审计的小农户碳成果。
    sourceRefs:
    - 12
    - 14
  - point: 企业买方拉力仍然存在：Microsoft 继续采购土壤碳移除，而 CDR.fyi 跟踪到的广义 CDR 支出也还在上升。
    sourceRefs:
    - 28
    - 35
  - point: 标准组织正通过批准农业方法学和推进 DMRV 项目，逐步为这个赛道建立合法性。
    sourceRefs:
    - 31
    - 32
    - 33
  headwinds:
  - point: 农业食品领域在气候融资里仍然拿钱太少，流向小农户的比例更低，因此项目预算并不稳。
    sourceRefs:
    - 5
  - point: 抽样、数据系统搭建、验证和 MRV 仍然会带来很重的前期成本，市场自然会往服务化倾斜。
    sourceRefs:
    - 21
    - 34
  - point: 完整性质疑很强，方法学广度又有限，任何试图一次性覆盖过多场景的产品都可能被核证方打回。
    sourceRefs:
    - 31
    - 32
competitors:
- name: Grow Indigo
  stage: 规模化阶段
  wedge: 印度优先的再生农业与碳平台，把农户聚合、生物制剂和碳信用买方工作流绑在一起。
  pricing: 定制定价 / 无公开买方报价。
  strength: 本地分销与印度场景可信度强，已经做出印度首个 Verra VM0042 签发，并明确承诺 75% 收益回流农民。
  weaknessVsUs: 它更像打包式项目平台和碳信用供给方，而不是赞助方可白标使用的中立操作系统。
  sourceRefs:
  - 11
  - 12
  - 13
- name: Boomitra
  stage: 规模化阶段
  wedge: 全球土壤碳项目开发方，依靠卫星和 AI 做 MRV，并通过本地合作伙伴落地。
  pricing: 定制定价 / 以买方驱动的碳信用销售为主，无公开软件定价。
  strength: 已经在印度完成 6,000 名小农户签发，支持 1 英亩地块，并拥有大规模自有土壤数据集。
  weaknessVsUs: 它更围绕 Boomitra 自己运行的项目和其碳市场，而不是赞助方自有的工作流编排。
  sourceRefs:
  - 14
  - 15
  - 16
  - 17
  - 18
- name: Regrow
  stage: 规模化阶段
  wedge: 面向农业企业、消费品公司和项目开发方的企业级 MRV 与供应链 / scope-3 平台。
  pricing: 企业定制定价。
  strength: 在面向协议的 MRV 和企业分销上很强，还借助 Cargill 等伙伴放大。
  weaknessVsUs: 产品姿态偏自上而下、偏组合管理，因此给更窄的印度小农户运营层留下了空间。
  sourceRefs:
  - 19
  - 20
  - 21
  - 22
- name: Agreena
  stage: 规模化阶段
  wedge: 经 Verra 核证的欧洲土壤碳项目，加上供应链减碳和经验证的影响单位。
  pricing: 定制定价 / 需联系销售。
  strength: 规模大、通过 Verra 核证，并为企业买方提供一体化供应链产品。
  weaknessVsUs: 它更适合成熟欧洲企业项目，不是为印度优先的田间入组和分账透明度而生。
  sourceRefs:
  - 23
  - 24
  - 25
  - 26
- name: Indigo Ag
  stage: 成熟厂商
  wedge: 大型农业可持续平台，覆盖碳信用、scope 3、农业企业合作和买方需求。
  pricing: 定制定价 / 买方与农户的项目经济性没有公开。
  strength: 已签发超过 100 万份信用，Microsoft 是重复买方，而且融资规模可观。
  weaknessVsUs: 它是以美国为中心的成熟玩家，产品线更重，也有自己的交易平台诉求，并不是面向印度项目的轻量中立系统记录层。
  sourceRefs:
  - 27
  - 28
  - 29
  - 30
regulatoryTechnicalConstraints:
- point: 方法学接受度仍然狭窄；ICVCM 直到最近才把主要可持续农业方法学纳入 CCP 认可，因此产品上线时必须刻意把范围压窄。
  sourceRefs:
  - 31
- point: Gold Standard 的 SOC 模块和 DMRV 项目说明赛道在前进，但也说明标准与数字证据规则仍在变化。
  sourceRefs:
  - 32
  - 33
- point: 抽样、数据系统、验证和 MRV 的高固定成本，会把交付推向服务化，也让证据质量不佳的代价变得格外高。
  sourceRefs:
  - 21
  - 34
- point: 收益分配本身就是系统问题：Boomitra 的分账政策清楚表明，生产者付款依赖签发后的销售和透明的分配逻辑。
  sourceRefs:
  - 18
validationSignals:
- point: Prithu 在 2026 年 4 月的融资明确指向小农户招募和一线碳运营。
  sourceRefs:
  - 1
  - 2
- point: Grow Indigo 融资超过 $6M，此后又从募资走到了印度本地土壤碳签发。
  sourceRefs:
  - 9
  - 12
- point: Boomitra 已在印度完成覆盖 6,000 名小农户的签发，并表示 1 英亩地块也能参与。
  sourceRefs:
  - 14
  - 15
- point: Regrow 通过项目开发方以及 Cargill 主导项目获得了企业级验证，说明 MRV 基础设施存在持续的赞助方需求。
  sourceRefs:
  - 20
  - 22
- point: Agreena 已经在多国规模上销售经 Verra 核证的碳信用和经验证的供应链单位。
  sourceRefs:
  - 25
  - 26
- point: Indigo 获得 Microsoft 重复采购，并表示其最新一批碳项目会把数千万美元导向农民。
  sourceRefs:
  - 28
  - 29
- point: CDR.fyi 跟踪到的更广义碳移除市场，仍然在支出和交付上持续增长，说明买方预算还在形成。
  sourceRefs:
  - 35
openQuestions:
- 印度赞助方会把这层软件单独买下来，还是只把它视作打包执行合同中的一个组件？
- 首批产品化证据模板应先支持哪组“方法学 / 核证方”组合：VM0042、Social Carbon、Gold Standard SOC 模块，还是其他路径？
- 当前印度项目中，农户分账台账和争议处理权实际掌握在谁手里？
- 若要让某条作物走廊在第一次核证审查中以低异常率通过，离线现场工作流的最低要求是什么？
- 最快的入口究竟是哪一个：出口商、投入品分销商、FPO 联盟，还是碳项目开发方？
