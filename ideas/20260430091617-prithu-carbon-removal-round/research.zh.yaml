        - 21
        - 34
    competitiveRivalry:
      score: 4
      rationale: Rivalry is already meaningful because Grow Indigo, Boomitra, Regrow, Agreena, and Indigo all attack adjacent soil-carbon or scope-3 budgets while India project acreage keeps expanding.
      sourceRefs:
        - 8
        - 19
        - 23
        - 27
        - 29
  pestle:
    - factor: political
      impact: positive
      point: India has an explicit state-backed FPO formation push, which increases the number of organized farmer groups that sponsors can work through.
      sourceRefs:
        - 3
        - 4
    - factor: economic
      impact: negative
      point: Agrifood receives only 4% of climate finance and only a fifth of that reaches smallholders, so budget formation is still fragile.
      sourceRefs:
        - 5
    - factor: social
      impact: positive
      point: Carbon programs are being sold as farmer income, not just ESG; payout transparency therefore directly shapes trust and adoption.
      sourceRefs:
        - 12
        - 14
        - 28
    - factor: technological
      impact: positive
      point: Satellite, AI, and DMRV capabilities are improving quickly enough to make distributed smallholder programs more tractable.
      sourceRefs:
        - 13
        - 16
        - 24
        - 33
    - factor: legal
      impact: negative
      point: Methodology acceptance and integrity rules are still evolving, which creates product brittleness if the startup tries to support too many frameworks too early.
      sourceRefs:
        - 31
        - 32
    - factor: environmental
      impact: positive
      point: Climate-smart and regenerative practices address real soil and resilience needs, which gives the product a durable problem anchor beyond offset speculation.
      sourceRefs:
        - 5
        - 6
        - 8
  adoptionFrictionMatrix:
    - friction: Methodology and verifier fragmentation
      severity: high
      affectedBuyer: Head of sustainability / carbon-program lead
      mitigation: Start with one crop corridor and a narrow set of accepted methodologies before expanding templates.
      sourceRefs:
        - 31
        - 32
        - 33
    - friction: Field-data quality and practice verification
      severity: high
      affectedBuyer: Carbon program manager and field-ops lead
      mitigation: Use offline-first workflows, evidence completeness checks, and satellite QA layers.
      sourceRefs:
        - 13
        - 16
        - 21
    - friction: 农户信任与分账争议
      severity: high
      affectedBuyer: COO / cooperative or program operator
      mitigation: Build transparent payout statements, credit-sales traceability, and sponsor-side dispute workflows.
      sourceRefs:
        - 12
        - 18
        - 28
    - friction: Partner-led procurement and implementation complexity
      severity: medium
      affectedBuyer: COO / procurement owner
      mitigation: Sell with project developers, FPO channels, and registry partners that already aggregate farmer demand.
      sourceRefs:
        - 10
        - 17
        - 20
        - 22
