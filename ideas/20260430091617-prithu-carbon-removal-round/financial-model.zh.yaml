scenarios:
  downside:
    description: 成交速度每季度慢一个季度，且更偏服务化的导入拖慢了达到 12 个项目的终点。
    y3RevenueK: 455.0
    y3EbitdaK: -430.0
    cashLowPointK: 890.0
    keyAssumptionChanges:
    - 第 1 年之后新增客户每次都延后一季度，使第 3 年末仅达到 10 个在运行项目。
    - 由于更少试点转入完整使用，生产 ARPU 更接近 $60K。
    - 由于合作伙伴交付的导入未能真正标准化，毛利率最高只能到 65%。
  base:
    description: 第 1 年的 3 家付费设计合作伙伴，在克制招聘下复利增长为第 3 年的 12 个在运行项目。
    y3RevenueK: 570.0
    y3EbitdaK: -314.7
    cashLowPointK: 1099.8
    keyAssumptionChanges:
    - 前两个季度中，每个客户的试点 ARPU 年化平均为 $48K。
    - 首个季节之后，生产 ARPU 提升到年化 $66K。
    - 随着合作伙伴主导交付改善，毛利率从第 1 年约 59% 提升到第 3 年约 69%。
  upside:
    description: 更快的续约和略高的农户渗透率在不大幅提前招聘的情况下抬升收入。
    y3RevenueK: 660.0
    y3EbitdaK: -220.0
    cashLowPointK: 1210.0
    keyAssumptionChanges:
    - 有两个试点提前一个季度续约，使客户结构更快向生产定价倾斜。
    - 由于每个项目的已纳入农户数更快逼近 10,000 的中点，平均生产 ARPU 提升至约 $72K。
    - 随着模板复用减少异常处理人工，毛利率达到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 生产 ARPU 平均为 $60K，而不是 $66K。
  baseCase: 生产 ARPU 平均为 $66K。
  upsideCase: 生产 ARPU 平均为 $72K。
  y3RevenueImpactK: -57.0
  cashImpactK: -145.0
- variable: CAC
  downsideCase: 创始人主导销售加差旅使 CAC 升至 $35K。
  baseCase: 每个新发起方的 CAC 为 $28K。
  upsideCase: 合作伙伴引荐将 CAC 降至 $22K。
  y3RevenueImpactK: 0.0
  cashImpactK: -84.0
- variable: churn
  downsideCase: 由于首季项目无法续约，月流失率升至 2.5%。
  baseCase: 月流失率为 1.5%。
  upsideCase: 随着收益透明和第二季采用，月流失率改善至 1.0%。
  y3RevenueImpactK: -38.0
  cashImpactK: -70.0
- variable: sales cycle
  downsideCase: 季节性采购延误使平均成交时间从 4 个月拉长到 6 个月。
  baseCase: 平均销售周期约为 4 个月。
  upsideCase: 经验证的渠道合作伙伴把成交时间缩短到约 3 个月。
  y3RevenueImpactK: -95.0
  cashImpactK: -160.0
- variable: gross margin
  downsideCase: 由于实施仍是半定制化，毛利率停在 65%。
  baseCase: 第 3 年毛利率达到约 69%。
  upsideCase: 通过更强的模板复用，毛利率达到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -75.0
- variable: hiring pace
  downsideCase: 两个不直接带来收入的岗位提前两个季度招聘。
  baseCase: 招聘按克制的季度末计划进行。
  upsideCase: 后台岗位继续延后，直到重复续约得到验证。
  y3RevenueImpactK: 15.0
  cashImpactK: -140.0
modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      Leads[合格的发起方线索] --> Pilots[付费试点项目]
      Pilots --> Renewals[第二季合同]
      Renewals --> Revenue[订阅与使用费收入]
      Revenue --> GrossProfit[合作伙伴交付后的毛利润]
      GrossProfit --> Cash[现金跑道]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，第 3 年收入来自 12 个在运行的发起方项目；随着试点续约为第二季合同，混合年度 ARPU 达到 $66K。
- checkName: 必须做对的事
  finding: 公司必须在第 1 年签下 3 家付费设计合作伙伴，并保持导入由合作伙伴主导，使毛利率能够逼近 70%，而不是坍塌为服务业务。
- checkName: 模型失效条件
  finding: 如果销售周期延长一个季度，同时毛利率只有 65%，第 3 年收入会下滑到约 $455K，现金缓冲也会收缩到迫使公司更早融资。
- checkName: 下一轮融资证明点
  finding: 一旦有 2 个试点续约、6 个项目在运行，并且到约第 18 个月至少有一个渠道合作伙伴能重复带来部署，种子轮故事才最有说服力。
sanityChecks:
  ruleOf40: Y3 growth 80.1% + EBITDA margin -55.2% = 24.9%.
  burnMultiple: Y3 burn multiple 1.2x using $314.7K net burn over $253.5K incremental revenue versus Y2.
  revenuePerFte: $48.5K Y3 recognized revenue per average FTE (mature SaaS benchmark roughly $200–400K; this plan still carries implementation-heavy capacity).
  flags:
  - 到第 3 年，每 FTE 收入仍明显低于成熟 SaaS 常态，因此只有在种子轮后续约和渠道杠杆更快改善时，模型才成立。
  - 现金曲线假设完整的 $2.0M pre-seed 在模型起点到账；如果没有这笔融资，现金会在第 2 年转负。
  - 只有当合作伙伴主导导入真的能把实施工作量控制在商业计划指出的“重服务失败模式”以下时，毛利率才能达到商业计划目标。
  - 到第 3 年客户集中度仍然很高：即使失去一家大客户，也会明显打击 ARR 并推迟下一轮融资。