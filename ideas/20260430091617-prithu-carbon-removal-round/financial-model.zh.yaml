slug: smallholder-carbon-rails
date: '2026-04-30'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: YYYY-MM
  source: '[BP 日期 2026-04-30；模型从次月开始]'
- id: A2
  name: pre-seed 交割后的期初现金
  value: '2000'
  unit: USDK
  source: '[BP fundingAsk $2–3M；模型采用起始时点交割的低端值 $2.0M]'
- id: A3
  name: 首季试点的年度 ARPU
  value: '48'
  unit: USDK per customer per year
  source: '[BP investorMemo initialContract $15k–$25k，外加 BP pricing 中按农户和按核证计费的中位启发式]'
- id: A4
  name: 多季生产客户的年度 ARPU
  value: '66'
  unit: USDK per customer per year
  source: '[BP pricing $25k–$35k annual contracts；research SOM 暗示在 12 个项目、120,000 名农户时，每客户约 $65k–$67k]'
- id: A5
  name: 客户爬坡
  value: '第 1 年: 3；第 2 年: 7；第 3 年: 12'
  unit: customers EOP
  source: '[BP milestones：0–12 个月 3 家付费设计合作伙伴，24–36 个月 12 个在运行项目；第 2 年保守插值]'
- id: A6
  name: 毛利率爬坡
  value: '第 1 年: 59%；第 2 年: 64%；第 3 年: 69%'
  unit: percent
  source: '[BP businessModel targetGrossMarginPct 70，以及合作伙伴主导导入可保住毛利的经营假设]'
- id: A7
  name: 创始人 / 高管总现金薪酬
  value: '86.4'
  unit: USDK per FTE per year
  source: '[印度早期气候 / SaaS 薪酬启发式：创始人领取低于市场水平的现金，加 20% 福利 / 薪税负担]'
- id: A8
  name: 工程团队总现金薪酬
  value: '60.0'
  unit: USDK per FTE per year
  source: '[印度早期气候 / SaaS 薪酬启发式：高级产品工程师，加 20% 福利 / 薪税负担]'
- id: A9
  name: 产品 / 实施岗位总现金薪酬
  value: '43.2'
  unit: USDK per FTE per year
  source: '[印度早期气候 / SaaS 对产品与实施混合岗位的薪酬启发式]'
- id: A10
  name: 客户成功 / 田间运营岗位总现金薪酬
  value: '26.4'
  unit: USDK per FTE per year
  source: '[印度田间运营创业公司薪酬启发式，加 20% 负担]'
- id: A11
  name: 销售 / 合作伙伴岗位总现金薪酬
  value: '43.2'
  unit: USDK per FTE per year
  source: '[印度企业合作岗位薪酬启发式，加 20% 负担]'
- id: A12
  name: G&A 总现金薪酬
  value: '21.6'
  unit: USDK per FTE per year
  source: '[印度创业公司财务 / 行政薪酬启发式，加 20% 负担]'
- id: A13
  name: 非薪资运营基线
  value: '第 1 年: $7K/mo；第 2 年: $10K/mo；第 3 年: $13K/mo'
  unit: USDK per month
  source: '[面向印度优先企业 SaaS 的创业财务启发式，覆盖差旅、云工具、法务合规和行政]' 
- id: A14
  name: 每个新发起方的 CAC
  value: '28'
  unit: USDK per customer
  source: '[创始人主导的印度企业气候 SaaS 启发式：4 个月周期，设计合作伙伴销售差旅较重]'
- id: A15
  name: 月流失率
  value: '1.5'
  unit: percent
  source: '[BP investorMemo 要求至少一半付费试点转入第二季；模型采用早期企业客户中等流失启发式]'
- id: A16
  name: 平均销售周期
  value: '4'
  unit: months
  source: '[BP 中采购与试点批准和作物周期节点绑定；采用创始人主导企业销售的创业财务启发式]'
- id: A17
  name: 现金转换简化假设
  value: EBITDA 近似等于经营现金流
  unit: policy
  source: '[创业财务启发式：在这个 pre-seed 视图中，不单独建模债务、资本开支或营运资金融资]'
