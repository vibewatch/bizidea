slug: smallholder-carbon-rails
date: '2026-04-30'
currency: USD
modelStartMonth: 2026-05
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-05
    unit: YYYY-MM
    source: '[BP 日期 2026-04-30；模型从次月启动]'
  - id: A2
    name: pre-seed 完成后的期初现金
    value: '2000'
    unit: USDK
    source: '[BP fundingAsk 为 $2–3M；模型采用起始即到账的低端值 $2.0M]'
  - id: A3
    name: 首季试点年化 ARPU
    value: '48'
    unit: USDK per customer per year
    source: '[BP investorMemo 的初始合同为 $15k–$25k，再叠加 BP 中按农户/按核证计费的中位启发式假设]'
  - id: A4
    name: 多季正式运行年化 ARPU
    value: '66'
    unit: USDK per customer per year
    source: '[BP 定价为 $25k–$35k 年合同；research 中的 SOM 意味着在 12 个项目、120,000 名农户时，每客户约 $65k–$67k]'
  - id: A5
    name: 客户爬坡
    value: 'Year 1: 3; Year 2: 7; Year 3: 12'
    unit: customers EOP
    source: '[BP 里程碑：0–12 个月签下 3 个付费共创客户，24–36 个月达到 12 个在运行项目；第 2 年采用保守插值]'
  - id: A6
    name: 毛利率爬坡
    value: 'Year 1: 59%; Year 2: 64%; Year 3: 69%'
    unit: percent
    source: '[BP businessModel 的 targetGrossMarginPct 为 70，且运营假设认为由合作伙伴主导入驻能保住毛利]'
  - id: A7
    name: 创始人/高管现金总包
    value: '86.4'
    unit: USDK per FTE per year
    source: '[印度早期气候/SaaS 公司薪酬启发：创始人领取低于市场价现金，再加 20% 福利/薪资附加]'
  - id: A8
    name: 工程岗位现金总包
    value: '60.0'
    unit: USDK per FTE per year
    source: '[印度早期气候/SaaS 公司薪酬启发：高级产品工程师薪酬加 20% 福利/薪资附加]'
  - id: A9
    name: 产品/实施岗位现金总包
    value: '43.2'
    unit: USDK per FTE per year
    source: '[印度早期气候/SaaS 公司针对产品-实施复合角色的薪酬启发]'
  - id: A10
    name: 客户成功/田间运营岗位现金总包
    value: '26.4'
    unit: USDK per FTE per year
    source: '[印度田间运营创业公司薪酬启发，再加 20% 附加]'
  - id: A11
    name: 销售/合作岗位现金总包
    value: '43.2'
    unit: USDK per FTE per year
    source: '[印度企业合作岗位薪酬启发，再加 20% 附加]'
  - id: A12
    name: 综合行政岗位现金总包
    value: '21.6'
    unit: USDK per FTE per year
    source: '[印度创业公司财务/行政岗位薪酬启发，再加 20% 附加]'
  - id: A13
    name: 非薪酬运营基线
    value: 'Year 1: $7K/mo; Year 2: $10K/mo; Year 3: $13K/mo'
    unit: USDK per month
    source: '[面向印度优先企业 SaaS 的创业财务启发，覆盖差旅、云工具、法务/合规与行政]'
  - id: A14
    name: 每个新赞助方 CAC
    value: '28'
    unit: USDK per customer
    source: '[创始人主导的印度企业气候 SaaS 启发：销售周期 4 个月，且共创客户销售差旅较重]'
  - id: A15
    name: 月度流失率
    value: '1.5'
    unit: percent
    source: '[BP investorMemo 要求至少一半付费试点转入第二季；模型按早期企业客户中等流失率启发处理]'
  - id: A16
    name: 平均销售周期
    value: '4'
    unit: months
    source: '[BP 购买决策与试点批准及作物周期截止时间相关；采用创始人主导企业销售的创业财务启发]'
  - id: A17
    name: 现金转换简化假设
    value: EBITDA approximates operating cash flow
    unit: policy
    source: '[创业财务启发：在此 pre-seed 视角中，不单独建模债务、资本开支或营运资金融资]'
