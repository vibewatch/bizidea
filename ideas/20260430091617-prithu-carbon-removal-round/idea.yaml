problem: Smallholder carbon projects break on operations long before they break on demand. Agri-enterprises, food exporters, and carbon developers still rely on spreadsheets, field agents, and bespoke consultants to enroll farmers, collect evidence, and package project data into credit-ready records. That makes program launch slow, verification expensive, and farmer payouts opaque enough to kill trust.
targetUser:
  primary: Sustainability and carbon-program managers at Indian agri-input distributors, food exporters, and farmer cooperatives running climate-smart agriculture pilots with 5,000 to 50,000 smallholders.
  secondary: Project developers and rural field-operations teams responsible for farmer enrollment and evidence collection.
  buyer: Head of sustainability, carbon business unit GM, or COO of the agri-enterprise sponsor.
startupThesis:
  nonObviousInsight: The scarce asset in nature-based carbon is not buyer demand for credits but the operational rail that turns fragmented smallholder activity into auditable, payout-linked carbon evidence. Once climate farming is sold as new farmer income, whoever owns onboarding, evidence capture, and revenue-share logic becomes the system of record.
  beachhead: Indian agri-enterprises and exporters launching their first climate-farming carbon program across one crop corridor and 5,000 to 20,000 contracted smallholders.
  wedge: A mobile-first carbon program OS that enrolls farmers, captures geo-tagged practice evidence, maps it to methodology-specific checklists, and produces verifier-ready project packets.
  whyNowCatalyst: Prithu's funding specifically targets on-ground operations, smallholder onboarding, and carbon-credit monetization, confirming that execution rails are the urgent choke point in climate farming.
  ventureScalePath: Start as the operating system for smallholder soil-carbon and regenerative agriculture programs, then expand into farmer payouts, embedded financing, crop-sourcing compliance, and the data layer used by carbon buyers, insurers, and lenders.
solution: Smallholder Carbon Rails gives climate-program operators a workflow stack for farmer enrollment, field evidence capture, methodology checks, and payout transparency. Field agents use an offline mobile app to register growers, land parcels, and practice changes with geo-tagged photos and timestamped attestations. Program managers get a dashboard that flags missing evidence, cohort-level readiness, and verifier handoff status instead of chasing WhatsApp threads and spreadsheets. The platform also generates farmer-facing payout statements and API exports for registries, auditors, or downstream buyers. Over time, the proprietary asset is the longitudinal dataset linking practices, yields, and credit outcomes at smallholder scale.
goToMarketSeed:
  firstCustomer: A mid-market Indian food exporter or agri-input distributor piloting regenerative procurement in one state with 10,000 contracted smallholders.
  buyingTrigger: Approval of a new climate-farming pilot, carbon-credit monetization initiative, or investor-backed sustainability target that requires farmer enrollment this season.
  currentAlternative: Spreadsheets, field-service vendors, WhatsApp coordination, and bespoke project developers handling MRV manually.
  switchingReason: The product cuts program launch time, reduces verification leakage, and gives the sponsor a single source of truth for farmer evidence and payout logic without building an internal carbon ops team.
  pricingHypothesis: Annual platform fee plus per-enrolled-farmer and per-verification-cycle charges.
