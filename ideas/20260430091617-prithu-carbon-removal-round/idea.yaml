topRisks:
  - name: Methodology fragmentation
    description: Carbon methodologies and verifier requirements may vary enough that a single product abstraction becomes brittle.
    mitigation: Start with one crop corridor and a narrow set of evidence templates, then expand only after repeated verifier acceptance.
  - name: Services-heavy deployment
    description: Customers may expect extensive field operations support, which could compress software margins.
    mitigation: Sell through sponsors that already manage field teams and productize onboarding templates, training, and partner integrations.
  - name: Farmer trust and payout disputes
    description: If farmers do not understand how evidence translates to payments, adoption and retention can collapse.
    mitigation: Build transparent payout statements, multilingual mobile receipts, and sponsor-side dispute workflows from day one.
