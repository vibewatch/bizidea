topRisks:
- name: 方法学碎片化
  description: 不同碳方法学和核证要求之间的差异，可能大到让单一产品抽象变得脆弱。
  mitigation: 先守住一条作物走廊和一套收证模板，只有在多次通过核证后再往外扩。
- name: 部署过度依赖服务
  description: 客户可能会期待大量现场运营支持，从而压缩软件毛利。
  mitigation: 优先卖给已经在管理现场团队的赞助方，并把导入模板、培训和合作方集成产品化。
- name: 农户信任与分账争议
  description: 如果农民看不懂证据是怎么对应到付款的，采用率和留存都会迅速塌掉。
  mitigation: 从第一天起就做透明分账单、多语言移动收据，以及赞助方侧的争议处理工作流。
