problem: 小农户碳项目往往不是先死在需求端，而是先死在运营端。农业企业、食品出口商和碳项目开发方，今天仍靠表格、地推人员和定制顾问去招募农户、收集证据，再把项目数据拼成可签发信用的记录。结果就是项目启动慢、核证成本高、农民分账又不透明，信任很容易被拖垮。
targetUser:
  primary: 在印度农业投入品分销商、食品出口商和农民合作组织里，负责气候智慧农业试点的可持续发展负责人和碳项目经理；其项目通常覆盖 5,000 到 50,000 名小农户。
  secondary: 负责农户招募与证据采集的项目开发方和乡村现场运营团队。
  buyer: 农业企业赞助方里的可持续发展负责人、碳业务单元 GM 或 COO。
startupThesis:
  nonObviousInsight: 基于自然的碳信用里，真正稀缺的资产不是买方需求，而是把分散的小农户行为变成可审计、能和分账挂钩的碳证据的运营基础设施。一旦气候农业被卖成新的农民收入来源，谁掌握招募、证据采集和收益分配逻辑，谁就会成为系统记录层。
  beachhead: 正在某一条作物走廊、面向 5,000 到 20,000 名签约小农户上线第一期气候农业碳项目的印度农业企业和出口商。
  wedge: 一套移动优先的碳项目操作系统：负责农户入组、采集带地理标签的实践证据、映射到方法学清单，并生成可直接交给核证方的项目资料包。
  whyNowCatalyst: Prithu 的融资明确投向一线运营、小农户招募和碳信用变现，等于再次确认：气候农业眼下最急的堵点就在执行基础设施。
  ventureScalePath: 先做小农户土壤碳和再生农业项目的操作系统，再往农户分账、嵌入式融资、作物采购合规，以及碳信用买方、保险方和贷款方会用到的数据层扩张。
solution: Smallholder Carbon Rails 给气候项目运营方提供一整套工作流：农户招募、现场证据采集、方法学校验和分账透明化。地推人员用离线移动应用登记种植户、地块和耕作变化，附上带地理标签的照片和时间戳声明。项目经理打开后台，不再追着 WhatsApp 线程和表格跑，而是直接看到哪些证据缺失、哪个批次已经接近就绪、资料交接到核证方进展到哪一步。平台还会生成面向农户的分账单，并输出给注册机构、审计方或下游买方的 API 数据。长期看，真正的专有资产是一套纵向数据：把实践、产量和碳信用结果在小农户规模上连起来。
goToMarketSeed:
  firstCustomer: 印度一家中型食品出口商或农业投入品分销商，正在某个邦试点再生采购项目，手里有 10,000 名签约小农户。
  buyingTrigger: 新气候农业试点、碳信用变现项目，或带投资人压力的可持续目标获批，而且这个季节就要把农户招进来。
  currentAlternative: 表格、现场服务商、WhatsApp 协调，以及手工处理 MRV 的定制项目开发方。
  switchingReason: 这套产品能缩短项目启动时间，减少核证环节的证据漏损，还能在不自建碳运营团队的前提下，让赞助方拥有一份关于农户证据和分账逻辑的单一真实来源。
  pricingHypothesis: 年度平台费，加上按入组农户数和按核证周期计费。
