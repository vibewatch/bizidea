    sourceRefs:
      - 2
  - point: 市场正在围绕基于自然的碳移除平台收敛，但这些平台下方仍然缺一层标准化运营底座。
    signalRefs:
      - 基于自然的碳移除正在形成平台品类
    sourceRefs:
      - 1
      - 3
  - point: 连选题理由本身都指向 MRV 加入驻是最锋利的切口，这说明真正的瓶颈在工作流执行，而不是碳信用市场流动性。
    signalRefs:
      - MRV 加田间运营才是真正的切口
    sourceRefs:
      - 1
      - 2
      - 3
differentiator: 大多数碳软件都是从注册流程文件或自上而下的仪表盘开始做起。这款产品则从项目真正失败的地方切入：农户入驻、田间证据质量，以及在网络不稳定的小农户环境下建立分账信任。由此形成的护城河来自嵌入式工作流、本地化田间数据网络，以及通用 MRV 工具或服务公司很难复制的结构化数据集。
