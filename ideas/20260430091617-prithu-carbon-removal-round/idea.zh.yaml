problem: 小农户碳项目往往不是先败在需求，而是先卡死在运营环节。农业企业、食品出口商和碳项目开发方至今仍靠表格、地推人员和定制顾问来完成农户入驻、证据采集，以及把项目数据整理成可用于发放碳信用的记录。这会让项目上线很慢、核证成本很高，也让农户分账不透明到足以击穿信任。
targetUser:
  primary: 印度农业投入品分销商、食品出口商和农民合作社中，负责运行 5,000 至 50,000 名小农户气候智慧型农业试点的可持续发展与碳项目经理。
  secondary: 负责农户入驻与证据采集的项目开发方及乡村田间运营团队。
  buyer: 农业企业赞助方的可持续发展负责人、碳业务单元总经理或 COO。
startupThesis:
  nonObviousInsight: 在基于自然的碳项目里，真正稀缺的不是买方对碳信用的需求，而是把分散的小农户行为变成可审计、可与分账挂钩的碳证据的运营底座。一旦气候农业被包装成新的农户收入来源，谁掌握入驻、证据采集和收益分配逻辑，谁就会成为事实上的系统记录层。
  beachhead: 在单一作物走廊内面向 5,000 至 20,000 名签约小农户启动首个气候农业碳项目的印度农业企业和出口商。
  wedge: 一套移动优先的碳项目操作系统，负责农户入驻、采集带地理标签的实践证据、映射到特定方法学清单，并生成可直接提交核证方的项目资料包。
  whyNowCatalyst: Prithu 此轮融资明确投向地面运营、小农户入驻和碳信用变现，这进一步证明气候农业当前最紧迫的卡点就是执行底座。
  ventureScalePath: 先从小农户土壤碳和再生农业项目的操作系统切入，再扩展到农户分账、嵌入式金融、作物采购合规，以及服务碳信用买方、保险方和贷款方的数据层。
solution: Smallholder Carbon Rails 为气候项目运营方提供一整套工作流，覆盖农户入驻、田间证据采集、方法学校验和分账透明。田间人员通过离线移动应用登记种植户、地块和耕作变化，并上传带地理标签的照片和带时间戳的证明。项目经理则通过仪表盘查看缺失证据、批次级准备度以及核证交接状态，不再需要追着 WhatsApp 线程和表格跑。平台还能生成面向农户的分账说明单，以及提供给注册机构、审计方或下游买家的 API 导出。长期来看，真正的专有资产是那套把耕作实践、产量和碳信用结果在小农户尺度上串起来的纵向数据集。
goToMarketSeed:
  firstCustomer: 一家中型印度食品出口商或农业投入品分销商，在一个邦内面向 10,000 名签约小农户试点再生型采购。
  buyingTrigger: 新的气候农业试点、碳信用变现项目，或投资人支持的可持续目标获批，并要求在本种植季完成农户入驻。
  currentAlternative: 表格、田间服务供应商、WhatsApp 协同，以及手工处理 MRV 的定制项目开发方。
  switchingReason: 这款产品能缩短项目启动时间、减少核证环节漏损，并在无需自建内部碳运营团队的前提下，为赞助方提供农户证据与分账逻辑的唯一可信记录源。
  pricingHypothesis: 按年收取平台费，再叠加按入驻农户数和每轮核证周期计费。
whyNow:
  - point: 投资人正在为地面运营而不是纯粹的气候叙事买单，这意味着执行软件现在有机会进入真实预算科目。
    signalRefs:
