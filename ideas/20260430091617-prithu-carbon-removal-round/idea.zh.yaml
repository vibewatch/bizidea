differentiator: 多数碳软件从注册机构文书或自上而下的仪表盘切入；这个产品反过来，先解决项目最容易翻车的环节：农户入组、田间证据质量，以及弱连接环境下的小农户分账信任。护城河来自嵌入式工作流、本地现场数据网络和结构化小农户数据集，而不是更花哨的报表。
