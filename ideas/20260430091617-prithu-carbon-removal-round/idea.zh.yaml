topRisks:
- name: 方法学碎片化
  description: 碳方法学和核证要求差异可能足够大，导致统一产品抽象变脆。
  mitigation: 先锁定一条作物走廊和一套证据模板，等多次通过核证后再扩展。
- name: 部署服务化过重
  description: 客户可能期待大量现场运营支持，进而压缩软件毛利。
  mitigation: 优先卖给已管理现场团队的赞助方，并把导入模板、培训和合作方集成产品化。
- name: 农户信任与分账争议
  description: 如果农民无法理解证据如何转化为付款，采用率和留存都会快速下降。
  mitigation: 从第一天起提供透明分账单、多语言移动回执和赞助方侧争议处理工作流。
