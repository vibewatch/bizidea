problem: 小农户碳项目通常不是先卡在买方需求，而是先卡在运营执行。农业企业、食品出口商和碳项目开发方仍然依赖表格、地推人员和定制顾问来导入农户、收集证据，再把零散项目数据整理成可用于信用签发的记录。这会拖慢项目上线、抬高核证成本，也让农户很难看清分账逻辑，最终消耗信任。
targetUser:
  primary: 在印度农业投入品分销商、食品出口商和农民合作组织里，负责气候智慧农业试点的可持续发展负责人和碳项目经理；其项目通常覆盖 5,000 到 50,000 名小农户。
  secondary: 负责农户招募与证据采集的项目开发方和乡村现场运营团队。
  buyer: 农业企业赞助方里的可持续发展负责人、碳业务单元 GM 或 COO。
startupThesis:
  nonObviousInsight: 自然基碳信用里最稀缺的，不是买家愿不愿意买信用，而是把分散小农户的行为转成可审计、可分账的碳证据的运营轨道。一旦气候农业被当作农民新增收入来销售，掌握导入、证据采集和收益分配逻辑的一方，就会成为项目的系统记录层。
  beachhead: 印度农业企业和出口商，它们正在某一条作物走廊上，为 5,000 到 20,000 名签约小农户启动第一期气候农业碳项目。
  wedge: 移动优先的碳项目 OS：完成农户入组、采集带地理标签的实践证据、映射到方法学清单，并生成核证方可接收的项目资料包。
  whyNowCatalyst: Prithu 的融资明确指向一线运营、小农户导入和碳信用变现，确认气候农业最急迫的瓶颈在执行基础设施。
  ventureScalePath: 先成为小农户土壤碳和再生农业项目的操作系统，再扩到农户分账、嵌入式融资、采购合规，以及碳买方、保险方和贷款方会依赖的数据层。
solution: Smallholder Carbon Rails 为气候项目运营方提供农户导入、田间证据采集、方法学校验和分账透明化的工作流栈。地推人员用离线移动应用登记种植户、地块和实践变化，并附上地理标签照片与时间戳声明。项目经理在后台看到缺失证据、批次就绪度和核证方交接状态，而不是继续追 WhatsApp 线程和表格。平台同时生成面向农户的分账单，并把数据通过 API 输出给注册机构、审计方或下游买方。长期来看，真正的专有资产是一套连接实践、产量和信用结果的小农户纵向数据集。
goToMarketSeed:
  firstCustomer: 印度一家中型食品出口商或农业投入品分销商，在某个邦推进再生采购试点，拥有约 10,000 名签约小农户。
  buyingTrigger: 新气候农业试点、碳信用变现项目，或带投资人压力的可持续目标刚获批，并且本季就必须完成农户导入。
  currentAlternative: 表格、现场服务商、WhatsApp 协调，以及手工处理 MRV 的定制项目开发方。
  switchingReason: 产品可以压缩项目启动周期、减少核证阶段的证据漏损，并让赞助方在不自建碳运营团队的情况下，拥有农户证据和分账逻辑的单一真实来源。
  pricingHypothesis: 年度平台费，加上按入组农户数和按核证周期计费。
