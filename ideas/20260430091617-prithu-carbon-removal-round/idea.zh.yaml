jobsToBeDone:
  - job: 当发起方启动新的气候农业项目时，帮助碳项目经理招募数千名小农户并收集可供审计的证据，以便他们按计划签发碳信用并向农户分配收益。
    currentAlternative: 手工电子表格和外包田间团队
    successMetric: 从项目启动到向核证方提交可审查批次的天数
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 多个已核验来源确认，基于自然的碳、农户变现与小农户招募正获得新增融资支持。
  painIntensity:
    score: 5
    rationale: 手工招募与 MRV 失败会直接阻断项目启动、收入兑现和农户信任。
  wedgeClarity:
    score: 5
    rationale: 农户招募加证据包生成是一个边界清晰的工作流，并且有明确的运营买方。
  defensibility:
    score: 4
    rationale: 防御力可来自工作流深度、本地集成和小农户历史数据集的持续积累。
  ventureScale:
    score: 4
    rationale: 滩头市场可从碳项目延展到更广泛的农村金融、采购合规和气候数据基础设施。
topRisks:
  - name: 方法学碎片化
    description: 碳方法学与核证要求可能差异过大，导致单一产品抽象变得脆弱。
    mitigation: 先从一个作物带和一组有限的证据模板开始，只有在多次获得核证接受后再扩展。
  - name: 服务化部署过重
    description: 客户可能期待大量田间运营支持，从而压缩软件毛利。
    mitigation: 通过已经自管田间团队的发起方销售，并把招募模板、培训和合作伙伴集成产品化。
  - name: 农户信任与收益分配争议
    description: 如果农户无法理解证据如何转化为付款，采用和留存都可能崩塌。
    mitigation: 从第一天起就构建透明的收益结算单、多语言移动回执和发起方侧争议处理工作流。