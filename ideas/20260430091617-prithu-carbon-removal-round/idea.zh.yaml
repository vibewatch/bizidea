topRisks:
  - name: 方法学碎片化
    description: 碳方法学和核证要求之间的差异可能大到让单一产品抽象层变得脆弱。
    mitigation: 先从一个作物走廊和一组很窄的证据模板做起，只有在反复获得核证接受后再扩展。
  - name: 部署过度依赖服务
    description: 客户可能会期待大量田间运营支持，这会压缩软件毛利。
    mitigation: 优先卖给已经管理田间团队的赞助方，并把入驻模板、培训和合作伙伴集成产品化。
  - name: 农户信任与分账争议
    description: 如果农户不理解证据如何对应到付款，采用和留存都可能迅速下滑。
    mitigation: 从第一天起就提供透明的分账说明、多语言移动回执，以及赞助方侧的争议处理流程。
