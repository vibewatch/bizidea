problem: 小农户碳项目往往在需求失灵之前，先在运营环节失灵。农业企业、食品出口商和碳项目开发商至今仍依赖电子表格、外勤人员和定制顾问来招募农户、收集证据，并把项目数据整理成可用于碳信用核发的记录。这使得项目启动缓慢、核证成本高昂，也让农户收益分配不透明到足以摧毁信任。
targetUser:
  primary: 在印度农资分销商、食品出口商和农民合作社中，负责运行覆盖 5,000 至 50,000 名小农户的气候智慧型农业试点的可持续发展与碳项目经理。
  secondary: 负责农户招募和证据采集的项目开发商及农村一线运营团队。
  buyer: 农业企业发起方的可持续发展负责人、碳业务单元 GM 或 COO。
startupThesis:
  nonObviousInsight: 基于自然的碳项目中最稀缺的资产，不是碳信用买方需求，而是把分散的小农户行为转化为可审计、与收益分配挂钩的碳证据的运营基础设施。一旦气候农业被作为新的农户收入来源出售，谁掌握招募、证据采集和分成逻辑，谁就成为事实记录系统。
  beachhead: 在一个单一作物带上，面向 5,000 至 20,000 名签约小农户启动首个气候农业碳项目的印度农业企业和出口商。
  wedge: 一套移动优先的碳项目操作系统，用于招募农户、采集带地理标记的实践证据、映射到特定方法学清单，并生成核证方可直接审查的项目材料包。
  whyNowCatalyst: Prithu 的融资明确投向一线运营、小农户纳入项目和碳信用变现，印证了执行基础设施正是气候农业最紧迫的卡点。
  ventureScalePath: 先成为小农户土壤碳与再生农业项目的操作系统，再扩展到农户结算、嵌入式融资、作物采购合规，以及供碳信用买方、保险公司和贷款方使用的数据层。
solution: 小农户碳运营基础设施为气候项目运营方提供一整套工作流，包括农户招募、田间证据采集、方法学检查与收益透明。外勤人员使用离线移动应用登记种植者、地块和实践变更，并上传带地理标记的照片与带时间戳的确认记录。项目经理看到的是能够标记缺失证据、批次准备度和核证方交接状态的仪表盘，而不是不断追赶 WhatsApp 线程和电子表格。平台还会生成面向农户的收益结算单，以及面向注册机构、审计方或下游买家的 API 导出。长期来看，其专有资产是把实践、产量和碳信用结果连接起来的小农户纵向数据集。
goToMarketSeed:
  firstCustomer: 一家在单一邦内试点再生采购、拥有 10,000 名签约小农户的印度中型食品出口商或农资分销商。
  buyingTrigger: 新的气候农业试点、碳信用变现计划或投资人支持的可持续目标获批，并要求在本季完成农户纳入项目。
  currentAlternative: 电子表格、田间服务供应商、WhatsApp 协同，以及手工处理 MRV 的定制项目开发商。
  switchingReason: 该产品缩短项目启动时间、减少核证流失，并在不自建内部碳运营团队的情况下，为发起方提供关于农户证据和收益逻辑的单一事实来源。
  pricingHypothesis: 年平台费，外加按纳入农户数和按核证周期计费。
whyNow:
  - point: 投资人正在为一线运营而非抽象气候叙事买单，这意味着执行软件现在可以切入真实预算科目。
    signalRefs: [资金正流向小农户纳入项目]
    sourceRefs: [1]
  - point: 农户被定位为可以通过碳信用获得收入，使招募与收益透明度变得前所未有地紧迫。
    signalRefs: [气候农业正在成为农户收入产品]
    sourceRefs: [2]
  - point: 市场正围绕基于自然的碳移除平台收敛，但这些平台之下仍需要标准化的运营层。
    signalRefs: [基于自然的碳移除正在成为平台型品类]
    sourceRefs: [1, 3]
  - point: 初筛理由本身就指出 MRV 加招募是最锋利的切口，说明瓶颈在工作流执行，而不是碳信用市场流动性。
    signalRefs: [真正的切口是 MRV 加田间运营]
    sourceRefs: [1, 2, 3]
differentiator: 大多数碳软件从注册机构文书工作或自上而下的仪表盘开始。这个产品则从项目真正失败的地方起步，即农户招募、田间证据质量，以及在网络不稳定环境下小农户对收益结算的信任。这会通过嵌入式工作流、本地田间数据网络，以及泛用 MRV 工具或服务公司难以复制的结构化数据集形成防御力。
