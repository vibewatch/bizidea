jobsToBeDone:
  - job: >-
      当承保商拒绝续保一份老旧房屋保单时，帮代理机构的重新投保团队收集缺失证据，在失效前完成投保，这样他们不用增加客户经理也能保住这户客户。
    currentAlternative: 手工在门户里重新录入、批发商邮件往来、给房主打电话轮询，以及临时安排查勘。
    successMetric: 续保挽回率、从非续保通知到完成替代承保的天数，以及每位客户经理处理的投保材料数量。
  - job: >-
      当新的 HO2 项目为更难投保的房屋放宽承保口径时，帮分销负责人收到更干净、匹配口径的投保材料，这样承保人员不用扩编也能更快报价。
    currentAlternative: 通用的投保材料收件箱、格式不一的 ACORD 投保材料，以及为补齐房产信息反复往返沟通。
    successMetric: 报价周转时间、承保人员每份材料的处理时长，以及路由救援案件的承保成交率。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 证据集只有一篇经核实信源，比较薄弱，但它点名了具体的 HO2 发布事件、目标市场状况、放宽的房产承保口径和运营技术栈。
  painIntensity:
    score: 5
    rationale: 房屋险非续保会给代理机构带来即时的失效风险、客户流失和人力压力激增，这个工作流是急迫刚需，而不是锦上添花。
  wedgeClarity:
    score: 5
    rationale: 面向老旧房屋和有理赔记录房产重新投保的续保救援工作台，切口够窄、可测试，代理机构共创客户也容易评估。
  defensibility:
    score: 4
    rationale: 护城河来自承保口径专属的救援模板、房主响应数据、路由基准和跨市场集成，不过大型分销商也可能自建部分工具。
  ventureScale:
    score: 4
    rationale: 初始工作流切口很窄，但扩展到更多州、房产品类、服务、修复和产能情报后，足以支撑一家大型个险基础设施公司。
topRisks:
  - name: 产能收缩
    description: 如果灾害损失或再保险压力导致新 HO2 项目关停，救援需求依然旺盛，但承保转化率可能迅速下滑。
    mitigation: 从多市场集成和代理机构在承保之前就能看重的工作流投资回报起步，再扩展到备选市场和修复协同。
  - name: 房主响应率不足
    description: 如果房主不能在失效期限前迅速提供照片、维修发票或配合查勘，救援工作流就会失败。
    mitigation: 用消费级短信流程、默认任务清单、供应商排期集成和代理机构升级规则，提高证据收集完成的速度。
  - name: 分销合规边界模糊
    description: 如果产品从工作流基础设施滑向建议咨询，路由和推荐个险方案可能带来牌照和行为合规风险。
    mitigation: 让登记经纪人身份始终留在合作代理机构手中，保留审计轨迹和承保商认可的工作流，先以代理机构辅助基础设施的身份上线，再考虑受监管的步骤。
