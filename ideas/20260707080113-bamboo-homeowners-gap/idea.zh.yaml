problem: >-
  标准市场对老旧房屋和有理赔记录的房产收紧承保后，加州独立代理机构被淹没在房屋险续保救援的工作量里。每一次救援，都要在承保商门户、查勘供应商、邮件往来和给房主打电话之间连轴转，赶在保单失效前收集屋顶状况、维修证据和理赔说明。新的
  HO2 产能正在为更广的房源组合打开空间，但代理机构递交的投保材料依然错配或不完整，真正的瓶颈已经从纯粹的承保产能，转移到了材料整理和速度上。缺少一套救援工作流的系统记录，代理机构就会流失优质家庭客户，房主面临保障缺口，MGU
  也在处理杂乱投保材料上浪费承保时间。
targetUser:
  primary: >-
    加州独立保险代理机构和聚合平台旗下经纪公司的个险运营负责人，他们手上房屋险非续保积压案件正越堆越多。
  secondary: >-
    为老旧房屋和有理赔记录风险推出 HO2 项目的技术驱动型个险 MGU 的分销和承保负责人。
  buyer: 个险业务 COO 或 EVP
startupThesis:
  nonObviousInsight: >-
    供给紧缺已经不只是资产负债表的问题。Bamboo 的发布说明，新的 HO2 项目愿意承保一些标准产品回避的房屋——前提是投保材料带着正确的房产信息、维修证据和损失说明，并且快到能卡进狭窄的承保口径里。这意味着真正能赢的切口，是上游的续保救援操作系统，而不是又一家数字化承保公司。
  beachhead: >-
    拥有 10,000-50,000 户房屋险家庭客户、5-25 名个险客户经理的加州独立代理机构，每月都有一批老旧房屋或有理赔记录的非续保案件，必须在 30-90 天内重新投保。
  wedge: >-
    一个续保救援工作台：接收非续保通知，向房主发短信索要缺失的照片和维修记录，安排查勘，组装匹配各家承保口径的投保材料，并在保单失效前把每个案件路由到最合适的 HO2 或邻近市场。
  whyNowCatalyst: >-
    Bamboo 的 HO2 发布证明，加州紧俏市场里正有实惠保障的新产能打开，但它靠 AI 驱动速度取胜，也意味着还在用手工救援流程的代理机构，现在成了瓶颈。
  ventureScalePath: >-
    从加州房屋险续保救援起步，再扩展到灾害高发州、火险和房东财产投保、修复融资、房屋加固供应商协同，以及面向承保公司、MGA 和代理网络的跨市场产能基准分析。
solution: >-
  产品架在代理系统、房主、查勘供应商和个险市场之间，专门为非续保案件提供救援层。代理机构上传非续保通知或转发承保商邮件后，平台会对风险分类，通过短信或邮件向房主索要缺失的房产信息，核实维修或减灾证据，再按各市场偏好的格式组装投保材料。平台维护一张
  HO2 及备选项目的承保口径图谱，让代理人在浪费精力跑死胡同之前，就能看出哪些房屋大概率能救回来。随后系统会路由案件，跟踪承保时限，并保存一份可复用的房产档案，支持未来的续保、查勘和理赔。对
  MGU 而言，这减少了垃圾投保材料，浮现出证据更完整的风险；对代理机构而言，这提高了续保挽回率，而不需要增加个险人手。
goToMarketSeed:
  firstCustomer: >-
    一家拥有 10,000-50,000 户房屋险家庭客户的加州独立个险代理机构或代理网络，1990 年前建成房屋占比高，30-90 天的非续保积压案件还在用表格、邮件和承保商门户手工处理。
  buyingTrigger: >-
    承保商收紧或续保季来临，突然涌出一批老旧房屋和有理赔记录的家庭客户，需要在失效前重新投保。
  currentAlternative: 在承保商门户、比价平台、批发商邮件往来之间手工重新询价，外加临时性的房主跟进和查勘供应商协调。
  switchingReason: >-
    这个工作台把每一个非续保案件，变成匹配承保口径、证据齐全的投保材料，而不是又一轮门户里的东奔西跑，从而提高续保挽回率、缩短处理周期。
  pricingHypothesis: >-
    按活跃个险用户收费，外加每份救回并完成承保的保单收取成功费，代理网络采用企业定价，查勘协同模块可选购。
whyNow:
  - point: 加州房屋险市场紧俏到一定程度后，新的实惠 HO2 供给已经能够围绕救援需求推出，而不只是瞄准干净的新单业务。
    signalRefs: [紧俏市场需求已经可以产品化]
    sourceRefs: [1]
  - point: 对老旧房屋和有理赔记录房产的承保口径放宽，意味着重新投保基础设施能够挽回代理机构过去直接放弃的业务。
    signalRefs: [标准房屋险的承保口径正在边缘放宽]
    sourceRefs: [1]
  - point: 报价到承保的速度如今是核心承保优势，还在用手工救援流程的代理机构因此成了瓶颈。
    signalRefs: [报价到承保的速度正在变成产能本身]
    sourceRefs: [1]
  - point: 一旦新的 HO2 项目能为更广的房源组合承保，谁能更快收集干净证据、更快路由案件，谁就能掌控分销流量。
    signalRefs: [分销工作流成了新的瓶颈]
    sourceRefs: [1]
differentiator: >-
  比价平台要等代理人重新录入数据后才能出价，MGA 也只有在投保材料递交之后才能优化承保。这家公司赢在非续保通知和市场投保之间的空档——靠为老旧房屋、理赔记录、维修情况和材料要求建一张可挽回性图谱。随着时间推移，它会通过承保口径专属的投保包模板、房主响应速度基准，以及跨市场的救援数据不断复利，而这些数据是单一承保商门户或通用代理管理系统都看不到的。
