        Bamboo: [0.72, 0.76]
        SageSure: [0.68, 0.74]
        Proposed startup: [0.90, 0.94]
  fiveForces:
    supplierPower:
      score: 4
      rationale: 承保商的承保口径、专业产能、FAIR Plan 规则和房产风险数据供应商，都会影响哪些案件真正可以被救回，因此工作流这一层并不能完全掌控供给侧。
      sourceRefs:
      - 13
      - 18
      - 22
      - 36
      - 60
    buyerPower:
      score: 3
      rationale: 大型代理机构靠邮件、表格和现有比价工具，也能勉强维持运转，但家庭客户失效的痛点和员工超负荷工作，能给一个聚焦的产品带来真正的议价能力。
      sourceRefs:
      - 38
      - 46
      - 51
    threatOfEntrants:
      score: 3
      rationale: AI 填表和路由很容易做出原型，但承保商专属的承保口径逻辑、合规审计轨迹和分销信任关系，需要更长时间才能建立起来。
      sourceRefs:
      - 3
      - 51
      - 61
      - 70
    threatOfSubstitutes:
      score: 5
      rationale: 替代品到处都是：承保商门户、比价平台、E&S 经纪人、消费者直接比价，以及 FAIR Plan 备选路径，都已经承接了救援工作流的一部分。
      sourceRefs:
      - 36
      - 38
      - 41
      - 43
      - 51
    competitiveRivalry:
      score: 4
      rationale: 目前不存在占主导地位的救援操作系统，但 MGU、比价工具供应商和野火模型平台，都在把各自的能力向同一个工作流地带扩展。
      sourceRefs:
      - 1
      - 37
      - 51
      - 60
      - 70
  pestle:
  - factor: 政治
    impact: positive
    point: 加州正在用监管改革，强制推动自愿市场产能部分回流高风险区域，这为路由产品创造了更多可挽回的案件。
    sourceRefs:
    - 12
    - 13
    - 18
  - factor: 经济
    impact: negative
    point: 重建成本、再保险成本和灾害损失持续推高保费，让救援案件更难促成。
    sourceRefs:
    - 44
    - 78
    - 100
    - 101
  - factor: 社会
    impact: positive
    point: 重大野火事件之后，房主们在积极比价、更换保障并采取减灾行动，这提高了他们对救援工作流的响应度。
    sourceRefs:
    - 46
  - factor: 技术
    impact: positive
    point: 房产级野火模型和现代化的代理机构技术，让把减灾证据和承保结果连接起来变得越来越可行。
    sourceRefs:
    - 60
    - 61
    - 70
    - 71
  - factor: 法律
    impact: negative
    point: ALE（额外生活费用）规则、野火模型透明度要求和消费者保护预期，都提高了任何代理机构辅助产品的文档和行为合规要求。
    sourceRefs:
    - 19
    - 61
    - 84
  - factor: 环境
    impact: negative
    point: 持续存在的野火风险敞口，让市场保持不稳定，并持续把业务推向 FAIR Plan 或 E&S 的备选路径。
    sourceRefs:
    - 22
    - 93
    - 98
    - 100
  adoptionFrictionMatrix:
  - friction: 房主没能在失效前足够快地提交照片、维修发票或配合查勘。
    severity: 高
    affectedBuyer: 代理机构重新投保和服务团队
    mitigation: 使用结构化的短信/邮件追踪流程、截止日期倒计时和供应商排期，让证据收集在收到通知后立刻启动。
    sourceRefs:
    - 43
    - 46
  - friction: 承保商的承保口径变化速度，比代理机构的作业手册更新得更快，导致投保材料白费、报价走进死胡同。
    severity: 高
    affectedBuyer: 个险运营负责人
    mitigation: 维护一张实时更新的承保口径图谱，与合作市场动态、监管变化和已路由案件的承保反馈保持同步。
    sourceRefs:
    - 12
    - 13
    - 18
    - 36
    - 60
  - friction: 既然 AMS 和比价工具已经存在，代理机构会抵触再上一个独立系统。
    severity: 中
    affectedBuyer: 个险 COO 或 EVP
    mitigation: 围绕现有的比价工具/AMS 技术栈做集成，把产品定位成异常队列基础设施，而不是核心系统替代品。
    sourceRefs:
    - 38
    - 51
  - friction: 合规团队可能担心路由逻辑看起来像无牌照的建议咨询。
    severity: 高
    affectedBuyer: 代理机构高管和合规负责人
    mitigation: 让登记经纪人始终掌控局面，记录每一条路由依据，把平台定位成文档整理/协同基础设施。
    sourceRefs:
    - 19
    - 61
    - 70
  - friction: 即使房主已经回应，减灾核实和查勘步骤依然可能带来延迟。
    severity: 中
    affectedBuyer: 代理机构运营团队和合作承保人员
    mitigation: 把证明材料清单标准化，并与查勘或房屋加固供应商合作，让同一份档案能跨市场复用。
    sourceRefs:
    - 25
    - 93
    - 98
