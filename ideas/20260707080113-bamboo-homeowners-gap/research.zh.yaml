competitors:
- name: Bamboo Insurance
  stage: 成长期
  wedge: 一家技术驱动、以承保为先的 MGU，用 AI 和自动化在加州更快完成房屋险投保。
  pricing: 按房产逐单报价；抓取到的信源中没有公开费率表。
  strength: 把产能、承保和面向代理人的工作流整合在同一套技术栈里。
  weaknessVsUs: 只优化 Bamboo 自己的投保，不是给同时兼顾多种承保口径的代理机构提供中立的跨市场救援队列。
  sourceRefs:
  - 1
  - 3
  - 5
  - 6
- name: SageSure
  stage: 在位厂商
  wedge: 专注灾害敞口财产的专家，拥有加州房屋险和非许可市场产能，外加代理人门户。
  pricing: 通过代理人主导报价；抓取到的信源中没有公开费率表。
  strength: 对专业财产有很强的承保口径，自身产品的代理人工作流也很成熟。
  weaknessVsUs: 依然绑定在 SageSure/SURE 自己的分销体系里，没有被打造成跨竞争市场的系统记录。
  sourceRefs:
  - 36
  - 37
  - 38
- name: Vertafore PL Rating
  stage: 在位厂商
  wedge: 比价系统，让代理机构一次录入数据就能实时对比多家个险承保商的报价。
  pricing: 定制化 SaaS；抓取到的信源中未披露公开价目表。
  strength: 在代理机构中渗透率很高，有 AMS 集成和多承保商报价比较能力。
  weaknessVsUs: 要等数据录入完之后才开始工作；不掌握房主证据收集、减灾证明，或救援专属的路由逻辑。
  sourceRefs:
  - 51
- name: ZestyAI
  stage: 成长期
  wedge: 面向承保公司、FAIR Plan 和正在扩大加州承保资格的保险公司，提供房产级野火和房屋风险评分。
  pricing: 定制化企业定价；抓取到的信源中未披露公开价目表。
  strength: 在野火敞口市场中，对承保、定价和减灾认定有直接的影响力。
  weaknessVsUs: 卖的是风险情报，不是代理机构在失效前收集材料、跨市场路由案件所需的工作流。
  sourceRefs:
  - 60
  - 61
  - 62
regulatoryTechnicalConstraints:
- point: 任何工作流都必须保留详细的文档记录，因为加州的野火规则正越来越多地把减灾措施、模型透明度和消费者争议处理，与房产级证据挂钩。
  sourceRefs:
  - 19
  - 61
  - 70
- point: 救援案件经常在许可市场、E&S 和 FAIR Plan 之间流转，因此路由逻辑必须体现不断变化的资格条件和保障缺口，而不能假设某一个市场总能承保。
  sourceRefs:
  - 5
  - 22
  - 24
  - 37
- point: 房屋加固抵扣和野火折扣，需要可核实的减灾证据，而不只是口头声明。
  sourceRefs:
  - 7
  - 25
  - 93
  - 98
validationSignals:
- point: Bamboo 推出了一款 HO2 产品，明确瞄准加州的老旧房屋和有既往损失记录的风险。
  sourceRefs:
  - 1
  - 2
- point: SageSure/SURE 推出了加州非许可市场房屋险产能，说明私营市场对更难投保的业务确实有需求。
  sourceRefs:
  - 37
- point: 加州正在批准与增长挂钩的模型使用，Mercury 和 CSAA 已经承诺了新保单增长。
  sourceRefs:
  - 12
  - 13
  - 18
- point: FAIR Plan 的保单数量、风险敞口和理赔准备度的扩张，说明业务量问题依然严峻。
  sourceRefs:
  - 22
  - 24
  - 100
- point: Kin 2025 年的加州调查显示，负担能力痛点和主动比价行为，在房主中已经成为主流。
  sourceRefs:
  - 46
- point: PL Rating 解决的依然是报价比较，而不是投保前的救援协同，这让切口依然敞开着。
  sourceRefs:
  - 51
openQuestions:
- 目标代理机构的非续保和疑难续保案件中，有多大比例真正需要房主证据收集，而不只是简单重新询价？
- 目前一位客户经理每月能处理多少个救援案件？其中花在照片、屋顶文件和查勘协调上的时间占多少？
- 除了 Bamboo 和 SageSure，还有哪些加州市场，会在投保材料包含正确减灾证明时，承保老旧房屋或有理赔记录的风险？
- 买家会更偏好按席位定价、成功费，还是与续保挽回率挂钩的集中式网络合同？
- 加州的代理机构和承保公司，会把路由协助和保障建议之间的合规边界画在哪里？
