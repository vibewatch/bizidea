scenarios:
  downside:
    description: Homeowner evidence-completion and pilot-to-annual conversion underperform the BP's targets, seat growth stalls well below the 180-seat milestone, gross margin slips toward services economics, and the adjacent-state expansion bet does not materialize.
    y3RevenueK: 1350.0
    y3EbitdaK: -1280.0
    cashLowPointK: -955.4
    keyAssumptionChanges:
    - Y2 exits at 85 seats (not 180) and Y3 exits at 135 seats (not 260) because complete-packet and bind-conversion lift falls short of the BP's 20-point and 25% targets.
    - Gross margin compresses from 70% to 65% because more cases require manual concierge support to stay bindable.
    - No adjacent state or property class opens by month 18, so Y3 growth is capped to core-California re-shopping volume only.
  base:
    description: Two design-partner pilots convert to annual contracts, seat count compounds through referral partnerships and one rater/AMS integration, and the company reaches the BP's 180-seat 12-24 month milestone before a modest adjacent-state expansion lifts Y3 further.
    y3RevenueK: 2640.0
    y3EbitdaK: -309.5
    cashLowPointK: 429.4
    keyAssumptionChanges:
    - Seat counts follow A6, A7, and A8, reaching 18 seats at Y1 exit, 180 at Y2 exit, and 260 at Y3 exit.
    - Blended annual revenue per seat stays at the researched $12.0K and gross margin holds at the 70% business-plan target.
    - The team reaches 10 end-of-Y3 FTE, with GTM and second-tier engineering hires landing only after the first two pilots convert.
  upside:
    description: Referral partnerships and the rater/AMS integration pull pilot-to-production conversion forward, the adjacent-state and benchmark-data bets land early, and success-fee and analytics attach lift blended ARR per seat and gross margin.
    y3RevenueK: 3813.8
    y3EbitdaK: 567.9
    cashLowPointK: 1045.0
    keyAssumptionChanges:
    - Y2 exits at 220 seats and Y3 exits at 340 seats as referral-driven agency-network expansion outpaces the base-case pace.
    - Blended annual revenue per seat rises from $12.0K to $13.5K as rescued-policy success fees and early benchmark-data attach lift the blend.
    - Gross margin improves from 70% to 73% as packet templates and inspection-partner reuse reduce marginal delivery cost.
sensitivity:
- variable: ARPU
  downsideCase: Blended annual revenue per seat falls to $10.5K because agencies push back on the success-fee component and settle closer to flat seat pricing.
  baseCase: Blended annual revenue per seat holds at the researched $12.0K.
  upsideCase: Blended annual revenue per seat rises to $13.5K as success fees and benchmark-data attach land sooner.
  y3RevenueImpactK: -330.0
  cashImpactK: -231.0
- variable: CAC
  downsideCase: Non-payroll S&M spend rises from 5% to 7% of quarterly revenue because agency procurement and compliance diligence extend the sales motion.
  baseCase: Modeled CAC stays near $3.1K per new seat, blending new-logo and in-account seat expansion in Y2.
  upsideCase: Referral partnerships and the rater/AMS integration cut S&M intensity toward 4% of revenue.
  y3RevenueImpactK: 0.0
  cashImpactK: -75.0
- variable: churn
  downsideCase: Monthly seat churn rises from 2.5% to 4.0% because unproven bind-rate lift causes some agencies to lapse seats after the pilot period.
  baseCase: Unit economics assume 2.5% monthly churn while the modeled seat path already bakes in modest attrition.
  upsideCase: Success-fee alignment and audit-trail stickiness push effective churn toward 1.5%.
  y3RevenueImpactK: -210.0
  cashImpactK: -145.0
- variable: sales cycle
  downsideCase: Compliance and broker-of-record review pushes each pilot-to-annual conversion and referral-partner launch about one quarter later than modeled.
  baseCase: The base case assumes both design-partner pilots convert to annual contracts within Y1 and seat growth compounds through Y2 on schedule.
  upsideCase: A completed rater/AMS integration and reference agencies pull conversions forward by roughly one quarter.
  y3RevenueImpactK: -240.0
  cashImpactK: -280.0
- variable: gross margin
  downsideCase: Gross margin slips to 66% because inspection coordination and evidence QA stay more manual than the packaged workflow assumes.
  baseCase: Gross margin stays at the 70% business-plan target.
  upsideCase: Gross margin reaches 73% as packet templates and inspection-partner reuse reduce marginal delivery cost.
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: hiring pace
  downsideCase: Partner success/compliance and the second product engineer both need to be pulled forward by roughly two quarters to keep audit trails and integrations clean at scale.
  baseCase: The base case keeps the lean hiring ramp in A21 because packet templates and dossiers are assumed to reuse well across seats.
  upsideCase: Hiring can stay on the base plan even if seat growth beats plan because referral-sourced agencies need less bespoke onboarding.
  y3RevenueImpactK: 0.0
  cashImpactK: -90.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      NonRenewalNotice[Non-renewal notice intake] --> EvidenceCapture[Homeowner evidence capture]
      EvidenceCapture --> PacketAssembly[Appetite-matched packet]
      PacketAssembly --> Seats[Active rescue-ops seats]
      Seats --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing active rescue-ops seats from 18 at Y1 exit to 180 at Y2 exit to 260 at Y3 exit at a blended $12.0K of annual revenue per seat.
- checkName: Must go right
  finding: The company must convert both design-partner pilots into annual contracts and prove the 20-point complete-packet and 25% quote-turnaround lift so seat expansion compounds toward the 180-seat 12-24 month milestone without heavy services support.
- checkName: Model breaks if
  finding: If homeowner evidence completion or bind-rate lift falls short and gross margin slips toward services economics, the downside scenario shows cash turning negative during Y3 and the round would need a bridge.
- checkName: Next-round proof
  finding: The seed story is credible once the company reaches roughly 180 active rescue seats across 15-20 agencies, ships a live rater/AMS integration, and closes one pilot outside the original California wedge.
sanityChecks:
  ruleOf40: Y3 growth 152.1% + EBITDA margin -11.7% = 140.4% (inflated by a very small Y2 revenue base, so it should be read directionally rather than as a mature-company benchmark).
  burnMultiple: About 0.4x in Y2 on roughly $1.94M of net new annualized seat ARR, improving to about 0.3x in Y3 on roughly $0.96M of net new annualized seat ARR.
  revenuePerFte: $264K Y3 revenue per end-of-year FTE (inside the rough $200K-$400K early enterprise SaaS benchmark).
  flags:
  - Modeled CAC blends true new-agency acquisition with low-cost in-account seat expansion at already-signed design partners, so the $3.1K CAC and 9.0x LTV/CAC ratio likely understate the real cost of winning the first few large California agencies.
  - Roughly $480K of Y3 revenue (and most of the seat growth above the researched 180-seat California SOM) depends on the unproven adjacent-state or adjacent-property-class expansion bet in business-plan.yaml mustBeTrue, which is explicitly flagged as unvalidated.
  - The 70% gross margin and software-led motion assume homeowner evidence completion clears the BP's 60%-within-7-days bar; if it does not, more manual concierge work would compress margin and slow seat growth simultaneously.
