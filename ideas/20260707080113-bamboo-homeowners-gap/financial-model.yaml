slug: homeowners-renewal-rescue-rail
date: '2026-07-07'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[business-plan.yaml date 2026-07-07] first full operating month after the plan date.'
- id: A2
  name: Opening cash after pre-seed close
  value: '2400'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd $2-4M] model uses $2.4M, near the low-mid of the stated range, sized to fund the 18-month runway plus a 6-month buffer.'
- id: A3
  name: Revenue unit
  value: Active rescue-operations seat
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue] the model counts each active, paid rescue-desk seat as one billable unit.'
- id: A4
  name: Blended annual revenue per active seat
  value: '12.0'
  unit: USDK/seat-year
  source: '[research.yaml bottomUpSizingDrivers "Blended annual revenue per active seat: $12,000"; business-plan.yaml gtm.pricing] treated as already blended across seat subscription and rescued-policy success fees per the BP pricing narrative.'
- id: A5
  name: Revenue recognition timing
  value: Average of opening and closing seat count within each period
  unit: policy
  source: '[startup-finance heuristic] new seats are assumed to land roughly mid-period on average, consistent with pilots credited into annual contracts mid-cycle.'
- id: A6
  name: Y1 month-end seat path
  value: 0,0,3,3,6,6,6,6,12,12,16,18
  unit: active paid seats
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract 60-90 day paid pilot converting to $80k-150k ARR for 6-12 seats; milestones 0-12 months: sign two design partners, convert two pilots to annual contracts, secure one referral partnership]'
- id: A7
  name: Y2 quarter-end seat path
  value: Q1Y2 45; Q2Y2 80; Q3Y2 125; Q4Y2 180
  unit: active paid seats
  source: '[business-plan.yaml milestones 12-24 months: reach roughly 180 active rescue seats across 15-20 large agencies or networks]'
- id: A8
  name: Y3 quarter-end seat path
  value: Q1Y3 200; Q2Y3 220; Q3Y3 240; Q4Y3 260
  unit: active paid seats
  source: '[business-plan.yaml milestones 24-36 months: adjacent-state and adjacent-property-class expansion] research.yaml market.som ($2.2M / ~180 seats) is a California-only ceiling, so the roughly 80 incremental Y3 seats above 180 depend on the unproven adjacent-expansion mustBeTrue and are flagged in sanityChecks.'
- id: A9
  name: Gross margin target
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] modeled as 30% COGS (evidence-capture messaging/API costs, inspection network fees, hosting) on recognized revenue.'
- id: A10
  name: Monthly seat/logo churn for unit economics
  value: '2.5'
  unit: percent
  source: '[startup-finance heuristic] higher than typical enterprise SaaS because the core value claim (structured packets raise bind/renewal-save rate) is still unproven per BP operatingAssumptions #2, partly offset by success-fee-aligned pricing that rewards renewal.'
- id: A11
  name: Founder/CEO loaded cash compensation
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Founder/CEO] startup-finance heuristic for a below-market founder salary plus payroll tax/benefits burden.'
- id: A12
  name: Founding eng loaded cash compensation
  value: '190'
  unit: USDK/year
  source: '[business-plan.yaml team Founding eng] startup-finance heuristic for a senior technical co-founder package plus payroll burden.'
- id: A13
  name: Insurance ops lead loaded cash compensation
  value: '160'
  unit: USDK/year
  source: '[business-plan.yaml team Insurance ops lead] startup-finance heuristic for a domain-expert operator translating underwriting/compliance rules into product logic.'
- id: A14
  name: Partner success/compliance loaded cash compensation
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Partner success/compliance] startup-finance heuristic for an onboarding and audit-trail owner.'
- id: A15
  name: Integration engineer loaded cash compensation
  value: '175'
  unit: USDK/year
  source: '[business-plan.yaml team Integration engineer] startup-finance heuristic for a rater/AMS/data-partner handoff builder.'
- id: A16
  name: Account executive loaded cash compensation
  value: '170'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months; gtm.channels] startup-finance heuristic for an enterprise agency seller once founder-led sales needs support.'
- id: A17
  name: Customer success/onboarding manager loaded cash compensation
  value: '140'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months] startup-finance heuristic for a post-sale rollout owner as seat count scales past the first two design partners.'
- id: A18
  name: Second product engineer loaded cash compensation
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months: rater/AMS integration and inspection reuse] startup-finance heuristic for added engineering depth once integration scope grows.'
- id: A19
  name: Second account executive loaded cash compensation
  value: '170'
  unit: USDK/year
  source: '[business-plan.yaml milestones 24-36 months: multi-state expansion] startup-finance heuristic for the seller who opens the adjacent-state or adjacent-property-class wedge.'
- id: A20
  name: Data/analytics engineer loaded cash compensation
  value: '175'
  unit: USDK/year
  source: '[business-plan.yaml twentyFourMonth: productizing market-appetite and rescue-benchmark data] startup-finance heuristic for the hire who builds benchmark/analytics products for MGUs and carriers.'
- id: A21
  name: Hiring cadence
  value: Founder/CEO, Founding eng, and Insurance ops lead in Month 1; Partner success/compliance Month 5; Integration engineer Month 6; Account executive Q1Y2; Customer success manager Q2Y2; Second product engineer Q3Y2; Second account executive Q1Y3; Data/analytics engineer Q2Y3
  unit: timing
  source: '[business-plan.yaml team startTiming; milestones 12-24 and 24-36 months] GTM and second-tier engineering hires land only after the first two pilots convert and the 180-seat milestone is in motion.'
- id: A22
  name: Functional payroll allocation
  value: Founder/CEO 60% S&M / 40% G&A; Founding eng 100% R&D; Insurance ops lead 60% R&D / 40% G&A; Partner success/compliance 50% S&M / 50% G&A; Integration engineer 100% R&D; Account executive 100% S&M; Customer success manager 40% S&M / 60% G&A; Second product engineer 100% R&D; Second account executive 100% S&M; Data/analytics engineer 100% R&D
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] compliance-heavy roles split across R&D (product rules) and G&A (audit/legal), while founder and sales roles load into S&M.'
- id: A23
  name: Non-payroll operating spend ramp
  value: Y1 S&M $3.0-6.0K/month, R&D $4.0-7.0K/month, G&A $6.0-9.0K/month rising by quarter; Y2-Y3 S&M $22-36K/quarter fixed plus 5% of quarterly revenue, R&D $26-40K/quarter, G&A $32-46K/quarter
  unit: USDK per period
  source: '[startup-finance heuristic] covers SMS/email evidence-capture APIs, cloud hosting, wildfire/appetite data licensing, and above-average legal/compliance spend given the broker-of-record and coverage-advice risk flagged in business-plan.yaml risks.'
- id: A24
  name: Cash conversion policy
  value: EBITDA approximates operating cash movement
  unit: policy
  source: '[startup-finance heuristic] no debt, capex, taxes, or material working-capital swings are modeled at this stage.'
- id: A25
  name: Funding runway target
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths 18] modeled as the stated 18-month pre-seed plan plus a 6-month buffer per the standard startup-finance heuristic.'
- id: A26
  name: Next-round milestone
  value: Reach roughly 180 active rescue seats across 15-20 large California agencies or networks, ship one rater/AMS integration, and launch one adjacent-state or adjacent-property-class pilot
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] used to size the current round and the required buffer.'
