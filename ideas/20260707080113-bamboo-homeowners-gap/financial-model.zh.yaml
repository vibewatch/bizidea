slug: homeowners-renewal-rescue-rail
date: '2026-07-07'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[business-plan.yaml date 2026-07-07] 计划日期之后的第一个完整运营月。'
- id: A2
  name: pre-seed 交割后期初现金
  value: '2400'
  unit: USDK
  source: '[business-plan.yaml fundingAsk.targetFundingRangeUsd $2-4M] 模型采用 $2.4M，处于所述区间偏低至中段的位置，用以覆盖 18 个月现金跑道外加 6 个月缓冲。'
- id: A3
  name: 收入计量单位
  value: 活跃救援运营席位
  unit: definition
  source: '[business-plan.yaml businessModel.unitOfValue] 模型把每个活跃、付费的救援团队席位计为 1 个可计费单位。'
- id: A4
  name: 单个活跃席位的综合年收入
  value: '12.0'
  unit: USDK/seat-year
  source: '[research.yaml bottomUpSizingDrivers "Blended annual revenue per active seat: $12,000"; business-plan.yaml gtm.pricing] 按 BP 定价叙述，已经是席位订阅费和救回保单成功费混合之后的综合数字。'
- id: A5
  name: 收入确认时点
  value: 按每个周期期初与期末席位数的平均值确认
  unit: policy
  source: '[startup-finance heuristic] 假设新增席位平均落在周期中段，与试点在周期中段折算进年度合同的假设一致。'
- id: A6
  name: 第 1 年月末席位数路径
  value: 0,0,3,3,6,6,6,6,12,12,16,18
  unit: active paid seats
  source: '[business-plan.yaml investorMemo.firstCustomer.initialContract 60-90 天付费试点转化为 6-12 个席位、$80k-150k ARR；milestones 0-12 months：签下两家共创客户，把两个试点转化为年度合同，拿下一份引荐合作]'
- id: A7
  name: 第 2 年季末席位数路径
  value: Q1Y2 45; Q2Y2 80; Q3Y2 125; Q4Y2 180
  unit: active paid seats
  source: '[business-plan.yaml milestones 12-24 months：在 15-20 家大型代理机构或代理网络中达到约 180 个活跃救援席位]'
- id: A8
  name: 第 3 年季末席位数路径
  value: Q1Y3 200; Q2Y3 220; Q3Y3 240; Q4Y3 260
  unit: active paid seats
  source: '[business-plan.yaml milestones 24-36 months：邻近州和邻近房产品类扩展] research.yaml market.som（$2.2M / 约 180 个席位）是仅限加州的天花板，因此第 3 年超出 180 的约 80 个增量席位，依赖尚未验证的邻近扩展 mustBeTrue 假设，已在 sanityChecks 中标记。'
- id: A9
  name: 毛利率目标
  value: '70'
  unit: percent
  source: '[business-plan.yaml businessModel.targetGrossMarginPct] 按已确认收入的 30% 作为 COGS 建模（证据收集消息/API 成本、查勘网络费用、云托管）。'
- id: A10
  name: 用于单位经济模型的月席位/客户流失率
  value: '2.5'
  unit: percent
  source: '[startup-finance heuristic] 高于典型企业级 SaaS，因为核心价值主张（结构化投保材料能提升承保/续保挽回率）按 BP operatingAssumptions #2 仍未得到验证，但与续保挂钩的成功费定价能部分抵消这一点。'
- id: A11
  name: 创始人/CEO 全额现金薪酬
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Founder/CEO] 按低于市场价的创始人薪资，加上薪资税和福利负担建模。'
- id: A12
  name: 创始工程师全额现金薪酬
  value: '190'
  unit: USDK/year
  source: '[business-plan.yaml team Founding eng] 按资深技术联合创始人薪酬包，加上薪资负担建模。'
- id: A13
  name: 保险运营负责人全额现金薪酬
  value: '160'
  unit: USDK/year
  source: '[business-plan.yaml team Insurance ops lead] 按把承保/合规规则转化为产品逻辑的领域专家运营者薪酬建模。'
- id: A14
  name: 合作伙伴成功/合规负责人全额现金薪酬
  value: '150'
  unit: USDK/year
  source: '[business-plan.yaml team Partner success/compliance] 按负责客户入驻和审计轨迹的岗位薪酬建模。'
- id: A15
  name: 集成工程师全额现金薪酬
  value: '175'
  unit: USDK/year
  source: '[business-plan.yaml team Integration engineer] 按负责比价工具/AMS/数据合作伙伴对接的工程师薪酬建模。'
- id: A16
  name: 客户经理全额现金薪酬
  value: '170'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months; gtm.channels] 按创始人主导销售需要支援后，面向企业级代理机构的销售人员薪酬建模。'
- id: A17
  name: 客户成功/入驻经理全额现金薪酬
  value: '140'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months] 按席位数在前两家共创客户之外持续扩张时，负责售后推广的岗位薪酬建模。'
- id: A18
  name: 第二位产品工程师全额现金薪酬
  value: '180'
  unit: USDK/year
  source: '[business-plan.yaml milestones 12-24 months：比价工具/AMS 集成和查勘复用] 按集成范围扩大后，增加工程深度的岗位薪酬建模。'
- id: A19
  name: 第二位客户经理全额现金薪酬
  value: '170'
  unit: USDK/year
  source: '[business-plan.yaml milestones 24-36 months：多州扩展] 按负责打开邻近州或邻近房产品类切口的销售人员薪酬建模。'
- id: A20
  name: 数据/分析工程师全额现金薪酬
  value: '175'
  unit: USDK/year
  source: '[business-plan.yaml twentyFourMonth：把市场承保口径和救援基准数据产品化] 按为 MGU 和承保公司构建基准/分析产品的岗位薪酬建模。'
- id: A21
  name: 招聘节奏
  value: M1 招创始人/CEO、创始工程师与保险运营负责人；M5 招合作伙伴成功/合规负责人；M6 招集成工程师；Q1Y2 招客户经理；Q2Y2 招客户成功经理；Q3Y2 招第二位产品工程师；Q1Y3 招第二位客户经理；Q2Y3 招数据/分析工程师
  unit: timing
  source: '[business-plan.yaml team startTiming; milestones 12-24 and 24-36 months] 只有在前两个试点转化、且 180 席位里程碑已经启动之后，GTM 和第二梯队工程岗位才会入场。'
- id: A22
  name: 薪酬职能分摊
  value: 创始人/CEO 60% 计入 S&M / 40% 计入 G&A；创始工程师 100% 计入 R&D；保险运营负责人 60% 计入 R&D / 40% 计入 G&A；合作伙伴成功/合规负责人 50% 计入 S&M / 50% 计入 G&A；集成工程师 100% 计入 R&D；客户经理 100% 计入 S&M；客户成功经理 40% 计入 S&M / 60% 计入 G&A；第二位产品工程师 100% 计入 R&D；第二位客户经理 100% 计入 S&M；数据/分析工程师 100% 计入 R&D
  unit: allocation
  source: '[business-plan.yaml team rationales; operations] 合规工作量大的岗位在 R&D（产品规则）和 G&A（审计/法务）之间分摊，创始人和销售岗位则计入 S&M。'
- id: A23
  name: 非人力运营支出爬坡
  value: 第 1 年 S&M 每月 $3.0-6.0K，R&D 每月 $4.0-7.0K，G&A 每月 $6.0-9.0K，按季度递增；第 2-3 年 S&M 每季度固定 $22-36K 外加季度收入的 5%，R&D 每季度 $26-40K，G&A 每季度 $32-46K
  unit: USDK per period
  source: '[startup-finance heuristic] 覆盖短信/邮件证据收集 API、云托管、野火/承保口径数据授权，以及考虑到 business-plan.yaml risks 中标记的登记经纪人和保障建议风险后，高于平均水平的法务/合规支出。'
- id: A24
  name: 现金转换政策
  value: EBITDA 近似等于经营性现金变动
  unit: policy
  source: '[startup-finance heuristic] 现阶段模型未纳入债务、资本支出、税项，或重大营运资本波动。'
- id: A25
  name: 融资现金跑道目标
  value: '24'
  unit: months
  source: '[business-plan.yaml fundingAsk.runwayMonths 18] 按标准 startup-finance heuristic，在所述 18 个月 pre-seed 计划基础上增加 6 个月缓冲建模。'
- id: A26
  name: 下一轮里程碑
  value: 在 15-20 家大型加州代理机构或代理网络中达到约 180 个活跃救援席位，上线一个比价工具/AMS 集成，并推出一个邻近州或邻近房产品类的试点
  unit: milestone
  source: '[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] 用于确定本轮融资规模和所需缓冲。'
