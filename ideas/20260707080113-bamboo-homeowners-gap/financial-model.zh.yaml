scenarios:
  downside:
    description: 房主证据收集完成率和试点转年度合同的转化率都低于 BP 目标，席位增长远远达不到 180 个的里程碑，毛利率滑向服务型经济模式，邻近州扩展的赌注也没能兑现。
    y3RevenueK: 1350.0
    y3EbitdaK: -1280.0
    cashLowPointK: -955.4
    keyAssumptionChanges:
    - 第 2 年年末只做到 85 个席位（不是 180 个），第 3 年年末只做到 135 个席位（不是 260 个），因为投保材料完整率和承保转化率的提升，都没达到 BP 20 个百分点和 25% 的目标。
    - 毛利率从 70% 压缩到 65%，因为更多案件需要人工管家式支持才能维持可承保状态。
    - 到第 18 个月，没有任何邻近州或房产品类打开，第 3 年增长因此只能靠加州核心的重新询价业务量封顶。
  base:
    description: 两个共创客户试点转化为年度合同，席位数通过引荐合作和一次比价工具/AMS 集成持续复利增长，公司在达到 BP 12-24 个月 180 个席位里程碑后，再靠一次温和的邻近州扩展进一步拉动第 3 年增长。
    y3RevenueK: 2640.0
    y3EbitdaK: -309.5
    cashLowPointK: 429.4
    keyAssumptionChanges:
    - 席位数按 A6、A7 和 A8 的路径增长，第 1 年年末做到 18 个，第 2 年年末做到 180 个，第 3 年年末做到 260 个。
    - 单席位综合年收入维持在研究得出的 $12.0K，毛利率维持在商业计划 70% 的目标。
    - 团队到第 3 年年末扩到 10 个 FTE，GTM 和第二梯队工程岗位都只在前两个试点转化之后才入场。
  upside:
    description: 引荐合作和比价工具/AMS 集成把试点转生产合同的时间提前，邻近州扩展和基准数据的赌注提前兑现，成功费和分析产品的搭售也拉高了单席位综合 ARR 和毛利率。
    y3RevenueK: 3813.8
    y3EbitdaK: 567.9
    cashLowPointK: 1045.0
    keyAssumptionChanges:
    - 第 2 年年末做到 220 个席位，第 3 年年末做到 340 个席位，因为引荐驱动的代理网络扩张跑得比基准情景更快。
    - 单席位综合年收入从 $12.0K 升到 $13.5K，因为救回保单成功费和提前搭售的基准数据拉高了综合值。
    - 毛利率从 70% 提升到 73%，因为投保材料模板和查勘合作伙伴的复用降低了边际交付成本。
sensitivity:
- variable: ARPU
  downsideCase: 单席位综合年收入降到 $10.5K，因为代理机构对成功费部分有抵触，最终更接近纯席位定价。
  baseCase: 单席位综合年收入维持在研究得出的 $12.0K。
  upsideCase: 单席位综合年收入升到 $13.5K，因为成功费和基准数据搭售更早落地。
  y3RevenueImpactK: -330.0
  cashImpactK: -231.0
- variable: CAC
  downsideCase: 非人力 S&M 支出从季度收入的 5% 升到 7%，因为代理机构的采购和合规尽调拉长了销售流程。
  baseCase: 建模的 CAC 维持在每个新增席位约 $3.1K，混合了第 2 年的新客户获取和存量账户内席位扩张。
  upsideCase: 引荐合作和比价工具/AMS 集成把 S&M 强度压向收入的 4%。
  y3RevenueImpactK: 0.0
  cashImpactK: -75.0
- variable: 流失率
  downsideCase: 月席位流失率从 2.5% 升到 4.0%，因为承保转化率提升尚未得到验证，部分代理机构在试点结束后停用席位。
  baseCase: 单位经济模型假设月流失率为 2.5%，建模的席位路径本身已经计入了温和的流失。
  upsideCase: 成功费的利益一致性和审计轨迹带来的粘性，把实际流失率压向 1.5%。
  y3RevenueImpactK: -210.0
  cashImpactK: -145.0
- variable: 销售周期
  downsideCase: 合规和登记经纪人评审，让每一次试点转年度合同和引荐合作伙伴上线，都比建模晚了大约一个季度。
  baseCase: 基准情景假设两个共创客户试点都在第 1 年内转化为年度合同，席位增长在第 2 年按计划持续复利。
  upsideCase: 完成比价工具/AMS 集成，加上标杆代理机构的背书，把转化时间提前大约一个季度。
  y3RevenueImpactK: -240.0
  cashImpactK: -280.0
- variable: 毛利率
  downsideCase: 毛利率滑到 66%，因为查勘协调和证据质检，比打包工作流预设的更依赖人工。
  baseCase: 毛利率维持在商业计划 70% 的目标。
  upsideCase: 毛利率提升到 73%，因为投保材料模板和查勘合作伙伴的复用降低了边际交付成本。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: 招聘节奏
  downsideCase: 合作伙伴成功/合规负责人和第二位产品工程师，都得整体提前大约两个季度入场，才能在规模扩大时维持审计轨迹和集成的整洁。
  baseCase: 基准情景维持 A21 里精干的招聘坡度，因为假设投保材料模板和档案能在各席位间良好复用。
  upsideCase: 即便席位增长超出计划，招聘也能维持基准节奏，因为引荐来源的代理机构需要的定制化入驻更少。
  y3RevenueImpactK: 0.0
  cashImpactK: -90.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      NonRenewalNotice[Non-renewal notice intake] --> EvidenceCapture[Homeowner evidence capture]
      EvidenceCapture --> PacketAssembly[Appetite-matched packet]
      PacketAssembly --> Seats[Active rescue-ops seats]
      Seats --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入来自活跃救援运营席位的增长：第 1 年年末 18 个，第 2 年年末 180 个，第 3 年年末 260 个，每个席位对应 $12.0K 的综合年收入。
- checkName: 必须跑通的事
  finding: 公司必须把两个共创客户试点都转化为年度合同，并证明投保材料完整率提升 20 个百分点、报价周转加快 25%，这样席位扩张才能在不依赖重服务支持的前提下，持续复利地逼近 12-24 个月 180 个席位的里程碑。
- checkName: 模型失效条件
  finding: 如果房主证据收集完成率或承保转化率的提升不达标，毛利率滑向服务型经济模式，下行情景显示现金会在第 3 年内转负，本轮融资就需要桥接。
- checkName: 下一轮融资证明
  finding: 一旦公司在 15-20 家代理机构中做到约 180 个活跃救援席位，上线一个实际的比价工具/AMS 集成，并在最初的加州切口之外拿下一个试点，seed 故事才算站得住。
sanityChecks:
  ruleOf40: 第 3 年增长 152.1% + EBITDA 利润率 -11.7% = 140.4%（由于第 2 年收入基数很小而被推高，应当作方向性参考，而不是成熟公司的基准）。
  burnMultiple: 第 2 年 burn multiple 约 0.4x，对应约 $1.94M 的净新增年化席位 ARR；第 3 年改善至约 0.3x，对应约 $0.96M 的净新增年化席位 ARR。
  revenuePerFte: 第 3 年年末按 FTE 计算的人均收入约 $264K，落在早期企业级 SaaS 粗略 $200K-$400K 的区间里。
  flags:
  - 建模的 CAC 把真正新代理机构获取，和已签约共创客户账户内低成本的席位扩张混在了一起，因此 $3.1K 的 CAC 和 9.0 倍的 LTV/CAC，很可能低估了拿下头几家大型加州代理机构的真实成本。
  - 第 3 年约 $480K 的收入（以及超出研究得出的 180 个席位加州 SOM 的大部分席位增长），都依赖 business-plan.yaml mustBeTrue 中尚未验证的邻近州或邻近房产品类扩展赌注，该假设已被明确标记为未经验证。
  - 70% 的毛利率和软件驱动的打法，都假设房主证据收集完成率能达到 BP 7 天内 60% 的门槛；如果达不到，更多人工管家式工作会同时压缩毛利率并拖慢席位增长。
  - 模型在整个第 3 年都维持 EBITDA 为负，因此下一轮融资更依赖已证明的席位扩张速度和集成证明，而不是短期盈利能力。
  - 第 3 年年末仅有 10 个 FTE（一位集成工程师、一位合作伙伴成功/合规岗位）支撑 260 个席位和繁重的合规/审计轨迹要求，这可能低估了在规模化时维持登记经纪人与保障建议边界清晰所需的人力。
