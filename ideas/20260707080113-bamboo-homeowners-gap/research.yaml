competitors:
- name: Bamboo Insurance
  stage: scale-up
  wedge: Technology-enabled, underwriting-first MGU using AI and automation to deliver faster homeowners placement in California.
  pricing: Property-specific quote; no public rate card on fetched sources.
  strength: Combines capacity, underwriting, and agent-facing workflow in one stack.
  weaknessVsUs: Optimizes Bamboo placement, not a neutral cross-market rescue queue for agencies juggling many appetites.
  sourceRefs:
  - 1
  - 3
  - 5
  - 6
- name: SageSure
  stage: incumbent
  wedge: Catastrophe-exposed property specialist with California homeowners and surplus-lines capacity plus a producer portal.
  pricing: Quote-led through producers; no public rate card on fetched sources.
  strength: Strong specialty property appetite and mature agent workflow for its own products.
  weaknessVsUs: Still tied to SageSure/SURE distribution and not built as a system of record across competing markets.
  sourceRefs:
  - 36
  - 37
  - 38
- name: Vertafore PL Rating
  stage: incumbent
  wedge: Comparative rating that lets agencies enter data once and quote many personal-lines carriers in real time.
  pricing: Custom SaaS; public list pricing not disclosed on fetched sources.
  strength: Deep agency penetration, AMS integrations, and multi-carrier quote comparison.
  weaknessVsUs: Starts after data is entered; does not own homeowner evidence capture, mitigation proof, or rescue-specific routing logic.
  sourceRefs:
  - 51
- name: ZestyAI
  stage: scale-up
  wedge: Property-level wildfire and home-risk scoring used by carriers, FAIR Plan, and insurers expanding California eligibility.
  pricing: Custom enterprise pricing; public list pricing not disclosed on fetched sources.
  strength: Direct leverage over underwriting, pricing, and mitigation recognition in wildfire-exposed markets.
  weaknessVsUs: Sells risk intelligence, not the agency workflow needed to collect documents and route cases across markets before lapse.
  sourceRefs:
  - 60
  - 61
  - 62
