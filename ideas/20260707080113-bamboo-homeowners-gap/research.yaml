openQuestions:
- What share of non-renewal and difficult-renewal cases at a target agency actually require homeowner evidence collection rather than simple re-shopping?
- How many rescued cases per month can one account manager process today, and how much of that time is spent on photos, roof docs, and inspection coordination?
- Which additional California markets beyond Bamboo and SageSure will bind older-home or prior-claim risks if the packet includes the right mitigation proof?
- Will buyers prefer seat-based pricing, success fees, or centralized network contracts tied to renewal-save rate?
- Where will California agencies and carriers draw the compliance line between routing assistance and coverage advice?
