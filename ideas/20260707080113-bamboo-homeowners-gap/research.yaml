  adoptionFrictionMatrix:
  - friction: Homeowners do not return photos, repair invoices, or inspection access quickly enough before lapse.
    severity: high
    affectedBuyer: Agency remarketing and service teams
    mitigation: Use structured SMS/email chase flows, deadline clocks, and vendor scheduling so evidence collection starts immediately after notice intake.
    sourceRefs:
    - 43
    - 46
