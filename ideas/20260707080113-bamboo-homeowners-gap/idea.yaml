problem: >-
  California independent agencies are drowning in homeowners renewal rescues as standard markets pull back from older
  homes and prior-claim properties. Each rescue triggers a manual scramble across carrier portals, inspection vendors,
  email chains, and homeowner phone calls to collect roof details, repair evidence, and claims narrative before the
  policy lapses. New HO2 capacity is emerging for a broader mix of homes, but agencies still submit mismatched or
  incomplete packets, so the real bottleneck shifts from pure capacity to packaging and speed. Without a system of
  record for rescue workflows, agencies lose profitable households, homeowners face coverage gaps, and MGUs waste
  underwriting time on noisy submissions.
targetUser:
  primary: >-
    Personal-lines operations leaders at California independent insurance agencies and aggregator-owned brokerages
    managing a growing backlog of homeowners non-renewals.
  secondary: >-
    Distribution and underwriting leaders at tech-enabled personal-lines MGUs launching HO2 programs for older homes and
    prior-claim risks.
  buyer: COO or EVP of Personal Lines
startupThesis:
  nonObviousInsight: >-
    The scarcity problem is no longer only a balance-sheet problem. Bamboo's launch shows new HO2 programs are willing
    to write some homes that standard products avoid, but only when the submission arrives with the right property
    facts, repair evidence, and loss narrative fast enough to fit a narrow appetite. That makes the winning wedge an
    upstream renewal-rescue operating system, not another digital carrier.
  beachhead: >-
    California independent agencies with 10,000-50,000 homeowners households, 5-25 personal-lines account managers, and
    a monthly queue of older-home or prior-claim non-renewals that must be remarked within 30-90 days.
  wedge: >-
    A renewal-rescue workbench that ingests non-renewal notices, texts homeowners for missing photos and repair
    records, orders inspections, compiles appetite-specific submission packets, and routes each case to the best-fit
    HO2 or adjacent market before lapse.
  whyNowCatalyst: >-
    Bamboo's HO2 launch proves new capacity is opening for affordable coverage in California's tight market, but its
    reliance on AI-driven speed means agencies with manual rescue workflows are now the chokepoint.
  ventureScalePath: >-
    Start with California homeowners renewal rescue, then expand into catastrophe-stressed states, dwelling-fire and
    landlord property placements, remediation financing, home-hardening vendor orchestration, and cross-market capacity
    benchmarking for carriers, MGAs, and agency networks.
solution: >-
  The product sits between agency systems, homeowners, inspection vendors, and personal-lines markets as a dedicated
  rescue layer for non-renewals. When an agency uploads a non-renewal notice or forwards a carrier email, the platform
  classifies the risk, requests missing property details from the homeowner by SMS or email, verifies repair or
  mitigation evidence, and assembles the submission in each market's preferred format. It keeps an appetite graph for
  HO2 and fallback programs so the agent sees which homes are likely salvageable before wasting cycles on dead ends. It
  then routes the case, tracks SLA clocks to bind, and stores a reusable property dossier that can support future
  renewals, inspections, and claims. For MGUs, it reduces junk submissions and surfaces better-documented risks; for
  agencies, it increases renewal save rate without adding more personal-lines staff.
goToMarketSeed:
  firstCustomer: >-
    A California independent personal-lines agency or agency network with 10,000-50,000 homeowners households, heavy
    exposure to pre-1990 housing stock, and a 30-90 day non-renewal backlog still worked in spreadsheets, email, and
    carrier portals.
  buyingTrigger: >-
    A carrier pullback or renewal season that produces a sudden spike in older-home and prior-claim households needing
    remarketing before lapse.
  currentAlternative: Manual re-shopping across carrier portals, comparative raters, wholesaler email chains, inspection vendors, and ad hoc homeowner follow-up.
  switchingReason: >-
    The workbench raises renewal-save rate and cuts cycle time by turning each non-renewal into an appetite-matched,
    evidence-complete packet instead of another portal chase.
  pricingHypothesis: >-
    Per active personal-lines user plus a success fee per rescued bound policy, with enterprise pricing for agency
    networks and optional inspection-orchestration modules.
