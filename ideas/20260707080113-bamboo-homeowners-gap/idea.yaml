jobsToBeDone:
  - job: >-
      When a carrier non-renews an older-home policy, help an agency remarketing team gather missing evidence and place
      the home before lapse, so they can save the household without adding more account managers.
    currentAlternative: Manual portal re-entry, wholesaler email chains, homeowner phone trees, and ad hoc inspection ordering.
    successMetric: Renewal save rate, days from non-renewal notice to bound replacement, and submissions handled per account manager.
  - job: >-
      When a new HO2 program opens appetite for harder-to-place homes, help a distribution leader receive cleaner,
      appetite-matched packets, so underwriters can quote faster without expanding headcount.
    currentAlternative: Generic submission inboxes, inconsistent ACORD packets, and repeated back-and-forth for missing property facts.
    successMetric: Quote turnaround time, underwriter touch time per submission, and bind rate on routed rescue cases.
ideaScorecard:
  signalStrength:
    score: 4
    rationale: The evidence set is thin at one verified source, but it names a specific HO2 launch, target market condition, broadened property appetite, and operational stack.
  painIntensity:
    score: 5
    rationale: Homeowners non-renewals create immediate lapse risk, retention loss, and labor spikes for agencies, making the workflow acute rather than nice to have.
  wedgeClarity:
    score: 5
    rationale: A renewal-rescue workbench for older-home and prior-claim remarketing is narrow, testable, and easy for an agency design partner to evaluate.
  defensibility:
    score: 4
    rationale: Defensibility comes from appetite-specific rescue templates, homeowner-response data, routing benchmarks, and integrations across markets, though large distributors could build partial tooling.
  ventureScale:
    score: 4
    rationale: The initial workflow is narrow, but expansion into more states, property classes, servicing, remediation, and capacity intelligence supports a large personal-lines infrastructure company.
topRisks:
  - name: Capacity retrenchment
    description: If catastrophe losses or reinsurance pressure shut down new HO2 programs, rescue demand stays high but bind conversion could fall quickly.
    mitigation: Start with multi-market integrations and workflow ROI that agencies value even before bind, then expand into fallback markets and remediation orchestration.
  - name: Weak homeowner response rates
    description: Rescue workflows fail if homeowners do not quickly provide photos, repair invoices, or inspection access before the lapse deadline.
    mitigation: Use consumer-grade SMS flows, default task checklists, vendor scheduling integrations, and agency escalation rules to increase evidence completion speed.
  - name: Distribution compliance ambiguity
    description: Routing and recommending personal-lines options can create licensing and conduct risk if the product drifts from workflow infrastructure into advice.
    mitigation: Keep the broker of record with partner agencies, maintain audit trails and carrier-approved workflows, and launch as agency-assist infrastructure before taking regulated steps.
