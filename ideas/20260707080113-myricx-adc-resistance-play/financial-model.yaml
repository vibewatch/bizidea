slug: adc-resistance-benchmark-foundry
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: month
    source: "[BP date 2026-07-07]; model starts in the same month because the funding ask and milestone plan begin immediately."
  - id: A2
    name: "Opening cash from pre-seed raise"
    value: "3000"
    unit: "USD K"
    source: "[BP fundingAsk.targetFundingRangeUsd $3–5M and runwayMonths 18]; model uses the low end because the wedge is intentionally narrow and partner labs avoid a fixed wet-lab buildout."
  - id: A3
    name: "Customer unit definition"
    value: "active paid sponsor program benchmark"
    unit: unit
    source: "[BP businessModel.unitOfValue active sponsor program benchmarked from comparator design through decision pack delivery]."
  - id: A4
    name: "Initial paid pilot contract value"
    value: "250"
    unit: "USD K per program"
    source: "[BP gtm.pricing starts around $200k-$300k and BP investorMemo.firstCustomer.initialContract is $200k-$300k]; model uses the midpoint."
  - id: A5
    name: "Mature annual value per active program"
    value: "600"
    unit: "USD K per program-year"
    source: "[BP market.som 11 paid programs at about $0.6M average contract value]; [Research market.som $6.6M from 11 paid programs at roughly $0.6M average contract value]."
  - id: A6
    name: "Y1 end-of-month active programs"
    value: "0,0,0,0,0,1,1,1,2,2,3,3"
    unit: programs
    source: "[BP milestones month 6 first paid pilot, month 9 first repeat SOW or workspace upsell, and month 12 three paid programs]."
  - id: A7
    name: "Y2 quarter-end active programs"
    value: "4,6,6,7"
    unit: programs
    source: "[BP milestones month 18 six active programs and month 24 first mid-size pharma portfolio review contract]; model keeps H2Y2 conservative while same-account expansion proves out."
  - id: A8
    name: "Y3 quarter-end active programs"
    value: "8,8,10,11"
    unit: programs
    source: "[BP milestones month 30 eight active programs and month 36 eleven paid programs]; model treats the researched $6.6M SOM as Q4Y3 exit ARR, not full-year Y3 revenue."
  - id: A9
    name: "Y1 blended monthly revenue per active program"
    value: "M6-M12 = 24,28,30,32,34,36,38"
    unit: "USD K per average active program-month"
    source: "[A4-A6]; early revenue is still pilot-heavy before repeat benchmarks, retests, and workspace access broaden the mix."
  - id: A10
    name: "Y2 blended monthly revenue per active program"
    value: "Q1-Q4 = 36,38,40,42"
    unit: "USD K per average active program-month"
    source: "[A5]; [BP product.twelveMonth comparator database and evidence reuse]; [BP milestones month 18 six active programs]."
  - id: A11
    name: "Y3 blended monthly revenue per active program"
    value: "Q1-Q4 = 43,45,48,50"
    unit: "USD K per average active program-month"
    source: "[A5]; [BP milestones month 36 eleven paid programs at roughly $0.6M blended ACV]; Q4Y3 reaches the researched $0.6M annualized program value."
  - id: A12
    name: "Repeat and subscription mix by Month 24"
    value: ">50% of revenue from repeat benchmarks, retests, or workspace subscriptions"
    unit: "revenue mix"
    source: "[BP milestones month 24 more than half of revenue from repeat or subscription accounts]; [BP operatingAssumptions same buyer expands within 12 months]."
  - id: A13
    name: "Gross margin ramp"
    value: "Y1 45-55%; Y2 58-65%; Y3 67-70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct 70]; [BP fundingAsk.useOfFundsSummary asks whether a partner-led wet-lab model can sustain 70%+ gross margin]; startup-finance heuristic that first pilots are more services-heavy before SOPs stabilize."
  - id: A14
    name: "Monthly program churn for unit economics"
    value: "4.0"
    unit: percent
    source: "Startup-finance heuristic for high-ACV scientific program revenue where individual programs roll off but same-account expansion and workspace subscriptions partially offset loss."
  - id: A15
    name: "Founder/CEO loaded cash compensation"
    value: "180"
    unit: "USD K per year"
    source: "[BP team Founding CEO and scientific seller start Month 0]; startup-finance heuristic for a below-market pre-seed founder salary."
  - id: A16
    name: "Scientific lead loaded cash compensation"
    value: "220"
    unit: "USD K per year"
    source: "[BP team Founding scientific lead start Month 0]; startup-finance heuristic for senior translational oncology talent."
  - id: A17
    name: "Product/data engineer loaded cash compensation"
    value: "210"
    unit: "USD K per year"
    source: "[BP team Founding product and data engineer start Month 0]; startup-finance heuristic for regulated data-workflow engineering talent."
  - id: A18
    name: "QA and program operations loaded cash compensation"
    value: "160"
    unit: "USD K per year"
    source: "[BP team QA and program operations lead start Month 4]; startup-finance heuristic for QA, delivery, and partner-operations talent."
  - id: A19
    name: "Partnerships and account expansion loaded cash compensation"
    value: "175"
    unit: "USD K per year"
    source: "[BP team Partnerships and account expansion lead start Month 9]; startup-finance heuristic for scientific account-expansion talent with variable comp."
  - id: A20
    name: "Scientific programs loaded cash compensation"
    value: "185"
    unit: "USD K per year"
    source: "[BP sequencingRationale adds program operations and QA before scaled sales]; startup-finance heuristic for a delivery scientist coordinating benchmark design and readout packaging."
  - id: A21
    name: "Hiring sequence"
    value: "M4 Ops1; M9 Partnerships1; M10 ScientificPrograms1; M16 Product2; M18 Ops2; M21 Partnerships2; M27 ScientificPrograms2; M30 Product3; M33 Ops3"
    unit: hires
    source: "[BP team.startTiming]; [BP strategicChoices.sequencingRationale]; [BP milestones month 18, month 24, month 30, and month 36]."
  - id: A22
    name: "Non-salary operating spend schedule"
    value: "Y1 monthly 45-60; Y2 monthly 75-90; Y3 monthly 95-115"
    unit: "USD K per month"
    source: "[BP product.mvp secure workspace and audit-ready decision pack]; [BP operations]; startup-finance heuristic for cloud/data tooling, legal, insurance, travel, and partner-management costs."
  - id: A23
    name: "Opex mix by function"
    value: "S&M share 28%-37%; R&D 45%-37%; G&A 25%-27%"
    unit: "percent of opex"
    source: "[BP strategicChoices.sequencingRationale hires QA/program operations before scaled sales]; model shifts mix gradually from build and QA toward same-account expansion."
  - id: A24
    name: "Blended CAC"
    value: "180"
    unit: "USD K per new active program"
    source: "[Model-derived: about $1.25M of Y1-Y2 sales and marketing spend over 7 new active programs]; [BP gtm.channels founder-led scientific sales plus partner referrals]."
  - id: A25
    name: "Base sales cycle"
    value: "6"
    unit: "months from scientific diligence to paid pilot"
    source: "[BP milestones month 6 first paid pilot launched]; [BP gtm.funnelTargets 30-40% target account to diligence and 20-30% diligence to paid pilot]."
  - id: A26
    name: "Funding milestone and buffer"
    value: "6 active programs by Month 18 plus Month-24 repeat-revenue and pharma-review proof, with 6 months of buffer"
    unit: milestone
    source: "[BP fundingAsk.runwayMonths 18]; [BP milestones month 18 and month 24]."
  - id: A27
    name: "Buffer size"
    value: "600"
    unit: "USD K"
    source: "Startup-finance heuristic: roughly 6 months of month-18 burn at about $100K per month beyond the BP's 18-month operating plan."
