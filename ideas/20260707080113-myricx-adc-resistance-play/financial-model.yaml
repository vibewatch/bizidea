fundingAsk:
  round: pre-seed
  amountM: 3.0
  runwayMonths: 18
  milestone: >-
    Reach 6 active programs, one qualified CRO or model-bank co-sell channel, and
    sponsor-accepted repeat-program expansion by Month 18; the included six-month buffer
    carries the company to the Month-24 pharma-portfolio review and >50%
    repeat-or-subscription revenue test.
  useOfFunds:
    - bucket: "Engineering"
      amountUsd: 1200000
      percentage: 40
    - bucket: "GTM"
      amountUsd: 750000
      percentage: 25
    - bucket: "G&A"
      amountUsd: 450000
      percentage: 15
    - bucket: "Buffer (6 mo)"
      amountUsd: 600000
      percentage: 20
scenarios:
  downside:
    description: >-
      Budget unlock and data-rights reuse come slower, PDX confirmation gets pulled into
      more base scopes, and the company exits Y3 with only 9 active programs at sub-target
      margin.
    y3RevenueK: 3929.0
    y3EbitdaK: -887.4
    cashLowPointK: -81.2
    keyAssumptionChanges:
      - "Y3 exit active programs fall to 9 instead of 11."
      - "Blended monthly revenue per active program caps at $46K by Q4Y3 instead of $50K because repeat and workspace attach more slowly."
      - "Gross margin tops out at 66% because more benchmark SOWs insist on PDX-inclusive base scope."
  base:
    description: >-
      The base case follows the BP milestone path: 3 paid programs by month 12, 6 by month
      18, 7 by month 24, and 11 by month 36 while blended program value matures toward the
      researched $0.6M annual level.
    y3RevenueK: 4868.5
    y3EbitdaK: 79.5
    cashLowPointK: 766.0
    keyAssumptionChanges:
      - "Program ramp follows the BP milestones from 3 paid programs at Y1 exit to 6 at month 18 and 11 at month 36."
      - "Blended program value exits Y3 at $600K annualized as repeat benchmarks, retests, and workspace revenue become more than half of sales by month 24."
      - "Gross margin reaches 70% by Q4Y3 without building an in-house CRO footprint."
  upside:
    description: >-
      Repeat expansion appears earlier, one referral channel works by Y2, and the company
      exits Y3 with 13 active programs plus slightly better pricing and workflow leverage.
    y3RevenueK: 5647.5
    y3EbitdaK: 605.1
    cashLowPointK: 840.0
    keyAssumptionChanges:
      - "Y3 exit active programs rise to 13 instead of 11."
      - "Blended monthly revenue per active program reaches $52K by Q4Y3 through faster repeat-work and portfolio-review adoption."
      - "One extra GTM hire is added in month 28, but gross margin still reaches 72% as partner SOPs tighten."
sensitivity:
  - variable: "ARPU"
    downsideCase: "$550K mature program value"
    baseCase: "$600K mature program value"
    upsideCase: "$650K mature program value"
    y3RevenueImpactK: -410.0
    cashImpactK: -290.0
  - variable: "CAC"
    downsideCase: "$220K CAC if referrals fail and selling stays founder-heavy"
    baseCase: "$180K CAC with founder-led scientific sales plus partner intros"
    upsideCase: "$140K CAC if one co-sell channel consistently converts"
    y3RevenueImpactK: 0.0
    cashImpactK: -280.0
  - variable: "churn"
    downsideCase: "5.5% monthly program churn"
    baseCase: "4.0% monthly program churn"
    upsideCase: "3.0% monthly program churn"
    y3RevenueImpactK: -520.0
    cashImpactK: -340.0
  - variable: "sales cycle"
    downsideCase: "8 months; first paid pilot slips to M8"
    baseCase: "6 months; first paid pilot lands by M6"
    upsideCase: "4-5 months; warm introductions close by M5"
    y3RevenueImpactK: -780.0
    cashImpactK: -520.0
  - variable: "gross margin"
    downsideCase: "66% steady-state gross margin because custom/PDX scope becomes standard"
    baseCase: "70% steady-state gross margin"
    upsideCase: "72% steady-state gross margin with tighter partner SOPs"
    y3RevenueImpactK: 0.0
    cashImpactK: -360.0
