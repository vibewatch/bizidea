modelSanity:
  - checkName: "Revenue engine"
    finding: "Revenue is driven by active programs rising from 3 at Y1 exit to 11 at Y3 exit while blended program value matures from $200K-$300K pilots toward a $600K exit-rate active-program year."
  - checkName: "Must go right"
    finding: "The model needs a first paid pilot by Month 6 and same-buyer repeat work by Month 24 so ARPU expands without building a full-service CRO field team."
  - checkName: "Model breaks if"
    finding: "If sales cycles stretch toward eight months or PDX becomes default scope, the downside case falls to $3.9M Y3 revenue and cash turns slightly negative."
  - checkName: "Next-round proof"
    finding: "A credible seed story requires 6 active programs plus one working co-sell channel by Month 18 and the Month-24 proof that repeat or subscription revenue exceeds half of sales."
sanityChecks:
  ruleOf40: "Y3 growth 92.5% + EBITDA margin 1.6% = 94.1%"
  burnMultiple: "Y2 burn multiple 0.4x (burn $862K on $2139K incremental revenue), improving to positive EBITDA in Y3."
  revenuePerFte: "$406K Y3 using 12 Q4Y3 FTE (benchmark $200-400K biotech workflow SaaS)"
  flags:
    - "The researched $6.6M SOM is best interpreted as Q4Y3 exit ARR; full-year Y3 revenue is $4.9M because the model does not reach 11 active programs until month 36."
    - "The base case assumes more than half of month-24 revenue is repeat or subscription-driven; if accounts behave like one-off services, the 4% churn assumption is too low."
    - "Gross margin only reaches 70% if partner-run PDX stays optional confirmation rather than standard in every benchmark SOW."
    - "The customer count is really program count, so one delayed multi-program sponsor can move annual revenue by roughly $0.4M-$0.6M."
