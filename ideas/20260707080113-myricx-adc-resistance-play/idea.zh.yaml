problem: ADC 团队在标准筛选里能把效力做出来，但一旦肿瘤对 TOPO-1 或微管载荷不再响应，他们往往拿不出证据证明新载荷类别依然有效。 耐药模型散在各家高校实验室，对照实验口径也不一致，通用 CRO 套餐更难给出一份能直接拿去过董事会的结论：这次换载荷，差异化到底够不够硬。 结果就是，哪怕“逃逸现有载荷耐药”已经成了资产被收购的核心理由，生物科技公司管理层在做 IND、合作和项目组合下注时，手里仍没有一套标准化的耐药基准。
targetUser:
  primary: 聚焦 ADC 的生物科技公司里，负责转化肿瘤学或临床前开发的负责人；公司正把带有新型载荷的 B7-H3 或 HER2 实体瘤项目推进到 IND 支持性研究。
  secondary: 负责对照研究、耐药模型证据和合作方资料室的 ADC 药理与生物标志物负责人
  buyer: CSO 或转化开发负责人
startupThesis:
  nonObviousInsight: 在 ADC 里，真正稀缺的资产正在从“再找一个抗体靶点”转向“拿出可信证据，证明新载荷类别能在 TOPO-1 和微管载荷失效的地方把生物学效果救回来”。 Novartis 一旦愿意为这个命题预付 $1.1 billion，其他更小的 ADC 公司也就更需要一套更快的耐药基准测试，在砸 tox、CMC 和临床建设投入之前先把这件事跑明白。
  beachhead: 处在 Series A-C 阶段、正把 B7-H3 或 HER2 实体瘤项目从先导优化推进到 IND 支持性研究的 ADC 生物科技公司；在启动合作或融资流程前，团队必须先证明非 TOPO-1 载荷在耐药模型里能打赢 TOPO-1 或微管对照。
  wedge: 一套耐药模型基准平台加证据工作台：在精选 TOPO-1 和微管耐药肿瘤面板上做正面对照实验，最后产出支持 IND 和 BD 决策的载荷选择包。
  whyNowCatalyst: Myricx 这笔交易把“证明载荷能绕开耐药”从科研加分项，变成了一个有人出钱的资本配置问题——因为如今，能在 TOPO-1 耐药模型里跑出活性，已经足以支撑一笔预付 $1.1 billion 的收购。
  ventureScalePath: 先从实体瘤 ADC 项目的申办方付费基准测试切入，再扩成一层跨项目的载荷设计与转化证据基础设施，让生物科技公司和制药公司在更广的 ADC 市场里用它来选载荷类别、定试验分层、做并购尽调。
solution: 这家公司把一组经过筛选的耐药实体瘤模型库，和一个用于载荷正面对比的软件工作台绑在一起。 客户提交候选 ADC、连接子-载荷构型或对照假设后，平台会在与靶点和瘤种匹配的 TOPO-1 / 微管耐药面板上跑标准化实验。 交付物不只是原始效力数据，而是一份决策包：新载荷在哪些场景把杀伤力抢回来了，耐药还卡在哪些地方，下一笔 IND 或授权投入该砸到哪些肿瘤语境里。 团队后续做载荷迭代、和合作方沟通、进尽调资料室，都能复用同一套基准结果，不必每次从零搭耐药模型。 时间越久，公司越能沉淀一张按载荷类别、耐药语境、靶点和肿瘤生物学组织起来的专有表现图谱。
goToMarketSeed:
  firstCustomer: 一家 40-150 人的 ADC 生物科技公司，手上有 B7-H3 或 HER2 实体瘤项目，新型载荷正在做 IND 支持性评估，而且未来 6-12 个月内就要接受合作方或董事会审查
  buyingTrigger: 团队正准备做 IND 支持性推进 / 终止决策、资料室整理，或与合作方沟通；投资人或制药公司会直接追问：这套载荷在耐药模型里到底有没有打赢 TOPO-1 标准。
  currentAlternative: 通用 CRO 细胞毒性面板、临时拼起来的高校耐药模型合作，以及内部对照研究
  switchingReason: 和把零散实验室一段段拼起来相比，这个平台能更快给出一套口径统一的正面对照耐药数据和可复用证据包，方便买方向董事会和合作方解释为什么要选这类载荷。
  pricingHypothesis: 每个活跃项目收取六位数美元的基准测试费用，另加按年订阅的证据工作台、复测和基准数据库访问费
whyNow:
- point: 一笔预付 $1.1 billion 的收购说明，新型载荷生物学已经能立刻创造并购价值，所以生物科技公司团队更需要更快的证据，来证明自己的载荷下注值不值得。
  signalRefs:
  - 大药企开始为载荷差异化预付大额真金白银
  sourceRefs:
  - 1
- point: Novartis 和 Fierce 都把 TOPO-1 与微管载荷耐药描述成现有 ADC 类别的现实上限，这会把需求从“再做一遍通用效力测试”推向“测清楚能不能逃开耐药”。
  signalRefs:
  - ADC 耐药已经被点名为一类共性瓶颈
  sourceRefs:
  - 1
  - 2
- point: NMTi 载荷能在 TOPO-1 耐药模型里起效这一主张，已经把“耐药语境下的基准测试”推成了品类级证明题，而不再只是转化研究的补充页。
  signalRefs:
  - 在 TOPO-1 耐药模型里跑出活性，已经成了高溢价证明点
  sourceRefs:
  - 2
- point: 买方收的是两项领先资产外加一个跨瘤种平台，这意味着只要供应商能产出可复用的载荷证据，就有机会切进项目组合工作流，而不是只卖一项实验。
  signalRefs:
  - 买方要的是能跨瘤种复用的载荷平台
  sourceRefs:
  - 1
  - 2
differentiator: CRO 能做效力实验，高校团队能搭一个耐药模型，内部团队也能一次比较一个载荷，但没有谁能跨载荷类别和耐药肿瘤语境，持续产出一套可复用、口径统一的数据集。 这家公司的胜负手，是把对照面板、实验设计和面向申办方的决策包，都围绕董事会最在意的那一个问题标准化：这个载荷打 TOPO-1 或微管耐药，强到足以支持下一步投钱吗？ 每多跑一轮基准测试，护城河就更深一层，因为新增的是载荷机制、靶点、肿瘤语境和耐药逃逸之间的成对数据。
