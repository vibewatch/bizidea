jobsToBeDone:
- job: 当我们决定一个新载荷值不值得进 IND 支持性投入时，帮转化团队在耐药模型里把它和 TOPO-1、微管对照拉到一起比清楚，这样我们才敢有把握地给对的项目投钱。
  currentAlternative: 通用 CRO 筛选面板和临时性的内部对照研究
  successMetric: 拿到董事会可用基准包的时间，以及在进入 IND 支持性投入前被砍掉的载荷候选占比
- job: 当制药公司合作方追问我们的载荷为什么不一样时，帮临床前团队做出一套可复用的耐药证据包，这样尽调时不必每次重跑定制实验。
  currentAlternative: 一次性的高校合作，以及从零散研究里拼出来的幻灯片材料
  successMetric: 完成合作方资料室的时间，以及每轮尽调里追加实验请求的次数
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 这一组信号里既有一笔预付 $1.1 billion 的收购，也有 Novartis 和 Fierce 对耐药问题的直接表述；不足在于证据基础仍只有两家同日来源。
  painIntensity:
    score: 5
    rationale: 很多 ADC 公司把价值压在单一项目上，载荷一旦押错，烧掉的就是多年的临床前和临床投入。
  wedgeClarity:
    score: 5
    rationale: 第一用例非常窄也非常具体：在砸 IND 支持性预算前，先在耐药模型里把新型 B7-H3 或 HER2 ADC 载荷和 TOPO-1、微管耐药对照比明白。
  defensibility:
    score: 4
    rationale: 专有耐药模型库叠加跨项目基准数据，有机会长成难复制的证据基础设施；即便 CRO 能抄走部分实验流程，也很难把这层历史数据一并抄走。
  ventureScale:
    score: 4
    rationale: 切口本身不大，但同一层证据基础设施可以一路扩到 ADC 载荷选择、转化分层、项目组合评审和制药公司尽调。
topRisks:
- name: 预测有效性缺口
  description: 耐药肿瘤模型未必足够贴近人体临床反应，申办方可能因此不愿把它用在关键的推进 / 终止决策上。
  mitigation: 先把产品定位成决策支持型基准包，带上已知对照，再补回顾性一致性数据；在证据成熟前，不提前宣称平台能预测临床结果。
- name: 服务化漂移
  description: 如果湿实验定制工作越滚越多，公司就会更像高触达 CRO，而不是可规模化的产品业务。
  mitigation: 先把耐药面板、实验模板和申办方交付物压缩成少数标准包，再在每个项目上挂上可持续收费的软件工作台和数据集订阅。
- name: 初始买家群太窄
  description: 早期市场里，同时满足“有新型载荷”且“近期要过 IND 或合作关”的 ADC 团队数量有限。
  mitigation: 先抓最紧迫、又有风投支持的 ADC 项目；等基准数据被信任后，再扩到中型制药公司的项目组合评审，以及相邻的靶向偶联药模态。
