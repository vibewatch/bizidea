topRisks:
  - name: Predictive validity gap
    description: "Resistant tumor models may not predict human clinical response well enough for sponsors to trust them in major go/no-go decisions."
    mitigation: "Start with decision-support benchmark packages, include known comparator controls, and build retrospective concordance data before claiming the platform can predict trial outcomes."
  - name: Services creep
    description: "Too much bespoke wet-lab work could make the company look like a high-touch CRO instead of a scalable product business."
    mitigation: "Standardize a small set of resistant panels, assay templates, and sponsor-ready outputs, then attach a recurring software workspace and dataset subscription to each campaign."
  - name: Narrow initial buyer base
    description: "The number of ADC teams with both a novel payload and near-term IND or partnering pressure is limited in the early market."
    mitigation: "Target the highest-urgency venture-backed ADC programs first, then expand into mid-size pharma portfolio reviews and adjacent targeted-conjugate modalities once the benchmark dataset is trusted."
