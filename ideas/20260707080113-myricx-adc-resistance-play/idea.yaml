problem: >-
  ADC teams can show potency in standard screens, but they often cannot prove that a new payload class still works once tumors stop responding to TOPO-1 or microtubule payloads. Resistant models are scattered across academic labs, comparator assays are inconsistent, and generic CRO packages rarely produce a board-ready answer on whether a payload shift is truly differentiated. That leaves biotech leaders making IND, partnering, and portfolio bets without a standardized resistance benchmark even as payload escape becomes the main reason assets get bought.
targetUser:
  primary: "Head of translational oncology or preclinical development at an ADC-focused biotech advancing a B7-H3 or HER2 solid-tumor program with a novel payload toward IND-enabling studies"
  secondary: "ADC pharmacology and biomarker leads responsible for comparator studies, resistant-model evidence, and partner data rooms"
  buyer: "CSO or Head of Translational Development"
startupThesis:
  nonObviousInsight: >-
    In ADCs, the scarce asset is shifting from another antibody target to credible proof that a new payload class rescues biology where TOPO-1 and microtubule payloads fail. Once Novartis pays $1.1 billion upfront for that claim, every smaller ADC company needs a faster way to benchmark resistance escape before it spends on tox, CMC, and clinical build-out.
  beachhead: >-
    Series A-C ADC biotechs advancing a B7-H3 or HER2 solid-tumor program from lead optimization into IND-enabling studies, where the team must show a non-TOPO-1 payload beats TOPO-1 or microtubule comparators in resistant models before a partnering or financing process
  wedge: >-
    A resistant-model benchmark platform and evidence workspace that runs head-to-head assays across curated TOPO-1- and microtubule-resistant tumor panels, then generates an IND- and BD-ready decision pack for payload selection
  whyNowCatalyst: >-
    The Myricx deal turns payload-resistance proof from a scientific nice-to-have into a funded capital-allocation problem because activity in TOPO-1-resistant models is now valuable enough to drive a $1.1 billion upfront acquisition.
  ventureScalePath: >-
    Start with sponsor-funded benchmarking for solid-tumor ADC programs, then expand into a cross-program payload design and translational evidence layer used by biotechs and pharma to choose payload classes, set trial stratification, and diligence acquisitions across the broader ADC market.
solution: >-
  The startup pairs a curated bank of resistant solid-tumor models with a software workspace for head-to-head payload benchmarking. Customers submit candidate ADCs, linker-payload constructs, or comparator hypotheses, and the platform runs standardized assays against TOPO-1- and microtubule-resistant panels relevant to the target and tumor type. The output is not just raw potency data; it is a decision packet showing where the new payload regains kill, where resistance persists, and which tumor contexts deserve IND or licensing spend next. Teams can reuse the same benchmark across payload iterations, partner discussions, and diligence rooms instead of rebuilding resistant models from scratch each time. Over time, the company accumulates a proprietary map of payload-class performance by resistance context, target, and tumor biology.
goToMarketSeed:
  firstCustomer: >-
    A 40-150 person ADC biotech with a B7-H3 or HER2 solid-tumor program, a novel payload under IND-enabling evaluation, and a partner or board review due within the next 6-12 months
  buyingTrigger: >-
    Preparing an IND-enabling go/no-go, data room, or partnering conversation where investors or pharma ask whether the payload truly beats TOPO-1 standards in resistant models
  currentAlternative: "Generic CRO cytotoxicity panels, ad hoc academic resistant-model collaborations, and internal comparator studies"
  switchingReason: >-
    The platform gives a normalized head-to-head resistance dataset and reusable evidence pack faster than stitching together one-off labs, which helps the buyer defend payload choices to boards and partners.
  pricingHypothesis: "Six-figure benchmark campaigns per active program, with an annual subscription for the evidence workspace, retests, and benchmark-database access"
