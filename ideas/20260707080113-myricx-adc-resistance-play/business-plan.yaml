slug: adc-resistance-benchmark-foundry
date: '2026-07-07'
executiveSummary: >-
  ADC biotechs moving novel payloads into IND-enabling work face a new bottleneck:
  proving that a payload escapes TOPO-1 or microtubule resistance strongly enough
  to justify tox, CMC, and partnering spend. The Myricx sale to Novartis turned
  resistant-context efficacy from nice translational data into capital-allocation
  evidence. The first customer is a 40-150 person Series A-C ADC biotech with a
  B7-H3 or HER2 solid-tumor program, a board or partner review inside 6-12
  months, and no internal neutral benchmark capability. The product should start
  as a fixed resistance-benchmark package—curated resistant cell-line and
  organoid panels, standardized TOPO-1 and microtubule comparators, and an
  audit-ready decision pack—sold as a per-program SOW with optional workspace
  access. This wedge is narrow by design because it uses one buyer, one trigger,
  and one proof point: did the payload earn the right to advance or get killed
  before further IND or BD spend? Incumbent CROs already absorb related budget,
  so GTM should ride existing translational study spend and partner with labs
  rather than build a full-service CRO stack. The main strategic risk is not
  demand but trust: if standardized panels do not change sponsor decisions or
  cannot be reused credibly in diligence, the company collapses into bespoke
  services. Research-based sizing suggests an initial SAM around $42M and
  year-three SOM around $6.6M, but the exact live protocol count and the best
  first model mix remain unvalidated. If early pilots show sponsor-accepted
  decision packs, sub-six-week turnaround, and repeat spend from the same
  account, the company can expand from B7-H3/HER2 programs into broader ADC
  portfolio benchmarking.
problem:
  - >-
    Sponsors can show generic potency, but they often cannot prove that a novel
    payload still works once TOPO-1 or microtubule payloads fail in resistant
    solid-tumor settings.
  - >-
    The current evidence stack is fragmented across CRO panels, academic
    resistant models, public repositories, and internal comparator studies, so
    boards and partners see non-normalized data rather than a single
    decision-grade answer.
  - >-
    IND, financing, and partnering milestones force CSOs to commit capital
    before they know whether resistance escape is real, which makes false-
    positive payload bets expensive.
solution:
  - >-
    Run a standardized benchmark package against curated resistant cell-line and
    organoid panels for HER2 and B7-H3 programs, with fixed TOPO-1 and
    microtubule comparators and predefined readouts.
  - >-
    Deliver an audit-ready evidence workspace and exported decision pack that
    shows where a payload regains activity, where resistance persists, and which
    models justify follow-on spend.
  - >-
    Add optional partner-run PDX confirmation, retests, and multi-program
    benchmarking only after the fixed starter panel proves decision value.
whyWeWin:
  - >-
    Unlike integrated CROs, the company sells a neutral sponsor-facing benchmark
    layer whose product is the decision pack and reusable comparator history,
    not lab utilization.
  - >-
    Starting with one narrow IND-near workflow lets the team standardize panels,
    turnaround, and pricing faster than a broad "all ADC services" entry would.
  - >-
    Each paid benchmark adds a proprietary matrix of payload class, target,
    model, resistance mechanism, and sponsor outcome that becomes harder to
    recreate account by account.
  - >-
    The company can partner with model banks, CROs, and biomarker labs instead
    of replacing them, which lowers go-to-market friction and keeps capex
    lighter.
strategicChoices:
  beachhead: >-
    North American Series A-C ADC biotechs with 40-150 employees, an IND-near
    B7-H3 or HER2 solid-tumor program, and a novel non-TOPO-1 payload that must
    survive a board, financing, or partnering review in the next 6-12 months.
  wedgeRationale: >-
    This slice is small enough to standardize one comparator design yet painful
    enough to close budget quickly: the buyer already spends on CRO and
    translational work, the trigger is date-certain, and the decision is
    binary. Selling first into all ADC programs or all oncology translational
    studies would blur the proof point and push the company into head-on
    competition with full-service vendors before it has any benchmark brand.
  sequencingRationale: >-
    Build fixed resistant cell-line and organoid panels plus the sponsor-ready
    evidence workspace first, because those are the fastest path to a paid SOW
    and repeatable turnaround. Add PDX confirmation through partners only after
    sponsors show which hits deserve slower and costlier validation, then hire
    program operations and QA before a scaled sales team so quality and
    reproducibility do not break under the first 3-5 accounts. Use CRO and
    model-bank partnerships as capacity extensions after the company proves it
    can own the sponsor relationship and the reporting standard.
  notYet:
    - "Broad all-target ADC assay catalogs"
    - "Clinical-outcome prediction or companion-diagnostic claims"
    - "Owning tox, CMC, or manufacturing services"
    - "Direct Europe or Asia sales before the North American wedge repeats"
    - "Portfolio software sold without an attached benchmark program"
market:
  tam: "$240M estimated TAM based on roughly 400 global solid-tumor ADC programs per year that could face a resistant-comparator decision at about $0.6M blended benchmark and evidence-workspace spend each."
  sam: "$42M estimated initial SAM based on roughly 70 IND-near B7-H3, HER2, and adjacent solid-tumor programs in biotech and mid-size pharma accounts at the same ~$0.6M blended budget."
  som: "$6.6M estimated year-3 SOM based on 11 paid programs at about $0.6M average contract value, assuming one new account cluster per quarter and repeat expansion inside multi-program sponsors."
  segments:
    - "Primary: North American IND-near B7-H3 or HER2 ADC biotechs with novel payload programs and live board or partner pressure"
    - "Secondary: Mid-size pharma oncology teams and adjacent solid-tumor ADC sponsors running multi-program payload reviews once the first benchmark dataset is trusted"
  buyingProcess: >-
    The translational, pharmacology, or biomarker lead usually frames the study
    design, but the CSO or Head of Translational Development signs from an
    existing preclinical or CRO budget when an IND, board, or partner milestone
    is close. QA, legal, and scientific leadership then review model
    provenance, confidentiality, and electronic-record controls; the first
    contract is most likely a single-program benchmark SOW with an option for
    workspace access and follow-on confirmation work.
product:
  mvp: >-
    One fixed benchmark package for HER2 and B7-H3 solid-tumor programs
    covering resistant cell-line and organoid panels, TOPO-1 and microtubule
    comparators, standardized assay templates, and a sponsor-ready evidence
    pack in a secure workspace. The MVP is explicitly human-reviewed and audit-
    ready rather than a bespoke CRO menu or a clinical-prediction engine.
  sixMonth: >-
    Two repeatable starter panels live with partner-lab execution, defined
    sample intake requirements, exportable decision packs, and sponsor
    dashboards for turnaround, comparator deltas, and retest history; optional
    PDX confirmation is available only for the most promising hits.
  twelveMonth: >-
    Cross-program comparator database, role-based evidence reuse for board and
    partner diligence, and a limited set of adjacent target templates that
    reuse the same reporting standard without reopening the assay catalog.
  twentyFourMonth: >-
    Portfolio-level benchmark subscriptions for existing biotech accounts and
    the first mid-size pharma portfolio reviews, with broader solid-tumor
    target coverage and a deeper payload-class graph built from repeated
    sponsor work.
  keyBets:
    - "A fixed cell-line plus organoid starter panel is enough to win the first $200k-$300k pilots before buyers demand full PDX-heavy studies."
    - "Sponsors will pay extra for an audit-ready decision pack and workspace rather than treating reporting as bundled CRO output."
    - "At least half of early revenue can convert into repeat benchmarks, retests, or workspace subscriptions inside the same account."
    - "Partner-run wet-lab execution can meet reproducibility and turnaround targets without forcing the company to build a full CRO footprint."
gtm:
  wedge: >-
    Sell "payload-resistance proof before the next capital decision" to IND-
    near B7-H3 and HER2 programs, with the first proof point being a sponsor-
    accepted go or no-go benchmark pack rather than a general claim about
    better ADC discovery.
  channels:
    - "Founder-led scientific sales to CSOs, Heads of Translational Development, and preclinical pharmacology leaders at ADC biotechs"
    - "Investor, board, KOL, and advisor introductions into venture-backed ADC portfolios"
    - "Model-bank, CRO, and biomarker-lab referral partnerships once the company has a fixed reporting standard and one or two reference accounts"
  funnelTargets: "Target account→scientific diligence 30-40%, scientific diligence→paid pilot 20-30%, pilot→repeat program or annual workspace subscription 50%+"
  pricing: >-
    Charge per active program, starting around $200k-$300k for the fixed
    resistant cell-line and organoid benchmark plus decision pack, then expand
    toward the researched ~$0.6M blended ACV when the sponsor adds PDX
    confirmation, retests, and annual workspace access. This matches existing
    CRO and translational-study budgets better than a seat-based SaaS price.
businessModel:
  revenueStreams:
    - "Per-program benchmark SOWs for fixed resistant-panel campaigns"
    - "Annual evidence-workspace and comparator-database subscriptions"
    - "PDX confirmation, retest, and custom comparator expansion fees"
    - "Portfolio review retainers for multi-program biotech or pharma accounts"
  unitOfValue: "Active sponsor program benchmarked from comparator design through decision pack delivery"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Convert one benchmark into repeat payload-iteration work inside the same program"
    - "Expand from one program to multiple solid-tumor ADC programs at the same sponsor"
    - "Upsell annual workspace and benchmark-database access for board and partner diligence reuse"
    - "Add mid-size pharma portfolio reviews once the benchmark graph covers multiple payload classes"
strategyMap:
  northStarMetric: "Sponsor-accepted resistance benchmark packs delivered on time and reused in an IND, board, or partner decision per quarter"
  inputMetrics:
    - "Days from sample receipt to draft decision pack"
    - "Paid pilot to repeat-program or workspace conversion rate"
    - "Percentage of benchmarks run on fixed panels without bespoke assay redesign"
    - "Number of payload-class and comparator results added to the benchmark graph per quarter"
    - "Gross margin per program after partner-lab costs"
  moatsToBuild:
    - "Cross-sponsor comparator history linking payload class, target, model type, resistance mechanism, and sponsor decision"
    - "Audit-ready evidence workspace reused across board decks, partner diligence, and follow-on retests"
    - "A narrow but trusted operating standard for resistance benchmarking that partners can execute but sponsors associate with the company"
  killCriteria:
    - "Fewer than 3 paid sponsor pilots by month 12 after at least 20 ICP conversations"
    - "Fewer than 2 of the first 4 pilots convert to repeat work or workspace subscription within 6 months"
    - "Early pilots fail to produce a sponsor-accepted decision pack within 6 weeks or fail to influence a real go or no-go, partnering, or portfolio decision"
    - "The first 3 SOWs do not yield enough blinded data-retention rights to build an anonymized benchmark graph"
  mermaid: |
    flowchart LR
      Wedge[IND-near ADC payload benchmark] --> MVP[Fixed resistant panels plus decision pack]
      MVP --> Proof[Sponsor-accepted go or no-go evidence]
      Proof --> Expansion[Repeat programs and portfolio subscriptions]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Worth a partner meeting because the buyer, trigger, and budget are real,
      but conviction depends on proving that standardized resistant panels
      change sponsor decisions and do not collapse into custom CRO work.
    whyBelieve: >-
      Large-pharma M&A plus existing ADC CRO spend both point to an urgent,
      budgeted workflow where a neutral benchmark layer could become the
      default evidence standard.
    whyDoubt: >-
      If sponsors view the output as just another bespoke assay package or do
      not trust model-to-decision validity, the business never earns software-
      like margins or a durable data moat.
    nextDiligence: >-
      See 2-3 paid pilots where the sponsor says the benchmark changed or
      validated an IND, board, or partnering decision and then buys repeat
      work.
  firstCustomer:
    title: "Head of Translational Development at a 40-150 person ADC biotech"
    profile: >-
      The company has an IND-near HER2 or B7-H3 solid-tumor program with a
      novel payload, lean internal resistant-model capability, and an upcoming
      board, financing, or partner data-room milestone.
    trigger: >-
      Leadership asks whether the payload truly beats TOPO-1 or microtubule
      comparators in resistant models before committing more tox, CMC, or BD
      spend.
    buyer: "CSO or Head of Translational Development"
    initialContract: >-
      $200k-$300k pilot SOW for one fixed resistant-panel benchmark and
      decision pack, expanding toward roughly $500k-$650k per active program
      when the sponsor adds retests, PDX confirmation, and workspace access.
  mustBeTrue:
    - "At least 10-15 IND-near ADC programs per year fit the beachhead profile and have a live resistance-proof buying trigger."
    - "CSO or translational buyers will sign a $200k-$300k pilot before simply expanding scope with an incumbent CRO."
    - "A fixed starter panel plus optional confirmation work changes or validates sponsor go or no-go decisions in at least half of early pilots."
    - "At least 2 of the first 3 sponsor contracts allow blinded data retention and enough reuse to seed a benchmark graph."
    - "By month 18, at least half of revenue comes from repeat benchmarks or workspace subscriptions, proving the model is not one-off services."
  diligenceQuestions:
    - "Which named HER2, B7-H3, or adjacent novel-payload programs have a board or partner milestone in the next 12 months?"
    - "What exact comparator studies and budgets are those teams already buying from Crown, Champions, WuXi, or internal labs?"
    - "Which first model mix actually changes CSO decisions most often: resistant cell lines, organoids, or PDX?"
    - "What contractual language will sponsors accept for blinded data retention and cross-program benchmark reuse?"
    - "How much assay setup and reporting can stay fixed before sponsor requests push gross margin below the 70% target?"
operatingAssumptions:
  - assumption: >-
      Buyers will close from existing translational or preclinical budgets when
      the sales motion attaches to a live IND, board, or partnering milestone.
    basis: research.yaml
    validationTest: >-
      Run 15-20 ICP interviews and target 3 signed pilot terms from buyers with
      a decision event inside 12 months.
    decisionImpact: >-
      If false, the company needs a smaller pilot price or sponsor-bundled
      procurement path, which weakens ACV and slows hiring.
  - assumption: >-
      A fixed cell-line plus organoid starter panel is sufficient for the first
      purchase, with PDX reserved for confirmation rather than included up
      front.
    basis: operator judgment
    validationTest: >-
      In the first 3 pilots, compare close rate, turnaround, and sponsor
      decision confidence between starter-panel-only scopes and PDX-inclusive
      scopes.
    decisionImpact: >-
      If false, capital needs rise, turnaround slows, and the company looks
      more like a specialty CRO than a scalable benchmark layer.
  - assumption: >-
      Sponsors will grant enough blinded retention and reuse rights for the
      company to build an anonymized comparator database.
    basis: research.yaml
    validationTest: >-
      Negotiate the first 3 SOWs with explicit data-rights clauses and require
      at least 2 accounts to permit blinded benchmark retention.
    decisionImpact: >-
      If false, the data moat disappears and the strategy should shift toward a
      premium services business rather than subscription expansion.
  - assumption: >-
      Partner labs and model banks can execute fixed SOPs with reproducibility
      and turnaround good enough for sponsor trust.
    basis: operator judgment
    validationTest: >-
      Run the first 2 live programs through external partners and measure
      turnaround, QC exceptions, and sponsor acceptance against predefined
      SLAs.
    decisionImpact: >-
      If false, the company must either bring more assay operations in-house or
      narrow the product to software and reporting only.
  - assumption: >-
      The same buyer will expand into repeat benchmarks, retests, or a second
      program within 12 months if the first decision pack is useful.
    basis: idea.yaml
    validationTest: >-
      Track the first 4 paid accounts and require at least 2 to purchase repeat
      work or workspace access within 6 months of the first delivery.
    decisionImpact: >-
      If false, the reachable market is closer to one-off project revenue and
      the funding plan should stay capital-efficient.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: ICP and pricing discovery sprint
    hypothesis: Existing translational budgets can support a $200k-$300k pilot if the offer is tied to a near-term capital decision.
    successMetric: "15 ICP interviews completed, 8 buyers confirm active pain, and 3 agree to pilot pricing range"
    owner: Founding CEO
  - horizon: 0–90 days
    experiment: Starter-panel design test
    hypothesis: A fixed HER2/B7-H3 resistant cell-line plus organoid panel covers enough sponsor questions to sell before bespoke PDX work is requested.
    successMetric: "At least 5 design-partner buyers accept one common starter-panel spec with only minor comparator edits"
    owner: Scientific lead
  - horizon: 0–90 days
    experiment: Data-rights and compliance template negotiation
    hypothesis: Sponsors and partners will accept an SOW template that preserves confidentiality while allowing blinded benchmark retention and audit-ready reporting.
    successMetric: "2 partner labs and 2 target sponsors approve redlineable standard terms"
    owner: QA and operations lead
  - horizon: 90–180 days
    experiment: First paid benchmark pilot
    hypothesis: The company can deliver a sponsor-accepted decision pack within 6 weeks on a fixed panel and earn a clear go or no-go conclusion.
    successMetric: "1 paid pilot delivered within SLA and explicitly reused in a board, IND, or partner discussion"
    owner: Program operations lead
  - horizon: 90–180 days
    experiment: Workspace upsell test
    hypothesis: Buyers will pay for evidence reuse, retest tracking, and comparator history instead of treating reporting as bundled services.
    successMetric: "1 of the first 2 pilot customers adds paid workspace or retest subscription within 60 days"
    owner: Product lead
  - horizon: 180–365 days
    experiment: CRO or model-bank co-sell pilot
    hypothesis: A partner can source qualified accounts without taking over the sponsor-facing benchmark brand.
    successMetric: "2 qualified introductions and 1 signed pilot from one partner channel within 6 months"
    owner: Founding CEO
  - horizon: 180–365 days
    experiment: Retrospective concordance study
    hypothesis: Standardized resistant benchmarks show enough differentiation versus legacy comparators to support sponsor trust beyond one custom study.
    successMetric: "A blinded retrospective readout across completed programs shows at least one repeatable resistance-signal pattern sponsors cite in follow-on decisions"
    owner: Scientific lead
operations:
  - "Model sourcing and QC: license resistant cell lines, organoids, and annotations from public and commercial repositories; lock inclusion criteria and comparator definitions before scaling volume."
  - "Assay execution: run fixed SOPs through partner labs with chain-of-custody, turnaround SLAs, and explicit QC checkpoints rather than open-ended custom study design."
  - "Evidence workspace: maintain secure sponsor portals, exported decision packs, audit trails, and retest history aligned to Part 11-style record expectations."
  - "Data governance: use minimal-necessary payload disclosure, sponsor-specific confidentiality controls, and negotiated blinded reuse rights for benchmark retention."
  - "Key partners: model banks, ADC CROs, biomarker labs, and target-specific KOLs for HER2 and B7-H3 comparator relevance."
team:
  - role: Founding CEO and scientific seller
    startTiming: Month 0
    rationale: >-
      Owns sponsor discovery, design-partner sales, and pricing; must credibly
      sell to CSOs and translational leaders around board and IND milestones.
  - role: Founding scientific lead
    startTiming: Month 0
    rationale: >-
      Defines resistant panels, comparator logic, assay readouts, and follow-
      on confirmation rules so the product stays decision-grade rather than
      turning into generic wet-lab execution.
  - role: Founding product and data engineer
    startTiming: Month 0
    rationale: >-
      Builds the evidence workspace, audit trail, benchmark graph, and sponsor
      reporting layer that differentiates the company from CRO output.
  - role: QA and program operations lead
    startTiming: Month 4
    rationale: >-
      Owns partner-lab SOPs, chain-of-custody, data-rights workflows, and
      pilot delivery so the first programs are reproducible and referenceable.
  - role: Partnerships and account expansion lead
    startTiming: Month 9
    rationale: >-
      Turns reference pilots into repeat programs, manages CRO or model-bank
      channels, and keeps same-account expansion ahead of logo-chasing.
milestones:
  - horizon: 0–12 months
    items:
      - "Month 3: 15-20 ICP interviews completed, two model or lab partners signed, and one fixed starter-panel spec locked"
      - "Month 6: first paid HER2 or B7-H3 benchmark pilot launched with standard SOW and audit-ready reporting template"
      - "Month 9: first sponsor-accepted decision pack delivered and first repeat SOW or workspace upsell closed"
      - "Month 12: three paid programs, sub-six-week standard turnaround, and one anonymized case study proving decision value"
  - horizon: 12–24 months
    items:
      - "Month 18: six active programs, PDX confirmation module live through partners, and one qualified co-sell channel producing pipeline"
      - "Month 21: benchmark graph covers at least three payload classes with repeated comparator histories"
      - "Month 24: first mid-size pharma portfolio review contract and more than half of revenue from repeat or subscription accounts"
  - horizon: 24–36 months
    items:
      - "Month 30: eight active programs and first same-buyer expansion into a second solid-tumor ADC program"
      - "Month 36: eleven paid programs at roughly $0.6M blended ACV and a clear read on whether broader ADC portfolio expansion supports the next financing step"
risks:
  - risk: Standardized resistant panels do not predict or materially influence sponsor decisions
    likelihood: High
    impact: High
    mitigation: >-
      Start with decision-support claims, include known comparators, collect
      retrospective and forward concordance evidence, and avoid promising
      clinical prediction before the data supports it.
  - risk: Sponsors push every study into bespoke model and reporting requests, destroying gross margin
    likelihood: High
    impact: High
    mitigation: >-
      Refuse open-ended assay menus, price custom additions separately, and
      keep the first year focused on one starter-panel family with a narrow
      reporting standard.
  - risk: Data-sharing, payload confidentiality, or reuse-rights restrictions block the benchmark graph
    likelihood: Medium
    impact: High
    mitigation: >-
      Use minimal-necessary disclosure, strong confidentiality controls, and
      blinded retention clauses from the first SOW rather than treating data
      rights as an afterthought.
  - risk: Integrated CROs bundle similar resistance work and undercut standalone pricing
    likelihood: Medium
    impact: High
    mitigation: >-
      Position as the neutral sponsor-facing decision layer, partner where
      useful, and deepen the reusable comparator history that any single CRO
      sees only in fragments.
  - risk: The IND-near buyer universe stays narrower or slower-moving than the market model assumes
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Keep burn tied to reference accounts, prioritize same-account expansion
      before new logo growth, and validate adjacent target or pharma portfolio
      use cases before adding headcount.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway to build the fixed HER2 and B7-H3 benchmark panels and
    evidence workspace, hire founding scientific, product, and QA talent,
    secure 3-4 paid sponsor pilots, prove repeat-program expansion, and
    establish whether a partner-led wet-lab model can sustain 70%+ gross
    margin.
