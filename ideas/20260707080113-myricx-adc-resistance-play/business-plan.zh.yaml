slug: adc-resistance-benchmark-foundry
date: '2026-07-07'
executiveSummary: 把新型载荷推进到 IND 支持性阶段的 ADC 生物科技公司，眼下卡在一个新瓶颈：得先证明这个载荷绕开 TOPO-1 或微管耐药的能力，强到值得继续砸 tox、CMC 和合作预算。 Myricx 卖给 Novartis 这笔交易，把“耐药语境下还能起效”从一页好看的转化数据，变成了资本配置要看的硬证据。 第一批客户就该锁定为 40-150 人的 Series A-C ADC 生物科技公司：手里有 B7-H3 或 HER2 实体瘤项目，6-12 个月内要过董事会或合作方审查，但内部没有中立的基准能力。 产品起步就该是一个固定的耐药基准包——精选耐药细胞系和类器官面板、标准 TOPO-1 与微管对照，再配一份经得起审计的决策包——按单项目 SOW 售卖，工作台访问权限另选。 这一切口故意做窄：只打一个买方、一个触发点、一个证明题——这类载荷该推进，还是该在继续花 IND 或 BD 预算前就被砍掉？ 这笔预算今天本来就在 CRO 手里，所以 GTM 应该顺着现有转化研究支出走，并跟实验室合作，而不是自己从零搭一整套全服务 CRO。 最大的战略风险不是有没有需求，而是买方会不会信：如果标准化面板既改不了申办方决策，也没法在尽调里被可信复用，公司就会塌回定制服务。 按研究口径估算，初始 SAM 约 $42M，第 3 年 SOM 约 $6.6M；但真实在跑的项目数、以及第一版最该上的模型组合，都还没被验证。 要是早期试点能证明三件事——申办方认可决策包、交付周期压到 6 周以内、同一客户会重复付费——公司就能从 B7-H3 / HER2 项目扩成更广的 ADC 项目组合基准平台。
problem:
- 申办方能证明通用效力，但一旦 TOPO-1 或微管载荷在耐药实体瘤场景里失效，他们往往证明不了新载荷是否还真有用。
- 今天的证据栈散在 CRO 面板、高校耐药模型、公共资源库和内部对照研究里，所以董事会和合作方看到的不是一份决策级答案，而是一堆口径不一的数据。
- IND、融资和合作节点逼着 CSO 在还没确认“耐药逃逸”是否真实成立之前就要拍板投钱，错押一个载荷的代价很高。
solution:
- 先在 HER2 和 B7-H3 项目上，用固定的 TOPO-1 与微管对照，加上精选耐药细胞系和类器官面板，跑一套标准化基准测试包。
- 交付一套经得起审计的证据工作台和可导出的决策包，明确告诉客户：载荷在哪些模型里把活性抢回来了、耐药还卡在哪儿、哪些结果值得继续花钱。
- 只有当这套固定起步面板先证明了决策价值，才叠加合作方执行的 PDX 确认、复测和多项目基准测试。
whyWeWin:
- 和一体化 CRO 不一样，这家公司卖的是一层中立、面向申办方的基准系统；产品不是实验室利用率，而是决策包和可复用的对照历史。
- 先卡一个接近 IND 的窄流程，能让团队比“什么 ADC 服务都做”的切法更快把面板、交付周期和定价打标准。
- 每一个付费基准测试，都会多沉淀一块“载荷类别 × 靶点 × 模型 × 耐药机制 × 申办方结果”的专有矩阵，客户越多越难复刻。
- 公司可以和模型库、CRO、生物标志物实验室协作，而不是替代它们，这会降低 GTM 摩擦，也让 capex 更轻。
strategicChoices:
  beachhead: 北美的 Series A-C ADC 生物科技公司：40-150 名员工，手里有接近 IND 的 B7-H3 或 HER2 实体瘤项目，以及一个必须在未来 6-12 个月过董事会、融资或合作审查的新型非 TOPO-1 载荷。
  wedgeRationale: 这一刀切得足够小，能把一套对照设计做成标准；同时又足够痛，能更快把预算签下来：买方本来就在花 CRO 和转化预算，触发点有明确日期，决策也只有推进或终止。 如果一开始就想卖给所有 ADC 项目，或者所有肿瘤转化研究，证明题会变模糊，公司还没打出基准品牌，就会先跟全服务供应商正面撞上。
  sequencingRationale: 先把固定的耐药细胞系和类器官面板，以及面向申办方的证据工作台做出来，因为这是最快拿到付费 SOW、也最容易把交付周期跑顺的路径。 PDX 确认放到后面，由合作方执行——先等申办方告诉我们，哪些命中结果值得上更慢、更贵的验证。 招聘顺序也先补项目运营和 QA，再上规模化销售团队，避免前 3-5 个客户就把质量和可复现性压垮。 等公司证明自己能抓住申办方关系和报告标准后，再把 CRO 与模型库伙伴当作产能延伸。
  notYet:
  - 不做面向所有靶点的宽泛 ADC 实验目录
  - 不碰临床结果预测或伴随诊断声明
  - 不自营 tox、CMC 或生产服务
  - 在北美切口跑通之前，不直接去欧洲或亚洲卖
  - 不单独卖脱离基准项目的项目组合软件
market:
  tam: $240M 的估算 TAM：假设全球每年约有 400 个实体瘤 ADC 项目，会遇到一次耐药对照决策；每个项目对应约 $0.6M 的混合基准测试与证据工作台支出。
  sam: $42M 的初始 SAM：把 TAM 收窄到生物科技公司和中型制药公司账户里约 70 个接近 IND 的 B7-H3、HER2 及相邻实体瘤项目，预算仍按约 $0.6M / 项目计算。
  som: $6.6M 的第 3 年 SOM：假设 11 个付费项目、平均合同额约 $0.6M，并且每季度新增一个客户簇，同时在多项目申办方内部实现扩单。
  segments:
  - 主要：北美、接近 IND 的 B7-H3 或 HER2 ADC 生物科技公司，手里有新载荷项目，而且眼前就有董事会或合作方压力
  - 次要：一旦首批基准数据被信任，就切入中型制药公司肿瘤团队，以及正在做多项目载荷评审的相邻实体瘤 ADC 申办方
  buyingProcess: 研究设计通常由转化、药理或生物标志物负责人提出，但真正签字的人多半是 CSO 或转化 / 临床前开发负责人；因为这笔钱走的是现有临床前或 CRO 预算，而且往往卡在临近 IND、董事会或合作方里程碑的时间点。 接下来 QA、法务和科学负责人会审模型来源、保密条款和电子记录控制；第一单最像是一份单项目耐药基准测试 SOW，外加证据工作台和后续确认工作的选配项。
product:
  mvp: 先做一个固定基准测试包，服务 HER2 和 B7-H3 实体瘤项目：覆盖耐药细胞系与类器官面板、TOPO-1 与微管对照、标准实验模板，以及放在安全工作台里的申办方可用证据包。 这个 MVP 明确强调“人工审核 + 经得起审计”，而不是定制 CRO 菜单，也不是临床预测引擎。
  sixMonth: 两套可重复交付的起步面板上线，由合作实验室执行；同时明确样本接收要求、可导出的决策包，以及展示交付周期、对照差值和复测历史的申办方仪表盘。PDX 确认只给最值得追的命中结果。
  twelveMonth: 做出跨项目对照数据库、面向董事会和合作方尽调的按角色证据复用能力，以及少数几个相邻靶点模板；沿用同一套报告标准，但不把实验目录重新摊大。
  twentyFourMonth: 给现有生物科技客户卖项目组合级基准订阅，并拿下第一批中型制药公司的项目组合评审；同时把实体瘤靶点覆盖做宽，把重复申办方工作沉淀成更深的载荷类别图谱。
  keyBets:
  - 固定的“细胞系 + 类器官”起步面板，足以先拿下 $200k-$300k 的首批试点；买方不会一上来就要求重 PDX 的全套研究。
  - 申办方愿意额外为经得起审计的决策包和工作台付钱，而不会把报告默认看成 CRO 套餐附带物。
  - 早期至少一半收入能在同一客户里转成复购基准测试、复测或工作台订阅。
  - 由合作伙伴执行的湿实验，也能把可复现性和交付周期跑到位，不需要公司自己长成一整家 CRO。
gtm:
  wedge: 把“在下一次资本决策前先证明载荷能不能绕开耐药”卖给接近 IND 的 B7-H3 和 HER2 项目；第一证明题不是泛泛而谈“更好的 ADC 发现”，而是一份申办方认可的推进 / 终止基准包。
  channels:
  - 创始人主导的科学销售，直接面向 ADC 生物科技公司的 CSO、转化开发负责人和临床前药理负责人
  - 通过投资人、董事会成员、KOL 和顾问引荐，切入风投支持的 ADC 组合
  - 公司先把报告标准和一两个标杆客户跑出来，再与模型库、CRO 和生物标志物实验室建立转介绍合作
  funnelTargets: 目标账户→科学尽调 30-40%，科学尽调→付费试点 20-30%，试点→复购项目或年度工作台订阅 50%+
  pricing: 按活跃项目收费，固定耐药细胞系 + 类器官基准测试和决策包起步价约 $200k-$300k；当申办方叠加 PDX 确认、复测和年度工作台访问时，合同额再向研究里的约 $0.6M 混合 ACV 抬升。 这比按席位卖 SaaS，更贴近今天已有的 CRO 与转化研究预算。
businessModel:
  revenueStreams:
  - 面向固定耐药面板项目的单项目基准测试 SOW
  - 年度证据工作台与对照数据库订阅
  - PDX 确认、复测和定制对照扩展费用
  - 服务多项目生物科技公司或制药公司账户的项目组合评审年度顾问费
  unitOfValue: 从对照设计到交付决策包的一次活跃申办方项目基准测试
  targetGrossMarginPct: 70
  expansionLevers:
  - 把一次基准测试扩成同一项目里的多轮载荷迭代工作
  - 从同一申办方的一个项目扩到多个实体瘤 ADC 项目
  - 向董事会和合作方尽调复用场景加卖年度工作台与基准数据库访问
  - 等基准图谱覆盖多个载荷类别后，再切进中型制药公司的项目组合评审
strategyMap:
  northStarMetric: 每季度按时交付、并被用于 IND、董事会或合作决策的申办方认可耐药基准包
  inputMetrics:
  - 从收到样本到交出首版决策包的天数
  - 付费试点转成复购项目或工作台订阅的转化率
  - 无需重做定制实验设计、直接跑固定面板的基准测试占比
  - 每季度新增到基准图谱里的载荷类别和对照结果数量
  - 扣掉合作实验室成本后的单项目毛利
  moatsToBuild:
  - 把载荷类别、靶点、模型类型、耐药机制和申办方决策串起来的跨申办方对照历史
  - 能在董事会材料、合作方尽调和后续复测里反复复用的审计级证据工作台
  - 一套切口很窄、但被买方信任的耐药基准测试操作标准：伙伴能执行，品牌归公司
  killCriteria:
  - 在至少做完 20 次 ICP 沟通后，12 个月内还拿不到 3 个付费申办方试点
  - 首批 4 个试点里，不到 2 个能在 6 个月内转成复购或工作台订阅
  - 早期试点既做不到 6 周内交付申办方认可的决策包，也没法影响真实的推进 / 终止、合作或项目组合决策
  - 前 3 份 SOW 拿不到足够的脱敏数据留存权，建不起匿名化基准图谱
  mermaid: |-
    flowchart LR
      Wedge[接近 IND 的 ADC 载荷基准测试] --> MVP[固定耐药面板 + 决策包]
      MVP --> Proof[申办方认可的推进 / 终止证据]
      Proof --> Expansion[复购项目与项目组合订阅]
investorMemo:
  verdict:
    call: 见合伙人 / 继续尽调
    conviction: 值得约合伙人聊，因为买方、触发点和预算都是真的；但最终能不能下注，要看标准化耐药面板到底能不能改变申办方决策，而且不会塌回定制 CRO 工作。
    whyBelieve: 大药企并购和现有 ADC CRO 支出，指向的是同一条又急又有预算的工作流；只要中立基准层成立，它就有机会长成默认证据标准。
    whyDoubt: 如果申办方只把交付物当成又一份定制实验包，或者根本不信“模型到决策”的有效性，这门生意就拿不到软件式毛利，也长不出耐久数据护城河。
    nextDiligence: 先看 2-3 个付费试点：申办方是否明确承认，这套基准测试改变了或验证了他们的 IND、董事会或合作决策；然后是否继续复购。
  firstCustomer:
    title: 40-150 人 ADC 生物科技公司的转化开发负责人
    profile: 公司手里有一个接近 IND 的 HER2 或 B7-H3 实体瘤项目，载荷是新的，内部耐药模型能力又偏弱，而且马上就要面对董事会、融资或合作方资料室节点。
    trigger: 管理层在继续砸 tox、CMC 或 BD 预算之前，会先追问：这套载荷在耐药模型里，真的打赢了 TOPO-1 或微管对照吗？
    buyer: CSO 或转化开发负责人
    initialContract: 一份 $200k-$300k 的试点 SOW，用于一次固定耐药面板基准测试和决策包；当申办方追加复测、PDX 确认和工作台访问时，单个活跃项目合同可扩到约 $500k-$650k。
  mustBeTrue:
  - 每年至少有 10-15 个接近 IND 的 ADC 项目符合这类滩头画像，而且眼前真有“证明耐药”的购买触发点。
  - CSO 或转化买方愿意先签 $200k-$300k 的试点，而不是直接把需求加到现有 CRO 身上。
  - 固定起步面板加可选确认工作，至少能在一半早期试点里改变或验证申办方的推进 / 终止决策。
  - 前 3 个申办方合同里，至少有 2 个愿意给脱敏数据留存与复用权，足够点亮第一版基准图谱。
  - 到 Month 18，至少一半收入来自复购基准测试或工作台订阅，证明模式不是一次性服务。
  diligenceQuestions:
  - 未来 12 个月里，哪些明确点名的 HER2、B7-H3 或相邻新载荷项目要过董事会或合作方节点？
  - 这些团队今天到底在 Crown、Champions、WuXi 或内部实验室买哪些对照研究、花多少钱？
  - 最能改变 CSO 决策的第一版模型组合到底是什么：耐药细胞系、类器官，还是 PDX？
  - 申办方愿意接受怎样的合同条款，来支持脱敏数据留存和跨项目基准复用？
  - 在不把毛利压到 70% 以下之前，实验搭建和报告到底有多少能保持标准化？
operatingAssumptions:
- assumption: 只要销售动作挂在一个真实存在的 IND、董事会或合作节点上，买方就会用现有转化或临床前预算把单签下来。
  basis: research.yaml
  validationTest: 做 15-20 个 ICP 访谈，并争取 3 份已签的试点条款；这些买方都得在 12 个月内有明确决策事件。
  decisionImpact: 如果不成立，公司就得把试点价格再做小，或者改走和申办方打包采购的路径；那会直接削弱 ACV，也会拖慢招聘。
- assumption: 第一次购买只要固定的细胞系 + 类器官起步面板就够了；PDX 应该留作确认环节，而不是前置标配。
  basis: 团队判断
  validationTest: 在前 3 个试点里，对比“只卖起步面板”和“把 PDX 一起打包”的成交率、交付周期和申办方决策信心。
  decisionImpact: 如果不成立，资本需求会上去、交付周期会变慢，公司也会更像一家专科 CRO，而不是可规模化的基准系统。
- assumption: 申办方愿意给足够的脱敏留存和复用权，让公司建起匿名化的对照数据库。
  basis: research.yaml
  validationTest: 前 3 份 SOW 都要把数据权条款写清楚，并要求至少 2 个账户允许脱敏基准结果留存。
  decisionImpact: 如果不成立，数据护城河就没了，战略应转向高溢价服务业务，而不是订阅扩张。
- assumption: 合作实验室和模型库能按固定 SOP 执行，交付出足够可复现、也足够快的结果，赢得申办方信任。
  basis: 团队判断
  validationTest: 前 2 个真实项目先走外部伙伴，按预设 SLA 量交付周期、QC 异常和申办方接受度。
  decisionImpact: 如果不成立，公司要么把更多实验运营收回来自己做，要么把产品收窄成纯软件和报告层。
- assumption: 如果第一份决策包真有用，同一买方会在 12 个月内扩成复购基准测试、复测，或第二个项目。
  basis: idea.yaml
  validationTest: 追踪前 4 个付费账户，至少要有 2 个在首轮交付后 6 个月内再买一次工作或工作台访问。
  decisionImpact: 如果不成立，可触达市场就更接近一次性项目收入，融资计划也该继续走轻资本路线。
experimentRoadmap:
- horizon: 0–90 天
  experiment: ICP 与定价发现冲刺
  hypothesis: 只要提案直接挂在近期资本决策上，现有转化预算就足以支持一单 $200k-$300k 的试点。
  successMetric: 完成 15 次 ICP 访谈、8 位买方确认痛点正在发生、3 位接受试点定价区间
  owner: 创始人 / CEO
- horizon: 0–90 天
  experiment: 起步面板设计测试
  hypothesis: 一套固定的 HER2 / B7-H3 耐药细胞系 + 类器官面板，足以覆盖大部分申办方问题，不必先上定制 PDX。
  successMetric: 至少 5 位共创客户接受同一份起步面板规格，只有很小的对照项修改
  owner: 科学负责人
- horizon: 0–90 天
  experiment: 数据权与合规模板谈判
  hypothesis: 申办方和合作伙伴会接受一份既保密、又允许脱敏基准结果留存和审计级报告的 SOW 模板。
  successMetric: 2 家合作实验室和 2 家目标申办方批准可修改红线的标准条款
  owner: QA 与运营负责人
- horizon: 90–180 天
  experiment: 首个付费基准测试试点
  hypothesis: 公司能在固定面板上 6 周内交出申办方认可的决策包，并得出清晰的推进 / 终止结论。
  successMetric: 1 个付费试点在 SLA 内交付，并被明确用于董事会、IND 或合作方讨论
  owner: 项目运营负责人
- horizon: 90–180 天
  experiment: 工作台加卖测试
  hypothesis: 买方愿意为证据复用、复测追踪和对照历史付费，而不是把报告默认看成服务附带品。
  successMetric: 前 2 个试点客户里，至少 1 个在 60 天内加购付费工作台或复测订阅
  owner: 产品负责人
- horizon: 180–365 天
  experiment: CRO 或模型库联合销售试点
  hypothesis: 合作伙伴可以带来合格账户，同时又不抢走面向申办方的基准品牌。
  successMetric: 单个合作渠道在 6 个月内带来 2 个合格引荐和 1 个已签试点
  owner: 创始人 / CEO
- horizon: 180–365 天
  experiment: 回顾性一致性研究
  hypothesis: 标准化耐药基准测试，相比传统对照，能沉淀出足够可重复的差异信号，让申办方不只把它当成一项定制研究。
  successMetric: 在已完成项目上做一轮脱敏回顾性读数，跑出至少一个可重复的耐药信号模式，并被申办方在后续决策中引用
  owner: 科学负责人
operations:
- 模型 sourcing 与 QC：从公共和商业资源库授权耐药细胞系、类器官及其注释；在放量前先锁死纳入标准和对照定义。
- 实验执行：通过合作实验室跑固定 SOP，明确样本保管链、交付 SLA 和 QC 检查点，而不是走无上限的定制研究设计。
- 证据工作台：维护安全的申办方门户、可导出的决策包、审计轨迹和复测历史，对齐 Part 11 风格的记录要求。
- 数据治理：尽量少披露载荷信息，给每个申办方单独上保密控制，并把脱敏复用权从第一份基准测试 SOW 就谈清楚。
- 关键伙伴：模型库、ADC CRO、生物标志物实验室，以及服务 HER2 和 B7-H3 对照设计的靶点 KOL。
team:
- role: 创始人 / CEO（兼科学销售）
  startTiming: Month 0
  rationale: 负责申办方发现、共创客户销售和定价；必须能围绕董事会和 IND 节点，可信地把产品卖给 CSO 与转化负责人。
- role: 创始科学负责人
  startTiming: Month 0
  rationale: 定义耐药面板、对照逻辑、实验读数和后续确认规则，保证产品始终是一套决策级工具，而不是通用湿实验执行。
- role: 创始产品与数据工程师
  startTiming: Month 0
  rationale: 搭起证据工作台、审计轨迹、基准图谱和申办方报告层，这才是公司和 CRO 产出真正拉开差距的地方。
- role: QA 与项目运营负责人
  startTiming: Month 4
  rationale: 负责合作实验室 SOP、样本保管链、数据权流程和试点交付，让首批项目既可复现，也能被后续引用。
- role: 合作与客户扩单负责人
  startTiming: Month 9
  rationale: 把标杆试点变成复购项目，管好 CRO / 模型库渠道，并确保同一客户扩单快过一味追逐新客户。
milestones:
- horizon: 0–12 个月
  items:
  - Month 3：完成 15-20 次 ICP 访谈，签下两家模型或实验室合作伙伴，并锁定一份固定起步面板规格
  - Month 6：以标准 SOW 和审计级报告模板启动第一个付费 HER2 或 B7-H3 基准测试试点
  - Month 9：交付第一份获申办方认可的决策包，并签下第一份复购 SOW 或工作台加购
  - Month 12：拿下 3 个付费项目，把标准交付周期压到 6 周以内，并做出一份证明决策价值的匿名案例
- horizon: 12–24 个月
  items:
  - Month 18：6 个活跃项目，借合作伙伴上线 PDX 确认模块，并让一条合格的联合销售渠道开始带来销售线索
  - Month 21：基准图谱覆盖至少 3 个载荷类别，并积累起可重复使用的对照历史
  - Month 24：签下第一份中型制药公司项目组合评审合同，而且过半收入来自复购或订阅账户
- horizon: 24–36 个月
  items:
  - Month 30：8 个活跃项目，并在同一买方内部完成第一次第二实体瘤 ADC 项目扩单
  - Month 36：11 个付费项目、混合 ACV 约 $0.6M，并明确读出更广的 ADC 项目组合扩张是否足以支撑下一轮融资
risks:
- risk: 标准化耐药面板既预测不了结果，也实质性影响不了申办方决策
  likelihood: High
  impact: High
  mitigation: 先把产品定位成决策支持，带上已知对照，逐步积累回顾性和前瞻性一致性证据；在数据没跑出来前，不承诺临床预测。
- risk: 申办方把每项研究都推向定制模型和定制报告，毛利被打穿
  likelihood: High
  impact: High
  mitigation: 拒绝无边界的实验菜单，定制项单独收费，头一年只围绕一类起步面板家族和一套很窄的报告标准展开。
- risk: 数据共享、载荷保密或复用权限制，把基准图谱卡死
  likelihood: Medium
  impact: High
  mitigation: 从第一份 SOW 起就上最小必要披露、强保密控制和脱敏留存条款，而不是事后才补数据权。
- risk: 一体化 CRO 把相近的耐药工作打包进大项目，压低独立定价
  likelihood: Medium
  impact: High
  mitigation: 把自己摆成中立、面向申办方的决策层；能合作就合作，同时把任何单家 CRO 都只看见碎片的对照历史做深。
- risk: 接近 IND 的买方池比模型假设更窄，或者推进节奏更慢
  likelihood: Medium
  impact: Medium
  mitigation: 把现金消耗跟着标杆账户走，先做同一客户扩单，再谈新客户增长；在加人前，先把相邻靶点或制药公司项目组合场景验证清楚。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 这轮钱覆盖 18 个月跑道：把固定的 HER2 和 B7-H3 基准面板与证据工作台做出来，招齐创始科学、产品和 QA 人才，拿下 3-4 个付费申办方试点，验证同一客户的项目扩单，并判断“由伙伴执行湿实验”的模式能否把毛利稳定在 70% 以上。
