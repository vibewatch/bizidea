  willingnessToPay:
    summary: 付费意愿是可信的，因为买方今天已经把 ADC 测试、转化药理、耐药模型和更广的开发支持外包出去。只要耐药基准产品能把多个供应商压缩成一套可直接决策的交付物，并减少返工重测，它就能吃到现成预算。
    sourceRefs:
