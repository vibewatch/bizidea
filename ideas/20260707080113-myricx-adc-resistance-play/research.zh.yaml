  validationPlan:
  - priority: 高
    question: 未来 12 个月里，哪些接近 IND 的 ADC 项目会愿意为第三方耐药基准测试买单？
    evidenceToGather: 做 15-20 次客户发现访谈，跑 3 个付费共创客户试点，并在全面搭建工作台前拿到至少 1 份已签的基准测试 SOW。
  - priority: 高
    question: 哪种模型组合最常改变推进 / 终止决策：耐药细胞系、类器官，还是 PDX？
    evidenceToGather: 回访做过对照研究的团队，再叠加不同模型类别的并排试点读数。
  - priority: 中
    question: 证据工作台能不能长成持续性 ARR，而不是一次性研究打包？
    evidenceToGather: 围绕面板刷新、对照数据库访问和合作方资料室模块做定价测试。
