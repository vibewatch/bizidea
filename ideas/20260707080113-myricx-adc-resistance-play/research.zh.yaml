    rationale: 假设全球每年约有 400 个活跃实体瘤 ADC 项目，会遇到一次耐药对照决策；再乘以一笔约 $0.6M 的混合基准测试与证据工作台预算，这个数字和今天一套外部整合研究栈的花费相近。
    isEstimate: true
    sourceRefs:
    - 7
    - 8
    - 12
    - 15
    - 16
    - 17
    - 18
    - 24
    - 28
  sam:
    value: $42.0M
    rationale: 把 TAM 收窄到初始 生物科技公司和中型制药公司赞助方里、约 70 个接近 IND 的 B7-H3、HER2 及相邻实体瘤项目，预算仍按同一笔约 $0.6M 的混合费用算。
    isEstimate: true
    sourceRefs:
