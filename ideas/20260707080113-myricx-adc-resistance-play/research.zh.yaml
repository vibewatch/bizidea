reportMemo:
  executiveTakeaways:
  - Myricx / Novartis 这笔交易，把“证明载荷能绕开耐药”直接变成了经济问题：Novartis 愿意为一个明确冲着 TOPO-1 上限去的 NMTi 平台预付 $1.1B，而 Pfizer 更早收购 Seagen 也说明，ADC 能力已经足以撬动超大规模的战略资本。[1][2][3]
  - 耐药绝不是转化研究里的小脚注。最新综述和临床论文都在说明，失败可能出在抗原丢失、内吞与溶酶体缺陷、载荷生物学、DNA 修复重布线，以及后天出现的 TOP1 突变；只看通用效力实验远远不够。[8][9][10][11][13][29]
  - 预算今天就埋在现有替代方案里：CRO 和平台型供应商已经在卖一体化 ADC 测试、耐药模型、PDX、PD / PK 以及生产支持，所以新进入者不是在创造新预算，而是在吃一笔已经分散在外部供应商手里的钱。[15][16][17][18][24][25][27][28][34]
  - 真正有差异化的产品面，不是再做一个湿实验供应商，而是一层中立的基准测试与证据系统。现有厂商能跑工作流里的某几段，但还没有哪家默认代表“跨申办方、以耐药为核心的对照证据”。[15][16][17][18][20][21][33]
  - 眼前能打的市场，比整个 ADC 热潮小得多：最好的客户是那些接近 IND、手里有新载荷、而且马上要过合作方或董事会审视的实体瘤项目，而不是所有还在发现阶段的 ADC 项目。[4][5][6][7][8][32]
  marketDefinition: 这里要打的不是泛 CRO 市场，而是为 ADC 载荷决策外包的耐药基准测试：它夹在通用肿瘤 CRO 执行和治疗资产本身之间，核心是要在 IND 或 BD 决策前，证明一个新载荷类别在耐药实体瘤模型里到底能不能打赢 TOPO-1 或微管对照。[7][8][9][10][11][15][16][17][18]
  customerAndBuyer: 日常使用者是 ADC 药理、转化和生物标志物负责人：他们要设计对照研究、挑模型类型、回答尽调问题。真正掏钱的人通常是 CSO 或转化 / 临床前开发负责人，因为预算竞争的是现有 CRO、模型和开发开支，不是 IT 预算。[15][16][17][18][24][28][34]
  buyingTriggers:
  - point: 当 IND 支持性、融资或合作节点逼近时，团队必须证明新载荷不只是和老 TOPO-1 或微管载荷在标准筛选里打平，而是真的更强。
    sourceRefs:
    - 1
    - 2
    - 11
    - 13
    - 29
    - 32
  - point: 连续的 ADC 失败，或者含糊不清的对照数据，会把问题逼到台前：到底是靶点出了问题，还是载荷出了问题？申办方需要一份更清楚、而且能落到机制上的答案。
    sourceRefs:
    - 8
    - 9
    - 10
    - 11
    - 13
    - 29
  - point: CRO、高校实验室和内部模型各跑一遍之后，资料室往往还是碎的；领导层拿不出一份能稳稳解释给董事会或合作方的统一结论。
    sourceRefs:
