    rationale: 如果公司每季度拿下一个客户簇，并在多项目申办方内部完成扩单，那么第 3 年做到 11 个付费项目、平均合同额约 $0.6M，虽有野心但并非够不到。
    isEstimate: true
    sourceRefs:
    - 15
