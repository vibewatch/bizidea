  competitiveLandscape: 竞争更像替代品混战。CrownBio 和 Champions 卖一体化转化执行；WuXi 和 Eurofins 卖更完整的 ADC 开发栈；Creative 一类厂商卖定制评估服务；公共模型网络则降低了内部自建替代方案的成本。真正的空白位，不是原始实验执行，而是中立、耐药导向的基准数据集和证据工作台。[15][16][17][18][20][21][24][25][27][28][33][34]
  incumbentThesis:
  - incumbentClass: 一体化肿瘤 CRO
    point: CrownBio、Champions 这类厂商已经能卖模型执行，但重心仍是研究吞吐量，不是跨申办方、中立的耐药数据集。
    sourceRefs:
    - 15
    - 16
    - 26
    - 27
  - incumbentClass: 全栈 ADC 开发服务商
    point: WuXi、Eurofins 这类厂商可以吃下更大项目范围，分发能力更强；但也正因为范围太宽，当申办方要一份能给董事会看的“这个载荷该砍还是该推”的基准结论时，它们反而没那么像独立第三方。
    sourceRefs:
    - 17
    - 24
    - 25
    - 28
  - incumbentClass: 精品实验服务商
    point: Creative 一类厂商证明了市场愿意为定制 ADC 表征付费，但那套模式本质上还是服务驱动，离可持续复利的标准化证据资产还差一层。
    sourceRefs:
    - 18
    - 34
  - incumbentClass: 公共模型网络与内部团队
    point: PDXNet / NCI 加上申办方内部工作，能降低拼装原料的成本，但解决不了可比性、交付打包和跨客户学习这三件事。
    sourceRefs:
    - 20
    - 21
    - 33
    - 35
  regulatoryLandscape: 如果基准测试交付物要进入 IND 包或严肃尽调，它看起来就必须像“适用场景明确的非临床证据”，而不是探索性幻灯片材料。ICH S9 给出抗癌项目的整体非临床框架，FDA Part 11 抬高了可审计电子记录的门槛，公共模型项目又进一步强调不同模型类型之间的可复现性、分子注释和对比评估。[20][21][22][23][33]
  technologyLandscape: ADC 耐药不是一条单线，而是多因子叠加。综述和临床 / 临床前论文都指向抗原丢失、内化受阻、溶酶体功能障碍、载荷外排、DNA 修复重布线以及直接的 TOP1 突变。因此，赢面最大的技术产品不会是一项单独实验，而会是一套覆盖载荷类别、靶点、肿瘤语境和耐药模式的标准化面板。[7][8][9][10][11][12][13][14][25][29][30][31][32]
  distributionChannels:
  - point: 创始人主导的科学销售，直接打向已经在买 ADC 和模型服务的转化负责人。
