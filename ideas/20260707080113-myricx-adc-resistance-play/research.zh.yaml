  value: ~70 个接近 IND 的 B7-H3、HER2 或相邻实体瘤项目
  source: calc
- driver: 混合基准测试合同额
  value: ~$0.6M / 项目
  source: calc
- driver: 第 3 年付费项目数
  value: 11 个项目
  source: calc
categoryDynamics:
  growthRate: 分析师报告显示，更广 ADC 市场的 CAGR 为 10.6%-18.7%
  growthRateSourceRefs:
  - 4
  - 5
  - 6
  tailwinds:
  - point: 大市值买方对差异化 ADC 平台的胃口依然很强，Seagen 和 Myricx 两笔交易已经把这一点写得很明白。
    sourceRefs:
    - 1
    - 3
  - point: 申办方还在持续往传统载荷之外走，因为 TOPO-1 和微管载荷都撞上了疗效和耐药的天花板。
    sourceRefs:
    - 7
    - 8
    - 9
    - 12
  - point: B7-H3 和 HER2 依然是最活跃的验证靶点，这让创业公司能很明确地定义第一批面板和对照集。
    sourceRefs:
    - 13
    - 14
    - 29
    - 30
    - 31
    - 32
  headwinds:
  - point: 耐药生物学高度异质，没有任何一块面板能自动替所有申办方或所有载荷类别预测结果。
    sourceRefs:
    - 8
    - 9
    - 10
    - 11
    - 13
  - point: 现有服务商很容易把这条工作流里的某几段吞进去，价格压力和服务化漂移风险都会上来。
    sourceRefs:
    - 15
    - 16
    - 17
    - 18
    - 24
    - 27
    - 28
    - 34
competitors:
- name: Crown Bioscience
  stage: 现有厂商
  wedge: 一体化 ADC 转化服务、脱靶结合分析，以及 PDX / syngeneic / humanized 模型
  pricing: 定制报价 / 按项目收费
  strength: 肿瘤模型资产深，ADC 专用转化工作流覆盖也完整
  weaknessVsUs: 它的核心卖点还是执行，不是中立、可跨申办方复用的耐药基准数据集或证据工作台
  sourceRefs:
  - 15
  - 27
- name: Champions Oncology
  stage: 扩张期
  wedge: PDX、TumorGraft3D 类器官、人源化模型，以及面向 ADC 的耐药模型案例
  pricing: 定制报价 / 按研究收费
  strength: Enhertu 耐药和载荷筛选的公开例子，能明显拉高转化买方的信任度
  weaknessVsUs: 围绕申办方复用的基准包和跨客户数据集，标准化还不够深
  sourceRefs:
  - 16
  - 26
- name: WuXi
  stage: 现有厂商
  wedge: 端到端 ADC 开发，加上耐药模型构建和更广的平台服务
  pricing: 定制报价 / 一体化项目
  strength: 全栈执行能力强，也有把发现、测试和后续开发打包的产能
  weaknessVsUs: 作为执行供应商可能存在利益冲突，也不天然像一层中立的终止 / 推进决策系统
  sourceRefs:
  - 17
  - 25
- name: Eurofins
  stage: 现有厂商
  wedge: ADC 测试，加上开发与生产支持
  pricing: 定制报价 / 服务打包
  strength: 全球测试足迹和模态覆盖，都更贴合买方现有预算口径
  weaknessVsUs: 从公开定位看，它并不是把“载荷耐药决策”当成第一产品界面
  sourceRefs:
  - 24
  - 28
- name: Creative Biogene / Creative Biolabs
  stage: 扩张期
  wedge: 定制 ADC 药效评估、偶联和开发研究
  pricing: 定制报价 / 定制合作
  strength: 研究设计灵活，而且明确把耐药机制工作摆到了台面上
  weaknessVsUs: 品牌更小，也缺少一套标准化、可复用的基准数据集证据
  sourceRefs:
  - 18
  - 34
regulatoryTechnicalConstraints:
- point: 面向申办方的基准证据，必须能落在 ICH S9 对抗癌项目的预期框架里，而不能只像探索性生物学结果。
  sourceRefs:
  - 22
- point: 如果电子化交付物要被 IND 或尽调反复复用，就必须满足接近 Part 11 风格的来源追踪和可审计性要求。
  sourceRefs:
  - 23
- point: 公共模型项目反复强调分子注释、可复现性，以及 PDX、类器官和细胞模型之间的对比评估。
  sourceRefs:
  - 20
  - 21
  - 33
- point: 耐药发现高度依赖载荷类别，因此 TOPO-1、微管以及更新一代载荷不能随手混着比，必须先把对照设计标准化。
  sourceRefs:
  - 8
  - 9
  - 11
  - 12
  - 13
validationSignals:
- point: Novartis 明确为一个对标 TOPO-1 上限的 NMTi ADC 平台预付 $1.1B，这已经把“耐药逃逸”验证成高溢价主张。
  sourceRefs:
  - 1
  - 2
- point: Pfizer 收购 Seagen 说明，大药企看待 ADC 平台能力，已经是战略级，而不是边缘能力。
  sourceRefs:
  - 3
- point: CRO 和供应商已经在卖 ADC 专用耐药模型、一体化面板和载荷筛选，说明外包型转化基础设施确实有人买单。
  sourceRefs:
  - 15
  - 16
  - 18
  - 24
  - 25
  - 26
  - 27
- point: Daiichi Sankyo 的 B7-H3 资产 ifinatamab deruxtecan 获优先审评，加上 DS-7300a 的临床前数据，说明滩头靶点本身就有真实的临床前与临床竞争。
  sourceRefs:
  - 14
  - 32
openQuestions:
- 耐药细胞系、类器官和 PDX 这三类面板，哪种组合最常改变申办方的推进 / 终止决策，而不只是确认他们原本的偏好？
- 接近 IND 的 ADC 团队会有多大概率向一家新供应商购买中立基准测试，而不是直接把范围加给现有 CRO？
- 公司能拿到多少复用权，既能把项目数据沉淀成持续复利的基准图谱，又不把对载荷敏感的申办方吓跑？
- 最终有多少收入能长成持续性的工作台或数据库 ARR，而不是一次性科学服务？
