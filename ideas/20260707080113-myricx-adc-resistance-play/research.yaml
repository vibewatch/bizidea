    "summary": "Willingness to pay is credible because buyers already outsource ADC testing, translational pharmacology, resistant-model work, and broader development support. A resistance-benchmark product can map to pre-existing study budgets if it collapses multiple vendors into one decision-ready package and reduces reruns."
