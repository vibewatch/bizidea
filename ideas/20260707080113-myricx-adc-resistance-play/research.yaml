"reportMemo":
  "executiveTakeaways":
  - "Myricx/Novartis makes payload-resistance proof economically salient: Novartis is paying $1.1B upfront for a platform explicitly pitched against TOPO-1 limits, and Pfizer's earlier Seagen deal shows ADC capability can move strategic capital at very large scale.[1][2][3]"
  - "Resistance is not a niche translational footnote. Recent reviews and clinical papers show failure can arise from antigen loss, trafficking and lysosomal defects, payload biology, DNA-repair rewiring, and emergent TOP1 mutations, so generic potency studies are insufficient.[8][9][10][11][13][29]"
  - "Budget already exists inside today's alternative stack: CROs and platform vendors market integrated ADC testing, resistant models, PDX, PD/PK, and manufacturing support, so a new entrant can sell against fragmented external spend rather than invent a net-new budget line.[15][16][17][18][24][25][27][28][34]"
  - "The differentiated product surface is a neutral benchmark and evidence layer, not another wet-lab vendor. Incumbents can run pieces of the workflow, but no default vendor is synonymous with cross-sponsor, resistance-specific comparator evidence.[15][16][17][18][20][21][33]"
  - "The immediate market is smaller than the broader ADC hype: the best customers are IND-near solid-tumor programs with novel payloads and near-term partner or board scrutiny, not every ADC program in discovery.[4][5][6][7][8][32]"
  "marketDefinition": "The relevant market is outsourced resistance benchmarking for ADC payload decisions: a translational evidence layer between generic oncology CRO execution and therapeutic asset ownership, focused on showing whether a novel payload class beats TOPO-1 or microtubule comparators in resistant solid-tumor models before IND or BD decisions.[7][8][9][10][11][15][16][17][18]"
  "customerAndBuyer": "Daily users are ADC pharmacology, translational, and biomarker leads who must design comparator studies, choose model types, and answer diligence questions. The economic buyer is usually the CSO or head of translational/preclinical development because the spend competes with existing CRO, model, and development budgets rather than IT budgets.[15][16][17][18][24][28][34]"
  "buyingTriggers":
  - "point": "An IND-enabling, financing, or partnering event forces the team to prove that a novel payload does more than match legacy TOPO-1 or microtubule activity in standard screens."
    "sourceRefs":
