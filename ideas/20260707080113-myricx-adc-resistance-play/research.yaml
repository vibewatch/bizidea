  - "incumbentClass": "Full-stack ADC development vendors"
    "point": "WuXi- and Eurofins-class vendors can own larger program scope, which helps distribution, but that same breadth makes them less obviously independent when a sponsor wants a board-ready benchmark on whether to kill or advance a payload."
    "sourceRefs":
