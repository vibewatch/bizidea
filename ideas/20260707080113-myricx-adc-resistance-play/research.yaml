  "regulatoryLandscape": "If benchmark outputs are meant to inform IND packages or serious partner diligence, the work must look like fit-for-purpose nonclinical evidence rather than exploratory slideware. ICH S9 sets the overarching nonclinical context for anticancer programs, FDA Part 11 raises the bar for auditable electronic records, and public model programs emphasize reproducibility, molecular annotation, and comparative assessment across model types.[20][21][22][23][33]"
  "technologyLandscape": "ADC resistance is multi-causal rather than monolithic. Reviews and clinical/preclinical papers point to antigen loss, impaired internalization, lysosomal dysfunction, payload efflux, DNA-repair rewiring, and direct TOP1 mutations. That makes the winning technical product less a single assay and more a standardized panel spanning payload class, target, tumor context, and resistance mode.[7][8][9][10][11][12][13][14][25][29][30][31][32]"
