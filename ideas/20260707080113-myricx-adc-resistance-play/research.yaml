  "competitiveLandscape": "Competition is substitute-heavy. CrownBio and Champions sell integrated translational execution; WuXi and Eurofins sell fuller ADC development stacks; Creative vendors sell bespoke evaluation services; and public model networks reduce the cost of assembling in-house alternatives. The whitespace is a neutral, resistance-specific benchmark dataset and evidence workspace rather than raw assay execution.[15][16][17][18][20][21][24][25][27][28][33][34]"
  "incumbentThesis":
  - "incumbentClass": "Integrated oncology CROs"
    "point": "CrownBio- and Champions-class vendors already sell model execution, but their center of gravity is study throughput rather than a neutral, cross-sponsor resistance dataset."
    "sourceRefs":
