  milestone: 在 Month 18 前做到 6 个活跃项目、跑通一条合格的 CRO 或模型库联合销售渠道，并拿到申办方认可的同一客户扩单；额外预留的 6 个月缓冲，会把公司带到 Month 24，去验证制药公司项目组合评审场景，以及“复购 / 订阅收入占比超过 50%”这道题。
  useOfFunds:
  - bucket: 工程
    amountUsd: 1200000
    percentage: 40
  - bucket: GTM
    amountUsd: 750000
    percentage: 25
  - bucket: G&A
    amountUsd: 450000
    percentage: 15
  - bucket: 缓冲（6 个月）
    amountUsd: 600000
    percentage: 20
scenarios:
  downside:
    description: 预算释放和数据权复用都比预期慢，PDX 确认被拉进更多基础方案，公司到 Y3 退出时只有 9 个活跃项目，毛利也低于目标。
    y3RevenueK: 3929.0
    y3EbitdaK: -887.4
    cashLowPointK: -81.2
    keyAssumptionChanges:
    - Y3 退出活跃项目数从 11 个降到 9 个。
    - 由于复购和工作台挂载更慢，Q4Y3 单个活跃项目的混合月收入只到 $46K，而不是 $50K。
    - 更多基准测试 SOW 把 PDX 纳入基础范围，毛利率最高只能到 66%。
  base:
    description: 基准情形沿着 BP 里程碑走：Y1 退出时 3 个付费项目，Month 18 达到 6 个，Month 24 为 7 个，Month 36 达到 11 个；同时单项目价值逐步长到研究里的约 $0.6M 年化水平。
    y3RevenueK: 4868.5
    y3EbitdaK: 79.5
    cashLowPointK: 766.0
    keyAssumptionChanges:
    - 项目爬坡按 BP 里程碑推进：Y1 退出 3 个付费项目，Month 18 为 6 个，Month 36 为 11 个。
    - 到 Month 24，如果复购基准测试、复测和工作台收入超过一半，混合单项目价值就在 Y3 退出时达到年化 $600K。
    - 不自建 CRO 前提下，毛利率在 Q4Y3 跑到 70%。
  upside:
    description: 复购扩张更早出现，Y2 就有一条转介绍渠道跑通，公司到 Y3 退出时有 13 个活跃项目，定价和流程杠杆也略好。
    y3RevenueK: 5647.5
    y3EbitdaK: 605.1
    cashLowPointK: 840.0
    keyAssumptionChanges:
    - Y3 退出活跃项目数从 11 个升到 13 个。
    - 因为复购工作和项目组合评审采纳更快，Q4Y3 单个活跃项目的混合月收入抬到 $52K。
    - Month 28 多招 1 个 GTM 岗位，但伙伴 SOP 再收紧一点，毛利率仍能到 72%。
sensitivity:
- variable: ARPU
  downsideCase: 成熟单项目价值 $550K
  baseCase: 成熟单项目价值 $600K
  upsideCase: 成熟单项目价值 $650K
  y3RevenueImpactK: -410.0
  cashImpactK: -290.0
- variable: CAC
  downsideCase: 如果转介绍失灵、销售仍主要靠创始人，CAC 为 $220K
  baseCase: 创始人主导的科学销售加伙伴引荐下，CAC 为 $180K
  upsideCase: 如果一条联合销售渠道能稳定转化，CAC 为 $140K
  y3RevenueImpactK: 0.0
  cashImpactK: -280.0
- variable: 流失率
  downsideCase: 项目月流失率 5.5%
  baseCase: 项目月流失率 4.0%
  upsideCase: 项目月流失率 3.0%
  y3RevenueImpactK: -520.0
  cashImpactK: -340.0
- variable: 销售周期
  downsideCase: 8 个月；首个付费试点推迟到 M8
  baseCase: 6 个月；首个付费试点在 M6 落地
  upsideCase: 4-5 个月；靠热启动引荐在 M5 成交
  y3RevenueImpactK: -780.0
  cashImpactK: -520.0
