slug: adc-resistance-benchmark-foundry
date: '2026-07-07'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: month
  source: '[BP date 2026-07-07]；模型在同月启动，因为融资需求和里程碑计划都默认立刻开始。'
- id: A2
  name: pre-seed 融资带来的期初现金
  value: '3000'
  unit: USD K
  source: '[BP fundingAsk.targetFundingRangeUsd] $3–5M，且 [BP fundingAsk.runwayMonths] 为 18；模型取区间下限，因为切口刻意做窄，而且依赖伙伴实验室，不必自建固定湿实验产能。'
- id: A3
  name: 客户单位定义
  value: 活跃的付费申办方基准项目
  unit: unit
  source: '[BP businessModel.unitOfValue] 从对照设计到交付决策包的一次活跃申办方项目基准测试。'
- id: A4
  name: 首个付费试点合同额
  value: '250'
  unit: USD K per program
  source: '[BP gtm.pricing] 起步价约 $200k-$300k，且 [BP investorMemo.firstCustomer.initialContract] 也是 $200k-$300k；模型取中位数。'
- id: A5
  name: 单个活跃项目的成熟年价值
  value: '600'
  unit: USD K per program-year
  source: '[BP market.som] 11 个付费项目、平均合同额约 $0.6M；[Research market.som] $6.6M 来自 11 个付费项目、平均合同额约 $0.6M。'
- id: A6
  name: Y1 月末活跃项目数
  value: 0,0,0,0,0,1,1,1,2,2,3,3
  unit: programs
  source: '[BP milestones] Month 6 有首个付费试点，Month 9 有第一份复购 SOW 或工作台加购，Month 12 达到 3 个付费项目。'
- id: A7
  name: Y2 季末活跃项目数
  value: 4,6,6,7
  unit: programs
  source: '[BP milestones] Month 18 达到 6 个活跃项目，Month 24 拿下第一份中型制药公司 项目组合评审合同；模型对 Y2 下半年保持保守，等同一客户扩单先跑明白。'
- id: A8
  name: Y3 季末活跃项目数
  value: 8,8,10,11
  unit: programs
  source: '[BP milestones] Month 30 有 8 个活跃项目，Month 36 有 11 个付费项目；模型把研究中的 $6.6M SOM 当作 Q4Y3 退出 ARR，而不是 Y3 全年收入。'
- id: A9
  name: Y1 单个活跃项目的混合月收入
  value: M6-M12 = 24,28,30,32,34,36,38
  unit: USD K per average active program-month
  source: '[A4-A6]；早期收入仍以试点为主，复购基准测试、复测和工作台访问还没完全铺开。'
- id: A10
  name: Y2 单个活跃项目的混合月收入
  value: Q1-Q4 = 36,38,40,42
  unit: USD K per average active program-month
  source: '[A5]；[BP product.twelveMonth] 会有对照数据库和证据复用；[BP milestones] Month 18 达到 6 个活跃项目。'
- id: A11
  name: Y3 单个活跃项目的混合月收入
  value: Q1-Q4 = 43,45,48,50
  unit: USD K per average active program-month
  source: '[A5]；[BP milestones] Month 36 为 11 个付费项目、混合 ACV 约 $0.6M；Q4Y3 达到研究里的年化单项目价值。'
- id: A12
  name: 到 Month 24 的复购与订阅收入占比
  value: 到 Month 24，超过 50% 的收入来自复购基准测试、复测或工作台订阅
  unit: revenue mix
  source: '[BP milestones] Month 24 超过一半收入来自复购或订阅账户；[BP operatingAssumptions] 同一买方会在 12 个月内扩单。'
- id: A13
  name: 毛利率爬坡
  value: Y1 45-55%; Y2 58-65%; Y3 67-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 为 70；[BP fundingAsk.useOfFundsSummary] 也明确要验证伙伴驱动的湿实验模式能否稳住 70%+ 毛利；再叠加创业财务经验判断：前几批试点更偏服务，SOP 稳定后毛利才会上来。'
- id: A14
  name: 用于单位经济模型的项目月流失率
  value: '4.0'
  unit: percent
  source: 创业财务经验判断：高 ACV 的科学项目收入里，单个项目会结束，但同一客户扩单和工作台订阅会部分对冲流失。
- id: A15
  name: 创始人 / CEO 全额现金薪酬
  value: '180'
  unit: USD K per year
  source: '[BP team] 创始人 / CEO 在 Month 0 到位；创业财务经验判断：pre-seed 阶段创始人薪酬低于市场。'
- id: A16
  name: 科学负责人全额现金薪酬
  value: '220'
  unit: USD K per year
  source: '[BP team] 科学负责人在 Month 0 到位；创业财务经验判断：这是资深转化肿瘤人才的现金薪酬。'
- id: A17
  name: 产品 / 数据工程师全额现金薪酬
  value: '210'
  unit: USD K per year
  source: '[BP team] 产品 / 数据工程在 Month 0 到位；创业财务经验判断：这是受监管数据工作流工程人才的现金薪酬。'
- id: A18
  name: QA / 项目运营全额现金薪酬
  value: '160'
  unit: USD K per year
  source: '[BP team] QA / 项目运营负责人在 Month 4 到位；创业财务经验判断：这是 QA、交付和伙伴运营人才的现金薪酬。'
- id: A19
  name: 合作 / 客户扩单负责人全额现金薪酬
  value: '175'
  unit: USD K per year
  source: '[BP team] 合作 / 客户扩单负责人在 Month 9 到位；创业财务经验判断：这是带浮动激励的科学客户扩单岗位现金薪酬。'
- id: A20
  name: 科学项目岗位全额现金薪酬
  value: '185'
  unit: USD K per year
  source: '[BP strategicChoices.sequencingRationale] 先补项目运营和 QA，再上规模化销售；创业财务经验判断：科学项目岗位负责协调基准设计和读数打包。'
- id: A21
  name: 招聘顺序
  value: M4 Ops1; M9 Partnerships1; M10 ScientificPrograms1; M16 Product2; M18 Ops2; M21 Partnerships2; M27 ScientificPrograms2; M30 Product3; M33 Ops3
  unit: hires
  source: '[BP team.startTiming]、[BP strategicChoices.sequencingRationale]、以及 [BP milestones] Month 18、Month 24、Month 30 和 Month 36 的节奏。'
- id: A22
  name: 非薪资经营支出节奏
  value: Y1 每月 45-60; Y2 每月 75-90; Y3 每月 95-115
  unit: USD K per month
  source: '[BP product.mvp] 需要安全工作台和审计级决策包；[BP operations] 也要求云、数据工具、法务、保险、差旅和伙伴管理支出；再叠加创业财务经验判断。'
- id: A23
  name: 按职能划分的 Opex 结构
  value: S&M 占比 28%-37%; R&D 45%-37%; G&A 25%-27%
  unit: percent of opex
  source: '[BP strategicChoices.sequencingRationale] 先招 QA / 项目运营，再上规模化销售；模型因此让结构逐步从 搭建 + QA 转向同一客户扩单。'
- id: A24
  name: 混合 CAC
  value: '180'
  unit: USD K per new active program
  source: '[模型推导] Y1-Y2 约 $1.25M 的销售与市场支出，对应 7 个新增活跃项目；[BP gtm.channels] 以创始人主导的科学销售加伙伴引荐为主。'
- id: A25
  name: 基准销售周期
  value: '6'
  unit: months from scientific diligence to paid pilot
  source: '[BP milestones] Month 6 启动首个付费试点；[BP gtm.funnelTargets] 目标账户到科学尽调 30-40%，科学尽调到付费试点 20-30%。'
- id: A26
  name: 融资里程碑与缓冲
  value: Month 18 达到 6 个活跃项目，并在 Month 24 前证明复购收入和 制药公司评审场景，同时预留 6 个月缓冲
  unit: milestone
  source: '[BP fundingAsk.runwayMonths] 为 18；[BP milestones] Month 18 和 Month 24 给出了融资前后的关键证明题。'
- id: A27
  name: 缓冲规模
  value: '600'
  unit: USD K
  source: 创业财务经验判断：在 BP 的 18 个月运营计划之外，再预留约 6 个月缓冲，按 Month 18 约 $100K / 月的 现金消耗 估算。
