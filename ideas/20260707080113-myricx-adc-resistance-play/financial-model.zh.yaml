modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      TargetAccounts[目标账户] --> PaidPilots[付费试点]
      PaidPilots --> ActivePrograms[活跃项目]
      ActivePrograms --> BenchmarkRevenue[基准测试收入]
      ActivePrograms --> RepeatWork[复购工作]
      RepeatWork --> BenchmarkRevenue
      BenchmarkRevenue --> GrossProfit[毛利]
      GrossProfit --> Cash[现金]
modelSanity:
- checkName: 收入引擎
  finding: 收入由活跃项目数驱动：Y1 退出时 3 个，到 Y3 退出时 11 个；单项目价值也会从 $200K-$300K 的试点，逐步长向年化 $600K 的退出水平。
- checkName: 必须跑对的事
  finding: 模型成立的关键，是 Month 6 前拿到首个付费试点，并在 Month 24 前让同一买方复购，这样 ARPU 才能扩张，而不必自建一整支全服务 CRO 团队。
- checkName: 模型会在哪儿坏掉
  finding: 如果销售周期拖到 8 个月，或者 PDX 变成默认范围，下行情形的 Y3 收入会掉到 $3.9M，而且现金会略微转负。
- checkName: 下一轮证明题
  finding: 一个可信的种子轮融资故事，至少要在 Month 18 前拿到 6 个活跃项目和一条有效的联合销售渠道，并在 Month 24 证明复购或订阅收入超过一半。
sanityChecks:
  ruleOf40: Y3 增长 92.5% + EBITDA 利润率 1.6% = 94.1%
  burnMultiple: Y2 烧钱倍数为 0.4x（新增 $2139K 收入消耗 $862K 现金），到 Y3 转正 EBITDA。
  revenuePerFte: 按 Q4Y3 的 12 个 FTE 计算，Y3 每个 FTE 对应收入约 $406K（对标 $200-400K 的生物科技工作流 SaaS）。
  flags:
  - 研究里的 $6.6M SOM 更适合看作 Q4Y3 退出 ARR；由于模型要到 Month 36 才达到 11 个活跃项目，所以 Y3 全年收入只有 $4.9M。
  - 基准情形默认 Month 24 的收入里，过半来自复购或订阅；如果账户行为更像一次性服务，4% 的流失率假设就偏低。
  - 只有在伙伴执行的 PDX 仍是可选确认项，而不是每份基准测试 SOW 的标配时，毛利率才跑得到 70%。
  - 这里的客户数本质上是项目数，所以只要一个多项目申办方推迟决策，年收入就可能波动约 $0.4M-$0.6M。
