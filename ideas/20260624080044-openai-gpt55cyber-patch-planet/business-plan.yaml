slug: cve-backport-evidence-plane
date: "2026-06-24"
executiveSummary: >-
  CVE Backport Evidence Plane sells a branch-aware remediation system of record
  to self-hosted software vendors that maintain 3-8 supported release lines and
  owe enterprise customers fast, version-specific CVE responses. The first
  customer is a head of product security at a 300- to 1,500-person
  observability, database, or API gateway vendor shipping on-prem or
  customer-managed Kubernetes editions. The wedge is narrower than generic
  AppSec or AI coding tools: the product takes one disclosed dependency flaw
  with an upstream fix, generates human-reviewed backports across supported
  branches, validates them, and emits VEX plus advisory proof. This beachhead
  is attractive because one CVE instantly creates measurable multi-team pain,
  existing AppSec budget, and a clear production handoff inside GitHub or
  GitLab and CI workflows. Product sequencing should stay GitHub-first,
  human-approved, and focused on dependency CVEs before expanding into
  arbitrary vulnerability classes, because trust and branch-policy mapping
  matter more than breadth at launch. Research supports an estimated $0.2B SAM
  and a modeled year-three $3.2M SOM, but both depend on buyers paying for
  always-on readiness rather than only for incident-response spikes. The
  largest disconfirming risks are that VEX-grade proof is not yet budget
  critical, that reviewer acceptance of AI-generated backports stays too low,
  or that GitHub and Snyk bundle acceptable branch-aware workflows first. Until
  paid pilots show accepted backports on live CVEs and conversion to $60k-$90k
  annual contracts, this is a targeted but medium-conviction
  enterprise-security opportunity.
problem:
  - >-
    A single dependency disclosure becomes 3-8 branch-specific backports,
    regression runs, and customer advisories for self-hosted vendors, but most
    teams still coordinate it with cherry-picks, CI scripts, spreadsheets, and
    manual QA.
  - >-
    Existing scanners and fix PR tools can detect or suggest code changes, but
    they do not tell product-security teams which supported versions are fixed,
    which remain exposed, and what proof support can safely send customers.
  - >-
    Enterprise customers and emerging SBOM or VEX expectations raise the cost
    of vague or slow responses, turning remediation delay into renewal,
    escalation, and compliance risk.
solution:
  - >-
    Ingest a disclosed CVE or upstream patch, map affected code across
    supported branches, and generate human-reviewed backport PRs with explicit
    branch-policy awareness.
  - >-
    Run deterministic repro tests, existing CI suites, and fuzz harnesses so
    the output is validated evidence rather than raw model text.
  - >-
    Publish OpenVEX and CSAF-ready evidence packets, SBOM diffs, and advisory
    drafts tied to the exact patch set so product security, support, and legal
    work from the same system of record.
whyWeWin:
  - >-
    Incumbents optimize for detection, prioritization, or single-branch fix UX;
    this company owns the narrow PSIRT-to-customer-proof loop across maintained
    branches.
  - >-
    Accepted backports, rollback outcomes, repro tests, and advisory approvals
    create a proprietary remediation corpus that generic copilots and scanners
    do not naturally collect.
  - >-
    The wedge overlays existing GitHub or GitLab and CI workflows instead of
    replacing AppSec suites, which is a more realistic path into budgeted
    security programs.
strategicChoices:
  beachhead: >-
    300- to 1,500-person observability, database, API gateway, and security
    infrastructure vendors shipping self-hosted editions with 3-8 supported
    branches and enterprise customers that expect CVE guidance inside roughly
    72 hours.
  wedgeRationale: >-
    This entry point proves value faster than a broad AppSec platform because
    every critical dependency CVE already produces a measurable queue of branch
    backports, regression burden, and customer communication work inside one
    product-security team.
  sequencingRationale: >-
    Start with GitHub-native, human-approved automation for recent dependency
    CVEs on one product line, because that isolates the hardest proof
    problem—safe multi-branch remediation—without first solving generic
    scanning, arbitrary application vulnerabilities, or multi-system deployment
    complexity; add GitLab, private deployment, readiness dashboards, and
    broader language coverage only after live pilots establish trust, then hire
    implementation and partner coverage before scaling sales.
  notYet:
    - Broad vulnerability discovery or cloud-runtime detection
    - Autonomous merge and advisory publication without human approval
    - Deep embedded or appliance coverage before the infrastructure-vendor playbook converts repeatably
    - Services-heavy custom remediation for arbitrary internal codebases
market:
  tam: >-
    Estimated TAM of $0.8B based on roughly 12,000 global long-lived or
    self-hosted software vendors spending about $65k annually on a remediation
    evidence layer.
  sam: >-
    Estimated SAM of $0.2B based on roughly 2,500 beachhead infrastructure
    vendors with multi-branch support obligations and similar spend.
  som: >-
    Estimated year-three SOM of $3.2M based on about 45 customers at roughly
    $70k blended ACV through direct sales into incident-prone self-hosted
    vendors.
  segments:
    - Self-hosted infrastructure vendors in observability, database, API gateway, and security software with 3-8 supported release lines
    - Embedded, appliance, and other long-lived software vendors that inherit the same branch-specific remediation burden later
  buyingProcess: >-
    The likely economic buyer is the head of product security or VP of
    engineering, while release engineering and PSIRT operators validate the
    workflow day to day. The fastest first sale is a paid pilot scoped to one
    product line and one live or recently closed CVE cycle, then converted to
    an annual contract if the team sees faster validated backports and
    publishable evidence.
product:
  mvp: >-
    MVP covers one design partner, one product line, 3-5 supported branches,
    and recent dependency CVEs with known upstream fixes. It ingests branch
    policy, opens validated PRs in GitHub, and ships VEX plus advisory drafts,
    but keeps human approval mandatory.
  sixMonth: >-
    Ship GitHub-first pilots for 2-3 design partners, prove branch-policy
    ingestion, and reduce time from CVE intake to first validated PR plus
    evidence packet on one live incident.
  twelveMonth: >-
    Add GitLab and private-deployment support, incident-readiness dashboards
    for top dependencies and advisory SLAs, and convert early pilots into
    annual subscriptions.
  twentyFourMonth: >-
    Expand from dependency CVEs into internally discovered flaws and bug bounty
    reports, support multi-product portfolios, and make private deployment plus
    standards-ready evidence the default for larger accounts.
  keyBets:
    - Supported-branch policies can be ingested accurately enough to automate remediation planning without weeks of setup
    - Deterministic test and fuzz evidence can lift reviewer acceptance above manual cherry-pick baselines
    - Version-specific VEX and advisory output drives buying urgency, not just nice-to-have documentation
    - A GitHub-first workflow can generalize to enough design partners before broader platform support is required
gtm:
  wedge: >-
    Sell a 60-90 day paid pilot around one product line and its next critical
    dependency CVE or recent incident retrospective, using branch-aware
    backports plus VEX or advisory output to prove hours saved and SLA
    performance.
  channels:
    - Founder-led outbound to heads of product security, release engineering, and VPs of engineering at self-hosted infrastructure vendors
    - Incident-led campaigns around KEV or major dependency disclosures affecting common Go, Python, or C libraries
    - Referral and co-sell paths through disclosure platforms, incident-response firms, and SBOM or VEX tooling partners
  funnelTargets: lead→qualified pilot 15-25%, qualified pilot→paid pilot 30-40%, paid pilot→production 50%+, production→second product line or readiness add-on 25%+ within 12 months
  pricing: >-
    Paid pilot plus annual subscription priced by supported product lines and
    maintained release branches, with overage for validated remediation runs
    and a premium private deployment tier; this matches how pain and compute
    scale better than per-seat pricing and lets incident-led pilots convert
    into recurring spend.
businessModel:
  revenueStreams:
    - Paid pilot fees for one product line and one live or recently closed CVE workflow
    - Annual platform subscription for covered product lines and supported branches
    - Usage overage and premium private deployment for higher-volume or regulated customers
  unitOfValue: One supported product line and its maintained release branches covered by the remediation workflow
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more product lines and release branches inside the first vendor account
    - Sell incident-readiness dashboards and advisory-SLA reporting between live CVEs
    - Expand from dependency CVEs into bug bounty and internally discovered vulnerability workflows
    - Move upmarket with private deployment and deeper PSIRT or compliance integrations
strategyMap:
  northStarMetric: Percent of critical CVEs affecting supported releases resolved with accepted backports and customer-ready evidence inside the promised SLA
  inputMetrics:
    - Time from CVE intake to first validated pull request
    - Percent of supported branches covered automatically per incident
    - Reviewer acceptance rate of generated backports
    - Time from accepted patch to published VEX or advisory draft
    - Paid pilot to annual production conversion rate
  moatsToBuild:
    - Branch-specific accepted-fix and rollback corpus across repeated CVE types
    - Validation trace library of repro tests, CI outcomes, and fuzz artifacts
    - Version-aware evidence graph linking CVEs, patches, supported releases, and customer advisories
    - Integration templates for GitHub, GitLab, and common CI or release workflows
  killCriteria:
    - Fewer than 2 paid pilots signed within 9 months of focused founder-led selling
    - Generated backports cover less than 70% of supported branches with customer acceptance in the first 3 pilot CVE workflows
    - Paid pilot to annual production conversion stays below 40% after the first 5 pilots
    - Fewer than 3 of the first 10 target buyers can show documented customer or compliance demand for version-specific proof
  mermaid: |
    flowchart LR
      Wedge[Incident-led multi-branch CVE pilot] --> MVP[Branch-aware backport and evidence MVP]
      MVP --> Proof[Accepted PRs plus VEX and advisory proof]
      Proof --> Expansion[Portfolio and private-deployment expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Sharp wedge and real pain, but conviction stays moderate until incident frequency, budget ownership, and review acceptance are proven in paid pilots.
    whyBelieve: The startup attacks a specific control gap between fix suggestion tools and customer-safe remediation, at a moment when branch complexity and VEX pressure make that gap newly expensive.
    whyDoubt: The business still depends on recurring urgency from incident-driven workflows and may face rapid incumbent bundling before it earns defensible reference data.
    nextDiligence: Verify 2 paid pilots and one live CVE workflow that converts to a $60k-$90k annual contract after accepted backports and published evidence.
  firstCustomer:
    title: Head of Product Security at a self-hosted infrastructure vendor
    profile: A 300- to 1,500-person observability, database, or API gateway vendor shipping on-prem or customer-managed Kubernetes editions, maintaining 3-8 supported branches, and handling weekly enterprise CVE escalations.
    trigger: A KEV-linked dependency disclosure or strategic customer escalation requires validated fixes and version-specific advisories across every supported branch within 72 hours.
    buyer: Head of Product Security
    initialContract: $30k-$50k paid pilot for one product line and 3-5 supported branches, converting to a $60k-$90k annual subscription plus usage overage after one live CVE cycle or one validated retrospective proves the SLA and evidence workflow.
  mustBeTrue:
    - Target vendors face enough multi-branch critical CVEs or customer escalations each year to justify recurring software spend rather than ad hoc consulting
    - Human reviewers accept generated backports on at least 70% of supported branches for a recent dependency CVE without material rollback rates
    - Heads of product security or VPs of engineering can fund a paid pilot from existing AppSec or engineering budget within one quarter
    - VEX and advisory evidence materially shortens support, renewal, or compliance work rather than acting as decorative documentation
    - GitHub, Snyk, and Endor-class incumbents do not ship equivalent branch-aware evidence workflows fast enough to collapse pricing before the startup earns reference accounts
  diligenceQuestions:
    - How many critical multi-branch remediation events does the target customer really handle per year
    - Which function signs the first check in practice: head of product security, VP engineering, or product GM
    - What reviewer acceptance and rollback rate will buyers tolerate for AI-generated backports
    - How often do enterprise customers or compliance teams actually ask for version-specific proof instead of generic release notes
    - Can the workflow plug into GitHub or GitLab and existing CI without turning the company into a services-heavy integrator
operatingAssumptions:
  - assumption: Target vendors will buy an incident-readiness pilot before their next severe CVE, not only during active crises.
    basis: research.yaml
    validationTest: Interview 10-12 target buyers and close 2 paid pilots that are not contingent on an active incident.
    decisionImpact: If false, the company becomes a lumpy incident-response tool and may need partner-led or services pricing.
  - assumption: Human reviewers will accept generated backports on most supported branches when deterministic test and fuzz evidence is attached.
    basis: research.yaml
    validationTest: In the first 3 pilot CVE workflows, achieve at least 70% branch coverage with accepted PRs and zero Sev-1 rollbacks.
    decisionImpact: If false, narrow the product to advisory orchestration or specific language and dependency classes instead of full backport automation.
  - assumption: GitHub-native integration covers enough early customers to delay broader platform support.
    basis: operator judgment
    validationTest: Ensure the first 3 design partners can run the product through GitHub and existing CI without bespoke side systems.
    decisionImpact: If false, GitLab and private-deployment work must move earlier, slowing product focus and hiring plans.
  - assumption: VEX and customer-advisory output increases willingness to pay beyond simple patch drafting.
    basis: research.yaml
    validationTest: Collect support tickets, security questionnaires, or renewal escalations from at least 3 pilots and confirm that 2 cite version-specific proof as a purchase driver.
    decisionImpact: If false, position the product primarily around engineering time saved and reduce investment in evidence workflows.
  - assumption: Supported product line plus branch-based pricing can sustain $60k-$90k ACV with software-like margins.
    basis: idea.yaml
    validationTest: Convert at least 1 pilot to an annual contract in the target band while keeping support and compute costs within the gross-margin plan.
    decisionImpact: If false, the company must move upmarket, raise prices, or narrow the customer profile to maintain venture economics.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15-20 heads of product security, release-engineering leaders, and PSIRT operators at self-hosted infrastructure vendors.
    hypothesis: Multi-branch remediation and advisory prep are painful enough to fund a pilot before the next incident.
    successMetric: At least 10 interviews yield a recent incident workflow, 5 provide time-to-remediation detail, and 3 agree to pilot scoping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run a manual shadow backtest on one recent dependency CVE across 3-5 supported branches for a design partner.
    hypothesis: Branch policy plus upstream fix data can produce accepted backport plans without weeks of onboarding.
    successMetric: Draft backports plus an evidence packet cover at least 70% of affected branches in under 48 hours.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Ship a GitHub-first pilot on one live or recent dependency CVE for 2 design partners.
    hypothesis: Human-reviewed PRs plus VEX and advisory drafts cut remediation and communication time enough to justify paid pilot conversion.
    successMetric: 2 paid pilots launch and at least 1 incident hits the customer's target SLA improvement threshold.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Run PSIRT, legal, and support review on generated OpenVEX, CSAF, and advisory outputs.
    hypothesis: Standards-aligned templates are publishable with light edits rather than full rewrites.
    successMetric: At least 80% of generated evidence fields survive review unchanged and 1 advisory is published from the workflow.
    owner: Product engineer
  - horizon: 180–365 days
    experiment: Launch a readiness dashboard and pre-incident land motion with top-dependency and advisory-SLA reporting.
    hypothesis: A between-incident workflow smooths pipeline and increases recurring budget versus pure emergency response.
    successMetric: At least 1 pilot closes without an active Sev-1 incident and dashboard usage persists monthly.
    owner: Founder CEO
  - horizon: 180–365 days
    experiment: Add one partner-assisted path through GitLab, private deployment, or a disclosure-platform referral channel.
    hypothesis: One ecosystem path will reduce integration friction and expand beyond GitHub-only early adopters.
    successMetric: One partner-sourced or partner-enabled deployment goes live in under 6 weeks and matches direct pilot pricing.
    owner: Solutions lead
operations:
  - Support-policy ingestion for every product line so branch coverage and end-of-support windows are explicit before patch generation
  - Deterministic validation pipeline using existing CI, repro tests, and fuzz harnesses before any advisory leaves draft status
  - Private disclosure and advisory approval workflow across product security, support, and legal with OpenVEX and CSAF templates
  - Referral and integration process with GitHub, GitLab, vulnerability-management platforms, and incident-response partners
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Early success depends on focused selling to heads of product security, sharp wedge discipline, and design-partner conversion rather than broad security storytelling.
  - role: Founding eng
    startTiming: Month 0
    rationale: The first technical risk is building a reliable branch-aware backport and evidence pipeline on top of existing repo and CI systems.
  - role: Security validation engineer
    startTiming: Month 3
    rationale: Trust hinges on deterministic repro tests, fuzz harnesses, and rollback-safe validation across supported branches.
  - role: Product engineer
    startTiming: Month 6
    rationale: The company needs faster iteration on GitHub or GitLab workflows, evidence UX, and readiness dashboards once pilots start.
  - role: Solutions lead
    startTiming: Month 9
    rationale: Customer proof will fail if support-policy mapping, advisory templates, and deployment orchestration remain founder-only work.
milestones:
  - horizon: 0–12 months
    items:
      - Close 2-3 paid pilots with self-hosted infrastructure vendors and prove at least 1 live multi-branch CVE workflow
      - Convert the first 1-2 customers to annual contracts at roughly $60k-$90k ACV
      - Productize GitHub integration, branch-policy ingestion, and standards-ready VEX or advisory templates
      - Establish one repeatable referral or co-sell channel through disclosure or incident-response partners
  - horizon: 12–24 months
    items:
      - Reach 8-12 production customers across observability, database, API gateway, and security infrastructure vendors
      - Add GitLab and private deployment without pushing median onboarding past 6 weeks
      - Expand at least 2 customers to a second product line or readiness module
      - Show pilot-to-production conversion above 50% and no critical trust failure from generated backports
  - horizon: 24–36 months
    items:
      - Reach 30-45 production customers consistent with the researched year-three SOM
      - Expand into adjacent self-hosted software categories such as security tools and infrastructure appliances
      - Build a referenceable corpus of accepted backports, validation traces, and advisory outputs across recurring CVE classes
      - Prove the company is the system of record for remediation evidence rather than a one-off fix generator
risks:
  - risk: A high-profile bad backport or incomplete proof packet could destroy trust early because the product is used during live security incidents.
    likelihood: Medium
    impact: High
    mitigation: Keep human approval mandatory, restrict early scope to dependency CVEs with known upstream fixes, and require deterministic test plus fuzz evidence before publication.
  - risk: Buyers may only fund the product during active incidents, creating a lumpy pipeline and weak renewal logic.
    likelihood: High
    impact: High
    mitigation: Package readiness dashboards, advisory-SLA reporting, and retrospective pilots so the company can close work before the next severe disclosure lands.
  - risk: GitHub, Snyk, or another incumbent could add acceptable branch-aware remediation evidence into an existing security bundle.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on cross-host neutrality, accepted-fix corpus, validation depth, and the PSIRT-to-customer-proof workflow rather than patch drafting alone.
  - risk: Customers may care less about VEX and version-specific proof than the thesis assumes, weakening willingness to pay for evidence features.
    likelihood: Medium
    impact: Medium
    mitigation: Price initially on time-to-remediation and support-load reduction, then validate evidence demand through support tickets, security questionnaires, and renewal cases.
  - risk: Repo, CI, and support-policy variation could turn onboarding into a services-heavy integration motion.
    likelihood: Medium
    impact: High
    mitigation: Stay GitHub-first early, template branch-policy ingestion, and hire a solutions lead before scaling sales coverage.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Build the GitHub-first branch-aware backport and evidence MVP, close 2-3 paid pilots, convert the first 1-2 annual customers, and prove one product line with 3-5 branches can hit a credible remediation and advisory SLA before raising the next round.
