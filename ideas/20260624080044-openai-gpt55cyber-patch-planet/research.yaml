competitors:
- name: GitHub Advanced Security + Copilot Autofix
  stage: incumbent
  wedge: Repo-native code scanning, advisory workflows, and AI-assisted fix suggestions inside GitHub.
  pricing: Public GitHub pricing page; security sold as paid platform add-ons.
  strength: Native developer workflow, strong advisory/disclosure primitives, and tight pull-request context.
  weaknessVsUs: Does not naturally become the independent system of record for multi-branch backports, VEX, and customer proof across shipped versions.
  sourceRefs:
  - 33
  - 34
  - 39
- name: Snyk Open Source
  stage: scale-up
  wedge: Developer-first open-source vulnerability management with fix guidance, patches, and pull-request workflows.
  pricing: Starts at $25 per user per month; enterprise plans are customized.
  strength: Strong vulnerability intelligence and familiar remediation workflow for dependency issues.
  weaknessVsUs: More naturally pushes upgrades, patches, and PRs than branch-specific backport evidence across vendor-supported release lines.
  sourceRefs:
  - 53
  - 56
  - 57
- name: Endor Labs
  stage: scale-up
  wedge: AI-native AppSec centered on reachability, upgrade impact, and automated remediation pull requests.
  pricing: Custom enterprise pricing.
  strength: Modern remediation intelligence and strong positioning around open-source risk reduction.
  weaknessVsUs: Still centers on open-source remediation decisions rather than the full PSIRT-to-customer-evidence control loop for maintained product branches.
  sourceRefs:
  - 87
  - 89
- name: Black Duck
  stage: incumbent
  wedge: Enterprise SCA and software supply-chain risk management with adjacent AI assistance.
  pricing: Custom enterprise pricing.
  strength: Large enterprise footprint and long-established open-source risk dataset.
  weaknessVsUs: Broad suite orientation can leave branch-by-branch advisory evidence and supported-version remediation as adjacent, not core.
  sourceRefs:
  - 73
  - 74
- name: Veracode
  stage: incumbent
  wedge: AppSec platform spanning SCA, package firewall, and AI-assisted fix workflows.
  pricing: Custom enterprise pricing.
  strength: Budgeted platform footprint and recognizable remediation brand with Veracode Fix.
  weaknessVsUs: Better optimized for broad application-security programs than for operational coordination of supported-branch backports and customer advisories.
  sourceRefs:
  - 80
  - 81
