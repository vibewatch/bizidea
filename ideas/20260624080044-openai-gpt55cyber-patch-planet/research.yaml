    impact: positive
    point: Security teams increasingly expect coordinated disclosure and version-specific advisories instead of ad hoc messaging.
    sourceRefs:
    - 34
    - 41
  - factor: technological
    impact: positive
    point: Autofix, automated PRs, and fuzzing systems make remediation automation materially more feasible than it was a few years ago.
    sourceRefs:
    - 16
    - 33
    - 89
  - factor: legal
    impact: positive
    point: CRA and VEX/SBOM guidance increase the value of structured proof and lifecycle accountability.
    sourceRefs:
    - 3
    - 4
    - 11
  adoptionFrictionMatrix:
  - friction: Trust in AI-generated backports during live incidents
    severity: high
    affectedBuyer: Head of Product Security
    mitigation: Require deterministic tests, fuzz evidence, and human approval on every branch before publication.
    sourceRefs:
    - 16
    - 22
    - 33
  - friction: Incomplete branch and support-policy mapping
    severity: high
    affectedBuyer: Release Engineering
    mitigation: Ingest explicit support windows and version policies before generating remediation plans.
    sourceRefs:
    - 25
    - 28
    - 41
  - friction: Producing VEX and advisory output that legal and support teams accept
    severity: medium
    affectedBuyer: PSIRT / Compliance
    mitigation: Constrain output to CISA minimums and standards-aligned templates across OpenVEX and CSAF.
    sourceRefs:
    - 3
    - 6
    - 9
  - friction: Workflow integration with existing repo and CI systems
    severity: medium
    affectedBuyer: Platform Engineering
    mitigation: Start with pull-request and advisory workflows already native to GitHub and GitLab.
    sourceRefs:
    - 36
    - 43
    - 89
