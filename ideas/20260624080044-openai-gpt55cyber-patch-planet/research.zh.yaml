  pricing: GitHub 公开定价页面；安全功能作为付费平台附加模块销售。
  strength: 原生开发者工作流、强大的公告/披露原语，以及紧密的 pull request 上下文。
  weaknessVsUs: 不会自然成为跨已发布版本多分支回移、VEX 和客户证明的独立系统记录。
