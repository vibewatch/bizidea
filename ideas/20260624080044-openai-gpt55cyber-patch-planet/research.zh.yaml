    - 107
  validationPlan:
  - priority: high
    question: 产品安全团队在跨 3 至 8 条支持分支处理一个关键 CVE 时，实际消耗多少工程师工时？
    evidenceToGather: 来自至少五家自托管软件厂商的共创客户事件复盘、补丁时间线和公告起草工作流。
  - priority: high
    question: 产品能否在可接受的审查负担内，安全地将一个近期依赖类 CVE 跨多条维护分支回移？
    evidenceToGather: 针对一个近期 Go、Python 或 C 依赖问题，使用分支逐条测试、模糊结果和人工接受率指标开展现场试点。
  - priority: medium
    question: 企业客户要求 VEX 或版本专属证明的频率是否高到足以改变采购紧迫感？
    evidenceToGather: 技术支持工单样本、客户安全问卷及目标厂商的续约升级案例。
  - priority: medium
    question: 买家会在下一次事件之前付费，还是只在重大披露后才出手？
    evidenceToGather: 采购访谈、共创客户预算和事件后与事件前的转化数据。
