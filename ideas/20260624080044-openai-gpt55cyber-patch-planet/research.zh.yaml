openQuestions:
- GPT-5.5-Cyber 和 Patch the Planet 的声明能否与 OpenAI 或合作伙伴的一手材料核实，访问权限是否仍限于受信任防御者？
- 300 至 1500 人规模的基础设施厂商遭遇分支专属公告 SLA 严重到足以支撑全时修复平台的频率有多高——而非仅在下一次事件发生后？
- 产品安全领导者对 C、Go 和 Python 代码库中 AI 生成回移补丁的误报率或回滚风险能接受到什么程度？
- 企业客户实际要求 VEX 和版本专属证明从而改变采购行为的频率有多高，还是大多数交易仍能接受版本说明？
