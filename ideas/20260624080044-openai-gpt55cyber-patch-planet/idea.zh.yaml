problem: >-
  漏洞发现速度在加快，但自托管软件厂商真正的硬仗在找到缺陷之后才开始：得把修复回移到各条支持分支，
  证明它足够安全，还要在 SLA 到期前整理好客户指引。产品安全团队至今仍把这些工作当成"战时指挥室"
  来运转——依赖 GitHub cherry-pick、手工 QA 和客服撰写的安全公告。一旦 cURL、Go、Python 或
  Sigstore 这类关键依赖牵涉其中，每多拖一天，泄露风险、客服压力和续约风险就多累积一分。
targetUser:
  primary: >-
    维护多条支持分支的开放核心与自托管基础设施厂商中，负责产品安全和发布工程的领导者。
  secondary: >-
    需要答复客户 CVE 升级请求、并发布各版本升级指引的技术支持工程团队。
  buyer: >-
    产品安全负责人、工程副总裁，或自托管产品线的总经理。
startupThesis:
  nonObviousInsight: >-
    GPT-5.5-Cyber 让补丁起草显得像是稀缺资产，但 Patch the Planet 暴露了真正的商业瓶颈——
    下游转化：把一个已发现的缺陷安全回移到客户实际跑的各个支持版本上。由于前沿修复访问权被锁定给
    受信任防御者，数以千计的中端市场软件厂商将需要一套独立的系统来记录各分支修复与客户证明。
  beachhead: >-
    面向开放核心与自托管基础设施厂商的产品安全修复——这些厂商维护 3 至 8 条支持分支，依赖嵌入式
    C、Go 或 Python 组件，且企业客户要求在 72 小时内收到 CVE 安全公告。
  wedge: >-
    从一份已披露的 CVE 或漏洞悬赏报告出发，生成各分支专属的回移补丁、复现测试、模糊测试器，
    以及 VEX 与客户公告包。
  whyNowCatalyst: >-
    GPT-5.5-Cyber 与 Patch the Planet 已证明 AI 修复工作流今天就能落地；与此同时，
    Trusted Access 将前沿工具限定在极少数层级，倒逼其余市场转向独立自动化方案。
  ventureScalePath: >-
    从自托管基础设施厂商起步，逐步扩展到所有向客户交付长期维护代码的团队——嵌入式软件、
    硬件设备、智能体平台和发行版维护者——最终让公司成为软件供应链中连接披露、代码变更、
    部署证明与客户沟通的修复管控面。
solution: >-
  产品接收一个 CVE、漏洞悬赏报告或上游修复，将所有受影响代码路径映射到厂商的各支持分支上。
  针对每个分支生成回移建议，创建复现测试和模糊测试器，并在提交可合并 pull request 之前跑完
  确定性验证矩阵。之后输出 VEX 声明、SBOM 差异、版本说明，以及与精确补丁证据挂钩的客户公告草稿。
  随着时间推移，它成为自托管软件厂商的修复系统记录：修了什么、回移到哪里、证据在哪里，哪些
  客户版本仍有暴露。
goToMarketSeed:
  firstCustomer: >-
    在 300 至 1500 人规模的可观测性、数据库或 API 网关厂商中，负责产品安全的负责人——这些厂商
    发布本地部署或客户自管 Kubernetes 版本，维护至少三条支持发布线，并每周处理企业客户的
    CVE 升级请求。
  buyingTrigger: >-
    一次关键依赖披露、KEV 级别的升级请求，或战略客户要求覆盖所有支持分支的修复公告。
  currentAlternative: >-
    横跨 GitHub cherry-pick、内部构建脚本、QA 回归测试、电子表格和客服撰写公告的手工流程。
  switchingReason: >-
    首位客户选择切换，是因为这个切口能把多团队、多分支的"战时演练"变成数小时内可审查的
    补丁证据和客户就绪输出——不需要 OpenAI 受信任防御者访问权限，也不需要增加产品安全人手。
  pricingHypothesis: >-
    按支持的产品线和发布分支数量收取年度订阅费，超额用量（已验证的修复运行次数）和私有部署按需加收。
