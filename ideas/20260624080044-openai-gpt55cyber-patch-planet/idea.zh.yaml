    sourceRefs: [2]
differentiator: >-
  现有扫描器和 CNAPP 工具止步于发现与优先级排序，通用编码 Copilot 能起草代码但不负责多分支回移、
  验证和客户证据。这家公司就活在披露与客户安全发布之间那段狭窄且痛苦的空白地带。模型访问可能让
  补丁起草商品化，但特定分支的修复历史、验证追踪和公告模板会随每次事件不断积累，形成一套自有修复
  语料库——越用越好。
conceptDiagram:
  title: 多分支修复闭环
  mermaid: |
    flowchart LR
      Disclosure[CVE or upstream fix] --> Engine[Multi-branch backport engine]
      Branches[Supported release branches] --> Engine
      Engine --> Proof[Validated patches plus VEX evidence]
      Proof --> Outcome[Faster customer-safe remediation]
businessModelCanvas:
  customerSegments:
    - 开放核心基础设施厂商（含自托管发行版）
    - 维护 LTS 分支的数据库、可观测性、API 网关及安全软件厂商
    - 发货客户自管设备的嵌入式软件厂商
  valuePropositions:
    - 把一个已披露缺陷转化为所有支持发布线上的已验证补丁
    - 自动生成 VEX、安全公告与审计证据
    - 不依赖前沿模型访问权限，缩短客户安全上线的修复时间
  channels:
    - 直销，对接产品安全与发布工程负责人
    - 围绕新披露 CVE 的事件驱动出站销售
    - 与安全响应公司及软件供应链厂商的合作伙伴渠道
  customerRelationships:
    - 按产品线进行共创客户引导
    - 高触达式修复剧本调优
    - 与产品安全团队共同进行 SLA 和公告审查
  revenueStreams:
    - 平台年度订阅
    - 已验证修复运行的用量费
    - 高端私有部署套餐
  keyResources:
    - 多分支代码映射与补丁回移引擎
    - 来自已验证修复的修复证据语料库
    - 与代码仓库、CI 和发布系统的连接器
  keyActivities:
    - 维护特定分支的补丁生成与验证
    - 扩展公告与 VEX 自动化能力
    - 从被接受的修复和回滚结果中持续学习
  keyPartners:
    - 漏洞悬赏与协调披露平台
    - 安全咨询公司与事件响应团队
    - SBOM、VEX 及制品签名提供商
  costStructure:
    - 安全与编译器工程
    - 客户部署与技术支持
    - 验证、模糊测试与模型推理的计算成本
jobsToBeDone:
  - job: >-
      当关键 CVE 落在共享依赖上时，帮助产品安全团队跨支持版本完成补丁回移并提供证明，
      让他们能赶上安全公告 SLA 而不冻结工程进度。
    currentAlternative: 手工 cherry-pick、QA 回归测试和客服撰写公告。
    successMetric: 从披露到在所有支持分支上完成已验证补丁与客户公告的全流程耗时。
  - job: >-
      当战略客户询问已披露缺陷是否影响其版本时，帮助技术支持和产品安全团队提供版本专属证明，
      保住续约并避免升级请求。
    currentAlternative: 基于电子表格的版本审计与临时工程排查。
    successMetric: 在 SLA 内，由机器生成 VEX 和公告证据所覆盖的客户版本比例。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      该集群汇聚了一次基准跳跃、大规模经验证修复语料库、政策顺风与生态采用，尽管头条仍由
      OpenAI 主导而非创业公司。
  painIntensity:
    score: 5
    rationale: >-
      漏洞一旦披露，自托管厂商就要承担代码变更、客户指引，以及多条支持版本上的证明责任。
  wedgeClarity:
    score: 5
    rationale: >-
      多分支补丁回移加证据包是一个具体工作流，有明确的输入、明确的买家，以及可量化的
      "修复到位时长"输出。
  defensibility:
    score: 4
    rationale: >-
      被接受的修复语料库、特定分支验证历史和公告模板能够积累成持久的工作流数据，即便代码
      起草本身趋向商品化。
  ventureScale:
    score: 4
    rationale: >-
      同一套修复系统可从基础设施厂商扩展到所有长期交付软件的品类，再扩展到更广泛的软件
      供应链运营。
topRisks:
  - name: 验证失败风险
    description: >-
      一个存在缺陷的回移补丁或不完整的证据包可能在早期迅速摧毁信任，因为客户在
      CVE 事件期间直接依赖这些输出。
    mitigation: 在精度得到生产验证之前，每条分支都须强制要求确定性复现、测试和模糊测试证据，以及人工审批。
  - name: 现有厂商捆绑
    description: GitHub、Snyk 或前沿实验室可能添加基础的补丁起草功能，压缩表面层面的差异化。
    mitigation: 深耕私有多分支回移加 VEX 与客户公告工作流——这是通用 Copilot 和扫描器无法端到端管理的部分。
  - name: 事件驱动预算
    description: 部分买家可能只在重大披露事件后才感到足够紧迫，导致销售周期波动起伏。
    mitigation: >-
      用公告 SLA 报告和顶级依赖补丁就绪看板在两次事件之间保持落地，待下一个 CVE 到来时
      再扩展到完整修复自动化。
