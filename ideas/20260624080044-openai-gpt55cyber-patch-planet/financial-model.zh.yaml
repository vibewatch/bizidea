scenarios:
  downside:
    description: "试点到年度合同转化滑坡，私有部署仍偏重服务，公司未能赶上 Q4Y2 节奏，需要在完整 Y3 证明之前追加资本。"
    y3RevenueK: 1356.0
    y3EbitdaK: -879.9
    cashLowPointK: -295.2
    keyAssumptionChanges:
      - "Q4Y3 生产客户仅达 28 位而非 40 位，因为事件驱动试点转化更慢。"
      - "混合 ACV 降至 $72K 而非 $78K，因为附加私有部署或用量超额的客户较少。"
      - "毛利率维持在 67%，因为验证和上线工作仍偏重服务。"
  base:
    description: "基准情形在 Q4Y2 按时达到种子里程碑，并在 Q4Y3 以 $78K ACV 扩展到 40 位生产客户；由于客户新增集中在下半年，确认收入仍低于期末 ARR。"
    y3RevenueK: 2171.0
    y3EbitdaK: -268.4
    cashLowPointK: 466.6
    keyAssumptionChanges:
      - "Q4Y3 生产客户达到 40 位，混合 ACV $78K。"
      - "毛利率维持在商业计划目标 70%。"
      - "Q4Y3 人员编制保持精简，9 名全职员工。"
  upside:
    description: "合作伙伴推荐、客户参考价值和高端附加加速生产转化，同时模板提升毛利率的速度快于基准情形。"
    y3RevenueK: 2828.0
    y3EbitdaK: 247.8
    cashLowPointK: 837.4
    keyAssumptionChanges:
      - "Q4Y3 生产客户达 45 位而非 40 位，因为推荐和生态合作伙伴更早贡献。"
      - "混合 ACV 升至 $84K，因为私有部署和用量超额附加更频繁。"
      - "毛利率提升至 72%，因为验证模板和集成趋于标准化。"
