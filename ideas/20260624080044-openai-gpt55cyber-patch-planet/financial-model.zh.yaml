    downsideCase: "付费试点到年度生产合同 8 至 9 个月"
    baseCase: "5 至 6 个月"
    upsideCase: "4 个月"
    y3RevenueImpactK: -357.5
    cashImpactK: -341.2
  - variable: "毛利率"
    downsideCase: "毛利率 67%"
    baseCase: "毛利率 70%"
    upsideCase: "毛利率 72%"
    y3RevenueImpactK: 0.0
    cashImpactK: -85.0
  - variable: "招聘节奏"
    downsideCase: "将一名工程师和一名解决方案负责人的入职提前两个季度"
    baseCase: "Q4Y3 保持 9 名全职员工"
    upsideCase: "将首位 G&A 人员的入职推迟到盈亏平衡之后"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: "单位经济模型流程"
  mermaid: |
    flowchart LR
      Leads[Target vendors] --> PaidPilots[Paid pilots]
      PaidPilots --> Customers[Production customers]
      CACSpend[CAC spend] --> PaidPilots
      Customers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      ReviewAcceptance[Reviewer acceptance + churn] --> Customers
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情形靠从 Y1 的 2 位生产客户增长到 Q4Y2 的 12 位、Q4Y3 的 40 位（约 $78K ACV）来驱动，创造约 $3.1M 的期末 ARR。"
  - checkName: "必须做对的事"
    finding: "60 至 90 天付费试点切口必须足够快地转化为年度订阅，让创始人主导销售加一名销售员能在不翻倍服务人员编制的前提下复利增收。"
  - checkName: "模型破局点"
    finding: "若销售周期拉长到 8 至 9 个月，或毛利率维持在 67% 左右，悲观情形将在第三年结束前耗尽现金。"
  - checkName: "下一轮融资证明"
    finding: "当公司在 Q4Y2 达到 8 至 12 位生产客户、并跑通一套可重复的 GitHub 优先部署动作后，种子轮融资故事就成立——这正是 $2.4M 融资需求所要支撑的里程碑。"
sanityChecks:
  ruleOf40: "Y3 增长率 244% + EBITDA 利润率 -12% = 232%。"
  burnMultiple: "Y2 消耗倍数 1.5x（$0.87M 消耗 / $0.57M 新增净收入）；Y3 消耗倍数 0.2x（增长超过剩余消耗）。"
  revenuePerFte: "Y3 人均收入 $241K（Q4Y3 人员编制 9 人；B2B SaaS 高效基准约 $200K–$400K）。"
  flags:
    - "确认的 Y3 收入仍低于研究测算的 $3.2M SOM，因为模型主要靠 Q4Y3 期末 ARR 触及该水平，任何下半年增速放缓都会削弱里程碑叙事。"
    - "基准情形 Q4Y3 人员编制保持在 9 名全职员工，若私有部署仍是定制化的，每位解决方案/GTM 人员承载的客户上线和支持量将相当激进。"
    - "毛利率固定在商业计划 70% 目标，但早期验证证据和公告工作流工作在模板完全标准化之前，更可能表现得像解决方案工程，而非软件交付。"
