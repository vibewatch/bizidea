modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Leads[Target vendors] --> PaidPilots[Paid pilots]
      PaidPilots --> Customers[Production customers]
      CACSpend[CAC spend] --> PaidPilots
      Customers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> EBITDA[EBITDA]
      EBITDA --> Cash[Ending cash]
      ReviewAcceptance[Reviewer acceptance + churn] --> Customers
modelSanity:
  - checkName: "Revenue engine"
    finding: "The base case is driven by growing from 2 production customers in Y1 to 12 by Q4Y2 and 40 by Q4Y3 at roughly $78K ACV, which creates about $3.1M of exit ARR."
  - checkName: "Must go right"
    finding: "The 60-90 day paid-pilot wedge has to convert into annual subscriptions fast enough that founder-led sales and one seller can compound revenue without doubling services headcount."
  - checkName: "Model breaks if"
    finding: "If sales cycles stretch toward 8-9 months or gross margin stays near 67%, the downside case drives cash negative before year three ends."
  - checkName: "Next-round proof"
    finding: "A seed-ready story appears once the company reaches 8-12 production customers and one repeatable GitHub-first deployment motion by Q4Y2, which is the milestone the $2.4M ask is built to fund."
sanityChecks:
  ruleOf40: "Y3 growth 244% + EBITDA margin -12% = 232%."
  burnMultiple: "Y2 burn multiple 1.5x based on $0.87M burn over $0.57M net new revenue; Y3 burn multiple 0.2x as growth outpaces the remaining burn."
  revenuePerFte: "$241K Y3 using Q4Y3 headcount of 9 FTE (benchmark roughly $200K-$400K for efficient B2B SaaS)."
  flags:
    - "Recognized Y3 revenue still trails the researched $3.2M SOM because the model gets there mostly through Q4Y3 exit ARR, so any second-half ramp slip weakens the milestone narrative."
    - "The base case keeps the company at only 9 FTE by Q4Y3, which makes customer onboarding and support load per solutions/GTM head aggressive if private deployments remain bespoke."
    - "Gross margin is held at the business-plan 70% target even though early validation evidence and advisory workflow work could behave more like solution engineering before templates fully standardize."
