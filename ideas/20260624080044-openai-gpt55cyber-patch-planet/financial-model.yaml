scenarios:
  downside:
    description: "Pilot-to-annual conversion slips and private deployments stay more services-heavy, so the company undershoots the Q4Y2 pace and would need extra capital before full Y3 proof."
    y3RevenueK: 1356.0
    y3EbitdaK: -879.9
    cashLowPointK: -295.2
    keyAssumptionChanges:
      - "Q4Y3 production customers reach 28 instead of 40 because incident-led pilots convert more slowly."
      - "Blended ACV lands at $72K instead of $78K as fewer accounts attach private deployment or usage overage."
      - "Gross margin stays at 67% because validation and onboarding remain more services-heavy."
  base:
    description: "Base case reaches the Q4Y2 seed milestone on schedule and scales to 40 production customers by Q4Y3 at $78K ACV, with recognized revenue still below exit ARR because customer adds are back-half weighted."
    y3RevenueK: 2171.0
    y3EbitdaK: -268.4
    cashLowPointK: 466.6
    keyAssumptionChanges:
      - "Q4Y3 production customers reach 40 with $78K blended ACV."
      - "Gross margin holds at the 70% business-plan target."
      - "Headcount stays lean at 9 FTE by Q4Y3."
  upside:
    description: "Partner referrals, referenceability, and premium attach accelerate production conversions while templates lift margin faster than the base case."
    y3RevenueK: 2828.0
    y3EbitdaK: 247.8
    cashLowPointK: 837.4
    keyAssumptionChanges:
      - "Q4Y3 production customers reach 45 instead of 40 as referrals and ecosystem partners contribute earlier."
      - "Blended ACV rises to $84K as private deployment and usage overage attach more often."
      - "Gross margin improves to 72% as validation templates and integrations standardize."
