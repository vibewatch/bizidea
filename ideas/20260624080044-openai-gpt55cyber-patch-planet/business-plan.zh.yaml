slug: cve-backport-evidence-plane
date: "2026-06-24"
executiveSummary: >-
  CVE Backport Evidence Plane 向维护 3 至 8 条支持发布线、须向企业客户快速交付版本专属 CVE
  响应的自托管软件厂商，销售一套以分支为感知维度的修复系统记录。首位目标客户是 300 至 1500 人规模的
  可观测性、数据库或 API 网关厂商中的产品安全负责人，这些厂商发布本地部署或客户自管 Kubernetes 版本。
  切口比通用 AppSec 或 AI 编码工具更窄：产品接收一个已披露的依赖漏洞及其上游修复，跨支持分支生成
  经人工审查的回移补丁，跑完验证，再输出 VEX 和公告证据。这一滩头市场颇具吸引力——一个 CVE 就能在
  GitHub 或 GitLab 与 CI 工作流内立即产生多团队可量化的痛点、现成的 AppSec 预算和清晰的生产交接。
  产品推进顺序应坚持 GitHub 优先、人工审批，并聚焦依赖类 CVE，再向任意漏洞类扩展，因为信任与分支
  策略映射在上线初期比覆盖广度更重要。研究支持估算的 $0.2B SAM 和建模出的第三年 $3.2M SOM，但两者
  都依赖买家为"常态就绪"而非"事件响应峰值"持续付费。最大的否定风险在于：VEX 级证明尚未成为预算
  刚需、AI 生成回移补丁的审查接受率仍太低，或 GitHub 与 Snyk 率先捆绑出可用的分支感知工作流。
  在付费试点证明 CVE 现场回移获批并转化为 $60k–$90k 年度合同之前，这是一个切口明确但信念中等
  的企业安全机会。
problem:
  - >-
    一次依赖披露就会转化为自托管厂商需处理的 3 至 8 个分支专属回移、回归测试和客户公告，
    但大多数团队仍依靠 cherry-pick、CI 脚本、电子表格和手工 QA 来协调这一切。
  - >-
    现有扫描器和修复 PR 工具能发现或建议代码变更，却无法告诉产品安全团队哪些支持版本
    已修复、哪些仍有暴露，以及技术支持可以安全发给客户的证明是什么。
  - >-
    企业客户的要求与 SBOM、VEX 的预期不断提升，让回应模糊或迟缓的代价越来越高——修复
    延误直接转化为续约风险、升级请求和合规压力。
solution:
  - >-
    接收已披露 CVE 或上游补丁，映射受影响代码在各支持分支上的位置，并以明确的分支策略
    感知生成经人工审查的回移 PR。
  - >-
    运行确定性复现测试、现有 CI 套件和模糊测试器，让输出成为已验证证据而非原始模型文本。
  - >-
    发布与精确补丁集挂钩的 OpenVEX 及 CSAF 就绪证据包、SBOM 差异和公告草稿，让产品安全、
    技术支持和法务团队基于同一套系统记录工作。
whyWeWin:
  - >-
    在位厂商优化的是发现、优先级排序或单分支修复体验；这家公司占据的是跨维护分支从
    PSIRT 到客户证明的那段狭窄闭环。
  - >-
    被接受的回移补丁、回滚结果、复现测试和公告审批，积累成通用 Copilot 和扫描器不会自然
    采集的自有修复语料库。
  - >-
    切口叠加在现有 GitHub 或 GitLab 与 CI 工作流上，而非替换 AppSec 套件——这是进入已预算
    安全项目的更现实路径。
strategicChoices:
  beachhead: >-
    300 至 1500 人规模的可观测性、数据库、API 网关及安全基础设施厂商，发布自托管版本，
    维护 3 至 8 条支持分支，且企业客户预期在约 72 小时内收到 CVE 指引。
  wedgeRationale: >-
    这个切入点比宽泛的 AppSec 平台更快证明价值，因为每一次关键依赖 CVE 都在单个产品安全
    团队内产生可量化的分支回移队列、回归负担和客户沟通任务。
  sequencingRationale: >-
    先以 GitHub 原生、人工审批的方式自动化近期依赖类 CVE 的单条产品线，因为这能把最难的
    证明问题——安全的多分支修复——单独隔离出来，无需同时解决通用扫描、任意应用漏洞或多系统
    部署复杂性；只有在现场试点建立信任之后，才加入 GitLab、私有部署、就绪看板和更广语言覆盖，
    然后在扩大销售之前先补充实施与合作伙伴覆盖。
  notYet:
    - 宽泛的漏洞发现或云运行时检测
    - 无需人工审批的自主合并与公告发布
    - 在基础设施厂商打法可重复转化之前就深入嵌入式或设备覆盖
    - 针对任意内部代码库的重服务型定制修复
market:
  tam: >-
    估算 TAM $0.8B，基于约 12000 家全球长期维护或自托管软件厂商，每家每年在修复证据层上
    支出约 $65k。
  sam: >-
    估算 SAM $0.2B，基于约 2500 家有多分支支持义务的滩头基础设施厂商及相近支出水平。
  som: >-
    估算第三年 SOM $3.2M，基于约 45 家客户、均价 ACV $70k，通过直销触达事件驱动型
    自托管厂商。
  segments:
    - 可观测性、数据库、API 网关和安全软件领域、维护 3 至 8 条支持发布线的自托管基础设施厂商
    - 嵌入式、设备及其他后续继承同类分支修复负担的长期维护软件厂商
  buyingProcess: >-
    可能的经济买家是产品安全负责人或工程副总裁，发布工程与 PSIRT 操作人员负责日常工作流
    验证。最快的首单是针对单条产品线和一个当前或近期已结 CVE 周期的付费试点，随后在团队
    验证到更快的已验证回移补丁和可发布证据后，转化为年度合同。
product:
  mvp: >-
    MVP 覆盖一家共创客户、一条产品线、3 至 5 条支持分支，以及有已知上游修复的近期依赖
    类 CVE。接入分支策略，在 GitHub 中提交已验证 PR，并输出 VEX 加公告草稿，但强制保留
    人工审批。
  sixMonth: >-
    为 2 至 3 家共创客户交付 GitHub 优先试点，验证分支策略接入，并在一次现场事件中将
    CVE 接入到首个已验证 PR 加证据包的时间缩短。
  twelveMonth: >-
    新增 GitLab 和私有部署支持，交付顶级依赖和公告 SLA 的事件就绪看板，并将早期试点
    转化为年度订阅。
  twentyFourMonth: >-
    从依赖类 CVE 扩展到内部发现漏洞和漏洞悬赏报告，支持多产品组合，并将私有部署
    加标准就绪证据确立为大客户的默认选项。
  keyBets:
    - 支持分支策略能被准确接入，足以在无需数周上线的前提下自动化修复规划
    - 确定性测试和模糊测试证据能将审查接受率提升到手工 cherry-pick 基线之上
    - 版本专属 VEX 和公告输出能驱动购买紧迫感，而不只是锦上添花的文档
    - GitHub 优先工作流能在需要更广平台支持之前，向足够多的共创客户泛化
gtm:
  wedge: >-
    围绕单条产品线及其下一个关键依赖 CVE 或近期事件复盘，销售 60 至 90 天付费试点，
    用分支感知回移补丁加 VEX 或公告输出证明节省的小时数和 SLA 达标情况。
  channels:
    - 创始人主导出站销售，对接自托管基础设施厂商的产品安全负责人、发布工程负责人和工程副总裁
    - 围绕影响常用 Go、Python 或 C 库的 KEV 或重大依赖披露开展事件驱动推广
    - 通过披露平台、事件响应公司和 SBOM 或 VEX 工具合作伙伴建立推荐与联合销售路径
  funnelTargets: "线索→合格试点 15–25%，合格试点→付费试点 30–40%，付费试点→生产落地 50%+，生产落地→第二条产品线或就绪附加模块 25%+（12 个月内）"
  pricing: >-
    付费试点加年度订阅，按已覆盖的产品线和维护分支数量定价，超额用量（已验证修复运行次数）
    和高端私有部署套餐另计；这比按席位定价更贴合痛点与计算规模的增长逻辑，也让事件驱动试点
    更容易转化为经常性收入。
businessModel:
  revenueStreams:
    - 针对单条产品线和一个当前或近期已结 CVE 工作流的付费试点费
    - 按已覆盖产品线和支持分支计算的平台年度订阅
    - 用量超额费和高端私有部署套餐（适用于高用量或受监管客户）
  unitOfValue: 修复工作流覆盖下的单条支持产品线及其维护分支
  targetGrossMarginPct: 70
  expansionLevers:
    - 在同一厂商账户内新增产品线和发布分支
    - 在两次现场 CVE 之间销售事件就绪看板和公告 SLA 报告
    - 从依赖类 CVE 扩展到漏洞悬赏和内部发现漏洞工作流
    - 凭借私有部署和更深层 PSIRT 或合规集成向上市场扩展
strategyMap:
  northStarMetric: 影响支持版本的关键 CVE 中，在承诺 SLA 内以已接受回移补丁和客户就绪证据完成处置的比例
  inputMetrics:
    - CVE 接入到首个已验证 pull request 的时间
    - 每次事件中自动覆盖的支持分支比例
    - 生成回移补丁的审查接受率
    - 从已接受补丁到发布 VEX 或公告草稿的时间
    - 付费试点到年度生产合同的转化率
  moatsToBuild:
    - 跨重复 CVE 类型积累的特定分支已接受修复与回滚语料库
    - 涵盖复现测试、CI 结果和模糊测试制品的验证追踪库
    - 连接 CVE、补丁、支持版本与客户公告的版本感知证据图
    - 适用于 GitHub、GitLab 及常见 CI 或发布工作流的集成模板
  killCriteria:
    - 专注创始人主导销售的 9 个月内签约付费试点不足 2 个
    - 在首批 3 个试点 CVE 工作流中，生成的回移补丁对支持分支的客户接受覆盖率低于 70%
    - 前 5 个试点后付费试点到年度生产合同的转化率仍低于 40%
    - 前 10 位目标买家中不足 3 位能出示有据可查的客户或合规对版本专属证明的需求
  mermaid: |
    flowchart LR
      Wedge[Incident-led multi-branch CVE pilot] --> MVP[Branch-aware backport and evidence MVP]
      MVP --> Proof[Accepted PRs plus VEX and advisory proof]
      Proof --> Expansion[Portfolio and private-deployment expansion]
investorMemo:
  verdict:
    call: 持续关注
    conviction: 切口锐利、痛点真实，但在付费试点验证事件频率、预算归属和审查接受率之前，信念保持中等。
    whyBelieve: >-
      这家创业公司攻的是修复建议工具与客户安全上线之间一个具体的管控缺口，恰在分支复杂性
      与 VEX 压力让这段空白代价陡增的当下。
    whyDoubt: >-
      业务仍依赖事件驱动工作流带来的周期性紧迫感，可能在积累足够参考数据之前就面临在位厂商
      的快速捆绑。
    nextDiligence: 验证 2 个付费试点以及一个在回移补丁被接受、证据发布后转化为 $60k–$90k 年度合同的现场 CVE 工作流。
  firstCustomer:
    title: 自托管基础设施厂商的产品安全负责人
    profile: >-
      300 至 1500 人规模的可观测性、数据库或 API 网关厂商，发布本地部署或客户自管 Kubernetes
      版本，维护 3 至 8 条支持分支，每周处理企业客户 CVE 升级请求。
    trigger: >-
      一次 KEV 关联的依赖披露或战略客户升级请求，要求在 72 小时内向所有支持分支交付已验证
      修复和版本专属公告。
    buyer: 产品安全负责人
    initialContract: >-
      $30k–$50k 的单条产品线、3 至 5 条支持分支付费试点，在一个现场 CVE 周期或一次经验证
      的复盘证明 SLA 与证据工作流后，转化为 $60k–$90k 年度订阅加用量超额费。
  mustBeTrue:
    - 目标厂商每年面临足够多的多分支关键 CVE 或客户升级请求，足以支撑经常性软件支出而非临时咨询
    - 人工审查员对近期依赖类 CVE 的至少 70% 支持分支接受生成回移补丁，且无重大回滚率
    - 产品安全负责人或工程副总裁能在一个季度内从现有 AppSec 或工程预算中拨款支付试点
    - VEX 与公告证据能实质性缩短技术支持、续约或合规工作，而非仅作为装饰性文档
    - GitHub、Snyk 和 Endor 级别的在位厂商不会足够快地推出等效的分支感知证据工作流，
      以便在初创公司建立参考客户之前就压垮定价
  diligenceQuestions:
    - 目标客户每年实际要处理多少次关键多分支修复事件
    - 在实践中哪个角色签下第一张支票：产品安全负责人、工程副总裁还是产品总经理
    - 买家对 AI 生成回移补丁能接受的审查通过率和回滚率是多少
    - 企业客户或合规团队实际要求版本专属证明而非通用版本说明的频率有多高
    - 工作流能否接入 GitHub 或 GitLab 及现有 CI，而不让公司沦为重服务型集成商
operatingAssumptions:
  - assumption: 目标厂商会在下一次重大 CVE 之前购买事件就绪试点，而不只是在危机期间才下单。
    basis: research.yaml
    validationTest: 访谈 10 至 12 位目标买家，并完成 2 个不依赖当前活跃事件的付费试点签约。
    decisionImpact: 若不成立，公司将变成一个销售周期波动的事件响应工具，可能需要转向合作伙伴主导或服务定价。
  - assumption: 在附上确定性测试和模糊测试证据的情况下，人工审查员将在大多数支持分支上接受生成的回移补丁。
    basis: research.yaml
    validationTest: 在首批 3 个试点 CVE 工作流中，以已接受 PR 覆盖至少 70% 的分支，且无 Sev-1 级回滚。
    decisionImpact: 若不成立，将产品收窄为公告编排，或针对特定语言和依赖类进行完整回移自动化。
  - assumption: GitHub 原生集成能覆盖足够多的早期客户，可推迟更广平台支持。
    basis: 操作判断
    validationTest: 确保首批 3 家共创客户能通过 GitHub 和现有 CI 运行产品，无需专用旁路系统。
    decisionImpact: 若不成立，GitLab 和私有部署工作必须提前，减慢产品聚焦和招聘节奏。
  - assumption: VEX 和客户公告输出提升的付费意愿高于单纯补丁起草。
    basis: research.yaml
    validationTest: 从至少 3 个试点收集技术支持工单、安全问卷或续约升级案例，并确认 2 个将版本专属证明列为购买驱动因素。
    decisionImpact: 若不成立，将产品定位优先聚焦于节省工程时间，减少对证据工作流的投入。
  - assumption: 按支持产品线加分支数量定价能维持 $60k–$90k ACV 并保持软件级毛利率。
    basis: idea.yaml
    validationTest: 在保持毛利计划内的技术支持和计算成本的同时，将至少 1 个试点转化为目标区间内的年度合同。
    decisionImpact: 若不成立，公司须向上市场移动、提价，或缩窄客户画像以维持风险投资经济模型。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15 至 20 位自托管基础设施厂商的产品安全负责人、发布工程负责人和 PSIRT 操作人员。
    hypothesis: 多分支修复和公告准备的痛点足够强烈，能在下一次事件之前支撑试点资金。
    successMetric: 至少 10 次访谈产出近期事件工作流，5 次提供修复到位时长细节，3 次同意进入试点规划。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 针对一家共创客户的近期依赖类 CVE，手工完成跨 3 至 5 条支持分支的影子回测。
    hypothesis: 分支策略加上游修复数据能在无需数周上线的前提下生成可接受的回移计划。
    successMetric: 回移草稿加证据包在 48 小时内覆盖至少 70% 的受影响分支。
    owner: 联合创始工程师
  - horizon: 90–180 天
    experiment: 为 2 家共创客户交付针对一个现场或近期依赖类 CVE 的 GitHub 优先试点。
    hypothesis: 人工审查 PR 加 VEX 和公告草稿能将修复和沟通时间缩短到足以支撑付费试点转化。
    successMetric: 启动 2 个付费试点，至少 1 次事件达到客户目标 SLA 改善阈值。
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: 由 PSIRT、法务和技术支持团队审查生成的 OpenVEX、CSAF 和公告输出。
    hypothesis: 符合标准的模板可经轻微编辑直接发布，无需全面重写。
    successMetric: 至少 80% 的生成证据字段通过审查保持不变，且 1 份公告从工作流中发布。
    owner: 产品工程师
  - horizon: 180–365 天
    experiment: 上线就绪看板和事件前获客动作，提供顶级依赖和公告 SLA 报告。
    hypothesis: 事件间工作流能平滑销售管道并增加经常性预算，优于纯应急响应模式。
    successMetric: 至少 1 个试点在无活跃 Sev-1 事件的情况下完成签约，且看板使用在月度层面持续。
    owner: 创始人/CEO
  - horizon: 180–365 天
    experiment: 通过 GitLab、私有部署或披露平台推荐渠道添加一条合作伙伴辅助路径。
    hypothesis: 一条生态系统路径将降低集成摩擦并扩展到 GitHub 专属早期采用者之外。
    successMetric: 一个合作伙伴来源或合作伙伴辅助的部署在 6 周内上线，且定价与直接试点相当。
    owner: 解决方案负责人
operations:
  - 为每条产品线接入支持策略，使分支覆盖和生命周期终止窗口在补丁生成前明确
  - 在任何公告离开草稿状态之前，使用现有 CI、复现测试和模糊测试器运行确定性验证流水线
  - 跨产品安全、技术支持和法务的私有披露与公告审批工作流，使用 OpenVEX 和 CSAF 模板
  - 与 GitHub、GitLab、漏洞管理平台和事件响应合作伙伴的推荐与集成流程
team:
  - role: 创始人/CEO
    startTiming: 第 0 个月
    rationale: 早期成功依赖聚焦地向产品安全负责人销售、保持切口纪律、以及将共创客户转化，而非宽泛的安全叙事。
  - role: 联合创始工程师
    startTiming: 第 0 个月
    rationale: 首要技术风险是在现有代码仓库和 CI 系统之上构建可靠的分支感知回移与证据流水线。
  - role: 安全验证工程师
    startTiming: 第 3 个月
    rationale: 信任的关键在于跨支持分支的确定性复现测试、模糊测试器和回滚安全验证。
  - role: 产品工程师
    startTiming: 第 6 个月
    rationale: 试点启动后，公司需要在 GitHub 或 GitLab 工作流、证据 UX 和就绪看板上加快迭代。
  - role: 解决方案负责人
    startTiming: 第 9 个月
    rationale: 如果支持策略映射、公告模板和部署编排仍只靠创始人来做，客户证明就会失败。
milestones:
  - horizon: 0–12 个月
    items:
      - 与自托管基础设施厂商签约 2 至 3 个付费试点，并验证至少 1 个现场多分支 CVE 工作流
      - 将首批 1 至 2 位客户转化为约 $60k–$90k ACV 的年度合同
      - 将 GitHub 集成、分支策略接入及标准就绪 VEX 或公告模板产品化
      - 通过披露或事件响应合作伙伴建立一条可重复的推荐或联合销售渠道
  - horizon: 12–24 个月
    items:
      - 在可观测性、数据库、API 网关和安全基础设施厂商中累计达到 8 至 12 位生产客户
      - 新增 GitLab 和私有部署，且中位上线周期不超过 6 周
      - 至少 2 位客户扩展到第二条产品线或就绪模块
      - 试点到生产转化率超过 50%，且生成回移补丁无重大信任失败
  - horizon: 24–36 个月
    items:
      - 累计达到 30 至 45 位生产客户，与研究测算的第三年 SOM 一致
      - 向相邻自托管软件类别扩展，如安全工具和基础设施设备
      - 跨重复 CVE 类型构建可引用的已接受回移补丁、验证追踪和公告输出语料库
      - 证明公司是修复证据的系统记录，而非一次性修复生成器
risks:
  - risk: 一次高知名度的错误回移补丁或不完整证据包可能在早期摧毁信任，因为产品在安全事件现场被使用。
    likelihood: Medium
    impact: High
    mitigation: 强制保留人工审批，将早期范围限定于有已知上游修复的依赖类 CVE，并在发布前要求确定性测试加模糊测试证据。
  - risk: 买家可能只在活跃事件期间才愿意付费，导致销售管道不均衡且续约逻辑薄弱。
    likelihood: High
    impact: High
    mitigation: 将就绪看板、公告 SLA 报告和复盘试点打包，使公司能在下一次重大披露到来之前签下业务。
  - risk: GitHub、Snyk 或其他在位厂商可能在现有安全捆绑包中加入可接受的分支感知修复证据。
    likelihood: Medium
    impact: High
    mitigation: 在补丁起草之外，以跨平台中立性、已接受修复语料库、验证深度和 PSIRT 到客户证明工作流作为差异化。
  - risk: 客户对 VEX 和版本专属证明的重视程度可能低于假设，削弱对证据功能的付费意愿。
    likelihood: Medium
    impact: Medium
    mitigation: 初期以修复到位时长和技术支持负载降低来定价，再通过技术支持工单、安全问卷和续约案例验证证据需求。
  - risk: 代码仓库、CI 和支持策略的差异可能让上线变成重服务型集成工程。
    likelihood: Medium
    impact: High
    mitigation: 坚持 GitHub 优先，模板化分支策略接入，并在扩大销售覆盖之前引入解决方案负责人。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: >-
    构建 GitHub 优先的分支感知回移与证据 MVP，签约 2 至 3 个付费试点，转化首批 1 至 2 位年度
    客户，并在进入下一轮融资之前证明单条产品线、3 至 5 条分支能达到可信的修复和公告 SLA。
