topRisks:
  - name: Validation failure risk
    description: A flawed backport or incomplete proof packet could erode trust immediately because customers rely on the output during live CVE incidents.
    mitigation: Require deterministic repro, test, and fuzz evidence plus human approval on every branch until accuracy is proven in production.
  - name: Incumbent bundling
    description: GitHub, Snyk, or frontier labs could add basic patch drafting and compress surface-level differentiation.
    mitigation: Own the private, multi-branch backport plus VEX and customer-advisory workflow that generic copilots and scanners do not manage end to end.
  - name: Event-driven budgets
    description: Some buyers may only feel acute urgency after a severe disclosure, creating lumpy sales cycles.
    mitigation: Land with advisory-SLA reporting and top-dependency patch-readiness dashboards between incidents, then expand to full remediation automation when the next CVE hits.
