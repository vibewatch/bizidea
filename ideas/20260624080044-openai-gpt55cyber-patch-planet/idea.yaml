jobsToBeDone:
  - job: >-
      When a critical CVE lands in a shared dependency, help the product-security team
      backport and prove fixes across supported releases, so they can hit advisory SLAs
      without freezing engineering.
    currentAlternative: Manual cherry-picks, QA regression runs, and support-authored advisories.
    successMetric: Time from disclosure to validated patch and customer advisory across all supported branches.
  - job: >-
      When a strategic customer asks whether a disclosed flaw affects their version, help
      support and product-security teams answer with version-specific proof, so they can
      preserve renewals and avoid escalations.
    currentAlternative: Spreadsheet-based version audits and ad hoc engineering investigations.
    successMetric: Percentage of customer versions covered by machine-generated VEX and advisory evidence within SLA.
