problem: >-
  Vulnerability discovery is accelerating, but the hard work for self-hosted software
  vendors starts after a flaw is found: backporting the fix across supported branches,
  proving it is safe, and packaging customer guidance before SLAs expire. Product-security
  teams still run this as a war room across GitHub cherry-picks, manual QA, and
  support-written advisories. When critical dependencies like cURL, Go, Python, or
  Sigstore are involved, every extra day of manual remediation increases breach exposure,
  support load, and renewal risk.
targetUser:
  primary: >-
    Product-security and release-engineering leaders at open-core and self-hosted
    infrastructure vendors that maintain multiple supported release branches.
  secondary: >-
    Support engineering teams that must answer customer CVE escalations and publish
    version-specific upgrade guidance.
  buyer: >-
    Head of Product Security, VP Engineering, or GM of the self-hosted product line.
startupThesis:
  nonObviousInsight: >-
    GPT-5.5-Cyber makes patch drafting look like the scarce asset, but Patch the Planet
    shows the real commercial bottleneck is downstream translation: taking one discovered
    flaw and safely backporting it across the supported versions customers actually run.
    Because frontier remediation access is restricted to trusted defenders, thousands of
    mid-market software vendors will need an independent system of record for
    branch-specific fixes and customer proof.
  beachhead: >-
    Product-security remediation for open-core and self-hosted infrastructure vendors
    with 3-8 supported release branches, embedded C, Go, or Python dependencies, and
    enterprise customers that demand CVE advisories within 72 hours.
  wedge: >-
    Generate branch-specific backports, repro tests, fuzz harnesses, and VEX plus
    customer-advisory packets from one disclosed CVE or bug bounty report.
  whyNowCatalyst: >-
    GPT-5.5-Cyber and Patch the Planet prove AI remediation workflows are operational
    now, while Trusted Access limits frontier tools to a narrow tier and pushes the rest
    of the market toward independent automation.
  ventureScalePath: >-
    Start with self-hosted infrastructure vendors, then expand into every team shipping
    long-lived code to customers—embedded software, appliances, agent platforms, and
    distro maintainers—until the company becomes the remediation control plane linking
    disclosure, code change, rollout proof, and customer communication across the
    software supply chain.
solution: >-
  The product ingests a CVE, bug bounty report, or upstream fix and maps every affected
  code path across a vendor's supported branches. It proposes branch-specific backports,
  generates repro tests and fuzz harnesses, and runs a deterministic validation matrix
  before opening merge-ready pull requests. It then emits VEX statements, SBOM diffs,
  release notes, and customer advisory drafts tied to the exact patch evidence. Over
  time it becomes the remediation system of record for self-hosted software vendors:
  what was fixed, where it was backported, what proof exists, and which customer
  versions remain exposed.
goToMarketSeed:
  firstCustomer: >-
    A head of product security at a 300- to 1,500-person observability, database, or
    API gateway vendor that ships on-prem or customer-managed Kubernetes editions,
    maintains at least three supported release lines, and handles enterprise customer
    CVE escalations weekly.
  buyingTrigger: >-
    A critical dependency disclosure, a KEV-style escalation, or a strategic customer
    demand for a remediation advisory across every supported branch.
  currentAlternative: >-
    Manual workflow across GitHub cherry-picks, internal build scripts, QA regression
    runs, spreadsheets, and support-authored advisories.
  switchingReason: >-
    The first customer switches because this wedge turns a multi-team, multi-branch fire
    drill into hours of reviewable patch evidence and customer-ready output without
    needing OpenAI trusted-defender access or more product-security headcount.
  pricingHypothesis: >-
    Annual subscription priced by supported product lines and release branches, with
    overage for validated remediation runs and private deployment.
