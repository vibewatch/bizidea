slug: gov-baseline-remediation-os
date: '2026-05-14'
executiveSummary: >-
  Gov Baseline Remediation OS should start as a remediation control plane for
  Benelux shared-service government IT teams that manage 50-150 municipal and
  agency domains on Microsoft 365 plus outsourced web and DNS vendors. The
  immediate pain is not finding issues: SecurityBaseline.eu and related public
  benchmarks already expose red findings nightly, but shared-service teams still
  lack a system that maps those findings to owners, generates provider-specific
  fixes, and assembles evidence before audit or press scrutiny escalates. The
  initial product should focus on three repeatable control families with clear
  operating playbooks: email authentication and transport, exposed admin
  surfaces, and tracker or cookie remediation. The go-to-market should be a paid
  pilot tied to one publicly visible red estate and one budget event, then
  convert to an annual subscription once the customer clears a meaningful share
  of open findings across two reporting cycles. Modeled market sizing from the
  research suggests a $300.0M TAM, $90.0M SAM, and $2.7M year-3 SOM for the
  narrow beachhead, which is enough for a venture-scale wedge if the company can
  prove fast score improvement and repeatable procurement paths. The strategic
  choice is to sell remediation workflow and proof-of-fix, not another scanner,
  because free benchmarks and incumbent EASM tools already cover discovery. The
  biggest disconfirming risk is that buyers may treat free benchmark data,
  ServiceNow or Jira, and MSP labor as sufficient, so the company must prove it
  materially reduces time-to-remediate and pilot-to-production conversion before
  broadening scope. Two material gaps remain assumptions rather than facts: the
  exact share of EU local governments operated through software-worthy
  shared-service estates, and how reliably benchmark operators expose API or
  export access for production integrations.
problem:
  - Public benchmark findings turn weak email, web, DNS, and privacy hygiene into visible audit and political risk for government IT leaders, but the remediation work is still fragmented across internal teams, MSPs, and hosting vendors.
  - Existing audits, EASM products, and ticketing systems identify issues or track tasks, but they do not infer owner accountability, sequence vendor-specific fixes, or package proof that a red public finding has actually been cleared.
  - Shared-service agencies managing dozens of domains lose weeks coordinating one domain at a time, which makes repeated benchmark failures cheaper to tolerate than to operationalize.
solution:
  - Ingest SecurityBaseline-style findings, reconcile them to domain inventory, Microsoft 365 or Exchange configuration, DNS providers, CMS hosts, and contractor ownership, then open owner-mapped remediation workflows.
  - Generate repeatable fix kits for email hardening, exposed admin-surface cleanup, and tracker removal, with provider-aware runbooks rather than generic alerts.
  - Capture proof-of-remediation artifacts such as headers, DNS records, screenshots, and policy evidence so teams can show auditors and leadership that public score changes reflect real fixes.
whyWeWin:
  - The company is positioned downstream of a free public benchmark, so it can sell execution speed and accountability instead of asking governments to buy another monitoring feed.
  - Government-specific owner-resolution logic, remediation templates, and accepted evidence artifacts can compound with every estate and are harder for generic ITSM tools to recreate.
  - The first customer, pricing basis, and channel all align around one urgent workflow: clear publicly visible red findings before the next audit, oversight review, or budget committee cycle.
strategicChoices:
  beachhead: >-
    Benelux shared-service digital agencies and regional IT cooperatives that run
    Microsoft 365 or Exchange plus outsourced CMS or DNS for 50-150 municipal
    and agency domains already visible in SecurityBaseline-style public reports.
  wedgeRationale: >-
    This slice has the clearest combination of visible benchmark pressure,
    explicit email standards, and enough domain sprawl that manual coordination
    breaks down. It creates faster proof than selling all EU public bodies at
    once because the buyer, control stack, and procurement context are more
    homogeneous, and one agency can demonstrate score improvement across many
    subordinate domains.
  sequencingRationale: >-
    Product work should start with benchmark ingestion, owner mapping, and fix
    evidence for three control families before adding broader compliance or new
    geographies, because the first commercial proof is operational remediation
    velocity, not policy breadth. GTM should therefore begin founder-led with a
    small solutions-heavy team, then add channel and policy packaging only after
    pilots show repeatable conversion below public-sector procurement pain
    thresholds.
  notYet:
    - Broad pan-EU sales across countries that require extensive localization before the Benelux playbook is repeatable
    - Full vulnerability management or attack-surface discovery features already covered by EASM incumbents
    - High-complexity internal network, OT, or endpoint remediation outside public web, DNS, and email hygiene
    - Serving private-sector enterprises before government and public-body workflows are proven
market:
  tam: "$300.0M modeled TAM based on 200,000 monitored government domains at about $1,500 ARR per domain-equivalent for remediation workflow coverage."
  sam: "$90.0M modeled SAM based on roughly 50,000 domains in digitally mature, shared-service-heavy geographies at about $1,800 ARR per domain-equivalent."
  som: "$2.7M modeled year-3 SOM based on 25 estates with about 60 domains each at roughly $1,800 ARR per domain-equivalent."
  segments:
    - "Primary segment: Benelux and Nordic shared-service public-sector IT organizations managing multi-domain estates and consolidated mail tenants"
    - "Secondary segment: MSPs and framework contractors responsible for remediation across municipal and agency web, DNS, and email estates"
  buyingProcess: >-
    The operational champion is usually the head of shared infrastructure or a
    security operations lead, while the economic buyer is the government CISO,
    shared-services director, or head of digital infrastructure. The deal should
    start when a public red score or audit cycle forces action, run as a paid
    pilot on one managed estate, and convert when the agency shows measurable
    score improvement and can export auditor-ready proof without extra consulting.
product:
  mvp: >-
    The MVP should ingest benchmark exports, map findings to domains and likely
    owners, and generate remediation workflows for three issue classes: email
    encryption and authentication gaps, exposed admin interfaces, and cookie or
    tracker violations. It must push tasks into Jira or ServiceNow, maintain
    evidence checklists, and show estate-level progress toward clearing public
    red findings.
  sixMonth: >-
    Ship benchmark import, domain and owner mapping, Microsoft 365 plus common
    DNS-provider templates, Jira export, and evidence packs for the first three
    control families, with time to first live remediation workflow under 30
    days.
  twelveMonth: >-
    Add ServiceNow integration, MSP or contractor collaboration views,
    false-positive handling, renewal-ready reporting across two benchmark cycles,
    and packaged onboarding for agencies with 50-150 domains.
  twentyFourMonth: >-
    Expand into Nordic and other digitally mature markets, add adjacent public
    bodies such as schools and hospitals, and broaden the control library into
    additional web, TLS, DNS, and privacy obligations once the core remediation
    wedge converts predictably.
  keyBets:
    - Benchmark operators can provide stable exports or APIs that support operational ingestion rather than one-off manual uploads.
    - Owner resolution across shared-service agencies, MSPs, and vendors can be accurate enough to save coordination time versus generic ticketing.
    - Buyers will pay for proof-of-fix and workflow compression even when the benchmark signal itself is free.
    - Limiting scope to three high-frequency control families will produce faster customer proof than launching as a broad compliance suite.
gtm:
  wedge: >-
    Sell a paid benchmark-to-backlog pilot for one shared-service estate with
    visible red findings, then convert to an annual subscription once the agency
    clears a target share of findings across two benchmark cycles and uses the
    evidence pack in an audit, oversight, or leadership review.
  channels:
    - Direct founder-led sales to Benelux shared-service agencies, regional digital authorities, and government cyber leaders already exposed to public benchmark results
    - Channel resale and co-delivery through government-focused MSPs and framework integrators that already execute web, DNS, and email remediation
    - Demand capture through benchmark ecosystems and public cyber programs that make baseline performance measurable
  funnelTargets: "Target lead→qualified pilot conversion of 15-25%, pilot→annual production conversion of 50%+, and pilot deployment in under 90 days."
  pricing: >-
    Charge an annual subscription priced by managed domain bands and mail-tenant
    complexity, plus a paid onboarding package for asset-owner mapping and fix
    template setup. This matches how buyers experience the problem across an
    estate rather than per user, supports high five-figure initial ACV without a
    full tender in many sub-central contexts, and ties value directly to the
    number of domains the platform can move from red to compliant.
businessModel:
  revenueStreams:
    - Annual platform subscription for remediation workflow across managed domains and mail tenants
    - Paid onboarding for inventory reconciliation, owner mapping, and template configuration
    - Premium reporting and evidence modules for auditors, ministry leadership, and procurement reviews
  unitOfValue: Managed domain-equivalent under active remediation coverage
  targetGrossMarginPct: 75
  expansionLevers:
    - Add more domains, agencies, and contractors inside the first shared-service customer after the initial estate proves score improvement
    - Expand from email, admin-surface, and tracker fixes into broader public-sector baseline control libraries
    - Sell MSP-enabled delivery and executive reporting to customers that need workflow plus outsourced remediation capacity
strategyMap:
  northStarMetric: Publicly benchmarked findings cleared per managed estate within one reporting cycle
  inputMetrics:
    - Paid pilot to annual subscription conversion rate
    - Median days from benchmark finding to assigned owner
    - Median days from assigned owner to proof-of-fix accepted
    - Percentage of red findings cleared within 30 days
    - Net domain expansion within each landed estate
  moatsToBuild:
    - Asset-owner graph linking public findings to internal teams, contractors, and vendors across repeated government estates
    - Library of provider-specific remediation templates for government email, DNS, web, and privacy controls
    - Evidence model for what auditors and oversight bodies accept as proof across different control classes
    - Workflow data on which interventions most reliably move public benchmark scores
  killCriteria:
    - Fewer than 3 paid pilots after 25 qualified conversations with target Benelux agencies and MSP partners
    - Pilot to annual conversion below 50% after the first 6 pilots
    - Median time to assign a credible owner remains above 10 business days in more than half of pilots
    - Customers clear less than 30% of targeted red findings within two benchmark cycles despite active use of the platform
  mermaid: |
    flowchart LR
      Wedge[Public red findings in shared-service estates] --> MVP[Benchmark to backlog remediation control plane]
      MVP --> Proof[Faster owner assignment and proof-of-fix]
      Proof --> Expansion[More estates, more control families, and MSP-led rollout]
investorMemo:
  verdict:
    call: Meet / investigate further
    conviction: High pain and a credible wedge, but conviction stays moderate until the team proves benchmark ingestion, procurement path, and pilot-to-production conversion.
    whyBelieve: The company sells into an urgent, externally triggered workflow where discovery is already free and the missing layer is accountable remediation across fragmented government estates.
    whyDoubt: Incumbent EASM, ITSM, and MSP combinations may remain good enough if owner mapping and proof-of-fix do not produce clearly faster public score improvement.
    nextDiligence: Confirm two design partners will pay for a benchmark-to-backlog pilot and can show measurable reduction in open red findings within one public reporting cycle.
  firstCustomer:
    title: Benelux shared-service government infrastructure team
    profile: A regional or national shared-services agency running 50-150 municipal and agency domains on Microsoft 365 with outsourced web and DNS operations across multiple vendors.
    trigger: A public red benchmark score ahead of an internal audit, oversight review, press inquiry, or budget committee discussion.
    buyer: Government CISO, shared-services director, or head of digital infrastructure
    initialContract: "€20k-€40k paid pilot plus onboarding for one estate, converting to roughly €60k-€120k annual ACV if the agency clears a meaningful share of findings across two benchmark cycles."
  mustBeTrue:
    - At least 5 of the first 10 qualified target agencies must confirm that public benchmark findings trigger executive or audit escalation rather than staying inside a technical backlog.
    - At least 3 early pilots must show the platform can map 80% or more of target findings to a credible owner within 10 business days.
    - More than half of pilot customers must convert to annual subscriptions after two benchmark cycles.
    - In competitive evaluations, target buyers must say generic ITSM plus MSP processes are materially slower or less auditable than the purpose-built workflow.
    - At least one procurement path below full tender or through an existing framework must consistently close in under 6 months for the initial market.
  diligenceQuestions:
    - How reliably can benchmark operators expose data and dispute workflows for a production integration rather than manual CSV use?
    - In the first target accounts, who actually owns remediation authority: the agency, the shared-service center, or the outsourced MSP?
    - What proof artifacts do auditors, regulators, or leadership accept as sufficient to treat a public red finding as remediated?
    - Which procurement route closes first in practice for Benelux agencies: sub-threshold purchase, framework resale, or MSP-led delivery?
    - Where do Microsoft, Outpost24, ServiceNow, or MSP-led manual processes already solve enough of the workflow to block adoption?
operatingAssumptions:
  - assumption: Early target agencies will pay for workflow and proof-of-fix even when the underlying benchmark signal is free.
    basis: research.yaml
    validationTest: Secure 3 paid pilot statements of work from qualified target agencies or MSP-led accounts after showing a benchmark-to-backlog demo.
    decisionImpact: If false, the company must reposition toward services-led delivery, lower initial ACV, or partner more deeply with benchmark operators.
  - assumption: Stable benchmark exports or APIs will be available often enough to support repeatable remediation workflows.
    basis: operator judgment
    validationTest: Complete technical diligence with at least 2 benchmark data sources and successfully ingest 90 days of updates without manual rework in early pilots.
    decisionImpact: If false, the roadmap must shift toward customer-upload workflows or proprietary scanning, which weakens the asset-light wedge.
  - assumption: A narrow Microsoft 365 plus common DNS and CMS template set covers enough of the first market to avoid services-heavy implementation.
    basis: idea.yaml
    validationTest: Track stack coverage across the first 15 qualified opportunities and confirm at least 10 fit the supported environment without custom integrations.
    decisionImpact: If false, hiring must shift earlier toward solutions engineering and onboarding margins will be lower.
  - assumption: Owner-mapped workflows will clear findings materially faster than Jira or ServiceNow alone.
    basis: research.yaml
    validationTest: In the first 5 pilots, demonstrate at least a 30% reduction in median time-to-remediate targeted finding classes versus the customer's baseline process.
    decisionImpact: If false, differentiation collapses and the product becomes a thin layer on top of incumbent ITSM.
  - assumption: Shared-service agencies provide a repeatable reference path into adjacent public bodies such as schools, hospitals, and utilities.
    basis: idea.yaml
    validationTest: Win 2 multi-entity expansions or formal referrals from initial customers into adjacent public bodies within 18 months.
    decisionImpact: If false, the company should stay narrow in government estates longer and reduce expansion assumptions in hiring and fundraising.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Build a benchmark-to-backlog prototype for one sample estate using exported public findings and mock owner mapping.
    hypothesis: Buyers will react most strongly to owner resolution and proof-of-fix workflows, not another dashboard of findings.
    successMetric: At least 8 of 12 design-partner interviews rank owner mapping or evidence packs as the primary reason to buy.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Run procurement discovery with Benelux agencies and MSPs on pilot packaging below tender thresholds and through frameworks.
    hypothesis: A paid pilot can be sold in under 6 months without waiting for a full EU-wide tender.
    successMetric: Identify 2 viable procurement paths and obtain 1 draft pilot scope with a named budget owner.
    owner: Founder CEO
  - horizon: 0-90 days
    experiment: Integrate Microsoft 365, one DNS provider, and Jira for the first control-family workflows.
    hypothesis: The narrow integration set covers most of the first wave of target estates.
    successMetric: 3 design partners can map at least 70% of sample findings without custom engineering.
    owner: Founding engineer
  - horizon: 3-6 months
    experiment: Launch 2 paid pilots focused on email authentication and transport remediation plus exposed admin-surface cleanup.
    hypothesis: Three high-frequency control families are enough to produce visible score movement and justify renewal.
    successMetric: Each pilot clears at least 25% of targeted red findings within the first benchmark cycle.
    owner: Founder CEO
  - horizon: 6-12 months
    experiment: Add ServiceNow export, contractor collaboration, and evidence-pack templates for audit review.
    hypothesis: Production conversion depends as much on proof artifacts and external collaboration as on internal ticket routing.
    successMetric: Pilot-to-production conversion exceeds 50% and at least 2 customers use exported evidence in a formal review.
    owner: Solutions engineer
  - horizon: 12-18 months
    experiment: Sign one MSSP or framework-integrator channel partner to resell and co-deliver the workflow.
    hypothesis: Channel-led delivery can shorten expansion into agencies that lack direct remediation capacity.
    successMetric: 1 partner-sourced pilot and 1 partner-assisted production deployment within 6 months of signing.
    owner: GTM lead
operations:
  - Maintain a canonical asset-owner graph that reconciles benchmark findings with CMDB, Microsoft 365, DNS, CMS, and contractor records.
  - Operate a remediation template release process so provider-specific playbooks and evidence checklists stay current with public-sector standards.
  - Run a customer success cadence tied to each benchmark refresh, including owner-escalation review and proof-of-fix verification.
  - Build integration partnerships with Microsoft, Jira, ServiceNow, and government-focused MSPs rather than performing remediation inside the product.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own founder-led sales, procurement navigation, and design-partner discovery because the first deals depend on trust and domain-specific narrative, not a scaled sales motion.
  - role: Founding engineer
    startTiming: Month 0
    rationale: Build benchmark ingestion, owner graph, and the first M365, DNS, and Jira integrations fast enough to support paid pilots.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Reduce services drag by owning onboarding, evidence-pack configuration, and customer-specific workflow mapping during the first production deployments.
  - role: Policy and compliance product manager
    startTiming: Month 8
    rationale: Translate cross-country public-sector standards and audit expectations into reusable templates once the Benelux wedge is working.
  - role: GTM lead
    startTiming: Month 12
    rationale: Add channel development and repeatable pipeline management only after pilot packaging and conversion metrics are established.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 3 paid pilots with Benelux shared-service agencies or MSP-led public-sector estates
      - Launch Microsoft 365, DNS, Jira, and ServiceNow-adjacent workflows for the first three control families
      - Convert at least 2 pilots to annual contracts after two benchmark cycles
      - Establish one repeatable procurement path under threshold or through a framework partner
  - horizon: 12-24 months
    items:
      - Reach 8-12 production customers with at least one multi-entity shared-service reference account
      - Expand the template library into additional TLS, DNS, and privacy controls beyond the initial wedge
      - Sign 2 channel partners covering MSP-led remediation and framework-based public-sector delivery
      - Enter one Nordic market with localized procurement and evidence templates
  - horizon: 24-36 months
    items:
      - Reach 25 production estates and approximately $2.7M ARR in the modeled year-3 SOM scenario
      - Expand from core government estates into schools, hospitals, or utilities using the same owner-mapped remediation workflow
      - Demonstrate durable retention through multi-department expansion and recurring benchmark-cycle usage
      - Build a data asset of owner-resolution and proof-of-fix patterns that improves onboarding and remediation speed for new customers
risks:
  - risk: Buyers treat free benchmark data plus MSP labor and generic ITSM as good enough.
    likelihood: High
    impact: High
    mitigation: Prove time-to-owner and time-to-remediate gains in paid pilots, and package evidence packs that generic tools do not produce without custom work.
  - risk: Government procurement cycles slow direct SaaS adoption.
    likelihood: High
    impact: High
    mitigation: Start with sub-threshold pilots, framework routes, and channel partners that already sell into the target agencies.
  - risk: Fragmented ownership across agencies, contractors, and hosting vendors prevents fast remediation even when findings are clear.
    likelihood: High
    impact: Medium
    mitigation: Start with estates where ownership is partly known, invest early in escalation logic and contractor collaboration, and make unresolved ownership visible to leadership.
  - risk: Benchmark data access or false-positive handling is too unstable for automated workflows.
    likelihood: Medium
    impact: High
    mitigation: Support manual import as a fallback, diversify data inputs, and validate benchmark partnerships before overbuilding automation.
  - risk: Incumbents such as Microsoft or Outpost24 extend further into remediation workflow inside existing contracts.
    likelihood: Medium
    impact: Medium
    mitigation: Stay focused on public-sector proof-of-fix, cross-owner coordination, and audit workflows that are unlikely to be the first priority for horizontal vendors.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months of runway to build the benchmark-ingestion and owner-mapping
    core, ship the first Microsoft 365, DNS, Jira, and ServiceNow workflows,
    hire one solutions-heavy onboarding function, and close enough paid pilots
    and production conversions to prove a repeatable public-sector procurement
    and remediation motion.
