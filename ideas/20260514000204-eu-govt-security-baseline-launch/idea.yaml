topRisks:
  - name: Procurement drag
    description: Government buyers may take too long to run a full procurement process for a new remediation platform.
    mitigation: Land first through shared-service agencies and MSP partners with acute public benchmark pressure, then expand via existing procurement frameworks.
  - name: Free benchmark substitution
    description: Buyers may assume the public benchmark itself is sufficient and resist paying for an adjacent product.
    mitigation: Focus messaging and product design on remediation workflow, owner mapping, and proof-of-fix rather than detection or scanning.
  - name: Fragmented system ownership
    description: Fixes may stall because domains, mail, DNS, and cookie tooling sit with different vendors and internal teams.
    mitigation: Build the product around cross-owner escalation, reusable vendor-specific playbooks, and evidence collection that makes accountability explicit.
