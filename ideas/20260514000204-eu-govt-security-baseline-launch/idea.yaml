jobsToBeDone:
  - job: When a public benchmark flags our estate red, help our shared-service IT team assign fixes across internal and outsourced owners so we can clear the issues before the next audit cycle.
    currentAlternative: Manual spreadsheets, email chains, and generic ITSM tickets
    successMetric: Percentage of red findings remediated within 30 days across the managed estate
  - job: When leadership asks why public scores are still poor, help our infrastructure lead produce proof-of-fix evidence and risk status quickly so budget and reputation damage do not spiral.
    currentAlternative: External audit reports and ad hoc screenshot collection
    successMetric: Time to produce an auditor-ready remediation packet for all open findings
