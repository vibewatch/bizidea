problem: >-
  EU ministries, regions, and municipalities inherit sprawling estates of citizen websites, shared email systems, and outsourced hosting that few teams fully own end to end. When a public benchmark reveals red status on encryption, exposed admin interfaces, and cookie violations, the issue becomes an audit and political risk, not just a technical backlog item. Existing audits and ticketing systems identify problems, but they do not give understaffed government IT teams a repeatable way to fix the same classes of issues across dozens or hundreds of domains.
targetUser:
  primary: Heads of shared digital infrastructure at EU public-sector IT organizations managing 20-200 government domains plus consolidated mail tenants
  secondary: Managed service providers and framework contractors responsible for web, DNS, and email remediation across municipal estates
  buyer: Government CISO, director of shared services, or head of digital infrastructure
startupThesis:
  nonObviousInsight: >-
    Public monitoring is no longer the scarce asset; SecurityBaseline.eu is already making the failures visible for free. The missing system is a remediation control plane that maps each public finding to the right owner, generates vendor-specific fixes, and produces proof-of-remediation that flips the public score before the next audit cycle.
  beachhead: >-
    EU shared-service IT agencies running Microsoft 365 or Exchange plus outsourced CMS hosting for 20-200 municipal and agency domains that can now be publicly benchmarked on email, web, and cookie hygiene
  wedge: >-
    Baseline-to-backlog workflow that turns public red findings into owner-mapped remediation tickets, DNS and mail configuration runbooks, cookie cleanup tasks, and proof-of-fix evidence packs
  whyNowCatalyst: >-
    The launch of a nightly-updated public benchmark across 32 countries turns hidden hygiene gaps into visible compliance failures that create immediate pressure to remediate, not just assess.
  ventureScalePath: >-
    Start with outside-in remediation for government web and email estates, then expand the same control plane to schools, hospitals, utilities, and other regulated public bodies that face the same fragmented ownership and audit burden.
solution: >-
  Gov Baseline Remediation OS ingests public findings from services like SecurityBaseline.eu and reconciles them with domain inventories, mail tenants, DNS providers, CMS hosts, and outsourced vendors. It clusters repeat issues across estates, assigns the likely system owner, and generates vendor-specific change plans for email encryption hardening, exposed admin-surface removal, and cookie cleanup. The product tracks proof-of-fix with screenshots, headers, DNS records, and policy artifacts so public-sector teams can show progress to auditors and leadership without commissioning a fresh external review. Over time it becomes the workflow layer where governments manage recurring cyber hygiene obligations across hundreds of digital assets.
goToMarketSeed:
  firstCustomer: A Benelux or Nordic shared-services agency responsible for 50-150 municipal websites and a consolidated Microsoft 365 tenant
  buyingTrigger: Public red status on SecurityBaseline.eu or a related national audit ahead of an internal review, press inquiry, or budget committee cycle
  currentAlternative: Annual security audits plus spreadsheet tracking, ServiceNow or Jira tickets, and MSP-led fixes executed one domain at a time
  switchingReason: >-
    The wedge compresses weeks of coordination by packaging public findings into owner-mapped tasks, reusable fix kits, and evidence packs that improve many domains at once instead of paying for another scan.
  pricingHypothesis: Annual platform fee priced by number of managed domains and mail tenants, with a paid onboarding package for asset mapping and remediation template setup
