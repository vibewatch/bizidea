competitors:
  - name: Microsoft Defender EASM
    stage: incumbent
    wedge: >-
      在更广泛的 Microsoft 安全栈内持续进行互联网可见资产发现和优先级排序。
    pricing: Bundled / enterprise quote
    strength: 强大的 M365 邻接性和针对云密集型政府资产群的动态资产清单。
    weaknessVsUs: >-
      资产清单分类仍让买方自行解析责任方、排序修复步骤，并跨外包域名产出公开证明文件。
    sourceRefs:
      - 11
      - 12
  - name: Outpost24 EASM
    stage: scale-up
    wedge: 具备评分、告警工作流和 SIEM/CMDB 集成的欧洲 EASM 方案。
    pricing: Custom quote
    strength: 欧洲本土供应商，拥有基准评测、集成和可见的整改工作流接口。
    weaknessVsUs: >-
      仍面向安全运营工作流，而非公共部门责任方映射和审计就绪证明包。
    sourceRefs:
      - 13
  - name: Qualys VMDR
    stage: incumbent
    wedge: 基于风险的漏洞管理，含责任方路由和补丁/整改工作流。
    pricing: Custom quote / platform subscription
    strength: 在大型企业资产群中已建立的责任方路由和整改语言。
    weaknessVsUs: >-
      最适合内部管理的资产；将由外到内的政府基准发现转化为多方公开整改项目时适配性差。
    sourceRefs:
      - 14
  - name: runZero
    stage: scale-up
    wedge: 面向复杂 IT、OT 和 SaaS 环境的混合资产清单与集成中枢。
    pricing: Custom quote
    strength: >-
      与 Microsoft、Jira、ServiceNow、Qualys、Rapid7 和 Tenable 深度集成，在复杂资产群中有用。
    weaknessVsUs: >-
      资产可见性和同步能力强，但 runZero 未定位为公共部门基准到证明的整改层。
    sourceRefs:
      - 15
  - name: SecurityScorecard
    stage: scale-up
    wedge: >-
      面向关键基础设施和第三方的政府态势可见性、评级和风险监督。
    pricing: Custom quote / public-sector program
    strength: 清晰的政府定位和持续的外部风险监控。
    weaknessVsUs: >-
      优化于监督和评分可见性，而非修复编排、域名责任方解析或整改证明收集。
    sourceRefs:
      - 16
      - 25
regulatoryTechnicalConstraints:
  - point: >-
      政府邮件项目越来越要求 TLS、DMARC、SPF、DKIM 和 MTA-STS 类控制，因此整改输出必须在技术上精确且感知供应商差异。
    sourceRefs:
      - 7
      - 8
      - 27
      - 28
  - point: >-
      NIS2 实施工作越来越需要证明和控制映射，这意味着产品必须捕获证明而不仅仅是状态变更。
    sourceRefs:
      - 5
      - 6
  - point: >-
      超过 €216,000 的次级主体合同触发欧盟范围的公告要求，因此打包和落地扩张策略至关重要。
    sourceRefs:
      - 10
  - point: >-
      Cookie 和追踪器清理与隐私执法交叉，因此网站整改必须考虑同意和分析设计，而非纯安全扫描。
    sourceRefs:
      - 18
validationSignals:
  - point: >-
      SecurityBaseline.eu 已覆盖 32 个国家、6.7 万个地方政府的 20 万个政府域名，证明信号层已在洲级规模存在。
    sourceRefs:
      - 1
  - point: >-
      荷兰前身项目已监控 8 万个机构并获得荷兰监管机构的直接支持，降低了"这是否真实"的市场风险。
    sourceRefs:
      - 2
      - 21
      - 22
  - point: >-
      政府已将基线控制与采购和认证结果挂钩，说明卫生改进有预算权威。
    sourceRefs:
      - 10
      - 20
  - point: >-
      NCSC 正在停用免费的 Mail Check，并明确建议机构采用商业 EASM 产品，验证了免费政府检查成熟后付费产品的需求。
    sourceRefs:
      - 31
openQuestions:
  - >-
    6.7 万个地方政府中，实际通过足够大规模的共享服务数字资产群运营、可支撑软件合同而非一次性咨询的比例是多少？
  - >-
    基准运营方能否暴露可靠的 API、归属元数据和误报处理工作流，还是初创公司需要自建接入和争议层？
  - >-
    荷兰、比利时、丹麦和瑞典现有哪些采购框架在公共部门采购规则下提供最快的首批付费试点路径？
  - >-
    目标账户中，整改权力通常有多少在内部团队，有多少在 MSP 和框架承包商手中？
