scenarios:
  downside:
    description: "Procurement stretches to 9 months, ACV lands closer to $96K, and gross margin slips as onboarding stays services-heavy."
    y3RevenueK: 1494.0
    y3EbitdaK: -302.0
    cashLowPointK: 642.0
    keyAssumptionChanges:
      - "Sales cycle moves from 6 months to 9 months."
      - "Steady-state ACV falls from $108K to $96K."
      - "Gross margin falls from 75% to 68%."
  base:
    description: "Three pilots in Y1 convert into a measured land-and-expand motion that reaches 25 paying estates and a $2.7M exit ARR by Q4Y3."
    y3RevenueK: 1958.0
    y3EbitdaK: 68.5
    cashLowPointK: 1067.25
    keyAssumptionChanges:
      - "Production ACV stays at $108K per estate."
      - "Sales cycle holds near 6 months through direct and framework routes."
      - "Gross margin stays at the 75% target from the business plan."
  upside:
    description: "Framework and MSP channels shorten procurement, raise ACV to $120K, and pull forward multi-entity expansion inside shared-service accounts."
    y3RevenueK: 2410.0
    y3EbitdaK: 332.0
    cashLowPointK: 1128.0
    keyAssumptionChanges:
      - "Sales cycle compresses from 6 months to 4 months."
      - "Steady-state ACV rises from $108K to $120K."
      - "Gross margin improves from 75% to 78%."
sensitivity:
  - variable: ARPU
    downsideCase: "$96K ACV from smaller estates and more pilot discounting"
    baseCase: "$108K ACV from 60 domains at $1.8K each"
    upsideCase: "$120K ACV with premium reporting and broader estate coverage"
    y3RevenueImpactK: -326.0
    cashImpactK: -245.0
  - variable: CAC
    downsideCase: "$75K as founder-led public-sector pipeline stays direct longer"
    baseCase: "$60K fully loaded CAC"
    upsideCase: "$50K with framework and MSP leverage"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "2.5% monthly churn if proof-of-fix value is weaker than expected"
    baseCase: "1.5% monthly churn"
    upsideCase: "1.0% monthly churn with strong multi-entity retention"
    y3RevenueImpactK: -140.0
    cashImpactK: -120.0
  - variable: sales cycle
    downsideCase: "9 months because pilots require full tender or heavier legal review"
    baseCase: "6 months via sub-threshold or framework procurement"
    upsideCase: "4 months with one reusable procurement path"
    y3RevenueImpactK: -295.0
    cashImpactK: -210.0
  - variable: gross margin
    downsideCase: "68% as onboarding stays custom and data integration costs rise"
    baseCase: "75% target gross margin"
    upsideCase: "78% with repeatable templates and lighter services work"
    y3RevenueImpactK: 0.0
    cashImpactK: -137.0
  - variable: hiring pace
    downsideCase: "Add GTM and solutions hires one quarter before revenue proves out"
    baseCase: "Follow the BP sequence and add hires only after pilot proof points"
    upsideCase: "Delay one commercial hire until channel-sourced pipeline is visible"
    y3RevenueImpactK: 0.0
    cashImpactK: -160.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      BenchmarkLeads[Public benchmark pressure] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionCustomers[Production estates]
      ProductionCustomers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit at 75%]
      GrossProfit --> Opex[Payroll plus operating spend]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by reaching 25 paying estates by Q4Y3 at a $108K steady-state ACV after a 3-month paid pilot."
  - checkName: Must go right
    finding: "Pilot-to-production conversion and a sub-6-month procurement path must both hold, because the sales-cycle sensitivity is the largest revenue drag."
  - checkName: Model breaks if
    finding: "The model breaks fastest if procurement stretches toward 9 months while margin falls toward 68%, because downside cash then drops toward roughly $0.6M."
  - checkName: Next-round proof
    finding: "The next financing is justified if the company exits Y2 with about 10 paying estates, a repeatable framework or MSP route, and clear evidence that pilots convert above 50%."
sanityChecks:
  ruleOf40: "Y3 growth 155.6% plus EBITDA margin 3.5% = 159.1%."
  burnMultiple: "Y1 burn multiple is about 2.0x on 3 converted or in-flight estates; Y2 improves to about 0.7x as exit ARR rises from $324K to $1.08M."
  revenuePerFte: "$178K Y3 using Q4Y3 revenue run rate against 11 year-end FTE, slightly below the $200K-$400K SaaS benchmark."
  flags:
    - "Revenue per FTE is still light for a software business, so Y4 productivity must improve through channel leverage rather than proportional hiring."
    - "Customer counts assume no material logo churn in the base operating schedule even though unit economics use a 1.5% monthly churn heuristic."
    - "The model depends on stable benchmark exports or APIs and a repeatable under-threshold procurement route, both of which the BP marks as still needing proof."
