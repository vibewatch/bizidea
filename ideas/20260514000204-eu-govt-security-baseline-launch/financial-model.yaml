assumptions:
  - id: A1
    name: Model start month
    value: '2026-06'
    unit: month
    source: "Starts the first full month after the 2026-05-14 business-plan date."
  - id: A2
    name: Production contract size
    value: '$108.0K ARR per estate'
    unit: usdK_per_year
    source: "[BP market.som] 25 estates × 60 domains × $1.8K ARR per domain-equivalent = $2.7M Y3 SOM."
  - id: A3
    name: Paid pilot package
    value: '$30.0K over 3 months'
    unit: usdK_per_pilot
    source: "[BP investorMemo.firstCustomer.initialContract] €20k-€40k paid pilot plus onboarding; modeled at the midpoint in USD."
  - id: A4
    name: Revenue recognition per customer
    value: '$10.0K per month during first 3 pilot months, then $9.0K per month production run rate'
    unit: usdK_per_customer_month
    source: "Derived from A2 and A3 so monthly revenue reconciles to the customer ramp."
  - id: A5
    name: Customer ramp
    value: '3 paying estates by M12, 10 by Q4Y2, and 25 by Q4Y3'
    unit: paying_estates
    source: "[BP milestones] 3 paid pilots in year 1, 8-12 production customers in months 12-24, and 25 production estates / $2.7M ARR in months 24-36."
  - id: A6
    name: Gross margin
    value: '75%'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 75% target gross margin."
  - id: A7
    name: Loaded salary bands
    value: 'Founder CEO $90K; engineering $160K; solutions $125K; policy/compliance PM $135K; GTM $145K; ops $100K'
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for senior Benelux govtech hires, anchored to the BP team plan and solutions-heavy delivery motion."
  - id: A8
    name: Headcount ramp snapshots
    value: 'Founder 1/1/1/1/1/1; engineering 1/1/2/2/3/3; solutions 0/1/1/1/2/2; policy 0/0/1/1/1/1; GTM 0/0/0/1/2/3; ops 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3'
    unit: fte
    source: "[BP team] Starts with founder + founding engineer, adds solutions in month 4, policy in month 8, GTM in month 12, then scales cautiously."
  - id: A9
    name: Non-payroll operating spend
    value: 'Y1 non-payroll opex runs about $25K-$31K per month; Y2-Y3 non-payroll opex runs about $37K-$75K per quarter'
    unit: usdK
    source: "Startup-finance heuristic for cloud/data costs above COGS, travel, public-sector procurement support, legal, and software tools."
  - id: A10
    name: Starting cash after pre-seed close
    value: '$2.30M'
    unit: usdM
    source: "[BP fundingAsk] Modeled at the low-middle of the stated $2M-$4M pre-seed target range."
  - id: A11
    name: CAC
    value: '$60.0K per production customer'
    unit: usdK_per_customer
    source: "[BP gtm.funnelTargets] Heuristic anchored to 15-25% lead-to-qualified-pilot conversion, 50%+ pilot-to-production conversion, and public-sector founder-led sales."
  - id: A12
    name: Monthly churn
    value: '1.5%'
    unit: percent
    source: "Conservative startup-finance heuristic for sticky annual public-sector workflow software before multi-year retention is proven."
  - id: A13
    name: Sales cycle
    value: '6 months base case'
    unit: months
    source: "[BP investorMemo.mustBeTrue] At least one procurement path must close in under 6 months for the initial market."
  - id: A14
    name: Quarterly payroll smoothing
    value: 'Y2 and Y3 salary expense ramps smoothly from the last Y1 snapshot to the year-end snapshots instead of stepping only at Q4'
    unit: method
    source: "[financial-modeler.agent.md] Use the most recent snapshot or a smooth ramp for quarterly salary lines."
  - id: A15
    name: Scenario downside deltas
    value: '$96K ACV, 68% gross margin, and 9-month sales cycle'
    unit: scenario_inputs
    source: "Conservative downside built from the BP procurement and incumbent-risk sections."
  - id: A16
    name: Scenario upside deltas
    value: '$120K ACV, 78% gross margin, and 4-month sales cycle'
    unit: scenario_inputs
    source: "Upside assumes framework traction and stronger multi-entity expansion than the base plan."
