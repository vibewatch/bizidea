problem: >-
  欧盟各部委、大区和市政当局管理着庞杂的公民网站、共享邮件系统和外包托管资产，很少有团队能端到端地掌控全局。当公开基准评测把加密问题、暴露的管理界面和 Cookie 违规标红，这就不再是技术积压事项，而是审计和政治风险。现有审计工具和工单系统能发现问题，却无法给人手不足的政府 IT 团队提供一套可重复的方法，在数十乃至数百个域名上批量修复同类问题。
targetUser:
  primary: 欧盟公共部门 IT 机构中负责共享数字基础设施的主管，管理 20 至 200 个政府域名及合并邮件租户
  secondary: 负责跨市政资产进行 Web、DNS 和电子邮件整改的托管服务商（MSP）及框架承包商
  buyer: 政府首席信息安全官（CISO）、共享服务主任或数字基础设施负责人
startupThesis:
  nonObviousInsight: >-
    公开监控已不再是稀缺资产——SecurityBaseline.eu 已在免费披露问题。缺失的是一套整改控制平台：把每条公开发现映射到正确的责任方，生成针对特定供应商的修复方案，并产出修复凭证，让公开评分在下一个审计周期前翻绿。
  beachhead: >-
    使用 Microsoft 365 或 Exchange 并外包 CMS 托管、管理 20 至 200 个市政及机构域名的欧盟共享服务 IT 机构——这些域名现在已可在电子邮件、Web 和 Cookie 卫生方面被公开基准评测。
  wedge: >-
    基准到工单流程——把公开的红色问题转化为责任方映射的整改工单、DNS 和邮件配置运行手册、Cookie 清理任务，以及修复凭证包。
  whyNowCatalyst: >-
    覆盖 32 个国家的每夜更新公开基准正式上线，把隐蔽的卫生缺口变成了可见的合规失败，倒逼各方立刻整改而非仅做评估。
  ventureScalePath: >-
    先从政府 Web 和邮件资产的由外到内整改切入，再把同一控制平台扩展至学校、医院、公用事业等面临同样碎片化归属与审计负担的受监管公共机构。
solution: >-
  Gov Baseline Remediation OS 从 SecurityBaseline.eu 等服务接入公开发现，与域名清单、邮件租户、DNS 提供商、CMS 主机及外包供应商核对匹配。平台将跨资产群的重复问题聚类，推断可能的系统责任方，生成针对特定供应商的变更方案——涵盖邮件加密加固、暴露管理面清理和 Cookie 整改。产品通过截图、请求头、DNS 记录和政策文件追踪修复凭证，让公共部门团队无需委托新的外部审计，就能向审计方和领导层呈现进度。随着时间积累，它将成为政府跨数百项数字资产管理周期性网络卫生义务的工作流层。
goToMarketSeed:
  firstCustomer: 负责 50 至 150 个市政网站及合并 Microsoft 365 租户的比荷卢或北欧共享服务机构
  buyingTrigger: SecurityBaseline.eu 或相关国家审计将其公开标红，恰在内部审核、媒体问询或预算委员会周期之前
  currentAlternative: 年度安全审计加电子表格跟踪、ServiceNow 或 Jira 工单，以及 MSP 逐域名执行的修复
  switchingReason: >-
    切入点把公开发现打包成责任方映射的任务、可复用的修复套件和证明包，一次推进多个域名，不用再花钱买另一次扫描。
  pricingHypothesis: 按托管域名和邮件租户数量分级的年度平台费，附带资产映射和整改模板配置的付费上线包
whyNow:
