topRisks:
  - name: 采购拖延
    description: 政府买方可能需要很长时间才能完成新整改平台的完整采购流程。
    mitigation: 先通过承受公开基准压力的共享服务机构和 MSP 合作伙伴落地，再借助现有采购框架扩展。
  - name: 免费基准替代
    description: 买方可能认为公开基准本身已足够，不愿为相邻产品付费。
    mitigation: 将产品信息和设计聚焦于整改工作流、责任方映射和修复凭证，而非检测或扫描。
  - name: 系统归属碎片化
    description: 由于域名、邮件、DNS 和 Cookie 工具分属不同供应商和内部团队，修复工作可能陷入停滞。
    mitigation: 围绕跨责任方上报、可复用的供应商专用运行手册和证明收集来设计产品，让追责明确可见。
