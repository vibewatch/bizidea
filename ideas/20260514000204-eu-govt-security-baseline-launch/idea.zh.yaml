jobsToBeDone:
  - job: 当公开基准将我们的资产群标红时，帮助共享服务 IT 团队将修复工作分配给内部和外包责任方，确保在下一个审计周期前清除问题。
    currentAlternative: 手动电子表格、邮件往来和通用 ITSM 工单
    successMetric: 在托管资产群内 30 天内完成整改的红色问题百分比
  - job: 当领导层追问为何公开评分仍然糟糕时，帮助基础设施负责人快速产出修复凭证和风险状态，避免预算和声誉损失持续扩大。
    currentAlternative: 外部审计报告和临时截图收集
    successMetric: 为所有未解决发现生成审计就绪整改包所需的时间
