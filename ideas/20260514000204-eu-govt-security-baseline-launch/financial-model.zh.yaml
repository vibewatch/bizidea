slug: gov-baseline-remediation-os
date: '2026-05-14'
currency: USD
modelStartMonth: '2026-06'
assumptions:
  - id: A1
    name: 模型起始月
    value: '2026-06'
    unit: month
    source: "从 2026-05-14 商业计划日期后的第一个完整月开始。"
  - id: A2
    name: 量产合同规模
    value: '$108.0K ARR per estate'
    unit: usdK_per_year
    source: "[BP market.som] 25 个资产群 × 60 个域名 × $1.8K ARR 每域名当量 = 第 3 年 SOM $2.7M。"
  - id: A3
    name: 付费试点包
    value: '$30.0K over 3 months'
    unit: usdK_per_pilot
    source: "[BP investorMemo.firstCustomer.initialContract] €20k–€40k 付费试点加上线费；以中间值换算为美元建模。"
  - id: A4
    name: 每客户收入确认
    value: '$10.0K per month during first 3 pilot months, then $9.0K per month production run rate'
    unit: usdK_per_customer_month
    source: "从 A2 和 A3 推导，使月度收入与客户爬坡保持一致。"
  - id: A5
    name: 客户爬坡
    value: '3 paying estates by M12, 10 by Q4Y2, and 25 by Q4Y3'
    unit: paying_estates
    source: "[BP milestones] 第 1 年 3 个付费试点，第 12–24 个月 8–12 个量产客户，第 24–36 个月 25 个量产资产群 / $2.7M ARR。"
  - id: A6
    name: 毛利率
    value: '75%'
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] 75% 目标毛利率。"
  - id: A7
    name: 含附加费用的薪资标准
    value: 'Founder CEO $90K; engineering $160K; solutions $125K; policy/compliance PM $135K; GTM $145K; ops $100K'
    unit: usdK_per_fte_year
    source: "比荷卢政务科技高级雇员的创业财务启发式估算，参照商业计划团队方案和解决方案密集型交付模式。"
  - id: A8
    name: 人员爬坡快照
    value: 'Founder 1/1/1/1/1/1; engineering 1/1/2/2/3/3; solutions 0/1/1/1/2/2; policy 0/0/1/1/1/1; GTM 0/0/0/1/2/3; ops 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3'
    unit: fte
    source: "[BP team] 从创始人加创始工程师起步，第 4 个月加入解决方案工程师，第 8 个月加入政策经理，第 12 个月加入 GTM，之后谨慎扩张。"
  - id: A9
    name: 非薪资运营支出
    value: 'Y1 non-payroll opex runs about $25K-$31K per month; Y2-Y3 non-payroll opex runs about $37K-$75K per quarter'
    unit: usdK
    source: "针对成本超过销售成本的云/数据费用、差旅、公共部门采购支持、法务和软件工具的创业财务启发式估算。"
  - id: A10
    name: Pre-seed 完成后起始现金
    value: '$2.30M'
    unit: usdM
    source: "[BP fundingAsk] 按声明的 $2M–$4M pre-seed 目标区间的低中间值建模。"
  - id: A11
    name: CAC
    value: '$60.0K per production customer'
    unit: usdK_per_customer
    source: "[BP gtm.funnelTargets] 启发式估算，参照 15–25% 线索到合格试点转化率、50% 以上试点到量产转化率，以及公共部门创始人主导销售。"
  - id: A12
    name: 月度流失率
    value: '1.5%'
    unit: percent
    source: "在多年留存得到验证之前，针对黏性年度公共部门工作流软件的保守创业财务启发式估算。"
  - id: A13
    name: 销售周期
    value: '6 months base case'
    unit: months
    source: "[BP investorMemo.mustBeTrue] 初始市场至少一条采购路径须在 6 个月内签约。"
  - id: A14
    name: 季度薪资平滑
    value: 'Y2 and Y3 salary expense ramps smoothly from the last Y1 snapshot to the year-end snapshots instead of stepping only at Q4'
    unit: method
    source: "[financial-modeler.agent.md] 对季度薪资行使用最近快照或平滑爬坡。"
  - id: A15
    name: 情景下行偏差
    value: '$96K ACV, 68% gross margin, and 9-month sales cycle'
    unit: scenario_inputs
    source: "从商业计划采购风险和在位竞争风险部分构建的保守下行情景。"
  - id: A16
    name: 情景上行偏差
    value: '$120K ACV, 78% gross margin, and 4-month sales cycle'
    unit: scenario_inputs
    source: "上行假设框架牵引力增强，共享服务账户内的多实体扩展优于基础计划。"
