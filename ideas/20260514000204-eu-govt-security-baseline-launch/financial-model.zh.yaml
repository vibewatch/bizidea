scenarios:
  downside:
    description: "采购周期延长至 9 个月，ACV 落在约 $96K，毛利率因上线仍以服务为主而下滑。"
    y3RevenueK: 1494.0
    y3EbitdaK: -302.0
    cashLowPointK: 642.0
    keyAssumptionChanges:
      - "销售周期从 6 个月延长至 9 个月。"
      - "稳态 ACV 从 $108K 降至 $96K。"
      - "毛利率从 75% 降至 68%。"
  base:
    description: "第 1 年三个试点转化为稳健的落地扩张路径，到第 3 年第 4 季度实现 25 个付费资产群和 $2.7M 退出 ARR。"
    y3RevenueK: 1958.0
    y3EbitdaK: 68.5
    cashLowPointK: 1067.25
    keyAssumptionChanges:
      - "量产 ACV 维持每资产群 $108K。"
      - "销售周期通过直销和框架路径保持在约 6 个月。"
      - "毛利率维持在商业计划的 75% 目标。"
  upside:
    description: "框架和 MSP 渠道缩短采购周期，ACV 提升至 $120K，共享服务账户内的多实体扩展提前兑现。"
    y3RevenueK: 2410.0
    y3EbitdaK: 332.0
    cashLowPointK: 1128.0
    keyAssumptionChanges:
      - "销售周期从 6 个月压缩至 4 个月。"
      - "稳态 ACV 从 $108K 提升至 $120K。"
      - "毛利率从 75% 改善至 78%。"
sensitivity:
  - variable: ARPU
    downsideCase: "较小资产群和更多试点折扣导致 ACV $96K"
    baseCase: "60 个域名每个 $1.8K，ACV $108K"
    upsideCase: "含高级报告和更大资产群覆盖，ACV $120K"
    y3RevenueImpactK: -326.0
    cashImpactK: -245.0
  - variable: CAC
    downsideCase: "创始人主导的公共部门管道持续直销，CAC $75K"
    baseCase: "全含 CAC $60K"
    upsideCase: "借助框架和 MSP 杠杆，CAC $50K"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: "修复凭证价值弱于预期时月度流失率 2.5%"
    baseCase: "月度流失率 1.5%"
    upsideCase: "多实体强留存下月度流失率 1.0%"
    y3RevenueImpactK: -140.0
    cashImpactK: -120.0
  - variable: sales cycle
    downsideCase: "试点需要完整招标或更繁重法律审查，9 个月"
    baseCase: "通过次门槛或框架采购，6 个月"
    upsideCase: "一条可复用采购路径，4 个月"
    y3RevenueImpactK: -295.0
    cashImpactK: -210.0
  - variable: gross margin
    downsideCase: "上线仍需定制化且数据集成成本上升，68%"
    baseCase: "75% 目标毛利率"
    upsideCase: "模板可复用、服务工作量减轻，78%"
    y3RevenueImpactK: 0.0
    cashImpactK: -137.0
  - variable: hiring pace
    downsideCase: "在收入得到验证之前提前一个季度加入 GTM 和解决方案岗位"
    baseCase: "按商业计划顺序，仅在试点验证点后加人"
    upsideCase: "延迟一个商务岗位直到渠道来源的管道可见"
    y3RevenueImpactK: 0.0
    cashImpactK: -160.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      BenchmarkLeads[Public benchmark pressure] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionCustomers[Production estates]
      ProductionCustomers --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit at 75%]
      GrossProfit --> Opex[Payroll plus operating spend]
      Opex --> Cash[Ending cash]
modelSanity:
  - checkName: 收入引擎
    finding: "基础情景收入由第 3 年第 4 季度达到 25 个付费资产群驱动，3 个月付费试点后稳态 ACV 为 $108K。"
  - checkName: 必须做对的事
    finding: "试点到量产转化率和 6 个月以内的采购路径必须同时成立，因为销售周期敏感性是最大的收入拖累。"
  - checkName: 模型崩溃条件
    finding: "若采购周期延长至 9 个月同时毛利率跌至 68%，模型最快崩溃——此时下行现金将跌至约 $0.6M。"
  - checkName: 下轮融资依据
    finding: "若公司以约 10 个付费资产群、一条可复制的框架或 MSP 路径，以及试点转化率明显高于 50% 的证据退出第 2 年，下一轮融资即有据可依。"
sanityChecks:
  ruleOf40: "第 3 年增长率 155.6% 加 EBITDA 利润率 3.5% = 159.1%。"
  burnMultiple: "第 1 年的消耗倍数约为 2.0x（基于 3 个已转化或进行中的资产群）；第 2 年随着退出 ARR 从 $324K 提升至 $1.08M，改善至约 0.7x。"
  revenuePerFte: "以第 3 年第 4 季度收入运行率对 11 名年末员工计算，第 3 年每名员工产出 $178K，略低于 SaaS 行业 $200K–$400K 基准。"
  flags:
    - "每名员工收入对于软件业务仍然偏低，因此第 4 年的生产力提升须依靠渠道杠杆而非等比例扩招。"
    - "客户数量假设即便单位经济模型使用了 1.5% 的月度流失启发式，基础运营计划中也不存在实质性客户流失。"
    - "模型依赖稳定的基准导出或 API，以及可重复的次门槛采购路径——商业计划将这两者均标注为仍需验证。"
