  fiveForces:
    supplierPower:
      score: 2
      rationale: >-
        Core dependencies such as M365, DNS vendors, and ITSM systems matter for integration, but
        they are numerous and already connected by adjacent tools like runZero and Jira, limiting
        supplier leverage over the category.
      sourceRefs:
        - 11
        - 15
        - 17
    buyerPower:
      score: 4
      rationale: >-
        Public buyers are concentrated, reference-sensitive, and governed by procurement rules, so a
        young vendor will face long sales cycles and strong demands for proof, pilots, and framework
        alignment.
      sourceRefs:
        - 10
        - 19
        - 20
    threatOfEntrants:
      score: 3
      rationale: >-
        Public benchmark data is increasingly visible, but packaging it into owner-resolved
        remediation, evidence collection, and public-sector policy templates creates moderate
        execution barriers.
      sourceRefs:
        - 1
        - 6
        - 31
    threatOfSubstitutes:
      score: 4
      rationale: >-
        Incumbent substitutes already exist in EASM, VM, ratings, and ITSM; many buyers can patch
        together a partial solution from current tools, audits, and MSPs.
      sourceRefs:
        - 11
        - 14
        - 16
        - 17
        - 25
    competitiveRivalry:
      score: 4
      rationale: >-
        Rivalry is high in adjacent categories because large incumbents compete aggressively on
        discovery and workflow, even if none fully closes the public-sector remediation gap.
      sourceRefs:
        - 11
        - 13
        - 14
        - 16
        - 17
  pestle:
    - factor: political
      impact: positive
      point: >-
        Public benchmark visibility raises ministerial and press sensitivity around digital-hygiene
        failures, making remediation spend easier to justify.
      sourceRefs:
        - 1
        - 19
    - factor: economic
      impact: neutral
      point: >-
        Government budgets are large, but procurement friction and framework usage slow conversion
        despite clear cyber need.
      sourceRefs:
        - 3
        - 10
        - 23
    - factor: social
      impact: positive
      point: >-
        Citizen trust in digital services depends on reliable and privacy-safe public websites and
        email communication.
      sourceRefs:
        - 1
        - 4
        - 18
    - factor: technological
      impact: positive
      point: >-
        Control patterns for mail, DNS, TLS, and inventory are standardized enough to automate into
        repeatable fix workflows.
      sourceRefs:
        - 8
        - 12
        - 15
        - 28
    - factor: legal
      impact: positive
      point: >-
        NIS2, national standards, and procurement-linked cyber programs convert hygiene gaps into
        formal obligations.
      sourceRefs:
        - 5
        - 6
        - 7
        - 9
        - 20
    - factor: environmental
      impact: neutral
      point: >-
        The main sustainability effect is indirect: fewer duplicate audits and less manual rework
        rather than a primary buying criterion.
      sourceRefs:
        - 13
        - 17
  adoptionFrictionMatrix:
    - friction: Fragmented ownership across agencies, MSPs, and hosting providers
      severity: high
      affectedBuyer: Shared-service infrastructure lead
      mitigation: >-
        Start with domains where ownership is already known, then build escalation paths and owner
        graph enrichment over time.
      sourceRefs:
        - 1
        - 12
        - 15
    - friction: Procurement and security review cycles
      severity: high
      affectedBuyer: Government CISO or procurement sponsor
      mitigation: >-
        Package pilots below tender thresholds or through frameworks, and position the product as a
        remediation accelerator for existing obligations.
      sourceRefs:
        - 10
        - 19
        - 20
    - friction: Perception that free benchmarks are “good enough”
      severity: medium
      affectedBuyer: Budget holder
      mitigation: >-
        Demonstrate workflow ROI through time-to-fix, cross-owner coordination, and evidence-pack
        generation rather than more scanning.
      sourceRefs:
        - 1
        - 17
        - 31
    - friction: Integration load with M365, DNS, CMDB, and ITSM tools
      severity: medium
      affectedBuyer: Security operations manager
      mitigation: >-
        Prioritize integrations that adjacent platforms already normalize, especially Microsoft,
        Jira, ServiceNow, and common vulnerability feeds.
      sourceRefs:
        - 11
        - 15
        - 17
