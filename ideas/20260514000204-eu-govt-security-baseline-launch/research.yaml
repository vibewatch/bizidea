reportMemo:
  executiveTakeaways:
    - >-
      Public benchmarking has already moved this market from hidden hygiene gaps to visible
      remediation pressure; the free signal exists, while owner-mapped fix execution still does not
      [1,5,31].
    - >-
      The strongest wedge is not more scanning but a workflow layer that converts public findings
      into vendor-specific tasks, evidence packs, and audit-ready progress across fragmented estates
      [1,8,12].
    - >-
      Incumbents cover discovery, scoring, or ticketing in isolation, but none of the fetched offers
      are purpose-built for EU public-sector cross-owner remediation tied to public score
      improvement [11,13,14,16,17,25].
    - >-
      Go-to-market is plausible through digitally mature shared-service agencies and
      framework-friendly sub-central contracts, especially where mandatory email standards and
      public-sector cyber programs already condition buyers to baseline controls [7,9,10,19,20].
  marketDefinition: >-
    This is the intersection of external attack-surface management, public-sector compliance
    operations, and remediation workflow software for government web, email, DNS, and tracker
    hygiene. The proposed product sits downstream of public benchmarking and upstream of ITSM
    execution [1,5,11,17,31].
  customerAndBuyer: >-
    Primary users are shared-service infrastructure or cyber teams responsible for dozens of
    government domains and a consolidated mail stack; the economic buyer is typically a government
    CISO, head of digital infrastructure, or shared-services director who is exposed to audit,
    press, and procurement scrutiny [1,4,5,10,19].
  buyingTriggers:
    - point: >-
        A public red score or comparable benchmark finding creates visible pressure before internal
        audit, press, or oversight review cycles.
      sourceRefs:
        - 1
        - 5
        - 19
    - point: >-
        Mandatory email and transport controls turn SPF, DKIM, DMARC, TLS, and MTA-STS gaps into
        governance obligations rather than optional hardening.
      sourceRefs:
        - 7
        - 8
        - 9
        - 27
        - 28
    - point: >-
        Framework procurement and measurable cyber programs make it easier to justify a remediation
        workflow purchase when buyers can tie it to resilience outcomes.
      sourceRefs:
        - 10
        - 19
        - 20
        - 26
  willingnessToPay:
    summary: >-
      Willingness to pay should exist where the alternative is repeated manual coordination across
      MSPs, generic ITSM, and custom-quote security tooling. The market already accepts
      custom-priced exposure products, while EU sub-central buyers can often purchase below the
      €216k formal-tender threshold or via frameworks, supporting a high five-figure annual workflow
      budget when urgency is acute.
    sourceRefs:
      - 10
      - 17
      - 24
      - 31
  competitiveLandscape: >-
    The competitive field is crowded around finding exposures and managing generic tickets, but
    sparse around proving remediation across fragmented public estates. Microsoft and Outpost24 are
    closest on discovery; Qualys and runZero are substitutes for inventory and routing;
    SecurityScorecard and Bitsight are substitutes for oversight; Jira and ServiceNow remain
    execution systems rather than purpose-built public remediation control planes [11, 13, 14, 15,
    16, 17, 25].
  incumbentThesis:
    - incumbentClass: Cloud platforms
      point: >-
        Microsoft can discover and classify internet-facing assets, but the fetched workflow is
        still inventory-centric and assumes the buyer can translate candidate assets into
        accountable remediation across contractors and agencies.
      sourceRefs:
        - 11
        - 12
    - incumbentClass: Exposure and VM platforms
      point: >-
        Qualys-class tools can route vulnerabilities to owners faster, but they start from internal
        asset and risk-management contexts rather than public benchmark findings and evidence packs
        for external stakeholders.
      sourceRefs:
        - 13
        - 14
    - incumbentClass: Security ratings vendors
      point: >-
        SecurityScorecard and Bitsight are strong for oversight and posture visibility, yet they
        stop at monitoring, scoring, and governance rather than generating fix kits and
        proof-of-remediation artifacts.
      sourceRefs:
        - 16
        - 25
    - incumbentClass: ITSM suites
      point: >-
        Jira-class platforms provide workflow transparency and automation, but they do not infer
        ownership from DNS, email, and web findings or maintain a domain-specific remediation
        library for public standards.
      sourceRefs:
        - 15
        - 17
  regulatoryLandscape: >-
    Policy direction is favorable: NIS2 expands obligations to public administration, ENISA has
    issued technical implementation guidance, national governments already mandate specific email
    controls, and procurement-linked cyber programs keep baseline compliance visible. The startup
    wins if it helps agencies operationalize obligations rather than interpreting law for them
    [5,6,7,8,9,19,20,26].
  technologyLandscape: >-
    The technical stack is mature enough to automate: benchmark inputs already exist, mail and DNS
    remediation patterns are standardized, EASM products expose inventory concepts and integrations,
    and government IT teams already work inside M365, CMDB, and ITSM environments. The difficult
    layer is owner resolution, sequencing, and evidence collection across outsourced estates
    [8,11,12,15,24,27,28,31].
  distributionChannels:
    - point: >-
        Direct sales to shared-service agencies and regional digital authorities work best where
        public benchmark findings are already visible and cyber programs define measurable outcomes.
      sourceRefs:
        - 1
        - 4
        - 19
    - point: >-
        Land-and-expand via framework-friendly deals below the EU-wide tender threshold can shorten
        first-customer cycles for sub-central authorities.
      sourceRefs:
        - 10
        - 20
    - point: >-
        Channel partnerships with MSSPs and government-focused integrators are attractive because
        the EU is standardising trusted managed security services and buyers already expect
        outsourced execution help.
      sourceRefs:
        - 15
        - 19
        - 26
  partnershipEcosystem:
    - point: >-
        Benchmark operators and national cyber agencies are natural demand generators because they
        make hygiene gaps visible and already shape buyer behavior.
      sourceRefs:
        - 1
        - 2
        - 21
        - 22
        - 31
    - point: >-
        Microsoft, DNS providers, mail vendors, and ITSM platforms are integration partners because
        remediation usually ends in their systems rather than a standalone console.
      sourceRefs:
        - 11
        - 12
        - 15
        - 17
    - point: >-
        Procurement advisors and certified MSSPs can become fulfilment partners for customers that
        need a workflow layer plus hands-on remediation capacity.
      sourceRefs:
        - 10
        - 26
  dataMoats:
    - point: >-
        A growing asset-owner graph that links public findings to the right internal team,
        contractor, or provider across repeated government estates can compound with every
        remediation cycle.
      sourceRefs:
        - 1
        - 12
        - 15
    - point: >-
        An evidence library that captures what auditors and oversight bodies accept as proof for
        each control class can become more valuable than raw scanning data.
      sourceRefs:
        - 6
        - 8
        - 9
        - 19
    - point: >-
        Cross-country mapping of public standards, exceptions, and fix templates can create
        defensibility in a market where local policy nuance matters.
      sourceRefs:
        - 7
        - 8
        - 9
        - 27
        - 28
  geographicConsiderations:
    - point: >-
        Benelux is the clearest launch region because the Dutch predecessor is already
        institutionally embedded and Dutch standards are unusually explicit.
      sourceRefs:
        - 2
        - 9
        - 21
        - 22
        - 27
    - point: >-
        Nordic and other digitally mature administrations are attractive next because the Joinup
        factsheets suggest broad digital-public-administration maturity across 39 countries, but
        productization will still need local procurement and language adaptation.
      sourceRefs:
        - 4
        - 10
    - point: >-
        A pan-EU product needs policy-aware templates, because the same public benchmark can feed
        different national compliance narratives even when the technical fix is similar.
      sourceRefs:
        - 4
        - 5
        - 6
        - 19
  sensitivityCases:
    - case: Benchmark adoption accelerates
      impact: >-
        If more governments operationalize SecurityBaseline-style publishing, urgency rises and the
        product becomes a response layer to a public KPI rather than another security tool.
      sourceRefs:
        - 1
        - 2
        - 21
        - 22
    - case: Microsoft expands workflow depth
      impact: >-
        If Defender EASM adds stronger owner assignment and public-reporting workflows, the
        startup’s advantage narrows inside M365-heavy accounts and shifts toward multi-vendor or
        public-sector-specific proof workflows.
      sourceRefs:
        - 11
        - 12
    - case: Procurement thresholds force formal tenders
      impact: >-
        Longer public procurement cycles would push the company toward pilots, frameworks, and
        MSSP-led delivery rather than purely direct SaaS sales.
      sourceRefs:
        - 10
        - 19
        - 20
  validationPlan:
    - priority: high
      question: >-
        How many shared-service public-sector teams in the beachhead actually manage 20-200 domains
        plus a consolidated mail tenant?
      evidenceToGather: >-
        Interview 10 Benelux and Nordic agencies plus 5 MSPs; collect estate size, owner
        fragmentation, and current tooling data.
    - priority: high
      question: Will buyers pay for workflow and proof-of-fix if discovery is free or already bundled?
      evidenceToGather: >-
        Run design-partner calls using a benchmark-to-backlog mockup; test whether teams value owner
        resolution, status tracking, and evidence packs more than additional scanning.
    - priority: medium
      question: >-
        Can SecurityBaseline.eu or similar sources provide stable data access and trusted crosswalks
        into CMDB/ITSM workflows?
      evidenceToGather: >-
        Validate API/export options, update cadence, false-positive handling, and partnership
        openness with benchmark operators and early customers.
    - priority: medium
      question: Which procurement route closes fastest for first deals?
      evidenceToGather: >-
        Map existing frameworks, sub-threshold purchasing patterns, and MSSP resale options in the
        Netherlands, Belgium, Denmark, and Sweden.
analysisModels:
  marketMapDiagram:
    title: EU government remediation map
    mermaid: |-
      quadrantChart
        title EU government remediation map
        x-axis Low specialization --> High specialization
        y-axis Low urgency --> High urgency
        Microsoft Defender EASM: [0.55, 0.68]
        Outpost24 EASM: [0.62, 0.72]
