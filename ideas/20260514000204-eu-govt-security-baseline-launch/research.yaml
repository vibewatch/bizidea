competitors:
  - name: Microsoft Defender EASM
    stage: incumbent
    wedge: >-
      Continuous internet-facing asset discovery and prioritization inside the broader Microsoft
      security stack.
    pricing: Bundled / enterprise quote
    strength: Strong M365 adjacency and dynamic inventory for cloud-heavy government estates.
    weaknessVsUs: >-
      Inventory classification still leaves the buyer to resolve owners, sequence fixes, and produce
      public-proof evidence across outsourced domains.
    sourceRefs:
      - 11
      - 12
  - name: Outpost24 EASM
    stage: scale-up
    wedge: European EASM with scoring, alert workflows, and SIEM/CMDB integrations.
    pricing: Custom quote
    strength: EU-rooted vendor with benchmarking, integrations, and visible remediation workflow hooks.
    weaknessVsUs: >-
      Still oriented toward security operations workflows rather than public-sector owner mapping
      and audit-ready proof packs.
    sourceRefs:
      - 13
  - name: Qualys VMDR
    stage: incumbent
    wedge: Risk-based vulnerability management with owner routing and patch/remediation workflows.
    pricing: Custom quote / platform subscription
    strength: Established owner-routing and remediation language across large enterprise estates.
    weaknessVsUs: >-
      Best for internally managed assets; weak fit for converting outside-in government benchmark
      findings into multi-party public remediation programs.
    sourceRefs:
      - 14
  - name: runZero
    stage: scale-up
    wedge: Hybrid asset inventory and integration hub for complex IT, OT, and SaaS environments.
    pricing: Custom quote
    strength: >-
      Deep integrations with Microsoft, Jira, ServiceNow, Qualys, Rapid7, and Tenable make it useful
      in messy estates.
    weaknessVsUs: >-
      Asset visibility and synchronization are strong, but runZero is not positioned as a
      public-sector benchmark-to-proof remediation layer.
    sourceRefs:
      - 15
  - name: SecurityScorecard
    stage: scale-up
    wedge: >-
      Government posture visibility, ratings, and risk oversight across critical infrastructure and
      third parties.
    pricing: Custom quote / public-sector program
    strength: Clear government positioning and continuous external risk monitoring.
    weaknessVsUs: >-
      Optimized for oversight and score visibility rather than fix orchestration, domain-owner
      resolution, or remediation evidence collection.
    sourceRefs:
      - 16
      - 25
regulatoryTechnicalConstraints:
  - point: >-
      Government email programs increasingly expect TLS, DMARC, SPF, DKIM, and MTA-STS-class
      controls, so remediation output must be technically exact and provider-aware.
    sourceRefs:
      - 7
      - 8
      - 27
      - 28
  - point: >-
      NIS2 implementation work increasingly requires evidence and control mappings, which means the
      product must capture proof rather than just status changes.
    sourceRefs:
      - 5
      - 6
  - point: >-
      Sub-central contracts above €216,000 trigger EU-wide publication requirements, so packaging
      and land-and-expand tactics matter.
    sourceRefs:
      - 10
  - point: >-
      Cookie and tracker cleanup intersects with privacy enforcement, so website remediation must
      account for consent and analytics design rather than pure security scanning.
    sourceRefs:
      - 18
validationSignals:
  - point: >-
      SecurityBaseline.eu already covers 200,000 government domains across 32 countries and 67,000
      local governments, proving the signal layer exists at continental scale.
    sourceRefs:
      - 1
  - point: >-
      The Dutch predecessor already monitors 80,000 organisations and receives direct support from a
      Dutch regulator, reducing “is this real?” market risk.
    sourceRefs:
      - 2
      - 21
      - 22
  - point: >-
      Governments already tie baseline controls to procurement and certification outcomes, showing
      budget authority for hygiene improvements.
    sourceRefs:
      - 10
      - 20
  - point: >-
      NCSC is retiring free Mail Check and recommending commercial EASM, validating demand for paid
      products once free government checking matures.
    sourceRefs:
      - 31
openQuestions:
  - >-
    What percentage of the 67,000 local governments are actually managed through shared-service
    digital estates large enough to support a software contract rather than one-off consulting?
  - >-
    Will benchmark operators expose reliable APIs, ownership metadata, and false-positive handling
    workflows, or will the startup need to build its own ingestion and dispute layer?
  - >-
    Which procurement frameworks in the Netherlands, Belgium, Denmark, and Sweden offer the fastest
    path to first paid pilots under public-sector buying rules?
  - >-
    How much remediation authority usually sits with internal teams versus MSPs and framework
    contractors in the target accounts?
