slug: "merchant-risk-case-os"
date: "2026-06-04"
executiveSummary: >-
  Merchant Risk Case OS should start as an investigator workspace for UK and EU
  payment facilitators and merchant acquirers that onboard roughly 500-5,000 SMB
  digital merchants per month. The acute pain is analyst time lost assembling
  phone, email, IP, domain, website, KYB, CRM, and prior-application evidence
  before an approve, pend, or reject decision. The product should sit above
  existing signal vendors and processor tools, not replace them, and output an
  explainable merchant case memo with cited evidence and next-step
  recommendations. The daily champion is the head of merchant risk or
  fraud-operations manager, while budget typically sits with a VP Risk, CRO, or
  GM of merchant acquiring responsible for fraud losses, approval SLAs, and
  audit posture. Research supports a real but narrow beachhead, with an
  estimated $21.2M TAM, $9.3M SAM, and $1.6M year-3 SOM for the initial UK/EU
  payfac-acquirer wedge. That makes the first market commercially credible, but
  not large enough on its own for a venture-scale outcome without adjacent
  workflow expansion after onboarding proof. Go-to-market should therefore begin
  with paid pilots on one onboarding queue, triggered by suspicious-application
  spikes, new higher-risk merchant categories, or new-processor and
  cross-border launches that create immediate backlog pressure. The core risk is
  that Coris, Trustfull, processors, or broader fraud platforms become "good
  enough" unless the startup proves materially faster review time, cleaner audit
  notes, and faster deployment with existing tools. The biggest evidence gaps
  are which KPI unlocks budget first in practice and how many UK/EU accounts
  truly have enough analyst density to support a dedicated category.
problem:
  - "Merchant-risk teams at UK and EU payfacs still investigate suspicious onboarding applications across KYB vendors, processor tools, CRM notes, spreadsheets, and prior-case searches, so approval queues grow faster than analyst headcount."
  - "Those teams also need audit-ready rationale for approve, pend, and reject decisions, but current workflows leave evidence fragmented across screenshots, tickets, and ad hoc notes."
solution:
  - "Overlay the existing stack with a merchant case workspace that pulls phone, email, IP, domain, website, KYB, CRM, and prior-application signals into one explainable case graph."
  - "Generate analyst-ready approve-pend-reject recommendations and cited case memos that stay human-approved on day one and can be stored for audit, partner review, and later model tuning."
whyWeWin:
  - "The product wins the workflow that point-signal vendors and processors still leave manual: assembling linked merchant evidence, queueing reviews, and writing the final decision memo."
  - "Each reviewed case compounds a merchant entity graph, integration footprint, and outcome-linked playbook library that becomes more valuable than any single signal source."
strategicChoices:
  beachhead: "UK and EU payment facilitators and merchant acquirers onboarding 500-5,000 SMB digital merchants per month in subscription, lead-generation, creator-economy, and online-services categories that already require manual fraud review before activation."
  wedgeRationale: "This slice has a visible queue, a named operator buyer, and measurable before-and-after metrics in review time, approval backlog, and bad-merchant leakage. It reaches proof faster than starting with generic fraud operations, marketplace trust, or broad compliance orchestration."
  sequencingRationale: "Start as a vendor-neutral investigation overlay for one onboarding queue because buyers already have KYB and digital-risk tools but lack a system of action. After proving faster, more defensible underwriting decisions, add deeper processor integrations, outcome feedback loops, and adjacent workflows such as KYB refreshes and payout-risk review."
  notYet:
    - "Full transaction-fraud detection or chargeback decisioning before onboarding proof"
    - "Autonomous merchant approval or rejection without a human reviewer"
    - "Marketplace seller-risk and lender underwriting workflows outside payments"
    - "Replacing incumbent KYB, processor, or digital-signal vendors"
market:
  tam: "Estimated UK/EU TAM of $21.2M based on about 80 likely payfac-acquirer buyers at roughly $265k ARR per account."
  sam: "Estimated beachhead SAM of $9.3M based on 35 best-fit UK/EU accounts with high-volume SMB merchant underwriting."
  som: "Estimated year-3 SOM of $1.6M based on 6 production customers at roughly $265k ARR through design-partner-led enterprise sales."
  segments:
    - "Primary: UK and EU payment facilitators with 20-50 person merchant-risk teams serving SMB digital merchants"
    - "Secondary: Merchant acquirers and PSP risk teams operating multi-processor onboarding flows across Europe"
  buyingProcess: >-
    The operational champion is usually the head of merchant risk or a
    fraud-operations manager, but economic approval typically comes from a VP
    Risk, CRO, or GM of merchant acquiring. The fastest path is a paid pilot
    tied to a live backlog, higher-risk vertical launch, or new geography
    rollout, followed by security and integration review because the product
    touches regulated underwriting workflows.
product:
  mvp: >-
    MVP should support one onboarding queue, ingest a limited connector set
    across one KYB source, one CRM or case system, one processor or internal
    application log, and external digital-footprint data, then produce a linked
    evidence graph and analyst-ready memo. It should optimize for faster human
    investigation and audit-ready rationale, not autonomous decisioning.
  sixMonth: "Ship 2-3 paid pilots with a browser overlay or limited-connector deployment, queue view, cited evidence memo, and approve-pend-reject workflow for one onboarding team."
  twelveMonth: "Productize the most repeated processor, CRM, and KYB connectors, add role-based approvals and audit exports, and launch dashboards for median review time, memo completeness, and pilot-to-production conversion."
  twentyFourMonth: "Expand from onboarding investigations into KYB refresh, payout-risk review, and post-approval merchant monitoring while using historical outcomes to tune vertical- and geography-specific playbooks."
  keyBets:
    - "A vendor-neutral casework layer can win budget before buyers replace incumbent signal or processor tools."
    - "A limited connector set plus browser overlay can show value in under 45 days for the first onboarding queue."
    - "Human-in-the-loop recommendations with cited evidence will earn trust faster than autonomous underwriting claims."
    - "Adjacent workflows inside the same customer will expand faster than winning broad new segments early."
gtm:
  wedge: "Sell a paid merchant-onboarding investigation pilot that cuts queue time and produces audit-ready case notes, not a generic AI fraud copilot."
  channels:
    - "Founder-led outbound to heads of merchant risk, fraud operations managers, and risk executives at named UK/EU payfacs and acquirers"
    - "Co-sell and referral relationships with KYB vendors, digital-risk vendors, and implementation consultancies already serving the target accounts"
    - "Trigger-based selling around higher-risk vertical expansion, suspicious-application spikes, processor changes, and cross-border launches"
  funnelTargets: "Target account→discovery 15-20%, discovery→qualified pilot 25-35%, paid pilot→production 50%+, production→second-workflow expansion 40%+ within 12 months."
  pricing: "Charge a paid 8-12 week pilot for one onboarding queue, then convert to an annual platform fee plus investigator-seat and reviewed-application volume bands targeting roughly $180k-$300k production ACV, because buyer value tracks queue throughput, auditability, and avoided analyst hiring more than seats alone."
businessModel:
  revenueStreams:
    - "Annual subscription for merchant-onboarding investigation workflows"
    - "Implementation and connector-configuration fees"
    - "Usage-based revenue tied to reviewed merchant applications or completed cases"
    - "Expansion modules for additional queues, geographies, and adjacent merchant-risk workflows"
  unitOfValue: "Reviewed merchant application decided with complete audit-ready evidence"
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more onboarding queues, regions, and merchant vertical playbooks inside the same customer"
    - "Expand from onboarding into KYB refreshes, payout-risk review, and post-approval monitoring"
    - "Monetize benchmark reporting and outcome-tuned investigation playbooks once enough case data accumulates"
strategyMap:
  northStarMetric: "Merchant applications decided per investigator hour with complete audit-ready rationale"
  inputMetrics:
    - "Median review time per merchant application"
    - "Percent of cases with complete cited evidence memo"
    - "Approve-pend-reject recommendation acceptance rate by analysts"
    - "Paid pilot to production conversion rate"
    - "Days from signed pilot to first live queue"
  moatsToBuild:
    - "Merchant entity graph linking phones, emails, domains, IPs, prior applications, processors, and downstream outcomes"
    - "Outcome-linked investigation playbooks by merchant vertical, geography, and processor environment"
    - "Repeatable integration templates across KYB, CRM, processor, and case-management systems"
  killCriteria:
    - "If fewer than 8 of the first 25 qualified ICP interviews rank onboarding investigation backlog as a top-two funded pain, narrow or stop the wedge."
    - "If the first 3 paid pilots fail to reduce median review time by at least 30% while keeping over 95% analyst acceptance of the cited evidence packet, rework the product before scaling GTM."
    - "If median time to first value stays above 45 days for limited-connector deployments, narrow the ICP or accept a services-heavy model."
  mermaid: |
    flowchart LR
      Wedge[Merchant onboarding wedge] --> MVP[Case graph MVP]
      MVP --> Proof[Faster reviews and audit notes]
      Proof --> Expansion[Adjacent merchant risk workflows]
investorMemo:
  verdict:
    call: "Watch"
    conviction: "Clear workflow pain and a coherent first customer, but conviction stays limited until the company proves budget urgency, deployment speed, and expansion beyond a narrow $9.3M beachhead."
    whyBelieve: "Buyers already pay for merchant-risk tooling, and public case studies plus the Trustfull launch suggest the unsolved problem is explainable investigation workflow rather than one more fraud score."
    whyDoubt: "The beachhead is narrow and crowded by adjacent vendors, so the startup may become a feature unless it proves meaningfully better queue economics and auditability."
    nextDiligence: "Verify with 5-10 target accounts which KPI actually unlocks budget, then run paid pilots that convert into $180k-$300k production contracts on one onboarding queue."
  firstCustomer:
    title: "Head of merchant risk at a UK payment facilitator serving SMB digital merchants"
    profile: "A UK or EU payfac with a 20-50 person merchant-risk team, 1,000-plus monthly merchant applications, multiple onboarding tools, and meaningful exposure to subscription, lead-generation, and online-services merchants."
    trigger: "A spike in suspicious applications, movement into a higher-risk merchant category, or launch into a new geography overwhelms existing manual review capacity."
    buyer: "VP Risk or CRO"
    initialContract: "Paid 8-12 week pilot for one onboarding queue at roughly $40k-$60k, creditable toward a $180k-$300k annual production contract if review time falls at least 30% and memo completeness exceeds 95%."
  mustBeTrue:
    - "At least 35 UK/EU payfac or acquirer accounts have enough merchant-risk analyst density and onboarding volume to support a dedicated production contract."
    - "A limited-connector deployment can reach first value in 45 days or less for the beachhead workflow."
    - "Paid pilots convert to production above 50% when the product shows at least 30% lower review time and cleaner audit notes."
    - "Buyers will fund an investigation workspace before incumbent signal vendors or processors bundle a sufficient alternative."
    - "Expansion into at least one adjacent merchant-risk workflow can increase ACV within 12-18 months of the first deployment."
  diligenceQuestions:
    - "Which KPI actually creates budget urgency: review-time reduction, lower fraud losses, faster merchant activation, or audit readiness?"
    - "How many target accounts truly match the assumed 500-5,000 monthly onboarding volume and 20-50 analyst team profile?"
    - "Can a browser-overlay or limited-connector product deliver enough ROI before full processor integration?"
    - "Why do customers choose this over Coris, Trustfull, Feedzai, or internal case-management tooling?"
    - "What evidence types most often change a merchant decision in first-line underwriting versus escalation review?"
operatingAssumptions:
  - assumption: "There are at least 35 best-fit UK/EU payfac and acquirer accounts with enough onboarding volume and analyst density to support the beachhead category."
    basis: "research.yaml"
    validationTest: "Build a named top-50 account list with estimated monthly onboarding volume, team size, processor stack, and merchant mix, then confirm at least 35 meet the target profile."
    decisionImpact: "If false, narrow the ICP to a smaller subset of higher-volume payfacs and lower near-term revenue expectations."
  - assumption: "Review-time reduction is the KPI that unlocks budget faster than fraud-loss reduction or audit readiness alone."
    basis: "research.yaml"
    validationTest: "Run 10 buyer interviews and require each to rank the buying metric; proceed only if review-time or backlog reduction is the top budget driver in a majority of cases."
    decisionImpact: "If false, reposition GTM, proof points, and product analytics around the metric that buyers actually fund."
  - assumption: "A limited-connector deployment can show value before deep processor integration is complete."
    basis: "idea.yaml"
    validationTest: "Pilot with one KYB source, one CRM or case system, and one processor or application log, then confirm first value within 45 days and at least 30% lower review time."
    decisionImpact: "If false, hire integration capacity earlier and expect a slower, more services-heavy delivery model."
  - assumption: "Platform plus usage pricing will fit buyer procurement better than pure seat pricing."
    basis: "idea.yaml"
    validationTest: "Test three pricing frames with 10 target buyers and close at least 2 paid pilots inside the proposed pilot and production ranges."
    decisionImpact: "If false, simplify pricing toward workflow or seat bands to reduce procurement friction."
  - assumption: "Human-reviewed recommendations with cited evidence will clear trust and compliance objections faster than autonomous decisioning."
    basis: "research.yaml"
    validationTest: "Track security, compliance, and pilot-objection themes across the first 5 prospects and confirm no customer requires a fully autonomous workflow to buy."
    decisionImpact: "If false, shift the roadmap toward deeper approval automation controls or reposition as analytics rather than a system of action."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Interview 20 merchant-risk leaders and collect 5 anonymized onboarding cases with the full evidence chain."
    hypothesis: "The highest-intensity beachhead is UK/EU payfacs onboarding SMB digital merchants in riskier online categories."
    successMetric: "At least 12 interviews confirm the target workflow as a top-two pain and 5 prospects share real case artifacts."
    owner: "Founder/CEO"
  - horizon: "0–90 days"
    experiment: "Prototype a limited-connector workflow using one KYB data source, one CRM or case tool, and one processor or application log."
    hypothesis: "A browser overlay or light integration can assemble enough evidence to cut review time without a full system rebuild."
    successMetric: "One design partner sees a 20% or better reduction in time spent on sampled investigations before full deployment."
    owner: "Founding eng"
  - horizon: "90–180 days"
    experiment: "Run 2-3 paid pilots on one onboarding queue with analyst-facing case memos and explicit human approval."
    hypothesis: "Paid pilots tied to live backlog pain can show enough throughput and audit benefit to support production conversion."
    successMetric: "At least 2 pilots reach a 30% review-time reduction and one converts or enters procurement for production."
    owner: "Founder/CEO"
  - horizon: "90–180 days"
    experiment: "Test pilot-to-production packaging across platform-plus-usage, platform-plus-seat, and workflow-based pricing."
    hypothesis: "Buyers prefer pricing that maps to reviewed applications and queue throughput over seat-only pricing."
    successMetric: "At least 2 pilot customers accept the proposed production pricing structure without material discounting."
    owner: "Founder/CEO"
  - horizon: "180–360 days"
    experiment: "Productize the most common processor, CRM, and KYB connectors from the first pilots."
    hypothesis: "A repeatable connector bundle can cut deployment time enough to support efficient expansion across the beachhead."
    successMetric: "Median deployment time for the next 3 customers falls below 45 days."
    owner: "Product/integration engineer"
  - horizon: "180–360 days"
    experiment: "Launch one adjacent workflow, either KYB refresh or payout-risk review, in the first production customer."
    hypothesis: "Expansion inside the same logo is easier than opening a second ICP before onboarding economics are proven."
    successMetric: "One production customer adopts a second workflow and increases ACV by at least 25%."
    owner: "Fraud ops lead"
operations:
  - "Maintain an evidence taxonomy that maps phone, email, IP, domain, website, prior-application, and third-party KYB signals into a consistent case format."
  - "Review analyst overrides, missing evidence fields, and decision reversals weekly so product priorities follow real investigation failures."
  - "Ship role-based access, audit exports, and immutable case history before any automation that influences merchant approval status."
  - "Use design-partner workflow maps and sample cases as the canonical artifact for onboarding, QA, and playbook tuning."
  - "Build a small partner program for KYB vendors and implementation consultancies only after pilot ROI is referenceable."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own customer discovery, founder-led sales, and design-partner delivery because the main risks are ICP precision and proof of budget urgency."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the case graph, evidence memo engine, and first limited connectors needed to run live pilots."
  - role: "Product/integration engineer"
    startTiming: "Month 3-6"
    rationale: "Turn the first bespoke connectors into repeatable deployment templates and reduce time to first value."
  - role: "Fraud ops and risk lead"
    startTiming: "Month 6-9"
    rationale: "Translate underwriting practice, analyst QA, and audit requirements into playbooks, metrics, and rollout controls."
  - role: "GTM lead"
    startTiming: "Month 9-12"
    rationale: "Scale pipeline only after there is a repeatable paid-pilot motion, a referenceable case study, and a clear pricing model."
milestones:
  - horizon: "0–12 months"
    items:
      - "Complete 20 ICP interviews and secure 5-10 design partners in the target UK/EU payfac-acquirer segment."
      - "Launch 2-3 paid pilots on one onboarding queue with cited case memos, human approvals, and audit exports."
      - "Convert at least 1 pilot to production and prove a 30% or better reduction in median review time."
      - "Reduce deployment scope to a repeatable connector bundle covering the most common KYB, CRM, and processor environments in early accounts."
  - horizon: "12–24 months"
    items:
      - "Reach 6 production customers in the beachhead and keep median time to first value under 45 days."
      - "Launch one adjacent workflow such as KYB refresh or payout-risk review in at least 2 existing customers."
      - "Establish 3-5 referral or co-sell relationships with KYB vendors, digital-risk vendors, or implementation partners."
      - "Accumulate enough case data to publish benchmark metrics on review time, memo completeness, and analyst override rates."
  - horizon: "24–36 months"
    items:
      - "Expand from onboarding into a broader merchant-risk workbench spanning onboarding, refresh, payout, and post-approval monitoring."
      - "Demonstrate that expansion revenue inside existing logos is a material growth driver, not just new logo sales."
      - "Use the merchant entity graph and outcome history to improve recommendation quality by vertical and geography."
risks:
  - risk: "Coris, Trustfull, processors, or broader fraud platforms close the workflow gap and bundle enough functionality into existing contracts."
    likelihood: "High"
    impact: "High"
    mitigation: "Differentiate on cross-vendor case orchestration, faster deployment, and superior audit-ready case output tied to measurable queue outcomes."
  - risk: "Integration and data-mapping work makes deployment too slow for a narrow beachhead market."
    likelihood: "High"
    impact: "High"
    mitigation: "Start with one onboarding queue, a browser overlay or light connector set, and strict ICP filtering toward customers with cleaner stacks."
  - risk: "Buyers treat the product as an operations nice-to-have if pilots show speed gains but not loss reduction or acceptance uplift."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Instrument pilots around the KPI buyers rank highest, require paid pilots, and tie pricing to production outcomes rather than generic automation claims."
  - risk: "Analysts over-trust recommendations and create false-confidence errors or compliance concerns."
    likelihood: "Medium"
    impact: "High"
    mitigation: "Keep human approval mandatory, expose cited evidence behind each recommendation, and monitor override and reversal rates from the first pilot onward."
fundingAsk:
  round: "pre-seed"
  targetFundingRangeUsd: "$2–3M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to secure 5-10 design partners, ship repeatable connectors for one onboarding queue, convert 2-3 paid pilots into production, and prove one adjacent workflow without becoming a services-heavy integrator."
