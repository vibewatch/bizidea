scenarios:
  downside:
    description: 集成工作比计划更重，拖慢试点转化，也限制了相邻工作流扩张。
    y3RevenueK: 1520.0
    y3EbitdaK: -480.0
    cashLowPointK: 290.0
    keyAssumptionChanges:
    - Q4Y3 客户数只有 6 个，而不是 8 个。
    - 退出 ACV 卡在约 $250K，因为相邻工作流扩张延后。
    - 毛利率最高只能到 67%，因为部署仍偏服务密集。
  base:
    description: 付费试点按计划转化，滩头市场在 Q4Y2 达到 6 个正式生产客户，且少数 logo 内扩张把第 3 年 ACV 拉高。
    y3RevenueK: 2101.3
    y3EbitdaK: -119.1
    cashLowPointK: 618.4
    keyAssumptionChanges:
    - 与 A4–A22 一致：M12 前 3 个付费客户，Q4Y2 前 6 个，Q4Y3 前 8 个。
    - 定价从 $50K 试点逐步抬到约 $265K 的滩头 ACV，并在相邻工作流扩张后升至约 $300K 退出 ACV。
    - 毛利率随着部署可重复性提升，从 55% → 62% → 70%。
  upside:
    description: 可引用的 ROI 缩短销售周期，伙伴转介绍更早起量，且更多 logo 会在第 3 年加上第二条工作流。
    y3RevenueK: 2620.0
    y3EbitdaK: 260.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - Q4Y3 客户数达到 10 个，而不是 8 个。
    - 随着更多客户采用 KYB 刷新或打款风险审查，退出 ACV 可到约 $320K。
    - 由于连接器复用和支持杠杆改善更快，毛利率可到 72%。
