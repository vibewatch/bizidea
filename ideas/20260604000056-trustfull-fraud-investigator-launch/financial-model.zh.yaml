modelDiagram:
  title: 单位经济流转
  mermaid: |-
    flowchart LR
      TargetAccounts[Target accounts] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionCustomers[Production customers]
      ProductionCustomers --> ExpansionWorkflows[Adjacent workflows]
      ExpansionWorkflows --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: 基础情景的收入引擎，靠的是在 Q4Y2 前拿下 6 个正式生产客户，然后在少数 logo 内通过相邻工作流扩张抬高 ACV，而不是去追几十个新账户。
- checkName: Must go right
  finding: 有限连接器部署必须稳住在 45 天以内，这样付费试点才能在实施拖累把公司推向服务密集型模式之前顺利转正。
- checkName: Model breaks if
  finding: 如果买方只愿意为“节省审查时间”这种锦上添花的价值付费，或销售周期拖到 120 天以上，下行情景就会把现金压到最后几季缓冲附近。
- checkName: Next-round proof
  finding: 下一轮融资成立的前提，是到 Q4Y2 前证明 6 个正式生产客户、可重复的 45 天内部署，以及至少 2 次相邻工作流扩张。
sanityChecks:
  ruleOf40: 第 3 年增长率 84.1% + EBITDA 利润率 -5.7% = 78.4%；对 pre-seed 公司来说相当健康，不过仍受第 2 年基数较小支撑。
  burnMultiple: 第 2 年 burn multiple 约为 0.7x：公司烧掉约 $0.61M EBITDA，换来约 $0.87M ARR 增量，运行率从 Q4Y1 的约 $0.72M 升到 Q4Y2 的约 $1.59M。
  revenuePerFte: 按 Q4Y3 的 8 名 FTE 计算，第 3 年人均收入约为 $262.7K，处在企业 SaaS 大致 $200–400K 的基准区间内。
  flags:
  - 这个滩头市场是刻意做窄的，所以模型能否打动下一轮融资，关键在于 ACV 扩张，而不只是 logo 数增长。
  - 只有当有限连接器部署真正可重复时，毛利率才能摸到 70%；如果处理商工作高度定制，基础情景会很快被侵蚀。
  - 基础情景里现金低点大约在 $630K，虽然还能运转，但只要“试点转正式生产”稍微拖长，就得更早放慢招聘或提前融资。
