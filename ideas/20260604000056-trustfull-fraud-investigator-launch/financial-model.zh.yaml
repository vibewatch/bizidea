slug: merchant-risk-case-os
date: '2026-06-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-04] 模型从商业计划日期后的次月启动，假设资金会先于运营支出到位。'
- id: A2
  name: 起始现金
  value: '2200.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–3M] 基础情景采用 $2.2M pre-seed，接近区间中值，因为滩头市场较窄，招聘也保持精简。'
- id: A3
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] 公司从零收入起步，必须先拿到共创客户，付费试点后才会出现首批付费。'
- id: A4
  name: 付费试点价格
  value: '50.0'
  unit: USDK per 8-12 week pilot
  source: '[BP investorMemo.initialContract $40k-$60k] 基础情景采用试点区间中值。'
- id: A5
  name: 初始正式生产 ACV
  value: '220.0'
  unit: annualK per customer
  source: '[BP gtm.pricing $180k-$300k production ACV] 基础情景在正式生产时略高于区间下沿，因为初期只覆盖一条开户队列和有限连接器。'
- id: A6
  name: Q4Y2 滩头正式生产 ACV
  value: '265.0'
  unit: annualK per customer
  source: '[BP market.tam and market.som roughly $265k ARR per account] 到第 2 年第 4 季度，价格达到商业计划中的市场测算基准，因为试点已开始转成标准正式生产合同。'
- id: A7
  name: 第 3 年退出 ACV
  value: '300.0'
  unit: annualK per customer
  source: '[BP product.twentyFourMonth + BP businessModel.expansionLevers] 成熟客户会扩到更广的商户风控工作台，并至少叠加一条相邻工作流，所以第 3 年实际 ACV 高于只做开户的核心水平。'
- id: A8
  name: 第 1 年付费客户爬坡
  value: M6 1, M8 2, M10 3, M12 3 paying customers
  unit: customersEop
  source: '[BP product.sixMonth + BP milestones 0–12 months] 这一节奏对应首年 2–3 个付费试点，且至少有 1 个转入正式生产。'
- id: A9
  name: 第 2 年客户爬坡
  value: Q1Y2 3, Q2Y2 4, Q3Y2 5, Q4Y2 6 customers
  unit: customersEop
  source: '[BP milestones 12–24 months] 直接锚定商业计划里“第 2 年末达到 6 个正式生产客户”的目标。'
- id: A10
  name: 第 3 年客户爬坡
  value: Q1Y3 6, Q2Y3 7, Q3Y3 8, Q4Y3 8 customers
  unit: customersEop
  source: '[BP milestones 24–36 months + BP market.som] 基础情景在 6 个滩头客户之后只做温和的新 logo 增长，更依赖 ACV 扩张，而不是堆好看的 logo 数。'
- id: A11
  name: 收入确认方法
  value: customersEop × blended realized price for the month or quarter
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] 这样处理后，收入可以直接和付费客户数、定价梯度对上，不需要额外建 cohort 表。'
- id: A12
  name: 第 1 年毛利率
  value: '55.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 早期试点的服务成分更重，因为连接器配置、分析师 QA 和实施支持仍偏手工。'
- id: A13
  name: 第 2 年毛利率
  value: '62.0'
  unit: percent
  source: '[BP product.twelveMonth + BP operatingAssumptions limited-connector deployment] 常见的 KYB、CRM 和处理商连接器一旦开始可复用，毛利就会改善。'
- id: A14
  name: 第 3 年毛利率
  value: '70.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] 基础情景在产品把开户和一条相邻工作流都产品化后，达到计划里写明的长期软件毛利。'
- id: A15
  name: 用于单位经济的月度 logo 流失率
  value: '1.0'
  unit: percent
  source: '[Startup-finance heuristic for annual-contract enterprise SaaS] 这个工作流虽窄，但任务关键；只要一直嵌在受监管审查流程里，月流失率大致能守在 1%。'
- id: A16
  name: 稳态 CAC
  value: '120.0'
  unit: USDK per customer
  source: '[BP buyingProcess + BP gtm founder-led outbound + startup-finance heuristic] 企业级风控销售需要付费试点、安全评审和长采购周期，所以获客成本理应在六位数。'
- id: A17
  name: 全含薪资区间
  value: Founder/CEO 180; Engineering 200; Product/Integration 175; Fraud Ops/Risk 170; Sales/GTM 180; Customer Success/Ops 150; G&A 120
  unit: annualK per FTE
  source: '[BP team + startup-finance heuristic] 采用早期企业软件团队的精简但全含现金薪酬，已把税费和福利算进去。'
- id: A18
  name: 招聘节奏
  value: Product/Integration in M4; Fraud Ops/Risk in M7; GTM lead in M10; second engineer in Q4Y2; Customer Success/Ops in Q2Y3; G&A in Q4Y3
  unit: timing
  source: '[BP team startTiming + BP sequencingRationale] 招聘顺序先证明产品，再把部署做成可重复，然后才扩 GTM 和售后支持。'
- id: A19
  name: 人员终点规模
  value: 5 FTE by Q4Y1, 6 FTE by Q4Y2, and 8 FTE by Q4Y3
  unit: FTE
  source: '[BP team + BP milestones] 组织刻意保持精简，因为滩头市场很窄；只有正式生产扩张坐实后，才补支持职能。'
- id: A20
  name: 职能 opex 方法
  value: Department lines include payroll plus cloud, travel, compliance, security review, and partner-selling costs that ramp with live deployments
  unit: policy
  source: '[BP operations + startup-finance heuristic] 各职能费用线除了工资，还包含云成本、差旅、合规、安全评审和伙伴销售支出；这些会随着上线客户增加而爬升。'
- id: A21
  name: 融资规模规则
  value: Raise enough to reach the Q4Y2 milestone and retain roughly 6 months of buffer into Y3
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] 融资目标不是只够活下去，而是要撑到第 2 年第 4 季度里程碑落地，并额外留出约 6 个月缓冲。'
- id: A22
  name: 现金流简化处理
  value: Ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: '[Startup-finance heuristic] 默认 capex、债务和营运资金扰动都很小，因此期末现金按期初现金加累计 EBITDA 近似。'
