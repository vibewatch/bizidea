problem: >-
  Payment facilitators and merchant acquirers onboarding long-tail digital merchants are getting hit by synthetic identities,
  recycled domains, and coordinated fraud rings that can generate believable applications at analyst-breaking volume. The raw
  signals already exist across KYC vendors, device and IP tools, CRM notes, and prior application logs, but investigators still
  waste hours stitching them together before deciding whether to approve, pend, or reject a merchant. That review drag either
  slows revenue-generating onboarding or lets risky merchants slip through under SLA pressure.
targetUser:
  primary: Head of merchant risk or onboarding investigations at a payment facilitator serving SMB digital merchants
  secondary: Fraud operations managers at ecommerce acquiring platforms
  buyer: VP Risk, Chief Risk Officer, or GM of merchant acquiring
startupThesis:
  nonObviousInsight: >-
    Fraud vendors keep improving individual checks, but AI-generated fraud makes the scarce resource the investigator's ability
    to combine weak signals across systems into a fast, defensible narrative. The next category winner is not another score; it
    is the casework operating layer that turns fragmented trust signals into explainable merchant decisions.
  beachhead: >-
    European and UK payment facilitators onboarding 500-5,000 SMB digital merchants per month in subscription, lead-generation,
    and online-services categories where analyst teams must manually review identity and website legitimacy before activation
  wedge: >-
    A merchant-onboarding investigation workspace that ingests email, phone, IP, domain, website, and prior application signals,
    builds an explainable merchant case graph, and outputs approve-pend-reject recommendations plus analyst-ready notes
  whyNowCatalyst: >-
    Trustfull's launch and the source-reported rise of AI-enabled fraud show that investigation workflow, not just detection
    accuracy, has become the urgent budget line for teams drowning in linked-signal reviews.
  ventureScalePath: >-
    Start with merchant onboarding investigations, then expand into payout-risk review, account takeover, first-transaction
    fraud, chargeback representment, KYB refreshes, and eventually a full fraud-operations workbench for PSPs, lenders, and
    marketplaces.
solution: >-
  The product plugs into existing KYB, risk-scoring, CRM, ticketing, and web-intelligence tools rather than replacing them. For
  each merchant application, it pulls contact points, website metadata, IP history, prior applications, analyst notes, and
  third-party checks into one case graph that highlights linked entities and contradictory evidence. Analysts can ask natural-
  language questions such as whether a new application shares infrastructure with previously rejected merchants or whether the
  domain and phone behavior match the claimed business. The system generates a human-review memo with cited evidence,
  recommended next actions, and decision rationale that can be stored for audit and partner-review purposes. Over time, the
  company can train workflow-specific playbooks on which evidence patterns actually predict post-approval losses or chargebacks.
goToMarketSeed:
  firstCustomer: >-
    A UK or EU payment facilitator with a 20-50 person merchant-risk team onboarding online subscription, creator-economy, and
    lead-generation merchants across multiple European markets
  buyingTrigger: >-
    A spike in suspicious merchant applications, a move into higher-risk verticals or new geographies, or executive pressure to
    cut approval backlog without increasing fraud losses
  currentAlternative: Manual case review across KYB vendors, device and IP tools, spreadsheets, internal rules dashboards, and ticket queues
  switchingReason: >-
    The workspace sits above the existing stack, shortens analyst decision time, and produces explainable case notes that point
    tools and homegrown dashboards do not generate consistently.
  pricingHypothesis: Annual platform fee by investigator seat plus usage pricing tied to reviewed merchant applications or completed cases
