topRisks:
  - name: Vendor adjacency
    description: Existing fraud-data and KYB vendors may add lightweight copilots and bundle them into current contracts.
    mitigation: Focus on cross-vendor case orchestration, audit trail quality, and workflow outcomes that single-signal tools cannot deliver alone.
  - name: Integration drag
    description: PSPs often have messy internal systems and custom review flows, which can slow deployment and value realization.
    mitigation: Start with browser overlays and a limited connector set for the first onboarding queue, then expand integrations after proving SLA impact.
  - name: False-confidence risk
    description: Analysts may over-trust generated recommendations and miss nuanced fraud patterns if the product is positioned as autonomous.
    mitigation: Keep humans in the approval loop, expose cited evidence behind every recommendation, and optimize first for investigation speed rather than auto-decisioning.
