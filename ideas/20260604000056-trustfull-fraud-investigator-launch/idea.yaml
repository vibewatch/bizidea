jobsToBeDone:
  - job: >-
      When a new merchant application looks suspicious, help our onboarding investigators assemble linked evidence fast, so
      they can approve good merchants quickly and stop bad ones before activation.
    currentAlternative: Manual tab-switching across risk tools, spreadsheets, CRM notes, and prior-case searches
    successMetric: Median time to decision and fraud-loss rate on newly approved merchants
  - job: >-
      When risk leadership asks why we rejected or pended a merchant, help our team produce a defensible case narrative, so we
      can satisfy partners and internal audit without reworking the investigation.
    currentAlternative: Analyst-written ticket notes and ad hoc screenshots from multiple systems
    successMetric: Time to produce a review packet and percentage of cases with complete rationale captured
