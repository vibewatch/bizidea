slug: merchant-risk-case-os
date: '2026-06-04'
executiveSummary: Merchant Risk Case OS 应先从面向英国和欧盟支付服务商、商户收单机构的调查员工作台做起，这些团队每月大约要为 500–5,000 个 SMB 数字商户开户。最急的痛点，是分析师在做出通过、挂起或拒绝决定前，要花大量时间把电话、邮箱、 IP、域名、网站、 KYB、 CRM 和历史申请证据拼起来。产品应骑在现有信号厂商和处理商工具之上，而不是替换它们，并输出带引用证据和下一步建议的可解释商户案件备忘录。日常 champion 通常是商户风控负责人或欺诈运营经理，而预算一般掌握在对欺诈损失、审批 SLA 和审计姿态负责的风控 VP、CRO 或商户收单 GM 手里。研究支持一个真实但狭窄的滩头市场：初始英国/欧盟支付服务商—收单切口的 TAM 约为 $21.2M、SAM 约为 $9.3M、三年 SOM 约为 $1.6M。这意味着第一市场在商业上讲得通，但如果没有在验证开户场景后继续向相邻工作流扩张，单靠它不足以跑出风险投资级结果。因此 GTM 应从单条开户队列的付费试点开始，由可疑申请激增、更高风险商户类目上线，或新处理商/跨境市场启动所带来的即时积压压力触发。核心风险在于：如果 Coris、Trustfull、处理商或更宽的欺诈平台“已经够用”，而创业公司又拿不出显著更快的审查速度、更干净的审计记录和更快的现有工具部署能力，就会被边缘化。当前最大的证据空白，是实践中究竟哪个 KPI 最先撬动预算，以及英国/欧盟到底有多少账户具备足够高的分析师密度，能支撑一个独立品类。
problem:
- 英国和欧盟支付服务商里的商户风控团队，至今仍要在 KYB 厂商、处理商工具、 CRM 备注、表格和历史案件检索之间调查可疑开户申请，因此审批队列增长速度往往快于分析师编制。
- 这些团队还必须为通过、挂起和拒绝决定留下可审计的依据，但现有工作流把证据拆散在截图、工单和临时备注里。
solution:
- 在现有技术栈之上叠一层商户案件工作台，把电话、邮箱、 IP、域名、网站、 KYB、 CRM 和历史申请信号拉进一张可解释案件图谱。
- 产出分析师可直接使用的“通过—挂起—拒绝”建议与引用式案件备忘录；第一天就坚持人工审批，并把记录存下来用于审计、合作伙伴复核和后续模型调优。
whyWeWin:
- 这个产品接手的是单点信号厂商和处理商至今仍留给人工的那部分工作：拼接关联商户证据、管理审查队列，并写出最终决策备忘录。
- 每审完一单，都会沉淀出更完整的商户实体图谱、集成覆盖和结果关联手册库；这些资产加起来，比任何单一信号源都更值钱。
strategicChoices:
  beachhead: 英国和欧盟的支付服务商与商户收单机构，每月为 500–5,000 个 SMB 数字商户开户，集中在订阅、导流、创作者经济和线上服务类目；这些场景在激活前本来就需要人工做欺诈审查。
  wedgeRationale: 这一切片的队列可见、操作买方明确，且审查时间、审批积压和坏商户漏出率都能做出前后对比。与其从泛欺诈运营、平台信任或宽泛合规编排切入，不如先从这里更快打出验证。
  sequencingRationale: 先做单条开户队列上的厂商中立调查覆盖层，因为买方已经有 KYB 和数字风控工具，却缺一个行动系统。等证明承保决策能更快、也更经得起辩护后，再加更深的处理商集成、结果反馈闭环和相邻工作流，例如 KYB 刷新与打款风险审查。
  notYet:
  - 在验证开户场景前，不做完整交易欺诈检测或拒付决策。
  - 没有人工审核时，不做自治式商户通过或拒绝。
  - 先不碰支付之外的平台卖家风控和贷款承保工作流。
  - 不替换在位的 KYB、处理商或数字信号厂商。
market:
  tam: 估算英国/欧盟 TAM 为 $21.2M：约 80 个潜在支付服务商—收单买方，每账户 ARR 约 $265k。
  sam: 估算滩头 SAM 为 $9.3M：35 个最匹配、且具备高量 SMB 商户承保需求的英国/欧盟账户。
  som: 估算第 3 年 SOM 为 $1.6M：通过共创客户驱动的企业销售，拿下 6 个正式生产客户，每家 ARR 约 $265k。
  segments:
  - 主要：英国和欧盟支付服务商，拥有 20–50 人商户风控团队，服务 SMB 数字商户。
  - 次要：在欧洲跨多处理商跑开户流程的商户收单机构和 PSP 风控团队。
  buyingProcess: 日常 champion 往往是商户风控负责人或欺诈运营经理，但真正拍板预算的通常是风控 VP、CRO 或商户收单 GM。最快的切入方式，是把付费试点绑在真实积压、更高风险垂类上线或新地区 rollout 上；随后还要过安全和集成评审，因为产品会触碰受监管的承保工作流。
product:
  mvp: MVP 应先支持一条开户队列，接入有限的连接器集：一个 KYB 来源、一个 CRM 或案件系统、一个处理商或内部申请日志，再加外部数字足迹数据，然后产出关联证据图谱和分析师可直接使用的备忘录。它优先解决的是人工调查提速和审计留痕，而不是自动决策。
  sixMonth: 用浏览器覆盖层或有限连接器部署，交付 2–3 个付费试点；功能包括队列视图、引用式证据备忘录，以及面向单个开户团队的“通过—挂起—拒绝”流程。
  twelveMonth: 把最常见的处理商、 CRM 和 KYB 连接器产品化，补上基于角色的审批与审计导出，并上线审查时间中位数、备忘录完整度和试点转正式生产转化率看板。
  twentyFourMonth: 从开户调查扩到 KYB 刷新、打款风险审查和放行后的商户监控，同时用历史结果调优按垂类和地理区域划分的工作流手册。
  keyBets:
  - 厂商中立的案件操作层，能在买方替换在位信号或处理商工具前先拿到预算。
  - 有限连接器集加浏览器覆盖层，足以在首条开户队列里 45 天内证明价值。
  - 附带引用证据的人在环推荐，比宣称自治承保更容易赢得信任。
  - 在同一客户内扩相邻工作流，会比过早去打更宽的新客群更快。
gtm:
  wedge: 卖的是能压缩队列时间、产出可审计案件记录的“商户开户调查付费试点”，不是泛化的 AI 欺诈 copilot。
  channels:
  - 由创始人亲自外呼英国/欧盟已命名支付服务商和收单机构中的商户风控负责人、欺诈运营经理与风控高管。
  - 和已服务这些目标账户的 KYB 厂商、数字风控厂商及实施咨询方做联合销售与转介绍。
  - 围绕高风险垂类扩张、可疑申请激增、处理商变更和跨境上线这些触发事件去卖。
  funnelTargets: 目标账户→发现：15–20%；发现→合格试点：25–35%；付费试点→正式生产：50%+；正式生产→第二工作流扩张：12 个月内 40%+。
  pricing: 先按单条开户队列收一个 8–12 周付费试点，再转成年费平台费，外加调查员席位和审查申请量分档；目标正式生产 ACV 约 $180k–$300k。因为买方真正付费的，是队列吞吐、可审计性，以及省下来的分析师扩招，而不只是多几个席位。
businessModel:
  revenueStreams:
  - 商户开户调查工作流的年度订阅
  - 实施与连接器配置费用
  - 按审查商户申请量或结案量计费的用量收入
  - 面向更多队列、地区和相邻商户风控工作流的扩展模块
  unitOfValue: 一笔已经做出决定、且证据完整可审计的商户申请
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一客户里增加更多开户队列、区域和商户垂类手册。
  - 从开户扩到 KYB 刷新、打款风险审查和放行后监控。
  - 一旦案件数据足够多，就把基准报告和结果调优手册变现。
strategyMap:
  northStarMetric: 每个调查员小时内完成决策、且具备完整审计依据的商户申请数
  inputMetrics:
  - 每笔商户申请的审查时间中位数
  - 具备完整引用证据备忘录的案件占比
  - 分析师对“通过—挂起—拒绝”建议的接受率
  - 付费试点到正式生产的转化率
  - 从签下试点到首条队列上线的天数
  moatsToBuild:
  - 把电话、邮箱、域名、 IP、历史申请、处理商和后续结果连起来的商户实体图谱
  - 按商户垂类、地区和处理商环境沉淀的结果关联调查手册
  - 跨 KYB、CRM、处理商和案件管理系统的可重复集成模板
  killCriteria:
  - 如果前 25 个合格 ICP 访谈里，不到 8 个把开户调查积压列为前二大已获预算痛点，就缩窄甚至停掉这个切口。
  - 如果前 3 个付费试点无法在分析师对证据包接受率保持 95% 以上的前提下，把审查时间中位数至少打下来 30%，那就先重做产品，再扩大 GTM。
  - 如果有限连接器部署的首次价值时间仍高于 45 天，就必须进一步缩窄 ICP，或者接受公司会变成服务密集型模式。
  mermaid: |
    flowchart LR
      Wedge[Merchant onboarding wedge] --> MVP[Case graph MVP]
      MVP --> Proof[Faster reviews and audit notes]
      Proof --> Expansion[Adjacent merchant risk workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: 工作流痛点清楚、首个客户画像也连贯，但在公司证明预算紧迫性、部署速度以及能否跳出 $9.3M 狭窄滩头之前，判断仍应保持克制。
    whyBelieve: 买方早就在为商户风控工具付费，而公开案例和 Trustfull 的发布都说明，真正还没被解决的问题是“可解释的调查工作流”，不是再加一个欺诈分数。
    whyDoubt: 滩头市场既窄又挤满相邻厂商；如果创业公司证明不出更好的队列经济性和审计能力，就很可能沦为功能插件。
    nextDiligence: 先和 5–10 个目标账户确认，到底哪个 KPI 真能撬开预算；再用单条开户队列上的付费试点，把合同转成 $180k–$300k 的正式生产单。
  firstCustomer:
    title: 一家服务 SMB 数字商户的英国支付服务商中的商户风控负责人
    profile: 一家英国或欧盟支付服务商，拥有 20–50 人商户风控团队，每月商户申请量 1,000+，同时使用多套开户工具，并对订阅、导流和线上服务类商户有明显敞口。
    trigger: 可疑申请激增、进入更高风险商户类目，或新地理区域上线，把现有手工审查能力压到极限。
    buyer: 风控 VP 或 CRO
    initialContract: 先签一条开户队列的 8–12 周付费试点，价格约 $40k–$60k；如果审查时间至少下降 30%，且备忘录完整度超过 95%，这笔费用可抵扣为一份 $180k–$300k 的年度正式生产合同。
  mustBeTrue:
  - 英国/欧盟至少有 35 个支付服务商或收单账户，具备足够高的商户风控分析师密度和开户量，值得为独立正式生产合同付费。
  - 围绕滩头工作流的有限连接器部署，能在 45 天或更短时间内交付首次价值。
  - 只要产品把审查时间拉低 30% 以上、且审计记录更干净，付费试点转正式生产的比例就能超过 50%。
  - 在位信号厂商或处理商把替代方案打包进合同之前，买方愿意先为一个调查工作台单独立项。
  - 首个部署后 12–18 个月内，至少一个相邻商户风控工作流能把 ACV 往上抬。
  diligenceQuestions:
  - 真正制造预算紧迫感的 KPI 到底是哪一个：审查提速、欺诈损失下降、商户更快激活，还是审计准备？
  - 到底有多少目标账户真的符合“月度开户量 500–5,000、分析师团队 20–50 人”这一假设画像？
  - 在没有完整处理商集成之前，浏览器覆盖层或有限连接器产品能否先交出足够 ROI？
  - 客户为什么要选它，而不是 Coris、Trustfull、Feedzai，或内部案件管理工具？
  - 在一线承保与升级复核里，最常改变商户决策的证据类型到底是什么？
operatingAssumptions:
- assumption: 英国/欧盟至少有 35 个最匹配的支付服务商与收单账户，具备足够高的开户量和分析师密度，能撑起这个滩头品类。
  basis: research.yaml
  validationTest: 列出一个实名 top-50 账户清单，估算其月度开户量、团队规模、处理商栈和商户结构，并确认其中至少 35 个符合目标画像。
  decisionImpact: 如果不成立，就把 ICP 进一步缩到更高量级的支付服务商子集，并下调短期收入预期。
- assumption: 比起降损或审计准备，审查时间下降更能更快撬开预算。
  basis: research.yaml
  validationTest: 做 10 场买方访谈，让每位买方对购买指标排序；只有当审查时间或积压缩减在多数案例中排名第一时，才继续推进。
  decisionImpact: 如果不成立，就围绕买方真正肯付钱的指标重做 GTM、证明点和产品分析。
- assumption: 在深度处理商集成还没完成前，有限连接器部署也能先证明价值。
  basis: idea.yaml
  validationTest: 用一个 KYB 来源、一个 CRM 或案件系统、一个处理商或申请日志做试点，并确认 45 天内交付首次价值，且审查时间至少下降 30%。
  decisionImpact: 如果不成立，就要更早补集成能力，并接受交付模式会更慢、更偏服务。
- assumption: 平台费 + 用量计费，比纯席位计费更符合买方采购习惯。
  basis: idea.yaml
  validationTest: 和 10 个目标买方测试三种定价框架，并在所提试点和正式生产区间内至少签下 2 个付费试点。
  decisionImpact: 如果不成立，就把定价简化到工作流或席位分档，减少采购摩擦。
- assumption: 附带引用证据的人工复核建议，比自治式决策更容易跨过信任与合规异议。
  basis: research.yaml
  validationTest: 跟踪前 5 个潜在客户在安全、合规和试点阶段提出的异议，并确认没有客户把“全自动工作流”当作购买前提。
  decisionImpact: 如果不成立，就把路线图往更深的审批自动化控制上推，或者把产品重新定位成分析工具，而不是行动系统。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 20 位商户风控负责人，并收集 5 个带完整证据链的匿名开户案件。
  hypothesis: 最强的滩头市场，是英国/欧盟里为高风险线上类目做 SMB 数字商户开户的支付服务商。
  successMetric: 至少 12 场访谈确认目标工作流属于前二大痛点，且 5 个潜在客户愿意分享真实案件制品。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 用一个 KYB 数据源、一个 CRM 或案件工具，以及一个处理商或申请日志，做出有限连接器工作流原型。
  hypothesis: 浏览器覆盖层或轻集成，已经足够把证据拼起来，并在不重建整套系统的前提下缩短审查时间。
  successMetric: 至少 1 个共创客户在完整部署前，就看到抽样调查耗时下降 20% 以上。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 在一条开户队列上跑 2–3 个付费试点，交付面向分析师的案件备忘录，并明确保留人工审批。
  hypothesis: 只要绑住真实积压痛点，付费试点就能在吞吐和审计上给出足够强的收益，支撑转正式生产。
  successMetric: 至少 2 个试点把审查时间拉低 30%，且有 1 个完成转化或进入正式生产采购。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 测试从试点转正式生产时的平台费 + 用量、平台费 + 席位，以及按工作流计费三种打包方式。
  hypothesis: 买方更偏好与已审申请量和队列吞吐挂钩的价格，而不是纯席位计费。
  successMetric: 至少 2 个试点客户接受拟议的正式生产定价结构，且无需大幅打折。
  owner: 创始人/CEO
- horizon: 180–360 天
  experiment: 把前几个试点里最常见的处理商、 CRM 和 KYB 连接器产品化。
  hypothesis: 一套可重复连接器组合，足以把部署时间压到能支撑滩头市场高效扩张的程度。
  successMetric: 后 3 个客户的部署时间中位数降到 45 天以下。
  owner: 产品/集成工程师
- horizon: 180–360 天
  experiment: 在首个正式生产客户里上线一条相邻工作流，优先从 KYB 刷新或打款风险审查二选一。
  hypothesis: 在同一 logo 内扩张，会比在开户经济性尚未跑通前就去开第二个 ICP 更容易。
  successMetric: 至少 1 个正式生产客户采用第二工作流，ACV 提升 25% 以上。
  owner: 欺诈运营负责人
operations:
- 维护一套证据分类法，把电话、邮箱、 IP、域名、网站、历史申请和第三方 KYB 信号映射进统一案件格式。
- 每周复盘分析师覆盖、缺失证据字段和决策反转，让产品优先级跟着真实调查失误走。
- 在任何可能影响商户审批状态的自动化之前，先交付基于角色的权限、审计导出和不可变案件历史。
- 把共创客户的工作流图和样本案件当成上线、QA 与手册调优的核心制品。
- 只有在试点 ROI 已具备可引用性后，才为 KYB 厂商和实施咨询伙伴建立小规模合作计划。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 亲自负责客户探索、创始人销售和共创客户交付，因为当下最大的风险在于 ICP 是否精准，以及预算紧迫性能否被证明。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭出案件图谱、证据备忘录引擎，以及跑首批真实试点所需的有限连接器。
- role: 产品/集成工程师
  startTiming: 第 3–6 个月
  rationale: 把最初的定制连接器收敛成可重复部署模板，压缩首次价值时间。
- role: 欺诈运营及风控负责人
  startTiming: 第 6–9 个月
  rationale: 把承保经验、分析师 QA 和审计要求翻成手册、指标和上线控制。
- role: GTM 负责人
  startTiming: 第 9–12 个月
  rationale: 只有在付费试点动作可复制、案例可引用、定价模型清晰之后，才扩大销售漏斗。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 20 个 ICP 访谈，并在目标英国/欧盟支付服务商—收单细分里拿下 5–10 个共创客户。
  - 围绕一条开户队列上线 2–3 个付费试点，交付引用式案件备忘录、人工审批和审计导出。
  - 至少把 1 个试点转成正式生产，并证明审查时间中位数下降 30% 以上。
  - 把部署范围收敛成一套可重复的连接器组合，覆盖早期客户里最常见的 KYB、CRM 和处理商环境。
- horizon: 12–24 个月
  items:
  - 在滩头市场拿下 6 个正式生产客户，并把首次价值时间中位数稳定在 45 天以内。
  - 在至少 2 个现有客户里上线一条相邻工作流，例如 KYB 刷新或打款风险审查。
  - 建立 3–5 个来自 KYB 厂商、数字风控厂商或实施伙伴的转介绍/联合销售关系。
  - 积累足够多案件数据，开始发布有关审查时间、备忘录完整度和分析师覆盖率的基准指标。
- horizon: 24–36 个月
  items:
  - 从开户扩展成更完整的商户风控工作台，覆盖开户、刷新、打款和放行后监控。
  - 证明现有 logo 内的扩张收入已经成为实质增长驱动，而不只是继续卖新 logo。
  - 利用商户实体图谱和结果历史，按垂类与地理区域提升推荐质量。
risks:
- risk: Coris、Trustfull、处理商或更宽的欺诈平台补上工作流缺口，并把足够多功能打包进现有合同。
  likelihood: High
  impact: High
  mitigation: 围绕跨厂商案件编排、更快部署，以及与队列结果挂钩的更强审计输出做差异化。
- risk: 集成和数据映射工作把部署拖得太慢，而滩头市场本身又不大。
  likelihood: High
  impact: High
  mitigation: 先只做一条开户队列，加浏览器覆盖层或轻量连接器集，并严格筛选技术栈更干净的客户。
- risk: 如果试点只能证明提速，却看不到降损或通过率改善，买方可能把产品当成可有可无的运营工具。
  likelihood: Medium
  impact: High
  mitigation: 围绕买方最看重的 KPI 给试点埋点，坚持付费试点，并让定价与正式生产结果挂钩，而不是泛化自动化叙事。
- risk: 分析师过度相信系统建议，进而引发错误自信和合规担忧。
  likelihood: Medium
  impact: High
  mitigation: 强制保留人工审批，展示每条建议背后的引用证据，并从首个试点起持续跟踪覆盖率与反转率。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: 这轮资金要支撑 18 个月跑道：拿下 5–10 个共创客户、为一条开户队列做出可重复连接器、把 2–3 个付费试点转成正式生产，并验证一条相邻工作流，同时避免公司滑向服务密集型集成商。
