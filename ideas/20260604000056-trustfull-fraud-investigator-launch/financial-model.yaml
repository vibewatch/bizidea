modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      TargetAccounts[Target accounts] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionCustomers[Production customers]
      ProductionCustomers --> ExpansionWorkflows[Adjacent workflows]
      ExpansionWorkflows --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by reaching 6 production customers by Q4Y2 and then lifting ACV inside a few logos through adjacent workflow expansion rather than chasing dozens of new accounts.
- checkName: Must go right
  finding: The limited-connector deployment has to stay under 45 days so paid pilots convert before implementation drag turns the business into a services-heavy model.
- checkName: Model breaks if
  finding: If buyers only fund review-time savings as a nice-to-have or sales cycles stretch past 120 days, the downside case pushes cash toward the last few quarters of buffer.
- checkName: Next-round proof
  finding: The next financing is justified by proving 6 production customers, repeatable sub-45-day deployments, and at least 2 adjacent-workflow expansions by Q4Y2.
sanityChecks:
  ruleOf40: Y3 growth 84.1% + EBITDA margin -5.7% = 78.4%; healthy for a pre-seed company, though still supported by a small Y2 base.
  burnMultiple: Y2 burn multiple is about 0.7x based on $0.61M of EBITDA burn to add roughly $0.87M of ARR from about $0.72M at Q4Y1 run-rate to about $1.59M at Q4Y2 run-rate.
  revenuePerFte: $262.7K Y3 revenue using 8 Q4Y3 FTE (benchmark roughly $200–400K enterprise SaaS).
  flags:
  - The beachhead is intentionally narrow, so the model relies on ACV expansion and not just logo count to become attractive enough for the next round.
  - Gross margin only reaches the 70% target if limited-connector deployments stay repeatable; bespoke processor work would quickly erode the base case.
  - Cash bottoms near $630K in the base case, which is workable but leaves little room for a long pilot-to-production delay without slowing hiring or raising earlier.
