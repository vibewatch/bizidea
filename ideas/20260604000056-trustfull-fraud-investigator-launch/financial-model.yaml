slug: merchant-risk-case-os
date: '2026-06-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-04] Model starts the month after the dated plan so funding is available before operating spend begins.'
- id: A2
  name: Opening cash
  value: '2200.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $2–3M] Base case uses a $2.2M pre-seed near the middle of the stated range because the beachhead is narrow and the hiring plan stays lean.'
- id: A3
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP milestones 0–12 months] The company starts pre-revenue and must first secure design partners before the first paid pilot begins.'
- id: A4
  name: Paid pilot price
  value: '50.0'
  unit: USDK per 8-12 week pilot
  source: '[BP investorMemo.initialContract $40k-$60k] Base case uses the midpoint of the pilot range.'
- id: A5
  name: Initial production ACV
  value: '220.0'
  unit: annualK per customer
  source: '[BP gtm.pricing $180k-$300k production ACV] Base case enters production slightly above the low end to reflect one onboarding queue and limited initial connector scope.'
- id: A6
  name: Beachhead production ACV by Q4Y2
  value: '265.0'
  unit: annualK per customer
  source: '[BP market.tam and market.som roughly $265k ARR per account] Q4Y2 pricing reaches the business-plan market-sizing benchmark once pilots convert to standard production contracts.'
- id: A7
  name: Y3 exit ACV
  value: '300.0'
  unit: annualK per customer
  source: '[BP product.twentyFourMonth + BP businessModel.expansionLevers] Mature customers expand toward a broader merchant-risk workbench with one adjacent workflow, pushing realized ACV above the core onboarding-only level by Y3.'
- id: A8
  name: Y1 paying-customer ramp
  value: M6 1, M8 2, M10 3, M12 3 paying customers
  unit: customersEop
  source: '[BP product.sixMonth + BP milestones 0–12 months] Fits 2-3 paid pilots and at least one production conversion in the first year.'
- id: A9
  name: Y2 customer ramp
  value: Q1Y2 3, Q2Y2 4, Q3Y2 5, Q4Y2 6 customers
  unit: customersEop
  source: '[BP milestones 12–24 months] Directly anchored to reaching 6 production customers in the beachhead by the end of year 2.'
- id: A10
  name: Y3 customer ramp
  value: Q1Y3 6, Q2Y3 7, Q3Y3 8, Q4Y3 8 customers
  unit: customersEop
  source: '[BP milestones 24–36 months + BP market.som] Base case adds only modest new-logo growth beyond the 6-customer beachhead and relies more on ACV expansion than vanity logo volume.'
- id: A11
  name: Revenue recognition method
  value: customersEop × blended realized price for the month or quarter
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams] Used so reported revenue reconciles directly to paying-customer counts and the pricing ladder without a separate cohort table.'
- id: A12
  name: Y1 gross margin
  value: '55.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] Early pilots are services-heavier because connector setup, analyst QA, and implementation support are still manual.'
- id: A13
  name: Y2 gross margin
  value: '62.0'
  unit: percent
  source: '[BP product.twelveMonth + BP operatingAssumptions limited-connector deployment] Margin improves after the most common KYB, CRM, and processor connectors become repeatable.'
- id: A14
  name: Y3 gross margin
  value: '70.0'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] Base case reaches the stated long-run software margin once onboarding and one adjacent workflow are productized.'
- id: A15
  name: Monthly logo churn for unit economics
  value: '1.0'
  unit: percent
  source: '[Startup-finance heuristic for annual-contract enterprise SaaS] A narrow but mission-critical risk workflow can support about 1% monthly churn if it stays embedded in regulated review operations.'
- id: A16
  name: Steady-state CAC
  value: '120.0'
  unit: USDK per customer
  source: '[BP buyingProcess + BP gtm founder-led outbound + startup-finance heuristic] Enterprise risk sales with paid pilots, security review, and long buying cycles warrant six-figure acquisition cost.'
- id: A17
  name: Loaded salary bands
  value: Founder/CEO 180; Engineering 200; Product/Integration 175; Fraud Ops/Risk 170; Sales/GTM 180; Customer Success/Ops 150; G&A 120
  unit: annualK per FTE
  source: '[BP team + startup-finance heuristic] Uses lean but fully loaded cash compensation including taxes and benefits for an early enterprise software team.'
- id: A18
  name: Hiring schedule
  value: Product/Integration in M4; Fraud Ops/Risk in M7; GTM lead in M10; second engineer in Q4Y2; Customer Success/Ops in Q2Y3; G&A in Q4Y3
  unit: timing
  source: '[BP team startTiming + BP sequencingRationale] Hiring follows product proof first, then deployment repeatability, then GTM scale and post-sale support.'
- id: A19
  name: Headcount endpoint
  value: 5 FTE by Q4Y1, 6 FTE by Q4Y2, and 8 FTE by Q4Y3
  unit: FTE
  source: '[BP team + BP milestones] Keeps the org deliberately lean for a narrow beachhead and delays support functions until production expansion is real.'
- id: A20
  name: Functional opex method
  value: Department lines include payroll plus cloud, travel, compliance, security review, and partner-selling costs that ramp with live deployments
  unit: policy
  source: '[BP operations + startup-finance heuristic] SalaryK is shown as a memo line for reconciliation, while EBITDA is driven by the fully loaded functional opex lines.'
- id: A21
  name: Funding sizing rule
  value: Raise enough to reach the Q4Y2 milestone and retain roughly 6 months of buffer into Y3
  unit: policy
  source: '[BP fundingAsk runwayMonths 18 + model requirement] The raise targets milestone completion plus an additional six months of cushion, not the bare minimum survival case.'
- id: A22
  name: Cash flow simplification
  value: Ending cash equals opening cash plus cumulative EBITDA
  unit: formula
  source: '[Startup-finance heuristic] Assumes minimal capex, debt, and working-capital distortion for an asset-light software startup.'
