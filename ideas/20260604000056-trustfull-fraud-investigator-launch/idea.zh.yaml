topRisks:
- name: 厂商近身竞争
  description: 现有欺诈数据和 KYB 厂商可能会上轻量 copilot，再直接打包进现有合同。
  mitigation: 把重点放在跨厂商案件编排、审计链质量，以及单信号工具单独做不出来的工作流结果上。
- name: 集成拖累
  description: PSP 的内部系统和审查流程往往很乱，容易拖慢部署和价值兑现。
  mitigation: 先从浏览器覆盖层和首条开户队列的有限连接器集开始，证明 SLA 改善后再扩展集成。
- name: 错误自信风险
  description: 如果把产品定位成“自动驾驶”，分析师可能会过度相信系统建议，漏掉更细微的欺诈模式。
  mitigation: 把人工审批牢牢留在环路里，每条建议都展示引用证据，先优化调查速度，而不是急着做自动决策。
