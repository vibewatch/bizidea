jobsToBeDone:
- job: 当一笔新商户申请看起来可疑时，帮开户调查员尽快把关联证据拼起来，这样他们能更快放过好商户，也能在激活前拦下坏商户。
  currentAlternative: 在风控工具、表格、 CRM 备注和历史案件检索之间来回切标签页。
  successMetric: 决策耗时中位数，以及新批准商户上的欺诈损失率。
- job: 当风控负责人追问为什么要拒绝或挂起某个商户时，帮团队快速产出一套站得住脚的案件叙事，这样就不用返工调查也能应对合作伙伴和内部审计。
  currentAlternative: 分析师手写工单备注，加上从多个系统临时截取的截图。
  successMetric: 产出审查材料包所需时间，以及完整记录决策依据的案件占比。
