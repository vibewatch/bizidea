problem: 服务长尾数字商户的支付服务商和商户收单机构，正被合成身份、重复利用的域名以及协同作案的欺诈团伙持续冲击。这些团伙能以让分析师招架不住的量，批量生成看上去可信的申请。原始信号其实已经散落在 KYC 供应商、设备和 IP 工具、CRM 备注以及历史申请日志里，但调查员在决定放行、挂起还是拒绝商户前，仍要花上几个小时把这些信息拼起来。结果要么拖慢能带来收入的开户流程，要么在 SLA 压力下让高风险商户漏网。
targetUser:
  primary: 服务 SMB 数字商户的支付服务商内，负责商户风控或开户调查的负责人
  secondary: 电商收单平台上的欺诈运营经理
  buyer: 风控 VP、首席风控官，或商户收单业务 GM
startupThesis:
  nonObviousInsight: 欺诈厂商还会继续把单点检查做得更强，但 AI 生成式欺诈让真正稀缺的资源变成了调查员：他能不能把分散在各系统里的弱信号，迅速串成一套站得住脚的叙事。下一个品类赢家不会是又一个评分，而是把碎片化信任信号变成可解释商户决策的案件操作层。
  beachhead: 英国和欧洲的支付服务商，尤其是每月要为 500–5,000 个 SMB 数字商户开户、且集中在订阅、导流和线上服务类目的团队；这类团队在激活前本就得手工核查身份和网站真实性。
  wedge: 一个商户开户调查工作台，接入邮箱、电话、 IP、域名、网站和历史申请信号，构建可解释的商户案件图谱，并输出“通过—挂起—拒绝”的建议和分析师可直接使用的备注。
  whyNowCatalyst: Trustfull 的发布，以及来源中提到的 AI 欺诈抬头，都说明现在最急的预算项已经不只是检测准确率，而是如何把淹没在关联信号审查里的调查工作流压缩下来。
  ventureScalePath: 先从商户开户调查切入，再扩展到打款风险审查、账户接管、首笔交易欺诈、拒付申诉、KYB 刷新，最终做成服务 PSP、贷款方和平台市场的完整欺诈运营工作台。
solution: 产品不替换现有 KYB、风险评分、 CRM、工单和网络情报工具，而是骑在这些系统之上。每一笔商户申请进来后，它会把联系方式、网站元数据、 IP 历史、历史申请、分析师备注和第三方检查拉进同一张案件图谱，重点标出关联实体和相互矛盾的证据。分析师可以直接提自然语言问题，比如一笔新申请是否和此前被拒商户共用基础设施，或者域名与电话号码行为是否符合其自称业务。系统会生成一份人工审查备忘录，附带引用证据、下一步建议和决策理由，可直接存档以满足审计和合作伙伴复核。随着时间积累，公司还能围绕具体工作流训练手册，找出哪些证据模式最能预测放行后的损失或拒付。
goToMarketSeed:
  firstCustomer: 一家英国或欧盟支付服务商，拥有 20–50 人的商户风控团队，在多个欧洲市场为线上订阅、创作者经济和导流型商户开户。
  buyingTrigger: 可疑商户申请突然上升、业务进入更高风险垂类或新地理市场，或管理层要求在不增加欺诈损失的前提下消化审批积压。
  currentAlternative: 在 KYB 厂商、设备和 IP 工具、表格、内部规则看板与工单队列之间手工审案。
  switchingReason: 这个工作台搭在现有栈之上，能缩短分析师决策时间，并稳定产出单点工具和自研看板很难持续给出的可解释案件记录。
  pricingHypothesis: 按调查员席位收年费平台费，再叠加按审查商户申请量或结案量计费。
