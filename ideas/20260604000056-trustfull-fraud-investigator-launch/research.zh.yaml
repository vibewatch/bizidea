- name: Trustfull
  stage: scale-up
  wedge: 围绕电话、邮箱、 IP、域名和开户信号的数字足迹与对话式调查
  pricing: 15 天免费试用；企业定价未公开
  strength: 信号情报能力很强，也已经证明商户开户买方会接受 AI 辅助调查。
  weaknessVsUs: 更偏信号和编排，不像一个完整的支付服务商案件 OS，缺少队列、审批和后续工作流归属。
  sourceRefs:
  - 7
  - 14
  - 31
- name: Feedzai
  stage: incumbent
  wedge: 面向收单机构和 PSP 的统一风控平台，覆盖商户与交易欺诈
  pricing: 企业定制定价；未公开
  strength: 在收单机构中信誉深、规则灵活，且为大型支付组织提供集成式案件管理。
  weaknessVsUs: 定位更宽，也更偏交易风控，而不是“商户承保优先”的调查。
  sourceRefs:
  - 13
  - 15
- name: LegitScript
  stage: incumbent
  wedge: 面向支付服务商与 ISO 的商户开户和持续监控，政策与合规能力很深
  pricing: 企业定制定价；未公开
  strength: 商户政策专业度强，在支付领域也有较高辨识度的客户背书。
  weaknessVsUs: 更偏商户政策监控，不擅长跨身份信号快速拼案提速。
  sourceRefs:
  - 18
- name: Sardine
  stage: scale-up
  wedge: 覆盖欺诈、开户、设备、行为与 AML 的端到端平台，带 AI agents
  pricing: 企业定制定价；未公开
  strength: 现代化统一栈，能够在开户和欺诈运营里替换多家厂商。
  weaknessVsUs: 并不明显是为商户收单机构承保调查这个场景专门打造。
  sourceRefs:
  - 16
regulatoryTechnicalConstraints:
- point: 商户决策需要留下可审计的依据，并与英国和欧盟支付及 AML 指引对齐，尤其是在延迟处理或升级可疑活动时。
  sourceRefs:
  - 20
  - 21
  - 23
  - 24
- point: 产品必须接入处理商、 CRM、 KYB 和外部数字风控数据，同时守住隐私、权限控制和人工复核。
  sourceRefs:
  - 14
  - 19
  - 24
- point: 想把检测做强，离不开跨电话、邮箱、 IP、设备和域名的图谱与关联分析，但给出的建议又必须解释得清，能让分析师和审计接受。
  sourceRefs:
  - 25
  - 27
validationSignals:
- point: Trustfull 在 2025 年融资 €6M，用于扩张其欧洲欺诈预防平台。
  sourceRefs:
  - 30
- point: TeamSystem 已部署 Trustfull，强化 TS Pay 面向 SMB 商户的开户风控。
  sourceRefs:
  - 31
- point: Coris 的客户研究提到审查时间下降 30% 到约 67%，同时损失下降、文档负担减轻。
  sourceRefs:
  - 10
  - 11
  - 12
- point: 随着有组织团伙把攻击量继续推高，欺诈负责人仍在为身份风控工具留预算。
  sourceRefs:
  - 33
  - 34
openQuestions:
- 英国和欧盟到底有多少支付服务商或收单机构，其商户风控团队规模大到值得上独立调查平台，而不是继续用打包工具？
- 第一笔预算在现实里到底由哪个指标拿下：更快放行商户、放行后欺诈损失更低，还是审计准备更充分？
- 一个轻集成的初版产品能不能先交付价值，还是买方在切换前就要求处理商级别的工作流深度？
- 处理商和更宽的欺诈平台，会以多快速度补上商户审查 copilot，压缩独立切口？
