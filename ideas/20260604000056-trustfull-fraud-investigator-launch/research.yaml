reportMemo:
  executiveTakeaways:
    - >-
      The strongest near-term pain is not finding one more fraud score; it is
      collapsing merchant-review casework that still spans spreadsheets, Slack,
      processor alerts, and ad hoc web research into one explainable workflow.
    - >-
      The beachhead is commercially real but narrow: UK/EU merchant-acquirer
      investigation software looks like a roughly $9M-$21M ARR wedge, so the
      venture case depends on expanding into adjacent fraud and compliance
      workflows after winning onboarding.
    - >-
      Competitive whitespace exists between signal vendors such as Trustfull and
      broader merchant-risk systems such as Coris or Feedzai; the proposed
      startup must own the explainable merchant case graph and analyst workflow.
    - >-
      Regulation and market fragmentation favor audit-ready notes, configurable
      playbooks, and geography-specific integrations over a generic AI copilot.
  marketDefinition: >-
    The product category is merchant-onboarding investigation software for
    payment facilitators, acquirers, and adjacent PSPs: a system that pulls KYB,
    digital-footprint, processor, CRM, and prior-case data into one case graph
    so analysts can approve, pend, or reject merchants before activation.
  customerAndBuyer: >-
    The operational user is the merchant-risk or fraud-operations manager who
    supervises onboarding reviews and escalations; the economic buyer is usually
    a VP Risk, CRO, or GM of merchant acquiring who owns fraud losses, approval
    SLAs, and regulatory posture across payment operations. [8][10][11][20]
  buyingTriggers:
    - point: >-
        Suspicious-application spikes, expansion into higher-risk merchant
        categories, or industrialized fraud rings can swamp manual review queues
        and force a rethink of casework capacity.
      sourceRefs: [7, 18, 29]
    - point: >-
        Multi-processor growth exposes the limits of Slack, spreadsheets, and
        disconnected alerts, especially when analysts need a single merchant
        view across processors and geographies.
      sourceRefs: [11, 13]
    - point: >-
        Risk-based payment controls and AML guidance increase the need for
        auditable rationales, structured delays, and defensible merchant
        decisions.
      sourceRefs: [20, 21, 23, 24]
  willingnessToPay:
    summary: >-
      Buyers can justify budget when a platform materially cuts review time,
      reduces manual documentation, and avoids losses from bad merchants getting
      live. The clearest public evidence is operational ROI: Coris references a
      two-thirds reduction in review time at Quilt, a 30% reduction at Zift, and
      materially lower documentation requests and fraud losses at Ignition,
      while Feedzai highlights false-positive reduction and analyst efficiency at
      Unzer. [10][11][12][13]
    sourceRefs: [10, 11, 12, 13]
  competitiveLandscape: >-
    Coris is the closest direct "merchant risk operating system" competitor;
    Trustfull, SEON, and LexisNexis are stronger on raw digital-identity or
    link-analysis signals; Feedzai, Sardine, and Alloy are broader fraud and
    identity platforms; LegitScript is a merchant-policy and compliance
    specialist. That leaves room for a payfac-native investigator workspace that
    sits above existing vendors, assembles explainable evidence, and writes the
    analyst memo that current tools often leave to humans. [7][14][15][16][17][18][19][27]
  incumbentThesis:
    - incumbentClass: Processor and native acquirer tools
      point: >-
        They control valuable transaction data, but customer references still
        describe fragmented alerts, limited merchant context, and weak
        cross-processor case assembly before teams adopt a dedicated workflow
        layer.
      sourceRefs: [10, 11, 15]
    - incumbentClass: Identity orchestration platforms
      point: >-
        Platforms such as Alloy offer broad partner ecosystems and workflow
        engines, but their positioning is generic identity and fraud
        orchestration rather than merchant-underwriting-specific investigation
        playbooks.
      sourceRefs: [19, 25]
    - incumbentClass: Digital signal vendors
      point: >-
        Trustfull and similar vendors are strong at phone, email, IP, and
        domain checks, but the public messaging centers on signal access and AI
        summarization more than end-to-end merchant-review operations.
      sourceRefs: [7, 14, 27]
    - incumbentClass: Generic internal tooling
      point: >-
        Spreadsheets, tickets, and chat channels are cheap defaults, but public
        case studies show they break under growth because they do not preserve a
        complete, auditable merchant record or consistent workflow.
      sourceRefs: [11, 12]
  regulatoryLandscape: >-
    The regulatory backdrop is heavy enough that explainability matters. UK
    payment institutions and EMIs operate under FCA guidance that is evolving
    alongside fraud controls, while EU PSPs remain anchored in PSD2 and related
    AML risk-factor guidance. For merchant-risk teams, this means retaining
    structured evidence, risk-based rationale, and consistent reviews is not
    just operationally useful; it supports regulatory scrutiny, scheme pressure,
    and internal audit. [20][21][23][24]
  technologyLandscape: >-
    The underlying building blocks already exist: API-first fraud tooling for
    payment gateways, link analysis across IP/device/contact points, digital
    identity intelligence, and explainable AI/case management. The hard part is
    stitching them into merchant-specific workflows and keeping humans in the
    loop with source-backed case summaries. [15][19][25][27]
  distributionChannels:
    - point: >-
        Direct sales to heads of merchant risk, acquiring risk, or fraud
        operations is the clearest first channel because the pain is workflow
        specific and measurable in review-time and loss metrics.
      sourceRefs: [8, 10]
    - point: >-
        Partnerships with KYB, fraud-data, and orchestration vendors can shorten
        integration cycles and position the product as the workflow layer above
        an existing stack.
      sourceRefs: [19, 25, 31]
    - point: >-
        Expansion events such as processor changes, new-market launches, or
        movement into higher-risk merchant categories create natural entry
        points.
      sourceRefs: [11, 13, 20]
  partnershipEcosystem:
    - point: >-
        Digital-footprint and KYB partners are critical because buyers already
        use them and will prefer a tool that orchestrates rather than replaces
        those signals.
      sourceRefs: [14, 19, 25]
    - point: >-
        Processor and payment-platform integrations matter because merchant risk
        teams need case context from onboarding through monitoring and payouts.
      sourceRefs: [11, 15]
    - point: >-
        Compliance and market-entry partners can help encode geography-specific
        merchant policies, acquiring rules, and documentation standards.
      sourceRefs: [18, 20, 23]
  dataMoats:
    - point: >-
        A merchant entity graph that links domains, phones, emails, prior
        applications, processors, and downstream outcomes becomes more valuable
        with each reviewed case.
      sourceRefs: [27, 31]
    - point: >-
        Analyst-authored memos paired with eventual fraud or chargeback outcomes
        can train workflow-specific playbooks that generic signal vendors do not
        naturally accumulate.
      sourceRefs: [10, 12]
    - point: >-
        Cross-customer pattern learning around false positives, ring behavior,
        and investigation sequences can improve triage quality over time.
      sourceRefs: [13, 33, 34]
  geographicConsiderations:
    - point: >-
        Europe is fragmented by country, language, payment method, and local
        acquiring preferences, so the product needs configurable market-specific
        workflows rather than one universal ruleset.
      sourceRefs: [1, 2]
    - point: >-
        The UK is disproportionately important because a large share of European
        acquirers focus there, but UK FCA guidance and remedies create local
        documentation and compliance nuance.
      sourceRefs: [1, 5, 20, 21]
    - point: >-
        SMB-heavy onboarding flows are especially suitable because thinner-file
        merchants often need digital-footprint evidence to supplement traditional
        risk checks.
      sourceRefs: [31, 14]
  sensitivityCases:
    - case: Processor-native AI closes the workflow gap
      impact: >-
        If processors or large fraud platforms bundle merchant-case assistants
        into existing contracts, new-vendor budget and ASP could compress.
      sourceRefs: [15, 19]
    - case: ROI comes mostly from speed, not loss reduction
      impact: >-
        If buyers only see analyst-time savings and not lower fraud losses or
        better acceptance, procurement may treat the product as a nice-to-have
        operations tool.
      sourceRefs: [12, 13, 33]
    - case: Integration takes longer than promised
      impact: >-
        Slow processor, CRM, or vendor integrations would narrow the reachable
        SAM to acquirers with cleaner stacks and slower-growing queues.
      sourceRefs: [11, 20]
  validationPlan:
    - priority: high
      question: >-
        Which KPI unlocks budget fastest: review-time reduction, lower fraud
        losses, or faster merchant approval?
      evidenceToGather: 5-10 buyer interviews plus baseline-to-post-pilot metrics from one onboarding queue
    - priority: high
      question: How many UK/EU payfacs and acquirers have enough merchant-risk analyst density to support a dedicated category?
      evidenceToGather: Named account list, risk-team size estimates, and monthly onboarding volumes for the top 50 target accounts
    - priority: medium
      question: Can a browser-overlay or limited-connector product deliver value before full processor integration?
      evidenceToGather: Time-to-first-value tests with one KYB source, one CRM, and one processor
    - priority: medium
      question: Which evidence types are decisive in first-line underwriting versus escalation reviews?
      evidenceToGather: Sample closed cases labeled by approval outcome and strongest decision signal
analysisModels:
  marketMapDiagram:
    title: Merchant risk investigation market
    mermaid: |
      quadrantChart
        title Merchant risk investigation market
        x-axis Low workflow depth --> High workflow depth
        y-axis Low signal intelligence --> High signal intelligence
        quadrant-1 Signal vendors
        quadrant-2 Full-stack leaders
        quadrant-3 Generic tools
        quadrant-4 Merchant ops systems
        Trustfull: [0.58, 0.84]
        Coris: [0.86, 0.63]
        Feedzai: [0.73, 0.60]
        LegitScript: [0.64, 0.48]
        Proposed startup: [0.90, 0.88]
  fiveForces:
    supplierPower:
      score: 3
      rationale: >-
        Data vendors and processors matter, but the ecosystem is broad enough
        that no single upstream source should dominate if the product stays
        vendor-neutral and API-first.
      sourceRefs: [19, 25]
    buyerPower:
      score: 4
      rationale: >-
        The target buyer universe is concentrated, enterprise pricing is mostly
        custom, and referenceable ROI is required to win budget.
      sourceRefs: [1, 5, 10]
    threatOfEntrants:
      score: 3
      rationale: >-
        New entrants can assemble the software stack, but integrations,
        compliance credibility, and historical case-outcome data still create
        meaningful friction.
      sourceRefs: [17, 19, 20]
    threatOfSubstitutes:
      score: 4
      rationale: >-
        Buyers can patch together processor tools, spreadsheets, signal vendors,
        and broader fraud platforms, so the startup must prove materially better
        workflow outcomes.
      sourceRefs: [10, 11, 15]
    competitiveRivalry:
      score: 4
      rationale: >-
        Several adjacent vendors are already adding AI assistants, case
        management, and merchant monitoring, even if few are centered on the
        exact payfac-investigator wedge.
      sourceRefs: [14, 15, 16, 17, 18]
  pestle:
    - factor: political
      impact: neutral
      point: >-
        Payments regulation in the UK and EU continues to evolve, which raises
        compliance workload but also supports spend on defensible risk tooling.
      sourceRefs: [20, 24]
    - factor: economic
      impact: positive
      point: >-
        Electronic payments continue to grow in Europe, expanding the merchant
        base and transaction flows that acquirers must underwrite and monitor.
      sourceRefs: [6]
    - factor: social
      impact: positive
      point: >-
        Fraud professionals increasingly attribute attacks to organized rings,
        which makes explainable linked-evidence workflows more urgent.
      sourceRefs: [29, 34]
    - factor: technological
      impact: positive
      point: >-
        Link analysis, digital-footprint checks, and AI-assisted case summaries
        are commercially available building blocks for a specialized product.
      sourceRefs: [14, 25, 27]
    - factor: legal
      impact: negative
      point: >-
        AML, PSD2, and FCA guidance imply auditability and careful handling of
        sensitive payment and identity data.
      sourceRefs: [21, 23, 24]
    - factor: environmental
      impact: neutral
      point: >-
        Environmental factors are not a primary demand driver relative to fraud,
        compliance, and operational efficiency.
      sourceRefs: [1]
  adoptionFrictionMatrix:
    - friction: Integration with processors, CRMs, and existing risk tools
      severity: high
      affectedBuyer: Merchant-risk leader at multi-processor payfacs
      mitigation: Start with one onboarding queue and a limited connector set before broad rollout
      sourceRefs: [11, 15]
    - friction: Analyst over-trust in AI summaries
      severity: medium
      affectedBuyer: Fraud operations managers and auditors
      mitigation: Keep source-backed evidence and human approval in the core workflow
      sourceRefs: [7, 17]
    - friction: Budget competition with bundled fraud platforms
      severity: high
      affectedBuyer: VP Risk or CRO
      mitigation: Sell on measurable queue reduction, auditability, and merchant-specific workflows
      sourceRefs: [15, 19]
    - friction: Market-by-market policy variation across Europe
      severity: medium
      affectedBuyer: Cross-border acquirers and PSPs
      mitigation: Provide configurable playbooks, templates, and exportable audit notes by geography
      sourceRefs: [1, 20, 23]
