competitors:
  - name: Coris
    stage: scale-up
    wedge: Merchant-risk operating system for onboarding, monitoring, disputes, and AI-assisted investigations
    pricing: Custom enterprise pricing; not public
    strength: Strongest direct system-of-record positioning with explicit merchant-risk workflows and measurable case-study ROI
    weaknessVsUs: Broader merchant-risk stack may leave room for deeper explainable external-evidence graphs and lighter onboarding-specific deployment
    sourceRefs: [10, 11, 12, 17]
  - name: Trustfull
    stage: scale-up
    wedge: Digital-footprint and conversational investigation across phone, email, IP, domain, and onboarding signals
    pricing: 15-day free trial; enterprise pricing not public
    strength: Excellent signal intelligence and live proof that merchant-onboarding buyers will adopt AI-assisted investigation
    weaknessVsUs: More signal-and-orchestration oriented than a full payfac case OS with queueing, approvals, and downstream workflow ownership
    sourceRefs: [7, 14, 31]
  - name: Feedzai
    stage: incumbent
    wedge: Unified risk management for acquirers and PSPs across merchant and transaction fraud
    pricing: Custom enterprise pricing; not public
    strength: Deep acquirer credibility, flexible rules, and integrated case management for large payment organizations
    weaknessVsUs: Positioning is broader and more transaction-centric than merchant-underwriting-first investigations
    sourceRefs: [13, 15]
  - name: LegitScript
    stage: incumbent
    wedge: Merchant onboarding and continuous monitoring for payfacs and ISOs with strong policy and compliance depth
    pricing: Custom enterprise pricing; not public
    strength: Strong merchant-policy expertise and recognizable payments references
    weaknessVsUs: More focused on merchant-policy monitoring than on analyst-speed case assembly across identity signals
    sourceRefs: [18]
  - name: Sardine
    stage: scale-up
    wedge: End-to-end fraud, onboarding, device, behavior, and AML platform with AI agents
    pricing: Custom enterprise pricing; not public
    strength: Modern unified stack that can replace multiple vendors across onboarding and fraud ops
    weaknessVsUs: Not obviously purpose-built for merchant-acquirer underwriting investigations
    sourceRefs: [16]
regulatoryTechnicalConstraints:
  - point: >-
      Merchant decisions need audit-ready rationales that align with UK and EU
      payment and AML guidance, especially when delaying or escalating
      suspicious activity.
    sourceRefs: [20, 21, 23, 24]
  - point: >-
      The product must integrate processor, CRM, KYB, and external-digital-risk
      data while preserving privacy, access controls, and human review.
    sourceRefs: [14, 19, 24]
  - point: >-
      High-performing detection requires graph and link analysis across phones,
      emails, IPs, devices, and domains, but recommendations must remain
      explainable enough for analysts and auditors.
    sourceRefs: [25, 27]
validationSignals:
  - point: Trustfull raised €6M in 2025 to expand its European fraud-prevention platform
    sourceRefs: [30]
  - point: TeamSystem deployed Trustfull to strengthen TS Pay merchant onboarding for SMB merchants
    sourceRefs: [31]
  - point: Coris customer studies report 30% to roughly 67% review-time reduction plus lower losses and less documentation burden
    sourceRefs: [10, 11, 12]
  - point: Fraud leaders continue to budget for identity risk tooling as organized rings drive attack volumes higher
    sourceRefs: [33, 34]
openQuestions:
  - How many UK and EU payfacs or acquirers have merchant-risk teams large enough to justify a dedicated investigator platform instead of bundled tools?
  - Which metric wins the first budget line item in practice: faster merchant approval, lower post-approval fraud losses, or audit readiness?
  - Can an initial product deliver value with light integrations, or do buyers require processor-grade workflow depth before switching?
  - How quickly will processors and broader fraud platforms add merchant-review copilots that narrow the standalone wedge?
