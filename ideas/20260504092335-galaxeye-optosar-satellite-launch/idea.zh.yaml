problem: >-
  边境与海岸监控团队最需要持续盯梢的时候，往往正是云层、黑夜和恶劣天气把光学画面和无人机出勤一起掐掉的时候。现在他们通常得把光学影像、SAR 影像和无人机画面分开采购，再交给分析师手工把证据拼回一条线。这样一来，告警既慢又不稳定，真要长期盯住一大批资产，成本很快就扛不住。
targetUser:
  primary: 为印度边境与海岸监控项目交付系统的国防系统集成商中的地理空间运营负责人
  secondary: 印度各邦灾害响应机构中的地理空间分析师
  buyer: 国防集成商中负责 ISR 软件的项目总监或业务单元负责人
startupThesis:
  nonObviousInsight: >-
    真正变局不在于市场上又多了一个影像来源，而在于 EO 和 SAR 终于能在同一平台上拿到手，很多原本靠人工做的配准和流程损耗都能被直接砍掉。于是软件公司卖的就不必再是原始像素，而可以是可执行的告警和能直接上桌的证据包。
  beachhead: >-
    为支持单一边境或沿海战区司令部的印度国防集成商，提供针对边境道路、临时营地、桥梁和海岸登陆点的监控清单。
  wedge: >-
    一层任务编排与变化检测系统，把融合 OptoSAR 场景转成机器可读的监控清单、异常告警，以及供分析师直接使用的证据包，覆盖预先批准的资产。
  whyNowCatalyst: >-
    GalaxEye 的发射把本土商业 OptoSAR 数据源送上轨道，而当前信号集合又集中指向全天候国防场景和不断增强的市场合法性，时机正好。
  ventureScalePath: >-
    先从国防监控清单切入，再扩到灾害响应、关键基础设施监测、海域态势感知，以及为保险公司和工业资产运营方提供嵌入式数据产品——这些客户都需要在云层覆盖下保持可靠监测。
solution: >-
  产品先把融合 OptoSAR 场景接进来，再直接对齐到客户关心的具名资产和多边形区域，而不是把原始影像甩给分析师自己去翻。系统会围绕道路、建筑、营地和海岸活动吐出变化告警，并把对应的 EO 与 SAR 证据、置信度分数和审核流程一起打包。客户可以先在单一区域里设定重访规则、升级阈值和资产特定基线，跑顺以后再往更大的战区扩。随着数据越积越多，系统还能按不同地形和季风季节里的误报模式持续收敛。
goToMarketSeed:
  firstCustomer: >-
    在某个高云量边境区域负责边境监控部署的印度国防集成商项目经理。
  buyingTrigger: >-
    新监控合同启动、季风应急检查，或是需要在夜间持续监测站点而无人机和光学覆盖又变得不可靠。
  currentAlternative: >-
    依赖独立的光学影像供应商、单独的 SAR 数据流、无人机画面和内部 GIS 拼接的人工作业流程。
  switchingReason: >-
    相比内部地理空间团队手工做配准、比对和汇报，这个产品能更快把融合数据变成可执行告警和证据包。
  pricingHypothesis: >-
    按监控区域收取年度平台订阅费，再按处理的监控清单覆盖平方公里数收取用量费。
whyNow:
  - point: 同平台 EO 与 SAR 供给如今已经成为现实，客户终于可以买到融合监测，而不是自己把不同供应商的数据缝起来。
    signalRefs:
      - 商业化 OptoSAR 已真正落地
    sourceRefs: [1, 3]
  - point: 头号产品价值就是在云层和黑夜中仍能稳定成像，这让光学在线率缺口变成了必须立项的预算问题。
    signalRefs:
      - 全天候成像是核心价值
    sourceRefs: [2, 5]
  - point: 国防和灾害响应已经是被点名的使用场景，因此滩头市场不需要从零教育客户。
    signalRefs:
      - 国防与灾害流程是最早需求方
    sourceRefs: [3]
  - point: SpaceX 发射带来的可信度、报道中的全球关注，以及印度总理的公开背书，都在降低早期买家与合作伙伴的信任门槛。
    signalRefs:
      - 印度本土航天生态的可信度正在快速上升
    sourceRefs: [1, 4, 6]
differentiator: >-
  现有影像供应商大多卖的是场景和通用分析，把真正困难的部分——跨传感器融合，以及判断什么在运营上真正重要——留给买家自己解决。这家公司从一开始就围绕少数国防资产的 OptoSAR 监控清单而建，工作流针对的是告警和证据打包，而不是无边界的分析探索。随着它在不同地形、天气和资产类别中积累带标签的误报反馈与升级反馈，数据优势会越滚越大。
