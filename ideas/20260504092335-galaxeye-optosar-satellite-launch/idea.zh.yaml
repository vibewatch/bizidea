"topRisks":
- "name": "数据依赖"
  "description": "如果 GalaxEye 的重访频率或商业获取受限，产品可能无法满足运营预期。"
  "mitigation": "构建与传感器无关的摄取层，以便随着覆盖扩展，平台能将 OptoSAR 与其他 EO 和 SAR 供应商组合使用。"
- "name": "采购拖延"
  "description": "直接面向国防的销售周期可能缓慢、受政治门槛影响，并且对早期公司来说难以驾驭。"
  "mitigation": "通过国防集成商以及与现有监视项目绑定的付费试点进入，而不是一开始就销售覆盖整个部委的平台。"
- "name": "告警信任度"
  "description": "地形噪声和天气伪影可能造成足够多的误报，使分析师忽视该系统。"
  "mitigation": "从狭窄的资产类别起步，保留人工复核环节，并按地形和季节用带标签反馈训练模型。"
