jobsToBeDone:
  - job: >-
      当云层或黑夜挡住光学监控时，帮助地理空间运营负责人在具名边境资产上发现真正有意义的变化，这样他们就能在下一轮巡逻前向一线人员完成简报。
    currentAlternative: 逐一比对彼此独立的光学、SAR 与无人机数据流
    successMetric: 从新一次采集到分析师批准告警的时间
  - job: >-
      当新的监控区域上线时，帮助国防集成商快速搭起可重复使用的监控清单，这样他们无需自建定制地理空间栈，也能按时完成合同里程碑。
    currentAlternative: 内部 GIS 自建或高度依赖服务团队的分析模式
    successMetric: 配置一个新监控区域所需的天数
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 真实卫星发射加上 6 个已验证来源，足以说明支撑性数据供给现在正在变成现实。
  painIntensity:
    score: 4
    rationale: 在恶劣天气或夜间失去可见性会带来尖锐的运营痛点，不过最早的预算可能只存在于一小部分国防项目里。
  wedgeClarity:
    score: 5
    rationale: 面向预批准国防资产的监控清单与告警层，是一个窄而可执行的首款产品，而不是泛化的地理空间分析。
  defensibility:
    score: 4
    rationale: 护城河可以来自工作流集成、特定地形标签数据和告警反馈闭环，但单靠原始数据接入还不够。
  ventureScale:
    score: 5
    rationale: 同一套监测栈可从国防扩到灾害、海事、基础设施和保险市场，而这些市场都需要可靠的全天候观测。
topRisks:
  - name: 数据依赖
    description: 如果 GalaxEye 的重访频率或商业可得性受限，产品可能无法达到运营预期。
    mitigation: 构建与传感器无关的摄取层，让平台在覆盖扩大后能把 OptoSAR 与其他 EO、SAR 供应商的数据一起接进来。
  - name: 采购拖延
    description: 直接面向国防销售的周期可能很慢、受政治约束，而且对早期公司来说很难穿透。
    mitigation: 先通过国防集成商和与现有监控项目绑定的付费试点进入，而不是一上来就卖部委级平台。
  - name: 告警信任度
    description: 地形噪声和天气伪影可能制造足够多的误报，最后让分析师对系统视而不见。
    mitigation: 先从狭窄的资产类别起步，保留人工审核环节，并按地形和季节用带标签反馈训练模型。
