"problem": "边境与海岸监视团队即便在云层覆盖、黑暗和恶劣天气导致光学链路与无人机出动失效时，仍需要可靠的站点变化监测。如今他们往往分别购买光学影像、SAR 影像和无人机视频，再让分析师手工拼接证据。这使告警缓慢、不一致，而且难以用合理成本覆盖大量资产的持续观察清单。"
"targetUser":
  "primary": "服务边境与海岸监视项目的印度国防系统集成商中的地理空间运营负责人"
  "secondary": "印度各邦灾害响应机构中的地理空间分析师"
  "buyer": "国防集成商中负责 ISR 软件的项目总监或业务单元负责人"
"startupThesis":
  "nonObviousInsight": "真正的突破不是又一个卫星图像来源，而是同平台 EO 加 SAR 采集，显著降低了分别采购光学与雷达数据所带来的配准和工作流成本，因此软件公司可以销售告警与证据包，而不是原始像素。"
  "beachhead": "由支持某一边境或沿海指挥区的印度国防集成商使用的边境道路、临时营地、桥梁和海岸登陆点观察清单。"
  "wedge": "一个任务调度与变化检测层，将融合式 OptoSAR 场景转化为面向预先批准资产的机器可读观察清单、异常告警和分析师可直接使用的证据包。"
  "whyNowCatalyst": "GalaxEye 的发射使本土商业 OptoSAR 数据源正式入轨，而当前来源也同时凸显了全天候国防用例与不断上升的市场合法性。"
  "ventureScalePath": "先从国防观察清单切入，再扩展到灾害响应、关键基础设施监测、海事态势感知，以及面向保险公司和工业资产运营商的嵌入式数据产品，这些客户都需要在云层覆盖下进行可靠监测。"
"solution": "该产品摄取融合式 OptoSAR 场景，并将其映射到客户关心的具名资产和多边形区域，而不是让分析师在原始影像中自行搜索。系统会针对道路、建筑、营地和海岸活动生成变化告警，再附带 EO 与 SAR 支撑证据、置信分数和复核工作流。客户可以先在单一扇区设置重访规则、升级阈值和资产专属基线，再逐步扩展到更大区域。随着时间推移，系统还可通过学习不同地形和季风高发季节中的误报模式持续提升。"
"goToMarketSeed":
  "firstCustomer": "在一个高云量边境扇区负责边境监视部署的印度国防集成商项目经理。"
  "buyingTrigger": "新的监视合同、季风备战评审，或需要在夜间监测站点而无人机与光学覆盖变得不可靠。"
  "currentAlternative": "使用分离的光学影像供应商、独立 SAR 数据流、无人机视频和内部 GIS 拼接的人工分析师工作流。"
  "switchingReason": "相较于内部地理空间团队手工完成配准、比对和简报，该产品能更快把融合数据转化为运营告警和证据包。"
  "pricingHypothesis": "按监测扇区收取年度平台订阅费，并按处理后的观察清单覆盖面积平方公里计费。"
"whyNow":
