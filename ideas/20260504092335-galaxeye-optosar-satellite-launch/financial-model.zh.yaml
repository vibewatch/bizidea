"slug": "all-weather-watchlist-os"
"date": "2026-05-04"
"currency": "USD"
"modelStartMonth": "2026-06"
"assumptions":
- "id": "A1"
  "name": "模型起始月份"
  "value": "2026-06"
  "unit": "month"
  "source": "[BP date] 模型从计划日期之后的下一个月份开始。"
- "id": "A2"
  "name": "生产扇区年化 ARPU"
  "value": "900"
  "unit": "USD K per customer-year"
  "source": "[BP market.som] 和 [Research market.som] 将第 3 年 SOM 锚定为 3 个部署，每个约 $0.9M。"
- "id": "A3"
  "name": "付费试点定价"
  "value": "225"
  "unit": "USD K total contract"
  "source": "[BP investorMemo.firstCustomer] 取 $150k–300k 付费试点区间的中点。"
- "id": "A4"
  "name": "客户爬坡"
  "value": "到 M7 为 0.5 个扇区当量，Q1Y2 为 1.0，Q4Y2 为 2.0，Q4Y3 为 3.0"
  "unit": "customer equivalents"
  "source": "[BP milestones]、[BP gtm.funnelTargets] 和 [Research reportMemo.sensitivityCases] 反映了漫长的国防采购周期和单个客户内扩张。"
- "id": "A5"
  "name": "收入确认方法"
  "value": "月度收入 = 活跃客户当量 × $75K 月度 ARPU"
  "unit": "formula"
  "source": "由 A2 推导；混合了 [BP businessModel.revenueStreams] 中的订阅、按使用量处理和部署费用。"
- "id": "A6"
  "name": "目标毛利率"
  "value": "70"
  "unit": "percent"
  "source": "[BP businessModel.targetGrossMarginPct]."
- "id": "A7"
  "name": "COGS 比例"
  "value": "30"
  "unit": "percent of revenue"
  "source": "由 A6 推导；覆盖 [BP gtm.pricing] 和 [BP operations] 所暗示的影像转嫁、云成本和分析师复核支持。"
- "id": "A8"
  "name": "漏斗转化率"
  "value": "25% 线索→合格，35% 合格→付费试点，50% 试点→生产，50% 生产→第二扇区"
  "unit": "percent"
  "source": "取自 [BP gtm.funnelTargets] 的中值。"
- "id": "A9"
  "name": "月度流失率"
  "value": "2.0"
  "unit": "percent"
  "source": "创业公司财务经验法则：高粘性的关键任务企业软件月流失率可在 1–2%；由于客户群高度集中，模型取更保守的一端。"
- "id": "A10"
  "name": "每个生产扇区的 CAC"
  "value": "225"
  "unit": "USD K"
  "source": "由模型推导，基于拿下前两个生产扇区所需的 Y1–Y2 销售与市场支出；与创始人主导的国防销售和高差旅企业采购相一致。"
- "id": "A11"
  "name": "招聘爬坡"
  "value": "Q1Y1 为 3 FTE，Q3Y1 增至 5，Q4Y2 增至 8，Q4Y3 增至 11"
  "unit": "FTE"
  "source": "[BP team] 的入职节奏加上保守的创业公司财务经验法则，使固定成本低于 BP 的 pre-seed 融资区间。"
- "id": "A12"
  "name": "完全成本年薪区间"
  "value": "$66K–$144K per FTE"
  "unit": "USD K per FTE-year"
  "source": "适用于印度地理空间 / 国防软件招聘的创业公司财务经验法则，已包含税费与福利。"
- "id": "A13"
  "name": "持续性平台与合规开销"
  "value": "Y1H1 为 $15K/month，到 Y3H2 升至 $34K/month"
  "unit": "USD K per month"
  "source": "[BP operations]、[BP experimentRoadmap] 和 [Research regulatoryTechnicalConstraints] 表明安全部署、云和审计成本开销具有实质性。"
- "id": "A14"
  "name": "一次性安全与供应商配置成本"
  "value": "160"
  "unit": "USD K over 36 months"
  "source": "以 [BP experimentRoadmap] 中供应商资格审定、基准搭建和安全生产加固里程碑为锚的创业公司财务经验法则。"
- "id": "A15"
  "name": "初始融资"
  "value": "2200"
  "unit": "USD K"
  "source": "[BP fundingAsk] 目标是 $2–4M pre-seed；模型采用 $2.2M，以在保留 6 个月缓冲的情况下完成第二扇区验证。"
- "id": "A16"
  "name": "轮次阶段"
  "value": "pre-seed"
  "unit": "stage"
  "source": "[BP fundingAsk.stage]."
