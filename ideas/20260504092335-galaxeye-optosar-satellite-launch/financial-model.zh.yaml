modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads --> QualifiedPrograms
      QualifiedPrograms --> PaidPilot
      PaidPilot --> ProductionSectors
      ProductionSectors --> Revenue
      DataSuppliers --> COGS
      Revenue --> GrossProfit
      COGS --> GrossProfit
      Hiring --> Opex
      GrossProfit --> Cash
      Opex --> Cash
modelSanity:
- checkName: 收入引擎
  finding: 基准情境的收入来自 Year 1 内 1 个由集成商资助的试点、Year 2 末 2 个生产区域，以及 Q4Y3 上线的第 3 个区域；单区域年化 ARPU 约为 $900K。
- checkName: 必须顺利发生的事
  finding: 首个付费试点必须在 Month 6 前到来，并在 Year 2 早期转生产，因为销售周期这一个变量，对 Year 3 收入和现金跑道的杀伤最大。
- checkName: 模型会失效的情况
  finding: 如果采购进度滑向 downside 情境，或者数据成本把毛利率压到 65% 以下，那么在客户数量还没多到能自我供血之前，现金就会被挤到只剩几十万美元级别。
- checkName: 下一轮融资的证明点
  finding: 当 1 个区域已经进入生产、第二区域在同一账户内完成扩张，而且安全部署模板让第 3 个区域看起来像复制品而不是定制项目时，下一轮融资才真正站得住。
sanityChecks:
  ruleOf40: Y3 growth 81.8% + EBITDA margin -11.6% = 70.2%.
  burnMultiple: 用净烧钱额对新增退出 ARR 计算，Y2 的 burn multiple 约为 0.37x，Y3 约为 0.29x；纸面上很高效，但多少被过小的客户基数美化了。
  revenuePerFte: Y3 在 11 FTE 下的人均收入约为 $205K；对国防工作流公司来说算能接受，但离顶级 SaaS 效率还有距离。
  flags:
  - 到 Q4Y3 也只有 3 个生产区域上线，因此客户集中度仍然很高。
  - 模型假设首个付费试点会在 Month 6 到来；若晚两个季度，收入和现金都会显著恶化。
  - 毛利率能否守住，很大程度取决于数据供应商与授权条款能否在早期议价力有限的情况下仍把 COGS 控在 30%。
  - 模型没有计入债务、税项或硬件资本开支；若客户要求专用本地硬件，融资需求会继续上升。
