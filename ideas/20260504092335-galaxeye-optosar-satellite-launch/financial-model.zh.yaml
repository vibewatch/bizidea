slug: all-weather-watchlist-os
date: '2026-05-04'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: month
  source: '[BP date] 模型从计划日期之后的下一个月份开始。'
- id: A2
  name: 生产区域年化 ARPU
  value: '900'
  unit: USD K per customer-year
  source: '[BP market.som] 和 [Research market.som] 将第 3 年 SOM 锚定为 3 个部署 × 每个约 $0.9M。'
- id: A3
  name: 付费试点定价
  value: '225'
  unit: USD K total contract
  source: '[BP investorMemo.firstCustomer] 取 $150k–300k 付费试点区间的中位数。'
- id: A4
  name: 客户爬坡
  value: M7 达到 0.5 个区域当量，Q1Y2 达到 1.0，Q4Y2 达到 2.0，Q4Y3 达到 3.0
  unit: customer equivalents
  source: '[BP milestones]、[BP gtm.funnelTargets] 和 [Research reportMemo.sensitivityCases]，用于反映漫长的国防采购周期和账户内扩张。'
- id: A5
  name: 收入确认方式
  value: "月收入 = 活跃客户当量 × $75K 月度 ARPU"
  unit: formula
  source: 由 A2 推导；融合了 [BP businessModel.revenueStreams] 中的订阅、用量处理和部署费用。
- id: A6
  name: 目标毛利率
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct]。'
- id: A7
  name: COGS 占比
  value: '30'
  unit: percent of revenue
  source: 由 A6 推导；覆盖 [BP gtm.pricing] 和 [BP operations] 所隐含的影像转售成本、云成本和分析师审核支持。
- id: A8
  name: 漏斗转化率
  value: "25% 线索→合格，35% 合格→付费试点，50% 试点→生产，50% 生产→第二区域"
  unit: percent
  source: 取 [BP gtm.funnelTargets] 的中位值。
- id: A9
  name: 月度流失率
  value: '2.0'
  unit: percent
  source: 创业财务经验值：任务关键型企业软件月流失通常在 1–2%；模型取偏保守的一端，因为客户基数高度集中。
- id: A10
  name: 每个生产区域的 CAC
  value: '225'
  unit: USD K
  source: 根据 Y1–Y2 为拿下前两个生产区域所需的销售与营销开支推导；与创始人主导、差旅密集的国防企业销售模式相符。
- id: A11
  name: 招聘爬坡
  value: Q1Y1 为 3 FTE，Q3Y1 达到 5，Q4Y2 达到 8，Q4Y3 达到 11
  unit: FTE
  source: '[BP team] 的入职时间，加上保守的创业财务经验值，用以把固定成本控制在 BP pre-seed 融资区间内。'
- id: A12
  name: 全成本年薪区间
  value: "$66K–$144K / FTE"
  unit: USD K per FTE-year
  source: 面向印度本地地理空间 / 国防软件岗位的创业财务经验值，包含税费和福利。
- id: A13
  name: 经常性平台与合规开销
  value: $15K/month in Y1H1 rising to $34K/month by Y3H2
  unit: USD K per month
  source: '[BP operations]、[BP experimentRoadmap] 和 [Research regulatoryTechnicalConstraints] 都意味着安全部署、云和审计方面会有不小的持续成本。'
- id: A14
  name: 一次性安全与供应商接入成本
  value: '160'
  unit: USD K over 36 months
  source: 创业财务经验值，并参考 [BP experimentRoadmap] 中的供应商资格、基准搭建和安全生产加固里程碑。
- id: A15
  name: 初始融资
  value: '2200'
  unit: USD K
  source: '[BP fundingAsk] 目标为 $2–4M pre-seed；模型取 $2.2M，以支撑到第二个区域验证并留出 6 个月缓冲。'
- id: A16
  name: 融资轮次
  value: pre-seed
  unit: stage
  source: '[BP fundingAsk.stage]。'
