"modelDiagram":
  "title": "单位经济流转"
  "mermaid": |
    flowchart LR
      Leads[线索] --> QualifiedPrograms[合格项目]
      QualifiedPrograms --> PaidPilot[付费试点]
      PaidPilot --> ProductionSectors[生产扇区]
      ProductionSectors --> Revenue[收入]
      DataSuppliers[数据供应商] --> COGS
      Revenue --> GrossProfit[毛利润]
      COGS --> GrossProfit
      Hiring[招聘] --> Opex[运营费用]
      GrossProfit --> Cash[现金]
      Opex --> Cash
"modelSanity":
- "checkName": "收入引擎"
  "finding": "基础情景收入来自 Y1 的 1 个由集成商出资的试点、到 Y2 末的 2 个生产扇区，以及到 Q4Y3 上线的第 3 个生产扇区，年化 ARPU 约为 $900K。"
- "checkName": "必须做对的事"
  "finding": "首个付费试点必须在 Month 6 前到来，并在 Y2 早期转化，因为销售周期敏感性是影响第 3 年收入和 runway 的最大单一因素。"
- "checkName": "模型会失效如果"
  "finding": "如果采购朝下行情景滑落，或数据成本把毛利率压到 65% 以下，那么在公司拥有足够扇区数量实现自我供血前，现金会压缩到仅剩数十万美元。"
- "checkName": "下一轮验证"
  "finding": "一旦有 1 个扇区进入生产、同一账户内扩到第 2 个扇区，而且安全部署模板使第 3 个扇区看起来可复制而非定制化，就有理由进行下一轮融资。"
"sanityChecks":
  "ruleOf40": "Y3 增长率 81.8% + EBITDA 利润率 -11.6% = 70.2%。"
  "burnMultiple": "按净烧钱相对新增退出 ARR 计算，Y2 burn multiple 约为 0.37x，Y3 约为 0.29x；纸面上效率不错，但受到客户基数极小的美化。"
  "revenuePerFte": "Y3 在 11 FTE 下的人均收入为 $205K；对一家国防工作流公司来说尚可，但仍低于顶级 SaaS 效率。"
  "flags":
  - "到 Q4Y3 只有 3 个生产扇区上线，因此客户集中度仍然很高。"
  - "模型假设首个付费试点在 Month 6 前到来；若延迟两个季度，收入和现金都会显著恶化。"
  - "毛利率依赖数据供应商与许可条款始终维持在 30% COGS 框架内，尽管公司早期议价能力有限。"
  - "模型未包含债务、税项或硬件 capex；如果客户要求本地专用硬件，融资需求将会上升。"
