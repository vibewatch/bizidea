scenarios:
  downside:
    description: 试点大约晚两个季度才签下，转生产拖到 Y2 后段，ARPU 被压缩，同时数据成本把毛利率挤到 65%。
    y3RevenueK: 1530.0
    y3EbitdaK: -560.0
    cashLowPointK: 215.0
    keyAssumptionChanges:
    - 首个付费试点约在 Month 12 才启动，而不是 Month 6。
    - 区域年化综合 ARPU 下滑到 $765K。
    - 因更频繁使用备用影像，毛利率压缩到 65%。
  base:
    description: Y1 拿下 1 个付费试点，Y2 早期转成 1 个生产区域，并在 Q4Y3 扩到 3 个生产区域。
    y3RevenueK: 2250.0
    y3EbitdaK: -260.5
    cashLowPointK: 571.38
    keyAssumptionChanges:
    - 生产区域年化 ARPU 保持在 $900K。
    - 毛利率维持在 BP 目标的 70%。
    - 招聘遵循保守的 11 FTE 计划，在 3 个区域上线前不额外扩招增长岗位。
  upside:
    description: 试点更早签约，第二区域在 Y2 内完成加售，且 Y3 大部分时间里都有 3 个区域在线，同时带来略高的定价和毛利。
    y3RevenueK: 2700.0
    y3EbitdaK: 120.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - 首个付费试点在 Month 4 前签下，并在 Year 1 结束前转生产。
    - 因更强的使用量与部署附加销售，综合年化 ARPU 提升到 $950K。
    - 随着供应商冗余效率提升，毛利率达到 72%。
