scenarios:
  downside:
    description: Pilot closes about two quarters later, production conversion slips into late Y2, ARPU compresses, and data costs hold gross margin to 65%.
    y3RevenueK: 1530.0
    y3EbitdaK: -560.0
    cashLowPointK: 215.0
    keyAssumptionChanges:
    - First paid pilot starts around Month 12 instead of Month 6.
    - Blended annual ARPU falls to $765K per sector.
    - Gross margin compresses to 65% because backup imagery is used more often.
  base:
    description: One paid pilot lands in Year 1, converts to one production sector in early Year 2, and expands to three production sectors by Q4Y3.
    y3RevenueK: 2250.0
    y3EbitdaK: -260.5
    cashLowPointK: 571.38
    keyAssumptionChanges:
    - Annual production-sector ARPU stays at $900K.
    - Gross margin holds at the BP target of 70%.
    - Hiring follows the conservative 11-FTE plan with no additional growth hires before three sectors are live.
  upside:
    description: The pilot signs earlier, second-sector upsell happens inside Y2, and three sectors are live for most of Y3 with slightly better pricing and margin.
    y3RevenueK: 2700.0
    y3EbitdaK: 120.0
    cashLowPointK: 760.0
    keyAssumptionChanges:
    - First paid pilot closes by Month 4 and converts before Year 1 ends.
    - Blended annual ARPU improves to $950K from stronger usage and deployment attach.
    - Gross margin reaches 72% as supplier redundancy becomes more efficient.
