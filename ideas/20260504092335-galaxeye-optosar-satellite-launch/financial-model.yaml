modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> QualifiedPrograms
      QualifiedPrograms --> PaidPilot
      PaidPilot --> ProductionSectors
      ProductionSectors --> Revenue
      DataSuppliers --> COGS
      Revenue --> GrossProfit
      COGS --> GrossProfit
      Hiring --> Opex
      GrossProfit --> Cash
      Opex --> Cash
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from one integrator-funded pilot in Year 1, two production sectors by the end of Year 2, and a third sector live by Q4Y3 at roughly $900K annual ARPU.
- checkName: Must go right
  finding: The first paid pilot must arrive by Month 6 and convert in early Year 2, because the sales-cycle sensitivity is the single biggest determinant of both Year 3 revenue and runway.
- checkName: Model breaks if
  finding: If procurement slips toward the downside case or data costs push gross margin below 65%, cash compresses toward the low hundreds of thousands before the company has enough sector count to self-fund.
- checkName: Next-round proof
  finding: The next financing is justified once one sector is in production, a second expands inside the same account, and secure deployment templates make sector three look repeatable rather than bespoke.
sanityChecks:
  ruleOf40: Y3 growth 81.8% + EBITDA margin -11.6% = 70.2%.
  burnMultiple: Y2 burn multiple is about 0.37x and Y3 is about 0.29x using net burn versus exit ARR added; efficient on paper, but flattered by a tiny customer base.
  revenuePerFte: $205K Y3 on 11 FTE; acceptable for a defense workflow company, though below elite SaaS efficiency.
  flags:
  - Only three production sectors are live by Q4Y3, so customer concentration remains very high.
  - The model assumes the first paid pilot arrives by Month 6; a two-quarter slip materially worsens both revenue and cash.
  - Gross margin depends on data-supplier and licensing terms staying inside the 30% COGS envelope despite limited bargaining power early on.
  - No debt, tax, or hardware capex line is modeled; a customer-specific on-prem hardware requirement would increase the funding ask.
