assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: month
  source: '[BP date] start the model the month after the plan date.'
- id: A2
  name: Annual production-sector ARPU
  value: '900'
  unit: USD K per customer-year
  source: "[BP market.som] and [Research market.som] anchor Year 3 SOM at 3 deployments \xD7 about $0.9M each."
- id: A3
  name: Paid pilot pricing
  value: '225'
  unit: USD K total contract
  source: "[BP investorMemo.firstCustomer] midpoint of the $150k\u2013300k paid pilot range."
- id: A4
  name: Customer ramp
  value: 0.5 sector-equivalent by M7, 1.0 by Q1Y2, 2.0 by Q4Y2, 3.0 by Q4Y3
  unit: customer equivalents
  source: '[BP milestones], [BP gtm.funnelTargets], and [Research reportMemo.sensitivityCases] to reflect long defense procurement and in-account expansion.'
- id: A5
  name: Revenue recognition method
  value: "Monthly revenue = active customer equivalents \xD7 $75K monthly ARPU"
  unit: formula
  source: Derived from A2; blends subscription, usage processing, and deployment fees from [BP businessModel.revenueStreams].
- id: A6
  name: Target gross margin
  value: '70'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct].'
- id: A7
  name: COGS ratio
  value: '30'
  unit: percent of revenue
  source: Derived from A6; covers imagery pass-through, cloud, and analyst-review support implied by [BP gtm.pricing] and [BP operations].
- id: A8
  name: Funnel conversion rates
  value: "25% lead\u2192qualified, 35% qualified\u2192paid pilot, 50% pilot\u2192production, 50% production\u2192second sector"
  unit: percent
  source: Midpoints from [BP gtm.funnelTargets].
- id: A9
  name: Monthly churn
  value: '2.0'
  unit: percent
  source: "Startup-finance heuristic: sticky mission-critical enterprise software can churn 1\u20132% monthly; model uses the conservative end because the customer base is concentrated."
- id: A10
  name: CAC per production sector
  value: '225'
  unit: USD K
  source: "Model-derived from Y1\u2013Y2 sales and marketing spend needed to land the first two production sectors; consistent with founder-led defense sales and travel-heavy enterprise procurement."
- id: A11
  name: Hiring ramp
  value: 3 FTE in Q1Y1, 5 by Q3Y1, 8 by Q4Y2, 11 by Q4Y3
  unit: FTE
  source: '[BP team] start timings plus a conservative startup-finance heuristic to keep fixed cost below the BP pre-seed raise range.'
- id: A12
  name: Loaded annual payroll bands
  value: "$66K\u2013$144K per FTE"
  unit: USD K per FTE-year
  source: Startup-finance heuristic for India-based geospatial / defense-software hiring, including taxes and benefits.
- id: A13
  name: Recurring platform and compliance overhead
  value: $15K/month in Y1H1 rising to $34K/month by Y3H2
  unit: USD K per month
  source: '[BP operations], [BP experimentRoadmap], and [Research regulatoryTechnicalConstraints] imply meaningful secure-deployment, cloud, and audit-cost overhead.'
- id: A14
  name: One-off security and supplier setup costs
  value: '160'
  unit: USD K over 36 months
  source: Startup-finance heuristic anchored to [BP experimentRoadmap] milestones for supplier qualification, benchmark setup, and secure production hardening.
- id: A15
  name: Initial raise
  value: '2200'
  unit: USD K
  source: "[BP fundingAsk] targets a $2\u20134M pre-seed; model uses $2.2M to reach second-sector proof with a six-month buffer."
- id: A16
  name: Round stage
  value: pre-seed
  unit: stage
  source: '[BP fundingAsk.stage].'
