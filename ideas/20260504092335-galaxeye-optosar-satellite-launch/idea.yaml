ideaScorecard:
  signalStrength:
    score: 4
    rationale: A real satellite launch with six verified sources is strong evidence that the enabling data supply is becoming available now.
  painIntensity:
    score: 4
    rationale: Losing visibility in bad weather or at night creates acute operational pain, though initial budgets may sit with a limited set of defense programs.
  wedgeClarity:
    score: 5
    rationale: A watchlist-and-alert layer for preapproved defense assets is a narrow, actionable first product rather than generic geospatial analytics.
  defensibility:
    score: 4
    rationale: Defensibility can come from workflow integration, terrain-specific labeling, and alert feedback loops, but raw data access alone is not enough.
  ventureScale:
    score: 5
    rationale: The same monitoring stack can expand from defense into disaster, maritime, infrastructure, and insurance markets that all need reliable all-weather observation.
topRisks:
  - name: Data dependency
    description: If GalaxEye's revisit cadence or commercial access is limited, the product may not meet operational expectations.
    mitigation: Build a sensor-agnostic ingest layer so the platform can combine OptoSAR with other EO and SAR providers as coverage expands.
  - name: Procurement drag
    description: Direct defense sales cycles can be slow, politically gated, and difficult for an early company to navigate.
    mitigation: Enter through defense integrators and paid pilots tied to existing surveillance programs instead of selling ministry-wide platforms first.
  - name: Alert trust
    description: Terrain noise and weather artifacts could create enough false positives to make analysts ignore the system.
    mitigation: Start with narrow asset classes, keep a human-in-the-loop review step, and train models on labeled feedback by terrain and season.
