    sourceRefs: [1, 4, 6]
differentiator: >-
  Incumbent imagery vendors mostly sell scenes and generic analytics, leaving buyers to do the hard work of fusing sensors and deciding what operationally matters. This company is purpose-built around OptoSAR watchlists for a narrow set of defense assets, with workflows optimized for alerting and evidence packaging instead of open-ended analyst exploration. Its data advantage compounds as it collects labeled false-positive and escalation feedback across terrain, weather, and asset classes.
