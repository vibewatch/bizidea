openQuestions:
- What revisit cadence and commercial access can GalaxEye actually guarantee for a first Indian defense sector?
- Will defense integrators buy a workflow layer before ministry-level standardization, or insist on bundling it into broader ISR programs?
- How much better are same-platform OptoSAR alerts than multi-vendor EO+SAR stitched manually for roads, encampments, bridges, and coastal points?
- What false-positive rate is operationally tolerable before analysts abandon alerts and revert to manual review?
