  validationPlan:
  - priority: high
    question: Will one defense integrator pay for an alerting layer before ministry-wide standardization?
    evidenceToGather: Interview 5-7 ISR program managers and collect at least one paid design-partner scope tied to an active sector.
  - priority: high
    question: How much better is same-platform OptoSAR alert quality than multi-vendor EO+SAR stitched manually?
    evidenceToGather: Run a blind comparison on 3-5 asset classes using archived cloudy/night scenarios and measure analyst acceptance and false positives.
  - priority: medium
