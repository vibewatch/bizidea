competitors:
- name: ICEYE
  stage: scale-up
  wedge: 商业 SAR 星座，配套政府 ISR 打包方案、任务编排和衍生产品。
  pricing: 定制定价 / 联系销售。
  strength: SAR 专业能力深、聚焦政府客户，且具备任务系统打包能力。
  weaknessVsUs: 更偏向 SAR 供给和任务方案，而不是围绕印度特定资产监控清单与证据包的工作流产品。
  sourceRefs:
  - 9
  - 10
  - 11
- name: Capella Space
  stage: scale-up
  wedge: 全天候 SAR，具备自动化任务编排，并明确面向国防情报市场。
  pricing: 定制定价 / 联系销售。
  strength: 快速任务编排叙事清晰，在国防、海事与灾害垂直场景中打包能力强。
  weaknessVsUs: 本质上仍然主要是数据和采集平台，而不是围绕预批准印度监控清单构建的狭窄工作流产品。
  sourceRefs:
  - 12
  - 13
- name: Umbra
  stage: scale-up
  wedge: 高分辨率 SAR，带公开定价和任务特定解决方案。
  pricing: 公开 spotlight 定价从 $675 起，对应 5x5 km、1.0 m、单视采集；更高分辨率选项更贵。
  strength: 定价透明、SAR 模式丰富，而且面向任务场景的解决方案姿态很强。
  weaknessVsUs: 核心供给仍是任务编排和影像访问，并不会默认替你解决分析师工作流集成问题。
  sourceRefs:
  - 14
  - 15
  - 21
- name: Planet
  stage: public incumbent
  wedge: 光学监测、任务编排以及面向政府的打包工作流，覆盖广泛星座足迹。
  pricing: 灵活 / 定制定价。
  strength: 监测品牌强、重访广，而且在政府与监测产品上已有成熟包装。
  weaknessVsUs: 以光学为先的监测仍会继承天气和黑夜缺口，而融合 OptoSAR 工作流正面瞄准的就是这个问题。
  sourceRefs:
  - 16
  - 17
  - 26
- name: Satellogic
  stage: public scale-up
  wedge: 面向政府用户的低成本近实时光学情报和 constellation-as-a-service。
  pricing: 定制定价 / constellation-as-a-service。
  strength: 更低成本的光学定位，以及明确的政府国防市场话术。
  weaknessVsUs: 它仍然是光学替代品，因此对全天候问题的回答远不如融合 OptoSAR 监控清单产品直接。
  sourceRefs:
  - 18
regulatoryTechnicalConstraints:
- point: 印度航天政策放宽是利好，但政府客户依然意味着审批、安全处理和任务特定部署限制。
  sourceRefs:
  - 7
  - 25
- point: 商业任务编排和数据授权可能会限制再分发、衍生使用或部署假设，除非创业公司拿到明确权利。
  sourceRefs:
  - 21
- point: 真实运营表现取决于第三方供应商给出的重访频率、任务窗口和融合数据交付质量。
  sourceRefs:
  - 1
  - 11
  - 13
  - 14
- point: 在变化检测系统里，分析师信任极其脆弱；一旦杂波、地形或天气伪影带来误报，采用会很快熄火。
  sourceRefs:
  - 3
  - 10
  - 16
validationSignals:
- point: GalaxEye 已经发射 Mission Drishti，把融合 OptoSAR 从路线图推进到可运营供给。
  sourceRefs:
  - 1
  - 2
  - 4
  - 5
- point: Umbra 的公开价目表说明，高价 SAR 任务编排已经是标准化产品，而不是定制科研服务。
  sourceRefs:
  - 14
- point: UP42 提供即时报价和基于 credits 的购买流程，说明地理空间数据采购正在走向运营化和按使用量付费。
  sourceRefs:
  - 19
- point: 多家现有厂商现在都在直接营销政府、监测或自动化任务编排工作流，这验证了买家要的不是原始场景本身。
  sourceRefs:
  - 9
  - 12
  - 16
  - 17
  - 18
- point: ISRO 在重大灾害国际宪章中的牵头角色，进一步说明基于航天的快速态势感知在机构层面的重要性。
  sourceRefs:
  - 8
openQuestions:
- GalaxEye 究竟能为首个印度国防区域保证怎样的重访频率和商业访问权限？
- 国防集成商会不会在部委级标准化之前就购买一个工作流层，还是坚持把它打包进更大的 ISR 项目？
- 对于道路、营地、桥梁和海岸点位，同平台 OptoSAR 告警比手工拼接多供应商 EO+SAR 到底好多少？
- 误报率高到什么程度时，分析师会彻底放弃告警并退回手工审核？
