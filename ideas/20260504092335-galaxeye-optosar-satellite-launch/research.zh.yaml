    - 18
  - "incumbentClass": "光学监测 incumbents"
    "point": "在重访频率足够的场景中，Planet 等光学优先玩家是强有力替代品，但它们并不能消除全天候/夜间缺口，而这正是同平台 EO+SAR 对最难扇区的价值所在。"
    "sourceRefs":
