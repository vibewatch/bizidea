  adoptionFrictionMatrix:
  - friction: 与涉密或受限工作流的安全集成
    severity: high
    affectedBuyer: 国防集成商项目团队
    mitigation: 提供 VPC 或本地部署、基于角色的审核流程，以及与现有 ISR 系统清晰解耦的 API 边界。
    sourceRefs:
    - 12
    - 17
    - 21
  - friction: 地形、天气伪影或噪声基线带来的误报
    severity: high
    affectedBuyer: 地理空间分析师
    mitigation: 先从狭窄资产类别起步，在反馈数据足够大之前保留人工审核闭环。
    sourceRefs:
    - 3
    - 10
    - 14
    - 16
  - friction: 对第三方重访频率与授权条款的依赖
    severity: high
    affectedBuyer: 项目总监
    mitigation: 构建与传感器无关的摄取层，并与多家供应商或市场平台谈备用供给。
