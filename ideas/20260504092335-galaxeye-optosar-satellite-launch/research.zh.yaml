  "regulatoryLandscape": "与几年前相比，印度在结构上更有利，因为官方政策姿态是扩大私营部门参与航天活动。话虽如此，国防工作流仍意味着许可、数据处理、安全部署和再分发方面的约束，这些因素会拖慢落地并限制影像衍生输出的共享范围。"
  "technologyLandscape": "关键使能变化是同平台融合 EO+SAR 供给、自动化任务调度和打包式监测产品的结合。这为围绕资产中心告警的软件切口打开了空间，但前提是产品能足够压低地形和天气噪声，从而赢得分析师信任。"
  "distributionChannels":
  - "point": "国防集成商合作是最自然的路线，因为它们已将 ISR 软件、传感器和服务打包进项目投标。"
    "sourceRefs":
