"operatingAssumptions":
- "assumption": "国防集成商会在部委级平台标准化之前资助一个付费扇区试点。"
  "basis": "research.yaml"
  "validationTest": "访谈 5-7 位 ISR 项目经理，并至少将其中一位转化为与活跃项目绑定的付费设计合作伙伴范围。"
  "decisionImpact": "如果不成立，公司必须以分包商或白标组件身份通过主承包方销售，而不是以品牌化工作流层身份销售。"
- "assumption": "GalaxEye 加一个后备数据源能够为首个扇区提供可接受的重访频率、许可和交付可靠性。"
  "basis": "research.yaml"
  "validationTest": "在承诺生产 SLA 之前，从至少两家供应商处拿到书面商业条款和样本交付日志。"
  "decisionImpact": "如果不成立，就要缩小资产清单和告警频率，或将产品重新定位为临时复核分析师工具，而非持续观察清单。"
- "assumption": "如果初始资产类别上的误报率能保持在大约 15% 以下，分析师会接受新的告警系统。"
  "basis": "operator judgment"
  "validationTest": "在至少两类资产上，对存档的多云和夜间场景运行盲测基准，并衡量分析师接受率与覆盖率推翻比例。"
  "decisionImpact": "如果不成立，路线图就必须转向决策支持和人机协作工作流，而不是自动化告警承诺。"
- "assumption": "安全的 VPC 或本地部署可以通过复用式架构完成审查。"
  "basis": "research.yaml"
  "validationTest": "在第 6 个月前，与一家集成商安全团队完成一次架构评审和试点部署方案。"
  "decisionImpact": "如果不成立，销售周期会变长、实施成本会上升，而融资需求也会在规模化前增加。"
- "assumption": "按扇区定价可以由现有影像或 ISR 预算支付，而不需要新设预算科目。"
  "basis": "idea.yaml"
  "validationTest": "测试把软件与当前监测工作流打包的试点提案，并追踪客户是否愿意转化为年度生产定价。"
  "decisionImpact": "如果不成立，ACV 和毛利假设都会削弱，公司可能需要以服务主导方式进入。"
