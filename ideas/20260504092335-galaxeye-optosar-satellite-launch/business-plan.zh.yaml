  - "面向安全环境的部署与集成费用"
  "unitOfValue": "按观察清单覆盖和告警量计量的监测扇区"
  "targetGrossMarginPct": 70
  "expansionLevers":
  - "在同一国防集成商账户内增加相邻扇区"
  - "从边境观察清单扩展到海岸与海事资产类别"
  - "将安全部署与复核工作流复用于灾害响应团队"
