reportMemo:
  executiveTakeaways:
  - 对手方尽调正在从筛查问题，变成证据装配问题：Tangos、Sumsub、Hawk 和 Moody's 都开始围绕调查、股权与 KYB 卖 AI 辅助、审计友好的工作流。[1][23][26][28][29]
  - 合作银行监管仍是最强推动力。OCC、FDIC、Fenwick、Sidley、Lithic 和 DataVisor 都提到，银行-fintech 安排的全生命周期监管更紧、责任更分散、文档负担也更重。[7][8][9][10][17][19][20][35]
  - 这个切口之所以仍被低服务，是因为准入厂商、数据供应商和调查平台各自只解了一段流程；真正能维护一张可复用的内部证据图谱、反复回答银行和卡组织不同模板的产品，几乎还没有。[21][22][23][25][26][29][30]
  - 大盘类目确实在增长，但 venture case 成不成立，不取决于拿下整个 AML 软件市场，而取决于能不能先吃下那批高复杂度、窄人群的买家。公开报告给相邻的 AML 和 KYC 市场打出的 CAGR，大致都在 11%-14%。[31][32][33][34]
  marketDefinition: 这个市场可以定义为：面向受监管资金流转 fintech 的对手方 EDD 自动化。产品负责长期维护股权、控制权、牌照和资金来源证据，再按合作银行、代理行、卡组织或监管方的要求，拼成各自定制的尽调材料。它卡在经典 CDD/KYB 准入和银行侧调查之间。[4][8][17][21][23][26]
  customerAndBuyer: 日常使用者是合规负责人、MLRO/BSA 负责人或法务运营负责人；他们要不断回复合作银行或卡组织发来的年度复审、新项目尽调和控制权变更问题。真正掏预算的，通常是 CCO、GC 或 COO，因为痛点横跨合规、合作伙伴管理和业务上线风险。[17][18][19][22][27]
  buyingTriggers:
  - point: 合作银行、卡组织或代理行恰好在 fintech 要上线新支付轨道、新通道或新项目时，发来年度复审或加强尽职调查更新要求。
    sourceRefs:
    - 8
    - 10
    - 17
    - 19
  - point: 新增投资人、股权表变化或控制权变更，逼着团队同时更新多家对手方要看的受益所有权叙述和支撑证据。
    sourceRefs:
    - 5
    - 13
    - 25
  - point: 监管收紧或整改压力上来后，合作银行会要求 fintech 交出更清楚的职责划分、审计链和可复用证据。
    sourceRefs:
    - 7
    - 9
    - 20
    - 27
    - 35
  willingnessToPay:
    summary: 买家今天已经在为这件事付钱，只是钱花在了延迟上线、分析师手工时间、外部律师和企业级核验工具上。Lithic 说，合作银行选错一次，产品上线就可能晚几个月；Middesk 说，手工 KYB 会拖慢审批并带来流失；Sumsub 也把商业核验留到企业版去卖。这足以支撑一笔有意义的年度软件预算，尤其是对那些反复要过合作方复审的团队。
    sourceRefs:
    - 17
    - 22
    - 23
    - 24
  competitiveLandscape: Middesk 和 Sumsub 拿的是企业核验流，Kyckr 和 LSEG 卖的是外部公司/筛查数据，Tangos 和 Hawk 做的是机构侧调查自动化，Moody's 则站在更高一层的 KYC/AML 栈上。真正的空白，是一套由对手方自己持有的证据系统：既能复用内部公司档案和旧答案，又能反复适配银行或卡组织的模板。[21][23][25][26][28][29][30]
  incumbentThesis:
  - incumbentClass: KYB 准入厂商
    point: 它们能降低首次企业准入的摩擦，但重心仍是一次性的通过/不通过核验，不是长期维护、按对手方定制的 EDD 材料包。
    sourceRefs:
    - 21
    - 22
    - 23
    - 24
  - incumbentClass: 数据与筛查现有厂商
    point: 它们能给出广覆盖的外部数据和可靠名单，但拿不到 fintech 内部的文件图谱、审批历史，也拼不出合作方专用的叙述。
    sourceRefs:
    - 25
    - 29
    - 30
  - incumbentClass: 银行侧调查平台
    point: 它们擅长在机构内部自动化调查员工作和案件档案，但没针对“被调查的公司如何跨多家对手方维护一份可携带证据档案”做优化。
    sourceRefs:
    - 1
    - 26
    - 27
    - 28
  - incumbentClass: 顾问服务与合作银行基础设施
    point: 银行、律师和顾问能帮客户定义控制要求和复审方案，但反复发生的证据维护，终究更适合软件，而不是一版版电子表格和备忘录。
    sourceRefs:
    - 17
    - 18
    - 19
    - 20
  regulatoryLandscape: 美国这边，受覆盖金融机构必须建立书面程序，识别并核验法人客户的受益所有人；同时，银行在第三方关系的整个生命周期里都要自己扛风险管理责任。[4][5][7][8][9][10][11] 英国这边，公司要做基于风险的 AML 控制、识别 PSC，并逐步适应身份核验新规；但对高风险 EDD 来说，PSC 记录并不等于真正的 UBO 证明。[12][13][14][15][25] 2025 年 3 月 FinCEN 回撤美国本土实体的 BOI 申报要求，等于拿掉了一块本可利用的登记册数据源，让美国的股权尽调继续更依赖独立证据采集。[6]
  technologyLandscape: 底层使能栈其实已经商品化。Tangos 在卖跨司法辖区、带证据链的调查；Hawk 在既有 AML 栈上叠了带治理能力的 AI；Moody's 和 LSEG 提供可复用的情报层；Middesk 和 Sumsub 则把企业核验、股权核验和问卷自动化做成产品。缺的不是单点能力，而是能把 fintech 自己的内部档案和历史对手方提交记录串起来的跨源编排层。[16][21][23][26][28][29][30]
  distributionChannels:
  - point: 直接卖给合规和法务团队，卡在年度复审、新合作银行项目，或跨境扩张这样的时点上。
    sourceRefs:
    - 17
    - 19
    - 27
  - point: 通过已经嵌进企业准入流程的 KYB、登记册数据和风险情报供应商，以集成切入。
    sourceRefs:
    - 21
    - 23
    - 25
    - 29
    - 30
  - point: 通过 fintech 律师、合作银行顾问和整改专家做转介绍——他们往往最先看到证据卡点。
    sourceRefs:
    - 18
    - 19
    - 20
  partnershipEcosystem:
  - point: 实体管理、股权表、董事会门户和文档存储系统，是最关键的上游伙伴，因为创业公司的价值，取决于能不能把内部档案变成可复用证据。
    sourceRefs:
    - 22
    - 23
    - 25
  - point: KYB、登记册、制裁和筛查供应商是天然数据伙伴，因为它们提供的是监管和银行想看的独立来源证据层。
    sourceRefs:
    - 23
    - 25
    - 29
    - 30
  - point: 当合作银行和 BaaS 平台希望 fintech 带着更干净的证据、更低的复审负担来合作时，它们也可能反过来变成分发渠道。
    sourceRefs:
    - 17
    - 20
    - 27
    - 35
  dataMoats:
  - point: 合作银行/卡组织模板库，加上每次追问历史，最后会滚出一张专有地图：什么证据最容易让哪家对手方最快放行。
    sourceRefs:
    - 17
    - 19
    - 27
  - point: 把内部档案和独立来源连起来的常青证据图谱，会随着每次股权变化、年度更新和例外处理越积越值钱。
    sourceRefs:
    - 22
    - 23
    - 25
  - point: 跨大量复审积累下来的通过、驳回和整改数据，能训练出比通用 KYB 工具更强的完整度检查能力。
    sourceRefs:
    - 1
    - 22
    - 23
  geographicConsiderations:
  - point: 美国很适合起步，因为合作银行监管最紧；但 BOI 回撤也意味着，美国本土对手方的股权证明仍更依赖私有证据和供应商数据。
    sourceRefs:
    - 6
    - 8
    - 9
    - 17
  - point: 英国也很有吸引力，因为 PSC 披露和身份核验更新给了公司一套更正式的控制框架；但高风险复审里，仍必须把 PSC 和真正的 UBO 区分开。
    sourceRefs:
    - 13
    - 14
    - 15
    - 25
  - point: 跨境支付项目会同时抬高制裁、股权和资金来源证据的复杂度，因此一张可复用证据图谱，比一国一套静态文件夹更有优势。
    sourceRefs:
    - 3
    - 15
    - 26
  sensitivityCases:
  - case: 如果更多合作银行执法或存款项目事故继续推高银行-fintech 监管
    impact: 紧迫度会上升，因为银行会要求更干净的证据、更清楚的职责映射，以及更频繁的更新。
    sourceRefs:
    - 8
    - 9
    - 10
    - 19
    - 20
    - 35
  - case: 如果 FinCEN 继续维持美国本土 BOI 申报回撤，或进一步收紧访问
    impact: 产品作为“内部证据整理层”的价值会上升，但自动化调用登记册的空间会缩小，实施时可能得吃进更多手工文件。
    sourceRefs:
    - 6
    - 25
  - case: 如果头部 KYB 厂商从准入流程延伸到可携带的年度复审证据包
    impact: 这个切口会变窄，除非创业公司先证明自己在多对手方复用、资金来源工作流和通过率分析上更强。
    sourceRefs:
    - 21
    - 23
    - 24
    - 29
  validationPlan:
  - priority: high
    question: 一套按银行定制的材料包，能不能相对今天的手工回复流程，显著提高首轮通过率？
    evidenceToGather: 至少在 2 次真实年度复审上跑试点，把提交时间、追问数量和首轮通过率，与上一轮流程做对比。
  - priority: high
    question: 在实施开始之前，目标客户内部的股权、董事会和资金来源档案到底有多完整？
    evidenceToGather: 在承诺自动化水平之前，先和共创客户做一轮股权表、实体档案、文档系统和律师备忘录的数据审计。
  - priority: medium
    question: 预算真正归谁：合规、法务、运营，还是合作银行关系团队？
    evidenceToGather: 访谈 10 个目标买家，拆清楚今天的钱到底花在分析师时间、外部律师，还是现有核验供应商上。
analysisModels:
  marketMapDiagram:
    title: 对手方 EDD 自动化地图
    mermaid: "quadrantChart\n  title 对手方 EDD 自动化地图\n  x-axis 通用 KYB --> 可复用证据图谱\n  y-axis 复审紧迫度低 --> 复审紧迫度高\n  Middesk: [0.45, 0.62]\n  Sumsub: [0.40, 0.60]\n  Kyckr: [0.56, 0.59]\n  Tangos: [0.74, 0.80]\n  LSEG: [0.36, 0.66]\n  拟议创业公司: [0.92, 0.90]\n"
  fiveForces:
    supplierPower:
      score: 4
      rationale: 独立数据源、登记册访问和内部系统集成都足够集中，创业公司既依赖外部供应商，也依赖客户内部掌握公司档案的人。
      sourceRefs:
      - 21
      - 23
      - 25
      - 29
      - 30
    buyerPower:
      score: 4
      rationale: 目标买家少、专业度高，而且完全可以退回手工复审、外部律师或现有合规供应商。
      sourceRefs:
      - 17
      - 18
      - 19
      - 22
    threatOfEntrants:
      score: 3
      rationale: 这条工作流从技术上并不难做，但信任、来源链和多对手方证据逻辑，比简单 KYB 查询更难复制。
      sourceRefs:
      - 16
      - 22
      - 23
      - 25
    threatOfSubstitutes:
      score: 5
      rationale: 默认替代品仍然是共享盘、电子表格、外部数据供应商和律师备忘录，再由团队每次复审手工拼起来。
      sourceRefs:
      - 17
      - 18
      - 21
      - 24
    competitiveRivalry:
      score: 4
      rationale: KYB 厂商、外部数据现有厂商和自主式调查平台都已经拿住了相邻预算，哪怕还没有谁真正拥有“对手方侧反复 EDD 复用”这件事。
      sourceRefs:
      - 21
      - 23
      - 26
      - 28
      - 29
      - 30
  pestle:
  - factor: 政治
    impact: negative
    point: 美国监管方正明显加大对银行-fintech 安排和第三方存款项目的关注。
    sourceRefs:
    - 8
    - 9
    - 10
  - factor: 经济
    impact: positive
    point: 相邻的 AML 和 KYC 软件类目仍保持两位数增长，有利于说服买方为工作流自动化买单。
    sourceRefs:
    - 31
    - 32
    - 33
    - 34
  - factor: 社会
    impact: positive
    point: 合规团队被手工复审工作压得很重，所以只要能明确省时，价值就很容易讲通。
    sourceRefs:
    - 2
    - 22
    - 29
  - factor: 技术
    impact: positive
    point: 自主式 AI 和带证据链的自动化，已经开始卖进生产级 AML 和调查流程，不再只是实验。
    sourceRefs:
    - 1
    - 23
    - 26
    - 28
    - 29
  - factor: 法律
    impact: negative
    point: 不同司法辖区的股权数据义务并不一样，美国 BOI 回撤，再加上 PSC 和 UBO 之间的模糊地带，都意味着不能只押单一公开登记册。
    sourceRefs:
    - 6
    - 13
    - 25
  adoptionFrictionMatrix:
  - friction: 内部股权和资金来源数据散落在律师备忘录、股权表和共享盘里。
    severity: 高
    affectedBuyer: 合规负责人 / 法务运营
    mitigation: 先从 1 套对手方模板切入，同步核心记录；在自动化扩出去前，对过期证据强制人工确认。
    sourceRefs:
    - 2
    - 22
    - 23
  - friction: 如果没有按银行定制的证据导出，合作银行可能不会信第三方生成的叙述。
    severity: 高
    affectedBuyer: CCO / 合作银行关系负责人
    mitigation: 交付可导出的答复包，配好引用、时间戳和审核签字，而不是只给黑箱评分。
    sourceRefs:
    - 8
    - 19
    - 20
    - 27
  - friction: PSC、UBO 和 BOI 的数据模型在不同司法辖区并不一致。
    severity: 中
    affectedBuyer: MLRO / 国际合规负责人
    mitigation: 按司法辖区建股权逻辑，而且始终保留底层源文件，不要只信某一个登记册的输出。
    sourceRefs:
    - 6
    - 13
    - 25
  - friction: 高敏感合规数据和 AI 输出都需要治理与人工监督。
    severity: 中
    affectedBuyer: CTO / CISO / 合规治理负责人
    mitigation: 提供最小权限访问、私有化部署，以及带来源链的显式模型风险控制。
    sourceRefs:
    - 12
    - 16
    - 26
    - 28
