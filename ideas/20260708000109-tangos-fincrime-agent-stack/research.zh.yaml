competitors:
- name: Middesk
  stage: 成长期
  wedge: 面向接入团队的美国企业核验与 KYB 自动化。
  pricing: 抓取到的网站上未公开定价。
  strength: 在低摩擦的美国实体核验和接入工作流设计上很强。
  weaknessVsUs: 但它并不围绕反复的多对手方证据包、资金来源叙述和可复用年度复审导出而建。
  sourceRefs:
  - 21
  - 22
- name: Sumsub
  stage: 成长期
  wedge: 全球 KYB/KYC 平台，提供登记册查询、UBO 核验、问卷和持续监控。
  pricing: $1.35 per verification basic；企业版包含 business verification。
  strength: 全球企业核验覆盖广，工作流也可配置。
  weaknessVsUs: 但它更像一套通用合规平台，而不是专为反复银行/卡组织 EDD 复用设计的专用系统。
  sourceRefs:
  - 23
  - 24
- name: Kyckr
  stage: 成长期
  wedge: 基于登记册数据的 KYB 与 UBO 核验，强调来源可信度。
  pricing: 抓取到的网站上未公开定价。
  strength: 在独立来源登记册数据和股权核验上定位清晰。
  weaknessVsUs: 更像数据与核验层，而不是端到端的对手方证据编排产品。
  sourceRefs:
  - 25
- name: Tangos
  stage: 种子期
  wedge: 带证据链的自主金融犯罪调查平台。
  pricing: 抓取到的网站上未公开定价。
  strength: 自主式调查叙事、审计链和跨司法辖区证据定位都很强。
  weaknessVsUs: 它服务的是调查员一侧，而不是被调查对手方反复维护股权与资金来源档案的需求。
  sourceRefs:
  - 1
  - 26
- name: LSEG World-Check
  stage: 现有厂商
  wedge: 面向 KYC、AML 与第三方尽调的筛查和风险情报数据。
  pricing: 抓取到的网站上未公开定价。
  strength: 外部筛查数据很深，而且已经为企业工作流做了结构化和去重。
  weaknessVsUs: 但外部数据并不能解决内部文件装配、叙述生成和材料包复用。
  sourceRefs:
  - 30
