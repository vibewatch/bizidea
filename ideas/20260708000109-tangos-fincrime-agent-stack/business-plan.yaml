slug: counterparty-edd-autopilot
date: "2026-07-08"
executiveSummary: >-
  Counterparty EDD Autopilot sells to money-movement fintechs that must repeatedly prove ownership, control, licensing, and source of funds to sponsor banks, correspondents, and card networks. The beachhead is U.S. and UK remittance, payroll, and card-program fintechs with 3-10 counterparties and frequent annual reviews or corridor launches, because these teams bear the highest cost of rebuilding evidence packs from shared drives, cap tables, and counsel memos. The initial product is a living evidence graph plus export layer that ingests internal entity records and external risk data, then produces bank-specific cited beneficial-ownership and source-of-funds files with reviewer sign-off and change logs. The why-now is credible because Tangos and adjacent vendors show evidence-backed AI workflows are now being commercialized in fincrime, while bank-fintech supervision is increasing the need for audit-ready counterparty packets. The go-to-market system is a paid design-partner motion triggered by an upcoming annual EDD refresh or change-of-control event, sold to the CCO, GC, or COO on avoided analyst and counsel time plus faster partner approvals. The strategic choice is to win one narrow workflow, first-pass bank-review packets, before expanding into continuous KYB monitoring, bank-side shared review workspaces, or broader AML investigations. The biggest disconfirming risk is whether sponsor banks will accept fintech-generated evidence packs as first-pass input; if they still force full manual re-keying, the product becomes a productivity tool with weaker pricing power and a smaller market. Market sizing, ROI, and buyer-budget ownership are still estimate-driven because the sources do not disclose named customers, quantified time savings, or procurement data, so the first 6-12 months must validate acceptance, review frequency, and willingness to pay directly.
problem:
  - Sponsor banks and networks reopen diligence whenever an annual review, corridor launch, ownership change, or new partner relationship occurs, forcing compliance teams to rebuild beneficial-ownership and source-of-funds files from fragmented internal records.
  - Existing KYB, screening, and investigation tools surface external risk data or investigator workflows, but they do not maintain a reusable counterparty-owned evidence graph or partner-specific answer pack.
  - Slow or inconsistent responses can delay launches, strain sponsor-bank relationships, and increase outside-counsel spend, yet the current sources do not quantify rejection rates or time saved.
solution:
  - Build a living evidence graph across cap-table records, entity charts, board materials, licensing documents, prior questionnaires, and external risk sources, with every assertion linked to source evidence.
  - Generate sponsor-bank- and network-specific EDD packets, beneficial-ownership maps, and source-of-funds narratives with human sign-off, stale-evidence alerts, and change logs.
  - Expand from one live review workflow into continuous change monitoring and multi-counterparty reuse only after first-pass acceptance is proven.
whyWeWin:
  - We are centered on the investigated counterparty's recurring evidence-maintenance problem rather than generic onboarding or bank-side investigations, so reuse across many counterparties is the core workflow rather than an add-on.
  - A template library, follow-up-question history, and acceptance analytics can compound into proprietary knowledge of what evidence clears which sponsor banks and networks fastest.
  - Human-reviewed cited exports and private deployment options fit the audit, security, and model-governance constraints that slow broader AI adoption in compliance.
strategicChoices:
  beachhead: >-
    U.S. and UK money-movement fintechs in remittance, payroll, and card programs that manage 3-10 sponsor-bank or network relationships and face repeated beneficial-ownership and source-of-funds refreshes.
  wedgeRationale: >-
    One live annual or trigger-based counterparty review is a faster proof point than broad KYB onboarding or full AML automation because the inputs, outputs, buyer pain, and ROI metrics are already visible: submission time, follow-up-question volume, and approval speed.
  sequencingRationale: >-
    The company should first prove cited export packs on one review workflow before building continuous monitoring, bank-side workspaces, or broad integrations, because sponsor-bank trust and internal data completeness are the two hardest adoption barriers. Founder-led sales and implementation come before a large engineering build so the first design partners define which templates, evidence fields, and deployment controls matter.
  notYet:
    - Low-complexity merchant onboarding KYB for SMBs with one counterparty and minimal ownership complexity.
    - Bank-side transaction monitoring, alert triage, or full investigator case management.
    - Government or intelligence deployments that require air-gapped delivery and a different procurement motion.
    - Cross-industry third-party due diligence outside regulated money movement.
market:
  tam: "$203.5M estimated from roughly 1,850 addressable U.S./UK entities at about $110k blended ARR"
  sam: "$31.5M estimated from roughly 350 high-complexity beachhead fintechs at about $90k ARR"
  som: "$2.7M estimated from 30 reachable logos by year 3 at about $90k ARR"
  segments:
    - U.S. money-movement fintechs with 3-10 sponsor-bank or network relationships
    - UK payment institutions and e-money firms facing recurring bank or network diligence
  buyingProcess: >-
    The compliance lead or legal-ops owner usually champions the deal when an annual review or expansion event creates urgent evidence work. Economic approval then comes from the CCO, GC, or COO after security review confirms the product can export into bank-specific workflows without replacing existing KYB or screening vendors.
product:
  mvp: >-
    A cited evidence graph and export workflow for one legal entity and one live sponsor-bank or network review. It ingests internal records, maps them to a customer-specific evidence model, and outputs a reviewer-approved beneficial-ownership and source-of-funds pack with change tracking.
  sixMonth: >-
    Support 10 high-frequency sponsor-bank or network templates, core integrations to document storage plus one cap-table and one entity-management source, and secure reviewer sign-off with role-based access.
  twelveMonth: >-
    Add continuous change monitoring for ownership, licensing, and corridor changes, reusable answer libraries across multiple counterparties, and benchmark reporting on follow-up questions and acceptance rates.
  twentyFourMonth: >-
    Launch a bank-side shared review workspace, broader U.S./UK multi-jurisdiction ownership logic, and a portable trust-passport workflow that lets a fintech reuse approved evidence across new counterparties.
  keyBets:
    - Customers can supply enough digital ownership and source-of-funds evidence to avoid a services-heavy onboarding model.
    - Sponsor banks will accept cited exported packets as first-pass input instead of demanding full re-keying into bespoke forms.
    - Template overlap across counterparties is high enough that a reusable export library compounds after the first few customers.
    - Continuous change monitoring creates expansion revenue rather than remaining a one-time packet-generation feature.
gtm:
  wedge: >-
    Land as the fastest way for a fintech to complete one live annual or trigger-based EDD refresh for one complex entity, using cited exports and reviewer sign-off instead of rebuilding a dossier from scratch.
  channels:
    - Founder-led direct sales to compliance, legal, and operations leaders at remittance, payroll, and card-program fintechs
    - Referral channels through fintech counsel, sponsor-bank advisors, and remediation consultants who already see diligence bottlenecks
    - Integration and co-sell relationships with KYB, registry-data, and risk-intelligence vendors already embedded in onboarding workflows
  funnelTargets: "lead->qualified pain call 25%+, qualified->paid design partner 30%+, paid design partner->production 60%+, production logo->2+ counterparties within 9 months 50%+"
  pricing: >-
    Annual subscription priced by covered legal entities, active counterparty review packs, and monitored jurisdictions, starting around the researched $40k-$150k ARR range plus onboarding. Paid design partners should credit into the annual contract so the first live review proves both ROI and expansion to additional counterparties.
businessModel:
  revenueStreams:
    - Annual SaaS subscription for covered legal entities and active counterparty review packs
    - Onboarding and evidence-mapping fees
    - Premium modules for continuous monitoring, private deployment, and bank-side shared review workspaces
  unitOfValue: Covered legal entity with active counterparty review packs
  targetGrossMarginPct: 72
  expansionLevers:
    - Add more counterparties per customer after the first accepted review
    - Add legal entities, jurisdictions, and monitored ownership-change workflows
    - Upsell continuous monitoring and private deployment
    - Expand into bank-side shared review workspaces once fintech-side evidence is trusted
strategyMap:
  northStarMetric: First-pass accepted counterparty EDD packs per quarter
  inputMetrics:
    - Median days from diligence request to packet submission
    - Follow-up questions per submitted pack
    - Percentage of required evidence fields populated with citations
    - Pilot-to-production conversion rate
    - Counterparties covered per production logo
  moatsToBuild:
    - Sponsor-bank and network template library with required-evidence mappings
    - Acceptance and remediation dataset by counterparty and jurisdiction
    - Living evidence graph linking internal records to independent-source proof
    - Deployment and governance controls that fit regulated compliance reviews
  killCriteria:
    - After 6 live pilots, median submission-time reduction is under 30% and follow-up-question volume does not improve versus the prior process.
    - Fewer than 3 of the first 6 sponsor-bank or network reviews accept the exported packet as first-pass input without full re-keying.
    - No beachhead customer converts to at least $60k ARR after a successful live review.
  mermaid: |
    flowchart LR
      Wedge[Annual EDD refresh at one fintech] --> MVP[Cited evidence graph and export pack]
      MVP --> Proof[Faster submission and fewer follow-up questions]
      Proof --> Expansion[More counterparties per logo and bank-side workspace]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Moderate conviction on pain and timing; conviction drops quickly if sponsor banks refuse fintech-generated packets as first-pass review input."
    whyBelieve: "The company attacks a narrow but acute evidence-assembly bottleneck inside rising bank-fintech scrutiny and aligns with the market's shift toward source-traced AI case files."
    whyDoubt: "Current evidence does not yet prove sponsor-bank acceptance, quantified ROI, or a procurement path large enough to escape a niche workflow-tool outcome."
    nextDiligence: "Run two live annual-review pilots and confirm faster submission, fewer follow-up questions, and at least one $60k+ production conversion."
  firstCustomer:
    title: Head of Compliance at a U.S. remittance or card-program fintech
    profile: >-
      A venture-backed money-movement fintech with 50-300 employees, 3-5 sponsor-bank or network relationships, and one imminent annual EDD refresh during corridor or ownership expansion.
    trigger: An annual sponsor-bank or card-network EDD refresh lands in the same quarter as a new corridor, investor, or legal-entity change.
    buyer: Chief Compliance Officer
    initialContract: "$20k-$40k paid design partner for one entity and one live review, converting into $60k-$120k ARR plus onboarding after the first accepted pack expands to additional counterparties."
  mustBeTrue:
    - Target customers experience at least 3 recurring annual or trigger-based counterparty reviews per entity each year.
    - Sponsor banks or networks will use a cited exported packet as real first-pass input rather than treating it as prep work only.
    - At least 70% of required ownership and source-of-funds evidence is already digitized or can be digitized quickly at target customers.
    - Buyers will pay at least $60k ARR once one live review proves faster submission and lower follow-up burden.
    - Template reuse and acceptance analytics improve enough across counterparties to create defensibility before KYB incumbents bundle a similar feature.
  diligenceQuestions:
    - How many annual or trigger-based counterparty reviews does a typical beachhead fintech complete per entity each year?
    - What percentage of required evidence currently lives in structured systems versus counsel memos, email attachments, and shared drives?
    - Will sponsor banks accept exported packets, or will they still require full portal or questionnaire re-entry?
    - Which executive actually owns budget first, the CCO, GC, COO, or a sponsor-bank relationship lead?
    - How much overlap exists across sponsor-bank and network templates, and where does fragmentation make reuse weak?
operatingAssumptions:
  - assumption: Beachhead fintechs face at least three high-friction annual or trigger-based counterparty reviews per year per covered entity.
    basis: research.yaml
    validationTest: Interview 10 target customers and inspect the prior 12 months of review calendars; proceed only if the median is at least three reviews per entity.
    decisionImpact: If review frequency is lower, narrow the ICP to the highest-complexity programs or reposition around change-of-control and corridor-launch events.
  - assumption: At least 70% of required ownership and source-of-funds evidence already exists in digital systems or accessible files.
    basis: operator judgment
    validationTest: Run onboarding audits with the first 5 design partners and measure structured plus scanned document coverage before product automation begins.
    decisionImpact: If evidence coverage is lower, onboarding becomes services-heavy and gross-margin plus hiring assumptions must be reset.
  - assumption: Sponsor banks will accept cited exported packets as first-pass review input without mandatory full re-keying.
    basis: research.yaml
    validationTest: Pilot with 2 live sponsor-bank reviews and track whether the exported pack is used directly and whether follow-up-question volume declines.
    decisionImpact: If false, keep the product as an internal prep layer, lower pricing, and reduce funding ambition until bank-side workflow ownership is proven.
  - assumption: Buyers will pay $60k-$120k ARR after one successful live review because the product replaces analyst time, outside counsel, and approval delay.
    basis: idea.yaml
    validationTest: Close 3 paid design partners and convert at least 2 to annual contracts above $60k ARR.
    decisionImpact: If pricing clears below $40k ARR, the startup must automate more of the workflow or move upmarket.
  - assumption: Human review, audit logs, and private deployment are sufficient to pass security and AI-governance review at beachhead customers.
    basis: research.yaml
    validationTest: Complete security questionnaires and AI-governance review with the first 3 enterprise prospects without requiring bespoke on-prem delivery.
    decisionImpact: If false, the roadmap must prioritize deployment and governance features ahead of template expansion.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Structured ICP interview and document-audit sprint with 10 money-movement fintechs
    hypothesis: The beachhead has recurring EDD triggers and enough digital evidence to justify software over consulting.
    successMetric: At least 7 of 10 targets report 3 or more reviews per entity per year and can provide more than 70% of core documents from existing systems.
    owner: Founder and compliance product lead
  - horizon: 0-90 days
    experiment: Manual concierge build of one sponsor-bank template pack for two prospects
    hypothesis: A cited reusable pack can cut prep time and expose the highest-value template fields before software is complete.
    successMetric: Each prospect uses the pack in a live or mock review and reports more than 40% prep-time reduction.
    owner: Founder and compliance lead
  - horizon: 90-180 days
    experiment: MVP pilot on one live annual review
    hypothesis: Evidence graph plus export workflow reduces submission time and follow-up questions versus the prior cycle.
    successMetric: Submission time falls by at least 50% and follow-up questions fall by at least 30%.
    owner: Product and design-partner team
  - horizon: 90-180 days
    experiment: Integration pilot with one cap-table system, one entity repository, and one document store
    hypothesis: Automated sync materially improves evidence freshness and reduces manual upkeep.
    successMetric: More than 60% of updates sync automatically and stale-document alerts are resolved within 5 business days.
    owner: Founding engineer
  - horizon: 180-365 days
    experiment: Counterparty template-library expansion across 10 sponsor banks or networks
    hypothesis: Template reuse and acceptance analytics improve pilot conversion and logo expansion.
    successMetric: At least 50% of production customers expand to 2 or more counterparties and first-pass acceptance reaches 60% or better.
    owner: GTM lead and template operations
  - horizon: 180-365 days
    experiment: Channel partnership test with one fintech counsel or sponsor-bank advisor
    hypothesis: Advisory channels surface higher-urgency deals than cold outbound.
    successMetric: At least 3 qualified design-partner opportunities are sourced from one channel partner.
    owner: CEO or founding GTM lead
operations:
  - Quarterly evidence-health review tied to cap-table, board, licensing, and corridor changes
  - Human approval queue for every generated packet, with sign-off, timestamps, and exception notes
  - Template-operations process to maintain sponsor-bank and network questionnaires, export formats, and acceptance feedback
  - Data-partner integrations for registry, sanctions, and adverse-media checks to support independent-source proof
  - Private-cloud deployment and least-privilege access for sensitive compliance documents
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the evidence graph, export engine, and secure document model that define the product wedge.
  - role: Compliance product lead
    startTiming: Month 0
    rationale: Encode beneficial-ownership logic, template requirements, and reviewer workflow from the first pilot.
  - role: Founding GTM
    startTiming: Month 0
    rationale: Run founder-led sales, design-partner onboarding, and sponsor-bank or counsel channel development.
  - role: Integration engineer
    startTiming: Month 4
    rationale: Ship connectors into cap-table, entity, and document systems so evidence freshness becomes productized rather than manual.
  - role: Solutions and implementation lead
    startTiming: Month 6
    rationale: Own onboarding audits, packet quality, and pilot-to-production conversion in live reviews.
  - role: Security and platform engineer
    startTiming: Month 9
    rationale: Add private deployment, role-based access, and audit controls needed for enterprise procurement.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 3 paid design partners in remittance, payroll, or card-program fintechs.
      - Complete 2 live annual-review pilots with at least 50% faster submission and 30% fewer follow-up questions.
      - Ship the evidence graph, reviewer sign-off workflow, and 10 sponsor-bank or network template exports.
      - Prove one secure deployment path that passes customer security review without bespoke on-prem work.
  - horizon: 12-24 months
    items:
      - Convert at least 6 production logos and expand half of them to 2 or more counterparties.
      - Launch continuous monitoring for ownership, licensing, and corridor changes.
      - Build 25 template mappings across U.S. and UK bank or network workflows.
      - Run the first bank-side shared review workspace pilot with a sponsor-bank or BaaS partner.
  - horizon: 24-36 months
    items:
      - Reach 30 production logos or equivalent bank-side seats, consistent with the researched year-3 SOM.
      - Offer a portable trust-passport workflow shared across fintech and bank reviewers.
      - Expand multi-jurisdiction ownership logic beyond the initial U.S. and UK scope.
      - Use acceptance and remediation data to benchmark packet completeness and review speed by counterparty.
risks:
  - risk: Sponsor banks may refuse to treat fintech-generated packets as first-pass review input.
    likelihood: High
    impact: High
    mitigation: Start with exact export formats for live partner templates, include human sign-off and citations, and measure first-pass acceptance in early pilots.
  - risk: Internal ownership and source-of-funds data may be too fragmented or stale to automate safely.
    likelihood: High
    impact: High
    mitigation: Run onboarding data audits, require stale-evidence alerts and attestations, and scope early deployments to one entity and one review workflow.
  - risk: KYB, screening, or investigation vendors may bundle lightweight packet generation before the company establishes defensibility.
    likelihood: Medium
    impact: High
    mitigation: Differentiate on reusable multi-counterparty evidence graphs, bank-template acceptance data, and deeper source-of-funds workflows.
  - risk: Security and AI-governance objections may lengthen sales cycles or force expensive deployment work.
    likelihood: Medium
    impact: High
    mitigation: Keep a human-in-the-loop workflow, ship audit logs and role-based access early, and support private deployment for larger accounts.
  - risk: The beachhead may be too narrow if review frequency or contract size is lower than assumed.
    likelihood: Medium
    impact: High
    mitigation: Validate review volume and pricing fast, then expand into bank-side workspaces and continuous monitoring only if the first wedge proves sticky.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the evidence graph and export layer, hire the first product, compliance, integration, and GTM team, complete 3-5 design partners, and convert live annual-review wins into 6-8 production logos plus early channel proof.
