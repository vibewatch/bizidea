jobsToBeDone:
- job: 合作银行或卡组织一旦要求我们做年度加强尽职调查更新，就帮合规团队快速拼出一份带引用的股权与资金来源材料包，这样既守住合作关系，也不耽误上线。
  currentAlternative: 共享文件夹、外部律师备忘录、电子表格跟踪器，以及反复去供应商平台搜索。
  successMetric: 提交完整复审材料包需要多少天，以及每次对手方复审会追问多少轮。
- job: 一旦新增投资人、法律实体或支付通道，就帮我们把所有关键对手方档案同步更新，这样不同合作方那里不会发出互相打架的答案。
  currentAlternative: 手工逐个改组织结构图、问卷和发给每家合作方的邮件附件。
  successMetric: 发生重大实体或通道变更后，能否在 1 个工作日内更新完的对手方材料包占比。
