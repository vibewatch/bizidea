topRisks:
- name: 对手方格式碎片化
  description: 银行和卡组织往往各有一套问卷，很可能不愿接受 fintech 供应商给出的标准化材料包。
  mitigation: 先把最常见的合作方模板做成导出层，再在复审双方的共创客户里证明：首轮通过更快。
- name: 证据新鲜度衰减
  description: 如果股权表、实体结构或通道暴露变了却没被抓到，股权和资金来源档案会很快失真，风险极高。
  mitigation: 接入股权表、实体管理和内部审批系统，在任何材料包发出前强制做变更确认，并对过期文件发预警。
- name: 现有厂商捆绑
  description: KYC 数据供应商、准入工具或外部律师都可能加上一层轻量材料包生成，削弱客户单独买新产品的意愿。
  mitigation: 靠可复用的多对手方工作流、按对手方沉淀的通过数据，以及横跨内部档案和外部风险数据的常青证据图谱赢下来。
