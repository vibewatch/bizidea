problem: 每逢合作银行、卡组织或监管方重新做尽调，资金流转 fintech 都得重新证明：谁持有它、控制权怎么变过、业务碰到了哪些司法辖区、资金又从哪来。每开一条新通道、引入一位新投资人，或只是到了年度 EDD 周期，合规团队就得重新翻股权表、共享盘、外部律师备忘录和供应商搜索，把同一套材料按另一个模板再拼一遍。风险又高，回复慢了会拖住上线，甚至伤到与合作银行的关系；可现有合规工具大多只做到筛查命中这一步，解决不了“把一份站得住脚的股权与资金来源档案拼出来”这件事。
targetUser:
  primary: 依赖多家合作银行和卡组织的美国或英国资金流转 fintech 里的合规负责人、MLRO 或 BSA 负责人。
  secondary: 负责实体档案、董事会材料和尽调回复的法务运营或公司秘书团队。
  buyer: 首席合规官、COO 或总法律顾问。
startupThesis:
  nonObviousInsight: 自主式金融犯罪基础设施里最被忽视的一侧，不是银行调查员，而是被调查的公司本身。只要监管方和合作方开始接受“带来源链的 AI 案件档案”，高风险 fintech 就能把股权、控制人、牌照和资金来源维护成一张常青证据图谱，做一次，之后给每一家合作银行、卡组织和监管方重复复用。这样一来，EDD 就不再是阶段性抢文档，而会变成常开的合规基础设施。
  beachhead: 美国和英国的资金流转 fintech 合规负责人——手里有 3-10 家合作银行或卡组织，每次新通道上线或年度 EDD 周期一到，都要反复更新受益所有权和资金来源材料。
  wedge: 一套对手方 EDD 自动驾驶，吃进股权表记录、实体结构图、董事会纪要、牌照文件、过往复审答复和外部风险数据，自动产出带引用的、按银行定制的受益所有权和资金来源材料。
  whyNowCatalyst: Tangos 围绕自主调查、受益所有权工作流、监管可直接审阅的案件档案和可回溯来源的推理拿到融资并开始商业部署，说明只要每个结论都能引用、都能复核，对手方终于愿意信任 AI 拼出来的尽调材料包。
  ventureScalePath: 先从支付 fintech 的重复合作方复审材料包切进去，再扩到银行侧复审工作台、持续 KYB 监控、并购或控制权变更尽调、卡组织准入，最后做成一张可在受监管金融机构间流转的信任护照。
solution: 产品给每一家受监管实体维护的，不是一堆静态尽调文件夹，而是一张持续更新的证据图谱。它会同步法律实体记录、投资人和董事会更新、牌照、过往问卷答复以及各类支撑文件，再用可回溯来源的智能体去拼合作方专用的受益所有权结构图、资金来源叙述和例外说明。每一份输出都会把每条判断连回底层文件，自动标出过期或互相冲突的证据，并记录自上次提交之后到底改了什么。等合作银行或卡组织又发来新模板，团队不用从零手工重做，而是从一份可复用的案件档案起步。时间拉长后，这家公司会变成 fintech 向所有关键对手方证明自身身份与控制结构的主档系统。
goToMarketSeed:
  firstCustomer: 一家美国汇款、薪资或卡项目 fintech，有 3-5 家合作银行或卡组织，眼前有一次年度复审，最近又刚做过股权变更或新通道扩张。
  buyingTrigger: 合作银行、代理行或卡组织刚发来年度 EDD 更新要求，而这家 fintech 又正好在新增通道、重要投资人或合作关系。
  currentAlternative: 共享盘、电子表格、外部律师尽调备忘录、KYC 数据供应商，以及往每家对手方模板里手工复制粘贴。
  switchingReason: 这个切口复用一张持续更新的证据图谱，能按每家对手方定制材料包，还能保住来源引用。于是 fintech 不用多招分析师，也不容易把不同版本的答复发冲突。
  pricingHypothesis: 按覆盖的法律实体、活跃对手方复审包和监控中的司法辖区收费，年订阅大概率从 $40k-$150k ARR 起，再加实施费。
