slug: counterparty-edd-autopilot
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: Model start month
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-08] the model begins with the first full operating month after the dated business plan.'
- id: A2
  name: Opening cash / pre-seed raise
  value: $2.3M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses a lower-middle pre-seed sized to reach the first seed milestone with roughly six months of buffer.'
- id: A3
  name: Starting paying accounts
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] the company starts pre-revenue and must first win paid design partners.'
- id: A4
  name: Paying account definition
  value: A paid covered legal entity or active counterparty review-pack subscription under pilot or annual contract
  unit: definition
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop counts monetized review-pack scope, not just unique logos.'
- id: A5
  name: Paid design partner economics
  value: $30K over about 3 months (~$10K/mo)
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract $20k-$40k] the model uses the midpoint paid-pilot price for one entity and one live review.'
- id: A6
  name: Production contract and expansion economics
  value: Production scope starts around $75K-$90K ARR and blends toward roughly $98K annual value by Y3 as extra counterparties, jurisdictions, and monitoring attach.
  unit: USD/account/year
  source: '[BP investorMemo.firstCustomer.initialContract $60k-$120k ARR + BP businessModel.expansionLevers + Research market.sam/som] the model stays inside the researched price band while allowing modest expansion revenue.'
- id: A7
  name: Customer ramp
  value: 3 paying accounts by M12, 15 by Q4Y2, and 30 by Q4Y3
  unit: customersEop
  source: '[BP milestones 0-12 / 12-24 / 24-36 months + BP gtm.funnelTargets + Research market.som] year 2 assumes 6-8 production logos with some multi-counterparty expansion, then year 3 reaches the researched SOM scale.'
- id: A8
  name: Revenue recognition convention
  value: 'Period-end paying accounts multiplied by blended realized revenue per account for that period: Y1 at about $10K/account/month, Y2 at about $25K-$27K/account/quarter, and Y3 at about $24.5K-$26K/account/quarter.'
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research market.sam/som] this keeps revenue directly tied to customers and the contract mix.'
- id: A9
  name: Gross margin ramp
  value: 48%-58% in Y1, 60%-68% in Y2, and 69%-72% in Y3
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 72 + BP operatingAssumptions digital-evidence coverage + BP operations] early onboarding and human review are services-heavy before templates and integrations become reusable.'
- id: A10
  name: Hiring timeline
  value: M1 product/compliance lead, founding engineer, and founding GTM; M4 integration engineer; M6 solutions lead; M9 security/platform engineer; M16 data/integration engineer; M31 template-ops/customer-success hire; M34 finance/ops hire.
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays lean until design-partner proof and template reuse are visible.'
- id: A11
  name: Product / compliance loaded compensation
  value: $160K
  unit: USD/year
  source: '[BP team compliance product lead + startup-finance heuristic] domain-heavy but still pre-seed cash compensation.'
- id: A12
  name: Engineering loaded compensation
  value: $175K
  unit: USD/year
  source: '[BP team founding / integration / security engineering roles + startup-finance heuristic] enough to hire senior fintech-infrastructure talent without assuming late-stage cash levels.'
- id: A13
  name: GTM loaded compensation
  value: $160K
  unit: USD/year
  source: '[BP team founding GTM + BP gtm.channels + startup-finance heuristic] includes enterprise travel and variable compensation for founder-led selling.'
- id: A14
  name: Solutions / template-ops loaded compensation
  value: $140K
  unit: USD/year
  source: '[BP team solutions and implementation lead + BP operations template maintenance + startup-finance heuristic] reflects high-touch onboarding without building a large services bench.'
- id: A15
  name: G&A / ops loaded compensation
  value: $100K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] lean finance and vendor-management support arrives late in the ramp.'
- id: A16
  name: Payroll allocation to P&L lines
  value: Product/compliance 20% S&M / 60% R&D / 20% G&A; engineering 100% R&D; GTM 100% S&M; solutions/template ops 60% S&M / 40% R&D; G&A/ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] maps payroll into the functional P&L while keeping implementation work partly customer-facing and partly productizing templates.'
- id: A17
  name: Non-payroll opex ramp
  value: Monthly non-payroll S&M/R&D/G&A rises from $8K/$6K/$5K in early Y1 to $17K/$12K/$9K by Q4Y3.
  unit: USD/month
  source: '[BP operations + BP gtm.channels + startup-finance heuristic] covers travel, cloud/inference, legal, security tooling, and light channel-development spend without assuming paid-demand scale.'
- id: A18
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: formula
  source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale.'
- id: A19
  name: Steady-state monthly churn
  value: 2.0%
  unit: percent per month
  source: '[startup-finance heuristic for workflow SaaS + BP whyWeWin + BP strategyMap.northStarMetric] recurring diligence templates should be sticky once accepted by bank partners, but early-stage churn is still modeled above mature governance-software norms.'
- id: A20
  name: Base sales cycle
  value: Roughly 90 days from paid design-partner start to annual conversion or next-counterparty expansion
  unit: days
  source: '[BP experimentRoadmap 90-180 days + BP investorMemo.nextDiligence] the model assumes one live review cycle is enough to prove ROI for early conversions.'
- id: A21
  name: CAC convention
  value: Total 36-month sales and marketing spend divided by 30 net new paying accounts
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.channels + BP gtm.funnelTargets] expansion within existing logos keeps paid-account CAC lower than a pure new-logo motion.'
- id: A22
  name: Next-round milestone for funding sizing
  value: Reach 6-8 production logos, 2 accepted live annual-review packets, 10 reusable sponsor-bank templates, and early channel proof before seed
  unit: milestone
  source: '[BP fundingAsk.useOfFundsSummary + BP milestones 0-12 / 12-24 months + BP investorMemo.nextDiligence] the pre-seed is sized to hit proof on acceptance, conversion, and template reuse before the next round.'
- id: A23
  name: Quarterly salary-roll convention
  value: Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only quarter-end snapshots
  unit: convention
  source: '[Headcount column convention + BP team startTiming] this keeps salary expense consistent with the monthly hiring ramp while the headcount table shows snapshots.'
