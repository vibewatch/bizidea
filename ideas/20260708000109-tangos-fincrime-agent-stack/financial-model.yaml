scenarios:
  downside:
    description: Bank acceptance takes longer, expansion within logos is slower, and onboarding stays more manual than planned.
    y3RevenueK: 1710.0
    y3EbitdaK: -330.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 22 instead of 30.
    - Blended annual value settles near $88K instead of roughly $98K per paying account.
    - Gross margin exits near 68% because evidence collection and human review remain services-heavy.
  base:
    description: Design partners convert after one live review, sponsor-bank template reuse improves onboarding, and expansions add paid accounts inside existing logos.
    y3RevenueK: 2502.0
    y3EbitdaK: 95.4
    cashLowPointK: 518.3
    keyAssumptionChanges:
    - 3 paying accounts by M12, 15 by Q4Y2, and 30 by Q4Y3.
    - Blended annual value per paying account reaches about $98K by Q4Y3.
    - Gross margin reaches the BP target 72% by Q4Y3 as templates and integrations get reused.
  upside:
    description: Counsel and sponsor-bank advisors accelerate design-partner flow, more customers expand to additional counterparties, and template reuse improves gross margin ahead of plan.
    y3RevenueK: 3050.0
    y3EbitdaK: 430.0
    cashLowPointK: 640.0
    keyAssumptionChanges:
    - Q4Y3 customersEop reaches about 34 instead of 30.
    - Monitoring and multi-counterparty attach lift blended annual value toward $105K per paying account.
    - Gross margin reaches roughly 74% as onboarding and review work become more standardized.
sensitivity:
- variable: ARPU
  downsideCase: Annual contract value and monitoring attach settle about 10% below plan.
  baseCase: Q4Y3 annualized value reaches about $98K per paying account.
  upsideCase: Expansion to extra counterparties lifts annualized value about 7% above plan.
  y3RevenueImpactK: -250.2
  cashImpactK: -180.0
- variable: CAC
  downsideCase: Advisory referrals underperform and CAC rises toward the high-$50Ks.
  baseCase: Founder-led sales plus channels keep CAC near $43K per paid account.
  upsideCase: Template-led expansion within existing logos keeps CAC below $40K.
  y3RevenueImpactK: -80.0
  cashImpactK: -140.0
- variable: churn
  downsideCase: Monthly churn rises to 3.0% if the workflow is seen as prep-only rather than system-of-record software.
  baseCase: Monthly churn holds at 2.0% once accepted templates are embedded in annual reviews.
  upsideCase: Monthly churn stays near 1.2% because evidence packs become the default starting point for partner diligence.
  y3RevenueImpactK: -140.0
  cashImpactK: -110.0
- variable: sales cycle
  downsideCase: Pilot-to-production conversion stretches from about 90 to about 150 days.
  baseCase: One live annual review is enough to convert most early design partners within a quarter.
  upsideCase: Budget owner alignment and strong first-pass acceptance compress conversion toward 60 days.
  y3RevenueImpactK: -320.0
  cashImpactK: -210.0
- variable: gross margin
  downsideCase: Gross margin stalls near 68% because manual evidence cleanup persists.
  baseCase: Gross margin exits at 72% once template reuse and integrations reduce services intensity.
  upsideCase: Gross margin reaches 74%-75% as secure deployment and review workflows standardize.
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: hiring pace
  downsideCase: Template-ops and finance hires are pulled forward before production conversions are proven.
  baseCase: Scale hiring waits until after year-2 template proof and only reaches 9 FTE by Q4Y3.
  upsideCase: The team stays at 8 FTE through most of Y3 without slowing delivery.
  y3RevenueImpactK: 60.0
  cashImpactK: -160.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts[Money-movement fintechs] --> DesignPartners[Paid design partners]
      DesignPartners --> AcceptedPackets[Accepted live review packets]
      AcceptedPackets --> ProductionAccounts[Production review-pack subscriptions]
      ProductionAccounts --> Expansion[More counterparties and monitored entities]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: Revenue engine
  finding: Base revenue is driven by moving from 3 paid design-partner accounts at Y1 exit to 30 paid review-pack subscriptions by Q4Y3 while annualized value per account approaches about $98K.
- checkName: Must go right
  finding: Sponsor banks must treat cited exported packets as real first-pass input so pilots convert after one live review and expansions inside each logo follow quickly.
- checkName: Model breaks if
  finding: If sales cycles stretch toward 150 days or gross margin stalls below 68%, the downside case pushes the cash floor toward roughly $0.1M before the company has clear seed proof.
- checkName: Next-round proof
  finding: The seed story is 6-8 production logos, 10 reusable sponsor-bank templates, and evidence that accepted packets reduce submission time and follow-up burden enough to justify broader rollout.
sanityChecks:
  ruleOf40: Y3 growth 145.3% + EBITDA margin 3.8% = 149.1%
  burnMultiple: Y2 burn multiple is about 0.7x using roughly $0.80M of EBITDA burn against about $1.15M of net new ARR; Q2Y3 turns EBITDA positive.
  revenuePerFte: $278K Y3 on 9 ending FTE (benchmark $200-400K SaaS)
  flags:
  - customersEop counts paid covered-entity subscriptions and review packs, so unique production logos are lower than the headline paid-account count.
  - The base case assumes one GTM lead plus referral channels can drive enough within-logo expansion to reach 30 paid accounts by Q4Y3.
  - Gross margin only reaches the 72% target if at least 70% of customer evidence is already digitized; otherwise onboarding becomes services-heavy and EBITDA compresses quickly.
  - The model still depends on sponsor-bank acceptance of fintech-generated packets as first-pass input; if banks force full re-keying, pricing power and expansion both weaken.
  - A $2.3M pre-seed leaves the cash low point around $0.52M, so a materially slower conversion cycle would force an earlier seed process.
