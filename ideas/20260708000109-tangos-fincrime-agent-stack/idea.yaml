problem: >-
  Money-movement fintechs are repeatedly asked to prove who owns them, how
  control has changed, which jurisdictions they touch, and where funds
  originate each time a bank, network, or regulator reopens diligence. Every
  new corridor, investor, or annual EDD cycle sends compliance teams back into
  cap tables, shared drives, outside-counsel memos, and vendor searches to
  rebuild the same dossier in a slightly different template. The work is high
  stakes because delays can stall launches or strain sponsor-bank
  relationships, yet most compliance tooling stops at screening hits instead of
  assembling a defensible ownership file.
targetUser:
  primary: >-
    Head of Compliance, MLRO, or BSA lead at a U.S. or UK money-movement
    fintech that depends on multiple bank and network partners.
  secondary: >-
    Legal operations and corporate-secretary teams responsible for entity
    records, board materials, and diligence responses.
  buyer: Chief Compliance Officer, COO, or General Counsel.
startupThesis:
  nonObviousInsight: >-
    The under-served side of agentic financial-crime infrastructure is the
    company being investigated, not just the bank investigator. Once regulators
    and counterparties accept source-traced AI case files, high-risk fintechs
    can maintain a living evidence graph of ownership, controllers, licensing,
    and source-of-funds once and reuse it across every sponsor-bank, network,
    and regulator request. That turns enhanced due diligence from episodic
    document scramble into always-on compliance infrastructure.
  beachhead: >-
    Compliance leads at U.S. and UK money-movement fintechs holding 3-10 bank
    or network partnerships and handling repeated beneficial-ownership and
    source-of-funds refreshes after each new corridor launch or annual EDD
    cycle.
  wedge: >-
    A counterparty EDD autopilot that ingests cap-table records, entity charts,
    board minutes, licensing documents, prior review responses, and external
    risk data to generate cited bank-specific beneficial-ownership and
    source-of-funds files.
  whyNowCatalyst: >-
    Tangos' funding and commercial deployments around autonomous investigations,
    beneficial-ownership workflows, regulator-ready case files, and
    source-traced reasoning show that counterparties are finally willing to
    trust AI-built diligence packets when every claim is cited and reviewable.
  ventureScalePath: >-
    Start with recurring partner-review packs for payment fintechs, then expand
    into bank-side review workspaces, continuous KYB monitoring, M&A or
    change-of-control diligence, network onboarding, and eventually a portable
    trust passport shared across regulated financial institutions.
solution: >-
  The product creates a living evidence graph for each regulated entity rather
  than a static folder of diligence documents. It syncs legal-entity records,
  investor and board updates, licenses, prior questionnaire answers, and
  supporting files, then uses source-traced agents to assemble partner-specific
  beneficial-ownership maps, source-of-funds narratives, and exception
  explanations. Each output links every assertion back to an underlying
  document, highlights stale or contradictory evidence, and keeps a reviewer
  log of what changed since the last submission. When a sponsor bank or card
  network sends a new template, the team starts from a reusable case file
  instead of rebuilding the packet by hand. Over time, the company becomes the
  system of record for how a fintech proves its identity and control posture to
  every critical counterparty.
goToMarketSeed:
  firstCustomer: >-
    A U.S. remittance, payroll, or card-program fintech with three to five
    sponsor-bank or card-network partners, one upcoming annual review, and
    recent ownership or corridor expansion.
  buyingTrigger: >-
    A sponsor bank, correspondent bank, or card network requests an annual EDD
    refresh just as the fintech is adding a new corridor, major investor, or
    partner relationship.
  currentAlternative: Shared drives, spreadsheets, outside-counsel diligence memos, KYC data vendors, and manual copy-paste into each counterparty template.
  switchingReason: >-
    The wedge reuses a living evidence graph, tailors packets to each
    counterparty, and preserves source citations, so the fintech answers faster
    without adding analysts or risking contradictory submissions.
  pricingHypothesis: >-
    Annual subscription priced by legal entities covered, active counterparty
    review packs, and monitored jurisdictions, likely starting around $40k-$150k
    ARR plus onboarding.
