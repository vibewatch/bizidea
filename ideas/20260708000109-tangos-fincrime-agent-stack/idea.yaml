topRisks:
  - name: Counterparty format fragmentation
    description: Banks and networks often use bespoke questionnaires and may resist a standardized packet from a fintech vendor.
    mitigation: Start with export layers for the most common partner templates and prove faster first-pass acceptance with design partners on both sides of a review.
  - name: Evidence freshness decay
    description: Ownership and source-of-funds files become unsafe quickly if cap tables, entities, or corridor exposure change without being captured.
    mitigation: Integrate with cap-table, entity-management, and internal approval systems, then force change attestations and stale-document alerts before any packet ships.
  - name: Incumbent bundling
    description: KYC data vendors, onboarding tools, or outside counsel could add lightweight dossier-generation and reduce willingness to buy a new standalone product.
    mitigation: Win on reusable multi-counterparty workflows, counterparty-specific acceptance data, and a living evidence graph that spans internal records plus external risk data.
