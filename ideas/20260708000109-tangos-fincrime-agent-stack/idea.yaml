jobsToBeDone:
  - job: >-
      When a bank or network asks for our annual enhanced due diligence
      refresh, help our compliance team assemble a cited ownership and
      source-of-funds package fast, so we keep the relationship and avoid
      launch delays.
    currentAlternative: Shared folders, outside-counsel memos, spreadsheet trackers, and repeated vendor searches.
    successMetric: Days to submit a complete review pack and number of follow-up questions per counterparty review.
  - job: >-
      When we add a new investor, legal entity, or payment corridor, help us
      update every critical counterparty dossier consistently, so we do not
      send conflicting answers across partner reviews.
    currentAlternative: Manually editing org charts, questionnaires, and email attachments for each partner.
    successMetric: Percentage of counterparty packets updated within one business day of a material entity or corridor change.
ideaScorecard:
  signalStrength:
    score: 5
    rationale: Multiple fetched sources tie new funding to autonomous investigations, live deployments, audit trails, and explicit beneficial-ownership coverage.
  painIntensity:
    score: 5
    rationale: Failed or slow EDD responses can block launches, trigger escalations with sponsor banks, and consume highly paid compliance and legal time.
  wedgeClarity:
    score: 5
    rationale: Repeated counterparty diligence packets are a narrow, document-heavy workflow with obvious inputs, outputs, and turnaround metrics.
  defensibility:
    score: 4
    rationale: A reusable evidence graph, template library, and partner-clearance dataset can compound, though KYC vendors or governance tools could add lighter packet-generation features.
  ventureScale:
    score: 5
