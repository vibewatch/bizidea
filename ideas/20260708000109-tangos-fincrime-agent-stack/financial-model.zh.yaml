scenarios:
  downside:
    description: 合作银行接受更慢，logo 内扩张更慢，接入流程也比计划更手工。
    y3RevenueK: 1710.0
    y3EbitdaK: -330.0
    cashLowPointK: 140.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 只能到约 22，而不是 30。
    - 每个付费账户的综合年价值停在约 $88K，而不是约 $98K。
    - 毛利率只能爬到约 68%，因为证据收集和人工复核仍然偏服务化。
  base:
    description: 共创客户在一场真实复审后转生产，合作银行模板复用提升接入效率，logo 内扩张也能持续带来新付费账户。
    y3RevenueK: 2502.0
    y3EbitdaK: 95.4
    cashLowPointK: 518.3
    keyAssumptionChanges:
    - M12 时 3 个付费账户，Q4Y2 时 15 个，Q4Y3 时 30 个。
    - 到 Q4Y3，每个付费账户的综合年价值提升到约 $98K。
    - 随着模板和集成复用起来，毛利率在 Q4Y3 达到 BP 目标的 72%。
  upside:
    description: 律师与合作银行顾问加速共创客户线索流入，更多客户扩到额外对手方，模板复用也让毛利率比计划更早抬升。
    y3RevenueK: 3050.0
    y3EbitdaK: 430.0
    cashLowPointK: 640.0
    keyAssumptionChanges:
    - Q4Y3 的 customersEop 可到约 34，而不是 30。
    - 监控与多对手方挂载把综合年价值抬到接近 $105K/付费账户。
    - 随着接入和复审工作更标准化，毛利率可提升到约 74%。
sensitivity:
- variable: ARPU
  downsideCase: 年度合同价值和监控挂载比计划低约 10%。
  baseCase: Q4Y3 的年化单账户价值达到约 $98K。
  upsideCase: 更多对手方扩张让年化价值比计划高约 7%。
  y3RevenueImpactK: -250.2
  cashImpactK: -180.0
- variable: CAC
  downsideCase: 顾问转介绍跑弱，CAC 上升到 $50K 后半段。
  baseCase: 创始人主导销售加渠道，让单个付费账户 CAC 维持在约 $43K。
  upsideCase: 同一 logo 内的模板化扩张，把 CAC 压到 $40K 以下。
  y3RevenueImpactK: -80.0
  cashImpactK: -140.0
- variable: 流失率
  downsideCase: 如果买方只把产品当准备工具而不是记录主系统，月流失率会上升到 3.0%。
  baseCase: 一旦被接受的模板嵌进年度复审，月流失率维持在 2.0%。
  upsideCase: 证据包成为合作方尽调默认起点后，月流失率可维持在约 1.2%。
  y3RevenueImpactK: -140.0
  cashImpactK: -110.0
- variable: 销售周期
  downsideCase: 从试点转生产的周期，会从约 90 天拉长到约 150 天。
  baseCase: 一场真实年度复审足以在一个季度内转化大多数早期共创客户。
  upsideCase: 预算负责人对齐且首轮通过很强时，转化周期可压到约 60 天。
  y3RevenueImpactK: -320.0
  cashImpactK: -210.0
- variable: 毛利率
  downsideCase: 如果手工清洗证据持续存在，毛利率会卡在约 68%。
  baseCase: 模板复用和集成把服务强度压下去后，毛利率收口到 72%。
  upsideCase: 安全部署与复审流程标准化后，毛利率可达 74%-75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -170.0
- variable: 招聘节奏
  downsideCase: 还没证明生产转化，模板运营和财务岗位就被提前拉进来。
  baseCase: 扩招要等到第 2 年模板验证完成后才发生，Q4Y3 时团队只到 9 FTE。
  upsideCase: 大部分 Y3 都把团队控制在 8 FTE，也不会拖慢交付。
  y3RevenueImpactK: 60.0
  cashImpactK: -160.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  TargetAccounts[资金流转 fintech] --> DesignPartners[付费共创客户]\n  DesignPartners --> AcceptedPackets[被接受的真实复审材料包]\n  AcceptedPackets --> ProductionAccounts[生产阶段复审包订阅]\n  ProductionAccounts --> Expansion[更多对手方与受监控实体]\n  Expansion --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金与跑道]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准收入引擎，是把 Y1 末的 3 个付费共创账户，推到 Q4Y3 的 30 个付费复审包订阅，同时让每账户年化价值逼近约 $98K。
- checkName: 必须顺利的事
  finding: 合作银行必须把带引用的导出材料包当成真正的首轮输入，这样试点才能在一场真实复审后转生产，并快速带出 logo 内扩张。
- checkName: 模型会坏在
  finding: 如果销售周期拖到 150 天附近，或毛利率卡在 68% 以下，悲观情景会把现金低点压到约 $0.1M，而公司那时还没拿到清晰的 seed 证明。
- checkName: 下一轮证明
  finding: seed 故事应当是：6-8 个生产 logo、10 套可复用合作银行模板，以及被接受的材料包确实能把提交时间和追问负担压下来，从而支撑更广推广。
sanityChecks:
  ruleOf40: Y3 增长 145.3% + EBITDA 利润率 3.8% = 149.1%
  burnMultiple: Y2 的 burn multiple 约为 0.7x：大约 $0.80M 的 EBITDA burn，对应约 $1.15M 的净新增 ARR；Q2Y3 转为 EBITDA 为正。
  revenuePerFte: Y3 年末 9 名 FTE，对应人均收入 $278K（SaaS 基准为 $200-400K）
  flags:
  - customersEop 统计的是付费的覆盖实体订阅和复审包，因此独立生产 logo 数会低于名义上的付费账户数。
  - 基准情景假设：1 名 GTM 负责人加转介绍渠道，就足以把同一 logo 内扩张推到 Q4Y3 的 30 个付费账户。
  - 只有当客户至少 70% 的证据已经数字化时，毛利率才拉得上 72%；否则接入会重新变成重服务，EBITDA 会迅速被压缩。
  - 模型仍然押在合作银行愿意接受 fintech 生成材料包这件事上；如果银行坚持全部重录，定价权和扩张都会一起变弱。
  - $2.3M 的 pre-seed 会把现金低点留在约 $0.52M，因此只要转化周期明显变慢，就会被迫更早启动 seed 融资。
