slug: counterparty-edd-autopilot
date: '2026-07-08'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-08] 模型从带日期 business plan 之后的第一个完整运营月开始。'
- id: A2
  name: 起始现金 / pre-seed 融资
  value: $2.3M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景取 pre-seed 区间偏下中位数，目标是在到达首个 seed 里程碑时仍保留约 6 个月缓冲。'
- id: A3
  name: 起始付费账户数
  value: '0'
  unit: 数量
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司从零收入起步，必须先拿下付费共创客户。'
- id: A4
  name: 付费账户定义
  value: 处于试点或年度合同中的付费覆盖法律实体，或活跃的对手方复审包订阅
  unit: 定义
  source: '[BP businessModel.unitOfValue + BP gtm.pricing] customersEop 统计的是已变现的复审包范围，而不只是去重后的 logo 数。'
- id: A5
  name: 付费共创客户经济模型
  value: $30K，约 3 个月摊完（约 $10K/mo）
  unit: USD/account
  source: '[BP investorMemo.firstCustomer.initialContract $20k-$40k] 模型取单一实体、单次真实复审的付费试点价格中位数。'
- id: A6
  name: 生产合同与扩张经济模型
  value: 生产范围从约 $75K-$90K ARR 起步；随着更多对手方、司法辖区和监控模块挂载，到 Y3 混合年价值约靠近 $98K。
  unit: USD/account/year
  source: '[BP investorMemo.firstCustomer.initialContract $60k-$120k ARR + BP businessModel.expansionLevers + Research market.sam/som] 模型保持在研究给出的价格带内，只给温和的扩张收入。'
- id: A7
  name: 客户爬坡
  value: M12 时 3 个付费账户，Q4Y2 时 15 个，Q4Y3 时 30 个
  unit: customersEop
  source: '[BP milestones 0-12 / 12-24 / 24-36 months + BP gtm.funnelTargets + Research market.som] Y2 假设做到 6-8 个生产 logo，并在 logo 内做一些多对手方扩张；Y3 再打到研究里的 SOM 规模。'
- id: A8
  name: 收入确认规则
  value: 期末付费账户数 × 该期每账户的综合已实现收入：Y1 约 $10K/account/month，Y2 约 $25K-$27K/account/quarter，Y3 约 $24.5K-$26K/account/quarter。
  unit: 公式
  source: '[BP gtm.pricing + BP businessModel.revenueStreams + Research market.sam/som] 这样做能让收入始终直接绑定客户数和合同结构。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 48%-58%，Y2 为 60%-68%，Y3 为 69%-72%
  unit: 毛利率
  source: '[BP businessModel.targetGrossMarginPct 72 + BP operatingAssumptions digital-evidence coverage + BP operations] 早期接入和人工复核更重服务，模板与集成复用起来后，毛利才逐步抬升。'
- id: A10
  name: 招聘节奏
  value: M1 配齐产品/合规负责人、创始工程师和创始 GTM；M4 招集成工程师；M6 招解决方案负责人；M9 招安全/平台工程师；M16 招数据/集成工程师；M31 招模板运营/客户成功；M34 招财务/运营。
  unit: 时间线
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 在看见共创客户验证和模板复用之前，团队始终保持精简。'
- id: A11
  name: 产品 / 合规全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP team compliance product lead + startup-finance heuristic] 这是一个领域经验要求很重、但仍处于 pre-seed 阶段的现金薪酬水平。'
- id: A12
  name: 工程全成本薪酬
  value: $175K
  unit: USD/year
  source: '[BP team founding / integration / security engineering roles + startup-finance heuristic] 足以招到资深 fintech 基础设施人才，但还没有按后期公司现金水平来假设。'
- id: A13
  name: GTM 全成本薪酬
  value: $160K
  unit: USD/year
  source: '[BP team founding GTM + BP gtm.channels + startup-finance heuristic] 里面已经包含企业销售差旅和创始人主导销售下的浮动激励。'
- id: A14
  name: 解决方案 / 模板运营全成本薪酬
  value: $140K
  unit: USD/year
  source: '[BP team solutions and implementation lead + BP operations template maintenance + startup-finance heuristic] 反映高触达接入的成本，但没有搭一支大服务团队。'
- id: A15
  name: G&A / 运营全成本薪酬
  value: $100K
  unit: USD/year
  source: '[BP fundingAsk.useOfFundsSummary + startup-finance heuristic] 财务和供应商管理支持会在爬坡后段才加入。'
- id: A16
  name: 薪酬分摊到损益表
  value: 产品/合规 20% 记入 S&M / 60% 记入 R&D / 20% 记入 G&A；工程 100% 记入 R&D；GTM 100% 记入 S&M；解决方案/模板运营 60% 记入 S&M / 40% 记入 R&D；G&A/运营 100% 记入 G&A
  unit: 分摊
  source: '[BP team role rationales + BP operations] 既让实施工作部分计入客户侧，也保留一部分计入模板产品化。'
- id: A17
  name: 非薪酬 opex 爬坡
  value: 非薪酬 S&M / R&D / G&A 从 Y1 早期每月 $8K / $6K / $5K，抬到 Q4Y3 时的每月 $17K / $12K / $9K。
  unit: USD/month
  source: '[BP operations + BP gtm.channels + startup-finance heuristic] 覆盖差旅、云与推理成本、法务、安全工具和轻量渠道建设开支，但不假设大规模付费获客。'
- id: A18
  name: 现金转换规则
  value: 现金变动等于 EBITDA
  unit: 公式
  source: '[startup-finance heuristic] 在 pre-seed 规模下，capex、税、融资费用和营运资金时点影响都按不重要处理。'
- id: A19
  name: 稳态月流失率
  value: 2.0%
  unit: 每月百分比
  source: '[startup-finance heuristic for workflow SaaS + BP whyWeWin + BP strategyMap.northStarMetric] 一旦模板被合作银行接受，这类重复尽调流程应当比较粘，但早期流失仍按高于成熟治理软件的水平建模。'
- id: A20
  name: 基准销售周期
  value: 从付费共创客户启动到转成年合同，或扩到下一个对手方，大约 90 天
  unit: 天
  source: '[BP experimentRoadmap 90-180 days + BP investorMemo.nextDiligence] 模型假设一场真实复审就足够证明早期 ROI。'
- id: A21
  name: CAC 口径
  value: 36 个月总 sales and marketing 支出 ÷ 30 个净新增付费账户
  unit: 公式
  source: '[model calc using base-case S&M spend + BP gtm.channels + BP gtm.funnelTargets] 由于同一 logo 内会扩到更多对手方，单个付费账户的 CAC 会低于纯新 logo 拓展。'
- id: A22
  name: 下一轮里程碑对应的融资规模
  value: 在 seed 前做到 6-8 个生产 logo、2 个已被接受的真实年度复审材料包、10 套可复用合作银行模板，以及初步渠道验证。
  unit: 里程碑
  source: '[BP fundingAsk.useOfFundsSummary + BP milestones 0-12 / 12-24 months + BP investorMemo.nextDiligence] 这轮 pre-seed 的规模，就是为在下一轮前把接受度、转化率和模板复用做出证明。'
- id: A23
  name: 季度薪酬滚动规则
  value: Y2-Y3 的薪酬行按季度内真实入职月份滚动计算，而不是只看季度末快照。
  unit: 规则
  source: '[Headcount column convention + BP team startTiming] 这样薪酬费用才会和月度招聘节奏一致，而 headcount 表仍只展示快照。'
