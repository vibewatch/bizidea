reportMemo:
  executiveTakeaways:
  - 'Counterparty diligence is becoming an evidence-assembly problem, not just a screening problem: Tangos, Sumsub, Hawk, and Moody''s all now market agent-assisted, audit-friendly workflows around investigations, ownership, and KYB.[1][23][26][28][29]'
  - Sponsor-bank scrutiny remains the forcing function. OCC, FDIC, Fenwick, Sidley, Lithic, and DataVisor all describe tighter lifecycle oversight, fragmented responsibilities, and heavier documentation burdens in bank-fintech arrangements.[7][8][9][10][17][19][20][35]
  - The wedge is under-served because onboarding vendors, data providers, and investigation platforms each solve a slice of the workflow, but few are built to maintain a reusable internal evidence graph that can answer recurring bank- and network-specific templates.[21][22][23][25][26][29][30]
  - 'The broader category is growing, but the venture case depends on winning a narrow, high-complexity buyer set rather than the full AML software market: public reports put adjacent AML and KYC markets in roughly 11% to 14% CAGR territory.[31][32][33][34]'
  marketDefinition: 'The market is counterparty EDD automation for regulated money-movement fintechs: software that maintains ownership, control, licensing, and source-of-funds evidence and then assembles partner-specific diligence files for sponsor banks, correspondents, networks, and regulators. It sits between classic CDD/KYB onboarding and bank-side investigations.[4][8][17][21][23][26]'
  customerAndBuyer: The daily user is the head of compliance, MLRO/BSA lead, or legal-ops owner who must answer annual reviews, new-program diligence, and change-of-control questions from bank or network partners. The economic buyer is usually the CCO, GC, or COO because the pain spans compliance, partner management, and launch risk.[17][18][19][22][27]
  buyingTriggers:
  - point: A sponsor bank, network, or correspondent requests an annual review or enhanced due diligence refresh just as the fintech is launching a new rail, corridor, or program.
    sourceRefs:
    - 8
    - 10
    - 17
    - 19
  - point: A new investor, cap-table change, or control change forces the team to update beneficial ownership narratives and evidence across multiple counterparties.
    sourceRefs:
    - 5
    - 13
    - 25
  - point: Heightened supervision or remediation pressure causes a sponsor bank to demand clearer role allocation, audit trails, and reusable evidence from its fintech partners.
    sourceRefs:
    - 7
    - 9
    - 20
    - 27
    - 35
  willingnessToPay:
    summary: Buyers already absorb this cost through delayed launches, manual analyst time, outside-counsel work, and enterprise verification tools. Lithic says wrong bank-partner choices can delay launches by months, Middesk says manual KYB slows approvals and drives drop-off, and Sumsub publicly prices paid compliance plans while reserving business verification for enterprise tiers. That supports a meaningful annual software budget for teams facing recurring partner reviews.
    sourceRefs:
    - 17
    - 22
    - 23
    - 24
  competitiveLandscape: Middesk and Sumsub own business-verification flows, Kyckr and LSEG sell external-company and screening data, Tangos and Hawk automate institution-side investigations, and Moody's sits higher in the KYC/AML stack. The gap is a counterparty-owned evidence system that can reuse internal corporate records and prior answers across recurring bank or network templates.[21][23][25][26][28][29][30]
  incumbentThesis:
  - incumbentClass: KYB onboarding vendors
    point: They reduce friction at initial business onboarding, but their center of gravity is pass/fail verification rather than long-lived, counterparty-specific EDD packets.
    sourceRefs:
    - 21
    - 22
    - 23
    - 24
  - incumbentClass: Data and screening incumbents
    point: They provide broad external coverage and reliable lists, but they do not own the internal document graph, approval history, or partner-specific narrative assembly the fintech still has to manage.
    sourceRefs:
    - 25
    - 29
    - 30
  - incumbentClass: Bank-side investigation platforms
    point: They automate investigators' work and case files inside institutions, but they are not optimized for the company being investigated to maintain a portable evidence dossier across many counterparties.
    sourceRefs:
    - 1
    - 26
    - 27
    - 28
  - incumbentClass: Advisory and sponsor-bank infrastructure
    point: Banks, counsel, and consultants can define control expectations and review programs, but recurring evidence maintenance still wants software instead of bespoke spreadsheet and memo work.
    sourceRefs:
    - 17
    - 18
    - 19
    - 20
  regulatoryLandscape: In the U.S., covered financial institutions must establish written procedures to identify and verify beneficial owners of legal-entity customers, and banks remain responsible for third-party risk management across the full relationship lifecycle.[4][5][7][8][9][10][11] In the UK, firms must run risk-based AML controls, identify PSCs, and increasingly comply with identity-verification updates, but PSC records are not synonymous with true UBO proof for EDD purposes.[12][13][14][15][25] The March 2025 FinCEN rollback of BOI reporting for U.S. domestic entities removes one potentially useful registry source and keeps U.S. ownership diligence more dependent on independent evidence gathering.[6]
  technologyLandscape: The enabling stack is already commercial. Tangos markets multi-jurisdiction, evidence-backed investigations; Hawk adds production AI overlays with governance; Moody's and LSEG provide reusable intelligence layers; and Middesk and Sumsub automate business verification, ownership, and questionnaires. The missing layer is cross-source orchestration over the fintech's own internal records and prior counterparty submissions.[16][21][23][26][28][29][30]
  distributionChannels:
  - point: Direct sales into compliance and legal teams timed to annual reviews, new sponsor-bank programs, or cross-border expansion projects.
    sourceRefs:
