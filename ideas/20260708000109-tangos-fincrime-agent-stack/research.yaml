openQuestions:
- Will sponsor banks accept a fintech-generated evidence pack as first-pass review input, or still require manual re-keying into bespoke questionnaires and portals?
- How many high-friction annual or trigger-based counterparty reviews does the median beachhead fintech actually complete each year?
- What percentage of required ownership and source-of-funds evidence is already digitized at target customers versus trapped in counsel memos and email attachments?
- Is budget more likely to be reallocated from outside counsel, verification vendors, or additional compliance headcount?
