    sourceRefs:
    - 21
    - 23
    - 24
    - 29
  validationPlan:
  - priority: high
    question: Can one bank-specific packet materially improve first-pass acceptance rates versus today's manual response process?
    evidenceToGather: Run pilots on at least two live annual reviews and compare submission time, follow-up-question volume, and first-pass acceptance against the prior cycle.
  - priority: high
    question: How complete are internal ownership, board, and source-of-funds records at target customers before implementation starts?
    evidenceToGather: Perform a design-partner data audit across cap-table, entity, document, and counsel memo sources before promising automation levels.
  - priority: medium
    question: 'Who actually owns the budget: compliance, legal, operations, or the sponsor-bank relationship team?'
    evidenceToGather: Interview ten target buyers and map current spend across analyst time, outside counsel, and existing verification vendors.
