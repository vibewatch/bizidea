  partnershipEcosystem:
  - point: Entity-management, cap-table, board-portal, and document-storage systems are critical upstream partners because the startup's value depends on turning internal records into reusable evidence.
    sourceRefs:
    - 22
    - 23
    - 25
  - point: KYB, registry, sanctions, and screening vendors are natural data partners because they supply the independent-source layer that regulators and banks expect.
    sourceRefs:
