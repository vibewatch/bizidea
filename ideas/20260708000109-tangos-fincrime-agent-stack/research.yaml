  adoptionFrictionMatrix:
  - friction: Internal ownership and source-of-funds data is fragmented across counsel memos, cap tables, and shared drives.
    severity: high
    affectedBuyer: Head of Compliance / Legal Ops
    mitigation: Start with one counterparty template, sync core records, and require human attestation on stale evidence before automation expands.
    sourceRefs:
