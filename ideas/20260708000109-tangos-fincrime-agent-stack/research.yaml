competitors:
- name: Middesk
  stage: scale-up
  wedge: US business verification and KYB automation for onboarding teams.
  pricing: Not publicly listed on fetched site.
  strength: Strong at low-friction U.S. entity verification and onboarding workflow design.
  weaknessVsUs: Less centered on recurring multi-counterparty evidence packs, source-of-funds narratives, and reusable annual-review exports.
  sourceRefs:
  - 21
  - 22
- name: Sumsub
  stage: scale-up
  wedge: Global KYB/KYC platform with registry checks, UBO verification, questionnaires, and monitoring.
  pricing: $1.35 per verification basic; enterprise plan includes business verification.
  strength: Broad global business-verification coverage and configurable workflows.
  weaknessVsUs: Broad compliance platform rather than a specialist system for recurring bank- and network-specific EDD reuse.
  sourceRefs:
  - 23
  - 24
- name: Kyckr
  stage: scale-up
  wedge: Registry-derived KYB and UBO verification with an emphasis on data provenance.
  pricing: Not publicly listed on fetched site.
  strength: Clear positioning around independent-source registry data and ownership verification.
  weaknessVsUs: Acts more like a data and verification layer than an end-to-end counterparty evidence orchestration product.
  sourceRefs:
  - 25
- name: Tangos
  stage: seed
  wedge: Autonomous financial-crime investigation platform with evidence-backed case files.
  pricing: Not publicly listed on fetched site.
  strength: Strong agentic investigation story, audit trails, and multi-jurisdiction evidentiary positioning.
  weaknessVsUs: Built for investigator-side workflows rather than the investigated counterparty's reusable ownership and source-of-funds dossier.
  sourceRefs:
  - 1
  - 26
- name: LSEG World-Check
  stage: incumbent
  wedge: Screening and risk-intelligence data for KYC, AML, and third-party due diligence.
  pricing: Not publicly listed on fetched site.
  strength: Deep external screening data, structured and de-duplicated for enterprise workflows.
  weaknessVsUs: External data does not solve the internal-document assembly, narrative generation, and packet-reuse problem.
  sourceRefs:
