slug: counterparty-edd-autopilot
date: '2026-07-08'
executiveSummary: 对手方 EDD 自动驾驶卖给的是那些反复要向合作银行、代理行和卡组织证明股权、控制权、牌照和资金来源的资金流转 fintech。滩头市场是美国和英国的汇款、薪资和卡项目 fintech：它们通常要对接 3-10 个合作方，年度复审多，新通道上线也频繁，因此最能感受到从共享盘、股权表和律师备忘录里一遍遍重拼证据包的高成本。首个产品不是又一个 KYB 工具，而是一张持续更新的证据图谱加一层导出引擎：先吃进内部实体档案和外部风险数据，再吐出按银行定制、带引用的受益所有权与资金来源材料，并配好审核签字和变更日志。“为什么是现在”也站得住：Tangos 以及一批相邻厂商已经证明，带证据链的 AI 工作流正在金融犯罪场景里商业化；与此同时，银行对 fintech 的监管持续收紧，合作方更需要审计就绪的对手方材料包。GTM 打法是付费共创客户：一旦客户眼前有一次年度 EDD 更新，或碰上控制权变更，就卖给 CCO、GC 或 COO，价值主张是少烧分析师和外部律师时间，更快过合作方审批。战略上也很清楚：先把一条窄工作流——合作银行的首轮复审材料包——打穿，再往持续 KYB 监控、银行侧共享复审工作台和更广的 AML 调查扩。最大的反证风险是：合作银行到底愿不愿把 fintech 生成的证据包当成首轮输入。如果银行仍坚持全部手工重录，这个产品就只剩提效工具属性，定价权和市场空间都会明显缩水。市场规模、ROI 和预算归属目前仍以估算为主，因为现有来源没有披露署名客户、量化时间节省或采购数据，所以前 6-12 个月必须直接验证接受度、复审频率和付费意愿。
problem:
- 只要到了年度复审、新通道上线、股权变更，或新增合作伙伴，合作银行和卡组织就会重启尽调，逼着合规团队从四散的内部档案里再拼一遍受益所有权和资金来源材料。
- 现有 KYB、筛查和调查工具能把外部风险数据或调查员工作流跑起来，但它们不维护一张由对手方自己持有、可反复复用的证据图谱，也做不出按合作方定制的答复包。
- 回复一旦慢或前后不一致，就可能拖住上线、伤到合作银行关系、推高外部律师支出；可现有来源还没有量化拒绝率或节省时间。
solution:
- 先把股权表记录、实体结构图、董事会材料、牌照文件、过往问卷和外部风险源串成一张持续更新的证据图谱，而且每条判断都能回链到原始证据。
- 再按合作银行和卡组织的要求，生成定制化 EDD 材料包、受益所有权结构图和资金来源叙述，并配上人工签字、过期证据预警和变更日志。
- 只有在首轮通过被验证之后，才从单条真实复审流程继续扩到持续变更监控和多对手方复用。
whyWeWin:
- 我们盯住的是“被调查的对手方，如何持续维护证据”这个高频问题，而不是泛化准入或银行侧调查，所以跨多个合作方复用不是附加功能，而是核心工作流。
- 模板库、追问历史和通过率分析会越做越深，最后沉淀成一张专有地图：哪家合作银行、哪家卡组织，最快会放行什么样的证据。
- 人工复核过、带引用的导出材料，再加上私有化部署选项，更贴合合规 AI 推不开的三类约束：审计、安全和模型治理。
strategicChoices:
  beachhead: 美国和英国的资金流转 fintech，集中在汇款、薪资和卡项目场景，手里管着 3-10 家合作银行或卡组织，并反复要更新受益所有权和资金来源材料。
  wedgeRationale: 先抓一条正在发生的年度复审或触发式对手方复审，比一上来做大而全的 KYB 准入或完整 AML 自动化更容易出结果，因为输入、输出、买方痛点和 ROI 指标都摆在眼前：提交速度、追问数量和审批时长。
  sequencingRationale: 公司应该先在一条复审流程上证明“带引用的导出材料包”能过关，再去做持续监控、银行侧工作台或大规模集成。原因很简单：最难翻的两道坎，就是合作银行的信任，以及客户内部数据到底够不够完整。前期先靠创始人亲自打单和亲自实施，不急着砸大工程团队，让第一批共创客户先定义清楚哪些模板、证据字段和部署控制最重要。
  notYet:
  - 低复杂度的小商户 KYB 准入——这类客户往往只有一个对手方，股权结构也简单。
  - 银行侧交易监控、告警分流，或完整调查员案件管理。
  - 需要隔离网络交付、采购流程完全不同的政府或情报场景。
  - 受监管资金流转之外的跨行业第三方尽调。
market:
  tam: $203.5M，估算方法是大约 1,850 家可服务的美国/英国实体 × 约 $110k 的综合 ARR。
  sam: $31.5M，估算方法是大约 350 家高复杂度滩头 fintech × 约 $90k ARR。
  som: $2.7M，估算方法是第 3 年拿下 30 个可触达 logo × 约 $90k ARR。
  segments:
  - 拥有 3-10 家合作银行或卡组织关系的美国资金流转 fintech
  - 反复要应对银行或卡组织尽调的英国支付机构与电子货币机构
  buyingProcess: 通常是合规负责人或法务运营负责人先发起，因为年度复审或扩张事件会把证据工作一下推到眼前。等安全评估确认产品可以嵌进银行专用流程，而不用替换现有 KYB 或筛查供应商之后，CCO、GC 或 COO 才会拍板预算。
product:
  mvp: 先做一条“单一法律实体 + 一次真实合作银行或卡组织复审”的带引用证据图谱与导出流程。它会吃进内部档案，映射到客户自己的证据模型，再导出一份带变更追踪、已通过审核签字的受益所有权与资金来源材料包。
  sixMonth: 覆盖 10 套高频合作银行/卡组织模板，打通文档存储，再接 1 个股权表来源和 1 个实体管理来源，并做出基于角色的安全审核签字。
  twelveMonth: 加上对股权、牌照和通道变动的持续监控，做出能跨多个对手方复用的答案库，并开始给追问率和通过率做对标报告。
  twentyFourMonth: 推出银行侧共享复审工作台、覆盖更广的美英多司法辖区股权逻辑，以及一套“信任护照”流程，让 fintech 能把已获认可的证据带去新合作方。
  keyBets:
  - 客户手里已经有足够多数字化的股权与资金来源证据，不至于把接入做成重服务生意。
  - 合作银行愿意把带引用的导出材料包当作首轮输入，而不是强迫客户重新手填一整套定制表单。
  - 不同对手方之间的模板重合度足够高，前几家客户做出来后，导出库会明显滚起复利。
  - 持续变更监控能带来扩张收入，而不只是一次性材料包功能。
gtm:
  wedge: 把自己卖成“最快帮 fintech 完成一条真实年度或触发式 EDD 更新”的工具：先服务一个复杂实体、打一场真实复审，靠带引用的导出材料和审核签字，取代从零重拼材料包。
  channels:
  - 创始人主导的直销，直接打到汇款、薪资和卡项目 fintech 的合规、法务和运营负责人
  - 通过 fintech 律师、合作银行顾问和整改顾问做转介绍——这些人最先看到尽调卡点
  - 与已经嵌在准入流程里的 KYB、登记册数据和风险情报供应商做集成与联合销售
  funnelTargets: 线索->确认痛点通话 25%+，确认痛点通话->付费共创客户 30%+，付费共创客户->生产环境 60%+，生产环境 logo->9 个月内拓到 2+ 个对手方 50%+
  pricing: 按覆盖的法律实体、活跃对手方复审包和监控司法辖区收费，起步大致落在研究得出的 $40k-$150k ARR 区间，再加实施费。付费共创客户的费用应当可抵扣到年合同里，让第一场真实复审同时证明 ROI 和向更多对手方扩张的可能。
businessModel:
  revenueStreams:
  - 覆盖法律实体和活跃对手方复审包的年度 SaaS 订阅
  - 实施与证据映射费用
  - 持续监控、私有化部署和银行侧共享复审工作台的高级模块
  unitOfValue: 带活跃对手方复审包的覆盖法律实体
  targetGrossMarginPct: 72
  expansionLevers:
  - 首场复审通过后，在同一客户内扩到更多对手方
  - 新增法律实体、司法辖区和股权变更监控工作流
  - 向上销售持续监控与私有化部署
  - 等 fintech 侧证据被信任后，再切进银行侧共享复审工作台
strategyMap:
  northStarMetric: 每季度首轮通过的对手方 EDD 材料包数量
  inputMetrics:
  - 从收到尽调请求到提交材料包的中位天数
  - 每份已提交材料包引发的追问数量
  - 必填证据字段中，带引用填满的占比
  - 试点转生产的转化率
  - 每个生产 logo 覆盖的对手方数量
  moatsToBuild:
  - 合作银行和卡组织模板库，以及与必需证据字段的映射
  - 按对手方和司法辖区沉淀的通过与整改数据集
  - 把内部档案和独立来源证据连起来的常青证据图谱
  - 贴合受监管合规复审的部署与治理控制
  killCriteria:
  - 跑完 6 个真实试点后，如果提交时间的中位降幅低于 30%，且追问数量相对旧流程没有改善，就该停。
  - 前 6 次合作银行或卡组织复审里，如果不到 3 次愿意把导出材料包当作首轮输入，而仍要求完全重录，就该停。
  - 如果没有任何滩头客户在一次成功的真实复审后，转成至少 $60k ARR，就该停。
  mermaid: "flowchart LR\n  Wedge[一家 fintech 的年度 EDD 更新切口] --> MVP[带引用的证据图谱与导出包]\n  MVP --> Proof[提交更快，追问更少]\n  Proof --> Expansion[单个 logo 覆盖更多对手方，并切到银行侧工作台]\n"
investorMemo:
  verdict:
    call: 值得见面，继续深挖
    conviction: 对痛点和时机有中等把握；一旦合作银行不肯把 fintech 生成的材料包当作首轮复审输入，这个判断会很快下修。
    whyBelieve: 公司卡住的是银行-fintech 监管收紧下，一个窄但很痛的证据装配瓶颈，也踩中了市场从“找线索”转向“做可回溯 AI 案件档案”的方向。
    whyDoubt: 现有证据还没有证明合作银行会接受这类材料包，也没有量化 ROI 或采购路径是否大到足以逃出“小众工作流工具”的天花板。
    nextDiligence: 先跑 2 个真实年度复审试点，确认提交更快、追问更少，并至少拿下 1 个 $60k+ 的生产转化。
  firstCustomer:
    title: 美国汇款或卡项目 fintech 的合规负责人
    profile: 一家拿过风投的资金流转 fintech，员工 50-300 人，有 3-5 家合作银行或卡组织关系，并且在新通道或股权扩张期间，眼前正好有一次年度 EDD 更新。
    trigger: 合作银行或卡组织的年度 EDD 更新，恰好落在新增通道、引入投资人或调整法律实体的同一季度。
    buyer: 首席合规官
    initialContract: $20k-$40k 的付费共创客户合同，覆盖 1 个实体和 1 次真实复审；等首个材料包被接受，再扩到更多对手方，转成 $60k-$120k ARR，另加实施费。
  mustBeTrue:
  - 目标客户的每个实体，每年至少会遇到 3 次反复出现的年度或触发式对手方复审。
  - 合作银行或卡组织愿意把带引用的导出材料包，当成真正的首轮输入，而不是只把它当准备工作。
  - 目标客户所需的股权与资金来源证据里，至少 70% 已经数字化，或能很快数字化。
  - 只要一场真实复审证明提交更快、追问更少，买方就愿意付至少 $60k ARR。
  - 在 KYB 现有厂商把类似功能打包进来之前，模板复用和通过率分析必须先滚出足够强的防御性。
  diligenceQuestions:
  - 一家典型滩头 fintech 的每个实体，每年到底要做多少次年度或触发式对手方复审？
  - 今天真正结构化地躺在系统里的证据占多少？又有多少还卡在律师备忘录、邮件附件和共享盘里？
  - 合作银行会接受导出材料包，还是仍要求重新进门户或重填问卷？
  - 预算第一归谁管：CCO、GC、COO，还是合作银行关系负责人？
  - 合作银行和卡组织模板之间到底有多少重合？碎片化又会在哪些地方削弱复用？
operatingAssumptions:
- assumption: 滩头 fintech 每个被覆盖实体，每年至少会遇到 3 次高摩擦的年度或触发式对手方复审。
  basis: research.yaml
  validationTest: 访谈 10 个目标客户，回看过去 12 个月的复审日历；只有当中位数达到每个实体至少 3 次复审时，才继续推进。
  decisionImpact: 如果复审频率更低，就把 ICP 收窄到最复杂的项目，或把定位改到控制权变更和新通道上线事件。
- assumption: 所需的股权与资金来源证据里，至少 70% 已经存在于数字系统或可访问文件里。
  basis: 运营判断
  validationTest: 和前 5 家共创客户一起做接入审计，在产品自动化前先量结构化数据与扫描件的覆盖率。
  decisionImpact: 如果证据覆盖率更低，接入就会变成重服务交付，毛利率和招聘假设都得重算。
- assumption: 合作银行会接受带引用的导出材料包，作为首轮复审输入，而不是强制要求完全重录。
  basis: research.yaml
  validationTest: 在 2 次真实合作银行复审里试点，跟踪导出材料包是否被直接采用，以及追问量是否下降。
  decisionImpact: 如果不成立，产品就先退回内部准备层，定价下调，融资野心也先收住，直到拿到银行侧工作流所有权。
- assumption: 一场成功的真实复审之后，买方愿意付 $60k-$120k ARR，因为产品替代了分析师时间、外部律师和审批拖延。
  basis: idea.yaml
  validationTest: 拿下 3 个付费共创客户，并至少把其中 2 个转成年合同，金额高于 $60k ARR。
  decisionImpact: 如果可成交价格低于 $40k ARR，创业公司就必须把自动化做得更深，或整体上探到更大的客户。
- assumption: 人工复核、审计日志和私有化部署，足以通过滩头客户的安全和 AI 治理审核。
  basis: research.yaml
  validationTest: 和前 3 个企业机会一起跑安全问卷和 AI 治理评估，而且不能要求定制本地交付。
  decisionImpact: 如果不成立，路线图就得把部署和治理能力提到模板扩张之前。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 和 10 家资金流转 fintech 做结构化 ICP 访谈与文档审计冲刺
  hypothesis: 滩头市场里，EDD 触发频率够高，且数字化证据够多，值得用软件而不是咨询来解。
  successMetric: 10 个目标里，至少 7 个反馈每个实体每年有 3 次或以上复审，且能从现有系统里拿出超过 70% 的核心文件。
  owner: 创始人和合规产品负责人
- horizon: 0-90 天
  experiment: 为 2 个潜在客户手工代做 1 套合作银行模板材料包
  hypothesis: 带引用、可复用的材料包，能在软件做完前先把准备时间砍下来，并暴露最值钱的模板字段。
  successMetric: 每个潜在客户都把材料包拿去跑真实或模拟复审，并反馈准备时间下降超过 40%。
  owner: 创始人和合规负责人
- horizon: 90-180 天
  experiment: 在 1 次真实年度复审上跑 MVP 试点
  hypothesis: 证据图谱加导出流程，能相对上一个周期同时压缩提交时间和追问数量。
  successMetric: 提交时间至少下降 50%，追问数量至少下降 30%。
  owner: 产品与共创客户团队
- horizon: 90-180 天
  experiment: 把 1 个股权表系统、1 个实体档案库和 1 个文档仓打通做集成试点
  hypothesis: 自动同步能显著提升证据新鲜度，并把手工维护量砍下来。
  successMetric: 超过 60% 的更新能自动同步，且过期文件预警都能在 5 个工作日内被处理。
  owner: 创始工程师
- horizon: 180-365 天
  experiment: 把对手方模板库扩到 10 家合作银行或卡组织
  hypothesis: 模板复用和通过率分析，会同时提升试点转化和单个 logo 的扩张。
  successMetric: 至少 50% 的生产客户扩到 2 个或以上对手方，首轮通过率达到 60% 或更高。
  owner: GTM 负责人和模板运营
- horizon: 180-365 天
  experiment: 和 1 家 fintech 律师或合作银行顾问做渠道合作测试
  hypothesis: 顾问渠道带来的机会，比冷启动外呼更急、更真。
  successMetric: 单个渠道伙伴至少带来 3 个合格的付费共创客户机会。
  owner: CEO 或创始 GTM 负责人
operations:
- 把季度证据健康检查绑到股权表、董事会、牌照和通道变化上
- 所有生成的材料包都必须先走人工审批队列，留下签字、时间戳和例外说明
- 建立模板运营流程，持续维护合作银行和卡组织问卷、导出格式以及通过/驳回反馈
- 接入登记册、制裁和负面媒体数据伙伴，补足独立来源证据层
- 对敏感合规文档提供私有云部署与最小权限访问控制
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 做出定义产品切口的证据图谱、导出引擎和安全文档模型。
- role: 合规产品负责人
  startTiming: Month 0
  rationale: 从第一场试点开始，把受益所有权逻辑、模板要求和审核流程写进产品。
- role: 创始 GTM
  startTiming: Month 0
  rationale: 负责创始人主导销售、共创客户接入，以及合作银行和律师渠道拓展。
- role: 集成工程师
  startTiming: Month 4
  rationale: 把股权表、实体档案和文档系统接起来，让证据新鲜度从手工工作变成产品能力。
- role: 解决方案与实施负责人
  startTiming: Month 6
  rationale: 接手接入审计、材料包质量，以及真实复审里从试点到生产的转化。
- role: 安全与平台工程师
  startTiming: Month 9
  rationale: 补齐企业采购所需的私有化部署、基于角色的访问控制和审计控制。
milestones:
- horizon: 0-12 个月
  items:
  - 在汇款、薪资或卡项目 fintech 里签下 3 个付费共创客户。
  - 完成 2 次真实年度复审试点，提交速度至少提升 50%，追问减少 30%。
  - 把证据图谱、审核签字流程，以及 10 套合作银行/卡组织模板导出交付上线。
  - 证明有 1 条安全部署路径，能在不做定制化本地部署的前提下通过客户安全评审。
- horizon: 12-24 个月
  items:
  - 转成至少 6 个生产 logo，并让其中一半扩到 2 个或以上对手方。
  - 上线针对股权、牌照和通道变化的持续监控。
  - 在美国和英国的银行/卡组织流程里，做出 25 套模板映射。
  - 和 1 家合作银行或 BaaS 伙伴跑通首个银行侧共享复审工作台试点。
- horizon: 24-36 个月
  items:
  - 做到 30 个生产 logo，或等价的银行侧席位，对应研究里的第 3 年 SOM。
  - 提供一套可在 fintech 与银行审核方之间流转的信任护照流程。
  - 把多司法辖区的股权逻辑扩到美国和英国之外。
  - 用通过与整改数据，按对手方给材料完整度和复审速度做对标。
risks:
- risk: 合作银行可能拒绝把 fintech 生成的材料包当作首轮复审输入。
  likelihood: High
  impact: High
  mitigation: 从真实合作方模板的精确导出格式切入，配上人工签字和引用，并在早期试点里严格量首轮通过率。
- risk: 内部的股权与资金来源数据可能太碎、太旧，无法安全自动化。
  likelihood: High
  impact: High
  mitigation: 先做接入数据审计，强制过期证据预警和确认声明，早期部署只收窄到 1 个实体和 1 条复审流程。
- risk: KYB、筛查或调查供应商，可能在公司还没建立防御性前就打包一个轻量材料包生成。
  likelihood: Medium
  impact: High
  mitigation: 在可复用的多对手方证据图谱、银行模板通过数据，以及更深的资金来源工作流上拉开差距。
- risk: 安全与 AI 治理异议，可能拖长销售周期，甚至逼出昂贵的交付要求。
  likelihood: Medium
  impact: High
  mitigation: 坚持人工在环，尽早交付审计日志和基于角色的访问控制，并为大客户支持私有化部署。
- risk: 如果复审频率或合同金额低于假设，滩头市场可能比预期更窄。
  likelihood: Medium
  impact: High
  mitigation: 尽快验证复审量和定价；只有首个切口被证明确实粘住后，才扩到银行侧工作台和持续监控。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 融资覆盖 18 个月：把证据图谱和导出层做出来，招齐第一批产品、合规、集成和 GTM 团队，跑完 3-5 个共创客户，再把真实年度复审的胜仗转成 6-8 个生产 logo 和初步渠道验证。
