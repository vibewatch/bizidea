  validationPlan:
  - priority: high
    question: Will VP Programs fund a standalone evidence layer, or only budget it inside an existing autonomy or integration contract?
    evidenceToGather: Interview 8-10 European unmanned program directors with an approval gate inside 120 days and quantify current debrief labor, contractor spend, and delay cost.
  - priority: high
    question: Which three vendor or C2 combinations cover most of the first-beachhead log volume?
    evidenceToGather: Collect real post-exercise artifacts from at least five target accounts and map the top telemetry, video, and C2 formats by frequency and pain.
  - priority: medium
    question: How much of the first ministry-ready packet can be generated from unclassified or sanitised data?
    evidenceToGather: Run one pilot on an air-gapped or sanitised data set and document what additional classified fields are required for buyer trust.
  - priority: medium
    question: How reusable are approval templates across UK, Norway, Netherlands, Germany, and France?
    evidenceToGather: Redline three to five real milestone review packs and measure shared fields, signatures, and evidence blocks across countries.
