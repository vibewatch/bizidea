problem: >-
  European and allied defense teams can now procure or pilot unmanned aircraft,
  but the painful bottleneck is proving that a mixed swarm actually behaved as
  intended across ranges, operators, and vendors. Mission logs live inside
  vendor-specific tools and after-action reports are stitched together by hand,
  so every exercise becomes a one-off argument about what the autonomy software
  really did. That slows contract increments, cross-ministry rollout, and
  allied interoperability just as swarming moves from demo to deployment.
targetUser:
  primary: >-
    Head of flight test or autonomy evaluation at a 150-800 person European
    unmanned-systems integrator running 10-50 drone swarm exercises for one
    allied ministry program
  secondary: >-
    Unmanned capability officer or range-test lead inside the ministry team
    reviewing exercise evidence and release decisions
  buyer: VP Programs or program director owning the unmanned pilot contract
startupThesis:
  nonObviousInsight: >-
    The next scarce layer in allied unmanned defense is not another drone or
    even another autonomy model. Once swarms span multiple vendors and allied
    buyers, the hard problem is creating neutral, reusable evidence that
    autonomy behaviors worked, failed safely, and improved from exercise to
    exercise.
  beachhead: >-
    After-action debrief and approval evidence for 10-50 drone swarm exercises
    run by European defense integrators delivering one NATO-aligned or allied
    ministry pilot
  wedge: >-
    An on-prem swarm evidence graph that normalizes multi-vendor exercise data
    into comparable autonomy scorecards, failure timelines, and ministry-ready
    approval packets
  whyNowCatalyst: >-
    Six Robotics' funding is explicitly aimed at autonomy software deployments
    across European and allied markets plus drone swarming, which means
    programs will need a repeatable evidence layer immediately rather than more
    bespoke post-mission reporting.
  ventureScalePath: >-
    Start with drone-swarm debriefs, then become the system of record for
    autonomy evidence, incident investigation, release gating, and
    interoperability benchmarking across air, maritime, and ground unmanned
    fleets in NATO-aligned defense programs.
solution: >-
  Swarm Evidence Graph would ingest mission logs, operator interventions,
  geofence events, and vehicle-health data from existing ground stations after
  each exercise. It would reconstruct a common mission timeline across vendors,
  score each sortie against agreed objectives, and auto-build approval packets
  with comparable metrics, failure annotations, and supporting clips for
  program reviews. The product runs on-prem or inside a secure enclave, so
  integrators keep their existing autonomy stacks while finally getting a
  neutral evidence layer above them. Over time, the company builds the
  benchmark dataset for takeover rates, comm-loss recovery, swarm cohesion, and
  repeatability across allied exercises, turning one debrief workflow into a
  cross-program data moat.
goToMarketSeed:
  firstCustomer: >-
    A 150-800 employee European unmanned-systems integrator preparing a 10-50
    drone swarm exercise for one NATO-aligned ministry and needing post-trial
    evidence before the next contract increment
  buyingTrigger: >-
    A new swarm exercise, pilot milestone, or allied evaluation requires
    comparable autonomy evidence across multiple vendors before additional
    budget or deployment approval is released
  currentAlternative: >-
    Vendor-specific flight logs, spreadsheet scorecards, PowerPoint debriefs,
    and contractor-written test reports
  switchingReason: >-
    The first customer switches because the product compresses debrief cycles
    from weeks to days and makes exercise evidence reusable across follow-on
    trials, ministries, and vendor mixes without replacing any current
    autonomy software
  pricingHypothesis: >-
    Annual program license priced by active exercise program and integrated
    platform type, plus setup fees for secure deployment and new vendor
    connectors
