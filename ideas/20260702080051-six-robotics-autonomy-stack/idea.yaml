differentiator: >-
  Unlike autonomy vendors, this company does not try to own mission planning
  or vehicle control. It becomes the neutral evidence layer across OEMs,
  integrators, and ministries, with a normalized event schema, failure
  taxonomy, and benchmark library that gets stronger every time a new exercise
  runs. That creates defensibility exactly where allied programs are forced to
  mix vendors but still need comparable proof of autonomy performance.
