ideaScorecard:
  signalStrength:
    score: 4
    rationale: Verified funding and product-direction signals show the autonomy-software shift is real, though source depth is still limited to two secondary reports.
  painIntensity:
    score: 4
    rationale: Programs can run exercises today, but manual debrief and proof-of-performance bottlenecks slow approvals, expansion, and interoperability.
  wedgeClarity:
    score: 5
    rationale: Post-exercise swarm evidence generation is a narrow, urgent workflow with a clear buyer, trigger, and measurable ROI.
  defensibility:
    score: 4
    rationale: A normalized event schema, vendor connectors, and cross-exercise benchmark data create switching costs, even if primes may eventually respond.
  ventureScale:
    score: 4
    rationale: The first use case is tightly scoped, but the same evidence layer can expand across allied air, sea, and ground autonomy programs.
topRisks:
  - name: Data access and classification
    description: Secure ranges and proprietary vendor log formats may block the product from receiving enough exercise data to generate trusted scorecards.
    mitigation: Start on unclassified or coalition exercises with a narrow connector set, ship on-prem, and prioritize vendors that already export usable telemetry.
  - name: Prime or OEM bundling
    description: Large autonomy vendors or primes may offer their own reporting tools and try to keep buyers inside single-vendor evidence silos.
    mitigation: Win where ministries or integrators must compare multiple autonomy stacks on one program and need a neutral cross-vendor record.
  - name: Budget-cycle drag
    description: Defense buyers may agree the debrief problem is real but delay standalone software purchases until the next milestone or procurement window.
    mitigation: Sell first through milestone-driven integrator budgets and tie ROI to shorter approval cycles, reusable evidence, and fewer contractor reporting hours.
