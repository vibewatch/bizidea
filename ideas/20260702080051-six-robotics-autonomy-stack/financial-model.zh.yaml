slug: swarm-evidence-graph
date: '2026-07-02'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-02] 模型从业务计划日期后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基础 case 使用 BP 区间下限，因为招聘计划保持精简，并且 Q4Y2 里程碑之后仍留下超过 6 个月现金。'
- id: A3
  name: 起始付费项目数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months] 公司从收入为零开始，必须先赢得共创客户，收入才会启动。'
- id: A4
  name: 付费项目定义
  value: 付费项目可以是绑定一次演习的付费试点，也可以是纳入证据管理的年度项目许可证。
  unit: definition
  source: '[BP gtm.wedge + BP businessModel.revenueStreams] customersEop 统计任何已经付费的项目，不只统计完全转成年度合同的项目。'
- id: A5
  name: 付费试点经济模型
  value: 约 3 个月 $120K（约 $40K/月）
  unit: USD/program
  source: '[BP investorMemo.firstCustomer.initialContract $100k-$150k paid pilot + BP gtm.wedge] 模型采用试点价值中点和 3 个月验证窗口。'
- id: A6
  name: 年度项目许可证经济模型
  value: 基础年度许可证约为每项目年 $360K，设置费和连接器费用已混入实际收入节奏。
  unit: USD/program/year
  source: '[BP gtm.pricing $350k-$400k per program-year + BP businessModel.revenueStreams setup fees + Research market.som $2.8M from 8 programs at ~$0.35M ACV] 成熟实现价值保持在研究定价区间内。'
- id: A7
  name: 收入确认约定
  value: 收入等于 customersEop 乘以该期间的混合实现价值：Y1 付费月份约 $40K-$45K/月，Y2 约 $85K-$90K/季度，Y3 约 $90K-$96K/季度。
  unit: formula
  source: '[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research bottomUpSizingDrivers modeled ACV] 让收入直接可追溯到客户数和分阶段定价组合。'
- id: A8
  name: 客户爬坡
  value: M12 达到 2 个付费项目，Q4Y2 达到 6 个，Q4Y3 达到 8 个
  unit: customersEop
  source: '[BP product.twelveMonth + BP milestones 12-24 and 24-36 + Research market.som] 基础 case 对应 Y1 转化 1 个年度许可证、Y2 多个后续项目，以及研究中的 8 项目第 3 年 SOM case。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 55%-60%，Y2 为 62%-70%，Y3 为 71%-73%
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research sensitivityCases on services-heavy connector work] 只有连接器和证据包模板复用减少定制工作后，毛利率才会改善。'
- id: A10
  name: 招聘时间线
  value: M1 创始人与创始工程；M3 连接器工程师；M5 任务保障负责人；M9 防务 BD 负责人；M11 安全部署工程师；M16 第四名工程师；M18 第二名任务保障；M20 运营/合规；M30 第二名 GTM。
  unit: timeline
  source: '[BP team startTiming + BP strategicChoices.sequencingRationale + startup-finance heuristic] BP 核心团队之外的招聘等到可重复性证明和付费项目 traction 后再启动。'
- id: A11
  name: 创始人全包薪酬
  value: $160K
  unit: USD/year
  source: '[startup-finance heuristic for lean pre-seed European defense founder cash comp + BP team Founding CEO / defense programs]'
- id: A12
  name: 工程全包薪酬
  value: $185K
  unit: USD/year
  source: '[startup-finance heuristic for secure robotics and data-platform engineers + BP team Founding eng and Connector and replay engineer]'
- id: A13
  name: 任务保障全包薪酬
  value: $155K
  unit: USD/year
  source: '[startup-finance heuristic + BP team Mission assurance / deployment lead]'
- id: A14
  name: 销售 / 伙伴关系全包薪酬
  value: $170K
  unit: USD/year
  source: '[startup-finance heuristic + BP team Defense BD / partnerships lead + BP gtm.channels]'
- id: A15
  name: 运营 / 合规全包薪酬
  value: $110K
  unit: USD/year
  source: '[startup-finance heuristic + BP operations secure deployment and auditable handling burden]'
- id: A16
  name: 薪酬分配到 P&L 科目
  value: 创始人 50% S&M / 20% R&D / 30% G&A；工程 100% R&D；任务保障 45% S&M / 45% R&D / 10% G&A；销售 100% S&M；运营 100% G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 薪酬映射到功能性 opex，而不是只显示为一条不区分的 salary line。'
- id: A17
  name: 非薪酬 opex 爬坡
  value: 月度非薪酬支出从 S&M/R&D/G&A = $3K/$6K/$5K 起步，Y1 后期升至 $6K/$9K/$6K，Y2 大部分时间维持在约 $8K/$9K/$7K，Y3 退出时约 $10K/$10K/$8K。
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 覆盖差旅、安全基础设施、法务、保险和合规，不假设大规模付费获客引擎。'
- id: A18
  name: 现金转换约定
  value: 现金变动等于 EBITDA。
  unit: formula
  source: '[startup-finance heuristic] 资本开支、融资费用、税费和营运资本时点在本阶段假设影响不大。'
- id: A19
  name: 稳态月流失
  value: 1.5%
  unit: percent per month
  source: '[startup-finance heuristic for sticky enterprise defense workflow software + BP strategyMap.moatsToBuild] 一旦证据包模板和连接器集合嵌入客户，切换应当较低但不为零。'
- id: A20
  name: 基础企业销售周期
  value: 从合格账户到付费试点约 5–6 个月，再从试点开始到年度转化约一个季度。
  unit: months
  source: '[BP gtm.wedge live exercise inside 90-120 days + BP product.twelveMonth conversion target + Research validationPlan budget-owner diligence]'
- id: A21
  name: CAC 约定
  value: 36 个月总销售和营销支出除以 8 个净新增付费项目。
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.funnelTargets] 覆盖整个建设期内创始人主导和伙伴主导的企业获客。'
- id: A22
  name: 下一轮融资里程碑
  value: 到 Q4Y2，公司应有 5–6 个付费项目、至少 3 个年度许可证转化、一个可在 2 个部委复用的证据包模板，以及一名已签署的集成或 reseller 伙伴。
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 + BP product.twentyFourMonth] pre-seed 的规模足以走到 seed-ready 证明：预算归属、可重复性和分发。'
- id: A23
  name: 季度薪资滚动约定
  value: Y2 和 Y3 薪资行使用每个季度内的实际月度招聘，而不是只看年末人数快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 即便 schema 只显示 Q4Y2 和 Q4Y3 快照，也保持薪资费用与招聘爬坡内部一致。'
