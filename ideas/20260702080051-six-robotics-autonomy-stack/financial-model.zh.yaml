scenarios:
  downside:
    description: 年度转化大约滑后两个季度，安全部署仍然定制化，渠道动作没有按时成形。
    y3RevenueK: 2050.0
    y3EbitdaK: -320.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Q4Y2 customersEop 约 4 个、Q4Y3 约 6 个，而不是 6 个和 8 个。
    - 实现年度价值停在每项目约 $335K，而不是约 $360K。
    - 退出毛利率接近 68%，因为连接器工作和部委定制仍然服务过重。
  base:
    description: 首批试点按计划转化，连接器复用稳步改善，公司在第 3 年落地研究中的 8 项目 SOM case。
    y3RevenueK: 2690.0
    y3EbitdaK: 40.4
    cashLowPointK: 726.1
    keyAssumptionChanges:
    - CustomersEop 从 M12 的 2 个，增长到 Q4Y2 的 6 个和 Q4Y3 的 8 个。
    - 成熟项目实现年度价值稳定在约 $360K，处于 BP 定价区间内。
    - 随着连接器和证据包模板复用提升交付杠杆，毛利率到 Y3 后期达到 73%。
  upside:
    description: 伙伴渠道更早落地，第二项目扩张提前出现，部署模型比预期更快标准化。
    y3RevenueK: 3200.0
    y3EbitdaK: 420.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
    - Q4Y2 customersEop 约 7 个，Q4Y3 约 9 个，因为伙伴来源试点提前。
    - 随着连接器费用和第二项目扩张更早挂载，混合年度价值升向约 $390K。
    - 退出毛利率约 75%，因为可重复安全部署减少了定制服务负担。
sensitivity:
- variable: ARPU
  downsideCase: 成熟项目混合实现年度价值落在约 $330K。
  baseCase: 成熟项目混合实现年度价值约 $360K。
  upsideCase: 成熟项目混合实现年度价值达到约 $390K。
  y3RevenueImpactK: -225.0
  cashImpactK: -170.0
- variable: CAC
  downsideCase: CAC 升向 $200K，因为创始人差旅和主承包商引荐转化效率较低。
  baseCase: CAC 维持在约 $160K，依靠创始人主导销售和一个伙伴渠道。
  upsideCase: 一旦伙伴来源试点可重复，CAC 降向 $130K。
  y3RevenueImpactK: -60.0
  cashImpactK: -320.0
- variable: 流失率
  downsideCase: 随着部分试点未能扩张，月流失率漂向 2.5%。
  baseCase: 月流失率保持 1.5%。
  upsideCase: 一旦证据包模板嵌入客户工作流，月流失率改善到 1.0%。
  y3RevenueImpactK: -160.0
  cashImpactK: -140.0
- variable: 销售周期
  downsideCase: 由于安全审查和预算归属耗时更久，中位周期拉长到约 9 个月。
  baseCase: 到付费试点的中位周期保持约 5–6 个月。
  upsideCase: 在现场演习触发和伙伴信任下，中位周期压缩到约 4 个月。
  y3RevenueImpactK: -430.0
  cashImpactK: -370.0
- variable: 毛利率
  downsideCase: 退出毛利率仅达到 68%。
  baseCase: 借助可复用连接器和模板，退出毛利率达到 73%。
  upsideCase: 随着部署更快标准化，退出毛利率达到 75%。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 招聘节奏
  downsideCase: 在转化证明建立前，提前增加一名工程师和一名 GTM。
  baseCase: 招聘按里程碑把关，并遵循精简 BP 排序。
  upsideCase: 第二名 GTM 等到 Y3 后期再招聘，也不拖慢 bookings。
  y3RevenueImpactK: -40.0
  cashImpactK: -170.0
modelDiagram:
  title: 单位经济模型流
  mermaid: "flowchart LR\n  TargetAccounts[Programs with live swarm milestones] --> DesignPartners[Qualified design partners]\n  DesignPartners --> PaidPilots[Paid pilot packets]\n  PaidPilots --> AnnualLicenses[Annual program licenses]\n  AnnualLicenses --> Expansion[More exercises, connectors, and add-ons]\n  Expansion --> Revenue[Revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Cash runway]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础收入来自付费项目从 Y1 退出时 2 个增长到 Q3-Q4Y3 的 8 个，同时成熟项目价值稳定在研究中的 $350K-$400K 区间附近。
- checkName: 必须跑通
  finding: 前两个试点必须转成年度许可证，证据包模板也必须能跨部委复用，让部署不再像咨询。
- checkName: 模型失效条件
  finding: 如果安全数据访问和部委专属定制拉长销售周期，同时毛利率维持在约 68% 以下，下行情景会在规模证明前把现金推近底线。
- checkName: 下一轮证明
  finding: seed-ready 证明点是在 Q4Y2 达到 5–6 个付费项目、3 个年度转化，以及一个由伙伴带来的部署，并且审批包能在 2 个部委复用。
sanityChecks:
  ruleOf40: Y3 growth 71.9% + EBITDA margin 1.5% = 73.4%
  burnMultiple: Y2 burn multiple 约 0.4x：用约 $0.54M EBITDA burn 对比约 $1.44M 新增 exit ARR；Q2Y3 转为 EBITDA 为正。
  revenuePerFte: $269K Y3 / 10 名期末 FTE（SaaS 基准 $200-400K）
  flags:
  - 基础 case 到第 3 年拿下约 38 个 SAM 项目中的 8 个，因此成功需要在集中买方池中赢得相当份额。
  - 只有连接器复用和证据包模板复用能避免部署长期服务过重，毛利率才会进入 70% 出头。
  - 预算 owner 不清仍可能迫使销售通过主承包商或 C2 伙伴，压缩独立性和毛利。
  - 研究中的 SAM 只有约 $13.3M，因此风险投资级上行仍取决于第 3 年后从演习后证据包扩展到更广自主能力保障工作流。
  - 现金按 EBITDA 建模；里程碑回款、安全硬件或合规 capex 可能改变真实现金时点。
