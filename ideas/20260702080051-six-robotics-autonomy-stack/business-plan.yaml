slug: swarm-evidence-graph
date: '2026-07-02'
executiveSummary: >-
  Swarm Evidence Graph sells an on-prem autonomy-evidence layer to European
  unmanned-systems integrators and OEM program teams running 10-50-drone
  exercises for NATO-aligned ministries. The acute pain is post-exercise proof,
  not flight control: mixed-vendor logs, operator interventions, and clips are
  stitched into one-off reports, which delays milestone approvals and contract
  increments. The MVP reconstructs a common mission timeline from existing
  telemetry and C2 data, scores autonomy behavior against agreed objectives,
  and emits a ministry-ready approval packet without replacing the current
  autonomy stack. This is a disciplined beachhead because it has a live buying
  trigger, a clear economic buyer in the program director or VP Programs, and a
  measurable ROI in days saved between exercise completion and approval. The
  company should not build autonomy, mission planning, or generic PLM first;
  the credible wedge is becoming the neutral evidence record across vendors
  that buyers do not want any single autonomy vendor to control. Research
  supports real demand and timing, but the initial market is modest—roughly
  $13.3M estimated SAM and $2.8M estimated year-3 SOM—so the venture case
  depends on expanding later into broader autonomy assurance, release gating,
  and cross-domain benchmarking. The first proof point is an accepted packet on
  one mixed-vendor exercise that cuts debrief time from weeks to days and
  converts into an annual program license before the next program milestone.
  The biggest disconfirming risk is that target accounts either will not share
  usable logs in secure environments or will only fund the workflow when
  bundled inside an incumbent autonomy or integration contract.
problem:
  - Mixed-vendor swarm exercises leave flight-test and autonomy-evaluation teams
    with telemetry, C2 events, operator actions, and clips spread across
    incompatible tools, making it hard to prove what the autonomy software
    actually did.
  - Manual debrief packets delay approvals, consume contractor reporting hours,
    and make evidence hard to reuse across contract increments, ministries, or
    vendor mixes.
solution:
  - Deploy an on-prem evidence graph that ingests post-exercise logs and
    operator artifacts, reconstructs one cross-vendor timeline, and produces
    comparable autonomy scorecards and failure annotations.
  - Map telemetry and events into ministry-ready approval packets so the same
    evidence can support the next milestone review, vendor comparison, and
    benchmark library.
whyWeWin:
  - "Neutrality is the product: integrators and ministries can adopt the layer
    without handing the evidence record to a competing autonomy-stack vendor."
  - The connector library, failure taxonomy, approval-template mappings, and
    cross-exercise benchmark dataset compound with each deployment and are
    harder to replicate than a dashboard.
strategicChoices:
  beachhead: European unmanned-systems integrators and OEM program teams running
    10-50-drone swarm exercises for one NATO-aligned ministry, starting in the
    Nordics and nearby allied programs where live swarm testing is already
    visible.
  wedgeRationale: This slice creates faster proof than selling broad defense
    analytics because each exercise ends with a concrete approval deadline,
    mixed-vendor evidence is already fragmented, and one accepted packet can be
    tied directly to milestone release and contract expansion.
  sequencingRationale: Start with one design-partner program, a narrow
    connector set, and sanitized or on-prem deployments so the company can
    prove debrief compression and packet acceptance before expanding into
    broader country templates, benchmark products, or adjacent unmanned
    domains.
  notYet:
    - Owning mission autonomy, swarm control, or mission planning.
    - Selling generic PLM or digital-engineering workflow without a live
      exercise-driven approval pain.
    - Expanding into maritime, ground, or U.S. DoD programs before the European
      air-program template and connector library are repeatable.
market:
  tam: Approximately $44.0M estimated annual TAM across roughly 110 allied
    integrator, OEM, and evaluation-program units that could run recurring
    multi-vendor unmanned trial cycles.
  sam: Approximately $13.3M estimated annual SAM across roughly 38 reachable
    programs in the Nordics, UK, Netherlands, Germany, France, Baltics, and
    adjacent allied integrators running 10-50-drone exercises.
  som: Approximately $2.8M estimated year-3 SOM from 8 paying programs at
    roughly $0.35M blended ACV after allowing for long onboarding and on-prem
    deployment friction.
  segments:
    - European unmanned-systems integrators and OEM test programs running
      10-50-drone swarm exercises for NATO-aligned ministries.
    - Ministry unmanned program offices and test organizations that review
      release decisions and compare autonomy performance across vendors.
  buyingProcess: >-
    The sale starts when a program milestone or upcoming exercise requires
    comparable autonomy evidence before the next budget increment or deployment
    approval. A deal normally needs sponsorship from the flight-test lead,
    approval from the program director or VP Programs, security sign-off on
    data handling, and acceptance that the first packet will be produced around
    one live exercise before converting to an annual program license.
product:
  mvp: >-
    The MVP is an on-prem post-exercise evidence workflow that ingests one
    program's existing telemetry, C2 events, operator interventions, and
    clips, then reconstructs a common timeline, scores agreed objectives, and
    generates a review packet. It should support one mixed-vendor exercise
    well, not full self-serve onboarding or every log format.
  sixMonth: Secure 2-3 design partners, identify the dominant vendor and C2
    combinations across the first 5 target accounts, and ship the first secure
    deployment that normalizes one mixed-vendor exercise into a reusable
    scorecard and packet.
  twelveMonth: Deliver 2 paid pilots, prove debrief turnaround of 5 business
    days or less on at least 1 live exercise, and convert the first pilot into
    an annual program license with a benchmark view across multiple sorties.
  twentyFourMonth: Cover the dominant connector set in the beachhead, reuse
    approval templates across at least 2 ministries or program offices, and
    expand from debrief packets into release gating, incident investigation,
    and cross-program benchmarking.
  keyBets:
    - The first 3-4 connector families cover enough log volume to make the
      product feel repeatable rather than services-heavy.
    - A ministry-ready packet can be generated from sanitized or air-gapped
      data without requiring full classified mission systems in the first
      deployment.
    - Program directors will pay for faster approval cycles and reusable
      evidence even if the software is sold inside a broader program budget.
gtm:
  wedge: Founder-led sales to integrator and OEM test leaders with a live swarm
    exercise inside 90-120 days, offering a paid pilot that produces one
    ministry-ready packet for a mixed-vendor event and converts to an annual
    program license if it shortens the next approval cycle.
  channels:
    - Founder-led outbound into European integrators and OEM program teams with
      upcoming swarm milestones.
    - Warm introductions through ministry, prime, range, and test-organization
      contacts already involved in live exercises.
    - Integration-led distribution with C2 or digital-engineering platforms
      after the first deployment proves the overlay model.
  funnelTargets: "Target 25-35% of targeted accounts to grant data-room access,
    40-50% of data-ready accounts to start a paid pilot, 50%+ of pilots to
    convert to annual program licenses, and 30%+ of first-year customers to
    add a second program or platform."
  pricing: Program-based annual licensing priced per active exercise program
    and integrated platform type, modeled at roughly $350k-$400k per
    program-year in the research, plus setup fees for secure deployment and new
    vendor connectors; price against avoided milestone delay and reusable
    approval labor, not seats.
businessModel:
  revenueStreams:
    - Annual program licenses for active exercise programs.
    - Secure deployment, connector, and onboarding fees.
    - Benchmarking, release-gating, or evidence-automation add-ons after the
      core debrief workflow is live.
  unitOfValue: Active exercise program-years under evidence management.
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more exercises, sorties, and vendor combinations within one program
      after the first accepted packet.
    - Reuse the connector library and approval templates across adjacent
      European ministries and integrators.
    - Expand from post-exercise packets into ongoing release gating, incident
      review, and cross-domain autonomy assurance.
strategyMap:
  northStarMetric: Annualized paying exercise programs where the product is
    used to produce accepted approval evidence.
  inputMetrics:
    - Number of target accounts granting usable post-exercise data access.
    - Median days from exercise completion to ministry-ready packet.
    - Pilot-to-annual-license conversion rate.
    - Average number of vendor or platform types normalized per live program.
    - Percentage of review questions answered from reusable evidence rather
      than fresh manual analysis.
  moatsToBuild:
    - Vendor-neutral connector library across the dominant telemetry, C2, and
      log formats in the beachhead.
    - Approval-template mappings that connect ministry review questions to
      underlying evidence artifacts.
    - Cross-exercise benchmark dataset on failure modes, operator
      interventions, comms-loss recovery, and swarm cohesion.
  killCriteria:
    - Fewer than 4 of the first 15 target accounts grant usable mixed-vendor
      exercise data within 6 months.
    - The first 2 pilots fail to cut debrief turnaround to 5 business days or
      less.
    - Fewer than 2 of the first 4 pilots convert into annual licenses or
      embedded recurring program budgets within 12 months.
  mermaid: |
    flowchart LR
      Wedge[Mixed-vendor swarm debrief pain] --> MVP[On-prem evidence graph plus first connectors]
      MVP --> Proof[Accepted ministry packet and faster review cycle]
      Proof --> Expansion[Annual program licenses plus broader autonomy-assurance workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Real pain and a disciplined wedge, but conviction remains
      limited until the company proves data access and budget ownership inside
      one live program.
    whyBelieve: Live NATO-aligned swarm activity, rising European defense
      spend, and adjacent autonomy funding support a real need for a neutral
      evidence layer above mixed-vendor autonomy stacks.
    whyDoubt: The market is concentrated and secretive, and the product can be
      squeezed if programs either refuse usable telemetry access or accept
      bundled reporting from autonomy, C2, or PLM incumbents.
    nextDiligence: Verify one paid pilot with real post-exercise artifacts, then
      measure whether an accepted packet shortens the next approval gate enough
      to justify annual program licensing.
  firstCustomer:
    title: Program director at a European unmanned-systems integrator with an
      upcoming NATO-aligned swarm exercise.
    profile: A 150-800 person integrator or OEM program team preparing a
      10-50-drone exercise, already mixing vendors or autonomy components, and
      facing a milestone review before the next contract increment.
    trigger: An upcoming exercise or review board requires comparable evidence
      across vendors before budget, release, or deployment approval is granted.
    buyer: VP Programs or program director
    initialContract: $100k-$150k paid pilot tied to one live exercise and one
      ministry-ready packet, converting to a roughly $350k-$400k annual program
      license after the next accepted milestone review.
  mustBeTrue:
    - At least 5 of the first 15 target accounts will grant usable telemetry,
      C2, and operator-artifact access under an on-prem deployment model.
    - The first live deployment can cut post-exercise packet turnaround from
      weeks to 5 business days or less.
    - At least 2 of the first 4 pilots will convert into recurring annual
      program licenses or equivalent embedded program budgets.
    - One approval-packet template can be reused across at least 2 ministries
      or program offices with limited customization.
    - No autonomy or digital-engineering incumbent can match neutral
      cross-vendor evidence well enough to block the first 3 target deals.
  diligenceQuestions:
    - Which 3 vendor or C2 combinations cover most of the first-beachhead data
      volume?
    - 'Who actually owns the budget for evidence tooling inside the first
      target programs: integrator, OEM, or ministry office?'
    - How much of the first accepted packet can be generated from sanitized or
      unclassified data?
    - How much services work is required to adapt one approval template across
      Norway, the UK, the Netherlands, Germany, and France?
    - What evidence do buyers need that a neutral layer is safer than using
      bundled reports from autonomy or C2 vendors?
operatingAssumptions:
  - assumption: Target accounts will share post-exercise telemetry, operator
      interventions, and clips if the product is deployed on-prem or inside a
      secure enclave.
    basis: research.yaml
    validationTest: Obtain 5 signed design-partner data-sharing commitments and
      ingest usable artifacts from at least 2 live or historical exercises
      within the first 90 days.
    decisionImpact: If false, narrow the wedge to one pre-integrated vendor
      stack or stop pursuing a cross-vendor evidence product.
  - assumption: A narrow connector set can cover most early deployments before
      custom integration work overwhelms product margin.
    basis: research.yaml
    validationTest: Map the first 5 target accounts and confirm that the top
      3-4 telemetry or C2 formats represent at least 70% of initial log volume.
    decisionImpact: If false, reduce the beachhead further or reframe the
      company as higher-margin software plus paid integration services.
  - assumption: Program directors will fund the workflow as a standalone or
      embedded software line item at roughly the modeled ACV once one packet
      shortens a real approval cycle.
    basis: research.yaml
    validationTest: Convert at least 1 paid pilot into a signed annual program
      license or recurring program budget before month 12.
    decisionImpact: If false, the company must sell only through primes or C2
      partners, which reduces independence and margin.
  - assumption: Sanitized or unclassified exercise data is sufficient to
      produce a buyer-trusted first approval packet.
    basis: research.yaml
    validationTest: Run the first pilot on sanitized data and track whether
      reviewers accept at least 80% of the packet without requesting
      classified-only evidence.
    decisionImpact: If false, onboarding time, deployment cost, and security
      burden rise enough to justify a smaller account list and larger funding
      need.
  - assumption: Founder-led outbound plus ministry and prime introductions are
      enough to create the first 10 qualified design-partner conversations.
    basis: operator judgment
    validationTest: Run a 30-account outreach motion and achieve at least 8
      qualified conversations and 3 technical scoping calls in one quarter.
    decisionImpact: If false, the company must hire defense BD earlier and
      accept a slower, more expensive pipeline.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Test design-partner demand and budget ownership.
    hypothesis: Integrators with a live swarm milestone will engage if the
      offer is a paid pilot tied to one accepted approval packet rather than
      generic analytics.
    successMetric: 8 qualified conversations, 3 scoping calls, and 2 signed
      pilot LOIs with identified budget owners.
    owner: Founding CEO / GTM
  - horizon: 0-90 days
    experiment: Map connector coverage across the first target accounts.
    hypothesis: A small set of log and C2 formats can cover most of the initial
      beachhead.
    successMetric: Top 3-4 formats represent at least 70% of the artifacts
      collected from the first 5 accounts.
    owner: Founding eng
  - horizon: 90-180 days
    experiment: Generate the first normalized replay and scorecard from a
      mixed-vendor exercise.
    hypothesis: The product can reconstruct one usable mission timeline from
      existing telemetry, operator actions, and clips without replacing the
      autonomy stack.
    successMetric: One complete packet draft produced from real exercise data
      and reviewed by the customer team.
    owner: Founding eng + mission assurance lead
  - horizon: 90-180 days
    experiment: Validate packet usefulness with a real review workflow.
    hypothesis: A ministry-ready packet can answer most approval questions
      faster than the current spreadsheet and PowerPoint process.
    successMetric: Customer reports at least 80% of review questions answered
      from the packet and a 50%+ reduction in debrief preparation time.
    owner: Mission assurance lead
  - horizon: 6-12 months
    experiment: Convert the first pilot into annual program licensing.
    hypothesis: If the first pilot shortens the approval cycle, the buyer will
      fund recurring use across the next exercise cadence.
    successMetric: 1 signed annual program license or embedded recurring budget
      and 1 additional paid pilot in process.
    owner: Founding CEO / programs
  - horizon: 6-12 months
    experiment: Test approval-template reuse across a second ministry or
      program office.
    hypothesis: The core evidence structure is reusable enough that
      country-specific tailoring stays bounded.
    successMetric: Second packet launched with less than 20% custom field or
      workflow variance from the first.
    owner: Product + mission assurance
  - horizon: 12-18 months
    experiment: Open an integration-led channel with a C2 or digital-engineering
      partner.
    hypothesis: Once the overlay model is proven, an upstream workflow owner
      will distribute the evidence layer instead of blocking it.
    successMetric: 1 signed integration or reseller agreement and 1
      partner-sourced production opportunity.
    owner: CEO + partnerships
operations:
  - Air-gapped or on-prem deployment, role-based access, and auditable handling
    of post-exercise artifacts.
  - Connector QA for telemetry, C2, video, and operator-event ingestion across
    the supported vendor stack.
  - Evidence-packet production workflow with a clear chain from raw artifact to
    scorecard, failure annotation, and approval annex.
  - Benchmark-library governance so cross-exercise comparisons stay comparable
    across vendors, programs, and countries.
  - Weekly program reviews with customers to track debrief cycle time,
    unanswered approval questions, and new connector requests.
team:
  - role: Founding CEO / defense programs
    startTiming: Month 0
    rationale: The first sales motion depends on understanding program
      milestones, budget ownership, and ministry review pain rather than
      generic software demos.
  - role: Founding eng
    startTiming: Month 0
    rationale: The product must normalize fragmented telemetry and C2 data into
      a reliable replay and evidence graph from the first pilot.
  - role: Connector and replay engineer
    startTiming: Month 2
    rationale: Connector coverage and replay fidelity are the main product
      bottlenecks and must become reusable product assets early.
  - role: Mission assurance / deployment lead
    startTiming: Month 4
    rationale: The company needs someone who can translate customer review
      workflows into accepted packets and keep secure deployments moving.
  - role: Defense BD / partnerships lead
    startTiming: Month 8
    rationale: After the first pilot, the company needs structured access to
      primes, ranges, and C2 partners without pulling founders off delivery.
milestones:
  - horizon: 0-12 months
    items:
      - "Month 3: sign 2-3 design partners and collect real post-exercise artifacts from 5 target accounts."
      - "Month 6: ship the first secure MVP covering one mixed-vendor exercise and the dominant early connector set."
      - "Month 9: deliver the first ministry-ready packet and show debrief preparation compressed to 5 business days or less."
      - "Month 12: convert the first pilot into an annual program license and launch a second paid pilot."
  - horizon: 12-24 months
    items:
      - Expand connector coverage across the dominant vendor and C2 combinations
        in the beachhead.
      - Reuse approval templates across at least 2 ministries or program
        offices without turning the product into custom services.
      - Land one integration or reseller relationship with a C2, range, or
        digital-engineering platform.
  - horizon: 24-36 months
    items:
      - Reach 8 paying programs, consistent with the researched year-3 SOM
        case.
      - Expand from debrief packets into release gating, incident
        investigation, and benchmark reporting.
      - Enter one adjacent unmanned domain only after the European air-program
        wedge is repeatable.
risks:
  - risk: Secure data access or classification rules prevent the product from
      ingesting enough real exercise data to produce trusted packets.
    likelihood: High
    impact: High
    mitigation: Start with sanitized or coalition exercises, deploy on-prem,
      and prioritize accounts whose current toolchains already export usable
      telemetry and logs.
  - risk: Autonomy, C2, or digital-engineering incumbents bundle acceptable
      reporting and remove the budget for a standalone evidence layer.
    likelihood: Medium
    impact: High
    mitigation: Win only where mixed-vendor comparison and neutral evidence
      matter, and prove that the product answers ministry review questions
      faster than bundled tools.
  - risk: Country-specific approval templates and annexes create too much
      services work for early gross-margin targets.
    likelihood: Medium
    impact: High
    mitigation: Standardize a core packet structure first, measure variance
      explicitly, and delay new geographies until template reuse is proven.
  - risk: Defense budget cycles and procurement windows delay paid conversion
      even after technical success.
    likelihood: High
    impact: Medium
    mitigation: Sell against an imminent milestone, start with
      integrator-controlled budgets, and structure pilots so a successful
      packet can roll directly into the next program increment.
  - risk: Early connector work expands faster than productization, turning
      deployments into custom projects.
    likelihood: Medium
    impact: Medium
    mitigation: Gate new formats by account concentration, refuse long-tail
      connectors early, and hire specifically for reusable replay and ingestion
      modules.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of secure product build, 2 design-partner
    deployments, the first reusable connector library, and proof that one paid
    pilot converts into an annual program license after a real ministry review
    cycle.
