slug: swarm-evidence-graph
date: '2026-07-02'
executiveSummary: Swarm Evidence Graph 向欧洲无人系统集成商和 OEM 项目团队销售一层本地部署的自主证据层，这些团队正在为 NATO 对齐部委执行 10–50 架无人机演习。最急的痛点不是飞控，而是演习后证明：混合供应商日志、操作员介入和视频片段被人工拼成一次性报告，拖慢里程碑审批和合同增量。MVP 从既有遥测和 C2 数据重建共同任务时间线，按约定目标给自主行为打分，并在不替换当前自主栈的前提下输出部委可审审批包。这是一个克制的滩头市场：它有现场购买触发点，经济买方清楚——项目总监或 VP Programs，ROI 也能用演习结束到审批之间省下的天数衡量。公司一开始不应做自主能力、任务规划或通用 PLM；可信切口是成为跨供应商的中立证据记录，而买方不希望任何单一自主厂商控制这层记录。研究支持真实需求和时点，但初始市场不大——估算 SAM 约 $13.3M，第 3 年 SOM 约 $2.8M——因此风险投资叙事取决于后续扩展到更广自主能力保障、版本放行和跨域基准。第一个证明点，是在一次混合供应商演习中交付获认可的证据包，把复盘时间从数周压到数天，并在下一项目里程碑前转成年度项目许可证。最大的证伪风险是目标账户要么不愿在安全环境中共享可用日志，要么只在工作流被捆绑进在位自主或集成合同时才付费。
problem:
- 混合供应商蜂群演习结束后，飞行测试和自主能力评估团队手里是分散在互不兼容工具里的遥测、C2 事件、操作员动作和视频片段，很难证明自主软件到底做了什么。
- 人工复盘包会拖慢审批，吃掉承包商报告工时，也让证据难以在合同增量、部委或供应商组合之间复用。
solution:
- 部署一层本地证据图谱，摄取演习后日志和操作员材料，重建跨供应商单一时间线，并产出可比自主能力评分卡和故障标注。
- 把遥测和事件映射成部委可审审批包，让同一套证据支撑下一次里程碑评审、供应商比较和基准库。
whyWeWin:
- 中立性就是产品：集成商和部委可以采用这层系统，而不用把证据记录交给竞争性的自主栈厂商。
- 连接器库、故障分类、审批模板映射和跨演习基准数据会随每次部署复利增长，比仪表盘更难复制。
strategicChoices:
  beachhead: 欧洲无人系统集成商和 OEM 项目团队，正在为一个 NATO 对齐部委执行 10–50 架无人机蜂群演习；先从北欧和周边盟国项目切入，因为那里已经能看到现场蜂群测试。
  wedgeRationale: 比起销售宽泛防务分析，这个切片更容易证明价值：每次演习都以具体审批截止点收束，混合供应商证据已经碎片化，一个获认可的证据包可以直接绑定里程碑放行和合同扩展。
  sequencingRationale: 先拿一个共创客户项目、收窄连接器集合，并采用脱敏或本地部署。公司要先证明复盘压缩和证据包被接受，再扩展到更广国家模板、基准产品或相邻无人领域。
  notYet:
  - 拥有任务自主、蜂群控制或任务规划。
  - 没有现场演习驱动审批痛点时，销售通用 PLM 或数字工程工作流。
  - 在欧洲空中项目模板和连接器库可重复之前，扩展到海上、地面或美国 DoD 项目。
market:
  tam: 估算年度 TAM 约 $44.0M，覆盖约 110 个盟国集成商、OEM 和评估项目单元，它们可能反复运行多供应商无人试验周期。
  sam: 估算年度 SAM 约 $13.3M，覆盖北欧、英国、荷兰、德国、法国、波罗的海和相邻盟国集成商中约 38 个可触达的 10–50 架无人机演习项目。
  som: 估算第 3 年 SOM 约 $2.8M，来自 8 个付费项目，混合 ACV 约 $0.35M，已考虑漫长 onboarding 和本地部署摩擦。
  segments:
  - 为 NATO 对齐部委执行 10–50 架无人机蜂群演习的欧洲无人系统集成商和 OEM 测试项目。
  - 审阅放行决策、并跨供应商比较自主性能的部委无人项目办公室和测试组织。
  buyingProcess: 销售从一个项目里程碑或即将到来的演习开始：下一笔预算增量或部署批准前，需要可比自主证据。成交通常需要飞行测试负责人支持、项目总监或 VP Programs 批准、数据处理安全签批，并接受先围绕一次现场演习产出首个证据包，再转成年度项目许可证。
product:
  mvp: MVP 是一个本地部署的演习后证据工作流，摄取一个项目的既有遥测、C2 事件、操作员介入和视频片段，随后重建共同时间线、给约定目标打分并生成评审包。它要把一次混合供应商演习做深，而不是一开始就做完整自助 onboarding 或覆盖所有日志格式。
  sixMonth: 拿下 2–3 个共创客户，识别前 5 个目标账户中占主导的供应商和 C2 组合，并交付首个安全部署，把一次混合供应商演习标准化成可复用评分卡和证据包。
  twelveMonth: 交付 2 个付费试点，在至少 1 次现场演习上证明复盘周期不超过 5 个工作日，并把首个试点转成年度项目许可证，附带跨多个 sortie 的基准视图。
  twentyFourMonth: 覆盖滩头市场中的主流连接器集合，在至少 2 个部委或项目办公室复用审批模板，并从复盘包扩展到版本放行、事故调查和跨项目基准。
  keyBets:
  - 最初 3–4 个连接器家族能覆盖足够日志量，让产品显得可重复，而不是服务过重。
  - 部委可审证据包可以用脱敏或气隙数据生成，无需在首次部署就接入完整涉密任务系统。
  - 即便软件被放进更广项目预算里销售，项目总监也会为更快审批周期和可复用证据付费。
gtm:
  wedge: 创始人主导销售，锁定 90–120 天内有现场蜂群演习的集成商和 OEM 测试负责人。提供付费试点，为一次混合供应商活动产出一个部委可审证据包；若缩短下一次审批周期，就转为年度项目许可证。
  channels:
  - 创始人主导 outbound，面向有即将到来蜂群里程碑的欧洲集成商和 OEM 项目团队。
  - 通过已参与现场演习的部委、主承包商、靶场和测试组织联系人做暖启动引荐。
  - 首个部署证明 overlay 模型后，与 C2 或数字工程平台做集成式分发。
  funnelTargets: 目标是 25–35% 的目标账户授权 data-room 访问，40–50% 的数据就绪账户启动付费试点，50%+ 的试点转成年度项目许可证，30%+ 的首年客户增加第二个项目或平台。
  pricing: 按项目计价的年度授权，依据活跃演习项目和已集成平台类型收费；研究中模型约为每项目年 $350k-$400k，并对安全部署和新供应商连接器加收设置费；定价锚定避免里程碑延误和复用审批劳动，而不是按席位。
businessModel:
  revenueStreams:
  - 面向活跃演习项目的年度项目许可证。
  - 安全部署、连接器和 onboarding 费用。
  - 核心复盘工作流上线后，销售基准、版本放行或证据自动化附加模块。
  unitOfValue: 纳入证据管理的活跃演习项目年。
  targetGrossMarginPct: 70
  expansionLevers:
  - 首个证据包获接受后，在同一项目内增加更多演习、sortie 和供应商组合。
  - 把连接器库和审批模板复用到相邻欧洲部委和集成商。
  - 从演习后证据包扩展到持续版本放行、事故复盘和跨域自主能力保障。
strategyMap:
  northStarMetric: 产品用于产出获认可审批证据的年度化付费演习项目数。
  inputMetrics:
  - 授权访问可用演习后数据的目标账户数。
  - 从演习结束到部委可审证据包的中位天数。
  - 试点转年度许可证转化率。
  - 每个现场项目平均标准化的供应商或平台类型数。
  - 评审问题中，可用复用证据回答而非新做人工分析的比例。
  moatsToBuild:
  - 覆盖滩头市场主流遥测、C2 和日志格式的供应商中立连接器库。
  - 把部委评审问题连接到底层证据材料的审批模板映射。
  - 关于故障模式、操作员介入、通信中断恢复和蜂群凝聚度的跨演习基准数据集。
  killCriteria:
  - 前 15 个目标账户中，不到 4 个能在 6 个月内提供可用混合供应商演习数据。
  - 前 2 个试点未能把复盘周期压到 5 个工作日或更短。
  - 前 4 个试点中，不到 2 个能在 12 个月内转成年度许可证或嵌入式经常性项目预算。
  mermaid: "flowchart LR\n  Wedge[Mixed-vendor swarm debrief pain] --> MVP[On-prem evidence graph plus first connectors]\n  MVP --> Proof[Accepted ministry packet and faster review cycle]\n  Proof --> Expansion[Annual program licenses plus broader autonomy-assurance workflows]\n"
investorMemo:
  verdict:
    call: 观望
    conviction: 痛点真实，切口克制，但在公司证明一个现场项目里的数据访问和预算归属前，确信度仍然有限。
    whyBelieve: NATO 对齐蜂群活动已经在现场推进，欧洲防务支出上行，相邻自主能力融资也支撑了一个真实需求：在混合供应商自主栈之上建立中立证据层。
    whyDoubt: 市场集中且保密；如果项目拒绝开放可用遥测，或接受自主、C2、PLM 在位企业捆绑报告，产品会被挤压。
    nextDiligence: 验证一个使用真实演习后材料的付费试点，再衡量获认可证据包是否足以缩短下一道审批闸口，并支撑年度项目授权。
  firstCustomer:
    title: 一家欧洲无人系统集成商的项目总监，手上有即将到来的 NATO 对齐蜂群演习。
    profile: 150–800 人集成商或 OEM 项目团队，正在准备 10–50 架无人机演习，已经混用供应商或自主组件，并且在下一轮合同增量前面临里程碑评审。
    trigger: 即将到来的演习或评审委员会要求在预算、放行或部署批准前，拿出跨供应商可比证据。
    buyer: VP Programs 或项目总监
    initialContract: $100k-$150k 付费试点，绑定一次现场演习和一个部委可审证据包；下一次里程碑评审获接受后，转成约 $350k-$400k 的年度项目许可证。
  mustBeTrue:
  - 前 15 个目标账户中，至少 5 个愿意在本地部署模式下提供可用遥测、C2 和操作员材料访问。
  - 首个现场部署能把演习后证据包周转从数周压到 5 个工作日或更短。
  - 前 4 个试点中，至少 2 个能转成经常性年度项目许可证或等价嵌入式项目预算。
  - 一个审批包模板可以在至少 2 个部委或项目办公室复用，且定制量有限。
  - 没有自主或数字工程在位企业能把中立跨供应商证据做到足以阻断前 3 个目标交易。
  diligenceQuestions:
  - 哪 3 种供应商或 C2 组合覆盖首个滩头市场大部分数据量？
  - 首批目标项目中，证据工具预算到底归谁：集成商、OEM，还是部委办公室？
  - 首个获接受证据包中，有多少可以用脱敏或非密数据生成？
  - 把一个审批模板适配到挪威、英国、荷兰、德国和法国，需要多少服务工作？
  - 买方需要哪些证据，才能相信中立层比使用自主或 C2 厂商捆绑报告更安全？
operatingAssumptions:
- assumption: 如果产品本地部署或运行在安全 enclave 内，目标账户会共享演习后遥测、操作员介入和视频片段。
  basis: research.yaml
  validationTest: 拿到 5 份签署的共创客户数据共享承诺，并在前 90 天内从至少 2 次现场或历史演习中摄取可用材料。
  decisionImpact: 如果不成立，把切口收窄到一个预集成供应商栈，或停止追求跨供应商证据产品。
- assumption: 在定制集成工作压垮产品毛利之前，一个收窄的连接器集合可以覆盖大多数早期部署。
  basis: research.yaml
  validationTest: 映射前 5 个目标账户，确认前 3–4 种遥测或 C2 格式至少代表初始日志量的 70%。
  decisionImpact: 如果不成立，进一步收窄滩头市场，或把公司重构为较高毛利软件加付费集成服务。
- assumption: 一旦一个证据包缩短真实审批周期，项目总监会按建模 ACV 付费，把工作流作为独立或嵌入式软件 line item 采购。
  basis: research.yaml
  validationTest: 在第 12 个月前，把至少 1 个付费试点转成签署的年度项目许可证或经常性项目预算。
  decisionImpact: 如果不成立，公司只能通过主承包商或 C2 伙伴销售，独立性和毛利都会下降。
- assumption: 脱敏或非密演习数据足以产出买方信任的首个审批包。
  basis: research.yaml
  validationTest: 首个试点使用脱敏数据运行，并跟踪评审者是否能在不要求涉密证据的情况下接受至少 80% 的材料。
  decisionImpact: 如果不成立，onboarding 时间、部署成本和安全负担都会上升，足以要求更小账户列表和更高融资需求。
- assumption: 创始人主导 outbound 加上部委和主承包商引荐，足以创造前 10 次合格共创客户对话。
  basis: 运营判断
  validationTest: 执行 30 个账户的 outreach，一个季度内拿到至少 8 次合格对话和 3 次技术范围界定电话。
  decisionImpact: 如果不成立，公司必须更早招聘防务 BD，并接受更慢、更贵的管线。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 测试共创客户需求和预算归属。
  hypothesis: 有现场蜂群里程碑的集成商会对付费试点感兴趣，只要报价绑定一个获接受审批包，而不是泛泛分析。
  successMetric: 8 次合格对话、3 次范围界定电话、2 份签署的试点 LOI，并识别预算 owner。
  owner: 创始 CEO / GTM
- horizon: 0–90 天
  experiment: 映射首批目标账户的连接器覆盖。
  hypothesis: 少量日志和 C2 格式可以覆盖大部分初始滩头市场。
  successMetric: 前 5 个账户收集到的材料中，前 3–4 种格式至少占 70%。
  owner: 创始工程
- horizon: 90–180 天
  experiment: 用一次混合供应商演习生成首个标准化回放和评分卡。
  hypothesis: 产品无需替换自主栈，就能从既有遥测、操作员动作和视频片段中重建一条可用任务时间线。
  successMetric: 用真实演习数据产出一份完整证据包草案，并由客户团队审阅。
  owner: 创始工程 + 任务保障负责人
- horizon: 90–180 天
  experiment: 用真实评审工作流验证证据包有用性。
  hypothesis: 部委可审证据包能比当前电子表格和 PowerPoint 流程更快回答大多数审批问题。
  successMetric: 客户报告至少 80% 的评审问题可由证据包回答，复盘准备时间减少 50%+。
  owner: 任务保障负责人
- horizon: 6–12 个月
  experiment: 把首个试点转成年度项目授权。
  hypothesis: 如果首个试点缩短审批周期，买方会为下一轮演习节奏中的持续使用付费。
  successMetric: 签署 1 个年度项目许可证或嵌入式经常性预算，并有 1 个额外付费试点推进中。
  owner: 创始 CEO / 项目
- horizon: 6–12 个月
  experiment: 测试审批模板在第二个部委或项目办公室的复用。
  hypothesis: 核心证据结构足够可复用，各国专属调整能被控制住。
  successMetric: 第二个证据包上线，定制字段或工作流差异低于首个的 20%。
  owner: 产品 + 任务保障
- horizon: 12–18 个月
  experiment: 与 C2 或数字工程伙伴打开集成式渠道。
  hypothesis: 一旦 overlay 模型被证明，上游工作流 owner 会分发证据层，而不是封堵它。
  successMetric: 签署 1 份集成或 reseller 协议，并获得 1 个伙伴来源的生产机会。
  owner: CEO + 伙伴关系
operations:
- 气隙或本地部署、基于角色的访问控制，以及演习后材料的可审计处理。
- 面向受支持供应商栈中遥测、C2、视频和操作员事件摄取的连接器 QA。
- 证据包生产工作流，明确从原始材料到评分卡、故障标注和审批附件的链路。
- 基准库治理，确保跨演习比较在供应商、项目和国家之间仍可比。
- 与客户做每周项目复盘，跟踪复盘周期、未回答的审批问题和新连接器请求。
team:
- role: 创始 CEO / 防务项目
  startTiming: 第 0 月
  rationale: 首个销售动作依赖理解项目里程碑、预算归属和部委评审痛点，而不是通用软件演示。
- role: 创始工程
  startTiming: 第 0 月
  rationale: 产品必须从首个试点开始，就把碎片化遥测和 C2 数据标准化成可靠回放和证据图谱。
- role: 连接器与回放工程师
  startTiming: 第 2 月
  rationale: 连接器覆盖和回放保真度是主要产品瓶颈，必须早早沉淀为可复用产品资产。
- role: 任务保障 / 部署负责人
  startTiming: 第 4 月
  rationale: 公司需要有人把客户评审工作流翻译成获认可证据包，并推动安全部署不断前进。
- role: 防务 BD / 伙伴关系负责人
  startTiming: 第 8 月
  rationale: 首个试点后，公司需要系统性接触主承包商、靶场和 C2 伙伴，同时不把创始人从交付上拉走。
milestones:
- horizon: 0–12 个月
  items:
  - 第 3 月：签下 2–3 个共创客户，并从 5 个目标账户收集真实演习后材料。
  - 第 6 月：交付首个安全 MVP，覆盖一次混合供应商演习和早期主流连接器集合。
  - 第 9 月：交付首个部委可审证据包，并证明复盘准备压缩到 5 个工作日或更短。
  - 第 12 月：把首个试点转成年度项目许可证，并启动第二个付费试点。
- horizon: 12–24 个月
  items:
  - 扩展连接器覆盖，覆盖滩头市场中主流供应商和 C2 组合。
  - 在至少 2 个部委或项目办公室复用审批模板，同时避免产品变成定制服务。
  - 与一个 C2、靶场或数字工程平台落地一项集成或 reseller 关系。
- horizon: 24–36 个月
  items:
  - 达到 8 个付费项目，与研究中的第 3 年 SOM case 一致。
  - 从复盘包扩展到版本放行、事故调查和基准报告。
  - 只有在欧洲空中项目切口可重复后，才进入一个相邻无人领域。
risks:
- risk: 安全数据访问或密级规则阻止产品摄取足够真实演习数据，无法产出可信证据包。
  likelihood: High
  impact: High
  mitigation: 先从脱敏或联盟演习切入，本地部署，并优先服务当前工具链已能导出可用遥测和日志的账户。
- risk: 自主、C2 或数字工程在位企业捆绑可接受的报告，挤掉独立证据层预算。
  likelihood: Medium
  impact: High
  mitigation: 只在混合供应商比较和中立证据重要的场景获胜，并证明产品回答部委评审问题比捆绑工具更快。
- risk: 各国专属审批模板和附件带来过多服务工作，压低早期毛利目标。
  likelihood: Medium
  impact: High
  mitigation: 先标准化核心证据包结构，显式衡量差异，并在模板复用被证明前推迟新地域。
- risk: 即便技术成功，防务预算周期和采购窗口仍会拖慢付费转化。
  likelihood: High
  impact: Medium
  mitigation: 围绕即将到来的里程碑销售，先从集成商可控预算切入，并设计试点结构，让成功证据包可以直接滚入下一项目增量。
- risk: 早期连接器工作扩张快于产品化，部署变成定制项目。
  likelihood: Medium
  impact: Medium
  mitigation: 按账户集中度给新格式设闸，早期拒绝长尾连接器，并专门招聘可复用回放和摄取模块人才。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 支持 18 个月安全产品建设、2 个共创客户部署、首个可复用连接器库，并证明一个付费试点能在真实部委评审周期后转成年度项目许可证。
