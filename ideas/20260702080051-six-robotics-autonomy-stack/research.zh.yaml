reportMemo:
  executiveTakeaways:
  - 切口真实但很窄：混合供应商蜂群项目扩张速度，已经超过围绕它的证据和审批工作流，在自主栈之上、部委签批之下留下空档 [1][3][4][6][7][10][14][17][18]。
  - 最好的初始客户不是泛泛的防务软件买方，而是手上有 10–50 架无人机实战演习的欧洲集成商或 OEM 测试负责人；当下一个里程碑或采购增量依赖可复用证据时，紧迫性最高 [3][4][5][17][18][28]。
  - 预算牵引存在——Six 融资 €12M、Helsing 正在推进 $1.2B 融资、欧盟 2024 年防务支出达到 €343B——但滩头市场 TAM 不大，因此创业叙事必须包含向更广自主能力保障扩张 [1][2][11][19]。
  - 相邻在位企业很强，但都不完整：Applied、Anduril、Shield AI、Helsing/Systematic、Siemens/IBM 分别占据仿真、自主、C2 或可追溯性的一部分，却没有谁明显拥有供部委审阅的中立跨供应商证据图谱 [7][8][20][21][22][23][24][25][26][31][32][33]。
  - 最大的采用风险是安全数据访问、各国适航与审批规则，以及买方想把既有日志或数字工程工具继续拉长，而不是为新层单独付费 [13][15][16][17][18][34][35][36][37][38][39]。
  marketDefinition: 面向盟国无人演习的供应侧自主证据软件：一层本地部署系统，在每次蜂群活动后摄取混合供应商日志和 C2 数据，重建单一时间线，给自主行为打分，并输出部委可审的审批包。它位于自主栈之上、采购签批之下，首个区域是欧洲，首个切口是 10–50 架无人机演习 [1][3][4][6][7][8][10][12][14][15][28][35][36][37][38][39]。
  customerAndBuyer: 日常主用户是 150–800 人集成商或 OEM 团队里的飞行测试负责人、自主能力评估经理和项目工程师，他们正在准备部委演习或合同增量。经济买方通常是无人系统 VP Programs、项目总监或 GM，因为进度滑坡、靶场时间烧掉和审批延误会直接打到收入和客户信任 [3][4][5][12][17][18][28]。
  buyingTriggers:
  - point: 新的蜂群演习或试点里程碑要求在释放下一笔预算增量或部署批准前，拿出跨供应商可比的证据。
    sourceRefs:
    - 3
    - 4
    - 5
    - 17
    - 18
  - point: 联盟或市场化采购迫使买方比较即插即用系统，而不是孤立评估一家 OEM。
    sourceRefs:
