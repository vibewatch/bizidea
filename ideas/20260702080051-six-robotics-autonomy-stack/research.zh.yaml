  willingnessToPay:
    summary: 预算重力真实存在，因为欧洲正明确推进无人机、采购改革和自主项目，Six 与 Helsing 也显示投资人愿意为软件定义防务买单。但单独购买证据层的付费意愿还没被证明，销售时应对准避免里程碑延迟、复用审批劳动和减少定制试验后报告，而不是泛泛卖分析。
