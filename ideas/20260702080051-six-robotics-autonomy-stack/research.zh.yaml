  validationPlan:
  - priority: 高
    question: VP Programs 会为独立证据层付费，还是只愿把它放进既有自主或集成合同里？
    evidenceToGather: 访谈 8–10 位欧洲无人项目总监，他们 120 天内有审批闸口；量化当前复盘劳动、承包商支出和延误成本。
  - priority: 高
    question: 哪三种供应商或 C2 组合覆盖首个滩头市场的大部分日志量？
    evidenceToGather: 从至少 5 个目标账户收集真实演习后材料，按频率和痛点映射最常见的遥测、视频和 C2 格式。
  - priority: 中
    question: 第一版部委可审材料中，有多少可以用非密或脱敏数据生成？
    evidenceToGather: 在气隙或脱敏数据集上跑一个试点，记录买方信任还需要哪些额外涉密字段。
  - priority: 中
    question: 审批模板在英国、挪威、荷兰、德国和法国之间有多可复用？
    evidenceToGather: 红线比对 3–5 份真实里程碑评审包，衡量各国之间共享字段、签名和证据块。
