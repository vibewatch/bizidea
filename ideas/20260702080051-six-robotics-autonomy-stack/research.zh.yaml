  competitiveLandscape: 竞争激烈，但大多是相邻玩家。Applied 在测试和数字工程工作流上最接近；Anduril 与 Shield AI 拥有任务自主；Helsing/Systematic 推进主权蜂群 C2；Siemens、IBM 与 JAGGAER 拥有可追溯性或采购；很多项目仍默认使用供应商日志、电子表格和 PowerPoint。创业公司只有成为这些系统没有覆盖的中立证据图谱和审批包层，才有胜算 [7][8][20][21][22][23][24][25][26][31][32][33][34][35][36][37][38][39]。
  incumbentThesis:
