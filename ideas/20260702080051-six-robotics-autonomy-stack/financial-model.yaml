scenarios:
  downside:
    description: "Annual conversions slip by about two quarters, secure deployments stay bespoke, and the channel motion does not materialize on time."
    y3RevenueK: 2050.0
    y3EbitdaK: -320.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - "Q4Y2 customersEop reaches about 4 and Q4Y3 about 6 instead of 6 and 8."
      - "Realized annual value stalls near $335K per program instead of about $360K."
      - "Gross margin exits near 68% because connector work and ministry tailoring stay services-heavy."
  base:
    description: "The first pilots convert on schedule, connector reuse improves steadily, and the company lands the researched 8-program SOM case by year 3."
    y3RevenueK: 2690.0
    y3EbitdaK: 40.4
    cashLowPointK: 726.1
    keyAssumptionChanges:
      - "CustomersEop moves from 2 at M12 to 6 at Q4Y2 and 8 at Q4Y3."
      - "Realized annual value settles near $360K per mature program inside the BP pricing band."
      - "Gross margin reaches 73% by late Y3 as connector and packet-template reuse improve delivery leverage."
  upside:
    description: "A partner channel lands early, second-program expansions appear sooner, and the deployment model standardizes faster than expected."
    y3RevenueK: 3200.0
    y3EbitdaK: 420.0
    cashLowPointK: 820.0
    keyAssumptionChanges:
      - "Q4Y2 customersEop reaches about 7 and Q4Y3 about 9 because partner-sourced pilots pull forward."
      - "Blended annual value rises toward about $390K as connector fees and second-program expansions attach earlier."
      - "Gross margin exits around 75% because repeatable secure deployment reduces bespoke services burden."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Blended realized annual value lands near $330K per mature program."
    baseCase: "Blended realized annual value is about $360K per mature program."
    upsideCase: "Blended realized annual value reaches about $390K per mature program."
    y3RevenueImpactK: -225.0
    cashImpactK: -170.0
  - variable: "CAC"
    downsideCase: "CAC rises toward $200K because founder travel and prime introductions convert less efficiently."
    baseCase: "CAC stays near $160K with founder-led selling and one partner channel."
    upsideCase: "CAC falls toward $130K once partner-sourced pilots become repeatable."
    y3RevenueImpactK: -60.0
    cashImpactK: -320.0
  - variable: "churn"
    downsideCase: "Monthly churn drifts toward 2.5% as some pilots do not expand."
    baseCase: "Monthly churn remains 1.5%."
    upsideCase: "Monthly churn improves toward 1.0% once packet templates embed in customer workflow."
    y3RevenueImpactK: -160.0
    cashImpactK: -140.0
  - variable: "sales cycle"
    downsideCase: "Median cycle stretches toward 9 months because security review and budget ownership take longer."
    baseCase: "Median cycle stays around 5-6 months to paid pilot."
    upsideCase: "Median cycle compresses toward 4 months on live-exercise triggers and partner trust."
    y3RevenueImpactK: -430.0
    cashImpactK: -370.0
  - variable: "gross margin"
    downsideCase: "Exit gross margin reaches only 68%."
    baseCase: "Exit gross margin reaches 73% with reusable connectors and templates."
    upsideCase: "Exit gross margin reaches 75% as deployments standardize faster."
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: "hiring pace"
    downsideCase: "One extra engineer and one extra GTM hire are pulled forward before conversion proof is established."
    baseCase: "Hiring stays milestone-gated and follows the lean BP sequencing."
    upsideCase: "The second GTM hire waits until late Y3 without slowing bookings."
    y3RevenueImpactK: -40.0
    cashImpactK: -170.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      TargetAccounts[Programs with live swarm milestones] --> DesignPartners[Qualified design partners]
      DesignPartners --> PaidPilots[Paid pilot packets]
      PaidPilots --> AnnualLicenses[Annual program licenses]
      AnnualLicenses --> Expansion[More exercises, connectors, and add-ons]
      Expansion --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base revenue comes from moving from 2 paying programs at Y1 exit to 8 by Q3-Q4Y3 while mature program value settles near the researched $350K-$400K range."
  - checkName: "Must go right"
    finding: "The first two pilots must convert into annual licenses and the packet template must be reusable across ministries so deployments stop looking like consulting."
  - checkName: "Model breaks if"
    finding: "If secure data access and ministry-specific tailoring stretch sales cycles while gross margin stays below about 68%, the downside case pushes cash close to the floor before scale proof."
  - checkName: "Next-round proof"
    finding: "The seed-ready proof point is 5-6 paying programs, 3 annual conversions, and one partner-sourced deployment by Q4Y2 with reusable approval packets across 2 ministries."
sanityChecks:
  ruleOf40: "Y3 growth 71.9% + EBITDA margin 1.5% = 73.4%"
  burnMultiple: "Y2 burn multiple is about 0.4x using roughly $0.54M of EBITDA burn against about $1.44M of exit ARR added; Q2Y3 turns EBITDA positive."
  revenuePerFte: "$269K Y3 on 10 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "The base case reaches 8 of roughly 38 SAM programs by year 3, so success requires winning a meaningful share of a concentrated buyer pool."
    - "Gross margin reaches the low-70s only if connector reuse and packet-template reuse keep deployments from remaining services-heavy."
    - "Budget-owner ambiguity may still force sales through primes or C2 partners, which could compress both independence and margin."
    - "The researched SAM is only about $13.3M, so venture-scale upside still depends on expanding beyond post-exercise packets into broader autonomy-assurance workflows after year 3."
    - "Cash is modeled as EBITDA; milestone billing, security hardware, or compliance capex could shift real cash timing."
