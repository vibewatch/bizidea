slug: "swarm-evidence-graph"
date: "2026-07-02"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-08"
    unit: "YYYY-MM"
    source: "[BP date 2026-07-02] the model starts in the first full month after the dated business plan."
  - id: A2
    name: "Opening cash / pre-seed raise"
    value: "$2.0M"
    unit: "USD"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the floor of the BP range because the hiring plan stays lean and still leaves more than six months of cash past the Q4Y2 milestone."
  - id: A3
    name: "Starting paying programs"
    value: "0"
    unit: "count"
    source: "[BP milestones 0-12 months] the company starts pre-revenue and must first win design partners before revenue begins."
  - id: A4
    name: "Paying-program definition"
    value: "A paying program is either a paid pilot tied to one exercise or an annual program license under evidence management."
    unit: "definition"
    source: "[BP gtm.wedge + BP businessModel.revenueStreams] customersEop counts any program already paying, not only fully converted annual contracts."
  - id: A5
    name: "Paid pilot economics"
    value: "$120K over about 3 months (~$40K/mo)"
    unit: "USD/program"
    source: "[BP investorMemo.firstCustomer.initialContract $100k-$150k paid pilot + BP gtm.wedge] the model uses the midpoint pilot value and a three-month proof window."
  - id: A6
    name: "Annual program license economics"
    value: "Base annual license value is about $360K per program-year, with setup and connector fees already blended into the realized revenue schedule."
    unit: "USD/program/year"
    source: "[BP gtm.pricing $350k-$400k per program-year + BP businessModel.revenueStreams setup fees + Research market.som $2.8M from 8 programs at ~$0.35M ACV] mature realized value stays inside the researched pricing band."
  - id: A7
    name: "Revenue recognition convention"
    value: "Revenue equals customersEop multiplied by blended realized value for that period: Y1 paid months at about $40K-$45K per month, Y2 at about $85K-$90K per quarter, and Y3 at about $90K-$96K per quarter."
    unit: "formula"
    source: "[BP gtm.pricing + BP investorMemo.firstCustomer.initialContract + Research bottomUpSizingDrivers modeled ACV] this keeps revenue directly traceable to customer count and the staged pricing mix."
  - id: A8
    name: "Customer ramp"
    value: "2 paying programs by M12, 6 by Q4Y2, and 8 by Q4Y3"
    unit: "customersEop"
    source: "[BP product.twelveMonth + BP milestones 12-24 and 24-36 + Research market.som] the base case matches one converted annual license in Y1, several follow-on programs in Y2, and the researched 8-program year-3 SOM case."
  - id: A9
    name: "Gross margin ramp"
    value: "55%-60% in Y1, 62%-70% in Y2, and 71%-73% in Y3"
    unit: "gross margin percent"
    source: "[BP businessModel.targetGrossMarginPct 70 + BP operations + Research sensitivityCases on services-heavy connector work] margin improves only after connector and packet-template reuse reduce bespoke work."
  - id: A10
    name: "Hiring timeline"
    value: "M1 founder plus founding engineer; M3 connector engineer; M5 mission-assurance lead; M9 defense BD lead; M11 secure-deployment engineer; M16 fourth engineer; M18 second mission-assurance hire; M20 ops/compliance; M30 second GTM hire."
    unit: "timeline"
    source: "[BP team startTiming + BP strategicChoices.sequencingRationale + startup-finance heuristic] hires beyond the BP core team wait for repeatability proof and paying-program traction."
  - id: A11
    name: "Founder loaded compensation"
    value: "$160K"
    unit: "USD/year"
    source: "[startup-finance heuristic for lean pre-seed European defense founder cash comp + BP team Founding CEO / defense programs]"
  - id: A12
    name: "Engineering loaded compensation"
    value: "$185K"
    unit: "USD/year"
    source: "[startup-finance heuristic for secure robotics and data-platform engineers + BP team Founding eng and Connector and replay engineer]"
  - id: A13
    name: "Mission-assurance loaded compensation"
    value: "$155K"
    unit: "USD/year"
    source: "[startup-finance heuristic + BP team Mission assurance / deployment lead]"
  - id: A14
    name: "Sales / partnerships loaded compensation"
    value: "$170K"
    unit: "USD/year"
    source: "[startup-finance heuristic + BP team Defense BD / partnerships lead + BP gtm.channels]"
  - id: A15
    name: "Ops / compliance loaded compensation"
    value: "$110K"
    unit: "USD/year"
    source: "[startup-finance heuristic + BP operations secure deployment and auditable handling burden]"
  - id: A16
    name: "Payroll allocation to P&L lines"
    value: "Founder 50% S&M / 20% R&D / 30% G&A; engineering 100% R&D; mission assurance 45% S&M / 45% R&D / 10% G&A; sales 100% S&M; ops 100% G&A."
    unit: "allocation"
    source: "[BP team role rationales + BP operations] payroll is mapped into functional opex rather than shown only as one undifferentiated salary line."
  - id: A17
    name: "Non-payroll opex ramp"
    value: "Monthly non-payroll spend starts around S&M/R&D/G&A = $3K/$6K/$5K, rises to $6K/$9K/$6K by late Y1, holds near $8K/$9K/$7K through most of Y2, and exits Y3 near $10K/$10K/$8K."
    unit: "USD/month"
    source: "[BP operations + startup-finance heuristic] covers travel, secure infrastructure, legal, insurance, and compliance without assuming a broad paid-demand engine."
  - id: A18
    name: "Cash conversion convention"
    value: "Cash movement equals EBITDA."
    unit: "formula"
    source: "[startup-finance heuristic] capex, financing fees, taxes, and working-capital timing are assumed immaterial at this stage."
  - id: A19
    name: "Steady-state monthly churn"
    value: "1.5%"
    unit: "percent per month"
    source: "[startup-finance heuristic for sticky enterprise defense workflow software + BP strategyMap.moatsToBuild] once a packet template and connector set are embedded, switching should be low but not zero."
  - id: A20
    name: "Base enterprise sales cycle"
    value: "About 5-6 months from qualified account to paid pilot, then about one quarter from pilot start to annual conversion."
    unit: "months"
    source: "[BP gtm.wedge live exercise inside 90-120 days + BP product.twelveMonth conversion target + Research validationPlan budget-owner diligence]"
  - id: A21
    name: "CAC convention"
    value: "Total 36-month sales and marketing spend divided by 8 net new paying programs."
    unit: "formula"
    source: "[model calc using base-case S&M spend + BP gtm.funnelTargets] this captures founder-led and partner-led enterprise acquisition across the whole buildout."
  - id: A22
    name: "Next-round milestone for funding sizing"
    value: "By Q4Y2 the company should have 5-6 paying programs, at least 3 annual-license conversions, one reusable packet template working across 2 ministries, and one signed integration or reseller partner."
    unit: "milestone"
    source: "[BP fundingAsk runwayMonths 18 + BP milestones 12-24 + BP product.twentyFourMonth] the pre-seed is sized to reach seed-ready proof on budget ownership, repeatability, and distribution."
  - id: A23
    name: "Quarterly salary-roll convention"
    value: "Y2 and Y3 salary rows use actual monthly hires inside each quarter rather than only the year-end headcount snapshots."
    unit: "convention"
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the hiring ramp even when the schema shows only Q4Y2 and Q4Y3 snapshots."
