topRisks:
- name: 数据访问与密级
  description: 安全靶场和供应商专有日志格式可能阻止产品拿到足够演习数据，无法生成可信评分卡。
  mitigation: 先从非密或联盟演习切入，连接器范围收窄，产品本地部署，并优先服务已经能导出可用遥测的供应商。
- name: 主承包商或 OEM 捆绑
  description: 大型自主厂商或主承包商可能推出自己的报告工具，试图把买方留在单供应商证据孤岛里。
  mitigation: 专打部委或集成商必须在同一项目里比较多个自主栈、且需要中立跨供应商记录的场景。
- name: 预算周期拖累
  description: 防务买方可能认可复盘问题真实存在，但把独立软件采购拖到下一里程碑或采购窗口。
  mitigation: 先从里程碑驱动的集成商预算卖起，把 ROI 绑定到更短审批周期、可复用证据和更少承包商报告工时。
