differentiator: 不同于自主厂商，这家公司不试图拥有任务规划或载具控制。它在 OEM、集成商和部委之间做中立证据层，靠标准化事件 schema、故障分类和基准库，每跑一次新演习就变强。盟国项目被迫混用供应商，却仍要拿出可比的自主性能证明，防御性正好长在这里。
