problem: 欧洲和盟国防务团队现在可以买入或试飞无人机，但真正痛的是证明一支混合蜂群确实按预期运行，且这种证明要跨靶场、操作员和供应商成立。任务日志锁在各家供应商工具里，行动后报告靠人工拼接；每次演习都变成一次临时争论：自主软件到底做了什么。蜂群从演示走向部署时，这会拖慢合同增量、跨部委铺开和盟国互操作。
targetUser:
  primary: 150–800 人欧洲无人系统集成商的飞行测试负责人或自主能力评估负责人，正在为一个盟国部委项目执行 10–50 架无人机蜂群演习
  secondary: 部委团队里的无人能力官或靶场测试负责人，负责审阅演习证据和放行决策
  buyer: 拥有无人试点合同的项目副总裁或项目总监
startupThesis:
  nonObviousInsight: 盟国无人防务下一个稀缺层，不是另一架无人机，甚至不是另一个自主模型。蜂群一旦跨多个供应商和盟国买方，难题就变成如何产出中立、可复用的证据，证明自主行为有效、失效安全，并且能随着一次次演习变好。
  beachhead: 欧洲防务集成商为一个 NATO 对齐或盟国部委试点执行 10–50 架无人机蜂群演习时，用于行动后复盘和审批的证据材料
  wedge: 本地部署的蜂群证据图谱，把多供应商演习数据标准化成可比的自主能力评分卡、故障时间线和部委可审的审批包
  whyNowCatalyst: Six Robotics 的融资明确投向欧洲和盟国市场的自主软件部署，以及无人机蜂群。项目马上需要一层可重复使用的证据，而不是更多定制化任务后报告。
  ventureScalePath: 先从无人机蜂群复盘切入，再成为 NATO 对齐防务项目里自主证据、事故调查、版本放行和互操作基准的记录系统，覆盖空中、海上和地面无人舰队。
solution: Swarm Evidence Graph 会在每次演习后，从现有地面站摄取任务日志、操作员介入、地理围栏事件和载具健康数据。它跨供应商重建一条共同任务时间线，按约定目标给每次 sortie 打分，并自动生成审批包，内含可比指标、故障标注和支撑视频片段，供项目评审使用。产品在本地或安全 enclave 内运行，集成商无需替换既有自主栈，也终于能在其上方获得一层中立证据。随着时间推移，公司会沉淀盟国演习里的接管率、通信中断恢复、蜂群凝聚度和可重复性基准数据，把一个复盘工作流做成跨项目数据护城河。
goToMarketSeed:
  firstCustomer: 一家 150–800 人的欧洲无人系统集成商，正在为一个 NATO 对齐部委准备 10–50 架无人机蜂群演习，并且在下一轮合同增量前需要试验后证据
  buyingTrigger: 新的蜂群演习、试点里程碑或盟国评估要求在追加预算或部署批准前，拿出跨多个供应商可比的自主证据
  currentAlternative: 供应商各自的飞行日志、电子表格评分卡、PowerPoint 复盘和承包商撰写的测试报告
  switchingReason: 首批客户会切换，因为产品把复盘周期从数周压到数天，还能让演习证据在后续试验、部委和供应商组合中复用，同时不替换任何现有自主软件
  pricingHypothesis: 按活跃演习项目和已集成平台类型收取年度项目许可证，并对安全部署和新供应商连接器收取设置费
