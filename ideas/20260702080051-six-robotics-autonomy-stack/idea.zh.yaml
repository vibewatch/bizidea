jobsToBeDone:
- job: 多供应商无人机蜂群演习结束后，帮助飞行测试负责人重建自主行为并给结果打分，让他们不用花数周手工报告就能批准下一次试验
  currentAlternative: 人工审阅日志，再做 PowerPoint 行动后报告
  successMetric: 从演习结束到复盘包获批的天数
- job: 部委询问蜂群项目能否扩展时，帮助项目总监跨演习和供应商比较自主性能，让他们能用证据支撑预算释放和部署决策
  currentAlternative: 供应商说法、电子表格评分卡和承包商叙事
  successMetric: 审批问题中，可用复用证据回答而非重新分析的比例
