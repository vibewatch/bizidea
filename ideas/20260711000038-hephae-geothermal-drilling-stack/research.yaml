openQuestions:
- How many first-commercial advanced or superhot campaigns per year will actually run by 2028, and how many will involve a new OEM rather than an in-house drilling stack?
- Which exact artifact set do insurers, lenders, and counterparties require before they will release funds or accept warranty claims on first-wave wells?
- Will OEMs and contractors share tool-configuration history, spare readiness, and nonconformance data into a third-party system of record?
- Does the beachhead expand first into adjacent high-enthalpy geothermal workflows, into OEM commercialization teams, or into broader extreme-subsurface energy projects?
