competitors:
- name: SLB DrillPlan
  stage: incumbent
  wedge: Coherent well-construction planning inside a large enterprise drilling software stack.
  pricing: Custom enterprise contract; no public pricing list.
  strength: Deep drilling-planning credibility and enterprise integration around well design and execution.
  weaknessVsUs: Not positioned as a geothermal-specific assurance layer for warranties, lender review, or first-commercial deployment evidence.
  sourceRefs:
  - 29
- name: Corva
  stage: scale-up
  wedge: Real-time drilling optimization and predictive intelligence built on live energy data.
  pricing: Custom enterprise contract; no public pricing list.
  strength: Strong real-time analytics and AI posture during active drilling operations.
  weaknessVsUs: Centered on drilling performance rather than cross-counterparty commercialization accountability and evidence packaging.
  sourceRefs:
  - 30
- name: Peloton
  stage: incumbent
  wedge: Well-data and drilling-and-completions management inside an integrated oil and gas data platform.
  pricing: Custom enterprise contract; no public pricing list.
  strength: Credible system-of-record position for well data and completions workflows.
  weaknessVsUs: Weak on superhot-specific risk, spare readiness, and lender or insurer assurance workflows.
  sourceRefs:
  - 31
- name: Sitetracker
  stage: scale-up
  wedge: Planning and development workflow control for energy infrastructure and asset lifecycles.
  pricing: Custom enterprise contract; no public pricing list.
  strength: Broad cross-functional project controls and handoff visibility across asset programs.
  weaknessVsUs: Not built around downhole-tool limits, drilling milestones, or geothermal-specific commercialization proof.
  sourceRefs:
  - 32
- name: Wellsite Report
  stage: scale-up
  wedge: Lightweight field reporting, incident capture, and project-management software for industrial operations.
  pricing: $3/user/month standard; $10/user/month core management; enterprise custom.
  strength: Simple, public-price field reporting that can replace ad hoc spreadsheets at the low end.
  weaknessVsUs: Too generic for superhot multi-party campaigns, with no geothermal-specific assurance, financing, or warranty logic.
  sourceRefs:
  - 33
