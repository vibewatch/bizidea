  validationPlan:
  - priority: high
    question: Which exact artifacts do lenders, insurers, and OEM counterparties request before they will sign off on a first commercial well campaign?
    evidenceToGather: Live diligence-room checklists, redlines on warranty language, and post-incident review templates from 3-5 active next-generation geothermal campaigns.
  - priority: high
    question: Which data fields will operators, OEMs, and contractors actually share into a third-party system of record?
    evidenceToGather: Sample run logs, tool-configuration exports, spare-parts records, and nonconformance forms from design partners using current oilfield systems.
  - priority: medium
