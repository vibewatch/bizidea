    - 31
    - 33
  partnershipEcosystem:
  - point: Insurers and drilling-risk advisers are natural partners because they already influence what evidence is required before capital or coverage can be committed.
    sourceRefs:
    - 16
    - 17
  - point: Rig, tubular, and field-hardware partners matter because deployment credibility increasingly depends on supply-chain readiness and multi-vendor handoffs, not only on subsurface models.
    sourceRefs:
