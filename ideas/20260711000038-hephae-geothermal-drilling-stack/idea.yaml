problem: >-
  Superhot geothermal developers are crossing from prototype drilling into paid
  field deployments, but their first commercial wells still run like custom
  science projects. Tool limits, contractor handoffs, spares, incident logs, and
  milestone payments are scattered across spreadsheets, generic oilfield
  software, and weekly calls between developers, OEMs, and field crews. When a
  run slips or a component fails, nobody has a shared record of whether the well
  is still on track to hit temperature targets, stay within warranty, or remain
  financeable.
targetUser:
  primary: >-
    VP Drilling, Head of Field Deployment, or project-delivery lead at a
    superhot geothermal developer procuring its first commercial
    ultra-high-temperature drilling campaign
  secondary: >-
    Commercialization teams at geothermal drilling OEMs plus specialty insurers
    and infrastructure investors monitoring first-of-a-kind well campaigns
  buyer: Chief Development Officer, COO, or VP Drilling
startupThesis:
  nonObviousInsight: >-
    The scarce asset is not just the drill design. As ultra-high-temperature
    systems enter commercial deployment, the real control point becomes the
    execution record that proves a first well can be delivered on schedule,
    within operating limits, and with warranty-grade evidence. The company that
    owns that proof layer can shape procurement, financing, and insurer
    confidence across the category.
  beachhead: >-
    Project-delivery and drilling-operations teams at superhot geothermal
    developers procuring a first 1-3 well commercial campaign from a new
    ultra-high-temperature drilling OEM
  wedge: >-
    A superhot well deployment assurance OS that combines drilling milestones,
    tool configuration history, crew handoffs, incident review, spare-part
    readiness, and lender or insurer reporting in one commercial-well control
    plane
  whyNowCatalyst: >-
    Hephae's Series A is explicitly funding the move from development into
    commercial deployment, making repeatable field execution and performance
    proof urgent before more projects sign first-wave drilling contracts.
  ventureScalePath: >-
    Start as the system of record for first commercial superhot well campaigns,
    then expand into procurement benchmarks, reliability analytics, financing
    workflows, and adjacent high-enthalpy drilling categories across geothermal
    and other extreme subsurface energy projects.
solution: >-
  The product is a shared deployment workspace for geothermal developers,
  drilling OEMs, and contractors preparing first commercial wells. It tracks the
  campaign plan against tool configuration, run history, thermal limits, spare
  inventory, field incidents, and milestone-based commercial obligations. Each
  change updates delivery risk, warranty exposure, and the evidence pack needed
  by executives, insurers, lenders, or follow-on customers. Instead of learning
  only through end-of-campaign postmortems, teams see which component, crew
  step, or vendor dependency is breaking the commercialization thesis while they
  still have time to intervene. Over time, the platform becomes the benchmark
  dataset for which superhot drilling programs actually turn prototype hardware
  into repeatable commercial wells.
