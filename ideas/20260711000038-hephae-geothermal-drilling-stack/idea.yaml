differentiator: >-
  Generic field-service and drilling software tracks crews or equipment, but it
  is built for mature oilfield operations rather than first-of-a-kind superhot
  geothermal campaigns that need warranty evidence and capital-provider
  reporting. Geothermal consultants can write postmortems, yet those artifacts do
  not compound into a live benchmark across campaigns. This company wins by
  turning every milestone, component change, and incident into the performance
  dataset that future developers, OEMs, insurers, and financiers will rely on.
