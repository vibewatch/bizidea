  - job: When launching a first commercial superhot well campaign, help the project-delivery lead coordinate OEMs, contractors, and proof obligations, so they can hit drilling milestones without losing warranty or financing confidence.
    currentAlternative: Weekly coordination calls plus spreadsheet trackers stitched together by the developer or consultant
    successMetric: Days from campaign kickoff to a lender-ready and warranty-ready deployment record
