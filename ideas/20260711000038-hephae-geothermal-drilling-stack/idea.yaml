topRisks:
  - name: Category is still early
    description: The number of superhot geothermal developers entering true commercial drilling campaigns is still small.
    mitigation: Start with high-touch lighthouse deployments, sell to both developers and OEMs in the same campaigns, and expand into adjacent high-enthalpy drilling programs as the category matures.
  - name: Data access may be fragmented
    description: OEMs and contractors may resist sharing detailed run histories or component-failure data into one system.
    mitigation: Begin with workflow artifacts customers already control, then earn deeper data access by helping them close warranties, diligence, and future contracts faster.
  - name: Oilfield incumbents can move downmarket
    description: Established drilling software or field-service vendors could repackage existing tooling once geothermal budgets become credible.
    mitigation: Differentiate around superhot-specific warranty logic, commercial proof workflows, and a benchmark dataset sourced from first-of-a-kind geothermal campaigns.
