slug: superhot-well-deployment-os
date: "2026-07-11"
executiveSummary: >-
  Superhot well deployment OS should start as a deployment-assurance overlay for
  western U.S. next-generation geothermal developers and new drilling OEMs
  running their first paid 1-3 well campaigns. Research shows the buying moment
  is real because Hephae raised $17.8M specifically for commercial deployment,
  drilling can represent more than half of geothermal project cost, and lenders
  and insurers still treat upstream drilling risk as the gating barrier. The
  first product is not a generic drilling suite; it is a campaign system of
  record for milestones, tool genealogy, incident review, spare readiness, and
  warranty or diligence evidence layered on top of DrillPlan, Corva, Peloton,
  Sitetracker, or field reports. The first customer should be a VP Drilling or
  Head of Field Deployment facing a first commercial drilling contract,
  warranty negotiation, or lender diligence event and needing one auditable
  record across developer, OEM, and contractor handoffs. The go-to-market
  motion should start with a paid pilot on one active campaign, convert to a
  per-campaign annual subscription once weekly operating reviews and
  counterparty evidence packs run from the platform, and expand via more wells,
  OEM workflows, and benchmarking modules. This wedge is attractive because the
  buyer set is concentrated, the cost of failure is high, and an overlay can be
  proven faster than replacing incumbent drilling software. The market is
  promising but still narrow: research models about a $9.0M SAM and a $2.4M
  year-3 SOM for reachable first-commercial campaigns, so venture scale depends
  on later expansion into adjacent advanced-geothermal or OEM
  commercialization workflows. Key gaps remain whether customers will share the
  minimum data set, whether counterparties will converge on a common evidence
  pack, and how quickly the number of true first-commercial campaigns grows by
  2028.
problem:
  - >-
    First commercial superhot and first-wave EGS campaigns are still coordinated
    through spreadsheets, email, consultant decks, and generic drilling tools,
    so no single party owns a live record of schedule, tool limits, and
    contractual obligations.
  - >-
    When a run slips or a component fails, operators struggle to connect the
    incident to warranty exposure, financing milestones, spare readiness, and
    revised delivery risk quickly enough to keep the campaign bankable.
  - >-
    Existing drilling suites and project-control platforms each solve part of
    the workflow, but none are built as a geothermal-specific assurance layer
    for first-of-a-kind commercial wells.
solution:
  - >-
    Ship a shared campaign workspace for one active 1-3 well program that links
    milestones, tool configuration history, incident review, spare inventory,
    and milestone-based commercial obligations.
  - >-
    Generate human-reviewed warranty, diligence-room, and executive evidence
    packs from the same workflow teams use to run the campaign, eliminating the
    separate spreadsheet and slide-deck process.
  - >-
    Integrate as an overlay through read-only connectors and structured imports
    from incumbent drilling and reporting systems so customers do not need a
    rip-and-replace deployment.
whyWeWin:
  - >-
    The startup sells the missing commercialization layer instead of competing
    head-on with DrillPlan, Corva, Peloton, or Sitetracker on core drilling or
    well-data infrastructure.
  - >-
    Early cross-campaign data on tool genealogy, thermal exposure, incidents,
    mitigations, and outcome quality can compound into a proprietary benchmark
    that no single OEM or generic software vendor owns by default.
  - >-
    By tying value to release of capital, warranty acceptance, and executive
    confidence on first commercial wells, the product can justify software spend
    before the category is large enough for a broad horizontal platform.
strategicChoices:
  beachhead: >-
    Western U.S. next-generation geothermal developers running the first paid
    1-3 well commercial campaign with a new high-temperature drilling OEM.
  wedgeRationale: >-
    This beachhead creates faster proof than selling a broad geothermal or
    oilfield operations suite because the buyer set is countable, the trigger is
    explicit, and a single saved schedule or evidence failure can be measured
    inside one campaign. Starting with lower-temperature hydrothermal operators
    or generic drilling software would dilute the urgency and put the company
    into slower feature-by-feature competition with incumbents.
  sequencingRationale: >-
    Product should start as a human-in-the-loop overlay on top of existing
    drilling and project systems because data-sharing friction is high and buyers
    will not replace incumbent operational software during a first commercial
    well. Founder-led sales, one workflow implementation lead, and insurer or
    lender template partnerships should come before scaled GTM hiring so the
    company learns which artifacts, approvals, and integrations matter before it
    productizes benchmark analytics or broader expansion.
  notYet:
    - >-
      Full replacement of drilling-planning, well-data, or project-control
      systems.
    - >-
      Low-temperature hydrothermal geothermal programs where financing and
      warranty proof are less acute.
    - >-
      Automated drilling recommendations or closed-loop control features before
      the audit trail and approval workflow are trusted.
    - >-
      Broad oilfield expansion before adjacent advanced-geothermal or OEM
      commercialization workflows prove reusable.
market:
  tam: >-
    $24.0M estimated TAM from roughly 60 global first-commercial advanced or
    superhot geothermal campaigns by 2030 at about $400k annual campaign ACV.
  sam: >-
    $9.0M estimated SAM from about 25 reachable North American and European
    first-commercial campaigns over the next 3-5 years at roughly $360k annual
    ACV.
  som: >-
    $2.4M modeled year-3 SOM from 8 active campaigns at roughly $300k blended
    ACV including selective add-on modules.
  segments:
    - >-
      Western U.S. next-generation geothermal developers running first
      commercial 1-3 well campaigns with new high-temperature drilling OEMs.
    - >-
      OEM commercialization teams and selected European advanced-geothermal
      developers that can reuse the same assurance workflow after the beachhead
      is proven.
  buyingProcess: >-
    The deployment lead or drilling VP usually sponsors the deal when a first
    commercial contract, warranty negotiation, or lender diligence process
    exposes the limits of weekly decks and disconnected logs. The COO signs once
    a paid pilot proves the system can run weekly campaign reviews, cut incident
    response time, and produce counterparty-ready evidence without replacing
    incumbent systems.
product:
  mvp: >-
    MVP covers one live campaign with milestone tracking, tool genealogy,
    incident logging, spare readiness, contract obligations, role-based
    approvals, and exportable warranty or diligence packs fed by spreadsheet
    imports and read-only connectors. It excludes automated drilling
    optimization, deep OEM telemetry requirements, and adjacent lower-temperature
    geothermal workflows until the overlay proves repeatable.
  sixMonth: >-
    Launch 2 design-partner pilots, ship controlled imports from field reports
    plus at least 1 incumbent system, and run weekly red-amber-green campaign
    reviews with evidence-pack export.
  twelveMonth: >-
    Convert 2 pilots to production, add supplier access controls, benchmark
    dashboards across the first campaigns, and release template libraries for
    lenders, insurers, and warranty negotiations.
  twentyFourMonth: >-
    Reach 4-6 production campaigns, add an OEM commercialization workspace and
    reliability analytics, and launch one adjacent advanced-geothermal expansion
    only if most of the beachhead data model is reusable.
  keyBets:
    - >-
      Buyers will fund a per-campaign assurance overlay before they fund a full
      drilling software replacement.
    - >-
      Customer-controlled artifacts plus light read-only integrations are enough
      to deliver value before deep OEM API access exists.
    - >-
      A common evidence pack can shorten diligence and warranty review enough to
      support $250k-$400k annual software pricing.
    - >-
      Adjacent advanced-geothermal or OEM workflows can reuse most of the same
      data model, permissions, and reporting logic.
gtm:
  wedge: >-
    Close a paid pilot with a western U.S. next-generation geothermal developer
    entering a first commercial drilling contract and use the product as the
    weekly campaign review, incident board, and diligence room for that specific
    1-3 well program.
  channels:
    - >-
      Founder-led direct sales to VP Drilling, Head of Field Deployment, COO,
      and Chief Development Officer buyers at next-generation geothermal
      developers.
    - >-
      Co-selling and referral motion with drilling OEM commercialization teams,
      geothermal consultants, and owner representatives embedded in the same
      campaigns.
    - >-
      Influence channel through insurers, project-finance advisers, and DOE or
      IEA-related geothermal working groups that shape evidence expectations.
  funnelTargets: "target account→qualified opportunity 40%+; qualified opportunity→paid pilot 20-30%; paid pilot→annual production contract 50%+; first production campaign→second well, second campaign, or OEM expansion 50%+ within 12 months"
  pricing: >-
    Start with a $75k-$150k paid pilot for one active campaign phase, then
    convert to a $250k-$400k annual subscription per active commercial campaign
    plus per-well fees for warranty, diligence-room, and reliability
    benchmarking modules. This matches the researched ACV range and keeps the
    initial approval small relative to drilling cost and financing risk while
    preserving upsell as more wells or counterparties come onto the platform.
businessModel:
  revenueStreams:
    - >-
      Annual software subscription per active commercial drilling campaign.
    - >-
      Per-well fees for warranty, diligence-room, and reliability benchmarking
      modules.
    - >-
      Implementation and connector setup fees for lighthouse accounts and OEM
      partners.
  unitOfValue: >-
    One active first-commercial geothermal drilling campaign with 1-3 wells and
    a shared developer, OEM, and contractor workflow.
  targetGrossMarginPct: 70
  expansionLevers:
    - >-
      Add more wells, counterparties, and decision workflows inside the first
      campaign after pilot conversion.
    - >-
      Expand from developer accounts into OEM commercialization teams running the
      same campaigns.
    - >-
      Sell benchmark analytics, supplier scorecards, and reliability modules on
      top of the system-of-record workflow.
    - >-
      Reuse the assurance model in adjacent advanced-geothermal or extreme
      subsurface projects only after the beachhead implementation is repeatable.
strategyMap:
  northStarMetric: >-
    Number of active commercial geothermal campaigns generating weekly
    counterparty-ready assurance packs from the platform.
  inputMetrics:
    - >-
      Qualified target accounts with a first commercial campaign expected in the
      next 18 months.
    - >-
      Days from pilot kickoff to first live weekly campaign review run from the
      product.
    - >-
      Percentage of required artifact fields populated from system records rather
      than manual status decks.
    - >-
      Median time from incident detection to approved mitigation and updated
      commercial risk view.
    - >-
      Paid pilot-to-production conversion and second-campaign or OEM expansion
      rate.
  moatsToBuild:
    - >-
      Cross-campaign dataset linking tool genealogy, thermal exposure, incidents,
      mitigations, and commercial outcomes.
    - >-
      Template library for lender, insurer, warranty, and board-reporting
      evidence packs.
    - >-
      Integration and implementation playbooks for DrillPlan, Corva, Peloton,
      Sitetracker, and generic field-reporting inputs.
  killCriteria:
    - >-
      Fewer than 2 of the first 12 target accounts sign a paid pilot within 12
      months.
    - >-
      The first 3 pilots cannot produce a usable counterparty evidence pack from
      customer-controlled artifacts within 30 days of kickoff.
    - >-
      Paid pilot-to-production conversion stays below 50% or realized annual
      software pricing stays below $250k per campaign.
    - >-
      By month 18 an adjacent expansion workflow reuses less than 60% of the
      beachhead data model, leaving the market too small for venture scale.
  mermaid: |
    flowchart LR
      Wedge[First commercial geothermal campaign overlay] --> MVP[Milestones plus incidents plus evidence pack]
      MVP --> Proof[2 production campaigns and accepted diligence packs]
      Proof --> Expansion[OEM workflow plus adjacent advanced geothermal]
investorMemo:
  verdict:
    call: Watch
    conviction: >-
      Watch until one paid pilot proves data access, counterparty acceptance,
      and $250k+ production pricing in a live campaign.
    whyBelieve: >-
      Commercial deployment capital, improving project finance, and the absence
      of a neutral geothermal assurance layer create a credible wedge around
      first-commercial campaigns.
    whyDoubt: >-
      The reachable market is still small, incumbent adjacency is strong, and no
      evidence yet shows developers, OEMs, and counterparties will share enough
      data to support a durable software business.
    nextDiligence: >-
      Win one paid pilot, document the exact evidence pack lenders or insurers
      require, and prove pilot-to-production conversion at researched ACV before
      moving to a full investment process.
  firstCustomer:
    title: VP Drilling at a western U.S. next-generation geothermal developer
    profile: >-
      A developer planning its first paid 1-3 well campaign with a new
      high-temperature drilling OEM, multiple external contractors, and at least
      one lender, insurer, or board stakeholder asking for execution proof.
    trigger: >-
      A first commercial drilling contract or warranty or diligence negotiation
      exposes that weekly decks and scattered logs are no longer enough.
    buyer: COO
    initialContract: >-
      $75k-$150k paid pilot for one live campaign phase with milestone,
      incident, and evidence workflows, converting to a $250k-$400k annual
      campaign subscription plus per-well modules once the system runs weekly
      executive reviews and external diligence packs.
  mustBeTrue:
    - >-
      At least 8-10 reachable first-commercial campaigns will hit contracting or
      diligence triggers in the next 24-36 months.
    - >-
      A VP Drilling or COO will fund a paid pilot and later pay $250k or more
      annually for a campaign overlay instead of staying with consultants and
      spreadsheets.
    - >-
      Developers can share enough milestone, incident, tool, and spares data
      without waiting for a full OEM system replacement.
    - >-
      Lenders, insurers, and warranty counterparties will accept a standardized
      evidence pack as materially better than ad hoc decks.
    - >-
      After 2-3 lighthouse campaigns, OEM or adjacent advanced-geothermal
      expansion will reuse most of the data model and lift the company beyond a
      niche $9.0M SAM.
  diligenceQuestions:
    - >-
      Which named campaigns in the next 24 months fit the beachhead and who
      controls the software budget on each one?
    - >-
      What exact artifacts do lenders, insurers, and OEM warranties require
      before capital release or claim acceptance?
    - >-
      Which critical fields live in customer-controlled files versus OEM-owned
      systems, and what access is contractually feasible?
    - >-
      What budget line pays for the pilot and what current consultant or
      software spend does it displace?
    - >-
      Does expansion go first to OEM commercialization teams or to broader
      advanced-geothermal developers, and what percentage of the workflow is
      truly reusable?
operatingAssumptions:
  - assumption: >-
      At least 8 reachable active campaigns exist by year 3 for a specialized
      geothermal assurance overlay.
    basis: research.yaml
    validationTest: >-
      Build a named account list with expected well count, temperature band,
      OEM, and commercial timing and confirm at least 8 campaigns go live inside
      36 months.
    decisionImpact: >-
      If false, expand sooner into broader advanced-geothermal or OEM
      commercialization workflows and reduce the standalone venture case.
  - assumption: >-
      The product can convert from paid pilot to $250k-$400k annual ACV per
      active campaign.
    basis: research.yaml
    validationTest: >-
      Close 2 paid pilots and get 2 written production proposals accepted at or
      above $250k annual software pricing per campaign.
    decisionImpact: >-
      If false, narrow scope to diligence-room or claims software or accept a
      lower-scale services-heavy business.
  - assumption: >-
      Customer-controlled artifacts plus light read-only integrations are enough
      to deliver MVP value.
    basis: idea.yaml
    validationTest: >-
      Launch the first pilot using milestone plans, incident logs, tool
      configurations, and spares records without needing write access to
      incumbent drilling systems.
    decisionImpact: >-
      If false, the product becomes integration-heavy, slower to deploy, and
      more capital intensive before repeatable sales.
  - assumption: >-
      Counterparties will converge on a small set of lender-, insurer-, and
      warranty-ready evidence templates.
    basis: operator judgment
    validationTest: >-
      Review draft packs with at least 3 external counterparties and confirm at
      least 70% overlap in required fields.
    decisionImpact: >-
      If false, the product loses its neutral proof-layer moat and becomes
      mostly an internal operations dashboard.
  - assumption: >-
      Adjacent advanced-geothermal or OEM workflows can reuse most of the
      beachhead data model.
    basis: operator judgment
    validationTest: >-
      Design and price one adjacent workflow by month 15 and confirm at least
      60% reuse of objects, permissions, and reports.
    decisionImpact: >-
      If false, keep the company lean around the niche or abandon the
      venture-scale thesis.
experimentRoadmap:
  - horizon: 0-90 days
    experiment: Build the first 12-account beachhead map and artifact checklist
    hypothesis: >-
      The first target accounts share a narrow set of buying triggers and
      counterparty evidence requirements.
    successMetric: >-
      8 or more target accounts qualified and 70% or more artifact overlap
      across 5 customer or counterparty interviews.
    owner: CEO / founder
  - horizon: 0-90 days
    experiment: Prototype an evidence pack from sample campaign artifacts
    hypothesis: >-
      Customer-controlled milestone, incident, and tool records are enough to
      generate a useful weekly assurance pack without deep OEM integrations.
    successMetric: >-
      First mock pack produced in under 1 day from 4 artifact types and judged
      directionally useful by 2 design partners.
    owner: Founding eng
  - horizon: 3-6 months
    experiment: Close the first paid lighthouse pilot
    hypothesis: >-
      A developer facing a live first-commercial campaign will pay before full
      product maturity if the software replaces weekly status-deck assembly.
    successMetric: >-
      1 signed pilot worth $75k-$150k from the first 6 qualified opportunities.
    owner: CEO / founder
  - horizon: 3-6 months
    experiment: Run weekly multi-party campaign reviews inside the pilot
    hypothesis: >-
      Using the platform as the operating record reduces incident-response and
      decision latency.
    successMetric: >-
      30% or more reduction in incident-to-mitigation cycle time and weekly use
      by developer plus OEM stakeholders for 8 consecutive weeks.
    owner: Drilling workflow lead
  - horizon: 6-12 months
    experiment: Validate external acceptance of exported assurance packs
    hypothesis: >-
      Lenders, insurers, or warranty reviewers will accept a standardized pack
      as better than parallel consultant-built decks.
    successMetric: >-
      2 external counterparties use or sign off on exported packs without
      requiring a separate manual workbook.
    owner: CEO / founder
  - horizon: 12-18 months
    experiment: Test expansion into a second campaign or OEM workspace
    hypothesis: >-
      A successful lighthouse deployment can expand within the same account or
      OEM and reuse most of the data model.
    successMetric: >-
      1 expansion deal closed and 60% or more reuse of objects and reports in
      the adjacent workflow.
    owner: CEO / founder
operations:
  - >-
    Read-only ingestion pipeline for milestone plans, tool configurations,
    incident logs, spares lists, and contract obligations from customer files
    plus incumbent systems.
  - >-
    Weekly red-amber-green review ritual with developer, OEM, and contractor
    stakeholders using one shared risk board.
  - >-
    Human approval workflow before any warranty, lender, or insurer evidence
    pack is released outside the operating team.
  - >-
    Standard connector and CSV-import kit for DrillPlan, Corva, Peloton,
    Sitetracker, and generic field reports.
  - >-
    Template maintenance with geothermal consultants, insurers, and
    project-finance advisers for diligence, claims, and board reporting.
team:
  - role: CEO / founder
    startTiming: Month 0
    rationale: >-
      The buyer set is tiny, technical, and relationship-driven, so founder-led
      sales and ecosystem partnerships are mandatory at the start.
  - role: Founding eng
    startTiming: Month 0
    rationale: >-
      Build the campaign data model, permissions, evidence-pack engine, and
      first integrations fast enough to support lighthouse pilots.
  - role: Drilling workflow lead
    startTiming: Month 1
    rationale: >-
      Translate geothermal field artifacts into product requirements and run
      implementation across developers, OEMs, and contractors.
  - role: Data integration engineer
    startTiming: Month 6
    rationale: >-
      Turn early manual imports into reusable connectors that reduce pilot
      deployment friction and defend margins.
  - role: GTM / customer success lead
    startTiming: Month 12
    rationale: >-
      Add a dedicated operator only after 2 production references exist and the
      pilot-to-production motion is repeatable.
milestones:
  - horizon: 0-12 months
    items:
      - Sign 2 paid lighthouse pilots in western North America
      - Ship the MVP overlay for milestones, incidents, spares, and evidence packs
      - Generate the first live lender-ready or warranty-ready campaign pack
      - Convert at least 1 pilot to an annual production contract
  - horizon: 12-24 months
    items:
      - Reach 2-4 production campaigns across developer accounts and at least 1 OEM partner
      - Add benchmark dashboards and controlled external access for counterparties
      - Standardize the connector kit for at least 2 incumbent systems
      - Prove 1 adjacent advanced-geothermal or OEM expansion workflow
  - horizon: 24-36 months
    items:
      - Reach 6-8 active campaigns and the researched year-3 reach of the business
      - Launch reliability benchmarking and supplier scorecards as paid add-on modules
      - Expand into 1 adjacent high-enthalpy workflow only if reuse and margin thresholds hold
risks:
  - risk: The number of true first-commercial superhot or first-wave EGS campaigns stays too small through 2028.
    likelihood: High
    impact: High
    mitigation: >-
      Sell into both developers and OEMs on the same campaigns, keep the product
      narrow and high-touch at first, and force an earlier move into adjacent
      advanced-geothermal workflows if the account map stays thin.
  - risk: OEMs and contractors refuse to share tool history, spare readiness, or failure data into a third-party system.
    likelihood: High
    impact: High
    mitigation: >-
      Start with buyer-controlled artifacts, negotiate minimum data-sharing
      clauses in lighthouse accounts, and keep the initial product useful even
      when only partial integrations exist.
  - risk: Incumbent drilling or project-control vendors add geothermal assurance templates before the startup has reference accounts.
    likelihood: Medium
    impact: High
    mitigation: >-
      Differentiate around counterparty-ready evidence models, implementation
      playbooks, and the cross-campaign benchmark dataset rather than generic
      workflow features.
  - risk: Buyers treat the product as a nice-to-have dashboard and will not convert to $250k plus annual pricing.
    likelihood: Medium
    impact: High
    mitigation: >-
      Tie pilot success to measurable reductions in incident-response time,
      diligence-prep effort, and weekly status-deck work before asking for
      production pricing.
  - risk: Superhot tool qualification or customer project schedules slip, delaying the moment when the pain becomes budgeted.
    likelihood: Medium
    impact: Medium
    mitigation: >-
      Broaden near-term targeting to advanced-geothermal campaigns that still
      face high-temperature coordination and financing proof problems without
      requiring the most extreme temperature thresholds.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Eighteen months of runway funds a 4-5 person core team, 2-3 lighthouse
    deployments, light integrations into incumbent drilling systems, and
    validation of insurer or lender evidence templates plus one adjacent
    expansion path.
