slug: "superhot-well-deployment-os"
date: "2026-07-11"
currency: "USD"
modelStartMonth: "2026-08"
assumptions:
  - id: "A1"
    name: "Model start month"
    value: "2026-08"
    unit: "month"
    source: "[BP date 2026-07-11] The model starts in the first full month after the business-plan date."
  - id: "A2"
    name: "Starting cash after pre-seed close"
    value: "$2.8M"
    unit: "usdM"
    source: "[BP fundingAsk.targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] The base case uses $2.8M so the company can fund the planned launch team through the 4-campaign seed milestone and still keep more than six months of cash buffer."
  - id: "A3"
    name: "Paid pilot pricing"
    value: "$90K over 3 months"
    unit: "usdK_per_pilot"
    source: "[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] The midpoint of the BP's $75K-$150K paid pilot range is modeled as $30K of monthly pilot revenue for one active campaign phase."
  - id: "A4"
    name: "Base production subscription at conversion"
    value: "$270K ARR per campaign"
    unit: "usdK_arr_per_campaign"
    source: "[BP gtm.pricing; BP operatingAssumptions; research.market.som] The first annual production contract lands near the lower half of the BP's $250K-$400K range so early customers can adopt before the product earns full benchmark pricing."
  - id: "A5"
    name: "Add-on module uplift by maturity"
    value: "$30K ARR per mature campaign"
    unit: "usdK_arr_per_campaign"
    source: "[BP businessModel.revenueStreams; BP businessModel.expansionLevers; research.market.som] Warranty, diligence-room, and reliability modules lift mature campaign value from $270K to a $300K blended ACV by Y3, matching the research SOM assumption of 8 campaigns at about $300K each."
  - id: "A6"
    name: "Customer ramp"
    value: "2 paid pilots in Y1, 4 production campaigns by Q4Y2, and 8 active campaigns by Q4Y3"
    unit: "customers"
    source: "[BP milestones; BP product.twelveMonth; BP product.twentyFourMonth; research.market.som] The model follows the plan to win 2 lighthouse pilots, convert them, then climb to the researched year-3 reach of 8 active campaigns."
  - id: "A7"
    name: "Implementation fee treatment"
    value: "$0 standalone line item"
    unit: "usdK"
    source: "[BP businessModel.revenueStreams] Connector setup and implementation fees are conservatively treated as included inside paid pilot pricing so the model does not double-count services revenue before deployment becomes repeatable."
  - id: "A8"
    name: "Gross margin ramp"
    value: "35%-50% in Y1, 55%-65% in Y2, and 66%-70% in Y3"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70; BP strategicChoices.sequencingRationale; BP operatingAssumptions] Early pilots are deliberately high-touch and connector-heavy, then margins climb toward the BP's long-run software target as evidence packs and imports standardize."
  - id: "A9"
    name: "Monthly churn"
    value: "2.5%"
    unit: "percent"
    source: "Startup-finance heuristic for campaign-based industrial enterprise SaaS: contracts are sticky once embedded in weekly reviews, but first-commercial well programs and narrow account concentration still justify non-zero churn."
  - id: "A10"
    name: "Fully loaded CAC"
    value: "$200K per production campaign"
    unit: "usdK_per_customer"
    source: "[BP gtm.channels; BP gtm.funnelTargets; BP strategicChoices.sequencingRationale; research.reportMemo.distributionChannels] Founder-led enterprise selling, insurer or lender influence, and solutions-heavy deployment make CAC meaningfully higher than mid-market SaaS norms."
  - id: "A11"
    name: "Loaded salary bands"
    value: "CEO $160K; engineering $180K; workflow lead $165K; data/integrations $170K; GTM/CS $145K; G&A $125K"
    unit: "usdK_per_fte_year"
    source: "Startup-finance heuristic for a U.S. pre-seed industrial software startup, mapped to the exact team roles in [BP team] and kept lean because the beachhead market is narrow."
  - id: "A12"
    name: "Headcount ramp snapshots"
    value: "Founder 1/1/1/1/1/1; engineering 1/1/1/1/2/2; workflow 1/1/1/1/1/1; data/integrations 0/0/1/1/1/1; GTM/CS 0/0/0/1/1/2; G&A 0/0/0/0/1/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: "fte"
    source: "[BP team; BP strategicChoices.sequencingRationale; BP fundingAsk.useOfFundsSummary] The model holds to the BP's 4-5 person core team through the first year, adds connector capacity next, and only adds scale roles after production references exist."
  - id: "A13"
    name: "Non-payroll operating budgets"
    value: "Y1 opex $24K-$35K per month; Y2 $95K-$110K per quarter; Y3 $115K-$132K per quarter"
    unit: "usdK"
    source: "Startup-finance heuristic for cloud hosting, field travel, insurance, legal, data-security, and pilot-support costs on top of payroll for a deployment-assurance workflow startup."
  - id: "A14"
    name: "Quarterly payroll smoothing"
    value: "Late-quarter hires are smoothed between the required snapshot columns instead of stepping only at year-end"
    unit: "method"
    source: "[Financial Modeler contract] Salary expense in Y2 and Y3 is smoothed between q4y1, q4y2, and q4y3 so the P&L reflects realistic onboarding timing rather than a single hard step."
  - id: "A15"
    name: "Downside scenario deltas"
    value: "6 campaigns by Q4Y3, $270K blended ACV, and 65% steady-state gross margin"
    unit: "scenario_inputs"
    source: "[BP risks; research.openQuestions; research.reportMemo.sensitivityCases] The downside reflects slower campaign growth, weaker counterparty acceptance, and a more services-heavy delivery mix if data sharing or standardized evidence packs stall."
  - id: "A16"
    name: "Upside scenario deltas"
    value: "8 campaigns arrive one to two quarters earlier, $330K mature ACV, and 72% steady-state gross margin"
    unit: "scenario_inputs"
    source: "[BP businessModel.expansionLevers; BP milestones; research.validationSignals] The upside assumes lender-grade proof becomes a stronger buying trigger and add-on modules attach earlier once lighthouse references exist."
  - id: "A17"
    name: "Cash conversion simplification"
    value: "EBITDA approximates cash movement after the financing close"
    unit: "method"
    source: "Startup-finance heuristic for an asset-light software company with no debt, capex, or tax line modeled separately at this stage."
