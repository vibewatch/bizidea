scenarios:
  downside:
    description: "Campaign starts slip and counterparties demand more manual evidence work, so growth and margin both underperform the beachhead plan."
    y3RevenueK: 1500.0
    y3EbitdaK: -730.0
    cashLowPointK: 340.0
    keyAssumptionChanges:
      - "Q4Y3 active campaigns fall from 8 to 6."
      - "Blended ACV stays near $270K instead of reaching $300K."
      - "Gross margin tops out near 65% because deployments remain services-heavy."
      - "Sales cycles stretch by roughly 2-3 quarters as data-sharing and lender-template validation take longer."
  base:
    description: "The base case converts 2 lighthouse pilots, reaches 4 production campaigns by Q4Y2, and exits Y3 with the researched 8 active campaigns at about $300K blended ACV."
    y3RevenueK: 1950.0
    y3EbitdaK: -360.8
    cashLowPointK: 857.5
    keyAssumptionChanges:
      - "Paid pilots price near the BP midpoint at about $90K over 3 months."
      - "First production contracts start near $270K ARR and mature to a $300K blended ACV with module attach."
      - "Gross margin rises to the BP target of 70% by Q4Y3 as imports and evidence packs standardize."
      - "The logo count remains deliberately small, so most growth comes from campaign count and module attach rather than aggressive sales hiring."
  upside:
    description: "Lender and insurer proof requirements accelerate adoption, letting the same lean team land earlier conversions and more premium module attach."
    y3RevenueK: 2400.0
    y3EbitdaK: 120.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
      - "The fourth through eighth campaigns land one to two quarters earlier than base case."
      - "Mature campaign ACV rises from $300K to about $330K as diligence and reliability modules attach faster."
      - "Gross margin reaches about 72% because the connector kit and evidence templates standardize sooner."
      - "GTM hiring stays mostly flat because references and ecosystem channels do more of the selling work."
sensitivity:
  - variable: "ARPU"
    downsideCase: "$270K blended campaign ACV"
    baseCase: "$300K blended campaign ACV"
    upsideCase: "$330K ACV with stronger module attach"
    y3RevenueImpactK: -200.0
    cashImpactK: -150.0
  - variable: "CAC"
    downsideCase: "$250K per production campaign"
    baseCase: "$200K per production campaign"
    upsideCase: "$160K with referrals and repeatable templates"
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
  - variable: "churn"
    downsideCase: "3.5% monthly churn if first campaigns do not roll into follow-on work"
    baseCase: "2.5% monthly churn"
    upsideCase: "1.5% monthly churn with OEM workflow expansion"
    y3RevenueImpactK: -120.0
    cashImpactK: -90.0
  - variable: "sales cycle"
    downsideCase: "15-18 months from first meeting to production contract"
    baseCase: "9-12 months from pilot to production"
    upsideCase: "6-9 months with lender or insurer template pull-through"
    y3RevenueImpactK: -360.0
    cashImpactK: -300.0
  - variable: "gross margin"
    downsideCase: "65% steady-state gross margin"
    baseCase: "70% target gross margin"
    upsideCase: "72% with lighter implementation burden"
    y3RevenueImpactK: 0.0
    cashImpactK: -110.0
  - variable: "hiring pace"
    downsideCase: "Pull one extra engineer and one extra GTM hire forward by two quarters"
    baseCase: "Hire in the BP sequence"
    upsideCase: "Delay one scale hire until campaign 6 is live"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
modelDiagram:
  title: "unit economics flow"
  mermaid: |
    flowchart LR
      Leads[Named target accounts] --> Pilots[Paid pilots]
      Pilots --> Campaigns[Production campaigns]
      Campaigns --> Modules[Warranty and diligence modules]
      Modules --> Revenue[Recurring revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by reaching 8 active campaigns by Q4Y3 at roughly $300K blended ACV, not by broad-based horizontal software penetration."
  - checkName: "Must go right"
    finding: "The first 2 lighthouse pilots must convert and prove a reusable evidence-pack template quickly enough that the company can grow campaign count without layering on a large services team."
  - checkName: "Model breaks if"
    finding: "The downside case emerges if sales cycles extend and counterparties refuse standardized data sharing, because Y3 EBITDA falls toward about -$0.73M and cash compresses toward roughly $0.34M."
  - checkName: "Next-round proof"
    finding: "The next financing is justified once 4 production campaigns, 2 repeatable connectors, and 1 OEM or adjacent workflow show that the beachhead can expand beyond a niche overlay product."
sanityChecks:
  ruleOf40: "Y3 growth 103.1% + EBITDA margin -18.5% = 84.6%."
  burnMultiple: "Y2 burn multiple is about 1.2x on roughly $0.66M of net new ARR; Y3 improves to about 0.3x while adding roughly $1.20M of net new ARR."
  revenuePerFte: "$244K Y3 using $1.95M revenue and 8 year-end FTE (benchmark $200–400K SaaS)."
  flags:
    - "The model still depends on only 8 active campaigns for the full Y3 revenue run-rate, so account concentration and category-timing risk remain unusually high."
    - "Gross margin only reaches the 70% target in Q4Y3; if connectors or external evidence packs stay manual, ARPU and margin will miss together."
    - "The company is only near break-even by Q4Y3, so a seed round is still likely before self-funding unless adjacent OEM or advanced-geothermal workflows expand faster than base case."
