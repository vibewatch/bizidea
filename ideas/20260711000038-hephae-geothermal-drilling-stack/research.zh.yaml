    rationale: 估算逻辑是：到 2030 年全球约 60 个首批商业化先进地热或超高温地热钻井项目 × 每个项目每年 $0.40M ACV。这里的 60 个项目，是从美国已在开发的 54 个地热项目，加上相当规模的国际 SHR/EGS 队列里再筛出来的子集；并不是每个地热项目都需要这层保障，所以模型只计算数据最重的首批商业项目。
