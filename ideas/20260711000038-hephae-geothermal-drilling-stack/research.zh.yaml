competitors:
- name: SLB DrillPlan
  stage: incumbent
  wedge: 大型企业钻井软件栈里的一体化井建设规划。
  pricing: 定制企业合同；无公开价目表。
  strength: 围绕井设计和执行，拥有深厚的钻井规划可信度和企业级集成能力。
  weaknessVsUs: 没有把自己定位成面向地热的保障层，无法直接处理保修、贷方审核或首批商业部署证据。
  sourceRefs:
  - 29
- name: Corva
  stage: scale-up
  wedge: 建立在实时能源数据上的钻井实时优化与预测能力。
  pricing: 定制企业合同；无公开价目表。
  strength: 在真实钻井作业阶段，实时分析和 AI 姿态都很强。
  weaknessVsUs: 核心仍是钻井表现，而不是跨对手方的商业化问责和证据打包。
  sourceRefs:
  - 30
- name: Peloton
  stage: incumbent
  wedge: 一体化油气数据平台里的井数据与钻完井管理。
  pricing: 定制企业合同；无公开价目表。
  strength: 在井数据和完井工作流上，占着可信的记录底座位置。
  weaknessVsUs: 面对超高温专属风险、备件就绪度，以及贷方或保险方保障工作流时明显偏弱。
  sourceRefs:
  - 31
- name: Sitetracker
  stage: scale-up
  wedge: 面向能源基础设施和资产生命周期的规划与开发工作流控制。
  pricing: 定制企业合同；无公开价目表。
  strength: 能跨职能团队管项目控制和交接可见度。
  weaknessVsUs: 并不是围绕井下工具极限、钻井里程碑或地热专属商业化证明设计的。
  sourceRefs:
  - 32
- name: Wellsite Report
  stage: scale-up
  wedge: 轻量级现场报告、事故采集和工业项目管理软件。
  pricing: $3/user/month 标准版；$10/user/month 核心管理版；企业版定制。
  strength: 低端场景里，它用简单透明的公开定价就能替代临时表格。
  weaknessVsUs: 对超高温多方项目来说太通用，既没有地热专属保障逻辑，也没有融资或保修逻辑。
  sourceRefs:
  - 33
regulatoryTechnicalConstraints:
- point: 地热项目往往要拿很多许可证、授权和监管批准，尤其一旦涉及联邦土地或公共资源流程。
  sourceRefs:
  - 14
  - 15
- point: 钻井在项目成本里占比仍然异常高，所以买方会非常警惕：任何号称能改善执行的系统，如果没碰到真正的失败模式，就很难让人信服。
  sourceRefs:
  - 9
  - 10
- point: 首批商业化超高温项目，仍需要更好的高温井下电子设备和开放式试点学习回路，才能在传统油田上限之上稳定运行。
  sourceRefs:
  - 4
  - 5
  - 11
  - 12
  - 37
- point: 诱发地震应对方案和现有数据系统集成，必须在产品设计里写明白，因为市场最终会按审计链质量来判断这套软件。
  sourceRefs:
  - 22
  - 29
  - 30
  - 31
  - 33
