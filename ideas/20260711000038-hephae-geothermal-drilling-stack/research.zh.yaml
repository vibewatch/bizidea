openQuestions:
- 到 2028 年，每年到底会有多少先进地热或超高温项目真正跑起来？其中又有多少会引入新的 OEM，而不是继续用自有钻井栈？
- 在第一波井项目上，保险方、贷方和对手方究竟要看哪些材料，才会放款或接受保修索赔？
- OEM 和承包商愿不愿意把工具配置历史、备件就绪度和不合格数据放进第三方记录系统？
- 这个滩头下一步是先扩到相邻高焓地热工作流、OEM 商业化团队，还是更广的极端地下能源项目？
