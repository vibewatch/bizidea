slug: superhot-well-deployment-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: month
  source: '[BP date 2026-07-11] 模型从商业计划日期之后的第一个完整月份开始。'
- id: A2
  name: pre-seed 结束后的起始现金
  value: $2.8M
  unit: usdM
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M; BP fundingAsk.runwayMonths 18] 基准情景取 $2.8M，这样公司既能把计划中的启动团队拉起来，跑到 4 个项目这一 seed 轮里程碑，又还能留出超过 6 个月的现金缓冲。'
- id: A3
  name: 付费试点定价
  value: 3 个月 $90K
  unit: usdK_per_pilot
  source: '[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] 按 BP 里 $75K-$150K 付费试点区间的中位数建模，相当于一个在运项目阶段每月确认约 $30K 的试点收入。'
- id: A4
  name: 转正后的基础生产订阅
  value: 每个项目 ARR $270K
  unit: usdK_arr_per_campaign
  source: '[BP gtm.pricing; BP operatingAssumptions; research.market.som] 第一份年度正式合同落在 BP $250K-$400K 区间的下半段，让早期客户先上车，再等产品拿到完整基准定价。'
- id: A5
  name: 成熟项目的增值模块抬升
  value: 每个成熟项目 ARR 再加 $30K
  unit: usdK_arr_per_campaign
  source: '[BP businessModel.revenueStreams; BP businessModel.expansionLevers; research.market.som] 保修、尽调资料室和可靠性模块，会把成熟项目的价值从 $270K 抬到 Y3 约 $300K 的综合 ACV，也和研究里 8 个项目、单个约 $300K 的 SOM 假设对齐。'
- id: A6
  name: 客户爬坡
  value: Y1 2 个付费试点，Q4Y2 4 个正式项目，Q4Y3 8 个在运项目
  unit: customers
  source: '[BP milestones; BP product.twelveMonth; BP product.twentyFourMonth; research.market.som] 模型沿着计划走：先拿 2 个灯塔试点并转正，再爬到研究里第 3 年 8 个在运项目的触达上限。'
- id: A7
  name: 实施费处理
  value: $0 独立收入项
  unit: usdK
  source: '[BP businessModel.revenueStreams] 连接器配置和实施费，保守起见都并入付费试点定价，避免在部署动作可重复前把服务收入重复计算。'
- id: A8
  name: 毛利率爬坡
  value: Y1 为 35%-50%，Y2 为 55%-65%，Y3 为 66%-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70; BP strategicChoices.sequencingRationale; BP operatingAssumptions] 早期试点故意做得高触达、连接器工作也重；等证据包和导入流程标准化后，毛利才会逐步抬到 BP 的长期软件目标。'
- id: A9
  name: 月流失率
  value: 2.5%
  unit: percent
  source: 面向按项目收费的工业企业 SaaS 的创业财务经验值：一旦嵌进每周复盘，合同会比较黏，但首批商业井项目和账户高度集中的现实，仍足以支持非零流失。
- id: A10
  name: 全成本 CAC
  value: 每个正式项目 $200K
  unit: usdK_per_customer
  source: '[BP gtm.channels; BP gtm.funnelTargets; BP strategicChoices.sequencingRationale; research.reportMemo.distributionChannels] 创始人主导的企业销售、保险方或贷方影响力，以及偏重解决方案实施的部署方式，会让 CAC 明显高于中端 SaaS 的常规水平。'
- id: A11
  name: 全成本薪酬带
  value: CEO $160K；工程 $180K；工作流负责人 $165K；数据/集成 $170K；GTM/CS $145K；G&A $125K
  unit: usdK_per_fte_year
  source: 面向美国 pre-seed 工业软件公司的创业财务经验值，对应 [BP team] 里的具体岗位，并刻意保持精简，因为滩头市场很窄。
- id: A12
  name: 招聘爬坡快照
  value: 创始人 1/1/1/1/1/1；工程 1/1/1/1/2/2；工作流 1/1/1/1/1/1；数据/集成 0/0/1/1/1/1；GTM/CS 0/0/0/1/1/2；G&A 0/0/0/0/1/1，对应 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3
  unit: fte
  source: '[BP team; BP strategicChoices.sequencingRationale; BP fundingAsk.useOfFundsSummary] 模型遵守 BP 在第一年维持 4-5 人核心团队的设定，先补连接器能力，再等正式生产参考客户出来后才加规模化岗位。'
- id: A13
  name: 非薪酬运营预算
  value: Y1 每月 opex $24K-$35K；Y2 每季度 $95K-$110K；Y3 每季度 $115K-$132K
  unit: usdK
  source: 面向部署保障工作流创业公司的创业财务经验值，覆盖云、现场差旅、保险、法务、数据安全和试点支持等薪酬外成本。
- id: A14
  name: 季度薪酬平滑
  value: 季度后段入职按所需快照列之间平滑处理，而不是只在年末一步跳变
  unit: method
  source: '[Financial Modeler contract] Y2 和 Y3 的薪酬费用在 q4y1、q4y2 和 q4y3 之间做平滑，让 P&L 反映更真实的入职节奏，而不是只出现一次硬台阶。'
- id: A15
  name: 下行情景变动
  value: Q4Y3 只做到 6 个项目，综合 ACV $270K，稳态毛利率 65%
  unit: scenario_inputs
  source: '[BP risks; research.openQuestions; research.reportMemo.sensitivityCases] 下行情景对应更慢的项目增长、更弱的对手方接受度，以及如果数据共享或标准证据包卡住后，更偏服务化的交付结构。'
- id: A16
  name: 上行情景变动
  value: 8 个项目提前 1-2 个季度到来，成熟 ACV $330K，稳态毛利率 72%
  unit: scenario_inputs
  source: '[BP businessModel.expansionLevers; BP milestones; research.validationSignals] 上行情景假设，贷方级证据更快变成购买触发点，且一旦有灯塔参考客户，增值模块会更早挂上。'
- id: A17
  name: 现金转换简化
  value: 融资到账后，EBITDA 近似等于现金变动
  unit: method
  source: 面向轻资产软件公司的创业财务经验值：在这个阶段，不单独建模债务、CapEx 或税线。
