scenarios:
  downside:
    description: 项目启动继续后移，对手方也要求更多人工证据工作，因此增长和毛利都会跑输滩头计划。
    y3RevenueK: 1500.0
    y3EbitdaK: -730.0
    cashLowPointK: 340.0
    keyAssumptionChanges:
    - Q4Y3 的在运项目从 8 个掉到 6 个。
    - 综合 ACV 停在约 $270K，没能走到 $300K。
    - 由于部署继续偏服务化，毛利率最高只到约 65%。
    - 数据共享和贷方模板验证更慢，销售周期大致被拉长 2-3 个季度。
  base:
    description: 基准情景会把 2 个灯塔试点转成正式生产，在 Q4Y2 做到 4 个正式项目，并在 Y3 末以研究里的 8 个在运项目、约 $300K 综合 ACV 收官。
    y3RevenueK: 1950.0
    y3EbitdaK: -360.8
    cashLowPointK: 857.5
    keyAssumptionChanges:
    - 付费试点价格取 BP 中位数，3 个月约 $90K。
    - 首批正式合同从约 $270K ARR 起步，随着模块挂载，成熟到 $300K 的综合 ACV。
    - 随着导入和证据包标准化，毛利率会在 Q4Y3 抬到 BP 目标的 70%。
    - 客户数刻意保持很小，所以增长主要来自项目数和模块挂载，而不是激进扩销售。
  upside:
    description: 贷方和保险方对证明材料的要求，会反过来加速采用，让同一支精干团队更早转正，也能挂更多高价模块。
    y3RevenueK: 2400.0
    y3EbitdaK: 120.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
    - 第 4 到第 8 个项目会比基准情景提前 1-2 个季度落地。
    - 随着尽调和可靠性模块更快挂上，成熟项目 ACV 会从 $300K 抬到约 $330K。
    - 连接器套件和证据模板更早标准化，毛利率能到约 72%。
    - 参考客户和生态渠道会承担更多销售工作，因此 GTM 招聘基本不用加速。
sensitivity:
- variable: ARPU
  downsideCase: 综合项目 ACV $270K
  baseCase: 综合项目 ACV $300K
  upsideCase: 模块挂载更强，ACV $330K
  y3RevenueImpactK: -200.0
  cashImpactK: -150.0
- variable: CAC
  downsideCase: 每个正式项目 CAC $250K
  baseCase: 每个正式项目 CAC $200K
  upsideCase: 靠转介绍和可复用模板，把 CAC 压到 $160K
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
- variable: 流失率
  downsideCase: 如果首批项目没有滚到后续项目，月流失率 3.5%
  baseCase: 月流失率 2.5%
  upsideCase: 随着 OEM 工作流扩张，月流失率降到 1.5%
  y3RevenueImpactK: -120.0
  cashImpactK: -90.0
- variable: 销售周期
  downsideCase: 从第一次见面到正式合同，需要 15-18 个月
  baseCase: 从试点到正式生产，需要 9-12 个月
  upsideCase: 如果贷方或保险方模板能带动成交，只需 6-9 个月
  y3RevenueImpactK: -360.0
  cashImpactK: -300.0
- variable: 毛利率
  downsideCase: 稳态毛利率 65%
  baseCase: 目标毛利率 70%
  upsideCase: 实施负担更轻时可到 72%
  y3RevenueImpactK: 0.0
  cashImpactK: -110.0
- variable: 招聘节奏
  downsideCase: 把一名额外工程师和一名额外 GTM 招聘都提前 2 个季度
  baseCase: 按 BP 节奏招聘
  upsideCase: 等第 6 个项目上线后，再补 1 个规模化岗位
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
modelDiagram:
  title: 单位经济流转
  mermaid: "flowchart LR\n  Leads[Named target accounts] --> Pilots[Paid pilots]\n  Pilots --> Campaigns[Production campaigns]\n  Campaigns --> Modules[Warranty and diligence modules]\n  Modules --> Revenue[Recurring revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Ending cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景收入靠的不是横向软件大面积渗透，而是到 Q4Y3 把 8 个在运项目做到约 $300K 的综合 ACV。
- checkName: 必须跑通的环节
  finding: 前 2 个灯塔试点必须转正，而且要足够快证明证据包模板可复用，这样公司才能在不叠大服务团队的前提下继续扩项目数。
- checkName: 模型失效触发点
  finding: 如果销售周期拉长、对手方又拒绝标准化数据共享，下行情景就会出现：Y3 EBITDA 会掉到约 -$0.73M，现金也会压到约 $0.34M。
- checkName: 下轮融资证明
  finding: 只要 4 个正式项目、2 个可复用连接器，以及 1 个 OEM 或相邻工作流一起出现，就足以证明滩头不只是一个小众叠加层产品，可以支撑下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长 103.1% + EBITDA 利润率 -18.5% = 84.6%。
  burnMultiple: Y2 的烧钱倍数约 1.2x，对应约 $0.66M 的净新增 ARR；Y3 改善到约 0.3x，同时新增约 $1.20M 净 ARR。
  revenuePerFte: Y3 人效约 $244K，基于 $1.95M 收入和年末 8 个 FTE（SaaS 基准为 $200K-$400K）。
  flags:
  - 整个 Y3 的收入节奏仍只建立在 8 个在运项目上，所以账户集中度和品类节奏风险依然偏高。
  - 毛利率到 Q4Y3 才碰到 70% 目标；如果连接器或对外证据包继续靠人工，ARPU 和毛利会一起失手。
  - 公司到 Q4Y3 也只是接近平衡；除非相邻 OEM 或先进地热工作流比基准情景扩得更快，否则在自我造血前大概率仍要再融一轮 seed。
