jobsToBeDone:
- job: 启动首个商业化超高温井项目时，帮项目交付负责人把 OEM、承包商和各类证明义务拧到一起，让团队能在不丢保修和融资信心的前提下按期打完关键里程碑。
  currentAlternative: 开发商或顾问靠每周协调会和表格追踪表手工拼起来
  successMetric: 从项目启动到形成可交给贷方和保修方的部署记录，用了多少天
- job: 当一次作业延误，或一个部件失效时，帮现场运营团队判断是继续、替换还是重排计划，让项目既守住进度，也守住可信的商业化叙事。
  currentAlternative: 围绕供应商邮件、现场日志和通用服务管理工具做临时问题复盘
  successMetric: 从发现事故到批准备选处置方案并更新商业风险视图，需要多少小时
