problem: 超高温地热开发商正从原型钻探迈向付费现场部署，但首批商业井仍像定制化科研项目在跑。工具极限、承包商交接、备件、事故日志和里程碑付款，散落在表格、通用油服软件，以及开发商、OEM 和现场班组的每周会议里。一次作业延误，或一个部件失效，谁都说不清这口井还能不能按温度目标推进、还能不能守住保修边界、还能不能继续过融资。
targetUser:
  primary: 超高温地热开发商里，正在采购首个商业化超高温钻井项目的 VP Drilling、现场部署负责人或项目交付负责人
  secondary: 地热钻井 OEM 的商业化团队，以及持续盯着首例型井项目的专业保险方和基础设施投资人
  buyer: 首席开发官、COO 或 VP Drilling
startupThesis:
  nonObviousInsight: 稀缺资产不只是钻头设计本身。超高温系统一旦进入商业部署，真正的控制点会变成那条执行记录：它要证明第一口井能按期交付、运行不越界，而且证据足以支撑保修。谁掌握这层证明，谁就能左右这个品类里的采购、融资和保险方信心。
  beachhead: 正在向新一代超高温钻井 OEM 采购首个 1-3 口井商业项目的超高温地热开发商，其项目交付和钻井运营团队
  wedge: 一套超高温井部署保障 OS，把钻井里程碑、工具配置历史、班组交接、事故复盘、备件就绪度，以及贷方或保险方报告，收进同一个商业井控制平面
  whyNowCatalyst: Hephae 这轮 Series A 明确要把研发推进到商业部署；在更多项目签下首批钻井合同前，可重复的现场执行和性能证明已经变成眼前的硬需求。
  ventureScalePath: 先做首批商业化超高温井项目的记录底座，再往采购基准、可靠性分析、融资工作流，以及地热和其他极端地下能源项目里的相邻高焓钻井品类扩。
solution: 产品是给地热开发商、钻井 OEM 和承包商共用的一套部署工作台，服务对象是正在准备首批商业井的团队。它把项目计划和工具配置、作业历史、温度上限、备件库存、现场事故，以及按里程碑触发的商业义务串起来。任何一处变化，都会同步改写交付风险、保修暴露，以及高管、保险方、贷方或后续客户需要看到的证据包。团队不必等到项目结束后再靠复盘慢慢发现问题，而是能在还有时间介入时，就看清到底是哪一个部件、哪一个班组环节、哪一个供应商依赖在拖垮商业化叙事。时间拉长后，这个平台会沉淀成一套基准数据，回答哪些超高温钻井项目真的能把原型硬件跑成可复制的商业井。
goToMarketSeed:
  firstCustomer: 一家超高温地热开发商，正计划和新的钻井 OEM 一起做首个付费 1-3 口井商业项目，而且已有至少一名外部对手方在追问进度或性能证明
  buyingTrigger: 首份商业钻井合同、贷方尽调流程，或保修谈判，都会逼着团队把临时拼出来的试点管理，换成一套共享执行记录
  currentAlternative: 基于表格的现场计划、通用油服项目管理软件、邮件线程，以及顾问手工拼的每周状态汇报材料
  switchingReason: 这套产品把工具就绪度、作业历史、里程碑付款和保修证据收进同一份共享记录里；通用油服系统和顾问服务，做不好首例型地热部署这件事。
  pricingHypothesis: 按每个在运商业钻井项目收年费，再叠加单井的保修、尽调资料室和可靠性基准模块费用
