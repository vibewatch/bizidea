topRisks:
- name: 品类还太早
  description: 真正进入商业钻井项目的超高温地热开发商仍然不多。
  mitigation: 先用高触达灯塔部署起步，在同一批项目里同时卖给开发商和 OEM；等品类成熟，再往相邻高焓钻井项目扩。
- name: 数据接入可能很碎
  description: OEM 和承包商未必愿意把详细作业历史或部件失效数据汇总到同一套系统。
  mitigation: 先从客户自己已经掌控的工作流材料入手，再靠更快收尾保修、尽调和后续合同，换来更深的数据接入。
- name: 油服现有厂商能向下杀
  description: 一旦地热预算变得可信，成熟的钻井软件或现场服务厂商可能会把现有工具重新打包后直接杀进来。
  mitigation: 围绕超高温专属的保修逻辑、商业化证明工作流，以及从首例型地热项目沉淀出的基准数据集做差异化。
