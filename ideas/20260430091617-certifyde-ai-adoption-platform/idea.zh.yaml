  defensibility:
    score: 4
    rationale: 工作流遥测、策略包和采用数据会随时间复利积累，并契合通用工具服务不足的受监管垂直场景。
  ventureScale:
    score: 4
    rationale: 切入市场虽窄，但同一控制层可扩展到多个受监管知识工作职能和企业。
topRisks:
- name: 平台挤压
  description: 浏览器厂商、Microsoft 或核心 AI 套件可能会加入原生落地与策略功能，从而压缩切入口。
  mitigation: 优先聚焦跨应用工作流控制、受监管模板以及单一套件厂商难以覆盖的审计深度。
- name: 安全审查摩擦
  description: 联邦承包商可能会犹豫是否安装一个会观察敏感工作流的浏览器扩展。
  mitigation: 提供最小化数据保留、本地或 VPC 部署选项，以及对日志范围清晰可控的管理员权限。
- name: ROI 可能显得过软
  description: 如果收益只被表述为培训改进，买方可能会把落地工具视为可有可无。
  mitigation: 将试点锚定在可衡量的提案周期指标、合规例外减少以及企业 AI 许可证利用率上。
