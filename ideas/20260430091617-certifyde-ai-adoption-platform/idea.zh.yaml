jobsToBeDone:
- job: 当我的团队在截止期内起草 RFP 响应时，帮助提案经理引导员工使用获批的 AI 提示词和复核流程，从而在不引入合规风险的前提下提升吞吐量
  currentAlternative: 人工复核加基于 wiki 的提示词指导
  successMetric: 通过获批 AI 工作流产出的提案内容占比提高，同时复核例外减少
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 4 个经验证的窗口内来源一致表明，浏览器级 AI 落地已成为真实且获得融资的类别。
  painIntensity:
    score: 4
    rationale: 推广失败会在受监管团队中造成许可证 ROI 流失、安全焦虑以及更慢的提案产出。
  wedgeClarity:
    score: 5
