jobsToBeDone:
  - job: 当我的团队在截止日期下撰写 RFP 响应时，帮助投标经理引导员工使用获批的 AI 提示词和复核流程，这样他们就能在不制造合规风险的前提下提升吞吐量。
    currentAlternative: 人工复核加基于 wiki 的提示词指引
    successMetric: 使用获批 AI 工作流产出的投标内容占比提高，复核例外减少
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 四个已核验、处在时间窗口内的来源，都一致把浏览器层 AI 采用描述成一个真实、且已获融资的品类。
  painIntensity:
    score: 4
    rationale: rollout 失败会带来许可证 ROI 流失、安全焦虑，以及受监管团队投标产出变慢。
  wedgeClarity:
    score: 5
    rationale: 浏览器扩展是一个非常清晰的切入口，而且能避开沉重的系统集成。
  defensibility:
    score: 4
    rationale: 工作流遥测、策略包和采用数据会随时间复利累积，而这些能力在受监管垂直领域里很难被通用工具做好。
  ventureScale:
    score: 4
    rationale: 滩头市场虽然窄，但同一控制层可以扩展到很多受监管的知识工作职能和企业场景。
topRisks:
  - name: 平台挤压
    description: 浏览器厂商、Microsoft 或核心 AI 套件，可能会加入原生采用与策略功能，从而压缩这个切口。
    mitigation: 先聚焦跨应用工作流控制、受监管模板，以及单一套件厂商不擅长覆盖的审计深度。
  - name: 安全审查阻力
    description: 联邦承包商可能会犹豫是否安装一个会观察敏感工作流的浏览器扩展。
    mitigation: 采用最小化数据保留策略，支持 on-prem 或 VPC 部署选项，并给管理员清晰的日志控制权。
  - name: ROI 可能显得偏软
    description: 如果收益只被表述成“培训提升”，买家可能会把采用工具看成可有可无。
    mitigation: 让试点直接绑定可度量的投标周期指标、合规例外下降，以及企业 AI 许可证利用率。
