problem: 大多数企业在推广 ChatGPT Enterprise 或 Copilot 时，很快发现真正的失效点不是模型质量，而是员工在浏览器里的行为。员工在门户、文档、邮件和内部工具之间来回切换，却不知道哪些提示词已获批准、哪些数据可以共享，以及管理者将如何衡量安全使用。在受监管团队中，这种不确定性会扼杀采用，把工作重新推回到人工起草、复制粘贴式作业手册和影子 AI。
targetUser:
  primary: 正在向 200-2,000 名知识工作者推广企业 AI 的中型联邦 IT 与国防承包商中的提案运营负责人
  secondary: 同类组织中的 AI 治理负责人以及安全/合规经理
  buyer: CIO、首席数字官或提案运营副总裁
startupThesis:
  nonObviousInsight: 企业 AI 缺失的不是另一种模型或聊天界面，而是一层浏览器原生操作层，能够把经批准的提示词、策略护栏和审计轨迹直接注入员工跨多个 Web 应用的实际工作中。
  beachhead: 在严格审查规则下，使用基于浏览器的采购门户以及 Microsoft 365 或 Google Workspace 起草 RFP 响应、工作说明书和合同修改的联邦承包商
  wedge: 一款可检测工作流上下文、推荐获批提示词包、阻止高风险数据处理并记录人工复核的浏览器扩展，使提案团队无需更换现有应用也能安全使用 AI
  whyNowCatalyst: 多个窗口内来源都描述了一个已获融资、面向企业和政府 AI 推广的浏览器扩展切入口，验证了“在使用点控制落地”的类别已变得紧迫且具预算承载能力。
  ventureScalePath: 先从提案和文档密集型的受监管工作流切入，再扩展到法务、公共部门运营、客户支持，以及所有基于浏览器的知识工作流中的企业级 AI 治理分析。
solution: 该产品是一层面向受监管知识工作的浏览器原生 AI 落地层。它叠加在采购门户、共享文档、邮件和内部 Web 应用之上，在工作发生的当下提供角色化提示词模板、必需的引用模式、脱敏检查和审批步骤。管理员可以按合同类型或客户发布已获批准的作业手册，而管理者获得的则是与真实工作流挂钩的采用、风险和结果分析，而非培训完成率。随着时间推移，这套系统会成为控制平面，决定谁可以在何种上下文中使用哪些 AI 工具，以及留下怎样的人工复核证据。
goToMarketSeed:
  firstCustomer: 一家拥有 500-3,000 名员工的联邦 IT 承包商，具备活跃的提案团队、企业 AI 许可证推广，以及面向民用和国防机构的持续 RFP 量
  buyingTrigger: 一次企业 AI 推广或续费暴露出提案与合同起草工作流中的低真实使用率、输出不一致或合规担忧
  currentAlternative: PDF 政策、LMS 培训、人工经理复核、wiki 中的提示词库，以及安全团队的一刀切限制
  switchingReason: 浏览器扩展比面向单一工作流的集成或内部自研部署更快，能直接进入员工现有工具，并在同一层同时提供可衡量的采用和策略执行
  pricingHypothesis: 按受管控知识工作者或活跃提案席位计费的年度 SaaS 订阅，高级层提供审计日志和策略包
