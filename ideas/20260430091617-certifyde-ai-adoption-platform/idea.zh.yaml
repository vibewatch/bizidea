jobsToBeDone:
  - job: 当团队赶着在截止日前写 RFP 回复时，帮助提案经理引导员工使用获批的 AI 提示词和复核流程，好在不增加合规风险的前提下把吞吐量提上去
    currentAlternative: 人工复核加 wiki 版提示词指引
    successMetric: 使用获批 AI 工作流产出的提案内容占比提升，且复核例外更少
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 四个已核验、发生在窗口期内的来源都一致把浏览器层 AI 落地描述成一个真实且有融资支撑的品类。
  painIntensity:
    score: 4
    rationale: rollout 失败会同时带来许可 ROI 流失、安全焦虑和受监管团队提案产出变慢。
  wedgeClarity:
    score: 5
    rationale: 浏览器扩展是个很干脆的入口，能绕开沉重的系统集成。
  defensibility:
    score: 4
    rationale: 工作流遥测、政策包和采用数据会持续复利，而且这些能力恰好贴合通用工具服务不好的受监管垂直场景。
  ventureScale:
    score: 4
    rationale: 滩头本身不宽，但同一套控制层可以扩展进更多受监管知识工作职能和大型企业。
topRisks:
  - name: 平台挤压
    description: 浏览器厂商、Microsoft 或核心 AI 套件可能补上原生采用与政策功能，把切口压窄。
    mitigation: 先把重心放在跨应用工作流控制、受监管模板和更深的审计能力上——这些都不是单一套件厂商的强项。
  - name: 安全审查阻力
    description: 联邦承包商可能会对一个能观察敏感工作流的浏览器扩展天然犹豫。
    mitigation: 从最小化数据留存做起，提供 on-prem 或 VPC 部署选项，并明确把日志控制权交给管理员。
  - name: ROI 看起来不够硬
    description: 如果价值只被讲成“培训做得更好了”，买方很可能把采用工具视为可有可无。
    mitigation: 试点必须绑定能量化的提案周期指标、合规例外下降和企业 AI 许可利用率。