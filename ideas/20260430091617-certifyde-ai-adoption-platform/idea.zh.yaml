problem: >-
  大多数企业在推进 ChatGPT Enterprise 或 Copilot 落地时，才发现真正的失效点不在模型质量，而在浏览器里的员工行为。员工在门户、文档、邮件和内部工具之间来回切换，却并不知道哪些提示词被批准、哪些数据能共享、管理层又会如何衡量安全使用。在受监管团队里，这种不确定性会直接扼杀采用，把工作重新推回手工起草、复制粘贴式操作手册和 shadow AI。
targetUser:
  primary: 正在把企业 AI 推给 200-2,000 名知识工作者的中型联邦 IT 与国防承包商中的投标运营负责人
  secondary: 同一组织内的 AI 治理负责人，以及安全/合规经理
  buyer: CIO、Chief Digital Officer，或 VP of Proposal Operations
startupThesis:
  nonObviousInsight: 企业 AI 缺的并不是又一个模型或聊天机器人界面，而是一层浏览器原生的运行层，把已批准的提示词、策略护栏和审计轨迹直接嵌进员工跨 Web 应用的实际工作里。
  beachhead: 使用浏览器式采购门户，并通过 Microsoft 365 或 Google Workspace 在严格审查规则下撰写 RFP 响应、statement of work 与合同变更的联邦承包商
  wedge: 一个浏览器扩展，能够识别工作流上下文、推荐获批的 prompt pack、阻止高风险数据处理，并记录人工复核，让投标团队不用改现有应用也能安全使用 AI
  whyNowCatalyst: 多个时间窗内来源都在描述一个已获融资、以浏览器扩展为切口、瞄准企业与政府 AI rollout 的方案，这说明“使用现场的采用控制”已经成了紧迫且能拿到预算的品类。
  ventureScalePath: 先从投标与文档密集型的受监管工作流切入，再扩展到法务、公共部门运营、客服，以及所有基于浏览器的知识工作流中的企业级 AI 治理分析。
solution: >-
  这个产品是一层面向受监管知识工作的浏览器原生 AI rollout 层。它覆盖采购门户、共享文档、邮件和内部 Web 应用，在工作的当下提供按角色定制的提示词模板、强制引用格式、脱敏检查和审批步骤。管理员可以按合同类型或客户发布获批操作手册，管理者则能拿到与真实工作流绑定的采用、风险和结果分析，而不是只看到培训完成率。随着时间推移，这套系统会变成一块控制平面：谁能在什么场景下使用哪些 AI 工具，以及是否留下了人工复核证据，都由它来定义。
goToMarketSeed:
  firstCustomer: 拥有 500-3,000 名员工、设有活跃投标台席、正在推进企业 AI 许可证 rollout，并在民用和国防机构中持续有 RFP 需求的联邦 IT 承包商
  buyingTrigger: 企业 AI rollout 或续约暴露出实际使用率偏低、输出不一致，或在投标和合同起草流程中出现合规担忧
  currentAlternative: PDF 政策、LMS 培训、人工经理复核、放在 wiki 里的提示词库，以及安全团队的一刀切限制
  switchingReason: 浏览器扩展比面向单一工作流的集成或内部自研部署更快，能直接进入员工现有工具，并在同一层里同时提供可度量的采用效果与策略执行能力
  pricingHypothesis: 按受治理知识工作者人数或活跃投标席位收费的年度 SaaS 订阅；审计日志与策略包作为高级版本加价
whyNow:
  - point: 企业已经开始为 AI 采用这一层软件单独买单，而不再把它视作一次性的培训项目。
    signalRefs: [AI 采用已经成了有预算的痛点]
    sourceRefs: [1, 4]
  - point: 浏览器扩展路线之所以刚变得可信，是因为团队需要的是跨多个 Web 应用的统一控制点，而不是对每个工具做深度集成。
    signalRefs: [浏览器层切口正在成形]
    sourceRefs: [3]
  - point: 把政府和企业都纳入目标，说明首批买家会是受监管组织；在这些地方，AI rollout 失败会直接带来合规和收入后果。
    signalRefs: [受监管买家已经进入范围]
    sourceRefs: [2]
  - point: 市场正在从“给到 AI 访问权限”转向“把 AI 真正跑起来”，这让能把零散试验变成可复制工作流的产品变得紧迫。
    signalRefs: [员工需要的不只是访问权限，而是规模化落地]
    sourceRefs: [1, 3, 4]
differentiator: >-
  大多数 AI 采用产品停在培训内容或仪表盘分析，治理工具则更多盯着平台边缘的模型访问。这家公司真正能赢的地方，在于它控制的是浏览器里的工作现场——员工正是在那里决定要不要用 AI、贴什么内容、是否遵守策略。由此形成的专有数据资产，会沉淀出按工作流划分的提示词有效性、采用瓶颈和人工复核模式，这些都不是通用培训厂商或安全工具能轻易复制的。
