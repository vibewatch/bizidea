problem: >-
  大多数企业在部署 ChatGPT Enterprise 或 Copilot 后，很快会发现真正掉链子的不是模型质量，而是员工在浏览器里的实际行为。大家在门户网站、文档、邮件和内部工具之间来回切换，却不知道哪些提示词获批、哪些数据能发、管理者又会怎么判断“安全使用”。对受监管团队来说，这种不确定性会直接压垮采用率，把工作重新推回人工起草、复制粘贴版操作手册和影子 AI。
targetUser:
  primary: 正在向 200-2,000 名知识工作者推广企业 AI 的中型联邦 IT 与国防承包商中的提案运营负责人
  secondary: 同一类组织里的 AI 治理负责人，以及安全与合规经理
  buyer: CIO、首席数字官，或提案运营副总裁
startupThesis:
  nonObviousInsight: 企业 AI 真正缺的不是另一套模型或聊天界面，而是一层浏览器原生操作层，能把获批提示词、政策护栏和审计轨迹直接塞进员工已在用的各类 Web 工作流里。
  beachhead: 使用浏览器采购门户、Microsoft 365 或 Google Workspace，在严格审查规则下撰写 RFP 回复、工作说明书和合同修改文件的联邦承包商
  wedge: 一个浏览器扩展，能识别工作流上下文、推荐获批提示词包、拦截高风险数据处理，并记录人工复核，让提案团队不改既有应用也能安全用上 AI
  whyNowCatalyst: 时间窗口内的多条来源都描述了一个已获融资、以浏览器扩展切入企业和政府 AI 落地的产品，这验证了“在使用现场做控制”已成为紧迫且有人愿意拨预算的品类。
  ventureScalePath: 先从提案和重文档的受监管工作流切进去，再扩展到法务、公共部门运营、客服，以及所有基于浏览器的知识工作流中的企业级 AI 治理分析。
solution: >-
  这款产品是一层面向受监管知识工作的浏览器原生 AI 落地层。它覆盖采购门户、协作文档、邮件和内部 Web 应用，在员工真正干活的那一刻提供按角色分配的提示词模板、强制引用格式、脱敏检查和审批步骤。管理员可以按合同类型或客户发布获批操作手册，经理则能看到与真实工作流绑定的采用、风险和结果分析，而不是只看培训完成率。时间一长，这套系统会成为一块控制面板：谁能在什么场景下用哪种 AI 工具、是否有人做过人工复核、能拿出什么证据，全部在这里说清楚。
goToMarketSeed:
  firstCustomer: 一家拥有 500-3,000 名员工、设有活跃提案团队、已在推广企业 AI 许可、并持续面对民用与国防机构 RFP 的联邦 IT 承包商
  buyingTrigger: 企业 AI rollout 或续约暴露出真实使用率低、输出不一致，或提案与合同起草流程中的合规顾虑
  currentAlternative: PDF 政策、LMS 培训、经理人工复核、wiki 里的提示词库，以及安全团队的一刀切限制
  switchingReason: 浏览器扩展比按工作流逐个做集成或内部自研更快发布，能直接嵌进既有工具里，还能把能量化采用和政策执行放进同一层里交付给管理层
  pricingHypothesis: 按受治理知识工作者或活跃提案席位收取年度 SaaS 订阅费，审计日志和政策包作为高级版本加价
whyNow:
  - point: 企业现在愿意为 AI 落地单独采购软件，而不再把它当成一次性培训任务。
    signalRefs: ["AI 落地已成了单独列预算的问题"]
    sourceRefs: [1, 4]
  - point: 浏览器扩展这条路现在开始可信，因为团队需要一个能横跨多种 Web 应用的统一控制点，而不是为每个工具都做深集成。
    signalRefs: ["浏览器层切口开始成形"]
    sourceRefs: [3]
  - point: 产品直接瞄准政府和企业，说明最早付费的一批客户就是那些一旦 AI rollout 失败，就会同时伤到合规和收入的受监管组织。
    signalRefs: ["强监管买方已进场"]
    sourceRefs: [2]
  - point: 市场正在从“给 AI 访问权限”转向“把 AI 真正规模化”，这让能把零散试验成为能重复工作流的产品一下子变得更急迫。
    signalRefs: ["团队缺的不是访问权限，而是规模化落地能力"]
    sourceRefs: [1, 3, 4]
differentiator: >-
  大多数 AI 落地产品做到培训内容或仪表盘分析就停了，治理工具也多半只盯平台边缘的模型访问控制。这家公司能赢，是因为它直接控制浏览器里的工作现场——员工正是在这里决定要不要用 AI、粘贴什么内容、会不会照着政策做。这样一来，公司会逐步积累一份专有数据资产：哪些提示词在特定工作流里真能提升效果、哪里最容易挡住采用、人工复核通常怎么发生。对通用培训厂商和安全工具来说，这类数据很难补课。
