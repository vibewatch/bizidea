scenarios:
  downside:
    description: 安全审查摩擦加剧、席位数偏软，导致交易向右推迟且平均合同规模下降。
    y3RevenueK: 1964.3
    y3EbitdaK: -1409.5
    cashLowPointK: -632.8
    keyAssumptionChanges:
    - 第 3 年年末客户数从 24 家降至 18 家。
    - 随着部署起点更小，平均 ACV 下滑 10% 至 $162K。
    - 由于服务和合规支持仍较重，毛利率降至 72%。
  base:
    description: 创始人主导销售在第 1 年转化 2 家客户，到第 24 个月达到 8 个 logo，并在第 36 个月达到 24 个 logo，ACV 为 $180K。
    y3RevenueK: 2790.0
    y3EbitdaK: -806.4
    cashLowPointK: 97.0
    keyAssumptionChanges:
    - 无变化；这与上方经营模型一致。
  upside:
    description: 更强的席位扩展和更快的试点转化，在不成比例增加 opex 的情况下抬升收入。
    y3RevenueK: 3440.3
    y3EbitdaK: -309.8
    cashLowPointK: 697.9
    keyAssumptionChanges:
    - 第 3 年年末客户数从 24 家升至 26 家。
    - 因受管控用户部署规模更大，平均 ACV 上升 10% 至 $198K。
    - 随着实施变得更可复制，毛利率提升至 77%。
sensitivity:
- variable: ARPU
  downsideCase: 随着初始部署维持在约 180 名受管控用户，平均 ACV 下滑至 $162K。
  baseCase: 平均 ACV 在 200 名受管控用户基础上维持 $180K。
  upsideCase: 随着更多账户落在 220 名受管控用户，平均 ACV 上升至 $198K。
  y3RevenueImpactK: -279.0
  cashImpactK: -209.3
- variable: CAC
  downsideCase: 随着付费试点转化变慢且创始人时间占用更高，CAC 上升至约 $80K。
  baseCase: 在精瘦企业销售动作下，CAC 维持在约 $61.7K。
  upsideCase: 随着口碑和合作伙伴改善转化，CAC 降至约 $50K。
  y3RevenueImpactK: -472.5
  cashImpactK: -315.0
- variable: churn
  downsideCase: 若部分试点在第 1 年后无法扩展，月度毛流失升至 2.5%。
  baseCase: 月度毛流失维持在 1.5%。
  upsideCase: 在工作流深度嵌入的情况下，月度毛流失降至 1.0%。
  y3RevenueImpactK: -180.0
  cashImpactK: -135.0
- variable: sales cycle
  downsideCase: 由于 CISO 审查拖慢部署，平均销售周期从约 6 个月拉长到 9 个月。
  baseCase: 针对合格承包商账户，销售周期维持在约 6 个月。
  upsideCase: 借助可复制安全材料包，销售周期压缩到约 4-5 个月。
  y3RevenueImpactK: -472.5
  cashImpactK: -354.4
- variable: gross margin
  downsideCase: 由于部署支持仍高度高接触，毛利率维持在 72%。
  baseCase: 毛利率达到计划中的 75%。
  upsideCase: 随着策略包和导入流程标准化，毛利率提升至 77%。
  y3RevenueImpactK: 0.0
  cashImpactK: -83.7
- variable: hiring pace
  downsideCase: 公司将 2 个 GTM 和工程岗位的招聘时间较计划提前一个季度。
  baseCase: 招聘节奏按上方季度爬坡执行。
  upsideCase: 在转化证据更加明确前，有 2 个岗位推迟一个季度招聘。
  y3RevenueImpactK: 0.0
  cashImpactK: -210.0
modelDiagram:
  title: 单元经济流转
  mermaid: "flowchart LR\n  Leads[线索] --> Pilots[试点]\n  Pilots --> AnnualCustomers[年度客户]\n  AnnualCustomers --> Expansion[扩展]\n  AnnualCustomers --> Revenue[收入]\n  Expansion --> Revenue\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景由达到 24 家承包商客户、每家约 $180K ACV 驱动，而不是依赖夸张的单席位定价或快速自助增长。
- checkName: 必须成立的前提
  finding: 安全审查和预算归属必须足够顺畅，才能在第 12 个月前转化 2 个试点，并在第 24 个月前达到 8 家年度客户。
- checkName: 模型失效条件
  finding: 更长的销售周期或更小的初始部署规模，都可能像 downside 情景和敏感性表展示的那样，在下一轮融资前把现金推到零以下。
- checkName: 下一轮融资证明
  finding: 当公司在受监管账户中展示出 8 个付费 logo、第二工作流扩展，以及可复制的低于 6 个月 CAC 回收期时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: 第 3 年增长率 244.4% + EBITDA 利润率 -28.9% = 215.5%；增长方向很强，但仍处于效率前阶段。
  burnMultiple: 第 3 年 burn multiple 为 0.3x，以 $0.8M EBITDA burn 对应 $2.9M 净新增 ARR；纸面上很漂亮，但被较低起始基数所美化。
  revenuePerFte: 按平均 FTE 计算，第 3 年人均收入为 $214.6K（企业 SaaS 基准约为 $200-400K）。
  flags:
  - 模型假设前两笔年度转化会在 12 个月内完成，尽管扩展审批是计划中最高的部署风险。
  - 毛利率从一开始就固定在 75% 目标；如果导入表现更像服务业务，现金需求会迅速上升。
  - 融资规模成立的前提是公司一开始已有约 $300K 现金；没有这层缓冲，同样的计划就需要更大一轮融资。
