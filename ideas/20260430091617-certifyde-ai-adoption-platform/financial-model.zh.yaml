scenarios:
  downside:
    description: 安全审查摩擦加大、席位数偏软，会把交易往后推并压低平均合同额。
    y3RevenueK: 1964.3
    y3EbitdaK: -1409.5
    cashLowPointK: -632.8
    keyAssumptionChanges:
      - 第 3 年年末客户数从 24 家降到 18 家。
      - 平均 ACV 下滑 10% 至 $162K，因为初始部署规模更小。
      - 由于服务与合规支持更重，毛利率降到 72%。
  base:
    description: 创始人亲自打单在第 1 年转成 2 个客户，到第 24 个月达到 8 个 logo，并在第 36 个月以 $180K ACV 达到 24 个客户。
    y3RevenueK: 2790.0
    y3EbitdaK: -806.4
    cashLowPointK: 97.0
    keyAssumptionChanges:
      - 无变化；这一情景与上方经营模型完全一致。
  upside:
    description: 席位扩张更强、试点转化更快，在不同比例增加 opex 的前提下把收入抬高。
    y3RevenueK: 3440.3
    y3EbitdaK: -309.8
    cashLowPointK: 697.9
    keyAssumptionChanges:
      - 第 3 年年末客户数从 24 家升到 26 家。
      - 因为单个账户的受治理用户部署更大，平均 ACV 提升 10% 至 $198K。
      - 随着实施更可复制，毛利率提高到 77%。
sensitivity:
  - variable: ARPU
    downsideCase: 平均 ACV 滑到 $162K，因为初始部署更接近 180 名受治理用户。
    baseCase: 平均 ACV 保持在 $180K，对应 200 名受治理用户。
    upsideCase: 平均 ACV 提升到 $198K，因为更多账户落在 220 名受治理用户。
    y3RevenueImpactK: -279.0
    cashImpactK: -209.3
  - variable: CAC
    downsideCase: 由于付费试点转化更慢且创始人投入时间更重，CAC 升到约 $80K。
    baseCase: 在精简企业销售动作下，CAC 稳在约 $61.7K。
    upsideCase: 随着客户口碑和伙伴带来更好转化，CAC 降到约 $50K。
    y3RevenueImpactK: -472.5
    cashImpactK: -315.0
  - variable: churn
    downsideCase: 若部分试点在第 1 年后无法继续扩容，月度毛流失率会升到 2.5%。
    baseCase: 月度毛流失率维持在 1.5%。
    upsideCase: 若工作流嵌入够深，月度毛流失率可降到 1.0%。
    y3RevenueImpactK: -180.0
    cashImpactK: -135.0
  - variable: sales cycle
    downsideCase: 因为 CISO 审查拖慢部署，平均销售周期会从约 6 个月拉长到 9 个月。
    baseCase: 合格承包商账户的销售周期维持在约 6 个月。
    upsideCase: 随着安全材料包可复制，销售周期可压到 4-5 个月。
    y3RevenueImpactK: -472.5
    cashImpactK: -354.4
  - variable: gross margin
    downsideCase: 因为部署支持持续高触达，毛利率只能维持在 72%。
    baseCase: 毛利率达到计划中的 75%。
    upsideCase: 随着政策包和 onboarding 标准化，毛利率升到 77%。
    y3RevenueImpactK: 0.0
    cashImpactK: -83.7
  - variable: hiring pace
    downsideCase: 公司会比计划提前一个季度多招 2 个 GTM 和工程岗位。
    baseCase: 招聘节奏按上面的季度爬坡执行。
    upsideCase: 在转化证明到位前，有 2 个岗位顺延一个季度再招。
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> AnnualCustomers
      AnnualCustomers --> Expansion
      AnnualCustomers --> Revenue
      Expansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景的核心驱动，是做到 24 家承包商客户、平均约 $180K ACV，而不是假设过高的单席位定价或快速自助增长。
  - checkName: 必须成立的前提
    finding: 安全审查和预算归口至少要顺到足以在第 12 个月前转正 2 个试点，并在第 24 个月前做到 8 家年度客户。
  - checkName: 模型会在哪些地方断掉
    finding: 如果销售周期更长，或初始部署更小，现金会在下一轮融资前跌破零点；这一点已在 downside 情景和敏感性表里体现。
  - checkName: 下一轮融资证明点
    finding: 只要公司能拿出 8 个付费 logo、第二工作流扩展，以及在受监管账户中可复制的 6 个月以内 CAC 回本，它就有资格启动下一轮融资。
sanityChecks:
  ruleOf40: 第 3 年增长率 244.4% + EBITDA 利润率 -28.9% = 215.5%；增长方向很强，但离效率型公司还早。
  burnMultiple: 以 $0.8M EBITDA burn 对应 $2.9M 净新增 ARR 计算，第 3 年 burn multiple 约 0.3x；纸面上很漂亮，但也被较低起始基数美化了。
  revenuePerFte: 第 3 年平均每名 FTE 对应 $214.6K 收入（可对照企业 SaaS 大致 $200-400K 的 benchmark）。
  flags:
    - 模型假设前两个年度转化会在 12 个月内发生，而扩展审批恰恰是整份计划里最高的部署风险。
    - 毛利率从一开始就按 75% 目标值处理；如果 onboarding 更像服务项目，现金需求会迅速抬高。
    - 当前融资额之所以够用，是因为公司起步时假设已有约 $300K 现金；少了这层垫子，同样计划就需要更大一轮融资。