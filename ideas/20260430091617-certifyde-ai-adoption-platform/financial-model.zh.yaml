slug: compliant-ai-rollout-layer
date: '2026-04-30'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-05'
    unit: month
    source: '[BP date] 模型从 2026-04-30 商业计划日期的下一个月开始。'
  - id: A2
    name: 新一轮融资前的期初现金
    value: '300'
    unit: USD K
    source: '[Startup-finance heuristic: founder capital / SAFEs] 假设在种子轮前，公司账上已有较为克制的 pre-seed 现金。'
  - id: A3
    name: 模型起始时点的种子轮到账金额
    value: '3200'
    unit: USD K
    source: '[BP fundingAsk] 融资目标区间是 $2-4M；模型取 $3.2M，以覆盖下一个里程碑并留出 6 个月缓冲。'
  - id: A4
    name: 每个活跃客户的平均受治理用户数
    value: '200'
    unit: users per customer
    source: '[BP investorMemo, BP gtm pricing, Research bottomUpSizingDrivers] 初始部署规模低于 250 用户的 SOM 情景，但仍落在计划中的 100-250 名受治理用户区间。'
  - id: A5
    name: 每位受治理用户的 ARR
    value: '0.9'
    unit: USD K per user per year
    source: '[BP gtm pricing, Research bottomUpSizingDrivers] 两份文件都把定价锚在每位受治理用户约 $900 ARR。'
  - id: A6
    name: 每个客户的混合年合同价值
    value: '180'
    unit: USD K per customer per year
    source: '[Derived from A4 × A5] 200 名受治理用户 × 每用户 $0.9K ARR = $180K ACV。'
  - id: A7
    name: 新客户签约当月确认的收入比例
    value: '50'
    unit: percent
    source: '[Startup-finance heuristic: enterprise SaaS bookings ramp] 新 logo 在签约当期只贡献半个月收入。'
  - id: A8
    name: 毛利率
    value: '75'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] 计划里明确把目标毛利率写为 75%。'
  - id: A9
    name: 第 1 年年末净付费客户数
    value: '2'
    unit: customers
    source: '[BP milestones 0-12 months] 模型假设到第 12 个月有 2 个试点转成年费合同。'
  - id: A10
    name: 第 2 年年末净付费客户数
    value: '8'
    unit: customers
    source: '[BP milestones 12-24 months] 计划要求到第 24 个月达到 5-8 个年度 logo；模型取上限 8 个。'
  - id: A11
    name: 第 3 年年末净付费客户数
    value: '24'
    unit: customers
    source: '[BP milestones 24-36 months, Research market.som] 里程碑写的是到第 36 个月达到 20-25 个客户；模型取 24 个，略低于 25 客户的 SOM 情景。'
  - id: A12
    name: 用于单位经济测算的月度总 logo 流失率
    value: '1.5'
    unit: percent
    source: '[Startup-finance heuristic: early enterprise vertical SaaS] 只用于 LTV 计算；客户数爬坡本身已反映净新增。'
  - id: A13
    name: 创始人/总经理的全额现金薪酬
    value: '110'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage founder cash comp] 适用于资本效率导向种子阶段公司的保守现金工资。'
  - id: A14
    name: 工程岗位的全额现金薪酬
    value: '175'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage NYC engineering comp] 含薪资税与福利。'
  - id: A15
    name: 产品岗位的全额现金薪酬
    value: '160'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage product lead comp] 含薪资税与福利。'
  - id: A16
    name: 安全/合规岗位的全额现金薪酬
    value: '160'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: early compliance lead comp] 反映承包商安全审查所需的专门岗位。'
  - id: A17
    name: 解决方案 / 客户成功岗位的全额现金薪酬
    value: '135'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: enterprise solutions engineer / CS comp] 含薪资税与福利。'
  - id: A18
    name: 销售岗位的全额现金薪酬
    value: '180'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage enterprise AE OTE] 假设在放大 GTM 团队前，采用精简 OTE。'
  - id: A19
    name: G&A / 运营岗位的全额现金薪酬
    value: '100'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: startup ops / finance admin comp] 含薪资税与福利。'
  - id: A20
    name: R&D 非薪资支出区间
    value: '10-30'
    unit: USD K per month
    source: '[Startup-finance heuristic: cloud, dev tools, compliance tooling] 随着 MVP 构建到更广产品和分析支持逐步增加。'
  - id: A21
    name: 销售与市场非薪资支出区间
    value: '8-30'
    unit: USD K per month
    source: '[Startup-finance heuristic: travel, events, outbound tools, partner development] 从创始人主导销售逐步扩展到小规模企业 GTM。'
  - id: A22
    name: G&A 非薪资支出区间
    value: '12-24'
    unit: USD K per month
    source: '[Startup-finance heuristic: legal, insurance, audit, office and admin] 随着客户数和合规义务提升而上升。'
  - id: A23
    name: 下一轮融资里程碑
    value: '8 customers plus 2 workflow expansions by month 24'
    unit: milestone
    source: '[BP milestones 12-24 months] 本轮融资规模按到达该节点并保留约 6 个月现金缓冲来设计。'
