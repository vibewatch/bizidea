scenarios:
  downside:
    description: 安全审查阻力和更弱的 seat 数量，把交易向后推，并压低平均合同规模。
    y3RevenueK: 1964.3
    y3EbitdaK: -1409.5
    cashLowPointK: -632.8
    keyAssumptionChanges:
      - 第 3 年年末客户数从 24 个降到 18 个。
      - 平均 ACV 下滑 10% 至 $162K，因为初始部署更小。
      - 毛利率降到 72%，因为服务和合规支持持续更重。
  base:
    description: 创始人主导销售在第 1 年转化 2 个客户，到第 24 个月达到 8 个 logo，并在第 36 个月达到 24 个、平均 ACV 为 $180K 的客户。
    y3RevenueK: 2790.0
    y3EbitdaK: -806.4
    cashLowPointK: 97.0
    keyAssumptionChanges:
      - 无变化；这就是上方经营模型本身。
  upside:
    description: 更强的 seat 扩张与更快的试点转化，在不明显增加 opex 的前提下抬高收入。
    y3RevenueK: 3440.3
    y3EbitdaK: -309.8
    cashLowPointK: 697.9
    keyAssumptionChanges:
      - 第 3 年年末客户数从 24 个提升到 26 个。
      - 平均 ACV 提高 10% 至 $198K，因为受治理用户部署规模更大。
      - 毛利率提升到 77%，因为实施更可复制。
sensitivity:
  - variable: ARPU
    downsideCase: 随着初始部署保持在约 180 名受治理用户，平均 ACV 下滑到 $162K。
    baseCase: 在 200 名受治理用户规模下，平均 ACV 保持 $180K。
    upsideCase: 随着更多账户落在 220 名受治理用户，平均 ACV 升到 $198K。
    y3RevenueImpactK: -279.0
    cashImpactK: -209.3
  - variable: CAC
    downsideCase: 由于付费试点转化更慢，且创始人时间投入更重，CAC 升至约 $80K。
    baseCase: 在精简型企业销售动作下，CAC 维持在约 $61.7K。
    upsideCase: 随着口碑和伙伴提升转化，CAC 降到约 $50K。
    y3RevenueImpactK: -472.5
    cashImpactK: -315.0
  - variable: churn
    downsideCase: 一些试点在第 1 年后未能扩展，月度总流失率上升到 2.5%。
    baseCase: 月度总流失率保持 1.5%。
    upsideCase: 由于工作流嵌入更深，月度总流失率下降到 1.0%。
    y3RevenueImpactK: -180.0
    cashImpactK: -135.0
  - variable: sales cycle
    downsideCase: 由于 CISO 审查拖慢部署，平均销售周期从约 6 个月拉长到 9 个月。
    baseCase: 合格承包商账户的销售周期维持在约 6 个月。
    upsideCase: 随着安全材料包可复制，销售周期压缩到 4-5 个月。
    y3RevenueImpactK: -472.5
    cashImpactK: -354.4
  - variable: gross margin
    downsideCase: 因为部署支持持续高触达，毛利率停在 72%。
    baseCase: 毛利率达到计划中的 75%。
    upsideCase: 随着策略包和 onboarding 标准化，毛利率升到 77%。
    y3RevenueImpactK: 0.0
    cashImpactK: -83.7
  - variable: hiring pace
    downsideCase: 公司比计划提前一个季度招聘 2 个 GTM 与工程岗位。
    baseCase: 招聘按上述季度爬坡执行。
    upsideCase: 在转化证明更明确之前，有 2 个岗位顺延一个季度再招。
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> AnnualCustomers
      AnnualCustomers --> Expansion
      AnnualCustomers --> Revenue
      Expansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: 基准情景建立在 24 个承包商 logo、每个约 $180K ACV 的前提上，而不是建立在夸张的单席位定价或快速自助增长上。
  - checkName: 必须成立的前提
    finding: 安全审查和预算归属必须足够顺畅，才能在第 12 个月前转化 2 个试点，并在第 24 个月前达到 8 个年度客户。
  - checkName: 模型会失效的情形
    finding: 更长的销售周期或更小的初始部署，都会像 downside 情景和敏感性表显示的那样，在下一轮融资前把现金压到零以下。
  - checkName: 下一轮证明点
    finding: 只要公司能证明 8 个付费 logo、第二工作流扩展，以及在受监管账户中可重复实现低于 6 个月的 CAC 回本，就有理由进入下一轮融资。
sanityChecks:
  ruleOf40: 第 3 年增长率 244.4% + EBITDA 利润率 -28.9% = 215.5%；方向上增长很强，但仍处在效率前阶段。
  burnMultiple: 以 $0.8M EBITDA burn 对应 $2.9M 净新增 ARR 计算，第 3 年 burn multiple 为 0.3x；纸面上很漂亮，但也被很低的起始基数美化了。
  revenuePerFte: 第 3 年平均每名 FTE 对应 $214.6K 收入（企业 SaaS 的参考区间通常约为 $200-400K）。
  flags:
    - 模型假设前两个年度合同会在 12 个月内完成转化，即便扩展审批是全盘计划里最大的部署风险。
    - 毛利率从一开始就按 75% 目标持平；如果 onboarding 更像服务项目，现金需求会迅速上升。
    - 这轮融资之所以够用，是因为公司一开始就假设账上已有约 $300K 现金；如果没有这层缓冲，同样计划需要更大的融资额。
