slug: compliant-ai-rollout-layer
date: '2026-04-30'
currency: USD
modelStartMonth: '2026-05'
assumptions:
  - id: A1
    name: 模型起始月份
    value: '2026-05'
    unit: month
    source: '[BP date] 模型从 2026-04-30 商业计划日期的次月启动。'
  - id: A2
    name: 新融资前的期初现金
    value: '300'
    unit: USD K
    source: '[Startup-finance heuristic: founder capital / SAFEs] 假设种子轮前，银行账上已有一笔规模不大的 pre-seed 现金。'
  - id: A3
    name: 模型起始时到账的种子轮融资
    value: '3200'
    unit: USD K
    source: '[BP fundingAsk] 种子轮目标区间是 $2-4M；模型取 $3.2M，用来覆盖下一个里程碑并预留 6 个月缓冲。'
  - id: A4
    name: 每个发布客户的平均受治理用户数
    value: '200'
    unit: users per customer
    source: '[BP investorMemo, BP gtm pricing, Research bottomUpSizingDrivers] 初期部署按低于 SOM 情景下 250 用户的口径建模，但仍落在计划里 100-250 名受治理用户的区间内。'
  - id: A5
    name: 每名受治理用户的 ARR
    value: '0.9'
    unit: USD K per user per year
    source: '[BP gtm pricing, Research bottomUpSizingDrivers] 两份文件都把定价锚在每名受治理用户约 $900 ARR。'
  - id: A6
    name: 每个客户的混合年合同价值
    value: '180'
    unit: USD K per customer per year
    source: '[Derived from A4 × A5] 200 名受治理用户 × 每名用户 $0.9K ARR = $180K ACV。'
  - id: A7
    name: 新客户在签约当月确认的收入比例
    value: '50'
    unit: percent of monthly run-rate
    source: '[Startup-finance heuristic: enterprise SaaS bookings ramp] 新 logo 在成单当期按半个月收入计入。'
  - id: A8
    name: 毛利率
    value: '75'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] 计划里明确把目标毛利率写成 75%。'
  - id: A9
    name: 第 1 年年末净付费客户数
    value: '2'
    unit: customers
    source: '[BP milestones 0-12 months] 模型假设到第 12 个月有 2 个试点转成年度付费合同。'
  - id: A10
    name: 第 2 年年末净付费客户数
    value: '8'
    unit: customers
    source: '[BP milestones 12-24 months] 计划要求到第 24 个月达到 5-8 个年度 logo；模型取区间上沿 8 个。'
  - id: A11
    name: 第 3 年年末净付费客户数
    value: '24'
    unit: customers
    source: '[BP milestones 24-36 months, Research market.som] 里程碑写的是到第 36 个月 20-25 个客户；模型取 24 个，略低于 25 个客户的 SOM 情景。'
  - id: A12
    name: 用于单位经济的月度毛 logo 流失率
    value: '1.5'
    unit: percent
    source: '[Startup-finance heuristic: early enterprise vertical SaaS] 仅用于 LTV 计算；客户数量爬坡本身已反映净新增。'
  - id: A13
    name: 创始人 / GM 的全包现金薪酬
    value: '110'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage founder cash comp] 偏保守的种子阶段创始人现金薪资。'
  - id: A14
    name: 工程岗位的全包现金薪酬
    value: '175'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage NYC engineering comp] 已包含工资税和福利。'
  - id: A15
    name: 产品岗位的全包现金薪酬
    value: '160'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage product lead comp] 已包含工资税和福利。'
  - id: A16
    name: 安全 / 合规岗位的全包现金薪酬
    value: '160'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: early compliance lead comp] 反映承包商安全审查场景下必需的专业岗位。'
  - id: A17
    name: 解决方案 / 客户成功岗位的全包现金薪酬
    value: '135'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: enterprise solutions engineer / CS comp] 已包含工资税和福利。'
  - id: A18
    name: 销售岗位的全包现金薪酬
    value: '180'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage enterprise AE OTE] 假设在 GTM 团队成型前，仍保持精简的 OTE 水平。'
  - id: A19
    name: G&A / 运营岗位的全包现金薪酬
    value: '100'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: startup ops / finance admin comp] 已包含工资税和福利。'
  - id: A20
    name: 研发非人力支出区间
    value: '10-30'
    unit: USD K per month
    source: '[Startup-finance heuristic: cloud, dev tools, compliance tooling] 会随 MVP 构建到更广产品与分析支持逐步上升。'
  - id: A21
    name: 销售与市场非人力支出区间
    value: '8-30'
    unit: USD K per month
    source: '[创业财务经验值：差旅、活动、定向触达工具、伙伴拓展] 随创始人亲自打单逐步扩成一个小型企业 GTM 动作。'
  - id: A22
    name: G&A 非人力支出区间
    value: '12-24'
    unit: USD K per month
    source: '[Startup-finance heuristic: legal, insurance, audit, office and admin] 随客户数和合规义务增加而上升。'
  - id: A23
    name: 下一轮融资里程碑
    value: 24 个月内达到 8 个客户，并在 2 个账户里完成第二工作流扩展
    unit: milestone
    source: '[BP milestones 12-24 months] 当前融资额按达到这一节点并额外预留约 6 个月现金缓冲来设计。'
