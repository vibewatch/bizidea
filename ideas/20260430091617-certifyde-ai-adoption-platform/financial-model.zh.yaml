slug: compliant-ai-rollout-layer
date: '2026-04-30'
currency: USD
modelStartMonth: 2026-05
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-05
  unit: month
  source: '[BP date] 模型从 2026-04-30 商业计划日期后的次月启动。'
- id: A2
  name: 新一轮融资前的期初现金
  value: '300'
  unit: USD K
  source: '[创业财务经验法则：创始人资金 / SAFEs] 假设在种子轮前，银行中已有适度的 pre-seed 现金。'
- id: A3
  name: 模型起始时到账的种子轮融资
  value: '3200'
  unit: USD K
  source: '[BP fundingAsk] 种子轮目标区间为 $2-4M；模型采用 $3.2M，用于覆盖下一里程碑并预留 6 个月缓冲。'
- id: A4
  name: 每个正式客户的平均受管控用户数
  value: '200'
  unit: users per customer
  source: '[BP investorMemo, BP gtm pricing, Research bottomUpSizingDrivers] 初始部署按低于 250 用户 SOM 情景建模，但仍位于计划中的 100-250 名受管控用户区间内。'
- id: A5
  name: 每名受管控用户的 ARR
  value: '0.9'
  unit: USD K per user per year
  source: '[BP gtm pricing, Research bottomUpSizingDrivers] 两份文件都把定价锚定在每名受管控用户约 $900 ARR。'
- id: A6
  name: 每个客户的混合年度合同价值
  value: '180'
  unit: USD K per customer per year
  source: '[Derived from A4 × A5] 200 名受管控用户 × 每名用户 $0.9K ARR = $180K ACV。'
- id: A7
  name: 新客户在成交当月的收入确认比例
  value: '50'
  unit: percent of monthly run-rate
  source: '[创业财务经验法则：企业 SaaS 预订爬坡] 新 logo 在成交当期按半个月收入贡献计算。'
- id: A8
  name: 毛利率
  value: '75'
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct] 计划明确把毛利率目标设为 75%。'
- id: A9
  name: 第 1 年年末净付费客户数
  value: '2'
  unit: customers
  source: '[BP milestones 0-12 months] 模型假设到第 12 个月有 2 个试点转为年度合同。'
- id: A10
  name: 第 2 年年末净付费客户数
  value: '8'
  unit: customers
  source: '[BP milestones 12-24 months] 计划要求到第 24 个月达到 5-8 个年度客户；模型采用该区间上限。'
- id: A11
  name: 第 3 年年末净付费客户数
  value: '24'
  unit: customers
  source: '[BP milestones 24-36 months, Research market.som] 里程碑要求到第 36 个月达到 20-25 家客户；模型采用 24 家，略低于 25 家客户的 SOM 情景。'
- id: A12
  name: 用于单元经济模型的月度毛 logo 流失率
  value: '1.5'
  unit: percent
  source: '[创业财务经验法则：早期企业级垂直 SaaS] 用于 LTV 计算；客户数爬坡已反映净新增。'
- id: A13
  name: 创始人/总经理的全成本现金薪酬
  value: '110'
  unit: USD K per FTE per year
  source: '[创业财务经验法则：种子阶段创始人现金薪酬] 反映资本效率导向种子公司中的保守现金工资。'
- id: A14
  name: 工程岗位的全成本现金薪酬
  value: '175'
  unit: USD K per FTE per year
  source: '[创业财务经验法则：纽约种子阶段工程薪酬] 含工资税和福利。'
- id: A15
  name: 产品岗位的全成本现金薪酬
  value: '160'
  unit: USD K per FTE per year
  source: '[创业财务经验法则：种子阶段产品负责人薪酬] 含工资税和福利。'
- id: A16
  name: 安全/合规岗位的全成本现金薪酬
  value: '160'
  unit: USD K per FTE per year
  source: '[创业财务经验法则：早期合规负责人薪酬] 反映承包商安全审查所需的专业型招聘。'
- id: A17
  name: 解决方案 / 客户成功岗位的全成本现金薪酬
  value: '135'
  unit: USD K per FTE per year
  source: '[创业财务经验法则：企业解决方案工程师 / CS 薪酬] 含工资税和福利。'
- id: A18
  name: 销售岗位的全成本现金薪酬
  value: '180'
  unit: USD K per FTE per year
  source: '[创业财务经验法则：种子阶段企业 AE OTE] 假设在 GTM 团队规模化前采用精瘦 OTE。'
- id: A19
  name: 行政 / 运营岗位的全成本现金薪酬
  value: '100'
  unit: USD K per FTE per year
  source: '[创业财务经验法则：创业公司运营 / 财务行政薪酬] 含工资税和福利。'
- id: A20
  name: 研发非人员支出区间
  value: 10-30
  unit: USD K per month
  source: '[创业财务经验法则：云、开发工具、合规工具] 从 MVP 构建逐步扩展到更广泛的产品与分析支持。'
- id: A21
  name: 销售与市场非人员支出区间
  value: 8-30
  unit: USD K per month
  source: '[创业财务经验法则：差旅、活动、外呼工具、合作伙伴拓展] 随创始人主导销售演进为小型企业 GTM 动作。'
- id: A22
  name: 行政非人员支出区间
  value: 12-24
  unit: USD K per month
  source: '[创业财务经验法则：法务、保险、审计、办公室和行政] 随着客户增加和合规义务提升而上升。'
- id: A23
  name: 下一轮融资里程碑
  value: 到第 24 个月达到 8 家客户，并完成 2 个工作流扩展
  unit: milestone
  source: '[BP milestones 12-24 months] 融资规模按达到该节点并额外保留约 6 个月现金缓冲来设计。'
