    - 34
  - friction: CUI 与承包商数据处理
    severity: high
    affectedBuyer: 合规负责人
    mitigation: 在大规模 rollout 前先交付脱敏控制、审计日志，以及和承包商保护要求的映射材料。
    sourceRefs:
    - 6
