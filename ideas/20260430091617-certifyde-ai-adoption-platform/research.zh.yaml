    value: $305.1M
    rationale: '自下而上的代理估算：通过 2025 年 USAspending 查询，NAICS 541512、541330 和 541611 下共有 14,124 家联邦获奖承接方 × 假设 8% 的 ICP 匹配率 × 每个匹配账户 300 名受治理用户 × 每位受治理用户 $900 ARR = 约 $305.1M。'
    isEstimate: true
    sourceRefs:
    - 14
    - 25
    - 33
  sam:
    value: $161.4M
    rationale: '收窄到联邦 IT 与工程承包商：NAICS 541512 + 541330 的代理样本共有 10,248 家组织 × 7% 的近期匹配率 × 250 名受治理用户 × 每位 $900 ARR = 约 $161.4M。'
    isEstimate: true
    sourceRefs:
    - 14
    - 25
    - 33
  som:
    value: $5.6M
    rationale: 第 3 年可触达情景假设通过直接面向联邦承包商销售拿下 25 个客户，每个客户平均 250 名受治理用户、每位 $900 ARR。
    isEstimate: true
    sourceRefs:
    - 25
    - 33
    - 37
