    isEstimate: true
    sourceRefs:
    - 14
    - 25
    - 33
  sam:
    value: $161.4M
    rationale: '把范围收窄到联邦 IT 与工程承包商：NAICS 541512 + 541330 的代理样本共 10,248 家组织 × 7% 近端匹配率 × 250 名受治理用户 × 每名用户 $900 ARR，得到约 $161.4M。'
    isEstimate: true
    sourceRefs:
    - 14
    - 25
    - 33
  som:
    value: $5.6M
    rationale: 第 3 年可触达情景假设通过联邦承包商直销拿下 25 个客户，每个客户平均 250 名受治理用户，单价 $900 ARR。
    isEstimate: true
    sourceRefs:
    - 25
    - 33
