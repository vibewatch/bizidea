  adoptionFrictionMatrix:
  - friction: 浏览器扩展安全审查
    severity: high
    affectedBuyer: CISO / IT admin
    mitigation: 尽量减少权限、明确保留边界，并支持 VPC 或窄范围部署模式。
    sourceRefs:
    - 29
    - 34
  - friction: CUI 与承包商数据处理
    severity: high
    affectedBuyer: Compliance lead
    mitigation: 在大范围 rollout 前，就先提供脱敏控制、审计日志，以及与承包商防护要求的映射。
    sourceRefs:
    - 6
    - 11
    - 35
  - friction: Proposal 团队的用户行为改变
    severity: medium
    affectedBuyer: VP Proposal Operations
    mitigation: 在现有工具内交付按角色划分的 prompt pack 和审批，而不是要求用户学习一个新的目的地应用。
