categoryDynamics:
  growthRate: 代理需求信号：Thomson Reuters 称到 2029 年 AI 每周可为专业人士节省 12 小时，而 WRITER 今天仍观察到员工与高管之间存在明显采用鸿沟。
  growthRateSourceRefs:
  - 13
  - 16
  tailwinds:
  - point: 正式的 AI 治理与采购指南正在推动受监管买方把控制运营化，而不只是发布政策。
    sourceRefs:
    - 8
    - 9
    - 12
  - point: 影子 AI 与自费购买 AI 工具说明，即便企业推广尚不完整，员工也希望获得流程内工具。
    sourceRefs:
    - 16
  - point: 随着 AI 使用扩展到标签页、门户和 Web 应用，基于浏览器的控制面正获得合法性。
    sourceRefs:
    - 20
    - 26
    - 29
  headwinds:
  - point: 该市场已经挤满相邻厂商，覆盖工作助理、浏览器安全和提案自动化。
    sourceRefs:
    - 20
    - 24
    - 26
    - 28
    - 30
    - 33
  - point: 高权限浏览器扩展会引发真实的安全异议，并在部署前触发额外审查。
    sourceRefs:
    - 29
  - point: 如果产品被定义成培训而不是可衡量的工作流控制，预算紧迫性会迅速减弱。
    sourceRefs:
    - 16
    - 18
    - 30
competitors:
- name: WRITER
  stage: scale-up
  wedge: 具备治理、策略和 Agent 工作流工具的广义企业 AI 平台。
  pricing: 企业定制报价
  strength: 围绕治理、策略和组织级推广具有强企业定位。
  weaknessVsUs: 它面向广义企业 AI 落地做了优化，而不是外部采购门户和提案复核链中的浏览器原生控制。
  sourceRefs:
  - 15
  - 16
  - 17
  - 19
- name: Glean
  stage: scale-up
  wedge: 扎根于企业上下文的企业搜索、助手、Agent 和浏览器扩展。
  pricing: 企业定制报价
  strength: 具备深厚的企业上下文、强权限模型和可信的工作流内助理体验。
  weaknessVsUs: 它为广义内部生产力和检索而建，而不是面向提案特定的护栏、审批和合规证据。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: Prompt Security
  stage: scale-up
  wedge: 覆盖员工 AI 使用、代码助手和 Agent 系统的 AI 安全与治理。
  pricing: 企业定制报价
  strength: 围绕治理、可接受使用策略和 Agent 控制的安全优先叙事很强。
  weaknessVsUs: 安全导向的切入口并不直接拥有提案生产力、模板指导或工作流结果分析。
  sourceRefs:
  - 26
  - 27
- name: LayerX
  stage: scale-up
  wedge: 面向企业 Web 使用的浏览器安全与 GenAI 数据保护控制点。
  pricing: 企业定制报价
  strength: 浏览器控制叙事很强，并有关于扩展风险和 GenAI 数据暴露的直观证据。
  weaknessVsUs: 它首先是安全平台，而不是提供提示词包、复核工作流和采用分析的提案运营产品。
  sourceRefs:
  - 28
  - 29
- name: GovSignals
  stage: startup
  wedge: 面向承包商及相邻公共部门团队、聚焦 FedRAMP 与 GovCon 的捕获/提案 AI 平台。
  pricing: 年度小团队版、商业版和企业版套餐
  strength: 垂直贴合度高，明确强调 FedRAMP High/安全姿态，并证明承包商会购买提案专用 AI 工具。
  weaknessVsUs: 它是以捕获和提案生产为中心的目的地平台，而不是横跨所有浏览器工作流的跨应用行为层。
  sourceRefs:
  - 33
  - 34
  - 35
  - 36
regulatoryTechnicalConstraints:
- point: 任何触及 CUI 或承包商系统的部署，都必须符合保护预期和受控数据处理实践。
  sourceRefs:
  - 6
  - 11
- point: 联邦 AI 监督正在围绕治理委员会、采购指南和风险管理预期正式化，这提高了解释性和文档化门槛。
  sourceRefs:
  - 8
  - 9
- point: 如果产品更接近直接面向机构部署或存储敏感公共部门数据，FedRAMP 姿态就会变得重要。
  sourceRefs:
  - 12
  - 24
  - 34
- point: 浏览器扩展权限和数据采集是一把双刃剑：它们构成切入口，也构成最大的安全异议。
  sourceRefs:
  - 28
  - 29
- point: 提案工作流需要扎根于来源的输出和人工复核，因为对高风险 RFP 响应而言，速度本身远远不够。
  sourceRefs:
  - 22
  - 31
validationSignals:
- point: Certifyde 的种子轮融资表明，投资人把现代劳动力中的 AI 推广与治理视为一个真实的软件类别。
  sourceRefs:
  - 1
  - 2
- point: Moveworks 已经在向政府机构销售具备 FedRAMP 授权姿态的 AI 产品，这证明公共部门买方会评估企业 AI 工作流工具。
  sourceRefs:
  - 24
- point: LayerX 报告称，超过 20% 的用户至少装有一个 AI 驱动的浏览器扩展，凸显浏览器正在成为新兴控制点。
  sourceRefs:
  - 29
- point: GovSignals 公开了打包定价与案例研究，其中客户宣称人工商机跟踪减少 75%，说明在相邻工作流中预算和 ROI 都可以被明确化。
  sourceRefs:
  - 33
  - 36
- point: WRITER 的调查显示 35% 的员工会自掏腰包购买 AI 工具，这强烈说明政策和官方工具仍落后于真实用户行为。
  sourceRefs:
  - 16
openQuestions:
- 在供应商尚无 FedRAMP 等效控制或 VPC 选项之前，会有多少目标联邦承包商批准一个常驻浏览器扩展？
- 实践中第一笔预算究竟归谁：CIO、提案运营，还是安全/合规？
- 在真实提案周转时间和例外率上，浏览器原生控制层是否显著优于 wiki 提示词库加人工复核？
- 如果套件厂商和浏览器安全厂商在未来 12-24 个月内加入更深的提示词包或复核能力，这家公司还能否维持持久切入口？
