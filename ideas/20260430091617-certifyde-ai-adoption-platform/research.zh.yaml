  value: TAM 为 8%，SAM 为 7%
  source: est.
- driver: 每个匹配账户的受治理用户数
  value: TAM 按 300 人，SAM 与 SOM 按 250 人
  source: est.
- driver: 推导出的每名受治理用户 ARR
  value: $900
  source: '[25] + [33] + calc'
categoryDynamics:
  growthRate: '需求增长的代理信号很明确：Thomson Reuters 预计到 2029 年 AI 每周可为专业人士节省 12 小时，而 WRITER 今天就已经看到员工和管理层在 adoption 认知上的巨大落差。'
  growthRateSourceRefs:
  - 13
  - 16
  tailwinds:
  - point: 正式 AI 治理与采购指导正在迫使受监管买方把控制落到运营里，而不只是发一份政策文件。
    sourceRefs:
    - 8
    - 9
    - 12
  - point: 影子 AI 和员工自掏腰包买工具，说明即便企业 rollout 还没跟上，员工也已经在寻找工作流内的替代方案。
    sourceRefs:
    - 16
  - point: 随着 AI 使用扩散到标签页、门户和 Web 应用，浏览器型控制面正越来越被市场接受。
    sourceRefs:
    - 20
    - 26
    - 29
  headwinds:
  - point: 相邻市场已经很拥挤，工作助手、浏览器安全和提案自动化厂商都在包围这条切口。
    sourceRefs:
    - 20
    - 24
    - 26
    - 28
    - 30
    - 33
  - point: 高权限浏览器扩展会触发真实的安全反对意见，部署前往往要多走一轮评审。
    sourceRefs:
    - 29
  - point: 如果产品被讲成“培训工具”而不是可量化的工作流控制，预算紧迫性会很快塌掉。
    sourceRefs:
    - 16
    - 18
    - 30
competitors:
- name: WRITER
  stage: 成长期
  wedge: 面向企业的广义 AI 平台，覆盖治理、政策和 agentic workflow 工具。
  pricing: 企业定制定价
  strength: 在治理、政策和组织级 rollout 叙事上位置很强。
  weaknessVsUs: 它优化的是广义企业 AI 采用，不是外部采购门户和提案复核链条里的浏览器原生控制。
  sourceRefs:
  - 15
  - 16
  - 17
  - 19
- name: Glean
  stage: 成长期
  wedge: 基于企业上下文的搜索、助手、agents 和浏览器扩展。
  pricing: 企业定制定价
  strength: 企业上下文深、权限模型强，而且工作流内助手体验可信。
  weaknessVsUs: 它是为广义内部生产力和检索设计的，不是为提案专用护栏、审批和合规证据设计的。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: Prompt Security
  stage: 成长期
  wedge: 覆盖员工 AI 使用、代码助手和 agent 系统的 AI 安全与治理。
  pricing: 企业定制定价
  strength: 围绕治理、可接受使用政策和 agent 控制的安全叙事很强。
  weaknessVsUs: 它是安全驱动的切口，拿不住提案生产力、模板指引或工作流级结果分析。
  sourceRefs:
  - 26
  - 27
- name: LayerX
  stage: 成长期
  wedge: 面向企业 Web 使用场景的浏览器安全与 GenAI 数据保护控制点。
  pricing: 企业定制定价
  strength: 浏览器控制故事很强，而且对扩展风险和 GenAI 数据暴露有实证材料。
  weaknessVsUs: 它首先是安全平台，不是带提示词包、复核工作流和采用分析的提案运营产品。
  sourceRefs:
  - 28
  - 29
- name: GovSignals
  stage: 初创期
  wedge: 面向承包商及相邻公共部门团队的、聚焦 FedRAMP / GovCon 的 capture 与 proposal AI 平台。
  pricing: 年度小团队、business 和 enterprise 套餐
  strength: 垂直适配很强，安全姿态明确，而且证明了承包商会为提案专用 AI 工具买单。
  weaknessVsUs: 它仍是围绕 capture 和 proposal 生产的目的地平台，而不是覆盖所有浏览器工作流的跨应用行为层。
  sourceRefs:
  - 33
  - 34
  - 35
  - 36
regulatoryTechnicalConstraints:
- point: 任何触碰 CUI 或承包商系统的部署，都必须对齐保护要求和受控数据处理实践。
  sourceRefs:
  - 6
  - 11
- point: 联邦 AI 监督正围绕治理委员会、采购指导和风险管理预期快速制度化，这会把可解释性和文档化要求一并抬高。
  sourceRefs:
  - 8
  - 9
- point: 一旦产品进一步靠近直接面向政府部署，或开始存储敏感公共部门数据，FedRAMP 姿态就会变得关键。
  sourceRefs:
  - 12
  - 24
  - 34
- point: '浏览器扩展权限和数据采集是一把双刃剑：它们构成了切口，也构成了最大的安全异议。'
  sourceRefs:
  - 28
  - 29
- point: 提案工作流必须产出有来源支撑、且经过人工复核的内容，因为在高风险 RFP 回复里，速度从来都不够。
  sourceRefs:
  - 22
  - 31
validationSignals:
- point: Certifyde 的种子轮表明，投资人已经把现代劳动力中的 AI rollout 与治理看成一个真实的软件品类。
  sourceRefs:
  - 1
  - 2
- point: Moveworks 已经在向政府机构销售获得 FedRAMP 授权的 AI 姿态，这证明公共部门买方愿意评估企业 AI workflow 工具。
  sourceRefs:
  - 24
- point: LayerX 报告称，超过 20% 的用户至少安装了一个 AI 驱动的浏览器扩展，这进一步把浏览器坐实成了新控制点。
  sourceRefs:
  - 29
- point: GovSignals 已公开打包定价和案例，其中客户声称手工机会跟踪减少 75%，说明相邻工作流里的预算和 ROI 都可以讲得很直白。
  sourceRefs:
  - 33
  - 36
- point: WRITER 的调查显示 35% 的员工会自掏腰包购买 AI 工具，这强烈说明政策和官方工具仍远远落后于真实用户行为。
  sourceRefs:
  - 16
openQuestions:
- 在供应商还没有 FedRAMP 等价控制或 VPC 选项之前，会有多少目标联邦承包商批准一个常驻浏览器扩展？
- 第一笔成交预算在实践中到底属于谁：CIO、提案运营，还是安全 / 合规？
- 相比 wiki 提示词库加人工复核，浏览器原生控制层是否真能在真实提案周转和例外率上拉开差距？
- 如果套件厂商和浏览器安全厂商在未来 12-24 个月里补齐更深的提示词包和复核能力，创业公司还能否守住切口？
