    - 18
    - 20
  - friction: 采购周期与政府可信度
    severity: high
    affectedBuyer: CIO / procurement
    mitigation: 先从承包商而不是直接政府机构切入，再逐步补上 FedRAMP 对齐控制和伙伴背书。
    sourceRefs:
    - 12
    - 24
    - 34
  - friction: ROI 归因
    severity: medium
    affectedBuyer: CFO / business sponsor
    mitigation: 让试点绑定 proposal cycle time、例外率、AI 使用占比和手工跟踪下降，而不是泛化的 adoption 指标。
    sourceRefs:
    - 30
    - 31
    - 36
market:
