  growthRateSourceRefs:
  - 13
  - 16
  tailwinds:
  - point: 正式化的 AI 治理与采购指引，正推动受监管买家把控制机制真正落地，而不是只发一份政策文件。
    sourceRefs:
    - 8
    - 9
    - 12
  - point: Shadow AI 与员工自费购买 AI 工具，说明即便公司 rollout 尚不完整，员工也想要工作流内工具。
    sourceRefs:
    - 16
  - point: 随着 AI 使用扩散到标签页、门户和 Web 应用，基于浏览器的控制界面正获得更强合法性。
    sourceRefs:
    - 20
    - 26
    - 29
  headwinds:
  - point: 赛道已经很拥挤，相邻厂商横跨工作助手、浏览器安全和 proposal automation。
    sourceRefs:
    - 20
    - 24
    - 26
    - 28
    - 30
    - 33
  - point: 高权限浏览器扩展会引发真实的安全异议，也可能在部署前触发额外审查。
    sourceRefs:
    - 29
  - point: 如果产品被讲成培训工具，而不是可度量的工作流控制层，预算紧迫性会很快下降。
    sourceRefs:
    - 16
    - 18
    - 30
competitors:
- name: WRITER
  stage: scale-up
  wedge: 更广义的企业 AI 平台，覆盖治理、策略和 agentic workflow tooling。
  pricing: 定制化企业定价
  strength: 在治理、策略和组织级 rollout 上有很强的企业定位。
  weaknessVsUs: 它优化的是广义企业 AI 采用，而不是外部采购门户与 proposal review chain 中的浏览器原生控制。
  sourceRefs:
  - 15
  - 16
  - 17
  - 19
- name: Glean
  stage: scale-up
  wedge: 以公司上下文为基础的企业搜索、助手、agents 与浏览器扩展。
  pricing: 定制化企业定价
  strength: 企业上下文深、权限模型强，而且在工作流内助手体验上很可信。
  weaknessVsUs: 它的核心是广义内部生产力与检索，而不是 proposal 专属护栏、审批和合规证据。
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: Prompt Security
  stage: scale-up
  wedge: 覆盖员工 AI 使用、代码助手和 agentic system 的 AI 安全与治理。
  pricing: 定制化企业定价
  strength: 以安全为先的治理、可接受使用策略和 agent 控制叙事很强。
  weaknessVsUs: 安全主导的切口并不直接拥有 proposal 生产力、模板指引或工作流级结果分析。
  sourceRefs:
  - 26
  - 27
- name: LayerX
  stage: scale-up
  wedge: 面向企业 Web 使用的浏览器安全与 GenAI 数据防护控制点。
  pricing: 定制化企业定价
  strength: 浏览器控制故事很强，也给出了扩展风险与 GenAI 数据暴露的实际证据。
  weaknessVsUs: 它首先是安全平台，而不是具备 prompt pack、review workflow 与采用分析的 proposal-ops 产品。
  sourceRefs:
  - 28
  - 29
- name: GovSignals
  stage: startup
  wedge: 面向联邦承包商与相邻公共部门团队、聚焦 FedRAMP 和 GovCon 的 capture/proposal AI 平台。
  pricing: 年付小团队、business 与 enterprise 套餐
  strength: 垂直契合度高，FedRAMP High/安全姿态明确，也证明了承包商会购买 proposal 专属 AI 工具。
  weaknessVsUs: 它是围绕 capture 与 proposal 生产的目的地平台，而不是覆盖所有浏览器工作流的跨应用行为层。
  sourceRefs:
  - 33
  - 34
  - 35
  - 36
regulatoryTechnicalConstraints:
- point: 任何触及 CUI 或承包商系统的部署，都必须符合防护预期和受控数据处理实践。
  sourceRefs:
  - 6
  - 11
- point: 联邦 AI 监督正在围绕治理委员会、采购指引和风险管理预期逐步正式化，这提高了解释性与文档要求。
  sourceRefs:
  - 8
  - 9
- point: 一旦产品更接近直接面向政府机构部署，或开始存储敏感公共部门数据，FedRAMP 姿态就会变得关键。
  sourceRefs:
  - 12
  - 24
  - 34
- point: '浏览器扩展的权限与数据采集是一把双刃剑：它们构成了切口，也构成了最大的安全异议。'
  sourceRefs:
  - 28
  - 29
- point: Proposal 工作流需要基于来源的输出和人工复核，因为对高风险 RFP 来说，只有速度远远不够。
  sourceRefs:
  - 22
  - 31
validationSignals:
- point: Certifyde 的种子轮融资说明，投资人已经把现代劳动力中的 AI rollout 与治理视作一个真实软件品类。
  sourceRefs:
  - 1
  - 2
- point: Moveworks 已经在向政府机构销售具备 FedRAMP 授权姿态的 AI 产品，这证明公共部门买家会认真评估企业 AI 工作流工具。
  sourceRefs:
  - 24
- point: LayerX 报告称，超过 20% 的用户至少安装过一个 AI 驱动的浏览器扩展，这进一步说明浏览器正在变成新控制点。
  sourceRefs:
  - 29
- point: GovSignals 公布了打包定价和案例，其中客户声称手工机会跟踪减少 75%，这说明相邻工作流里的预算和 ROI 都可以被明确写出来。
  sourceRefs:
  - 33
  - 36
- point: WRITER 的调研显示，35% 的员工在自掏腰包购买 AI 工具，这强烈说明正式政策和官方工具仍落后于真实用户行为。
  sourceRefs:
  - 16
openQuestions:
- 在厂商尚未具备等同 FedRAMP 的控制或 VPC 选项之前，究竟有多少目标联邦承包商会批准一个常驻式浏览器扩展？
- '实践中第一笔预算究竟归谁：CIO、proposal ops，还是安全/合规？'
- 相比 wiki 提示词库加人工复核，浏览器原生控制层是否真的能显著改善真实 proposal 的周转时间和例外率？
- 如果套件厂商和浏览器安全厂商在未来 12-24 个月里补上更深的 prompt pack 或 review 功能，这家公司还能不能维持可持续切口？
