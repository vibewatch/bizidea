scenarios:
  downside:
    description: Security review friction and softer seat counts push deals right and lower average contract size.
    y3RevenueK: 1964.3
    y3EbitdaK: -1409.5
    cashLowPointK: -632.8
    keyAssumptionChanges:
      - End-Y3 customer count falls to 18 instead of 24.
      - Average ACV falls 10% to $162K as deployments start smaller.
      - Gross margin slips to 72% because services and compliance support stay heavier.
  base:
    description: Founder-led sales converts 2 customers in year 1, reaches 8 logos by month 24, and 24 by month 36 on $180K ACV.
    y3RevenueK: 2790.0
    y3EbitdaK: -806.4
    cashLowPointK: 97.0
    keyAssumptionChanges:
      - No change; this matches the operating model above.
  upside:
    description: Stronger seat expansion and faster pilot conversion lift revenue without a proportional opex step-up.
    y3RevenueK: 3440.3
    y3EbitdaK: -309.8
    cashLowPointK: 697.9
    keyAssumptionChanges:
      - End-Y3 customer count reaches 26 instead of 24.
      - Average ACV rises 10% to $198K on larger governed-user deployments.
      - Gross margin improves to 77% as implementation gets more repeatable.
sensitivity:
  - variable: ARPU
    downsideCase: Average ACV slips to $162K as initial deployments stay near 180 governed users.
    baseCase: Average ACV stays at $180K on 200 governed users.
    upsideCase: Average ACV rises to $198K as more accounts land at 220 governed users.
    y3RevenueImpactK: -279.0
    cashImpactK: -209.3
  - variable: CAC
    downsideCase: CAC rises toward $80K because paid pilots convert more slowly and founder time stays high.
    baseCase: CAC holds near $61.7K on a lean enterprise motion.
    upsideCase: CAC falls toward $50K as references and partners improve conversion.
    y3RevenueImpactK: -472.5
    cashImpactK: -315.0
  - variable: churn
    downsideCase: Monthly gross churn moves to 2.5% as some pilots fail to expand after year 1.
    baseCase: Monthly gross churn stays at 1.5%.
    upsideCase: Monthly gross churn falls to 1.0% on strong workflow embedding.
    y3RevenueImpactK: -180.0
    cashImpactK: -135.0
  - variable: sales cycle
    downsideCase: Average cycle stretches from roughly 6 months to 9 months because CISO review delays deployment.
    baseCase: Sales cycle stays around 6 months for qualified contractor accounts.
    upsideCase: Sales cycle compresses toward 4-5 months with a repeatable security package.
    y3RevenueImpactK: -472.5
    cashImpactK: -354.4
  - variable: gross margin
    downsideCase: Gross margin holds at 72% because deployment support stays high-touch.
    baseCase: Gross margin reaches the planned 75%.
    upsideCase: Gross margin rises to 77% as policy packs and onboarding standardize.
    y3RevenueImpactK: 0.0
    cashImpactK: -83.7
  - variable: hiring pace
    downsideCase: The company hires 2 GTM and engineering roles one quarter earlier than plan.
    baseCase: Hiring follows the quarterly ramp above.
    upsideCase: Two hires slip one quarter until conversion proof is in hand.
    y3RevenueImpactK: 0.0
    cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> Pilots
      Pilots --> AnnualCustomers
      AnnualCustomers --> Expansion
      AnnualCustomers --> Revenue
      Expansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: The base case is driven by reaching 24 contractor logos at roughly $180K ACV, not by assuming outsized per-seat pricing or fast self-serve growth.
  - checkName: Must go right
    finding: Security review and budget ownership must be good enough to convert 2 pilots by month 12 and 8 annual customers by month 24.
  - checkName: Model breaks if
    finding: A longer sales cycle or smaller initial deployments can push cash below zero before the next round, as shown in the downside scenario and sensitivity table.
  - checkName: Next-round proof
    finding: The next financing is justified once the company shows 8 paying logos, second-workflow expansion, and repeatable sub-6-month CAC payback in regulated accounts.
sanityChecks:
  ruleOf40: Y3 growth 244.4% + EBITDA margin -28.9% = 215.5%; strong growth directionally, but still pre-efficiency.
  burnMultiple: Y3 burn multiple 0.3x using $0.8M EBITDA burn against $2.9M of net new ARR; attractive on paper but flattered by the low starting base.
  revenuePerFte: $214.6K Y3 revenue per average FTE (benchmark roughly $200-400K enterprise SaaS).
  flags:
    - The model assumes the first two annual conversions happen inside 12 months even though extension approval is the plan's highest deployment risk.
    - Gross margin is held at the 75% target from the start; if onboarding behaves more like services, cash need rises quickly.
    - The funding ask works because the company already has about $300K of starting cash; without that cushion, the same plan needs a larger round.
