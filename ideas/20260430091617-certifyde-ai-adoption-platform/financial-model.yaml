    name: Year 1 net paying customers at end of year
    value: '2'
    unit: customers
    source: '[BP milestones 0-12 months] Model assumes 2 pilots convert to annual contracts by month 12.'
  - id: A10
    name: Year 2 net paying customers at end of year
    value: '8'
    unit: customers
    source: '[BP milestones 12-24 months] Plan calls for 5-8 annual logos by month 24; model uses the top end of that range.'
  - id: A11
    name: Year 3 net paying customers at end of year
    value: '24'
    unit: customers
    source: '[BP milestones 24-36 months, Research market.som] Milestone says 20-25 customers by month 36; model uses 24, just below the 25-customer SOM case.'
  - id: A12
    name: Monthly gross logo churn for unit economics
    value: '1.5'
    unit: percent
    source: '[Startup-finance heuristic: early enterprise vertical SaaS] Used for LTV math; customer-count ramp already reflects net adds.'
  - id: A13
    name: Loaded cash compensation for Founder/GM
    value: '110'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage founder cash comp] Conservative cash salary for a capital-efficient seed company.'
  - id: A14
    name: Loaded cash compensation for Engineering
    value: '175'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage NYC engineering comp] Includes payroll tax and benefits.'
  - id: A15
    name: Loaded cash compensation for Product
    value: '160'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage product lead comp] Includes payroll tax and benefits.'
  - id: A16
    name: Loaded cash compensation for Security/Compliance
    value: '160'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: early compliance lead comp] Reflects a specialist hire needed for contractor security reviews.'
  - id: A17
    name: Loaded cash compensation for Solutions / Customer Success
    value: '135'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: enterprise solutions engineer / CS comp] Includes payroll tax and benefits.'
  - id: A18
    name: Loaded cash compensation for Sales
    value: '180'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: seed-stage enterprise AE OTE] Assumes lean OTE before a scaled GTM team exists.'
  - id: A19
    name: Loaded cash compensation for G&A / Ops
    value: '100'
    unit: USD K per FTE per year
    source: '[Startup-finance heuristic: startup ops / finance admin comp] Includes payroll tax and benefits.'
  - id: A20
    name: R&D non-payroll spend range
    value: '10-30'
    unit: USD K per month
    source: '[Startup-finance heuristic: cloud, dev tools, compliance tooling] Scales from MVP build to broader product and analytics support.'
  - id: A21
    name: Sales & marketing non-payroll spend range
    value: '8-30'
    unit: USD K per month
    source: '[Startup-finance heuristic: travel, events, outbound tools, partner development] Scales with founder-led sales into a small enterprise GTM motion.'
  - id: A22
    name: G&A non-payroll spend range
    value: '12-24'
    unit: USD K per month
    source: '[Startup-finance heuristic: legal, insurance, audit, office and admin] Rises as the company adds customers and compliance obligations.'
