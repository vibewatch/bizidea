    name: Model start month
    value: '2026-05'
    unit: month
    source: '[BP date] Model starts the month after the 2026-04-30 business plan date.'
  - id: A2
    name: Opening cash before new round
    value: '300'
    unit: USD K
    source: '[Startup-finance heuristic: founder capital / SAFEs] Assumes modest pre-seed cash already in bank before the seed round.'
  - id: A3
    name: Seed round proceeds at model start
    value: '3200'
    unit: USD K
    source: '[BP fundingAsk] Seed target range is $2-4M; model uses $3.2M to fund the next milestone plus 6 months of buffer.'
  - id: A4
    name: Average governed users per live customer
    value: '200'
    unit: users per customer
    source: '[BP investorMemo, BP gtm pricing, Research bottomUpSizingDrivers] Initial deployments are modeled below the 250-user SOM case but within the 100-250 governed-user range in the plan.'
  - id: A5
    name: ARR per governed user
    value: '0.9'
    unit: USD K per user per year
    source: '[BP gtm pricing, Research bottomUpSizingDrivers] Both files anchor pricing at roughly $900 ARR per governed user.'
  - id: A6
    name: Blended annual contract value per customer
    value: '180'
    unit: USD K per customer per year
    source: '[Derived from A4 × A5] 200 governed users × $0.9K ARR per user = $180K ACV.'
  - id: A7
    name: New-customer revenue recognition in close month
    value: '50'
    unit: percent of monthly run-rate
    source: '[Startup-finance heuristic: enterprise SaaS bookings ramp] New logos contribute half a month of revenue in the period they close.'
  - id: A8
    name: Gross margin
    value: '75'
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct] Plan explicitly targets 75% gross margin.'
