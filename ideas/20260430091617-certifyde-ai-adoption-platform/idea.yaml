topRisks:
  - name: Platform squeeze
    description: Browser vendors, Microsoft, or core AI suites could add native adoption and policy features that narrow the wedge.
    mitigation: Focus first on cross-app workflow control, regulated templates, and audit depth that single-suite vendors do not cover well.
  - name: Security review friction
    description: Federal contractors may hesitate to install a browser extension that observes sensitive workflows.
    mitigation: Ship with minimal data retention, on-prem or VPC deployment options, and clear admin controls over what is logged.
  - name: ROI may look soft
    description: Buyers may see adoption tooling as nice-to-have if benefits are framed only as training improvement.
    mitigation: Anchor pilots to measurable proposal-cycle metrics, reduction in compliance exceptions, and enterprise AI license utilization.
