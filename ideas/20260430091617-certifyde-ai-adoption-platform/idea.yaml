problem: Most enterprises rolling out ChatGPT Enterprise or Copilot discover that the real failure point is not model quality but workforce behavior inside the browser. Employees bounce between portals, docs, email, and internal tools without knowing what prompts are approved, what data can be shared, or how managers will measure safe usage. In regulated teams, that uncertainty kills adoption and pushes work back to manual drafting, copy-paste playbooks, and shadow AI.
targetUser:
  primary: Proposal operations leaders at mid-sized federal IT and defense contractors rolling out enterprise AI to 200-2,000 knowledge workers
  secondary: AI governance leads and security/compliance managers inside the same organizations
  buyer: CIO, Chief Digital Officer, or VP of Proposal Operations
startupThesis:
  nonObviousInsight: The missing layer in enterprise AI is not another model or chatbot UI; it is a browser-native operating layer that injects approved prompts, policy guardrails, and audit trails directly into the work employees already do across web apps.
  beachhead: Federal contractors using browser-based procurement portals plus Microsoft 365 or Google Workspace to draft RFP responses, statements of work, and contract modifications under strict review rules
  wedge: A browser extension that detects workflow context, suggests approved prompt packs, blocks risky data handling, and logs human review so proposal teams can use AI safely without changing their existing apps
  whyNowCatalyst: Multiple in-window sources describe a funded browser-extension wedge aimed at enterprise and government AI rollout, validating that point-of-use adoption control has become an urgent, budget-bearing category.
  ventureScalePath: Start with proposal and document-heavy regulated workflows, then expand into legal, public-sector operations, customer support, and enterprise-wide AI governance analytics across every browser-based knowledge workflow.
solution: The product is a browser-native AI rollout layer for regulated knowledge work. It sits on top of procurement portals, shared docs, email, and internal web apps to deliver role-specific prompt templates, required citation patterns, redaction checks, and approval steps at the moment of work. Admins can publish approved playbooks by contract type or customer, while managers get adoption, risk, and outcome analytics tied to actual workflows rather than training completion. Over time, the system becomes the control plane for who can use which AI tools, in what context, and with what evidence of human review.
goToMarketSeed:
  firstCustomer: A 500-3,000 employee federal IT contractor with an active proposal desk, an enterprise AI license rollout, and recurring RFP volume across civilian and defense agencies
  buyingTrigger: An enterprise AI rollout or renewal that exposes low real usage, inconsistent outputs, or compliance concerns in proposal and contract-drafting workflows
  currentAlternative: PDF policies, LMS training, manual manager review, prompt libraries in wikis, and blanket restrictions from security teams
  switchingReason: A browser extension deploys faster than workflow-specific integrations or internal builds, meets workers inside existing tools, and gives leaders measurable adoption plus policy enforcement in one layer
  pricingHypothesis: Annual SaaS subscription priced per governed knowledge worker or per active proposal seat, with premium tiers for audit logging and policy packs
whyNow:
  - point: Enterprises are now funding AI adoption as its own software layer, not treating it as a one-time training exercise.
    signalRefs: [AI adoption is now a budgeted problem]
    sourceRefs: [1, 4]
  - point: The browser-extension approach is newly credible because teams need one control point across many web apps instead of deep integrations into each tool.
    signalRefs: [Browser-level wedge is emerging]
    sourceRefs: [3]
  - point: Government and enterprise targeting shows the first buyers are regulated organizations where failed AI rollout has direct compliance and revenue consequences.
    signalRefs: [Regulated buyers are in scope]
    sourceRefs: [2]
  - point: The market is shifting from AI access to AI scaling, creating urgency for products that turn scattered experimentation into repeatable workflows.
    signalRefs: [Workforces need scaling, not just access]
    sourceRefs: [1, 3, 4]
differentiator: Most AI adoption products stop at training content or dashboard analytics, while governance tools focus on model access at the platform edge. This company wins by controlling the point of work inside the browser, where employees actually decide whether to use AI, what to paste, and whether to follow policy. That creates a proprietary data asset around workflow-specific prompt efficacy, adoption bottlenecks, and human-review patterns that becomes hard for generic training vendors or security tools to replicate.
