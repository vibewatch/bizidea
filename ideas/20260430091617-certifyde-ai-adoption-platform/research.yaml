  adoptionFrictionMatrix:
  - friction: Browser extension security review
    severity: high
    affectedBuyer: CISO / IT admin
    mitigation: Minimize permissions, document retention boundaries, and support VPC or tightly scoped deployment modes.
    sourceRefs:
    - 29
    - 34
  - friction: CUI and contractor-data handling
    severity: high
    affectedBuyer: Compliance lead
    mitigation: Ship with redaction controls, audit logging, and mappings to contractor safeguarding requirements before broad rollout.
    sourceRefs:
    - 6
    - 11
    - 35
  - friction: User behavior change in proposal teams
    severity: medium
    affectedBuyer: VP Proposal Operations
    mitigation: Deliver role-specific prompt packs and approvals inside existing tools instead of asking users to learn a new destination app.
    sourceRefs:
    - 15
    - 18
    - 20
  - friction: Procurement timeline and government credibility
    severity: high
    affectedBuyer: CIO / procurement
    mitigation: Start with contractors before direct agency deployments, then layer in FedRAMP-aligned controls and partner references.
    sourceRefs:
    - 12
    - 24
    - 34
  - friction: ROI attribution
    severity: medium
    affectedBuyer: CFO / business sponsor
    mitigation: Tie pilots to proposal cycle time, exception rates, AI usage share, and manual tracking reduction instead of generic adoption metrics.
