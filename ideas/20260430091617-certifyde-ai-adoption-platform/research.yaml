    - 31
    - 36
market:
  tam:
    value: $305.1M
    rationale: 'Bottom-up proxy: 14,124 federal-award recipients across NAICS 541512, 541330, and 541611 from a 2025 USAspending query × 8% assumed ICP fit × 300 governed users per fit account × $900 ARR per governed user = about $305.1M.'
    isEstimate: true
    sourceRefs:
    - 14
    - 25
    - 33
  sam:
    value: $161.4M
    rationale: 'Constrain to federal IT and engineering contractors only: 10,248 organizations in NAICS 541512 + 541330 proxy universe × 7% near-term fit × 250 governed users × $900 ARR = about $161.4M.'
    isEstimate: true
    sourceRefs:
    - 14
    - 25
    - 33
  som:
    value: $5.6M
    rationale: Year-3 reachable case assumes 25 customers landed through direct federal-contractor sales, each averaging 250 governed users at $900 ARR.
    isEstimate: true
    sourceRefs:
    - 25
    - 33
    - 37
