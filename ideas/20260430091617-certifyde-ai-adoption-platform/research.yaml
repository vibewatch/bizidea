competitors:
- name: WRITER
  stage: scale-up
  wedge: Broad enterprise AI platform with governance, policies, and agentic workflow tooling.
  pricing: Custom enterprise pricing
  strength: Strong enterprise positioning around governance, policy, and organization-wide rollout.
  weaknessVsUs: Optimized for broad enterprise AI adoption, not browser-native control in external procurement portals and proposal review chains.
  sourceRefs:
  - 15
  - 16
  - 17
  - 19
- name: Glean
  stage: scale-up
  wedge: Enterprise search, assistant, agents, and browser extension grounded in company context.
  pricing: Custom enterprise pricing
  strength: Deep enterprise context, strong permissions model, and credible in-workflow assistant experience.
  weaknessVsUs: Built for broad internal productivity and retrieval, not proposal-specific guardrails, approvals, and compliance evidence.
  sourceRefs:
  - 20
  - 21
  - 22
  - 23
- name: Prompt Security
  stage: scale-up
  wedge: AI security and governance across employee AI use, code assistants, and agentic systems.
  pricing: Custom enterprise pricing
  strength: Strong security-first narrative around governance, acceptable-use policy, and agent controls.
  weaknessVsUs: Security-led wedge does not directly own proposal productivity, template guidance, or workflow-level outcome analytics.
  sourceRefs:
  - 26
  - 27
- name: LayerX
  stage: scale-up
  wedge: Browser security and GenAI data-protection control point for enterprise web usage.
  pricing: Custom enterprise pricing
  strength: Compelling browser-control story and tangible evidence on extension risk and GenAI data exposure.
  weaknessVsUs: Primarily a security platform, not a proposal-ops product with prompt packs, review workflows, and adoption analytics.
  sourceRefs:
  - 28
  - 29
- name: GovSignals
  stage: startup
  wedge: FedRAMP- and GovCon-focused capture/proposal AI platform for contractors and adjacent public-sector teams.
  pricing: Annual small-team, business, and enterprise packages
  strength: Tight vertical fit, explicit FedRAMP High/security posture, and proof that contractors buy proposal-specific AI tools.
  weaknessVsUs: Destination platform centered on capture and proposal production rather than a cross-app behavior layer spanning every browser workflow.
  sourceRefs:
  - 33
  - 34
  - 35
  - 36
