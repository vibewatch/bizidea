openQuestions:
- How many target federal contractors will approve an always-on browser extension before a vendor has FedRAMP-equivalent controls or a VPC option?
- 'Which buyer owns the first deal budget in practice: CIO, proposal ops, or security/compliance?'
- Does a browser-native control layer materially outperform wiki prompt libraries plus human review on real proposal turnaround and exception rates?
- Can the startup maintain a durable wedge if suites and browser-security vendors add deeper prompt-pack or review features over the next 12-24 months?
