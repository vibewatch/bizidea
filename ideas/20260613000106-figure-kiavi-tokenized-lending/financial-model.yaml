slug: investor-loan-certification-rail
date: '2026-06-13'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: Model start month
    value: '2026-07'
    unit: month
    source: "[BP date] Base case assumes the pre-seed closes and operating spend starts the month after the business plan date."
  - id: A2
    name: Starting cash after pre-seed close
    value: '2.4'
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M; BP runwayMonths 18] Base case uses a lower-midpoint pre-seed sized to reach the 12-24 month milestones with an added 6-month buffer."
  - id: A3
    name: Blended annual revenue per active lender account
    value: '270.0'
    unit: USDK per customer-year
    source: "[BP firstCustomer initialContract $60k-$120k and $150k-$300k annualized expansion; BP businessModel revenueStreams] Uses a blended ACV that assumes one live program plus some onboarding, volume, and second-program expansion by mature accounts."
  - id: A4
    name: Gross margin
    value: '70'
    unit: percent
    source: "[BP businessModel targetGrossMarginPct]"
  - id: A5
    name: Y1 month-end customers
    value: "0, 0, 0, 1, 1, 1, 1, 1, 2, 2, 3, 3"
    unit: count
    source: "[BP milestones 0-12 months] Converts the goal of 3 paid pilots reaching recurring production into a conservative month-by-month ramp."
  - id: A6
    name: Y2 quarter-end customers
    value: "Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 7"
    unit: count
    source: "[BP milestones 12-24 months] Assumes measured logo growth while at least 2 customers expand to multiple buyer programs and deployment time falls below 90 days."
  - id: A7
    name: Y3 quarter-end customers
    value: "Q1Y3 8; Q2Y3 10; Q3Y3 12; Q4Y3 12"
    unit: count
    source: "[Research SOM 15 lenders by year 3; BP risks narrow beachhead] Base case stays below the research SOM ceiling and assumes growth slows as the company approaches the most likely reachable lender set."
  - id: A8
    name: Monthly churn
    value: '1.8'
    unit: percent
    source: "[BP investorMemo whyDoubt; startup-finance heuristic] Uses cautious early-enterprise churn because buyer trust and multi-program stickiness are not yet proven."
  - id: A9
    name: Founder/CEO loaded cash compensation
    value: '120.0'
    unit: USDK per year
    source: "[BP gtm founder-led direct sales; BP experimentRoadmap owner CEO] Startup-finance heuristic for a below-market founder salary in a regulated workflow startup."
  - id: A10
    name: Founding engineer loaded cash compensation
    value: '192.0'
    unit: USDK per year
    source: "[BP team Founding eng] Startup-finance heuristic for senior product and integration engineering cash comp plus payroll burden."
  - id: A11
    name: Product and implementation lead loaded cash compensation
    value: '168.0'
    unit: USDK per year
    source: "[BP team Product and implementation lead] Startup-finance heuristic for a hybrid product, implementation, and workflow owner."
  - id: A12
    name: Capital-markets domain specialist loaded cash compensation
    value: '144.0'
    unit: USDK per year
    source: "[BP team Capital-markets domain specialist] Startup-finance heuristic for a domain operator who encodes buyer rulebooks and supports live deliveries."
  - id: A13
    name: Security and customer success lead loaded cash compensation
    value: '132.0'
    unit: USDK per year
    source: "[BP team Security and customer success lead] Startup-finance heuristic for a combined privacy, audit, and post-pilot expansion operator."
  - id: A14
    name: Partnerships and revenue lead loaded cash compensation
    value: '180.0'
    unit: USDK per year
    source: "[BP team Partnerships and revenue lead] Startup-finance heuristic for an enterprise seller with partner-development responsibility."
  - id: A15
    name: Solutions engineer loaded cash compensation
    value: '156.0'
    unit: USDK per year
    source: "[BP product twelveMonth supported stacks; BP milestones reduce deployment below 90 days] Startup-finance heuristic for an implementation-heavy technical hire added once more than one stack is live."
  - id: A16
    name: Platform and integration engineer loaded cash compensation
    value: '180.0'
    unit: USDK per year
    source: "[BP product twentyFourMonth expansion; BP strategicChoices sequencingRationale] Startup-finance heuristic for the next engineer added after the first deployments prove reusable."
  - id: A17
    name: GRC and compliance manager loaded cash compensation
    value: '120.0'
    unit: USDK per year
    source: "[Research regulatoryLandscape; BP risks privacy and security reviews] Startup-finance heuristic for a compliance hire once the company moves from pilots to repeat procurement."
  - id: A18
    name: Implementation analyst loaded cash compensation
    value: '114.0'
    unit: USDK per year
    source: "[BP milestones adjacent workflow launch; BP operations onboarding standardization] Startup-finance heuristic for a lower-cost delivery hire once the team supports more active accounts."
  - id: A19
    name: Hiring cadence
    value: "Founder, founding engineer, and product/implementation lead in M1; capital-markets specialist in M4; security/customer success in M10; partnerships/revenue in M13; solutions engineer in M16; platform/integration engineer in M19; GRC/compliance in M22; implementation analyst in M25"
    unit: timing
    source: "[BP team startTiming; BP strategicChoices sequencingRationale; BP risks] Adds only the minimum extra implementation and compliance hires needed to support under-90-day deployments and regulated procurement."
  - id: A20
    name: Functional payroll allocation
    value: "Founder 70% S&M and 30% G&A; founding and platform engineers 100% R&D; product/implementation lead 75% R&D and 25% G&A; capital-markets specialist 65% R&D and 35% G&A; security/customer success 15% S&M, 15% R&D, 70% G&A; partnerships lead 100% S&M; solutions engineer 70% R&D and 30% G&A; implementation analyst 40% R&D and 60% G&A"
    unit: allocation
    source: "[BP team rationales; BP operations] Allocation follows who owns product build, enterprise selling, and audit-heavy onboarding."
  - id: A21
    name: Non-payroll operating spend
    value: "M1-M6 S&M 5K, R&D 8K, G&A 8K monthly; M7-M12 6K, 9K, 10K; M13-M18 12K, 12K, 13K; M19-M24 15K, 14K, 17K; M25-M30 18K, 15K, 18K; M31-M36 20K, 16K, 20K"
    unit: USDK per month
    source: "[Startup-finance heuristic; BP risks security reviews and partner onboarding] Reflects lean but real cloud, travel, legal, and compliance budgets for an enterprise fintech workflow startup."
  - id: A22
    name: Cash conversion policy
    value: "EBITDA approximates cash movement"
    unit: policy
    source: "[Startup-finance heuristic] No debt, capex, taxes, or material working-capital swings are modeled for this pre-seed software business."
  - id: A23
    name: Funding milestone
    value: "Reach 7 recurring production customers, under-90-day deployments on supported stacks, at least 2 multi-program expansions, first adjacent module launch, and 2-3 co-sell partners while preserving about 6 months of cash"
    unit: milestone
    source: "[BP milestones 12-24 months; BP fundingAsk useOfFundsSummary] Used to size the pre-seed ask."
  - id: A24
    name: Blended fully loaded CAC
    value: '110.0'
    unit: USDK per customer
    source: "[BP gtm founder-led direct sales and funnelTargets; startup-finance heuristic] Assumes enterprise pilot selling with meaningful travel, security review, and implementation support before production conversion."
