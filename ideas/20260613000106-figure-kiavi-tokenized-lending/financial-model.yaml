scenarios:
  downside:
    description: "Buyer trust and rulebook reuse improve more slowly, so the company exits Y3 with 10 active lender accounts at about $240K blended ACV and slightly lower gross margin."
    y3RevenueK: 1920.0
    y3EbitdaK: -862.8
    cashLowPointK: -241.1
    keyAssumptionChanges:
      - "Quarter-end Y3 customers slip from 8, 10, 12, 12 to 7, 8, 9, 10."
      - "Blended annual revenue per active account falls from $270K to $240K as second-program expansion arrives later."
      - "Gross margin falls from 70% to 67% because more exception handling stays human-driven."
  base:
    description: "Founder-led sales converts 3 pilots into production, partner-assisted growth adds measured new logos, and the company exits Y3 with 12 active lender accounts at a $270K blended ACV."
    y3RevenueK: 2689.0
    y3EbitdaK: -266.9
    cashLowPointK: 715.2
    keyAssumptionChanges:
      - "Month and quarter-end customer counts follow A5, A6, and A7."
      - "Gross margin stays at the 70% BP target."
      - "Hiring follows A19 and stays disciplined until deployment repeatability is proven."
  upside:
    description: "Reusable rulebooks and co-sell partners click earlier, letting the company approach the research SOM with 15 active lender accounts and modestly stronger ACV and margin."
    y3RevenueK: 3516.4
    y3EbitdaK: 382.5
    cashLowPointK: 1354.5
    keyAssumptionChanges:
      - "Quarter-end Y3 customers rise from 8, 10, 12, 12 to 10, 12, 14, 15."
      - "Blended annual revenue per active account rises from $270K to roughly $290K through faster multi-program expansion."
      - "Gross margin improves from 70% to 72% as the exception workflow becomes more software-led."
sensitivity:
  - variable: ARPU
    downsideCase: "Blended ACV settles near $240K because customers keep the product on only one funded channel."
    baseCase: "Blended ACV stays at $270K as accounts expand from first deployment into more buyer programs."
    upsideCase: "Blended ACV reaches about $290K when second-program expansion and adjacent modules attach earlier."
    y3RevenueImpactK: -299.0
    cashImpactK: -317.0
  - variable: CAC
    downsideCase: "CAC rises to about $140K because founder-led enterprise sales stay custom and security review remains long."
    baseCase: "CAC holds near the modeled $110K with founder-led selling plus a few credible channel partners."
    upsideCase: "CAC falls toward $90K once referrals from warehouse and funding partners create warmer pipeline."
    y3RevenueImpactK: 0.0
    cashImpactK: -270.0
  - variable: churn
    downsideCase: "Monthly churn moves to roughly 2.5% because neutral certification never becomes deeply embedded in the lender's full workflow."
    baseCase: "Monthly churn stays at 1.8% as modeled."
    upsideCase: "Monthly churn falls toward 1.2% once more accounts add a second buyer program."
    y3RevenueImpactK: -214.0
    cashImpactK: -159.0
  - variable: sales cycle
    downsideCase: "Pilot-to-production stretches by about one quarter because buyers and compliance teams still run parallel diligence."
    baseCase: "Pilot-to-production closes in about one to two quarters, consistent with the BP's first-program deployment motion."
    upsideCase: "Production conversion shortens by one quarter once the first rulebooks and security package become reusable."
    y3RevenueImpactK: -439.0
    cashImpactK: -419.0
  - variable: gross margin
    downsideCase: "Gross margin holds near 67% because onboarding and exception clearing remain more services-heavy."
    baseCase: "Gross margin stays at the BP target of 70%."
    upsideCase: "Gross margin reaches about 72% once buyer rulebooks and evidence workflows become more reusable."
    y3RevenueImpactK: 0.0
    cashImpactK: -109.0
  - variable: hiring pace
    downsideCase: "Compliance and implementation hires are pulled forward by two quarters before repeatability is proven."
    baseCase: "Hiring follows A19 and stays disciplined through the Y2 milestone."
    upsideCase: "Some delivery hires slip later because supported stacks and buyer templates stabilize faster than expected."
    y3RevenueImpactK: 0.0
    cashImpactK: -117.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      DesignPartners --> ProductionCustomers
      ProductionCustomers --> MultiProgramExpansion
      MultiProgramExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case Y3 revenue is driven by reaching 12 active lender accounts at roughly $270K blended ACV as first-program deployments expand into additional buyer programs."
  - checkName: Must go right
    finding: "The first 3 buyer rulebooks must stay reusable enough to keep deployment under 90 days and protect the 70% gross-margin target."
  - checkName: Model breaks if
    finding: "If production conversion slips by about one quarter or ACV falls toward $240K, Y3 revenue drops roughly $300K-$440K and the downside cash curve turns negative."
  - checkName: Next-round proof
    finding: "A credible seed story appears once the company exits Y2 with about 7 recurring customers, 2 multi-program expansions, partner-sourced pipeline, and the first adjacent module live."
sanityChecks:
  ruleOf40: "Y3 growth 95.9% + EBITDA margin -9.9% = 86.0%."
  burnMultiple: "About 0.7x in Y2 on net new ARR, improving to about 0.2x in Y3 as expansion revenue begins to outrun burn."
  revenuePerFte: "$269K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K mature SaaS benchmark)."
  flags:
    - "The base case depends on existing lenders expanding from one funded channel into multiple buyer programs; single-program usage alone does not support the $270K blended ACV."
    - "The beachhead is narrow, so the venture case still needs adjacent reporting or securitization workflows to open more spend per customer over time."
    - "Cash stays positive because hiring is disciplined; pulling forward compliance or delivery hires before rulebook reuse is proven compresses the low point by more than $100K."
    - "The downside case turns cash negative before the end of Y3, so the company should start the seed process well before buyer-trust risk is fully resolved."
