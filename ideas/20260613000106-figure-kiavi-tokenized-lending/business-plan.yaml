slug: investor-loan-certification-rail
date: '2026-06-13'
executiveSummary: >-
  Investor Loan Certification Rail targets a specific operational bottleneck at
  U.S. residential investor lenders: getting DSCR, bridge, and fix-and-flip
  loans accepted by multiple funding counterparties without rebuilding loan
  tapes and diligence workflows each time. The first customer is a $1B+ annual
  originator with three or more warehouse or takeout relationships and a live
  project to add a more automated or tokenized funding channel in the next 12
  months. The product is not a new marketplace or issuer; it is a neutral
  certification layer that creates one canonical loan record, applies
  buyer-specific eligibility logic, and generates an auditable certification
  packet before delivery fails. This wedge is timely because Figure's Kiavi deal
  and Adaptor positioning indicate that standardizing originator data is now the
  gating workflow for scaled investor-property flow on new rails. The go-to-
  market system is coherent: sell a first deployment around one new funding
  program, price by active buyer programs plus funded-loan volume, and expand
  only after the lender uses the control layer on recurring deliveries. The
  strongest evidence supports pain, workflow urgency, and adjacent willingness
  to pay, but two core uncertainties remain unresolved in the inputs: which
  exception categories drive the most lender pain today, and whether non-Figure
  buyers will trust a neutral third-party certification packet enough to reduce
  their own diligence burden. Market sizing in the research is estimate-based
  and modest on the narrow beachhead, so the company only becomes venture-scale
  if the beachhead expands into the operating layer for warehouse reporting,
  securitization prep, servicing-transfer readiness, and portfolio surveillance.
  This is worth tracking closely, but investor conviction should increase only
  after the first design partners prove reusable rulebooks, paid deployment, and
  measurable acceleration from pilot to production funding.
problem:
  - Mid-sized investor-property lenders still onboard each new warehouse, takeout, or tokenized buyer through bespoke CSV tapes, diligence checklists, and email-heavy exception clearing.
  - Capital-markets and loan-ops teams become the manual integration layer because each counterparty wants different fields, concentration tests, and supporting documents before loans can fund.
  - As secondary liquidity becomes more recurring, the bottleneck shifts from finding capital to proving each loan is complete, eligible, and machine-readable on every delivery.
solution:
  - Build one canonical loan record from LOS exports, document stacks, and servicing fields for DSCR, bridge, and fix-and-flip loans.
  - Apply buyer-specific rulebooks for eligibility, concentration, and documentation, then open structured exception workflows with source-linked evidence instead of spreadsheet comments.
  - Generate a buyer-ready certification packet, machine-readable tape, and audit log so adding a funding program looks like activating another rail rather than starting a new onboarding project.
whyWeWin:
  - The company is neutral across many lenders and many buyers, while rails, warehouse platforms, and LOS vendors are structurally optimized for their own ecosystems.
  - The buying trigger is concrete and budgeted: a lender signs a new funding program and needs recurring delivery without adding operations headcount.
  - Defensibility compounds through reusable buyer rulebooks, lender field mappings, and exception-resolution data that make each additional counterparty faster to support.
strategicChoices:
  beachhead: U.S. residential investor lenders originating roughly $500M to $5B annually in DSCR, bridge, and fix-and-flip loans, already selling to multiple institutional buyers, and actively adding a new automated or tokenized funding channel.
  wedgeRationale: >-
    This slice has the clearest pain because it already runs enough volume to
    feel onboarding drag, but is still fragmented enough to need a neutral
    multi-buyer layer. It creates faster proof than selling to very small
    lenders, which lack urgency, or giant platforms, which are more likely to
    build internally.
  sequencingRationale: >-
    The company should first win one live funding-program deployment and prove
    repeated loan acceptance before broadening product scope. Product starts
    with canonical records, rulebooks, and exception clearing; GTM starts with
    founder-led design-partner sales into CMOs and COOs; hiring starts with
    engineering and implementation depth before channel partnerships. Only after
    recurring delivery is trusted should the company add warehouse reporting,
    securitization prep, and broader partner distribution.
  notYet:
    - Becoming a tokenization rail, capital provider, or loan marketplace
    - Serving owner-occupied agency mortgage workflows before investor-property proof exists
    - Expanding into post-purchase servicing-transfer and remittance automation before pre-purchase certification is repeatable
    - Supporting every buyer rulebook from day one instead of productizing a narrow DSCR and bridge template set
market:
  tam: $40.0M
  sam: $14.3M
  som: $3.6M
  segments:
    - Mid-sized U.S. investor-property lenders with multi-counterparty funding stacks
    - Funding platforms and private-credit buyers that need cleaner inbound DSCR and RTL loan data
  buyingProcess: >-
    The sale usually starts when a lender launches a new warehouse, takeout, or
    tokenized funding relationship and discovers its current tape and diligence
    workflow will not scale. The operational champion is capital markets or loan
    ops, but budget closes with the Chief Capital Markets Officer, COO, or head
    of secondary marketing because the ROI is fewer failed deliveries, faster
    onboarding, and less incremental headcount.
product:
  mvp: >-
    MVP is a narrow certification workflow for one lender, one to two buyer
    rulebooks, and the highest-frequency DSCR and bridge loan fields and
    documents. It must ingest source data, surface structured exceptions, and
    produce a buyer-ready packet with human approval on every pass-fail outcome.
  sixMonth: Ship canonical loan record, rulebook engine, exception queue, buyer-ready packet export, and integrations for the narrow LOS and document sources used by the first design partners.
  twelveMonth: Add reusable buyer templates, concentration-test coverage, audit-grade field traceability, and deployment playbooks that reduce time to a new funding-program launch below 90 days on supported stacks.
  twentyFourMonth: Expand from pre-delivery certification into warehouse reporting, securitization prep, servicing-transfer readiness, and portfolio surveillance for repeat customers.
  keyBets:
    - The first two or three buyer rulebooks will share enough reusable logic that implementation stays software-led rather than services-led.
    - Lenders will accept human-in-the-loop certification before they demand fully autonomous pass-fail decisions.
    - Delivery and exception data from the first cohort will become a defensible benchmark layer for expansion into adjacent private-credit workflows.
gtm:
  wedge: Sell a first deployment around one newly launched funding channel, replacing manual tape mapping and exception rework with a neutral certification layer that lets the lender deliver recurring volume without adding ops staff.
  channels:
    - Founder-led direct sales to Chief Capital Markets Officers, COOs, and heads of secondary marketing at investor-property lenders
    - Design-partner sales tied to lenders adding a new warehouse, takeout, or tokenized buyer in the next 12 months
    - Co-sell partnerships with warehouse lenders, funding platforms, and capital-markets advisers that benefit from cleaner inbound loan delivery
  funnelTargets: "Lead→qualified design partner 20–30%, qualified→paid pilot 30–40%, pilot→production funding program 50%+, production→second buyer program 40%+ within 12 months"
  pricing: >-
    Charge an onboarding fee for each new buyer rulebook and lender data map,
    then an annual platform fee priced by active funding programs plus funded-
    loan volume. This matches the customer's budgeting logic because the pain is
    triggered by a new funding channel and the value expands as recurring
    delivery volume and counterparty count grow.
businessModel:
  revenueStreams:
    - Onboarding and configuration fees for lender data mapping and new buyer rulebooks
    - Annual subscription tied to active funding programs
    - Volume-based fees on certified funded loans
    - Expansion modules for warehouse reporting, securitization prep, and surveillance workflows
  unitOfValue: Active funding program with certified recurring loan delivery
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one buyer program to the lender's full funding stack
    - Add more rulebooks and templates for additional DSCR and bridge counterparties
    - Move upstream into onboarding and downstream into reporting once certification is embedded
    - Sell cleaner inbound certification workflows to funding platforms and private-credit buyers
strategyMap:
  northStarMetric: Funded loans delivered through the platform without buyer rework
  inputMetrics:
    - Days from signed design partner to first certified production delivery
    - Percentage of loans accepted on first submission
    - Median exception resolution time by buyer program
    - Paid pilot to production conversion rate
    - Expansion from first buyer program to second buyer program within an account
  moatsToBuild:
    - Buyer-specific rulebook and document-requirement library for DSCR and bridge workflows
    - Lender-to-canonical-field mappings with source-evidence traceability
    - Exception and fallout dataset showing which defects delay funding by counterparty and product type
  killCriteria:
    - Fewer than 3 paid design partners sign within 9 months despite a focused pipeline of lenders adding new channels
    - Less than 50% of encoded buyer logic is reusable across the first 3 live rulebooks, making implementation too services-heavy
    - Pilot to production conversion stays below 30% or buyers still require full parallel diligence after certification
  mermaid: |
    flowchart LR
      Wedge[Beachhead funding-program wedge] --> MVP[Certification MVP]
      MVP --> Proof[First accepted recurring deliveries]
      Proof --> Expansion[Multi-buyer and reporting expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear workflow wedge and strong timing signal, but not enough evidence yet that the beachhead is large enough or that neutral certification will be trusted by non-incumbent buyers.
    whyBelieve: The company addresses a concrete buyer-triggered bottleneck in a live and increasingly standardized investor-lending workflow where adjacent vendors already sell speed, control, and data quality.
    whyDoubt: The narrow initial market is modest and the hardest proof point, buyer trust in third-party certification across multiple counterparties, is still an explicit open question in the research.
    nextDiligence: Validate with 5 to 10 lenders and several counterparties that a neutral packet shortens onboarding or acceptance time enough to support paid production deployments.
  firstCustomer:
    title: Multi-counterparty investor-property lender launching a new funding channel
    profile: A U.S. lender originating $1B+ of DSCR and bridge loans annually, already delivering to three or more institutional counterparties, with capital-markets staff manually managing tapes and exceptions.
    trigger: The lender signs a new warehouse, takeout, or tokenized funding program and realizes its current delivery workflow will require more ops headcount to support recurring submissions.
    buyer: Chief Capital Markets Officer
    initialContract: Paid first-program deployment worth roughly $60k to $120k including onboarding, converting to $150k to $300k annualized software and volume revenue as 3 to 5 buyer programs move onto the platform.
  mustBeTrue:
    - Lenders adding a new funding channel will pay for a neutral control layer before they consolidate on one rail or warehouse platform.
    - At least one non-incumbent buyer will accept the certification packet as enough to reduce duplicate diligence work.
    - The first 3 buyer rulebooks will share sufficient reusable logic to preserve software-like gross margins.
    - A first deployment can reach recurring production delivery in less than 90 days on supported source systems.
    - The product can expand from pre-delivery certification into adjacent reporting and surveillance workflows without losing its neutral positioning.
  diligenceQuestions:
    - Which exact DSCR and bridge exception categories create the most frequent buyer fallout today?
    - How much of the customer's pain is data normalization versus buyer-side policy ambiguity?
    - Which counterparties would trust a third-party certification packet enough to change their current diligence process?
    - What implementation burden sits in lender integrations versus buyer rulebook encoding?
    - How many lenders in the beachhead are adding new funding channels each year?
operatingAssumptions:
  - assumption: Lenders will buy an independent certification layer before they commit all recurring flow to a single rail or warehouse partner.
    basis: research.yaml
    validationTest: Interview 10 target lenders with a live channel-launch project and require at least 5 to rank neutral multi-buyer control above bundled single-counterparty tooling.
    decisionImpact: If false, the company should reposition as embedded infrastructure for one class of partner rather than an independent network layer.
  - assumption: The first 3 buyer rulebooks can be encoded with at least 50% reusable logic across field mapping, eligibility checks, and document requirements.
    basis: research.yaml
    validationTest: Encode 3 live rulebooks and measure reusable versus bespoke logic by rule count and implementation hours.
    decisionImpact: If false, onboarding becomes too services-heavy and the company must narrow asset scope or raise prices materially.
  - assumption: Buyers will accept human-reviewed certification packets as operationally useful before they require fully automated decisioning.
    basis: operator judgment
    validationTest: Run parallel deliveries with 2 counterparties and require measurable reduction in comment rounds, acceptance time, or failed submissions on certified loans.
    decisionImpact: If false, the product remains internal workflow software and loses part of its cross-network moat.
  - assumption: A lender can go live on one funding program in under 90 days using existing LOS exports, document stacks, and manual fallback inputs.
    basis: idea.yaml
    validationTest: Time the first 5 implementations from signed contract to first recurring certified delivery and require at least 4 to go live within 90 days.
    decisionImpact: If false, sales cycles lengthen, services costs rise, and the business likely needs a larger seed round earlier.
  - assumption: Expansion into warehouse reporting and securitization prep is a credible second act for the same customer base.
    basis: idea.yaml
    validationTest: In 8 customer discovery calls, require at least 5 production-designated prospects to rank one adjacent workflow as a budgeted next purchase if certification succeeds.
    decisionImpact: If false, the narrow beachhead may not support venture outcomes and investor posture should remain cautious.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Recruit 5 design partners that are launching a new funding channel within the next 12 months.
    hypothesis: Trigger-timed accounts will engage faster and provide clearer proof than generic lender prospects.
    successMetric: 5 signed design partners, with at least 3 paid and each tied to a named channel-launch deadline.
    owner: CEO
  - horizon: 0–90 days
    experiment: Encode 2 buyer rulebooks and one canonical DSCR loan record with source-linked evidence.
    hypothesis: A narrow template set will cover enough of the first workflow to demonstrate reusable implementation logic.
    successMetric: At least 50% reusable logic across the first 2 rulebooks and successful packet generation on sample loans.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run parallel pilot deliveries for certified versus manual submissions with the first counterparties.
    hypothesis: Certified deliveries will reduce comment rounds and time to accepted submission.
    successMetric: 25% faster acceptance time or 30% fewer exception iterations on pilot loans versus baseline manual process.
    owner: Product and implementation lead
  - horizon: 90–180 days
    experiment: Test pricing across first-program onboarding, annual platform fee, and volume tiers.
    hypothesis: Customers will accept a program-plus-volume pricing model because it mirrors the trigger and scales with usage.
    successMetric: 3 production contracts signed with $150k+ expected first-year contract value including onboarding.
    owner: CEO
  - horizon: 180–365 days
    experiment: Launch a second buyer program inside at least 2 production accounts.
    hypothesis: Expansion within the same lender will close faster than net-new acquisition once canonical records and workflows are in place.
    successMetric: 2 accounts activate a second buyer program in less than half the sales cycle of the first deployment.
    owner: Revenue lead
  - horizon: 180–365 days
    experiment: Pilot an adjacent warehouse-reporting or securitization-prep module with existing customers.
    hypothesis: The same source-of-truth data model can support a second paid workflow without undermining the narrow beachhead.
    successMetric: 2 customers agree to paid expansion or contracted roadmap commitments for an adjacent module.
    owner: Product lead
operations:
  - Standardize onboarding around canonical field mapping, buyer rulebook intake, document-source inventory, and exception taxonomy before adding custom features.
  - Keep every pass-fail output traceable to source fields and documents so certification errors can be audited and disputed cleanly.
  - Maintain human approval on certification until buyer trust and exception-frequency data support more automation.
  - Treat security, privacy controls, and permissioning as part of the product, not a later compliance layer, because borrower information crosses multiple counterparties.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build canonical data model, rule engine, packet generation, and first integrations across lender source systems.
  - role: Product and implementation lead
    startTiming: Month 0
    rationale: Translate live capital-markets workflows into a narrow product and keep early deployments from turning into bespoke services projects.
  - role: Capital-markets domain specialist
    startTiming: Month 3
    rationale: Encode buyer rulebooks, validate exception workflows, and support the first production deliveries with lender and counterparty credibility.
  - role: Security and customer success lead
    startTiming: Month 9
    rationale: Own privacy reviews, permissioning, audit controls, and production expansion as the first accounts move from pilot to recurring use.
  - role: Partnerships and revenue lead
    startTiming: Month 12
    rationale: Build co-sell motions with warehouse lenders, funding platforms, and advisers after repeatable deployment proof exists.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 5 to 10 design partners in the investor-property lender beachhead
      - Ship MVP for one canonical loan record, 2 to 3 buyer rulebooks, and structured exception handling
      - Convert at least 3 paid pilots into recurring production delivery
      - Demonstrate first-submission acceptance improvement versus manual baseline
  - horizon: 12–24 months
    items:
      - Reduce deployment time below 90 days on supported stacks
      - Expand at least 2 customers from one buyer program to multiple programs
      - Launch first adjacent workflow in warehouse reporting or securitization prep
      - Establish 2 to 3 co-sell or referral partners tied to live counterparties
  - horizon: 24–36 months
    items:
      - Build a reusable DSCR and bridge rulebook library across a meaningful buyer set
      - Reach repeatable expansion revenue from adjacent reporting and surveillance modules
      - Demonstrate cross-account benchmark data on exception patterns and delivery speed
      - Decide whether to remain a neutral network layer or embed deeper with selected funding partners
risks:
  - risk: Buyer rulebooks vary so much that onboarding becomes a services business.
    likelihood: High
    impact: High
    mitigation: Start with a narrow DSCR and bridge template set, measure reusable logic explicitly, and refuse long-tail custom buyers until core patterns are productized.
  - risk: Buyers may still run full parallel diligence and not trust third-party certification.
    likelihood: High
    impact: High
    mitigation: Use human-reviewed packets, run parallel pilots with measurable cycle-time improvements, and focus first on buyers with visible scaling pressure.
  - risk: Rail operators, warehouse partners, or LOS vendors may bundle enough onboarding to block an independent vendor.
    likelihood: Medium
    impact: High
    mitigation: Win where customers need neutrality across multiple counterparties and build differentiated value in cross-network exception intelligence rather than mapping alone.
  - risk: Privacy, licensing, and data-security reviews may lengthen sales cycles.
    likelihood: Medium
    impact: Medium
    mitigation: Ship auditable permissions, data-boundary controls, and source-traceable records from day one, and prioritize accounts already used to eMortgage-style digital workflows.
  - risk: The narrow beachhead may not support venture outcomes if adjacent expansion does not materialize.
    likelihood: Medium
    impact: High
    mitigation: Treat adjacent workflow demand as a board-level experiment by year 2 and maintain a candid investor posture until expansion pull is proven.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: Build the core certification product, fund 5 to 10 design-partner deployments, prove reusable buyer rulebooks and paid production conversions, and establish the security and implementation base needed for multi-buyer expansion.
