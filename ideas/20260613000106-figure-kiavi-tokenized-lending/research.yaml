  sensitivityCases:
  - case: Rails bundle enough onboarding
    impact: If Figure and similar rails make originator standardization “good enough” inside their ecosystems, the startup must win by being buyer-neutral and multi-channel rather than by offering basic mapping alone.
    sourceRefs:
