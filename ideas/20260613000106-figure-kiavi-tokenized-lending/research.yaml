market:
  tam:
    value: $40.0M
    rationale: 'Model annual software value as 2 basis points of the $200B investor-property origination opportunity Figure cited for RTL and DSCR flow. Calc: $200B × 0.02% = $40.0M; cross-checks reasonably against NPLA''s ~$118.8B annualized Q1 2026 private-lending run rate and Urban''s evidence of a large, institutionalized RTL market.'
    isEstimate: true
    sourceRefs:
    - 1
    - 10
    - 13
  sam:
    value: $14.3M
    rationale: 'Constrain TAM to the beachhead of mid-sized multi-counterparty lenders. Assume 60% of NPLA''s annualized $118.8B DSCR+RTL run rate sits with lenders large enough to need repeatable buyer onboarding. Calc: $118.8B × 60% × 0.02% = $14.3M.'
    isEstimate: true
    sourceRefs:
    - 10
    - 13
  som:
    value: $3.6M
    rationale: Year-3 reachable share modeled as 15 lenders × $1.2B average eligible annual volume × 0.02% certification value. This assumes the company lands a narrow slice of the scaled investor-lender set rather than the whole market.
    isEstimate: true
    sourceRefs:
    - 5
    - 9
    - 34
