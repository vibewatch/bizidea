reportMemo:
  executiveTakeaways:
  - 'Figure’s Kiavi acquisition is strong evidence that tokenized investor-property lending has moved from concept to operational rollout: the company cited a $200B annual origination opportunity, $7B of added first-lien flow, $100M+ monthly Democratized Prime volume, and Adaptor as the first-originator standardization layer. [1][4][8][9]'
  - The startup wedge is credible because the bottleneck has shifted from finding capital to normalizing loan data, validating eligibility, and packaging audit-ready evidence across multiple funding counterparties. MISMO, ULDD, Loan Closing Advisor, and ICE’s developer tooling show the industry is already standardizing machine-readable data, but not buyer-specific pass/fail certification. [17][18][20][21][35]
  - Competition is real but fragmented across rails, underwriting automation, warehouse platforms, and capital-markets ops software. No retained source clearly shows an independent vendor already owning neutral, multi-buyer certification for DSCR/RTL deliveries headed to both traditional and tokenized outlets. [2][24][27][33][34]
  marketDefinition: '[1][10][13][17][20][24] The relevant market is workflow software that converts DSCR, bridge, and fix-and-flip originations into buyer-ready certified loan packets for warehouse lenders, private-credit buyers, securitization prep, and tokenized funding rails. The job is narrower than LOS or underwriting: normalize originator data, apply buyer-specific rules, resolve exceptions, and evidence why each loan is deliverable.'
  customerAndBuyer: '[5][9][19][24][25][27] Daily users are capital-markets, secondary-marketing, and loan-ops teams at U.S. investor-property lenders. The economic buyer is usually the Chief Capital Markets Officer, COO, or head of secondary marketing because the pain surfaces as delayed fundings, extra headcount, missed buyer SLAs, and slower onboarding of new funding channels.'
  buyingTriggers:
  - point: A lender signs a new warehouse, takeout, or tokenized funding relationship and discovers its current tape, document, and exception process cannot support recurring delivery without more people.
    sourceRefs:
    - 1
    - 19
    - 24
    - 27
  - point: eMortgage and GSE-style data standards raise expectations for machine-readable delivery, making ad hoc spreadsheets look increasingly non-compliant and slow.
    sourceRefs:
    - 17
    - 18
    - 20
    - 21
    - 35
  - point: Institutional investor appetite for RTL and DSCR credit remains strong, so growth is gated more by originator readiness and loan quality than by demand.
    sourceRefs:
    - 10
    - 13
  willingnessToPay:
    summary: Budget likely sits in capital-markets ops, warehouse onboarding, or loan-manufacturing transformation rather than an experimental blockchain line item. Adjacent vendors already sell underwriting automation, reporting, and funding-workflow tooling on the promise of faster closings, fewer defects, and less manual labor, which implies room for a high-trust certification layer. [21][27][33][34]
    sourceRefs:
    - 21
    - 27
    - 33
    - 34
  competitiveLandscape: '[2][4][24][27][33][34] The field is crowded with adjacent tools rather than direct substitutes. Figure owns a rail-and-liquidity narrative, Candor automates loan manufacturing and QC, warehouse platforms bundle reporting and transaction processing, and Setpoint targets capital-markets operations. The white space is the neutral control layer that sits across many buyers and many lenders, not inside one rail or one warehouse line.'
  incumbentThesis:
  - incumbentClass: Blockchain rails
    point: Rail operators like Figure can embed onboarding helpers, but their economic center is maximizing flow on their own network rather than acting as a neutral referee across every counterparty and data schema.
    sourceRefs:
    - 1
    - 2
    - 4
  - incumbentClass: Mortgage manufacturing automation
    point: Candor-class vendors reduce underwriting and QC work, but the retained evidence centers on borrower manufacturing and loan quality, not multi-buyer delivery certification for investor-property capital markets.
    sourceRefs:
    - 33
  - incumbentClass: Warehouse and correspondent platforms
    point: FirstFunding and warehouse lenders can streamline funding and reporting for their own facilities, yet they are structurally tied to a specific funding partner model rather than a cross-buyer certification graph.
    sourceRefs:
    - 19
    - 24
    - 27
    - 28
  - incumbentClass: Capital-markets operations platforms
    point: Setpoint improves diligence, reporting, and funding speed, but its positioning is broader capital-operations enablement rather than a DSCR/RTL rulebook engine that every buyer trusts as source of truth.
    sourceRefs:
    - 34
  regulatoryLandscape: '[14][15][16][23][29][30][31][32] The product lives inside existing mortgage and capital-markets rules, not outside them. Regulation C and HMDA establish loan-level reporting expectations; Regulation P limits sharing of nonpublic borrower information; Regulation X governs core mortgage-process obligations; and tokenization guidance from OCC and related agencies makes clear that moving a security or loan representation onto a new rail does not remove the underlying legal perimeter.'
  technologyLandscape: '[4][17][18][20][21][35][36] The stack is ready for this wedge. MISMO provides the common data language, SMART Docs and eVault rules make digital evidence portable, Freddie Mac already expects standardized delivery and closing data, and API portals from ICE and Freddie signal a more integration-friendly mortgage infrastructure. Figure’s own Adaptor messaging shows the missing layer is originator-to-buyer normalization, not core database plumbing.'
  distributionChannels:
  - point: Founder-led enterprise sales into CMOs, COOs, and secondary-marketing leaders at investor lenders already juggling multiple warehouse or takeout relationships.
    sourceRefs:
