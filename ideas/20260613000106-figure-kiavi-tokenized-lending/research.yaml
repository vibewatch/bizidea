competitors:
- name: Figure Connect / Adaptor
  stage: incumbent
  wedge: Blockchain-native funding rail plus originator onboarding for Figure's own marketplace and Democratized Prime.
  pricing: Not public
  strength: Owns buyer liquidity, tokenized-rail narrative, and the strongest named standardization use case in this market.
  weaknessVsUs: Optimized for Figure's ecosystem rather than neutral certification across many buyers and legacy channels.
  sourceRefs:
  - 1
  - 2
  - 4
- name: Candor Technology
  stage: scale-up
  wedge: AI underwriting, fulfillment, and loan-quality automation across mortgage manufacturing.
  pricing: Not public
  strength: Deep automated decisioning and QC credibility in mortgage operations.
  weaknessVsUs: Centred on manufacturing and loan quality, not investor-property capital-markets delivery and counterparty-specific certification.
  sourceRefs:
  - 33
- name: Setpoint
  stage: scale-up
  wedge: Capital-markets OS for funding, diligence, calculation-agent, and reporting workflows.
  pricing: Not public
  strength: Strong operations automation story for warehouse and securitization processes.
  weaknessVsUs: Broader capital-ops platform, not a DSCR/RTL-specific neutral rulebook and exception-clearing rail.
  sourceRefs:
  - 34
- name: FirstFunding
  stage: incumbent
  wedge: Warehouse lending facility plus transaction processing, reporting, and correspondent enablement tools.
  pricing: Not public
  strength: Embedded funding relationship and proprietary workflow tools tied to real warehouse activity.
  weaknessVsUs: Bound to one funding model and does not solve multi-buyer certification across lenders, funds, and tokenized programs.
  sourceRefs:
  - 27
  - 28
