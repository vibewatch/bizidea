openQuestions:
- Which buyer-specific fields, documents, or concentration tests create the highest exception rates in live DSCR and RTL deliveries?
- How much of today's onboarding pain sits in lender-side data normalization versus buyer-side diligence policy ambiguity?
- Who ultimately owns servicing-transfer, remittance, and post-purchase reporting logic when loans move from originator to tokenized or JV-backed funding programs?
- Will non-Figure buyers accept a neutral third-party certification packet as authoritative enough to shorten their own diligence workflows?
