  validationPlan:
  - priority: high
    question: Which tape fields, document defects, or concentration tests cause the most frequent buyer exceptions in DSCR and RTL deliveries today?
    evidenceToGather: Collect anonymized rejection logs from three lenders and two funding counterparties, then rank exception categories by frequency and dollar impact.
  - priority: high
    question: Will lenders buy a neutral control layer before they commit all flow to one rail or one warehouse platform?
    evidenceToGather: Run five design-partner interviews with lenders adding a new channel in the next 12 months and compare appetite for independent control versus bundled tools.
  - priority: medium
    question: How much of each buyer rulebook can be productized before services work dominates gross margin?
    evidenceToGather: Encode three live buyer rulebooks and measure reusable versus bespoke logic by category.
