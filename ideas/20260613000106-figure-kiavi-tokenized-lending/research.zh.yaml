      - 27
      - 33
      - 34
  pestle:
  - factor: political
    impact: neutral
    point: 美国监管机构并未直接禁止代币化资产，但他们在强调代币化仍在现有监管和资本框架之内运行。
    sourceRefs:
    - 29
    - 30
    - 39
  - factor: economic
    impact: positive
    point: 即使发起组合随利率变化，投资者对住宅信贷的需求仍保持持久，贷款机构不断承压开辟更多资金渠道，同时不扩张运营团队。
    sourceRefs:
    - 10
    - 13
    - 37
    - 38
  - factor: social
    impact: neutral
    point: 可负担性压力和贷款拒绝率将更多家庭留在租赁渠道，间接支撑投资性住房金融的长期相关性。
    sourceRefs:
    - 38
    - 40
  - factor: technological
    impact: positive
    point: MISMO、电子抵押标准、API 和结算数据验证工具意味着行业对机器可读抵押工作流越来越坦然接受。
    sourceRefs:
    - 17
    - 18
    - 20
    - 21
    - 35
    - 36
  - factor: legal
    impact: negative
    point: 任何在交易对手之间传递借款人和房产文件的平台，都必须满足多个监管机构的隐私、许可和账本记录预期。
    sourceRefs:
    - 14
    - 15
    - 16
    - 31
    - 32
  - factor: environmental
    impact: neutral
    point: "最大的气候关联是间接的：老旧住房存量和翻新经济学有助于维持过渡性贷款需求，但环境因素并非本软件的购买触发条件。"
    sourceRefs:
    - 9
    - 13
  adoptionFrictionMatrix:
  - friction: 买方规则集本身不具备机器可读性
    severity: high
    affectedBuyer: 首席资本市场官
    mitigation: 先用窄口规则模板体系加人工审批回退，而非直接追求完全自主认证。
    sourceRefs:
    - 1
    - 4
    - 20
  - friction: 借款人和房产数据分散于 LOS 导出、文件和仓储核查表之间
    severity: high
    affectedBuyer: 贷款运营负责人
    mitigation: 先建立标准化记录，再为每个认证字段附上源凭据链接。
    sourceRefs:
    - 17
    - 20
    - 21
    - 24
  - friction: 交易对手可能偏好自有门户或捆绑工具
    severity: medium
    affectedBuyer: COO / 采购负责人
    mitigation: 以多买方 ROI 叙事打头阵，证明一个认证层能降低跨渠道的总接入成本。
    sourceRefs:
    - 2
    - 27
    - 34
  - friction: 隐私和许可审查拖慢采购
    severity: medium
    affectedBuyer: 合规 / 法务负责人
    mitigation: 从第一天起交付权限管理、审计日志和清晰的数据边界控制。
    sourceRefs:
    - 15
    - 29
    - 31
market:
  tam:
    value: $40.0M
    rationale: "将年软件价值建模为 Figure 援引的 $2000 亿 RTL 和 DSCR 发起机会的 2 个基点。计算：$2000 亿 × 0.02% = $4000 万；与 NPLA 2026 年第一季度年化约 $1188 亿私人贷款规模及 Urban Institute 对大型机构化 RTL 市场的证据交叉验证合理。"
    isEstimate: true
    sourceRefs:
    - 1
    - 10
    - 13
  sam:
    value: $14.3M
    rationale: "将 TAM 收窄至多交易对手中型贷款机构的滩头市场。假设 NPLA 年化 $1188 亿 DSCR+RTL 规模中 60% 来自足够大、需要可重复买方接入的贷款机构。计算：$1188 亿 × 60% × 0.02% = $1430 万。"
    isEstimate: true
    sourceRefs:
    - 10
    - 13
  som:
    value: $3.6M
    rationale: 第 3 年可触达份额建模为 15 家贷款机构 × 平均 $12 亿符合条件的年发起量 × 0.02% 认证价值。这假设公司赢得规模化投资性贷款机构集合的窄口份额，而非整个市场。
    isEstimate: true
    sourceRefs:
    - 5
    - 9
    - 34
