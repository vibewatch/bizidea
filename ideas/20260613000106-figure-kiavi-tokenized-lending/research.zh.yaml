    - 17
    - 18
    - 20
    - 35
  - point: 投资者购房份额在结构上保持显著，即使在利率压力下，DSCR 和 RTL 工作流依然相关。
    sourceRefs:
    - 37
    - 38
  headwinds:
  - point: 过桥贷款和 DSCR 的组合可能随利率和房产经济随时间波动，在不同产品类型间转移最紧迫的工作流痛点。
    sourceRefs:
    - 10
    - 11
    - 12
    - 37
  - point: 大型轨道或资金合作伙伴可能试图将接入保留在自身生态系统内，降低独立供应商的紧迫性，除非后者能证明跨渠道 ROI。
    sourceRefs:
    - 1
    - 2
    - 27
competitors:
- name: Figure Connect / Adaptor
  stage: incumbent
  wedge: 区块链原生资金轨道，加上面向 Figure 自有市场和 Democratized Prime 的发起方接入。
  pricing: Not public
  strength: 拥有买方流动性、代币化轨道叙事，以及该市场中命名最响亮的标准化应用场景。
  weaknessVsUs: 为 Figure 生态系统优化，而非跨多个买方和传统渠道的中立认证。
  sourceRefs:
  - 1
  - 2
  - 4
- name: Candor Technology
  stage: scale-up
  wedge: 贯穿抵押制造的 AI 承保、履约和贷款质量自动化。
  pricing: Not public
  strength: 抵押运营中深度自动化决策和 QC 公信力。
  weaknessVsUs: 专注于制造和贷款质量，而非投资性房产资本市场交付和交易对手专属认证。
  sourceRefs:
  - 33
- name: Setpoint
  stage: scale-up
  wedge: 资金、尽职调查、计算代理和报告工作流的资本市场操作系统。
  pricing: Not public
  strength: 仓储和证券化流程的强运营自动化叙事。
  weaknessVsUs: 更宽泛的资本运营平台，而非每个买方都信任的 DSCR/RTL 专属规则集和例外清除轨道。
  sourceRefs:
  - 34
- name: FirstFunding
  stage: incumbent
  wedge: 仓储贷款设施，加上交易处理、报告和代理银行赋能工具。
  pricing: Not public
  strength: 嵌入式资金关系和与真实仓储活动挂钩的专有工作流工具。
  weaknessVsUs: 绑定单一资金模式，无法解决跨贷款机构、基金和代币化计划的多买方认证问题。
  sourceRefs:
  - 27
  - 28
regulatoryTechnicalConstraints:
- point: 任何跨交易对手的工作流都必须依据 Regulation P 及相关抵押流程规则处理非公开借款人信息。
  sourceRefs:
  - 15
  - 16
- point: 抵押数据仍必须符合 HMDA 和 ULDD 等既有报告和交付模式，即使资金轨道持续演进。
  sourceRefs:
  - 14
  - 20
  - 23
- point: 若法律权利不变，代币化不改变资产的底层法律处理方式——"上链"不免除合规工作。
  sourceRefs:
  - 29
- point: 由于抵押发起和非银行贷款跨多个司法管辖区受监管，州级许可和监管预期仍然相关。
  sourceRefs:
  - 31
  - 32
validationSignals:
- point: Figure 明确将通过 Adaptor 进行发起方数据标准化定为将 Kiavi 资产迁移至其轨道时首个要产品化的工作流。
  sourceRefs:
  - 1
  - 4
- point: NPLA 报告创纪录的第一季度私人贷款表现，同时指出制约因素是高质量 RTL 供给，而非投资者需求。
  sourceRefs:
  - 10
- point: Freddie 和 MISMO 已要求或支持机器可读的贷款、结算和电子抵押工件，降低认证层的集成门槛。
  sourceRefs:
  - 17
  - 18
  - 20
  - 21
- point: Setpoint 和 FirstFunding 都以更快资金和报告工作流为卖点，表明相邻步骤中买方为运营速度付费的意愿。
  sourceRefs:
  - 27
  - 34
openQuestions:
- 哪些买方专属字段、文件或集中度测试在当前实际 DSCR 和 RTL 交付中造成最高例外率？
- 当今接入痛苦中有多少来自贷款机构侧数据标准化，有多少来自买方侧尽职调查政策模糊？
- 当贷款从发起方迁移至代币化或合资背书的资金计划后，购后服务转移、还款和报告逻辑最终归谁所有？
- 非 Figure 买方是否会接受第三方认证包作为权威，从而缩短自身尽职调查工作流？
