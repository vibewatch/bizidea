problem: >-
  中型住宅投资性房产贷款机构仍通过定制化贷款清单、尽职调查核查表和一次性买方接入项目来出售 DSCR、过桥和翻修转售贷款。每个新仓储贷款机构、退出买方或代币化资金轨道所要求的数据字段、资格逻辑和例外凭据各不相同，于是资本市场团队被迫手工充当整合层。随着更多私募信贷流量迁移至共享轨道，瓶颈从寻找贷款转移为——在资金到位前证明每笔贷款完整、合规且机器可读。
targetUser:
  primary: 美国住宅投资性房产贷款机构的资本市场主管和贷款运营主管，为 SFR 投资者发起 DSCR、过桥或翻修转售贷款
  secondary: 负责贷款清单交付、买方尽职调查和例外清除的接入经理和二级市场分析师
  buyer: 首席资本市场官、COO 或二级营销主管
startupThesis:
  nonObviousInsight: >-
    有价值的创业公司不是又一个代币化发行方或贷款市场平台。一旦买方愿意通过新轨道为投资性房产贷款提供资金，稀缺层就变成了一个中立的认证系统——将杂乱的发起方数据和抵押文件转化为买方就绪、机器可读的贷款包，附带可审计的资格决策。
  beachhead: >-
    美国住宅投资性房产贷款机构，年发起量 $5 亿至 $50 亿的 DSCR、过桥和翻修转售贷款，向多个机构退出买方或仓储机构出售，并正在测试代币化资金或二级出售计划
  wedge: >-
    一条贷款认证与接入轨道——标准化发起方数据、核查买方专属资格规则、打包支撑凭据，并在贷款发布至代币化资金或私募信贷买方计划前清除例外条目
  whyNowCatalyst: >-
    Figure 的收购表明投资性房产贷款正从定制化二级出售迁移至区块链关联的资金轨道，且公司明确将发起方数据标准化定为必须首先解决的工作流。
  ventureScalePath: >-
    从投资性房产贷款接入起步，向仓储额度报告、证券化准备、服务转移就绪、绩效监控，以及私募信贷资产分发的跨贷款机构运营层逐步扩展。
solution: >-
  该产品位于贷款机构的 LOS、文件堆栈与买方目的地（仓储机构、私募信贷基金、代币化资金计划）之间。它从发起方导出、房产和借款人文件及服务字段中构建一条标准化贷款记录，再将该记录与每个买方的资格、集中度和文件规则进行比对。当数据缺失或矛盾时，系统针对具体字段、文件或政策冲突开启结构化例外流程，而非再发一轮电子表格批注。贷款通过时，生成买方就绪的认证包、机器可读的贷款清单和审计日志。新资金计划的接入由此变得像激活另一条轨道，而非重新启动一个接入项目。
goToMarketSeed:
  firstCustomer: >-
    年发起量逾 $10 亿 DSCR 和过桥贷款、三个以上机构资金交易对手、并计划在未来 12 个月内增加代币化或更自动化二级出售渠道的美国投资性房产贷款机构
  buyingTrigger: >-
    贷款机构签署新仓储、退出或区块链关联资金计划，发现现有贷款清单和尽职调查流程无法在不增加运营人手的情况下支撑定期交付
  currentAlternative: >-
    内部资本市场运营团队使用定制 CSV 贷款清单、尽职调查电子表格、SFTP 传输、共享收件箱和针对各交易对手的服务团队，重新处理每次交付
  switchingReason: >-
    首个客户之所以切换，是因为产品能将数月买方接入压缩为可重复的控制层、减少交付失败，让贷款机构无需每次重建贷款清单和例外流程即可新增资金渠道
  pricingHypothesis: >-
    按活跃资金计划数和已放款贷款规模定价的年平台费，加上每个新买方规则集和数据映射的接入费
