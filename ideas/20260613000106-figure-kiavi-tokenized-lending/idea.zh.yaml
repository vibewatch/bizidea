topRisks:
  - name: 交易对手碎片化
    description: 仓储贷款机构、基金和代币化计划的买方规则集差异可能大到使落地变成重服务型业务。
    mitigation: 从单一资产类别和少量重复买方模板起步，在扩大覆盖范围前先将最常见的资格和文件模式产品化。
  - name: 数据质量责任风险
    description: 若发起方源数据不一致，即便错误来自贷款机构，该创业公司也可能被追究认证错误的责任。
    mitigation: 让每个认证字段都可追溯至源数据，清晰展示置信度和例外状态，并在所有通过/拒绝决策上保留人工审批。
  - name: 现有渠道被大厂捆绑
    description: 一旦应用场景得到验证，Figure、主要仓储贷款机构或 LOS 供应商可能捆绑基础接入工具。
    mitigation: 以跨交易对手的中立多买方控制层取胜，在任何单一轨道或贷款机构都难以自然积累的跨网络例外情报中建立差异化价值。
