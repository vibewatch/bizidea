    - 清除交付例外并生成认证包
    - 按资金渠道对交付速度和落单率进行基准测试
  keyPartners:
    - 仓储贷款机构和私募信贷买方
    - LOS、服务和文件系统集成商
    - 证券化、尽职调查和资本市场咨询机构
  costStructure:
    - 集成和工作流工程
    - 客户落地和资本市场支持
    - 投资性房产贷款和二级市场领域专家
    - 企业销售和合作伙伴关系
jobsToBeDone:
  - job: >-
      当我们新增一个资金买方或仓储额度时，请帮助我们的资本市场团队将发起数据转化为买方就绪的认证贷款包，让我们无需新建电子表格项目即可开始交付规模。
    currentAlternative: 手工贷款清单映射、尽职调查核查表和基于邮件的例外清除
    successMetric: 新渠道首笔放款的天数，以及首次提交即被接受的贷款比例
  - job: >-
      当买方拒绝或质疑某笔贷款时，请帮助我们的运营团队快速定位缺失字段、文件或政策冲突，在放款滑单前完成例外修复。
    currentAlternative: 二级市场分析师跨 LOS 导出、文件和买方批注追溯错误
    successMetric: 例外解决时间，以及失败或延迟贷款交付的减少幅度
