slug: investor-loan-certification-rail
date: '2026-06-13'
currency: USD
modelStartMonth: '2026-07'
assumptions:
  - id: A1
    name: 模型起始月
    value: '2026-07'
    unit: month
    source: "[BP date] 基准情景假设 pre-seed 完成后次月开始运营支出。"
  - id: A2
    name: pre-seed 完成后起始现金
    value: '2.4'
    unit: USDM
    source: "[BP fundingAsk targetFundingRangeUsd $2–4M；BP runwayMonths 18] 基准情景取中低区间 pre-seed，目标覆盖 12–24 个月里程碑并预留 6 个月缓冲。"
  - id: A3
    name: 活跃贷款机构账户的年度混合收入
    value: '270.0'
    unit: USDK per customer-year
    source: "[BP firstCustomer initialContract $60k–$120k 及 $150k–$300k 年化扩展；BP businessModel revenueStreams] 使用混合 ACV，假设一个在线计划加部分接入费、规模费和成熟账户的第二计划扩展。"
  - id: A4
    name: 毛利率
    value: '70'
    unit: percent
    source: "[BP businessModel targetGrossMarginPct]"
  - id: A5
    name: 第 1 年月末客户数
    value: "0, 0, 0, 1, 1, 1, 1, 1, 2, 2, 3, 3"
    unit: count
    source: "[BP milestones 0–12 个月] 将 3 个付费试点转生产的目标转化为保守的逐月爬坡。"
  - id: A6
    name: 第 2 年季末客户数
    value: "Q1Y2 4; Q2Y2 5; Q3Y2 6; Q4Y2 7"
    unit: count
    source: "[BP milestones 12–24 个月] 假设客户数稳步增长，同时至少 2 个客户扩展至多个买方计划，部署时间降至 90 天以内。"
  - id: A7
    name: 第 3 年季末客户数
    value: "Q1Y3 8; Q2Y3 10; Q3Y3 12; Q4Y3 12"
    unit: count
    source: "[Research SOM 第 3 年 15 家贷款机构；BP risks 窄口滩头] 基准情景低于研究 SOM 上限，假设增速在公司接近可触达贷款机构集时放缓。"
  - id: A8
    name: 月度流失率
    value: '1.8'
    unit: percent
    source: "[BP investorMemo whyDoubt；初创财务惯例] 因买方信任和多计划粘性尚未得到验证，使用保守的早期企业流失率。"
  - id: A9
    name: 创始人/CEO 全成本现金薪酬
    value: '120.0'
    unit: USDK per year
    source: "[BP gtm 创始人主导直销；BP experimentRoadmap owner CEO] 受监管工作流初创公司创始人低于市场水平薪资的初创财务惯例。"
  - id: A10
    name: 创始工程师全成本现金薪酬
    value: '192.0'
    unit: USDK per year
    source: "[BP team 创始工程师] 高级产品和集成工程现金薪酬加社保负担的初创财务惯例。"
  - id: A11
    name: 产品与落地负责人全成本现金薪酬
    value: '168.0'
    unit: USDK per year
    source: "[BP team 产品与落地负责人] 集产品、落地和工作流负责人于一体的初创财务惯例。"
  - id: A12
    name: 资本市场领域专家全成本现金薪酬
    value: '144.0'
    unit: USDK per year
    source: "[BP team 资本市场领域专家] 负责编码买方规则集并支撑实时交付的领域运营人员的初创财务惯例。"
  - id: A13
    name: 安全与客户成功负责人全成本现金薪酬
    value: '132.0'
    unit: USDK per year
    source: "[BP team 安全与客户成功负责人] 集隐私、审计和试点后扩展运营于一体的初创财务惯例。"
  - id: A14
    name: 合作伙伴与营收负责人全成本现金薪酬
    value: '180.0'
    unit: USDK per year
    source: "[BP team 合作伙伴与营收负责人] 承担合作伙伴拓展职责的企业销售人员的初创财务惯例。"
  - id: A15
    name: 解决方案工程师全成本现金薪酬
    value: '156.0'
    unit: USDK per year
    source: "[BP product twelveMonth 受支持技术栈；BP milestones 部署时间降至 90 天以内] 在首个技术栈上线后增加的落地型技术人员的初创财务惯例。"
  - id: A16
    name: 平台与集成工程师全成本现金薪酬
    value: '180.0'
    unit: USDK per year
    source: "[BP product twentyFourMonth 扩展；BP strategicChoices sequencingRationale] 在首批部署证明可复用性后增加的下一位工程师的初创财务惯例。"
  - id: A17
    name: GRC 合规经理全成本现金薪酬
    value: '120.0'
    unit: USDK per year
    source: "[Research regulatoryLandscape；BP risks 隐私和安全审查] 公司从试点转向重复采购后合规招聘的初创财务惯例。"
  - id: A18
    name: 落地分析师全成本现金薪酬
    value: '114.0'
    unit: USDK per year
    source: "[BP milestones 相邻工作流启动；BP operations 接入标准化] 在团队支撑更多活跃账户后增加的低成本交付人员的初创财务惯例。"
  - id: A19
    name: 招聘节奏
    value: "创始人、创始工程师和产品/落地负责人在 M1；资本市场专家在 M4；安全/客户成功在 M10；合作伙伴/营收在 M13；解决方案工程师在 M16；平台/集成工程师在 M19；GRC/合规在 M22；落地分析师在 M25"
    unit: timing
    source: "[BP team startTiming；BP strategicChoices sequencingRationale；BP risks] 仅增加支撑 90 天以内部署和受监管采购所需的最低限度落地和合规人员。"
  - id: A20
    name: 职能薪资分配
    value: "创始人 70% S&M、30% G&A；创始和平台工程师 100% R&D；产品/落地负责人 75% R&D、25% G&A；资本市场专家 65% R&D、35% G&A；安全/客户成功 15% S&M、15% R&D、70% G&A；合作伙伴负责人 100% S&M；解决方案工程师 70% R&D、30% G&A；落地分析师 40% R&D、60% G&A"
    unit: allocation
    source: "[BP team rationales；BP operations] 分配遵循谁负责产品构建、企业销售和审计密集型接入。"
  - id: A21
    name: 非薪资运营支出
    value: "M1–M6 S&M 5K、R&D 8K、G&A 8K 每月；M7–M12 6K、9K、10K；M13–M18 12K、12K、13K；M19–M24 15K、14K、17K；M25–M30 18K、15K、18K；M31–M36 20K、16K、20K"
    unit: USDK per month
    source: "[初创财务惯例；BP risks 安全审查和合作伙伴接入] 反映企业金融科技工作流初创公司精简但真实的云服务、差旅、法务和合规预算。"
  - id: A22
    name: 现金转换政策
    value: "EBITDA 近似现金变动"
    unit: policy
    source: "[初创财务惯例] 本 pre-seed 软件业务不建模债务、资本支出、税费或重大营运资金波动。"
  - id: A23
    name: 融资里程碑
    value: "在约 6 个月现金储备的情况下，达到 7 个定期生产客户、受支持技术栈上 90 天以内部署、至少 2 个多计划扩展、首个相邻模块上线，以及 2–3 个联合销售合作伙伴"
    unit: milestone
    source: "[BP milestones 12–24 个月；BP fundingAsk useOfFundsSummary] 用于确定 pre-seed 融资规模。"
  - id: A24
    name: 混合全成本 CAC
    value: '110.0'
    unit: USDK per customer
    source: "[BP gtm 创始人主导直销和 funnelTargets；初创财务惯例] 假设企业试点销售含有意义的差旅、安全审查和生产转化前的落地支持。"
