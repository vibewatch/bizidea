scenarios:
  downside:
    description: "买方信任和规则集复用改善较慢，公司以约 10 个活跃贷款机构账户和约 $240K 混合 ACV（毛利率略低）退出第 3 年。"
    y3RevenueK: 1920.0
    y3EbitdaK: -862.8
    cashLowPointK: -241.1
    keyAssumptionChanges:
      - "第 3 年季末客户数从 8、10、12、12 下滑至 7、8、9、10。"
      - "活跃账户混合年收入从 $270K 降至 $240K，因第二计划扩展延迟到来。"
      - "毛利率从 70% 降至 67%，因更多例外处理仍由人工驱动。"
  base:
    description: "创始人主导的销售将 3 个试点转化为生产，合作伙伴辅助的增长稳步新增客户，公司以 12 个活跃贷款机构账户和 $270K 混合 ACV 退出第 3 年。"
    y3RevenueK: 2689.0
    y3EbitdaK: -266.9
    cashLowPointK: 715.2
    keyAssumptionChanges:
      - "月末和季末客户数遵循 A5、A6 和 A7。"
      - "毛利率维持在 70% 的商业计划目标。"
      - "招聘遵循 A19，在部署可重复性得到验证之前保持纪律性。"
  upside:
    description: "可复用规则集和联合销售合作伙伴更早奏效，公司以 15 个活跃贷款机构账户及略高的 ACV 和毛利率接近研究 SOM。"
    y3RevenueK: 3516.4
    y3EbitdaK: 382.5
    cashLowPointK: 1354.5
    keyAssumptionChanges:
      - "第 3 年季末客户数从 8、10、12、12 上升至 10、12、14、15。"
      - "活跃账户混合年收入从 $270K 升至约 $290K，因多计划扩展更早实现。"
      - "毛利率从 70% 提升至 72%，因例外流程更多由软件驱动。"
sensitivity:
  - variable: ARPU
    downsideCase: "客户只在一个资金渠道上使用产品，混合 ACV 稳定在约 $240K。"
    baseCase: "账户从首次部署扩展至更多买方计划，混合 ACV 维持在 $270K。"
    upsideCase: "第二计划扩展和相邻模块更早附加，混合 ACV 达到约 $290K。"
    y3RevenueImpactK: -299.0
    cashImpactK: -317.0
  - variable: CAC
    downsideCase: "创始人主导的企业销售持续定制化且安全审查周期较长，CAC 升至约 $140K。"
    baseCase: "创始人主导销售加上少数有信誉的渠道合作伙伴，CAC 维持在约 $110K。"
    upsideCase: "仓储和资金合作伙伴的转介带来更暖的商机，CAC 降至约 $90K。"
    y3RevenueImpactK: 0.0
    cashImpactK: -270.0
  - variable: churn
    downsideCase: "中立认证始终未能深度嵌入贷款机构完整工作流，月度流失率升至约 2.5%。"
    baseCase: "月度流失率按模型维持在 1.8%。"
    upsideCase: "更多账户增加第二个买方计划后，月度流失率降至约 1.2%。"
    y3RevenueImpactK: -214.0
    cashImpactK: -159.0
  - variable: sales cycle
    downsideCase: "买方和合规团队仍进行平行尽职调查，试点转生产延长约一个季度。"
    baseCase: "试点转生产约一到两个季度完成，与商业计划首次计划部署节奏一致。"
    upsideCase: "首套规则集和安全包可复用后，生产转化提前一个季度。"
    y3RevenueImpactK: -439.0
    cashImpactK: -419.0
  - variable: gross margin
    downsideCase: "接入和例外清除服务化程度较高，毛利率维持在约 67%。"
    baseCase: "毛利率维持在商业计划目标 70%。"
    upsideCase: "买方规则集和凭据流程更可复用后，毛利率达到约 72%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -109.0
  - variable: hiring pace
    downsideCase: "在可重复性得到验证之前，合规和落地人员提前两个季度入职。"
    baseCase: "招聘遵循 A19，在第 2 年里程碑前保持纪律性。"
    upsideCase: "受支持技术栈和买方模板比预期更快稳定，部分交付人员入职顺延。"
    y3RevenueImpactK: 0.0
    cashImpactK: -117.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      DesignPartners --> ProductionCustomers
      ProductionCustomers --> MultiProgramExpansion
      MultiProgramExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景第 3 年收入由 12 个活跃贷款机构账户（混合 ACV 约 $270K）驱动，首次计划部署逐步扩展至更多买方计划。"
  - checkName: 必须做对的事
    finding: "前 3 套买方规则集必须保持足够的可复用性，将部署时间控制在 90 天以内并守住 70% 的毛利率目标。"
  - checkName: 模型失效条件
    finding: "若生产转化延迟约一个季度或 ACV 降至约 $240K，第 3 年收入将减少约 $30 万至 $44 万，悲观情景现金曲线将转负。"
  - checkName: 下一轮融资证明材料
    finding: "公司以约 7 个定期客户、2 个多计划扩展、合作伙伴来源商机和首个相邻模块上线退出第 2 年后，seed 轮的故事将具备可信度。"
sanityChecks:
  ruleOf40: "第 3 年增速 95.9% + EBITDA 利润率 -9.9% = 86.0%。"
  burnMultiple: "第 2 年净新 ARR 的消耗倍数约为 0.7x，第 3 年随扩展收入开始超过消耗而改善至约 0.2x。"
  revenuePerFte: "第 3 年年末每全职员工收入 $269K（对比成熟 SaaS 基准约 $20 万至 $40 万）。"
  flags:
    - "基准情景依赖现有贷款机构从一个资金渠道扩展至多个买方计划；仅单计划使用无法支撑 $270K 的混合 ACV。"
    - "滩头市场窄，风险投资情景仍需相邻报告或证券化工作流来扩大每位客户的长期支出。"
    - "现金维持正值的前提是招聘纪律；在规则集复用性得到验证之前提前引入合规或交付人员，会将现金低点再压缩逾 $10 万。"
    - "悲观情景在第 3 年结束前现金转负，因此公司应在买方信任风险完全化解之前提早启动 seed 轮进程。"
