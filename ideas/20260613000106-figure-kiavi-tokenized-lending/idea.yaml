jobsToBeDone:
  - job: >-
      When we add a new funding buyer or warehouse line, help our capital-
      markets team convert our origination data into a buyer-ready certified
      loan package, so we can start delivering volume without a new spreadsheet
      project.
    currentAlternative: Manual loan tape mapping, diligence checklists, and email-based exception clearing
    successMetric: Days to first funded delivery on a new channel and percentage of loans accepted without rework
  - job: >-
      When a buyer rejects or questions a loan, help our operations team locate
      the exact missing field, document, or policy conflict fast, so we can fix
      the exception before funding slips.
    currentAlternative: Secondary-market analysts tracing errors across LOS exports, documents, and buyer comments
    successMetric: Exception resolution time and reduction in failed or delayed loan deliveries
ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster provides concrete transaction scale, a named workflow wedge, and explicit onboarding detail from two same-day verified sources.
  painIntensity:
    score: 4
    rationale: Broken secondary delivery slows lender growth and funding diversity, though the pain is operational rather than existential for every lender.
  wedgeClarity:
    score: 5
    rationale: Buyer-specific loan certification for investor-property lending is a narrow workflow with a clear trigger, buyer, and manual incumbent process.
  defensibility:
    score: 4
    rationale: The startup can compound proprietary buyer rulebooks, lender mappings, and exception history even if tokenization rails and LOS vendors add lighter features.
  ventureScale:
    score: 5
    rationale: A beachhead in investor-property loan onboarding can expand into the broader operating system for private-credit asset distribution and reporting.
topRisks:
  - name: Counterparty fragmentation
    description: Buyer rulebooks may vary enough across warehouse lenders, funds, and tokenized programs that implementation becomes services-heavy.
    mitigation: Start with one asset family and a small set of repeat buyer templates, then productize the most common eligibility and documentation patterns before widening coverage.
  - name: Data-quality liability
    description: If originator source data is inconsistent, the startup could be blamed for certification errors even when the bad input came from the lender.
    mitigation: Make every certified field traceable to source data, expose confidence and exception states clearly, and begin with human approval on all pass-fail decisions.
  - name: Incumbent channel capture
    description: Figure, major warehouse lenders, or LOS vendors could bundle basic onboarding tools once the use case is proven.
    mitigation: Win as a neutral multi-buyer control layer that works across counterparties and accumulates cross-network exception intelligence no single rail or lender naturally owns.
