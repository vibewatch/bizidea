problem: >-
  Mid-sized residential investor lenders still sell DSCR, bridge, and fix-and-
  flip loans through bespoke loan tapes, diligence checklists, and one-off buyer
  onboarding projects. Every new warehouse lender, takeout buyer, or tokenized
  funding rail asks for slightly different data, eligibility logic, and
  exception evidence, so capital-markets teams become the integration layer by
  hand. As more private-credit flow moves onto shared rails, the bottleneck
  shifts from sourcing loans to proving that each loan is complete, eligible,
  and machine-readable before capital can touch it.
targetUser:
  primary: Heads of capital markets and loan operations at U.S. residential investor lenders originating DSCR, bridge, or fix-and-flip loans for SFR investors
  secondary: Onboarding managers and secondary-markets analysts responsible for loan tape delivery, buyer diligence, and exception clearing
  buyer: Chief Capital Markets Officer, COO, or head of secondary marketing
startupThesis:
  nonObviousInsight: >-
    The valuable startup is not another tokenization issuer or loan marketplace.
    Once buyers are willing to fund investor-property loans on new rails, the
    scarce layer becomes a neutral certification system that translates messy
    originator data and collateral files into buyer-ready, machine-readable loan
    packets with auditable eligibility decisions.
  beachhead: >-
    U.S. residential investor lenders originating $500 million to $5 billion of
    annual DSCR, bridge, and fix-and-flip volume, selling to multiple
    institutional takeout buyers or warehouse providers, and preparing to test
    tokenized funding or secondary-sale programs
  wedge: >-
    A loan-certification and onboarding rail that normalizes originator data,
    checks buyer-specific eligibility rules, packages the supporting evidence,
    and clears exceptions before loans are posted to tokenized funding or
    private-credit buyer programs
  whyNowCatalyst: >-
    Figure's acquisition shows investor-property lending is moving from bespoke
    secondary sales into blockchain-linked funding rails, and it explicitly
    names originator-data standardization as the first workflow that must be
    solved.
  ventureScalePath: >-
    Start with investor-property loan onboarding, then expand into warehouse
    line reporting, securitization prep, servicing-transfer readiness,
    performance surveillance, and the cross-lender operating layer for private-
    credit asset distribution.
solution: >-
  The product sits between the lender's LOS, document stack, and buyer
  destinations such as warehouse providers, private-credit funds, and tokenized
  funding programs. It builds one canonical loan record from originator exports,
  property and borrower documents, and servicing fields, then maps that record
  against each buyer's eligibility, concentration, and documentation rules.
  When data is missing or contradictory, the system opens a structured exception
  workflow with the exact field, document, or policy conflict instead of
  sending another round of spreadsheet comments. When a loan passes, it
  generates a buyer-ready certification packet, machine-readable tape, and
  audit log. That makes a new funding program feel like activating another rail
  rather than running a fresh onboarding project.
goToMarketSeed:
  firstCustomer: >-
    A U.S. investor-property lender with $1 billion-plus annual DSCR and bridge
    originations, three or more institutional funding counterparties, and a
    live initiative to add a tokenized or more automated secondary-sale channel
    in the next 12 months
  buyingTrigger: >-
    The lender signs a new warehouse, takeout, or blockchain-linked funding
    program and discovers its current loan tape and diligence process cannot
    support recurring delivery without adding operations headcount
  currentAlternative: >-
    Internal capital-markets ops using custom CSV loan tapes, diligence
    spreadsheets, SFTP drops, shared inboxes, and counterparty-specific service
    teams to rework every delivery
  switchingReason: >-
    The first customer switches because the product cuts months of buyer
    onboarding into a repeatable control layer, reduces failed deliveries, and
    lets the lender add new funding channels without rebuilding its loan tape
    and exception process each time
  pricingHypothesis: >-
    Annual platform fee priced by active funding programs and funded-loan
    volume, plus onboarding fees for each new buyer rulebook and data mapping
