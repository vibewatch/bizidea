categoryDynamics:
  growthRate: High-double-digit fleet growth through 2035; BCG sees ~1.32M robotaxis across the U.S., China, and Europe in its base case by 2035 with upside to ~3M globally, while Goldman frames a ~$400B-plus robotaxi market by 2035.
  growthRateSourceRefs: [32, 33]
  tailwinds:
  - point: Uber is becoming a multi-operator distribution layer, which shortens the path from technical readiness to commercially visible underwriting exposure.
    sourceRefs: [9, 17, 22, 25, 26, 27]
  - point: Texas and California oversight are making operator evidence more legible to outsiders through authorizations, safety-case requirements, and expanded reporting.
    sourceRefs: [35, 37]
  - point: Leading operators now publish enough rides, fleet, and safety information that external benchmarking can be decision-useful rather than speculative.
    sourceRefs: [6, 12, 13, 34]
  headwinds:
  - point: Claims history remains thin, while liability is spreading across auto, product, cyber, and professional lines.
    sourceRefs: [41, 44, 45, 48]
  - point: Safety incidents can quickly create regulatory or public slowdowns in new markets, especially when human supervision is still involved.
    sourceRefs: [13, 19, 20, 30]
  - point: Indirect substitutes are already entrenched inside broker, reinsurance, and internal spreadsheet workflows.
    sourceRefs: [42, 43, 45, 46, 47]
competitors:
- name: Autnmy AI / Road to Autonomy
  stage: seed
  wedge: Live operator benchmarking and leaderboards refreshed on a 12-hour cadence from public and licensed sources.
  pricing: Not public
  strength: First visible specialist benchmark brand with explicit methodology and global cross-category coverage.
  weaknessVsUs: Not obviously built around insurer quote committees, override logs, or portfolio monitoring workflows.
  sourceRefs: [1, 2]
- name: Marsh Mobility Advisory
  stage: incumbent
  wedge: Broker-led AV program structuring, wrap-policy design, and risk placement for complex mobility exposures.
  pricing: Custom advisory and brokerage economics
  strength: Deep carrier relationships and direct involvement in how AV programs are actually placed.
  weaknessVsUs: High-touch and episodic; not a neutral, always-on signal layer across operators and cities.
  sourceRefs: [42, 45]
- name: Aon Autonomous Vehicle Practice
  stage: incumbent
  wedge: Global risk architecture spanning auto, product, cyber, and data questions as AV programs scale.
  pricing: Custom advisory and placement
  strength: Strong board-level credibility and a long-running AV insurance practice.
  weaknessVsUs: Consultative motion is expensive and manual relative to a purpose-built event-monitoring workbench.
  sourceRefs: [45, 46]
- name: Swiss Re Institute / Swiss Re Mobility
  stage: incumbent
  wedge: Reinsurance-backed research and product thinking for evolving AV business models and liability structures.
  pricing: Bundled with capacity, client advisory, or internal research
  strength: Strong actuarial and capital-markets perspective on how AV business models reshape insurance.
  weaknessVsUs: Better at macro strategy than at day-to-day operator-market comparison for frontline underwriters.
  sourceRefs: [41, 43]
- name: autonomy.insurance
  stage: scale-up
  wedge: Specialist intermediary focused on autonomous vehicle and robotaxi insurance placement.
  pricing: Broker commissions and custom placement fees
  strength: Clear category specialization and direct operator-facing insurance packaging.
  weaknessVsUs: Acts as an intermediary rather than as a neutral benchmark and monitoring layer across multiple carriers, brokers, and operators.
  sourceRefs: [47, 49]
regulatoryTechnicalConstraints:
- point: Texas and California have materially different data, testing, and deployment rules, so a single cross-market risk score must always be jurisdiction-aware.
  sourceRefs: [35, 37]
- point: NIST still describes standardized AV performance metrics and repeatable testing procedures as work in progress, which limits how deterministic any external rating can be.
  sourceRefs: [39, 40]
- point: Liability can swing between auto, product, cyber, and professional lines depending on supervision mode and system behavior, which complicates simple one-number risk outputs.
  sourceRefs: [41, 45, 48]
- point: Some operators disclose richly while others do not, so missing data must be estimated conservatively or withheld rather than presented with false precision.
  sourceRefs: [2, 43]
validationSignals:
- point: AUTNMY AI launched a live benchmark product, proving that external AV-comparison workflows are now commercially plausible on public and licensed data.
  sourceRefs: [1, 2]
- point: Waymo has crossed from pilot novelty into scaled recurring service, with large weekly ride volumes, multi-city expansion, and manufacturing investment.
  sourceRefs: [6, 8, 12]
- point: Uber is standardizing autonomous distribution across multiple operators, creating a repeatable stream of city launches and partner-risk comparisons for insurers to track.
  sourceRefs: [17, 22, 25, 26, 27]
- point: Commercial auto insurers remain under pressure from loss severity and underwriting strain, so better diligence has a clear budget and profitability story.
  sourceRefs: [44, 45]
openQuestions:
- How much do specialty MGAs and carriers currently spend per AV quote or renewal on consultants, broker research, and manual monitoring?
- Which insurers or reinsurers are already requiring third-party comparative AV memos instead of accepting operator safety decks?
- Can de-identified claims or near-miss outcomes be shared back into the workbench without breaching carrier or operator confidentiality?
- Outside Texas and California, which next jurisdictions will create enough disclosure density to justify expansion in the next 24 months?
