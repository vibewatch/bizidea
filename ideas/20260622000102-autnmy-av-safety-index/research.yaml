      sourceRefs: [44, 45, 46]
    threatOfEntrants:
      score: 3
      rationale: A new entrant can assemble public-source monitoring, but insurer trust, audit trails, and state-by-state normalization create a meaningful but not insurmountable barrier.
      sourceRefs: [2, 37, 41]
    threatOfSubstitutes:
      score: 5
      rationale: The default alternative is not another startup; it is broker advisory, operator decks, reinsurer research, and in-house spreadsheets that already cover pieces of the job.
      sourceRefs: [42, 43, 45, 46, 47]
    competitiveRivalry:
      score: 4
      rationale: Direct insurer-first software rivalry is still modest, but benchmark publishers, brokers, platforms, and specialist intermediaries can all expand into adjacent monitoring workflows.
      sourceRefs: [1, 25, 26, 27, 49]
  pestle:
  - factor: political
    impact: positive
    point: Texas and California are formalizing AV oversight in ways that make operator behavior more legible to outside risk holders.
    sourceRefs: [35, 37]
  - factor: economic
    impact: positive
    point: Persistent commercial-auto losses and rising claim severity increase willingness to invest in better diligence for unusual exposures.
    sourceRefs: [41, 44, 45]
  - factor: social
    impact: positive
    point: Robotaxis are moving from novelty to routine in several cities, and accessibility narratives make public adoption easier to defend than a few years ago.
    sourceRefs: [6, 12]
  - factor: technological
    impact: positive
    point: Safety cases, benchmark engines, and standardized test-metric work are making third-party comparison more feasible.
    sourceRefs: [2, 24, 39, 40]
  - factor: legal
    impact: negative
    point: Liability increasingly spills across auto, product, cyber, and professional lines, which complicates coverage design and claims handling.
    sourceRefs: [41, 45, 48]
  - factor: environmental
    impact: neutral
    point: Electric robotaxi fleets and avoided tailpipe-emission narratives help city acceptance, but they do not materially solve underwriting uncertainty on their own.
    sourceRefs: [6, 22]
  adoptionFrictionMatrix:
  - friction: Sparse claims history for fully driverless commercial fleets
    severity: high
    affectedBuyer: Specialty underwriter or MGA program lead
    mitigation: Position the product as evidence-backed decision support and committee documentation, not a black-box pricing engine.
    sourceRefs: [41, 44, 45]
  - friction: Operator resistance to adverse external scores
    severity: medium
    affectedBuyer: Broker and carrier teams managing client relationships
    mitigation: Keep every score source-linked, allow rebuttal evidence, and log overrides transparently.
    sourceRefs: [1, 2, 19]
  - friction: State-by-state regulatory fragmentation
    severity: high
    affectedBuyer: Reinsurer or portfolio manager comparing multiple markets
    mitigation: Start with Texas-first templates and state overlays instead of pretending all jurisdictions are interchangeable.
    sourceRefs: [35, 37, 39]
  - friction: Small and concentrated buyer pool
    severity: high
    affectedBuyer: Chief underwriting officer or specialty program owner
    mitigation: Sell around specific launch or renewal events and prove value on one live program before asking for broader platform rollout.
    sourceRefs: [17, 19, 46]
market:
  tam:
    value: "$33.8M"
    rationale: >-
      Estimate ~90 commercial or near-commercial robotaxi operator-market
      programs globally over the late-2020s based on current and announced city
      footprints, assume 3 recurring external risk-holder teams per program
      (carrier/MGA, broker, and reinsurer or actuarial lead), and model $125k
      annual workflow spend per team; 90 × 3 × $125k = $33.75M.
    isEstimate: true
    sourceRefs: [25, 26, 27, 28, 29, 30, 32, 33, 41]
  sam:
    value: "$6.8M"
    rationale: >-
      Constrain to ~18 U.S. launch or renewal programs where a Texas-led
      robotaxi underwriting workflow is immediately useful, then apply the same
      3 paying teams and $125k annual spend; 18 × 3 × $125k = $6.75M.
    isEstimate: true
    sourceRefs: [16, 17, 19, 35, 37]
  som:
    value: "$2.7M"
    rationale: >-
      Year-3 reachable share assumes winning roughly 8 active programs with
      about 2.7 paying teams per program at a $125k blended ACV, reflecting a
      narrow but credible slice of Texas-led quote, renewal, and reinsurance
      workflows before broader category expansion.
    isEstimate: true
    sourceRefs: [17, 19, 35, 44]
