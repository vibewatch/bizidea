problem: >-
  Specialty auto insurers, brokers, and reinsurers are being asked to quote or
  renew robotaxi programs while long-run claims history is still thin and
  operator disclosures are mostly self-reported. At the same time, recalls,
  crashes, and new metro launches can change exposure in days, but most carrier
  teams still track AV risk through analyst memos, spreadsheets, and periodic
  operator decks. That leaves underwriters slow to defend terms, inconsistent in
  comparing operators, and vulnerable to mispricing when commercialization
  outpaces traditional diligence cycles.
targetUser:
  primary: >-
    Head of autonomous mobility underwriting or program leader at a specialty
    commercial-auto carrier, MGA, or broker placing excess-liability coverage
    for U.S. robotaxi fleets.
  secondary: >-
    Reinsurance, actuarial innovation, and strategic-risk teams that package AV
    diligence for renewals, new-metro launches, and capital partners.
  buyer: "Chief underwriting officer or head of specialty mobility programs."
startupThesis:
  nonObviousInsight: >-
    The next bottleneck in AV commercialization is not proving autonomy inside
    the vehicle stack; it is giving outside capital and risk holders an
    independent, continuously updated view of operator safety and rollout
    quality before mature loss data exists.
  beachhead: >-
    Specialty commercial-auto underwriters and broker teams quoting
    excess-liability programs for U.S. robotaxi fleets entering Texas or
    renewing multi-metro coverage.
  wedge: >-
    A robotaxi risk-rating workbench that ingests recalls, incident reports,
    public fleet trackers, benchmark updates, and deployment announcements to
    generate operator-market scorecards plus quote and renewal memos.
  whyNowCatalyst: >-
    Autnmy's 12-hour benchmark, Texas's new public AV fleet transparency, and
    fresh Waymo and Avride safety incidents make external AV risk comparison
    both newly possible and newly urgent.
  ventureScalePath: >-
    Start with robotaxi underwriting, then expand into reinsurance, asset
    financing, municipal permitting, autonomous delivery and trucking, and the
    broader operating-system layer for third-party risk in autonomy markets.
solution: >-
  The product gives carriers, brokers, and reinsurers a live external-
  intelligence layer for each robotaxi operator and market pair. It pulls
  benchmark data, public fleet trackers, recall notices, incident
  investigations, partnership announcements, and commercialization signals into
  a normalized exposure model covering scale, safety, regulatory friction, and
  operational maturity. Underwriters can compare operators side by side, see
  when a recall or launch changes a risk profile, and export a timestamped
  diligence memo for quote committees, renewal reviews, or reinsurance
  partners. Over time, the platform can accept operator-submitted evidence and
  claims outcomes to calibrate pricing, but its first value is replacing
  bespoke AV research with a comparable market reference.
goToMarketSeed:
  firstCustomer: >-
    A specialty commercial-auto MGA with 5-20 autonomous-mobility accounts that
    is quoting excess liability for a robotaxi operator adding Texas service
    zones after a recent software recall.
  buyingTrigger: >-
    A new metro launch, renewal, or post-incident repricing cycle where the
    underwriter must justify terms with little historical loss data.
  currentAlternative: >-
    Operator safety decks, consultant reports, generic telematics vendors,
    spreadsheet watchlists, and manual monitoring of recalls, incidents, and
    regulatory updates.
  switchingReason: >-
    The first customer switches because the workbench provides an external,
    timestamped, apples-to-apples view of operator risk and produces diligence
    memos in hours instead of weeks of bespoke research.
  pricingHypothesis: >-
    Annual subscription priced by underwriter seats and covered operator-market
    programs, with higher-tier API and portfolio-monitoring packages for
    carriers, brokers, and reinsurers.
