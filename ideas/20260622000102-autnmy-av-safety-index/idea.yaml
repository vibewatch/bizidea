differentiator: >-
  Most AV tooling sells into the fleet operator and helps the vehicle company
  build or prove autonomy internally. This company starts from the outsider who
  bears balance-sheet risk and needs an explainable, third-party view across
  operators and markets. If it becomes the system carriers use to compare,
  document, and monitor AV programs, it can accumulate proprietary pricing
  benchmarks, operator histories, and portfolio signals that are hard for point
  consultants or operator-built dashboards to replicate.
