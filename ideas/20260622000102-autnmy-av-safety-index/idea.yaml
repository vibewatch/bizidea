jobsToBeDone:
  - job: "When a robotaxi operator launches a new metro or comes up for renewal, help our underwriting team compare its real external risk signals, so we can set terms without waiting for years of claims history."
    currentAlternative: "Manual diligence using operator decks, consultants, spreadsheets, and scattered public-source monitoring."
    successMetric: "Time to complete an AV quote or renewal memo drops from weeks to under two business days."
  - job: "When a recall, crash, or regulatory change hits an operator in our portfolio, help us re-evaluate exposure fast, so we can adjust pricing, limits, or monitoring before the next committee review."
    currentAlternative: "Ad hoc analyst memos and manual news tracking outside the underwriting system."
    successMetric: "High-severity operator events are reflected in portfolio watchlists within 24 hours."
