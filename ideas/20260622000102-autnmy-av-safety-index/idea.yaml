topRisks:
  - name: "Beachhead is narrow"
    description: "Only a limited number of carriers, brokers, and reinsurers actively underwrite early robotaxi programs today."
    mitigation: "Start with the highest-urgency mobility programs, then expand the same workflow into autonomous delivery, trucking, and financing diligence."
  - name: "Carriers may stay conservative"
    description: "Some underwriters may prefer manual judgment and wait for more claims history before trusting a new category-specific workbench."
    mitigation: "Position the product as explainable decision support and committee documentation rather than black-box automated pricing."
  - name: "Operators can dispute external scores"
    description: "Robotaxi companies may challenge adverse ratings if public data is incomplete or contextual details are missing."
    mitigation: "Keep every score source-linked, allow operator evidence uploads, and make the rating logic transparent enough for underwriters to override with documented rationale."
