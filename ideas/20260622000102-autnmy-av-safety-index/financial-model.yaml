assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: YYYY-MM
    source: '[BP date 2026-06-22] modeled from the first full month after plan finalization.'
  - id: A2
    name: Opening cash after pre-seed close
    value: '2200.0'
    unit: USDk
    source: '[BP fundingAsk.targetFundingRangeUsd $2-4M and BP fundingAsk.runwayMonths 18] base uses $2.2M to fund the month-18 proof plan plus a 6-month buffer while staying cash-positive through Y3.'
  - id: A3
    name: Starting paying teams (M1)
    value: '0'
    unit: count
    source: '[BP investorMemo.firstCustomer] first revenue starts only after a paid pilot is won.'
  - id: A4
    name: Customer definition
    value: Paying risk-holder team on an active operator-market program
    unit: commercial unit
    source: '[BP businessModel.unitOfValue] and [BP gtm.pricing by paying team].'
  - id: A5
    name: Steady-state ARR per paying team
    value: '150.0'
    unit: USDk per team-year
    source: '[BP gtm.pricing and BP investorMemo.firstCustomer.initialContract $100k-$150k ARR] base uses the top of the stated band because production buyers need watchlists and export workflows, not just a one-off memo.'
  - id: A6
    name: Activation-month revenue recognition
    value: 50% of monthly ARR in the start month
    unit: heuristic
    source: Startup-finance heuristic named Financial Modeler go-live rule for mid-month pilot-to-production starts.
  - id: A7
    name: Monthly churn
    value: 1.5%
    unit: percent per month
    source: '[BP risks optional advisory workflow] plus startup-finance heuristic for concentrated enterprise insurance software with annual contracts but real category risk.'
  - id: A8
    name: New paying-team start schedule
    value: Y1 M4/M6/M9/M12; Y2 M13/M15/M16/M18/M19/M20/M21/M22/M24; Y3 M25-M35 except M36
    unit: month index
    source: '[BP milestones], [BP operatingAssumptions], and [BP investorMemo.mustBeTrue] modeling 3-5 paid pilots, 2+ production conversions, and repeated second-team expansion by month 18-36.'
  - id: A9
    name: Paying teams per active program at Y3 exit
    value: '2.4'
    unit: teams per program
    source: '[BP milestones 24-36 months roughly 8 active programs] and [research.market.som 8 programs with 2.7 paying teams per program] base exits slightly below full SOM at 19.3 paying teams over about 8 programs.'
  - id: A10
    name: Gross margin ramp
    value: COGS falls from 45% in M1-M2 to 28% in Q4Y3
    unit: COGS percent of revenue
    source: '[BP businessModel.targetGrossMarginPct 70] plus [BP operations] requiring licensed data and human QA early, then a more productized watchlist and memo workflow later.'
  - id: A11
    name: Hiring sequence
    value: Underwriting lead M3; data engineer M5; GTM lead M10; third engineer M15; customer success/ops M18; second underwriting/product hire M27
    unit: month index
    source: '[BP team.startTiming] with later hires delayed until pilots and production conversion prove repeatability.'
  - id: A12
    name: Loaded annual salaries by role family
    value: Founder 132; engineering 180; underwriting/product 168; sales 174; customer success/ops 138
    unit: USDk per FTE-year
    source: Startup-finance heuristic for a lean U.S. specialist SaaS team with loaded cash compensation.
  - id: A13
    name: Non-payroll operating spend ramp
    value: S&M 3.0->20.5; R&D/data 8.0->22.0; G&A 7.0->23.5 per month
    unit: USDk per month
    source: '[BP operations] plus startup-finance heuristic for travel, data licenses, insurance, legal, and compliance tooling.'
  - id: A14
    name: Blended CAC per production team
    value: '100.0'
    unit: USDk per team
    source: '[BP gtm.funnelTargets discovery->paid pilot 25-35%, pilot->production 50%+] plus concentrated founder-led enterprise sales heuristic.'
  - id: A15
    name: Funding milestone policy
    value: Reach month-18 proof plan and carry 6 months of buffer
    unit: policy
    source: '[BP fundingAsk.runwayMonths 18] plus Financial Modeler stage rule for a 6-month buffer.'
  - id: A16
    name: Cash flow simplification
    value: EBITDA approximates operating cash flow
    unit: heuristic
    source: Startup-finance heuristic because capex, debt, and working-capital swings should be immaterial at this stage.
