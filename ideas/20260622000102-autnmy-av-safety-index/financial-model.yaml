scenarios:
  downside:
    description: Pilots still close, but production ACV slips toward $140K, second-team expansion slows, and buyers treat the workflow as more episodic.
    y3RevenueK: 1634.2
    y3EbitdaK: -867.2
    cashLowPointK: -560.5
    keyAssumptionChanges:
      - ARR per production team falls to $140K.
      - Monthly churn rises to 1.8%.
      - Paying-team additions slow to 13.7 by Q4Y3, with fewer second-team expansions inside shared programs.
  base:
    description: Founder-led pilots convert into production watchlists, then shared-program expansions add paying teams almost monthly through Y3.
    y3RevenueK: 2400.4
    y3EbitdaK: -309.2
    cashLowPointK: 218.2
    keyAssumptionChanges:
      - ARR per production team stays at $150K.
      - Monthly churn stays at 1.5%.
      - Paying teams rise from 3.7 at Q4Y1 to 19.3 at Q4Y3, implying about 8 active programs by exit.
  upside:
    description: Earlier pilot starts, stronger channel pull, and cleaner data operations push the model to slight Y3 EBITDA positivity.
    y3RevenueK: 2830.8
    y3EbitdaK: 51.3
    cashLowPointK: 732.5
    keyAssumptionChanges:
      - ARR per production team reaches $160K on richer watchlist and export packages.
      - Monthly churn falls to 1.0%.
      - Paying teams reach 22.4 by Q4Y3 as pilots pull forward and second-team expansions land faster.
sensitivity:
  - variable: ARPU
    downsideCase: Production ARR settles at $140K because buyers pay for a narrower memo-only workflow.
    baseCase: Production ARR stays at $150K as modeled.
    upsideCase: Production ARR reaches $160K once portfolio watchlists and exports attach.
    y3RevenueImpactK: -159.8
    cashImpactK: -170.3
  - variable: CAC
    downsideCase: CAC rises to about $130K because partner channels are weaker and each win takes more founder time and travel.
    baseCase: CAC stays at roughly $100K with concentrated founder-led selling and some broker/reinsurer sourcing.
    upsideCase: CAC falls toward $85K once two channels produce warmer pilots.
    y3RevenueImpactK: -77.3
    cashImpactK: -234.7
  - variable: churn
    downsideCase: Monthly churn rises to 2.0% because customers keep treating the product as event-specific support.
    baseCase: Monthly churn stays at 1.5% as modeled.
    upsideCase: Monthly churn falls to 1.0% once watchlists become part of standing portfolio review.
    y3RevenueImpactK: -126.4
    cashImpactK: -116.0
  - variable: sales cycle
    downsideCase: Pilot-to-production and second-team expansion both slip by roughly one to two quarters.
    baseCase: Paid pilots convert inside the first live quote or renewal cycle.
    upsideCase: Referenceable wins shorten conversion enough to pull some Y2 and Y3 starts forward.
    y3RevenueImpactK: -517.6
    cashImpactK: -493.2
  - variable: gross margin
    downsideCase: Gross margin tops out near 68% because data licensing and memo QA stay more services-heavy.
    baseCase: Gross margin exits near 71% and matches the BP target directionally.
    upsideCase: Gross margin reaches roughly 73% as data normalization and memo templates get reused more cleanly.
    y3RevenueImpactK: 0.0
    cashImpactK: -74.6
  - variable: hiring pace
    downsideCase: An extra workflow or GTM hire is pulled forward by two quarters before conversion is repeatable.
    baseCase: Hiring stays lean through Y3 and follows A11.
    upsideCase: Noncritical hiring slips later because shared-program expansions absorb more demand than new-logo volume.
    y3RevenueImpactK: 0.0
    cashImpactK: -251.5
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> ProductionTeams
      ProductionTeams --> SharedPrograms
      SharedPrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: The base case grows from 3.7 paying teams at Q4Y1 to 19.3 at Q4Y3, with second-team expansion inside shared programs doing almost as much work as first-team wins.
  - checkName: Must go right
    finding: Paid pilots have to convert into $150K production watchlists fast enough that one GTM hire can support roughly one new paying team every one to two months through Y2 and Y3.
  - checkName: Model breaks if
    finding: If production ARR falls toward $140K or sales cycles slip by a quarter or two, the downside case drops Y3 revenue to about $1.6M and drives cash roughly $561K below zero.
  - checkName: Next-round proof
    finding: The next financing is justified once AUTNMY has 2+ six-figure production conversions, California overlays, and at least one shared program with multiple paying teams or an adjacent workflow win by month 18-24.
sanityChecks:
  ruleOf40: Y3 growth 112.2% + EBITDA margin -12.9% = 99.3%
  burnMultiple: Y2 burn multiple 1.0x improving to Y3 0.2x as burn shrinks against revenue growth.
  revenuePerFte: $300.1K Y3 (benchmark roughly $200-400K enterprise SaaS)
  flags:
    - Base ARPU uses the top of the BP's stated $100K-$150K production range, so pricing proof is a real gating risk.
    - Revenue is still concentrated in about 8 active programs by Y3, so losing one large program would materially dent growth.
    - Full-year Y3 EBITDA stays negative even though Q4Y3 is near breakeven, so the next round still depends on expansion proof rather than pure profitability.
    - Gross margin only reaches the 70% target if licensed data and memo QA stay productized instead of turning into analyst-heavy services.
