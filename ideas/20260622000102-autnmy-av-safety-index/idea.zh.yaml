    - Waymo 在 6 月 18 日召回近 4,000 辆 robotaxi，原因是有 13 次车辆驶入高速施工区；这是它第 6 次软件召回，也是一个多月里的第 2 次。
    - 得州从 2026 年 5 月 28 日起执行商用 AV 要求，州里的公开车队追踪器因此成了监管方和保险方的重要透明度来源。
    - robotaxi 前五名里有三家是中国公司，说明中国已经很快从测试走向商业化。
