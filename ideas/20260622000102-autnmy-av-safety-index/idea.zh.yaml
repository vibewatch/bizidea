differentiator: 大多数 AV 工具都卖给车队运营商，帮车企在内部造车、证车、证明自动驾驶能力。这个公司反过来站在资产负债表风险承担方一边，给他们一套可解释、跨运营商和跨市场的第三方视角。只要它能成为保险公司拿来比较、留档和持续监控 AV 项目的默认系统，就有机会积累顾问公司和运营商自建 dashboard 都很难复制的专有定价基准、运营商历史和组合信号。
