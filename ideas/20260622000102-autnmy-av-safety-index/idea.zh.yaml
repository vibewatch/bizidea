    keyPoints:
    - Autnmy 推出了 Road to Autonomy Index——一套生成式 AI 驱动的基准平台，每 12 小时更新一次，只用公开和授权数据，对 robotaxi、卡车和配送三类 AV 公司做排名。
    - 首期 robotaxi 排名里，中国的百度 Apollo Go 以 80.0 分略高于 Waymo 的 78.8 分，后面依次是 Pony.ai（59.1）、WeRide（58.2）和 Tesla（41.5）。
    - 不到一个月，Waymo 在得州的车队就增长 7.5% 至 620 辆 AV，Tesla 的车队则增长 64% 至 69 辆，说明商业化扩张很快。
