problem: 专做车险的保险公司、经纪商和再保险方，现在就得给 robotaxi 项目报价或续保，但长期理赔历史还很薄，运营商披露又大多是自己说自己。与此同时，召回、事故和新城市上线几天内就可能改写风险敞口，可大多数承保团队仍靠分析师备忘录、表格和定期 operator deck 来跟 AV 风险。结果就是：承保人既难以快速为条款辩护，也很难横向比较运营商；一旦商业化推进快过传统尽调周期，就很容易把价格报错。
targetUser:
  primary: 专业商用车险保险公司、MGA 或经纪商里，负责美国 robotaxi 车队超额责任险的自动驾驶出行承保负责人或项目负责人。
  secondary: 负责把 AV 尽调打包进续保、新城市上线和资本合作流程的再保险、精算创新与战略风险团队。
  buyer: 首席承保官，或专业出行险项目负责人。
startupThesis:
  nonObviousInsight: 下一阶段 AV 商业化真正卡住的，不是车内自动驾驶栈能不能证明自己，而是在成熟损失数据还没形成前，怎么先给外部资本和风险承担方一套独立、持续更新的运营商安全和 rollout 质量视图。
  beachhead: 从美国 robotaxi 车队超额责任险的专业商用车险承保人与经纪团队切入，重点抓进入得州或要做多城市续保的项目。
  wedge: 一套 robotaxi 风险评分工作台，吃进召回、事故报告、公开车队追踪、基准更新和部署公告，产出运营商-市场记分卡，以及报价/续保备忘录。
  whyNowCatalyst: Autnmy 的 12 小时基准、得州新的公开 AV 车队透明度，以及 Waymo 和 Avride 最新安全事件，让外部 AV 风险比较第一次既做得到，也等不起。
  ventureScalePath: 先从 robotaxi 承保切入，再扩到再保险、资产融资、市政许可、自动配送和自动驾驶卡车，最终变成自动驾驶市场第三方风险的操作系统层。
solution: 这款产品会给保险公司、经纪商和再保险方一层面向每个 robotaxi 运营商-市场组合的实时外部情报。它把基准数据、公开车队追踪、召回公告、事故调查、合作发布和商业化信号，统一进一套风险敞口模型，覆盖规模、安全、监管摩擦和运营成熟度。承保人可以并排比较运营商，看到一次召回或新城市上线怎样改写风险画像，并导出带时间戳的尽调备忘录，交给报价委员会、续保评审或再保险伙伴。再往后，平台还可以接入运营商主动提交的证据和理赔结果去校准定价；但它第一步的价值，是把零散的 AV 研究，变成一套可比较的市场参照。
goToMarketSeed:
  firstCustomer: 一家专业商用车险 MGA：手里有 5-20 个自动驾驶出行账户，而且正在给一家刚经历软件召回、又要在得州扩服务区的 robotaxi 运营商做超额责任险报价。
  buyingTrigger: 出现新城市上线、续保，或事故后的重定价周期，而承保人必须在几乎没有历史损失数据的情况下为条款辩护。
  currentAlternative: 运营商安全 deck、顾问报告、泛化车联网供应商、表格 watchlist，以及人工盯召回、事故和监管更新。
  switchingReason: 第一个客户会切过来，是因为这套工作台能给出一份外部的、带时间戳的、可横向比较的运营商风险视图，并把原本要花几周做的尽调研究压到几小时。
  pricingHypothesis: 按承保席位数和覆盖的运营商-市场项目数收年费；给保险公司、经纪商和再保险方更高阶的 API 与组合监控包。
