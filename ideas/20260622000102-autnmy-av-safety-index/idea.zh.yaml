jobsToBeDone:
- job: 当某家 robotaxi 运营商要上线新城市或进入续保期时，帮我们的承保团队把外部真实风险信号看清楚，这样我们不用等几年理赔历史，也能定出条款。
  currentAlternative: 靠运营商 deck、顾问、表格和零散公开信息做人工尽调。
  successMetric: 完成一份 AV 报价或续保备忘录的时间，从几周压到 2 个工作日以内。
- job: 当我们的组合里某个运营商碰上召回、事故或监管变化时，帮我们尽快重估风险敞口，这样在下次委员会开会前，就能调整价格、限额或监控强度。
  currentAlternative: 承保系统之外的临时分析师备忘录和人工盯新闻。
  successMetric: 高严重度的运营商事件，要在 24 小时内进组合 watchlist。
ideaScorecard:
