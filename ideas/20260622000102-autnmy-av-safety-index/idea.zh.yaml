    - 联合创始人 Rob Grant 强调，平台不会抓取网页，只使用公开或授权材料，而且每次更新都会做加密时间戳。
    - 通过 Uber 在达拉斯运营的 Avride robotaxi 于 6 月 21 日发生碰撞，相关视频在 Reddit 流传；这也让 NHTSA 针对其此前 16 起事故的调查继续升温。
