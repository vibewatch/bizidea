topRisks:
- name: 滩头市场太窄
  description: 现在真正参与早期 robotaxi 项目承保的保险公司、经纪商和再保险方数量仍然有限。
  mitigation: 先吃最紧迫的出行险项目，再把同一套工作流扩到自动配送、卡车和融资尽调。
- name: 保险公司可能继续保守
  description: 有些承保人可能还是更相信人工判断，宁愿等更多理赔历史，也不愿把新类别工作台当成默认工具。
  mitigation: 把产品定位成可解释的决策支持和委员会留档工具，而不是黑箱自动定价。
- name: 运营商会质疑外部评分
  description: 如果公开数据不完整、上下文又缺失，robotaxi 公司很可能会挑战不利评级。
  mitigation: 每个分数都带来源链接，允许运营商上传证据，并把评分逻辑讲到承保人能在留痕前提下手动覆盖。
