    title: Autnmy AI launches real-time rankings for self-driving companies
    url: https://thesheffieldpress.com/autnmy-ai-launches-real-time-rankings-for-self-driving
    publisher: The Sheffield Press
    publishedDate: '2026-06-21'
    company: Autnmy AI
    eventType: launch
