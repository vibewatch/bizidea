    - 1
    - 2
    - 19
  - friction: 州与州之间的监管碎片化
    severity: high
    affectedBuyer: 要比较多市场的再保险方或组合经理
    mitigation: 先从得州模板和州别叠层做起，不要假装所有辖区都能互换。
    sourceRefs:
    - 35
    - 37
    - 39
  - friction: 买家池小而且集中
    severity: high
    affectedBuyer: 首席承保官或专业项目负责人
    mitigation: 围绕具体上线或续保事件卖单，在要求平台级 rollout 前先用一个真实项目证明价值。
    sourceRefs:
    - 17
    - 19
    - 46
market:
  tam:
    value: $33.8M
    rationale: 估算全球晚 2020 年代大约会有 90 个商用或近商用的 robotaxi 运营商-市场项目，假设每个项目会有 3 个持续付费的外部风险承担团队（保险公司/MGA、经纪商，以及再保险方或精算负责人），每个团队年度工作流支出约 $125k；90 × 3 × $125k = $33.75M。
    isEstimate: true
    sourceRefs:
    - 25
    - 26
    - 27
    - 28
    - 29
    - 30
    - 32
    - 33
    - 41
  sam:
    value: $6.8M
    rationale: 把范围收窄到约 18 个美国上线或续保项目；在这些场景里，以得州为起点的 robotaxi 承保工作流立刻就有用，再套同样的 3 个付费团队与 $125k 年支出假设；18 × 3 × $125k = $6.75M。
    isEstimate: true
    sourceRefs:
    - 16
    - 17
    - 19
    - 35
    - 37
  som:
    value: $2.7M
    rationale: 第 3 年可触达份额假设拿下约 8 个活跃项目、每个项目约 2.7 个付费团队，以及 $125k blended ACV；这对应的是得州优先报价、续保和再保险工作流里一块窄但可信的份额。
