  growthRate: 到 2035 年，robotaxi 车队仍将保持高双位数增长；BCG 在基准情景下预计美国、中国和欧洲合计约 132 万辆 robotaxi，乐观情景可到全球约 300 万辆；Goldman 则把 2035 年 robotaxi 市场规模框到 $400B+。
  growthRateSourceRefs:
  - 32
  - 33
  tailwinds:
  - point: Uber 正在变成多运营商分发层，技术准备到商业可见风险敞口之间的路径因此更短。
    sourceRefs:
    - 9
    - 17
    - 22
    - 25
    - 26
    - 27
  - point: 得州和加州的监管，让外部人更容易读懂运营商证据——无论是许可、safety case 还是扩展报告。
    sourceRefs:
    - 35
    - 37
  - point: 头部运营商现在已经公开足够多的单量、车队和安全信息，让外部基准第一次能真正用于决策，而不只是猜。
    sourceRefs:
    - 6
    - 12
    - 13
    - 34
  headwinds:
