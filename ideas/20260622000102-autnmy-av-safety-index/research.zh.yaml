competitors:
- name: Autnmy AI / Road to Autonomy
  stage: seed
  wedge: 以公开和授权来源为基础，每 12 小时刷新一次的实时运营商基准和 leaderboard。
  pricing: 未公开
  strength: 这是目前最显眼的垂直基准品牌之一，方法论写得清楚，跨品类覆盖也早。
  weaknessVsUs: 它并不是明显围绕保险报价委员会、覆盖日志或组合监控工作流来构建的。
  sourceRefs:
  - 1
  - 2
- name: Marsh Mobility Advisory
  stage: incumbent
  wedge: 由经纪商主导的 AV 项目结构设计、wrap-policy 方案和复杂出行风险投放。
  pricing: 定制咨询费和经纪佣金
  strength: 和保险公司关系深，也真正参与 AV 项目落地时的摆放方式。
  weaknessVsUs: 高触达、偏阶段性；并不是一层在不同运营商和城市之间持续在线的中立信号系统。
  sourceRefs:
  - 42
  - 45
- name: Aon Autonomous Vehicle Practice
  stage: incumbent
  wedge: 围绕车险、产品责任、网络和数据问题，设计全球性的 AV 风险架构。
  pricing: 定制咨询与投放
  strength: 董事会层面的信誉强，而且长期深耕 AV 保险。
  weaknessVsUs: 相较专门做事件监控的工作台，这种咨询式打法又贵又慢。
  sourceRefs:
  - 45
  - 46
- name: Swiss Re Institute / Swiss Re Mobility
  stage: incumbent
  wedge: 以再保险研究和产品视角，覆盖不断变化的 AV 商业模式与责任结构。
  pricing: 通常捆绑在容量、客户咨询或内部研究里
  strength: 在精算和资本市场视角上很强，能看懂 AV 商业模式怎样改写保险。
  weaknessVsUs: 更擅长宏观策略，不擅长一线承保人每天要做的运营商-市场比较。
  sourceRefs:
  - 41
  - 43
- name: autonomy.insurance
  stage: scale-up
  wedge: 面向自动驾驶汽车和 robotaxi 保险投放的专业中介。
  pricing: 经纪佣金和定制投放费
  strength: 品类聚焦度高，而且直接服务运营商端的保险打包。
  weaknessVsUs: 它更像中介，而不是一层面向多个保险公司、经纪商和运营商的中立基准与监控系统。
  sourceRefs:
  - 47
  - 49
regulatoryTechnicalConstraints:
- point: 得州和加州在数据、测试和部署规则上差异很大，所以任何跨市场风险分都必须带着辖区意识。
  sourceRefs:
  - 35
  - 37
- point: NIST 仍把标准化 AV 性能指标和可重复测试流程视为进行中的工作，这限制了任何外部评级能有多确定。
  sourceRefs:
  - 39
  - 40
- point: 责任会随着监管模式和系统行为，在车险、产品责任、网络险和职业责任险之间摆动，因此很难用一个分数就讲清风险。
  sourceRefs:
  - 41
  - 45
  - 48
- point: 有些运营商披露很细，有些几乎不说，所以缺失数据要么保守估计，要么干脆留空，不能硬装成高精度。
  sourceRefs:
  - 2
  - 43
validationSignals:
- point: AUTNMY AI 已经推出了实时基准产品，这本身就证明：靠公开和授权数据做外部 AV 比较工作流，商业上已经说得通。
  sourceRefs:
  - 1
  - 2
- point: Waymo 已经从试点新鲜感走到规模化经常性服务：周单量大、多城扩张快，还在加制造投资。
  sourceRefs:
  - 6
  - 8
  - 12
- point: Uber 正在把自动驾驶分发标准化到多个运营商身上，这会持续制造城市上线和伙伴风险比较，保险方必须跟。
  sourceRefs:
  - 17
  - 22
  - 25
  - 26
  - 27
- point: 商用车险保险公司仍然被损失严重度和承保压力压着走，所以更好的尽调天然有预算和盈利逻辑。
  sourceRefs:
  - 44
  - 45
openQuestions:
- 专业 MGA 和保险公司今天在每次 AV 报价或续保上，到底花了多少顾问费、经纪研究和人工监控成本？
