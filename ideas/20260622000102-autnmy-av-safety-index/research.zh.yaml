      - 37
      - 41
    threatOfSubstitutes:
      score: 5
      rationale: 默认替代方案不是另一家创业公司，而是经纪商咨询、运营商 deck、再保险研究和内部表格——它们已经把这份工作的几个环节先做掉了。
      sourceRefs:
      - 42
      - 43
      - 45
      - 46
      - 47
    competitiveRivalry:
      score: 4
      rationale: 直接做 insurer-first 软件的竞争还不算拥挤，但基准发布方、经纪商、平台和垂直中介都可能往相邻监控工作流延伸。
      sourceRefs:
      - 1
      - 25
      - 26
      - 27
      - 49
  pestle:
  - factor: 政治
    impact: positive
    point: 得州和加州正在把 AV 监管写得更结构化，这让外部风险承担方更容易看清运营商行为。
    sourceRefs:
    - 35
    - 37
  - factor: 经济
    impact: positive
    point: 商用车险长期亏损、理赔严重度上升，都会推高买家为非常规风险买更好尽调的意愿。
    sourceRefs:
    - 41
    - 44
    - 45
  - factor: 社会
    impact: positive
    point: robotaxi 在多个城市已经从新鲜事变成日常出行选项，而无障碍叙事也比几年前更利于公众接受。
    sourceRefs:
    - 6
    - 12
  - factor: 技术
    impact: positive
    point: safety case、基准引擎和标准化测试指标的推进，让第三方比较比过去更有可行性。
    sourceRefs:
    - 2
    - 24
    - 39
    - 40
  - factor: 法律
    impact: negative
    point: 责任正越来越多地溢出到车险、产品责任、网络险和职业责任险之外，这会把保障设计和理赔处理都变复杂。
    sourceRefs:
    - 41
    - 45
    - 48
  - factor: 环境
    impact: neutral
    point: 电动 robotaxi 车队和减少尾排排放的叙事有助于城市接受，但它们本身并不能解决承保不确定性。
    sourceRefs:
    - 6
    - 22
  adoptionFrictionMatrix:
  - friction: 全无人商用车队的理赔历史太薄
    severity: high
    affectedBuyer: 专业承保人或 MGA 项目负责人
    mitigation: 把产品定位成带证据的决策支持和委员会留档工具，而不是黑箱定价引擎。
    sourceRefs:
    - 41
    - 44
    - 45
  - friction: 运营商会抵触不利的外部评分
    severity: medium
    affectedBuyer: 需要维护客户关系的经纪商和保险公司团队
    mitigation: 每个分数都带来源链接，允许补充申诉证据，并且把人工覆盖留痕做透。
