scenarios:
  downside:
    description: 试点依然能成交，但正式生产 ACV 下滑到接近 $140K，第二团队扩张变慢，买家也把这套流程看得更像阶段性工具。
    y3RevenueK: 1634.2
    y3EbitdaK: -867.2
    cashLowPointK: -560.5
    keyAssumptionChanges:
    - 每个正式生产团队的 ARR 降到 $140K。
    - 月流失率升到 1.8%。
    - 到 Q4Y3 付费团队只增长到 13.7 个，共享项目里的第二团队扩张更少。
  base:
    description: 创始人主导的试点先转成正式 watchlist 合同，再靠共享项目扩张，让付费团队在 Y3 几乎每个月都继续增加。
    y3RevenueK: 2400.4
    y3EbitdaK: -309.2
    cashLowPointK: 218.2
    keyAssumptionChanges:
    - 每个正式生产团队的 ARR 保持在 $150K。
    - 月流失率维持在 1.5%。
    - 付费团队从 Q4Y1 的 3.7 个升到 Q4Y3 的 19.3 个，退出时约对应 8 个活跃项目。
  upside:
    description: 试点启动更早，渠道拉力更强，数据运营也更顺，模型在 Y3 就能做到轻微 EBITDA 转正。
    y3RevenueK: 2830.8
    y3EbitdaK: 51.3
    cashLowPointK: 732.5
    keyAssumptionChanges:
    - 每个正式生产团队的 ARR 提升到 $160K，来自更丰富的 watchlist 和导出包。
    - 月流失率降到 1.0%。
    - 到 Q4Y3 付费团队达到 22.4 个，原因是试点前移、第二团队扩张落地更快。
sensitivity:
- variable: ARPU
  downsideCase: 如果买家只愿为更窄的“备忘录工作流”付费，正式生产 ARR 会落到 $140K。
  baseCase: 正式生产 ARR 按模型保持在 $150K。
  upsideCase: 一旦组合 watchlist 和导出包挂上去，正式生产 ARR 可到 $160K。
  y3RevenueImpactK: -159.8
  cashImpactK: -170.3
- variable: CAC
  downsideCase: 如果渠道更弱、每单都更耗创始人时间和差旅，CAC 会升到约 $130K。
  baseCase: 在高集中的创始人主导销售，以及少量经纪商/再保险引流下，CAC 维持在约 $100K。
  upsideCase: 一旦两条渠道能稳定带来更热的试点，CAC 可降到约 $85K。
  y3RevenueImpactK: -77.3
  cashImpactK: -234.7
- variable: 流失率
  downsideCase: 如果客户一直把产品当成事件型支持，月流失率会上升到 2.0%。
  baseCase: 月流失率按模型保持 1.5%。
  upsideCase: 如果 watchlist 成为固定组合复盘的一部分，月流失率可降到 1.0%。
  y3RevenueImpactK: -126.4
  cashImpactK: -116.0
- variable: 销售周期
  downsideCase: 如果试点转生产和第二团队扩张都各自慢上 1-2 个季度，模型就会明显变差。
  baseCase: 付费试点会在第一轮真实报价或续保周期内完成转化。
  upsideCase: 一旦能拿可引用的 wins，部分 Y2 和 Y3 启动会被提前。
  y3RevenueImpactK: -517.6
  cashImpactK: -493.2
- variable: 毛利率
  downsideCase: 如果授权数据和备忘录 QA 继续偏服务化，毛利率顶多到约 68%。
  baseCase: 模型默认毛利率在退出时接近 71%，方向上与 BP 目标一致。
  upsideCase: 如果数据标准化和模板复用更顺，毛利率可到约 73%。
  y3RevenueImpactK: 0.0
  cashImpactK: -74.6
- variable: 招聘节奏
  downsideCase: 如果在转化还没稳定前，就提前两个季度多招一个工作流或 GTM 岗，现金会被明显吃掉。
  baseCase: Y3 前都保持精简招聘，并按 A11 节奏推进。
  upsideCase: 如果共享项目扩张吸收了更多需求，而不是一味追新 logo，非关键岗位可以再往后招。
  y3RevenueImpactK: 0.0
  cashImpactK: -251.5
modelDiagram:
  title: 单位经济模型流程
  mermaid: "flowchart LR\n  Leads[线索] --> PaidPilots[付费试点]\n  PaidPilots --> ProductionTeams[正式生产团队]\n  ProductionTeams --> SharedPrograms[共享项目]\n  SharedPrograms --> Revenue[收入]\n  Revenue --> GrossProfit[毛利]\n  GrossProfit --> Cash[现金]"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景里，付费团队会从 Q4Y1 的 3.7 个增到 Q4Y3 的 19.3 个；共享项目里的第二团队扩张，贡献几乎和第一团队赢单一样大。
- checkName: 必须成立的前提
  finding: 付费试点必须足够快地转成 $150K 的正式 watchlist 合同，这样一个 GTM 招聘才能在 Y2 和 Y3 期间支撑平均每 1-2 个月新增一个付费团队。
- checkName: 模型失效条件
  finding: 如果正式生产 ARR 掉到接近 $140K，或销售周期拖慢 1-2 个季度，下行情景下 Y3 收入会跌到约 $1.6M，现金也会跌到约 -$561K。
- checkName: 下一轮融资证明
  finding: 等 AUTNMY 在第 18-24 个月做到 2 个以上六位数正式转化、上线加州叠层，并出现至少一个多付费团队共享项目或相邻工作流胜利时，下一轮融资才更站得住。
sanityChecks:
  ruleOf40: Y3 增长 112.2% + EBITDA 利润率 -12.9% = 99.3%
  burnMultiple: Y2 烧钱倍数约 1.0x；随着亏损收窄、收入增长，Y3 改善到 0.2x。
  revenuePerFte: Y3 人均收入约 $300.1K（企业 SaaS 常见区间约 $200-400K）。
  flags:
  - 基准 ARPU 取了 BP 给出的 $100K-$150K 正式生产区间上沿，所以定价验证是真正的卡口。
  - 到 Y3，收入仍然集中在约 8 个活跃项目上，少掉一个大项目都会明显打凹增长。
  - 尽管 Q4Y3 已接近平衡，Y3 全年 EBITDA 仍为负，因此下一轮融资仍要靠扩张证明，而不是纯盈利故事。
  - 只有在授权数据和备忘录 QA 保持产品化、没滑向分析师重服务模式时，毛利率才碰得到 70% 目标。
