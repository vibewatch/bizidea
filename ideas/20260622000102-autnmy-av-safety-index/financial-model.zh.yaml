slug: robotaxi-risk-rating
date: '2026-06-22'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-22] 按业务计划定稿后的首个完整月份建模。'
- id: A2
  name: pre-seed 结束后的期初现金
  value: '2200.0'
  unit: USDk
  source: '[BP fundingAsk.targetFundingRangeUsd $2-4M and BP fundingAsk.runwayMonths 18] 基准情景按 $2.2M 计算，可覆盖 18 个月验证计划，并再留 6 个月缓冲，同时在 Y3 结束时保持现金为正。'
- id: A3
  name: 起始付费团队数（M1）
  value: '0'
  unit: count
  source: '[BP investorMemo.firstCustomer] 第一笔收入只会在拿下付费试点后开始确认。'
- id: A4
  name: 客户定义
  value: Paying risk-holder team on an active operator-market program
  unit: commercial unit
  source: '[BP businessModel.unitOfValue] 与 [BP gtm.pricing by paying team]。'
- id: A5
  name: 稳态每付费团队 ARR
  value: '150.0'
  unit: USDk per team-year
  source: '[BP gtm.pricing and BP investorMemo.firstCustomer.initialContract $100k-$150k ARR] 基准情景取区间上沿，因为正式客户需要 watchlist 和导出工作流，不是一份一次性备忘录。'
- id: A6
  name: 激活当月收入确认
  value: 50% of monthly ARR in the start month
  unit: heuristic
  source: Financial Modeler 的 go-live 规则：如果试点在月中转正式生产，启动月按月度 ARR 的 50% 确认收入。
- id: A7
  name: 月流失率
  value: 1.5%
  unit: percent per month
  source: '[BP risks optional advisory workflow] 加上面向高集中企业保险软件的 startup-finance 经验值：合同虽按年签，但品类风险确实存在。'
- id: A8
  name: 新付费团队启动节奏
  value: Y1 M4/M6/M9/M12; Y2 M13/M15/M16/M18/M19/M20/M21/M22/M24; Y3 M25-M35 except M36
  unit: month index
  source: '[BP milestones]、[BP operatingAssumptions] 和 [BP investorMemo.mustBeTrue]，对应 3-5 个付费试点、2 个以上生产转化，以及在 18-36 个月内持续出现第二团队扩张。'
- id: A9
  name: Y3 末每个活跃项目的付费团队数
  value: '2.4'
  unit: teams per program
  source: '[BP milestones 24-36 months roughly 8 active programs] 与 [research.market.som 8 programs with 2.7 paying teams per program]；基准情景在退出时略低于完整 SOM，对应约 8 个项目、19.3 个付费团队。'
- id: A10
  name: 毛利率爬坡
  value: COGS falls from 45% in M1-M2 to 28% in Q4Y3
  unit: COGS percent of revenue
  source: '[BP businessModel.targetGrossMarginPct 70]，再结合 [BP operations]：早期要承担授权数据和人工 QA 成本，后期 watchlist 与备忘录流程才会更产品化。'
- id: A11
  name: 招聘顺序
  value: Underwriting lead M3; data engineer M5; GTM lead M10; third engineer M15; customer success/ops M18; second underwriting/product hire M27
  unit: month index
  source: '[BP team.startTiming]，并把后续招聘往后压，直到试点和正式转化证明路径可复制。'
- id: A12
  name: 按岗位族划分的全包年薪
  value: Founder 132; engineering 180; underwriting/product 168; sales 174; customer success/ops 138
  unit: USDk per FTE-year
  source: 面向精简型美国垂直 SaaS 团队的 startup-finance 经验值，已计入现金薪酬的 fully loaded 成本。
- id: A13
  name: 非薪酬运营支出爬坡
  value: S&M 3.0->20.5; R&D/data 8.0->22.0; G&A 7.0->23.5 per month
  unit: USDk per month
  source: '[BP operations] 加上 startup-finance 经验值，覆盖差旅、数据授权、保险、法务与合规工具。'
- id: A14
  name: 单个生产团队的综合 CAC
  value: '100.0'
  unit: USDk per team
  source: '[BP gtm.funnelTargets discovery->paid pilot 25-35%, pilot->production 50%+]，再叠加高集中、创始人主导的企业销售经验值。'
- id: A15
  name: 融资里程碑政策
  value: Reach month-18 proof plan and carry 6 months of buffer
  unit: policy
  source: '[BP fundingAsk.runwayMonths 18]，再加 Financial Modeler 的阶段规则：额外保留 6 个月缓冲。'
- id: A16
  name: 现金流简化假设
  value: EBITDA approximates operating cash flow
  unit: heuristic
  source: startup-finance 经验值：在这个阶段，capex、债务和营运资本波动应都不大，因此 EBITDA 可以近似看作经营现金流。
