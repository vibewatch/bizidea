slug: robotaxi-risk-rating
date: "2026-06-22"
executiveSummary: >-
  Robotaxi Risk Rating should start as a Texas-first underwriting intelligence
  workbench for specialty MGAs, carriers, and brokers quoting U.S. robotaxi
  excess-liability programs, not as a general AV analytics platform or
  automated pricing engine. The first customer is a specialty
  autonomous-mobility program lead facing a live launch, renewal, or
  post-incident repricing cycle where historical claims are thin and operator
  disclosures are self-framed. The wedge is credible because public-signal
  density has crossed a threshold: AUTNMY's 12-hour benchmark, Texas fleet
  transparency, recalls, crash investigations, and launch announcements now
  create a recurring diligence workflow instead of a one-off research note.
  Version one should stay read-heavy and explainable, combining source-linked
  operator-market scorecards, material-event alerts, and committee-ready quote
  or renewal memos delivered in hours rather than weeks. The first proof point
  is not model accuracy in the abstract; it is whether one MGA, broker, or
  reinsurer changes terms, limits, or monitoring intensity based on a live memo
  generated from the platform. The beachhead is narrow—research sizes it at
  roughly $33.8M TAM, $6.8M Texas-led SAM, and $2.7M reachable year-3 SOM—so
  the venture case depends on multi-team expansion within each program and
  later reuse across reinsurance, delivery, trucking, or financing workflows.
  The biggest disconfirming risk is that underwriters keep manual or
  broker-assisted workflows because they trust human judgment more than a new
  category-specific system or will not pay six figures for a mostly
  external-data product. The input research does not quantify current AV
  diligence budgets or claims-sharing willingness, so the company should raise
  a pre-seed round only to prove paid pilots, production conversion, and at
  least one credible adjacency before scaling GTM headcount.
problem:
  - >-
    Specialty underwriters, MGAs, and brokers must quote or renew robotaxi
    programs even though long-run claims history is still thin and most
    operator disclosures are self-reported.
  - >-
    Recalls, incidents, city launches, and regulatory changes can alter
    exposure in days, but current workflows still rely on analyst memos,
    consultant reports, operator decks, and spreadsheet watchlists.
  - >-
    The default substitutes are episodic and hard to compare across operators,
    jurisdictions, and supervision models, which makes quote committees slow,
    inconsistent, and vulnerable to mispricing.
solution:
  - >-
    Build a live external-intelligence workbench that normalizes benchmark,
    recall, incident, fleet-authorization, and launch data into source-linked
    operator-market scorecards across safety, scale, regulatory friction, and
    operating maturity.
  - >-
    Start with event alerts, side-by-side comparisons, and timestamped quote or
    renewal memo export, then add override logging and operator rebuttal
    workflows so underwriters can defend decisions without relying on opaque
    automated pricing.
whyWeWin:
  - >-
    The product sells to the outsider who bears balance-sheet risk, not to the
    robotaxi operator, so it can stay neutral across competing fleets and
    markets.
  - >-
    Public leaderboards and broker advisory do not win by default because
    underwriters need state-aware workflow, evidence lineage, override logs, and
    committee-ready outputs rather than a ranking alone.
  - >-
    A time-stamped history of operator-market events tied to underwriting
    actions, rebuttals, and portfolio decisions can compound into a proprietary
    dataset that is harder to copy than raw news monitoring.
strategicChoices:
  beachhead: >-
    Specialty commercial-auto MGAs, carriers, and wholesale brokers quoting
    excess-liability programs for U.S. robotaxi fleets entering Texas or
    renewing multi-metro coverage after a recent recall or incident.
  wedgeRationale: >-
    Texas-led quote and renewal workflows create faster proof than a broad AV
    risk platform because the buyer, trigger, data sources, and budget moment
    all align around one live underwriting decision. Broader plays across
    trucking, delivery, municipal permitting, or operator-facing analytics would
    require multiple workflows and jurisdiction models before the product has
    proven willingness to pay.
  sequencingRationale: >-
    The company should first win with an explainable, read-heavy memo workflow
    tied to live launches, renewals, and recalls; then add portfolio
    monitoring, rebuttal handling, and one system-export path after paid pilots
    convert. Only once the platform shows repeatable term-setting value should
    it hire dedicated GTM capacity, deepen partnerships with brokers and
    reinsurers, and extend the same data model into adjacent autonomy-risk
    workflows.
  notYet:
    - Automated rate recommendations or black-box pricing
    - Operator-facing safety tooling or autonomy-development workflows
    - Autonomous delivery, trucking, municipal permitting, or asset-financing products before robotaxi underwriting proof exists
    - Deep carrier core-system integrations before the memo workflow converts paid pilots
market:
  tam: >-
    $33.8M estimated TAM based on roughly 90 global robotaxi operator-market
    programs, 3 paying risk-holder teams per program, and about $125k annual
    workflow spend per team.
  sam: >-
    $6.8M estimated SAM based on about 18 U.S. launch or renewal programs where
    a Texas-led robotaxi underwriting workflow is immediately useful.
  som: >-
    $2.7M modeled year-3 SOM based on winning roughly 8 active programs at
    about 2.7 paying teams per program and $125k blended ACV.
  segments:
    - U.S. specialty commercial-auto carriers and MGAs underwriting robotaxi excess liability, starting with Texas launches and multi-metro renewals
    - Wholesale brokers, reinsurers, and actuarial innovation teams that need the same operator-market comparison in placement and treaty workflows
  buyingProcess: >-
    The operational champion is usually the autonomous-mobility underwriter or
    program lead, but budget is typically approved by the chief underwriting
    officer or head of specialty programs and often influenced by brokers or
    reinsurers sharing the program. The most credible motion is a paid pilot
    tied to one live launch, renewal, or recall event, then conversion to
    annual monitoring once the team relies on the workbench for recurring
    portfolio review.
product:
  mvp: >-
    v1 should cover Texas-first U.S. robotaxi programs with source-linked
    operator-market scorecards, side-by-side comparisons, material-event alerts,
    and committee-ready quote or renewal memo export. It must show evidence
    lineage, state overlay logic, manual overrides, and explicit null handling
    rather than opaque automated pricing.
  sixMonth: >-
    Launch 2-3 design-partner pilots, ingest benchmark, recall, incident,
    public fleet-tracker, and launch data, and ship the alert-to-memo workflow
    for one live Texas launch or renewal event.
  twelveMonth: >-
    Add portfolio watchlists, operator rebuttal evidence uploads, override
    logs, one carrier or broker system export, and California state overlays
    for multi-market comparison.
  twentyFourMonth: >-
    Expand from Texas-first robotaxi underwriting into reinsurance review and
    one adjacent autonomy segment such as delivery or trucking, while
    preserving the same neutral operator-market event history and memo
    workflow.
  keyBets:
    - Underwriters will fund explainable decision support sooner than they will trust automated AV pricing.
    - Public and licensed external data are sufficient to produce decision-useful memos before claims-sharing partnerships exist.
    - The same underlying program can support more than one paying team across carrier, broker, and reinsurer workflows.
    - State-overlay normalization and underwriting-action history will become a stronger moat than a public benchmark alone.
gtm:
  wedge: >-
    Sell a paid pilot around one live Texas robotaxi quote, renewal, or
    post-incident repricing cycle, using the platform to deliver a source-linked
    operator comparison and committee memo in under two business days, then
    convert that team to annual portfolio monitoring.
  channels:
    - Founder-led direct sales to heads of autonomous-mobility underwriting and specialty program leaders at MGAs, carriers, and brokers
    - Broker and reinsurer design partnerships attached to live placements or treaty reviews
    - AV insurance, safety, and regulatory working groups where launch and incident-driven diligence demand is concentrated
  funnelTargets: "Qualified discovery->paid pilot 25-35%, pilot->production 50%+, and production->second active program or second paying team 50%+ within 12 months."
  pricing: >-
    Start with a paid pilot for one live program, then annual subscription
    priced by paying risk-holder team and number of active operator-market
    programs monitored, with higher tiers for API exports and portfolio
    watchlists. Initial hypothesis is a $25k-$40k pilot converting to roughly
    $100k-$150k ARR for one carrier, MGA, broker, or reinsurer team monitoring
    one to two programs, because buyers are replacing bespoke diligence effort
    rather than buying generic seats.
businessModel:
  revenueStreams:
    - Annual subscription for the underwriting workbench and portfolio monitoring
    - Paid pilot and onboarding fees for the first live robotaxi program
    - API, data-export, and multi-team portfolio packages for broker, reinsurer, and carrier workflows
  unitOfValue: Active operator-market program monitored by a paying risk-holder team
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more operator-market programs within the same carrier, MGA, or broker portfolio
    - Add broker and reinsurer teams to the same underlying program once the workflow is trusted
    - Extend state overlays and the same memo workflow into autonomous delivery, trucking, and financing diligence
strategyMap:
  northStarMetric: Active operator-market programs for which the platform delivers a source-linked quote, renewal, or repricing memo within 2 business days of a trigger event
  inputMetrics:
    - Paid pilots launched
    - Event-to-watchlist latency for recalls, incidents, and launch announcements
    - Median time to produce a committee-ready memo
    - Pilot-to-production conversion rate
    - Active programs or paying teams per production customer
  moatsToBuild:
    - Time-stamped operator-market history linking recalls, launches, fleet authorizations, and benchmark changes to underwriting actions
    - State-overlay normalization across Texas, California, and later jurisdictions
    - Override and rebuttal corpus showing which signals changed terms, limits, or monitoring intensity
    - Distribution embedded in broker, MGA, and reinsurer workflows around live programs
  killCriteria:
    - Fewer than 3 paid pilots after 25 qualified target-account conversations
    - Pilot-to-production conversion below 50% across the first 6 pilots
    - Material events are not reflected in portfolio watchlists within 24 hours and committee-ready memos within 2 business days in the first 2 production accounts
    - Fewer than 2 of the first 4 production customers reach $100k+ ARR and add a second active program or second paying team within 12 months
  mermaid: |
    flowchart LR
      Wedge[Texas robotaxi underwriting wedge] --> MVP[Source-linked risk workbench]
      MVP --> Proof[Paid pilots and faster committee memos]
      Proof --> Expansion[Multi-team portfolio monitoring and adjacent autonomy risk workflows]
investorMemo:
  verdict:
    call: Watch
    conviction: Real event-driven underwriting pain and a coherent Texas-first wedge, but conviction stays limited until six-figure budgets and expansion beyond a tiny buyer pool are proven.
    whyBelieve: The company attacks a real balance-sheet problem at the exact moment budget appears—a launch, renewal, or recall-driven repricing cycle—and offers a neutral workflow current broker, benchmark, and spreadsheet substitutes do not package well.
    whyDoubt: The buyer pool is small and sophisticated, and the wedge may remain a services-assisted niche if customers will not pay six figures or trust external-data scores enough to change terms.
    nextDiligence: Confirm that 3 paid pilots tied to live Texas or multi-metro renewal events convert to annual contracts above $100k ARR and influence at least one real capacity or pricing decision.
  firstCustomer:
    title: Autonomous-mobility program lead at a specialty MGA
    profile: A U.S. MGA with 5-20 autonomous-mobility accounts, active excess-liability placements, and one robotaxi customer entering or expanding in Texas after a recall or launch event.
    trigger: A new city launch, renewal committee, or post-incident repricing cycle that requires a neutral operator comparison before capacity is committed.
    buyer: Chief underwriting officer or head of specialty mobility programs
    initialContract: "$25k-$40k paid pilot on one live launch or renewal cycle, converting to roughly $100k-$150k annual ARR for one team monitoring one to two operator-market programs."
  mustBeTrue:
    - At least 3 of the first 5 target MGAs, carriers, or brokers must accept a software-priced pilot instead of asking only for custom advisory.
    - At least 50% of paid pilots must convert to $100k+ annual subscriptions after one live quote or renewal cycle.
    - In at least 3 recent underwriting events, a recall, incident, or launch signal must have changed terms, limits, or monitoring within 24 hours.
    - Texas-first public and licensed data must be sufficient to draft a committee-ready memo for most early programs without confidential operator integrations.
    - By month 18, at least 2 production customers must add a second paying team or adjacent autonomy workflow, proving the wedge can expand.
  diligenceQuestions:
    - What do MGAs, carriers, and brokers spend today per AV quote or renewal on consultants, research, and internal analyst time?
    - Which public or licensed signals actually cause term, limit, or capacity changes in live quote committees?
    - How often will a chief underwriting officer pay for a neutral third-party memo instead of relying on broker advisory or operator decks?
    - Can a source-linked score survive operator disputes without damaging carrier or broker relationships?
    - Which adjacent workflow—reinsurance review, autonomous delivery, trucking, or financing diligence—reuses the same data model first?
operatingAssumptions:
  - assumption: Early buyers will pay $100k-$150k ARR after a paid pilot for a live robotaxi program.
    basis: research.yaml
    validationTest: Close 3 paid pilots and require at least 2 to convert above $100k ARR within 120 days of pilot end.
    decisionImpact: If false, keep burn low, narrow the ICP further, or abandon the venture-scale thesis before hiring GTM headcount.
  - assumption: Texas-first public and licensed data plus benchmark inputs are sufficient to draft committee-ready memos without deep confidential integrations.
    basis: research.yaml
    validationTest: Reconstruct 5 recent launch, renewal, or recall events and get 4 rated as decision-useful by target underwriters.
    decisionImpact: If false, the product will require costly carrier or operator integrations, slower onboarding, and a weaker gross-margin profile.
  - assumption: A memo and watchlist workflow is enough to unlock initial budget before buyers demand automated pricing or deep policy-system integration.
    basis: idea.yaml
    validationTest: Win 3 qualified prospects that sponsor a pilot with memo export and event monitoring as the core scope.
    decisionImpact: If false, the roadmap must add deeper actuarial or workflow integration earlier, increasing capital needs and sales complexity.
  - assumption: The same underlying program can support multiple paying teams across carrier, broker, and reinsurer workflows.
    basis: idea.yaml
    validationTest: Secure at least 1 second paying team on a live program by month 12 and 2 by month 18.
    decisionImpact: If false, effective TAM compresses and expansion must shift to adjacent autonomy categories earlier than planned.
  - assumption: Broker and reinsurer partners can source qualified pilots without commoditizing the product or forcing a services-heavy motion.
    basis: operator judgment
    validationTest: Generate at least 25% of qualified pipeline from 2 active partners by month 12 with conversion no worse than direct deals.
    decisionImpact: If false, stay direct-sales-led longer and delay channel-specific hiring or revenue assumptions.
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: Quantify current AV diligence spend and decision triggers through targeted customer discovery.
    hypothesis: Target underwriters can name a recent launch, renewal, or recall event and quantify current manual or consultant effort around it.
    successMetric: 15 qualified interviews with at least 10 active buying triggers and 8 prospects estimating meaningful annualized diligence cost or analyst time.
    owner: Founder CEO
  - horizon: "0-90 days"
    experiment: Reconstruct historical Texas and recall-driven cases as concierge memos for design partners.
    hypothesis: Source-linked external data can recreate committee-ready memos without requiring confidential carrier data.
    successMetric: 2 design partners review 3-5 reconstructed cases and rate at least 80% of the memos as decision-useful.
    owner: Underwriting workflow lead
  - horizon: "90-180 days"
    experiment: Run a live pilot on one Texas robotaxi quote, renewal, or repricing cycle.
    hypothesis: The workbench can cut memo completion time to under 2 business days and surface watchlist changes within 24 hours.
    successMetric: 1 paid pilot executes on a live program and meets both service-level targets.
    owner: Founding eng
  - horizon: "90-180 days"
    experiment: Test pricing and packaging across pilot buyers.
    hypothesis: Program-plus-team pricing converts better than seat-only pricing for chief underwriting officers and specialty program leads.
    successMetric: The winning package is selected in 5 of 8 pricing conversations and used in 2 signed pilot scopes.
    owner: Founder CEO
  - horizon: "6-12 months"
    experiment: Ship operator rebuttal and override workflow in production pilots.
    hypothesis: Transparency plus rebuttal logging preserves trust when operators challenge an adverse score or event interpretation.
    successMetric: At least 2 pilot customers use the workflow and no customer abandons the score due to explainability complaints.
    owner: Underwriting workflow lead
  - horizon: "12-18 months"
    experiment: Launch a partner-sourced pipeline motion with one broker and one reinsurer.
    hypothesis: Broker or reinsurer partners can source qualified pilots and second paying teams faster than pure cold outbound.
    successMetric: At least 25% of qualified pipeline and 1 signed paid pilot come from 2 active partners.
    owner: GTM lead
  - horizon: "12-18 months"
    experiment: Validate one adjacent workflow reuse path beyond the initial Texas underwriting wedge.
    hypothesis: The Texas-first data model reuses with limited changes for one reinsurance or adjacent autonomy-risk workflow.
    successMetric: One design partner confirms at least 70% field overlap and signs a scoped pilot or LOI for the adjacent workflow.
    owner: Data platform engineer
operations:
  - Maintain a time-stamped source registry and evidence chain for every score, alert, and memo.
  - Run daily review and QA on recalls, incidents, fleet-tracker changes, and launch announcements, with conservative null handling when data is incomplete.
  - Keep explicit override and operator rebuttal workflows so underwriters can inspect evidence and document why a score changed or was ignored.
  - Secure durable benchmark, recall, and regulatory data licenses or API access before promising production SLAs.
  - Package Texas-first and California overlays plus quarterly broker or reinsurer review templates before expanding into new segments.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own buyer discovery, founder-led sales, pricing, and early broker or reinsurer partnerships in a concentrated market.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the ingestion, scoring, alerting, and memo-generation workflow needed for the first live pilot.
  - role: Underwriting workflow lead
    startTiming: Month 2
    rationale: Encode quote-committee templates, state overlays, override rules, and customer onboarding around actual underwriting practice.
  - role: Data platform engineer
    startTiming: Month 4
    rationale: Harden the source pipeline, evidence lineage, and export or API paths required for portfolio monitoring and later adjacencies.
  - role: GTM lead
    startTiming: Month 9
    rationale: Add pipeline capacity only after paid pilots, pricing, and onboarding show repeatable conversion.
milestones:
  - horizon: "0-12 months"
    items:
      - Sign 3-5 paid pilots tied to live Texas launch, renewal, or recall events.
      - Convert at least 2 pilots into $100k+ annual production subscriptions.
      - Deliver watchlist updates within 24 hours and committee-ready memos within 2 business days for covered events.
      - Launch portfolio monitoring and operator rebuttal logging for the first production accounts.
  - horizon: "12-24 months"
    items:
      - Reach 4-6 production customers and at least 1 second paying team on a shared program.
      - Add California overlays, API or data exports, and recurring quarterly portfolio reviews.
      - Secure 2 broker or reinsurer partners that source qualified pilots.
      - Validate one adjacency such as reinsurance review, autonomous delivery, or trucking workflow reuse.
  - horizon: "24-36 months"
    items:
      - Win roughly 8 active programs consistent with the modeled SOM.
      - Demonstrate multi-team or multi-program expansion in at least half of production accounts.
      - Decide whether to scale as autonomy-risk infrastructure or remain a concentrated insurance workflow business based on expansion rates and partner pull.
risks:
  - risk: The initial buyer pool is narrow and concentrated across a small number of specialty mobility programs.
    likelihood: High
    impact: High
    mitigation: Prove multi-team expansion inside shared programs and validate one adjacent autonomy-risk workflow before scaling headcount.
  - risk: Buyers may treat the product as optional advisory support and stay with broker, consultant, or spreadsheet workflows.
    likelihood: Medium
    impact: High
    mitigation: Sell only around live launch, renewal, or recall events with measurable speed and committee-defensibility outcomes, and require paid pilots rather than free evaluations.
  - risk: Regulatory fragmentation and uneven operator disclosure may make scores feel too subjective to influence terms.
    likelihood: Medium
    impact: High
    mitigation: Start with Texas-first overlays, use explicit nulls and source links, and avoid black-box pricing claims until the evidence base is deeper.
  - risk: Benchmark publishers, brokers, or reinsurers could bundle similar dashboards before the startup owns workflow depth.
    likelihood: Medium
    impact: High
    mitigation: Focus on alerting, memo output, override logs, and multi-party portfolio workflows that generic leaderboards and advisory firms do not productize well.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the source-linked data pipeline, underwriting memo
    workflow, and state overlays, complete 3-5 paid pilots, convert at least 2
    to $100k+ production subscriptions, and prove multi-team or
    adjacent-workflow expansion before scaling sales.
