slug: occupancy-bridge-microgrids
date: '2026-06-11'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: Model start month
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-06-11]'
- id: A2
  name: Starting cash after pre-seed close
  value: '2400'
  unit: usdK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M; model uses a $2.4M close to fund Q4Y2 proof plus a 6-month buffer]'
- id: A3
  name: Starting paying projects / programs
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months start from interviews, approvals, and first paid assessments rather than an existing customer base]'
- id: A4
  name: Paid site assessment fee
  value: '50'
  unit: usdK per project
  source: '[BP investorMemo.firstCustomer.initialContract $40k-$75k assessment range; model uses midpoint]'
- id: A5
  name: Average full occupancy-bridge contract value
  value: '300'
  unit: usdK per project
  source: '[BP gtm.pricing $250k-$350k total contract value; Research market.som assumes ~20 projects at ~$300k]'
- id: A6
  name: Revenue recognition period for a deployment
  value: '4'
  unit: months
  source: '[BP investorMemo.firstCustomer.initialContract says a 3-4 month occupancy-bridge deployment; model uses the long end for conservative recognition]'
- id: A7
  name: Paid project ramp
  value: 3 by M12, 7 by Q4Y2, 20 by Q4Y3
  unit: projects / programs
  source: '[BP milestones], [BP market.som], [Research market.som]'
- id: A8
  name: Long-run average contract ARPU
  value: '300'
  unit: usdK annualized
  source: '[Research market.som 20 projects × $300k = $6.0M SOM]'
- id: A9
  name: Gross margin ramp
  value: Y1 52-64%, Y2 58-65%, Y3 67-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70] plus productization heuristic for partner-supplied capacity and precedent reuse'
- id: A10
  name: Monthly churn / renewal loss
  value: '3.0'
  unit: percent
  source: Startup-finance heuristic for a project-led infrastructure workflow where repeat business exists but not every delayed site repeats automatically
- id: A11
  name: Blended CAC per paying project / program
  value: '85'
  unit: usdK
  source: '[BP gtm founder-led direct sales and referrals] plus startup-finance heuristic for travel, approvals, and partner-driven enterprise selling'
- id: A12
  name: Leadership loaded compensation
  value: '180'
  unit: usdK annual
  source: Startup-finance heuristic for a pre-seed founder / CEO cash salary plus payroll taxes and benefits
- id: A13
  name: Engineering loaded compensation
  value: '165'
  unit: usdK annual
  source: '[BP team Founding eng] plus startup-finance heuristic for a U.S. controls / software engineer with load'
- id: A14
  name: Solutions and deployment loaded compensation
  value: '145'
  unit: usdK annual
  source: '[BP team Solutions and utility engineer; BP team Deployment lead] plus startup-finance heuristic for field-capable technical hires with load'
- id: A15
  name: Sales and partnerships loaded compensation
  value: '170'
  unit: usdK annual
  source: '[BP team Partnerships or account executive] plus startup-finance heuristic for enterprise construction / energy GTM talent'
- id: A16
  name: G&A loaded compensation
  value: '120'
  unit: usdK annual
  source: Startup-finance heuristic for lean finance / operations support at pre-seed
- id: A17
  name: Hiring sequence
  value: Solutions M2, deployment lead M4, first AE M10, second engineer M14, second sales hire M18, finance / ops M20, field ops M22, third engineer M28, third sales hire M30, second field ops M32
  unit: month index
  source: '[BP team.startTiming], [BP strategicChoices.sequencingRationale], and smoothing heuristic required by the headcount snapshot schema'
- id: A18
  name: Non-payroll sales and marketing ramp
  value: 8K/mo early Y1, 10K/mo late Y1, then 13/15/17/19K per month across Y2 and 22/25/28/31K per month across Y3
  unit: usdK per month
  source: '[BP gtm channels] plus startup-finance heuristic for founder travel, partner development, and territory-selling costs'
- id: A19
  name: Non-payroll R&D ramp
  value: 10K/mo early Y1, 12K/mo mid Y1, 14K/mo late Y1, then 15/16/17/18K per month across Y2 and 19/20/21/22K per month across Y3
  unit: usdK per month
  source: '[BP product roadmap] plus startup-finance heuristic for telemetry, cloud, controls software, and testing spend'
- id: A20
  name: Non-payroll G&A ramp
  value: 15K/mo early Y1, 18K/mo mid Y1, 22K/mo late Y1, then 20/22/24/26K per month across Y2 and 28/29/30/31K per month across Y3
  unit: usdK per month
  source: '[Research regulatoryLandscape], [BP risks], and startup-finance heuristic for insurance, legal, compliance, and project admin'
- id: A21
  name: Cash conversion assumption
  value: EBITDA approximates cash movement
  unit: policy
  source: Startup-finance heuristic; the model excludes debt, capex, and working-capital swings because BP assumes partner-supplied capacity rather than owned fleet expansion
- id: A22
  name: Quarterly salary smoothing policy
  value: Y2-Y3 quarterly salary uses the actual monthly hire schedule inside each quarter while headcount tables only show Y2 and Y3 year-end snapshots
  unit: policy
  source: '[Financial Modeler headcount column convention]'
