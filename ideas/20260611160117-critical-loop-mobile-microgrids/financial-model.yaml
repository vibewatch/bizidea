modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Slip[Utility delay detected] --> Assess[Paid site assessment]
      Assess --> Approval[Approved occupancy plan]
      Approval --> Deploy[Bridge deployment]
      Deploy --> Revenue[Project revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from reaching 7 paying projects by Q4Y2 and about 20 paying projects or programs by Q4Y3 at roughly $300K average contract value.
- checkName: Must go right
  finding: The company must secure repeat approval precedent in at least two territories so the sales cycle stays near six months and gross margin can climb toward target.
- checkName: Model breaks if
  finding: If approvals slip toward an eight-month cycle or exit gross margin stalls near 65%, cash compresses toward the downside case despite the lean hiring plan.
- checkName: Next-round proof
  finding: The next financing is justified once Q4Y2 shows 7 paying projects, two repeat developers, and partner-supplied capacity holding gross margin close to plan without owned fleet capex.
sanityChecks:
  ruleOf40: Y3 growth 252.9% + EBITDA margin 25.4% = 278.3%, which is strong but reflects a small early-stage revenue base.
  burnMultiple: Burn multiple is about 0.6x in Y2 and turns negative in Y3 as repeat deployments lift gross profit faster than headcount.
  revenuePerFte: $500K Y3 using 12 exit FTE (above the $200-400K SaaS benchmark and only believable if partner-supplied capacity keeps the model asset-light).
  flags:
  - The model assumes no owned fleet capex; if modular blocks require deposits or ownership, the funding ask would need to rise.
  - Revenue is smoothed by month and quarter even though real utility slips and deployment starts will be lumpy.
  - Customer counts proxy for paying projects and repeat programs, so actual logo-based CAC and churn may differ from the modeled unit economics.
