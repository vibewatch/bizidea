jobsToBeDone:
- job: 当我的公寓项目在施工接近完成后仍然等不到公用事业电力，请帮我安全地点亮第一批可出租楼栋，这样我不用等最终升级完成，也能先启动入住和租金回收。
  currentAlternative: 延期开盘，或者拼凑柴油租赁和人工承包商协调。
  successMetric: 从项目基本完工到首批楼栋入住、再到首笔租金启动的天数。
- job: 当我在同一公用事业辖区内同时管理多个公寓项目时，请帮我把临时通电和永久切换标准化，别让每个项目都变成一次临时供电救火。
  currentAlternative: 一次性电气承包范围、公用事业升级协调，以及用表格盯里程碑。
  successMetric: 尽管公用事业延误，仍能按原计划招租日期开盘的项目占比。
