problem: 高速增长的多户住宅项目，楼体施工、内装和招租准备都可能已经完成，却因为馈线或变电站升级一拖再拖，整片社区仍然亮不了灯。开发商只能硬扛持有成本、租金起算推迟，以及临时拼来的柴油发电租赁——噪音大、污染重，也很少为后续切到永久供电预先设计好分阶段交接。电网排队已经把通电变成房地产项目的硬瓶颈，但大多数开发商仍把临时供电视为施工末端的补丁，而不是一款能桥接收入的产品。
targetUser:
  primary: 美国 Sun Belt 地区的多户住宅开发商中的开发与施工负责人，项目为 150-400 户的花园式公寓社区，首批住户楼栋已完工，但公用事业正式供电仍在延后。
  secondary: 在多个在建公寓项目之间统筹临时供电、验收和公用事业移交的业主代表与电气项目经理。
  buyer: 区域型多户住宅开发商的首席开发官、COO 或施工副总裁。
startupThesis:
  nonObviousInsight: 开发商要让一个已完工项目开始变现，并不需要一步到位拿到全部永久容量；他们真正需要的，是在最终升级落地前，先把首批入住楼栋、公共系统和招租运营安全点亮，而且这套方案得让公用事业方认可。胜出的公司因此不只是微电网设备商，而是一套入住桥接平台：把分阶段通电、验收、远程运营以及切换到永久供电标准化。
  beachhead: 美国 Sun Belt 地区的多户住宅开发商，正在交付 150-400 户的花园式公寓社区，而首批楼栋的入住许可证被馈线或变电站升级拖住。
  wedge: 一项分阶段入住微电网服务：部署标准化移动电力模块，优先点亮最先可出租的楼栋和公共区域负载，并负责切换到永久公用事业供电。
  whyNowCatalyst: Critical Loop 的融资、平均 5 年延误的说法，以及“数周内通电”的承诺，说明移动电力已经从应急绕路工具，跨进了可以解锁停滞项目收入的可信方案。
  ventureScalePath: 先从美国高速增长市场里的公寓社区切入，再扩到 build-to-rent 社区、轻工业园区、机场扩建阶段，以及同样受互联延误和分期开业困扰的市政设施。
solution: 为开发商搭一套 microgrid-as-a-service 平台：先快速评估现场负载，再给出标准化的入住计划，明确哪些楼栋、水泵、公共系统和招租功能可以优先通电。公司部署模块化移动微电网、控制系统和远程监控，再给开发商、检查人员和公用事业方一份共享的就绪记录，用来支撑临时通电和正式切换。客户买到的不再是裸设备租赁，而是一项分期开盘服务，里面包括可用性承诺、负载优先级逻辑，以及面向招租启动和住户入住的运营手册。时间拉长后，创业公司还能沉淀出最强的数据集：哪些站点设计、负载曲线和公用事业协同方式能让项目最快开盘，从而更容易为未来部署和融资方案做承保。
goToMarketSeed:
  firstCustomer: 一家区域型 Sun Belt 公寓开发商，手里有 2-6 个在建社区，其中一个接近完工、规模在 200-300 户的项目，因为馈线或变电站升级延期，首轮招租即将受影响。
  buyingTrigger: 在主体施工基本完成后，公用事业方下修通电时间表，入住许可证节点和首笔租金起算日都被推到风险区。
  currentAlternative: 继续延期开盘、租柴油发电机，或者通过电气承包商加上向公用事业升级协调，临时拼一套定制供电方案。
  switchingReason: 这套切口比继续等公用事业方、或拼凑一次性的发电机租赁更快、更安静，也更标准化，能更早把首批楼栋租出去、把收入跑起来。
  pricingHypothesis: 按项目收取启动费，再按已点亮的楼栋模块或在线兆瓦数收月费；如果客户要可用性保障和托管式永久供电切换，则收更高溢价。
