topRisks:
- name: 许可与验收摩擦
  description: 地方检查人员和公用事业方可能不愿接受标准化的分阶段入住方案，哪怕客户有需求，也会拖慢部署。
  mitigation: 先聚焦少数几个公用事业辖区，与本地工程伙伴一起做预审批站点原型，并把验收资料打包进产品。
- name: 资产利用率风险
  description: 如果项目时间一再变化，或者客户集中度过高、需求又太不均匀，移动微电网车队就可能闲置。
  mitigation: 先按模块融资资产，让车队在住宅和轻工业项目之间复用，并优先服务手里有多个项目的重复开发商。
- name: 现有厂商把切口压成租赁服务
  description: 发电机租赁公司或 EPC 可能加上一层轻软件，把相似方案打包成临时供电服务来卖。
  mitigation: 把差异化押在分阶段入住流程、永久供电切换数据，以及通用租赁商做不出的组合级基准数据上。
