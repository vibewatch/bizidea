    - Find reviews, forums, job posts, or RFPs that reveal real demand for temporary power, microgrids, or utility-delay mitigation in construction or multifamily development.
    - Find fetchable direct URLs on transformer shortages or utility equipment delays slowing construction or new service in the U.S.
