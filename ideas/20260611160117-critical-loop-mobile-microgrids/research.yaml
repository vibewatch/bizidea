  adoptionFrictionMatrix:
    - friction: AHJ and utility acceptance for occupied buildings on interim power
      severity: high
      affectedBuyer: VP Construction / COO
      mitigation: Start with a small set of territories and pre-package approval documentation and load limits.
      sourceRefs:
        - 29
        - 30
        - 31
        - 32
    - friction: Fleet and component availability during broader electrical-equipment shortages
      severity: high
      affectedBuyer: Operations leader
      mitigation: Reserve modular blocks early and design around re-deployable standardized site archetypes.
      sourceRefs:
        - 42
        - 43
        - 44
    - friction: Building-by-building load prioritization is not turnkey on mixed-use live sites
      severity: medium
      affectedBuyer: Project executive
      mitigation: Standardize first-building load blocks, commissioning checklists, and remote control templates.
      sourceRefs:
        - 4
        - 35
        - 36
    - friction: Developers hesitate to commit before they trust the final utility delay duration
      severity: medium
      affectedBuyer: Chief Development Officer
      mitigation: Offer staged readiness assessments and convert only when the utility date visibly slips.
      sourceRefs:
        - 5
        - 6
        - 32
