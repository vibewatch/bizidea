openQuestions:
  - Which utilities and AHJs will actually allow resident occupancy on temporary microgrid-backed service for multifamily buildings?
  - What insurer and lender requirements apply when an occupied apartment project is operating on interim microgrid power before permanent service cutover?
  - What is the true all-in monthly cost to deploy a standardized 250-unit occupancy bridge in 2026 across Texas, Georgia, and Arizona?
  - How often are multifamily delivery delays specifically caused by energization rather than broader construction or entitlement issues in the target metros?
  - Can fleet utilization remain attractive when project slip dates are correlated across the same utility territories?
