competitors:
  - name: Critical Loop
    stage: scale-up
    wedge: Mobile microgrids that compress utility delays into rapid deployments for large-load customers.
    pricing: Custom service contract / quote-based
    strength: Closest public narrative match and already financed around grid-delay pain.
    weaknessVsUs: Not visibly specialized around apartment phased occupancy, inspection packets, or first-building lease-up workflow.
    sourceRefs:
      - 3
      - 4
  - name: Scale Microgrids
    stage: scale-up
    wedge: Turnkey financed microgrids for resilience, rate management, and speed-to-power for C&I sites.
    pricing: Custom financed system / quote-based
    strength: Strong controls, financing, and full-stack onsite energy delivery.
    weaknessVsUs: More permanent and C&I oriented than a mobile, temporary occupancy bridge for multifamily openings.
    sourceRefs:
      - 34
      - 35
  - name: BoxPower
    stage: scale-up
    wedge: Software-assisted modular microgrids that compress feasibility and deployment for remote and resilient sites.
    pricing: Custom project pricing
    strength: EASI platform suggests faster design and deployment than traditional bespoke microgrids.
    weaknessVsUs: Brand and product posture skew toward remote and off-grid use, not utility handoff for occupied apartment communities.
    sourceRefs:
      - 36
  - name: Aggreko
    stage: incumbent
    wedge: Large temporary-power fleet with hybrid site-power solutions for construction and industrial sites.
    pricing: Quote-based rental / service pricing
    strength: Deep fleet, field operations, and customer reach in temporary power.
    weaknessVsUs: Equipment-centric offering rather than a utility-credible occupancy bridge with cutover management.
    sourceRefs:
      - 37
      - 38
  - name: United Rentals
    stage: incumbent
    wedge: Broad rental channel pushing battery, hydrogen, and hybrid temporary-power options.
    pricing: Rental / quote-based
    strength: Nationwide channel and substitute availability when a project simply needs temporary power fast.
    weaknessVsUs: Does not appear positioned as a managed occupancy-bridge platform for developers and AHJs.
    sourceRefs:
      - 38
regulatoryTechnicalConstraints:
  - point: Temporary occupied-building service has to satisfy NEC Article 590, OSHA temporary wiring rules, and utility-specific service processes.
    sourceRefs:
