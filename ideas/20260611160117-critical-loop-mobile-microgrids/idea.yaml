problem: >-
  Fast-growing multifamily developments can finish construction, interiors, and leasing prep yet still sit dark because a
  feeder or substation upgrade slips by months or years. Developers then absorb carrying costs, delayed rent starts, and
  ad hoc diesel rentals that are noisy, dirty, and rarely designed for phased handoff to permanent service. The grid queue
  has turned energization into a real-estate bottleneck, but most developers still treat temporary power as a last-minute
  construction fix instead of a revenue-bridge product.
targetUser:
  primary: >-
    Development and construction leaders at Sun Belt multifamily developers delivering 150-400 unit garden-style apartment
    communities where first resident buildings are complete but utility service is delayed
  secondary: >-
    Owner's representatives and electrical program managers coordinating temporary power, inspections, and utility handoff
    across multiple active apartment projects
  buyer: Chief Development Officer, COO, or VP Construction at a regional multifamily developer
startupThesis:
  nonObviousInsight: >-
    Developers do not need full permanent capacity to start monetizing a finished site; they need a utility-credible way to
    energize the first occupied buildings, common systems, and leasing operations safely before the final upgrade lands. The
    winning company is therefore not just a microgrid vendor, but an occupancy-bridge platform that standardizes phased
    energization, inspections, remote operations, and handoff to permanent service.
  beachhead: >-
    Sun Belt multifamily developers delivering 150-400 unit garden-style apartment communities where certificates of
    occupancy for first resident buildings are blocked by feeder or substation upgrades
  wedge: >-
    A phased-occupancy microgrid service that installs standardized mobile power blocks, prioritizes the first leaseable
    buildings and common-area loads, and manages the cutover to permanent utility service
  whyNowCatalyst: >-
    Critical Loop's financing, five-year delay claim, and weeks-to-energization promise show that mobile power has crossed
    from emergency workaround into a credible tool for unlocking stalled project revenue.
  ventureScalePath: >-
    Start with apartment communities in fast-growth U.S. markets, then expand into build-to-rent neighborhoods, light
    industrial parks, airport expansion phases, and municipal facilities that face the same interconnection-delay and
    phased-opening problem.
solution: >-
  Build a microgrid-as-a-service platform for developers that begins with a fast site-load assessment and a standardized
  occupancy plan for which buildings, pumps, common systems, and leasing functions can be energized first. The company
  deploys modular mobile microgrids plus controls and remote monitoring, then gives the developer, inspector, and utility a
  shared readiness record for temporary energization and permanent cutover. Instead of renting raw equipment, customers buy
  a phased-opening service with uptime commitments, load-priority logic, and operating playbooks for leasing launch and
  resident move-in. Over time, the startup builds the best dataset on which site designs, load profiles, and utility
  interactions let projects open fastest, making it easier to underwrite future deployments and financing packages.
goToMarketSeed:
  firstCustomer: >-
    A regional Sun Belt apartment developer with 2-6 active communities and one nearly completed 200-300 unit project whose
    leasing start is threatened by a slipped feeder or substation upgrade
  buyingTrigger: >-
    The utility revises energization timing after vertical construction is largely complete, putting certificate-of-occupancy
    milestones and first-rent dates at risk
  currentAlternative: >-
    Delaying opening, renting diesel generators, or commissioning a bespoke temporary-power build through an electrical
    contractor and utility escalation process
  switchingReason: >-
    The wedge offers a faster, quieter, and more standardized path to lease first buildings and start revenue than either
    waiting on the utility or stitching together one-off generator rentals
  pricingHypothesis: >-
    Setup fee per project plus a monthly charge per energized building block or active megawatt, with premium pricing for
    uptime guarantees and managed cutover to permanent service
