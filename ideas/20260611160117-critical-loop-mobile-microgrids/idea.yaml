jobsToBeDone:
  - job: >-
      When utility power for my apartment project slips after construction is nearly complete, help me energize the first
      leaseable buildings safely, so I can start occupancy and rent collection without waiting for the final upgrade.
    currentAlternative: Delaying opening or cobbling together diesel rentals and manual contractor coordination
    successMetric: Days from substantial completion to first occupied building and first-rent start date
  - job: >-
      When I am managing several apartment projects in the same utility territory, help me standardize temporary
      energization and permanent cutover, so each project does not become a bespoke temporary-power fire drill.
    currentAlternative: One-off electrical contractor scopes, utility escalations, and spreadsheet-based milestone tracking
    successMetric: Percentage of projects opened on the planned leasing date despite utility delays
