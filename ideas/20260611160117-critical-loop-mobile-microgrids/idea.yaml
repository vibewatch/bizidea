topRisks:
  - name: Permitting and inspection friction
    description: Local inspectors and utilities may resist standardized phased-occupancy setups, slowing deployments despite customer demand.
    mitigation: Start in a narrow set of utility territories, build pre-approved site archetypes with local engineering partners, and package inspection documentation into the product.
  - name: Asset utilization risk
    description: A fleet of mobile microgrids can become underutilized if project timing slips or customer concentration stays too lumpy.
    mitigation: Finance assets in modular blocks, reuse fleets across housing and light-industrial projects, and prioritize repeat developers with portfolio demand.
  - name: Incumbents collapse the wedge into rentals
    description: Generator rental firms or EPCs could add lighter software and market a similar offering as a bundled temporary-power service.
    mitigation: Differentiate on phased-occupancy workflows, permanent-service cutover data, and portfolio-level benchmarking that generic rental providers do not manage.
