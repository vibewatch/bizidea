differentiator: >-
  Generator rental firms sell equipment and EPCs deliver bespoke temporary power, but neither typically owns the phased
  occupancy workflow from load prioritization to inspection package to utility cutover. This company wins by turning
  temporary power into a repeatable project-opening product with standard site archetypes, remote operating data, and a
  financing-friendly system of record for when revenue can start. That combination is harder to copy than another mobile
  microgrid chassis.
