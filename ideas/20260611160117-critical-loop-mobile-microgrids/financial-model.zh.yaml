slug: occupancy-bridge-microgrids
date: '2026-06-11'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-06
  unit: YYYY-MM
  source: '[BP date 2026-06-11]'
- id: A2
  name: pre-seed 完成后的起始现金
  value: '2400'
  unit: usdK
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M；模型按 $2.4M 交割，足够支撑到 Q4Y2 验证里程碑并留出 6 个月缓冲]'
- id: A3
  name: 起始付费项目/计划数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months 从访谈、审批和首批付费评估起步，而不是基于既有客户存量]'
- id: A4
  name: 付费现场评估费
  value: '50'
  unit: usdK per project
  source: '[BP investorMemo.firstCustomer.initialContract $40k-$75k assessment range；模型取中位数]'
- id: A5
  name: 平均完整入住桥接合同金额
  value: '300'
  unit: usdK per project
  source: '[BP gtm.pricing $250k-$350k total contract value；Research market.som 假设约 20 个项目、每个约 $300k]'
- id: A6
  name: 单次部署的收入确认周期
  value: '4'
  unit: months
  source: '[BP investorMemo.firstCustomer.initialContract 提到 3-4 个月的入住桥接部署；模型按更保守的长端确认收入]'
- id: A7
  name: 付费项目爬坡
  value: 3 by M12, 7 by Q4Y2, 20 by Q4Y3
  unit: projects / programs
  source: '[BP milestones]，[BP market.som]，[Research market.som]'
- id: A8
  name: 长期平均合同 ARPU
  value: '300'
  unit: usdK annualized
  source: '[Research market.som 20 projects × $300k = $6.0M SOM]'
- id: A9
  name: 毛利率爬坡
  value: Y1 52-64%, Y2 58-65%, Y3 67-70%
  unit: percent
  source: '[BP businessModel.targetGrossMarginPct 70]，再叠加产品化与合作伙伴供给能力复用的经验假设'
- id: A10
  name: 月度流失/续约损失
  value: '3.0'
  unit: percent
  source: 创业财务经验假设：这是一个项目制基础设施流程，存在复购，但并不是每个延误站点都会自动续约
- id: A11
  name: 每个付费项目/计划的综合 CAC
  value: '85'
  unit: usdK
  source: '[BP gtm founder-led direct sales and referrals]，再叠加差旅、审批和伙伴驱动企业销售的经验假设'
- id: A12
  name: 管理层全成本薪酬
  value: '180'
  unit: usdK annual
  source: 创业财务经验假设：对应 pre-seed 阶段创始人/CEO 的现金薪资、税费和福利。
- id: A13
  name: 工程全成本薪酬
  value: '165'
  unit: usdK annual
  source: '[BP team Founding eng]，再叠加美国控制/软件工程师的全成本经验假设'
- id: A14
  name: 方案与部署全成本薪酬
  value: '145'
  unit: usdK annual
  source: '[BP team Solutions and utility engineer；BP team Deployment lead]，再叠加可下场部署的技术岗位全成本经验假设'
- id: A15
  name: 销售与合作全成本薪酬
  value: '170'
  unit: usdK annual
  source: '[BP team Partnerships or account executive]，再叠加企业级施工/能源 GTM 人才的全成本经验假设'
- id: A16
  name: 综合管理全成本薪酬
  value: '120'
  unit: usdK annual
  source: 创业财务经验假设：对应 pre-seed 阶段精简的财务/运营支持。
- id: A17
  name: 招聘节奏
  value: Solutions M2, deployment lead M4, first AE M10, second engineer M14, second sales hire M18, finance / ops M20, field ops M22, third engineer M28, third sales hire M30, second field ops M32
  unit: month index
  source: '[BP team.startTiming]、[BP strategicChoices.sequencingRationale]，以及为适配 headcount snapshot schema 所需的平滑假设'
- id: A18
  name: 非薪酬销售与营销费用爬坡
  value: 8K/mo early Y1, 10K/mo late Y1, then 13/15/17/19K per month across Y2 and 22/25/28/31K per month across Y3
  unit: usdK per month
  source: '[BP gtm channels]，再叠加创始人差旅、伙伴拓展和辖区销售成本的经验假设'
- id: A19
  name: 非薪酬研发费用爬坡
  value: 10K/mo early Y1, 12K/mo mid Y1, 14K/mo late Y1, then 15/16/17/18K per month across Y2 and 19/20/21/22K per month across Y3
  unit: usdK per month
  source: '[BP product roadmap]，再叠加遥测、云服务、控制软件与测试投入的经验假设'
- id: A20
  name: 非薪酬综合管理费用爬坡
  value: 15K/mo early Y1, 18K/mo mid Y1, 22K/mo late Y1, then 20/22/24/26K per month across Y2 and 28/29/30/31K per month across Y3
  unit: usdK per month
  source: '[Research regulatoryLandscape]、[BP risks]，再叠加保险、法务、合规和项目行政的经验假设'
- id: A21
  name: 现金转换假设
  value: EBITDA approximates cash movement
  unit: policy
  source: 创业财务经验假设；模型不纳入债务、capex 和营运资金波动，因为 BP 假设以合作伙伴供给能力为主，而非自有车队扩张
- id: A22
  name: 季度薪酬平滑政策
  value: Y2-Y3 quarterly salary uses the actual monthly hire schedule inside each quarter while headcount tables only show Y2 and Y3 year-end snapshots
  unit: policy
  source: '[Financial Modeler headcount column convention]'
