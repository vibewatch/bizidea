modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  Slip[发现公用事业延误] --> Assess[付费现场评估]\n  Assess --> Approval[获批的入住方案]\n  Approval --> Deploy[桥接部署]\n  Deploy --> Revenue[项目收入]\n  Revenue --> GrossProfit[毛利润]\n  GrossProfit --> Cash[现金跑道]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基础情景的收入来自：Q4Y2 做到 7 个付费项目，Q4Y3 做到约 20 个付费项目或计划，平均合同额约 $300K。
- checkName: 必须跑对的事
  finding: 公司必须在至少两个辖区里拿下重复审批先例，这样销售周期才能守在约 6 个月，毛利率也才能往目标爬。
- checkName: 模型会在哪儿断
  finding: 如果审批拖向 8 个月，或者期末毛利率卡在 65% 左右，哪怕招聘计划很克制，现金也会被压到 downside 情景。
- checkName: 下一轮融资的证明
  finding: 一旦 Q4Y2 证明了 7 个付费项目、2 个重复开发商，以及在不投入自有车队 capex 的前提下，合作伙伴供给能力也能把毛利率守在计划附近，就有资格讲下一轮融资。
sanityChecks:
  ruleOf40: Y3 增长 252.9% + EBITDA 利润率 25.4% = 278.3%。这个数很强，但也反映了早期收入基数还很小。
  burnMultiple: Y2 的 burn multiple 约为 0.6x；到 Y3 转为负值，因为重复部署带来的毛利润增长快于新增人头。
  revenuePerFte: 按 Y3 末 12 个 FTE 算，人均收入约 $500K，高于 $200-400K 的 SaaS 基准；只有在合作伙伴供给能力让模式保持轻资产时，这个数才站得住。
  flags:
  - 模型假设不需要自有车队 capex；如果模块化电力块需要预付款或自持，融资需求就得上调。
  - 收入按月和季度做了平滑，但真实世界里的公用事业延误和部署启动会更不均匀。
  - 客户数量只是付费项目和重复计划的代理指标，所以真实按 logo 口径计算的 CAC 和流失率，可能与模型里的单位经济模型不同。
