scenarios:
  downside:
    description: 审批更慢、重复项目继续后移，公司到第 3 年仍低于 SOM 路径，同时毛利结构更偏服务型。
    y3RevenueK: 4200.0
    y3EbitdaK: -120.0
    cashLowPointK: 60.0
    keyAssumptionChanges:
    - Q4Y2 只能做到 5 个付费项目而不是 7 个，Q4Y3 只能做到 14 个而不是 20 个。
    - 平均合同额维持在约 $270K，因为重复项目定价能力释放更晚。
    - 期末毛利率只能走到约 65%，因为审批和现场工作仍然更偏定制。
  base:
    description: 第 1 年的两次付费评估逐步转成 Q4Y2 的 7 个项目基础盘，公司在不自建车队的情况下走到研究中的第 3 年 $6.0M SOM 路径。
    y3RevenueK: 6000.0
    y3EbitdaK: 1523.1
    cashLowPointK: 842.0
    keyAssumptionChanges:
    - 付费项目在 M12 达到 3 个、Q4Y2 达到 7 个、Q4Y3 达到 20 个，与 BP 里程碑和 Research SOM 一致。
    - 平均合同额稳定在约 $300K，前端靠付费评估切入，后续靠重复项目扩张。
    - 毛利率向 70% 抬升，因为模板复用和合作伙伴供给的模块化能力压低了直接交付成本。
  upside:
    description: 审批先例积累更快，重复开发商更早扩张，公司在不明显增加人头的情况下跑赢基础计划。
    y3RevenueK: 7040.0
    y3EbitdaK: 2110.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - Q4Y3 做到 22 个付费项目/计划，而不是 20 个。
    - 更多客户买入重复切换和组合级服务后，平均合同额扩到约 $320K。
    - 毛利率大致走到 72%，因为辖区先例降低了每个项目的工程和现场管理开销。
