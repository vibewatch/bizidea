slug: occupancy-bridge-microgrids
date: '2026-06-11'
executiveSummary: >-
  Occupancy Bridge Microgrids should launch as a managed phased-occupancy service
  for Sun Belt multifamily developers whose first buildings are finished but
  cannot open because permanent electric service is delayed. The first customer
  is a regional apartment developer with a 200-300 unit garden-style project
  facing a slipped feeder or substation upgrade after vertical construction is
  largely complete. The company should sell protected rent-start dates, not
  generic temporary power, by combining standardized load-prioritization plans,
  mobile hybrid microgrid blocks, AHJ-ready documentation, remote operations,
  and managed cutover to permanent service. This wedge is attractive because one
  buyer already owns the pain, the buying trigger is visible in utility schedule
  revisions, and the cost of delay can exceed a bridge contract by a wide margin
  on even one project. Go-to-market should stay narrow around Texas, Georgia,
  and Arizona multifamily projects before expanding into build-to-rent,
  light-industrial, or airport phases, because approval precedent and repeatable
  site archetypes matter more than broad top-of-funnel. The strongest
  competitive position is workflow ownership: rental incumbents can supply
  equipment and EPCs can deliver one-off scopes, but neither appears to own
  apartment-specific phased occupancy and permanent-service handoff as a
  productized system. The main venture question is whether the company can win
  enough territory approvals and repeat-developer demand to keep fleet
  utilization and software-like margins on track. Exact insurer and lender
  requirements for occupied buildings on interim microgrid service remain
  unverified in the research, so early deployments must be structured as tightly
  scoped, referenceable proofs rather than broad national rollout. Given real
  pain but unresolved approval and utilization risk, this is a credible Watch
  opportunity until the first two paid deployments show repeatable approvals,
  pricing, and portfolio expansion.
problem:
  - "Finished multifamily buildings can miss planned lease-up and rent-start dates because feeder, substation, transformer, or utility-service upgrades slip after most construction spend is already committed."
  - "Current alternatives—waiting on the utility, renting diesel equipment, or commissioning one-off contractor scopes—do not reliably package building prioritization, AHJ approval, remote operations, and final handoff to permanent service."
solution:
  - "Deliver a phased-occupancy microgrid service that models which first buildings, common-area systems, and life-safety-adjacent loads can be energized safely while the permanent upgrade is still pending."
  - "Package modular hybrid temporary power, territory-specific approval documentation, remote monitoring, and planned cutover to permanent utility service as one project-opening workflow instead of an equipment rental."
whyWeWin:
  - "The product is designed around apartment lease-up timing, not generic temporary kilowatts, which lets it align buyer, trigger, pricing, and proof point around protected rent-start dates."
  - "Each deployment builds a precedent library of acceptable load blocks, AHJ packages, utility handoff steps, and cutover telemetry that equipment-led competitors do not naturally accumulate."
  - "By focusing first on a small set of repeat developer archetypes and utility territories, the company can compound approvals and utilization faster than bespoke EPC-style temporary power projects."
strategicChoices:
  beachhead: "Regional Sun Belt multifamily developers delivering 150-400 unit garden-style apartment communities where first occupancy is blocked by delayed permanent electric service."
  wedgeRationale: "This slice feels the pain first because the economic buyer directly owns delayed rent starts and carrying costs, while the site still needs only partial capacity to open first buildings and leasing operations. Broader construction or industrial temp-power categories would create more competition on equipment breadth and less urgency around a single monetization event."
  sequencingRationale: "Start with one multifamily archetype in a few utility territories, because the hardest bottleneck is approval and repeatability rather than hardware availability. Product should therefore sequence from load-block design and approval packets to remote operations and cutover software, while GTM stays founder-led and partner-assisted until the first repeat developer account proves that one deployment can lead to a portfolio motion."
  notYet:
    - "Permanent behind-the-meter microgrids for stabilized properties."
    - "Airport, municipal, and light-industrial phased openings before multifamily approvals are repeatable."
    - "Nationwide territory expansion before the company has written approval precedent and reusable site templates."
market:
  tam: "$129.0M estimated TAM based on 516,886 multifamily permits in 2025, an average 240-unit target community, a modeled 20% severe energization-delay incidence, and a roughly $300k occupancy-bridge contract."
  sam: "$84.0M estimated SAM by applying a 65% Sun Belt and Mountain concentration to the TAM, reflecting where multifamily permit and delivery intensity are highest."
  som: "$6.0M illustrative year-3 SOM based on about 20 projects per year at roughly $300k average contract value after focusing on a few utility territories and repeat regional developers."
  segments:
    - "Primary: Sun Belt multifamily developers with 150-400 unit garden-style communities facing delayed permanent service near lease-up."
    - "Secondary: Owner's representatives, electrical program managers, and build-to-rent operators managing phased openings across multiple active communities."
  buyingProcess: >-
    The process starts when a utility revises ready-for-service timing after
    vertical construction is largely complete and the developer needs a credible
    alternative before lease-up slips. The project team shapes scope, but budget
    approval sits with the Chief Development Officer, COO, or equivalent
    regional executive once the cost of delay becomes concrete.
product:
  mvp: >-
    MVP is a paid site-load assessment and phased-occupancy plan for one
    200-300 unit multifamily archetype, paired with modular hybrid microgrid
    deployment, approval documentation, remote monitoring, and a cutover plan to
    permanent service. It should not begin as a permanent DER platform, a broad
    fleet-management suite, or a generic marketplace for temporary power.
  sixMonth: "Ship the first production deployment package with standardized load-block templates, utility and AHJ approval packets, remote monitoring, and managed cutover for 2-3 target utility territories."
  twelveMonth: "Add a territory-specific precedent library, developer portfolio dashboards, and cutover orchestration tools that reduce engineering and approval work on the second and third project with the same customer."
  twentyFourMonth: "Expand the same operating system into adjacent phased-opening assets such as build-to-rent neighborhoods and light-industrial parks only after multifamily deployments show repeatable approval speed, gross margin, and fleet reuse."
  keyBets:
    - "The first three multifamily projects share enough building-load patterns that a reusable occupancy template library can remove material engineering work by the third deployment."
    - "Developers will buy a protected rent-start outcome even in softer leasing markets if the bridge cost stays well below one month of gross rent at risk."
    - "A small number of target utilities and AHJs will accept repeatable occupied-building interim-power archetypes once the startup packages compliance and cutover correctly."
    - "Hybrid temporary-power partners can supply modular blocks quickly enough that the company does not need to own a national fleet before product-market fit."
gtm:
  wedge: "Sell an occupancy-bridge program to regional apartment developers when a utility date slip threatens the first leasing window on a nearly completed community."
  channels:
    - "Founder-led direct sales to Chief Development Officers, COOs, and VPs of Construction at regional multifamily developers."
    - "Referrals from electrical contractors, MEP firms, and owner's representatives already inside the energization and inspection workflow."
    - "Channel partnerships with hybrid temporary-power OEMs or fleet providers that already see demand but do not own the occupancy workflow."
  funnelTargets: "Qualified account→paid site assessment 20-30%, assessment→reserved deployment 50%+, and first deployment→second project with the same developer 30%+ within 12 months."
  pricing: "Charge a paid site assessment and approval package up front, then a project contract priced by energized building blocks, deployment duration, and managed cutover scope; target roughly $250k-$350k total contract value on a 200-300 unit site, which is a fraction of the researched monthly gross rent at risk."
businessModel:
  revenueStreams:
    - "Paid site assessment, engineering, and approval-packaging fees."
    - "Occupancy-bridge deployment and remote-operations contracts."
    - "Managed cutover, portfolio retainer, and repeat-project program fees."
  unitOfValue: "Energized building block-month under an occupancy-bridge contract."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Add more building blocks and longer bridge duration on the same project."
    - "Roll out repeat deployments across the same developer's portfolio in the same utility territories."
    - "Extend the precedent library into adjacent phased-opening asset classes after multifamily repeatability is proven."
strategyMap:
  northStarMetric: "Gross monthly rent unlocked on customer sites before permanent utility service is live."
  inputMetrics:
    - "Paid site assessments signed in the beachhead segment."
    - "AHJ and utility approval rate in target territories."
    - "Days from utility slip notice to deployment-ready occupancy plan."
    - "Average realized contract value and deployment gross margin."
    - "First deployment to repeat-project conversion rate."
    - "Fleet utilization across active modular blocks."
  moatsToBuild:
    - "A territory-specific precedent database for occupied-building interim-power approvals and cutover requirements."
    - "Telemetry and operating data on which apartment load blocks can be energized safely and economically first."
    - "Repeat-developer workflows that tie site assessment, approval, deployment, and permanent-service handoff into one system of record."
  killCriteria:
    - "Fewer than 2 of the first 3 target utility territories produce written approval precedent for occupied-building interim power within 12 months."
    - "The first 2 paid deployments fail to generate at least 1 repeat project or signed portfolio commitment from the same developer base."
    - "Average realized contract value falls below $200k or deployment gross margin stays below 35% on the first 3 projects."
  mermaid: |
    flowchart LR
      Wedge[Multifamily occupancy wedge] --> MVP[Approval and deployment MVP]
      MVP --> Proof[Approved lease-up proof points]
      Proof --> Expansion[Portfolio and adjacent asset expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: "Acute customer pain and a coherent wedge, but conviction stays limited until territory approvals and deployment economics are proven on real occupied multifamily sites."
    whyBelieve: "The research supports a real balance-sheet problem, credible hybrid temporary-power technology, and a visible gap between equipment rental and an apartment-specific occupancy-bridge workflow."
    whyDoubt: "The company still lacks proof that AHJs, utilities, lenders, and insurers will routinely approve interim occupied service at attractive utilization and margins."
    nextDiligence: "See two paid multifamily deployments in target territories that gain approval, start leasing earlier than the utility-only path, and lead to one repeat portfolio commitment."
  firstCustomer:
    title: "Regional Sun Belt multifamily developer with a delayed first-building energization event"
    profile: "A developer with 2-6 active communities and one nearly completed 200-300 unit garden-style project in Texas, Georgia, or Arizona where lease-up is blocked by feeder or substation delay."
    trigger: "The utility revises ready-for-service timing after construction is largely complete and the first leasing window or lender deadline is at risk."
    buyer: "Chief Development Officer or COO"
    initialContract: "A $40k-$75k paid site assessment and approval package that converts into a $250k-$350k 3-4 month occupancy-bridge deployment plus managed cutover if the utility date remains outside the leasing window."
  mustBeTrue:
    - "At least 5 of the first 12 target developers confirm they would fund bridge power to protect rent-start on a live delayed project."
    - "At least 2 target utility and AHJ territories approve repeatable occupied-building interim-power archetypes within the first year."
    - "The first 3 paid deployments close at pricing that supports a path to 70% gross margin once approval and field work become templated."
    - "At least 1 of the first 2 deployments converts into a repeat project or portfolio commitment from the same developer."
    - "Modular fleet blocks achieve at least 60% utilization by month 18 without forcing the company into uneconomic nationwide dispatch."
  diligenceQuestions:
    - "Which utilities and AHJs in Texas, Georgia, and Arizona will provide written precedent for occupied-building temporary service?"
    - "How often is delayed energization, rather than broader construction slippage, the real gating issue on 150-400 unit multifamily projects?"
    - "What insurer and lender approvals are required before residents can occupy buildings running on interim microgrid service?"
    - "Can hybrid temporary-power partners reserve modular capacity without the startup owning a large fleet up front?"
    - "What contract value and gross margin are achievable after fuel, field labor, engineering, and cutover support on the first three projects?"
operatingAssumptions:
  - assumption: "Regional multifamily developers will fund a bridge contract when the modeled rent-start delay is larger than the project fee."
    basis: research.yaml
    validationTest: "Interview 12 target developers and close at least 2 paid site assessments tied to active delayed projects in the proposed pricing range."
    decisionImpact: "If false, the company must narrow to only the most time-critical projects or abandon multifamily as the opening wedge."
  - assumption: "A 200-300 unit garden-style project has enough recurring load patterns that phased-occupancy templates become reusable by the third deployment."
    basis: idea.yaml
    validationTest: "Map the first 3 design-partner sites and confirm that at least 60% of required load-block, control, and cutover steps can be reused from a shared template library."
    decisionImpact: "If false, implementation stays too bespoke and the company must tighten the ICP further or price as project services rather than productized infrastructure."
  - assumption: "AHJs and utilities in the first target territories will accept occupied-building interim service when documentation and load limits are pre-packaged."
    basis: research.yaml
    validationTest: "Secure 3 written precedents or pilot approvals from utilities, inspectors, or owner representatives in Texas, Georgia, and Arizona."
    decisionImpact: "If false, national expansion stops and the company must focus only on non-occupied or non-multifamily use cases with simpler approval paths."
  - assumption: "Hybrid temporary-power OEM or fleet partners will supply modular blocks without forcing full fleet ownership before product-market fit."
    basis: research.yaml
    validationTest: "Negotiate at least 2 supply or reservation agreements that define lead times, minimum commitment levels, and redeployment terms for early projects."
    decisionImpact: "If false, capital intensity rises and the company needs a smaller territory footprint or a different financing strategy before scaling sales."
  - assumption: "Insurer and lender objections can be cleared case by case without adding more than 30 days to early deal cycles."
    basis: operator judgment
    validationTest: "Review the first 2 live project deals with customer lenders and insurers and document whether approvals are granted inside a 30-day window."
    decisionImpact: "If false, the startup must redesign the offering around non-occupied loads, earlier pre-occupancy use, or different project types."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Territory precedent discovery"
    hypothesis: "A small set of Sun Belt utility and AHJ combinations will support occupied-building interim power if the startup brings a tightly scoped archetype and approval packet."
    successMetric: "At least 3 written precedents, pilot approvals, or strong written indications across Texas, Georgia, and Arizona."
    owner: "CEO"
  - horizon: "0–90 days"
    experiment: "Multifamily load-block archetype design"
    hypothesis: "One 200-300 unit garden-style template can cover most first-building, common-area, and leasing-office loads needed for the initial wedge."
    successMetric: "One reference design completed with at least 60% reusable load and cutover components across 3 target projects."
    owner: "Founding eng"
  - horizon: "90–180 days"
    experiment: "Paid site assessment sales"
    hypothesis: "Developers will pay before deployment for a package that quantifies rent-at-risk, approval path, and bridge scope on a live delayed project."
    successMetric: "At least 2 paid site assessments signed at $40k-$75k."
    owner: "CEO"
  - horizon: "90–180 days"
    experiment: "First approved occupancy-bridge deployment"
    hypothesis: "The startup can install and operate an interim power bridge that lets first buildings open ahead of the permanent utility date."
    successMetric: "One deployment approved by the relevant utility and AHJ, with the customer starting leasing or occupancy earlier than the utility-only plan."
    owner: "Deployment lead"
  - horizon: "180–365 days"
    experiment: "Repeat-project conversion"
    hypothesis: "One successful deployment creates enough trust and reusable precedent to win the same developer's next delayed project faster."
    successMetric: "At least 1 repeat project or portfolio commitment signed within 6 months of the first live deployment."
    owner: "CEO"
  - horizon: "12–18 months"
    experiment: "Partner-supplied fleet utilization model"
    hypothesis: "Modular blocks can be reserved, redeployed, and monitored across projects at utilization levels that support the long-term gross-margin target."
    successMetric: "At least 60% utilization across available modular blocks and documented unit economics on the first 3 projects."
    owner: "Operations lead"
operations:
  - "Maintain a territory-by-territory approval playbook covering utility process, AHJ documentation, allowable load blocks, and cutover steps."
  - "Run every project with remote telemetry, uptime alerts, and a named operations owner responsible for first response and customer communication."
  - "Track realized rent-start acceleration, deployment gross margin, and precedent reuse after every project so the company knows whether the model is compounding."
  - "Use contracted electrical engineering, field labor, and hybrid-power partners where possible until utilization justifies deeper vertical integration."
  - "Refuse projects that require permanent-power substitution, undefined resident-safety responsibilities, or custom scope outside the approved archetype library."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own developer sales, territory selection, partner negotiations, and the first approval playbooks while the wedge is still being proven."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the load-modeling, telemetry, template, and cutover software needed to turn the service into a repeatable system rather than one-off field work."
  - role: "Solutions and utility engineer"
    startTiming: "Month 1-2"
    rationale: "Translate site conditions into approval-ready designs and reduce the time from utility slip notice to signed deployment scope."
  - role: "Deployment lead"
    startTiming: "Month 3-4"
    rationale: "Own field execution, partner coordination, remote operations, and postmortems once the first live projects begin."
  - role: "Partnerships or account executive"
    startTiming: "Month 9-12"
    rationale: "Add dedicated pipeline and partner management only after the company has one approved deployment, one repeatable pricing model, and visible repeat-developer demand."
milestones:
  - horizon: "0–12 months"
    items:
      - "Complete 12-15 ICP interviews, secure 2 paid site assessments, and win written approval precedent in at least 2 target territories."
      - "Ship the first multifamily occupancy-bridge deployment package with reusable load-block templates, remote monitoring, and cutover workflows."
      - "Execute 1 approved live deployment and capture a referenceable case showing earlier lease-up than the utility-only timeline."
  - horizon: "12–24 months"
    items:
      - "Reach 5-8 paying projects across repeat regional developers while keeping the offering constrained to approved multifamily archetypes."
      - "Convert at least 2 customers into portfolio relationships with faster assessment-to-deployment cycles on second projects."
      - "Prove partner-supplied or financed modular capacity can support utilization and margin targets without full national fleet ownership."
  - horizon: "24–36 months"
    items:
      - "Track toward the researched $6.0M SOM case by servicing about 20 projects annually at roughly $300k average contract value."
      - "Establish a defensible approval and telemetry dataset across the initial utility territories."
      - "Enter one adjacent phased-opening asset class only if multifamily repeatability, margin, and partner supply stay within plan."
risks:
  - risk: "AHJ or utility acceptance for occupied-building interim power is slower or narrower than expected."
    likelihood: High
    impact: High
    mitigation: "Concentrate on a small number of territories, secure written precedent before scaling sales, and keep the initial archetype tightly bounded."
  - risk: "Fleet utilization stays weak because project slip dates cluster and early demand is too lumpy."
    likelihood: Medium
    impact: High
    mitigation: "Use modular partner-supplied capacity first, prioritize repeat developers with multiple active projects, and delay large owned-fleet commitments until utilization data is real."
  - risk: "Soft lease-up conditions in supply-heavy Sun Belt markets make some developers choose delay and concessions over a bridge contract."
    likelihood: Medium
    impact: Medium
    mitigation: "Target projects with near-term lease-up pressure, lender deadlines, or especially large rent-start exposure rather than selling every delayed site."
  - risk: "Rental incumbents or EPCs bundle similar hybrid hardware and undercut the startup before the workflow moat is established."
    likelihood: Medium
    impact: Medium
    mitigation: "Compete on territory precedent, apartment-specific phased occupancy, and cutover management instead of on equipment breadth alone."
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months of runway to secure territory approvals, ship the first approved multifamily deployments, build the template and telemetry stack, hire core engineering and deployment talent, and prove repeat-project demand before expanding fleet ownership or adjacent markets."
