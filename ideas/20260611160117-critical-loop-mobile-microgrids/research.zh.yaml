openQuestions:
- 到底哪些公用事业方和 AHJ 会允许多户住宅楼栋在临时微电网供电下让居民入住？
- 在永久供电切换前，已入住公寓项目如果依赖过渡期微电网，保险方和贷款方会提出哪些要求？
- 2026 年在得州、佐治亚州和亚利桑那州，部署一套标准化 250 户入住桥接方案的全包月度成本到底是多少？
- 在目标都会区里，多户住宅交付延误究竟有多大比例是通电问题，而不是更广义的施工或审批问题？
- 当同一公用事业辖区里的项目延误日期高度相关时，车队利用率还能不能保持吸引力？
