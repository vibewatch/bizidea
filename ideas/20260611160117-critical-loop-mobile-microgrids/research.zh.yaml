  searchedQueries:
  - 查找权威且近期的资料，覆盖美国电网并网延误、容量瓶颈，以及影响住宅、房地产开发或商业项目的公用事业接电等待时间。
  - 查找关于美国多户住宅或公寓开发因供电服务、变压器短缺、公用事业升级或电气化约束而延期的资料。
  - 查找美国施工现场或项目通电场景中，替代柴油发电机的临时电力方案资料，包括电池储能、移动微电网、排放/噪音限制及供应商产品页面。
  - 查找与公用事业通电延误相关的移动微电网或临时分布式能源竞争对手资料，包括 Critical Loop、BoxPower、Scale Microgrids 和 Aggreko。
  - 查找与美国临时微电网或建筑入住前临时供电相关的监管与标准资料。
  - 查找美国多户住宅施工量、许可、开工和完工的权威资料，并按地区或 Sun Belt 州分布。
  - 查找与 150-400 户 Sun Belt 多户住宅项目相关的美国公寓租金、开租经济性和持有成本影响资料。
  - 查找美国微电网市场、移动电池储能市场以及临时供电市场的规模或增速权威资料。
  - 查找 Sun Belt 主要公用事业公司关于新建项目临时供电或通电要求的直接 URL。
  - 查找评论、论坛、招聘信息或 RFP，以揭示施工或多户住宅场景中，对临时供电、微电网或缓解公用事业延误的真实需求。
  - 查找可抓取的直接 URL，覆盖美国变压器短缺或公用事业设备延期拖慢施工与新接电进度的资料。
