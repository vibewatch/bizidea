    threatOfSubstitutes:
      score: 4
      rationale: 客户仍可以继续延期开盘、租柴油或混合设备，或找承包商定制一套方案，所以替代压力真实存在。
      sourceRefs:
      - 32
      - 33
      - 37
      - 38
    competitiveRivalry:
      score: 3
      rationale: 公开市场里专门盯入住桥接的竞争者并不多，但永久微电网公司和租赁巨头都在争抢同一行预算。
      sourceRefs:
      - 3
      - 34
      - 35
      - 37
      - 48
  pestle:
  - factor: 政策
    impact: positive
    point: 各州和公用事业方围绕韧性建设的议程，正在让微电网更像一项正当的电网与停电规划工具。
    sourceRefs:
    - 31
  - factor: 经济
    impact: negative
    point: Sun Belt 主要市场供给重、让利多，哪怕延误痛点仍强，开发商的开租定价能力也会被削弱。
    sourceRefs:
    - 16
    - 18
    - 21
    - 22
    - 23
    - 25
  - factor: 社会
    impact: positive
    point: 公寓交付延后会进一步加剧住房短缺，因此任何能加快入住的工具，价值都会被放大。
    sourceRefs:
    - 9
    - 14
    - 16
  - factor: 技术
    impact: positive
    point: 混合临时供电已经不再是纯柴油租赁，而是走向电池、控制系统和更安静的运行方式。
    sourceRefs:
    - 35
    - 37
    - 38
    - 41
  - factor: 法律
    impact: negative
    point: 审批不是靠一条全国统一规则解决，而是取决于代码解释、公用事业流程和 AHJ 签字。
    sourceRefs:
    - 29
