      rationale: 电池、发电机、控制系统和公用事业接口这些投入要素是买得到的，但相邻电气设备短缺以及强辖区依赖的审批步骤，仍让供应商和基础设施伙伴握有不小的话语权。
      sourceRefs:
      - 35
