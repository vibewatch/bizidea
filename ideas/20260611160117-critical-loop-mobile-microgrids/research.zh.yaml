competitors:
- name: Critical Loop
  stage: scale-up
  wedge: 用移动微电网把公用事业延误压缩成快速部署，服务大负载客户。
  pricing: 定制化服务合同 / 按报价
  strength: 公开叙事最接近，而且已经围绕电网延误痛点拿到融资。
  weaknessVsUs: 目前看不出它专门围绕公寓分阶段入住、验收资料包或首批楼栋开租流程来做。
  sourceRefs:
  - 3
  - 4
- name: Scale Microgrids
  stage: scale-up
  wedge: 面向 C&I 站点，提供可融资的 turnkey 微电网，卖点是韧性、费率管理和更快通电。
  pricing: 定制化融资系统 / 按报价
  strength: 控制系统、融资能力和现场全栈能源交付都很强。
  weaknessVsUs: 更偏永久型、偏 C&I，而不是服务多户住宅开盘的移动临时入住桥接。
  sourceRefs:
  - 34
  - 35
- name: BoxPower
  stage: scale-up
  wedge: 软件辅助的模块化微电网，把偏远和高韧性场景的可研与部署周期压短。
  pricing: 按项目定制报价
  strength: EASI 平台意味着它在设计和部署上可能比传统定制微电网更快。
  weaknessVsUs: 品牌和产品姿态更偏偏远/离网场景，而不是公寓社区在入住时与公用事业交接。
  sourceRefs:
  - 36
- name: Aggreko
  stage: incumbent
  wedge: 面向施工和工业站点，提供大规模临时供电车队和混合站点电力方案。
  pricing: 按报价租赁 / 服务定价
  strength: 在车队规模、现场运营和客户触达上都很深。
  weaknessVsUs: 它更像设备型供给，而不是一套能被公用事业认可、还带切换管理的入住桥接服务。
  sourceRefs:
  - 37
  - 38
- name: United Rentals
  stage: incumbent
  wedge: 大型租赁渠道，正在推电池、氢能和混合临时供电方案。
  pricing: 租赁 / 按报价
  strength: 全国性渠道和强替代供给，项目只要急着上临时电，它很容易出现。
  weaknessVsUs: 看起来并没有把自己定位成一套面向开发商和 AHJ 的托管式入住桥接平台。
  sourceRefs:
  - 38
regulatoryTechnicalConstraints:
- point: 临时服务要同时满足 NEC Article 590、OSHA 临时布线规则，以及各家公用事业自己的服务流程。
  sourceRefs:
