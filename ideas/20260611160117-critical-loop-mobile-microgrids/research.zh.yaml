    - 39
  adoptionFrictionMatrix:
  - friction: 已入住楼栋在过渡供电下获得 AHJ 与公用事业接受
    severity: high
    affectedBuyer: 施工副总裁 / COO
    mitigation: 先从少数几个辖区起步，把审批资料和负载上限提前打包。
    sourceRefs:
    - 29
    - 30
    - 31
    - 32
  - friction: 在更广泛电气设备短缺背景下，车队与部件能否拿到
    severity: high
    affectedBuyer: 运营负责人
    mitigation: 尽早锁定模块化电力块，并围绕可复用的标准站点原型设计。
    sourceRefs:
    - 42
    - 43
    - 44
  - friction: 在混合业态、正在运行的站点里，逐栋划定负载优先级并不是现成 turnkey 的事
    severity: medium
    affectedBuyer: 项目负责人
    mitigation: 把首批楼栋负载模块、调试清单和远程控制模板标准化。
    sourceRefs:
    - 4
    - 35
    - 36
  - friction: 在还没确认最终公用事业延误时长前，开发商会犹豫要不要先承诺
    severity: medium
    affectedBuyer: 首席开发官
    mitigation: 先卖分阶段就绪评估，等公用事业日期明显滑动后再转成正式部署。
    sourceRefs:
    - 5
    - 6
    - 32
    - 49
market:
  tam:
    value: $129.0M
    rationale: 自下而上的滩头 TAM：2025 年 516,886 个多户住宅许可 ÷ 平均 240 户目标社区 × 20% 的严重通电延误发生率 × 平均 $300k 的入住桥接合同，约等于 $129M。
    isEstimate: true
    sourceRefs:
    - 14
    - 18
    - 5
  sam:
    value: $84.0M
    rationale: SAM 在 TAM 基础上施加 65% 的 Sun Belt 与山地州集中度，因为新建多户住宅供给和许可强度主要集中在这些区域；$129M × 65% ≈ $84M。
    isEstimate: true
    sourceRefs:
    - 14
    - 16
    - 18
  som:
    value: $6.0M
    rationale: 第 3 年 SOM 假设公司聚焦少数几个公用事业辖区和重复区域开发商后，每年能服务 20 个项目，平均合同额 $300k。
    isEstimate: true
    sourceRefs:
    - 5
    - 16
    - 32
bottomUpSizingDrivers:
- driver: 可触达总单元数
  value: 2025 年多户住宅许可 516,886 套；按平均 240 户计算，约对应 2,154 个目标社区
  source: '[14] + calc'
- driver: 容易延误的占比
  value: 严重通电延误附着率假设为 20%
  source: '[5] + calc'
- driver: 每个项目面临的风险收入
  value: 约 $1.74M = 250 户 × $1,741 平均挂牌月租 × 4 个月
  source: '[18] + calc'
- driver: 估算合同金额
  value: $300k 的平均入住桥接合同（约占风险总租金的 17%）
  source: calc
