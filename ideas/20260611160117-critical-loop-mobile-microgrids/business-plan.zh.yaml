slug: occupancy-bridge-microgrids
date: '2026-06-11'
executiveSummary: Occupancy Bridge Microgrids 最适合先做一项托管式分阶段入住服务，面向美国 Sun Belt 地区的多户住宅开发商：首批楼栋已经完工，却因为永久电力服务延误迟迟不能开盘。第一位客户应是一家区域型公寓开发商，手里有一个 200-300 户的花园式项目，主体施工基本完成，却碰上馈线或变电站升级延期。公司卖的不是泛化的临时供电，而是“守住租金起算日”：把标准化负载优先级方案、移动混合微电网模块、AHJ 就绪资料、远程运营，以及切换到永久供电的托管服务打成一体。这个切口吸引人的地方在于，痛点已经由同一个买方直接承担，购买触发点会明确出现在公用事业排期修订里，而哪怕只看一个项目，延误成本也可能远高于桥接合同。GTM 应该先缩窄在得州、佐治亚州和亚利桑那州的多户住宅项目，再向 build-to-rent、轻工业或机场分期开业场景扩展，因为审批先例和可复用站点原型，比宽撒漏斗更重要。最强的竞争位置在于对流程的掌控：租赁巨头可以供设备，EPC 可以交付一次性工程，但看起来都没有把公寓场景下的分阶段入住和永久供电交接做成产品化系统。最大的风投问题是，公司能不能在足够多的辖区里拿到审批，并跑出足够多的重复开发商需求，从而把车队利用率和接近软件型的利润率守住。研究里仍未核实，在过渡期微电网供电下的已入住楼栋究竟需要满足哪些保险和贷款方要求，所以早期部署必须做成边界清晰、可复用、可引用的验证样板，而不是一上来全国铺开。考虑到痛点真实，但审批和利用率风险还没拆透，这更像一个可信的 Watch 机会——要等前两次付费部署跑出可重复的审批、定价和组合扩张，判断才会真正抬升。
problem:
- 已完工的多户住宅楼栋，可能因为馈线、变电站、变压器或公用事业服务升级在大部分施工投入已经砸下去之后继续延期，错过原定的开租和租金起算日。
- 现在的替代方案——继续等公用事业方、租柴油设备，或找承包商做一次性工程——都很难把楼栋优先级、AHJ 审批、远程运营和最终切到永久供电这几件事一起打包解决。
solution:
- 交付一项分阶段入住微电网服务，先建模判断在永久升级尚未完成时，哪些首批楼栋、公共区域系统和接近生命安全的负载可以被安全点亮。
- 把模块化混合临时供电、分辖区审批资料、远程监控，以及切到永久公用事业供电的计划，打成一条项目开盘流程，而不是单纯设备租赁。
whyWeWin:
- 产品围绕公寓开租节奏设计，而不是围绕泛化的临时千瓦数设计，所以买方、触发点、定价和验证点都能围绕“守住租金起算日”对齐。
- 每做一次部署，都会积累一套先例库：哪些负载模块能过审、AHJ 资料怎么打、和公用事业如何交接、切换遥测怎么留痕；这些不是设备导向型对手自然会沉淀的资产。
- 先盯住少数几类重复开发商原型和少数公用事业辖区，公司能比定制型 EPC 临时供电项目更快叠审批、叠利用率。
strategicChoices:
  beachhead: 美国 Sun Belt 地区的区域型多户住宅开发商，正在交付 150-400 户的花园式公寓社区，而首批入住被永久电力服务延误卡住。
  wedgeRationale: 这个切片最先感到疼，因为经济买方直接承担租金起算延后和持有成本上升，而站点在开出首批楼栋和招租运营前其实只需要部分容量。更宽泛的施工或工业临时供电类别，竞争会更多落在设备覆盖面上，而不是围绕单次变现节点的强时效。
  sequencingRationale: 先围绕一种多户住宅原型、少数几个公用事业辖区开打，因为最难的瓶颈不是硬件够不够，而是审批能不能重复。产品节奏因此应该先做负载模块设计和审批资料，再延伸到远程运营和切换软件；GTM 则在第一个重复开发商账户证明“一次部署能带来组合打法”之前，保持创始人主导、伙伴辅助。
  notYet:
  - 面向已稳定运营资产的永久表后微电网。
  - 在多户住宅审批尚未跑通前，先做机场、市政和轻工业的分期开业场景。
  - 在公司还没有成文审批先例和可复用站点模板前，先做全国扩张。
market:
  tam: $129.0M 的估算 TAM：基于 2025 年 516,886 个多户住宅许可、平均 240 户目标社区、模型假设 20% 的严重通电延误发生率，以及约 $300k 的入住桥接合同。
  sam: $84.0M 的估算 SAM：对 TAM 施加 65% 的 Sun Belt 与山地州集中度，反映多户住宅许可和交付最密集的区域。
  som: $6.0M 的示意性第 3 年 SOM：聚焦少数几个公用事业辖区和重复区域开发商后，按每年约 20 个项目、平均合同额约 $300k 计算。
  segments:
  - 主要细分：美国 Sun Belt 地区，拥有 150-400 户花园式社区、在开租前遭遇永久供电延误的多户住宅开发商。
  - 次级细分：在多个活跃社区之间管理分期开业的业主代表、电气项目经理和 build-to-rent 运营方。
  buyingProcess: 流程起点通常是：主体施工基本完成后，公用事业方把 ready-for-service 时间往后改，开发商必须在开租窗口滑掉之前找到一个可信替代方案。项目团队会一起塑造范围，但一旦延误成本变得具体，预算拍板的人通常是首席开发官、COO 或同等级别的区域高管。
product:
  mvp: MVP 应该是一套付费现场负载评估与分阶段入住方案，先覆盖一种 200-300 户的多户住宅原型，再配上模块化混合微电网部署、审批资料、远程监控，以及切到永久供电的计划。它一开始不该做成永久 DER 平台、泛化的车队管理套件，或临时供电的通用撮合市场。
  sixMonth: 6 个月内交付第一套生产级部署包：包含标准化负载模块模板、公用事业与 AHJ 审批资料、远程监控，以及覆盖 2-3 个目标公用事业辖区的托管切换流程。
  twelveMonth: 12 个月内补齐按辖区区分的先例库、开发商组合仪表盘，以及切换编排工具，让同一客户的第二、第三个项目能显著减少工程和审批工作量。
  twentyFourMonth: 24 个月后，只有当多户住宅部署已经证明审批速度、毛利率和车队复用都可重复时，再把同一套操作系统扩到 build-to-rent 社区、轻工业园区等相邻分期开业资产。
  keyBets:
  - 前三个多户住宅项目之间，在楼栋负载模式上会有足够重合，到第三次部署时，可复用的入住模板库就能明显砍掉工程工作量。
  - 即便招租市场转弱，只要桥接成本远低于一个月的风险总租金，开发商仍会为“守住租金起算”买单。
  - 少数目标公用事业方和 AHJ 会接受可重复的已入住楼栋过渡供电原型，只要创业公司把合规和切换打包到位。
  - 混合临时供电合作伙伴能足够快地提供模块化能力，让公司在跑出 PMF 之前不必先自建全国车队。
gtm:
  wedge: 当公用事业日期滑动威胁到一个接近完工社区的首轮招租窗口时，把入住桥接方案卖给区域型公寓开发商。
  channels:
  - 由创始人直接向区域型多户住宅开发商的首席开发官、COO 和施工副总裁销售。
  - 来自已经深度参与通电和验收流程的电气承包商、MEP 公司和业主代表的转介绍。
  - 与混合临时供电 OEM 或车队提供方建立渠道合作——他们已经看见需求，但并不掌控入住流程。
  funnelTargets: 合格账户→付费现场评估 20-30%；评估→预留部署 50%+；首个部署→同一开发商第二个项目 12 个月内达到 30%+。
  pricing: 先收付费现场评估和审批资料费，再按已点亮的楼栋模块数、部署时长和托管切换范围签项目合同；目标是在 200-300 户站点上拿到约 $250k-$350k 的总合同额，这只占研究里月度风险总租金的一小部分。
businessModel:
  revenueStreams:
  - 付费现场评估、工程设计和审批打包服务费。
  - 入住桥接部署与远程运营合同。
  - 托管切换、组合顾问和重复项目计划费。
  unitOfValue: 入住桥接合同下，按已点亮楼栋模块-月计费。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一个项目里增加更多楼栋模块，并拉长桥接时长。
  - 在同一开发商、同一公用事业辖区内，滚动推进重复部署。
  - 在证明多户住宅场景可重复后，把先例库延伸到相邻的分期开业资产类别。
strategyMap:
  northStarMetric: 在永久公用事业供电尚未上线前，客户站点提前解锁的月度总租金。
  inputMetrics:
  - 在滩头市场签下的付费现场评估数。
  - 目标辖区里的 AHJ 与公用事业审批通过率。
  - 从公用事业发出延误通知到部署就绪的入住方案所需天数。
  - 实际实现的平均合同金额与部署毛利率。
  - 首次部署转成重复项目的转化率。
  - 活跃模块化电力块的车队利用率。
  moatsToBuild:
  - 按辖区划分的已入住楼栋过渡供电审批与切换要求先例数据库。
  - 关于哪些公寓负载模块能先被安全、经济地点亮的遥测与运营数据。
  - 把现场评估、审批、部署和永久供电交接串成一套系统记录的重复开发商工作流。
  killCriteria:
  - 前 12 个月里，首批 3 个目标公用事业辖区中少于 2 个能产出已入住楼栋过渡供电的书面审批先例。
  - 前 2 次付费部署没能从同一批开发商中换来至少 1 个重复项目或已签署的组合承诺。
  - 前三个项目的平均实际合同额低于 $200k，或者部署毛利率始终低于 35%。
  mermaid: "flowchart LR\n  Wedge[多户住宅入住切口] --> MVP[审批与部署 MVP]\n  MVP --> Proof[已获批的开租验证点]\n  Proof --> Expansion[组合扩张与相邻资产扩张]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 客户痛点尖锐，切口也成型，但在真实的已入住多户住宅站点上跑通辖区审批和部署经济性之前，判断仍要保守。
    whyBelieve: 研究已经支撑了三件事：这是个真实打到资产负债表的问题；混合临时供电技术可信；设备租赁和面向公寓的入住桥接流程之间确实有明显空档。
    whyDoubt: 公司仍未证明 AHJ、公用事业方、贷款人和保险方会不会在有吸引力的利用率和利润率水平上，常态化批准过渡期的已入住供电。
    nextDiligence: 先看到目标辖区里的两次付费多户住宅部署：拿到审批、比单纯等待公用事业更早启动招租，并进一步带来 1 个重复组合承诺。
  firstCustomer:
    title: 一家首批楼栋通电延误的区域型 Sun Belt 多户住宅开发商
    profile: 开发商手里有 2-6 个活跃社区，其中一个位于得州、佐治亚州或亚利桑那州、规模 200-300 户的花园式项目已接近完工，但开租被馈线或变电站延误卡住。
    trigger: 主体施工基本完成后，公用事业方把 ready-for-service 日期往后改，首轮招租窗口或贷款人期限开始出风险。
    buyer: 首席开发官或 COO
    initialContract: 先签一份 $40k-$75k 的付费现场评估与审批包；如果公用事业日期仍落在招租窗口之外，再转成一份 $250k-$350k、持续 3-4 个月的入住桥接部署加托管切换合同。
  mustBeTrue:
  - 前 12 个目标开发商里，至少有 5 个确认：在真实延误项目上，他们愿意出钱做桥接供电来守住租金起算。
  - 首年内至少有 2 个目标公用事业与 AHJ 辖区批准可重复的已入住楼栋过渡供电原型。
  - 前三次付费部署的成交价格，能够支撑出一条通向 70% 毛利率的路径——前提是审批与现场工作逐步模板化。
  - 前 2 次部署里，至少有 1 次能转成同一开发商的重复项目或组合承诺。
  - 到第 18 个月，模块化车队电力块的利用率至少达到 60%，且不需要公司为了调度而做亏钱的全国铺网。
  diligenceQuestions:
  - 得州、佐治亚州和亚利桑那州里，哪些公用事业方和 AHJ 会给出已入住楼栋临时供电的书面先例？
  - 在 150-400 户的多户住宅项目里，真正卡住交付的是通电延误，还是更广义的施工延误？这种情况到底有多常见？
  - 在住户入住前，若项目依赖过渡期微电网供电，保险方和贷款方还需要哪些批准？
  - 在创业公司尚未自建大车队前，混合临时供电合作伙伴能否预留模块化容量？
  - 把燃料、现场人工、工程支持和切换服务都算进去后，前三个项目到底能拿到怎样的合同金额和毛利率？
operatingAssumptions:
- assumption: 区域型多户住宅开发商会在模型测算出的租金起算损失高于项目费用时，为桥接合同买单。
  basis: research.yaml
  validationTest: 访谈 12 家目标开发商，并在提议的定价区间内，围绕真实延误项目拿下至少 2 份付费现场评估。
  decisionImpact: 如果不成立，公司就必须把范围缩到时效性最强的项目，或者放弃把多户住宅作为开场切口。
- assumption: 一个 200-300 户的花园式项目，在负载模式上有足够重复性，到了第三次部署时，分阶段入住模板就能复用。
  basis: idea.yaml
  validationTest: 梳理前 3 个设计共创站点，确认至少 60% 的负载模块、控制和切换步骤可以直接复用同一套模板库。
  decisionImpact: 如果不成立，实施就会过于定制，公司要么进一步收紧 ICP，要么把自己定价成项目服务，而不是产品化基础设施。
- assumption: 在首批目标辖区里，只要把资料和负载上限预打包，AHJ 和公用事业方就会接受已入住楼栋的过渡供电。
  basis: research.yaml
  validationTest: 在得州、佐治亚州和亚利桑那州，从公用事业方、检查人员或业主代表那里拿到 3 份书面先例或试点批准。
  decisionImpact: 如果不成立，全国扩张就必须停下，公司只能转去做未入住或非多户住宅场景，那里的审批路径更简单。
- assumption: 混合临时供电 OEM 或车队合作伙伴会在 PMF 前提供模块化电力块，而不是逼公司先把整支车队买下来。
  basis: research.yaml
  validationTest: 至少谈成 2 份供给或预留协议，明确早期项目的交付周期、最低承诺量和跨项目复用条款。
  decisionImpact: 如果不成立，资本强度会上升，公司在放大销售前就需要更小的辖区覆盖或换一种融资策略。
- assumption: 保险方和贷款方的异议可以逐案解决，不会让早期交易周期额外增加超过 30 天。
  basis: 运营判断
  validationTest: 把前 2 个真实项目拿给客户的贷款方和保险方逐案审过，并确认审批能在 30 天窗口内完成。
  decisionImpact: 如果不成立，创业公司就必须把产品改成未入住负载、入住前更早阶段，或者改做别的项目类型。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 辖区先例摸排
  hypothesis: 少数几个 Sun Belt 公用事业与 AHJ 组合，只要创业公司拿出边界清楚的原型和审批包，就会支持已入住楼栋过渡供电。
  successMetric: 在得州、佐治亚州和亚利桑那州拿到至少 3 份书面先例、试点批准或明确的书面积极信号。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 多户住宅负载模块原型设计
  hypothesis: 一套 200-300 户花园式模板，就能覆盖首轮切口里大部分首批楼栋、公共区域和招租办公室的负载。
  successMetric: 完成 1 份参考设计，并在 3 个目标项目中证明至少 60% 的负载与切换组件可复用。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 付费现场评估销售
  hypothesis: 面对真实延误项目，只要方案能量化风险租金、审批路径和桥接范围，开发商愿意在部署前先付费。
  successMetric: 至少签下 2 份 $40k-$75k 的付费现场评估。
  owner: 创始人/CEO
- horizon: 90–180 天
  experiment: 首个获批的入住桥接部署
  hypothesis: 创业公司能安装并运营一套过渡电力桥接方案，让首批楼栋早于永久公用事业日期开门。
  successMetric: 拿到相关公用事业方和 AHJ 批准 1 次部署，且客户比单纯等待公用事业的方案更早启动招租或入住。
  owner: 部署负责人
- horizon: 180–365 天
  experiment: 重复项目转化
  hypothesis: 一次成功部署足以建立信任和可复用先例，让同一开发商下一个延误项目更快成交。
  successMetric: 首次真实部署后 6 个月内，至少签下 1 个重复项目或组合承诺。
  owner: 创始人/CEO
- horizon: 12–18 个月
  experiment: 合作伙伴供给的车队利用率模型
  hypothesis: 模块化电力块可以在多个项目之间被预留、复用和监控，利用率足以支撑长期毛利目标。
  successMetric: 在可用模块化电力块上实现至少 60% 的利用率，并沉淀前三个项目的单位经济模型。
  owner: 运营负责人
operations:
- 按辖区维护审批作战手册，覆盖公用事业流程、AHJ 资料、允许的负载模块和切换步骤。
- 每个项目都用远程遥测、可用性告警和明确的运营负责人来跑，确保首响响应和客户沟通有人兜底。
- 每次项目结束后都追踪实际提前解锁的租金起算、部署毛利率和先例复用情况，判断模型是否在变强。
- 在利用率尚不足以支撑深度垂直整合前，尽量把电气工程、现场人工和混合电力模块交给合作伙伴完成。
- 凡是需要替代永久供电、住户安全责任边界不清、或超出既有审批原型库的定制项目，一律不接。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 在切口尚未被验证前，亲自抓开发商销售、辖区选择、伙伴谈判和第一批审批手册。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭出负载建模、遥测、模板和切换软件，把服务做成可重复系统，而不是一次性现场作业。
- role: 方案与公用事业工程师
  startTiming: 第 1-2 个月
  rationale: 把现场条件翻成可审批的设计，并把从公用事业延误通知到签署部署范围的时间压短。
- role: 部署负责人
  startTiming: 第 3-4 个月
  rationale: 一旦首批真实项目启动，就负责现场执行、伙伴协调、远程运营和复盘。
- role: 合作负责人或客户经理
  startTiming: 第 9-12 个月
  rationale: 等公司已经跑出 1 次获批部署、1 套可重复定价和清晰的重复开发商需求后，再补一位专门管漏斗和伙伴的人。
milestones:
- horizon: 0–12 个月
  items:
  - 完成 12-15 次 ICP 访谈，拿下 2 份付费现场评估，并在至少 2 个目标辖区拿到书面审批先例。
  - 交付第一套多户住宅入住桥接部署包，包含可复用的负载模块模板、远程监控和切换流程。
  - 执行 1 次获批的真实部署，并沉淀一个可引用案例，证明它比单纯等公用事业更早启动开租。
- horizon: 12–24 个月
  items:
  - 在重复区域开发商中做到 5-8 个付费项目，同时把产品范围继续限定在已获批的多户住宅原型内。
  - 至少把 2 个客户转成组合关系，让第二个项目从评估到部署的周期明显更快。
  - 证明由伙伴供给或融资支持的模块化能力，足以支撑利用率和利润目标，而不必先自建全国车队。
- horizon: 24–36 个月
  items:
  - 按研究里的 $6.0M SOM 路径前进：每年服务约 20 个项目，平均合同额约 $300k。
  - 在首批公用事业辖区里建立起有防守力的审批与遥测数据集。
  - 只有当多户住宅场景的可重复性、利润和伙伴供给都符合计划时，才进入 1 个相邻的分期开业资产类别。
risks:
- risk: AHJ 或公用事业方对已入住楼栋过渡供电的接受速度，比预期更慢、范围更窄。
  likelihood: High
  impact: High
  mitigation: 先聚焦少数几个辖区，拿到书面先例后再放大销售，并把首个原型边界卡得很紧。
- risk: 项目延误时间集中爆发、早期需求又过于零散，导致车队利用率起不来。
  likelihood: Medium
  impact: High
  mitigation: 先用合作伙伴供给的模块化能力，优先服务手里有多个活跃项目的重复开发商，等利用率数据跑出来再决定是否重投自有车队。
- risk: 在供给过剩的 Sun Belt 市场里，招租偏软，一些开发商宁愿延后加让利，也不愿签桥接合同。
  likelihood: Medium
  impact: Medium
  mitigation: 优先盯住开租时间压力大、贷款期限卡得紧，或风险租金特别高的项目，而不是所有延误站点都卖。
- risk: 租赁巨头或 EPC 把相似的混合硬件打包后低价切入，在流程护城河建立前抢掉市场。
  likelihood: Medium
  impact: Medium
  mitigation: 竞争重点放在辖区先例、公寓专属的分阶段入住，以及切换管理，而不是单纯拼设备广度。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要撑 18 个月跑道，用来拿下辖区审批、交付首批获批的多户住宅部署、搭出模板与遥测系统、补齐核心工程和部署人才，并在扩张到自有车队或相邻市场前证明重复项目需求。
