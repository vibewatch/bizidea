    sourceRefs: [2]
  - point: "中年护理商业活跃度已足够高，诊所已公布自费、保险、雇主和转介动作。"
    sourceRefs: [55, 56, 57, 59, 60, 62, 64, 65]
  - point: "Oura 与 Clue、Natural Cycles 和 Mira 的合作伙伴关系表明，跨产品联网女性健康工作流已有需求。"
    sourceRefs: [26, 29, 39]
  - point: "更年期症状负担影响工作绩效和生产力，强化了在预约间隙寻求有效支持的付费意愿。"
    sourceRefs: [23, 25, 70]
