topRisks:
  - name: "Clinical validity gap"
    description: "If inferred hormone signals do not correlate well enough with real care needs, clinics may treat the product as interesting but non-essential."
    mitigation: "Position the first product as triage and care-orchestration support, run pilots against retention and response metrics, and add pathway-specific validation before higher-stakes use cases."
  - name: "Platform dependency"
    description: "The startup could be blocked if Clair-like vendors limit data access, delay launch, or keep the best workflows in-house."
    mitigation: "Design for a multi-device future, start with any available wearable and symptom inputs, and own the clinic workflow layer rather than rely on a single hardware partner."
  - name: "Workflow inertia"
    description: "Clinical teams may resist another dashboard if the product does not fit existing nurse and medical-director routines."
    mitigation: "Embed recommendations inside the systems clinics already use, start with one narrow cohort and a small set of actions, and price against measurable retention and support-load improvements."
