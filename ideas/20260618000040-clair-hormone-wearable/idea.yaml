differentiator: >-
  This is not another direct-to-consumer cycle app, and it does not require the
  startup to win the wearable hardware race. The product sits where value is
  clearest: inside care workflows where a new data layer can change triage
  timing, visit timing, and member retention. Over time the moat comes from the
  dataset linking hormone-proxy patterns, symptoms, interventions, and outcomes
  across specific women's-health workflows, plus the integrations and trust
  needed to make clinics operationally depend on the system.
