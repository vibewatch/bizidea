assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-18] model starts the month after the business-plan date.'
- id: A2
  name: Opening cash at M1
  value: $2.8M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + model sizing] uses a capital-efficient pre-seed close sized to reach
    the 12-24 month milestones plus six months of buffer.'
- id: A3
  name: Starting active paying clinics
  value: '0'
  unit: count
  source: '[BP milestones + BP investorMemo.nextDiligence] the company begins pre-revenue and must first sign live pilots.'
- id: A4
  name: Paid pilot package
  value: $60K over 4 months
  unit: USD/clinic
  source: '[BP investorMemo.firstCustomer.initialContract $30K-$75K for 90-120 days] uses the midpoint of the stated pilot
    range.'
- id: A5
  name: Production PMPM price
  value: $12 PMPM
  unit: USD/member/month
  source: '[BP market.tam/sam/som + Research market.tam/som] all market sizing is anchored to roughly $12 PMPM.'
- id: A6
  name: Monitored members per production clinic
  value: About 1.5K at first annual conversion, 2.2K average by Y2, and 3.0K by Q4Y3
  unit: members/clinic
  source: '[BP investorMemo.firstCustomer.initialContract 500-1,500 member pilot cohort + BP market.som 30K monitored members
    across 10 clinics] revenue ramps with larger cohorts after pilot proof.'
- id: A7
  name: Implementation and analytics attach
  value: Roughly 10-15% of recognized revenue in Y2-Y3
  unit: pct of revenue
  source: '[BP businessModel.revenueStreams implementation + premium analytics] recognized revenue is not pure PMPM because
    new clinics still pay onboarding and reporting fees.'
- id: A8
  name: Clinic acquisition cadence
  value: 3 paid clinics by Y1 end, 6 by Q4Y2, and 10 by Q4Y3
  unit: active paying clinics
  source: '[BP milestones 3 paid pilots and 2 conversions in 12 months + BP market.som 10 clinics in year 3] base case matches
    the stated beachhead and SOM path.'
- id: A9
  name: Monthly paying-clinic churn
  value: 1.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP risks] conservative for annual B2B contracts because the product is still proving
    workflow fit and signal usefulness.'
- id: A10
  name: Gross margin ramp
  value: 50% Y1, 62% Y2, 70% Y3
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryTechnicalConstraints] margin starts
    onboarding-heavy, then reaches the stated software target after integrations repeat.'
- id: A11
  name: Founder / CEO loaded compensation
  value: $180K
  unit: USD/year
  source: '[startup-finance heuristic + BP experimentRoadmap CEO founder ownership] assumes modest founder cash pay plus payroll
    load.'
- id: A12
  name: Engineering loaded compensation
  value: $190K
  unit: USD/year
  source: '[BP team Founding eng and Solutions engineer] senior full-stack / integration hiring with payroll taxes and benefits.'
- id: A13
  name: Product / implementation loaded compensation
  value: $165K
  unit: USD/year
  source: '[BP team Product and implementation lead] lean implementation hire sized for care-workflow design and customer
    onboarding.'
- id: A14
  name: Clinical / data science loaded compensation
  value: $185K
  unit: USD/year
  source: '[BP team Clinical data science lead] domain-specialist hire with payroll load.'
- id: A15
  name: Sales / partnerships loaded compensation
  value: $210K
  unit: USD/year
  source: '[BP team GTM and partnerships lead + BP gtm.channels] enterprise health-tech seller / partner-development carrying
    cost.'
- id: A16
  name: G&A / ops loaded compensation
  value: $135K
  unit: USD/year
  source: '[startup-finance heuristic + BP operations privacy/compliance burden] lean operations and back-office support.'
- id: A17
  name: Hiring timeline
  value: M1 founder, founding eng, product/implementation; M3 clinical data science; M6 solutions engineer; M9 GTM lead; M14
    implementation hire; M18 platform engineer; M22 ops; M28 clinical analyst; M31 account executive; M34 integration engineer
  unit: timeline
  source: '[BP team + BP sequencingRationale] first five hires follow the plan directly and later hires extend the same product-first,
    proof-then-GTM sequence.'
- id: A18
  name: Non-payroll sales and marketing spend
  value: $8-12K/mo in Y1, $12K/mo in Y2, $16K/mo in Y3
  unit: USD/month
  source: '[BP gtm.channels] heuristic for founder outbound, conferences, and partner enablement rather than paid-demand-gen
    heavy spend.'
- id: A19
  name: Non-payroll R&D spend
  value: $10K/mo in Y1, $12K/mo in Y2, $14K/mo in Y3
  unit: USD/month
  source: '[BP product + BP operations] heuristic for cloud, data normalization, logging, and security tooling.'
- id: A20
  name: Non-payroll G&A spend
  value: $10K/mo in Y1, $12K/mo in Y2, $14K/mo in Y3
  unit: USD/month
  source: '[BP operations + Research regulatoryTechnicalConstraints] heuristic for legal, privacy, insurance, and audit readiness.'
- id: A21
  name: Payroll allocation to P&L lines
  value: Founder 50% S&M / 50% G&A; product & implementation 35% S&M / 65% R&D; engineering and clinical/data science 100%
    R&D; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] maps each role into the operating lines used in the P&L.'
- id: A22
  name: CAC calculation convention
  value: $180.9K = Y2-Y3 S&M spend divided by 7 net new paying clinics
  unit: USD/new clinic
  source: '[BP gtm founder-led clinic selling + model calc] treats CAC as the full cost to add each new paying clinic logo
    after Y1.'
- id: A23
  name: Cash conversion convention
  value: Cash movement equals EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] assumes capex, taxes, debt service, and working-capital swings are immaterial at pre-seed
    scale.'
- id: A24
  name: Funding ask sizing
  value: $2.8M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough] funds the company through six active
    clinics, repeatable PMPM conversion, early benchmark reporting, and roughly six months of buffer.'
