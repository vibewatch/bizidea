scenarios:
  downside:
    description: Pilot conversion slips, monitored cohorts expand more slowly, and integrations remain services-heavy for
      longer.
    y3RevenueK: 2940.0
    y3EbitdaK: -522.0
    cashLowPointK: 110.0
    keyAssumptionChanges:
    - Clinic count reaches only 8 by Q4Y3 instead of 10 because paid pilot to production conversion slips below the 50%+ target.
    - Mature cohorts average about 2.4K monitored members per clinic rather than 3.0K, keeping PMPM revenue below the SOM
      path.
    - Gross margin reaches only 66% in Y3 because integrations and compliance work stay more bespoke than planned.
  base:
    description: Base case follows the plan from 3 paid clinics in Y1 to 6 active clinics by Q4Y2 and 10 by Q4Y3, with PMPM
      expansion replacing pilot revenue over time.
    y3RevenueK: 3960.0
    y3EbitdaK: 342.6
    cashLowPointK: 781.3
    keyAssumptionChanges:
    - Three paid clinics are signed in Y1, two convert to production by year end, and active paying clinics reach 10 by Q4Y3.
    - Monitored members per mature clinic scale toward 3.0K at roughly $12 PMPM, with implementation and analytics still contributing
      10-15% of revenue.
    - Headcount grows from 6 FTE at Q4Y1 to 9 at Q4Y2 and 12 at Q4Y3, allowing the company to turn EBITDA-positive in the
      second half of Y3.
  upside:
    description: Reference customers shorten the sales cycle, more clinics expand to second cohorts earlier, and delivery
      becomes repeatable faster than planned.
    y3RevenueK: 4680.0
    y3EbitdaK: 858.0
    cashLowPointK: 980.0
    keyAssumptionChanges:
    - Clinic count reaches 11 by Q4Y3 because case studies and partner referrals pull one additional logo forward.
    - Mature clinics reach about 3.2K monitored members and attach premium reporting faster, lifting realized ARPU above the
      base case.
    - Gross margin reaches 72% in Y3 as integrations standardize and implementation labor per clinic falls.
