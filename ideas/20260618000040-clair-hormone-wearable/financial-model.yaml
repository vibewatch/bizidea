modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified clinics] --> Pilots[Paid pilots]
      Pilots --> Production[Production PMPM contracts]
      Production --> Expansion[More monitored members and adjacent cohorts]
      Expansion --> Revenue[Subscription + implementation + analytics revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from moving from 3 paid clinics in Y1 to 10 active clinics by Q4Y3 and expanding each mature
    clinic toward roughly 3,000 monitored members at about $12 PMPM.
- checkName: Must go right
  finding: At least 2 of the first 3 paid pilots must convert and then expand into larger monitored cohorts, because the model
    relies on revenue mix shifting away from pilot fees by Q4Y2.
- checkName: Model breaks if
  finding: If the sales cycle slips by about one quarter or clinic ARPU stalls below the $12 PMPM SOM path, the cash cushion
    compresses quickly and the downside case approaches a bridge-round outcome.
- checkName: Next-round proof
  finding: The seed case is strongest once the company shows 6 active clinics, repeatable pilot-to-production conversion,
    2 device/data partners, and one adjacent-pathway expansion plan backed by customer evidence.
sanityChecks:
  ruleOf40: Y3 growth 158.8% + EBITDA margin 8.7% = 167.5% (inflated by the small Y2 base).
  burnMultiple: Y2 burn multiple ~0.7x (($899.3K burn) / $1260.0K net new revenue); Y3 turns EBITDA-positive.
  revenuePerFte: About $330.0K Y3 using Q4Y3 headcount of 12 (inside the typical $200-400K vertical SaaS / workflow range).
  flags:
  - The SAM is only about 15-20 target clinics in the research model, so landing 10 clinics by Q4Y3 requires concentrated
    execution in a narrow buyer set.
  - Revenue assumes mature clinics expand from initial 500-1,500 member pilots toward roughly 3,000 monitored members; if
    cohorts stay smaller, ARR falls quickly.
  - Gross margin must rise from 50% in Y1 to 70% in Y3, so bespoke integrations or privacy work can delay EBITDA breakeven.
  - The downside case nearly exhausts the cash buffer, which means weak pilot conversion would likely force either a smaller
    hiring plan or an earlier bridge round.
