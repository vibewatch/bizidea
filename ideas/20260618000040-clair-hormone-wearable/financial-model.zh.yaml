slug: hormone-care-ops
date: '2026-06-18'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: "模型起始月份"
  value: 2026-07
  unit: YYYY-MM
  source: '[BP date 2026-06-18] 模型从商业计划日期的次月开始。'
- id: A2
  name: "第 1 月期初现金"
  value: $2.8M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + model sizing] 使用资本效率优先的 pre-seed 融资规模，足以完成 12–24 个月里程碑并保留约六个月缓冲。'
- id: A3
  name: "起始活跃付费诊所数"
  value: '0'
  unit: count
  source: '[BP milestones + BP investorMemo.nextDiligence] 公司从零收入起步，必须先签署真实试点。'
- id: A4
  name: "付费试点套餐"
  value: $60K over 4 months
  unit: USD/clinic
  source: '[BP investorMemo.firstCustomer.initialContract $30K-$75K for 90-120 days] 取所述试点区间的中点。'
- id: A5
  name: "生产 PMPM 价格"
  value: $12 PMPM
  unit: USD/member/month
  source: '[BP market.tam/sam/som + Research market.tam/som] 所有市场规模均锚定约 $12 PMPM。'
- id: A6
  name: "每家生产诊所的监护会员数"
  value: About 1.5K at first annual conversion, 2.2K average by Y2, and 3.0K by Q4Y3
  unit: members/clinic
  source: '[BP investorMemo.firstCustomer.initialContract 500-1,500 member pilot cohort + BP market.som 30K monitored members across 10 clinics] 试点证明后收入随更大群体增长。'
- id: A7
  name: "实施与分析附加比例"
  value: Roughly 10-15% of recognized revenue in Y2-Y3
  unit: pct of revenue
  source: '[BP businessModel.revenueStreams implementation + premium analytics] 确认收入不纯粹是 PMPM，因为新诊所仍需支付入驻和报告费。'
- id: A8
  name: "诊所获取节奏"
  value: 3 paid clinics by Y1 end, 6 by Q4Y2, and 10 by Q4Y3
  unit: active paying clinics
  source: '[BP milestones 3 paid pilots and 2 conversions in 12 months + BP market.som 10 clinics in year 3] 基础情形与既定滩头市场和 SOM 路径一致。'
- id: A9
  name: "月度付费诊所流失率"
  value: 1.5%
  unit: pct/month
  source: '[startup-finance heuristic + BP risks] 年度 B2B 合同的保守估计，因为产品仍在验证工作流契合度和信号有用性。'
- id: A10
  name: "毛利率爬坡"
  value: 50% Y1, 62% Y2, 70% Y3
  unit: pct of revenue
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operations + Research regulatoryTechnicalConstraints] 毛利率从入驻密集型起步，整合可重复后达到既定软件目标。'
- id: A11
  name: "创始人/CEO 含税薪酬"
  value: $180K
  unit: USD/year
  source: '[startup-finance heuristic + BP experimentRoadmap CEO founder ownership] 假设适度的创始人现金薪酬加薪资附加。'
- id: A12
  name: "工程师含税薪酬"
  value: $190K
  unit: USD/year
  source: '[BP team Founding eng and Solutions engineer] 含薪资税和福利的高级全栈/整合招聘。'
- id: A13
  name: "产品/实施含税薪酬"
  value: $165K
  unit: USD/year
  source: '[BP team Product and implementation lead] 面向护理工作流设计和客户入驻的精简实施岗位。'
- id: A14
  name: "临床/数据科学含税薪酬"
  value: $185K
  unit: USD/year
  source: '[BP team Clinical data science lead] 含薪资附加的领域专家招聘。'
- id: A15
  name: "销售/合作伙伴含税薪酬"
  value: $210K
  unit: USD/year
  source: '[BP team GTM and partnerships lead + BP gtm.channels] 企业级医疗健康销售/合作伙伴开发的综合成本。'
- id: A16
  name: "管理/运营含税薪酬"
  value: $135K
  unit: USD/year
  source: '[startup-finance heuristic + BP operations privacy/compliance burden] 精简运营和后台支持。'
- id: A17
  name: "招聘时间线"
  value: M1 founder, founding eng, product/implementation; M3 clinical data science; M6 solutions engineer; M9 GTM lead; M14
    implementation hire; M18 platform engineer; M22 ops; M28 clinical analyst; M31 account executive; M34 integration engineer
  unit: timeline
  source: '[BP team + BP sequencingRationale] 前五名招聘完全按照计划执行，后续招聘沿用同样的"产品优先、验证后 GTM"节奏。'
- id: A18
  name: "非薪资销售与市场费用"
  value: $8-12K/mo in Y1, $12K/mo in Y2, $16K/mo in Y3
  unit: USD/month
  source: '[BP gtm.channels] 创始人外拓、会议和合作伙伴赋能的经验性估算，非付费需求侧重投入。'
- id: A19
  name: "非薪资研发费用"
  value: $10K/mo in Y1, $12K/mo in Y2, $14K/mo in Y3
  unit: USD/month
  source: '[BP product + BP operations] 云服务、数据标准化、日志和安全工具的经验性估算。'
- id: A20
  name: "非薪资管理与运营费用"
  value: $10K/mo in Y1, $12K/mo in Y2, $14K/mo in Y3
  unit: USD/month
  source: '[BP operations + Research regulatoryTechnicalConstraints] 法务、隐私、保险和审计准备的经验性估算。'
- id: A21
  name: "薪资 P&L 分摊"
  value: Founder 50% S&M / 50% G&A; product & implementation 35% S&M / 65% R&D; engineering and clinical/data science 100%
    R&D; sales 100% S&M; ops 100% G&A
  unit: allocation
  source: '[BP team role rationales + BP operations] 将每个岗位映射到 P&L 使用的运营线。'
- id: A22
  name: "CAC 计算口径"
  value: $180.9K = Y2-Y3 S&M spend divided by 7 net new paying clinics
  unit: USD/new clinic
  source: '[BP gtm founder-led clinic selling + model calc] 将 CAC 视为第 1 年后每增加一家付费诊所的全部成本。'
- id: A23
  name: "现金转化口径"
  value: Cash movement equals EBITDA
  unit: modeling convention
  source: '[startup-finance heuristic] 假设 pre-seed 规模下资本支出、税务、债务偿还和营运资金波动均可忽略不计。'
- id: A24
  name: "融资规模"
  value: $2.8M pre-seed
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd + BP milestones + model cash trough] 资金覆盖公司至 6 家活跃诊所、可重复 PMPM 转化、早期基准报告，并在种子轮融资前保留约六个月缓冲。'
