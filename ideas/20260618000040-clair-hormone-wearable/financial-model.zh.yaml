modelDiagram:
  title: "单位经济模型流"
  mermaid: |
    flowchart LR
      Leads[Qualified clinics] --> Pilots[Paid pilots]
      Pilots --> Production[Production PMPM contracts]
      Production --> Expansion[More monitored members and adjacent cohorts]
      Expansion --> Revenue[Subscription + implementation + analytics revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash after opex]
modelSanity:
- checkName: "收入引擎"
  finding: "基础情形收入来自将第 1 年 3 家付费诊所扩展至第 3 年 Q4 的 10 家活跃诊所，每家成熟诊所监护会员向约 3,000 名以约 $12 PMPM 扩展。"
- checkName: "必须成立的假设"
  finding: "前 3 个付费试点中至少 2 个必须转化并扩展至更大监护群体，因为模型依赖收入结构在第 2 年 Q4 之前从试点费向 PMPM 切换。"
- checkName: "模型崩溃条件"
  finding: "若销售周期约滑坡一个季度，或诊所 ARPU 停滞在 $12 PMPM SOM 路径以下，现金缓冲将快速收窄，悲观情形趋向过桥融资结局。"
- checkName: "下一轮融资证明"
  finding: "一旦公司展示 6 家活跃诊所、可重复的试点到生产转化、2 个设备/数据合作伙伴和一份经客户证据支撑的相邻路径扩展计划，种子轮最为有力。"
sanityChecks:
  ruleOf40: "第 3 年增长率 158.8% + EBITDA 利润率 8.7% = 167.5%（受第 2 年基数偏小影响，虚高）。"
  burnMultiple: "第 2 年资金消耗倍数约 0.7 倍（$899.3K 消耗 / $1,260.0K 净新增收入）；第 3 年实现 EBITDA 转正。"
  revenuePerFte: "第 3 年 Q4 人员编制 12 人，人均收入约 $330.0K（处于垂直 SaaS / 工作流软件 $200–400K 的典型区间内）。"
  flags:
  - "研究模型中 SAM 仅约 15 至 20 家目标诊所，第 3 年 Q4 达到 10 家需要在窄买家群中高度集中执行。"
  - "收入假设成熟诊所从初始 500 至 1,500 名会员试点扩展至约 3,000 名监护会员；若群体保持更小，ARR 将快速下降。"
  - "毛利率必须从第 1 年 50% 升至第 3 年 70%，因此定制整合或隐私工作可能推迟 EBITDA 盈亏平衡。"
  - "悲观情形几乎耗尽现金缓冲，这意味着试点转化疲弱可能迫使缩减招聘计划或提前过桥融资。"
