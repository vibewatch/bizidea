topRisks:
  - name: "临床有效性缺口"
    description: "若推断的激素信号与真实护理需求的相关性不够强，诊所可能将产品视为有趣但非必要。"
    mitigation: "将第一个产品定位为分诊和护理协调支持，在留存和响应指标上运行试点，并在进入更高风险场景前完成路径专项验证。"
  - name: "平台依赖风险"
    description: "若类 Clair 厂商限制数据访问、推迟上市或将最优工作流留在内部，创业公司可能受阻。"
    mitigation: "从设计上面向多设备未来，先用任何可用的可穿戴和症状输入起步，掌控诊所工作流层而非依赖单一硬件合作伙伴。"
  - name: "工作流惰性"
    description: "若产品不契合现有护士和医疗总监的日常，临床团队可能抗拒再多一个看板。"
    mitigation: "将建议嵌入诊所已在使用的系统，从单一小型群体和少量行动起步，并按可量化的留存和支持负荷改善来定价。"
