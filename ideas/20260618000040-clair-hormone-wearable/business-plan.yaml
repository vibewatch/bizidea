slug: hormone-care-ops
date: '2026-06-18'
executiveSummary: >-
  Hormone Care Ops should start as a care-operations layer for U.S.
  menopause-focused telehealth clinics that already sell recurring care but still
  manage between-visit symptom changes through inboxes, surveys, and periodic
  labs. The first customer is a 10,000-50,000 member clinic with nurse coaches
  and clinicians who own retention, visit capacity, and reactive support load.
  The wedge is intentionally narrow: ingest wearable hormone-proxy signals plus
  symptoms, score which members need attention, and route outreach, visit-timing,
  and lab-escalation suggestions inside one care pathway before expanding into
  broader women's-health workflows. This sequencing is faster to prove than a new
  consumer app or full women's-health platform because the buyer can measure
  response time, reactive ticket volume, visit conversion, and 90-day retention
  inside an existing membership business. Pricing, channel, and product should
  stay coupled around that same motion: a paid pilot for one monitored cohort,
  then PMPM production pricing once the clinic sees lower reactive triage and
  better retention. The best strategic advantage is a workflow dataset linking
  wearable patterns, symptoms, interventions, and outcomes across care pathways,
  not ownership of any single device. The biggest disconfirming risks are that
  proxy signals may be too noisy for operational use and that device partners may
  restrict data access, so the company should earn expansion only after it proves
  alert usefulness and multi-device ingestion in live pilots. Market sizing in
  research is modeled rather than transaction-backed, so the first 12 months must
  validate budget ownership and pilot-to-production conversion, not just product
  usage.
problem:
  - Menopause and irregular-cycle clinics still discover symptom flare-ups, care-plan mismatch, and churn risk too late because between-visit monitoring depends on self-report, inbox review, and episodic labs.
  - Existing alternatives such as generic cycle apps, consumer wearables, and manual nurse rules generate data or visibility but do not tell clinic teams whom to contact now, what action to take, or whether the workflow improved retention.
solution:
  - Deploy a workflow-support layer that normalizes Clair-like wearable signals plus symptom inputs and creates daily queues for coach outreach, visit timing, and lab-escalation review inside a defined care pathway.
  - Start in recommendation mode rather than diagnosis, with dashboards for risk cohorts, response latency, and retention outcomes, then expand only after one pathway proves measurable operational value.
whyWeWin:
  - The company is built for the clinic workflow budget, not the consumer insight budget, so it can win where members, care teams, and retention economics already meet.
  - Each deployment compounds a proprietary dataset on hormone-proxy changes, symptoms, outreach actions, and outcomes across devices and pathways, creating workflow logic and benchmarks that point solutions and clinics cannot match quickly.
strategicChoices:
  beachhead: U.S. menopause and perimenopause telehealth clinics with 5,000-50,000 active members, recurring care revenue, and nurse-led between-visit support workflows.
  wedgeRationale: This segment already has visible visit economics, retention pressure, and structured care teams, so one monitored cohort can show proof faster than selling to fertility programs, broad OB-GYN groups, or direct-to-consumer users.
  sequencingRationale: Start with one low-regulatory care-ops workflow for menopause and perimenopause, prove that alerts improve outreach timing and retention, then add PCOS and irregular-cycle cohorts, deeper EHR write-back, and device partnerships after the clinic ROI story is repeatable.
  notYet:
    - Direct-to-consumer hormone app or membership
    - Fertility and IVF workflows with higher clinical stakes
    - Employer-direct sales before clinic deployment is repeatable
    - Diagnostic or treatment claims that would force a more regulated product posture
market:
  tam: "$216.0M estimated TAM based on 1.5M digitally monitorable U.S. members at roughly $12 PMPM."
  sam: "$50.4M estimated SAM based on about 350k members across 15-20 U.S. women's-health clinics with recurring virtual care models."
  som: "$4.3M estimated year-3 SOM based on 10 clinics and 30k monitored members at roughly $12 PMPM."
  segments:
    - U.S. menopause and perimenopause telehealth clinics
    - PCOS and irregular-cycle virtual care programs
  buyingProcess: >-
    The champion is usually the Head of Care Operations, GM, or CMO when
    retention reviews, support backlog, or a new wearable partnership exposes
    weak between-visit visibility. Deals should start as a paid pilot on one
    cohort and convert to an annual PMPM contract only after the clinic sees
    faster intervention, better visit conversion, and credible retention lift.
product:
  mvp: >-
    MVP is a read-first care-ops workflow for one menopause or perimenopause
    cohort that ingests wearable feeds and symptom data, prioritizes members for
    outreach, and suggests check-in, visit, or lab-review actions inside an
    existing care queue. It should prove that clinics can act on the new signal
    layer without making diagnostic claims or replacing their CRM or EHR.
  sixMonth: Launch 2 paid pilots with multi-source data ingestion, daily risk queues, coach outreach workflows, and dashboards for response time, visit conversion, and 90-day retention by monitored cohort.
  twelveMonth: Add repeatable connectors for the top early clinic stack, selective write-back into CRM or EHR workflows, cohort benchmark reporting, and support for one adjacent pathway such as irregular-cycle or PCOS care.
  twentyFourMonth: Expand into a multi-pathway women's-health operations layer with cross-device normalization, pathway-specific intervention logic, and optional analytics products for care-performance benchmarking and real-world evidence partnerships.
  keyBets:
    - A small set of high-confidence alerts can improve retention and reduce reactive triage before the product needs deeper clinical claims.
    - Buyers will pay for a vendor-neutral workflow layer if it fits existing care-team operations and does not depend on one wearable partner.
    - Menopause and perimenopause prove the workflow fastest because public clinic pricing and care models are already visible, while adjacent cohorts can be added later with moderate tuning.
gtm:
  wedge: Sell a paid pilot for one monitored menopause or perimenopause cohort that improves between-visit actionability and retention before pitching a broader women's-health operating system.
  channels:
    - Founder-led direct sales to care-operations, GM, and clinical leaders at women's-health telehealth clinics
    - Device and data-platform partnerships with hormone-aware wearables that need clinic utility without building care orchestration themselves
    - Women's-health operator referrals and specialist conferences where retention, care pathways, and virtual menopause operations are already discussed
  funnelTargets: "Lead to qualified pilot 15-25%, qualified pilot to paid pilot 35-50%, paid pilot to production 50%+, first pathway to second pathway expansion within 12 months in 50%+ of converted accounts."
  pricing: >-
    Start with a paid 90-120 day pilot for one monitored cohort, then convert to
    PMPM pricing for active monitored members plus implementation fees and
    premium analytics. This matches buyer logic because the clinic is buying
    retention lift and lower reactive support load on a defined member base, not
    consumer app seats or diagnostic episodes.
businessModel:
  revenueStreams:
    - PMPM software subscription for active monitored members
    - One-time implementation and workflow-mapping fees
    - Premium analytics and benchmark reporting for retention and pathway performance
  unitOfValue: Active monitored member in a defined care pathway
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one monitored cohort to all eligible cohorts inside the same clinic
    - Add adjacent pathways such as PCOS and irregular-cycle care after menopause proof
    - Add benchmark and real-world evidence analytics once enough intervention-outcome data is captured
strategyMap:
  northStarMetric: 90-day retention lift in monitored cohorts versus matched baseline cohorts
  inputMetrics:
    - Percent of high-risk members reviewed within 24 hours
    - Outreach-to-visit conversion rate for flagged members
    - Alert precision as judged by nurse or clinician review
    - Reactive support tickets per 100 monitored members
    - Paid pilot to production conversion rate
  moatsToBuild:
    - Cross-device normalization layer for hormone-proxy signals, symptoms, and workflow events
    - Pathway dataset linking alerts, interventions, response times, and retention outcomes by cohort
    - Benchmark library for response thresholds and retention lift across women's-health clinics
  killCriteria:
    - Fewer than 3 paid pilots signed within 12 months of focused beachhead selling
    - No pilot improves 90-day retention or reduces reactive support load by at least 10% in the monitored cohort
    - Device and symptom inputs cannot support alert precision above 60% clinician acceptance after pathway tuning
  mermaid: |
    flowchart LR
      Wedge[Menopause care-ops wedge] --> MVP[Risk queue and outreach MVP]
      MVP --> Proof[Retention and response proof points]
      Proof --> Expansion[Multi-pathway women's-health expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear wedge and credible buyer pain, but conviction stays limited until one clinic proves signal usefulness, budget ownership, and pilot-to-production conversion.
    whyBelieve: The company targets a real care-operations gap created by new hormone-aware data and can show value on short-cycle workflow and retention metrics before deeper clinical claims.
    whyDoubt: Device access, signal validity, and incumbent clinic workflows could compress urgency or let clinics solve the problem with lighter internal tooling.
    nextDiligence: Validate one live pilot with a scaled menopause clinic showing usable multi-device data, faster intervention timing, and measurable retention or visit-conversion lift.
  firstCustomer:
    title: Head of Care Operations at a scaled menopause telehealth clinic
    profile: Runs a 10,000-50,000 member recurring-care program with nurse coaches, periodic virtual visits, and visible churn or reactive support pressure between appointments.
    trigger: A wearable integration launch, rising support load, or retention review shows that symptom changes between visits are being caught too late.
    buyer: VP Care Operations, GM, or Chief Medical Officer
    initialContract: "$30K-$75K paid pilot for one 500-1,500 member cohort over 90-120 days, converting to roughly $150K-$400K ARR once PMPM pricing expands across monitored members and additional pathways."
  mustBeTrue:
    - At least one scaled women's-health clinic will pay for a workflow layer before wearable-driven care is a reimbursement-backed category.
    - Multi-device or partner API access must be reliable enough to populate daily risk queues without manual data work.
    - Recommendation-mode alerts must reach at least 60% clinician or nurse acceptance in the first live pathway.
    - Monitored cohorts must show measurable retention, visit-conversion, or support-load improvement within one pilot cycle.
    - The menopause wedge must expand into adjacent women's-health pathways, or ACV will remain too small for venture-scale growth.
  diligenceQuestions:
    - Which wearable vendors will expose stable clinic-grade APIs or exports in the first 12 months?
    - What exact KPI gets budget unlocked fastest in target clinics: retention, support-load reduction, visit conversion, or premium-program differentiation?
    - How much model tuning is required to move from menopause and perimenopause into PCOS or irregular-cycle workflows?
    - Do buyers want a standalone ops console first or embedded recommendations inside their existing CRM or EHR?
    - Which incumbent clinic systems or internal analytics teams are most likely to collapse the wedge?
operatingAssumptions:
  - assumption: Device vendors will provide stable APIs or usable exports for at least two early partners.
    basis: research.yaml
    validationTest: Secure 2 pilot scoping agreements with sample payloads, daily refresh expectations, and permissions for clinic workflow use before hiring a dedicated partnerships lead.
    decisionImpact: If false, narrow the product to symptom-led workflows or a single-device partner, which reduces neutrality and total market.
  - assumption: Menopause clinics will fund a low-double-digit PMPM workflow layer if it improves retention or reduces reactive support work.
    basis: research.yaml
    validationTest: In 10 qualified buyer conversations, get at least 5 to confirm a paid pilot budget and a plausible annual PMPM conversion range near the modeled pricing.
    decisionImpact: If false, pricing must shift toward services-heavy implementation, lower ACV analytics, or a different buyer such as device partners.
  - assumption: Recommendation-mode care suggestions will fit current nurse workflows better than a new standalone dashboard with manual review only.
    basis: idea.yaml
    validationTest: During the first 2 pilots, achieve 80% weekly queue usage by assigned care teams and at least 60% acceptance of surfaced actions.
    decisionImpact: If false, the roadmap should prioritize deeper CRM or EHR embedding before expanding pathways.
  - assumption: Menopause and perimenopause are the fastest proof pathway, and adjacent PCOS or irregular-cycle cohorts can be added with moderate tuning.
    basis: operator judgment
    validationTest: After the first menopause pilot, run retrospective scoring on one adjacent cohort and confirm that core signal and workflow logic transfers without doubling false positives.
    decisionImpact: If false, the company should stay narrower for longer and reduce expansion assumptions in hiring and fundraising.
  - assumption: A workflow-support posture can avoid early diagnostic regulation while still creating enterprise value.
    basis: research.yaml
    validationTest: Complete outside counsel and design-partner review of product claims, consent flows, and audit logs before any automated escalation recommendations go live.
    decisionImpact: If false, the company needs a slower compliance roadmap, more clinical validation spend, and a narrower launch scope.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 care-operations leaders, CMOs, and nurse managers at target women's-health clinics.
    hypothesis: Buyers feel the strongest urgency when retention pressure and between-visit support load appear in the same operating review.
    successMetric: At least 10 interviews confirm the same buying trigger and 5 share current-state workflows or KPI baselines.
    owner: CEO founder
  - horizon: 0–90 days
    experiment: Run 2 concierge workflow-mapping projects using historical symptom, outreach, and visit data from design partners.
    hypothesis: Clinics already have enough fragmented data to show where wearable-aware prioritization could reduce response delay or churn.
    successMetric: Two partners produce baseline metrics for outreach latency, reactive tickets, and retention on a named cohort.
    owner: Product and implementation lead
  - horizon: 90–180 days
    experiment: Ship a read-first MVP with one wearable input, symptom ingestion, daily risk scoring, and queue-based outreach workflows.
    hypothesis: A useful pilot can go live without full EHR write-back if the workflow stays focused on one cohort and recommendation mode.
    successMetric: First paid pilot launches within 8 weeks of kickoff and produces weekly queue usage plus intervention logs.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Test pilot packaging against PMPM annual conversion offers with 3 qualified buyers.
    hypothesis: Buyers prefer cohort-based pilot pricing with a clear PMPM expansion path over custom services pricing.
    successMetric: At least 2 paid pilots signed and one annual conversion proposal accepted in principle.
    owner: CEO founder
  - horizon: 180–360 days
    experiment: Add a second device or data source and compare alert precision versus the single-source workflow.
    hypothesis: Multi-source normalization improves queue usefulness enough to strengthen buyer trust and reduce platform dependency.
    successMetric: Second-source cohorts show at least 10% better action acceptance or lower false-positive rates than the first-source baseline.
    owner: Data science lead
  - horizon: 180–540 days
    experiment: Publish one case study and launch one co-sell motion with a wearable or virtual-care infrastructure partner.
    hypothesis: Partner-backed distribution shortens trust-building time once the startup has customer-owned proof on one pathway.
    successMetric: At least 25% of qualified pipeline becomes partner-sourced and one partner-sourced pilot closes.
    owner: Strategic partnerships lead
operations:
  - Maintain explicit consent, least-privilege access, and breach-response playbooks because reproductive and consumer health data carry elevated privacy risk.
  - Run weekly cohort scorecards on alert volume, response latency, visit conversion, retention, and false-positive review rates.
  - Standardize pilots around one pathway, one care team, and one approved stack before promising cross-clinic or cross-device rollouts.
  - Keep all recommendations in clinician or nurse approval mode until pathway performance and audit trails are stable.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns ingestion, normalization, workflow logic, and product reliability for the first live pilots.
  - role: Product and implementation lead
    startTiming: Month 0
    rationale: Converts care-team pain into a repeatable pilot design and keeps scope disciplined around one pathway.
  - role: Clinical data science lead
    startTiming: Month 3
    rationale: Tunes alert logic, measures false positives, and translates wearable patterns into defensible workflow thresholds.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Reduces deployment time by turning partner-specific integrations and workflow exceptions into reusable playbooks.
  - role: GTM and partnerships lead
    startTiming: Month 9
    rationale: Added only after the first pilots create a credible retention and workflow ROI story for scaled clinic selling.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid pilots in the menopause and perimenopause beachhead
      - Launch the first repeatable read-first integration set and one selective write-back workflow
      - Publish one customer-owned case study showing faster intervention timing and measurable retention or visit-conversion lift
      - Convert at least 2 pilots into annual PMPM production contracts
  - horizon: 12–24 months
    items:
      - Expand from one cohort to multi-cohort deployments inside existing clinic customers
      - Add one adjacent pathway such as PCOS or irregular-cycle care after the menopause loop is trusted
      - Secure at least 2 upstream device or data partnerships that reduce single-vendor dependency
      - Launch benchmark reporting that compares workflow outcomes across clinics and cohorts
  - horizon: 24–36 months
    items:
      - Reach the modeled 30k monitored members or revise the market thesis based on live conversion and retention data
      - Establish the product as a cross-device women's-health workflow layer rather than a single-pathway alert tool
      - Decide whether to deepen clinic software expansion or add analytics and evidence products as the next growth engine
      - Prepare for broader payer, employer, or OB-GYN expansion only if deployment and ROI remain repeatable
risks:
  - risk: Proxy hormone signals may not correlate tightly enough with actionable care needs in live menopause or irregular-cycle workflows.
    likelihood: High
    impact: High
    mitigation: Start with low-risk outreach and visit-timing actions, measure clinician acceptance weekly, and kill or retune workflows that do not beat manual triage.
  - risk: Wearable vendors may delay APIs, restrict data sharing, or build their own clinic workflow tooling.
    likelihood: Medium
    impact: High
    mitigation: Design for multi-source ingestion, secure early partner agreements, and own the clinic action layer rather than betting on one hardware roadmap.
  - risk: Care teams may reject another queue or dashboard if recommendations do not fit existing operations.
    likelihood: Medium
    impact: High
    mitigation: Embed outputs into current queues where possible, keep pilots narrow, and measure queue usage and action acceptance before expanding feature scope.
  - risk: Privacy or product-claim missteps could slow sales and force a more regulated product posture.
    likelihood: Medium
    impact: High
    mitigation: Keep launch claims in workflow-support territory, audit consent and access controls early, and require legal review before adding higher-stakes automation.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: Hire the founding product, engineering, and clinical data team; complete 3-5 paid pilots; build repeatable integrations and compliance foundations; and reach enough customer-owned proof on retention, workflow fit, and device access to justify a seed round.
