  - point: "The product should avoid diagnostic claims at launch because FDA draws a meaningful line between general-wellness support and disease-focused device software."
    sourceRefs: [20]
  - point: "Consumer health apps and connected devices can still face FTC privacy and breach-notification exposure even when they sit outside classic HIPAA coverage."
    sourceRefs: [17, 18]
  - point: "Once data moves into clinical operations, interoperability and record-structure expectations increase."
    sourceRefs: [19]
  - point: "Wearables mainly infer hormone shifts through downstream physiology, which raises validation and false-positive risks in irregular users and perimenopause."
    sourceRefs: [2, 11, 12, 13]
