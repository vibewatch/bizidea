competitors:
  - name: "Clair Health"
    stage: "seed"
    wedge: "Noninvasive continuous hormone-proxy wearable for fertility, PCOS, and menopause use cases."
    pricing: "$369 device plus $9.99 monthly subscription."
    strength: "Clear category story, announced funding, and visible prelaunch consumer demand."
    weaknessVsUs: "Still upstream hardware and insight infrastructure; does not win clinic workflow orchestration by default."
    sourceRefs: [1, 2, 4, 5]
  - name: "Mira"
    stage: "scale-up"
    wedge: "Quantitative at-home hormone monitoring with perimenopause kits and an Oura integration."
    pricing: "Perimenopause kit from $249; wands from $99 on fetched pages."
    strength: "More direct hormone measurements and a mature consumer product/commercial footprint."
    weaknessVsUs: "Episodic testing and consumer app orientation make it less suited to passive daily clinic triage."
    sourceRefs: [38, 39, 40]
  - name: "Oova"
    stage: "scale-up"
    wedge: "AI-powered quantitative hormone tracking marketed to both consumers and providers."
    pricing: "Not publicly posted on the fetched provider pages."
    strength: "Provider positioning and independently validated quantitative testing narrative."
    weaknessVsUs: "Still framed around cartridge-based testing and provider access to test data, not cross-device care orchestration."
    sourceRefs: [42, 43]
  - name: "Natural Cycles + Oura ecosystem"
    stage: "incumbent"
    wedge: "Large-distribution temperature and wearable ecosystem for cycle, fertility, and perimenopause insights."
    pricing: "Consumer subscription and device pricing exist, but the fetched science pages foreground efficacy and device compatibility rather than clinic pricing."
    strength: "Regulatory precedent, brand trust, and large installed base."
    weaknessVsUs: "Consumer guidance and self-management remain the center of gravity, not clinic-triggered outreach or visit timing."
    sourceRefs: [26, 29, 30]
  - name: "Eli Health"
    stage: "seed"
    wedge: "Instant saliva-based hormone monitoring with a visible B2B and organizational-use narrative."
    pricing: "Not publicly posted on the fetched B2B/science pages."
    strength: "Direct biomarker thesis plus early organizational positioning."
    weaknessVsUs: "Earlier commercial maturity and less evidence of embedded clinic workflow adoption."
    sourceRefs: [48, 50]
