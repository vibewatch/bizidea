topRisks:
  - name: Incumbent feature bundling
    description: Existing observability or CI/CD platforms could add basic post-deploy investigation and rollback suggestions.
    mitigation: Focus on the cross-system deploy-log-remediation graph and accepted-fix workflow that spans git, CI/CD, feature flags, and observability rather than a single incumbent surface.
  - name: False-positive remediation
    description: If the product opens noisy or unsafe rollback and hotfix PRs, engineers will quickly disable the automation.
    mitigation: Start with advisory mode, require evidence thresholds before PR generation, and learn only from accepted fixes in the customer's highest-volume services.
  - name: Narrow initial buyer pool
    description: Teams with low AI-code adoption may not yet feel enough pain to buy a new release-safety layer.
    mitigation: Target SaaS companies already standardizing Cursor or Claude Code in backend workflows and position the product as the control layer that unlocks broader AI coding rollout.
