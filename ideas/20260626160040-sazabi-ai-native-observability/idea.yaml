jobsToBeDone:
  - job: >-
      When a freshly deployed backend service starts degrading after an AI-assisted code change, help the platform team
      isolate the offending diff and open the safest fix path, so they can restore service before the incident expands.
    currentAlternative: Manual dashboard triage, git diff review, and ad hoc rollback decisions over Slack
    successMetric: Median time from post-deploy anomaly detection to merged rollback or hotfix PR
  - job: >-
      When engineering leadership pushes for more Cursor or Claude Code usage, help the release owner enforce service-level
      safety gates, so they can increase shipping velocity without increasing on-call fatigue.
    currentAlternative: Generic CI checks, feature-flag canaries, and human judgment from platform engineers
    successMetric: Change-failure rate and rollback frequency for AI-authored backend deploys
