scenarios:
  downside:
    description: "安全评审周期拉长、试点转化率走软，公司 Y3 时的部署和扩张节奏低于预期。"
    y3RevenueK: 1875.0
    y3EbitdaK: -1075.3
    cashLowPointK: -394.8
    keyAssumptionChanges:
    - "Y1 末 4 个付费部署，Y2 末 14 个，Y3 末 45 个，而非 65 个。"
    - "混合年度 ARPU 从 $78K 降至 $72K，因为更多账户停留在试点规模。"
    - "毛利率从 70% 滑落至 68%，因为客户专属修复工作仍较为手动。"
  base:
    description: "创始人主导销售加上窄幅集成包，将早期试点转化为可重复的付费部署，无需大规模现场团队。"
    y3RevenueK: 3078.1
    y3EbitdaK: -420.6
    cashLowPointK: 421.0
    keyAssumptionChanges:
    - "客户数量按 A6、A7 和 A8 推进，Y2 末 20 个付费部署，Y3 末 65 个。"
    - "混合年度 ARPU 维持在 $78K，毛利率维持在 70% 的商业计划目标。"
    - "团队在 Y3 末达到 10 名全职员工，产品、安全和集成岗位在第二位客户主管之前到位。"
  upside:
    description: "参考客户和更快的账户扩张使部署数量提前，Y3 下半年实现盈亏平衡。"
    y3RevenueK: 4284.0
    y3EbitdaK: 298.1
    cashLowPointK: 1132.1
    keyAssumptionChanges:
    - "Y1 末 9 个付费部署，Y2 末 28 个，Y3 末 80 个，参考客户加速了资质审核和扩张。"
    - "混合年度 ARPU 从 $78K 提升至 $84K，审批工作流和保留模块更早附加。"
    - "毛利率从 70% 提升至 72%，模板复用降低了每次部署的交付和推理成本。"
sensitivity:
- variable: "ARPU"
