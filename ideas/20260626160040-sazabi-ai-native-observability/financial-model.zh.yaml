modelSanity:
- checkName: "收入引擎"
  finding: "基础案例收入来自将创始人主导的试点动作转化为 Y2 末 20 个付费服务组部署、Y3 末 65 个，混合年度合同价值 $78K。"
- checkName: "必须做对的事"
  finding: "首条参考集成路径必须将部署时间压至四周以内，以便在 Q3Y3 现金低谷前完成试点转化。"
- checkName: "模型崩溃的情况"
  finding: "若安全评审或 AI 治理摩擦将销售周期推迟约一个季度，下行案例在 Y3 结束前现金转为负数。"
- checkName: "下一轮融资佐证"
  finding: "下一轮融资的合理性在于展示 20 个付费部署、至少两次多服务扩张，以及通过安全审批的可重复生产发布。"
sanityChecks:
  ruleOf40: "Y3 增长率 243.0% + EBITDA 利润率 -13.7% = 229.3%。"
  burnMultiple: "Y2 燃烧倍数约 1.5x（基于 $708.6K 增量收入），Y3 在 $2180.7K 增量收入下改善至约 0.2x。"
  revenuePerFte: "Y3 人均收入 $307.8K，使用 Q4Y3 的 10 名全职员工计算（成长期 SaaS 基准约 $200–400K）。"
  flags:
  - "模型以一个付费服务组部署计为一个客户，因此标识级 CAC 和留存数据会弱于此处展示的部署级单位经济指标。"
  - "现金低点约 $421K 出现在 Q3Y3，若 Q4Y2 至 Q2Y3 的部署爬坡未能达成，可能需要过桥融资或放缓招聘。"
  - "Y3 仍略微 EBITDA 为负，意味着下一轮融资仍取决于证明扩张和安全评审速度，而非独立盈利能力。"
