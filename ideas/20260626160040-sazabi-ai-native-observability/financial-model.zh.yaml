slug: "postdeploy-autofix-gate"
date: "2026-06-26"
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: "模型起始月"
  value: "2026-07"
  unit: "YYYY-MM"
  source: "[business-plan.yaml date] 计划日期 2026-06-26 后的第一个完整运营月。"
- id: A2
  name: "种子轮到账后的期初现金"
  value: "2800"
  unit: "USDK"
  source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd] 取 $2–4M 种子区间中值附近，规模设定为到达下一里程碑加 6 个月缓冲。"
- id: A3
  name: "收入计量单位"
  value: "有效付费服务组部署"
  unit: "定义"
  source: "[business-plan.yaml businessModel.unitOfValue; investorMemo.firstCustomer.initialContract] 计量的客户是一个付费受监控的服务组部署，而非完整的企业标识。"
- id: A4
  name: "每有效部署的混合年度 ARPU"
  value: "78"
  unit: "USDK/account-year"
  source: "[business-plan.yaml investorMemo.firstCustomer.initialContract; businessModel.expansionLevers] 略高于 $45k–$75k 初始年度区间，因为部分 Y2–Y3 部署扩展到了高级审批工作流和保留模块。"
- id: A5
  name: "收入确认时机"
  value: "每月或每季度内的客户数中点"
  unit: "政策"
  source: "[startup-finance heuristic] 新试点和扩展平均按落入周期中途进行确认。"
- id: A6
  name: "Y1 月末客户路径"
  value: "0,0,1,1,2,2,3,3,4,5,5,6"
  unit: "有效付费部署数"
  source: "[business-plan.yaml milestones 0-12 months; gtm.funnelTargets; investorMemo.nextDiligence] 对应年末 3–4 个付费试点启动、2 个生产转化。"
- id: A7
  name: "Y2 季末客户数"
  value: "Q1Y2 8; Q2Y2 11; Q3Y2 15; Q4Y2 20"
  unit: "有效付费部署数"
  source: "[business-plan.yaml milestones 12-24 months] 假设公司将参考集成路径产品化，并将前几个试点转化为可重复的付费部署。"
- id: A8
  name: "Y3 季末客户数"
  value: "Q1Y3 28; Q2Y3 38; Q3Y3 50; Q4Y3 65"
  unit: "有效付费部署数"
  source: "[business-plan.yaml milestones 24-36 months; research.yaml market.som] 达到 50+ 生产客户里程碑，同时保持在研究的 75 客户 SOM 上限以内。"
- id: A9
  name: "毛利率目标"
  value: "70"
  unit: "百分比"
  source: "[business-plan.yaml businessModel.targetGrossMarginPct] 按已确认收入的 30% COGS 建模。"
- id: A10
  name: "单位经济模型月度流失率"
  value: "1.6"
  unit: "百分比"
  source: "[startup-finance heuristic] 部署后控制具有粘性的早期基础设施工作流产品留存较好，但买家仍面临安全和发布审查压力。"
- id: A11
  name: "创始人/CEO 含税现金薪酬"
  value: "144"
  unit: "USDK/year"
  source: "[business-plan.yaml team 创始人/CEO] 初创公司规律：$120K 创始人薪资加薪税和福利。"
- id: A12
  name: "创始工程师含税现金薪酬"
  value: "192"
  unit: "USDK/year"
  source: "[business-plan.yaml team 创始工程师] 初创公司规律：资深技术创始人现金包加薪酬负担。"
- id: A13
  name: "产品工程师含税现金薪酬"
  value: "180"
  unit: "USDK/year"
  source: "[business-plan.yaml team 产品工程师] 初创公司规律：负责工作流 UX 和核心平台功能的早期产品工程师。"
- id: A14
  name: "解决方案工程师含税现金薪酬"
  value: "162"
  unit: "USDK/year"
  source: "[business-plan.yaml team 解决方案工程师] 初创公司规律：面向客户的集成负责人。"
- id: A15
  name: "可靠性与 ML 工程师含税现金薪酬"
  value: "198"
  unit: "USDK/year"
  source: "[business-plan.yaml team 可靠性与 ML 工程师] 初创公司规律：基础设施密集型归因和修复精度岗位。"
- id: A16
  name: "安全与平台工程师含税现金薪酬"
  value: "186"
  unit: "USDK/year"
  source: "[business-plan.yaml team 安全与平台工程师] 初创公司规律：解锁企业审批所需的最小权限和可审计性工作。"
- id: A17
  name: "客户主管含税现金薪酬"
  value: "180"
  unit: "USDK/year"
  source: "[business-plan.yaml strategicChoices.sequencingRationale] 初创公司规律：集成证明开始可重复后才增加的首位企业销售人员。"
- id: A18
  name: "客户成功经理含税现金薪酬"
  value: "138"
  unit: "USDK/year"
  source: "[business-plan.yaml milestones 12-24 months] 初创公司规律：装机量达到两位数后支持新客户引导、续约和扩张。"
- id: A19
  name: "平台集成工程师含税现金薪酬"
  value: "174"
  unit: "USDK/year"
  source: "[business-plan.yaml milestones 12-24 months; operations] 初创公司规律：首批生产参考案例落地后将自有集成包模板化。"
- id: A20
  name: "第二位客户主管含税现金薪酬"
  value: "180"
  unit: "USDK/year"
  source: "[business-plan.yaml milestones 24-36 months] 初创公司规律：仅在首个销售动作和新客户引导流程可重复后才增加第二位销售人员。"
- id: A21
  name: "招聘节奏"
  value: "创始人/CEO 和创始工程师在 M1；产品工程师 M3；解决方案工程师 M5；可靠性与 ML 工程师 M7；安全与平台工程师 M10；客户主管 M15；客户成功经理 M21；平台集成工程师 M25；第二位客户主管 M30"
  unit: "时间安排"
  source: "[business-plan.yaml team; strategicChoices.sequencingRationale] 集成和信任岗位在规模化 GTM 招聘之前落位。"
- id: A22
  name: "职能薪酬分配"
  value: "创始人/CEO 70% S&M / 30% G&A；创始工程师、产品工程师、可靠性与 ML 工程师、安全与平台工程师和平台集成工程师 100% R&D；解决方案工程师 50% R&D / 50% G&A；每位客户主管 100% S&M；客户成功经理 40% S&M / 60% G&A"
  unit: "分配比例"
  source: "[business-plan.yaml team rationales; operations] 分配遵循谁销售切口、谁构建精度、谁承担客户部署和治理工作的原则。"
- id: A23
  name: "非薪酬运营支出"
  value: "Y1 S&M 每月 5K + 收入的 10%，R&D 每月 6K + 平均客户数 × 0.35K，G&A 每月 6K + 平均客户数 × 0.15K；Y2 S&M 7K + 收入的 11%，R&D 7K + 平均客户数 × 0.4K，G&A 7K + 平均客户数 × 0.18K；Y3 S&M 9K + 收入的 10%，R&D 8K + 平均客户数 × 0.45K，G&A 8K + 平均客户数 × 0.2K"
  unit: "USDK/month"
  source: "[startup-finance heuristic] 涵盖云计算、模型推理、差旅、审计、法务和企业基础设施软件销售的安全评审开销。"
- id: A24
  name: "现金换算政策"
  value: "EBITDA 近似于运营现金变动"
  unit: "政策"
  source: "[startup-finance heuristic] 本阶段不建模债务、资本支出、税款或重大营运资金波动。"
- id: A25
  name: "每新增付费部署的混合 CAC"
  value: "22.2"
  unit: "USDK/new paid deployment"
  source: "由 Y2–Y3 建模销售和营销支出 $1308.8K 除以 59 个净新增付费服务组部署计算得出。"
- id: A26
  name: "融资里程碑"
  value: "20 个付费部署、中位部署时间低于 4 周，以及下一轮融资前至少 2 次多服务扩张"
  unit: "里程碑"
  source: "[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] 用于确定当前种子轮规模加 6 个月运营缓冲。"
