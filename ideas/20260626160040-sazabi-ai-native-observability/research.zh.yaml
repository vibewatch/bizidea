  adoptionFrictionMatrix:
  - friction: 授予智能体代码库写入或回滚权限
    severity: high
    affectedBuyer: 工程副总裁 / 安全评审人员
    mitigation: 以建议模式启动，要求明确审批，并为每个提案动作记录证据和权属元数据。
