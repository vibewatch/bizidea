scenarios:
  downside:
    description: "Security review takes longer and pilot conversion softens, leaving the company below the intended deployment and expansion ramp by Y3."
    y3RevenueK: 1875.0
    y3EbitdaK: -1075.3
    cashLowPointK: -394.8
    keyAssumptionChanges:
    - "Y1 exits with 4 paid deployments, Y2 with 14, and Y3 with 45 instead of 65."
    - "Blended annual ARPU falls from $78K to $72K as more accounts remain at pilot-like scope."
    - "Gross margin slips from 70% to 68% because customer-specific remediation work stays more manual."
  base:
    description: "Founder-led selling plus a narrow integration bundle converts early pilots into repeatable paid deployments without requiring a large field team."
    y3RevenueK: 3078.1
    y3EbitdaK: -420.6
    cashLowPointK: 421.0
    keyAssumptionChanges:
    - "Customer counts follow A6, A7, and A8, reaching 20 paid deployments by Y2 exit and 65 by Y3 exit."
    - "Blended annual ARPU stays at $78K while gross margin stays at the 70% business-plan target."
    - "The team reaches 10 end-of-Y3 FTE, with product, security, and integration hires landing before the second AE."
  upside:
    description: "Reference accounts and faster expansion pull deployments forward enough to reach breakeven in the second half of Y3."
    y3RevenueK: 4284.0
    y3EbitdaK: 298.1
    cashLowPointK: 1132.1
    keyAssumptionChanges:
    - "Y1 exits with 9 paid deployments, Y2 with 28, and Y3 with 80 as reference customers speed qualification and expansion."
    - "Blended annual ARPU rises from $78K to $84K as approval workflows and retention modules attach earlier."
    - "Gross margin improves from 70% to 72% because more deployments reuse the same proven integration templates."
sensitivity:
- variable: "ARPU"
  downsideCase: "Blended annual ARPU stays at $72K as accounts cap scope near the initial service group."
  baseCase: "Blended annual ARPU stays at $78K as modeled."
  upsideCase: "Blended annual ARPU reaches $84K once premium controls and retention modules attach earlier."
  y3RevenueImpactK: -237.1
  cashImpactK: -192.0
- variable: "CAC"
  downsideCase: "S&M intensity rises as more travel, security review, and founder time are needed per deployment."
  baseCase: "Deployment-level CAC stays near $22.2K as modeled."
  upsideCase: "Reference customers reduce paid acquisition and sales-engineering effort per new deployment."
  y3RevenueImpactK: 0.0
  cashImpactK: -123.2
- variable: "churn"
  downsideCase: "Expansion stalls and retained deployments at Y3 exit settle closer to 53 instead of 65."
  baseCase: "Monthly churn stays at 1.6% with strong workflow stickiness after production launch."
  upsideCase: "Expansion and renewal quality improve enough to keep more cohorts active through Y3."
  y3RevenueImpactK: -555.9
  cashImpactK: -328.6
- variable: "sales cycle"
  downsideCase: "Security review and procurement push deals back by roughly one quarter across Y2-Y3."
  baseCase: "Sales timing follows the pilot-to-production ramp in A6-A8."
  upsideCase: "Recent incidents and faster deployment reduce time from qualified pilot to paid production."
  y3RevenueImpactK: -1046.6
  cashImpactK: -687.8
- variable: "gross margin"
  downsideCase: "Gross margin settles at 68% because remediation evidence and model costs stay more manual."
  baseCase: "Gross margin stays at the 70% business-plan target."
  upsideCase: "Gross margin reaches 72% as template reuse lowers delivery and inference cost per deployment."
  y3RevenueImpactK: 0.0
  cashImpactK: -83.3
- variable: "hiring pace"
  downsideCase: "Key hires land earlier than needed and the company carries more payroll before the revenue ramp arrives."
  baseCase: "Hiring follows A21 and stays tightly sequenced to integration and expansion proof."
  upsideCase: "The team keeps the same delivery throughput while delaying the second AE until after stronger reference economics appear."
  y3RevenueImpactK: 0.0
  cashImpactK: -103.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads --> PaidPilots
      PaidPilots --> Deployments[Paid service-group deployments]
      SalesSpend --> Deployments
      Deployments --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      Deployments --> Expansion[Multi-service expansion]
      Expansion --> Revenue
modelSanity:
- checkName: "Revenue engine"
  finding: "Base-case revenue comes from turning a founder-led pilot motion into 20 paid service-group deployments by Y2 exit and 65 by Y3 exit at a $78K blended annual contract value."
- checkName: "Must go right"
  finding: "The first reference integration path has to cut deployment time below four weeks so the company can convert pilots before the cash trough in Q3Y3."
- checkName: "Model breaks if"
  finding: "If security review or AI-governance friction pushes the sales cycle back by roughly one quarter, the downside case turns cash negative before Y3 ends."
- checkName: "Next-round proof"
  finding: "The next financing is justified by showing 20 paid deployments, at least two multi-service expansions, and repeatable security-approved production rollouts."
sanityChecks:
  ruleOf40: "Y3 growth 243.0% + EBITDA margin -13.7% = 229.3%."
  burnMultiple: "Y2 burn multiple is about 1.5x on $708.6K of incremental revenue, improving to about 0.2x in Y3 on $2180.7K of incremental revenue."
  revenuePerFte: "$307.8K Y3 using 10 Q4Y3 FTE (benchmark roughly $200-400K for developing SaaS businesses)."
  flags:
  - "The model counts one paid service-group deployment as a customer, so logo-level CAC and retention will look weaker than the deployment-level unit economics shown here."
  - "Cash bottoms at about $421K in Q3Y3, so missing the Q4Y2-to-Q2Y3 deployment ramp would likely require a bridge or slower hiring."
  - "Y3 is still slightly EBITDA negative, which means the next round still depends on proving expansion and security-review velocity rather than on standalone profitability."
