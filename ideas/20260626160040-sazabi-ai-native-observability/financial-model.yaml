slug: "postdeploy-autofix-gate"
date: "2026-06-26"
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: "Model start month"
  value: "2026-07"
  unit: "YYYY-MM"
  source: "[business-plan.yaml date] first full operating month after the 2026-06-26 plan date."
- id: A2
  name: "Opening cash after seed close"
  value: "2800"
  unit: "USDK"
  source: "[business-plan.yaml fundingAsk.targetFundingRangeUsd] modeled near the middle of the stated $2-4M seed range and sized to reach the next milestone plus a 6-month buffer."
- id: A3
  name: "Revenue unit"
  value: "Active paid service-group deployment"
  unit: "definition"
  source: "[business-plan.yaml businessModel.unitOfValue; investorMemo.firstCustomer.initialContract] the counted customer is one paid monitored service-group deployment rather than a full enterprise logo."
- id: A4
  name: "Blended annual ARPU per active deployment"
  value: "78"
  unit: "USDK/account-year"
  source: "[business-plan.yaml investorMemo.firstCustomer.initialContract; businessModel.expansionLevers] set slightly above the $45k-$75k initial annual range because some Y2-Y3 deployments expand into premium approval-workflow and retention modules."
- id: A5
  name: "Revenue recognition timing"
  value: "Midpoint customer count within each month or quarter"
  unit: "policy"
  source: "[startup-finance heuristic] new pilots and expansions are recognized as if they land halfway through the period on average."
- id: A6
  name: "Y1 month-end customer path"
  value: "0,0,1,1,2,2,3,3,4,5,5,6"
  unit: "active paid deployments"
  source: "[business-plan.yaml milestones 0-12 months; gtm.funnelTargets; investorMemo.nextDiligence] aligns to 3-4 paid pilots launched and 2 production conversions by year end."
- id: A7
  name: "Y2 quarter-end customers"
  value: "Q1Y2 8; Q2Y2 11; Q3Y2 15; Q4Y2 20"
  unit: "active paid deployments"
  source: "[business-plan.yaml milestones 12-24 months] assumes the company productizes the reference integration path and turns the first pilots into repeatable paid deployments."
- id: A8
  name: "Y3 quarter-end customers"
  value: "Q1Y3 28; Q2Y3 38; Q3Y3 50; Q4Y3 65"
  unit: "active paid deployments"
  source: "[business-plan.yaml milestones 24-36 months; research.yaml market.som] reaches the stated 50+ production-customer milestone while staying below the researched 75-customer SOM ceiling."
- id: A9
  name: "Gross margin target"
  value: "70"
  unit: "percent"
  source: "[business-plan.yaml businessModel.targetGrossMarginPct] modeled as 30% COGS on recognized revenue."
- id: A10
  name: "Monthly churn for unit economics"
  value: "1.6"
  unit: "percent"
  source: "[startup-finance heuristic] early infrastructure workflow products with sticky post-deploy controls can retain well once deployed, but buyers still face security and rollout scrutiny."
- id: A11
  name: "Founder CEO loaded cash compensation"
  value: "144"
  unit: "USDK/year"
  source: "[business-plan.yaml team Founder CEO] startup-finance heuristic for a $120K founder salary plus payroll tax and benefits."
- id: A12
  name: "Founding eng loaded cash compensation"
  value: "192"
  unit: "USDK/year"
  source: "[business-plan.yaml team Founding eng] startup-finance heuristic for a senior technical founder cash package plus payroll burden."
- id: A13
  name: "Product engineer loaded cash compensation"
  value: "180"
  unit: "USDK/year"
  source: "[business-plan.yaml team Product engineer] startup-finance heuristic for an early product engineer owning workflow UX and core platform features."
- id: A14
  name: "Solutions engineer loaded cash compensation"
  value: "162"
  unit: "USDK/year"
  source: "[business-plan.yaml team Solutions engineer] startup-finance heuristic for a customer-facing integration owner."
- id: A15
  name: "Reliability and ML engineer loaded cash compensation"
  value: "198"
  unit: "USDK/year"
  source: "[business-plan.yaml team Reliability and ML engineer] startup-finance heuristic for an infra-heavy attribution and remediation-precision hire."
- id: A16
  name: "Security and platform engineer loaded cash compensation"
  value: "186"
  unit: "USDK/year"
  source: "[business-plan.yaml team Security and platform engineer] startup-finance heuristic for least-privilege and auditability work needed for enterprise approval."
- id: A17
  name: "Account executive loaded cash compensation"
  value: "180"
  unit: "USDK/year"
  source: "[business-plan.yaml strategicChoices.sequencingRationale] startup-finance heuristic for the first enterprise seller added only after integration proof starts to repeat."
- id: A18
  name: "Customer success manager loaded cash compensation"
  value: "138"
  unit: "USDK/year"
  source: "[business-plan.yaml milestones 12-24 months] startup-finance heuristic for onboarding, renewal, and expansion support once the installed base reaches double digits."
- id: A19
  name: "Platform integration engineer loaded cash compensation"
  value: "174"
  unit: "USDK/year"
  source: "[business-plan.yaml milestones 12-24 months; operations] startup-finance heuristic for templating the first-party integration bundle after the first production references are live."
- id: A20
  name: "Second account executive loaded cash compensation"
  value: "180"
  unit: "USDK/year"
  source: "[business-plan.yaml milestones 24-36 months] startup-finance heuristic for adding a second seller only after the first sales motion and onboarding process are repeatable."
- id: A21
  name: "Hiring cadence"
  value: "Founder CEO and Founding eng in M1; Product engineer M3; Solutions engineer M5; Reliability and ML engineer M7; Security and platform engineer M10; Account executive M15; Customer success manager M21; Platform integration engineer M25; Second account executive M30"
  unit: "timing"
  source: "[business-plan.yaml team; strategicChoices.sequencingRationale] integration and trust hires land before scaled GTM hiring."
- id: A22
  name: "Functional payroll allocation"
  value: "Founder CEO 70% S&M / 30% G&A; Founding eng, Product engineer, Reliability and ML engineer, Security and platform engineer, and Platform integration engineer 100% R&D; Solutions engineer 50% R&D / 50% G&A; each Account executive 100% S&M; Customer success manager 40% S&M / 60% G&A"
  unit: "allocation"
  source: "[business-plan.yaml team rationales; operations] allocation follows who sells the wedge, who builds precision, and who carries customer deployment and governance work."
- id: A23
  name: "Non-payroll operating spend"
  value: "Y1 S&M 5K + 10% of revenue monthly, R&D 6K + 0.35K per average customer monthly, G&A 6K + 0.15K per average customer monthly; Y2 S&M 7K + 11% of revenue, R&D 7K + 0.4K per average customer, G&A 7K + 0.18K per average customer; Y3 S&M 9K + 10% of revenue, R&D 8K + 0.45K per average customer, G&A 8K + 0.2K per average customer"
  unit: "USDK/month"
  source: "[startup-finance heuristic] covers cloud, model inference, travel, audit, legal, and security-review overhead for an enterprise infrastructure software motion."
- id: A24
  name: "Cash conversion policy"
  value: "EBITDA approximates operating cash movement"
  unit: "policy"
  source: "[startup-finance heuristic] no debt, capex, taxes, or material working-capital swings are modeled at this stage."
- id: A25
  name: "Blended CAC per new paid deployment"
  value: "22.2"
  unit: "USDK/new paid deployment"
  source: "Calculated from modeled Y2-Y3 sales and marketing spend of 1308.8K divided by 59 net new paid service-group deployments."
- id: A26
  name: "Funding milestone"
  value: "20 paid deployments, median deployment time below 4 weeks, and at least 2 multi-service expansions before the next round"
  unit: "milestone"
  source: "[business-plan.yaml milestones 12-24 months; fundingAsk.useOfFundsSummary] used to size the current seed round plus a 6-month operating buffer."
