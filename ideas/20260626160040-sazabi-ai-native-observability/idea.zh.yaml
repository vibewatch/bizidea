problem: >-
  AI 编程工具让每名工程师能合并更多后端变更，但发布工程和值班机制还没跟上这一新的变更量级。当一次 AI 生成的部署拖累了线上性能，团队仍在 CI 日志、仪表板、功能开关和 Git 历史之间来回跳转，试图找出哪笔变更是罪魁祸首，然后手工决策回滚或开热修复分支。现有的可观测性工具能告诉团队哪里坏了，却很少能足够快地把运行时证据和确切的代码差异及修复路径串联起来，让 AI 加速的发布节奏维持安全。
targetUser:
  primary: >-
    Series A-C B2B SaaS 公司的平台工程负责人或 SRE 经理，其后端团队重度使用 Cursor 或 Claude Code，且每天多次向生产环境部署服务
  secondary: >-
    负责金丝雀、回滚策略和 Kubernetes 服务事故跟进的资深后端工程师或发布工程师
  buyer: 工程副总裁或 CTO
startupThesis:
  nonObviousInsight: >-
    AI 生成的代码不只是带来更多回归问题，它同时为每次变更留下了更丰富的机器可读溯源信息——谁改了什么、何时改的、改的哪个服务。把这些溯源信息与作为事故默认证据来源的日志结合起来，就能首次搭建一条闭环：锁定有风险的部署，提出最可能的代码修复方案，把运行时故障转化为定范围的热修复 PR，而不是又一套仪表板。
  beachhead: >-
    拥有 30–150 名工程师、Kubernetes 微服务、且至少 25% 后端合并代码由 Cursor 或 Claude Code 生成的 Series A-C 云原生 B2B SaaS 公司的平台团队
  wedge: >-
    一套部署后自动修复门控：为每次发布打上代码溯源元数据标签，在接下来 30–60 分钟内监控实时日志和 SLO 回归，并自动开出回滚或热修复 PR，直接指向确切的问题变更
  whyNowCatalyst: >-
    Sazabi 的早期牵引力表明，AI 时代的团队已愿意让日志优先智能体调查事故并提交代码修复；与此同时，AI 编程工具正持续增加需要这套安全闭环的线上变更数量。
  ventureScalePath: >-
    从 AI 生成后端代码的发布安全层起步，逐步扩展到环境级部署策略、自主修复审批、跨服务回归记忆，最终成为管理工程智能体在生产环境中如何发布、观测和修复软件的操作系统。
solution: >-
  产品接入 CI/CD、Git 托管、功能开关和客户现有的可观测性栈，构建一张部署图，将服务、提交、代码作者溯源、配置变更和运行时行为串联起来。每次生产发布后，产品主动监控日志、异常、延迟和业务 SLO，寻找与变更相关的异常，而非等待人工拼凑证据。发现可能的回归问题后，产品生成一份针对服务的排查报告，提出最小安全回滚或热修复方案，并开出附有日志证据、疑似根因和影响范围估算的 PR。随着时间推移，产品学习哪些修复模式被采纳、哪些异常是误报，以及哪些服务需要更严格的门控才能让 AI 生成的变更广泛上线。
goToMarketSeed:
  firstCustomer: >-
    一家在 Kubernetes 上运行的 50–200 名工程师规模的垂直 SaaS 公司，拥有 10–40 个生产服务、LaunchDarkly 或同类功能开关，且平台团队正因 Cursor 或 Claude Code 辅助的后端发布每周遭遇回归问题
  buyingTrigger: >-
    最近一次被追溯到 AI 生成或 AI 辅助代码变更的线上事故，或管理层推动扩大 AI 编程使用范围却不希望增加回滚频率和值班负担
  currentAlternative: >-
    手动金丝雀复审、Datadog 或 Grafana 仪表板、CI 日志、功能开关回滚，以及平台工程师拼凑起来的自制发布脚本
  switchingReason: >-
    切口让第一个客户能以更快的速度从运行时症状找到可操作的代码修复方案，沿用现有工具，同时把每次坏掉的部署转化为可复用的修复逻辑，而不是又一份复盘文档。
  pricingHypothesis: >-
    按生产服务数量和调查部署量计费的年订阅制，高级套餐涵盖自动 PR 生成、修复审批工作流和更长的回归记忆保留期
