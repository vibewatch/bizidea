      后端服务刚完成部署、AI 辅助代码变更引发性能退化时，帮助平台团队锁定有问题的差异并找到最安全的修复路径，在事故扩散前恢复服务。
    currentAlternative: 手动仪表板排查、Git 差异复审，以及在 Slack 上临时决策回滚
    successMetric: 从部署后异常检测到合并回滚或热修复 PR 的中位耗时
  - job: >-
      当工程管理层推动扩大 Cursor 或 Claude Code 使用规模时，帮助发布负责人实施服务级安全门控，在不增加值班疲劳的前提下提升交付速度。
    currentAlternative: 通用 CI 检查、功能开关金丝雀和平台工程师的人工判断
    successMetric: AI 生成后端代码的变更失败率和回滚频率
