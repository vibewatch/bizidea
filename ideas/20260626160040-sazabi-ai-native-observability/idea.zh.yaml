topRisks:
  - name: 现有厂商功能捆绑
    description: 现有可观测性或 CI/CD 平台可能增加基本的部署后调查和回滚建议功能。
    mitigation: 专注于跨系统的部署-日志-修复图谱和贯穿 Git、CI/CD、功能开关和可观测性的采纳修复工作流，而非单一厂商平面。
  - name: 误报修复操作
    description: 若产品开出嘈杂或不安全的回滚和热修复 PR，工程师会很快关掉自动化。
    mitigation: 从建议模式起步，设置证据阈值再生成 PR，只从客户量最大服务中已被采纳的修复里学习。
  - name: 初始买家池过窄
    description: AI 代码采用率低的团队可能还感受不到足够的痛点去购买新的发布安全层。
    mitigation: 锁定已在后端工作流中标准化 Cursor 或 Claude Code 的 SaaS 公司，将产品定位为解锁更广泛 AI 编程落地的控制层。
