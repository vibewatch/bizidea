  validationPlan:
  - priority: high
    question: What share of post-deploy regressions in target accounts are traced back to AI-authored or AI-assisted changes?
    evidenceToGather: Incident postmortems, rollback logs, and deploy metadata from at least five design partners.
  - priority: high
