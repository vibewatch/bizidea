openQuestions:
- What percentage of bad deploys in the target segment are actually accepted as rollback or hotfix PRs after an automated investigation, versus merely triaged faster?
- Will platform teams grant repo-write permissions to an agent before the product has a long reliability record, or is advisory mode a long-lived default?
- How often does a logs-first investigation miss the true cause because the service lacks structured logging or sufficient trace context?
- How quickly will Datadog, Grafana, or Sentry connect their existing observability context to deploy-aware remediation and git-native actions?
