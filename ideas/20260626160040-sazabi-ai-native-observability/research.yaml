  adoptionFrictionMatrix:
  - friction: Granting repo-write or rollback authority to an agent
    severity: high
    affectedBuyer: VP Engineering / security reviewer
    mitigation: Start in advisory mode, require explicit approvals, and log every proposed action with evidence and ownership metadata.
