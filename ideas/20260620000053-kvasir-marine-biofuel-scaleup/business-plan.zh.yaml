slug: voyage-biofuel-allocation-os
date: '2026-06-20'
executiveSummary: >-
  Voyage Biofuel Allocation OS 应作为北欧近海航线上稀缺免改装船用生物燃料的承运商原生管控台起步，
  而非定位为广义海事采购套件或通用碳注册平台。首批用户是运营 10 至 40 艘滚装船或支线集装箱船、
  在 ARA、波罗的海或北欧航段执行固定每周循环的运营商的燃油采购负责人或燃料运营负责人。
  紧迫痛点始于承运商签署首份经认证生物燃料供应协议或含减排承诺的客户合同——此时必须在 FuelEU、
  EU ETS 和客户申报的约束下，决定哪些航次消耗有限供量。产品切口是一个航次级分配工作台，将供应报价、
  排班、加油单据、合同和证据包整合进同一个工作流，以叠加层而非 ERP 替代品的形式销售。
  研究支持当前时机：生物燃料供应仍然稀缺，文档要求持续收紧，由货主付费的低排放服务已然存在——
  但第三年 SOM 预计仅约 $2.7M，除非公司扩展为更广义的多燃料运营层。战略选择是先赢得一个航段、
  一个在运项目，因为供应碎片化、申报模糊性以及注册机构、供油商和咨询顾问的替代方案，
  会让广铺局面注定失败。最大的反向风险是：承运商把分配和证明工作流留给供油商、注册机构或
  服务商，而非为独立软件付费。现有输入未能直接证实独立软件预算、可测量的实施周期或真实核查机构
  拒绝率，因此前 12 个月必须证明承运商对工作流的付费拥有权、部署速度，以及试点转正式的转化率。
problem:
  - 早期稀缺生物燃料供应迫使承运商决定哪些航次、客户和合同能获得有限低碳燃油——但大多数团队仍在电子表格、邮件和加油备注中拆解这一权衡。
  - FuelEU Maritime、EU ETS 和客户账册认购预期使申报文档在操作层面极为脆弱，尤其是当 BDN、PoS 或 PoC 文件、排班表和合同条款未在同一系统中核对时。
solution:
  - 提供一个航次级工作台，接入供应承诺、船舶排班、加油单据、客户脱碳承诺和证据要求，然后推荐稀缺生物燃料的优先分配去向。
  - 为每个覆盖航次和客户申报生成可审计的证据包，使承运商无需新增庞大的手工后台流程即可为减排声明背书。
whyWeWin:
  - 产品从承运商工作流内部的物理分配决策切入——这正是注册平台、内嵌减排服务和核查机构主导的服务所不能默认拥有的。
  - 可防御性可从跨早期生物燃料项目积累的供应商可靠性、文档完整性、核查机构接受情况和合同结果数据中快速复利。
strategicChoices:
  beachhead: 拥有 10 至 40 艘船舶、执行固定每周航线、且有一个锚定货主在某条在运航段要求低排放服务的北欧近海滚装船和支线集装箱承运商。
  wedgeRationale: 这个切片能比广义海事脱碳软件更快产生验证——因为燃料稀缺性、航线重复性和客户专属申报，使分配决策成为一个可重复、高风险、买家明确、对手方数量有限的工作流。
  sequencingRationale: 以一条航段、一套承运商工作流和保守证据模板起步，因为实时供应分配和申报防御必须在扩展至更广泛的燃油采购、多燃料优化或面向货主的市场化动作之前跑通；GTM、产品和招聘都应优先追求部署速度和证明完整性，而非功能广度。
  notYet:
    - 航线异构、实施周期更长的全球深远海承运商
    - 注册基础设施或货主市场化产品
    - 全面的燃油采购替代或通用海事 ERP 野心
    - 在核心分配工作流可重复之前，针对甲醇、氨、生物 LNG 或电气化的非生物燃料优化
market:
  tam: "估算 TAM 约 $34.4M——基于全球约 1,911 艘近期适配固定航线稀缺燃料分配工作流的集装箱与滚装船，按每艘船-航段约 $18k 有效年值计算。"
  sam: "估算 SAM 约 $10.3M——针对初始航段重点滩头市场中的北欧近海与支线运营商。"
  som: "第三年模型 SOM 约 $2.7M——基于 6 家区域承运商、每家约 25 艘受管船舶，按每艘船-航段约 $18k 有效年值计算。"
  segments:
    - 北欧近海承运商的燃油采购负责人、燃料运营负责人和 COO
    - 服务相同航段的供油商中的可持续发展与替代燃料项目管理负责人
  buyingProcess: 运营层面的推动者通常是燃油采购负责人或燃料运营负责人，而经济买家通常是 COO 或采购主管——因为燃料成本、服务可靠性、客户承诺和合规风险汇聚在同一个工作流中。可信的首单是一个与一份在运供应合同和一个锚定客户承诺绑定的付费航段试点，在承运商信任分配逻辑和证据包之后转为年度部署。
product:
  mvp: >-
    MVP 应覆盖一家承运商、一条航段和一个在运生物燃料项目。必须接入排班导出、加油交货单、
    供应报价和客户合同证据要求，然后生成航次分配建议、异常预警，以及经人工审批的客户可用证明材料包。
  sixMonth: 签署 2 至 3 个共创客户，上线 eBDN 与排班接入功能，以及保守的 PoS 或 PoC 和 BDN 证据模板，并证明首批部署无需大型 ERP 集成即可在一条航段上线。
  twelveMonth: 新增可复用的航段日历、供应商备货期逻辑、客户申报模板、注册与核查机构交接工作流，以及跨 4 至 6 个付费客户的已分配吨数、已签发申报和节省手工工时报告。
  twentyFourMonth: 扩展为多燃料分配与合规工作台，覆盖租约碳传导、更广泛的燃油采购规划和跨航段标杆分析，同时以承运商原生管控层作为记录系统保持不变。
  keyBets:
    - 承运商愿意为工作流的软件所有权付费，而非把它留给供油商、注册机构或顾问。
    - 单航段部署可足够快地上线，使产品感觉比采购系统替代品轻得多。
    - 保守的证据包设计能在市场确定单一申报标准之前赢得客户和核查机构信任。
    - 同一数据模型可从生物燃料试点扩展至更广泛的多燃料运营决策，而不失去切口聚焦。
gtm:
  wedge: 为即将启动经认证生物燃料项目的承运商销售一个付费航段启动试点——帮助其决定哪些重复航次和客户承诺应消耗首批可用吨数。
  channels:
    - 创始人主导的直接销售，目标是近海承运商的燃油采购负责人、燃料运营负责人和 COO
    - 来自供油商、燃油贸易商和港口生态系统的协同推荐——他们已掌控航段可用性、文档和交付时间
    - 通过海事脱碳网络、注册机构以及核查或认证合作伙伴的共创客户引荐
  funnelTargets: 线索→合格试点 15-25%，合格试点→付费试点 35-45%，付费试点→年度生产 50%+，生产→第二条航段或多燃料扩展 30%+（12 个月内）
  pricing: 年度 SaaS 按活跃船舶和航段计费，首个在运项目设最低平台费，加上与已管理低碳燃油吨数或溢价证据工作流绑定的用量费；这与买家 ROI 一致——价值随已覆盖航次、申报复杂度和稀缺燃料分配量扩展，而非按席位计。
businessModel:
  revenueStreams:
    - 覆盖船舶-航段项目的年度平台订阅费
    - 与已管理低碳燃油吨数或已签发证据包绑定的用量费
    - 首条航段部署的一次性接入和工作流模板搭建费
    - 供应商、航段和申报绩效分析的溢价标杆模块
  unitOfValue: 低碳燃料分配覆盖下的受管船舶-航段
  targetGrossMarginPct: 70
  expansionLevers:
    - 首个在运项目成功后，在同一承运商内添加更多船舶、航段和业务单元
    - 从生物燃料分配扩展至多燃料规划、租约碳传导和合规工作流模块
    - 新增供油商与注册机构集成，使平台成为生态系统合作伙伴的首选管控层
strategyMap:
  northStarMetric: 已覆盖生物燃料航次中按计划完成分配、并随附经接受的证据包（挂钩客户或合规申报）的航次占比
  inputMetrics:
    - 从客户启动到首次航段实时分配运行的时间
    - 首次提交即具备完整 BDN 加 PoS 或 PoC 文档的已覆盖航次占比
    - 付费试点转年度生产的转化率
    - 每位活跃客户的已管理低碳燃油吨数
    - 初始部署后新增航段或船舶数量
  moatsToBuild:
    - 按航段统计的供应商可靠性、港口可用性、文档完整性和核查机构接受情况专有数据集
    - 将物理燃料分配与合同和申报结果挂钩的承运商专属工作流模板
    - 围绕被拒申报、缺失字段和分配权衡的异常历史记录——可改善未来跨燃料的推荐质量
  killCriteria:
    - 前 12 个月内付费承运商试点少于 3 个
    - 前 5 个试点后付费试点转年度生产转化率低于 40%
    - 前 3 次实施后单航段客户首次部署中位时间超过 6 周
    - 两次产品迭代后无需手工返工即可生成完整证据包的已覆盖航次低于 70%
  mermaid: |
    flowchart LR
      Wedge[Carrier corridor wedge] --> MVP[Voyage allocation MVP]
      MVP --> Proof[Trusted proof packs and live allocations]
      Proof --> Expansion[Multi-corridor and multi-fuel expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: 切口可信，"为何是现在"清晰——但在公司证明承运商愿意购买独立管控层而非默认依赖供油商、注册机构或服务商之前，信念度仍然有限。
    whyBelieve: 供应稀缺、EU 证明要求持续收紧，以及由货主付费的在运低排放项目，共同制造了一个相邻工具尚未完全拥有的真实运营工作流。
    whyDoubt: 初始市场狭窄，替代风险高，且现有证据集尚未证明区域承运商会在工作流规模扩大之前为独立软件付费。
    nextDiligence: 对 3 至 5 家目标承运商验证付费试点定价、部署速度，以及是否承运商而非供油商或注册机构将拥有分配和证明工作流。
  firstCustomer:
    title: 北欧近海承运商的燃油采购负责人
    profile: 一家在 ARA、波罗的海或北欧港口执行固定每周航线、运营 15 至 25 艘滚装船或支线集装箱船的承运商——拥有一个要求低排放服务的核心货主客户，且内部尚未搭建任何替代燃料软件栈。
    trigger: 承运商签署首份经认证生物燃料供应协议或含可审计减排承诺的客户合同，必须决定哪些航次优先获得稀缺供量。
    buyer: COO
    initialContract: "首条航段和一个在运燃料项目的付费试点约 $25k 至 $75k，随后随更多船舶、航段和证据工作流纳入管理，转为约 $60k 至 $180k 的年度 ARR。"
  mustBeTrue:
    - 至少一半合格目标承运商必须确认，一个在运生物燃料项目的痛苦程度足以支撑独立试点付费，而非扩大电子表格或顾问支持。
    - 产品必须利用排班导出、eBDN 输入和证据模板在 4 至 6 周内为首条航段上线，而无需大型 ERP 集成。
    - 初始接入后至少 70% 的已覆盖航次必须在无重大手工返工的情况下生成经接受的证据包。
    - 至少 50% 的付费试点必须转为年度部署，因为工作流在未来航次和合同中持续复用。
    - 平台必须以足够快的速度扩展至额外航段或相邻燃料工作流，以克服初始切口单独支撑的第三年 SOM 仅有数百万美元的局限。
  diligenceQuestions:
    - 当承运商有一个在运客户承诺时，今天究竟是谁在做稀缺生物燃料去向的决策？
    - 供油商、注册机构或顾问已经在多大程度上把这个工作流做得足够好，让承运商不需要新软件？
    - BDN、PoS 或 PoC 文件、实验室证书和客户合同中，哪些字段最常引发核查机构或客户的返工？
    - 哪个年度预算项能合理支撑首次部署：燃油采购、合规、可持续发展，还是客户项目收入保护？
    - ZeroNorth、123Carbon、GoodShipping 或核查机构主导的服务向同一承运商原生分配工作流推进的速度有多快？
operatingAssumptions:
  - assumption: 首批可重复的买家是承运商，而非供油商或注册机构。
    basis: research.yaml
    validationTest: 至少完成 2 个付费试点，其中承运商拥有工作流、预算和数据模型，而非仅通过供油商主导的项目参与。
    decisionImpact: 若假设不成立，GTM 应转向白标或合作伙伴主导的分发，而非直接向承运商销售。
  - assumption: 单航段实施可利用轻量级导出和文档模板在 4 至 6 周内完成。
    basis: operator judgment
    validationTest: 衡量前 3 个试点从启动到首次实时分配的时间，要求至少 2 个在 6 周内完成。
    decisionImpact: 若假设不成立，服务负担和销售阻力上升，应在扩充团队规模之前进一步收窄产品范围。
  - assumption: 围绕 BDN 加 PoS 或 PoC 文件构建的保守证据模板，足以获得首批客户和核查机构的接受。
    basis: research.yaml
    validationTest: 从至少 3 个共创客户的每条航段各收集一份经接受的证明材料包，确认不足 30% 需要实质性手工重建。
    decisionImpact: 若假设不成立，路线图优先级从分配逻辑转向合规与认证工作流深度。
  - assumption: 按活跃船舶和航段定价比按席位定价更契合价值。
    basis: idea.yaml
    validationTest: 在至少 5 个试点提案中对比船舶-航段定价与席位和固定项目定价，比较成交率和年化 ACV。
    decisionImpact: 若假设不成立，每客户的收入扩展能力减弱，TAM 假设需下调。
  - assumption: 生物燃料切口可在后期演化为更广泛的多燃料运营层。
    basis: idea.yaml
    validationTest: 在至少 10 次客户和合作伙伴访谈中，确认对甲醇、生物 LNG、氨或租约碳工作流管理在同一管控平面上的相邻需求。
    decisionImpact: 若假设不成立，公司将停留于利基生物燃料工作流工具，缺乏风险投资规模的上行空间。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 在北欧近海市场对 20 名燃油采购负责人、COO、供油商和核查机构关联运营商进行访谈。
    hypothesis: 最紧迫的切入点是一条有客户承诺的在运航段，而非通用脱碳或合规报告工作流。
    successMetric: 至少 10 次访谈描述了与稀缺供应挂钩的近期或即将发生的分配决策，且 5 人同意进行工作流梳理。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 利用共创客户的历史航次排班、加油单据和客户申报要求，构建 2 个手工概念验证试点。
    hypothesis: 若产品能在全自动化完成之前展示更清晰的分配决策和更快的申报材料包组装，买家会为工作流付费。
    successMetric: 2 个共创客户在审阅样本分配输出和证据包后接受付费试点范围。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 用一个排班导出、一个 eBDN 来源和一个客户合同模板，在时间盒内完成轻量级实施。
    hypothesis: MVP 接入可避免大型 ERP 集成，同时为在运航段试点提供足够的信号。
    successMetric: 对至少 2 个测试客户在 15 个工作日内完成首次可用的分配运行。
    owner: 联合创始人/工程师
  - horizon: 90–180 天
    experiment: 启动 3 个付费单航段试点，每个试点各绑定一份在运生物燃料供应协议。
    hypothesis: 航段专属的启动试点比广义脱碳软件销售有更高转化率，因为触发事件、买家和 ROI 都更具体。
    successMetric: 3 个付费试点启动，至少 2 个在 6 周内完成，至少 1 个转为年度生产。
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: "测试两种打包模式：承运商直销 vs. 供油商或注册机构协助的协同销售。"
    hypothesis: 直销赢得账户控制权，但合作伙伴辅助分发能在某些航段缩短试点时间。
    successMetric: 比较 6 个机会，确认哪种打法在不出让数据所有权的前提下产生更高的付费试点转化。
    owner: 创始人/CEO
  - horizon: 180–365 天
    experiment: 为已转化客户新增航段日历、供应商备货期智能和可复用证据模板。
    hypothesis: 推动向第二条航段扩展的是工作流深度和部署可重复性，而非通用报告广度。
    successMetric: 至少 50% 的已转化客户在 12 个月内新增第二条航段或额外船舶。
    owner: 产品负责人
  - horizon: 180–365 天
    experiment: 与供油商、注册机构或核查机构关联顾问签署 3 个生态系统集成或正式推荐合作协议。
    hypothesis: 若初创公司保持承运商原生记录系统的定位而非成为薄服务层，生态系统合作伙伴可加速需求挖掘。
    successMetric: 签署 3 份合作协议，并通过合作伙伴渠道引入 2 个合格付费试点。
    owner: 创始人/CEO
operations:
  - 以最小权限接入排班导出、加油单据和合同证据要求，无需完整 ERP 替代
  - 每条分配建议和客户可见证据包在对外使用前须经人工审批
  - 覆盖 BDN、PoS 或 PoC、实验室证书和客户申报要求的航段专属模板
  - 每周试点运营回顾，追踪缺失文件、分配异常和买家 ROI 指标
  - 核查机构与注册机构交接流程，使经接受的证明材料包无需重新录入即可进入下游认证系统
team:
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 需要创始人主导销售和品类定位——因为买家问题具有战略性、跨职能性，且尚未被列为标准软件预算项。
  - role: 联合创始人/工程师
    startTiming: Month 0
    rationale: 核心产品风险在于以足够快的速度将排班、加油和证据数据拼接成一个可靠工作流，以支撑航段试点。
  - role: 海事燃料与合规产品负责人
    startTiming: Month 3
    rationale: 证据包逻辑、监管细节和对手方工作流需要一位能将在运航段约束转化为产品决策的领域操作者。
  - role: 解决方案工程师
    startTiming: Month 6
    rationale: 早期部署将需要数据映射、模板搭建和客户专属接入，以将试点时间控制在 6 周以内。
  - role: 产品工程师
    startTiming: Month 9
    rationale: 首批试点转化后，可复用集成、合作伙伴交接和多航段报告需要专属研发产能。
  - role: 客户主管
    startTiming: Month 12
    rationale: 仅在定价、买家所有权和试点打包在滩头市场可重复之后，才新增配额型销售人员。
milestones:
  - horizon: 0–12 个月
    items:
      - 在北欧近海承运商滩头市场赢得 3 个付费单航段共创客户
      - 为至少 2 家承运商上线首个实时分配工作流并生成经接受的证据包
      - 证明轻量级航段实施的首次部署时间达到 6 周或以内
      - 至少将 1 个试点转为年度生产合同，并发布可复用的接入模板
  - horizon: 12–24 个月
    items:
      - 达到 4 至 6 个年度客户，管理多艘船舶并完成至少一次第二航段扩展
      - 上线注册机构、核查工作流和供油商文件传输的合作伙伴交接功能
      - 新增航段标杆分析、供应商可靠性分析和可复用证据库
      - 证明至少 50% 的客户扩展超出初始试点范围
  - horizon: 24–36 个月
    items:
      - 达到模型中 6 家承运商、150 艘船舶的第三年 SOM 计划
      - 在不破坏核心承运商分配管控平面的前提下，推出首批多燃料工作流模块
      - 将平台确立为至少一条北欧主要港口航段中分配和证明工作流的首选记录系统
      - 通过第二产品采用展示可信的超越初始生物燃料切口的扩展路径
risks:
  - risk: 商业生物燃料供应爬坡慢于预期，压缩实时分配量并拉长试点紧迫性。
    likelihood: Medium
    impact: High
    mitigation: 优先销售规划与文档工作流，聚焦供应活动可见的航段，避免在重复在运项目需求未出现前超前招聘。
  - risk: 承运商把工作流留给供油商、注册机构或顾问，而非直接购买软件。
    likelihood: High
    impact: High
    mitigation: 以与承运商拥有的客户合同绑定的付费试点验证承运商价值主张，同时测试合作伙伴辅助分发，但不出让工作流所有权。
  - risk: 申报标准和可接受文档在客户、监管机构和核查机构之间持续碎片化。
    likelihood: High
    impact: Medium
    mitigation: 以保守证据模板起步，按航段收集经接受的证明材料包，并在自动化激进申报逻辑之前将异常处理产品化。
  - risk: 初始滩头市场过于狭窄，若多燃料扩展未能实现，难以支撑风险投资规模的回报。
    likelihood: Medium
    impact: High
    mitigation: 在第一年将相邻燃料和租约工作流需求作为明确的验证目标，而非想当然的路线图延伸。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 资助 18 个月的资金跑道，用于验证 3 至 5 个付费航段试点、首批承运商年度转化、轻量级集成、证据包工作流深度，以及生物燃料切口能否扩展为更广泛的多燃料管控层。
