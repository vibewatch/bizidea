differentiator: >-
  Generic maritime procurement tools handle bunker purchasing, and generic ESG
  tools handle reporting, but neither is built for scarce first-wave
  alternative fuel that must be tied to specific voyages, contracts, and proof
  packages. This product starts with the operational edge case that appears when
  drop-in biofuel becomes commercially available before processes are mature. Its
  moat is the dataset of real allocation decisions, supplier performance,
  document completeness, and claim outcomes across early marine biofuel
  corridors.
