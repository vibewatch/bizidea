  - job: When my fleet gets access to a limited pool of drop-in biofuel, help me decide which voyages and customers should receive it, so I can maximize commercial value without disrupting operations.
    currentAlternative: Manual planning across spreadsheets, bunker broker emails, and ops calls
    successMetric: Tons of low-carbon fuel allocated to planned voyages without missed sailings or disputed claims
  - job: When a customer asks for lower-emissions shipping backed by evidence, help me assemble a defensible proof package tied to actual fuel use, so I can win and retain premium freight contracts.
    currentAlternative: Manual certificate collection and sustainability-team reconciliation
    successMetric: Time to produce a customer-ready claim package and renewal rate on decarbonization-linked contracts
