topRisks:
  - name: Supply rollout slips
    description: If commercial marine biofuel volumes arrive slower than expected, early workflow volume may be lumpy and sales cycles may stretch.
    mitigation: Land with carriers and bunker suppliers on pilot planning and documentation first, then expand into live allocation as soon as corridor volumes appear.
  - name: Operators stay on spreadsheets
    description: Smaller carriers may resist adding another system for a program that starts with only a few voyages.
    mitigation: Integrate tightly with existing voyage and ERP tools and price the product as a lightweight pilot control tower that replaces consultant and back-office effort.
  - name: Claims standards remain fragmented
    description: Buyers and carriers may disagree on what documentation is sufficient to support a lower-emissions shipping claim.
    mitigation: Start with conservative evidence workflows tied to supplier documents and third-party lab data, then build reusable templates accepted by anchor customers.
