problem: >-
  Fleet fuel-procurement teams want lower-carbon options now, but first-wave
  drop-in marine biofuel supply will be scarce, corridor-specific, and
  contractually messy. Owners, charterers, bunker suppliers, and sustainability
  teams still coordinate pilots in spreadsheets, PDFs, and email, making it
  hard to decide which voyages should get the fuel and how to prove the claim.
  That friction delays adoption even when a no-retrofit fuel is technically
  usable.
targetUser:
  primary: Head of bunker procurement at Northern European short-sea Ro-Ro and feeder-container operators running 10-40 vessels on fixed weekly loops
  secondary: Fleet decarbonization managers at bunker suppliers serving early marine biofuel corridors
  buyer: Head of Bunker Procurement or COO at a regional short-sea carrier
startupThesis:
  nonObviousInsight: The breakthrough is not just a cleaner fuel molecule; it is that drop-in compatibility removes retrofit capex from the critical path, turning early adoption into a procurement, allocation, and proof-of-claim software problem.
  beachhead: Procurement teams at Northern European short-sea carriers piloting drop-in biofuel on fixed weekly routes where a few recurring voyages can absorb the first available volumes
  wedge: A voyage-level biofuel allocation workspace that links fuel supply commitments, vessel schedules, bunker documents, customer contracts, and emissions evidence in one system
  whyNowCatalyst: Kvasir's funded test-facility expansion, planned first commercial plant, and no-retrofit claim indicate that the next blocker is operational rollout rather than engine conversion.
  ventureScalePath: Start as the system of record for drop-in biofuel pilots, then expand into marine fuel procurement, multi-fuel allocation, charter-party carbon pass-through, and financing data for alternative-fuel shipping networks globally.
solution: >-
  The product gives carriers a control tower for running their first drop-in
  biofuel program without adding a large fuel-ops team. It ingests bunker
  supply offers, vessel schedules, fuel-quality documents, and customer
  decarbonization commitments, then recommends where scarce low-carbon tons
  should be allocated for the highest operational and commercial impact. Each
  voyage gets an auditable evidence pack covering what fuel was lifted, where it
  was used, and which customer promise it supported. Over time, the platform
  becomes the benchmark dataset for which suppliers, corridors, and claim
  structures actually let marine biofuel programs scale.
goToMarketSeed:
  firstCustomer: A 15-25 vessel North Sea or Baltic short-sea carrier with one anchor cargo customer asking for lower-emissions service and no internal software built for alternative-fuel rollout
  buyingTrigger: The carrier signs its first biofuel supply agreement or cargo contract with an emissions commitment as new commercial plant volume comes online
  currentAlternative: Spreadsheets, bunker brokers, ERP notes, fuel lab certificates, and manual sustainability reporting
  switchingReason: The platform lets an operator launch a biofuel program quickly, allocate scarce fuel to the right voyages, and defend customer claims without hiring a new specialist team
  pricingHypothesis: Annual SaaS fee by active vessel and corridor, with premium modules priced by tons of low-carbon fuel managed
