  round: pre-seed
  amountM: 2.1
  runwayMonths: 27
  milestone: "在种子轮启动前，实现跨 4 至 6 家承运商的 8 个在运付费航段项目，证明至少 2 次第二航段扩展，并完成注册机构或核查机构交接。"
  useOfFunds:
    - bucket: "工程"
      amountUsd: 945000
      percentage: 45
    - bucket: "GTM"
      amountUsd: 420000
      percentage: 20
    - bucket: "G&A"
