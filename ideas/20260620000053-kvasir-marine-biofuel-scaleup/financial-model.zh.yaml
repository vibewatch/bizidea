scenarios:
  downside:
    description: "生物燃料项目扩展更慢，客户更接近单航段定价，公司以 10 个在运项目和 $200K 混合项目年价值退出第三年。"
    y3RevenueK: 1600.0
    y3EbitdaK: -728.0
    cashLowPointK: -63.0
    keyAssumptionChanges:
      - "季末客户数从 4、5、6、8 / 9、10、11、12 调整为 4、4、5、6 / 7、8、9、10。"
      - "混合项目年价值从 $225K 降至 $200K，因更多客户停留在首条航段范围。"
      - "毛利率从 70% 滑至 68%，因手工证据包支持和合作伙伴直通费用持续偏高。"
  base:
    description: "公司将第一年试点转化为可重复的在运航段项目，以跨约 6 家承运商的 12 个付费项目和 $225K 混合项目年价值退出第三年。"
    y3RevenueK: 2250.0
    y3EbitdaK: -248.0
    cashLowPointK: 688.0
    keyAssumptionChanges:
      - "季末客户数按 A12 和 A13 推进。"
      - "毛利率维持 BP 目标 70%。"
      - "招聘按 A19 执行，在可重复性得到验证之前不扩充大型现场销售或服务团队。"
  upside:
    description: "第二航段扩展提前落地，合作伙伴渠道为管道输送机会，公司以 14 个在运项目和 $235K 混合项目年价值退出第三年。"
    y3RevenueK: 2731.9
    y3EbitdaK: 136.6
    cashLowPointK: 1215.4
    keyAssumptionChanges:
      - "季末客户数升至 5、6、7、9 / 10、12、13、14，因第二航段扩展更早落地。"
      - "混合项目年价值从 $225K 升至 $235K，因用量和扩展工作流范围更快挂载。"
      - "毛利率从 70% 改善至 72%，随着集成、模板和交接标准化。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "混合项目年价值稳定在 $200K，因客户停留在更窄的首航段范围。"
    baseCase: "混合项目年价值维持在模型中的 $225K。"
    upsideCase: "混合项目年价值随第二航段和溢价证据工作流更快挂载而达到 $240K。"
    y3RevenueImpactK: -250.0
    cashImpactK: -293.1
  - variable: "CAC"
    downsideCase: "CAC 升至约 $95K，因供油商和注册机构推荐未能缩短创始人主导的企业销售周期。"
    baseCase: "CAC 在直接销售和合作伙伴辅助打法结合下维持在约 $75K。"
    upsideCase: "一旦推荐和案例研究持续带来合格试点，CAC 降至约 $60K。"
    y3RevenueImpactK: -112.5
    cashImpactK: -150.0
  - variable: "churn"
    downsideCase: "若客户将产品视为一次性试点管控层，月度流失率漂移至 3.5%。"
    baseCase: "月度流失率维持模型中的 2.5%。"
    upsideCase: "分配与证明工作流嵌入重复运营后，月度流失率改善至 1.5%。"
    y3RevenueImpactK: -112.5
    cashImpactK: -126.0
  - variable: "sales cycle"
    downsideCase: "因买家预算和数据映射进展慢于预期，管道和部署时间整体延后约一个季度。"
    baseCase: "销售和部署时间按 BP 中 4 至 6 周实施切口推进。"
    upsideCase: "共创客户参考案例压缩采购和接入流程，使每批次提前约一个季度落地。"
    y3RevenueImpactK: -225.0
    cashImpactK: -216.6
  - variable: "gross margin"
