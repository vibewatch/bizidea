modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[Founder + partner leads] --> PaidPilots
      PaidPilots --> LivePrograms
      LivePrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情景收入来自付费航段项目从 3 个增长至 12 个，随着客户新增船舶和第二航段，每个项目年均约 $225K 变现。"
  - checkName: "必须做对的事"
    finding: "试点转正式的转化率必须足够强，使公司在不大幅提前扩充销售或服务团队的前提下，于 Q4Y2 达到 8 个在运项目。"
  - checkName: "模型崩溃的条件"
    finding: "若定价停滞在约 $200K 每项目年，或爬坡在第三年仅达到 10 个在运项目，悲观情景下现金将小幅跌破零——即使按模型融资规模。"
  - checkName: "下轮融资证明"
    finding: "一旦公司达到跨 4 至 6 家承运商的 8 个在运项目，展示第二航段扩展，并完成注册机构或核查机构工作流的干净交接，种子轮故事即可成立。"
sanityChecks:
  ruleOf40: "第三年增长率 95.1% + EBITDA 利润率 -11.0% = 84.1%（增长强劲，但由于部署在整个第三年仍依赖服务支持，成熟 Rule-of-40 质量仍未达标）。"
  burnMultiple: "第二年净新增 ARR 约 0.5 倍，第三年随航段扩展消化固定团队成本降至约 0.3 倍。"
  revenuePerFte: "第三年末每 FTE 收入 $225.0K（对比 SaaS 标杆约 $200K-$400K）。"
  flags:
    - "模型假设每个付费航段项目迅速扩展至约 12.5 艘受管船舶和 $225K 混合年值；若客户长期停留在 $60K–$180K 的单航段范围，第三年收入将大幅低于预期。"
    - "悲观情景下现金略微为负，因此招聘必须严格按试点转化和第二航段扩展的节奏执行，而非基于日历式乐观节奏。"
    - "月度流失率仅用于 LTV 计算，而运营模型使用里程碑驱动的净客户增量；一旦续约数据出现，应以队列留存率替代启发式流失率输入。"
    - "第三年每 FTE 收入处于 SaaS 标杆低端，因为实施和证据包支持在交付中仍占相当份量，在工作流进一步标准化之前制约了运营杠杆。"
