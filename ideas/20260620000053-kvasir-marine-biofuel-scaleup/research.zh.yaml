  adoptionFrictionMatrix:
  - friction: 申报文档因供应商、核查机构和客户而异
    severity: high
    affectedBuyer: 可持续发展经理 / 燃油采购负责人
    mitigation: 以保守的 PoS/PoC/BDN 模板和核查机构认可的证据包起步。
    sourceRefs:
    - 14
    - 16
    - 17
  - friction: 燃料可用性受航段和备货期制约
    severity: high
    affectedBuyer: 燃油采购负责人
    mitigation: 在固定航线上启动并构建供应商备货期日历，而非承诺全面覆盖。
