  som:
    value: $2.7M
    rationale: "合理的第三年计划是 6 家区域承运商各约 25 艘受管船舶，共 150 艘，按估算 $18k 有效年 ACV：150 × $18k = $2.7M。"
    isEstimate: true
    sourceRefs:
    - 34
    - 38
bottomUpSizingDrivers:
- driver: 全球集装箱 + 滚装货船总量上限
  value: 9,554 ships (6,419 containerships + 3,135 Ro-Ro cargo ships)
  source: '[37]'
- driver: 固定航线适配度过滤
  value: ~20% of the global ceiling = ~1,911 ships
  source: calc
- driver: 北欧滩头市场过滤
  value: ~6% of the global ceiling = ~573 ships
  source: calc
- driver: 有效年值 ACV
  value: $18k per managed vessel-corridor
  source: est.
- driver: 第三年目标客户计划
  value: 6 carriers × 25 vessels = 150 ships
  source: calc
categoryDynamics:
  growthRate: 新加坡和鹿特丹报告生物混合加油销售 2021 年至 2024 年第三季度 CAGR 约 63%
  growthRateSourceRefs:
  - 76
  tailwinds:
  - point: FuelEU Maritime 和 EU ETS 使低碳燃料选择从单纯声誉问题转变为运营和财务工作流问题。
    sourceRefs:
    - 1
    - 3
    - 14
  - point: 货主和货代已在购买账册认购和内嵌减排产品，为承运商改善内部分配工作流创造了真实的商业动机。
    sourceRefs:
    - 23
    - 81
    - 82
    - 53
  - point: 生物燃料可用性不再局限于单一试点站点；供应商地图和行业报道显示 ARA、斯堪的纳维亚和其他主要枢纽的活动正在扩展。
    sourceRefs:
    - 117
    - 118
    - 119
  headwinds:
  - point: 航运仍仅消耗约 0.7 Mtoe 液态生物燃料，约占全球供应量的 0.6%——实物量仍然稀缺。
    sourceRefs:
    - 76
  - point: 申报权属、防重复计算控制和可接受证明格式，在监管机构、注册机构和合同之间仍在演化。
    sourceRefs:
    - 14
    - 16
    - 17
  - point: 部分近海承运商可能在特定航线上优先考虑电气化、甲醇、氨或生物 LNG，随时间推移稀释纯生物燃料切口。
    sourceRefs:
    - 85
    - 97
    - 94
competitors:
- name: ZeroNorth
  stage: scale-up
  wedge: 航运运营的燃油采购、eBDN 和排放报告
  pricing: 报价式企业软件；官网按工作流模块推介，无公开价目表。
  strength: 已靠近燃油支出、交付验证和数字运营数据。
  weaknessVsUs: 未针对客户合同之间的稀缺生物燃料分配和申报证明材料包进行定位。
  sourceRefs:
  - 43
  - 44
  - 45
  - 49
- name: 123Carbon
  stage: scale-up
  wedge: 跨运输方式的环境属性证书注册和账册认购基础设施
  pricing: 请求演示 / 注册模式；无公开费率。
  strength: 强大的保管链、证书签发和认证生态系统。
  weaknessVsUs: 拥有申报注册，而非决定哪个航次应获得物理生物燃料的运营决策。
  sourceRefs:
  - 50
  - 53
- name: GoodShipping
  stage: scale-up
  wedge: 托管碳内嵌减排和面向货主的燃料切换项目
  pricing: 与内嵌减排项目挂钩的定制商业协议。
  strength: 能接触购买绿色货运的货主和货代。
  weaknessVsUs: 以服务为主导，处于承运商燃油采购系统外部，运营学习可能留在船队之外。
  sourceRefs:
  - 62
  - 86
- name: DNV
  stage: incumbent
  wedge: 生物燃料内嵌减排认证、全生命周期核算以及 FuelEU/合规咨询
  pricing: 基于项目的咨询和核查服务。
  strength: 在方法论和文档方面获得船东、货主和核查机构的高度信任。
  weaknessVsUs: 以咨询为核心，而非承运商日常执行系统。
  sourceRefs:
  - 67
  - 76
regulatoryTechnicalConstraints:
- point: 从 2027 年起，可持续生物燃料申报越来越需要与船舶 IMO 号码、BDN 以及最终联盟数据库或等效证据链挂钩的 PoS 或认可 PoC。
  sourceRefs:
  - 14
  - 2
- point: 新型混合物或更高生物燃料比例即使以"免改装"为宣传，仍需船级社、OEM 和运营尽职调查。
  sourceRefs:
  - 93
  - 32
  - 31
- point: FuelEU 和 EU ETS 通过 THETIS-MRV 和核查工作流进行报告，对任何运营软件层都有严格的时间和数据完整性要求。
  sourceRefs:
  - 2
  - 3
  - 14
validationSignals:
- point: DHL 与 Hapag-Lloyd 签署三年可持续燃料和账册认购框架，显示出对可审计低排放航运的货主付费需求。
  sourceRefs:
  - 81
  - 98
- point: MOL 与 Shell 合作，通过 123Carbon 将第三方船舶燃料切换转化为客户可见的 EAC，证明了可追溯申报基础设施的商业价值。
  sourceRefs:
  - 82
  - 50
- point: 123Carbon 称其平台已签发代表逾 500,000 tCO2e 减排量的证书，表明属性转让市场已超越概念阶段。
  sourceRefs:
  - 53
- point: DFDS 和 UECC 均表明，近海运营商已把低碳燃料视为在运客户或合规工具，而非抽象的未来选项。
  sourceRefs:
  - 85
  - 93
  - 96
- point: Kvasir 的融资轮次和规划中的首座商业工厂，使未来航段供应比通用脱碳叙事更为具体。
  sourceRefs:
  - 105
  - 106
openQuestions:
- 10 至 40 艘船舶的区域承运商会在每月生物燃料航次超过寥寥几个之前，就采用独立工作流工具吗？
- 客户合同、BDN 和 PoS/PoC 文件中哪些具体字段，今天最常引发核查机构或客户的返工？
- 初创公司能否在 123Carbon、Katalist、供油商和承运商项目生态系统之间保持中立，而不被挤入单一注册栈？
- 未来三年内，目标承运商在相同航段上选择电气化、生物 LNG、甲醇或氨而非免改装生物燃料的频率有多高？
