market:
  tam:
    value: $34.4M
    rationale: "以 EMSA 货船数据集全球集装箱加滚装货船上限 9,554 艘（6,419 集装箱船 + 3,135 滚装货船）为基础，假设 20% 适合重复航线稀缺燃料分配工作流，乘以估算 $18k 有效年值船舶-航段 ACV：9,554 × 20% × $18k ≈ $34.4M。"
    isEstimate: true
    sourceRefs:
