scenarios:
  downside:
    description: "Biofuel programs expand more slowly, customers stay closer to single-corridor pricing, and the company exits Y3 with 10 live programs at a $200K blended program-year value."
    y3RevenueK: 1600.0
    y3EbitdaK: -728.0
    cashLowPointK: -63.0
    keyAssumptionChanges:
      - "Quarter-end customers move from 4, 5, 6, 8 / 9, 10, 11, 12 to 4, 4, 5, 6 / 7, 8, 9, 10."
      - "Blended program-year value drops from $225K to $200K as more customers remain at first-corridor scope."
      - "Gross margin slips from 70% to 68% because manual evidence-pack work and partner pass-through stay elevated."
  base:
    description: "The company converts Y1 pilots into repeatable live corridor programs and exits Y3 with 12 paid programs across about six carriers at a $225K blended program-year value."
    y3RevenueK: 2250.0
    y3EbitdaK: -248.0
    cashLowPointK: 688.0
    keyAssumptionChanges:
      - "Quarter-end customer counts follow A12 and A13."
      - "Gross margin stays at the BP target of 70%."
      - "Hiring follows A19 without adding a larger field-sales or services team before repeatability is proven."
  upside:
    description: "Second-corridor expansion attaches earlier, partner channels feed the pipeline, and the company exits Y3 with 14 live programs at a $235K blended program-year value."
    y3RevenueK: 2731.9
    y3EbitdaK: 136.6
    cashLowPointK: 1215.4
    keyAssumptionChanges:
      - "Quarter-end customers rise to 5, 6, 7, 9 / 10, 12, 13, 14 as second-corridor expansions land sooner."
      - "Blended program-year value increases from $225K to $235K as usage and expanded workflow scope attach faster."
      - "Gross margin improves from 70% to 72% once proof-pack templates and integrations standardize."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Blended program-year value settles at $200K because customers stay on narrower first-corridor scope."
    baseCase: "Blended program-year value holds at $225K as modeled."
    upsideCase: "Blended program-year value reaches $240K once second corridors and premium evidence workflows attach."
    y3RevenueImpactK: -250.0
    cashImpactK: -293.1
  - variable: "CAC"
    downsideCase: "CAC rises toward $95K because supplier and registry referrals do not shorten founder-led enterprise selling."
    baseCase: "CAC stays near $75K with a mixed direct and partner-assisted motion."
    upsideCase: "CAC falls toward $60K once referrals and case studies consistently originate qualified pilots."
    y3RevenueImpactK: -112.5
    cashImpactK: -150.0
  - variable: "churn"
    downsideCase: "Monthly churn drifts toward 3.5% if customers treat the product as a one-off pilot control layer."
    baseCase: "Monthly churn stays at 2.5% as modeled."
    upsideCase: "Monthly churn improves toward 1.5% once allocation and proof workflow become embedded in recurring operations."
    y3RevenueImpactK: -112.5
    cashImpactK: -126.0
  - variable: "sales cycle"
    downsideCase: "Pipeline and deployment timing slip by roughly one quarter because buyer budgets and data mapping move slower than planned."
    baseCase: "Sales and deployment timing follow the 4–6 week implementation wedge in the BP."
    upsideCase: "Design-partner references compress procurement and onboarding so each cohort lands about one quarter earlier."
    y3RevenueImpactK: -225.0
    cashImpactK: -216.6
  - variable: "gross margin"
    downsideCase: "Gross margin holds near 68% because manual proof-pack support stays heavier for longer."
    baseCase: "Gross margin stays at the BP target of 70%."
    upsideCase: "Gross margin reaches 72% once integrations, templates, and handoffs standardize."
    y3RevenueImpactK: 0.0
    cashImpactK: -75.3
  - variable: "hiring pace"
    downsideCase: "The final four hires are pulled forward by about two quarters before repeatability is proven."
    baseCase: "Hiring follows A19 and stays lean until live corridor programs expand past eight."
    upsideCase: "The second GTM and fourth engineering hire slip later because the base team supports growth efficiently."
    y3RevenueImpactK: 0.0
    cashImpactK: -918.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Founder + partner leads] --> PaidPilots
      PaidPilots --> LivePrograms
      LivePrograms --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue comes from growing from 3 to 12 paid corridor programs and monetizing each at roughly $225K per program-year as customers add more vessels and second corridors."
  - checkName: "Must go right"
    finding: "Pilot-to-production conversion has to stay strong enough that the company reaches eight live programs by Q4Y2 without pulling forward a much larger sales or services team."
  - checkName: "Model breaks if"
    finding: "If pricing stalls near $200K per program-year or the ramp slips toward only 10 live programs in Y3, the downside case pushes cash slightly below zero even with the modeled raise."
  - checkName: "Next-round proof"
    finding: "The seed story becomes credible once the company reaches eight live programs across 4–6 carriers, shows second-corridor expansion, and proves clean handoffs into registry or verifier workflows."
sanityChecks:
  ruleOf40: "Y3 growth 95.1% + EBITDA margin -11.0% = 84.1% (good growth, but still below mature rule-of-40 quality because deployments stay services-assisted through Y3)."
  burnMultiple: "About 0.5x in Y2 on net new ARR, improving to about 0.3x in Y3 as corridor expansions absorb the fixed team."
  revenuePerFte: "$225.0K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K SaaS benchmark)."
  flags:
    - "The model assumes each paid corridor program quickly expands toward about 12.5 managed vessels and a $225K blended annual value; if customers remain near the $60K-$180K annual band for single-corridor scope, Y3 revenue undershoots materially."
    - "The downside case turns slightly cash-negative, so hiring must remain tightly sequenced to pilot conversion and second-corridor expansion rather than calendar-based optimism."
    - "Monthly churn is used only for LTV math while the operating model uses milestone-driven net customer adds; once renewals exist, cohort retention should replace the heuristic churn input."
    - "Y3 revenue per FTE sits near the low end of SaaS benchmarks because implementation and proof-pack support are still meaningful parts of delivery, which limits operating leverage until workflows standardize further."
