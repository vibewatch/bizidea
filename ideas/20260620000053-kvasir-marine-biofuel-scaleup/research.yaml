reportMemo:
  executiveTakeaways:
  - The wedge is credible because early marine biofuel adoption is becoming a documentation-and-allocation problem before
    it becomes a fleet-retrofit problem.
  - 'The beachhead is real but narrow: Northern European short-sea carriers already face customer-funded low-emission programs
    and new EU proof requirements, yet the likely year-three outcome is low-single-digit millions of ARR unless the product
    expands into a broader multi-fuel control tower.'
  - 'Competition is adjacent rather than direct: registries, insetting brokers, assurance firms, and bunker-procurement suites
    each own a slice, but none owns voyage-level fuel allocation plus proof-of-claim workflow by default.'
  - Supply scarcity helps the wedge because DNV still shows shipping biofuel as a tiny share of global liquid biofuel consumption,
    which raises the value of deciding exactly which voyages and contracts receive the limited volumes.
  - The main commercial risk is that carriers keep the workflow with bunker suppliers, registries, or consultants instead
    of buying another operating system.
  marketDefinition: 'Carrier-native software that allocates scarce certified low-carbon marine fuel across voyages, customer
    contracts, and claims. The category sits between bunker procurement tools, book-and-claim registries, and compliance reporting
    systems: it decides where physical fuel should go and packages the evidence needed to defend the resulting emissions claim.'
  customerAndBuyer: Primary users are bunker procurement managers plus sustainability or fuel-operations leads at 10-40 vessel
    short-sea Ro-Ro and feeder-container operators. The economic buyer is usually the Head of Bunker Procurement or COO because
    fuel cost, service reliability, customer commitments, and compliance risk all converge in the same workflow.
  buyingTriggers:
  - point: A carrier signs its first certified biofuel supply agreement or gains access to new corridor volume, forcing it
      to decide which voyages, customers, and claims should consume the limited fuel.
    sourceRefs:
    - 106
    - 109
    - 14
  - point: An anchor cargo customer asks for a book-and-claim or low-emission service backed by auditable Scope 3 evidence,
      creating a revenue-linked need for better allocation and proof.
    sourceRefs:
    - 81
    - 82
    - 23
  - point: FuelEU Maritime and EU ETS reporting deadlines expose how brittle spreadsheet-based fuel, contract, and document
      reconciliation is under verifier scrutiny.
    sourceRefs:
    - 1
    - 3
    - 16
  willingnessToPay:
    summary: Willingness to pay exists when the workflow is attached to live customer revenue or expensive compliance effort.
      DHL signed a three-year framework with Hapag-Lloyd to use sustainable marine fuels via book and claim, MOL turned third-party
      fuel switches into EAC-backed services for customers, 123Carbon says its platform has already issued certificates representing
      more than 500,000 tCO2e avoided, and maritime software vendors still sell on a per-ship enterprise basis rather than
      self-serve commodity pricing. That suggests buyers will fund the tool if it clearly protects contract revenue, verifier
      trust, or manual headcount.
    sourceRefs:
    - 81
    - 82
    - 53
    - 41
  competitiveLandscape: 'Competition clusters into four camps: bunker-procurement and digital-operations suites (ZeroNorth),
    registry infrastructure (123Carbon and Katalist-style systems), insetting service providers (GoodShipping and carrier
    green products), and assurance/compliance advisors (DNV and class-linked experts). The whitespace is a carrier-native
    operating layer that makes the physical allocation decision first, then hands the resulting evidence to registries, verifiers,
    and customers.'
  incumbentThesis:
  - incumbentClass: Registry platforms
    point: 123Carbon and Katalist prove the market wants auditable claim transfer, but registries do not win by default because
      they sit after the fuel-allocation decision rather than inside the carrier workflow that decides which voyage should
      receive the fuel.
    sourceRefs:
    - 50
    - 53
    - 22
    - 23
  - incumbentClass: Insetting service providers
    point: GoodShipping and similar programs aggregate shipper demand and help fund low-carbon transport, but their center
      of gravity is commercial program management, not the internal carrier system of record for bunker allocation and evidence
      assembly.
    sourceRefs:
    - 62
    - 81
    - 82
  - incumbentClass: Compliance and assurance vendors
    point: DNV and legal/compliance advisors already own methodology trust, yet they are services-first and verifier-facing;
      that leaves room for productized operational workflow underneath their assurance layer.
    sourceRefs:
    - 67
    - 76
    - 16
  - incumbentClass: Bunker and operations suites
    point: ZeroNorth is closest to the budget line because it already touches bunker buying, eBDN, and emissions reporting,
      but it is not positioned around scarce-biofuel allocation across customer contracts and proof-of-claim packs.
    sourceRefs:
    - 43
    - 44
    - 45
    - 49
  regulatoryLandscape: 'FuelEU Maritime and EU ETS already make low-carbon fuel choice an operational and financial issue,
    while Dutch guidance shows how detailed the proof stack gets in practice: PoS or accredited PoC documents must line up
    with ship IMO numbers and BDNs, and book-and-claim or charter-party language still requires conservative treatment to
    avoid double counting or disputed ownership of the environmental benefit.'
  technologyLandscape: The hard technology is good enough for a software wedge. Drop-in biofuels can work with existing engines
    and infrastructure, while eBDN, tank-level reporting, registry APIs, and port biofuel availability data make multi-party
    evidence packaging feasible. The open problem is stitching those components into one operational decision loop before
    the claim is made.
  distributionChannels:
  - point: Direct founder-led sales into bunker procurement and COO teams are the primary route because the pain only becomes
      urgent once a live low-carbon-fuel program or customer contract exists.
    sourceRefs:
    - 85
    - 97
    - 81
  - point: Bunker suppliers and port ecosystems are natural co-sell channels because they already control availability, documentation,
      and delivery timing at the corridor level.
    sourceRefs:
    - 109
    - 117
    - 118
    - 119
  - point: Registry and insetting partners can open shipper-funded pilots, but the startup must stay carrier-native to avoid
      becoming a thin services wrapper behind someone else's commercial program.
    sourceRefs:
    - 50
    - 62
    - 23
  partnershipEcosystem:
  - point: Fuel suppliers, bunker traders, and port authorities matter because availability, lead times, and BDN data are
      prerequisites for any allocation recommendation.
    sourceRefs:
    - 117
    - 118
    - 119
  - point: Registry and assurance partners matter because customers increasingly want auditable, third-party-backed claim
      transfer rather than bilateral spreadsheets.
    sourceRefs:
    - 53
    - 22
    - 67
  - point: Class and OEM partners matter for novel blends or higher biofuel ratios, where operational acceptance still depends
      on technical due diligence and controlled approvals.
    sourceRefs:
    - 93
    - 32
    - 31
  dataMoats:
  - point: A proprietary corpus of which supplier, corridor, and voyage combinations actually delivered usable documents and
      accepted claims can compound quickly.
    sourceRefs:
    - 14
    - 117
    - 119
  - point: Linking physical bunkers, customer contracts, and downstream certificate outcomes creates a feedback loop that
      registries alone do not own.
    sourceRefs:
    - 82
    - 53
    - 81
  - point: Exception data around missing BDN fields, tank segregation, and verifier rejections can become a sticky workflow
      moat for future fuels beyond biofuel.
    sourceRefs:
    - 44
    - 49
    - 76
  geographicConsiderations:
  - point: Northern Europe is the right beachhead because EU short-sea shipping is dense, Nordic and Baltic countries over-index
      on short-sea traffic, and the ARA/Gothenburg corridor concentrates early low-carbon-fuel activity.
    sourceRefs:
    - 34
    - 35
    - 38
  - point: The Netherlands and the ARA cluster are especially attractive because Dutch guidance already describes PoS/PoC
      workflows in operational detail and the port ecosystem is actively supporting book-and-claim and sustainable bunkering.
    sourceRefs:
    - 14
    - 23
    - 118
  - point: Expansion beyond the beachhead is plausible through global book-and-claim and carrier programs, but geography matters
      because claim rules and fuel access are still uneven across corridors.
    sourceRefs:
    - 20
    - 22
    - 81
  sensitivityCases:
  - case: Commercial biofuel volumes arrive slower than planned or remain premium-priced
    impact: The product still helps with planning and proof packs, but recurring live-allocation usage and ACV ramp more slowly.
    sourceRefs:
    - 76
    - 106
    - 109
  - case: Registry and insetting players move up-stack into carrier operations
    impact: The startup must win on physical-voyage execution, internal data integrations, and procurement ergonomics rather
      than claim transfer alone.
    sourceRefs:
    - 50
    - 62
    - 22
    - 67
  - case: Alternative fuels such as methanol, ammonia, electrification, or bioLNG win some short-sea routes faster than biofuel
    impact: The product becomes more valuable only if it generalizes into a multi-fuel allocation and compliance workspace
      rather than a biofuel-only tool.
    sourceRefs:
    - 85
    - 97
    - 94
  validationPlan:
  - priority: high
    question: How many voyages per month at the target carrier actually require a biofuel allocation decision under one live
      supply contract?
    evidenceToGather: Three months of bunker nominations, voyage schedules, and customer commitments from at least three design
      partners.
  - priority: high
    question: What minimum evidence pack do verifiers and anchor cargo customers accept today without manual rework?
    evidenceToGather: Real PoS/PoC samples, BDNs, lab certificates, and customer-facing claim packs from one completed pilot
      per corridor.
  - priority: medium
    question: Will carriers buy software instead of leaving the process with a bunker supplier, registry, or consultant?
    evidenceToGather: Procurement interviews plus one paid pilot where the carrier, not the supplier, owns the workflow and
      data model.
  - priority: medium
    question: Can the product integrate schedule, bunker, and contract data fast enough for smaller carriers to onboard without
      a heavy IT project?
    evidenceToGather: A time-boxed implementation test using one eBDN source, one voyage schedule export, and one customer
      contract template.
