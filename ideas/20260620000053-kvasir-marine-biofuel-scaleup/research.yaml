  adoptionFrictionMatrix:
  - friction: Proof-of-claim documentation differs by supplier, verifier, and customer
    severity: high
    affectedBuyer: Sustainability manager / bunker procurement head
    mitigation: Start with conservative PoS/PoC/BDN templates and verifier-approved evidence packs.
    sourceRefs:
    - 14
    - 16
    - 17
  - friction: Fuel availability is corridor- and lead-time-dependent
    severity: high
    affectedBuyer: Head of bunker procurement
    mitigation: Launch on fixed loops and build supplier lead-time calendars instead of promising universal coverage.
    sourceRefs:
    - 76
    - 117
    - 119
  - friction: Existing data lives across bunker notes, schedules, and customer contracts
    severity: medium
    affectedBuyer: Fuel operations lead
    mitigation: Integrate first with eBDN, schedule exports, and contract evidence templates rather than attempting full ERP
      replacement.
    sourceRefs:
    - 43
    - 44
    - 49
  - friction: Novel blends may still need class or OEM sign-off
    severity: medium
    affectedBuyer: Technical superintendent
    mitigation: Start with established blends and embed approval checklists and escalation paths.
    sourceRefs:
    - 93
    - 32
    - 31
  - friction: Smaller carriers may keep the workflow with brokers or service providers
    severity: medium
    affectedBuyer: COO
    mitigation: Sell as a lightweight pilot control tower tied to one customer contract and one corridor, not as a broad rip-and-replace
      system.
    sourceRefs:
    - 62
    - 67
    - 86
market:
  tam:
    value: $34.4M
    rationale: 'Use the global container-plus-Ro-Ro cargo ship ceiling of 9,554 vessels from the EMSA cargo-ship dataset (6,419
      containerships + 3,135 Ro-Ro cargo ships), assume 20% are near-term fits for recurring-route scarce-fuel allocation
      workflows, and apply an estimated $18k effective annual vessel-corridor ACV: 9,554 × 20% × $18k ≈ $34.4M.'
    isEstimate: true
    sourceRefs:
    - 37
    - 34
  sam:
    value: $10.3M
    rationale: 'Apply a 6% Northern-Europe short-sea and feeder beachhead share to the same 9,554-ship global ceiling, cross-checked
      against EU short-sea concentration around ARA, Nordic, and Baltic ports: 9,554 × 6% × $18k ≈ $10.3M.'
    isEstimate: true
    sourceRefs:
    - 37
    - 34
    - 35
  som:
    value: $2.7M
    rationale: 'A plausible year-three plan is six regional carriers with roughly 25 managed vessels each, or 150 vessels
      total, at an estimated $18k effective annual ACV: 150 × $18k = $2.7M.'
    isEstimate: true
    sourceRefs:
    - 34
    - 38
