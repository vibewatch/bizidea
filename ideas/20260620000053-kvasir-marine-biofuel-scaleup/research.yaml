categoryDynamics:
  growthRate: ~63% CAGR in reported bio-blended bunker sales at Singapore and Rotterdam (2021 to Q3 2024)
  growthRateSourceRefs:
  - 76
  tailwinds:
  - point: FuelEU Maritime and EU ETS turn low-carbon fuel choice into an operational and financial workflow rather than a
      purely reputational one.
    sourceRefs:
    - 1
    - 3
    - 14
  - point: Cargo owners and forwarders are already buying book-and-claim and insetting products, which creates a real commercial
      reason for carriers to improve internal allocation workflow.
    sourceRefs:
    - 23
    - 81
    - 82
    - 53
  - point: Biofuel availability is no longer confined to a single pilot site; supplier maps and trade coverage show expanding
      activity across ARA, Scandinavia, and other key hubs.
    sourceRefs:
    - 117
    - 118
    - 119
  headwinds:
  - point: Shipping still consumes only around 0.7 Mtoe of liquid biofuels, about 0.6% of global supply, so physical volume
      remains scarce.
    sourceRefs:
    - 76
  - point: Claim rights, double-counting controls, and acceptable proof formats are still evolving across regulators, registries,
      and contracts.
    sourceRefs:
    - 14
    - 16
    - 17
  - point: Some short-sea carriers may prioritize electrification, methanol, ammonia, or bioLNG on specific routes, which
      can dilute a pure-biofuel wedge over time.
    sourceRefs:
    - 85
    - 97
    - 94
competitors:
- name: ZeroNorth
  stage: scale-up
  wedge: Bunker procurement, eBDN, and emissions reporting for shipping operations
  pricing: Quote-based enterprise software; public site markets per-workflow modules rather than a posted tariff.
  strength: Already sits close to bunker spend, delivery validation, and digital operating data.
  weaknessVsUs: Not positioned around scarce-biofuel allocation between voyages, customer contracts, and proof packs.
  sourceRefs:
  - 43
  - 44
  - 45
  - 49
- name: 123Carbon
  stage: scale-up
  wedge: Environmental attribute certificate registry and book-and-claim infrastructure across transport modes
  pricing: Request-demo / registry model; no public rate card.
  strength: Strong chain-of-custody, certificate issuance, and assurance ecosystem.
  weaknessVsUs: Owns the claim registry, not the operational decision of which voyage should receive the physical biofuel.
  sourceRefs:
  - 50
  - 53
- name: GoodShipping
  stage: scale-up
  wedge: Managed carbon insetting and shipper-facing fuel-switch programs
  pricing: Custom commercial agreements tied to insetting programs.
  strength: Commercial access to cargo owners and forwarders buying green freight.
  weaknessVsUs: Service-led and external to carrier bunker-procurement systems, so operational learning may stay outside the
    fleet.
  sourceRefs:
  - 62
  - 86
- name: DNV
  stage: incumbent
  wedge: Biofuel insetting assurance, lifecycle accounting, and FuelEU/compliance advisory
  pricing: Project-based advisory and verification services.
  strength: High trust with shipowners, cargo owners, and verifiers on methodology and documentation.
  weaknessVsUs: Advisory-centric rather than a daily carrier execution system.
  sourceRefs:
  - 67
  - 76
regulatoryTechnicalConstraints:
- point: From 2027, sustainable biofuel claims increasingly need a PoS or accredited PoC linked to ship IMO number, BDN, and
    ultimately the Union Database or equivalent evidence chain.
  sourceRefs:
  - 14
  - 2
- point: Novel blends or higher biofuel ratios still require class, OEM, and operational due diligence even when the headline
    story is “drop-in”.
  sourceRefs:
  - 93
  - 32
  - 31
- point: FuelEU and EU ETS reporting through THETIS-MRV and verifier workflows creates strict timing and data-integrity requirements
    for any operational software layer.
  sourceRefs:
  - 2
  - 3
  - 14
validationSignals:
- point: DHL and Hapag-Lloyd committed to a three-year sustainable-fuels and book-and-claim framework, showing customer-funded
    demand for auditable low-emission shipping.
  sourceRefs:
  - 81
  - 98
- point: MOL and Shell demonstrated that third-party vessel fuel switches can be converted into customer-facing EACs via 123Carbon,
    proving the commercial value of traceable claim infrastructure.
  sourceRefs:
  - 82
  - 50
- point: 123Carbon says its platform has already issued certificates representing more than 500,000 tCO2e avoided, indicating
    that the attribute-transfer market is moving beyond concept stage.
  sourceRefs:
  - 53
- point: DFDS and UECC both show that short-sea operators already treat low-carbon fuel as a live customer or compliance tool
    rather than an abstract future option.
  sourceRefs:
  - 85
  - 93
  - 96
- point: Kvasir’s funding round and planned first commercial plant make future corridor supply more concrete than a generic
    decarbonization narrative.
  sourceRefs:
  - 105
  - 106
openQuestions:
- Will 10-40 vessel regional carriers adopt a standalone workflow tool before they reach more than a handful of biofuel voyages
  per month?
- Which exact fields in customer contracts, BDNs, and PoS/PoC paperwork cause most verifier or customer rework today?
- Can the startup remain neutral across 123Carbon, Katalist, bunker-supplier, and carrier-program ecosystems rather than being
  squeezed into one registry stack?
- How often will target carriers choose electrification, bioLNG, methanol, or ammonia instead of drop-in biofuel on the same
  corridors over the next three years?
