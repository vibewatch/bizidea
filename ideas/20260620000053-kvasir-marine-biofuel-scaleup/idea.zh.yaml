topRisks:
  - name: 供应推进延期
    description: 若商业船用生物燃料供量到来慢于预期，早期工作流量可能参差不齐，销售周期可能拉长。
    mitigation: 优先以试点规划和文档工作切入承运商和供油商，一旦航段供量出现即快速扩展至实时分配。
  - name: 运营商依赖电子表格
    description: 规模较小的承运商可能抵触为仅涵盖少数航次的项目再引入一套新系统。
    mitigation: 与现有航次和 ERP 工具深度集成，将产品定价为替代顾问和后台人工成本的轻量级试点管控台。
  - name: 申报标准持续碎片化
    description: 货主和承运商可能在哪些文档足以支撑低排放运输申报上存在分歧。
    mitigation: 以与供应商文件和第三方实验室数据挂钩的保守证据工作流起步，逐步构建经锚定客户接受的可复用模板。
