jobsToBeDone:
  - job: 当船队获得有限的免改装生物燃料供应时，帮我判断哪些航次和客户应优先获得，以便在不影响运营的前提下最大化商业价值。
    currentAlternative: 通过电子表格、燃油经纪商邮件和运营电话进行手工规划
    successMetric: 在不延误出航或引发申报争议的情况下，将低碳燃料按计划分配至对应航次的吨数
  - job: 当客户要求提供有证据支撑的低排放运输服务时，帮我整理一份与实际燃料使用相挂钩的可信证明材料包，从而赢得并留住溢价货运合同。
    currentAlternative: 手工收集证书并由可持续发展团队核对
    successMetric: 生成客户可用申报材料包的耗时，以及与脱碳条款挂钩合同的续约率
