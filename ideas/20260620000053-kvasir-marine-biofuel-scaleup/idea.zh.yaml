problem: >-
  船队燃油采购团队迫切需要低碳方案，但首批免改装船用生物燃料供应将极度稀缺、航段专属、合同关系复杂。
  船东、承租人、供油商和可持续发展团队至今仍在用电子表格、PDF 和邮件协调试点工作，难以判断
  哪些航次应优先获得该燃料，也难以证明减排申报的真实性。即使燃料在技术上无需改装即可使用，
  这种摩擦仍会拖慢采用速度。
targetUser:
  primary: 在北欧近海运营 10 至 40 艘船舶、执行固定每周循环航线的滚装船和支线集装箱运营商的燃油采购负责人
  secondary: 为早期船用生物燃料航段提供服务的供油商的船队脱碳管理负责人
  buyer: 区域近海承运商的燃油采购负责人或 COO
startupThesis:
  nonObviousInsight: 真正的突破不只是一种更清洁的燃料分子——免改装兼容性将资本改造从关键路径上移除，把早期采用变成了采购、分配和减排证明的软件问题。
  beachhead: 在固定每周航线上试点免改装生物燃料的北欧近海承运商采购团队——这些航线上有限的首批供应量，少数几个重复航次就能完全消化。
  wedge: 以航次为单位的生物燃料分配工作台，将燃料供应承诺、船舶排班、加油单据、客户合同与减排证据整合在同一系统中。
  whyNowCatalyst: Kvasir 已获融资扩建测试设施、规划首座商业工厂，并声称燃料免改装——下一个瓶颈已从发动机改装转向实际产能部署。
  ventureScalePath: 先成为免改装生物燃料试点的记录系统，再扩展至船用燃料采购、多燃料分配、租约碳传导，以及全球替代燃料船运网络的融资数据。
solution: >-
  该产品为承运商提供一个运行首个免改装生物燃料项目的综合管控台，无需组建庞大的燃料运营团队。
  系统接入燃料供应报价、船舶排班、燃料质量文件和客户脱碳承诺，并推荐应将稀缺低碳燃油分配到
  哪些航次，以实现最高的运营和商业价值。每个航次都会生成可审计的证据包，覆盖加注了哪种燃料、
  在哪里使用以及支撑了哪项客户承诺。随着时间推移，该平台将成为一个标杆数据集，揭示哪些供应商、
  航段和申报结构真正能让船用生物燃料项目规模化。
goToMarketSeed:
  firstCustomer: 在北海或波罗的海运营 15 至 25 艘船舶的近海承运商——拥有一个要求低排放服务的核心货主客户，且内部尚未搭建任何替代燃料管理软件。
  buyingTrigger: 承运商签署首份生物燃料供应协议，或随着新商业工厂产能上线而签署含减排承诺的货运合同。
  currentAlternative: 电子表格、燃油经纪商、ERP 备注、燃料实验室证书和手工可持续性报告。
  switchingReason: 该平台让运营商快速启动生物燃料项目，将稀缺燃料分配到正确的航次，并在不招募新专家团队的情况下支撑客户申报。
  pricingHypothesis: 按活跃船舶和航段收取年度 SaaS 费，并针对已管理低碳燃油吨数设置溢价模块。
whyNow:
  - point: A 轮融资与战略合作同步达成，表明供应商正进入规模化阶段——船队必须从抽象气候规划转向真实的采购准备。
