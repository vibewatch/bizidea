slug: voyage-biofuel-allocation-os
date: '2026-06-20'
executiveSummary: >-
  Voyage Biofuel Allocation OS should start as a carrier-native control tower
  for scarce drop-in marine biofuel on Northern European short-sea routes, not
  as a broad maritime procurement suite or generic carbon registry. The first
  user is the head of bunker procurement or fuel-operations lead at a 10-40
  vessel Ro-Ro or feeder-container operator running fixed weekly loops through
  ARA, Baltic, or Nordic corridors. The urgent pain begins when the carrier
  signs its first certified biofuel supply agreement or customer contract with
  an emissions commitment and must decide which voyages should consume limited
  volume while preserving proof for FuelEU, EU ETS, and customer claims. The
  product wedge is a voyage-level allocation workspace that ties supply offers,
  schedules, bunker documents, contracts, and evidence packs into one workflow,
  sold as an overlay rather than a bunker ERP replacement. Research supports the
  timing, because biofuel supply remains scarce, documentation requirements are
  growing, and customer-funded low-emission services already exist, but the
  likely year-three outcome is only about $2.7M SOM unless the company expands
  into a broader multi-fuel operating layer. The strategic choice is to win one
  corridor and one live program first, because supply fragmentation, claims
  ambiguity, and substitute solutions from registries, suppliers, and
  consultants make a broad launch likely to fail. The biggest disconfirming
  risk is that carriers leave allocation and proof workflow with bunker
  suppliers, registries, or services firms instead of paying for standalone
  software. The inputs do not provide direct evidence of standalone software
  budgets, measured implementation times, or real verifier rejection rates, so
  the first 12 months must prove paid carrier ownership of the workflow,
  deployment speed, and pilot-to-production conversion.
problem:
  - Scarce early biofuel supply forces carriers to choose which voyages, customers, and contracts receive limited low-carbon tons, but most teams still manage the tradeoff in spreadsheets, email, and bunker notes.
  - FuelEU Maritime, EU ETS, and customer book-and-claim expectations make proof-of-claim documentation operationally brittle, especially when BDNs, PoS or PoC documents, schedules, and contract terms are not reconciled in one system.
solution:
  - Provide a voyage-level workspace that ingests supply commitments, vessel schedules, bunker documents, customer decarbonization commitments, and evidence requirements, then recommends where scarce biofuel should be allocated first.
  - Generate an auditable evidence pack for each covered voyage and customer claim so carriers can defend emissions statements without adding a large manual back-office process.
whyWeWin:
  - The product starts at the physical allocation decision inside the carrier workflow, which registries, insetting platforms, and verifier-led services do not own by default.
  - Defensibility can compound from corridor-level data on supplier reliability, document completeness, verifier acceptance, and contract outcomes across early marine biofuel programs.
strategicChoices:
  beachhead: Northern European short-sea Ro-Ro and feeder-container carriers with 10-40 vessels, fixed weekly loops, and an anchor cargo customer requesting a low-emission service on one live corridor.
  wedgeRationale: This slice creates faster proof than broader maritime decarbonization software because fuel scarcity, route recurrence, and customer-specific claims turn the allocation decision into a repeatable, high-stakes workflow with a visible buyer and a short list of counterparties.
  sequencingRationale: Start with one corridor, one carrier workflow, and conservative evidence templates because live supply allocation and claim defense must work before expanding into broader bunker procurement, multi-fuel optimization, or shipper-facing marketplace motions; GTM, product, and hiring should all prioritize deployment speed and proof integrity over feature breadth.
  notYet:
    - Global deep-sea carriers with heterogeneous routes and slower implementation cycles
    - Registry infrastructure or shipper marketplace products
    - Full bunker procurement replacement or general maritime ERP ambitions
    - Non-biofuel optimization for methanol, ammonia, bioLNG, or electrification before the core allocation workflow is repeatable
market:
  tam: "$34.4M estimated TAM based on about 1,911 near-term relevant container and Ro-Ro vessels globally at roughly $18k effective annual value per managed vessel-corridor."
  sam: "$10.3M estimated SAM for Northern European short-sea and feeder operators in the initial corridor-focused beachhead."
  som: "$2.7M modeled year-three SOM based on 6 regional carriers, about 25 managed vessels each, and roughly $18k effective annual value per managed vessel-corridor."
  segments:
    - Heads of bunker procurement, fuel-operations leads, and COOs at Northern European short-sea carriers
    - Sustainability and alternative-fuel program managers at bunker suppliers serving the same corridors
  buyingProcess: The operational champion is likely the head of bunker procurement or fuel-operations lead, while the economic buyer is usually the COO or procurement head because fuel cost, service reliability, customer commitments, and compliance risk sit in one workflow. A credible first sale is a paid corridor pilot tied to one live supply contract and one anchor customer commitment, converting to an annual deployment after the carrier trusts the allocation logic and evidence pack.
product:
  mvp: >-
    MVP should cover one carrier, one corridor, and one live biofuel program. It
    must ingest schedule exports, bunker delivery documents, supply offers, and
    customer contract evidence requirements, then produce voyage allocation
    recommendations, exception flags, and a customer-ready proof pack with human
    approval.
  sixMonth: Sign 2-3 design partners, ship eBDN and schedule ingestion plus conservative PoS or PoC and BDN evidence templates, and prove first deployments can go live for one corridor without a heavy ERP integration project.
  twelveMonth: Add reusable corridor calendars, supplier lead-time logic, customer-claim templates, registry and verifier handoff workflows, and reporting on tons allocated, claims issued, and manual hours removed across 4-6 paid customers.
  twentyFourMonth: Expand into a multi-fuel allocation and compliance workspace covering charter-party carbon pass-through, broader bunker procurement planning, and cross-corridor benchmarking while keeping the carrier-native control layer as the system of record.
  keyBets:
    - Carriers will pay for software ownership of the workflow instead of leaving it with suppliers, registries, or consultants.
    - One-corridor deployments can be stood up fast enough that the product feels lighter than a procurement-system replacement.
    - Conservative evidence-pack design can earn customer and verifier trust before the market settles on a single claim standard.
    - The same data model can expand from biofuel pilots into broader multi-fuel operating decisions without losing wedge focus.
gtm:
  wedge: Sell a paid corridor launch pilot for one carrier that is about to start a certified biofuel program and needs to decide which recurring voyages and customer commitments should consume the first available tons.
  channels:
    - Founder-led direct sales into bunker procurement heads, fuel-operations leads, and COOs at short-sea carriers
    - Co-sell referrals from bunker suppliers, bunker traders, and port ecosystems already controlling corridor availability and documentation
    - Design-partner introductions through maritime decarbonization networks, registries, and verifier or assurance partners
  funnelTargets: lead→qualified pilot 15-25%, qualified pilot→paid pilot 35-45%, paid pilot→annual production 50%+, production→second corridor or multi-fuel expansion 30%+ within 12 months
  pricing: Annual SaaS priced by active vessel and corridor with a minimum platform fee for the first live program, plus usage-based fees tied to tons of low-carbon fuel managed or premium evidence workflows; this matches buyer ROI because value scales with covered voyages, claim complexity, and scarce-fuel allocation volume rather than seat count.
businessModel:
  revenueStreams:
    - Annual platform subscriptions for covered vessel-corridor programs
    - Usage-based fees tied to tons of low-carbon fuel managed or evidence packs issued
    - One-time onboarding and workflow-template setup fees for first-corridor deployment
    - Premium benchmarking modules for supplier, corridor, and claim-performance analytics
  unitOfValue: Managed vessel-corridor under low-carbon fuel allocation coverage
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more vessels, corridors, and business units within the same carrier after the first live program succeeds
    - Expand from biofuel allocation into multi-fuel planning, charter-party carbon pass-through, and compliance workflow modules
    - Add supplier and registry integrations that make the platform the preferred control layer for ecosystem partners
strategyMap:
  northStarMetric: Percentage of covered biofuel voyages that are allocated as planned and shipped with an accepted evidence pack tied to a customer or compliance claim
  inputMetrics:
    - Time from customer kickoff to first live corridor allocation run
    - Percent of covered voyages with complete BDN plus PoS or PoC documentation on first pass
    - Paid pilot to annual production conversion rate
    - Tons of low-carbon fuel managed per active customer
    - Number of additional corridors or vessels added after initial deployment
  moatsToBuild:
    - Proprietary dataset on supplier reliability, port availability, document completeness, and verifier acceptance by corridor
    - Carrier-specific workflow templates linking physical fuel allocation to contract and claim outcomes
    - Exception history on rejected claims, missing fields, and allocation tradeoffs that improves future recommendations across fuels
  killCriteria:
    - Fewer than 3 paid carrier pilots within the first 12 months
    - Paid pilot to annual production conversion below 40% after the first 5 pilots
    - Median first deployment taking more than 6 weeks for a single-corridor customer after the first 3 implementations
    - Fewer than 70% of covered voyages producing complete evidence packs without manual rework after two product iterations
  mermaid: |
    flowchart LR
      Wedge[Carrier corridor wedge] --> MVP[Voyage allocation MVP]
      MVP --> Proof[Trusted proof packs and live allocations]
      Proof --> Expansion[Multi-corridor and multi-fuel expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Credible wedge and clear why-now, but conviction remains limited until the company proves carriers will buy a standalone control layer instead of defaulting to suppliers, registries, or services.
    whyBelieve: Scarce supply, growing EU proof requirements, and live customer-funded low-emission programs create a real operational workflow that adjacent tools do not fully own today.
    whyDoubt: The initial market is narrow, substitution risk is high, and the evidence set does not yet show that regional carriers will fund standalone software before the workflow becomes larger.
    nextDiligence: Validate 3-5 target carriers on paid pilot pricing, deployment speed, and whether the carrier rather than a supplier or registry will own the allocation and proof workflow.
  firstCustomer:
    title: Head of bunker procurement at a Northern European short-sea carrier
    profile: A 15-25 vessel Ro-Ro or feeder-container operator on fixed weekly loops through ARA, Baltic, or Nordic ports with one anchor cargo customer requesting lower-emission service and no internal alternative-fuel software stack.
    trigger: The carrier signs its first certified biofuel supply agreement or customer contract with an auditable emissions commitment and must decide which voyages get scarce volume first.
    buyer: COO
    initialContract: "$25k-$75k paid pilot for one corridor and one live fuel program, converting to roughly $60k-$180k annual ARR as more vessels, corridors, and evidence workflows go under management."
  mustBeTrue:
    - At least half of qualified target carriers must confirm that one live biofuel program is painful enough to fund a standalone pilot rather than expand spreadsheets or consultant support.
    - The product must go live for a first corridor in 4-6 weeks using schedule exports, eBDN inputs, and evidence templates rather than a large ERP integration.
    - At least 70% of covered voyages must produce accepted evidence packs without major manual rework after initial onboarding.
    - At least 50% of paid pilots must convert to annual deployments because the workflow becomes recurring across future voyages and contracts.
    - The platform must expand into additional corridors or adjacent fuel workflows fast enough to overcome a year-three SOM that is only a few million dollars on the initial wedge alone.
  diligenceQuestions:
    - Which exact workflow owner decides where scarce biofuel goes today when a carrier has one live customer commitment?
    - How often do bunker suppliers, registries, or consultants already absorb this workflow well enough that a carrier does not need new software?
    - Which fields in BDNs, PoS or PoC documents, lab certificates, and customer contracts most often cause verifier or customer rework?
    - What annual budget line can plausibly fund the first deployment: bunker procurement, compliance, sustainability, or customer program revenue protection?
    - How fast are ZeroNorth, 123Carbon, GoodShipping, or verifier-led services moving into the same carrier-native allocation workflow?
operatingAssumptions:
  - assumption: The first repeatable buyer is the carrier, not the bunker supplier or registry.
    basis: research.yaml
    validationTest: Close at least 2 paid pilots where the carrier owns the workflow, budget, and data model rather than participating only through a supplier-led program.
    decisionImpact: If false, GTM should pivot toward white-label or partner-led distribution instead of direct carrier sales.
  - assumption: One-corridor implementation can be completed in 4-6 weeks using lightweight exports and document templates.
    basis: operator judgment
    validationTest: Measure time from kickoff to first live allocation across the first 3 pilots and require at least 2 to complete within 6 weeks.
    decisionImpact: If false, services burden and sales friction increase and the product should narrow further before scaling headcount.
  - assumption: Conservative evidence templates built around BDN plus PoS or PoC documents are sufficient for first customer and verifier acceptance.
    basis: research.yaml
    validationTest: Collect one accepted proof pack per corridor from at least 3 design partners and confirm fewer than 30% require material manual reconstruction.
    decisionImpact: If false, roadmap priority shifts from allocation logic toward compliance and assurance workflow depth.
  - assumption: Pricing by active vessel and corridor aligns better with value than seat-based pricing.
    basis: idea.yaml
    validationTest: Test vessel-corridor pricing against seat and flat-project alternatives in at least 5 pilot proposals and compare close rates and annualized ACV.
    decisionImpact: If false, revenue scaling per customer weakens and TAM assumptions need to be revised downward.
  - assumption: The biofuel wedge can later generalize into a broader multi-fuel operating layer.
    basis: idea.yaml
    validationTest: In at least 10 customer and partner interviews, confirm adjacent demand for methanol, bioLNG, ammonia, or charter-party carbon workflow management on the same control plane.
    decisionImpact: If false, the company remains a niche biofuel workflow tool with limited venture-scale upside.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 20 bunker procurement heads, COOs, bunker suppliers, and verifier-linked operators in the Northern European short-sea market.
    hypothesis: The highest-urgency entry point is one live corridor with one customer commitment, not a generic decarbonization or reporting workflow.
    successMetric: At least 10 interviews describe a recent or imminent allocation decision tied to scarce supply, and 5 agree to workflow mapping.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Build 2 manual proof-of-work pilots using historical voyage schedules, bunker documents, and customer claim requirements from design partners.
    hypothesis: Buyers will pay for the workflow if the product can show clearer allocation decisions and faster claim-pack assembly before full automation is complete.
    successMetric: 2 design partners accept paid pilot scopes after reviewing sample allocation outputs and evidence packs.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Time-box a lightweight implementation using one schedule export, one eBDN source, and one customer contract template.
    hypothesis: MVP onboarding can avoid heavy ERP integration and still produce enough signal for a live corridor pilot.
    successMetric: First usable allocation run completed inside 15 business days for at least 2 test customers.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Launch 3 paid single-corridor pilots tied to one live biofuel supply agreement each.
    hypothesis: A corridor-specific launch pilot converts better than a broad decarbonization software sale because the trigger, buyer, and ROI are concrete.
    successMetric: 3 paid pilots launched, at least 2 completed within 6 weeks, and at least 1 converted to annual production.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: "Test two packaging models: carrier-direct sale versus supplier- or registry-assisted co-sell."
    hypothesis: Carrier-direct wins account control, but partner-assisted distribution shortens time to pilot in some corridors.
    successMetric: Compare 6 opportunities and confirm which motion produces higher paid-pilot conversion without ceding data ownership.
    owner: Founder CEO
  - horizon: 180–365 days
    experiment: Add corridor calendars, supplier lead-time intelligence, and reusable evidence templates for converted customers.
    hypothesis: Workflow depth and deployment repeatability, not generic reporting breadth, drive expansion into second corridors.
    successMetric: At least 50% of converted customers add a second corridor or additional vessels within 12 months.
    owner: Product lead
  - horizon: 180–365 days
    experiment: Secure 3 ecosystem integrations or formal referral partnerships with bunker suppliers, registries, or verifier-linked advisors.
    hypothesis: Ecosystem partners can accelerate demand generation if the startup remains the carrier-native system of record rather than a thin services layer.
    successMetric: 3 signed partner agreements and 2 qualified paid-pilot introductions sourced through partners.
    owner: Founder CEO
operations:
  - Least-privilege ingestion of schedule exports, bunker documents, and contract evidence requirements without requiring full ERP replacement
  - Human approval workflow for every allocation recommendation and customer-facing evidence pack before external use
  - Corridor-specific templates covering BDN, PoS or PoC, lab-certificate, and customer-claim requirements
  - Weekly pilot operating review tracking missing documents, allocation exceptions, and buyer ROI metrics
  - Verifier and registry handoff process so accepted proof packs can move into downstream assurance systems without rekeying
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Founder-led sales and category framing are required because the buyer problem is strategic, cross-functional, and not yet budgeted as a standard software line item.
  - role: Founding eng
    startTiming: Month 0
    rationale: The core product risk is stitching schedule, bunker, and evidence data into one reliable workflow fast enough for corridor pilots.
  - role: Maritime fuel and compliance product lead
    startTiming: Month 3
    rationale: Evidence-pack logic, regulatory nuance, and counterparty workflows need an operator who can translate live corridor constraints into product decisions.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Early deployments will require data mapping, template setup, and customer-specific onboarding to keep pilot timelines under 6 weeks.
  - role: Product engineer
    startTiming: Month 9
    rationale: Expansion into reusable integrations, partner handoffs, and multi-corridor reporting needs dedicated build capacity once the first pilots convert.
  - role: Account executive
    startTiming: Month 12
    rationale: Add a quota-carrying seller only after pricing, buyer ownership, and pilot packaging are repeatable in the beachhead.
milestones:
  - horizon: 0–12 months
    items:
      - Win 3 paid single-corridor design partners in the Northern European short-sea carrier beachhead
      - Launch first live allocation workflow with accepted evidence packs for at least 2 carriers
      - Prove first deployment time of 6 weeks or less for a lightweight corridor implementation
      - Convert at least 1 pilot into an annual production contract and publish repeatable onboarding templates
  - horizon: 12–24 months
    items:
      - Reach 4-6 annual customers managing multiple vessels and at least one second corridor expansion
      - Ship partner handoffs to registries, verifier workflows, and bunker-supplier document feeds
      - Add corridor benchmarking, supplier reliability analytics, and reusable evidence libraries
      - Prove that at least 50% of customers expand beyond the initial pilot scope
  - horizon: 24–36 months
    items:
      - Reach the modeled 6-carrier, 150-vessel year-three SOM plan
      - Launch the first multi-fuel workflow modules without breaking the core carrier allocation control plane
      - Establish the platform as the preferred system of record for allocation and proof workflow in at least one major Northern European port corridor
      - Demonstrate credible expansion path beyond the initial biofuel wedge through second-product adoption
risks:
  - risk: Commercial biofuel supply ramps slower than expected, reducing live allocation volume and stretching pilot urgency.
    likelihood: Medium
    impact: High
    mitigation: Sell planning and documentation workflow first, focus on corridors with visible supply activity, and avoid hiring ahead of repeated live-program demand.
  - risk: Carriers keep the workflow with bunker suppliers, registries, or consultants instead of buying software directly.
    likelihood: High
    impact: High
    mitigation: Prove the carrier value proposition with paid pilots tied to owned customer contracts, while also testing partner-assisted distribution without surrendering workflow ownership.
  - risk: Claims standards and acceptable documentation remain fragmented across customers, regulators, and verifiers.
    likelihood: High
    impact: Medium
    mitigation: Start with conservative evidence templates, collect accepted proof packs by corridor, and productize exception handling before automating aggressive claim logic.
  - risk: The initial beachhead is too narrow to support venture-scale outcomes if multi-fuel expansion does not materialize.
    likelihood: Medium
    impact: High
    mitigation: Treat adjacent fuel and charter-party workflow demand as an explicit validation goal during the first year rather than an assumed roadmap extension.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of runway to prove 3-5 paid corridor pilots, first annual carrier conversions, lightweight integrations, evidence-pack workflow depth, and whether the biofuel wedge expands into a broader multi-fuel control layer.
