  "regulatoryLandscape": "The product sits in a high-accountability environment where software assurance expectations are shaped by aviation safety culture, formal development-assurance practices, and growing scrutiny of AI-enabled transport systems. That favors transparent workflow tooling, human approval gates, and durable evidence provenance."
  "technologyLandscape": "The enabling stack is not frontier-model performance alone. It is connectors into requirements repositories, SCM, test systems, issue trackers, and ATM data services; impact analysis that can survive legacy architectures; and exportable evidence artifacts that fit established review and approval flows."
