  - "incumbentClass": "ATM platform vendors"
    "point": "Frequentis and Thales already own operational ATM platform relationships and can influence architecture decisions, yet their value proposition is platform modernization and service delivery, not a vendor-neutral overlay for every changed artifact and approval path."
    "sourceRefs":
