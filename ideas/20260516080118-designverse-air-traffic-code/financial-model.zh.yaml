modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Accounts["Target ATM programs"] --> Pilots["Paid pilots"]
      Pilots --> Production["Production programs"]
      Production --> Expansion["More workflows / baselines"]
      Production --> Revenue["Program revenue"]
      Expansion --> Revenue
      Revenue --> GrossProfit["Gross profit"]
      GrossProfit --> Cash["Cash / runway"]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形靠的是：先把两个付费试点在 Q4Y2 前转成 5 个正式生产项目，再在 Q4Y3 前扩到 8 个在运项目，每个项目年价值约 $750K。
- checkName: 必须跑对的前提
  finding: 连接器复用和伙伴协同获客，必须让部署足够产品化，毛利率才能从 Y1 的 50% 抬到 Y3 的 70%。
- checkName: 模型会失效的情况
  finding: 对现金最危险的情形，是采购和试点转生产周期变长；这会让 Y3 收入少掉约 $0.9M，并把现金底线压到计划缓冲以下。
- checkName: 下一轮融资证明点
  finding: 等公司做到大约 5 个正式生产项目、第二条可复用工作流，以及可信的伙伴带单，而不是只有定制化试点收入时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 growth 124.3% + EBITDA margin 3.2% = 127.5%
  burnMultiple: Y2 burn multiple about 0.5x (-$1001.2K EBITDA on $1931.3K net new revenue), improving to positive EBITDA in Y3.
  revenuePerFte: $434.7K Y3 using 11 year-end FTE (benchmark $200–400K SaaS); slightly above benchmark but plausible for high-ACV program sales.
  flags:
  - 基准情形要求在一个高度集中的欧洲市场里，到 Q4Y2 做到 5 个正式生产项目；只要一单采购滑延，现金跑道就会明显受影响。
  - 只有只读连接器和保障模板能保持可复用，而不是退化成重度专业服务，毛利率才到得了目标。
  - Y3 收入集中度很高：8 个项目几乎就是整个基准盘子，所以续约和扩展假设比 logo 数量更关键。
