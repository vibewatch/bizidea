slug: air-traffic-change-assurance
date: '2026-05-16'
currency: USD
modelStartMonth: 2026-06
assumptions:
- id: A1
  name: 模型启动时种子轮到账带来的期初现金
  value: '3400.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M] 模型取 $3.4M 种子轮交割，落在区间低中位，用来支撑到 Q4Y2 里程碑外加 6 个月缓冲。'
- id: A2
  name: 起始客户数（M1）
  value: '0'
  unit: count
  source: '[BP executiveSummary + milestones] 业务一开始没有收入，首个付费试点要在早期产品准备完成后才能拿下。'
- id: A3
  name: Y1 客户爬坡
  value: 2 paying programs by M12
  unit: count
  source: '[BP milestones 0-12 months] 目标是在年末前拿下 2 个付费共创客户，并把 1 个试点转成年费合同；模型把成交时间平滑到 M6 和 M9。'
- id: A4
  name: Y2 客户爬坡
  value: 5 production programs by Q4Y2
  unit: count
  source: '[BP milestones 12-24 months] 目标是 4-6 个正式生产项目；基准情形取中高位 5 个。'
- id: A5
  name: Y3 客户爬坡
  value: 8 production programs by Q4Y3
  unit: count
  source: '[BP milestones 24-36 months] 明确目标是 6-8 个正式生产项目，并朝研究中的 $6.0M SOM 推进；基准情形取上限 8 个。'
- id: A6
  name: 试点年度每个活跃项目的混合年收入
  value: '240.0'
  unit: annualK
  source: '[BP investorMemo firstCustomer initialContract $150k-$250k] 基准情形取中位数，并按试点实际活跃期确认收入。'
- id: A7
  name: Y2 每个活跃项目的混合年收入
  value: '550.0'
  unit: annualK
  source: '[BP pricing + investorMemo annual program license $750k-$1.2M] Y2 混合了转正后的年费合同、新近试点和实施收入，因此低于成熟阶段定价。'
- id: A8
  name: Y3 成熟阶段每个活跃项目的年收入
  value: '750.0'
  unit: annualK
  source: '[BP investorMemo annual program license $750k-$1.2M and research SOM $6.0M] 年末 ARR 若达到 8 个项目 × $750k，正好对齐研究中的低位生产许可区间和 SOM 口径。'
- id: A9
  name: 毛利率路径
  value: 50% Y1, 60% Y2, 70% Y3
  unit: percent
  source: '[BP businessModel targetGrossMarginPct 70 + operatingAssumptions] 按创业财务经验，早期部署实施较重；等连接器复用起来后，毛利才会上来。'
- id: A10
  name: 用于单位经济模型的月度 logo 流失率
  value: '1.5'
  unit: percent
  source: '[BP pricing per-program annual license + concentrated regulated workflow] 面向粘性高但采购偏重的企业基础设施合同，采用创业财务经验值。'
- id: A11
  name: 创始人 / CEO 全成本薪酬
  value: '210.0'
  unit: annualK
  source: '[BP team Founder/CEO] 面向种子阶段创始人的现金薪酬加上薪税负担的创业财务经验值。'
- id: A12
  name: 工程岗位全成本薪酬
  value: '200.0'
  unit: annualK
  source: '[BP team Founding eng] 面向资深基础设施工程师加薪税负担的创业财务经验值。'
- id: A13
  name: 保障产品岗位全成本薪酬
  value: '190.0'
  unit: annualK
  source: '[BP team Assurance product lead] 面向具航空保障经验的重领域产品负责人薪酬经验值。'
- id: A14
  name: 解决方案 / 实施岗位全成本薪酬
  value: '180.0'
  unit: annualK
  source: '[BP team Solutions engineer] 面向实施型企业解决方案工程师加负担的创业财务经验值。'
- id: A15
  name: 销售 / 伙伴岗位全成本薪酬
  value: '230.0'
  unit: annualK
  source: '[BP team Enterprise seller / partner lead] 面向一位资深企业销售兼伙伴负责人加负担的创业财务经验值。'
- id: A16
  name: 客户成功 / 运营岗位全成本薪酬
  value: '150.0'
  unit: annualK
  source: 创业财务经验值：只有在多个正式生产项目上线后，才补第一位售后项目经理 / 客户成功运营。
- id: A17
  name: G&A 岗位全成本薪酬
  value: '140.0'
  unit: annualK
  source: 创业财务经验值：只有当生产部署开始可复制后，才补精干的财务 / 行政支持。
- id: A18
  name: 招聘顺序
  value: Founder, founding engineer, and assurance product lead active at start; solutions in Q2Y1; first enterprise seller in Q4Y1; second engineer in Q1Y2; G&A in Q2Y2; second seller in Q3Y2; second solutions hire in Q4Y2; customer success in Q2Y3; third engineer in Q3Y3
  unit: schedule
  source: '[BP team + strategicChoices sequencingRationale] 先补实施和产品化，再扩销售；后续招聘按季度平滑。'
- id: A19
  name: Y1 各部门月度运营开支
  value: 72K/month in Q1Y1, 88K/month in Q2Y1, 93K/month in Q3Y1, 121K/month in Q4Y1
  unit: USDK
  source: '[BP operations + fundingAsk useOfFundsSummary] 创业财务经验值，覆盖精干种子阶段在两次试点周围的云成本、差旅、法务和安全开支。'
- id: A20
  name: Y2 季度运营开支
  value: 480K, 540K, 600K, 660K
  unit: USDK per quarter
  source: '[BP milestones 12-24 months + operatingAssumptions] 随着连接器、治理工作、伙伴赋能和生产支持增加，非薪酬支出同步上升。'
- id: A21
  name: Y3 季度运营开支
  value: 750K, 780K, 810K, 855K
  unit: USDK per quarter
  source: '[BP product twentyFourMonth + research SOM] 随着同一套保障模板主干可以复用，支出增速慢于收入。'
- id: A22
  name: 收入确认方法
  value: Average active programs in period × annualized ARPU for that stage
  unit: formula
  source: '[BP pricing by active program] 为了让客户数与试点到生产的收入口径对齐，模型采用这一简化公式，而不是单独做 cohort 表。'
- id: A23
  name: 稳态 CAC
  value: '280.0'
  unit: USDK
  source: '[BP gtm founder-led direct + integrator co-sell motion] 面向高度聚焦、长周期、安全关键的企业销售，采用创业财务经验值。'
- id: A24
  name: 融资额测算规则
  value: Reach Q4Y2 milestone plus 6 months of buffer
  unit: policy
  source: '[BP fundingAsk runwayMonths 18] 再加上财务模型要求的额外 6 个月缓冲，确保下一轮融资前还有余地。'
- id: A25
  name: 现金流简化方法
  value: Ending cash = opening cash + cumulative EBITDA
  unit: formula
  source: 创业财务经验值：对软件优先的种子公司，假设营运资金波动、资本开支和债务影响都很小。
