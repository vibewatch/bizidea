scenarios:
  downside:
    description: 采购拉长、定制化实施始终很重，到 Y3 公司只能做到 6 个正式生产项目，而且 ACV 更低。
    y3RevenueK: 3375.0
    y3EbitdaK: -620.0
    cashLowPointK: 290.0
    keyAssumptionChanges:
    - Q4Y3 客户数收在 6 个，而不是 8 个。
    - 成熟阶段每个项目的年收入降到 $650K，而不是 $750K。
    - 由于连接器依旧偏服务化，毛利率最高只到 65%。
  base:
    description: 基准情形与经营计划一致：M12 前拿下 2 个付费项目，Q4Y2 达到 5 个正式生产项目，Q4Y3 达到 8 个，成熟阶段每个项目年价值约 $750K。
    y3RevenueK: 4781.2
    y3EbitdaK: 151.8
    cashLowPointK: 1348.6
    keyAssumptionChanges:
    - 相对假设 A1-A25 没有调整。
  upside:
    description: 如果两家早期参考客户和伙伴渠道把交易前拉，到 Y3 公司可做到 10 个正式生产项目，并挂上更多高级模块。
    y3RevenueK: 6200.0
    y3EbitdaK: 900.0
    cashLowPointK: 1450.0
    keyAssumptionChanges:
    - Q4Y3 客户数收在 10 个，而不是 8 个。
    - 成熟阶段每个项目的年收入提升到 $850K，并带上分析与审计导出模块。
    - 随着实施越来越模板化，毛利率升到 72%。
