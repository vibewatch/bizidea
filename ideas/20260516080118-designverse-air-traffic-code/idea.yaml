topRisks:
  - name: "Long enterprise cycles"
    description: "ANSPs and mission-critical integrators buy slowly, which can stretch sales and deployment timelines far beyond typical SaaS assumptions."
    mitigation: "Land with one high-stakes subsystem upgrade, sell through integrator partners, and position the first product as a scoped assurance accelerator rather than a platform replacement."
  - name: "Legacy integration drag"
    description: "Requirements, code, and test evidence often live in fragmented or proprietary legacy systems that are hard to connect cleanly."
    mitigation: "Start with read-only connectors to the most common repositories and allow human review checkpoints where automation coverage is incomplete."
  - name: "Trust and liability ceiling"
    description: "If the product misses a required trace or suggests weak evidence, buyers may reject it for any safety-relevant workflow."
    mitigation: "Keep humans in approval loops, provide transparent evidence provenance, and launch first as decision support for review preparation instead of autonomous release approval."
