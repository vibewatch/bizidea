slug: air-traffic-change-assurance
date: '2026-05-16'
executiveSummary: Air Traffic Change Assurance 的起步形态，应该是一层有人在环的发布保障系统，服务对象是正在升级飞行数据处理、管制员 HMI 和相邻地面系统的欧洲 ANSP 与 ATM 系统集成商。研究里看到的痛点非常具体：团队并不是改不动软件，而是每次发版前都得在割裂的遗留工具之间重建需求追溯、回归证据、评审材料和签署留痕。第一版产品不该去替换 DOORS 这一类生命周期套件、验证工具或 ATM 平台；它应该压在这些系统之上，把一次代码 diff 直接变成一份可进评审的变更包，明确告诉团队哪里证据还缺、哪些环节需要人工审批。这个滩头市场有吸引力，因为这里已经有拿到预算的现代化项目、刚性的运行时间表，以及一小群同时对进度和安全论证质量负责的集中买家。GTM 必须把首个客户、采购触发点、定价基准和渠道当成一个系统来设计：创始人亲自卖进一个正在运行的子系统升级项目，通常搭配集成商或保障伙伴，先落成付费试点，再转成按项目计费的年度许可。研究估算欧洲滩头市场 SAM 约 $72.0M，第 3 年可触达的 SOM 约 $6.0M；这足够支撑一个早期切口，但后续仍要扩到相邻的受监管软件行业。最关键的早期验证，不是能不能拿到关注，而是能不能在下一次发布评审截止日前让 2-4 个项目掏钱，并在首轮升级后把产品定成标准工具。眼下最大的证据缺口仍是：主流代码库组合到底是什么，ANSP 会不会买独立叠加层而不是只接受渠道切入，以及目前有多少手工保障工作其实是外包出去的，所以这些都只能暂时按假设处理，不能当事实。
problem:
- ATM 现代化项目至今还在需求工具、源码管理、测试系统和顾问流程之间，手工重建影响分析、追溯矩阵、回归范围和评审材料。
- 任何一份证据包延迟或不完整，都可能把安全评审往后推，让董事会已经批准的升级直接变成运行和排期风险。
solution:
- 提供一层厂商中立的变更保障系统，把每次代码 diff 映射到客户现有系统里的受影响需求、风险点、测试、问题单和评审任务。
- 在所有关键发布决策仍由人负责的前提下，生成带有证据来源、缺失提醒和可导出审批材料的评审就绪变更包。
whyWeWin:
- 公司解决的是“从 diff 到评审包”这条非常窄的工作流，现有厂商只碰到一部分，因此比替换整条受监管工具链更容易证明价值。
- 跨工具的追溯图、可复用的保障模板和评审决策历史，会随着每次正式发布不断累积，形成通用 AI 编码工具很难复制的切换成本。
- 第一个切口直接挂在活跃的现代化截止日和可量化的人力节省上，买家不用等大平台换代，也能先给预算。
strategicChoices:
  beachhead: 正在为某个控制中心项目升级飞行数据处理、管制员 HMI、流量管理或互操作软件，并且面临固定安全评审截止日的欧洲 ANSP 与 ATM 系统集成商。
  wedgeRationale: 这一段买家最清楚、发布门槛最高，缺证据的代价也最直观。和面向更宽泛的航空软件团队相比，只卖一个子系统升级更容易在同一个现代化周期里验证节省了多少时间、减少了多少缺失证据，以及试点能不能转成正式部署。
  sequencingRationale: 先从只读集成、影响分析和变更包导出做起，让产品先嵌进现有保障流程、把信任打下来，再谈改变工作流控制权。首批部署由创始人亲自卖，配上实施支持和少量伙伴协助；只有等试点转正，证明这层叠加系统能和现有厂商共存而不是触发平台替换之战后，才逐步补充可复用连接器、基准数据和相邻发布工作流。
  notYet:
  - 把自动发布审批或 AI 生成代码当成核心产品
  - 在 ATM 参考客户还没建立前，就扩到铁路、电网或医疗器械
  - 在产品和伙伴打法还没在 EUROCONTROL 与 SESAR 语境里跑通前，就铺开非欧洲销售
  - 系统性替换生命周期管理、测试或 ATM 平台现有厂商
market:
  tam: 估算 TAM 为 $420.0M：全球大约有 280 个活跃的 ANSP 与 ATM 集成商安全关键软件项目，年 ACV 约 $1.5M。
  sam: 估算欧洲 SAM 为 $72.0M：约 60 个核心 ATM 现代化项目，年 ACV 约 $1.2M。
  som: 估算第 3 年 SOM 为 $6.0M：拿下 4 个核心项目，再加 2 个更小的扩展项目或偏服务型部署。
  segments:
  - 欧洲 ANSP 中，正在推进 ATM 地面系统升级的软件保障与验证团队
  - 支撑这些发布项目的 ATM 系统集成商与独立保障承包商
  buyingProcess: 当某个现代化里程碑、空域程序调整，或供应商推动的软件升级，让当前手工保障流程在进度和安全评审上都显得过于冒险时，采购就会启动。冠军用户通常是验证负责人或发布经理；真正拍板预算的，则多半是工程保障负责人、验证总监或现代化项目高管。与此同时，集成商、安全评估方、采购和安全审查团队会一起决定首单究竟是直签，还是借渠道落地。
product:
  mvp: MVP 应该以只读方式接入首个客户的需求库、源码管理、测试证据和缺陷跟踪器；把每个候选改动映射到受影响需求和风险点；推荐一组聚焦的回归测试；再导出一份带来源留痕和人工签署步骤的评审就绪保障包。它不该一开始就做自动审批、替换广泛的仓库体系，或深入写回，至少在一条真实发布周期里赢得信任前不该这样做。
  sixMonth: 为一个共创客户上线一条可用于生产的子系统工作流，覆盖 diff 到需求映射、证据缺口识别、回归建议和安全评审包导出。
  twelveMonth: 把首套连接器打成标准包，让 2-3 个试点转成年度合同，并在同一条证据主干上加上组合级报表和第二条发布工作流，例如周期性补丁或流程变更升级。
  twentyFourMonth: 在欧洲支撑 6-8 个正式生产项目，建立跨发布的保障周期压缩基准，并把产品封装好，准备有选择地扩到相邻的受监管地面软件领域。
  keyBets:
  - 一组有限的连接器就足以覆盖欧洲滩头市场的大多数首批部署，让交付保持可复制。
  - 比起任何自动审批或代码生成流程，人审证据生成会更快得到信任。
  - 只要能明显减少缺失材料、缩短评审准备周期，按项目计的 ROI 就足以支撑每年六位数到低七位数的 ACV。
  - ATM 里的参考客户后续能把产品带进相邻的受监管软件市场，而不用重建整条证据主干。
gtm:
  wedge: 把一个付费试点卖进正在进行的 ATM 子系统升级：验证负责人必须在固定安全评审门槛前，重新生成追溯和回归证据。
  channels:
  - 创始人亲自面向 ANSP 和集成商的保障负责人销售
  - 与 ATM 系统集成商联合销售并合作实施
  - 和验证 / 安全保障咨询方做转介绍与交付合作
  funnelTargets: 目标账户→合格试点 25-35%，合格试点→付费试点 30-40%，付费试点→年度生产合同 50%+，正式部署→12 个月内扩到第二工作流或第二子系统 50%+。
  pricing: 针对一个活跃子系统升级先收付费试点费，之后可抵扣成按活跃安全关键软件项目和受治理变更包数量计价的年度平台许可，再叠加实施与集成费用。相比按席位收费，这种方式更贴合买方由发布节点触发的预算逻辑。
businessModel:
  revenueStreams:
  - 按活跃受监管软件项目收年度订阅费
  - 付费实施、集成和工作流模板配置
  - 面向跨项目报表的高级分析与审计导出模块
  unitOfValue: 处在治理之下、会持续产出变更包的活跃安全关键软件项目
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一个子系统升级扩到同一 ANSP 或集成商账户里的更多发布和基线
  - 增加跨项目分析、基准报表和更深的证据模板库
  - 在 ATM 验证跑通后，把同一套保障工作流扩到相邻的受监管遗留软件行业
strategyMap:
  northStarMetric: 通过平台发出的正式 ATM 发布次数——要求每次都带着完整、可直接进评审的证据包，而且保障准备时间更短
  inputMetrics:
  - 签下的付费试点数量
  - 从启动到首个变更包被接受所需天数
  - 试点转年度生产合同的转化率
  - 正式评审前发现的平均缺失证据项数
  - 已经在生产中复用的连接器与保障模板包数量
  moatsToBuild:
  - 把需求、代码改动、测试、问题单和评审决策连起来的跨工具证据图谱
  - 类 DO-278A 与 ATM 专用的发布包模板、异常理由库
  - 围绕遗留 ATM 仓库、SWIM 风格集成和发布治理模式沉淀的部署知识
  killCriteria:
  - 聚焦销售 12 个月后，付费共创客户仍少于 2 家
  - 前 3 个客户里，从部署到首个变更包被接受的中位时间仍高于 12 周
  - 试点客户把产品当一次性服务，不愿转成年度平台合同
  mermaid: |
    flowchart LR
      Wedge[ATM release-assurance wedge] --> MVP[Read-only change-package MVP]
      MVP --> Proof[Trusted evidence packs and pilot conversion]
      Proof --> Expansion[More releases, more programs, adjacent regulated sectors]
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点真实、买方紧迫感也可信，但在一个高度集中的市场里，只有当公司证明自己能直接拿到预算，并把集成做成可复制流程，判断才会抬高。
    whyBelieve: 这家创业公司抓住的是一个关键任务工作流：截止日明确、今天就有大量手工劳动，而且还没有哪个现有厂商显然已经吃下整条“从 diff 到评审包”的流程。
    whyDoubt: 同样因为滩头市场太集中，采购慢、对集成商依赖重，而且套件厂商或服务公司确实有机会把这块切口先吞掉一部分。
    nextDiligence: 下一步最关键的验证，是在真实 ATM 升级里拿下两个付费试点，且至少有一个在首个被接受的发布周期后转成持续性的年度项目合同。
  firstCustomer:
    title: 欧洲 ATM 现代化项目里的验证负责人
    profile: 一家欧洲 ANSP 或 ATM 集成商，正在固定运行发布日期下升级某个安全关键地面软件子系统，仓库体系割裂，而且评审包仍靠手工准备。
    trigger: 董事会批准的现代化里程碑、流程调整或供应商推动的软件升级，逼着团队必须在硬截止前重建追溯和回归证据。
    buyer: 工程保障负责人或验证总监
    initialContract: 首个子系统发布的付费试点合同约为 $150k-$250k；如果产品成了标准保障层，再转成约 $750k-$1.2M 的年度项目许可，并另收实施与集成费。
  mustBeTrue:
  - 至少 30% 的目标欧洲 ATM 项目，会把发布保障材料拼装视为一个独立的采购问题，而不只是通用 ALM 的附属开销。
  - 一层只读叠加系统就能在不替换现有生命周期或验证系统的前提下，交付一个被接受的首个变更包。
  - 试点项目愿意按研究里假设的项目级 ACV 水平，转成持续性年度合同。
  - 存在一套足够小的连接器组合，让前三个部署更像产品化交付，而不是重服务项目。
  - 在公司建立参考客户和可复用模板前，集成商、验证厂商和 ATM 现有厂商不会先把这个切口抹平。
  diligenceQuestions:
  - 前 10 个欧洲 ANSP 与集成商目标客户里，主流仓库组合到底是什么？
  - 在一个活跃的 ATM 升级项目里，发布保障工具预算到底由谁控制：ANSP 保障负责人、集成商，还是现代化项目办公室？
  - ANSP 会直接购买独立叠加层，还是首批交易必须经由集成商或保障伙伴渠道？
  - 每次发布评审目前到底要消耗多少手工劳动和顾问支出？
  - 为什么 IBM、Parasoft、Rapita、Frequentis、Thales 或服务型流程，不能把首个客户服务到“够用”为止？
operatingAssumptions:
- assumption: 滩头买家会在大平台换代前，先给一层发布保障叠加系统掏钱，因为眼前截止日比工具整合更急。
  basis: research.yaml
  validationTest: 围绕活跃现代化项目做 12 次买家和伙伴访谈，并在真实发布节点前拿下至少 2 个付费试点。
  decisionImpact: 如果不成立，GTM 必须转向渠道切入，或者换到预算更独立的工作流。
- assumption: 第一版产品只靠接入需求、源码、测试和缺陷系统的只读连接器，就能交付价值。
  basis: idea.yaml
  validationTest: 前 2 个试点不做深度写回，观察是否都能在 12 周内拿出一个被接受的变更包。
  decisionImpact: 如果不成立，产品范围和实施成本都会上升，毛利变差，销售周期也会拉长。
- assumption: 尽管遗留工具割裂，有限的一组连接器仍能覆盖大多数首批欧洲 ATM 客户。
  basis: research.yaml
  validationTest: 画出 10 个合格线索的系统栈，确认至少 70% 共用相同的 4-5 个核心集成。
  decisionImpact: 如果不成立，公司要么进一步收窄 ICP，要么接受更重的服务模式。
- assumption: 在更深自动化出现前，保障负责人和独立评估方就能接受“有人在环”的证据生成。
  basis: research.yaml
  validationTest: 在 3 个试点账户里做治理评审，确认评审人能接受来源留痕、审批控制和导出证据材料，而无需大改。
  decisionImpact: 如果不成立，产品就必须先缩到被动报表，或者更早投入治理与可解释性能力。
- assumption: 集成商和保障伙伴会帮忙分发，因为产品减少的是手工拼包工作，而不是把他们整段角色挤掉。
  basis: operator judgment
  validationTest: 签下 2 份正式伙伴协议，并在 12 个月内让至少 25% 的合格管道来自伙伴。
  decisionImpact: 如果不成立，业务就得更长时间依赖创始人直销，招聘也该向企业销售而不是伙伴拓展倾斜。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 访谈活跃欧洲 ATM 项目里的验证负责人和现代化高管。
  hypothesis: 真实发布门槛足够紧，能让买家把保障材料拼装视为一个值得付费的软件问题。
  successMetric: 完成 12 次合格访谈、4 次试点设计会，并发出 2 份付费试点提案。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 梳理滩头市场的连接器与仓库版图
  hypothesis: 第一单不做定制集成，也能靠一小组连接器覆盖大多数目标客户。
  successMetric: 10 个潜在客户的系统图显示，前 4-5 个必需集成里至少有 70% 重合。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 在一个活跃子系统升级上做 concierge 式部署
  hypothesis: 只读影响分析加上变更包导出，就足以交付一个被客户人工评审接受的评审就绪变更包。
  successMetric: 1 个试点发布拿到被接受的变更包，且没有关键来源缺口。
  owner: 保障产品负责人
- horizon: 90-180 天
  experiment: 测试试点到年度合同的转化
  hypothesis: 如果首个发布周期能明显压缩保障准备时间，买家就会在下一次升级里把产品标准化。
  successMetric: 至少 1 个试点在首个发布被接受后 90 天内转成 12 个月合同。
  owner: 创始人/CEO
- horizon: 6-12 个月
  experiment: 联合 1 家 ATM 集成商和 1 家验证咨询方启动伙伴渠道
  hypothesis: 精选伙伴既能加快信任建立和客户接入，又不会把公司拖进每单都要重做的定制项目。
  successMetric: 拿下 2 个活跃伙伴，并通过伙伴拿到至少 3 个合格机会。
  owner: 创始人/CEO
- horizon: 12-18 个月
  experiment: 在现有客户里扩出第二条工作流
  hypothesis: 同一条证据主干可以支撑周期性补丁、流程变更发布或相邻子系统升级，而不需要太多新增工程。
  successMetric: 1 个生产客户采用第二条工作流，新增定制工程少于 20%。
  owner: 产品负责人
operations:
- 维护受控的保障模板库，覆盖发布包、异常原因、评审角色和导出格式，并与现有 ATM 评审结构对齐。
- 每次部署都要经过安全、权限控制和来源留痕评审，因为产品会碰到与安全相关的工程证据。
- 把人留在审批回路里，并记录每条建议、缺失提醒和自动生成材料背后的源证据。
- 每次部署后都复盘发布周期时长、缺链率和评审覆盖模式，用来继续打磨模板和销售论据。
team:
- role: 创始人/CEO
  startTiming: Month 0
  rationale: 亲自负责创始人主导销售、试点界定和早期伙伴拓展，因为买家非常集中，而且信任门槛高。
- role: 创始工程师
  startTiming: Month 0
  rationale: 尽快把证据图谱、连接器框架、来源控制和导出流水线搭起来，支撑共创客户。
- role: 保障产品负责人
  startTiming: Month 1
  rationale: 把 ATM 保障工作流抽成可复用模板，同时顶住大客户定制需求，把范围守住。
- role: 解决方案工程师
  startTiming: Month 4
  rationale: 接手集成和客户实施，避免创始团队永久变成服务团队。
- role: 企业销售 / 伙伴负责人
  startTiming: Month 10
  rationale: 只有等至少一个试点转正、直销和渠道打法更清楚后，才加销售产能。
milestones:
- horizon: 0-12 个月
  items:
  - 拿下 2 家欧洲 ATM 滩头市场付费共创客户。
  - 在一个活跃子系统升级上交付 1 个被接受的发布包。
  - 至少 1 个试点转成 12 个月年度合同。
  - 把核心 ICP 的首套连接器与保障模板包标准化。
- horizon: 12-24 个月
  items:
  - 在 ANSP 和集成商账户里做到 4-6 个正式生产项目。
  - 在同一条证据主干上上线第二条可复用发布工作流。
  - 建立 2-3 条活跃的集成商或保障伙伴渠道。
  - 发布关于保障准备时间缩短和缺失材料下降的基准证据。
- horizon: 24-36 个月
  items:
  - 做到 6-8 个正式生产项目，并朝研究里的 $6.0M SOM 场景推进。
  - 从第一个子系统切口扩到参考客户账户里更广的 ATM 发布组合。
  - 把产品封装好，准备第一次走出 ATM、进入相邻受监管软件领域。
risks:
- risk: 遗留仓库太碎，部署过于定制化，导致首个价值点来得太慢。
  likelihood: High
  impact: High
  mitigation: 把首批 ICP 限制在工具栈高度重合的客户上，先做只读连接器，凡是需要大范围定制接入的边缘案例一律不接。
- risk: 公共部门和集成商主导的采购过慢，导致付费试点迟迟落不下来。
  likelihood: High
  impact: High
  mitigation: 盯住那些有硬截止日的现代化里程碑来卖；凡是集成商或保障伙伴已经控制入口的场景，就借他们进去。
- risk: 保障负责人不信 AI 辅助影响分析和自动生成的证据包。
  likelihood: Medium
  impact: High
  mitigation: 人工审批必须保留；每一条关联都展示来源；产品定位成证据拼装和异常识别，而不是自动替人决策。
- risk: ALM、验证或 ATM 平台现有厂商补上相邻功能，削弱差异化。
  likelihood: Medium
  impact: Medium
  mitigation: 赢在部署最快、厂商中立，以及把“从 diff 到评审包”整条流程做全，而不是比谁仓库覆盖更广。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3-5M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要撑 18 个月：拿下 2-4 家付费共创客户，做出核心证据图谱和连接器包，补齐生产可用所需的治理能力，并在扩招销售前证明试点能稳定转成年费合同。
