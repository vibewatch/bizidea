modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Accounts["Target ATM programs"] --> Pilots["Paid pilots"]
      Pilots --> Production["Production programs"]
      Production --> Expansion["More workflows / baselines"]
      Production --> Revenue["Program revenue"]
      Expansion --> Revenue
      Revenue --> GrossProfit["Gross profit"]
      GrossProfit --> Cash["Cash / runway"]
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by converting two paid pilots into five production programs by Q4Y2 and then expanding
    to eight live programs at roughly $750K annual value by Q4Y3.
- checkName: Must go right
  finding: Connector reuse and partner-assisted access must keep deployments productized enough for gross margin to rise from
    50% in Y1 to 70% in Y3.
- checkName: Model breaks if
  finding: The biggest cash-risk condition is a longer procurement and pilot-to-production cycle, which cuts Y3 revenue by
    roughly $0.9M and compresses the cash floor below the planned buffer.
- checkName: Next-round proof
  finding: The next financing is justified once the company reaches about five production programs, a repeatable second workflow,
    and credible partner pull-through rather than only bespoke pilot revenue.
sanityChecks:
  ruleOf40: Y3 growth 124.3% + EBITDA margin 3.2% = 127.5%
  burnMultiple: Y2 burn multiple about 0.5x (-$1001.2K EBITDA on $1931.3K net new revenue), improving to positive EBITDA in
    Y3.
  revenuePerFte: $434.7K Y3 using 11 year-end FTE (benchmark $200–400K SaaS); slightly above benchmark but plausible for high-ACV
    program sales.
  flags:
  - Base case depends on five European production programs by Q4Y2 in a concentrated market where one slipped procurement
    can materially change runway.
  - Gross margin only reaches target if read-only connectors and assurance templates stay reusable rather than becoming bespoke
    professional services work.
  - 'The Y3 revenue concentration is high: eight programs represent essentially all of the modeled base case, so retention
    and expansion assumptions matter more than logo volume.'
