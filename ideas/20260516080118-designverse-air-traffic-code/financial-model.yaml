assumptions:
- id: A1
  name: Opening cash from seed close at model start
  value: '3400.0'
  unit: USDK
  source: '[BP fundingAsk targetFundingRangeUsd $3-5M] model uses a $3.4M seed close at the low-midpoint to reach the Q4Y2
    milestone plus 6 months of buffer.'
- id: A2
  name: Starting customers (M1)
  value: '0'
  unit: count
  source: '[BP executiveSummary + milestones] business starts pre-revenue and wins first paid pilot only after initial product
    setup.'
- id: A3
  name: Y1 customer ramp
  value: 2 paying programs by M12
  unit: count
  source: '[BP milestones 0-12 months] close 2 paid design partners and convert 1 pilot into an annual contract by year-end;
    monthly timing smoothed to M6 and M9 closes.'
- id: A4
  name: Y2 customer ramp
  value: 5 production programs by Q4Y2
  unit: count
  source: '[BP milestones 12-24 months] target is 4-6 production programs; base case uses midpoint-high end of 5.'
- id: A5
  name: Y3 customer ramp
  value: 8 production programs by Q4Y3
  unit: count
  source: '[BP milestones 24-36 months] explicit target is 6-8 production programs and progress toward the researched $6.0M
    SOM; base case uses the high end of 8.'
- id: A6
  name: Pilot-year blended annual revenue per active program
  value: '240.0'
  unit: annualK
  source: '[BP investorMemo firstCustomer initialContract $150k-$250k] base case uses the midpoint and recognizes it over
    the active pilot period.'
- id: A7
  name: Y2 blended annual revenue per active program
  value: '550.0'
  unit: annualK
  source: '[BP pricing + investorMemo annual program license $750k-$1.2M] Y2 blends converted annual contracts with newer
    pilots and onboarding fees below mature steady-state pricing.'
- id: A8
  name: Y3 mature annual revenue per active program
  value: '750.0'
  unit: annualK
  source: '[BP investorMemo annual program license $750k-$1.2M and research SOM $6.0M] 8 programs at $750k year-end ARR matches
    the lower bound of the researched production-license range and the SOM framing.'
- id: A9
  name: Gross margin path
  value: 50% Y1, 60% Y2, 70% Y3
  unit: percent
  source: '[BP businessModel targetGrossMarginPct 70 + operatingAssumptions] startup-finance heuristic assumes early deployments
    are implementation-heavy before connector reuse improves margin.'
- id: A10
  name: Monthly logo churn for unit economics
  value: '1.5'
  unit: percent
  source: '[BP pricing per-program annual license + concentrated regulated workflow] startup-finance heuristic for sticky
    but procurement-heavy enterprise infrastructure contracts.'
- id: A11
  name: Loaded founder / CEO compensation
  value: '210.0'
  unit: annualK
  source: '[BP team Founder/CEO] startup-finance heuristic for seed-stage founder cash compensation plus payroll burden.'
- id: A12
  name: Loaded engineering compensation
  value: '200.0'
  unit: annualK
  source: '[BP team Founding eng] startup-finance heuristic for senior infrastructure engineer plus payroll burden.'
- id: A13
  name: Loaded assurance product compensation
  value: '190.0'
  unit: annualK
  source: '[BP team Assurance product lead] startup-finance heuristic for domain-heavy product lead with aviation assurance
    expertise.'
- id: A14
  name: Loaded solutions implementation compensation
  value: '180.0'
  unit: annualK
  source: '[BP team Solutions engineer] startup-finance heuristic for implementation-heavy enterprise solutions engineer plus
    burden.'
- id: A15
  name: Loaded sales / partnerships compensation
  value: '230.0'
  unit: annualK
  source: '[BP team Enterprise seller / partner lead] startup-finance heuristic for one senior enterprise seller with partner
    duties and burden.'
- id: A16
  name: Loaded customer success / ops compensation
  value: '150.0'
  unit: annualK
  source: 'Startup-finance heuristic: first post-sale program manager / customer success operator added only after multiple
    production programs are live.'
- id: A17
  name: Loaded G&A compensation
  value: '140.0'
  unit: annualK
  source: 'Startup-finance heuristic: lean finance / admin support hire after repeatable production deployments emerge.'
- id: A18
  name: Hiring sequence
  value: Founder, founding engineer, and assurance product lead active at start; solutions in Q2Y1; first enterprise seller
    in Q4Y1; second engineer in Q1Y2; G&A in Q2Y2; second seller in Q3Y2; second solutions hire in Q4Y2; customer success
    in Q2Y3; third engineer in Q3Y3
  unit: schedule
  source: '[BP team + strategicChoices sequencingRationale] implementation and productization come before scaled sales; later
    additions are quarterly smoothing heuristics.'
- id: A19
  name: Y1 departmental opex pattern
  value: 72K/month in Q1Y1, 88K/month in Q2Y1, 93K/month in Q3Y1, 121K/month in Q4Y1
  unit: USDK
  source: '[BP operations + fundingAsk useOfFundsSummary] startup-finance heuristic for lean seed-stage cloud, travel, legal,
    and security overhead around two pilots.'
- id: A20
  name: Y2 quarterly opex pattern
  value: 480K, 540K, 600K, 660K
  unit: USDK per quarter
  source: '[BP milestones 12-24 months + operatingAssumptions] non-payroll spend rises with more connectors, governance work,
    partner enablement, and production support.'
- id: A21
  name: Y3 quarterly opex pattern
  value: 750K, 780K, 810K, 855K
  unit: USDK per quarter
  source: '[BP product twentyFourMonth + research SOM] spending grows more slowly than revenue as deployments reuse the same
    assurance template spine.'
- id: A22
  name: Revenue recognition method
  value: Average active programs in period × annualized ARPU for that stage
  unit: formula
  source: '[BP pricing by active program] modeling convention to reconcile customer counts with pilot-to-production revenue
    without a separate cohort schedule.'
- id: A23
  name: Steady-state CAC
  value: '280.0'
  unit: USDK
  source: '[BP gtm founder-led direct + integrator co-sell motion] startup-finance heuristic for concentrated, long-cycle,
    safety-critical enterprise sales.'
- id: A24
  name: Funding ask sizing rule
  value: Reach Q4Y2 milestone plus 6 months of buffer
  unit: policy
  source: '[BP fundingAsk runwayMonths 18] extended by the financial-model requirement to include 6 months of additional buffer
    before the next financing.'
- id: A25
  name: Cash flow simplification
  value: Ending cash = opening cash + cumulative EBITDA
  unit: formula
  source: 'Startup-finance heuristic: assume minimal working-capital swings, capex, and debt for a software-first seed company.'
