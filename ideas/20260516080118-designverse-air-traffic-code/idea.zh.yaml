jobsToBeDone:
- job: 当我的 ATM 团队准备做一次软件升级时，帮验证负责人证明哪些需求和测试会受影响，这样他们就不用手工重建追溯，也能拿到可直接进评审的材料。
  currentAlternative: 手工追溯矩阵、表格版影响分析，以及顾问主导的评审准备
  successMetric: 每个变更集拼出一份发布证据包所需的时间
- job: 当现代化里程碑临近时，帮项目经理看清哪些保障证据还缺着，这样他们能在部署日期失守前先过掉安全评审。
  currentAlternative: 状态会、静态 ALM 导出，以及后期文档审计
  successMetric: 因证据缺失或回归覆盖不完整导致的评审周期延误下降幅度
