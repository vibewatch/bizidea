problem: 空中导航服务提供商和 ATM 系统集成商，至今还在几十年历史、监管极重的代码库里发版本。这里每一次改动，都可能碰到管制员工作流、航班数据处理或安全论证。真正痛的，不只是把代码写出来，而是要在工程、QA 和独立保障团队之间，重新拼出需求追溯、回归证据、评审材料和签署留痕。通用 AI 编码工具也许能加快改动速度，却保不住监管方和运营方要看的证据链。结果就是，现代化项目一头卡在遗留系统的交付速度，一头卡在高得难以接受的验证负担上。
targetUser:
  primary: 正在改造飞行运行软件的欧洲空中导航服务提供商与 ATM 系统集成商中的软件保障和验证负责人
  secondary: 负责监管空管系统受监管软件发布的独立安全评估人员与项目经理
  buyer: 工程保障负责人、验证总监，或负责 ATM 现代化项目的项目高管
startupThesis:
  nonObviousInsight: 受监管软件里跑出来的大公司，赢法不会是多生成一点代码，而是把可被信任的变更证据生成得足够快，让关键任务团队能在不打断认证和安全评审流程的前提下改造遗留系统。真正的变化在于：AI 驱动开发现在已经可信到能进 EUROCONTROL 这样的买方，但代码改动速度一上来，保障瓶颈也随之变得更急。
  beachhead: 正在升级飞行数据处理、管制员 HMI 或决策支持软件的欧洲 ANSP 与 ATM 系统集成商；这些团队在上线前必须证明需求到代码的可追溯性和回归覆盖完整。
  wedge: 一层变更保障系统：把每次代码 diff 映射到受影响的需求，提出聚焦的回归测试，标出缺失证据，并为人工审批拼好一份安全评审包。
  whyNowCatalyst: DesignVerse 新近融资，加上已在 EUROCONTROL 落地，说明 AI 工具已经越过门槛，进入关键任务软件项目。代码改动既然在加速，市场就马上需要能把这些改动变得可审计、可评审的产品。
  ventureScalePath: 先从空管现代化项目切入，再把同一套保障工作流扩到铁路信号、电网控制软件、医疗器械软件等其他受监管的遗留代码库行业。
solution: 产品接入空管软件项目正在使用的需求库、源码管理、测试系统和缺陷跟踪器。每次有人提变更，它先识别受影响的子系统，把 diff 连到相关需求和风险点，建议最小回归集，并在发起发布评审前把缺的证据先挑出来。工程师不用再手工重做追溯矩阵和评审材料，系统会直接生成一份可审计的变更包，里面带有原因说明、测试引用、评审任务和可导出的材料，供内部安全委员会或外部评估方使用。审批和发布仍然由人拍板，但团队不用再把稀缺的验证人力耗在堆文档和猜覆盖率上。
goToMarketSeed:
  firstCustomer: 一家欧洲 ANSP 或 ATM 系统集成商，正在为某个区域管制中心做一项为期 12-24 个月的飞行数据处理或管制界面软件升级，同时面临一个固定的安全评审截止日。
  buyingTrigger: 董事会批准的现代化里程碑、空域程序调整，或供应商推动的软件升级，逼着团队必须在刚性的运行时间表里重建追溯和回归证据。
  currentAlternative: 用 Excel 或 DOORS 手工维护追溯矩阵，配合通用 ALM 套件、自研脚本和外部验证顾问手动拼评审包。
  switchingReason: 这套切口能把几周的保障准备压缩成可重复流程，让资深验证工程师去盯异常而不是堆纸面材料，同时又不要求买家接受未经核验的 AI 生成代码。
  pricingHypothesis: 按活跃安全关键软件项目收取年度平台费，另加仓库集成的实施费；受治理的变更包数量越大，定价越高。
