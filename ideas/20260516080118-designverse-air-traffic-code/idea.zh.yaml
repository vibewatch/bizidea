differentiator: 面向受监管环境的大多数开发工具，要么帮工程师更快写代码，要么在事后帮合规团队存档。这个公司卡住的是中间那层空白：在发布前，把代码 diff、需求、测试和评审证据连起来的在线变更保障工作流。它的护城河会随着子系统级的追溯模板、评审行为数据，以及跨关键任务升级项目积累出的证据生成模式不断变厚。
