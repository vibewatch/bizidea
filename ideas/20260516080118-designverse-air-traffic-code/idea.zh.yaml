topRisks:
- name: 企业销售周期长
  description: ANSP 和关键任务集成商采购很慢，销售和部署节奏可能远远长于典型 SaaS 的假设。
  mitigation: 先在一个高风险子系统升级里落地，再借集成商伙伴推进，并把首个产品定位成范围明确的保障加速器，而不是平台替换。
- name: 遗留系统集成拖慢落地
  description: 需求、代码和测试证据往往散落在割裂甚至私有的遗留系统里，很难干净接通。
  mitigation: 先做只读连接器，优先接最常见的仓库；自动化覆盖不到的地方留人工复核节点。
- name: 信任与责任边界
  description: 如果产品漏掉了必须追溯的项，或者给出的证据站不住脚，买方可能直接把它排除在任何安全相关流程之外。
  mitigation: 把人留在审批回路里，清楚展示证据来源，第一阶段只做评审准备的决策支持，不做自动发布审批。
