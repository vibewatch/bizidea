scenarios:
  downside:
    description: 品类成形更慢，pilot 转年度订阅的节奏后移，telemetry 和多项目扩展挂接得也比计划晚。
    y3RevenueK: 2080.0
    y3EbitdaK: -290.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
    - Q4Y3 的活跃付费项目约为 8 个，而不是 11 个。
    - 由于 onboarding 和 telemetry 挂接更慢，每个活跃项目的混合年价值比基准低约 10%。
    - 毛利率收在约 68%，pilot 转年度订阅的转化率则落到 40% 多。
  base:
    description: 公司在 Y1 拿下 3 个付费共创项目，完成 2 个年度合同转化，在不增加完整销售团队的前提下，到 Q4Y3 把活跃付费项目做到 11 个。
    y3RevenueK: 2972.0
    y3EbitdaK: 48.7
    cashLowPointK: 772.3
    keyAssumptionChanges:
    - M12 达到 3 个活跃付费项目，Q4Y2 达到 7 个，Q4Y3 达到 11 个。
    - 每个活跃项目的成熟混合年价值逐步逼近研究测算的约 $300K SOM 水平。
    - 只有等 toolchain 复用和校准工作流压缩掉定制服务后，毛利率才进入低 70% 区间。
  upside:
    description: 合作方访问权限更早到位，telemetry 模块挂接更快，每个 logo 也更早拿下额外项目。
    y3RevenueK: 3560.0
    y3EbitdaK: 390.0
    cashLowPointK: 930.0
    keyAssumptionChanges:
    - Q4Y3 的活跃付费项目约为 13 个，而不是 11 个。
    - 随着 telemetry 和跨厂商比较模块挂接，每个活跃项目的混合年价值比基准高约 8%。
    - 由于集成标准化提前 1-2 个季度完成，毛利率大约能做到 74%。
sensitivity:
- variable: ARPU
  downsideCase: 每个活跃项目的混合年价值比计划低约 10%。
  baseCase: 成熟后的单项目价值接近每年约 $300K。
  upsideCase: telemetry 和多项目扩展把成熟单项目价值抬到比计划高约 8%-10%。
  y3RevenueImpactK: -297.2
  cashImpactK: -210.0
- variable: CAC
  downsideCase: 合作伙伴转介绍不及预期，实际 CAC 升到约 $145K。
  baseCase: 依靠创始人主导和合作伙伴带单，CAC 维持在约 $121K。
  upsideCase: 设计服务公司和 IP 转介绍把 CAC 压在约 $100K。
  y3RevenueImpactK: -120.0
  cashImpactK: -220.0
- variable: 流失率
  downsideCase: 因为部分项目在 tapeout 后没有续到 telemetry 或下一轮 accelerator 周期，月度流失率升到约 3.5%。
  baseCase: 一旦 replay 工作流嵌进评估流程，月度流失率稳定在约 2.5%。
  upsideCase: 重复采购的 OEM 把产品当成常设 go/no-go 层，月度流失率维持在约 1.8%。
  y3RevenueImpactK: -170.0
  cashImpactK: -140.0
- variable: 销售周期
  downsideCase: pilot 转年度订阅的周期从约 90 天拉长到约 150 天。
  baseCase: 一次成功的 pilot 足以在一个季度内签下年度项目合同。
  upsideCase: 随着合作方集成和买家口碑到位，决策周期压缩到约 60 天。
  y3RevenueImpactK: -430.0
  cashImpactK: -280.0
- variable: 毛利率
  downsideCase: 由于 replay 搭建和 toolchain 工作长期保持定制化，毛利率停在约 68%。
  baseCase: 等工作流标准化后，Q4Y3 毛利率做到约 72%。
  upsideCase: 随着可复用集成更快落地，毛利率做到约 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -180.0
- variable: 招聘节奏
  downsideCase: 在利用率被证明之前，就把两个规模化岗位提前了两个季度招进来。
  baseCase: 招聘按业务计划里创始人主导、交付优先的节奏展开。
  upsideCase: 最后一名工程师推迟到 Q4Y3 之后再招，也不影响交付质量。
  y3RevenueImpactK: 50.0
  cashImpactK: -190.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      TargetAccounts[Target OEMs and AI appliance vendors] --> PaidPilots[Paid pilots]
      PaidPilots --> AnnualPrograms[Annual program subscriptions]
      AnnualPrograms --> Telemetry[Telemetry and cross-vendor modules]
      Telemetry --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
- checkName: 收入引擎
  finding: 基准情景的收入引擎，是把活跃付费项目数从 Y1 期末的 3 个推到 Q4Y3 的 11 个，同时让成熟单项目价值逼近研究测算的约 $300K 年化 SOM 水平。
- checkName: 必须跑对的环节
  finding: 前两个 pilots 必须顺利转成年订阅，而且至少两条 toolchain 集成要可复用到让一支以 solutions 为主的团队，能在 Q4Y2 支撑 7 个活跃项目而不把毛利压垮。
- checkName: 模型会在哪儿坏掉
  finding: 如果销售周期拖向 150 天、或者毛利率长期压在 68% 以下，下行情景会在公司拿到下一轮证明之前，把现金底部推到大约 $0.25M。
- checkName: 下一轮证明点
  finding: 下一轮融资要讲的故事，是到 Q2Y2 左右做到 5 个活跃付费项目、完成 2 个年度转化、拿下 2 条可用集成，并初步证明 replay 精度能稳在 15%-20% 的误差带内。
sanityChecks:
  ruleOf40: Y3 增长 95.0% + EBITDA 利润率 1.6% = 96.6%
  burnMultiple: Y2 的 burn multiple 约为 0.5x：约 $0.58M 的 EBITDA 消耗，对应约 $1.12M 的净新增 ARR；Y3 下半年接近盈亏平衡。
  revenuePerFte: 按 Y3 期末 9 名 FTE 计算，人均收入约为 $330K（对比 SaaS 基准 $200K-$400K）。
  flags:
  - 基准情景到第 3 年做到了 11 个活跃付费项目，而研究测算的第 3 年 SOM 也只有 12 个项目，说明在初始滩头市场里几乎没有转化失手空间。
  - customersEop 统计的是活跃付费 accelerator 项目，而不是独立 logo 数，所以模型早中期的客户分散度会比表面看起来更弱。
  - 毛利率只有在 simulator 访问、onboarding 和校准工作流真正标准化后，才摸得到 70% 目标；如果长期保持定制化，EBITDA 会一直被压在负区间。
  - Y4 之前不加专职 AE，所以创始人和合作伙伴负责人的带宽，会成为销售周期下行情景里的真实瓶颈。
  - 现金按 EBITDA 建模；如果合作伙伴的 minimum-commit 费用、递延收入节奏或实验室设备 capex 更重，实际低点可能会来得更早。
