slug: semi-custom-gpu-assurance
date: '2026-07-03'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-03] 运营模型从这份业务计划日期之后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / 种子前轮募资额
  value: $2.2M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景取已声明 pre-seed 区间的下限，因为付费 pilot 能部分对冲 burn，同时在 18 个月证明里程碑之外仍留出约 6 个月缓冲。'
- id: A3
  name: 期初活跃付费项目数
  value: '0'
  unit: count
  source: '[BP milestones 0-12 months + BP experimentRoadmap] 公司从零收入起步，得先拿下付费共创客户。'
- id: A4
  name: 活跃付费项目定义
  value: 围绕单个活跃 accelerator 评估项目签下的付费 pilot 或年度订阅。
  unit: definition
  source: '[BP businessModel.unitOfValue active accelerator evaluation program + BP businessModel.revenueStreams] customersEop 统计的是付费项目数，而不是独立 logo 数。'
- id: A5
  name: 付费 pilot 经济模型
  value: $100K，周期约 2 个月（约 $50K / 月）
  unit: USD/program
  source: '[BP investorMemo.firstCustomer.initialContract low-six-figure pilot + BP gtm.wedge six-week assurance project] 模型采用低六位数 pilot 定价区间的下沿。'
- id: A6
  name: 年度合同与附加模块经济模型
  value: 首年年度合同约从 $240K ARR 起步；随着 onboarding 和 telemetry 模块挂上去，到 Y3 每个活跃项目的混合年度价值接近 $300K。
  unit: USD/program/year
  source: '[BP investorMemo.firstCustomer.initialContract $200k-$350k annual per active program + Research market.som 12 active programs at roughly $300k blended annual value] 终局定价保持在业务计划区间内，也低于研究测算的 SOM 上限。'
- id: A7
  name: 客户爬坡
  value: M12 达到 3 个活跃付费项目，Q4Y2 达到 7 个，Q4Y3 达到 11 个。
  unit: customersEop
  source: '[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] 基准情景对齐第 1 年的 2-3 个付费共创客户、第 2 年的 6-8 个活跃项目，并在第 3 年略低于研究测算的 12 个项目 SOM。'
- id: A8
  name: 收入确认惯例
  value: 期末活跃付费项目数 × 当期每个活跃项目实现的混合收入。
  unit: formula
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] 这样每个期间的收入都能直接回勾到 customersEop 和定价组合。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 50%-58%，Y2 为 62%-68%，Y3 为 69%-72%。
  unit: gross margin percent
  source: '[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + Research reportMemo executiveTakeaways] 早期 pilots 服务成分更重，只有等集成和校准工作流逐步标准化，毛利率才能摸到目标值。'
- id: A10
  name: 招聘时间线
  value: M1 创始人和创始工程师；M2 编译器 / 性能工程师；M4 解决方案工程师；M10 产品 / 合作伙伴负责人；M16 第二名工程师；M23 运营 / 合规；M29 第二名解决方案工程师；M31 第三名工程师。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘重心先放在产品和交付上，由创始人主导销售，匹配这个狭窄滩头市场。'
- id: A11
  name: 创始人全成本薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Founder / GM + startup-finance heuristic] 采用精简的创始人现金薪酬，加上 payroll taxes 和 benefits。'
- id: A12
  name: 平台 / 集成工程师全成本薪酬
  value: $220K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 反映资深基础设施与系统人才的价格，但不按上市公司现金包来算。'
- id: A13
  name: 编译器 / 性能工程师全成本薪酬
  value: $240K
  unit: USD/year
  source: '[BP team Compiler and performance engineer + startup-finance heuristic] 这类 silicon-performance 人才比通用 SaaS 工程师更贵。'
- id: A14
  name: 解决方案工程师全成本薪酬
  value: $170K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] 覆盖安全 on-prem 部署、trace capture 和客户交付责任。'
- id: A15
  name: 产品 / 合作伙伴负责人全成本薪酬
  value: $190K
  unit: USD/year
  source: '[BP team Product and partnerships lead + BP gtm.channels + startup-finance heuristic] 包含战略合作方管理和早期产品化工作。'
- id: A16
  name: G&A / 运营全成本薪酬
  value: $120K
  unit: USD/year
  source: '[BP operations export-control, NDA, and partner-access process + startup-finance heuristic] 覆盖精简的财务、法务协同与合规运营。'
- id: A17
  name: 薪酬分摊到损益表科目
  value: 创始人 70% 计入 S&M / 30% 计入 G&A；工程和编译器岗位 100% 计入 R&D；解决方案工程师 50% 计入 S&M / 50% 计入 R&D；产品 / 合作伙伴负责人 60% 计入 S&M / 40% 计入 R&D；G&A 岗位 100% 计入 G&A。
  unit: allocation
  source: '[BP team role rationales + BP operations] 这套分摊把 payroll 映射到运营模型使用的功能性损益表科目里。'
- id: A18
  name: 非薪酬运营支出爬坡
  value: Y1 前期每月的 S&M / R&D / G&A 非薪酬支出分别为 $8K / $12K / $6K，到 Q4Y3 提高到 $15K / $18K / $10K。
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 这覆盖 simulation compute、安全基础设施、差旅、法务、保险和 export-control 开销，但不假设已经有规模化的付费获客引擎。'
- id: A19
  name: 现金转换惯例
  value: 现金变动等于 EBITDA。
  unit: formula
  source: '[startup-finance heuristic] 在 pre-seed 阶段，working capital 节奏、融资费用和 capex 相比经营 burn 都被视为次要。'
- id: A20
  name: 稳态月度项目流失率
  value: 2.5%
  unit: percent per month
  source: '[BP businessModel.expansionLevers + startup-finance heuristic for annual B2B infrastructure workflows] 因为单个 accelerator 项目可能在 tapeout 后自然结束，所以这里的 churn 假设比成熟 SaaS 更差。'
- id: A21
  name: 基准销售周期
  value: 从付费 pilot 启动到转成年度订阅，大约 90 天。
  unit: days
  source: '[BP experimentRoadmap 3-6 months first paid pilot + BP experimentRoadmap 6-12 months convert 2 pilots] 模型假设一个季度足够证明 replay 价值并签下后续项目合同。'
- id: A22
  name: CAC 计算惯例
  value: 36 个月总 S&M 支出 ÷ 11 个净新增活跃付费项目。
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm founder-led and partner-led motion] 这个口径捕捉了高度集中的企业获客过程，也不预设后期会迅速扩销售团队。'
- id: A23
  name: 用于确定融资规模的下一轮里程碑
  value: 到大约 Q2Y2，公司应达到 5 个活跃付费项目、完成 2 个年度转化、拿下 2 条可用 toolchain 集成，并启动 first-silicon 校准。
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 0-12 and 12-24 months + BP investorMemo.nextDiligence] 这轮 pre-seed 的规模，是为了跑到 seed-ready 的证明点，同时仍保留约 6 个月现金缓冲。'
- id: A24
  name: 季度薪资滚动惯例
  value: Y2-Y3 的薪资行按季度内真实的月度入职节奏计算，而不是只看年末 headcount 快照。
  unit: convention
  source: '[Headcount column convention + BP team startTiming] 这样 staged hiring ramp 和薪资费用能保持内部一致。'
- id: A25
  name: GTM 人员策略
  value: 直到 Y3，都由创始人和产品 / 合作伙伴负责人主导销售；Y4 之前不新增专职 AE。
  unit: strategy
  source: '[BP strategicChoices.sequencingRationale founder-led sales before a scaled sales team] 这个狭窄滩头市场，还撑不起 3 年模型内更大的直销团队。'
- id: A26
  name: 资金用途分配
  value: 45% 用于工程，27% 用于 GTM，11% 用于 G&A，17% 留作 6 个月缓冲。
  unit: percentage of round
  source: '[BP fundingAsk.useOfFundsSummary + model payroll mix + startup-finance heuristic] 这轮资金主要用来把产品做出来、拿下共创客户，并额外留出一笔明确的现金储备。'
