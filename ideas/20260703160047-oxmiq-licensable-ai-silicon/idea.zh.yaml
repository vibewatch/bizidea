differentiator: 这不是又一个 EDA 套件、compiler，或 chip IP 厂商。公司赢在它吃下了围绕真实客户 workload 的流片前证明工作流：采集、重放、风险打分，再到跨多个可授权 accelerator 供应商的高管决策材料。护城河会随着数据越积越深：哪些 workload 可迁、哪些 kernels 会掉、perf-per-watt 最终跑成什么样，这些跨项目数据单个 IP 厂商和顾问都看不到。
