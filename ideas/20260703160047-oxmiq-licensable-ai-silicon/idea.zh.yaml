jobsToBeDone:
- job: 当 Nvidia 方案把毛利或功耗目标打穿时，帮我们的 silicon 负责人把真实 workload 放到授权 accelerator 栈上重放，好让团队决定这个半定制项目值不值得批预算。
  currentAlternative: 顾问主导的架构研究、Excel 模型和厂商 benchmark。
  successMetric: 在 6 周内做出 go/no-go 决策，并且对兼容性和 perf-per-watt 有足够可信的把握。
- job: 当 tapeout 批准取决于 CUDA 兼容性时，帮我们的 platform 团队在第一颗 silicon 回来前，先把缺失 kernels、memory bottlenecks 和 regression 风险翻出来，避免 bring-up 直接翻车。
  currentAlternative: 零散的 simulator 测试和后期 bring-up 排障。
  successMetric: 至少 90% 的重点生产 workload 在流片前完成验证，首批 silicon 回来后关键 bring-up 阻塞显著减少。
ideaScorecard:
  signalStrength:
    score: 4
    rationale: 两条经核验的 7 月 2 日融资来源、战略投资方背书，以及一条清晰的架构切口，让这个信号足够强，即便它还没有点名客户。
  painIntensity:
    score: 4
    rationale: 半定制芯片项目一旦判断错，几百万美元会直接打水漂，整条 appliance 路线图也会被锁死在错误的成本和功耗曲线上，高管痛感是真实存在的。
  wedgeClarity:
    score: 5
    rationale: 围绕一张 accelerator card 的 6 周流片前 replay 实验室，是一条很窄但很清楚的工作流：买家明确、触发点明确、输出也明确。
  defensibility:
    score: 4
    rationale: 护城河来自跨项目私有 workload traces、portability failure 数据和 simulator 集成；当然，IP 厂商也可能尝试把邻近能力打包进去。
  ventureScale:
    score: 4
    rationale: 如果可授权 accelerator IP 让定制芯片项目数量继续扩大，这层 assurance layer 就能从小众评估工具，长成异构 AI silicon 的标准兼容性系统。
topRisks:
- name: 品类成形太慢
  description: 如果未来两年真正推进半定制 GPU 项目的系统厂商只有寥寥几家，收入释放就会慢于市场成熟速度。
  mitigation: 先抓那些已经在评估一张 accelerator card 的共创客户，再顺手承接更广泛硬件团队基于 emulator 的邻近采购决策。
- name: IP 厂商把能力打包进来
  description: OXMIQ 或其他可授权 IP 厂商，可能把基础兼容性 replay 直接塞进自己的销售动作里，把独立切口越挤越窄。
  mitigation: 坚持 vendor-neutral，横向 benchmark 多家供应商，并把买方侧的决策工作流和 post-silicon telemetry 牢牢抓在自己手里——这些都不是单一 IP 厂商能有公信力做好的。
- name: 仿真保真度不够
  description: 如果流片前 replay 抓不住真实 bring-up 问题，而买家又把输出当成保证书，信任会被一次性打穿。
  mitigation: 把产品定位成可审计的决策支持，明确给出 confidence bands，再用 first-silicon telemetry 持续回标模型。
