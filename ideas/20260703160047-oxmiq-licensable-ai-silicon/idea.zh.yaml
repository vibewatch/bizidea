problem: AI 设备厂商和服务器 OEM 越来越清楚地看到，Nvidia 的 BOM、功耗和路线图依赖，正在把推理系统的利润越压越薄。可授权 GPU IP 让半定制芯片第一次变得像个真选项，但最致命的不确定性也从芯片设计转到了软件：在砸下数百万美元启动芯片项目前，团队没法证明自己真实的 CUDA kernels、model graphs 和 orchestration stack 换到新架构上还能不能跑、能不能打到目标 perf-per-watt。现在大家只能把顾问报告、emulator 跑数和厂商 PPT 东拼西凑，结果评估周期被拖长，坏假设要等到 bring-up 才暴露。
targetUser:
  primary: 一家 200-1,000 人的 AI 设备厂商或服务器 OEM 里，负责 silicon platform 或 inference systems engineering 的负责人，正在评估第一张半定制 accelerator card。
  secondary: 负责在 silicon bring-up 前验证模型和 kernel 兼容性的 compiler、SDK 和 performance 团队。
  buyer: VP Hardware Engineering、AI Systems GM 或 Head of Silicon。
startupThesis:
  nonObviousInsight: 可授权 GPU IP 把定制 AI 芯片这件事，从“怎么设计芯片”改成了“怎么证明工作负载能跑通”。像 OXMIQ 这类厂商把核心架构和兼容层打包好之后，最难的决策就变成：买家手里那组真实 workload，迁过去之后能不能跑、能不能达到 perf-per-watt 目标、值不值得在第一颗芯片还没出来前就为 tapeout economics 买单。
  beachhead: 北美和欧洲的 AI appliance 厂商，向 sovereign cloud 与 Fortune 2000 客户卖 1-8 机架的私有推理集群。现在因为 Nvidia BOM 和功耗预算压垮了毛利目标，它们开始评估第一张半定制 accelerator card。
  wedge: 一个流片前 workload replay 实验室：吃进 CUDA traces、model graphs 和 memory profiles，在可授权 GPU 的 simulator 和 compiler 输出上重放，然后为单个 accelerator 项目给出一份 go/no-go assurance pack。
  whyNowCatalyst: OXMIQ 现在的募资故事很直接：客户可以授权一套 CUDA-compatible GPU IP，不必重开完整芯片项目，也不用重写代码。评估半定制 accelerator 的项目已经开始往前走，但买家手里还没有一层可信的证明工具。
  ventureScalePath: 先从单个半定制 GPU 评估的 assurance layer 做起，再往后扩到 post-silicon bring-up telemetry 和 compiler regression monitoring；如果可授权 GPU、NPU 和 FPGA 项目越跑越多，公司就有机会变成跨厂商的兼容性与 benchmark 事实标准。
solution: 产品接进客户现有的生产推理栈，抓取有代表性的 CUDA kernels、model graphs、batch shapes 和 memory traces。随后把这些 workload 放到 OXMIQ 这类 IP 供应商的 simulator、compiler toolchains 和 emulation targets 上重放，在流片前先把 portability、memory pressure 和预估 perf-per-watt 跑出来。对技术买家，它会点出缺失的 kernels、最可能卡住的 orchestration bottlenecks，以及哪些 workload 仍该留在现有 GPU 上。对高管，它会生成一份 assurance memo，把软件兼容性风险直接挂到 BOM、能耗和项目时间线假设上。首个部署就是围绕一张规划中的 accelerator card，做一次为期 6 周的评估，让客户在扩招 silicon 团队前，先拿到一份足够可信的投决依据。
goToMarketSeed:
  firstCustomer: 首个客户画像是：一家 300-800 人的 AI appliance 厂商，卖的是机架级私有推理系统，手里有一个正在评估中的 2027 accelerator-card 项目，年化 Nvidia 采购额超过 500 万美元，但内部 compiler 团队又没大到足以在流片前证明 CUDA parity。
  buyingTrigger: 下一代推理系统在 Nvidia 方案下打不进目标毛利或功耗包络，管理层于是批准把授权 GPU IP 作为备选路径来评估。
  currentAlternative: Nvidia reference designs、架构顾问、Excel 版 ROI 模型，以及由 silicon 团队和 platform 团队各自分头跑的 simulator/emulator 测试。
  switchingReason: 这个产品让首个客户能在几周内，用真实生产 workload 把兼容性、内存和 perf-per-watt 风险先跑出来，比起只看厂商说法和零散的内部分析，就去拍一个数百万美元的流片决策，胜算高得多。
  pricingHypothesis: 围绕每个活跃 accelerator 项目收取六位数年订阅费；另收 workload capture 的付费 onboarding；第一批 silicon 回来后，再加卖 bring-up 模块。
