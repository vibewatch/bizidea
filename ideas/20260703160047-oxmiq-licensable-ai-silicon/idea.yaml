ideaScorecard:
  signalStrength:
    score: 4
    rationale: >-
      Two verified July 2 funding sources, strategic backers, and a clear
      architectural wedge make the signal strong even without named customers.
  painIntensity:
    score: 4
    rationale: >-
      A bad semi-custom silicon decision can waste millions and lock an
      appliance roadmap to the wrong cost and power profile, creating real
      executive pain.
  wedgeClarity:
    score: 5
    rationale: >-
      A six-week pre-silicon replay lab for one accelerator card is a narrow
      workflow with a specific buyer, trigger, and output.
  defensibility:
    score: 4
    rationale: >-
      Defensibility comes from proprietary cross-program workload traces,
      portability failure data, and simulator integrations, though IP vendors
      can attempt to bundle adjacent features.
  ventureScale:
    score: 4
    rationale: >-
      If licensable accelerator IP expands the number of custom-chip programs,
      the assurance layer can grow from a niche evaluation tool into the
      standard compatibility system across heterogeneous AI silicon.
topRisks:
  - name: Category forms slowly
    description: >-
      If only a handful of system vendors pursue semi-custom GPU programs in
      the next two years, revenue could lag before the market matures.
    mitigation: >-
      Start with design partners already evaluating one accelerator card and
      support adjacent emulator-based procurement decisions for broader hardware
      teams.
  - name: IP-vendor bundling
    description: >-
      OXMIQ or another licensable IP vendor could bundle basic compatibility
      replay into its own sales motion and narrow the standalone wedge.
    mitigation: >-
      Stay vendor-neutral, benchmark across multiple suppliers, and own the
      buyer-side decision workflow and post-silicon telemetry that no single IP
      vendor can credibly provide.
  - name: Simulation fidelity gap
    description: >-
      Pre-silicon replay may miss real bring-up issues, which would damage
      trust if buyers treat the output as a guarantee.
    mitigation: >-
      Position the product as auditable decision support, publish confidence
      bands, and pair pre-tapeout findings with first-silicon telemetry to
      continuously calibrate the models.
