problem: >-
  AI appliance vendors and server OEMs increasingly see Nvidia BOM, power draw,
  and roadmap dependence compressing the margin on inference systems.
  Licensable GPU IP makes semi-custom silicon thinkable, but the killer
  uncertainty shifts to software: teams cannot prove that their real CUDA
  kernels, model graphs, and orchestration stack will behave on a new
  architecture before committing to a multimillion-dollar chip program. Today
  they stitch together consultant studies, emulator runs, and vendor slideware,
  which drags evaluation cycles and lets bad assumptions survive until bring-up.
targetUser:
  primary: >-
    Head of silicon platform or inference-systems engineering at a 200-1,000
    person AI appliance vendor or server OEM evaluating its first semi-custom
    accelerator card
  secondary: >-
    Compiler, SDK, and performance teams responsible for validating model and
    kernel compatibility before silicon bring-up
  buyer: >-
    VP Hardware Engineering, GM of AI Systems, or Head of Silicon
startupThesis:
  nonObviousInsight: >-
    Licensable GPU IP turns custom AI silicon from a chip-design problem into a
    software-assurance problem. Once a vendor like OXMIQ packages the core
    architecture and compatibility layer, the hardest remaining decision is
    whether a buyer's actual workload mix will port, hit perf-per-watt targets,
    and justify tapeout economics before the first chip exists.
  beachhead: >-
    North American and European AI appliance vendors selling 1-8 rack private
    inference clusters to sovereign-cloud and Fortune 2000 buyers, now
    evaluating a first semi-custom accelerator card because Nvidia BOM and
    power budgets break gross-margin targets
  wedge: >-
    A pre-silicon workload replay lab that ingests CUDA traces, model graphs,
    and memory profiles, runs them against licensable-GPU simulators and
    compiler outputs, and produces a go or no-go assurance pack for one
    accelerator program
  whyNowCatalyst: >-
    OXMIQ's funded pitch is that customers can license CUDA-compatible GPU IP
    and avoid a full chip program or code rewrite, which means semi-custom
    accelerator evaluations are moving forward now while buyers still lack a
    trusted proof layer.
  ventureScalePath: >-
    Start as the assurance layer for one semi-custom GPU evaluation, expand
    into post-silicon bring-up telemetry and compiler regression monitoring,
    then become the cross-vendor compatibility and benchmarking system of
    record as licensable GPU, NPU, and FPGA programs proliferate.
solution: >-
  The product plugs into a customer's production inference stack and captures
  representative CUDA kernels, model graphs, batch shapes, and memory traces.
  It replays those workloads against vendor simulators, compiler toolchains,
  and emulation targets from OXMIQ-like IP suppliers, then scores portability,
  memory pressure, and projected perf-per-watt before tapeout. For technical
  buyers, it highlights missing kernels, likely orchestration bottlenecks, and
  which workloads should stay on incumbent GPUs. For executives, it generates
  an assurance memo that ties software compatibility risk to BOM, energy, and
  program-timeline assumptions. The first deployment is a six-week evaluation
  around one planned accelerator card, giving the customer a credible funding
  decision before they hire a larger silicon team.
goToMarketSeed:
  firstCustomer: >-
    VP Hardware at a 300-800 employee AI appliance vendor selling rack-scale
    private inference systems, with one 2027 accelerator-card program in
    evaluation, projected annual Nvidia spend above 5 million dollars, and no
    internal compiler team large enough to prove CUDA parity before tapeout
  buyingTrigger: >-
    Margin targets or power envelopes on the next inference system fail under
    an Nvidia-based design, and leadership approves evaluation of licensed GPU
    IP as an alternative
  currentAlternative: >-
    Nvidia reference designs, architecture consultants, spreadsheet ROI models,
    and ad-hoc simulator or emulator testing run separately by silicon and
    platform teams
  switchingReason: >-
    The product lets the first customer replay real production workloads and
    see compatibility, memory, and perf-per-watt risk in weeks, which beats
    making a multimillion-dollar tapeout decision from vendor claims and
    disconnected internal analyses
  pricingHypothesis: >-
    Six-figure annual subscription per active accelerator program, plus paid
    onboarding for workload capture and a bring-up module once first silicon
    arrives
