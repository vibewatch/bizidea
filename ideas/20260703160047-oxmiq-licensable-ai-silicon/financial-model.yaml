scenarios:
  downside:
    description: "Category formation is slower, pilot conversion slips, and telemetry plus multi-program expansion attaches later than planned."
    y3RevenueK: 2080.0
    y3EbitdaK: -290.0
    cashLowPointK: 250.0
    keyAssumptionChanges:
      - "Q4Y3 active paid programs land near 8 instead of 11."
      - "Blended annual value per active program stays about 10% below base because onboarding and telemetry attach later."
      - "Gross margin exits near 68% and pilot-to-annual conversion falls toward the mid-40s."
  base:
    description: "The company closes 3 paid design programs in Y1, converts 2 to annual contracts, and scales to 11 active paid programs by Q4Y3 without adding a full sales team."
    y3RevenueK: 2972.0
    y3EbitdaK: 48.7
    cashLowPointK: 772.3
    keyAssumptionChanges:
      - "3 active paid programs by M12, 7 by Q4Y2, and 11 by Q4Y3."
      - "Mature blended value per active program approaches the researched ~$300K annual SOM level."
      - "Gross margin reaches the low-70s only after toolchain reuse and calibration workflows reduce bespoke services."
  upside:
    description: "Partner access arrives early, telemetry attaches faster, and one extra program per logo is won sooner than expected."
    y3RevenueK: 3560.0
    y3EbitdaK: 390.0
    cashLowPointK: 930.0
    keyAssumptionChanges:
      - "Q4Y3 active paid programs reach about 13 instead of 11."
      - "Blended annual value per active program rises about 8% above base as telemetry and cross-vendor comparison modules attach."
      - "Gross margin reaches roughly 74% because integrations standardize one to two quarters earlier."
sensitivity:
  - variable: ARPU
    downsideCase: "Blended annual value per active program stays about 10% below plan."
    baseCase: "Mature active-program value approaches about $300K per year."
    upsideCase: "Telemetry and multi-program expansion lift mature value about 8%-10% above plan."
    y3RevenueImpactK: -297.2
    cashImpactK: -210.0
  - variable: CAC
    downsideCase: "Partner introductions underperform and effective CAC rises toward $145K."
    baseCase: "Founder-led and partner-led selling holds CAC near $121K."
    upsideCase: "Design-service and IP referrals keep CAC near $100K."
    y3RevenueImpactK: -120.0
    cashImpactK: -220.0
  - variable: churn
    downsideCase: "Monthly churn rises toward 3.5% as some programs end without expansion into telemetry or the next accelerator cycle."
    baseCase: "Monthly churn holds near 2.5% once the replay workflow becomes part of the evaluation process."
    upsideCase: "Monthly churn stays near 1.8% because repeat OEMs adopt the product as their standing go/no-go layer."
    y3RevenueImpactK: -170.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: "Pilot-to-annual conversion stretches from about 90 days toward about 150 days."
    baseCase: "One successful pilot is enough to close the annual program contract inside one quarter."
    upsideCase: "Decision cycles compress toward about 60 days once partner integrations and buyer references are in place."
    y3RevenueImpactK: -430.0
    cashImpactK: -280.0
  - variable: gross margin
    downsideCase: "Gross margin stalls near 68% because replay setups and toolchain work stay bespoke."
    baseCase: "Gross margin reaches about 72% by Q4Y3 after workflows standardize."
    upsideCase: "Gross margin reaches about 74% as reusable integrations reduce services effort faster than planned."
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: hiring pace
    downsideCase: "Two scale hires are pulled forward by two quarters before utilization is proven."
    baseCase: "Hiring follows the founder-led, delivery-heavy sequencing in the business plan."
    upsideCase: "The final engineer hire waits until after Q4Y3 without hurting delivery quality."
    y3RevenueImpactK: 50.0
    cashImpactK: -190.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      TargetAccounts[Target OEMs and AI appliance vendors] --> PaidPilots[Paid pilots]
      PaidPilots --> AnnualPrograms[Annual program subscriptions]
      AnnualPrograms --> Telemetry[Telemetry and cross-vendor modules]
      Telemetry --> Revenue[Revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash and runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base revenue comes from moving from 3 paid programs at Y1 exit to 11 by Q4Y3 while mature program value approaches the researched ~$300K annual SOM level.
  - checkName: Must go right
    finding: The first two pilots must convert to annual subscriptions and at least two toolchain integrations must become reusable enough that one solutions-heavy team can support 7 active programs by Q4Y2 without crushing margin.
  - checkName: Model breaks if
    finding: If sales cycles drift toward 150 days or gross margin stalls below about 68%, the downside case pushes the cash floor toward roughly $0.25M before the company has enough proof for the next round.
  - checkName: Next-round proof
    finding: The next financing story is about 5 active paid programs by Q2Y2 plus 2 annual conversions, 2 working integrations, and early calibration evidence that replay accuracy stays inside the 15%-20% error band.
sanityChecks:
  ruleOf40: "Y3 growth 95.0% + EBITDA margin 1.6% = 96.6%"
  burnMultiple: "Y2 burn multiple is about 0.5x using roughly $0.58M of EBITDA burn against about $1.12M of net new ARR; H2Y3 is around breakeven."
  revenuePerFte: "$330K Y3 on 9 ending FTE (benchmark $200-400K SaaS)"
  flags:
    - "The base case reaches 11 active paid programs against a researched 12-program year-3 SOM, so there is little room for missed conversions inside the initial beachhead."
    - "customersEop counts active paid accelerator programs rather than unique logos, so logo diversification is weaker than the headline count suggests through most of the model."
    - "Gross margin only reaches the 70% target once simulator access, onboarding, and calibration workflows standardize; prolonged bespoke work would keep EBITDA negative."
    - "No dedicated AE is added before Y4, so founder and partnerships bandwidth is a real gating factor in the sales-cycle downside case."
    - "Cash is modeled as EBITDA; partner minimum-commit fees, deferred revenue timing, or lab-equipment capex could shift the actual trough earlier."
