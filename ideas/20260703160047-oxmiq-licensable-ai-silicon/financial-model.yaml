slug: semi-custom-gpu-assurance
date: "2026-07-03"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: YYYY-MM
    source: "[BP date 2026-07-03] the operating model starts in the first full month after the dated business plan."
  - id: A2
    name: Opening cash / pre-seed raise
    value: "$2.2M"
    unit: USD
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the stated pre-seed range because paid pilots offset burn and still leave roughly six months of buffer beyond the 18-month proof milestone."
  - id: A3
    name: Starting active paid programs
    value: "0"
    unit: count
    source: "[BP milestones 0-12 months + BP experimentRoadmap] the company starts pre-revenue and must first close paid design partners."
  - id: A4
    name: Active paid program definition
    value: "A paid pilot or annual subscription tied to one active accelerator evaluation program"
    unit: definition
    source: "[BP businessModel.unitOfValue active accelerator evaluation program + BP businessModel.revenueStreams] customersEop counts paying programs rather than unique logos."
  - id: A5
    name: Paid pilot economics
    value: "$100K over about 2 months (~$50K per month)"
    unit: USD/program
    source: "[BP investorMemo.firstCustomer.initialContract low-six-figure pilot + BP gtm.wedge six-week assurance project] the model uses the low end of low-six-figure pilot pricing."
  - id: A6
    name: Annual contract and add-on economics
    value: "Initial annual contracts start near $240K ARR, with onboarding and telemetry taking mature blended value toward about $300K per active program by Y3."
    unit: USD/program/year
    source: "[BP investorMemo.firstCustomer.initialContract $200k-$350k annual per active program + Research market.som 12 active programs at roughly $300k blended annual value] exit pricing stays inside the business-plan range and below the researched SOM ceiling."
  - id: A7
    name: Customer ramp
    value: "3 active paid programs by M12, 7 by Q4Y2, 11 by Q4Y3"
    unit: customersEop
    source: "[BP milestones 0-12, 12-24, and 24-36 months + Research market.som] the base case matches 2-3 paid design partners in year 1, 6-8 active programs by year 2, and stays just below the researched 12-program year-3 SOM."
  - id: A8
    name: Revenue recognition convention
    value: "Period-end active paid programs multiplied by the blended realized revenue per active program for that period"
    unit: formula
    source: "[BP gtm.pricing + BP businessModel.unitOfValue] this keeps every period's revenue directly reconcilable to customersEop and pricing mix."
  - id: A9
    name: Gross margin ramp
    value: "50%-58% in Y1, 62%-68% in Y2, and 69%-72% in Y3"
    unit: gross margin percent
    source: "[BP businessModel.targetGrossMarginPct 70 + BP strategicChoices.sequencingRationale + Research reportMemo executiveTakeaways] early pilots are services-heavy and margin only reaches the target once integrations and calibration workflows standardize."
  - id: A10
    name: Hiring timeline
    value: "M1 founder and founding engineer; M2 compiler/performance engineer; M4 solutions engineer; M10 product/partnerships lead; M16 second engineer; M23 ops/compliance; M29 second solutions engineer; M31 third engineer"
    unit: timeline
    source: "[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays product and delivery heavy while founder-led selling carries the narrow beachhead."
  - id: A11
    name: Founder loaded compensation
    value: "$180K"
    unit: USD/year
    source: "[BP team Founder / GM + startup-finance heuristic] lean founder cash pay plus payroll taxes and benefits."
  - id: A12
    name: Platform / integration engineer loaded compensation
    value: "$220K"
    unit: USD/year
    source: "[BP team Founding eng + startup-finance heuristic] reflects senior infrastructure and systems talent without assuming public-company cash packages."
  - id: A13
    name: Compiler / performance engineer loaded compensation
    value: "$240K"
    unit: USD/year
    source: "[BP team Compiler and performance engineer + startup-finance heuristic] specialized silicon-performance talent prices above generic SaaS engineering."
  - id: A14
    name: Solutions engineer loaded compensation
    value: "$170K"
    unit: USD/year
    source: "[BP team Solutions engineer + startup-finance heuristic] covers secure on-prem deployment, trace capture, and customer delivery ownership."
  - id: A15
    name: Product / partnerships lead loaded compensation
    value: "$190K"
    unit: USD/year
    source: "[BP team Product and partnerships lead + BP gtm.channels + startup-finance heuristic] includes strategic partner management and early productization work."
  - id: A16
    name: G&A / ops loaded compensation
    value: "$120K"
    unit: USD/year
    source: "[BP operations export-control, NDA, and partner-access process + startup-finance heuristic] covers lean finance, legal coordination, and compliance operations."
  - id: A17
    name: Payroll allocation to P&L lines
    value: "Founder 70% S&M / 30% G&A; engineering and compiler 100% R&D; solutions 50% S&M / 50% R&D; product/partnerships 60% S&M / 40% R&D; G&A 100% G&A"
    unit: allocation
    source: "[BP team role rationales + BP operations] maps payroll into the functional lines used in the operating model."
  - id: A18
    name: Non-payroll opex ramp
    value: "Monthly non-payroll spend rises from S&M/R&D/G&A of $8K/$12K/$6K in early Y1 to $15K/$18K/$10K by Q4Y3."
    unit: USD/month
    source: "[BP operations + startup-finance heuristic] covers simulation compute, secure infrastructure, travel, legal, insurance, and export-control overhead without assuming a scaled paid-demand engine."
  - id: A19
    name: Cash conversion convention
    value: "Cash movement equals EBITDA"
    unit: formula
    source: "[startup-finance heuristic] working-capital timing, financing fees, and capex are assumed modest versus operating burn at pre-seed scale."
  - id: A20
    name: Steady-state monthly program churn
    value: "2.5%"
    unit: percent per month
    source: "[BP businessModel.expansionLevers + startup-finance heuristic for annual B2B infrastructure workflows] churn is modeled worse than mature SaaS because individual accelerator programs can end after tapeout."
  - id: A21
    name: Base sales cycle
    value: "Roughly 90 days from paid pilot start to annual-subscription conversion"
    unit: days
    source: "[BP experimentRoadmap 3-6 months first paid pilot + BP experimentRoadmap 6-12 months convert 2 pilots] the model assumes one quarter is enough to prove replay value and close the follow-on program contract."
  - id: A22
    name: CAC convention
    value: "Total 36-month sales and marketing spend divided by 11 net new active paid programs"
    unit: formula
    source: "[model calc using base-case S&M spend + BP gtm founder-led and partner-led motion] this captures concentrated enterprise acquisition without assuming a later sales team."
  - id: A23
    name: Next-round milestone for funding sizing
    value: "By about Q2Y2 the company should have 5 active paid programs, 2 annual conversions, 2 working toolchain integrations, and first-silicon calibration underway."
    unit: milestone
    source: "[BP fundingAsk runwayMonths 18 + BP milestones 0-12 and 12-24 months + BP investorMemo.nextDiligence] the pre-seed is sized to reach seed-ready proof and still keep about six months of cash buffer."
  - id: A24
    name: Quarterly salary-roll convention
    value: "Y2-Y3 salary rows use actual monthly hires inside each quarter rather than only the year-end headcount snapshots."
    unit: convention
    source: "[Headcount column convention + BP team startTiming] this keeps salary expense internally consistent with the staged hiring ramp."
  - id: A25
    name: GTM staffing strategy
    value: "Founder and product/partnerships lead carry selling through Y3; no dedicated AE is added before Y4."
    unit: strategy
    source: "[BP strategicChoices.sequencingRationale founder-led sales before a scaled sales team] the narrow beachhead does not justify a larger direct-sales org inside the 3-year model."
  - id: A26
    name: Use-of-funds allocation
    value: "45% engineering, 27% GTM, 11% G&A, and 17% six-month buffer"
    unit: percentage of round
    source: "[BP fundingAsk.useOfFundsSummary + model payroll mix + startup-finance heuristic] the round is mostly used to build product and land design partners, with a modest but explicit cash reserve."
