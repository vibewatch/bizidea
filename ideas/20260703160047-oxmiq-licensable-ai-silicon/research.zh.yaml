categoryDynamics:
  growthRate: 到 2026 年，AI server 出货量同比增长 20%+。
  growthRateSourceRefs:
  - 5
  - 6
  tailwinds:
  - point: sovereign cloud 和 private AI 部署扩张，会增加愿意评估差异化 accelerator 经济性的非 hyperscaler 账户。
    sourceRefs:
    - 5
    - 9
    - 10
    - 12
    - 13
    - 14
  - point: 可授权 GPU IP、compute subsystems 和 custom ASIC 服务，让定制或半定制 silicon 比从零重做一颗芯片更容易落地。
    sourceRefs:
    - 1
    - 2
    - 19
    - 20
    - 22
    - 94
  - point: 功耗和基础设施约束把 perf-per-watt 直接抬成高管议题，进而拉高了流片前证明的需求。
    sourceRefs:
    - 8
    - 43
    - 44
    - 45
  headwinds:
  - point: 非 hyperscaler 的半定制买家池仍很早期，集中度也远高于整体 AI infrastructure 市场。
    sourceRefs:
    - 1
    - 19
    - 20
    - 22
    - 94
  - point: 即便有 compatibility layers 和 porting tools，脱离 CUDA 的软件 portability 依旧不轻松。
    sourceRefs:
    - 36
    - 37
    - 95
  - point: interconnect、memory 和 packaging 标准还在演进，性能假设可能在后期突然变掉。
    sourceRefs:
    - 38
    - 39
competitors:
- name: OXMIQ
  stage: 扩张期
  wedge: 可授权 GPU IP、chiplet 架构和 CUDA-compatible runtime，让半定制 AI silicon 这件事第一次变得可操作。
  pricing: 授权或战略合作报价；暂无公开标价。
  strength: 品类公信力最强，而且能明显降低“要不要整套软件重写”的心理门槛。
  weaknessVsUs: 它不是 vendor-neutral 的，也不会站在买家立场比较多条 accelerator 路径，更不会代表客户决定“该不该停”。
  sourceRefs:
  - 1
  - 2
  - 3
  - 4
  - 94
- name: Synopsys
  stage: 在位企业
  wedge: emulation、prototyping、ZeBu Cloud 和 virtual prototyping，覆盖 software bring-up 与验证。
  pricing: 企业定制报价。
  strength: 硬件辅助验证栈很成熟，覆盖 software bring-up、performance validation 和 power analysis。
  weaknessVsUs: 它是给 chip-development 工作流服务的，不是围绕真实生产 AI traces 生成一份买家能用的 assurance memo。
  sourceRefs:
  - 26
  - 27
  - 28
  - 29
- name: Siemens EDA
  stage: 在位企业
  wedge: 围绕 Veloce 的硬件辅助验证应用和企业级 prototyping。
  pricing: 企业定制报价。
  strength: 应用层验证能力强，从 emulation 走到 prototyping 的路径也很顺。
  weaknessVsUs: 重心依然是 chip-builder 工作流，而不是 OEM 的中立 accelerator 采购决策层。
  sourceRefs:
  - 31
  - 32
- name: Cadence
  stage: 在位企业
  wedge: Palladium 和 Protium 系统，服务 accelerated verification、software development 和 digital twins。
  pricing: 企业定制报价。
  strength: 在大规模验证场景里有很深的装机与口碑优势。
  weaknessVsUs: 公开定位仍以平台级验证为主，并没有直接打到客户 workload replay 和高管决策支持。
  sourceRefs:
  - 33
regulatoryTechnicalConstraints:
- point: advanced-computing export controls 会限制跨境协作、工件共享，以及敏感 accelerator 评估可选的供应商范围。
  sourceRefs:
  - 41
- point: 像 UALink 和 CXL 这样的 chiplet packaging 与 interconnect 标准，意味着 replay 模型得看整机拓扑，而不只是 accelerator core 的宣传口径。
  sourceRefs:
  - 4
  - 38
  - 39
- point: CUDA、driver 与 ROCm 的版本兼容性，会实打实影响 portability 结论能不能落到客户环境里。
  sourceRefs:
  - 36
  - 37
  - 95
- point: 机架功耗、液冷和整机集成，哪怕 core 架构看起来很诱人，也可能决定一个 accelerator 项目在经济上是否成立。
  sourceRefs:
  - 43
  - 44
  - 45
validationSignals:
- point: OXMIQ 的 $35M Series A 和总计 $60M 融资，说明投资人已经把可授权 GPU IP 当成了真实品类，而不是纯顾问故事。
  sourceRefs:
  - 1
  - 94
- point: TrendForce 预计 2026 年 AI server 出货量将增长 20%-28% 以上，同时 ASIC 占比和 sovereign cloud 需求继续上升。
  sourceRefs:
  - 5
  - 6
- point: Dell、HPE、Penguin 和 Lenovo 已经在打包 private AI / AI factory 方案，这给 hyperscaler 之外的滩头市场提供了现实入口。
  sourceRefs:
  - 9
  - 10
  - 12
  - 13
  - 14
- point: MLPerf 仍是对外共同 benchmark 语言，所以一层 vendor-neutral 的 trace-to-benchmark 翻译层并不多余。
  sourceRefs:
  - 47
  - 48
openQuestions:
- 到 2026-2028 年，究竟会有多少 200-1,000 人规模的 OEM 或 appliance 厂商，真给第一轮半定制 accelerator 评估拨预算？
- 可授权 GPU 厂商或定制 silicon 合作方，愿意向中立第三方 assurance layer 开放到什么程度的 simulator、compiler 和 trace 访问权限？
- 客户真实推理 workloads 与 MLPerf 风格 profile 的偏差，到底有多频繁、多大，足以改写一次 go/no-go tapeout 决策？
- 早期客户能不能在不泄露敏感模型 IP 或受监管客户数据的前提下，分享足够多 workload 证据，让公司慢慢积出护城河？
