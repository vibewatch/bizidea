reportMemo:
  executiveTakeaways:
  - 切口是真实存在的，因为可授权和半定制 AI silicon 越来越容易买到；但近期市场依旧是高价值、强集中的细分赛道，还谈不上宽广的软件品类。
  - Dell、HPE、Penguin 和 Lenovo 的 private AI / AI factory 方案说明，目标滩头客户在 hyperscaler 之外已经存在。
  - 客户痛点不只是 simulation 成本，更是缺一层中立证明：把真实 CUDA workloads 一路连到 tapeout、BOM、功耗和 bring-up 风险。
  - Synopsys、Siemens、Cadence 以及 IP 厂商都是强邻位在位企业，但没有谁天然占住 OEM accelerator go/no-go 决策里的买方侧 system of record。
  - 第 3 年收入必须保守建模，因为品类增速和 simulator fidelity 是眼下最大的两条 adoption constraints。
  marketDefinition: 这是一个买方侧、面向半定制 AI accelerator 评估的流片前 workload assurance 软件市场，服务对象是 OEM 和 private-AI 系统厂商。初始市场很窄，但背后挂着一个高速扩张的 AI infrastructure 基盘，而不是一个泛化的 EDA 品类 [5, 6, 7, 8, 9, 10, 12, 13, 14]。
  customerAndBuyer: 日常用户是掌握 CUDA traces、model graphs 和 bring-up 风险的 silicon、compiler 或 platform-performance 团队。真正掏钱的人通常是硬件或 AI systems 的 VP / GM，因为这笔决策会直接改掉产品毛利、功耗和 tapeout 暴露度 [1, 9, 10, 11, 13, 14, 44, 45]。
  buyingTriggers:
  - point: 某个 AI appliance SKU 或私有推理机架，在主流 GPU 方案下打不进毛利或功耗目标，迫使团队去评估替代 accelerator 的经济性。
    sourceRefs:
    - 5
    - 6
    - 9
    - 10
    - 12
    - 13
    - 14
    - 43
    - 44
    - 45
  - point: 可授权或半定制 accelerator 路径开始站得住脚，因为供应商承诺 CUDA-compatible 的软件连续性，也承诺更快的定制算力开发。
    sourceRefs:
    - 1
    - 2
    - 3
    - 19
    - 20
    - 22
    - 94
    - 95
  - point: 管理层想在扩招更大 silicon 团队或锁定 tapeout 预算前，先拿到一份可审计的 go/no-go 结论，于是团队会往 emulation、profiling 和 workload replay 上加预算。
    sourceRefs:
    - 26
    - 27
    - 28
    - 29
    - 31
    - 32
    - 33
    - 34
    - 35
  willingnessToPay:
    summary: 付费意愿是可信的，因为目标账户本来就在为 AI factory 基础设施、private AI 部署、custom silicon 项目和硬件辅助验证拨预算。一层 vendor-neutral 的 assurance 软件可以直接挂进这些现有预算里，核心价值不是再卖一套工具，而是降低“投错 accelerator 项目”或“流片后才发现 portability 缺口”的概率。
    sourceRefs:
    - 1
    - 7
    - 8
    - 22
    - 26
    - 27
    - 28
    - 31
    - 44
  competitiveLandscape: 相邻竞争非常强，但很碎。Synopsys、Siemens 和 Cadence 卖的是 emulation、prototyping 与 virtual platform；OXMIQ、Arm 和 Marvell 在降低半定制 silicon 的供给门槛；OEM 级 AI factory 厂商则在打包基础设施。真正空出来的位置，是一层中立软件：把买家真实 workloads 放到这些 toolchains 上重放，再把结果整理成一份可用于采购拍板的 go/no-go 决策包 [1, 2, 19, 20, 22, 26, 27, 28, 29, 31, 32, 33]。
  incumbentThesis:
  - incumbentClass: 可授权 GPU 与定制算力平台
    point: OXMIQ、Arm 和 Marvell 让半定制 silicon 更容易落地，但它们天然只会证明自家路径，而不会站在买家真实 workload 组合上横向比较多家供应商。
    sourceRefs:
    - 2
    - 3
    - 19
    - 20
    - 22
  - incumbentClass: 硬件辅助验证套件
    point: Synopsys、Siemens 和 Cadence 已经占住 emulation、prototyping 和 virtual bring-up，但它们卖的是工程验证工具，不是给 OEM 拍 accelerator 采购板的 assurance layer。
    sourceRefs:
    - 26
    - 27
    - 28
    - 29
    - 31
    - 32
    - 33
  - incumbentClass: 私有 AI 基础设施 OEM
    point: Dell、HPE、Penguin 和 Lenovo 已经握有买家关系，也在打包 AI factory 基础设施，但它们默认并不负责基于客户 traces 做跨厂商的半定制 accelerator 评估。
    sourceRefs:
    - 9
    - 10
    - 11
    - 12
    - 13
    - 14
  - incumbentClass: 内部编译器与性能团队
    point: 内部团队当然能做 profiling 和 workload 移植，但抓回来的材料也清楚说明：这条路仍高度依赖稀缺工具，以及对版本兼容性的精细处理。
    sourceRefs:
    - 34
    - 35
    - 36
    - 37
    - 95
  - incumbentClass: 纯 benchmark 替代方案
    point: MLPerf 对做基线比较很有价值，但标准 benchmark 套件不能替代 OEM 把自己的 model graph、batch profile 和 memory behavior 拿来重放。
    sourceRefs:
    - 47
    - 48
  regulatoryLandscape: 产品本身不算重监管，但其部署环境被一整套政策边界包住：美国 export controls、欧洲 semiconductor sovereignty 政策，以及越来越明确的能源与数据中心规划要求。跨境共享 traces、访问先进 accelerator 规格，以及与海外设计合作方协作，都要有流程护栏 [41, 42, 43]。
  technologyLandscape: 今天缺的基础元件其实都到位了：OXMIQ 的可授权 GPU IP 与 CUDA-compatible 叙事、Arm 与 Marvell 更快拼装定制算力系统的能力、EDA 在位企业成熟的 emulation / prototyping，以及 MLPerf 这套共同 benchmark 语言。真正缺席的，是一层 vendor-neutral 的 workload replay：吃买家自己的 traces，而不是用合成 workload 或供应商挑过的 workload [2, 3, 19, 20, 22, 26, 29, 31, 47, 48, 95]。
  distributionChannels:
  - point: 最可信的第一条渠道，还是直接卖给那些已经在打包 AI factory、private AI 或区域服务器方案的账户，和它们一起做 design-partner 销售。
    sourceRefs:
    - 9
    - 10
    - 12
    - 13
    - 14
  - point: 沿着 OXMIQ、Arm Total Design、Marvell custom ASIC 这类定制 silicon 生态走 partnership-led 销售，也能带来第一批 inbound 机会。
    sourceRefs:
    - 1
    - 2
    - 19
    - 20
    - 22
  - point: 从 emulation、prototyping 和 benchmark 社区带出技术侧需求，也能缩短评估周期，因为这些工具本来就在芯片评估工作流里。
    sourceRefs:
    - 26
