  sensitivityCases:
  - case: 可授权 GPU 采用仍停留在小众阶段
    impact: 如果 OXMIQ 这类项目最后只停留在少数战略账户里，创业公司就会更久地保持服务化形态，独立平台的 SAM 也会被压缩。
    sourceRefs:
    - 1
    - 19
    - 20
    - 22
    - 94
  - case: 相邻 EDA 或 IP 厂商把 replay 工具打包得足够完整
    impact: 如果 emulation 套件或 IP 厂商自己就能提供足够可用的 workload-proof 功能，公司就必须把差异化压在中立性、高管决策工作流和 post-silicon 校准数据上。
