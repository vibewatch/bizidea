    - 33
  - case: simulator 输出无法足够准确地预测生产推理行为
    impact: 如果 replay 结果和真实 bring-up 偏差太大，买家就只会把产品当 advisory analytics，除非公司能用 post-silicon telemetry 和 confidence bands 把这条缝补上。
    sourceRefs:
