    - 47
    - 48
  partnershipEcosystem:
  - point: 可授权 IP 与定制算力平台天然是互补伙伴，因为它们要想把半定制项目签下来，本来就需要一层买方侧证明。
    sourceRefs:
    - 1
    - 2
    - 19
    - 20
    - 22
  - point: emulation、prototyping 和 virtual platform 厂商也是集成伙伴，因为 software bring-up 和 power validation 本来就跑在它们的平台上。
    sourceRefs:
    - 26
    - 27
