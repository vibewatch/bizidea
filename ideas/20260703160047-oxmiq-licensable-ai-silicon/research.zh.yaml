  validationPlan:
  - priority: 高
    question: 哪些点名的 OEM 或 appliance 厂商，路线图里已经排上了 2027 年的半定制 accelerator 评估？
    evidenceToGather: 去拿 design-partner pipeline 数据、路线图访谈，以及对 8-12 个目标账户的 NDA 级机会资格确认。
  - priority: 高
    question: 像 OXMIQ 这样的供应商或定制 silicon 合作方，实际愿意向中立第三方 assurance layer 暴露到什么程度的 simulator、compiler 和 trace 访问权限？
    evidenceToGather: 和 2-3 家 silicon / IP 合作方做 vendor integration scoping、API 文档对接和技术 workshop。
  - priority: 中
    question: 客户真实 workloads 与 MLPerf 风格 benchmark profile，偏差到底会有多大？
    evidenceToGather: 从 5-10 个目标账户做并排 trace capture，把结果映射到 MLPerf 邻近 proxy 和客户生产跑数上。
  - priority: 中
    question: 实际第一笔预算到底由谁签——硬件 GM、platform engineering 负责人，还是 compiler / performance 负责人？
    evidenceToGather: 从早期 design-partner 销售周期里，整理采购流程图和复盘。
