  fiveForces:
    supplierPower:
      score: 4
      rationale: The product depends on simulator access, compatibility layers, trace tooling, and interconnect assumptions controlled by a small set of IP, platform, and EDA vendors.
      sourceRefs: [2, 3, 26, 31, 38, 39, 95]
    buyerPower:
      score: 4
      rationale: The near-term market is concentrated in a limited number of OEM and private-AI accounts, so each buyer can demand customization, proof, and referenceability.
      sourceRefs: [5, 9, 10, 12, 13, 14]
    threatOfEntrants:
      score: 3
      rationale: A good consulting team can stitch together profiling, emulation, and benchmark interpretation, but durable differentiation depends on integrations and accumulated portability data.
      sourceRefs: [26, 28, 29, 31, 34, 35]
    threatOfSubstitutes:
      score: 4
      rationale: Buyers can lean on supplier benchmarks, in-house ports, MLPerf baselines, or incumbent emulation suites instead of paying for a new assurance layer.
      sourceRefs: [26, 27, 31, 33, 36, 37, 47, 48, 94]
    competitiveRivalry:
      score: 3
      rationale: Direct category rivals appear few today, but adjacent incumbents are technically capable and could move quickly if the wedge proves valuable.
      sourceRefs: [1, 2, 26, 31, 33, 94]
  pestle:
  - factor: political
    impact: positive
    point: U.S. and EU semiconductor-sovereignty programs raise strategic attention on regional and custom compute.
    sourceRefs: [41, 42]
  - factor: economic
    impact: positive
    point: AI server shipments and AI infrastructure spending are growing fast enough to support more accelerator-evaluation activity.
    sourceRefs: [5, 6, 7, 8]
  - factor: social
    impact: negative
    point: Engineering teams are deeply anchored to CUDA and proven bring-up workflows, so trust in a new assurance layer must be earned.
    sourceRefs: [3, 36, 37, 95]
  - factor: technological
    impact: positive
    point: Custom-compute ecosystems, emulation, and profiling tools are now mature enough to make a pre-silicon proof workflow practical.
    sourceRefs: [2, 19, 20, 22, 26, 29, 31, 34, 35]
  - factor: legal
    impact: negative
    point: Export controls and IP-access constraints can limit who can participate in an evaluation and what technical artifacts can be shared.
    sourceRefs: [41]
  - factor: environmental
    impact: negative
    point: Rack power and liquid cooling constraints make a bad accelerator choice more expensive, but they also increase the urgency to test alternatives before tapeout.
    sourceRefs: [43, 44, 45]
  adoptionFrictionMatrix:
  - friction: Getting safe access to customer CUDA traces, model graphs, and memory profiles
    severity: high
    affectedBuyer: Platform and performance lead
    mitigation: Keep capture on customer-controlled infrastructure and ship distilled assurance outputs rather than raw model assets.
    sourceRefs: [34, 35, 95]
  - friction: Securing high-fidelity simulator and compiler integration from IP or EDA vendors
    severity: high
    affectedBuyer: Head of silicon platform
    mitigation: Start with cooperative design partners and publish confidence bands tied to specific toolchain versions.
    sourceRefs: [2, 26, 28, 31, 32]
  - friction: Separating customer-specific risk from benchmark theater
    severity: medium
    affectedBuyer: VP Hardware Engineering
    mitigation: Map every conclusion back to replayed traces and compare them against MLPerf-style baselines instead of replacing them.
    sourceRefs: [36, 37, 47, 48]
  - friction: Budget ownership spans hardware, systems, and software teams
    severity: medium
    affectedBuyer: GM of AI systems
    mitigation: Sell a go or no-go memo tied to margin, power, and bring-up risk, not just engineering convenience.
    sourceRefs: [9, 10, 12, 13, 14, 44]
