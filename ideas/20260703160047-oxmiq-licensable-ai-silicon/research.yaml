    sourceRefs: [38, 39]
competitors:
- name: OXMIQ
  stage: scale-up
  wedge: Licensable GPU IP, chiplet architecture, and a CUDA-compatible runtime meant to make semi-custom AI silicon feasible.
  pricing: Licensing or strategic engagement; no public list price.
  strength: Direct category credibility and a story that lowers fear of a full software rewrite.
  weaknessVsUs: Not vendor-neutral and does not represent the buyer when comparing multiple accelerator paths or deciding to walk away.
  sourceRefs: [1, 2, 3, 4, 94]
- name: Synopsys
  stage: incumbent
  wedge: Emulation, prototyping, ZeBu Cloud, and virtual prototyping for software bring-up and validation.
  pricing: Custom enterprise quote.
  strength: Mature hardware-assisted verification stack with software bring-up, performance validation, and power analysis.
  weaknessVsUs: Built for chip-development workflows rather than a buyer-friendly assurance memo around real production AI traces.
  sourceRefs: [26, 27, 28, 29]
- name: Siemens EDA
  stage: incumbent
  wedge: Hardware-assisted verification apps plus enterprise prototyping through Veloce.
  pricing: Custom enterprise quote.
  strength: Strong application-specific validation stack and a fast path from emulation to prototyping.
  weaknessVsUs: Still centered on chip-builder workflows, not a neutral accelerator procurement layer for OEMs.
  sourceRefs: [31, 32]
- name: Cadence
  stage: incumbent
  wedge: Palladium and Protium systems for accelerated verification, software development, and digital twins.
  pricing: Custom enterprise quote.
  strength: Deep installed-base credibility in high-scale verification.
  weaknessVsUs: The public positioning still emphasizes platform-scale verification rather than customer-workload replay and executive decision support.
  sourceRefs: [33]
regulatoryTechnicalConstraints:
- point: Advanced-computing export controls can limit cross-border collaboration, artifact sharing, and supplier choice for sensitive accelerator evaluations.
  sourceRefs: [41]
- point: Chiplet packaging and interconnect standards such as UALink and CXL mean replay models must account for system topology, not just accelerator core claims.
  sourceRefs: [4, 38, 39]
- point: CUDA, driver, and ROCm version compatibility materially affect whether portability conclusions hold across customer environments.
  sourceRefs: [36, 37, 95]
- point: Rack power, liquid cooling, and whole-system integration can decide whether an accelerator program works economically even when the core architecture looks attractive.
  sourceRefs: [43, 44, 45]
validationSignals:
- point: OXMIQ’s $35M Series A and $60M total capital show investors believe licensable GPU IP is now a real category rather than a pure consulting story.
  sourceRefs: [1, 94]
- point: TrendForce expects 2026 AI server shipments to grow more than 20% to 28%, with rising ASIC share and sovereign-cloud demand.
  sourceRefs: [5, 6]
- point: Dell, HPE, Penguin, and Lenovo are already packaging private AI or AI factory offers, which creates a plausible beachhead outside hyperscalers.
  sourceRefs: [9, 10, 12, 13, 14]
- point: MLPerf remains the common external benchmark language, which makes a vendor-neutral trace-to-benchmark translation layer useful instead of redundant.
  sourceRefs: [47, 48]
openQuestions:
- How many 200-1,000 employee OEMs or appliance vendors will actually fund a first semi-custom accelerator evaluation between 2026 and 2028?
- What simulator, compiler, and trace-access level will licensable GPU vendors or custom silicon partners grant to a neutral third-party assurance layer?
- How often do customer inference workloads diverge enough from MLPerf-style profiles to change a go or no-go tapeout decision?
- Can early customers share enough workload evidence to build a moat without exposing sensitive model IP or regulated customer data?
