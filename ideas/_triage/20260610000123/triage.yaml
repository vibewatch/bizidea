      - id: 1
        title: "LiteLLM vulnerability under active attack, CISA warns (CVE-2026-42271) - Help Net Security"
        url: https://helpnetsecurity.com/2026/06/09/litellm-vulnerability-under-active-attack-cisa-warns-cve-2026-42271
        publisher: Help Net Security
        publishedDate: 2026-06-09
        company: LiteLLM
        eventType: incident
        fetchVerified: true
        keyPoints:
          - CISA added CVE-2026-42271 to the KEV catalog after evidence of active exploitation.
          - The flaw lets attackers execute commands through LiteLLM MCP test endpoints and steal provider credentials or secrets.
          - Attackers can pair the bug with Starlette's BadHost bypass to remove the authentication requirement.
      - id: 2
        title: "Active Exploitation Alert: CVE-2026-42271 and CVE-2026-48710—Unauthenticated RCE in LiteLLM AI Gateway via Starlette Host Header Bypass – Rescana"
        url: https://rescana.com/post/active-exploitation-alert-cve-2026-42271-and-cve-2026-48710-unauthenticated-rce-in-litellm-ai-gateway-via-starlette-host
        publisher: Rescana
        publishedDate: 2026-06-09
        company: LiteLLM
        eventType: incident
        fetchVerified: true
        keyPoints:
          - The advisory says vulnerable LiteLLM versions 1.74.2 through 1.83.6 can be driven to unauthenticated RCE when chained with Starlette CVE-2026-48710.
          - The report highlights lateral movement, credential theft, and downstream AI infrastructure compromise as likely impacts.
          - The recommended fix is LiteLLM 1.83.7 plus Starlette 1.0.1 or later.
      - id: 3
        title: "LiteLLM And Starlette Bugs Combine For Critical RCE Risk - Open Source For You"
        url: https://opensourceforu.com/2026/06/litellm-and-starlette-bugs-combine-for-critical-rce-risk
        publisher: Open Source For You
        publishedDate: 2026-06-09
        company: LiteLLM
        eventType: incident
        fetchVerified: true
        keyPoints:
          - Horizon3.ai showed the LiteLLM command injection can be chained with a Starlette host-header bypass for no-credential RCE.
          - BerriAI patched the issue by restricting the affected endpoints to PROXY_ADMIN users.
          - The coverage underscores that AI gateway deployments centralize API keys and traffic routing, raising the blast radius.
