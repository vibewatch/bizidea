- point: DKV、UTA 和 PDI 都在卖排放报告或燃料核对，这恰恰证明买家今天已经在为“把燃料数据变得可运营、可审计”付费。
  sourceRefs:
  - 6
  - 7
  - 8
- point: Shell、Scania、Volvo、IVECO、Girteka 和 CNG-Mobility 都公开给出了证据点：生物 LNG 与燃气卡车走廊已经活跃到足以承载专门软件。
  sourceRefs:
  - 31
