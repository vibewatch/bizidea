openQuestions:
- 公路货运买家会接受证书支持的生物甲烷 / e-甲烷账本归属证据，还是最终仍会要求站点级物理走廊匹配？
- DKV、UTA、站点厂商和分销商 ERP，到底能在不做昂贵定制集成的前提下，放出多少原始加注和库存数据？
- Ren-Gas / avanca 这份协议背后，除了 headline 合同金额之外，真正的爬坡节奏和走廊分配逻辑是什么？
- 当同一条线路上的电池电动覆盖率继续提升时，买家会怎样权衡“现在花钱上可再生气体控制塔”与“再等等看”的时机？
