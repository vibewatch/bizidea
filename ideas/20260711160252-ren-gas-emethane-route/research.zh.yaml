  adoptionFrictionMatrix:
  - friction: 生物甲烷证书和账本归属核算还没有完全标准化
    severity: high
    affectedBuyer: 可持续发展负责人 / 商务买方
    mitigation: 同时支持物理走廊证明和证书支持的声明，并按客户合同配置证据模板。
    sourceRefs:
    - 10
    - 11
    - 18
    - 19
    - 20
  - friction: 站点、燃料卡和 ERP 数据分散在不同系统里
    severity: high
    affectedBuyer: 可再生燃料运营负责人
    mitigation: 先给目标客群里最常见的几套燃料卡、POS 和 ERP 做导入模板和异常流程。
    sourceRefs:
    - 4
    - 6
    - 7
    - 8
    - 37
  - friction: 早期 e-甲烷气量可能一直偏小或不稳定
    severity: medium
    affectedBuyer: 可再生燃料负责人
    mitigation: 在全吞吐优化之前，先卖上线准备、缺口分配和声明保障。
    sourceRefs:
    - 1
    - 2
    - 17
    - 30
  - friction: 政策和投资叙事仍然更偏零排放卡车，而不是可再生气体
    severity: medium
    affectedBuyer: 商务赞助人 / CFO
    mitigation: 把产品定位成现有燃气卡车已在跑、而零排放方案暂时还落不了地的那些线路上的“证明 + 控制层”。
    sourceRefs:
    - 17
    - 23
    - 27
    - 33
