categoryDynamics:
  growthRate: 到 2030 年 35 bcm 的生物甲烷目标，意味着要在今天的基数上继续双位数年增长。
  growthRateSourceRefs:
  - 14
  - 15
  tailwinds:
  - point: 即插即用兼容性意味着可再生气体可以沿现有站点和燃气卡车网络流动；对这个细分市场来说，流程软件比硬件替换更紧迫。
    sourceRefs:
    - 1
    - 31
    - 32
    - 33
    - 34
  - point: 运输排放报告正在变得更正式，这会直接抬高可审计数据链的价值。
    sourceRefs:
    - 18
    - 23
    - 24
    - 25
    - 27
  - point: 行业组织一再把生物甲烷和 e-甲烷放进难减排货运与其他重型移动场景的解法里。
    sourceRefs:
    - 12
    - 15
    - 16
    - 40
  headwinds:
  - point: 企业排放报告里对证书的处理口径，仍然足够摇摆，足以拖慢决策，也会压低声明可信度。
    sourceRefs:
    - 10
    - 11
    - 13
    - 19
  - point: 政策重心仍然在零排放卡车，而 LNG 路线在全生命周期层面也一直有争议。
    sourceRefs:
    - 17
    - 23
    - 27
    - 30
  - point: 只要吞吐还低，手工工具就仍然能撑住试点，从而推迟专门软件采购。
    sourceRefs:
    - 4
    - 6
    - 7
    - 8
competitors:
- name: DKV Mobility
  stage: 现有厂商
  wedge: 燃料卡、泛欧洲受理网络、替代燃料接入，以及车队排放报告。
  pricing: 定制 / 合同制；已审页面未公开定价。
  strength: 握着交易轨道，也已经在卖 bio-CNG / 生物 LNG 加 CO2e 报告。
  weaknessVsUs: 不会按站点和车队预留稀缺的可再生气体气量，也没有把供应批次一路串到客户声明的溯源链。
  sourceRefs:
  - 5
  - 6
- name: UTA Edenred
  stage: 现有厂商
  wedge: 燃料卡受理网络、LNG / CNG 站网接入，以及按采购燃料生成的月度车队排放报告。
  pricing: 定制 / 合同制；已审页面未公开定价。
  strength: 账单数据很强，也直接贴着承运商日常工作流。
  weaknessVsUs: 它能把已采购燃料的排放算出来，但不会编排提名、库存缓冲或客户证明包。
  sourceRefs:
  - 7
  - 39
- name: PDI Technologies
  stage: 现有厂商
  wedge: 燃料核对、供应链管理，以及批发 / 商业加注运营软件。
  pricing: 定制企业定价；已审页面未公开定价。
  strength: 对燃料运营，以及未核对气量带来的财务风险，都理解得很深。
  weaknessVsUs: 它优化的是广义燃料运营，不是专门为可再生气体分配、证书和托运人声明做的。
  sourceRefs:
  - 8
- name: CarbonChain
  stage: 规模化公司
  wedge: 供应链碳核算、生物燃料排放建模，以及报告框架。
  pricing: 定制企业定价；已审页面未公开定价。
  strength: 在复杂商品价值链上，排放核算的可信度很强。
  weaknessVsUs: 它会算排放，但不是一套绑定站点预留和加注核对的实时走廊运营系统。
  sourceRefs:
  - 9
- name: STX Group
  stage: 现有厂商
  wedge: 生物甲烷市场开发、属性证书，以及围绕可再生气体需求搭建商业结构。
  pricing: 经纪 / 证书市场化商务条款；已审页面未公开软件价格。
  strength: 离证书经济和生物甲烷市场采用都很近。
  weaknessVsUs: 它擅长创造需求和组织证书，但不管兑现走廊承诺所需的日常站点和车队工作流。
  sourceRefs:
  - 40
  - 13
regulatoryTechnicalConstraints:
- point: 可再生气体声明必须建立在和 RED III、ISCC 以及 Union Database 口径一致的认证与溯源链控制控制上。
  sourceRefs:
  - 11
  - 20
  - 25
  - 26
- point: CountEmissionsEU 及相关欧盟规则，正在把运输排放报告做得更标准化，也让燃料声明承受更强的审计压力。
  sourceRefs:
  - 18
  - 23
  - 24
  - 27
- point: 全生命周期可信度取决于路径和甲烷管理假设，所以“绿色燃料”式的粗糙报告风险很大。
  sourceRefs:
  - 9
  - 28
  - 30
- point: 站点、燃料卡和调度系统天然碎片化，因此真正的技术负担在集成和异常处理，而不在燃料化学本身。
  sourceRefs:
  - 4
  - 6
