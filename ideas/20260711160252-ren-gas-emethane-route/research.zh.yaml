  - 8
  - 37
validationSignals:
- point: 一份 €1B 承购协议，再叠上德国最大可再生 LNG 分销商的 55 座站 / 120 个加注点网络，已经足够把分配难题推成真问题。
  sourceRefs:
  - 1
  - 38
- point: Gasum 之前从 Tampere 锁下的 160 GWh/年承购，说明工厂级可再生气体气量已经开始面向运输客户商业化。
  sourceRefs:
