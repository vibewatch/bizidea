scenarios:
  downside:
    description: 试点转生产和第二项目扩张都往后滑，结果是公司到 Y3 结束时只做到 8 个在跑项目，而且证明包变现也更弱。
    y3RevenueK: 1907.0
    y3EbitdaK: -355.7
    cashLowPointK: 495.3
    keyAssumptionChanges:
    - Q4Y2 只有 5 个在跑项目，Q4Y3 只有 8 个，而不是 7 个和 10 个。
    - 实际单项目价值到退出时只能站在约 $23.5K/月，而不是 $24K/月，因为同一客户内的扩张更弱。
    - 毛利率最高只到约 66%，因为加注匹配和证据准备仍然更依赖人工。
  base:
    description: 到 M6 拿下 2 个付费试点，到 Q4Y2 做到 7 个在跑项目，到 Q4Y3 做到 10 个，退出时 ARR 接近 $2.9M。
    y3RevenueK: 2532.5
    y3EbitdaK: 135.6
    cashLowPointK: 1229.8
    keyAssumptionChanges:
    - 所有假设都按模型原样成立。
  upside:
    description: 伙伴转介绍更早起量，同一客户内的扩张也更早发生，于是公司到 Q4Y3 能做到 12 个在跑项目，毛利复用也更好。
    y3RevenueK: 3068.5
    y3EbitdaK: 543.8
    cashLowPointK: 1442.2
    keyAssumptionChanges:
    - 伙伴带来的暖介绍缩短销售周期，所以 Q4Y2 做到 8 个在跑项目，Q4Y3 做到 12 个。
    - 成熟项目价值能到约 $25K/月，因为第二走廊和生物 LNG 扩张更早落地。
    - Y3 后段毛利率能到 72%，因为可复用模板比预期更快压缩了手工证据工作。
sensitivity:
- variable: ARPU
  downsideCase: 成熟项目价值卡在每月约 $21K-$23.5K，因为客户没有加购第二走廊或生物 LNG 项目。
  baseCase: 项目从接近 $20K/月起步，到 Q4Y3 成熟到约 $24K/月。
  upsideCase: 随着用量费和扩张更早落地，成熟价值能到约 $25K/月。
  y3RevenueImpactK: -320.0
  cashImpactK: -225.0
- variable: sales cycle
  downsideCase: 试点转生产整体晚 1 个季度，Q4Y2 结束时只有 5 个在跑项目，而不是 7 个。
  baseCase: 到 M6 拿下 2 个付费试点，并在 Q4Y2 前做到 5 家年度分销商客户。
  upsideCase: 共创客户快 1 个季度转正，伙伴转介绍在 Y2 就开始贡献。
  y3RevenueImpactK: -350.0
  cashImpactK: -350.0
- variable: gross margin
  downsideCase: 退出毛利率卡在约 66%，因为证明包和核对仍然是重服务交付。
  baseCase: 退出毛利率按 BP 目标走到 70%。
  upsideCase: 随着模板复用更顺，手工交付压得更快，退出毛利率能到 72%。
  y3RevenueImpactK: 0.0
  cashImpactK: -155.0
- variable: hiring pace
  downsideCase: Y2 需要多招 1 名偏交付的人，Y3 还得多招 1 名支持岗位，才能不让试点继续往后滑。
  baseCase: 团队在 Q4Y2 保持 7 个 FTE，Q4Y3 到 10 个 FTE。
  upsideCase: 模板复用让公司可以把 Y3 后段的一次招聘往后推，而不影响客户上线。
  y3RevenueImpactK: 0.0
  cashImpactK: -190.0
- variable: churn
  downsideCase: 如果纯证书报告被证明已经足够，这套工作流的黏性就会下降，月流失率会上到 3.0%。
  baseCase: 一套集成好的分销商工作流，月流失率维持在 2.0%。
  upsideCase: 一旦被接受的证明包嵌进续约流程，月流失率可以降到 1.0%。
  y3RevenueImpactK: -180.0
  cashImpactK: -125.0
- variable: CAC
  downsideCase: 如果渠道和数据合作迟迟出不来，且销售仍然很吃差旅，CAC 会抬到 $150K。
  baseCase: 按 Y1-Y2 的 S&M 支出，前 5 家年度分销商客户对应的 CAC 约为 $120K。
  upsideCase: 如果伙伴暖介绍和客户背书一起缩短成交周期，CAC 可以压到 $90K。
  y3RevenueImpactK: 0.0
  cashImpactK: -150.0
modelDiagram:
  title: 单位经济流转
  mermaid: |
    flowchart LR
      Pilots["付费上线试点"] --> Programs["在跑的站点-车队项目"]
      Programs -->|每月价值 $20K-$24K| Revenue["收入"]
      Revenue -->|Y3 毛利率 67%-70%| GrossProfit["毛利"]
      GrossProfit -->|扣除 opex| Cash["现金头寸"]
      Templates["可复用的燃料卡/POS/ERP 模板"] -.->|抬高毛利| GrossProfit
      ProofPacks["被客户接受的证明包"] -.->|带动扩单| Programs
modelSanity:
- checkName: Revenue engine
  finding: 收入引擎的核心，是从 M6 的 2 个付费试点一路长到 Q4Y3 的 10 个在跑项目；每个成熟项目约 $24K/月，于是 Y3 营收能做到 $2,532.5K，退出 ARR 也就贴近研究里那档 $2.8M-$2.9M 的 SOM 情景。
- checkName: Must go right
  finding: 公司必须尽快证明两件事：数据接入是可复制的，被客户接受的证明包也能标准化；只有这样，才能在只背 1 位专职销售前，先把 Q4Y2 的 5 家年度分销商客户做出来。
- checkName: Model breaks if
  finding: 如果纯证书报告已经足够、或者集成始终做不出复用，下行情景就会掉到 Y3 营收 $1,907.0K、EBITDA -$355.7K，现金底也只剩 $495.3K。
- checkName: Next-round proof
  finding: 下一轮融资成立的前提，是 5 家正式生产分销商、1 个渠道或数据伙伴、70%+ 自动匹配，以及同一客户里的第一笔生物 LNG 扩张都已跑出来；这也正是这轮 $2.0M pre-seed 要买到的证明。
sanityChecks:
  ruleOf40: Y3 营收增长 56.2%（$2,532.5K / $1,621.0K - 1）+ Y3 EBITDA 利润率 5.4%（$135.6K / $2,532.5K）= 61.6%。
  burnMultiple: Y1 burn multiple 为 0.5x（$540.7K burn / $1,056K exit ARR）；Y2 burn multiple 为 0.2x（$225.0K burn / $918K net-new ARR）。
  revenuePerFte: Y3 平均每个 FTE 创收 $295K（平均约 8.6 个 FTE，对照垂直 SaaS 的基准区间约 $200K-$350K）。
  flags:
  - Q4Y3 要做到 10 个在跑项目，等于要吃下研究里 24 个德国 / Benelux 滩头项目中的很大一块，所以绝对收入目标不高，执行压力却不小。
  - 模型假设项目实际价值会从试点阶段的 $20K/月，爬到 Y3 后段成熟项目的 $24K/月；如果第二走廊或生物 LNG 扩张落不下来，收入会向下行情景收缩。
  - 毛利率只有在文件导入和被接受的证明包都能做成可复用模板时，才上得去 BP 目标的 70%；如果证据准备始终得靠定制人力，这门生意就会一直偏服务。
  - 下行情景的最低现金点只有 $495.3K；即便基准情景到 Y3 末还有 $1,369.8K 现金，一家集成伙伴掉链子、或一个季度的试点转正延期，都会把缓冲吃得很快。
