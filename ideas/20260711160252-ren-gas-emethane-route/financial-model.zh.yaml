slug: emethane-corridor-assurance-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-11] 模型从这份商业计划所标日期后的第一个完整月份开始。'
- id: A2
  name: 期初现金 / pre-seed 融资
  value: '2000'
  unit: 千美元
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] 模型按区间下沿、也就是更克制的 $2.0M 取值，因为招聘顺序先压在集成深度，Y2 前期仍以创始人主导销售为主。'
- id: A3
  name: 期初付费项目数
  value: '0'
  unit: 个
  source: '[BP milestones 0-12 months] 公司起步时还没收入，得先拿下付费上线试点。'
- id: A4
  name: 客户定义
  value: 一个处于试点或正式生产阶段、且付费的分销商项目
  unit: 定义
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop 统计的是付费的站点-车队项目，而不是车队数或站点数。'
- id: A5
  name: 付费试点单价
  value: $60K，约 3 个月（约 $20K/mo）
  unit: 美元/项目
  source: '[BP investorMemo.firstCustomer initialContract EUR 60k-100k pilot] 基准情景按试点区间下沿建模，避免虚高。'
- id: A6
  name: 初始正式项目年价值
  value: $240K ARR（约 $20K/mo）
  unit: 美元/项目/年
  source: '[BP investorMemo.firstCustomer initialContract EUR 180k-300k annual platform value plus usage fees] 第一份正式合同按年度区间中段附近落地。'
- id: A7
  name: 扩张后的成熟项目年价值
  value: $288K ARR（约 $24K/mo）
  unit: 美元/项目/年
  source: '[Research market.som 10 live programs at roughly $280k ARR-equivalent each + BP businessModel.expansionLevers] 到 Y3 后段，假设同一客户里会出现第二走廊或生物 LNG 扩张。'
- id: A8
  name: 项目爬坡节奏
  value: M6 拿下 2 个付费试点，M12 到 4 个付费项目，Q4Y2 到 7 个，Q4Y3 到 10 个
  unit: customersEop
  source: '[BP product.sixMonth + BP milestones 0-12, 12-24, 24-36 + Research market.som] 基准情形要到 Y3 后段才摸到研究里那种 10 项目的 SOM 轮廓。'
- id: A9
  name: 毛利率爬坡
  value: Y1 为 45%-58%，Y2 为 60%-66%，Y3 为 67%-70%
  unit: 毛利率
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions 70%+ auto-match + BP operations] 早期证明包和核对仍要人审；等导入模板可复用，交付成本才会往下掉。'
- id: A10
  name: 招聘时间线
  value: 创始人/CEO 和创始工程师从一开始在岗；M4 补 1 名解决方案工程师；M7 补 1 名合规产品负责人；M10 补 1 名客户运营负责人；M15 补第 2 名工程师；M18 补首位销售/合作负责人；M27 补第 2 名解决方案工程师；M31 补第 3 名工程师；M34 补第 2 名客户运营。
  unit: 时间线
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘先补集成和合规深度，销售广度靠后。'
- id: A11
  name: 创始人/CEO 全包薪酬
  value: '150000'
  unit: 美元/年
  source: '[BP team Founder/CEO + startup-finance heuristic for pre-seed Europe enterprise software] 创始人工资克制，但已把福利和差旅等全成本算进去。'
- id: A12
  name: 工程岗位全包薪酬
  value: '130000'
  unit: 美元/FTE/年
  source: '[BP team Founding eng + startup-finance heuristic] 走廊台账和集成工作需要资深工程师，但还不至于按大厂薪酬去算。'
- id: A13
  name: 解决方案 / 集成岗位全包薪酬
  value: '110000'
  unit: 美元/FTE/年
  source: '[BP team Solutions and integration engineer + startup-finance heuristic] 这里按实施负责人、数据映射和伙伴赋能来定价。'
- id: A14
  name: 合规产品负责人全包薪酬
  value: '120000'
  unit: 美元/年
  source: '[BP team Regulatory product lead + startup-finance heuristic] 证据模板和工作流规则很重行业知识，但在 pre-seed 阶段仍然要控制住成本。'
- id: A15
  name: 客户运营岗位全包薪酬
  value: '90000'
  unit: 美元/FTE/年
  source: '[BP team Customer operations lead + startup-finance heuristic] human-in-the-loop 质量和续约支持的成本，应该低于工程岗位。'
- id: A16
  name: 销售 / 合作岗位全包薪酬
  value: '120000'
  unit: 美元/FTE/年
  source: '[BP gtm.channels + startup-finance heuristic] 第一位 GTM 招聘更偏关系型，在试点证明价值前不会太早加。'
- id: A17
  name: 工资在 P&L 中的分摊
  value: CEO 55% 记入 S&M / 15% 记入 R&D / 30% 记入 G&A；工程 100% 记入 R&D；解决方案 25% 记入 S&M / 75% 记入 R&D；合规产品 70% 记入 R&D / 30% 记入 G&A；客户运营 20% 记入 S&M / 40% 记入 R&D / 40% 记入 G&A；销售 100% 记入 S&M
  unit: 分摊规则
  source: '[BP team role rationales + BP operations] 这样可以把人员成本映射到各职能支出，同时保留创始人主导销售和交付的真实轮廓。'
- id: A18
  name: 非薪酬 opex 爬坡
  value: 36 个月内，S&M 约 $8K-$18K/mo，R&D 约 $10K-$20K/mo，G&A 约 $6K-$13K/mo
  unit: 美元/月
  source: '[BP operations + Research partnershipEcosystem + startup-finance heuristic] 覆盖云成本、德国 / Benelux 差旅、法务、保险、合规工具和合作伙伴赋能。'
- id: A19
  name: 现金转换约定
  value: EBITDA 近似代表现金变动
  unit: 公式
  source: '[startup-finance heuristic] 在 pre-seed 阶段，税、债务、capex 和营运资金时点差异都按不重要处理。'
- id: A20
  name: 月度流失率
  value: '2.0'
  unit: '%/月'
  source: '[startup-finance heuristic for vertical enterprise operations software + BP businessModel.expansionLevers] 一旦接入，这套工作流会很黏，但赛道够窄、报告标准又不确定，所以不能假设超低流失。'
- id: A21
  name: CAC 约定
  value: $120K CAC
  unit: 美元/项目
  source: '[model calc: Y1-Y2 sales and marketing spend of about $596.6K divided by the first 5 annual distributor customers targeted by BP milestones] 这个口径偏保守，因为把第一批客户从建认知到拿证明的整套 GTM 成本都算进去了。'
- id: A22
  name: 下一轮融资里程碑
  value: 5 家正式生产分销商、1 个渠道或数据合作伙伴、70%+ 加注自动匹配、50%+ 更快的证明包准备速度，以及同一客户内第一笔生物 LNG 或第二走廊扩张
  unit: 里程碑
  source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + Research validationSignals] 这就是这轮 pre-seed 连缓冲一起要买到的证明包。'
- id: A23
  name: 季度工资口径
  value: Y2-Y3 的工资行按季度内实际招聘月份计算，而不是只看季度末快照
  unit: 口径
  source: '[Headcount column convention + BP team.startTiming] 这样工资曲线才能跟月度招聘节奏对上。'
- id: A24
  name: customersEop 统计口径
  value: customersEop 同时包含付费试点和正式生产项目
  unit: 口径
  source: '[模型统计口径 + BP gtm.pricing] 这样能把付费上线这道切口看清楚，同时也能看到正式生产占比随时间提升。'
