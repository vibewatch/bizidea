slug: emethane-corridor-assurance-os
date: '2026-07-11'
executiveSummary: Ren-Gas 的 EUR 1B 承购协议，加上 Alternoil 在德国的 55 座站网，把可再生 e-甲烷从“未来燃料”变成了分销商眼前必须解决的走廊执行问题。第一批买家会是德国或 Benelux 分销商里的可再生燃料负责人或 CCO：他们得把稀缺的低碳气量分给几家核心车队，又不能超卖站点、也不能把声明信誉做砸。产品起步应是一座站点分配与证据控制塔：把生产商提名转成站点计划，按车队和线路预留气量，用燃料卡与 POS 数据核对实际加注，再导出客户可用的证明包。相较泛碳核算套件或燃料卡平台，这个切口更窄、也更快能验证，因为第一份长期 e-甲烷或 生物甲烷项目一上线，触发点、预算和运营失误模式就会一起出现。研究显示，这里是个不大的真实滩头市场：德国 / Benelux 的 SAM 约 $9.6M；如果公司拿下约 10 个在跑项目，第 3 年 SOM 约 $2.8M，因此风险投资级上行要靠后续扩到结算、识别证书的工作流，以及其他低碳分子。GTM 应先卖一单付费上线准备试点，把手工异常处理、证明包周转和缺口重分配的下降做成可量化结果，再转成年框架合同，按站点和车队收费。产品推进一定要克制：先打一块地理市场、先服务一套分销商工作流、先做人审证据、先把主流燃料卡、POS 和 ERP 的集成模板打磨出来，再考虑市场撮合或纯证书产品。最大的不利证据有三个：供给爬坡可能慢到不值得上专门软件；托运人可能接受纯证书报表，不要物理线路证明；公开信息也还没披露车队名称、爬坡时间表或被接受的声明标准。所以前 90 天的重点，不是讲更大的故事，而是把真实工作流和数据可得性的案例证据抓出来。
problem:
- 第一批上线 e-甲烷的可再生气体分销商，如今仍把站点气量、车队承诺和缺口预案分散在表格、ERP 备注和站点导出里做，这样一来，只要多条走廊同时上线，超卖和断供就很容易发生。
- 客户要看的证明，往往还是事后从燃料卡、POS 和可持续发展工作簿里硬拼出来，所以一旦声明被质疑、或溯源链有缺口，续约就会拖，低碳货运的溢价合同也会跟着失信。
solution:
- 做一座走廊控制塔，把供应商提名转成站点分配计划，按指定车队和线路预留可用气量，并直接指出哪些合同承诺已经超过了站点大概率能扛住的能力。
- 再把燃料卡、POS 和 ERP 里的实际加注核对进一套可审计台账，把供应批次、站点、车队、合同和面向客户的声明输出真正串起来。
whyWeWin:
- 燃料卡、ERP、证书工具和碳核算工具都只占流程的一截，而这个产品一上来就卡在跨系统的交叉点：稀缺的可再生气体气量必须在这里被分配、被核对、也被证明。
- 每落地一个客户，都会沉淀新的站点、车队、合同和声明结果数据；这些数据反过来又会让后续走廊规划更准，形成现有厂商手里并没有的溯源数据层。
strategicChoices:
  beachhead: 德国和 Benelux 的可再生气体分销商，运营约 30-80 座公共 LNG 站，刚签下第一批长期 e-甲烷供给，并要把气量分给 3-10 家核心重卡车队、跑固定货运走廊。
  wedgeRationale: 这个切口的触发点最干净，因为一旦供给项目签下来，哪些站点、哪些车队、哪些线路优先拿到稀缺气量，立刻就得做决定。相比卖泛排放报告或更宽的燃料运营软件，这里更容易更快做出证明，因为买家已经背着合同承诺，而现有系统又确实没有把这条窄工作流串起来。
  sequencingRationale: 产品必须先证明：同一家分销商的一套分配、加注匹配和声明输出流程，真的能被标准化，然后才谈结算、撮合市场或新分子。GTM 在早期应继续由创始人亲自打，先围住一小批共创客户；招聘也要优先补集成和合规深度，而不是先铺销售；合作伙伴关系，则要等首批试点拿出被客户接受的证据和可重复的数据接入后再放大。
  notYet:
  - 直接面向车队的采购或可持续发展软件
  - 面向可再生气体的保量交易市场或现货交易所
  - 在现有客户里的相邻生物 LNG 项目之外，过早支持更多低碳分子
  - 不能控制物理站点和车队执行、只做证书的产品
market:
  tam: 估算 TAM 为 $48.0M：约 120 个欧洲可再生气体走廊项目，每个项目对应约 $400k 的年度控制塔支出。
  sam: 估算 SAM 为 $9.6M：约 24 个位于德国 / Benelux 的分销商或相邻站网启动项目，规模在 30-80 座站，或具备相近的走廊复杂度。
  som: 估算第 3 年 SOM 为 $2.8M：按 10 个在跑项目、每个项目约 $280k 的初始 ARR 等价值测算。
  segments:
  - 主要：德国 / Benelux 的可再生气体分销商，运营 30-80 座公共 LNG 站，并准备上线第一批 e-甲烷或大型生物 LNG 走廊项目
  - 次要：大型 LNG 车队和走廊运营方，需要从分销商合作伙伴那里拿到可审计的低碳证明
  buyingProcess: 最先感到痛的是可再生燃料运营团队和可持续发展团队，但经济审批通常握在可再生燃料负责人或 CCO 手里，因为这笔采购会同时影响供给承诺、网络利用率和客户声明。最容易启动交易的时点，是分销商签下第一份多年承购，或拿到一份需要按月交证明的低碳货运合同。
product:
  mvp: MVP 应先吃进一家分销商网络的供应商提名、站点库存快照、车队预留和燃料卡或 POS 加注记录，再输出站点分配计划、异常预警，以及服务 2-5 家核心车队的客户证明包。它不该一上来就做自动证书交易、现货定价，或试图整套替换 ERP 和燃料卡系统。
  sixMonth: 做出 2 个付费试点：每个都带有指定站点的预留看板、手工异常流程、加注导入模板，以及覆盖 10-20 座站的证明包导出。
  twelveMonth: 把首批试点转成生产，补上缺口预警和合同-加注偏差分析，并各自打磨出 1 套可复用模板：覆盖主流燃料卡数据流，以及站点或 POS 导出。
  twentyFourMonth: 补上可用于结算的溯源链，同时支持“已验证的物理走廊”与“证书支持”的两种证据模式；先在老客户里扩到相邻生物 LNG 项目，再考虑新分子或市场撮合功能。
  keyBets:
  - 分销商会先为上线准备和声明证明付费，而不是先买更宽的商品、燃料卡或碳套件。
  - 在德国 / Benelux 这个滩头市场里，一套通用台账就能覆盖大多数站点、车队和合同异常，而不至于退化成纯定制服务。
  - 核心车队和托运人会足够重视“物理线路证明”或更保守的证据包，从而让分销商愿意为此掏预算。
  - 在第一批 e-甲烷上线后，同一批客户里的生物 LNG 项目，会是最快的扩张路径。
gtm:
  wedge: 先把第一单卖给德国或 Benelux 一家正在签第一份 e-甲烷或大型生物甲烷项目的可再生 LNG 分销商：用一座走廊控制塔，替掉表格分配和月底拼声明。
  channels:
  - 创始人主导直营销售，直接打可再生气体分销商和走廊运营方里的可再生燃料负责人、商务总监和 CCO
  - 和已经掌握交易数据、但没有分配与溯源逻辑的燃料卡和排放报告厂商做渠道合作
  - 与认证方、OEM 生态和走廊基础设施运营方联合出方案，在他们自己的产品之上叠一层中立的证明层
  funnelTargets: 目标账户到合格商机 20%-30%，合格商机到付费试点 30%-40%，试点到年度生产合同 50%+，生产客户在 12 个月内扩到第二项目 40%+。
  pricing: 先卖一单 8-12 周的付费上线试点，之后按活跃站点和签约车队收年度平台费，再按加注记录或所管理的 MWh 收用量费；这比按席位收费更贴合买家现有的上线、对账和合规预算。
businessModel:
  revenueStreams:
  - 面向分配计划、异常流程和证明包生成的年度 SaaS 订阅
  - 与加注记录条数或已核对的低碳燃料 MWh 挂钩的用量费
  - 首轮数据映射、控制设置和工作流配置的实施费
  unitOfValue: 活跃的站点-车队可再生气体项目，以及其中被核对的加注记录。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一分销商账户里加更多站点、车队和走廊
  - 当台账被信任后，上售缺口分析、可用于结算的溯源链和续约报告
  - 先从 e-甲烷扩到相邻生物 LNG 项目，再考虑新分子
  - 借燃料卡、认证方或走廊生态伙伴嵌入式切入，这些人本来就比我们更靠近目标买家
strategyMap:
  northStarMetric: 已签约的可再生气体气量里，按承诺走廊交付、且有审计级证明、同时不需要紧急重分配的占比。
  inputMetrics:
  - 72 小时内自动匹配到站点、车队和合同的加注记录占比
  - 每个在跑项目每月准备客户证明包所需工时
  - 每条在跑走廊的紧急重分配或错失加注次数
  - 试点转生产的转化率
  - 每个生产客户带来的扩张 ARR
  moatsToBuild:
  - 把供应批次、站点分配、实际加注和声明输出连起来的可再生气体溯源台账
  - 能反过来优化未来走廊规划的线路级缺口与重分配数据
  - 按客户和报告场景积累下来的“被接受 / 被质疑”声明模板库
  - 围绕滩头市场主流燃料卡、POS 和分销商 ERP 栈做出来的可复用集成模板
  killCriteria:
  - 前 4 个付费试点里，6 个月内转不出至少 2 个年 ARR 高于 EUR 180k 的年度合同。
  - 一个真实试点跑满 90 天后，仍有超过 30% 的加注记录要靠手工异常处理。
  - 前 5 通车队或托运人尽调电话里，不到 3 家明确要求物理线路证明，而只接受纯证书报告。
  - 在 60 天试点搭建窗口内，没有任何一家主流燃料卡、站点或 POS 数据源能稳定导出可用交易数据。
  mermaid: |
    flowchart LR
      Wedge[德国 e-甲烷上线切口] --> MVP[分配与声明证明 MVP]
      MVP --> Proof[带审计级证明的已交付气量]
      Proof --> Expansion[结算与多燃料扩张]
investorMemo:
  verdict:
    call: 观察
    conviction: 买家痛点是真的，时间点也对，但在付费试点证明数据接入和声明标准不会把公司拖成服务项目之前，信心仍只能维持在中等。
    whyBelieve: 已签下的供给、现成的站网，以及排放报告和燃料对账上的真实支出，一起拼出了第一笔控制层预算。
    whyDoubt: 直接切口的市场不大，而且证书与物理声明的规则还没收敛，一旦口径放松，紧迫感就可能消失，现有厂商也更容易打包跟进。
    nextDiligence: 先把 2 个付费分销商试点真正跑起来，拿出至少 15 座站、2 家核心车队的被接受证明包和自动匹配加注数据。
  firstCustomer:
    title: 德国一家可再生 LNG 分销商的可再生燃料负责人，正准备上线第一批 e-甲烷 走廊
    profile: 一家拥有 40-60 座站的分销商，服务跨境重卡线路，手上有 2-5 家核心车队，还刚签下一份必须在现有 LNG 基础设施里分配的新供给合同。
    trigger: 分销商签下第一份长期 e-甲烷或大型生物甲烷项目后，必须向指定车队承诺按走廊交付、且经得起审计的低碳气量。
    buyer: 可再生燃料负责人或首席商务官
    initialContract: 先签一单 8-12 周、约 EUR 60k-100k 的付费试点，覆盖一个上线项目；随后随着更多站点、车队和加注记录进来，转成约 EUR 180k-300k 的年度平台合同，再叠加用量费。
  mustBeTrue:
  - 接受访谈的德国 / Benelux 分销商里，至少一半在 30-80 座站规模上，已经把低碳分配和声明工作流放在燃料卡与 ERP 之外另行管理。
  - 至少 2 家共创客户会在大规模 e-甲烷吞吐到来前签下付费试点，证明痛点出在上线规划阶段，而不是只在大规模运行时才出现。
  - 试点里至少 70% 的加注记录，能在 72 小时内靠现有燃料卡、POS 和 ERP 数据自动匹配到站点、车队与合同。
  - 前 4 个试点里，至少 2 个能在试点结束后 6 个月内转成年 ARR 高于 EUR 180k 的年度合同。
  - 5 次核心车队 / 托运人访谈里，至少有 3 家明确要求物理走廊证明，或同等保守的证据，而不是泛泛的纯证书报告。
  diligenceQuestions:
  - 目标分销商现在每个月要花多少人时、处理多少异常，来做分配、加注核对和声明准备？
  - 滩头市场里最主流的燃料卡、POS 和 ERP 分别是谁？它们各自能在不做定制项目的前提下导出哪些原始数据？
  - 如果声明能绑定到物理线路，而不是只给纯证书报告，托运人和车队会不会多付钱，或更容易续约？
  - Ren-Gas 这类供给爬坡，到底多快会把单点试点推成多站点、多车队的复杂问题？
  - DKV、UTA、PDI 或认证方，需要多快就能把足够的分配和证据流程打包进去，进而抹平这条独立切口？
operatingAssumptions:
- assumption: 分销商会在全量吞吐到来前就下单，因为只要承购签了，上线准备和声明保障就已经够痛。
  basis: research.yaml
  validationTest: 先跑 6 通分销商需求访谈，并在第一批大规模气量真正流动前拿下至少 2 个付费试点。
  decisionImpact: 如果这条不成立，近期 ICP 就得从第一波 e-甲烷上线，改成更大的存量生物 LNG 项目，e-甲烷这条切口也会随之放慢。
- assumption: 现有燃料卡、站点 POS 和 ERP 导出，足以支撑一套可复制的 70%+ 自动匹配工作流，而不需要每个客户都做定制集成。
  basis: research.yaml
  validationTest: 拿 1 家燃料卡提供商、1 家站点或 POS 厂商、2 家分销商后台的样本数据进沙箱，至少把 70% 的加注记录在试点环境里核对出来。
  decisionImpact: 如果这条不成立，实施成本和周期都会抬升，逼公司走向更重的服务模式，也会缩小初始可打的区域。
- assumption: 核心车队和托运人需要物理走廊证明，或至少要更保守的证据包，而不是照搬证书经纪商已有的做法。
  basis: research.yaml
  validationTest: 访谈 5 位车队或托运人的可持续发展买方，确认至少 3 家要求按月给出线路绑定的证明，或同等保守的证据。
  decisionImpact: 如果这条不成立，产品就得往证书编排偏，原来那部分“必须控制分配”的紧迫感会掉一截。
- assumption: EUR 180k-300k 的年度合同是可接受的，因为买家今天本来就在不同预算项里为对账、上线支持和排放报告付钱。
  basis: idea.yaml
  validationTest: 拿 4 份“试点 + 年度合同”的报价去谈，至少签下 2 个付费试点，再拿到 2 份来自合格潜客的书面价格验证。
  decisionImpact: 如果这条不成立，定价就得往更轻的工作流软件回落，招聘节奏要放慢，融资故事也会收窄。
- assumption: 在公司必须切到新产品大类之前，同一套台账就能先从 e-甲烷扩到同一账户里的相邻生物 LNG 项目。
  basis: idea.yaml
  validationTest: 把试点客户的 2 个生物 LNG 项目映射到同一套数据模型里，确认不需要重写核心数据结构。
  decisionImpact: 如果这条不成立，直接市场就会窄到不值得提前扩编，至少在证据更强前不该加速招人。
experimentRoadmap:
- horizon: 0-90 天
  experiment: 梳理 3 家德国或 Benelux 分销商当前的分配与声明准备流程。
  hypothesis: 手工协同和月底出证明，已经够贵，足以支撑付费试点。
  successMetric: 至少 3 份流程图显示：每月超过 20 个员工工时，或每个上线项目至少有 1 次实质性的分配 / 声明异常。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 访谈 5 家核心车队或托运人的可持续发展买方，确认他们接受什么样的低碳证明。
  hypothesis: 续约和溢价，要靠物理线路证明或更保守的证据包来支撑。
  successMetric: 5 位买家里至少有 3 位明确表示，泛泛的纯证书报告不足以支撑目标合同。
  owner: 创始人/CEO
- horizon: 0-90 天
  experiment: 用一家分销商的沙箱数据，把卡、POS 和 ERP 样本文件做一次完整核对。
  hypothesis: 在不先做深度 API 工程的前提下，核心数据模型就能靠文件导入自动匹配大部分加注事件。
  successMetric: 样本加注记录里，至少 70% 能在 72 小时内自动匹配到站点、车队和合同。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 在 10-20 座站、2-3 家核心车队上，跑出第一单付费 e-甲烷走廊试点。
  hypothesis: MVP 能把异常处理和证明包准备压到足以转成生产。
  successMetric: 试点期内，手工准备证明包的时间至少下降 50%，且不到 10% 的签约加注需要紧急重分配。
  owner: 创始工程师
- horizon: 90-180 天
  experiment: 在 6 个合格分销商机会里，测试“试点 + 年度合同”的定价。
  hypothesis: 相比按席位收费，买家更接受按站点和车队收费，再叠一单付费上线试点。
  successMetric: 至少成交 2 个付费试点，且 6 个潜客里有 4 个认可按站点和车队收费这套逻辑。
  owner: 创始人/CEO
- horizon: 180-360 天
  experiment: 把第一单试点转成生产，并补上缺口预警与偏差分析。
  hypothesis: 真正的生产价值来自持续控制，而不只是一次性上线。
  successMetric: 第一位客户续成年合同，并按月用系统做分配、核对和声明输出。
  owner: 客户运营负责人
- horizon: 12-18 个月
  experiment: 把台账扩到同一老客户里的 1 个相邻生物 LNG 项目。
  hypothesis: 从窄切口长到可扩展 ARR，最快的路径就是在同一客户里做多项目扩张。
  successMetric: 一位现有客户在不比第一次部署多出 20% 以上实施时间的前提下，加购第二个燃料项目。
  owner: 解决方案与集成工程师
operations:
- 维护一套按日更新的提名气量台账和异常队列，把每次站点分配调整、加注导入和声明输出都记下来。
- 同时支持 API、CSV 和手工上传，让试点不必等燃料卡或站点厂商把全量集成做完。
- 按客户合同、认证场景和报告规则给声明模板做版本管理，这样一旦证据被质疑，就能回溯也能持续改。
- 每周和分销商的运营、商务团队开一次走廊复盘会，现场处理缺口、预估站点缓冲，并顺手抓续约风险信号。
team:
- role: 创始人/CEO
  startTiming: 第 0 月
  rationale: 亲自抓共创客户销售、走廊选择、定价和合作伙伴，因为最大的风险就是这套工作流到底够不够急、够不够值得买。
- role: 创始工程师
  startTiming: 第 0 月
  rationale: 搭出溯源台账、分配引擎、异常流程和首批数据导入模板，先把付费试点跑起来。
- role: 解决方案与集成工程师
  startTiming: 第 3-6 月
  rationale: 把燃料卡、站点或 POS、以及 ERP 的重复导入模式产品化，不让每个新客户的试点搭建都线性变慢。
- role: 合规产品负责人
  startTiming: 第 6-9 月
  rationale: 负责证据模板、识别证书的工作流规则和客户声明输出，让公司始终站在软件一边，而不是滑成报告服务商。
- role: 客户运营负责人
  startTiming: 第 9-12 月
  rationale: 把试点转成生产，管好 human-in-the-loop 质量，再把反复出现的边角问题沉淀成可复用产品规则。
milestones:
- horizon: 0-12 个月
  items:
  - 拿下 2-3 家共创客户，并在德国 / Benelux 至少做成 2 个付费上线试点。
  - 在真实试点数据上证明：加注自动匹配率达 70%+，证明包准备速度快 50%+。
  - 做出可复用导入模板：覆盖 1 条主流燃料卡数据流、1 份站点或 POS 导出，以及 1 条分销商 ERP 工作流。
- horizon: 12-24 个月
  items:
  - 把 3-5 家分销商转成年合同，并让每家至少跑 1 个持续性的低碳燃料项目。
  - 补上缺口预警、合同-加注偏差分析，以及被早期客户接受的“可用于结算的溯源链”。
  - 和燃料卡、认证方或走廊生态伙伴中的 1 家，做成渠道或数据合作。
- horizon: 24-36 个月
  items:
  - 做到 8-10 个在跑项目，基本贴住研究里的第 3 年 SOM 情景。
  - 在引入新分子前，先让至少一半的生产客户扩到相邻生物 LNG 项目或第二条走廊。
  - 沉淀出一套“被接受 / 被质疑”的声明证明包数据集，让续约胜率更高、切换成本更高。
risks:
- risk: e-甲烷供给爬坡一直偏小或不规律，拖后了分销商愿意买专门软件的时间点。
  likelihood: Medium
  impact: High
  mitigation: 先卖上线准备和声明保障；当 e-甲烷吞吐还薄时，就去打更大的存量生物 LNG 项目。
- risk: 证书口径和客户证明标准在车队、托运人和报告框架之间持续碎片化。
  likelihood: High
  impact: High
  mitigation: 同时支持物理走廊证明和识别证书的证据模式；模板按合同走，默认采用更保守的溯源要求。
- risk: 燃料卡、POS 和 ERP 的集成比预期更难，逼公司滑向重定制服务。
  likelihood: High
  impact: High
  mitigation: 先从文件导入起步，只盯滩头市场里最常见的几套系统，先补集成深度，再扩销售广度。
- risk: 燃料卡或燃料运营厂商等现有玩家，打包出足够多的邻近功能来压缩定价。
  likelihood: Medium
  impact: Medium
  mitigation: 把差异化压在跨系统溯源、异常处理和被客户接受的声明输出上，并主动接到现有厂商体系里，而不是试图整套替掉他们。
- risk: 货运减排预算更快转向电池电动线路，快过可再生气体项目本身的扩张速度。
  likelihood: Medium
  impact: High
  mitigation: 只盯那些燃气卡车和可再生气体供给已经在跑的走廊，用现有流程的 ROI 说服客户，而不是讲一套大而泛的燃料转型叙事。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这轮钱要覆盖 18 个月：把 MVP 搭出来，跑 2-4 个分销商付费试点，沉淀可复用的数据集成模板，招 1 位合规产品负责人、1 位解决方案人才，并在公司尝试更大的市场撮合或多分子战略前，先证明试点能转生产、还能在同一客户里扩到相邻生物 LNG 项目。
