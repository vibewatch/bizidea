jobsToBeDone:
- job: 当我上线第一批 e-甲烷供应计划时，帮我把有限气量分到不同站点和车队，这样我就能兑现走廊承诺，不至于断供，也不用天天救火。
  currentAlternative: 靠表格、电话沟通站点、再加上燃料卡导出手工分配
  successMetric: 已签约 e-甲烷气量里，未错失加注且无需紧急重分配的交付占比
- job: 当托运人要求我证明某条线路确实用了低碳燃料时，帮我把实际加注、合同和声明对齐，这样我才能守住定价，也更容易续约。
  currentAlternative: 可持续发展团队的工作簿加上人工收集文件
  successMetric: 产出一套客户可用的证明包所需时间，以及被质疑的声明次数
