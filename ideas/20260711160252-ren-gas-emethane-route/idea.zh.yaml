problem: 第一波上线 e-甲烷的可再生气体分销商，缺的并不只是分子本身；他们还得把明确的低碳气量承诺给车队和走廊，同时又不能把站点运营搞乱。眼下，承购计划、站点库存、车队提名、燃料卡加注数据和客户声明证明包，散落在表格、ERP 备注和顾问搭的报告里。只要合同气量、实际加注和排放声明三者里有一处对不上，就可能引发断供、货运承诺失约，或者让托运人不再信。
targetUser:
  primary: 德国或 Benelux 一家可再生 LNG 分销商的可再生燃料运营负责人，正准备在 30-80 座站的网络上铺开 e-甲烷供给
  secondary: 在固定货运线路上采购保量低碳燃料的 LNG 车队可持续发展与燃料采购负责人
  buyer: 可再生气体分销商的首席商务官，或可再生燃料负责人
startupThesis:
  nonObviousInsight: 稀缺资产不只是不多的 e-甲烷产能，更是能不能把走廊跑稳、跑得可信。一旦分子能进现有站点和卡车，价值就会从产能本身转向那套软件：负责预留、调度、结算，并在具体线路上证明气量确实是对的。
  beachhead: 德国和 Benelux 的可再生气体分销商，运营 30-80 座公共 LNG 站，刚签下第一批长期 e-甲烷承购，并要把这批燃料分给 3-10 家核心重卡车队、跑固定货运走廊。
  wedge: 一套逐站分配 e-甲烷、并把证据链跑通的控制塔：把供应商提名、站点库存、车队预留、加注核对和面向托运人的碳证明串起来。
  whyNowCatalyst: Ren-Gas 的 EUR 1B 承购、已获批的 Tampere 项目，以及 Alternoil 的 55 座站网，把 e-甲烷从“未来燃料”的宏大命题，直接推成了重卡货运眼前的走廊运营问题。
  ventureScalePath: 先从公路货运分销商的 e-甲烷走廊上线软件切入，再往结算、保量交易市场，以及欧洲范围内生物 LNG、氢气、HVO 等低碳运输燃料的多分子运营工作流扩出去。
solution: 这款产品是一座给可再生气体分销商用的走廊控制塔，服务对象是那些想借现有 LNG 基础设施上线 e-甲烷的公司。它把工厂层面的承购，拆成站点层面的分配计划，让分销商能按指定车队和指定走廊预留可用气量，并把站点和燃料卡记录里的实际加注核对清楚。每一次交付都会留下经得起审计的链路，把供应批次、加注气量、客户合同和排放声明连起来。第一版先解决上线准备和证明问题；等更多低碳燃料项目跑起来，这套数据会自然长成结算自动化、缺口预警和定价洞察。
goToMarketSeed:
  firstCustomer: 德国一家拥有 40-60 座站的可再生 LNG 分销商，刚签下第一份 e-甲烷供给合同，服务 2-5 家核心卡车车队，覆盖重复性的商超、包裹或消费品运输线路
  buyingTrigger: 分销商签下第一份长期 e-甲烷承购，或一份由托运人背书、要求保量和可审计证明的低碳货运合同
  currentAlternative: 商品表格、ERP 录入、站点 POS 导出、燃料卡报表，以及顾问搭的碳核算工作簿
  switchingReason: 有了这套平台，分销商上线 e-甲烷时就不用超卖走廊气量，也不用把每个站的实际加注都手工对账，更不会因为低碳货运声明被质疑而翻车。
  pricingHypothesis: 按活跃站点和签约车队收年度 SaaS 费，再按加注记录条数或所管理的低碳燃料 MWh 收用量费。
