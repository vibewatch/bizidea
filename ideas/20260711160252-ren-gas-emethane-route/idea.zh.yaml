topRisks:
- name: 供给爬坡太慢
  description: 如果 Tampere 或后续供给爬得太慢，分销商可能不会为一个很小的试点单独买软件。
  mitigation: 第一版先卖成“上线准备 + 声明保障”的工作流软件，在大规模吞吐到来前也有用。
- name: 现有厂商把邻近功能打包进去
  description: 一旦 e-甲烷项目开始被看见，ERP、燃料卡或商品交易软件厂商可能很快补上轻量分配界面。
  mitigation: 接到现有系统上，先拿下跨系统核对和低碳声明逻辑，再用现成的走廊上线模板，比横向厂商更快交付。
- name: 核算标准持续碎片化
  description: 分销商和托运人可能对什么证据足以支撑低碳货运声明，始终谈不拢。
  mitigation: 先从保守的证据链和可配置的声明模板做起，紧贴客户合同条款，再围绕核心客户真正接受的标准慢慢收敛。
