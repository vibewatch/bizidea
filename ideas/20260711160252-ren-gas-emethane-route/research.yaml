competitors:
- name: DKV Mobility
  stage: incumbent
  wedge: Fuel cards, pan-European acceptance, alternative-fuel access, and fleet-emissions reporting.
  pricing: Custom/contracted; no public price on reviewed pages.
  strength: Owns a transaction rail and already markets bio-CNG/bio-LNG plus CO2e reporting.
  weaknessVsUs: Does not reserve scarce renewable-gas volume by station and fleet or maintain supplier-batch-to-claim lineage.
  sourceRefs:
  - 5
  - 6
- name: UTA Edenred
  stage: incumbent
  wedge: Fuel-card acceptance, LNG/CNG network access, and monthly fleet-emissions reports from purchased fuel.
  pricing: Custom/contracted; no public price on reviewed pages.
  strength: Strong billing data and direct access to haulier workflows.
  weaknessVsUs: Calculates purchased-fuel emissions but does not orchestrate nominations, inventory buffers, or customer proof packs.
  sourceRefs:
  - 7
  - 39
- name: PDI Technologies
  stage: incumbent
  wedge: Fuel reconciliation, supply-chain management, and wholesale/commercial fueling operations software.
  pricing: Custom enterprise pricing; no public price on reviewed pages.
  strength: Deep understanding of fuel operations and the financial risk of unreconciled volumes.
  weaknessVsUs: Optimises fuel operations broadly but is not specialised for renewable-gas allocation, certificates, or shipper-facing claims.
  sourceRefs:
  - 8
- name: CarbonChain
  stage: scale-up
  wedge: Supply-chain carbon accounting, biofuel emissions modelling, and reporting frameworks.
  pricing: Custom enterprise pricing; no public price on reviewed pages.
  strength: Strong emissions-accounting credibility for complex commodity value chains.
  weaknessVsUs: It models emissions but is not a live corridor-operations system tied to station reservations and uplift reconciliation.
  sourceRefs:
  - 9
- name: STX Group
  stage: incumbent
  wedge: Biomethane market development, attribute certificates, and commercial structures around renewable-gas demand.
  pricing: Brokered/certificate-market commercial terms; no public software price on reviewed pages.
  strength: Close to certificate economics and market adoption of biomethane.
  weaknessVsUs: Helps create demand and certificates, but not the day-to-day station and fleet workflow needed to fulfil corridor commitments.
  sourceRefs:
  - 40
  - 13
