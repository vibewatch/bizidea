    - 6
    - 7
  validationPlan:
  - priority: high
    question: Do distributors already manage station reservations, anchor-fleet commitments, and shortage reallocations outside their fuel-card and ERP tools?
    evidenceToGather: Three workflow maps from German or Benelux renewable-gas distributors showing allocation, uplift reconciliation, and month-end claim preparation.
  - priority: high
    question: Will shippers pay for physical-lane proof, or will certificate-backed book-and-claim satisfy procurement and sustainability teams?
    evidenceToGather: Five shipper/fleet interviews comparing preferred evidence packs, certificate acceptance, and required contract language for low-carbon freight claims.
  - priority: medium
    question: Can DKV, UTA, station vendors, and distributor ERPs expose raw uplift and inventory data without multi-year integration projects?
    evidenceToGather: API and data-export diligence with one fuel-card provider, one station/POS vendor, and one distributor IT team.
