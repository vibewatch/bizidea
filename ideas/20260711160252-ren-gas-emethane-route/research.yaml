  geographicConsiderations:
  - point: Germany is the cleanest initial wedge because Alternoil already frames itself as the country’s largest renewable LNG distributor and the freight market sits at the centre of continental road corridors.
    sourceRefs:
    - 1
    - 3
  - point: Benelux and Rotterdam matter for cross-border logistics and corridor orchestration even if the first customer is German, because port and hinterland tools shape truck flows.
    sourceRefs:
