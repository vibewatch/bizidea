problem: >-
  Renewable-gas distributors launching first-wave e-methane do not just need
  molecules; they need to promise specific low-carbon volume to fleets and
  corridors without breaking station operations. Today, offtake schedules,
  station inventory, fleet nominations, fuel-card uplift data, and customer
  claim packs live across spreadsheets, ERP notes, and consultant-built
  reports. A single mismatch between contracted volume, actual dispensing, and
  emissions claims can create stockouts, broken freight commitments, or
  credibility loss with shippers.
targetUser:
  primary: "Head of Renewable Fuels Operations at a German or Benelux renewable-LNG distributor opening e-methane supply across a 30-80 station network"
  secondary: "Sustainability and fuel-procurement leads at LNG trucking fleets buying guaranteed low-carbon fuel on fixed freight lanes"
  buyer: "Chief Commercial Officer or Head of Renewable Fuels at a renewable-gas distributor"
startupThesis:
  nonObviousInsight: "The scarce asset is not only e-methane production; it is trustworthy corridor execution. Once the molecule can flow through existing stations and trucks, value shifts to the software that reserves, routes, settles, and proves the right low-carbon volume at the lane level."
  beachhead: "Renewable-gas distributors in Germany and Benelux operating 30-80 public LNG stations, signing their first long-term e-methane offtake, and allocating that fuel to 3-10 anchor heavy-duty fleets on recurring freight corridors."
  wedge: "A station-by-station e-methane allocation and evidence control tower that links supplier nominations, station inventory, fleet reservations, uplift reconciliation, and shipper-facing carbon proof."
  whyNowCatalyst: "Ren-Gas's EUR 1B offtake, permitted Tampere project, and Alternoil's 55-station network turn e-methane from a future-fuel thesis into an immediate corridor-operations problem for heavy freight."
  ventureScalePath: "Start with e-methane corridor launch software for road-freight distributors, then expand into settlement, guaranteed-volume marketplaces, and multi-molecule operating workflows for bio-LNG, hydrogen, HVO, and other low-carbon transport fuels across Europe."
solution: >-
  The product is a corridor control tower for renewable-gas distributors
  rolling out e-methane through existing LNG infrastructure. It converts
  plant-level offtake into station-level allocation plans, lets distributors
  reserve eligible volume for named fleets and corridors, and reconciles actual
  uplift from station and fuel-card records. Each delivery gets an auditable
  chain linking supplier batch, dispensed volume, customer contract, and
  emissions claim. The first release focuses on launch readiness and proof, but
  the dataset compounds into settlement automation, shortage alerts, and
  pricing intelligence as more low-carbon fuel programs come online.
goToMarketSeed:
  firstCustomer: "A 40-60 station renewable-LNG distributor in Germany with a first signed e-methane supply contract and 2-5 anchor trucking fleets serving recurring grocery, parcel, or consumer-goods lanes"
  buyingTrigger: "The distributor signs its first long-term e-methane offtake or a shipper-backed low-carbon freight contract that requires guaranteed volume and auditable claims"
  currentAlternative: "Commodity spreadsheets, ERP entries, station POS exports, fuel-card reports, and consultant-built carbon accounting workbooks"
  switchingReason: "The platform lets the distributor launch e-methane without overselling corridor volume, manually reconciling every station uplift, or risking disputed freight claims"
  pricingHypothesis: "Annual SaaS fee by active station and contracted fleet, plus usage-based pricing on uplift records or MWh of low-carbon fuel managed"
