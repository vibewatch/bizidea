topRisks:
  - name: "Supply ramp stays slow"
    description: "If Tampere or follow-on supply ramps slowly, distributors may delay buying dedicated software for a small pilot."
    mitigation: "Sell the first version as pilot-readiness and claim-assurance workflow software that is useful before full throughput arrives."
  - name: "Incumbents bundle adjacent features"
    description: "ERP, fuel-card, or commodity-trading vendors could add lightweight allocation screens once e-methane programs become visible."
    mitigation: "Integrate with incumbent systems, own the cross-system reconciliation and low-carbon claim logic, and ship corridor-launch templates faster than horizontal vendors."
  - name: "Accounting standards stay fragmented"
    description: "Distributors and shippers may disagree on what evidence is sufficient to support a low-carbon freight claim."
    mitigation: "Start with conservative evidence chains and configurable claim templates tied to customer contract terms, then standardize around what anchor customers accept."
