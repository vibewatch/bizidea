differentiator: >-
  Fuel-card systems know where a truck bought fuel, commodity tools know what
  was contracted, and ESG tools know how to format a report, but none of them
  connect those facts into a single operational promise for low-carbon freight
  corridors. This product starts precisely at that junction: station
  allocation, contracted volume assurance, and claim evidence for a drop-in
  molecule moving through legacy infrastructure. Its moat is the station,
  fleet, and contract performance data that reveals which corridors can
  actually support guaranteed low-carbon service and at what margin.
