scenarios:
  downside:
    description: Pilot conversion and second-program expansion both slip, so the company exits Y3 with 8 live programs and lower proof-pack monetization.
    y3RevenueK: 1907.0
    y3EbitdaK: -355.7
    cashLowPointK: 495.3
    keyAssumptionChanges:
      - Only 5 live programs are active at Q4Y2 and 8 at Q4Y3 instead of 7 and 10.
      - Realized program value exits around $23.5K/month rather than $24K with weaker same-account expansion.
      - Gross margin tops out near 66% because uplift matching and evidence prep stay more manual.
  base:
    description: Two paid pilots land by M6, the company reaches 7 live programs by Q4Y2 and 10 by Q4Y3, and exit ARR approaches $2.9M.
    y3RevenueK: 2532.5
    y3EbitdaK: 135.6
    cashLowPointK: 1229.8
    keyAssumptionChanges:
      - All assumptions held as modeled.
  upside:
    description: Partner referrals and earlier same-account expansion lift the company to 12 live programs by Q4Y3 with better margin reuse.
    y3RevenueK: 3068.5
    y3EbitdaK: 543.8
    cashLowPointK: 1442.2
    keyAssumptionChanges:
      - Live programs reach 8 by Q4Y2 and 12 by Q4Y3 as partner-led warm intros shorten the sales cycle.
      - Mature program value reaches roughly $25K/month because second corridors and bio-LNG expansions land earlier.
      - Gross margin reaches 72% by late Y3 as reusable templates cut manual evidence work faster than planned.
sensitivity:
  - variable: ARPU
    downsideCase: Mature program value stalls around $21K-$23.5K monthly because customers do not add second corridors or bio-LNG programs.
    baseCase: Programs start near $20K/month and mature toward $24K/month by Q4Y3.
    upsideCase: Mature value reaches roughly $25K/month as usage fees and expansion land earlier.
    y3RevenueImpactK: -320.0
    cashImpactK: -225.0
  - variable: sales cycle
    downsideCase: Pilot-to-production conversion slips by one quarter and Q4Y2 exits with 5 live programs instead of 7.
    baseCase: Two paid pilots land by M6 and the company reaches 5 annual distributors by Q4Y2.
    upsideCase: Design partners convert one quarter faster and partner referrals start contributing in Y2.
    y3RevenueImpactK: -350.0
    cashImpactK: -350.0
  - variable: gross margin
    downsideCase: Exit gross margin stalls near 66% because claim packs and reconciliation stay services-heavy.
    baseCase: Exit gross margin reaches 70% in line with the BP target.
    upsideCase: Exit gross margin reaches 72% as reusable templates compress manual delivery faster.
    y3RevenueImpactK: 0.0
    cashImpactK: -155.0
  - variable: hiring pace
    downsideCase: One extra delivery-oriented hire is needed in Y2 and one extra support hire is needed in Y3 to keep pilots from slipping.
    baseCase: The team stays lean at 7 FTE by Q4Y2 and 10 FTE by Q4Y3.
    upsideCase: Template reuse lets the company defer one late-Y3 hire without slowing customer launches.
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
  - variable: churn
    downsideCase: Monthly churn rises to 3.0% if certificate-only reporting proves acceptable and the workflow becomes less sticky.
    baseCase: Monthly churn stays at 2.0% for an integrated distributor workflow.
    upsideCase: Monthly churn falls to 1.0% once accepted proof packs become embedded in renewals.
    y3RevenueImpactK: -180.0
    cashImpactK: -125.0
  - variable: CAC
    downsideCase: $150K CAC if channel and data partners do not materialize and direct travel-heavy selling persists.
    baseCase: $120K CAC based on Y1-Y2 S&M spend over the first 5 annual distributor customers.
    upsideCase: $90K CAC if warm partner introductions and references shorten close cycles.
    y3RevenueImpactK: 0.0
    cashImpactK: -150.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Pilots["Paid launch pilots"] --> Programs["Live station-fleet programs"]
      Programs -->|$20K-$24K monthly value| Revenue["Revenue"]
      Revenue -->|67%-70% gross margin by Y3| GrossProfit["Gross Profit"]
      GrossProfit -->|minus opex| Cash["Cash Position"]
      Templates["Reusable fuel-card/POS/ERP templates"] -.->|lift margin| GrossProfit
      ProofPacks["Accepted claim packs"] -.->|expand accounts| Programs
modelSanity:
  - checkName: Revenue engine
    finding: Revenue is driven by growing from 2 paid pilots by M6 to 10 live programs at roughly $24K monthly value by Q4Y3, which yields $2,532.5K Y3 revenue and an exit ARR near the researched $2.8M-$2.9M SOM case.
  - checkName: Must go right
    finding: The company must prove repeatable data access and accepted proof packs fast enough to reach 5 annual distributor customers by Q4Y2 before carrying more than one dedicated sales hire.
  - checkName: Model breaks if
    finding: If certificate-only reporting is good enough or integrations remain bespoke, the downside scenario falls to $1,907.0K Y3 revenue, -$355.7K EBITDA, and a $495.3K cash floor.
  - checkName: Next-round proof
    finding: The next round is justified once 5 production distributors, one channel or data partner, 70%+ auto-match, and the first same-account bio-LNG expansion are live, which is exactly what the $2.0M pre-seed is sized to finance.
sanityChecks:
  ruleOf40: Y3 revenue growth 56.2% ($2,532.5K / $1,621.0K - 1) + Y3 EBITDA margin 5.4% ($135.6K / $2,532.5K) = 61.6%.
  burnMultiple: Y1 burn multiple 0.5x ($540.7K burn / $1,056K exit ARR); Y2 burn multiple 0.2x ($225.0K burn / $918K net-new ARR).
  revenuePerFte: Y3 $295K per average FTE (about 8.6 average FTE versus a vertical SaaS benchmark of roughly $200K-$350K).
  flags:
    - Reaching 10 live programs by Q4Y3 implies capturing a large share of the researched 24-program Germany/Benelux beachhead, so the go-to-market execution burden is high even though the absolute revenue target is modest.
    - The model assumes realized value rises from $20K/month pilot economics to $24K/month mature programs by late Y3; if second-corridor or bio-LNG expansion does not land, revenue compresses toward the downside case.
    - Gross margin only reaches the BP target of 70% if file-based imports and accepted proof packs become reusable; bespoke evidence prep would keep the business services-heavy.
    - The downside scenario low cash point of $495.3K leaves limited room for a failed integration partner or a quarter of delayed pilot conversions even though the base case ends Y3 with $1,369.8K cash.
