slug: emethane-corridor-assurance-os
date: '2026-07-11'
currency: USD
modelStartMonth: 2026-08
assumptions:
  - id: A1
    name: Model start month
    value: 2026-08
    unit: YYYY-MM
    source: '[BP date 2026-07-11] the model begins in the first full month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: '2000'
    unit: K USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18] the model uses the disciplined low end of the stated range because hiring stays integration-first and founder-led sales persists through Y2.'
  - id: A3
    name: Starting paying programs
    value: '0'
    unit: count
    source: '[BP milestones 0-12 months] the company starts pre-revenue and must first close paid launch pilots.'
  - id: A4
    name: Customer definition
    value: One paying distributor program in pilot or production
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop counts paying station-fleet programs, not fleets or end stations.'
  - id: A5
    name: Paid pilot economics
    value: $60K over about 3 months (~$20K/mo)
    unit: USD/program
    source: '[BP investorMemo.firstCustomer initialContract EUR 60k-100k pilot] the base case uses the low end of the pilot range to avoid vanity.'
  - id: A6
    name: Initial production program value
    value: $240K ARR (~$20K/mo)
    unit: USD/program/year
    source: '[BP investorMemo.firstCustomer initialContract EUR 180k-300k annual platform value plus usage fees] the first production contract lands near the middle of the annual range.'
  - id: A7
    name: Mature program value with expansion
    value: $288K ARR (~$24K/mo)
    unit: USD/program/year
    source: '[Research market.som 10 live programs at roughly $280k ARR-equivalent each + BP businessModel.expansionLevers] late-Y3 value assumes some same-account second-corridor or bio-LNG expansion.'
  - id: A8
    name: Program ramp
    value: 2 paid pilots by M6, 4 paying programs by M12, 7 by Q4Y2, and 10 by Q4Y3
    unit: customersEop
    source: '[BP product.sixMonth + BP milestones 0-12, 12-24, 24-36 + Research market.som] the base case reaches the researched 10-program SOM shape only by late Y3.'
  - id: A9
    name: Gross margin ramp
    value: 45%-58% in Y1, 60%-66% in Y2, 67%-70% in Y3
    unit: gross margin percent
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions 70%+ auto-match + BP operations] early claim packs and reconciliation remain human-reviewed before reusable import templates compress delivery cost.'
  - id: A10
    name: Hiring timeline
    value: Founder CEO and founding engineer at start; solutions engineer by M4; regulatory product lead by M7; customer operations lead by M10; second engineer by M15; first sales/partnerships hire by M18; second solutions hire by M27; third engineer by M31; second customer ops hire by M34
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring prioritizes integration and regulatory depth before sales breadth.'
  - id: A11
    name: Founder CEO loaded compensation
    value: '150000'
    unit: USD/year
    source: '[BP team Founder/CEO + startup-finance heuristic for pre-seed Europe enterprise software] founder pay is lean but fully loaded for benefits and travel.'
  - id: A12
    name: Engineering loaded compensation
    value: '130000'
    unit: USD/FTE/year
    source: '[BP team Founding eng + startup-finance heuristic] corridor ledger and integration work needs senior engineers but not big-tech pay.'
  - id: A13
    name: Solutions / integration loaded compensation
    value: '110000'
    unit: USD/FTE/year
    source: '[BP team Solutions and integration engineer + startup-finance heuristic] reflects implementation ownership, data mapping, and partner enablement.'
  - id: A14
    name: Regulatory product lead loaded compensation
    value: '120000'
    unit: USD/year
    source: '[BP team Regulatory product lead + startup-finance heuristic] evidence-template and workflow-rule ownership is domain-heavy but still lean at pre-seed scale.'
  - id: A15
    name: Customer operations loaded compensation
    value: '90000'
    unit: USD/FTE/year
    source: '[BP team Customer operations lead + startup-finance heuristic] human-in-the-loop quality and renewals support can be staffed below engineering levels.'
  - id: A16
    name: Sales / partnerships loaded compensation
    value: '120000'
    unit: USD/FTE/year
    source: '[BP gtm.channels + startup-finance heuristic] the first GTM hire is relationship-led and only added after pilots prove repeatable proof-pack value.'
  - id: A17
    name: Payroll allocation to P&L lines
    value: CEO 55% S&M / 15% R&D / 30% G&A; engineering 100% R&D; solutions 25% S&M / 75% R&D; regulatory product 70% R&D / 30% G&A; customer ops 20% S&M / 40% R&D / 40% G&A; sales 100% S&M
    unit: allocation
    source: '[BP team role rationales + BP operations] this maps headcount cost into functional spend while keeping founder-led sales and delivery visible.'
  - id: A18
    name: Non-payroll opex ramp
    value: S&M about $8K-$18K/mo, R&D about $10K-$20K/mo, and G&A about $6K-$13K/mo over 36 months
    unit: USD/month
    source: '[BP operations + Research partnershipEcosystem + startup-finance heuristic] covers cloud, travel to Germany/Benelux, legal, insurance, compliance tooling, and partner enablement.'
  - id: A19
    name: Cash conversion convention
    value: EBITDA approximates cash movement
    unit: formula
    source: '[startup-finance heuristic] taxes, debt, capex, and working-capital timing are assumed immaterial at pre-seed scale.'
  - id: A20
    name: Monthly churn
    value: '2.0'
    unit: percent/month
    source: '[startup-finance heuristic for vertical enterprise operations software + BP businessModel.expansionLevers] the workflow should be sticky once integrated, but the niche and reporting uncertainty argue against assuming ultra-low churn.'
  - id: A21
    name: CAC convention
    value: $120K CAC
    unit: USD/program
    source: '[model calc: Y1-Y2 sales and marketing spend of about $596.6K divided by the first 5 annual distributor customers targeted by BP milestones] this is conservative because it counts the full proof-building GTM cost of the first cohort.'
  - id: A22
    name: Next-round milestone for funding sizing
    value: 5 production distributors, 1 channel or data partner, 70%+ uplift auto-match, 50%+ faster claim-pack preparation, and the first same-account bio-LNG or second-corridor expansion
    unit: milestone
    source: '[BP milestones 12-24 months + BP fundingAsk.useOfFundsSummary + Research validationSignals] this is the proof package the pre-seed is sized to finance with buffer.'
  - id: A23
    name: Quarterly salary convention
    value: Y2-Y3 salary rows use actual monthly hiring inside each quarter rather than only quarter-end snapshots
    unit: convention
    source: '[Headcount column convention + BP team.startTiming] this keeps the salary line consistent with the monthly hiring ramp.'
  - id: A24
    name: customersEop reporting convention
    value: customersEop includes paid pilots and production programs
    unit: convention
    source: '[model reporting convention + BP gtm.pricing] this makes the paid-launch wedge visible while recurring production mix improves over time.'
