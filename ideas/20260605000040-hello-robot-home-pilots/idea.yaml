jobsToBeDone:
  - job: When we place an assistive robot into a high-acuity patient’s home, help our team configure safe high-value daily tasks quickly, so the user reaches independence sooner without endless custom setup.
    currentAlternative: Manual home assessments, therapist notes, and one-off robot tuning sessions
    successMetric: Days from delivery to first reliable daily task and percent of deployments live within 30 days
  - job: When deployed robots start failing in different home environments, help us detect and resolve workflow breakdowns before users abandon the device, so we can scale the program without exploding support costs.
    currentAlternative: Reactive support calls, vendor troubleshooting, and caregiver improvisation
    successMetric: Monthly task success rate and support hours per active robot
