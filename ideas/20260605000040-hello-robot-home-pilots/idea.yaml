topRisks:
  - name: Channel ambiguity
    description: The market may take longer to choose whether rehab providers, OEMs, payers, or direct-pay consumers are the dominant buying channel.
    mitigation: Start with design partners that already control deployments today—complex rehab dealers and neurorehab programs—and keep the product vendor-neutral.
  - name: Hardware immaturity
    description: If assistive robots remain unreliable or ship too slowly, software buyers may postpone purchases because the installed base grows slowly.
    mitigation: Begin with monitoring, workflow tooling, and support reduction for the earliest fleets, so value appears before mass hardware adoption.
  - name: Clinical and safety liability
    description: A poorly configured task pack could create safety issues in a high-acuity home environment and damage trust quickly.
    mitigation: Keep clinicians in the approval loop, start with bounded low-risk tasks, and require explicit sign-off plus audit trails before activating new workflows.
