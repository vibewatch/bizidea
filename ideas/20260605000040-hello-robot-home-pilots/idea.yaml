problem: >-
  Assistive home robots can now help people with severe mobility impairments perform meaningful daily tasks, but every deployment still behaves like a bespoke robotics research project. Providers must survey the home, decide which tasks are safe and valuable, tune the robot to furniture and reach constraints, train caregivers, and recover quickly when the system gets stuck. Without a repeatable deployment and reliability layer, the hardware can be impressive while the actual home program remains too fragile and expensive to scale.
targetUser:
  primary: >-
    Directors of assistive technology, rehab engineering, or innovation at regional complex rehab technology dealers and neurorehab providers serving adults with severe upper-limb mobility impairments living at home.
  secondary: >-
    Occupational therapists, rehab engineers, and caregiver-training leads responsible for configuring home environments, teaching daily-living workflows, and supporting assistive robotics after installation.
  buyer: Director of Assistive Technology or VP Clinical Operations
startupThesis:
  nonObviousInsight: >-
    The bottleneck for home robotics is shifting away from robot embodiment and toward service delivery. Hello Robot’s launch suggests that a non-humanoid machine can already create real independence for high-need users; the scarce system is now the one that turns a robot, a home layout, and a patient’s daily goals into a reliable repeatable program.
  beachhead: >-
    Regional complex rehab technology dealers and outpatient neurorehab programs in the U.S. placing 10-100 wheeled assistive robots per year into the homes of adults with cervical spinal cord injury, muscular dystrophy, or comparable severe mobility impairment.
  wedge: >-
    A deployment operating system that converts home intake data, room scans, and ADL goals into validated task packs, clinician sign-off workflows, caregiver training prompts, and remote reliability monitoring for each assistive robot installation.
  whyNowCatalyst: >-
    Stretch 4 is available now, sold-out demand is already visible, and the company itself says current pilots are about learning what scales in the home, making deployment standardization newly urgent.
  ventureScalePath: >-
    Start with high-acuity assistive deployments, then expand into aging-in-place programs, home-care robotics, remote tele-assist services, and eventually the operating layer for many categories of robots entering unstructured homes and small commercial sites.
solution: >-
  Home Robot Independence Ops gives rehab providers a structured way to launch and manage each assistive robot deployment. Before installation, the provider captures a lightweight room map, target tasks such as breakfast prep or object retrieval, and the user’s reach and support constraints; the system converts that into a recommended task pack and setup checklist. After deployment, it monitors task completion, navigation failures, caregiver interventions, and downtime, then routes remote support or retraining when a workflow degrades. The product also creates a reusable library of validated home-task templates across kitchen, bedroom, doorway, and medication workflows so each new deployment starts from prior evidence rather than from scratch. That makes a small fleet of assistive robots manageable for providers that are not robotics labs.
goToMarketSeed:
  firstCustomer: >-
    A regional U.S. complex rehab technology dealer or neurorehab center piloting 10-30 wheeled assistive robots for adults with cervical spinal cord injury who live at home and need help with meal prep, reaching, and object retrieval.
  buyingTrigger: >-
    The organization buys its first batch of home robots or launches a formal pilot and discovers that each installation needs custom home setup, clinician approval, caregiver training, and ongoing support that cannot be handled through ad hoc spreadsheets and vendor calls.
  currentAlternative: >-
    One-off occupational-therapy setup, vendor support tickets, manual caregiver training, custom scripts, and reactive teleoperation or troubleshooting when the robot fails in the home.
  switchingReason: >-
    The first customer switches because the product shortens time from device delivery to reliable daily-task use while reducing failed installs, caregiver burden, and support labor per deployed robot.
  pricingHypothesis: >-
    One-time deployment fee per home plus recurring SaaS priced per active robot and monitored task pack, with premium support for remote escalation and outcomes reporting.
