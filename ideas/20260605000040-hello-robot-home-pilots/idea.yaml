differentiator: >-
  Robot OEMs will focus on hardware, core autonomy, and a small number of marquee pilots, while rehab providers are not equipped to build robotics operations software internally. This startup becomes the neutral deployment layer that captures home-layout data, task success patterns, clinician approvals, and recovery playbooks across many installations and vendors. That dataset compounds into a defensible edge because the hardest know-how in this market is not generic manipulation intelligence; it is knowing which home tasks work reliably for which user profiles under what setup conditions.
