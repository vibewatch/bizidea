slug: home-robot-independence-ops
date: '2026-06-05'
executiveSummary: >-
  This company should start as a deployment operating system for U.S. complex
  rehab dealers and neurorehab providers that are placing small fleets of
  assistive home robots into the homes of adults with severe upper-limb mobility
  impairment. The urgent pain is not proving that a robot can help in theory; it
  is getting from delivered hardware to a reliable daily task such as breakfast
  setup or object retrieval without rebuilding the workflow for every home. The
  first customer is a provider launching its first 10-30 home robot cohort and
  discovering that home survey, clinician approval, caregiver training, and
  recovery support are becoming the real bottlenecks. The wedge is deliberately
  narrow: room-scan intake, validated task packs, clinician sign-off, caregiver
  training prompts, and remote reliability monitoring for high-acuity home
  deployments. That is faster to prove than selling a broad home robotics
  platform because the buyer can measure time to first reliable ADL, failed
  installs, support hours per robot, and pilot-to-production conversion inside
  one operating workflow. The best reason to believe is that orderable hardware
  now exists and early demand is visible, while both idea.yaml and research.yaml
  point to deployment standardization as the missing layer. The biggest open
  question is budget ownership: the inputs do not resolve whether provider
  operating budgets, OEM bundles, grants, or payer-linked programs will become
  the dominant payment path. Market sizing is plausible but still narrow at the
  beachhead, so venture upside depends on expanding from severe-mobility rehab
  deployments into aging-in-place and broader home-care robot programs after the
  first workflow is repeatable.
problem:
  - Assistive home robot deployments still run like bespoke field projects, with each home requiring custom survey, task selection, safety review, and caregiver onboarding before the robot becomes useful.
  - Providers cannot scale small fleets when robot failures, home-layout variance, and support escalations are tracked through spreadsheets, vendor calls, and therapist memory instead of a repeatable operating system.
solution:
  - Provide a provider-facing deployment OS that turns room scans, user constraints, and ADL goals into validated task packs, setup checklists, clinician approvals, and caregiver training workflows.
  - Monitor task completion, navigation failures, caregiver interventions, and downtime after go-live so support teams can recover failing workflows before the user abandons the robot.
whyWeWin:
  - The company targets the operating layer between robot OEMs and rehab providers, where hardware vendors do not naturally own cross-home workflow standardization and providers are not staffed to build robotics software internally.
  - Over time the product can accumulate a defensible dataset on which task packs work for which home layouts, user profiles, and support conditions, which is more valuable in this wedge than generic manipulation intelligence alone.
strategicChoices:
  beachhead: Regional U.S. complex rehab technology dealers and outpatient neurorehab programs placing 10-100 wheeled assistive robots per year into homes of adults with cervical spinal cord injury, muscular dystrophy, or similar severe mobility impairment.
  wedgeRationale: This segment already has clinical staff, home-install responsibility, and high-acuity users who can show measurable independence gains quickly, so deployment software can prove ROI faster here than in broad consumer robotics or general aging-in-place markets.
  sequencingRationale: Start with bounded high-value ADL workflows and clinician-reviewed deployment tooling for one robot category, then add repeatable monitoring, outcomes reporting, and OEM co-sell once live pilots prove lower support burden and faster activation; broader home-care and multi-robot expansion should wait until the first task-pack library is demonstrably reusable.
  notYet:
    - Direct-to-consumer sales into fragmented household buyers
    - Humanoid or general-purpose robot orchestration beyond the wheeled assistive beachhead
    - Full teleoperation marketplace or 24-7 human concierge operations
    - Payer-integrated reimbursement products before provider-budget ROI is proven
market:
  tam: $144.0M estimated U.S. TAM based on roughly 18,000 serviceable high-acuity home-robot candidates at a blended $8,000 annual software and services ARPU.
  sam: $20.0M estimated beachhead SAM based on about 2,500 active robots across early U.S. rehab, CRT, and pilot-heavy home deployments.
  som: $2.4M estimated year-3 SOM based on about 300 active robots across roughly 10-15 provider programs at the same blended annual revenue level.
  segments:
    - Complex rehab technology dealers and neurorehab providers running early high-acuity home robot programs
    - Home-care and aging-in-place programs that can adopt the workflow after the severe-mobility beachhead is proven
  buyingProcess: >-
    The champion is typically the director of assistive technology, rehab
    engineering lead, or clinical operations owner once the first robot cohort
    makes support burden visible. The economic buyer is usually the same
    function or a VP of clinical operations, but the source files leave open
    whether larger scaled budgets will sit with providers, OEMs, or another
    channel.
product:
  mvp: >-
    MVP is a deployment workflow for one provider program that captures home
    intake and room-layout data, recommends a bounded task pack, records
    clinician approval, and gives caregivers scripted onboarding plus remote
    alerting when the workflow degrades.
  sixMonth: Launch 2-3 production pilots with room-scan intake, task-pack templates for a small set of ADLs, clinician sign-off, caregiver training prompts, and dashboards for time to first reliable task, task success rate, and support hours per active robot.
  twelveMonth: Add reusable deployment templates across kitchen, bedroom, doorway, and medication-adjacent workflows, plus OEM-facing telemetry views and provider outcomes reporting that support pilot renewal and co-sell.
  twentyFourMonth: Expand from one wheeled assistive robot workflow into a vendor-neutral home robot operating layer for aging-in-place and home-care programs while preserving clinician-reviewed task activation and auditability.
  keyBets:
    - Providers will buy before reimbursement is clear if the product measurably shortens time to first useful task and lowers support labor.
    - A narrow library of repeatable task packs can cover enough early homes to avoid a services-only implementation model.
    - OEMs will prefer a neutral deployment layer over building provider-specific workflow software themselves.
gtm:
  wedge: >-
    Sell a paid pilot to a provider launching its first serious home-robot cohort,
    using faster activation, fewer failed installs, and lower support hours per
    active robot as the proof points rather than broad autonomy claims.
  channels:
    - Founder-led direct sales to assistive technology directors, rehab engineering leads, and VP clinical operations at complex rehab dealers and neurorehab providers
    - Design-partner pilots with regional CRT dealers and neurorehab centers already evaluating Stretch-class robots
    - OEM bundle or co-sell partnerships with assistive robot vendors and rehab engineering consultants once the first pilot data exists
  funnelTargets: "Lead to qualified pilot 15-25%, qualified pilot to paid pilot 30-50%, paid pilot to production 60%+, first provider to second cohort or second site expansion 70%+ within 9 months."
  pricing: >-
    Charge a one-time deployment onboarding fee per home plus recurring annual
    software priced per active robot and monitored task pack, with premium
    support and outcomes reporting; this matches how buyers experience value at
    cohort launch and during ongoing fleet support rather than by seat count.
businessModel:
  revenueStreams:
    - Deployment onboarding fees per home or per initial cohort
    - Annual subscription per active robot and monitored task pack
    - Premium remote support, outcomes reporting, and integration services
  unitOfValue: Active deployed assistive home robot under management with one or more validated task packs
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from the first provider cohort into additional homes, therapists, and sites within the same account
    - Add more validated task packs and outcomes reporting modules as providers broaden the robot's role
    - Extend the workflow to additional home-care and aging-in-place robot programs after the severe-mobility wedge is proven
strategyMap:
  northStarMetric: Monthly active deployed robots reaching target task-success thresholds within 30 days of installation
  inputMetrics:
    - Days from hardware delivery to first reliable ADL task
    - Percentage of deployments live within 30 days
    - Monthly task success rate by task pack
    - Support hours and caregiver interventions per active robot
    - Paid pilot to production conversion rate
  moatsToBuild:
    - Cross-home dataset linking room topology, user profile, task pack, and failure mode to deployment outcomes
    - Library of clinician-approved task-pack templates and recovery playbooks by workflow type
    - Provider and OEM trust built through auditable task activation, intervention logging, and outcomes reporting
  killCriteria:
    - Fewer than 3 paid provider pilots signed within 12 months in the defined beachhead
    - No pilot shows at least 25% faster time to first reliable task or at least 20% lower support hours per robot versus the baseline process
    - Fewer than 60% of paid pilots convert to annual production because homes remain too custom or buyers reject the budget case
  mermaid: |
    flowchart LR
      Wedge[Assistive home deployment wedge] --> MVP[Deployment OS MVP]
      MVP --> Proof[Faster activation and lower support burden]
      Proof --> Expansion[Provider expansion and OEM co-sell]
investorMemo:
  verdict:
    call: Watch
    conviction: Clear customer pain and a coherent wedge, but conviction is limited by budget ambiguity, small near-term market size, and hardware adoption risk.
    whyBelieve: Orderable assistive home robots now create a concrete provider operations problem that neutral deployment software is well positioned to solve.
    whyDoubt: The beachhead may stay too narrow or too services-heavy if buyers cannot standardize task packs or if provider budgets do not materialize.
    nextDiligence: Validate 3-5 provider programs with real cohort plans, current support-hour baselines, and a credible path from paid pilot to annual production spend.
  firstCustomer:
    title: Regional complex rehab dealer launching a high-acuity home robot cohort
    profile: A U.S. provider serving adults with severe mobility impairment that is placing 10-30 wheeled assistive robots into homes and coordinating OT, caregiver training, and field support across the cohort.
    trigger: The first multi-home pilot reveals that setup, clinician sign-off, and ongoing recovery support cannot be managed through ad hoc spreadsheets and vendor tickets.
    buyer: Director of Assistive Technology or VP Clinical Operations
    initialContract: $50k-$100k paid pilot for 10-30 homes over 6-9 months, converting to roughly $8,000 blended annual revenue per active robot through recurring software, monitored task packs, and support modules.
  mustBeTrue:
    - At least 10-15 U.S. provider programs can each support enough active robots to justify the researched year-3 SOM case.
    - One provider cohort can show measurable ROI through faster activation and lower support hours before reimbursement clarity arrives.
    - A limited set of bounded ADLs can be standardized across enough homes to keep deployments productized rather than purely custom services.
    - Clinicians will trust software-mediated task activation when approvals, audit trails, and bounded workflows remain explicit.
    - OEMs will partner or at least not block a neutral deployment layer because they do not want to own provider-specific workflow operations.
  diligenceQuestions:
    - Which budget signs first in practice for the first 10-30 home cohort: provider operations, OEM bundle, grant funding, or another channel?
    - What share of early home deployments can use repeatable task packs without custom scripting or heavy teleoperation?
    - Which two or three ADLs create the fastest measurable ROI for severe-mobility users and provider programs?
    - How much post-install support time does a provider spend per active robot today, and what portion is preventable?
    - How defensible is the company if Hello Robot or another OEM decides to bundle its own deployment workflow software?
operatingAssumptions:
  - assumption: Providers launching early robot cohorts will fund deployment software from discretionary operating or innovation budgets before reimbursement pathways are clear.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots in the target segment with signed budget authority not dependent on future payer approval.
    decisionImpact: If false, the company must pivot toward OEM-bundled sales, grant-funded pilots, or a narrower services model.
  - assumption: A small initial library of task packs for meal setup, retrieval, doorway navigation, and similar bounded ADLs can cover a meaningful share of early deployments.
    basis: idea.yaml
    validationTest: In the first 20 homes, at least 60% of go-live workflows use standard templates with only minor configuration changes.
    decisionImpact: If false, product scope must narrow to one workflow or pricing must rise to cover a more services-heavy deployment model.
  - assumption: Clinician approval plus caregiver training prompts are enough to manage safety and trust for the first deployments.
    basis: research.yaml
    validationTest: Pilot accounts maintain explicit sign-off compliance and show no serious safety incident tied to unsupported task activation.
    decisionImpact: If false, the roadmap must add more restrictive controls, slower rollout, and possibly dedicated clinical operations staff.
  - assumption: OEMs will cooperate with telemetry access and co-sell once provider ROI is shown because deployment learning helps their own hardware roadmap.
    basis: operator judgment
    validationTest: Secure at least 2 OEM or integrator partnerships that allow telemetry integration or bundled selling within 12 months.
    decisionImpact: If false, the company must remain single-OEM at first or invest more in its own integration layer and direct sales motion.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 assistive technology directors, rehab engineers, and OT leads at target provider programs.
    hypothesis: The first serious robot cohort consistently creates the same activation and support bottlenecks described in the thesis.
    successMetric: At least 10 interviews confirm the same deployment pain pattern and 5 agree to share current-state workflow maps or support logs.
    owner: CEO
  - horizon: 0–90 days
    experiment: Audit baseline data from 3 design-partner programs covering installation timelines, failed installs, and support hours.
    hypothesis: Current workflows are measurable enough to support a paid ROI pilot.
    successMetric: Three partners provide baseline metrics and at least 2 show a clear improvement opportunity large enough to justify pilot pricing.
    owner: Product lead
  - horizon: 0–90 days
    experiment: Build a prototype that turns room-scan intake and user constraints into one clinician-reviewed task-pack workflow.
    hypothesis: Providers will adopt an overlay workflow without requiring full robot-control replacement.
    successMetric: One design partner uses the prototype in live or shadow deployments across at least 5 homes.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run 2 paid pilots with weekly reviews of activation time, task success, and support interventions.
    hypothesis: The product can reduce failed installs and support burden in a real provider cohort.
    successMetric: Two paid pilots signed and at least 1 shows 25%+ faster activation and 20%+ lower support hours per robot.
    owner: CEO
  - horizon: 90–180 days
    experiment: Test pricing packaging across per-home onboarding plus recurring robot subscription versus a flat cohort license.
    hypothesis: Buyers prefer pricing tied to active robots and monitored task packs because that maps to ongoing operational value.
    successMetric: Three of five qualified buyers prefer the per-active-robot model and accept a documented pilot-to-production path.
    owner: CEO
  - horizon: 180–360 days
    experiment: Launch one OEM or rehab-integrator co-sell motion using the first pilot case study.
    hypothesis: Partner distribution shortens trust-building time and improves expansion beyond founder-led direct sales.
    successMetric: One partner-sourced motion creates at least 3 qualified opportunities or 1 additional paid pilot within 6 months.
    owner: GTM lead
operations:
  - Keep every task-pack activation clinician-reviewed with audit trails and explicit rollback procedures.
  - Standardize home-intake data capture before adding more automation or adjacent workflows.
  - Run weekly scorecards on activation time, task success, support hours, and caregiver interventions for each active robot.
  - Build vendor-neutral telemetry and reporting connectors instead of replacing OEM control systems.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns the deployment workflow engine, telemetry ingestion, and task-pack configuration layer that makes the product usable in live homes.
  - role: Clinical workflow and implementation lead
    startTiming: Month 0
    rationale: Converts OT and rehab engineering practices into safe, repeatable deployment playbooks and clinician sign-off rules.
  - role: Customer success and field ops lead
    startTiming: Month 4
    rationale: Ensures early cohorts reach reliable outcomes and turns support patterns into product requirements instead of bespoke firefighting.
  - role: Solutions engineer
    startTiming: Month 6
    rationale: Reduces integration variance across OEM telemetry, provider systems, and reporting needs as pilots convert to production.
  - role: Enterprise GTM lead
    startTiming: Month 9
    rationale: Adds structured pipeline management and partner development after the first proof points exist.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid pilots with complex rehab dealers or neurorehab providers in the defined beachhead
      - Launch a production workflow for room-scan intake, clinician sign-off, caregiver training, and remote reliability monitoring
      - Prove measurable improvement in activation time, failed-install rate, and support hours per active robot
  - horizon: 12–24 months
    items:
      - Convert at least 2 pilot programs to annual production contracts
      - Expand the task-pack library across the highest-value bounded ADLs and add reusable OEM telemetry integrations
      - Establish 1-2 OEM or integrator co-sell relationships that generate qualified pipeline
  - horizon: 24–36 months
    items:
      - Reach roughly 300 active robots under management consistent with the researched year-3 SOM case
      - Expand from the first severe-mobility provider cohort into additional sites or adjacent home-care programs
      - Become the default deployment and reliability layer for early assistive home robot fleets in the chosen beachhead
risks:
  - risk: The installed base of assistive home robots may grow more slowly than expected, limiting near-term account volume.
    likelihood: High
    impact: High
    mitigation: Sell first into programs already launching cohorts and emphasize support-efficiency value that appears even at small fleet sizes.
  - risk: Budget ownership may remain fragmented across providers, OEMs, grants, and possible payer programs.
    likelihood: High
    impact: High
    mitigation: Run pricing and channel tests early, keep the product vendor-neutral, and avoid overbuilding for one reimbursement path before it is proven.
  - risk: Home variability may force too much custom configuration for a software-style gross margin profile.
    likelihood: Medium
    impact: High
    mitigation: Constrain the first deployments to a small set of bounded ADLs and refuse adjacent workflows that cannot reuse templates.
  - risk: Safety or privacy failures in high-acuity homes could slow adoption and increase oversight requirements.
    likelihood: Medium
    impact: High
    mitigation: Preserve clinician sign-off, bounded task activation, explicit emergency procedures, and auditable change logs in every deployment.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the founding engineering and clinical workflow team, 3-5 paid provider pilots, the first reusable task-pack and telemetry integrations, and enough outcome data to resolve budget ownership and pilot-to-production conversion.
