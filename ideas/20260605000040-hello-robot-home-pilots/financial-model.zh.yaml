      percentage: 40.7
    - bucket: GTM
      amountUsd: 650000
      percentage: 24.1
    - bucket: 行政
      amountUsd: 250000
      percentage: 9.3
    - bucket: 缓冲（6 个月）
      amountUsd: 700000
      percentage: 25.9
scenarios:
  downside:
    description: >-
      硬件部署节奏和服务方预算审批落地更晚，公司会低于研究中的 SOM 路径，并接近需要过桥轮融资。
    y3RevenueK: 1515
    y3EbitdaK: -845
    cashLowPointK: -110
    keyAssumptionChanges:
      - Q4Y2 只做到 130 台活跃机器人，Q4Y3 只做到 220 台，而不是 300 台。
      - 到 Y3 时实际 ARPU 只能爬到 $7.5K，因为重启用费结构的试点转正更慢。
      - 毛利率最高只能到约 67%，因为支持和实施依然偏手工。
  base:
    description: >-
      Y1 的 3 个付费试点到 Q4Y2 扩成 6–8 个服务方项目，到 Q4Y3 做到 300 台活跃机器人，与商业计划中的 SOM 路径和稳态定价一致。
    y3RevenueK: 1895
    y3EbitdaK: -616.2
    cashLowPointK: 240.4
    keyAssumptionChanges:
      - Q4Y2 达到 165 台活跃机器人，Q4Y3 达到 300 台，和研究中的 SOM 退出情景一致。
      - 一旦 启用费收入开始收敛、持续软件收入占主导，实际定价就会回到每年 $8K 的混合收入水平。
      - 因为任务包模板和遥测集成开始能跨家庭复用，毛利率在 Y3 爬到 70% 目标。
  upside:
    description: >-
      试点转正持续高于目标，而且 OEM 联合销售更早打开，因此可以在不明显增加人头的情况下更快启动新群组。
    y3RevenueK: 2205
    y3EbitdaK: -260
    cashLowPointK: 520
    keyAssumptionChanges:
      - Q4Y3 期末做到 340 台活跃机器人，而不是 300 台。
      - 因为高级支持和结果报告挂得更稳，实际 ARPU 退出时接近 $8.4K。
      - 启用流程更依赖模板、现场运营更轻，毛利率提升到 72%。
