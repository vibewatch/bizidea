fundingAsk:
  round: pre-seed
  amountM: 2.7
  runwayMonths: 24
  milestone: >-
    在 6–8 个服务方项目中做到约 165 台活跃机器人，至少把 2 个试点转成年度生产合同，并验证出 1 条 OEM 或集成商联合销售路径，同时仍保留 6 个月现金缓冲。
  useOfFunds:
