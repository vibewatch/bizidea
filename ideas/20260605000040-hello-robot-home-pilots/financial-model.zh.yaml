    y3RevenueImpactK: 0
    cashImpactK: -305
modelDiagram:
  title: 单位经济模型流转
  mermaid: |-
    flowchart LR
      Leads[Provider cohort leads] --> Pilots[Paid pilot cohorts]
      Pilots --> Robots[Active robots under management]
      Robots --> Revenue[Onboarding + recurring software revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: 收入引擎
    finding: >-
      基础情景下，收入增长来自活跃机器人从 Y1 期末的 33 台爬到 Q4Y3 的 300 台，同时稳态单机收入回到研究中的每台 $8K 水平。
  - checkName: 必须做对的事
    finding: >-
      公司必须让任务包部署足够模板化，才能在把试点转成年化生产群组的同时，跑到 70% 毛利率目标。
  - checkName: 模型何时会失灵
    finding: >-
      如果服务方预算审批或 OEM 遥测接入把销售周期拖向下行情景，在还没跑到 Y3 SOM 目标前，现金就会先掉到 0 以下。
  - checkName: 下一轮融资 proof
    finding: >-
      到 Q4Y2 能证明约 165 台活跃机器人、2 个年度转正，以及 1 条可复制的伙伴驱动扩张路径，下一轮融资才站得住。
sanityChecks:
  ruleOf40: >-
    Y3 增长 166.6% + EBITDA 利润率 -32.5% = 134.1%，方向上说明增长很强，但效率仍处在规模化前阶段。
  burnMultiple: >-
    随着活跃机器人增长带来的新增 ARR 开始快过经营现金消耗，burn multiple 从 Y2 的约 0.9x 改善到 Y3 的约 0.6x。
  revenuePerFte: >-
    按 10 名期末 FTE 计算，Y3 每人创造收入约 $189.5K（低于成熟 SaaS 基准，但符合一个实施占比较高的部署工作流业务）。
  flags:
    - 这套模型只有到 Y3 期末才摸到研究中的 300 台机器人 SOM，所以 FY2028 已确认收入仍低于 SOM 算出来的 $2.4M 退出 ARR。
    - 每名期末 FTE 对应收入仍低于典型成熟 SaaS 基准，因为临床实施和现场支持还在吃掉真实人力。
    - 源材料里预算归属仍没定，所以销售周期和 ARPU 的敏感性，比 headcount 计划更脆弱。
