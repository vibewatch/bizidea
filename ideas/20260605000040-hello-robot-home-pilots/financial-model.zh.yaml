slug: home-robot-independence-ops
date: "2026-06-05"
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-06
    unit: YYYY-MM
    source: "[BP date] 从商业计划的月份起算。"
  - id: A2
    name: pre-seed 交割后的期初现金
    value: "2700"
    unit: USDK
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2–4M] 基础情景按 $2.7M 交割建模，对应 Q4Y2 里程碑外加 6 个月缓冲。
  - id: A3
    name: 预测客户单位
    value: 处于管理中的活跃辅助型家用部署机器人
    unit: 定义
    source: >-
      [BP businessModel.unitOfValue]、[Research market.som] 都按活跃机器人计，因为定价和 SOM 口径都以机器人为单位。
  - id: A4
    name: M1 起始付费活跃机器人
    value: "0"
    unit: 数量
    source: "[BP milestones 0–12 months] 公司从零收入起步。"
  - id: A5
    name: Y1 每月净新增机器人
    value: "[0, 0, 0, 0, 0, 10, 0, 8, 4, 0, 11, 0]"
    unit: 数量
    source: >-
      [BP milestones sign 3 paid pilots]、[BP investorMemo.firstCustomer initialContract 10–30 homes] 建模为 3 批群组启动，加 1 次早期扩容。
  - id: A6
    name: Y2 机器人爬坡
    value: Q1Y2 60、Q2Y2 90、Q3Y2 125、Q4Y2 165 台活跃机器人
    unit: 数量
    source: >-
      [BP milestones 12–24 months]、[BP strategicChoices.sequencingRationale] 假设 2 个试点转正，再稳步扩群组，然后才扩大渠道。
  - id: A7
    name: Y3 机器人爬坡
    value: Q1Y3 205、Q2Y3 240、Q3Y3 270、Q4Y3 300 台活跃机器人
    unit: 数量
    source: >-
      [BP milestones 24–36 months]、[Research market.som 300 台活跃机器人] 基础情景只做到研究里的第 3 年 SOM 退出目标，不再往上抬。
  - id: A8
    name: 已实现收入节奏
    value: >-
      Y1 试点月份折算后，每台活跃机器人年化收入约为 $8.0K–$9.5K，因为一次性启用费叠加在持续软件收入之上；Y2 各季度实际 ARPU 依次为 $7.0K、$7.2K、$7.6K、$8.0K；Y3 维持 $8.0K。
    unit: USDK per active robot per year
    source: >-
      [BP gtm.pricing]、[BP investorMemo.firstCustomer.initialContract]、[Research market.bottomUpSizingDrivers blended annual revenue $8,000]，再加启用费收入口径假设。
  - id: A9
    name: 稳态 ARPU
    value: "8.0"
    unit: USDK per active robot per year
    source: >-
      [BP market TAM/SAM/SOM]、[Research market.bottomUpSizingDrivers blended annual revenue per active robot $8,000]。
  - id: A10
    name: 毛利率爬坡
    value: Y1 55%-62%; Y2 64%-68%; Y3 70%
    unit: 百分比
    source: >-
      [BP businessModel.targetGrossMarginPct 70]、[BP risks on services heaviness] 毛利率起步低于目标，因为部署和支持仍偏手工；到 Y3 才爬到目标。
  - id: A11
    name: 全成本薪资区间
    value: >-
      Founder/Exec 180；Engineering 160；Clinical/Implementation 145；Customer Success 110；Sales/Partnerships 160；G&A 90
    unit: USDK per FTE per year
    source: >-
      [BP team]、[BP experimentRoadmap owners]，再加美国 pre-seed 团队卖给临床运营场景的创业财务经验值。
  - id: A12
    name: 招聘节奏
    value: >-
      M1 创始人、创始工程师、临床工作流负责人；M4 客户成功 / 现场运营；M7 解决方案工程师；M10 企业 GTM 负责人；M16 第二位实施人员；M21 财务 / 运营；M29 第三位工程师；M31 第二位销售。
    unit: 时间安排
    source: >-
      [BP team startTiming]、[BP strategicChoices.sequencingRationale]，并按第一批验证结果后招聘放缓的节奏做平滑处理。
  - id: A13
    name: 非人力运营费用爬坡
    value: >-
      Y1 月度非人力 opex 从 12K 升到 27K；Y2 各季度从 89K 升到 123K；Y3 各季度从 135K 升到 168K。
    unit: USDK
    source: >-
      [BP operations]、[Research regulatoryLandscape]，再加偏实施型动作下差旅、云、法务、培训和 OEM 集成成本的创业财务经验值。
  - id: A14
    name: 用于单位经济模型的月流失率
    value: "1.8"
    unit: 百分比
    source: >-
      [BP killCriteria 60%+ paid-pilot to production]、[Research sensitivityCases reimbursement stays unclear]，经验口径：部署有粘性，但预算仍较敏感。
  - id: A15
    name: 每台活跃机器人的全成本 CAC
    value: "2.5"
    unit: USDK
    source: >-
      [BP gtm.funnelTargets]、[BP investorMemo.firstCustomer.initialContract]，经验假设为单批群组获客成本约 $50K，摊到一个 20 台机器人的初始项目上。
  - id: A16
    name: 机器人数量背后的账户结构
    value: >-
      Y1 大约 3 个付费试点；到 Q4Y2 约 6–8 个服务方项目；到 Q4Y3 约 10–15 个服务方项目，平均每个项目约 20 台活跃机器人。
    unit: 口径
    source: "[BP milestones]、[Research market.som] 让机器人数量与服务方项目里程碑保持一致。"
  - id: A17
    name: 现金转换简化口径
    value: 期末现金 = 期初现金 + 累计 EBITDA
    unit: 公式
    source: >-
      创业财务经验口径：这层轻资产软件模型里，不单列债务、capex 或营运资金项目。
  - id: A18
    name: 融资规模规则
    value: 融到足够跑到 Q4Y2 可复制性里程碑的资金，并额外留 6 个月缓冲
    unit: 口径
    source: >-
      开发指令 + [BP fundingAsk.runwayMonths 18] 以及 [BP investorMemo.verdict.nextDiligence]。
