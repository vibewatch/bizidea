    score: 4
    rationale: 起步滩头市场不大，但同一层部署系统可以继续扩到居家养老、家庭护理机器人，以及更广泛的非结构化环境机器人运营。
topRisks:
  - name: 渠道归属不清
    description: 市场可能需要更久才会决定，究竟是康复服务方、OEM、支付方还是自费用户会成为主导购买渠道。
    mitigation: 先从今天已经掌握部署权的共创客户切入——复杂康复经销商和神经康复项目——同时保持产品对供应商中立。
  - name: 硬件成熟度不足
    description: 如果辅助机器人长期不稳定，或者出货速度太慢，软件买方也可能推迟采购，因为装机基数始终长不起来。
    mitigation: 先从最早那批机器人队伍的监控、工作流工具和支持减负做起，让价值在硬件大规模普及前就先显出来。
  - name: 临床与安全责任风险
    description: 如果任务包配置失误，在高需求家庭环境里可能直接带来安全问题，信任也会很快被打穿。
    mitigation: 让临床团队始终留在审批闭环里，先从边界清楚、低风险任务做起，并在启用新工作流前要求明确签核和审计轨迹。
