jobsToBeDone:
  - job: 当我们把辅助机器人部署进高需求患者家里时，帮团队尽快配出既安全又高价值的日常任务，让用户更早获得独立性，而不是陷在没完没了的定制配置里。
    currentAlternative: 手工家庭评估、治疗师笔记，以及一次一改的机器人调参
    successMetric: 从交付到第一个稳定日常任务的天数，以及 30 天内成功上线的部署占比
  - job: 当已部署机器人在不同家庭环境里开始出故障时，帮我们在用户放弃设备之前先发现并修好工作流断点，这样项目扩大时支持成本才不会失控。
    currentAlternative: 被动支持电话、供应商排障，以及照护者现场临场应对
    successMetric: 每月任务成功率，以及每台活跃机器人的支持小时数
