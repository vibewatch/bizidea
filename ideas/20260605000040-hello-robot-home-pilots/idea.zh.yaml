problem: >-
  现在，辅助型家用机器人已经能帮重度行动障碍人群完成有意义的日常任务，但每一次部署依旧像单独做一个机器人科研项目。服务方得先勘察家庭环境，判断哪些任务既安全又值得做，再按家具布局和触达约束调机器人，培训照护者，还得在系统卡住时尽快救火。没有一层可复制的部署和可靠性系统，硬件可以很惊艳，真正落到家里的项目却仍然脆弱、昂贵，根本放不大。
targetUser:
  primary: >-
    美国区域性复杂康复技术经销商和神经康复服务机构中的辅助技术、康复工程或创新负责人，他们服务的是住在家中、上肢行动能力严重受限的成年用户。
  secondary: >-
    负责配置家庭环境、教授日常生活工作流，并在安装后持续支持辅助机器人使用的作业治疗师、康复工程师和照护培训负责人。
  buyer: 辅助技术总监或临床运营副总裁
startupThesis:
  nonObviousInsight: >-
    家庭机器人真正的瓶颈，正在从“机器人长什么样”转向“服务怎么交付”。Hello Robot 这次发布说明，对高需求用户来说，非人形机器已经足以带来真实独立性；如今真正稀缺的系统，是那套能把机器人、家庭布局和患者日常目标拼成稳定、可复制项目的方法。
  beachhead: >-
    美国区域性复杂康复技术经销商和门诊神经康复项目：它们每年把 10–100 台轮式辅助机器人部署到颈髓损伤、肌营养不良或类似重度行动障碍成年人的家中。
  wedge: >-
    一套部署操作系统，把家庭入组数据、房间扫描和 ADL 目标转成经过验证的任务包、临床签核工作流、照护者培训提示，以及面向每次辅助机器人安装的远程可靠性监控。
  whyNowCatalyst: >-
    Stretch 4 已经开售，第一波售罄需求也已经出现，公司自己又明确表示现阶段试点是在学习什么能在家庭里规模化，这让部署标准化一下子变得很急。
  ventureScalePath: >-
    先从高需求辅助部署切入，再扩到居家养老项目、家庭护理机器人、远程辅助服务，最后变成多类机器人进入非结构化家庭和小型商业场景时都绕不开的操作层。
solution: >-
  这套居家机器人独立运营系统，给康复服务方一套结构化方法去上线和管理每一次辅助机器人部署。安装前，服务方先采一份轻量房间地图、目标任务（比如备早餐或拿取物品），再记录用户的触达和支撑约束；系统再把这些信息转成推荐任务包和安装清单。部署后，系统持续盯任务完成情况、导航失败、照护者介入和停机时长，一旦某条工作流开始掉线，就把远程支持或再培训派上去。产品还会沉淀一套可复用的家庭任务模板库，覆盖厨房、卧室、门口和用药等场景，让下一次部署不是从零开始，而是直接站在前面的验证结果上。这样一来，即便服务方不是机器人实验室，也能把一小队辅助机器人管起来。
goToMarketSeed:
  firstCustomer: >-
    美国区域性复杂康复技术经销商或神经康复中心，正在为住家中的颈髓损伤成年人试点 10–30 台轮式辅助机器人，这些用户需要在备餐、取物和够取等场景获得帮助。
  buyingTrigger: >-
    这家机构买下第一批家用机器人，或正式启动试点后发现：每个家庭安装都要做定制化布置、临床审批、照护培训和持续支持，靠零散表格加供应商电话根本管不过来。
  currentAlternative: >-
    一次性的作业治疗配置、供应商支持工单、手工照护培训、自写脚本，以及机器人在家庭里出问题后再临时远程接管或排障。
  switchingReason: >-
    首个客户会切换，是因为这套产品能把设备交付到稳定执行日常任务之间的时间缩短，同时减少部署失败、照护负担，以及每台已部署机器人的支持人力。
  pricingHypothesis: >-
    按家庭收一次性部署费，再按活跃机器人和被监控任务包收持续 SaaS 订阅费；远程升级支持和结果报告另算高级服务。
whyNow:
  - point: 非人形机器人突然更像一条可信的家庭路线，因为当前最强的真实家庭案例，说的是更安全、更容易部署的轮式系统，而不是困在实验室里的人形机器人。
    signalRefs: ["可部署的轮式机器人在真实家庭里比人形机器人叙事更能落地"]
    sourceRefs: [1, 3]
  - point: 重度行动障碍用户现在已经开始看到具体的独立生活收益，这意味着买方可以围绕日常生活结果来批预算，而不是押注未来某一天才会到来的全自主能力。
    signalRefs: ["重度行动障碍用户已经看到立竿见影的日常生活 ROI"]
    sourceRefs: [1, 2, 3]
  - point: 商业化硬件今天就有明确的试点价格可买，这让部署可复制性从未来的机器人研究问题，变成了眼前的运营问题。
    signalRefs: ["家用机器人硬件已经可以下单，适合试点项目"]
    sourceRefs: [2]
  - point: 第一批量产售罄，说明早期需求已经足够明显，支持和铺开瓶颈会在市场走到大众消费规模之前先冒出来。
    signalRefs: ["在大众消费者准备好之前，早期需求已经出现"]
    sourceRefs: [3]
  - point: Hello Robot 明说现在的试点就是为了摸清什么能在家庭里规模化，这等于直接验证：真正缺的是部署和可靠性知识，而不是机器人本体的新鲜感。
    signalRefs: ["缺的不是机器人新奇性，而是可复制的部署层"]
    sourceRefs: [1]
differentiator: >-
  机器人 OEM 会把精力放在硬件、核心自主能力和少数标杆试点上，而康复服务方也没能力自己做一套机器人运营软件。这家公司要做的，是中立的部署层：把跨安装点、跨供应商的家庭布局数据、任务成功模式、临床审批和恢复剧本沉淀下来。这套数据会越滚越厚，最后变成真正的防守点，因为这个市场最难的 know-how 不是通用操作智能，而是知道“什么样的家庭任务，在什么样的用户画像和布置条件下，才真能稳定跑通”。
