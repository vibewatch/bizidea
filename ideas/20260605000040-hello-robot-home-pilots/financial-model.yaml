fundingAsk:
  round: pre-seed
  amountM: 2.7
  runwayMonths: 24
  milestone: >-
    Reach roughly 165 active robots across 6-8 provider programs, convert at least 2 pilots to
    annual production, and prove one OEM or integrator co-sell path while retaining a 6-month cash
    buffer.
  useOfFunds:
    - bucket: Engineering
      amountUsd: 1100000
      percentage: 40.7
    - bucket: GTM
      amountUsd: 650000
      percentage: 24.1
    - bucket: G&A
      amountUsd: 250000
      percentage: 9.3
    - bucket: Buffer (6 mo)
      amountUsd: 700000
      percentage: 25.9
scenarios:
  downside:
    description: >-
      Hardware rollouts and provider budget approvals land later, leaving the company below the
      researched SOM path and close to needing a bridge round.
    y3RevenueK: 1515
    y3EbitdaK: -845
    cashLowPointK: -110
    keyAssumptionChanges:
      - Q4Y2 ends at 130 active robots and Q4Y3 ends at 220 instead of 300.
      - Realized ARPU reaches only $7.5K by Y3 because onboarding-heavy pilots convert more slowly.
      - Gross margin tops out near 67% because support and implementation stay more manual.
  base:
    description: >-
      Three paid pilots in Y1 expand into 6-8 provider programs by Q4Y2 and 300 active robots by
      Q4Y3, matching the business-plan SOM path at steady-state pricing.
    y3RevenueK: 1895
    y3EbitdaK: -616.2
    cashLowPointK: 240.4
    keyAssumptionChanges:
      - Q4Y2 reaches 165 active robots and Q4Y3 reaches 300, matching the researched SOM exit case.
      - >-
        Realized pricing normalizes to the $8K blended annual revenue level once onboarding fees
        taper and recurring software dominates.
      - >-
        Gross margin reaches the 70% target by Y3 because task-pack templates and telemetry
        integrations become reusable across homes.
  upside:
    description: >-
      Pilot conversion stays above target and an OEM co-sell opens earlier, allowing faster cohort
      launches without adding much more headcount.
    y3RevenueK: 2205
    y3EbitdaK: -260
    cashLowPointK: 520
    keyAssumptionChanges:
      - Q4Y3 ends at 340 active robots instead of 300.
      - >-
        Realized ARPU exits near $8.4K as premium support and outcomes reporting attach more
        consistently.
      - >-
        Gross margin improves to 72% because onboarding becomes more template-led and less field-ops
        heavy.
sensitivity:
  - variable: ARPU
    downsideCase: $7.2K steady-state ARPU
    baseCase: $8.0K steady-state ARPU
    upsideCase: $8.4K steady-state ARPU
    y3RevenueImpactK: -190
    cashImpactK: -133
  - variable: CAC
    downsideCase: $3.0K per active robot
    baseCase: $2.5K per active robot
    upsideCase: $2.0K per active robot
    y3RevenueImpactK: 0
    cashImpactK: -135
  - variable: churn
    downsideCase: 2.5% monthly churn
    baseCase: 1.8% monthly churn
    upsideCase: 1.2% monthly churn
    y3RevenueImpactK: -85
    cashImpactK: -110
  - variable: sales cycle
    downsideCase: Pilot-to-production stretches to 9-12 months
    baseCase: Pilot-to-production closes in about 6-9 months
    upsideCase: Pilot-to-production closes in about 4-6 months
    y3RevenueImpactK: -320
    cashImpactK: -260
  - variable: gross margin
    downsideCase: 67% exit gross margin
    baseCase: 70% exit gross margin
    upsideCase: 72% exit gross margin
    y3RevenueImpactK: 0
    cashImpactK: -76
  - variable: hiring pace
    downsideCase: Add one engineer and one implementation hire during Y2
    baseCase: Lean hiring plan shown in the headcount table
    upsideCase: Delay the third engineer until after Q2Y3
    y3RevenueImpactK: 0
    cashImpactK: -305
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Provider cohort leads] --> Pilots[Paid pilot cohorts]
      Pilots --> Robots[Active robots under management]
      Robots --> Revenue[Onboarding + recurring software revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: >-
      Base-case revenue is driven by growing from 33 active robots at Y1 exit to 300 by Q4Y3 while
      steady-state revenue settles at the researched $8K per robot level.
  - checkName: Must go right
    finding: >-
      The company must keep task-pack deployments template-led enough to hit the 70% gross-margin
      target while converting pilots into annual production cohorts.
  - checkName: Model breaks if
    finding: >-
      If provider budget approvals or OEM telemetry access slow the sales cycle toward the downside
      case, cash falls below zero before the Y3 SOM target is reached.
  - checkName: Next-round proof
    finding: >-
      The next round is justified once the company shows about 165 active robots, two annual
      conversions, and one repeatable partner-led expansion path by Q4Y2.
sanityChecks:
  ruleOf40: >-
    Y3 growth 166.6% + EBITDA margin -32.5% = 134.1%, which is directionally strong growth but still
    pre-scale on efficiency.
  burnMultiple: >-
    Burn multiple improves from about 0.9x in Y2 to about 0.6x in Y3 as net new ARR from
    active-robot growth starts to outpace operating burn.
  revenuePerFte: >-
    $189.5K Y3 using 10 exit FTE (below mature SaaS benchmarks and consistent with an
    implementation-heavy deployment workflow business).
  flags:
    - >-
      The model reaches the researched 300-robot SOM only at Y3 exit, so recognized FY2028 revenue
      is still below the $2.4M exit ARR implied by the SOM math.
    - >-
      Revenue per exit FTE remains below typical mature SaaS benchmarks because clinical
      implementation and field support still absorb real labor.
    - >-
      Budget ownership remains unresolved in the source material, so the sales-cycle and ARPU
      sensitivities are more fragile than the headcount plan.
