slug: home-robot-independence-ops
date: "2026-06-05"
currency: USD
modelStartMonth: 2026-06
assumptions:
  - id: A1
    name: Model start month
    value: 2026-06
    unit: YYYY-MM
    source: "[BP date] modeled from the month of the business plan."
  - id: A2
    name: Opening cash from pre-seed close
    value: "2700"
    unit: USDK
    source: >-
      [BP fundingAsk targetFundingRangeUsd $2–4M] base case uses a $2.7M close sized to the Q4Y2
      milestone plus a 6-month buffer.
  - id: A3
    name: Forecast customer unit
    value: active deployed assistive home robot under management
    unit: definition
    source: >-
      [BP businessModel.unitOfValue], [Research market.som] use active robots because pricing and
      SOM are both robot based.
  - id: A4
    name: Starting paying active robots (M1)
    value: "0"
    unit: count
    source: "[BP milestones 0–12 months] the company starts pre-revenue."
  - id: A5
    name: Y1 net robot adds by month
    value: "[0, 0, 0, 0, 0, 10, 0, 8, 4, 0, 11, 0]"
    unit: count
    source: >-
      [BP milestones sign 3 paid pilots], [BP investorMemo.firstCustomer initialContract 10–30
      homes] modeled as three cohort launches and one early expansion.
  - id: A6
    name: Y2 robot ramp
    value: Q1Y2 60, Q2Y2 90, Q3Y2 125, Q4Y2 165 active robots
    unit: count
    source: >-
      [BP milestones 12–24 months], [BP strategicChoices.sequencingRationale] assumes two pilot
      conversions plus measured cohort expansion before broadening channels.
  - id: A7
    name: Y3 robot ramp
    value: Q1Y3 205, Q2Y3 240, Q3Y3 270, Q4Y3 300 active robots
    unit: count
    source: >-
      [BP milestones 24–36 months], [Research market.som 300 active robots] base case reaches the
      researched year-3 SOM exit target, not above it.
  - id: A8
    name: Realized revenue schedule
    value: >-
      Y1 pilot months blend to $8.0K-$9.5K annualized per active robot because onboarding fees sit
      on top of recurring software; Y2 quarterly realized ARPU is $7.0K, $7.2K, $7.6K, then $8.0K;
      Y3 holds at $8.0K.
    unit: USDK per active robot per year
    source: >-
      [BP gtm.pricing], [BP investorMemo.firstCustomer.initialContract], [Research
      market.bottomUpSizingDrivers blended annual revenue $8,000] plus onboarding-revenue heuristic.
  - id: A9
    name: Steady-state ARPU
    value: "8.0"
    unit: USDK per active robot per year
    source: >-
      [BP market TAM/SAM/SOM], [Research market.bottomUpSizingDrivers blended annual revenue per
      active robot $8,000].
  - id: A10
    name: Gross margin ramp
    value: Y1 55%-62%; Y2 64%-68%; Y3 70%
    unit: percent
    source: >-
      [BP businessModel.targetGrossMarginPct 70], [BP risks on services heaviness] margin starts
      below target while deployments and support remain manual, then reaches target by Y3.
  - id: A11
    name: Loaded salary bands
    value: >-
      Founder/Exec 180; Engineering 160; Clinical/Implementation 145; Customer Success 110;
      Sales/Partnerships 160; G&A 90
    unit: USDK per FTE per year
    source: >-
      [BP team], [BP experimentRoadmap owners] plus startup-finance heuristic for a lean U.S.
      pre-seed team selling into clinical operations.
  - id: A12
    name: Hiring schedule
    value: >-
      M1 founder, founding engineer, clinical workflow lead; M4 customer success / field ops; M7
      solutions engineer; M10 enterprise GTM lead; M16 second implementation hire; M21 finance /
      ops; M29 third engineer; M31 second sales hire.
    unit: timing
    source: >-
      [BP team startTiming], [BP strategicChoices.sequencingRationale] with a smoothed post-Y1 ramp
      consistent with slower hiring after the first proof points.
  - id: A13
    name: Non-payroll operating expense ramp
    value: >-
      Y1 monthly non-payroll opex rises from 12K to 27K; Y2 quarterly from 89K to 123K; Y3 quarterly
      from 135K to 168K.
    unit: USDK
    source: >-
      [BP operations], [Research regulatoryLandscape], startup-finance heuristic for travel, cloud,
      legal, training, and OEM integration costs in an implementation-heavy motion.
  - id: A14
    name: Monthly churn for unit economics
    value: "1.8"
    unit: percent
    source: >-
      [BP killCriteria 60%+ paid-pilot to production], [Research sensitivityCases reimbursement
      stays unclear] heuristic for sticky but still budget-sensitive provider deployments.
  - id: A15
    name: Fully loaded CAC per active robot
    value: "2.5"
    unit: USDK
    source: >-
      [BP gtm.funnelTargets], [BP investorMemo.firstCustomer.initialContract] heuristic assumes
      roughly $50K cohort-level acquisition cost spread across a 20-robot initial program.
  - id: A16
    name: Account structure behind the robot count
    value: >-
      About 3 paid pilots in Y1, 6-8 provider programs by Q4Y2, and roughly 10-15 provider programs
      by Q4Y3 averaging about 20 active robots each.
    unit: policy
    source: "[BP milestones], [Research market.som] aligns robot counts to the provider-program milestones."
  - id: A17
    name: Cash conversion simplification
    value: ending cash equals opening cash plus cumulative EBITDA
    unit: formula
    source: >-
      Startup-finance heuristic: no debt, capex, or working-capital line is modeled for this
      asset-light software layer.
  - id: A18
    name: Funding sizing rule
    value: raise enough to reach the Q4Y2 repeatability milestone with six months of buffer
    unit: policy
    source: >-
      Developer instruction plus [BP fundingAsk.runwayMonths 18] and [BP
      investorMemo.verdict.nextDiligence].
