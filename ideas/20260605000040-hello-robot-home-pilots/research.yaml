    - 39
    - 40
  regulatoryLandscape: 'The product sits in a gray zone: ISO 13482 sets safety expectations for personal care robots; Medicare frameworks clearly cover wheelchairs, DMEPOS, and home-health services but not a provider-facing home robot deployment layer; and any explicit health or outcome claims need substantiation. [18][14][15][16][42]'
  technologyLandscape: 'Core ingredients are increasingly available: ROS-adjacent middleware, production navigation, motion planning, and real-world mobile-manipulation research all exist. The brittle gap is the last-mile layer that adapts these ingredients to a specific home, user, task pack, and recovery loop. [34][35][36][37]'
