openQuestions:
- 'Which budget clears first in practice: rehab provider operating budget, OEM bundle, research grant, employer benefit, or payer-supported home program?'
- What share of high-acuity homes can be served with repeatable task packs before custom scripting becomes necessary?
- 'Which bounded ADLs create the fastest measurable ROI: breakfast setup, object retrieval, medication access, or eyewear/grooming support?'
- How much clinician documentation and remote-audit evidence is needed to satisfy providers before activating new task packs at scale?
