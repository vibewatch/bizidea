    rationale: 'Bottom-up estimate: 302,000 prevalent U.S. tSCI cases × 59.6% tetraplegia mix ≈ 180,000 severe upper-limb cases; assume only 10% become serviceable home-robot candidates and a blended $8,000 annual software/services ARPU, yielding roughly 18,000 active units × $8,000.'
