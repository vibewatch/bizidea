reportMemo:
  executiveTakeaways:
  - Real home-assist hardware exists now, but operators still need human-in-the-loop control, pilot learning, and recovery workflows; that makes deployment software more urgent than a new embodiment layer. [1][2][4][37]
  - The best initial buyers are provider organizations, not consumers, because severe-mobility use cases require clinician sign-off, home setup, caregiver training, and support labor that families cannot standardize alone. [8][9][11][16]
  - The field is crowded with adjacent hardware and companion products, but not with neutral home-deployment operating systems; direct rivalry is therefore moderate today and likely to intensify only after fleet volumes rise. [19][24][29][31][38]
  - Budget viability depends less on replacing all care than on reducing failed installs and support hours; compared with $35/hour home-care labor and five-figure robot hardware, a provider-facing deployment layer can clear ROI if it speeds time-to-independence. [4][27][30][41]
  marketDefinition: This is not the whole consumer home-robot market. The relevant spend sits at the overlap of assistive service robots, home/personal care robots, and rehab operations software that standardizes intake, task validation, caregiver training, and remote support for high-acuity home deployments. IFR explicitly includes limited-autonomy assistance robots inside service robotics, which fits this wedge better than a pure consumer-gadget frame. [19][20][21]
  customerAndBuyer: End users are adults with severe mobility impairments living at home, especially cervical SCI and other conditions where upper-extremity function drives ADL independence, but the economic buyer is the provider organization coordinating deployment, documentation, and support. Family caregivers remain heavily involved even when professional care exists, making provider workflow the more practical early buyer wedge. [6][8][9][11][16]
  buyingTriggers:
  - point: A provider orders its first serious home-robot cohort and discovers that every install still requires bespoke room setup, task selection, and caregiver coaching.
    sourceRefs:
    - 1
    - 2
    - 24
    - 25
  - point: Clinical teams need a faster path from delivery to a reliable first daily-living outcome for high-acuity users.
    sourceRefs:
    - 2
    - 8
    - 11
  - point: Manual support becomes too expensive when staffing pressure meets high home-care labor costs.
    sourceRefs:
    - 9
    - 31
    - 41
  willingnessToPay:
    summary: Current robot price points already span from financed consumer-style models (Labrador, ElliQ) to a $29,950 assistive platform (Stretch 4), while hospital robots are sold as tailored robot-as-a-service. Against $35/hour non-medical caregiver costs, a deployment OS can justify budget if it materially shortens time-to-independence or reduces support hours per active robot.
    sourceRefs:
    - 4
    - 27
    - 30
    - 31
    - 32
    - 41
  competitiveLandscape: Today’s field splits between OEM-first assistive platforms (Hello Robot), constrained home utility robots (Labrador), companion/wellness systems (ElliQ), workflow-heavy enterprise robot operators (Diligent), and attention-grabbing humanoid aspirants (1X, Figure). None is a neutral deployment OS purpose-built for rehab-led, multi-home assistive programs. [1][2][24][29][31][38][40]
