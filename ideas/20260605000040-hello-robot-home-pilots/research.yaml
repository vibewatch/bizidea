competitors:
- name: Hello Robot Stretch 4
  stage: scale-up OEM
  wedge: Open, wheeled mobile manipulator for research, enterprise, and severe-mobility in-home pilots.
  pricing: $29,950 base plus add-ons.
  strength: Real assistive-home deployments, strong sensor stack, and an open platform that attracts developers.
  weaknessVsUs: Hardware-first and single-OEM; not a neutral deployment OS for provider workflows across many homes.
  sourceRefs:
  - 1
  - 2
  - 4
- name: Labrador Retriever
  stage: early-commercial
  wedge: Constrained in-home transport and retrieval robot for people with mobility issues or chronic pain.
  pricing: $1,500 upfront plus 36-month payments; $99/month for Caddie or $149/month for Retriever.
  strength: Simple value proposition, home mapping workflow, and lower-cost path to useful assistance.
  weaknessVsUs: Much narrower task scope and limited clinical/workflow software depth.
  sourceRefs:
  - 24
  - 25
  - 27
  - 28
- name: ElliQ
  stage: scale-up
  wedge: Companion and wellness robot for older adults with caregiver app and subscription economics.
  pricing: $249 initiation fee plus $39-$59 per month membership.
  strength: Strong engagement, adherence, and care-tech subscription model.
  weaknessVsUs: No physical ADL execution, home mapping, or deployment operations for assistive robots.
  sourceRefs:
  - 29
  - 30
- name: Diligent Robotics Moxi
  stage: scale-up
  wedge: Workflow automation robot for hospitals sold with implementation and robot-as-a-service.
  pricing: Custom robot-as-a-service pricing.
  strength: Proves deployment, implementation, and workflow tailoring can be the real wedge.
  weaknessVsUs: Optimized for hospitals and staff tasks, not high-acuity private homes or rehab-led assistive programs.
  sourceRefs:
  - 31
  - 32
