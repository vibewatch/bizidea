competitors:
  - name: Hello Robot Stretch 4
    stage: 规模化中的 OEM
    wedge: 面向研究、企业和重度行动障碍家庭试点的开放式轮式移动操作平台。
    pricing: $29,950 基础版，外加选配。
    strength: 已有真实的辅助型家庭部署、强传感器栈，以及能吸引开发者的开放平台。
    weaknessVsUs: 以硬件和单一 OEM 为核心，不是面向多家庭、多服务方工作流的中立部署 OS。
    sourceRefs:
      - 1
      - 2
      - 4
  - name: Labrador Retriever
    stage: 早期商业化
    wedge: 面向行动不便或慢性疼痛人群的家庭内运输和取物机器人，任务边界明确。
    pricing: 首付 $1,500，外加 36 个月分期；Caddie 每月 $99，Retriever 每月 $149。
    strength: 价值主张简单、家庭建图工作流清楚，而且用更低成本就能交付有用的帮助。
    weaknessVsUs: 任务范围更窄，临床/工作流软件深度也有限。
    sourceRefs:
      - 24
      - 25
      - 27
      - 28
  - name: ElliQ
    stage: 规模化
    wedge: 面向老年人的陪伴与健康机器人，配套照护者 App 和订阅式商业模式。
    pricing: 启动费 $249，外加每月 $39–$59 会员费。
    strength: 互动频次高、粘性强，证明了 care-tech 订阅模式可行。
    weaknessVsUs: 没有物理 ADL 执行、家庭建图，或面向辅助机器人的部署运营能力。
    sourceRefs:
      - 29
      - 30
  - name: Diligent Robotics Moxi
    stage: 规模化
    wedge: 面向医院工作流自动化的机器人，以实施服务和 机器人即服务 销售。
    pricing: 定制化 机器人即服务 定价。
    strength: 证明真正的切口可以不是机器人本体，而是部署、实施和工作流适配。
    weaknessVsUs: 为医院和员工任务优化，不适合高需求私人住宅或康复机构主导的辅助项目。
    sourceRefs:
      - 31
      - 32
regulatoryTechnicalConstraints:
  - point: ISO 13482 为个人护理机器人设定安全预期，并明确指出某些危险类别的冲击和伤害限制问题仍未完全解决。
    sourceRefs:
      - 18
  - point: 当前 Medicare 报销结构明确覆盖传统 DMEPOS 和家庭健康服务，但并不覆盖家用机器人部署 OS。
    sourceRefs:
      - 14
      - 15
      - 16
  - point: 任何健康或独立生活相关营销宣称，都必须拿得出有力证据支持。
    sourceRefs:
      - 42
  - point: 稳定部署仍然依赖导航、操作和故障恢复技术栈；这些能力虽然已经是生产级，但在凌乱家庭里远没到即插即用。
    sourceRefs:
      - 34
      - 35
      - 36
      - 37
validationSignals:
  - point: Hello Robot 表示，Stretch 4 首批量产已经售罄，预计会生产 200–300 台。
    sourceRefs:
      - 2
  - point: Labrador 披露，alpha 试点用户在真实家庭里每月最高可用到 100 次。
    sourceRefs:
      - 26
  - point: Diligent 把机器人实施周期描述为“按周算，不是按月算”，说明客户已经愿意为部署纪律付费。
    sourceRefs:
      - 31
      - 32
  - point: AARP 发现，计划长期住在原地的老年人里，有 43% 预计会做家庭无障碍改造，而技术也是方案的一部分。
    sourceRefs:
      - 12
openQuestions:
  - 实际落地时最先批下来的会是哪笔预算：康复服务方运营预算、OEM 打包、科研补助、雇主福利，还是支付方支持的家庭项目？
  - 在必须写定制脚本之前，重度行动障碍家庭里到底有多少比例能靠可复用任务包覆盖？
  - 哪些边界清楚的 ADL 最快能量出 ROI：备早餐、取物、拿药，还是眼镜/梳洗辅助？
  - 在大规模启用新任务包之前，服务方到底需要多少临床文档和远程审计证据才会放心？
