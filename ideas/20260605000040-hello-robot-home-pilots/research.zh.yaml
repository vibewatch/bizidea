reportMemo:
  executiveTakeaways:
    - 真实可用的家庭辅助硬件现在已经存在，但运营侧仍离不开 人在回路 控制、试点学习和故障恢复工作流；因此眼下更紧迫的是部署软件，而不是再造一种机器人形态。[1][2][4][37]
    - 最合适的首批买方是服务机构，不是消费者，因为重度行动障碍场景需要临床签核、家庭配置、照护培训和支持人力，单靠家庭自己无法标准化。[8][9][11][16]
    - 赛道里挤满了相邻硬件和陪伴型产品，但真正中立、面向家庭部署的操作系统几乎没有；因此今天的正面竞争强度中等，机群规模起来后才会明显升温。[19][24][29][31][38]
    - 预算能不能跑通，关键不在“替代所有照护”，而在于能否减少安装失败和支持工时；对照每小时 $35 的家庭护理成本和五位数机器人硬件，若一层面向服务方的部署系统能把独立生活达成时间拉短，就有机会打出 ROI。[4][27][30][41]
  marketDefinition: 这不是整个消费级家用机器人市场。真正相关的支出，落在辅助型服务机器人、家庭/个人护理机器人，以及把高需求家庭部署中的入组、任务验证、照护培训和远程支持标准化的康复运营软件交叉处。IFR 明确把有限自主的辅助机器人算进服务机器人，这比“消费电子玩具”框架更贴近这个切口。[19][20][21]
  customerAndBuyer: 终端用户是住在家里的重度行动障碍成年人，尤其是颈髓损伤等上肢功能直接决定 ADL 独立性的群体；但真正的经济买方，是负责部署、文档和支持的服务机构。即便有专业照护，家庭照护者仍深度参与，因此以服务方工作流为早期买方切口更现实。[6][8][9][11][16]
  buyingTriggers:
    - point: 服务方下单了第一批真正意义上的家用机器人群组，结果发现每一次安装都还要单独布房、挑任务、带照护者上手。
      sourceRefs:
        - 1
        - 2
        - 24
        - 25
    - point: 临床团队需要更快把设备交付推进到高需求用户真正跑出第一项稳定的日常生活结果。
      sourceRefs:
        - 2
        - 8
        - 11
    - point: 当人员压力叠加高昂的家庭护理人工成本后，手工支持会迅速变得太贵。
      sourceRefs:
        - 9
        - 31
        - 41
  willingnessToPay:
    summary: 当前机器人价格带已经从面向消费者的融资模式（Labrador、ElliQ）一路拉到 $29,950 的辅助平台（Stretch 4），医院机器人则多按定制化 机器人即服务 出售。对照每小时 $35 的非医疗家庭照护成本，只要部署 OS 能明显缩短独立生活达成时间，或压低单台活跃机器人的支持工时，就有预算成立的空间。
    sourceRefs:
      - 4
      - 27
      - 30
      - 31
      - 32
      - 41
  competitiveLandscape: 现阶段的玩家可以分成五类：以 OEM 为核心的辅助平台（Hello Robot）、约束更强的家庭实用机器人（Labrador）、陪伴/健康系统（ElliQ）、工作流很重的企业机器人运营商（Diligent），以及吸睛的人形机器人 aspirants（1X、Figure）。其中没有谁在做专门服务“康复机构主导、多家庭辅助项目”的中立部署 OS。[1][2][24][29][31][38][40]
  incumbentThesis:
    - incumbentClass: 开放式机器人技术栈
      point: ROS 时代的工具能提供导航和操作原语，但给不了临床工作流、家庭就绪签核或服务方支持运营。
      sourceRefs:
        - 34
        - 35
        - 36
    - incumbentClass: 机器人 OEM
      point: OEM 的重心在硬件、核心自主能力和卖试点；它们不会天然赢下跨供应商部署工作流这一层。
      sourceRefs:
        - 1
        - 2
        - 24
    - incumbentClass: 陪伴机器人厂商
      point: 陪伴系统证明了护理科技里确实有人愿意订阅付费，但它们并不能解决物理 ADL 部署或家用机器人的可靠性问题。
      sourceRefs:
        - 29
        - 30
    - incumbentClass: 企业机器人运营商
      point: 医院机器人公司证明了实施纪律很重要，但它们的工作流剧本是为机构场所设计的，不是为凌乱的私人住宅。
      sourceRefs:
        - 31
        - 32
    - incumbentClass: 人形家用机器人厂商
      point: 人形玩家正在塑造行业预期和规模叙事，但它们现在还在证明家庭可靠性，离可复制的辅助部署还有距离。
      sourceRefs:
        - 38
        - 39
        - 40
  regulatoryLandscape: ISO 13482 给个人护理机器人设了安全预期；Medicare 体系明确覆盖轮椅、DMEPOS 和家庭健康服务，但并没有专门覆盖面向服务方的家用机器人部署层；而任何明确的健康或结果宣称都需要有证据支撑。[18][14][15][16][42]
  technologyLandscape: 核心积木其实越来越齐：ROS 周边中间件、生产级导航、运动规划，以及现实世界的移动操作研究都已经有了。真正脆的，是最后一公里——把这些能力接到具体家庭、具体用户、具体任务包和具体恢复闭环上的那一层。[34][35][36][37]
  distributionChannels:
    - point: 创始人主导销售，直接打进已经接触早期家庭机器人试点的复杂康复经销商、神经康复创新团队和辅助技术负责人。
      sourceRefs:
        - 1
        - 2
        - 24
    - point: 与 Stretch 这样的可下单平台，以及 Labrador 这类面向家庭的系统做 OEM 打包或联合销售。
      sourceRefs:
        - 4
        - 24
        - 25
        - 27
    - point: 更长期再扩到家庭健康和居家养老项目，前提是产品已经能量化运营效果和独立生活结果。
      sourceRefs:
        - 12
        - 15
        - 16
        - 41
  partnershipEcosystem:
    - point: 机器人 OEM 需要 部署遥测和部署学习闭环，去打磨下一代产品。
      sourceRefs:
        - 1
        - 2
        - 37
    - point: OT 和康复团队是把机器人的原始能力真正变成安全、高价值任务包的关键。
      sourceRefs:
        - 8
        - 11
    - point: 护理服务方和康复中心已经在相邻的居家辅助分销和试点生态里出现。
      sourceRefs:
        - 16
        - 21
        - 24
  dataMoats:
    - point: 跨家庭的恢复闭环数据和工作流容忍度，会越积越像一套防守型运营数据，硬件厂商花钱也买不来。
      sourceRefs:
        - 2
        - 31
        - 40
    - point: 按房间拓扑、载荷和用户能力沉淀的任务包成败数据，能持续提升启动模板。
      sourceRefs:
        - 1
        - 25
        - 37
    - point: 临床审批加照护者干预遥测，可以慢慢变成服务方项目的质量与安全护城河。
      sourceRefs:
        - 9
        - 11
        - 32
  geographicConsiderations:
    - point: 美国适合作为第一站，因为支付、文档和服务方运营体系都很复杂，但复杂得还算能产品化。
      sourceRefs:
        - 14
        - 15
        - 16
    - point: 在一个主要市场追踪里，北美已经是当前老年辅助机器人最大的区域市场。
      sourceRefs:
        - 21
    - point: APAC 在更广义的家庭护理机器人市场里领先，因此未来扩张大概率需要本地渠道伙伴和不同定位。
      sourceRefs:
        - 20
  sensitivityCases:
    - case: 报销路径始终不清晰
      impact: 采用会集中在 OEM、科研、创新或服务方自主管理预算里，SAM 转化速度会更慢。
      sourceRefs:
        - 14
        - 15
        - 16
    - case: 硬件价格持续下降，而人工成本继续高企
      impact: 试点转正会更快，因为部署软件在总成本结构里的占比变小。
      sourceRefs:
        - 4
        - 20
        - 41
    - case: 安全或隐私事故引来更强审视
      impact: 家庭部署会被迫加更多监督、收窄任务包边界，销售周期也会被拉长。
      sourceRefs:
        - 17
        - 18
        - 26
        - 42
  validationPlan:
    - priority: high
      question: 不用工作流软件和用了工作流软件，新安装分别要多少天才能跑出第一项稳定 ADL 结果？
      evidenceToGather: 从 10–20 个早期家庭收集部署周期、安装失败原因和任务成功日志。
    - priority: high
      question: 上线之后，最吃 OT、工程师或照护者时间的支持动作到底是哪几类？
      evidenceToGather: 收一批试点群组的工单日志、干预分类和单机工时。
    - priority: medium
      question: 哪些任务包最容易跨家庭标准化，哪些则必须写定制脚本？
      evidenceToGather: 收房间布局元数据、任务结果，以及按工作流类型划分的可复用性，比如备餐、取物和送药。
analysisModels:
  marketMapDiagram:
    title: 辅助型家用机器人部署版图
    mermaid: |-
      quadrantChart
        title Assistive home robot deployment landscape
