  fiveForces:
    supplierPower:
      score: 4
      rationale: 创业公司依赖一小撮自己并不控制的机器人 OEM、中间件和硬件能力，尤其在早期市场更是如此。
      sourceRefs:
        - 1
        - 4
        - 34
        - 35
    buyerPower:
      score: 4
      rationale: 早期买方高度集中在少数服务机构，它们用的是自主或试点预算，而且眼前就有手工工作流等替代方案。
      sourceRefs:
        - 12
        - 16
        - 41
    threatOfEntrants:
      score: 3
      rationale: 开源机器人体系把技术进入门槛拉低了，但长期部署数据、临床信任和现场运营 know-how 仍然要时间去堆。
      sourceRefs:
        - 34
        - 35
        - 36
        - 37
    threatOfSubstitutes:
      score: 4
      rationale: 手工 OT 配置、供应商支持工单、照护者临场应对，以及更简单的单功能机器人，都是部署 OS 的真实替代品。
      sourceRefs:
        - 9
        - 24
        - 29
        - 31
    competitiveRivalry:
      score: 3
      rationale: 相邻玩家很多，但面向服务方的部署 OS 这个精确细分，今天仍然明显供给不足。
      sourceRefs:
        - 19
        - 24
        - 29
        - 31
        - 38
  pestle:
    - factor: 政治
      impact: neutral
      point: 美国护理交付本来就跑在明确的支付和服务方规则之下，但机器人还没被定义成一个清晰的报销类别。
      sourceRefs:
        - 14
        - 15
        - 16
    - factor: 经济
      impact: positive
      point: 家庭护理人工足够昂贵，所以哪怕只减少一部分支持工时，也可能很快算得过来。
      sourceRefs:
        - 41
    - factor: 社会
      impact: positive
      point: 老年人强烈偏好原地养老，这会持续抬升对安全居家独立技术的需求。
      sourceRefs:
        - 12
    - factor: 技术
      impact: positive
      point: 导航、操作和现实世界移动操作工具成熟得够快，已经能托住面向细分场景的部署软件。
      sourceRefs:
        - 34
        - 35
        - 36
        - 37
    - factor: 法律
      impact: negative
      point: 安全标准和健康宣称证据要求，抬高了辅助型家庭部署的门槛。
      sourceRefs:
        - 18
        - 42
  adoptionFrictionMatrix:
    - friction: 每个家庭布局都不一样
      severity: 高
      affectedBuyer: 临床运营与康复工程负责人
      mitigation: 在完全自主前，先用房间扫描入组、验证过的任务模板和类似 站点式的安装抽象来压复杂度。
      sourceRefs:
        - 25
        - 34
        - 37
    - friction: 高需求用户场景下的安全与责任顾虑
      severity: 高
      affectedBuyer: 辅助技术总监
      mitigation: 先从边界清楚的任务包切入，保留临床签核、明确急停流程和可审计的变更控制。
      sourceRefs:
        - 1
        - 18
    - friction: 报销路径不清楚
      severity: 高
      affectedBuyer: CFO 或项目发起人
      mitigation: 先卖给试点、OEM、科研或创新预算，并量化少花的支持工时和更快的激活速度。
      sourceRefs:
        - 14
        - 15
        - 16
        - 41
    - friction: 照护者和工作人员培训负担重
      severity: 中
      affectedBuyer: OT 负责人和支持经理
      mitigation: 把脚本化培训提示、远程升级工作流和可复制部署清单直接做进产品。
      sourceRefs:
        - 9
        - 11
        - 32
market:
  tam:
    value: $144.0M
    rationale: 自下而上估算：美国现存 tSCI 病例约 302,000 例 × 59.6% 四肢瘫比例 ≈ 180,000 名重度上肢受限人群；假设只有 10% 会成为可服务的家用机器人候选人，再按每台 $8,000 的年化软件/服务混合 ARPU 计算，约等于 18,000 台活跃设备 × $8,000。
    isEstimate: true
    sourceRefs:
      - 6
      - 21
      - 41
  sam:
    value: $20.0M
    rationale: 把 TAM 收窄到美国早期滩头市场：康复、CRT 和试点密集的家庭部署，大约 2,500 台活跃机器人 × 同样 $8,000 的混合年化收入。
    isEstimate: true
    sourceRefs:
      - 2
      - 4
      - 24
      - 27
      - 41
  som:
    value: $2.4M
    rationale: 第 3 年可触达份额按约 10–15 个服务方项目、约 300 台活跃机器人、每台每年 $8,000 的混合收入来算。
    isEstimate: true
    sourceRefs:
      - 2
      - 31
      - 32
