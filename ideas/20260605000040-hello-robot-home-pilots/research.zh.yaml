    source: '[6] + 计算'
  - driver: 每台活跃机器人的混合年收入
    value: $8,000
    source: 估算，锚定于硬件价格和照护成本背景 [4][27][30][41]
  - driver: 初始可触达活跃设备
    value: ~2,500 台 SAM；~300 台第 3 年 SOM
    source: 计算
