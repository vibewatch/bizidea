slug: home-robot-independence-ops
date: '2026-06-05'
executiveSummary: >-
  这家公司最适合先做成一套部署操作系统，服务美国复杂康复经销商和神经康复机构——它们正把小规模辅助型家用机器人队伍部署到上肢行动严重受限成年人的家中。眼前最急的痛点，不是再证明“机器人理论上有用”，而是怎么把已经交付的硬件，稳定推到第一项可靠的日常任务，比如备早餐或取物，而不是每个家庭都重搭一遍流程。首个客户会是那类刚启动 10–30 台家用机器人群组的服务方；一旦项目开跑，它就会发现真正卡住的，是家庭勘察、临床审批、照护培训和故障恢复支持。切口故意收得很窄：房间扫描入组、经过验证的任务包、临床签核、照护培训提示，以及面向高需求家庭部署的远程可靠性监控。相比一开始就卖“大而全”的家庭机器人平台，这条路更容易验证，因为买方可以在同一套运营工作流里直接量出首个可靠 ADL 的耗时、安装失败率、单机支持小时数，以及试点转年度生产的转化率。最值得相信的点在于，可下单的硬件已经出现，早期需求也看得见；而 idea.yaml 和 research.yaml 都指向同一个结论：真正缺的就是部署标准化这一层。最大悬而未决的问题仍是预算归属——现有材料还不能说明，最后会是服务方运营预算、OEM 打包、补助金，还是与支付方挂钩的项目成为主导付款路径。市场规模在滩头阶段说得通，但仍然偏窄，所以能不能做成风投级公司，取决于它能否先把重度行动障碍康复部署这条工作流跑通，再往居家养老和更广泛的家庭护理机器人项目外扩。
problem:
  - 辅助型家用机器人的部署今天仍像一次一案的现场项目：每个家庭都要重新勘察、挑任务、做安全评估，再把照护者带上手，机器人才能真正派上用场。
  - 当机器人故障、家庭布局差异和支持升级还靠表格、供应商电话和治疗师记忆来追时，服务方根本没法把一小队机器人规模化。
solution:
  - 提供一套面向服务方的部署操作系统，把房间扫描、用户约束和 ADL 目标转成经过验证的任务包、安装清单、临床审批和照护培训工作流。
  - 上线后持续监控任务完成、导航失败、照护者介入和停机情况，让支持团队能在用户放弃机器人之前把失效工作流拉回来。
whyWeWin:
  - 公司卡位在机器人 OEM 和康复服务方之间的运营层：硬件厂商天然不会拥有跨家庭工作流标准化，而服务方又没有团队去自己造机器人软件。
  - 时间一长，产品会积累出一套有防守力的数据资产——哪些任务包适合哪些家庭布局、用户画像和支持条件；在这个切口里，这比单纯的通用操作智能更值钱。
strategicChoices:
  beachhead: 美国区域性的复杂康复技术经销商和门诊神经康复项目：它们每年把 10–100 台轮式辅助机器人放进颈髓损伤、肌营养不良或类似重度行动障碍成年人的家中。
  wedgeRationale: 这一段客户本来就有临床团队、家庭安装责任和高需求用户，独立性改善也更容易快速量化，所以部署软件在这里比在大众消费机器人或泛居家养老市场更快证明 ROI。
  sequencingRationale: 先把边界清楚、价值高的 ADL 工作流做出来，再加临床审阅的部署工具；等真实试点证明支持负担下降、上线更快之后，再补可复用监控、结果报告和 OEM 联合销售。至于更广的家庭护理和多机型扩张，得等第一套任务包库已经证明能复用之后再说。
  notYet:
    - 面向分散家庭买家的直销消费市场
    - 超出轮式辅助滩头市场的人形或通用机器人编排
    - 全量远程操控市场，或 24/7 人工礼宾式运营
    - 在服务方预算 ROI 还没证实前，就去做与支付方深度绑定的报销产品
market:
  tam: 约 $144.0M 的美国 TAM，基于大约 18,000 名可服务的高需求家庭机器人候选用户，以及每台机器人每年 $8,000 的软件与服务混合 ARPU。
  sam: 约 $20.0M 的滩头 SAM，基于美国早期康复、CRT 和重试点家庭部署里约 2,500 台活跃机器人。
  som: 第 3 年可触达 SOM 约 $2.4M，基于大约 10–15 个服务方项目里的约 300 台活跃机器人，收入水平按同样的年化混合口径计算。
  segments:
    - 运行早期高需求家庭机器人项目的复杂康复技术经销商和神经康复服务方
    - 等重度行动障碍滩头市场跑通后，可以接上的家庭护理与居家养老项目
  buyingProcess: >-
    当首批机器人群组把支持负担暴露出来后，通常会由辅助技术总监、康复工程负责人或临床运营负责人牵头，成为内部推动者。经济买方往往也是这条线的人，或者是临床运营副总裁；但从现有文件看，规模化预算最终会落在服务方、OEM 还是别的渠道，仍然没有定论。
product:
  mvp: >-
    MVP 是一套面向单个服务方项目的部署工作流：采集家庭入组和房间布局数据，推荐边界清楚的任务包，记录临床审批，并在工作流退化时给照护者脚本化上手引导和远程告警。
  sixMonth: 在 6 个月内上线 2–3 个生产级试点：具备房间扫描入组、少量 ADL 任务包模板、临床签核、照护培训提示，以及“到首个稳定任务的时间、任务成功率、单机支持小时数”看板。
  twelveMonth: 把可复用部署模板扩到厨房、卧室、门口和用药相关工作流，再加面向 OEM 的遥测视图和面向服务方的结果报告，支撑试点续约和联合销售。
  twentyFourMonth: 从一类轮式辅助机器人工作流，扩成面向居家养老和家庭护理项目的厂商中立家庭机器人操作层，同时保留临床审阅的任务激活和可审计性。
  keyBets:
    - 即便报销路径还不清晰，只要产品能明显缩短到首个可用任务的时间、压低支持人力，服务方就愿意买单。
    - 一小套可复用任务包库就能覆盖足够多的早期家庭，不至于把交付彻底做成纯服务模式。
    - OEM 会更愿意接入一层中立部署系统，而不是自己去做面向服务方的深度工作流软件。
gtm:
  wedge: >-
    先把付费试点卖给第一批认真做家庭机器人群组的服务方，证明点不是“通用自主能力有多强”，而是上线更快、安装失败更少、每台活跃机器人的支持小时数更低。
  channels:
    - 创始人主导直销，面向复杂康复经销商和神经康复服务方里的辅助技术总监、康复工程负责人及临床运营副总裁
    - 与已经在评估 Stretch 级机器人方案的区域 CRT 经销商和神经康复中心做共创试点
    - 在第一批试点数据跑出来后，与辅助机器人厂商和康复工程顾问做 OEM 打包或联合销售
  funnelTargets: 线索到合格试点 15–25%，合格试点到付费试点 30–50%，付费试点到生产 60%+，首个服务方在 9 个月内扩到第二批群组或第二站点 70%+。
  pricing: >-
    按家庭收一次性部署启用费，再按活跃机器人和被监控任务包收年费软件订阅；远程支持和结果报告另收费。这样的定价更贴合买方在群组启动和后续运营支持中的真实价值感知，而不是按账号席位收费。
businessModel:
  revenueStreams:
    - 按家庭或首批群组收取部署启用费用
    - 按活跃机器人和被监控任务包收取年度订阅费
    - 高级远程支持、结果报告和集成服务
  unitOfValue: 处于管理中的活跃辅助型家用部署机器人，且至少挂有一个经过验证的任务包
  targetGrossMarginPct: 70
  expansionLevers:
    - 从同一客户的第一批服务方群组，扩到更多家庭、治疗师和站点
    - 随着服务方扩大机器人职责，追加更多经过验证的任务包和结果报告模块
    - 在重度行动障碍切口验证之后，把工作流延伸到更多家庭护理和居家养老机器人项目
strategyMap:
  northStarMetric: 安装后 30 天内达到目标任务成功阈值的月活部署机器人数量
  inputMetrics:
    - 从硬件交付到首个稳定 ADL 任务的天数
    - 30 天内成功上线的部署占比
    - 按任务包划分的月度任务成功率
    - 每台活跃机器人的支持小时数和照护者介入次数
    - 付费试点转生产的转化率
  moatsToBuild:
    - 把房间拓扑、用户画像、任务包和故障模式连到部署结果上的跨家庭数据集
    - 按工作流类型沉淀的临床审批任务包模板和恢复剧本库
    - 通过可审计的任务激活、干预日志和结果报告建立起服务方与 OEM 的信任
  killCriteria:
    - 在定义好的滩头市场里，12 个月内签不下至少 3 个付费服务方试点
    - 没有任何试点能把到首个稳定任务的时间至少缩短 25%，或把单机支持小时数至少压低 20%
    - 因为家庭太碎片化或预算理由不成立，导致付费试点转年度生产的比例低于 60%
  mermaid: |
    flowchart LR
      Wedge[Assistive home deployment wedge] --> MVP[Deployment OS MVP]
      MVP --> Proof[Faster activation and lower support burden]
      Proof --> Expansion[Provider expansion and OEM co-sell]
investorMemo:
  verdict:
    call: 观察
    conviction: 客户痛点清楚、切口也成立，但预算归属不明、短期市场偏小、硬件普及仍有风险，所以当前把握度有限。
    whyBelieve: 可下单的辅助型家用机器人已经把服务方运营问题摆到台面上，而中立部署软件正好最适合解这道题。
    whyDoubt: 如果买方迟迟不能把任务包标准化，或者服务方预算始终批不下来，这个滩头市场可能会一直太小、也太重服务。
    nextDiligence: 继续验证 3–5 个有真实群组计划的服务方项目，拿到它们当前的支持工时基线，以及从付费试点转到年度生产支出的可信路径。
  firstCustomer:
    title: 启动高需求家庭机器人群组的区域性复杂康复经销商
    profile: 一家服务重度行动障碍成年人的美国服务方，正把 10–30 台轮式辅助机器人部署进家庭，并在群组内协调 OT、照护培训和现场支持。
    trigger: 第一次多家庭试点一跑，团队就发现安装、临床签核和持续恢复支持根本不能靠零散表格和供应商工单管理。
    buyer: 辅助技术总监或临床运营副总裁
    initialContract: 10–30 个家庭、周期 6–9 个月的 $50k–$100k 付费试点；随后通过持续软件、被监控任务包和支持模块，转成每台活跃机器人约 $8,000 的混合年化收入。
  mustBeTrue:
    - 美国至少有 10–15 个服务方项目，每个都能支撑足够多的活跃机器人，才撑得起研究里写的第 3 年 SOM 假设。
    - 在报销路径清晰之前，至少有一个服务方群组能靠更快上线和更低支持工时证明可量化 ROI。
    - 一小组边界清楚的 ADL 可以在足够多的家庭里标准化，否则部署就会滑向纯定制服务。
    - 只要审批、审计轨迹和工作流边界足够明确，临床团队愿意信任由软件介导的任务激活。
    - OEM 会合作，至少不会主动封堵中立部署层，因为它们并不想自己背面向服务方的工作流运营。
  diligenceQuestions:
    - 第一批 10–30 个家庭群组里，最先真正签预算的会是谁：服务方运营、OEM 打包、补助金，还是别的渠道？
    - 早期家庭部署里，有多大比例能直接用可复用任务包，而不必写定制脚本或重度远程操控？
    - 对重度行动障碍用户和服务方项目来说，哪两到三类 ADL 最快能打出可测量的 ROI？
    - 服务方今天在每台活跃机器人安装后要花多少支持时间？其中有多少原本可以避免？
    - 如果 Hello Robot 或其他 OEM 自己打包部署工作流软件，这家公司还能有多强的防守力？
operatingAssumptions:
  - assumption: 在报销路径明确之前，启动早期机器人群组的服务方会先用自主运营预算或创新预算为部署软件买单。
    basis: research.yaml
    validationTest: 在目标细分市场至少签下 3 个付费试点，且预算授权已落地，不依赖未来支付方审批。
    decisionImpact: 如果不成立，公司就得转向 OEM 打包销售、补助金试点，或更窄的服务型模式。
  - assumption: 围绕备餐、取物、门口通行等边界清楚 ADL 的一小套初始任务包库，能覆盖有意义比例的早期部署。
    basis: idea.yaml
    validationTest: 在前 20 个家庭里，至少 60% 的上线工作流使用标准模板，只做轻微配置修改。
    decisionImpact: 如果不成立，产品范围就得收窄到单一工作流，或提高定价去覆盖更重服务的部署模式。
  - assumption: 临床审批加照护培训提示，足以在首批部署里托住安全和信任。
    basis: research.yaml
    validationTest: 试点客户持续保持明确签核合规，且没有任何严重安全事故与未获支持的任务激活直接相关。
    decisionImpact: 如果不成立，路线图就得补更严格的控制、更慢的铺开节奏，甚至配专门的临床运营团队。
  - assumption: 一旦服务方 ROI 跑出来，OEM 会愿意开放遥测接入并配合联合销售，因为部署学习同样有利于它们自己的硬件路线图。
    basis: operator judgment
    validationTest: 在 12 个月内拿下至少 2 个 OEM 或集成商合作，允许做遥测集成或打包销售。
    decisionImpact: 如果不成立，公司前期就只能先守单一 OEM，或者自己加大投入做集成层和直销体系。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 访谈 15 位目标服务方项目中的辅助技术总监、康复工程师和 OT 负责人。
    hypothesis: 第一批真正跑起来的机器人群组，会稳定暴露出 thesis 里写的同一组上线与支持瓶颈。
    successMetric: 至少 10 次访谈确认同一种部署痛点模式，且有 5 家愿意分享现状工作流图或支持日志。
    owner: 首席执行官
  - horizon: 0–90 天
    experiment: 审计 3 个共创伙伴项目的基线数据，覆盖安装周期、安装失败和支持工时。
    hypothesis: 当前工作流已经足够可量化，可以支撑一个付费 ROI 试点。
    successMetric: 3 家伙伴都给出基线指标，且至少 2 家暴露出足够大的改进空间，能支撑试点定价。
    owner: 产品负责人
  - horizon: 0–90 天
    experiment: 做一个原型，把房间扫描入组和用户约束转成一条可由临床审阅的任务包工作流。
    hypothesis: 服务方愿意接入一层叠加式工作流，而不要求你完全替掉机器人控制系统。
    successMetric: 1 家共创伙伴在至少 5 个家庭的真实部署或影子部署里使用该原型。
    owner: 创始工程师
  - horizon: 90–180 天
    experiment: 跑 2 个付费试点，每周复盘上线时间、任务成功率和支持干预。
    hypothesis: 这套产品能在真实服务方群组里降低安装失败和支持负担。
    successMetric: 签下 2 个付费试点，且至少 1 个把上线速度提升 25%+、每台机器人支持工时压低 20%+。
    owner: 首席执行官
  - horizon: 90–180 天
    experiment: 测试两种定价包装：按家庭启用费 + 持续机器人订阅，或按群组统一授权。
    hypothesis: 买方更偏好按活跃机器人和被监控任务包计费，因为它更贴近持续运营价值。
    successMetric: 5 个合格买方里至少 3 个偏好按活跃机器人收费，并接受清晰的试点转生产路径。
    owner: 首席执行官
  - horizon: 180–360 天
    experiment: 用第一份试点案例，启动 1 条 OEM 或康复集成商联合销售路径。
    hypothesis: 伙伴分销能缩短信任建立时间，也能比创始人单打更快扩出去。
    successMetric: 1 条伙伴来源路径在 6 个月内带来至少 3 个合格机会，或 1 个新增付费试点。
    owner: GTM 负责人
operations:
  - 让每一次任务包激活都保留临床审阅、审计轨迹和明确回滚流程。
  - 在扩更多自动化和相邻工作流之前，先把家庭入组数据采集标准化。
  - 对每台活跃机器人每周跑一次周度看板，盯上线时长、任务成功率、支持工时和照护者介入。
  - 优先做厂商中立的遥测和报告连接器，而不是替掉 OEM 控制系统。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 负责部署工作流引擎、遥测接入和任务包配置层，让产品能在真实家庭里用起来。
  - role: 临床工作流与实施负责人
    startTiming: Month 0
    rationale: 把 OT 和康复工程实践转成安全、可复制的部署剧本和临床签核规则。
  - role: 客户成功与现场运营负责人
    startTiming: Month 4
    rationale: 确保早期群组真正跑出可靠结果，并把支持模式转成产品需求，而不是没完没了地救火。
  - role: 解决方案工程师
    startTiming: Month 6
    rationale: 随着试点转生产，压低 OEM 遥测、服务方系统和报告需求之间的集成差异。
  - role: 企业 GTM 负责人
    startTiming: Month 9
    rationale: 在第一批 验证结果 跑出来后，补上更结构化的 商机管线 管理和伙伴拓展能力。
milestones:
  - horizon: 0–12 个月
    items:
      - 在定义好的滩头市场里签下 3 个复杂康复经销商或神经康复服务方的付费试点
      - 上线一条包含房间扫描入组、临床签核、照护培训和远程可靠性监控的生产级工作流
      - 证明上线时间、安装失败率和单机支持工时都有可量化改善
  - horizon: 12–24 个月
    items:
      - 至少把 2 个试点项目转成年度生产合同
      - 把任务包库扩到价值最高、边界最清楚的 ADL，并补上可复用的 OEM 遥测集成
      - 建立 1–2 个 OEM 或集成商联合销售关系，持续产出合格 商机管线
  - horizon: 24–36 个月
    items:
      - 管理中的活跃机器人达到约 300 台，与研究中的第 3 年 SOM 假设一致
      - 从首个重度行动障碍服务方群组，扩到更多站点或相邻的家庭护理项目
      - 成为所选滩头市场里早期辅助型家用机器人队伍默认的部署与可靠性层
risks:
  - risk: 辅助型家用机器人的装机基数增长可能比预期更慢，压住短期账户规模。
    likelihood: High
    impact: High
    mitigation: 先卖给已经在启动群组的项目，并强调哪怕在小规模机群里也能立刻体现出来的支持效率价值。
  - risk: 预算归属可能长期分散在服务方、OEM、补助金和潜在支付方项目之间。
    likelihood: High
    impact: High
    mitigation: 尽早测试定价和渠道，保持产品对供应商中立，在单一路径跑通前不要围着某种报销模式过度建设。
  - risk: 家庭环境差异太大，可能逼着团队做过多定制配置，拉不出软件型毛利率。
    likelihood: Medium
    impact: High
    mitigation: 把首批部署严格收在少数边界清楚的 ADL 内，对那些无法复用模板的相邻工作流直接拒绝。
  - risk: 高需求家庭里的安全或隐私事故，会拖慢采用速度，也会抬高监管和审查要求。
    likelihood: Medium
    impact: High
    mitigation: 每次部署都保留临床签核、边界清楚的任务激活、明确的应急流程和可审计的变更日志。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金会覆盖创始工程与临床工作流团队、3–5 个付费服务方试点、首批可复用任务包与遥测集成，以及足够的数据去厘清预算归属和试点转生产转化。
