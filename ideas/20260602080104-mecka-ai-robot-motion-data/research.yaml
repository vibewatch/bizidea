  pestle:
    - factor: political
      impact: positive
      point: Governments and standards bodies are formalizing trustworthy-AI and robotics governance, which raises compliance work but favors auditable infrastructure over informal data collection.
      sourceRefs:
        - 13
        - 14
    - factor: economic
      impact: positive
      point: Warehouse automation budgets and warehouse-robotics market growth are still rising, creating room for software that unblocks deployment rather than only for additional hardware.
      sourceRefs:
        - 6
        - 7
        - 8
    - factor: social
      impact: negative
      point: Human-motion capture in workplaces can trigger worker-surveillance and biometrics concerns, especially if buyers cannot explain retention, consent, or downstream usage.
      sourceRefs:
        - 15
        - 16
    - factor: technological
      impact: positive
      point: Cross-embodiment datasets and VLA models are proving that diverse real-world data materially improves robot performance, which increases the strategic value of better data operations.
      sourceRefs:
        - 17
        - 18
        - 40
    - factor: legal
      impact: negative
      point: Safety, privacy, and documentation expectations raise onboarding friction because customers need provenance and risk controls, not just raw clips.
      sourceRefs:
        - 11
        - 14
        - 15
  adoptionFrictionMatrix:
    - friction: Proving that human-motion datasets transfer to the buyer's exact robot embodiment and workflow
      severity: high
      affectedBuyer: VP Autonomy or Head of ML Platform
      mitigation: Start with narrow repetitive tasks and bundle every data pack with task-specific acceptance evals and benchmark baselines.
      sourceRefs:
        - 17
        - 18
        - 19
    - friction: Establishing compliant worker consent and retention rules for motion capture
      severity: high
      affectedBuyer: CTO and legal/security stakeholders
      mitigation: Build explicit consent, retention, deletion, and provenance controls into each capture program from the first deployment.
      sourceRefs:
        - 14
        - 15
        - 16
    - friction: Integrating purchased datasets into existing robot-learning and fleet workflows
      severity: medium
      affectedBuyer: Data engineering and robotics platform teams
      mitigation: Ship compatible export formats, benchmark adapters, and validation scripts for common robot-learning stacks.
      sourceRefs:
        - 20
        - 21
        - 28
    - friction: Budget ownership stays buried inside integration or hardware programs
      severity: high
      affectedBuyer: CTO and finance owner of deployments
      mitigation: Position the product around deadline risk reduction for pilot expansion rather than around generic data-labeling throughput.
      sourceRefs:
        - 6
        - 25
        - 27
