openQuestions:
  - Will buyers accept transfer-scored human-motion packs as a standalone software budget, or require the product to be bundled inside services or integrator contracts?
  - What minimum acceptance-test framework is persuasive enough for a warehouse robotics CTO to replace teleop with external data procurement on a production timeline?
  - How often do customer-specific environment changes invalidate previously collected demonstration packs for tote induction and depalletizing?
  - Which jurisdictions or enterprise buyers will treat worker-motion capture as biometric processing that requires stronger consent or localization controls?
