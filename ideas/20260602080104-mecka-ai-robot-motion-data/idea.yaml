differentiator: >-
  Generic data-labeling firms can process media, but they do not know how to design a capture program around a robot task,
  benchmark transfer to a target embodiment, or tie each dataset back to a deployment milestone. Raw-data marketplaces will
  also struggle because robotics teams do not want undifferentiated clips; they want a workflow-specific package with
  provenance, evals, and procurement logic. The moat compounds through proprietary mappings between workflow specs, capture
  conditions, and downstream robot-performance improvements across repeated customer programs.
