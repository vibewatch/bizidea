topRisks:
  - name: Transfer validity risk
    description: Human-motion datasets may fail to transfer cleanly to the customer's robot embodiment or control stack.
    mitigation: Start with repetitive warehouse tasks, ship acceptance evals with every pack, and build proof around measured lift on a few tightly scoped workflows.
  - name: Supply quality fragmentation
    description: Distributed capture partners may produce inconsistent demos that undermine customer trust.
    mitigation: Enforce standardized capture specs, hardware baselines, and QA thresholds before data is admitted into customer-facing packs.
  - name: Insourcing and vendor overlap
    description: Large robotics teams or data suppliers like Mecka could move up-stack into workflow-specific data procurement.
    mitigation: Position the company as the neutral workflow compiler and benchmarking layer that works across internal, partner, and third-party data sources rather than competing as a raw collector.
