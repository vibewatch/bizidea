jobsToBeDone:
  - job: >-
      When a warehouse pilot expands to a new task variant, help the autonomy team procure transfer-ready demonstrations fast,
      so they can retrain before the customer expansion review.
    currentAlternative: Internal teleop collection plus rushed annotation and one-off motion-capture sessions
    successMetric: Days from identified task gap to approved training pack ready for model retraining
  - job: >-
      When a robotics startup evaluates an external dataset vendor, help the data team verify provenance and expected task
      transfer, so they can buy with confidence instead of guessing from sample clips.
    currentAlternative: Manual vendor review and small offline experiments with no standard acceptance rubric
    successMetric: Share of purchased datasets that pass acceptance tests and improve target task performance
