problem: >-
  Warehouse robotics teams still gather task demonstrations through teleoperation, one-off pilot recordings, and ad hoc
  annotation vendors, which makes each new task or customer site slow and expensive to support. Even when external motion
  data becomes available, teams lack a reliable way to specify the exact workflow they need, verify provenance and quality,
  and predict whether a human-motion dataset will actually transfer to their robot stack. That leaves paid pilots bottlenecked
  on data operations instead of model iteration.
targetUser:
  primary: >-
    Head of autonomy, data engine, or ML platform at a 30-150 person warehouse robotics startup training mobile-manipulation
    policies for tote induction, depalletizing, or mixed-SKU picking across 2-5 pilot sites
  secondary: >-
    CTO or data-platform lead at a robotics systems integrator building reusable task libraries for multiple warehouse customers
  buyer: VP Autonomy, CTO, or Head of Data Platform
startupThesis:
  nonObviousInsight: >-
    The valuable control point in embodied AI will not be a generic marketplace of raw motion clips; it will be the layer that
    converts a customer's workflow into transfer-ready demonstrations with provenance, capture instructions, and benchmarked
    usefulness on a target robot task. As human-motion capture gets cheaper, the bottleneck shifts from collecting any data to
    procuring the right data package fast enough for a live deployment.
  beachhead: >-
    Series A-B warehouse robotics startups expanding tote-induction or mixed-SKU depalletizing pilots that need 5,000-50,000
    new demonstrations in the next quarter but cannot afford to collect them through teleop on scarce robot fleets
  wedge: >-
    A task-to-dataset foundry that ingests SOP video, robot logs, and failure cases, generates a phone-and-sensor capture spec,
    routes collection to approved capture partners, and returns transfer-scored training packs plus acceptance evals for the
    target manipulation workflow
  whyNowCatalyst: >-
    Mecka's financing, signed-contract run-rate signal, and phone-and-sensor alternative to teleoperation show robotics teams
    are already paying for embodied data just as collection becomes scalable enough to support workflow-specific procurement.
  ventureScalePath: >-
    Start with warehouse manipulation data programs, then expand into a broader embodied-data operating layer for home,
    healthcare, and field robotics: capture-spec generation, provenance, benchmark exchange, licensing, and continuous
    post-deployment refresh for any robot-learning team buying or producing demonstrations.
solution: >-
  The company sells a system that turns a robot program's next task gap into a production-ready data order instead of a custom
  services project. A customer uploads SOP footage, robot failures, and environment constraints, and the platform outputs a
  capture protocol that can run on commodity phones plus approved wearables or partner rigs. Each returned demo is scored for
  provenance, task coverage, and likely embodiment transfer, then packaged with eval suites the autonomy team can run before
  retraining. Over time the platform learns which human-motion patterns, environments, and labeling schemas improve success on
  specific robot tasks, giving buyers a faster path from new customer workflow to deployable policy.
goToMarketSeed:
  firstCustomer: >-
    A warehouse robotics startup with 1-3 paid enterprise pilots for tote induction or depalletizing that must improve task
    coverage before a multi-site expansion decision in the next 90 days
  buyingTrigger: >-
    A pilot expands to a new SKU mix or site layout, but internal teleop and on-robot data collection cannot generate enough
    new demonstrations before the customer review or renewal date
  currentAlternative: >-
    In-house teleoperation and manual demonstration capture, stitched together with contract annotators, spreadsheets, and
    bespoke motion-capture experiments
  switchingReason: >-
    The foundry gives the team a faster and more auditable way to procure workflow-specific data without burning scarce robot
    hours or building its own distributed capture operation from scratch
  pricingHypothesis: >-
    Annual platform subscription plus usage-based fees per active task program, with premium charges for expedited data packs
    or large-volume demonstration refreshes
