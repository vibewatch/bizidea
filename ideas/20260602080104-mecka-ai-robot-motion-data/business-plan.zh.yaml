slug: robot-task-data-foundry
date: '2026-06-02'
executiveSummary: Robot Task Data Foundry 瞄准的是 Series A-B 的仓储机器人创业公司和集成商：它们要在一个季度里把 tote induction 或 mixed-SKU depalletizing 试点往外扩，但靠内部 teleop 和临时采集，拿不到足够的新示范。产品会把 SOP 视频、机器人日志和失败案例编译成可审计的采集项目，再交付和买方目标工作流绑定的迁移评分数据包与验收评估。第一笔单子最该出现在付费试点扩到新 SKU 组合或新站点布局、部署进度面临失守的时候，因为那一刻买方、预算和紧迫性会同时对齐。公司刻意不从通用机器人数据集 marketplace，也不从垂直一体化采集工厂起步，因为前者会摊薄验证，后者则要求在需求未证实前先背太重的供给。最强的外部证据是，具身数据已经有了自己的预算科目：Mecka 的融资和已签合同信号都说明，买方已经在为外部机器人数据项目买单。市场规模有望支撑风投回报，研究建模出的 TAM、SAM 和第 3 年 SOM 分别是 $1.1B、$48.0M 和 $6.0M，但这些仍是模型估算，不是公开披露的硬预算。最大的反证风险在迁移有效性：如果外部人类动作数据包在窄仓储任务上跑不赢客户自建 teleop，这个产品就会滑回服务层，而不是站稳软件控制点。公开价格基准也仍然稀薄，所以早期合同必须证明，六位数低段的年度软件预算，确实能从更大的服务费或集成商 SOW 里被拆出来。
problem:
- 仓储机器人团队今天仍靠稀缺机器人机时、teleoperation 和拼凑出来的标注供应商去生成新示范；一旦 SKU 组合、站点布局或客户工作流变化，试点扩张就会被拖慢。
- 买方缺少一套中立机制，来精确定义自己要什么工作流、核验来源和工人授权控制，并在续约或 rollout 决策前判断一份外部人类动作数据集能不能迁移到自己的机器人栈。
solution:
- 吃进 SOP 录像、机器人日志、失败案例和环境约束，再把它们编译成面向仓储任务的采集规范；获批伙伴可用手机加标准化传感器或 rig 执行。
- 返回带来源评分、迁移评分的训练包，配上验收评估和可复用导出适配器，让 autonomy 团队更快决定该重训、刷新还是直接拒收一份数据集。
whyWeWin:
- 切口是一个中立的工作流编译器加迁移保证层，能横跨内部、合作伙伴和第三方数据源；相邻的数据引擎和仓储机器人厂商今天都没有明确占住这个位置。
- 防御力会随着时间复利，因为工作流需求、采集条件、来源历史和实际任务表现提升之间的私有映射，只会在重复的仓储项目里越积越厚。
strategicChoices:
  beachhead: 北美 2–5 个客户站点上，正在跑 tote induction 或 mixed-SKU depalletizing 试点的 Series A-B 仓储机器人创业公司和系统集成商。
  wedgeRationale: 这一刀切得准：预算归属清楚、部署 deadline 很近，而且工作流重复度高，能很快测出迁移提升。要是一开始就去做更广泛的人形、家用或通用机器人，具身差异会明显放大，验证周期也会被拉长。
  sequencingRationale: 先把一个窄工作流的编译和验收层跑通；等 2–3 个付费共创客户证明有效后，再加合作伙伴产能和基准历史；只有在销售触发点可复用、数据模型也稳定以后，才扩到相邻仓储任务和更多地区。
  notYet:
  - 通用型机器人原始动作片段 marketplace
  - 在还没拿到机器人团队验证前，直接卖给仓库运营方的终端软件
  - 家用、医疗、野外或人形机器人工作流
  - 从第一天起就自建大规模封闭采集团队或定制硬件供应链
market:
  tam: $1.1B：面向工作流定制的仓储与机器人项目数据基础设施全球建模市场。
  sam: $48.0M：北美、欧洲和部分亚洲账户里约 120 家 Series A-B 仓储机器人创业公司与集成商构成的滩头市场。
  som: $6.0M：第 3 年做到 15 个活跃客户、约 $400k ACV 时可触达的收入规模。
  segments:
  - 正在扩张 tote induction 或 mixed-SKU depalletizing 试点的仓储机器人创业公司
  - 为多个仓储客户搭可复用任务库的机器人系统集成商
  buyingProcess: 交易最该从 VP Autonomy、CTO 或 Head of Data Platform 这里起步：当一个试点必须在客户评审或扩张 deadline 前补进 5,000–50,000 条新示范时，他们会先被点燃。随后 autonomy、数据工程、法务和部署相关方会一起核验迁移证据、来源控制和导出兼容性，最后才会在部署项目预算里放行。
product:
  mvp: MVP 先覆盖工作流 intake、采集规范生成、合作伙伴分发、来源与 QA 评分、面向迁移的验收评估，以及 1–2 个仓储操作工作流的导出适配器。第一步必须先替掉临时拼凑的数据采购，而不是急着做成一个大而全的机器人数据 marketplace 或部署后分析套件。
  sixMonth: 6 个月内交付面向 tote induction 和 mixed-SKU depalletizing 的付费共创版本，覆盖工作流 intake、采集规范、来源控制、验收评估，以及接入常见机器人学习栈的标准导出。
  twelveMonth: 12 个月内，在 2–3 个客户身上证明可量化的重训提速或任务成功率提升；按工作流变体沉淀基准历史；并把获批采集伙伴认证与合规流程正式化。
  twentyFourMonth: 24 个月内，把产品扩成相邻仓储任务的数据中立操作层，支持刷新项目、更广的基准交换和多地区伙伴产能，同时继续把仓储操作作为核心参考品类。
  keyBets:
  - 买方愿意为按工作流定制的采购与验收付费，而不只是为通用数据采集吞吐量买单。
  - 范围窄、重复度高的仓储任务，足以在服务化吞掉毛利之前，先跑出一个可复用产品。
  - 在销售里，带迁移评分的验收评估会比原始片段数量或最低采集成本更关键。
  - 合规和来源功能会帮助创业公司赢过临时供应商，而不是把 adoption 直接拖死。
gtm:
  wedge: 在仓储机器人 autonomy 负责人最焦虑的时刻切进去：付费试点必须扩到新 SKU 组合或新站点布局，但内部 teleop 已经来不及在客户决策日前补够示范。
  channels:
  - 面向仓储机器人创业公司 VP Autonomy、CTO 和 Head of Data Platform 的创始人主导直销
  - 和已经卡在部署与验收流程里的系统集成商共创客户合作
  - 和中立数据引擎及获批采集伙伴做转介与联合交付
  funnelTargets: 目标客户到合格试点 20%+；合格试点到付费共创客户 50%+；付费共创客户到年度生产合同 60%+
  pricing: 按年收平台订阅费，再按活跃任务项目收费；加急刷新另收高级费用。原因很直接：买方真正在乎的是 workflow 级别的 deadline 风险下降和迁移保证，而不是单纯的原始片段数量。
businessModel:
  revenueStreams:
  - 年度软件订阅：覆盖工作流 intake、来源、QA 与迁移保证工具
  - 按活跃任务项目和数据刷新周期收费
  - 加急采集、评估与合规支持高级包
  unitOfValue: 一个从工作流规范一路管到训练包验收通过的活跃仓储任务项目。
  targetGrossMarginPct: 70
  expansionLevers:
  - 在同一个机器人项目里增加更多任务变体、站点和刷新周期
  - 从创业公司 OEM 扩到由集成商管理的多供应商机器人机队
  - 销售基准历史、验收分析和合作伙伴治理模块
  - 在验证跑通后，把同一套工作流编译器扩到相邻仓储操作品类
strategyMap:
  northStarMetric: 从发现任务缺口到拿到可用于重训的合格训练包，中位数要多少天。
  inputMetrics:
  - 和真实试点扩张 deadline 绑定的合格商机数量
  - 在活跃任务项目上使用验收评估的付费共创客户数量
  - 返回示范在首轮提交就通过来源与 QA 阈值的比例
  - 验收包转成生产合同的转化率
  - 目标工作流上的可量化任务成功率提升或重训时间下降
  moatsToBuild:
  - 面向重复性仓储任务的工作流转采集规范图谱
  - 和具体具身形态、环境与结果绑定的验收测试历史
  - 带来源与合规表现数据的获批伙伴网络
  - 适配滩头市场主流机器人学习栈的可复用导出与基准适配器
  killCriteria:
  - 前 10 个目标账户里，不到 3 家确认自己有和试点扩张 deadline 绑定、且已获批的任务数据预算
  - 前 2 个付费共创客户，没能证明相较现有 teleop，有可量化的重训提速或任务成功率提升
  - 超过一半潜在客户坚持预算只能埋在定制服务费或集成商 SOW 里
  - 在规范和 onboarding 标准化之后，采集伙伴 QA 首次通过率仍低于 80%
  mermaid: |
    flowchart LR
      Wedge[Warehouse task wedge] --> MVP[Workflow compiler and acceptance MVP]
      MVP --> Proof[Paid design partner proof]
      Proof --> Expansion[More tasks partners and accounts]
      Expansion --> Moat[Benchmark and provenance moat]
investorMemo:
  verdict:
    call: 观察
    conviction: 工作流痛点很真，切口也成立，但在付费部署里证明迁移提升和独立预算归属之前，判断强度仍然要克制。
    whyBelieve: 买方已经在为外部具身数据花钱，而且没有哪家在位企业真正占住“中立、按工作流定制的采购加迁移保证”这层。
    whyDoubt: 替代品太多；如果外部人类动作数据包在窄任务上打不过内部 teleop，也撑不起软件定价，整个故事就站不住。
    nextDiligence: 拿下两个付费共创客户，和现有 teleop 做并排迁移测试，并确认至少有一个转成年生产合同。
  firstCustomer:
    title: 正在扩 tote induction 或 depalletizing 试点的仓储机器人创业公司 VP Autonomy
    profile: 这类人掌管一家 30–150 人机器人公司的模型表现和部署节奏，公司已有 1–3 个付费仓储试点，但新数据采集受限于稀缺机器人机时。
    trigger: 客户扩张带来了新的 SKU 组合或站点布局变化，团队必须在续约或 rollout 评审前补进 5,000–50,000 条示范。
    buyer: VP Autonomy, CTO, or Head of Data Platform
    initialContract: $75k-150k 的付费共创合同，覆盖一个任务项目和一套验收包；随着活跃工作流和刷新周期扩张，可转成约 $250k-500k 的年度合同。
  mustBeTrue:
  - 前 10 个目标账户里，至少有 5 家把“试点扩张中的数据缺口”当成已经获批的现实问题，而不是未来某天再研究的 R&D 愿望。
  - 前 2 个付费项目，相比现有 teleop 或临时采集，要能拿出可量化的重训提速或任务成功率提升。
  - 买方愿意接受 workflow 级软件预算，而不是强行把产品压进低毛利的定制服务里。
  - 一小组仓储工作流之间共享的结构足够多，能让产品在前 5 个客户阶段仍以标准化为主。
  - 来源、授权和验收控制能够帮助通过企业审批，而不是把 onboarding 摩擦拉到致命程度。
  diligenceQuestions:
  - 当仓储试点需要在一个季度内补新示范时，预算到底归谁？
  - 要让机器人 CTO 愿意在真实部署时间线上用外部数据采购替掉 teleop，什么迁移指标才有说服力？
  - 第一份合同里，能有多少是真正的软件收入，多少会被吃进定制服务和合作伙伴劳务？
  - 哪些工作流变体能跨客户复用，哪些会把产品拆成一个个一次性项目？
  - 集成商会把它当成中立基础设施，还是又一个可以被吸收的服务供应商？
operatingAssumptions:
- assumption: 一部分仓储机器人团队会在试点扩张 deadline 受威胁时，愿意把外部任务数据项目作为独立预算科目立起来。
  basis: research.yaml
  validationTest: 访谈 10 位 autonomy 负责人和 5 家集成商，确认至少 5 个账户能说出预算归属人、触发时点和六位数低段支出区间。
  decisionImpact: 如果不成立，就要转向由集成商主导的服务软件，或者在扩大 GTM 招聘前及时止损。
- assumption: 围绕工作流定制的验收评估，能证明足够强的迁移价值，从而在重复性仓储任务上替掉内部 teleop。
  basis: idea.yaml
  validationTest: 在 tote induction 或 depalletizing 上跑 2 组并排试点，相比客户现有采集方式，拿出可量化的重训提速或任务成功率提升。
  decisionImpact: 如果不成立，公司应收缩到来源工具层，或者放弃“迁移保证”这个核心论点。
- assumption: 获批采集伙伴能够在创业公司不自建整条供应链的前提下，达到标准化 QA 和授权阈值。
  basis: 团队判断
  validationTest: 接入 3 家伙伴，在一套共享规范下，验证首批 500 条示范的首轮 QA 通过率至少达到 80%。
  decisionImpact: 如果不成立，毛利会下滑，路线图要么自己吞更多运营，要么主动收缩野心。
- assumption: 通用导出格式加轻量适配器，就足够接住早期客户的机器人学习栈。
  basis: research.yaml
  validationTest: 接入 3 套目标客户栈，确认训练包交付不需要额外超过两周的定制数据工程项目。
  decisionImpact: 如果不成立，产品范围会膨胀成重集成业务，融资需求也会随之抬高。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 围绕真实试点扩张 deadline 和数据预算归属，访谈仓储机器人 autonomy 负责人和集成商。
  hypothesis: 当新的 SKU 或站点变化威胁到 rollout 或续约日期时，预算会自然出现。
  successMetric: 10 个目标账户里，至少 5 个能描述一个和部署节奏绑定的真实或近期数据瓶颈，且这笔钱已经被批过。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 从潜在客户收集 SOP 视频、失败日志和环境约束，并为一个窄工作流编译采集规范。
  hypothesis: 一套可复用的工作流 intake 模板，就能覆盖前两个仓储用例，而不会被定制咨询拖垮。
  successMetric: 2 个潜在客户在不到一周的定制工作内，就认可同一份草拟规范。
  owner: 创始人/CTO
- horizon: 90–180 天
  experiment: 交付 MVP，覆盖 tote induction 和 mixed-SKU depalletizing 的工作流 intake、伙伴分发、来源评分和验收评估。
  hypothesis: 在公司还没有大 marketplace 或深基准库之前，买方就愿意先为迁移保证买单。
  successMetric: 签下 2 个付费共创客户，并开始实际评审已验收的训练包。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 和客户现有 teleop 或临时采集流程做并排迁移测试。
  hypothesis: 外部人类动作数据包能在一个边界清楚的工作流上，缩短重训时间或提高任务成功率。
  successMetric: 拿到 1 个签字案例：训练包准备速度至少快 20%，或目标工作流的任务成功率有可量化提升。
  owner: 机器人 ML 负责人
- horizon: 180–360 天
  experiment: 把 QA、授权、保留和审计链要求做成获批伙伴认证流程。
  hypothesis: 标准化的伙伴治理能在不直接拥有采集劳动力的情况下，提高买方信任并降低交付波动。
  successMetric: 3 家获批伙伴首轮 QA 通过率达到 80%+，并通过客户合规审查。
  owner: 项目运营负责人
- horizon: 180–360 天
  experiment: 在重复客户项目里加入基准历史和刷新规划。
  hypothesis: 相较低价数据交付，验收历史数据更能推动续约和扩张。
  successMetric: 1 个客户在看到明确基准胜利后，从单一工作流扩成多个活跃任务项目。
  owner: 产品负责人
operations:
- 维护一套受控的 intake 与验收标准，把工作流规范、来源字段、授权记录和 QA 阈值逐项绑到每个任务项目上。
- 每周开伙伴运营复盘，盯规范合规、首轮 QA 通过率和加急交付例外。
- 把导出适配器、评估脚本和基准基线做版本化，保证每个验收通过的数据包都能复现。
- 从第一单部署开始，就围绕工人动作和安全敏感采集数据设计保留、删除和审计日志。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 在买方集中的窄市场里，亲自盯企业销售、共创客户调研和集成商关系。
- role: 创始人/CTO
  startTiming: 第 0 个月
  rationale: 定义工作流编译器、来源模型以及范围纪律，避免业务一路滑向服务外包。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭出最早期的工作流 intake、伙伴分发和面向客户的验收工具。
- role: 机器人 ML 负责人
  startTiming: 第 3 个月
  rationale: 负责迁移评估设计、基准方法论，以及能让产品变得可投的客户 proof point。
- role: 解决方案工程师
  startTiming: 第 4 个月
  rationale: 给第一批客户的机器人学习栈做导出适配器和集成打法。
- role: 项目运营与合规负责人
  startTiming: 第 6 个月
  rationale: 把伙伴认证、授权流程和审计能力搭起来，让采集运营扩规模时不丢信任。
milestones:
- horizon: 0–12 个月
  items:
  - 验证前 10 个目标账户中的预算归属、购买触发点和复用性
  - 交付 tote induction 和 mixed-SKU depalletizing 的 MVP，包含验收评估和导出适配器
  - 拿下 2–3 个付费共创客户，并发布 1 个有量化迁移或重训提速结果的案例
  - 让首批 2–3 家采集伙伴通过 QA、授权和来源要求认证
- horizon: 12–24 个月
  items:
  - 把共创客户转成 5–8 份年度生产合同，核心围绕活跃任务项目和刷新周期
  - 上线基准历史和伙伴治理模块，提升续约与扩张转化
  - 扩到相邻仓储操作工作流，同时尽量保持实施标准化
  - 至少和 2 家集成商或中立数据引擎伙伴形成可复用联合销售动作
- horizon: 24–36 个月
  items:
  - 做到研究建模中的第 3 年 SOM 路径：约 15 个活跃客户、约 $6.0M 收入
  - 在滩头市场里成为多供应商仓储机器人团队的中立“工作流到数据集”控制层
  - 把平台扩到更广的具身数据授权与刷新项目，同时不把毛利打穿
risks:
- risk: 带迁移评分的人类动作数据包，相比目标具身形态上的内部 teleop，并没有带来足够可量化的提升。
  likelihood: High
  impact: High
  mitigation: 先从重复性高的仓储工作流做起；每个数据包都要求带验收评估；在两家付费客户拿出可量化性能或速度提升前，拒绝盲目扩张。
- risk: 买方继续把数据采购预算埋在集成服务或内部工程里，导致软件 ACV 上不去。
  likelihood: High
  impact: High
  mitigation: 围绕部署 deadline 去卖，明确算出缩短重训周期的 ROI；同时在共创合同里把软件、伙伴劳务和加急服务费用拆开。
- risk: 采集伙伴的质量和授权做法不稳定，拖垮信任和毛利。
  likelihood: Medium
  impact: High
  mitigation: 在数据包到客户前，先把伙伴认证、标准化规范、审计链和最低首轮 QA 阈值全都压实。
- risk: 中立数据引擎或全栈仓储机器人厂商顺着价值链往上，直接切到同一层工作流采购。
  likelihood: Medium
  impact: Medium
  mitigation: 抢下工作流编译器、基准历史和跨供应商验收系统，而不是和别人正面拼原始数据采集。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月资金将覆盖创始产品团队、迁移评估与集成岗位、第一批获批伙伴网络，以及 2–3 个付费共创部署；这些都是证明独立预算归属和可复用仓储任务提升所必需的。
