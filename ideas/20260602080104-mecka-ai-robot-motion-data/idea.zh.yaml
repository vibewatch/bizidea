problem: 仓储机器人团队今天拿新任务示范数据，依然靠 teleoperation、一次性的试点录制和临时拼起来的标注外包；每多一个新任务、每换一个客户站点，支持成本就慢、就贵。即便外部动作数据开始出现，团队也缺一套可靠办法来定义自己到底要什么流程、核验数据来源和质量、判断一包人类动作数据能不能迁移到自己的机器人栈。结果就是，付费试点卡在数据运营，而不是模型迭代。
targetUser:
  primary: 30–150 人的仓储机器人创业公司里，负责 autonomy、data engine 或 ML platform 的负责人；团队正在 2–5 个试点站点训练 tote induction、depalletizing 或 mixed-SKU picking 的移动操作策略。
  secondary: 为多个仓储客户搭可复用任务库的机器人系统集成商 CTO 或数据平台负责人。
  buyer: VP Autonomy、CTO 或 Head of Data Platform
startupThesis:
  nonObviousInsight: 具身 AI 真正有价值的控制点，不会是一个卖原始动作片段的通用 marketplace，而是那层能把客户工作流转成可迁移示范包的系统：里面既有来源证明、采集指令，也有针对目标机器人任务做过基准验证的可用性判断。随着人类动作采集越来越便宜，瓶颈会从“有没有数据”转成“能不能足够快地买到对的那包数据”，以支撑真实部署。
  beachhead: 正在扩张 tote induction 或 mixed-SKU depalletizing 试点的 Series A-B 仓储机器人创业公司；它们下个季度需要新增 5,000–50,000 条示范，但又负担不起把稀缺机器人机队继续拿去跑 teleop 采集。
  wedge: 一个任务转数据集的 foundry：吃进 SOP 视频、机器人日志和失败案例，自动生成手机加传感器的采集规范，把任务分发给合规采集伙伴，再交付带迁移评分的训练包和面向目标操作流程的验收评估。
  whyNowCatalyst: Mecka 的融资、已签合同带来的 run-rate 信号，以及“手机加传感器”替代 teleoperation 的路径，都说明机器人团队已经在为具身数据付费，而采集供给也刚好开始规模化，足以支撑按工作流采购。
  ventureScalePath: 先从仓储操作数据项目切入，再扩成更广义的具身数据操作层，覆盖家用、医疗和野外机器人：采集规范生成、来源追踪、基准交换、授权分发，以及部署后的持续刷新，服务所有要买或自建示范数据的机器人学习团队。
solution: 公司卖的不是一个定制服务项目，而是一套把机器人项目“下一个任务缺口”直接转成可生产数据订单的系统。客户上传 SOP 录像、机器人失败样本和环境约束后，平台会吐出一份采集协议，可运行在通用手机加获批 wearable 或合作伙伴 rig 上。每条返回的示范都会按来源可信度、任务覆盖度和潜在具身迁移效果打分，再连同 autonomy 团队可在重训前执行的 eval suite 一起打包。时间越久，平台越知道哪些人类动作模式、环境条件和标注 schema，最能提升特定机器人任务的成功率，让买方更快从新客户工作流走到可部署策略。
goToMarketSeed:
  firstCustomer: 一个做 tote induction 或 depalletizing 的仓储机器人创业公司，已经有 1–3 个付费企业试点，并且必须在未来 90 天内补齐任务覆盖，否则就赶不上多站点扩张决策。
  buyingTrigger: 试点开始覆盖新的 SKU 组合或新站点布局，但内部 teleop 和机上采集来不及在客户评审或续约前补够新示范。
  currentAlternative: 内部 teleoperation 和手工示范采集，再拼上外包标注、电子表格和零散的动作捕捉实验。
  switchingReason: 这个 foundry 让团队可以更快、更可审计地采购到按工作流定制的数据，不必继续烧掉稀缺机器人机时，也不用从零搭一套分布式采集网络。
  pricingHypothesis: 按年收平台订阅费，再按活跃任务项目收 usage fee；如果要加急数据包或大规模刷新示范，再额外收费。
