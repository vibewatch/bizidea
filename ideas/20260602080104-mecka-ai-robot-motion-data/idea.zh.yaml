differentiator: 通用数据标注公司会处理媒体，但它们不知道怎样围绕机器人任务去设计采集项目、怎样验证数据能否迁移到目标具身形态，也无法把每个数据集和部署里程碑绑在一起。原始数据 marketplace 也会吃亏，因为机器人团队不要一堆无差别片段，它们要的是按工作流打包好的整套方案：来源、评估、采购逻辑一个都不能少。真正会复利的护城河，是工作流规范、采集条件和下游机器人性能提升之间那套私有映射，而且会随着重复项目不断加厚。
