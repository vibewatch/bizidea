topRisks:
- name: 迁移有效性风险
  description: 人类动作数据集未必能顺畅迁移到客户的机器人具身形态或控制栈。
  mitigation: 先从重复性强的仓储任务做起，每个数据包都附带验收评估，再用少数边界清楚的工作流去证明实际提升。
- name: 供给质量碎片化
  description: 分布式采集伙伴可能产出质量参差不齐的示范数据，进而伤害客户信任。
  mitigation: 在数据进入面向客户的数据包前，先把采集规范、硬件基线和 QA 阈值全部标准化。
- name: 内建化与供应商重叠
  description: 大型机器人团队，或像 Mecka 这样的数据供应商，可能沿着价值链往上做工作流定制数据采购。
  mitigation: 把公司定位成中立的工作流编译器和基准层，可同时接内部、合作伙伴和第三方数据源，而不是和别人正面拼原始采集。
