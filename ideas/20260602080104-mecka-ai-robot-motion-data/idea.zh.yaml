jobsToBeDone:
- job: 当仓储试点扩到新的任务变体时，帮 autonomy 团队尽快买到可迁移的示范数据，这样他们才能赶在客户扩张评审前完成重训。
  currentAlternative: 内部 teleop 采集，再临时补标注和一次性的动作捕捉
  successMetric: 从发现任务缺口到拿到可用于模型重训的合格训练包，耗时多少天
- job: 当机器人创业公司评估外部数据供应商时，帮数据团队核验来源和预期迁移效果，让他们不是靠看样片瞎猜，而是能放心采购。
  currentAlternative: 手工审供应商，再做少量离线实验，但没有统一的验收标准
  successMetric: 买回来的数据集里，有多少比例能通过验收测试并提升目标任务表现
