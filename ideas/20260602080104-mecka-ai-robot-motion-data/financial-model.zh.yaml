scenarios:
  downside:
    description: 试点转生产合同更慢、刷新项目定价更低，公司要到 Y3 后段才接近盈亏平衡。
    y3RevenueK: 4300.0
    y3EbitdaK: 23.21
    cashLowPointK: 501.43
    keyAssumptionChanges:
    - Y2 混合 ARPU 降到 $300K，Y3 降到 $400K。
    - 客户爬坡放缓：Q4Y2 只有 7 个活跃账户，Q4Y3 为 13 个。
    - 因为更多伙伴劳动仍是定制化，毛利率比基准低 3–5 个点。
  base:
    description: 基准情形里，前 2–3 个共创客户转成重复生产合同，并沿着研究建模的 Y3 15 客户路径推进。
    y3RevenueK: 5962.5
    y3EbitdaK: 1302.58
    cashLowPointK: 1058.87
    keyAssumptionChanges:
    - 无；这个情形就是 assumptions A1-A18 定义的经营计划。
  upside:
    description: 集成商转介绍更快、重复刷新项目更多，在不明显扩大固定团队的情况下把收入前拉。
    y3RevenueK: 7050.0
    y3EbitdaK: 2199.56
    cashLowPointK: 1345.34
    keyAssumptionChanges:
    - Q4Y2 末做到 10 个活跃账户，Q4Y3 末做到 18 个。
    - 更多多任务与加急刷新项目把 Y3 混合 ARPU 拉到 $470K。
    - 随着规范和伙伴认证标准化，H2Y3 毛利率提升到 72%。
