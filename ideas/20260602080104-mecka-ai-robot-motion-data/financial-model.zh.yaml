modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Deadlines[Pilot expansion deadlines] --> Customers[Active customer accounts]
      Customers --> Revenue[Subscription plus task-program revenue]
      Revenue --> GrossProfit[Gross profit after partner delivery costs]
      GrossProfit --> EBITDA[EBITDA after lean team and operating spend]
      EBITDA --> Cash[Cash runway and next-round proof]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形由 Y1 的 3 个付费共创客户驱动；它们在 Q4Y2 转成 9 个活跃账户，再沿着研究模型推到 Q4Y3 的 15 个活跃账户、$450K 混合 ACV。
- checkName: 必须跑对的事
  finding: 公司必须足够快地证明迁移提升，才能让试点项目在扩大销售团队之前顺利转成年度生产合同。
- checkName: 模型会失效如果
  finding: 如果 ARPU 掉向 $400K，或者试点转生产的销售周期被拉长到约 9 个月，现金会很快吃紧，因为团队规模已经按“交付要可信”配好了。
- checkName: 下一轮融资验证点
  finding: 一轮像样的 seed，前提是公司在 Q4Y2 末拿到约 7 份生产合同，且这 7 份落在 9 个活跃账户里，同时季度毛利率已逼近 70% 目标。
sanityChecks:
  ruleOf40: Y3 增长 189.09% + EBITDA 利润率 21.85% = 210.94%；这个数会高估质量，因为公司是从很小的 Y2 基数上同比。
  burnMultiple: Y2 burn multiple 为 0.27x = $704K 净烧钱 / $2610K 净新增 ARR；到 Y3 EBITDA 转正。
  revenuePerFte: $496.88K：按 Q4Y3 FTE 计算的 Y3 人均收入（对比 SaaS 常见区间 $200-400K；只有在高 ACV 的任务项目扩张大体保持标准化时，这种偏高输出才说得通）。
  flags:
  - 围绕工作流定制机器人数据项目的公开定价依然很少，所以 ARPU 主要锚定在 BP 合同区间和研究里的付费意愿信号，而不是直接公开可比。
  - 收入集中度很高：15 个活跃账户贡献了几乎全部 Y3 收入，因此哪怕 1 个续约推迟或 1 个迁移案例失败，前景都会明显变形。
  - 模型假设 pre-seed 在模型起始月完成；如果融资延后，招聘必须跟着放慢，首个付费共创客户也会相应后移。
  - 现金滚动把 EBITDA 直接近似成现金，没有纳入营运资金时点、capex，以及任何客户预付款或伙伴押金。
