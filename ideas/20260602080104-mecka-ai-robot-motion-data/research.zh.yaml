competitors:
- name: Mecka AI
  stage: 扩张期
  wedge: 面向 physical AI 的人类动作采集，以及数据与部署基础设施
  pricing: 企业定制 / 未披露
  strength: 品类信号强、自研采集硬件扎实，而且明确把自己放在真实世界数据与部署层。
  weaknessVsUs: 并没有明确把自己卖成一个中立的仓储任务编译器，也没有把“面向试点扩张验收的迁移保证工作流”说透。
  sourceRefs:
  - 1
  - 2
  - 3
- name: Scale AI Physical AI
  stage: 扩张期
  wedge: 服务机器人和 physical AI 的全球化采集网络与数据引擎
  pricing: 企业定制 / 未披露
  strength: 采集规模巨大、具身场景多样，数据运营强烈以性能为导向。
  weaknessVsUs: 广义 physical-AI 数据产能很强，但并不是天然围绕仓储任务采购和验收来设计。
  sourceRefs:
  - 22
- name: Dexterity
  stage: 扩张期
  wedge: 面向物流任务的企业级 physical AI 与生产数据飞轮
  pricing: 企业定制 / 未披露
  strength: 已经有生产级部署、大客户 logo，以及超过 100M 次自主决策。
  weaknessVsUs: 它是机器人加软件一体化厂商，不是一个可供多个机器人团队使用的中立供应层。
  sourceRefs:
  - 25
- name: Ambi Robotics
  stage: 扩张期
  wedge: 面向包裹分拣与堆叠的 AI 机器人系统，强调 sim-to-real 和 AmbiOS
  pricing: 企业定制 / 未披露
  strength: 在仓储自动化场景里有可信度，并强调硬件无关的训练能力。
  weaknessVsUs: 卖的是系统和操作软件，不是由买方控制、跨供应商使用的数据 foundry。
  sourceRefs:
  - 26
- name: Plus One Robotics
  stage: 扩张期
  wedge: 面向入库、depalletizing 和码垛的仓储视觉软件与监督式 autonomy
  pricing: 企业定制 / 未披露
  strength: 已经积累 1.5B+ 真实拣选，以及成熟的人在回路异常处理模型。
  weaknessVsUs: 它更适合已部署好的仓储单元，而不是为外部机器人团队做中立、按工作流定制的数据采购。
  sourceRefs:
  - 27
regulatoryTechnicalConstraints:
- point: 机器人系统部署仍要落在既有的工作场所安全框架里，所以数据集和评估流程必须反映危险源、操作员和系统集成现实，而不是只对实验室条件负责。
  sourceRefs:
  - 11
  - 12
- point: 动作采集项目可能触及类似生物特征或可识别个人数据，因此必须明确处理授权、保留和下游用途。
  sourceRefs:
  - 15
  - 16
- point: 只要模型会影响高风险或贴近安全的工作流，买方就会越来越要求 AI 治理和可追溯性可审计。
  sourceRefs:
  - 13
  - 14
- point: 具身形态不匹配依然是技术约束：多样真实世界数据当然有帮助，但没有哪套开放栈能省掉按任务验证迁移效果。
  sourceRefs:
  - 17
  - 18
  - 19
validationSignals:
- point: Mecka 的 $60M 融资，以及其围绕数据与部署层的定位，都说明投资人相信具身数据基础设施可以长成独立控制点。
  sourceRefs:
  - 1
  - 2
- point: TechStartups 报道称，Mecka 已有已签合同支撑预计 $100M 年化 run-rate，意味着真实买方已经给外部机器人数据留出了预算。
  sourceRefs:
  - 3
- point: Scale 宣称每天采集 1000+ 小时多样 physical-AI 示范，这证明工业化数据运营本身就有需求。
  sourceRefs:
  - 22
- point: DeepMind 的 Open X 工作表明，汇聚多具身数据后，测试机器人平均成功率可提升 50%。
  sourceRefs:
  - 18
- point: Plus One 超过 1.5B 次拣选，以及带 human-in-the-loop 的 Yonder 平台，都说明仓储 AI 厂商已经能把结构化边缘案例处理和真实世界反馈闭环卖出去。
  sourceRefs:
  - 27
openQuestions:
- 买方会不会接受带迁移评分的人类动作数据包作为独立软件预算，还是一定要求把它打包进服务费或集成商合同？
- 要让仓储机器人 CTO 愿意在生产时间线上用外部数据采购替掉 teleop，最小可接受的验收测试框架到底是什么？
- 对 tote induction 和 depalletizing 来说，客户现场环境一变，之前采好的示范数据包会多频繁失效？
- 哪些司法辖区或企业买方会把工人动作采集视为生物特征处理，从而要求更强的授权或本地化控制？
