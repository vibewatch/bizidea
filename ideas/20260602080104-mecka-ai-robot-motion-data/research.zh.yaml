    buyerPower:
      score: 4
      rationale: 早期买方数量少、技术门槛高，而且如果产品不能明确证明能加快部署，它们随时可以退回内部 teleop、服务商方案或垂直一体化厂商。
      sourceRefs:
      - 6
      - 25
      - 26
      - 27
    threatOfEntrants:
      score: 3
      rationale: 采集工具本身不难做，开放机器人学习栈也在降低技术门槛；但信任、采集运营和长期积累的迁移基准，并不容易被快速复制。
      sourceRefs:
      - 17
      - 19
      - 20
      - 21
    threatOfSubstitutes:
      score: 5
      rationale: 替代品非常多：内部 teleop、通用数据引擎、开放数据集、仿真优先方案和全栈仓储机器人厂商，今天都能解决这项工作的一部分。
      sourceRefs:
      - 17
      - 21
      - 22
      - 25
      - 27
    competitiveRivalry:
      score: 4
      rationale: 竞争已经不轻，因为多个相邻玩家都在抢 physical-AI 数据这一层；只是“工作流到数据集”这个细分位点，还没人完全占稳。
      sourceRefs:
      - 1
      - 22
      - 25
      - 26
      - 27
  pestle:
  - factor: 政治
    impact: positive
    point: 政府和标准机构正在把可信 AI 与机器人治理制度化；虽然合规工作更重了，但也让可审计的基础设施比非正式数据采集更吃香。
    sourceRefs:
    - 13
    - 14
  - factor: 经济
    impact: positive
    point: 仓储自动化预算和仓储机器人市场仍在增长，给能解部署瓶颈的软件留出了空间，而不只是给更多硬件留空间。
    sourceRefs:
    - 6
    - 7
    - 8
  - factor: 社会
    impact: negative
    point: 在工作场所采集人类动作，容易触发员工监控和生物特征担忧，尤其是买方说不清保留、授权和下游用途时。
    sourceRefs:
    - 15
    - 16
  - factor: 技术
    impact: positive
    point: 跨具身数据集和 VLA 模型已经证明，多样真实世界数据确实能显著提升机器人表现，这也抬高了更好数据运营的战略价值。
    sourceRefs:
    - 17
    - 18
    - 40
  - factor: 法律
    impact: negative
    point: 安全、隐私和文档要求会拉高导入摩擦，因为客户要的不是一堆原始片段，而是带来源和风控控制的数据。
    sourceRefs:
    - 11
    - 14
    - 15
  adoptionFrictionMatrix:
  - friction: 证明人类动作数据集能迁移到买方的具体机器人具身形态和工作流
    severity: high
    affectedBuyer: VP Autonomy 或 Head of ML Platform
    mitigation: 先从范围窄、重复性高的任务做起，并把任务定制验收评估和基准基线绑进每个数据包。
    sourceRefs:
    - 17
    - 18
    - 19
  - friction: 为动作采集建立合规的工人授权与保留规则
    severity: high
    affectedBuyer: CTO 以及法务/安全相关方
    mitigation: 从第一单部署开始，就把明确的授权、保留、删除和来源控制内建进每个采集项目。
    sourceRefs:
    - 14
    - 15
    - 16
  - friction: 把采购来的数据集接进现有机器人学习和 fleet 工作流
    severity: medium
    affectedBuyer: 数据工程与机器人平台团队
    mitigation: 给常见机器人学习栈提供兼容导出格式、基准适配器和验证脚本。
    sourceRefs:
    - 20
    - 21
    - 28
  - friction: 预算归属仍然埋在集成或硬件项目里
    severity: high
    affectedBuyer: CTO 和部署项目的财务负责人
    mitigation: 把产品定位成降低试点扩张 deadline 风险的工具，而不是又一个通用数据标注产能供应商。
    sourceRefs:
    - 6
    - 25
    - 27
