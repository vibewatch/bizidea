    supplierPower:
      score: 4
      rationale: 数据权利、采集运营以及机器人专用评估环境的获取，仍集中在买方、采集伙伴和平台厂商手里，所以创业公司得同时依赖几股都不弱的输入方。
      sourceRefs:
