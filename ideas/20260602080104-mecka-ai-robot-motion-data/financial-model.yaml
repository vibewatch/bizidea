scenarios:
  downside:
    description: Slower conversion from pilots to production contracts and lower-priced refresh work push the company near break-even only late in Y3.
    y3RevenueK: 4300.0
    y3EbitdaK: 23.21
    cashLowPointK: 501.43
    keyAssumptionChanges:
    - Y2 blended ARPU drops to $300K and Y3 to $400K.
    - Customer ramp slips to 7 active accounts by Q4Y2 and 13 by Q4Y3.
    - Gross margin lands 3-5 points below base because more partner labor stays bespoke.
  base:
    description: Base case converts the first 2-3 design partners into repeat production contracts and reaches the research-modeled 15-customer Y3 path.
    y3RevenueK: 5962.5
    y3EbitdaK: 1302.58
    cashLowPointK: 1058.87
    keyAssumptionChanges:
    - None; this scenario is the operating plan defined by assumptions A1-A18.
  upside:
    description: Faster integrator referrals and more repeat refresh programs pull revenue forward without needing a much larger fixed team.
    y3RevenueK: 7050.0
    y3EbitdaK: 2199.56
    cashLowPointK: 1345.34
    keyAssumptionChanges:
    - Q4Y2 exits at 10 active accounts and Q4Y3 at 18.
    - Y3 blended ARPU rises to $470K on more multi-task and expedited refresh work.
    - Gross margin reaches 72% by H2Y3 as specs and partner certification standardize.
