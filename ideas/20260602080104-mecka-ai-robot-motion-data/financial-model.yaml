modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Deadlines[Pilot expansion deadlines] --> Customers[Active customer accounts]
      Customers --> Revenue[Subscription plus task-program revenue]
      Revenue --> GrossProfit[Gross profit after partner delivery costs]
      GrossProfit --> EBITDA[EBITDA after lean team and operating spend]
      EBITDA --> Cash[Cash runway and next-round proof]
modelSanity:
- checkName: Revenue engine
  finding: The base case is driven by three paid design partners in Y1 converting into nine active accounts by Q4Y2 and then the research-modeled path to 15 active accounts at a $450K blended ACV by Q4Y3.
- checkName: Must go right
  finding: The company has to prove transfer lift quickly enough that pilot work converts into annual production contracts before it adds a broader sales team.
- checkName: Model breaks if
  finding: If ARPU falls toward $400K or the pilot-to-production sales cycle stretches to roughly nine months, cash tightens fast because the team is already sized for delivery credibility.
- checkName: Next-round proof
  finding: A seed-worthy next round depends on exiting Q4Y2 with about seven production contracts inside nine active accounts and quarterly gross margin already near the 70% target.
sanityChecks:
  ruleOf40: Y3 growth 189.09% + EBITDA margin 21.85% = 210.94%; this overstates quality because the company is comping off a small Y2 base.
  burnMultiple: Y2 burn multiple 0.27x = $704K net burn / $2610K net new ARR; Y3 turns EBITDA positive.
  revenuePerFte: $496.88K Y3 revenue per Q4Y3 FTE (benchmark $200-400K SaaS; above-range output is plausible only if high-ACV task-program expansion remains mostly standardized).
  flags:
  - Public pricing for workflow-specific robotics data programs remains thin, so ARPU is anchored to BP contract ranges and research willingness-to-pay signals rather than direct public comps.
  - 'Revenue concentration is high: 15 active accounts produce nearly all Y3 revenue, so one delayed renewal or failed transfer case meaningfully changes the outlook.'
  - The model assumes the pre-seed closes at model start; a delayed financing would force slower hiring and push the first paid design partner later.
  - Cash roll-forward treats EBITDA as cash and excludes working-capital timing, capex, and any customer prepayments or partner deposits.
