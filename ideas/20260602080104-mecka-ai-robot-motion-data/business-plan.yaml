slug: robot-task-data-foundry
date: '2026-06-02'
executiveSummary: >-
  Robot Task Data Foundry targets Series A-B warehouse robotics startups and
  integrators that must expand tote-induction or mixed-SKU depalletizing pilots
  within one quarter but cannot gather enough new demonstrations through
  internal teleop and ad hoc capture. The product turns SOP video, robot logs,
  and failure cases into an auditable capture program, then returns
  transfer-scored data packs and acceptance evals tied to the buyer's target
  workflow. The first sale should happen when a paid pilot expands to a new SKU
  mix or site layout and deployment timing is at risk, because that is when the
  buyer, budget, and urgency align. The company is deliberately not starting as
  a generic robotics dataset marketplace or a vertically integrated capture
  factory, because those paths either dilute proof or require owning too much
  supply before demand is validated. The strongest evidence is that embodied
  data now has its own budget line, with Mecka's financing and reported signed
  contracts showing buyers already pay for external robotics data programs.
  Market size is plausible for venture scale, with research-modeled TAM, SAM,
  and year-3 SOM of "$1.1B", "$48.0M", and "$6.0M", but those figures remain
  modeled estimates rather than hard public budget disclosures. The biggest
  disconfirming risk is transfer validity: if external human-motion packs do
  not outperform customer teleop on narrow warehouse tasks, the product becomes
  a services layer rather than a durable software control point. Direct public
  pricing benchmarks are also thin, so early contracts must prove that a
  low-six-figure annual software budget can be separated from broader services
  or integrator statements of work.
problem:
  - Warehouse robotics teams still rely on scarce robot-hours, teleoperation, and stitched-together annotation vendors to generate new demonstrations, which delays pilot expansion when SKU mix, site layout, or customer workflows change.
  - Buyers lack a neutral way to specify the exact workflow they need, verify provenance and worker-consent controls, and predict whether an external human-motion dataset will transfer to their robot stack before a renewal or rollout decision.
solution:
  - Ingest SOP footage, robot logs, failure cases, and environment constraints, then compile them into a warehouse-task-specific capture spec that approved partners can run on phones plus standardized sensors or rigs.
  - Return provenance-scored, transfer-scored training packs with acceptance evals and reusable export adapters so the autonomy team can decide faster whether to retrain, refresh, or reject a dataset.
whyWeWin:
  - The wedge is a neutral workflow compiler plus transfer-assurance layer across internal, partner, and third-party data sources, which adjacent data engines and warehouse robot vendors do not clearly own today.
  - Defensibility compounds through proprietary mappings between workflow requirements, capture conditions, provenance history, and measured task-performance lift on repeated warehouse programs.
strategicChoices:
  beachhead: Series A-B warehouse robotics startups and systems integrators in North America running tote-induction or mixed-SKU depalletizing pilots across 2-5 customer sites
  wedgeRationale: This slice has a clear budget owner, a near-term deployment deadline, and repetitive workflows where transfer lift can be measured quickly; starting with broader humanoid, home, or general-purpose robotics would increase embodiment variance and lengthen proof cycles.
  sequencingRationale: Start with one narrow workflow compiler and acceptance layer, then add partner capacity and benchmark history after two to three paid design partners prove lift, then expand into adjacent warehouse tasks and geographies only after the company has a repeatable sales trigger and reusable data model.
  notYet:
    - Generic marketplace for raw robotics motion clips
    - End-customer warehouse software sold directly to operators before robot-team proof exists
    - Home, healthcare, field, or humanoid robotics workflows
    - Owning a large captive capture workforce or custom hardware supply chain from day one
market:
  tam: "$1.1B modeled global market for workflow-specific warehouse and robot-program data infrastructure"
  sam: "$48.0M modeled beachhead across about 120 Series A-B warehouse robotics startups and integrators in North America, Europe, and selected Asia accounts"
  som: "$6.0M reachable year-3 revenue at 15 active customers and about $400k ACV"
  segments:
    - Warehouse robotics startups expanding manipulation pilots for tote induction or mixed-SKU depalletizing
    - Robotics systems integrators building reusable task libraries across multiple warehouse customers
  buyingProcess: >-
    The deal should start with the VP Autonomy, CTO, or Head of Data Platform
    when a pilot needs 5,000-50,000 new demonstrations before a customer review
    or expansion deadline. Autonomy, data engineering, legal, and deployment
    stakeholders then validate transfer evidence, provenance controls, and
    export compatibility before approving budget inside the deployment program.
product:
  mvp: >-
    MVP covers workflow intake, capture-spec generation, partner routing,
    provenance and QA scoring, transfer-oriented acceptance evals, and export
    adapters for one or two warehouse manipulation workflows. It should replace
    ad hoc data procurement before attempting a broad robotics-data marketplace
    or full post-deployment analytics suite.
  sixMonth: Ship a paid design-partner release for tote induction and mixed-SKU depalletizing with workflow intake, capture specs, provenance controls, acceptance evals, and standard exports into common robot-learning stacks.
  twelveMonth: Prove measurable retraining-speed or task-success improvement across 2-3 customers, add benchmark history by workflow variant, and formalize approved capture-partner certification and compliance workflows.
  twentyFourMonth: Expand into a neutral embodied-data operating layer for adjacent warehouse tasks with refresh programs, broader benchmark exchange, and multi-region partner capacity while keeping warehouse manipulation as the core reference category.
  keyBets:
    - Buyers will pay for workflow-specific procurement and acceptance, not just generic data-collection throughput.
    - Narrow repetitive warehouse tasks provide enough shared structure to build a reusable product before services overwhelm margins.
    - Transfer-scored evals will matter more in the sale than raw clip volume or lowest-cost collection.
    - Compliance and provenance features will help the startup win against ad hoc vendors rather than slow adoption fatally.
gtm:
  wedge: Sell to warehouse robot autonomy leaders at the moment a paid pilot must expand to a new SKU mix or site layout and internal teleop cannot deliver enough demonstrations before the customer decision date.
  channels:
    - Founder-led direct sales to VP Autonomy, CTO, and Head of Data Platform at warehouse robotics startups
    - Design-partner motions with systems integrators already inside deployment and acceptance workflows
    - Referral and co-delivery partnerships with neutral data engines and approved capture providers
  funnelTargets: "Target account to qualified pilot 20%+, qualified pilot to paid design partner 50%+, paid design partner to annual production contract 60%+"
  pricing: Annual platform subscription plus per-active-task-program fees, with premium charges for expedited refreshes, because the buyer values deadline risk reduction and transfer assurance at workflow level rather than raw clip count alone.
businessModel:
  revenueStreams:
    - Annual software subscription for workflow intake, provenance, QA, and transfer-assurance tooling
    - Usage fees per active task program and dataset refresh cycle
    - Premium expedited capture, evaluation, and compliance support packages
  unitOfValue: Active warehouse task program managed from workflow spec to accepted training pack
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more task variants, sites, and refresh cycles within the same robot program
    - Expand from startup OEMs into integrator-managed multi-vendor robot fleets
    - Sell benchmark history, acceptance analytics, and partner-governance modules
    - Extend the same workflow compiler into adjacent warehouse manipulation categories after proof
strategyMap:
  northStarMetric: Median days from identified task gap to accepted training pack ready for retraining
  inputMetrics:
    - Qualified opportunities tied to live pilot-expansion deadlines
    - Paid design partners using acceptance evals on active task programs
    - Percentage of returned demos passing provenance and QA thresholds on first submission
    - Acceptance-pack to production-contract conversion rate
    - Measured task-success lift or retraining-time reduction on target workflows
  moatsToBuild:
    - Workflow-to-capture specification graph for repetitive warehouse tasks
    - Acceptance-test history tied to specific embodiments, environments, and outcomes
    - Approved partner network with provenance and compliance performance data
    - Reusable export and benchmark adapters for the dominant robot-learning stacks in the beachhead
  killCriteria:
    - Fewer than 3 of the first 10 target accounts confirm a funded task-data budget tied to a pilot-expansion deadline
    - First 2 paid design partners fail to show a measurable retraining-speed gain or task-success lift versus incumbent teleop
    - More than half of prospects insist the budget must remain buried inside bespoke services or integrator statements of work
    - Capture-partner QA pass rates stay below 80% after standardized specs and onboarding
  mermaid: |
    flowchart LR
      Wedge[Warehouse task wedge] --> MVP[Workflow compiler and acceptance MVP]
      MVP --> Proof[Paid design partner proof]
      Proof --> Expansion[More tasks partners and accounts]
      Expansion --> Moat[Benchmark and provenance moat]
investorMemo:
  verdict:
    call: "Watch"
    conviction: Strong workflow pain and a credible wedge, but conviction stays limited until transfer lift and standalone budget ownership are proven in paid deployments.
    whyBelieve: Buyers already spend on external embodied data, and no incumbent clearly owns neutral workflow-specific procurement plus transfer assurance across warehouse robot teams.
    whyDoubt: Substitutes are abundant, and the company fails if external human-motion packs do not beat internal teleop on narrow tasks with enough margin to support software pricing.
    nextDiligence: Win two paid design partners, run side-by-side transfer tests against incumbent teleop, and confirm at least one converts into an annual production contract.
  firstCustomer:
    title: VP Autonomy at a warehouse robotics startup expanding a tote-induction or depalletizing pilot
    profile: Leads model performance and deployment timing at a 30-150 person robot company with 1-3 paid warehouse pilots and scarce robot-hours for new data collection.
    trigger: A customer expansion introduces new SKU mix or site-layout variance and the team must source 5,000-50,000 demonstrations before a renewal or rollout review.
    buyer: VP Autonomy, CTO, or Head of Data Platform
    initialContract: "$75k-150k paid design partner for one task program and acceptance pack, converting to roughly $250k-500k annual contract as active workflows and refresh cycles expand."
  mustBeTrue:
    - At least 5 of the first 10 target accounts treat pilot-expansion data gaps as a current funded problem, not a future R&D wish list.
    - The first 2 paid programs show measurable improvement in retraining time or task success versus incumbent teleop or ad hoc capture.
    - Buyers accept a workflow-level software budget instead of forcing the product into low-margin custom services.
    - A narrow set of warehouse workflows shares enough structure that the product can stay mostly standard through the first 5 customers.
    - Provenance, consent, and acceptance controls help win enterprise approval rather than adding fatal onboarding friction.
  diligenceQuestions:
    - Who owns budget when a warehouse pilot needs new demonstrations inside one quarter?
    - What transfer metric is persuasive enough for a robotics CTO to replace teleop on a live deployment timeline?
    - How much of the first contract can be software versus custom services and partner labor?
    - Which workflow variants stay reusable across customers, and which break the product into one-off projects?
    - Do integrators prefer this as neutral infrastructure or see it as another services vendor to absorb?
operatingAssumptions:
  - assumption: A meaningful subset of warehouse robotics teams will fund external task-data programs as a standalone budget line when pilot expansion deadlines are at risk.
    basis: research.yaml
    validationTest: Interview 10 autonomy leaders and 5 integrators and confirm at least 5 accounts can identify a budget owner, timing trigger, and low-six-figure spend range.
    decisionImpact: If false, reposition toward integrator-led services software or stop before scaling go-to-market hires.
  - assumption: Workflow-specific acceptance evals can prove enough transfer value to displace internal teleop on repetitive warehouse tasks.
    basis: idea.yaml
    validationTest: Run 2 side-by-side pilots on tote induction or depalletizing and show measurable retraining-speed gains or task-success lift versus the customer's current collection method.
    decisionImpact: If false, the company should narrow to provenance tooling or exit the transfer-assurance thesis.
  - assumption: Approved capture partners can meet standardized QA and consent thresholds without the startup owning the whole supply chain.
    basis: operator judgment
    validationTest: Onboard 3 partners and confirm at least 80% first-pass QA acceptance on the first 500 demonstrations under one shared spec.
    decisionImpact: If false, gross margins fall and the roadmap must either own more operations or reduce ambition.
  - assumption: Common export formats and lightweight adapters will be enough for early customer robot-learning stacks.
    basis: research.yaml
    validationTest: Integrate with 3 target customer stacks and confirm training-pack delivery without a bespoke data-engineering project exceeding two weeks each.
    decisionImpact: If false, product scope expands into a heavy integration business and fundraising needs rise.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview warehouse robotics autonomy leaders and integrators around active pilot-expansion deadlines and data-budget ownership.
    hypothesis: Budget appears when new SKU or site variance threatens a customer rollout or renewal date.
    successMetric: At least 5 of 10 target accounts describe a live or recent funded data bottleneck tied to deployment timing.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Collect SOP footage, failure logs, and environment constraints from prospects and compile capture specs for one narrow workflow.
    hypothesis: One repeatable workflow-intake template can cover the first two warehouse use cases without custom consulting dominating scope.
    successMetric: Two prospects approve a draft spec with less than one week of customization each.
    owner: Founder CTO
  - horizon: 90–180 days
    experiment: Ship MVP with workflow intake, partner routing, provenance scoring, and acceptance evals for tote induction and mixed-SKU depalletizing.
    hypothesis: Buyers will pay for transfer assurance before the company has a broad marketplace or deep benchmark library.
    successMetric: Two paid design partners signed and actively reviewing accepted training packs.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run side-by-side transfer tests against the customer's incumbent teleop or ad hoc capture process.
    hypothesis: External human-motion packs can reduce time to retraining or improve task success on a narrowly scoped workflow.
    successMetric: One signed case study showing at least 20% faster pack readiness or a measurable task-success lift on the target workflow.
    owner: Robotics ML lead
  - horizon: 180–360 days
    experiment: Formalize approved-partner certification for QA, consent, retention, and audit-trail requirements.
    hypothesis: Standardized partner governance increases buyer trust and reduces delivery variance without the startup owning collection labor directly.
    successMetric: Three approved partners achieve 80%+ first-pass QA acceptance and pass customer compliance review.
    owner: Program ops lead
  - horizon: 180–360 days
    experiment: Add benchmark history and refresh planning across repeat customer programs.
    hypothesis: Acceptance-history data drives renewals and expansion better than low-price data fulfillment alone.
    successMetric: One customer expands from a single workflow to multiple active task programs after a documented benchmark win.
    owner: Product lead
operations:
  - Maintain a controlled intake and acceptance rubric linking workflow specs, provenance fields, consent records, and QA thresholds for every task program.
  - Run weekly partner-operations reviews on spec compliance, first-pass QA, and expedited-delivery exceptions.
  - Keep export adapters, evaluation scripts, and benchmark baselines versioned so every accepted pack is reproducible.
  - Design retention, deletion, and audit logging around worker-motion and safety-sensitive capture data from the first deployment.
team:
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own concentrated enterprise sales, design-partner discovery, and integrator relationships in a narrow buyer market.
  - role: Founder CTO
    startTiming: Month 0
    rationale: Define the workflow compiler, provenance model, and scope discipline needed to prevent services sprawl.
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the initial workflow intake, partner routing, and customer-facing acceptance tooling.
  - role: Robotics ML lead
    startTiming: Month 3
    rationale: Own transfer-eval design, benchmark methodology, and customer proof points that make the product investable.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Implement export adapters and integration playbooks for the first customer robot-learning stacks.
  - role: Program ops and compliance lead
    startTiming: Month 6
    rationale: Stand up partner certification, consent workflows, and auditability so capture operations scale without losing trust.
milestones:
  - horizon: 0–12 months
    items:
      - Validate budget ownership, buying trigger, and reuse across the first 10 target accounts
      - Ship MVP for tote induction and mixed-SKU depalletizing with acceptance evals and export adapters
      - Win 2-3 paid design partners and publish one measurable transfer or retraining-speed case study
      - Certify the first 2-3 capture partners against QA, consent, and provenance requirements
  - horizon: 12–24 months
    items:
      - Convert design partners into 5-8 annual production contracts centered on active task programs and refresh cycles
      - Launch benchmark-history and partner-governance modules that improve renewal and expansion rates
      - Expand into adjacent warehouse manipulation workflows while keeping implementation mostly standardized
      - Build repeatable co-sell motions with at least 2 integrators or neutral data-engine partners
  - horizon: 24–36 months
    items:
      - Reach the research-modeled year-3 SOM path of about 15 active customers and roughly $6.0M revenue
      - Become the neutral workflow-to-dataset control layer for multi-vendor warehouse robot teams in the beachhead
      - Extend the platform into broader embodied-data licensing and refresh programs for adjacent robot categories without breaking margins
risks:
  - risk: Transfer-scored human-motion packs do not deliver enough measurable lift versus internal teleop on target embodiments.
    likelihood: High
    impact: High
    mitigation: Start with repetitive warehouse workflows, require acceptance evals on every pack, and refuse broad expansion until two paid customers show measurable performance or speed gains.
  - risk: Buyers keep data procurement budget inside integrator services or internal engineering, limiting software ACV.
    likelihood: High
    impact: High
    mitigation: Sell against deployment deadlines with explicit ROI on time-to-retraining, and use design-partner contracts that separate software, partner labor, and expedited services line items.
  - risk: Capture-partner quality and consent practices are inconsistent, undermining trust and margin.
    likelihood: Medium
    impact: High
    mitigation: Enforce partner certification, standardized specs, audit trails, and minimum first-pass QA thresholds before packs reach customers.
  - risk: Neutral data engines or full-stack warehouse robot vendors move up-stack into the same workflow-procurement layer.
    likelihood: Medium
    impact: Medium
    mitigation: Own the workflow compiler, benchmark history, and cross-vendor acceptance system rather than competing head-on as a raw data collector.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the founding product team, transfer-eval and integration hires, the first approved partner network, and 2-3 paid design-partner deployments needed to prove standalone budget ownership and repeatable warehouse-task lift.
