topRisks:
  - name: 平台吸纳
    description: 模型服务厂商或超大规模云厂商可能推出基础工作区缓存功能，压缩技术切口空间。
    mitigation: 深耕授权策略、爆发预热和工作区级 ROI 工作流——这些能力横跨各厂商，并与企业运营指标直接挂钩，云厂商难以内化。
  - name: 缓存正确性与隐私
    description: 一次误判复用就可能将错误的租户上下文暴露给另一租户，摧毁早期客户的信任。
    mitigation: 以纯推荐模式起步，每个可复用缓存包都要求授权证明，并在启用自动复用前先上线可审计的回放日志。
  - name: 滩头市场过窄
    description: 首个切口依赖于客户在足够大的规模上自托管模型，缓存经济效益才能显现。
    mitigation: 专注于月 GPU 支出已超 $50k 的共创客户，在取得验证后再将控制平面扩展至托管端点和相邻的重复上下文工作流。
