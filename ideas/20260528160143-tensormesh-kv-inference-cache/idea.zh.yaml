problem: >-
  企业 Copilot 反复将相同的系统提示词、检索上下文、策略指令和账户专属知识发送给昂贵的自托管模型，但大多数平台团队仍把每条请求当作全新推理处理。
  底层 KV 缓存基础设施本可削减成本，然而如果没有模型服务器之上的控制层，企业无法在不违反租户隔离、提示词版本或访问权限边界的前提下安全复用上下文。
  结果是 GPU 预算白白浪费，重复工作流期间延迟飙升，性能收益与数据泄漏风险之间两难取舍。
targetUser:
  primary: 在自托管开源模型上为 50 家以上企业租户运营专属客服 Copilot 的 B2B 软件或外包支持公司 AI 平台负责人
  secondary: 负责多租户推理集群 GPU 效率、租户隔离和生产可靠性的 ML 基础设施经理
  buyer: VP 平台工程、AI 基础设施负责人，或客服 AI 产品线总经理
startupThesis:
  nonObviousInsight: >-
    真正的瓶颈已不再是 KV 缓存在模型层能否跑通，而是企业能否把可复用的上下文打包成带权限、有版本的缓存对象——在不违反租户隔离或提示词治理规则的前提下，跨重复工作流持久存活。
  beachhead: >-
    B 轮及以上客服软件供应商和 BPO 平台的 AI 平台团队，这些团队在自托管 Llama 或 Mistral 级模型上运行按租户隔离的专属客服 Copilot，同样的知识库和策略提示词每天命中数千次。
  wedge: >-
    一个工作区感知的缓存控制平面——对提示词栈做指纹识别，在工单量激增前预热高频上下文，对缓存复用执行租户和文档授权管控，并按工作区和模型维度展示缓存命中带来的节省。
  whyNowCatalyst: >-
    Tensormesh 的融资、10 倍经济效益主张，以及兼容 OpenAI 的部署栈，证明底层缓存原语今天已经可用——这让缺失的企业控制平面变得更加迫切。
  ventureScalePath: >-
    从客服 Copilot 起步，扩展到所有需要重复上下文的企业工作流——销售助手、入职向导、内部知识 Copilot、编程助手——最终成为跨厂商的操作层，统管缓存策略、预热调度和企业 AI 机群的 GPU 效率。
solution: >-
  Workspace KV Cache Plane 位于应用网关与推理运行时之间，决定何时应复用上下文、何时应重新生成、何时应预热。
  它把系统提示词、检索片段和策略指令组织成版本化的缓存包，按工作区、角色和文档集划定范围，确保一个租户的热上下文绝不渗入另一个租户。
  产品持续监测工单和请求模式，在产品发布或事故激增等预期爆发前提前预热，并按客户工作区输出节省额与延迟归因。
  它不替换 vLLM、托管推理或新兴的 LMCache 系栈，而是让这些后端对应用团队而言既安全又经济可见。
goToMarketSeed:
  firstCustomer: B 轮及以上客服软件供应商或 AI 赋能 BPO 平台——拥有 50 家以上企业租户、自托管开源客服 Copilot，且每月在重复检索密集型工作流上的 GPU 支出超过 $50k
  buyingTrigger: 推理支出上升导致利润收窄、GPU 容量续约决策，或新企业客户在更大范围 Copilot 部署前要求更严格的租户隔离
  currentAlternative: GPU 过度供给、应用层记忆化、通用模型服务缓存，以及 ML 基础设施团队手动预热缓存
  switchingReason: 产品无需更换模型厂商或重建服务栈，即可实现安全的缓存复用、预热自动化和租户级可观测性
  pricingHypothesis: 年度平台费 + 基于托管缓存 Token 量或已验证 GPU 节省额的用量层级计费；从针对高支出推理集群的共创客户合同起步
