jobsToBeDone:
  - job: 当重复工单命中同一知识库时，帮助 AI 平台团队自动安全地复用上下文，在不泄漏租户数据的前提下降低 GPU 支出。
    currentAlternative: 通用服务缓存 + ML 基础设施工程师手动调优
    successMetric: 超过 30% 的重复请求通过已批准的缓存复用服务，同时零跨租户事故
  - job: 当已知需求峰值即将到来时，帮助客服 AI 运营者预热正确的上下文，在工单激增期间守住延迟目标，无需过度供给 GPU。
    currentAlternative: 保持额外 GPU 容量在线，或在爆发期接受响应时间变慢
    successMetric: 计划中的流量峰值期间，p95 响应延迟不超出 SLA，同时减少备用 GPU 容量
