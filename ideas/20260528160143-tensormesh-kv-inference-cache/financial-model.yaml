scenarios:
  downside:
    description: Pricing compresses to roughly $204K ARR, enterprise close cycles slip by about one quarter, and gross margin stays at 68%, leaving the company in pilot-heavy mode.
    y3RevenueK: 2470.0
    y3EbitdaK: -1310.0
    cashLowPointK: 130.0
    keyAssumptionChanges:
      - ARPU annualized from $228K to $204K
      - Y2-Y3 deployment adds slip back roughly one quarter
      - Gross margin held at 68% instead of 72%
  base:
    description: Founder-led pilots convert into a measured enterprise cadence, ending Y3 with 18 paid governed deployments and about $4.1M of exit ARR.
    y3RevenueK: 3211.0
    y3EbitdaK: -575.4
    cashLowPointK: 867.4
    keyAssumptionChanges:
      - Uses assumptions A2-A22 as modeled
      - Expansion comes mainly from more workflows inside early accounts before broad new-logo growth
      - Hiring stays milestone-gated through Y3
  upside:
    description: A partner channel starts contributing in H2Y2, blended ARR rises to roughly $240K, and the company ends Y3 with 20 paid governed deployments.
    y3RevenueK: 3914.0
    y3EbitdaK: -85.0
    cashLowPointK: 1240.0
    keyAssumptionChanges:
      - ARPU annualized from $228K to $240K
      - Two additional Y3 deployment wins arrive via partner-sourced deals
      - Gross margin improves to 74% as onboarding becomes more repeatable
