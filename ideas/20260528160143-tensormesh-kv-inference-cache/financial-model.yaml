modelDiagram:
  title: workspace cache control revenue model
  mermaid: |
    flowchart LR
      Leads[Triggered support-AI accounts] --> Pilots[Paid overlay pilots]
      Pilots --> Proof[Safe reuse and savings proof]
      Proof --> Expansion[More governed deployments per account]
      Expansion --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[72% gross profit]
      GrossProfit --> Cash[Runway to Q4Y2 milestone]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by reaching 18 paid governed deployments at roughly $228K ARR each, with most growth coming from land-and-expand inside early support-AI accounts.
  - checkName: Must go right
    finding: The company needs Y1 pilots to convert into a repeatable Y2 cadence of roughly one to two new governed deployments per quarter without pulling hiring materially ahead of proof.
  - checkName: Model breaks if
    finding: If pricing slips toward the downside case and close cycles push out by a quarter, ending cash falls toward ~$130K and the business would need either a bridge or a sharper cost reset.
  - checkName: Next-round proof
    finding: Reaching 9 paid governed deployments, 5+ active accounts, and a partner-sourced pipeline by Q4Y2 is the milestone that supports the next financing.
sanityChecks:
  ruleOf40: Y3 growth 113.9% + EBITDA margin -17.9% = 96.0%
  burnMultiple: Y2 burn multiple 0.78x improving to Y3 burn multiple 0.28x on roughly $1.1M and $2.1M of net new ARR.
  revenuePerFte: $201K Y3 using Q4Y3 16 FTE (benchmark $200-400K enterprise SaaS)
  flags:
    - The base case assumes a narrow beachhead can grow from 4 to 18 paid governed deployments in two years, so missing the land-and-expand motion inside early accounts would pressure Y3 revenue quickly.
    - Rule-of-40 direction is healthy by Y3, but EBITDA is still negative, so the next round depends on efficient expansion proof rather than near-term profitability.
    - Cash stays positive on a $3.0M seed only if solutions and sales hiring remain milestone-gated and pilots do not turn into services-heavy custom projects.
