modelDiagram:
  title: 工作区缓存控制收入模型
  mermaid: |
    flowchart LR
      Leads[Triggered support-AI accounts] --> Pilots[Paid overlay pilots]
      Pilots --> Proof[Safe reuse and savings proof]
      Proof --> Expansion[More governed deployments per account]
      Expansion --> Revenue[Subscription and usage revenue]
      Revenue --> GrossProfit[72% gross profit]
      GrossProfit --> Cash[Runway to Q4Y2 milestone]
modelSanity:
  - checkName: 收入引擎
    finding: 基础情形收入依赖于达成 18 个付费治理部署，每个约 $228k ARR，大部分增长来自早期客服 AI 客户内部的先落地后扩展。
  - checkName: 必须做对的事
    finding: 公司需要 Y1 试点转化为可复用的 Y2 节奏，每季度新增约 1–2 个治理部署，同时不在验证前大幅提前招聘。
  - checkName: 模型失效条件
    finding: 如果定价滑向悲观情形且成交周期推迟一个季度，期末现金将跌至约 $130k，公司需要过桥融资或更大力度的成本压缩。
  - checkName: 下一轮融资验证点
    finding: 在 Q4Y2 前达成 9 个付费治理部署、5 个以上活跃客户和合作伙伴来源管道，是支撑下一轮融资的里程碑。
sanityChecks:
  ruleOf40: Y3 增长率 113.9% + EBITDA 利润率 -17.9% = 96.0%
  burnMultiple: Y2 烧钱倍数 0.78x，Y3 改善至 0.28x，净新增 ARR 分别约 $1.1M 和 $2.1M。
  revenuePerFte: Y3 $201k，基于 Q4Y3 16 名全职员工（企业 SaaS 基准 $200k–$400k）
  flags:
    - 基础情形假设一个窄滩头市场能在两年内从 4 个增长至 18 个付费治理部署，若早期客户内的先落地后扩展节奏出现偏差，Y3 收入将迅速承压。
    - 40 法则方向在 Y3 良好，但 EBITDA 仍为负，下一轮融资有赖于高效扩张的验证，而非近期盈利能力。
    - 仅凭 $3.0M 种子资金保持现金为正，前提是解决方案和销售招聘保持里程碑门控，且试点不演变为服务密集型的定制项目。
