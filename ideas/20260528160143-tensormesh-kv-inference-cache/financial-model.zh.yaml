    name: 非薪酬运营支出增长
    value: Y1 S&M/R&D/G&A = 72/120/90；Y2 = 120/156/108；Y3 = 180/216/138
    unit: usdK/year
    source: '[长周期基础设施交易所需企业差旅、云工具、安全/合规和法务支出的经验值]'
