scenarios:
  downside:
    description: 定价压缩至约 $204k ARR，企业成交周期拖延约一个季度，毛利率维持在 68%，公司停留在以试点为主的状态。
    y3RevenueK: 2470.0
    y3EbitdaK: -1310.0
    cashLowPointK: 130.0
    keyAssumptionChanges:
      - ARPU 年化从 $228k 降至 $204k
      - Y2–Y3 部署新增推迟约一个季度
      - 毛利率保持在 68% 而非 72%
  base:
    description: 创始人主导的试点转化为稳定的企业节奏，Y3 末拥有 18 个付费治理部署，退出 ARR 约 $4.1M。
    y3RevenueK: 3211.0
    y3EbitdaK: -575.4
    cashLowPointK: 867.4
    keyAssumptionChanges:
      - 使用 A2–A22 建模假设
      - 扩张主要来自早期客户内部增加工作流，而非广泛的新客户增长
      - 招聘在 Y3 全程保持里程碑门控
  upside:
    description: 合作伙伴渠道在 H2Y2 开始贡献，混合 ARR 升至约 $240k，公司 Y3 末拥有 20 个付费治理部署。
    y3RevenueK: 3914.0
    y3EbitdaK: -85.0
    cashLowPointK: 1240.0
    keyAssumptionChanges:
      - ARPU 年化从 $228k 升至 $240k
      - 通过合作伙伴来源交易额外赢得 2 个 Y3 部署
      - Onboarding 更可复用，毛利率提升至 74%
