  - id: A21
    name: 收入确认时间安排
    value: 收入从签约月开始，将试点费与平台费混合为每个活跃付费部署每月 $19k MRR
    unit: policy
    source: '[BP gtm.pricing 付费试点 + 年度平台结构；简化财务经验值，使收入直接与客户数 × ARPU 对应]'
  - id: A22
