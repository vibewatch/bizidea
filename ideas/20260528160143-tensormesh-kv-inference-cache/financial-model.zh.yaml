    source: '[BP team.startTiming]'
  - id: A15
    name: 第 2 年招聘序列
    value: M13 +1 工程；M15 +1 销售；M18 +1 工程；M21 +1 解决方案；M24 +1 G&A
    unit: schedule
    source: '[BP milestones 12–24 个月 + sequencingRationale；招聘跟随试点验证和多客户扩张]'
  - id: A16
    name: 第 3 年招聘序列
    value: M27 +1 产品；M30 +1 工程；M31 +1 销售；M34 +1 工程；M35 +1 解决方案
    unit: schedule
    source: '[BP milestones 24–36 个月及相邻工作流扩张；招聘保持里程碑门控，经验值]'
