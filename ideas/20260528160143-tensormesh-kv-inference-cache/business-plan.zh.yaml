  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: "用 18 个月资金构建叠加层控制平面，完成 2–3 个付费共创客户试点，将早期客服 AI 客户转化为年度合同，招募初始解决方案和产品团队，并在拓展相邻工作流之前证明工作区安全复用加节省归因可以赢得持久预算。"
