    - 22
    - 28
    - 32
    - 33
  - point: 客服组织越来越期待记忆丰富、始终在线的 AI 体验，提升了复用和预热的价值。
    sourceRefs:
    - 58
    - 59
    - 61
    - 62
  - point: 开源和基础设施厂商已将底层原语成熟化，控制平面可以专注于治理和工作流适配，而无需从头发明低层级缓存。
    sourceRefs:
