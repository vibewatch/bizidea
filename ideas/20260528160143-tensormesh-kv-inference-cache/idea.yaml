topRisks:
  - name: Platform absorption
    description: Model-serving vendors or hyperscalers could add basic workspace caching and compress the technical wedge.
    mitigation: Own entitlement policy, burst prewarming, and workspace-level ROI workflows that sit across vendors and tie directly to enterprise operating metrics.
  - name: Cache correctness and privacy
    description: A single mistaken reuse event could expose the wrong tenant context and destroy trust with early customers.
    mitigation: Start with strict read-only recommendations, require entitlement proofs for every reusable bundle, and ship auditable replay logs before enabling automated reuse.
  - name: Beachhead narrowness
    description: The first wedge depends on customers self-hosting models at enough scale for cache economics to matter.
    mitigation: Target design partners already above $50k monthly GPU spend, then expand the control plane to managed endpoints and adjacent repeat-context workflows once proof exists.
