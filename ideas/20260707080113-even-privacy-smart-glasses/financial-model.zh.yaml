slug: supplier-meeting-translation-hud
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: 模型起始月份
    value: "2026-07"
    unit: 月
    source: "[BP date 2026-07-07]；模型与商业计划书同月起步，因为公司已经在做客户调研和试点设计。"
  - id: A2
    name: 种子前轮融资到账后的期初现金
    value: "3000"
    unit: "USD K"
    source: "[BP fundingAsk.targetFundingRangeUsd $2-3M]；模型取区间上限，因为本次建模要求在 BP 的 18 个月现金跑道目标之外再加 6 个月缓冲。"
  - id: A3
    name: 客户单位定义
    value: 活跃付费客户
    unit: 单位
    source: "[BP gtm.wedge 90 天付费试点]；[BP investorMemo.initialContract 持续客户合同]；customersEop 跟踪的是付费客户数，席位则作为底层驱动指标单独记录。"
  - id: A4
    name: 持续订阅席位单价
    value: "3.6"
    unit: "USD K／每活跃席位年"
    source: "[BP gtm.pricing 研究得出的每活跃席位 $3.6k]；[Research market.som 每席位年软件价值 $3.6k]。"
  - id: A5
    name: 持续管理费
    value: "12"
    unit: "USD K／每正式客户年"
    source: "[BP gtm.pricing 用于设备策略、术语库管理和集成的适度管理费]；模型按每个持续客户每月约 $1k 计算。"
  - id: A6
    name: 付费试点价格
    value: "24"
    unit: "USD K／每个 90 天试点客户"
    source: "[BP gtm.pricing $15k-$30k 付费试点]；模型取 $24k 中间值，因为工作流仍需要配置、术语库调优和法务打包工作。"
  - id: A7
    name: 稳态持续客户价值
    value: "50"
    unit: "USD K／每活跃客户年"
    source: "[A4-A5]；[BP investorMemo.initialContract 年度软件费 $25k-$55k 加管理费]；模型取中上区间，与成功客户内部席位扩展的情况一致。"
  - id: A8
    name: 关键节点每活跃客户的平均活跃席位数
    value: "Y1 exit 6; Y2 exit 7; Y3 exit 8"
    unit: 活跃席位／客户
    source: "[BP gtm.wedge 3-8 个试点席位]；[BP milestones 24-36 个月内 10-15 个正式客户合计 75-125 个活跃席位]。"
  - id: A9
    name: 第 1 年各月末活跃客户数
    value: "0,0,0,0,1,1,1,2,2,2,3,3"
    unit: 活跃客户数
    source: "[BP milestones 前 12 个月完成 2-3 个付费试点和第一份年度正式合同]；模型把第一年保持在创始人主导、范围收窄的状态。"
  - id: A10
    name: 第 2 年各季末活跃客户数
    value: "4,5,7,8"
    unit: 活跃客户数
    source: "[BP milestones 12-24 个月转化 2 个试点、扩展一个客户、测试一个相邻工作流]；季度路径由运营者判断插值得出。"
  - id: A11
    name: 第 3 年各季末活跃客户数
    value: "10,11,13,15"
    unit: 活跃客户数
    source: "[BP milestones 24-36 个月达到 10-15 个正式客户]；模型取高值，因为滩头市场小，计划必须主要依靠同客户内部扩展来实现。"
  - id: A12
    name: 支撑客户模型的各季末活跃席位数
    value: "Y1 exit 18; Y2 Q1-Q4 25,32,45,55; Y3 Q1-Q4 68,82,102,120"
    unit: 活跃席位数
    source: "[BP milestones 24-36 个月内 75-125 个活跃席位]；[Research market.som 基于席位的测算框架]；模型插值出一条精简但与里程碑一致的席位增长曲线。"
  - id: A13
    name: 第 1 年每活跃客户的混合月收入
    value: "M5-M12 = 8.0,8.0,8.0,8.0,8.0,7.0,6.5,6.0"
    unit: "USD K／每活跃客户每月"
    source: "[A6-A7]；早期收入以试点为主，随着首批客户转为持续合同，混合 ARPU 逐步下降。"
  - id: A14
    name: 第 2 年每活跃客户的混合月收入
    value: "Q1-Q4 = 5.9,5.5,5.3,5.1"
    unit: "USD K／每活跃客户每月"
    source: "[A7-A8]；[BP milestones 12-24 个月]；第 2 年持续订阅占比上升，客户 ARPU 变得更平稳，不再以试点为主。"
  - id: A15
    name: 第 3 年每活跃客户的混合月收入
    value: "Q1-Q4 = 5.1,4.9,4.8,4.8"
    unit: "USD K／每活跃客户每月"
    source: "[A7-A8]；模型假设第 3 年大部分收入来自持续部署和客户内部席位扩展，而不是高价试点。"
  - id: A16
    name: 毛利率爬坡曲线
    value: "Y1 45-58%; Y2 60-66%; Y3 67-71%"
    unit: 百分比
    source: "[BP businessModel.targetGrossMarginPct 70]；[Research regulatoryTechnicalConstraints 翻译 API 的可变成本]；创业公司财务经验法则：早期试点服务和支持成本占比更高。"
  - id: A17
    name: 月度客户流失率
    value: "1.25"
    unit: 百分比
    source: "创业公司财务经验法则：在一个窄而高触达的企业工作流里，一旦获批，客户流失就很低，但如果试点转化不成功，客户数仍可能停滞。"
  - id: A18
    name: 创始人年度全成本现金薪酬
    value: "115"
    unit: "USD K"
    source: "创业公司财务经验法则：种子前轮创始人拿低于市场水平的薪酬，但仍需覆盖工资税和基本福利。"
  - id: A19
    name: 工程师年度全成本薪酬
    value: "160"
    unit: "USD K／每 FTE"
    source: "[BP team 需要可穿戴设备、集成和工作流方面的工程深度]；创业公司财务经验法则：早期美国产品工程师薪酬低于大厂现金水平。"
  - id: A20
    name: 产品与语音岗年度全成本薪酬
    value: "155"
    unit: "USD K／每 FTE"
    source: "[BP team 语音与工作流产品负责人]；创业公司财务经验法则：负责领域调优的产品人才薪酬水平。"
  - id: A21
    name: 安全与解决方案岗年度全成本薪酬
    value: "150"
    unit: "USD K／每 FTE"
    source: "[BP team 安全与解决方案负责人]；创业公司财务经验法则：面向客户的安全与部署人才薪酬水平。"
  - id: A22
    name: 合作伙伴与扩展岗年度全成本薪酬
    value: "145"
    unit: "USD K／每 FTE"
    source: "[BP team 合作伙伴与客户扩展负责人]；创业公司财务经验法则：负责 OEM／渠道和客户扩展的人才薪酬水平。"
  - id: A23
    name: 实施岗年度全成本薪酬
    value: "125"
    unit: "USD K／每 FTE"
    source: "[BP strategicChoices.sequencingRationale 实施先于大规模销售]；创业公司财务经验法则：部署与客户成功人才薪酬水平。"
  - id: A24
    name: 销售岗年度全成本薪酬
    value: "150"
    unit: "USD K／每 FTE"
    source: "[BP strategicChoices.sequencingRationale 大规模销售在实施和安全打包之后才启动]；创业公司财务经验法则：早期一名企业销售的薪酬水平，含少量浮动薪酬。"
  - id: A25
    name: 招聘计划
    value: "M4 Security; M8 Partnerships; M15 Implementation; M21 Eng2; M31 Sales1"
    unit: 招聘时间点
    source: "[BP team startTiming M4 和 M8 的岗位]；[BP sequencingRationale 实施和安全先于规模化 GTM]；模型 3 年内只新增一名工程师和一名销售。"
  - id: A26
    name: 非薪酬类销售与市场支出
    value: "7-20"
    unit: "USD K／每月"
    source: "创业公司财务经验法则：在一个窄企业细分市场里，创始人主导外呼、寻源差旅会面、OEM 合作拓展和试点差旅的支出水平。"
  - id: A27
    name: 非薪酬类研发支出
    value: "11-19"
    unit: "USD K／每月"
    source: "[BP product and operations]；[Research regulatoryTechnicalConstraints 翻译 API 成本和硬件可靠性限制]；模型涵盖设备、云端用量和工作流工具支出。"
  - id: A28
    name: 非薪酬类行政管理支出
    value: "6-12"
    unit: "USD K／每月"
    source: "[BP fundingAsk and operations 法务/安全打包工作]；创业公司财务经验法则：法律顾问、保险、财务和合规方面的管理开销。"
  - id: A29
    name: 混合 CAC
    value: "66.0"
    unit: "USD K／每个新增活跃客户"
    source: "模型推算自第 1-2 年约 $530.7K 的销售与市场支出，成交 8 个活跃客户；由于获客仍以创始人主导、尚未完全规模化，创始人的部分时间被计入行政管理支出。"
  - id: A30
    name: 下一轮里程碑及缓冲
    value: "8 active accounts, ~55 live seats, repeatable deployment playbook by Month 24; runway target 24 months"
    unit: 里程碑
    source: "[BP fundingAsk.runwayMonths 18]；[BP milestones 12-24 个月]；本模型按财务模型简报要求，额外加上明确的 6 个月缓冲。"
