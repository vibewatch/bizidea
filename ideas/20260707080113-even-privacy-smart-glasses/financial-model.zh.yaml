modelDiagram:
  title: 活跃客户经济模型
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> SeatExpansion
      SeatExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "收入引擎"
    finding: "收入由活跃付费客户驱动，客户数从第 1 年末的 3 个增长到第 3 年末的 15 个，每客户活跃席位数从约 6 个升至 8 个。"
  - checkName: "必须做对的事"
    finding: "至少一半的付费试点需要通过安全审查并完成转化，因为约 $66K 的 CAC 只有在客户持续订阅价值接近 $50K 且不断扩展席位的情况下才能跑通。"
  - checkName: "模型失效的情况"
    finding: "如果持续客户价值停滞在约 $45K 以下，或安全审查把销售周期拖长到接近 9 个月，现金会在公司拿出干净的种子轮证据之前就转为负值。"
  - checkName: "下一轮融资的证明"
    finding: "只要这笔种子前轮资金能让公司在第 24 个月前达到 8 个活跃客户、约 55 个活跃席位，并跑通一条可复用的 OEM 或合作伙伴打包路径，种子轮的故事就成立。"
sanityChecks:
  ruleOf40: "第 3 年增速 94% + EBITDA 利润率 -175% = -81%"
  burnMultiple: "第 2 年燃烧倍数 4.5 倍（花费 $1.11M 换来 $0.25M 增量收入），第 3 年改善至 3.6 倍。"
  revenuePerFte: "第 3 年人均营收 $84K，按第 3 年第 4 季度 8 名 FTE 计算（对标工作流 SaaS 基准 $200-400K）"
  flags:
    - "模型到第 3 年末现金仍为 -$185.8K，说明这笔 $3.0M 的种子前轮买到的是验证节点和搭建纪律，而不是自我造血的盈利能力。"
    - "人均营收远低于成熟 SaaS 的基准水平，因为公司仍然高度依赖部署工作，滩头市场也是刻意收窄的。"
    - "基础情形采用了 BP 中第 36 个月 10-15 个正式客户里程碑的高值，因此任何转化上的延误都会迅速推迟种子轮的时间表。"
    - "研究得出的 $0.9M SOM 主要是基于席位价值的测算框架；本模型要在席位订阅之上叠加试点费和管理费收入，才能在第 3 年达到 $0.67M。"
    - "约 23 个月的 CAC 回收周期对大规模 GTM 招聘来说仍然太慢，这也是模型把销售人手保持精简、直到第 3 年后期才增加的原因。"
