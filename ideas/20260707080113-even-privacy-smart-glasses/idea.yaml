jobsToBeDone:
  - job: >-
      When a sourcing executive enters a multilingual supplier meeting, help them understand nuance and respond in real
      time, so they can make decisions without a phone or interpreter dependency.
    currentAlternative: Human interpreters, phone translation apps, and bilingual colleagues
    successMetric: Faster meeting decisions and fewer post-meeting clarification loops
  - job: >-
      When commitments are made across languages during travel, help the executive team capture owners and next steps
      instantly, so they can reduce missed follow-up after the meeting ends.
    currentAlternative: Handwritten notes, memory, and chief-of-staff recap emails
    successMetric: Percentage of meeting commitments logged within 24 hours and closed on time
