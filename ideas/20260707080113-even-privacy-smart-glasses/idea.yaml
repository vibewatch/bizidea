topRisks:
  - name: Hardware rollout lag
    description: If camera-free smart-glasses adoption inside enterprises grows slower than expected, sales cycles could stall before enough users exist.
    mitigation: Launch with one OEM partner, support companion-phone review flows for admins, and focus on buyers already paying for premium executive travel and interpretation tools.
  - name: Domain translation misses
    description: Industry-specific jargon, accents, and negotiation nuance could make live captions unreliable in the exact moments users care about most.
    mitigation: Start with custom glossaries, preloaded meeting context, and low-risk prompting before claiming full autonomous interpretation.
  - name: Enterprise privacy scrutiny
    description: Even without a camera, legal and security teams may still resist wearable AI in confidential commercial discussions.
    mitigation: Offer admin controls for approved hardware, retention limits, audit logs, and on-device interaction modes that minimize stored conversation data.
