problem: >-
  Cross-border operating and sourcing leaders lose nuance in live meetings exactly when trust is most fragile, but
  pulling out a phone or camera wearable makes counterparts feel recorded and breaks eye contact. Human interpreters and
  bilingual staff help, yet they are expensive, hard to scale across every factory walk or issue review, and rarely
  capture commitments cleanly into follow-up systems. As camera-free smart glasses become credible, there is still no
  workflow software built specifically for high-stakes multilingual meetings where privacy and social acceptability
  matter as much as translation accuracy.
targetUser:
  primary: COO, VP Supply Chain, or global sourcing leader at a U.S. consumer-electronics or home-goods brand running frequent Mandarin-English supplier meetings
  secondary: Chiefs of staff and regional operations leaders supporting the same executives
  buyer: COO or head of global sourcing
startupThesis:
  nonObviousInsight: >-
    The first breakout software category for smart glasses will not be more recording or content capture; it will be
    permissioned AI for conversations where a camera would reduce trust or get the device banned.
  beachhead: >-
    Mandarin-English supplier negotiation, factory walk, and issue-resolution meetings for U.S. consumer-electronics and
    home-goods brands with Asia-based supplier footprints and lean executive teams
  wedge: >-
    A camera-safe meeting copilot on approved smart glasses that delivers live translation, counterpart prompts, and
    one-tap commitment capture through a ring controller
  whyNowCatalyst: >-
    Even's funding, camera-free design, and proof that executives already pay around $1,000 for translation and
    conversation-assist glasses show privacy-safe wearables have crossed from novelty into usable business tooling.
  ventureScalePath: >-
    Start with cross-border supplier meetings, then expand the same trust-preserving HUD, vocabulary engine, and
    action-capture workflow into global sales, distributor management, field service, healthcare interpretation, and
    other in-person professional conversations.
solution: >-
  The product pairs with camera-free smart glasses and turns them into a meeting workflow, not just a translation
  gadget. Before a meeting, it loads counterpart names, supplier context, open issues, and custom terminology from
  email, calendar, and ERP or CRM systems. During the conversation, it shows live translated captions, subtle response
  prompts, and ring-triggered commitment capture without forcing the wearer to hold a phone or visibly record anyone.
  Afterward, it generates a structured follow-up brief with owners, dates, and unresolved questions for the executive
  and chief of staff. Enterprise admins can enforce no-camera hardware policies, approved data retention windows, and
  vocabulary controls for sensitive commercial discussions.
goToMarketSeed:
  firstCustomer: >-
    A 200-1,000 employee U.S. consumer-electronics or home-goods importer whose COO and sourcing leaders travel
    quarterly to Mandarin-speaking supplier meetings and already budget for premium travel or interpretation tools
  buyingTrigger: >-
    A new product launch, supplier-quality escalation, or translation-heavy leadership trip that exposes how often
    phones and ad hoc interpreters slow decisions and lose follow-up
  currentAlternative: Human interpreters, bilingual employees, phone-based translation apps, and handwritten or chief-of-staff follow-up notes
  switchingReason: >-
    The product gives executives instant translation and action capture while preserving eye contact and avoiding camera
    anxiety, so meetings move faster and commitments stop disappearing after travel
  pricingHypothesis: >-
    Per executive seat per month with an annual enterprise fee for device policy, admin controls, and CRM or ERP
    integrations
