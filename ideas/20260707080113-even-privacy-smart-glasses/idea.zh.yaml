jobsToBeDone:
  - job: >-
      寻源高管进入多语言供应商会议时，帮他们实时听懂细节、做出回应，这样决策就不用依赖手机或译员。
    currentAlternative: 人工译员、手机翻译应用和双语同事
    successMetric: 会议决策更快，会后澄清往返更少
  - job: >-
      出差途中跨语言达成承诺时，帮高管团队当场记下责任人和下一步行动，减少会议结束后漏掉跟进的情况。
    currentAlternative: 手写笔记、凭记忆，以及幕僚长整理的复盘邮件
    successMetric: 24 小时内记录并按时完成的会议承诺事项占比
