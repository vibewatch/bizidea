problem: >-
  跨境运营和寻源负责人在信任最脆弱的现场会议中，恰恰最容易漏掉关键细节——可掏出手机或戴上带摄像头的设备，对方立刻觉得被记录，眼神交流也断了。人工译员和双语员工能帮上忙，但成本高、难以覆盖每一次工厂巡查或问题复盘，事后也很少能把承诺事项干净地录入跟进系统。无摄像头智能眼镜已经站稳脚跟，但市场上仍没有专为高风险多语言会议打造的工作流软件——这类场景里，隐私和社交可接受度和翻译准确度同样重要。
targetUser:
  primary: 美国消费电子或家居品牌的 COO、供应链副总裁或全球寻源负责人，经常参加中英双语供应商会议
  secondary: 为这些高管提供支持的幕僚长和区域运营负责人
  buyer: COO 或全球寻源负责人
startupThesis:
  nonObviousInsight: >-
    智能眼镜第一个真正跑出来的软件品类，不会是更强的录制或内容采集能力，而是给那些"带摄像头反而会被拒之门外"的对话场景提供有授权的 AI 助手。
  beachhead: >-
    美国消费电子和家居品牌——供应商在亚洲、高管团队精简——的中英双语供应商谈判、工厂巡查和问题解决会议
  wedge: >-
    搭载在认证智能眼镜上的摄像头安全会议副驾：实时翻译、对方发言提示，配合指环控制器一键记录承诺事项
  whyNowCatalyst: >-
    Even Realities 的融资、无摄像头设计，以及高管已经愿意为翻译和对话辅助眼镜支付约 $1,000 的事实，都说明隐私安全的可穿戴设备已经从新奇玩意儿变成了能用的商务工具。
  ventureScalePath: >-
    先切入跨境供应商会议，再把同一套保信任的 HUD、词库引擎和行动记录工作流，扩展到全球销售、经销商管理、现场服务、医疗口译等其他面对面职业对话场景。
solution: >-
  这款产品和无摄像头智能眼镜配对，把它们变成一套会议工作流，而不只是翻译小工具。会议开始前，它从邮件、日历和 ERP/CRM 系统里加载对方姓名、供应商背景、待解决问题和自定义术语。对话进行时，镜片上实时显示翻译字幕和不引人注意的应答提示，戴眼镜的人不用掏手机、也不会让对方觉得被录像，指环一点就能记下承诺事项。会议结束后，系统自动生成结构化跟进简报，列出责任人、时间节点和未解决的问题，发给高管和幕僚长。企业管理员可以强制执行无摄像头硬件政策、审批过的数据留存周期，以及针对敏感商务讨论的词汇管控。
goToMarketSeed:
  firstCustomer: >-
    一家员工规模 200-1,000 人的美国消费电子或家居进口商，其 COO 和寻源负责人每季度都要出差参加中文供应商会议，且已经为高端差旅或口译工具编列了预算
  buyingTrigger: >-
    新品发布、供应商质量问题升级，或一趟高强度翻译需求的高管出差，暴露出手机翻译和临时译员经常拖慢决策、丢掉跟进事项
  currentAlternative: 人工译员、双语员工、手机翻译应用，以及手写或由幕僚长整理的跟进笔记
  switchingReason: >-
    产品让高管在保持眼神交流、不引发摄像头焦虑的同时，获得即时翻译和行动记录，会议推进更快，出差回来后承诺事项也不会再不了了之
  pricingHypothesis: >-
    按高管席位、按月计费，另收企业年费用于设备策略、管理控制和 CRM/ERP 集成
