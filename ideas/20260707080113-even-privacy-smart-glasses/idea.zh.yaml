topRisks:
  - name: 硬件普及滞后
    description: 如果无摄像头智能眼镜在企业内部的普及速度低于预期，销售周期可能在用户基数还不够大之前就陷入停滞。
    mitigation: 先与一家 OEM 合作伙伴上线，为管理员提供配套手机端审核流程，并聚焦已经为高端高管差旅和口译工具付费的买家。
  - name: 专业领域翻译失准
    description: 行业黑话、口音和谈判措辞的微妙之处，可能恰恰在用户最在意的时刻让实时字幕变得不可靠。
    mitigation: 先从自定义术语库、预加载会议背景和低风险提示做起，暂不宣称能完全自主口译。
  - name: 企业隐私审查
    description: 即便没有摄像头，法务和安全团队仍可能抵触在保密商务讨论中使用可穿戴 AI。
    mitigation: 提供针对认证硬件的管理控制、留存上限、审计日志，以及能把存储的对话数据降到最少的设备端交互模式。
