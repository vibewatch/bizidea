differentiator: >-
  这不是把一款通用翻译应用搬到眼镜上。它是专为一瞥即懂、隐私安全的高风险商务会议设计的——用户需要在不被看见录像的情况下获得实时帮助，会议结束后还要有结构化的跟进。随着时间推移，公司会积累一层专有资产：会议专属术语库、基于指环的交互模式，以及能说明哪些提示和摘要真正减少了误解和漏项的效果数据。这让软件比消费级翻译应用或通用可穿戴助手更难被替代。
