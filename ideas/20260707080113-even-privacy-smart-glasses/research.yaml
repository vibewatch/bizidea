  "regulatoryLandscape": "The safest product posture is not “record everything and summarize later.” U.S. audio-interception rules and state-by-state overlays make hidden recording risky, while China-linked deployments face purpose-limitation, notice, and cross-border handling constraints. That pushes the design toward text-first assistance, minimal retention, explicit admin controls, and exported structured outputs instead of persistent raw audio."
  "technologyLandscape": "The enabling stack is no longer the bottleneck. Real-time speech translation, multilingual detection, summarization, and subtitle rendering are available across major cloud platforms and dedicated devices. The differentiator shifts to custom vocabulary, latency in noisy environments, discreet interaction design, and how cleanly the product converts live conversation into approved enterprise follow-up."
