    baseCase: "6-7 months from qualified account to paid pilot and conversion"
    upsideCase: "5-6 months with a reusable approval playbook"
    y3RevenueImpactK: -130.0
    cashImpactK: -170.0
  - variable: "gross margin"
    downsideCase: "67% steady-state because implementation and support stay bespoke"
    baseCase: "70% steady-state gross margin"
    upsideCase: "72%+ if deployment templates and glossary reuse improve"
