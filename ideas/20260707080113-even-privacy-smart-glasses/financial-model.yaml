slug: supplier-meeting-translation-hud
date: "2026-07-07"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: "month"
    source: "[BP date 2026-07-07]; the model starts in the same month as the business plan because the company is already in customer discovery and pilot design."
  - id: A2
    name: "Opening cash from pre-seed raise"
    value: "3000"
    unit: "USD K"
    source: "[BP fundingAsk.targetFundingRangeUsd $2-3M]; the model uses the top of the range because this brief requires a six-month buffer beyond the BP's 18-month runway target."
  - id: A3
    name: "Customer unit definition"
    value: "active paying account"
    unit: "unit"
    source: "[BP gtm.wedge 90-day paid pilot]; [BP investorMemo.initialContract recurring account contract]; customersEop tracks paid accounts while seats are carried as an underlying driver."
  - id: A4
    name: "Recurring seat price"
    value: "3.6"
    unit: "USD K per live seat-year"
    source: "[BP gtm.pricing researched $3.6k per active seat]; [Research market.som $3.6k annual software value per seat]."
  - id: A5
    name: "Recurring admin fee"
    value: "12"
    unit: "USD K per production account-year"
    source: "[BP gtm.pricing modest admin fee for device policy, glossary management, and integrations]; model uses roughly $1k per month per recurring account."
  - id: A6
    name: "Paid pilot price"
    value: "24"
    unit: "USD K per 90-day pilot account"
    source: "[BP gtm.pricing $15k-$30k paid pilot]; model uses a $24k midpoint because the workflow still needs setup, glossary tuning, and legal packaging."
  - id: A7
    name: "Steady-state recurring account value"
    value: "50"
    unit: "USD K per active account-year"
    source: "[A4-A5]; [BP investorMemo.initialContract $25k-$55k annual software plus admin fees]; model uses an upper-middle case consistent with seat expansion inside successful accounts."
  - id: A8
    name: "Average live seats per active account at key points"
    value: "Y1 exit 6; Y2 exit 7; Y3 exit 8"
    unit: "live seats per account"
    source: "[BP gtm.wedge 3-8 pilot seats]; [BP milestones 75-125 live seats across 10-15 production accounts by 24-36 months]."
  - id: A9
    name: "Y1 end-of-month active accounts"
    value: "0,0,0,0,1,1,1,2,2,2,3,3"
    unit: "active accounts"
    source: "[BP milestones 2-3 paid pilots and first annual production contract in the first 12 months]; model keeps the first year founder-led and narrow."
  - id: A10
    name: "Y2 quarter-end active accounts"
    value: "4,5,7,8"
    unit: "active accounts"
    source: "[BP milestones 12-24 months convert 2 pilots, expand one account, and test one adjacent workflow]; operator judgment interpolates the quarterly path."
  - id: A11
    name: "Y3 quarter-end active accounts"
    value: "10,11,13,15"
    unit: "active accounts"
    source: "[BP milestones 24-36 months reach 10-15 production accounts]; model uses the high end because the beachhead is small and same-account expansion has to carry the plan."
  - id: A12
    name: "Quarter-end live seats underlying the account model"
    value: "Y1 exit 18; Y2 Q1-Q4 25,32,45,55; Y3 Q1-Q4 68,82,102,120"
    unit: "live seats"
    source: "[BP milestones 75-125 live seats by 24-36 months]; [Research market.som seat-based framing]; model interpolates a lean but milestone-consistent seat ramp."
  - id: A13
    name: "Y1 blended monthly revenue per active account"
    value: "M5-M12 = 8.0,8.0,8.0,8.0,8.0,7.0,6.5,6.0"
    unit: "USD K per active account per month"
    source: "[A6-A7]; early revenue is pilot-heavy, then blended ARPU steps down as the first accounts convert into recurring contracts."
  - id: A14
    name: "Y2 blended monthly revenue per active account"
    value: "Q1-Q4 = 5.9,5.5,5.3,5.1"
    unit: "USD K per active account per month"
    source: "[A7-A8]; [BP milestones 12-24 months]; recurring mix rises through Y2, so account ARPU becomes steadier and less pilot-heavy."
  - id: A15
    name: "Y3 blended monthly revenue per active account"
    value: "Q1-Q4 = 5.1,4.9,4.8,4.8"
    unit: "USD K per active account per month"
    source: "[A7-A8]; model assumes most Y3 revenue comes from recurring deployments and in-account seat expansion rather than premium pilot pricing."
  - id: A16
    name: "Gross margin ramp"
    value: "Y1 45-58%; Y2 60-66%; Y3 67-71%"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70]; [Research regulatoryTechnicalConstraints variable translation API cost]; startup-finance heuristic that early pilots stay services- and support-heavy."
  - id: A17
    name: "Monthly account churn"
    value: "1.25"
    unit: "percent"
    source: "Startup-finance heuristic for a narrow, high-touch enterprise workflow where logo loss is low once approved, but account counts can still stall if pilots do not convert."
  - id: A18
    name: "Founder loaded annual cash compensation"
    value: "115"
    unit: "USD K"
    source: "Startup-finance heuristic for a pre-seed founder taking below-market pay while still covering payroll tax and basic benefits."
  - id: A19
    name: "Engineering loaded annual compensation"
    value: "160"
    unit: "USD K per FTE"
    source: "[BP team requires wearable, integration, and workflow engineering depth]; startup-finance heuristic for an early-stage U.S. product engineer below big-tech cash levels."
  - id: A20
    name: "Product and speech loaded annual compensation"
    value: "155"
    unit: "USD K per FTE"
    source: "[BP team speech and workflow product lead]; startup-finance heuristic for product talent with domain tuning responsibility."
  - id: A21
    name: "Security and solutions loaded annual compensation"
    value: "150"
    unit: "USD K per FTE"
    source: "[BP team security and solutions lead]; startup-finance heuristic for customer-facing security and deployment talent."
  - id: A22
    name: "Partnerships and expansion loaded annual compensation"
    value: "145"
    unit: "USD K per FTE"
    source: "[BP team partnerships and customer expansion lead]; startup-finance heuristic for OEM/channel and expansion ownership."
  - id: A23
    name: "Implementation loaded annual compensation"
    value: "125"
    unit: "USD K per FTE"
    source: "[BP strategicChoices.sequencingRationale implementation before broad sales]; startup-finance heuristic for deployment and customer-success talent."
  - id: A24
    name: "Sales loaded annual compensation"
    value: "150"
    unit: "USD K per FTE"
    source: "[BP strategicChoices.sequencingRationale broader sales comes after implementation and security packaging]; startup-finance heuristic for one early enterprise seller with modest variable pay."
  - id: A25
    name: "Hiring schedule"
    value: "M4 Security; M8 Partnerships; M15 Implementation; M21 Eng2; M31 Sales1"
    unit: "hire timing"
    source: "[BP team startTiming M4 and M8 roles]; [BP sequencingRationale implementation and security before scaled GTM]; model adds only one extra engineer and one seller over 3 years."
  - id: A26
    name: "Non-salary sales and marketing spend"
    value: "7-20"
    unit: "USD K per month"
    source: "Startup-finance heuristic for founder-led outbound, sourcing-travel meetings, OEM partner development, and pilot travel in a narrow enterprise segment."
  - id: A27
    name: "Non-salary R&D spend"
    value: "11-19"
    unit: "USD K per month"
    source: "[BP product and operations]; [Research regulatoryTechnicalConstraints translation API cost and hardware reliability limits]; model includes devices, cloud usage, and workflow tooling."
  - id: A28
    name: "Non-salary G&A spend"
    value: "6-12"
    unit: "USD K per month"
    source: "[BP fundingAsk and operations legal/security packaging]; startup-finance heuristic for counsel, insurance, accounting, and compliance overhead."
  - id: A29
    name: "Blended CAC"
    value: "66.0"
    unit: "USD K per new active account"
    source: "Model-derived from Y1-Y2 salesMarketing spend of about $530.7K over 8 landed active accounts; founder time is partly allocated to G&A because the motion is still founder-led rather than fully scaled."
  - id: A30
    name: "Next-round milestone plus buffer"
    value: "8 active accounts, ~55 live seats, repeatable deployment playbook by Month 24; runway target 24 months"
    unit: "milestone"
    source: "[BP fundingAsk.runwayMonths 18]; [BP milestones 12-24 months]; this model adds the explicit six-month buffer required in the financial-model brief."
