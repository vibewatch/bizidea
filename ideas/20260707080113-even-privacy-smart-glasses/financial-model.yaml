modelDiagram:
  title: active-account economics
  mermaid: |
    flowchart LR
      TargetAccounts --> PaidPilots
      PaidPilots --> ProductionAccounts
      ProductionAccounts --> SeatExpansion
      SeatExpansion --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Revenue is driven by active paying accounts growing from 3 at Y1 exit to 15 at Y3 exit while live seats per account rise from roughly 6 to 8."
  - checkName: "Must go right"
    finding: "At least half of paid pilots need to clear security review and convert, because a roughly $66K CAC only works if accounts land near $50K recurring value and keep expanding seats."
  - checkName: "Model breaks if"
    finding: "If recurring account value stalls below about $45K or security reviews stretch the sales cycle toward 9 months, cash turns negative before the company has clean seed-round proof."
  - checkName: "Next-round proof"
    finding: "A seed story exists once the pre-seed gets the company to 8 active accounts, roughly 55 live seats, and one repeatable OEM or partner packaging path by Month 24."
sanityChecks:
  ruleOf40: "Y3 growth 94% + EBITDA margin -175% = -81%"
  burnMultiple: "Y2 burn multiple 4.5x (burn $1.11M on $0.25M incremental revenue), improving to 3.6x in Y3."
  revenuePerFte: "$84K Y3 using 8 Q4Y3 FTE (benchmark $200-400K workflow SaaS)"
  flags:
    - "The model still exits Y3 at -$185.8K cash, so the $3.0M pre-seed buys proof points and setup discipline, not self-funded profitability."
    - "Revenue per FTE is far below mature SaaS benchmarks because the company remains deployment-heavy and the beachhead is deliberately narrow."
    - "The base case uses the high end of the BP's 10-15 production-account milestone by Month 36, so any conversion slippage quickly pushes the seed timeline forward."
    - "The research SOM of $0.9M is mostly a seat-value framing; this model gets to $0.67M Y3 only by layering pilot fees and admin revenue on top of seat subscriptions."
    - "CAC payback at about 23 months is still too slow for broad GTM hiring, which is why the model keeps sales headcount light until late Y3."
