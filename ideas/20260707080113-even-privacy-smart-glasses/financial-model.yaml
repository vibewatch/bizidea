fundingAsk:
  round: pre-seed
  amountM: 3.0
  runwayMonths: 24
  milestone: >-
    Reach 8 active accounts, roughly 55 live seats, one repeatable deployment playbook, and one credible OEM or partner packaging path by Month 24; the explicit six-month buffer funds the start of the seed process rather than pretending the business is already profitable.
  useOfFunds:
    - bucket: "Engineering"
      amountUsd: 1200000
      percentage: 40
    - bucket: "GTM"
      amountUsd: 660000
      percentage: 22
    - bucket: "G&A"
      amountUsd: 540000
      percentage: 18
    - bucket: "Buffer (6 mo)"
      amountUsd: 600000
      percentage: 20
scenarios:
  downside:
    description: >-
      Security approval and pilot conversion run slower than planned, so the company exits Y3 with only 11 active accounts and about 85 live seats while pricing and gross margin stay below the business-plan target.
    y3RevenueK: 508.8
    y3EbitdaK: -1301.2
    cashLowPointK: -327.8
    keyAssumptionChanges:
      - "Y3 exit active accounts fall to 11 instead of 15."
      - "Underlying live seats reach only about 85 instead of 120."
      - "Y3 blended account ARPU runs about 7% below base and gross margin peaks near 68%."
  base:
    description: >-
      The base case reaches 3 active accounts by Y1 exit, 8 by Y2 exit, and 15 by Y3 exit, with live seats expanding to about 120 and mature recurring account value settling near $50K.
    y3RevenueK: 671.3
    y3EbitdaK: -1173.2
    cashLowPointK: -185.8
    keyAssumptionChanges:
      - "Account ramp follows the business-plan path from 3 active accounts at Y1 exit to 15 at Y3 exit."
      - "Recurring account value stabilizes around $50K while seats per account rise from roughly 6 to 8."
      - "Gross margin expands from mid-40s in pilot months to roughly 70% by late Y3 as deployment work becomes reusable."
  upside:
    description: >-
      One OEM or referral channel works by Y2 and same-account seat expansion happens faster, so Y3 exits with 17 active accounts, richer account value, and almost enough cash to bridge a seed round cleanly.
    y3RevenueK: 812.4
    y3EbitdaK: -1058.4
    cashLowPointK: -23.2
    keyAssumptionChanges:
      - "Y3 exit active accounts rise to 17 instead of 15."
      - "Account ARPU runs about 6% above base because seat expansion and admin uptake happen sooner."
      - "Y3 gross margin runs about 2 points above base because implementation work standardizes faster."
sensitivity:
  - variable: "ARPU"
    downsideCase: "$45K mature account value with less seat expansion and admin uptake"
    baseCase: "$50K mature account value"
    upsideCase: "$55K+ mature account value via deeper seat expansion"
    y3RevenueImpactK: -80.0
    cashImpactK: -60.0
  - variable: "CAC"
    downsideCase: "$80K if founder-led outbound remains primary and partner referrals stay weak"
    baseCase: "$66K blended CAC per active account"
    upsideCase: "$55K if OEM and adviser referrals carry more of the funnel"
    y3RevenueImpactK: -35.0
    cashImpactK: -120.0
  - variable: "churn"
    downsideCase: "2.0% monthly if pilots convert but later expansions do not stick"
    baseCase: "1.25% monthly account churn"
    upsideCase: "0.8% monthly if approved deployments stay sticky and expand"
    y3RevenueImpactK: -50.0
    cashImpactK: -40.0
  - variable: "sales cycle"
