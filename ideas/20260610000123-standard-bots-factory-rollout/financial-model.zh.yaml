slug: "robot-skillops-ledger"
date: "2026-06-10"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "模型起始月份"
    value: "2026-07"
    unit: month
    source: "[BP date] 以 2026-06-10 商业计划日期后的第一个完整月份作为起点。"
  - id: A2
    name: "期初现金 / pre-seed 融资额"
    value: "$2.0M"
    unit: usdM
    source: "[BP fundingAsk] 商业计划目标是 $2-3M 的 pre-seed；模型取区间下沿，因为基础情景下这笔钱已足够把公司送到下一节点，并留出 6 个月缓冲。"
  - id: A3
    name: "每个量产客户的受治理单元数"
    value: "5"
    unit: cells_per_customer
    source: "[BP market.som; research.market.som] SOM 计算默认每个客户有 5 个活跃受治理单元。"
  - id: A4
    name: "稳定期年度订阅 ARPU"
    value: "$60.0K per customer-year"
    unit: usdK_per_customer_year
    source: "[BP investorMemo.firstCustomer.initialContract; BP market.som; research.market.som] 5 个受治理单元、每个单元 $12K，对应账户进入年订阅量产后 ARR 约为 $60K。"
  - id: A5
    name: "保守的试点收入处理"
    value: "基础 P&L 只确认订阅收入，不单列付费试点或 onboarding 费用"
    unit: method
    source: "[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] 商业计划提到了付费试点和 onboarding 费用，但基础情景只确认订阅收入，不把早期收入写高。"
  - id: A6
    name: "第 1 年量产客户爬坡"
    value: "M1-M12 customersEop = 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3, 4"
    unit: customers
    source: "[BP milestones 0-12 months; BP experimentRoadmap] 这里对应的是前 6 个月拿下 3 个付费试点，并在第 12 个月形成 4 个年订阅量产客户。"
  - id: A7
    name: "第 2 年与第 3 年客户爬坡"
    value: "Q1Y2-Q4Y3 customersEop = 6, 10, 14, 18, 26, 36, 48, 60"
    unit: customers
    source: "[BP milestones; research.market.som] 这条爬坡曲线在第 3 年做到商业计划里的 60 个客户目标，同时让第 2 年保持在 SOM 全渗透之前。"
  - id: A8
    name: "目标毛利率"
    value: "70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] P&L 按收入的 30% 计 COGS，对齐商业计划的 70% 毛利目标。"
  - id: A9
    name: "月度流失率"
    value: "1.8%"
    unit: percent
    source: "早期工业工作流软件的财务经验值：部署完成后留存应较强，但 OEM 捆绑和服务摩擦仍会带来真实 logo 风险。"
  - id: A10
    name: "全负载 CAC"
    value: "$24.0K per production customer"
    unit: usdK_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; BP operatingAssumptions] 创始人主导销售叠加 OEM/集成商转介绍，应让 CAC 低于纯直销企业软件；但每一单仍需要工厂级 proof 和实施支持。"
  - id: A11
    name: "全负载薪资带宽"
    value: "创始人/CEO $100K；工程研发 $130K；现场解决方案 $110K；产品/设计 $120K；合作销售 $120K；行政/运营 $80K；客户成功 $90K"
    unit: usdK_per_fte_year
    source: "美国 pre-seed 工业软件团队的财务经验值：团队精简、现金薪资低于大厂，并以股权补足。"
  - id: A12
    name: "团队扩张快照"
    value: "创始人 1/1/1/1/1/1；工程研发 1/1/1/2/3/3；现场解决方案 0/1/1/1/1/1；产品/设计 0/0/1/1/1/1；销售/合作 0/0/0/1/1/2；行政/运营 0/0/0/0/1/1；客户成功 0/0/0/0/0/1，对应 q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP strategicChoices.sequencingRationale] 模型按商业计划的顺序走：先把创始产品能力搭起来，再补实施，最后等可复制性出来后再加伙伴驱动的 GTM。"
  - id: A13
    name: "第 2 年与第 3 年薪资平滑"
    value: "季度薪资费用会在 Q4Y1、Q4Y2 和 Q4Y3 快照之间逐步爬升，而不是只在年末跳变"
    unit: method
    source: "[Financial Modeler instructions] 季度薪资线做了平滑处理，让招聘节奏更贴合商业计划，而不是只在年末跳变。"
  - id: A14
    name: "非薪酬运营预算"
    value: "第 1 年月度 S&M $5K-$8K、R&D $8K-$12K、G&A $5K-$8K；第 2 年季度 S&M $21K-$33K、R&D $30K-$39K、G&A $18K-$27K；第 3 年季度 S&M $36K-$60K、R&D $36K-$45K、G&A $24K-$33K"
    unit: usdK
    source: "基于 [BP operations] 和 [BP fundingAsk.useOfFundsSummary] 的创业财务经验值，覆盖精简团队下的软件、差旅、法务、云资源和伙伴 enablement 支出。"
  - id: A15
    name: "现金滚动口径"
    value: "期末现金 = 期初现金 + EBITDA"
    unit: method
    source: "轻资产 pre-seed 软件公司的常见财务口径：债务、税、capex 和营运资本波动都可视为不重要。"
  - id: A16
    name: "下行情景调整"
    value: "到 Q4Y3 只有 40 个客户、毛利率 65%、月度流失率 2.5%，且伙伴转介绍更慢"
    unit: scenario_inputs
    source: "[BP risks; research.sensitivityCases] 这一下行直接对应两种风险：小机群更久地忍受电子表格，以及 OEM/robot OS 捆绑进一步压缩付费意愿。"
  - id: A17
    name: "上行情景调整"
    value: "到 Q4Y3 做到 70 个客户、毛利率 72%、月度流失率 1.2%，且 OEM/集成商转介绍更快"
    unit: scenario_inputs
    source: "[BP milestones; BP product.twentyFourMonth] 上行情景假设第一次姐妹工厂迁移非常顺，且高级分析进一步带动账户扩张。"
