scenarios:
  downside:
    description: "OEM 和集成商转介绍起量更慢，毛利率仍被重服务实施拖累，到第 3 年底公司只做到 40 个客户。"
    y3RevenueK: 1560.0
    y3EbitdaK: -310.0
    cashLowPointK: 90.0
    keyAssumptionChanges:
      - "Q4Y3 客户数降到 40，而不是 60。"
      - "毛利率只有 65%，而不是 70%。"
      - "月度流失率升到 2.5%。"
      - "第二位销售 hire 延后，渠道转化也持续偏弱。"
  base:
    description: "在导入节点切进去的试点能顺利转成年订阅，且 OEM/集成商转介绍在打法可复制后开始放大。"
    y3RevenueK: 2235.0
    y3EbitdaK: 54.4
    cashLowPointK: 481.9
    keyAssumptionChanges:
      - "Q4Y3 客户数达到 60。"
      - "稳定期 ARPU 维持在每账户每年 $60K。"
      - "毛利率达到商业计划的 70% 目标。"
      - "到 Q4Y3 团队规模为 10 FTE。"
  upside:
    description: "第一次姐妹工厂迁移成为强 proof point，伙伴转介绍提速，高级分析又把账户价值继续做高。"
    y3RevenueK: 2715.0
    y3EbitdaK: 338.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "Q4Y3 客户数达到 70，而不是 60。"
      - "毛利率提升到 72%。"
      - "月度流失率改善到 1.2%。"
      - "OEM 和集成商转介绍把销售周期缩短约 2 个月。"
sensitivity:
  - variable: ARPU
    downsideCase: "每个账户每年订阅价值 $54K"
    baseCase: "每个账户每年订阅价值 $60K"
    upsideCase: "每个账户每年订阅价值 $66K"
    y3RevenueImpactK: 223.5
    cashImpactK: 156.5
  - variable: CAC
    downsideCase: "当直销替代转介绍时，全负载 CAC 升到 $30K"
    baseCase: "全负载 CAC 为 $24K"
    upsideCase: "若 OEM 和集成商输送更强，CAC 可降到 $18K"
    y3RevenueImpactK: 0.0
    cashImpactK: 180.0
  - variable: 流失率
    downsideCase: "月度 logo 流失率 2.5%"
    baseCase: "月度 logo 流失率 1.8%"
    upsideCase: "月度 logo 流失率 1.2%"
    y3RevenueImpactK: 180.0
    cashImpactK: 126.0
  - variable: 销售周期
    downsideCase: "从试点启动到转成年订阅需要 9 个月"
    baseCase: "销售周期为 6-7 个月"
    upsideCase: "销售周期缩短到 4-5 个月"
    y3RevenueImpactK: 420.0
    cashImpactK: 260.0
  - variable: 毛利率
    downsideCase: "若部署仍偏重服务，毛利率只有 65%"
    baseCase: "毛利率 70%"
    upsideCase: "若连接器高度可复用，毛利率可到 73%"
    y3RevenueImpactK: 0.0
    cashImpactK: 111.8
  - variable: 招聘节奏
    downsideCase: "第二位销售和客户成功岗提前两个季度入职"
    baseCase: "按当前精简节奏爬到 Q4Y3 的 10 FTE"
    upsideCase: "非关键岗位推迟到扩张被验证后再招"
    y3RevenueImpactK: 60.0
    cashImpactK: 150.0
modelDiagram:
  title: "Robot SkillOps 收入流"
  mermaid: |
    flowchart LR
      Leads["OEM & integrator commissioning leads"] --> Pilots["Paid pilot / proof project"]
      Pilots --> Accounts["Annual subscription accounts"]
      Accounts --> Cells["5 governed cells per account"]
      Cells --> Revenue["Subscription revenue"]
      Revenue --> GrossProfit["70% gross profit"]
      GrossProfit --> Cash["Cash and runway"]
modelSanity:
  - checkName: "收入引擎"
    finding: "基础情景的核心假设，是把导入节点的试点转成每年 $60K 的账户，然后靠转介绍把赢单数一路放大到 Q4Y3 的 60 个客户。"
  - checkName: "必须成立的事"
    finding: "OEM 和集成商渠道必须输送足够多的优质单元扩张机会，销售效率才撑得住 $24K CAC 的假设。"
  - checkName: "模型会在哪失真"
    finding: "如果实施始终偏重服务、客户数又卡在 40 左右，下行情景里的现金会被明显压缩，公司大概率需要 bridge round。"
