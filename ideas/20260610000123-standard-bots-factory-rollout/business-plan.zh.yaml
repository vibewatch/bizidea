slug: robot-skillops-ledger
date: '2026-06-10'
executiveSummary: >-
  Robot SkillOps Ledger 瞄准的是这样一批美国合同金属加工厂：它们已经把第一套 AI-native 焊接或机床上下料单元跑通，正准备把这套能力复制到更多班次、更多零件族和更多工厂。真正刺痛它们的，不是第一次把机器人装起来，而是之后反复发生的重训、首件放行和配方交接——这些工作今天仍散落在集成商项目、表格、视频和师傅经验里。MVP 要做的是一套系统记录：按零件和夹具给机器人示教做版本，把每个版本和质量证据挂起来，并在每次换型时自动生成审批包。这个切口比泛化的机器人编程软件更窄，第一阶段也刻意不碰运动控制、仿真或完整的 MES/QMS 流程。打法是在 OEM 或集成商做单元导入时切进去，因为那一刻买家最急，也最有预算权；等客户继续加单元、加零件族、加姐妹工厂，再把单账户价值往上做。研究给出的滩头市场是成立的，估算 SAM 为 $27.0M，第 3 年 SOM 为 $3.6M；但这些数字的前提，是 100 人以上的金属加工厂里，确实有足够多属于多工厂合同制造商。核心验证点只有一个：能不能把“从重训开始到批准量产”的时间实打实缩下来，并减少零件、夹具或工装变更之后的集成商返场。
problem:
  - >-
    高混流金属加工厂每次遇到零件版本、夹具、工装或批次结构变化，都得重新教机器人；而这项工作至今仍卡在稀缺专家、外部集成商和各地不一致的本地文档上。
  - >-
    工厂质量团队每次机器人重训后都需要可审计的首件证据和回滚历史，但现在的 OEM 工具和电子表格，并不能给出跨厂商、可安全量产的审批记录。
solution:
  - >-
    把每一次成功的机器人示教和零件族、夹具状态、工装、操作员及最终质量结果一起记下来，再按版本管理这套配方，让工程团队既能比较不同版本，也能把配置拉回已验证状态。
  - >-
    自动生成换型材料包，把作业指导、审批清单和放行证据揉在一起，交给制造工程和工厂质量团队——这样一来，一次验证过的 teach-in 就能跨班次、跨站点复用。
whyWeWin:
  - >-
    OEM 机器人软件和跨厂商执行层都在优化“怎么编”和“怎么部署”，但研究证据显示，围绕审批记忆、配方沿革和跨站点复用，这里仍空着一层控制面。
  - >-
    这个产品会越用越厚，因为真正能守住的资产不是一次性服务，而是工厂自己拥有的历史数据：哪些配方改动过、对应的质量结果是什么、下次该怎么回滚。
strategicChoices:
  beachhead: >-
    在美国拥有 2 到 8 家工厂的合同金属加工企业，正把首批 3 到 10 个 AI-native 焊接或 CNC 上下料单元铺到“重复但经常变化”的客户项目里。
  wedgeRationale: >-
    焊接和机床上下料的换型频率高、代价也高，而且首件放行步骤很清楚，所以初创公司可以在一台单元上更快证明价值；如果一上来就卖横向机器人平台，战线会拉得太宽。
  sequencingRationale: >-
    第一阶段先围绕一台旗舰单元做元数据抓取、版本差异和审批包，因为这能直接解决买家当下的问题，又不用一开始就把控制器深度接进去。等团队证明“审批更快、集成商返场更少”确实能带来预算扩张，再补 OEM 连接器、质量系统集成和多工厂 rollout 工具。招聘顺序也照这个节奏走：先创始产品研发，再现场实施，最后才是基于合作伙伴放大的销售。
  notYet:
    - 完整的机器人编程 IDE，或替代控制器
    - 在焊接和机床上下料还没跑顺之前，就大范围支持码垛、装配和检测
    - 在审批工作流还没被信任之前，就去替换深层 MES 或做企业级分析平台
market:
  tam: >-
    估算美国 TAM 为年化 $281.9M：基于 2,936 家员工数在 100+ 的金属制品企业，假设每家有 8 个受治理机器人单元，且每个活跃单元每年软件支出为 $12k。
  sam: >-
    估算滩头 SAM 为 $27.0M：大约 450 家多工厂、高混流的合同金属加工厂，每家约 5 个活跃单元，每个单元年软件支出 $12k。
  som: >-
    第 3 年 SOM 为 $3.6M：假设拿下 60 个客户，每个客户 5 个活跃单元，每个单元年软件支出 $12k，并通过 OEM 与集成商带动的扩张实现落地。
  segments:
    - 运行高混流焊接和 CNC 上下料项目的美国多工厂合同金属加工厂
    - 已在采用机器人单元、但还没把变更控制工作流标准化的高混流离散制造企业
  buyingProcess: >-
    采购通常发生在这样一个节点：制造工程副总裁、工厂运营负责人或 COO 正在导入一台新单元，或把一台跑通的单元继续扩开。制造工程经理和工厂质量负责人往往会赞助试点，而真正决定能不能转化，取决于能否拿出三样东西：更短的重训周期、更干净的审批证据，以及更少对外部集成商的依赖。
product:
  mvp: >-
    MVP 要记录 teach-by-demonstration 事件，按零件族和夹具给已批准配方做版本，保存首件证据，并生成包含版本差异和回滚历史的审批包。第一步应以轻量元数据抓取和 1 到 2 个机器人品牌的窄连接器为主，而不是一开始就要求把整套工厂系统深度打通。
  sixMonth: >-
    把一台焊接或机床上下料单元的生产试点产品交出来，包括配方版本管理、审批工作流、签字放行记录，以及基于每次批准重训自动生成的操作指引。
  twelveMonth: >-
    给前两个机器人平台接入 OEM 级事件数据，补基础 QMS 附件工作流，做账户级仪表盘，用来追踪重训周期和审批滞后；同时跑通一套可复制的姐妹工厂部署打法。
  twentyFourMonth: >-
    支持跨站点配方迁移、多单元对标、和质量结果联动的回滚建议，以及更广的跨厂商技能仓库，让大型加工企业能把整支机器人机群的 rollout 治理标准化。
  keyBets:
    - 买家会先为审批治理付费，之后才愿意为更深的分析功能付费
    - 一台单元跑通后，12 个月内能在同一账户扩到 5 个或更多受治理单元
    - 窄而浅的跨厂商集成，足以拿下前 10 个客户
    - 只要审计链足够清楚，质量团队会接受数字化生成的审批包
gtm:
  wedge: >-
    围绕一台刚导入或刚开始扩张的焊接/机床上下料单元卖一个付费试点——客户已经预期会反复重训，也想把首件延误和对集成商的依赖降下来。
  channels:
    - 在新单元导入阶段争取 OEM 转介绍
    - 在扩张或重训项目里争取系统集成商转介绍
    - 直接外呼多工厂合同金属加工厂的制造工程负责人
    - 参加面向金属加工的行业活动，并借助区域制造支持网络
  funnelTargets: OEM/integrator intro→qualified pilot 25%+,
    pilot→annual production contract 60%+, first site→second site or 3+
    additional cells within 12 months 50%+
  pricing: >-
    按活跃受治理机器人单元收取年订阅费，onboarding 费用则和纳入管理的零件族数量挂钩。这和买家的预算逻辑一致：价值来自每一个能少花集成商费用、少等审批、少担报废风险的单元；而 onboarding 费用则覆盖首站点落地所需的实施工作。
businessModel:
  revenueStreams:
    - 按活跃受治理机器人单元收取年度订阅费
    - 按零件族数量和首站点上线范围收取 onboarding 费用
    - 当客户把多台单元标准化后，再卖高级多工厂分析和对标功能
  unitOfValue: 活跃受治理机器人单元
  targetGrossMarginPct: 70
  expansionLevers:
    - 在第一家工厂里继续加更多单元
    - 把已批准的配方包扩到姐妹工厂
    - 用和质量联动的分析与回滚建议继续抬升价值
    - 在同一账户内，从焊接扩到机床上下料
strategyMap:
  northStarMetric: 每个受治理单元从开始重训到批准量产放行所需的天数
  inputMetrics:
    - 已批准且挂接首件证据的配方数量
    - 每次零件或夹具变更后的审批周期中位数
    - 每个受治理单元每季度的集成商返场次数
    - 每个客户的受治理单元数量
    - 跨班次或跨工厂复用的配方包数量
  moatsToBuild:
    - 和零件、夹具上下文绑定的跨厂商已批准配方历史库
    - 把配方版本和质量结果、回滚决策连起来的工作流数据
    - 在单元导入时就嵌进去的 OEM 与集成商渠道关系
  killCriteria:
    - 前 10 个 design partner 里，不到 3 家认为月度换型痛到值得专门买软件
    - 试点账户在 90 天内，无法把“重训到批准量产”的时间缩短至少 30%
    - 首次付费合作后，转成年订阅的试点比例不到 40%
    - 前两个目标机器人品牌的 OEM 捆绑能力，已经让独立审批系统失去必要性
  mermaid: |
    flowchart LR
      Wedge[Commissioning-time pilot for welding or tending cell] --> MVP[Recipe versioning and approval packets]
      MVP --> Proof[30% faster approvals and fewer integrator revisits]
      Proof --> Expansion[More cells, sister plants, and premium analytics]
investorMemo:
  verdict:
    call: 观察
    conviction: >-
      工作流切口够锋利，滩头市场也站得住，但到底值不值得投，还是取决于前几次试点能不能证明：这笔预算真能独立成立，而且跨厂商需求确实足够急。
    whyBelieve: >-
      研究显示，易部署机器人的采用确实在升温，而部署软件和“带质量治理的配方复用”之间，又确实空着一块具体缺口。
    whyDoubt: >-
      如果小机群继续忍受电子表格，或者 OEM 很快捆出“够用”的配方历史功能，这家公司就可能被夹在中间。
    nextDiligence: >-
      和 design partner 核实，一台单元试点在审批时间和集成商返场次数明显下降后，是否真能转成多单元年度支出。
  firstCustomer:
    title: 多工厂合同金属加工厂的制造工程经理
    profile: >-
      一家拥有 300 到 1,500 名员工的美国加工企业，在多个客户项目里运行 3 到 10 个焊接与 CNC 上下料单元，且夹具、工装或零件版本经常变化。
    trigger: 新买一套机器人单元，或从一个跑通的单元第一次扩到更多班次、零件族或姐妹工厂。
    buyer: 制造工程副总裁或 COO
    initialContract: >-
      一个覆盖 2 到 3 个单元或若干零件族 rollout 的 $25k-$40k 付费试点，先在一个站点跑；等 5 个受治理单元迁到平台上后，可转为约 $60k+ 的年度订阅价值。
  mustBeTrue:
    - 至少一半目标账户的机器人重训与审批痛点，发生频率高到足以支撑新增软件预算。
    - 即便不进入安全控制器，初创公司也能把“重训到批准量产”的时间缩短 30% 或更多。
    - 只要变更日志和签字链足够明确，工厂质量团队会接受数字化拼装出来的审批包。
    - OEM 和集成商伙伴愿意转介绍试点，而不是直接挡掉独立治理层。
    - 多单元客户会在 12 个月内从首个试点扩到至少 5 个受治理单元。
  diligenceQuestions:
    - 第一位客户按工作流和工厂维度来看，每个月会经历多少次由变更驱动的机器人重训？
    - 当前成本里，有多少来自报废、审批延误或外部集成商返场？
    - 前 20 个目标账户里，最常见的是哪些机器人品牌和控制器日志？
    - 工厂质量团队在放行一台重训后的单元前，究竟需要哪些证据？
    - 哪些 OEM 或集成商伙伴有动力转售或联合销售这一层，而不是和它正面打包竞争？
operatingAssumptions:
  - assumption: 多工厂加工企业在从一台机器人单元扩到多台单元的过程中，会在完全标准化到单一 OEM 栈之前，就愿意为独立治理层掏钱。
    basis: research.yaml
    validationTest: 完成 10 次深访，并从拥有 3 个及以上活跃单元的账户里拿到 3 个付费试点。
    decisionImpact: 如果不成立，就把产品收窄为 OEM 专属模块，或往更大机群、治理痛感更强的高端市场走。
  - assumption: 轻量元数据模型加窄连接器，不用完整接入 MES 或 QMS，也足以在试点阶段交付价值。
    basis: operator judgment
    validationTest: 在 2 个试点里用人工或半自动方式导入证据，并在 30 天内测出 time-to-value。
    decisionImpact: 如果不成立，实施成本就会上去，公司要么多融资，要么把目标客群收窄到 ACV 更高的账户。
  - assumption: 一旦产品证明自己能减少延误、报废和集成商成本，按每个受治理单元每年 $12k 收费是可接受的。
    basis: research.yaml
    validationTest: 在 5 次试点谈判里拿这个价格测试，并至少赢下 3 单，折扣不超过标价的 20%。
    decisionImpact: 如果不成立，商业模式就得更依赖 onboarding 费、高级服务，或更偏向企业级大客户策略。
  - assumption: OEM 和集成商渠道愿意开门，因为这层产品能帮客户把部署规模化，而不是替代伙伴经济。
    basis: idea.yaml
    validationTest: 签下 2 份转介绍或实施协议，在 6 个月内带来至少 5 个合格商机。
    decisionImpact: 如果不成立，获客会明显变慢，公司也得更早搭建成本更高的直销团队。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 深访 10 家目标加工企业的制造工程和工厂质量负责人，复盘最近的重训事件。
    hypothesis: 审批延误和配方交接足够频繁，能排进机器人部署后的前三大痛点。
    successMetric: 10 家里至少 7 家表示，每月换型都会带来明显延误、报废或集成商依赖。
    owner: 创始人/CEO
  - horizon: 0–90 天
    experiment: 在一台焊接单元和一台机床上下料单元上，跑一轮 design-partner 工作流研究。
    hypothesis: 一套通用审批包 schema 足以覆盖两类流程，不需要做两条独立产品线。
    successMetric: 同一套 schema 能支撑两个试点，且账户专属定制低于 20%。
    owner: 创始产品工程师
  - horizon: 90–180 天
    experiment: 围绕新单元导入或首轮机群扩张，拿下 3 个付费试点。
    hypothesis: 在导入阶段切入，比事后再卖软件，更容易拿到预算批准。
    successMetric: 6 个月内签下 3 个付费试点，其中至少 1 个来自 OEM 或集成商伙伴。
    owner: 创始人/CEO
  - horizon: 90–180 天
    experiment: 在每个试点里测量“重训开始到批准量产”的前后周期变化。
    hypothesis: 配方版本管理加审批包，能把放行时间缩短至少 30%。
    successMetric: 各试点换型场景下的中位数降幅达到 30% 或以上。
    owner: 现场解决方案工程师
  - horizon: 6–12 个月
    experiment: 接上前两个 OEM 连接器，并测试把一套已批准配方包复用到姐妹工厂。
    hypothesis: 跨站点迁移最能证明扩张价值，也最能说明护城河开始形成。
    successMetric: 某客户能在第二站点复用一套已批准配方包，本地适配时间少于 2 天。
    owner: 创始工程师
  - horizon: 12–18 个月
    experiment: 试卖围绕集成商返场减少和回滚建议的高级分析模块。
    hypothesis: 只有工作流先在量产里被信任，分析 upsell 才卖得动。
    successMetric: 有 2 个客户愿意为分析增购付费，或基于季度 ROI 复盘扩大合同范围。
    owner: 产品负责人
operations:
  - 在上线前把每个试点的零件族、夹具状态、审批签字人和回滚路径梳成实施手册
  - 先用轻量连接器加人工证据抓取起步，只有当可复制需求反复出现时，才加固深层集成
  - 给 OEM 和集成商做伙伴 enablement，让他们能把产品一起打进导入和扩张项目
  - 和每个量产客户做季度 ROI 与质量复盘，把单元数从 1 个往多台做上去
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 搭出核心的配方版本管理、审计轨迹和工作流引擎，证明产品不用重服务也能落地。
  - role: 创始人/CEO
    startTiming: Month 0
    rationale: 负责客户发现、试点销售、伙伴拓展，以及把制造工作流规范钉成产品边界。
  - role: 现场解决方案工程师
    startTiming: Month 3
    rationale: 降低试点部署风险，打出 ROI 数据，并把账户专属配置沉淀成可复制的实施动作。
  - role: 产品与设计负责人
    startTiming: Month 6
    rationale: 把操作员和质量团队的工作流做顺，让产品不只被工程团队采用。
  - role: 合作渠道客户经理
    startTiming: Month 9
    rationale: 只有当首批试点拿出可信的转化故事后，才放大来自 OEM 和集成商的管道。
milestones:
  - horizon: 0–12 个月
    items:
      - 围绕导入或扩张事件，在焊接或机床上下料场景里拿下 3 个付费试点
      - 在至少 2 个试点里证明“重训到批准量产”提速 30%
      - 交付版本历史、签字审批包、回滚工作流以及前两个 OEM 连接器
  - horizon: 12–24 个月
    items:
      - 至少 5 个客户转为年订阅，且每个客户拥有 3 个或更多受治理单元
      - 用可复用的配方包和审批历史，完成第一次姐妹工厂 rollout
      - 上线围绕审批滞后、集成商返场和配方复用对标的高级分析
  - horizon: 24–36 个月
    items:
      - 触达 60 个客户，并做到与研究版 SOM 相当的约 $3.6M 年经常性收入
      - 在该细分市场的主流目标机器人品牌上，支持跨厂商配方治理
      - 把产品做成滩头市场里机器人变更控制的默认系统记录
risks:
  - risk: OEM 或跨厂商机器人软件补上足够多的配方历史与审批工作流，让独立产品失去必要性。
    likelihood: Medium
    impact: High
    mitigation: 把重心放在跨厂商质量证据、回滚历史和跨工厂迁移，而不是基础 teach UX。
  - risk: 小机群继续忍受电子表格和集成商服务，导致付费意愿后移。
    likelihood: High
    impact: High
    mitigation: 只盯那些已经从一台单元扩到多台单元、多班次或多站点的账户，把极小机群排除掉。
  - risk: 集成和部署仍然太重服务，撑不起 70% 毛利率。
    likelihood: Medium
    impact: High
    mitigation: 试点阶段只做窄元数据抓取、可复用连接器，并严格限制定制范围。
  - risk: 质量或安全相关方不接受数字化生成的审批包，仍要求更重的人工作业。
    likelihood: Medium
    impact: Medium
    mitigation: 第一版就把签字流、审计日志和可配置证据附件做进去。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: >-
    用这笔钱支撑 18 个月：把 MVP 做出来，拿下并打透前 3 到 5 个付费试点，接上前两个 OEM 连接器，招到现场解决方案工程师，并证明“导入时切入”的试点能转成多单元年订阅。
