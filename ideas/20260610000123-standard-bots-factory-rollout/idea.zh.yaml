topRisks:
  - name: OEM 平台顺手吃掉这层能力
    description: 机器人厂商可能会补上基础示教库，并把类似工作流一起捆进控制器软件。
    mitigation: 先做 OEM 工具不掌握的跨厂商审批与质量系统记录，并把 QMS、MES 工作流接深。
  - name: 极小机群的 ROI 还是太薄
    description: 只有一两台、利用率又不高的单元，痛感可能还不够强，不足以买独立软件。
    mitigation: 只盯那些已经从一个跑通单元扩到多班次、多零件族或多站点的制造商——这些地方的集成商成本和报废风险已经看得见。
  - name: 接上老旧工厂系统的负担太重
    description: 把机器人事件和质量、生产记录打通，可能会拖慢保守工厂里的部署速度。
    mitigation: 先用轻量连接器和人工审批工作流起步，等在一台单元上证明价值之后，再补更深的 MES、QMS 集成。
