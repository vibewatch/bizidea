differentiator: >-
  现有机器人软件主要盯着单一 OEM 栈里的运动编程，系统集成商则按项目吃定制部署的钱。这个产品则架在控制器之上，做的是跨厂商、跨工厂、跨零件版本的系统记录：里面装的是示教、已批准配方和质量结果。它的防守力不在于“更便宜的编程控制台”，而在于每次重训都会沉淀下来的技能历史和审批数据。
