problem: >-
  高混流工厂要的不是让机器人把一项任务做成一次，而是零件、夹具、班次和姐妹工厂一变，仍能把这项任务重新教会、验证过关、再铺开，而且别带来报废和停机。AI-native 机器人把前期编程门槛压低了，但怎么保住资深操作员的示教、怎么证明首件合格、以及每次变更单之后怎么复用技能，现实里仍靠集成商、师傅经验、视频和表格撑着。结果就是，每上一台新机器人单元，都像重新做一个服务项目，而不是把制造能力真正做成可复制。
targetUser:
  primary: >-
    在美国合同金属加工厂负责部署 AI-native 焊接或机床上下料单元、服务高混流零件族的制造工程经理
  secondary: >-
    每次机器人重训或夹具更换后，都要放行首件产出的工厂质量经理
  buyer: >-
    拥有 2 到 8 家工厂的合同金属加工企业里，制造工程副总裁或 COO
startupThesis:
  nonObviousInsight: >-
    基于示教的机器人并没有消灭编程工作，它只是把稀缺资产改成了“已经验证过的生产 know-how”。最后赢下来的软件层，不会是又一个机器人 IDE，而是那套系统记录：它给示教做版本，把示教和零件、质量结果挂起来，再把一次成功 teach-in 变成整个工厂网络都能复用的能力。
  beachhead: >-
    在美国拥有 2 到 8 家工厂的合同金属加工企业，刚开始为重复项目部署首批 AI-native 焊接或机床上下料单元，而夹具、零件版本或批次结构几乎每周都在变
  wedge: >-
    一层 SkillOps，负责抓取车间专家的示教，按零件和夹具给机器人配方做版本，并在每次换型时自动生成 QA 和重训包
  whyNowCatalyst: >-
    Standard Bots 的融资、美国本土制造扩产，以及它宣称的部署份额，都说明 AI-native 机器人正走进美国主流工厂。示教之后的技能治理，正变成新的运营瓶颈。
  ventureScalePath: >-
    先从合同制造商的焊接和机床上下料单元切入，再扩到跨厂商技能仓库、和质量挂钩的机群分析，以及离散制造网络里的供应商—客户可追溯链路。
solution: >-
  产品会把每一次成功的机器人示教和对应的零件号、夹具状态、工装、操作员、质量结果一起记下来，只有这些条件都对，它才算生产可用。系统再按版本管理这些配方，让工程团队看清每个 rev 改了什么、节拍和报废率怎么漂，并在新 teach-in 表现不如预期时，快速回滚到已验证的配置。每次换型时，系统都会自动生成操作指引、首件验证清单，以及交给质量和厂长审批的材料。时间一长，它就会变成那套共享控制平面：把一个老师傅的示教，变成跨班次、跨单元、跨工厂都能复用、也经得起审计的生产技能。
goToMarketSeed:
  firstCustomer: >-
    一家拥有 300 到 1,500 名员工的美国合同金属加工厂，在多个客户项目里运行 3 到 10 个 Standard Bots 或类似的 AI-native 焊接与 CNC 上下料单元
  buyingTrigger: >-
    新买一套机器人单元，或刚从一个跑通的单元扩到更多班次、零件族和姐妹工厂——否则就得继续买外部集成商时间
  currentAlternative: >-
    由集成商主导重训，搭配 OEM 软件，以及本地主管维护的表格或视频式作业指导
  switchingReason: >-
    这套平台让每一次成功的示教都能复用、也能审计，从而缩短重训时间，压低首件风险，不再卡在稀缺机器人工程师或昂贵系统集成商工时上
  pricingHypothesis: >-
    按活跃治理机器人单元收年费，另收 onboarding 费用，定价取决于有多少零件族被纳入 SkillOps 管理
