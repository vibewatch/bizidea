jobsToBeDone:
  - job: >-
      当客户项目更换零件版本或夹具时，帮制造工程经理把机器人快速重训，并证明首件质量过关，这样单元就能继续运转，而不用等外部集成商上门。
    currentAlternative: 集成商到场服务，再加上主管自己维护的表格、视频和纸质清单
    successMetric: 每次零件换型从重训开始到批准量产所需的时间
  - job: >-
      当一个跑通的机器人单元要扩到另一个班次或工厂时，帮工厂质量经理复用已经批准的配方和验证证据，这样自动化扩张就不用把整套导入项目重来一遍。
    currentAlternative: 本地团队之间手工交接，再配合一次性的 OEM 编程项目
    successMetric: 在下一个站点复制一套已验证机器人流程所需的天数
