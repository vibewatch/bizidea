    y3RevenueImpactK: 60.0
    cashImpactK: 150.0
modelDiagram:
  title: "Robot SkillOps revenue flow"
  mermaid: |
    flowchart LR
      Leads["OEM & integrator commissioning leads"] --> Pilots["Paid pilot / proof project"]
      Pilots --> Accounts["Annual subscription accounts"]
      Accounts --> Cells["5 governed cells per account"]
      Cells --> Revenue["Subscription revenue"]
      Revenue --> GrossProfit["70% gross profit"]
      GrossProfit --> Cash["Cash and runway"]
modelSanity:
  - checkName: "Revenue engine"
    finding: "The base case is driven by converting commissioning-time pilots into $60K annual accounts and then expanding referral-led wins to 60 customers by Q4Y3."
  - checkName: "Must go right"
    finding: "OEM and integrator channels must supply enough qualified cell expansions for sales efficiency to hold near the $24K CAC assumption."
  - checkName: "Model breaks if"
    finding: "If implementations stay services-heavy and the business stalls near 40 customers, the downside case compresses cash and likely forces a bridge round."
  - checkName: "Next-round proof"
    finding: "Exiting Y2 with 18 customers, two OEM connectors, and one sister-plant rollout is the milestone most likely to justify the next financing."
sanityChecks:
  ruleOf40: "Y3 growth 263.4% + EBITDA margin 2.4% = 265.8%."
  burnMultiple: "Y2 burn multiple is about 0.9x ($741K EBITDA burn against roughly $840K of net new ARR from 4 to 18 accounts); Y3 turns EBITDA positive."
  revenuePerFte: "$224K Y3 using 10 Q4Y3 FTE (benchmark roughly $200-400K for emerging SaaS)."
  flags:
    - "The Y3 exit depends on partner-led acceleration from 18 customers at Y2 exit to 60 customers at Y3 exit; if channel trust builds slower, the ramp will miss."
    - "The model deliberately excludes separate pilot and onboarding revenue to stay conservative, so early commercial traction may look weaker than field reality."
    - "Gross margin only works if implementation scope stays narrow and reusable; heavy custom integration would push EBITDA back below zero."
