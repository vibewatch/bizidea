slug: "robot-skillops-ledger"
date: "2026-06-10"
currency: USD
modelStartMonth: "2026-07"
assumptions:
  - id: A1
    name: "Model start month"
    value: "2026-07"
    unit: month
    source: "[BP date] First full month after the 2026-06-10 business-plan date."
  - id: A2
    name: "Opening cash / pre-seed ask"
    value: "$2.0M"
    unit: usdM
    source: "[BP fundingAsk] The business plan targets a $2-3M pre-seed; the model uses the low end because the base case reaches the next milestone with a six-month buffer."
  - id: A3
    name: "Governed cells per production account"
    value: "5"
    unit: cells_per_customer
    source: "[BP market.som; research.market.som] The SOM math assumes 5 active governed cells per customer."
  - id: A4
    name: "Steady-state annual subscription ARPU"
    value: "$60.0K per customer-year"
    unit: usdK_per_customer_year
    source: "[BP investorMemo.firstCustomer.initialContract; BP market.som; research.market.som] Five governed cells at $12K per cell implies about $60K ARR once an account is in annual production."
  - id: A5
    name: "Conservative pilot revenue treatment"
    value: "Base P&L recognizes subscription revenue only and excludes separate paid-pilot or onboarding fees"
    unit: method
    source: "[BP gtm.pricing; BP investorMemo.firstCustomer.initialContract] The BP describes paid pilots and onboarding fees, but the base case omits them so early revenue is not overstated."
  - id: A6
    name: "Year 1 production-customer ramp"
    value: "M1-M12 customersEop = 0, 0, 0, 1, 1, 1, 2, 2, 2, 3, 3, 4"
    unit: customers
    source: "[BP milestones 0-12 months; BP experimentRoadmap] This reflects three paid pilots in the first six months and four annual-production accounts by month 12."
  - id: A7
    name: "Year 2 and Year 3 customer ramp"
    value: "Q1Y2-Q4Y3 customersEop = 6, 10, 14, 18, 26, 36, 48, 60"
    unit: customers
    source: "[BP milestones; research.market.som] The ramp reaches the BP year-3 target of 60 customers while keeping Y2 below full SOM penetration."
  - id: A8
    name: "Target gross margin"
    value: "70%"
    unit: percent
    source: "[BP businessModel.targetGrossMarginPct] The P&L models COGS at 30% of revenue to match the business-plan target."
  - id: A9
    name: "Monthly churn"
    value: "1.8%"
    unit: percent
    source: "Startup-finance heuristic for early but sticky industrial workflow software where retention should be strong after deployment, but OEM bundling and services friction still create real logo risk."
  - id: A10
    name: "Fully loaded CAC"
    value: "$24.0K per production customer"
    unit: usdK_per_customer
    source: "[BP gtm.channels; BP gtm.funnelTargets; BP operatingAssumptions] Founder-led selling plus OEM/integrator referrals should keep CAC below pure outbound enterprise software, but each win still requires plant-level proof and implementation support."
  - id: A11
    name: "Loaded salary bands"
    value: "Founder CEO $100K; engineering $130K; field solutions $110K; product/design $120K; partner sales $120K; G&A/ops $80K; customer success $90K"
    unit: usdK_per_fte_year
    source: "Startup-finance heuristic for a lean U.S. pre-seed industrial software team with below-big-tech cash pay and meaningful equity."
  - id: A12
    name: "Headcount ramp snapshots"
    value: "Founder 1/1/1/1/1/1; engineering 1/1/1/2/3/3; field solutions 0/1/1/1/1/1; product/design 0/0/1/1/1/1; sales/partnerships 0/0/0/1/1/2; G&A/ops 0/0/0/0/1/1; customer success 0/0/0/0/0/1 across q1y1/q2y1/q3y1/q4y1/q4y2/q4y3"
    unit: fte
    source: "[BP team; BP strategicChoices.sequencingRationale] The model follows the BP order of founding product build first, implementation second, and partner-led GTM only after repeatability exists."
  - id: A13
    name: "Payroll smoothing in Y2 and Y3"
    value: "Quarterly salary expense ramps gradually between Q4Y1, Q4Y2, and Q4Y3 snapshots rather than stepping only at year-end"
    unit: method
    source: "[Financial Modeler instructions] The quarterly salary line is smoothed so hiring remains consistent with the business-plan sequence."
  - id: A14
    name: "Non-payroll operating budgets"
    value: "Y1 monthly S&M $5K-$8K, R&D $8K-$12K, G&A $5K-$8K; Y2 quarterly S&M $21K-$33K, R&D $30K-$39K, G&A $18K-$27K; Y3 quarterly S&M $36K-$60K, R&D $36K-$45K, G&A $24K-$33K"
    unit: usdK
    source: "Startup-finance heuristic anchored to [BP operations] and [BP fundingAsk.useOfFundsSummary] for lean software, travel, legal, cloud, and partner-enablement spend."
  - id: A15
    name: "Cash roll-forward convention"
    value: "Ending cash equals opening cash plus EBITDA"
    unit: method
    source: "Startup-finance heuristic for an asset-light pre-seed software company with immaterial debt, tax, capex, and working-capital swings."
  - id: A16
    name: "Downside scenario deltas"
    value: "40 customers by Q4Y3, 65% gross margin, 2.5% monthly churn, and slower partner referrals"
    unit: scenario_inputs
    source: "[BP risks; research.sensitivityCases] This downside maps directly to small fleets tolerating spreadsheets longer and OEM or robot-OS bundling narrowing willingness to pay."
  - id: A17
    name: "Upside scenario deltas"
    value: "70 customers by Q4Y3, 72% gross margin, 1.2% monthly churn, and faster OEM/integrator referrals"
    unit: scenario_inputs
    source: "[BP milestones; BP product.twentyFourMonth] The upside assumes the first sister-plant transfer works cleanly and premium analytics increase account expansion."
