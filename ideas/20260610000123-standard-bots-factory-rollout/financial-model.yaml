scenarios:
  downside:
    description: "OEM and integrator referrals ramp more slowly, gross margin stays services-heavy, and the company exits year 3 with only 40 customers."
    y3RevenueK: 1560.0
    y3EbitdaK: -310.0
    cashLowPointK: 90.0
    keyAssumptionChanges:
      - "Q4Y3 customers fall to 40 instead of 60."
      - "Gross margin falls to 65% instead of 70%."
      - "Monthly churn rises to 2.5%."
      - "Second sales hire slips and channel conversion stays weak."
  base:
    description: "Commissioning-time pilots convert into annual subscriptions and OEM or integrator referrals compound after repeatable proof exists."
    y3RevenueK: 2235.0
    y3EbitdaK: 54.4
    cashLowPointK: 481.9
    keyAssumptionChanges:
      - "Q4Y3 customers reach 60."
      - "Steady-state ARPU stays at $60K per account-year."
      - "Gross margin reaches the 70% business-plan target."
      - "Headcount reaches 10 FTE by Q4Y3."
  upside:
    description: "The first sister-plant transfer becomes a strong proof point, partner referrals accelerate, and premium analytics expand account value."
    y3RevenueK: 2715.0
    y3EbitdaK: 338.0
    cashLowPointK: 620.0
    keyAssumptionChanges:
      - "Q4Y3 customers reach 70 instead of 60."
      - "Gross margin improves to 72%."
      - "Monthly churn improves to 1.2%."
      - "OEM and integrator referrals shorten the sales cycle by about two months."
