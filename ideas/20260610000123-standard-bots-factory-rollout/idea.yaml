topRisks:
  - name: OEM platform pull-through
    description: Robot vendors may add basic demonstration libraries and try to bundle similar workflows into their controller software.
    mitigation: Start as the cross-vendor approval and quality system of record that OEM tools do not own, and integrate deeply with QMS and MES workflows.
  - name: Thin ROI at very small fleets
    description: Plants with only one or two low-utilization cells may not feel enough pain to buy standalone software.
    mitigation: Target manufacturers already expanding from one successful cell to multiple shifts, part families, or sites where integrator costs and scrap risk are visible.
  - name: Integration burden with legacy factory systems
    description: Connecting robot events to quality and production records can slow deployment inside conservative plants.
    mitigation: Launch with lightweight connectors and manual approval workflows first, then add deeper MES and QMS integrations after proving value on one cell.
