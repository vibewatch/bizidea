categoryDynamics:
  growthRate: Q2 2025 北美机器人订单同比增长 9%
  growthRateSourceRefs:
    - 10
  tailwinds:
    - point: 焊工和操作员短缺，让自动化项目在战略上持续紧迫。
      sourceRefs:
        - 8
        - 23
        - 24
    - point: no-code 和示教式机器人界面降低了部署门槛，也让更多工厂愿意自动化。
      sourceRefs:
        - 1
        - 13
        - 14
        - 19
    - point: 快速部署的上下料和焊接平台，正在把“单元应该能很快配置好”变成买家的新预期。
      sourceRefs:
        - 21
        - 22
  headwinds:
    - point: 机器人焊接能不能成功，取决于整套单元集成，不只是机器人编程，因此单靠软件的故事很难讲太满。
      sourceRefs:
        - 11
    - point: 更小规模或可移动的 cobot 部署，可能会推迟治理软件采用，因为买家眼下仍先优化 capex 和灵活性。
      sourceRefs:
        - 9
        - 16
        - 18
competitors:
  - name: Standard Bots
    stage: scale-up
    wedge: 面向机床上下料、焊接和码垛的 AI-native、no-code 机器人 OEM，并自带应用套件。
    pricing: "RO1/Core 标价 $37k；Thor 为 $49.5k；比较页强调可租可买。"
    strength: 易用性叙事强，软硬件一体，美国本土制造故事也更容易打动买家。
    weaknessVsUs: 它掌握的是机器人交易本身，而不是混合机群里“已批准配方 + 质量证据”的跨厂商系统记录。
    sourceRefs:
      - 13
      - 14
      - 15
  - name: Universal Robots
    stage: incumbent
    wedge: 面向柔性焊接、上下料和可重部署车间自动化的大型 cobot 生态。
    pricing: "Standard Bots 的对比页里，UR10e 显示为 $47k+；更完整的方案成本通常还取决于伙伴集成。"
    strength: 生态扎实，高混流灵活性被反复验证，且有大量集成商和应用伙伴。
    weaknessVsUs: 它优化的是部署和机器人使用率，不是可审计的配方沿革和跨站点审批记忆。
    sourceRefs:
      - 15
      - 16
      - 24
  - name: READY Robotics
    stage: scale-up
    wedge: 跨机器人品牌的统一操作系统和编程层。
    pricing: "软件定制定价；案例显示，一套基于 Forge OS 的完整方案总价为 $37k，其中含一台约 $14k 的 Epson 机器人及部署。"
    strength: 对“没有深度机器人编程能力的制造商”来说，跨品牌抽象和降本故事都很清楚。
    weaknessVsUs: 它更聚焦“让机器人更好编、更好部署”，而不是保住已批准的量产配方和质量材料包。
    sourceRefs:
      - 17
      - 18
  - name: Wandelbots
    stage: scale-up
    wedge: 把数字孪生、仿真和机群编排连在一起的机器人厂商中立平台。
    pricing: 定制企业平台定价。
    strength: 在多品牌、仿真优先和数字孪生叙事上，对大型自动化组织很有吸引力。
    weaknessVsUs: 更接近工程编排，而不是日常首件放行、变更控制和车间配方治理。
    sourceRefs:
      - 19
      - 20
  - name: Vention
    stage: scale-up
    wedge: 面向上下料和焊接的模块化 turnkey 自动化与 Click & Customize 单元。
    pricing: 更强调实时可配置方案报价和快速部署，而不是公开固定的 SaaS 定价。
    strength: 对正在评估焊接和上下料单元的金属加工厂来说，从设计到部署的路径很短。
    weaknessVsUs: 它卖的是单元和部署体验，而不是上线之后那套跨厂商配方复用与审批工作流。
    sourceRefs:
      - 21
      - 22
regulatoryTechnicalConstraints:
  - point: 围绕机器人单元的维护或服务必须遵守 OSHA 的锁定/挂牌和能量隔离要求。
    sourceRefs:
      - 5
  - point: 即便焊接轨迹已经自动化，焊烟、紫外暴露、灼伤和触电风险仍然需要有文档化控制。
    sourceRefs:
      - 6
  - point: OSHA 会把用户引向外部机器人安全指引，因此买家仍需要证据来证明工作流变更符合公认安全实践。
    sourceRefs:
      - 7
  - point: 当工厂希望让数字孪生验证与实体单元行为严格一致时，虚拟到物理的数据连续性在技术上并不简单。
    sourceRefs:
      - 20
validationSignals:
  - point: Raymath 的焊接效率提升 4 倍、机床上下料效率提升超 600%，说明可复用的高混流机器人工作流确实能打出巨大价值。
    sourceRefs:
      - 12
  - point: WST Fab 在客户订单变化后，几天内就把新交付的机床上下料单元改编给了另一批零件。
    sourceRefs:
      - 16
  - point: READY Robotics 和 FINCH 以不到一周、总价 $37k 的成本完成了 Wolf Metals 去毛刺自动化，说明只要编程风险足够低，买家就会接受低摩擦自动化。
    sourceRefs:
      - 18
  - point: 一个 NIST 支持的改造项目把两个机床的上料自动化后，节省了 40%-50% 的人工，进一步证明买家确实愿意为可复制自动化运营买单。
    sourceRefs:
      - 23
