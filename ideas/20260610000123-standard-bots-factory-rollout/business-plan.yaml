slug: robot-skillops-ledger
date: '2026-06-10'
executiveSummary: >-
  Robot SkillOps Ledger targets U.S. contract metal fabricators that are moving
  from one successful AI-native welding or machine-tending cell to repeatable
  multi-cell deployment across shifts, part families, and plants. The acute pain
  is not initial robot setup; it is the repeated reteaching, first-article
  approval, and recipe handoff work that still lives in integrator projects,
  spreadsheets, videos, and tribal knowledge. The MVP is a system of record that
  versions robot demonstrations by part and fixture, links each version to
  quality evidence, and generates approval packets for changeovers. This wedge is
  narrower than general robot programming software and deliberately avoids owning
  motion control, simulation, or full MES/QMS workflows in the first phase. The
  plan lands through OEM and integrator commissioning moments because that is
  when buyers feel both urgency and budget authority, then expands account value
  as the customer adds cells, part families, and sister plants. Research supports
  a plausible beachhead with an estimated $27.0M SAM and a year-3 SOM of $3.6M,
  but those figures depend on assumptions about how many 100+ employee fabricated
  metal plants are truly multi-plant contract manufacturers. The core proof point
  is measurable reduction in retraining-to-approved-production time and fewer
  integrator call-backs after a part, fixture, or tooling change. The biggest
  disconfirming risk is that OEMs or robot-agnostic software vendors satisfy this
  need with bundled recipe history before an independent system of record becomes
  a must-have line item.
problem:
  - >-
    High-mix fabricators must reteach robots whenever part revisions, fixtures,
    tooling, or lot mix change, and that work still depends on scarce experts,
    outside integrators, and inconsistent local documentation.
  - >-
    Plant quality teams need auditable first-article evidence and rollback
    history after each robotic retrain, but current OEM tools and spreadsheets do
    not provide a cross-vendor, production-safe approval record.
solution:
  - >-
    Capture each successful robot demonstration with part family, fixture state,
    tooling, operator, and resulting quality outcome, then version that recipe so
    engineers can compare revisions and restore a known-good state.
  - >-
    Generate changeover packets that combine work instructions, approval
    checklists, and release evidence for manufacturing engineering and plant
    quality, so one validated teach-in can be reused across shifts and sites.
whyWeWin:
  - >-
    OEM robot software and robot-agnostic execution stacks optimize programming
    and deployment, but the evidence set points to an open control layer around
    approval memory, recipe lineage, and cross-site reuse.
  - >-
    The product compounds with every approved retrain because the defensible
    asset is plant-owned history linking recipe changes to quality outcomes, not
    a one-time services project.
strategicChoices:
  beachhead: >-
    U.S. contract metal fabricators with 2-8 plants that are deploying their
    first 3-10 AI-native welding or CNC-tending cells across repeat but
    change-prone customer programs.
  wedgeRationale: >-
    Welding and machine tending create frequent, high-cost changeovers with clear
    first-article approval steps, so the startup can prove value on one cell
    faster than by selling a horizontal robot platform across many workflows.
  sequencingRationale: >-
    Start with metadata capture, revision diffs, and approval packets around one
    flagship cell because that solves an immediate buyer problem without deep
    controller integration. Add OEM connectors, quality-system integrations, and
    multi-plant rollout tooling only after the team proves that faster approvals
    and fewer integrator revisits drive budget expansion. Hiring follows the same
    order: founding product engineering first, then field implementation, then
    partner-led sales once repeatability exists.
  notYet:
    - Full robot programming IDE or controller replacement
    - Broad support for palletizing, assembly, and inspection before welding and machine tending are repeatable
    - Deep MES replacement or enterprise analytics before approval workflows are trusted
market:
  tam: >-
    $281.9M estimated annual U.S. TAM based on 2,936 fabricated-metal
    establishments with 100+ employees, an assumed 8 governed cells per account,
    and $12k annual software spend per active cell.
  sam: >-
    $27.0M estimated beachhead SAM based on roughly 450 multi-plant, high-mix
    contract fabricators with about 5 active cells each at $12k annual software
    spend per cell.
  som: >-
    $3.6M year-3 SOM assuming 60 customers, 5 active cells per customer, and
    $12k annual software spend per cell through OEM and integrator-led expansion.
  segments:
    - Multi-plant U.S. contract metal fabricators running high-mix welding and CNC-tending programs
    - High-mix discrete manufacturers adopting robot cells but not yet standardizing change-control workflows
  buyingProcess: >-
    The process typically starts when a VP of manufacturing engineering, plant
    operations leader, or COO is already commissioning a new cell or expanding a
    proven one. A manufacturing engineering manager and plant quality lead will
    usually sponsor the pilot, and conversion depends on showing shorter
    retraining cycles, cleaner approval evidence, and less dependence on outside
    integrators.
product:
  mvp: >-
    The MVP records teach-by-demonstration events, versions approved recipes by
    part family and fixture, stores first-article evidence, and produces approval
    packets with revision diffs and rollback history. It should work first with
    lightweight metadata capture and narrow connectors for one or two robot brands
    rather than requiring deep integration across the whole plant stack.
  sixMonth: >-
    Ship the production pilot product for one welding or machine-tending cell,
    including recipe versioning, approval workflows, signed release records, and
    operator instructions generated from each approved retrain.
  twelveMonth: >-
    Add OEM-specific event ingestion for the first two robot platforms, basic QMS
    attachment workflows, account-level dashboards for retraining cycle time and
    approval lag, and a repeatable deployment playbook for sister plants.
  twentyFourMonth: >-
    Support cross-site recipe transfer, multi-cell benchmarking, quality-linked
    rollback recommendations, and a broader cross-vendor skill repository that
    lets large fabricators standardize rollout governance across their fleet.
  keyBets:
    - Buyers will pay for approval governance before they pay for deeper analytics
    - One-cell proof can expand to 5 or more governed cells inside the same account within 12 months
    - Narrow cross-vendor integrations are sufficient to land the first 10 customers
    - Quality and engineering teams will trust digitally generated approval packets if audit trails are explicit
gtm:
  wedge: >-
    Sell a paid pilot around one newly commissioned or newly expanded welding or
    machine-tending cell where the customer expects repeated reteaching and wants
    to cut first-article delay plus integrator dependence.
  channels:
    - OEM referral during new-cell commissioning
    - System integrator referral on expansion or retraining projects
    - Direct outbound to manufacturing engineering leaders at multi-plant contract fabricators
    - Fabrication-focused events and regional manufacturing-support ecosystems
  funnelTargets: "OEM/integrator intro→qualified pilot 25%+, pilot→annual production contract 60%+, first site→second site or 3+ additional cells within 12 months 50%+"
  pricing: >-
    Charge an annual subscription per active governed robot cell, with onboarding
    tied to the number of part families brought under control. This matches the
    buyer's budgeting logic because value comes from each cell that avoids
    repeated integrator spend, approval delays, and scrap risk, while onboarding
    fees fund the implementation work needed to prove the first site.
businessModel:
  revenueStreams:
    - Annual subscription per active governed robot cell
    - Onboarding fee based on number of part families and first-site setup scope
    - Premium multi-plant analytics and benchmarking once a customer standardizes multiple cells
  unitOfValue: active governed robot cell
  targetGrossMarginPct: 70
  expansionLevers:
    - Add more cells within the first plant
    - Extend approved recipe packs to sister plants
    - Increase value from quality-linked analytics and rollback recommendations
    - Expand from welding into machine tending within the same account
strategyMap:
  northStarMetric: Days from retrain start to approved production release per governed cell
  inputMetrics:
    - Number of approved recipes with linked first-article evidence
    - Median approval cycle time after a part or fixture change
    - Integrator call-backs per governed cell per quarter
    - Governed cells per customer
    - Number of recipe packs reused across shifts or plants
  moatsToBuild:
    - Cross-vendor library of approved recipe history tied to part and fixture context
    - Workflow data connecting recipe revisions to quality outcomes and rollback decisions
    - Embedded OEM and integrator channel relationships at commissioning time
  killCriteria:
    - Fewer than 3 of the first 10 design partners report monthly changeovers painful enough to fund software
    - Pilot accounts fail to reduce retraining-to-approved-production time by at least 30% within 90 days
    - Fewer than 40% of pilots convert to annual subscriptions after the first paid engagement
    - OEM bundling removes the need for a separate approval system in the first two target robot brands
  mermaid: |
    flowchart LR
      Wedge[Commissioning-time pilot for welding or tending cell] --> MVP[Recipe versioning and approval packets]
      MVP --> Proof[30% faster approvals and fewer integrator revisits]
      Proof --> Expansion[More cells, sister plants, and premium analytics]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong workflow wedge and credible beachhead, but investability still depends on proving standalone budget and cross-vendor urgency in the first pilots.
    whyBelieve: The research shows real growth in easy-to-program robot adoption and a specific gap between deployment software and quality-governed recipe reuse.
    whyDoubt: The company could be squeezed if buyers continue to tolerate spreadsheets at small fleet sizes or if OEMs bundle acceptable recipe-history features.
    nextDiligence: Verify with design partners that one-cell pilots convert into multi-cell annual spend after measurable reductions in approval time and integrator call-backs.
  firstCustomer:
    title: Manufacturing engineering manager at a multi-plant contract metal fabricator
    profile: >-
      A 300-1,500 employee U.S. fabricator running 3-10 welding and CNC-tending
      cells across multiple customer programs with frequent fixture, tooling, or
      part-revision changes.
    trigger: A new robot-cell purchase or the first expansion from one successful cell to additional shifts, part families, or sister plants.
    buyer: VP of manufacturing engineering or COO
    initialContract: >-
      $25k-$40k paid pilot covering 2-3 cells or part-family rollouts over one
      site, converting to roughly $60k+ annual subscription value as 5 governed
      cells move onto the platform.
  mustBeTrue:
    - At least half of target accounts experience robotic reteaching and approval pain often enough to justify a new software budget.
    - The startup can reduce retraining-to-approved-production time by 30% or more without sitting inside the safety controller.
    - Plant quality teams will accept digitally assembled approval packets with explicit change logs and signatures.
    - OEM and integrator partners will refer pilots instead of blocking an independent governance layer.
    - Multi-cell customers will expand beyond the first pilot to at least 5 governed cells within 12 months.
  diligenceQuestions:
    - How many change-driven reteaching events does the first customer experience per month by workflow and plant?
    - What portion of current cost comes from scrap, approval delay, or outside integrator revisits?
    - Which robot brands and controller logs dominate the first 20 target accounts?
    - What exact evidence does plant quality require before releasing a retrained cell to production?
    - Which OEM or integrator partners have incentive to resell or co-sell this layer rather than bundle against it?
operatingAssumptions:
  - assumption: Multi-plant fabricators expanding from one robot cell to several will fund a separate governance layer before they standardize on a single OEM stack.
    basis: research.yaml
    validationTest: Close 10 discovery interviews and secure 3 paid pilots from accounts with 3 or more active cells.
    decisionImpact: If false, narrow the product to OEM-specific modules or move upmarket to larger fleets with clearer governance pain.
  - assumption: A lightweight metadata model plus narrow connectors can deliver pilot value without a full MES or QMS integration.
    basis: operator judgment
    validationTest: Deploy the product in 2 pilots using manual or semi-automated evidence ingestion and measure time-to-value within 30 days.
    decisionImpact: If false, implementation cost rises and the company must raise more capital or shrink the target segment to higher-ACV accounts.
  - assumption: $12k annual spend per governed cell is acceptable once the product proves avoided delay, scrap, and integrator cost.
    basis: research.yaml
    validationTest: Present pricing in 5 pilot negotiations and win at least 3 with less than 20% discount from list.
    decisionImpact: If false, the business must rely on larger onboarding fees, premium services, or a more enterprise-only account strategy.
  - assumption: OEM and integrator channels will open doors because the product helps customers scale deployments without replacing partner economics.
    basis: idea.yaml
    validationTest: Sign 2 referral or implementation agreements that generate at least 5 qualified pipeline opportunities in 6 months.
    decisionImpact: If false, customer acquisition becomes slower and the company must build a more expensive direct sales motion earlier.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview manufacturing engineering and plant quality leads at 10 target fabricators about recent reteaching events.
    hypothesis: Approval delay and recipe handoff are frequent enough to rank among the top three post-deployment automation pains.
    successMetric: At least 7 of 10 accounts report monthly changeovers with material delay, scrap, or integrator dependence.
    owner: Founder CEO
  - horizon: 0–90 days
    experiment: Run a design-partner workflow study on one welding cell and one machine-tending cell.
    hypothesis: A common approval-packet schema can cover both workflows without building separate products.
    successMetric: One shared schema supports both pilots with less than 20% account-specific customization.
    owner: Founding product engineer
  - horizon: 90–180 days
    experiment: Launch 3 paid pilots tied to new-cell commissioning or first fleet expansion.
    hypothesis: Commissioning-time entry creates faster budget approval than post hoc software selling.
    successMetric: 3 paid pilots close within 6 months with at least one sourced by an OEM or integrator partner.
    owner: Founder CEO
  - horizon: 90–180 days
    experiment: Measure pre/post cycle time for retraining-to-approved-production in each pilot.
    hypothesis: Recipe versioning plus approval packets reduce release time by at least 30%.
    successMetric: Median reduction of 30% or more across pilot changeovers.
    owner: Field solutions engineer
  - horizon: 6–12 months
    experiment: Add first two OEM connectors and test reuse of one approved recipe pack at a sister plant.
    hypothesis: Cross-site transfer creates the clearest expansion proof and moat signal.
    successMetric: One customer reuses an approved recipe pack at a second site with less than 2 days of local adaptation.
    owner: Founding eng
  - horizon: 12–18 months
    experiment: Pilot premium analytics for integrator call-back reduction and rollback recommendations.
    hypothesis: Analytics upsell is credible only after workflow trust is established in production.
    successMetric: 2 customers pay for analytics add-ons or expand contract scope based on quarterly ROI reviews.
    owner: Product lead
operations:
  - Maintain an implementation playbook that maps each pilot's part family, fixture states, approval signers, and rollback path before go-live
  - Use lightweight connectors plus manual evidence capture first, then harden integrations only after repeat workflow requirements appear
  - Build partner enablement for OEMs and integrators so they can package the product into commissioning and expansion projects
  - Run quarterly ROI and quality reviews with each production customer to drive expansion from one cell to many
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Build the core recipe-versioning, audit trail, and workflow engine that proves the product can land without heavy services.
  - role: Founder CEO
    startTiming: Month 0
    rationale: Own customer discovery, pilot sales, partner recruiting, and the manufacturing workflow spec that ties GTM to product scope.
  - role: Field solutions engineer
    startTiming: Month 3
    rationale: Reduce pilot deployment risk, instrument ROI, and turn account-specific setup into a repeatable implementation motion.
  - role: Product and design lead
    startTiming: Month 6
    rationale: Simplify operator and quality workflows so the product is adopted beyond the initial engineering champion.
  - role: Partner account executive
    startTiming: Month 9
    rationale: Scale OEM and integrator-sourced pipeline only after the first pilots produce a credible conversion story.
milestones:
  - horizon: 0–12 months
    items:
      - Secure 3 paid pilots in welding or machine tending tied to commissioning or expansion events
      - Prove 30% faster retraining-to-approved-production time in at least 2 pilots
      - Ship version history, signed approval packets, rollback workflows, and first two OEM connectors
  - horizon: 12–24 months
    items:
      - Convert at least 5 customers to annual subscriptions with 3 or more governed cells each
      - Complete the first sister-plant rollout using a reusable recipe pack and approval history
      - Launch premium analytics for approval lag, integrator call-backs, and recipe reuse benchmarking
  - horizon: 24–36 months
    items:
      - Reach 60 customers and approximately $3.6M in annual recurring revenue equivalent to the researched SOM case
      - Support cross-vendor recipe governance across the leading target robot brands in the segment
      - Establish the product as the default system of record for robotic change-control in the beachhead segment
risks:
  - risk: OEMs or robot-agnostic software vendors add enough recipe history and approval workflow to remove the need for a separate product.
    likelihood: Medium
    impact: High
    mitigation: Focus on cross-vendor quality evidence, rollback history, and plant-to-plant transfer rather than basic teach UX.
  - risk: Small fleets continue to tolerate spreadsheets and integrator services, delaying willingness to pay.
    likelihood: High
    impact: High
    mitigation: Target only accounts with visible expansion from one cell to multiple cells, shifts, or sites and qualify out very small fleets.
  - risk: Integration and deployment effort stays too services-heavy to support 70% gross margin.
    likelihood: Medium
    impact: High
    mitigation: Start with narrow metadata capture, reusable connectors, and strict limits on custom scope during pilots.
  - risk: Quality or safety stakeholders refuse digitally generated approval packets without heavier manual controls.
    likelihood: Medium
    impact: Medium
    mitigation: Include explicit sign-off workflows, audit logs, and configurable evidence attachments from the first release.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–3M
  runwayMonths: 18
  useOfFundsSummary: >-
    Fund 18 months to build the MVP, win and instrument the first 3-5 paid
    pilots, add the first two OEM connectors, hire a field solutions engineer,
    and prove that commissioning-time pilots convert into multi-cell annual
    subscriptions.
