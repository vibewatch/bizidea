differentiator: 现有的人力规划工具擅长画组织架构，通用 AI 可观测性工具擅长看 prompt，但没有谁能回答 COO 最关心的问题：哪条交付流程现在就能自动化，又不至于把医院或保险客户搞出事故。这个产品天生围绕工作流，也直接盯财务结果：把影子模式自动化测量、SLA 风险评分和岗位转型规划做进同一套系统，专门给受监管的 health-tech 交付组织用。护城河来自哪些实施和支持任务真的适合自动化的基准数据，以及嵌在系统里的转型操作手册；每迁一条流程，价值就再厚一层。
