jobsToBeDone:
- job: 当公司准备做 AI 驱动重组时，帮管理层先证明哪些客户交付流程可以安全转给自动化，这样我们才能在不伤害续费和 SLA 表现的前提下把利润拉起来。
  currentAlternative: Excel 规划、管理层判断，以及咨询公司主导的组织设计项目
  successMetric: 每条已转型工作流带来的毛利提升、SLA 违约率，以及重组后的续费留存
- job: 当一条流程只完成了部分自动化时，帮运营负责人盯住新的人机协同设计是否真的稳定，好让团队在服务质量下滑前就把人员重配到位。
  currentAlternative: BI 看板、QA 抽样，以及交付经理被动救火
  successMetric: 异常率、升级量，以及一条转型工作流恢复稳定所需时间
