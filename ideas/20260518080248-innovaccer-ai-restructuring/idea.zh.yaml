problem: health-tech 厂商正被董事会逼着变成 AI 原生，但多数公司决定裁多少人、哪些流程该自动化，靠的还是 Excel 模型、试点演示和零散的生产率故事。真正危险的活，不是再上一层 AI 助手，而是先证明哪些实施、支持和数据运营流程能安全交给 AI，而不会把客户 SLA、合规姿态或续费收入炸掉。证据一弱，公司就会在一轮又一轮裁员里来回摇摆，既丢掉组织记忆，最后还得在危机里把人工流程重新搭回去。
targetUser:
  primary: 拥有美国和印度大规模实施与支持团队、员工数 200-1,500 人的 health-tech 厂商 COO 或专业服务 VP
  secondary: 负责 AI 驱动组织重构的财务转型负责人、交付运营总监和 HRBP
  buyer: 成长期 health-tech 平台厂商的 CEO、COO 或 CFO
startupThesis:
  nonObviousInsight: AI 原生重组真正卡住的不是模型质量，而是在领导层裁人之前，缺少一套能把自动化决策和客户结果、利润影响、岗位重设计连起来的工作流级证据系统。
  beachhead: 切入 Series B-D 的医疗软件厂商：卖数据集成、分析、收入周期或 care-management 平台给医院和保险方，在美国和印度交付中心分布着 50-300 名实施与支持人员。
  wedge: AI 转型控制塔：先给任务级人力成本打底，再在客户交付流程上跑 shadow mode 自动化测试，按 SLA 和合规影响给风险打分，并在任何团队重组前产出岗位重配方案。
  whyNowCatalyst: Innovaccer 这家医疗数据平台企业围绕 AI 原生模式一次性重组约 340 个岗位，说明 health-tech 运营商现在就在做人力决策，价值证明和转型治理软件已经不是可选项，而是急需品。
  ventureScalePath: 先拿下承受交付利润压力的 health-tech 厂商，再把同一层工作流证据与组织转型能力扩到 payer 运营、provider 共享服务、医疗 BPO，最终走向其他也在被 AI 重做交付模式的受监管垂直 SaaS 行业。
solution: 产品把工单、工时、QA、客服和客户交付系统接进来，先画出领导层声称能被 AI 替代的每一条流程。系统先跑影子模式，盯住数据上线、分析配置、客服分诊、版本验证这些具体任务的周期、异常率、升级需求和客户影响风险。管理层看到的是一张转型记分板：哪些岗位可以自动化，哪些必须改成人在回路里，哪里一刀砍人很可能引发 SLA 违约或流失风险。接着系统把董事会能直接看的 ROI 报告、岗位重配方案和裁后监控打包出来，让公司按流程一条条迁移，而不是凭信念宣布大裁员。时间久了，它会变成交付、支持和客户成功团队所有 AI 运营模型变更的核心记录系统。
goToMarketSeed:
  firstCustomer: 第一家客户会是一家美印双地运营的 health-tech 平台厂商：实施、支持和数据运营人员超过 100 人，正准备在下一轮预算周期前启动董事会要求的 AI 提效计划。
  buyingTrigger: 董事会或高管要求压低交付成本、抬高毛利，或在不伤害续费的前提下，为新一轮 AI 驱动重组拿出说得过去的依据。
  currentAlternative: 基于 Excel 的人力规划、内部 BI 看板、咨询公司幻灯片，以及通用 HR 规划软件
  switchingReason: 这套切口能赢过现状，因为它把自动化决策直接绑到工作流级 SLA 风险、已实现的利润改善和岗位重配动作上，而不是靠静态编制模型或一次性的试点故事。
  pricingHypothesis: 按活跃转型工作流和受监控席位收取年度订阅费，外加实施接入费和季度 ROI 审计费。
