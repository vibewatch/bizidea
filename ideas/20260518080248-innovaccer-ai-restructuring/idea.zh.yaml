topRisks:
- name: 这个品类看起来像咨询服务
  description: 买方可能把转型规划看成一次性服务项目，而不是值得拿持续预算买的软件。
  mitigation: 把持续的裁后监控和基准报告做成标配，让产品变成每次新工作流转型都要用的操作系统，而不是一套幻灯片。
- name: 数据接入阻力
  description: health-tech 厂商可能很难足够快地打通分散在各个交付系统里的任务、质量和工时数据，导致 ROI 迟迟证明不出来。
  mitigation: 先只接工单、工时和 QA 这几类核心系统，在 30 天内先卖出第一张工作流记分卡。
- name: 组织政治阻力
  description: 员工和中层可能会抗拒一款与裁员绑定的工具，拖慢部署，甚至扭曲数据质量。
  mitigation: 把产品定位成安全的工作流重设计与岗位重配工具，强制人审，并明确标出哪些自动化不该替代员工。
