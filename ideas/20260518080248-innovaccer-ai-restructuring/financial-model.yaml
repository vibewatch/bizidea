modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified health-tech accounts] --> PaidPilots[Paid pilots]
      PaidPilots --> ProductionCustomers[Annual production customers]
      Telemetry[Workflow telemetry and QA data] --> Proof[Shadow-mode proof]
      Proof --> ProductionCustomers
      ProductionCustomers --> Revenue[Subscription and onboarding revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Ending cash]
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue is driven by growing from three paying logos in Y1 to 15 by Q4Y3 while holding Y3 pricing at the low end of the researched $250K-$350K ACV range.
- checkName: Must go right
  finding: Pilot customers must convert into annual production subscriptions fast enough that the company reaches seven customers by Q4Y2 before hiring materially ahead of proof.
- checkName: Model breaks if
  finding: The biggest cash-risk condition is a slower sales cycle or broader PHI-driven compliance scope, which sensitivity shows can erase more than $300K of cash and delay revenue materially.
- checkName: Next-round proof
  finding: The next round is justified only after one workflow family reliably shows labor-hour savings without SLA degradation across seven production customers and at least two partner-led motions.
sanityChecks:
  ruleOf40: Y3 growth 175.0% + EBITDA margin 2.1% = 177.1%
  burnMultiple: Y2 burn multiple 0.68x (EBITDA burn 607.35K on net new revenue 887.5K); Y3 turns EBITDA positive, so burn multiple stops being the primary efficiency lens.
  revenuePerFte: $211.5K Y3 using Q4Y3 13 FTE (benchmark $200-400K SaaS)
  flags:
  - Budget ownership is still an assumption, so the model depends on COO/CFO-led programs funding a new control layer instead of extending Celonis, UiPath, Workday, or Visier.
  - Gross margin only reaches 70%+ if connectors, workflow mapping, and governance reviews become templated; PHI-heavy deployments would likely push COGS and G&A above plan.
  - The main P&L treats customer adds as net of early churn during first contract cycles, so materially weaker renewals would cut the Q4Y3 15-customer endpoint.
  - Revenue per FTE is only at the low end of the SaaS benchmark by Q4Y3, which means hiring ahead of conversion proof would weaken the next-round story quickly.
