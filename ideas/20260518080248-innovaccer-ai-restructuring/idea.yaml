jobsToBeDone:
  - job: When our health-tech company is planning an AI-led restructuring, help leadership prove which customer-delivery workflows can safely shift to automation, so we can improve margin without hurting renewals or SLA performance.
    currentAlternative: Spreadsheet planning, leadership judgment, and consulting-led org design exercises
    successMetric: Gross-margin lift per transitioned workflow, SLA breach rate, and renewal retention after restructuring
  - job: When a workflow has been partially automated, help operations leaders monitor whether the new human-plus-AI design is actually stable, so they can redeploy teams before service quality degrades.
    currentAlternative: BI dashboards, QA sampling, and reactive firefighting by delivery managers
    successMetric: Exception rate, escalation volume, and time to stabilize a transitioned workflow
