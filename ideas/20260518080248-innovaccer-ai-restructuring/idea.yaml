topRisks:
  - name: Category feels like consulting
    description: Buyers may see transition planning as a one-time services project instead of software worth recurring budget.
    mitigation: Instrument recurring post-restructure monitoring and benchmark reporting so the product becomes the operating system for every new workflow transition, not a slide deck.
  - name: Data access friction
    description: Health-tech vendors may struggle to connect task, quality, and time data across fragmented delivery systems fast enough to prove ROI.
    mitigation: Start with a narrow connector set around ticketing, time-tracking, and QA systems and sell a first workflow scorecard within 30 days.
  - name: Political resistance
    description: Employees and middle managers may resist a tool associated with layoffs, slowing deployment or distorting data quality.
    mitigation: Position the product around safe workflow redesign and redeployment, require explicit human-in-the-loop review, and highlight which automations should not replace staff.
