  - 47
  - 48
  - 50
- name: Workday
  stage: 现有厂商
  wedge: 人力规划 + agent 核心记录系统 + 企业 AI 治理。
  pricing: 企业报价；抓取页面里未公开价格。
  strength: 它掌握了混合人机运营的人力、规划和 ROI 语言。
  weaknessVsUs: 它从 HR/财务系统出发，而不是从受监管的 health-tech 实施与支持团队里的任务级交付遥测出发。
  sourceRefs:
  - 1
  - 54
  - 55
  - 58
  - 59
- name: Visier
  stage: 规模化公司
  wedge: 服务组织决策的人力智能、规划与治理。
  pricing: 企业报价；抓取页面里未公开价格。
  strength: 在人力规划、情景建模、安全和人员数据治理上的叙事很强。
  weaknessVsUs: 它在工作流埋点、AI shadow 测试和客户交付异常管理上的公开叙事更弱。
  sourceRefs:
  - 65
  - 67
  - 68
  - 70
- name: Automation Anywhere
  stage: 现有厂商
  wedge: 用流程发现和生成式 AI 找出自动化机会。
  pricing: 企业报价；抓取页面里未公开价格。
  strength: 它在发现隐藏工作和按 ROI 排自动化优先级上，前置发现能力很强。
  weaknessVsUs: 它更靠近流程发现和自动化执行，而不是医疗专用的重组治理与岗位重配规划。
  sourceRefs:
  - 71
  - 72
regulatoryTechnicalConstraints:
- point: 只要部署触到医疗客户数据或 PHI，就需要超出通用工作流分析的隐私、安全与治理控制。
  sourceRefs:
  - 15
  - 16
  - 23
- point: HTI-1 提高了 certified health IT 环境里预测算法的算法透明度预期。
  sourceRefs:
  - 21
- point: 互操作、TEFCA、USCDI 和信息共享规则，会直接影响哪些数据能拼起来、以及拼得有多快。
  sourceRefs:
  - 19
  - 20
  - 22
  - 26
- point: AI 转型决策需要的是可审计治理和人工监督，而不是一键式的自动重组。
  sourceRefs:
  - 15
  - 16
  - 55
  - 67
validationSignals:
- point: Innovaccer 是一家具名的 health-tech 厂商，正围绕 AI 原生模式重组，同时面向 provider 和 payer 市场营销，这让问题既真实又带有行业特异性。
  sourceRefs:
  - 2
  - 3
  - 29
  - 33
  - 34
- point: 自 7 月以来，印度创业公司已裁掉超过 4,500 个岗位，说明投资人正在奖赏更精瘦、AI 优先的运营模型。
  sourceRefs:
  - 4
- point: Rock Health 报告指出，AI 驱动创业公司拿下了 2025 年 H1 数字医疗融资的 62%，其中工作流和数据基础设施品类领跑。
  sourceRefs:
  - 7
- point: UiPath 的医疗自动化页面给出明显的买方兴趣和可量化的收入周期 ROI，说明相邻市场愿意采用工作流级自动化工具。
  sourceRefs:
  - 50
- point: 大型企业厂商已经在把混合人机治理和人力规划产品化，说明围绕这个问题的预算负责人正在形成。
  sourceRefs:
  - 1
  - 54
  - 58
  - 68
openQuestions:
- 第一笔预算到底在交付运营、财务转型，还是 HR/人力规划？
- 首批部署在不深度处理 PHI 的前提下，能不能把价值证明出来？
- 哪一类工作流最容易最快打出 ROI：实施、支持、数据上线，还是收入周期运营？
- 买方最终会把它当持续软件，还是偏咨询的转型项目？
