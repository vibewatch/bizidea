      - 30
      - 46
      - 65
    buyerPower:
      score: 4
      rationale: 买方池子集中、成熟，而且在评估 AI 转型预算时，本来就能把咨询、BI 和现有平台拼起来用。
      sourceRefs:
      - 3
      - 12
      - 58
      - 68
    threatOfEntrants:
      score: 3
      rationale: 新进入者很快就能拼出看板和连接器，但真正的护城河要靠信任、医疗数据处理能力和工作流基准深度，这些都需要时间。
      sourceRefs:
      - 15
      - 41
      - 67
    threatOfSubstitutes:
      score: 5
      rationale: 今天 Excel、内部 BI、咨询顾问、流程挖掘套件、自动化平台和人力规划软件都能覆盖这项工作的某一部分。
      sourceRefs:
      - 41
      - 46
      - 54
      - 58
      - 68
      - 71
    competitiveRivalry:
      score: 4
      rationale: 直接的品类竞争还在形成，但相邻现有厂商已经在争同一笔转型、自动化和劳动力治理预算。
      sourceRefs:
      - 43
      - 48
      - 54
      - 65
      - 72
  pestle:
  - factor: 政治
    impact: negative
    point: 医疗政策和互操作规则会加速对可审计系统的需求，但也会把企业销售和实施周期拉长。
    sourceRefs:
    - 19
    - 20
    - 21
    - 26
  - factor: 经济
    impact: positive
    point: 数字医疗资本正集中流向 AI 驱动的工作流和数据基础设施品类，持续强化管理层把 AI 变成运营结果的压力。
    sourceRefs:
    - 5
    - 7
  - factor: 社会
    impact: negative
    point: 与 AI 相关的裁员会抬高内部阻力和声誉风险，所以买方需要的是“更安全的重设计与岗位重配”叙事，而不是单纯降本。
    sourceRefs:
    - 3
    - 4
  - factor: 技术
    impact: positive
    point: 医疗数据平台、流程上下文模型和 agentic 编排，让 shadow mode 自动化测量比几年前更可行。
    sourceRefs:
    - 30
    - 41
    - 46
    - 48
    - 65
  - factor: 法律
    impact: negative
    point: AI RMF 实践、隐私控制和算法透明度预期，把文档化、可审计性和人工监督的门槛一起抬高了。
    sourceRefs:
    - 15
    - 16
    - 21
    - 23
    - 55
    - 67
  adoptionFrictionMatrix:
  - friction: 客户交付系统里的工作流遥测过于碎片化
    severity: 高
    affectedBuyer: COO / 交付运营负责人
    mitigation: 先从一条窄工作流和一组有限连接器切入，在更深系统集成之前先证明价值。
    sourceRefs:
    - 20
    - 22
    - 26
    - 30
    - 65
  - friction: 软件一旦和裁员绑定，就会遭遇组织政治阻力
    severity: 高
    affectedBuyer: CEO / COO / HRBP
    mitigation: 先讲岗位重配、异常监控和 SLA 保护，而不是裁员。
    sourceRefs:
    - 3
    - 4
    - 12
    - 57
    - 68
  - friction: 和现有自动化、人力规划套件高度重叠
    severity: 中
    affectedBuyer: CFO / IT / 转型负责人
    mitigation: 把产品定位成一层贴在现有流程挖掘、自动化和人力系统之上的医疗专用治理层。
    sourceRefs:
    - 41
    - 46
    - 54
    - 58
    - 71
  - friction: 合规与审计就绪负担重
    severity: 高
    affectedBuyer: 安全 / 合规 / 法务
    mitigation: 从第一次部署起就采用类似 AI RMF 的控制、明确的人审检查点和细粒度治理。
    sourceRefs:
    - 15
    - 16
    - 21
    - 23
    - 55
    - 67
