  y3RevenueImpactK: -80.0
  cashImpactK: -250.0
modelDiagram:
  title: 单位经济模型流转图
  mermaid: "flowchart LR\n  Leads[Qualified health-tech accounts] --> PaidPilots[Paid pilots]\n  PaidPilots --> ProductionCustomers[Annual production customers]\n  Telemetry[Workflow telemetry and QA data] --> Proof[Shadow-mode proof]\n  Proof --> ProductionCustomers\n  ProductionCustomers --> Revenue[Subscription and onboarding revenue]\n  Revenue --> GrossProfit[Gross profit]\n  GrossProfit --> Cash[Ending cash]\n"
modelSanity:
- checkName: 收入引擎
  finding: 基准情景下，收入来自 Y1 的 3 个付费客户增长到 Q4Y3 的 15 个，同时 Y3 定价仍停在调研 ACV 区间 $250K-$350K 的下沿。
- checkName: 必须跑通的地方
  finding: 试点客户必须足够快地转成年费量产订阅，让公司在明显提前扩招之前，于 Q4Y2 做到 7 个客户。
- checkName: 模型何时失效
  finding: 最大的现金风险来自更慢的销售周期，或更广的 PHI 驱动合规范围；敏感性分析显示，这两者都可能吞掉超过 $300K 现金，并明显推迟收入。
- checkName: 下一轮融资证明
  finding: 只有当至少 7 个量产客户里，有一类工作流能稳定证明节省工时且不伤 SLA，并且至少跑通 2 条伙伴带来的动作时，下一轮融资才站得住。
sanityChecks:
  ruleOf40: Y3 增长 175.0% + EBITDA 利润率 2.1% = 177.1%
  burnMultiple: Y2 的 burn multiple 为 0.68x（EBITDA 亏损 607.35K，对应净新增收入 887.5K）；Y3 转为 EBITDA 为正后，burn multiple 不再是首要效率指标。
  revenuePerFte: 按 Q4Y3 的 13 FTE 计算，Y3 每 FTE 收入为 $211.5K（SaaS 基准为 $200-400K）。
  flags:
  - 预算归属仍是假设，因此模型成立要依赖 COO/CFO 主导的项目愿意为一层新控制层买单，而不是去扩展 Celonis、UiPath、Workday 或 Visier。
  - 只有当连接器、工作流梳理和治理评审都模板化后，毛利率才能达到 70%+；如果部署 PHI 很重，COGS 和 G&A 大概率会高于计划。
  - 主 P&L 把客户新增视为已扣除首个合同周期里早期流失后的净值，因此如果续费更弱，Q4Y3 的 15 客户终点就会被打掉。
  - 到 Q4Y3 为止，每 FTE 收入只到 SaaS 基准的下沿，这意味着只要在转化证据跑通前提前扩招，下一轮融资故事就会迅速变弱。
