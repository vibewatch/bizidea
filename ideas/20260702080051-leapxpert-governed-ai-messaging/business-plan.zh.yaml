risks:
- risk: 目标机构把顾问 AI 长时间关在“只摘要”模式里
  likelihood: High
  impact: High
  mitigation: 先把影子模式和人工签核的商业化做起来，把自动发送当后续扩张，不把它当首发前提
- risk: 现有采集或消息治理厂商打包相似审批功能
  likelihood: High
  impact: High
  mitigation: 保持跨栈中立，靠可复用策略包和证据深度取胜，并在现有厂商补齐前先拿下伙伴渠道
- risk: 按产品、客户分层和司法辖区做策略映射，让早期部署过于重服务
  likelihood: Medium
  impact: High
  mitigation: 上线初期只做 4 条非交易型工作流，在模板复用前拒绝定制化顾问场景
- risk: 只做 WhatsApp，会错过太多坚持要 Apple 特定工作流的客户
  likelihood: Medium
  impact: Medium
  mitigation: 每月跟踪管道里的渠道要求，只有当流失超过设定阈值时才启动 Apple 开发
- risk: 采购放慢，因为归档或安全团队抗拒再加一层控制
  likelihood: Medium
  impact: Medium
  mitigation: 主打共存架构、预置证据导出，以及能证明无需推倒重来的伙伴案例
