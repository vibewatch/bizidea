scenarios:
  downside:
    description: 试点启动大致晚了一个季度，生产合同落在 BP 区间下沿，部署也比计划更定制。
    y3RevenueK: 2152.1
    y3EbitdaK: -450.5
    cashLowPointK: -85.4
    keyAssumptionChanges:
    - Y3 Q4 的 customersEop 只有约 13 个，不是 16 个，因为首批伙伴辅助成交来得更晚。
    - 初始生产 ARR 落在约 $180K，扩展后 ARR 约 $204K，而不是约 $200K 和 $220K。
    - 毛利率出场位只有约 68%，因为策略包复用和部署提效比计划慢。
  base:
    description: 直卖共创客户带来首批标杆账户，之后再靠可供伙伴复用的集成包带来稳定但不爆炸的新 logo 流。
    y3RevenueK: 2861.3
    y3EbitdaK: 111.8
    cashLowPointK: 507.2
    keyAssumptionChanges:
    - M12 有 3 个付费 logo，Y2 Q4 有 7 个，Y3 Q4 有 16 个。
    - 生产 ARR 从约 $200K 起步，成熟 logo 随着第二条工作流或证据模块挂载扩到约 $220K。
    - Y3 毛利率站上 70%，因为可复用策略包和参考集成降低了人工部署工作。
  upside:
    description: 伙伴渠道在 Y2 后段开始转化，第二条工作流挂载也更早发生，因此营收跑得更快，但 团队人数不用同比例上冲。
    y3RevenueK: 3377.5
    y3EbitdaK: 535.8
    cashLowPointK: 798.4
    keyAssumptionChanges:
    - Y3 Q4 的 customersEop 约 18 个，因为伙伴来源试点比基准早一个季度转化。
    - 扩展后 ARR 提前抬到约 $228K，因为证据留存和第二条工作流更早挂上。
    - 毛利率出场位约 74%，因为部署复用跑赢基准计划。
sensitivity:
- variable: ARPU
  downsideCase: 初始生产 ARR 稳在约 $180K，扩展后 ARR 约 $200K。
  baseCase: 初始生产 ARR 约 $200K，扩展后 ARR 约 $220K。
  upsideCase: 初始生产 ARR 抬到约 $220K，扩展后 ARR 约 $240K。
  y3RevenueImpactK: -286.0
  cashImpactK: -205.0
- variable: CAC
  downsideCase: CAC 往 $120K 走，因为合规尽调和解决方案式销售始终高触达。
  baseCase: CAC 稳在约 $95K，创始人主导销售和付费试点抵消了一部分获客成本。
  upsideCase: 一旦标杆客户和伙伴转介绍开始起量，CAC 会往 $80K 走。
  y3RevenueImpactK: -90.0
  cashImpactK: -180.0
- variable: 流失率
  downsideCase: 如果试点扩不成第二条工作流，月度流失率会漂到 2.5%。
  baseCase: 只要受治理工作流一旦上线就足够粘，月度流失率可以守在 1.5%。
  upsideCase: 当证据工作流嵌进审计运营后，月度流失率可改善到 1.0%。
  y3RevenueImpactK: -180.0
  cashImpactK: -140.0
- variable: 销售周期
  downsideCase: 从深度需求沟通到付费试点，会从约 6 个月拉长到约 9 个月。
  baseCase: 从深度需求沟通到付费试点维持在约 6 个月，成功试点约 3 个月转生产。
  upsideCase: 参考架构和伙伴引荐会把周期压到约 4–5 个月。
  y3RevenueImpactK: -420.0
  cashImpactK: -290.0
- variable: 毛利率
  downsideCase: 出场毛利率卡在约 68%，因为策略调优和部署始终偏定制。
  baseCase: Y3 毛利率约 71%-72%，前提是策略包和参考集成能复用。
  upsideCase: 如果部署复用跑赢计划，出场毛利率可到约 74%。
  y3RevenueImpactK: 0.0
  cashImpactK: -190.0
- variable: 招聘节奏
  downsideCase: 在伙伴带单还没被证明前，就把第 4 位工程师或内部运营岗提前招进来。
  baseCase: 招聘始终按里程碑闸门走，Y3 结束时团队为 9 名 FTE。
  upsideCase: 第二位销售等到伙伴证明出现后再进场，也不会拖慢签单。
  y3RevenueImpactK: -60.0
  cashImpactK: -170.0
modelDiagram:
  title: 单位经济模型流转
  mermaid: |
    flowchart LR
      Targets[Target wealth logos] --> Pilots[Paid pilots]
      Pilots --> Production[Production human-signoff workflows]
      Production --> Expansion[More advisors plus second workflows]
      Expansion --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
- checkName: 营收引擎
  finding: 基准情景的收入，来自 Y3 Q4 时 16 个付费 logo：早期试点逐步转成约 $200K 年度生产合同，其中一部分再通过第二条工作流和证据模块扩到约 $220K。
- checkName: 必须跑对的地方
  finding: 可复用策略包和共存式集成，必须把部署时间压到 BP 目标的 30 天以内；否则在第二位销售真正能扛单前，试点就转不动。
- checkName: 模型会崩的条件
  finding: 如果试点启动晚约一个季度、毛利率又卡在约 68%，下行情景会在 Y3 结束前把现金打到 0 以下约 $0.1M。
- checkName: 下一轮证明
  finding: Seed 轮故事就是：到 Y2 后段做到 5+ 个付费财富管理 logo、3 套生产策略包、1 个双工作流扩张，以及 1 个伙伴来源的付费试点。
sanityChecks:
  ruleOf40: Y3 增长 124.0% + EBITDA 利润率 3.9% = 127.9%
  burnMultiple: Y2 的烧钱倍数约 0.8x：约 $0.68M 的 EBITDA 亏损，对应约 $0.90M 净新增收入；Y3 已转正 EBITDA。
  revenuePerFte: $318K Y3，对应年末 9 名 FTE（SaaS 基准 $200-400K）
  flags:
  - 即便在基准情景里，公司也得在一个集中、重合规的买家池里，拿下研究所列 25 家可触达第 3 年 logo 中的 16 家。
  - customersEop 把付费试点和生产部署都算进去，所以 Y1 大部分时间和 Y2 前段，真正只看经常性订阅的生产 logo 会落后于表面总数。
  - 只有当可复用策略包把部署时间压到 BP 目标的 30 天以内，毛利率才过得了 70%；如果定制工作拖长，下行情景就会逼近现金缺口。
  - 计划里到 Y3 都把财务和 供应商风险 运营外包；如果更早自建这块团队，会吃掉本就不多的 Y3 EBITDA 盈余。
  - 模型里直接把现金等同于 EBITDA，因此企业回款时点、实施预付款或与合规相关的 CapEx，都可能让真实资金跑道偏离。
