slug: advisor-chat-action-rail
date: '2026-07-02'
currency: USD
modelStartMonth: 2026-08
assumptions:
- id: A1
  name: 模型起始月份
  value: 2026-08
  unit: YYYY-MM
  source: '[BP date 2026-07-02] 模型从这份商业计划定稿后的首个完整运营月开始。'
- id: A2
  name: 期初现金 / 种子前轮融资
  value: $2.0M
  unit: USD
  source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] 基准情景取 BP 区间下沿，资金规模以跑到首个可冲种子轮的里程碑并预留约 6 个月缓冲为准。'
- id: A3
  name: 起始付费 logo 数
  value: '0'
  unit: count
  source: '[BP executiveSummary + BP milestones 0-12 months] 公司起步时还没有营收，得先把共创客户兴趣转成付费试点。'
- id: A4
  name: 付费试点单价
  value: 约 3 个月共 $105K（约 $35K/mo）
  unit: USD/logo
  source: '[BP investorMemo.firstCustomer.initialContract $75k-125k pilot] 模型取偏上中位数的六位数试点价格，因为部署里包含工作流搭建和证据设计。'
- id: A5
  name: 初始生产 ARR
  value: $200K ARR (~$16.7K/mo)
  unit: USD/logo/year
  source: '[BP investorMemo.firstCustomer.initialContract $150k-250k annual spend] 基准情景在人工签核上线后取年合同中位数。'
- id: A6
  name: 扩展后生产 ARR
  value: $220K ARR (~$18.3K/mo)
  unit: USD/logo/year
  source: '[BP businessModel.expansionLevers + Research market.som ~$180k blended ACV] 第二条工作流和证据模块挂载，会把成熟客户抬到初始合同之上，同时仍让第 3 年混合 ACV 贴近研究里的市场假设。'
- id: A7
  name: 付费 logo 定义
  value: 付费 logo 指已进入付费试点，或已经上线生产订阅的客户。
  unit: definition
  source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop 统计的是已经为单条工作流或更大生产范围付费的客户 logo。'
- id: A8
  name: 客户爬坡节奏
  value: M6、M8、M11、M14、M17、M20、M23、M25、M27、M28、M30、M31、M33、M34、M35、M36
  unit: month index
  source: '[BP milestones 0-12, 12-24, 24-36 + BP gtm.funnelTargets + Research market.som] 基准情景在 M12 做到 3 个付费 logo、Y2 Q4 做到 7 个、Y3 Q4 做到 16 个；这在 BP 里程碑区间内，也低于研究里 25 个 logo 的上行 SOM。'
- id: A9
  name: 收入确认约定
  value: 收入 = 活跃试点 × $35K/mo + 生产 logo × $16.7K-18.3K/mo；客户付费满约 12 个月后，成熟账户切到更高档。
  unit: formula
  source: '[BP investorMemo.firstCustomer.initialContract + BP businessModel.revenueStreams + BP businessModel.expansionLevers] 这样月度和季度收入都能直接追溯到付费 logo 数和扩张时间点。'
- id: A10
  name: 不同部署阶段的毛利率
  value: 试点 COGS 45%，早期生产 COGS 30%，成熟生产 COGS 15%
  unit: percent of revenue
  source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions deployment under 30 days + startup-finance heuristic] 试点期实施人力更重，但只要策略包和参考集成能复用，成熟部署就能跑过目标毛利率。'
- id: A11
  name: 招聘时间表
  value: M1 创始人和创始工程师；M2 合规产品；M6 解决方案；M9 销售；M11 第二位工程师；M18 第二位解决方案；M21 第三位工程师；M29 第二位销售；财务和法务到 Y3 都继续外包。
  unit: timeline
  source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] 招聘顺序始终围着部署先行来排，只有生产可复用性跑出来后，才加第二线 GTM。'
- id: A12
  name: 创始人全成本薪酬
  value: $170K
  unit: USD/year
  source: '[BP team Founder/CEO + startup-finance heuristic] 偏克制的创始人现金薪酬，已含工资税和福利。'
- id: A13
  name: 工程全成本薪酬
  value: $185K
  unit: USD/year
  source: '[BP team Founding eng + startup-finance heuristic] 需要的是能做集成和策略运行时的专项工程人才，但 种子前轮计划的现金水平仍低于后期企业软件公司。'
- id: A14
  name: 合规产品全成本薪酬
  value: $165K
  unit: USD/year
  source: '[BP team Compliance product lead + startup-finance heuristic] 反映高级工作流策略负责人薪酬，但不假设公司一开始就自建完整合规部门。'
- id: A15
  name: 解决方案全成本薪酬
  value: $155K
  unit: USD/year
  source: '[BP team Solutions engineer + startup-finance heuristic] 覆盖技术实施、客户证明和生产上线支持。'
- id: A16
  name: 企业销售全成本薪酬
  value: $180K
  unit: USD/year
  source: '[BP team Enterprise seller + startup-finance heuristic] 包含一套重合规企业销售动作所需的带业绩指标的现金薪酬和福利。'
- id: A17
  name: 薪酬在 P&L 中的分摊
  value: 创始人：50% S&M / 20% R&D / 30% G&A；工程：100% R&D；合规产品：75% R&D / 25% G&A；解决方案：55% S&M / 45% R&D；销售：100% S&M。
  unit: allocation
  source: '[BP team role rationales + BP operations] 这样既反映创始人主导销售，也反映早期上线高度依赖解决方案团队。'
- id: A18
  name: 非薪资 Opex 爬坡
  value: 早期 Y1 的 S&M / R&D / G&A 非薪资月支出分别从 $5K / $7K / $6K 起步，到 Y3 Q4 升到 $15K / $13K / $10K。
  unit: USD/month
  source: '[BP operations + startup-finance heuristic] 覆盖云工具、差旅、保险、法务和外包财务，不假设会早早砸大规模付费获客。'
- id: A19
  name: 现金转换约定
  value: 现金变动 = EBITDA。
  unit: formula
  source: '[startup-finance heuristic] 在 种子前轮规模下，CapEx、税项、融资费用和营运资金时点被视作影响不大。'
- id: A20
  name: 月度客户流失率
  value: 1.5%
  unit: percent per month
  source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets + BP strategyMap.moatsToBuild] 一旦嵌进消息治理工作流，粘性应该不差，但早期 logo 风险仍需保守计。'
- id: A21
  name: 基准销售周期
  value: 从深度需求沟通到付费试点约 6 个月；成功账户从试点启动到转生产再约 3 个月。
  unit: timeline
  source: '[BP market.buyingProcess + BP experimentRoadmap + BP gtm.funnelTargets] 公司仍要穿过合规、归档和运营多方审批，才能拿到生产放行。'
- id: A22
  name: CAC 口径
  value: 36 个月总销售与市场支出 ÷ 16 个净新增付费 logo。
  unit: formula
  source: '[model calc using base-case S&M spend + BP gtm.channels] 这把创始人时间、销售成本、差旅和解决方案驱动获客都算进了完整构建期。'
- id: A23
  name: 下一轮融资规模里程碑
  value: 到 Y2 后段，公司应做到 5+ 个付费财富管理 logo、3 套生产可复用策略包、1 个双工作流扩张案例，以及 1 个伙伴来源的付费试点。
  unit: milestone
  source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap 12-18 months] 这笔种子前轮融资的目标，就是在种子轮前把切口验证所需的证明点都跑出来。'
- id: A24
  name: 季度薪资记法
  value: Y2-Y3 的薪资行按季度内实际入职月份累加，不只按季末 人员快照算。
  unit: convention
  source: '[Headcount column convention + BP team + startup-finance heuristic] 这样即便 Y2、Y3 只展示年末快照，季度薪资也能和真实招聘节奏对齐。'
