scenarios:
  downside:
    description: Pilot starts slip by roughly one quarter, production contracts land near the low end of the BP range, and deployment remains more bespoke than planned.
    y3RevenueK: 2152.1
    y3EbitdaK: -450.5
    cashLowPointK: -85.4
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 13 instead of 16 because the first partner-assisted wins arrive later.
      - Initial production ARR lands near $180K and expanded ARR near $204K instead of about $200K and $220K.
      - Gross margin exits around 68% because policy-pack reuse and deployment time improve more slowly than planned.
  base:
    description: Direct design-partner selling creates the first reference accounts, then partner-ready integration packages add steady but not explosive new logo flow.
    y3RevenueK: 2861.3
    y3EbitdaK: 111.8
    cashLowPointK: 507.2
    keyAssumptionChanges:
      - 3 paying logos by M12, 7 by Q4Y2, and 16 by Q4Y3.
      - Production ARR starts around $200K and mature logos expand toward about $220K with second workflow or evidence-module attach.
      - Gross margin crosses 70% in Y3 as reusable policy packs and reference integrations reduce manual deployment work.
  upside:
    description: A partner channel begins converting in late Y2 and second-workflow attach lands earlier, allowing faster revenue growth without a matching headcount spike.
    y3RevenueK: 3377.5
    y3EbitdaK: 535.8
    cashLowPointK: 798.4
    keyAssumptionChanges:
      - Q4Y3 customersEop reaches about 18 because partner-sourced pilots start converting one quarter earlier than base.
      - Expanded ARR reaches roughly $228K as evidence retention and second-workflow attach arrive sooner.
      - Gross margin exits around 74% because deployment reuse beats the base plan.
sensitivity:
  - variable: ARPU
    downsideCase: Initial production ARR settles near $180K and expanded ARR near $200K.
    baseCase: Initial production ARR is about $200K and expanded ARR about $220K.
    upsideCase: Initial production ARR reaches about $220K and expanded ARR about $240K.
    y3RevenueImpactK: -286.0
    cashImpactK: -205.0
  - variable: CAC
    downsideCase: CAC rises toward $120K because compliance diligence and solution-led sales stay high-touch.
    baseCase: CAC stays near $95K with founder-led selling and paid pilots offsetting acquisition cost.
    upsideCase: CAC falls toward $80K once reference logos and partner referrals contribute meaningfully.
    y3RevenueImpactK: -90.0
    cashImpactK: -180.0
  - variable: churn
    downsideCase: Monthly churn drifts to 2.5% if pilots do not expand into second workflows.
    baseCase: Monthly churn holds at 1.5% because governed workflows are sticky once live.
    upsideCase: Monthly churn improves to 1.0% after evidence workflows become embedded in audit operations.
    y3RevenueImpactK: -180.0
    cashImpactK: -140.0
  - variable: sales cycle
    downsideCase: Discovery-to-paid-pilot stretches from about 6 months to about 9 months.
    baseCase: Discovery-to-paid-pilot stays near 6 months and successful pilots convert in about 3 months.
    upsideCase: Reference architecture and partner introductions compress the cycle toward about 4-5 months.
    y3RevenueImpactK: -420.0
    cashImpactK: -290.0
  - variable: gross margin
    downsideCase: Exit gross margin stalls near 68% because policy tuning and deployment remain bespoke.
    baseCase: Y3 gross margin is about 71%-72% with reusable policy packs and reference integrations.
    upsideCase: Exit gross margin reaches about 74% as onboarding reuse beats plan.
    y3RevenueImpactK: 0.0
    cashImpactK: -190.0
  - variable: hiring pace
    downsideCase: A fourth engineer or in-house ops hire is pulled forward before partner-led demand is proven.
    baseCase: Hiring stays milestone-gated and ends Y3 at 9 FTE.
    upsideCase: The second sales hire waits for partner proof without slowing bookings.
    y3RevenueImpactK: -60.0
    cashImpactK: -170.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Targets[Target wealth logos] --> Pilots[Paid pilots]
      Pilots --> Production[Production human-signoff workflows]
      Production --> Expansion[More advisors plus second workflows]
      Expansion --> Revenue[Subscription revenue]
      Revenue --> GrossProfit[Gross profit]
      GrossProfit --> Cash[Cash runway]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue comes from 16 paying logos by Q4Y3, with early pilots converting into roughly $200K annual production contracts and a subset expanding toward $220K through second workflows and evidence modules.
  - checkName: Must go right
    finding: Reusable policy packs and coexistence integrations must keep deployments near the BP target of under 30 days so pilots convert before the second sales hire is fully relied upon.
  - checkName: Model breaks if
    finding: If pilot starts slip by about one quarter and gross margin stalls near 68%, the downside case pushes cash about $0.1M below zero before Y3 ends.
  - checkName: Next-round proof
    finding: The seed story is 5+ paid wealth logos, 3 policy packs in production, one two-workflow expansion, and one partner-sourced paid pilot by late Y2.
sanityChecks:
  ruleOf40: Y3 growth 124.0% + EBITDA margin 3.9% = 127.9%
  burnMultiple: Y2 burn multiple is about 0.8x using roughly $0.68M of EBITDA burn against about $0.90M of net new revenue; Y3 is EBITDA-positive.
  revenuePerFte: $318K Y3 using 9 year-end FTE (benchmark $200-400K SaaS)
  flags:
    - The base case still requires winning 16 of the 25 researched year-3 reachable logos in a concentrated, compliance-heavy buyer pool.
    - customersEop includes paid pilots as well as production deployments, so recurring-only production logos lag the headline count through most of Y1 and early Y2.
    - Gross margin clears 70% only if reusable policy packs keep deployment close to the BP under-30-day goal; prolonged bespoke work drives the downside case toward a cash shortfall.
    - The plan keeps finance and vendor-risk operations outsourced through Y3; an earlier in-house ops build would reduce the modest Y3 EBITDA surplus.
    - Cash is modeled as EBITDA, so enterprise collection timing, implementation prepayments, or compliance-related capex could move actual runway.
