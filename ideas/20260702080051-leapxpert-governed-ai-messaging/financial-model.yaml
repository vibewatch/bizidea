slug: advisor-chat-action-rail
date: "2026-07-02"
currency: USD
modelStartMonth: "2026-08"
assumptions:
  - id: A1
    name: Model start month
    value: "2026-08"
    unit: YYYY-MM
    source: '[BP date 2026-07-02] the model starts with the first full operating month after the dated business plan.'
  - id: A2
    name: Opening cash / pre-seed raise
    value: "$2.0M"
    unit: USD
    source: '[BP fundingAsk targetFundingRangeUsd $2-4M + BP fundingAsk runwayMonths 18 + model cash curve] the base case uses the low end of the BP range, sized to reach the first seed-ready milestone with roughly six months of buffer.'
  - id: A3
    name: Starting paying logos
    value: "0"
    unit: count
    source: '[BP executiveSummary + BP milestones 0-12 months] the company begins pre-revenue and must first convert design-partner interest into paid pilots.'
  - id: A4
    name: Paid pilot price
    value: "$105K over about 3 months (~$35K/mo)"
    unit: USD/logo
    source: '[BP investorMemo.firstCustomer.initialContract $75k-125k pilot] the model uses the upper-midpoint six-figure pilot value because deployments include workflow setup and evidence design.'
  - id: A5
    name: Initial production ARR
    value: "$200K ARR (~$16.7K/mo)"
    unit: USD/logo/year
    source: '[BP investorMemo.firstCustomer.initialContract $150k-250k annual spend] the base case uses the midpoint annual contract once human-signoff is live.'
  - id: A6
    name: Expanded production ARR
    value: "$220K ARR (~$18.3K/mo)"
    unit: USD/logo/year
    source: '[BP businessModel.expansionLevers + Research market.som ~$180k blended ACV] second workflow and evidence-module attach lift mature logos above the initial contract while keeping the year-3 blended book close to the researched market assumption.'
  - id: A7
    name: Paying logo definition
    value: A paying logo is either a paid pilot or a production deployment under active subscription.
    unit: definition
    source: '[BP gtm.pricing + BP businessModel.unitOfValue] customersEop counts logos that are already paying for one workflow or broader production scope.'
  - id: A8
    name: Customer ramp
    value: M6, M8, M11, M14, M17, M20, M23, M25, M27, M28, M30, M31, M33, M34, M35, M36
    unit: month index
    source: '[BP milestones 0-12, 12-24, 24-36 + BP gtm.funnelTargets + Research market.som] the base case reaches 3 paying logos by M12, 7 by Q4Y2, and 16 by Q4Y3, which is within the BP milestone range but below the researched 25-logo upside SOM.'
  - id: A9
    name: Revenue recognition convention
    value: Revenue equals active pilots x $35K/mo plus production logos x $16.7K-18.3K/mo, with mature accounts moving to the higher tier after roughly 12 months of paying history.
    unit: formula
    source: '[BP investorMemo.firstCustomer.initialContract + BP businessModel.revenueStreams + BP businessModel.expansionLevers] this makes monthly and quarterly revenue directly traceable to paying logos and expansion timing.'
  - id: A10
    name: Gross margin by deployment stage
    value: "Pilot COGS 45%, early production COGS 30%, mature production COGS 15%"
    unit: percent of revenue
    source: '[BP businessModel.targetGrossMarginPct 70 + BP operatingAssumptions deployment under 30 days + startup-finance heuristic] pilots carry more implementation labor, but reusable policy packs and reference integrations let mature deployments clear the target margin.'
  - id: A11
    name: Hiring timeline
    value: M1 founder and founding engineer; M2 compliance product; M6 solutions; M9 seller; M11 second engineer; M18 second solutions hire; M21 third engineer; M29 second seller; finance and legal stay outsourced through Y3.
    unit: timeline
    source: '[BP team + BP strategicChoices.sequencingRationale + startup-finance heuristic] hiring stays deployment-first and adds second-line GTM only after repeatable production proof exists.'
  - id: A12
    name: Founder loaded compensation
    value: "$170K"
    unit: USD/year
    source: '[BP team Founder/CEO + startup-finance heuristic] lean founder cash pay plus payroll taxes and benefits.'
  - id: A13
    name: Engineering loaded compensation
    value: "$185K"
    unit: USD/year
    source: '[BP team Founding eng + startup-finance heuristic] specialized integration and policy-runtime engineering talent is required, but the pre-seed plan stays below later-stage enterprise-software cash levels.'
  - id: A14
    name: Compliance product loaded compensation
    value: "$165K"
    unit: USD/year
    source: '[BP team Compliance product lead + startup-finance heuristic] reflects senior workflow-policy ownership without assuming a full compliance department.'
  - id: A15
    name: Solutions loaded compensation
    value: "$155K"
    unit: USD/year
    source: '[BP team Solutions engineer + startup-finance heuristic] covers technical implementation, customer proof, and production rollout support.'
  - id: A16
    name: Enterprise seller loaded compensation
    value: "$180K"
    unit: USD/year
    source: '[BP team Enterprise seller + startup-finance heuristic] includes quota-carrying cash compensation and benefits for a compliance-heavy enterprise motion.'
  - id: A17
    name: Payroll allocation to P&L lines
    value: Founder 50% S&M / 20% R&D / 30% G&A; engineering 100% R&D; compliance product 75% R&D / 25% G&A; solutions 55% S&M / 45% R&D; sales 100% S&M.
    unit: allocation
    source: '[BP team role rationales + BP operations] maps headcount cost into the operating lines while reflecting founder-led selling and solutions-heavy onboarding.'
  - id: A18
    name: Non-payroll opex ramp
    value: Monthly non-payroll spend rises from S&M/R&D/G&A of $5K/$7K/$6K in early Y1 to $15K/$13K/$10K by Q4Y3.
    unit: USD/month
    source: '[BP operations + startup-finance heuristic] covers cloud tooling, travel, insurance, legal, and outsourced finance without assuming a large paid-demand engine.'
  - id: A19
    name: Cash conversion convention
    value: Cash movement equals EBITDA.
    unit: formula
    source: '[startup-finance heuristic] capex, taxes, financing fees, and working-capital timing are assumed immaterial at pre-seed scale.'
  - id: A20
    name: Monthly customer churn
    value: "1.5%"
    unit: percent per month
    source: '[startup-finance heuristic for early enterprise workflow SaaS + BP gtm.funnelTargets + BP strategyMap.moatsToBuild] governed messaging workflows should be sticky once embedded, but early logo risk still warrants conservative churn.'
  - id: A21
    name: Base sales cycle
    value: About 6 months from serious discovery to paid pilot, then about 3 months from pilot start to production conversion for successful accounts.
    unit: timeline
    source: '[BP market.buyingProcess + BP experimentRoadmap + BP gtm.funnelTargets] the company still sells through compliance, archive, and operations stakeholders before production approval.'
  - id: A22
    name: CAC convention
    value: Total 36-month sales and marketing spend divided by 16 net new paying logos.
    unit: formula
    source: '[model calc using base-case S&M spend + BP gtm.channels] this captures founder time, seller cost, travel, and solution-led acquisition over the full buildout.'
  - id: A23
    name: Next-round milestone for funding sizing
    value: By late Y2 the company should have 5+ paid wealth logos, 3 reusable policy packs in production, one two-workflow expansion, and one partner-sourced paid pilot.
    unit: milestone
    source: '[BP fundingAsk runwayMonths 18 + BP milestones 12-24 months + BP experimentRoadmap 12-18 months] the pre-seed is sized to clear the wedge-validation proof points before a seed round.'
  - id: A24
    name: Quarterly salary convention
    value: Y2-Y3 salary rows sum the actual monthly hires inside each quarter rather than relying only on quarter-end headcount snapshots.
    unit: convention
    source: '[Headcount column convention + BP team + startup-finance heuristic] this keeps quarterly salary expense consistent even though only year-end snapshots are shown for Y2 and Y3.'
