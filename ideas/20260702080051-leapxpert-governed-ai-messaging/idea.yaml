topRisks:
  - name: "Incumbent stack bundling"
    description: "Governed messaging and archive vendors could add basic AI draft approval and compress the independent wedge."
    mitigation: "Integrate rather than replace, and win on cross-platform policy logic, shadow mode, and workflow evidence that incumbent capture tools do not provide."
  - name: "Autonomy arrives slowly"
    description: "Many firms may keep AI limited to summarization longer than expected, which would delay demand for an action-approval layer."
    mitigation: "Start with draft approval and non-trade client-service workflows where response-time ROI is immediate, then expand as send autonomy increases."
  - name: "Policy complexity"
    description: "Mapping channel, product, client, and jurisdiction rules could make early deployments operationally heavy."
    mitigation: "Package narrow wealth-service policy packs for KYC follow-ups, scheduling, and document collection before broader advisory workflows."
