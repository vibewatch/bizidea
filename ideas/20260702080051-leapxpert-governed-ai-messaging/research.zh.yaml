competitors:
- name: LeapXpert
  stage: scale-up
  wedge: 覆盖消费级消息渠道的受治理通信智能平台，往上接归档、工作流和 AI 层。
  pricing: 定制 / 企业级
  strength: 在受监管移动渠道和相邻工作流场景里，当前最完整的消息治理套件。
  weaknessVsUs: 平台太宽，容易分散对“AI 草稿与工作流触发的纯发前审批轨”这一窄切口的专注。
  sourceRefs:
  - 2
  - 25
- name: Global Relay
  stage: incumbent
  wedge: 归档、合规业务沟通，以及带深度监控能力的 WhatsApp 直采。
  pricing: 定制 / 企业级
  strength: 账簿记录信用强，归档位置深，还能直接抓 WhatsApp 源消息。
  weaknessVsUs: 更偏归档和复核，对影子模式、策略调优，以及 AI 建议动作的联机审批都弱一些。
  sourceRefs:
  - 29
  - 35
  - 36
- name: Smarsh
  stage: incumbent
  wedge: 面向 WhatsApp 和其他业务渠道的归档与合规采集。
  pricing: 定制 / 企业级
  strength: 在通信合规里关系深、买家故事也成熟，记录留存能力强。
  weaknessVsUs: 更像留存与监督工具，而不是一层专门为外发 AI 动作做工作流级审批的产品。
  sourceRefs:
  - 28
- name: Symphony
  stage: scale-up
  wedge: 面向财富管理和私人银行团队的安全、合规客户连接，覆盖 WhatsApp、WeChat 和内部协作。
  pricing: 定制 / 企业级
  strength: 已验证的私人银行部署，以及很强的财富管理协作叙事。
  weaknessVsUs: 连接和协作范围更广，不是一个专门为逐条消息审批逻辑和可审计 AI 决策打造的产品。
  sourceRefs:
  - 30
  - 31
  - 32
- name: Movius
  stage: scale-up
  wedge: 以服务形式提供安全通信，解决个人设备上的合规 业务身份 和 WhatsApp 使用。
  pricing: 定制 / 企业级
  strength: BYOD 和业务身份分离，确实解决了受监管机构接入渠道的一大门槛。
  weaknessVsUs: 渠道接入和采集，并不能解决跨系统策略审批、影子测试或工作流级证据设计。
  sourceRefs:
  - 27
