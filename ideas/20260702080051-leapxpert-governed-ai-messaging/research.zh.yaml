  adoptionFrictionMatrix:
  - friction: 逐产品、逐司法辖区的策略映射很复杂
    severity: high
    affectedBuyer: 电子通信合规负责人
    mitigation: 先把窄工作流模板打出来，再根据影子模式证据找出真实例外，逐步扩策略覆盖。
    sourceRefs:
    - 4
    - 5
    - 6
    - 22
  - friction: 归档、CRM 和工作流集成会拖慢首个价值出现的时间
    severity: high
    affectedBuyer: 财富平台主管
    mitigation: 主打共存架构和预置连接器，让审批轨道压在现有采集和归档系统之上。
    sourceRefs:
    - 25
    - 26
    - 29
    - 35
  - friction: iMessage 渠道定义模糊，路线图容易跑偏
    severity: medium
    affectedBuyer: 数字客户平台主管
    mitigation: 首发只做 WhatsApp，把 Apple Messages for Business 当成单独、明确收口的集成路径。
    sourceRefs:
    - 18
    - 19
  - friction: 主管可能不信任 AI 建议的外发动作
    severity: high
    affectedBuyer: 监督复核负责人
    mitigation: 新工作流默认跑影子模式或人工签核；等拦截率、编辑率和升级质量都跑明白，再放开更快的审批路径。
    sourceRefs:
    - 1
    - 32
    - 37
