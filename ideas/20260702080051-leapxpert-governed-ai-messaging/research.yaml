  validationPlan:
  - priority: high
    question: 'Which first workflow gets compliance sign-off fastest: KYC follow-up, document collection, scheduling, or service escalations?'
    evidenceToGather: Design-partner interviews plus shadow-mode pilot data showing block rates, human edits, and average review time by workflow.
  - priority: high
    question: How many targeted wealth firms plan to permit AI-drafted outbound client messages in the next 12 to 24 months?
    evidenceToGather: Pipeline interviews with wealth COOs, e-communications compliance leads, and implementation partners already rolling out advisor copilots.
  - priority: medium
    question: Will archive and governed-messaging incumbents resell an approval rail or see it as competitive?
    evidenceToGather: Partner-development conversations with archive vendors, wealth-tech integrators, and mobile-governance platforms.
