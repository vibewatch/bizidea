  sensitivityCases:
  - case: Incumbents bundle approval features faster than expected
    impact: If archive and governed-messaging incumbents add credible draft-approval and shadow-mode features, the startup must win on cross-vendor neutrality, workflow depth, and faster policy packaging.
    sourceRefs:
