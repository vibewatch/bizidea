jobsToBeDone:
- job: 当我们想让 AI 在 WhatsApp 或 iMessage 上起草或推进客户服务聊天时，帮合规团队把哪些内容能发、哪些动作能触发批清楚，这样顾问就能更快回复，又不背监督风险。
  currentAlternative: 人工监督、已批准模板，以及只负责留存的归档采集平台。
  successMetric: 把一条 AI 辅助客户服务工作流的上线时间，从按季度算压到 30 天以内。
- job: 当监管方、主管或内部审计追问一条 AI 辅助移动对话是怎么处理的，帮我们把每次建议、编辑、拦截和交接都拉出来，这样既能证明控制到位，也不用一刀切把渠道封死。
  currentAlternative: 导出归档、跑关键词监控队列，再去 CRM 备注里拼零碎证据。
  successMetric: 把一条 AI 辅助聊天案例的监督复核准备时间，从按天算压到 1 小时以内。
