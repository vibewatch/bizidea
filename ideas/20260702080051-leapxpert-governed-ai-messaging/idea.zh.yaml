topRisks:
- name: 现有栈打包
  description: 消息治理和归档厂商可能补上基础的 AI 草稿审批，把独立切口压窄。
  mitigation: 先接进去，不去替换；靠跨平台策略逻辑、影子模式和工作流证据取胜，这些都是现有采集工具补不齐的。
- name: 自治落地更慢
  description: 很多机构可能会更久地把 AI 限在摘要模式，这会推迟对动作审批层的需求。
  mitigation: 先做草稿审批和非交易型客户服务工作流——这些场景的响应时效 ROI 立刻看得到；等发送自治放开，再往外扩。
- name: 策略复杂度
  description: 渠道、产品、客户和司法辖区规则一叠起来，早期部署可能会很重。
  mitigation: 先把 KYC 跟进、预约安排和材料收集打成窄策略包，再往更广的顾问工作流扩。
