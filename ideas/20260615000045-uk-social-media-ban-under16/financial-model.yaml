scenarios:
  downside:
    description: "Budget owners buy a narrower UK-only control layer, partner channels ramp slowly, and the company exits Y3 with 15 production customers at a $175K blended customer-year value."
    y3RevenueK: 1968.9
    y3EbitdaK: -554.5
    cashLowPointK: 78.6
    keyAssumptionChanges:
      - "Quarter-end customers move from 4, 5, 7, 8 / 10, 12, 15, 18 to 4, 5, 6, 7 / 9, 11, 13, 15."
      - "Blended customer-year revenue drops from $190K to $175K as budgets settle near the lower half of the BP pricing range."
      - "Gross margin slips from 70% to 68% because manual appeals and proof-vendor pass-through stay higher for longer."
  base:
    description: "Founder-led selling plus proof-vendor and counsel referrals carry the company to 18 production customers by Y3 exit at a $190K blended customer-year value."
    y3RevenueK: 2375.2
    y3EbitdaK: -230.7
    cashLowPointK: 593.8
    keyAssumptionChanges:
      - "Quarter-end customer counts follow A10 and A11."
      - "Gross margin stays at the BP target of 70%."
      - "Hiring follows A19 without adding a larger field-sales team before repeatability is proven."
  upside:
    description: "Partner-sourced deals and multi-surface expansions click early, and the company exits Y3 with 22 production customers at a $205K blended customer-year value."
    y3RevenueK: 3280.0
    y3EbitdaK: 468.3
    cashLowPointK: 1133.6
    keyAssumptionChanges:
      - "Quarter-end customers rise to 5, 7, 9, 10 / 13, 16, 19, 22."
      - "Blended customer-year revenue increases from $190K to $205K as appeals and multi-jurisdiction modules attach earlier."
      - "Gross margin improves from 70% to 72% once integrations and review playbooks standardize."
sensitivity:
  - variable: "ARPU"
    downsideCase: "Blended customer-year value settles at $170K because customers buy a narrower UK-only control layer."
    baseCase: "Blended customer-year value holds at $190K as modeled."
    upsideCase: "Blended customer-year value reaches $205K once appeals and multi-jurisdiction modules attach earlier."
    y3RevenueImpactK: -250.1
    cashImpactK: -277.8
  - variable: "CAC"
    downsideCase: "CAC rises toward $75K because partner-sourced pipeline does not offset a founder-led outbound motion."
    baseCase: "CAC stays near $60K with proof-vendor and counsel assists."
    upsideCase: "CAC falls toward $45K once two partner channels consistently originate qualified pilots."
    y3RevenueImpactK: -134.6
    cashImpactK: -116.4
  - variable: "churn"
    downsideCase: "Monthly churn drifts toward 3.0% if customers view the product as a one-off launch project."
    baseCase: "Monthly churn stays at 2.0% as modeled."
    upsideCase: "Monthly churn improves toward 1.5% once the rules engine becomes part of ongoing policy operations."
    y3RevenueImpactK: -190.2
    cashImpactK: -133.1
  - variable: "sales cycle"
    downsideCase: "Pilot-to-production stretches by about 2 months because privacy review and budget approval take longer."
    baseCase: "Sales and deployment cycles average about 4 to 5 months from qualified discovery to production budget."
    upsideCase: "Counsel and proof-vendor referrals compress the cycle toward 3 months."
    y3RevenueImpactK: -237.6
    cashImpactK: -293.8
  - variable: "gross margin"
    downsideCase: "Gross margin holds at 67% because manual appeals and proof-vendor pass-through remain elevated."
    baseCase: "Gross margin stays at the BP target of 70%."
    upsideCase: "Gross margin reaches 72% once integrations and review playbooks standardize."
    y3RevenueImpactK: 0.0
    cashImpactK: -113.1
  - variable: "hiring pace"
    downsideCase: "The last 3 hires are pulled forward by 2 quarters before partner repeatability is proven."
    baseCase: "Hiring follows A19 and stays lean until the first 8 production customers are live."
    upsideCase: "The last 3 hires slip later because the base team and partner motion absorb more work than planned."
    y3RevenueImpactK: 0.0
    cashImpactK: -198.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      PartnerChannels[Founder + partner channels] --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case Y3 revenue is driven by growing from 8 to 18 paying logos and monetizing each at a $190K blended customer-year value within the BP pricing band."
  - checkName: "Must go right"
    finding: "Pilot-to-production conversion and partner-sourced introductions must stay strong enough to add about 10 net new logos after Y2 without pulling forward a much larger field team."
  - checkName: "Model breaks if"
    finding: "If pricing slips toward $175K per customer-year or the sales cycle delays the ramp toward only 15 Y3 exit customers, cash compresses toward the downside low point of about $79K."
  - checkName: "Next-round proof"
    finding: "The seed case is credible once the company reaches roughly 12 production customers, 2 repeatable channels, and the first multi-jurisdiction expansions by Q2Y3."
sanityChecks:
  ruleOf40: "Y3 growth 119.0% + EBITDA margin -9.7% = 109.3% (directionally strong but still helped by the small Y2 revenue base)."
  burnMultiple: "About 0.7x in Y2 on net new ARR, improving to about 0.1x in Y3 as high-ACV logos absorb the fixed team."
  revenuePerFte: "$197.9K Y3 revenue per end-of-year FTE (vs. roughly $200K-$400K mature SaaS benchmark)."
  flags:
    - "The model depends on buyers funding a separate orchestration layer at roughly $190K per customer-year; if proof vendors bundle enough policy logic, both ARPU and CAC deteriorate quickly."
    - "The downside case stays only barely cash-positive even with a $2.2M raise, so a two-quarter sales-cycle slip would require tighter hiring control or an earlier seed process."
    - "Customer counts are milestone-driven net adds while churn is used only for LTV math; once the first renewals land, cohort retention should replace the heuristic churn input."
    - "Revenue per FTE reaches only about $198K in Y3, which is reasonable for a services-assisted compliance wedge but below what investors would expect from a fully standardized SaaS motion."
