topRisks:
  - name: "监管指定核验方式"
    description: "若英国后续强制要求某一特定证明方式或批准供应商名单，通用编排的叙事可能收缩。"
    mitigation: "把控任何被强制要求的证明方式之上的功能策略与审计层，并迅速与监管机构或平台最终标准化的供应商完成集成。"
  - name: "现有厂商捆绑销售"
    description: "身份和信任供应商可能添加轻量级年龄策略功能并捆绑入现有合同。"
    mitigation: "在私信、信息流、禁用时段和 AI 人格等产品面上做更深的集成——这些是通用核验供应商在工作流和证据需求上无法很好建模的地方。"
  - name: "客户选择规避合规"
    description: "部分体量较小的应用可能选择直接封锁英国未成年用户或退出该细分市场，而不是购买合规软件。"
    mitigation: "聚焦英国青少年流量与聊天或 AI 互动对营收至关重要的应用，待产品证明 ROI 后再向相邻的全球青少年安全规则扩展。"
