problem: >-
  面向英国的消费者应用若有青少年流量，现在面临一个不可绕过的产品合规问题：要么收集超出意愿的身份数据，要么面临违反快速推进的 16 岁以下法令的风险。难题不只是判断用户是 15 岁还是 17 岁——而是把嘈杂的年龄信号映射为注册、私信、信息流、禁用时段和 AI 人格等功能层面的规则，同时为法律顾问和应用商店合作伙伴保留可审计证据。中型应用缺少大型平台负担得起的内部信任安全与政策工程团队，只能退而求其次：要么粗暴地地理封锁，要么接入单点年龄核验供应商，要么靠脆弱的手动功能标记应付。
targetUser:
  primary: "面向英国的社交、社区及 AI 陪伴应用中，负责信任安全、产品合规和平台工程的高管，所在平台有 18 岁以下用户流量。"
  secondary: "帮助上述应用将青少年安全规则转化为产品需求的政策运营团队和外部法律顾问。"
  buyer: "信任安全副总裁、首席产品官或总法律顾问"
startupThesis:
  nonObviousInsight: >-
    年龄估算本身不是稀缺层。真正的新瓶颈是：随着监管从"这个用户年龄是否达标？"扩展到"这个年龄段可以使用哪些功能、在什么时间、受哪些约束？"，如何把多种嘈杂的年龄证明整合为一个可审计的产品策略决策。
  beachhead: >-
    月活 50 万至 500 万、英国流量超过 10%、且拥有可能被限制向 16 岁以下用户开放的私信或 AI 人格功能的风险投资支持型 AI 陪伴、粉丝社群聊天及创作者社区应用
  wedge: >-
    一个年龄段策略引擎——融合自拍年龄估算、银行年龄信号和政府身份证件兜底信号，生成统一置信度评分，自动在注册、信息流访问、私信、禁用时段和亲密 AI 模式全链路执行英国规则，并保留审计日志
  whyNowCatalyst: >-
    Starmer 的 6 月 15 日公告及承诺的过渡窗口迫使产品团队在英国甚至尚未确定任何核验方式之前，就必须交付可审计的 16 岁及 18 岁以下管控机制。
  ventureScalePath: >-
    从英国青少年访问规则的合规控制平面起步，逐步扩展为面向社交应用、游戏社区、创作者平台及 AI 陪伴应用的全球年龄策略层，应对英国、澳大利亚、欧洲和美国各州不断分化的儿童安全法规。
solution: >-
  Teen Access Policy Engine 是一套面向消费者应用的 SDK、规则引擎和审计控制台，专为需要按年龄段分层体验的产品而设计。产品接受政府讨论中的多种核验输入——人脸年龄估算、政府身份证件核查、银行年龄信号和人工审核——且仅存储最低限度的策略输出：年龄段、置信度、司法管辖区和同意状态。产品团队将 SDK 接入注册、私信、信息流排序、通知计划表和 AI 人格端点；引擎返回某个流程是被允许、被拦截还是需要更严格核查。法律顾问和信任安全团队得到一份策略日志，显示触发了哪个规则版本、哪些证据支持了决策，以及不确定用户在哪里被升级处理。这将杂乱的一次性合规冲刺变成了一个可复用的安全层，能够吸收未来英国、澳大利亚和欧盟的规则变更。
goToMarketSeed:
  firstCustomer: >-
    英国或欧盟的 AI 陪伴或创作者社区应用，MAU 在 100 万至 500 万之间，英国流量占比 15% 至 30%，法律与信任安全团队合计不超过 8 人，且亟需决定是否屏蔽 16 岁以下用户注册或在英国禁用私信及 AI 人格功能
  buyingTrigger: >-
    董事会、总法律顾问或应用商店/分发合作伙伴在 6 月 15 日公告后的过渡窗口内要求提供具体的英国 16 岁以下合规方案
  currentAlternative: >-
    单点年龄核验供应商、手动功能标记、内部中间件、外部法律顾问或对未成年用户的全面英国地理封锁
  switchingReason: >-
    切入点强过单点方案，因为它把年龄证明与产品策略分离——应用可以随时切换核验方式，同时快速交付可审计的功能管控，且留存的个人身份信息更少
  pricingHypothesis: >-
    按英国月活用户数和受保护决策调用量计费的年度 SaaS 费用，加上 SDK 集成和特定司法管辖区规则配置的实施费用
