scenarios:
  downside:
    description: "预算负责人只购买较窄的英国专用管控层，合作伙伴渠道爬坡缓慢，公司以 $175K 混合客户年价值和 15 个生产客户退出 Y3。"
    y3RevenueK: 1968.9
    y3EbitdaK: -554.5
    cashLowPointK: 78.6
    keyAssumptionChanges:
      - "季末客户数从 4、5、7、8 / 10、12、15、18 降为 4、5、6、7 / 9、11、13、15。"
      - "混合客户年收入从 $190K 降至 $175K，因预算稳定在 BP 定价区间低端。"
      - "毛利率从 70% 降至 68%，因人工申诉和核验供应商通过成本持续偏高。"
  base:
    description: "创始人主导销售加核验供应商和顾问推荐，公司以 $190K 混合客户年价值和 18 个生产客户退出 Y3。"
    y3RevenueK: 2375.2
    y3EbitdaK: -230.7
    cashLowPointK: 593.8
    keyAssumptionChanges:
      - "季末客户数遵循 A10 和 A11。"
      - "毛利率维持在 BP 目标 70%。"
      - "招聘遵循 A19，在可重复性验证前不扩充更大规模的现场销售团队。"
  upside:
    description: "合作伙伴来源交易和多功能面扩展提前落地，公司以 $205K 混合客户年价值和 22 个生产客户退出 Y3。"
    y3RevenueK: 3280.0
    y3EbitdaK: 468.3
    cashLowPointK: 1133.6
    keyAssumptionChanges:
      - "季末客户数升至 5、7、9、10 / 13、16、19、22。"
      - "混合客户年收入从 $190K 增至 $205K，因申诉和多司法管辖区模块提前附加。"
      - "毛利率从 70% 提升至 72%，因集成和审核手册标准化。"
sensitivity:
  - variable: "ARPU"
    downsideCase: "混合客户年价值稳定在 $170K，因客户仅购买较窄的英国专用管控层。"
    baseCase: "混合客户年价值维持在建模的 $190K。"
    upsideCase: "申诉和多司法管辖区模块提前附加，混合客户年价值达 $205K。"
    y3RevenueImpactK: -250.1
    cashImpactK: -277.8
  - variable: "CAC"
    downsideCase: "合作伙伴来源管道未能抵消创始人主导外向销售，CAC 向 $75K 攀升。"
    baseCase: "借助核验供应商和顾问协助，CAC 保持在约 $60K。"
    upsideCase: "两个合作伙伴渠道持续带来合格试点，CAC 降至约 $45K。"
    y3RevenueImpactK: -134.6
    cashImpactK: -116.4
  - variable: "churn"
    downsideCase: "若客户将产品视为一次性上线项目，月度流失率漂移至 3.0%。"
    baseCase: "月度流失率维持在建模的 2.0%。"
    upsideCase: "规则引擎成为持续策略运营的一部分后，月度流失率改善至 1.5%。"
    y3RevenueImpactK: -190.2
    cashImpactK: -133.1
  - variable: "sales cycle"
    downsideCase: "隐私审查和预算审批耗时更长，试点转生产延迟约 2 个月。"
    baseCase: "从合格调研到生产预算，销售和部署周期平均约 4 至 5 个月。"
    upsideCase: "顾问和核验供应商推荐将周期压缩至约 3 个月。"
    y3RevenueImpactK: -237.6
    cashImpactK: -293.8
  - variable: "gross margin"
    downsideCase: "人工申诉和核验供应商通过成本持续偏高，毛利率维持在 67%。"
    baseCase: "毛利率维持在 BP 目标 70%。"
    upsideCase: "集成和审核手册标准化后，毛利率达 72%。"
    y3RevenueImpactK: 0.0
    cashImpactK: -113.1
  - variable: "hiring pace"
    downsideCase: "在合作伙伴可重复性验证前，最后 3 个岗位提前 2 个季度到岗。"
    baseCase: "招聘遵循 A19，在首批 8 个生产客户上线前保持精简。"
    upsideCase: "基础团队和合作伙伴动作消化了超出预期的工作量，最后 3 个岗位推迟到岗。"
    y3RevenueImpactK: 0.0
    cashImpactK: -198.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      PartnerChannels[Founder + partner channels] --> PaidPilots
      PaidPilots --> ProductionCustomers
      ProductionCustomers --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: "收入引擎"
    finding: "基准情形 Y3 收入由客户从 8 个增至 18 个付费标志并按 $190K 混合客户年价值变现驱动，在 BP 定价区间内。"
  - checkName: "必须成立的条件"
    finding: "试点转生产转化率和合作伙伴来源引荐必须足够强劲，在 Y2 后净增约 10 个新客户标志，且无需提前扩充更大规模的现场销售团队。"
  - checkName: "模型崩溃条件"
    finding: "若每客户年定价滑向 $175K，或销售周期延迟使 Y3 退出客户仅剩 15 个，现金将压缩至下行情形低点约 $79K。"
  - checkName: "下一轮融资证明"
    finding: "一旦公司在 Q2Y3 前达到约 12 个生产客户、2 个可重复渠道及首批多司法管辖区扩展，种子轮案例即具可信度。"
sanityChecks:
  ruleOf40: "Y3 增长率 119.0% + EBITDA 利润率 -9.7% = 109.3%（方向性强，但仍受 Y2 营收基数较小的助力）。"
  burnMultiple: "Y2 净新增 ARR 烧钱倍数约 0.7x，Y3 随高 ACV 客户吸收固定团队成本改善至约 0.1x。"
  revenuePerFte: "Y3 年末每 FTE 收入约 $197.9K（对比成熟 SaaS 基准 $200K–$400K）。"
  flags:
    - "模型依赖买方在核验供应商支出之上为独立编排层支付约 $190K 每客户年；若核验供应商捆绑足够的策略逻辑，ARPU 和 CAC 都会快速恶化。"
    - "即使融资 $2.2M，下行情形现金几乎仅保持正值，因此两个季度的销售周期延迟将需要更严格的招聘管控或更早启动种子轮流程。"
    - "客户数是里程碑驱动的净增，流失率仅用于 LTV 计算；首批续约落地后，应用队列留存率替换启发式流失率输入。"
    - "Y3 每 FTE 收入约 $198K，对于服务辅助型合规切入点来说合理，但低于投资人对完全标准化 SaaS 打法的预期。"
