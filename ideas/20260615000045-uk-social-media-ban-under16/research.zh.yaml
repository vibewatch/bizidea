competitors:
- name: k-ID
  stage: scale-up
  wedge: 有游戏根基、具备司法管辖区感知的儿童安全合规 SDK/API，支持可配置的年龄和功能逻辑。
  pricing: 按用量计费；公开报道称定价从免费起步，按活跃玩家数扩展。
  strength: 目前最接近策略控制平面的切入点。
  weaknessVsUs: 以游戏为中心的产品包装，对私信、禁用时段和亲密型 AI 人格等社交/AI 面覆盖不够明确。
  sourceRefs:
  - 57
  - 58
- name: Yoti
  stage: scale-up
  wedge: 人脸年龄估算、可复用数字身份和多方式信任安全核查。
  pricing: 定制化/仅公开报价。
  strength: 隐私定位强，年龄估算可信度有独立参考背书。
  weaknessVsUs: 主要是证明层；客户仍需自行管理功能层策略编排。
  sourceRefs:
  - 61
  - 65
- name: VerifyMy
  stage: scale-up
  wedge: 以英国为中心的年龄核验/估算，兼具隐私、内容审核和合规定位。
  pricing: 定制化/仅公开报价。
  strength: 英国监管契合度强，核验加内容审核的产品覆盖面宽。
  weaknessVsUs: 针对社交/AI 工作流的可复用跨功能面规则引擎证据不足。
  sourceRefs:
  - 68
- name: OneID
  stage: scale-up
  wedge: 面向英国使用场景的银行关联、文件和人脸年龄核验，采用开放标准。
  pricing: 公开定价：50 次查询每月 £15.65 至 10,000 次查询每月 £2,720。
  strength: 具体的英国核验轨道和透明的单位定价。
  weaknessVsUs: 以核验为主；不负责信息流、聊天、AI 和申诉的应用内策略逻辑。
  sourceRefs:
  - 74
  - 82
  - 83
