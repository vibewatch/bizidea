    - 68
    - 74
  - point: 外部顾问和隐私顾问可以发起交易，因为监管机构将方式选择界定为隐私和公平问题，而非仅仅是安全问题。
    sourceRefs:
    - 14
    - 21
    - 30
  partnershipEcosystem:
  - point: 核验供应商是天然渠道合作伙伴，因为初创公司可以位于现有核验轨道之上而非替换它们。
