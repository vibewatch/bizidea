  validationPlan:
  - priority: high
    question: ICP 应用是否愿意在核验供应商支出之上为编排单独支付六位数低段年度预算？
    evidenceToGather: 与英国/欧盟信任安全和法律负责人进行调研访谈，涵盖预算负责人、当前供应商体系和申诉负担。
  - priority: high
    question: "哪个高风险面最先触发首单：私信、直播、信息流、通知还是 AI 人格？"
    evidenceToGather: 对 5–10 个候选应用进行功能层缺口分析，并收集当前法律备忘录或风险登记册。
  - priority: medium
    question: 核验供应商是否希望转售编排还是自己构建？
    evidenceToGather: 与 Yoti、OneID、VerifyMy 和 k-ID 的 BD 或产品负责人进行渠道对话。
  - priority: medium
    question: 对于英国和欧盟上线，买方能接受什么样的误拦截率和申诉 SLA？
    evidenceToGather: 使用分层年龄估算加升级核验及人工审核工作流进行试点基准测试。
