slug: teen-access-policy-engine
date: '2026-06-15'
executiveSummary: >-
  Teen Access Policy Engine should start as the compliance control plane for
  UK-facing AI companion, fandom-chat, creator-community, and mid-market social
  apps whose teen traffic matters and whose product surface now extends beyond a
  signup age gate. The immediate pain is operational, not theoretical; after
  the June 15 UK announcement, buyers need to decide whether under-16 users can
  sign up, message, scroll late at night, or access romantic AI features, and
  they need an audit trail that counsel can defend. The product should sit
  above age-proof vendors and device signals, normalize selfie-age, bank-age,
  ID, or wallet signals into an age-band decision, and then enforce that
  decision across signup, DM, feeds, notifications, and AI endpoints while
  minimizing retained PII. The first customer should be a venture-backed app
  with 500,000 to 5 million MAUs, meaningful UK traffic, small legal and
  trust-and-safety teams, and revenue exposure if it geoblocks minors or
  overblocks borderline users. Pricing should start as a paid pilot plus annual
  SaaS priced by protected UK/EU MAUs and policy decision volume, because the
  buyer is funding a shipped compliance launch rather than a standalone
  identity product. The strategic wedge is narrow on purpose; win the UK launch
  on the riskiest surfaces first, then expand within account to more surfaces
  and across jurisdictions once the policy engine and audit evidence become
  embedded. Research supports the urgency and the orchestration gap, but two
  assumptions still need proof; mid-market apps must pay a separate low-six-
  figure budget above proof-vendor spend, and proof vendors must prefer
  partnership over bundling. That makes this a plausible pre-seed
  meet-and-investigate case only if early pilots confirm budget, false-positive
  tolerance, and channel cooperation.
problem:
  - UK-facing apps with teen traffic now need auditable age-banded controls across signup, direct messaging, feeds, quiet hours, and AI features, but most mid-market teams only have point verification tools or manual flags.
  - Choosing one proof method is not enough because UK rules, privacy duties, and complaints requirements force buyers to combine uncertain signals, step up risky cases, and explain every decision without broadly retaining passports or selfies.
solution:
  - Build an SDK plus policy engine that accepts multiple age proofs, outputs only age band, confidence, jurisdiction, and consent state, and returns allow, block, or step-up decisions for each risky product surface.
  - Add a versioned rules console, audit log, and appeals workflow so legal, trust-and-safety, and engineering teams can ship UK controls quickly and update them as UK, EU, and Australian rules diverge.
whyWeWin:
  - The company owns the layer between proof and product behavior, which age-verification vendors, app stores, and generic feature-flag systems do not solve well for independent apps.
  - If it becomes the system of record for rule versions, overrides, appeals, and cross-surface integrations, switching costs compound faster than in a standalone proof API.
strategicChoices:
  beachhead: Venture-backed AI companion, fandom-chat, and creator-community apps with 500,000 to 5 million MAUs, more than 10% UK traffic, and direct-messaging or persona features that become legally risky for under-16 users.
  wedgeRationale: >-
    This segment has the clearest keep-or-lose-market trigger, the broadest
    risky feature surface, and the least appetite to geoblock UK minors, so it
    can validate multi-surface orchestration faster than a generic launch
    across all consumer apps or a narrow signup-only verification product.
  sequencingRationale: >-
    Start with UK rules, read-heavy integrations, and the highest-risk surfaces
    such as signup, direct messaging, quiet hours, and romantic AI modes
    because buyers need a shippable compliance layer before they need deep
    platform replacement. Once one account converts, add feed and notification
    coverage, standardize appeals and audit workflows, then expand to EU and
    Australia and only later pursue broader social, gaming, or wallet-native
    distribution.
  notYet:
    - Building a proprietary proof-of-age vendor
    - Self-serve SMB onboarding for small apps that can simply geoblock or overblock
    - Generic gaming or e-commerce age gates without multi-surface policy complexity
    - Direct-to-consumer parental control products
market:
  tam: "$400.0M estimated TAM based on roughly 2,000 global consumer social, community, and AI platforms at about $200K blended annual software value."
  sam: "$32.4M estimated SAM based on roughly 180 venture-backed AI companion, fandom-chat, creator-community, and mid-market social apps with material UK/EU teen exposure at about $180K annual ACV."
  som: "$3.6M estimated year-three SOM based on 18 production customers at about $200K ARR after winning the highest-risk UK/EU apps first and expanding within account surfaces."
  segments:
    - UK and EU AI companion, fandom-chat, and creator-community apps with meaningful teen traffic
    - Mid-market social and community platforms that lack in-house youth-policy engineering
  buyingProcess: >-
    The motion starts when general counsel, product leadership, or an app-store
    or distribution partner asks for a shipped UK youth-compliance plan against
    a live deadline. Economic approval likely sits with the VP of trust and
    safety, chief product officer, or general counsel, while platform
    engineering and privacy review validate that the vendor can cover multiple
    risky surfaces without retaining more PII than necessary.
product:
  mvp: >-
    MVP is an SDK plus rules engine for one UK launch that covers signup,
    direct messaging, quiet hours, and romantic AI modes and connects to 2 or 3
    external proof methods with step-up flows. It must expose versioned policy
    decisions, audit logs, and a manual review queue without forcing customers
    to replace their existing identity or moderation stack.
  sixMonth: Land 2 to 3 design partners, ship the first UK rules pack and audit console, integrate two proof sources, and prove live enforcement on at least three risky surfaces in one production account.
  twelveMonth: Add feed, notification, and parental-consent workflows, convert successful pilots into annual contracts, and standardize partner adapters so deployments look like product rather than policy consulting.
  twentyFourMonth: Become the youth-policy control layer for UK and EU consumer apps by adding EU and Australia rule packs, wallet or device age-signal support, richer appeals analytics, and account-expansion playbooks before broader category expansion.
  keyBets:
    - Buyers will fund feature-level orchestration separately from proof collection once a UK deadline reaches direct messaging or AI features.
    - A read-heavy integration pattern is enough for the first purchase, so the company can win before deep write-back integrations are required.
    - Appeals and incorrect-age-assessment workflows are necessary for production conversion and can become a durable moat.
    - Existing proof vendors will partner or at least tolerate a neutral control plane because their products stop at proof collection.
gtm:
  wedge: Sell a paid UK compliance launch that turns one live under-16 deadline into an auditable multi-surface ruleset using the customer's existing proof rails instead of asking them to bet on one verification method.
  channels:
    - Founder-led direct sales to VP Trust and Safety, Chief Product Officer, and General Counsel at UK and EU consumer apps
    - Referral and co-sell partnerships with youth-safety counsel, privacy advisors, and platform-risk consultants
    - Integration and resale partnerships with age-proof vendors whose customers still need downstream policy orchestration
  funnelTargets: "Intro to qualified discovery 30-40%, discovery to paid pilot 20-30%, paid pilot to annual production 50%+, and first production account to multi-surface expansion within 12 months in 40%+ of wins."
  pricing: >-
    Annual subscription priced by protected UK and EU MAUs and policy decision
    volume, plus a one-time integration and rule-configuration fee. This
    matches the buyer's compliance budget and supports a path from a $30K-$60K
    paid pilot to roughly $120K-$200K annual ACV once multiple risky surfaces
    run in production.
businessModel:
  revenueStreams:
    - Annual subscription for policy decisioning and audit workflow
    - Paid onboarding, rule configuration, and proof-vendor integration fees
    - Premium modules for appeals operations, regulator-response reporting, and multi-jurisdiction rule packs
  unitOfValue: Protected monthly active users and policy decisions governed through the platform.
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one risky surface to direct messaging, feeds, notifications, and AI endpoints within the same account
    - Add EU and Australia rule packs once the UK deployment is live
    - Layer appeals, regulator-response, and audit modules on top of core decisioning
    - Grow through proof-vendor and counsel channels after the first case studies
strategyMap:
  northStarMetric: Monthly active users covered by auditable age-banded policy decisions across live product surfaces.
  inputMetrics:
    - Paid pilots launched against a named UK or EU compliance deadline
    - Risky product surfaces live per customer
    - Pilot-to-production conversion rate
    - Buyer-accepted false-block and appeal-resolution performance
    - Partner-sourced qualified pipeline share
  moatsToBuild:
    - Jurisdiction by age-band by feature-surface rules library with version history
    - Appeals and threshold data across proof methods and borderline cases
    - Deep integrations into messaging, feed, notification, and AI endpoints plus regulator-ready audit logs
  killCriteria:
    - Fewer than 3 of the first 15 ICP accounts sign a paid pilot or explicit production budget at more than $100K annualized value
    - No pilot covers at least three risky surfaces while meeting buyer-approved appeal and correction SLAs
    - More than half of qualified prospects insist the orchestration layer must be bundled for free by an OS, app store, or proof vendor
  mermaid: |
    flowchart LR
      Wedge[UK teen-policy wedge] --> MVP[Multi-surface policy engine MVP]
      MVP --> Proof[Paid pilots and audit proof]
      Proof --> Expansion[Jurisdiction and account expansion]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: High urgency, medium conviction; this is interesting now, but separate budget and channel behavior must be proven in the first pilot cohort.
    whyBelieve: The compliance deadline is real and the product attacks the under-served orchestration layer between proof vendors and risky consumer-app surfaces.
    whyDoubt: Proof vendors, app stores, and internal product teams can absorb parts of the wedge if buyers only want signup checks or refuse standalone orchestration spend.
    nextDiligence: Confirm 3 to 5 design-partner apps with named UK deadlines, budget owners, and willingness to run a paid pilot covering at least direct messaging plus one other risky surface.
  firstCustomer:
    title: UK teen-sensitive AI companion or creator-community app
    profile: A venture-backed consumer app with 1 million to 5 million MAUs, 15% to 30% UK traffic, direct messaging or persona features, and fewer than 8 people across legal and trust and safety.
    trigger: Board, general counsel, or an app-store partner asks for a shipped UK under-16 and under-18 compliance plan during the transition window.
    buyer: VP Trust and Safety, Chief Product Officer, or General Counsel
    initialContract: "$30K-$60K paid pilot and integration package converting to roughly $120K-$200K annual subscription if UK signup, direct messaging, and AI controls go live with acceptable appeal and audit metrics."
  mustBeTrue:
    - At least 5 target apps confirm that UK youth compliance is a funded roadmap item within 12 months and name a budget owner.
    - Buyers need multi-surface controls such as direct messaging, AI personas, feeds, or quiet hours, not just a signup age check.
    - ICPs will pay roughly $120K-$200K ARR above proof-vendor spend for orchestration, audit logs, and appeals workflow.
    - A layered proof strategy can meet buyer-accepted false-block and correction SLAs without broad raw-ID retention.
    - At least one proof-vendor or counsel channel can generate qualified pilots faster than founder-led outbound alone.
  diligenceQuestions:
    - Which budget closes first in practice among legal and compliance, trust and safety, product, or a board-mandated special project?
    - Which risky surface triggers the first purchase most often among direct messaging, AI personas, feeds, quiet hours, or signup?
    - What false-positive rate and appeal SLA will buyers and regulators tolerate for 16 to 17 users and adults?
    - How likely is UK guidance to narrow supplier choice to one approved proof method or list?
    - Do Yoti, OneID, VerifyMy, or similar vendors want to resell orchestration or build it themselves?
operatingAssumptions:
  - assumption: ICPs will fund a separate orchestration layer at $120K-$200K ARR instead of forcing proof vendors to include it.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots or signed LOIs with explicit post-pilot production budgets above $100K ARR from accounts that already buy or evaluate proof vendors.
    decisionImpact: If false, reposition as a bundled partner module or narrow to larger enterprise apps with higher compliance budgets.
  - assumption: Direct messaging, quiet hours, and AI persona controls drive the first purchase faster than feed-wide policy coverage.
    basis: idea.yaml
    validationTest: Review 10 target-app risk registers or discovery calls and confirm at least 7 name these surfaces in the first deployment scope.
    decisionImpact: If false, roadmap and integrations shift toward the surface that actually unlocks budget, even if the wedge becomes less differentiated.
  - assumption: Proof vendors will partner because they lack downstream policy orchestration depth.
    basis: research.yaml
    validationTest: Run 8 partner conversations and secure 2 referral, reseller, or integration agreements that create live pipeline within 6 months.
    decisionImpact: If false, sales stays founder-led longer and the company must out-integrate vendors that start bundling.
  - assumption: UK implementation will still allow a neutral control plane above approved proof methods.
    basis: research.yaml
    validationTest: Track final UK guidance and confirm in 3 customer procurements that buyers still need in-app rules, audit, and appeals even if supplier choice narrows.
    decisionImpact: If false, product scope narrows to the surfaces and workflows not covered by the mandated supplier or OS layer.
  - assumption: Minimal-retention architecture and appeals tooling will shorten privacy review enough to keep deployments under 45 days on supported stacks.
    basis: operator judgment
    validationTest: In the first 3 paid pilots, clear legal and privacy review and ship to production-like enforcement within 45 days from technical kickoff.
    decisionImpact: If false, implementation cost, headcount needs, and runway requirements all rise before seed readiness.
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: Interview 15 UK and EU trust-and-safety, product-risk, and legal leaders in target apps.
    hypothesis: Named UK deadlines and multi-surface exposure create budget faster than a generic safety-modernization pitch.
    successMetric: 10 interviews confirm a trigger, a budget owner, and a first-surface priority.
    owner: CEO
  - horizon: "0–90 days"
    experiment: Map one design-partner app's signup, direct messaging, quiet-hours, and AI persona endpoints into a prototype rules engine with audit logs.
    hypothesis: A read-heavy SDK and audit layer can cover the first risky surfaces without replacing existing auth or moderation stacks.
    successMetric: 1 design partner completes a sandbox integration across at least 3 surfaces in under 30 engineering days.
    owner: Founding eng
  - horizon: "90–180 days"
    experiment: Run 2 paid UK pilots with live step-up flows across direct messaging and one other risky surface.
    hypothesis: Buyers will pay for orchestration before UK standards fully settle if the product reduces policy-engineering burden and audit risk.
    successMetric: 2 signed paid pilots and at least 1 converts to production-budget approval.
    owner: CEO
  - horizon: "90–180 days"
    experiment: Pilot referrals from 2 youth-safety counsel firms and 2 proof vendors.
    hypothesis: Counsel and proof partners can originate warmer pipeline than cold outbound because they already sit inside the buyer's compliance project.
    successMetric: 6 qualified introductions and 1 paid pilot from partner-sourced pipeline.
    owner: Founder seller
  - horizon: "6–12 months"
    experiment: Launch an appeals console and measure false-block and correction performance on live borderline users.
    hypothesis: Appeals tooling and step-up flows are required for production conversion, not nice-to-have compliance extras.
    successMetric: A production pilot meets a buyer-approved appeal SLA and keeps manual review below 10% of protected decisions.
    owner: Product lead
  - horizon: "12–18 months"
    experiment: Add an EU or Australia rules pack and one wallet or device age-signal integration for existing customers.
    hypothesis: Geographic expansion is fastest inside existing accounts once the UK control plane is trusted.
    successMetric: 2 production customers add a second jurisdiction or second signal source without a full reimplementation.
    owner: Product lead
operations:
  - Maintain a versioned rules library with counsel sign-off, release notes, and rollback by jurisdiction.
  - Retain only age band, confidence, jurisdiction, consent state, and evidence references unless a step-up workflow requires more.
  - Run manual review, complaints, and correction SLAs as first-class product workflows rather than off-platform email cases.
  - Benchmark proof-method performance, fallback rates, and appeals outcomes by customer and surface.
  - Review UK, EU, and Australia rule changes weekly with counsel and partner vendors, then update standard policy packs.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Builds the SDK, policy engine, audit model, and first proof-vendor integrations that define the wedge.
  - role: Founder seller
    startTiming: Month 0
    rationale: Owns ICP discovery, pilot closing, and partner business development while the market and budget model are still forming.
  - role: Policy and trust-safety product lead
    startTiming: Month 0
    rationale: Translates statutes and counsel feedback into deployable rules, appeals flows, and account-expansion priorities.
  - role: Solutions engineer
    startTiming: Month 3
    rationale: Standardizes customer integrations and keeps early deployments from turning into bespoke consulting projects.
  - role: Privacy and security engineer
    startTiming: Month 6
    rationale: Hardens minimal-retention architecture, enterprise controls, and audit-readiness for larger accounts.
  - role: Partnerships lead
    startTiming: Month 9
    rationale: Converts proof-vendor and counsel referrals into repeatable pipeline after the first successful case studies.
milestones:
  - horizon: "0–12 months"
    items:
      - Sign 2 to 3 paid design partners in the AI companion, creator-community, or fandom-chat segment.
      - Ship a UK rules engine covering signup, direct messaging, quiet hours, romantic AI modes, audit logs, and appeals.
      - Integrate at least 2 proof methods and convert 2 pilots into annual production contracts.
  - horizon: "12–24 months"
    items:
      - Add EU and Australia rule packs plus one wallet or device age-signal adapter.
      - Reach 8 production customers and expand at least 40% of them from one surface to three or more surfaces.
      - Secure 2 channel partners that generate repeatable qualified pipeline.
  - horizon: "24–36 months"
    items:
      - Reach about 18 production customers, consistent with the researched SOM.
      - Become the default youth-policy control layer across UK and EU teen-sensitive social and AI apps.
      - Expand into adjacent categories only after the rules library, appeals data, and partner network are repeatable.
risks:
  - risk: UK guidance narrows to one approved proof method or supplier list.
    likelihood: Medium
    impact: High
    mitigation: Win as the policy, audit, and appeals layer above whichever proof method regulators or large platforms standardize on.
  - risk: Proof vendors, app stores, or OS providers bundle enough policy logic to compress standalone pricing.
    likelihood: High
    impact: High
    mitigation: Go deeper on feature-surface coverage, override workflows, and regulator-ready evidence than a bundled proof product is likely to support.
  - risk: Smaller apps choose to geoblock or overblock minors instead of buying compliance software.
    likelihood: Medium
    impact: High
    mitigation: Focus sales on apps where UK youth traffic, creator liquidity, or AI engagement is too valuable to abandon.
  - risk: False positives or slow appeals create legal, product, and reputational blowback.
    likelihood: Medium
    impact: High
    mitigation: Layer age-estimation with step-up proof, set explicit appeal SLAs, and keep human review in the loop for borderline cases.
  - risk: Privacy review and enterprise security demands make early deployments too services-heavy.
    likelihood: Medium
    impact: Medium
    mitigation: Keep retention minimal, standardize evidence models and deployment playbooks, and hire privacy and security talent before broad expansion.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: Fund 18 months of product, policy, and integration work to ship the UK control plane, convert 2 to 3 paid pilots into production, secure initial proof-vendor and counsel channels, and prove that multi-jurisdiction expansion is productized before a seed round.
