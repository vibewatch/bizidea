slug: teen-access-policy-engine
date: '2026-06-15'
executiveSummary: >-
  Teen Access Policy Engine 应从英国 AI 陪伴、粉丝聊天、创作者社区及中型社交应用的合规控制平面起步——这些应用的青少年流量不可或缺，且产品面已延伸至注册年龄门槛之外。痛点是运营层面的，不是理论层面的：6 月 15 日英国公告之后，买方必须决定 16 岁以下用户能否注册、发私信、深夜刷屏或访问亲密型 AI 功能，还需要一条法律顾问能为之辩护的审计链。产品应位于年龄核验供应商和设备信号之上，把自拍年龄、银行年龄、身份证件或钱包信号归一化为年龄段决策，再将该决策跨注册、私信、信息流、通知和 AI 端点执行，同时将留存的个人身份信息降至最低。第一个客户应是月活 50 万至 500 万、有一定英国流量、法律和信任安全团队规模较小、且一旦封锁未成年人或过度拦截边界用户就面临营收损失的风险投资支持型应用。定价应从付费试点加年度 SaaS 起步，按受保护的英国/欧盟 MAU 和策略决策量计费——因为买方在为已交付的合规上线付费，而非购买独立的身份产品。战略切入点有意设窄：先在最高风险面赢下英国上线，再在账户内扩展到更多功能面，待策略引擎和审计证据嵌入之后再跨司法管辖区扩展。研究支持了紧迫性和编排缺口，但两个假设仍待验证：中型应用必须在核验供应商支出之上为此单独支付六位数低段年度预算，且核验供应商必须更倾向合作而非捆绑。这使本案仅在早期试点确认预算、误拦截容忍度和渠道合作的前提下，成为一个合理的 pre-seed 会面调查案例。
problem:
  - "面向英国的有青少年流量的应用，现在需要跨注册、私信、信息流、禁用时段和 AI 功能的可审计年龄段管控——但大多数中型团队只有单点核验工具或手动标记。"
  - "选定一种核验方式远远不够，因为英国规则、隐私义务和投诉要求迫使买方融合不确定信号、对高风险情形升级处理，并在不为所有人留存护照或自拍的情况下解释每个决策。"
solution:
  - "构建一套 SDK 加策略引擎，接受多种年龄证明，仅输出年龄段、置信度、司法管辖区和同意状态，并为每个高风险产品面返回允许、拦截或升级决策。"
  - "增加版本化规则控制台、审计日志和申诉工作流，让法律、信任安全和工程团队能快速交付英国管控机制，并随英国、欧盟和澳大利亚规则分化而持续更新。"
whyWeWin:
  - "公司占据证明与产品行为之间的那一层——年龄核验供应商、应用商店和通用功能标记系统都无法为独立应用很好地解决这个问题。"
  - "一旦成为规则版本、覆盖项、申诉和跨功能面集成的系统底座，其切换成本的复利速度将快于独立证明 API。"
strategicChoices:
  beachhead: 月活 50 万至 500 万、英国流量超过 10%、且拥有对 16 岁以下用户具有法律风险的私信或 AI 人格功能的风险投资支持型 AI 陪伴、粉丝聊天和创作者社区应用。
  wedgeRationale: >-
    这个细分市场拥有最清晰的留市或退市触发点、最宽的高风险功能面，以及最低的封锁英国未成年人意愿，因此它比泛消费者应用全面铺开或仅做注册核验产品能更快验证多功能面编排的价值。
  sequencingRationale: >-
    从英国规则、以读取为主的集成和最高风险功能面（注册、私信、禁用时段和亲密型 AI 模式）入手，因为买方需要的是可交付的合规层，而非深度平台替换。首个账户转化后，增加信息流和通知覆盖，标准化申诉和审计工作流，再向欧盟和澳大利亚扩展，更广泛的社交、游戏或原生钱包分发留待更后期。
  notYet:
    - "自建专有年龄证明供应商"
    - "面向小型应用的自助 SMB 入驻——这些应用可以直接地理封锁或过度拦截"
    - "无多功能面策略复杂度的通用游戏或电商年龄门"
    - "面向消费者的家长控制产品"
market:
  tam: "$400.0M——基于全球约 2000 家需要年龄段管控的消费者社交、社区和 AI 平台，按约 $200K 混合年软件价值估算。"
  sam: "$32.4M——将 TAM 限定为约 180 家有实质英国/欧盟青少年敞口的风险投资支持型 AI 陪伴、粉丝聊天、创作者社区及中型社交应用，按约 $180K 年度 ACV 估算。"
  som: "$3.6M——第三年可达份额，建模为优先赢下最高风险英国/欧盟应用并在账户内扩展功能面后的 18 个生产客户，每个约 $200K ARR。"
  segments:
    - "有实质青少年流量的英国和欧盟 AI 陪伴、粉丝聊天和创作者社区应用"
    - "缺乏内部青少年策略工程能力的中型社交和社区平台"
  buyingProcess: >-
    当总法律顾问、产品负责人或应用商店/分发合作伙伴在实际截止日期前要求提交已交付的英国青少年合规方案时，销售动作启动。经济审批通常由信任安全副总裁、首席产品官或总法律顾问拍板，而平台工程和隐私审查负责验证供应商能否覆盖多个高风险面且不过度留存个人身份信息。
product:
  mvp: >-
    MVP 是一套面向英国首次上线的 SDK 加规则引擎，覆盖注册、私信、禁用时段和亲密型 AI 模式，连接 2 至 3 种外部核验方式并配备升级流程。必须提供版本化策略决策、审计日志和人工审核队列，且不强制客户替换现有身份或内容审核体系。
  sixMonth: "落地 2 至 3 家共创客户，交付首个英国规则包和审计控制台，集成两种核验来源，并在一个生产账户中验证至少三个高风险功能面的实时执行。"
  twelveMonth: "增加信息流、通知和家长同意工作流，将成功试点转化为年度合同，标准化合作伙伴适配器，让部署看起来像产品而非策略咨询。"
  twentyFourMonth: "通过增加欧盟和澳大利亚规则包、钱包或设备年龄信号支持、更丰富的申诉分析及账户扩展手册，在更广泛的类别扩张前成为英国和欧盟消费者应用的青少年策略控制层。"
  keyBets:
    - "一旦英国截止日期触达私信或 AI 功能，买方将把功能层编排的预算与核验采购分开。"
    - "以读取为主的集成模式足以赢得首单，无需深度回写集成即可完成首购。"
    - "申诉和年龄误判纠正工作流是生产转化的必要条件，而非加分项。"
    - "现有核验供应商会选择合作或至少容忍一个中立控制平面，因为其产品止步于证明采集。"
gtm:
  wedge: "出售一个付费的英国合规上线项目——利用客户现有核验轨道，把一个活跃的 16 岁以下截止日期转化为可审计的多功能面规则集，而非让客户押注于某一种核验方式。"
  channels:
    - "创始人主导直销，面向英国和欧盟消费者应用的信任安全副总裁、首席产品官和总法律顾问"
    - "与青少年安全法律顾问、隐私顾问和平台风险咨询机构建立推荐和联合销售合作"
    - "与年龄核验供应商建立集成和转售合作——这些供应商的客户仍需要下游策略编排"
  funnelTargets: "首次接触到合格调研 30–40%，调研到付费试点 20–30%，付费试点到年度生产合同 50%+，首个生产账户在 12 个月内多功能面扩展达成率 40%+。"
  pricing: >-
    按受保护的英国和欧盟 MAU 及策略决策量计费的年度订阅，加上一次性集成和规则配置费用。与买方的合规预算匹配，支撑从 $3 万–$6 万付费试点到约 $12 万–$20 万年度 ACV 的路径（当多个高风险面投入生产后）。
businessModel:
  revenueStreams:
    - "策略决策和审计工作流的年度订阅"
    - "付费入驻、规则配置和核验供应商集成费用"
    - "申诉运营、监管应对报告和多司法管辖区规则包的高级模块"
  unitOfValue: "通过平台治理的受保护月活用户数和策略决策数。"
  targetGrossMarginPct: 70
  expansionLevers:
    - "在同一账户内从单一高风险面扩展至私信、信息流、通知和 AI 端点"
    - "英国部署上线后增加欧盟和澳大利亚规则包"
    - "在核心决策之上叠加申诉、监管应对和审计模块"
    - "首批案例研究完成后通过核验供应商和顾问渠道扩张"
strategyMap:
  northStarMetric: 在生产功能面上受可审计年龄段策略决策覆盖的月活用户数。
  inputMetrics:
    - "针对具名英国或欧盟合规截止日期启动的付费试点数"
    - "每个客户的高风险产品面上线数"
    - "试点转生产转化率"
    - "买方认可的误拦截率和申诉解决表现"
    - "合作伙伴来源的合格管道占比"
  moatsToBuild:
    - "含版本历史的司法管辖区 × 年龄段 × 功能面规则库"
    - "跨核验方式和边界案例的申诉与阈值数据"
    - "深度集成到私信、信息流、通知和 AI 端点，加上监管就绪审计日志"
  killCriteria:
    - "前 15 个 ICP 账户中少于 3 个签署付费试点或年化超 $10 万的明确生产预算"
    - "没有试点在达到买方认可的申诉和纠正 SLA 的同时覆盖至少三个高风险功能面"
    - "超过半数合格潜在客户坚持编排层必须由操作系统、应用商店或核验供应商免费捆绑"
  mermaid: |
    flowchart LR
      Wedge[UK teen-policy wedge] --> MVP[Multi-surface policy engine MVP]
      MVP --> Proof[Paid pilots and audit proof]
      Proof --> Expansion[Jurisdiction and account expansion]
investorMemo:
  verdict:
    call: "进一步调研"
    conviction: "紧迫性高，确信度中等；现在值得关注，但独立预算和渠道行为必须在首批试点队列中得到验证。"
    whyBelieve: "合规截止日期真实存在，产品攻打的是核验供应商和高风险消费者应用面之间服务不足的编排层。"
    whyDoubt: "核验供应商、应用商店和内部产品团队可以吸收切入点的一部分——如果买方只需要注册核验或拒绝为独立编排单独付费。"
    nextDiligence: "确认 3 至 5 家有具名英国截止日期、预算负责人、且愿意为至少涵盖私信加另一个高风险面的付费试点付费的共创伙伴应用。"
  firstCustomer:
    title: "对英国青少年敏感的 AI 陪伴或创作者社区应用"
    profile: "月活 100 万至 500 万、英国流量 15% 至 30%、有私信或 AI 人格功能、法律和信任安全合计不超过 8 人的风险投资支持型消费者应用。"
    trigger: "董事会、总法律顾问或应用商店合作伙伴在过渡窗口内要求提交已交付的英国 16 岁及 18 岁以下合规方案。"
    buyer: "信任安全副总裁、首席产品官或总法律顾问"
    initialContract: "$3 万–$6 万付费试点和集成包，在英国注册、私信和 AI 管控以可接受的申诉和审计指标上线后转化为约 $12 万–$20 万年度订阅。"
  mustBeTrue:
    - "至少 5 家目标应用确认英国青少年合规是 12 个月内有资金支持的路线图事项并指定预算负责人。"
    - "买方需要多功能面管控——如私信、AI 人格、信息流或禁用时段——而非仅仅是注册年龄核验。"
    - "ICP 愿意在核验供应商支出之上为编排、审计日志和申诉工作流支付约 $12 万–$20 万 ARR。"
    - "分层证明策略能在不大规模留存原始身份证件的情况下满足买方认可的误拦截率和纠正 SLA。"
    - "至少一条核验供应商或顾问渠道能比创始人主导的外向销售更快产生合格试点。"
  diligenceQuestions:
    - "在法律合规、信任安全、产品和董事会授权特别项目之间，实际上哪个预算最先关单？"
    - "哪个高风险面最常触发首单——私信、AI 人格、信息流、禁用时段还是注册？"
    - "对于 16–17 岁用户和成年人，买方和监管机构能接受什么样的误拦截率和申诉 SLA？"
    - "英国指引将供应商选择收窄为一种批准的核验方式或名单的可能性有多大？"
    - "Yoti、OneID、VerifyMy 或类似供应商希望转售编排还是自己构建？"
operatingAssumptions:
  - assumption: "ICP 愿意在核验供应商支出之上为独立编排层支付 $12 万–$20 万 ARR，而非强迫核验供应商将其纳入标配。"
    basis: research.yaml
    validationTest: "与已购买或正在评估核验供应商的账户签署至少 3 份付费试点或意向书，明确约定试点后生产预算超过 $10 万 ARR。"
    decisionImpact: "若为假，重新定位为捆绑合作伙伴模块，或聚焦有更高合规预算的大型企业应用。"
  - assumption: "私信、禁用时段和 AI 人格管控比信息流全面策略覆盖更快触发首单。"
    basis: idea.yaml
    validationTest: "审查 10 个目标应用的风险登记册或调研记录，确认至少 7 个在首次部署范围中提及这些功能面。"
    decisionImpact: "若为假，路线图和集成转向实际解锁预算的功能面，即便切入点因此变得不那么差异化。"
  - assumption: "核验供应商会选择合作，因为它们缺乏下游策略编排深度。"
    basis: research.yaml
    validationTest: "完成 8 次合作伙伴对话，在 6 个月内争取到 2 份产生实际管道的推荐、转售或集成协议。"
    decisionImpact: "若为假，销售保持更长时间的创始人主导状态，公司必须在开始捆绑的供应商上胜出。"
  - assumption: "英国执行仍将允许在批准的核验方式之上存在中立控制平面。"
    basis: research.yaml
    validationTest: "跟踪英国最终指引，并在 3 个客户采购中确认即便供应商选择收窄，买方仍需要应用内规则、审计和申诉。"
    decisionImpact: "若为假，产品范围收窄至强制供应商或操作系统层未覆盖的功能面和工作流。"
  - assumption: "最小留存架构和申诉工具将缩短隐私审查周期，使在受支持技术栈上的部署保持在 45 天以内。"
    basis: operator judgment
    validationTest: "在前 3 个付费试点中，从技术启动到生产级执行在 45 天内通过法律和隐私审查并上线。"
    decisionImpact: "若为假，实施成本、人员需求和现金跑道要求在种子轮准备就绪前都会上升。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "访谈 15 位目标应用中的英国和欧盟信任安全、产品风险和法律负责人。"
    hypothesis: "具名英国截止日期和多功能面敞口比泛安全现代化主题能更快产生预算。"
    successMetric: "10 次访谈确认触发事件、预算负责人和首个功能面优先级。"
    owner: CEO
  - horizon: "0–90 天"
    experiment: "将一家共创伙伴应用的注册、私信、禁用时段和 AI 人格端点映射进带有审计日志的原型规则引擎。"
    hypothesis: "以读取为主的 SDK 和审计层无需替换现有认证或内容审核体系即可覆盖首批高风险功能面。"
    successMetric: "1 家共创伙伴在 30 个工程日内完成至少 3 个功能面的沙箱集成。"
    owner: 创始工程师
  - horizon: "90–180 天"
    experiment: "运行 2 个付费英国试点，在私信和另一个高风险面上跑通实时升级流程。"
    hypothesis: "在英国标准完全确定之前，若产品能降低策略工程负担和审计风险，买方愿意为编排付费。"
    successMetric: "2 个已签付费试点，且至少 1 个转化为生产预算审批。"
    owner: CEO
  - horizon: "90–180 天"
    experiment: "从 2 家青少年安全律所和 2 家核验供应商试点推荐合作。"
    hypothesis: "顾问和核验合作伙伴能产生比冷外联更温热的管道，因为他们已经在买方的合规项目内部。"
    successMetric: "6 个合格的引荐和 1 个来自合作伙伴渠道的付费试点。"
    owner: 创始销售
  - horizon: "6–12 个月"
    experiment: "上线申诉控制台，对实时边界用户测量误拦截率和纠正表现。"
    hypothesis: "申诉工具和升级流程是生产转化的必要条件，而非加分项。"
    successMetric: "一个生产试点达到买方认可的申诉 SLA，且人工审核低于受保护决策的 10%。"
    owner: 产品负责人
  - horizon: "12–18 个月"
    experiment: "为现有客户增加欧盟或澳大利亚规则包及一种钱包或设备年龄信号集成。"
    hypothesis: "一旦英国控制平面被信任，地域扩展在现有账户内最快。"
    successMetric: "2 个生产客户无需完整重新实施即可增加第二个司法管辖区或第二种信号来源。"
    owner: 产品负责人
operations:
  - "维护含顾问签字、发布说明和按司法管辖区回滚的版本化规则库。"
  - "除非升级核验流程另有需求，仅留存年龄段、置信度、司法管辖区、同意状态和证据引用。"
  - "将人工审核、投诉和纠正 SLA 作为一类产品工作流处理，而非线下邮件案例。"
  - "按客户和功能面对核验方式表现、兜底率和申诉结果做基准测试。"
  - "每周与顾问和合作供应商评审英国、欧盟和澳大利亚规则变化，随即更新标准策略包。"
team:
  - role: 创始工程师
    startTiming: 第 0 个月
    rationale: "构建定义切入点的 SDK、策略引擎、审计模型和首批核验供应商集成。"
  - role: 创始销售
    startTiming: 第 0 个月
    rationale: "负责 ICP 调研、试点签约和合作伙伴业务拓展，同时市场和预算模型仍在成型中。"
  - role: 政策与安全信任产品负责人
    startTiming: 第 0 个月
    rationale: "将法规条文和顾问反馈转化为可部署的规则、申诉流程和账户扩展优先级。"
  - role: 解决方案工程师
    startTiming: 第 3 个月
    rationale: "标准化客户集成，防止早期部署演变为定制咨询项目。"
  - role: 隐私与安全工程师
    startTiming: 第 6 个月
    rationale: "在面向更大账户扩展之前强化最小留存架构、企业级管控和审计就绪能力。"
  - role: 合作伙伴负责人
    startTiming: 第 9 个月
    rationale: "在首批成功案例研究完成后，将核验供应商和顾问推荐转化为可重复的管道。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "在 AI 陪伴、创作者社区或粉丝聊天细分中签署 2 至 3 家付费共创伙伴。"
      - "交付覆盖注册、私信、禁用时段、亲密型 AI 模式、审计日志和申诉的英国规则引擎。"
      - "集成至少 2 种核验方式，并将 2 个试点转化为年度生产合同。"
  - horizon: "12–24 个月"
    items:
      - "增加欧盟和澳大利亚规则包，以及一种钱包或设备年龄信号适配器。"
      - "达到 8 个生产客户，并将至少 40% 的客户从单一功能面扩展到三个或更多功能面。"
      - "确立 2 个能产生可重复合格管道的渠道合作伙伴。"
  - horizon: "24–36 个月"
    items:
      - "达到约 18 个生产客户，与研究所得 SOM 一致。"
      - "成为英国和欧盟青少年敏感社交和 AI 应用中的默认青少年策略控制层。"
      - "仅在规则库、申诉数据和合作伙伴网络已具可重复性后，才向相邻类别扩展。"
risks:
  - risk: "英国指引收窄为一种批准的核验方式或供应商名单。"
    likelihood: Medium
    impact: High
    mitigation: "以监管机构或大型平台最终标准化的核验方式之上的策略、审计和申诉层取胜。"
  - risk: "核验供应商、应用商店或操作系统提供商捆绑足够的策略逻辑来压缩独立定价空间。"
    likelihood: High
    impact: High
    mitigation: "在功能面覆盖、覆盖工作流和监管就绪证据方面做得比捆绑核验产品更深。"
  - risk: "体量较小的应用选择地理封锁或过度拦截未成年人，而非购买合规软件。"
    likelihood: Medium
    impact: High
    mitigation: "将销售聚焦于英国青少年流量、创作者流动性或 AI 互动对营收至关重要的应用。"
  - risk: "误判或申诉响应慢产生法律、产品和声誉风险。"
    likelihood: Medium
    impact: High
    mitigation: "在年龄估算上叠加升级核验，设置明确的申诉 SLA，并对边界情形保留人工审核环节。"
  - risk: "隐私审查和企业安全要求使早期部署过于服务密集。"
    likelihood: Medium
    impact: Medium
    mitigation: "保持最小留存，标准化证据模型和部署手册，并在广泛扩张前引进隐私和安全人才。"
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: "$2–4M"
  runwayMonths: 18
  useOfFundsSummary: "为 18 个月的产品、策略和集成工作提供资金，以交付英国控制平面、将 2 至 3 个付费试点转化为生产合同、确立初始核验供应商和顾问渠道，并在种子轮前证明多司法管辖区扩展已产品化。"
