problem: >-
  UK-facing consumer apps with teen traffic now face a non-discretionary
  product-compliance problem: either collect more identity data than they want,
  or risk missing a fast-moving under-16 mandate. The hard part is not only
  deciding whether a user is 15 or 17; it is mapping noisy age signals into
  feature-level rules for signup, messaging, feeds, quiet hours, and AI
  personas while preserving evidence for counsel and app-store partners.
  Mid-market apps lack the in-house trust-and-safety and policy-engineering
  teams that global incumbents can afford, so they default to blunt geoblocks,
  point age-check vendors, or brittle manual feature flags.
targetUser:
  primary: "Heads of trust and safety, product compliance, and platform engineering at UK-facing social, community, and AI companion apps with under-18 traffic."
  secondary: "Policy operations teams and outside counsel helping those apps convert youth-safety rules into product requirements."
  buyer: "VP Trust and Safety, Chief Product Officer, or General Counsel"
startupThesis:
  nonObviousInsight: >-
    Age estimation itself is not the scarce layer. The new bottleneck is
    turning multiple noisy age proofs into one auditable product-policy
    decision as regulators expand from \"is this user old enough?\" to \"which
    features may this age band use, when, and under what guardrails?\"
  beachhead: >-
    Venture-backed AI companion, fandom-chat, and creator-community apps with
    500,000 to 5 million monthly active users, more than 10% UK traffic, and
    direct-messaging or persona features that could be restricted for under-16
    users
  wedge: >-
    An age-band policy engine that combines selfie-age, banking-age, and
    government-ID fallback signals into one confidence score, then automatically
    enforces UK rules across signup, feed access, direct messaging, quiet
    hours, and romantic AI modes with audit logs
  whyNowCatalyst: >-
    Starmer's June 15 announcement and the promised transition window force
    product teams to ship auditable under-16 and under-18 controls before the
    UK has even finalized one verification method.
  ventureScalePath: >-
    Start as the compliance control plane for UK youth-access rules, then
    expand into the global age-policy layer for social apps, gaming communities,
    creator platforms, and AI companions navigating diverging child-safety laws
    across the UK, Australia, Europe, and U.S. states.
solution: >-
  Teen Access Policy Engine is an SDK, rules engine, and audit console for
  consumer apps that need age-banded experiences. The product accepts multiple
  verification inputs already under government discussion—facial age
  estimation, government ID checks, banking-age signals, and manual review—and
  stores only the minimum policy output: age band, confidence, jurisdiction,
  and consent state. Product teams attach the SDK to signup, messaging, feed
  ranking, notification schedules, and AI persona endpoints; the engine returns
  whether a flow is allowed, blocked, or requires a stricter check. Counsel and
  trust-and-safety teams get a policy log showing which rule version fired,
  which evidence supported the decision, and where uncertain users were
  escalated. That turns a messy one-off compliance sprint into a reusable safety
  layer that can absorb future UK, Australian, and EU rule changes.
goToMarketSeed:
  firstCustomer: >-
    A UK- or EU-based AI companion or creator-community app with 1 million to 5
    million MAUs, 15% to 30% UK traffic, under 8 people across legal and trust
    and safety, and a live need to decide whether to block under-16 signups or
    disable direct messaging and persona features in the UK
  buyingTrigger: >-
    The board, general counsel, or an app-store or distribution partner asks
    for a concrete UK under-16 compliance plan during the transition window
    immediately after the June 15 announcement
  currentAlternative: >-
    One-off age-check vendors, manual feature flags, internal middleware,
    outside counsel, or blanket UK geoblocking for younger users
  switchingReason: >-
    The wedge beats point solutions because it separates proof-of-age from
    product policy, letting the app swap verification methods while shipping
    auditable feature controls fast and with less retained PII
  pricingHypothesis: >-
    Annual SaaS fee priced by UK monthly active users and protected decision
    calls, plus setup fees for SDK integration and jurisdiction-specific rule
    configuration
