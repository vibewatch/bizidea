topRisks:
  - name: "Method mandate lock-in"
    description: "If the UK later mandates one narrow proof method or approved supplier set, a generic orchestration story could shrink."
    mitigation: "Own the feature-policy and audit layer above any mandated proof method, and integrate quickly with whichever suppliers regulators or platforms standardize on."
  - name: "Incumbent bundling"
    description: "Identity and trust vendors could add lightweight age-policy features and bundle them into existing contracts."
    mitigation: "Go deeper on consumer-product surfaces like messaging, feeds, quiet hours, and AI personas where generic verification vendors do not model workflow or evidence needs well."
  - name: "Customer avoidance"
    description: "Some smaller apps may simply block UK minors or exit the segment instead of paying for compliance software."
    mitigation: "Target apps where UK youth traffic and chat or AI engagement are revenue-critical, then expand into adjacent global youth-safety rules once the product proves ROI."
