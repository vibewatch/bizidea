openQuestions:
- Will the UK ultimately mandate one approved proof method or a certified supplier list, narrowing supplier choice?
- Where will UK enforcement finally draw the line between social, community, gaming, and AI companion services?
- Will app stores and OS providers become the default source of age signals for most consumer apps?
- What error rate and appeal experience will regulators and large app-store partners consider acceptable for 16-17 users and adults?
