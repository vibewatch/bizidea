competitors:
- name: k-ID
  stage: scale-up
  wedge: Jurisdiction-aware child-safety compliance SDK/API with gaming roots and configurable age and feature logic.
  pricing: Usage-based; public launch coverage said pricing starts free and scales by active players.
  strength: Closest current wedge to a policy control plane.
  weaknessVsUs: Gaming-first packaging and less explicit coverage of social/AI surfaces like DM, quiet hours, and romantic personas.
  sourceRefs:
  - 57
  - 58
- name: Yoti
  stage: scale-up
  wedge: Facial age estimation, reusable digital ID, and multi-method trust-and-safety checks.
  pricing: Custom / public quote only.
  strength: Strong privacy positioning and independently referenced age-estimation credibility.
  weaknessVsUs: Primarily a proof layer; customers still own feature-level policy orchestration.
  sourceRefs:
  - 61
  - 65
- name: VerifyMy
  stage: scale-up
  wedge: UK-focused age verification/estimation with privacy, moderation, and compliance positioning.
  pricing: Custom / public quote only.
  strength: UK regulatory fit and product breadth across verification plus moderation.
  weaknessVsUs: Less evidence of a reusable cross-surface rules engine for social/AI workflows.
  sourceRefs:
  - 68
- name: OneID
  stage: scale-up
  wedge: Bank-linked, document, and facial age verification for UK use cases with open standards.
  pricing: Public pricing from £15.65 / month for 50 checks to £2,720 / month for 10,000 checks.
  strength: Concrete UK verification rails and transparent unit pricing.
  weaknessVsUs: Verification-first; does not own in-app policy logic across feeds, chat, AI, and appeals.
  sourceRefs:
  - 74
  - 82
  - 83
