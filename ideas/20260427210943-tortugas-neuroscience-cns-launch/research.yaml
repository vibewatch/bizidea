openQuestions:
- Can a CNS-specific overlay command budget before a study has generated its first interim signal, or will buyers insist it be buried inside the CRO SOW?
- 'Which early product KPI is most convincing in pilots: faster enrollment, lower screen-fail rate, better adherence, or lower endpoint variance?'
- How much of the workflow can be owned without creating validation or territory conflict with incumbent eCOA vendors?
- Is tinnitus large enough as a first niche, or should the wedge start in schizophrenia and expand into tinnitus only after proving signal-quality gains?
