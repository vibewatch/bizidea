  validationPlan:
  - priority: high
    question: Will CMOs buy a separate CNS signal layer if the CRO and eCOA vendor are already selected?
    evidenceToGather: 10-15 interviews with CMOs and VP Clinical Ops plus recent study budgets/SOWs.
  - priority: high
    question: 'Which early KPI is most convincing in pilots: faster enrollment, lower screen-fail rate, better adherence, or lower endpoint variance?'
    evidenceToGather: Protocol reviews, pilot data, and postmortems from failed or noisy neuro trials.
  - priority: medium
    question: How much integration burden will incumbents impose?
    evidenceToGather: Technical diligence with two eCOA vendors and one CRO quality lead.
  - priority: medium
    question: Is tinnitus large enough as a first niche?
    evidenceToGather: Study-volume mapping across schizophrenia, tinnitus, and epilepsy sponsors.
