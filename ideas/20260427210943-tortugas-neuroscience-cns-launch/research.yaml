competitors:
- name: Signant Health
  stage: incumbent
  wedge: CNS trial expertise layered onto enterprise eCOA and site-integrated workflows.
  pricing: Custom enterprise pricing; no public list price.
  strength: Deep CNS track record, global scale, and heavy scientific-services wrapper.
  weaknessVsUs: Broad platform orientation; less obviously built for one-study CNS overlays at small asset-led biotechs.
  sourceRefs:
  - 3
  - 12
- name: Clario
  stage: incumbent
  wedge: Large-scale eCOA and assessment-library vendor for global studies.
  pricing: Custom enterprise pricing; no public contract pricing.
  strength: Global language coverage and long assessment-library history.
  weaknessVsUs: Generalist eCOA position rather than CNS-specific recruitment + signal workflow.
  sourceRefs:
  - 20
- name: Medable
  stage: scale-up
  wedge: Modern DCT/eCOA platform emphasizing faster build, AI, and CRO-partner workflows.
  pricing: Hybrid/self-service/custom; partner-program messaging emphasizes transparent pricing rather than public list rates.
  strength: Fast study build, broad digital stack, and strong ecosystem.
  weaknessVsUs: Horizontal trial infrastructure rather than a narrow CNS signal layer.
  sourceRefs:
  - 8
  - 9
- name: Koneksa Health
  stage: scale-up
  wedge: Measurement-science partner for validated digital biomarkers and neuroscience use cases.
  pricing: Custom study-based pricing; not public.
  strength: High specialization in digital measures and neuroscience signal design.
  weaknessVsUs: More biomarker- and algorithm-centric than full study-startup or site-performance workflow.
  sourceRefs:
  - 15
  - 16
- name: Cogstate
  stage: incumbent-specialist
  wedge: Digital cognitive assessment and central-rater services with schizophrenia expertise.
  pricing: Custom enterprise/services pricing; not public.
  strength: Validated neurocognitive assessments and strong schizophrenia credibility.
  weaknessVsUs: Narrower endpoint module, less comprehensive around recruitment and site ops.
  sourceRefs:
  - 18
  - 19
