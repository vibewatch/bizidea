jobsToBeDone:
- job: 当一项新近授权引进的 CNS 资产即将进入 II 期时，帮助生物科技公司的临床团队识别合适患者并采集更干净的神经结局数据，以便在烧掉下一笔资本之前，对是否继续推进做出有把握的 go / no-go 决策。
  currentAlternative: 依赖 CRO 的招募流程、通用 ePRO 工具和人工研究中心管理
  successMetric: 首例患者入组时间、入组转化率，以及主要终点数据的方差下降幅度
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 该主题显示出投资人强烈信心，以及向资产驱动型 CNS 公司组建方式转移的明确趋势。
  painIntensity:
    score: 5
    rationale: 失败或高噪声的 CNS 试验会毁掉巨额资本，并延误重症适应症患者获得治疗的时间。
  wedgeClarity:
    score: 4
    rationale: 初始切入点足够聚焦且可执行，但要证明优于以 CRO 为中心的工作流，仍需强有力的试点。
  defensibility:
    score: 4
    rationale: 专有的适应症级结局数据与嵌入式试验工作流，能够逐步累积成有意义的护城河。
  ventureScale:
    score: 4
    rationale: 聚焦的滩头阵地有机会扩展为覆盖生物科技与制药公司组合的更广泛 CNS 开发基础设施。
topRisks:
- name: 生物科技销售周期缓慢
  description: 小型 CNS 生物科技公司可能会在融资完成、方案锁定之前推迟采购新工具。
  mitigation: 在资产切换时点切入，提供可嵌入现有 CRO 预算和时间表的轻量覆盖层。
- name: 临床差异化不足
  description: 如果平台无法明显提升入组质量或终点可靠性，赞助方仍会回到现有供应商。
  mitigation: 先聚焦 1-2 个适应症，开展范围严格控制的试点，并发布基于赞助方结果的可量化运营增益基准。
- name: 监管与数据质量复杂性
  description: 在受监管研究中，远程神经终点采集会带来验证、合规和接受度挑战。
  mitigation: 初期把主张限定为运营决策支持，接入已验证的试验系统，并从第一天开始建设质量文档。
