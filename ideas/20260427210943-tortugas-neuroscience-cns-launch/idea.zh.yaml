problem: >-
  围绕授权引进的临床阶段资产组建的 CNS 生物科技公司越来越多，但它们接手的同时也继承了这个赛道最难的一段：在症状主观、患者分散、研究中心表现不一致的适应症里证明疗效。早期团队往往只能依赖 CRO、通用 ePRO 工具和手工筛选流程，结果是入组变慢、信号更浑。这样一来，一项设计乏力或观测手段不够扎实的 Phase II 研究，很容易就烧掉几千万美元。
targetUser:
  primary: 围绕 2-5 个授权引进的临床阶段资产组建的种子轮到 Series A 阶段 CNS 生物科技公司的临床开发负责人或首席医疗官
  secondary: 在精神分裂症、耳鸣或癫痫相关适应症上推进概念验证研究的中型神经药企临床运营负责人
  buyer: 风险投资支持的 CNS 生物科技公司的首席医疗官或临床运营副总裁
startupThesis:
  nonObviousInsight: 真正变化的不是 CNS 生物学，而是公司的组建方式。越来越多创业公司围绕授权引进的临床资产成立后，瓶颈就从分子发现转向更快的患者分层、更客观的终点采集，以及在高噪声神经适应症之间快速调整方案。
  beachhead: 面向内部临床团队精简、且刚把耳鸣或精神分裂症资产授权引入公司的风险投资支持型 CNS 生物科技公司的 Phase II 概念验证研究
  wedge: 一个与方案深度绑定的患者筛选、数字化终点和研究中心绩效执行层，一次服务一个 CNS 研究，叠加在 CRO 和标准 eCOA 栈之上
  whyNowCatalyst: Tortugas 围绕 4 个授权引进的临床阶段 CNS 资产以 $106M 融资亮相，说明未来会有更多资本投向这类项目，而这些项目能否继续推进，取决于执行速度和试验信号是否更干净。
  ventureScalePath: 先从资产驱动型 CNS 初创公司的一项研究叠加层切入，再扩展成多适应症神经试验网络、专有纵向数据集、富含生物标志物的方案设计能力，最终把平台卖给更大的生物制药公司，用于整个 CNS 研发组合。
solution: 这家公司提供一个 CNS 试验信号层，把预筛选流程、远程症状采集、可穿戴设备或智能手机行为终点，以及针对具体方案定制的研究中心评分卡放到一起。它不是替换赞助方现有的 CRO 和 eCOA，而是叠加其上，因此精简团队也能落地。第一版产品包帮助赞助方识别更高概率患者、减少方案偏离，并在精神分裂症和耳鸣研究中拿到更干净的中期读数。随着时间推移，平台会积累跨试验的神经结局数据，持续提升后续项目的入组定向能力和终点选择质量。
goToMarketSeed:
  firstCustomer: 一家刚完成融资、拥有 1 个可直接进入 Phase II 的耳鸣或精神分裂症授权资产，且内部临床开发人员少于 15 人的 CNS 生物科技公司
  buyingTrigger: 公司刚授权引入或收购一个临床阶段 CNS 资产，需要在首例患者入组前敲定研究中心选择和终点采集方案
  currentAlternative: 由 CRO 主导的试验运营，加上通用 ePRO/eCOA 供应商，以及基于电子表格的手工招募追踪
  switchingReason: 这个切口能在不逼赞助方更换 CRO 的前提下，加快入组并拿到更干净的信号；相比给一个难以测量的 CNS 研究临时拼装通用工具，明显更好。
  pricingHypothesis: 按活跃患者队列计费的单研究 SaaS + 服务费，再收取一笔按方案定制终点配置的设置费
whyNow:
  - point: 资本正流向以临床阶段资产起步的 CNS 初创公司，这会在授权交易落地后立刻推高对执行工具的需求。
    signalRefs: [资本正在押注资产驱动型 CNS 初创公司]
    sourceRefs: [1]
  - point: 靠授权引进快速组建管线会压缩时间表，因此赞助方会比传统发现阶段生物科技公司更早需要试验就绪基础设施。
    signalRefs: [授权引进的临床资产可以快速拼出 CNS 管线]
    sourceRefs: [1]
  - point: 精神分裂症、耳鸣和癫痫相关研究都很难稳定测量，因此客观化、远程化的结局采集更有价值。
    signalRefs: [CNS 扩张正覆盖多个难以稳定测量的适应症]
    sourceRefs: [1]
  - point: 投资人已经在为这个赛道的资深团队下注，这意味着对新一代 CNS 公司来说，试验执行正成为新的分化来源。
    signalRefs: [投资人偏好能把高难度 CNS 项目真正跑起来的团队]
    sourceRefs: [1]
differentiator: 大多数临床试验软件并不按适应症优化，大多数 CRO 也更在意运营吞吐，而不是如何从一堆混乱的神经终点里抽出干净信号。这个创业公司能赢，是因为它只盯着 CNS 概念验证研究，围绕具体方案搭工作流、患者分型逻辑和适应症级基准数据，而且每做完一项研究都会更强。这会同时形成工作流护城河和神经结局数据护城河。
