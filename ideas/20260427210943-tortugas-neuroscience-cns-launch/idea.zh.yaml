problem: 围绕引进授权临床资产成立的 CNS 生物科技公司越来越多，但它们继承下来的恰恰是这个赛道最棘手的部分：在症状主观、患者分散、研究中心表现不一致的适应症中证明疗效。早期团队通常依赖 CRO、通用 ePRO 工具和人工筛选流程，导致入组缓慢、信号识别模糊。结果往往是在样本量不足或量测设计不佳的 II 期研究中烧掉数千万美元。
targetUser:
  primary: 围绕 2-5 项引进授权临床阶段资产搭建的种子轮至 Series A 阶段 CNS 生物科技公司的临床开发负责人或首席医学官
  secondary: 在精神分裂症、耳鸣或癫痫相关适应症中运行概念验证研究的中型神经药企临床运营负责人
  buyer: 获风投注资的 CNS 生物科技公司的首席医学官或临床运营副总裁
startupThesis:
  nonObviousInsight: 真正变化的不是 CNS 生物学本身，而是公司的组建方式。随着越来越多初创公司围绕授权引进的临床资产成立，瓶颈正从分子发现转向更快的患者分层、客观终点采集，以及在高噪声神经适应症中的方案动态优化。
  beachhead: 内部临床团队精简、刚把耳鸣和精神分裂症资产授权引入的获风投支持的 CNS 生物科技公司所开展的 II 期概念验证研究
  wedge: 叠加在 CRO 和标准 eCOA 栈之上的、与方案联动的患者筛选、数字化终点和研究中心表现管理层，一次服务一个 CNS 研究
  whyNowCatalyst: Tortugas 围绕 4 项已授权的临床阶段 CNS 资产完成 $106M 融资并正式亮相，表明更多资本将流向那些最终是否继续推进，取决于执行速度和试验信号清晰度的项目。
  ventureScalePath: 先从服务资产驱动型 CNS 初创公司的单研究覆盖层切入，再扩展为多适应症神经试验网络、专有纵向数据集、富生物标志物的方案设计，最终成为面向大型生物制药公司的全组合 CNS 开发平台。
solution: 公司提供一层 CNS 试验信号层，把预筛流程、远程症状采集、基于可穿戴设备或智能手机的行为终点，以及按方案定制的研究中心评分卡整合在一起。它不是替换赞助方的 CRO 和现有 eCOA，而是与其对接，因此更适合人员精简的生物科技团队采用。首个产品包帮助赞助方识别更高概率患者、减少方案偏差，并在精神分裂症和耳鸣研究中产出更干净的中期读数。随着时间推移，平台会沉淀跨研究的神经结局数据，从而改进后续项目的入组定位与终点选择。
goToMarketSeed:
  firstCustomer: 一家刚完成融资、拥有 1 项可进入 II 期的耳鸣或精神分裂症授权资产、且内部临床开发人员少于 15 人的 CNS 生物科技公司
  buyingTrigger: 公司完成临床阶段 CNS 资产的授权引进或收购，并需要在首例患者入组前敲定研究中心选择和终点采集方案
  currentAlternative: 以 CRO 主导的试验运营，加上通用 ePRO/eCOA 供应商和基于表格的人工招募跟踪
  switchingReason: 该切入点能在不要求赞助方更换 CRO 的前提下实现更快入组和更清晰信号，这明显优于用一堆通用工具拼接出一个难以量化的 CNS 研究方案。
  pricingHypothesis: 按活跃患者队列计价的单研究 SaaS + 服务费，并收取面向特定方案的终点配置设置费
