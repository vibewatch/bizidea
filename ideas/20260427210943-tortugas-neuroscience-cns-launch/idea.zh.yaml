jobsToBeDone:
  - job: 当一个新授权引进的 CNS 资产即将进入 Phase II 时，帮助生物科技公司的临床团队找到更合适的患者，并采集更干净的神经结局数据，这样他们就能在烧掉下一笔资金之前，更有把握地做出继续或停止的决策。
    currentAlternative: 由 CRO 主导的招募流程，搭配通用 ePRO 工具和手工研究中心管理
    successMetric: 首例患者入组时间、入组转化率，以及主要终点数据方差的下降幅度
ideaScorecard:
  signalStrength:
    score: 5
    rationale: 这个主题簇体现出很强的投资人信心，也清楚显示公司组建正向资产驱动型 CNS 模式转移。
  painIntensity:
    score: 5
    rationale: 失败或噪声过高的 CNS 试验会摧毁巨额资本，也会延误重症患者获得治疗的时间。
  wedgeClarity:
    score: 4
    rationale: 初始切口足够窄，也能执行；但想证明自己比以 CRO 为中心的流程更强，还需要很扎实的试点。
  defensibility:
    score: 4
    rationale: 专有的适应症级结局数据与嵌入式试验工作流，可以逐步累积成有意义的护城河。
  ventureScale:
    score: 4
    rationale: 这个聚焦明确的滩头市场，有机会扩展成覆盖生物科技和制药组合的更广义 CNS 开发基础设施。
topRisks:
  - name: 生物科技销售周期偏慢
    description: 小型 CNS 生物科技公司可能要等融资完成、方案锁定后，才愿意采购新工具。
    mitigation: 在资产切换时点切入，提供能嵌进既有 CRO 预算和时间表的轻量叠加层。
  - name: 临床差异化不足
    description: 如果平台不能明显改善入组质量或终点可靠性，赞助方还是会回到现有厂商。
    mitigation: 先聚焦一到两个适应症，跑边界清晰的试点，并拿出赞助方层面的可量化运营收益基准。
  - name: 监管与数据质量复杂度高
    description: 在受监管研究里，远程神经终点采集会带来验证、合规和接受度挑战。
    mitigation: 早期只主打运营决策支持，接入已验证的试验系统，并从第一天就把质量文档建起来。
