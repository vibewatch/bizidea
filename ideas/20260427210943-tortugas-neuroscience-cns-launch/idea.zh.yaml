differentiator: 大多数临床试验软件并不针对特定适应症，大多数 CRO 优化的也是运营吞吐量，而不是从嘈杂的神经终点中提取干净信号。本公司通过聚焦狭窄的 CNS 概念验证研究、构建方案特定工作流、患者表型逻辑与适应症级基准数据来取胜，并在每一项研究中持续强化。这会同时形成工作流护城河和专有神经结局数据护城河。
