    value: '168.0'
    unit: USDK per year
    source: "[BP team Commercial lead]; startup finance heuristic for first biotech enterprise seller plus payroll load."
  - id: A16
    name: Customer success loaded compensation
    value: '132.0'
    unit: USDK per year
    source: "[BP milestones repeatable deployment playbooks]; startup finance heuristic for first customer success / implementation hire plus payroll load."
  - id: A17
    name: Second engineering hire loaded compensation
    value: '168.0'
    unit: USDK per year
    source: "Startup finance heuristic anchored to [BP operations + milestones] adding product capacity only after repeatable Y2 pilot conversion."
  - id: A18
    name: Hiring timeline
    value: "M1 founder, founding engineer, clinical product; M4 data and quality; M7 solutions; M10 commercial; M16 customer success; M22 second engineer"
    unit: timeline
    source: "[BP team startTiming] first five hires follow plan; month-16 and month-22 additions are conservative finance heuristics needed for repeatable deployment and productization."
  - id: A19
    name: Non-payroll operating spend ramp
    value: "S&M $4K M1-M6, $5K M7-M9, $8K M10-M12, $10K Y2, $12K Y3; R&D tools/compliance $8K M1-M3, $10K M4-M6, $12K M7-Y2, $14K Y3; G&A $6K M1-M6, $7K M7-M12, $8K Y2, $9K Y3"
    unit: USDK per month
    source: "[BP operations + regulatory risk + gtm channels]; startup finance heuristic for cloud, audit readiness, travel, legal, insurance, and partner onboarding."
  - id: A20
    name: Monthly sponsor / study churn
    value: '3.5%'
    unit: percent per month
    source: "Startup finance heuristic for study-based enterprise software where contracts are sticky during a study but completion-driven attrition is material."
  - id: A21
    name: Funding ask sizing rule
    value: 24-month milestone plus 6-month buffer
    unit: policy
    source: "Developer instruction; [BP fundingAsk runwayMonths 18] base case extends beyond the plan's minimum runway to reach repeatable study-start proof before the next raise."
