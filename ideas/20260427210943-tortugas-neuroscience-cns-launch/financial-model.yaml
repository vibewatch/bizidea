scenarios:
  downside:
    description: "Budget pull stays weaker than planned, so CRO-compatible pilots convert more slowly and active studies peak at 6 instead of 7 in Y3."
    y3RevenueK: 1620.0
    y3EbitdaK: -420.0
    cashLowPointK: 305.0
    keyAssumptionChanges:
      - "ARPU falls to $300K as more work is sold as pilot-heavy scopes."
      - "Gross margin exits Y3 at 68% instead of 72% because QA and implementation stay manual."
      - "Sales cycles lengthen by roughly one quarter, reducing Y2 and Y3 study starts."
  base:
    description: "Three Y1 pilots become a repeatable schizophrenia study-start motion, letting the company reach 7 active studies and near-breakeven EBITDA by Q4Y3."
    y3RevenueK: 2186.25
    y3EbitdaK: -111.49
    cashLowPointK: 894.83
    keyAssumptionChanges:
      - "Blended active-study ARPU stays at $330K with setup fees plus monitoring revenue."
      - "Gross margin ramps to 72% as templates reduce services intensity."
      - "Hiring stays capped at 8 FTE through Y3."
  upside:
    description: "Operational ROI proves out early, unlocking faster second-study expansions and one adjacent-indication module before the next raise."
    y3RevenueK: 2810.0
    y3EbitdaK: 170.0
    cashLowPointK: 960.0
    keyAssumptionChanges:
      - "ARPU rises to $350K as more contracts include premium analytics and multi-study scope."
      - "Active studies reach 9 by Q4Y3 through faster pilot-to-production conversion."
      - "Gross margin reaches 74% with better reuse of protocol templates."
sensitivity:
  - variable: ARPU
    downsideCase: "$300K blended annual revenue per active study"
    baseCase: "$330K blended annual revenue per active study"
    upsideCase: "$350K blended annual revenue per active study"
    y3RevenueImpactK: -198.75
    cashImpactK: -143.1
  - variable: CAC
    downsideCase: "$70K CAC if founder-led sales does not become repeatable"
    baseCase: "$55K CAC on 15 gross study wins in Y2-Y3"
    upsideCase: "$45K CAC with stronger CRO and investor referrals"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: churn
    downsideCase: "4.5% monthly sponsor / study churn from more one-and-done studies"
    baseCase: "3.5% monthly sponsor / study churn"
    upsideCase: "2.5% monthly churn from better second-study expansion"
    y3RevenueImpactK: -165.0
    cashImpactK: -118.0
  - variable: sales cycle
    downsideCase: "Average close slips one quarter because budgets stay inside CRO SOWs"
    baseCase: "Study-start trigger closes inside the quarter"
    upsideCase: "Pilot closes one month faster through reference customers"
    y3RevenueImpactK: -330.0
    cashImpactK: -240.0
  - variable: gross margin
    downsideCase: "68% exit gross margin from heavier services and QA support"
    baseCase: "72% exit gross margin"
    upsideCase: "74% exit gross margin with better template reuse"
    y3RevenueImpactK: 0.0
    cashImpactK: -87.0
  - variable: hiring pace
    downsideCase: "Commercial and implementation hires come 2 quarters earlier"
    baseCase: "Hiring capped at 8 FTE through Y3"
    upsideCase: "One noncritical hire delayed until after next round"
    y3RevenueImpactK: 0.0
    cashImpactK: -250.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      LicensedAssets --> StudyStart
      StudyStart --> OverlaySale
      OverlaySale --> ActiveStudies
      ActiveStudies --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: Revenue engine
    finding: "Base-case revenue is driven by 3 paid studies in Y1 growing to 7 active studies by Q4Y3 at a blended $330K annual contract value."
  - checkName: Must go right
    finding: "The company has to win budget before first-patient-in and convert at least 2 early pilots into full-study contracts, or the Y2 study ramp breaks."
  - checkName: Model breaks if
    finding: "A one-quarter slip in sales cycle or a drop to 68% gross margin removes roughly $240K of cash and pushes the pre-seed cushion close to the downside low point."
  - checkName: Next-round proof
    finding: "The next financing is justified if the company reaches 8-12 cumulative paying study contracts with repeatable schizophrenia KPI proof and a clear second-indication expansion path."
sanityChecks:
  ruleOf40: "Y3 growth 55.9% + EBITDA margin -5.1% = 50.8%"
  burnMultiple: "0.14x in Y3 ($111.5K net burn on $783.8K net new revenue)."
  revenuePerFte: "$273K Y3 revenue per Q4 FTE (7 active studies on 8 FTE), reasonable for a high-touch vertical trial software business."
  flags:
    - "The model assumes buyers fund a standalone overlay before first-patient-in even when CRO and eCOA vendors are already selected; the BP explicitly says this still needs live proof."
    - "Revenue is concentrated in a small number of studies, so one delayed sponsor start can move quarterly revenue by roughly $80K-$140K."
    - "Y3 is still slightly EBITDA-negative, which means the next round must be earned with KPI proof and repeatability, not with profitability."
