problem: >-
  CNS biotechs increasingly launch around in-licensed clinical assets, but they still inherit the hardest part of the
  category: proving efficacy in indications with subjective symptoms, fragmented patients, and inconsistent site
  performance. Early teams often rely on CROs, generic ePRO tools, and manual screening, which slows enrollment and
  muddies signal detection. That makes it easy to burn tens of millions on underpowered or poorly instrumented Phase
  II studies.
targetUser:
  primary: Head of Clinical Development or CMO at a seed-to-Series A CNS biotech built around 2-5 in-licensed clinical-stage assets
  secondary: Clinical operations leads at mid-sized neuro-pharma teams running proof-of-concept studies in schizophrenia, tinnitus, or epilepsy-related indications
  buyer: Chief Medical Officer or VP Clinical Operations at venture-backed CNS biotechs
startupThesis:
  nonObviousInsight: What changed is not CNS biology; it is company formation. As more startups are formed around licensed clinical assets, the bottleneck shifts from molecule discovery to faster patient stratification, objective endpoint capture, and protocol adaptation across noisy neuro indications.
  beachhead: Phase II proof-of-concept studies for tinnitus and schizophrenia assets newly licensed into venture-backed CNS biotechs with lean internal clinical teams
  wedge: A protocol-linked patient screening, digital endpoint, and site-performance layer that sits on top of the CRO and standard eCOA stack for one CNS study at a time
  whyNowCatalyst: Tortugas' $106M launch around four licensed clinical-stage CNS assets shows that more capital will be deployed into programs where execution speed and cleaner trial signal determine whether the asset is worth advancing.
  ventureScalePath: Start with one-study overlays for asset-led CNS startups, then expand into a multi-indication neuro trial network, proprietary longitudinal datasets, biomarker-enriched protocol design, and finally a platform sold to larger biopharma for portfolio-wide CNS development.
solution: The company provides a CNS trial signal layer that combines pre-screening workflows, remote symptom capture, wearable or smartphone-based behavioral endpoints, and site scorecards tailored to each protocol. It plugs into the sponsor's CRO and existing eCOA setup rather than replacing them, making adoption feasible for lean biotech teams. The first product package helps sponsors identify higher-probability patients, reduce protocol deviations, and generate cleaner interim reads in schizophrenia and tinnitus studies. Over time, the platform accumulates cross-trial neuro-outcome data that improves enrollment targeting and endpoint selection for future programs.
goToMarketSeed:
  firstCustomer: A newly funded CNS biotech with one licensed Phase II-ready tinnitus or schizophrenia asset and fewer than 15 internal clinical development staff
  buyingTrigger: The company licenses or acquires a clinical-stage CNS asset and needs to finalize site selection and endpoint instrumentation before first-patient-in
  currentAlternative: CRO-led trial operations plus generic ePRO/eCOA vendors and manual spreadsheet-based recruitment tracking
  switchingReason: The wedge offers faster enrollment and cleaner signal without forcing the sponsor to replace its CRO, which is materially better than bolting together generic tools for a hard-to-measure CNS study
  pricingHypothesis: Per-study SaaS and services fee priced by active patient cohort plus a setup fee for protocol-specific endpoint configuration
