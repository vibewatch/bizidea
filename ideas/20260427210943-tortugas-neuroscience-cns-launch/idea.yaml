topRisks:
  - name: Slow biotech sales cycles
    description: Small CNS biotechs may delay new tooling purchases until financing closes and protocols are locked.
    mitigation: Sell at the asset-transition moment with a lightweight overlay that fits inside existing CRO budgets and timelines.
  - name: Insufficient clinical differentiation
    description: If the platform does not clearly improve enrollment quality or endpoint reliability, sponsors will default to incumbents.
    mitigation: Start with one or two indications, run tightly scoped pilots, and publish sponsor-level benchmarks on measurable operational gains.
  - name: Regulatory and data quality complexity
    description: Remote neuro endpoint capture can create validation, compliance, and acceptance challenges in regulated studies.
    mitigation: Limit initial claims to operational decision support, integrate with validated trial systems, and build quality documentation from day one.
