slug: cns-trial-signal-layer
date: 2026-04-27
executiveSummary: 这家公司应被打造为一层面向新近融资 CNS 生物科技公司的试验信号层，服务对象是那些通过授权引进获得临床阶段神经资产、并需要更快、更干净地完成 II 期验证的团队。最直接的购买方，是拥有 2-5 项资产、团队精简、必须在首例患者入组前敲定研究中心、筛选逻辑和终点采集方案的 CNS 生物科技公司的 CMO 或临床运营副总裁。首个产品不应替代 CRO 或核心 eCOA 栈，而应叠加其上，作为与方案联动的覆盖层，提供患者预筛、远程症状采集、研究中心评分卡和中期信号质量监测。最佳起步切入点是美国和欧洲的精神分裂症概念验证研究，因为相较于仅做耳鸣，这里的痛点更尖锐、研究量更可信，且购买触发点与明确的试验启动事件绑定。研究表明，高噪声 CNS 终点、安慰剂反应和基线膨胀确实带来真实痛点，但尚未证明在 CRO 和 eCOA 供应商已选定后，赞助方仍会为一层独立覆盖层买单。如果公司先证明可量化的运营 ROI，例如更低的筛选失败率和更快的入组速度，再逐步沉淀跨研究 CNS 数据集以改进方案设计和研究中心选择，就有机会胜出。战略风险在于滩头市场经济规模偏窄，而现有厂商仍在持续压缩实施周期，因此向更广泛神经产品组合工作流的扩张必须靠实绩赢得，而不能预设。总体上，这是一个可信的建公司方向，但董事会层面的核心问题是：早期试点是否能拉动足够强的预算意愿，从而支撑一个独立产品品类。
problem:
- CNS II 期研究往往难以展示清晰疗效，因为主观终点、安慰剂反应、基线膨胀和研究中心差异会淹没真实信号。
- 新近融资、以资产为核心的 CNS 生物科技公司虽然接手了临床阶段项目，但通常仍以精简团队、通用 eCOA 工具、重度依赖 CRO 的流程和人工筛选来推进。
- 赞助方可能在尚未搞清楚是资产本身失败还是试验执行失败之前，就在一个高噪声研究上烧掉数千万美元。
solution:
- 提供一层兼容 CRO 的覆盖层，用于面向特定方案的患者预筛、远程症状采集、行为终点收集和研究中心表现监测。
- 把首个产品打包为围绕一项真实在研试验的解决方案，使赞助方能在中期读数前提升入组质量、减少方案偏差并监控信号可靠性。
- 围绕筛选、依从性、终点波动和研究中心行为建立纵向 CNS 研究数据集，以改进未来的方案和产品组合决策。
whyWeWin:
- 产品围绕高噪声 CNS 概念验证研究这一真实痛点高度专业化，而不是泛化的试验基础设施。
- 购买触发点非常具体，因为预算出现在新授权资产准备启动研究的时候，而不是作为一次投机性的通用软件采购。
- 覆盖层模式更符合赞助方当前通过 CRO 和研究启动预算进行采购的习惯，相比整套替换平台更易被采用。
- 如果早期部署能够持续沉淀筛选质量、终点方差和研究中心表现数据，公司就能逐步形成疾病特定的工作流和数据护城河。
strategicChoices:
  beachhead: 美国和欧洲市场中，获风投注资、内部临床开发人员少于 15 人、拥有新近授权临床阶段资产的 CNS 生物科技公司所开展的精神分裂症 II 期概念验证研究。
  wedgeRationale: 与以耳鸣为第一切入点相比，精神分裂症在信号质量痛点的紧迫性、可信研究量以及董事会层面的 go / no-go 后果之间提供了更清晰的组合。与同时服务所有神经适应症相比，它也更容易更快地验证，因为公司可以先围绕单一方案家族、单一买方画像和单一 ROI 叙事完成标准化。
  sequencingRationale: 先从一层高接触覆盖层开始，在单项研究内证明运营 ROI；随后把筛选工作流、终点仪表盘和研究中心评分卡产品化；只有在反复跑通之后，再扩展到组合分析、相邻神经适应症以及更深层的富生物标志物方案设计。这样可以让产品范围、销售动作、招聘节奏和验证负担都围绕同一个首客户时刻保持一致。
  notYet:
  - 不把“耳鸣优先”作为主要滩头定位
  - 在尚未证明精神分裂症工作流之前，不提前铺开广泛癫痫和多适应症神经覆盖
  - 不做完整 eCOA、EDC 或 CRO 替代
  - 不做需要比首个产品更重验证负担的 AI 驱动终点主张
  - 前 24 个月不进入中国或其他复杂跨境部署市场
market:
  tam: 估算全球每年约有 $77.0M 支出，用于需要约 $350k 覆盖层的 CNS 概念验证及其他信号敏感型神经研究。
  sam: 估算美国和欧洲每年约有 $9.0M 支出，对应约 30 项由新兴生物制药公司和资产驱动型赞助方开展的精神分裂症、耳鸣、癫痫及相邻神经精神科研究。
  som: 到第 3 年可触达的收入规模约为 $2.1M，对应约 7 项中标研究、平均单项合同额约 $300k。
  segments:
  - 围绕新授权资产开展精神分裂症概念验证研究的获风投注资 CNS 生物科技公司
  - 开展耳鸣、癫痫或相邻神经精神科信号敏感研究的中型神经药企团队
  buyingProcess: 通常是在首例患者入组前、方案采集和研究中心选择即将敲定时，由临床开发负责人推动评估。如果这层覆盖层能够嵌入研究预算，并在不打乱 CRO 计划的前提下展示更快入组或更清晰中期信号的可信路径，则由 CMO 或临床运营副总裁拍板。
product:
  mvp: 面向单项精神分裂症试验的礼宾式研究覆盖层，支持与方案联动的预筛、远程症状采集、研究中心评分卡和中期数据质量仪表盘，并与赞助方的 CRO 和现有 eCOA 栈集成。工作流设计、阈值设定和赞助方汇报仍保留人工审核。
  sixMonth: 在一项真实的精神分裂症研究上推出首个生产级 MVP，具备可配置筛选逻辑、研究者与研究中心仪表盘、远程患者工作流支持，以及适用于赞助方和 QA 审查的质量文档。
  twelveMonth: 加入可复用方案模板、研究中心基准、依从性和缺失预警，以及量化入组转化、方案偏差下降和终点方差趋势的证据包，覆盖前几项研究。
  twentyFourMonth: 扩展为更广泛的神经试验智能层，提供跨研究基准、重复赞助方的组合视图、耳鸣及相邻适应症模块，以及指导方案设计和终点策略的数据产品。
  keyBets:
  - 即便 CRO 和 eCOA 供应商已选定，赞助方仍会为可量化的运营和信号质量改进付费。
  - 精神分裂症具备足够重复的工作流相似性，可支撑一个狭窄但可扩展的首个模块。
  - 只要实施负担低、验证姿态稳健，买方会比起全新平台更快接受覆盖层模式。
  - 跨研究 CNS 运营数据能够被标准化为可防守的基准，而不只是定制化服务输出。
gtm:
  wedge: 把公司销售成一套最快帮助精简型 CNS 生物科技公司降低筛选失败、强化终点纪律、并在不替换 CRO 的情况下产出更具决策价值 II 期读数的方案。
  channels:
  - 在授权或融资事件发生后，创始人立即面向新近融资的 CNS 生物科技公司开展外呼
  - 通过临床顾问、KOL 和前神经 CRO 从业者转介绍
  - 通过 CRO、研究中心网络和 eCOA 合作伙伴引荐，把产品定位为兼容型覆盖层
  - 接入与资产授权生态相关的生物科技投资人与孵化器网络
  funnelTargets: 线索到合格研究机会 20-30%，合格研究到付费试点 35-45%，付费试点到完整研究生产合同 60%+，首个研究到第二项研究扩展在 12 个月内达到 40%+。
  pricing: 按研究定价，包含方案设置费，以及按队列和研究中心规模计费的使用费，并将价值定位为研究风险降低而非软件替换。先以 $75k-$125k 的付费试点切入，覆盖启动设计和早期监测；若效果验证成功，再将客户转化为 $250k-$350k 的完整研究覆盖合同，覆盖入组和中期读数支持。
businessModel:
  revenueStreams:
  - 每项研究的方案设置与验证费用
  - 与活跃患者和研究中心数量挂钩的按研究软件与监测费用
  - 面向重复赞助方的高级分析与基准模块
  - 在多项研究胜出后面向大型神经赞助方的组合级许可
  unitOfValue: 按活跃 CNS 研究计价，覆盖设置、入组和中期读数监测范围
  targetGrossMarginPct: 72
  expansionLevers:
  - 同一赞助方组合内的更多研究
  - 从精神分裂症扩展到耳鸣及相邻神经适应症
  - 面向方案基准和研究中心选择的更高价值分析模块
  - 与中型及更大型神经药企团队的组合协议
strategyMap:
  northStarMetric: 平台上达到入组与中期读数质量目标、并优于赞助方基线的 CNS 研究数量
  inputMetrics:
  - 筛选至随机入组转化率
  - 研究中心激活到首例患者入组所需天数
  - 每位入组患者的方案偏差率
  - 终点缺失率与依从率
  - 主要及关键次要终点的方差趋势
  - 付费试点到生产研究的转化率
  moatsToBuild:
  - 覆盖 CNS 研究筛选结果、依从性和终点波动性的方案联动数据集
  - 针对精神分裂症及相邻神经适应症的研究中心表现基准
  - 能适配现有 CRO 和 eCOA 工作流、且被赞助方信任的实施与验证 playbook
  - 把工作流变化与更干净试验信号、更快决策相联系的可重复证据包
  killCriteria:
  - 前 10 家目标赞助方中，少于 3 家愿意在试验启动时点接受付费试点
  - 前 5 次付费部署后，筛选至随机入组转化率的中位改善仍低于 15%
  - 6 个试点后，试点转完整研究的转化率仍低于 40%
  - 前 3 项真实研究中，集成或 QA 异议让典型部署周期额外增加超过 12 周
  mermaid: "flowchart LR\n  Wedge[精神分裂症 II期切入点] --> MVP[兼容 CRO 的信号层 MVP]\n  MVP --> Proof[降低筛选失败并获得更清晰中期读数]\n  Proof --> Expansion[多研究神经试验智能平台]\n"
investorMemo:
  verdict:
    call: 观察
    conviction: 痛点真实、买方触发点也一致，但独立预算拉动和切入点宽度仍需真实验证。
    whyBelieve: 公司瞄准的是资产驱动型 CNS 开发中一个昂贵且可量化的失败模式，其产品比起整套替换型平台，更契合当前的采购和实施行为。
    whyDoubt: 初始市场狭窄且竞争激烈；除非早期试点展示出无可争议的 ROI，否则赞助方仍可能把这部分需求埋进 CRO 或现有 eClinical 合同里。
    nextDiligence: 下一步需要证明的是 3-5 个付费精神分裂症研究试点能够实现更快入组或更低终点方差，并至少有 2 个转化为完整研究合同。
  firstCustomer:
    title: 准备开展精神分裂症 II 期研究的新近融资资产驱动型 CNS 生物科技公司的 CMO
    profile: 10-50 人规模的生物科技公司，拥有 1 项新近授权引进的临床阶段精神分裂症资产，临床团队精简，并已选定用于执行研究的 CRO。
    trigger: 资产完成授权或融资后，团队必须在首例患者入组前敲定筛选逻辑、研究中心和终点采集方案。
    buyer: CMO 或临床运营副总裁
    initialContract: 以 $75k-$125k 的付费试点覆盖方案设置和启动期监测；若早期 KPI 改善明确，再转化为 $250k-$350k 的完整研究覆盖合同，覆盖入组和中期读数支持。
  mustBeTrue:
  - 至少一半受访的 CMO 和临床运营副总裁将信号质量或入组质量列为值得用软件解决的前三大 II 期风险。
  - 前 10 个认真推进的目标账户中，至少有 3 个会在首例患者入组前同意付费试点，而不是要求免费设计合作。
  - 前 5 项付费研究的筛选至随机入组转化率，相比各赞助方既有基线或计划假设至少提升 15%。
  - 至少 2 个早期客户能在保留 CRO 和核心 eCOA 供应商的情况下，从付费试点转化为完整研究合同。
  - 至少 30% 的早期客户会在首次部署后 12 个月内扩展到第二项研究或相邻适应症。
  diligenceQuestions:
  - 当 CRO 和 eCOA 供应商已经签约后，CMO 还会为这一独立覆盖层单独拨款吗？
  - 哪一个 KPI 最能最快拉动预算：更快入组、更低筛选失败率、更好依从性，还是更低终点方差？
  - 精神分裂症是否是正确的首个切入点，还是一个竞争更少的适应症虽研究量更低，却更容易先拿到付费验证？
  - 现有供应商会在触达终点工作流的覆盖层上施加多大实施和 QA 负担？
  - 公司能否在不触发赞助方隐私或 IP 异议的情况下，保留足够的结构化数据权利以构筑护城河？
  riskHeatmap:
  - risk: 在 CRO 和 eCOA 供应商已经确定后，赞助方可能不会再为独立的 CNS 信号层单独付费。
    likelihood: High
    impact: High
    leadingIndicator: 探索电话结束时，客户要求把这项工作塞进现有 CRO scope，而不是单列预算。
    mitigation: 在研究启动触发点切入，把价格嵌入研究风险预算中，并把产品定位为兼容 CRO 的方案，而不是额外流程负担。
  - risk: 滩头市场可能过窄，在扩张前无法支撑风险投资级别的增长动能。
    likelihood: Medium
    impact: High
    leadingIndicator: 在绘制目标账户版图后，精神分裂症合格机会每年仍少于 25 个。
    mitigation: 先用精神分裂症证明工作流，但在首个 KPI 证据出现后，准备好相邻的耳鸣和更广神经模块。
  - risk: 产品对可衡量研究结果的改善可能不足，难以替代现有打包方案和人工流程。
    likelihood: High
    impact: High
    leadingIndicator: 早期试点在筛选失败率、依从性或终点波动性上，相比赞助方基线几乎没有改善。
    mitigation: 先打运营 ROI，聚焦最高杠杆工作流，并发布基于赞助方结果的基准证据。
  - risk: 验证、隐私和审计就绪工作可能拖慢部署并拉长销售周期。
    likelihood: Medium
    impact: High
    leadingIndicator: QA、IRB 或隐私审查让早期实施时间线增加超过一个季度。
    mitigation: 保持主张保守，接入已验证系统，并从第一天起建设质量文档和区域部署 playbook。
  - risk: 在初创公司建立清晰差异化之前，现有厂商就可能将类似功能打包并压价。
    likelihood: Medium
    impact: Medium
    leadingIndicator: 超过一半的丢单都把现有厂商实施提速或打包定价列为不采购的原因。
    mitigation: 坚持疾病特定化，沉淀现有厂商没有的结局基准，并在狭窄 ICP 上以更快的研究启动部署取胜。
operatingAssumptions:
- assumption: 相较于耳鸣，精神分裂症是更好的首个滩头市场，因为它兼具更可重复的需求和更强的紧迫性/规模权衡。
  basis: research.yaml
  validationTest: 建立美国和欧洲精神分裂症及耳鸣 II 期赞助方目标名单，并确认未来 18 个月内可触达的精神分裂症研究机会至少是耳鸣的 2 倍。
  decisionImpact: 如果不成立，应将首个切入点转向耳鸣或混合适应症，而不是把产品设计集中在精神分裂症工作流上。
- assumption: 如果在首例患者入组前销售，并将其定位为研究启动和招募支出中的风险降低项，独立覆盖层就能拿到预算。
  basis: idea.yaml
  validationTest: 完成 15 次买方访谈，并收集 5 份近期研究预算或 SOW 样本，以确认这部分 scope 在财务上能落在哪里。
  decisionImpact: 如果不成立，公司就必须通过 CRO 转售、合作伙伴主导签约，或采用更重的服务模式。
- assumption: 早期买方比起大胆宣称客观终点优势，更关心可量化的运营 ROI。
  basis: research.yaml
  validationTest: 在试点销售中测试入组速度、筛选失败降低和终点方差等不同话术，并衡量哪种信息更容易转化为付费项目。
  decisionImpact: 如果不成立，产品路线图必须更早投入经验证的数字生物标志物和临床证据生成。
- assumption: 与现有 CRO 和 eCOA 工作流的集成足够轻量，可以在 8 周内完成部署。
  basis: research.yaml
  validationTest: 与 2 家 eCOA 供应商和 1 位 CRO 质量负责人完成技术尽调，并把前 3 次部署压在 8 周目标内。
  decisionImpact: 如果不成立，实施成本会上升、销售周期会拉长，公司可能需要缩窄支持系统范围或更早融资。
- assumption: 跨研究的 CNS 运营数据可以通过合同获取，并标准化为可复用基准。
  basis: 经营判断
  validationTest: 在前 5 项付费研究中，确认数据权利、模式一致性，以及核心筛选和依从性字段人工清洗比例低于 20%。
  decisionImpact: 如果不成立，数据护城河会更弱，公司应优先优化工作流软件经济模型，而不是押注数据平台扩张。
experimentRoadmap:
- horizon: 0-90 days
  experiment: 与近期完成临床阶段项目授权或融资的资产驱动型 CNS 生物科技公司的 CMO 和临床运营副总裁进行 12 次买方访谈。
  hypothesis: 研究启动时点具备足够紧迫性，能让客户在首例患者入组前购买一层覆盖层。
  successMetric: 12 位买方中至少 8 位确认存在明确预算负责人、购买触发点，以及一个足以支撑付费试点的 KPI。
  owner: 创始人 CEO
- horizon: 0-90 days
  experiment: 与顾问和潜在设计合作伙伴一起拆解 5 个近期精神分裂症研究方案。
  hypothesis: 围绕筛选逻辑、远程症状采集和研究中心评分卡的狭窄工作流，能抓住最高价值的初始范围。
  successMetric: 5 次拆解中至少 4 次优先这些工作流，而不是更广泛的 eCOA 或生物标志物功能诉求。
  owner: 创始临床产品负责人
- horizon: 90-180 days
  experiment: 拿下 3 份付费试点合同，覆盖启动配置和研究早期监测。
  hypothesis: 只要实施负担低、产品能嵌入现有研究计划，买方会在尚无结局数据前就愿意付费。
  successMetric: 达成 3 个每个不低于 $75k 的付费试点，且其中至多 1 个需要定制化产品开发。
  owner: 创始人 CEO
- horizon: 90-180 days
  experiment: 验证与 2 家 eCOA 供应商和 1 家聚焦神经领域的 CRO 合作伙伴的部署兼容性。
  hypothesis: 该覆盖层能够完成集成，而无需迫使客户做整套替换或遭遇漫长 QA 延迟。
  successMetric: 3 家合作方均批准一个参考实施路径，且赞助方部署不存在关键阻塞。
  owner: 创始工程师
- horizon: 6-12 months
  experiment: 衡量试点在入组转化、方案偏差、依从性和终点缺失率上的结果差异。
  hypothesis: 在明确疗效数据出来之前，就可以先证明运营层面的改善，而这已足以支撑转化为完整研究合同。
  successMetric: 前 3 个试点中至少有 2 个在一个主要运营 KPI 上改善超过 15%，并转化为生产范围。
  owner: 客户成功负责人
- horizon: 12-18 months
  experiment: 根据观察到的管线密度和 KPI 可迁移性，推出第二个适应症模块，选择耳鸣或相邻神经精神科方向。
  hypothesis: 精神分裂症工作流可以在不破坏实施纪律的情况下扩展到一个相邻适应症。
  successMetric: 从现有或新客户中赢得 2 个第二适应症合同，且其 onboarding 时间不超过精神分裂症部署的 120%。
  owner: 产品负责人
operations:
- 把每次部署都做成“研究特定但模板驱动”的实施，让重复出现的方案模式沉淀为产品，而不是定制服务。
- 从第一天起就保持面向检查的质量、审计追踪、隐私和访问控制文档，因为赞助方 QA 姿态是关键门槛。
- 把 CRO 和 eCOA 合作伙伴同时作为渠道与集成盟友，但在合同和技术上保持对任何单一栈的独立性。
- 为筛选、依从性、缺失率和研究中心表现数据建立标准化核心 schema，使每项研究都能新增可复用的基准数据。
- 先从北美和欧洲起步，因为这里 eCOA 与远程工作流采用更成熟，隐私 playbook 也更易管理。
team:
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 需要立即负责集成、可配置研究工作流和首个面向赞助方的仪表盘建设。
- role: 创始临床产品负责人
  startTiming: 第 0 个月
  rationale: 必须把方案设计、研究中心运营和终点痛点转译为买方可信任的狭窄 MVP。
- role: 数据与质量工程师
  startTiming: 第 3 个月
  rationale: 负责结构化跨研究数据、支撑审计追踪，并避免验证工作阻塞产品节奏。
- role: 解决方案工程师
  startTiming: 第 6 个月
  rationale: 当试点转入真实研究时，支持赞助方 onboarding、CRO 协调和低摩擦部署。
- role: 商业负责人
  startTiming: 第 9 个月
  rationale: 当创始人主导销售跑出可复制模式，且与 CRO 和投资人网络的合作渠道需要更结构化跟进时，就需要这位角色。
milestones:
- horizon: 0-12 months
  items:
  - 通过至少 15 次 ICP 访谈和 3 个付费试点验证买方支付意愿。
  - 交付覆盖筛选工作流、远程患者采集、研究中心评分卡和 QA 就绪报告的精神分裂症 MVP。
  - 完成与至少 2 家 eCOA 供应商和 1 家 CRO 合作伙伴的参考集成或获批工作流。
  - 至少将 2 个试点转化为完整研究合同，并取得可衡量的运营 KPI 改善。
  - 建立精神分裂症滩头市场的目标账户地图，并确认相邻适应症扩展路径。
- horizon: 12-24 months
  items:
  - 达到 8-12 个付费研究合同，并形成可重复部署 playbook 与实时基准报告。
  - 基于观察到的需求推出第二个适应症模块，较可能为耳鸣或相邻神经精神科。
  - 在至少 30% 的早期客户中证明第二项研究或第二适应症扩展。
  - 建立一套将产品与更快入组、更低方案偏差或更低终点缺失率相联系的赞助方证据库。
- horizon: 24-36 months
  items:
  - 达到第 3 年情景：约 7 项活跃研究，以及约 $2.1M 的年化签约收入。
  - 在所选滩头细分中成为资产驱动型 CNS 研究启动的默认覆盖层。
  - 向重复赞助方和中型神经药企团队提供组合分析与多研究基准。
  - 决定是继续加深为更广泛的神经试验智能平台，还是保持为高价值精品研究覆盖层业务。
risks:
- risk: 在 CRO 和 eCOA 供应商已选定后，赞助方可能不会再为独立的 CNS 信号层单独出资。
  likelihood: High
  impact: High
  mitigation: 在首例患者入组前切入，嵌入研究预算，并以兼容 CRO 的打包方式与定价落地。
- risk: 在扩张前，精神分裂症滩头市场可能过窄，无法提供足够交易量。
  likelihood: Medium
  impact: High
  mitigation: 尽早跟踪目标账户宇宙，并仅在首个工作流被证明后再解锁第二适应症。
- risk: 产品影响可能过小或显现过慢，难以相对赞助方基线证明价值。
  likelihood: High
  impact: High
  mitigation: 优先聚焦运营 KPI，把产品范围缩到最可衡量的工作流，并严格收集前后对比证据。
- risk: 验证、隐私和审计就绪要求可能拉长部署和销售周期。
  likelihood: Medium
  impact: High
  mitigation: 从首个版本起就建立保守主张、稳健质量体系和区域隐私 playbook。
- risk: 在公司建立清晰差异化前，现有厂商可能已将类似功能打包并压缩时间线。
  likelihood: Medium
  impact: Medium
  mitigation: 坚持 CNS 专用定位，建立现有厂商没有的数据基准，并在狭窄的研究启动场景中更快交付。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: $2-4M
  runwayMonths: 18
  useOfFundsSummary: 为期 18 个月的资金将用于验证付费试点、构建“精神分裂症优先”的覆盖层产品、搭建质量与集成能力，并在扩展到相邻 CNS 适应症之前，证明可重复的研究启动分发能力。
