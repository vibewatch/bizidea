slug: cns-trial-signal-layer
date: 2026-04-27
executiveSummary: >-
  这家公司应该被打造为一个面向新近融资、通过授权引进临床阶段神经资产来建管线的生物科技公司的 CNS 试验信号层，帮助它们更快、更干净地拿到 Phase II 概念验证结果。最直接的买方，是拥有 2-5 个资产、团队精简、必须在首例患者入组前锁定研究中心、筛选逻辑和终点采集方案的 CNS 生物科技公司的 CMO 或 VP Clinical Operations。首个产品不该替换 CRO 或核心 eCOA 栈，而应作为一个与方案绑定的叠加层，覆盖患者预筛选、远程症状采集、研究中心评分卡和中期信号质量监控。最合适的第一切口，是美国和欧洲的精神分裂症概念验证研究，因为这里的痛点最尖锐、研究量也比只做耳鸣更可信，而且购买触发点明确绑在研究启动这一事件上。研究证明，CNS 终点噪声、安慰剂反应和基线分数膨胀确实让买方头疼，但还没有证明：在 CRO 和 eCOA 供应商已经选定后，赞助方是否还会再买一个独立叠加层。公司若想赢，得先证明可量化的运营 ROI，比如更低的筛败率和更快的入组，再逐步累积成能反过来优化方案设计和研究中心选择的跨试验 CNS 数据集。战略风险在于，滩头市场的经济体量偏窄，而且现有厂商还在持续压缩实施周期，因此能否扩展到更广的神经组合工作流，必须靠结果挣出来，不能先假定。这是一家值得尝试构建的公司，但董事会层面真正要追问的是：早期试点能不能拉出足够强的预算需求，撑起一个独立品类。
problem:
  - CNS Phase II 研究往往无法清楚显示疗效，因为主观终点、安慰剂反应、基线分数膨胀和研究中心差异，会把真实信号淹没。
  - 新近融资、以资产为核心组建的 CNS 生物科技公司虽然接手了临床阶段项目，但实际执行时仍常依赖精简团队、通用 eCOA 工具、重 CRO 流程和手工筛选。
  - 赞助方可能先烧掉几千万美元，最后仍分不清是资产本身没效果，还是试验执行把结果做脏了。
solution:
  - 提供一个兼容 CRO 的叠加层，覆盖按方案定制的患者预筛选、远程症状采集、行为终点采集和研究中心绩效监控。
  - 第一版产品围绕一项正在进行的研究打包，让赞助方在中期读数前改善入组质量、减少方案偏离，并持续盯住信号可靠性。
  - 围绕筛选、依从性、终点波动和研究中心行为，沉淀纵向 CNS 研究数据集，反过来优化未来的方案和组合决策。
whyWeWin:
  - 产品专门围绕高噪声的 CNS 概念验证研究设计，而不是做通用试验基础设施，这更贴合买方真实描述的痛点。
  - 购买触发点非常具体：当新授权资产准备启动研究时，预算就会出现，而不是一笔事先拍脑袋的软件采购。
  - 叠加层模式更符合赞助方当前通过 CRO 与研究启动预算购买的方式，相比整套替换平台，采用阻力更小。
  - 如果早期部署能稳定采集筛选质量、终点方差和研究中心绩效数据，公司就会逐步形成疾病特定的工作流与数据护城河。
strategicChoices:
  beachhead: 面向内部临床开发人员少于 15 人、刚授权引进临床阶段资产、由风险投资支持的 CNS 生物科技公司，在美国和欧洲开展的精神分裂症 Phase II 概念验证研究。
  wedgeRationale: 相比把耳鸣当作第一切口，精神分裂症在信号质量痛点、可信研究量以及董事会层面的去留决策后果之间，给出了更平衡也更紧迫的组合。先盯住这一个方向，可以更快证明价值，因为公司只需把一类方案、一类买方画像和一套 ROI 叙事跑通，再往外扩。
  sequencingRationale: 先做一个高触达叠加层，在单项研究里证明运营 ROI；再把筛选工作流、终点看板和研究中心评分卡产品化；只有在反复打赢之后，才扩到组合分析、相邻神经适应症和更深的富生物标志物方案设计。这样产品范围、销售动作、招聘和验证负担，都会和同一个首单时刻对齐。
  notYet:
    - 把耳鸣优先定位成主要滩头市场
    - 在精神分裂症验证跑通前，就覆盖广泛癫痫和多适应症神经学场景
    - 替换完整 eCOA、EDC 或 CRO
    - 推出需要比首个产品更重验证负担的 AI 驱动终点主张
    - 在前 24 个月进入中国或其他复杂跨境部署
market:
  tam: 估算全球每年约有 $77.0M 支出会流向需要约 $350k 叠加层的 CNS 概念验证及其他高信号敏感神经研究。
  sam: 估算美国和欧洲每年约有 $9.0M 支出，来自约 30 项由新兴生物制药公司和资产驱动型赞助方开展的精神分裂症、耳鸣、癫痫及相邻神经精神研究。
  som: 第 3 年可触达收入约为 $2.1M，对应大约 7 项中标研究、平均每项合同约 $300k。
  segments:
    - 在新授权资产上推进精神分裂症概念验证研究的风险投资支持型 CNS 生物科技公司
    - 在耳鸣、癫痫或相邻神经精神研究中推进高信号敏感试验的中型神经药企团队
  buyingProcess: 临床开发负责人通常会在首例患者入组前、方案采集设计和研究中心选择接近定稿时推动评估。如果这个叠加层能装进研究预算，又能在不打乱 CRO 计划的情况下，为更快入组或更干净的中期信号提供可信路径，最终拍板的一般会是 CMO 或 VP Clinical Operations。
product:
  mvp: 面向一项精神分裂症研究的礼宾式单研究叠加层，支持与方案绑定的预筛选、远程症状采集、研究中心评分卡和中期数据质量看板，并与赞助方现有的 CRO 和 eCOA 栈集成。工作流设计、阈值设定和给赞助方的汇报仍保留人工审阅。
  sixMonth: 为一项真实运行中的精神分裂症研究上线首个生产级 MVP，提供可配置筛选逻辑、研究者与研究中心看板、远程患者工作流支持，以及足以通过赞助方和 QA 审查的质量文档。
  twelveMonth: 增加可复用的方案模板、研究中心基准、依从性与缺失预警，以及量化入组转化、方案偏离下降和终点方差变化趋势的证据包，覆盖前几项研究。
  twentyFourMonth: 扩展成更广的神经试验情报层，提供多研究基准、重复赞助方组合视图、耳鸣及相邻适应症模块，以及帮助优化方案设计和终点策略的数据产品。
  keyBets:
    - 即便 CRO 和 eCOA 供应商已选定，只要运营和信号质量改善足够可量化，赞助方仍会为此付费。
    - 精神分裂症在工作流上有足够的重复性，足以产品化成一个狭窄但可扩展的首个模块。
    - 如果实施负担足够轻、验证姿态足够稳，买方会更快接受叠加层模式，而不是一套全新平台。
    - 跨研究的 CNS 运营数据可以被标准化成有防御力的基准，而不只是一次性的定制服务产物。
gtm:
  wedge: 把公司卖成“在不替换 CRO 的前提下，帮助精简型 CNS 生物科技公司最快降低筛败、管住终点纪律，并拿到更适合决策的 Phase II 读数”的工具。
  channels:
    - 在授权或融资事件之后，创始人直接向新近融资的 CNS 生物科技公司外呼
    - 借助临床顾问、KOL 和前神经 CRO 操盘手转介绍
    - 通过 CRO、研究中心网络和 eCOA 伙伴引荐，把产品定位成兼容型叠加层
    - 借助围绕资产授权生态的生物科技投资人与孵化器网络
  funnelTargets: 线索到合格研究机会 20-30%，合格研究到付费试点 35-45%，付费试点到全研究生产合同 60%+，首项研究到第二项研究扩张在 12 个月内达到 40%+。
  pricing: 采用按研究计费，包含方案设置费以及按队列和研究中心计的使用费；叙事上把它包装成研究风险下降，而不是替代软件。起步先用 $75k-$125k 的付费试点覆盖启动设计和早期监控；如果早期 KPI 改善明显，再把成功账户转成 $250k-$350k 的全研究叠加层合同，覆盖入组和中期读数支持。
businessModel:
  revenueStreams:
    - 每项研究的方案设置与验证费用
    - 按活跃患者和研究中心计费的单研究软件与监控费用
    - 面向重复赞助方的高级分析和基准模块
    - 在赢下多项研究后，面向更大神经赞助方的组合级许可证
  unitOfValue: 一项活跃的 CNS 研究，按设置、入组和中期读数监控范围收费
  targetGrossMarginPct: 72
  expansionLevers:
    - 同一赞助方组合内增加更多研究
    - 从精神分裂症扩到耳鸣及相邻神经适应症
    - 推出更高价值的方案基准与研究中心选择分析模块
    - 与中型及更大神经药企签下组合协议
strategyMap:
  northStarMetric: 平台上达到入组和中期读数质量目标、且相对赞助方历史基线有改善的 CNS 研究数量
  inputMetrics:
    - 筛选到随机化转化率
    - 从研究中心激活到首例患者入组的天数
    - 每位入组患者的方案偏离率
    - 终点缺失率与依从率
    - 主要及关键次要终点的方差趋势
    - 付费试点到正式研究合同的转化率
  moatsToBuild:
    - 跨 CNS 研究的、与方案绑定的筛选结果、依从性和终点波动数据集
    - 针对精神分裂症和相邻神经适应症的研究中心绩效基准
    - 能嵌入现有 CRO 和 eCOA 工作流、且被赞助方信任的实施与验证 playbook
    - 把工作流调整和更干净试验信号、更快决策直接联系起来的可复用证据包
  killCriteria:
    - 前 10 个目标赞助方中，少于 3 家愿意在研究启动时点签付费试点
    - 前 5 次付费部署后，筛选到随机化转化率的中位改善仍低于 15%
    - 6 个试点之后，试点到全研究合同的转化率仍低于 40%
    - 前 3 项真实研究里，集成或 QA 异议让典型部署周期额外增加超过 12 周
  mermaid: |
    flowchart LR
      Wedge[Schizophrenia Phase II wedge] --> MVP[CRO-compatible signal layer MVP]
      MVP --> Proof[Lower screen fails cleaner interim reads]
      Proof --> Expansion[Multi-study neuro trial intelligence platform]
investorMemo:
  verdict:
    call: Watch
    conviction: 痛点真实、买方触发点也成立，但独立预算拉力和切口宽度仍需要真实证明。
    whyBelieve: 这家公司抓住了资产驱动型 CNS 开发里一个既昂贵又可衡量的失败模式，而且产品比整套替换方案更贴合现有采购和实施方式。
    whyDoubt: 初始市场既窄又拥挤；如果早期试点拿不出非常清楚的 ROI，赞助方很可能还是会把这部分需求塞进 CRO 或现有 eClinical 合同里。
    nextDiligence: 下一步关键证据，是拿下 3-5 个精神分裂症研究付费试点，证明能加快入组或降低终点方差，并且至少有 2 个转成全研究合同。
  firstCustomer:
    title: 正在准备精神分裂症 Phase II 研究的新近融资资产驱动型 CNS 生物科技公司的 CMO
    profile: 一家 10-50 人的生物科技公司，拥有 1 个刚授权引进的临床阶段精神分裂症资产，临床团队精简，并且已经选好了 CRO 来执行研究。
    trigger: 资产完成授权或融资后，团队需要在首例患者入组前敲定筛选逻辑、研究中心和终点采集方案。
    buyer: CMO or VP Clinical Operations
    initialContract: 若早期 KPI 改善明显，先签 $75k-$125k 的付费试点，覆盖方案设置和启动期监控；随后转成 $250k-$350k 的全研究叠加层合同，继续支持入组和中期读数。
  mustBeTrue:
    - 至少一半受访的 CMO 和 VP Clinical Ops 会把信号质量或入组质量列为 Phase II 的前三大风险之一，并愿意为软件买单。
    - 前 10 个高意向目标客户中，至少有 3 家愿意在首例患者入组前签付费试点，而不是只想要免费的共创合作。
    - 前 5 项付费研究的筛选到随机化转化率，相比各自赞助方既往基线或计划假设，至少改善 15%。
    - 至少 2 位早期客户在保留 CRO 和核心 eCOA 供应商的情况下，从付费试点转成全研究合同。
    - 至少 30% 的早期客户会在首次部署 12 个月内扩展到第二项研究或相邻适应症。
  diligenceQuestions:
    - 在 CRO 和 eCOA 供应商已经签约后，CMO 还会不会为这个独立叠加层单独拨预算？
    - 哪个 KPI 最能拉出预算：更快入组、更低筛败率、更高依从性，还是更低终点方差？
    - 精神分裂症真的是最佳首个切口，还是某个竞争更少的适应症反而能更快拿到付费验证？
    - 现有厂商会给一个介入终点工作流的叠加层增加多少实施和 QA 负担？
    - 公司能否在不触发赞助方隐私或 IP 异议的前提下，保留足够多的结构化数据权利来建立护城河？
  riskHeatmap:
    - risk: Sponsors may not fund a separate CNS signal layer once CRO and eCOA vendors are already chosen.
      likelihood: High
      impact: High
      leadingIndicator: 发现阶段电话最后，总是被要求把这项工作塞进现有 CRO 范围，而不是给出单独预算。
      mitigation: 在研究启动触发点切入，把价格放进研究风险预算里，并把产品定位成兼容 CRO 的方案，而不是额外增加流程负担。
    - risk: The beachhead may be too narrow to support venture-scale momentum before expansion.
      likelihood: Medium
      impact: High
      leadingIndicator: 把目标账户池摸清后，每年合格的精神分裂症机会仍低于 25 个。
      mitigation: 先用精神分裂症把工作流跑通，但一旦首批 KPI 证据成立，就准备切入相邻的耳鸣和更广泛神经模块。
    - risk: The product may not improve measurable study outcomes enough to displace incumbent bundles and manual processes.
      likelihood: High
      impact: High
      leadingIndicator: 早期试点在筛败率、依从性或终点波动上，相比赞助方基线几乎没有改善。
      mitigation: 先打运营 ROI，收窄到杠杆最大的工作流环节，并拿出赞助方层面的基准证据。
    - risk: Validation, privacy, and audit-readiness work could slow deployment and lengthen sales cycles.
      likelihood: Medium
      impact: High
      leadingIndicator: QA、IRB 或隐私审查让早期实施时间表额外拉长超过一个季度。
      mitigation: 控制主张边界，接入已验证系统，并从第一天开始建立质量文档和区域部署 playbook。
    - risk: Incumbents may bundle similar features and compress pricing before the startup establishes a moat.
      likelihood: Medium
      impact: Medium
      leadingIndicator: 超过一半丢单都把现有厂商时间线更快或打包定价更低列为主要原因。
      mitigation: 保持疾病聚焦，积累现有厂商没有的结果基准，并在狭窄 ICP 上靠更快的研究启动部署取胜。
operatingAssumptions:
  - assumption: 相比耳鸣，精神分裂症更适合作为第一滩头市场，因为它在需求重复性以及紧迫度/研究量权衡上更优。
    basis: research.yaml
    validationTest: 建立美国和欧洲精神分裂症与耳鸣 Phase II 赞助方名单，确认未来 18 个月里可触达的精神分裂症机会至少是耳鸣的 2 倍。
    decisionImpact: 如果不成立，首个切口就该转向耳鸣或混合适应症，而不是把产品设计高度绑定在精神分裂症工作流上。
  - assumption: 只要在首例患者入组前切入，并包装成研究风险下降、从启动和招募预算里出钱，独立叠加层就能拿到预算。
    basis: idea.yaml
    validationTest: 做 15 次买方访谈，并收集 5 份近期研究预算或 SOW，确认这部分支出在财务上应放到哪里。
    decisionImpact: 如果不成立，公司就必须通过 CRO 转售、伙伴代签，或者走更重的服务化模式。
  - assumption: 早期买方更在意可量化的运营 ROI，而不是大胆宣传“客观终点更优”。
    basis: research.yaml
    validationTest: 在试点销售里分别测试“更快入组、筛败下降、依从性提升、终点方差下降”这些信息，看哪个最能转成付费合同。
    decisionImpact: 如果不成立，路线图就必须更早投入已验证数字生物标志物和临床证据建设。
  - assumption: 与现有 CRO 和 eCOA 工作流的集成，可以轻到在 8 周内完成部署。
    basis: research.yaml
    validationTest: 和 2 家 eCOA 供应商、1 位 CRO 质量负责人做技术尽调，并把前 3 次部署严格对照 8 周目标。
    decisionImpact: 如果不成立，实施成本会上升、销售周期会拉长，公司可能需要收窄支持系统范围，或者更早融资。
  - assumption: 跨研究的 CNS 运营数据可以在合同上拿到，并标准化成可复用基准。
    basis: operator judgment
    validationTest: 在前 5 项付费研究里，确认数据权、schema 一致性，以及核心筛选和依从字段的人工清洗比例低于 20%。
    decisionImpact: 如果不成立，数据护城河会更弱，公司就该优先优化工作流软件本身的经济性，而不是押注数据平台扩张。
experimentRoadmap:
  - horizon: 0–90 天
    experiment: 与最近刚授权引入或融资了临床阶段项目的资产驱动型 CNS 生物科技公司的 CMO 和 VP Clinical Ops 做 12 次买方访谈。
    hypothesis: 研究启动时点有足够高的紧迫性，能在首例患者入组前卖出一个叠加层。
    successMetric: 至少 12 位中的 8 位能明确给出预算 owner、购买触发点，以及一个足以支持付费试点的 KPI。
    owner: Founder CEO
  - horizon: 0–90 天
    experiment: 和顾问及潜在共创客户一起，拆解 5 份近期精神分裂症研究方案。
    hypothesis: 围绕筛选逻辑、远程症状采集和研究中心评分卡的狭窄工作流，能抓住最有价值的初始范围。
    successMetric: 5 份拆解里至少 4 份把这些工作流排在更广泛 eCOA 或生物标志物功能需求之前。
    owner: 创始临床产品负责人
  - horizon: 90–180 天
    experiment: 签下 3 份用于启动配置和早期研究监控的付费试点合同。
    hypothesis: 只要实施负担够低、产品能嵌进现有研究计划，即使还没有结果数据，买方也愿意先付费。
    successMetric: 拿下 3 个单价至少 $75k 的付费试点，且最多只有 1 个需要额外定制产品开发。
    owner: Founder CEO
  - horizon: 90–180 天
    experiment: 与 2 家 eCOA 供应商和 1 家聚焦神经领域的 CRO 伙伴验证部署兼容性。
    hypothesis: 这个叠加层无需触发整套替换决策，也不会因为 QA 延迟而卡死集成。
    successMetric: 3 个伙伴都认可一条参考实施路径，且不存在阻止赞助方部署的关键阻塞项。
    owner: Founding eng
  - horizon: 6–12 个月
    experiment: 衡量试点在入组转化、方案偏离、依从性和终点缺失上的结果变化。
    hypothesis: 在最终疗效数据出来前，就能先证明运营改善，而且这些改善足以支撑转成全研究合同。
    successMetric: 前 3 个试点里至少 2 个在某个核心运营 KPI 上改善 15% 以上，并转成正式生产范围。
    owner: 客户成功负责人
  - horizon: 12–18 个月
    experiment: 根据真实管线密度和 KPI 可迁移性，在耳鸣或相邻神经精神适应症中上线第二个模块。
    hypothesis: 精神分裂症工作流可以扩展到一个相邻适应症，而不会破坏实施纪律。
    successMetric: 从现有或新赞助方处赢下 2 个第二适应症合同，且 onboarding 时间不超过精神分裂症部署的 120%。
    owner: 产品负责人
operations:
  - 把每次部署都做成“按研究定制、但由模板驱动”的实现方式，让重复出现的方案模式不断沉淀成产品，而不是继续变成纯服务。
  - 从第一天起就把质量、审计轨迹、隐私和访问控制文档做到可检查，因为赞助方 QA 姿态是硬门槛。
  - 把 CRO 和 eCOA 伙伴当成渠道与集成盟友，但在合同和技术上都保持不依赖任何单一栈。
  - 标准化筛选、依从性、缺失值和研究中心绩效的核心 schema，让每项研究都为可复用基准数据添砖加瓦。
  - 先从北美和欧洲起步，因为这里 eCOA 和远程工作流采用已较成熟，隐私 playbook 也更可控。
team:
  - role: 创始工程师
    startTiming: Month 0
    rationale: 上线第一天就需要有人搭集成、可配置研究工作流和面向赞助方的首批看板。
  - role: 创始临床产品负责人
    startTiming: Month 0
    rationale: 需要把方案设计、研究中心运营和终点痛点翻译成一个买方愿意信任的窄 MVP。
  - role: 数据与质量工程师
    startTiming: Month 3
    rationale: 需要尽早把跨研究数据结构化，支撑审计轨迹，避免验证工作拖垮产品速度。
  - role: 解决方案工程师
    startTiming: Month 6
    rationale: 当试点变成真实研究时，需要有人承接赞助方 onboarding、CRO 协调和低摩擦部署。
  - role: 商业负责人
    startTiming: Month 9
    rationale: 一旦创始人主导销售开始可复制，并且 CRO 与投资人渠道需要系统化跟进，就得补上这个角色。
milestones:
  - horizon: 0–12 个月
    items:
      - 通过至少 15 次 ICP 访谈和 3 个付费试点，验证买方的付费意愿。
      - 交付覆盖筛选工作流、远程患者采集、研究中心评分卡和 QA 就绪报告的精神分裂症 MVP。
      - 与至少 2 家 eCOA 供应商和 1 家 CRO 伙伴完成参考集成或获批工作流。
      - 至少 2 个试点转成全研究合同，并带来可量化的运营 KPI 改善。
      - 建立精神分裂症滩头市场的目标账户地图，并确认相邻适应症的扩张路径。
  - horizon: 12–24 个月
    items:
      - 达到 8-12 个付费研究合同，并跑出可复制的部署 playbook 和实时基准报告。
      - 根据观察到的需求，上线第二个适应症模块，优先考虑耳鸣或相邻神经精神方向。
      - 在至少 30% 的早期客户中证明第二研究或第二适应症扩张。
      - 建立赞助方证据基础，把产品与更快入组、更少方案偏离或更低终点缺失直接挂钩。
  - horizon: 24–36 个月
    items:
      - 达到第 3 年情景：大约 7 项活跃研究、约 $2.1M 年化签约收入。
      - 在选定滩头市场中，成为资产驱动型 CNS 研究启动阶段的默认叠加层。
      - 向重复赞助方和中型神经药企提供组合分析与多研究基准。
      - 决定是继续深化成更广的神经试验情报平台，还是维持高价值、高溢价的研究叠加层业务。
risks:
  - risk: Sponsors may not fund a separate CNS signal layer once CRO and eCOA vendors are already selected.
    likelihood: High
    impact: High
    mitigation: 在首例患者入组前切入、嵌进研究预算里，并用兼容 CRO 的包装和定价推进。
  - risk: The schizophrenia beachhead may be too narrow to produce enough volume before expansion.
    likelihood: Medium
    impact: High
    mitigation: 及早摸清目标账户池，只有在第一套工作流被证明后，再打开第二适应症。
  - risk: Product impact may be too small or too slow to prove against sponsor baselines.
    likelihood: High
    impact: High
    mitigation: 先盯运营 KPI，收窄到最可衡量的工作流，并严谨收集前后对比证据。
  - risk: Validation, privacy, and audit-readiness requirements may lengthen deployment and sales cycles.
    likelihood: Medium
    impact: High
    mitigation: 从首个版本起就控制主张边界、建立强质量体系和区域隐私 playbook。
  - risk: Incumbents may compress timelines and bundle similar functionality before the startup establishes clear differentiation.
    likelihood: Medium
    impact: Medium
    mitigation: 保持 CNS 聚焦，建立现有厂商没有的数据基准，并在狭窄的研究启动部署上跑得更快。
fundingAsk:
  stage: pre-seed
  targetFundingRangeUsd: "$2-4M"
  runwayMonths: 18
  useOfFundsSummary: 用这笔资金换来 18 个月跑道：验证付费试点、搭出以精神分裂症为先的叠加层产品、补齐质量与集成能力，并在扩展到相邻 CNS 适应症之前，先证明研究启动分发可以复制。
