regulatoryTechnicalConstraints:
- point: 数字化测量需要清晰的分析与临床验证，而不只是传感器数据采集。
  sourceRefs:
  - 14
  - 23
  - 25
- point: 远程受试者数据需要强有力的赞助方与 PI 监督，以及可追溯的审查工作流。
  sourceRefs:
  - 10
  - 27
- point: 法国/欧盟的 CNIL 预期和中国 PIPL 等区域隐私规则会改变部署设计。
  sourceRefs:
  - 10
  - 13
- point: 必须与现有 eCOA / CRO / 研究中心系统互操作，否则会被工作流排斥。
  sourceRefs:
  - 8
  - 15
  - 17
validationSignals:
- point: Tortugas 以 $106M 融资和多资产临床 CNS 管线正式上线，表明提议中的买方细分正在出现新的研究需求。
  sourceRefs:
  - 1
  - 2
- point: Medable 报告组合级 eCOA 采用带来 80% 的收入增长，说明买方正在从一次性试点走向规模化部署。
  sourceRefs:
  - 7
- point: Signant 将 eCOA 实施周期缩短 30%，说明启动速度确实是买方的现实优先级。
  sourceRefs:
  - 12
- point: Koneksa 在一项帕金森病数字化测量研究中完成数据库锁定，说明赞助方仍在持续投入远程神经测量的验证。
  sourceRefs:
  - 17
- point: Signant 正在收购 Ametris，说明把 eClinical 工作流与数字化测量结合具备战略价值。
  sourceRefs:
  - 14
- point: Medable/CVS 和 Medable 合作伙伴网络公告表明，通过研究中心、零售和 CRO 渠道进行分发正变得愈发重要。
  sourceRefs:
  - 15
  - 30
openQuestions:
- 在研究尚未产生首次中期信号之前，CNS 专用覆盖层能否拿到预算，还是买方会坚持把它埋进 CRO SOW？
- 在试点里，哪个早期产品 KPI 最有说服力：更快入组、更低筛选失败率、更好依从性，还是更低终点方差？
- 在不与现有 eCOA 供应商产生验证或边界冲突的情况下，公司究竟能拥有多少工作流？
- 耳鸣是否足够大到能成为首个细分，还是应该先从精神分裂症切入，待证明信号质量提升后再扩展到耳鸣？
