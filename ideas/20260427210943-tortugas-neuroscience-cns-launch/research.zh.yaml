    - 10
    - 27
  adoptionFrictionMatrix:
  - friction: 远程采集终点数据的验证与审计就绪要求
    severity: high
    affectedBuyer: 首席医疗官 / QA / 临床运营
    mitigation: 作为既有验证系统上的叠加层发布，并把文档做到可随时接受检查。
    sourceRefs:
    - 10
    - 14
    - 27
  - friction: CRO 已掌握执行方案，并会抗拒新工具
    severity: high
    affectedBuyer: 临床运营副总裁
    mitigation: 把产品卖成兼容 CRO 的工作流支持，而不是替代软件。
    sourceRefs:
    - 8
    - 15
  - friction: 跨境隐私与处理者审批
    severity: medium
    affectedBuyer: 法务 / 隐私负责人
    mitigation: 先从部署路径更简单的地区起步，并把实施手册标准化。
