regulatoryTechnicalConstraints:
- point: 数字测量不仅要能采集传感器数据，还必须完成明确的分析验证和临床验证。
  sourceRefs:
  - 14
  - 23
  - 25
- point: 远程受试者数据需要赞助方和 PI 进行强监督，并留下可追踪的审阅工作流。
  sourceRefs:
  - 10
  - 27
- point: 法国/欧盟的 CNIL 预期、中国 PIPL 等区域隐私规则，会直接改变部署设计。
  sourceRefs:
  - 10
  - 13
- point: 必须与既有 eCOA / CRO / 研究中心系统互操作，否则工作流层面会被拒绝。
  sourceRefs:
  - 8
  - 15
  - 17
validationSignals:
- point: Tortugas 以 $106M 融资亮相，并带着多资产临床 CNS 管线出发，说明提案所面对的买方群体正在出现新的研究需求。
  sourceRefs:
  - 1
  - 2
- point: Medable 报告称，组合级 eCOA 采用推动其收入增长 80%，说明买方正从单次试点走向更系统的采用。
  sourceRefs:
  - 7
- point: Signant 把 eCOA 实施周期缩短了 30%，说明“更快启动”确实是买方的实时优先级。
  sourceRefs:
  - 12
- point: Koneksa 在一项帕金森数字测量研究上完成 database lock，说明赞助方仍愿意持续投入远程神经测量的验证。
  sourceRefs:
  - 17
- point: Signant 正在收购 Ametris，说明把 eClinical 工作流和数字测量整合在一起，具备明确战略价值。
  sourceRefs:
  - 14
- point: Medable/CVS 和 Medable 伙伴网络的公告说明，通过研究中心、零售和 CRO 渠道分发的重要性正在上升。
  sourceRefs:
  - 15
  - 30
openQuestions:
- 一个 CNS 专用叠加层，能否在研究拿到第一次中期信号前就拿到预算，还是买方只愿意把它埋进 CRO 的 SOW？
- 在试点里，哪个早期产品 KPI 最能打动人：更快入组、更低筛败率、更高依从性，还是更低终点方差？
- 在不与既有 eCOA 供应商形成验证或边界冲突的前提下，这套工作流到底能掌握多大一部分？
- 耳鸣是否够大，能成为第一细分市场，还是应该先从精神分裂症切入，等证明信号质量改善后再扩展到耳鸣？
