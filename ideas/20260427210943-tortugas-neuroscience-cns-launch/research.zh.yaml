    - 10
    - 13
  - friction: 买方对未经验证的信号提升主张容忍度极低
    severity: high
    affectedBuyer: 首席医疗官 / 董事会
    mitigation: 先主打运营 ROI，再逐步证明终点质量改善。
    sourceRefs:
    - 3
    - 4
    - 17
  - friction: 预算必须来自研究 SOW，而不是常设软件预算
    severity: medium
    affectedBuyer: 财务 / 临床运营
    mitigation: 打包成与研究启动和中期读数风险下降直接绑定的单研究叠加层。
    sourceRefs:
