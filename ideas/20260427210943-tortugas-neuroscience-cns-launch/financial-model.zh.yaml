scenarios:
  downside:
    description: "预算拉力弱于预期，因此兼容 CRO 的试点转正更慢，Y3 活跃研究峰值只有 6 个，而不是 7 个。"
    y3RevenueK: 1620.0
    y3EbitdaK: -420.0
    cashLowPointK: 305.0
    keyAssumptionChanges:
      - "由于更多工作被卖成偏试点型范围，ARPU 降到 $300K。"
      - "因为 QA 和实施仍偏手工，Y3 末毛利率只能到 68%，而不是 72%。"
      - "销售周期大致拉长一个季度，导致 Y2 和 Y3 的研究启动数减少。"
  base:
    description: "Y1 的 3 个试点沉淀成一套可复制的精神分裂症研究启动打法，让公司在 Q4Y3 达到 7 项活跃研究，并接近 EBITDA 盈亏平衡。"
    y3RevenueK: 2186.25
    y3EbitdaK: -111.49
    cashLowPointK: 894.83
    keyAssumptionChanges:
      - "综合 ARPU 稳定在 $330K，包含设置费和监控收入。"
      - "随着模板复用降低服务强度，毛利率逐步爬升到 72%。"
      - "Y3 期间团队规模控制在 8 FTE。"
  upside:
    description: "运营 ROI 提前被验证，带动更快的第二研究扩张，并在下轮融资前解锁一个相邻适应症模块。"
    y3RevenueK: 2810.0
    y3EbitdaK: 170.0
    cashLowPointK: 960.0
    keyAssumptionChanges:
      - "随着更多合同带上高级分析和多研究范围，ARPU 提升到 $350K。"
      - "通过更快的试点转正，Q4Y3 活跃研究达到 9 项。"
      - "协议模板复用更充分，毛利率提升到 74%。"
sensitivity:
  - variable: ARPU
    downsideCase: "$300K blended annual revenue per active study"
    baseCase: "$330K blended annual revenue per active study"
    upsideCase: "$350K blended annual revenue per active study"
    y3RevenueImpactK: -198.75
    cashImpactK: -143.1
  - variable: CAC
    downsideCase: "$70K CAC if founder-led sales does not become repeatable"
    baseCase: "$55K CAC on 15 gross study wins in Y2-Y3"
    upsideCase: "$45K CAC with stronger CRO and investor referrals"
    y3RevenueImpactK: 0.0
    cashImpactK: -120.0
  - variable: churn
    downsideCase: "4.5% monthly sponsor / study churn from more one-and-done studies"
    baseCase: "3.5% monthly sponsor / study churn"
    upsideCase: "2.5% monthly churn from better second-study expansion"
    y3RevenueImpactK: -165.0
    cashImpactK: -118.0
  - variable: sales cycle
    downsideCase: "Average close slips one quarter because budgets stay inside CRO SOWs"
    baseCase: "Study-start trigger closes inside the quarter"
    upsideCase: "Pilot closes one month faster through reference customers"
    y3RevenueImpactK: -330.0
    cashImpactK: -240.0
  - variable: gross margin
    downsideCase: "68% exit gross margin from heavier services and QA support"
    baseCase: "72% exit gross margin"
    upsideCase: "74% exit gross margin with better template reuse"
    y3RevenueImpactK: 0.0
    cashImpactK: -87.0
  - variable: hiring pace
    downsideCase: "Commercial and implementation hires come 2 quarters earlier"
    baseCase: "Hiring capped at 8 FTE through Y3"
    upsideCase: "One noncritical hire delayed until after next round"
    y3RevenueImpactK: 0.0
    cashImpactK: -250.0
modelDiagram:
  title: 单位经济流转图
  mermaid: |
    flowchart LR
      LicensedAssets --> StudyStart
      StudyStart --> OverlaySale
      OverlaySale --> ActiveStudies
      ActiveStudies --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
modelSanity:
  - checkName: 收入引擎
    finding: "基准情景收入由 Y1 的 3 个付费研究驱动，并在 Q4Y3 增长到 7 项活跃研究，综合年合同值为 $330K。"
  - checkName: 必须跑对的事
    finding: "公司必须在首例患者入组前拿到预算，并至少把 2 个早期试点转成全研究合同，否则 Y2 的研究爬坡就会断。"
  - checkName: 模型失效条件
    finding: "如果销售周期延后一个季度，或毛利率只能做到 68%，现金就会少约 $240K，pre-seed 缓冲也会逼近 downside 的最低点。"
  - checkName: 下一轮融资证明点
    finding: "只有当公司拿下 8-12 个累计付费研究合同，并证明精神分裂症 KPI 可复制、且第二适应症扩张路径清晰时，下一轮融资才算站得住。"
sanityChecks:
