  finding: 基准情景收入由 Y1 的 3 项付费研究驱动，并在 Y3 Q4 以综合年合同额 $330K 增长到 7 项活跃研究。
- checkName: 必须做对的事
  finding: 公司必须在首例患者入组前拿到预算，并把至少 2 个早期试点转化为完整研究合同，否则 Y2 的研究爬坡就会断裂。
- checkName: 模型失效条件
  finding: 如果销售周期延后一整个季度，或毛利率降至 68%，将消耗大约 $240K 现金，并把 pre-seed 缓冲推近 downside 的低点。
- checkName: 下一轮融资证明
  finding: 只有在公司拿到 8-12 个累计付费研究合同、证明精神分裂症 KPI 可重复，并清晰展示第二适应症扩张路径时，下一轮融资才具备合理性。
sanityChecks:
  ruleOf40: Y3 增长 55.9% + EBITDA 利润率 -5.1% = 50.8%
  burnMultiple: 0.14x in Y3 ($111.5K net burn on $783.8K net new revenue).
  revenuePerFte: $273K 的 Y3 收入 / Q4 FTE（8 FTE 支撑 7 项活跃研究），对高接触垂直试验软件业务而言属合理水平。
  flags:
  - 模型假设买方会在首例患者入组前，为一层独立覆盖层拨款，即便 CRO 和 eCOA 供应商已经选定；而 BP 已明确指出这一点仍需真实验证。
  - 收入集中在少数几项研究中，因此只要一个赞助方启动延后，季度收入就可能波动约 $80K-$140K。
  - Y3 仍略微 EBITDA 为负，这意味着下一轮融资必须靠 KPI 证明和可复制性来赢得，而非盈利能力。
