scenarios:
  downside:
    description: 预算拉动弱于预期，因此兼容 CRO 的试点转化更慢，Y3 的活跃研究峰值只有 6 项而不是 7 项。
    y3RevenueK: 1620.0
    y3EbitdaK: -420.0
    cashLowPointK: 305.0
    keyAssumptionChanges:
    - 由于更多工作以试点为主的范围售出，ARPU 降至 $300K。
    - 由于 QA 和实施仍较依赖人工，Y3 末毛利率仅达到 68%，而非 72%。
    - 销售周期大致拉长一个季度，减少了 Y2 和 Y3 的研究启动量。
  base:
    description: Y1 的 3 个试点沉淀为可重复的精神分裂症研究启动打法，使公司到 Y3 Q4 达到 7 项活跃研究，并接近 EBITDA 盈亏平衡。
    y3RevenueK: 2186.25
    y3EbitdaK: -111.49
    cashLowPointK: 894.83
    keyAssumptionChanges:
    - 综合活跃研究 ARPU 保持在 $330K，包含设置费和监测收入。
    - 随着模板降低服务强度，毛利率逐步提升至 72%。
    - 到 Y3 为止，团队规模维持在 8 FTE。
  upside:
    description: 运营 ROI 较早被验证，从而更快解锁第二项研究扩展，并在下一轮融资前推出一个相邻适应症模块。
    y3RevenueK: 2810.0
    y3EbitdaK: 170.0
    cashLowPointK: 960.0
    keyAssumptionChanges:
    - 随着更多合同包含高级分析和多研究范围，ARPU 升至 $350K。
    - 由于试点转正式部署更快，到 Y3 Q4 活跃研究达到 9 项。
    - 由于方案模板复用更好，毛利率达到 74%。
sensitivity:
- variable: ARPU
  downsideCase: 单项活跃研究的综合年度收入为 $300K
  baseCase: 单项活跃研究的综合年度收入为 $330K
  upsideCase: 单项活跃研究的综合年度收入为 $350K
  y3RevenueImpactK: -198.75
  cashImpactK: -143.1
- variable: CAC
  downsideCase: 如果创始人主导销售无法变得可复制，CAC 升至 $70K
  baseCase: 在 Y2-Y3 获得 15 个总研究中标时，CAC 为 $55K
  upsideCase: 若 CRO 与投资人转介更强，CAC 降至 $45K
  y3RevenueImpactK: 0.0
  cashImpactK: -120.0
- variable: 流失率
  downsideCase: 更多一次性研究导致每月赞助方 / 研究流失率为 4.5%
  baseCase: 每月赞助方 / 研究流失率为 3.5%
  upsideCase: 由于第二项研究扩展更好，每月流失率降至 2.5%
  y3RevenueImpactK: -165.0
  cashImpactK: -118.0
- variable: 销售周期
  downsideCase: 由于预算继续留在 CRO SOW 内，平均签约延后一整个季度
