  upsideCase: 通过标杆客户，试点签约可提前 1 个月
  y3RevenueImpactK: -330.0
  cashImpactK: -240.0
- variable: 毛利率
  downsideCase: 因服务和 QA 支持更重，期末毛利率为 68%
  baseCase: 期末毛利率为 72%
  upsideCase: 因模板复用更佳，期末毛利率为 74%
  y3RevenueImpactK: 0.0
  cashImpactK: -87.0
