jobsToBeDone:
- job: 当一座承载收入的液冷机房满载运行时，帮运营负责人判断哪条回路该介入、该排什么维护动作，这样他们就能躲开紧急机架冲洗和计划外停机。
  currentAlternative: 人工取样、OEM 告警和被动拉起应急战情室。
  successMetric: 避免掉的计划外机架停机小时数，以及从异常出现到动作获批的平均时长。
- job: 当污染或磨损事件冒头时，帮可靠性团队把根因和质保记录整理出来，这样他们既能追偿，也能避免同样的故障继续蔓延到别的机房。
  currentAlternative: 电子表格事后复盘、供应商互相甩锅，以及人工翻工单。
  successMetric: 判定根因所需时间，以及不必整机架停机就能结案的事故占比。
