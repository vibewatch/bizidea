problem: 液冷 GPU 运营商现在扛着一种通用设施软件管不好的新可用性风险：冷却液污染、泵磨损和密封件老化会悄悄累积，最后逼出紧急冲洗或整机架停机。多数团队今天还在靠人工取样、OEM 服务电话和事后应急手册，所以往往先知道出问题了，却不知道下一步该怎么动。一旦一排机架对应的是价值数百万美元的训练或推理产能，冷却液化学状态就不再只是设施细节，而是有人真正管预算的运营问题。
targetUser:
  primary: 北美 GPU 云运营商里负责数据中心可靠性的总监，管理直触式液冷集群，并对外承担客户可用性 SLA。
  secondary: 负责回路维护、供应商协同和事故响应的设施可靠性工程师，或液冷项目经理。
  buyer: GPU 云服务商或 AI 托管数据中心运营商里的数据中心运营 VP 或 COO。
startupThesis:
  nonObviousInsight: 真正冒出来的新控制点，不只是冷却硬件，而是把冷却液当成可消耗可靠性层来运营的软件系统。变化已经发生：液冷 GPU 机架在快速铺开，在线光谱仪让流体健康度可以持续测量，而一次持续数小时的停机，如今已经贵到足以单独批出软件预算。
  beachhead: 先打北美 GPU 云服务商：他们已经运营 1–5 个直触式液冷机房，要对客户承担可用性 SLA，泵、冷却液和歧管又往往来自不同供应商，结果谁都没有真正拍板流体健康的职责。
  wedge: 一套冷却液可靠性控制平面，把在线流体遥测、维护日志和厂商规范并到一起，给每条回路打健康分，推荐冲洗、隔离或检修等动作，并在停机前把可用于质保索赔的事故记录留齐。
  whyNowCatalyst: Omen 的融资、12 家客户进展，以及“污染会让机架停摆 5–6 小时”的说法，都说明液冷化学状态已经从设施细节跨进了有预算的 GPU 可用性风险。
  ventureScalePath: 先从 GPU 云的运行期冷却液可靠性切入，再往调试投运、供应商横向对标、备件规划、保险与贷款方报告，以及液冷 AI 机群的主记录系统扩。
solution: 先做一套中立的冷却液可靠性控制平面，压在传感器、CDU 遥测和维护工单之上。产品会给每条回路、每个机架分区和每一批冷却液建数字护照，再把异常信号翻成具体动作：该补药、该隔离、该冲洗、该换件，还是该排一个计划内维护窗口。系统还会判断最可能的故障模式、谁该批准这次响应，以及这起事故是不是该转成质保或供应商质量索赔。时间一长，平台会学会不同回路设计下，哪些化学信号和处置步骤真的能把停机挡住，让运营团队不再每次都拉应急战情室。
goToMarketSeed:
  firstCustomer: 北美 GPU 云服务商里的数据中心运营 VP：他们正为对外训练或推理租户上线第二个 2–10 MW 液冷机房，也刚意识到 OEM 的点状工具管不了跨厂商的冷却液决策。
  buyingTrigger: 新的液冷机房要上线，而且对外承诺可用性 SLA；尤其是在赶部署进度、不得不引入第二家冷却液、泵或歧管供应商的时候。
  currentAlternative: 人工冷却液取样、OEM 维护手册、电子表格应急手册，以及通用 BMS / DCIM 告警。
  switchingReason: 这家创业公司能把原始流体数据翻成中立的维护决策和证据，减少突发冲洗、机架停机，以及事故后的相互甩锅；这些问题，点状工具和服务合同都解决不了。
  pricingHypothesis: 按每个在管液冷机房或每 MW 收年费订阅；每出现一种新回路拓扑，再收一次导入费。
