topRisks:
- name: OEM 打包
  description: 冷却 OEM 或传感器厂商，可能会把足够多的工作流软件一起打包进去，让独立控制平面更难卖。
  mitigation: 坚持中立、先把混合机群的跨厂商集成跑通，并抢下任何单一 OEM 都很难可信管理的质保与维护决策工作流。
- name: 遥测碎片化
  description: 早期客户的传感器覆盖、人工日志和维护数据可能参差不齐，自动化建议的上限会被拖住。
  mitigation: 先支持轻量 CSV 和工单导入，把人工复核的处置手册留在环里，先用事故协同证明价值，再谈完全自治。
- name: 液冷渗透节奏参差
  description: 部分 AI 站点采用液冷的速度可能比预期慢，早期市场就会比模型里更窄。
  mitigation: 先盯住已经背着可用性 SLA 上线液冷机房的 GPU 云和 AI 托管运营商，再拿这些客户做案例，等品类成熟后往外扩。
