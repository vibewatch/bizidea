slug: coolant-reliability-control-plane
date: '2026-06-30'
executiveSummary: >-
  Coolant Reliability Control Plane should start as a vendor-neutral coolant
  reliability system for North American GPU cloud and AI colocation operators
  running direct-to-chip liquid-cooled halls under external uptime SLAs. The
  pain is specific and expensive: Omen says bacterial contamination can force
  5-6 hour rack shutdowns, while broader downtime benchmarks suggest the
  financial exposure is large enough to justify a dedicated operational
  software budget. The right first customer is a VP Data Center Operations team
  bringing a second liquid-cooled hall online or mixing vendors across pumps,
  CDUs, manifolds, and coolant programs, because that is when ownership gaps
  and warranty ambiguity become acute. The MVP should ingest existing CDU,
  chemistry, BMS/DCIM, and ticket data to create loop passports, score loop
  health, recommend human-approved interventions, and generate warranty-ready
  incident records. The company should deliberately avoid building sensors or
  replacing DCIM in the first phase; the wedge is decisioning and evidence
  across mixed fleets, not another telemetry dashboard. Research-backed sizing
  supports an estimated $300.0M TAM, $36.3M beachhead SAM, and $3.0M year-3
  SOM if the company reaches roughly 12 contracted halls before expanding into
  benchmarking, commissioning, and insurer or lender reporting. The strongest
  strategic upside is that each deployment compounds proprietary data on
  chemistry signatures, vendor combinations, interventions, and downtime
  outcomes. The biggest unresolved questions are incident frequency, real
  budget ownership, and how often existing telemetry is sufficient without new
  hardware, so the first 12 months must prove software-first deployment and
  six-figure annual conversions.
problem:
  - "Coolant contamination, pH drift, pump wear, and seal degradation can build inside direct-to-chip loops until operators face emergency rack flushes or multi-hour shutdowns with GPU revenue and SLA exposure."
  - "Most teams still manage the issue through manual sampling, OEM service manuals, spreadsheets, and generic BMS/DCIM alarms, which leaves no neutral system to decide intervention steps or document warranty evidence across mixed vendors."
solution:
  - "Create a vendor-neutral control plane that ingests CDU telemetry, coolant chemistry data, maintenance logs, and vendor specifications to assign each loop a health score and recommended next action."
  - "Start with human-approved recommendations, loop passports, escalation workflows, and incident evidence packs, then add fleet benchmarking, commissioning support, and external reporting only after the workflow is trusted."
whyWeWin:
  - "Cooling OEMs, chemistry vendors, and monitoring startups expose data or sell hardware, but the buyer still lacks a cross-vendor system of record for intervention logic, warranty alignment, and post-incident proof."
  - "Every deployment compounds proprietary data on chemistry signatures, vendor combinations, remediation steps, and downtime outcomes, creating a harder-to-replace reliability dataset than a standalone sensor feed."
strategicChoices:
  beachhead: "North American GPU cloud and AI colocation operators running 1-5 direct-to-chip liquid-cooled halls with external uptime SLAs and at least two cooling-stack vendors in the same campus."
  wedgeRationale: >-
    This entry point creates faster proof than a generic data-center
    monitoring product because hall commissioning and mixed-vendor changeovers
    concentrate pain, budget, and measurable outcomes in one place. A broader
    play across all data centers or all liquid-cooling architectures would slow
    sales and hide whether the product truly prevents expensive intervention
    mistakes.
  sequencingRationale: >-
    Start with loop passports, alert triage, and evidence packs using existing
    telemetry so pilots can launch without new hardware or control-path risk.
    Add benchmarking and second-hall expansion once at least 2 pilots convert,
    then layer commissioning, spare-parts planning, and external reporting only
    after the company owns enough intervention outcome data to make those
    modules credible.
  notYet:
    - "Immersion cooling or bespoke hyperscaler liquid-cooling deployments"
    - "Proprietary sensor hardware or OEM-owned monitoring appliances"
    - "Generic DCIM or BMS replacement"
    - "Water sustainability, insurer reporting, or lender reporting as the first SKU"
market:
  tam: "$300.0M estimated TAM based on roughly 1,200 liquid-cooled AI halls globally by 2030 and about $250k annual coolant-reliability software budget per hall."
  sam: "$36.3M estimated SAM for North American GPU cloud and AI colocation operators that fit the 1-5 hall beachhead and sell external uptime-backed capacity."
  som: "$3.0M estimated year-3 SOM based on approximately 12 contracted halls at about $250k ARR per hall across 8-10 operators."
  segments:
    - "North American GPU cloud operators running liquid-cooled AI capacity under customer uptime SLAs"
    - "AI colocation operators adding or expanding direct-to-chip liquid-cooled halls for external tenants"
  buyingProcess: >-
    The operational champion is usually the director of data-center
    reliability, facilities reliability lead, or liquid-cooling program owner,
    while the economic buyer is typically the VP Data Center Operations or COO
    because the spend sits at the intersection of uptime, facilities, and
    customer SLAs. Deals should start during hall commissioning, vendor-mix
    changes, or immediately after a contamination scare, then move through
    operations, facilities, procurement, and OEM or service-partner review
    because maintenance responsibilities cross company boundaries.
product:
  mvp: >-
    The MVP should work with existing telemetry first: ingest CDU and chemistry
    signals, maintenance tickets, and vendor rules to create loop passports,
    flag excursions, recommend isolate, flush, dose, or service actions, and
    generate warranty-ready incident records. It should remain human-in-the-loop
    and avoid autonomous control or mandatory new hardware in the first
    release.
  sixMonth: "Deploy 2-3 paid one-hall pilots that prove loop passports, recommended actions, incident timelines, and baseline-versus-post-deployment downtime and labor reporting."
  twelveMonth: "Convert at least 2 pilots to annual subscriptions, ship standard integrations for the most common CDU, BMS/DCIM, chemistry-monitoring, and ticketing stacks, and launch cross-hall benchmarking inside existing accounts."
  twentyFourMonth: "Expand into multi-site coolant governance, vendor scorecards, spare-parts and maintenance planning, and insurer or lender reporting after the company has referenceable proof across roughly 8-12 halls."
  keyBets:
    - "Existing CDU, chemistry, and maintenance data are sufficient to create a valuable MVP at enough sites without selling proprietary hardware."
    - "Human-approved intervention recommendations and evidence packs create budget before autonomous optimization does."
    - "Mixed-vendor halls are more urgent and more defensible than single-OEM greenfield sites where one vendor already owns the operating model."
    - "Cross-site benchmarking of remediation outcomes compounds into a real moat instead of remaining a consulting artifact."
gtm:
  wedge: "Land one paid pilot in a newly commissioned or recently expanded liquid-cooled hall where mixed vendors and external uptime SLAs make manual sampling and OEM point tools insufficient."
  channels:
    - "Founder-led direct sales to VP Data Center Operations, COO, and reliability leaders at GPU clouds and AI colocation operators in commissioning windows"
    - "Design-partner pilots with operators bringing a second hall online or standardizing liquid-cooling workflows across multiple halls"
    - "Referral and co-sell partnerships with CDU vendors, coolant-service firms, and chemistry partners after the first reference customer proves the neutral software layer"
  funnelTargets: "Target account→qualified discovery 20-30%, qualified discovery→paid pilot 15-25%, paid pilot→annual production 50%+, production→second hall expansion 40%+ within 12 months."
  pricing: >-
    Start with a 10-14 week paid pilot priced around $60k-$120k for one hall,
    then convert to an annual subscription of roughly $180k-$300k per
    liquid-cooled hall plus onboarding for loop-passport setup and
    integrations, because the buyer is purchasing avoided downtime, faster
    intervention, and warranty evidence rather than sensors or seats.
businessModel:
  revenueStreams:
    - "Annual software subscription per liquid-cooled hall, with MW-based pricing bands for larger campuses"
    - "One-time onboarding and loop-passport setup fees for each new topology or hall"
    - "Premium benchmarking, vendor scorecard, and warranty analytics modules"
    - "Later-stage reporting modules for commissioning, insurer, lender, and fleet-governance use cases"
  unitOfValue: "Liquid-cooled hall under active coolant-governance, with price bands for MW and loop complexity."
  targetGrossMarginPct: 70
  expansionLevers:
    - "Expand from one hall to all liquid-cooled halls on the same campus or operator footprint"
    - "Add vendor benchmarking, maintenance planning, and spare-parts forecasting once intervention history accumulates"
    - "Sell commissioning and reporting workflows to the same account after the reliability wedge is trusted"
strategyMap:
  northStarMetric: "Liquid-cooled halls in production with governed intervention workflows and verified incident outcomes."
  inputMetrics:
    - "Qualified discovery to paid pilot conversion rate in the beachhead"
    - "Percent of pilot loops with a complete vendor-rule passport and baseline chemistry profile"
    - "Median alert-to-approved-action time versus the customer's pre-deployment baseline"
    - "Percent of incidents closed with a warranty-ready evidence package"
    - "Paid pilot to annual production conversion rate"
    - "Second-hall expansion rate within 12 months of first production deployment"
  moatsToBuild:
    - "Cross-vendor loop passport library covering temperature, pressure, flow, chemistry, and maintenance rules by component combination"
    - "Outcome dataset linking chemistry signatures, interventions, vendors, and downtime results across halls"
    - "Benchmark corpus for which remediation steps, vendors, and operating envelopes actually reduce incidents over time"
  killCriteria:
    - "If fewer than 3 of the first 12 qualified ICP accounts will pay for a one-hall pilot, revisit the wedge or stop."
    - "If the first 3 pilots cannot cut alert-to-approved-action time by at least 50% or document one avoided emergency intervention, pause expansion."
    - "If more than half of qualified buyers insist the product must be bundled inside a single OEM or chemistry-service contract, shift to channel-first or abandon the standalone motion."
  mermaid: |
    flowchart LR
      Wedge[One hall coolant reliability wedge] --> MVP[Loop passport and action engine]
      MVP --> Proof[Prevented incidents and evidence]
      Proof --> Expansion[Fleet governance and benchmarking]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: "Promising wedge with real pain and good timing, but conviction depends on proving that operations leaders will fund a standalone software layer before OEM bundles close the gap."
    whyBelieve: "Mixed-vendor liquid-cooled AI halls now have rack-level downtime exposure, and no public incumbent clearly owns the neutral intervention and evidence workflow across that stack."
    whyDoubt: "The category could collapse into sensor, OEM, or water-treatment bundles if buyers see the workflow as a feature instead of a separate control plane."
    nextDiligence: "Verify that 2-3 paid pilots can launch on existing telemetry and convert into six-figure annual hall subscriptions after showing faster intervention and better incident evidence."
  firstCustomer:
    title: "VP Data Center Operations at a GPU cloud operator commissioning a second liquid-cooled hall"
    profile: "A North American GPU cloud or AI colocation operator bringing a second 2-10 MW direct-to-chip hall online, running mixed pump, coolant, CDU, and manifold vendors, and selling uptime-backed capacity to external AI customers."
    trigger: "A new hall go-live, mixed-vendor expansion, or recent contamination scare reveals that no single vendor owns coolant decisioning across the stack."
    buyer: "VP Data Center Operations or COO"
    initialContract: "A 10-14 week paid pilot for one hall at roughly $60k-$120k, credited toward a $180k-$300k annual hall subscription if the pilot proves faster intervention and production-ready evidence."
  mustBeTrue:
    - "At least 3 of the first 10 qualified GPU cloud or AI colo prospects will pay for a one-hall pilot before a catastrophic coolant outage forces the purchase."
    - "The first 3 pilots can cut alert-to-approved-action time by at least 50% or document one avoided emergency flush or shutdown."
    - "At least half of qualified pilot sites can launch the MVP using existing CDU, chemistry, BMS/DCIM, and ticket data without proprietary new hardware."
    - "A VP or COO-level owner can approve a six-figure annual contract within a 6-9 month cycle once pilot evidence is delivered."
    - "OEMs and chemistry-service partners will integrate with a neutral evidence layer instead of blocking data access or insisting on owning the workflow."
  diligenceQuestions:
    - "How many target operators are commissioning second liquid-cooled halls in the next 12 months and fit the mixed-vendor profile?"
    - "Who currently owns coolant incident budget and approval at neoclouds and AI colos?"
    - "What percentage of live sites already have enough telemetry for software-first deployment?"
    - "Which incidents actually generate warranty recoveries or vendor disputes worth instrumenting?"
    - "Do buyers prefer a direct software contract or procurement through a cooling OEM or chemistry-service partner?"
operatingAssumptions:
  - assumption: "The first budget sits with data-center operations leadership, not only with facilities water-treatment teams."
    basis: idea.yaml
    validationTest: "Map budget authority across 8 qualified prospects and confirm at least 5 give pilot-spend authority to a VP Data Center Operations or COO-level owner."
    decisionImpact: "If false, the company must sell through service partners, accept longer committee sales cycles, or narrow to operators with clearer centralized ownership."
  - assumption: "Existing telemetry is sufficient to populate loop passports and alert logic at enough sites without mandatory proprietary hardware."
    basis: research.yaml
    validationTest: "Complete integration audits on 3 live or commissioning halls and confirm 2 can support the MVP from current CDU, chemistry, BMS/DCIM, and ticket data."
    decisionImpact: "If false, the company must narrow the ICP to better-instrumented sites or add hardware partnerships that change pricing and gross-margin assumptions."
  - assumption: "Hall-based six-figure ARR is acceptable because the subscription is small relative to downtime and incident-coordination cost."
    basis: research.yaml
    validationTest: "Quote 6 pilot conversions and confirm at least 3 accept annual pricing in the $180k-$300k per hall range or an equivalent MW-based band."
    decisionImpact: "If false, the company must reduce pricing, revisit market size assumptions, or expand services to justify spend."
  - assumption: "Warranty-ready incident records are a material differentiator versus monitoring dashboards alone."
    basis: idea.yaml
    validationTest: "In the first 3 pilots, confirm at least 2 customers use the evidence pack in an OEM, insurer, or internal root-cause review."
    decisionImpact: "If false, the roadmap should emphasize benchmarking and workflow productivity over claims and vendor-quality positioning."
  - assumption: "Channel partners will expand distribution after direct proof instead of commoditizing the workflow."
    basis: research.yaml
    validationTest: "Secure 2 referral or co-sell agreements after the first reference customer and source at least 3 qualified opportunities from them."
    decisionImpact: "If false, keep GTM direct for longer and avoid building the company around partner-controlled demand."
experimentRoadmap:
  - horizon: "0–90 days"
    experiment: "Interview 12 VP, director, and reliability leaders at GPU clouds and AI colocation operators that are commissioning or expanding liquid-cooled halls."
    hypothesis: "The strongest buying trigger is hall commissioning or mixed-vendor expansion, and a single operations owner can sponsor pilot budget."
    successMetric: "At least 8 interviews describe a current commissioning or workflow trigger and at least 5 identify a clear economic buyer."
    owner: "Founder/CEO"
  - horizon: "0–90 days"
    experiment: "Run telemetry and workflow audits on 3 live or commissioning halls using current CDU, chemistry, BMS/DCIM, and ticketing data."
    hypothesis: "The MVP can launch as software-first at most beachhead sites without new instrumentation."
    successMetric: "At least 2 of 3 audited sites can support loop passports, baseline health scoring, and action recommendations from existing data sources."
    owner: "Founding eng"
  - horizon: "0–90 days"
    experiment: "Deliver one concierge loop-passport and historical incident evidence pack for a design partner from archived logs and maintenance records."
    hypothesis: "Even before automation, the evidence workflow is valuable enough to earn a paid pilot sponsor."
    successMetric: "One target account confirms the output changes its postmortem or maintenance process and agrees to a pilot or LOI."
    owner: "Reliability solutions engineer"
  - horizon: "90–180 days"
    experiment: "Run 2 paid one-hall pilots with loop passports, alert triage, recommended actions, and incident evidence generation."
    hypothesis: "The product can improve decision speed and incident quality without replacing the customer's existing DCIM or cooling hardware stack."
    successMetric: "At least 2 pilots go live and at least 1 shows a 50% faster alert-to-approved-action cycle or one avoided emergency intervention."
    owner: "Product/eng lead"
  - horizon: "90–180 days"
    experiment: "Test conversion from paid pilot to annual hall subscription using the standard per-hall pricing package."
    hypothesis: "Buyers will fund a six-figure annual contract once the pilot produces operational proof."
    successMetric: "At least 2 pilot customers reach annual contract negotiation and at least 1 converts within the first 12 months."
    owner: "Founder/CEO"
  - horizon: "180–360 days"
    experiment: "Launch one co-sell motion with a CDU vendor or chemistry-service partner tied to a live hall expansion."
    hypothesis: "Partners can accelerate qualified pipeline after a direct reference customer exists without taking over the product narrative."
    successMetric: "At least 2 qualified opportunities are sourced through one repeatable partner channel and 1 advances to pilot stage."
    owner: "Partnerships lead"
operations:
  - "Maintain a vendor-requirements library for temperature, pressure, flow, coolant chemistry, and warranty limits by CDU, cold plate, pump, and coolant combination."
  - "Run weekly reliability reviews with each pilot comparing alerts, manual samples, work orders, and closed incidents against the customer's baseline."
  - "Keep a reference integration stack for CDU telemetry, chemistry sensors, BMS/DCIM feeds, and ticketing so deployments stay software-first and repeatable."
  - "Establish an escalation network with sampling labs and field-service partners so recommended actions can be executed and documented on schedule."
team:
  - role: "Founder/CEO"
    startTiming: "Month 0"
    rationale: "Own founder-led sales, design-partner recruitment, partner mapping, and the cross-functional buyer navigation required in the first enterprise accounts."
  - role: "Founding eng"
    startTiming: "Month 0"
    rationale: "Build the ingestion layer, loop-passport data model, alert logic, audit trails, and the first integrations into CDU, BMS/DCIM, and ticketing systems."
  - role: "Reliability solutions engineer"
    startTiming: "Month 2"
    rationale: "Translate chemistry and warranty requirements into deployable rules, run site implementations, and turn incidents into referenceable customer proof."
  - role: "Product/eng lead"
    startTiming: "Month 6"
    rationale: "Productize pilot learnings into a repeatable roadmap covering benchmarking, evidence workflows, and multi-hall account expansion."
  - role: "Partnerships lead"
    startTiming: "Month 9"
    rationale: "Build OEM and chemistry-service channels only after at least 2 pilots are referenceable and the direct value narrative is proven."
milestones:
  - horizon: "0–12 months"
    items:
      - "Sign 2-3 paid one-hall pilots with GPU cloud or AI colocation operators in the beachhead"
      - "Prove at least one pilot delivers a 50% faster alert-to-approved-action cycle or an avoided emergency intervention"
      - "Convert at least 2 pilots into annual hall subscriptions at the target price band"
      - "Ship repeatable integrations for the most common CDU, chemistry-monitoring, BMS/DCIM, and ticketing combinations seen in pilots"
  - horizon: "12–24 months"
    items:
      - "Expand to roughly 8 contracted halls across 5-6 operators"
      - "Launch cross-hall benchmarking, vendor scorecards, and maintenance-planning workflows"
      - "Establish one repeatable channel with a CDU vendor or chemistry-service partner"
      - "Win second-hall expansion in at least 3 customer accounts"
  - horizon: "24–36 months"
    items:
      - "Reach approximately 12 contracted halls, consistent with the modeled year-3 SOM"
      - "Add commissioning, spare-parts planning, and insurer or lender reporting modules"
      - "Become the system of record for coolant governance across mixed-vendor direct-to-chip environments in the initial customer base"
risks:
  - risk: "Cooling OEMs, chemistry vendors, or monitoring startups bundle enough workflow capability that buyers treat the product as a feature."
    likelihood: High
    impact: High
    mitigation: "Own the neutral loop-passport record, intervention evidence, and cross-vendor benchmarking that bundled point solutions do not naturally provide."
  - risk: "Telemetry is too fragmented or too weak at early sites, forcing the company into hardware-heavy deployments."
    likelihood: High
    impact: High
    mitigation: "Qualify for instrumentation maturity, launch on software-first sites first, and partner for sensing only where the workflow value is already proven."
  - risk: "Budget ownership is diffuse across operations, facilities, procurement, and service partners, slowing pilot approval."
    likelihood: Medium
    impact: High
    mitigation: "Sell only against concrete commissioning, expansion, or incident triggers and package the pilot around one accountable economic buyer."
  - risk: "False alerts or weak recommendations erode trust before the dataset is deep enough to support confident action guidance."
    likelihood: Medium
    impact: High
    mitigation: "Keep the first release human-in-the-loop, log every action and outcome, and tune rules with customer reliability teams before promising automation."
  - risk: "Brownfield retrofits and broader liquid-cooling adoption move slower than expected, shrinking near-term pipeline."
    likelihood: Medium
    impact: Medium
    mitigation: "Focus on operators with live expansions or secured campuses first and delay adjacent-market hiring until the beachhead converts repeatably."
fundingAsk:
  round: seed
  targetFundingRangeUsd: "$3–5M"
  runwayMonths: 18
  useOfFundsSummary: "Fund 18 months to build the software-first control plane, hire the core engineering and reliability implementation team, complete 2-3 paid design-partner pilots, prove hall-based six-figure pricing and pilot conversion, and establish the first OEM or chemistry-partner channel before broader fleet expansion."
