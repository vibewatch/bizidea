slug: coolant-reliability-control-plane
date: '2026-06-30'
executiveSummary: 冷却液可靠性控制平面，最该先卖给北美 GPU 云和 AI 托管数据中心运营商：他们已经在直触式液冷机房里对外承诺可用性 SLA，却还得跨泵、CDU、歧管和冷却液供应商协调维护。痛点既具体又昂贵：Omen 说，细菌污染会逼出 5–6 小时的机架停机；更广义的停机基准也说明，财务敞口已经大到足以单独批一笔运营软件预算。最理想的首批客户，是正在上线第二个液冷机房、或刚把多家供应商混进同一园区的数据中心运营 VP 团队，因为这正是职责断层和质保归责最容易失控的时候。MVP 应该先吃现有 CDU、化学、BMS/DCIM 和工单数据，给每条回路建护照、给回路健康打分、推荐由人批准的处置动作，并自动整理成可用于质保的事故记录。第一阶段要刻意不碰传感器硬件，也不去替代 DCIM；真正的切口，是跨混合机群做决策和证据，而不是再做一个遥测看板。按研究测算，TAM 约 $300.0M，滩头 SAM 约 $36.3M；如果公司在第 3 年签下大约 12 个机房，再往横向对标、投运支持和保险 / 贷款方报告扩，SOM 可做到 $3.0M。最大的战略上行空间，在于每次部署都会沉淀一套专有数据：化学特征、供应商组合、处置动作和停机结果会越积越厚。最悬而未决的问题，是事故到底有多频繁、预算归谁，以及在不加新硬件的前提下，现有遥测究竟够不够用；所以前 12 个月必须证明，软件先行的部署真能跑通，也真能换来六位数年费合同。
problem:
- 冷却液污染、pH 漂移、泵磨损和密封老化，会在直触式回路里一路累积，直到运营方被迫面对紧急机架冲洗，或持续数小时的停机，以及随之而来的 GPU 收入和 SLA 风险。
- 多数团队今天还在靠人工取样、OEM 服务手册、电子表格和通用 BMS / DCIM 告警来管这件事，所以混合供应商环境里始终缺一套中立系统，能真正拍板该怎么介入，也能把质保证据记完整。
solution:
- 做一套中立控制平面，吃进 CDU 遥测、冷却液化学数据、维护日志和厂商规范，给每条回路打健康分，并推荐下一步动作。
- 先把人留在环里：从建议、回路护照、升级流程和事故证据包做起；只有等工作流被信任之后，再往全机群横向对标、投运支持和外部报告扩。
whyWeWin:
- 冷却 OEM、化学供应商和监测创业公司要么卖硬件，要么露数据；但采购方真正缺的，仍是一套跨供应商的主记录系统，能把处置逻辑、质保口径和事故后证据串在一起。
- 每次部署都会把化学特征、供应商组合、处置步骤和停机结果沉淀成专有数据；这套可靠性数据集，比单一传感器数据流更难被替代。
strategicChoices:
  beachhead: 北美 GPU 云和 AI 托管数据中心运营商：他们在同一园区里运行 1–5 个直触式液冷机房，对外承诺可用性 SLA，而且冷却栈至少混用两家供应商。
  wedgeRationale: 这条入口比“通用数据中心监测产品”更容易更快拿到证明，因为机房投运和混合供应商切换，会把痛点、预算和可量化结果都压到同一个时点。若一上来就想覆盖所有数据中心，或所有液冷架构，销售只会变慢，也更难看清产品究竟有没有避免昂贵的维护误判。
  sequencingRationale: 先用现有遥测把回路护照、告警分诊和证据包跑起来，这样试点不必带新硬件，也不会碰控制路径风险。等至少 2 个试点转正后，再加横向对标和第二机房扩张；至于投运、备件规划和外部报告，要等公司手里攒够处置结果数据，模块才会有说服力。
  notYet:
  - 浸没式冷却，或超大规模云厂商的定制液冷部署。
  - 自研传感器硬件，或由 OEM 独占的监测设备。
  - 通用 DCIM 或 BMS 替代方案。
  - 把节水、保险报告或贷款方报告做成第一款 SKU。
market:
  tam: 按到 2030 年全球约 1,200 个液冷 AI 机房、每个机房每年约 $250k 的冷却液可靠性软件预算估算，TAM 约为 $300.0M。
  sam: 把范围收窄到北美、符合 1–5 个机房滩头画像、并对外销售带 SLA 算力的 GPU 云和 AI 托管数据中心运营商，SAM 约为 $36.3M。
  som: 第 3 年可达的情形，是签下约 12 个机房、分布在 8–10 家运营商里；按每个机房约 $250k ARR 估，SOM 约为 $3.0M。
  segments:
  - 在客户可用性 SLA 下运营液冷 AI 算力的北美 GPU 云服务商。
  - 为外部租户新建或扩容直触式液冷机房的 AI 托管数据中心运营商。
  buyingProcess: 业务牵头人往往是数据中心可靠性负责人、设施可靠性主管或液冷项目负责人；真正拍预算的，通常是数据中心运营 VP 或 COO，因为这笔钱正卡在可用性、设施和客户 SLA 的交界处。成交最好从机房投运、供应商更换，或一次污染惊魂之后立刻切进去；随后再穿过运营、设施、采购，以及 OEM 或服务伙伴的联合评审，因为维护职责本来就跨公司边界。
product:
  mvp: MVP 要先吃现有遥测：把 CDU 和化学信号、维护工单及厂商规则并进来，给每条回路建护照、标出越界项、推荐隔离、冲洗、加药或检修动作，并自动生成可用于质保的事故记录。第一版必须坚持人留在环里，也不要强推自动控制或新硬件。
  sixMonth: 落地 2–3 个付费的单机房试点，证明回路护照、动作建议、事故时间线，以及“上线前 / 上线后”的停机和人工对照报告都能跑通。
  twelveMonth: 至少把 2 个试点转成年度订阅，交付主流 CDU、BMS/DCIM、化学监测和工单栈的标准集成，并在现有客户里上线跨机房横向对标。
  twentyFourMonth: 等公司在大约 8–12 个机房里拿到可引用的证明后，再往多站点冷却液治理、供应商评分卡、备件与维护规划，以及保险 / 贷款方报告扩。
  keyBets:
  - 在足够多的站点里，现有 CDU、化学和维护数据，已经足以支撑一个有价值的 MVP；不必靠自研硬件才能落地。
  - 由人批准的处置建议和证据包，会比自动优化更早替产品拿到预算。
  - 混合供应商机房的痛点更急，也更有防守力；反而是单一 OEM 的新建站点，原厂更容易直接接管运营模型。
  - 跨站点比较处置结果，最终会沉淀成真实护城河，而不是一份一次性的咨询交付物。
gtm:
  wedge: 先在一座刚投运或刚扩容的液冷机房里，拿下一单付费试点；这里既有混合供应商，又要对外担 SLA，人工取样和 OEM 点状工具都已经不够用。
  channels:
  - 在投运窗口期，由创始人直接卖给 GPU 云和 AI 托管数据中心运营商里的数据中心运营 VP、COO 与可靠性负责人。
  - 和正在上线第二个机房、或想把多机房液冷流程标准化的运营商做共创客户试点。
  - 首个标杆客户跑出来后，再和 CDU 厂商、冷却液服务商及化学合作方做转介绍与联合销售。
  funnelTargets: 目标账户 -> 合格初筛沟通 20–30%，合格初筛沟通 -> 付费试点 15–25%，付费试点 -> 年度正式部署 50%+，正式部署 -> 12 个月内扩到第二个机房 40%+。
  pricing: 先做一个 10–14 周的付费试点，单机房定价约 $60k–$120k；转正后按每个液冷机房每年约 $180k–$300k 收订阅费，再加回路护照配置和集成导入费。采购方买的不是传感器或账号席位，而是更少的停机、更快的处置和更硬的质保证据。
businessModel:
  revenueStreams:
  - 按液冷机房收年度软件订阅费；更大的园区再按 MW 分层定价。
  - 每种新拓扑或新机房收一次导入费和回路护照配置费。
  - 高级横向对标、供应商评分卡和质保分析模块。
  - 后期再上投运、保险、贷款方和全机群治理类报告模块。
  unitOfValue: 一个正在执行冷却液治理流程的液冷机房；价格再按 MW 和回路复杂度分层。
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一个机房扩到同一园区、同一运营商名下的全部液冷机房。
  - 等处置历史积累起来后，加卖供应商横向对标、维护规划和备件预测。
  - 可靠性切口被信任后，再往同一客户卖投运和报告工作流。
strategyMap:
  northStarMetric: 已经进入正式生产、处置工作流受治理且事故结果可核验的液冷机房数量。
  inputMetrics:
  - 滩头客户里，从合格初筛沟通到付费试点的转化率。
  - 试点回路里，拥有完整厂商规则护照和基线化学档案的占比。
  - 相较客户部署前基线，从告警出现到动作获批的中位时长。
  - 带着可用于质保的证据包结案的事故占比。
  - 付费试点转年度正式部署的转化率。
  - 首个机房上线后 12 个月内，扩到第二个机房的比例。
  moatsToBuild:
  - 一套跨供应商的回路护照库，覆盖不同部件组合下的温度、压力、流量、化学和维护规则。
  - 把化学特征、处置动作、供应商组合和停机结果连起来的结果数据集。
  - 一套横向对标语料，能看清哪些处置步骤、哪些供应商组合、哪些运行边界，长期来看真的在减少事故。
  killCriteria:
  - 如果前 12 个合格 ICP 账户里，愿意为单机房试点付费的不到 3 个，就要重看切口，甚至停掉。
  - 如果前 3 个试点既不能把“告警到动作获批”的时间砍掉至少 50%，也不能证明一次被避免的紧急处置，就先暂停扩张。
  - 如果一半以上的合格采购方都坚持要把产品打包进单一 OEM 或化学服务合同里，就要改成渠道优先，或者放弃独立软件动作。
  mermaid: "flowchart LR\n  Wedge[One hall coolant reliability wedge] --> MVP[Loop passport and action engine]\n  MVP --> Proof[Prevented incidents and evidence]\n  Proof --> Expansion[Fleet governance and benchmarking]\n"
investorMemo:
  verdict:
    call: 约见 / 继续深挖
    conviction: 切口有真实痛点，时点也对；但判断能不能成立，取决于运营负责人是否会在 OEM 打包补齐之前，就先为一层独立软件买单。
    whyBelieve: 混合供应商的液冷 AI 机房已经开始承受机架级停机风险，而公开市场里还没有哪家现有厂商，真正拿下这层中立的处置与证据工作流。
    whyDoubt: 如果采购方把这件事看成传感器、OEM 或水处理服务里的一个功能，而不是独立控制平面，这个品类就可能被迅速打包吃掉。
    nextDiligence: 先验证 2–3 个付费试点，是否能只靠现有遥测就上线，并在证明更快处置和更好的事故证据后，转成六位数的年度机房订阅。
  firstCustomer:
    title: 正在投运第二个液冷机房的 GPU 云运营商数据中心运营 VP
    profile: 一家北美 GPU 云或 AI 托管数据中心运营商，正把第二个 2–10 MW 直触式液冷机房上线，泵、冷却液、CDU 和歧管来自多家厂商，并向外部 AI 客户销售带可用性承诺的算力。
    trigger: 新机房上线、混合供应商扩容，或最近一次污染惊魂，都在提醒团队：整个冷却液决策链上没有任何一家厂商能一把抓。
    buyer: 数据中心运营 VP 或 COO
    initialContract: 一个 10–14 周、单机房约 $60k–$120k 的付费试点；若试点证明处置更快、证据可用于正式生产，就冲抵到每年 $180k–$300k 的机房订阅里。
  mustBeTrue:
  - 在前 10 个合格的 GPU 云或 AI 托管线索里，至少有 3 个会在发生灾难性停机之前，就愿意为单机房试点付费。
  - 前 3 个试点里，至少能把“告警到动作获批”的时间砍掉 50%，或证明一次被避免的紧急冲洗 / 停机。
  - 至少一半的合格试点站点，能只靠现有 CDU、化学、BMS/DCIM 和工单数据把 MVP 跑起来，不必加专有硬件。
  - 只要试点证据交出来，VP 或 COO 级负责人就能在 6–9 个月周期里拍下六位数年费合同。
  - OEM 和化学服务伙伴会愿意接入这层中立证据层，而不是封数据口，或坚持把整个工作流收回自己手里。
  diligenceQuestions:
  - 未来 12 个月里，到底有多少目标运营商会投运第二个液冷机房，而且符合混合供应商画像？
  - 今天在新型云服务商和 AI 托管运营商里，冷却液事故预算和审批权究竟归谁？
  - 在线站点里，有多少已经具备足够遥测，能支持软件先行部署？
  - 哪些事故真的会引出值得做成产品的质保追偿或供应商争议？
  - 采购方更偏好直接签软件合同，还是通过冷却 OEM / 化学服务伙伴采购？
operatingAssumptions:
- assumption: 第一笔预算掌握在数据中心运营负责人手里，而不只在设施水处理团队。
  basis: idea.yaml
  validationTest: 把 8 个合格线索的预算权责图画清楚，并确认其中至少 5 个把试点花钱权交给数据中心运营 VP 或 COO 级负责人。
  decisionImpact: 如果不成立，公司就得更多依赖服务伙伴销售、接受更长的委员会式销售周期，或只盯住组织权责更集中的运营商。
- assumption: 现有遥测已经足以在足够多的站点里填出回路护照和告警逻辑，不必强制客户上专有硬件。
  basis: research.yaml
  validationTest: 对 3 个在线或投运中的机房做集成审计，确认其中 2 个能仅靠现有 CDU、化学、BMS/DCIM 和工单数据支撑 MVP。
  decisionImpact: 如果不成立，公司就得把 ICP 收窄到仪表化更完整的站点，或补上硬件合作，连定价和毛利假设都要一起改。
- assumption: 按机房收六位数 ARR，采购方也能接受，因为订阅费相对停机损失和事故协同成本很小。
  basis: research.yaml
  validationTest: 报出 6 个试点转正报价，确认其中至少 3 个愿意接受每机房每年 $180k–$300k，或等价的按 MW 定价带。
  decisionImpact: 如果不成立，公司就得下调价格、重做市场规模假设，或扩大服务范围来撑住支出。
- assumption: 能用于质保的事故记录，相比单纯监测看板，本身就是一个实打实的差异点。
  basis: idea.yaml
  validationTest: 在前 3 个试点里，确认至少 2 个客户会把证据包用进 OEM、保险，或内部根因复盘。
  decisionImpact: 如果不成立，路线图就该把重心转到横向对标和工作流效率，而不是理赔与供应商质量定位。
- assumption: 等直销证明跑出来后，渠道伙伴会帮公司扩大分发，而不是把工作流商品化。
  basis: research.yaml
  validationTest: 首个标杆客户出来后，签下 2 份转介绍或联合销售协议，并从中拿到至少 3 个合格机会。
  decisionImpact: 如果不成立，GTM 就要更长时间坚持直销，也不能把公司建立在伙伴掌控的需求上。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 12 位 GPU 云和 AI 托管数据中心运营商里的 VP、总监与可靠性负责人；这些客户都在投运或扩容液冷机房。
  hypothesis: 最强的购买触发点，就是机房投运或混合供应商扩容，而且会有一个运营负责人单独赞助试点预算。
  successMetric: 至少 8 次访谈提到正在发生的投运 / 流程触发点，且至少 5 位受访者能明确指出经济采购方。
  owner: 创始人/CEO
- horizon: 0–90 天
  experiment: 用现有 CDU、化学、BMS/DCIM 和工单数据，对 3 个在线或投运中的机房做遥测与工作流审计。
  hypothesis: 在大多数滩头站点里，MVP 可以以软件先行方式上线，不必加新仪表。
  successMetric: 3 个被审计站点里，至少 2 个能仅靠现有数据源支撑回路护照、基线健康评分和动作建议。
  owner: 创始工程师
- horizon: 0–90 天
  experiment: 从历史日志和维护记录出发，为一个共创客户手工交付一份回路护照和事故证据包。
  hypothesis: 就算还没自动化，单是证据工作流本身，也足以帮公司拿到一个付费试点拍板人。
  successMetric: 至少 1 个目标账户确认，这份输出会改变它的复盘或维护流程，并愿意签试点或 LOI。
  owner: 可靠性解决方案工程师
- horizon: 90–180 天
  experiment: 上线 2 个付费单机房试点，交付回路护照、告警分诊、动作建议和事故证据生成。
  hypothesis: 产品能在不替换客户现有 DCIM 或冷却硬件栈的前提下，把决策速度和事故质量做上去。
  successMetric: 至少 2 个试点上线，且至少 1 个试点能把“告警到动作获批”时间缩短 50%，或证明一次被避免的紧急处置。
  owner: 产品/工程负责人
- horizon: 90–180 天
  experiment: 用标准的按机房定价包，测试从付费试点转年度机房订阅的转化。
  hypothesis: 一旦试点拿出运营证明，采购方愿意为六位数年费合同买单。
  successMetric: 至少 2 个试点客户进入年度合同谈判，且其中至少 1 个在前 12 个月内转正。
  owner: 创始人/CEO
- horizon: 180–360 天
  experiment: 围绕一次真实的机房扩容，和一家 CDU 厂商或化学服务伙伴启动联合销售。
  hypothesis: 只要先有直销标杆客户，伙伴就能更快放大合格商机管线，而不会反过来接管产品叙事。
  successMetric: 至少 2 个合格机会来自一个可复制的伙伴渠道，且其中 1 个进入试点阶段。
  owner: 生态合作负责人
operations:
- 维护一套供应商要求库，按 CDU、冷板、泵和冷却液组合，记录温度、压力、流量、化学和质保边界。
- 和每个试点客户每周做一次可靠性复盘，把告警、人工取样、工单和已结事故与客户基线逐项对照。
- 保留一套参考集成栈，覆盖 CDU 遥测、化学传感器、BMS/DCIM 数据源和工单系统，让部署始终是软件先行、而且可复制。
- 搭好和取样实验室、现场服务伙伴的升级网络，确保推荐动作能按时执行，也能按时留痕。
team:
- role: 创始人/CEO
  startTiming: 第 0 个月
  rationale: 负责创始人主导销售、共创客户招募、伙伴地图，以及早期企业客户里跨职能采购方的穿透。
- role: 创始工程师
  startTiming: 第 0 个月
  rationale: 搭起数据接入层、回路护照数据模型、告警逻辑、审计轨迹，以及对 CDU、BMS/DCIM 和工单系统的首批集成。
- role: 可靠性解决方案工程师
  startTiming: 第 2 个月
  rationale: 把化学和质保要求翻成可部署规则，跑现场实施，并把每次事故整理成能拿去做客户证明的案例。
- role: 产品/工程负责人
  startTiming: 第 6 个月
  rationale: 把试点里学到的东西产品化，做成可复制路线图，覆盖横向对标、证据工作流和多机房扩张。
- role: 生态合作负责人
  startTiming: 第 9 个月
  rationale: 只在至少 2 个试点已经能被引用、直销价值叙事已经站稳之后，再去搭 OEM 和化学服务渠道。
milestones:
- horizon: 0–12 个月
  items:
  - 在滩头市场里签下 2–3 个来自 GPU 云或 AI 托管数据中心运营商的付费单机房试点。
  - 证明至少有 1 个试点能把“告警到动作获批”时间缩短 50%，或避免一次紧急处置。
  - 至少把 2 个试点转成目标价带内的年度机房订阅。
  - 把试点里最常见的 CDU、化学监测、BMS/DCIM 和工单组合做成可复制集成。
- horizon: 12–24 个月
  items:
  - 扩到大约 8 个已签约机房，覆盖 5–6 家运营商。
  - 上线跨机房横向对标、供应商评分卡和维护规划工作流。
  - 和一家 CDU 厂商或化学服务伙伴建起一条可复制渠道。
  - 至少在 3 个客户账户里拿下第二机房扩张。
- horizon: 24–36 个月
  items:
  - 做到约 12 个已签约机房，对齐模型里的第 3 年 SOM。
  - 补上投运、备件规划，以及保险 / 贷款方报告模块。
  - 在初始客户群里，成为混合供应商直触式液冷环境的冷却液治理主记录系统。
risks:
- risk: 冷却 OEM、化学供应商或监测创业公司，把足够多的工作流能力一起打包进去，让采购方把产品当成功能而不是品类。
  likelihood: High
  impact: High
  mitigation: 先拿下中立的回路护照、处置证据和跨供应商横向对标；这些恰恰不是打包型点状方案天然会做好的部分。
- risk: 早期站点的遥测太碎、太弱，逼着公司转向重硬件部署。
  likelihood: High
  impact: High
  mitigation: 先筛选仪表化成熟度，优先在软件先行站点上线；只有工作流价值已经被证明的地方，才通过伙伴补感知。
- risk: 预算权分散在运营、设施、采购和服务伙伴之间，试点审批因此拖慢。
  likelihood: Medium
  impact: High
  mitigation: 只围绕明确的投运、扩容或事故触发点销售，并把试点打包给一个可问责的经济采购方。
- risk: 在数据集还不够深之前，误报或弱建议会先把信任打掉。
  likelihood: Medium
  impact: High
  mitigation: 首版坚持人在环，把每次动作和结果都记下来，再和客户可靠性团队一起调规则，别过早承诺自动化。
- risk: 存量改造和更广义的液冷渗透，比预期慢，近端商机管线会被压缩。
  likelihood: Medium
  impact: Medium
  mitigation: 先盯住正在扩容、或园区条件已经锁定的运营商；在滩头市场还没稳定转化前，不急着为相邻市场扩招。
fundingAsk:
  round: seed
  targetFundingRangeUsd: $3–5M
  runwayMonths: 18
  useOfFundsSummary: 这笔钱要撑 18 个月：把软件先行控制平面做出来，招齐核心工程与可靠性实施团队，跑完 2–3 个付费共创客户试点，证明按机房收六位数定价和试点转正都成立，并在更大规模扩张前，先搭起第一条 OEM 或化学伙伴渠道。
