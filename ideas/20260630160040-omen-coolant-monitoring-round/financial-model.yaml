assumptions:
- id: A1
  name: Model start month
  value: 2026-07
  unit: month
  source: '[business-plan.date 2026-06-30; model starts the following month]'
- id: A2
  name: Blended annual revenue per contracted hall
  value: '250'
  unit: USDK ARR per hall
  source: '[business-plan.gtm.pricing $180k-$300k annual subscription plus onboarding] [research.market.som uses about $250k ARR per hall]'
- id: A3
  name: Pilot treatment in revenue model
  value: Paid pilots count as contracted halls from go-live because pilot fees are credited toward annual production contracts
  unit: policy
  source: '[business-plan.gtm.pricing] [business-plan.investorMemo.firstCustomer.initialContract]'
- id: A4
  name: Year 1 contracted-hall ramp
  value: M5 1 hall; M8 2 halls; M11 3 halls
  unit: customersEop
  source: '[business-plan.product.sixMonth 2-3 paid pilots] [business-plan.milestones 0-12 months 2-3 paid one-hall pilots and 2 conversions]'
- id: A5
  name: Year 2 contracted-hall ramp
  value: Q1Y2 4 halls; Q2Y2 5 halls; Q3Y2 7 halls; Q4Y2 8 halls
  unit: customersEop
  source: '[business-plan.milestones 12-24 months roughly 8 contracted halls across 5-6 operators]'
- id: A6
  name: Year 3 contracted-hall ramp
  value: Q1Y3 9 halls; Q2Y3 11 halls; Q3Y3 12 halls; Q4Y3 12 halls
  unit: customersEop
  source: '[business-plan.milestones 24-36 months approximately 12 contracted halls] [research.market.som 12 halls at about $250k ARR]'
- id: A7
  name: Gross margin ramp
  value: 65% Y1 / 70% Y2 / 72% Y3
  unit: percent
  source: '[business-plan.businessModel.targetGrossMarginPct 70] plus startup-finance heuristic that software-first integrations lift margin after playbooks are reusable'
- id: A8
  name: Average enterprise sales cycle
  value: 8-9 months from qualified discovery to annual contract
  unit: months
  source: '[business-plan.investorMemo.mustBeTrue 6-9 month cycle after pilot evidence] plus conservative startup-finance heuristic for first mixed-vendor infrastructure deals'
- id: A9
  name: Monthly logo churn for unit economics
  value: '1.0'
  unit: percent
  source: Startup-finance heuristic for sticky but still-early enterprise infrastructure software; production hall ramp is modeled net of churn
- id: A10
  name: Founder / CEO loaded cash compensation
  value: '160'
  unit: USDK annual per FTE
  source: '[business-plan.team Founder/CEO] plus startup-finance heuristic for below-market founder cash comp including payroll taxes and benefits'
- id: A11
  name: Engineering loaded cash compensation
  value: '200'
  unit: USDK annual per FTE
  source: '[business-plan.team Founding eng and Product/eng lead] plus startup-finance heuristic for senior infrastructure engineers'
- id: A12
  name: Reliability / implementation loaded cash compensation
  value: '175'
  unit: USDK annual per FTE
  source: '[business-plan.team Reliability solutions engineer] plus startup-finance heuristic for field-facing technical reliability talent'
- id: A13
  name: GTM / partnerships loaded cash compensation
  value: '185'
  unit: USDK annual per FTE
  source: '[business-plan.team Partnerships lead] plus startup-finance heuristic for early enterprise partnerships / AE talent'
- id: A14
  name: Ops / finance loaded cash compensation
  value: '120'
  unit: USDK annual per FTE
  source: Startup-finance heuristic for one early operations hire covering finance, insurance, and procurement support
- id: A15
  name: Hiring timing
  value: Founder M1; Eng M1/M7/M13/M28; Reliability M3/M16/M31; GTM M10/M22; Ops M16
  unit: hire months
  source: '[business-plan.team] [business-plan.strategicChoices.sequencingRationale] [business-plan.milestones]'
- id: A16
  name: Sales and marketing non-payroll spend
  value: 8K/mo M1-M6; 12K/mo M7-M12; 16K/mo M13-M18; 20K/mo M19-M24; 24K/mo M25-M30; 28K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.gtm channels and founder-led motion] plus startup-finance heuristic for travel, events, and partner-development spend in enterprise infrastructure sales'
- id: A17
  name: R&D tooling and cloud spend
  value: 10K/mo M1-M6; 12K/mo M7-M12; 14K/mo M13-M18; 16K/mo M19-M24; 18K/mo M25-M30; 20K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.product MVP and integrations] [business-plan.operations reference integration stack] [research.regulatoryTechnicalConstraints]'
- id: A18
  name: G&A non-payroll spend
  value: 6K/mo M1-M6; 8K/mo M7-M12; 10K/mo M13-M18; 12K/mo M19-M24; 13K/mo M25-M30; 15K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.operations] plus startup-finance heuristic for insurance, legal, accounting, security review, and admin software'
- id: A19
  name: Revenue recognition convention
  value: Active contracted halls × $20.8K monthly revenue per hall
  unit: formula
  source: '[A2] and standard SaaS ratable-recognition heuristic'
- id: A20
  name: Starting cash in operating model
  value: '0'
  unit: USDK
  source: 'Modeling convention: funding need is shown in fundingAsk rather than assumed as opening cash in the cash roll-forward'
- id: A21
  name: Cash conversion convention
  value: Cash movement approximated by EBITDA with no debt, capex, or working-capital benefit assumed
  unit: formula
  source: Conservative startup-finance heuristic for an asset-light software company
- id: A22
  name: Steady-state CAC
  value: '150'
  unit: USDK per contracted hall
  source: '[business-plan.gtm.funnelTargets] plus modeled founder-led enterprise sales and partner-development spend at the late-Y2 / early-Y3 stage'
