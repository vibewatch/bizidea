modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      CommissioningTrigger --> PaidPilot
      PaidPilot --> ContractedHall
      ContractedHall --> Revenue
      Revenue --> GrossProfit
      GrossProfit --> Cash
      ContractedHall --> BenchmarkingExpansion
      BenchmarkingExpansion --> Revenue
modelSanity:
- checkName: Revenue engine
  finding: Base-case revenue comes from growing contracted halls from 3 at Y1 exit to 8 by Q4Y2 and 12 by Y3 at roughly $250K annual revenue per hall.
- checkName: Must go right
  finding: The plan needs paid pilots to convert on schedule and to trigger second-hall expansion because the Y2 ramp does most of the work in the funding model.
- checkName: Model breaks if
  finding: A 12-month sales cycle or hardware-heavy deployments would push the downside case toward a deeper cash trough and a larger follow-on need.
- checkName: Next-round proof
  finding: The seed round is meant to reach 5 contracted halls, 2 annual conversions, repeatable integrations, and one live partner channel within roughly 18 months.
sanityChecks:
  ruleOf40: Y3 growth 84.5% + EBITDA margin -21.3% = 63.2%
  burnMultiple: Y3 burn multiple is about 0.6x based on roughly $580K EBITDA burn against about $1.0M of exit-ARR expansion from 8 to 12 halls.
  revenuePerFte: $248K Y3 recognized revenue per 11 q4 FTE (benchmark roughly $200K-$400K for infrastructure SaaS).
  flags:
  - The model only works if software-first deployment holds; mandatory hardware or lab-heavy service work would pressure both gross margin and funding need.
  - Revenue concentration stays high because 12 halls likely still means only 8-10 operators, so one delayed expansion can move the year materially.
  - LTV/CAC looks strong, but churn is still a heuristic because the category is new and there is no public retention dataset for coolant-reliability software.
  - The funding ask is intentionally at the low end of the business-plan range and assumes pilots remain paid rather than turning into unpaid design work.
