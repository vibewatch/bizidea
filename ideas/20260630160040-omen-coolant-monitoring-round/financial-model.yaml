scenarios:
  downside:
    description: Pilot conversions slip, mixed-vendor integrations stay more bespoke, and second-hall expansion starts later than planned.
    y3RevenueK: 2080.0
    y3EbitdaK: -1040.0
    cashLowPointK: -2980.0
    keyAssumptionChanges:
    - End-Y2 contracted halls fall from 8 to 6.
    - End-Y3 contracted halls fall from 12 to 10.
    - Blended annual revenue per hall lands near $230K instead of $250K.
    - Steady-state gross margin only reaches 68% because field work stays service-heavy.
  base:
    description: Three paid pilot halls in Y1 become 8 contracted halls by Q4Y2 and 12 halls by Y3 as software-first deployments and second-hall expansions prove repeatable.
    y3RevenueK: 2729.2
    y3EbitdaK: -580.5
    cashLowPointK: -2245.5
    keyAssumptionChanges:
    - No change from A1-A24 base assumptions.
  upside:
    description: Paid pilots convert faster, one partner channel starts contributing in Y2, and benchmarking modules lift both expansion pace and blended revenue per hall.
    y3RevenueK: 3100.0
    y3EbitdaK: -150.0
    cashLowPointK: -1900.0
    keyAssumptionChanges:
    - End-Y2 contracted halls rise from 8 to 9.
    - End-Y3 contracted halls rise from 12 to 13.
    - Blended annual revenue per hall reaches about $265K as benchmarking modules attach earlier.
    - Steady-state gross margin reaches 74% as integration playbooks standardize sooner.
