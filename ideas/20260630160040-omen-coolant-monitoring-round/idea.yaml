jobsToBeDone:
  - job: When a revenue-critical liquid-cooled hall is running at full utilization, help the operations lead decide which loop needs intervention and what maintenance to schedule, so they can avoid emergency rack flushes and unplanned downtime.
    currentAlternative: Manual sampling, OEM alarms, and reactive incident war rooms
    successMetric: Hours of unplanned rack downtime avoided and mean time from anomaly to approved action
  - job: When a contamination or wear event emerges, help the reliability team produce a root-cause and warranty record, so they can recover costs and prevent the same failure from spreading across other halls.
    currentAlternative: Spreadsheet postmortems, vendor blame-shifting, and manual ticket review
    successMetric: Time to root-cause determination and percentage of incidents resolved without full-rack shutdown
