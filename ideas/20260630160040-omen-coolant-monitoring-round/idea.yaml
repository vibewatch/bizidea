  buyingTrigger: >-
    Go-live of a new liquid-cooled hall under external uptime SLAs, especially when the operator adds a second coolant,
    pump, or manifold vendor to hit a deployment deadline
  currentAlternative: Manual coolant sampling, OEM maintenance manuals, spreadsheet runbooks, and generic BMS or DCIM alarms
  switchingReason: >-
    The startup turns raw fluid data into vendor-neutral maintenance decisions and evidence, reducing surprise flushes,
    rack shutdowns, and post-incident finger-pointing that point tools and service contracts do not solve.
  pricingHypothesis: Annual subscription per liquid-cooled hall or megawatt under management, plus onboarding fees for each new loop topology
