problem: >-
  Liquid-cooled GPU operators now carry a new uptime risk that generic facilities software does not manage well:
  coolant contamination, pump wear, and seal degradation can quietly build until an emergency rack flush or shutdown is
  required. Most teams still rely on manual sampling, OEM service calls, and reactive runbooks, so they know something is
  wrong before they know what action to take. Once racks are worth millions of dollars of training or inference capacity,
  coolant chemistry becomes an operating problem with real budget ownership.
targetUser:
  primary: Director of data-center reliability at a North American GPU cloud operator running direct-to-chip liquid-cooled clusters under customer uptime SLAs
  secondary: Facilities reliability engineer or liquid-cooling program manager responsible for loop maintenance, vendor coordination, and incident response
  buyer: VP Data Center Operations or COO at a GPU cloud provider or AI colocation operator
startupThesis:
  nonObviousInsight: >-
    The emerging control point is not the coolant hardware alone but the operating system for coolant as a consumable
    reliability layer. What changed is that liquid-cooled GPU racks are proliferating, inline spectrometers make fluid
    health continuously measurable, and a single multi-hour outage now costs enough to justify a dedicated software budget.
  beachhead: >-
    North American GPU cloud providers operating 1 to 5 liquid-cooled halls with direct-to-chip loops, customer uptime
    SLAs, and mixed pump, coolant, or manifold vendors that leave no single party owning fluid-health decisions
  wedge: >-
    A coolant reliability control plane that combines inline fluid telemetry, maintenance logs, and vendor specs to score
    loop health, recommend flush or isolate or service actions, and create warranty-ready incident records before outages
    happen
  whyNowCatalyst: >-
    Omen's funding, dozen-customer footprint, and claim that contamination can idle racks for five to six hours show
    liquid-cooling chemistry has crossed from facilities nuance into budgeted GPU uptime risk.
  ventureScalePath: >-
    Start with runtime coolant reliability for GPU clouds, then expand into commissioning, vendor benchmarking, spare-parts
    planning, insurer and lender reporting, and the system of record for liquid-cooled AI-fleet operations.
solution: >-
  Build a vendor-neutral coolant reliability control plane that sits above sensors, CDU telemetry, and maintenance tickets.
  The product creates a digital passport for every loop, rack zone, and coolant batch, then turns anomaly signals into
  specific action recommendations such as dosing, isolating, flushing, swapping a part, or scheduling a planned
  intervention window. It tracks which failure mode is most likely, who needs to approve the response, and whether the
  incident should become a warranty or vendor-quality claim. Over time the platform learns which chemistry signatures and
  remediation steps actually prevent downtime across different loop designs, giving operators a repeatable playbook instead
  of a reactive war room.
