topRisks:
  - name: OEM bundling
    description: Cooling OEMs or sensor vendors may add enough workflow software to make a standalone control plane harder to sell.
    mitigation: Stay vendor-neutral, integrate across mixed fleets, and own the warranty and maintenance decision workflow that no single OEM can credibly manage across competitors.
  - name: Telemetry fragmentation
    description: Early operators may have inconsistent sensor coverage, manual logs, or poor maintenance data, limiting automated recommendations.
    mitigation: Support lightweight CSV and ticket ingestion first, keep human-reviewed playbooks in the loop, and prove value on incident coordination before promising full autonomy.
  - name: Uneven category timing
    description: Some AI sites may adopt liquid cooling more slowly than expected, which could narrow the initial market.
    mitigation: Focus on GPU cloud and AI colo operators already bringing live liquid-cooled halls online under uptime SLAs, then use those references to expand as the category matures.
