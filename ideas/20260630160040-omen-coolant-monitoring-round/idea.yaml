differentiator: >-
  Sensor vendors and cooling OEMs surface measurements or sell hardware tied to one loop design, but the buyer's missing
  layer is a vendor-neutral system that tells them whether to flush, quarantine, dose, replace, or escalate a warranty
  claim. Generic DCIM products can show temperatures and alarms after the fact; they do not reason about coolant chemistry,
  failure modes, and maintenance economics across mixed cooling fleets. The moat is a cross-site dataset linking fluid
  signatures, remediation steps, vendor combinations, and downtime outcomes.
