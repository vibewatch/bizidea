slug: coolant-reliability-control-plane
date: '2026-06-30'
currency: USD
modelStartMonth: 2026-07
assumptions:
- id: A1
  name: 模型启动月份
  value: 2026-07
  unit: month
  source: '[business-plan.date 2026-06-30；模型从下一个月启动]'
- id: A2
  name: 每个已签约机房的混合年收入
  value: '250'
  unit: USDK ARR per hall
  source: '[business-plan.gtm.pricing $180k-$300k 年费订阅 + 导入费] [research.market.som 采用每机房约 $250k ARR]'
- id: A3
  name: 试点在收入模型里的处理方式
  value: 付费试点从上线起就计入已签约机房，因为试点费用会冲抵后续正式年费合同
  unit: policy
  source: '[business-plan.gtm.pricing] [business-plan.investorMemo.firstCustomer.initialContract]'
- id: A4
  name: 第 1 年已签约机房爬坡
  value: M5 1 个机房；M8 2 个机房；M11 3 个机房
  unit: customersEop
  source: '[business-plan.product.sixMonth 2-3 个付费试点] [business-plan.milestones 0-12 个月：2-3 个付费单机房试点、2 个转正]'
- id: A5
  name: 第 2 年已签约机房爬坡
  value: Q1Y2 4 个机房；Q2Y2 5 个机房；Q3Y2 7 个机房；Q4Y2 8 个机房
  unit: customersEop
  source: '[business-plan.milestones 12-24 个月：约 8 个已签约机房，覆盖 5-6 家运营商]'
- id: A6
  name: 第 3 年已签约机房爬坡
  value: Q1Y3 9 个机房；Q2Y3 11 个机房；Q3Y3 12 个机房；Q4Y3 12 个机房
  unit: customersEop
  source: '[business-plan.milestones 24-36 个月：约 12 个已签约机房] [research.market.som：12 个机房、每个约 $250k ARR]'
- id: A7
  name: 毛利率爬坡
  value: 65% Y1 / 70% Y2 / 72% Y3
  unit: percent
  source: '[business-plan.businessModel.targetGrossMarginPct 70] + 创业财务启发式：软件先行集成一旦可复用，毛利率会继续抬升'
- id: A8
  name: 平均企业销售周期
  value: 从完成初筛沟通到签下年度合同，平均 8–9 个月
  unit: months
  source: '[business-plan.investorMemo.mustBeTrue 试点证据出来后 6-9 个月签年费] + 首批混合供应商基础设施交易的保守财务启发式'
- id: A9
  name: 单位经济模型里的月度客户流失率
  value: '1.0'
  unit: percent
  source: 面向粘性较强、但仍处早期的企业基础设施软件的创业财务启发式；正式机房爬坡已按净值口径建模
- id: A10
  name: 创始人 / CEO 含税福利后现金薪酬
  value: '160'
  unit: USDK annual per FTE
  source: '[business-plan.team 创始人/CEO] + 创业财务启发式：按低于市场价的创始人现金薪酬，并含税费和福利'
- id: A11
  name: 工程团队含税福利后现金薪酬
  value: '200'
  unit: USDK annual per FTE
  source: '[business-plan.team 创始工程师与产品/工程负责人] + 面向资深基础设施工程师的创业财务启发式'
- id: A12
  name: 可靠性 / 实施含税福利后现金薪酬
  value: '175'
  unit: USDK annual per FTE
  source: '[business-plan.team 可靠性解决方案工程师] + 面向现场型技术可靠性人才的创业财务启发式'
- id: A13
  name: GTM / 生态合作含税福利后现金薪酬
  value: '185'
  unit: USDK annual per FTE
  source: '[business-plan.team 生态合作负责人] + 面向早期企业合作 / AE 人才的创业财务启发式'
- id: A14
  name: 运营 / 财务含税福利后现金薪酬
  value: '120'
  unit: USDK annual per FTE
  source: 创业财务启发式：1 名早期运营岗覆盖财务、保险与采购支持
- id: A15
  name: 招聘节奏
  value: 创始人 M1；工程 M1/M7/M13/M28；可靠性 M3/M16/M31；GTM M10/M22；运营 M16
  unit: hire months
  source: '[business-plan.team] [business-plan.strategicChoices.sequencingRationale] [business-plan.milestones]'
- id: A16
  name: 销售与市场非薪酬支出
  value: 8K/mo M1-M6; 12K/mo M7-M12; 16K/mo M13-M18; 20K/mo M19-M24; 24K/mo M25-M30; 28K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.gtm channels and founder-led motion] + 创业财务启发式：企业基础设施销售所需的差旅、活动和伙伴拓展费用'
- id: A17
  name: 研发工具和云支出
  value: 10K/mo M1-M6; 12K/mo M7-M12; 14K/mo M13-M18; 16K/mo M19-M24; 18K/mo M25-M30; 20K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.product MVP 与集成] [business-plan.operations 参考集成栈] [research.regulatoryTechnicalConstraints]'
- id: A18
  name: G&A 非薪酬支出
  value: 6K/mo M1-M6; 8K/mo M7-M12; 10K/mo M13-M18; 12K/mo M19-M24; 13K/mo M25-M30; 15K/mo M31-M36
  unit: USDK per month
  source: '[business-plan.operations] + 创业财务启发式：保险、法务、会计、安全审查和管理软件'
- id: A19
  name: 收入确认口径
  value: 活跃已签约机房 × 每机房每月 $20.8K 收入
  unit: formula
  source: '[A2] + 标准 SaaS 按期确认启发式'
- id: A20
  name: 经营模型里的期初现金
  value: '0'
  unit: USDK
  source: 建模约定：资金需求放在 fundingAsk 里展示，不假设期初现金滚存
- id: A21
  name: 现金转化口径
  value: 现金流动近似按 EBITDA 计算；不假设债务、资本开支或营运资金收益
  unit: formula
  source: 面向轻资产软件公司的保守创业财务启发式
- id: A22
  name: 稳态 CAC
  value: '150'
  unit: USDK per contracted hall
  source: '[business-plan.gtm.funnelTargets] + 模型里 late-Y2 / early-Y3 阶段的创始人主导企业销售与伙伴拓展支出'
- id: A23
  name: 种子轮里程碑
  value: 到第 18 个月：5 个已签约机房、2 个年度转正、标准集成，以及 1 条在线伙伴渠道，再往更广的全机群扩张
  unit: milestone
  source: '[business-plan.fundingAsk.useOfFundsSummary] [business-plan.product.twelveMonth] [business-plan.milestones 12-24 个月]'
- id: A24
  name: 种子轮规模
  value: 3.0M 种子轮，对应 24 个月目标跑道
  unit: USDM
  source: '[business-plan.fundingAsk targetFundingRangeUsd $3-5M and runwayMonths 18] + 额外 6 个月缓冲，用来覆盖存量改造与采购拖期风险 [business-plan.risks] [research.openQuestions]'
