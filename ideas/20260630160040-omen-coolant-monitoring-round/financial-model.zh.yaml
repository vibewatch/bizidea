scenarios:
  downside:
    description: 试点转正延后，混合供应商集成长期保持高度定制，第二机房扩张也比计划更慢。
    y3RevenueK: 2080.0
    y3EbitdaK: -1040.0
    cashLowPointK: -2980.0
    keyAssumptionChanges:
    - Y2 期末已签约机房从 8 个降到 6 个。
    - Y3 期末已签约机房从 12 个降到 10 个。
    - 每机房混合年收入落在约 $230K，而不是 $250K。
    - 稳态毛利率只能到 68%，因为现场工作始终偏服务化。
  base:
    description: Y1 的 3 个付费试点机房，会在 Q4Y2 变成 8 个已签约机房，并在 Y3 做到 12 个；软件先行部署和第二机房扩张都开始可复制。
    y3RevenueK: 2729.2
    y3EbitdaK: -580.5
    cashLowPointK: -2245.5
    keyAssumptionChanges:
    - A1-A24 基线假设不变。
  upside:
    description: 付费试点转正更快，一条伙伴渠道在 Y2 就开始贡献线索，横向对标模块也把扩张速度和每机房混合收入一起抬高。
    y3RevenueK: 3100.0
    y3EbitdaK: -150.0
    cashLowPointK: -1900.0
    keyAssumptionChanges:
    - Y2 期末已签约机房从 8 个升到 9 个。
    - Y3 期末已签约机房从 12 个升到 13 个。
    - 横向对标模块更早挂上后，每机房混合年收入可做到约 $265K。
    - 集成手册更早标准化，稳态毛利率升到 74%。
