modelSanity:
- checkName: 收入引擎
  finding: 基线收入，来自已签约机房从 Y1 末 3 个、爬到 Q4Y2 的 8 个，再到 Y3 的 12 个；每个机房年收入约 $250K。
- checkName: 必须跑顺的地方
  finding: 这套计划必须让付费试点按时转正，并顺势拿下第二机房扩张，因为资金模型里大部分爬坡都压在 Y2。
- checkName: 模型会在哪些地方断
  finding: 如果销售周期拉到 12 个月，或部署最终变成重硬件，下行情形就会滑向更深的现金低点，并需要更大的后续融资。
- checkName: 下一轮证明点
  finding: 这一轮种子轮，目标是在大约 18 个月内做到 5 个已签约机房、2 个年度转正、可复制集成，以及 1 条在线伙伴渠道。
sanityChecks:
  ruleOf40: Y3 增速 84.5% + EBITDA 利润率 -21.3% = 63.2%
  burnMultiple: Y3 燃烧倍数约为 0.6x：8 个机房扩到 12 个机房，对应约 $1.0M 退出 ARR 增量，对照约 $580K EBITDA 消耗。
  revenuePerFte: Y3 确认收入 $248K / 11 名 Q4 FTE，落在基础设施 SaaS 大致 $200K-$400K 的区间里。
  flags:
  - 模型成立的前提，是软件先行部署真的跑得通；一旦变成必须上硬件，或大量依赖实验室 / 现场服务，毛利率和资金需求都会受压。
  - 收入集中度依然很高，因为 12 个机房大概率也只对应 8–10 家运营商；一单扩容推迟，就会明显拖动全年结果。
  - LTV/CAC 看起来很漂亮，但客户流失率仍只是启发式假设；这个品类太新，公开市场还没有冷却液可靠性软件的留存数据。
  - 本轮融资额刻意取在商业计划区间的下沿，而且假设试点都能保持付费，不会滑成免费共创项目。
