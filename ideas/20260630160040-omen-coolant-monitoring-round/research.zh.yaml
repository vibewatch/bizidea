competitors:
- name: Omen AI
  stage: seed
  wedge: 用在线光谱仪持续读取冷却液和工业流体健康度。
  pricing: 企业定制报价；公开材料里没有列出价格。
  strength: 它是最接近本案的直接信号：冷却液化学监测已经成了一条拿到融资、也有早期部署故事的 AI 基础设施赛道。
  weaknessVsUs: 公开定位仍偏传感器优先；在跨混合机房的中立处置工作流和质保编排上，材料里写得远不够明确。
  sourceRefs:
  - 1
  - 2
- name: Pyxis Lab
  stage: scale-up
  wedge: 装在 CDU 上的多参数冷却液化学分析仪和 AI 冷却回路传感器。
  pricing: 硬件与仪表销售；公开材料里没有列出价格。
  strength: 对 pH、电导率、浊度、乙二醇浓度等关键指标覆盖很全，也支持直触式液冷环境里的 DCIM / BMS 集成。
  weaknessVsUs: 它卖的是监测仪表，而不是跨站点横向对标、决策逻辑或事故证据工作流。
  sourceRefs:
  - 49
  - 50
- name: Ecolab
  stage: incumbent
  wedge: 从站点到芯片的水和冷却液管理，带实时监测、现场服务和实验室支持。
  pricing: 服务合同和企业级方案销售；公开材料里没有列出价格。
  strength: 全球现场网络、化学可信度，以及把监测和更大水治理项目一起打包的能力都很强。
  weaknessVsUs: 它的核心仍是处理与服务项目，而不是针对混合 AI 机房做中立维护决策。
  sourceRefs:
  - 27
  - 28
- name: Schneider Electric / Motivair
  stage: incumbent
  wedge: 面向 AI 数据中心的参考设计、CDU 和直触式液冷基础设施。
  pricing: 按项目报价的基础设施销售；公开材料里没有列出价格。
  strength: OEM 关系深，对架构、改造和高密度 AI 冷却切换有很强的话语权。
  weaknessVsUs: 它仍更偏硬件和实施；一旦园区里混入多家供应商，买方还是需要一层中立运营层压在栈上。
  sourceRefs:
  - 14
  - 15
- name: Accelsius
  stage: scale-up
  wedge: 把两相直触式冷却平台当成 AI 热管理基础设施一起卖。
  pricing: 基础设施平台销售；公开材料里没有列出价格。
  strength: 效率叙事清楚，又有 Johnson Controls 和 Legrand 这种战略背书，正好踩在 AI 工厂迁移浪潮上。
  weaknessVsUs: 它卖的是冷却架构选择，而不是能压在任何回路设计之上的中立控制平面。
  sourceRefs:
  - 41
  - 42
  - 46
regulatoryTechnicalConstraints:
- point: CDU 应该把设施水系统（FWS）和技术冷却系统（TCS）隔开，而且要主动做冷却液质量与过滤监测，不能只靠“回路自己会稳定”。
  sourceRefs:
  - 15
  - 22
  - 26
  - 45
- point: 混合供应商回路必须把温度、压力、流量和维护协议逐条对齐；Schneider 甚至建议，一旦要求不一致，就按服务器型号把 TCS 回路分开。
  sourceRefs:
  - 15
  - 22
- point: 铜冷板和多金属微通道系统，对腐蚀、颗粒侵入和生物污染都很敏感；只要化学状态跑出控制带，退化就会加速。
  sourceRefs:
  - 33
  - 35
  - 36
  - 38
- point: 围绕 PUE 和 WUE 的压力只会变大，所以温液、闭环或低水耗架构，会在选址和供应商选择里越来越重要。
  sourceRefs:
  - 19
  - 32
  - 57
validationSignals:
- point: Omen 说，它的传感器已经部署在管理 10–14 GW 容量的数据中心客户里。
  sourceRefs:
  - 2
- point: Equinix 计划在 45+ 个都会区的 100 多个 IBX 里支持直触式液冷。
  sourceRefs:
  - 55
- point: NTT 表示，企业在 2024 年为 200+ MW 的 AI 部署选用了其液冷 AI 就绪站点。
  sourceRefs:
  - 56
- point: Ecolab 已经发布直触式冷却液健康监测产品，并带性能洞察、现场服务和实验室支持。
  sourceRefs:
  - 27
  - 28
- point: Accelsius 背后站着 Johnson Controls 和 Legrand，也已经有在线实验室和参考部署。
  sourceRefs:
  - 41
  - 42
  - 46
openQuestions:
- 在 5–20 MW 的 AI 机房里，冷却液质量异常到底多频繁会引发本可避免的降频、维护窗口或停机？
- 在新型云服务商和 AI 托管运营商里，冷却液可靠性软件的预算和审批链条最终归谁？
- 在采购方需要上新的在线化学硬件之前，CDU、BMS 和 DCIM 里到底已经有多少可用信号？
- 冷却液相关事故发生后，什么样的报告格式最能帮运营商处理质保、保险或供应商质量争议？
