  validationPlan:
  - priority: high
    question: 在 5–20 MW 的 AI 机房里，冷却液质量异常到底有多频繁会演变成停机前维护或停机风险？
    evidenceToGather: 向 3–5 个共创客户收集匿名事故日志、维护工单和化学实验室结果。
  - priority: high
    question: 预算和审批链条到底归谁：设施水处理、数据中心可靠性，还是更高层的运营负责人？
    evidenceToGather: 在新型云服务商、托管数据中心和液冷 OEM 生态里，做 10 场采购方访谈。
  - priority: medium
