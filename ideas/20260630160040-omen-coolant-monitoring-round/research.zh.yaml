    mitigation: 先吃现有传感器；只有缺口真的卡价值时，再补便携式或在线化学监测。
    sourceRefs:
    - 2
    - 27
    - 49
    - 50
  - friction: 存量改造和 TCS/FWS 集成本身就复杂
    severity: medium
    affectedBuyer: 托管数据中心总经理或设施负责人
    mitigation: 先从新机房，或边界清楚的实验性机架做起，再往全机群铺开。
    sourceRefs:
    - 7
    - 22
    - 45
    - 54
  - friction: 人手短缺，设施团队和 IT 团队的交接也不顺
    severity: high
    affectedBuyer: 可靠性总监
    mitigation: 用带引导的操作手册、升级流程和按角色审批，别再让事故响应靠临场拼凑。
    sourceRefs:
    - 23
    - 39
  - friction: 在大事故发生前，很难把 ROI 讲清楚
    severity: medium
    affectedBuyer: COO 或财务审批人
    mitigation: 把告警直接对到避免的停机小时、追回的质保金额和省下的维护工时。
    sourceRefs:
    - 1
    - 40
    - 42
