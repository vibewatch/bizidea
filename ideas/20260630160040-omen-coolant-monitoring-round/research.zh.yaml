    - 56
    - 58
  - incumbentClass: 通用 DCIM / BMS 工具
    point: 现有基础设施工具能吃告警和遥测，但 Pyxis 和 Ecolab 的新产品都在说明，冷却液化学状态需要自己的一套参数、分析逻辑和告警模型，不是通用监测顺手就能带上的。
    sourceRefs:
