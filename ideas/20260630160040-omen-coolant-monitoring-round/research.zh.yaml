reportMemo:
  executiveTakeaways:
  - 冷却液健康度正在变成单独预算项，不再只是设施侧的小麻烦：Omen 说，细菌污染会逼出 5–6 小时机架停机；ITIC 给出的更广义基准则是，90% 的中大型企业认为每小时停机成本超过 $300k [1][40]。
  - 液冷已经从试点走到设计标准：TrendForce 预计 AI 数据中心液冷渗透率会从 2024 年的 14% 跳到 2025 年的 33%；JLL 说，AI 训练机房已把单机架功率推到 40–100+ kW；Equinix 也在 45+ 个都会区的 100 多个 IBX 扩直触式液冷能力 [4][7][55]。
  - 竞争缺口不在感知本身，而在中立决策层：Ecolab、Pyxis、Schneider、Danfoss 和 Accelsius 都覆盖了监测或热管理硬件，但没有谁公开拿下跨供应商处置逻辑，以及可用于质保的事故记录 [14][27][31][41][45][49][50]。
  - 执行风险确实存在：Schneider、OCP、ASHRAE 和 Uptime 都在提醒，混合供应商回路的规范差异、可维护性取舍，以及主动冷却液质量控制，都会让 DLC 的运营复杂度长期高于成熟空冷 [15][22][23][26]。
  marketDefinition: 面向液冷 AI 数据中心的中立冷却液可靠性软件：一层压在 CDU、化学传感器和维护工单之上的控制层，把冷却液健康度和污染信号翻成直触式液冷及相邻液冷系统的处置决策 [4][6][14][21][45][49]。
  customerAndBuyer: 滩头采购方，是 AI 云和托管数据中心运营商里 VP 或总监级的数据中心运营 / 可靠性团队；他们正在上线 5–20+ MW 的机房块，单机架密度往 50–100 kW+ 走，而且可用性预期已经写进对外承诺里 [9][12][55][56][58]。
  buyingTriggers:
  - point: AI 机房新上线或改造后，机架功率冲到 40–100+ kW，液冷已经躲不开。
    sourceRefs:
    - 4
    - 7
    - 9
    - 14
  - point: 部署里混入多家供应商后，质保口径、回路隔离规则和维护协议开始变得说不清。
    sourceRefs:
    - 15
    - 22
    - 26
  - point: 一旦出现污染、pH 漂移或颗粒物事件，团队会立刻发现：人工取样对在线 AI 算力来说太慢了。
    sourceRefs:
    - 1
    - 27
    - 36
    - 49
  willingnessToPay:
    summary: 只要一场冷却液相关事故就会让机架停摆 5–6 小时，而企业停机成本又普遍超过每小时 $300k，那么在 5–20+ MW 的 AI 站点里，单独列出一笔六位数年费可靠性预算就讲得通——哪怕公司还没开始全机群铺开 [1][9][40]。
    sourceRefs:
    - 1
    - 9
    - 40
  competitiveLandscape: 竞争大致分成三层：监测创业公司（Omen、Pyxis）、化学与水处理现有厂商（Ecolab、ChemTreat、Dow、Veolia），以及冷却 OEM / 平台厂商（Schneider、Danfoss、Johnson Controls、Accelsius）。这中间仍留着一层空白：能跨混合回路做中立编排，并产出可用于质保的证据，而不是再给买方一个传感器看板 [2][27][31][32][41][45][46][49][50][51]。
  incumbentThesis:
  - incumbentClass: 冷却 OEM
    point: 他们卖 CDU、歧管和参考设计，但混合供应商机房仍需要一套中立规则来处理回路隔离、质保对齐和跨硬件升级；没有哪家 OEM 能从头到尾把这层全部接住。
    sourceRefs:
