    - 50
  regulatoryLandscape: 这个品类没有单一垂直监管者，但采购方显然正往 ASHRAE TC 9.9、OCP 设施指南和 Uptime 的韧性规范上收敛：它们都强调 CDU 必须把设施水回路与技术冷却回路隔开，要做冷却液质量监测，也要把可维护性前提写清楚；至于化学品与废水处理，再并入更广义的工业水处理体系 [22][23][24][26][31][33][35]。
  technologyLandscape: 直触式液冷，已经是存量改造和近端 AI 部署的重心；浸没式和两相方案则会在密度或效率要求更高时继续扩。温液回路、CDU、闭环设计和多参数化学监测，正在变成这一代架构的基础积木 [4][14][18][19][21][45][46][49]。
  distributionChannels:
  - point: 先卡进机房设计、改造和投运项目，借热管理栈厂商与集成商的渠道切入；这些人本来就负责摆 CDU、定义 TCS/FWS 架构。
