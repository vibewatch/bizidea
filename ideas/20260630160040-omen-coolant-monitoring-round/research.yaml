- name: Pyxis Lab
  stage: scale-up
  wedge: CDU-mounted multi-parameter coolant chemistry analyzers and sensors for AI cooling loops.
  pricing: Hardware and instrumentation sale; no public list pricing shown.
  strength: Strong coverage of pH, conductivity, turbidity, glycol concentration, and DCIM or BMS integration for direct-to-chip environments.
  weaknessVsUs: Monitoring instrumentation only; does not obviously own cross-site benchmarking, decision logic, or incident evidence workflows.
