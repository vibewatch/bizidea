slug: organ-chip-data-contract-foundry
date: "2026-07-04"
executiveSummary: >-
  This company is a contract organ-on-chip data foundry that sells biopharma
  translational-science and target-validation teams standardized, model-ready
  human liver and kidney fibrosis datasets on a per-study and subscription
  basis. The wedge is narrow on purpose: one organ pair (liver and kidney),
  one disease context (fibrosis and metabolic disease such as MASH), and one
  fixed data schema, rather than the vertically integrated platform-plus-model
  approach that Xellar's $50M raise validated as fundable. Research confirms
  the budget already exists — buyers currently pay academic labs, Emulate,
  MIMETAS, and CN Bio for organ-chip studies and services — but no vendor
  foregrounds a vendor-neutral, cross-study data contract as the product
  itself. The company's defensibility compounds through an accumulating
  reference dataset and validated QC protocol across contracts, not through a
  proprietary model or chip. The first proof point is a paid pilot with a
  Series B-C biotech whose fibrosis or MASH target-validation program is
  stalled by unreusable CRO or academic data. The company deliberately defers
  additional organ systems, disease areas, and any modeling-layer product
  until the liver/kidney schema and turnaround SLA are proven across multiple
  paying customers. The biggest open risk is whether a standalone data
  supplier can resist being undercut or absorbed by platform vendors who
  bundle data generation with proprietary modeling stacks.
problem:
  - >-
    Biopharma target-validation teams need human-relevant tissue data to
    prioritize drug targets, but available data is either animal-model data
    that translates poorly to humans or one-off academic and CRO organ-chip
    studies with no shared schema, QC bar, or ML-ready format.
  - >-
    Every biopharma re-derives its own chip protocols, imaging pipelines, and
    data schemas from scratch, so translational-science budget goes to
    rebuilding plumbing instead of answering target-validation questions, and
    computational biology teams cannot reuse data across studies.
solution:
  - >-
    Run a standardized organ-on-chip data-generation pipeline for liver and
    kidney fibrosis and metabolic-disease models, capturing imaging and
    multi-omics readouts under fixed protocols with documented QC flags and
    provenance.
  - >-
    Deliver datasets in one shared schema customers' internal ML pipelines can
    ingest directly, and reuse the accumulated reference dataset and validated
    assay protocols across contracts to improve turnaround time and reliability
    with each new customer.
whyWeWin:
  - >-
    Vendor-neutral positioning: unlike Emulate, MIMETAS, CN Bio, and Xellar,
    whose product surface is a platform, instrument, or proprietary modeling
    stack, this company's only deliverable is a schema-consistent dataset,
    which is the explicit gap research identifies ("no vendor foregrounds a
    vendor-neutral, schema-consistent data foundry as the product surface").
  - >-
    Narrow beachhead (liver/kidney fibrosis and metabolic disease) lets QC and
    schema validation compound fast versus a platform trying to standardize
    across many organ systems at once, matching the research finding that
    heterogeneous disease endpoints limit one-size-fits-all schemas.
  - >-
    Regulatory and standards tailwinds (NIH/NCATS, FDA-adjacent, EMA, NIST,
    CEN-CENELEC) are pushing toward reproducible, fit-for-purpose organ-chip
    data, which favors a supplier whose core product is documented QC and
    provenance rather than a supplier whose core product is a chip or model.
strategicChoices:
  beachhead: >-
    Series B-C biotech and biopharma target-validation teams running active
    liver or kidney fibrosis and metabolic-disease (e.g., MASH) programs that
    currently outsource organ-chip or multi-omics studies to academic labs or
    generalist CROs on a bespoke, non-standardized basis.
  wedgeRationale: >-
    Liver and kidney fibrosis/metabolic disease is chosen because research
    shows commercial organ-chip models already exist and are validated for
    these organs (Emulate, MIMETAS, CN Bio all sell liver and/or kidney
    products), buyer budgets already exist for outsourced studies in this
    area, and endpoint variability is narrow enough (fibrosis, steatosis,
    hepatotoxicity, renal inflammation) to standardize a first schema without
    the friction of covering many disease areas at once.
  sequencingRationale: >-
    Product sequencing starts with proving the schema and QC bar on one
    organ pair before automation scale-up, because research flags assay
    reproducibility and schema mismatch with customer ML pipelines as the two
    highest-severity adoption frictions; GTM sequencing starts with
    already-outsourcing biotechs (lowest switching friction) before CRO
    partnerships (channel leverage) before any subscription upsell, so the
    company earns credibility with direct customers before asking a channel
    partner to vouch for it.
  notYet:
    - >-
      Additional organ systems beyond liver and kidney (e.g., lung, gut,
      cardiac chips) until the first schema and QC protocol are validated
      across multiple paying contracts.
    - >-
      Any proprietary predictive or virtual-cell modeling product — the
      company stays a data supplier, not a model vendor, to preserve the
      vendor-neutral positioning that differentiates it from Xellar.
    - >-
      Regulatory-submission-grade validation packages; the first release
      targets internal target-validation decisions, not formal
      context-of-use qualification for regulated filings.
market:
  tam: "$320M (400 global target-validation groups x ~$0.8M annual spend, per research estimate)"
  sam: "$58.5M (90 U.S./EU liver, kidney, fibrosis, and metabolic-disease beachhead accounts x ~$650k annual spend, per research estimate)"
  som: "$6.0M (12 year-three customers x ~$500k average annual contract value, per research estimate)"
  segments:
    - "Series A-C biotech/biopharma target-validation teams in fibrosis and metabolic disease (liver, kidney)"
    - "Computational biology teams needing schema-consistent training data, and later-stage biopharma seeking overflow organ-chip capacity"
  buyingProcess: >-
    The VP or Head of Translational/Preclinical Research controls the external
    assay and CRO budget and approves the contract; the translational-science
    lead and computational biology lead drive technical evaluation and are
    typically won via a low-commitment pilot study before a recurring
    subscription is proposed.
product:
  mvp: >-
    A contract data-delivery service running liver and kidney fibrosis/MASH
    organ-chip assays under one fixed protocol, delivering datasets with
    standardized metadata, QC flags, and provenance documentation that a
    customer's ML pipeline can ingest without a custom normalization layer.
  sixMonth: >-
    Complete 2-3 paid pilot studies with beachhead biotechs, lock v1 of the
    data schema and QC thresholds against real customer ML ingestion tests,
    and document turnaround-time SLAs for the liver/kidney fibrosis panel.
  twelveMonth: >-
    Convert pilot customers to recurring dataset-refresh subscriptions, add a
    second disease-relevant assay panel (e.g., MASH-specific endpoints) within
    the same organ pair, and establish one CRO partnership for overflow
    execution capacity.
  twentyFourMonth: >-
    Expand the standardized schema to one additional organ system beyond
    liver/kidney based on demonstrated demand, and formalize a data-licensing
    motion for computational biology teams building predictive or virtual-cell
    models on the accumulated reference dataset.
  keyBets:
    - >-
      A fixed, narrow schema for liver/kidney fibrosis endpoints can satisfy
      enough customer ML pipelines without per-customer post-processing
      services that would destroy margin.
    - >-
      Buyers already outsourcing to academic labs or generalist CROs will
      switch to a schema-first vendor before the company has multi-year
      reference-dataset scale.
    - >-
      A vendor-neutral position is a durable differentiator against platform
      vendors, not merely a temporary pricing arbitrage.
gtm:
  wedge: >-
    Paid pilot studies with Series B-C biotechs whose fibrosis or
    metabolic-disease target-validation program is stalled because
    CRO-sourced or academic tissue data is inconsistent, under-annotated, or
    too slow to refresh ahead of a go/no-go milestone.
  channels:
    - "Direct scientific business development to VP/Head of Translational or Preclinical Research"
    - "Scientific conference presence in fibrosis, hepatology, nephrology, and metabolic-disease research"
    - "CRO partnerships for organ-chip execution overflow, per research's distribution-channel findings"
  funnelTargets: "outbound lead -> paid pilot study 20-30%, pilot -> recurring subscription 40-50%+"
  pricing: >-
    Per-study contract pricing for the initial liver/kidney fibrosis assay
    panel (aligned to research's ~$500k-650k per-account annual spend
    benchmark), moving to a recurring data-subscription priced per dataset
    refresh or per additional assay/organ-chip modality once the customer's
    program scales — this mirrors how buyers already pay CROs and platform
    vendors today, lowering the pricing-model switching cost.
businessModel:
  revenueStreams:
    - "Per-study contract fees for the initial disease-area assay panel"
    - "Recurring data-subscription fees for ongoing dataset refreshes"
    - "Expansion fees for additional organ-on-chip modalities or disease areas"
  unitOfValue: "One QC-passed, schema-consistent, model-ready dataset delivered per study or per refresh cycle"
  targetGrossMarginPct: 55
  expansionLevers:
    - "Upsell from single per-study contract to recurring dataset-refresh subscription"
    - "Expansion fees for additional organ-on-chip modalities or disease areas within an existing account"
    - "Data-licensing fees to computational biology/virtual-cell teams for access to the accumulated reference dataset"
strategyMap:
  northStarMetric: "Number of biotech/biopharma accounts on active recurring dataset-refresh subscriptions"
  inputMetrics:
    - "Paid pilot studies started per quarter"
    - "Pilot-to-subscription conversion rate"
    - "Turnaround time from study request to QC-passed delivered dataset"
    - "Percent of delivered datasets ingested by customer ML pipeline without post-processing services"
  moatsToBuild:
    - "Accumulated cross-contract reference dataset on fibrosis, steatosis, and renal-inflammation endpoints"
    - "Validated, versioned QC protocol and schema that customers' ML teams trust without re-derivation"
    - "Workflow knowledge of what customer ML pipelines can ingest directly, independent of any single chip hardware"
  killCriteria:
    - "Fewer than 2 of the first 8 pilot prospects convert to a paid pilot within 9 months of outbound engagement"
    - "Post-processing services exceed 30% of delivered-dataset labor cost across the first 5 contracts, indicating the schema cannot standardize enough to protect margin"
    - "Two or more beachhead prospects choose an incumbent platform vendor's bundled data-plus-model offer over the standalone foundry in competitive evaluations"
  mermaid: |
    flowchart LR
      Wedge[Liver/kidney fibrosis contract data foundry] --> MVP[Fixed-schema QC pipeline + pilot studies]
      MVP --> Proof[2-3 paid pilots convert to subscriptions]
      Proof --> Expansion[Second assay panel + CRO overflow partner]
      Expansion --> Moat[Cross-contract reference dataset + schema trust]
investorMemo:
  verdict:
    call: "Meet / investigate further"
    conviction: >-
      Credible wedge with real budget precedent, but evidence rests on a
      single funding-event source and no direct customer interviews yet;
      conviction should rise sharply after the first 3-5 pilot conversations
      confirm willingness to pay for a standalone data contract.
    whyBelieve: >-
      Buyers already pay for organ-chip studies and services from Emulate,
      MIMETAS, and CN Bio, and research finds no vendor makes a vendor-neutral
      schema-consistent dataset its core product, leaving a genuine gap this
      company can occupy with a narrow, provable wedge.
    whyDoubt: >-
      Threat of substitutes scores highest of the five forces (animal models,
      organoids, academic labs, generalist CROs, and in-house teams all
      compete for the same budget), and a well-capitalized vertically
      integrated player like Xellar could bundle data generation with modeling
      services at a price the standalone foundry cannot match.
    nextDiligence: >-
      Run and price 3-5 real pilot studies with named beachhead accounts to
      confirm both willingness to pay for data alone (not bundled modeling)
      and that the fixed schema ingests into customer ML pipelines without
      margin-destroying post-processing.
  firstCustomer:
    title: "Head of Translational Sciences at a Series B-C biotech with an active liver or kidney fibrosis/MASH program"
    profile: >-
      A biotech with 50-300 employees running an early-stage target-validation
      program that already outsources organ-chip or multi-omics studies to
      academic collaborators or generalist CROs, and has an internal
      computational biology team waiting on usable, model-ready data.
    trigger: >-
      A target-validation milestone is at risk because CRO-sourced or
      academic tissue data is inconsistent, under-annotated, or too slow to
      refresh before a go/no-go decision.
    buyer: "VP or Head of Preclinical/Translational Research"
    initialContract: >-
      A per-study pilot contract in the low hundreds-of-thousands-of-dollars
      range (consistent with research's ~$500k-650k per-account annual spend
      benchmark), converting to a recurring dataset-refresh subscription
      within 2-3 quarters if the pilot dataset is adopted into the customer's
      ML pipeline.
  mustBeTrue:
    - "At least 3 of the first 8 beachhead prospects will pay for a standalone pilot study without requiring a bundled modeling product."
    - "The liver/kidney fibrosis schema can be reused across at least 3 customer contracts without customer-specific post-processing exceeding 30% of delivery cost."
    - "Delivered datasets pass QC review by the customer's own computational biology team, not just the foundry's internal QC, within the agreed turnaround SLA."
    - "At least one pilot customer converts to a recurring dataset-refresh subscription within 9 months of pilot delivery."
    - "No two of the first five competitive evaluations are lost to a platform vendor's bundled data-plus-model offer on price alone."
  diligenceQuestions:
    - "What do the first 10 target accounts pay today for liver or kidney organ-chip studies plus imaging or omics add-ons, and does the company's pricing beat or match that?"
    - "Which metadata fields and QC flags actually recur often enough across fibrosis, MASH, and renal programs to standardize a v1 schema without breaking usability?"
    - "How much of the buying decision sits with the translational-science lead versus central procurement, platform, or safety teams, and does that lengthen the sales cycle?"
    - "Can the vendor-neutral dataset format plug into 3-5 real customer ML workflows without post-processing services that erode margin?"
    - "How defensible is vendor-neutral positioning if Xellar or another integrated platform decides to sell data-only contracts as a loss leader?"
operatingAssumptions:
  - assumption: "Beachhead biotechs will pay for a standalone data contract without requiring a bundled modeling product."
    basis: "research.yaml"
    validationTest: "Run 3-5 priced pilot conversations with named beachhead accounts and confirm signed pilot contracts without a modeling-deliverable rider."
    decisionImpact: "If false, the company must either add a lightweight modeling/analysis layer to the offer or abandon the vendor-neutral positioning."
  - assumption: "A single fixed schema for liver/kidney fibrosis endpoints can satisfy multiple customers' ML pipelines with minimal per-customer post-processing."
    basis: "research.yaml"
    validationTest: "Hands-on import tests of the delivered dataset into 3-5 customer notebooks or feature stores, measuring post-processing labor hours per dataset."
    decisionImpact: "If false, per-customer services load rises, gross margin compresses below the 55% target, and pricing must shift toward services-heavy contracts."
  - assumption: "The economic buyer (VP/Head of Preclinical or Translational Research) will approve a new external vendor relationship within one or two quarters, comparable to how they already engage CROs."
    basis: "operator judgment"
    validationTest: "Track time-to-signature across the first 5 pilot deals against the sales-cycle length assumed in the 6-month milestone."
    decisionImpact: "If sales cycles run materially longer, the hiring plan and runway assumptions must be revised before scaling outbound."
  - assumption: "Contract lab automation and consumables costs allow per-study gross margin above 50% at pilot scale, before automation efficiencies compound."
    basis: "idea.yaml"
    validationTest: "Track actual lab-automation, consumables, and QC-labor cost per delivered dataset across the first 5 contracts against the assumed unit economics."
    decisionImpact: "If margin falls materially below 50%, the company must either raise per-study pricing or delay the subscription-pricing transition until automation reduces per-unit cost."
experimentRoadmap:
  - horizon: "0-90 days"
    experiment: "Priced pilot outreach to 8-10 named beachhead accounts (Series B-C biotechs with active liver/kidney fibrosis or MASH programs)"
    hypothesis: "At least 3 accounts will agree to a priced pilot study without requiring a bundled modeling deliverable"
    successMetric: "3+ signed pilot contracts within 90 days of outbound start"
    owner: "Founding CEO/BD lead"
  - horizon: "0-90 days"
    experiment: "Draft v0 of the liver/kidney fibrosis data schema and QC flag set from published endpoints and one pilot customer's import spec"
    hypothesis: "A single schema can cover the fibrosis/steatosis/hepatotoxicity endpoints common across the first 3 pilot accounts"
    successMetric: "Schema draft validated against at least 2 customers' actual ML-pipeline import requirements"
    owner: "Founding computational biology lead"
  - horizon: "3-6 months"
    experiment: "Run first 2-3 paid pilot studies end to end and measure delivery turnaround against the SLA target"
    hypothesis: "Turnaround time from study request to QC-passed delivery can meet the committed SLA on the first attempt"
    successMetric: "Median turnaround within SLA for at least 2 of 3 pilots"
    owner: "Lab operations lead"
  - horizon: "3-6 months"
    experiment: "Hands-on ingestion test of delivered pilot datasets into each customer's own ML pipeline or notebook environment"
    hypothesis: "Datasets ingest with under 30% post-processing labor relative to total delivery cost"
    successMetric: "Post-processing hours per dataset tracked and below the 30% margin-risk threshold"
    owner: "Founding computational biology lead"
  - horizon: "6-12 months"
    experiment: "Convert at least 1 pilot customer to a recurring dataset-refresh subscription"
    hypothesis: "A pilot customer whose data is adopted into their ML pipeline will commit to a recurring subscription rather than re-bidding the next study"
    successMetric: "1+ signed subscription contract by month 12"
    owner: "Founding CEO/BD lead"
  - horizon: "6-12 months"
    experiment: "Evaluate one CRO partnership for organ-chip execution overflow capacity"
    hypothesis: "A CRO partner can absorb assay-execution volume without diluting the QC bar the schema depends on"
    successMetric: "One signed CRO overflow agreement with a documented QC-pass rate matching internal delivery"
    owner: "Lab operations lead"
  - horizon: "12-18 months"
    experiment: "Test a second disease-relevant assay panel (e.g., MASH-specific endpoints) within the existing liver/kidney organ pair"
    hypothesis: "The existing schema can extend to a second panel without a full schema redesign"
    successMetric: "Second panel delivered to at least 1 customer using an extension of the v1 schema, not a rebuild"
    owner: "Founding computational biology lead"
operations:
  - "Automated organ-on-chip and multi-omics lab pipeline operated in-house at pilot scale, with CRO overflow capacity added once QC parity is proven"
  - "Documented, versioned data schema and QC protocol shared with every customer's computational biology team during onboarding"
  - "Named scientific account manager per customer to manage study scoping, delivery SLAs, and subscription renewal conversations"
  - "Cloud storage and data-pipeline infrastructure sized for dataset delivery and provenance tracking, not for hosting a proprietary model"
team:
  - role: "Founding CEO / business development lead"
    startTiming: "Month 0"
    rationale: "Owns beachhead account outreach, pilot pricing, and the VP Preclinical/Translational Research relationship that controls the buying decision."
  - role: "Founding computational biology / bioinformatics lead"
    startTiming: "Month 0"
    rationale: "Owns the data schema, QC flag design, and validation that delivered datasets ingest into customer ML pipelines without post-processing."
  - role: "Lab operations / assay scientist lead"
    startTiming: "Month 1-2"
    rationale: "Runs the liver/kidney fibrosis organ-chip assays and imaging/multi-omics readouts under the fixed protocol, and manages the eventual CRO overflow relationship."
  - role: "Data engineer"
    startTiming: "Month 4-6"
    rationale: "Builds the dataset-delivery and provenance pipeline once the first pilot studies require repeatable, automated delivery rather than manual handoff."
milestones:
  - horizon: "0-12 months"
    items:
      - "Sign and deliver 2-3 paid pilot studies with beachhead biotechs in liver/kidney fibrosis and metabolic disease"
      - "Lock v1 of the data schema and QC thresholds validated against real customer ML ingestion tests"
      - "Convert at least 1 pilot customer to a recurring dataset-refresh subscription"
  - horizon: "12-24 months"
    items:
      - "Add a second disease-relevant assay panel within the liver/kidney organ pair"
      - "Establish 1 CRO partnership for organ-chip execution overflow capacity"
      - "Reach 4-6 total paying accounts across pilot and subscription contracts"
  - horizon: "24-36 months"
    items:
      - "Expand the standardized schema to one additional organ system based on demonstrated customer demand"
      - "Launch a data-licensing motion for computational biology/virtual-cell teams accessing the accumulated reference dataset"
      - "Reach the researched year-3 SOM benchmark of roughly 12 recurring customer accounts"
risks:
  - risk: "Vertically integrated incumbents (e.g., Xellar) bundle data generation with proprietary modeling services at a price the standalone foundry cannot match"
    likelihood: "Medium"
    impact: "High"
    mitigation: "Position explicitly as vendor-neutral and schema-agnostic, and win early logos among biotechs that want to keep their own ML stack rather than adopt a platform's proprietary models."
  - risk: "Assay standardization and schema-lock take longer than the pilot timeline allows, given organ-chip biology's inherent variability"
    likelihood: "Medium"
    impact: "High"
    mitigation: "Start with one narrow disease context, validate schema and QC protocol against 2-3 pilot contracts before expanding, and price early contracts to reflect validation-stage risk."
  - risk: "Customers are unwilling to depend on an external vendor for IP-sensitive, high-stakes target-validation decisions"
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "Offer low-commitment pilot engagements with clear data-ownership and confidentiality terms, targeting customers already comfortable outsourcing to academic labs or CROs."
  - risk: "Threat of substitutes is high (animal models, organoids, academic labs, generalist CROs, in-house teams all compete for the same budget)"
    likelihood: "High"
    impact: "Medium"
    mitigation: "Lead with the specific buying trigger of a stalled go/no-go milestone caused by unreusable data, where substitutes have already demonstrably failed the customer."
  - risk: "Regulatory and context-of-use validation remains unsettled, limiting how much organ-chip data can influence high-stakes regulated decisions"
    likelihood: "Medium"
    impact: "Low"
    mitigation: "Position the product for internal target-validation decision support, not as a regulatory-submission replacement for animal studies, until validation packages are separately built."
fundingAsk:
  round: "seed"
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 months of runway funds the founding team (BD, computational biology,
    lab operations, and a data engineer added mid-cycle), lab automation and
    consumables for 4-6 pilot and early-subscription contracts, and the cloud
    data-pipeline infrastructure needed to prove the liver/kidney fibrosis
    schema and QC protocol before a Series A expansion into a second organ
    system.
