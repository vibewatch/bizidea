  sensitivityCases:
    - case: Organ-chip data stays exploratory rather than decision-grade
      impact: Sales cycles remain pilot-led and budget caps sit closer to research-services spend than platform-grade recurring data contracts.
      sourceRefs:
        - 7
        - 10
        - 34
        - 40
    - case: Platform vendors bundle human data generation with their own models or instruments
      impact: An independent foundry must win on vendor neutrality, faster turnaround, and better data ingest or its margins compress.
      sourceRefs:
        - 27
        - 30
        - 35
        - 37
    - case: Customers demand bespoke endpoints faster than the schema can absorb them
      impact: Services load rises and the core moat of cross-customer comparability fails to compound.
      sourceRefs:
        - 21
        - 22
        - 23
        - 30
  validationPlan:
    - priority: high
      question: What do 10 target accounts pay today for liver or kidney organ-chip studies plus imaging or omics add-ons?
      evidenceToGather: Anonymized SOWs, quotes, and pilot budgets from CROs, current vendors, and beachhead biotechs.
    - priority: high
      question: Which endpoints and metadata fields recur often enough across fibrosis, MASH, and renal programs to standardize version 1 of the schema?
      evidenceToGather: Sample data packages from current vendors and customer import specifications from computational biology teams.
    - priority: medium
      question: How much of the buying decision sits with translational-science leads versus central platform, procurement, or safety teams?
      evidenceToGather: Interviews with VP preclinical, translational-science leads, comp-bio leads, and procurement owners.
    - priority: medium
      question: Can one vendor-neutral dataset format plug into three to five common internal ML workflows without post-processing services?
      evidenceToGather: Hands-on import tests into customer notebooks, feature stores, and data-quality pipelines.
