competitors:
  - name: Emulate
    stage: scale-up
    wedge: Human organ-chip platform with a strong toxicology and contract-research orientation.
    pricing: Custom quote; public ROI framing, but no list pricing.
    strength: Strong brand, established platform, and explicit contract research motion.
    weaknessVsUs: Still centered on platform and study execution rather than a vendor-neutral cross-customer data schema.
    sourceRefs:
      - 27
      - 28
      - 29
  - name: MIMETAS
    stage: scale-up
    wedge: High-throughput OrganoPlate platform plus CRO services from target validation through safety assessment.
    pricing: Custom quote and multi-phase collaboration; site emphasizes work tailored to objectives, timelines, and budget.
    strength: Scalable liver and kidney models, automation compatibility, and strong service language.
    weaknessVsUs: Product surface remains platform and model portfolio rather than a dedicated model-ready dataset foundry.
    sourceRefs:
      - 30
      - 31
      - 32
      - 33
      - 34
  - name: CN Bio
    stage: scale-up
    wedge: PhysioMimix platform and human organ models, especially liver, ADME, toxicology, and MASH-relevant use cases.
    pricing: Custom quote; no public list pricing.
    strength: Credible liver and multi-organ positioning with a commercial system already in market.
    weaknessVsUs: Still a vendor-specific platform orientation, with less emphasis on a reusable shared data layer.
    sourceRefs:
      - 35
      - 36
  - name: Xellar Biosystems
    stage: scale-up
    wedge: Vertically integrated 3D bio-intelligence platform combining organ-on-chip, automation, imaging, multi-omics, and AI.
    pricing: Not public.
    strength: Well-funded and explicitly built around the data-generation bottleneck.
    weaknessVsUs: Likely pulls customers toward a proprietary full-stack platform rather than a neutral external data supplier.
    sourceRefs:
      - 37
  - name: Quris and Nortis
    stage: scale-up
    wedge: Bio-AI drug-safety platform incorporating kidney-on-chip technology.
    pricing: Not public.
    strength: Clear kidney and safety wedge with human-relevant physiology.
    weaknessVsUs: More safety-focused and modality-specific than a broader target-validation data foundry.
    sourceRefs:
      - 38
