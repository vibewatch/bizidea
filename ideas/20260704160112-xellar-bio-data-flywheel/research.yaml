openQuestions:
  - What do the first 10 beachhead biotechs actually pay today for liver or kidney chip studies plus imaging or omics add-ons?
  - Which metadata fields and QC flags recur often enough across fibrosis, MASH, and renal programs to standardize without breaking usability?
  - Can a vendor-neutral dataset format plug into several customer ML pipelines without post-processing services that destroy margin?
  - How much procurement friction do data ownership, tissue sourcing, confidentiality, and chain-of-custody concerns create in practice?
