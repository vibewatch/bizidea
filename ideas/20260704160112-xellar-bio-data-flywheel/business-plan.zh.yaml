slug: organ-chip-data-contract-foundry
date: "2026-07-04"
executiveSummary: >-
  这家公司是一间合同制器官芯片数据代工厂，按项目和订阅两种方式，向生物制药转化科学和靶点验证团队出售标准化、可直接建模的人体肝脏和肾脏纤维化数据集。切口刻意做窄：一对器官（肝和肾）、一个疾病场景（纤维化和代谢性疾病，如 MASH）、一套固定数据模式——而不是 Xellar 那笔 $50M 融资所验证的"垂直整合平台加模型"打法。研究证实预算早已存在——买家目前把钱花在学术实验室、Emulate、MIMETAS 和 CN Bio 的器官芯片研究和服务上——但没有一家供应商把供应商中立、跨研究通用的数据合同当成产品本身来卖。这家公司的护城河靠跨合同不断积累的参考数据集和验证过的质控协议来复利增长，而不是靠某个专有模型或芯片。第一个验证点，是与某家 B 轮到 C 轮生物技术公司达成一份付费试点——该公司的纤维化或 MASH 靶点验证项目正卡在无法复用的 CRO 或学术数据上。公司刻意推迟涉足更多器官系统、更多疾病领域，以及任何建模层产品，直到肝/肾数据模式和交付周期承诺（SLA）在多个付费客户身上得到验证。最大的悬而未决的风险是：一个独立数据供应商能否顶住平台厂商的挤压或收编——那些厂商把数据生成和专有建模技术栈打包在一起卖。
problem:
  - >-
    生物制药靶点验证团队需要与人体相关的组织数据来筛选药物靶点，但能拿到的数据要么是转化到人体效果很差的动物模型数据，要么是学术界和 CRO 零散做出来的器官芯片研究——没有统一数据模式、质控标准，也不是可直接建模的格式。
  - >-
    每一家生物制药公司都得从零重新摸索自己的芯片实验方案、影像流水线和数据模式，转化科学的预算因此花在重造管道上，而不是回答靶点验证问题，计算生物学团队也没法跨研究复用数据。
solution:
  - >-
    针对肝脏和肾脏纤维化及代谢性疾病模型，运行一套标准化的器官芯片数据生成流水线，在固定协议下采集影像和多组学读数，并配上文档化的质控标记和溯源信息。
  - >-
    以一套客户内部机器学习流水线可以直接摄入的共享数据模式交付数据集，并把跨合同积累的参考数据集和验证过的检测协议复用起来，让每新增一位客户，交付周期和可靠性都进一步提升。
whyWeWin:
  - >-
    供应商中立定位：与 Emulate、MIMETAS、CN Bio 和 Xellar 不同——它们卖的产品本质是平台、仪器或专有建模技术栈，这家公司唯一交付的东西就是格式统一的数据集，这正是研究点出的明确空白（"没有一家供应商把供应商中立、格式统一的数据代工厂当成产品本身"）。
  - >-
    窄滩头（肝/肾纤维化和代谢性疾病）能让质控和数据模式验证更快复利见效，相比一个试图同时在多个器官系统上做标准化的平台更占优势——这与研究发现的"疾病终点异质性限制了一刀切数据模式"相符。
  - >-
    监管和标准层面的顺风（NIH/NCATS、FDA 相关部门、EMA、NIST、CEN-CENELEC）都在推动可复现、场景适配的器官芯片数据，这对核心产品是文档化质控和溯源的供应商有利，而不利于核心产品是芯片或模型的供应商。
strategicChoices:
  beachhead: >-
    正在推进肝脏或肾脏纤维化及代谢性疾病（如 MASH）活跃项目的 B 轮到 C 轮生物技术和生物制药靶点验证团队，目前以零散、非标准化的方式把器官芯片或多组学研究外包给学术实验室或通用型 CRO。
  wedgeRationale: >-
    选择肝脏和肾脏纤维化/代谢性疾病，是因为研究显示这些器官已经有商业化的器官芯片模型并经过验证（Emulate、MIMETAS、CN Bio 都在卖肝脏和/或肾脏产品），买家在这个领域外包研究的预算本就存在，而且终点变异性足够窄（纤维化、脂肪变性、肝毒性、肾脏炎症），可以先标准化一套首发数据模式，不必一次性覆盖多个疾病领域造成摩擦。
  sequencingRationale: >-
    产品排期先在一对器官上验证数据模式和质控标准，再谈自动化扩产，因为研究把检测可重复性和数据模式与客户机器学习流水线不匹配，列为两大最严重的采用摩擦；市场进入排期先做已经在外包的生物技术公司（切换摩擦最低），再做 CRO 合作（渠道杠杆），最后才谈订阅追加销售——这样公司能先在直接客户那里挣到信用，再让渠道伙伴替它背书。
  notYet:
    - >-
      肝脏和肾脏之外的其他器官系统（例如肺、肠、心脏芯片），要等首套数据模式和质控协议在多份付费合同上验证过之后再说。
    - >-
      任何专有的预测性或虚拟细胞建模产品——公司要一直做数据供应商，不做模型供应商，以保住区别于 Xellar 的供应商中立定位。
    - >-
      监管申报级别的验证包；首次发布只针对内部靶点验证决策，不面向监管申报所需的正式场景资质认证。
market:
  tam: "$320M（400 个全球靶点验证团队 x 约 $0.8M 年度支出，来自研究估算）"
  sam: "$58.5M（90 个美国/欧盟肝脏、肾脏、纤维化及代谢性疾病滩头账户 x 约 $650k 年度支出，来自研究估算）"
  som: "$6.0M（12 个第三年客户 x 约 $500k 平均年度合同金额，来自研究估算）"
  segments:
    - "纤维化和代谢性疾病（肝、肾）领域的 A 轮到 C 轮生物技术/生物制药靶点验证团队"
    - "需要格式统一训练数据的计算生物学团队，以及寻求器官芯片溢出产能的后期生物制药公司"
  buyingProcess: >-
    转化/临床前研究的副总裁或负责人掌控外部检测和 CRO 预算并批准合同；转化科学负责人和计算生物学负责人主导技术评估，通常先通过低承诺的试点研究拿下，再提出经常性订阅。
product:
  mvp: >-
    一项按合同交付的数据服务，在一套固定协议下运行肝脏和肾脏纤维化/MASH 器官芯片检测，交付带标准化元数据、质控标记和溯源文档的数据集，客户机器学习流水线无需定制归一化层即可摄入。
  sixMonth: >-
    完成 2-3 个滩头生物技术公司的付费试点研究，用真实客户机器学习摄入测试锁定数据模式和质控标准的 v1 版本，并为肝/肾纤维化检测组合定下交付周期承诺（SLA）。
  twelveMonth: >-
    把试点客户转化为经常性数据集刷新订阅，在同一对器官内新增第二套疾病相关检测组合（例如 MASH 专属终点），并建立一个 CRO 合作以获得溢出执行产能。
  twentyFourMonth: >-
    基于验证到的需求，把标准化数据模式扩展到肝/肾之外的一个新增器官系统，并为在积累的参考数据集上搭建预测或虚拟细胞模型的计算生物学团队，正式建立数据授权业务。
  keyBets:
    - >-
      一套固定、窄范围的肝/肾纤维化终点数据模式，能满足足够多客户的机器学习流水线需求，不需要按客户定制后处理服务而拖垮利润率。
    - >-
      目前外包给学术实验室或通用型 CRO 的买家，会在公司积累起多年参考数据集规模之前，就转向一家以数据模式为先的供应商。
    - >-
      供应商中立定位是相对平台厂商的持久差异化优势，而不只是一时的定价套利。
gtm:
  wedge: >-
    与 B 轮到 C 轮生物技术公司开展付费试点研究——这些公司的纤维化或代谢性疾病靶点验证项目，正因为 CRO 或学术组织数据不一致、标注不足或刷新太慢，而卡在 go/no-go 里程碑之前。
  channels:
    - "直接面向转化/临床前研究副总裁或负责人的科学商务拓展"
    - "在纤维化、肝病学、肾脏病学和代谢性疾病研究领域的学术会议曝光"
    - "按研究的渠道发现，与 CRO 建立器官芯片执行溢出产能合作"
  funnelTargets: "外呼线索 -> 付费试点研究转化率 20-30%，试点 -> 经常性订阅转化率 40-50%+"
  pricing: >-
    首个肝/肾纤维化检测组合按项目合同定价（对齐研究测算的每账户约 $500k-650k 年度支出基准），随客户项目规模扩大转向按数据集刷新次数或每新增检测/器官芯片模态计费的经常性数据订阅——这与买家目前向 CRO 和平台厂商付费的方式一致，降低了定价模式的切换成本。
businessModel:
  revenueStreams:
    - "首个疾病领域检测组合的按项目合同费用"
    - "持续数据集刷新的经常性数据订阅费"
    - "新增器官芯片模态或疾病领域的扩展费用"
  unitOfValue: "每次研究或每个刷新周期交付一份通过质控、格式统一、可直接建模的数据集"
  targetGrossMarginPct: 55
  expansionLevers:
    - "从单次按项目合同追加销售到经常性数据集刷新订阅"
    - "现有账户内新增器官芯片模态或疾病领域的扩展费用"
    - "向计算生物学/虚拟细胞团队收取访问积累参考数据集的数据授权费"
strategyMap:
  northStarMetric: "处于活跃经常性数据集刷新订阅状态的生物技术/生物制药账户数"
  inputMetrics:
    - "每季度启动的付费试点研究数"
    - "试点转经常性订阅的转化率"
    - "从研究请求到交付通过质控数据集的交付周期"
    - "客户机器学习流水线无需后处理即可摄入的交付数据集比例"
  moatsToBuild:
    - "在纤维化、脂肪变性和肾脏炎症终点上跨合同积累的参考数据集"
    - "客户机器学习团队无需自行重新推导、可信赖的验证过、版本化质控协议和数据模式"
    - "对客户机器学习流水线能直接摄入什么的工作流认知，独立于任何单一芯片硬件"
  killCriteria:
    - "首批 8 个试点意向客户中，外呼接触 9 个月内转化为付费试点的不足 2 家"
    - "在前 5 份合同中，后处理服务占交付数据集人工成本的比例超过 30%，说明数据模式无法标准化到足以保住利润率"
    - "在竞争性评估中，2 家或以上滩头意向客户选择了现有平台厂商打包的数据加模型方案，而非独立代工厂"
  mermaid: |
    flowchart LR
      Wedge[Liver/kidney fibrosis contract data foundry] --> MVP[Fixed-schema QC pipeline + pilot studies]
      MVP --> Proof[2-3 paid pilots convert to subscriptions]
      Proof --> Expansion[Second assay panel + CRO overflow partner]
      Expansion --> Moat[Cross-contract reference dataset + schema trust]
investorMemo:
  verdict:
    call: "值得会面/进一步调查"
    conviction: >-
      切口可信，且有真实的预算先例，但证据目前只靠一条融资事件类信源支撑，还没有直接的客户访谈；一旦最初 3-5 次试点对话确认了客户为独立数据合同付费的意愿，信心应会明显上升。
    whyBelieve: >-
      买家已经在为 Emulate、MIMETAS 和 CN Bio 的器官芯片研究和服务付费，研究发现没有一家供应商把供应商中立、格式统一的数据集当成核心产品，留出一个这家公司可以用窄而可验证的切口去占据的真空地带。
    whyDoubt: >-
      替代品威胁在五力评分里最高（动物模型、类器官、学术实验室、通用型 CRO 和内部团队都在争同一份预算），而像 Xellar 这样资金雄厚的垂直整合玩家，可能把数据生成和建模服务打包，定出独立代工厂无法匹配的价格。
    nextDiligence: >-
      与指定的滩头账户跑 3-5 次真实试点研究并定价，确认客户既愿意单独为数据付费（而非打包建模），又能确认固定数据模式能摄入客户机器学习流水线，而不需要吃掉利润的后处理。
  firstCustomer:
    title: "某 B 轮到 C 轮生物技术公司的转化科学负责人，正推进活跃的肝脏或肾脏纤维化/MASH 项目"
    profile: >-
      一家 50-300 人规模的生物技术公司，正推进早期靶点验证项目，已经把器官芯片或多组学研究外包给学术合作方或通用型 CRO，内部有一支计算生物学团队在等可用、可直接建模的数据。
    trigger: >-
      靶点验证里程碑面临风险，因为 CRO 或学术组织数据不一致、标注不足，或来不及在 go/no-go 决策前刷新。
    buyer: "临床前/转化研究副总裁或负责人"
    initialContract: >-
      一份数十万美元级别的按项目试点合同（与研究测算的每账户约 $500k-650k 年度支出基准一致），如果试点数据集被客户机器学习流水线采用，2-3 个季度内转为经常性数据集刷新订阅。
  mustBeTrue:
    - "首批 8 个滩头意向客户中，至少 3 家会为一次独立试点研究付费，而不要求打包建模产品。"
    - "肝/肾纤维化数据模式能在至少 3 份客户合同中复用，且客户专属后处理不超过交付成本的 30%。"
    - "交付的数据集要能通过客户自己的计算生物学团队质控审核，而不只是代工厂内部质控，且要在约定的交付周期承诺内完成。"
    - "至少一位试点客户在试点交付后 9 个月内转为经常性数据集刷新订阅。"
    - "前五次竞争性评估中，不能有两次以上仅因价格因素输给平台厂商打包的数据加模型方案。"
  diligenceQuestions:
    - "前 10 个目标账户今天为肝脏或肾脏器官芯片研究加影像或组学附加项实际支付多少钱，公司的定价能否胜过或至少持平？"
    - "哪些元数据字段和质控标记，真的在纤维化、MASH 和肾脏项目里出现得足够频繁，可以标准化进 v1 数据模式而不破坏可用性？"
    - "购买决策有多大比例掌握在转化科学负责人手里，而非集中在采购、平台或安全团队手里，这会不会拉长销售周期？"
    - "这套供应商中立的数据集格式，能否直接接入 3-5 个真实客户的机器学习工作流，而不需要吃掉利润的后处理服务？"
    - "如果 Xellar 或另一个整合平台决定把纯数据合同当作亏本引流品来卖，供应商中立定位还能守住多久？"
operatingAssumptions:
  - assumption: "滩头生物技术公司愿意为独立数据合同付费，而不要求打包建模产品。"
    basis: "research.yaml"
    validationTest: "与指定滩头账户进行 3-5 次定价试点对话，确认能签下不带建模附加条款的试点合同。"
    decisionImpact: "如果不成立，公司必须要么在报价里加一层轻量建模/分析服务，要么放弃供应商中立定位。"
  - assumption: "一套固定的肝/肾纤维化终点数据模式，能以最少的客户专属后处理，满足多个客户的机器学习流水线需求。"
    basis: "research.yaml"
    validationTest: "对 3-5 个客户的笔记本或特征库做交付数据集的实际导入测试，测算每份数据集的后处理人工工时。"
    decisionImpact: "如果不成立，客户专属服务负荷上升，毛利率会跌破 55% 的目标，定价必须转向服务密集型合同。"
  - assumption: "经济买家（临床前或转化研究副总裁/负责人）会在一到两个季度内批准一段新的外部供应商关系，就像他们现在对待 CRO 一样。"
    basis: "operator judgment"
    validationTest: "跟踪前 5 笔试点交易的签约耗时，对照 6 个月里程碑里假设的销售周期长度。"
    decisionImpact: "如果销售周期明显拉长，就必须在扩大外呼之前修改招聘计划和现金跑道假设。"
  - assumption: "合同实验室自动化和耗材成本，能在自动化效率发挥复利之前，让试点阶段的单次项目毛利率保持在 50% 以上。"
    basis: "idea.yaml"
    validationTest: "跟踪前 5 份合同中，每份交付数据集实际的实验室自动化、耗材和质控人工成本，与假设的单位经济模型对比。"
    decisionImpact: "如果毛利率明显低于 50%，公司必须提高单次项目定价，或推迟订阅定价转型，直到自动化把单位成本降下来。"
experimentRoadmap:
  - horizon: "0–90 天"
    experiment: "对 8-10 个指定滩头账户（活跃推进肝/肾纤维化或 MASH 项目的 B 轮到 C 轮生物技术公司）做定价试点外呼"
    hypothesis: "至少 3 个账户会同意一次定价试点研究，而不要求打包建模交付物"
    successMetric: "外呼启动 90 天内签下 3 份以上试点合同"
    owner: "创始人 CEO/商务拓展负责人"
  - horizon: "0–90 天"
    experiment: "根据已发表终点和一位试点客户的导入规格，起草肝/肾纤维化数据模式和质控标记集的 v0 版本"
    hypothesis: "一套数据模式能覆盖前 3 个试点账户共有的纤维化/脂肪变性/肝毒性终点"
    successMetric: "数据模式草案对照至少 2 个客户实际机器学习流水线导入要求验证通过"
    owner: "创始计算生物学负责人"
  - horizon: "3–6 个月"
    experiment: "端到端跑完前 2-3 个付费试点研究，测算交付周期与 SLA 目标的差距"
    hypothesis: "从研究请求到通过质控的交付，首次尝试就能达到承诺的交付周期承诺"
    successMetric: "3 个试点中至少 2 个的交付周期中位数落在 SLA 之内"
    owner: "实验室运营负责人"
  - horizon: "3–6 个月"
    experiment: "对交付的试点数据集，做导入每位客户自有机器学习流水线或笔记本环境的实测"
    hypothesis: "数据集导入所需的后处理人工，相对总交付成本低于 30%"
    successMetric: "跟踪每份数据集的后处理工时，低于 30% 的利润风险阈值"
    owner: "创始计算生物学负责人"
  - horizon: "6–12 个月"
    experiment: "至少把 1 位试点客户转化为经常性数据集刷新订阅"
    hypothesis: "数据被采纳进机器学习流水线的试点客户，会承诺经常性订阅，而不是为下一次研究重新招标"
    successMetric: "第 12 个月前签下 1 份以上订阅合同"
    owner: "创始人 CEO/商务拓展负责人"
  - horizon: "6–12 个月"
    experiment: "评估一个用于器官芯片执行溢出产能的 CRO 合作"
    hypothesis: "CRO 合作伙伴能吸纳检测执行量，而不稀释数据模式所依赖的质控标准"
    successMetric: "签下一份 CRO 溢出协议，且有文档记录的质控通过率与内部交付相当"
    owner: "实验室运营负责人"
  - horizon: "12–18 个月"
    experiment: "在现有肝/肾器官对内测试第二套疾病相关检测组合（例如 MASH 专属终点）"
    hypothesis: "现有数据模式可以扩展支持第二套组合，而不需要整体重新设计"
    successMetric: "至少 1 位客户用 v1 数据模式的扩展版本收到第二套组合的交付，而非重建"
    owner: "创始计算生物学负责人"
operations:
  - "试点阶段在内部运营自动化器官芯片和多组学实验室流水线，一旦质控水平得到验证，再引入 CRO 溢出产能"
  - "在每位客户的入门流程中，与其计算生物学团队共享文档化、版本化的数据模式和质控协议"
  - "每位客户配备专属科学客户经理，负责研究范围界定、交付 SLA 和订阅续约对话"
  - "云存储和数据流水线基础设施按数据集交付和溯源追踪的需求配置，而非为托管某个专有模型而建"
team:
  - role: "创始人 CEO / 商务拓展负责人"
    startTiming: "第 0 个月"
    rationale: "负责滩头账户外呼、试点定价，以及掌控购买决策的临床前/转化研究副总裁关系。"
  - role: "创始计算生物学 / 生物信息学负责人"
    startTiming: "第 0 个月"
    rationale: "负责数据模式、质控标记设计，以及验证交付数据集能否无需后处理即摄入客户机器学习流水线。"
  - role: "实验室运营 / 检测科学家负责人"
    startTiming: "第 1-2 个月"
    rationale: "在固定协议下运行肝/肾纤维化器官芯片检测和影像/多组学读数，并负责后续的 CRO 溢出合作关系。"
  - role: "数据工程师"
    startTiming: "第 4-6 个月"
    rationale: "在首批试点研究需要可重复、自动化交付而非人工交接之后，搭建数据集交付和溯源流水线。"
milestones:
  - horizon: "0–12 个月"
    items:
      - "与肝/肾纤维化和代谢性疾病领域的滩头生物技术公司签下并交付 2-3 个付费试点研究"
      - "锁定经真实客户机器学习摄入测试验证的数据模式和质控标准 v1 版本"
      - "至少把 1 位试点客户转化为经常性数据集刷新订阅"
  - horizon: "12–24 个月"
    items:
      - "在肝/肾器官对内新增第二套疾病相关检测组合"
      - "建立 1 个用于器官芯片执行溢出产能的 CRO 合作"
      - "试点和订阅合同合计达到 4-6 个付费账户"
  - horizon: "24–36 个月"
    items:
      - "基于验证到的客户需求，把标准化数据模式扩展到一个新增器官系统"
      - "为访问积累参考数据集的计算生物学/虚拟细胞团队推出数据授权业务"
      - "达到研究测算的第三年 SOM 基准，约 12 个经常性客户账户"
risks:
  - risk: "垂直整合的现有厂商（例如 Xellar）把数据生成和专有建模服务打包，定出独立代工厂无法匹配的价格"
    likelihood: "Medium"
    impact: "High"
    mitigation: "明确定位为供应商中立、数据模式无关，并在想保留自身机器学习技术栈、而非采用平台专有模型的生物技术公司中，尽早拿下客户案例。"
  - risk: "考虑到器官芯片生物学固有的波动性，检测标准化和数据模式锁定所需时间超过试点时间表"
    likelihood: "Medium"
    impact: "High"
    mitigation: "先从一个狭窄的疾病场景入手，在 2-3 份试点合同上验证数据模式和质控协议后再扩展，并在早期合同定价中体现验证阶段的风险。"
  - risk: "客户不愿在涉及知识产权敏感、高风险的靶点验证决策上依赖外部供应商"
    likelihood: "Medium"
    impact: "Medium"
    mitigation: "提供低承诺的试点合作，附带清晰的数据归属和保密条款，优先争取已经习惯外包给学术实验室或 CRO 的客户。"
  - risk: "替代品威胁很高（动物模型、类器官、学术实验室、通用型 CRO 和内部团队都在争同一份预算）"
    likelihood: "High"
    impact: "Medium"
    mitigation: "以客户明确的购买触发点切入——因数据无法复用而卡住的 go/no-go 里程碑，此时替代方案已经明显让客户失望过。"
  - risk: "监管和场景适配验证仍未成熟，限制了器官芯片数据在高风险监管决策中的影响力"
    likelihood: "Medium"
    impact: "Low"
    mitigation: "把产品定位为内部靶点验证决策支持，而非动物研究的监管申报替代方案，直到验证包被单独建立起来。"
fundingAsk:
  round: "seed"
  targetFundingRangeUsd: "$3-5M"
  runwayMonths: 18
  useOfFundsSummary: >-
    18 个月的现金跑道用于养创始团队（商务拓展、计算生物学、实验室运营，以及中期加入的数据工程师）、支撑 4-6 个试点及早期订阅合同的实验室自动化和耗材，以及验证肝/肾纤维化数据模式和质控协议所需的云数据流水线基础设施，为迈向 A 轮扩张到第二个器官系统做准备。
