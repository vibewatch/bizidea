topRisks:
  - name: Vertically integrated incumbents undercut the standalone data play
    description: >-
      Platform companies like Xellar could offer their own data generation bundled with modeling services at a lower
      effective price, making a standalone data foundry less attractive to price-sensitive customers.
    mitigation: >-
      Position explicitly as vendor-neutral and schema-agnostic so customers who want to keep their own ML stack, rather
      than adopt a platform's proprietary models, have a clear reason to choose an independent data supplier.
  - name: Assay standardization takes longer than lab automation allows
    description: >-
      Organ-on-chip biology is variable, and forcing a single fixed schema and QC bar across customers and disease areas
      may require more iteration and validation time than the initial contract timeline assumes.
    mitigation: >-
      Start with one narrow disease area and organ system, validate the schema and QC protocol against a small number of
      pilot contracts before expanding, and price early contracts to reflect the validation-stage risk.
  - name: Customers are unwilling to depend on an external data supplier for core R&D decisions
    description: >-
      Target-validation is a high-stakes, IP-sensitive decision process, and some biopharma customers may prefer to keep
      data generation in-house or with long-trusted CRO relationships rather than a new external vendor.
    mitigation: >-
      Offer a low-commitment pilot-study engagement model with clear data-ownership and confidentiality terms, and lead
      with customers already outsourcing to academic labs or CROs who are used to external data generation.
