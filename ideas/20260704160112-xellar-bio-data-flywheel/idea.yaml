problem: >-
  Biopharma target-validation and translational teams need human-relevant biological data to decide which drug targets
  and mechanisms are worth advancing, but the data they can get is either animal-model data that translates poorly to
  humans, or organ-on-chip and multi-omics data that is generated in one-off academic or CRO studies with no shared
  format, no standardized quality controls, and no path into an ML pipeline. Every biopharma that wants to build
  predictive models of human tissue response ends up re-deriving its own bespoke chip protocols, imaging pipelines, and
  data schemas from scratch, which means most of the budget goes to reinventing plumbing instead of running the
  experiments that actually answer a target-validation question. The bottleneck is not a lack of AI models; it is the
  lack of a standardized, continuously replenished supply of model-ready human tissue data that many teams can draw
  from without each rebuilding the lab-to-dataset pipeline themselves.
targetUser:
  primary: >-
    Head of Translational Sciences or Target Validation at a mid-size biopharma or biotech running early discovery
    programs in a specific disease area (e.g., fibrosis, oncology, or metabolic disease) who needs human-tissue response
    data to prioritize or de-risk targets before committing to costly in vivo studies
  secondary: Computational biology or ML lead responsible for building predictive models of drug response who needs labeled, schema-consistent training data
  buyer: VP of Translational Research or Head of Preclinical/Discovery who controls the budget for external data-generation contracts and CRO relationships
startupThesis:
  nonObviousInsight: >-
    The winning company in this wave will not be another virtual-cell modeling company; it will be the contract data
    foundry that other companies' models depend on. Once organ-on-chip data generation, imaging, and multi-omics
    readout are standardized into a shared schema, any biopharma's internal ML team can plug in without rebuilding the
    lab-to-dataset pipeline, turning data supply itself into the defensible layer rather than any single model.
  beachhead: >-
    Series A to Series C biotech biopharma companies running early-stage target-validation programs in fibrosis or
    metabolic disease who currently outsource organ-on-chip or multi-omics studies to academic labs or CROs on an
    ad hoc, non-standardized basis
  wedge: >-
    A contract organ-on-chip data-generation service for one disease area (starting with liver or kidney fibrosis
    models) that delivers standardized, schema-consistent, model-ready datasets on a subscription or per-study basis,
    with a shared data schema that lets customers plug results directly into their own ML pipelines
  whyNowCatalyst: >-
    Xellar's $50M raise to vertically integrate organ-on-chip generation, lab automation, imaging, and multi-omics
    confirms investors now see biological data supply, not model architecture, as the fundable bottleneck in AI drug
    discovery, creating room for a focused contract-data challenger serving customers Xellar's platform-scale approach
    does not prioritize.
  ventureScalePath: >-
    Start as a contract data foundry for one organ system and disease area, then expand the standardized schema and
    automation pipeline across additional organ-on-chip modalities and disease areas, eventually becoming the default
    human-tissue data supply layer that multiple biopharma ML teams and virtual-cell model builders license data from
    on a recurring basis.
solution: >-
  The company operates a lab-automation pipeline that runs organ-on-chip experiments (starting with liver or kidney
  fibrosis models), captures imaging and multi-omics readouts, and normalizes everything into a single documented data
  schema before delivery. Customers submit a target-validation question or compound panel; the foundry runs the
  relevant chip assays under standardized protocols and returns a dataset with consistent metadata, quality-control
  flags, and provenance suitable for direct ingestion into internal ML pipelines. Because the schema and protocols are
  fixed and reused across customers, each new contract adds to a growing internal reference dataset that improves
  assay reliability and turnaround time. The first release targets a single disease area so the automation pipeline,
  QC bar, and data schema can be proven before expanding to additional organ systems.
goToMarketSeed:
  firstCustomer: >-
    A Series B-C biotech with an active fibrosis or metabolic-disease target-validation program that already
    outsources organ-on-chip or multi-omics studies to academic collaborators or CROs and has an internal ML team
    waiting on usable data
  buyingTrigger: >-
    A target-validation program stalls because internally generated or CRO-sourced tissue data is inconsistent,
    under-annotated, or too slow to refresh, and the ML team cannot build a reliable model on it before a go/no-go
    milestone
  currentAlternative: >-
    Academic lab collaborations and generalist CRO-run organ-on-chip or multi-omics studies with bespoke protocols
    and no standardized data schema, plus animal-model data that translates poorly to human biology
  switchingReason: >-
    The foundry delivers data in a schema the customer's ML team can use immediately, at a predictable cost and cadence,
    replacing one-off academic studies that require the customer to build its own normalization and QC layer before the
    data is usable
  pricingHypothesis: >-
    Per-study contract pricing for the initial disease-area assay panel, moving to a data-subscription model priced per
    dataset refresh or per additional organ-on-chip modality as the customer's program scales
