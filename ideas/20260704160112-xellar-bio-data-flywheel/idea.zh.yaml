    sourceRefs: [1]
differentiator: >-
  像 Xellar 这样垂直整合的平台，正在自建端到端全栈，包括专有模型，这让它们更像一个平台赌注，而不是一个共享的供应商。这家公司则反其道而行，只专注做那个标准化数据层：一个疾病领域、一套固定数据模式、一种合同交付模式，让任何生物制药公司的机器学习团队都能直接消费数据，不用绑定某个供应商的建模技术栈。护城河来自随每份合同不断积累的参考数据集和验证过的检测协议，也来自对客户自身建模选择保持模式无关——而不是把客户锁进某个专有虚拟细胞产品里。
