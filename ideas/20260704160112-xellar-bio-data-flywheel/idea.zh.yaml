      一套标准化数据供给层可以扩展到多个器官系统、多个疾病领域，最终向多家下游建模公司授权数据，具备通往大规模可触达市场的可信路径。
topRisks:
  - name: 垂直整合的现有厂商压价挤压独立数据业务
    description: >-
      像 Xellar 这样的平台公司，可能把自己的数据生成和建模服务打包，以更低的有效价格出售，让独立数据代工厂对价格敏感的客户失去吸引力。
    mitigation: >-
      明确定位为供应商中立、数据模式无关，让那些想保留自己机器学习技术栈、而不想采用某个平台专有模型的客户，有一个选择独立数据供应商的清晰理由。
  - name: 检测标准化耗时超过实验室自动化能承受的进度
    description: >-
      器官芯片生物学本身波动性大，在多个客户和疾病领域上强推一套固定数据模式和质控标准，可能需要比首份合同时间表设想更长的迭代和验证时间。
    mitigation: >-
      先从一个狭窄的疾病领域和器官系统入手，在少数几个试点合同上验证数据模式和质控协议后再扩展，并给早期合同定价时体现验证阶段的风险。
  - name: 客户不愿在核心研发决策上依赖外部数据供应商
    description: >-
      靶点验证是高风险、涉及知识产权敏感信息的决策过程，一些生物制药客户可能更愿意把数据生成留在内部，或交给长期信任的 CRO，而不是一个新的外部供应商。
    mitigation: >-
      提供低承诺的试点研究合作模式，附带清晰的数据归属和保密条款，并优先争取那些已经在把工作外包给学术实验室或 CRO、习惯外部数据生成的客户。
