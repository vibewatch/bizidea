problem: >-
  生物制药的靶点验证和转化科学团队需要与人体相关的生物数据，才能判断哪些药物靶点和机制值得推进，但他们能拿到的数据要么是转化到人体效果很差的动物模型数据，要么是学术界或 CRO（合同研究机构）零散做出来的器官芯片和多组学数据——没有统一格式，没有标准化质控，也进不了机器学习流水线。每一家想搭建人体组织反应预测模型的生物制药公司，最后都得从零重新摸索自己的芯片实验方案、影像流水线和数据模式，结果是大部分预算花在重造管道上，而不是花在真正回答靶点验证问题的实验上。瓶颈不是缺 AI 模型，而是缺一套标准化、持续补给、可直接建模的人体组织数据供给——让许多团队可以直接取用，不用各自重建一遍"从实验室到数据集"的整条流水线。
targetUser:
  primary: >-
    某中型生物制药或生物技术公司的转化科学负责人或靶点验证负责人，在特定疾病领域（如纤维化、肿瘤或代谢性疾病）推进早期发现项目，需要人体组织反应数据来筛选或降低靶点风险，然后才愿意投入昂贵的体内研究
  secondary: 负责搭建药物反应预测模型的计算生物学或机器学习负责人，需要带标签、格式统一的训练数据
  buyer: 掌控外部数据生成合同和 CRO 关系预算的转化研究副总裁或临床前/发现研究负责人
startupThesis:
  nonObviousInsight: >-
    这一波浪潮里真正赢的公司，不会是又一家虚拟细胞建模公司，而是其他公司的模型都要依赖的合同数据代工厂。一旦器官芯片数据生成、影像和多组学读数被标准化进一份共享数据模式，任何生物制药公司的内部机器学习团队都能直接接入，不用重建"从实验室到数据集"的流水线——这样一来，数据供给本身就成了护城河，而不是某个单一模型。
  beachhead: >-
    A 轮到 C 轮的生物技术/生物制药公司，正在推进纤维化或代谢性疾病的早期靶点验证项目，目前以零散、非标准化的方式把器官芯片或多组学研究外包给学术实验室或 CRO
  wedge: >-
    针对单一疾病领域（先从肝脏或肾脏纤维化模型切入）的合同制器官芯片数据生成服务，按订阅或按项目交付标准化、格式统一、可直接建模的数据集，用一套共享数据模式让客户把结果直接接入自己的机器学习流水线
  whyNowCatalyst: >-
    Xellar 融资 $50M 用于垂直整合器官芯片生成、实验室自动化、影像和多组学，证实投资人现在把生物数据供给而非模型架构看作 AI 药物研发里值得投钱的瓶颈，这给专注合同数据的挑战者留出了空间——服务 Xellar 这种平台级打法顾不上的客户
  ventureScalePath: >-
    先做单一器官系统和疾病领域的合同数据代工厂，再把标准化数据模式和自动化流水线扩展到更多器官芯片模态和疾病领域，最终成为多家生物制药机器学习团队和虚拟细胞模型开发者持续按需订阅数据的默认人体组织数据供给层。
solution: >-
  这家公司运营一套实验室自动化流水线，执行器官芯片实验（先从肝脏或肾脏纤维化模型开始），采集影像和多组学读数，并在交付前把所有数据归一到一份文档化的数据模式里。客户提交一个靶点验证问题或化合物清单，代工厂在标准化协议下跑相应的芯片检测，返回带一致元数据、质控标记和溯源信息的数据集，可直接接入内部机器学习流水线。因为数据模式和协议是固定且跨客户复用的，每一份新合同都会充实内部不断增长的参考数据集，进而提升检测可靠性和交付速度。首次发布只针对单一疾病领域，这样自动化流水线、质控标准和数据模式可以先跑通验证，再扩展到更多器官系统。
goToMarketSeed:
  firstCustomer: >-
    一家 B 轮到 C 轮的生物技术公司，正在推进纤维化或代谢性疾病靶点验证项目，目前已把器官芯片或多组学研究外包给学术合作方或 CRO，内部机器学习团队正等着能用的数据
  buyingTrigger: >-
    某个靶点验证项目卡住了——因为内部生成或 CRO 提供的组织数据不一致、标注不足，或刷新太慢，机器学习团队来不及在 go/no-go 里程碑前建出可靠模型
  currentAlternative: >-
    学术实验室合作和通用型 CRO 主导的器官芯片或多组学研究，各自用一套协议、没有统一数据模式，外加转化到人体效果很差的动物模型数据
  switchingReason: >-
    代工厂交付的数据用客户机器学习团队能直接上手的数据模式，成本和节奏都可预期，取代了那些一次性的学术研究——用后者的话，客户得先自建归一化和质控层，数据才能用
  pricingHypothesis: >-
    首个疾病领域的检测组合按项目收费，随客户项目规模扩大，转向按数据集刷新次数或按新增器官芯片模态计费的数据订阅模式
