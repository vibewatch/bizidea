jobsToBeDone:
  - job: >-
      当一个靶点验证项目需要与人体相关的组织数据来筛选候选靶点时，帮转化科学负责人快速拿到标准化、可直接建模的器官芯片数据，让他们能做出 go/no-go 决策，而不用自建一套数据生成流水线。
    currentAlternative: 零散的学术实验室合作，或通用型 CRO 主导、各自用一套协议的研究
    successMetric: 从提出研究请求到交付可建模数据集的时间，以及内部数据归一化工作量的下降幅度
  - job: >-
      当计算生物学团队想训练一个人体组织反应预测模型时，帮他们拿到跨多项研究格式统一的训练数据，让他们能建出可靠模型，而不用为每个新数据源重新摸索一遍数据流水线。
    currentAlternative: 内部自建的归一化流水线，硬把不一致的 CRO 和学术数据集拼接在一起
    successMetric: 模型训练数据的一致性，以及每份数据集摄入时数据清洗工程时间的下降幅度
