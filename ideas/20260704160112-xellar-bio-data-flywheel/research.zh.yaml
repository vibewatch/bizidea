categoryDynamics:
  growthRate: 器官芯片到 2034 年的 CAGR 约为 27.6%-29.7%；更广义的 MPS 和类器官增速更慢，但基数更大。
  growthRateSourceRefs:
  - 1
  - 2
  - 3
  tailwinds:
  - point: FDA、EMA 和标准组织已经在正式讨论 NAM 与器官芯片，而不再把它们当边缘科学。
    sourceRefs:
    - 6
    - 7
    - 8
    - 9
    - 24
    - 25
  - point: 商业厂商已经能提供肝脏和肾脏人体模型，也已经跑出类似 CRO 的服务动作，买家教育成本因此下降。
    sourceRefs:
    - 27
    - 30
    - 32
    - 33
    - 35
    - 36
  - point: 围绕多组学、影像标准化和 FAIR 元数据的兴趣在上升，让可复用数据合同比几年前更容易成立。
    sourceRefs:
    - 21
    - 22
    - 23
  headwinds:
  - point: 许多高风险临床前决策里，验证和适用场景仍未完全跑通。
    sourceRefs:
    - 7
    - 10
    - 34
    - 40
  - point: 现有厂商可以把服务和硬件、芯片或专有模型打包卖，导致独立数据价值更难讲清。
    sourceRefs:
    - 27
    - 30
    - 35
    - 37
  - point: 疾病生物学和检测终点仍很异质，一套通吃的数据模式很难成立。
    sourceRefs:
    - 14
    - 16
    - 17
    - 18
    - 32
    - 33
competitors:
- name: Emulate
  stage: 成长期
  wedge: 人体器官芯片平台，强项在毒理学和合同研究。
  pricing: 定制报价；公开强调 ROI，但没有标价。
  strength: 品牌强、平台成熟，而且合同研究打法写得很明白。
  weaknessVsUs: 重心仍在平台和研究执行，而不是一套供应商中立、跨客户复用的数据模式。
  sourceRefs:
  - 27
  - 28
  - 29
- name: MIMETAS
  stage: 成长期
  wedge: 高通量 OrganoPlate 平台，加上从靶点验证做到安全评估的 CRO 服务。
  pricing: 定制报价和多阶段合作；官网强调会按目标、时间表和预算定制。
  strength: 肝脏和肾脏模型可扩展、兼容自动化，服务表达也很强。
  weaknessVsUs: 产品表面仍是平台和模型组合，而不是专门做可直接建模数据集的代工厂。
  sourceRefs:
  - 30
  - 31
  - 32
  - 33
  - 34
- name: CN Bio
  stage: 成长期
  wedge: PhysioMimix 平台和人体器官模型，尤其强调肝脏、ADME、毒理学和 MASH 相关场景。
  pricing: 定制报价；没有公开标价。
  strength: 在肝脏和多器官定位上很可信，商业化系统也已在市场里。
  weaknessVsUs: 仍是供应商特定的平台导向，对可复用共享数据层的强调更弱。
  sourceRefs:
  - 35
  - 36
- name: Xellar Biosystems
  stage: 成长期
  wedge: 垂直整合的 3D bio-intelligence 平台，把器官芯片、自动化、影像、多组学和 AI 拼在一起。
  pricing: 未公开。
  strength: 资金充足，而且明确围绕数据生成瓶颈来搭平台。
  weaknessVsUs: 更可能把客户拉进专有全栈平台，而不是做一家中立的外部数据供应商。
  sourceRefs:
  - 37
- name: Quris and Nortis
  stage: 成长期
  wedge: 把肾脏芯片技术纳入生物 AI 药物安全平台。
  pricing: 未公开。
  strength: 肾脏和安全场景的切口清楚，而且生理相关性强。
  weaknessVsUs: 比起更宽的靶点验证数据代工厂，它更聚焦安全场景，也更偏单一模态。
  sourceRefs:
  - 38
regulatoryTechnicalConstraints:
- point: 在受监管决策里，器官芯片数据想替代动物或标准检测，前提一定是场景适配验证和可复现性过关。
  sourceRefs:
  - 7
  - 10
  - 24
  - 34
  - 40
- point: 影像、组学和溯源元数据必须先标准化，跨研究 ML 复用才站得住。
  sourceRefs:
  - 21
  - 22
  - 23
- point: 不同器官模型和疾病领域的适用场景差异很大，所以一张通用检测菜单满足不了所有买家。
  sourceRefs:
  - 11
  - 14
  - 16
  - 32
  - 33
validationSignals:
