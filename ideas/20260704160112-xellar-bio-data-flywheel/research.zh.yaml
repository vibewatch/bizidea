  sourceRefs:
  - 37
- point: MIMETAS 明确在卖从靶点验证一路做到安全评估的合作项目。
  sourceRefs:
  - 30
- point: Emulate 直接卖合同研究服务，也拿 ROI 做销售话术，说明买家要的不只是仪器，而是交付好的研究结果。
  sourceRefs:
  - 28
  - 29
- point: PhenoVista 与 NETRI 这类 CRO 合作，说明器官芯片能力已经被打包进外包工作流。
  sourceRefs:
  - 39
- point: NIST、JRC 和 CEN-CENELEC 都在推动标准化，这和“先做数据模式”的切口天然一致。
  sourceRefs:
  - 6
  - 24
  - 25
openQuestions:
- 首批 10 家滩头生物技术公司，今天为肝脏或肾脏芯片研究加影像或组学附加项，到底实际付多少钱？
- 在纤维化、MASH 和肾脏项目里，哪些元数据字段和质控标记出现得足够频繁，能标准化而不牺牲可用性？
- 一套供应商中立的数据集格式，能不能直接接进几家客户的 ML 流水线，而不用靠后处理服务把利润吃掉？
- 数据归属、组织来源、保密和全流程留痕这些问题，现实里会带来多大采购摩擦？
