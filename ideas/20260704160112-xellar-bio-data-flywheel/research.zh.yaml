  sensitivityCases:
  - case: 器官芯片数据一直停留在探索阶段，进不了正式决策
    impact: 销售周期会继续围绕试点打转，预算上限也更接近研究服务开支，而不是平台级经常性数据合同。
    sourceRefs:
