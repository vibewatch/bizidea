  validationPlan:
  - priority: 高
    question: 10 个目标账户今天为肝脏或肾脏器官芯片研究加影像或组学附加项，到底付多少钱？
    evidenceToGather: 从 CRO、现有厂商和滩头生物技术公司手里拿到匿名 SOW、报价单和试点预算。
  - priority: 高
    question: 在纤维化、MASH 和肾脏项目里，哪些终点和元数据字段出现得足够频繁，能支撑 v1 数据模式标准化？
    evidenceToGather: 收集现有厂商的样本数据包，以及计算生物学团队给出的客户导入规格。
  - priority: 中
    question: 购买决策里，转化科学负责人到底占多大比重，中央平台、采购或安全团队又占多大比重？
    evidenceToGather: 访谈临床前 VP、转化科学负责人、计算生物学负责人和采购负责人。
  - priority: 中
    question: 同一套供应商中立数据格式，能不能直接接进 3-5 种常见内部 ML 工作流，而不用靠后处理服务补洞？
    evidenceToGather: 亲手把数据导入客户分析脚本环境、特征库和数据质检流水线做测试。
