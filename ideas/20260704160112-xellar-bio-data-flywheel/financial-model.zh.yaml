slug: organ-chip-data-contract-foundry
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: 模型起始月份
    value: 2026-07
    unit: month
    source: '[BP date 2026-07-04]；模型与商业计划同月起算，因为报告日期本身就是执行起点所在月。'
  - id: A2
    name: 种子轮融资期初现金
    value: '3000'
    unit: USD K
    source: '[BP fundingAsk.targetFundingRangeUsd $3-5M]；模型取低值 $3.0M，因为团队在第 2 年第 4 季度前保持精简，先靠 CRO 溢出合作伙伴，再新增第三个实验室重型岗位。'
  - id: A3
    name: 收入单位定义
    value: 活跃付费研究或刷新合同
    unit: unit
    source: '[BP businessModel.unitOfValue：每次研究或每个刷新周期交付一份通过质控、可直接建模的数据集]。'
  - id: A4
    name: 首次付费试点合同金额
    value: '225'
    unit: USD K per pilot
    source: '[BP investorMemo.firstCustomer.initialContract：数十万美元级别]；模型取 $225K，在约 2 个月的试点窗口内分期确认收入。'
  - id: A5
    name: 稳态经常性合同金额
    value: '500'
    unit: USD K per contract-year
    source: '[Research market.som：第三年 12 个客户 x 约 $500K 平均年度合同金额]；作为成熟期经常性收入基准，检测扩展带来的小幅提升尚未计入。'
  - id: A6
    name: 第 1 年每份活跃合同的月度混合收入
    value: M4-M12 = 110,110,90,75,65,60,58,54,52
    unit: USD K per month
    source: '[A4-A5]；[BP milestones：第一年签 2-3 个付费试点，其中 1 个转为经常性订阅]；早期月份以试点收入为主，之后逐步向经常性刷新定价靠拢。'
  - id: A7
    name: 第 2 年每份活跃合同的月度混合收入
    value: Q1-Q4 = 48,47,46,46
    unit: USD K per month
    source: '[A5]；[BP milestones：第 12-24 个月达到 4-6 个付费账户]；模型假设经常性刷新工作占比更高，一次性试点月份更少。'
  - id: A8
    name: 第 3 年每份活跃合同的月度混合收入
    value: Q1-Q4 = 47,48,49,51
    unit: USD K per month
    source: '[A5]；[BP product.twentyFourMonth：新增数据授权业务和一个新增器官系统路径]；小幅提升来自第二套检测组合和扩展工作，而非单纯提价。'
  - id: A9
    name: 第 1 年各月末活跃合同数
    value: 0,0,0,1,1,2,2,2,2,3,3,3
    unit: active contracts
    source: '[BP experimentRoadmap and milestones]：第一年签下并交付 2-3 个付费试点，其中至少 1 个在第 12 个月前转为经常性合同。'
  - id: A10
    name: 第 2 年各季度末活跃合同数
    value: 3,4,5,6
    unit: active contracts
    source: '[BP milestones：第 12-24 个月达到 4-6 个付费账户]；模型只在第 2 年第 4 季度才触到区间上限。'
  - id: A11
    name: 第 3 年各季度末活跃合同数
    value: 7,8,10,12
    unit: active contracts
    source: '[BP milestones：第 24-36 个月达到约 12 个经常性客户账户]；模型直到第 3 年第 4 季度才到 12 个，这让全年收入落在 $6.0M SOM 运行率基准之下。'
  - id: A12
    name: 毛利率爬坡
    value: Y1 50-53%; Y2 54-57%; Y3 57-59%
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct：55]；[BP operatingAssumptions：后处理必须保持在 30% 的人工风险阈值以下]；试点阶段起步接近 50%，随数据模式复用和 CRO 杠杆逐步改善。'
  - id: A13
    name: 外呼线索转付费试点转化率
    value: '25'
    unit: percent
    source: '[BP gtm.funnelTargets：外呼线索转付费试点 20-30%]；模型取中间值。'
  - id: A14
    name: 试点转经常性合同转化率
    value: '45'
    unit: percent
    source: '[BP gtm.funnelTargets：试点转经常性订阅 40-50%+]；模型取目标区间的中间值。'
  - id: A15
    name: 采购周期长度
    value: 1-2
    unit: quarters
    source: '[BP operatingAssumptions：经济买家会在一到两个季度内批准新供应商]；这限制了第 2、3 年新增合同的落地速度。'
  - id: A16
    name: 用于单位经济模型的月度合同流失率
    value: '2.5'
    unit: percent
    source: 创业财务经验值，适用于高 ACV 生物技术服务和数据合同——项目可能因靶点优先级调整而终止，但会被存续账户内的扩展部分抵消。
  - id: A17
    name: 全包年度现金薪酬区间
    value: 创始人 175-185；实验室 155-165；数据 185-190；客户和质控 145-155；科学商务拓展 180
    unit: USD K per FTE
    source: '[BP team roles and startTiming]；创业财务经验值，反映略低于市场水平但现实可行的美国生物技术初创公司薪酬，已含工资税和福利。'
  - id: A18
    name: 招聘计划
    value: M2 实验室运营负责人；M5 数据工程师；M9 科学客户经理；M14 检测科学家 II；M19 科学商务拓展；M28 检测科学家 III；M31 质控/数据运营；M34 生物信息学工程师 II
    unit: hires
    source: '[BP team startTiming]；[BP sequencingRationale]；[BP operations：设立专属科学客户经理，随后引入 CRO 溢出产能]；招聘节奏落后于收入增长，直到数据模式和质控可重复性得到验证。'
  - id: A19
    name: 非薪资销售与市场支出
    value: 10-30
    unit: USD K per month
    source: '[BP gtm channels：直接科学商务拓展、会议和 CRO 合作]；创业财务经验值，适用于创始人主导的生物技术企业销售，会议和差旅支出较为克制。'
  - id: A20
    name: 非薪资研发与工具支出
    value: 30-49
    unit: USD K per month
    source: '[BP operations：云数据流水线及文档化质控与溯源流程]；创业财务经验值，覆盖实验室相关软件、数据工具和检测验证开销。'
  - id: A21
    name: 非薪资 G&A 支出
    value: 14-24
    unit: USD K per month
    source: '[BP risks and fundingAsk：隐含法务、保险、合规和供应商管理开销]；创业财务经验值。'
  - id: A22
    name: 混合 CAC
    value: '135'
    unit: USD K per new active contract
    source: 模型推导自第 1-2 年约 $813K 的销售与市场支出，除以 6 份净新增活跃合同，四舍五入为 $135K。
  - id: A23
    name: 用于单位经济模型的稳态年度 ARPU
    value: '525'
    unit: USD K per active contract-year
    source: '[Research market.som：$500K 平均年度合同金额]；账户转为经常性项目后，模型加上第二套检测组合和刷新扩展带来的小幅提升。'
  - id: A24
    name: 下一轮融资里程碑与缓冲规划依据
    value: 到第 2 年第 4 季度达到 6 份活跃合同、毛利率超过 55%、1 个 CRO 溢出合作伙伴，并新增第二套检测组合；在这一验证点之外再预留 6 个月缓冲
    unit: milestone
    source: '[BP milestones：12-24 个月]；[BP fundingAsk.runwayMonths：18]；模型把资金规划延展为 24 个月的里程碑加缓冲框架。'
