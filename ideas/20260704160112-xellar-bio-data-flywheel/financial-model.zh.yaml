sensitivity:
  - variable: 销售周期
    downsideCase: 从首次接触到签下试点需要 2-3 个季度
    baseCase: 1-2 个季度
    upsideCase: 有了案例背书后约 1 个季度
    y3RevenueImpactK: -610.0
    cashImpactK: -520.0
  - variable: ARPU
    downsideCase: 因折扣或检测附加项更少，混合合同金额低 10%
    baseCase: 稳态年度 ARPU 为 $525K
    upsideCase: 因第二套检测组合和刷新追加销售而高 8%
    y3RevenueImpactK: -500.0
    cashImpactK: -610.0
  - variable: 流失率
    downsideCase: 月度项目流失率 3.5%
    baseCase: 月度项目流失率 2.5%
    upsideCase: 数据集嵌入客户工作流后月度流失率降到 2.0%
    y3RevenueImpactK: -420.0
    cashImpactK: -470.0
  - variable: 毛利率
    downsideCase: 后处理持续定制化，稳态毛利率停在 55%
    baseCase: 稳态毛利率 58%
    upsideCase: 数据模式复用更强、CRO 成本对齐后，稳态毛利率达到 60%
    y3RevenueImpactK: 0.0
    cashImpactK: -290.0
  - variable: CAC
    downsideCase: 每份新增活跃合同 $165K
    baseCase: 每份新增活跃合同 $135K
    upsideCase: 会议案例和口碑积累后降到每份 $110K
    y3RevenueImpactK: 0.0
    cashImpactK: -240.0
  - variable: 招聘节奏
    downsideCase: 需要提前 2 个季度新增 2 名实验室/数据岗位来消化定制化工作
    baseCase: 维持当前精简节奏，第三个实验室重型岗位前先用 CRO 溢出产能
    upsideCase: 只要数据模式保持标准化，第 3 年有一个岗位的招聘可以推迟一个季度
    y3RevenueImpactK: -90.0
    cashImpactK: -210.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |-
    flowchart LR
      Leads[Target accounts] --> Pilots[Paid pilots]
      Pilots --> Recurring[Recurring refresh contracts]
      Recurring --> Revenue[Revenue]
      QC[Schema + QC reuse] --> Margin[Gross margin]
      Revenue --> GrossProfit[Gross profit]
      Margin --> GrossProfit
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: 收入引擎
    finding: 基准情形的收入增长，靠活跃合同数从第 12 个月的 3 份升到第 3 年第 4 季度的 12 份，同时经常性加刷新的混合 ARPU 稳定在研究测算的 $500K 账户基准附近。
  - checkName: 必须做对的事
    finding: 试点转经常性合同转化率必须维持在 BP 目标区间附近，公司才能在不大幅增加销售人力的情况下，把活跃合同数从第 2 年第 4 季度的 6 份翻倍到第 3 年第 4 季度的 12 份。
  - checkName: 模型失效条件
    finding: 如果采购流程再拖一个季度，或定制化后处理让毛利率长期停在 55% 左右，下行情形会把现金底部推到约 $0.7M。
  - checkName: 下一轮融资证明点
    finding: 只有公司到第 2 年年末展示出 6 份活跃合同、毛利率超过 55%、第二套检测组合，以及一个 CRO 溢出合作伙伴，下一轮融资才站得住脚。
sanityChecks:
  ruleOf40: 第 3 年增长率 117% + EBITDA 利润率 6% = 123%。
  burnMultiple: 第 2 年烧钱倍数为 0.7 倍（$804K 的 EBITDA 消耗对应 $1.14M 净新增收入）；第 3 年转为 EBITDA 转正。
  revenuePerFte: 第 3 年每 FTE（按第 3 年第 4 季度口径）收入 $500K（对标技术赋能型科学服务的 $300-600K 基准区间）。
  flags:
    - 基准情形只在第 3 年第 4 季度才达到研究测算的 SOM 基准 12 份活跃合同，因此第 3 年全年收入低于 $6.0M 的 SOM 运行率标题数字。
    - 毛利率假设客户专属后处理保持在 BP 30% 的人工风险阈值以下；如果定制化归一化持续存在，模型会向服务型经济结构回摆。
    - 现金测算没有单独建模实验室设备资本支出或营运资金时点，实际建设过程可能把种子轮所需资金推向 BP $3-5M 区间的上半段。
