    cashImpactK: -210.0
modelDiagram:
  title: unit economics flow
  mermaid: |-
    flowchart LR
      Leads[Target accounts] --> Pilots[Paid pilots]
      Pilots --> Recurring[Recurring refresh contracts]
      Recurring --> Revenue[Revenue]
      QC[Schema + QC reuse] --> Margin[Gross margin]
      Revenue --> GrossProfit[Gross profit]
      Margin --> GrossProfit
      GrossProfit --> Cash[Ending cash]
modelSanity:
  - checkName: Revenue engine
    finding: Base-case revenue is driven by active contracts rising from 3 at month 12 to 12 at Q4Y3 while blended recurring-plus-refresh ARPU settles around the research-backed $500K account benchmark.
  - checkName: Must go right
    finding: Pilot-to-recurring conversion has to stay near the BP target band so the company can double active contracts from 6 at Q4Y2 to 12 at Q4Y3 without a heavy sales headcount ramp.
  - checkName: Model breaks if
    finding: If procurement adds another quarter to the sales cycle or custom post-processing keeps gross margin near 55%, the downside case pushes the cash floor toward roughly $0.7M.
  - checkName: Next-round proof
    finding: The next financing is justified once the company shows 6 active contracts, >55% gross margin, a second assay panel, and one CRO overflow partner by the end of Y2.
sanityChecks:
  ruleOf40: Y3 growth 117% + EBITDA margin 6% = 123%.
  burnMultiple: Y2 burn multiple 0.7x ($804K EBITDA burn on $1.14M net new revenue); Y3 turns EBITDA-positive.
  revenuePerFte: $500K Y3 revenue per Q4Y3 FTE (benchmark roughly $300-600K for tech-enabled scientific services).
  flags:
    - The base case only reaches the research SOM benchmark of 12 active contracts in Q4Y3, so full-year Y3 revenue lands below the headline $6.0M SOM run-rate.
    - Gross margin assumes customer-specific post-processing stays below the BP's 30% labor-risk threshold; if bespoke normalization persists, the model reverts toward services economics.
