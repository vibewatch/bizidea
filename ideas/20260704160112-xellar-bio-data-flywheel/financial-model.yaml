scenarios:
  downside:
    description: One extra quarter of procurement delay plus weaker pilot conversion leaves the company at 10 active contracts by Q4Y3 and keeps gross margin in the mid-50s.
    y3RevenueK: 4020.0
    y3EbitdaK: -361.1
    cashLowPointK: 718.8
    keyAssumptionChanges:
      - Lead-to-pilot conversion stays near 20% instead of 25%.
      - Pilot-to-recurring conversion falls to roughly 35% instead of 45%.
      - Y3 gross margin tops out at 57% instead of 59%.
  base:
    description: 'Base case follows the BP milestones: 3 active contracts by month 12, 6 by Q4Y2, and 12 by Q4Y3 while gross margin improves from low-50s to high-50s.'
    y3RevenueK: 5002.5
    y3EbitdaK: 297.7
    cashLowPointK: 1313.9
    keyAssumptionChanges:
      - Lead-to-pilot conversion stays at the 25% midpoint of the BP target band.
      - Pilot-to-recurring conversion holds at 45%, the midpoint of the BP target band.
      - Gross margin improves to 57-59% in Y3 as schema reuse and CRO leverage reduce delivery cost per contract.
  upside:
    description: Faster scientific selling and earlier CRO leverage pull forward two contract adds in Y3 and lift pricing slightly through broader refresh and assay upsells.
    y3RevenueK: 5808.0
    y3EbitdaK: 833.3
    cashLowPointK: 1444.6
    keyAssumptionChanges:
      - Lead-to-pilot conversion improves toward 30%.
      - Pilot-to-recurring conversion reaches about 50%.
      - Y3 blended monthly ARPU is $1-3K higher and gross margin reaches 60%.
