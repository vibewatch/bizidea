slug: organ-chip-data-contract-foundry
date: '2026-07-04'
currency: USD
modelStartMonth: 2026-07
assumptions:
  - id: A1
    name: Model start month
    value: 2026-07
    unit: month
    source: '[BP date 2026-07-04]; model starts in the same month as the plan because the report is dated at the start of execution.'
  - id: A2
    name: Opening cash from seed raise
    value: '3000'
    unit: USD K
    source: '[BP fundingAsk.targetFundingRangeUsd $3-5M]; model uses the low end $3.0M because the team stays lean through Q4Y2 and uses a CRO overflow partner before adding a third lab-heavy hire.'
  - id: A3
    name: Revenue unit definition
    value: active paying study or refresh contract
    unit: unit
    source: '[BP businessModel.unitOfValue one QC-passed model-ready dataset delivered per study or refresh cycle].'
  - id: A4
    name: Initial paid pilot contract value
    value: '225'
    unit: USD K per pilot
    source: '[BP investorMemo.firstCustomer initialContract low hundreds-of-thousands of dollars]; model uses $225K, recognized over an approximately 2-month pilot window.'
  - id: A5
    name: Steady-state recurring contract value
    value: '500'
    unit: USD K per contract-year
    source: '[Research market.som 12 year-three customers x about $500K average annual contract value]; used as the mature recurring baseline before modest assay-expansion uplift.'
  - id: A6
    name: Y1 blended monthly revenue per active contract
    value: M4-M12 = 110,110,90,75,65,60,58,54,52
    unit: USD K per month
    source: '[A4-A5]; [BP milestones 2-3 paid pilots in year one and 1 pilot converted to a recurring subscription]; early months are pilot-heavy, then blend down toward recurring refresh pricing.'
  - id: A7
    name: Y2 blended monthly revenue per active contract
    value: Q1-Q4 = 48,47,46,46
    unit: USD K per month
    source: '[A5]; [BP milestones 4-6 paying accounts by months 12-24]; model assumes a larger mix of recurring refresh work and fewer one-time pilot months.'
  - id: A8
    name: Y3 blended monthly revenue per active contract
    value: Q1-Q4 = 47,48,49,51
    unit: USD K per month
    source: '[A5]; [BP product.twentyFourMonth adds data-licensing motion and an additional organ-system path]; modest uplift comes from second-panel and expansion work rather than headline price inflation.'
  - id: A9
    name: Y1 end-of-month active contracts
    value: 0,0,0,1,1,2,2,2,2,3,3,3
    unit: active contracts
    source: '[BP experimentRoadmap and milestones] 2-3 paid pilots are signed and delivered in year one, with at least 1 conversion to recurring by month 12.'
  - id: A10
    name: Y2 quarter-end active contracts
    value: 3,4,5,6
    unit: active contracts
    source: '[BP milestones 12-24 months reach 4-6 total paying accounts]; model reaches the top end of that range only at Q4Y2.'
  - id: A11
    name: Y3 quarter-end active contracts
    value: 7,8,10,12
    unit: active contracts
    source: '[BP milestones 24-36 months reach roughly 12 recurring customer accounts]; the model reaches 12 only in Q4Y3, which keeps full-year revenue below the $6.0M SOM run-rate benchmark.'
  - id: A12
    name: Gross margin ramp
    value: Y1 50-53%; Y2 54-57%; Y3 57-59%
    unit: percent
    source: '[BP businessModel.targetGrossMarginPct 55]; [BP operatingAssumptions post-processing must stay below the 30% labor-risk threshold]; pilots start near 50% and improve with schema reuse and CRO leverage.'
  - id: A13
    name: Outbound lead to paid pilot conversion
    value: '25'
    unit: percent
    source: '[BP gtm.funnelTargets outbound lead -> paid pilot 20-30%]; model uses the midpoint.'
  - id: A14
    name: Pilot to recurring conversion
    value: '45'
    unit: percent
    source: '[BP gtm.funnelTargets pilot -> recurring subscription 40-50%+]; model uses the midpoint of the target band.'
  - id: A15
    name: Buying cycle length
    value: 1-2
    unit: quarters
    source: '[BP operatingAssumptions economic buyer approves a new vendor within one or two quarters]; this limits how quickly Y2 and Y3 contract adds can land.'
  - id: A16
    name: Monthly contract churn for unit economics
    value: '2.5'
    unit: percent
    source: Startup-finance heuristic for high-ACV biotech service and data contracts where programs can end with target reprioritization, partially offset by expansion within surviving accounts.
  - id: A17
    name: Loaded annual cash compensation bands
    value: Founders 175-185; lab 155-165; data 185-190; account and QA 145-155; scientific BD 180
    unit: USD K per FTE
    source: '[BP team roles and startTiming]; startup-finance heuristic for below-market but cash-realistic U.S. biotech startup salaries with payroll tax and benefits included.'
  - id: A18
    name: Hiring schedule
    value: M2 LabOps lead; M5 Data engineer; M9 Scientific account manager; M14 Assay scientist II; M19 Scientific BD; M28 Assay scientist III; M31 QA/DataOps; M34 Bioinformatics engineer II
    unit: hires
    source: '[BP team startTiming]; [BP sequencingRationale]; [BP operations named scientific account manager and later CRO overflow]; hires stay behind revenue until schema and QC repeatability are proven.'
  - id: A19
    name: Non-salary sales and marketing spend
    value: 10-30
    unit: USD K per month
    source: '[BP gtm channels direct scientific BD, conferences, and CRO partnerships]; startup-finance heuristic for founder-led biotech enterprise selling with modest event and travel spend.'
  - id: A20
    name: Non-salary R&D and tooling spend
    value: 30-49
    unit: USD K per month
    source: '[BP operations cloud data pipeline plus documented QC and provenance workflow]; startup-finance heuristic for lab-adjacent software, data tooling, and assay-validation overhead.'
  - id: A21
    name: Non-salary G&A spend
    value: 14-24
    unit: USD K per month
    source: '[BP risks and fundingAsk imply legal, insurance, compliance, and vendor-management overhead]; startup-finance heuristic.'
  - id: A22
    name: Blended CAC
    value: '135'
    unit: USD K per new active contract
    source: Model-derived from Y1-Y2 sales and marketing spend of about $813K over 6 net new active contracts, rounded to $135K.
  - id: A23
    name: Steady-state annual ARPU for unit economics
    value: '525'
    unit: USD K per active contract-year
    source: '[Research market.som $500K average annual contract value]; model adds modest second-panel and refresh-expansion uplift once accounts convert into recurring programs.'
  - id: A24
    name: Next-round milestone and buffer planning basis
    value: Reach 6 active contracts, >55% gross margin, one CRO overflow partner, and a second assay panel by Q4Y2; reserve 6 months of buffer beyond that proof point
    unit: milestone
    source: '[BP milestones 12-24 months]; [BP fundingAsk.runwayMonths 18]; model extends the capital plan to a 24-month milestone-plus-buffer frame.'
