slug: aortic-transfer-control-plane
date: '2026-06-02'
executiveSummary: >-
  This company should start as a CT-to-cath transfer control plane for U.S.
  tertiary aortic centers and academic structural-heart programs that already
  receive urgent ascending-aorta referrals but still reconstruct candidacy,
  routing, and procedure prep through PACS review, phone calls, and ad hoc case
  boards. The first customer is a regional hub with 10 or more spoke hospitals
  and an active structural-heart program where launch of an investigational or
  minimally invasive ascending-aorta pathway turns transfer readiness into an
  executive operating problem. The wedge is deliberately narrow: ingest outside
  CT and referral packets, structure key anatomy and acuity fields, flag likely
  minimally invasive versus open-only cases, and assemble a board-ready packet
  for surgery, interventional, anesthesia, and transfer staff. That scope is
  faster to prove than a broad cardiovascular workflow platform because buyers
  can measure transfer-to-decision time, accepted-case capture, packet
  completeness, and pilot-to-production adoption inside one high-consequence
  workflow. The most credible near-term competitive advantage is not generic
  imaging AI; it is owning the handoff moment that image-exchange vendors,
  alerting vendors, planning suites, and manual coordinators each cover only in
  fragments. The market is commercially real but narrow, with research-based
  estimates of about $54.0M beachhead SAM and $196.5M broader U.S.
  structural-heart-adjacent TAM, so venture upside depends on expansion into
  adjacent structural-heart referral and planning workflows after the beachhead
  is proven. The biggest disconfirming risk is timing: if transcatheter
  ascending-aorta programs mature more slowly than expected, the product still
  must earn budget as a surgical and hybrid aortic transfer layer. Two material
  gaps remain unresolved in the source files: true per-hub urgent referral
  volume and the budget owner that most consistently signs this category.
problem:
  - High-risk root and ascending-aorta patients are still transferred through phone, fax, PACS review, and surgeon-specific judgment, which delays acceptance and treatment in a pathology family with very high mortality.
  - Early minimally invasive aortic programs cannot scale reliably when outside CT scans arrive incomplete, multidisciplinary review is rebuilt from scratch, and likely candidates are missed before the right hub team sees them.
solution:
  - Provide an overlay workflow that ingests outside CT and referral packets, normalizes anatomy and acuity fields, and presents a structured case view with explicit clinician-in-the-loop triage between open-surgery-only, device-trial-eligible, and immediate escalation paths.
  - Generate a board-ready packet with imaging snapshots, sizing checkpoints, transfer status, and role-specific tasks so surgery, structural heart, anesthesia, and transfer operations can accept and prepare the patient in one shared workflow.
whyWeWin:
  - The company targets the exact operating gap between outside-image exchange and in-house planning, where current incumbents move images, send alerts, or size accepted cases but do not own acceptance, routing, and packet assembly for urgent aortic referrals.
  - If deployed at regional hubs, the product can build a hard-to-recreate dataset linking outside CT anatomy, packet completeness, transfer timing, acceptance decisions, and eventual treatment outcomes across rare but consequential cases.
strategicChoices:
  beachhead: U.S. tertiary aortic hubs and academic structural-heart programs with multistate urgent referral networks that are preparing for investigational or early minimally invasive ascending-aorta workflows.
  wedgeRationale: This segment feels mortality pressure, referral-capture pressure, and procedural-readiness pressure at the same time, so a narrow transfer-and-packet wedge can show ROI faster than selling generic transfer-center software or a broad structural-heart operating system.
  sequencingRationale: Start with read-first outside-image ingestion, structured intake, clinician-reviewed candidate flagging, and packet assembly for one aortic pathway; add repeatable spoke integrations, benchmark reporting, and adjacent structural-heart workflows only after live pilots prove faster acceptance and better candidate capture.
  notYet:
    - Full PACS replacement or vendor-neutral archive functionality
    - Autonomous diagnosis or unsupervised treatment recommendation
    - Small standalone hospitals with low urgent aortic referral volume
    - Broad cardiology workflow coverage before the acute aortic wedge is repeatable
market:
  tam: $196.5M estimated U.S. expansion TAM based on 786 TVT-registry hospitals at roughly $250k annual ARR per site.
  sam: $54.0M estimated beachhead SAM based on about 180 high-volume tertiary hubs at roughly $300k annual ARR.
  som: $5.4M estimated year-3 SOM based on 18 hub customers at roughly $300k ARR each.
  segments:
    - Tertiary aortic centers and academic structural-heart programs with regional referral networks
    - Multi-hospital cardiovascular service lines that can expand the workflow into broader structural-heart intake after proof
  buyingProcess: >-
    The champion is usually the structural-heart director, aortic center
    operations lead, or cardiac-surgery chief once failed transfers, incomplete
    packets, or launch of an investigational program makes current coordination
    visibly unsafe or inefficient. The economic buyer is typically the
    cardiovascular service-line VP, chief of cardiac surgery, or structural-heart
    administrator, who signs after a pilot shows faster accepted cases and low
    disruption to existing PACS and transfer-center systems.
product:
  mvp: >-
    MVP is a read-first workflow for one tertiary hub that ingests outside CT and
    referral packets, structures key anatomy and acuity fields, routes the case
    to the right multidisciplinary reviewers, and produces a clinician-reviewed
    board-ready packet with transfer status and sizing checkpoints.
  sixMonth: Ship one or two production pilots with outside-image ingestion, structured intake checklists, clinician-reviewed candidate flags, packet completeness scoring, and dashboards for transfer-to-decision time, accepted-case capture, and missing-data loops.
  twelveMonth: Add repeatable integrations with one image-exchange pathway and one leading planning workflow, introduce benchmark reporting across spoke sites, and support multi-hub rollout for urgent aortic and hybrid surgical cases.
  twentyFourMonth: Expand the control plane into adjacent structural-heart referral and planning workflows such as TAVR, TMVR, and complex arch intake once the aortic beachhead proves repeatable and budget-worthy.
  keyBets:
    - Regional hubs will pay for a layer-on-top workflow if it shortens transfer acceptance and improves capture of high-value cases without replacing core imaging systems.
    - Clinician-reviewed candidate flagging and packet assembly will build trust faster than heavier automation in an emergency and investigational setting.
    - A small set of image-exchange and planning integrations can cover enough early accounts to avoid a services-heavy deployment model.
gtm:
  wedge: >-
    Sell a paid pilot to one regional aortic hub that is launching or preparing
    for minimally invasive ascending-aorta evaluation, using transfer delay,
    packet completeness, accepted-case capture, and multidisciplinary readiness
    as the proof points rather than generic AI claims.
  channels:
    - Founder-led direct sales to structural-heart chiefs, aortic center leaders, and cardiovascular service-line executives
    - Design-partner and co-sell motion with investigational-device programs, trial sites, and aortic device innovators that need repeatable screening workflows
    - Integration-led partnerships with image-exchange and planning-suite vendors that position the product as the orchestration layer rather than a rip-and-replace system
  funnelTargets: "Lead to qualified pilot 10-20%, qualified pilot to paid pilot 30-50%, paid pilot to production 60%+, first hub to expanded spoke-network rollout 70%+ within 9 months."
  pricing: >-
    Annual enterprise subscription priced by hub center and spoke-network scope,
    plus onboarding for imaging-workflow setup and optional advanced-planning or
    registry-export modules; this matches how buyers budget around referral
    capture, procedural readiness, and network complexity rather than seat count
    alone.
businessModel:
  revenueStreams:
    - Annual software subscription for aortic transfer and planning workflow management
    - Implementation and imaging-workflow configuration fees
    - Premium modules for advanced planning analytics, benchmark reporting, and registry export
  unitOfValue: Regional hub-and-spoke referral workflow managed through the control plane
  targetGrossMarginPct: 70
  expansionLevers:
    - Expand from one urgent aortic pathway to all spoke hospitals feeding the same hub
    - Add adjacent structural-heart and hybrid aortic workflows after the transfer wedge is trusted
    - Layer benchmark datasets, planning analytics, and registry/reporting modules onto the core workflow subscription
strategyMap:
  northStarMetric: Monthly number of high-acuity aortic referrals converted into accepted, board-ready cases within target decision windows
  inputMetrics:
    - Outside CT to acceptance decision time
    - Referral packet completeness at first submission
    - Percentage of urgent referrals reviewed by the full multidisciplinary team
    - Likely-candidate capture rate for minimally invasive or hybrid pathways
    - Paid pilot to production conversion rate
  moatsToBuild:
    - Aortic case graph linking outside CT anatomy, packet completeness, routing decisions, transfer timing, and treatment disposition
    - Benchmark dataset on spoke-hospital submission quality, acceptance latency, and candidate-conversion performance by hub and region
    - Reusable clinician-reviewed workflow templates for urgent aortic intake, planning checkpoints, and downstream registry export
  killCriteria:
    - Fewer than 3 paid pilots signed within 12 months of focused sales into the defined beachhead
    - No pilot reduces median CT-to-decision time by at least 25% or improves first-pass packet completeness by at least 20%
    - Fewer than 60% of paid pilots convert to annual production contracts because the workflow does not clear buyer ROI or trust thresholds
  mermaid: |
    flowchart LR
      Wedge[Aortic transfer wedge] --> MVP[CT ingestion and board-ready packet MVP]
      MVP --> Proof[Faster acceptance and candidate-capture proof]
      Proof --> Expansion[Structural-heart referral platform expansion]
investorMemo:
  verdict:
    call: Watch
    conviction: Strong clinical pain and a plausible workflow wedge, but conviction stays moderate until the company proves real hub volumes, clear budget ownership, and adoption before transcatheter ascending-aorta volumes scale.
    whyBelieve: The startup addresses a documented, lethal transfer bottleneck at the exact moment minimally invasive aortic programs need repeatable candidate-selection and preparation infrastructure.
    whyDoubt: The standalone beachhead is narrow and timing-sensitive, while adjacent vendors and manual processes already cover enough of the workflow to make buyer inertia a serious risk.
    nextDiligence: Secure live pilot data from 3 to 5 target hubs showing annual urgent referral volume, current packet-failure rates, and measurable improvement in acceptance speed during a paid deployment.
  firstCustomer:
    title: Regional tertiary aortic hub launching an investigational ascending-aorta pathway
    profile: An academic medical center or quaternary cardiovascular institute with a dedicated aortic center, active structural-heart program, and 10 or more spoke hospitals sending urgent aortic referrals across a multistate catchment.
    trigger: Launch of an investigational minimally invasive aortic program, a device-company partnership, or a review of delayed and failed transfers that shows lost candidates and poor on-call coordination.
    buyer: Cardiovascular service-line VP, chief of cardiac surgery, or structural-heart program administrator
    initialContract: $75k-$150k paid pilot for one hub over 6-9 months, converting to roughly $250k-$300k ARR as the workflow expands across the full spoke network and optional planning modules go live.
  mustBeTrue:
    - At least a few hundred U.S. tertiary hubs experience enough urgent aortic and adjacent structural-heart workflow pain to support the estimated beachhead market.
    - One regional hub can show buyer-visible ROI through faster acceptance decisions, better packet completeness, and higher candidate capture without replacing PACS or transfer-center systems.
    - Clinical leaders will trust recommendation-mode candidate flagging and packet assembly in an emergency pathway as long as explicit sign-off remains with physicians.
    - Early image-exchange and planning integrations can be standardized enough to keep gross margins above the target range instead of turning deployments into custom services.
    - The company can expand from acute aortic intake into broader structural-heart referral workflows before the beachhead saturates.
  diligenceQuestions:
    - How many urgent ascending-aorta referrals does a top target hub actually process each year, and how many are lost before multidisciplinary review?
    - Which executive budget owner most consistently signs and renews this category: structural heart, cardiac surgery, transfer operations, or enterprise imaging?
    - What first-pass packet elements are most often missing from outside referrals, and how much time does each omission add to acceptance?
    - How does the product win against Viz.ai, Sectra, 3mensio, and the manual transfer stack in a live pilot evaluation?
    - Will device sponsors and investigational sites allow a third-party workflow layer to participate in screening and planning without protocol friction?
operatingAssumptions:
  - assumption: Regional aortic hubs will fund an overlay workflow if it improves transfer speed and referral capture without requiring system replacement.
    basis: research.yaml
    validationTest: Close at least 3 paid pilots in the target segment with documented pilot-to-annual conversion paths near the modeled $250k-$300k ARR range.
    decisionImpact: If false, the company must narrow to one buyer archetype, lower ACV expectations, or reposition toward services and partner-led deployment.
  - assumption: Recommendation-mode candidate flagging plus packet assembly will earn clinical trust faster than heavier automation.
    basis: idea.yaml
    validationTest: In pilot, achieve at least 70% clinician adoption of packet workflows and no material escalation from buyers that the product is acting as an autonomous treatment selector.
    decisionImpact: If false, the roadmap should strip back flagging claims and focus first on manual workflow orchestration and benchmark reporting.
  - assumption: A small number of imaging-exchange and planning integrations can cover most early target accounts.
    basis: research.yaml
    validationTest: Build a stack matrix across the first 15 qualified opportunities and confirm the prioritized connectors cover at least 70% of pipeline volume.
    decisionImpact: If false, the company must narrow the beachhead to one dominant integration pattern or accept slower, lower-margin implementations.
  - assumption: The beachhead can justify software spend even if transcatheter ascending-aorta adoption takes longer than the category narrative implies.
    basis: operator judgment
    validationTest: In customer discovery, confirm at least 5 target hubs would buy for current surgical or hybrid aortic-transfer pain rather than only future catheter-case volume.
    decisionImpact: If false, financing risk rises and the company should wait for category timing or broaden earlier into adjacent structural-heart workflows.
experimentRoadmap:
  - horizon: 0–90 days
    experiment: Interview 15 aortic center leaders, structural-heart directors, and transfer operations owners at regional hubs.
    hypothesis: The budget conversation becomes real when failed transfers, incomplete packets, and minimally invasive program launch pressure appear in the same operating review.
    successMetric: At least 10 interviews confirm the same trigger pattern and 5 agree to share current-state transfer logs or workflow maps.
    owner: CEO
  - horizon: 0–90 days
    experiment: Audit 6-12 months of urgent aortic referral data from 3 design-partner hubs.
    hypothesis: Packet incompleteness and CT-to-decision delay are measurable enough to support a paid ROI pilot.
    successMetric: Three hubs provide baseline data and at least 2 show a clear improvement opportunity large enough to justify pilot pricing.
    owner: Product lead
  - horizon: 0–90 days
    experiment: Build a read-first prototype connecting one outside-image ingestion path to a structured intake and packet-assembly workflow.
    hypothesis: The first useful deployment can launch without replacing PACS or writing back into every source system.
    successMetric: One design-partner site uses the prototype to review live or shadow cases with all required packet fields captured in one interface.
    owner: Founding eng
  - horizon: 90–180 days
    experiment: Run 2 paid pilots with weekly case-review meetings and explicit clinician sign-off checkpoints.
    hypothesis: A focused hub pilot can reduce decision latency and improve accepted-case readiness within one aortic pathway.
    successMetric: Two paid pilots signed and at least 1 shows 25%+ faster CT-to-decision time and 20%+ improvement in first-pass packet completeness.
    owner: CEO
  - horizon: 90–180 days
    experiment: Test pilot packaging with hub-only pricing versus hub-plus-spoke-network pricing.
    hypothesis: Buyers prefer pricing tied to network complexity because that matches how referral burden and ROI are experienced.
    successMetric: Three of five qualified buyers prefer the network-scoped model and accept a documented conversion path to annual ARR.
    owner: CEO
  - horizon: 180–360 days
    experiment: Launch one partnership motion with an image-exchange vendor or device-program partner using the first pilot case study.
    hypothesis: A credible integration or channel partner can shorten trust-building time and expand pipeline without forcing rip-and-replace procurement.
    successMetric: One partner motion creates at least 3 qualified opportunities or 1 additional paid pilot within 6 months.
    owner: GTM lead
operations:
  - Maintain explicit clinician sign-off, audit trails, and recommendation-mode positioning in every urgent aortic workflow.
  - Standardize spoke-site intake checklists for CT quality, clinical acuity, and contact data before increasing automation.
  - Run weekly hub scorecards on CT-to-decision time, packet completeness, accepted-case capture, and multidisciplinary review latency.
  - Build around vendor-neutral image exchange and downstream planning-tool interoperability instead of replacing existing hospital systems.
team:
  - role: Founding eng
    startTiming: Month 0
    rationale: Owns image ingestion, workflow orchestration, auditability, and the integration layer that makes overlay deployment credible.
  - role: Clinical workflow and implementation lead
    startTiming: Month 0
    rationale: Converts aortic transfer complexity into repeatable intake checklists, packet standards, and pilot deployment playbooks.
  - role: Solutions engineer
    startTiming: Month 4
    rationale: Reduces custom integration burden by productizing common image-exchange, planning-suite, and spoke-site deployment patterns.
  - role: Regulatory and quality lead
    startTiming: Month 6
    rationale: Keeps the product inside clinician-in-the-loop decision support boundaries and supports audit-ready deployment in investigational contexts.
  - role: Enterprise GTM lead
    startTiming: Month 9
    rationale: Added after the first pilots produce a repeatable ROI story for cardiovascular service-line buyers and partner channels.
milestones:
  - horizon: 0–12 months
    items:
      - Sign 3 paid pilots with regional tertiary aortic hubs in the defined beachhead
      - Launch a read-first production workflow for outside CT ingestion, packet assembly, and clinician-reviewed candidate routing
      - Prove baseline improvement in CT-to-decision time, first-pass packet completeness, and multidisciplinary case readiness
  - horizon: 12–24 months
    items:
      - Convert at least 2 pilot hubs to annual production contracts
      - Add repeatable integrations with one image-exchange path and one leading planning workflow
      - Expand from urgent aortic intake into at least 1 adjacent structural-heart referral workflow at an existing customer
  - horizon: 24–36 months
    items:
      - Reach roughly 18 hub customers consistent with the researched year-3 SOM case
      - Launch benchmark reporting and registry-export modules as paid expansion products
      - Establish the company as the default control plane for complex cardiovascular referral intake at multi-hospital hub networks
risks:
  - risk: Transcatheter ascending-aorta adoption may mature more slowly than expected, delaying the highest-urgency beachhead narrative.
    likelihood: High
    impact: High
    mitigation: Sell first against current surgical and hybrid aortic transfer pain, and earn the right to expand into adjacent structural-heart workflows before the category fully breaks out.
  - risk: Hospitals may decide existing PACS, transfer-center, and planning tools are good enough when volumes are small.
    likelihood: Medium
    impact: High
    mitigation: Focus initial sales on regional hubs with measurable packet failures and referral-capture pain, and prove overlay ROI without rip-and-replace deployment.
  - risk: Incorrect candidate flags or workflow delays could trigger clinical-trust or liability concerns.
    likelihood: Medium
    impact: High
    mitigation: Keep recommendations clinician-reviewed, preserve audit trails, and avoid autonomous diagnosis or treatment-selection claims.
  - risk: Integration burden across outside-image pathways and planning stacks could turn deployments into low-margin services work.
    likelihood: Medium
    impact: Medium
    mitigation: Standardize on the most common image-exchange path first, hire a solutions engineer early, and narrow target accounts if connector variance remains high.
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 18 months funds the founding product and clinical-workflow team, 3-5 paid pilots at regional hubs, the first repeatable image-ingestion and planning integrations, and the data needed to prove budget ownership and pilot-to-production conversion.
