scenarios:
  downside:
    description: "Pilot conversion slips by two quarters, image-ingestion remains more manual, and expansion modules arrive later, so year-3 scale stops at 14 hubs with lower ARPU."
    y3RevenueK: 3500.0
    y3EbitdaK: -220.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
      - "Y2 exits at 9 hubs instead of 12 and Y3 exits at 14 instead of 18."
      - "Y3 ARPU stays at $250K because adjacent workflow expansion does not land on schedule."
      - "Gross margin tops out near 67% because integration work stays partly services-heavy."
  base:
    description: "Three pilots land in year 1, two convert on schedule, and repeatable integrations let the company compound to 18 hubs by year-3 exit."
    y3RevenueK: 4650.0
    y3EbitdaK: 439.7
    cashLowPointK: 831.4
    keyAssumptionChanges:
      - "Y1 wins 3 paid pilots, Y2 exits at 12 hubs, and Y3 exits at 18 hubs."
      - "ARPU steps from pilot-equivalent $150K to $250K in Y2 and $300K in Y3 as hubs convert and add modules."
      - "Gross margin reaches the 70% target once integrations standardize across the first image-exchange and planning workflows."
  upside:
    description: "A partner channel shortens procurement, module attach rises faster, and the company reaches 20 hubs with modestly better margin by year 3."
    y3RevenueK: 5800.0
    y3EbitdaK: 980.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
      - "Y2 exits at 14 hubs and Y3 exits at 20 hubs because partner-led pipeline converts faster."
      - "Y3 ARPU reaches $320K as benchmark reporting and registry export attach to more hubs."
      - "Gross margin reaches 74% after integrations and implementation playbooks normalize."
sensitivity:
  - variable: "ARPU"
    downsideCase: "$250K annual hub ARPU"
    baseCase: "$300K annual hub ARPU"
    upsideCase: "$320K annual hub ARPU"
    y3RevenueImpactK: -775.0
    cashImpactK: -545.0
  - variable: "CAC"
    downsideCase: "$140K blended CAC per hub"
    baseCase: "$100K blended CAC per hub"
    upsideCase: "$80K blended CAC per hub"
    y3RevenueImpactK: 0.0
    cashImpactK: -180.0
  - variable: "churn"
    downsideCase: "3.0% monthly churn"
    baseCase: "2.0% monthly churn"
    upsideCase: "1.0% monthly churn"
    y3RevenueImpactK: -350.0
    cashImpactK: -240.0
  - variable: "sales cycle"
    downsideCase: "Pilot and production wins slip one quarter"
    baseCase: "Current modeled win timing"
    upsideCase: "Channel partnerships pull wins one quarter earlier"
    y3RevenueImpactK: -675.0
    cashImpactK: -760.0
  - variable: "gross margin"
    downsideCase: "Y3 margin capped at 67%"
    baseCase: "Y3 margin at 70%-72%"
    upsideCase: "Y3 margin reaches 74%"
    y3RevenueImpactK: 0.0
    cashImpactK: -225.0
  - variable: "hiring pace"
    downsideCase: "Add second GTM and second product engineer two quarters early"
    baseCase: "Current lean ramp"
    upsideCase: "Delay final two hires until Q4Y3"
    y3RevenueImpactK: 0.0
    cashImpactK: -260.0
modelDiagram:
  title: unit economics flow
  mermaid: |
    flowchart LR
      Leads[Qualified hub targets] --> Pilots[Paid pilots]
      Pilots --> Production[Annual hub contracts]
      Production --> Expansion[Adjacent workflow modules]
      Production --> Revenue[Subscription revenue]
      Expansion --> Revenue
      Revenue --> GrossProfit[Gross profit after implementation and support]
      GrossProfit --> Cash[Cash runway and next-round proof]
modelSanity:
  - checkName: "Revenue engine"
    finding: "Base-case revenue is driven by converting three year-1 pilots into 12 paid hubs by Q4Y2 and then expanding to 18 hubs at roughly $300K ARR by Q4Y3."
  - checkName: "Must go right"
    finding: "The first image-ingestion and planning integrations must become repeatable enough to let gross margin clear 70% while customer count compounds."
  - checkName: "Model breaks if"
    finding: "If enterprise sales cycles slip a quarter and ARPU stays closer to $250K, the downside case nearly exhausts cash before the next fundraise."
  - checkName: "Next-round proof"
    finding: "The next financing is justified once the company shows at least two pilot-to-production conversions, repeatable integrations, and a credible path from the aortic wedge into adjacent structural-heart workflows."
sanityChecks:
  ruleOf40: "Y3 growth 161.1% + EBITDA margin 9.5% = 170.6%"
  burnMultiple: "Y2 net burn $0.9M divided by roughly $2.6M of net new ARR at year-end = about 0.4x; Y3 turns EBITDA positive."
  revenuePerFte: "$388K Y3 revenue per FTE (benchmark $200-400K SaaS; high because ACV is enterprise-hospital and headcount stays lean)."
  flags:
    - "Year-2 ramp assumes 9 net new hubs after year 1 despite concentrated health-system procurement and buyer-power risk called out in research."
    - "Gross margin only reaches target if image-ingestion and planning integrations standardize; custom deployment work would pressure both cash and EBITDA."
    - "The year-3 case depends on expansion into adjacent structural-heart workflows because the standalone acute-aortic beachhead is commercially narrow."
