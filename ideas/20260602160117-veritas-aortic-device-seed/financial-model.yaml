    unit: "new customers"
    source: "[BP milestones 0-12 months: sign 3 paid pilots; modeled as wins in M4, M7, and M10]"
  - id: A5
    name: "Year 2 customer endpoints"
    value: "[5,7,9,12]"
    unit: "customers EOP by quarter"
    source: "[BP milestones 12-24 months: convert at least 2 pilot hubs to annual contracts and broaden rollout; model reaches 12 paid hubs by Q4Y2]"
  - id: A6
    name: "Year 3 customer endpoints"
    value: "[14,16,17,18]"
    unit: "customers EOP by quarter"
    source: "[BP milestones 24-36 months and BP/RS market.som: reach roughly 18 hub customers by year 3]"
  - id: A7
    name: "Year 1 blended annualized pilot ARPU per hub"
    value: "150.0"
    unit: "USDK annualized"
    source: "[BP investorMemo.firstCustomer initialContract $75k-$150k paid pilot over 6-9 months; base case uses the high end annualized across active pilot months]"
  - id: A8
    name: "Year 2 annual production ARPU per hub"
    value: "250.0"
    unit: "USDK annual"
    source: "[BP investorMemo.firstCustomer conversion to roughly $250k-$300k ARR; base case starts production years at the low end of that range]"
  - id: A9
    name: "Year 3 annual production-plus-expansion ARPU per hub"
    value: "300.0"
    unit: "USDK annual"
    source: "[BP market.som and RS market.som: 18 hubs at roughly $300k ARR each by year 3]"
  - id: A10
    name: "Revenue recognition method"
    value: "average active hubs in period x period ARPU"
    unit: "formula"
    source: "[Startup-finance heuristic named source: Financial Modeler mid-period go-live rule; revenue uses the average of beginning and ending active hubs in each month or quarter]"
  - id: A11
    name: "Gross margin ramp"
    value: "Y1 45%-60% on live months; Y2 62%,65%,68%,70%; Y3 70%,71%,72%,72%"
    unit: "percent"
    source: "[BP businessModel.targetGrossMarginPct 70] plus [BP investorMemo.mustBeTrue] that integrations must standardize enough to keep margins above target]"
  - id: A12
    name: "Loaded annual salaries by role"
    value: "Founder 180; founding eng 210; clinical workflow 160; solutions 180; regulatory 170; enterprise GTM 180; product/integration eng 190; customer success 140; G&A 120; data product 170"
    unit: "USDK annual per FTE"
    source: "[BP team] plus startup-finance heuristic for lean U.S. healthcare workflow software compensation including payroll burden]"
  - id: A13
    name: "Hiring sequence"
    value: "Founder, founding eng, and clinical workflow lead at start; solutions engineer M4; regulatory lead M6; GTM lead M9; product engineer M16; customer success M19; G&A M22; second GTM M28; data product M31; second product engineer M34"
    unit: "timing"
    source: "[BP team section and BP strategicChoices.sequencingRationale] with later Y2-Y3 hires added only after pilot proof and integration reuse appear]"
  - id: A14
    name: "Monthly churn"
    value: "2.0"
    unit: "percent"
    source: "[Startup-finance heuristic: hospital workflow software is sticky once embedded, but early-stage budget risk and workflow trust create non-trivial logo churn]"
  - id: A15
    name: "Blended CAC per hub"
    value: "100.0"
    unit: "USDK per customer"
    source: "[Model-derived from cumulative founder-led hospital enterprise selling, GTM payroll, and sales-marketing spend for the first 18 hubs; rounded above raw modeled spend to stay conservative]"
  - id: A16
    name: "Non-payroll operating spend ramp"
    value: "Y1 S&M 8-24/month, R&D 18-22/month, G&A 12-15/month; Y2 quarterly opex 155,175,195,220; Y3 quarterly opex 240,260,280,300"
    unit: "USDK"
    source: "[BP gtm channels, BP operations, and startup-finance heuristic for hospital travel, cloud processing, legal/compliance, and implementation tooling]"
  - id: A17
    name: "Opening cash from pre-seed"
    value: "3000.0"
    unit: "USDK"
    source: "[BP fundingAsk targetFundingRangeUsd $2-4M; base model uses a $3.0M close near the midpoint]"
  - id: A18
    name: "Funding sizing rule"
    value: "Capital sized to the next proof milestone plus 6 months of buffer"
    unit: "policy"
    source: "[Developer instruction] anchored to [BP fundingAsk.runwayMonths 18] and modeled as roughly 24 months of runway from close]"
  - id: A19
    name: "Cash flow simplification"
    value: "cash approximates EBITDA with no debt, capex, taxes, or working-capital timing modeled"
    unit: "heuristic"
    source: "[Startup-finance heuristic named source: early-stage planning model simplification]"
