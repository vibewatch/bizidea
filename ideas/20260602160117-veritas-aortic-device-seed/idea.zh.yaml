topRisks:
- name: 项目时点风险
  description: 如果微创升主动脉项目进入临床的速度慢于预期，滩头市场成熟也会比计划更慢。
  mitigation: 先卖当前主动脉转运和手术规划的现实痛点，同时把工作流设计成能在赛道全面爆发前先扩到相邻的结构性心脏 intake。
- name: 临床责任敏感度高
  description: 在急诊主动脉病例里，一次错误的候选标记或一次延误升级，都可能让外科医生和管理层彻底失去信任。
  mitigation: 从第一天起就把产品定位成决策支持和流程编排层，要求明确的临床签字，保留审计轨迹，并采用保守的升级规则。
- name: 低频病例的经济性
  description: 这类少见病例的工作流，如果客户没法把更快协同直接挂到更高病例捕获、试验入组或后续心血管收入上，就很难把账讲清。
  mitigation: 先拿下高转诊量 hub，证明转运速度和“救回来的候选病例”带来的 ROI，再逐步把这条工作流打包进更广的心血管 intake 平台。
