problem: 高风险主动脉根部和升主动脉患者，至今还在一套为开胸手术设计的急诊流程里流转：外院 CT 靠临时人工复核，转运靠电话协调，三级中心要在极端时间压力下，从头重建解剖信息、入组资格，以及该进 OR 还是导管室的判断。对一类死亡率最高可达 65% 的病种来说，这种延误很致命。它也让早期微创项目很难跑起来，因为很多潜在候选人在正确团队看到之前就被漏掉了。现在真正卡住的，已经不只是器械怎么发明，而是怎样把分散的影像和转诊数据，足够快地转成可直接进入手术准备的决策。
targetUser:
  primary: 美国三级医院中，正准备开展研究性经股动脉主动脉根部或升主动脉手术的结构性心脏项目负责人，或主动脉中心运营负责人
  secondary: 负责急诊主动脉转诊的心外转运协调员、导管室经理或值班影像专家
  buyer: 心血管服务线 VP、心外科主任，或结构性心脏项目管理者
startupThesis:
  nonObviousInsight: 随着微创主动脉根部和升主动脉器械走向首次人体应用，最稀缺的资产不再是多一个植入物设计，而是那套工作流：它能把远端 CT 扫描，变成被接受的转运、完成测量的病例，以及协同好的混合团队手术方案。大多数人看到的是器械故事；更近的 SaaS 切口，其实是那层运营系统，让中心不用靠外科医生、影像医生和转运护士临场救火，也能稳稳接住这些病例。
  beachhead: 美国三级主动脉中心和大型学术结构性心脏项目：它们从 10 家以上 spoke 医院接收急诊和紧急升主动脉转诊，同时正准备评估研究性导管式主动脉根部或升主动脉干预病例
  wedge: 一套 CT 到导管室的转运控制平面：接入外院影像，结构化解剖和病情紧急度，标出可能适合微创的候选病例，自动整理可直接上会的测量材料包，并在几分钟内把病例路由给对应的外科、介入和转运团队
  whyNowCatalyst: Veritas 的融资、经股动脉器械设计，以及向首次人体应用推进，说明市场正从“发明”走向“执行”；这让患者筛选和转运编排，第一次成了真正紧迫的基础设施。
  ventureScalePath: 先从升主动脉候选分诊和转运切入，再扩到更广的结构性心脏病例 intake、术前规划、混合手术室排期、上市后 registry 工作流，最终成为整个医疗系统网络里复杂心血管干预的转诊与影像控制平面。
solution: 产品夹在 spoke 医院影像、转运中心和三级主动脉项目之间。它先接入外院 CT 和转诊材料，统一关键解剖与病情字段，再生成结构化病例视图，判断患者更像只能开胸、适合器械试验，还是需要立刻升级处理。对接收中心来说，它会生成一份可直接上会的统一材料包，包含影像截图、器械测量检查点、转运状态，以及外科、介入心脏科、麻醉和导管室排期各自的任务。对 spoke 医院来说，它把传真加电话的升级流程，改成引导式提交流程，减少来回补材料，加快接收决策。第一版卖的是研究性项目的转运和规划层；长期真正值钱的，是一套专有数据资产：复杂主动脉解剖、转诊模式，以及从确诊到干预的转化路径。
goToMarketSeed:
  firstCustomer: 首家客户会是一家学术医疗中心或四级心血管研究院：有专门的主动脉中心、活跃的结构性心脏项目，并在跨州区域内从社区医院接收大量急诊升主动脉转运
  buyingTrigger: 研究性微创主动脉项目启动、与器械公司合作承接早期病例，或失败与延误转运增多，暴露出候选病例流失和值班协同差的问题
  currentAlternative: 电话加传真转运流程、外科医生各自用 PACS 看 CT、人工病例讨论板，以及默认先走开胸路径的分诊，再加上器械代表或内部协调员的临时支持
  switchingReason: 这个切口能让中心更快评估并接收合适患者，却不用替换核心 PACS 或 EMR，同时给结构性心脏团队和外科团队补上一条今天并不存在的“从解剖到术式”的共享工作流。
  pricingHypothesis: 按接收中心和 spoke 网络规模定价的年度企业订阅，加上影像工作流搭建的上线费用；高级规划和 registry 导出模块可按病例附加收费。
