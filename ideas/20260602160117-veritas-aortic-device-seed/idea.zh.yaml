jobsToBeDone:
- job: 当社区医院发现一例高风险升主动脉患者时，帮接收端主动脉中心尽快判断是否接收、转运，并为微创或开胸干预做准备，从而减少可避免的延误，抓住真正合适的病例。
  currentAlternative: 电话加传真协调转运，再叠加 PACS 人工看 CT 和外科医生各自维护的表格
  successMetric: 从收到外院 CT 到形成被接受的治疗方案所需分钟数，以及在临床恶化前完成转运的合格患者占比
