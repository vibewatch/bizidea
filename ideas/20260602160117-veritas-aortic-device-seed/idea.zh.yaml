differentiator: 多数心血管工作流软件止步于通用影像存储、转运中心工单，或事后 registry 报表。这家公司盯的是最窄、但价值最高的那一刻：外院主动脉诊断必须被转成一个已被接收、解剖信息清楚、能直接做术前准备的专科中心病例。防守力来自病例图谱：解剖标准化、候选筛选启发式、spoke 到 hub 的路由逻辑，以及这些少见但结果影响巨大的干预病例的结局反馈——这些东西，无论现有转运工具还是器械公司都没有系统化做好。
