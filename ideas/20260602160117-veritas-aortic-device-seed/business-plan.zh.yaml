slug: aortic-transfer-control-plane
date: '2026-06-02'
executiveSummary: 这家公司应该先从一套 CT 到导管室的转运控制平面做起，服务美国三级主动脉中心和学术型结构性心脏项目：这些机构已经在接收紧急升主动脉转诊，但仍靠 PACS 复核、电话沟通和临时病例讨论，来重建候选资格、路由和术前准备。首个客户应是一家区域 hub：下连 10 家以上 spoke 医院，且已有活跃的结构性心脏项目；当研究性或微创升主动脉路径启动时，转运就绪度会从临床小问题，变成管理层必须解决的运营问题。这个切口故意收得很窄：接入外院 CT 和转诊材料，结构化关键解剖和病情字段，标出更可能适合微创还是只能开胸的病例，并给外科、介入、麻醉和转运团队整理出一份可直接上会的材料包。相比一开始就做宽泛的心血管工作流平台，这个范围更容易证伪或证成，因为买家可以在一条高后果工作流里，直接量化从转运到决策的时间、被接收病例的捕获率、材料完整度，以及 pilot 转正率。近期最可信的竞争优势，不是通用影像 AI，而是拿下那个交接时刻：图像交换厂商、预警厂商、规划套件和人工协调员今天都只覆盖了零散片段。市场确实存在，但不大：研究估算的滩头市场 SAM 约为 $54.0M，更广的美国结构性心脏相邻 TAM 约为 $196.5M，所以要做成 venture 级回报，必须在滩头市场验证后，继续扩进相邻的结构性心脏转诊和规划工作流。最大的不确定性在于时点：如果导管式升主动脉项目成熟比预期慢，产品也必须先靠手术与混合型主动脉转运场景拿到预算。源文件里还有两个关键问题没解开：单个 hub 真实的紧急转诊量到底多大，以及究竟是谁最稳定地签这个预算。
problem:
- 高风险主动脉根部和升主动脉患者，至今还在电话、传真、PACS 复核和外科医生个人判断之间被转来转去；而在一个死亡率极高的病种里，这会直接拖慢接收和治疗。
- 早期微创主动脉项目很难稳定放量，因为外院 CT 常常资料不全，多学科评估每次都要从头搭，真正合适的候选病例也常在正确的 hub 团队看到之前就漏掉了。
solution:
- 提供一层叠加式工作流：接入外院 CT 和转诊材料，标准化解剖与病情字段，并在“只能开胸”“可进入器械试验”“需要立即升级处理”之间，给出有明确医生把关的结构化分诊视图。
- 自动生成可直接上会的材料包，包含影像截图、测量检查点、转运状态和角色化任务，让外科、结构性心脏、麻醉和转运运营在一条共享工作流里完成接收和术前准备。
whyWeWin:
- 公司盯住的是外院图像交换和院内术前规划之间那道真实运营断层：现有厂商能传图、能发预警、也能对已接收病例做测量，但没人真正负责紧急主动脉转诊的接收、路由和材料包组装。
- 如果先在区域 hub 部署，这个产品能积累一套很难复制的数据集，把外院 CT 解剖、材料完整度、转运时点、接收决策和最终治疗结果串起来，覆盖的是少见但后果极重的病例。
strategicChoices:
  beachhead: 美国三级主动脉 hub 和学术型结构性心脏项目：它们有跨州紧急转诊网络，并正准备开展研究性或早期微创升主动脉工作流。
  wedgeRationale: 这一段客户同时承受死亡率压力、转诊捕获压力和术前就绪压力，所以一个窄的“转运 + 材料包”切口，比卖通用转运中心软件或大而全的结构性心脏操作系统，更快打出 ROI。
  sequencingRationale: 先做只读式外院影像接入、结构化 intake、医生复核后的候选标记，以及单一路径的材料包组装；等真实 pilot 证明接收更快、候选捕获更高之后，再补可复用的 spoke 集成、基准报表和相邻的结构性心脏工作流。
  notYet:
  - 完整替代 PACS 或做 vendor-neutral archive
  - 自动诊断或无人监督的治疗建议
  - 紧急主动脉转诊量很低的小型独立医院
  - 在急性主动脉切口跑通前，就做宽泛的心内工作流覆盖
market:
  tam: 按美国 786 家 TVT registry 医院、每站点年 ARR 约 $250k 估算，扩张后的美国 TAM 约为 $196.5M。
  sam: 按约 180 家高转诊量三级 hub、每家年 ARR 约 $300k 估算，滩头市场 SAM 约为 $54.0M。
  som: 按第 3 年拿下 18 家 hub 客户、每家 ARR 约 $300k 估算，第 3 年 SOM 约为 $5.4M。
  segments:
  - 拥有区域转诊网络的三级主动脉中心和学术型结构性心脏项目
  - 验证后可把工作流扩进更广结构性心脏 intake 的多院区心血管服务线
  buyingProcess: 冠军用户通常是结构性心脏负责人、主动脉中心运营负责人，或心外科主任——一旦失败转运、材料不完整，或研究性项目启动把现有协同问题暴露得足够明显，他们就会站出来推动。经济买家通常是心血管服务线 VP、心外科主任，或结构性心脏项目管理者；只有当 pilot 证明病例接收更快、且对现有 PACS 与转运中心系统干扰足够低，他们才会签字。
product:
  mvp: MVP 是围绕一个三级 hub 的只读式工作流：接入外院 CT 和转诊材料，结构化关键解剖与病情字段，把病例路由给合适的多学科评审者，并生成一份由医生复核、带转运状态和测量检查点的可上会材料包。
  sixMonth: 6 个月内交付 1 到 2 个生产级 pilot，具备外院影像接入、结构化 intake 清单、医生复核的候选标记、材料完整度评分，以及转运到决策时间、被接收病例捕获率和缺失数据回路的仪表盘。
  twelveMonth: 12 个月内补上一条可复用的图像交换集成和一条头部规划工作流集成，引入跨 spoke 站点的基准报表，并支持面向紧急主动脉和混合手术病例的多 hub 部署。
  twentyFourMonth: 24 个月后，在主动脉滩头市场已经验证可复制且值得预算投入的前提下，把控制平面扩到 TAVR、TMVR 和复杂主动脉弓 intake 等相邻的结构性心脏转诊与规划工作流。
  keyBets:
  - 如果这层叠加式工作流能缩短转运接收时间、提升高价值病例捕获，又不用替换核心影像系统，区域 hub 就会愿意买单。
  - 在急诊和研究性场景里，先做“医生复核后的候选标记 + 材料包组装”，会比更重的自动化更快赢得信任。
  - 少量图像交换和规划系统集成，就能覆盖足够多的早期账户，从而避免把部署做成重服务模式。
gtm:
  wedge: 先向一家正在启动或准备做微创升主动脉评估的区域主动脉 hub 卖付费 pilot。证明点不是泛泛的 AI 叙事，而是转运延误、材料完整度、被接收病例捕获率，以及多学科就绪度。
  channels:
  - 创始人主导，直接卖给结构性心脏负责人、主动脉中心负责人和心血管服务线高管
  - 与研究性器械项目、试验中心和需要稳定筛选流程的主动脉器械创新公司做共创客户和联合销售
  - 与图像交换厂商和规划套件厂商做以集成为先的合作，把产品放在编排层，而不是做 rip-and-replace
  funnelTargets: 从线索到合格 pilot 10-20%，从合格 pilot 到付费 pilot 30-50%，从付费 pilot 到正式生产 60%+，首个 hub 在 9 个月内把 rollout 扩到 spoke 网络的概率 70%+。
  pricing: 按 hub 中心和 spoke 网络复杂度收年度企业订阅，再加影像工作流搭建上线费，以及高级规划或 registry 导出模块；这更贴合买家围绕转诊捕获、术前就绪度和网络复杂度来做预算的方式，而不是简单按座席数收费。
businessModel:
  revenueStreams:
  - 主动脉转运与术前规划工作流管理的年度软件订阅
  - 实施与影像工作流配置费用
  - 高级规划分析、基准报表和 registry 导出的高级模块
  unitOfValue: 通过控制平面管理的一套区域 hub-and-spoke 转诊工作流
  targetGrossMarginPct: 70
  expansionLevers:
  - 从一条紧急主动脉路径扩到同一 hub 下所有 spoke 医院
  - 在转运切口建立信任后，增加相邻的结构性心脏与混合型主动脉工作流
  - 在核心工作流订阅之上叠加基准数据集、规划分析和 registry/报表模块
strategyMap:
  northStarMetric: 每月在目标决策时窗内，被转成“已接收且可直接上会”的高危主动脉转诊数量
  inputMetrics:
  - 外院 CT 到接收决策的耗时
  - 首次提交时转诊材料的完整度
  - 由完整多学科团队评审的紧急转诊占比
  - 微创或混合路径的潜在候选捕获率
  - 付费 pilot 转生产合同的转化率
  moatsToBuild:
  - 把外院 CT 解剖、材料完整度、路由决策、转运时点和治疗去向连起来的主动脉病例图谱
  - 围绕 spoke 医院提交质量、接收延迟，以及按 hub 和区域拆分的候选转化表现建立基准数据集
  - 可复用的、经医生复核的紧急主动脉 intake、规划检查点和下游 registry 导出模板
  killCriteria:
  - 在定义好的滩头市场里集中销售 12 个月后，签不下 3 个付费 pilot
  - 没有任何一个 pilot 能把 CT 到决策的中位时间至少压缩 25%，或把一次通过的材料完整度提升至少 20%
  - 不到 60% 的付费 pilot 能转成年付生产合同，因为工作流没能穿过买家的 ROI 或信任门槛
  mermaid: |
    flowchart LR
      Wedge[主动脉转运切口] --> MVP[CT 接入与可上会材料包 MVP]
      MVP --> Proof[更快接收与候选捕获的验证]
      Proof --> Expansion[向结构性心脏转诊平台扩张]
investorMemo:
  verdict:
    call: 观察
    conviction: 临床痛点很强，工作流切口也说得通，但在公司证明真实 hub 量级、清晰预算归属，以及在导管式升主动脉量放大前就能跑出采用之前，判断仍应保持中等确信度。
    whyBelieve: 公司打的是一个被文献反复证明、且致命的转运瓶颈，时点又刚好卡在微创主动脉项目开始需要可重复候选筛选和术前准备基础设施的时候。
    whyDoubt: 独立滩头市场偏窄、对时点高度敏感，而相邻厂商和人工流程已经覆盖了足够多的环节，买家惯性会是个实打实的风险。
    nextDiligence: 尽快拿到 3 到 5 家目标 hub 的真实 pilot 数据：包括年度紧急转诊量、当前材料失败率，以及在付费部署中接收速度改善的幅度。
  firstCustomer:
    title: 启动研究性升主动脉路径的区域三级主动脉 hub
    profile: 一家具备专门主动脉中心、活跃结构性心脏项目，并有 10 家以上 spoke 医院在跨州服务半径内持续输送紧急主动脉转诊的学术医疗中心或四级心血管研究院。
    trigger: 研究性微创主动脉项目启动、与器械公司合作，或一轮对延误和失败转运的复盘，暴露出候选流失和值班协同差的问题。
    buyer: 心血管服务线 VP、心外科主任，或结构性心脏项目管理者
    initialContract: 先做一个 $75k-$150k 的 6-9 个月单 hub 付费 pilot；随着工作流扩到整张 spoke 网络并启用可选规划模块，再转成约 $250k-$300k ARR。
  mustBeTrue:
  - 美国至少有几百家三级 hub，面临足够强的紧急主动脉与相邻结构性心脏工作流痛点，才撑得起估算中的滩头市场。
  - 一家区域 hub 能在不替换 PACS 或转运中心系统的情况下，用更快接收决策、更完整材料和更高候选捕获率，打出买家看得懂的 ROI。
  - 只要最后签字权仍在医生手里，临床负责人就会信任“建议模式”的候选标记和材料包组装。
  - 早期图像交换与规划系统集成，必须足够标准化，才能把毛利率守在目标区间之上，而不是把部署做成定制服务。
  - 在滩头市场触顶前，公司得有能力从急性主动脉 intake 扩进更广的结构性心脏转诊工作流。
  diligenceQuestions:
  - 一个头部目标 hub 每年究竟处理多少例紧急升主动脉转诊？其中多少在进入多学科评审前就流失了？
  - 究竟是谁最稳定地签字并续费这类预算——结构性心脏、心外科、转运运营，还是企业影像团队？
  - 外院转诊里最常缺的首轮材料是什么？每缺一项，会让接收决策多拖多久？
  - 在真实 pilot 评估里，这个产品如何赢过 Viz.ai、Sectra、3mensio 以及人工转运流程栈？
  - 器械赞助方和研究性试验中心，会不会允许第三方工作流层参与筛选和规划，而不带来 protocol friction？
operatingAssumptions:
- assumption: 只要能提升转运速度和转诊捕获，又不用替换系统，区域主动脉 hub 就愿意为一层叠加式工作流买单。
  basis: research.yaml
  validationTest: 在目标细分市场签下至少 3 个付费 pilot，并证明它们有清晰的 pilot 转年费路径，接近模型中的 $250k-$300k ARR 区间。
  decisionImpact: 如果这一点不成立，公司就必须进一步收窄买家画像、下调 ACV 预期，或改成更偏服务和伙伴驱动的部署模式。
- assumption: 相比更重的自动化，“建议模式”的候选标记加材料包组装，会更快赢得临床信任。
  basis: idea.yaml
  validationTest: 在 pilot 中让至少 70% 的临床用户采用材料包工作流，且没有买家因产品被视为自动治疗选择器而提出实质性升级问题。
  decisionImpact: 如果不成立，路线图应先砍掉标记类表述，把重点放回人工工作流编排和基准报表。
- assumption: 少数几种图像交换和规划系统集成，就能覆盖大多数早期目标账户。
  basis: research.yaml
  validationTest: 把前 15 个合格机会的技术栈拉成矩阵，确认优先做的连接器能覆盖至少 70% 的 pipeline 体量。
  decisionImpact: 如果不成立，公司就要把滩头市场收窄到一种占主导的集成模式，或者接受更慢、毛利更低的实施。
- assumption: 即便导管式升主动脉采用比赛道叙事暗示得更慢，滩头市场也足以支撑软件预算。
  basis: operator judgment
  validationTest: 在客户访谈中确认，至少 5 家目标 hub 会因为当下的手术或混合型主动脉转运痛点买单，而不只是为了未来的导管病例。
  decisionImpact: 如果不成立，融资风险会明显上升，公司应等待赛道时点，或更早扩到相邻的结构性心脏工作流。
experimentRoadmap:
- horizon: 0–90 天
  experiment: 访谈 15 位区域 hub 的主动脉中心负责人、结构性心脏负责人和转运运营负责人。
  hypothesis: 只有当失败转运、材料不完整和微创项目启动压力同时出现在一次运营复盘里，预算讨论才会真的启动。
  successMetric: 至少 10 场访谈确认了同一套触发模式，且有 5 家愿意分享现状转运日志或流程图。
  owner: CEO
- horizon: 0–90 天
  experiment: 审计 3 家共创客户 hub 过去 6-12 个月的紧急主动脉转诊数据。
  hypothesis: 材料不完整和 CT 到决策的延误是可量化的，足以支撑一个付费 ROI pilot。
  successMetric: 3 家 hub 提供基线数据，且至少 2 家存在足够大的改善空间，足以支撑 pilot 定价。
  owner: 产品负责人
- horizon: 0–90 天
  experiment: 做一个只读式原型，把一条外院影像接入路径连到结构化 intake 和材料包组装工作流上。
  hypothesis: 第一版有用的部署，可以在不替换 PACS、也不用回写所有源系统的情况下上线。
  successMetric: 一家共创客户站点用该原型评审真实或 影子病例，并在一个界面里收齐所有必须字段。
  owner: 创始工程师
- horizon: 90–180 天
  experiment: 做 2 个付费 pilot，并安排每周病例复盘和明确的临床签字节点。
  hypothesis: 聚焦单一主动脉路径的 hub pilot，可以明显缩短决策延迟，并提升已接收病例的术前就绪度。
  successMetric: 签下 2 个付费 pilot，且至少 1 个实现 CT 到决策时间提速 25%+、一次通过的材料完整度提升 20%+。
  owner: CEO
- horizon: 90–180 天
  experiment: 测试两种 pilot 打包方式：只按 hub 定价，和按 hub 加 spoke 网络定价。
  hypothesis: 买家更偏好按网络复杂度定价，因为他们感受到的转诊负担和 ROI 本来就与网络规模绑定。
  successMetric: 5 个合格买家里至少有 3 个更偏好按网络范围定价，并接受清晰记录的转成年付 ARR 路径。
  owner: CEO
- horizon: 180–360 天
  experiment: 拿首个 pilot 案例做背书，启动一条与图像交换厂商或器械项目伙伴的合作路径。
  hypothesis: 只要集成或渠道伙伴足够可信，就能缩短信任建立周期，扩充 pipeline，又不用走 rip-and-replace 采购。
  successMetric: 6 个月内，这条伙伴路径带来至少 3 个合格机会，或 1 个新增付费 pilot。
  owner: GTM 负责人
operations:
- 在每条紧急主动脉工作流里保留明确的临床签字、审计轨迹，以及“建议模式”的产品定位。
- 先把 spoke 站点在 CT 质量、临床紧急度和联系人信息上的 intake 清单标准化，再逐步提高自动化。
- 每周在 hub 端跟踪 CT 到决策时间、材料完整度、被接收病例捕获率，以及多学科评审延迟。
- 围绕 vendor-neutral 图像交换和下游规划工具互操作来建设，而不是替换医院现有系统。
team:
- role: 创始工程师
  startTiming: Month 0
  rationale: 负责影像接入、工作流编排、可审计性，以及让叠加式部署真正站得住脚的集成层。
- role: 临床工作流与实施负责人
  startTiming: Month 0
  rationale: 把主动脉转运的复杂性，压成可重复的 intake 清单、材料标准和 pilot 部署打法。
- role: 解决方案工程师
  startTiming: Month 4
  rationale: 把常见的图像交换、规划套件和 spoke 站点部署模式产品化，减少定制集成负担。
- role: 法规与质量负责人
  startTiming: Month 6
  rationale: 确保产品始终停留在“医生在环”的决策支持边界内，并支撑研究性场景下可审计的部署。
- role: 企业 GTM 负责人
  startTiming: Month 9
  rationale: 等前几个 pilot 跑出可重复的 ROI 故事后，再补上这名角色去打心血管服务线买家和伙伴渠道。
milestones:
- horizon: 0–12 个月
  items:
  - 在定义好的滩头市场签下 3 个区域三级主动脉 hub 的付费 pilot
  - 上线一条生产级只读工作流，完成外院 CT 接入、材料包组装和医生复核的候选路由
  - 证明 CT 到决策时间、一次通过的材料完整度，以及多学科病例就绪度的基线改善
- horizon: 12–24 个月
  items:
  - 至少把 2 个 pilot hub 转成年付生产合同
  - 补上一条可复用的图像交换路径集成和一条头部规划工作流集成
  - 在现有客户里，把紧急主动脉 intake 扩到至少 1 条相邻的结构性心脏转诊工作流
- horizon: 24–36 个月
  items:
  - 客户数提升到约 18 个 hub，对应研究中的第 3 年 SOM 场景
  - 把基准报表和 registry 导出模块作为付费扩展产品上线
  - 把公司打成多院区 hub 网络里复杂心血管转诊 intake 的默认控制平面
risks:
- risk: 导管式升主动脉治疗的采用速度，可能比预期慢得多，从而推迟“最高紧迫度”的滩头市场叙事。
  likelihood: High
  impact: High
  mitigation: 先围绕当下的手术与混合型主动脉转运痛点卖进去，再在整个赛道真正爆发前，赢得向相邻结构性心脏工作流扩张的资格。
- risk: 当病例量还小的时候，医院可能会觉得现有 PACS、转运中心和规划工具已经够用。
  likelihood: Medium
  impact: High
  mitigation: 最初销售只打那些材料失败可量化、且转诊捕获痛点明显的区域 hub，并在不做 rip-and-replace 的前提下证明叠加式 ROI。
- risk: 错误的候选标记或工作流延误，可能引发临床信任和责任风险。
  likelihood: Medium
  impact: High
  mitigation: 所有建议都必须由临床复核，完整保留审计轨迹，并避免任何自动诊断或自动治疗选择的表述。
- risk: 外院影像路径和规划系统栈的集成负担，可能把部署拖成低毛利的服务活。
  likelihood: Medium
  impact: Medium
  mitigation: 先围绕最常见的图像交换路径做标准化，尽早招解决方案工程师；如果连接器差异仍然很大，就继续收窄目标账户。
fundingAsk:
  round: pre-seed
  targetFundingRangeUsd: $2–4M
  runwayMonths: 18
  useOfFundsSummary: 这 18 个月的资金将覆盖创始产品与临床工作流团队、3-5 个区域 hub 的付费 pilot、首批可复用的影像接入与规划集成，以及证明预算归属和 pilot 转正所需的数据。
