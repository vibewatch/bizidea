  y3RevenueImpactK: 0.0
  cashImpactK: -260.0
modelDiagram:
  title: 单位经济模型流程
  mermaid: |
    flowchart LR
      Leads[合格的 hub 目标账户] --> Pilots[付费 pilot]
      Pilots --> Production[年度 hub 合同]
      Production --> Expansion[相邻工作流模块]
      Production --> Revenue[订阅收入]
      Expansion --> Revenue
      Revenue --> GrossProfit[扣除实施与支持后的毛利润]
      GrossProfit --> Cash[现金跑道与下一轮融资验证]
modelSanity:
- checkName: 收入引擎
  finding: 基准情形的收入建立在：把第 1 年的 3 个 pilot 转成到 Q4Y2 的 12 个付费 hub，再在 Q4Y3 扩到 18 个 hub、每家约 $300K ARR。
- checkName: 必须跑对的事
  finding: 首批影像接入和规划集成必须足够可复用，才能在客户数持续增长时把毛利率拉过 70%。
- checkName: 模型会失真于
  finding: 如果企业销售周期延后一季度，且 ARPU 更接近 $250K，下行情形会在下一轮融资前几乎把现金烧光。
- checkName: 下一轮融资验证
  finding: 当公司证明至少 2 个 pilot 转正式、集成具备可复用性，且从主动脉切口扩到相邻结构性心脏工作流的路径可信时，下一轮融资就说得过去。
sanityChecks:
  ruleOf40: Y3 增长率 161.1% + EBITDA 利润率 9.5% = 170.6%
  burnMultiple: Y2 净消耗 $0.9M，除以年末约 $2.6M 的净新增 ARR，约为 0.4x；Y3 转为 EBITDA 为正。
  revenuePerFte: Y3 人均收入为 $388K（SaaS 基准约 $200-400K；这里偏高，是因为 ACV 属于企业级医院合同，而团队仍保持精简）。
  flags:
  - 尽管研究中已提示医疗系统采购集中和买方议价力风险，模型仍假设在第 1 年之后的第 2 年能净增 9 个 hub。
  - 只有影像接入和规划集成真正标准化，毛利率才能达到目标；如果部署继续高度定制，现金和 EBITDA 都会承压。
  - 第 3 年情形依赖向相邻结构性心脏工作流扩张，因为单独的急性主动脉滩头市场在商业上太窄。
