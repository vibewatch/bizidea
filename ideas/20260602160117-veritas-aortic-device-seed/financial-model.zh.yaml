scenarios:
  downside:
    description: pilot 转正式比计划晚两个季度，影像接入依旧更依赖人工，扩展模块上线也更慢，因此第 3 年规模停在 14 个 hub，ARPU 也更低。
    y3RevenueK: 3500.0
    y3EbitdaK: -220.0
    cashLowPointK: 180.0
    keyAssumptionChanges:
    - Y2 期末只有 9 个 hub，而不是 12 个；Y3 期末为 14 个，而不是 18 个。
    - 由于相邻工作流扩展没有按时落地，Y3 ARPU 停在 $250K。
    - 由于集成工作仍有较强服务属性，毛利率最高只到约 67%。
  base:
    description: 第 1 年落地 3 个 pilot，其中 2 个按计划转正式；可复用集成让公司在第 3 年期末累积到 18 个 hub。
    y3RevenueK: 4650.0
    y3EbitdaK: 439.7
    cashLowPointK: 831.4
    keyAssumptionChanges:
    - Y1 拿下 3 个付费 pilot，Y2 期末到 12 个 hub，Y3 期末到 18 个 hub。
    - 随着 hub 转正式并加购模块，ARPU 从 pilot 等价的 $150K，提升到 Y2 的 $250K，再到 Y3 的 $300K。
    - 首批影像交换和规划工作流集成标准化后，毛利率达到 70% 目标。
  upside:
    description: 伙伴渠道缩短采购流程，模块加购更快，公司到第 3 年做到 20 个 hub，毛利率也略好。
    y3RevenueK: 5800.0
    y3EbitdaK: 980.0
    cashLowPointK: 920.0
    keyAssumptionChanges:
    - 由于伙伴渠道 pipeline 转化更快，Y2 期末达到 14 个 hub，Y3 期末达到 20 个 hub。
    - 随着 benchmark 报表和 registry 导出卖给更多 hub，Y3 ARPU 升到 $320K。
    - 集成和实施 playbook 逐步标准化后，毛利率可提升到 74%。
