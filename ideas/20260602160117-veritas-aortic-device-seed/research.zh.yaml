reportMemo:
  executiveTakeaways:
  - 近期真正的痛点，不只是器械设计本身，而是要足够快地把一张远端 CT 扫描，变成一个被接受、解剖信息清楚、可直接上会的病例，既能救下患者，也能把手术机会留住。
  - 滩头市场在商业上是真实存在的，但规模偏窄：大约只是几百家美国三级 hub，而不是一个单独就足够巨大的软件市场。所以要有 venture 上行，必须从急性主动脉 intake 扩到更广的结构性心脏和心血管转诊工作流。
  - 相邻厂商已经覆盖图像交换、AI 预警或结构性心脏规划，但在升主动脉项目里，从外院 CT、转运接收一直到测量材料包，这条完整流程还没有哪家现有厂商真正拿下。
  - 赛道时点是最大风险：如果导管式升主动脉项目成熟得更慢，产品也得先证明自己作为高危转运和术前规划层，在当前手术与混合型主动脉流程里就能打出 ROI。
  marketDefinition: 相关市场应定义为：服务三级主动脉和结构性心脏项目的软件与工作流基础设施，它们必须接入外院 CT 数据，分诊高危转诊，协调专科团队接收，并整理出可直接干预的术前材料包。这家初创公司并不是在和通用 PACS、通用转运中心软件或通用放射 AI 竞争；它卡的是最窄的一层运营系统——一例急性主动脉转诊在这里被转成一个 hub 可直接接住的术前病例。
  customerAndBuyer: 一线用户主要是三级心血管 hub 内的结构性心脏项目负责人、主动脉中心运营负责人或高级协调员。二线用户包括转运中心人员、影像专家、心外科医生和介入心脏科医生。经济买家通常是心血管服务线 VP、心外科主任，或结构性心脏项目管理者；他们对转诊捕获、下游手术收入和质量指标负责。
  buyingTriggers:
  - point: 当研究性或微创升主动脉项目启动后，候选病例识别和转运就绪度就不再是外科医生临场处理的小问题，而会变成管理层必须解决的运营问题。
    sourceRefs:
    - 1
    - 2
    - 3
    - 28
    - 29
  - point: ATAAD 转运延误、交接材料不完整，以及长距离改道，都会实质性拉差结局，这让区域 hub 愿意为标准化 intake 和路由付费。
    sourceRefs:
    - 4
    - 6
    - 7
    - 8
    - 9
    - 10
  - point: 结构性心脏项目本来就跑在标准化 CT 规划、registry 和结局报送体系里，所以只要它能加快复杂病例捕获，多一层工作流是能被接受的。
    sourceRefs:
    - 12
    - 13
    - 14
    - 15
    - 19
  willingnessToPay:
    summary: 最强的预算逻辑来自：减少转诊流失、避免重复影像、加快转运接收，以及抓住下游手术收入。医院本来就为结构性心脏项目、图像共享和规划软件花钱，所以只要这套主动脉控制平面能证明病例接收更快、漏掉的候选更少，而不是空谈通用 AI 降本，它就有机会拿下预算。
    sourceRefs:
    - 13
    - 14
    - 15
    - 18
    - 19
    - 24
  competitiveLandscape: 竞争主要来自四条相邻栈：AI 预警与照护协同厂商、vendor-neutral 图像交换基础设施、结构性心脏规划套件，以及最顽固的手工替代方案——PACS 加电话/传真，再加外科医生逐个拍板。这个创业公司只有把这些碎片拼成一条主动脉专用运营流，才有机会赢。
  incumbentThesis:
  - incumbentClass: 图像交换厂商
    point: 它们能搬运 CT 数据、减少重复扫描，但不会判断病例是否适合微创，也不会决定该提醒谁，或下一步需要怎样的测量材料包。
    sourceRefs:
    - 24
    - 25
    - 26
  - incumbentClass: AI 预警厂商
    point: Viz.ai 和 RapidAI 证明医院愿意为专科工作流 AI 付费，但它们的重心是更广病种的预警和团队沟通，不是主动脉专用的转运接收和可直接上会的术前规划。
    sourceRefs:
    - 16
    - 17
    - 18
  - incumbentClass: 结构性心脏规划套件
    point: 3mensio、TeraRecon、Materialise、Medis 和 Circle 这类工具，在病例已经接收、CT 已进院后很强，但它们并不掌握 spoke 到 hub 的 intake 或急诊路由。
    sourceRefs:
    - 19
    - 20
    - 21
    - 22
    - 23
  - incumbentClass: 人工转运流程栈
    point: 电话、传真、PACS 复核和内部协调员之所以还能成立，是因为大家熟、也够灵活；但文献同样说明，这套做法会带来信息缺失、多次交接和难以量化的延误。
    sourceRefs:
    - 4
    - 7
    - 9
    - 24
  regulatoryLandscape: 只要产品始终停留在“医生在环”的决策支持和流程编排层，而不是自动诊断或无人监督的治疗选择，它就有机会避开最重的监管区。急性主动脉转运指南和共识，本身已经隐含了很高的记录与交接要求；而研究性器械项目又进一步提高了对筛查、接收和最终治疗流程的 protocol 敏感度。
  technologyLandscape: 底层技术栈其实已经齐了：DICOM 和 IHE 提供互操作轨道，vendor-neutral 图像交换已经成熟，基于 CT 的结构性心脏术前规划已经标准化，心血管 AI 平台也已经在做专科预警和云端协作。真正难的不是技术有没有，而是能不能把这些模块打包成一条主动脉专用工作流，而且这条流程从患者到达 hub 之前就开始。
  distributionChannels:
  - point: 主要打法应是创始人主导，直接卖给三级主动脉和结构性心脏项目负责人，因为切口极窄，而且一旦出错后果很重。
    sourceRefs:
    - 1
    - 2
    - 3
    - 12
    - 13
  - point: 器械创新公司、重度依赖 registry 的试验中心，以及早期微创项目，是最适合的滩头渠道，因为它们最先感受到候选筛选瓶颈。
    sourceRefs:
    - 2
    - 27
    - 28
    - 29
  - point: 如果能和图像交换、规划厂商做以集成为先的合作，把自己放在编排层，而不是做 rip-and-replace，就有机会缩短采购周期。
    sourceRefs:
    - 19
    - 24
    - 25
    - 26
  partnershipEcosystem:
  - point: 主动脉器械公司和试验 sponsor 是天然伙伴，因为它们需要在早期站点建立可重复的筛选、转运和术前文档流程。
    sourceRefs:
    - 2
    - 3
    - 27
    - 28
    - 29
  - point: 图像交换厂商很可能成为集成伙伴，因为在这条设想中的工作流里，外院 CT 接入就是第一个运营瓶颈。
    sourceRefs:
    - 24
    - 25
    - 26
  - point: 规划套件厂商和 registry 生态也很关键，因为创业公司可以把整理得更干净的解剖与手术数据，送进现有下游工具和报送流程。
    sourceRefs:
    - 12
    - 19
    - 20
    - 21
    - 22
    - 23
  dataMoats:
  - point: 如果能把外院 CT 解剖、转运时点、接收决策和最终结局连成长周期语料，这套数据很难复制，因为今天这些信息分散在 spoke 和 hub 两端。
    sourceRefs:
    - 4
    - 6
    - 7
    - 8
  - point: 围绕材料缺失项、转运到决策时间，以及多学科路由模式的 benchmark 数据，有机会成为这类少见但高价值病例的差异化运营资产。
    sourceRefs:
    - 7
    - 9
    - 10
  - point: 把急诊主动脉解剖标准化映射到术前规划检查点，随着微创项目成熟，会逐步堆出有防守力的测量和病例准备工作流。
    sourceRefs:
    - 19
    - 20
    - 21
    - 22
  geographicConsiderations:
  - point: 美国是最好的首发市场：ATAAD 区域化证据、结局报送体系，以及 TVT/结构性心脏存量，都支撑 hub-and-spoke 的采用逻辑。
    sourceRefs:
    - 4
    - 13
    - 15
  - point: 比起单家医院，覆盖跨州转诊半径的区域 hub 更值得打，因为改道路径本身就影响结局，而且每多接入一个 spoke 站点，数据护城河都会变深。
    sourceRefs:
    - 4
    - 12
    - 13
  sensitivityCases:
  - case: 导管式升主动脉采用要再晚好几年
    impact: 产品仍可卖给手术和混合型主动脉转运工作流，但如果不扩进相邻的结构性心脏 intake，ACV 和紧迫性都会下降。
    sourceRefs:
    - 2
    - 3
    - 28
    - 29
  - case: 相邻 AI 厂商下沉进入主动脉转运协同
    impact: 功能重叠会迅速增加，所以创业公司必须靠主动脉专用 protocol、术前材料包和跨站点 benchmark 数据拉开差距。
    sourceRefs:
    - 16
    - 17
    - 18
  - case: 影像接入集成比预期更难
    impact: 实施负担会上升，公司会被迫更依赖手工上传流程，ROI 和护城河都会变弱。
    sourceRefs:
    - 24
    - 25
    - 26
  validationPlan:
  - priority: high
    question: 一个目标 hub 每年到底处理多少例紧急升主动脉转诊？其中有多少在多学科评审前就死亡、转走或失去治疗窗口？
    evidenceToGather: 从 3 到 5 家目标 hub 拉 12 个月转运日志，按诊断、影像接收时间、接收决策时间和最终治疗去向拆开看。
  - priority: high
    question: 外院 CT 转诊里，哪些数据元素最常缺失，并把来回补资料的循环拖得最长？
    evidenceToGather: 对 spoke 医院的材料完整度做审计，尤其看 CT 时相、冠脉细节、生命体征、手术禁忌和联系人信息等缺失项。
  - priority: medium
    question: 在替换 PACS 或转运中心系统之前，主动脉和结构性心脏负责人愿不愿意先接受一层叠加式工作流？
    evidenceToGather: 和 3mensio、Sectra 以及两家大型医疗系统影像团队做集成范围访谈，并拿一家主动脉中心的 pilot 采购反馈做验证。
  - priority: medium
    question: 产品能否在不失焦的前提下，从急性主动脉 intake 扩到更广的结构性心脏转诊管理？
    evidenceToGather: 在同一批站点里影子跟踪 TAVR、TMVR 和复杂主动脉弓病例，看它们是否共享材料包、路由和规划任务。
