    isEstimate: true
    sourceRefs:
    - 4
    - 13
    - 14
bottomUpSizingDrivers:
- driver: 高级结构性心脏医院
  value: 2019-2022 年 TVT registry 覆盖的 786 家美国医院
  source: '[13]'
- driver: 滩头三级主动脉 hub
  value: 约 180 个具备区域 ATAAD intake 和复杂结构性心脏工作流能力的 hub（估算）
  source: calc from [4], [13], [15]
- driver: 每个 hub 的年合同价值
  value: 每个 hub $250k-$300k 企业 ARR，取决于 spoke 网络覆盖范围
  source: est. informed by [14], [19], [24]
- driver: 第 3 年可触达客户数
  value: 18 个 hub
  source: calc
categoryDynamics:
  growthRate: TAVR 维持年增长。2019 年美国手术量已达 72,991 例，并超过 SAVR；而 2019-2022 年 registry 仍覆盖了 786 家医院。
  growthRateSourceRefs:
  - 12
  - 13
  tailwinds:
  - point: ATAAD 区域化路径和 aorta code 落地都表明，标准化路由能实质改善结局。
    sourceRefs:
    - 4
    - 8
    - 9
  - point: 结构性心脏项目和 CT 规划实践的装机基础已经足够大，能够支撑相邻工作流软件。
    sourceRefs:
    - 12
    - 13
    - 19
  - point: 医院已越来越习惯在急性影像路径里使用 AI 驱动的专科预警和云协作。
    sourceRefs:
    - 16
    - 17
    - 18
  headwinds:
  - point: 滩头市场一部分取决于微创升主动脉项目从早期研发走向常规采用的速度。
    sourceRefs:
    - 2
    - 3
    - 28
    - 29
  - point: 数据接入依旧很脏，因为外院影像和转诊材料仍散落在不同系统和交接习惯里。
    sourceRefs:
    - 7
    - 24
    - 25
    - 26
competitors:
- name: Viz.ai
  stage: scale-up
  wedge: 用 AI 做主动脉和心血管检测，并连接专科团队做合规协作。
  pricing: 企业定制定价 / 未公开
  strength: 已经在卖照护协同软件，能识别主动脉夹层并快速拉起专科团队。
  weaknessVsUs: 它比我们更强在预警，但不掌握可直接上会的主动脉测量、转运接收逻辑或研究性材料包组装。
  sourceRefs:
  - 16
  - 17
- name: RapidAI
  stage: scale-up
  wedge: 面向急性影像路径的 AI 驱动服务线工作流，帮助医院做更聪明的转运和治疗决策。
  pricing: 企业定制定价 / 未公开
  strength: 在跨网络协同上已有可信度，也有围绕转运速度和服务线经济性的明确企业叙事。
  weaknessVsUs: 它对狭窄的升主动脉工作流，以及主动脉项目所需的细颗粒度“解剖到术前材料包”，聚焦不够。
  sourceRefs:
  - 18
- name: 3mensio Structural Heart
  stage: incumbent
  wedge: 为经皮结构性心脏干预提供术前规划和测量。
  pricing: 企业定制定价 / 未公开
  strength: 一旦影像到位，它在结构性心脏快速、准确术前规划上，已是介入心脏科的可信工具。
  weaknessVsUs: 它从影像采集和病例接收之后才开始发挥作用，解决不了紧急 spoke 到 hub 的转诊捕获和转运路由。
  sourceRefs:
  - 19
- name: Sectra Image Exchange Portal
  stage: incumbent
  wedge: 跨机构的 vendor-neutral 图像交换与协作。
  pricing: 企业定制定价 / 未公开
  strength: 直接打中外院影像交换、减少重复检查和跨站点共享。
  weaknessVsUs: 它能搬图，但不会把图转成主动脉候选信号、多学科任务或术前材料包。
  sourceRefs:
  - 24
- name: In-house PACS + transfer center + device-rep workflow
  stage: incumbent
  wedge: 利用现有系统、专科人员和电话/传真升级流程做人工协同。
  pricing: 成本隐含在现有人力和 IT 支出里
  strength: 熟悉、灵活，而且如果病例量不大，就不需要新采购。
  weaknessVsUs: 文献显示，这套方式会制造缺失数据、系统不兼容和多次交接，拖慢关乎生死的决策。
  sourceRefs:
  - 4
  - 7
  - 9
  - 24
regulatoryTechnicalConstraints:
- point: 这条工作流必须保留人工临床签字，因为急性主动脉转运决策发生在高风险急诊和研究性场景里。
  sourceRefs:
  - 5
  - 9
  - 27
- point: 外院 CT 接入依赖 DICOM 一致性、IHE 式系统集成，以及足够高的元数据保真度，才能支撑下游规划。
  sourceRefs:
  - 24
  - 25
  - 26
- point: 复杂主动脉器械项目仍受不同市场批准状态和试验 protocol 工作流约束。
  sourceRefs:
  - 27
  - 28
  - 29
- point: 疾病专用的交接标准仍不一致，因此软件往往需要把转诊方今天根本没法干净提供的数据重新结构化。
  sourceRefs:
  - 7
  - 9
validationSignals:
- point: Veritas 已经拿到专门资金，把经股动脉主动脉根部和升主动脉器械推进到首次人体应用阶段。
  sourceRefs:
  - 1
  - 2
  - 3
- point: Viz.ai 已经在卖主动脉夹层识别与专科预警产品，而且把 CT 完成到提醒发出的时间压到秒级。
  sourceRefs:
  - 16
- point: RapidAI 明确把更聪明的转运和治疗决策包装成服务线增长工具，这验证了医院愿意为影像工作流 AI 买单。
  sourceRefs:
  - 18
- point: Aorta code 路径研究说明，标准化 intake、转运和 OR 准备，能实质降低急性主动脉综合征死亡率。
  sourceRefs:
  - 8
openQuestions:
- 在导管式主动脉根部修复成为常规手术之前，美国到底有多少三级 hub 每年能收到足以支撑独立软件预算的升主动脉转诊量？
- 器械 sponsor 和早期试验中心，会不会允许第三方软件层参与研究性病例的筛选、测量和 protocol 工作流？
- 要比现有“电话 + PACS”流程更快，spoke 端最少需要做到什么程度的集成，才能把外院 CT 扫描顺利接进来？
- 到底哪个预算负责人会最稳定地推动这笔采购：结构性心脏、心外科、转运运营，还是企业影像团队？
