ideaScorecard:
  signalStrength:
    score: 5
    rationale: The cluster provides concrete same-day funding, device-design, and clinical-severity signals that strongly support a new infrastructure need around minimally invasive aortic workflows.
  painIntensity:
    score: 5
    rationale: The cited mortality and emergency nature of root and ascending-aorta disease make slow referral and planning workflows both clinically dangerous and financially painful.
  wedgeClarity:
    score: 4
