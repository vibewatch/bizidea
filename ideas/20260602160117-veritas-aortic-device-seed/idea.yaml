topRisks:
  - name: Program timing risk
    description: If minimally invasive ascending-aorta programs take longer than expected to reach clinical use, the beachhead market may mature more slowly than planned.
    mitigation: Sell first into current aortic-transfer and surgical-planning pain while designing the workflow to expand into adjacent structural-heart intake before full category breakout.
  - name: Clinical liability sensitivity
    description: An incorrect candidate flag or delayed escalation in an emergency aortic case could destroy trust with surgeons and administrators.
    mitigation: Keep the product as a decision-support and orchestration layer with explicit clinician sign-off, audit trails, and conservative escalation rules from day one.
  - name: Sparse-volume economics
    description: Rare-case workflows can be hard to justify if the customer cannot tie faster coordination to higher case capture, trial enrollment, or downstream cardiovascular revenue.
    mitigation: Start with high-volume referral hubs, prove ROI on transfer speed and saved candidate cases, and bundle the workflow into a broader cardiovascular intake platform over time.
