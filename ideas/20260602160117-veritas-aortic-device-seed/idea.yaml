differentiator: >-
  Most cardiovascular workflow software ends at generic imaging storage, transfer-center ticketing, or retrospective registry
  reporting. This company owns the narrow but high-value moment when an outside-hospital aortic diagnosis must be converted into
  an accepted, anatomically characterized, procedure-ready case for a specialized center. Defensibility comes from the case graph:
  anatomy normalization, candidate-selection heuristics, spoke-to-hub routing logic, and outcome feedback across rare but
  consequential interventions that incumbent transfer tools and device companies do not systematize well.
